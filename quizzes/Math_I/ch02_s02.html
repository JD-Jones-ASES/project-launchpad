<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math I &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 2, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement best defines the absolute value of a number?", "options": [{"text": "The number itself, ignoring any negative sign.", "isCorrect": false, "rationale": "This is only true for positive numbers. The definition is broader."}, {"text": "The distance of the number from zero on the number line.", "isCorrect": true, "rationale": "According to the text, 'The absolute value of a number is its distance from zero on the number line.' This definition correctly emphasizes distance and ignores direction."}, {"text": "The opposite of the number.", "isCorrect": false, "rationale": "While the absolute value of a negative number is its opposite, this is not the general definition for all numbers (e.g., the absolute value of a positive number is itself, not its opposite)."}, {"text": "The positive or negative version of the number.", "isCorrect": false, "rationale": "Absolute value is always non-negative (zero or positive), so it does not include a negative version."}]}, {"question": "According to the text, what is the defining characteristic of two opposite numbers?", "options": [{"text": "They are both positive or both negative.", "isCorrect": false, "rationale": "Opposite numbers are typically one positive and one negative (e.g., 7 and -7), unless the number is zero. This statement is incorrect."}, {"text": "When added together, they always sum to zero.", "isCorrect": false, "rationale": "While true, the text's definition focuses on their position relative to zero: 'Two numbers are opposites if they are the same distance from zero but on opposite sides of the number line.'"}, {"text": "They are the same distance from zero but on opposite sides of the number line.", "isCorrect": true, "rationale": "The text explicitly defines opposites as 'Two numbers are opposites if they are the same distance from zero but on opposite sides of the number line.'"}, {"text": "One is always positive, and the other is always negative.", "isCorrect": false, "rationale": "This is generally true, but the number 0 is its own opposite, and it is neither positive nor negative, making this statement not 'always' true."}]}, {"question": "What is the opposite of -25?", "options": [{"text": "-25", "isCorrect": false, "rationale": "The opposite of a number is not the number itself, unless the number is zero."}, {"text": "0", "isCorrect": false, "rationale": "0 is its own opposite; the opposite of -25 is not 0."}, {"text": "25", "isCorrect": true, "rationale": "The opposite of -25 is 25 because they are both 25 units from zero but on opposite sides of the number line. The text gives examples like 'The opposite of -4 is 4'."}, {"text": "|-25|", "isCorrect": false, "rationale": "While |-25| evaluates to 25, the opposite of -25 is simply the integer 25, not an absolute value expression."}]}, {"question": "Evaluate |-37|.", "options": [{"text": "-37", "isCorrect": false, "rationale": "The absolute value of a number represents its distance from zero, which is always non-negative. Therefore, -37 is incorrect."}, {"text": "0", "isCorrect": false, "rationale": "The absolute value of -37 is not 0; 0 is the distance of 0 from zero."}, {"text": "37", "isCorrect": true, "rationale": "The absolute value of -37 is 37 because -37 is 37 units away from zero on the number line. The text shows '|-5| = 5'."}, {"text": "±37", "isCorrect": false, "rationale": "Absolute value yields a single, non-negative value, not a positive and a negative value."}]}, {"question": "Which statement correctly evaluates both -|-12| and |-12|?", "options": [{"text": "-|-12| = -12 and |-12| = 12", "isCorrect": true, "rationale": "According to the text's caution: 'First find |-6| = 6, then apply the negative: -|-6| = -6.' So, |-12| is 12, and then the external negative sign makes -|-12| equal to -12."}, {"text": "-|-12| = 12 and |-12| = 12", "isCorrect": false, "rationale": "The external negative sign in -|-12| applies after the absolute value is taken, resulting in a negative value."}, {"text": "-|-12| = -12 and |-12| = -12", "isCorrect": false, "rationale": "The absolute value of a number (|-12|) is always non-negative, so it cannot be -12."}, {"text": "-|-12| = 12 and |-12| = -12", "isCorrect": false, "rationale": "Both evaluations are incorrect. |-12| must be positive, and -|-12| must be negative."}]}, {"question": "Based on the 'Absolute Value Is Never Negative' property, which inequality correctly describes the result of finding the absolute value of any integer 'x'?", "options": [{"text": "|x| < 0", "isCorrect": false, "rationale": "The text explicitly states 'Absolute Value Is Never Negative,' meaning it cannot be less than zero."}, {"text": "|x| = x", "isCorrect": false, "rationale": "This is only true if 'x' is a non-negative number. If 'x' is negative (e.g., -5), then |-5| = 5, which is not equal to -5."}, {"text": "|x| >= 0", "isCorrect": true, "rationale": "The property states 'For every integer a: a >= 0. Distance is always zero or positive, so absolute value is always non-negative.' This inequality correctly captures that absolute value is always zero or positive."}, {"text": "|x| <= 0", "isCorrect": false, "rationale": "This implies that absolute value is always negative or zero. While it can be zero, it is never negative, making this incorrect for all positive numbers."}]}, {"question": "Evaluate |-10 + 4|.", "options": [{"text": "-6", "isCorrect": false, "rationale": "The absolute value of a number cannot be negative."}, {"text": "6", "isCorrect": true, "rationale": "First, perform the operation inside the absolute value bars: -10 + 4 = -6. Then, find the absolute value: |-6| = 6, as it is 6 units from zero."}, {"text": "14", "isCorrect": false, "rationale": "This would be |-10| + |4|, which is not the correct evaluation of |-10 + 4|."}, {"text": "-14", "isCorrect": false, "rationale": "This results from incorrect operations and an incorrect understanding that absolute value can be negative."}]}, {"question": "Which of the following correctly completes the comparison: |-7| ? |4|?", "options": [{"text": "|-7| < |4|", "isCorrect": false, "rationale": "Evaluating the absolute values, |-7| = 7 and |4| = 4. Since 7 is not less than 4, this comparison is incorrect."}, {"text": "|-7| = |4|", "isCorrect": false, "rationale": "Evaluating the absolute values, |-7| = 7 and |4| = 4. Since 7 is not equal to 4, this comparison is incorrect."}, {"text": "|-7| > |4|", "isCorrect": true, "rationale": "As shown in the 'Comparing with Absolute Value' example, first evaluate the absolute values: |-7| = 7 and |4| = 4. Since 7 is greater than 4, the correct symbol is >."}, {"text": "Not enough information.", "isCorrect": false, "rationale": "All necessary information is provided to make the comparison."}]}, {"question": "A drone descends from an altitude of 150 meters above ground to 30 meters above ground. What is the total vertical distance the drone traveled during this descent?", "options": [{"text": "180 meters", "isCorrect": false, "rationale": "This would be the sum of the absolute values of the altitudes, not the distance traveled between them."}, {"text": "120 meters", "isCorrect": true, "rationale": "To find the distance (change in depth), we calculate the absolute value of the difference between the starting and ending altitudes: |30 - 150| = |-120| = 120 meters. This is an application of absolute value to find distance, similar to the 'Temperature Difference' example."}, {"text": "-120 meters", "isCorrect": false, "rationale": "Distance is always a non-negative value, regardless of direction."}, {"text": "0 meters", "isCorrect": false, "rationale": "The drone clearly changed its altitude, so the distance traveled is not 0."}]}, {"question": "Which of the following statements is always true for any integer 'a'?", "options": [{"text": "a = |a|", "isCorrect": false, "rationale": "This statement is only true for non-negative integers (a >= 0). For example, if a = -5, then -5 is not equal to |-5| (which is 5)."}, {"text": "-a = |-a|", "isCorrect": false, "rationale": "This statement is only true for non-positive integers (a <= 0). For example, if a = 5, then -5 is not equal to |5| (which is 5)."}, {"text": "-|a| <= a", "isCorrect": true, "rationale": "This statement is always true. If 'a' is positive or zero, -|a| becomes -a, and -a is always less than or equal to a (e.g., -5 <= 5). If 'a' is negative, -|a| will simplify to 'a' itself (e.g., -|-5| = -5), and 'a' is certainly less than or equal to itself."}, {"text": "|a| < a", "isCorrect": false, "rationale": "This statement is never true. The absolute value of a number is always greater than or equal to the number itself (e.g., |-5| = 5, which is not less than -5; |5| = 5, which is not less than 5)."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
