<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math I &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 1, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary reason mathematicians agree on a fixed order for performing operations?", "options": [{"text": "To make calculations more complex and challenging.", "isCorrect": false, "rationale": "The purpose of a fixed order is to simplify by standardizing, not to increase complexity. It ensures clarity and consistency."}, {"text": "To ensure everyone arrives at the same answer for a given numerical expression.", "isCorrect": true, "rationale": "The text states, 'To make sure everyone gets the same answer, mathematicians agree on a fixed order for performing operations.' This prevents ambiguity in evaluation."}, {"text": "To prioritize addition and subtraction over multiplication in all cases.", "isCorrect": false, "rationale": "The standard Order of Operations (PEMDAS) generally prioritizes multiplication and division before addition and subtraction, unless grouping symbols dictate otherwise."}, {"text": "To introduce new mathematical symbols and operations not commonly used.", "isCorrect": false, "rationale": "The order of operations applies to existing numbers and operations, not to introduce new ones."}]}, {"question": "Evaluate the numerical expression $15 + 6 \\times 3$.", "options": [{"text": "63", "isCorrect": false, "rationale": "This result occurs if addition is performed before multiplication ($15 + 6 = 21$, then $21 \\times 3 = 63$), which violates the Order of Operations (PEMDAS)."}, {"text": "33", "isCorrect": true, "rationale": "According to PEMDAS, multiplication must be performed before addition. So, $6 \\times 3 = 18$, then $15 + 18 = 33$."}, {"text": "48", "isCorrect": false, "rationale": "This result might occur from an incorrect grouping or operation, such as $15 \\times 3 = 45$, then $45+6=51$, which is also incorrect. Or $15 + 6 = 21$, then an incorrect multiplication."}, {"text": "24", "isCorrect": false, "rationale": "This result is incorrect and does not follow a logical sequence of operations for the given expression."}]}, {"question": "Evaluate $48 \\div 8 \\times 3$.", "options": [{"text": "2", "isCorrect": false, "rationale": "This result occurs if multiplication is performed before division ($8 \\times 3 = 24$, then $48 \\div 24 = 2$). For operations at the same level (Multiplication and Division), the rule is to work from left to right."}, {"text": "18", "isCorrect": true, "rationale": "Division and multiplication are at the same level in the order of operations. Therefore, they are performed from left to right. First, $48 \\div 8 = 6$, then $6 \\times 3 = 18$."}, {"text": "48", "isCorrect": false, "rationale": "This result is incorrect and does not follow the left-to-right rule for same-level operations."}, {"text": "1", "isCorrect": false, "rationale": "This result is incorrect and likely stems from calculation errors or an arbitrary order of operations."}]}, {"question": "Which of the following best defines a numerical expression?", "options": [{"text": "A mathematical equation that contains an equals sign and variables.", "isCorrect": false, "rationale": "This describes an algebraic equation, not a numerical expression. Numerical expressions do not contain variables or an equals sign."}, {"text": "A combination of numbers and operations that names a single value.", "isCorrect": true, "rationale": "As defined in the text, 'A numerical expression is a combination of numbers and operations... that names a single value.'"}, {"text": "A list of numbers arranged in increasing or decreasing order.", "isCorrect": false, "rationale": "This describes a sequence of numbers, not a numerical expression."}, {"text": "A set of instructions for solving a complex problem step-by-step.", "isCorrect": false, "rationale": "While numerical expressions are evaluated step-by-step, this definition is too broad and does not specifically define a numerical expression itself."}]}, {"question": "Evaluate $100 - (15 + 5) \\times 2$.", "options": [{"text": "60", "isCorrect": true, "rationale": "Following PEMDAS: First, evaluate the parentheses: $15 + 5 = 20$. Then, perform multiplication: $20 \\times 2 = 40$. Finally, perform subtraction: $100 - 40 = 60$."}, {"text": "160", "isCorrect": false, "rationale": "This result would occur if operations were performed out of order, for example, if subtraction or addition outside the parentheses was done before the multiplication."}, {"text": "80", "isCorrect": false, "rationale": "This result is incorrect and does not follow the prescribed order of operations for parentheses and multiplication."}, {"text": "170", "isCorrect": false, "rationale": "This result is incorrect and would stem from significant errors in applying the order of operations, such as performing subtraction before multiplication and ignoring parentheses."}]}, {"question": "Evaluate $3 [20 - (4 + 6)]$.", "options": [{"text": "30", "isCorrect": true, "rationale": "Work from the innermost grouping outward. First, $(4 + 6) = 10$. Then, inside the brackets, $20 - 10 = 10$. Finally, perform the multiplication: $3 \\times 10 = 30$."}, {"text": "42", "isCorrect": false, "rationale": "This result indicates an error in the order of operations, such as ignoring the innermost parentheses or performing operations incorrectly within the brackets."}, {"text": "18", "isCorrect": false, "rationale": "This result is incorrect and suggests operations were performed out of the specified order, especially regarding nested grouping symbols."}, {"text": "50", "isCorrect": false, "rationale": "This result might occur if one incorrectly distributed the 3 or performed operations like $3 \\times 20 - (4+6) = 60 - 10 = 50$, which ignores the brackets completely as a grouping symbol for $20-10$."}]}, {"question": "In the expression $\\frac{10 + 6}{4}$, how does the fraction bar function as a grouping symbol?", "options": [{"text": "It groups $6$ and $4$ for division first, before any addition.", "isCorrect": false, "rationale": "The fraction bar groups the entire numerator and denominator separately, meaning $10+6$ must be evaluated before the division by $4$."}, {"text": "It groups the entire numerator ($10 + 6$) and the entire denominator ($4$) separately, requiring each to be evaluated before the division.", "isCorrect": true, "rationale": "The text states, 'A fraction bar acts as a grouping symbol... evaluate the numerator first.' It groups all terms above the bar and all terms below the bar as distinct entities."}, {"text": "It groups all three numbers together, indicating they should be added before being divided by 4.", "isCorrect": false, "rationale": "It groups the numerator's operations, not all numbers as a single sum for the denominator to divide into."}, {"text": "It signifies that multiplication should occur before addition in the expression.", "isCorrect": false, "rationale": "The fraction bar's role as a grouping symbol is about the sequence of evaluating the numerator and denominator, not about overriding the M/D vs. A/S rule within those grouped sections (unless, of course, M/D operations are present)."}]}, {"question": "The caution note states: 'A common mistake is to add or subtract before multiplying.' How does the Order of Operations (PEMDAS) directly prevent this mistake?", "options": [{"text": "By placing addition and subtraction operations at a higher priority level than multiplication.", "isCorrect": false, "rationale": "PEMDAS explicitly places multiplication and division (M/D) at a higher priority level than addition and subtraction (A/S)."}, {"text": "By requiring all grouping symbols to be evaluated first, regardless of the operations inside them.", "isCorrect": false, "rationale": "While grouping symbols are evaluated first, this doesn't directly address the specific mistake of adding/subtracting before multiplying *outside* of grouping symbols or when grouping symbols aren't present."}, {"text": "By explicitly stating that multiplication and division are performed before addition and subtraction, unless grouping symbols indicate otherwise.", "isCorrect": true, "rationale": "This is the core rule (M/D before A/S) within PEMDAS that directly prevents the mistake of adding or subtracting prematurely."}, {"text": "By emphasizing working from left to right for all operations in a numerical expression.", "isCorrect": false, "rationale": "The left-to-right rule applies to operations at the *same* level (e.g., M and D, or A and S), not across different levels (M/D vs. A/S)."}]}, {"question": "Evaluate $25 - 2 \\times (12 \\div 4 + 1)$.", "options": [{"text": "17", "isCorrect": true, "rationale": "Following PEMDAS: 1. Innermost parentheses: $12 \\div 4 = 3$. 2. Complete parentheses: $3 + 1 = 4$. 3. Perform multiplication: $2 \\times 4 = 8$. 4. Perform subtraction: $25 - 8 = 17$."}, {"text": "20", "isCorrect": false, "rationale": "This result might occur from an error such as calculating $25 - 2 \\times 12 \\div 4 + 1 = 25 - 24 \\div 4 + 1 = 25 - 6 + 1 = 19 + 1 = 20$, incorrectly treating the expression as if there were no parentheses affecting the multiplication with 2."}, {"text": "7", "isCorrect": false, "rationale": "This result is incorrect and likely stems from multiple errors in applying the order of operations, such as incorrect calculations within parentheses or improper sequence of operations."}, {"text": "92", "isCorrect": false, "rationale": "This result occurs if subtraction is performed prematurely outside the parentheses, e.g., $(25 - 2) \\times (12 \\div 4 + 1) = 23 \\times (3 + 1) = 23 \\times 4 = 92$."}]}, {"question": "How do grouping symbols (parentheses, brackets, fraction bar) primarily affect the order of operations?", "options": [{"text": "They always dictate that addition and subtraction must be performed before multiplication and division.", "isCorrect": false, "rationale": "Grouping symbols only prioritize the operations *within* them; they do not universally change the M/D before A/S rule unless those specific operations (A/S) are enclosed to be done first."}, {"text": "They allow operations contained within them to be performed first, overriding the standard PEMDAS order if necessary.", "isCorrect": true, "rationale": "Grouping symbols explicitly indicate which operations must be performed first, regardless of their usual PEMDAS priority. This 'overrides' the default order to ensure inner calculations are done before interacting with outer operations."}, {"text": "They only apply to exponents and have no effect on other types of mathematical operations.", "isCorrect": false, "rationale": "Grouping symbols apply to any operation (addition, subtraction, multiplication, division, exponents) that falls within their scope."}, {"text": "They introduce entirely new mathematical operations not covered by the standard PEMDAS rules.", "isCorrect": false, "rationale": "Grouping symbols manage the order of existing operations; they do not introduce new ones."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
