    };

        <a href="../../courses/Business_Math.html">&larr; Back to Business Math: Practical Applications</a>

        <h1>QUIZ</h1>
        <div class="subtitle">Business Math: Practical Applications &mdash; Chapter 4, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the term \"principal\" refer to in the context of interest calculations?", "options": [{"text": "The total amount of interest earned over the life of an investment.", "isCorrect": false, "rationale": "The total interest earned is represented by 'I' in simple interest and 'A-P' in compound interest, not the principal."}, {"text": "The original amount of money deposited, invested, or borrowed.", "isCorrect": true, "rationale": "The text defines principal as 'the original amount of money that is deposited, invested, or borrowed before any interest is added' and uses the variable $P$ to represent it."}, {"text": "The annual percentage yield (APY) of an account.", "isCorrect": false, "rationale": "The APY is the effective annual rate, used for comparing different compounding schemes, and is distinct from the principal."}, {"text": "The rate at which interest is compounded per year.", "isCorrect": false, "rationale": "This describes the compounding frequency ('n') or the annual interest rate ('r'), not the principal amount."}], "id": "q01"}, {"question": "When calculating simple interest for a loan term of 15 months, how should the variable $t$ (time in years) be represented in the formula?", "options": [{"text": "15", "isCorrect": false, "rationale": "The time variable $t$ must be in years, not months. Using 15 would incorrectly assume 15 years."}, {"text": "0.15", "isCorrect": false, "rationale": "This would be 15% of a year, which is incorrect. A direct conversion of 15 months to years is needed."}, {"text": "1.25", "isCorrect": true, "rationale": "To convert months to years, divide the number of months by 12. So, $t = 15/12 = 1.25$ years."}, {"text": "15/360", "isCorrect": false, "rationale": "Dividing by 360 is used for converting days to years (banker's year), not months."}], "id": "q02"}, {"question": "A financial problem requires calculating simple interest for 120 days using the banker's year method. Which value should be used for the variable $t$?", "options": [{"text": "120", "isCorrect": false, "rationale": "The time variable $t$ must be in years, not days. Using 120 would incorrectly assume 120 years."}, {"text": "120/365", "isCorrect": false, "rationale": "Dividing by 365 is used for exact interest, but the problem specifies using the 'banker's year' method."}, {"text": "120/360", "isCorrect": true, "rationale": "The text states that for the banker's year (ordinary interest), time $t$ is calculated as $days/360$. Therefore, $120/360$ should be used."}, {"text": "0.120", "isCorrect": false, "rationale": "This is an arbitrary decimal that does not correctly convert 120 days to years using either the banker's year or exact interest method."}], "id": "q03"}, {"question": "Which statement accurately describes the fundamental difference between simple interest and compound interest?", "options": [{"text": "Simple interest rates are always higher than compound interest rates.", "isCorrect": false, "rationale": "The interest rate itself does not define the type of interest. Either can be higher or lower depending on the specific offer."}, {"text": "Compound interest is calculated only on the original principal, whereas simple interest is calculated on both principal and accumulated interest.", "isCorrect": false, "rationale": "This statement reverses the definitions. Simple interest is only on the principal, while compound interest is on both principal and accumulated interest."}, {"text": "Simple interest is calculated only on the original principal, whereas compound interest is calculated on both principal and previously earned interest.", "isCorrect": true, "rationale": "The text clearly states that 'With simple interest, the interest is calculated only on the original principal' and 'With compound interest, you earn interest on the principal and on all previously earned interest.'"}, {"text": "Simple interest is primarily used for loans, while compound interest is exclusively for savings accounts.", "isCorrect": false, "rationale": "Both simple and compound interest can apply to loans and savings/investments. This statement inaccurately restricts their applications."}], "id": "q04"}, {"question": "A business takes out a simple interest loan of $15,000 at an annual rate of 6.5% for 4 years. How much total interest will the business pay?", "options": [{"text": "$975.00", "isCorrect": false, "rationale": "This would be the interest for one year only ($15,000 * 0.065$). The question asks for total interest over 4 years."}, {"text": "$3,900.00", "isCorrect": true, "rationale": "Using the simple interest formula $I = Prt$: $P = $15,000$, $r = 0.065$ (as a decimal), $t = 4$. So, $I = 15,000 * 0.065 * 4 = $3,900.00."}, {"text": "$18,900.00", "isCorrect": false, "rationale": "This is the maturity value ($P + I$), not just the interest earned. It's the sum of the principal and the calculated interest ($15,000 + 3,900$). "}, {"text": "$2,925.00", "isCorrect": false, "rationale": "This calculation might result from an error in the rate or time, such as $15,000 * 0.065 * 3$ (if time was mistakenly 3 years)."}], "id": "q05"}, {"question": "Sarah invests $7,500 in an account that earns 3.5% simple interest annually for 5 years. What will be the maturity value of her investment?", "options": [{"text": "$1,312.50", "isCorrect": false, "rationale": "This is the total simple interest earned ($7,500 * 0.035 * 5$). The maturity value includes the principal."}, {"text": "$7,500.00", "isCorrect": false, "rationale": "This is the principal amount. The maturity value includes the principal plus all interest earned."}, {"text": "$8,812.50", "isCorrect": true, "rationale": "Using the maturity value formula for simple interest $A = P(1 + rt)$: $A = 7,500(1 + 0.035 * 5) = 7,500(1 + 0.175) = 7,500(1.175) = $8,812.50."}, {"text": "$8,948.33", "isCorrect": false, "rationale": "This value would be closer to a compound interest calculation, which is not applicable here as the problem specifies simple interest."}], "id": "q06"}, {"question": "An investment of $6,000 yielded $720 in simple interest over a period of 3 years. What was the annual interest rate for this investment?", "options": [{"text": "0.04%", "isCorrect": false, "rationale": "This is the decimal rate divided by 100, which is incorrect. Rates are typically given as percentages, not decimals of percentages."}, {"text": "4%", "isCorrect": true, "rationale": "Using the rearranged simple interest formula $r = I / (Pt)$: $r = 720 / (6,000 * 3) = 720 / 18,000 = 0.04$. Converting this decimal to a percentage gives 4%."}, {"text": "40%", "isCorrect": false, "rationale": "This would result if an error in decimal conversion occurred (e.g., multiplying 0.04 by 1000 instead of 100)."}, {"text": "0.04", "isCorrect": false, "rationale": "While 0.04 is the correct decimal value for 'r' in the formula, the question asks for the annual interest rate, which is typically expressed as a percentage in financial contexts."}], "id": "q07"}, {"question": "Which compounding frequency would result in the highest future value for an investment, assuming the same annual interest rate and time period?", "options": [{"text": "Annually", "isCorrect": false, "rationale": "Annually means interest is compounded once a year ($n=1$), which is the least frequent compounding among the choices, leading to a lower future value compared to more frequent options."}, {"text": "Semiannually", "isCorrect": false, "rationale": "Semiannually means interest is compounded twice a year ($n=2$). While better than annually, it's less frequent than quarterly or daily."}, {"text": "Quarterly", "isCorrect": false, "rationale": "Quarterly means interest is compounded four times a year ($n=4$). This is more frequent than annually or semiannually but less frequent than daily."}, {"text": "Daily", "isCorrect": true, "rationale": "The more frequently interest is compounded, the more often 'interest on interest' is calculated, leading to a higher future value. Daily compounding ($n=360$ or $n=365$) is the most frequent option given."}], "id": "q08"}, {"question": "An individual deposits $4,000 into a savings account that offers 5% interest compounded monthly. If the money is left in the account for 6 years, what is the value of the exponent 'nt' in the compound interest formula $A = P(1 + r/n)^{nt}$?", "options": [{"text": "6", "isCorrect": false, "rationale": "This represents 't' (time in years), not the total number of compounding periods (nt)."}, {"text": "12", "isCorrect": false, "rationale": "This represents 'n' (number of compounding periods per year), not the total number of compounding periods (nt) over 6 years."}, {"text": "30", "isCorrect": false, "rationale": "This could be a mistake ($5 * 6$), but it does not represent 'nt' correctly for monthly compounding over 6 years."}, {"text": "72", "isCorrect": true, "rationale": "The exponent 'nt' represents the total number of times interest is compounded. With monthly compounding ($n=12$) for 6 years ($t=6$), the exponent is $12 * 6 = 72$."}], "id": "q09"}, {"question": "To determine which bank offers a better return for a savings account, even if they advertise different annual rates and compounding frequencies, what is the single best metric to compare according to the text?", "options": [{"text": "The principal amount required for deposit.", "isCorrect": false, "rationale": "The principal amount does not directly reflect the return rate of the account; it's the starting investment."}, {"text": "The annual interest rate ($r$) as a decimal.", "isCorrect": false, "rationale": "The stated annual interest rate (nominal rate) doesn't account for compounding frequency, making it an unreliable comparison between different compounding schemes."}, {"text": "The number of compounding periods per year ($n$).", "isCorrect": false, "rationale": "While important, 'n' alone doesn't tell the whole story. A higher 'n' is generally better, but it must be considered with the nominal rate to determine the actual return."}, {"text": "The Annual Percentage Yield (APY).", "isCorrect": true, "rationale": "The text explicitly states: 'The Annual Percentage Yield (APY), also called the effective annual rate, lets you make a fair comparison.' It also notes, 'When you compare savings accounts, the APY is the single best number to compare.'"}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
