<script>
var QUESTIONS = [{"question": "Which statement accurately defines an installment loan according to the text?", "options": [{"text": "A loan where the interest rate can change annually based on market conditions.", "isCorrect": false, "rationale": "The text defines an installment loan as having a fixed number of equal payments, not necessarily a variable interest rate, though the interest rate is usually fixed for the life of the loan according to context."}, {"text": "A loan repaid with a fixed number of equal payments made at regular intervals.", "isCorrect": true, "rationale": "The keyterm 'Installment Loan' explicitly states it is 'repaid with a fixed number of equal payments made at regular intervals (usually monthly).'"}, {"text": "A loan that allows borrowers to make varying payments each month based on their financial situation.", "isCorrect": false, "rationale": "The text clarifies that installment loans involve equal payments, contrasting them with credit cards where varying payments are allowed."}, {"text": "A short-term loan that must be repaid in full within 90 days.", "isCorrect": false, "rationale": "The text does not specify a short-term duration for installment loans; examples like home mortgages suggest they can be long-term."}]}, {"question": "A business takes out a $25,000 loan at an annual interest rate of 7.2% for 3 years. When calculating the monthly payment using the provided formula, what values should be used for *r* (monthly interest rate) and *n* (total number of payments)?", "options": [{"text": "r = 0.072, n = 3", "isCorrect": false, "rationale": "This uses the annual rate directly for 'r' and the number of years for 'n', neither of which is correct according to the formula requirements. 'r' must be the monthly decimal rate, and 'n' the total number of monthly payments."}, {"text": "r = 0.006, n = 36", "isCorrect": true, "rationale": "The monthly interest rate 'r' is calculated as the annual rate divided by 12 (0.072 / 12 = 0.006). The total number of payments 'n' is calculated as the number of years multiplied by 12 (3 * 12 = 36). These are the correct conversions specified in the 'Monthly Payment Formula' section."}, {"text": "r = 0.006, n = 3", "isCorrect": false, "rationale": "While 'r' is correctly converted to the monthly rate, 'n' is incorrectly stated as the number of years instead of the total number of monthly payments."}, {"text": "r = 0.072, n = 36", "isCorrect": false, "rationale": "This correctly identifies the total number of payments 'n', but incorrectly uses the annual interest rate for 'r' instead of the required monthly interest rate."}]}, {"question": "A $10,000 loan is taken out at 4.8% annual interest for 5 years. What is the first step in calculating the value of (1+r)^n in the monthly payment formula after identifying P, r, and n?", "options": [{"text": "Multiply P by r.", "isCorrect": false, "rationale": "Multiplying P by r is part of the numerator calculation, but not the first step for calculating the (1+r)^n component itself."}, {"text": "Calculate 1 + (0.048 / 12) to get the base, then raise it to the power of (5 * 12).", "isCorrect": true, "rationale": "First, the monthly rate 'r' is calculated (0.048/12). Then 1 is added to 'r'. Finally, this sum is raised to the power of 'n', which is the total number of payments (5 years * 12 months/year = 60 payments). This aligns with the 'Computing a Monthly Payment' example steps."}, {"text": "Divide the annual rate by the number of payments, then add 1.", "isCorrect": false, "rationale": "The annual rate must be divided by 12 (to get the monthly rate 'r') before adding 1, and the exponent 'n' is the total number of payments, not just the number of years."}, {"text": "Subtract 1 from the product of (P * r).", "isCorrect": false, "rationale": "This describes part of the denominator's calculation after (1+r)^n is found, and involves 'P' which is not part of calculating (1+r)^n."}]}, {"question": "A borrower takes out a loan with a monthly payment of $185.00 for 36 months. If the original principal borrowed was $6,000.00, what is the total amount of interest paid over the life of the loan?", "options": [{"text": "$1,660.00", "isCorrect": false, "rationale": "Total amount paid = $185.00 * 36 = $6,660.00. Total interest = $6,660.00 - $6,000.00 = $660.00, not $1,660.00. This error likely arises from adding $1,000 to the correct interest amount."}, {"text": "$6,000.00", "isCorrect": false, "rationale": "This represents the principal only, not the total interest paid. The total amount paid would be higher than the principal due to interest."}, {"text": "$185.00", "isCorrect": false, "rationale": "This is a single monthly payment, not the total interest paid over the life of the loan."}, {"text": "$660.00", "isCorrect": true, "rationale": "Total amount paid = $185.00 * 36 = $6,660.00. Total interest paid = $6,660.00 - $6,000.00 = $660.00."}]}, {"question": "Considering the impact of loan terms, if a borrower chooses to extend the term of their installment loan (e.g., from 3 to 5 years) while keeping the principal and annual interest rate the same, what is the most likely outcome?", "options": [{"text": "Both the monthly payment and the total interest paid will decrease.", "isCorrect": false, "rationale": "Extending the loan term typically decreases the monthly payment but increases the total interest paid over the life of the loan, as interest accrues for a longer period."}, {"text": "The monthly payment will increase, and the total interest paid will decrease.", "isCorrect": false, "rationale": "Extending the loan term generally decreases the monthly payment, not increases it. While it might seem counterintuitive, the total interest paid will increase."}, {"text": "The monthly payment will decrease, but the total interest paid will increase.", "isCorrect": true, "rationale": "Spreading the principal repayment over more periods (longer term) reduces the individual monthly payment. However, because interest is charged on the remaining balance for a longer duration, the cumulative interest paid over the entire loan life will be higher. This aligns with the understanding of loan mechanics described in the section, particularly the 'note' on minimum payments and long payoff times."}, {"text": "Both the monthly payment and the total interest paid will remain unchanged.", "isCorrect": false, "rationale": "Changing the loan term directly impacts both the monthly payment (due to 'n' in the formula) and the total interest paid (due to more interest periods)."}]}, {"question": "According to the text, which characteristic distinguishes credit card finance charge calculation from installment loan interest calculation?", "options": [{"text": "Credit card finance charges are calculated only on new purchases, not on previous balances.", "isCorrect": false, "rationale": "The average daily balance method considers the balance for each day, which includes previous balances and new purchases, as shown in the example."}, {"text": "Installment loan interest is calculated on a fixed monthly payment, while credit card finance charges are based on an average daily balance.", "isCorrect": true, "rationale": "The section explicitly states that 'Credit cards work differently from installment loans. Instead of a fixed payment schedule, you can charge purchases and make varying payments. Interest (called a finance charge) is calculated on the average daily balance.' This is a direct comparison from the text."}, {"text": "Credit card finance charges use an annual rate, whereas installment loans use a monthly rate.", "isCorrect": false, "rationale": "Both types of loans ultimately derive their interest from an annual rate (APR for credit cards, annual rate for installment loans), which is then converted to a daily or monthly rate for calculation."}, {"text": "Installment loans calculate interest only on the principal, while credit cards calculate it on the principal plus fees.", "isCorrect": false, "rationale": "Installment loan interest is calculated on the *remaining balance*, which includes principal. Credit card finance charges are also based on the balance. Fees are separate from interest calculation method."}]}, {"question": "A credit card has a 30-day billing cycle. The balance starts at $1,200 for the first 15 days. On Day 16, a $300 payment is made. What is the average daily balance for this billing cycle?", "options": [{"text": "$1,050.00", "isCorrect": true, "rationale": "For Days 1-15 (15 days), the balance is $1,200. Sum = 15 * $1,200 = $18,000. For Days 16-30 (15 days), the balance is $1,200 - $300 = $900. Sum = 15 * $900 = $13,500. Total sum of daily balances = $18,000 + $13,500 = $31,500. Average daily balance = $31,500 / 30 = $1,050.00."}, {"text": "$1,200.00", "isCorrect": false, "rationale": "This is the initial balance, not the average daily balance after a payment is made."}, {"text": "$900.00", "isCorrect": false, "rationale": "This is the balance after the payment, but it doesn't account for the days the balance was higher."}, {"text": "$1,500.00", "isCorrect": false, "rationale": "This value is not derived from the provided balances and calculation method."}]}, {"question": "What is the core principle of amortization in the context of loan repayment?", "options": [{"text": "It means paying off a loan in a single lump sum at the end of the loan term.", "isCorrect": false, "rationale": "Amortization is defined as 'paying off a loan through a series of equal payments,' directly contradicting the idea of a single lump sum."}, {"text": "It focuses solely on paying down the principal as quickly as possible, deferring interest until later.", "isCorrect": false, "rationale": "Each amortization payment covers both interest for the period and principal repayment, and interest is always charged on the remaining balance from the beginning."}, {"text": "It involves a series of equal payments where each payment covers both interest and a portion of the principal.", "isCorrect": true, "rationale": "The 'keyterm Amortization' explicitly states it is 'the process of paying off a loan through a series of equal payments' and that 'Each payment covers two things: Interest for the period... Principal repayment.'"}, {"text": "It calculates interest only on the original principal amount, not the declining balance.", "isCorrect": false, "rationale": "Amortization calculations clearly show interest being charged on the 'Remaining Balance,' which declines over time, not just the original principal."}]}, {"question": "A loan has a remaining balance of $8,500.00, a monthly payment of $175.00, and a monthly interest rate (r) of 0.006. What is the interest portion of the next payment?", "options": [{"text": "$51.00", "isCorrect": true, "rationale": "According to the 'Building One Row of an Amortization Table' property, the 'Interest for the period = Remaining Balance * r'. So, $8,500.00 * 0.006 = $51.00."}, {"text": "$175.00", "isCorrect": false, "rationale": "This is the total monthly payment, not just the interest portion."}, {"text": "$124.00", "isCorrect": false, "rationale": "This would be the principal portion ($175 - $51), not the interest portion."}, {"text": "$8,500.00", "isCorrect": false, "rationale": "This is the remaining balance, not the interest portion of a single payment."}]}, {"question": "As an amortized installment loan progresses from its beginning to its end, what happens to the allocation of each fixed monthly payment?", "options": [{"text": "The interest portion remains constant, and the principal portion increases.", "isCorrect": false, "rationale": "The interest portion decreases because it is calculated on a declining remaining balance. Only the principal portion increases within the fixed payment."}, {"text": "The principal portion remains constant, and the interest portion decreases.", "isCorrect": false, "rationale": "The principal portion of the payment actually increases over time, while the interest portion decreases."}, {"text": "The interest portion decreases, and the principal portion increases.", "isCorrect": true, "rationale": "The 'keyconcept How Amortization Works Over Time' section explicitly states: 'As the balance shrinks, less interest accrues, so more of each payment goes toward principal.' This means the interest portion decreases, and the principal portion increases."}, {"text": "Both the interest and principal portions remain constant throughout the loan term.", "isCorrect": false, "rationale": "This is incorrect. While the total payment is fixed, the internal allocation between interest and principal changes over the life of the loan."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
