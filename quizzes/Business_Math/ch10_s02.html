<script>
var QUESTIONS = [{"question": "What is the fundamental goal of using linear programming in business, as described in the text?", "options": [{"text": "To reduce the number of employees needed for production.", "isCorrect": false, "rationale": "While efficiency might indirectly impact staffing, the text states linear programming helps 'decide how to use their limited resources in the best possible way' to 'maximize profit' or 'minimize cost,' not specifically to reduce employees."}, {"text": "To optimize the allocation of limited resources to achieve a specific objective.", "isCorrect": true, "rationale": "The text explicitly states, 'Linear programming helps business owners decide how to use their limited resources in the best possible way,' which aligns with optimizing resource allocation for objectives like maximizing profit or minimizing cost."}, {"text": "To graphically represent financial statements for shareholders.", "isCorrect": false, "rationale": "Linear programming involves graphing, but its purpose is optimization, not primarily financial reporting or visualization of existing statements."}, {"text": "To predict market trends and customer demand.", "isCorrect": false, "rationale": "Linear programming deals with how to best use *known* resources and profit/cost structures, not with forecasting external market factors or demand."}]}, {"question": "For Woodcraft Custom Furniture, Marcus has 'at most 120 hours of labor' and 'at most 450 board-feet of lumber.' If x represents the number of tables and y represents the number of chairs, and each table requires 30 board-feet of lumber while each chair requires 10 board-feet, which inequality correctly represents the *lumber* constraint before simplification?", "options": [{"text": "6x + 3y <= 120", "isCorrect": false, "rationale": "This inequality represents the labor constraint, where 6 hours are for tables and 3 for chairs, and the total labor is at most 120 hours."}, {"text": "30x + 10y >= 450", "isCorrect": false, "rationale": "This inequality incorrectly uses 'at least' (>=) instead of 'at most' (<=) for the available lumber. Marcus has 'at most' 450 board-feet, meaning he cannot exceed this amount."}, {"text": "30x + 10y <= 450", "isCorrect": true, "rationale": "Each table (x) requires 30 board-feet, and each chair (y) requires 10 board-feet. The total lumber used (30x + 10y) must be less than or equal to the 450 board-feet available ('at most 450')."}, {"text": "80x + 50y <= 450", "isCorrect": false, "rationale": "This inequality incorrectly combines profit values (80x + 50y) with the lumber limit (450). The objective function for profit is Z = 80x + 50y, not a constraint."}]}, {"question": "In the Woodcraft Furniture example, the optimal solution maximized profit by producing only chairs, despite tables having a higher profit per unit ($80 vs $50). What is the most accurate reason for this outcome?", "options": [{"text": "Chairs are generally more popular with customers than tables.", "isCorrect": false, "rationale": "The problem does not provide any information about customer popularity or demand for chairs versus tables; the decision is based purely on profit and resource constraints."}, {"text": "Tables require fewer resources (labor and lumber) than chairs, making them less efficient overall.", "isCorrect": false, "rationale": "This statement is incorrect. Tables actually require *more* resources (6 hours labor, 30 board-feet lumber) than chairs (3 hours labor, 10 board-feet lumber) per unit. This higher resource consumption is precisely why focusing on chairs was more profitable in this scenario."}, {"text": "The available resources (labor and lumber) were more efficiently utilized by producing only chairs.", "isCorrect": true, "rationale": "The text explains, 'Note: Even though tables have a higher per-unit profit, chairs use far fewer resources—so devoting all capacity to chairs yields the highest total profit.' This demonstrates that while tables are more profitable individually, chairs are more 'resource-efficient' given the *limited total* resources, leading to a higher overall profit."}, {"text": "The objective function assigned a higher weight to chair production.", "isCorrect": false, "rationale": "The objective function correctly assigns $80 to x (tables) and $50 to y (chairs), reflecting their per-unit profits. It does not assign a 'higher weight' to chairs; the outcome is due to resource utilization relative to profit."}]}, {"question": "The GreenGrow Fertilizer Company wants to minimize cost. If x represents pounds of Mix A at $3.00/lb and y represents pounds of Mix B at $4.00/lb, which is the correct objective function?", "options": [{"text": "Z = 3x + 4y", "isCorrect": true, "rationale": "The objective is to minimize cost. Mix A costs $3.00 per pound (3x) and Mix B costs $4.00 per pound (4y). The total cost is the sum of these, Z = 3x + 4y."}, {"text": "Z = 4x + 1y", "isCorrect": false, "rationale": "This represents the nitrogen units provided by Mix A (4 units) and Mix B (1 unit) if the typo was corrected to 2 units for Mix B, not costs. It's not the objective function."}, {"text": "Z = 12x + 8y", "isCorrect": false, "rationale": "This combines the minimum required units of nitrogen (12) and phosphorus (8) with the variables, which is incorrect for an objective function that should reflect the quantity to be optimized (cost in this case)."}, {"text": "Z = x + y", "isCorrect": false, "rationale": "This objective function would minimize the total number of pounds of mix, not the total cost, as it ignores the differing costs per pound."}]}, {"question": "The GreenGrow Fertilizer problem is a minimization problem with 'at least' constraints for nitrogen and phosphorus. How is its feasible region typically characterized?", "options": [{"text": "It is a bounded region entirely within the first quadrant, below all constraint lines.", "isCorrect": false, "rationale": "A bounded region below constraint lines is characteristic of a 'less than or equal to' maximization problem in the first quadrant, not an 'at least' minimization problem."}, {"text": "It is an unbounded region in the first quadrant, above all constraint lines.", "isCorrect": true, "rationale": "The text states for GreenGrow, 'Since these are “greater than or equal to” constraints, we shade above each line. The feasible region is the area above both lines in the first quadrant—it is unbounded to the upper right.' This accurately describes the unbounded feasible region for minimization problems with 'at least' constraints."}, {"text": "It is a single line segment connecting two corner points.", "isCorrect": false, "rationale": "A line segment can represent multiple optimal solutions in certain scenarios, but it is not the general characteristic of a feasible region itself."}, {"text": "It is a point at the origin (0,0).", "isCorrect": false, "rationale": "The origin (0,0) is often a corner point, but it cannot be the entire feasible region unless there are no positive production requirements or possibilities. In minimization problems with 'at least' constraints, the origin is often outside the feasible region."}]}, {"question": "For Sweet Sunrise Bakery, Priya produces cookies (x) and cakes (y). The constraint for oven capacity states 'she can produce at most 40 cakes per day.' How is this constraint correctly written?", "options": [{"text": "x <= 40", "isCorrect": false, "rationale": "This constraint incorrectly applies the limit of 40 to cookies (x) instead of cakes (y)."}, {"text": "y <= 40", "isCorrect": true, "rationale": "The number of cakes is represented by 'y'. 'At most 40 cakes' means the number of cakes (y) must be less than or equal to 40."}, {"text": "x + y <= 40", "isCorrect": false, "rationale": "This constraint implies a combined limit of 40 for cookies and cakes, which is not what 'at most 40 cakes' means. The limit applies specifically to cakes."}, {"text": "y >= 40", "isCorrect": false, "rationale": "This constraint implies 'at least 40 cakes,' which is the opposite of 'at most 40 cakes' (y <= 40)."}]}, {"question": "The Sweet Sunrise Bakery example showed that maximum revenue occurred at two distinct corner points and 'any combination along the line segment between these two points also yields $1,080.00.' What does this phenomenon imply for Priya, the business owner?", "options": [{"text": "The problem setup was flawed, as optimal solutions should always be unique.", "isCorrect": false, "rationale": "The text explicitly states this is a known phenomenon: 'When the maximum (or minimum) value occurs at two corner points, it actually occurs at every point on the line segment connecting those corners. This is called having multiple optimal solutions.'"}, {"text": "Priya must choose one of the two corner points, as intermediate combinations are not practically feasible.", "isCorrect": false, "rationale": "The text states 'any combination along the line segment between these two points also yields $1,080.00', implying feasibility for intermediate points. The practical choice might be one of the corners or an intermediate point depending on other business factors."}, {"text": "Priya has flexibility in her production mix (cookies and cakes) to achieve the maximum revenue, based on other non-LP factors.", "isCorrect": true, "rationale": "The 'Did you know' box explains this: 'In practice, the business owner can choose among those solutions based on other preferences (like variety in the product line).' This flexibility is a key implication of multiple optimal solutions."}, {"text": "The bakery's resources are unlimited, making any production combination equally profitable.", "isCorrect": false, "rationale": "The bakery still faces 'at most' constraints for flour, sugar, and oven capacity. The resources are limited, but the optimal profit can be achieved by different combinations under those limits."}]}, {"question": "In the QuickShip Logistics problem, which of the following is a *feasible* corner point for minimizing cost, as identified in Step 5?", "options": [{"text": "(12, 0)", "isCorrect": false, "rationale": "The point (12, 0) was found to be infeasible because it violates the drivers constraint (x + y <= 10): 12 + 0 = 12, which is not less than or equal to 10."}, {"text": "(9, 1)", "isCorrect": true, "rationale": "The text lists (9, 1) as one of the feasible corner points. It satisfies all constraints: Package (9 + 3(1) = 12 >= 12), Drivers (9 + 1 = 10 <= 10), Large Trucks (1 <= 4), and Non-negativity."}, {"text": "(10, 0)", "isCorrect": false, "rationale": "While 10 + 0 <= 10 satisfies the driver constraint, it does not satisfy the package constraint: 50(10) + 150(0) = 500, which is not >= 600 packages. This point was not listed as an intersection in the text."}, {"text": "(0, 0)", "isCorrect": false, "rationale": "The origin (0, 0) is not feasible because it violates the package capacity constraint (50x + 150y >= 600): 50(0) + 150(0) = 0, which is not greater than or equal to 600."}]}, {"question": "Which of the following represents the correct sequence of steps after defining variables and writing the objective function in a linear programming problem?", "options": [{"text": "Graph feasible region, find corner points, write constraints, evaluate objective function, state solution.", "isCorrect": false, "rationale": "This sequence is incorrect because constraints must be written before the feasible region can be graphed, and corner points found."}, {"text": "Write constraints, graph feasible region, find corner points, evaluate objective function, state solution.", "isCorrect": true, "rationale": "This sequence matches the steps outlined in all the examples in the section: Step 1 (Define variables), Step 2 (Objective function), Step 3 (Write constraints), Step 4 (Graph feasible region), Step 5 (Find corner points), Step 6 (Evaluate objective function), Step 7 (State solution)."}, {"text": "Find corner points, write constraints, graph feasible region, evaluate objective function, state solution.", "isCorrect": false, "rationale": "This sequence is incorrect because constraints must be written and the feasible region graphed before corner points can be identified."}, {"text": "Evaluate objective function, write constraints, graph feasible region, find corner points, state solution.", "isCorrect": false, "rationale": "This sequence is incorrect as the objective function cannot be evaluated until the corner points of the feasible region are found, which requires prior steps."}]}, {"question": "Linear programming was developed during World War II to help the military plan supply shipments and troop movements efficiently. How does this historical context relate to its modern business applications?", "options": [{"text": "It shows that linear programming is only suitable for large-scale operations with complex logistics.", "isCorrect": false, "rationale": "The text refutes this by stating, 'Today, businesses of all sizes—from small bakeries to global airlines—use linear programming,' indicating it's not limited to large-scale operations."}, {"text": "It highlights the core purpose of linear programming: to make smarter decisions about resource allocation and efficiency under constraints.", "isCorrect": true, "rationale": "The military's need for efficient resource allocation (supplies, troops) under constraints directly mirrors the business need to optimize production, scheduling, and resource allocation, as described in the 'Did you know' section. This core purpose remains consistent."}, {"text": "It implies that linear programming is primarily used for military and government applications, not commercial businesses.", "isCorrect": false, "rationale": "The text explicitly states, 'Today, businesses of all sizes... use linear programming to make smarter decisions,' contradicting the idea that it's primarily for military/government."}, {"text": "It suggests that early linear programming models were too simplistic for current business challenges.", "isCorrect": false, "rationale": "While models have evolved, the underlying principles and utility for resource optimization remain fundamental and applicable to current business challenges, as shown by the examples."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
