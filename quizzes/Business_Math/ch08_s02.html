<script>
var QUESTIONS = [{"question": "According to the text, what is the primary reason businesses convert raw data into graphs and charts?", "options": [{"text": "To make spreadsheets more visually appealing for internal archives.", "isCorrect": false, "rationale": "While visual appeal can be a byproduct, the text emphasizes communication, decision-making, and identifying misleading claims as the primary business objectives for using graphs, not just archiving."}, {"text": "To communicate results to stakeholders, facilitate decision-making, and identify misleading claims.", "isCorrect": true, "rationale": "The introductory paragraph explicitly states these as the purposes: 'To communicate results to managers, investors, or the public, businesses turn data into graphs and charts,' and 'to make decisions, report results, and identify misleading claims from competitors.'"}, {"text": "To reduce the overall volume of data collected daily, making it easier to store.", "isCorrect": false, "rationale": "Graphs summarize data but do not reduce the amount of raw data collected. Their purpose is presentation and interpretation, not data storage optimization."}, {"text": "To hide sensitive financial information by presenting it in a less direct format.", "isCorrect": false, "rationale": "The text stresses honesty and clear presentation for credibility, directly opposing any intent to hide information. Misleading graphs are identified as a problem to be avoided."}]}, {"question": "Danielle, the regional manager for Hartwell Sporting Goods, needs to compare monthly sales for her Northside and Southside stores for the last quarter. Which type of graph would be most appropriate for her immediate need to see month-by-month comparisons for both stores?", "options": [{"text": "A single line graph showing total quarterly sales for both stores combined.", "isCorrect": false, "rationale": "A single line graph of combined totals would not allow for a month-by-month comparison between the two individual stores, which is Danielle's specific need."}, {"text": "A pie chart illustrating each store's market share in the region.", "isCorrect": false, "rationale": "A pie chart is used for showing parts of a whole (like market share) at a single point in time, not for comparing performance over multiple time periods between two entities."}, {"text": "A double bar chart displaying sales for each store side-by-side for each month.", "isCorrect": true, "rationale": "The text explicitly uses the 'Comparing Store Performance' scenario to introduce the double bar chart, stating managers use them 'to compare stores, products, time periods, or departments at a glance,' making it ideal for month-by-month comparison between two stores."}, {"text": "A scatter plot correlating sales figures with marketing spending.", "isCorrect": false, "rationale": "A scatter plot is used to show the relationship between two different variables. While it could be relevant for a different analysis, it's not the best choice for direct month-by-month sales comparisons between two stores."}]}, {"question": "Hartwell Sporting Goods calculated that Northside outsold Southside by approximately 18.3% for the quarter, using Southside's total as the base ($224,000). What does this 18.3% figure primarily signify about Northside's performance relative to Southside's?", "options": [{"text": "Northside's sales were exactly $18,300 higher than Southside's.", "isCorrect": false, "rationale": "18.3% of $224,000 (Southside's sales) is approximately $41,000, not $18,300. The percentage represents a proportion, not a fixed dollar amount unless specified."}, {"text": "For every $100 in sales Southside generated, Northside generated an additional $18.30 beyond that amount.", "isCorrect": true, "rationale": "Using Southside as the base, Northside's sales were 18.3% *above* Southside's. This means that if Southside earned $100, Northside earned $100 + ($100 * 0.183) = $118.30, indicating an additional $18.30."}, {"text": "Northside contributed 18.3% to the combined total sales of both stores for the quarter.", "isCorrect": false, "rationale": "This describes a proportion of the total, not a percentage difference between two distinct entities. Northside's contribution to the combined total would be ($265,000 / $489,000) * 100%, which is about 54.2%."}, {"text": "Southside's sales were 18.3% lower than Northside's sales when Northside is used as the base.", "isCorrect": false, "rationale": "The calculation specified Southside as the base. If Northside were the base, the percentage difference would be different ($41,000 / $265,000 ≈ 15.5%). This option incorrectly switches the base for the percentage calculation."}]}, {"question": "The 'Did You Know' section states that color-coding and a clear legend are essential for readability in double bar charts. Beyond these, what is another crucial guideline mentioned in the text for creating honest and easily interpretable graphs?", "options": [{"text": "Using a wide range of vibrant, contrasting colors for aesthetic appeal.", "isCorrect": false, "rationale": "While colors are important, 'wide range' and 'vibrant' are not explicitly stated as crucial. Simplicity and clarity (like color-coding for distinction) are prioritized over mere aesthetic appeal."}, {"text": "Starting the vertical axis at $0$ to avoid exaggerating differences.", "isCorrect": true, "rationale": "The text specifically highlights that starting the vertical axis at 0% (or $0) is crucial to prevent exaggerating small differences, particularly in the 'Identifying Misleading Advertising' example and the final 'Note' section."}, {"text": "Placing the categories (e.g., months) along the vertical axis for better flow.", "isCorrect": false, "rationale": "The example for a double bar chart states Danielle would 'place the three months along the horizontal axis,' which is standard practice for time series or categories."}, {"text": "Including interactive features that allow users to sort and filter the data.", "isCorrect": false, "rationale": "Interactive features are not mentioned in the text as essential elements for readability or honesty in static graph presentations for reports."}]}, {"question": "PeakView Analytics estimated the total local coffee market at $2,500,000 per year. If 'Morning Brew' captures an additional 3% of the market, moving from 24% to 27% market share, and the total market remains unchanged, what would be its new annual revenue?", "options": [{"text": "$350,000.00", "isCorrect": false, "rationale": "This would be the revenue for 14% market share ($2,500,000 * 0.14 = $350,000)."}, {"text": "$425,000.00", "isCorrect": false, "rationale": "This would be the revenue for 17% market share ($2,500,000 * 0.17 = $425,000), not 27%."}, {"text": "$600,000.00", "isCorrect": false, "rationale": "This would be the revenue for 24% market share ($2,500,000 * 0.24 = $600,000), which is Morning Brew's original share, not the new one."}, {"text": "$675,000.00", "isCorrect": true, "rationale": "With a new market share of 27%, Morning Brew's new annual revenue would be 27% of $2,500,000, which is $2,500,000 * 0.27 = $675,000. This calculation is confirmed by the 'Try It' checkpoint."}]}, {"question": "QuickShip Logistics' advertisement showed an on-time delivery rate 'skyrocketing' with a bar graph whose vertical axis started at 90%. Why did this specific design choice make a 3 percentage point improvement (from 91% to 94%) appear greatly exaggerated?", "options": [{"text": "It used a 3D effect which inherently distorts visual perception of height.", "isCorrect": false, "rationale": "The text mentions 3D effects for pie charts causing distortion, but the example for QuickShip's bar graph specifically attributes the exaggeration to the truncated vertical axis, not 3D effects."}, {"text": "By compressing the visible range of the data, small absolute changes appeared as large relative changes in bar height.", "isCorrect": true, "rationale": "The solution section states, 'The problem: The vertical axis starts at 90% instead of 0%. This exaggerates small differences.' It explains that on a 90-95% scale, a 91% bar looks very short and a 94% bar looks nearly four times taller, visually distorting the small 3% difference."}, {"text": "The graph's horizontal axis was not consistently scaled, leading to uneven bar spacing.", "isCorrect": false, "rationale": "The issue described was with the vertical axis's starting point, not the consistency or scaling of the horizontal axis or bar spacing."}, {"text": "It omitted the raw numerical data, forcing viewers to rely solely on visual cues.", "isCorrect": false, "rationale": "While clear labels are important, the core issue described was the *distortion* caused by the axis, not the mere absence of raw data. The example states the data points were listed (91%, 92%, 93%, 94%)."}]}, {"question": "ReliableFreight, a competing company, wants to present QuickShip Logistics' on-time delivery data honestly. Which correction would effectively mitigate the misleading impression created by QuickShip's original graph (where the vertical axis started at 90%)?", "options": [{"text": "Convert the bar chart into a line graph to emphasize the trend rather than individual values.", "isCorrect": false, "rationale": "While a line graph could show trend, simply changing the graph type does not inherently correct a misleading axis. A line graph with a truncated axis would still be misleading."}, {"text": "Start the vertical axis at 0% or include a break symbol on the axis with a clear note explaining truncation.", "isCorrect": true, "rationale": "The text explicitly states these as the correct ways to resolve the issue: 'A corrected graph would either: Start the vertical axis at 0%, or Include a break symbol (//!) on the axis and a note explaining that the axis is truncated.'"}, {"text": "Remove the percentage labels from the bars to encourage viewers to focus on the overall shape.", "isCorrect": false, "rationale": "Removing labels would hinder clarity and transparency, making it harder for viewers to interpret the data accurately, which is contrary to honest presentation."}, {"text": "Add a third dimension to the bars to provide more visual context and depth.", "isCorrect": false, "rationale": "The text's final 'Note' advises 'avoid 3D effects' because they can themselves be misleading, as discussed in the 'Try It' checkpoint on pie charts."}]}, {"question": "According to the 'Did You Know' section about misleading graphs, why are they particularly effective at creating false impressions?", "options": [{"text": "They typically include complex mathematical formulas that are difficult for the average person to decipher.", "isCorrect": false, "rationale": "Misleading graphs often achieve their effect through visual distortion or simplification, not through complex mathematics. The problem lies in quick visual impressions."}, {"text": "People form impressions from graphs very quickly, often before they read any labels or numbers.", "isCorrect": true, "rationale": "The text states: 'Studies show that people form impressions from graphs in less than one second—often before they read any labels or numbers. This is why misleading graphs are so effective at creating false impressions.'"}, {"text": "They intentionally omit the underlying raw data, making verification impossible for the audience.", "isCorrect": false, "rationale": "While some misleading graphs might omit data, the effectiveness highlighted in the text is about the *speed* of impression formation, even if labels or numbers are present but ignored initially."}, {"text": "Most individuals lack the critical thinking skills required to analyze visual data accurately.", "isCorrect": false, "rationale": "The text does not attribute the effectiveness to a general lack of critical thinking but to a specific psychological phenomenon of rapid visual processing that bypasses detailed analysis."}]}, {"question": "A business's 3D pie chart makes a slice representing 20% of the market appear nearly as large as a slice representing 35%. What visual trick causes this distortion, and how should you accurately evaluate the chart?", "options": [{"text": "The slices are color-coded incorrectly, confusing the eye; you should cross-reference with a legend that explains the colors.", "isCorrect": false, "rationale": "Incorrect color-coding causes confusion, but it doesn't typically make a 20% slice appear similar in size to a 35% slice due to perspective."}, {"text": "The 3D perspective makes slices tilted towards the viewer appear larger; you should rely on the percentage labels, not the visual size.", "isCorrect": true, "rationale": "This is precisely the explanation provided in the 'Try It' checkpoint answer: 'The 3D perspective makes slices tilted toward the viewer look larger than they really are. Evaluate using the percent labels, not the visual size.'"}, {"text": "The chart creator used an incorrect formula for central angles, misrepresenting the proportions; you should recalculate them manually.", "isCorrect": false, "rationale": "While incorrect central angles would be an issue, the specific '3D perspective' is identified as the cause of this particular visual trick, assuming the percentages themselves are correct."}, {"text": "The chart is missing a key, making it impossible to distinguish which slice represents which percentage; you should request the missing key.", "isCorrect": false, "rationale": "A missing key would prevent identification, but it wouldn't cause a smaller labeled slice to *look* larger than a bigger labeled slice due to visual distortion."}]}, {"question": "Based on the concluding 'Note' section, which practice is *most crucial* for maintaining a business's credibility when creating graphs for reports or presentations?", "options": [{"text": "Utilizing advanced statistical software to generate highly detailed and complex visualizations.", "isCorrect": false, "rationale": "While software can create detailed visualizations, it doesn't inherently guarantee honest presentation. Complexity can sometimes even obscure clarity, which is counter to credibility."}, {"text": "Starting axes at zero, using consistent scales, avoiding 3D effects, and labeling everything clearly.", "isCorrect": true, "rationale": "The 'Note' explicitly states: 'When creating graphs for a business report or presentation, always start your axes at zero, use consistent scales, avoid 3D effects, and label everything clearly. Your credibility depends on presenting data honestly.' This option synthesizes these direct recommendations."}, {"text": "Presenting only the data that strongly supports the desired business narrative or outcome.", "isCorrect": false, "rationale": "This practice would be selective and manipulative, directly contradicting the principle of 'presenting data honestly,' which the text identifies as the basis of credibility."}, {"text": "Including a disclaimer on every graph stating that it is for illustrative purposes only and not legally binding.", "isCorrect": false, "rationale": "A disclaimer doesn't substitute for honest data presentation. Credibility comes from the inherent honesty and clarity of the graph itself, not from absolving responsibility through a disclaimer."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
