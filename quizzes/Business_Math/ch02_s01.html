    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Business_Math.html">&larr; Back to Business Math: Practical Applications</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Business Math: Practical Applications &mdash; Chapter 2, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "An extremely low-interest savings account advertises an annual rate of 0.15%. How would this rate be expressed as a decimal for calculations?", "options": [{"text": "0.15", "isCorrect": false, "rationale": "Converting 0.15% to a decimal requires dividing by 100, which moves the decimal point two places to the left. 0.15 would be the decimal equivalent of 15%."}, {"text": "0.015", "isCorrect": false, "rationale": "Converting 0.15% to a decimal requires dividing by 100, which moves the decimal point two places to the left. 0.015 would be the decimal equivalent of 1.5%."}, {"text": "0.0015", "isCorrect": true, "rationale": "To convert a percent to a decimal, you divide by 100, which is equivalent to moving the decimal point two places to the left. So, 0.15% becomes 0.0015."}, {"text": "1.5", "isCorrect": false, "rationale": "This value is incorrect. Moving the decimal point to the right or multiplying by 10 is the opposite of the correct conversion from percent to decimal."}]}, {"question": "A scientist notes that a specific chemical reaction has a yield factor of 0.007. What is this yield factor expressed as a percent?", "options": [{"text": "0.007%", "isCorrect": false, "rationale": "This is simply the decimal value with a percent sign added. To convert a decimal to a percent, you must multiply by 100."}, {"text": "0.07%", "isCorrect": false, "rationale": "This value is incorrect. Moving the decimal point one place to the right converts 0.007 to 0.07, but converting to a percent requires moving it two places to the right."}, {"text": "0.7%", "isCorrect": true, "rationale": "To convert a decimal to a percent, you multiply by 100, which is equivalent to moving the decimal point two places to the right. So, 0.007 becomes 0.7%."}, {"text": "7%", "isCorrect": false, "rationale": "This value is incorrect. Moving the decimal point three places to the right converts 0.007 to 7, which would represent 700% if it were 7."}]}, {"question": "In a recent election, a candidate received 3/4 of the total votes. What percentage of the votes did the candidate receive?", "options": [{"text": "34%", "isCorrect": false, "rationale": "This option incorrectly combines the numerator and denominator directly with a percent sign. The fraction must first be converted to a decimal then multiplied by 100."}, {"text": "7.5%", "isCorrect": false, "rationale": "This value is incorrect. 3/4 equals 0.75, and 0.75 converted to a percent is 75%, not 7.5%."}, {"text": "75%", "isCorrect": true, "rationale": "To convert a fraction to a percent, first divide the numerator by the denominator (3 ÷ 4 = 0.75). Then, multiply the decimal by 100 to get the percent (0.75 * 100 = 75%)."}, {"text": "0.75%", "isCorrect": false, "rationale": "This value is incorrect. 0.75 is the decimal equivalent, but to convert to a percent, it must be multiplied by 100, not just have a percent sign added."}]}, {"question": "A small business allocates 8% of its monthly budget for marketing. If the total monthly budget is $7,500, how much money is allocated for marketing?", "options": [{"text": "$60.00", "isCorrect": false, "rationale": "This result would be obtained by multiplying 8% by $750, not $7,500, or by incorrectly using 0.008 as the decimal equivalent of 8%."}, {"text": "$600.00", "isCorrect": true, "rationale": "To find the part, use the formula P = R * B. Convert the rate (R) from 8% to a decimal (0.08) and multiply it by the base (B) of $7,500. So, 0.08 * $7,500 = $600."}, {"text": "$937.50", "isCorrect": false, "rationale": "This result would be obtained by dividing the base by the rate ($7,500 / 0.08), which is used to find the base, not the part."}, {"text": "$7,492.00", "isCorrect": false, "rationale": "This option seems to be the budget minus a very small amount, not 8% of the budget. It doesn't follow the formula P=R*B."}]}, {"question": "A student answered 38 questions correctly on a test that had a total of 50 questions. What percent of the questions did the student answer correctly?", "options": [{"text": "38%", "isCorrect": false, "rationale": "This assumes the number of correct answers directly represents the percent, which is incorrect as the total number of questions is 50, not 100."}, {"text": "76%", "isCorrect": true, "rationale": "To find the rate (percent), use the formula R = P/B. Divide the part (P = 38 correct answers) by the base (B = 50 total questions): 38 ÷ 50 = 0.76. Then convert the decimal to a percent by multiplying by 100: 0.76 * 100 = 76%."}, {"text": "12%", "isCorrect": false, "rationale": "This result would be obtained by subtracting 38 from 50 (12) and then incorrectly assuming this is the percent."}, {"text": "131.6%", "isCorrect": false, "rationale": "This result would be obtained by dividing 50 by 38 (50/38 ≈ 1.316) and converting to a percent, which is an incorrect calculation for finding the percentage of correct answers."}]}, {"question": "During a charity drive, a team collected $2,400, which represents 16% of their total fundraising goal. What was the team's total fundraising goal?", "options": [{"text": "$384.00", "isCorrect": false, "rationale": "This result would be obtained by multiplying $2,400 by 0.16, which calculates the part when the base is known, not the base itself."}, {"text": "$15,000.00", "isCorrect": true, "rationale": "To find the base, use the formula B = P/R. Divide the part (P = $2,400) by the rate (R = 16% converted to a decimal, 0.16). So, $2,400 ÷ 0.16 = $15,000."}, {"text": "$24,000.00", "isCorrect": false, "rationale": "This is ten times the amount collected, and doesn't reflect the 16% given. It's likely a miscalculation."}, {"text": "$3,840.00", "isCorrect": false, "rationale": "This result would be obtained by multiplying $2,400 by 1.6 or a similar incorrect calculation, not by dividing by the decimal rate."}]}, {"question": "The number of subscriptions to a streaming service grew from 12 million to 15 million in the last quarter. What is the percent increase in subscriptions?", "options": [{"text": "3%", "isCorrect": false, "rationale": "This value represents the absolute increase (3 million) but does not express it as a percentage of the original value."}, {"text": "20%", "isCorrect": false, "rationale": "This result would be obtained by dividing the increase by the new value (3 million / 15 million = 0.2), which is a common mistake. Percent change must be calculated relative to the original value."}, {"text": "25%", "isCorrect": true, "rationale": "The percent change formula is (New Value - Old Value) / Old Value * 100%. So, (15 million - 12 million) / 12 million = 3 million / 12 million = 0.25. Converting to percent, 0.25 * 100% = 25%."}, {"text": "80%", "isCorrect": false, "rationale": "This result would be obtained by dividing the old value by the new value (12 million / 15 million = 0.8) or some other incorrect calculation, not the percent increase."}]}, {"question": "A tablet's battery life decreased from 10 hours to 8 hours after a software update. What is the approximate percent decrease in battery life?", "options": [{"text": "2%", "isCorrect": false, "rationale": "This value represents the absolute decrease (2 hours) but does not express it as a percentage of the original value."}, {"text": "20%", "isCorrect": true, "rationale": "The percent change formula is (New Value - Old Value) / Old Value * 100%. So, (8 hours - 10 hours) / 10 hours = -2 hours / 10 hours = -0.2. Converting to percent, -0.2 * 100% = -20%. The negative sign indicates a decrease."}, {"text": "25%", "isCorrect": false, "rationale": "This result would be obtained by dividing the decrease by the new value (2 hours / 8 hours = 0.25), which is a common mistake. Percent change must be calculated relative to the original value."}, {"text": "80%", "isCorrect": false, "rationale": "This result would be obtained by dividing the new value by the old value (8 hours / 10 hours = 0.8), which gives the percentage of the original value remaining, not the percent decrease."}]}, {"question": "A boutique sells a handbag for $200. During a promotion, it offers a 15% discount, and then a loyal customer receives an additional 10% discount on the sale price. What is the final price the loyal customer pays for the handbag?", "options": [{"text": "$140.00", "isCorrect": false, "rationale": "This result would be obtained if the two discounts were simply added (15% + 10% = 25%) and then applied to the original price ($200 * (1 - 0.25) = $150). The calculation for 140 is unclear, perhaps $200 - (15+10)*100 = 150 - 10 = 140. This is incorrect. Successive discounts are not simply additive."}, {"text": "$150.00", "isCorrect": false, "rationale": "This result would be obtained if the two discounts were simply added (15% + 10% = 25%) and then applied to the original price ($200 * (1 - 0.25) = $150). However, successive percent changes are not additive."}, {"text": "$153.00", "isCorrect": true, "rationale": "First, apply the 15% discount: $200 * (1 - 0.15) = $200 * 0.85 = $170. Then, apply the additional 10% discount to the sale price: $170 * (1 - 0.10) = $170 * 0.90 = $153.00."}, {"text": "$157.00", "isCorrect": false, "rationale": "This result is incorrect. It might arise from a miscalculation or an incorrect application of the second discount."}]}, {"question": "A stock's value increases by 20% in January, then decreases by 20% in February. Compared to its value at the beginning of January, what is the stock's value at the end of February?", "options": [{"text": "It is the same as its original value.", "isCorrect": false, "rationale": "This is a common misconception. Successive percent changes are not simply additive and do not cancel each other out when the base for the second change is different from the original."}, {"text": "It is 4% higher than its original value.", "isCorrect": false, "rationale": "This result is incorrect. The net effect of an increase and decrease of the same percentage is typically a net decrease."}, {"text": "It is 4% lower than its original value.", "isCorrect": true, "rationale": "Let the original value be 1. After a 20% increase, the value is 1 * (1 + 0.20) = 1.20. Then, a 20% decrease is applied to this new value: 1.20 * (1 - 0.20) = 1.20 * 0.80 = 0.96. The final value (0.96) is 96% of the original, meaning it is 4% lower than the original value (1 - 0.96 = 0.04)."}, {"text": "It is 20% lower than its original value.", "isCorrect": false, "rationale": "This result would only be true if the initial increase had been completely ignored or canceled, which is not the case for successive percent changes."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
