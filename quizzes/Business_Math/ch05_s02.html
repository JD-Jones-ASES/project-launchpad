<script>
var QUESTIONS = [{"question": "What is the primary purpose of payroll processing for a business with employees?", "options": [{"text": "To determine the company's annual profit margins.", "isCorrect": false, "rationale": "Determining annual profit margins is a function of overall financial accounting, not the specific purpose of payroll processing."}, {"text": "To calculate each worker's gross pay, withhold correct deductions, and issue net pay.", "isCorrect": true, "rationale": "The introductory paragraph explicitly states that payroll processing involves 'calculating each worker's gross pay, withholding the correct deductions, and issuing the correct net pay'."}, {"text": "To manage inventory and supply chain logistics.", "isCorrect": false, "rationale": "Inventory and supply chain management are operational aspects of a business and are unrelated to payroll processing."}, {"text": "To forecast future sales and market trends.", "isCorrect": false, "rationale": "Forecasting sales and market trends is a strategic planning activity, not a function of payroll processing."}], "id": "q01"}, {"question": "A production worker earns $22.00 per hour. Last week, their time card showed 48 hours worked. Overtime is paid at 1.5 times the regular rate for hours over 40 per week. What is their gross pay for the week?", "options": [{"text": "$968.00", "isCorrect": false, "rationale": "This calculation ($22.00 * 48 hours) does not account for the higher overtime rate for hours exceeding 40."}, {"text": "$1,100.00", "isCorrect": false, "rationale": "This calculation applies the regular rate to all 48 hours and then adds an incorrect overtime amount, or assumes regular rate for all overtime hours without the 1.5 multiplier."}, {"text": "$1,144.00", "isCorrect": true, "rationale": "Regular pay: 40 hours * $22.00/hour = $880.00. Overtime hours: 48 - 40 = 8 hours. Overtime rate: 1.5 * $22.00/hour = $33.00/hour. Overtime pay: 8 hours * $33.00/hour = $264.00. Total gross pay: $880.00 + $264.00 = $1,144.00."}, {"text": "$1,320.00", "isCorrect": false, "rationale": "This calculation is significantly higher and results from an incorrect application of the overtime rate or an error in calculation."}], "id": "q02"}, {"question": "The Fair Labor Standards Act (FLSA) mandates overtime at time-and-a-half after 40 hours per week. If a state, like California, also requires overtime after 8 hours in a single day, which rule typically takes precedence when calculating an employee's overtime pay?", "options": [{"text": "The FLSA rule always takes precedence over state laws.", "isCorrect": false, "rationale": "The 'Did You Know' section notes that states can have additional or stricter rules. Generally, federal law sets a baseline, but state laws can offer greater protections or benefits."}, {"text": "The employer can choose which rule to follow based on their preference.", "isCorrect": false, "rationale": "Employers are typically legally obligated to follow the rule that benefits the employee most or is stricter, not to choose based on preference."}, {"text": "The rule that results in greater pay for the employee generally applies.", "isCorrect": true, "rationale": "When federal and state laws conflict, employers must generally follow the law that provides the greater benefit or protection to the employee, which in this case means the rule that yields higher overtime pay."}, {"text": "Only the weekly overtime rule applies; daily overtime is never considered if a weekly rule exists.", "isCorrect": false, "rationale": "The text specifically mentions daily overtime rules in some states, indicating they are considered and can apply in addition to or instead of weekly rules, depending on which provides greater benefit."}], "id": "q03"}, {"question": "A sales representative is paid a graduated commission: 7% on the first $15,000 in monthly sales, and 9% on all sales above $15,000. If their total monthly sales were $25,000, what is their gross pay?", "options": [{"text": "$1,750.00", "isCorrect": false, "rationale": "This would be the result if the 7% rate were applied to the entire $25,000 in sales, ignoring the graduated commission structure."}, {"text": "$2,250.00", "isCorrect": false, "rationale": "This would be the result if the 9% rate were applied to the entire $25,000 in sales, ignoring the first tier."}, {"text": "$1,950.00", "isCorrect": true, "rationale": "Tier 1: $15,000 * 0.07 = $1,050.00. Tier 2: ($25,000 - $15,000) * 0.09 = $10,000 * 0.09 = $900.00. Total gross pay = $1,050.00 + $900.00 = $1,950.00."}, {"text": "$1,800.00", "isCorrect": false, "rationale": "This figure is likely a result of miscalculation in applying the tiered rates."}], "id": "q04"}, {"question": "John earns an annual salary of $60,000.00 and is paid semimonthly. What is his gross pay per pay period?", "options": [{"text": "$5,000.00", "isCorrect": false, "rationale": "This would be his monthly gross pay, but semimonthly means 24 pay periods per year, not 12."}, {"text": "$2,307.69", "isCorrect": false, "rationale": "This would be his biweekly gross pay ($60,000 / 26 periods), but he is paid semimonthly."}, {"text": "$2,500.00", "isCorrect": true, "rationale": "Semimonthly pay means there are 24 pay periods in a year. Gross pay per period = Annual salary / Number of pay periods = $60,000.00 / 24 = $2,500.00."}, {"text": "$1,153.85", "isCorrect": false, "rationale": "This would be his weekly gross pay ($60,000 / 52 weeks), but he is paid semimonthly."}], "id": "q05"}, {"question": "An employee's biweekly gross pay is $2,400.00. If FICA tax is 7.65% of gross pay, how much FICA will be withheld from their paycheck?", "options": [{"text": "$183.60", "isCorrect": true, "rationale": "FICA deduction = Gross pay * FICA rate = $2,400.00 * 0.0765 = $183.60."}, {"text": "$288.00", "isCorrect": false, "rationale": "This amount would be incorrect, potentially derived from using a federal income tax rate (12%) instead of the FICA rate."}, {"text": "$108.00", "isCorrect": false, "rationale": "This amount would be incorrect, potentially derived from using a state income tax rate (4.5%) instead of the FICA rate."}, {"text": "$148.80", "isCorrect": false, "rationale": "This amount is a result of an incorrect calculation or misapplication of the tax rate."}], "id": "q06"}, {"question": "An employee has a gross pay of $1,800.00 for a pay period. Their total deductions (FICA, taxes, health insurance, etc.) amount to $620.00. What is their net pay for that period?", "options": [{"text": "$2,420.00", "isCorrect": false, "rationale": "This would be the sum of gross pay and total deductions, not net pay."}, {"text": "$1,180.00", "isCorrect": true, "rationale": "Net pay is calculated as Gross pay - Total deductions. So, $1,800.00 - $620.00 = $1,180.00."}, {"text": "$620.00", "isCorrect": false, "rationale": "This is the amount of total deductions, not the net pay."}, {"text": "$1,800.00", "isCorrect": false, "rationale": "This is the gross pay, not the net pay after deductions."}], "id": "q07"}, {"question": "The 'Did You Know' section explains that the FICA tax (7.65%) has two parts: Social Security (6.2%) and Medicare (1.45%). What crucial detail does it also highlight regarding the *total* FICA contribution?", "options": [{"text": "The employer's matching 7.65% contribution, making the total FICA contribution 15.3%.", "isCorrect": true, "rationale": "The text explicitly states: 'Your employer pays a matching 7.65% on top of what is withheld from your check, so the total FICA contribution is actually 15.3%.'"}, {"text": "FICA is capped annually for both Social Security and Medicare.", "isCorrect": false, "rationale": "The text states Social Security has a cap, but Medicare applies to 'all income,' meaning it does not have a cap."}, {"text": "Only Social Security is withheld from an employee's check; Medicare is employer-funded.", "isCorrect": false, "rationale": "The text clearly states FICA (which includes both Social Security and Medicare) is withheld from the employee's check."}, {"text": "FICA rates are adjusted quarterly by the federal government.", "isCorrect": false, "rationale": "The text mentions the Social Security cap 'adjusts annually' but does not specify quarterly adjustments for the rates themselves."}], "id": "q08"}, {"question": "Referencing the 'Comparing Two Job Offers' scenario, if Job B offered an hourly rate of $20.00 (with an average of 5 hours of overtime per week at 1.5x regular rate) instead of $18.50, how would its annual gross pay compare to Job A's $41,600.00 annual salary?", "options": [{"text": "Job B's annual gross pay would be lower than Job A's.", "isCorrect": false, "rationale": "With the increased hourly rate, Job B's gross pay would be higher, not lower."}, {"text": "Job B's annual gross pay would be approximately $45,500.00, still lower than Job A.", "isCorrect": false, "rationale": "Calculating Job B's new annual gross: Weekly gross = (40 hrs * $20.00) + (5 hrs * 1.5 * $20.00) = $800 + $150 = $950. Annual gross = $950 * 52 weeks = $49,400. This is higher than Job A."}, {"text": "Job B's annual gross pay would be approximately $49,400.00, making it higher than Job A.", "isCorrect": true, "rationale": "With the new rate: Regular weekly pay = 40 hours * $20.00 = $800.00. Overtime rate = 1.5 * $20.00 = $30.00. Overtime pay = 5 hours * $30.00 = $150.00. Total weekly gross = $800.00 + $150.00 = $950.00. Annual gross = $950.00 * 52 weeks = $49,400.00. This is significantly higher than Job A's $41,600.00."}, {"text": "Both jobs would have identical annual gross pay, as they are both full-time positions.", "isCorrect": false, "rationale": "Hourly pay with overtime, even for a full-time position, will result in a different gross pay than a fixed annual salary, especially with varying hourly rates and overtime opportunities."}], "id": "q09"}, {"question": "When Aisha Williams compared Job A and Job B, what crucial non-financial factor did the text explicitly suggest she should also consider, beyond just the annual net pay?", "options": [{"text": "The company's stock performance and potential for future bonuses.", "isCorrect": false, "rationale": "While these can be considerations, the text did not explicitly mention them as factors for Aisha in this scenario."}, {"text": "Work-life balance, given Job B required more hours per week.", "isCorrect": true, "rationale": "The text states: 'Job B provides $1,326.53 more in annual take-home pay, but it requires working 45 hours per week (vs. a standard 40 for Job A). Aisha should also consider non-financial factors like work–life balance.'"}, {"text": "The distance of the daily commute and associated costs.", "isCorrect": false, "rationale": "The distance of the commute is a relevant factor but was not explicitly highlighted in the text's specific advice to Aisha for this comparison."}, {"text": "The brand reputation and prestige of each company.", "isCorrect": false, "rationale": "Brand reputation is a general consideration for job seekers but was not specifically mentioned in the text's conclusion for Aisha's job comparison."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
