    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "Which set of statistical measures would best help a business analyst understand both the 'typical' performance of a product and how consistently that performance is achieved across different markets?", "options": [{"text": "Only the mean and mode.", "isCorrect": false, "rationale": "While the mean and mode are measures of central tendency, they only address the 'typical' value. They do not provide information about how spread out or consistent the performance is, which is crucial for understanding consistency across markets."}, {"text": "Measures of central tendency (mean, median, mode) and measures of spread (range).", "isCorrect": true, "rationale": "Measures of central tendency (like mean or median) indicate the 'typical' performance, while measures of spread (like range) indicate how much the data varies or how consistently that performance is achieved. Both are necessary to answer the question posed."}, {"text": "Only frequency distributions and relative frequencies.", "isCorrect": false, "rationale": "Frequency distributions organize data and show how values are distributed, which can give some insight into spread and typical values, but they are not the direct summary measures of central tendency and spread themselves. They are a way to organize data, not the summary statistics requested."}, {"text": "Only the weighted average and cumulative frequency.", "isCorrect": false, "rationale": "The weighted average is a specific type of mean useful when values have different importance, and cumulative frequency is a component of a frequency distribution. Neither addresses both central tendency and spread comprehensively for the scenario described."}], "id": "q01"}, {"question": "A small online retailer recorded the number of orders received each day for five consecutive business days: 72, 85, 91, 68, 79. What is the mean number of orders per day?", "options": [{"text": "72 orders", "isCorrect": false, "rationale": "This is one of the data points, not the mean. The mean requires summing all values and dividing by the count."}, {"text": "79 orders", "isCorrect": true, "rationale": "To find the mean, sum the values (72 + 85 + 91 + 68 + 79 = 395) and divide by the number of values (5). So, 395 / 5 = 79 orders."}, {"text": "85 orders", "isCorrect": false, "rationale": "This is one of the data points, not the mean. It also happens to be close to the median in this ordered set, but not the arithmetic mean."}, {"text": "75 orders", "isCorrect": false, "rationale": "This value is incorrect. The sum of the values is 395, and divided by 5, the mean is 79, not 75."}], "id": "q02"}, {"question": "A startup company's annual employee salaries (in thousands of dollars) are: 50, 52, 48, 51, 200. Which statement accurately describes the mean for this dataset?", "options": [{"text": "The mean of 80.2 accurately reflects the typical salary of an employee at the startup.", "isCorrect": false, "rationale": "The mean of 80.2 is significantly inflated by the outlier (200), making it not representative of the typical salary, as four out of five salaries are near 50."}, {"text": "The mean is robust to outliers and therefore provides a fair average salary.", "isCorrect": false, "rationale": "The mean is explicitly stated in the text as being 'sensitive to outliers,' meaning it is significantly affected by extremely large or small values, making it not robust."}, {"text": "The extreme value of 200 pulls the mean significantly higher, making it an unrepresentative measure of central tendency for most employees.", "isCorrect": true, "rationale": "As per the 'caution' note, the mean is sensitive to outliers. The value of 200 (likely a CEO's salary) is an outlier that disproportionately increases the mean, making it not typical for the majority of the data."}, {"text": "The mean would be a better measure if the data were more spread out.", "isCorrect": false, "rationale": "The mean's appropriateness is not determined by the general spread but by the presence of outliers. If the data were more spread out but without extreme outliers, the mean could still be appropriate. The issue here is the single, extreme value."}], "id": "q03"}, {"question": "A market research firm collected data on customer age for a new product: 28, 32, 45, 51, 67, 39. What is the median age of these customers?", "options": [{"text": "45 years", "isCorrect": false, "rationale": "This would be the median if there were an odd number of values and 45 was the middle, or if it was one of the two middle values after sorting, but not the average needed for an even count."}, {"text": "42 years", "isCorrect": true, "rationale": "First, arrange the values in order: 28, 32, 39, 45, 51, 67. There are 6 values (an even number). The median is the average of the two middle values (3rd and 4th), which are 39 and 45. So, (39 + 45) / 2 = 84 / 2 = 42."}, {"text": "40.5 years", "isCorrect": false, "rationale": "This value is incorrect. It suggests a miscalculation in identifying or averaging the middle values."}, {"text": "39 years", "isCorrect": false, "rationale": "39 is one of the two middle values after ordering the data. However, for an even number of values, the median is the average of the two middle values, not just one of them."}], "id": "q04"}, {"question": "A small town's household incomes (in thousands of dollars) are: 40, 45, 50, 55, 60, 500. A local journalist wants to report the 'typical' household income. Which measure of central tendency should they use and why?", "options": [{"text": "The mean, because it is the most common measure of average and includes all income data.", "isCorrect": false, "rationale": "While the mean includes all data, in this case, the extremely high income of 500 (an outlier) would significantly inflate the mean, making it unrepresentative of the typical household income for most residents. The text explicitly states the median is preferred for skewed data like incomes."}, {"text": "The median, because it is less affected by the single extremely high income, providing a more representative 'typical' value.", "isCorrect": true, "rationale": "The median is resistant to outliers. With a very high outlier (500), the mean would be skewed upwards. The median would remain closer to the cluster of other incomes, providing a more accurate representation of the 'typical' household income in this skewed dataset."}, {"text": "The mode, because it shows the most frequent income, which is the most typical.", "isCorrect": false, "rationale": "In this dataset, there is no repeated income, so there is no mode. Even if there were a mode, it might not be representative if the data is heavily skewed or has multiple modes that don't capture the 'typical' sense well."}, {"text": "The range, as it shows how spread out the incomes are, indicating the typical income.", "isCorrect": false, "rationale": "The range is a measure of spread, not a measure of central tendency. It tells us the difference between the highest and lowest values, but not what the typical value is."}], "id": "q05"}, {"question": "A customer feedback survey asks users to rate a new feature on a scale of 1 to 5. The responses are: 4, 3, 5, 4, 2, 5, 4, 1, 3, 4. What is the mode of these responses?", "options": [{"text": "3", "isCorrect": false, "rationale": "The value 3 appears twice. While it is a mode, it is not the most frequent value in the dataset."}, {"text": "4", "isCorrect": true, "rationale": "The value 4 appears four times in the dataset (most frequently). The values 3 and 5 appear twice, and 1 and 2 appear once. Thus, 4 is the mode."}, {"text": "3, 4, and 5", "isCorrect": false, "rationale": "While 3, 4, and 5 are all present, only 4 is the most frequent. A dataset can have multiple modes only if those values appear with the same highest frequency."}, {"text": "There is no mode.", "isCorrect": false, "rationale": "There is a clear mode in this dataset, as the value 4 appears more frequently than any other value. 'No mode' occurs when all values appear with the same frequency."}], "id": "q06"}, {"question": "A business tracks the number of website visitors per hour for a specific period: 120, 150, 110, 180, 130. What is the range of visitors per hour, and what insight does this provide about the data's spread?", "options": [{"text": "Range = 180; indicates the highest number of visitors.", "isCorrect": false, "rationale": "The range is the difference between the maximum and minimum, not just the maximum value itself. While 180 is the maximum, it's not the range."}, {"text": "Range = 110; indicates the lowest number of visitors.", "isCorrect": false, "rationale": "The range is the difference between the maximum and minimum, not just the minimum value itself. While 110 is the minimum, it's not the range."}, {"text": "Range = 70; indicates the data is very clustered together.", "isCorrect": false, "rationale": "The range is indeed 180 - 110 = 70. However, a range of 70 for visitor numbers (110 to 180) suggests a moderate spread, not necessarily 'very clustered together,' especially without context of typical visitor counts."}, {"text": "Range = 70; indicates the difference between the highest and lowest number of visitors recorded.", "isCorrect": true, "rationale": "The range is calculated as Maximum - Minimum = 180 - 110 = 70. This value quantifies the total spread of the data, showing the difference between the extreme values in the dataset, which is its primary interpretation."}], "id": "q07"}, {"question": "A university is calculating a student's final grade for a course. The components and their weights are: Midterm Exam (weight 3) = 85%, Homework (weight 2) = 95%, Final Exam (weight 5) = 70%. What is the student's weighted average grade?", "options": [{"text": "83.33%", "isCorrect": false, "rationale": "This would be the simple average of the three scores (85+95+70)/3 = 250/3 = 83.33, which ignores the weights."}, {"text": "80.5%", "isCorrect": false, "rationale": "This value is incorrect. It suggests a miscalculation in applying the weights or summing the weighted scores."}, {"text": "79.5%", "isCorrect": true, "rationale": "The weighted average is calculated as (Sum of (value * weight)) / (Sum of weights). So, ((85 * 3) + (95 * 2) + (70 * 5)) / (3 + 2 + 5) = (255 + 190 + 350) / 10 = 795 / 10 = 79.5%."}, {"text": "75%", "isCorrect": false, "rationale": "This value is incorrect. It might result from an incorrect weighting or calculation error, such as focusing too much on the lowest weighted score."}], "id": "q08"}, {"question": "A quality control manager measures the defects per batch for 30 batches. The minimum number of defects was 3, and the maximum was 62. If the manager wants to create a frequency distribution with 5 classes, what is the minimum class width that should be used?", "options": [{"text": "10 defects", "isCorrect": false, "rationale": "Calculating (62-3)/5 = 59/5 = 11.8. Rounding down or to 10 would not adequately cover the entire range across 5 classes, potentially leaving out the highest values."}, {"text": "11 defects", "isCorrect": false, "rationale": "While 11.8 is approximately 11, the rule for class width is to round *up* to the next convenient whole number to ensure all data points are covered and that there are indeed 5 classes that span the entire range."}, {"text": "12 defects", "isCorrect": true, "rationale": "The range is Maximum - Minimum = 62 - 3 = 59. To find the approximate class width, divide the range by the desired number of classes: 59 / 5 = 11.8. Since the class width must be an integer and needs to encompass all values, we must round up to the next whole number, which is 12."}, {"text": "13 defects", "isCorrect": false, "rationale": "While 13 would certainly cover the range, it is not the *minimum* class width needed. 12 is sufficient, and choosing 13 would result in wider classes than strictly necessary or potentially fewer than 5 classes if the lower limit started at min and rounded up was consistently applied. The question asks for the minimum class width to ensure 5 classes are created and the range is covered."}], "id": "q09"}, {"question": "A newly opened restaurant recorded daily customer counts and organized them into a frequency distribution. One class is '50-59 customers', and it has a relative frequency of 0.15. What does this relative frequency indicate to the restaurant owner?", "options": [{"text": "On 15 separate days, the customer count was between 50 and 59.", "isCorrect": false, "rationale": "This describes the absolute frequency (the raw count), not the relative frequency. The relative frequency is a proportion or percentage."}, {"text": "The average daily customer count for all recorded days was 15.", "isCorrect": false, "rationale": "The relative frequency for a single class does not indicate the overall average customer count for all days. It is specific to the proportion of days falling into that class."}, {"text": "15% of the total recorded days had customer counts between 50 and 59.", "isCorrect": true, "rationale": "Relative frequency is defined as 'Class frequency / Total frequency', meaning it represents the fraction or percentage of data values (in this case, days) that fall into that specific class. So, 0.15 translates to 15% of the total days."}, {"text": "The customer count of 50 was the most frequent among all daily counts.", "isCorrect": false, "rationale": "This statement describes the mode, or a potential mode within that class, not what the relative frequency of the entire class interval indicates. The relative frequency applies to the entire interval, not a single value within it."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
