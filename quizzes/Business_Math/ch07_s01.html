<script>
var QUESTIONS = [{"question": "What characterizes linear decrease (straight-line depreciation)?", "options": [{"text": "The asset loses a fixed percentage of its current value each period.", "isCorrect": false, "rationale": "This describes exponential decrease, where a fixed percent of the current value is lost, not a fixed dollar amount."}, {"text": "The dollar amount of value loss is constant in every equal time period.", "isCorrect": true, "rationale": "Linear decrease, also known as straight-line depreciation, is defined as a quantity losing the same dollar amount in every equal time period."}, {"text": "The value decreases rapidly at first, then slows down.", "isCorrect": false, "rationale": "While the graph of exponential decrease shows a slowing rate of value loss, this is not the fundamental definition of linear decrease."}, {"text": "The value fluctuates based on market demand.", "isCorrect": false, "rationale": "Market demand influences actual value but is not part of the mathematical models for linear or exponential depreciation discussed in this section."}]}, {"question": "A newly purchased business machine is valued at $15,000.00. It is expected to lose $1,200.00 in value each year. What will its value be after 3 years?", "options": [{"text": "$11,400.00", "isCorrect": true, "rationale": "Using the linear decrease formula V(t) = V0 - dt, with V0 = $15,000, d = $1,200, and t = 3 years: V(3) = $15,000 - ($1,200 × 3) = $15,000 - $3,600 = $11,400.00."}, {"text": "$13,800.00", "isCorrect": false, "rationale": "This would be the value after 1 year ($15,000 - $1,200)."}, {"text": "$10,200.00", "isCorrect": false, "rationale": "This value is derived from subtracting depreciation for 4 years, not 3."}, {"text": "$12,600.00", "isCorrect": false, "rationale": "This value is derived from subtracting depreciation for 2 years, not 3."}]}, {"question": "A company buys equipment for $40,000.00. After 8 years, it is expected to have a salvage value of $8,000.00. Assuming linear depreciation, what is the annual depreciation amount?", "options": [{"text": "$4,000.00", "isCorrect": true, "rationale": "The formula for annual depreciation is d = (V0 - Vend) / n. Substituting the values, d = ($40,000 - $8,000) / 8 = $32,000 / 8 = $4,000.00."}, {"text": "$5,000.00", "isCorrect": false, "rationale": "This calculation only divides the original cost by the number of years, ignoring the salvage value."}, {"text": "$6,000.00", "isCorrect": false, "rationale": "This calculation would imply a combined initial and salvage value divided by the number of years, which is incorrect for depreciation."}, {"text": "$3,200.00", "isCorrect": false, "rationale": "This calculation incorrectly divides the total depreciable amount by a different number of years or uses an incorrect divisor."}]}, {"question": "How does exponential decrease differ from linear decrease in terms of value loss?", "options": [{"text": "The dollar amount of value loss is constant each period.", "isCorrect": false, "rationale": "A constant dollar amount of value loss characterizes linear decrease, not exponential decrease."}, {"text": "The percentage of value loss is constant each period, resulting in smaller dollar amounts of decrease over time.", "isCorrect": true, "rationale": "Exponential decrease (or declining-balance depreciation) is defined by an asset losing a fixed percentage of its current value each period, which causes the dollar amount of the decrease to get smaller over time."}, {"text": "The value loss is unpredictable and fluctuates.", "isCorrect": false, "rationale": "The models presented assume a predictable rate of decrease, either linear or exponential, not unpredictable fluctuations."}, {"text": "The asset gains value initially before depreciating.", "isCorrect": false, "rationale": "Depreciation always describes a loss in value over time, not an initial gain."}]}, {"question": "An office laptop system initially costs $2,500.00 and depreciates at a rate of 10% per year. What is its value after 2 years?", "options": [{"text": "$2,250.00", "isCorrect": false, "rationale": "This is the value after 1 year: $2,500 × (1 - 0.10)^1 = $2,500 × 0.90 = $2,250."}, {"text": "$2,025.00", "isCorrect": true, "rationale": "Using the exponential decrease formula V(t) = V0 (1 - r)^t, with V0 = $2,500, r = 0.10, and t = 2 years: V(2) = $2,500 × (1 - 0.10)^2 = $2,500 × (0.90)^2 = $2,500 × 0.81 = $2,025.00."}, {"text": "$2,000.00", "isCorrect": false, "rationale": "This implies a linear depreciation of $2,500 - (2 × $250) = $2,000, which is not exponential."}, {"text": "$1,822.50", "isCorrect": false, "rationale": "This would be the value after 3 years ($2,025 × 0.90 = $1,822.50)."}]}, {"question": "A company is comparing two depreciation methods for a new asset: Method A loses $5,000.00 per year, and Method B loses 20% of its remaining value per year. Which statement accurately describes the difference?", "options": [{"text": "Method A is exponential, and Method B is linear.", "isCorrect": false, "rationale": "Method A, losing a fixed dollar amount ($5,000 per year), is linear. Method B, losing a fixed percentage (20% of remaining value), is exponential. The statement incorrectly reverses these."}, {"text": "Method A will always result in a higher book value than Method B over the asset's useful life.", "isCorrect": false, "rationale": "The comparison example in the text shows that after the initial period, the exponential method often results in a higher book value because the dollar amount of depreciation decreases over time, while linear depreciation maintains a constant dollar amount."}, {"text": "Method B will have a smaller dollar amount of depreciation in later years compared to its initial years.", "isCorrect": true, "rationale": "Exponential decrease is characterized by losing a fixed percent of its current value each period. As the current value decreases, the fixed percentage of that value results in a smaller dollar amount of decrease over time."}, {"text": "Both methods represent the same pattern of value loss, just with different numbers.", "isCorrect": false, "rationale": "The text explicitly states, “‘Loses $2,000 per year’ and ‘Loses 20% per year’ are very different patterns.”"}]}, {"question": "An asset costs $10,000.00. If it depreciates linearly by $1,000.00 per year, what is its value after 4 years? If it depreciates exponentially by 10% per year, what is its value after 4 years? Compare the results.", "options": [{"text": "Linear: $6,000.00; Exponential: $6,561.00. The exponential method results in a lower value.", "isCorrect": false, "rationale": "The exponential calculation is correct, but the comparison is reversed; exponential results in a higher value."}, {"text": "Linear: $6,000.00; Exponential: $6,561.00. The exponential method results in a higher value.", "isCorrect": true, "rationale": "For linear depreciation, V(4) = $10,000 - ($1,000 × 4) = $10,000 - $4,000 = $6,000. For exponential depreciation, V(4) = $10,000 × (1 - 0.10)^4 = $10,000 × (0.90)^4 = $10,000 × 0.6561 = $6,561. Thus, the exponential method results in a higher value after 4 years."}, {"text": "Linear: $5,000.00; Exponential: $6,000.00. The linear method results in a higher value.", "isCorrect": false, "rationale": "The linear calculation is incorrect, and the comparison is reversed."}, {"text": "Linear: $6,000.00; Exponential: $6,000.00. Both methods result in the same value.", "isCorrect": false, "rationale": "The calculations show that the values are different, especially over several periods, which is a key distinction between the two methods."}]}, {"question": "What is the primary purpose of MACRS depreciation as described in the text?", "options": [{"text": "To provide a standardized method for calculating exponential depreciation for all assets.", "isCorrect": false, "rationale": "MACRS is not solely for exponential depreciation; it uses a specific table of percentages of the original cost, which is distinct from the declining-balance exponential model."}, {"text": "To allow businesses to choose between linear and exponential depreciation based on asset type.", "isCorrect": false, "rationale": "MACRS is the depreciation method required by the IRS for most business property, meaning businesses do not generally choose between it and other methods for tax purposes once MACRS applies."}, {"text": "To specify depreciation schedules for tax purposes, using predetermined percentages of the original cost.", "isCorrect": true, "rationale": "The text defines MACRS as the depreciation method required by the IRS for tax purposes, grouping assets into classes and providing tables of percentages of the original cost for each year's depreciation."}, {"text": "To ensure that assets always retain a specific salvage value at the end of their useful life.", "isCorrect": false, "rationale": "While depreciation affects book value, the primary purpose of MACRS is for tax reporting of depreciation, not to guarantee a specific salvage value."}]}, {"question": "A company purchases '7-year property' for $25,000.00. Using the provided MACRS table, what is the depreciation for Year 3?", "options": [{"text": "$5,000.00", "isCorrect": false, "rationale": "This would be the depreciation for Year 1 of a 5-year property ($25,000 × 0.2000 = $5,000), or an incorrect linear calculation."}, {"text": "$4,372.50", "isCorrect": true, "rationale": "For '7-year property,' the MACRS table indicates a 17.49% depreciation rate for Year 3. Therefore, $25,000 × 0.1749 = $4,372.50."}, {"text": "$3,050.00", "isCorrect": false, "rationale": "This percentage corresponds to 12.20% which is not the Year 3 rate for 7-year property. (14.29% is Y1, 24.49% is Y2 for 7-yr property)"}, {"text": "$3,747.50", "isCorrect": false, "rationale": "This value does not correspond to the MACRS percentage for Year 3 of 7-year property or any other directly applicable percentage in the table for $25,000."}]}, {"question": "A machine classified as 5-year MACRS property costs $12,000.00. What is its book value at the end of Year 2?", "options": [{"text": "$8,160.00", "isCorrect": false, "rationale": "This calculation only subtracts the Year 2 depreciation from the original cost ($12,000 - $3,840 = $8,160), ignoring Year 1 depreciation."}, {"text": "$5,760.00", "isCorrect": true, "rationale": "According to the MACRS table for 5-year property, Year 1 depreciation is $12,000 × 0.2000 = $2,400.00. Year 2 depreciation is $12,000 × 0.3200 = $3,840.00. Total depreciation through Year 2 is $2,400 + $3,840 = $6,240.00. The book value at the end of Year 2 is the original cost minus total depreciation: $12,000 - $6,240 = $5,760.00."}, {"text": "$9,600.00", "isCorrect": false, "rationale": "This calculation only subtracts the Year 1 depreciation from the original cost ($12,000 - $2,400 = $9,600), ignoring Year 2 depreciation."}, {"text": "$4,080.00", "isCorrect": false, "rationale": "This value is incorrect, likely resulting from an error in calculating total depreciation or book value. For example, the book value at the end of Year 3 would be $12,000 - ($2,400 + $3,840 + $2,304) = $3,456.00, which is also not this value."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
