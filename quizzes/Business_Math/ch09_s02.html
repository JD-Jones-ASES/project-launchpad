<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Math: Practical Applications &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Business_Math.html">&larr; Back to Business Math: Practical Applications</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Business Math: Practical Applications &mdash; Chapter 9, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "When a manager reviews 'average daily sales' to understand business performance, which statistical concept is primarily being utilized, even if not explicitly named?", "options": [{"text": "Weighted average", "isCorrect": false, "rationale": "Weighted averages are used when different data points have varying levels of importance, which is not the primary function when simply looking at 'average daily sales'."}, {"text": "Measures of central tendency (e.g., mean)", "isCorrect": true, "rationale": "Calculating average daily sales directly uses the concept of the mean, a measure of central tendency, to find a typical value for sales."}, {"text": "Frequency distribution", "isCorrect": false, "rationale": "Frequency distributions categorize data into ranges to show how often values occur, which is a different analysis than simply finding an 'average'."}, {"text": "Range analysis", "isCorrect": false, "rationale": "Range analysis focuses on the spread between the highest and lowest values, not the 'average' or typical value itself."}]}, {"question": "A small online retailer tracks the number of daily website visitors for a week: 120, 150, 130, 180, 140, 160, 130. What is the mean number of visitors for the week?", "options": [{"text": "130", "isCorrect": false, "rationale": "130 is the mode (most frequent value) and one of the lower values, not the mean."}, {"text": "140", "isCorrect": false, "rationale": "140 is one of the data points and not the calculated mean."}, {"text": "145.71", "isCorrect": true, "rationale": "To find the mean, sum all values (120 + 150 + 130 + 180 + 140 + 160 + 130 = 1070) and divide by the count (7). 1070 / 7 ≈ 145.71."}, {"text": "150", "isCorrect": false, "rationale": "150 is one of the data points and not the calculated mean."}]}, {"question": "In the Crystal Springs Bottling plant example, Kevin found two bottles out of 10 (20%) were outside the acceptable fill range (15.8 oz to 16.2 oz). What is the most appropriate immediate action Kevin should consider based on this statistical finding?", "options": [{"text": "Dismiss the findings as a small sample size and take no action.", "isCorrect": false, "rationale": "A 20% out-of-spec rate, even in a small sample, indicates a significant issue that should not be ignored. It's enough to warrant an investigation."}, {"text": "Re-run the test with a much larger sample to confirm the issue.", "isCorrect": false, "rationale": "While a larger sample might be useful later, the immediate concern is addressing a potential production problem. Waiting to confirm could lead to more wasted product."}, {"text": "Adjust the acceptable range to include the out-of-spec bottles.", "isCorrect": false, "rationale": "Adjusting the specifications to accommodate faulty products undermines quality control and customer expectations, rather than solving the root problem."}, {"text": "Investigate the filling machine for potential adjustments.", "isCorrect": true, "rationale": "The text explicitly states, 'Kevin should investigate whether the filling machine needs adjustment.' A significant percentage of out-of-spec products points to a machine calibration issue."}]}, {"question": "A company evaluates a project's success based on three criteria: On-time Completion (weight 50%, score 85), Budget Adherence (weight 30%, score 90), and Stakeholder Satisfaction (weight 20%, score 75). What is the project's weighted success score?", "options": [{"text": "83.33", "isCorrect": false, "rationale": "This would be the simple average if all scores were equally weighted, (85+90+75)/3 = 250/3 = 83.33."}, {"text": "84.5", "isCorrect": true, "rationale": "The weighted score is calculated as (0.50 * 85) + (0.30 * 90) + (0.20 * 75) = 42.5 + 27 + 15 = 84.5."}, {"text": "87.0", "isCorrect": false, "rationale": "This calculation is incorrect and does not reflect the given weights."}, {"text": "90.0", "isCorrect": false, "rationale": "90.0 is the highest score for a single criterion, not the weighted average of all criteria."}]}, {"question": "Why do companies like Meridian Insurance use a weighted scoring system for employee performance reviews instead of a simple average?", "options": [{"text": "To make calculations simpler and faster for HR departments.", "isCorrect": false, "rationale": "Weighted averages are generally more complex to calculate than simple averages, so simplicity is not the reason."}, {"text": "To ensure that all evaluation criteria are given equal importance in the final score.", "isCorrect": false, "rationale": "The purpose of weighting is the opposite: to give *different* levels of importance to criteria, not equal."}, {"text": "To reflect that different criteria have varying levels of importance to the company's goals.", "isCorrect": true, "rationale": "As stated in the 'Did You Know' section, weighted scoring systems 'ensure that the most important factors have the greatest influence on the final score'."}, {"text": "To avoid having to normalize scores from different categories.", "isCorrect": false, "rationale": "Weighted averages don't inherently avoid score normalization; they apply importance after scores are set."}]}, {"question": "A startup has 7 employees with the following monthly salaries (in USD): 2500, 2800, 3000, 3200, 3500, 4000, 15000. What is the median monthly salary?", "options": [{"text": "3000", "isCorrect": false, "rationale": "3000 is not the middle value when the data is sorted; the data is already sorted."}, {"text": "3200", "isCorrect": true, "rationale": "With 7 data points already in ascending order, the median is the (n+1)/2 = (7+1)/2 = 4th value, which is 3200."}, {"text": "3500", "isCorrect": false, "rationale": "3500 is the 5th value, not the middle (4th) value for 7 data points."}, {"text": "4857.14", "isCorrect": false, "rationale": "4857.14 is the mean salary ((2500+2800+3000+3200+3500+4000+15000)/7), not the median."}]}, {"question": "Referring to the Horizon Marketing Group's salary data (with the president's high salary), why is the median considered a better representation of a 'typical' salary than the mean in this scenario?", "options": [{"text": "The mean is easier to calculate, so the median provides a more complex and accurate perspective.", "isCorrect": false, "rationale": "The mean is generally easier to calculate, but its complexity is not why the median is better in this case. The median's value is its resistance to distortion."}, {"text": "The median is less affected by extreme values or outliers, providing a value closer to what most employees earn.", "isCorrect": true, "rationale": "As explained in the text, the mean is 'pulled up' by the president's high salary, making it unrepresentative. The median, being the middle value, is robust to such outliers."}, {"text": "The mean provides the exact middle value of the data, while the median is just an approximation.", "isCorrect": false, "rationale": "This statement is incorrect. The median provides the exact middle value (or average of two middle values), while the mean is the average of all values, which can be skewed."}, {"text": "The median always represents the highest-earning individual's salary, reflecting company success.", "isCorrect": false, "rationale": "The median represents the middle value in a sorted dataset, not necessarily the highest earner's salary."}]}, {"question": "A health clinic records the ages of 50 patients, with the youngest being 18 and the oldest being 82. If they want to create a frequency distribution with 7 classes, what is the appropriate class width?", "options": [{"text": "9", "isCorrect": false, "rationale": "A class width of 9 would result in 64/9 = 7.11, which when rounded up to 8 classes would be used. However, we need exactly 7 classes."}, {"text": "10", "isCorrect": true, "rationale": "First, find the range: 82 - 18 = 64. Then divide the range by the number of classes: 64 / 7 ≈ 9.14. Always round up to the next convenient whole number, which is 10, to ensure all data points are covered."}, {"text": "11", "isCorrect": false, "rationale": "While 11 would also cover the range, 10 is the smallest 'rounded up' whole number that ensures all data is covered, following the example's rounding method."}, {"text": "12", "isCorrect": false, "rationale": "A class width of 12 is larger than necessary and would result in fewer than 7 classes (64/12 = 5.33, so 6 classes)."}]}, {"question": "Based on Brookside Cafe's daily sales frequency distribution table provided in the text, how many business days (out of 25) had sales less than $750?", "options": [{"text": "8 days", "isCorrect": false, "rationale": "8 days is the frequency for the $700-$749 class only, not the total number of days with sales less than $750."}, {"text": "11 days", "isCorrect": false, "rationale": "11 days represents the number of days with sales of $750 or more (6+5 from the checkpoint), not less than $750."}, {"text": "13 days", "isCorrect": true, "rationale": "To find the number of days with sales less than $750, sum the frequencies for the classes $600–$649 (1 day), $650–$699 (4 days), and $700–$749 (8 days). This totals 1 + 4 + 8 = 13 days. (Note: The interpretive text in the example states 14 days, but the table's explicit cumulative frequency for the '$700-$749' class is 13.)"}, {"text": "14 days", "isCorrect": false, "rationale": "While the interpretation text mentions '14 of 25 days (56%) had sales below $750', this contradicts the explicit cumulative frequency of 13 shown in the table for sales up to $749. Based on the table's frequencies, 13 is the correct sum."}]}, {"question": "If a retail store uses frequency distributions to identify that the highest frequency of sales occurs in the $1500-$1999 range specifically on Fridays and Saturdays, what is the most logical business decision they might make based on this data?", "options": [{"text": "Reduce inventory for the upcoming weekend.", "isCorrect": false, "rationale": "Identifying peak sales days suggests higher demand, so reducing inventory would likely lead to lost sales."}, {"text": "Schedule fewer employees on Fridays and Saturdays.", "isCorrect": false, "rationale": "Higher sales frequency indicates a need for more staff to handle customer traffic and transactions efficiently, not fewer."}, {"text": "Plan marketing promotions for mid-week days.", "isCorrect": false, "rationale": "While promoting mid-week might be a strategy to balance sales, the most direct implication of high weekend sales is to capitalize on that existing demand."}, {"text": "Increase staffing levels and ensure adequate inventory for weekends.", "isCorrect": true, "rationale": "The 'Did You Know' section states that retailers use this data to plan 'staffing decisions, inventory orders, and marketing promotions.' High sales frequency on specific days logically leads to increased staffing and inventory to meet demand."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
