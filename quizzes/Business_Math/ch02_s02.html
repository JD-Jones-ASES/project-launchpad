    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Business_Math.html">&larr; Back to Business Math: Practical Applications</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Business Math: Practical Applications &mdash; Chapter 2, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Sarah buys a new tablet for $325.00. If the sales tax rate is 8%, what is the total amount Sarah pays?", "options": [{"text": "$26.00", "isCorrect": false, "rationale": "This is only the sales tax amount, not the total price."}, {"text": "$351.00", "isCorrect": true, "rationale": "The sales tax is $325.00 * 0.08 = $26.00. The total amount is the price plus the tax: $325.00 + $26.00 = $351.00. Alternatively, $325.00 * (1 + 0.08) = $325.00 * 1.08 = $351.00."}, {"text": "$333.00", "isCorrect": false, "rationale": "This calculation seems to add 8 dollars directly instead of 8 percent."}, {"text": "$300.00", "isCorrect": false, "rationale": "This amount is less than the original price, which would happen if it were a discount, not a tax."}], "id": "q01"}, {"question": "A business team has lunch, and the pre-tax bill is $95.00. Sales tax is 7%, and they want to leave a 15% tip on the pre-tax amount. What is the total amount the team pays?", "options": [{"text": "$115.90", "isCorrect": true, "rationale": "First, calculate the sales tax: $95.00 * 0.07 = $6.65. Next, calculate the tip (on the pre-tax amount): $95.00 * 0.15 = $14.25. Finally, add all components: $95.00 (bill) + $6.65 (tax) + $14.25 (tip) = $115.90."}, {"text": "$108.30", "isCorrect": false, "rationale": "This calculation likely only added the tip or tax, but not both, or applied the tip/tax incorrectly."}, {"text": "$116.85", "isCorrect": false, "rationale": "This result might occur if the tip were calculated on the post-tax amount ($95.00 + $6.65 = $101.65), then $101.65 * 0.15 = $15.25 (rounded) + $101.65 = $116.90. However, the problem specifies tip on pre-tax amount."}, {"text": "$101.65", "isCorrect": false, "rationale": "This is the bill plus only the sales tax, without including the tip."}], "id": "q02"}, {"question": "A real estate agent works on a straight commission basis, earning 5% on all sales. If she sells a property for $65,000.00, how much commission does she earn?", "options": [{"text": "$3,250.00", "isCorrect": true, "rationale": "The commission is calculated by multiplying the sales amount by the commission rate: $65,000.00 * 0.05 = $3,250.00."}, {"text": "$325.00", "isCorrect": false, "rationale": "This calculation error results from using 0.005 (0.5%) instead of 0.05 (5%)."}, {"text": "$6,500.00", "isCorrect": false, "rationale": "This would be a 10% commission rate, not 5%."}, {"text": "$5,000.00", "isCorrect": false, "rationale": "This calculation does not correctly apply the 5% commission rate to the sales amount."}], "id": "q03"}, {"question": "David earns a monthly base salary of $2,000.00 plus a 6% commission on all sales. In a particular month, his total sales were $25,000.00. What is David's total pay for that month?", "options": [{"text": "$3,200.00", "isCorrect": false, "rationale": "This incorrect calculation may have only added a portion of the commission or made a mathematical error."}, {"text": "$3,500.00", "isCorrect": true, "rationale": "First, calculate the commission: $25,000.00 * 0.06 = $1,500.00. Then, add this commission to the base salary: $2,000.00 + $1,500.00 = $3,500.00."}, {"text": "$2,150.00", "isCorrect": false, "rationale": "This calculation might be adding a fixed $150 to the base salary, which is incorrect for a 6% commission on $25,000."}, {"text": "$2,000.00", "isCorrect": false, "rationale": "This is only his base salary, not including the commission earned from sales."}], "id": "q04"}, {"question": "A small business had revenue of $100,000.00 last year. This year, their revenue increased to $125,000.00. What is the percent increase in revenue year-over-year?", "options": [{"text": "20%", "isCorrect": false, "rationale": "This would be the result if the increase was divided by the current year's revenue ($25,000 / $125,000 = 0.20), but percent change is calculated relative to the original amount."}, {"text": "25%", "isCorrect": true, "rationale": "The increase in revenue is $125,000.00 - $100,000.00 = $25,000.00. The percent increase is ($25,000.00 / $100,000.00) * 100% = 25%."}, {"text": "12.5%", "isCorrect": false, "rationale": "This percentage is not derived from the correct calculation for year-over-year growth."}, {"text": "50%", "isCorrect": false, "rationale": "This percentage is significantly higher than the actual increase."}], "id": "q05"}, {"question": "A jacket is originally priced at $150.00. It is on sale for 25% off, and a store loyalty member gets an additional 10% off the sale price. What is the final price of the jacket before tax?", "options": [{"text": "$101.25", "isCorrect": true, "rationale": "First, apply the 25% sale discount: $150.00 * (1 - 0.25) = $150.00 * 0.75 = $112.50. Then, apply the additional 10% discount to the sale price: $112.50 * (1 - 0.10) = $112.50 * 0.90 = $101.25."}, {"text": "$97.50", "isCorrect": false, "rationale": "This would be the result if the discounts were simply added (25% + 10% = 35% off), then $150.00 * (1 - 0.35) = $150.00 * 0.65 = $97.50. However, successive discounts are applied to the reduced price."}, {"text": "$112.50", "isCorrect": false, "rationale": "This is the price after only the first discount (25% off) has been applied."}, {"text": "$105.00", "isCorrect": false, "rationale": "This calculation does not accurately reflect the two successive discounts."}], "id": "q06"}, {"question": "When a store offers successive discounts (e.g., 20% off, then an additional 10% off the sale price), why is the combined discount NOT simply the sum of the individual percentages (30% off)?", "options": [{"text": "The second discount is always larger than the first, distorting the sum.", "isCorrect": false, "rationale": "The relative size of the discounts is irrelevant; the principle remains the same regardless of which discount is larger."}, {"text": "The second discount is applied to the already-reduced price, not the original price.", "isCorrect": true, "rationale": "Successive discounts mean each subsequent discount is calculated on the price remaining after the previous discount has been applied, not on the original full price. This results in a smaller total discount than if the percentages were simply added."}, {"text": "Sales tax is factored in after the first discount but before the second.", "isCorrect": false, "rationale": "Sales tax is typically applied after all discounts, and its inclusion does not explain why the discount percentages themselves are not additive."}, {"text": "This method is used only for employee discounts and not for public sales.", "isCorrect": false, "rationale": "Successive discounts apply to any scenario where multiple percentage reductions are taken sequentially, not just employee discounts."}], "id": "q07"}, {"question": "After a 25% discount, a customer paid $45.00 for a shirt. What was the original price of the shirt before the discount?", "options": [{"text": "$56.25", "isCorrect": false, "rationale": "This might result from adding 25% of $45 to $45, but we need to find the original price from which $45 is 75%."}, {"text": "$60.00", "isCorrect": true, "rationale": "If there was a 25% discount, the customer paid 100% - 25% = 75% of the original price. Let B be the original price. So, 0.75 * B = $45.00. Solving for B, B = $45.00 / 0.75 = $60.00."}, {"text": "$33.75", "isCorrect": false, "rationale": "This would be the price if $45.00 were the original price and then discounted by 25% ($45 * 0.75)."}, {"text": "$75.00", "isCorrect": false, "rationale": "This result does not correctly reflect a 25% discount leading to a $45.00 final price."}], "id": "q08"}, {"question": "An appliance store is having a promotion: a blender, originally priced at $400.00, is marked down by 20%. If the sales tax rate is 6%, what is the total cost a customer pays for the blender?", "options": [{"text": "$320.00", "isCorrect": false, "rationale": "This is the price after the discount but before sales tax is applied."}, {"text": "$339.20", "isCorrect": true, "rationale": "First, calculate the discounted price: $400.00 * (1 - 0.20) = $400.00 * 0.80 = $320.00. Then, calculate the sales tax on the discounted price: $320.00 * 0.06 = $19.20. Finally, add the tax to the discounted price: $320.00 + $19.20 = $339.20."}, {"text": "$344.00", "isCorrect": false, "rationale": "This calculation may have incorrectly applied the tax to the original price, or the discount percentage was miscalculated."}, {"text": "$326.40", "isCorrect": false, "rationale": "This could be the result if the tax was applied to the original price then discount applied, or some other order of operations error. Tax is applied to the final selling price after discounts."}], "id": "q09"}, {"question": "Which of the following best describes the fundamental role of percents in business applications, as outlined in the section 'Percents in Business'?", "options": [{"text": "Percents are primarily used for tracking the exact dollar amounts of all transactions.", "isCorrect": false, "rationale": "While percents are derived from dollar amounts, their primary role is to express proportions, changes, and rates, rather than just exact dollar amounts."}, {"text": "Percents serve as a universal language for expressing rates, ratios, changes, and proportions in various financial scenarios.", "isCorrect": true, "rationale": "The introductory paragraph explicitly states 'Percents are the language of business' and lists sales tax, tips, commissions, discounts, profit margins, and growth rates as examples, all of which represent rates, ratios, changes, or proportions."}, {"text": "Percents are used exclusively for calculating discounts to maximize customer savings.", "isCorrect": false, "rationale": "This is too narrow; percents are also used for taxes, commissions, tips, and growth, which don't necessarily relate to customer savings."}, {"text": "Percents are mainly a tool for converting all currency values into a standardized international format.", "isCorrect": false, "rationale": "Percents deal with proportional representation, not currency conversion for international standardization."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
