<script>
var QUESTIONS = [{"question": "Which of the following best describes the primary purpose of tracking depreciation for a business?", "options": [{"text": "To determine the fair market value of assets for potential sale.", "isCorrect": false, "rationale": "Depreciation is an accounting method that allocates an asset's cost over its useful life; it does not directly reflect the asset's fluctuating market value for sale purposes."}, {"text": "To reduce the amount of income tax the business owes by taking deductions.", "isCorrect": true, "rationale": "The text explicitly states that 'depreciation is a tax deduction: it reduces the amount of income tax the business owes,' making this a primary purpose for businesses."}, {"text": "To calculate the appropriate insurance coverage for business assets.", "isCorrect": false, "rationale": "Insurance coverage is typically based on replacement cost or current market value, not the accumulated depreciation recorded for accounting or tax purposes."}, {"text": "To estimate future maintenance and repair costs for aging equipment.", "isCorrect": false, "rationale": "While depreciation reflects asset aging, its primary accounting and tax function is not to forecast maintenance costs, though it can indirectly inform such planning."}]}, {"question": "A landscaping company purchases a new zero-turn mower for $15,000.00. It has an estimated useful life of 6 years and a salvage value of $3,000.00. Using the straight-line method, what is the annual depreciation expense for this mower?", "options": [{"text": "$2,500.00", "isCorrect": false, "rationale": "This calculation ($15,000 / 6) incorrectly omits the salvage value from the depreciable amount."}, {"text": "$2,000.00", "isCorrect": true, "rationale": "Under the straight-line method, the depreciable amount ($15,000 - $3,000 = $12,000) is divided by the useful life (6 years), resulting in $12,000 / 6 = $2,000 annual depreciation."}, {"text": "$3,000.00", "isCorrect": false, "rationale": "This amount represents the salvage value, not the annual depreciation expense."}, {"text": "$1,500.00", "isCorrect": false, "rationale": "This is an incorrect calculation. The correct depreciable amount is $12,000, not $9,000 or similar."}]}, {"question": "For financial reporting to investors, why is straight-line depreciation often preferred by businesses?", "options": [{"text": "It allows for significantly larger tax deductions in the early years of an asset's life.", "isCorrect": false, "rationale": "Accelerated depreciation methods (like DDB or MACRS) allow for larger deductions in early years, not straight-line."}, {"text": "It accurately reflects the fluctuating market value of an asset over time.", "isCorrect": false, "rationale": "Depreciation is an accounting allocation of cost, not a market valuation method, and straight-line creates a consistent value reduction, not a fluctuating one."}, {"text": "It is the simplest method to calculate and results in a consistent depreciation expense each year.", "isCorrect": true, "rationale": "The text notes that 'Straight-line depreciation is the simplest and most commonly used method for financial reporting' and it results in 'losing exactly $5,000.00 each year,' indicating consistency."}, {"text": "It directly ties depreciation to the actual usage of an asset, providing a more precise cost allocation.", "isCorrect": false, "rationale": "This describes the units-of-production method, which links depreciation to actual usage, not straight-line."}]}, {"question": "A business buys computer servers for $20,000.00 with a useful life of 5 years. Using the double declining-balance (DDB) method, what would be the depreciation expense in the *second* year? Assume no salvage value floor for this calculation.", "options": [{"text": "$8,000.00", "isCorrect": false, "rationale": "This is the depreciation for Year 1: DDB rate = 2*(1/5) = 40%; $20,000 * 0.40 = $8,000."}, {"text": "$4,800.00", "isCorrect": true, "rationale": "The DDB rate is 40% (2 * 1/5). Year 1 depreciation is $20,000 * 0.40 = $8,000. The book value at the end of Year 1 is $20,000 - $8,000 = $12,000. Year 2 depreciation is calculated on this book value: $12,000 * 0.40 = $4,800."}, {"text": "$3,200.00", "isCorrect": false, "rationale": "This is an incorrect calculation; it might result from applying 40% to an incorrect book value."}, {"text": "$12,000.00", "isCorrect": false, "rationale": "This amount represents the book value at the end of Year 1, not the depreciation expense for Year 2."}]}, {"question": "Greenfield Consulting chooses the double declining-balance method for its office furniture. What is the primary advantage they are seeking with this choice compared to straight-line depreciation?", "options": [{"text": "To simplify their internal accounting records due to its straightforward nature.", "isCorrect": false, "rationale": "Straight-line depreciation is generally considered simpler than declining-balance methods."}, {"text": "To match the depreciation expense more closely to the asset's actual usage.", "isCorrect": false, "rationale": "The units-of-production method is designed to match depreciation to actual usage, not declining-balance."}, {"text": "To take larger depreciation deductions in the early years of the asset's life.", "isCorrect": true, "rationale": "The text states that Greenfield 'wants to take larger depreciation deductions in the early years, so it uses the double declining-balance method,' indicating this as a primary advantage."}, {"text": "To ensure the asset is fully depreciated to its salvage value over its useful life without additional adjustments.", "isCorrect": false, "rationale": "While DDB aims to depreciate an asset, it often requires a final adjustment to reach salvage value or zero, and its main advantage is not this specific outcome but accelerated deductions."}]}, {"question": "Apex Printing's new commercial press costs $120,000.00 with a salvage value of $10,000.00 and is expected to produce 5,500,000 copies. If the press produces 950,000 copies in its first year, what is the depreciation expense for that year using the units-of-production method?", "options": [{"text": "$19,000.00", "isCorrect": true, "rationale": "First, calculate the rate per unit: ($120,000 - $10,000) / 5,500,000 = $110,000 / 5,500,000 = $0.02 per copy. Then, multiply the rate by the actual units produced: 950,000 copies * $0.02/copy = $19,000.00."}, {"text": "$22,000.00", "isCorrect": false, "rationale": "This would be the depreciation for 1,100,000 copies, not 950,000 copies ($1,100,000 * $0.02 = $22,000)."}, {"text": "$16,500.00", "isCorrect": false, "rationale": "This would be the depreciation for 825,000 copies, not 950,000 copies ($825,000 * $0.02 = $16,500)."}, {"text": "$2,000.00", "isCorrect": false, "rationale": "This is an incorrect calculation; the depreciable amount is $110,000, and the units produced are 950,000."}]}, {"question": "The units-of-production method is particularly suitable for which type of assets or business situations?", "options": [{"text": "Assets whose value declines steadily and predictably over time, regardless of use.", "isCorrect": false, "rationale": "This describes assets well-suited for the straight-line depreciation method, not units-of-production."}, {"text": "Assets primarily used for financial reporting to maintain consistent profit figures.", "isCorrect": false, "rationale": "The straight-line method is often preferred for consistent financial reporting to investors, while units-of-production links to variable usage."}, {"text": "Assets whose wear and tear, and thus value loss, is directly tied to their actual operational output or usage.", "isCorrect": true, "rationale": "The text states that with this method, 'years with heavier use get more depreciation. This makes sense because the machine wears out faster when it is used more,' directly matching depreciation to usage."}, {"text": "Assets for which businesses want to maximize tax deductions in the early years to improve cash flow.", "isCorrect": false, "rationale": "This describes the advantage of accelerated depreciation methods like MACRS or double declining-balance, not units-of-production primarily."}]}, {"question": "A business purchases computer equipment for $15,000.00, classified as 5-year MACRS property. Using the MACRS percentages provided in the textbook (Year 1: 20%, Year 2: 32%), what is the depreciation for *Year 2*?", "options": [{"text": "$3,000.00", "isCorrect": false, "rationale": "This is the depreciation for Year 1 ($15,000 * 0.20 = $3,000)."}, {"text": "$4,800.00", "isCorrect": true, "rationale": "Under MACRS, depreciation is always calculated by multiplying the original cost by the applicable percentage for that year. For Year 2, it is $15,000 * 0.32 = $4,800.00."}, {"text": "$9,600.00", "isCorrect": false, "rationale": "This calculation would result from applying the Year 2 percentage to the book value after Year 1, which is incorrect for MACRS; MACRS uses the original cost each year."}, {"text": "$1,500.00", "isCorrect": false, "rationale": "This is an incorrect calculation. The correct MACRS percentage for Year 2 is 32%."}]}, {"question": "For federal tax purposes, why do most businesses prefer to use the MACRS depreciation method over straight-line?", "options": [{"text": "MACRS simplifies the calculation process, making tax preparation faster.", "isCorrect": false, "rationale": "MACRS can be more complex due to specific tables and rules, whereas straight-line is generally simpler."}, {"text": "MACRS allows businesses to recognize a salvage value, which reduces the depreciable amount.", "isCorrect": false, "rationale": "The text explicitly states: 'Under MACRS, there is no salvage value considered. The asset is fully depreciated to $0.00.'"}, {"text": "MACRS enables businesses to take larger tax deductions in the early years, thereby reducing taxes sooner and improving cash flow.", "isCorrect": true, "rationale": "The text highlights that 'MACRS allows larger deductions in the early years, which reduces taxes sooner' and 'helps with cash flow' through 'accelerated depreciation.'"}, {"text": "MACRS matches depreciation perfectly to the asset's actual usage each period, leading to more accurate financial statements.", "isCorrect": false, "rationale": "The units-of-production method matches depreciation to actual usage, not MACRS, which is a time-based accelerated method."}]}, {"question": "Consider a business looking to depreciate a new, high-production manufacturing machine. Which depreciation method would best align with the goal of matching the depreciation expense to the intensity of the machine's use, while also considering tax benefits?", "options": [{"text": "Straight-Line Depreciation: It's simple and consistent, making financial reporting clear.", "isCorrect": false, "rationale": "Straight-line depreciation does not account for the intensity of asset use; it allocates cost evenly over time."}, {"text": "Double Declining-Balance: It provides larger deductions upfront, which is beneficial for tax and cash flow.", "isCorrect": false, "rationale": "While DDB offers accelerated deductions (a tax benefit), it does not directly link depreciation to the actual intensity of the machine's use."}, {"text": "Units-of-Production: It directly links depreciation to the actual output or usage, accurately reflecting wear and tear.", "isCorrect": true, "rationale": "The units-of-production method is explicitly designed to align depreciation with the actual operational output or usage of an asset, meaning higher use results in higher depreciation, which also constitutes a tax deduction. The text states, 'It matches the depreciation to how much the asset is actually used.'"}, {"text": "MACRS: It's mandatory for tax purposes and offers accelerated deductions, regardless of specific usage patterns.", "isCorrect": false, "rationale": "MACRS provides accelerated deductions for tax purposes, but it does not directly account for the variable intensity of an asset's use in its calculation; it is a time-based method."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
