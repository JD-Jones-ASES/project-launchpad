        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<div class="quiz-container">

        <a href="../../courses/Business_Math.html">&larr; Back to Business Math: Practical Applications</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Business Math: Practical Applications &mdash; Chapter 3, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following business scenarios does NOT directly rely on proportional reasoning as described in the text?", "options": [{"text": "Calculating the best deal by comparing unit prices of different product sizes.", "isCorrect": false, "rationale": "Comparing unit prices is explicitly mentioned as a direct application of proportional reasoning to find the best deal."}, {"text": "Estimating the total number of defective items in a production batch based on a sample.", "isCorrect": false, "rationale": "Estimating defect rates from a sample is identified as a key application of ratios and proportions in quality control."}, {"text": "Determining the optimal number of employees needed for a new project based on historical project data.", "isCorrect": true, "rationale": "While this might involve data analysis, the text does not mention 'determining optimal employee count based on historical data' as a direct application of proportional reasoning. The examples provided are unit price, recipe scaling, currency exchange, quality control, production ratio, and blueprint scales."}, {"text": "Converting a payment amount from US dollars to Japanese yen for an international supplier.", "isCorrect": false, "rationale": "Currency conversion using exchange rates is a specific example of proportional reasoning discussed in the section."}], "id": "q01"}, {"question": "A small business needs to buy hand sanitizer. Option A is a 64-ounce bottle for $14.72. Option B is a 128-ounce bottle for $27.52. Which option offers the better unit price, and what is that price per ounce?", "options": [{"text": "Option A; $0.23 per ounce.", "isCorrect": false, "rationale": "Option A's unit price is $14.72 / 64 oz = $0.23 per ounce. However, it is not the better buy compared to Option B."}, {"text": "Option B; $0.215 per ounce.", "isCorrect": true, "rationale": "Option A: $14.72 / 64 oz = $0.23 per ounce. Option B: $27.52 / 128 oz = $0.215 per ounce. Option B has a lower unit price, making it the better buy."}, {"text": "Option B; $0.22 per ounce.", "isCorrect": false, "rationale": "While Option B is the better buy, its unit price is $0.215 per ounce, not $0.22 per ounce."}, {"text": "Option A; $0.24 per ounce.", "isCorrect": false, "rationale": "Option A's unit price is $0.23 per ounce, and it is not the better buy."}], "id": "q02"}, {"question": "Chef Emily's soup recipe serves 8 people and requires 2.5 cups of chicken broth. If she needs to prepare the soup for a banquet of 120 people, how much chicken broth will she need?", "options": [{"text": "30 cups", "isCorrect": false, "rationale": "This calculation (2.5 * 12) might assume a different scaling factor or a simple multiplication error."}, {"text": "37.5 cups", "isCorrect": true, "rationale": "The scale factor is 120 servings / 8 servings = 15. Multiply the original ingredient amount by the scale factor: 2.5 cups * 15 = 37.5 cups of chicken broth."}, {"text": "40 cups", "isCorrect": false, "rationale": "This amount would be needed if the original recipe served 7.5 people or if the scaling factor was 16."}, {"text": "50 cups", "isCorrect": false, "rationale": "This amount implies a scale factor of 20, not 15."}], "id": "q03"}, {"question": "When scaling a recipe for a large catering order, if the calculated amount of an ingredient like 'diced tomatoes' results in 13.3 cans, why does the text recommend buying 14 cans instead of 13?", "options": [{"text": "To account for potential spillage or waste during preparation.", "isCorrect": false, "rationale": "While waste can occur, the text explicitly states the reason is that 'you cannot buy a fraction of a can' and implies the need to have enough, which means rounding up."}, {"text": "Because it's always better to have slightly more ingredients than less for a large event.", "isCorrect": false, "rationale": "This is a practical consideration, but the direct reason given in the text is the inability to purchase partial units of the ingredient."}, {"text": "To ensure there is enough of the ingredient, as one cannot purchase a fraction of a can.", "isCorrect": true, "rationale": "The text explicitly states: 'Since you cannot buy a fraction of a can, Chef Ramirez should buy 14 cans of diced tomatoes.' Rounding up ensures the full recipe can be made without being short on an ingredient."}, {"text": "To achieve a more balanced flavor profile by adding a little extra of that specific ingredient.", "isCorrect": false, "rationale": "The decision to round up is based on purchasing constraints, not flavor adjustment."}], "id": "q04"}, {"question": "An American company needs to pay a supplier in the UK £7,500 (British Pounds). If the current exchange rate is 1 US dollar = £0.82, how much in US dollars will the company need?", "options": [{"text": "$6,150.00", "isCorrect": false, "rationale": "This is the result of multiplying £7,500 by 0.82, which would be correct if converting from USD to GBP, not GBP to USD."}, {"text": "$9,146.34", "isCorrect": true, "rationale": "To convert £7,500 to USD, set up the proportion: 1 USD / £0.82 = x USD / £7,500. Cross-multiply: 0.82x = 7500, so x = 7500 / 0.82 = $9,146.34 (rounded to two decimal places)."}, {"text": "$7,500.00", "isCorrect": false, "rationale": "This would only be correct if the exchange rate was 1 USD = £1, which it is not."}, {"text": "$8,200.00", "isCorrect": false, "rationale": "This calculation is incorrect and does not reflect the given exchange rate."}], "id": "q05"}, {"question": "A business is making an international payment. Besides the stated exchange rate, what other factors should the business consider that might affect the actual amount of domestic currency needed?", "options": [{"text": "The Gross Domestic Product (GDP) of both countries.", "isCorrect": false, "rationale": "While GDP can influence exchange rates over the long term, it is not a direct factor that a business needs to consider for a single transaction beyond the current exchange rate."}, {"text": "The daily fluctuations in exchange rates and potential bank fees or commissions.", "isCorrect": true, "rationale": "The 'caution' box explicitly states: 'Exchange rates change daily. Also watch for bank fees and exchange service commissions, which effectively change the rate you receive.'"}, {"text": "The volume of goods being traded between the two countries.", "isCorrect": false, "rationale": "The volume of goods traded is a macroeconomic factor, not a direct cost component for a single transaction."}, {"text": "The local sales tax in the country of the supplier.", "isCorrect": false, "rationale": "Sales tax is typically applied to the goods or services themselves, not directly to the currency exchange process, and would be factored into the invoice amount before conversion."}], "id": "q06"}, {"question": "A toy manufacturer samples 150 toys from a production run and finds 3 defective toys. If the total production run for the day was 7,500 toys, approximately how many defective toys can the manufacturer expect in total?", "options": [{"text": "100 defective toys", "isCorrect": false, "rationale": "This would imply a higher defect rate or a different total production number."}, {"text": "150 defective toys", "isCorrect": true, "rationale": "Set up the proportion: 3 defective / 150 sampled = x defective / 7,500 produced. Cross-multiply: 150x = 3 * 7,500 = 22,500. Then x = 22,500 / 150 = 150 defective toys."}, {"text": "200 defective toys", "isCorrect": false, "rationale": "This would result from a calculation error or a misunderstanding of the proportion."}, {"text": "250 defective toys", "isCorrect": false, "rationale": "This implies a significantly higher defect rate than observed in the sample."}], "id": "q07"}, {"question": "A small textile factory has 5 sewing machines, and together they produce 400 shirts per 8-hour shift. If one machine is out for maintenance, how many shirts can the remaining machines produce in an 8-hour shift, assuming each machine works at the same rate?", "options": [{"text": "300 shirts", "isCorrect": false, "rationale": "This result would occur if 100 shirts were produced per machine, but the rate is 80 shirts per machine."}, {"text": "320 shirts", "isCorrect": true, "rationale": "First, find the production rate per machine: 400 shirts / 5 machines = 80 shirts/machine. With one machine out, there are 4 machines remaining. So, 4 machines * 80 shirts/machine = 320 shirts."}, {"text": "350 shirts", "isCorrect": false, "rationale": "This calculation is incorrect based on the given rates."}, {"text": "400 shirts (production remains the same as other machines pick up the slack)", "isCorrect": false, "rationale": "The problem states 'assuming each machine works at the same rate,' implying no machine picks up slack to maintain the original output."}], "id": "q08"}, {"question": "An interior designer is working with a blueprint that uses a scale of 0.5 inches = 2 feet. If a conference room measures 4.75 inches wide on the blueprint, what is the actual width of the conference room?", "options": [{"text": "9.5 feet", "isCorrect": false, "rationale": "This would be the result if the scale was 0.5 inches = 1 foot."}, {"text": "19 feet", "isCorrect": true, "rationale": "Set up the proportion: 0.5 inches / 2 feet = 4.75 inches / x feet. Cross-multiply: 0.5x = 2 * 4.75 = 9.5. Then x = 9.5 / 0.5 = 19 feet."}, {"text": "23.75 feet", "isCorrect": false, "rationale": "This would be the result if the scale was 1 inch = 5 feet, which is not the case here."}, {"text": "47.5 feet", "isCorrect": false, "rationale": "This suggests a multiplication error or misunderstanding of the scale factor."}], "id": "q09"}, {"question": "The diverse applications of proportional reasoning in business, such as comparing unit prices, scaling recipes, and estimating defects, primarily highlight which fundamental mathematical principle?", "options": [{"text": "The commutative property of multiplication.", "isCorrect": false, "rationale": "While multiplication is used, the commutative property (a*b = b*a) is not the fundamental principle underlying the application of proportional reasoning itself."}, {"text": "The ability to maintain equivalent relationships between quantities even when their absolute values change.", "isCorrect": true, "rationale": "Proportional reasoning is fundamentally about understanding and applying the concept of equivalent ratios. All the applications involve setting up an equality between two ratios (a/b = c/d) and finding an unknown, demonstrating how relationships between quantities scale or convert while their underlying ratio remains constant."}, {"text": "The importance of using precise measurements in all calculations.", "isCorrect": false, "rationale": "Precision is important in math, but it's a practice, not the core mathematical principle that makes proportional reasoning broadly applicable. Proportional reasoning works even with approximations."}, {"text": "The necessity of working with whole numbers whenever possible to avoid errors.", "isCorrect": false, "rationale": "While simplifying can be helpful, proportional reasoning frequently involves decimals and fractions, and the core principle applies regardless of number type."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
