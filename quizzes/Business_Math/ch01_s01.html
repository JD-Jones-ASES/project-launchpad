    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Business_Math.html">&larr; Back to Business Math: Practical Applications</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Business Math: Practical Applications &mdash; Chapter 1, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the place value of the digit 5 in the number $92,041.583$?", "options": [{"text": "Tens", "isCorrect": false, "rationale": "The tens place is for whole numbers, located two positions to the left of the decimal point (where the digit 4 is)."}, {"text": "Tenths", "isCorrect": true, "rationale": "The tenths place is the first digit immediately to the right of the decimal point, which is where the digit 5 is located."}, {"text": "Hundredths", "isCorrect": false, "rationale": "The hundredths place is the second digit to the right of the decimal point, where the digit 8 is located."}, {"text": "Thousands", "isCorrect": false, "rationale": "The thousands place is for whole numbers, located three positions to the left of the decimal point (where the digit 2 is)."}]}, {"question": "Which number correctly represents 'six hundred four and twenty-three thousandths'?", "options": [{"text": "604.23", "isCorrect": false, "rationale": "This number represents 'six hundred four and twenty-three hundredths' because the last digit (3) is in the hundredths place."}, {"text": "640.023", "isCorrect": false, "rationale": "This number represents 'six hundred forty and twenty-three thousandths'; the whole number part is incorrect."}, {"text": "604.023", "isCorrect": true, "rationale": "The word 'and' indicates the decimal point. 'Six hundred four' is the whole number part (604). 'Twenty-three thousandths' means the digit 3 must be in the thousandths place, requiring a leading zero after the decimal (0.023)."}, {"text": "604.230", "isCorrect": false, "rationale": "While mathematically equivalent to 604.23, this is still read as 'six hundred four and two hundred thirty thousandths' or 'six hundred four and twenty-three hundredths' and does not match 'twenty-three thousandths' directly without clarification on trailing zeros."}]}, {"question": "A company reported sales of $187,452,900$ last year. To make the number easier to grasp for a press release, they want to round it to the nearest million. What is the rounded figure?", "options": [{"text": "$187,000,000", "isCorrect": true, "rationale": "The digit in the millions place is 7. The digit to its right (in the hundred-thousands place) is 4. Since 4 is less than 5, we round down, meaning the 7 stays the same, and all digits to the right become zeros. Thus, $187,452,900$ rounded to the nearest million is $187,000,000$."}, {"text": "$187,500,000", "isCorrect": false, "rationale": "This would be the result if rounding to the nearest hundred-thousand, which is not what the question asked for."}, {"text": "$188,000,000", "isCorrect": false, "rationale": "This would be the result if the digit to the right of the millions place was 5 or greater, which it is not (it is 4)."}, {"text": "$190,000,000", "isCorrect": false, "rationale": "This would be the result if rounding to the nearest ten million, which is not what the question asked for."}]}, {"question": "A product costs $34.7852$. If a store needs to display the price to the nearest cent, what price should be shown?", "options": [{"text": "$34.78", "isCorrect": false, "rationale": "To round to the nearest cent (hundredth), look at the digit in the thousandths place (5). Since it is 5 or greater, the hundredths digit should be rounded up. This option rounds down."}, {"text": "$34.79", "isCorrect": true, "rationale": "The digit in the hundredths place is 8. The digit to its right (thousandths place) is 5. According to the rounding rule, if the digit to the right is 5 or greater, you round up the rounding digit. So, 8 is increased to 9, and the remaining digits are dropped. In a business context, money is always expressed to two decimal places (nearest cent)."}, {"text": "$34.80", "isCorrect": false, "rationale": "This rounds to the nearest tenth, not the nearest cent (hundredth). It represents 34 dollars and 80 cents, which is a larger increment than a cent."}, {"text": "$35.00", "isCorrect": false, "rationale": "This rounds to the nearest dollar, which is too broad for expressing a price to the nearest cent."}]}, {"question": "A business is reviewing three expense reports: $789$, $1,215$, and $432$. Using front-end estimation as defined in the text, what is the approximate total expense?", "options": [{"text": "$2,000", "isCorrect": false, "rationale": "This estimate is too low. Front-end estimation involves rounding each number to the place of its leading digit."}, {"text": "$2,200", "isCorrect": true, "rationale": "Using front-end estimation: $789$ rounds to $800$ (leading digit 7 in the hundreds place, with 8 to its right). $1,215$ rounds to $1,000$ (leading digit 1 in the thousands place, with 2 to its right). $432$ rounds to $400$ (leading digit 4 in the hundreds place, with 3 to its right). The estimated sum is $800 + 1,000 + 400 = 2,200$."}, {"text": "$2,400", "isCorrect": false, "rationale": "This would result if $1,215$ was incorrectly rounded to $1,200$ instead of $1,000$ based on rounding to its leading digit's place."}, {"text": "$2,500", "isCorrect": false, "rationale": "This estimate is too high and does not result from correctly applying front-end estimation."}]}, {"question": "Evaluate: $25 - 10 \\div 2 + 3 \\times 4$.", "options": [{"text": "18", "isCorrect": false, "rationale": "This answer indicates an incorrect application of the order of operations, possibly performing addition/subtraction before multiplication/division or misinterpreting the left-to-right rule."}, {"text": "21", "isCorrect": false, "rationale": "This answer indicates an incorrect application of the order of operations, likely by not prioritizing multiplication and division correctly."}, {"text": "24", "isCorrect": false, "rationale": "This answer indicates an incorrect application of the order of operations, such as performing addition before multiplication or division."}, {"text": "32", "isCorrect": true, "rationale": "Following the order of operations (PEMDAS): First, perform division: $10 \\div 2 = 5$. The expression becomes $25 - 5 + 3 \\times 4$. Next, perform multiplication: $3 \\times 4 = 12$. The expression becomes $25 - 5 + 12$. Finally, perform addition and subtraction from left to right: $25 - 5 = 20$, then $20 + 12 = 32$."}]}, {"question": "A financial analyst is calculating a bonus using the formula $100 + 5 \\times (8 - 2)^2 \\div 3$. What is the bonus amount?", "options": [{"text": "220", "isCorrect": false, "rationale": "This answer suggests an error in the order of operations, such as performing multiplication before the exponent or incorrect calculation of the exponent."}, {"text": "160", "isCorrect": true, "rationale": "Following PEMDAS: 1. Parentheses: $8 - 2 = 6$. The expression becomes $100 + 5 \\times 6^2 \\div 3$. 2. Exponents: $6^2 = 36$. The expression becomes $100 + 5 \\times 36 \\div 3$. 3. Multiplication/Division (left to right): $5 \\times 36 = 180$. The expression becomes $100 + 180 \\div 3$. Then, $180 \\div 3 = 60$. The expression becomes $100 + 60$. 4. Addition: $100 + 60 = 160$."}, {"text": "100", "isCorrect": false, "rationale": "This answer indicates ignoring all operations after the first number or a severe misapplication of PEMDAS."}, {"text": "60", "isCorrect": false, "rationale": "This answer might result from only calculating the multiplication and division part and ignoring the initial 100."}]}, {"question": "A salesperson calculates their total expenses: $12.50$ for lunch, $8.75$ for coffee, and $45.625$ for gas. What is the total expense?", "options": [{"text": "66.875", "isCorrect": true, "rationale": "To add decimals, line up the decimal points and add each column. $12.500 + 8.750 + 45.625 = 66.875$. Trailing zeros can be added for alignment."}, {"text": "66.88", "isCorrect": false, "rationale": "This answer is the result of rounding the exact sum ($66.875$) to the nearest cent. However, the question asks for the total expense, which implies the exact sum before any rounding, unless specified."}, {"text": "66.90", "isCorrect": false, "rationale": "This answer suggests an incorrect addition or rounding to the nearest tenth rather than the exact sum."}, {"text": "67.00", "isCorrect": false, "rationale": "This answer suggests significant errors in addition or rounding to the nearest whole dollar."}]}, {"question": "A store buys 3.5 kilograms of a product at $12.40$ per kilogram. What is the total cost?", "options": [{"text": "$43.4", "isCorrect": false, "rationale": "While the numerical value is correct, in business, money should typically be expressed with two decimal places (to the nearest cent), making $43.40$ the more appropriate format."}, {"text": "$4.34", "isCorrect": false, "rationale": "This answer indicates an incorrect placement of the decimal point, suggesting too many decimal places were shifted."}, {"text": "$434", "isCorrect": false, "rationale": "This answer indicates the decimal points were completely ignored or placed incorrectly, resulting in a whole number that is too large."}, {"text": "$43.40", "isCorrect": true, "rationale": "To multiply $12.40 \\times 3.5$: Multiply $1240 \\times 35 = 43400$. Count the total decimal places in the factors: $12.40$ has 2 decimal places, and $3.5$ has 1 decimal place, for a total of $2+1=3$ decimal places. Place the decimal point in the product to get $43.400$. In the context of money, as noted in the text's caution, this value should be written as $43.40$."}]}, {"question": "A company produced 1,515.6 liters of a liquid chemical and wants to store it in containers that hold $1.2$ liters each. How many containers are needed?", "options": [{"text": "126.3", "isCorrect": false, "rationale": "This answer results from incorrect decimal placement after division. The division process should result in a whole number of containers."}, {"text": "12.63", "isCorrect": false, "rationale": "This answer indicates an incorrect placement of the decimal point, making the number too small."}, {"text": "1,263", "isCorrect": true, "rationale": "To divide $1515.6 \\div 1.2$: First, move the decimal point in the divisor ($1.2$) one place to the right to make it a whole number ($12$). Then, move the decimal point in the dividend ($1515.6$) the same number of places to the right ($15156$). Now, divide $15156 \\div 12 = 1263$. Since the new dividend is a whole number, the quotient is a whole number. Therefore, 1,263 containers are needed."}, {"text": "1263.0", "isCorrect": false, "rationale": "While numerically equivalent to 1,263, representing a whole number of containers with a '.0' is generally unnecessary and less precise for this context. The exact result of the division is the whole number 1,263."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
