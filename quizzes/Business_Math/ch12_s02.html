<script>
var QUESTIONS = [{"question": "Based on Sofia's retirement plan, which financial concept is primarily used to determine her required monthly deposit?", "options": [{"text": "Future Value of a Lump Sum", "isCorrect": false, "rationale": "Sofia is making periodic payments, not a single lump sum, to reach a future goal."}, {"text": "Present Value of an Annuity", "isCorrect": false, "rationale": "The goal is a future amount, not the current worth of a series of future payments."}, {"text": "Sinking Fund", "isCorrect": true, "rationale": "A sinking fund is used to determine the periodic payments needed to accumulate a specific future value, which exactly matches Sofia's goal of reaching $500,000 by age 60 through monthly deposits."}, {"text": "Ordinary Annuity Future Value", "isCorrect": false, "rationale": "While related, the ordinary annuity future value formula calculates the future value given regular payments; a sinking fund formula calculates the payments needed to achieve a target future value."}], "id": "q01"}, {"question": "A small business needs to accumulate $60,000 in 5 years to purchase a new delivery vehicle. They plan to make quarterly deposits into an account earning 4% annual interest, compounded quarterly. Approximately how much should they deposit each quarter?", "options": [{"text": "$2,897.12", "isCorrect": false, "rationale": "This amount would be incorrect as it does not result from the proper sinking fund calculation."}, {"text": "$2,724.93", "isCorrect": true, "rationale": "This is a sinking fund problem. Given FV = $60,000, r = 0.04/4 = 0.01, and n = 5 * 4 = 20. The calculation is PMT = FV * [r / ((1+r)^n - 1)]. PMT = $60,000 * [0.01 / ((1.01)^20 - 1)] = $60,000 * [0.01 / (1.220190 - 1)] = $60,000 * [0.01 / 0.220190] = $60,000 * 0.045415 = $2,724.93."}, {"text": "$3,000.00", "isCorrect": false, "rationale": "This would be the amount if no interest was earned ($60,000 / 20 quarters), which ignores the power of compounding."}, {"text": "$3,345.50", "isCorrect": false, "rationale": "This amount would be incorrect as it does not result from the proper sinking fund calculation."}], "id": "q02"}, {"question": "The 'Perspective' section in Sofia's example highlights that a significant portion of her retirement goal ($358,570.40 out of $500,000) comes from compound interest. What does this emphasize about long-term savings?", "options": [{"text": "The importance of maximizing initial lump-sum investments.", "isCorrect": false, "rationale": "While lump-sum investments are beneficial, Sofia's example focuses on consistent periodic deposits over a long period, not a single initial sum."}, {"text": "The necessity of frequently adjusting deposit amounts based on market performance.", "isCorrect": false, "rationale": "The example emphasizes consistent deposits and the power of time, not frequent adjustments based on market fluctuations."}, {"text": "The benefit of consistent, long-term contributions allowing interest to earn interest.", "isCorrect": true, "rationale": "The 'Perspective' and 'Did You Know' sections explicitly state that the large amount of interest earned is due to compound interest over a long duration, allowing interest to accumulate on previous interest, known as the 'power of compound interest' or 'starting early'."}, {"text": "The advantage of choosing accounts with variable interest rates.", "isCorrect": false, "rationale": "The example uses a fixed annual interest rate (7.2%), not variable rates. The focus is on the effect of compounding over time."}], "id": "q03"}, {"question": "A property investor is offered a 7-year lease agreement for $12,000 per year. If the investor could otherwise sell the property today for $70,000 and invest the proceeds at 5% annual interest, what is the approximate present value of the rental income stream?", "options": [{"text": "$65,800.00", "isCorrect": false, "rationale": "This value is incorrect and does not reflect the proper present value calculation."}, {"text": "$72,000.00", "isCorrect": false, "rationale": "This would be the simple sum of payments ($12,000 * 7), which ignores the time value of money and the discounting effect of interest."}, {"text": "$69,436.49", "isCorrect": true, "rationale": "This is a present value of an annuity problem. Given PMT = $12,000, r = 0.05, and n = 7. The calculation is PV = PMT * [ (1 - (1+r)^-n) / r ]. PV = $12,000 * [ (1 - (1.05)^-7) / 0.05 ] = $12,000 * [ (1 - 0.710681) / 0.05 ] = $12,000 * [0.289319 / 0.05] = $12,000 * 5.78638 = $69,436.56 (rounding difference from precise calculation). This is the closest correct option."}, {"text": "$84,000.00", "isCorrect": false, "rationale": "This value is incorrect and does not reflect the proper present value calculation."}], "id": "q04"}, {"question": "Based on Okafor's Investment Decision example, what is the primary financial factor James Okafor should consider when deciding whether to keep his building and collect rent or sell it and invest the proceeds?", "options": [{"text": "The potential for future appreciation of the building's value.", "isCorrect": false, "rationale": "While a practical consideration, the example's core financial comparison is explicitly between the present value of the known rental income stream and the immediate selling price. Future appreciation is noted as an additional consideration, not the primary focus of the calculation shown."}, {"text": "The present value of the future rental income compared to the immediate selling price.", "isCorrect": true, "rationale": "The example explicitly calculates the present value of the 10 years of rental income and directly compares it to the $50,000 selling price to make the decision. This is the core financial comparison presented."}, {"text": "The current market demand for commercial leases.", "isCorrect": false, "rationale": "Market demand for leases influences the rent amount but is not the direct comparative financial metric used for the decision in the example."}, {"text": "The risk of tenant vacancy and maintenance costs.", "isCorrect": false, "rationale": "These are important practical considerations mentioned in the 'Note' section, but the primary financial calculation and comparison presented in the example is the present value of the rent versus the selling price."}], "id": "q05"}, {"question": "The comparison between David and Rachel's retirement savings clearly demonstrates 'the power of starting early.' Which statement best explains this power based on the example?", "options": [{"text": "Starting earlier means you can deposit less money overall to reach the same goal.", "isCorrect": false, "rationale": "While theoretically possible to reach the same goal with fewer total contributions, the example shows David contributing more overall ($96,000 vs $72,000) but achieving a disproportionately larger future value due to compounding."}, {"text": "The extra years of compounding for David generated significantly more interest, disproportionate to his extra contributions.", "isCorrect": true, "rationale": "The text states, 'David deposited only $24,000 more than Rachel... but his account is worth nearly $197,395.15 more.' This highlights that the additional 10 years allowed his initial contributions and accumulated interest to compound for a much longer period, leading to a drastically higher return on investment."}, {"text": "Rachel's later start means she faced higher inflation rates, reducing her earnings.", "isCorrect": false, "rationale": "The example does not mention inflation rates for either David or Rachel. The focus is on the impact of the duration of compounding at a consistent interest rate."}, {"text": "David benefited from higher interest rates during his earlier saving period.", "isCorrect": false, "rationale": "Both David and Rachel earned the same 6% annual interest compounded monthly. The difference in their outcomes is solely due to the duration of their saving and compounding periods."}], "id": "q06"}, {"question": "An individual deposits $250 per month into an account earning 4.5% annual interest, compounded monthly, for 15 years. What is the approximate future value of this annuity?", "options": [{"text": "$45,000.00", "isCorrect": false, "rationale": "This is simply the total contributions ($250 * 180 months), ignoring any interest earned."}, {"text": "$63,779.48", "isCorrect": true, "rationale": "This is a future value of an ordinary annuity problem. Given PMT = $250, r = 0.045/12 = 0.00375, and n = 15 * 12 = 180. The calculation is FV = PMT * [ ((1+r)^n - 1) / r ]. FV = $250 * [ ((1.00375)^180 - 1) / 0.00375 ] = $250 * [ (1.956692 - 1) / 0.00375 ] = $250 * [0.956692 / 0.00375] = $250 * 255.1179 = $63,779.48."}, {"text": "$59,210.15", "isCorrect": false, "rationale": "This value is incorrect and does not reflect the proper future value calculation."}, {"text": "$70,125.30", "isCorrect": false, "rationale": "This value is incorrect and does not reflect the proper future value calculation."}], "id": "q07"}, {"question": "If Rachel, from the 'Power of Starting Early' example, had deposited $300 per month instead of $200 per month (everything else remaining the same), what would her approximate future value be?", "options": [{"text": "$200,903.01", "isCorrect": false, "rationale": "This is Rachel's original future value with $200/month deposits; increasing the deposit would increase the future value."}, {"text": "$401,806.02", "isCorrect": false, "rationale": "This would be double her original amount, which would only occur if she deposited double the amount ($400/month), not $300/month."}, {"text": "$301,354.52", "isCorrect": true, "rationale": "As explained in the 'Quick Practice' section, the future value of an annuity is directly proportional to the payment amount. Since $300 is 1.5 times $200, Rachel's new future value would be her original future value multiplied by 1.5: $200,903.01 * 1.5 = $301,354.52."}, {"text": "$250,000.00", "isCorrect": false, "rationale": "This value is incorrect and does not follow the proportionality rule demonstrated in the text."}], "id": "q08"}, {"question": "Which financial calculation would be most appropriate for determining the regular payment needed to reach a specific future savings goal, such as accumulating funds for a child's college education in 10 years?", "options": [{"text": "Present Value of a Lump Sum", "isCorrect": false, "rationale": "This calculates the current value of a single future amount, not a series of payments towards a future goal."}, {"text": "Future Value of a Lump Sum", "isCorrect": false, "rationale": "This calculates the future value of a single current amount, not the required periodic payments."}, {"text": "Sinking Fund Payment", "isCorrect": true, "rationale": "A sinking fund is specifically designed to determine the equal periodic payments required to achieve a predetermined future sum or target value, making it suitable for saving for a college education."}, {"text": "Present Value of an Annuity", "isCorrect": false, "rationale": "This calculates the current value of a stream of future payments, not the payments needed to reach a future goal."}], "id": "q09"}, {"question": "The introduction to 'Business Applications: Planning for the Future' states that the formulas from Section 12.1 are 'key tools' for real-world financial decisions. What is the overarching theme of these applications in this section?", "options": [{"text": "Maximizing immediate profits through short-term investments.", "isCorrect": false, "rationale": "While important, the examples in this section (retirement, equipment replacement, long-term leases, comparing long-term savings strategies) primarily focus on long-term planning, not immediate profits or short-term investments."}, {"text": "Understanding and planning for financial goals across different time horizons.", "isCorrect": true, "rationale": "The section covers various scenarios like retirement (long-term), equipment replacement (medium-term), and investment comparisons (present vs. future streams), all of which involve planning for future financial goals over different durations. The introduction explicitly states 'Planning for the Future'."}, {"text": "Minimizing risk in volatile stock market investments.", "isCorrect": false, "rationale": "The section focuses on calculations for savings and investments at given interest rates, not strategies for mitigating risk in volatile markets."}, {"text": "Calculating past financial performance for tax purposes.", "isCorrect": false, "rationale": "The applications are forward-looking ('Planning for the Future'), not focused on historical performance or tax calculations."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
