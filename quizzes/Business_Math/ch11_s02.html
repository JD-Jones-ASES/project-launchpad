        <a href="../../courses/Business_Math.html">&larr; Back to Business Math: Practical Applications</a>

        <h1>QUIZ</h1>
        <div class="subtitle">Business Math: Practical Applications &mdash; Chapter 11, Section 2</div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

    </div>

        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "According to the 'Jenna's Auto Loan Decision' scenario, what is the primary financial advantage of choosing Option A (48 months at 5.4% interest) over Option B (60 months at 6.0% interest)?", "options": [{"text": "Option A has a lower annual interest rate, resulting in significantly lower monthly payments.", "isCorrect": false, "rationale": "While Option A has a lower annual interest rate (5.4% vs 6.0%), its shorter term results in a higher monthly payment ($464.03) compared to Option B ($386.66), not lower."}, {"text": "Option A results in a lower total amount of interest paid over the life of the loan.", "isCorrect": true, "rationale": "The comparison shows Option A accrued $2,273.44 in total interest, while Option B accrued $3,199.60. Therefore, Option A saves $926.16 in total interest, making this the primary financial advantage."}, {"text": "Option A allows Jenna to pay off her loan over a longer period, reducing financial strain.", "isCorrect": false, "rationale": "Option A is a 48-month loan, which is a shorter period than Option B's 60-month term. This would typically increase, not reduce, short-term financial strain due to higher monthly payments."}, {"text": "Option A has a lower total amount paid for the car, including the down payment.", "isCorrect": false, "rationale": "The question is about the financial advantage of the loan. The total paid for Option A ($22,273.44 loan + $2,000 down) would be $24,273.44. While Option A has a lower total amount paid for the financed portion compared to Option B ($23,199.60), the question asks for the primary financial advantage from the *loan comparison* where total interest is the key metric."}], "id": "q01"}, {"question": "The 'Truth in Lending Act' mentioned in the section serves what critical purpose for borrowers like Jenna or the Patels?", "options": [{"text": "It guarantees that all borrowers receive the lowest possible interest rates on their loans.", "isCorrect": false, "rationale": "The Truth in Lending Act requires disclosure, but it does not guarantee specific interest rates or the 'lowest possible' rates. Rates are determined by market conditions and borrower creditworthiness."}, {"text": "It requires lenders to clearly disclose the Annual Percentage Rate (APR), total interest, and total cost of a loan.", "isCorrect": true, "rationale": "The text explicitly states that the Truth in Lending Act 'requires lenders to disclose the APR, total interest, and total cost of a loan before you sign.' This empowers borrowers to make informed decisions and compare offers."}, {"text": "It provides a federal insurance program to protect borrowers from loan defaults.", "isCorrect": false, "rationale": "The Truth in Lending Act is a consumer protection law focused on disclosure, not an insurance program for loan defaults. Other government agencies or private insurers handle loan guarantees or default protection."}, {"text": "It sets a maximum limit on the amount of interest a lender can charge on consumer loans.", "isCorrect": false, "rationale": "While some state laws might have usury limits, the federal Truth in Lending Act primarily focuses on transparent disclosure of costs, not setting maximum interest rate caps."}], "id": "q02"}, {"question": "The Patel family is comparing a 15-year mortgage to a 30-year mortgage. Based on the provided examples, what is the most significant financial trade-off they face when considering the longer 30-year term?", "options": [{"text": "A significantly higher total principal amount paid over the life of the loan.", "isCorrect": false, "rationale": "The principal amount borrowed ($224,000) remains the same for both options. The difference lies in the interest paid, not the principal."}, {"text": "Lower monthly payments but substantially more total interest paid over the life of the loan.", "isCorrect": true, "rationale": "The 30-year mortgage has a lower monthly payment ($1,399.55 vs $1,868.38) but accrues significantly more total interest ($279,838.00) compared to the 15-year mortgage ($112,308.40), as shown in the comparison."}, {"text": "A higher monthly payment but a shorter overall repayment period.", "isCorrect": false, "rationale": "This describes the characteristics of the 15-year mortgage, not the 30-year mortgage. The 30-year mortgage has a *lower* monthly payment and a *longer* repayment period."}, {"text": "The 30-year mortgage offers a lower annual interest rate, making it more attractive.", "isCorrect": false, "rationale": "The 30-year mortgage had a higher annual interest rate (6.4%) compared to the 15-year mortgage (5.8%), making this statement incorrect."}], "id": "q03"}, {"question": "Marcus is reviewing his credit card statement. If he wants to minimize his finance charges using the average daily balance method, which action taken early in the billing cycle would have the most positive impact?", "options": [{"text": "Making a large purchase near the end of the billing cycle.", "isCorrect": false, "rationale": "A large purchase, regardless of when it occurs, increases the balance. If it occurs at the end, it still contributes to the average daily balance, albeit for fewer days than if it occurred earlier. To minimize finance charges, avoiding purchases or making payments is better."}, {"text": "Making a significant payment immediately at the start of the billing cycle.", "isCorrect": true, "rationale": "By making a payment early in the billing cycle, Marcus reduces his balance for a greater number of days. This directly lowers the sum of daily balances and, consequently, the average daily balance, leading to a smaller finance charge."}, {"text": "Spreading out smaller payments evenly throughout the billing cycle.", "isCorrect": false, "rationale": "While spreading payments is better than no payments, a single significant payment at the very beginning would have a greater impact on reducing the average daily balance than multiple smaller payments spread out, assuming the total payment amount is the same."}, {"text": "Ignoring small charges and only paying attention to large transactions.", "isCorrect": false, "rationale": "Even small charges contribute to the daily balance. Ignoring them will not help minimize finance charges; every dollar on the balance for every day counts in the average daily balance calculation."}], "id": "q04"}, {"question": "Using the 'Marcus's Credit Card Statement' example, what was Marcus's average daily balance for the March billing cycle?", "options": [{"text": "$1,450.00", "isCorrect": false, "rationale": "$1,450.00 was his initial balance, but transactions throughout the month changed the daily balance."}, {"text": "$1,775.00", "isCorrect": false, "rationale": "$1,775.00 was the balance for Days 8-17 after the first charge, but not the average daily balance for the entire cycle."}, {"text": "$1,492.74", "isCorrect": true, "rationale": "As calculated in the example, the sum of daily balances was $46,275, and dividing this by 31 days (the length of the billing cycle) yields an average daily balance of $1,492.74."}, {"text": "$1,350.00", "isCorrect": false, "rationale": "$1,350.00 was his balance for the last 7 days of the cycle, but not the average daily balance for the entire cycle."}], "id": "q05"}, {"question": "For Rivera Print Solutions' equipment loan, what is the purpose of an amortization table from an accounting perspective?", "options": [{"text": "To calculate the total interest the company will pay over the life of the loan before any payments are made.", "isCorrect": false, "rationale": "While an amortization table helps understand total interest, its primary purpose is to show the breakdown of each individual payment over time, not just the initial total calculation."}, {"text": "To track the balance of the loan after each payment, and to separate the interest and principal portions for financial records and tax purposes.", "isCorrect": true, "rationale": "The text states, 'accountants carefully track the interest and principal portions of each payment in an amortization table—the interest part can reduce the company's taxable income.' This highlights its use for financial records and tax deductions."}, {"text": "To determine the best loan option by comparing different interest rates and terms.", "isCorrect": false, "rationale": "Loan comparisons are usually done *before* a loan is taken out. An amortization table is built *after* a loan is secured, based on a specific loan's terms."}, {"text": "To guarantee that the monthly payment remains fixed throughout the loan term.", "isCorrect": false, "rationale": "The monthly payment calculation is done *before* building the table; the table then uses this fixed payment to show its allocation. The table doesn't guarantee the payment, it records its application."}], "id": "q06"}, {"question": "When Rivera Print Solutions makes its monthly payments on the equipment loan, how does the allocation of each payment to principal and interest typically change over time?", "options": [{"text": "The amount applied to interest increases, while the amount applied to principal decreases with each subsequent payment.", "isCorrect": false, "rationale": "As the principal balance decreases with each payment, the interest calculated on that smaller balance also decreases. Therefore, more of each subsequent fixed payment goes towards principal."}, {"text": "The amount applied to principal increases, while the amount applied to interest decreases with each subsequent payment.", "isCorrect": true, "rationale": "With a fixed monthly payment and a decreasing principal balance, the interest charged (calculated on the current balance) will decrease over time. Since the total payment is fixed, the portion allocated to principal must increase."}, {"text": "Both the amount applied to principal and interest remain constant throughout the loan term.", "isCorrect": false, "rationale": "This is incorrect. While the total monthly payment is typically constant, the allocation between principal and interest changes dynamically as the outstanding principal balance decreases."}, {"text": "Both the amount applied to principal and interest decrease with each subsequent payment.", "isCorrect": false, "rationale": "This is incorrect. If the monthly payment is fixed, as the interest portion decreases, the principal portion must increase, not decrease, to make up the fixed payment."}], "id": "q07"}, {"question": "The Patel family is buying a home for $280,000.00. They make a 20% down payment. How much principal do they need to finance with a mortgage?", "options": [{"text": "$280,000.00", "isCorrect": false, "rationale": "This is the total purchase price, not the amount financed after the down payment."}, {"text": "$56,000.00", "isCorrect": false, "rationale": "This is the amount of the down payment (20% of $280,000), not the amount financed."}, {"text": "$224,000.00", "isCorrect": true, "rationale": "The down payment is 20% of $280,000, which is $56,000. The amount financed is the purchase price minus the down payment: $280,000 - $56,000 = $224,000.00. This is also explicitly stated in the 'The Patel Family's Mortgage' scenario."}, {"text": "$336,000.00", "isCorrect": false, "rationale": "This value is not derived from the problem. It is a potential miscalculation or an inflated number."}], "id": "q08"}, {"question": "Using Rivera's loan information (balance after Payment 3: $43,113.73, monthly rate: $0.006, monthly payment: $895.00), what would be the principal portion of Payment 4?", "options": [{"text": "$258.68", "isCorrect": false, "rationale": "This is the interest portion of Payment 4, not the principal portion. Interest = $43,113.73 * 0.006 = $258.68."}, {"text": "$636.32", "isCorrect": true, "rationale": "First, calculate the interest for Payment 4: $43,113.73 * 0.006 = $258.68. Then, subtract the interest from the fixed monthly payment to find the principal portion: $895.00 - $258.68 = $636.32. This matches the Quick Practice answer."}, {"text": "$42,477.41", "isCorrect": false, "rationale": "This is the new balance after Payment 4, not the principal portion of the payment. New balance = $43,113.73 - $636.32 = $42,477.41."}, {"text": "$895.00", "isCorrect": false, "rationale": "This is the total monthly payment, which includes both principal and interest, not just the principal portion."}], "id": "q09"}, {"question": "Jenna is offered two auto loan options for $20,000: Option A (48 months at 5.4%) and Option B (60 months at 6.0%). If she primarily wants the lowest possible monthly payment to manage her budget, which option should she choose and why?", "options": [{"text": "Option A, because its lower interest rate will always result in a lower monthly payment.", "isCorrect": false, "rationale": "While Option A has a lower interest rate, its shorter term (48 months) results in a higher monthly payment ($464.03) compared to Option B ($386.66). The term length plays a significant role in monthly payment size."}, {"text": "Option B, because its longer loan term spreads the principal over more payments, reducing the monthly obligation.", "isCorrect": true, "rationale": "Option B has a 60-month term, which is longer than Option A's 48 months. A longer term means the principal is divided into more installments, typically resulting in a lower monthly payment, even if the interest rate is slightly higher, as seen in the example ($386.66 for B vs. $464.03 for A)."}, {"text": "Neither option, as both options have monthly payments that are too high for her budget.", "isCorrect": false, "rationale": "The question asks which option she *should choose* for the lowest monthly payment, implying a choice between the two given options. The text provides the calculations to compare them directly."}, {"text": "Option A, because it saves her money on total interest, which directly translates to lower monthly payments.", "isCorrect": false, "rationale": "Saving on total interest (Option A's advantage) does not automatically mean lower monthly payments. In this case, Option A has higher monthly payments despite saving total interest. Total interest is a function of both rate and time, while monthly payment is also heavily influenced by term length."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
