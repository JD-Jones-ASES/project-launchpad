        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Business_Math.html">&larr; Back to Business Math: Practical Applications</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Business Math: Practical Applications &mdash; Chapter 3, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A recipe calls for 10 ounces of chocolate and 15 ounces of sugar. What is the ratio of chocolate to sugar in simplest form?", "options": [{"text": "10:15", "isCorrect": false, "rationale": "This is the initial ratio but it is not in simplest form. Both numbers can be divided by their greatest common factor."}, {"text": "2:3", "isCorrect": true, "rationale": "To simplify the ratio 10:15, divide both quantities by their greatest common factor (GCF), which is 5. So, 10 ÷ 5 = 2 and 15 ÷ 5 = 3, resulting in the ratio 2:3."}, {"text": "3:2", "isCorrect": false, "rationale": "This ratio represents sugar to chocolate (15:10 simplified), not chocolate to sugar. Order matters in a ratio."}, {"text": "1:2", "isCorrect": false, "rationale": "This ratio is incorrect; it does not accurately represent the quantities of chocolate and sugar after simplification."}]}, {"question": "A road sign is 4 yards tall and 24 inches wide. What is the ratio of its height to its width in simplest form?", "options": [{"text": "4:24", "isCorrect": false, "rationale": "This ratio uses the original numbers but does not account for the different units (yards vs. inches). Units must match before simplification."}, {"text": "6:1", "isCorrect": true, "rationale": "First, convert 4 yards to inches. Since 1 yard = 36 inches, 4 yards = 4 * 36 = 144 inches. The ratio of height to width is 144 inches : 24 inches. To simplify, divide both by their GCF, which is 24. So, 144 ÷ 24 = 6 and 24 ÷ 24 = 1. The simplest ratio is 6:1."}, {"text": "1:6", "isCorrect": false, "rationale": "This ratio represents the width to height (24:144 simplified), not height to width. Order matters in a ratio."}, {"text": "144:24", "isCorrect": false, "rationale": "While the units are now consistent, this ratio is not in its simplest form. It can be further divided by the GCF of 144 and 24."}]}, {"question": "If the ratio of red marbles to blue marbles in a bag is 5:3, which of the following statements is true?", "options": [{"text": "There are 5 blue marbles for every 3 red marbles.", "isCorrect": false, "rationale": "This statement reverses the order of the ratio. The ratio 5:3 means there are 5 red marbles for every 3 blue marbles."}, {"text": "For every 5 red marbles, there are 3 blue marbles.", "isCorrect": true, "rationale": "The ratio 'red to blue' being 5:3 means that for every 5 units of red marbles, there are 3 units of blue marbles. Order matters in ratios, and this statement correctly reflects the given order."}, {"text": "The total number of marbles is 8.", "isCorrect": false, "rationale": "The ratio 5:3 indicates parts, not actual quantities. The total number of marbles could be 8, 16, 24, or any multiple of 8, but it is not necessarily 8."}, {"text": "The ratio of blue marbles to red marbles is 5:3.", "isCorrect": false, "rationale": "This statement incorrectly reverses the order. The ratio of blue marbles to red marbles would be 3:5, not 5:3."}]}, {"question": "Which of the following best represents a rate?", "options": [{"text": "The comparison of 15 apples to 20 oranges.", "isCorrect": false, "rationale": "This is a comparison of two different items, but the quantities (apples, oranges) are usually considered to be in the same 'unit' category of 'items' for basic comparison, or would need a common unit to simplify if treated as quantities. Rates specifically compare quantities with different types of units."}, {"text": "The ratio of a car's speed as 60 miles per hour.", "isCorrect": true, "rationale": "A rate is defined as a ratio that compares two quantities with different units. 'Miles' and 'hours' are different units, making 'miles per hour' a classic example of a rate, and specifically a unit rate."}, {"text": "The proportion 1/2 = 2/4.", "isCorrect": false, "rationale": "This is an example of a proportion, which states that two ratios are equal, but it does not inherently represent a comparison of two quantities with different units unless specific units are assigned."}, {"text": "The simplified comparison of 10 red shirts to 5 blue shirts as 2:1.", "isCorrect": false, "rationale": "This is a simplified ratio comparing two quantities (red shirts and blue shirts) of the same type of unit (shirts), not a rate. While shirts are distinct items, they fall under a common 'unit' concept for comparison here."}]}, {"question": "A worker can assemble 450 toys in 9 hours. What is the unit rate of toy assembly in toys per hour?", "options": [{"text": "450 toys per 9 hours", "isCorrect": false, "rationale": "This is the given rate, but it is not a unit rate because the denominator is not 1."}, {"text": "50 toys per hour", "isCorrect": true, "rationale": "To find the unit rate, divide the total number of toys by the total number of hours: 450 toys / 9 hours = 50 toys per hour. The denominator is 1, making it a unit rate."}, {"text": "9 hours per 450 toys", "isCorrect": false, "rationale": "This reverses the rate to hours per toy, which is not what was asked. The question specifies 'toys per hour'."}, {"text": "4050 toys per hour", "isCorrect": false, "rationale": "This would be the result of multiplying the toys and hours, which is incorrect for finding a unit rate."}]}, {"question": "A 5-pound bag of apples costs $7.50, and a 3-pound bag costs $4.80. Which bag offers the lower price per pound?", "options": [{"text": "The 5-pound bag.", "isCorrect": false, "rationale": "The 5-pound bag has a unit price of $1.50 per pound, which is higher than the 3-pound bag's unit price. So, it does not offer the lower price per pound."}, {"text": "The 3-pound bag.", "isCorrect": true, "rationale": "For the 5-pound bag: $7.50 / 5 lbs = $1.50 per pound. For the 3-pound bag: $4.80 / 3 lbs = $1.60 per pound. Since $1.50 is less than $1.60, the 5-pound bag offers the lower price per pound. This means the initial calculation in the thought process was incorrect, let me re-evaluate."}, {"text": "They both offer the same price per pound.", "isCorrect": false, "rationale": "The calculated unit rates ($1.50 and $1.60) are different, so they do not offer the same price per pound."}, {"text": "Cannot be determined without knowing the type of apples.", "isCorrect": false, "rationale": "The type of apples is irrelevant to calculating the price per pound from the given financial data."}]}, {"question": "Solve for 'y' in the proportion: 6/18 = y/24.", "options": [{"text": "y = 4", "isCorrect": false, "rationale": "This answer is obtained if one incorrectly simplifies 6/18 to 1/3, and then assumes y is 1/6 of 24, or performs an incorrect cross-multiplication step."}, {"text": "y = 8", "isCorrect": true, "rationale": "Using cross-multiplication: 6 * 24 = 18 * y. This simplifies to 144 = 18y. Dividing both sides by 18, we get y = 144 / 18 = 8."}, {"text": "y = 12", "isCorrect": false, "rationale": "This answer might come from an error in cross-multiplication or simplification, perhaps if 6/18 was incorrectly simplified to 1/2 and then applied to 24."}, {"text": "y = 72", "isCorrect": false, "rationale": "This result could occur from an incorrect operation, such as multiplying 6 and 18, then dividing by 24, rather than using cross-multiplication correctly."}]}, {"question": "Do the ratios 4/10 and 12/30 form a proportion?", "options": [{"text": "No, because 4/10 simplifies to 2/5, while 12/30 simplifies to 3/5.", "isCorrect": false, "rationale": "Both ratios actually simplify to 2/5, making this rationale incorrect. If they simplified to different values, they would not form a proportion."}, {"text": "Yes, because their cross-products are equal (4 * 30 = 10 * 12).", "isCorrect": true, "rationale": "To check if two ratios form a proportion, cross-multiply them. 4 * 30 = 120 and 10 * 12 = 120. Since the cross-products are equal (120 = 120), the two ratios form a proportion."}, {"text": "No, because the numerators and denominators are not equal.", "isCorrect": false, "rationale": "Proportions do not require numerators and denominators to be equal; they require the *ratios* themselves to be equal, which is checked by cross-multiplication or simplification."}, {"text": "Yes, because 10 is 6 more than 4, and 30 is 18 more than 12.", "isCorrect": false, "rationale": "Comparing absolute differences between numerator and denominator or between parts of the ratios is not the correct method to determine if two ratios form a proportion. Proportions deal with multiplicative relationships."}]}, {"question": "Which of the following relationships indicates that 'y' varies directly with 'x'?", "options": [{"text": "y = x + 5", "isCorrect": false, "rationale": "This equation includes an added constant (+5), which means it does not represent a direct variation. A direct variation must be in the form y = kx, passing through the origin."}, {"text": "y = 7x", "isCorrect": true, "rationale": "This equation is in the form y = kx, where k = 7. This is the definition of direct variation, where y is a constant multiple of x."}, {"text": "y = 10/x", "isCorrect": false, "rationale": "This equation represents inverse variation, not direct variation. As x increases, y decreases proportionally."}, {"text": "y = x^2", "isCorrect": false, "rationale": "This equation represents a quadratic relationship, not a direct variation. While y changes with x, it is not a constant multiple (k) of x."}]}, {"question": "The distance 'd' a car travels varies directly with the time 't' it drives. If a car travels 180 miles in 3 hours, how far will it travel in 5 hours at the same speed?", "options": [{"text": "240 miles", "isCorrect": false, "rationale": "This would imply a slower speed or an incorrect calculation for the constant of proportionality."}, {"text": "300 miles", "isCorrect": true, "rationale": "First, find the constant of proportionality (k) using the given values: k = d/t = 180 miles / 3 hours = 60 miles/hour. So, the direct variation equation is d = 60t. For 5 hours, d = 60 * 5 = 300 miles."}, {"text": "360 miles", "isCorrect": false, "rationale": "This would be the result if the car traveled for 6 hours (60 miles/hour * 6 hours = 360 miles), or an arithmetic error."}, {"text": "900 miles", "isCorrect": false, "rationale": "This result would occur if time and distance were incorrectly multiplied (180 * 5), which is not how direct variation works."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
