<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Business_Math.html">&larr; Back to Business Math: Practical Applications</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Business Math: Practical Applications &mdash; Chapter 6, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A store purchases a set of headphones for $60.00 and decides to mark it up 75% on cost. What is the selling price of the headphones?", "options": [{"text": "$90.00", "isCorrect": false, "rationale": "This calculation would be correct if the markup was 50% ($60 * 1.50 = $90). The specified markup rate is 75%."}, {"text": "$105.00", "isCorrect": true, "rationale": "To find the selling price with a markup on cost, use the formula Selling Price = Cost * (1 + markup rate). So, $60.00 * (1 + 0.75) = $60.00 * 1.75 = $105.00."}, {"text": "$120.00", "isCorrect": false, "rationale": "This suggests a markup of 100% on cost, which would double the cost. The markup rate given is 75%."}, {"text": "$45.00", "isCorrect": false, "rationale": "This amount represents only the markup ($60 * 0.75), not the selling price, which includes the original cost."}]}, {"question": "A retailer wants to achieve a 40% markup on the selling price for a new dress. If the cost of the dress to the retailer is $75.00, what should the selling price be?", "options": [{"text": "$105.00", "isCorrect": false, "rationale": "This would be the selling price if the markup was 40% on cost ($75 * 1.40 = $105), not on the selling price."}, {"text": "$125.00", "isCorrect": true, "rationale": "When the markup is on the selling price, use the formula Selling Price = Cost / (1 - markup rate). So, $75.00 / (1 - 0.40) = $75.00 / 0.60 = $125.00. Checking: Markup = $125 - $75 = $50. $50/$125 = 0.40 or 40%."}, {"text": "$187.50", "isCorrect": false, "rationale": "This calculation is incorrect. It seems to have inverted the formula or applied an incorrect percentage base."}, {"text": "$30.00", "isCorrect": false, "rationale": "This represents only the markup amount if calculated as 40% of the cost, not the final selling price based on a markup on selling price."}]}, {"question": "An antique lamp sells for $170.00 after a 70% markup on cost. What was the original cost of the lamp?", "options": [{"text": "$100.00", "isCorrect": true, "rationale": "Using the formula Selling Price = Cost * (1 + markup rate), we have $170 = Cost * (1 + 0.70). So, Cost = $170 / 1.70 = $100.00."}, {"text": "$119.00", "isCorrect": false, "rationale": "This might be interpreted as a 70% markdown, or incorrectly calculated as 70% of $170, which is the markup amount if $170 was the cost."}, {"text": "$289.00", "isCorrect": false, "rationale": "This calculation would imply adding 70% of $170 to $170, which is incorrect for finding the original cost from a marked-up selling price."}, {"text": "$70.00", "isCorrect": false, "rationale": "This is likely the markup amount ($100 * 0.70) if the cost was $100. It is not the original cost itself."}]}, {"question": "A clothing store decides to mark down a $180.00 designer dress by 25%. What is the final sale price of the dress?", "options": [{"text": "$135.00", "isCorrect": true, "rationale": "To find the sale price after a markdown, use the formula Sale Price = Original Price * (1 - markdown rate). So, $180.00 * (1 - 0.25) = $180.00 * 0.75 = $135.00."}, {"text": "$155.00", "isCorrect": false, "rationale": "This would be the price if the markdown was about 13.9% ($180 * 0.861). The markdown is 25%."}, {"text": "$45.00", "isCorrect": false, "rationale": "This is the markdown amount ($180 * 0.25), not the final sale price. The sale price is Original Price minus Markdown Amount."}, {"text": "$225.00", "isCorrect": false, "rationale": "This calculation implies a markup, not a markdown, which would increase the price."}]}, {"question": "A camera initially priced at $400.00 undergoes two successive markdowns: first 15%, then an additional 10% off the reduced price. What is the final price of the camera?", "options": [{"text": "$260.00", "isCorrect": false, "rationale": "This would be the result if a single markdown of 25% (15% + 10%) was applied ($400 * 0.75 = $300), not $260. A single markdown of 35% (if incorrectly summed, $400 * 0.65 = $260) would also be incorrect for successive markdowns."}, {"text": "$306.00", "isCorrect": true, "rationale": "For successive markdowns, apply each discount to the current price. After first markdown: $400 * (1 - 0.15) = $400 * 0.85 = $340. After second markdown: $340 * (1 - 0.10) = $340 * 0.90 = $306.00. Or in one step: $400 * (1 - 0.15) * (1 - 0.10) = $400 * 0.85 * 0.90 = $306.00."}, {"text": "$340.00", "isCorrect": false, "rationale": "This is the price after only the first 15% markdown. The additional 10% markdown has not been applied yet."}, {"text": "$360.00", "isCorrect": false, "rationale": "This is the price after only a 10% markdown from the original, ignoring the initial 15% markdown."}]}, {"question": "Which of the following statements accurately reflects the difference between applying a '40% markup on cost' versus a '40% markup on selling price' for the same item with an identical initial cost?", "options": [{"text": "Both methods result in the same selling price, as the percentage is identical.", "isCorrect": false, "rationale": "This is incorrect. As the text states in the 'caution' box, these two methods use different bases (cost vs. selling price) and will yield different selling prices."}, {"text": "A 40% markup on cost will result in a higher selling price than a 40% markup on selling price.", "isCorrect": false, "rationale": "This is incorrect. For the same initial cost, a 40% markup on selling price (e.g., Cost / 0.60) will always yield a higher selling price than a 40% markup on cost (e.g., Cost * 1.40)."}, {"text": "A 40% markup on selling price will result in a higher selling price than a 40% markup on cost.", "isCorrect": true, "rationale": "This is correct. For example, if Cost = $60, 40% on cost results in a Selling Price of $60 * (1 + 0.40) = $84. A 40% markup on selling price results in a Selling Price of $60 / (1 - 0.40) = $100. The latter is higher."}, {"text": "The difference between the two methods is only significant for very low-cost items.", "isCorrect": false, "rationale": "The difference is significant regardless of the item's cost; it's a mathematical difference in how the base of the percentage is calculated."}]}, {"question": "A business sells custom-made furniture. Its monthly fixed costs are $15,000. Each piece of furniture has a variable cost of $200 and sells for $700. How many pieces of furniture must the business sell to reach its break-even point?", "options": [{"text": "30 units", "isCorrect": true, "rationale": "The break-even quantity (Q) is calculated as Fixed Costs / (Price per Unit - Variable Cost per Unit). Here, Q = $15,000 / ($700 - $200) = $15,000 / $500 = 30 units."}, {"text": "50 units", "isCorrect": false, "rationale": "This calculation is incorrect. It might be Fixed Costs / (Selling Price + Variable Cost) or a similar error."}, {"text": "75 units", "isCorrect": false, "rationale": "This value would result from Fixed Costs / Variable Cost per Unit ($15,000 / $200), ignoring the selling price per unit. The correct denominator is the contribution margin."}, {"text": "21 units", "isCorrect": false, "rationale": "This calculation is incorrect. It may be due to a misapplication of the formula or an arithmetic error."}]}, {"question": "In break-even analysis, what is the 'contribution margin per unit' and why is it important?", "options": [{"text": "It is the amount of fixed costs allocated to each unit, important for calculating total costs.", "isCorrect": false, "rationale": "Fixed costs are not typically allocated per unit in this way for the contribution margin. The contribution margin is specific to revenue and variable costs."}, {"text": "It is the difference between the selling price per unit and the variable cost per unit, representing the amount each unit contributes to covering fixed costs and generating profit.", "isCorrect": true, "rationale": "As defined in the text, the denominator (Price - Variable Cost) is called the contribution margin per unit. It shows how much revenue from each unit sold contributes towards covering fixed costs and then generating profit after variable costs are covered."}, {"text": "It is the total revenue minus the total cost for all units sold, indicating overall business profitability.", "isCorrect": false, "rationale": "This describes total profit or loss, not the contribution margin per unit, which is a per-unit measure for a specific part of the cost structure."}, {"text": "It is the discount offered on a product to encourage sales, crucial for determining markdown percentages.", "isCorrect": false, "rationale": "This definition relates to markdowns, not the contribution margin in break-even analysis. They are distinct concepts."}]}, {"question": "A software company has fixed costs of $25,000 per month. Each software license costs $15 to produce and sells for $65. If the company sells 600 licenses in a month, what is their profit or loss?", "options": [{"text": "A profit of $5,000", "isCorrect": true, "rationale": "Profit = (Price - Variable Cost) * Quantity - Fixed Costs. Profit = ($65 - $15) * 600 - $25,000 = $50 * 600 - $25,000 = $30,000 (total contribution) - $25,000 (fixed costs) = $5,000 profit."}, {"text": "A loss of $5,000", "isCorrect": false, "rationale": "This would be the case if total revenue was $5,000 less than total costs. The correct calculation shows a profit."}, {"text": "A profit of $30,000", "isCorrect": false, "rationale": "This value represents the total contribution margin from 600 units ($50 * 600), but it does not account for fixed costs, which must be subtracted to find the net profit."}, {"text": "A loss of $25,000", "isCorrect": false, "rationale": "This would be the loss if no units were sold, as it only accounts for fixed costs."}]}, {"question": "When does a business typically make a profit according to the break-even analysis model?", "options": [{"text": "When total costs exceed total revenue.", "isCorrect": false, "rationale": "This scenario describes a loss, not a profit, as the business is spending more than it earns."}, {"text": "When fixed costs are completely eliminated.", "isCorrect": false, "rationale": "While reducing fixed costs can increase profit, a business can still make a profit with fixed costs if sales are high enough. Eliminating them is not a prerequisite for profit."}, {"text": "When the quantity of units sold is above the break-even point.", "isCorrect": true, "rationale": "The text explicitly states: 'Profit is positive when sales exceed the break-even point.' At the break-even point, Revenue equals Total Cost, resulting in zero profit. Beyond that, additional sales generate profit."}, {"text": "When the variable cost per unit is equal to the selling price per unit.", "isCorrect": false, "rationale": "If variable cost per unit equals selling price per unit, the contribution margin is zero, meaning no revenue is left to cover fixed costs. This would result in a loss equal to fixed costs, never a profit."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
