        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

    <div class="quiz-footer">

<script>
var QUESTIONS = [{"question": "An employee worked 7 hours and 40 minutes. How many decimal hours did they work, rounded to the nearest hundredth?", "options": [{"text": "7.40 hours", "isCorrect": false, "rationale": "This option incorrectly assumes that minutes can be directly added as a decimal part of an hour without conversion. 40 minutes is not 0.40 hours."}, {"text": "7.67 hours", "isCorrect": true, "rationale": "To convert minutes to decimal hours, divide the minutes by 60. So, 40 minutes / 60 = 0.666... hours. Rounded to the nearest hundredth, this is 0.67 hours. Adding this to the 7 full hours gives 7 + 0.67 = 7.67 hours."}, {"text": "7.60 hours", "isCorrect": false, "rationale": "This option represents a miscalculation of 40/60, which should be 0.666... rather than 0.60, or an incorrect rounding strategy."}, {"text": "7.75 hours", "isCorrect": false, "rationale": "This option corresponds to 7 hours and 45 minutes (45/60 = 0.75), not 7 hours and 40 minutes."}], "id": "q01"}, {"question": "A worker's time card shows they started at 8:00 AM and finished at 5:00 PM on Wednesday. How many decimal hours did they work that day?", "options": [{"text": "8.00 hours", "isCorrect": false, "rationale": "This option incorrectly calculates the duration, perhaps by miscounting hours or assuming an automatic break not mentioned in the problem."}, {"text": "9.00 hours", "isCorrect": true, "rationale": "To find the total hours, subtract the start time from the end time. 5:00 PM is 17:00 in 24-hour format. 17:00 - 8:00 = 9 hours. Since there are 0 minutes, this is exactly 9.00 decimal hours."}, {"text": "8.50 hours", "isCorrect": false, "rationale": "This option implies a 30-minute deduction, perhaps for a lunch break, which is not stated in the problem. Otherwise, it's a miscalculation of the time difference."}, {"text": "9.50 hours", "isCorrect": false, "rationale": "This option represents an incorrect calculation of the time difference, adding an extra half hour to the actual 9-hour period."}], "id": "q02"}, {"question": "Sarah earns $25.00 per hour. Last week she worked 42 hours. What was her gross pay for the week, assuming overtime is paid at 1.5 times the regular rate for hours over 40?", "options": [{"text": "$1,050.00", "isCorrect": false, "rationale": "This option incorrectly calculates all 42 hours at the regular rate ($25.00 * 42 = $1,050.00), failing to apply the overtime rate for hours exceeding 40."}, {"text": "$1,100.00", "isCorrect": false, "rationale": "This option reflects a miscalculation of either the regular pay, overtime pay, or the sum of both."}, {"text": "$1,075.00", "isCorrect": true, "rationale": "Regular hours: 40. Regular pay: 40 hours * $25.00/hour = $1,000.00. Overtime hours: 42 - 40 = 2 hours. Overtime rate: 1.5 * $25.00/hour = $37.50/hour. Overtime pay: 2 hours * $37.50/hour = $75.00. Total gross pay: $1,000.00 + $75.00 = $1,075.00."}, {"text": "$1,062.50", "isCorrect": false, "rationale": "This option reflects an error in calculating the overtime pay or the total gross pay, potentially using an incorrect overtime rate or number of overtime hours."}], "id": "q03"}, {"question": "David has an annual salary of $62,400.00. If he is paid biweekly, what is his gross pay per pay period?", "options": [{"text": "$5,200.00", "isCorrect": false, "rationale": "This option incorrectly calculates monthly pay ($62,400 / 12 months = $5,200.00). Biweekly pay periods are different from monthly."}, {"text": "$2,400.00", "isCorrect": true, "rationale": "Biweekly means an employee is paid every two weeks. There are 52 weeks in a year, so there are 52 / 2 = 26 biweekly pay periods. To find the gross pay per period, divide the annual salary by the number of pay periods: $62,400.00 / 26 = $2,400.00."}, {"text": "$1,200.00", "isCorrect": false, "rationale": "This option incorrectly calculates weekly pay ($62,400 / 52 weeks = $1,200.00), not biweekly pay."}, {"text": "$2,599.96", "isCorrect": false, "rationale": "This option would be the result of dividing by 24 (for semi-monthly payments) with some rounding error, not 26 for biweekly payments."}], "id": "q04"}, {"question": "A salesperson earns a 7% commission on all sales. If they sold $75,000.00 worth of products last month, what was their commission?", "options": [{"text": "$5,250.00", "isCorrect": true, "rationale": "To calculate straight commission, multiply the total sales by the commission rate. Commission = $75,000.00 * 0.07 = $5,250.00."}, {"text": "$7,500.00", "isCorrect": false, "rationale": "This option incorrectly calculates commission at 10% ($75,000 * 0.10), instead of the given 7%."}, {"text": "$525.00", "isCorrect": false, "rationale": "This option is incorrect by a factor of 10, likely a decimal placement error in the calculation ($75,000 * 0.007 or similar)."}, {"text": "$6,750.00", "isCorrect": false, "rationale": "This option reflects a miscalculation, perhaps using a different percentage or making an arithmetic error during computation."}], "id": "q05"}, {"question": "Emily earns a graduated commission: 6% on the first $12,000.00 in sales and 9% on sales above $12,000.00. If her total sales for the month were $18,000.00, what is her total commission?", "options": [{"text": "$1,080.00", "isCorrect": false, "rationale": "This option incorrectly applies only the first tier's commission rate (6%) to the entire sales amount ($18,000 * 0.06), ignoring the higher rate for sales above the threshold."}, {"text": "$1,620.00", "isCorrect": false, "rationale": "This option incorrectly applies only the second tier's commission rate (9%) to the entire sales amount ($18,000 * 0.09), ignoring the lower rate for the initial sales."}, {"text": "$1,260.00", "isCorrect": true, "rationale": "First tier commission: $12,000.00 * 0.06 = $720.00. Sales above the first tier: $18,000.00 - $12,000.00 = $6,000.00. Second tier commission: $6,000.00 * 0.09 = $540.00. Total commission = $720.00 + $540.00 = $1,260.00."}, {"text": "$1,530.00", "isCorrect": false, "rationale": "This option represents a miscalculation of the tiered amounts or rates, leading to an incorrect total."}], "id": "q06"}, {"question": "Marco is paid $3.20 for each widget he assembles. This week he assembled 180 widgets. What is his gross pay for the week?", "options": [{"text": "$576.00", "isCorrect": true, "rationale": "To calculate piecework pay, multiply the number of units produced by the rate per unit. Gross pay = 180 widgets * $3.20/widget = $576.00."}, {"text": "$183.20", "isCorrect": false, "rationale": "This option incorrectly adds the number of units and the rate, or performs some other erroneous operation, rather than multiplying."}, {"text": "$540.00", "isCorrect": false, "rationale": "This option reflects a miscalculation, perhaps using an incorrect rate or making an arithmetic error."}, {"text": "$600.00", "isCorrect": false, "rationale": "This option reflects a miscalculation or an incorrect rounding during the calculation."}], "id": "q07"}, {"question": "Which of the following statements best describes gross pay?", "options": [{"text": "The amount of pay remaining after all deductions are subtracted.", "isCorrect": false, "rationale": "This statement describes 'net pay' or 'take-home pay', not gross pay."}, {"text": "The total amount earned before any deductions are subtracted.", "isCorrect": true, "rationale": "Gross pay is defined as the total amount of money an employee earns before any deductions (like taxes, insurance, or retirement contributions) are taken out."}, {"text": "The amount paid only for regular hours worked, excluding overtime.", "isCorrect": false, "rationale": "Gross pay includes all earnings, such as regular wages, overtime pay, commissions, and piecework pay, before deductions."}, {"text": "The portion of pay that is subject to federal income tax.", "isCorrect": false, "rationale": "While gross pay is the basis for calculating taxable income, this is not its primary definition. Some deductions might be pre-tax, reducing the amount subject to federal income tax. The core definition is 'total earned before deductions'."}], "id": "q08"}, {"question": "Jamie's gross pay for the month is $3,500.00. Her deductions include FICA (7.65%), Federal Tax (15%), and a fixed health insurance premium of $120.00. What is her total amount of deductions?", "options": [{"text": "$267.75", "isCorrect": false, "rationale": "This option only calculates the FICA deduction ($3,500 * 0.0765), omitting Federal Tax and Health Insurance."}, {"text": "$525.00", "isCorrect": false, "rationale": "This option only calculates the Federal Tax deduction ($3,500 * 0.15), omitting FICA and Health Insurance."}, {"text": "$912.75", "isCorrect": true, "rationale": "FICA deduction: $3,500.00 * 0.0765 = $267.75. Federal Tax deduction: $3,500.00 * 0.15 = $525.00. Health insurance premium: $120.00. Total deductions = $267.75 + $525.00 + $120.00 = $912.75."}, {"text": "$792.75", "isCorrect": false, "rationale": "This option reflects a calculation error in summing the deductions, or incorrectly applying one of the percentage rates."}], "id": "q09"}, {"question": "Emily's gross pay is $2,800.00. Her deductions are FICA (7.65%), Federal Tax (12%), State Tax (3%), and a union due of $40.00. What is her net pay?", "options": [{"text": "$2,098.80", "isCorrect": false, "rationale": "This option reflects an incorrect calculation of total deductions, possibly due to a miscalculation of one of the percentages or by incorrectly applying percentage deductions to a reduced amount instead of the full gross pay."}, {"text": "$2,125.80", "isCorrect": true, "rationale": "First, calculate each deduction based on the full gross pay: FICA = $2,800 * 0.0765 = $214.20; Federal Tax = $2,800 * 0.12 = $336.00; State Tax = $2,800 * 0.03 = $84.00; Union Dues = $40.00. Total deductions = $214.20 + $336.00 + $84.00 + $40.00 = $674.20. Net pay = Gross pay - Total deductions = $2,800.00 - $674.20 = $2,125.80."}, {"text": "$2,189.40", "isCorrect": false, "rationale": "This option suggests a calculation error, either in the individual deductions or in the final subtraction from gross pay."}, {"text": "$2,236.00", "isCorrect": false, "rationale": "This option indicates a significant error, possibly missing one or more deductions, or a substantial arithmetic mistake."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
