<script>
var QUESTIONS = [{"question": "Urban Threads buys T-shirts for $14.00 each and uses a 60% markup on cost. What is the retail price and the markup amount for each shirt?", "options": [{"text": "Retail Price: $20.40, Markup Amount: $6.40", "isCorrect": false, "rationale": "This calculation would result from using a 60% markup on a different base or an incorrect addition."}, {"text": "Retail Price: $22.40, Markup Amount: $8.40", "isCorrect": true, "rationale": "The retail price is calculated as Cost * (1 + Markup Rate) = $14.00 * (1 + 0.60) = $14.00 * 1.60 = $22.40. The markup amount is Retail Price - Cost = $22.40 - $14.00 = $8.40."}, {"text": "Retail Price: $19.60, Markup Amount: $5.60", "isCorrect": false, "rationale": "This calculation corresponds to a 40% markup on cost, not 60%."}, {"text": "Retail Price: $23.80, Markup Amount: $9.80", "isCorrect": false, "rationale": "This calculation would result from using a 70% markup on cost, not 60%."}], "id": "q01"}, {"question": "A store initially prices a new jacket at $120.00. For a spring sale, they apply a 30% markdown. Later, any unsold jackets receive an additional 10% off the reduced price. What is the final clearance price of the jacket?", "options": [{"text": "$72.00", "isCorrect": false, "rationale": "This would be the price if a single 40% discount was applied to the original price ($120 * (1 - 0.40) = $72.00), which is incorrect for successive markdowns."}, {"text": "$75.60", "isCorrect": true, "rationale": "First markdown: $120.00 * (1 - 0.30) = $120.00 * 0.70 = $84.00. Second markdown: $84.00 * (1 - 0.10) = $84.00 * 0.90 = $75.60."}, {"text": "$84.00", "isCorrect": false, "rationale": "This is the price after only the first 30% markdown, not the final clearance price after both markdowns."}, {"text": "$76.80", "isCorrect": false, "rationale": "This would be the result of incorrect application of the successive discounts, for example, applying 10% off the original price or a calculation error."}], "id": "q02"}, {"question": "According to the text, why does applying successive discounts (e.g., 20% off, then an additional 10% off) result in a smaller total discount than simply summing the individual percentages (e.g., 30% off)?", "options": [{"text": "Retailers strategically round up prices after each discount to minimize the total markdown.", "isCorrect": false, "rationale": "While rounding occurs, it is not the primary reason for the difference in total discount. The core issue is the base on which the percentage is applied."}, {"text": "The second discount is applied to the already reduced price, not the original higher price.", "isCorrect": true, "rationale": "Successive discounts mean each subsequent discount is calculated on the current, lower price, rather than the initial full price. This naturally leads to a smaller absolute discount for each subsequent percentage than if it were applied to the original, larger amount."}, {"text": "The calculation method is designed to benefit the retailer by tricking customers into thinking they get a larger discount.", "isCorrect": false, "rationale": "This is a misinterpretation of the mathematical principle behind successive discounts, which is a standard calculation method, not a trick."}, {"text": "It is an accounting principle that prevents retailers from offering discounts greater than 50%.", "isCorrect": false, "rationale": "There is no such universal accounting principle that prevents discounts over 50%. Retailers can offer any discount they choose."}], "id": "q03"}, {"question": "A local bakery has fixed monthly costs of $1,800.00. Each specialty cake costs $8.00 in ingredients and labor (variable cost) and sells for $26.00. How many cakes must the bakery sell each month to break even?", "options": [{"text": "70 cakes", "isCorrect": false, "rationale": "This might be a result of using the variable cost in the denominator or an incorrect calculation of the contribution margin."}, {"text": "100 cakes", "isCorrect": true, "rationale": "The contribution margin per cake is Price - Variable Cost = $26.00 - $8.00 = $18.00. Break-even quantity (Q) = Fixed Costs / Contribution Margin = $1,800.00 / $18.00 = 100 cakes."}, {"text": "129 cakes", "isCorrect": false, "rationale": "This would be the result if the selling price was used in the denominator, or a calculation error."}, {"text": "225 cakes", "isCorrect": false, "rationale": "This would be the result if the variable cost was added to the fixed cost before dividing by the price, or an error in the formula."}], "id": "q04"}, {"question": "Using the bakery from the previous question (Fixed Costs: $1,800, Variable Cost: $8.00, Selling Price: $26.00), if they sell 150 cakes in a month, what is their profit?", "options": [{"text": "$500.00", "isCorrect": false, "rationale": "This calculation is too low; it might be missing a part of the total cost or revenue calculation."}, {"text": "$700.00", "isCorrect": false, "rationale": "This calculation is too low; it might be missing a part of the total cost or revenue calculation."}, {"text": "$900.00", "isCorrect": true, "rationale": "Revenue = 150 cakes * $26.00/cake = $3,900.00. Total Variable Costs = 150 cakes * $8.00/cake = $1,200.00. Total Costs = Fixed Costs + Total Variable Costs = $1,800.00 + $1,200.00 = $3,000.00. Profit = Revenue - Total Costs = $3,900.00 - $3,000.00 = $900.00."}, {"text": "$1,200.00", "isCorrect": false, "rationale": "This is the total variable cost for 150 cakes, not the profit."}], "id": "q05"}, {"question": "A small online store selling custom phone cases has monthly fixed costs of $1,000.00. Each case costs $5.00 to produce (variable cost). If the owner wants to sell 400 cases per month and achieve a monthly profit of $600.00, what is the minimum selling price per case?", "options": [{"text": "$7.50", "isCorrect": false, "rationale": "This would be the price if the profit goal was lower, or if there was an error in calculating total required revenue."}, {"text": "$8.00", "isCorrect": false, "rationale": "This would be the price if the profit goal was zero, i.e., just covering fixed and variable costs at that quantity ($1000 + 400*5)/400 = $7.50, or if total costs were divided by units, but a specific profit is desired."}, {"text": "$9.00", "isCorrect": true, "rationale": "Profit = (Price - Variable Cost) * Quantity - Fixed Costs. We need to solve for Price (P): $600 = (P - $5.00)(400) - $1,000. Add fixed costs to both sides: $1,600 = (P - $5.00)(400). Divide by quantity: $1,600 / 400 = P - $5.00 => $4.00 = P - $5.00. So, P = $9.00."}, {"text": "$9.50", "isCorrect": false, "rationale": "This would be the result if there was an error in calculating the desired profit per unit or the overall equation."}], "id": "q06"}, {"question": "A toy manufacturer produces a doll for $15.00. They sell it to a distributor with a 30% markup on cost. The distributor then sells to a retail store with a 20% markup on cost. Finally, the retail store marks up the doll 60% on cost for the consumer. What is the final price the consumer pays?", "options": [{"text": "$29.25", "isCorrect": false, "rationale": "This calculation likely misapplies one of the markups or sums percentages incorrectly."}, {"text": "$37.44", "isCorrect": true, "rationale": "Manufacturer to distributor: $15.00 * 1.30 = $19.50. Distributor to retailer: $19.50 * 1.20 = $23.40. Retailer to consumer: $23.40 * 1.60 = $37.44."}, {"text": "$40.50", "isCorrect": false, "rationale": "This calculation might involve a single large markup or miscalculation in the chain."}, {"text": "$33.75", "isCorrect": false, "rationale": "This calculation is too low and indicates an error in applying the sequential markups."}], "id": "q07"}, {"question": "What is the primary reason the textbook emphasizes that pricing decisions are 'among the most important choices a business makes'?", "options": [{"text": "Because they dictate the company's marketing budget and advertising strategies.", "isCorrect": false, "rationale": "While pricing can influence budget, it is not the primary reason for its critical importance as stated in the text. The core impact is on financial viability."}, {"text": "Because they directly impact a business's ability to attract customers and cover its costs, determining its overall success or failure.", "isCorrect": true, "rationale": "The text explicitly states: 'Set the price too high and customers go elsewhere; set it too low and the business cannot cover its costs.' This highlights the dual risk of incorrect pricing on both revenue generation (attracting customers) and cost recovery (profitability)."}, {"text": "Because government regulations heavily control pricing in most industries, requiring careful compliance.", "isCorrect": false, "rationale": "While regulations exist in some sectors, the text emphasizes general business success factors, not primarily regulatory compliance, as the main reason for pricing's importance."}, {"text": "Because pricing strategies must constantly adapt to global economic shifts and currency fluctuations.", "isCorrect": false, "rationale": "While economic factors are relevant to pricing, the text's primary emphasis on its importance is more fundamental to the business's immediate operational success rather than macro-economic adaptability."}], "id": "q08"}, {"question": "Which of the following scenarios best illustrates the 'everyday low pricing' (EDLP) strategy?", "options": [{"text": "A clothing boutique that sets high initial prices for new arrivals but holds frequent seasonal sales with deep discounts.", "isCorrect": false, "rationale": "This describes 'high-low pricing,' where initial prices are high, followed by sales."}, {"text": "A grocery store that consistently offers products at competitive prices with smaller markups and very few promotional sales.", "isCorrect": true, "rationale": "EDLP is characterized by smaller markups and fewer sales, maintaining consistent, competitive prices, as exemplified by warehouse clubs mentioned in the text."}, {"text": "An electronics store that matches competitor prices only when a customer presents a lower advertised price.", "isCorrect": false, "rationale": "This describes a price-matching strategy, which is distinct from EDLP or high-low pricing."}, {"text": "A restaurant that varies its menu prices daily based on the fluctuating cost of fresh ingredients.", "isCorrect": false, "rationale": "This describes dynamic or cost-plus pricing, reacting to input costs, not a fixed strategy like EDLP."}], "id": "q09"}, {"question": "A company produces a specialty item for $25.00 (variable cost). They plan to sell 1,000 units per month. Their fixed monthly costs are $7,500.00. If they want to achieve a 120% markup on cost to cover their costs and achieve a desired profit, what should their selling price be?", "options": [{"text": "$45.00", "isCorrect": false, "rationale": "A 120% markup on variable cost would be $25 * (1 + 1.20) = $55.00. This option is incorrect."}, {"text": "$50.00", "isCorrect": false, "rationale": "If the selling price was $50.00, the markup on cost would be ($50 - $25) / $25 = 100%, not 120%."}, {"text": "$55.00", "isCorrect": true, "rationale": "A 120% markup on the $25.00 variable cost means the selling price (P) is $25.00 * (1 + 1.20) = $25.00 * 2.20 = $55.00. This price will cover the variable cost and contribute to fixed costs and profit. The question asks what the selling price *should be* for a 120% markup on cost, which is directly calculated here. The fixed costs and units sold would determine the *achieved* profit at this price, but the question specifically asks for the price corresponding to a 120% markup on cost."}, {"text": "$62.50", "isCorrect": false, "rationale": "This would correspond to a 150% markup on cost, or another calculation error."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
