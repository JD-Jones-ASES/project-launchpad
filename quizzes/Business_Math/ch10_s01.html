    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "Which of the following statements represents a linear inequality in two variables?", "options": [{"text": "A) 3x + 2y = 15", "isCorrect": false, "rationale": "This is a linear equation, not an inequality, as it uses an equality symbol (=) instead of an inequality symbol."}, {"text": "B) x + y^2 < 20", "isCorrect": false, "rationale": "This is not a linear inequality because the 'y' variable is squared, making the term non-linear."}, {"text": "C) 5x - y >= 8", "isCorrect": true, "rationale": "This fits the definition of a linear inequality in two variables (ax + by >= c), as it uses an inequality symbol and all variables are raised to the power of one."}, {"text": "D) 2x + 3y + z <= 10", "isCorrect": false, "rationale": "This is a linear inequality, but it involves three variables (x, y, and z), not two, as specified in the definition for this section."}]}, {"question": "Given the inequality 4x - y >= 15, which of the following ordered pairs is NOT a solution?", "options": [{"text": "A) (5, 0)", "isCorrect": false, "rationale": "Substituting (5, 0) gives 4(5) - 0 = 20. Since 20 >= 15 is true, (5, 0) is a solution."}, {"text": "B) (3, 1)", "isCorrect": true, "rationale": "Substituting (3, 1) gives 4(3) - 1 = 12 - 1 = 11. Since 11 >= 15 is false, (3, 1) is not a solution."}, {"text": "C) (4, 1)", "isCorrect": false, "rationale": "Substituting (4, 1) gives 4(4) - 1 = 16 - 1 = 15. Since 15 >= 15 is true, (4, 1) is a solution."}, {"text": "D) (10, 20)", "isCorrect": false, "rationale": "Substituting (10, 20) gives 4(10) - 20 = 40 - 20 = 20. Since 20 >= 15 is true, (10, 20) is a solution."}]}, {"question": "When graphing a linear inequality, which of the following symbols requires the use of a dashed line for its boundary?", "options": [{"text": "A) > (greater than)", "isCorrect": true, "rationale": "According to the graphing properties, a dashed line is used for strict inequalities (< or >), indicating that points on the line itself are not included in the solution set."}, {"text": "B) <= (less than or equal to)", "isCorrect": false, "rationale": "The symbol <= indicates that the boundary line is included in the solution set, thus requiring a solid line."}, {"text": "C) >= (greater than or equal to)", "isCorrect": false, "rationale": "The symbol >= indicates that the boundary line is included in the solution set, thus requiring a solid line."}, {"text": "D) = (equal to)", "isCorrect": false, "rationale": "The equality symbol defines a line itself, not an inequality region. If it were part of an inequality (e.g., in <= or >=), it would contribute to a solid line."}]}, {"question": "To graph the inequality x + 3y >= 9, you would first graph the boundary line x + 3y = 9. If you use the test point (0, 0), what is the result and which region would you shade?", "options": [{"text": "A) The test point results in 0 >= 9 (True), so shade the side containing the origin.", "isCorrect": false, "rationale": "The statement 0 >= 9 is false, not true. Therefore, you would not shade the side containing the origin."}, {"text": "B) The test point results in 0 >= 9 (False), so shade the side containing the origin.", "isCorrect": false, "rationale": "While the test point results in a false statement (0 >= 9 is false), you would shade the side *opposite* the origin, not the side containing it."}, {"text": "C) The test point results in 0 >= 9 (True), so shade the side opposite the origin.", "isCorrect": false, "rationale": "The statement 0 >= 9 is false, not true. Even if it were true, you would shade the side containing the origin."}, {"text": "D) The test point results in 0 >= 9 (False), so shade the side opposite the origin.", "isCorrect": true, "rationale": "Substituting (0, 0) into x + 3y >= 9 gives 0 + 3(0) >= 9, which simplifies to 0 >= 9. This statement is false. Therefore, you shade the region that does not contain the origin (the side opposite the origin)."}]}, {"question": "In the context of linear programming for business problems, what is the primary reason for almost always including the non-negativity constraints x >= 0 and y >= 0?", "options": [{"text": "A) To simplify the mathematical calculations required to find corner points.", "isCorrect": false, "rationale": "While it can simplify the domain, the primary reason is not computational ease but real-world representation."}, {"text": "B) To ensure that the feasible region is always bounded and finite.", "isCorrect": false, "rationale": "Non-negativity constraints do restrict the region but do not guarantee it is bounded. Some feasible regions can still be unbounded even with these constraints (as shown in an example in the text)."}, {"text": "C) To reflect that real-world quantities like hours, dollars, or units produced cannot be negative.", "isCorrect": true, "rationale": "The text explicitly states: 'In business problems, quantities like hours, dollars, and units produced cannot be negative. That is why we almost always include the non-negativity constraints x >= 0 and y >= 0.'"}, {"text": "D) To restrict the solution set exclusively to the first quadrant of the coordinate plane.", "isCorrect": false, "rationale": "Restricting to the first quadrant is a *result* of applying these constraints, but it's not the primary *reason* for their inclusion. The reason is the physical impossibility of negative quantities."}]}, {"question": "What is the defining characteristic of a 'feasible region' in a system of linear inequalities?", "options": [{"text": "A) It is the area where at least one of the inequalities in the system is satisfied.", "isCorrect": false, "rationale": "The feasible region must satisfy *all* inequalities simultaneously, not just at least one."}, {"text": "B) It is the region of the coordinate plane that contains the origin (0, 0).", "isCorrect": false, "rationale": "The feasible region may or may not contain the origin, depending on the specific inequalities. The origin is simply a convenient test point."}, {"text": "C) It is the set of all points that satisfy every inequality in the system simultaneously.", "isCorrect": true, "rationale": "The text defines the feasible region as 'the set of all points that satisfy every inequality in the system simultaneously,' often found by identifying where all shaded regions overlap."}, {"text": "D) It is the area enclosed by all the boundary lines, regardless of shading.", "isCorrect": false, "rationale": "The feasible region is defined by the solution to the inequalities, which involves shading, not just the boundary lines. It's the overlap of the shaded areas."}]}, {"question": "Consider the system of inequalities: x + 2y <= 10, 3x + y <= 12, x >= 0, y >= 0. Which of the following is a corner point of the feasible region, specifically the intersection of x + 2y = 10 and 3x + y = 12?", "options": [{"text": "A) (0, 0)", "isCorrect": false, "rationale": "This is the intersection of x=0 and y=0, but not of the two given constraint lines."}, {"text": "B) (10, 0)", "isCorrect": false, "rationale": "This is the x-intercept of x + 2y = 10, but it does not satisfy 3x + y = 12 (3(10) + 0 = 30 != 12)."}, {"text": "C) (0, 6)", "isCorrect": false, "rationale": "This is the y-intercept of 3x + y = 12, but it does not satisfy x + 2y = 10 (0 + 2(6) = 12 != 10)."}, {"text": "D) (2.8, 3.6)", "isCorrect": true, "rationale": "As solved in the 'Quick Practice' example, multiplying the first equation by -3 gives -3x - 6y = -30. Adding this to 3x + y = 12 yields -5y = -18, so y = 3.6. Substituting y = 3.6 into x + 2y = 10 gives x + 2(3.6) = 10, so x + 7.2 = 10, which means x = 2.8. Thus, (2.8, 3.6) is the intersection."}]}, {"question": "The Corner Point Theorem states that if a linear programming problem has an optimal solution, it occurs at a corner point of the feasible region. Why is this true?", "options": [{"text": "A) Corner points are always easier to calculate than interior points, making them ideal for evaluation.", "isCorrect": false, "rationale": "Ease of calculation is a practical benefit, but not the fundamental mathematical reason for the theorem."}, {"text": "B) The linear nature of the objective function means its value will reach its maximum or minimum at the extreme points (vertices) of the polygonal feasible region.", "isCorrect": true, "rationale": "The text explains this by visualizing the objective function as a sliding line: 'The last (or first) place it touches the region will always be at a corner point, never in the middle,' due to its linear property."}, {"text": "C) Only corner points can guarantee integer solutions, which are often required in business problems.", "isCorrect": false, "rationale": "Corner points do not guarantee integer solutions (as seen in the (2.8, 3.6) example), and the theorem applies regardless of whether integer solutions are required."}, {"text": "D) By definition, corner points are the only points within the feasible region that satisfy all constraints simultaneously.", "isCorrect": false, "rationale": "Any point within the feasible region (including interior points) satisfies all constraints. Corner points are special because they are the intersection of boundary lines."}]}, {"question": "An objective function Z = 5x + 4y needs to be maximized, subject to certain constraints. If the feasible region's corner points are (0, 0), (6, 0), (4, 4), and (0, 8), what is the maximum value of Z?", "options": [{"text": "A) Z = 0 at (0, 0)", "isCorrect": false, "rationale": "Evaluating Z at (0, 0) gives Z = 5(0) + 4(0) = 0. This is the minimum, not the maximum value for this set of corners."}, {"text": "B) Z = 30 at (6, 0)", "isCorrect": false, "rationale": "Evaluating Z at (6, 0) gives Z = 5(6) + 4(0) = 30. This is a possible value, but not the maximum."}, {"text": "C) Z = 36 at (4, 4)", "isCorrect": true, "rationale": "Evaluating Z at (4, 4) gives Z = 5(4) + 4(4) = 20 + 16 = 36. Comparing all values (0, 30, 36, 32), 36 is the maximum value."}, {"text": "D) Z = 32 at (0, 8)", "isCorrect": false, "rationale": "Evaluating Z at (0, 8) gives Z = 5(0) + 4(8) = 32. This is a possible value, but not the maximum."}]}, {"question": "According to the 'Summary of the Linear Programming Process' at the end of the section, what is the *first* step in solving a linear programming problem?", "options": [{"text": "A) Graph the feasible region.", "isCorrect": false, "rationale": "Graphing the feasible region is a crucial step, but it comes after defining variables and writing the objective function and constraints."}, {"text": "B) Define the decision variables (x and y).", "isCorrect": true, "rationale": "The 'Summary of the Linear Programming Process' lists 'Define the decision variables (x and y)' as the very first step."}, {"text": "C) Find all corner points.", "isCorrect": false, "rationale": "Finding corner points is an essential step, but it occurs after defining variables, functions, constraints, and graphing the feasible region."}, {"text": "D) Evaluate the objective function at each corner.", "isCorrect": false, "rationale": "Evaluating the objective function is done near the end of the process, after identifying all corner points."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
