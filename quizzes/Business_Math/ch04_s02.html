    };

<div class="quiz-container">

        <a href="../../courses/Business_Math.html">&larr; Back to Business Math: Practical Applications</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Business Math: Practical Applications &mdash; Chapter 4, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Rivera's Landscaping borrows $15,000 at 9% simple interest for 90 days. Using the banker's year (360 days), what is the total amount Rivera's Landscaping will repay?", "options": [{"text": "$337.50", "isCorrect": false, "rationale": "This amount represents only the interest charged, not the total repayment (maturity value)."}, {"text": "$15,337.50", "isCorrect": true, "rationale": "First, calculate the interest (I = Prt): $15,000 * 0.09 * (90/360) = $337.50. Then, add the interest to the principal to find the total repayment (A = P + I): $15,000 + $337.50 = $15,337.50."}, {"text": "$15,342.47", "isCorrect": false, "rationale": "This calculation would result if a standard 365-day year was used, which is incorrect as the problem specifies the banker's year (360 days). $15,000 * 0.09 * (90/365) = $332.88 interest, leading to $15,332.88 total."}, {"text": "$1,350.00", "isCorrect": false, "rationale": "This amount would be the interest if the loan was for a full year ($15,000 * 0.09 * 1 year = $1,350), not 90 days."}], "id": "q01"}, {"question": "According to the text, what is the primary historical reason for using the 'banker's year' of 360 days for commercial loan calculations?", "options": [{"text": "It accurately reflects the average number of business days in a year.", "isCorrect": false, "rationale": "The text states the banker's year 'dates back centuries' and was chosen for computational ease, not necessarily for reflecting average business days."}, {"text": "It allows for higher interest earnings for banks due to the shorter duration.", "isCorrect": false, "rationale": "The text does not mention this as the primary reason. While it can slightly alter calculations, the main reason cited is computational simplicity."}, {"text": "It simplifies manual calculations because 360 is evenly divisible by many small numbers.", "isCorrect": true, "rationale": "The 'didyouknow' section explicitly states that 'Dividing by 360 is much easier than dividing by 365, and 360 is evenly divisible by 2, 3, 4, 5, 6, 8, 9, 10, and 12,' making calculations easier when done by hand."}, {"text": "It is a legal requirement for all short-term business loans.", "isCorrect": false, "rationale": "The text states 'Many commercial loans still use the 360-day year today,' implying it's a common practice, not necessarily a universal legal requirement."}], "id": "q02"}, {"question": "Tanya has $8,000 to deposit. First National offers 4.5% compounded monthly, while Community Savings offers 4.6% compounded quarterly. After 4 years, which bank will give Tanya more money and by how much?", "options": [{"text": "First National by $31.85", "isCorrect": false, "rationale": "First National yields less total money. The difference amount is correct, but the bank is incorrect."}, {"text": "Community Savings by $31.85", "isCorrect": true, "rationale": "The example calculates: First National yields $9,574.51 (A = 8,000(1 + 0.045/12)^(12*4)). Community Savings yields $9,606.36 (A = 8,000(1 + 0.046/4)^(4*4)). Community Savings earns $9,606.36 - $9,574.51 = $31.85 more."}, {"text": "First National by $12.35", "isCorrect": false, "rationale": "This option misidentifies the better bank and the difference in earnings."}, {"text": "Community Savings by $12.35", "isCorrect": false, "rationale": "This option correctly identifies the better bank but uses an incorrect difference amount."}], "id": "q03"}, {"question": "Which statement accurately describes the utility of comparing Annual Percentage Yield (APY) when evaluating different savings accounts?", "options": [{"text": "APY helps compare accounts with different principal amounts, showing which grows faster.", "isCorrect": false, "rationale": "APY is a standardized rate based on a $1 principal for a year, designed to compare rates and compounding frequencies, not different principal amounts directly. Principal amount affects the total dollar growth, but APY helps compare the effective rate regardless of the initial principal."}, {"text": "APY allows for a direct comparison of the effective interest rate, accounting for different compounding frequencies.", "isCorrect": true, "rationale": "The text demonstrates using APY to compare First National (4.5% compounded monthly) and Community Savings (4.6% compounded quarterly), stating 'Community Savings has the higher APY, confirming it is the better choice.' APY standardizes the comparison of interest rates by showing the actual annual rate earned, considering compounding."}, {"text": "APY indicates the total interest earned over the entire life of the account.", "isCorrect": false, "rationale": "APY is an annual rate; it does not indicate the total interest earned over an arbitrary period (e.g., 4 years) without further calculation. It is the effective annual rate."}, {"text": "APY is primarily used for comparing simple interest loans, not compound interest accounts.", "isCorrect": false, "rationale": "The text explicitly uses APY to compare compound interest accounts (First National vs. Community Savings), where compounding frequency is a key factor."}], "id": "q04"}, {"question": "Omar's Auto Repair purchases an 18-month Certificate of Deposit (CD) for $20,000 that pays 5.2% compounded semiannually. What is the total interest Omar will earn from this CD?", "options": [{"text": "$1,589.55", "isCorrect": true, "rationale": "First, calculate the maturity value (A): P = $20,000, r = 0.052, n = 2 (semiannually), t = 1.5 years (18 months). A = 20,000 * (1 + 0.052/2)^(2*1.5) = 20,000 * (1.026)^3 = $21,589.55. Then, subtract the principal to find the interest: I = A - P = $21,589.55 - $20,000.00 = $1,589.55."}, {"text": "$21,589.55", "isCorrect": false, "rationale": "This amount is the maturity value of the CD, which includes the principal, not just the interest earned."}, {"text": "$1,560.00", "isCorrect": false, "rationale": "This would be the simple interest calculation for 1.5 years ($20,000 * 0.052 * 1.5), not accounting for semiannual compounding."}, {"text": "$1,040.00", "isCorrect": false, "rationale": "This would be the simple interest for one year ($20,000 * 0.052 * 1), not for 1.5 years with compounding."}], "id": "q05"}, {"question": "Priya wants to grow her business savings from $12,000 to $15,000. Her account earns 6% simple interest. Approximately how long will it take for her savings to reach her goal?", "options": [{"text": "2.5 years", "isCorrect": false, "rationale": "This result is incorrect. The target interest needed is $3,000, and $3,000 / ($12,000 * 0.06) = 4.166... years."}, {"text": "3 years and 4 months", "isCorrect": false, "rationale": "This is incorrect. 4 months is 0.33 years, making this 3.33 years, which is not equal to 4.17 years."}, {"text": "4 years and 2 months", "isCorrect": true, "rationale": "First, calculate the interest needed: I = A - P = $15,000 - $12,000 = $3,000. Then, solve the simple interest formula I = Prt for t: t = I / (Pr) = $3,000 / ($12,000 * 0.06) = $3,000 / $720 = 4.166... years. To convert the decimal part to months: 0.166... * 12 months/year ≈ 2 months. So, approximately 4 years and 2 months."}, {"text": "5 years", "isCorrect": false, "rationale": "This result is incorrect. The target interest needed is $3,000, and $3,000 / ($12,000 * 0.06) = 4.166... years."}], "id": "q06"}, {"question": "Chen's Bakery needs to borrow $25,000 for 3 years. Option A is 7% simple interest, and Option B is 6.5% compounded monthly. Which option costs Chen's Bakery less in total interest, and by how much?", "options": [{"text": "Option B costs less by $113.12.", "isCorrect": false, "rationale": "Option B, despite having a lower stated interest rate, results in higher total interest due to compounding. Therefore, it does not cost less."}, {"text": "Option A costs less by $113.12.", "isCorrect": true, "rationale": "Option A (Simple Interest): I = Prt = $25,000 * 0.07 * 3 = $5,250. Option B (Compound Interest): A = P(1 + r/n)^(nt) = $25,000 * (1 + 0.065/12)^(12*3) = $30,363.12. Interest for Option B = $30,363.12 - $25,000 = $5,363.12. Option A costs $5,363.12 - $5,250.00 = $113.12 less."}, {"text": "Both options cost the same in total interest.", "isCorrect": false, "rationale": "The calculations clearly show a difference in total interest between the simple and compound interest options."}, {"text": "Option A costs less by $1,000.00.", "isCorrect": false, "rationale": "While Option A costs less, the difference calculated from the provided example is $113.12, not $1,000."}], "id": "q07"}, {"question": "According to the introductory paragraph, what is the fundamental role of interest in banking for both banks and savers?", "options": [{"text": "Interest is solely a penalty charged by banks for late payments on loans.", "isCorrect": false, "rationale": "While late payment penalties exist, the text describes interest broadly as a revenue source for banks on loans and a reward for savers, not solely a penalty."}, {"text": "Interest is how banks earn revenue on loans and how savers are rewarded for depositing money.", "isCorrect": true, "rationale": "The introductory paragraph states: 'Banks charge interest on loans to earn revenue. Savers earn interest on deposits as a reward for letting the bank use their money.' This directly explains the fundamental role for both parties."}, {"text": "Interest primarily serves to cover administrative costs of managing accounts.", "isCorrect": false, "rationale": "While it contributes to overall bank operations, the text highlights interest as a direct revenue source from loans and a reward for deposits, not primarily administrative cost coverage."}, {"text": "Interest is a fee banks charge for providing financial advice to customers.", "isCorrect": false, "rationale": "The text does not link interest to financial advice; it clearly links it to loans and deposits."}], "id": "q08"}, {"question": "Based on the comparison examples in the text (e.g., Tanya's deposit, Chen's loan), how does compounding frequency generally affect the total interest earned on an investment or paid on a loan, assuming the stated annual interest rate is similar?", "options": [{"text": "More frequent compounding always leads to lower total interest, regardless of whether it's an investment or a loan.", "isCorrect": false, "rationale": "This is incorrect. More frequent compounding generally leads to higher total interest on investments (like Tanya's savings) and higher total interest paid on loans (like Chen's loan), everything else being equal."}, {"text": "More frequent compounding results in higher total interest earned on investments and higher total interest paid on loans.", "isCorrect": true, "rationale": "For investments (Tanya's example), more frequent compounding (even with a slightly lower stated rate sometimes, if APY is higher) means more interest on interest, leading to a higher final amount. For loans (Chen's example), more frequent compounding also means interest is added to the principal more often, leading to a higher total amount repaid and thus higher total interest cost for the borrower."}, {"text": "Compounding frequency only impacts investments, not loans, as loan interest is always simple.", "isCorrect": false, "rationale": "The text clearly presents loan options with both simple and compound interest (Chen's Bakery example), demonstrating that compounding applies to loans as well."}, {"text": "Less frequent compounding provides a better return for savers but a higher cost for borrowers.", "isCorrect": false, "rationale": "Less frequent compounding generally provides a *lower* return for savers (compared to more frequent compounding at a similar rate) and a *lower* cost for borrowers (as seen in Chen's example where simple interest was cheaper than compound)."}], "id": "q09"}, {"question": "What is a typical consequence if a customer withdraws money from a Certificate of Deposit (CD) before its maturity date?", "options": [{"text": "The bank typically pays an additional bonus interest for early liquidity.", "isCorrect": false, "rationale": "This is incorrect. CDs are designed for fixed-term savings, and early withdrawal usually incurs penalties, not bonuses."}, {"text": "The customer forfeits only the principal amount, keeping all earned interest.", "isCorrect": false, "rationale": "This is incorrect. Penalties usually involve forfeiting some or all of the interest earned, or a portion of the principal in extreme cases, not just the principal."}, {"text": "The customer typically pays a penalty.", "isCorrect": true, "rationale": "The 'didyouknow' section on Certificates of Deposit explicitly states: 'If you withdraw early, you typically pay a penalty.'"}, {"text": "The bank converts the CD into a regular savings account with no further implications.", "isCorrect": false, "rationale": "While the funds might be moved, the primary implication mentioned is a penalty, not a seamless conversion without consequences."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
