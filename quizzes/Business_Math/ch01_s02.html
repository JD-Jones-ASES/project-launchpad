    <link rel="stylesheet" href="../../styles.css">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Business_Math.html">&larr; Back to Business Math: Practical Applications</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Business Math: Practical Applications &mdash; Chapter 1, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Maria, an office manager, receives an invoice for 18 reams of paper at $6.75 each. What is the correct line extension for this item?", "options": [{"text": "$117.00", "isCorrect": false, "rationale": "This calculation is incorrect. The correct line extension is found by multiplying the quantity by the unit price."}, {"text": "$121.50", "isCorrect": true, "rationale": "The line extension is calculated by multiplying the quantity (18) by the unit price ($6.75), which equals $121.50."}, {"text": "$24.75", "isCorrect": false, "rationale": "This calculation is incorrect. It appears to be an addition of the numbers, not the required multiplication for a line extension."}, {"text": "$135.00", "isCorrect": false, "rationale": "This calculation is incorrect. It may result from a rounding error or an incorrect multiplication."}], "id": "q01"}, {"question": "A business receives an invoice with the following extended lines: Copy paper: $510.00; Printer ink: $223.60; Sticky notes: $90.96; Binder clips: $63.75. What is the total amount due on this invoice?", "options": [{"text": "$878.31", "isCorrect": false, "rationale": "This total is incorrect. Re-adding the values $510.00, $223.60, $90.96, and $63.75 will yield a different sum."}, {"text": "$888.31", "isCorrect": true, "rationale": "To find the invoice total, you add all the extended line amounts: $510.00 + $223.60 + $90.96 + $63.75 = $888.31."}, {"text": "$898.31", "isCorrect": false, "rationale": "This total is incorrect. A simple addition error has likely occurred."}, {"text": "$908.31", "isCorrect": false, "rationale": "This total is incorrect. The sum of the given extended lines does not equal this amount."}], "id": "q02"}, {"question": "Jamal's cash register had an opening bank of $150.00. His total cash sales were $1,247.83, and he gave $38.50 in cash refunds. What is the *expected* amount of cash that should be in the drawer at the end of his shift?", "options": [{"text": "$1,357.33", "isCorrect": false, "rationale": "This calculation is incorrect. The expected cash is determined by adding the opening bank and sales, then subtracting refunds."}, {"text": "$1,359.33", "isCorrect": true, "rationale": "The expected cash in the drawer is calculated as: Opening bank + Cash sales - Cash refunds. So, $150.00 + $1,247.83 - $38.50 = $1,359.33."}, {"text": "$1,436.33", "isCorrect": false, "rationale": "This calculation is incorrect. It seems to have added refunds instead of subtracting them."}, {"text": "$1,397.83", "isCorrect": false, "rationale": "This calculation is incorrect. It may have excluded the opening bank or miscalculated the difference."}], "id": "q03"}, {"question": "If the expected cash in a register is $1,359.33 and the actual counted cash is $1,358.45, what is the status of the register and by how much?", "options": [{"text": "Over by $0.88", "isCorrect": false, "rationale": "The register is short, not over, because the actual amount is less than the expected amount."}, {"text": "Short by $0.88", "isCorrect": true, "rationale": "The difference is $1,358.45 (actual) - $1,359.33 (expected) = -$0.88. A negative difference means the register is short by $0.88."}, {"text": "Balanced", "isCorrect": false, "rationale": "The register is not balanced because the actual cash count does not match the expected amount."}, {"text": "Over by $1.12", "isCorrect": false, "rationale": "This calculation is incorrect and also indicates the wrong status. The difference is $0.88, and the register is short."}], "id": "q04"}, {"question": "Priya, a stockroom manager, needs to order supplies and has a budget of $2,000.00. Why would she use front-end estimation before calculating the exact total?", "options": [{"text": "To ensure exact financial reporting for auditing purposes.", "isCorrect": false, "rationale": "Estimation is not used for exact financial reporting or auditing. These tasks require precise calculations."}, {"text": "To get a quick, rough idea if the order is within budget and to catch obvious errors early.", "isCorrect": true, "rationale": "The text states that a rough estimate helps managers quickly see if an order fits the budget and can 'save time and catch obvious errors before submitting a purchase order.'"}, {"text": "To replace the need for precise calculations, as estimates are usually sufficient for purchasing.", "isCorrect": false, "rationale": "The text explicitly states that even if an estimate is under budget, the exact total should be calculated 'to be sure,' implying estimation does not replace precise calculations."}, {"text": "To intentionally inflate the cost to create a buffer in the budget.", "isCorrect": false, "rationale": "Estimation's purpose is not to inflate costs, but to provide a quick and reasonably accurate approximation for initial checks."}], "id": "q05"}, {"question": "Using front-end estimation, what would be the estimated cost of 48 bags of flour at $12.85 each?", "options": [{"text": "$600", "isCorrect": false, "rationale": "This estimate is incorrect. Rounding 48 to 50 and $12.85 to $13, then multiplying, results in $650."}, {"text": "$650", "isCorrect": true, "rationale": "To use front-end estimation, round 48 to its leading digit (50) and $12.85 to its leading digit ($13). Then multiply: 50 x $13 = $650."}, {"text": "$500", "isCorrect": false, "rationale": "This estimate is incorrect. While 50 x $10 = $500, the price should be rounded to $13, not $10."}, {"text": "$700", "isCorrect": false, "rationale": "This estimate is incorrect. Rounding to 50 x $14 results in $700, which is not the standard front-end estimation from the text's example."}], "id": "q06"}, {"question": "Devon, an accounts payable clerk, is checking an invoice. A line item states 30 items at $7.49 each, with an extended cost of $225.00. Based on the provided section's methods, what error should Devon identify?", "options": [{"text": "The quantity (30) is incorrect.", "isCorrect": false, "rationale": "There is no information given to suggest the quantity is incorrect; the error is in the calculation of the extension."}, {"text": "The unit price ($7.49) is incorrect.", "isCorrect": false, "rationale": "There is no information given to suggest the unit price is incorrect; the error is in the calculation of the extension."}, {"text": "The line extension is incorrect; it should be $224.70.", "isCorrect": true, "rationale": "Multiplying the quantity (30) by the unit price ($7.49) yields $224.70. The invoice lists $225.00, indicating an incorrect line extension."}, {"text": "There is no error on this line item.", "isCorrect": false, "rationale": "There is indeed an error: the calculated line extension (30 * $7.49 = $224.70) does not match the invoice's stated extension ($225.00)."}], "id": "q07"}, {"question": "A sporting goods store begins the week with 145 fishing rods. They receive 60 rods and sell 87 rods. How many fishing rods are in stock at the end of the week?", "options": [{"text": "118 rods", "isCorrect": true, "rationale": "Using the inventory equation: Beginning Inventory + Received - Sold = Ending Inventory. So, 145 + 60 - 87 = 118 fishing rods."}, {"text": "98 rods", "isCorrect": false, "rationale": "This calculation is incorrect. It may have resulted from an arithmetic error."}, {"text": "292 rods", "isCorrect": false, "rationale": "This calculation is incorrect. It appears to have added all quantities without subtracting what was sold."}, {"text": "172 rods", "isCorrect": false, "rationale": "This calculation is incorrect. It likely resulted from a miscalculation in the subtraction step."}], "id": "q08"}, {"question": "Sunrise Electronics started with 234 laptops. They received 50, sold 38, sold another 45, received 75, and sold 62. What is their ending inventory of laptops?", "options": [{"text": "264 units", "isCorrect": false, "rationale": "This calculation is incorrect. It seems some transactions were not accounted for correctly."}, {"text": "214 units", "isCorrect": true, "rationale": "The ending inventory is calculated by starting with the beginning balance and adding receipts, then subtracting sales: 234 + 50 - 38 - 45 + 75 - 62 = 214 units."}, {"text": "284 units", "isCorrect": false, "rationale": "This calculation is incorrect. There may have been an error in summing or subtracting the transactions."}, {"text": "184 units", "isCorrect": false, "rationale": "This calculation is incorrect. It suggests a higher number of units sold or fewer units received than in the problem."}], "id": "q09"}, {"question": "Which of the following scenarios best illustrates the application of 'working with numbers' skills from Section 1.1 (place value, rounding, estimation, order of operations, decimal arithmetic) to a real business task?", "options": [{"text": "A marketing team brainstorming new slogans for an advertising campaign.", "isCorrect": false, "rationale": "Brainstorming slogans is a creative task and primarily involves language and marketing strategy, not the numerical skills described."}, {"text": "A human resources manager conducting interviews for a new position.", "isCorrect": false, "rationale": "Conducting interviews focuses on evaluating candidates' qualifications and soft skills, not directly on numerical calculations."}, {"text": "An office manager reconciling a cash register and verifying an invoice total.", "isCorrect": true, "rationale": "Reconciling a cash register involves addition and subtraction (decimal arithmetic), and verifying an invoice total involves multiplication (extensions) and addition, often with decimals, directly applying the skills from Section 1.1 as described in the text."}, {"text": "A graphic designer creating a company logo.", "isCorrect": false, "rationale": "Designing a logo is a visual and artistic task that relies on design principles and software skills, not the numerical business applications discussed."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
