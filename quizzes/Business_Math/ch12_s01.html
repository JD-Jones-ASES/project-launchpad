    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz

</div>

<script>
var QUESTIONS = [{"question": "A business earned $150,000 in revenue this year and expects revenue to grow by 7% per year. What will the business's annual revenue be in 4 years?", "options": [{"text": "$195,000.00", "isCorrect": false, "rationale": "This calculation would result from simple interest or an incorrect application of the growth factor. Compound growth accumulates interest on previously earned interest."}, {"text": "$196,619.40", "isCorrect": true, "rationale": "Using the compound growth formula A = P(1 + r)^t: A = $150,000 * (1 + 0.07)^4 = $150,000 * (1.07)^4 = $150,000 * 1.310796 = $196,619.40."}, {"text": "$160,500.00", "isCorrect": false, "rationale": "This represents only one year of growth ($150,000 * 1.07), not four years of compounded growth."}, {"text": "$205,800.00", "isCorrect": false, "rationale": "This result likely comes from incorrectly adding 4 years of 7% simple interest or a miscalculation of the exponent."}], "id": "q01"}, {"question": "An investment is growing at an annual rate of 9%. Approximately how long will it take for this investment to double in value?", "options": [{"text": "10 years", "isCorrect": false, "rationale": "This would be the approximate doubling time for a 7.2% interest rate (72/7.2=10), not 9%."}, {"text": "9 years", "isCorrect": false, "rationale": "This is likely a confusion of the interest rate with the doubling time; the Rule of 72 divides 72 by the rate."}, {"text": "8 years", "isCorrect": true, "rationale": "According to the Rule of 72, the doubling time is approximately 72 divided by the annual interest rate (as a whole number). So, 72 / 9 = 8 years."}, {"text": "7.2 years", "isCorrect": false, "rationale": "This is the result if the interest rate was 10%, not 9%."}], "id": "q02"}, {"question": "Alicia deposited $300 at the end of each month into a savings account, while Ben deposited $300 at the beginning of each month into an identical account. Both accounts earn 6% annual interest compounded monthly. After 10 years, how would their accumulated future values compare?", "options": [{"text": "Alicia's future value would be higher because her payments are considered for a full period before interest is calculated.", "isCorrect": false, "rationale": "This statement is incorrect. Payments made at the end of the period (ordinary annuity) earn interest for one period less than payments made at the beginning of the period (annuity due)."}, {"text": "Ben's future value would be higher because each of his payments earns interest for one additional period compared to Alicia's.", "isCorrect": true, "rationale": "Ben's deposits constitute an annuity due, where payments are made at the beginning of each period. This means each payment earns interest for one more period than an ordinary annuity, resulting in a higher future value. As per the text, FV_due = FV_ordinary * (1 + r)."}, {"text": "Their future values would be exactly the same, as the total amount deposited and the interest rate are identical.", "isCorrect": false, "rationale": "The timing of payments within the period significantly affects the total interest earned due to compounding."}, {"text": "Alicia's future value would be higher, but only marginally, due to the shorter compounding periods for her deposits.", "isCorrect": false, "rationale": "Alicia's future value would be lower, not higher. The difference can be significant over long periods, as shown in the text's example ($245.82 more over 10 years for an annuity due)."}], "id": "q03"}, {"question": "A student deposits $250 at the end of every month into an education fund that earns 4.8% annual interest, compounded monthly. How much will she have accumulated after 5 years?", "options": [{"text": "$15,000.00", "isCorrect": false, "rationale": "This amount represents only the total principal deposited ($250 * 12 months * 5 years = $15,000), without any earned interest."}, {"text": "$16,905.56", "isCorrect": true, "rationale": "Using the Future Value of an Ordinary Annuity formula: PMT = $250, r = 0.048/12 = 0.004, n = 5 * 12 = 60. FV = $250 * [((1 + 0.004)^60 - 1) / 0.004] = $250 * [(1.004^60 - 1) / 0.004] = $250 * (0.270489 / 0.004) = $250 * 67.62225 = $16,905.56."}, {"text": "$17,043.60", "isCorrect": false, "rationale": "This calculation might be the result of treating it as an annuity due, or another misapplication of the formula for an ordinary annuity."}, {"text": "$14,790.00", "isCorrect": false, "rationale": "This amount is less than the total principal deposited, which is incorrect for a savings account earning interest."}], "id": "q04"}, {"question": "Which scenario best illustrates the concept of 'present value of a lump sum'?", "options": [{"text": "Calculating how much a series of regular savings deposits will be worth in 10 years.", "isCorrect": false, "rationale": "This describes the future value of an annuity, not the present value of a lump sum."}, {"text": "Determining how much you need to save each month to reach a specific financial goal in the future.", "isCorrect": false, "rationale": "This describes a sinking fund payment calculation, which is related to the future value of an annuity, not the present value of a lump sum."}, {"text": "Finding out what a $100,000 inheritance, receivable in 5 years, is equivalent to in today's money.", "isCorrect": true, "rationale": "This scenario directly asks for the current worth ('today's money') of a single future payment ('lump sum'), which is the definition of present value of a lump sum."}, {"text": "Estimating the number of years it will take for your investment to double at a given interest rate.", "isCorrect": false, "rationale": "This describes the application of the Rule of 72, which is about doubling time, not present value."}], "id": "q05"}, {"question": "A business will receive a payment of $75,000 in 10 years. If the company can earn 6% annually on its investments, what is the present value of that payment today?", "options": [{"text": "$45,000.00", "isCorrect": false, "rationale": "This is a simple interest calculation or a misapplication of the discount factor."}, {"text": "$41,880.89", "isCorrect": true, "rationale": "Using the Present Value of a Lump Sum formula: PV = FV / (1 + r)^n. PV = $75,000 / (1 + 0.06)^10 = $75,000 / (1.06)^10 = $75,000 / 1.790847 = $41,880.89."}, {"text": "$134,313.56", "isCorrect": false, "rationale": "This amount represents the future value of $75,000 if it were invested today, not its present value."}, {"text": "$70,500.00", "isCorrect": false, "rationale": "This figure is incorrect and does not reflect discounting over 10 years at a 6% rate."}], "id": "q06"}, {"question": "According to the 'time value of money' concept discussed, how does a higher interest rate generally affect the present value of a future amount?", "options": [{"text": "It increases the present value, as the future amount is more valuable.", "isCorrect": false, "rationale": "A higher interest rate means a smaller initial investment is needed to reach a future value, thus decreasing the present value."}, {"text": "It decreases the present value, because a smaller amount today would grow to that future value.", "isCorrect": true, "rationale": "The text states: 'The higher the interest rate, the less a future dollar is worth today (because a smaller amount today would grow to that future value).' This means present value decreases."}, {"text": "It has no effect on the present value, as present value is fixed once the future amount is determined.", "isCorrect": false, "rationale": "The interest rate is a critical component in calculating present value; therefore, it definitely has an effect."}, {"text": "It only affects the future value, not the present value, of a single lump sum.", "isCorrect": false, "rationale": "The interest rate is the discount rate used to bring future values back to the present, so it directly impacts present value."}], "id": "q07"}, {"question": "A lottery winner receives $1,500 per month for 20 years. If the current discount rate is 5.4% compounded monthly, what is the present value of this income stream?", "options": [{"text": "$219,980.66", "isCorrect": true, "rationale": "Using the Present Value of an Annuity formula: PMT = $1,500, r = 0.054/12 = 0.0045, n = 20 * 12 = 240. PV = $1,500 * [1 - (1 + 0.0045)^-240 / 0.0045] = $1,500 * [1 - (1.0045)^-240 / 0.0045] = $1,500 * [1 - 0.340058 / 0.0045] = $1,500 * [0.659942 / 0.0045] = $1,500 * 146.65377 = $219,980.66."}, {"text": "$360,000.00", "isCorrect": false, "rationale": "This is simply the total sum of payments ($1,500 * 240 months) without considering the time value of money (discounting)."}, {"text": "$167,488.75", "isCorrect": false, "rationale": "This value is too low and indicates a potential miscalculation of the discount factor or an incorrect formula application."}, {"text": "$295,432.18", "isCorrect": false, "rationale": "This result suggests an error in the calculation, possibly using a future value annuity formula or an incorrect exponent."}], "id": "q08"}, {"question": "What is the primary objective of establishing a sinking fund?", "options": [{"text": "To determine the present value of a series of future payments.", "isCorrect": false, "rationale": "This describes the purpose of calculating the present value of an annuity, not a sinking fund."}, {"text": "To make regular deposits to accumulate a specific, predetermined amount by a future target date.", "isCorrect": true, "rationale": "The definition provided states, 'A sinking fund is a savings plan where you make regular deposits to accumulate a specific amount by a target date.'"}, {"text": "To calculate the total interest earned on a single lump sum investment over time.", "isCorrect": false, "rationale": "This relates to compound growth calculations for a single deposit, not a sinking fund."}, {"text": "To compare the future value of an ordinary annuity with an annuity due.", "isCorrect": false, "rationale": "This involves comparing different types of annuities, which is a different concept from a sinking fund's purpose."}], "id": "q09"}, {"question": "A small business needs to save $50,000 in 4 years to purchase a new machine. They can deposit money at the end of each month into an account earning 3.6% annual interest compounded monthly. How much must they deposit each month to reach their goal?", "options": [{"text": "$968.05", "isCorrect": true, "rationale": "Using the Sinking Fund Payment formula (rearranged FV Annuity formula): FV = $50,000, r = 0.036/12 = 0.003, n = 4 * 12 = 48. PMT = FV * [r / ((1 + r)^n - 1)] = $50,000 * [0.003 / ((1.003)^48 - 1)] = $50,000 * [0.003 / (1.154944 - 1)] = $50,000 * [0.003 / 0.154944] = $50,000 * 0.019361 = $968.05."}, {"text": "$1,041.67", "isCorrect": false, "rationale": "This would be the monthly payment if no interest was earned ($50,000 / 48 months), which is incorrect for a savings plan earning interest."}, {"text": "$1,090.87", "isCorrect": false, "rationale": "This result likely comes from a miscalculation, possibly using an incorrect exponent or an inverted formula component."}, {"text": "$915.22", "isCorrect": false, "rationale": "This value is too low, indicating an error in the calculation of the annuity factor."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
