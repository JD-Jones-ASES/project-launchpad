    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Business_Math.html">&larr; Back to Business Math: Practical Applications</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Business Math: Practical Applications &mdash; Chapter 8, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the primary benefit of using graphs and charts in business data analysis?", "options": [{"text": "They eliminate the need for detailed tables and raw numerical data.", "isCorrect": false, "rationale": "While graphs summarize data, they do not eliminate the need for the underlying detailed tables; they interpret them. The text states a table might be hard to interpret, but a chart tells the story, implying the table still exists."}, {"text": "They make numerical data instantly interpretable by turning numbers into pictures.", "isCorrect": true, "rationale": "The first sentence of the section states, 'Graphs and charts turn numbers into pictures,' and 'a bar chart of the same data tells the story instantly,' highlighting the primary benefit of immediate interpretation."}, {"text": "They are the only method available for presenting business data visually.", "isCorrect": false, "rationale": "The text does not claim graphs are the only visual method; rather, it highlights their utility. Other visual methods (like infographics, dashboards) exist, though not discussed here."}, {"text": "They automatically prevent any form of misinterpretation or misleading presentation.", "isCorrect": false, "rationale": "The section explicitly covers 'Misleading Graphs,' indicating that graphs can, in fact, distort data and mislead the reader, thus not automatically preventing misinterpretation."}]}, {"question": "In a double bar graph, which element is essential for understanding which data set each bar represents?", "options": [{"text": "The title", "isCorrect": false, "rationale": "The title explains what the graph is about, but not which specific bar color/pattern corresponds to which data set in a double bar graph."}, {"text": "The axis labels", "isCorrect": false, "rationale": "Axis labels describe what each axis represents (e.g., categories, values), but not the distinction between multiple data sets within those categories."}, {"text": "The legend", "isCorrect": true, "rationale": "The text explicitly defines a double bar graph as using a 'legend [to] identif[y] which color or pattern represents which data set.'"}, {"text": "The scale", "isCorrect": false, "rationale": "The scale refers to the spacing of numbers along the value axis, used for reading values, not for differentiating data sets in a grouped graph."}]}, {"question": "A bar graph shows the following quarterly revenues for a startup: Q1 = $25,000, Q2 = $32,000, Q3 = $28,000, Q4 = $38,000. What is the difference in revenue between the quarter with the highest sales and the quarter with the lowest sales?", "options": [{"text": "$6,000", "isCorrect": false, "rationale": "This value ($38,000 - $32,000) represents the difference between Q4 and Q2, not the highest and lowest overall."}, {"text": "$13,000", "isCorrect": true, "rationale": "The highest sales are in Q4 ($38,000) and the lowest are in Q1 ($25,000). The difference is $38,000 - $25,000 = $13,000, as per the 'To compare values' instruction."}, {"text": "$10,000", "isCorrect": false, "rationale": "This value is incorrect. It might be a miscalculation like $38,000 - $28,000, which is not the highest minus the lowest."}, {"text": "$7,000", "isCorrect": false, "rationale": "This value ($32,000 - $25,000) represents the difference between Q2 and Q1, not the highest and lowest overall."}]}, {"question": "A line graph tracking a company's stock price shows a line segment that is gently sloping upwards from March to June. What does this suggest about the stock price during that period?", "options": [{"text": "The stock price experienced slow, steady growth.", "isCorrect": true, "rationale": "The text states, 'A gentle upward line means slow growth.' This aligns with a 'gently sloping upwards' segment."}, {"text": "The stock price fluctuated significantly.", "isCorrect": false, "rationale": "Fluctuating means the line goes up and down with no clear direction. A 'gently sloping upwards' line implies a consistent, albeit slow, increase."}, {"text": "The stock price remained stable.", "isCorrect": false, "rationale": "A stable (flat) trend means the line stays roughly level. An upward slope, even gentle, indicates growth, not stability."}, {"text": "The stock price decreased rapidly.", "isCorrect": false, "rationale": "A rapid decrease would be indicated by a steep downward line. An upward slope signifies an increase, not a decrease."}]}, {"question": "A line graph illustrates a product's manufacturing cost per unit. In January, the cost was $50. By April (3 months later), the cost had risen to $59. What was the average rate of change in manufacturing cost per month?", "options": [{"text": "$9.00 per month", "isCorrect": false, "rationale": "This is the total change in cost, not the rate of change per month. The rate is the change in cost divided by the change in months."}, {"text": "$3.00 per month", "isCorrect": true, "rationale": "The rate of change is (Change in vertical value) / (Change in horizontal value). Here, it's ($59 - $50) / (April - January) = $9 / 3 months = $3.00 per month."}, {"text": "$1.50 per month", "isCorrect": false, "rationale": "This would be the rate if the change was $4.50 over 3 months, or $9 over 6 months, neither of which is the case."}, {"text": "$2.25 per month", "isCorrect": false, "rationale": "This would be the rate if the change was $9 over 4 months, but the period is 3 months (January to April)."}]}, {"question": "What principle governs the size of each sector (slice) in a circle graph?", "options": [{"text": "Each sector must be of equal size to ensure fairness.", "isCorrect": false, "rationale": "The text explicitly states, 'The size of each sector is proportional to the category's percent of the total,' directly contradicting the idea of equal size."}, {"text": "The size is determined by the total number of categories presented.", "isCorrect": false, "rationale": "While the number of categories affects how many slices there are, it does not determine the *size* of individual slices relative to their share of the whole."}, {"text": "The size of each sector is directly proportional to the category's percentage of the total.", "isCorrect": true, "rationale": "The definition of a circle graph states, 'Each sector represents a category's share of the whole. The size of each sector is proportional to the category's percent of the total.'"}, {"text": "The size is based on the aesthetic appeal determined by the graph designer.", "isCorrect": false, "rationale": "Graph design should be driven by data accuracy, not just aesthetics, especially for informative graphs like pie charts which have strict rules for proportionality."}]}, {"question": "A survey shows that 18% of customers prefer product X, 32% prefer product Y, and the rest prefer product Z. If you were creating a circle graph, what central angle would represent the customers who prefer product X?", "options": [{"text": "18 degrees", "isCorrect": false, "rationale": "18 degrees is the percentage itself, not the converted central angle. The conversion factor 3.6 must be applied."}, {"text": "32 degrees", "isCorrect": false, "rationale": "This is the percentage for Product Y, not Product X, and it's not converted to an angle."}, {"text": "64.8 degrees", "isCorrect": true, "rationale": "To convert a percent to a central angle, the formula is 'Percent × 3.6'. For Product X, this is 18 × 3.6 = 64.8 degrees."}, {"text": "115.2 degrees", "isCorrect": false, "rationale": "This angle (32 × 3.6) would represent Product Y, not Product X."}]}, {"question": "A company's annual budget of $500,000 is represented by a pie chart. If the 'Research & Development' sector accounts for 25% of the budget, what is the actual dollar amount allocated to Research & Development?", "options": [{"text": "$25,000.00", "isCorrect": false, "rationale": "This would be 5% of the budget ($500,000 * 0.05), not 25%."}, {"text": "$125,000.00", "isCorrect": true, "rationale": "To find the amount, multiply the total by the percentage (as a decimal): $500,000 * 0.25 = $125,000.00. This follows the method shown in 'Reading a Circle Graph' example."}, {"text": "$250,000.00", "isCorrect": false, "rationale": "This would be 50% of the budget, not 25%."}, {"text": "$50,000.00", "isCorrect": false, "rationale": "This would be 10% of the budget ($500,000 * 0.10), not 25%."}]}, {"question": "You encounter a bar graph in a marketing report that displays a company's market share growth. The vertical axis starts at 15% instead of 0%. Based on the text, what is the most likely intention or effect of this design choice?", "options": [{"text": "To accurately represent the small, incremental changes in market share.", "isCorrect": false, "rationale": "The text explicitly states that a truncated axis 'makes small differences look huge,' meaning it exaggerates rather than accurately represents small changes in context."}, {"text": "To save space on the report by focusing on the relevant data range.", "isCorrect": false, "rationale": "While it might save space, the primary effect highlighted in the text is distortion, not space-saving as a beneficial outcome for accuracy."}, {"text": "To exaggerate the visual difference between market share percentages, making small increases appear more significant.", "isCorrect": true, "rationale": "The text identifies 'Truncated vertical axis' as a common way graphs mislead, stating 'Small differences look huge' and that visual differences 'may be greatly exaggerated.'"}, {"text": "To ensure that all bars are visible on the graph, especially if values are high.", "isCorrect": false, "rationale": "Starting at zero would also ensure visibility; truncating the axis distorts proportions. This is a common justification but not the primary misleading effect."}]}, {"question": "A news report displays a line graph showing a country's unemployment rate. The graph covers data from 2010 to 2012, then skips to 2018, and continues to 2020. This graph likely employs which misleading technique, and what is its typical effect?", "options": [{"text": "Truncated vertical axis; it makes small differences look huge, exaggerating volatility.", "isCorrect": false, "rationale": "A truncated axis refers to the vertical value axis not starting at zero. The described issue is with the horizontal (time) axis, not the vertical one."}, {"text": "Cherry-picked time range; it might omit data that doesn't support a desired conclusion, distorting the overall trend.", "isCorrect": true, "rationale": "The text defines 'Cherry-picked time range' as 'Showing only a portion of the data that supports a desired conclusion, while omitting data that shows the opposite.' Skipping years perfectly fits this description, as it allows for the exclusion of periods that might contradict the intended narrative."}, {"text": "Inconsistent scale; it distorts proportions visually, making data points appear closer or farther apart than they are.", "isCorrect": false, "rationale": "An inconsistent scale would mean uneven spacing between numbers on an axis. While skipping years makes the scale discontinuous, the specific term for selecting particular time periods is 'cherry-picking.'"}, {"text": "Manipulated aspect ratio; it stretches or compresses the graph to exaggerate or minimize a trend.", "isCorrect": false, "rationale": "Manipulated aspect ratio involves changing the graph's dimensions (height vs. width). Skipping time points is a manipulation of the data selection over time, not the overall graph dimensions."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
