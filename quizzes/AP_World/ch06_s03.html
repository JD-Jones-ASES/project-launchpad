    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_World.html">&larr; Back to AP World History: Modern</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP World History: Modern &mdash; State Expansion in Asia</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "In 1750, India accounted for roughly 25 percent of world manufacturing. By 1900, it accounted for roughly 2 percent. Which explanation best accounts for this dramatic deindustrialization?", "options": [{"text": "A series of natural disasters and famines that destroyed India's artisan workforce during the mid-nineteenth century", "isCorrect": false, "rationale": "The text attributes deindustrialization to colonial trade policy — flooding Indian markets with cheap British cloth and taxing Indian exports — not to natural disasters."}, {"text": "British colonial trade policies that flooded the Indian market with cheap machine-made cloth while taxing Indian textile exports, deliberately dismantling a competitive Indian industry", "isCorrect": true, "rationale": "The text states explicitly: 'The EIC and later the Raj dismantled this industry by flooding the Indian market with cheap British machine-made cloth while simultaneously taxing Indian exports' — a policy-driven process, not a natural one."}, {"text": "Indian manufacturers voluntarily shifted from textiles to agriculture because agricultural profits were higher", "isCorrect": false, "rationale": "The text describes compulsion and colonial policy, not voluntary market shifts. Cash-crop agriculture was itself imposed through revenue systems that forced farmers to produce export crops."}, {"text": "The introduction of steam power in India disrupted traditional textile production before local entrepreneurs could adapt", "isCorrect": false, "rationale": "The text does not credit steam power in India as a cause; it credits deliberate British trade policy — import flooding and export taxation — as the mechanism of deindustrialization."}]}, {"question": "The Great Famine of 1876–79 killed an estimated 5.5 million people in southern India while the Raj continued to export grain from the subcontinent. Historian Mike Davis described such events as 'late Victorian holocausts.' What is the analytical significance of this framing?", "options": [{"text": "Davis argues that monsoon failures were the primary cause of Indian famines and that colonial policy was a secondary factor", "isCorrect": false, "rationale": "The text attributes the famines to the intersection of climatic shocks (monsoon failures) AND colonial economic policies that left farmers with 'no buffer' — Davis's argument is that policy-induced vulnerability was the decisive factor."}, {"text": "Davis's framing attributes mass death not to natural disaster alone but to colonial economic policies that made subsistence farmers structurally vulnerable to climatic shocks", "isCorrect": true, "rationale": "The text states Davis's concept captures 'millions of deaths produced not by natural disaster alone but by colonial economic policies that left subsistence farmers with no buffer against climatic shocks' — the famine was a policy outcome, not purely natural."}, {"text": "Davis argues the famines were deliberate British policy to reduce Indian population as a military precaution after 1857", "isCorrect": false, "rationale": "The text does not attribute deliberate genocidal intent to the famines; it argues that colonial economic structures made catastrophe inevitable when climatic shocks occurred — structural violence, not deliberate population reduction."}, {"text": "The concept of 'late Victorian holocausts' applies only to India and not to other colonized regions experiencing similar food crises", "isCorrect": false, "rationale": "The text uses this concept to analyze India specifically but the broader framework (colonial economic policies creating vulnerability to climatic shock) was a global pattern of imperial-era famine across colonized territories."}]}, {"question": "The Government of India Act (1858) abolished the British East India Company and transferred its authority to the British Crown. What was the most significant consequence of this transfer?", "options": [{"text": "India gained greater autonomy because the Crown was more accountable to Parliament than the EIC had been to shareholders", "isCorrect": false, "rationale": "The text presents the transfer as deepening imperial control, not increasing Indian autonomy. A Viceroy governed through the Indian Civil Service with senior positions 'almost exclusively held by British officials.'"}, {"text": "Direct Crown rule formalized the Raj's administrative structure, appointed a Viceroy, and marked a shift from commercial to explicitly imperial framing of Britain's relationship to India", "isCorrect": true, "rationale": "The text notes the shift from commercial venture to 'imperial responsibility' — the Government of India Act established the Viceroy system and the Indian Civil Service, while Victoria's 1877 proclamation as Empress of India formalized the new self-understanding."}, {"text": "The abolition of the EIC ended Britain's commercial exploitation of India and replaced it with genuine administrative development", "isCorrect": false, "rationale": "The Raj continued and intensified India's economic integration into British imperial needs — deindustrialization and cash-crop agriculture persisted and expanded under Crown rule."}, {"text": "Indian princes gained full sovereignty in their territories now that the EIC's commercial interests no longer constrained them", "isCorrect": false, "rationale": "The princely states continued under British 'paramountcy,' requiring deference to British authority on external matters. Their sovereignty was nominal, not genuine."}]}, {"question": "A historian studying French Indochina notes that Vietnamese resistance movements occurred in 1885, 1887, 1888, and continued into the early twentieth century, ultimately contributing to the independence movement led by Ho Chi Minh. Which conclusion most directly follows from this pattern?", "options": [{"text": "French colonial rule was relatively benign compared to British rule in India, which is why resistance was sporadic rather than sustained", "isCorrect": false, "rationale": "The text does not describe French Indochina as benign; corvée labor, abolition of Confucian examinations, and cultural imposition are all cited. The pattern of sustained resistance suggests persistent grievance, not mild rule."}, {"text": "Colonial administrative policies — corvée labor, cultural imposition, abolition of existing institutions — created the structural conditions for sustained Vietnamese resistance that eventually led to twentieth-century independence movements", "isCorrect": true, "rationale": "The text states: 'the pattern of colonial administration built the conditions for the twentieth-century independence movement led by Ho Chi Minh' — a direct causal chain from colonial policy to resistance to independence."}, {"text": "Vietnamese resistance failed completely, demonstrating that colonial subjects lacked the capacity for sustained political organization", "isCorrect": false, "rationale": "The text presents resistance as continuous (1885, 1887, 1888, and beyond) and as building toward the eventual successful independence movement — the opposite of failure."}, {"text": "French Indochina was primarily a religious mission, which caused resistance only among Buddhist communities who objected to Catholic missions", "isCorrect": false, "rationale": "The text identifies multiple causes of resistance: corvée labor, abolition of Confucian examinations, and French cultural imposition — not solely Catholic missionary activity."}]}, {"question": "The British Raj used both direct rule (in the presidencies of Bengal, Bombay, and Madras) and indirect rule (in the 562 princely states). What was the primary advantage of indirect rule from the British perspective?", "options": [{"text": "Indirect rule gave Indian princes full political sovereignty, creating a buffer against popular uprisings", "isCorrect": false, "rationale": "Princely states remained under British 'paramountcy' — they deferred to British authority on all external matters. Their sovereignty was managed, not full, and the buffer function was a side benefit rather than the primary rationale."}, {"text": "Indirect rule was cheaper and reduced the friction of direct cultural imposition while still allowing resource extraction and policy direction", "isCorrect": true, "rationale": "The text states directly: 'Indirect rule maintained existing political structures while directing policy through British advisors. It was cheaper and reduced the friction of direct cultural imposition.' Both models extracted resources; the difference was cost and cultural disruption."}, {"text": "Indirect rule allowed Britain to present itself as a protector of Indian traditions rather than a colonial power, avoiding the Indian Rebellion's underlying causes", "isCorrect": false, "rationale": "While indirect rule reduced cultural friction, the text does not present it as a successful strategy for preventing resistance — the 1857 Rebellion occurred under EIC governance that combined both models."}, {"text": "Indirect rule was applied only in regions without significant economic resources, making it strategically unimportant", "isCorrect": false, "rationale": "The text mentions 562 princely states — a substantial portion of the subcontinent. Indirect rule was a deliberate strategy across economically and politically significant territories."}]}, {"question": "The Delhi Durbar ceremonies of 1877, 1903, and 1911 assembled Indian princes to celebrate British imperial sovereignty. What was the dual audience the text identifies for these events?", "options": [{"text": "The British Parliament and the Indian National Congress", "isCorrect": false, "rationale": "The text does not mention Parliament or Congress as the intended audiences; it identifies Indian elites (needed for indirect governance) and European/world audiences (for whom imperial scale was performed)."}, {"text": "Indian elites whom Britain needed to govern indirectly, and European audiences for whom the scale of empire was staged as a demonstration of power", "isCorrect": true, "rationale": "The text states durbars were 'simultaneously aimed at Indian elites (whom Britain needed to govern indirectly) and at European audiences impressed by the scale of empire.'"}, {"text": "British soldiers stationed in India and Indian peasants who needed symbolic reassurance of imperial order", "isCorrect": false, "rationale": "The text specifies elites and European audiences as the dual targets; the ceremonies staged British power to those whose cooperation and admiration were most politically valuable."}, {"text": "The Queen herself and the Viceroy of India, who used durbars to coordinate colonial policy", "isCorrect": false, "rationale": "The durbars were public ceremonies for political and symbolic purposes, not private policy coordination events between the monarch and her Viceroy."}]}, {"question": "China experienced the Opium Wars (1839–42 and 1856–60) and 'unequal treaties' that stripped sovereignty from its ports, courts, and tariff policy. India came under direct British administrative control. France seized Vietnam between the 1850s and 1880s. What common factor explains these varied outcomes across Asia?", "options": [{"text": "Asian governments' internal corruption and political fragmentation made them uniquely susceptible to European penetration compared to African states", "isCorrect": false, "rationale": "The text does not attribute Asian vulnerability to corruption or unique fragmentation; it points to the common factor of industrial-era military asymmetry that applied across both Africa and Asia."}, {"text": "The asymmetry of industrial-era military power — steam gunboats, breech-loading rifles, and artillery — gave European forces decisive advantages that diplomatic resistance alone could not overcome", "isCorrect": true, "rationale": "The text opens the section with this exact argument: 'The common thread was the asymmetry of industrial-era military power: steam-powered gunboats, breech-loading rifles, and artillery gave European and American forces decisive advantages that diplomatic resistance alone could not overcome.'"}, {"text": "Asian elites chose European colonization as an alternative to existing political instability within their own societies", "isCorrect": false, "rationale": "The text describes coercive conquest — unequal treaties, military occupation, direct annexation — not voluntary preference for European governance."}, {"text": "European powers were united by a coordinated Asian strategy agreed upon at the Berlin Conference", "isCorrect": false, "rationale": "The Berlin Conference addressed Africa, not Asia. European expansion in Asia was competitive and uncoordinated — Russia, Britain, France, and later the United States acted independently."}]}, {"question": "Queen Victoria was proclaimed Empress of India (Kaiser-i-Hind) at the Delhi Durbar of January 1, 1877, yet she never visited India. Her 1858 proclamation promised equal protection and religious freedom, which the colonial administration 'honored selectively at best.' What does this combination of evidence most directly illustrate?", "options": [{"text": "Victoria's personal disinterest in India meant that British colonial policy was largely directed by the Viceroy without royal input", "isCorrect": false, "rationale": "The text does not characterize Victoria as disinterested; it notes she 'publicly expressed genuine concern for her Indian subjects' even while supporting imperial rule. The analytical point is about the gap between proclamations and practice, not royal indifference."}, {"text": "The same ideology-practice gap seen in the Congo — humanitarian rhetoric coexisting with selective enforcement of promised rights — characterized British rule in India as well", "isCorrect": true, "rationale": "The text establishes that Victoria 'publicly expressed genuine concern' and issued promises of equal protection and religious freedom — promises the administration 'honored selectively at best.' This mirrors the Congo's welfare language vs. atrocity pattern."}, {"text": "Victoria's distance from India meant British administrators had no ideological framework for governance and simply improvised policy", "isCorrect": false, "rationale": "The British Raj had elaborate ideological frameworks — the civilizing mission, racial hierarchy, the Indian Civil Service's self-conception — documented throughout the chapter. Ideology was not absent."}, {"text": "Because Victoria genuinely cared about India, British colonial policy in India was significantly more humane than French policy in Indochina", "isCorrect": false, "rationale": "The text does not make a comparative humaneness argument; Victoria's concern 'coexisted with complete support for British imperial rule.' Sincerity and exploitation were not mutually exclusive, as in Kipling's case."}]}, {"question": "The ryotwari and zamindari revenue systems in colonial India imposed cash-based taxation on subsistence farmers. What was the direct consequence of this policy?", "options": [{"text": "Indian farmers prospered by entering cash-crop markets and accumulating capital for reinvestment", "isCorrect": false, "rationale": "The text does not describe rural Indian prosperity; it notes cash-crop taxation 'forced' farmers to produce export crops, and that when monsoons failed, the result was catastrophic famine with no economic buffer."}, {"text": "Farmers were forced to produce cash crops for export, eliminating their food security buffer and making them catastrophically vulnerable to monsoon failures — contributing to famines that killed millions", "isCorrect": true, "rationale": "The text directly connects the revenue systems to agricultural reorganization around cash crops, which meant no subsistence buffer when monsoons failed — causing the 1876–79 Great Famine (5.5 million deaths) while grain was still being exported."}, {"text": "The cash taxation systems created a thriving Indian merchant class that competed with British commercial interests", "isCorrect": false, "rationale": "The text describes the revenue systems in terms of their harm to subsistence farmers, not their benefit to Indian merchants. The broader context is deindustrialization and agricultural vulnerability, not commercial flourishing."}, {"text": "Zamindari systems were abolished in 1858 when Crown rule began, removing a source of agrarian conflict", "isCorrect": false, "rationale": "The text does not describe abolition of the zamindari systems; it presents them as operating mechanisms of the Raj's agricultural restructuring alongside the ryotwari system."}]}, {"question": "Which comparison between British colonial administration in India and French colonial administration in Indochina is best supported by the text?", "options": [{"text": "Britain relied primarily on direct rule across all of India; France relied exclusively on indirect rule through existing Vietnamese political structures", "isCorrect": false, "rationale": "The text states Britain used both: direct rule in the presidencies, indirect rule in 562 princely states. France's pattern in Indochina involved direct administrative control and cultural imposition, not exclusive reliance on existing structures."}, {"text": "Both colonial systems combined economic extraction with cultural imposition (language, religion, legal codes) while generating sustained local resistance, despite different administrative structures", "isCorrect": true, "rationale": "The text describes British economic deindustrialization + cultural pressure in India and French corvée labor + abolition of Confucian examinations + Catholic missions in Indochina — parallel patterns of economic extraction and cultural transformation producing resistance in both cases."}, {"text": "France's civilizing mission was purely economic and did not involve cultural imposition, in contrast to Britain's explicitly cultural approach", "isCorrect": false, "rationale": "The text explicitly states French policy imposed French language and culture through education, abolished Confucian examination systems, and gave state support to Catholic missions — a deeply cultural transformation, not a purely economic one."}, {"text": "India's greater population and geographic scale meant the Raj was unable to implement economic reorganization, unlike France in Indochina", "isCorrect": false, "rationale": "The text documents Raj economic reorganization extensively — deindustrialization from 25% to 2% of world manufacturing, cash-crop revenue systems, grain exports during famine — demonstrating that scale did not prevent economic reorganization."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
