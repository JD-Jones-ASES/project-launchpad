    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_World.html">&larr; Back to AP World History: Modern</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP World History: Modern &mdash; The Song Dynasty: Bureaucracy, Meritocracy, and Innovation</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A historian studying Song China argues that the civil service examination system was 'a calculated political tool as much as an educational achievement.' Which of the following pieces of evidence best supports this interpretation?", "options": [{"text": "The examinations tested mastery of Confucian classics, history, and composition.", "isCorrect": false, "rationale": "The content of the exams describes what was tested, but does not explain why the system served political purposes beyond education."}, {"text": "By recruiting officials through examinations rather than hereditary privilege, Song emperors reduced the power of aristocratic families and created a bureaucracy loyal to the throne.", "isCorrect": true, "rationale": "The source explicitly frames the exam system as a 'calculated political tool' that weakened old aristocratic families and produced men 'loyal to the throne' — a strategic goal distinct from mere educational expansion."}, {"text": "Tens of thousands of candidates sat for each examination cycle, producing a frustrated educated class.", "isCorrect": false, "rationale": "The large candidate pool was a consequence of the system, not evidence that the system was designed as a political strategy; it actually created political tensions the source notes."}, {"text": "The jinshi degree was the most prestigious credential in the empire, awarded at the palace examination in Kaifeng.", "isCorrect": false, "rationale": "The prestige of the jinshi supports the cultural importance of the exam but does not directly demonstrate its use as a political tool against the aristocracy."}], "id": "q01"}, {"question": "The Song dynasty's iron output in the eleventh century has been estimated at roughly 125,000 tons per year. Which of the following best contextualizes the significance of this figure?", "options": [{"text": "It demonstrates that Song China had already transitioned to an industrial economy comparable to eighteenth-century Britain.", "isCorrect": false, "rationale": "The source explicitly describes Song China as a 'premodern society' and draws the analogy to show how exceptional it was — not that it had crossed into industrialization."}, {"text": "It illustrates that Song iron production was comparable to all of Europe's combined output seven centuries later, highlighting the dynasty's extraordinary productive capacity.", "isCorrect": true, "rationale": "The source states Song iron output was 'comparable to all of Europe's combined production seven centuries later,' establishing the dynasty's exceptional productive capacity relative to contemporaries and future centuries."}, {"text": "It shows that the Song government prioritized military spending over agricultural development.", "isCorrect": false, "rationale": "The source notes iron went into 'plowshares, weapons, tools, and infrastructure' — agricultural and military uses alike — contradicting a military-only interpretation."}, {"text": "It proves that the Song dynasty was already trading iron goods along the Silk Road to Europe.", "isCorrect": false, "rationale": "The source discusses internal use of iron; it does not claim Song iron was exported to Europe via trade routes."}], "id": "q02"}, {"question": "Read the following excerpt: 'Neo-Confucianism reinforced the hierarchical social order that the exam system served. The five relationships it prescribed placed every person within a web of duties and deference.' Based on this passage, how did Neo-Confucianism function as a POLITICAL tool of the Song state?", "options": [{"text": "It provided a justification for the state to reduce military spending by replacing warrior culture with scholarly values.", "isCorrect": false, "rationale": "The source does not link Neo-Confucianism to reduced military spending; the Song maintained a standing army of over a million soldiers financed by commercial taxation."}, {"text": "It supplied the ideological framework for the examination curriculum, making philosophical mastery the path to state employment and embedding loyalty to hierarchy within a cosmic moral order.", "isCorrect": true, "rationale": "The source describes Neo-Confucianism as both the curriculum for the exam system and a comprehensive moral framework prescribing hierarchical duties — directly linking philosophical training to bureaucratic service."}, {"text": "It replaced Buddhism entirely, eliminating rival institutions that might compete with state authority.", "isCorrect": false, "rationale": "The source notes Song scholars 'were often critical of Buddhist metaphysics,' but Chan Buddhism 'coexisted with Neo-Confucianism' and popular Buddhism remained embedded in peasant life — no wholesale replacement occurred."}, {"text": "It justified the expansion of hereditary aristocracy by grounding noble birth in Confucian notions of heaven's mandate.", "isCorrect": false, "rationale": "Neo-Confucianism was used specifically to counteract hereditary aristocracy, not reinforce it — the exam system recruited on demonstrated ability, not lineage."}], "id": "q03"}, {"question": "Which of the following best explains why the invention of paper money (jiaozi) was a commercially transformative innovation in Song China?", "options": [{"text": "It replaced the tribute system, ending China's dependence on goods extracted from subject peoples.", "isCorrect": false, "rationale": "Paper money operated within the internal commercial economy; the tribute system described China's external diplomatic-commercial relations with foreign states and remained intact."}, {"text": "It allowed large commercial transactions to be conducted without carrying heavy copper coins, stimulating trade across Song China's specialized regional economies.", "isCorrect": true, "rationale": "The source explicitly states paper currency 'made large commercial transactions far more practical and stimulated the already-vibrant internal trade networks that linked Song China's specialized regional economies.'"}, {"text": "It enabled Song China to pay its million-soldier army without relying on agricultural taxes.", "isCorrect": false, "rationale": "The source indicates army funding came from taxation of the 'commercialized, productive agrarian economy' — not specifically from paper currency replacing that tax base."}, {"text": "It ended private merchant banking because the state monopolized all financial exchange through standardized notes.", "isCorrect": false, "rationale": "The source notes that private 'flying money' certificates preceded state notes and that commercial networks thrived; no monopoly elimination of merchant finance is described."}], "id": "q04"}, {"question": "Which of the following best illustrates the concept of meritocracy as defined in the Song context?", "options": [{"text": "A Song emperor rewards a general's son with an official post because of his father's military service.", "isCorrect": false, "rationale": "Awarding positions based on a father's record is hereditary patronage, not meritocracy; the system was designed precisely to reduce this kind of appointment."}, {"text": "A farmer's son who spends years studying the Confucian classics passes the jinshi examination and receives an appointment as a provincial official.", "isCorrect": true, "rationale": "This scenario illustrates the meritocratic ideal: advancement based on demonstrated knowledge rather than birth. The source notes the exam was 'open, in theory, to any literate man,' though cost of preparation limited access in practice."}, {"text": "A hereditary noble retains land rights because his family has served the emperor for three generations.", "isCorrect": false, "rationale": "Hereditary land rights based on lineage are the opposite of the Song meritocratic ideal, which the examination system was designed to replace."}, {"text": "A Confucian scholar advises the emperor but holds no formal appointment, relying on personal favor.", "isCorrect": false, "rationale": "Informal advisory roles based on personal favor reflect pre-meritocratic arrangements; the Song system formalized advancement through competitive examination and official appointment."}], "id": "q05"}, {"question": "The magnetic compass, developed in China during the Song dynasty, eventually 'underpinned the transoceanic voyages of the fifteenth century' by European mariners. This connection best illustrates which broader historical process?", "options": [{"text": "The deliberate export of Chinese technology to Europe through the tribute system.", "isCorrect": false, "rationale": "The tribute system organized China's diplomatic-commercial relations with Asian neighbors, not direct technological export to Europe; the compass diffused indirectly via Islamic navigators."}, {"text": "The diffusion of technology across Afro-Eurasia through trade networks, shaping developments far beyond the society of origin.", "isCorrect": true, "rationale": "The source states the compass 'reached Islamic navigators and eventually European mariners' — a chain of diffusion across trade networks that produced consequences (European transoceanic voyages) the Song inventors could not have anticipated."}, {"text": "China's decision to project naval power across the Indian Ocean under Song dynasty leadership.", "isCorrect": false, "rationale": "Naval projection into the Indian Ocean is associated with the Ming dynasty's Zheng He voyages (early 15th century), not the Song period described in this section."}, {"text": "The simultaneous and independent invention of navigational technology in multiple regions of the world.", "isCorrect": false, "rationale": "The source describes diffusion from China outward, not independent parallel invention — the text traces a specific chain from Chinese sailors to Islamic navigators to European mariners."}], "id": "q06"}, {"question": "Foot binding spread among Song dynasty elite families and persisted for centuries. Based on the source, which of the following BEST explains why foot binding functioned simultaneously as a social signal AND a constraint on women's lives?", "options": [{"text": "Foot binding was mandated by Neo-Confucian state law and enforced by imperial officials across all social classes.", "isCorrect": false, "rationale": "The source describes foot binding as spreading from elite classes, not as state-mandated law enforced across all classes — households that could afford non-working daughters signaled wealth through the practice."}, {"text": "It marked elite femininity and family wealth while physically restricting women's mobility, supported by Neo-Confucian emphasis on female subordination.", "isCorrect": true, "rationale": "The source explicitly links foot binding to 'Neo-Confucian emphasis on female subordination' and notes it was 'simultaneously a mark of elite femininity, a constraint on women's mobility, and a signal of family wealth' — only wealthy households could afford daughters who could not work."}, {"text": "It was adopted voluntarily by lower-class women as a means of signaling social aspiration and gaining access to the examination system.", "isCorrect": false, "rationale": "Lower-class families could not afford the practice (daughters needed to work); the exam system excluded women categorically regardless of foot binding."}, {"text": "Foot binding declined rapidly once printing made Neo-Confucian texts more affordable and literacy spread beyond the elite.", "isCorrect": false, "rationale": "The source states foot binding 'persisted for centuries' — the spread of printing did not end the practice; if anything, wider dissemination of Neo-Confucian texts may have reinforced the values underlying it."}], "id": "q07"}, {"question": "The Song tribute system organized China's external commercial relations. A neighboring Southeast Asian kingdom sent periodic embassies bearing gifts to the Chinese emperor, who returned lavish gifts and permitted trade. Which of the following BEST describes the function of this ritual?", "options": [{"text": "It transformed Southeast Asian kingdoms into formal administrative provinces of the Song empire.", "isCorrect": false, "rationale": "The source explicitly notes that Southeast Asian polities 'maintained political independence' while participating in the tribute framework — they were not incorporated as administrative units."}, {"text": "It provided a diplomatic framework for robust commercial exchange while affirming a Sinocentric hierarchical order without requiring conquest.", "isCorrect": true, "rationale": "The source states the tribute ritual 'provided a diplomatic framework within which robust commercial exchange could occur' while integrating neighbors 'into a Sinocentric diplomatic and economic order even as they maintained political independence.'"}, {"text": "It replaced normal market-based trade with a state-monopolized system in which only the emperor could authorize commercial transactions.", "isCorrect": false, "rationale": "The tribute system framed relations diplomatically but did not replace or monopolize ordinary commercial trade; the source describes it as a framework enabling trade, not eliminating it."}, {"text": "It forced neighboring states to adopt the Chinese civil service examination system as a condition of continued trade.", "isCorrect": false, "rationale": "The source makes no such claim; the tribute system was a diplomatic-commercial arrangement, not a vehicle for imposing Song administrative institutions on neighbors."}], "id": "q08"}, {"question": "Historians describe a 'Tang–Song Transition' that 'brought China closer to self-sustaining economic growth than any premodern society before the Industrial Revolution.' Which set of Song developments best supports this characterization?", "options": [{"text": "Confucian philosophy, foot binding, and the tribute system.", "isCorrect": false, "rationale": "These are cultural and diplomatic features; they do not directly constitute the economic and technological developments that define the Tang–Song commercial revolution."}, {"text": "Iron production surpluses, paper currency, the magnetic compass, and gunpowder weaponry operating within a capable administrative state.", "isCorrect": true, "rationale": "The source explicitly names these four as 'mutually reinforcing innovations operating within an administratively capable state' and ties them directly to the Tang–Song commercial transformation."}, {"text": "The jinshi degree, the meritocracy system, and the Neo-Confucian five relationships.", "isCorrect": false, "rationale": "These are administrative and philosophical elements that organized governance; they supported the economic transformation but are not themselves the technological and commercial developments the historian's claim refers to."}, {"text": "The Kaifeng capital, standing army, and the Sinocentric tribute framework.", "isCorrect": false, "rationale": "These are political and military features; while they reflect Song power, they do not specifically constitute the cluster of innovations driving the Tang–Song commercial revolution."}], "id": "q09"}, {"question": "A student argues: 'The Song civil service examination system fully achieved meritocracy because it replaced hereditary aristocracy with open competition.' A historian would most likely revise this claim by noting that:", "options": [{"text": "The examinations were not competitive — all candidates who applied automatically received appointments.", "isCorrect": false, "rationale": "The source describes grueling multi-day exams with far more candidates than positions; competition was intense, not absent."}, {"text": "The system excluded women categorically and required years of expensive Confucian schooling, effectively limiting participation to families with surplus wealth despite its formal openness.", "isCorrect": true, "rationale": "The source directly qualifies the meritocratic ideal: 'Women were categorically excluded' and 'preparing for the examinations required years of schooling — an expensive commitment that effectively limited participation to families with surplus wealth.'"}, {"text": "The examinations were abolished by the Song after a generation because they destabilized political order by empowering commoners.", "isCorrect": false, "rationale": "The examinations were expanded and maintained throughout the Song, not abolished; they shaped Chinese governance for nearly a thousand years."}, {"text": "The examinations tested technical skills in engineering and mathematics rather than Confucian classics, making them inaccessible to scholars of philosophy.", "isCorrect": false, "rationale": "The source explicitly states the exams tested 'mastery of the Confucian classics, history, and composition' — not technical engineering."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
