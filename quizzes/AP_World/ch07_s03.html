<script>
var QUESTIONS = [{"question": "The Battle of the Somme (July–November 1916) produced 57,470 British casualties on its first day alone. Which concept does this figure most directly illustrate?", "options": [{"text": "The failure of German defensive tactics to stop an Allied breakthrough.", "isCorrect": false, "rationale": "The Somme was an Allied offensive that failed to break through German lines. The massive British casualties on day one represent the failure of Allied offensive tactics against German defensive positions — not the other way around."}, {"text": "The technological impasse of total war: defensive weapons (machine guns, barbed wire, artillery) had advanced far beyond the capacity of offensive tactics to overcome them.", "isCorrect": true, "rationale": "The source explicitly connects the Western Front's stalemate to the technological advantage of defensive weapons: 'bolt-action rifle, the machine gun, barbed wire, artillery — had advanced far beyond the capacity of offensive tactics to overcome them.' The Somme's first-day casualties are the starkest illustration of charging infantry being 'mowed down at rates that seem incomprehensible today.'"}, {"text": "The effectiveness of Germany's Schlieffen Plan in halting Allied advances on the Western Front.", "isCorrect": false, "rationale": "The Schlieffen Plan failed within weeks of the war's start at the First Battle of the Marne. By the time of the Somme in 1916, both sides were locked in trench warfare, not executing any coordinated strategic plan."}, {"text": "The inadequacy of British industrial production in supplying its armies with effective weapons.", "isCorrect": false, "rationale": "The British industrial effort was substantial; the problem was not industrial inadequacy but the fundamental tactical mismatch between defensive and offensive technologies. Blaming British industrial weakness misidentifies the cause of the massive casualties."}]}, {"question": "Read the following excerpt from Woodrow Wilson's Fourteen Points: 'A free, open-minded, and absolutely impartial adjustment of all colonial claims, based upon a strict observance of the principle that in determining all such questions of sovereignty the interests of the populations concerned must have equal weight.' A Vietnamese nationalist in Paris in 1919 would most likely respond to this excerpt by arguing which of the following?", "options": [{"text": "That Point V fully justified France's continued control of Indochina since French interests were 'equal weight' with Vietnamese interests.", "isCorrect": false, "rationale": "This reading inverts the Point V argument. Point V required the interests of colonial populations to have 'equal weight' with the governing power — which would support Vietnamese self-determination, not French control. A Vietnamese nationalist would not use this reasoning to justify continued French rule."}, {"text": "That Point V's promise was betrayed: Vietnamese self-determination was ignored at Paris, demonstrating that 'self-determination' applied only to white Europeans.", "isCorrect": true, "rationale": "The section explicitly states that Ho Chi Minh 'attempted to petition the conference for Vietnamese self-determination; he was ignored.' Combined with the KEY CONCEPT noting that self-determination was 'extended primarily to white European nations' while 'maintaining or expanding European colonial control over Africa, Asia, and the Middle East,' a Vietnamese nationalist's argument would be that the promise was betrayed."}, {"text": "That Point V proved Wilson's commitment to colonialism since it used vague language that colonial powers could interpret as they wished.", "isCorrect": false, "rationale": "Point V's language ('interests of the populations concerned must have equal weight') is not pro-colonial; it appears to support colonial populations' rights. A Vietnamese nationalist would not argue Wilson was a colonialist based on the text of Point V itself — rather, the argument would be that the text's promises were not honored in practice."}, {"text": "That Wilson's Fourteen Points showed the United States was prepared to use military force to liberate French Indochina.", "isCorrect": false, "rationale": "Nothing in the Fourteen Points or the section suggests military intervention to liberate colonial territories. Point V called for 'impartial adjustment' of colonial claims, not military liberation campaigns. No Vietnamese nationalist could reasonably draw this conclusion from the document."}]}, {"question": "The term 'total war' as applied to World War I most accurately refers to which of the following?", "options": [{"text": "A war fought exclusively by professional standing armies without civilian involvement.", "isCorrect": false, "rationale": "This is the opposite of total war. Total war is defined precisely by the dissolution of the distinction between soldier and civilian — it requires civilian economic, industrial, and social mobilization. Professional standing armies fighting without civilian involvement describes pre-modern limited warfare."}, {"text": "A form of warfare in which the entire national economy, civilian population, and social structure are mobilized for the war effort, nearly dissolving the distinction between soldier and civilian.", "isCorrect": true, "rationale": "The source's definition exactly matches this: 'a belligerent state mobilizes all of its economic, industrial, social, and political resources for the war effort, and in which civilian populations, economies, and infrastructure become direct targets or participants.' The section provides specific examples: conscription, government industrial takeover, rationing, propaganda, naval blockade."}, {"text": "A war in which all major nations of the world, on every continent, simultaneously participate in combat.", "isCorrect": false, "rationale": "Total war refers to the mobilization of a state's whole economy and society, not to geographic universality. A war could be geographically global without being a 'total war' (in the mobilization sense), and conversely, even a conflict between two nations could be a total war if both mobilized their entire societies."}, {"text": "A war decided by the complete destruction of the enemy's military forces rather than by negotiated settlement.", "isCorrect": false, "rationale": "While total wars often sought unconditional surrender, the definition of total war centers on economic and social mobilization, not on the type of settlement sought. Defining it as requiring military annihilation of the enemy rather than negotiation misses the key economic-mobilization element."}]}, {"question": "The war guilt clause (Article 231) of the Treaty of Versailles assigned sole responsibility for WWI to Germany. Historians have argued this created conditions for future conflict. What is the most accurate explanation of this causal chain?", "options": [{"text": "Article 231 required Germany to admit military defeat, which the German army refused to accept, leading directly to a second military campaign to reverse the verdict.", "isCorrect": false, "rationale": "Germany did formally sign the armistice and treaty. The causal chain was not Germany's military refusing to accept defeat but the political use of the 'stab-in-the-back' myth (the false claim that Germany was betrayed, not defeated) combined with the economic burden of reparations — which nationalist politicians, particularly Hitler, exploited. A direct military non-acceptance is not what the source describes."}, {"text": "Article 231 provided the legal justification for massive reparations, which combined with territorial losses and military restrictions to generate a nationalist resentment that Adolf Hitler exploited in the 1930s.", "isCorrect": true, "rationale": "The source explicitly states that 'the harshness of the terms imposed on Germany — war guilt, reparations, territorial losses, military restrictions — generated a resentment that nationalist politicians, particularly Adolf Hitler, would exploit to devastating effect in the 1930s.' The war guilt clause was the legal foundation for reparations (132 billion gold marks), which was the economic mechanism of the resentment."}, {"text": "Article 231 was so offensive to German national pride that it caused Germany to immediately rearm and invade France in the 1920s.", "isCorrect": false, "rationale": "Germany did not immediately rearm or invade France. The exploitation of war guilt resentment was a political process spanning more than a decade — the Weimar Republic struggled through the 1920s before the Great Depression created conditions for Nazi rise to power. The response was not immediate military action."}, {"text": "Article 231 caused France to refuse to cooperate with the League of Nations, undermining the postwar collective-security system.", "isCorrect": false, "rationale": "France was one of the League of Nations' strongest supporters (Britain and France were its leading powers). The League's failure was most critically caused by the United States' refusal to join — not by French withdrawal. This option misattributes the League's weakness."}]}, {"question": "The Gallipoli campaign of 1915 is cited in the section primarily to illustrate which historical point?", "options": [{"text": "That combined Allied land and naval operations against the Ottomans were ultimately successful in forcing an early Ottoman exit from the war.", "isCorrect": false, "rationale": "Gallipoli was an Allied defeat — it failed to knock the Ottoman Empire out of the war. Over 500,000 total Allied and Ottoman casualties were suffered for no strategic gain. Describing it as successful inverts the historical outcome."}, {"text": "That WWI's violence extended beyond the Western Front into other theaters, including campaigns that were defining national experiences for Australia and New Zealand.", "isCorrect": true, "rationale": "The source specifically mentions Gallipoli in the section on 'Mobilization Beyond Europe' to illustrate the war's geographic reach: 'The Eastern Front, the Ottoman campaigns, and the colonial theaters brought the war's violence into regions the Western-Front narrative often obscures.' Gallipoli is also cited as a 'defining national experience for Australia and New Zealand,' whose troops bore heavy losses."}, {"text": "That Britain's naval blockade strategy in the Dardanelles was the decisive factor in defeating the Ottoman Empire.", "isCorrect": false, "rationale": "Gallipoli was an amphibious land and naval operation, not a blockade. It failed decisively. The Ottoman Empire's defeat came from multiple theaters and the final 1918 armistice — not from a naval blockade at the Dardanelles."}, {"text": "That Ottoman forces were incapable of defeating European colonial armies in direct battle.", "isCorrect": false, "rationale": "This is historically incorrect and the opposite of what the section shows. The Ottoman forces successfully defended at Gallipoli, inflicting over 250,000 Allied casualties and forcing an Allied withdrawal. Gallipoli demonstrated Ottoman defensive capability, not incapability."}]}, {"question": "The Sykes-Picot Agreement is cited as an example of which broader pattern at the Paris Peace Conference?", "options": [{"text": "A successful application of Wilson's principle of self-determination to the Middle East, creating states aligned with existing ethnic communities.", "isCorrect": false, "rationale": "Sykes-Picot was explicitly the opposite of self-determination. Britain and France divided former Ottoman Arab territories between themselves 'as League of Nations mandates under the Sykes-Picot Agreement — borders drawn by imperial bureaucrats that bore no relation to existing ethnic, tribal, or religious communities.' It violated, rather than applied, self-determination."}, {"text": "The selective application of self-determination: extending it to white Europeans while maintaining European colonial control over Middle Eastern Arab populations who had been promised independence.", "isCorrect": true, "rationale": "The source explicitly uses Sykes-Picot as evidence for its KEY CONCEPT: self-determination was applied to 'white European nations carved from the former Habsburg, Ottoman, and Romanov empires, while maintaining or expanding European colonial control over Africa, Asia, and the Middle East.' Arab nationalists had been promised independence through the Hussein-McMahon Correspondence; Sykes-Picot betrayed that promise."}, {"text": "Britain and France's good-faith attempt to create stable governance structures in territories too ethnically fragmented for self-determination.", "isCorrect": false, "rationale": "The source does not frame Sykes-Picot as a good-faith attempt at governance. It describes borders 'drawn by imperial bureaucrats that bore no relation to existing ethnic, tribal, or religious communities, and that would generate conflicts lasting through the twenty-first century' — language indicating arbitrary imperial division, not good-faith governance design."}, {"text": "An agreement reached between France and Germany to prevent any future Ottoman revival.", "isCorrect": false, "rationale": "Sykes-Picot was a secret agreement between Britain (Mark Sykes) and France (Georges Picot), not Germany. Germany was not a party to Allied postwar territorial arrangements — it was the defeated power having arrangements imposed on it."}]}, {"question": "Women's entry into industrial workforces during World War I is analyzed in the section primarily as evidence for which of the following arguments?", "options": [{"text": "That women proved less productive than male workers in munitions factories, requiring the state to restructure production around their limitations.", "isCorrect": false, "rationale": "The source makes no such argument. Women's industrial labor is presented as evidence of total war's social reach — the opening of 'previously closed' economic sectors to women — and its link to the suffrage movement, not as evidence of inferior productivity."}, {"text": "That total war's economic mobilization permanently reshaped social structures, in this case advancing the case for women's suffrage by demonstrating women's economic contribution.", "isCorrect": true, "rationale": "The source directly connects women's wartime industrial labor to suffrage: 'This economic mobilization would permanently reshape debates about women's suffrage: by 1918, Britain had extended the vote to women over 30, and full suffrage followed in 1928.' The argument is that total war's social reach had long-term social and political consequences beyond the battlefield."}, {"text": "That women's wartime labor was temporary and had no lasting effect on gender roles or political rights in Britain.", "isCorrect": false, "rationale": "The section argues the opposite: the economic mobilization 'permanently reshaped' debates about women's suffrage, with Britain extending the vote to women over 30 in 1918. The effect was lasting, not temporary."}, {"text": "That governments deliberately excluded women from front-line military service but used industrial labor as a substitute for male conscription.", "isCorrect": false, "rationale": "While women did not serve in front-line combat in this period, the source's analytical point is not about deliberate exclusion from combat but about the social consequences of industrial mobilization. The argument is about total war's reach into civilian society, not about military gender policy."}]}, {"question": "The Korean Samil independence movement of 1919 and Ho Chi Minh's petition at the Paris Peace Conference are both cited to support which argument?", "options": [{"text": "That Asian nationalist movements were inspired primarily by Bolshevik propaganda from the newly formed Soviet Union.", "isCorrect": false, "rationale": "The section does not attribute Korean or Vietnamese nationalism to Bolshevik inspiration. It attributes both specifically to the broken promise of self-determination at the Paris Peace Conference — the gap between Wilson's Point V and Versailles' actual treatment of colonial territories."}, {"text": "That Wilson's promise of self-determination in the Fourteen Points raised expectations among colonized peoples that the Versailles settlement systematically betrayed.", "isCorrect": true, "rationale": "The source is explicit: Korea 'sent delegates to Paris hoping Point V would secure their independence; it did not, and the resulting outrage triggered the Korean Samil independence movement of 1919.' Ho Chi Minh 'attempted to petition the conference for Vietnamese self-determination; he was ignored.' Both cases demonstrate that colonized peoples heard Wilson's promises and were then betrayed by Versailles."}, {"text": "That Korean and Vietnamese nationalists were primarily motivated by resentment of Japanese imperialism rather than European colonialism.", "isCorrect": false, "rationale": "Korea was under Japanese colonialism at the time, making Japanese imperialism relevant to the Korean case. But the source uses both the Korean and Vietnamese cases to make a point about the Versailles settlement's betrayal of self-determination — the mechanism is the broken promise of Point V, not simply anti-Japanese sentiment."}, {"text": "That the League of Nations was successfully used by Asian nationalist movements to challenge European colonial control.", "isCorrect": false, "rationale": "The opposite is true. The League of Nations administered the mandate system that extended European colonial control. Asian nationalist movements were ignored or defeated at Paris — the League was not a mechanism through which they succeeded in challenging colonialism."}]}, {"question": "The section describes the Versailles settlement as embodying 'a fundamental contradiction.' What was that contradiction?", "options": [{"text": "It simultaneously promised German disarmament and French disarmament, making the security provisions unenforceable.", "isCorrect": false, "rationale": "Versailles imposed disarmament on Germany (army limited to 100,000 men) but not on France. The contradiction the section identifies is not about mutual disarmament but about the gap between the proclaimed principle of self-determination and its selective application."}, {"text": "It proclaimed the principle of self-determination while applying it selectively to white Europeans and simultaneously maintaining or expanding European colonial control over non-European peoples.", "isCorrect": true, "rationale": "The KEY CONCEPT in the section names this exactly: Versailles 'proclaimed the principle of self-determination while applying it selectively — primarily to white European nations carved from the former Habsburg, Ottoman, and Romanov empires, while maintaining or expanding European colonial control over Africa, Asia, and the Middle East.'"}, {"text": "It created a League of Nations to promote collective security while simultaneously imposing punitive terms on Germany that the League would be too weak to enforce.", "isCorrect": false, "rationale": "While this captures a real tension in the settlement, it is not the fundamental contradiction the section identifies. The section's KEY CONCEPT focuses on the self-determination gap between promise and application — the colonial hypocrisy — not on the League's enforcement capacity."}, {"text": "It required Germany to pay reparations while simultaneously removing Germany's colonies, making it impossible for Germany to earn the foreign currency needed to pay.", "isCorrect": false, "rationale": "While this describes a real economic problem, it is not the fundamental contradiction the section identifies. The KEY CONCEPT's central contradiction is about self-determination applied to Europeans but denied to colonized peoples — not about reparations-versus-colonies economics."}]}, {"question": "The section notes that the East Africa campaign was 'almost entirely fought and suffered by African populations.' What does this observation reveal about WWI as a historical event?", "options": [{"text": "That African soldiers were poorly trained and suffered avoidable casualties due to their commanders' tactical errors.", "isCorrect": false, "rationale": "The section does not criticize the tactical competence of African forces. German commander Paul von Lettow-Vorbeck's campaign with African Askari soldiers actually tied down 'far larger Allied forces until after the Armistice' — demonstrating tactical effectiveness, not incompetence."}, {"text": "That WWI's European framing obscures the fact that non-European populations bore enormous costs — as soldiers, laborers, and civilians — in theaters that European narratives typically ignore.", "isCorrect": true, "rationale": "The section makes this argument explicitly when introducing the section on 'Mobilization Beyond Europe': 'The Eastern Front, the Ottoman campaigns, and the colonial theaters brought the war's violence into regions the Western-Front narrative often obscures.' The 200,000 African dead in the East Africa campaign, fought 'almost entirely by African populations,' is the strongest evidence for why this Eurocentric framing distorts the history."}, {"text": "That European colonial powers deliberately chose African theaters to minimize European casualties.", "isCorrect": false, "rationale": "The East Africa campaign was a strategic theater, not a deliberate casualty-minimization strategy for Europeans. British forces also suffered casualties there; the observation is about the scale of African suffering, not about European deliberate casualty-avoidance."}, {"text": "That Germany's colonial military strategy in Africa was more effective than its European strategy, and this influenced postwar German military planning.", "isCorrect": false, "rationale": "While von Lettow-Vorbeck's guerrilla campaign was effective, the section does not claim it influenced postwar German military planning. The point is about African populations' wartime suffering, not about Germany's strategic learning."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
