<script>
var QUESTIONS = [{"question": "The immediate trigger of the Indian Rebellion of 1857 was the introduction of Enfield rifle cartridges rumored to be greased with pork and beef fat. The text describes this as 'a spark, not the fire itself.' Which evidence best supports the text's distinction between triggering events and underlying causes?", "options": [{"text": "The cartridge incident was the only grievance that unified Hindu and Muslim soldiers, meaning underlying causes were secondary", "isCorrect": false, "rationale": "The text presents the cartridge issue as a spark for a rebellion whose underlying causes were structural — annexation, deindustrialization, missionary pressure, and racial contempt. The rebellion's spread into civil society shows causes went far beyond any single military grievance."}, {"text": "The rebellion spread from the army into civil society involving dispossessed rulers, landowners, peasants, and religious figures — demonstrating that structural grievances predated and extended far beyond the cartridge incident", "isCorrect": true, "rationale": "The text states the rebellion 'spread from the army into civil society in northern and central India, involving dispossessed rulers, landowners, peasants, and religious figures' — proving that the structural causes (Doctrine of Lapse, deindustrialization, missionary pressure, racial contempt) were already present and widespread."}, {"text": "The rebellion failed quickly because it lacked underlying popular support beyond the military", "isCorrect": false, "rationale": "The text describes a widespread rebellion involving multiple social groups across northern and central India — not a narrow military mutiny. The fact that rebels proclaimed the Mughal emperor as symbolic leader shows broad social mobilization."}, {"text": "The British suppressed the rebellion diplomatically by withdrawing the offensive cartridges before military force was necessary", "isCorrect": false, "rationale": "The text describes brutal suppression through siege warfare, mass executions, and deliberate destruction of villages — not diplomatic withdrawal of the cartridges."}]}, {"question": "A student argues that the Indian Rebellion of 1857 was simply a military mutiny with no broader political significance. Which evidence from the text most directly challenges this interpretation?", "options": [{"text": "The rebellion was suppressed in less than six months, showing it lacked organizational capacity", "isCorrect": false, "rationale": "The text does not mention a six-month timeframe; it describes sustained siege warfare and brutal suppression suggesting prolonged conflict. More importantly, the text's emphasis is on the rebellion's political consequences, not its duration."}, {"text": "The rebels' proclamation of the Mughal emperor Bahadur Shah II as symbolic leader and subsequent reclamation of the rebellion as 'The First War of Indian Independence' demonstrate its explicitly political and nationalist dimensions", "isCorrect": true, "rationale": "The text states rebels invoked 'both Muslim and Hindu resistance to Christian foreign rule' through Bahadur Shah's proclamation, and that 'Indian nationalist historians later reclaimed the rebellion as the First War of Indian Independence' — both establishing its political significance beyond a simple mutiny."}, {"text": "British commanders acknowledged it as a genuine anti-colonial uprising and immediately reformed the Raj's governance structure", "isCorrect": false, "rationale": "The text describes British suppression as brutal and notes that British 'racial attitudes toward Indians hardened' after the rebellion — not reform or acknowledgment of legitimate grievance."}, {"text": "The rebellion successfully expelled British forces from northern India for a period, demonstrating genuine military and political capacity", "isCorrect": false, "rationale": "The rebellion was ultimately suppressed; the text does not describe a temporary expulsion of British forces. Its significance is in what it revealed about the depth of resistance and what it triggered in British policy."}]}, {"question": "Commodore Perry arrived in Edo Bay in 1853 with four steam-powered warships ('black ships') and demanded Japan open its ports. The Tokugawa shogunate signed the Convention of Kanagawa (1854) and the Harris Treaty (1858). The Meiji Restoration occurred in 1868. Which causal chain best explains the connection between these events?", "options": [{"text": "Perry's ships demonstrated American goodwill; the Tokugawa shogunate voluntarily opened Japan; the Meiji Restoration was an unrelated domestic power struggle", "isCorrect": false, "rationale": "The text describes the treaties as signed 'under essentially the same coercive conditions as China's unequal treaties' — not voluntarily. The text directly states the Perry mission's 'domestic crisis culminated in the Meiji Restoration.'"}, {"text": "Perry's coercive arrival exposed the Tokugawa shogunate's military inadequacy, triggered a domestic political crisis, and ultimately led reformers to overthrow the shogunate and pursue rapid state-directed modernization to prevent formal colonization", "isCorrect": true, "rationale": "The text states: 'the domestic crisis triggered by the Perry mission culminated in the Meiji Restoration of 1868' — making the causal chain explicit. Meiji reformers' agenda was preventing the colonization that the Tokugawa capitulation had made possible."}, {"text": "The Harris Treaty of 1858 triggered immediate revolution against the shogunate, making the 1868 Meiji Restoration a direct response to American commercial exploitation", "isCorrect": false, "rationale": "The text presents the Meiji Restoration as emerging from the crisis triggered by the Perry mission broadly, not specifically as a direct response to one treaty signed years earlier. The causal chain spans 1853–1868."}, {"text": "The Meiji Restoration occurred independently of Western pressure and was driven by an internal Confucian reform movement", "isCorrect": false, "rationale": "The text explicitly links the Meiji Restoration to Western pressure. Meiji reformers from Satsuma and Chōshū identified the need for Western-style institutions specifically to resist Western power."}]}, {"question": "The Meiji government sent study missions to Europe and America (Iwakura Mission, 1871–73), then adopted: a Prussian-modeled conscript army, a British-modeled navy, a German-modeled constitution (1889), a railway network, a compulsory education system, and zaibatsu industrial conglomerates. What analytical conclusion does this pattern support?", "options": [{"text": "Japan's modernization succeeded because it uncritically copied every aspect of Western civilization wholesale", "isCorrect": false, "rationale": "The text emphasizes 'selective' adoption — Meiji reformers 'identified the specific institutions and technologies that gave Western powers their strength, and selectively adopted them.' Critical selection, not wholesale copying, was the strategy."}, {"text": "Meiji Japan practiced strategic, selective modernization — studying multiple Western models and adopting specific institutions where they served the goal of building military and industrial power to defend sovereignty", "isCorrect": true, "rationale": "The text explicitly uses the word 'selectively' and the slogan fukoku kyōhei ('rich country, strong army') to capture the logic: modernization was instrumental and targeted at specific institutions that conferred military and industrial power."}, {"text": "Japan's modernization was driven by genuine cultural appreciation for Western civilization rather than strategic calculation about sovereignty", "isCorrect": false, "rationale": "The text frames Meiji modernization as explicitly defensive and strategic — the goal was preventing colonization, not cultural admiration. The study missions evaluated Western models for their power-conferring utility."}, {"text": "Japan succeeded because it rejected all Asian traditions and fully replaced them with Western cultural, legal, and religious systems", "isCorrect": false, "rationale": "Meiji Japan selectively adopted Western institutions while retaining many Japanese cultural elements. The text presents selective adoption, not wholesale cultural replacement, as the strategy."}]}, {"question": "By 1895, Japan had defeated China in the Sino-Japanese War. By 1905, it had defeated Russia in the Russo-Japanese War. Japan then colonized Korea (1910) and Taiwan (1895). What does this trajectory suggest about the relationship between modernization and imperialism?", "options": [{"text": "Japan's success in resisting Western imperialism led it to become an anti-imperial advocate for Asian independence", "isCorrect": false, "rationale": "Japan's trajectory was the opposite — it joined 'the ranks of imperial powers rather than their victims' by colonizing Korea and Taiwan. The text presents this as the direct outcome of successful modernization."}, {"text": "A non-Western state could acquire sufficient industrial and military capacity through modernization to defeat European powers and itself become an imperial power", "isCorrect": true, "rationale": "The text states Japan 'joined the ranks of imperial powers rather than their victims' — demonstrating that modernization could enable both defensive resistance and offensive imperialism. The Russo-Japanese War is described as 'the first time in the modern industrial era that an Asian power had defeated a major European power in a large-scale conflict.'"}, {"text": "Japan's military victories demonstrated that industrial military technology gave decisive advantages regardless of which nation possessed it", "isCorrect": false, "rationale": "While this is partially true, it understates the text's analytical point: Japan's trajectory — from potential colonial target to colonial power — demonstrates that the industrial era's power dynamics were not racially determined but depended on state capacity and strategic choices."}, {"text": "Japan's military successes made it immune to further Western pressure and ended the threat of colonization permanently", "isCorrect": false, "rationale": "Japan's victories reduced Western pressure but the text frames the Russo-Japanese War primarily as evidence of modernization's success, not as permanent immunity. Japan's colonial expansion became its own source of future conflict."}]}, {"question": "The text compares Japan's successful resistance to Western pressure with China's failure to prevent informal colonization. Which factor does the text identify as LEAST important in explaining the difference?", "options": [{"text": "Japan's smaller geographic scale made political centralization easier", "isCorrect": false, "rationale": "The text explicitly identifies smaller scale as one factor historians point to — so it IS considered important. The question asks for the LEAST important factor, meaning this is a valid explanation."}, {"text": "Japan's inherent cultural superiority to China, which made Japanese people more receptive to modernization", "isCorrect": true, "rationale": "The text explicitly rejects cultural determinism: 'neither country's path was predetermined' and Japan's success 'was the product of specific political choices made by specific historical actors, not of some inherent Japanese cultural characteristic.' Racial or cultural essentialism is the least supported explanation."}, {"text": "Japan lacked a powerful entrenched gentry class (like China's Confucian scholar-officials) defending the existing order", "isCorrect": false, "rationale": "The text identifies this as one of the specific factors historians point to — the absence of a powerful class with vested interests in preserving the status quo facilitated more rapid institutional change."}, {"text": "The Tokugawa period had created infrastructure of literacy and commercialization that gave Japan modernization capacity", "isCorrect": false, "rationale": "The text explicitly mentions 'the existing Tokugawa infrastructure of literacy and commercialization' as one of the factors explaining Japan's successful modernization — a valid historical explanation."}]}, {"question": "The Boxer Uprising (1899–1901) emerged from Chinese resistance to Western imperialist pressure, yet the Boxer Protocol (1901) imposed an indemnity of 450 million taels of silver — more than the Qing government's annual revenue. What does this outcome suggest about armed resistance without political strategy?", "options": [{"text": "The Boxers' failure proves that armed resistance to imperialism was always futile and that accommodation was the only viable strategy", "isCorrect": false, "rationale": "The text does not endorse accommodation as the only alternative; it presents a spectrum of responses including armed rebellion, religious nationalism, and state-directed modernization — with different outcomes. The Boxers' specific failure reflected the absence of political strategy, not a universal law."}, {"text": "Religious nationalism and anti-colonial sentiment, when uncoordinated with political strategy, could be militarily defeated while leaving underlying colonial conditions unchanged or worsened", "isCorrect": true, "rationale": "The text states this directly: 'the Boxer Uprising is a case study in how religious nationalism and anti-colonial sentiment, when uncoordinated with political strategy, could be militarily defeated even as the underlying conditions it protested continued to deteriorate.'"}, {"text": "The Boxers would have succeeded if they had targeted only foreign troops rather than Chinese Christians and missionary institutions", "isCorrect": false, "rationale": "The text does not make tactical suggestions about what the Boxers should have targeted. The analytical argument is about the absence of political strategy, not tactical target selection."}, {"text": "Empress Dowager Cixi's support for the Boxers demonstrates that the Qing government was primarily anti-foreign rather than domestically focused", "isCorrect": false, "rationale": "Cixi's support is mentioned as a historical event, not as evidence about Qing government priorities broadly. The text does not analyze Qing governance orientation."}]}, {"question": "The Doctrine of Lapse was a British policy seizing Indian princely states whose rulers died without male heirs, regardless of adopted succession. How does the text use this policy to explain the Indian Rebellion of 1857?", "options": [{"text": "The Doctrine of Lapse was a purely administrative reform with no political consequences in Indian society", "isCorrect": false, "rationale": "The text presents the Doctrine of Lapse as one of the structural underlying causes of the rebellion — it dispossessed Indian rulers and their dependents over three decades, creating a class of resentful elites with motivation to rebel."}, {"text": "Three decades of accelerating annexation under the Doctrine of Lapse dispossessed Indian princes and their networks, creating a class of resentful elites who joined the rebellion alongside sepoys and peasants", "isCorrect": true, "rationale": "The text lists this first among the structural underlying causes: 'three decades of accelerating British annexation of Indian princely states under the Doctrine of Lapse' — dispossessing rulers regardless of adopted succession, creating 'dispossessed rulers' who appear among the rebellion's participants."}, {"text": "The Doctrine of Lapse strengthened Indian loyalty to British rule by offering clear rules for succession that Indian elites could plan around", "isCorrect": false, "rationale": "The text presents the Doctrine of Lapse as a source of grievance that created dispossession and resentment, not as a governance improvement that built loyalty."}, {"text": "The Doctrine of Lapse was abolished in 1856, one year before the Rebellion, making it unlikely to be a contributing cause", "isCorrect": false, "rationale": "The text does not mention its abolition as a factor; it presents three decades of accumulating dispossession as a structural cause, not a recently resolved grievance."}]}, {"question": "Fukoku kyōhei translates as 'rich country, strong army.' How does this Meiji slogan illuminate the relationship between industrialization and sovereignty in the nineteenth century?", "options": [{"text": "It shows that Meiji leaders believed cultural westernization was the primary path to preventing colonization", "isCorrect": false, "rationale": "The slogan emphasizes economic (rich country) and military (strong army) power — not cultural westernization. The text presents selective adoption of Western institutions as strategic, not cultural in motivation."}, {"text": "It reveals that Meiji Japan understood industrial and military power as prerequisites for sovereignty — seeing the connection between economic development and the ability to resist coercive foreign pressure", "isCorrect": true, "rationale": "The slogan captures the Meiji logic: you cannot resist Western coercion without matching Western industrial and military capacity. The text presents this as the strategic insight underlying selective modernization — industrialization as a tool of sovereignty defense."}, {"text": "It demonstrates that Japan's primary goal was economic competition with the United States and Britain in overseas markets", "isCorrect": false, "rationale": "The context given for the slogan is resistance to Western pressure and prevention of colonization, not commercial competition with Western powers in global markets."}, {"text": "It shows that Japan wanted to form military alliances with other Asian nations to collectively resist Western imperialism", "isCorrect": false, "rationale": "The text does not present pan-Asian alliance as a Meiji strategy; Japan's path was state-directed domestic modernization, and it ultimately became a colonizer of other Asian nations rather than their ally."}]}, {"question": "The text states that responses to nineteenth-century imperialism 'ranged across a spectrum' and that 'no single response guaranteed success; outcomes depended on geography, state capacity, political unity, timing, and the specific colonial power involved.' Which comparison best illustrates this claim?", "options": [{"text": "The Indian Rebellion of 1857 and the Boxer Uprising both failed; Japan's Meiji Restoration succeeded — proving that armed rebellion never works and modernization always works", "isCorrect": false, "rationale": "The text explicitly warns against determinism: 'no single response guaranteed success.' The text also notes that Ethiopia's military resistance at Adwa succeeded — showing armed resistance could work under specific conditions."}, {"text": "Japan's state-directed modernization succeeded in preventing formal colonization, while the Boxers' religiously-framed armed rebellion failed — but both responses reflected genuine agency and specific strategic calculations about available options", "isCorrect": true, "rationale": "This answer reflects the text's multi-causal framework: different outcomes resulted from specific conditions (Japan's state capacity, geographic scale, Tokugawa infrastructure vs. China's entrenched scholar-official class, geographic scale, political fragmentation), not from a universal rule about which strategy works."}, {"text": "All non-European states that attempted modernization were successful in resisting colonization, while all states that relied on traditional military methods were colonized", "isCorrect": false, "rationale": "The text presents no such universal rule. Ethiopia successfully used military resistance with modernized weapons; China partially modernized but still experienced semi-colonialism. Outcomes were contingent, not rule-governed."}, {"text": "The Sepoy Rebellion and the Boxer Uprising were identical in causes, strategy, and outcome, demonstrating a predictable pattern of colonial resistance", "isCorrect": false, "rationale": "The causes were specific to each context (EIC annexation policies + cartridge incident in India; anti-Christian / anti-foreign sentiment + Qing support in China). The outcomes also differed in consequence — the Sepoy Rebellion led to the Raj; the Boxer Protocol led to Qing collapse."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
