    <div class="quiz-actions">

<script>
var QUESTIONS = [{"question": "A historian argues that early modern rulers' investments in monumental architecture were fundamentally political acts rather than aesthetic ones. Which of the following BEST supports this argument?", "options": [{"text": "The Taj Mahal, Versailles, the Forbidden City, and Topkapi Palace all feature similar architectural styles, demonstrating a shared global aesthetic.", "isCorrect": false, "rationale": "These buildings have very different architectural styles (Islamic, French Baroque, Chinese imperial, Ottoman). The source does not argue shared aesthetics but shared political function — each expressed imperial legitimacy through different visual vocabularies."}, {"text": "Monumental architecture announced a ruler's divine favor, command of resources, connection to revered predecessors, and ambition to be remembered — all political arguments expressed in stone.", "isCorrect": true, "rationale": "The source's Key Concept states: 'Monumental buildings in early modern empires were political arguments expressed in stone. They announced a ruler's divine favor, his command of resources, his connection to revered predecessors, and his ambition to be remembered across generations.'"}, {"text": "Rulers built monumental structures only when they were economically prosperous, so architecture can be used as an index of imperial wealth alone.", "isCorrect": false, "rationale": "The source notes Louis XIV's treasury was 'often near bankruptcy' while he was building Versailles — undermining the idea that monumental building was only possible during prosperity. Rulers built despite fiscal pressure because of political necessity."}, {"text": "Because all major early modern empires eventually declined, the buildings they constructed became memorials to failure rather than political statements.", "isCorrect": false, "rationale": "The source argues buildings succeeded as political statements in their own time, regardless of later imperial decline. The political meaning was contemporary, not retrospective."}], "id": "q01"}, {"question": "The source describes Topkapi Palace's system of graduated access to the sultan. What political function did this system serve?", "options": [{"text": "It made the palace more secure by limiting the number of people who knew the sultan's location at any given time.", "isCorrect": false, "rationale": "Security is not the analysis the source offers. The source focuses on the political function of the access hierarchy — making proximity to the ruler the supreme prize of political life and drawing nobles into competition for favor."}, {"text": "It concentrated power by making proximity to the ruler the supreme prize of political life, drawing nobles and officials into perpetual competition for royal favor rather than independent action.", "isCorrect": true, "rationale": "The source states: 'This graduated access system concentrated power by making proximity to the ruler the supreme prize of political life, drawing nobles and officials into perpetual competition for favor.'"}, {"text": "It allowed the Janissaries stationed in the first courtyard to control the viziers in the second, creating a military check on administrative power.", "isCorrect": false, "rationale": "The source describes the access tiers in terms of political hierarchy and proximity to the sultan, not as a military-administrative check mechanism. Janissary control of viziers via courtyard positioning is not the analysis offered."}, {"text": "It created a physical separation between the sultan's religious duties (inner courtyard) and his secular governance (outer courtyard), reflecting the Ottoman blending of kanun and shari'a.", "isCorrect": false, "rationale": "While the inner/outer division does separate domestic-ceremonial from administrative spaces, the source's analysis focuses on the political competition for proximity as the function — not a religious-secular separation."}], "id": "q02"}, {"question": "Read this passage: 'The Taj Mahal was not merely a monument to love. It was a political statement. By spending on a scale that no rival could match, Shah Jahan announced Mughal supremacy.' Which analytical concept BEST names what this passage describes?", "options": [{"text": "Economic surplus — rulers who had extra resources naturally spent them on construction projects.", "isCorrect": false, "rationale": "The source's argument is not about spending surplus resources but about using architectural scale as a deliberate communication of political power and supremacy. The spending was purposive, not incidental."}, {"text": "Power as performance — rulers used conspicuous architectural expenditure to communicate political supremacy to rivals and subjects, making architecture a competitive assertion of legitimacy.", "isCorrect": true, "rationale": "The source frames the Taj Mahal as a 'political statement' through spending 'on a scale that no rival could match' — announcing supremacy. The broader concept developed throughout the section is that 'power is performed as much as it is exercised' through ritual, architecture, and ceremony."}, {"text": "Religious piety — the Taj Mahal's Quranic calligraphy and paradise-garden design show that Mughal rulers built primarily to express personal faith.", "isCorrect": false, "rationale": "While religious symbolism is present, the source specifically argues the Taj Mahal was a 'political statement' — the religious elements served the political function, not the reverse."}, {"text": "Architectural determinism — the geography of the Indian subcontinent required large-scale construction to mark imperial boundaries.", "isCorrect": false, "rationale": "Geographic determinism is not offered anywhere in the source. Rulers' political calculations — not landscape features — drove monumental building."}], "id": "q03"}, {"question": "The source claims that when placed in global context, Louis XIV was 'neither exceptional nor uniquely powerful.' Which evidence BEST supports this revisionist assessment?", "options": [{"text": "Louis XIV never left France, limiting his ability to observe and adopt the administrative practices of rival states.", "isCorrect": false, "rationale": "Louis XIV's geographic confinement is not the evidence the source offers. The comparison is explicitly quantitative and political — population, treasury, and military power relative to non-European contemporaries."}, {"text": "Louis XIV's kingdom had a smaller population than Qing China, his treasury was often near bankruptcy, and his military power was far inferior to the Mughal Empire at its height — though he shared with other rulers the insight that power is performed through ritual and architecture.", "isCorrect": true, "rationale": "The source states exactly this: 'His kingdom had a smaller population than Qing China, his treasury was often near bankruptcy, and his military power, while formidable in Europe, was far inferior to that of the Mughal Empire at its height.'"}, {"text": "France's overseas colonial empire was much smaller than those of Spain and Portugal, making Louis XIV a minor player in early modern globalization.", "isCorrect": false, "rationale": "Colonial empire comparisons are not the basis of the source's argument about Louis XIV's relative power. The comparison is made against the Mughal and Qing empires, not other European colonial powers."}, {"text": "Louis XIV's court at Versailles was directly copied from Ottoman and Mughal models, proving he was not the innovative political thinker European historians have claimed.", "isCorrect": false, "rationale": "The source does not claim Versailles was copied from non-European models. It argues all these courts shared a common political logic (power through performance) that was arrived at independently."}], "id": "q04"}, {"question": "The Sultanate of Women at Topkapi Palace is cited in the source as evidence that the harem was 'a political institution.' What evidence supports this characterization?", "options": [{"text": "The harem's architectural location at the center of Topkapi ensured that all court visitors had to pass through it, giving the women who lived there control over court access.", "isCorrect": false, "rationale": "The source does not describe physical control of access as the mechanism of harem influence. The Sultanate of Women exerted influence through succession and policy, not architectural gatekeeping."}, {"text": "Mothers, sisters, and consorts of the sultan wielded documented political influence through the Sultanate of Women, shaping imperial succession and policy in ways that court records confirm.", "isCorrect": true, "rationale": "The source states: 'The famous harem was not simply a domestic quarters but a political institution: the mothers, sisters, and consorts of the sultan wielded significant influence through the Sultanate of Women in the late sixteenth and seventeenth centuries, shaping succession and policy in ways that court records document in detail.'"}, {"text": "The harem served as the training ground for devshirme recruits before they advanced to the palace school (Enderun), making it the first institutional step in the Ottoman administrative career.", "isCorrect": false, "rationale": "Devshirme recruits were trained in the Enderun palace school, not the harem. These are separate institutions with different populations and functions."}, {"text": "The harem's inhabitants were the only people permitted to enter the third courtyard of Topkapi, giving them exclusive access to the sultan's living space.", "isCorrect": false, "rationale": "The source states that the sultan's 'most intimate servants — pages, eunuchs, and favorites' entered the third courtyard. The harem's political influence operated through succession and policy shaping, not monopoly of third-courtyard access."}], "id": "q05"}, {"question": "Shah Jahan designed the Taj Mahal as a charbagh (four-quartered paradise garden) referencing Timurid garden design. How does the source interpret this architectural choice?", "options": [{"text": "As an aesthetic choice reflecting personal preference for Central Asian garden designs learned during Shah Jahan's education.", "isCorrect": false, "rationale": "The source presents the Timurid garden plan as politically meaningful, not merely aesthetic: 'Architecture, in short, was genealogy made visible' — connecting Shah Jahan to his Central Asian imperial ancestors."}, {"text": "As evidence that Mughal architectural practice was backward-looking and borrowed entirely from earlier traditions rather than innovating.", "isCorrect": false, "rationale": "The source interprets the Timurid reference as a deliberate legitimizing strategy, not as evidence of uncreative borrowing. The Taj Mahal synthesized multiple traditions into a new monumental form."}, {"text": "As a political claim connecting Shah Jahan genealogically to Timur (Tamerlane) — making architectural genealogy a form of imperial legitimacy visible to all who entered the monument.", "isCorrect": true, "rationale": "The source explicitly states: 'The building sat at the end of a formal chahar bagh (four-quartered garden), a Timurid garden plan that connected Shah Jahan to his Central Asian imperial ancestors. Architecture, in short, was genealogy made visible.'"}, {"text": "As a religious statement drawing on Quranic descriptions of paradise as a garden with four rivers — primarily an expression of Islamic theology rather than political genealogy.", "isCorrect": false, "rationale": "While the paradise-garden symbolism has Islamic religious content, the source specifically emphasizes the Timurid genealogical connection as the political meaning of the chahar bagh. Both elements coexist, but the source's analytical emphasis is on genealogy-as-legitimacy."}], "id": "q06"}, {"question": "The source argues that Louis XIV's Versailles court ceremonies — 'who sat in which chair, who handed the king his shirt, who preceded whom into dinner' — 'were not idle vanity.' What political function did these ceremonies serve?", "options": [{"text": "They demonstrated France's cultural superiority to foreign ambassadors, winning diplomatic concessions through soft power.", "isCorrect": false, "rationale": "While foreign ambassadors were indeed overawed by Versailles, the source's analysis specifically focuses on the domestic political function: controlling the French nobility by making them dependent on royal favor through court attendance."}, {"text": "They were mechanisms of political control — requiring the most powerful French nobles to reside at Versailles rather than on their own estates simultaneously kept rivals under surveillance and deprived them of their independent power base.", "isCorrect": true, "rationale": "The source states: 'The endless ceremonies of court life — who sat in which chair, who handed the king his shirt, who preceded whom into dinner — were not idle vanity. They were mechanisms of political control.' And: Louis required powerful nobles to reside at Versailles, 'simultaneously kept potential rivals under his eye and deprived them of their independent power base.'"}, {"text": "They reflected Louis XIV's genuine religious devotion — the Catholic Mass and liturgical calendar structured daily life at Versailles, making piety inseparable from royal service.", "isCorrect": false, "rationale": "While Louis XIV was Catholic and the court had religious dimensions, the source analyzes the ceremonies in terms of political control of the nobility, not religious devotion."}, {"text": "They were required by the French constitution's traditional law (loi fundamentale) to maintain the ancient dignity of the French monarchy.", "isCorrect": false, "rationale": "The source does not invoke constitutional law as the basis for Versailles ceremonies. They are analyzed as deliberate political instruments of the king's absolutist project."}], "id": "q07"}, {"question": "Which statement BEST identifies what the Ottoman, Mughal, Qing, and French Bourbon courts had in COMMON, according to the source?", "options": [{"text": "All four court cultures were based on identical ceremonial models that circulated through diplomatic contact and competitive imitation.", "isCorrect": false, "rationale": "The source does not suggest the courts copied each other or had 'identical' models — it notes 'the specific ceremonies were different' while sharing the same political logic. They arrived at the same solution independently."}, {"text": "All four used the power of ritual, architecture, and ceremony as instruments of governance — performing power as much as exercising it — to draw nobles into competition for royal favor and away from independent power.", "isCorrect": true, "rationale": "The source's conclusion states: 'What he [Louis XIV] shared with the Ottoman sultan, the Mughal emperor, and the Qing Son of Heaven was the insight that power is performed as much as it is exercised — that ritual, architecture, and ceremony are instruments of governance, not decorations upon it.'"}, {"text": "All four courts were organized around the same religious calendar, reflecting a shared monotheistic framework for royal legitimacy.", "isCorrect": false, "rationale": "The four courts represented Islam (Ottoman, Mughal), Confucian/Buddhist (Qing), and Catholic Christianity (French Bourbon) — very different religious frameworks. Their shared logic was political, not religious."}, {"text": "All four rulers personally supervised the construction of their palaces, ensuring architectural choices directly reflected individual political philosophies.", "isCorrect": false, "rationale": "While rulers were invested in their palaces' designs, the source analyzes the shared political logic of monumental architecture rather than making claims about each ruler's direct supervision of construction."}], "id": "q08"}, {"question": "A student analyzing early modern court culture writes: 'Versailles was unique because only European absolute monarchs understood how to use ceremony to control the nobility.' Based on the source, what is the most significant flaw in this argument?", "options": [{"text": "The argument is flawed because Versailles was not actually the most elaborate court of the period — Topkapi Palace was older and more architecturally complex.", "isCorrect": false, "rationale": "Comparing architectural complexity or age is not the point. The source's critique of the Eurocentric view focuses on the shared political logic of all major early modern courts, not on comparative design merit."}, {"text": "The argument is Eurocentric: the Mughal, Ottoman, and Qing courts all used court ritual, ceremonial hierarchy, and architectural grandeur as instruments of political control over their nobles and subjects, demonstrating that this insight was global, not uniquely European.", "isCorrect": true, "rationale": "The source explicitly frames Versailles in global context, comparing it to Topkapi, the Forbidden City, and Mughal court practice, and concludes they all shared 'the insight that power is performed as much as it is exercised.' The claim of European uniqueness contradicts the source."}, {"text": "The argument is flawed because absolute monarchy was actually stronger in Asia than in Europe, meaning European rulers had less success using ceremony as control.", "isCorrect": false, "rationale": "The source does not rank the strength of absolute monarchy across regions. It argues they all shared the same logic — not that one was more effective at it than another."}, {"text": "The argument is flawed only if we define 'ceremony' broadly to include religious ritual — once we restrict the term to secular court protocol, Versailles does stand apart from non-European courts.", "isCorrect": false, "rationale": "The source does not make a secular/religious distinction in this context. Topkapi's access hierarchy, the Forbidden City's ritual approach of the emperor, and the Mughal court's formal structures were all analogously ceremonial, regardless of their religious content."}], "id": "q09"}, {"question": "The source identifies four overlapping reasons why rulers build monumentally. Which combination BEST captures these reasons?", "options": [{"text": "Economic display, military intimidation, trade attraction, and administrative efficiency.", "isCorrect": false, "rationale": "These are not the four reasons the source identifies. 'Administrative efficiency' is notably absent from the logic of monumental building; the Forbidden City's 980 buildings served ritual and political, not efficient administrative, purposes."}, {"text": "Scale intimidates rivals and subjects, permanence embeds the ruler's memory in the landscape, aesthetic magnificence makes the capital a cultural center, and religious symbolism makes authority appear divinely sanctioned.", "isCorrect": true, "rationale": "These are the four reasons the source lists: (1) 'scale intimidates'; (2) 'permanence projects continuity'; (3) 'aesthetic magnificence signals civilizational achievement'; (4) 'religious symbolism legitimizes.'"}, {"text": "Artistic patronage, employment creation, engineering demonstration, and propaganda display.", "isCorrect": false, "rationale": "While these are plausible historical functions of monumental building, the source identifies a different analytical framework. Employment creation and engineering demonstration are not among the four reasons explicitly listed."}, {"text": "Religious devotion, military preparedness, dynastic pride, and economic investment in skilled craftworkers.", "isCorrect": false, "rationale": "While dynastic pride overlaps with 'permanence projects continuity,' the four-part framework the source offers is more specific: scale, permanence, aesthetic magnificence, and divine sanction."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
