        <div class="subtitle">AP World History: Modern &mdash; The Enlightenment</div>
    </div>

    <div id="score-box" class="score-box">

        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "John Locke argued in his Two Treatises of Government that government's primary purpose was to", "options": [{"text": "Enforce religious doctrine and maintain moral order in society", "isCorrect": false, "rationale": "Locke did not ground government in religious doctrine; he argued against inherited tradition and revealed religion as bases for political authority."}, {"text": "Protect the natural rights of life, liberty, and property that preceded government", "isCorrect": true, "rationale": "Locke argued that natural rights predated and constrained government, and that government existed only to protect those rights — justifying resistance if it violated them instead."}, {"text": "Concentrate sovereign power in a monarch who could maintain social order", "isCorrect": false, "rationale": "Locke's framework was explicitly anti-absolutist; it gave philosophical justification to limiting monarchical power, not concentrating it."}, {"text": "Represent the general will of all citizens above any individual interest", "isCorrect": false, "rationale": "The concept of the 'general will' belongs to Rousseau, not Locke. Locke focused on individual natural rights and the social contract."}]}, {"question": "Read the following passage: 'Man is born free; and everywhere he is in chains. One thinks himself the master of others, and still remains a greater slave than they.' — Jean-Jacques Rousseau, The Social Contract (1762). Based on the passage and your knowledge, Rousseau's critique most directly challenged which existing political arrangement?", "options": [{"text": "Merchant capitalism and mercantile trade restrictions", "isCorrect": false, "rationale": "Rousseau's Social Contract addressed political legitimacy and governance, not commercial policy. Adam Smith targeted mercantilism."}, {"text": "Absolute monarchy justified by divine right or hereditary succession", "isCorrect": true, "rationale": "Rousseau wrote when most of Europe was governed by absolute monarchs claiming authority by divine right. His argument that legitimate authority required consent — not force — was a direct challenge to that order."}, {"text": "The power of the Catholic Church to define moral and civil law", "isCorrect": false, "rationale": "While Rousseau critiqued organized religion elsewhere, the Social Contract excerpt focuses on political legitimacy and the nature of obedience, not clerical authority specifically."}, {"text": "Colonial mercantilist policies that restricted trade in the Americas", "isCorrect": false, "rationale": "Colonial trade policy was not Rousseau's focus in the Social Contract. His argument was about the philosophical basis of political authority."}]}, {"question": "Montesquieu's advocacy for separation of powers in The Spirit of the Laws was most significant because it", "options": [{"text": "Proposed that women and men should share equal rights in government", "isCorrect": false, "rationale": "Montesquieu did not advocate gender equality; his work focused on dividing governmental authority among branches to prevent concentration of power."}, {"text": "Argued that religious law should serve as the basis for civil governance", "isCorrect": false, "rationale": "Montesquieu, like other philosophes, advocated reason-based governance, not religious law. Voltaire specifically attacked clerical privilege."}, {"text": "Provided a structural model to prevent any single person or body from concentrating governmental authority", "isCorrect": true, "rationale": "Montesquieu analyzed existing governments comparatively and advocated dividing authority among legislative, executive, and judicial branches — a framework directly adopted in the U.S. Constitution."}, {"text": "Demonstrated that absolute monarchy was the most stable form of government", "isCorrect": false, "rationale": "Montesquieu's analysis of governments led him away from absolutism; separation of powers was intended as a safeguard against tyranny, not an endorsement of absolute rule."}]}, {"question": "Mary Wollstonecraft's A Vindication of the Rights of Woman (1792) was significant in the history of Enlightenment thought primarily because she", "options": [{"text": "Rejected Enlightenment rationalism and returned to religious tradition as the basis for women's rights", "isCorrect": false, "rationale": "Wollstonecraft did not reject rationalism — she embraced it. Her argument was that if reason is the basis of rights, women, who are equally rational, must be equally entitled to rights."}, {"text": "Used Enlightenment logic itself to expose the contradiction between its universal claims and its exclusion of women", "isCorrect": true, "rationale": "Wollstonecraft argued that the Enlightenment's own premise — that reason is the basis of rights — logically required extending rights to women, turning the movement's logic against its male practitioners' assumptions."}, {"text": "Successfully persuaded major European governments to grant women political equality within her lifetime", "isCorrect": false, "rationale": "The source notes explicitly that Wollstonecraft's argument would not produce political results for another century, making immediate political success an incorrect claim."}, {"text": "Agreed with Rousseau's argument in Émile that women's role was to support and subordinate themselves to men", "isCorrect": false, "rationale": "Wollstonecraft directly challenged Rousseau's position in Émile, which subordinated women. Her work was a rebuttal of exactly that view."}]}, {"question": "A student studying the Enlightenment argues: 'The philosophes were concerned only with abstract philosophy and had no practical political impact.' Which evidence BEST refutes this argument?", "options": [{"text": "Voltaire used satire to attack religious superstition but avoided political topics in his writings", "isCorrect": false, "rationale": "Voltaire actually attacked judicial torture and clerical privilege — which were political topics — alongside religious superstition. This choice misrepresents his work."}, {"text": "Colonists in Philadelphia, peasants in Paris, and rebels in Saint-Domingue all invoked Enlightenment language of 'rights' and 'liberty' to justify revolution", "isCorrect": true, "rationale": "The source explicitly opens by noting that revolutionaries across the Atlantic world — American colonists, French peasants, Haitian rebels, and Latin American creoles — all drew on the same Enlightenment vocabulary, demonstrating direct practical impact."}, {"text": "Adam Smith's The Wealth of Nations proposed a new theory of markets but was ignored by governments until the nineteenth century", "isCorrect": false, "rationale": "Smith's laissez-faire economics became the intellectual foundation for industrial capitalism, showing practical impact rather than irrelevance. This choice also misrepresents the source."}, {"text": "Diderot and d'Alembert's Encyclopédie was written only for university scholars and never reached a broader public", "isCorrect": false, "rationale": "The source states the Encyclopédie was designed to carry ideas to 'a wider literate public' and embodied the conviction that accurate information 'freely shared' could improve human life — the opposite of narrow scholarly distribution."}]}, {"question": "The concept of the 'social contract,' as developed by Enlightenment thinkers, implied that sovereignty resided in", "options": [{"text": "The hereditary monarch, whose authority was sanctioned by divine right and tradition", "isCorrect": false, "rationale": "The social contract theory explicitly undermined divine-right monarchy. It located sovereignty in the people, not in any hereditary ruler."}, {"text": "The natural laws of the universe, which philosophers could interpret independently of politics", "isCorrect": false, "rationale": "While Enlightenment thinkers drew on natural law, the social contract specifically addressed political sovereignty — where governmental authority originates — and located it in the people's consent, not abstract natural laws."}, {"text": "The people, who delegated authority to government through consent and could revoke it if violated", "isCorrect": true, "rationale": "Both Locke and Rousseau agreed that sovereignty resided in the people, who formed a social contract delegating authority to government. If government violated the contract, the people were justified in altering or abolishing it."}, {"text": "A council of philosophers who could determine the rational principles best suited to governance", "isCorrect": false, "rationale": "No major Enlightenment social contract theorist advocated rule by philosophers. The concept located legitimacy in popular consent, not expert governance."}]}, {"question": "Rousseau's conception of the 'general will' differed from Locke's framework of natural rights primarily in that Rousseau", "options": [{"text": "Accepted existing property arrangements as the foundation of a just society", "isCorrect": false, "rationale": "The source states that Rousseau, unlike Locke, argued that private property was the root of social inequality — so Rousseau did not accept existing property arrangements."}, {"text": "Argued that collective decision-making superseded individual rights and private interests", "isCorrect": true, "rationale": "Rousseau's general will represented the collective interest of all citizens, which he placed above the private interests of individuals or factions — a departure from Locke's emphasis on individual natural rights."}, {"text": "Believed that absolute monarchy was the only effective guarantor of individual security", "isCorrect": false, "rationale": "Both Locke and Rousseau challenged absolute monarchy. Rousseau's general will was a democratic principle, not a defense of autocracy."}, {"text": "Limited political participation to property-owning men who had a stake in social order", "isCorrect": false, "rationale": "The source does not attribute a property qualification to Rousseau's general will. Rousseau actually critiqued property as a source of inequality, which is the opposite of this claim."}]}, {"question": "Adam Smith's argument for laissez-faire economics in The Wealth of Nations (1776) most directly challenged which prevailing system?", "options": [{"text": "Feudalism, which tied peasants to the land and restricted free movement of labor", "isCorrect": false, "rationale": "Smith targeted mercantilist state direction of trade, not feudalism. The enclosure movement and agricultural transformation were related but distinct from Smith's economic argument."}, {"text": "Mercantilism, which relied on state direction of trade and colonies to accumulate national wealth", "isCorrect": true, "rationale": "Smith argued that free markets governed by the 'invisible hand' of competition would allocate resources more efficiently than mercantilist state direction — making mercantilism the direct target of his economic critique."}, {"text": "Socialism, which proposed collective ownership of production to replace private enterprise", "isCorrect": false, "rationale": "Socialism emerged as a response to industrial capitalism in the nineteenth century, after Smith's death. Smith was responding to mercantilism, not a socialist critique."}, {"text": "Absolutism, which concentrated political and economic power in the hands of monarchs", "isCorrect": false, "rationale": "While Smith's free-market argument had political implications, his direct target was the economic doctrine of mercantilism — state management of trade — not absolutist political structures per se."}]}, {"question": "Compare the following scenario: A 1770s colonial pamphlet cites Locke to justify resistance to British taxation; a 1790s French revolutionary document cites Rousseau to justify abolishing the monarchy; a 1790s Haitian rebel extends Enlightenment language to demand freedom from slavery. This comparison BEST illustrates which historical pattern?", "options": [{"text": "Enlightenment ideas were originally intended for enslaved and colonized people and were later adopted by European elites", "isCorrect": false, "rationale": "The Enlightenment originated among European philosophers writing for educated European audiences. The Haitian case represents enslaved people extending ideas that were not originally directed at them — the opposite direction from this choice."}, {"text": "Enlightenment political vocabulary was flexible enough to be adapted across different revolutionary contexts and by different social groups", "isCorrect": true, "rationale": "The source notes that American colonists, French revolutionaries, and Haitian rebels all 'reached for the same language of rights and liberty' from different social positions and for different immediate purposes — demonstrating the vocabulary's adaptability."}, {"text": "Each revolution produced identical political outcomes because they drew on the same philosophical sources", "isCorrect": false, "rationale": "The revolutions produced very different outcomes. The American Revolution protected slavery; the Haitian Revolution abolished it. Shared vocabulary did not produce identical results."}, {"text": "Enlightenment ideas were most effectively applied in monarchies like France, not in colonial settings", "isCorrect": false, "rationale": "The source emphasizes the Atlantic-wide reach of Enlightenment ideas across colonial and non-colonial settings. The Haitian case demonstrates colonial application, not its ineffectiveness there."}]}, {"question": "The Enlightenment is best described as a movement that", "options": [{"text": "Defended traditional monarchy and established religion against the disorder of popular politics", "isCorrect": false, "rationale": "This describes the conservative reaction to the Enlightenment and to the French Revolution, not the Enlightenment itself, which challenged monarchy, aristocracy, and established churches."}, {"text": "Was limited to France and had little impact on political developments in the Americas", "isCorrect": false, "rationale": "The source emphasizes the Enlightenment's Atlantic-wide reach, transforming political culture from Philadelphia to Paris to Caracas. Limiting it to France misrepresents its geographic impact."}, {"text": "Applied principles of reason to politics and society, providing the intellectual vocabulary for Atlantic revolutions", "isCorrect": true, "rationale": "The source describes the Enlightenment as transforming Atlantic political culture by arguing that human reason could evaluate government, and as providing the vocabulary and justification for political revolutions across the Atlantic world."}, {"text": "Argued that scientific progress should be kept separate from political philosophy and governance", "isCorrect": false, "rationale": "The Enlightenment explicitly applied scientific-revolution logic to political philosophy — if Newton's laws explained nature, Enlightenment thinkers asked whether rational principles could explain governance."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
