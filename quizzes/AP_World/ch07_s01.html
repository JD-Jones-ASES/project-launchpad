    <div class="quiz-actions">

<script>
var QUESTIONS = [{"question": "The near-simultaneous collapse of the Ottoman, Qing, and Romanov empires between 1911 and 1924 is best explained by which shared structural condition?", "options": [{"text": "All three empires were destroyed by direct military conquest from outside powers.", "isCorrect": false, "rationale": "While military defeat contributed in some cases (the Ottomans in WWI, Russia's war losses), none of the three empires was simply conquered from outside. Each collapsed primarily through internal crises, revolutionary movements, and the structural mismatch with the nation-state model."}, {"text": "All three faced nationalist movements among subject peoples, economic strain from industrial warfare, and the mismatch between dynastic legitimacy and the nation-state model.", "isCorrect": true, "rationale": "The source explicitly identifies these three structural pressures as shared causes: nationalist movements demanding self-determination, the economic demands of industrial-era warfare, and the incompatibility of multi-ethnic dynastic empires with a world organized around ethnically homogeneous nation-states."}, {"text": "All three were undermined primarily by European colonial extraction of their economic resources.", "isCorrect": false, "rationale": "While the Qing suffered from unequal treaties that extracted concessions, the Romanov and Ottoman collapses were not primarily driven by European colonial extraction. The shared cause was internal structural pressure, not external economic exploitation alone."}, {"text": "All three lacked industrialized militaries and were unable to compete with more modern powers.", "isCorrect": false, "rationale": "This is partially true for the Qing but does not fully explain all three cases. Russia was itself an industrializing power, and the Ottomans entered WWI as a combatant, not simply as a victim of superior technology. The structural explanation centers on nationalism and dynastic legitimacy, not military technology alone."}], "id": "q01"}, {"question": "A historian studying the Ottoman Empire in the early twentieth century writes: 'The CUP's response to the empire's multi-ethnic crisis ultimately became the ideological precursor to the Armenian Genocide.' Which policy does this statement most directly reference?", "options": [{"text": "The capitulations system that granted privileges to European nationals within Ottoman territory.", "isCorrect": false, "rationale": "The capitulations (extraterritoriality for foreign nationals) were a pre-existing feature of Ottoman weakness vis-à-vis Europe, not a CUP-era policy. They were not the ideological precursor to the genocide; Turkification was."}, {"text": "The Young Turk revolution of 1908, which deposed the sultan and restored the constitution.", "isCorrect": false, "rationale": "The 1908 revolution itself was a reform movement that initially promised greater rights to minorities. While it brought the CUP to power, the revolution as an event was not the genocide's ideological precursor — the policy of Turkification that the CUP subsequently pursued was."}, {"text": "Turkification — the coercive imposition of Turkish language, culture, and identity on non-Turkish minorities.", "isCorrect": true, "rationale": "The source defines Turkification as the CUP policy of imposing Turkish identity on Armenians, Kurds, Arabs, and Greeks, and explicitly states it 'provided the ideological framework for the Armenian Genocide of 1915.' It is the direct referent of the historian's statement."}, {"text": "The alliance with Germany in 1914, which drew the Ottomans into a war they could not sustain.", "isCorrect": false, "rationale": "The German alliance accelerated the conditions under which the genocide occurred, but it was not the ideological precursor. The ideology was Turkification; the war created the opportunity and cover for its most extreme implementation."}], "id": "q02"}, {"question": "The unequal treaty system forced on China between 1842 and 1911 is best described as which of the following?", "options": [{"text": "A series of trade agreements that opened Chinese markets to foreign goods while preserving Chinese sovereignty and legal authority over foreign nationals.", "isCorrect": false, "rationale": "The unequal treaties did not preserve Chinese sovereignty. They granted extraterritoriality to foreign nationals (removing them from Chinese legal jurisdiction), ceded territory, and imposed massive indemnity payments — all of which undermined sovereignty."}, {"text": "A set of military alliances through which China sought great-power protection against Japanese expansion.", "isCorrect": false, "rationale": "China did not enter the unequal treaties as a military ally seeking protection. The treaties were imposed following military defeats, not negotiated as alliance agreements."}, {"text": "Agreements imposed by stronger powers following military defeats, requiring China to cede territory, open ports, grant extraterritoriality, and pay indemnities without equivalent benefits.", "isCorrect": true, "rationale": "This matches the source's definition exactly: imposed after defeats, involving major concessions — Hong Kong, Taiwan, treaty ports, extraterritoriality, indemnity payments — 'without receiving equivalent benefits.' The source also notes that 'the humiliation of the unequal-treaty system became a driving grievance of Chinese nationalism.'"}, {"text": "A framework for gradual Chinese industrialization negotiated cooperatively with European and Japanese investors.", "isCorrect": false, "rationale": "The treaties were not cooperative agreements for development; they were coercive instruments of imperial extraction. The indemnity payments and extraterritoriality provisions specifically undermined Chinese economic and legal sovereignty."}], "id": "q03"}, {"question": "Which of the following best explains why the Russo-Japanese War of 1904–1905 was historically significant beyond its immediate military outcome?", "options": [{"text": "It demonstrated that Russia's Romanov dynasty had successfully modernized its military to compete with Asian powers.", "isCorrect": false, "rationale": "Russia lost the Russo-Japanese War decisively. The outcome revealed the Romanov dynasty's military weakness, not its modernization success. The war's significance lies in its role in triggering the Revolution of 1905, not in demonstrating Russian strength."}, {"text": "It marked the first major military defeat of a European great power by an Asian nation in the modern era and triggered revolutionary pressure on the Romanov dynasty.", "isCorrect": true, "rationale": "The source explicitly calls it 'the first major victory of an Asian power over a European great power in the modern era.' Russia's defeat triggered the Revolution of 1905, forcing Nicholas II to issue the October Manifesto — directly revealing the dynasty's vulnerability."}, {"text": "It established Japan as the dominant colonial power in East Asia, immediately displacing Chinese and European influence.", "isCorrect": false, "rationale": "Japan's victory expanded its influence significantly, but the war's most historically noted significance in this context is its effect on Russia's Romanov dynasty and the trigger of the 1905 revolution — not the instantaneous displacement of all European and Chinese influence."}, {"text": "It led directly to the Russian Revolution of 1917 by destroying Russia's ability to feed its industrial workforce.", "isCorrect": false, "rationale": "The war triggered the 1905 Revolution, not 1917. The 1917 revolutions were primarily triggered by the strain of World War I, particularly bread shortages in Petrograd. Conflating 1905 and 1917 misattributes causation."}], "id": "q04"}, {"question": "Read the following excerpt from a contemporary Russian source (1917): 'We did not want this war. We did not want bread lines. We did not want trenches with no shells for our guns. We want peace, land, and bread.' Which of the following best uses this source to explain the October 1917 Bolshevik seizure of power?", "options": [{"text": "The source illustrates Russian workers' ideological commitment to Marxist class struggle and their desire to build a communist state.", "isCorrect": false, "rationale": "The source does not reflect sophisticated Marxist ideology. The demands — peace, land, bread — are practical grievances, not ideological commitments. Attributing ideological motivation to what are expressed as material needs misreads the source."}, {"text": "The source shows that the Provisional Government's decision to continue the war alienated the population, creating the conditions the Bolsheviks exploited with their promise of 'Peace, Land, Bread.'", "isCorrect": true, "rationale": "The source's core grievances — war fatigue, food shortages, military inadequacy — directly match the Bolshevik platform. The source explains why the Provisional Government's refusal to exit the war was fatal to its legitimacy, as the section states: 'Its refusal to exit alienated the population and created the conditions for the Bolshevik Revolution.'"}, {"text": "The source demonstrates that the Russian peasantry was the primary driver of the October Revolution, acting on long-standing agrarian grievances.", "isCorrect": false, "rationale": "While peasant discontent was a factor, the October Revolution was led by the Bolshevik party primarily through Petrograd's urban working class and soldiers. The source's mention of 'bread lines' and trenches points to urban and military contexts, not purely agrarian revolt."}, {"text": "The source illustrates German sabotage of the Russian war effort, which the Bolsheviks blamed for the dynasty's collapse.", "isCorrect": false, "rationale": "The source blames Russian structural failures — inadequate supply, bread shortages, the continuation of a war the population opposed — not German sabotage. The 'stab-in-the-back' myth was a German nationalist trope, not a Russian Bolshevik narrative."}], "id": "q05"}, {"question": "The Warlord Era in China (1916–1928) is best understood as a direct consequence of which preceding development?", "options": [{"text": "The Japanese invasion of Manchuria, which destroyed the Nationalist government's military capacity.", "isCorrect": false, "rationale": "Japan's invasion of Manchuria occurred in 1931 — after the Warlord Era ended. The Warlord Era's cause was internal to China's post-1911 political fragmentation, not Japanese military action."}, {"text": "The collapse of Qing authority in 1911–1912 and the subsequent failure of the Republic to establish centralized political control.", "isCorrect": true, "rationale": "The source directly links the Warlord Era to the power vacuum created by the Qing collapse: Yuan Shikai's death left no effective central authority, and 'regional military commanders — warlords — contested control of territories while the nominal republican government in Beijing exercised little real authority.'"}, {"text": "European imperialist intervention following World War I, which partitioned China into spheres of foreign control.", "isCorrect": false, "rationale": "While foreign powers maintained treaty-port privileges, China was not formally partitioned by foreign intervention after WWI. The Warlord Era was a product of domestic political fragmentation following the Qing collapse, not direct European territorial division."}, {"text": "The failure of the Boxer Rebellion, which destroyed Chinese military capacity and forced the Qing to accept permanent foreign occupation.", "isCorrect": false, "rationale": "The Boxer Rebellion's aftermath (1900–1901) weakened the Qing but did not result in permanent foreign occupation or directly produce the Warlord Era. The Warlord Era followed the 1911 revolution, not the Boxer Rebellion."}], "id": "q06"}, {"question": "According to the SPICE-T framework, the collapse of the Ottoman, Qing, and Romanov empires most directly illustrates the collision between which two forces?", "options": [{"text": "Economic globalization and traditional subsistence agriculture.", "isCorrect": false, "rationale": "While economic pressures contributed to each empire's collapse, the SPICE-T analysis in the source specifically identifies the political force of nationalism and the cultural force of dynastic legitimacy as the central collision — not economic globalization vs. subsistence agriculture."}, {"text": "The political force of nationalism and the cultural force of dynastic legitimacy.", "isCorrect": true, "rationale": "The source's SPICE-T connection section explicitly names these two forces: 'the political force of nationalism (the demand that ethnically and culturally distinct peoples govern themselves) and the cultural force of dynastic legitimacy (the idea that divine right or centuries of tradition justified multi-ethnic rule by a single imperial house).'"}, {"text": "Industrialization and agrarian resistance to modernization.", "isCorrect": false, "rationale": "While industrialization created economic pressures that strained the empires, the source's SPICE-T framework does not identify industrialization vs. agrarian resistance as the central analytical collision — it focuses on nationalism vs. dynastic legitimacy."}, {"text": "Environmental pressures and technological inequality between empires.", "isCorrect": false, "rationale": "Environmental factors and technology gaps are not the analytical frame the source uses for the simultaneous imperial collapse. The source emphasizes political and cultural forces, not ecological or technological ones."}], "id": "q07"}, {"question": "Compare the causes of the Qing dynasty's collapse with those of the Romanov dynasty. Which of the following identifies the most accurate similarity AND difference?", "options": [{"text": "Similarity: Both were undermined by unequal treaties with European powers. Difference: The Romanovs fell to a foreign invasion while the Qing fell to internal revolution.", "isCorrect": false, "rationale": "The Romanovs were not toppled by foreign invasion — they fell to internal revolution triggered by WWI's strains. And while the Qing suffered from unequal treaties, the Romanovs' challenge came from nationalist movements and a revolutionary socialist movement, not unequal treaties."}, {"text": "Similarity: Both faced internal nationalist and/or revolutionary movements demanding change. Difference: The Qing's crisis was rooted in the humiliation of the unequal-treaty system, while the Romanovs' was rooted in WWI's military and economic catastrophe.", "isCorrect": true, "rationale": "Both empires faced internal pressure for change — Chinese nationalist/republican movements and Russian revolutionary socialist/nationalist movements. But the trigger differed: for the Qing, the unequal-treaty humiliation and semi-colonization were central drivers; for the Romanovs, WWI's military disasters and bread shortages in Petrograd were the immediate catalysts."}, {"text": "Similarity: Both empires were replaced by stable democratic republics that quickly industrialized. Difference: China's republic lasted longer before being challenged by communism.", "isCorrect": false, "rationale": "Neither empire was replaced by a stable democracy. China entered the Warlord Era, then civil war between Nationalists and Communists. Russia became the Soviet Union under Bolshevik/communist rule. Neither outcome was a stable democratic republic."}, {"text": "Similarity: Both fell primarily because of European military conquest. Difference: The Qing surrendered to Japan while the Romanovs surrendered to Germany.", "isCorrect": false, "rationale": "Neither empire fell to foreign military conquest. The Qing collapsed through an internal revolution in 1911. The Romanovs fell to internal revolution in 1917. Japan's victories weakened the Qing but did not directly conquer the empire, and Germany did not conquer Russia — it exacted a harsh treaty (Brest-Litovsk) after the Bolsheviks sought peace."}], "id": "q08"}, {"question": "The Ottoman Empire's entry into World War I on the German side in 1914 is best understood as which of the following in the context of the empire's collapse?", "options": [{"text": "A strategic success that temporarily reversed territorial losses by aligning with the strongest European military power.", "isCorrect": false, "rationale": "The Ottoman entry into WWI on Germany's side was a strategic disaster. 'Military defeat in World War I was total,' and the armistice left Allied forces occupying Constantinople. The alliance did not reverse territorial losses — it accelerated the empire's dismemberment."}, {"text": "An irrelevant factor, since the Ottoman Empire was already certain to collapse before 1914 due to nationalism and economic weakness.", "isCorrect": false, "rationale": "While the Ottomans faced serious structural pressures before 1914, WWI was not irrelevant — it was decisive. The war enabled the CUP to escalate persecution of minorities, resulted in total military defeat, and led directly to the treaty system that partitioned Anatolia. It was anything but irrelevant."}, {"text": "A fatal decision that enabled minority persecution under wartime security pretexts, resulted in total military defeat, and led to the empire's dismemberment by the Treaty of Sèvres.", "isCorrect": true, "rationale": "The source identifies WWI as fatal for the Ottomans on multiple dimensions: it enabled escalation of persecution of minorities 'under the guise of wartime security' (the Armenian Genocide); the armistice left Allied forces occupying Constantinople; and the Treaty of Sèvres partitioned Anatolia. All three points together make WWI the proximate killer of the Ottoman Empire."}, {"text": "A rational alliance choice that reflected the Ottoman Empire's long-standing partnership with Germany since the 1870s.", "isCorrect": false, "rationale": "While Germany and the Ottomans had developed military ties before the war, rationalizing the alliance as a 'long-standing partnership' misframes the outcome. The source does not frame the alliance positively — it describes WWI as 'fatal' for the empire, whatever the rationale for entering it."}], "id": "q09"}, {"question": "The Treaty of Sèvres (1920) and the subsequent founding of the Republic of Turkey (1923) under Mustafa Kemal illustrate which AP World History theme most directly?", "options": [{"text": "Interaction with the Environment — the role of geographic factors in shaping state boundaries in Anatolia.", "isCorrect": false, "rationale": "While Anatolia's geography is relevant, the primary analytical theme is not environmental. The Sèvres-to-Lausanne sequence is fundamentally about political transformation — the replacement of a multi-ethnic empire by a nation-state — which belongs to the Political theme."}, {"text": "Political — the replacement of multi-ethnic imperial political forms by nationalist nation-states.", "isCorrect": true, "rationale": "The source's SPICE-T Connection explicitly identifies the Political theme as primary here: 'the replacement of imperial political forms by national ones reshaped every subsequent political development of the twentieth century.' Kemal's repudiation of Sèvres and founding of the Turkish Republic is the clearest example of this transformation in the Ottoman case."}, {"text": "Economic — the reparations imposed on Turkey by Allied powers after World War I.", "isCorrect": false, "rationale": "No reparations comparable to Germany's were imposed on Turkey in this narrative. The Treaty of Sèvres did partition Anatolia, but the resistance and reversal under Kemal was political and military, not primarily an economic story."}, {"text": "Cultural — the suppression of Islamic practice by Kemal's secular nationalist government.", "isCorrect": false, "rationale": "Kemal's secularization policies (abolition of the caliphate in 1924, later language and dress reforms) do have a Cultural dimension, but the section focuses on the political transformation — empire to republic, Ottoman sultanate abolished — as the primary analytical frame. The source does not discuss Kemal's secularization program beyond the abolition of the sultanate and caliphate."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
