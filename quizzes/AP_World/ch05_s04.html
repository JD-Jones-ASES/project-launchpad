<script>
var QUESTIONS = [{"question": "Saint-Domingue's social structure in the late eighteenth century was characterized by", "options": [{"text": "A relatively equal distribution of wealth between white planters and free people of color, with enslaved people providing modest agricultural labor", "isCorrect": false, "rationale": "The source describes extreme inequality: 40,000 white colonists and 30,000 gens de couleur sat above approximately 500,000 enslaved Africans, with planters calculating it was cheaper to work enslaved people to death than allow natural reproduction."}, {"text": "A rigid racial hierarchy in which approximately 500,000 enslaved Africans (90% of the population) produced the colony's extraordinary sugar and coffee wealth", "isCorrect": true, "rationale": "The source explicitly describes Saint-Domingue's extraordinary wealth (40% of Europe's sugar, more than half its coffee) as resting 'entirely on an extraordinarily brutal system of chattel slavery' with enslaved Africans constituting roughly 90% of the population."}, {"text": "A mixed economy in which most of the population were free farmers producing subsistence crops alongside plantation exports", "isCorrect": false, "rationale": "Saint-Domingue's economy was a plantation export economy entirely dependent on enslaved labor — there was no significant free-farmer subsistence sector among the majority population."}, {"text": "A French-administered system in which gens de couleur had equal legal rights to white colonists but fewer economic opportunities", "isCorrect": false, "rationale": "The gens de couleur were subject to racial humiliation laws (could not eat with whites, sit next to them in church, or hold public office) despite their legal freedom — they explicitly did not have equal legal rights."}]}, {"question": "The gens de couleur's exclusion from political rights was one of the immediate triggers of the Revolution's early phase because it demonstrated that", "options": [{"text": "Economic freedom and prosperity were sufficient to guarantee political equality in colonial society", "isCorrect": false, "rationale": "The gens de couleur's situation proved the opposite: some were wealthy property-owners and even slaveholders, yet they were legally barred from political participation — demonstrating that economic success did not guarantee political rights."}, {"text": "The Declaration of the Rights of Man's universalist language was not automatically applied even to free people with legal status", "isCorrect": true, "rationale": "When the National Assembly equivocated on whether the Declaration of the Rights of Man applied to free people of color, it exposed the gap between universalist rhetoric and practice — triggering Vincent Ogé's 1790 uprising."}, {"text": "The French colonial government had always been committed to racial equality and only reversed this after the Revolution began", "isCorrect": false, "rationale": "The racial humiliation laws restricting gens de couleur predated the Revolution. Racial hierarchy was built into the colonial system from the start."}, {"text": "Only enslaved Africans participated in the Haitian Revolution; free people of color remained loyal to France throughout", "isCorrect": false, "rationale": "Free people of color (led by Vincent Ogé in 1790) were the first to rise. The Revolution involved multiple groups at different stages, including gens de couleur, enslaved Africans, and eventually Toussaint's multiracial forces."}]}, {"question": "Read the following: The Haitian Revolution is described as 'not a footnote to the story of American or French revolution — it is its most uncompromising test.' This framing suggests the Haitian Revolution is significant because", "options": [{"text": "Haiti was a larger and wealthier colony than the thirteen American colonies, making its revolution strategically more important", "isCorrect": false, "rationale": "The source's framing is about the extension of Enlightenment principles, not relative economic size. The significance is philosophical and political, not strategic."}, {"text": "Haitian rebels took Enlightenment rhetoric about universal rights literally and applied it to enslaved people — the group the American and French revolutions had explicitly or implicitly excluded", "isCorrect": true, "rationale": "The source argues that where Jefferson proclaimed equality while owning 600 enslaved people and French revolutionaries initially excluded enslaved Africans, 'the people of Saint-Domingue took Enlightenment rhetoric at its literal word' — making it the radical test of universalism's actual meaning."}, {"text": "The Haitian Revolution produced the most sophisticated constitutional framework of the Atlantic revolutionary era", "isCorrect": false, "rationale": "The source does not claim Haiti produced the most sophisticated constitution; its significance is the unconditional abolition of slavery and establishment of a free Black republic by formerly enslaved people."}, {"text": "Haiti was the only Atlantic revolution that succeeded without any European philosophical influence", "isCorrect": false, "rationale": "The Haitian rebels explicitly drew on Enlightenment language of rights — the source emphasizes this. The revolution was shaped by that philosophy, not independent of it."}]}, {"question": "Toussaint L'Ouverture's military and political significance lay primarily in his ability to", "options": [{"text": "Avoid military conflict entirely and negotiate Saint-Domingue's independence through diplomatic channels with France and Britain", "isCorrect": false, "rationale": "Toussaint was an exceptionally capable military commander who repelled a British invasion (1793–1798) and negotiated alliances when advantageous — his achievement was military and political, not purely diplomatic."}, {"text": "Negotiate shifting alliances, build a disciplined army that repelled British invasion, and unify Saint-Domingue's competing factions under his authority", "isCorrect": true, "rationale": "The source credits Toussaint with negotiating alliances with Spain and Britain when advantageous, commanding a disciplined army that repelled British invasion (1793–1798), and gradually unifying Saint-Domingue under his authority."}, {"text": "Lead a primarily defensive guerrilla campaign that gradually exhausted French forces without ever defeating them in open battle", "isCorrect": false, "rationale": "Toussaint's military success included decisive victories, not merely attrition. He repelled a full British expeditionary force and unified the colony under his command before Napoleon sent a new French force."}, {"text": "Immediately declare independence in 1791 at the start of the uprising, establishing Haiti as a republic from the revolution's first days", "isCorrect": false, "rationale": "Toussaint's 1801 constitution made him governor-for-life but did not formally declare independence — independence came in 1804, after his death, under Dessalines."}]}, {"question": "Napoleon's arrest of Toussaint L'Ouverture in 1802 had which effect on the Haitian Revolution?", "options": [{"text": "It ended the Revolution by decapitating its leadership, allowing France to reimpose colonial rule", "isCorrect": false, "rationale": "The source states that Toussaint's arrest 'radicalized the Haitian forces' — rather than ending the Revolution, it transformed it into a fight for total independence and permanent abolition, led by Dessalines and Christophe."}, {"text": "It radicalized the Haitian forces, transforming their goal from autonomy within the French empire to total independence and permanent abolition of slavery", "isCorrect": true, "rationale": "The source explicitly states that Toussaint's arrest radicalized Haitian forces: 'the revolution's final phase was fought not for autonomy within a French empire but for total independence and the permanent abolition of slavery.'"}, {"text": "It caused Britain and Spain to intervene militarily on Haiti's behalf to prevent French domination of the Caribbean", "isCorrect": false, "rationale": "Britain and Spain had already ended their military interventions in Saint-Domingue before Toussaint's arrest. No foreign power intervened on Haiti's behalf after 1802."}, {"text": "It convinced Haitian leaders to compromise with Napoleon and accept limited autonomy rather than risk total defeat", "isCorrect": false, "rationale": "The opposite occurred: Toussaint's treacherous arrest under a flag of truce eliminated any possibility of negotiated compromise, pushing the Haitian leadership toward total independence."}]}, {"question": "Consider the scenario: A slave owner in Virginia learns about the Haitian Revolution's success in 1804. Based on the source, which reaction would BEST reflect the typical response of slave-owning societies?", "options": [{"text": "Admiration for the Haitian rebels' commitment to Enlightenment principles of liberty and equality", "isCorrect": false, "rationale": "The source states that the Haitian Revolution 'terrified slave-owning societies across the Atlantic world — including the United States.' Admiration would not be the typical response from slaveholders."}, {"text": "Fear and hostility, because the Revolution proved that enslaved people could organize sustained revolutionary action and successfully overthrow slavery", "isCorrect": true, "rationale": "The source explains that the Revolution 'terrified' slave-owning societies 'precisely because it succeeded, producing the first free Black republic in history and proving that slavery could be overthrown by the enslaved themselves' — something slaveholders desperately needed to deny."}, {"text": "Indifference, because Haiti was geographically distant and its revolution had no implications for slavery in North America", "isCorrect": false, "rationale": "The source explicitly notes that the 1811 German Coast Uprising in Louisiana and multiple Caribbean conspiracies cited Haiti — demonstrating immediate, geographically proximate impact, not indifference."}, {"text": "Calls for diplomatic recognition of Haiti as a fellow republic committed to natural rights and the social contract", "isCorrect": false, "rationale": "The United States did not recognize Haiti diplomatically until 1862 — explicitly because the existence of a free Black republic was threatening to American slaveholder interests, not because of ideological solidarity."}]}, {"question": "The Haitian Revolution's success had which indirect effect on the territorial history of the United States?", "options": [{"text": "It prompted Britain to sell Canada to the United States to prevent future French Caribbean expansion", "isCorrect": false, "rationale": "Canada was never sold to the United States. The source's connection is between the Haitian Revolution and the Louisiana Purchase — not Canada."}, {"text": "Napoleon, recognizing he could not maintain a Caribbean empire without Saint-Domingue, sold the Louisiana Territory to the United States in 1803", "isCorrect": true, "rationale": "The source states explicitly: 'Napoleon, recognizing that Saint-Domingue was lost and that maintaining a Caribbean empire without slave labor was impossible, sold the Louisiana Territory to the United States in 1803 — doubling American territory.'"}, {"text": "The United States immediately recognized Haiti and established a military alliance to prevent future European intervention in the Caribbean", "isCorrect": false, "rationale": "The United States did not recognize Haiti for decades (until 1862) and established no military alliance with it. American slaveholder interests made recognition politically impossible."}, {"text": "Spain ceded Florida to the United States to avoid a similar revolution spreading from Haiti to Spanish Caribbean colonies", "isCorrect": false, "rationale": "Florida's transfer to the United States (1819, Adams-Onís Treaty) was not connected to fear of Haitian revolutionary spread — it was a diplomatic negotiation over territorial boundaries."}]}, {"question": "Which comparison MOST accurately captures why the Haitian Revolution was more radical than both the American and French revolutions?", "options": [{"text": "The Haitian Revolution was more violent, with higher casualties relative to population, making it more transformative through sheer force", "isCorrect": false, "rationale": "The radicalism identified in the source is about the extension of rights and the transformation of the social order — unconditional abolition of slavery and establishment of a free Black republic — not relative casualty rates."}, {"text": "The Haitian Revolution abolished slavery unconditionally and established a republic governed by people who had themselves been enslaved — going furthest in applying Enlightenment universalism", "isCorrect": true, "rationale": "The source argues the Haitian Revolution 'went furthest in extending the Enlightenment's proclaimed universal principles': the American protected slavery; the French wavered; the Haitian abolished it unconditionally and established governance by formerly enslaved people."}, {"text": "Haiti's revolution was more radical because it produced a stronger constitution and more stable democratic government than France or the United States", "isCorrect": false, "rationale": "Haiti faced severe international isolation and economic penalties after independence, making stable democracy difficult. The radicalism is about the social transformation — abolition — not constitutional stability."}, {"text": "The Haitian Revolution was more radical because it rejected Enlightenment philosophy entirely in favor of African traditions of governance", "isCorrect": false, "rationale": "The source emphasizes that Haitian rebels 'took Enlightenment rhetoric at its literal word' — they drew on Enlightenment universalism, applying it more consistently than its European authors had."}]}, {"question": "The Bois Caïman ceremony (August 14, 1791) is significant in the history of the Haitian Revolution because it", "options": [{"text": "Was the moment when Toussaint L'Ouverture formally declared independence from France and established the Haitian Republic", "isCorrect": false, "rationale": "The Bois Caïman ceremony preceded the 1791 uprising, not independence in 1804. Toussaint was not yet leading the revolution at this point; Dessalines declared independence."}, {"text": "Marked the founding moment of the revolution, when enslaved leaders gathered in a Vodou ceremony days before the massive August uprising erupted", "isCorrect": true, "rationale": "The source identifies the Bois Caïman ceremony on August 14, 1791 as 'the founding moment of the revolution' — days before the northern province erupted in the massive uprising on August 22–23."}, {"text": "Was Vincent Ogé's uprising of free people of color demanding political rights from the National Assembly", "isCorrect": false, "rationale": "Ogé's uprising occurred in 1790, before the Bois Caïman ceremony. Ogé led free people of color, not the enslaved population whose uprising began with the Bois Caïman gathering."}, {"text": "Established the first free Black republic and gave it the name 'Haiti' from the indigenous Taino word for the island", "isCorrect": false, "rationale": "Haiti was named and independence declared on January 1, 1804, by Dessalines — more than 12 years after Bois Caïman. The ceremony was the revolution's beginning, not its conclusion."}]}, {"question": "Jean-Jacques Dessalines' decision to massacre most of the remaining white population after independence in 1804 reflected his reasoning that", "options": [{"text": "The Enlightenment's universalist principles required eliminating the group most resistant to their application", "isCorrect": false, "rationale": "The source attributes Dessalines' reasoning to strategic security, not Enlightenment principle. He argued that a free Black republic could not be secure as long as it contained a potential rallying point for future French reconquest."}, {"text": "A free Black republic could not be secure as long as it contained a potential rallying point for French reconquest", "isCorrect": true, "rationale": "The source states Dessalines 'ordered the massacre of most of the remaining white population, reasoning that a free Black republic could not be secure as long as it contained a potential rallying point for future French reconquest.'"}, {"text": "The Code Napoléon's provisions for legal equality required removing those who had enforced racial inequality under colonialism", "isCorrect": false, "rationale": "Dessalines was fighting against Napoleon's France, not applying the Code Napoléon. His reasoning was strategic security, not legal principle."}, {"text": "Haitian Vodou religious tradition required ritual cleansing of the land from European spiritual contamination", "isCorrect": false, "rationale": "The source attributes Dessalines' reasoning to political and military security calculation, not religious tradition. Introducing this rationale misrepresents the source."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
