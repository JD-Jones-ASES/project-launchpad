        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">

        <a href="../../courses/AP_World.html">&larr; Back to AP World History: Modern</a>

    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP World History: Modern &mdash; The Indian Ocean Basin</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A historian argues that the Indian Ocean trade network between 1200 and 1450 was 'an Afro-Asian creation, operating independently of and prior to any European involvement.' Which of the following BEST supports this claim?", "options": [{"text": "Vasco da Gama's 1497 voyage established the first trade links between Europe, Africa, and Asia.", "isCorrect": false, "rationale": "Da Gama's voyage disrupted but did not create the Indian Ocean system; this option implies European origination, which the claim explicitly denies."}, {"text": "Arab, Indian, Malay, East African, and Chinese sailors had exploited the monsoon system to build an extensive maritime network more than a millennium before European entry.", "isCorrect": true, "rationale": "The text states that by 1200 the Indian Ocean had been 'an Afro-Asian commercial lake for more than a millennium,' with diverse non-European peoples building and maintaining its infrastructure."}, {"text": "European merchants were welcomed into the network because they supplied silver that lubricated trade in the Indian Ocean.", "isCorrect": false, "rationale": "The text does not describe European merchants as participants before 1497; their silver role in Indian Ocean trade is a post-da Gama development outside this section's scope."}, {"text": "The monsoon winds made navigation impossible without the compass technology that Europeans introduced.", "isCorrect": false, "rationale": "The text explicitly notes that the monsoon system made reliable long-distance maritime trade feasible centuries before European oceanic exploration—no compass was needed to exploit predictable seasonal winds."}]}, {"question": "The southwest monsoon blows from approximately April to September. What is the most important consequence of this seasonal pattern for Indian Ocean commerce?", "options": [{"text": "It prevented year-round trade by making voyages possible only during a narrow window of two to three weeks.", "isCorrect": false, "rationale": "The monsoon enabled reliable multi-month trade seasons, not a narrow window. A ship leaving Arabia in May could reach India within weeks and return by December on the northeast monsoon."}, {"text": "It created a predictable annual cycle of departures and returns, making long-distance maritime trade reliably feasible without advanced navigational technology.", "isCorrect": true, "rationale": "The text describes the monsoon as creating 'the world's first reliable long-distance maritime highway' because its seasonal reversal allowed merchants to plan voyages and returns around predictable wind patterns."}, {"text": "It gave East African merchants an advantage over Arab merchants because African ports lay in the direct path of the prevailing wind.", "isCorrect": false, "rationale": "The monsoon benefited all merchants equally by providing predictable winds in both directions; the text does not claim a structural geographic advantage for Africans over Arabs in wind-driven sailing."}, {"text": "It forced merchants to store their goods for six months at a time, creating large warehouse cities in Arabia and India.", "isCorrect": false, "rationale": "While port cities did accumulate goods, the text frames the monsoon as enabling trade rather than creating storage bottlenecks. The cycle was a commercial opportunity, not primarily a storage constraint."}]}, {"question": "Read the following: Ibn Battuta, visiting Kilwa around 1331, called it 'one of the most beautiful and well-constructed towns in the world,' noting its multi-story stone buildings and bustling gold market. What does this account suggest about Kilwa's place in the Indian Ocean system?", "options": [{"text": "Kilwa was a peripheral outpost whose wealth depended entirely on receiving goods from the Arab world.", "isCorrect": false, "rationale": "The text specifically argues against the 'backwater' framing, describing Kilwa as 'sophisticated urban polities with stone architecture and active literary traditions'—a wealthy exporter, not merely a passive receiver."}, {"text": "Kilwa was a sophisticated, wealthy port city that exported gold from the Zimbabwe plateau and was integrated into Indian Ocean commerce as an active participant.", "isCorrect": true, "rationale": "Ibn Battuta's account corroborates the text's description of Kilwa as the wealthiest Swahili coast city, controlling gold trade from the Zimbabwe plateau—evidence of active economic participation, not peripheral dependency."}, {"text": "Kilwa's wealth came primarily from its role as a transit point for Chinese porcelain destined for North Africa.", "isCorrect": false, "rationale": "Chinese porcelain moved into Kilwa from the ocean, not through it toward North Africa; Kilwa's primary export was gold, not porcelain, which it imported."}, {"text": "The account demonstrates that Islamic religious observance was the primary organizing principle of Indian Ocean trade cities.", "isCorrect": false, "rationale": "While Islam was important in Kilwa, the text emphasizes commerce and Swahili cultural synthesis as the city's organizing features; Ibn Battuta noted the sultan's generosity and the market—not exclusively religious organization."}]}, {"question": "The dhow was the dominant vessel of Indian Ocean trade. Which of its design features made it especially suited to the routes it traveled?", "options": [{"text": "Its iron-reinforced hull allowed it to survive collisions with rocks along the shallow coastlines of the Arabian Sea.", "isCorrect": false, "rationale": "The dhow was specifically built WITHOUT iron nails—planks were sewn together with coconut-fiber cord—making it flexible and easily repaired in ports lacking metalworking, the opposite of the iron-reinforced description."}, {"text": "Its triangular lateen sail allowed it to sail closer to the wind than square-rigged ships, aiding coastal navigation and monsoon-transition sailing.", "isCorrect": true, "rationale": "The text specifically identifies the lateen sail's ability to sail closer to the wind as critical for coastal navigation and for making headway against contrary breezes at the monsoon transitions."}, {"text": "Its large, flat bottom allowed it to carry several times more cargo than any other premodern vessel.", "isCorrect": false, "rationale": "The text describes dhows as able to carry 200–400 tons, significant but not described as uniquely superior to all other vessels; the lateen sail and plank construction, not hull flatness, are emphasized as defining features."}, {"text": "Its oar-powered design made it independent of wind direction, allowing year-round travel regardless of monsoon season.", "isCorrect": false, "rationale": "Dhows were sail-powered (lateen rigged), not oar-powered for long voyages. Their operation was synchronized with, not independent of, the monsoon system."}]}, {"question": "The text describes Swahili Coast cities as having 'a culture that blended Bantu African foundations with Arab and Persian commercial and religious influences.' This cultural synthesis is best explained by which historical process?", "options": [{"text": "Arab military conquest of the East African coast and forced conversion of the Bantu population.", "isCorrect": false, "rationale": "The text describes voluntary cultural and commercial exchange, not conquest. Islam spread through merchant contact and trade relationships, not military subjugation of Bantu populations."}, {"text": "Long-term commercial interaction between Bantu African peoples and Arab/Persian merchant communities who settled in East African ports.", "isCorrect": true, "rationale": "The text explains that Swahili culture blended Bantu foundations with Arab and Persian influences 'brought by the monsoon trade'—a result of centuries of commercial contact, intermarriage, and voluntary cultural exchange."}, {"text": "The deliberate cultural policy of East African rulers who sent envoys to Arabia to adopt Arab customs as markers of prestige.", "isCorrect": false, "rationale": "The text does not describe a top-down state policy of cultural adoption but rather an organic synthesis arising from centuries of commercial interaction and diaspora settlement."}, {"text": "Chinese porcelain imports that created demand for Chinese aesthetic values in East African architecture.", "isCorrect": false, "rationale": "Chinese porcelain is documented in East Africa as a trade good, but the cultural synthesis described—Bantu + Arab/Persian—does not involve Chinese cultural influence as a primary component."}]}, {"question": "Islam spread through maritime Southeast Asia primarily through which mechanism, according to the source?", "options": [{"text": "Military conquest by Muslim Arab and Persian armies who imposed conversion on conquered populations.", "isCorrect": false, "rationale": "The text explicitly states that Islam's spread through maritime Southeast Asia was 'largely voluntary rather than coerced'—the opposite of military imposition."}, {"text": "The social capital and economic prestige of Muslim merchant communities, which incentivized rulers and traders to convert voluntarily.", "isCorrect": true, "rationale": "The text explains that rulers adopted Islam for access to the prestige and economic networks of the Muslim world, and merchants converted because it signaled trustworthiness to trading partners—commerce driving conversion."}, {"text": "Chinese Buddhist missions that established monasteries in Southeast Asian ports, later converted to Islam.", "isCorrect": false, "rationale": "Buddhism in Southeast Asia predates this period, but its presence is not the mechanism described for Islam's spread. The text focuses on Muslim merchant communities, not Buddhist-to-Muslim conversion pathways."}, {"text": "Sufi missionaries who traveled independently of trade routes to convert rural populations across the archipelago.", "isCorrect": false, "rationale": "While Sufi missionaries played a role historically, the text's explanation centers on merchant communities and rulers, not independent Sufi missionary activity in rural areas."}]}, {"question": "Which of the following best characterizes the role of diasporic merchant communities in sustaining Indian Ocean trade?", "options": [{"text": "They lobbied imperial governments to subsidize trade routes and enforce commercial law across political borders.", "isCorrect": false, "rationale": "The text notes that the Indian Ocean system was held together 'not by states but by communities of merchants'—emphasizing private commercial networks, not state lobbying."}, {"text": "They established permanent communities in foreign ports, creating nodes of credit, language, and legal knowledge that reduced transaction costs across political and religious boundaries.", "isCorrect": true, "rationale": "The text describes Arab merchants in Indian cities, Indian traders in Southeast Asian entrepots, and Chinese merchants in Java—diaspora nodes that 'lubricated commerce across linguistic, religious, and political boundaries.'"}, {"text": "They monopolized trade by blocking access to key ports for merchants from other cultural backgrounds.", "isCorrect": false, "rationale": "The Indian Ocean system was notable for its inclusive, multi-ethnic structure. The text describes Arab, Indian, Malay, and Chinese merchants operating in overlapping networks, not monopolistic exclusion."}, {"text": "They relied primarily on state diplomatic channels to negotiate trade agreements with foreign rulers.", "isCorrect": false, "rationale": "The text emphasizes private commercial networks—credit, correspondence, intermarriage, religious community—as the mechanisms sustaining diaspora trade, not state diplomatic channels."}]}, {"question": "Consider this comparison: The Swahili Coast cities exported gold and ivory northward, while importing cotton textiles and porcelain from the north. What does this pattern reveal about the Swahili Coast's role in the Indian Ocean system?", "options": [{"text": "The Swahili Coast was an economically dependent periphery that provided raw materials in exchange for finished manufactured goods.", "isCorrect": false, "rationale": "While the trade pattern has a resource-for-manufacture character, the text explicitly argues against the 'backwater' interpretation: Swahili cities were 'sophisticated urban polities' with their own literary traditions and architectural achievements."}, {"text": "The Swahili Coast functioned as an active node in a complementary exchange system, leveraging African interior resources to participate in Indian Ocean commerce.", "isCorrect": true, "rationale": "The text describes Swahili cities as 'sophisticated urban polities' that were 'export platforms'—not passive recipients—using access to African gold and ivory to acquire Indian Ocean goods and build wealthy urban centers."}, {"text": "The Swahili Coast's trade was entirely controlled by Arab merchants who prevented Africans from profiting from their own resources.", "isCorrect": false, "rationale": "The text describes Swahili culture as a Bantu-Arab-Persian synthesis, with African rulers actively governing wealthy cities—not a picture of colonial extraction by foreign merchants."}, {"text": "The Swahili Coast specialized in porcelain manufacturing, which it re-exported to inland African markets.", "isCorrect": false, "rationale": "Porcelain was an import in the Swahili Coast, not a local manufacture. The region's own exports were gold, ivory, and enslaved people—not manufactured goods."}]}, {"question": "Islam's shared legal framework (sharia rules governing contracts, debt, and partnership) contributed to Indian Ocean trade by doing which of the following?", "options": [{"text": "Replacing all local commercial laws with a unified Islamic code enforced by Mongol imperial courts.", "isCorrect": false, "rationale": "Mongol courts are not mentioned in the Indian Ocean context; sharia functioned as a shared commercial language among Muslim merchants across political jurisdictions, not as a state-imposed replacement for local law."}, {"text": "Providing a common commercial legal framework that reduced transaction costs across political borders among Muslim merchants.", "isCorrect": true, "rationale": "The text states that Islam's shared legal framework 'provided a common commercial language that reduced transaction costs across political borders'—a classic network-effect advantage for Muslim merchants."}, {"text": "Excluding non-Muslim merchants from Indian Ocean trade, creating a Muslim commercial monopoly by 1300.", "isCorrect": false, "rationale": "The text describes a multi-faith trading system with Chinese Buddhist and Hindu Indian merchants active alongside Muslims; sharia lowered costs for Muslim traders without creating a religious monopoly over the network."}, {"text": "Requiring all merchants to convert to Islam before they could use Indian Ocean port facilities.", "isCorrect": false, "rationale": "The text describes voluntary conversion driven by economic incentives, not compulsory conversion as a condition of port access. Non-Muslim merchants remained active in the network."}]}, {"question": "A student claims that the Indian Ocean trading network was essentially the same as the Silk Road system, just carried by ships instead of camels. Which argument would most effectively challenge this claim?", "options": [{"text": "The Indian Ocean system operated only in Asia, while the Silk Roads connected Asia to Europe.", "isCorrect": false, "rationale": "The Indian Ocean system connected East Africa, Arabia, South Asia, and Southeast Asia—spanning multiple continents. And the Silk Roads also connected to Indian Ocean ports via a southern branch, so this distinction is imprecise."}, {"text": "The Indian Ocean system was driven by a natural meteorological engine (the monsoon) and integrated East Africa, Arabia, and Asia into a coherent, self-sustaining Afro-Asian commercial world distinct from overland Central Asian trade.", "isCorrect": true, "rationale": "The Indian Ocean network had a distinct environmental foundation (the monsoon), different ship technology (dhow), different commodity profile (spices, textiles, porcelain, gold, ivory), and integrated East Africa as a core node—features absent from the overland Silk Road system."}, {"text": "The Indian Ocean system was controlled by European merchants who prevented Asian merchants from participating fully.", "isCorrect": false, "rationale": "This inverts the historical reality. Europeans entered the Indian Ocean only after 1497; the entire pre-1497 system was built and controlled by non-European peoples."}, {"text": "The Silk Roads only transmitted luxury goods, while the Indian Ocean carried only staple commodities.", "isCorrect": false, "rationale": "Both systems carried luxury goods and staples. This oversimplified distinction does not capture the fundamental differences in environmental infrastructure, ship technology, and geographic scope."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
