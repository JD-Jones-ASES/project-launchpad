    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_World.html">&larr; Back to AP World History: Modern</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP World History: Modern &mdash; Mesoamerican and Andean Empires</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The source argues that describing the Aztec and Inca empires by 'what they lacked — iron metallurgy, the wheel, writing in the alphabetic sense' inverts the historical lesson. What does the source claim this framing misses?", "options": [{"text": "The Aztec and Inca empires did in fact possess iron metallurgy and writing, so the comparison is factually wrong.", "isCorrect": false, "rationale": "The source does not claim the Aztec or Inca had iron or alphabetic writing; it argues that their absence does not diminish the empires' achievements, not that the factual claim is wrong."}, {"text": "Both empires built sophisticated administrative, military, and economic systems using available resources, demonstrating that complex state-building is a human universal rather than a cultural export from any single civilization.", "isCorrect": true, "rationale": "The source explicitly argues the lesson is that 'state-building is a human capacity, not a cultural inheritance' — the empires' achievements with available technology demonstrate universal human capacity for complexity, not the superiority of any particular toolkit."}, {"text": "The absence of iron and wheels made Aztec and Inca achievements inherently limited compared to Eurasian empires.", "isCorrect": false, "rationale": "This restates the condescending framing the source is explicitly rejecting; the source's argument is that the framing 'inverts the historical lesson.'"}, {"text": "European historians fabricated the claim that the Aztec and Inca lacked iron technology, based on colonial-era prejudice.", "isCorrect": false, "rationale": "The source acknowledges the factual absence of iron metallurgy and wheeled transport; its point is about how to interpret that absence, not to deny it."}]}, {"question": "A page from the Codex Mendoza records Aztec tribute obligations showing symbols for cotton mantles, warrior costumes, and cacao required from conquered peoples. Using this type of document, a historian would most directly be investigating which aspect of the Aztec empire?", "options": [{"text": "The Aztec cosmological belief system and the role of sacrifice in sustaining the sun's movement.", "isCorrect": false, "rationale": "The Codex Mendoza records material tribute obligations — goods extracted from conquered peoples — not cosmological or religious beliefs; different sources would be more appropriate for religious analysis."}, {"text": "The economic and administrative mechanisms by which the Triple Alliance extracted resources from a subject population of five to six million people.", "isCorrect": true, "rationale": "Tribute lists document material accumulation — specific goods required from conquered peoples — making them primary sources for analyzing the economic and administrative operations of the tribute system across a vast territory."}, {"text": "Aztec military technology and the specific weapons used in the Flower Wars.", "isCorrect": false, "rationale": "The Codex Mendoza records tribute obligations (goods), not military equipment or battlefield tactics; weapons documentation would require different source types."}, {"text": "The architectural engineering techniques used to construct Tenochtitlán's causeways and aqueducts.", "isCorrect": false, "rationale": "Tribute lists record goods flowing to the capital, not the engineering methods used to build urban infrastructure; architectural sources would be needed for the latter."}]}, {"question": "The chinampas of the Valley of Mexico and the mit'a-built terrace agriculture of the Inca Empire both represent:", "options": [{"text": "Evidence that the Aztec and Inca were influenced by Chinese agricultural techniques transmitted via the Pacific.", "isCorrect": false, "rationale": "Neither the Americas nor Afro-Eurasia had contact before the fifteenth century; the source explicitly states the Americas' achievements were 'an independent demonstration' of human state-building capacity."}, {"text": "Intensive agricultural adaptation to challenging environments that generated food surpluses supporting large non-agricultural urban and administrative populations.", "isCorrect": true, "rationale": "Chinampas produced 'multiple harvests per year, yielding a food surplus that supported artisans, warriors, priests, and administrators'; Inca terrace agriculture (built through mit'a labor) similarly supported the empire's non-agricultural population — both represent intensive environmental adaptation for surplus production."}, {"text": "Agricultural techniques that were insufficient to support urban populations, explaining both empires' reliance on long-distance trade.", "isCorrect": false, "rationale": "The source presents both agricultural systems as highly productive — chinampas yielded multiple harvests, and Inca terrace agriculture sustained an empire across 4,000 km; neither is described as insufficient."}, {"text": "Practices that required iron tools, explaining why both empires eventually traded with Afro-Eurasia for iron technology.", "isCorrect": false, "rationale": "The source notes neither empire had iron tools; both accomplished these agricultural feats without iron — this is part of the source's broader argument about achievement with available resources."}]}, {"question": "The Aztec Flower Wars (guerras floridas) served two simultaneous purposes. Which of the following correctly identifies BOTH?", "options": [{"text": "They generated trade revenue from conquered peoples AND provided a diplomatic framework for peaceful relations with neighboring polities.", "isCorrect": false, "rationale": "Flower Wars were fought specifically to obtain sacrificial captives, not for trade revenue, and they were competitive, ritualized conflicts — not diplomatic peace-making."}, {"text": "They provided captives for human sacrifice to sustain the cosmological order AND maintained military readiness and reinforced the theological framework of the state.", "isCorrect": true, "rationale": "The source explicitly states Flower Wars 'simultaneously maintained military readiness and reinforced the theological framework of the state' while providing captives for sacrifice — both functions operated through the same ritual warfare."}, {"text": "They expanded Aztec territorial control AND trained new administrators for the tribute collection system.", "isCorrect": false, "rationale": "Flower Wars were ritualized conflicts specifically for capturing sacrificial victims, not for territorial expansion (which the Triple Alliance's military campaigns served) or administrative training."}, {"text": "They demonstrated Aztec military dominance AND created diplomatic alliances with the Triple Alliance's member states.", "isCorrect": false, "rationale": "Flower Wars were fought with neighboring polities outside the Triple Alliance, not between its members; their purpose was sacrificial captives, not alliance-building."}]}, {"question": "The Inca mit'a system required subject communities to provide periodic labor service to the state. The source distinguishes this from the Aztec tribute system primarily on the basis that:", "options": [{"text": "The mit'a was voluntary while Aztec tribute was imposed through military force.", "isCorrect": false, "rationale": "Both systems were imposed by imperial power; the source does not describe the mit'a as voluntary — subject communities 'owed' the state labor service. The distinction is about what was extracted (labor vs. goods), not its voluntary vs. coerced nature."}, {"text": "The mit'a extracted labor rather than goods, and included a reciprocal obligation for the state to provide food, clothing, and tools during service — giving it a degree of popular legitimacy beyond simple extraction.", "isCorrect": true, "rationale": "The source explicitly states 'unlike the Aztec tribute system, which extracted goods, the Inca extracted labor' and notes the state's reciprocal obligations (food, tools, famine redistribution) gave the mit'a 'a degree of popular legitimacy' that distinguished it from simple extraction."}, {"text": "The mit'a applied only to conquered peoples, while all Inca subjects regardless of status paid tribute in goods.", "isCorrect": false, "rationale": "The source describes the mit'a as applying to 'subject communities across the empire' broadly, not only conquered peoples; the tribute (goods) vs. labor distinction is the key difference, not the population covered."}, {"text": "The mit'a was administered by quipucamayoc specialists, while Aztec tribute was managed by the Triple Alliance's central administration.", "isCorrect": false, "rationale": "Quipucamayoc specialists managed quipu records of administrative data including tribute/census figures; they are not described as the specific administrators of mit'a labor service, and the distinction is not about administrative personnel."}]}, {"question": "Quipu — knotted strings of different colors, sizes, and arrangements — served as the Inca Empire's primary administrative information technology. The source's treatment of quipu is most significant for which AP World History theme?", "options": [{"text": "Technology (SPICE-T): quipu demonstrate that complex data storage and administrative record-keeping do not require alphabetic writing, challenging assumptions that literacy is a prerequisite for sophisticated governance.", "isCorrect": true, "rationale": "The source presents quipu as functionally comparable to written records — encoding numerical data, tribute records, census figures, and 'possibly narrative information' — with specialists (quipucamayoc) comparable to trained scribes. This challenges Eurocentric assumptions about the prerequisites for administrative complexity."}, {"text": "Economic (SPICE-T): quipu were primarily used for commercial accounting in Inca markets, enabling long-distance trade.", "isCorrect": false, "rationale": "While quipu recorded tribute and census figures (economic data), the source presents them as administrative technology broadly, not specifically as commercial market tools; the Inca road network is more directly linked to logistical commercial movement."}, {"text": "Social (SPICE-T): quipu encoded the genealogical records of the Inca royal family, maintaining elite social hierarchy.", "isCorrect": false, "rationale": "The source describes quipu encoding administrative data (tribute records, census figures) broadly; while genealogical records may have been included, the significance is administrative, not primarily about royal genealogy as a social hierarchy tool."}, {"text": "Interaction (SPICE-T): quipu technology was transmitted from the Inca to the Spanish colonial administration, creating a hybrid record-keeping system.", "isCorrect": false, "rationale": "The source states the opposite: 'The destruction of quipu knowledge represents one of history's less visible but most consequential cultural losses' — the Spanish colonial government 'eventually suppressed' quipucamayoc knowledge as subversive."}]}, {"question": "The Inca road network covered over 40,000 kilometers and included suspension bridges of twisted fiber spanning Andean gorges. The source identifies this infrastructure as serving multiple functions simultaneously. Which set best captures those functions?", "options": [{"text": "Agricultural drainage, religious pilgrimage, and commercial taxation.", "isCorrect": false, "rationale": "The source does not describe the road network as primarily serving drainage or religious pilgrimage; it identifies logistical, military, and symbolic functions."}, {"text": "Logistical movement of armies and goods, imperial communication via relay runners (chasquis), and symbolic assertion of imperial power.", "isCorrect": true, "rationale": "The source explicitly states roads 'moved armies, stored goods, and imperial officials' while chasquis relayed messages, and characterizes the system as 'both a logistical and a symbolic assertion of imperial power.'"}, {"text": "Agricultural irrigation, palace construction, and religious ceremony at Machu Picchu.", "isCorrect": false, "rationale": "The road network moved people and goods; irrigation and construction are separate mit'a labor functions, and Machu Picchu is identified as a royal estate and ritual center, not a road hub."}, {"text": "Tribute collection from the coast, military communication between highland fortresses, and relay of fresh fish.", "isCorrect": false, "rationale": "While fresh fish delivery via chasquis is mentioned as an illustration of speed, it is an example, not a primary function. 'Tribute collection' framing conflates Inca (labor-based) and Aztec (goods-based) systems and 'highland fortresses' is not the source's terminology."}]}, {"question": "Tenochtitlán was built on an island in Lake Texcoco and grew to a population of 200,000–300,000 by the fifteenth century. Which feature of Tenochtitlán's infrastructure BEST demonstrates the Mexica capacity for large-scale environmental engineering?", "options": [{"text": "The use of human sacrifice at the Great Temple to sustain the sun's movement.", "isCorrect": false, "rationale": "Human sacrifice reflects the Aztec cosmological-religious system, not environmental engineering; the question asks specifically about physical infrastructure adapted to the island environment."}, {"text": "The construction of chinampas (raised agricultural plots in the lake), causeway connections to the mainland, and a double aqueduct supplying freshwater.", "isCorrect": true, "rationale": "The source explicitly presents all three as 'extraordinary' engineering: chinampas created agricultural land from lake bottom, causeways connected the island city to the mainland, and the aqueduct solved the freshwater problem for a city built on a saline lake."}, {"text": "The Codex Mendoza's detailed accounting of tribute flows from 200,000 square kilometers of subject territory.", "isCorrect": false, "rationale": "The Codex Mendoza is a document recording tribute obligations — it is administrative/informational, not a physical engineering achievement of the city's built environment."}, {"text": "The Triple Alliance's military campaigns that extended Aztec control across a territory of approximately 200,000 square kilometers.", "isCorrect": false, "rationale": "Military campaigns extended territorial control; they are political-military achievements, not examples of the environmental engineering that made Tenochtitlán viable as a city built in a lake."}]}, {"question": "The Spanish later adapted the Inca mit'a to compel indigenous labor in silver mines, 'drastically changing its character from a reciprocal obligation to brutal exploitation.' This change best illustrates which historical analytical concept?", "options": [{"text": "Continuity: the Spanish colonial system preserved the mit'a unchanged, demonstrating the resilience of Inca institutions under colonialism.", "isCorrect": false, "rationale": "The source describes the change as 'drastic' — removing the reciprocal obligations that gave the original mit'a legitimacy and converting it into exploitative forced labor — making this an example of significant change, not continuity."}, {"text": "Appropriation and transformation: colonial powers adopted existing institutional structures while fundamentally altering their social meaning and human consequences.", "isCorrect": true, "rationale": "The Spanish retained the mit'a's organizational form (labor obligation) while stripping away its reciprocal character, transforming a system with 'a degree of popular legitimacy' into brutal extraction — a classic case of colonial appropriation that changes the substance while preserving the shell of indigenous institutions."}, {"text": "Causation: the brutality of colonial silver mining directly caused the Inca Empire's collapse before European contact.", "isCorrect": false, "rationale": "Colonial silver mining was a post-contact development; it did not cause the Inca collapse — rather, the Inca Empire was conquered by Spanish forces in 1532, and the silver mines were a subsequent colonial imposition."}, {"text": "Contextualization: the mit'a's transformation shows that Andean labor systems were always extractive and exploitative, even before colonialism.", "isCorrect": false, "rationale": "The source explicitly distinguishes the pre-colonial mit'a's 'reciprocal logic' from colonial exploitation, arguing they were different in character; collapsing that distinction misrepresents both the source and historical analysis."}]}, {"question": "The source describes the Americas of 1200–1450 as 'not a wilderness waiting to be discovered' but home to millions of people organized into complex states. This framing is MOST directly a response to which historiographical problem?", "options": [{"text": "The misconception that pre-contact Americas lacked any form of trade networks.", "isCorrect": false, "rationale": "While trade network misconceptions exist, the source's specific framing counters the broader 'wilderness' / uncivilized trope — the claim that complex governance, architecture, and administration did not exist in the Americas before European contact."}, {"text": "Eurocentric narratives that measured non-European societies primarily by what they lacked compared to European technology, rather than by the achievements they accomplished with available resources.", "isCorrect": true, "rationale": "The source directly addresses this: it opens by rejecting 'a wilderness waiting to be discovered,' notes the condescension of describing empires by 'what they lacked,' and closes with the argument that 'state-building is a human capacity, not a cultural inheritance.'"}, {"text": "The historical debate over whether the Aztec or Inca empire was more sophisticated.", "isCorrect": false, "rationale": "The source presents both empires comparatively to illustrate a broader argument about independent state-building capacity, not to rank their relative sophistication against each other."}, {"text": "The claim that the Mongols, not Europeans, were responsible for the collapse of Mesoamerican civilizations.", "isCorrect": false, "rationale": "There is no historical connection between the Mongols and Mesoamerican collapse; this is not a recognized historiographical debate that this section addresses."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
