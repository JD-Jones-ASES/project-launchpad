<script>
var QUESTIONS = [{"question": "A historian argues: 'The Cold War was fundamentally shaped not by military deployments alone, but by the universalist character of both superpowers' ideologies — each believed history was on its side.' Which pair of ideological systems does this argument most directly describe?", "options": [{"text": "Fascism and liberal nationalism", "isCorrect": false, "rationale": "Fascism was the ideology of the Axis powers, defeated in 1945 — it was not a Cold War superpower ideology. Liberal nationalism describes nineteenth-century movements, not Cold War blocs."}, {"text": "Marxism-Leninism and liberal capitalism", "isCorrect": true, "rationale": "The source explicitly states the Soviet Union presented itself as the vanguard of Marxism-Leninism while the United States championed liberal capitalism, and that 'both systems were universal in their self-understanding — each believed history was on its side,' making compromise 'genuinely difficult.'"}, {"text": "Social democracy and mercantilism", "isCorrect": false, "rationale": "Social democracy (mixed-economy democracy) and mercantilism (state-directed trade) describe neither Soviet Marxism-Leninism nor American free-market ideology as the source defines them."}, {"text": "Pan-Slavism and Wilsonian self-determination", "isCorrect": false, "rationale": "These are ideologies associated with the early twentieth century and World War I diplomacy, not the superpower competition the source describes."}]}, {"question": "George Kennan's 'X Article' (1947) argued that 'the United States did not need to roll back Soviet power — only to prevent its further spread. If the Soviet system were contained long enough, its internal contradictions would eventually produce its own transformation or collapse.' A critic of this strategy might respond that containment:", "options": [{"text": "Was too aggressive because it threatened the Soviet Union's legitimate security interests in Eastern Europe", "isCorrect": false, "rationale": "Kennan's containment was explicitly non-aggressive — it called for patient resistance, not rollback. Critics more typically argued it was not aggressive enough, or that it was too broadly applied."}, {"text": "Was applied so broadly that it transformed every regional conflict into a global ideological contest, overriding the agency of local peoples", "isCorrect": true, "rationale": "The source explicitly states this: 'Containment transformed regional conflicts into episodes in a global ideological contest, and in doing so frequently overrode the agency and interests of the peoples in whose countries the contest was staged,' citing Korea, Vietnam, Guatemala, and the Congo."}, {"text": "Failed because it relied on nuclear weapons rather than conventional military forces", "isCorrect": false, "rationale": "Containment was explicitly a non-nuclear strategy of patient resistance; its relationship to nuclear weapons is that nuclear deterrence pushed competition onto non-nuclear proxy theaters, not that containment itself relied on nukes."}, {"text": "Succeeded in Eastern Europe but failed in Asia because of the Marshall Plan's geographic limitations", "isCorrect": false, "rationale": "The source does not frame containment's record this way. The Marshall Plan was an economic tool; containment's broadest application was in Asia (Korea, Vietnam) — the source presents this as a consequence of containment's logic, not a failure of the Marshall Plan's reach."}]}, {"question": "The Marshall Plan ($13 billion, 1948–1952) and the Soviet Comecon (1949) are best understood as evidence that the Cold War was:", "options": [{"text": "Primarily a military contest driven by NATO and Warsaw Pact troop deployments", "isCorrect": false, "rationale": "While NATO and the Warsaw Pact were military alliances, the Marshall Plan and Comecon were economic programs — their existence demonstrates the Cold War was simultaneously a military, ideological, and economic competition."}, {"text": "An economic and ideological competition that produced two largely separate global economic systems", "isCorrect": true, "rationale": "The source states the Marshall Plan and Comecon together created 'two separate economic systems operating on different principles and increasingly disconnected from each other — the material foundation for the \"two worlds\" rhetoric that dominated Cold War political discourse.'"}, {"text": "Resolved primarily through international institutions like the United Nations", "isCorrect": false, "rationale": "Neither the Marshall Plan nor Comecon operated through the United Nations; they were bilateral or bloc-level economic arrangements that deepened the superpower divide rather than resolving it."}, {"text": "A dispute over colonial territories in Asia and Africa rather than over European economic recovery", "isCorrect": false, "rationale": "Both the Marshall Plan and Comecon were focused on European economic organization. While the Cold War later expanded into Asia and Africa, these particular programs were about European reconstruction and bloc-building."}]}, {"question": "Which of the following best explains why the Berlin Wall, erected in August 1961, became 'the Cold War's most visible symbol'?", "options": [{"text": "It marked the border between NATO and Warsaw Pact military zones and was heavily armed", "isCorrect": false, "rationale": "While Berlin sat deep inside East Germany and was a military flashpoint, the Wall's symbolic power derived primarily from its function: preventing East Germans from fleeing to the West — physically incarnating the Iron Curtain's division of populations, not just territories."}, {"text": "It physically embodied the ideological division of Europe and was built to stop the flight of skilled workers to the West", "isCorrect": true, "rationale": "The source states the Wall was erected 'to stop the hemorrhage of skilled workers fleeing to the West' and describes it as 'the Cold War's most visible symbol' — combining a concrete political function (brain drain prevention) with its role as the physical incarnation of the Iron Curtain."}, {"text": "It was the site of the 1948–49 Berlin Blockade, which tested American resolve", "isCorrect": false, "rationale": "The Berlin Blockade occurred in 1948–49, twelve years before the Wall was built. The Blockade was ended by the Western Airlift; the Wall was a separate and later development."}, {"text": "It was the location where Soviet and American leaders met to negotiate nuclear arms limits", "isCorrect": false, "rationale": "The source contains no suggestion that Berlin was a summit location for arms control; the Wall was a division, not a meeting point."}]}, {"question": "The doctrine of mutually assured destruction (MAD) is best described as:", "options": [{"text": "A strategy of preventive war in which one superpower would launch a first strike before the other could develop equivalent capability", "isCorrect": false, "rationale": "MAD explicitly prevented preventive war — the source states 'neither superpower could \"win\" a nuclear war, so neither could rationally start one.' MAD was a deterrence structure, not an offensive strategy."}, {"text": "A deterrence structure in which neither superpower could rationally initiate nuclear war because any first strike guaranteed a devastating retaliatory strike", "isCorrect": true, "rationale": "The source defines MAD precisely this way: 'any nuclear first strike would guarantee a retaliatory strike sufficient to destroy the attacker,' creating 'a bizarre but remarkably stable deterrence structure.'"}, {"text": "An arms control treaty in which the superpowers agreed to limit their nuclear arsenals to a mutually agreed ceiling", "isCorrect": false, "rationale": "MAD was a strategic logic, not a treaty. Arms control agreements (like SALT) came later. The source describes MAD as an emergent condition of the nuclear buildup, not a negotiated agreement."}, {"text": "A strategy for winning limited nuclear exchanges by protecting civilian populations through civil defense", "isCorrect": false, "rationale": "MAD logic held that nuclear war was unsurvivable for both sides — the source says both superpowers could 'destroy each other's major cities many times over.' Civil defense is incompatible with MAD's premise."}]}, {"question": "The Soviet launch of Sputnik 1 in October 1957 prompted the United States to pass the National Defense Education Act (1958) and create NASA. This sequence of events best illustrates which SPICE-T theme connection?", "options": [{"text": "Social — the Space Race redistributed wealth from military to civilian populations", "isCorrect": false, "rationale": "The source connects Sputnik to education expansion and technology/science policy, not to wealth redistribution. The Social theme would concern class, gender, or demographic change."}, {"text": "Political + Technology — geopolitical competition drove massive investment in science education and missile/space programs", "isCorrect": true, "rationale": "The source's own SPICE-T callout labels this 'Political + Technology': 'The Cold War was as much a technological contest as a military one,' and states that Sputnik 'triggered a massive expansion of science education... and the creation of NASA' — directly linking geopolitical competition to technological policy."}, {"text": "Economic + Cultural — consumer culture in the West outcompeted Soviet industrial production", "isCorrect": false, "rationale": "The source does not frame the Space Race in terms of consumer culture. The Economic theme would address trade or production systems; the source focuses on state investment in science and military technology."}, {"text": "Interaction with Environment — the Space Race altered Earth's orbital environment", "isCorrect": false, "rationale": "While satellites did alter the orbital environment, the source's SPICE-T callout focuses on the geopolitical and educational consequences of the Space Race, not environmental impact."}]}, {"question": "Both the United States and the Soviet Union interpreted each other's post-WWII actions as threatening. The source states: 'Neither interpretation was entirely wrong, and neither was entirely right.' This framing most closely reflects which historical thinking skill?", "options": [{"text": "Periodization — dividing history into phases based on turning points", "isCorrect": false, "rationale": "Periodization concerns dividing history into eras. The author's balanced attribution of both legitimacy and distortion to each superpower's perspective is about analyzing perspective and causation, not about defining historical periods."}, {"text": "Causation — identifying multiple, sometimes contradictory, causes for historical outcomes", "isCorrect": true, "rationale": "The statement invites students to see the Cold War's origins as arising from the interaction of multiple legitimate and distorted perceptions — a causal analysis that resists single-cause explanation. This is the core of AP World's causation thinking skill."}, {"text": "Continuity and change — comparing the Cold War to earlier great-power rivalries", "isCorrect": false, "rationale": "While the source does note the Cold War differed from 'earlier great-power rivalries,' the specific framing quoted ('neither entirely wrong, neither entirely right') is about the mutual misperceptions driving the conflict, not about change over time."}, {"text": "Contextualization — placing American foreign policy in the context of the Enlightenment", "isCorrect": false, "rationale": "Contextualization would place events in a broader historical setting; the statement is specifically about analyzing the rival perceptions of two actors in 1945–48, not a broader contextual framing."}]}, {"question": "The Truman Doctrine (1947) declared that the United States would support 'free peoples who are resisting attempted subjugation by armed minorities or by outside pressures.' Which of the following best explains why this language proved so consequential for American foreign policy over the next four decades?", "options": [{"text": "It committed the United States to defending NATO allies in Western Europe only, limiting American obligations", "isCorrect": false, "rationale": "The source explicitly notes the Truman Doctrine's language was 'sweeping' and 'implied that the United States had an obligation to resist Communist movements anywhere in the world, not merely in Europe' — the opposite of a limited geographic commitment."}, {"text": "It established the United Nations as the primary mechanism through which the United States would respond to Communist threats", "isCorrect": false, "rationale": "The Truman Doctrine was a unilateral American declaration of commitment; the source does not connect it to UN mechanisms. The Korean War (via the UN) came later and was a different context."}, {"text": "Its sweeping language implied a global obligation to resist Communist movements, providing rhetorical justification for interventions on multiple continents", "isCorrect": true, "rationale": "The source states the language 'implied that the United States had an obligation to resist Communist movements anywhere in the world' and 'would shape American foreign policy for four decades and provide the rhetorical justification for interventions in Korea, Vietnam, Iran, and the Congo.'"}, {"text": "It required Congressional approval for all future military interventions, strengthening legislative oversight", "isCorrect": false, "rationale": "The source notes Truman asked Congress for aid to Greece and Turkey, but the Doctrine itself did not establish a general requirement for Congressional authorization of future interventions — indeed, many Cold War interventions (Iran, Guatemala, covert operations) bypassed such approval."}]}, {"question": "Compare the origins of NATO (1949) and the Warsaw Pact (1955). Which statement best describes their relationship?", "options": [{"text": "Both alliances were formed simultaneously as part of a negotiated agreement to divide Europe into spheres of influence", "isCorrect": false, "rationale": "NATO was formed in April 1949; the Warsaw Pact was formed in 1955 — six years later and specifically in response to West Germany's admission to NATO. They were not simultaneous or negotiated as a package."}, {"text": "NATO was an American-led defensive alliance; the Warsaw Pact was a Soviet-led offensive alliance designed to invade Western Europe", "isCorrect": false, "rationale": "The source describes both as 'collective defense' alliances; it does not characterize the Warsaw Pact as offensive. Characterizing either as purely offensive overstates the source's content and reflects Cold War propaganda more than historical analysis."}, {"text": "NATO institutionalized the American military presence in Western Europe; the Warsaw Pact was the Soviet Union's direct response to West Germany's rearmament and NATO admission", "isCorrect": true, "rationale": "The source states NATO 'institutionalized the American military presence in Western Europe' and that 'when West Germany was rearmed and admitted to NATO in 1955, the Soviet Union responded within days by forming the Warsaw Pact.'"}, {"text": "The Warsaw Pact preceded NATO and was the original cause of American military commitment to Europe", "isCorrect": false, "rationale": "This reverses the chronology. NATO was formed in 1949; the Warsaw Pact was formed in 1955. The source is explicit about the sequence."}]}, {"question": "A student claims: 'The nuclear arms race made the Cold War more dangerous because it increased the likelihood of direct superpower military conflict.' Based on the source, how would a historian most accurately assess this claim?", "options": [{"text": "The claim is accurate — nuclear weapons gave both superpowers the confidence to fight each other directly in Korea and Vietnam", "isCorrect": false, "rationale": "The source states the opposite: nuclear weapons made direct superpower war 'almost unimaginably catastrophic,' and the conflicts in Korea and Vietnam were precisely not direct superpower confrontations — they were proxy wars fought through local actors."}, {"text": "The claim is partially accurate — the arms race increased tension but also displaced superpower competition into proxy wars and political influence contests that were less catastrophically dangerous than direct war", "isCorrect": true, "rationale": "This reflects the source's analysis accurately. MAD created 'a bizarre but remarkably stable deterrence structure,' and 'the consequence was that superpower competition was displaced onto non-nuclear theaters: proxy wars... and intensive competition for political influence in newly decolonized states.'"}, {"text": "The claim is inaccurate — nuclear weapons had no effect on Cold War conflict because both superpowers agreed through treaty not to use them", "isCorrect": false, "rationale": "No such treaty existed in the early Cold War; MAD was a strategic logic, not a treaty. The claim that nuclear weapons 'had no effect' is directly contradicted by the source's central argument about nuclear deterrence shaping the entire Cold War structure."}, {"text": "The claim is inaccurate — nuclear weapons ended the Cold War quickly because their existence forced both superpowers to negotiate peace in 1947", "isCorrect": false, "rationale": "The Cold War lasted from approximately 1947 to 1991 — nuclear weapons did not end it quickly. The source specifically states nuclear weapons displaced competition rather than resolving it."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
