<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP World History: Modern &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_World.html">&larr; Back to AP World History: Modern</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP World History: Modern &mdash; Belief Systems as State Architecture</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The source argues that in the period 1200–1450, rulers 'did not merely tolerate religion — they deployed it.' Which of the following examples from the source BEST illustrates this argument?", "options": [{"text": "Chan Buddhism coexisted peacefully with Neo-Confucianism among the educated elite of Song China.", "isCorrect": false, "rationale": "Coexistence describes a tolerant relationship, not active deployment; this example does not show rulers strategically using religion as a governing tool."}, {"text": "The Goryeo dynasty of Korea created the Tripitaka Koreana — 80,000 printing blocks of the Buddhist canon — during a Mongol invasion in the hope that the merit generated would protect the kingdom.", "isCorrect": true, "rationale": "This is the source's own example of belief 'deployed' as political strategy: the Goryeo rulers used a massive act of Buddhist merit-making specifically to produce divine protection for the kingdom during a military crisis — religious investment in service of political survival."}, {"text": "Buddhism spread from India across mainland Southeast Asia and Sri Lanka over many centuries.", "isCorrect": false, "rationale": "Geographic spread describes diffusion, not rulers' strategic deployment of religion as governing infrastructure; the process described is long-term and not tied to specific ruling decisions."}, {"text": "Zen Buddhism resonated with the samurai warrior class, providing a spiritual framework for a martial ethic.", "isCorrect": false, "rationale": "While this shows Buddhism serving a social function among warriors, it describes organic resonance rather than a ruler actively deploying religion as state architecture."}], "id": "q01"}, {"question": "A historian comparing the political functions of Buddhism and Neo-Confucianism in East Asia argues that 'Neo-Confucianism was more directly useful to the state.' Which of the following best supports this argument?", "options": [{"text": "Buddhism was geographically more widespread than Neo-Confucianism, spreading from India across all of Asia.", "isCorrect": false, "rationale": "Geographic reach is a measure of diffusion, not direct state utility; the argument concerns which ideology was more useful as a governing tool, not which was more widespread."}, {"text": "Neo-Confucianism provided the examination curriculum that produced trained administrators, while Buddhism primarily supplied spiritual legitimacy and communal ritual without generating a state-staffing bureaucratic class.", "isCorrect": true, "rationale": "The source's own AP Exam Tip makes precisely this claim: 'Neo-Confucianism was more directly useful to the state (it produced a trained bureaucracy) while Buddhism was more universally portable.'"}, {"text": "Neo-Confucian monasteries owned vast landholdings, giving the state direct control over the economy.", "isCorrect": false, "rationale": "The source attributes vast landholding monasteries to Buddhism, not Neo-Confucianism; Neo-Confucianism was associated with the scholar-gentry class and examination system, not monastic institutions."}, {"text": "Buddhism was banned in Song China because it competed with Neo-Confucian governance.", "isCorrect": false, "rationale": "Buddhism was not banned — it coexisted with Neo-Confucianism in China; the source notes Song scholars 'were often critical' of Buddhism but that Chan Buddhism 'coexisted with Neo-Confucianism among the educated elite.'"}], "id": "q02"}, {"question": "Read the following scenario: A Korean ruler, facing invasion, commissions the production of 80,000 wooden printing blocks preserving the entire Buddhist canon, believing the merit generated will provide divine protection. A historian analyzing this action would most likely argue it illustrates:", "options": [{"text": "The Goryeo dynasty's rejection of military defense in favor of purely religious solutions.", "isCorrect": false, "rationale": "The source does not describe the Tripitaka Koreana as a replacement for military defense, only as a parallel act of merit-making — the claim of divine protection does not mean military options were abandoned."}, {"text": "Belief as political infrastructure: rulers used organized religion not merely as personal practice but as a form of state action expected to produce political results.", "isCorrect": true, "rationale": "The source explicitly presents the Tripitaka Koreana as 'one of history's most dramatic illustrations of belief deployed as political strategy' — the ruler's investment in Buddhist merit production was a political act aimed at a political goal (kingdom protection)."}, {"text": "The Goryeo dynasty's embrace of Neo-Confucianism over Buddhism as the preferred state ideology.", "isCorrect": false, "rationale": "The Goryeo dynasty used Buddhism as its ideological foundation; Neo-Confucianism displaced Buddhism in Korea only with the later Joseon dynasty (founded 1392)."}, {"text": "Korea's isolation from the broader East Asian world during the Mongol invasion period.", "isCorrect": false, "rationale": "The Tripitaka Koreana was produced specifically in response to engagement with the Mongol invaders — a sign of connection to, not isolation from, the broader East Asian world."}], "id": "q03"}, {"question": "The Byzantine theory of symphonia described the relationship between the emperor and the Patriarch of Constantinople as:", "options": [{"text": "A competition for ultimate authority in which the emperor usually prevailed over the Patriarch.", "isCorrect": false, "rationale": "The theory of symphonia describes partnership and harmony, not competition; the source presents it as a theoretical ideal of mutual support, not a power struggle."}, {"text": "A theoretical partnership in which church provided spiritual legitimacy and the emperor protected the church's institutional existence — two wings of a single divine order.", "isCorrect": true, "rationale": "The source explicitly describes symphonia as 'harmony between church and state' and states 'the church providing spiritual legitimacy and the emperor protecting the church's institutional existence' — a mutual, complementary arrangement."}, {"text": "A division of the empire into secular and sacred territories, each governed independently.", "isCorrect": false, "rationale": "Symphonia was about the integration of secular and sacred authority, not their territorial separation; the emperor ruled the empire including the church's material existence."}, {"text": "The theological argument that the emperor was himself a divine being, superior to the Patriarch.", "isCorrect": false, "rationale": "While the emperor was 'a sacred figure whose authority derived from divine mandate,' symphonia describes a partnership with the Patriarch rather than imperial divine superiority over the church."}], "id": "q04"}, {"question": "According to the source, the Fourth Crusade (1202–1204) was 'a catastrophe for Byzantine–Catholic relations' primarily because:", "options": [{"text": "It successfully reconquered Jerusalem and reduced Islamic influence in the Levant, making Byzantine trade routes redundant.", "isCorrect": false, "rationale": "The Fourth Crusade never reached Jerusalem — it sacked Constantinople, the Byzantine Christian capital. This is one of the most consequential misidentifications in AP World History review."}, {"text": "It resulted in the sack of Constantinople, the establishment of a Latin Empire, and the permanent fracturing of the already-strained Orthodox–Catholic relationship.", "isCorrect": true, "rationale": "The source explicitly states the Fourth Crusade 'sacked Constantinople, established the Latin Empire, and permanently fractured the already-strained relationship between Eastern Orthodox and Roman Catholic Christianity.'"}, {"text": "It forced the Byzantine emperor to convert to Roman Catholicism, abandoning Orthodox Christianity as the state religion.", "isCorrect": false, "rationale": "The Byzantine emperor did not convert; the Latin Empire installed Catholic rulers temporarily, but Orthodox Christianity survived and eventually revived in Constantinople and new centers like Moscow."}, {"text": "It united Eastern Orthodox and Sunni Islamic forces against the Crusaders for the first time.", "isCorrect": false, "rationale": "No such alliance is described; the Crusades produced complex diplomatic situations, but the source focuses on the internal Christian fracture, not an Orthodox-Islamic alliance."}], "id": "q05"}, {"question": "The source describes syncretism as 'widespread in the period 1200–1450.' Which of the following is NOT an example of syncretism as the term is defined in this source?", "options": [{"text": "Chan Buddhism absorbing Daoist ideas about spontaneity and nature.", "isCorrect": false, "rationale": "This IS an example of syncretism — the source explicitly names it as such in the definition: 'Chan Buddhism absorbed Daoist ideas about spontaneity and nature.'"}, {"text": "Sufi Islam incorporating local spirit-veneration practices in West Africa and Southeast Asia.", "isCorrect": false, "rationale": "This IS an example of syncretism — the source explicitly names it: 'Sufi Islam incorporated local spirit-veneration practices in West Africa and Southeast Asia.'"}, {"text": "Neo-Confucianism synthesizing Confucian ethics with Buddhist metaphysics and Daoist cosmology.", "isCorrect": false, "rationale": "This IS an example of syncretism — the source explicitly names it: 'Neo-Confucianism synthesized classical Confucian ethics with Buddhist metaphysics and Daoist cosmology.'"}, {"text": "The Schism of 1054, in which the Pope and Patriarch of Constantinople excommunicated each other.", "isCorrect": true, "rationale": "The Schism of 1054 is an example of religious division and institutional separation, not blending — it is the opposite of syncretism. The source presents it as establishing 'the institutional separation' between Orthodox and Catholic Christianity."}], "id": "q06"}, {"question": "After the fall of Constantinople to the Ottomans in 1453, the Principality of Moscow claimed to be the 'Third Rome.' This claim most directly illustrates which historical process?", "options": [{"text": "Moscow's political ambition to conquer the former Byzantine Empire militarily and restore the Eastern Roman state.", "isCorrect": false, "rationale": "The 'Third Rome' claim was ideological and religious, not primarily a military conquest program; it expressed the aspiration to carry forward Orthodox Christian civilization, not reconquer Byzantine territory."}, {"text": "The geographic shift of Orthodox Christian civilization's center as a result of Byzantine collapse, with new centers (Serbia, Bulgaria, Moscow) inheriting the tradition.", "isCorrect": true, "rationale": "The source explicitly states Orthodox Christianity 'survived and eventually flourished in new centers — Serbia, Bulgaria, and above all the rising Principality of Moscow' after the fall of Constantinople — illustrating how religious traditions relocate when their original political centers collapse."}, {"text": "Moscow's formal conversion from Mongol-style governance to Byzantine Orthodox Christianity under the Mongol Golden Horde.", "isCorrect": false, "rationale": "While Moscow was under Mongol authority during this period, the 'Third Rome' claim expressed Orthodox continuity, not a conversion from Mongol practices; the Principality of Moscow was already Orthodox Christian."}, {"text": "The reunification of Eastern Orthodox and Roman Catholic Christianity under Moscow's leadership after the fall of Constantinople.", "isCorrect": false, "rationale": "The 1204 sack made reconciliation 'essentially impossible' according to the source; Moscow's 'Third Rome' claim was about Orthodox continuity, not Catholic-Orthodox reunion."}], "id": "q07"}, {"question": "The source's comparison of Buddhism and Neo-Confucianism as 'social glue' notes that Buddhism 'crossed linguistic and ethnic boundaries more readily.' Which evidence from the source best supports this claim?", "options": [{"text": "Buddhism became the basis for the Joseon dynasty's state ideology in Korea.", "isCorrect": false, "rationale": "It was Neo-Confucianism, not Buddhism, that the Joseon dynasty adopted comprehensively; this example contradicts rather than supports the claim about Buddhism's cross-boundary portability."}, {"text": "Buddhism spread from India across South, Southeast, and East Asia, 'adapted to dozens of local cultures and languages.'", "isCorrect": true, "rationale": "The source's comparison table explicitly states Buddhism's 'geographical reach: Spread from India across South, Southeast, and East Asia; adapted to dozens of local cultures and languages' — the breadth of cultural and linguistic adaptation directly supports the claim of cross-boundary portability."}, {"text": "Buddhism was adopted as the basis of the civil service examination in China, Korea, and Japan.", "isCorrect": false, "rationale": "The civil service examination was based on Neo-Confucianism, not Buddhism; this misidentifies which ideology provided the examination curriculum."}, {"text": "Buddhist monasteries were exclusively male institutions, which prevented women from participating in Buddhism.", "isCorrect": false, "rationale": "The source notes Buddhism 'offered women a formal role (nuns)' — it was not exclusively male; this is a partial misreading of the source's gender comparison."}], "id": "q08"}, {"question": "In Japan during the Kamakura shogunate (1185–1333), Zen Buddhism 'resonated with the warrior class (samurai), providing a spiritual framework for a martial ethic.' This relationship between Buddhism and the warrior class MOST closely parallels which development in another society?", "options": [{"text": "The Catholic Church's role in Europe, where it provided trans-regional authority and trained the literate clergy who administered feudal governance.", "isCorrect": false, "rationale": "The Catholic Church provided trans-regional institutional authority and literacy across all of society; this is a different relationship than Buddhism's specific resonance with a warrior class's internal ethical code."}, {"text": "Neo-Confucianism in Joseon Korea, where the state reorganized social hierarchy around Confucian principles, restricting women's rights.", "isCorrect": false, "rationale": "Neo-Confucianism's restructuring of Korean social hierarchy was a top-down state imposition, distinct from Buddhism's organic resonance with samurai martial culture as a spiritual framework for an existing warrior ethic."}, {"text": "The use of Islam as legitimizing framework by the Delhi Sultanate to justify military expansion and rule over conquered populations.", "isCorrect": false, "rationale": "This describes Islam's role in legitimizing conquest and governance, not the organic alignment of a religious tradition with a pre-existing warrior class's internal values and martial ethic."}, {"text": "Zen Buddhism's function is closest to Islamic Sufism, which provided a personal spiritual path that resonated with specific communities independently of formal state structures.", "isCorrect": true, "rationale": "Both Zen Buddhism among samurai and Sufi Islam in peripheral regions represent cases of religious traditions resonating with specific social groups through personal spiritual experience and disciplined practice, rather than through top-down state imposition — both operated somewhat independently of formal state structures."}], "id": "q09"}, {"question": "The source states that Joseon Korea's adoption of Neo-Confucianism 'contracted significantly' women's social positions. Which of the following comparisons within the source BEST provides evidence that this contraction was specific to Neo-Confucianism rather than to all East Asian belief systems?", "options": [{"text": "Buddhism in the Goryeo period preceding Joseon offered women a formal role as nuns, while Neo-Confucianism in Joseon explicitly subordinated women and restricted their legal rights.", "isCorrect": true, "rationale": "The source's comparison table explicitly contrasts Buddhism's offer of 'a formal role (nuns)' for women with Neo-Confucianism's explicit subordination of women; in the Korean case, the transition from Goryeo (Buddhist) to Joseon (Neo-Confucian) directly produced the contraction in women's status."}, {"text": "The Byzantine Empire's Orthodox Christianity also restricted women's roles, suggesting all medieval religions contracted women's positions equally.", "isCorrect": false, "rationale": "The source does not describe Byzantine Christianity as restricting women's roles in the same way, and an 'all religions equally restricted women' claim contradicts the source's comparative analysis of how different systems varied in their gender implications."}, {"text": "The Kamakura shogunate's patronage of Zen Buddhism maintained traditional women's roles, while Zen's later spread to Korea reduced women's status.", "isCorrect": false, "rationale": "The source does not attribute Korean women's contraction to Zen Buddhism; it is specifically Neo-Confucianism's institutionalization in Joseon — not any form of Buddhism — that the source links to women's reduced rights."}, {"text": "Islam in the Delhi Sultanate produced the same reduction in women's rights as Neo-Confucianism in Korea, suggesting religious patriarchy was universal.", "isCorrect": false, "rationale": "The source does not make this parallel claim; it focuses on the specific effects of Neo-Confucianism in Korea, not a universal religious patriarchy argument."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
