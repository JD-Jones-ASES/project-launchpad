<script>
var QUESTIONS = [{"question": "The Atlantic slave trade differed qualitatively from earlier forms of slavery in Africa, Europe, and Asia primarily because it:", "options": [{"text": "Was the first system in which enslaved people were bought and sold for money rather than acquired through conquest or tribute obligations.", "isCorrect": false, "rationale": "Commercial markets in enslaved people existed in many premodern societies. The qualitative difference the source identifies is not the presence of commercial exchange but the specific nature of the status itself — hereditary, racialized, and permanent."}, {"text": "Introduced hereditary, racialized, permanent chattel status on an industrial scale — characteristics that distinguished it from older systems based on debt, war captivity, or criminal punishment.", "isCorrect": true, "rationale": "The source states the Atlantic system was 'characterized by hereditary, racialized status, permanent chattel ownership, and an industrial scale of transportation that had no precedent in human history' — explicitly distinguishing it from earlier slavery based on 'debt, war captivity, or criminal punishment — not hereditary, racially determined status.'"}, {"text": "Was the only slave system in which African rulers participated as suppliers, since earlier African slavery involved only domestic servitude within African societies.", "isCorrect": false, "rationale": "The source does not claim African slavery was exclusively domestic before the Atlantic trade. African rulers and merchants had participated in long-distance slave trading before the Atlantic system; the qualitative difference was in the nature of enslaved status, not African participation."}, {"text": "Originated in religious justifications for enslavement that earlier secular systems lacked, giving European slave traders ideological cover for their activities.", "isCorrect": false, "rationale": "The source does not identify religious justification as the defining difference. While Catholic ideological frameworks played a role in Spanish colonialism, the distinguishing features identified in the source are hereditary status, racial coding, chattel ownership, and scale."}]}, {"question": "Read the following excerpt from a historical document: 'As a result, the population on the island of Hispaniola... has now been reduced, as we have seen with our own eyes, to two hundred natives. The reason why the Christians have killed and destroyed such an infinite number of souls is that they have been moved by their wish for gold.' Based on your knowledge of this period and the source's content about Las Casas, which of the following is the most accurate evaluation of this excerpt as historical evidence?", "options": [{"text": "The excerpt is completely reliable because Las Casas witnessed these events directly and had no personal stake in misrepresenting them.", "isCorrect": false, "rationale": "Las Casas had a clear rhetorical purpose — advocating for indigenous peoples before the Spanish crown — and had himself been an encomendero. The source notes his account 'carries the particular authority — and particular limitations — of an insider turned critic.' Witnesses are never completely neutral."}, {"text": "The excerpt should be used with awareness of Las Casas's rhetorical purpose (addressing the king to call for reform), his former status as an encomendero, and what he omits (notably the role of disease relative to violence in depopulation).", "isCorrect": true, "rationale": "The source's Sourcing Note asks students to consider exactly these factors: Las Casas's intended royal audience, his status as a former encomendero turned critic, and the fact that he emphasizes violence while not discussing disease — which historians consider the primary cause of demographic collapse."}, {"text": "The excerpt is unreliable because Las Casas was a Spanish priest with a political agenda, and all Spanish accounts of this period systematically exaggerated indigenous suffering for propaganda purposes.", "isCorrect": false, "rationale": "Dismissing Las Casas entirely because of his identity and purpose goes too far. AP historical thinking requires evaluating sources critically — considering how purpose, audience, and position shape content — not wholesale rejection. Las Casas's account, despite its rhetorical shaping, records real events he witnessed."}, {"text": "The excerpt is the most accurate account of Hispaniola's depopulation because it was written by an eyewitness fifty years after contact and therefore represents the consolidated historical consensus of the period.", "isCorrect": false, "rationale": "Fifty years after contact is not a long time for accumulated wisdom; it reflects early colonial experience. Eyewitness status does not automatically confer accuracy — Las Casas's perspective shaped what he reported, and his account focuses on violence while underemphasizing disease, which historians now consider primary."}]}, {"question": "The triangular trade circuit of the Atlantic slave trade moved cargo in three legs. Which of the following correctly identifies the cargo on all three legs?", "options": [{"text": "Leg 1: enslaved Africans from Europe to West Africa; Leg 2: sugar and tobacco from West Africa to the Americas; Leg 3: manufactured goods from the Americas to Europe.", "isCorrect": false, "rationale": "This reverses the direction of two legs entirely. Enslaved Africans were moved from Africa to the Americas (not from Europe to Africa), and manufactured goods went from Europe to Africa (not from the Americas to Europe)."}, {"text": "Leg 1: manufactured goods (textiles, firearms, iron) from Europe to West Africa; Leg 2: enslaved Africans (Middle Passage) from West Africa to the Americas; Leg 3: sugar, tobacco, cotton from the Americas to Europe.", "isCorrect": true, "rationale": "The source describes exactly this circuit: European ships carried 'manufactured goods (textiles, firearms, iron goods, alcohol)' to West Africa; traded for enslaved people; crossed the Atlantic on the Middle Passage; sold their 'human cargo in Brazil, the Caribbean, or North America'; then 'returned to Europe carrying sugar, tobacco, cotton, and other plantation products.'"}, {"text": "Leg 1: silver from Spain to West Africa; Leg 2: enslaved Africans from West Africa to the Americas; Leg 3: sugar and rum from the Americas back to Spain.", "isCorrect": false, "rationale": "Silver was not the primary European export to West Africa; manufactured goods (textiles, firearms, iron goods, alcohol) were. This option confuses the silver trade with the slave trade circuit."}, {"text": "Leg 1: spices from Asia to Europe via West Africa; Leg 2: enslaved Africans from West Africa to the Americas; Leg 3: gold and silver from the Americas to West Africa as payment.", "isCorrect": false, "rationale": "The triangular trade was an Atlantic circuit, not connected to Asian spice trade. Payment to West African suppliers was in manufactured goods, not in American precious metals sent back to Africa."}]}, {"question": "The Middle Passage was characterized by which of the following conditions?", "options": [{"text": "Carefully managed crossings that minimized mortality because slave traders had economic incentives to deliver healthy enslaved people to American buyers.", "isCorrect": false, "rationale": "While slave traders did have some economic incentive to maintain cargo, conditions were brutal and mortality averaged 10–20%. The profit motive did not prevent extreme overcrowding, disease, dehydration, and violence. The source identifies it as the 'defining trauma of the Atlantic slave system.'"}, {"text": "Extreme overcrowding, disease, dehydration, and violence; mortality rates of 10–20%; survivors arrived traumatized and stripped of languages, names, and kinship ties.", "isCorrect": true, "rationale": "The source defines the Middle Passage as involving 'extreme overcrowding, disease, dehydration, and violence' with mortality of 'roughly 10 to 20 percent — meaning one to two million people died at sea.' Survivors arrived 'traumatized, physically depleted, and stripped of languages, names, and kinship ties.'"}, {"text": "Relatively rapid six-day crossings that preserved enslaved people's cultural communities, since the Portuguese kept ethnic groups together to facilitate communication on plantations.", "isCorrect": false, "rationale": "The Middle Passage typically took six to eight weeks, not six days. The source notes that survivors were 'stripped of languages, names, and kinship ties' — the opposite of cultural preservation. The mixing of different African groups was a deliberate strategy to prevent organized resistance."}, {"text": "Conditions identical to those experienced by indentured servants crossing the Atlantic, reflecting the similar legal status of enslaved Africans and European contract laborers in this period.", "isCorrect": false, "rationale": "The source explicitly distinguishes the Atlantic slave trade as a 'qualitatively different system' from other forms of labor migration. Enslaved Africans experienced conditions vastly worse than European indentured servants, and their legal status — hereditary, racialized chattel — was fundamentally different."}]}, {"question": "Brazil received approximately 4.9 million enslaved Africans while North America received only about 400,000. Which of the following best explains the difference in these numbers?", "options": [{"text": "Brazil was closer to Africa, making the Middle Passage shorter and therefore more profitable for Portuguese slave traders who could complete more voyages per year.", "isCorrect": false, "rationale": "While Brazil is geographically closer to West Africa than North America, the source's explanation focuses on mortality rates and natural increase, not voyage frequency. The key variable was plantation conditions and death rates, not shipping logistics."}, {"text": "North American colonies had legal restrictions on enslaved population growth that Brazilian and Caribbean colonies lacked, limiting the number of enslaved people who could be imported.", "isCorrect": false, "rationale": "The source does not identify legal restrictions as the explanation. The difference is attributed to conditions and mortality rates: Caribbean sugar islands required constant importation because death rates were so high, while North American enslaved populations grew through natural increase."}, {"text": "Caribbean sugar plantations had mortality rates so high that they required constant importation to maintain their workforce, while the North American enslaved population grew substantially through natural increase.", "isCorrect": true, "rationale": "The source explains: North America's enslaved population 'grew largely through natural increase, which itself speaks to somewhat different (though still brutal) conditions compared to the Caribbean sugar islands, where mortality was so high that plantations needed constant importation to maintain their workforce.'"}, {"text": "North American colonists preferred indigenous American labor over enslaved African labor for agricultural work, reducing their demand for the Atlantic slave trade.", "isCorrect": false, "rationale": "North American colonists did employ enslaved African labor extensively. The lower import numbers reflect plantation mortality conditions and natural increase, not a preference for indigenous labor."}]}, {"question": "The Atlantic slave trade transformed West African political economies primarily by:", "options": [{"text": "Introducing European-style monarchies that replaced decentralized kinship-based political structures across West Africa.", "isCorrect": false, "rationale": "The source does not identify the slave trade as introducing European political forms to Africa. The transformation described is of existing political structures around slave-raiding and firearms trade, not replacement by European monarchical models."}, {"text": "Incentivizing wars of capture, political fragmentation, and the reorganization of states like Dahomey and Asante around slave-raiding and long-distance trade — with firearms as the reward for participation.", "isCorrect": true, "rationale": "The source states: 'African rulers and merchants who participated in the trade did so partly because refusing was dangerous — rival states that participated gained firearms and military advantage.' Dahomey, Asante, and the Angolan kingdom of Ndongo 'became deeply enmeshed in the trade as suppliers, transforming their political structures around slave-raiding and long-distance trade.'"}, {"text": "Creating demographic collapse in West Africa equivalent to the collapse in the Americas, as European diseases spread inland from Atlantic trading posts.", "isCorrect": false, "rationale": "The source explicitly distinguishes the African case from the American one: 'The African population was not decimated by disease; it was drained by forced emigration.' West Africa did not experience the catastrophic disease-driven collapse that the Americas experienced."}, {"text": "Eliminating indigenous slavery within Africa, since the Atlantic trade absorbed all available enslaved labor into the export market and left none for domestic use.", "isCorrect": false, "rationale": "The source does not claim the Atlantic trade eliminated domestic African slavery. Domestic slavery within Africa continued alongside and in parallel with the export trade; the two systems coexisted."}]}, {"question": "Why were enslaved Africans preferred over indigenous American labor for Caribbean and Brazilian sugar plantations?", "options": [{"text": "Africans had experience cultivating sugar cane in West Africa, giving them technical skills that indigenous Americans and European settlers lacked.", "isCorrect": false, "rationale": "Sugar cane cultivation was not native to most of West Africa. The source identifies the reasons for preference as geographic accessibility, existing African slave-supply chains, and partial immunity to tropical diseases — not agricultural expertise."}, {"text": "West African geographic accessibility, existing African slave-supply chains through African political elites, and African populations' partial immunity to malaria and yellow fever endemic in tropical plantation zones.", "isCorrect": true, "rationale": "The source lists exactly these factors: 'West Africa was geographically accessible from Atlantic islands; existing African political structures — including African merchant and military elites who were themselves slave-traders — provided a supply chain; and African populations had some partial immunity to the malaria and yellow fever that were endemic in tropical Atlantic plantation zones.'"}, {"text": "Legal barriers established by the New Laws of 1542 completely prohibited the use of any non-African labor on sugar plantations, leaving Africans as the only legal option.", "isCorrect": false, "rationale": "The New Laws of 1542 (discussed in Section 4.4) restricted indigenous labor exploitation in Spanish colonies, but they did not specifically mandate African labor on sugar plantations. The preference for African labor preceded 1542 and stemmed from the practical factors identified above."}, {"text": "The Portuguese crown had a formal treaty with West African kingdoms guaranteeing enslaved people would be supplied annually at fixed prices, making African labor more economically predictable than indigenous labor.", "isCorrect": false, "rationale": "No such formal crown treaty with West African kingdoms is described in the source. The supply chain operated through African merchant and political elites, not through state-to-state treaties with guaranteed pricing."}]}, {"question": "Bartolomé de las Casas was a former encomendero who became an advocate for indigenous peoples. How does this background affect the historical usefulness of his account?", "options": [{"text": "His former role as an encomendero means his account is entirely unreliable, since he was financially motivated to exaggerate abuses in order to justify the confiscation of competitors' encomiendas.", "isCorrect": false, "rationale": "This dismissal goes too far. Las Casas did witness events directly and his account has documentary value. AP historical thinking requires contextualizing a source's purpose, not rejecting it wholesale. His position as an insider turned critic adds complexity, not simple unreliability."}, {"text": "His insider status gives his account direct-witness authority, while his religious conversion to advocacy and his rhetorical purpose (addressing the king for reform) introduce analytical considerations about what he emphasizes and what he omits.", "isCorrect": true, "rationale": "The source explicitly frames Las Casas's account as carrying 'the particular authority — and particular limitations — of an insider turned critic.' He witnessed events; but his rhetorical purpose and omissions (notably disease's role in depopulation) require critical analysis alongside his testimony."}, {"text": "His identity as a Spanish priest entirely determines his perspective, making his account useful only for understanding Spanish Catholic attitudes toward colonization, not for any factual reconstruction of events.", "isCorrect": false, "rationale": "Reducing a source entirely to the author's social identity is not AP historical thinking. Las Casas's account contains factual observations alongside rhetorical framing; the task is to analyze both, not to dismiss the testimony because of identity alone."}, {"text": "His account is most valuable because it was addressed to the king, which required him to present only facts that could be independently verified, making it more credible than accounts written for general audiences.", "isCorrect": false, "rationale": "Royal audiences required persuasion, not merely verifiable facts. Las Casas was making a legal and moral argument to the king; the rhetorical demands of that audience may have led him to dramatize and select evidence strategically, not to present neutrally verified facts."}]}, {"question": "The Atlantic slave trade is described in the source as 'a transformation of two worlds.' Which of the following best explains what this means?", "options": [{"text": "The trade transformed only the Americas by introducing African cultural practices, while West Africa remained essentially unchanged because African societies controlled the supply chain.", "isCorrect": false, "rationale": "The source explicitly argues that West Africa was structurally transformed by the trade: political economies reorganized around slave raiding, social hierarchies shifted, and populations declined. 'Two worlds' refers to both the Americas and West Africa."}, {"text": "The trade transformed both West Africa (reorganizing political economies around slave raiding and the firearms trade) and the Americas (building plantation economies and creating new Afro-diasporic cultural forms) simultaneously.", "isCorrect": true, "rationale": "The source's Key Concept explicitly states: 'It is also a story of how both West Africa and the Americas were structurally transformed by the trade' — describing West African political reorganization alongside the creation of 'new cultural forms (Afro-Brazilian Capoeira, Caribbean Creole languages, syncretic religions)' in the Americas."}, {"text": "The trade transformed Europe and the Americas but left Africa structurally unchanged because African rulers profited from the trade and experienced net demographic growth.", "isCorrect": false, "rationale": "The source identifies significant demographic costs for West Africa: population drained by forced emigration in the most productive age cohort, gender imbalances disrupting agriculture and social organization, and political structures reorganized around destabilizing slave raids."}, {"text": "The 'two worlds' transformed were the Spanish and Portuguese colonial empires, which merged their approaches to slavery into a single Atlantic system under Habsburg imperial coordination.", "isCorrect": false, "rationale": "The 'two worlds' in the source refers to West Africa and the Americas, not to different European colonial empires. The point is that non-European regions — on both sides of the Atlantic — were structurally reorganized by the trade."}]}, {"question": "Which of the following cultural developments mentioned in this section best illustrates African diaspora resilience under conditions of enslavement?", "options": [{"text": "The adoption of European legal codes by enslaved Africans, who used European property law to gradually purchase their own freedom and establish free Black communities.", "isCorrect": false, "rationale": "The source does not describe the adoption of European legal codes as an expression of African diaspora resilience. The cultural developments highlighted are syncretic religions and Creole languages — hybrid forms that preserved African elements within the colonial environment."}, {"text": "Syncretic religions like Candomblé and Vodou, and Creole languages, which blended African traditions with European and Catholic elements, preserving identity and community under conditions of extreme oppression.", "isCorrect": true, "rationale": "The source identifies 'Afro-Brazilian Capoeira, Caribbean Creole languages, syncretic religions like Candomblé and Vodou' as new cultural forms created in the Americas that 'were neither purely African nor purely European' — representing both the violence of the system and the cultural creativity it paradoxically produced."}, {"text": "The establishment of independent African kingdoms in Brazil and the Caribbean, where escaped enslaved people recreated West African political institutions in the New World.", "isCorrect": false, "rationale": "While maroon communities (communities of escaped enslaved people) did exist in Brazil and the Caribbean, the source's focus on cultural resilience is on syncretic religion and Creole language, not on the recreation of West African political kingdoms."}, {"text": "The preservation of Islamic literacy among enslaved West Africans, who used Arabic manuscripts to maintain religious and educational communities that resisted assimilation into Catholic plantation culture.", "isCorrect": false, "rationale": "While some West African enslaved people were literate Muslims who maintained Islamic practices, the source does not highlight Islamic literacy as the primary cultural resilience mechanism. The examples given are Candomblé, Vodou, Capoeira, and Creole languages — syncretic hybrid forms."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
