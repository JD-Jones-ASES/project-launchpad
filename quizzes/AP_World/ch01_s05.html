        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

<body>
<div class="quiz-container">

    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP World History: Modern &mdash; Sub-Saharan Africa: Kinship and the Mali Empire</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Read the following excerpt from Ibn Battuta's Rihla (c. 1352): 'The negroes possess some admirable qualities. They are seldom unjust, and have a greater abhorrence of injustice than any other people. Their sultan shows no mercy to anyone who is guilty of the least act of it. There is complete security in their country.' Based on this passage and the SOURCING NOTE in the section, which of the following BEST analyzes what Ibn Battuta's perspective reveals AND limits?", "options": [{"text": "The passage is fully objective because Ibn Battuta was a trained Islamic scholar who visited Mali personally.", "isCorrect": false, "rationale": "The sourcing note explicitly asks students to consider how Ibn Battuta's position as a Moroccan Arab Muslim scholar shaped what he noticed, praised, and overlooked — personal observation does not eliminate perspective-based limitations."}, {"text": "Ibn Battuta's emphasis on Mali's justice and security reflects what a North African Islamic audience valued, and his framing reflects his cultural position; his account is still valuable for what it reveals about Mali's governance despite these limitations.", "isCorrect": true, "rationale": "The sourcing note identifies Ibn Battuta's audience (North African Islamic) and perspective (Moroccan Arab Muslim scholar) as shaping his account — he praises justice and Islamic observance, which resonated with his audience, while his cultural position shapes other descriptions. The source maintains the account remains 'valuable' despite limitations."}, {"text": "Because Ibn Battuta is a secondary source written after Mali's decline, his account has no historical value for understanding the fourteenth-century Mali court.", "isCorrect": false, "rationale": "Ibn Battuta visited Mali in 1352 and is a primary source — an eyewitness account, not a secondary source written after the fact. The sourcing note frames him as our 'richest external account' of the period."}, {"text": "Ibn Battuta's description of Mali's justice is unreliable because he never actually visited Mali and compiled his account from second-hand reports.", "isCorrect": false, "rationale": "The source explicitly states Ibn Battuta 'visited Mali in 1352' — he was a direct observer, not a compiler of second-hand reports."}]}, {"question": "The Mali Empire controlled territory encompassing gold-producing forest regions to the south and salt-producing Saharan mines to the north. The source argues this geographic position was the foundation of Malian imperial power. Which of the following best explains WHY controlling the exchange corridor between these zones produced political power?", "options": [{"text": "Gold and salt were the only commodities produced in West Africa, so controlling them gave Mali a complete economic monopoly over the continent.", "isCorrect": false, "rationale": "The source does not claim Mali had a total economic monopoly or that only gold and salt were produced; it focuses on Mali's strategic position between complementary resource zones connected by the Niger River corridor."}, {"text": "By taxing goods at every junction in the exchange corridor, Malian mansas could fund armies, patronize scholars, and project power without relying primarily on agricultural taxation.", "isCorrect": true, "rationale": "The source explicitly states the empire 'taxed goods at every junction' and that 'this allowed the Malian mansas to fund armies, patronize Islamic scholars, and project power across a vast territory without the agricultural tax base that supported Eurasian bureaucratic states.'"}, {"text": "Mali's military superiority prevented all competing states from accessing the Saharan trade routes, creating a coercive monopoly through force.", "isCorrect": false, "rationale": "The source attributes Mali's power to its geographic position and control of exchange corridors, not exclusively to military coercion preventing competitor access; the commercial logic is structural, not solely military."}, {"text": "The combination of gold and salt deposits within Mali's territory itself (not the corridor between them) made the empire wealthy.", "isCorrect": false, "rationale": "The source specifically emphasizes the exchange corridor logic — gold was produced in forest regions to the SOUTH, salt in Saharan mines to the NORTH, and Mali's power came from controlling the corridor BETWEEN them, not from having both deposits within a single territory."}]}, {"question": "A student argues: 'Sub-Saharan Africa in 1200–1450 was politically organized differently from Eurasian states because African societies had no form of written records or formal institutions.' Based on the source, which evidence MOST DIRECTLY refutes this argument?", "options": [{"text": "The griots of West African societies transmitted genealogical and political knowledge orally across generations.", "isCorrect": false, "rationale": "This is true but it confirms the existence of oral (not written) knowledge transmission — it does not directly refute the claim about written records or formal institutions."}, {"text": "Timbuktu's mosque schools produced hundreds of thousands of Arabic-language manuscripts in Islamic law, astronomy, medicine, and history that survive today, directly refuting the idea that West Africa lacked a literate tradition.", "isCorrect": true, "rationale": "The source explicitly states 'The image of Africa as a continent without a literate tradition is directly refuted by Timbuktu: West Africa had a rich written scholarly culture in the Arabic language during the fourteenth and fifteenth centuries.'"}, {"text": "The Mali Empire was governed by a mansa whose authority derived from kinship networks, not written law codes.", "isCorrect": false, "rationale": "Governance through kinship rather than written law codes would seem to support (not refute) the student's claim; this does not address the specific assertion about written records or literate traditions."}, {"text": "Mansa Musa's gold distribution during his Hajj temporarily depressed gold prices in Cairo and the Middle East.", "isCorrect": false, "rationale": "This shows Mali's wealth and integration with the wider Islamic world, but does not directly refute the claim about written records or literate traditions within West Africa."}]}, {"question": "The source describes the griot as 'a professional oral historian, musician, and keeper of genealogical and political knowledge.' Based on this description, which of the following BEST identifies the griot's political function in West African societies?", "options": [{"text": "Griots functioned as tax collectors, documenting tribute owed to the mansa from subject lineages.", "isCorrect": false, "rationale": "The source does not describe griots as tax collectors; their functions were information-keeping, ceremonial performance, and diplomatic intermediacy — knowledge work, not fiscal administration."}, {"text": "Griots served as living archives preserving royal genealogies and political histories, and as diplomatic intermediaries between rulers — providing the institutional memory that written records provided elsewhere.", "isCorrect": true, "rationale": "The source explicitly describes griots as 'living archives in societies without writing' who 'served as diplomatic intermediaries between rulers' — their function was to provide institutional political memory and legitimation, paralleling the role of written records in literate states."}, {"text": "Griots were primarily religious leaders who legitimized the mansa's authority by claiming divine descent from ancestral spirits.", "isCorrect": false, "rationale": "The source distinguishes griots (oral historians and genealogists) from the religious-ancestral legitimation that lineage elders derived from their role as 'intermediaries with ancestral spirits'; these are different institutional roles."}, {"text": "Griots replaced the need for formal legal systems by memorizing customary law and applying it in local disputes.", "isCorrect": false, "rationale": "The source describes griots as historians and genealogists, not legal specialists applying customary law in disputes; that judicial function belonged to different figures in African societies."}]}, {"question": "Mansa Musa's Hajj pilgrimage of 1324–1325 reportedly distributed so much gold that its value was depressed throughout the Middle East for more than a decade. This event illustrates which historical concept MOST DIRECTLY?", "options": [{"text": "The Hajj as a mechanism of Dar al-Islam's institutional coherence, bringing Muslims from all regions into physical contact.", "isCorrect": false, "rationale": "While Mansa Musa's Hajj does illustrate the Hajj's role in connecting the Islamic world, the specific detail about gold distribution depressing prices is about economic impact and political display, not the Hajj's religious cohesion function."}, {"text": "Mali's integration into trans-regional exchange networks: the gold's economic impact across Egypt and the Hijaz demonstrates how West African material wealth was connected to the Mediterranean and Islamic worlds.", "isCorrect": true, "rationale": "The gold price depression in Cairo and the Hijaz demonstrates that Mali's wealth was not locally contained but was materially integrated into the economic systems of the broader Islamic world — a direct illustration of trans-regional economic interconnection."}, {"text": "The superiority of African gold to other mineral resources in the fourteenth-century world economy.", "isCorrect": false, "rationale": "The episode illustrates the scale of Malian gold production and its connection to wider markets, not the inherent superiority of African gold as a commodity type compared to other resources."}, {"text": "The deliberate monetary policy of the Mali Empire, which sought to manipulate gold prices to undermine Islamic economic competitors.", "isCorrect": false, "rationale": "The source presents the gold distribution as royal display (a 'spectacularly public fashion' announcement of Mali's wealth), not a deliberate monetary policy to undermine competitors; the price depression was a consequence, not an intended goal."}]}, {"question": "The Sundiata epic describes the rise of the founder of Mali who unified Mande-speaking peoples and defeated the Sosso king at the Battle of Kirina (c. 1235). The source describes this epic as transmitted by griots. Which of the following BEST explains its political significance?", "options": [{"text": "The Sundiata epic served as a legal document establishing Mali's territorial boundaries that neighboring states were required to respect.", "isCorrect": false, "rationale": "The Sundiata epic is an oral foundational narrative establishing political legitimacy and identity, not a legal boundary document; territorial law does not operate through oral epic in this context."}, {"text": "As the oral foundational narrative of Mali, the Sundiata epic legitimized the Keita clan's authority by connecting present rulers to a heroic, divinely favored ancestor — the political equivalent of a written founding charter.", "isCorrect": true, "rationale": "The source presents the Sundiata epic as the 'oral foundational narrative of Mali' that established the founding story of Sundiata Keita's unification — a legitimizing narrative that connected the ruling Keita clan to a heroic origin, functionally paralleling written founding documents in literate societies."}, {"text": "The epic was primarily a religious text describing the proper rituals for Islamic observance required of all Malian rulers.", "isCorrect": false, "rationale": "The Sundiata epic predates Islam's full integration into Mali's governance; it describes the military-political founding of the empire by Sundiata Keita, not Islamic religious practice."}, {"text": "The Battle of Kirina was fabricated by later griots to obscure Mali's actual origins as a Berber trading colony in the Sahara.", "isCorrect": false, "rationale": "There is no historical basis for this claim; the source presents Kirina as the actual founding military victory, and griots preserved genuine historical traditions alongside legitimizing narratives."}]}, {"question": "The source explains that in sub-Saharan Africa, lineage membership determined 'one's access to land, eligibility for positions of authority, obligations to share labor and food, and the network of allies one could call on.' This description MOST DIRECTLY contrasts with which feature of Song Chinese governance?", "options": [{"text": "The Song tributary system that organized diplomatic-commercial relations with neighboring states.", "isCorrect": false, "rationale": "The tributary system is about external diplomatic relations, not the internal basis of governance and social organization within Song China; it is not the most direct contrast."}, {"text": "The Song civil service examination system, in which access to official positions derived from demonstrated scholarly ability rather than lineage membership.", "isCorrect": true, "rationale": "Song China's meritocratic examination system explicitly recruited based on demonstrated ability rather than birth or lineage — the most direct contrast to the lineage-based access to authority described in West African polities. The same position (official authority) was accessed through totally different mechanisms in the two systems."}, {"text": "The Neo-Confucian five relationships, which also structured social obligations but through role-based ethics rather than lineage.", "isCorrect": false, "rationale": "While the contrast is real (role-based duties vs. lineage-based obligations), the question asks for the MOST DIRECT contrast with the specific claim about access to land and 'positions of authority' — the examination system is more directly contrasted on the authority-access question."}, {"text": "Song paper money, which replaced lineage-based exchange obligations with impersonal market transactions.", "isCorrect": false, "rationale": "Paper money is an economic innovation affecting commercial exchange; it is not directly about how positions of authority were distributed or how social obligation was organized in relation to kinship."}]}, {"question": "According to the source, the Sankore mosque in Timbuktu 'functioned as a university.' Which of the following best contextualizes the historical significance of this claim?", "options": [{"text": "It demonstrates that Islamic scholarship in West Africa was limited to religious topics, confirming that secular learning remained confined to Eurasian centers.", "isCorrect": false, "rationale": "The source explicitly states the Sankore madrasa 'attracted scholars from across the Islamic world and produced a corpus of Arabic-language scholarship in Islamic law, astronomy, medicine, and history' — secular fields as well as religious ones."}, {"text": "It establishes that West Africa was a center of intellectual activity in the Islamic world, with surviving manuscripts in law, astronomy, medicine, and history directly refuting the image of pre-colonial Africa as lacking a written scholarly tradition.", "isCorrect": true, "rationale": "The source uses Timbuktu specifically to 'directly refute' the image of Africa without literate tradition, pointing to 'hundreds of thousands of manuscripts' in multiple scholarly fields that 'many of which survive today.'"}, {"text": "The Sankore university was unique in the medieval world and had no parallels in any other region of Dar al-Islam.", "isCorrect": false, "rationale": "The source describes Timbuktu as 'attracted scholars from across the Islamic world' — it was connected to the broader Islamic scholarly network, not a unique isolated institution; madrasas with similar functions existed in Cairo, Samarkand, and elsewhere."}, {"text": "Timbuktu's intellectual life was entirely dependent on scholars imported from North Africa, with no indigenous West African contribution.", "isCorrect": false, "rationale": "The source describes Timbuktu as producing scholarship, not merely importing it; West African scholars were participants in the intellectual tradition, not just consumers of externally produced knowledge."}]}, {"question": "The source states that Mali's ruling Keita clan 'began from a relatively modest Mande-speaking polity in the upper Niger River valley.' This origin is significant for understanding which feature of African political organization?", "options": [{"text": "It shows that trans-Saharan trade was not important to the formation of West African states, since Mali started in an inland agricultural area.", "isCorrect": false, "rationale": "The upper Niger valley was actually central to the trans-Saharan exchange corridors; Mali's later power derived precisely from its control of that corridor. The modest origin is about lineage-based political scaling, not the absence of trade."}, {"text": "It demonstrates how kinship-based political organization could scale upward from small lineage groups to large empires when a powerful clan accumulated trade wealth, military strength, and subordinate lineages.", "isCorrect": true, "rationale": "The source explicitly describes how 'when a powerful lineage accumulated enough followers, military strength, or trade wealth, it could organize subordinate lineages into larger political units — chiefdoms, kingdoms, and eventually empires' — and identifies the Keita clan's rise as an example of this scaling process."}, {"text": "It proves that the Mali Empire was founded through conquest of Berber North African peoples rather than through the organic growth of Mande-speaking communities.", "isCorrect": false, "rationale": "The source describes Sundiata Keita unifying Mande-speaking peoples and defeating the Sosso king — a West African polity, not Berber North Africans; the empire grew from Mande-speaking communities, not through Berber conquest."}, {"text": "It suggests that Mali's power was primarily cultural and religious rather than political, since a modest origin implies weak political institutions.", "isCorrect": false, "rationale": "The source describes Mali as eventually controlling territory 'roughly comparable to Western Europe' and as having armies, taxation, and patronage — substantial political institutions grown from a modest origin, not a permanently weak political structure."}]}, {"question": "Mansa Musa (r. c. 1312–1337) 'appears on the 1375 Catalan Atlas, depicted enthroned and holding a gold nugget, the first representation of a sub-Saharan African ruler in European cartography.' Based on the source's overall argument, what is the MOST significant implication of this cartographic inclusion?", "options": [{"text": "It proves that European explorers had visited Mali before the formal age of exploration, establishing contact earlier than historians have recognized.", "isCorrect": false, "rationale": "The Catalan Atlas was produced by cartographers drawing on accounts from travelers like Ibn Battuta and merchants, not from direct European visits; the appearance demonstrates Mali's fame reaching Europe via intermediaries, not direct European contact."}, {"text": "Mali's wealth and integration into Dar al-Islam — demonstrated by the 1324 Hajj — were significant enough to register in European geographical awareness, countering the historical erasure of sub-Saharan African states from the Global Tapestry narrative.", "isCorrect": true, "rationale": "The source presents the Catalan Atlas appearance as evidence of Mali's international visibility; within the broader section's argument against the erasure of African complexity, the cartographic inclusion directly demonstrates that Mali's power was recognized across Afro-Eurasia, contradicting narratives of African historical absence."}, {"text": "European cartographers of the fourteenth century were primarily interested in African geography for military conquest purposes.", "isCorrect": false, "rationale": "Fourteenth-century European cartographers mapped known world regions for commercial and geographic knowledge purposes; the Catalan Atlas represented Mediterranean merchants' geographic understanding, not a military conquest planning document."}, {"text": "The Catalan Atlas confirms that Mali had diplomatic relations with the Aragonese crown, which commissioned the map.", "isCorrect": false, "rationale": "The source does not claim Mali had direct diplomatic relations with Aragon; the cartographic appearance reflects knowledge reaching European cartographers via the Islamic world, not a bilateral diplomatic relationship."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
