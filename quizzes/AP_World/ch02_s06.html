    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">

        <a href="../../courses/AP_World.html">&larr; Back to AP World History: Modern</a>

    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP World History: Modern &mdash; The Black Death</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "A historian argues that the Black Death should be understood as a 'Eurasian catastrophe' rather than a primarily European event. Which of the following BEST supports this framing?", "options": [{"text": "The plague had no significant impact outside of Europe because other regions had developed immunity through prior exposure to similar diseases.", "isCorrect": false, "rationale": "The text states that the Middle East, China, and Central Asia suffered comparable or worse mortality than Europe—Egypt lost 40% of its population, and the Yuan dynasty's decline was partly driven by epidemic disease."}, {"text": "The Black Death killed tens of millions in China, Central Asia, the Middle East, and North Africa, with Europe experiencing the same calamity somewhat later, making it a Eurasian event that began in Central Asian rodent reservoirs.", "isCorrect": true, "rationale": "The text explicitly frames the Black Death as 'a Eurasian catastrophe' with origins in Central Asian rodent populations, spread westward via Mongol networks, devastating the Islamic heartland and East Asia before reaching Europe."}, {"text": "European governments were uniquely unprepared for epidemic disease because they lacked the sophisticated medical knowledge available in the Islamic world.", "isCorrect": false, "rationale": "The text does not attribute differential impact to differential medical knowledge; it notes that the Middle East and Egypt suffered comparable or worse mortality, suggesting no medical immunity advantage in the Islamic world."}, {"text": "The Black Death originated in Europe and spread eastward along overland trade routes to devastate Asia.", "isCorrect": false, "rationale": "The text is explicit on directionality: the Black Death originated in Central Asian rodent populations, moved westward via Mongol networks, reached the Black Sea by 1346, and then entered Europe in 1347—east to west, not west to east."}], "id": "q01"}, {"question": "Read the following: The Mongol forces besieging Caffa in 1346 reportedly catapulted plague-infected corpses over the city walls. What is the historical significance of this event?", "options": [{"text": "It marks the first time the Mongols used military force to spread disease, demonstrating a deliberate biological warfare campaign against all of Eurasia.", "isCorrect": false, "rationale": "The text describes this as 'one of history's first documented incidents of biological warfare,' not a campaign against all of Eurasia. Its significance is specific: Genoese merchants fled Caffa carrying the disease to Constantinople and Sicily, providing the transmission vector from the Black Sea to the Mediterranean."}, {"text": "It is one of the first documented uses of biological warfare and explains the mechanism by which plague moved from the Mongol-controlled Black Sea region into the Mediterranean world.", "isCorrect": true, "rationale": "The text identifies the Caffa siege as the event connecting the Central Asian plague reservoir (via Mongol networks reaching Caffa by 1346) to the Mediterranean. Genoese merchants fleeing carried the disease to Constantinople and Sicily in 1347."}, {"text": "The Mongols deliberately engineered the plague as a weapon and were responsible for its initial spread across Central Asia.", "isCorrect": false, "rationale": "The text presents the plague as naturally occurring in Central Asian rodent populations, not engineered by the Mongols. Catapulting corpses at Caffa was opportunistic use of an existing outbreak, not the plague's origin."}, {"text": "It ended the Mongol siege of Caffa because their own army was devastated by the disease they deployed.", "isCorrect": false, "rationale": "The text does not describe the siege ending due to Mongol casualties; the historical focus is on Genoese merchants fleeing and carrying the disease westward—the transmission mechanism into the Mediterranean, not the siege outcome."}], "id": "q02"}, {"question": "European surviving peasants after the Black Death gained unprecedented bargaining power with lords. Which of the following BEST explains the causal mechanism?", "options": [{"text": "The plague killed primarily aristocratic landowners, leaving peasants in control of most land.", "isCorrect": false, "rationale": "The plague killed across social classes; the text does not claim it disproportionately killed aristocrats. The mechanism was labor scarcity—fewer workers meant lords had to compete for scarce survivors with better conditions and wages."}, {"text": "The catastrophic reduction of the labor supply gave surviving workers leverage to demand wages and better conditions, as lords now had to compete for scarce labor.", "isCorrect": true, "rationale": "The text states that 'lords who had previously extracted labor services from serfs under feudal obligation now had to compete for scarce workers with wages and better conditions'—classical supply-and-demand logic applied to labor markets."}, {"text": "Peasant uprisings, inspired by plague preachers who told workers to seize lords' land, redistributed wealth across Europe.", "isCorrect": false, "rationale": "While the English Peasants' Revolt of 1381 is mentioned, the text attributes its cause to lords attempting to reimpose pre-plague obligations—not to plague preachers inspiring uprisings. The primary mechanism was labor market leverage."}, {"text": "International trade disruption reduced lords' income, forcing them to offer better conditions to maintain agricultural production.", "isCorrect": false, "rationale": "While trade was disrupted, the text's explanation for peasant bargaining power is labor scarcity, not lords' reduced trade income. The supply-side shock to the labor market is the causal mechanism."}], "id": "q03"}, {"question": "The text states that 'the same infrastructure that accelerates commercial exchange also accelerates the spread of infectious disease.' Which comparison from within the same textbook BEST supports this claim as a recurring historical pattern?", "options": [{"text": "The monsoon wind system, which created the Indian Ocean trading network but also caused seasonal flooding that spread waterborne diseases across port cities.", "isCorrect": false, "rationale": "While interesting, the text does not present monsoon-driven flooding as a disease vector for the Indian Ocean. The text's own examples of the connectivity-contagion pattern involve overland trade routes (Silk Roads, Mongol network), not monsoon flooding."}, {"text": "The Mongol road network and Yam relay system, which enabled commercial exchange and diplomatic travel but also provided the infrastructure along which Yersinia pestis moved westward from its Central Asian reservoir.", "isCorrect": true, "rationale": "The text explicitly identifies the Mongol infrastructure as simultaneously a 'vehicle for commercial exchange' and a 'vehicle for the most catastrophic pandemic in human history'—the clearest within-unit example of the connectivity-contagion pattern."}, {"text": "The trans-Saharan camel caravan system, which spread smallpox southward into West Africa as a byproduct of the gold–salt trade.", "isCorrect": false, "rationale": "The text does not describe smallpox spreading via trans-Saharan routes; the text's own cross-unit examples of the connectivity-contagion pattern include the Columbian Exchange (Unit 4) and WWI influenza (Unit 7)."}, {"text": "The Swahili Coast trading cities, which imported plague from China via Indian Ocean routes and transmitted it to the African interior.", "isCorrect": false, "rationale": "The text does not describe plague reaching sub-Saharan Africa via the Swahili Coast; the Black Death's trajectory was from Central Asia westward to the Black Sea and Mediterranean, not southward via Indian Ocean routes."}], "id": "q04"}, {"question": "Egypt lost an estimated 40% of its population in the Black Death, and Syria and Iraq were 'similarly devastated.' What does this information challenge in common historical narratives?", "options": [{"text": "The idea that the Islamic world was a more advanced civilization than medieval Europe and therefore more resistant to epidemic disease.", "isCorrect": false, "rationale": "The text does not frame the Islamic world's devastation as a challenge to claims of relative advancement; it challenges the Eurocentric framing of the Black Death as primarily a European catastrophe."}, {"text": "The Eurocentric framing of the Black Death as primarily a European catastrophe, obscuring comparably devastating impacts across the Islamic heartland and East Asia.", "isCorrect": true, "rationale": "The text explicitly states that 'the tendency to frame the Black Death as a European story obscures its devastating impact elsewhere,' citing Egypt, Syria, Iraq, and China as equally or more severely affected."}, {"text": "The view that medieval Islamic governments were more effective at public health management than European feudal lords.", "isCorrect": false, "rationale": "No such comparison appears in the text. The Islamic world's comparable mortality challenges the Eurocentric focus, not a narrative about comparative governance effectiveness."}, {"text": "The claim that the Black Death was primarily a bubonic infection, since pneumonic plague would have been needed to spread so rapidly across the Middle East's warm climate.", "isCorrect": false, "rationale": "The text acknowledges both bubonic and pneumonic forms; it does not argue that the Middle Eastern spread required a different transmission form. The challenge is to Eurocentric framing, not to epidemiological classification."}], "id": "q05"}, {"question": "The English Peasants' Revolt of 1381 was 'partly a consequence of lords' attempts to reimpose pre-plague labor obligations on a workforce that had learned its own market value.' This causal explanation illustrates which historical concept?", "options": [{"text": "Religious motivation — peasants revolted because the plague convinced them that God had abandoned the church.", "isCorrect": false, "rationale": "The text mentions religious crisis as a separate consequence of the plague, but explains the Peasants' Revolt specifically as a labor-market reaction to lords' attempts to reverse post-plague gains—not as primarily religiously motivated."}, {"text": "Economic causation — demographic shock (plague mortality) altered labor market conditions, which produced political conflict when elites tried to reverse the resulting power shift.", "isCorrect": true, "rationale": "The text traces a clear causal chain: mass mortality → labor scarcity → worker leverage → lords attempt to reimpose old obligations → Peasants' Revolt. This is a textbook demonstration of how demographic change drives economic and political transformation."}, {"text": "Cultural diffusion — ideas about workers' rights spread from the Islamic world to England via the Silk Roads.", "isCorrect": false, "rationale": "The text does not connect the Peasants' Revolt to ideas imported via Silk Roads; it explains the revolt through the domestic labor market consequences of plague mortality."}, {"text": "Environmental determinism — the warm climate of England accelerated plague spread, producing uniquely severe depopulation that caused the revolt.", "isCorrect": false, "rationale": "The text does not use England's climate as an explanatory variable; the revolt is explained through economic power shifts resulting from demographic loss, not from climate-driven severity."}], "id": "q06"}, {"question": "Ibn Khaldun wrote in 1377 that civilization had been struck 'as if by a bolt from the sky,' that the East and the West had been depopulated, and that the world had changed. As a primary source, what is most significant about this account?", "options": [{"text": "It proves that the Black Death primarily affected North Africa and can be used to minimize its impact on European civilization.", "isCorrect": false, "rationale": "Ibn Khaldun specifically states both East and West were depopulated—his account explicitly describes a Eurasian catastrophe, not a regionally confined African one."}, {"text": "Written by a major Islamic intellectual who lost his parents to the plague, it offers a non-European perspective confirming the catastrophic and civilization-wide scale of the Black Death—complementing European accounts.", "isCorrect": true, "rationale": "The text presents Ibn Khaldun as evidence that Islamic scholars experienced the plague as civilization-altering; his personal loss (parents) and his role as a major historian make his account a significant non-European primary source for a catastrophe too often framed only through European evidence."}, {"text": "Ibn Khaldun's account is unreliable because he wrote three decades after the initial outbreak and could not have directly observed the plague's effects.", "isCorrect": false, "rationale": "The text does not raise Ibn Khaldun's reliability as an issue; his 1377 writing is thirty years after the initial outbreak but he was alive during recurring waves (1361–1363, 1374). Writing from direct memory and loss is more significant than the temporal distance."}, {"text": "The account demonstrates that the Islamic world was more spiritually resilient than Europe in responding to the plague's challenge to faith.", "isCorrect": false, "rationale": "Ibn Khaldun's account of devastation does not claim spiritual resilience; the text uses his account to document the plague's impact on Islamic civilization, not to compare spiritual responses."}], "id": "q07"}, {"question": "Population in England did not return to pre-plague levels until the sixteenth century, and recovery in the Middle East was even slower. What does this sustained demographic depression suggest about the Black Death's historical impact?", "options": [{"text": "The Black Death was a one-time event whose effects were quickly absorbed by expanding agricultural productivity.", "isCorrect": false, "rationale": "The text explicitly describes the Black Death as returning in successive waves (1361–1363, 1374, and intermittently for three centuries), which prevented population recovery for generations—the opposite of a one-time event with quick recovery."}, {"text": "Successive plague waves prevented population recovery for generations, reshaping land use, labor markets, and political power in ways felt for over a century.", "isCorrect": true, "rationale": "The text states that recurring waves 'prevented population recovery for generations' and that sustained depopulation 'reshaped land use, labor markets, and political power in ways felt for a century after the initial outbreak.'"}, {"text": "Medieval medicine was so ineffective that populations could not survive even ordinary diseases without modern antibiotics.", "isCorrect": false, "rationale": "The text attributes slow recovery to recurrence of the plague specifically, not to general medical ineffectiveness. Medieval populations did recover eventually—the text notes England's recovery in the 16th century."}, {"text": "European population decline was primarily caused by agricultural failure rather than epidemic disease, making the Black Death's demographic role marginal.", "isCorrect": false, "rationale": "The text presents the Black Death as the primary cause of the demographic catastrophe; while famine and other factors existed, the plague's one-third to one-half mortality rate is the driving variable in the text's analysis."}], "id": "q08"}, {"question": "The Ming dynasty (1368–) adopted relative isolation from overland Central Asian trade partly influenced by the memory of a pandemic that had traveled the trade routes. Which historical concept does this response BEST illustrate?", "options": [{"text": "Continuity — the Ming simply maintained the trade policies of the Yuan dynasty they replaced.", "isCorrect": false, "rationale": "The text describes Ming policy as a change from Yuan openness to relative isolation—not continuity of Yuan policy. The Ming's wariness of overland trade was a departure from the Mongol-era commercial openness."}, {"text": "Causation — epidemic disease can produce long-term political and commercial policy changes as governments respond to perceived connectivity risks.", "isCorrect": true, "rationale": "The text traces a causal chain: pandemic traveled via trade routes → Yuan dynasty collapsed partly due to epidemic → Ming dynasty developed wariness of unrestricted overland commercial contact. Disease memory shaped commercial policy."}, {"text": "Contextualization — the Ming's isolation policy was primarily a response to Mongol military threats, not to plague.", "isCorrect": false, "rationale": "The text acknowledges the Ming's isolation was 'not solely a response to plague' but does identify plague memory as an influence. Framing the isolation as primarily military misrepresents the text's nuanced causal argument."}, {"text": "Comparison — Ming commercial policy closely resembled the policies of West African states facing the trans-Saharan trade.", "isCorrect": false, "rationale": "No such comparison is drawn in the text. West African states sought to expand trans-Saharan commercial connections; Ming wariness of overland trade is not analogous."}], "id": "q09"}, {"question": "A student reading the section on the Black Death notes that 'trade disruption' and 'economic recovery' are listed as two different phases of the same event's economic consequences. How can both be true?", "options": [{"text": "They cannot both be true; the economic disruption of plague permanently impoverished all surviving populations in affected regions.", "isCorrect": false, "rationale": "The text explicitly describes both phases: short-term trade disruption as caravans disbanded and ports closed, followed by medium-term per-capita wealth increases among survivors as labor scarcity raised wages."}, {"text": "Short-term plague disrupted trade networks and commercial activity; medium-term, the demographic reduction paradoxically increased per-capita wealth among survivors in some regions as labor scarcity raised wages and living standards.", "isCorrect": true, "rationale": "The text describes exactly this two-phase dynamic: immediate collapse of trade in the late 1340s, followed by medium-term economic recovery where 'the reduction in population paradoxically increased per capita wealth among survivors in some regions.'"}, {"text": "Short-term recovery occurred as European merchants replaced lost population with enslaved African workers; medium-term disruption followed as this trade system collapsed.", "isCorrect": false, "rationale": "This description inverts the sequence and introduces an African enslaved labor explanation not present in the text. The text's mechanism is domestic labor scarcity raising wages, not replacement of population with enslaved workers."}, {"text": "Economic disruption affected only peasants, while economic recovery benefited only lords—so both occurred simultaneously for different social groups.", "isCorrect": false, "rationale": "The text describes peasants and artisan-merchant classes as the primary beneficiaries of post-plague per-capita wealth increases, with lords as the ones facing pressure—the opposite of the distribution this option describes."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
