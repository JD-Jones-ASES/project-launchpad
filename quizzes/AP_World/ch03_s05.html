<body>
<div class="quiz-container">

        <div class="subtitle">AP World History: Modern &mdash; Religion and the State</div>

    <div id="score-box" class="score-box">

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "Martin Luther's 95 Theses (1517) were not the first attack on Church corruption, yet they spread across Europe with unprecedented speed. Which factor BEST explains why Luther's challenge was more successful than earlier reformers?", "options": [{"text": "Luther personally traveled across Europe to distribute his theses, reaching populations that previous reformers had not.", "isCorrect": false, "rationale": "The source credits the printing press, not personal travel, for the rapid spread. Luther's theses 'arrived at a moment when the printing press could spread radical ideas faster than the Church's institutional machinery could suppress them.'"}, {"text": "The printing press allowed Luther's ideas to spread faster than the Church could suppress them, reaching new audiences within weeks.", "isCorrect": true, "rationale": "The source explicitly states: 'This was not the first criticism of Church corruption, but it arrived at a moment when the printing press could spread radical ideas faster than the Church's institutional machinery could suppress them. Within weeks, Luther's theses were circulating across Europe.'"}, {"text": "Luther had the military support of the Holy Roman Emperor, who protected reformers from Church prosecution.", "isCorrect": false, "rationale": "Luther was actually protected by Frederick the Wise, Elector of Saxony — not the Holy Roman Emperor. Charles V (the Emperor) condemned Luther at the Diet of Worms (1521). Imperial protection did not drive the spread."}, {"text": "Luther's attack on indulgences was more moderate than previous reformers, making it harder for the Church to dismiss him as a radical.", "isCorrect": false, "rationale": "Luther's three principles (sola scriptura, sola fide, priesthood of all believers) were radical — challenging clerical mediation entirely. The source attributes spread to technology, not to Luther's moderation."}], "id": "q01"}, {"question": "Luther's three core principles — sola scriptura, sola fide, and the priesthood of all believers — collectively challenged which aspect of the Catholic Church most fundamentally?", "options": [{"text": "The Church's role as the institutional intermediary between believers and God — the necessity of clergy, sacraments, and Church authority for salvation.", "isCorrect": true, "rationale": "All three principles, as described in the source, challenged clerical mediation: scripture alone (not Church interpretation), faith alone (not sacramental works), and the priesthood of all believers (laypeople can read and interpret scripture without clerical mediation). The common target is the institutional Church as obligatory intermediary."}, {"text": "The Church's ownership of land and wealth, which Luther argued should be redistributed to the poor.", "isCorrect": false, "rationale": "The source describes Luther as opposing indulgences on theological grounds (corruption of scripture's faith-emphasis), not as arguing for wealth redistribution. The Peasants' War (which Luther condemned) came closer to that demand."}, {"text": "The Pope's political authority over secular rulers, which Luther argued should be transferred to elected church councils.", "isCorrect": false, "rationale": "While some reformers challenged papal political authority, the source specifically identifies Luther's three principles as theological challenges to salvation doctrine and clerical mediation, not primarily a political argument about conciliarism."}, {"text": "The Church's use of Latin in the Mass, which Luther argued excluded ordinary believers from worship.", "isCorrect": false, "rationale": "Luther's German Bible translation is mentioned as a consequence of his principles, but his three core theological principles targeted clerical authority and salvation doctrine, not the liturgical language per se."}], "id": "q02"}, {"question": "The Peace of Augsburg (1555) established the principle of cuius regio, eius religio. Read this passage: 'This made religion a matter of state sovereignty rather than universal Church authority and prefigured the modern idea of the nation-state as the primary unit of political organization.' Which concept BEST describes the significance the source attributes to this principle?", "options": [{"text": "The principle caused immediate religious uniformity across the Holy Roman Empire by giving princes full control of their subjects' religion.", "isCorrect": false, "rationale": "Cuius regio established that princes chose their territory's religion, but 'uniformity' is misleading — the Empire remained divided between Catholic and Lutheran territories. The Peace also excluded Calvinism, setting up future conflict."}, {"text": "The principle transferred religious authority from the universal Church to the territorial sovereign, prefiguring modern state sovereignty by making confession a political rather than universal religious matter.", "isCorrect": true, "rationale": "The source states: cuius regio 'made religion a matter of state sovereignty rather than universal Church authority and prefigured the modern idea of the nation-state as the primary unit of political organization.'"}, {"text": "The principle established the right of individual subjects to choose their own religion, prefiguring modern religious freedom.", "isCorrect": false, "rationale": "Cuius regio gave the right of religious choice to rulers, not subjects. Subjects were expected to conform to their prince's religion or emigrate. Individual religious freedom as a right came later (and incompletely) through different processes."}, {"text": "The principle ended the Thirty Years' War by granting Calvinists legal protection alongside Lutherans and Catholics.", "isCorrect": false, "rationale": "The Peace of Augsburg (1555) predated the Thirty Years' War (1618–1648). The Peace of Westphalia (1648) ended that war and extended religious coexistence to include Calvinists."}], "id": "q03"}, {"question": "Read the following definition from the source: 'The doctrine that a monarch's authority derives directly from God, not from the consent of subjects or the validation of the Church or nobility. The king is accountable to God alone.' The source then notes that 'analogous concepts of divinely-sanctioned rulership existed' in non-European contexts. What conclusion BEST follows from this observation?", "options": [{"text": "Divine right theory was copied by European monarchs from Islamic and Chinese precedents they encountered through trade.", "isCorrect": false, "rationale": "The source does not claim European monarchs copied non-European models. It argues these concepts developed analogously in different cultural contexts — 'analogous concepts,' not derived ones."}, {"text": "The religious sanctification of monarchical authority was a cross-cultural political strategy, not a uniquely European doctrine — rulers across Afro-Eurasia independently developed the concept that their authority derived from divine sanction.", "isCorrect": true, "rationale": "The source explicitly states: 'It was not uniquely European: analogous concepts of divinely-sanctioned rulership existed in the Ottoman notion of the shadow of God (zill-i-ilahi), the Safavid shah's descent from the Imam, and the Chinese mandate of heaven (Tianming).'"}, {"text": "Divine right theory undermined the Ottoman, Safavid, and Mughal empires more than European monarchies because those empires lacked institutional checks on royal power.", "isCorrect": false, "rationale": "The source does not compare the political effectiveness or instability associated with divine right across these empires. The observation is about analogous concepts, not differential outcomes."}, {"text": "European absolute monarchies were unique in using divine right to suppress religious minorities, since non-European empires relied on tolerance rather than religious coercion.", "isCorrect": false, "rationale": "This is contradicted by the source's extensive coverage of Safavid forced conversion, Aurangzeb's jizya reinstatement, and Louis XIV's revocation of the Edict of Nantes — coercive religious policies existed across all these states."}], "id": "q04"}, {"question": "The Safavid imposition of Shi'a Islam created what the source calls a 'religious-political frontier' with the Ottoman Empire. How was this frontier primarily a STATE-LEVEL contest rather than just a theological dispute?", "options": [{"text": "The Ottoman and Safavid empires organized theological debates between Sunni and Shi'a scholars as a form of diplomatic negotiation over border disputes.", "isCorrect": false, "rationale": "The source does not describe theological debates as diplomatic instruments. The contest was over military loyalty and population allegiance — political and strategic, not primarily scholarly."}, {"text": "The Ottomans and Safavids competed for the allegiance of Muslim populations in Iraq, Azerbaijan, and the Arabian Peninsula — the Shi'a-Sunni divide gave each state a religious argument to claim the loyalty of strategically important populations.", "isCorrect": true, "rationale": "The source states: 'This was not merely a theological dispute... it was a state-level contest over the allegiance of Muslim populations in Iraq, Azerbaijan, and the Arabian Peninsula.' The Ottomans portrayed themselves as defenders of Sunni orthodoxy; the Safavids portrayed Ottomans as usurpers."}, {"text": "The theological dispute was irrelevant to state politics; the Safavid-Ottoman conflict was purely about control of trade routes through Iraq and Mesopotamia.", "isCorrect": false, "rationale": "The source specifically argues the Shi'a-Sunni divide had significant political uses — it was not irrelevant to state politics. Reducing the conflict to trade routes ignores the source's explicit analysis of religion as state-building tool."}, {"text": "The contest was primarily between Safavid Iran and Mughal India, since both claimed descent from the Mongol imperial tradition and competed for Central Asian territory.", "isCorrect": false, "rationale": "The source identifies the primary Shi'a-Sunni frontier as running between the Safavids and the Ottomans, not the Mughals. The Mughal-Safavid relationship is characterized differently."}], "id": "q05"}, {"question": "Louis XIV revoked the Edict of Nantes in 1685, expelling roughly 200,000 Huguenots. The source identifies both his motive and an unintended consequence. Which pairing ACCURATELY reflects both?", "options": [{"text": "Motive: genuine religious conversion to Protestantism. Consequence: Catholic nobles rebelled against Louis's new faith.", "isCorrect": false, "rationale": "Louis XIV was a devout Catholic. He revoked the Edict of Nantes to enforce Catholic uniformity, not to convert to Protestantism."}, {"text": "Motive: enforce religious and political uniformity ('one king, one law, one faith') for easier governance. Consequence: the expelled Huguenots — many skilled artisans and merchants — strengthened rival Protestant economies in England, the Netherlands, and Prussia.", "isCorrect": true, "rationale": "The source states Louis's motive was ideological: 'a kingdom with one king, one law, and one faith... was easier to rule than a religiously divided one.' The consequence: 'roughly 200,000 Huguenots into exile, many of them skilled artisans and merchants who strengthened the economies of Protestant England, the Netherlands, and Prussia.'"}, {"text": "Motive: revenge against the Huguenots for their role in the Thirty Years' War. Consequence: France was excommunicated by the Pope for excessive religious persecution.", "isCorrect": false, "rationale": "The source gives no revenge motive and does not mention excommunication as a consequence. The motive was political uniformity; the consequence was economic damage to France through emigration of skilled workers."}, {"text": "Motive: align France with the Safavid model of a confessional state. Consequence: France was drawn into war with the Ottoman Empire.", "isCorrect": false, "rationale": "The source does not suggest Louis XIV modeled his policy on the Safavid confessional state, nor does it link the revocation to a French-Ottoman conflict."}], "id": "q06"}, {"question": "The source presents six different models of religion-state relations operating in the 1450–1750 period. Which statement BEST reflects the source's analysis of what these models had in common?", "options": [{"text": "All six models represented failed attempts to impose religious uniformity — the long-term trend in world history was toward greater religious tolerance.", "isCorrect": false, "rationale": "The source does not frame these models as failures or as part of a teleological trend toward tolerance. It analyzes them as different answers to the same problem — religion as a political tool — with varying success depending on context."}, {"text": "All six models represented different answers to the same problem: how to use religion to consolidate state power while managing the reality of religious diversity — showing that religion-state fusion was universal, not a European peculiarity.", "isCorrect": true, "rationale": "The source's summary paragraph states: 'Each model represented a different answer to the same problem: how to use religion to consolidate state power while managing the reality of religious diversity.' This is presented as a global phenomenon, not uniquely European."}, {"text": "All six models resulted in violent religious persecution, demonstrating that early modern states were fundamentally intolerant.", "isCorrect": false, "rationale": "The models ranged from the Ottoman millet system's structured tolerance to Safavid forced conversion — violence was not universal across all six. Characterizing all as fundamentally intolerant misses the spectrum the source describes."}, {"text": "All six models were derived from the same Islamic tradition of managing religious minorities through the dhimmi system.", "isCorrect": false, "rationale": "The European cuius regio model and Qing multi-confessional patronage were not derived from Islamic dhimmi tradition. The source presents these as independently developed answers to a common political problem, not as variations on a single template."}], "id": "q07"}, {"question": "Calvinism 'proved particularly compatible with commercially minded, urban populations.' Which explanation BEST connects Calvinist theology to this social group's receptiveness?", "options": [{"text": "Calvin's theology of predestination aligned with merchants' fatalistic worldview, helping them accept business losses as divinely predetermined.", "isCorrect": false, "rationale": "While predestination is mentioned in the source, the source does not make this psychological connection between predestination and merchant risk acceptance. The compatibility described is with republican church governance and urban commercial culture, not fatalism."}, {"text": "Calvinism's republican church governance (no bishops, congregational or presbyterian structures) resonated with commercially minded urban populations accustomed to self-governance and skeptical of hierarchical authority.", "isCorrect": true, "rationale": "The source states Calvinism carried 'a theology of predestination and a republican church governance that proved particularly compatible with commercially minded, urban populations' — emphasizing the governance structure as the connective tissue between Calvinist polity and commercial urban culture."}, {"text": "Calvin explicitly endorsed usury (lending money at interest), making his theology legally compatible with commercial banking — something the Catholic Church prohibited.", "isCorrect": false, "rationale": "Calvin's views on usury are historically relevant but not mentioned in this source. The source's explanation for Calvinist-commercial affinity focuses on church governance and social culture, not banking law."}, {"text": "Calvinism required literacy for congregants to read the Bible, so it spread fastest in commercially prosperous cities where literacy rates were highest.", "isCorrect": false, "rationale": "While literacy and Bible reading were Protestant priorities, the source's specific explanation for Calvinist-commercial compatibility centers on republican church governance, not literacy rates."}], "id": "q08"}, {"question": "Consider this scenario: In 1600, a Shi'a Muslim scholar living in Ottoman Iraq is debating which ruler has greater religious legitimacy. Based on the source, what arguments would the Ottoman sultan and the Safavid shah each make?", "options": [{"text": "The Ottoman sultan would claim legitimacy as caliph and protector of the holy cities of Mecca and Medina, defending Sunni orthodoxy; the Safavid shah would claim near-sacred authority through descent from the seventh Shi'a imam and as protector of Shi'a communities.", "isCorrect": true, "rationale": "The source states: 'The Ottomans, as the custodians of the holy cities of Mecca and Medina (after 1517), portrayed themselves as the defenders of Sunni orthodoxy against Safavid heresy.' The Safavids claimed the shah was 'a near-sacred figure' through 'claimed descent from the seventh Shi'a imam.'"}, {"text": "Both rulers would claim legitimacy through military conquest alone, arguing that God rewards the victorious with authority.", "isCorrect": false, "rationale": "While military success could be read as divine favor, the source specifically identifies the distinct religious legitimacy claims of each ruler — Ottoman Sunni caliphal authority and Safavid Shi'a Imamic descent — not generalized military-conquest theology."}, {"text": "The Ottoman sultan would defer to the Pope as the universal religious authority; the Safavid shah would claim legitimacy from the Mongol imperial tradition.", "isCorrect": false, "rationale": "The Ottoman sultan recognized no papal authority — the Ottoman Empire was an Islamic state. The Safavid shah's claim rested on Shi'a Imamic descent, not Mongol lineage."}, {"text": "Neither ruler would make religious legitimacy claims because the early modern Middle East had separated religious and political authority by 1600.", "isCorrect": false, "rationale": "The entire section argues the opposite: rulers in this period 'did not separate religion from politics. They fused them deliberately.'"}], "id": "q09"}, {"question": "The Peace of Westphalia (1648) is described in the source as having established 'the principle of state sovereignty that became the foundation of the modern international order.' How does this connect to the Reformation's religious consequences?", "options": [{"text": "The Peace of Westphalia ended all religious conflict in Europe by requiring all states to adopt a uniform Protestant Christianity.", "isCorrect": false, "rationale": "The Peace of Westphalia did not impose Protestant uniformity — it extended religious coexistence to include Calvinists alongside Lutherans and Catholics. Religious diversity within the European state system continued."}, {"text": "The religious fragmentation of Christendom produced by the Reformation forced European states to negotiate a system in which sovereign states, rather than universal religious authority, became the basic units of political order — a principle codified at Westphalia.", "isCorrect": true, "rationale": "The source traces this logic: the Reformation's cuius regio principle (1555) made religion a matter of state sovereignty; the Thirty Years' War was partly religious but equally a struggle for territorial power; the Peace of Westphalia (1648) 'established the principle of state sovereignty that became the foundation of the modern international order.'"}, {"text": "The Peace of Westphalia extended the principle of cuius regio to all European territories, giving every individual ruler the right to impose any religion — including Islam — on their subjects.", "isCorrect": false, "rationale": "Westphalia extended coexistence among Christian confessions (Catholic, Lutheran, Calvinist) — it did not extend religious choice to Islam. The framework remained within the Christian confessional spectrum."}, {"text": "The Peace of Westphalia was irrelevant to the development of state sovereignty because sovereignty was already fully established by the Peace of Augsburg in 1555.", "isCorrect": false, "rationale": "The source treats Westphalia as distinct from and extending beyond Augsburg: Augsburg limited choice to Lutheran or Catholic; Westphalia added Calvinism and, more critically, established a broader principle of state sovereignty in the international system."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
