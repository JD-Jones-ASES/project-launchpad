<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP World History: Modern &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_World.html">&larr; Back to AP World History: Modern</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP World History: Modern &mdash; State Expansion in Africa</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "In 1870, European powers controlled approximately 10 percent of the African continent. By 1914, they controlled approximately 90 percent. Which factors best explain this transformation over roughly four decades?", "options": [{"text": "A collapse of African political institutions in the 1860s and African rulers' voluntary invitation of European administration", "isCorrect": false, "rationale": "The text explicitly states Africa in 1870 contained hundreds of distinct political entities with sophisticated military traditions, legal systems, and trade networks — not collapsing states inviting colonizers."}, {"text": "European interstate rivalry, new military technologies including the Maxim gun, and the Berlin Conference's legal framework for claiming territory", "isCorrect": true, "rationale": "The text identifies all three: dangerous competitive rivalry among European states by the early 1880s, the decisive military advantage of the Maxim gun and breech-loading rifles, and the Berlin Conference establishing rules for effective occupation."}, {"text": "African famine and disease made territorial resistance impossible, creating openings for European humanitarian intervention", "isCorrect": false, "rationale": "The text does not frame the Scramble as a humanitarian response to African crisis; it describes state-directed conquest backed by overwhelming military force."}, {"text": "A unified pan-African political decision to integrate into European trade networks in exchange for protection", "isCorrect": false, "rationale": "No pan-African political entity existed; the text describes hundreds of distinct states, many of which resisted conquest. Ethiopia's victory at Adwa is the text's central counter-example to passive acceptance."}], "id": "q01"}, {"question": "Read the following paraphrase of the Berlin Conference's General Act: European powers may claim African territory by notifying other signatories and demonstrating 'effective occupation.' The Congo basin shall be a free-trade zone. The welfare of African peoples shall be considered.\n\nWhich analytical claim does the text most directly support regarding this document?", "options": [{"text": "The welfare language was sincerely intended and partially implemented in the Congo Free State", "isCorrect": false, "rationale": "The text states explicitly that the welfare language 'bore no relationship to what actually happened' — the Congo Free State became one of the most brutal colonial regimes in history."}, {"text": "The conference's welfare language was a humanitarian cover that bore no relationship to actual colonial practice, as demonstrated by the Congo Free State's atrocities", "isCorrect": true, "rationale": "This is the text's 'KEY CONCEPT' box argument: 'the gap between ideological justification (the civilizing mission, welfare language) and material practice (forced labor, mutilation, population decline) is one of the central analytical problems of Unit 6.'"}, {"text": "The conference created a genuine framework for African self-governance within European-supervised trade zones", "isCorrect": false, "rationale": "No African representatives were present; the conference partitioned a continent without African input. The Congo 'Free State' was Leopold's personal extractive enterprise, not a self-governing zone."}, {"text": "The 'effective occupation' requirement primarily benefited African states by setting a high bar for European claims", "isCorrect": false, "rationale": "'Effective occupation' required administrative presence — a threshold European states could meet but that delegitimized African sovereignty by demanding European-style documentation."}], "id": "q02"}, {"question": "King Leopold II of Belgium presented the Congo Free State as a humanitarian and civilizing project. The historical record shows Congolese workers who failed to meet rubber quotas had their hands cut off, and the population declined by an estimated 1–10 million people. What does this case study illustrate about colonialism more broadly?", "options": [{"text": "That Belgian colonialism was uniquely brutal compared to British, French, and German colonial practices, which genuinely implemented the civilizing mission", "isCorrect": false, "rationale": "The text presents the Congo as the 'starkest example' of a pattern that appeared 'across colonial Africa, Asia, and the Pacific' — not as a unique aberration from otherwise humane colonial practice."}, {"text": "The systematic gap between the ideological language of colonialism (humanitarian civilizing mission) and its material practice (forced labor, violence, population collapse)", "isCorrect": true, "rationale": "The text's KEY CONCEPT states: 'the pattern — ideological humanitarianism masking economic extraction by violent means — appears across colonial Africa, Asia, and the Pacific.' The Congo is the 'starkest example,' not an exception."}, {"text": "That private colonial enterprises were more violent than state-administered colonies, because private companies lacked humanitarian oversight", "isCorrect": false, "rationale": "While the Congo Free State was Leopold's personal enterprise, the text generalizes the pattern of ideology-practice gaps to state-administered colonies as well, not only private ones."}, {"text": "That international pressure campaigns were ineffective in changing colonial practices before World War I", "isCorrect": false, "rationale": "The text notes the Congo became an international scandal and that Leopold was forced to transfer it to the Belgian government in 1908 — an example of international pressure producing real change."}], "id": "q03"}, {"question": "At the Battle of Adwa (March 1, 1896), an Ethiopian army of approximately 100,000 soldiers defeated an Italian force of about 17,500 troops. Which factor does the text most directly credit for Ethiopia's success?", "options": [{"text": "Ethiopia's large population and geographic advantage made European conquest physically impossible", "isCorrect": false, "rationale": "The text does not argue population or geography alone were decisive; it specifically credits modern rifles purchased from France and Russia and the political unity of Menelik II's command."}, {"text": "Italy's military was technologically inferior to other European colonial powers, making defeat in Africa unsurprising", "isCorrect": false, "rationale": "The text does not suggest Italian military inferiority was the key variable; it emphasizes Ethiopian military strength, unity, and modern weapons as the decisive factors."}, {"text": "Ethiopia under Emperor Menelik II had acquired modern rifles and maintained unified military command, negating the technological advantage that enabled European success elsewhere", "isCorrect": true, "rationale": "The text states the Ethiopian army was 'armed with modern rifles purchased from France and Russia' and argues the battle 'exposes the contingency of imperial conquest' — European success depended on specific technological and political advantages that Ethiopia neutralized."}, {"text": "European powers chose not to reinforce Italy at Adwa because of the Berlin Conference's non-interference clauses", "isCorrect": false, "rationale": "The text mentions no such clause or non-reinforcement decision; the Treaty of Addis Ababa, which Italy was forced to sign, is the diplomatic outcome the text discusses."}], "id": "q04"}, {"question": "The text states that the borders drawn at the Berlin Conference 'cut across ethnic groups, trade networks, and ecological zones' and became the political borders of post-colonial Africa. What does this observation suggest about the long-term consequences of the Scramble for Africa?", "options": [{"text": "Post-colonial African states were well-positioned for stability because the borders reflected natural geographic features", "isCorrect": false, "rationale": "The text argues the opposite: borders drawn along 'geometric lines' without regard for existing human or ecological patterns created conditions for 'conflict and governance that persist today.'"}, {"text": "The Berlin Conference's borders created structural conditions for political conflict and governance challenges in post-colonial Africa by ignoring pre-existing human and ecological geography", "isCorrect": true, "rationale": "The text explicitly states the geometric borders became post-colonial political boundaries 'with consequences for conflict and governance that persist today' — a direct argument for long-term structural harm."}, {"text": "African ethnic groups were too fragmented before 1880 to have meaningful territorial identities, so Berlin's borders had no significant human costs", "isCorrect": false, "rationale": "The text describes hundreds of distinct African political entities with trade networks, legal systems, and diplomatic practices — pre-existing territorial identities were sophisticated, not absent."}, {"text": "European negotiators at Berlin intended to minimize conflict by creating ethnically homogeneous colonial units", "isCorrect": false, "rationale": "The text makes no such claim; borders were drawn based on European state interests and competition, not African ethnic or social geography."}], "id": "q05"}, {"question": "Which description of pre-colonial Africa in 1870 most accurately reflects the text's argument?", "options": [{"text": "A continent of isolated, pre-political tribal societies without trade networks or legal systems", "isCorrect": false, "rationale": "This directly contradicts the text, which states Africa contained 'hundreds of distinct political entities' including the Zulu kingdom, Sokoto Caliphate, Ethiopian empire, and Egyptian Khedivate — all with sophisticated institutions."}, {"text": "A continent with hundreds of distinct political entities, including kingdoms, empires, and caliphates, with sophisticated military traditions, trade networks, and legal systems", "isCorrect": true, "rationale": "The text explicitly makes this argument and names specific states (Zulu kingdom, Sokoto Caliphate, Ethiopian empire, Egyptian Khedivate) to establish that colonizers 'were not entering political vacuums — they were destroying functioning states.'"}, {"text": "A continent politically unified under the Egyptian Khedivate's leadership, which negotiated with European powers on behalf of all Africans", "isCorrect": false, "rationale": "The text describes hundreds of distinct political entities, not a unified continent; Egypt was one entity among many, not a continental authority."}, {"text": "A continent where European influence was already overwhelming by 1870, making the Scramble an extension of existing arrangements", "isCorrect": false, "rationale": "The text states Europeans controlled roughly 10 percent of Africa in 1870 — mostly coastal enclaves. The Scramble was a rupture from existing arrangements, not their extension."}], "id": "q06"}, {"question": "E. D. Morel and Roger Casement documented the atrocities of the Congo Free State, prompting international pressure that forced Leopold to transfer control to the Belgian government in 1908. The text describes this as 'one of the first modern human-rights movements.' What does this characterization suggest?", "options": [{"text": "Human-rights advocacy originated in colonial Africa and spread from there to Europe", "isCorrect": false, "rationale": "The text does not make this geographic claim about origins; it characterizes the anti-Leopold campaign as significant for the history of human-rights advocacy without specifying a geographic origin."}, {"text": "Transnational advocacy campaigns using documented evidence of atrocities to pressure states represent an early form of modern human-rights practice", "isCorrect": true, "rationale": "The text identifies the Casement–Morel campaign as significant precisely because it combined documentation, journalism, and international pressure — the toolkit of modern human-rights advocacy — to produce a political outcome (Leopold's forced transfer)."}, {"text": "The Belgian government proactively intervened in the Congo before Casement and Morel's documentation because of its own humanitarian commitments", "isCorrect": false, "rationale": "The text states Belgium assumed control in 1908 after the international scandal — as a result of external pressure, not proactive domestic initiative."}, {"text": "The international pressure campaign proved that colonial atrocities would always be stopped quickly once documented", "isCorrect": false, "rationale": "The Congo abuses lasted from 1885 to 1908 — 23 years — before pressure produced change. The text presents this as a significant outcome, not evidence that documentation guarantees rapid response."}], "id": "q07"}, {"question": "The concept of terra nullius held that land without European-style property documentation was legally 'empty' and available for seizure. How did this concept function in the Scramble for Africa?", "options": [{"text": "It was a neutral legal principle that applied equally to all nations, including African states wishing to claim disputed territory", "isCorrect": false, "rationale": "Terra nullius was applied by Europeans to African territory, not as a neutral principle available to African states. It operated to delegitimize African sovereignty, not to protect it."}, {"text": "It was a legal fiction that erased African political sovereignty by defining legitimate ownership in European terms that most African political systems did not use", "isCorrect": true, "rationale": "The text describes terra nullius as 'the legal fiction that land without European-style property documentation was unoccupied — to delegitimize African sovereignty' — explicitly using it as a mechanism of erasure rather than neutral legal principle."}, {"text": "It was widely rejected at the Berlin Conference, which instead required acknowledgment of existing African sovereignty before claiming territory", "isCorrect": false, "rationale": "The Berlin Conference's 'effective occupation' requirement demanded European administrative presence, not recognition of African sovereignty. Terra nullius logic underpinned the conference's framework."}, {"text": "African rulers used terra nullius claims to reclaim European trading posts along the coast", "isCorrect": false, "rationale": "Terra nullius was used by European colonizers against African states, not the reverse. The text presents it as a tool of dispossession, not reclamation."}], "id": "q08"}, {"question": "The Sokoto Caliphate, the Zulu kingdom, and the Ethiopian Empire are all mentioned in the text's description of Africa in 1870. What is the text's analytical purpose in naming these specific states?", "options": [{"text": "To demonstrate that African states were already in decline before European conquest and were therefore unable to resist", "isCorrect": false, "rationale": "The text argues the opposite — these are named as evidence of Africa's sophisticated political world before conquest, precisely to counter the idea that Europeans were filling vacuums."}, {"text": "To establish that pre-colonial Africa contained sophisticated, functioning political entities, making European conquest an act of destruction rather than the filling of a political vacuum", "isCorrect": true, "rationale": "The text explicitly names these states to argue 'European imperialism did not arrive on an empty continent' and that conquering forces 'were not entering political vacuums — they were destroying functioning states.'"}, {"text": "To compare three African states that cooperated with European powers to three that resisted, showing the range of African responses", "isCorrect": false, "rationale": "The text names these states in the context of establishing pre-colonial political sophistication, not to compare cooperative vs. resistant strategies."}, {"text": "To argue that only states with Islamic governance structures (like the Sokoto Caliphate) could maintain independence against European pressure", "isCorrect": false, "rationale": "The text does not make an argument about Islamic governance as a factor in resistance; it names the Sokoto Caliphate alongside the Zulu kingdom and Ethiopian empire to show political diversity, not to privilege one governance model."}], "id": "q09"}, {"question": "The text argues that the Battle of Adwa (1896) 'exposes the contingency of imperial conquest.' What does this phrase mean in historical analysis?", "options": [{"text": "European conquest of Africa was historically inevitable given industrial-era technological advantages", "isCorrect": false, "rationale": "Contingency means the opposite of inevitability — the text uses Adwa to argue that conquest was NOT inevitable, but depended on specific conditions that could be and were overcome."}, {"text": "Colonial conquest depended on specific technological, political, and organizational factors that were not always present — meaning different outcomes were possible under different conditions", "isCorrect": true, "rationale": "The text states: 'Adwa also exposes the contingency of imperial conquest. European success elsewhere depended on specific technological advantages...on African political fragmentation...and on the absence of unified resistance. When Africans had access to modern weapons and unified command...the outcome was different.'"}, {"text": "Italy's defeat at Adwa was an isolated accident caused by poor Italian generalship rather than Ethiopian military capability", "isCorrect": false, "rationale": "The text frames Adwa as analytically significant, not as an accident — it 'exposes contingency' precisely because it reveals the conditions under which European conquest could be defeated."}, {"text": "Ethiopia's victory showed that colonial conquest always fails when faced with sufficiently large armies", "isCorrect": false, "rationale": "The text points to multiple factors — modern rifles, unified command, strategic advantage — not simply army size. The 100,000-to-17,500 numerical advantage is mentioned, but the analytical point is about access to modern weapons and political unity."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
