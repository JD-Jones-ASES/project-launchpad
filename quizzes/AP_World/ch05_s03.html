    };

<body>
<div class="quiz-container">

        <h1>QUIZ</h1>
        <div class="subtitle">AP World History: Modern &mdash; The French Revolution</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "France's fiscal crisis in the 1780s was structurally rooted in the Estates-General system primarily because", "options": [{"text": "The Third Estate refused to pay any taxes as a form of political protest against the monarchy", "isCorrect": false, "rationale": "The Third Estate did not refuse taxes as political protest; the structural problem was that the First and Second Estates paid little or no direct taxes, leaving the fiscal burden entirely on the Third Estate."}, {"text": "The First and Second Estates paid little or no direct taxes, leaving the fiscal burden on the Third Estate — nearly 97% of the population", "isCorrect": true, "rationale": "The source explains that structural inequality meant the clergy and nobility paid little or no direct taxes, so the fiscal burden of France's war debts fell on the Third Estate — peasants, artisans, workers, and the bourgeoisie."}, {"text": "The Estates-General had been dissolved by Louis XVI and could not authorize new taxes", "isCorrect": false, "rationale": "The Estates-General had not been dissolved; it simply had not met since 1614. Louis XVI convened it in 1789 precisely to approve new taxes."}, {"text": "France had lost its colonial revenues after the Seven Years' War and could not generate alternative income", "isCorrect": false, "rationale": "France did not lose its colonial revenues after the Seven Years' War; it still held Saint-Domingue and other colonies. The fiscal crisis arose from the costs of the war and of supporting the American Revolution."}]}, {"question": "The Tennis Court Oath (June 20, 1789) was a revolutionary act, not merely a political dispute, because the Third Estate", "options": [{"text": "Declared war on Austria and Prussia in the name of the French people", "isCorrect": false, "rationale": "The declaration of war against Austria and Prussia came in 1792, not at the Tennis Court Oath. The Oath was a domestic constitutional act."}, {"text": "Reconstituted itself as a National Assembly and swore to remain in session until France had a written constitution, asserting sovereignty independently of the king", "isCorrect": true, "rationale": "The source identifies the Tennis Court Oath as transforming a fiscal dispute into a constitutional revolution — the Third Estate claimed the authority to give France a constitution, asserting popular sovereignty against royal authority."}, {"text": "Stormed the Bastille fortress, releasing political prisoners and seizing arms for the revolutionary cause", "isCorrect": false, "rationale": "The storming of the Bastille occurred on July 14, 1789 — nearly a month after the Tennis Court Oath. These were distinct events in the Revolution's early phase."}, {"text": "Voted to abolish feudal privileges and adopt the Declaration of the Rights of Man and of the Citizen", "isCorrect": false, "rationale": "The abolition of feudal privileges and the Declaration of the Rights of Man occurred in August 1789, in the aftermath of the Bastille's fall — not at the Tennis Court Oath in June."}]}, {"question": "Read the following: 'The guillotine — a device promoted as humane and egalitarian (it killed aristocrats and commoners the same way) — became the symbol of a revolution devouring itself.' This description of the Reign of Terror BEST illustrates which broader historical pattern?", "options": [{"text": "The inevitability of foreign invasion ending revolutionary governments before they can consolidate power", "isCorrect": false, "rationale": "While foreign invasion was a context for the Terror, the source's key insight is about internal contradiction — a movement for liberty producing mass violence — not the military inevitability of foreign intervention."}, {"text": "Enlightenment ideals, when translated into political power under existential pressure, could produce outcomes their authors had not intended and could not control", "isCorrect": true, "rationale": "The source explicitly states this: the 'paradox of revolutionary violence' shows that Enlightenment ideals under the pressure of foreign invasion and internal rebellion produced the Terror — outcomes neither Locke nor Rousseau had envisioned."}, {"text": "Revolutionary governments always fall when their leaders are executed by foreign-backed conspirators", "isCorrect": false, "rationale": "Robespierre was arrested and executed by other French revolutionaries in 'Thermidor' — not by foreign-backed conspirators. The fall of the Terror was an internal revolutionary process."}, {"text": "The middle class inevitably abandons revolution once it achieves basic political rights, leaving the poor without leadership", "isCorrect": false, "rationale": "The sans-culottes — the urban working class — actually drove the Terror's most radical phase from below. The bourgeoisie's role was more complex; this oversimplification misrepresents the social dynamics."}]}, {"question": "The sans-culottes were politically significant to the French Revolution primarily because they", "options": [{"text": "Provided the military leadership that defeated the Austrian and Prussian armies at the borders of France", "isCorrect": false, "rationale": "The sans-culottes were artisans, shopkeepers, and wage laborers in Paris — urban workers, not the military commanders who led the armies against Austria and Prussia."}, {"text": "Pressured the Committee of Public Safety to adopt increasingly radical policies, driving the Terror from below", "isCorrect": true, "rationale": "The source states that the sans-culottes' pressure from below forced the Committee of Public Safety to adopt increasingly radical policies during the Terror. Their demands for price controls, popular democracy, and anti-counter-revolutionary action fueled radicalization."}, {"text": "Drafted the Declaration of the Rights of Man and of the Citizen in August 1789", "isCorrect": false, "rationale": "The Declaration of the Rights of Man was drafted by the National Assembly — dominated by bourgeois representatives — not by the sans-culottes working class."}, {"text": "Led the Flight to Varennes, attempting to restore the constitutional monarchy by removing Louis XVI from Paris", "isCorrect": false, "rationale": "The 'Flight to Varennes' was Louis XVI's attempted escape from France — an attempt by the king to flee, not an action by the sans-culottes."}]}, {"question": "Napoleon Bonaparte's relationship to the French Revolution is best described as", "options": [{"text": "A complete repudiation of the Revolution — he restored the monarchy, the aristocracy, and the Church to their pre-1789 positions", "isCorrect": false, "rationale": "Napoleon did not restore the Old Regime. He preserved the Revolution's legal and administrative achievements (Code Napoléon) while becoming an autocrat — making him simultaneously heir and betrayer of the Revolution."}, {"text": "Simultaneously its heir and its betrayer — preserving legal equality while abolishing political freedom and reversing the abolition of slavery", "isCorrect": true, "rationale": "The source states Napoleon was 'simultaneously the heir and the betrayer of the French Revolution' — he preserved legal equality through the Code Napoléon but abolished press freedom and, most significantly, reversed the 1794 abolition of slavery in 1802."}, {"text": "A purely military dictator with no connection to Enlightenment ideas who rose to power by military force alone", "isCorrect": false, "rationale": "Napoleon's legal reforms (Code Napoléon) directly encoded Enlightenment principles of legal equality and property rights — demonstrating genuine connection to revolutionary ideology."}, {"text": "A democratic reformer who extended the Revolution's gains by establishing universal male suffrage across Europe", "isCorrect": false, "rationale": "Napoleon was an autocrat who abolished press freedom and political participation. While he spread some revolutionary principles through conquest, he did not establish democratic institutions across Europe."}]}, {"question": "The Code Napoléon (1804) was historically significant because it", "options": [{"text": "Restored the hereditary privileges of the French nobility that the Revolution had abolished in 1789", "isCorrect": false, "rationale": "The Code Napoléon abolished hereditary distinctions in law and codified legal equality — it did not restore noble privileges."}, {"text": "Codified Enlightenment principles of legal equality and abolished feudal distinctions, becoming the model for legal systems across Europe and Latin America", "isCorrect": true, "rationale": "The source states the Code synthesized Enlightenment principles of legal equality, individual property rights, and abolition of feudal privileges — and that the legal systems of France, Louisiana, Quebec, Spain, Portugal, and most of Latin America are ultimately rooted in it."}, {"text": "Established universal suffrage for all male citizens in France and Napoleon's allied states", "isCorrect": false, "rationale": "The Code Napoléon was a civil law code, not an electoral or suffrage law. It addressed legal equality, property, and contracts — not voting rights."}, {"text": "Recognized the Catholic Church as the supreme authority over marriage, inheritance, and civil law in France", "isCorrect": false, "rationale": "The Code Napoléon standardized secular civil law and made contracts enforceable under state authority — it did not grant the Church supremacy over civil matters."}]}, {"question": "Napoleon's decision to reverse France's 1794 abolition of slavery in 1802 had which direct consequence for the Atlantic world?", "options": [{"text": "It caused Britain to abandon abolitionist legislation that Parliament had been considering", "isCorrect": false, "rationale": "The source does not connect Napoleon's decision to British abolitionist legislation. Britain's abolition of the slave trade came in 1807 — on its own political trajectory."}, {"text": "It directly precipitated the Haitian Revolution's final, successful phase by radicalizing Haitian forces fighting for total independence and permanent abolition", "isCorrect": true, "rationale": "The source states that Napoleon's 1802 reversal of abolition 'directly precipitated the Haitian Revolution's final, successful phase' — transforming the struggle from autonomy within a French empire to total independence and permanent abolition."}, {"text": "It led Spain to abolish slavery in its American colonies to distinguish itself from French policy", "isCorrect": false, "rationale": "Spain did not abolish slavery in its American colonies in response to Napoleon's reversal. Spain's colonies continued slavery; Latin American independence movements did not uniformly abolish it either."}, {"text": "It caused the Louisiana Territory purchase to collapse because American slaveholders refused to accept French administration nearby", "isCorrect": false, "rationale": "Napoleon sold Louisiana because he recognized he could not maintain a Caribbean empire without Saint-Domingue's slave-produced wealth, after the Haitian Revolution — not because of American slaveholder objections to French administration."}]}, {"question": "The Declaration of the Rights of Man and of the Citizen (August 1789) resonated 'far beyond France's borders' primarily because", "options": [{"text": "Napoleon's armies spread it as a document justifying French imperial expansion across Europe", "isCorrect": false, "rationale": "Napoleon came to power a decade after the Declaration. The document's resonance came from its universalist language, not Napoleon's later military campaigns."}, {"text": "Its universalist language proclaiming natural rights to liberty, property, security, and resistance to oppression could be claimed by people across the Atlantic world", "isCorrect": true, "rationale": "The source states the Declaration's 'universalist language resonated far beyond France's borders — it was read in Haiti, translated into dozens of languages, and cited by revolutionaries for decades.' Its appeal was its universalist claim."}, {"text": "France had military alliances with every major Atlantic power that required them to adopt similar declarations", "isCorrect": false, "rationale": "France was at war with major European powers after 1792 — it did not have alliances requiring adoption of revolutionary declarations. The document spread through ideas, not military alliances."}, {"text": "The document was the first in history to explicitly abolish slavery and grant rights to all people regardless of race", "isCorrect": false, "rationale": "The Declaration of the Rights of Man did not abolish slavery. France's initial abolition of slavery came in 1794 — and was reversed by Napoleon in 1802. The document's universalist language was applied to enslaved people by Haitian rebels, not by its French authors."}]}, {"question": "A student compares the French and American revolutions and concludes: 'The French Revolution was more radical than the American because it attacked the existing social order directly.' Which evidence BEST supports this claim?", "options": [{"text": "Both revolutions produced written constitutions that protected individual rights, showing equivalent radicalism", "isCorrect": false, "rationale": "This would undermine rather than support the claim about the French Revolution being more radical, by suggesting they were equivalent."}, {"text": "The French Revolution abolished feudal privileges, executed the king, and eventually abolished slavery (1794), while the American Revolution left its social hierarchies largely intact", "isCorrect": true, "rationale": "The source explains that the French Revolution 'erupted within France itself, pitting the majority of the population against the monarchy, aristocracy, and Church simultaneously' — abolishing feudal privileges, executing Louis XVI, and (temporarily) abolishing slavery, none of which the American Revolution did."}, {"text": "The French Revolution was led by the same kind of property-owning elites as the American, but they were more violent in their methods", "isCorrect": false, "rationale": "This misses the point of the comparison. The French Revolution's greater radicalism lay in attacking the social structure (feudalism, monarchy, aristocracy, eventually slavery), not merely in more violent methods."}, {"text": "The American Revolution failed to produce a written constitution, while the French Revolution succeeded in this goal immediately", "isCorrect": false, "rationale": "This is factually incorrect. The American Revolution did produce a written constitution (1787). Both revolutions produced constitutional documents."}]}, {"question": "The Reign of Terror (1793–1794) was triggered by which combination of factors?", "options": [{"text": "The execution of Louis XVI, which caused Austria and Prussia to invade France for the first time", "isCorrect": false, "rationale": "The war with Austria and Prussia began in 1792, before the king's execution in January 1793. The Terror's context was existing foreign invasion combined with internal counter-revolutionary rebellion."}, {"text": "The threat of foreign invasion combined with counter-revolutionary rebellion at home, pushing the Committee of Public Safety to adopt emergency measures", "isCorrect": true, "rationale": "The source identifies the threat of foreign invasion (Austria, Prussia) and internal counter-revolutionary rebellion (the Vendée uprising) as the conditions that pushed the revolutionary government toward the Committee of Public Safety's emergency measures — the Terror."}, {"text": "Robespierre's personal ambition to become emperor, using the Terror to eliminate all political rivals", "isCorrect": false, "rationale": "The source does not attribute the Terror to personal ambition; it arose from the structural pressures of foreign invasion and internal rebellion. Robespierre himself was eventually executed by fellow revolutionaries ('Thermidor')."}, {"text": "The sans-culottes' demand for a return to monarchy, which the Jacobins suppressed through revolutionary tribunals", "isCorrect": false, "rationale": "The sans-culottes were radical republicans, not monarchists. They pressured the Committee toward more radical policies, including price controls and popular democracy — not a restoration of the monarchy."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
