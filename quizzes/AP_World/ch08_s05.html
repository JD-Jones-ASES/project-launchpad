<body>
<div class="quiz-container">

        <div class="subtitle">AP World History: Modern &mdash; Nation-Building and the End of Apartheid</div>

    <div id="score-box" class="score-box">

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "In 1964, the Organization of African Unity (OAU) endorsed the principle of uti possidetis — maintaining colonial-era borders at independence. A historian argues this decision was both a reasonable choice under the circumstances and a deeply costly one. Which assessment best captures the source's analysis?", "options": [{"text": "The decision was entirely reasonable: colonial borders reflected centuries of African cultural development and provided a stable foundation for new states", "isCorrect": false, "rationale": "The source explicitly states colonial borders were 'drawn by European powers at the Berlin Conference of 1884–85 with no regard for African peoples' self-organization.' They did not reflect African cultural development — the source presents them as an external imposition."}, {"text": "The decision prevented immediate territorial conflicts between new states, but its cost was that many states contained multiple ethnic groups with no historical relationship, while some ethnic groups were split across two or more states", "isCorrect": true, "rationale": "The source directly states the OAU endorsed uti possidetis to prevent immediate territorial chaos, but its consequences were profound: 'many new states contained multiple ethnic or religious groups that had no historical relationship, that some ethnic groups were split across two or more states, and that traditional political units bore no relationship to the new administrative territories.'"}, {"text": "The decision was entirely correct because ethnic boundaries could not provide a stable basis for statehood in Africa's diverse societies", "isCorrect": false, "rationale": "The source does not endorse uti possidetis as entirely correct. It presents it as a decision with 'profound consequences' — a neutral assessment that acknowledges the reasoning without endorsing it as the only or best choice."}, {"text": "The decision was made under Soviet pressure, since the Soviet Union wanted to maintain colonial borders to prevent African unity", "isCorrect": false, "rationale": "The source makes no claim that the OAU's uti possidetis decision was made under Soviet pressure. It was a decision by African states themselves — reflecting the practical difficulty of reorganizing all boundaries while simultaneously building states."}]}, {"question": "Examine the following description: 'Every South African was legally classified by race, and this classification determined where one could live, work, attend school, marry, and participate in politics. Black South Africans were denied citizenship in their own country and confined to Bantustans representing 13% of the land for 80% of the population.' This description most directly characterizes:", "options": [{"text": "The Mau Mau emergency regulations in colonial Kenya", "isCorrect": false, "rationale": "The Mau Mau emergency involved mass detention and collective punishment but not a comprehensive racial classification system organizing all aspects of society. The description of Bantustans (13% of land for 80% of population), racial marriage laws, and denial of citizenship specifically describes South African apartheid."}, {"text": "The apartheid system in South Africa (1948–1994)", "isCorrect": true, "rationale": "This description matches the source's definition of apartheid precisely: 'every South African was legally classified by race,' pass laws, the Bantustans policy (13% of land for 80% of the population), denial of citizenship. The UN declared apartheid a crime against humanity in 1973."}, {"text": "Jim Crow segregation in the American South after 1865", "isCorrect": false, "rationale": "While Jim Crow shared characteristics (racial segregation, political disenfranchisement), the specific description of Bantustans, South African pass laws, and total racial classification of citizenship describes South Africa under apartheid, not the American South."}, {"text": "French colonial administration in Algeria before 1954", "isCorrect": false, "rationale": "French Algeria involved political underrepresentation of Algerians but not a comprehensive system of racial citizenship classification and Bantustans confining 80% of the population to 13% of the land. The description matches apartheid South Africa specifically."}]}, {"question": "Nelson Mandela refused a conditional release from prison in 1985 when the South African government offered freedom if he would publicly renounce violence. His refusal most directly illustrates which principle?", "options": [{"text": "That Mandela was committed to violent armed struggle and believed only military victory could end apartheid", "isCorrect": false, "rationale": "The source presents Mandela's refusal of the conditional release not as a commitment to violence but as a principled refusal to accept personal freedom on terms that required abandoning the political struggle. He later negotiated the peaceful transition to democracy — his post-release actions demonstrate commitment to negotiated change, not military victory."}, {"text": "That Mandela refused to accept personal freedom on terms that would compromise the collective liberation of his people — freedom for one person was meaningless without freedom for all", "isCorrect": true, "rationale": "The source quotes Mandela stating 'he could not make such a commitment while his people remained unfree.' This directly expresses the principle: personal freedom divorced from collective liberation was not freedom at all. The refusal illustrates a Gandhi-like insistence on the inseparability of individual and collective liberation."}, {"text": "That Mandela refused because the ANC's alliance with the South African Communist Party required him to maintain armed struggle regardless of personal cost", "isCorrect": false, "rationale": "The source does not attribute Mandela's refusal to the Communist Party alliance. It quotes his stated reason — his people remained unfree — as the basis for refusal. Attributing it to Communist Party discipline misrepresents the source."}, {"text": "That Mandela's imprisonment had hardened his views toward violence, making peaceful negotiation impossible until F. W. de Klerk's release in 1990", "isCorrect": false, "rationale": "The source describes Mandela as someone who 'negotiated the transition to multi-racial democracy' after his release — suggesting his commitment was to negotiated change, not hardened violence. The source does not suggest imprisonment radicalized him toward violence."}]}, {"question": "The source argues that 'the end of the Cold War (1989–91) fundamentally altered the apartheid government's position.' Which mechanism best explains this connection?", "options": [{"text": "The Soviet Union's collapse eliminated its military support for the ANC, forcing the ANC to negotiate rather than fight", "isCorrect": false, "rationale": "This gets the causal direction wrong. The end of the Cold War hurt the apartheid government, not the ANC. When the Soviet Union collapsed and Cuba withdrew from Angola, the apartheid government lost its key argument — that the ANC was a Communist organization whose victory would mean Soviet expansion into Africa."}, {"text": "When the Soviet Union collapsed, the apartheid government's argument that the ANC was a Soviet-backed Communist organization evaporated, removing the Cold War shield that had sustained Western tolerance of apartheid", "isCorrect": true, "rationale": "The source states this explicitly: 'The Cold War had given the National Party government its most important argument: that the ANC was a Communist organization and that supporting it meant supporting Soviet expansion into Africa. When the Soviet Union collapsed and Cuba withdrew from Angola, this argument evaporated.' De Klerk released Mandela and began negotiations."}, {"text": "The United States imposed economic sanctions on South Africa immediately after the Soviet Union's collapse, forcing de Klerk to negotiate", "isCorrect": false, "rationale": "The Comprehensive Anti-Apartheid Act imposing sanctions was passed in 1986 — years before the Soviet collapse. Sanctions were part of the sustained external pressure that preceded the end of apartheid. The source does not attribute de Klerk's 1990 decision specifically to new American sanctions."}, {"text": "The end of the Cold War triggered a global wave of democratization that made it politically impossible for South Africa to maintain minority rule", "isCorrect": false, "rationale": "While the end of the Cold War was associated with democratization in Eastern Europe, the source's explanation of South Africa's transition focuses specifically on the removal of the ANC's Communist-threat argument, not on a generalized democratization wave. The source gives a more specific causal mechanism."}]}, {"question": "The Congo's independence from Belgium in June 1960 was 'followed almost immediately by political chaos: the army mutinied, Katanga province attempted secession with Belgian corporate and government backing, the elected Prime Minister Patrice Lumumba was deposed and assassinated with CIA and Belgian involvement.' This sequence best illustrates which challenge of nation-building?", "options": [{"text": "The difficulty of establishing democratic institutions in societies with no prior experience of self-government", "isCorrect": false, "rationale": "While this is a real challenge of nation-building, the source's analysis focuses specifically on external interference (Belgian corporate/government backing for Katanga secession; CIA involvement in Lumumba's assassination) and the colonial inheritance (weak state structures) — not solely on a lack of democratic tradition."}, {"text": "The combination of a fragile colonial inheritance, ethnic/regional divisions created by colonial rule, and Cold War superpower interference that prevented newly independent states from stabilizing", "isCorrect": true, "rationale": "The source's analysis of the Congo's crisis covers all three elements: the colonial inheritance (army mutiny, weak state), provincial fragmentation with Belgian corporate backing (Katanga), and CIA/superpower involvement in Lumumba's assassination. The source then states: 'across Sub-Saharan Africa, Cold War superpower backing of competing factions — often based on ideological alignment rather than governance competence — prevented many states from stabilizing.'"}, {"text": "Lumumba's assassination demonstrates that Cold War intervention was uniformly caused by Soviet-aligned African leaders provoking Western responses", "isCorrect": false, "rationale": "Lumumba was the elected prime minister of the newly independent Congo — his assassination involved CIA and Belgian intervention against an African leader, not a case of Soviet-aligned African leaders provoking Western defense. Framing it as 'Soviet-aligned leaders provoking Western responses' inverts the source's presentation."}, {"text": "The Congo's crisis proves that African independence movements were premature and that colonial administration was necessary for stability", "isCorrect": false, "rationale": "The source's framing is the opposite: the Congo's crisis resulted from the colonial inheritance (borders drawn by Europeans with no regard for African organization) and external interference — not from African peoples being unready for independence. This response reflects the kind of colonial apologetic reasoning the AP framework explicitly counters."}]}, {"question": "The Soweto Uprising of June 16, 1976 — in which police killed hundreds of students protesting the imposition of Afrikaans as the language of instruction in Black schools — brought 'a new generation into political activism.' This event best illustrates which theme?", "options": [{"text": "Economic — the Soweto Uprising was triggered by economic grievances about unemployment among Black youth", "isCorrect": false, "rationale": "The source explicitly identifies the trigger as 'the imposition of Afrikaans as the language of instruction in Black schools' — a cultural and political issue, not an economic one. While economic grievances existed, the source's causal account of Soweto centers on language-of-instruction policy."}, {"text": "Cultural + Political — language policy became a flashpoint because language instruction was a tool of political and cultural control; student resistance politicized a generation", "isCorrect": true, "rationale": "Imposing Afrikaans (the language of the white Afrikaner minority) as the medium of instruction in Black schools was simultaneously a cultural act (controlling which language defined Black South Africans' education) and a political one (asserting white supremacy over education). Students' resistance to this policy — and police violence against students — politicized a generation. This is a paradigm SPICE-T Cultural + Political connection."}, {"text": "Technology — the Soweto Uprising was successful because students used radio broadcasts to coordinate the protest", "isCorrect": false, "rationale": "The source does not mention radio coordination as a factor in Soweto. The uprising's significance was the scale of student mobilization and police violence, which brought international condemnation and politicized a generation, not its use of communication technology."}, {"text": "Interaction with Environment — the Soweto township's overcrowded conditions made unrest inevitable", "isCorrect": false, "rationale": "The source identifies the specific trigger (Afrikaans language instruction) and consequence (a new generation politicized, international condemnation) — not environmental/spatial overcrowding as the primary factor. The Interaction with Environment theme concerns human-physical environment relationships, not urban density."}]}, {"question": "Critics argued that the International Monetary Fund's structural adjustment programs of the 1980s and 1990s represented 'neocolonialism in economic form.' Based on the source, which feature of these programs most directly supports this characterization?", "options": [{"text": "IMF programs required developing nations to adopt democratic electoral systems modeled on Western institutions, imposing political as well as economic control", "isCorrect": false, "rationale": "The source describes IMF structural adjustment as requiring 'governments to cut social spending, privatize state enterprises, and liberalize trade' — economic conditions, not political democracy requirements. The 'neocolonialism' critique the source articulates concerns economic subordination, not political governance models."}, {"text": "IMF programs required cutting social spending, privatizing state enterprises, and liberalizing trade — conditions that often imposed immediate economic pain on the poorest while opening markets to competition from wealthier economies", "isCorrect": true, "rationale": "The source directly describes these features and then quotes critics who called it 'neocolonialism in economic form: a different mechanism for extracting resources from the Global South while maintaining its economic subordination.' The specific mechanism: conditions that hurt the poor and opened vulnerable economies to wealthy-country competition."}, {"text": "IMF programs replaced colonial administrators with IMF technical experts who directly controlled national economic policy", "isCorrect": false, "rationale": "The source describes IMF structural adjustment as imposed conditions for debt relief — not a system of direct administrative control by IMF experts replacing national governments. The 'neocolonialism' critique is about structural economic coercion through debt conditionality, not direct administrative colonization."}, {"text": "IMF programs were funded by former colonial powers specifically to maintain economic control over their former colonies", "isCorrect": false, "rationale": "The source does not present structural adjustment as a conspiracy of former colonial powers specifically targeting former colonies. The critique is about the structural effect of the programs — maintaining economic subordination of the Global South — not about conspiratorial intent."}]}, {"question": "The source describes South Africa's 1994 election as 'made possible by the convergence of sustained internal resistance, international economic pressure, and the geopolitical shift that removed apartheid's Cold War shield.' This analysis reflects which historical thinking skill?", "options": [{"text": "Periodization — identifying the 1994 election as the transition point between the Cold War and post-Cold War eras", "isCorrect": false, "rationale": "While 1994 is a significant date, the source's analysis concerns the multiple causes that made the transition possible — not primarily a periodization argument about which era the election marks. The key skill deployed is multicausal explanation."}, {"text": "Causation — identifying multiple, interacting causes (internal resistance, international pressure, Cold War's end) that together produced the apartheid transition", "isCorrect": true, "rationale": "The source explicitly identifies three distinct causal streams that 'converged' to produce the 1994 transition: internal resistance (ANC, Soweto, etc.), international pressure (sanctions, divestment, arms embargo), and geopolitical shift (Cold War's end removing apartheid's shield). This is a multicausal explanation — the AP causation thinking skill."}, {"text": "Continuity and change — demonstrating that South Africa's racial system remained unchanged despite apartheid's formal end", "isCorrect": false, "rationale": "The source acknowledges that 'the economic legacy of apartheid proved far more durable than its political structures' — suggesting continuity in economic inequality. But the primary analytical move in the sentence quoted is multicausal explanation of how the transition became possible, not a continuity/change argument."}, {"text": "Contextualization — placing apartheid within the broader history of European racial ideologies since the sixteenth century", "isCorrect": false, "rationale": "Contextualization would place apartheid in a broader temporal or spatial context. The analysis quoted is specifically about the causes of the 1994 transition — a causation argument, not a contextualization of apartheid within longer racial history."}]}, {"question": "The source notes that Angola's civil war continued until 2002 — 'long after both superpowers had withdrawn' — and that Afghanistan became 'the breeding ground for the Taliban and Al-Qaeda.' What do these cases illustrate about the long-term legacy of Cold War proxy conflicts?", "options": [{"text": "That Cold War proxy wars were entirely caused by superpower intervention and ended naturally once superpowers withdrew", "isCorrect": false, "rationale": "Angola's civil war continuing until 2002 — 'long after both superpowers had withdrawn' — directly contradicts the claim that Cold War proxy wars ended naturally once superpowers withdrew. The source's point is precisely that the conflicts had taken on local dynamics and destruction that outlasted the superpower involvement."}, {"text": "That Cold War proxy conflicts left permanent scars — ongoing civil wars, state failure, and conditions for new forms of political violence — that shaped the twenty-first century", "isCorrect": true, "rationale": "The source states the proxy wars 'left permanent scars': Angola's civil war continued until 2002; Afghanistan's devastation from Soviet invasion and civil war created the conditions for the Taliban and Al-Qaeda, whose 2001 attacks 'set off another generation of conflict.' The source frames these as legacies of Cold War proxy conflicts that 'shaped the political geography of the twenty-first century in ways that are still being reckoned with.'"}, {"text": "That post-colonial state failure was entirely a result of corrupt African and Asian governance rather than of Cold War interference", "isCorrect": false, "rationale": "The source explicitly attributes post-colonial instability partly to Cold War superpower interference: 'the governments installed and toppled by superpower patrons between 1947 and 1991... shaped the political geography of the twenty-first century.' Attributing failure solely to internal governance contradicts the source's multicausal analysis."}, {"text": "That the end of the Cold War brought peace and stability to most former proxy war zones", "isCorrect": false, "rationale": "The source presents the opposite: Angola's civil war continued until 2002, and Afghanistan descended into the conditions that produced the Taliban and Al-Qaeda. The source's final paragraph presents the Cold War's legacy as ongoing conflict, not as resolved by the Cold War's end."}]}, {"question": "Nelson Mandela championed the Truth and Reconciliation Commission (TRC) after 1994. Based on the source's overall analysis of South Africa's transition, which statement best explains why the TRC model was chosen rather than criminal prosecution of apartheid perpetrators?", "options": [{"text": "Criminal prosecution was legally impossible because apartheid had been declared legal under South African law, creating a retroactive justice problem", "isCorrect": false, "rationale": "The source does not raise this legal argument. While retroactive justice poses real legal challenges, the source's framing of South Africa's transition emphasizes the political negotiation between the ANC and the apartheid government — suggesting the TRC emerged from that negotiated process, not from a legal technicality."}, {"text": "The TRC reflected the negotiated character of South Africa's transition: a society seeking to move from apartheid to democracy while avoiding a cycle of retributive violence that might destabilize the new state", "isCorrect": true, "rationale": "The source describes the 1994 transition as a negotiated one and Mandela's presidency as demonstrating that 'a society fractured by decades of institutionalized racism could achieve a peaceful political transition.' The TRC — truth for amnesty rather than prosecution — is consistent with this negotiated, stability-preserving approach. Mandela championed it as 'a model for post-conflict justice.'"}, {"text": "The TRC was imposed by the United Nations as a condition for international recognition of the new South African government", "isCorrect": false, "rationale": "The source does not describe the TRC as a UN condition. It describes Mandela as 'championing' it — an active choice by the new leadership, not an external imposition."}, {"text": "Criminal prosecution was rejected because Mandela believed apartheid perpetrators had acted in good faith and should not be held responsible for systemic policies", "isCorrect": false, "rationale": "The source does not suggest Mandela believed apartheid perpetrators acted in good faith. The TRC's model was specifically about conditional amnesty (truth-telling) in exchange for criminal immunity — a political compromise, not a moral exoneration."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
