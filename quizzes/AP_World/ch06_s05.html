<body>
<div class="quiz-container">

    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP World History: Modern &mdash; Migration and Indentured Servitude</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Between 1815 and 1914, an estimated 50–55 million people migrated across oceanic distances. The text states this was 'a consequence of the same process: the global reorganization of labor that industrialization and imperialism set in motion.' Which of the following best explains this connection?", "options": [{"text": "Industrialization primarily caused migration by creating deadly factory conditions that drove workers to seek safer environments overseas", "isCorrect": false, "rationale": "The text does not identify factory danger as a driver; it points to structural factors — surplus labor in Europe (famine, enclosure, industrial displacement), demand for labor in plantation and industrial economies, and falling transport costs from steam technology."}, {"text": "Industrialization created both push factors (disruption of traditional economies, famine, poverty) and pull factors (demand for labor in industrial and plantation economies), while imperial expansion created the plantation labor crisis that drove indentured servitude", "isCorrect": true, "rationale": "The text identifies push factors (famine, rural poverty, enclosure, political persecution, artisan displacement) and pull factors (cheap land, industrial labor demand, falling shipping costs from steam technology) as structural — and directly links the indentured labor system to imperialism's plantation-labor crisis after abolition."}, {"text": "Migration was primarily a voluntary cultural process as people pursued opportunities, unrelated to industrialization or imperial structures", "isCorrect": false, "rationale": "The text presents migration as structurally driven by industrialization and imperialism — it frames the question as one of both voluntary and involuntary movements caused by the same global reorganization of labor, not as culturally autonomous choice."}, {"text": "Imperial powers deliberately organized mass migration programs to populate newly conquered territories with European settlers", "isCorrect": false, "rationale": "The text does not describe organized imperial population programs; European emigration was driven by economic push-pull dynamics. Indentured labor was actively recruited by planters, but for plantation labor, not settlement."}]}, {"question": "A British plantation owner in Trinidad in 1845 faces a labor crisis after the emancipation of enslaved people in 1833. Formerly enslaved workers are unwilling to continue plantation labor under similar conditions. Which response does the text describe as the colonial solution?", "options": [{"text": "Paying higher wages to attract free labor from Britain", "isCorrect": false, "rationale": "The text describes the indentured servitude system as the colonial solution — legally binding contracts for fixed periods, with Indian and Chinese workers recruited from poor rural regions. Higher wages to attract free British labor is not described."}, {"text": "Mechanizing sugar production to reduce labor requirements", "isCorrect": false, "rationale": "The text does not describe mechanization as the colonial response to emancipation-era labor shortages; it describes the development of the indentured servitude system using Indian and Chinese workers."}, {"text": "Developing the indentured servitude system — recruiting rural Indian and Chinese workers through legally binding contracts for fixed periods, with passage, housing, and wages provided in exchange", "isCorrect": true, "rationale": "The text states: 'Planters and colonial governments developed the indentured servitude system as their solution' — using Indian and Chinese workers recruited under contracts that were legally binding and enforceable by imprisonment for breach."}, {"text": "Shifting from sugar cultivation to other crops that required less intensive labor", "isCorrect": false, "rationale": "The text presents the plantation system as continuing with the same crop structures under the indentured labor solution — not a shift in agricultural production type."}]}, {"question": "Indentured workers were told by arkatti (labor recruiters) that they would earn good wages in a pleasant country. The historical record shows they arrived to plantation work from sunrise to sunset, wages barely above subsistence, and barracks described as 'scarcely better than slavery-era slave quarters.' What does this gap illustrate?", "options": [{"text": "Arkattis were acting independently and colonial governments were unaware of deceptive recruitment practices", "isCorrect": false, "rationale": "The text presents the indentured system as a colonial government solution — planters and colonial governments together developed and relied on it. The coercive mechanisms (contract enforcement by imprisonment) were legal, not independent abuses."}, {"text": "The coercive nature of the indentured system: workers were trapped in conditions misrepresented during recruitment, with contracts legally enforceable by imprisonment — producing conditions that historians compare to a 'new system of slavery'", "isCorrect": true, "rationale": "The text establishes all of this: the misrepresentation, the conditions on arrival, and the contractual imprisonment threat — then directly cites historian Hugh Tinker's description of 'a new system of slavery' as one historiographical position on what the gap between representation and reality amounted to."}, {"text": "The conditions of indentured labor were genuinely better than slavery because workers had legal rights and time-limited contracts", "isCorrect": false, "rationale": "The text presents both sides of the historiographical debate — workers had legal rights (however poorly enforced) vs. conditions that Tinker called 'a new system of slavery.' The text does not simply assert improvement; it notes the rights were 'poorly enforced' and living conditions were 'scarcely better.'"}, {"text": "Indentured workers in Fiji and the Caribbean were treated significantly better than those in South Africa and Mauritius", "isCorrect": false, "rationale": "The text makes no such regional distinction; it presents the Sanderson Committee testimony as evidence from Fiji, Natal, and the Caribbean together, implying comparable conditions across destinations."}]}, {"question": "Ireland's Great Famine (1845–52) killed roughly one million people and drove another million to emigrate in five years. Jewish emigration from the Russian Empire accelerated after the pogroms of 1881. Rural poverty from enclosure of common lands drove English agricultural workers abroad. What does the diversity of these causes suggest about the Great European Emigration?", "options": [{"text": "European emigration was primarily caused by a single global event (the 1848 revolutions) that affected all sending countries simultaneously", "isCorrect": false, "rationale": "The text presents varied causes by country and period — Irish famine, Russian pogroms, English enclosure, industrial displacement — not a single common trigger. The 1848 revolutions are not mentioned."}, {"text": "Large-scale migration results from the interaction of multiple context-specific push factors interacting with shared pull factors (land availability, industrial labor demand, falling transport costs)", "isCorrect": true, "rationale": "The text states causes 'varied by country and period but shared common structural features' — implying context-specific pushes (famine, persecution, poverty) combined with common pulls (cheap land, industrial labor demand, steamship cost reduction). Migration studies requires examining both."}, {"text": "European emigration was primarily driven by pull factors — the appeal of democratic governance in the United States — rather than conditions in the countries of origin", "isCorrect": false, "rationale": "The text identifies both push and pull factors, explicitly naming push factors first (famine, enclosure, political persecution, artisan displacement) before turning to pull factors. Political freedom is mentioned but is not identified as the primary driver."}, {"text": "European emigration occurred despite high transatlantic shipping costs that made the journey accessible only to wealthy migrants", "isCorrect": false, "rationale": "The text explicitly identifies the fall in transatlantic shipping costs from steam technology as a pull factor — crossing time fell from six weeks under sail to one week by 1900, making emigration accessible to people who could not previously afford it."}]}, {"question": "The Chinese Exclusion Act (1882), anti-immigrant quotas in U.S. immigration law, and organized labor's campaigns against foreign workers all occurred in receiving societies that simultaneously demanded immigrant labor. What does this tension reveal?", "options": [{"text": "Anti-immigrant sentiment in the United States was unique and did not exist in other receiving societies like Argentina or Australia", "isCorrect": false, "rationale": "The text presents these as part of 'intense anti-immigrant nativism' in 'receiving societies' broadly — the pattern of economic demand coexisting with cultural anxiety was not unique to the United States."}, {"text": "Receiving societies experienced a structural tension between economic demand for immigrant labor (industrial construction, mining, manufacturing) and cultural anxieties about national identity — producing both dependence and discrimination simultaneously", "isCorrect": true, "rationale": "The text states: 'The receiving societies were also sites of intense anti-immigrant nativism...reflecting tensions between economic demand for immigrant labor and cultural anxieties about national identity.' This structural tension — economic need plus cultural hostility — is the analytical point."}, {"text": "Anti-immigrant legislation was primarily driven by labor unions' accurate assessments that immigrants depressed wages, without any cultural or racial dimension", "isCorrect": false, "rationale": "The text cites 'cultural anxieties about national identity' as a component alongside labor competition, not purely economic wage concerns. The Chinese Exclusion Act targeted a specific racial group, not immigration broadly."}, {"text": "Immigrant labor was eventually replaced by domestic workers as wages rose, eliminating the structural tension by 1900", "isCorrect": false, "rationale": "The text presents the tension as persisting through 1914; it does not describe resolution through wage adjustment."}]}, {"question": "Hugh Tinker described nineteenth-century Indian indentured labor as 'a new system of slavery.' Other historians emphasize important differences: legal rights (however poorly enforced) and time-limited contracts. What does this historiographical debate suggest about analyzing labor systems?", "options": [{"text": "Because indentured workers had formal legal rights, the comparison to slavery is incorrect and should be rejected", "isCorrect": false, "rationale": "The text presents this as an ongoing debate, not a resolved question in favor of one side. The 'poorly enforced' qualification undermines the significance of formal legal rights as a meaningful distinction."}, {"text": "Analyzing labor systems requires examining both formal legal structures and material conditions, since formal rights that are poorly enforced may not meaningfully distinguish a system from those it formally replaced", "isCorrect": true, "rationale": "The text's KEY CONCEPT presents this debate as a 'broader analytical question: what is the relationship between different forms of coerced labor across history?' It asks students to 'identify continuities alongside changes' — the formal-legal vs. material-conditions distinction is exactly the analytical framework."}, {"text": "The debate is unresolvable because historians always disagree, and students should avoid taking positions on contested historical questions", "isCorrect": false, "rationale": "AP World History expects students to engage historiographical debates by analyzing evidence — the text provides specific evidence (misrepresentation, conditions, imprisonment for breach) that students should weigh, not avoid."}, {"text": "Indentured servitude was clearly worse than Atlantic slavery because it involved legal contracts while slavery was extralegal", "isCorrect": false, "rationale": "Atlantic slavery was extensively codified in law — slave codes, property law, the Constitution's three-fifths clause. The text does not make a 'worse than' comparison; it asks about continuities and changes across unfree labor systems."}]}, {"question": "Mohandas Gandhi's political career began in South Africa, where he organized against the conditions of the Indian indentured community. Sun Yat-sen's Chinese republican movement received financial support and a political base from Chinese diaspora networks. The Easter Rising (1916) was funded partly by Irish-Americans in the Fenian Brotherhood. What pattern do these examples collectively illustrate?", "options": [{"text": "Diaspora communities were primarily focused on cultural preservation and had little interest in the politics of their homelands", "isCorrect": false, "rationale": "All three examples demonstrate diaspora communities as active political actors with direct impact on homeland politics — the opposite of apolitical cultural preservation."}, {"text": "Migrations produced transnational diaspora communities that became political actors — financing and organizing nationalist and independence movements in their homelands — ultimately challenging the imperial systems that had generated the migrations", "isCorrect": true, "rationale": "The text states: 'The migrations that imperialism and industrialization produced created the transnational political networks that ultimately challenged empire' — citing Gandhi, Sun Yat-sen, and Irish-American nationalists as specific evidence."}, {"text": "Diaspora communities only became politically active after their homelands had already achieved independence", "isCorrect": false, "rationale": "Gandhi's South Africa organizing preceded Indian independence (1947) by decades; Sun Yat-sen's diaspora funding preceded the Xinhai Revolution (1911); the Fenian Brotherhood preceded the Easter Rising (1916) — all organized during colonial or imperial oppression, not after independence."}, {"text": "Only diasporas created by voluntary migration became political actors, while indentured labor diasporas remained politically passive", "isCorrect": false, "rationale": "Gandhi's organizing was specifically on behalf of the South African Indian indentured community — precisely an indentured-origin diaspora community engaging in political action."}]}, {"question": "Steam technology reduced transatlantic crossing time from six weeks under sail to two weeks by 1870 and to one week by 1900. Which analytical claim is most directly supported by this fact?", "options": [{"text": "Steam technology was the primary push factor driving European emigration in the nineteenth century", "isCorrect": false, "rationale": "Steam shipping was a pull/enabling factor — it reduced costs and time, making emigration accessible — not a push factor. Push factors (famine, poverty, persecution) explain why people wanted to leave; steam technology explains why they could."}, {"text": "Industrialization's technological products (steamships) directly enabled the scale of nineteenth-century migration by dramatically reducing the cost and time of transatlantic travel", "isCorrect": true, "rationale": "The text identifies falling transatlantic shipping costs from steamship technology as an explicit pull factor that made mass migration feasible — a clear example of Technology (SPICE-T) enabling the Social and Economic transformation of global migration."}, {"text": "Before steam technology, European emigration was impossible because sailing voyage lengths were prohibitive for all but the wealthiest migrants", "isCorrect": false, "rationale": "Pre-steam emigration occurred for centuries — colonial settlement of the Americas involved long sailing voyages. Steam technology made emigration more accessible and faster, not possible for the first time."}, {"text": "Steam technology primarily benefited the indentured labor trade rather than voluntary European emigration", "isCorrect": false, "rationale": "The text applies steam shipping's impact to European emigration specifically, noting the crossing time reduction as a factor enabling 50 million European emigrants between 1845 and 1914."}]}, {"question": "The text states that Indian diaspora communities in Trinidad and Tobago, Guyana, Fiji, Mauritius, South Africa, and Suriname 'maintained elements of Indian cultural and religious practice (Hinduism, Islam, festivals, cuisine) while adapting to new environments.' What concept does this describe?", "options": [{"text": "Assimilation — the complete absorption of immigrant communities into host-country cultures", "isCorrect": false, "rationale": "The text describes selective cultural maintenance alongside adaptation — not complete absorption into host cultures. Diaspora identity involves both retention of origin-culture elements and adaptation, which is different from assimilation."}, {"text": "Diaspora — communities living outside their ancestral homeland while maintaining cultural, linguistic, religious, or political ties to it, and developing distinct hybrid identities", "isCorrect": true, "rationale": "The text defines diaspora directly as 'a community of people living outside their ancestral homeland while maintaining cultural, linguistic, religious, or political ties to it' — and applies this definition to the Indian indentured communities' maintenance of Hinduism, Islam, festivals, and cuisine alongside adaptation."}, {"text": "Cultural imperialism — the imposition of Indian culture on host-country societies through indentured workers' presence", "isCorrect": false, "rationale": "Cultural imperialism describes dominant cultures imposing practices on subordinate ones, not the maintenance of minority cultural practices within a dominant host society. The indentured communities were not imposing culture; they were preserving it under conditions of marginalization."}, {"text": "Nativism — the preference for established residents over newcomers based on cultural anxiety", "isCorrect": false, "rationale": "Nativism describes the receiving society's hostile response to immigrants, not the immigrants' cultural practice. The text discusses nativism separately in the context of the Chinese Exclusion Act and anti-immigrant quotas."}]}, {"question": "The text compares the nineteenth-century migrations to 'the Atlantic slave trade of the preceding centuries' — describing them as 'comparable in scale (though not in form) to' that earlier movement. What analytical caution does this comparison suggest?", "options": [{"text": "Because the scale was comparable, the moral significance of the two migrations was equivalent and should be treated identically by historians", "isCorrect": false, "rationale": "The text explicitly distinguishes 'scale' from 'form' — acknowledging that scale similarity does not imply equivalence in conditions, coercion, or moral significance. The two movements were 'comparable in scale' but fundamentally different in character."}, {"text": "Historians must distinguish between scale (how many people moved) and form (the conditions, coercion, and mechanisms of movement) when comparing migrations across periods", "isCorrect": true, "rationale": "The parenthetical '(though not in form)' is the analytical caution: 50 million European migrants and the Atlantic slave trade involved comparable numbers but radically different mechanisms, degrees of coercion, and conditions. Scale comparison without form comparison is incomplete."}, {"text": "The nineteenth-century migrations were less historically significant than the Atlantic slave trade because they were primarily voluntary", "isCorrect": false, "rationale": "The text does not rank the migrations by historical significance; it presents them as among 'the most consequential demographic shifts in modern history' — not lesser than earlier movements."}, {"text": "The comparison to the Atlantic slave trade shows that all large-scale migrations in history involved similar degrees of coercion", "isCorrect": false, "rationale": "The text distinguishes scale from form precisely to avoid this equation — different mechanisms of coercion (voluntary emigration, indentured contracts, outright enslavement) represent genuinely different 'forms' even when scale is comparable."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
