        <div class="subtitle">AP World History: Modern &mdash; The Non-Aligned Movement</div>

    <div id="score-box" class="score-box">

    <div class="quiz-actions">

<script>
var QUESTIONS = [{"question": "The Bandung Conference (1955) was attended by twenty-nine African and Asian nations without the participation of either European colonial powers or the two superpowers. Which of the following best explains why this composition was itself a politically significant statement?", "options": [{"text": "It demonstrated that African and Asian nations were too economically weak to afford representation at superpower-dominated conferences", "isCorrect": false, "rationale": "The source presents the Bandung Conference's composition as a positive assertion of postcolonial sovereignty, not as evidence of weakness. The conference was a deliberate choice to exclude colonial powers and superpowers — an act of agency, not of exclusion from a stronger forum."}, {"text": "It asserted that peoples who had been subjected to European colonialism had the right and capacity to organize their own international order", "isCorrect": true, "rationale": "The source explicitly states: 'The conference's Afro-Asian character was itself politically significant: it asserted that peoples who had been subjected to European colonialism had the right and the capacity to organize their own international order.' This is the source's precise interpretation of Bandung's significance."}, {"text": "It showed that Africa and Asia rejected both capitalism and Communism in favor of a democratic socialist 'third way'", "isCorrect": false, "rationale": "The Bandung Conference did not endorse a specific economic model. It articulated principles of sovereignty and non-interference; many participants had varied economic systems. The conference was primarily a political/diplomatic assertion, not an economic program."}, {"text": "It was a United Nations initiative to accelerate decolonization by bypassing the Security Council's veto system", "isCorrect": false, "rationale": "The Bandung Conference was convened by Indonesian President Sukarno, not by the United Nations. It was an independent initiative by postcolonial states, and the source does not connect it to any UN mechanism."}], "id": "q01"}, {"question": "A student claims: 'Non-alignment was essentially political neutrality — non-aligned states refused to take sides and remained passive in Cold War disputes.' Based on the source, how would a historian evaluate this claim?", "options": [{"text": "The claim is accurate — non-aligned states deliberately avoided diplomatic activity to preserve their neutrality", "isCorrect": false, "rationale": "The source directly contradicts this: 'Far from being a passive \"third way\" of neutrality, the NAM was an active diplomatic strategy.' The source's key concept callout is titled 'Non-Alignment as Active Diplomacy' and gives multiple examples of non-aligned leaders extracting concessions from both superpowers."}, {"text": "The claim is inaccurate — non-alignment was an active strategy by which smaller states maximized their sovereignty and leverage by playing the superpowers against each other", "isCorrect": true, "rationale": "The source explicitly refutes the neutrality interpretation: 'Non-alignment... was an active strategy by which smaller and newly independent states sought to maximize their sovereignty and leverage in a world dominated by two superpowers.' Examples: Nasser obtained Soviet dam funding; India received aid from both superpowers; Tito extracted Western concessions."}, {"text": "The claim is partially accurate — some non-aligned states were active while others (like Yugoslavia) were genuinely neutral", "isCorrect": false, "rationale": "The source presents Tito of Yugoslavia as one of the three principal architects of the NAM and one of its most active diplomats — he extracted 'economic and security concessions from the West by maintaining his distance from Moscow.' Yugoslavia is the source's paradigm of active non-alignment, not of genuine neutrality."}, {"text": "The claim is inaccurate only for India, whose Nehru developed panchsheel as an offensive diplomatic doctrine", "isCorrect": false, "rationale": "Panchsheel was described as five principles of peaceful coexistence, not an 'offensive doctrine.' More importantly, the source refutes the neutrality claim for all NAM leaders, not only Nehru — Nasser's Suez strategy and Tito's Yugoslav path are equally presented as active, not passive."}], "id": "q02"}, {"question": "Egypt's Nasser nationalized the Suez Canal after Britain and the United States withdrew their offer to fund the Aswan High Dam in 1956. When Britain, France, and Israel invaded, both the United States and the Soviet Union opposed the operation. This sequence of events best illustrates which strategy?", "options": [{"text": "Containment — the United States acting to prevent Soviet influence from expanding into the Middle East", "isCorrect": false, "rationale": "The United States opposed its own allies (Britain, France, Israel) in the Suez Crisis — not the Soviet Union. This was not a containment action but a case of non-alignment strategy working: Nasser played both superpowers against the colonial powers and emerged victorious."}, {"text": "Non-alignment as active diplomacy — Nasser leveraged superpower competition to defend Egyptian sovereignty against colonial powers", "isCorrect": true, "rationale": "The source presents Suez as the paradigm of non-alignment as active strategy: Nasser 'nationalized the Suez Canal' after Western funding was withdrawn, survived the Anglo-French-Israeli invasion by obtaining both superpower opposition to it, received Soviet funding for the Aswan Dam, and 'emerged from the crisis as the most popular leader in the Arab world.' This is the source's primary example of non-alignment working."}, {"text": "Brinkmanship — Nasser deliberately advanced to the edge of war with Israel to force a diplomatic settlement", "isCorrect": false, "rationale": "Brinkmanship is the strategy of advancing to the nuclear threshold to force adversary retreat. Nasser's strategy was not about nuclear escalation; it was about using superpower competition to defeat colonial intervention. The invaders backed down due to superpower pressure, not nuclear threat."}, {"text": "The Truman Doctrine — the United States intervening to prevent Communist influence in the Middle East", "isCorrect": false, "rationale": "The U.S. opposed its own allies (Britain, France, Israel) in the Suez Crisis, not a Communist movement. The Truman Doctrine concerned resisting Communist expansion; Suez involved a nationalist Egyptian leader who was not Communist, and the U.S. intervention was against the colonial powers."}], "id": "q03"}, {"question": "Josip Broz Tito of Yugoslavia was unique among the NAM's founders because he was a Communist leader of a European state who successfully defied Moscow. What structural factor gave Tito the ability to maintain this independence?", "options": [{"text": "Yugoslavia's membership in NATO provided Western military backing against Soviet pressure", "isCorrect": false, "rationale": "Yugoslavia was not a NATO member. Tito's independence from both blocs — being neither in NATO nor a Soviet satellite — was precisely what made him a founder of the Non-Aligned Movement, not a member of Western military alliances."}, {"text": "Yugoslavia had liberated itself from Nazi occupation largely through its own partisan movement without Soviet assistance, giving Tito an independence Stalin could not easily override", "isCorrect": true, "rationale": "The source explicitly states: 'Yugoslavia had liberated itself from Nazi occupation largely through its own partisan movement without Soviet assistance, giving Tito an independence Stalin could not easily override.' This is the source's structural explanation for why Tito could defy Stalin in 1948 when other Eastern European leaders could not."}, {"text": "Yugoslavia's large industrial economy made it too valuable for the Soviet Union to risk losing through coercive pressure", "isCorrect": false, "rationale": "The source does not attribute Tito's independence to Yugoslavia's economic value. It attributes it to the political legitimacy and military independence Tito derived from leading Yugoslavia's partisan liberation — a very different form of leverage."}, {"text": "Tito had the support of the United States, which threatened war if the Soviet Union attempted to bring Yugoslavia into line", "isCorrect": false, "rationale": "The source attributes Tito's 1948 defiance to his partisan wartime independence, not to American threats. The NAM was explicitly non-aligned — Tito used his independence from Moscow to eventually extract Western concessions, but that was the result of his independence, not its cause."}], "id": "q04"}, {"question": "The Non-Aligned Movement pushed for a New International Economic Order (NIEO) in the early 1970s through the Group of 77 developing nations. Which of the following best describes the relationship between the NAM and the NIEO?", "options": [{"text": "The NIEO was a Soviet initiative that the NAM reluctantly endorsed to secure funding from Communist states", "isCorrect": false, "rationale": "The source describes the NIEO as a product of 'NAM solidarity' pushed through the Group of 77 — it was a developing world initiative, not a Soviet one. The NAM's relationship with the Soviet Union was strategic and conditional, not ideologically aligned."}, {"text": "The NIEO extended non-alignment from political sovereignty to economic sovereignty, demanding fairer terms of trade, debt relief, and technology transfer from wealthy nations", "isCorrect": true, "rationale": "The source states the Group of 77 'used NAM solidarity to push for a New International Economic Order (NIEO)' — 'a set of demands for fairer terms of trade, debt relief, and technology transfer from wealthy to developing nations.' This extends the NAM's anti-colonial politics into the economic domain: demanding economic sovereignty alongside political independence."}, {"text": "The NIEO was successfully implemented, transforming global trade in favor of developing nations throughout the 1970s", "isCorrect": false, "rationale": "The source explicitly states 'the NIEO was ultimately rejected by the industrialized powers.' It 'articulated a vision of economic sovereignty that remained influential' — but it was not implemented."}, {"text": "The NIEO split the NAM between pro-Soviet and pro-American factions who disagreed about trade policy", "isCorrect": false, "rationale": "The source does not describe the NIEO as splitting the NAM. It presents it as a unified developing-world demand that was rejected by industrialized powers — the divisions it notes within the NAM are about regional conflicts between member states (India-Pakistan, Ethiopia-Somalia), not about trade policy alignment with superpowers."}], "id": "q05"}, {"question": "A historian studying the Non-Aligned Movement notes that 'many nominally non-aligned states accepted aid from one superpower or the other when security or economic pressures demanded it.' Which example from the source best supports this observation about the NAM's limits?", "options": [{"text": "Nasser's nationalization of the Suez Canal, which aligned Egypt with the Soviet Union permanently", "isCorrect": false, "rationale": "The source presents Egypt as continuing 'to position itself as non-aligned' even after receiving Soviet dam funding. Nasser's receipt of Soviet aid was strategic, not a permanent alignment — he continued to play both superpowers against each other."}, {"text": "India accepting American military assistance after fighting a border war with China in 1962, despite being a founding member of the NAM", "isCorrect": true, "rationale": "The source explicitly cites this as an example of non-alignment's limits: 'India fought a border war with China in 1962 and accepted American military assistance.' This demonstrates that non-aligned states, under security pressure, could accept superpower aid — compromising non-alignment's stated principles."}, {"text": "Yugoslavia's Tito expelling Soviet advisers in 1948, which made Yugoslavia a de facto American ally", "isCorrect": false, "rationale": "Tito expelled Soviet advisers to assert independence from Moscow, not to align with the United States. He subsequently extracted Western concessions while remaining non-aligned. The source does not describe Yugoslavia as becoming 'a de facto American ally.'"}, {"text": "The Bandung Conference excluding both superpowers, which led to NATO imposing sanctions on participating nations", "isCorrect": false, "rationale": "The source contains no mention of NATO sanctions against Bandung participants. The conference's exclusion of superpowers was the founding act of non-aligned solidarity, and the source does not report any punitive response from NATO."}], "id": "q06"}, {"question": "Nehru's concept of panchsheel included five principles: mutual respect for sovereignty, mutual non-aggression, mutual non-interference, equality, and peaceful coexistence. In what ways did India's actual Cold War experience both support and complicate these principles?", "options": [{"text": "Support: India consistently applied all five principles in practice; Complicate: Nehru was criticized by Western nations for his anti-colonial positions", "isCorrect": false, "rationale": "The source states India fought a border war with China in 1962 and accepted American military assistance — directly undermining panchsheel's principles of non-aggression and non-interference. The complication the source identifies is practical, not just diplomatic criticism from Western nations."}, {"text": "Support: India maintained independence from Cold War blocs and served as a mediator; Complicate: India fought a border war with China in 1962 and accepted American military assistance", "isCorrect": true, "rationale": "The source presents Nehru as the 'most intellectually sophisticated proponent of non-alignment,' suggesting India maintained genuine independence and served as a mediator. However, it also cites India's 1962 border war with China and acceptance of American military aid as a clear example of non-alignment's limits — directly complicating panchsheel's principles."}, {"text": "Support: India's neutrality kept it out of all Cold War conflicts; Complicate: India's economy depended entirely on Soviet aid", "isCorrect": false, "rationale": "India was not neutral in all Cold War conflicts — it fought China in 1962. The source states India received 'aid from both superpowers while maintaining its independence' — suggesting balanced rather than Soviet-dependent aid."}, {"text": "Support: panchsheel became the legal foundation of the United Nations Charter; Complicate: India joined the Warsaw Pact in 1955", "isCorrect": false, "rationale": "India did not join the Warsaw Pact — that was a Soviet-bloc alliance. The source does not claim panchsheel became the UN Charter's legal foundation; it describes it as the 'philosophical backbone' of the NAM movement."}], "id": "q07"}, {"question": "The Bandung Conference Communiqué declared 'full support of the principles of self-determination of peoples and nations' and characterized colonialism as 'an evil which should speedily be brought to an end.' This language most directly continues which earlier tradition?", "options": [{"text": "The Truman Doctrine's language about supporting 'free peoples resisting subjugation'", "isCorrect": false, "rationale": "The Truman Doctrine was specifically about resisting Communist expansion — it was not an anti-colonial document. American Cold War policy frequently supported colonial or neo-colonial arrangements when they aligned with anti-Communist strategy, making the Truman Doctrine an imperfect predecessor to Bandung's explicitly anti-colonial language."}, {"text": "Wilsonian self-determination rhetoric from WWI, now claimed by postcolonial peoples whose independence was denied at the Paris Peace Conference", "isCorrect": true, "rationale": "President Wilson's Fourteen Points articulated self-determination as a universal principle, but the 1919 Paris Peace Conference applied it selectively — to European peoples, not to colonized peoples in Asia and Africa. Bandung's explicit invocation of self-determination represents colonized peoples reclaiming a principle whose universal application had been denied to them — a key AP contextualization argument."}, {"text": "The Soviet Union's promotion of Communist internationalism as an alternative to Western colonialism", "isCorrect": false, "rationale": "While the Soviet Union rhetorically opposed colonialism, the NAM was explicitly independent of Soviet direction. Bandung excluded both superpowers precisely to avoid becoming a Soviet instrument — the source's political framework of anti-colonialism was distinct from Soviet Communism."}, {"text": "The Atlantic Charter (1941) in which Churchill and Roosevelt endorsed the right of all peoples to choose their own government", "isCorrect": false, "rationale": "While the Atlantic Charter did include language about self-government, Churchill explicitly refused to apply it to the British Empire. The source does not cite the Atlantic Charter as a predecessor to Bandung. The more analytically interesting predecessor is Wilson's self-determination rhetoric, whose selective application Bandung was correcting."}], "id": "q08"}, {"question": "A student comparing the Non-Aligned Movement to the Cold War alliance system argues: 'Non-aligned states were actually more constrained than aligned states, because they had no guaranteed military protection.' Which piece of evidence from the source would most effectively complicate this claim?", "options": [{"text": "The Bandung Conference produced a communiqué that committed all members to mutual defense", "isCorrect": false, "rationale": "The Bandung Communiqué explicitly rejected 'the pressure both superpowers were applying for exclusive alliance commitments' — it did not create a mutual defense pact. Non-alignment's point was to avoid binding defense commitments, not to substitute a new one."}, {"text": "Non-aligned states like Egypt and Yugoslavia successfully extracted military and economic concessions from both superpowers simultaneously, gaining security benefits without binding alliance commitments", "isCorrect": true, "rationale": "The source presents non-alignment as giving states leverage over both superpowers: Egypt received Soviet dam funding and both superpowers opposed the Suez invasion; Yugoslavia extracted Western economic and security concessions. Non-aligned states could play both sides — which aligned states formally committed to one side could not do."}, {"text": "India's 1962 border war with China demonstrated that non-aligned states could not defend themselves without superpower alliances", "isCorrect": false, "rationale": "While India accepted American military assistance in 1962, the source presents this as a complication (a limit of non-alignment), not as evidence that non-aligned states were invariably more constrained. India maintained its non-aligned status even after accepting aid."}, {"text": "The Soviet Union invaded Afghanistan in 1979 because it was non-aligned, proving non-aligned states lacked protection", "isCorrect": false, "rationale": "The source mentions the 1979 Soviet invasion as a limit of the NAM (it 'could not produce a unified response'), but Afghanistan's invasion does not support the claim that non-alignment left states more constrained than alignment. Many aligned client states also suffered superpower intervention."}], "id": "q09"}, {"question": "The source notes that 'the distinction between \"aligned\" and \"non-aligned\" was never absolute.' Which of the following best illustrates this point?", "options": [{"text": "France under de Gaulle and Romania within the Warsaw Pact both exercised significant independence despite formal alliance membership", "isCorrect": true, "rationale": "The source's own comparison note cites these two cases explicitly: 'Many \"non-aligned\" states received substantial military or economic aid from one superpower; some formally aligned states (France under de Gaulle, Romania within the Warsaw Pact) exercised significant independence. The categories describe tendencies rather than rigid divisions.'"}, {"text": "The United States and the Soviet Union were technically non-aligned because they never formally joined each other's alliance systems", "isCorrect": false, "rationale": "The United States was a founding member of NATO; the Soviet Union organized the Warsaw Pact. Both superpowers were the central members of the opposing alliance blocs — describing them as 'non-aligned' is factually inaccurate."}, {"text": "All Non-Aligned Movement members were economically non-aligned, refusing aid from both superpowers", "isCorrect": false, "rationale": "The source explicitly contradicts this: 'Many nominally non-aligned states accepted aid from one superpower or the other when security or economic pressures demanded it.' Non-alignment was primarily a political/diplomatic stance, and many non-aligned states accepted economic or military aid from one or both superpowers."}, {"text": "The Non-Aligned Movement and NATO were both dissolved when the Cold War ended in 1991", "isCorrect": false, "rationale": "NATO was not dissolved in 1991 — it continued and expanded after the Cold War. The source does not state the NAM was dissolved; it describes the NAM's limitations and the NIEO's rejection, but not its dissolution."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
