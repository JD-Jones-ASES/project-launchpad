<script>
var QUESTIONS = [{"question": "Read the following excerpt from the Reich Citizenship Law (Nuremberg Laws, 1935): 'A citizen of the Reich is only that subject who is of German or kindred blood and who, through his conduct, shows that he is both desirous and fit to serve the German people and Reich faithfully. The right to citizenship is acquired by the granting of Reich citizenship papers. Only the citizen of the Reich enjoys full political rights.' Which of the following best analyzes how this legal text enabled subsequent persecution?", "options": [{"text": "By defining citizenship through blood, the law created two legal categories — citizens and non-citizen subjects — stripping Jews of political rights, and providing the administrative foundation for subsequent exclusion from professions, property ownership, and eventually deportation.", "isCorrect": true, "rationale": "The law created a two-tier legal status: citizens (those of 'German or kindred blood') and non-citizen subjects. This legal architecture — defining who was and was not a citizen — enabled the state to administratively strip Jews of voting rights, professional licenses, property rights, and marriage law protections. The section notes that Article 3 delegated implementation power to the Interior Ministry, giving flexibility to escalate from discrimination (1935) toward deportation and genocide (1941)."}, {"text": "By requiring Jews to register with local authorities, the law created a database that was later used to locate and deport them.", "isCorrect": false, "rationale": "While registration and census records were part of the administrative system of persecution (noted in the KEY CONCEPT), this specific law's text creates legal categories, not a registration requirement. Attributing registration to this law specifically conflates multiple administrative instruments of persecution."}, {"text": "By making Jewish religious practice illegal, the law triggered mass emigration that the Nazi government subsequently used to argue Jews were not German citizens.", "isCorrect": false, "rationale": "The Nuremberg Laws did not make Jewish religious practice illegal. The law was about racial categories (blood), not religious practice. Nazi racial ideology defined Jewishness by descent (grandparents' religion), not by current religious observance."}, {"text": "By ordering the immediate expulsion of Jews from Germany, the law provided the bureaucratic mechanism that led directly to the death camps.", "isCorrect": false, "rationale": "The Nuremberg Laws did not order immediate expulsion. The section emphasizes that the laws were 'not the end but the beginning of escalation' — a progressive legal framework enabling further discrimination. The path from the 1935 laws to the 1941 Final Solution involved multiple escalating steps, not a single jump."}], "id": "q01"}, {"question": "The section describes the Holocaust as the product of 'a modern bureaucratic state applying industrial methods to the project of annihilation.' Which specific evidence best demonstrates the bureaucratic, rather than merely mob-violence, character of the Holocaust?", "options": [{"text": "The Kristallnacht pogrom of November 1938, which destroyed thousands of Jewish businesses and synagogues in a single night.", "isCorrect": false, "rationale": "Kristallnacht was 'organized by the state but staged to appear as spontaneous popular anger' — it was state-orchestrated violence disguised as mob violence. While it illustrates state power, it was specifically designed to look like the opposite of bureaucratic administration. It is not the best evidence for the bureaucratic-industrial character the question asks about."}, {"text": "The Wannsee Conference (January 1942), at which senior Nazi officials coordinated the logistics of murdering 11 million Jews as a bureaucratic administrative problem to be solved efficiently across occupied Europe.", "isCorrect": true, "rationale": "The section describes Wannsee as 'a bureaucratic planning session for the murder of 11 million Jews — organized by government department, coordinated across occupied territories, and managed as an administrative problem to be solved efficiently.' It is the clearest evidence of industrial-bureaucratic genocide: government officials meeting, taking minutes, coordinating logistics across departments — the forms of normal administration applied to mass murder."}, {"text": "The Einsatzgruppen shootings in the Soviet Union (1941), which killed approximately 500,000–800,000 Jews in rapid mass-shooting operations.", "isCorrect": false, "rationale": "The Einsatzgruppen shootings were highly organized but represented the mass-shooting method — a different phase than the industrial killing of the death camps. The section distinguishes between Einsatzgruppen (mobile killing units, shooting operations) and the subsequent death camp system (industrial gassing), which more directly embodies the 'industrial methods' description. Wannsee better demonstrates the bureaucratic coordination aspect."}, {"text": "The public display of anti-Jewish propaganda at the Nuremberg rallies, which mobilized ordinary German citizens in support of persecution.", "isCorrect": false, "rationale": "Mass propaganda is relevant to the Holocaust's social context, but it represents mobilization of public sentiment — not the bureaucratic administrative machinery. The question specifically asks about 'bureaucratic, rather than mob-violence' character, which points toward administrative mechanisms like Wannsee, registration systems, railway logistics, and legal frameworks."}], "id": "q02"}, {"question": "The section notes that the Wannsee Conference (January 1942) 'did not decide to murder Jews — that decision had already been made.' What is the significance of this distinction for understanding the Holocaust's development?", "options": [{"text": "It confirms that Adolf Hitler made the decision personally at a specific moment in December 1941, and Wannsee was merely a notification meeting.", "isCorrect": false, "rationale": "Historians debate whether a single Hitler order exists and when it was given; the section does not claim Hitler issued a specific identifiable order in December 1941. The section's point is that the decision had been made before Wannsee — but it does not attribute it to a single personal Hitler decision at a specific moment."}, {"text": "It shows that the Holocaust evolved through progressive radicalization — from legal discrimination (1933–1935) to pogroms (1938) to mass shootings (1941) to systematic industrial genocide — rather than being planned in a single moment.", "isCorrect": true, "rationale": "The section's structure demonstrates this escalation: 1933 (civil service exclusions) → 1935 (Nuremberg Laws) → 1938 (Kristallnacht) → 1941 (Einsatzgruppen mass shootings) → 1942 (Wannsee coordination of death camps). The section explicitly states: 'The path to genocide was not a straight line.' Wannsee systematized a process already underway — it did not initiate it."}, {"text": "It exonerates the Wannsee participants from legal responsibility since they merely coordinated an already-decided policy rather than making the decision themselves.", "isCorrect": false, "rationale": "The Nuremberg Trials explicitly rejected this reasoning: 'following orders was not a valid defense for crimes against humanity, and individuals could be held personally accountable.' Coordinating and implementing genocide is itself criminal under international law. The section does not use the distinction to exonerate Wannsee participants."}, {"text": "It proves that the Holocaust was impossible to prevent once the Einsatzgruppen began operations in 1941, since the bureaucratic momentum could not be reversed.", "isCorrect": false, "rationale": "The section does not make a claim about inevitability or impossibility of prevention. Historical contingency analysis — whether the Holocaust could have been stopped at various points — is not the section's argument. The section analyzes what happened and how, not whether it was preventable at a specific moment."}], "id": "q03"}, {"question": "The section cites Hannah Arendt's concept of the 'banality of evil' in analyzing the Holocaust. What does this concept mean in this context?", "options": [{"text": "That the Holocaust was so common and widespread that European populations became desensitized to its horrors and accepted it as a normal feature of wartime.", "isCorrect": false, "rationale": "Arendt's 'banality of evil' does not refer to desensitization of populations. It refers specifically to the character of those who carried out genocide: not ideological fanatics, but ordinary bureaucrats and functionaries performing their assigned roles — following orders, processing paperwork, managing logistics — without exercising moral judgment about the larger project."}, {"text": "That atrocity on the scale of the Holocaust was perpetuated not only by fanatical ideologues but by ordinary bureaucrats, clerks, railway workers, and soldiers following orders — people who were 'banal' (ordinary) rather than monstrous.", "isCorrect": true, "rationale": "The section explicitly invokes this concept when discussing the Holocaust's bureaucratic infrastructure: 'The participation of ordinary government clerks, railway workers, local police, and soldiers — not only ideological fanatics — in the genocide illustrates Hannah Arendt's concept of the \"banality of evil\": atrocity perpetuated not by monsters but by bureaucrats following orders.'"}, {"text": "That Nazi ideology was intellectually shallow and unoriginal — a banal collection of pre-existing nationalist and racist ideas rather than a sophisticated philosophical system.", "isCorrect": false, "rationale": "Arendt's concept of 'banality of evil' refers to the perpetrators' ordinariness, not to the intellectual quality of Nazi ideology. It is a concept about human psychology and moral responsibility, not about the intellectual merit or originality of the ideology that justified the genocide."}, {"text": "That by repeating 'Heil Hitler' and other slogans endlessly, Nazi Germany reduced its citizens' capacity for independent moral thinking, making them banal — thoughtless automatons.", "isCorrect": false, "rationale": "While Arendt did argue about the importance of 'thinking' for resisting evil (in other works), 'banality of evil' as used in the section specifically refers to the character of perpetrators — ordinary people following orders and fulfilling bureaucratic roles — not to propaganda-induced thoughtlessness in the general population."}], "id": "q04"}, {"question": "The Babi Yar massacre (September 1941) — in which Einsatzgruppen killed 33,771 Jews in two days near Kyiv — and the subsequent death camp system represent two distinct phases of the Holocaust's industrial genocide. What is the key difference between these phases?", "options": [{"text": "Babi Yar targeted Jewish men while the death camps targeted entire families including women and children.", "isCorrect": false, "rationale": "At Babi Yar and across Einsatzgruppen operations, entire communities — men, women, and children — were killed. The mass shootings did not target only men. The distinction between the phases is not about victim demographics but about method and scale."}, {"text": "Babi Yar used mass shooting operations by mobile killing units; the death camps used industrialized killing (gas chambers, railway transportation of victims from across Europe) that could murder at far greater scale.", "isCorrect": true, "rationale": "The section contrasts the Einsatzgruppen (mobile killing units following the army, conducting mass shootings at ravines and pits) with the death camps (purpose-built facilities in occupied Poland for mass killing by gas — Zyklon B or carbon monoxide — to which victims were transported by train from across occupied Europe). The key distinction is the industrialization and geographic scale of the death camp system vs. the localized, shooting-based Einsatzgruppen operations."}, {"text": "Babi Yar was conducted secretly while the death camps were publicly known within Germany, serving as a deterrent against political opposition.", "isCorrect": false, "rationale": "Both the Einsatzgruppen operations and the death camp system were conducted as state secrets — the death camps were located in occupied Poland partly to distance them from the German public. They were not publicized as deterrents within Germany. The distinction is methodological, not one of secrecy vs. publicity."}, {"text": "Babi Yar was an unplanned massacre resulting from local commanders' unauthorized initiative; the death camps were centrally planned from Berlin.", "isCorrect": false, "rationale": "The Einsatzgruppen operations were state-organized, not unauthorized local initiatives. They 'followed the advancing army' as an integrated part of the invasion plan. The section does not characterize Babi Yar as unplanned or unauthorized; it describes the Einsatzgruppen as 'mobile killing units' that 'conducted mass shootings' as part of organized operations."}], "id": "q05"}, {"question": "The Nuremberg Trials established that 'following orders was not a valid defense for crimes against humanity.' What was the most significant long-term legal consequence of this precedent?", "options": [{"text": "It made all military service in any nation's armed forces illegal under international law, since soldiers by definition must follow orders.", "isCorrect": false, "rationale": "The Nuremberg precedent did not make military service illegal. It distinguished between following ordinary military orders and participating in crimes against humanity. Soldiers retain legal obligations to refuse manifestly illegal orders, but military service itself was not affected."}, {"text": "It established the principle of individual accountability under international law for atrocities committed under state authority — shaping the Genocide Convention (1948), the Universal Declaration of Human Rights (1948), and eventually the International Criminal Court (2002).", "isCorrect": true, "rationale": "The section explicitly traces this lineage: 'The Nuremberg trials were imperfect… but the trials established precedents that shaped international law for the rest of the century: the Genocide Convention (1948), the Universal Declaration of Human Rights (1948), and eventually the International Criminal Court (2002) all trace their intellectual lineage to Nuremberg.'"}, {"text": "It created a permanent international criminal court that prosecuted all subsequent genocides — in Cambodia, Bosnia, and Rwanda — within a decade of each occurrence.", "isCorrect": false, "rationale": "The International Criminal Court was not established until 2002, and it did not successfully prosecute all subsequent genocides quickly. The section acknowledges that the question of how the international community responds to genocide 'remained urgently relevant as genocides in Cambodia (1975–1979), Bosnia (1992–1995), and Rwanda (1994) demonstrated in the decades that followed' — implying these occurred without adequate international prosecution."}, {"text": "It required all nations to adopt domestic laws criminalizing genocide, regardless of whether the perpetrators were state officials or private citizens.", "isCorrect": false, "rationale": "While the Genocide Convention (1948) obligated signatory states to prevent and punish genocide, the section does not characterize Nuremberg as establishing a universal domestic criminalization requirement. The precedent was about international accountability — individuals could be held personally accountable under international law — not a requirement for domestic legislation."}], "id": "q06"}, {"question": "The term 'genocide' was coined by Polish-Jewish lawyer Raphael Lemkin in 1944. The section lists multiple twentieth-century genocides beyond the Holocaust. Which of the following correctly identifies the defining legal criterion that distinguishes genocide from other mass atrocities such as war crimes?", "options": [{"text": "The total number of victims — a mass atrocity must kill over one million people to qualify as genocide under the UN Genocide Convention.", "isCorrect": false, "rationale": "The UN Genocide Convention does not establish a numerical threshold. Genocide can be committed against a group even if relatively few members are killed, provided the intent to destroy the group 'in whole or in part' is present. The legal definition centers on intent, not scale."}, {"text": "Deliberate intent to destroy, in whole or in part, a national, ethnic, racial, or religious group — as distinct from mass killing that lacks this specific targeting intent.", "isCorrect": true, "rationale": "The section's definition of genocide cites the UN Genocide Convention: 'acts committed with intent to destroy, in whole or in part, a national, ethnical, racial or religious group.' Intent — deliberate targeting of a defined group for destruction — is the legal criterion that distinguishes genocide from other mass violence. This is also why the Holodomor's genocide classification is contested: the intentionality toward Ukrainians as a national group is disputed."}, {"text": "The use of industrial methods — gas chambers, railways, bureaucratic administration — which distinguishes genocides from more primitive forms of mass violence.", "isCorrect": false, "rationale": "The UN Genocide Convention does not require industrial methods. Genocide can be committed with machetes, as in Rwanda (1994). Industrial methods characterized the Holocaust specifically but are not part of the legal definition of genocide, which centers on intent toward a defined group."}, {"text": "State sponsorship — the involvement of a government apparatus, which distinguishes genocide from sectarian or ethnic violence between non-state groups.", "isCorrect": false, "rationale": "While most genocides have involved state machinery, the UN Genocide Convention does not require state sponsorship as a definitional criterion. Non-state actors can theoretically commit genocide. The legal definition centers on intent to destroy a protected group, not on whether the perpetrators are state or non-state actors."}], "id": "q07"}, {"question": "The Kristallnacht pogrom ('Night of Broken Glass,' 9–10 November 1938) is described as 'organized by the state but staged to appear as spontaneous popular anger.' What does this characterization reveal about the Nazi state's strategy of persecution?", "options": [{"text": "That the Nazi government feared public opposition to open persecution of Jews and therefore concealed its role to protect its domestic popularity.", "isCorrect": false, "rationale": "While this partly captures the logic, the section suggests the staging as 'spontaneous' served multiple purposes: it provided political deniability, allowed the state to escalate while claiming it was responding to popular demand rather than initiating violence, and tested the level of organized public resistance. Framing it solely as fear of domestic opposition oversimplifies the strategy."}, {"text": "That Nazi persecution was not driven by ideology but by opportunistic exploitation of public antisemitism that was already widespread in German society.", "isCorrect": false, "rationale": "The section describes Kristallnacht as 'organized by the state' — it was ideologically driven and state-planned, not merely opportunistic exploitation of pre-existing hatred. Antisemitism was real in German society, but Kristallnacht was a deliberate state action, not a spontaneous popular expression being opportunistically used."}, {"text": "That the Nazi state used staged 'popular' violence as a tool of escalating persecution — providing ideological cover for state-organized destruction while testing how much resistance the population would mount.", "isCorrect": true, "rationale": "Organizing Kristallnacht as staged-but-deniable 'popular anger' served the escalation strategy: it allowed the state to use violence (destroying 7,500 businesses, burning 1,400 synagogues, sending 30,000 to concentration camps) while attributing it to popular sentiment, and it tested whether German society would resist or acquiesce — and the answer was largely acquiescence."}, {"text": "That by November 1938 the Nazi government had lost control of antisemitic violence, which was proceeding independently of government direction.", "isCorrect": false, "rationale": "The section explicitly states Kristallnacht was 'organized by the state' — staged to appear spontaneous, but deliberately planned. The Nazi government had not lost control; it was exercising control through a specific deceptive technique."}], "id": "q08"}, {"question": "The section notes that the Nuremberg Trials were 'imperfect' — 'victors' justice, critics argued; the Allied powers had their own records of civilian targeting and colonial violence that went unprosecuted.' Which of the following best evaluates this critique?", "options": [{"text": "The critique is entirely correct, and the Nuremberg Trials therefore established no legitimate precedents — they were simply political persecution of defeated enemies.", "isCorrect": false, "rationale": "The section does not endorse the conclusion that the trials' imperfections invalidate their precedents. It explicitly states they 'established precedents that shaped international law for the rest of the century,' tracing the lineage to the Genocide Convention, Universal Declaration of Human Rights, and ICC. Imperfection and legitimacy are not mutually exclusive."}, {"text": "The critique is invalid because the victorious Allied powers had committed no comparable atrocities — the comparison is historically false.", "isCorrect": false, "rationale": "The section does not claim Allied powers had clean records — it acknowledges 'their own records of civilian targeting and colonial violence.' Dismissing the critique by denying Allied violence ignores the section's own acknowledgment that the critique has historical basis."}, {"text": "The critique identifies real inconsistencies — Allied powers were not held to the same standards — yet the trials' precedents for individual accountability under international law had lasting value despite this imperfection.", "isCorrect": true, "rationale": "The section holds both truths simultaneously: the trials were imperfect (victors' justice, Allied impunity) AND they 'established precedents that shaped international law for the rest of the century.' The intellectual lineage to the Genocide Convention, UDHR, and ICC demonstrates real lasting value. Imperfection and lasting legal significance coexist."}, {"text": "The critique proves that international law is inherently political and can never provide genuine justice for atrocities, only political legitimation of the powerful.", "isCorrect": false, "rationale": "This cynical conclusion goes beyond what the section argues. The section presents Nuremberg as imperfect but genuinely precedent-setting — not as pure political theater with no legal value. The creation of the ICC in 2002 as a permanent independent court represents an attempt to address the 'victors' justice' problem, which the section implicitly endorses by citing the ICC as part of Nuremberg's legacy."}], "id": "q09"}, {"question": "The section describes the legal framework of the Nuremberg Laws as creating 'two classes — subjects and citizens.' Article 3 of the Reich Citizenship Law delegated power to 'implement and supplement' the law to the Interior Ministry and the Deputy of the Führer. What does this delegation of implementation power reveal about how Nazi law enabled escalation?", "options": [{"text": "It shows that the Nuremberg Laws were never meant to be permanent — they were designed to be repealed once Jews had been induced to emigrate voluntarily.", "isCorrect": false, "rationale": "Nothing in the text or historical record suggests the Nuremberg Laws were designed as temporary measures intended for repeal. The delegation of 'implementation and supplement' authority enabled escalation, not eventual repeal. The laws were progressively strengthened, not moderated."}, {"text": "It built legal flexibility directly into the text: by delegating unlimited supplementary power to executive agencies, the law could be administratively expanded from stripping civil rights toward deportation and murder without requiring the Reichstag to legislate each escalating step.", "isCorrect": true, "rationale": "The section's sourcing note asks exactly this question: 'What does this delegation of authority reveal about how Nazi law was designed to operate? How did this flexibility enable the escalation from legal discrimination (1935) toward deportation and genocide (1941)?' The answer is that Article 3's open-ended delegation allowed the Interior Ministry to add supplement after supplement, progressively tightening persecution without needing new legislation for each step."}, {"text": "It proves that the Holocaust was planned from the beginning of Nazi rule — the legal framework was designed to lead inevitably to genocide.", "isCorrect": false, "rationale": "The section explicitly rejects a teleological 'planned from the beginning' interpretation: 'The path to genocide was not a straight line.' Intentional, systemic genocide required a specific context (WWII, vast occupied territories with large Jewish populations) to emerge. The delegation of power enabled escalation but does not prove the genocide was planned in 1935."}, {"text": "It demonstrates that the Reichstag maintained independent oversight of Nazi persecution policies throughout the 1930s, preventing more extreme measures until 1941.", "isCorrect": false, "rationale": "The opposite is true. Article 3 explicitly removed Reichstag oversight by delegating 'implement and supplement' authority to the executive — the Interior Ministry and Deputy Führer. The Reichstag had no independent oversight role in Nazi Germany after the Enabling Act (1933); this law confirmed executive supremacy in implementing persecution."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
