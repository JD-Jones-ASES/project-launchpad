<body>
<div class="quiz-container">

    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP World History: Modern &mdash; The Digital Revolution</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A historian argues that the Internet functions as 'infrastructure as consequential as the Silk Roads or the Atlantic shipping lanes were in earlier eras.' Which of the following best supports this comparison?", "options": [{"text": "Like those networks, the Internet was invented by a single civilization and spread outward.", "isCorrect": false, "rationale": "The text explicitly states the opposite: 'The Digital Revolution belongs to no single civilization,' and its largest user base is in Asia, not the West where foundational technologies were developed."}, {"text": "Like those networks, the Internet simultaneously integrates exchange, concentrates wealth at chokepoints, and generates cultural diffusion while leaving access uneven.", "isCorrect": true, "rationale": "The text draws this parallel directly: like the Silk Roads, the Internet 'integrates global exchange, concentrates wealth in nodes that control key chokepoints...and generates new forms of cultural diffusion' while access remains unequal."}, {"text": "Like the Silk Roads, the Internet is controlled by state actors rather than private companies.", "isCorrect": false, "rationale": "The text describes platform companies and cable operators as chokepoint controllers—private actors, not primarily states. The Silk Roads comparison is about function, not control structure."}, {"text": "Like the Atlantic shipping lanes, the Internet primarily benefits nations in the Western Hemisphere.", "isCorrect": false, "rationale": "The text stresses the opposite: China alone has more Internet users than North America and Europe combined, making Asia the largest user base."}], "id": "q01"}, {"question": "The ENIAC (1945) occupied 1,800 square feet and consumed 150 kilowatts of electricity. A modern smartphone performs comparable calculations in a fraction of a millisecond. Which development most directly explains this transformation?", "options": [{"text": "The invention of ARPANET, which networked computers and allowed data sharing.", "isCorrect": false, "rationale": "ARPANET (1969) enabled networked communication but did not reduce the physical size or power requirements of computing hardware. Miniaturization came from a different development."}, {"text": "Moore's Law, enabled by the transistor and integrated circuit, which doubled transistor density approximately every two years.", "isCorrect": true, "rationale": "The text explains that the transistor (1947) miniaturized the electronic switch and the integrated circuit allowed millions of transistors on a silicon sliver, with Moore's Law correctly predicting exponential growth of computing power for five decades."}, {"text": "The World Wide Web, which made computing accessible to non-specialists beginning in 1993.", "isCorrect": false, "rationale": "The Web expanded access but was a software/protocol innovation; it did not cause the physical miniaturization of computer hardware."}, {"text": "Cold War military competition, which drove governments to fund computing at unprecedented scale.", "isCorrect": false, "rationale": "Cold War funding helped launch early computing (ENIAC, ARPANET), but the miniaturization trajectory is specifically attributed to the transistor and integrated circuit, not military spending per se."}], "id": "q02"}, {"question": "Examine the following scenario: A rural village in sub-Saharan Africa gains Internet access through a mobile network before it has a reliable electricity grid or landline telephone infrastructure. This scenario best illustrates which concept?", "options": [{"text": "Surveillance capitalism, as data from mobile users is harvested by platform companies.", "isCorrect": false, "rationale": "Surveillance capitalism describes the business model of harvesting user data for advertising; the scenario describes a pattern of technology adoption, not data exploitation."}, {"text": "The digital divide, since rural African villages lack the high-bandwidth access available in wealthy urban areas.", "isCorrect": false, "rationale": "The digital divide describes the gap between those with and without access — but this village is gaining access, and the scenario specifically illustrates how mobile technology enabled this leapfrog."}, {"text": "Leapfrogging, through which mobile technology allowed some Global South regions to skip earlier infrastructure stages entirely.", "isCorrect": true, "rationale": "The text describes exactly this: 'rural villages in sub-Saharan Africa, South Asia, and Southeast Asia that never had telephone infrastructure gained Internet access through mobile networks before they had reliable electricity grids' — leapfrogging landlines."}, {"text": "The Moore's Law slowdown, which forced hardware innovation toward mobile platforms.", "isCorrect": false, "rationale": "The Moore's Law slowdown is described as an engineering challenge of the 2020s when transistors approach atomic size — it is not the cause of mobile adoption in the Global South."}], "id": "q03"}, {"question": "Which of the following best explains why Shoshana Zuboff's concept of 'surveillance capitalism' is relevant to AP World History's Economic theme?", "options": [{"text": "It describes how governments use the Internet to track political dissidents across borders.", "isCorrect": false, "rationale": "Surveillance capitalism refers specifically to a corporate business model — harvesting user behavior data to sell to advertisers — not to state surveillance of political opponents."}, {"text": "It identifies a new form of capital accumulation in which human behavioral data becomes a commodity sold to influence markets and behavior.", "isCorrect": true, "rationale": "The text defines surveillance capitalism as a business model in which user behavior — 'clicks, searches, locations, social connections' — is 'harvested as data, used to build predictive profiles, and sold to advertisers.' This is a new form of economic extraction."}, {"text": "It explains how digital platforms replaced manufacturing as the primary driver of GDP growth in all nations.", "isCorrect": false, "rationale": "The text does not make this claim. Surveillance capitalism is a business model description, not a macroeconomic theory about GDP drivers across all nations."}, {"text": "It demonstrates that the Internet's economic benefits were distributed equally across the Global South.", "isCorrect": false, "rationale": "The text emphasizes uneven distribution — the digital divide, gender gaps in access — not equality of economic benefit."}], "id": "q04"}, {"question": "Consider the following statement from the source: 'China developed a parallel digital ecosystem—including WeChat, Alibaba, Baidu, and TikTok's parent ByteDance—under state supervision, rejecting the laissez-faire approach of Western governments.' What historical pattern does this most closely resemble?", "options": [{"text": "Economic nationalism, in which states assert control over key industries rather than allowing foreign or open-market dominance.", "isCorrect": true, "rationale": "China's model — building a large, dynamic digital economy without American platforms, under state supervision — is an assertion of sovereign control over strategic economic infrastructure, consistent with economic nationalism patterns throughout history."}, {"text": "Colonialism, because China is extracting resources from foreign digital markets.", "isCorrect": false, "rationale": "The text describes China building its own domestic ecosystem, not extracting resources from foreign economies. This is state-directed development, not colonial extraction."}, {"text": "Structural adjustment, because China liberalized its digital economy to attract foreign investment.", "isCorrect": false, "rationale": "Structural adjustment involves deregulation and liberalization. China's model is the opposite — state supervision and exclusion of foreign platforms, not liberalization."}, {"text": "The Green Revolution, because China applied technological advances developed elsewhere to its own economy.", "isCorrect": false, "rationale": "China developed its own digital platforms (WeChat, Baidu, ByteDance), not adopting technologies developed elsewhere. The text says China 'demonstrated that a large, dynamic digital economy could exist without American platforms.'"}], "id": "q05"}, {"question": "The ARPANET (1969) was designed with an architecture that could 'survive a nuclear first strike.' How does this military origin most directly connect to the Internet's later global significance?", "options": [{"text": "It ensured that governments, not private companies, would control Internet infrastructure into the twenty-first century.", "isCorrect": false, "rationale": "The Internet evolved into infrastructure controlled by a mix of private companies, governments, and international bodies — not purely governmental control. The military origin did not determine ownership structure."}, {"text": "The packet-routing architecture designed for military resilience became the technical foundation of the modern Internet, enabling decentralized global communication.", "isCorrect": true, "rationale": "The text states that ARPANET's architecture — 'breaking information into packets routed independently across multiple pathways' — 'became the technical foundation of the modern Internet,' illustrating how military needs shaped a global civilian infrastructure."}, {"text": "Cold War military spending drove the development of social media platforms like Facebook and Twitter.", "isCorrect": false, "rationale": "Social media platforms emerged in the early 2000s as commercial ventures, not as Cold War military projects. The text connects ARPANET to the Internet's infrastructure, not to social media specifically."}, {"text": "The military's control of ARPANET prevented its use for commercial purposes until the 1990s.", "isCorrect": false, "rationale": "The text says the network 'remained a tool of researchers and government agencies' for two decades — academic and governmental, not exclusively military — before Tim Berners-Lee's Web proposal opened it broadly."}], "id": "q06"}, {"question": "India's Unified Payments Interface processed over twelve billion transactions per month by 2024, more than any comparable system in the United States or Europe. What does this fact most directly challenge?", "options": [{"text": "The claim that the digital divide is entirely a thing of the past in South Asia.", "isCorrect": false, "rationale": "The text notes that the digital divide persists, including gender gaps in South Asia. The UPI statistic shows digital financial leadership in one sector, not the elimination of the divide overall."}, {"text": "The assumption that digital economic innovation primarily originates in and benefits wealthy Western nations.", "isCorrect": true, "rationale": "UPI's transaction volume surpassing comparable U.S. and European systems illustrates that major digital financial innovations can emerge from and lead in the Global South — directly challenging a Western-centric view of technological progress."}, {"text": "The argument that mobile technology creates new economic vulnerabilities for developing nations.", "isCorrect": false, "rationale": "The text presents M-Pesa and UPI as examples of mobile technology enabling financial inclusion, not as evidence of vulnerability. These are positive economic outcomes."}, {"text": "Moore's Law, since transistor miniaturization limits the processing power available in South Asian mobile networks.", "isCorrect": false, "rationale": "Moore's Law describes hardware miniaturization trends and has no direct bearing on payment platform transaction volumes or the geographic origin of financial innovation."}], "id": "q07"}, {"question": "The gender dimension of the digital divide — where women in South Asia and sub-Saharan Africa are significantly less likely than men to own smartphones — connects most directly to which AP World History SPICE-T theme?", "options": [{"text": "Technology and Social structure, because unequal access to technology both reflects and reinforces existing gender hierarchies.", "isCorrect": true, "rationale": "The text explicitly links the digital divide to gender: 'women are significantly less likely than men to own smartphones or use the Internet, limiting their access to economic opportunities and civic information.' This illustrates how technology access interacts with pre-existing social inequalities."}, {"text": "Interaction with Environment, because women's agricultural roles make them more dependent on non-digital labor.", "isCorrect": false, "rationale": "The text does not connect the gender digital divide to environmental or agricultural contexts — it specifically addresses smartphones, Internet access, economic opportunities, and civic information."}, {"text": "Political structures, because governments in South Asia and sub-Saharan Africa have passed laws restricting women's Internet access.", "isCorrect": false, "rationale": "The text attributes the gender gap to ownership patterns and social inequality, not to explicit legislation restricting women's access to the Internet."}, {"text": "Cultural exchange, because Western social media platforms are less appealing to women in non-Western cultural contexts.", "isCorrect": false, "rationale": "The text says nothing about cultural preferences driving the gender gap — it identifies it as a structural inequality, not a matter of cultural taste."}], "id": "q08"}, {"question": "Which of the following sequences correctly traces the technological lineage of the Digital Revolution as described in the source?", "options": [{"text": "World Wide Web → transistor → integrated circuit → ARPANET → social media", "isCorrect": false, "rationale": "This reverses the chronological sequence. The transistor (1947) and integrated circuit (late 1950s) preceded ARPANET (1969), which preceded the Web (1989–1993), which preceded social media (2000s)."}, {"text": "ENIAC → transistor → integrated circuit → ARPANET → World Wide Web → social media", "isCorrect": true, "rationale": "This correctly follows the text's sequence: ENIAC (1945), transistor (1947), integrated circuit (late 1950s), ARPANET (1969), World Wide Web proposed 1989/accessible 1993, social media (2000s)."}, {"text": "ARPANET → transistor → ENIAC → integrated circuit → World Wide Web", "isCorrect": false, "rationale": "ARPANET (1969) came after the transistor (1947) and ENIAC (1945), and the integrated circuit (late 1950s) preceded ARPANET. This sequence is incorrect."}, {"text": "Transistor → ENIAC → ARPANET → integrated circuit → World Wide Web", "isCorrect": false, "rationale": "ENIAC (1945) preceded the transistor (1947), and the integrated circuit (late 1950s) followed the transistor — it did not come after ARPANET. The sequence is out of order."}], "id": "q09"}, {"question": "A political scientist studying the Arab Spring (2010–2012) and the Indian farmers' protest (2020–2021) concludes that social media was the primary cause of both movements. Based on the source, what is the most significant limitation of this conclusion?", "options": [{"text": "Social media platforms were not yet widely available in the Arab world or India during those years.", "isCorrect": false, "rationale": "The text explicitly describes social media's role in both events: coordination via social media during the Arab Spring, and Indian farmers using WhatsApp. Availability was not the limitation."}, {"text": "Social media also amplified misinformation and outrage, making its net effect on political movements neutral.", "isCorrect": false, "rationale": "The text acknowledges misinformation as a risk of social media, but this does not mean the political scientist's conclusion about causation is wrong for this reason — the question asks about the primary cause claim."}, {"text": "Social media was a tool that amplified and coordinated existing grievances, but describing it as the primary cause overlooks the underlying social, economic, and political conditions that drove the movements.", "isCorrect": true, "rationale": "The text presents social media as a tool for 'organizing, communication, and self-expression' that helped coordinate movements — but the movements had substantive causes (political repression, agricultural legislation) that social media did not create. The source is careful to say it was used to 'coordinate,' not to generate, the underlying conditions."}, {"text": "The text identifies surveillance capitalism, not social media organizing, as the most consequential political use of digital technology.", "isCorrect": false, "rationale": "While the text discusses surveillance capitalism, it does not claim it supersedes social media organizing as the most consequential political application. Both are presented as significant."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
