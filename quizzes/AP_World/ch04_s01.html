        <div class="subtitle">AP World History: Modern &mdash; Technological Catalysts of European Maritime Expansion</div>

    <div id="score-box" class="score-box">

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "Which of the following best explains why the caravel was essential to Portuguese exploration of the African coast?", "options": [{"text": "Its large cargo hold allowed Portuguese merchants to carry enough trade goods to sustain multiple years of voyages without resupply.", "isCorrect": false, "rationale": "The caravel was small (50–80 tons) and not valued for cargo capacity. Its significance lay in its maneuverability and hybrid rigging, not its hold size."}, {"text": "Its hybrid lateen-and-square rigging allowed sailors to beat upwind when returning northward from equatorial Africa—the key navigational obstacle Portuguese voyagers faced.", "isCorrect": true, "rationale": "The source explicitly identifies the ability to sail upwind (beating northward from equatorial Africa) as the 'single biggest navigational obstacle' solved by the caravel's lateen sails combined with square sails for downwind speed."}, {"text": "Its deep draft and armored hull protected crews from attack by Ottoman naval vessels in the eastern Atlantic.", "isCorrect": false, "rationale": "The caravel had a shallow draft—the opposite of what this option claims—and was lightly armed. Ottoman naval presence was not the navigational challenge Portuguese explorers faced along the African coast."}, {"text": "Its oar-powered propulsion allowed navigators to move efficiently in the calm equatorial waters where trade winds were absent.", "isCorrect": false, "rationale": "The caravel was a sailing vessel, not oar-powered. The galley was the oar-powered Mediterranean vessel, and the source notes the galley was 'entirely unsuitable for Atlantic conditions.'"}], "id": "q01"}, {"question": "A Portuguese navigator in 1470 uses an astrolabe to determine his position off the coast of West Africa. Which of the following does this instrument allow him to calculate?", "options": [{"text": "His longitude, by measuring the angular distance between two stars on the horizon.", "isCorrect": false, "rationale": "The astrolabe measured the altitude of the sun or Polaris above the horizon, which yields latitude—not longitude. Accurate longitude calculation required a reliable chronometer, developed much later."}, {"text": "His latitude, by measuring the altitude of the sun or Polaris above the horizon.", "isCorrect": true, "rationale": "The source states that the astrolabe 'enabled sailors to measure the altitude of the sun or Polaris above the horizon, from which they could calculate their latitude with reasonable precision.' Portuguese navigators refined a marine version specifically for use on a pitching deck."}, {"text": "His heading, by detecting the magnetic alignment of celestial bodies relative to true north.", "isCorrect": false, "rationale": "Maintaining a heading regardless of cloud cover was the function of the magnetic compass, not the astrolabe. These were two distinct instruments with different purposes."}, {"text": "His speed, by tracking the rate at which stars moved across the sky during a timed interval.", "isCorrect": false, "rationale": "The astrolabe was a position-finding instrument, not a speed-measuring device. Speed at sea was typically estimated using a log line, a separate technique not discussed in this section."}], "id": "q02"}, {"question": "Consider the following excerpt from a historian's argument: 'The compass arrived from China, the astrolabe from the Islamic world, and the lateen sail from Arab navigators. European innovation was integrative: Iberian sailors combined these inherited tools with institutional funding to make sustained transoceanic voyages economically rational.' This argument is best described as an example of which historical reasoning skill?", "options": [{"text": "Continuity and change over time, because the historian is tracing how navigational tools remained unchanged across cultures for centuries.", "isCorrect": false, "rationale": "The argument is not primarily about continuity; it argues that a new synthesis occurred through integration of inherited tools. Change—specifically the new combination of technologies—is the emphasis, but the core reasoning skill here is causation."}, {"text": "Causation, because the historian is arguing that European expansion resulted from the integration of cross-cultural technologies and institutional financing rather than from European inherent superiority.", "isCorrect": true, "rationale": "The argument identifies specific causes of European maritime expansion (compass, astrolabe, lateen sail + institutional funding) and explicitly counters an alternative causal explanation (European superiority). This is causal argument grounded in synthesis of evidence."}, {"text": "Comparison, because the historian is evaluating Portuguese and Spanish navigational techniques against those of Chinese and Arab sailors.", "isCorrect": false, "rationale": "While the excerpt mentions Chinese and Islamic origins of technologies, its primary purpose is to explain why European expansion occurred (causation), not to systematically compare Chinese and European maritime traditions."}, {"text": "Contextualization, because the historian is situating the European voyages within the broader framework of the Ottoman conquest of Constantinople.", "isCorrect": false, "rationale": "The Ottoman conquest is discussed elsewhere in the section as an economic incentive but is not the focus of this particular argument. The excerpt is making a causal claim about the technological basis of expansion."}], "id": "q03"}, {"question": "The fall of Constantinople in 1453 contributed to Iberian maritime exploration primarily by:", "options": [{"text": "Destroying the Ottoman navy and forcing Mediterranean merchants to find alternative trade routes through Atlantic ports.", "isCorrect": false, "rationale": "The fall of Constantinople strengthened Ottoman naval and commercial power in the eastern Mediterranean, not weakened it. It did not destroy the Ottoman navy."}, {"text": "Raising the cost of overland trade to Asia by placing Ottoman intermediaries across the Levantine spice routes, incentivizing Iberian investment in sea routes that bypassed Ottoman control.", "isCorrect": true, "rationale": "The source states that the Ottoman Empire's 'consolidation of control over the eastern Mediterranean and the Levantine spice routes (culminating in the fall of Constantinople in 1453) had raised the cost of overland trade to Asia,' directly incentivizing the Portuguese African coast route and Columbus's westward voyage."}, {"text": "Providing Iberian states with experienced Byzantine cartographers whose portolan charts extended European navigational knowledge into the Atlantic.", "isCorrect": false, "rationale": "The source does not make this claim. Portolan charts were developed by Mediterranean sailors generally; Byzantine refugees are not identified as the mechanism linking Constantinople's fall to Iberian cartographic advances."}, {"text": "Triggering a religious crusade in which Portuguese and Spanish monarchs committed resources to outflanking the Ottoman Empire by reaching the Holy Land via Africa.", "isCorrect": false, "rationale": "While crusading motives played some role in Iberian expansion, the source emphasizes economic incentives—spice profits and bypassing Ottoman intermediaries—as the primary driver, not a military outflanking strategy toward the Holy Land."}], "id": "q04"}, {"question": "The Spanish Casa de Contratación, established in 1503, is best understood as an example of:", "options": [{"text": "Joint-stock financing, in which private investors pooled capital to fund exploration in exchange for shares of any profits.", "isCorrect": false, "rationale": "The Casa de Contratación was a state agency, not a joint-stock company. Joint-stock financing involved private investors, while the Casa was an instrument of royal control over Atlantic commerce."}, {"text": "State sponsorship of exploration, in which the crown created an institution to license, finance, and regulate Atlantic voyages and extract royal revenue from their profits.", "isCorrect": true, "rationale": "The source describes the Casa de Contratación as a 'state agency that licensed, financed, and regulated Atlantic voyages, extracting a royal fifth (quinto real) of all precious metals and trade profits,' and concludes that 'state sponsorship transformed exploration from private adventure into imperial project.'"}, {"text": "Mercantile capitalism, in which merchant guilds operated trading networks independently of royal authority to maximize commercial profit.", "isCorrect": false, "rationale": "The Casa de Contratación represented royal control over trade, not merchant-guild independence. It was specifically designed to subordinate Atlantic commerce to crown authority."}, {"text": "Technological innovation, in which Spain invested crown revenues in designing superior ship types to compete with Portuguese caravels.", "isCorrect": false, "rationale": "The Casa de Contratación was a regulatory and financial institution, not a shipbuilding research body. The caravel was a Portuguese development; this option confuses categories."}], "id": "q05"}, {"question": "Which of the following represents the most accurate characterization of the technological origins of European maritime expansion?", "options": [{"text": "European expansion was driven by technologies that Europeans had independently invented, reflecting superior European scientific capability in the fifteenth century.", "isCorrect": false, "rationale": "The source explicitly states the opposite: 'None of these technologies was originally European: the compass arrived from China, the astrolabe from the Islamic world, and the lateen sail from Arab navigators.' European innovation was integrative, not independent invention."}, {"text": "European expansion was enabled by the integration of navigational instruments and ship designs borrowed from Chinese, Islamic, and Arab sources, combined with Iberian institutional funding and political incentives.", "isCorrect": true, "rationale": "This matches the source's key concept: 'European innovation was integrative: Iberian sailors combined these inherited tools with institutional funding (Portuguese royal investment, Italian banking capital) to make sustained transoceanic voyages economically rational.'"}, {"text": "European expansion was primarily a product of Chinese cartographic knowledge shared with Iberian sailors through Arab intermediaries during the fourteenth century.", "isCorrect": false, "rationale": "While Arab intermediaries did transmit the magnetic compass from China to Europe, the cartographic knowledge described in the source (portolan charts) was developed by Mediterranean sailors themselves, and Chinese cartography is not identified as a primary input."}, {"text": "European expansion was accidental—Columbus's miscalculation of the Earth's circumference was symptomatic of primitive European geographic knowledge that happened to produce a fortunate outcome.", "isCorrect": false, "rationale": "While Columbus's miscalculation is mentioned, the source frames the broader expansion as the product of deliberate institutional investment and specific technological convergence, not accident or ignorance."}], "id": "q06"}, {"question": "Imagine a fifteenth-century Italian banking family deciding whether to invest in a Portuguese Atlantic expedition. Based on the section's content, which of the following arguments would BEST justify the investment?", "options": [{"text": "The expedition carries low individual risk because the joint-stock structure allows losses to be spread across multiple investors, while the potential profit from spice trade monopoly is enormous.", "isCorrect": true, "rationale": "The source explains that joint-stock financing 'spread risk across a syndicate' while the spice trade's 'high value-to-weight ratio made them ideal maritime cargo' with potential for 'enormous profit.' These are precisely the arguments that made Atlantic investment rational for Italian banking families."}, {"text": "The expedition is guaranteed to succeed because Portuguese caravels have been proven undefeatable in combat with Ottoman warships in the Mediterranean.", "isCorrect": false, "rationale": "Caravels were lightly armed coastal exploration vessels, not warships designed for combat with the Ottoman navy. No such guarantee is suggested in the source; the entire point of joint-stock financing was that the risk was real and needed to be shared."}, {"text": "Portuguese technology is so superior to all competitors that any expedition will return with profits before rival powers can mount competing voyages.", "isCorrect": false, "rationale": "The source notes that European technology was integrative rather than uniquely superior, and that rival powers (Spain, the Netherlands, England, France) quickly entered the Atlantic competition. Speed-to-market through technological superiority alone was not the argument."}, {"text": "The Spanish crown has already agreed to share the profits from any discoveries with Genoese investors, eliminating financial risk entirely.", "isCorrect": false, "rationale": "While Columbus was Genoese and secured Spanish crown financing, the crown extracted a 'royal fifth' of profits rather than guaranteeing Genoese investors a share. The source does not suggest risk was eliminated; joint-stock financing existed precisely because risk was substantial."}], "id": "q07"}, {"question": "Columbus miscalculated the circumference of the Earth by approximately forty percent. What was the most significant consequence of this error for the history of European expansion?", "options": [{"text": "The error caused Columbus to miss Asia entirely, condemning the 1492 expedition to failure and making Spain reluctant to fund future Atlantic voyages.", "isCorrect": false, "rationale": "The 1492 voyage was not a failure—it initiated sustained European contact with the Americas. The error's consequence was encountering the Americas, not a failed voyage that discouraged further investment."}, {"text": "The error led Columbus to underestimate the distance to Asia, but the uncharted Americas lay across his path—an outcome that proved transformative rather than fatal.", "isCorrect": true, "rationale": "The source states directly: Columbus 'miscalculated the circumference of the Earth by roughly forty percent—a fortunate error, since without the unknown Americas in the way, his crew would have died of thirst before reaching Asia.' The Americas were the unintended but transformative result."}, {"text": "The error forced Columbus to turn back before completing the crossing, causing him to return to Spain with false reports of islands lying close to Europe.", "isCorrect": false, "rationale": "Columbus did not turn back—he completed the crossing and encountered the Caribbean. The error was in his calculation of Earth's size, not a navigational failure that caused the voyage to abort."}, {"text": "The error prompted the Spanish crown to commission more accurate cartographic surveys before authorizing a second voyage, significantly delaying European engagement with the Americas.", "isCorrect": false, "rationale": "The Spanish crown moved quickly to authorize follow-up expeditions. There is no evidence in the source of a delay caused by cartographic verification; Columbus's error was not immediately corrected before subsequent voyages."}], "id": "q08"}, {"question": "Portolan charts contributed to sustained transoceanic exploration primarily because they:", "options": [{"text": "Provided navigators with accurate longitude readings, allowing precise open-ocean positioning for the first time.", "isCorrect": false, "rationale": "Portolan charts were compass-bearing coastal maps, not longitude-calculating instruments. Longitude measurement was still unsolved in the fifteenth century. Portolan charts recorded known coastal routes and hazards."}, {"text": "Created institutional knowledge that accumulated voyage by voyage, giving navigators a shared visual record of known routes and hazards that could be extended with each new expedition.", "isCorrect": true, "rationale": "The source states that portolan charts 'gave navigators a shared visual record of known routes and hazards' and that Portuguese expeditions 'extended portolan charts into previously uncharted territory, creating institutional knowledge that accumulated voyage by voyage.' This cumulative institutional knowledge was the key contribution."}, {"text": "Replaced the magnetic compass as the primary navigational tool, allowing explorers to determine their heading without relying on magnetic variation.", "isCorrect": false, "rationale": "Portolan charts did not replace the magnetic compass—they were complementary tools. Charts provided route records; the compass maintained heading. Neither made the other obsolete."}, {"text": "Were commissioned by the Spanish crown as a state secret, preventing rival powers from learning the routes that Portuguese explorers had charted along the African coast.", "isCorrect": false, "rationale": "The source does not describe portolan charts as state secrets. They were shared navigational documents developed by Mediterranean sailors and extended by Portuguese expeditions. Secrecy is not identified as a feature of this knowledge system."}], "id": "q09"}, {"question": "Which of the following comparisons between Chinese and European maritime activity in the fifteenth century is most consistent with the section's argument?", "options": [{"text": "China possessed superior navigational technology in 1450, but Chinese maritime activity declined after the state withdrew funding, while Iberian maritime activity accelerated because state and private financing converged.", "isCorrect": true, "rationale": "The source notes that 'Chinese junks had been navigating monsoon seas for centuries' and that what changed in Iberia was 'a particular cluster of technologies, financial instruments, and political incentives' converging to make sustained voyages 'commercially viable.' The contrast with China's state withdrawal from exploration is implicit in the section's framing of institutional funding as crucial."}, {"text": "China had no interest in maritime commerce in the fifteenth century and had already dismantled its naval capacity before the Portuguese began their African expeditions.", "isCorrect": false, "rationale": "This overstates Chinese naval decline. The source acknowledges Chinese navigational sophistication; China's withdrawal from long-distance state-sponsored voyages occurred after Zheng He's expeditions (1405–1433), but Chinese merchant activity in Southeast Asia continued."}, {"text": "European navigational technology surpassed Chinese technology by 1400, creating a capability gap that explains why Europeans, not Chinese, reached the Americas first.", "isCorrect": false, "rationale": "The source explicitly states that Europeans were 'technological latecomers' by world standards in the mid-fifteenth century. The argument is about institutional and economic convergence, not a European technological lead over China."}, {"text": "Portugal and China were engaged in a direct maritime rivalry in the Indian Ocean that forced Portugal to seek Atlantic routes as a fallback strategy.", "isCorrect": false, "rationale": "There was no direct Portuguese–Chinese maritime rivalry that forced Portugal into the Atlantic. Portugal's African coast route was driven by the spice trade incentive and the Ottoman barrier, not Chinese competition."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
