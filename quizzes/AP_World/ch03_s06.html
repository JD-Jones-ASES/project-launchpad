<body>

        <div class="subtitle">AP World History: Modern &mdash; Coercive Military Systems</div>

        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "The source argues that the devshirme system and the Japanese samurai both solved the same problem — loyal military forces — through 'opposite solutions with the same result.' What was the problem they were solving, and what was the shared result?", "options": [{"text": "Problem: how to defeat external enemies with limited manpower. Result: both systems produced the most powerful armies of the sixteenth century.", "isCorrect": false, "rationale": "The source frames the problem as internal loyalty — keeping military forces loyal to the central state rather than to regional lords or ethnic communities. The result is not raw military power but controlled loyalty combined with political dependence."}, {"text": "Problem: how to maintain military forces loyal to the central state rather than to regional lords, ethnic communities, or religious factions. Result: in both systems, the warrior class was simultaneously privileged and controlled — elevated enough to enforce state authority, constrained enough not to threaten it.", "isCorrect": true, "rationale": "The source's Key Concept states exactly this: 'The devshirme created social mobility from below... The samurai institutionalized hereditary status from above... In both systems, the warrior class was simultaneously privileged and controlled — elevated enough to enforce state authority, constrained enough not to threaten it.'"}, {"text": "Problem: how to defeat cavalry-based armies with gunpowder weapons. Result: both systems produced elite infantry forces trained in firearms.", "isCorrect": false, "rationale": "While the Janissaries adopted firearms, the samurai were not primarily a firearms force, and the source's analysis of the common problem focuses on loyalty and control, not cavalry-defeating technology."}, {"text": "Problem: how to tax military forces without provoking rebellion. Result: both systems tied military service to land grants that the state could reclaim at will.", "isCorrect": false, "rationale": "The source does not focus on taxation of military forces. Samurai received stipends from their lords, not primarily land grants reclaimed by the state. The devshirme recruits were paid but did not hold traditional land grants."}], "id": "q01"}, {"question": "A devshirme recruit is conscripted at age twelve from a Christian village in the Balkans. Twenty years later, he has become a Grand Vizier — effectively the Ottoman Empire's prime minister. Which statement BEST explains how this was possible within the devshirme system?", "options": [{"text": "The Ottoman Empire had no hereditary nobility, so all advancement was purely merit-based and equally open to all subjects.", "isCorrect": false, "rationale": "The Ottoman Empire had a hereditary Muslim landowning class. The devshirme specifically circumvented hereditary limitation by recruiting from outside this class — it was not a universal meritocracy open to all."}, {"text": "Devshirme graduates could rise to the highest offices — including Grand Vizier — precisely because their elevation came from the sultan's favor alone. Their lack of family connections or hereditary estates made them maximally loyal and promotable.", "isCorrect": true, "rationale": "The source states: 'The position of Grand Vizier, effectively the empire's prime minister, was frequently held by a devshirme graduate... men taken as children from Christian peasant families rose to govern one of the world's most powerful states.' Their promotability derived from the sultan's total control over their status."}, {"text": "Christian-born officials were preferred for high positions because they could mediate between the Muslim Ottoman state and the large Christian populations of the Balkans.", "isCorrect": false, "rationale": "Devshirme recruits were converted to Islam — they were no longer functioning as representatives of Christian communities. Their Christian origin was the starting condition, not a continuing political role."}, {"text": "Ottoman law required that all high administrative positions be filled by devshirme graduates to prevent hereditary noble families from controlling the state.", "isCorrect": false, "rationale": "The source does not describe a legal requirement that all high offices go to devshirme graduates. The system produced many high officials, but Muslim-born nobles also held positions. The advantage of devshirme officials was loyalty through total dependence."}], "id": "q02"}, {"question": "The Janissaries are described in the source as 'a revolutionary military innovation' in the fifteenth and sixteenth centuries. What made them revolutionary by contemporary standards?", "options": [{"text": "They were the first army in world history to use firearms systematically, giving the Ottomans an insurmountable military advantage.", "isCorrect": false, "rationale": "While the Janissaries adopted firearms early and consistently, they were not literally the first to use them — gunpowder weapons had been used in China and spread westward. The revolutionary quality was their professional, full-time, salaried status compared to feudal and tribal military alternatives."}, {"text": "Unlike feudal levies or tribal warriors, the Janissaries were full-time professional soldiers — housed in barracks, paid regular salaries, trained constantly — loyal to the state rather than to seasonal campaigning or clan obligations.", "isCorrect": true, "rationale": "The source states: 'Unlike feudal levies that showed up for a campaign and then returned home, or tribal warriors whose loyalty was to their clan, Janissaries were full-time professional soldiers, housed in barracks in Istanbul and paid regular salaries.'"}, {"text": "The Janissaries were revolutionary because they were the first military force to be recruited from conquered Christian populations, giving the Ottoman army access to the martial traditions of multiple cultures.", "isCorrect": false, "rationale": "Recruiting from subject populations was not unprecedented in world history. The revolutionary quality the source identifies is their professional, permanent, salaried character — not the ethnic diversity of their recruitment."}, {"text": "The Janissaries were revolutionary because they adopted cavalry tactics that combined speed with the firepower of early artillery.", "isCorrect": false, "rationale": "The Janissaries were infantry, not cavalry. The source explicitly describes them as 'elite infantry corps' — their value was as a stable, professional, firearms-armed infantry force, not as cavalry."}], "id": "q03"}, {"question": "The Tokugawa shogunate's sankin-kōtai ('alternate attendance') system required daimyō to spend alternating years in their home domains and in the shogunal capital of Edo. How does this compare to Louis XIV's use of Versailles to control the French nobility?", "options": [{"text": "The systems are fundamentally different: sankin-kōtai was a military obligation while Versailles attendance was purely voluntary and social.", "isCorrect": false, "rationale": "Both were compulsory — Versailles residence was required of the most powerful French nobles, not truly voluntary. The structural logic (nobles kept near the ruler, away from their estates) was identical."}, {"text": "Both systems used mandatory noble presence near the ruler to achieve identical political goals: keeping potentially dangerous elites under surveillance, draining their financial resources (two households / expensive court life), and preventing the buildup of independent power or alliances.", "isCorrect": true, "rationale": "The source's Checkpoint question draws exactly this comparison. Sankin-kōtai drained daimyō finances (two households), kept them under the shogun's eye, and prevented alliances. Versailles removed French nobles from their independent power bases. Both controlled elite power through required proximity."}, {"text": "Both systems produced the same result: the noble class eventually overthrew the ruler through coordinated rebellion organized during their mandatory residences at the central court.", "isCorrect": false, "rationale": "Neither system ended in coordinated noble rebellion. The Tokugawa shogunate lasted until 1868; the Bourbon monarchy was not toppled by the nobility. This outcome is not supported by the source."}, {"text": "Sankin-kōtai was designed to promote commerce by requiring daimyō and their large retinues to travel annually, stimulating trade along the roads between domains and Edo.", "isCorrect": false, "rationale": "While sankin-kōtai did have commercial side effects (road building, travel spending), the source's analysis identifies the political purpose — financial drain, surveillance, prevention of alliances — not economic stimulation as the system's intent."}], "id": "q04"}, {"question": "Read this passage: 'The Janissaries, designed to be the sultan's most loyal troops, became over time the most dangerous threat to the sultan's power.' Which historical process does this passage BEST illustrate?", "options": [{"text": "Military decline: the Janissaries gradually lost their effectiveness due to outdated weapons and poor training as other armies modernized.", "isCorrect": false, "rationale": "The source's explanation for the Janissaries' transformation is not military decline in weaponry but political transformation — they became hereditary, lost professional discipline, and became a conservative political faction that 'made and unmade sultans.' The issue is political, not technical."}, {"text": "Institutional calcification: military systems designed for one set of political conditions became conservative obstacles as conditions changed, with the Janissaries evolving from a loyal professional force into a hereditary political faction that could depose sultans.", "isCorrect": true, "rationale": "The source explicitly frames this as a broader truth: 'military systems designed for one set of political and military conditions tend to calcify into obstacles as conditions change.' The Janissaries' hereditary admission and political factionalism are the specific mechanism."}, {"text": "Religious conflict: the Janissaries, originally Christian-born, reverted to Christian political loyalties over generations and used their power to undermine the Islamic Ottoman state.", "isCorrect": false, "rationale": "The source does not describe religious reversion as the mechanism of Janissary political independence. The issue was hereditary admission and self-interest — not religious identity reversal. Janissary sons who enrolled would have been Muslim-born."}, {"text": "Demographic change: the Janissaries' power declined as the Ottoman population grew faster than the devshirme quota, making the corps too small relative to the empire's military needs.", "isCorrect": false, "rationale": "The source describes the opposite demographic trajectory: the Janissary corps admitted Muslim-born recruits and sons of Janissaries, expanding beyond its original devshirme-only recruitment. The problem was political transformation, not demographic shrinkage."}], "id": "q05"}, {"question": "A Japanese samurai in 1700 finds his stipend reduced while a merchant neighbor's wealth has grown substantially. According to the source, what structural contradiction does this situation reveal about the Tokugawa social hierarchy?", "options": [{"text": "The Tokugawa hierarchy correctly placed samurai above merchants, and the samurai's poverty was simply the result of his personal financial mismanagement.", "isCorrect": false, "rationale": "The source describes the samurai-merchant wealth gap as a structural contradiction in the Tokugawa system, not a personal failure. The system designed to elevate samurai above merchants became 'increasingly absurd as merchant wealth grew and samurai stipends shrank.'"}, {"text": "The social hierarchy that placed samurai above merchants (who were banned from trade) became increasingly disconnected from economic reality — samurai with declining stipends could not maintain their status superiority over merchants whose commercial wealth was growing.", "isCorrect": true, "rationale": "The source states: 'The social hierarchy that elevated them above merchants became increasingly absurd as merchant wealth grew and samurai stipends shrank.' Samurai were forbidden to engage in trade; their status depended on stipends. Long peace made their warrior role obsolete while commerce expanded."}, {"text": "The Tokugawa system was working as intended — the samurai's poverty demonstrated the system's success in suppressing merchant class aspirations by keeping warriors dominant.", "isCorrect": false, "rationale": "The source presents this as a dysfunction, not a success: the hierarchy was becoming 'increasingly absurd,' suggesting the system was failing to maintain the social order it was designed to produce."}, {"text": "This situation shows that the Tokugawa shogunate was secretly promoting merchant wealth to fund military modernization that could not be publicly acknowledged.", "isCorrect": false, "rationale": "No such covert merchant promotion is described in the source. The source presents the merchant wealth growth as an unintended consequence of long peace and commercial development, not a deliberate policy."}], "id": "q06"}, {"question": "Which statement MOST ACCURATELY describes the difference between how the devshirme and the samurai systems created loyalty in their respective military forces?", "options": [{"text": "The devshirme created loyalty through fear of execution; the samurai created loyalty through the code of bushidō (honor and acceptance of death).", "isCorrect": false, "rationale": "While fear could be an element, the source's analytical distinction is structural: devshirme created loyalty through upward social mobility from zero-baseline + total dependence on the sultan; samurai loyalty came from hereditary identity + financial dependence on lords' stipends, controlled by Tokugawa institutions."}, {"text": "The devshirme created loyalty by elevating boys from the lowest social position to total dependence on the sultan's favor — no independent base, no alternative. The samurai system created loyalty by making an existing hereditary class financially dependent on lords' stipends while alternate-attendance drained their capacity for independent action.", "isCorrect": true, "rationale": "The source's Key Concept makes this structural distinction explicit: devshirme created 'social mobility from below' with total state dependence; the samurai institutionalized 'hereditary status from above' with Tokugawa controls (financial dependence, sankin-kōtai) preventing that status from translating into autonomous power."}, {"text": "The devshirme created loyalty through religious conversion to Islam; the samurai created loyalty through the emperor's religious authority as a divine figure.", "isCorrect": false, "rationale": "Religious conversion was part of devshirme, but the source's analysis of loyalty focuses on structural dependence, not ideology. The Tokugawa shogun's authority was not primarily religious; the emperor was largely a symbolic figurehead."}, {"text": "Both systems created loyalty through identical mechanisms: hereditary status tied to military service, and regular salaries paid by the central state.", "isCorrect": false, "rationale": "The source specifically argues these were 'opposite solutions': devshirme was non-hereditary (selected from outside) while samurai status was hereditary. Janissaries received state salaries; samurai received stipends from their lords, not directly from the shogun."}], "id": "q07"}, {"question": "The Sengoku ('Warring States') period in Japan (1467–1615) preceded the Tokugawa consolidation. How does the source use this context to explain what the Tokugawa system was designed to prevent?", "options": [{"text": "The Sengoku period showed that daimyō could not maintain loyalty to the emperor — so the Tokugawa transferred all loyalty to the emperor directly, bypassing the daimyō.", "isCorrect": false, "rationale": "The Tokugawa established a shogunate with the shogun as effective ruler, not a direct emperor-loyalty system. The daimyō remained as regional lords under Tokugawa supervision, not abolished or bypassed."}, {"text": "The century of civil war in which regional lords (daimyō) competed for supremacy demonstrated that hereditary samurai clans with independent power bases could tear the country apart — the Tokugawa controls were designed to prevent samurai domains from accumulating enough autonomy to restart civil war.", "isCorrect": true, "rationale": "The source describes the Sengoku period as 'a century of civil war in which regional lords (daimyō) competed for supremacy' and then frames the Tokugawa system as a response: 'the Tokugawa solution was a system of elaborate controls' — sankin-kōtai, financial drain, rigid hierarchy — to prevent the independent samurai power that had caused civil war."}, {"text": "The Sengoku period showed that Japanese armies were inferior to Mongolian cavalry — so the Tokugawa built a professional gunpowder infantry force similar to the Ottoman Janissaries.", "isCorrect": false, "rationale": "The source does not connect the Sengoku period to Mongol military threat. The period was an internal Japanese civil war among competing daimyō; the Tokugawa controls were designed for internal stability, not to address external nomadic threat."}, {"text": "The Sengoku period proved that hereditary military classes were militarily ineffective — so the Tokugawa replaced samurai with conscripted peasant armies.", "isCorrect": false, "rationale": "The Tokugawa did not replace samurai with conscript armies — they controlled the existing samurai class through institutional mechanisms. Peasant conscription in Japan came later, with the Meiji era."}], "id": "q08"}, {"question": "The source states that devshirme graduates 'had no independent noble families, estates, or tribal followings. Their power derived entirely from the sultan's favor, and it could be removed — along with their heads — at any moment.' Which political concept does this BEST illustrate?", "options": [{"text": "Feudalism — a system in which military service is exchanged for land grants that become hereditary family estates.", "isCorrect": false, "rationale": "The description is precisely the anti-feudal: devshirme officials held no hereditary estates and owed their position to the sultan alone, not to a feudal exchange of land for service. The Ottoman system deliberately excluded the hereditary land-for-loyalty logic of feudalism."}, {"text": "Controlled social mobility as a loyalty mechanism — elevating individuals to power while making that power entirely conditional on the ruler's continued favor, with no independent resource base to sustain independent action.", "isCorrect": true, "rationale": "The source's analysis throughout is that the devshirme created 'controlled loyalty': high officials with no alternative power base, total dependence on the sultan, removable at will. This is controlled social mobility as structural loyalty production."}, {"text": "The separation of powers — making high officials accountable to multiple institutions (senate, courts, military) rather than a single ruler.", "isCorrect": false, "rationale": "Devshirme officials were accountable to the sultan alone — the opposite of separated powers. Their lack of independent bases made them more, not less, concentrated in a single chain of command to the sultan."}, {"text": "Popular sovereignty — officials' power derived from the people they governed rather than from royal appointment.", "isCorrect": false, "rationale": "Devshirme officials' power derived entirely from the sultan's favor, not from popular consent. Popular sovereignty is a political philosophy associated with Enlightenment thought, not the Ottoman administrative system."}], "id": "q09"}, {"question": "Both the Ottoman Janissary corps and the Japanese samurai class eventually became 'obstacles' rather than assets, according to the source. Which pairing MOST ACCURATELY represents the specific mechanism of decline in each case?", "options": [{"text": "Janissaries: abolished by European-style armies they could not defeat. Samurai: dissolved because the Tokugawa shogunate banned all private military forces.", "isCorrect": false, "rationale": "The Janissaries were abolished by the sultan himself (Mahmud II in 1826, the 'Auspicious Incident') — not defeated by an external enemy. The samurai were not dissolved by a general ban on private military forces during the Tokugawa period."}, {"text": "Janissaries: hereditary admission and self-interest transformed them into a conservative political faction that made and unmade sultans. Samurai: long peace made their warrior role superfluous, while shrinking stipends and rising merchant wealth eroded the social hierarchy that justified their status.", "isCorrect": true, "rationale": "The source describes exactly these two mechanisms: Janissaries 'became hereditary in the seventeenth century, the corps lost its professional character and became a self-interested political faction' that 'made and unmade sultans.' Samurai drifted 'into administrative roles, scholarship, or ronin status' as merchant wealth grew and stipends shrank."}, {"text": "Janissaries: their Christian origins led to accusations of treason that destroyed the corps. Samurai: their code of bushidō made them too proud to accept Tokugawa authority and they revolted.", "isCorrect": false, "rationale": "Devshirme graduates were Muslims by the time they served as Janissaries — Christian-origin treason accusations are not described as the mechanism of decline. The samurai did not revolt successfully against Tokugawa authority; the system successfully controlled them for two and a half centuries."}, {"text": "Both declined for the same reason: financial corruption within the corps leadership drained the resources needed to maintain professional training standards.", "isCorrect": false, "rationale": "The source identifies different mechanisms for each: political factionalism (Janissaries) and structural irrelevance in conditions of peace (samurai). A single financial-corruption explanation does not match the text's analysis."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
