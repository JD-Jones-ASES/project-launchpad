<body>

        <div class="subtitle">AP World History: Modern &mdash; World War I: Causes (MAIN)</div>

    <div id="score-box" class="score-box">

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "The Schlieffen Plan required Germany to attack through neutral Belgium before turning east against Russia. Which characteristic of pre-1914 militarism does this plan most clearly illustrate?", "options": [{"text": "That European military planners prioritized the defense of neutral nations above offensive strategy.", "isCorrect": false, "rationale": "The Schlieffen Plan violated Belgian neutrality. It did not prioritize defending neutral nations — it required passing through one as a strategic necessity. This directly contradicts the option."}, {"text": "That European military planners believed rapid, total offensives were superior to defensive or diplomatic approaches, and that once mobilization began it had to proceed to its conclusion.", "isCorrect": true, "rationale": "The plan embodied the 'cult of the offensive' — the belief that rapid, decisive military action was the path to victory. Critically, 'the plan had no pause option: once mobilization began, it had to proceed to its conclusion,' meaning military timetables drove decisions rather than diplomatic deliberation."}, {"text": "That Germany lacked the industrial capacity to fight on two fronts simultaneously.", "isCorrect": false, "rationale": "The Schlieffen Plan was designed precisely to allow Germany to fight on two fronts — knocking out France quickly before turning east. It reflects confidence in Germany's military capacity, not a recognition of industrial weakness."}, {"text": "That German military planners expected France to remain neutral in any Austro-Serbian conflict.", "isCorrect": false, "rationale": "The Schlieffen Plan assumed France would enter the war on Russia's side — that's why Germany needed to knock France out first. German planners did not expect French neutrality."}], "id": "q01"}, {"question": "A historian argues: 'The alliance system did not cause World War I in the sense of making it inevitable; rather, it transformed a manageable crisis into a catastrophic one.' Which sequence of events from the July Crisis best supports this argument?", "options": [{"text": "The assassination of Franz Ferdinand → Austria-Hungary's ultimatum → Serbia's refusal → immediate pan-European war.", "isCorrect": false, "rationale": "Serbia partially complied with the ultimatum — it did not simply refuse. More importantly, this sequence omits the alliance mechanism: Russia's mobilization triggering Germany's declarations, and Britain's entry over Belgian neutrality. The alliances are the key transformation mechanism the argument highlights."}, {"text": "Austria-Hungary declares war on Serbia → Russia mobilizes to defend Serbia → Germany declares war on Russia and France → Britain declares war on Germany over Belgian neutrality.", "isCorrect": true, "rationale": "This sequence exactly illustrates how the alliance system transformed a bilateral Austro-Serbian dispute into a world war. Each step was driven by alliance commitments: Germany honored its Austrian alliance; Britain honored its 1839 treaty guaranteeing Belgian neutrality. The alliances 'rewarded commitment and punished hesitation,' making escalation automatic."}, {"text": "Germany invades France → Britain and Russia mobilize to defend France → Austria-Hungary joins to support Germany.", "isCorrect": false, "rationale": "This sequence is historically inaccurate. Germany declared war on France (3 August) after declaring war on Russia (1 August), and Austria-Hungary was the initial aggressor against Serbia before Germany's declarations. The sequence misorders the escalation steps."}, {"text": "Russia mobilizes first → Germany responds defensively → France is forced to choose sides.", "isCorrect": false, "rationale": "Germany's war plan required it to attack France regardless of who mobilized first. This option implies German behavior was purely defensive and reactive, which misrepresents the Schlieffen Plan logic and Germany's own declarations of war on Russia and France."}], "id": "q02"}, {"question": "The text states that World War I 'was not a European war that happened to involve a few colonial auxiliaries. It was a world war in which imperial systems mobilized the populations of every inhabited continent.' Which evidence from the section best supports this claim?", "options": [{"text": "The naval arms race between Britain and Germany, which spread to their respective colonial possessions.", "isCorrect": false, "rationale": "The naval arms race was a European great-power competition. While the British navy patrolled colonial waters, the section's evidence for the war's global character focuses on colonial manpower contributions, not naval technology competition."}, {"text": "The fact that Australia, New Zealand, Canada, and South Africa joined the war on Britain's side as Dominion nations.", "isCorrect": false, "rationale": "Dominion contributions are listed as one example, but the strongest evidence in the section is the scale of non-white colonial contribution: 1.5 million Indian troops, 600,000 West African soldiers, 140,000 Chinese laborers — populations mobilized from Asia and Africa, not self-governing Dominions."}, {"text": "Over 1.5 million Indian troops, approximately 600,000 West African tirailleurs sénégalais, and 140,000 Chinese laborers contributed to Allied operations in multiple theaters.", "isCorrect": true, "rationale": "The section explicitly lists these as evidence that the war mobilized non-European colonial populations — Indian troops across France, Mesopotamia, East Africa, and Gallipoli; West African soldiers in France and across Africa; Chinese laborers behind the Western Front. These figures demonstrate that imperial systems mobilized Asia and Africa for a war often framed as European."}, {"text": "The United States' entry into the war in 1917 extended the conflict beyond Europe into the Atlantic and Pacific.", "isCorrect": false, "rationale": "The section does not mention US entry; it focuses on colonial contributions. More importantly, the claim the section makes is about imperial systems mobilizing colonial peoples — not about the US, which was not a colonial power in the same sense."}], "id": "q03"}, {"question": "The two Moroccan Crises (1905–1906, 1911) are cited as examples of imperialism as a cause of World War I. What was their primary significance in this context?", "options": [{"text": "They resulted in France and Germany formally dividing Morocco between their empires, demonstrating that imperial competition could be resolved peacefully.", "isCorrect": false, "rationale": "The Moroccan Crises were not peacefully resolved by a division of Morocco — Morocco remained a French protectorate. Their significance was as near-conflicts and flashpoints of great-power rivalry that created a 'general climate of great-power rivalry,' not as examples of successful compromise."}, {"text": "They brought France and Germany close to war and contributed to a general climate of great-power rivalry that made the 1914 crisis harder to contain.", "isCorrect": true, "rationale": "The section explicitly names the Moroccan Crises as examples of how 'imperial competition created both specific flashpoints and a general climate of great-power rivalry.' They are cited alongside the Balkan Wars as evidence that imperial competition raised the temperature of European relations before 1914."}, {"text": "They demonstrated that the alliance system was strong enough to prevent any colonial dispute from escalating into a European war.", "isCorrect": false, "rationale": "The Moroccan Crises are not presented as demonstrations of alliance stability; they are presented as evidence of the dangerous rivalry that imperialism produced. The crises heightened tensions rather than showing that the system could manage them."}, {"text": "They caused Britain to abandon its policy of 'splendid isolation' and formally join the Triple Entente with France and Russia.", "isCorrect": false, "rationale": "Britain's Entente Cordiale with France (1904) and the Triple Entente's loose formation predate the second Moroccan Crisis. The crises did not cause British alliance formation in the direct way this option implies."}], "id": "q04"}, {"question": "Which of the following best explains why the principle of 'self-determination' was, as the text argues, 'deeply problematic' in its application after 1918?", "options": [{"text": "Self-determination was rejected by Woodrow Wilson, who believed multi-ethnic empires were more stable than ethnically defined nation-states.", "isCorrect": false, "rationale": "Wilson was self-determination's primary champion, not its opponent — he articulated it as a war aim in 1918. This option inverts the historical reality."}, {"text": "In multi-ethnic regions, drawing borders on ethnic lines was geometrically impossible without creating new minorities, and the promise was extended primarily to white Europeans while being denied to colonized peoples.", "isCorrect": true, "rationale": "The source's definition of self-determination explicitly identifies both problems: 'drawing borders on ethnic lines was geometrically impossible without creating new minorities, and the promise of self-determination was extended primarily to white Europeans while being denied to colonized peoples in Asia, Africa, and the Middle East.'"}, {"text": "Self-determination was too radical an idea for European governments to accept, so Wilson's proposal was rejected at the Paris Peace Conference entirely.", "isCorrect": false, "rationale": "Self-determination was applied — selectively — at Paris. New states were carved from the Habsburg, Ottoman, and Romanov empires. The problem was not total rejection but selective application that excluded colonized peoples while creating new minority problems in Europe."}, {"text": "The principle was used by Austria-Hungary as justification for annexing Slavic-majority territories, reversing the intent of Wilson's framework.", "isCorrect": false, "rationale": "Austria-Hungary ceased to exist before the Paris Peace Conference. It did not invoke self-determination to annex territories; it was itself broken apart. This option is historically backwards."}], "id": "q05"}, {"question": "Which of the following correctly pairs a cause from the MAIN framework with its specific mechanism in the July 1914 crisis?", "options": [{"text": "Militarism → German mobilization timetables (the Schlieffen Plan) left no 'pause option,' converting diplomatic hesitation into strategic disadvantage.", "isCorrect": true, "rationale": "The source directly connects militarism to the Schlieffen Plan's no-pause logic: 'each power feared that hesitation would allow its rivals to mobilize first.' This is the precise mechanism by which militarism — specifically military planning culture — drove escalation during the July Crisis."}, {"text": "Alliances → Germany's alliance with Austria-Hungary prevented Austria-Hungary from issuing an ultimatum to Serbia.", "isCorrect": false, "rationale": "This is the opposite of what occurred. Germany's alliance with Austria-Hungary supported, not prevented, the ultimatum. The alliance gave Austria-Hungary confidence to confront Serbia, knowing Germany would back it."}, {"text": "Imperialism → colonial competition over Moroccan resources directly triggered the assassination of Franz Ferdinand.", "isCorrect": false, "rationale": "The assassination was an act of South Slavic nationalism, not colonial competition over Morocco. Imperialism is cited as a background cause of prewar rivalry, not the direct trigger of the assassination."}, {"text": "Nationalism → pan-German nationalism caused Germany to invade France first before addressing any other front.", "isCorrect": false, "rationale": "Germany invaded France first because of the Schlieffen Plan's military logic, not primarily because of pan-German nationalism. The Schlieffen Plan was a strategic response to two-front war, not a nationalist decision to target France specifically."}], "id": "q06"}, {"question": "Why did Gavrilo Princip's assassination of Archduke Franz Ferdinand in Sarajevo represent, as the text argues, 'nationalism's most dramatic act'?", "options": [{"text": "Because it was the first political assassination in European history to trigger a military response from a major power.", "isCorrect": false, "rationale": "The section does not make this claim and it is historically inaccurate. Political assassinations had triggered military responses before. The assassination's significance is not its novelty as a trigger but its ideological meaning as a nationalist act."}, {"text": "Because Princip was sponsored by the German government to destabilize the Austro-Hungarian Empire.", "isCorrect": false, "rationale": "Princip was a Bosnian Serb nationalist, not a German agent. He was connected to Serbian nationalist networks (specifically the Black Hand organization), not German government sponsorship. This attribution is historically false."}, {"text": "Because it was committed by a South Slavic nationalist who believed nations, not dynastic empires, should govern peoples — the culmination of years of nationalist agitation within Habsburg territory.", "isCorrect": true, "rationale": "The source states the assassination was 'nationalism's most dramatic act: a political murder committed precisely because the assassins believed that nations, not dynastic empires, should govern peoples.' It was 'the culmination of years of South Slavic agitation,' making it ideologically representative of the nationalist challenge to multi-ethnic empire."}, {"text": "Because Franz Ferdinand was a symbol of Austrian militarism and had personally ordered military operations against Serbian civilians.", "isCorrect": false, "rationale": "Franz Ferdinand was actually known for favoring federalism within Austria-Hungary and was not personally responsible for military operations against Serbia. His assassination's significance is as an act of nationalist opposition to Habsburg dynastic authority, not as a response to his personal militarism."}], "id": "q07"}, {"question": "In which way did imperialism shape the character of World War I differently from how militarism shaped it?", "options": [{"text": "Militarism determined which nations fought, while imperialism determined when the war began.", "isCorrect": false, "rationale": "Neither characterization is accurate. Alliances largely determined which nations fought (alongside the mobilization timetables of militarism). The timing was shaped by the July Crisis, which involved all four MAIN causes. This option misattributes the specific roles of each cause."}, {"text": "Militarism created the strategic logic that made escalation automatic once mobilization began; imperialism made the war immediately global by bringing colonial peoples and territories into the conflict.", "isCorrect": true, "rationale": "The source distinguishes these roles: militarism (arms race, Schlieffen Plan, mobilization timetables) drove escalation logic; imperialism made the war global because 'the European powers that fought it each controlled vast colonial empires whose populations and resources were mobilized for the metropolitan conflict.' These are distinct causal mechanisms."}, {"text": "Militarism caused civilian casualties through industrialized weapons; imperialism prevented colonial populations from serving in European armies.", "isCorrect": false, "rationale": "Imperialism did not prevent but rather enabled massive colonial participation — over 1.5 million Indians, 600,000 West Africans, and others served in Allied forces. This option inverts the evidence."}, {"text": "Militarism led to Germany's defeat on the Western Front; imperialism led to Britain's victory at sea.", "isCorrect": false, "rationale": "This option conflates causes with military outcomes and mischaracterizes both. Militarism as analyzed in the section is about the prewar arms race and strategic planning culture, not a direct cause of tactical outcomes in specific battles."}], "id": "q08"}, {"question": "A teacher presents the following scenario: 'Without the alliance system, Austria-Hungary's war against Serbia would have remained a regional conflict.' Which of the following best evaluates this argument?", "options": [{"text": "The argument is incorrect because Germany would have intervened regardless of alliances due to pan-German nationalism.", "isCorrect": false, "rationale": "While pan-German nationalism was a factor in Germany's aggressive posture, the mechanism of German intervention was the formal alliance with Austria-Hungary. Dismissing the alliance system's role and attributing intervention purely to nationalism oversimplifies the causal chain."}, {"text": "The argument is largely correct: the alliance system transformed a bilateral dispute into a world war by automatically drawing in Russia, Germany, France, and Britain through mutual defense commitments and interlocking mobilization plans.", "isCorrect": true, "rationale": "The source's KEY CONCEPT explicitly supports this: 'The alliances rewarded commitment and punished hesitation' and 'the interlocking nature of the system meant that each act of support triggered a counter-response.' Without alliances, Russia's mobilization and Britain's entry were not automatic — it was specifically the alliance commitments that transformed the crisis."}, {"text": "The argument is incorrect because Austria-Hungary was already at war with France and Britain before the alliance system activated.", "isCorrect": false, "rationale": "Austria-Hungary declared war only on Serbia. France and Britain entered through the mechanism of their own alliances (with Russia and Belgium's guarantee). The argument's premise — that alliances expanded the conflict — is actually supported by the historical sequence."}, {"text": "The argument is largely incorrect because nationalism, not alliances, was the primary cause of expansion — all European powers would have intervened regardless of formal treaties.", "isCorrect": false, "rationale": "This overstates nationalism as a cause. The section emphasizes that the alliance system was the specific mechanism of escalation in 1914: Britain, for example, entered because of its 1839 treaty obligation over Belgian neutrality, not purely from nationalist fervor. Dismissing treaty commitments understates the alliance system's role."}], "id": "q09"}, {"question": "The German concept of 'Einkreisung' (encirclement) is cited as an example of which MAIN cause of World War I?", "options": [{"text": "Militarism — because it reflected German military planners' calculation that a two-front war required the Schlieffen Plan.", "isCorrect": false, "rationale": "Einkreisung was a political and nationalist sentiment — a feeling of being hemmed in by hostile powers — rather than a military planning concept. The Schlieffen Plan was a military response to the two-front problem, but Einkreisung as described in the source belongs to the nationalist/pan-German sentiment category."}, {"text": "Nationalism — because it expressed pan-German nationalists' feeling that France and Russia were deliberately denying Germany the international prestige its industrial power deserved.", "isCorrect": true, "rationale": "The source places Einkreisung explicitly within the nationalism section: 'Pan-German nationalists argued that Germany's \"place in the sun\" had been denied by Britain and France. The sense of encirclement (Einkreisung) — that France and Russia were deliberately hemming Germany in — intensified the feeling that war was both inevitable and better fought sooner rather than later.'"}, {"text": "Alliances — because it reflected German concern that the Triple Entente was a direct military threat to German territory.", "isCorrect": false, "rationale": "While the alliance system contributed to the encirclement feeling, Einkreisung as used in the section is a nationalist/cultural-political sentiment about prestige and denial, placed within the Nationalism section — not a strategic calculation about alliance military threats."}, {"text": "Imperialism — because it reflected Germany's desire to acquire colonial territory equal to Britain's empire.", "isCorrect": false, "rationale": "While 'place in the sun' language does reference colonial ambitions, Einkreisung specifically refers to the political-diplomatic feeling of being encircled by hostile powers — which the source classifies under nationalism. The colonial ambitions are mentioned but Einkreisung is not primarily an imperial concept."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
