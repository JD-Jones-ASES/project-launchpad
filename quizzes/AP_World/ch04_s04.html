<body>
<div class="quiz-container">

        <h1>QUIZ</h1>
        <div class="subtitle">AP World History: Modern &mdash; Coerced Labor and the Casta System</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The Spanish encomienda system differed from chattel slavery primarily because:", "options": [{"text": "Encomienda workers were free to leave their encomendero at any time, since the system was based on voluntary tribute payments rather than physical coercion.", "isCorrect": false, "rationale": "The source states the encomienda's 'protections were largely theoretical and the extraction was brutal.' It was coerced labor — not voluntary. The formal distinction from chattel slavery lies in its legal structure (tribute and labor rights, not ownership of persons), not in the absence of coercion."}, {"text": "The encomendero held rights to extract tribute and labor from an indigenous community, not legal ownership of the individuals themselves — but in practice the system functioned as brutal coerced labor.", "isCorrect": true, "rationale": "The source defines encomienda as granting 'the right to extract tribute and labor from an indigenous community, in exchange for obligations to provide Christian instruction and protection.' The legal form was rights over community tribute, not personal ownership; the practical reality was brutal forced labor that 'accelerated indigenous population collapse.'"}, {"text": "The encomienda applied exclusively to African enslaved workers who were legally protected by Spanish crown oversight, while chattel slavery applied to indigenous peoples without any legal protection.", "isCorrect": false, "rationale": "The encomienda applied to indigenous peoples, not Africans. Chattel slavery primarily applied to enslaved Africans in Spanish colonial America. This option reverses the populations."}, {"text": "Encomienda workers could purchase their freedom after a fixed period of service, while chattel slaves were permanently bound without any legal mechanism for manumission.", "isCorrect": false, "rationale": "The source does not describe a fixed-term service-to-freedom mechanism in the encomienda. The system was reformed by the New Laws of 1542 through crown legislation, not through individual self-purchase provisions."}], "id": "q01"}, {"question": "The New Laws of 1542 were issued primarily in response to which combination of pressures?", "options": [{"text": "The financial crisis caused by indigenous population decline reducing tribute revenues, and demands from indigenous communities for legal recognition of their treaty rights.", "isCorrect": false, "rationale": "While declining populations reduced the encomienda's economic productivity, the source identifies Las Casas's advocacy and the crown's desire to limit colonial elites' power as the primary pressures — not indigenous treaty demands, which are not mentioned in this context."}, {"text": "Las Casas's advocacy for indigenous peoples and the crown's own desire to limit the power of a would-be colonial aristocracy of encomenderos.", "isCorrect": true, "rationale": "The source states the crown issued the New Laws 'responding partly to Las Casas's advocacy and partly to its own desire to limit the power of a would-be colonial aristocracy.' Both moral and political motivations drove the legislation."}, {"text": "Pressure from African enslaved populations in the Caribbean, who organized a mass rebellion demanding legal protections equivalent to those enjoyed by indigenous peoples.", "isCorrect": false, "rationale": "The source does not identify African enslaved resistance as a cause of the New Laws of 1542. The New Laws addressed the encomienda system's treatment of indigenous peoples, not the Atlantic slave trade."}, {"text": "Demands from Spanish merchants in Seville, who argued that the encomienda system was inefficient and that free labor markets would generate higher colonial revenues.", "isCorrect": false, "rationale": "Seville merchant interests are not identified in the source as the driving force behind the New Laws. The New Laws emerged from moral advocacy (Las Casas) and royal political calculation, not from merchant economic theory."}], "id": "q02"}, {"question": "The colonial mita at Potosí was infamous primarily because:", "options": [{"text": "It required indigenous workers to convert to Christianity before they could qualify for lighter mine duties, creating religious coercion alongside labor coercion.", "isCorrect": false, "rationale": "Religious conversion requirements are not the feature that made Potosí's mita infamous. The source emphasizes physical mortality: cave-ins, mine gases, and mercury poisoning from the silver refining process caused hundreds of thousands of deaths."}, {"text": "Indigenous workers died in huge numbers from cave-ins, mine gases, and mercury poisoning used in silver refining — while Potosí produced more than half the world's silver supply.", "isCorrect": true, "rationale": "The source states that Potosí's mita killed 'hundreds of thousands of indigenous workers' through 'cave-ins, mine gases, and mercury poisoning used in silver refining,' while 'Potosí was producing more than half of the world's silver supply' by the early seventeenth century — making it the most extreme example of how coerced labor supported global silver circuits."}, {"text": "It was the only labor system in Spanish America that paid indigenous workers in cash, which the crown taxed directly — generating revenue without requiring the physical presence of royal inspectors.", "isCorrect": false, "rationale": "The mita was a rotational labor draft, not a cash-wage system. Workers were compelled to provide labor without the free-market exchange that cash wages would imply."}, {"text": "Its requirement that indigenous communities provide more workers than they could physically supply forced communities into debt, which was then converted into permanent hacienda labor obligations.", "isCorrect": false, "rationale": "The source does not describe the mita as creating debt leading to hacienda obligations. Debt peonage is described as the mechanism of the hacienda system, which was distinct from the mita. The mita was a state-mandated rotational draft."}], "id": "q03"}, {"question": "A casta painting from 1763 depicts sixteen racial combinations with their offspring, each labeled with a specific term. What was the primary function of these paintings within the colonial system?", "options": [{"text": "They were created to celebrate the cultural diversity of Spanish colonial society and to document the harmonious blending of Spanish, indigenous, and African peoples.", "isCorrect": false, "rationale": "The source explicitly rejects this interpretation: 'Their artistic beauty coexisted with their administrative function: codifying racial hierarchy.' Casta paintings were not celebrations of diversity — they were administrative codifications of differentiated legal status."}, {"text": "They codified racial hierarchy for European audiences and served as administrative tools for assigning differential legal rights, tax obligations, and social status based on ancestry.", "isCorrect": true, "rationale": "The source states casta paintings were 'commissioned primarily for European audiences as both ethnographic curiosities and demonstrations of Spanish colonial order,' with an 'administrative function: codifying racial hierarchy.' The categories they depicted carried legal consequences — professions, weapons, clothing, taxes."}, {"text": "They were used by the Spanish Inquisition to identify individuals of Jewish or Moorish ancestry who had concealed their lineage to escape religious persecution.", "isCorrect": false, "rationale": "The source does not connect casta paintings to Inquisition purposes or to Jewish/Moorish lineage tracking. The casta system categorized Spanish-indigenous-African mixtures, not religious heritage."}, {"text": "They were commissioned by encomenderos to document the labor obligations of specific mixed-race workers so that tribute could be assessed at the correct rate.", "isCorrect": false, "rationale": "Casta paintings were not individual labor-obligation records. They were genre paintings depicting racial types, commissioned for European audiences to explain the complexity of colonial society — not as labor registries for encomenderos."}], "id": "q04"}, {"question": "The hacienda system differed from the encomienda primarily in that:", "options": [{"text": "The hacienda used African enslaved labor exclusively, while the encomienda relied only on indigenous tribute workers.", "isCorrect": false, "rationale": "Haciendas used indigenous and mestizo workers bound through debt peonage, not exclusively African enslaved labor. The distinction between the two systems is the mechanism of labor extraction (tribute and labor rights vs. debt peonage), not the racial composition of the workforce."}, {"text": "The hacienda tied workers to a landed estate through debt peonage — advance wages creating unpayable debts — rather than through crown-granted tribute and labor rights.", "isCorrect": true, "rationale": "The source explains: 'Hacienda workers were typically tied to the land through debt peonage: the hacienda owner advanced wages or goods, and workers whose debts grew faster than their earnings were effectively bound to the estate.' This is distinct from the encomienda's crown-granted tribute rights."}, {"text": "The hacienda was a temporary institution that replaced the encomienda only during the period when silver mining was the primary colonial industry.", "isCorrect": false, "rationale": "The hacienda was not temporary or linked exclusively to the silver-mining period. The source notes it 'persisted in parts of Latin America well into the twentieth century' — one of the longest-lasting colonial labor institutions."}, {"text": "The hacienda system was outlawed by the New Laws of 1542, but continued to operate illegally while the encomienda was the legal labor institution.", "isCorrect": false, "rationale": "The timeline is reversed. The New Laws (1542) restricted the encomienda; the hacienda emerged as the replacement as the encomienda declined — it was not an illegal institution operating before the New Laws."}], "id": "q05"}, {"question": "The casta system is described in the source as 'a legal-administrative technology.' Which of the following best explains what this framing means?", "options": [{"text": "The casta system was a scientifically rigorous biological classification system that accurately mapped genetic differences between colonial populations.", "isCorrect": false, "rationale": "The source explicitly rejects biological determinism: the categories were 'not biologically determined but administratively determined.' The 'technology' framing positions casta as a governance tool, not a scientific categorization."}, {"text": "The casta system was an instrument of colonial governance — a set of codified categories designed to assign differential rights and taxes across a diverse population in ways that served the colonial state and Spanish-born elites.", "isCorrect": true, "rationale": "The source states precisely: 'it was a legal-administrative technology: a set of codified categories designed to assign differential rights, duties, and taxes to a diverse colonial population in ways that served the interests of the colonial state and Spanish-born elites.' Calling it a 'technology' means it was a tool of governance, not a biological fact."}, {"text": "The casta system was a scientific method developed by Enlightenment scholars to classify human varieties using measurable physical characteristics.", "isCorrect": false, "rationale": "The casta system predated the Enlightenment's scientific racial classification projects and was developed for colonial administrative purposes, not natural-history science. The source is explicit that its categories were administrative, not biological."}, {"text": "The casta system was a technological breakthrough that allowed the Spanish crown to automate tax collection across a geographically dispersed colonial empire.", "isCorrect": false, "rationale": "'Technology' in the source's framing means a social/legal tool of governance — not a mechanical or automated system. The casta system assigned tax obligations by category; human administrators applied it through church records and legal documents."}], "id": "q06"}, {"question": "Which of the following best explains why the Spanish crown issued the New Laws of 1542 despite intense resistance from encomenderos?", "options": [{"text": "The crown wanted to replace the encomienda with the mita system, which the crown believed would generate higher silver revenues from Potosí and other mines.", "isCorrect": false, "rationale": "The source identifies Las Casas's advocacy and the crown's desire to limit colonial aristocratic power as the motivations — not a preference for the mita's revenue-generating potential. The mita was a separate development in Andean regions, not a crown-designed replacement for the encomienda."}, {"text": "The crown feared that powerful encomenderos were developing into a semi-independent colonial aristocracy that could challenge royal authority, and the laws served to limit that political threat alongside moral concerns raised by Las Casas.", "isCorrect": true, "rationale": "The source states the crown acted 'partly to Las Casas's advocacy and partly to its own desire to limit the power of a would-be colonial aristocracy.' Political centralization against a rival power center was as important a motive as moral reform."}, {"text": "The crown was responding to demands from peninsulares in Mexico City and Lima, who petitioned for legal protections against the economic competition of established encomendero families.", "isCorrect": false, "rationale": "Peninsulares were Spanish-born colonizers at the top of the casta hierarchy, not a competing interest group below the encomenderos. The pressure came from Las Casas and from royal political calculation, not from peninsular commercial rivalry."}, {"text": "The laws were issued in response to a coordinated indigenous uprising that threatened Spanish control of central Mexico and Peru, requiring the crown to offer legal concessions in exchange for peace.", "isCorrect": false, "rationale": "The source does not identify an indigenous uprising as the precipitating cause of the New Laws. The laws were driven by Las Casas's legal advocacy and crown political strategy, not by military threats from indigenous communities."}], "id": "q07"}, {"question": "The casta category of 'peninsular' carried the highest social status in Spanish colonial America. What best explains why birthplace — being born in Spain rather than the Americas — was such a socially and legally significant distinction?", "options": [{"text": "Spanish-born individuals were assumed to have received a superior Jesuit education that better prepared them for administrative roles than American-born settlers.", "isCorrect": false, "rationale": "Educational quality is not the source's explanation for the peninsular-criollo distinction. The distinction was about proximity to the metropolitan center of colonial power and distrust of American-born creole loyalty to the crown."}, {"text": "The Spanish crown used birthplace as a proxy for loyalty, reserving the most powerful political offices for peninsulares on the assumption that those born in Spain would identify with crown interests rather than colonial landed interests.", "isCorrect": true, "rationale": "The source states 'peninsulares occupied the highest status and monopolized the most powerful political offices.' The crown deliberately restricted the highest offices to Spain-born individuals to maintain metropolitan control over colonial administration — birthplace was a political loyalty criterion, not a racial or cultural distinction."}, {"text": "American-born Spaniards (criollos) were legally classified as mestizos by the casta system, since any mixture of Spanish ancestry with American birth was considered a racial hybrid.", "isCorrect": false, "rationale": "Criollos were American-born Spaniards — not mestizos. The source clearly distinguishes criollos (American-born of Spanish descent) from mestizos (Spanish and indigenous parentage). Birth in the Americas did not create a racial hybrid category."}, {"text": "The Catholic Church required all colonial administrators to have been born in Spain to ensure that apostolic succession had not been interrupted by contact with indigenous religious practices.", "isCorrect": false, "rationale": "The Church is not identified in the source as the agent maintaining the peninsular-criollo distinction. The distinction was a colonial administrative and political policy of the crown, not a Church doctrine about apostolic succession."}], "id": "q08"}, {"question": "A historian argues: 'The casta system's categories were not natural or fixed — they could be contested, negotiated, and occasionally changed through social performance and legal proceedings.' Which of the following does this argument best support?", "options": [{"text": "That the casta system was largely ineffective as an instrument of social control because its categories were too fluid to be enforced consistently.", "isCorrect": false, "rationale": "The source argues the casta system was effective at assigning 'differential rights, duties, and taxes' despite some flexibility at the margins. Fluidity in individual cases did not undermine the system's structural power; it was still enforced through official records and legal procedures."}, {"text": "That the casta system was an administrative construction rather than a biological reality, since its categories were determined through social and legal processes rather than objective genetic facts.", "isCorrect": true, "rationale": "The source uses exactly this argument to frame the casta system: 'The categories were not biologically determined but administratively determined — a person's casta could be contested, negotiated, and occasionally changed through social performance, church records, and legal proceedings.' This proves the categories were constructed, not natural."}, {"text": "That the casta system was quickly abandoned in practice because colonial administrators found it too complex to implement across a vast and diverse population.", "isCorrect": false, "rationale": "The source does not suggest the casta system was abandoned. It persisted throughout the colonial period and is documented in casta paintings, legal records, and church registers. Its negotiability did not mean it was abandoned."}, {"text": "That mixed-race individuals in colonial Spanish America had significant upward mobility because racial categories were purely symbolic rather than legally enforceable.", "isCorrect": false, "rationale": "The source explicitly states that casta categories 'carried legal consequences' — restrictions on professions, weapons, clothing, and taxes. They were not purely symbolic. The possibility of individual negotiation existed at the margins but did not make the categories non-enforceable."}], "id": "q09"}, {"question": "Which of the following correctly ranks the casta system's social hierarchy from highest to lowest status?", "options": [{"text": "Criollo → peninsular → mestizo → mulato → indigenous people → enslaved/free Africans", "isCorrect": false, "rationale": "This reverses criollo and peninsular. The source states: 'Peninsulares occupied the highest status and monopolized the most powerful political offices. Criollos ranked below them.' Peninsular (Spanish-born) outranked criollo (American-born of Spanish descent) because the crown reserved top offices for Spain-born individuals."}, {"text": "Peninsular → criollo → mestizo/mulato (mixed categories) → indigenous people (subject to tribute) → enslaved and free Africans", "isCorrect": true, "rationale": "The source describes this hierarchy: peninsulares at top with monopoly on powerful offices; criollos below them; mestizos, mulatos, and 'mixed' categories restricted in professions and subject to specific taxes; indigenous people subject to tribute and labor obligations; enslaved and free Africans at the lowest rungs."}, {"text": "Peninsular → mestizo → criollo → mulato → enslaved Africans → indigenous people", "isCorrect": false, "rationale": "This misplaces mestizo above criollo and indigenous people below enslaved Africans. The source indicates indigenous people were subject to tribute and labor obligations from which Spaniards were exempt — a distinct legal category above enslaved people, though both were severely oppressed."}, {"text": "Criollo → peninsular → mulato → mestizo → free Africans → enslaved Africans → indigenous people", "isCorrect": false, "rationale": "This reverses peninsular and criollo, misorders the mixed categories, and places indigenous people below both free and enslaved Africans — contrary to the source's hierarchy, which places indigenous people (as a tributary group with distinct legal obligations) in a different category from enslaved people."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
