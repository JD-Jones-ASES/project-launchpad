        <div class="subtitle">AP World History: Modern &mdash; Human Rights and Transnational Movements</div>

    <div id="score-box" class="score-box">

        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "Read the following excerpt from the Universal Declaration of Human Rights (1948): 'All human beings are born free and equal in dignity and rights. They are endowed with reason and conscience and should act towards one another in a spirit of brotherhood.' (Article 1)\n\nA student argues this language proves the UDHR was a product of Western Enlightenment philosophy imposed on the rest of the world. Based on the source, what is the strongest challenge to this argument?", "options": [{"text": "The UDHR was drafted exclusively by representatives from North America and Western Europe.", "isCorrect": false, "rationale": "The text explicitly contradicts this: the drafting committee included Peng Chun Chang (China), Charles Malik (Lebanon), Hernan Santa Cruz (Chile), and René Cassin (France), alongside Eleanor Roosevelt (U.S.) — it was not exclusively Western."}, {"text": "The drafting committee was genuinely multinational — including delegates from China, Lebanon, Chile, and France — making the UDHR a product of negotiation among multiple civilizational traditions.", "isCorrect": true, "rationale": "The text explicitly calls the UDHR 'a product of negotiation among multiple civilizational traditions' and names key non-American contributors: Peng Chun Chang (vice-chair, China), Charles Malik (Lebanon), and Hernan Santa Cruz (Chile), who argued for economic and social rights."}, {"text": "The Soviet Union endorsed the UDHR without reservation, demonstrating that non-Western nations accepted its framework.", "isCorrect": false, "rationale": "The text states the Soviet Union and its allies abstained, arguing the Declaration's emphasis on individual rights reflected 'bourgeois Western ideology' — the opposite of endorsement without reservation."}, {"text": "The UDHR was modeled directly on existing treaties from African and Asian nations that predated Western human rights documents.", "isCorrect": false, "rationale": "The text does not make this claim. The UDHR drew on multiple traditions through multinational negotiation, not by copying pre-existing non-Western treaties."}]}, {"question": "Saudi Arabia abstained from the UDHR vote because of Article 18, which asserts the right to change one's religion. What does this abstention most directly reveal about the UDHR's universalist claims?", "options": [{"text": "It shows that all Middle Eastern nations opposed the concept of individual human rights.", "isCorrect": false, "rationale": "The text does not say all Middle Eastern nations opposed human rights. Charles Malik of Lebanon was a key contributor to the UDHR. Saudi Arabia's specific objection was to the right to change religion, not to human rights as a concept."}, {"text": "It demonstrates that the UDHR was accepted unanimously by all nations present at the General Assembly in 1948.", "isCorrect": false, "rationale": "The text states there were eight abstentions (including Saudi Arabia, the Soviet Union, and South Africa) — not unanimous acceptance. The vote was 48 in favor, 0 against, 8 abstentions."}, {"text": "It illustrates the genuine tension between universal human rights standards and particular cultural or religious traditions — with some governments viewing universalism as incompatible with their legal or religious frameworks.", "isCorrect": true, "rationale": "The text presents Saudi Arabia's abstention as precisely this kind of principled disagreement: Article 18's right to change religion was 'incompatible with traditional Islamic law as interpreted by the Saudi government,' illustrating the real tension between universalism and particular frameworks."}, {"text": "It proves that religious freedom was not actually included in the UDHR's final text.", "isCorrect": false, "rationale": "Article 18 on religious freedom was included in the final text — Saudi Arabia abstained because of it, not because it was excluded. The right to change one's religion is explicitly in the Declaration."}]}, {"question": "Political scientists Keck and Sikkink described the 'boomerang effect' in transnational human rights advocacy. A historical activist group in Country X is documenting government abuses but cannot achieve change through domestic pressure alone. Based on the source's description, which sequence best illustrates the boomerang effect?", "options": [{"text": "Domestic activists appeal to their own government → government reforms → international organizations validate the reforms.", "isCorrect": false, "rationale": "This describes purely domestic advocacy without the transnational 'boomerang' dimension. The boomerang effect is specifically about going around the government through international channels when domestic pressure fails."}, {"text": "Local activists document abuses → international NGO publicizes them globally → international pressure creates diplomatic costs for the offending government → global attention strengthens the local movement.", "isCorrect": true, "rationale": "The text describes this exact sequence as the 'boomerang effect': local documentation, international NGO amplification, diplomatic pressure on the government, and strengthened local movements — enabling outcomes 'they could never have achieved by domestic pressure alone.'"}, {"text": "International NGO creates a movement in Country X → local government adopts reforms → United Nations ratifies the changes.", "isCorrect": false, "rationale": "The boomerang effect begins with local actors, not international NGOs creating movements from the outside. The international dimension amplifies and supports local activism rather than initiating it."}, {"text": "A powerful state imposes sanctions on Country X → local activists benefit → the government collapses under pressure.", "isCorrect": false, "rationale": "The boomerang effect operates through civil society and diplomatic pressure, not through powerful states unilaterally imposing sanctions. The text describes NGOs and international attention, not military or economic coercion by great powers."}]}, {"question": "The American Civil Rights Movement 'did not operate in isolation from global currents.' Which evidence from the source BEST supports this claim?", "options": [{"text": "The Civil Rights Act of 1964 was passed by the U.S. Congress following international pressure from the United Nations.", "isCorrect": false, "rationale": "The text does not claim the Civil Rights Act resulted from UN pressure. The text describes Martin Luther King Jr. connecting segregation to global colonialism — an intellectual linkage, not a UN legislative pressure."}, {"text": "Martin Luther King Jr. explicitly drew connections between racial segregation in the American South and colonialism in Africa and Asia; the 1955 Bandung Conference provided an international audience for anti-racism arguments.", "isCorrect": true, "rationale": "The text explicitly states King 'drew connections between racial segregation in the American South and colonialism in Africa and Asia' and notes the Bandung Conference provided an international platform for anti-racism — demonstrating the movement's global consciousness."}, {"text": "The NAACP was founded by international delegates at a United Nations conference in 1945.", "isCorrect": false, "rationale": "The NAACP predates the UN by decades; the text presents it as 'anchored in the legal strategy of the NAACP' but does not connect its founding to a UN conference."}, {"text": "American civil rights leaders adopted nonviolent tactics exclusively from Mahatma Gandhi's movement in India.", "isCorrect": false, "rationale": "While Gandhian nonviolence influenced the Civil Rights Movement, the text describes nonviolent direct action through the SCLC and SNCC without attributing it exclusively to Gandhi. The text's focus is on King's global framing of civil rights and segregation, not tactical origins."}]}, {"question": "By 2024, over 60 countries retained laws criminalizing same-sex conduct, while more than 35 countries had legally recognized same-sex marriage. What does this distributional pattern MOST directly illustrate?", "options": [{"text": "That LGBTQ+ rights are a purely Western phenomenon with no advocates in non-Western societies.", "isCorrect": false, "rationale": "The text notes same-sex marriage was legally recognized in 'several nations in Asia and Africa' and 'most of Latin America' — not only Western nations. LGBTQ+ rights movements operated globally."}, {"text": "That human rights progress is geographically and politically uneven, and that 'global' advances can obscure deep regional divergences.", "isCorrect": true, "rationale": "The text explicitly draws this lesson from the LGBTQ+ rights data: 'a distributional pattern that illustrated how human rights progress is uneven across regions and how global advances can obscure deep divergences' — a conclusion that applies to human rights broadly."}, {"text": "That the Universal Declaration of Human Rights explicitly protected LGBTQ+ rights and was ignored by 60 nations.", "isCorrect": false, "rationale": "The text does not claim the UDHR explicitly addressed LGBTQ+ rights. The 1948 Declaration is silent on the subject; LGBTQ+ rights became a distinct movement and discourse decades later."}, {"text": "That the Stonewall uprising (1969) had no international impact and remained confined to the United States.", "isCorrect": false, "rationale": "The text presents Stonewall as 'a catalyst in the United States' that was part of movements that 'expanded significantly in the 1990s and 2000s' globally — the opposite of a purely domestic event with no international impact."}]}, {"question": "The Beijing Platform for Action (1995) 'had no enforcement mechanism' but 'became a reference point for women's rights advocates globally.' This situation is analogous to which characteristic of the UDHR?", "options": [{"text": "Both documents explicitly overrode national laws through binding UN Security Council resolutions.", "isCorrect": false, "rationale": "The UDHR is not a binding treaty that overrides national law, and the Beijing Platform explicitly had no enforcement mechanism. Neither operated through Security Council enforcement."}, {"text": "Both documents generated widespread abstentions, indicating that the majority of nations rejected their frameworks.", "isCorrect": false, "rationale": "The UDHR had 48 votes in favor with only 8 abstentions — not majority rejection. The Beijing Platform was adopted by 189 governments. Neither faced majority rejection."}, {"text": "Both the UDHR (described as 'a common standard of achievement' rather than law) and the Beijing Platform operated through normative influence and advocacy legitimacy rather than legal enforceability.", "isCorrect": true, "rationale": "The text notes the UDHR used the word 'standard' rather than 'law' because the drafters could not actually enforce it — and the Beijing Platform similarly had no enforcement mechanism but became a global reference point. Both shaped advocacy through normative legitimacy rather than coercive enforcement."}, {"text": "Both the UDHR and the Beijing Platform were ratified as binding treaties by all UN member states.", "isCorrect": false, "rationale": "The UDHR is a declaration, not a ratified treaty. The Beijing Platform is a conference action plan, not a treaty. Neither is binding in the way ratified treaties are."}]}, {"question": "The source identifies the Holocaust as a key context for the UDHR's drafting. The sourcing note asks: 'Why was 1948 the right moment for this document, and not 1919 or 1938?' Which answer BEST reflects the text's reasoning?", "options": [{"text": "In 1948, for the first time in history, democratic governments controlled all major world powers, making agreement possible.", "isCorrect": false, "rationale": "This is historically inaccurate — the Soviet Union, not a democracy, was a major world power in 1948. The text's reasoning focuses on the Holocaust's lesson about state perpetration of rights abuses, not on the absence of authoritarian governments."}, {"text": "In 1948, the Holocaust demonstrated that states themselves could systematically perpetrate genocide with bureaucratic efficiency, convincing the post-war founders that rights could not be left entirely to individual states for protection.", "isCorrect": true, "rationale": "The text states the Holocaust 'convinced the founders of the post-war order that rights could not be left entirely to the protection of individual states, because states themselves were often the perpetrators of the worst abuses.' This is the key reasoning for 1948's timing."}, {"text": "By 1948, the United States had developed sufficient diplomatic influence to impose its rights framework on other nations through military pressure.", "isCorrect": false, "rationale": "The text explicitly challenges the framing of the UDHR as an American imposition — it was a multinational negotiation. And the reasoning for 1948 centers on the Holocaust's lessons, not U.S. military power."}, {"text": "The 1948 moment was right because the League of Nations had developed a comprehensive human rights framework in 1919 that simply needed codification.", "isCorrect": false, "rationale": "The text does not describe a 1919 League framework that served as a foundation. The UDHR is presented as a genuinely new undertaking, motivated by the failure of inter-war institutions (like the League) to prevent the Holocaust."}]}, {"question": "Amnesty International was founded in 1961. Based on the source's description of transnational human rights movements, what was Amnesty's primary function in the 'boomerang effect'?", "options": [{"text": "Directly governing human rights in member states through binding legal authority.", "isCorrect": false, "rationale": "Amnesty International is an NGO with no governing or legal enforcement authority. Its role in the boomerang effect is advocacy and publicity, not governance."}, {"text": "Providing military or economic sanctions against governments that violated human rights.", "isCorrect": false, "rationale": "Amnesty International applies public advocacy pressure, not military or economic sanctions. Sanctions are tools of states, not of civil society NGOs."}, {"text": "Publicizing locally-documented abuses to global audiences, creating diplomatic costs for offending governments and international attention that strengthened local movements.", "isCorrect": true, "rationale": "The text describes the NGO role in the boomerang effect as the middle step: 'an international NGO (such as Amnesty International, founded 1961) publicizes them globally; international pressure creates diplomatic costs for the offending government.'"}, {"text": "Drafting binding human rights treaties that superseded UDHR provisions in signatory states.", "isCorrect": false, "rationale": "Amnesty International is an advocacy NGO, not a treaty-drafting body. The text does not describe it as replacing or superseding the UDHR framework."}]}, {"question": "Hernan Santa Cruz of Chile 'argued forcefully for the inclusion of economic and social rights' in the UDHR, reflected in Article 25 on the right to a standard of living adequate for health and well-being. This inclusion generated ongoing controversy because:", "options": [{"text": "The Soviet Union opposed all social and economic rights as incompatible with communist ideology.", "isCorrect": false, "rationale": "The text states the Soviet Union's abstention was based on objecting to the emphasis on individual over collective rights, framing the Declaration as 'bourgeois Western ideology' — not opposition to social and economic rights, which communist ideology generally supported."}, {"text": "Economic and social rights (food, housing, healthcare) are positive obligations on states to provide resources, making them more contested and harder to enforce than civil and political rights.", "isCorrect": true, "rationale": "The text frames economic and social rights (Article 25) as Santa Cruz's contribution through advocacy — their contested nature is implied by the debate over whether they are 'rights' (which require state provision) or aspirations. This reflects the ongoing debate about positive vs. negative rights in international human rights law."}, {"text": "Western nations argued that only civil and political rights were genuine human rights, while social and economic rights were purely economic policy goals beyond the scope of the UDHR.", "isCorrect": false, "rationale": "While this debate exists in international law, the text does not specifically attribute Western opposition to Article 25 as the source of controversy. The text focuses on who argued for its inclusion, not who opposed it specifically."}, {"text": "South Africa opposed Article 25 because its apartheid system denied economic resources to Black South Africans.", "isCorrect": false, "rationale": "The text says South Africa abstained because of Articles 1 and 2 (universal equality), not Article 25 (economic and social rights). Conflating these is an error."}]}, {"question": "Martin Luther King Jr.'s statement connecting racial segregation to colonialism in Africa and Asia placed the American Civil Rights Movement in which broader historical context, according to the source?", "options": [{"text": "The Cold War context, framing civil rights as a way to demonstrate American democracy's superiority over Soviet communism.", "isCorrect": false, "rationale": "While Cold War framing existed in civil rights discourse, the text specifically describes King as drawing connections to global colonialism and decolonization — not primarily the Soviet comparison. The text's focus is the link between racial segregation and colonial oppression."}, {"text": "The global post-war decolonization wave, framing racial segregation domestically as part of the same system of racial hierarchy that colonialism had imposed internationally.", "isCorrect": true, "rationale": "The text states King 'drew connections between racial segregation in the American South and colonialism in Africa and Asia' — explicitly placing domestic racism within the framework of global colonialism and the post-war anticolonial movement, with the Bandung Conference (1955) providing an international audience."}, {"text": "The Bretton Woods economic order, arguing that racial inequality was produced by the same financial institutions that governed global trade.", "isCorrect": false, "rationale": "The text does not connect King's framing to Bretton Woods or the IMF/World Bank. His transnational linkages were to colonial racial hierarchies, not economic trade and financial institutions."}, {"text": "The United Nations' Expanded Programme on Immunization, arguing that healthcare inequality reproduced racial segregation globally.", "isCorrect": false, "rationale": "There is no connection in the text between King's civil rights framing and the WHO immunization program. This distracter combines concepts from different sections."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
