<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_World.html">&larr; Back to AP World History: Modern</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP World History: Modern &mdash; The “New Imperialism”</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Between 1870 and 1914, European powers seized roughly 10 million square miles of new territory. Which combination of factors best explains the timing and scale of this expansion?", "options": [{"text": "A desire to spread Christianity and the rise of liberal democratic values in Europe", "isCorrect": false, "rationale": "While missionary activity accompanied imperialism, the text identifies industrial capitalism's surpluses — not religious motivation alone — as the primary structural driver. Liberal values were often used to justify conquest rather than to question it."}, {"text": "Industrial capitalism's surpluses of goods and capital, combined with nationalist competition among European states and ideological justifications like Social Darwinism", "isCorrect": true, "rationale": "The text explicitly names all three: raw-material needs, investment outlets, new markets, interstate rivalry for prestige, and the ideological work done by Social Darwinism and the civilizing mission — together creating both motive and justification."}, {"text": "The collapse of Asian and African states in the 1860s, creating power vacuums that European forces were invited to fill", "isCorrect": false, "rationale": "The text emphasizes that Africa contained hundreds of sophisticated political entities in 1870; European conquest destroyed functioning states rather than filling vacuums."}, {"text": "A purely military phenomenon driven by the invention of the Maxim gun and little else", "isCorrect": false, "rationale": "The Maxim gun was an enabling technology, but the text frames it as one factor within a broader set of economic, ideological, and political causes."}]}, {"question": "\"Whatever happens, we have got / The Maxim gun, and they have not.\" — Hilaire Belloc\n\nThis quotation best supports which analytical claim about the New Imperialism?", "options": [{"text": "Industrial-era military technology gave European powers decisive coercive advantages that made colonial conquest militarily feasible", "isCorrect": true, "rationale": "The text uses the Maxim gun's 500-rounds-per-minute rate as a central example of how Technology and Political power intersected — H. T. Johnson's response poem makes the same point about asymmetric firepower."}, {"text": "Colonial subjects uniformly lacked military traditions and were incapable of organized resistance", "isCorrect": false, "rationale": "The text specifically contradicts this: Ethiopia's victory at Adwa and H. T. Johnson's poem both document that colonized peoples actively resisted."}, {"text": "European powers relied primarily on economic incentives rather than force to extend colonial control", "isCorrect": false, "rationale": "The quotation highlights coercive military force, not economic negotiation. The text emphasizes that conquest was 'backed by Maxim guns, steam-powered gunboats, and telegraph lines.'"}, {"text": "The Maxim gun made colonial conquest inevitable and resistance impossible", "isCorrect": false, "rationale": "The text presents Adwa (1896) as direct evidence that conquest was not inevitable — Ethiopia defeated Italian forces even in the era of the Maxim gun."}]}, {"question": "J. A. Hobson argued in Imperialism: A Study (1902) that the profits of empire \"flowed to a narrow financial class while ordinary British citizens paid taxes for the armies that defended those investments.\" This argument challenges which common justification for imperialism?", "options": [{"text": "The Social Darwinist claim that European races were biologically superior", "isCorrect": false, "rationale": "Hobson's economic critique targets who benefits from empire financially, not the pseudo-scientific racial hierarchy argument of Social Darwinism."}, {"text": "The claim that empire was economically beneficial to the colonizing nation as a whole", "isCorrect": true, "rationale": "Hobson's argument — that profits concentrated among a financial elite while costs were socialized — directly undercuts the claim that imperial expansion served the economic interests of Britain broadly."}, {"text": "The civilizing mission's claim that colonized peoples needed European governance", "isCorrect": false, "rationale": "Hobson's argument is about the distribution of economic benefits within Britain, not about the governance capacity of colonized peoples."}, {"text": "The Darwinian argument that competition among nations was natural and inevitable", "isCorrect": false, "rationale": "Hobson's critique is economic, not biological or philosophical. He questions who benefits, not whether competition exists."}]}, {"question": "Rudyard Kipling published \"The White Man's Burden\" in February 1899, timed to coincide with the U.S. Senate's ratification of the Treaty of Paris, which transferred the Philippines from Spain to the United States. What does this timing reveal about the poem's primary purpose?", "options": [{"text": "Kipling was primarily documenting British imperial policy for a historical record", "isCorrect": false, "rationale": "The poem was published in an American magazine addressed to American readers at the moment of a specific U.S. policy decision — this is advocacy, not documentation."}, {"text": "The poem was an act of imperial advocacy directed at an American audience at the moment of a specific U.S. imperial decision", "isCorrect": true, "rationale": "The text establishes that Kipling addressed the poem to Americans, wrote for McClure's Magazine, and published at the moment of Philippine annexation — making the advocacy function clear."}, {"text": "Kipling was expressing regret about British imperialism and urging Americans to avoid the same mistakes", "isCorrect": false, "rationale": "The poem frames colonization as a burden and duty, not a mistake to avoid. It urges Americans to accept the 'burden' of governing non-European peoples."}, {"text": "The poem was a neutral artistic reflection on the difficulties of cross-cultural contact", "isCorrect": false, "rationale": "The text argues the poem does specific ideological work: it erases the colonized as subjects and frames conquest as benevolent duty — neither neutral nor artistically detached from political purpose."}]}, {"question": "The Reverend H. T. Johnson's poem \"The Black Man's Burden\" (1899) responds to Kipling by describing \"armies which menace feeble folks / Who fight with clubs and arrows / And brook your rifle's stroke.\" How does this response most directly challenge Kipling's framing?", "options": [{"text": "Johnson argues that colonized peoples preferred European rule and were grateful for it", "isCorrect": false, "rationale": "Johnson's poem centers colonial violence and coercion — the opposite of gratitude. The text notes he 'strips the euphemism from Kipling's language.'"}, {"text": "Johnson accepts the civilizing mission argument but argues it should be carried out more humanely", "isCorrect": false, "rationale": "Johnson does not accept the civilizing mission premise; his poem reframes imperial 'burden' as military conquest targeting people without comparable weapons."}, {"text": "Johnson reframes Kipling's \"burden\" as violent military conquest against people with inferior weapons, centering coercion rather than benevolence", "isCorrect": true, "rationale": "The text states Johnson's counter-poem makes 'the asymmetry of the Maxim gun — which could fire 500 rounds per minute while colonial subjects fight with clubs and arrows — the true subject of the poem.'"}, {"text": "Johnson argues that European powers had legitimate economic grievances that justified territorial expansion", "isCorrect": false, "rationale": "Johnson's poem does not address European economic needs; it focuses on the violence inflicted on colonized peoples as the true content of imperial expansion."}]}, {"question": "Which statement best explains the relationship between Social Darwinism and the economic extraction of colonial resources?", "options": [{"text": "Social Darwinism was developed by scientists to explain observable economic differences between nations", "isCorrect": false, "rationale": "The text explicitly states Social Darwinism 'had no legitimate scientific basis' and that Darwin never endorsed its social application. It was an ideology, not a scientific finding."}, {"text": "Social Darwinism and the civilizing mission served as ideological justifications that made economic extraction appear natural and even beneficial", "isCorrect": true, "rationale": "The text's SPICE-T connection states directly: 'ideology made extraction seem natural; extraction made ideology necessary' — the two tracks operated together, each reinforcing the other."}, {"text": "Social Darwinism emerged after imperial conquest to rationalize outcomes that had occurred for purely strategic reasons", "isCorrect": false, "rationale": "Social Darwinism was simultaneously used as justification during conquest, not only as post-hoc rationalization. The text treats ideology and economics as co-present, not sequential."}, {"text": "Economic investment in colonies was unprofitable but continued for ideological reasons", "isCorrect": false, "rationale": "The text notes British capital invested abroad exceeded domestic investment by the 1890s, suggesting real profit — though Hobson contested whether that profit was broadly distributed."}]}, {"question": "Which of the following best describes the concept of \"investment imperialism\" as discussed in the text?", "options": [{"text": "The practice of using colonial subjects as financial investors in European stock markets", "isCorrect": false, "rationale": "Investment imperialism refers to European capital flowing into colonies, not the reverse. Colonized peoples were the recipients of extractive investment, not its agents."}, {"text": "The export of European surplus capital into colonial infrastructure projects that generated profit while also serving military control", "isCorrect": true, "rationale": "The text defines this precisely: by the 1890s British capital abroad exceeded domestic investment; railways, harbors, and telegraph systems returned profit 'while conveniently also serving military control.'"}, {"text": "Colonial governments investing in European industrial companies to gain economic leverage", "isCorrect": false, "rationale": "The flow was from European investors into colonial projects, not from colonial states into European industry."}, {"text": "Competition among European banks to offer loans to African and Asian governments at favorable rates", "isCorrect": false, "rationale": "The text describes European capital investment in colonial infrastructure, not competitive lending to sovereign governments."}]}, {"question": "A student argues that the New Imperialism was primarily a cultural and religious phenomenon driven by missionaries and educators. Which piece of evidence from the section most directly weakens this argument?", "options": [{"text": "Kipling's poem was published in a popular magazine rather than a religious journal", "isCorrect": false, "rationale": "Publication venue is relevant to audience analysis but does not directly address whether economic or cultural factors were primary drivers of imperialism."}, {"text": "The British East India Company and later the Raj dismantled India's textile industry while flooding the market with cheap British cloth — a policy driven by trade advantage, not missionary goals", "isCorrect": false, "rationale": "This evidence is from ch06_s03, not ch06_s01. While correct in substance, using it as support requires drawing from material outside this section."}, {"text": "J. A. Hobson's analysis showed that investment capital drove imperial expansion, and raw materials like rubber, cotton, tin, and gold were the primary visible imperial motive", "isCorrect": true, "rationale": "The text lists specific commodities — Congo rubber, Egyptian cotton, Malayan tin, South African diamonds and gold — as the 'most visible imperial motive' and names Hobson's capital-flow analysis as evidence that economic forces were primary."}, {"text": "The Berlin Conference occurred before missionary activity was widespread in Central Africa", "isCorrect": false, "rationale": "Missionary activity in Africa predated the Berlin Conference substantially. More importantly, this claim is not supported by the text and does not directly address the economic vs. cultural argument."}]}, {"question": "The text describes the civilizing mission as both \"a sincere belief among some colonizers and a convenient post-hoc rationalization for resource extraction.\" What does this dual characterization suggest about how historians should analyze ideological justifications for imperialism?", "options": [{"text": "Because some colonizers sincerely believed the civilizing mission, it should be treated as a legitimate humanitarian project", "isCorrect": false, "rationale": "Sincerity of belief does not determine historical legitimacy or consequence. The text is explicit that the civilizing mission 'justified conquest and forced cultural transformation' regardless of individual sincerity."}, {"text": "Ideological justifications can be simultaneously genuine and self-serving, requiring historians to analyze both the ideas' content and their material functions", "isCorrect": true, "rationale": "The text's framing — sincere belief coexisting with convenient rationalization — points toward exactly this analytical move: ideas must be read both as intellectual content and as political function."}, {"text": "Ideologies that are sincerely held cannot be used as tools of domination", "isCorrect": false, "rationale": "The text demonstrates the opposite: the civilizing mission simultaneously expressed genuine conviction and functioned as justification for conquest — sincerity and domination were not mutually exclusive."}, {"text": "Only the economic motives for imperialism were real; the ideological justifications were always consciously cynical lies", "isCorrect": false, "rationale": "The text explicitly states some colonizers held sincere beliefs — blanket cynicism is as analytically incomplete as blanket acceptance of the ideology at face value."}]}, {"question": "The text states that the colonial restructuring of African and Asian economies involved \"dismantling pre-existing agricultural systems and forcing subsistence farmers into cash-crop or plantation labor.\" Which SPICE-T theme does this best illustrate?", "options": [{"text": "Political (P): the expansion of European state sovereignty over colonial territory", "isCorrect": false, "rationale": "This describes political reorganization, but the specific mechanism described — forcing subsistence farmers into cash-crop labor — is primarily an economic restructuring of labor and production systems."}, {"text": "Cultural (C): the imposition of European languages and Christianity on colonized peoples", "isCorrect": false, "rationale": "Cultural imposition is addressed by the civilizing mission, not by the transformation of agricultural systems into cash-crop economies."}, {"text": "Economic (E): the integration of colonial economies into European-centered global markets through coerced labor restructuring", "isCorrect": true, "rationale": "The text's SPICE-T box explicitly identifies 'the economic track' as extracting commodities, redirecting labor, and integrating colonial territories into European-centered markets — exactly what cash-crop coercion accomplishes."}, {"text": "Interaction with Environment (I): the impact of European diseases on indigenous agricultural practices", "isCorrect": false, "rationale": "Disease is not discussed in this section. The restructuring described was a deliberate colonial economic policy, not an environmental or epidemiological process."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
