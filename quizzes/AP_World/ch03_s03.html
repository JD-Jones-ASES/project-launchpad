    <div class="quiz-actions">

<script>
var QUESTIONS = [{"question": "Ivan IV adopted the title of tsar rather than continuing to use the title of prince or grand prince. What was the PRIMARY significance of this title change?", "options": [{"text": "It signaled a claim to the Roman and Byzantine imperial inheritance, asserting a universal sovereignty above that of other European monarchies.", "isCorrect": true, "rationale": "The source states Ivan IV 'was the first Russian ruler to formally adopt the title of tsar (a Slavic form of Caesar), signaling a claim to the Roman and Byzantine imperial inheritance.' This was a deliberate ideological assertion of universal imperial status."}, {"text": "It was a purely administrative title change with no political significance, adopted to standardize Russian bureaucratic language.", "isCorrect": false, "rationale": "The source frames the title adoption as a substantive political claim — connecting the Russian ruler to Rome and Byzantium — not a bureaucratic formality."}, {"text": "It signaled Russia's conversion from Orthodox Christianity to Roman Catholicism as part of diplomatic alignment with Habsburg Austria.", "isCorrect": false, "rationale": "Ivan IV remained firmly within Russian Orthodoxy. The Byzantine connection was Orthodox, not Catholic. Russia's adoption of the Byzantine imperial legacy reinforced Orthodox identity, not Catholic alignment."}, {"text": "It was required by the Mongol Khanates of Kazan and Astrakhan as a condition of their submission to Russian authority.", "isCorrect": false, "rationale": "The title adoption preceded the conquests of Kazan (1552) and Astrakhan (1556). The source presents the title change as Ivan IV's own assertion, not a condition imposed by the Khanates."}], "id": "q01"}, {"question": "The oprichnina was Ivan IV's most controversial instrument of power. Which statement BEST describes both its purpose and its unintended consequences?", "options": [{"text": "It was designed to develop the frontier steppe lands through forced settlement, but it depopulated Russia's agricultural heartland instead.", "isCorrect": false, "rationale": "The source describes the oprichnina as a tool against the boyar class, not a colonization scheme. Its geographic and social purposes were different from what this answer describes."}, {"text": "It was designed to break boyar power through a state within a state run by loyal secret police (oprichniki), but it also devastated administrative capacity and destabilized Russia, contributing to the Time of Troubles.", "isCorrect": true, "rationale": "The source explains Ivan's goal was to destroy boyar treachery through the oprichnina and oprichniki, but notes this 'devastated Russia's administrative capacity and provoked the near-collapse of the state during the Time of Troubles (1598–1613).'"}, {"text": "It was designed to modernize Russia's military on European lines, but it alienated the Orthodox Church and triggered a religious schism.", "isCorrect": false, "rationale": "Military modernization on European lines is associated with Peter the Great, not Ivan IV. The oprichnina targeted the boyar nobility, not the Orthodox Church, and its consequences were political instability, not religious schism."}, {"text": "It successfully eliminated the boyars as a political force and enabled Ivan IV to establish a stable autocratic system that lasted through the seventeenth century.", "isCorrect": false, "rationale": "The source indicates the oprichnina 'shattered the old aristocratic order' but 'also devastated Russia's administrative capacity' — leading to the Time of Troubles, not stable autocracy."}], "id": "q02"}, {"question": "Peter the Great's 'Grand Embassy' of 1697–98 took him incognito through western Europe. What was the PRIMARY purpose and outcome of this tour?", "options": [{"text": "Peter sought to negotiate military alliances against the Ottoman Empire, resulting in a formal anti-Ottoman coalition with England, the Dutch Republic, and Sweden.", "isCorrect": false, "rationale": "Peter did fight the Ottomans, but the Grand Embassy's purpose as described in the source was observational and technological — learning from European institutions — not diplomatic alliance-building. Sweden became an enemy in the Great Northern War."}, {"text": "Peter observed Western European institutions firsthand — working in Dutch shipyards, visiting factories, meeting scientists — and used what he learned as the template for systematic top-down Westernization of Russian institutions.", "isCorrect": true, "rationale": "The source explicitly describes the Grand Embassy as Peter's observational tour where 'he worked in Dutch shipyards, visited English factories, and met with scientists and engineers,' and then used these observations to design his reforms."}, {"text": "Peter traveled to find European wives for Russian nobles, seeking to integrate Russia into the European aristocratic marriage market.", "isCorrect": false, "rationale": "The Grand Embassy had no such matrimonial purpose. Peter's reforms focused on institutions, military organization, and state bureaucracy — not dynastic marriage integration."}, {"text": "Peter was forced into exile by boyar coup and used the Grand Embassy to gather foreign support for his return to power.", "isCorrect": false, "rationale": "Peter left Russia voluntarily and by his own design; the Grand Embassy was a planned educational and diplomatic tour, not a flight from political crisis."}], "id": "q03"}, {"question": "Peter the Great's Table of Ranks (1722) replaced hereditary birth as the primary criterion for noble status. Why was this reform significant for the Russian state?", "options": [{"text": "It eliminated the noble class entirely, creating a classless meritocracy based solely on individual ability.", "isCorrect": false, "rationale": "The Table of Ranks created a new service-based hierarchy — it did not eliminate the noble class. Advancement through state service earned noble status; it restructured nobility around service rather than birth alone."}, {"text": "By tying advancement to state service rather than birth, it created a merit-based bureaucracy that made officials dependent on the tsar's favor, undermining hereditary noble independence.", "isCorrect": true, "rationale": "The source describes the Table of Ranks as 'a 14-level hierarchy in which advancement depended on state service rather than birth' — directly analogous to the Ottoman devshirme logic of creating loyalty through dependence on the ruler."}, {"text": "It imported the French model of Versailles court culture to Russia, requiring nobles to reside in Saint Petersburg and compete for royal favor through social rituals.", "isCorrect": false, "rationale": "While there are parallels between Peter's Saint Petersburg and Versailles (both served to concentrate nobles near the capital), the Table of Ranks specifically reformed the bureaucratic hierarchy through merit and service, not through court ritual competition."}, {"text": "It was primarily symbolic, since Russian nobles continued to hold power through land ownership regardless of their official rank.", "isCorrect": false, "rationale": "The source presents the Table of Ranks as a real institutional reform — part of Peter's systematic Westernization program — not as symbolic. The pomeshchiki system had already been restructuring the relationship between service and landholding since Ivan IV."}], "id": "q04"}, {"question": "Read the following passage: 'Peter did not ask Russian society to westernize; he commanded it. Nobles who refused to cut their beards paid a beard tax. Serfs were conscripted to build Saint Petersburg.' Which HISTORICAL PATTERN does this passage BEST illustrate?", "options": [{"text": "The social contract theory: rulers earn legitimacy through the consent of those they govern, and coercion breaks the social contract.", "isCorrect": false, "rationale": "The passage illustrates the opposite of social contract theory — coercive modernization imposed without consent. The source introduces this as a 'recurring historical pattern' of autocratic modernization, not as a violation of an idealized social contract."}, {"text": "Coercive modernization imposed from above: an autocratic ruler uses state power to force institutional change on a reluctant population, a pattern later seen in Meiji Japan and Kemalist Turkey.", "isCorrect": true, "rationale": "The source's Key Concept explicitly names this as 'The Russian Model: Coercive Modernization' — 'modernization imposed from above by an autocratic ruler who uses state power to force institutional change on a reluctant population' — with Meiji Japan and Kemalist Turkey named as later instances."}, {"text": "The failure of top-down reform: imposed Westernization always generates popular resistance that eventually overthrows the reforming regime.", "isCorrect": false, "rationale": "The source does not claim top-down reform always fails. Peter's reforms largely succeeded in their near-term goals (winning the Great Northern War, building a navy, creating Saint Petersburg). The broader claim about inevitable failure is not supported by the text."}, {"text": "Environmental determinism: the harsh Russian climate made modernization impossible without extreme state coercion to overcome geographic obstacles.", "isCorrect": false, "rationale": "The source does not attribute Peter's coercion to environmental factors. The explanation given is political — the need to overcome the resistance of a conservative nobility and society — not geographic."}], "id": "q05"}, {"question": "Peter the Great's modernization program contained a central paradox. Which pairing BEST identifies that paradox?", "options": [{"text": "Peter built Saint Petersburg as a Western-oriented capital while simultaneously funding it through traditional Muscovite tribute collection.", "isCorrect": false, "rationale": "While there may be financial ironies, the source identifies a specific and deeper paradox between the type of reform (Westernization) and the type of labor system used (intensified serfdom) — not between the city and how it was funded."}, {"text": "Peter imported Western European ideas of rational administration and individual merit while simultaneously intensifying serfdom — binding peasants more tightly to the land rather than emancipating them.", "isCorrect": true, "rationale": "The source explicitly identifies this as the 'paradox at its center: while importing European ideas of rational administration, it simultaneously deepened serfdom.' The Table of Ranks rewarded merit at the top; serfs at the bottom were more constrained than ever."}, {"text": "Peter built a powerful modern navy while his land army remained organized on pre-modern feudal lines, creating a dual military system.", "isCorrect": false, "rationale": "The source states Peter rebuilt the Russian army on European lines as well — 'standing regiments trained in European drill and armed with modern firearms.' Both navy and army were modernized; the paradox lay in serfdom, not military organization."}, {"text": "Peter promoted Orthodox Christianity in his new bureaucracy while personally embracing the secular atheism he observed in western Europe.", "isCorrect": false, "rationale": "The source describes Peter subordinating the Orthodox Church to state control (abolishing the Patriarchate, creating the Holy Synod under a lay official) — an assertion of state supremacy, not adoption of atheism."}], "id": "q06"}, {"question": "Russian Cossacks reached the Pacific coast by 1639. How does the source's SPICE-T analysis link Russian eastward expansion to the wider patterns of early modern global history?", "options": [{"text": "Russian Cossack expansion parallels European maritime expansion in its combination of economic incentive (fur trade, like the spice trade) and military force to conquer territory, with similar devastating effects on indigenous populations.", "isCorrect": true, "rationale": "The source's SPICE-T section explicitly draws this parallel: 'The fur trade drove Russian expansion just as the spice trade drove European maritime expansion: economic incentive plus state military power equaled territorial conquest.' And notes the human cost to indigenous Siberian peoples 'parallels in structure (if not scale) the Columbian Exchange's effects.'"}, {"text": "Russian expansion into Siberia was primarily motivated by religious missionary zeal rather than economic incentives, differentiating it from European maritime colonialism.", "isCorrect": false, "rationale": "The source explicitly identifies the fur trade as the economic driver of Russian expansion, making it comparable to the spice trade for European maritime expansion. Religious motivations are not identified as the primary driver."}, {"text": "Cossack expansion was led by the Russian state as a planned imperial project, unlike European expansion, which was driven by private commercial companies.", "isCorrect": false, "rationale": "The source describes Cossacks as 'free semi-military communities on the steppe' — not a direct state-led project. The source draws structural similarities with European expansion, not contrasts based on state vs. private organization."}, {"text": "Russian expansion into Siberia created a new trade route linking Europe and Asia that bypassed the Ottoman-controlled overland routes, explaining the Ottoman Empire's subsequent decline.", "isCorrect": false, "rationale": "The source does not make this trade-route-bypass argument and does not link Siberian expansion to Ottoman decline. The fur trade and indigenous subjugation are the source's analytical focus."}], "id": "q07"}, {"question": "The formalization of Russian serfdom in 1649 and its intensification during Peter's reign is described as a 'tension' in the source. Why did the simultaneous occurrence of Westernization and deepening serfdom represent a tension rather than a contradiction?", "options": [{"text": "Because serfdom was a Western European institution Peter was importing, not a Russian one — so it was consistent with his Westernization program.", "isCorrect": false, "rationale": "Western European serfdom was actually in decline by 1500 — the source explicitly notes this contrast. Russian serfdom intensified while western serfdom faded; Peter's importation of Western institutions did not include serfdom."}, {"text": "Because the same coercive state capacity that enabled Peter to force Westernization reforms on resistant nobles also enabled him to bind peasants more tightly to the land — both required expanding autocratic state power over all social groups.", "isCorrect": true, "rationale": "The source frames both Westernization from above and serfdom intensification as expressions of the same autocratic state power — commanding social change without consent. This is a tension (imported modern ideas + archaic labor system) but not a logical contradiction, since both served to strengthen state control."}, {"text": "Because Peter was unaware that serfdom contradicted Enlightenment principles — he focused only on military-technical modernization, not political philosophy.", "isCorrect": false, "rationale": "The source does not claim ignorance on Peter's part. It presents the paradox as a structural feature of coercive modernization — a regime that could import technical and bureaucratic ideas while deliberately refusing to extend them to social liberation."}, {"text": "Because serfdom was economically necessary to fund Peter's military reforms, and economic pragmatism overrode ideological consistency.", "isCorrect": false, "rationale": "While there is an economic logic to serfdom as labor supply, the source frames the paradox as fundamentally political and structural — autocratic modernization — not as a purely economic trade-off."}], "id": "q08"}, {"question": "Consider the following scenario: A young Russian nobleman in 1710 is required to shave his beard, send his sons to a European-style technical school, and serve in a state bureaucratic rank. Which of Peter's reforms created these obligations, and what was their common purpose?", "options": [{"text": "The oprichnina created these obligations; their purpose was to eliminate independent noble power bases.", "isCorrect": false, "rationale": "The oprichnina was Ivan IV's instrument, not Peter's. Peter's reforms are distinct: the beard requirement, educational mandates, and Table of Ranks."}, {"text": "Peter's systematic Westernization decrees — including the Table of Ranks, the mandatory European-dress and beard-shaving requirements, and technical education laws — all aimed to transform the Russian nobility into a service class on Western European models.", "isCorrect": true, "rationale": "The source describes all these as Peter's reforms: he 'replaced the old boyar council with a Senate... created a merit-based civil bureaucracy organized by the Table of Ranks... required nobles to send sons to European-style technical schools, shave their beards... and wear Western dress.'"}, {"text": "The Sudebnik of 1550 created these obligations; their purpose was to subordinate the boyar class to the tsar's military service needs.", "isCorrect": false, "rationale": "The Sudebnik of 1550 was Ivan IV's legal code. Peter's reforms came more than a century and a half later and were specifically modeled on Western European institutions observed during the Grand Embassy."}, {"text": "These requirements were imposed by the Holy Synod to align Russian religious practice with Greek Orthodox norms in response to the Church schism.", "isCorrect": false, "rationale": "The Holy Synod was Peter's instrument for subordinating the Church to state control. The beard and education requirements were state secular reforms, not Church religious decrees."}], "id": "q09"}, {"question": "Peter the Great founded Saint Petersburg on swampy land seized from Sweden and built by forced labor. What does this choice of capital MOST CLEARLY symbolize about his political program?", "options": [{"text": "A turn away from European influence toward Russian indigenous traditions, by building a new city on Russian-conquered territory.", "isCorrect": false, "rationale": "The source states the city was 'designed by European architects and oriented toward the West, literally and symbolically' — the opposite of a turn toward indigenous Russian traditions."}, {"text": "Peter's rejection of military expansion, symbolized by building a peaceful cultural capital rather than a fortress city.", "isCorrect": false, "rationale": "Saint Petersburg was founded on land won in the Great Northern War against Sweden — it was a product of military expansion, not a rejection of it. It was also fortified and served as a naval base."}, {"text": "Peter's determination to reorient Russia toward Western Europe — literally founding a new capital on Baltic Sea land won from Sweden, designed by European architects, symbolically declaring Russia a Western-facing power.", "isCorrect": true, "rationale": "The source states the city was built on 'swampy land seized from Sweden,' was 'designed by European architects,' and 'oriented toward the West, literally and symbolically' — all elements of Peter's Westernization project expressed in urban form."}, {"text": "Peter's embrace of religious reform, building a Protestant-influenced city to challenge the authority of the Orthodox Patriarchate in Moscow.", "isCorrect": false, "rationale": "Peter subordinated the Orthodox Church to state control through the Holy Synod but did not adopt Protestantism. Saint Petersburg's Western orientation was administrative and cultural, not religious-denominational."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
