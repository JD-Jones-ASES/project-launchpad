<script>
var QUESTIONS = [{"question": "A historian examining Cold War conflicts in Korea and Vietnam argues: 'In both cases, the superpower framing was imposed on, and often distorted, indigenous struggles that had their own political histories and causes.' Which of the following best supports this interpretation?", "options": [{"text": "Korea and Vietnam were both divided at the same parallel in 1945, demonstrating that superpower decisions determined all subsequent political outcomes in those countries", "isCorrect": false, "rationale": "Korea was divided at the 38th parallel, Vietnam at the 17th; conflating them misreads the source. More importantly, presenting superpower decisions as determining 'all subsequent outcomes' contradicts the historian's point about indigenous agency being distorted rather than eliminated."}, {"text": "Ho Chi Minh's independence movement predated American involvement by years, and the Korean conflict arose from the consolidation of two rival governments rather than from superpower creation", "isCorrect": true, "rationale": "The source states Vietnam was 'fundamentally a Vietnamese civil war' amplified by superpowers, and that Ho Chi Minh led an independence movement against France before U.S. escalation. Korea similarly arose from division and consolidation of two rival governments — the source emphasizes that 'the soldiers who fought and died... were pursuing their own political goals.'"}, {"text": "Both Korea and Vietnam were resolved peacefully through United Nations mediation, demonstrating that indigenous peoples successfully resisted superpower interference", "isCorrect": false, "rationale": "Neither conflict was resolved through UN mediation. Korea ended with an armistice in 1953 near the original 38th parallel. Vietnam ended with Saigon's fall in 1975 after years of war — not a peaceful UN-mediated settlement."}, {"text": "The Soviet Union's direct military intervention in both Korea and Vietnam demonstrates that superpower involvement was the primary cause of both conflicts", "isCorrect": false, "rationale": "The source describes Soviet support for North Korea (equipment, cautious approval) but not direct Soviet military intervention. In Vietnam, the conflict was a Vietnamese civil war amplified by outside powers — the source explicitly cautions against overusing the 'proxy' framing."}]}, {"question": "Mao Zedong wrote in 1927: 'Revolution is not a dinner party... it cannot be so refined, so leisurely and gentle. A revolution is an insurrection, an act of violence by which one class overthrows another.' What does this primary source reveal about Mao's theory of political change?", "options": [{"text": "Mao believed revolutionary violence was regrettable but sometimes necessary if peaceful means failed first", "isCorrect": false, "rationale": "The source does not present Mao as a reluctant user of violence who tried peaceful means first. The 1927 passage asserts violence as the definitional character of revolution — 'an act of violence by which one class overthrows another' — without qualifying it as a last resort."}, {"text": "Mao understood revolution as inherently class-based violent struggle, not a process of gradual reform or elite negotiation", "isCorrect": true, "rationale": "The sourcing note asks students to identify Mao's 'theory of power.' The 1927 quotation defines revolution as 'an act of violence by which one class overthrows another' — explicitly rejecting refined or leisurely processes. This frames revolutionary change as necessarily violent and class-driven, not reform-based or elite-negotiated."}, {"text": "Mao's view of revolution was shaped primarily by Soviet Marxist doctrine and had no distinctly Chinese character", "isCorrect": false, "rationale": "The source explicitly states Mao 'developed a distinctively Chinese form of Marxism that centered the peasantry rather than the urban proletariat as the revolutionary class' — a departure from Soviet doctrine that is central to the biographical entry."}, {"text": "This quotation's context (1927 peasant uprisings) makes it unrepresentative of Mao's mature political thought during the Cultural Revolution", "isCorrect": false, "rationale": "While the sourcing note acknowledges that historical context changes meaning, it does not suggest the 1927 quotation was unrepresentative of Mao's thought. The very fact that it was compiled into the Cultural Revolution-era 'Little Red Book' indicates its continued relevance to Mao's political program."}]}, {"question": "The Cuban Missile Crisis of October 1962 was resolved when Khrushchev agreed to remove Soviet missiles from Cuba in exchange for an American pledge not to invade Cuba and a secret agreement to remove American Jupiter missiles from Turkey. This resolution best illustrates:", "options": [{"text": "The success of brinkmanship as a strategy, proving that deliberate escalation reliably compelled the adversary to capitulate", "isCorrect": false, "rationale": "The resolution was mutual — both sides made concessions. Kennedy pledged not to invade Cuba and secretly agreed to remove Jupiter missiles from Turkey. The source notes the crisis was resolved partly by 'accident' (a Soviet submarine commander nearly launched a nuclear torpedo). This complicates the picture of brinkmanship as a reliable, clean success."}, {"text": "That both superpowers made reciprocal concessions, demonstrating that brinkmanship's resolution required mutual face-saving rather than one-sided capitulation", "isCorrect": true, "rationale": "The source describes a resolution in which Khrushchev removed the missiles 'in exchange for' an American non-invasion pledge and 'a secret agreement' on Jupiter missiles. Both sides gave something. The source explicitly calls the crisis 'the paradigmatic case' of brinkmanship while also noting its 'terrifying fragility.'"}, {"text": "American military superiority, which forced Soviet capitulation when U.S. naval forces intercepted Soviet ships", "isCorrect": false, "rationale": "The source describes a naval quarantine, not an interception of Soviet ships. The crisis was resolved diplomatically before Soviet ships reached the quarantine line; the resolution involved concessions by the United States (the Jupiter missiles), not a demonstration of military superiority forcing capitulation."}, {"text": "The effectiveness of UN Secretary-General mediation in providing a neutral framework for superpower negotiation", "isCorrect": false, "rationale": "The source makes no mention of UN Secretary-General mediation as the mechanism of resolution; the crisis was resolved through direct communication between Kennedy and Khrushchev with the mediation of Soviet ambassador Anatoly Dobrynin — not through a formal UN process."}]}, {"question": "The Korean War (1950–53) ended with an armistice that restored roughly the same border that existed before the war began. Which of the following best explains why this outcome, despite enormous human costs, represents a meaningful Cold War outcome for the United States?", "options": [{"text": "It demonstrated that American military forces could defeat both North Korean and Chinese forces in open combat", "isCorrect": false, "rationale": "The source states Chinese forces drove UN forces back south after initially being pushed near the Chinese border — the military outcome was stalemated, not an American victory. The final armistice line was near the original 38th parallel."}, {"text": "It demonstrated the limits of containment, since South Korea failed to achieve reunification under a pro-Western government", "isCorrect": false, "rationale": "Containment's goal was not reunification but preventing further Communist expansion. Maintaining South Korea's independence at roughly the same border as before the war is entirely consistent with the containment strategy as defined in the source."}, {"text": "It preserved South Korean independence, consistent with the containment strategy's goal of preventing further Communist expansion, even though reunification was not achieved", "isCorrect": true, "rationale": "Containment aimed to prevent Soviet (and Communist) expansion, not to roll back existing Communist governments. The armistice restored the pre-war border, preserving the non-Communist South Korean state — exactly what containment required. The source frames Korea as the 'first major military confrontation of the Cold War' and situates it within the containment framework."}, {"text": "It forced the Soviet Union to withdraw from Korea and abandon support for Communist governments in Asia", "isCorrect": false, "rationale": "The source does not claim the Korean War caused the Soviet Union to abandon Asian Communist movements. Soviet support for Communist movements in Asia (Vietnam, etc.) continued well after 1953."}]}, {"question": "The source defines a proxy war as 'a conflict in which two or more outside powers support opposing sides, allowing the rivalry between those powers to be fought out through local actors rather than directly.' The source then immediately cautions that 'the term \"proxy\" should not obscure the fact that the soldiers who fought and died... were pursuing their own political goals.' Why does the source include this caution?", "options": [{"text": "Because proxy wars were actually fought by superpower troops in disguise, and the 'local actors' framing is a Cold War myth", "isCorrect": false, "rationale": "The source does not suggest superpower troops fought in disguise. American and Chinese troops fought openly in Korea; U.S. forces fought in Vietnam. The caution is about interpretation — local peoples had genuine agency — not about the factual presence of superpower military involvement."}, {"text": "To remind students that local peoples in Cold War conflicts had their own political goals and agency, and that framing their struggles solely as superpower competitions erases their historical subjectivity", "isCorrect": true, "rationale": "The source states exactly this: 'the superpower framing was imposed on, and often distorted, indigenous struggles' and that local soldiers were 'pursuing their own political goals.' This reflects the AP World anti-Eurocentric, agency-centered framework: Global South peoples were not merely pawns."}, {"text": "To argue that the Cold War was not actually a global competition but a series of isolated local conflicts with no superpower connection", "isCorrect": false, "rationale": "The source does not deny the Cold War's global dimension — it explicitly frames Korea, Vietnam, Angola, and Afghanistan as Cold War proxy conflicts. The caution is about the interpretive lens, not a denial of superpower involvement."}, {"text": "Because the United States classified all proxy wars as purely local ethnic conflicts to avoid international condemnation for its involvement", "isCorrect": false, "rationale": "This describes a possible propaganda strategy but is not what the source is arguing. The source's caution is an interpretive one for historians, not a description of American Cold War propaganda."}]}, {"question": "Mao's 'Little Red Book' was compiled from his writings and distributed to every soldier in the People's Liberation Army during the Cultural Revolution (1966–76). What does this distribution practice reveal about the Cultural Revolution's political goals?", "options": [{"text": "The Cultural Revolution aimed primarily to modernize China's economy by equipping soldiers with technical training materials", "isCorrect": false, "rationale": "The source describes the Cultural Revolution as 'a decade of political terror that targeted intellectuals and traditional culture' — its goals were political and ideological, not economic modernization. The 'Little Red Book' was a political indoctrination tool, not a technical manual."}, {"text": "The distribution reveals that the Cultural Revolution sought mass ideological conformity, using Mao's quotations as instruments of political discipline in the military and society", "isCorrect": true, "rationale": "The sourcing note explicitly asks what 'the compilation and mass distribution of these quotations tell you about the Cultural Revolution's political goals.' The source states the 'Little Red Book' became 'symbols of the Cultural Revolution's demand for ideological conformity' — mass distribution was the mechanism for achieving this conformity."}, {"text": "Mass distribution of political texts was a Soviet innovation that Mao adopted to demonstrate loyalty to Marxist orthodoxy", "isCorrect": false, "rationale": "The source emphasizes that Mao 'developed a distinctively Chinese form of Marxism' and broke with the Soviet Union in the Sino-Soviet Split. Attributing the 'Little Red Book' strategy to Soviet influence contradicts the source's characterization of Mao's distinctive approach."}, {"text": "The Cultural Revolution was primarily a foreign policy initiative designed to inspire Communist revolutions in Africa and Asia", "isCorrect": false, "rationale": "The source describes the Cultural Revolution as a domestic political campaign targeting 'intellectuals and traditional culture.' While Mao 'supported revolutionary movements across Africa and Asia,' this is described separately from the Cultural Revolution's domestic character."}]}, {"question": "The United States blocked the 1956 Vietnamese reunification elections scheduled under the 1954 Geneva Accords, 'fearing Ho Chi Minh would win.' This decision illustrates a tension within American Cold War policy between:", "options": [{"text": "Military containment and economic aid, since the United States spent too much on Vietnam's economy and not enough on military defense", "isCorrect": false, "rationale": "The tension highlighted in the source is not between military and economic aid but between democratic principle and anti-Communist strategy. The U.S. blocked elections — a democratic mechanism — out of fear of a Communist electoral victory."}, {"text": "The democratic principles the United States claimed to defend and the anti-Communist strategic calculus that drove its Vietnam policy", "isCorrect": true, "rationale": "The U.S. championed 'multiparty electoral democracy' as a core value but blocked elections because it feared Ho Chi Minh would win. This is a direct contradiction between stated democratic values and strategic action — exactly the kind of tension AP exam questions ask students to identify and analyze."}, {"text": "Isolationism and internationalism, since Congress opposed the Vietnam intervention while presidents escalated it", "isCorrect": false, "rationale": "The source does not frame the Vietnam decision in terms of isolationism vs. internationalism, nor does it attribute congressional opposition to the blocking of the 1956 elections. The tension the source highlights is between democratic ideals and anti-Communist strategic action."}, {"text": "Containment and détente, since blocking elections reflected containment while the Paris Peace Accords reflected détente", "isCorrect": false, "rationale": "Détente (easing of Cold War tensions) emerged in the early 1970s — decades after the 1956 elections were blocked. The source does not use détente as a frame for the Vietnam decision."}]}, {"question": "In October 1962, a Soviet submarine near Cuba lost contact with Moscow and its commander, believing war had already begun, nearly launched a nuclear torpedo. This detail is cited in the source to illustrate that brinkmanship:", "options": [{"text": "Was ultimately safe because submarine commanders were trained to exercise independent judgment in communications failures", "isCorrect": false, "rationale": "The source uses this incident to show the opposite: brinkmanship carried 'terrifying fragility' — the near-launch demonstrates how close the crisis came to nuclear war through accident rather than rational decision-making, not that the system was safe."}, {"text": "Depended not only on rational decisions by top leaders but also on the absence of accidents and failures at lower levels of the military chain of command", "isCorrect": true, "rationale": "The source states the crisis was resolved 'not only by the decisions of Kennedy and Khrushchev, but by accident' — the submarine incident nearly produced a nuclear exchange without any decision by top leadership. This reveals that brinkmanship's 'logic' assumed rational actors at all levels, an assumption that came terrifyingly close to failing."}, {"text": "Proved that the Soviet military was unreliable and that the United States could exploit this weakness in future crises", "isCorrect": false, "rationale": "The source presents the submarine incident as evidence of brinkmanship's inherent fragility — not as a uniquely Soviet weakness to be exploited. The lesson drawn was that 'direct confrontation had to be avoided,' not that one side could exploit the other's military unreliability."}, {"text": "Was a deliberate Soviet tactic to signal willingness to use nuclear weapons without actually doing so", "isCorrect": false, "rationale": "The source presents the submarine incident as an accident — loss of contact with Moscow, not a deliberate signal. Intentional signaling would be a strategic choice; the near-launch was precisely the kind of accident the source uses to illustrate brinkmanship's fragility."}]}, {"question": "Compare China's role in the Korean War (1950–51) with the United States' role in Vietnam (1965–73). Which comparison is most accurately grounded in the source?", "options": [{"text": "Both China and the United States intervened for purely ideological reasons, with no strategic or security interests involved", "isCorrect": false, "rationale": "Both interventions involved a mix of ideological and strategic motives. China intervened partly because UN forces were approaching its border — a security concern. The U.S. intervened partly to prevent Communist expansion — ideological — but also for strategic reasons related to regional credibility. Describing either as 'purely ideological' oversimplifies the source."}, {"text": "Both were examples of great powers intervening in smaller neighbors' conflicts when they perceived a threat to their security or ideological interests — China at its border, the U.S. in its Cold War theater", "isCorrect": true, "rationale": "China intervened when UN forces approached the Chinese border — a direct security concern. The U.S. intervened in Vietnam as part of its global containment strategy. Both fit the pattern of great powers amplifying local conflicts when strategic interests were threatened — and both demonstrate how great powers' interventions shaped (and distorted) indigenous conflicts."}, {"text": "China succeeded militarily while the United States failed, demonstrating that Communist forces were superior fighters in Asian terrain", "isCorrect": false, "rationale": "This conflates military outcomes with ideological causes and makes an unfounded generalization. China drove UN forces back but did not 'win' the Korean War; the U.S. withdrew from Vietnam after 1973 but did not face China as its opponent. The source's analysis focuses on the political dynamics of proxy war, not on Asian vs. Western military competence."}, {"text": "Both interventions were authorized by the United Nations Security Council, demonstrating Cold War cooperation through international institutions", "isCorrect": false, "rationale": "The source states Korea was authorized through the UN Security Council because the Soviet Union was boycotting it and could not veto. The Vietnam War was not authorized by the UN Security Council. This comparison is factually inaccurate."}]}, {"question": "Vietnam's outcome — reunification under Communist rule in 1975 — demonstrated, according to the source, that:", "options": [{"text": "The Soviet Union's material support for North Vietnam was the decisive factor in the war's outcome", "isCorrect": false, "rationale": "The source emphasizes Vietnamese agency and the nature of the independence struggle, not Soviet material support, as the decisive factor. The source's framing: 'nuclear deterrence and technological superiority could not overcome a determined independence movement fighting on its own terrain.'"}, {"text": "Nuclear deterrence and technological superiority could not overcome a determined independence movement fighting on its own terrain", "isCorrect": true, "rationale": "This is a direct quotation from the source summarizing the Vietnam War's lesson. The United States possessed overwhelming nuclear and technological advantages; Vietnam demonstrates those advantages did not translate into political victory against a movement fighting on home territory with indigenous support."}, {"text": "Brinkmanship was ineffective in Asia because Asian states did not fear nuclear escalation", "isCorrect": false, "rationale": "The source does not frame the Vietnam outcome in terms of brinkmanship or nuclear fear. The lesson drawn is about the limits of military power and technological superiority against indigenous independence movements, not about brinkmanship specifically."}, {"text": "American public opposition to the war was the primary cause of military defeat, since the U.S. military strategy was otherwise sound", "isCorrect": false, "rationale": "The source does not support this interpretation. It emphasizes the character of the conflict — a determined independence movement fighting on its own terrain — rather than attributing the outcome to domestic American politics or suggesting the military strategy was sound."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
