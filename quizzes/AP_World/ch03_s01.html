<body>
<div class="quiz-container">

        <h1>QUIZ</h1>
        <div class="subtitle">AP World History: Modern &mdash; The Gunpowder Empires</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "A historian argues: 'The most powerful state in the sixteenth-century world was not Spain, Portugal, or England, but the Ottoman Empire under Süleyman the Magnificent.' Which piece of evidence from the period BEST supports this claim?", "options": [{"text": "The Ottoman Empire was founded in 1299, making it older than any European nation-state.", "isCorrect": false, "rationale": "Age of founding does not equate to power or global influence; this evidence speaks to longevity, not dominance in the sixteenth century specifically."}, {"text": "The Ottomans seized Constantinople in 1453, advanced into Hungary, besieged Vienna, dominated Red Sea trade, and collectively governed more than a third of the world's population at their peak.", "isCorrect": true, "rationale": "The source explicitly states the empire stretched from Algeria to Mesopotamia and that the three gunpowder empires together governed more than a third of the world's population — and notes that 'the most powerful state of the sixteenth century was Ottoman, not European.'"}, {"text": "Süleyman patronized Mimar Sinan, whose Suleymaniye Mosque is one of the great works of Islamic architecture.", "isCorrect": false, "rationale": "Cultural patronage illustrates prestige, but it does not by itself establish the claim of being the world's most powerful state militarily and politically."}, {"text": "The Ottomans administered a multicultural population through the millet system, which was more tolerant than European practices.", "isCorrect": false, "rationale": "Administrative tolerance is relevant context but is not the most direct evidence of the empire's global power ranking compared with territorial reach and population governed."}], "id": "q01"}, {"question": "The Ottoman millet system and Mughal emperor Akbar's policies both aimed to govern religiously diverse populations. Which statement BEST identifies a key difference between these two approaches?", "options": [{"text": "The millet system forced religious conversion, while Akbar granted full legal equality to all faiths.", "isCorrect": false, "rationale": "The millet system explicitly protected non-Muslims from forced conversion. Akbar's policies were inclusive but did not fully equalize all faiths — he abolished jizya, for example, but the state remained Mughal/Islamic in character."}, {"text": "The millet system maintained Muslim supremacy while granting communal autonomy to non-Muslims; Akbar actively blended traditions and appointed non-Muslims to high office, moving toward syncretism.", "isCorrect": true, "rationale": "The source describes the millet system as granting recognized communities self-governance while paying jizya and being barred from high office, whereas Akbar abolished the jizya, appointed Hindus to high positions, and developed Din-i-Ilahi — a syncretic personal philosophy."}, {"text": "The millet system applied only to Christians, while Akbar's policies applied only to Hindus.", "isCorrect": false, "rationale": "The millet system covered Greek Orthodox Christians, Armenian Christians, and Jews. Akbar's court included Muslims, Hindus, Sikhs, Jains, Zoroastrians, and Christians."}, {"text": "Akbar's policies were reversed within a decade, while the millet system persisted for centuries.", "isCorrect": false, "rationale": "Akbar's inclusive policies lasted throughout his reign (1556–1605); it was Aurangzeb, fifty years later, who reversed them. The millet system also persisted — but the reversal timeline for Akbar's policies is misdescribed."}], "id": "q02"}, {"question": "Read the following passage: 'Gunpowder conquered territory; administration and ideology held it.' Which historical example from the Gunpowder Empires BEST illustrates the second part of this statement?", "options": [{"text": "The Ottoman use of cannon and Janissary infantry at the siege of Constantinople in 1453.", "isCorrect": false, "rationale": "This illustrates the first part of the statement — military technology used to conquer territory — not the administrative and ideological systems that sustained empire afterward."}, {"text": "The Mughal use of muskets at the First Battle of Panipat (1526) to defeat the Lodi Sultanate.", "isCorrect": false, "rationale": "Again, this is a military-technology example illustrating gunpowder conquest, not administrative or ideological governance."}, {"text": "Süleyman's legal code (kanun), the millet system, and provincial governors (valis) who collected taxes and maintained order across Ottoman territories.", "isCorrect": true, "rationale": "The source explicitly identifies these administrative structures — kanun, vilayet provinces, millet system — as part of the 'sophisticated administrative system' that enabled the Ottomans to govern vast and diverse territories beyond the initial conquest."}, {"text": "Shah Abbas I's importation of slave soldiers (ghulam) to replace tribal cavalry in the Safavid army.", "isCorrect": false, "rationale": "This is a military reform — army restructuring — rather than an example of administrative or ideological system-building used to hold conquered territory together."}], "id": "q03"}, {"question": "Shah Ismail I's decision to declare Twelver Shi'a Islam the official Safavid state religion PRIMARILY served which political function?", "options": [{"text": "It attracted Sunni scholarly talent from across the Muslim world to Safavid courts.", "isCorrect": false, "rationale": "The opposite is true: Sunni scholars were displaced or coerced. The Safavids imported Shi'a scholars from Lebanon and Bahrain precisely because the local population was predominantly Sunni."}, {"text": "It enabled the Safavids to collect the jizya from a larger non-Muslim population.", "isCorrect": false, "rationale": "Jizya was a tax on non-Muslims in the Ottoman system. Converting the population to Shi'a Islam would reduce, not increase, the non-Muslim population subject to jizya."}, {"text": "It differentiated the Safavid state from Sunni rivals (Ottomans and Mughals), provided ideological cohesion, and legitimized the shah's near-sacred authority through claimed descent from the seventh Shi'a imam.", "isCorrect": true, "rationale": "The source identifies all three functions: distinguishing Safavid Iran from the Ottoman Sunni caliphate and the mostly-Sunni Mughal Empire; rallying a distinct Persian-speaking identity; and positioning the shah as a near-sacred figure through claimed Imami descent."}, {"text": "It promoted trade with Shi'a Muslim merchants from the Indian Ocean world, generating revenue for the state.", "isCorrect": false, "rationale": "The source does not link the Shi'a conversion to a trade strategy. The Safavid economy relied more on Persian administrative traditions and the silk trade; the religious transformation was primarily political-ideological."}], "id": "q04"}, {"question": "Babur, founder of the Mughal Empire, traced his lineage to both Timur (Tamerlane) and Chinggis Khan. Why would these genealogical claims have been politically valuable in the context of Central Asian and South Asian power politics in the early sixteenth century?", "options": [{"text": "They demonstrated Babur's commitment to Islamic orthodoxy, which helped him win support from Muslim clerics across the subcontinent.", "isCorrect": false, "rationale": "Chinggis Khan was not Muslim, and Timurid genealogy was associated with military conquest rather than Islamic piety. Clerical support would have required different legitimizing strategies."}, {"text": "They connected Babur to two of the most powerful conquerors in Eurasian history, lending his rule the prestige of a universally recognized imperial tradition and signaling the right to rule by conquest.", "isCorrect": true, "rationale": "In the post-Mongol world, Chinggisid and Timurid descent functioned as claims to a recognized legitimacy of conquest and empire. The source notes that Babur's memoir reflects his self-understanding as heir to these traditions; his genealogy was a political argument about the right to rule."}, {"text": "They enabled Babur to claim the Ottoman caliphate and position himself as defender of Sunni Islam.", "isCorrect": false, "rationale": "The Ottoman caliphate claim was separate and came later in Ottoman history. Babur's genealogy was Timurid-Chinggisid, not tied to the Arab caliphate tradition."}, {"text": "They gave Babur legal authority under the Safavid political system, since the Safavids also claimed descent from Chinggis Khan.", "isCorrect": false, "rationale": "The Safavids claimed descent from the Shi'a imams, not from Chinggis Khan. Babur's genealogical claims operated within a different legitimizing framework."}], "id": "q05"}, {"question": "Aurangzeb's reign (1658–1707) extended Mughal territory to its maximum extent but is also associated with the empire's subsequent fragmentation. Which explanation BEST fits the historical evidence presented in the source?", "options": [{"text": "Aurangzeb's military campaigns exhausted the treasury, leaving no resources to maintain distant frontier provinces.", "isCorrect": false, "rationale": "While military overextension may have contributed, the source specifically emphasizes a different causal mechanism — alienation of Hindu, Sikh, and Shi'a subjects through religious policy reversals — as the driver of fragmentation."}, {"text": "Aurangzeb's reinstatement of the jizya, destruction of some Hindu temples, and enforcement of Sunni orthodoxy alienated large segments of the empire's population, fueling the fragmentation that followed his death.", "isCorrect": true, "rationale": "The source explicitly states: 'the alienation of Hindu, Sikh, and Shi'a subjects contributed to the imperial fragmentation that followed his death' — directly linking religious policy reversals to political instability."}, {"text": "Aurangzeb's administrative reforms eliminated the zamindari (landholder) system, removing the rural elite that had supported earlier Mughal rulers.", "isCorrect": false, "rationale": "The source does not mention zamindari reforms as a cause of fragmentation. The stated cause is specifically the religious policy changes and their alienating effect on non-Sunni subjects."}, {"text": "Aurangzeb's conflict with the Safavids drained military resources and opened the Mughal northwest frontier to invasion.", "isCorrect": false, "rationale": "The source does not identify Safavid conflict as the cause of Mughal fragmentation. The internal alienation of diverse religious communities is the mechanism described."}], "id": "q06"}, {"question": "The devshirme system required Ottoman officials to conscript boys from Christian families, convert them to Islam, and train them in palace schools. A historian argues this system gave the sultan more reliable officials than hereditary nobles would have provided. Which reasoning BEST supports this argument?", "options": [{"text": "Devshirme recruits were more educated than hereditary nobles because they attended palace schools.", "isCorrect": false, "rationale": "While education is mentioned, the source's argument for reliability is not based on education but on the absence of independent power bases — a structural argument about loyalty incentives, not intellectual preparation."}, {"text": "Because devshirme recruits owed their entire social position to the sultan and had no independent land, family connections, or tribal followings, they had no power base from which to challenge the sultan and every incentive to remain loyal.", "isCorrect": true, "rationale": "The source states explicitly: 'devshirme recruits owed everything to the sultan and had no independent power base or family inheritance, they were theoretically more loyal than hereditary nobles.'"}, {"text": "Devshirme recruits were Christian-born, making them ideologically opposed to Islamic rivals of the Ottoman state.", "isCorrect": false, "rationale": "Recruits were converted to Islam upon selection. Their Christian origin was the starting point of the system, but it does not explain their loyalty to the sultan — that loyalty came from structural dependence, not religious identity."}, {"text": "The devshirme system recruited from conquered territories, giving recruits a motive to prove loyalty to their new state.", "isCorrect": false, "rationale": "While plausible as a general logic, this is not the explanation offered in the source. The source emphasizes the absence of independent power bases, not a psychological motive to prove loyalty through origin."}], "id": "q07"}, {"question": "Which statement BEST explains why historians call the Ottoman, Safavid, and Mughal states 'Gunpowder Empires'?", "options": [{"text": "All three empires independently invented gunpowder and firearms within the same century.", "isCorrect": false, "rationale": "Gunpowder was invented in China and diffused across Eurasia. The source notes these empires 'used firearms and artillery — technologies that had diffused from China across Eurasia' — none of them invented it independently."}, {"text": "All three empires used cannon and firearms, which had diffused from China, to overwhelm cavalry-based rivals and project power over large territories.", "isCorrect": true, "rationale": "The source directly states: 'all three used firearms and artillery — technologies that had diffused from China across Eurasia — to overwhelm cavalry-based rivals and project imperial power over enormous distances.'"}, {"text": "All three empires specialized in the manufacture and export of gunpowder as a major source of state revenue.", "isCorrect": false, "rationale": "The source does not mention gunpowder manufacturing or export as a revenue source. The term refers to their military use of the technology, not economic production of it."}, {"text": "All three empires banned cavalry warfare and replaced it entirely with gunpowder-armed infantry by 1500.", "isCorrect": false, "rationale": "Cavalry remained important across all three empires. The Shah Abbas I army reform, for example, replaced unreliable tribal cavalry with a standing force — not with pure gunpowder infantry. The transition was gradual and partial."}], "id": "q08"}, {"question": "Consider this scenario: A Christian merchant in sixteenth-century Istanbul is subject to Ottoman rule. Under the millet system, which combination of rights and restrictions would he MOST LIKELY experience?", "options": [{"text": "He may practice his faith freely, govern his community's internal affairs (marriage, inheritance, education) under his own laws, but must pay the jizya poll tax and is barred from military service and high office.", "isCorrect": true, "rationale": "The source's definition of the millet system states exactly this: recognized communities could govern personal-status affairs under their own laws and leaders while 'paying a poll tax (jizya) to the Ottoman state' and being 'barred from certain roles (military service, high office) but protected from forced conversion.'"}, {"text": "He may practice his faith freely and serve in the Janissary corps, but must pay double the tax rate of Muslim merchants.", "isCorrect": false, "rationale": "The Janissary corps was recruited through the devshirme system from boys who were then converted to Islam — it was not open to practicing Christians as an adult choice. The double-tax rate is also not mentioned in the source."}, {"text": "He is required to convert to Islam within one generation or face expulsion from the empire.", "isCorrect": false, "rationale": "The source explicitly states non-Muslims were 'protected from forced conversion.' Conversion demands would contradict the millet system's core logic."}, {"text": "He is granted full equality with Muslim subjects in all legal matters, including the ability to hold high government office.", "isCorrect": false, "rationale": "The source states non-Muslims were 'barred from certain roles (military service, high office).' Full legal equality was not part of the millet system."}], "id": "q09"}, {"question": "Which SPICE-T theme MOST directly connects the Safavid conversion of Iran to Shi'a Islam, the Ottoman millet system, and Akbar's Din-i-Ilahi?", "options": [{"text": "Economic — each policy was designed to generate new revenue streams for the state through trade or taxation of religious minorities.", "isCorrect": false, "rationale": "While the jizya was a revenue mechanism, that is not the primary connective theme. Akbar abolished the jizya, undermining an economic explanation. Shi'a conversion was not a revenue strategy."}, {"text": "Cultural/Political — all three were deliberate state policies using religion (as state identity, as managed pluralism, or as syncretic ideology) to legitimize rule and manage diverse populations.", "isCorrect": true, "rationale": "The source's Key Concept explicitly frames all three empires as using 'sophisticated bureaucratic, legal, and ideological systems to legitimize authority, manage diverse populations, and extract resources.' Religion — imposed, tolerated, or blended — was the primary ideological tool in each case."}, {"text": "Technology — each empire relied on new religious texts printed with the Gutenberg press to spread state-sponsored ideology rapidly across large territories.", "isCorrect": false, "rationale": "The printing press connection is relevant to the European Reformation but is not mentioned in the source for any of the three gunpowder empires. Their religious strategies operated through different mechanisms."}, {"text": "Interaction with Environment — the three empires used religious communities to manage different ecological zones (desert, steppe, farmland) with distinct administrative systems.", "isCorrect": false, "rationale": "The source does not link religious policy to ecological zone management. This is an implausible connection not supported by the text."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
