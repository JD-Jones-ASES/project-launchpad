<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP World History: Modern &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_World.html">&larr; Back to AP World History: Modern</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP World History: Modern &mdash; The Mongol Engine</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The Mongol Empire covered more than 24 million square kilometers at its peak. A historian describes it as 'the largest contiguous land empire in world history.' Which of the following BEST contextualizes this claim's significance for exchange networks?", "options": [{"text": "Its large size meant that the Mongols could produce a wide variety of goods internally, reducing their need for trade with outside societies.", "isCorrect": false, "rationale": "The Mongols were pastoral nomads, not agricultural or manufacturing producers. Their significance for exchange networks was in unifying space for trade, not in self-sufficient production."}, {"text": "By unifying the Eurasian steppe under a single political authority, the empire eliminated the fragmented borders that had previously disrupted overland trade, creating conditions for unprecedented commercial connectivity.", "isCorrect": true, "rationale": "The text argues that Mongol unification eliminated 'custom-collecting, tribute-demanding borders that had previously fragmented Eurasian overland trade,' creating a vast zone of protected commerce—the key mechanism connecting conquest to exchange."}, {"text": "The empire's geographic size required it to impose heavy tariffs on merchants to fund its administration, making trade more expensive than before the Mongol conquest.", "isCorrect": false, "rationale": "The Mongol peace reduced trade barriers; while they taxed commerce, the text's argument is that unification lowered the cumulative barrier of crossing multiple fragmented political zones—the net effect was increased, not decreased, commercial activity."}, {"text": "The empire's size gave Mongol merchants a monopoly over all overland trade routes, driving out Silk Road middlemen.", "isCorrect": false, "rationale": "The text does not describe Mongol merchants replacing other groups; rather, the Mongol state created conditions of safety and legal uniformity within which diverse private merchants (including Venetians, Muslim traders, and Chinese) operated."}], "id": "q01"}, {"question": "Read the following: 'Cities that surrendered without resistance were typically spared and incorporated into the imperial administrative system; cities that resisted faced systematic massacre and destruction.' What does this passage reveal about Mongol military strategy?", "options": [{"text": "Mongol leaders were inherently cruel and found satisfaction in destruction regardless of military necessity.", "isCorrect": false, "rationale": "The text explicitly characterizes the terror as 'calculated' and 'a rational policy'—not mere savagery. The calculated nature distinguishes strategic choice from inherent cruelty."}, {"text": "The calculated use of terror was a rational policy designed to reduce siege duration and conquest costs by incentivizing surrender.", "isCorrect": true, "rationale": "The text states explicitly: 'This calculated terror was not mere savagery but a rational policy: the reputation for total destruction reduced the duration of sieges and the cost of conquest.'"}, {"text": "The Mongols were unable to administer conquered cities and therefore destroyed them to prevent rebellion.", "isCorrect": false, "rationale": "The text says surrendering cities were 'incorporated into the imperial administrative system'—demonstrating that the Mongols had an administrative framework for managing conquered territories, not just a policy of destruction."}, {"text": "Mongol armies lacked siege technology and could only destroy, not capture, fortified urban centers.", "isCorrect": false, "rationale": "The text specifically notes that the Mongols recruited Chinese, Persian, and Arab engineers to operate siege weapons (trebuchets, battering rams, gunpowder devices), making them the 'first steppe army capable of reducing fortified urban centers efficiently.'"}], "id": "q02"}, {"question": "Chinggis Khan's decimal system divided the Mongol army into units of ten, one hundred, one thousand, and ten thousand, cutting across clan and tribal lines. Why was this innovation particularly significant?", "options": [{"text": "It increased the size of the Mongol army by recruiting soldiers from conquered peoples into existing clan-based units.", "isCorrect": false, "rationale": "The text does not describe the decimal system as a recruitment mechanism for conquered peoples; its significance was breaking down clan loyalties to create units loyal to commanders—a structural reorganization, not an enlargement."}, {"text": "It created a professional army of extraordinary cohesion and discipline by replacing clan loyalty with loyalty to commanders, enabling coordination across vast distances.", "isCorrect": true, "rationale": "The text states the decimal system cut across clan lines to create 'units loyal to commanders rather than kin groups,' producing 'a professional army of extraordinary cohesion and discipline, capable of coordinating attacks across fronts hundreds of kilometers wide.'"}, {"text": "It guaranteed that soldiers of the same ethnic background would always fight together, maintaining cultural identity in the army.", "isCorrect": false, "rationale": "The text describes the opposite: the decimal system deliberately cut across clan and tribal lines, breaking down ethnic cohesion in favor of commander loyalty and professional discipline."}, {"text": "It standardized payment and logistics for the army, making it the first military force in history to use a centralized pay system.", "isCorrect": false, "rationale": "The text does not attribute a centralized pay system to the decimal organization; the innovation's significance was military cohesion and command structure, not payroll administration."}], "id": "q03"}, {"question": "The text describes the Mongol Empire's historical legacy as a 'paradox.' What is this paradox, and which of the following options BEST states it?", "options": [{"text": "The Mongols claimed to promote universal peace but were secretly planning further conquests throughout the Pax Mongolica.", "isCorrect": false, "rationale": "This option describes deception, not paradox. The text's paradox is structural—the same conquests that destroyed civilizations also created the conditions for unprecedented connectivity."}, {"text": "The Mongols were militarily powerful but politically weak, unable to maintain their empire beyond a single generation.", "isCorrect": false, "rationale": "The empire lasted from 1206 through the 1360s—multiple generations—before successor khanates fragmented. Political weakness in a single generation is not the text's framing."}, {"text": "The same conquest and destruction that killed millions and devastated urban centers created the political unity, legal system, and infrastructure that enabled the most intensive phase of Eurasian exchange.", "isCorrect": true, "rationale": "The text states: 'The civilization-ending events of the thirteenth century and the civilization-connecting era of the fourteenth are two faces of the same Mongol project'—precisely this paradox of destruction producing connectivity."}, {"text": "The Mongols destroyed agriculture in Central Asia but accidentally improved it by introducing new crop varieties.", "isCorrect": false, "rationale": "The text does not mention crop introduction as part of the Mongol paradox; agricultural innovation is associated with the Pax Mongolica in Section 2.5, not with the initial conquest phase described here."}], "id": "q04"}, {"question": "Consider the following scenario: A merchant in 1270 CE wishes to travel overland from the Black Sea to Beijing. Compared to a merchant making the same journey in 1220 CE, what key advantage does the 1270 merchant have?", "options": [{"text": "The invention of paper money by Chinese engineers, which makes carrying large sums of silver unnecessary.", "isCorrect": false, "rationale": "Paper money was a Song dynasty innovation adopted by the Yuan; while it is mentioned in Section 2.5, the text in Section 2.4 identifies political unification, religious tolerance, and the Yam system—not paper money—as the three mechanisms enabling increased commerce."}, {"text": "Travel under a single political authority with a common legal system, access to Yam relay stations, and protection backed by the credible threat of imperial retribution.", "isCorrect": true, "rationale": "The text identifies all three mechanisms: political unification eliminating fragmented borders, the Yam postal relay enabling communication and movement, and legal/religious tolerance making diverse merchants welcome—together making cross-continental travel qualitatively safer and faster."}, {"text": "Access to faster maritime routes via the Indian Ocean that the Mongols developed to connect China directly to the Mediterranean.", "isCorrect": false, "rationale": "The Mongols were a land-based empire; they did not develop Indian Ocean maritime routes. The advantages described for Silk Road travel were all terrestrial—the Yam relay and political unification of the steppe."}, {"text": "The elimination of Chinese export restrictions on silk and porcelain, which increased the profit margin for westward-traveling merchants.", "isCorrect": false, "rationale": "The text does not describe Chinese export restrictions being lifted as a specific Mongol commercial innovation; the focus is on political unification, religious tolerance, and the Yam relay system as the key mechanisms."}], "id": "q05"}, {"question": "The Mongols adopted siege technology—trebuchets, battering rams, and gunpowder devices—from conquered peoples. What broader historical pattern does this adaptation illustrate?", "options": [{"text": "Steppe nomads were technologically superior to settled agricultural civilizations in all forms of warfare.", "isCorrect": false, "rationale": "The text notes the Mongols had advantages in open-field cavalry combat but could NOT take walled cities without recruiting engineers from conquered peoples—acknowledging their technological limitation in siege warfare."}, {"text": "Military effectiveness in this period depended on adaptability—incorporating the technical expertise of conquered peoples rather than relying solely on steppe cavalry tactics.", "isCorrect": true, "rationale": "The text highlights Mongol 'adaptability to new military technologies' as an 'often overlooked' strength—specifically recruiting Chinese, Persian, and Arab engineers for siege operations, combining steppe mobility with settled civilizations' technical knowledge."}, {"text": "The Mongols' use of gunpowder demonstrates that China played no unique role in technological innovation, since many peoples independently developed gunpowder.", "isCorrect": false, "rationale": "The text attributes gunpowder to Chinese origin—'early applications of Chinese gunpowder'—and identifies westward diffusion through Mongol channels as the mechanism of spread, not independent development."}, {"text": "Urban centers in Central Asia had superior military technology, which is why they successfully resisted Mongol conquest for decades.", "isCorrect": false, "rationale": "The text describes successful Mongol conquest of urban centers including Merv (1221) and Baghdad (1258)—urban technological superiority did not prevent conquest. The siege technology was deployed by the Mongols against these cities, not used by them in defense."}], "id": "q06"}, {"question": "Chinggis Khan's legal code (the yasa) mandated religious tolerance within the empire, exempting clergy of all faiths from taxation. What was the PRIMARY rationale for this policy, according to the source?", "options": [{"text": "Chinggis Khan was personally drawn to multiple religious traditions and believed in genuine theological pluralism.", "isCorrect": false, "rationale": "The text explicitly states that tolerance 'reflected not theological liberalism but practical governance'—the policy was strategic, not personal belief."}, {"text": "Religious tolerance was a practical governance strategy in a multi-faith empire, where persecution would have provoked costly rebellions.", "isCorrect": true, "rationale": "The text states: 'The Mongols ruled peoples of many faiths and understood that religious persecution would produce costly rebellions'—tolerance was calculated statecraft, not ideological commitment."}, {"text": "The yasa's religious tolerance provisions were required by Islamic law, which the Mongols adopted after conquering Central Asian Muslim populations.", "isCorrect": false, "rationale": "The Mongols did not adopt Islam during Chinggis Khan's rule; the yasa exempted Muslim, Christian, Buddhist, and Taoist clergy alike—an inclusive policy predating any Islamization of particular khanates."}, {"text": "Mongol generals feared that attacking religious institutions would anger the supernatural forces they believed protected those buildings.", "isCorrect": false, "rationale": "The text gives no credence to supernatural fear as the rationale; it explicitly attributes the policy to rational cost-benefit calculation about rebellion prevention."}], "id": "q07"}, {"question": "The sack of Baghdad in 1258, in which the Abbasid caliph was reportedly killed by being rolled in felt to avoid shedding royal blood, represents which of the following for Islamic civilization?", "options": [{"text": "A minor political setback quickly reversed when a new caliph was installed in Cairo within months.", "isCorrect": false, "rationale": "While an Abbasid figurehead was installed in Cairo, Baghdad had been 'the intellectual capital of the Islamic world' and its destruction was widely experienced as catastrophic—not a minor setback."}, {"text": "The destruction of the Abbasid caliphate and the city that had been the intellectual capital of the Islamic world—the most catastrophic example of what Mongol resistance meant.", "isCorrect": true, "rationale": "The text describes Baghdad's destruction alongside Merv's (1221) as 'the most catastrophic examples of what resistance meant,' and notes the Abbasid caliphate's end as a profound blow to Islamic civilization."}, {"text": "A primarily military event that strengthened the Ottoman Empire, which expanded to fill the power vacuum left by the Abbasids.", "isCorrect": false, "rationale": "The Ottoman Empire's rise was decades later; the immediate successors in the region were Mamluk Egypt and the Ilkhanate, not the Ottomans. The text does not describe Ottoman expansion as a consequence of Baghdad's fall."}, {"text": "Proof that the Mongols were motivated by anti-Islamic religious ideology rather than political and military strategy.", "isCorrect": false, "rationale": "The text's framework is strategic, not ideological: cities that resisted were destroyed regardless of religion. The Mongols destroyed Buddhist, Christian, and Muslim cities alike when they resisted."}], "id": "q08"}, {"question": "A student compares Mongol military organization to the armies of settled agricultural states. Which of the following accurately captures the Mongols' key structural advantage in open-field combat?", "options": [{"text": "The Mongols outnumbered their opponents, drawing on the large population of the Mongolian plateau.", "isCorrect": false, "rationale": "The Mongolian plateau was sparsely populated; Mongol armies were typically smaller than the infantry armies of settled states. Their advantage was mobility, discipline, and tactical sophistication—not numerical superiority."}, {"text": "Mounted archers who could shoot accurately at a full gallop in any direction combined with meritocratic discipline and decimal-unit command structure gave them a decisive open-field advantage.", "isCorrect": true, "rationale": "The text describes the 'Parthian shot' (backward shooting at gallop), the decimal unit system creating cohesion, and meritocratic promotion—together creating an asymmetric advantage over infantry-based armies in open terrain."}, {"text": "Superior iron-forging technology gave Mongol warriors heavier armor and stronger swords than their opponents.", "isCorrect": false, "rationale": "Mongol warriors were known for light armor enabling mobility, not heavy armor. The text emphasizes mobility and the composite bow, not metallurgical superiority."}, {"text": "Mongol armies moved along fixed supply routes, ensuring they were always well-provisioned compared to enemies who foraged for food.", "isCorrect": false, "rationale": "The Mongols traveled with their herds and foraged extensively—their steppe nomadic lifestyle made them less dependent on fixed supply lines than settled armies, the reverse of this option."}], "id": "q09"}, {"question": "The four successor khanates (Yuan, Ilkhanate, Chagatai, Golden Horde) maintained nominal unity under the Great Khan. Historically, this political structure BEST explains which outcome?", "options": [{"text": "The permanent elimination of regional political diversity across Eurasia under a single Mongol law code.", "isCorrect": false, "rationale": "The four khanates maintained distinct political identities and frequently warred with each other (the Ilkhanate and Golden Horde clashed over Azerbaijan); 'permanent elimination of regional diversity' misrepresents the complex, contested reality."}, {"text": "A zone of reduced inter-state friction across Eurasia that, however imperfectly, facilitated the commercial and diplomatic exchanges characteristic of the Pax Mongolica.", "isCorrect": true, "rationale": "The text describes the khanate system as 'imperfect and contested' but states it 'eliminated the custom-collecting, tribute-demanding borders that had previously fragmented Eurasian overland trade'—reduced friction enabling commerce, not permanent unified peace."}, {"text": "The rapid adoption of Chinese administrative methods by all four khanates, producing a uniform bureaucratic system.", "isCorrect": false, "rationale": "Each khanate adapted differently to its regional context; the Ilkhanate eventually converted to Islam, the Golden Horde similarly, while the Yuan maintained Chinese bureaucratic traditions. No uniform administrative adoption occurred."}, {"text": "The permanent end of Chinese imperial dynasties, as Mongol rule replaced the Han Chinese administrative tradition.", "isCorrect": false, "rationale": "The Yuan dynasty (Mongol rule in China) collapsed in 1368 and was replaced by the Ming—demonstrating that Chinese imperial tradition survived Mongol rule and reasserted itself."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
