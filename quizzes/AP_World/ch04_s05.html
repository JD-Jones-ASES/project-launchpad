        <div class="subtitle">AP World History: Modern &mdash; Mercantilism and Joint-Stock Companies</div>

    <div id="score-box" class="score-box">

        <div class="score-detail" id="score-detail"></div>

    <div id="questions"></div>

    <div class="quiz-actions">

<script>
var QUESTIONS = [{"question": "In the mercantilist framework, the primary purpose of colonies was to:", "options": [{"text": "Provide surplus population from overcrowded European cities with land and economic opportunity, reducing social tension at home.", "isCorrect": false, "rationale": "Population relief was not the central purpose of colonies in mercantilist theory. Mercantilism focused on national wealth accumulation through trade balances and bullion; colonies served as raw-material suppliers and captive markets for manufactured goods."}, {"text": "Supply raw materials to the mother country and purchase manufactured goods from it, contributing to a favorable trade balance and accumulation of bullion for the metropolitan power.", "isCorrect": true, "rationale": "The source states that in the mercantilist framework 'colonies existed to serve this purpose: they supplied raw materials to the mother country, bought manufactured goods from it, and were forbidden to trade with rival powers.' This is the core colonial function in mercantilist theory."}, {"text": "Spread Christianity to non-European peoples through missionary activity, fulfilling the crown's obligations under papal treaties like the Treaty of Tordesillas.", "isCorrect": false, "rationale": "Religious mission was an ideological justification for colonialism but was not the economic purpose of colonies in mercantilist theory. The mercantilist framework was explicitly about national wealth, trade balances, and bullion accumulation."}, {"text": "Establish republican self-governing communities that would provide political models for European states seeking to reform their monarchical institutions.", "isCorrect": false, "rationale": "This describes Enlightenment-era political thought, not mercantilist colonial theory. Mercantilist colonies were tightly controlled dependencies, not self-governing republican experiments."}]}, {"question": "The 'price revolution' in sixteenth-century Spain refers to:", "options": [{"text": "A deliberate Spanish government policy of setting fixed prices for colonial goods that helped the crown accumulate bullion more efficiently.", "isCorrect": false, "rationale": "The price revolution was not a government policy but an unintended economic consequence. The source describes it as what 'economists call price revolution' — a market phenomenon caused by the influx of American silver increasing the money supply faster than goods production."}, {"text": "Severe inflation caused by the massive influx of American silver into Spain and Europe, which raised prices and ultimately benefited Spain's commercial rivals by diffusing silver through manufactured goods purchases.", "isCorrect": true, "rationale": "The source states: 'An influx of American silver into Spain and Europe drove up prices (what economists call price revolution) — Spain experienced severe inflation throughout the late sixteenth and seventeenth centuries. American silver also flowed through Spain to pay for manufactured goods from the Dutch Republic, England, and France, enriching Spain's commercial rivals.'"}, {"text": "The competitive lowering of spice prices that occurred after Portuguese and Spanish sea routes ended the Ottoman monopoly on Asian trade.", "isCorrect": false, "rationale": "The price revolution refers to inflation caused by silver inflows, not to falling spice prices. While new sea routes did eventually affect spice pricing, this is not the price revolution the source describes."}, {"text": "The economic crisis in West Africa caused by European manufactured goods flooding African markets and undercutting local artisan production.", "isCorrect": false, "rationale": "The price revolution is a European (specifically Spanish) inflation phenomenon caused by American silver. It is not about African manufacturing competition; that is an entirely different economic argument."}]}, {"question": "Read the following description of the VOC's charter: 'With a charter granting it monopoly rights over all Dutch trade east of the Cape of Good Hope, the VOC was empowered to negotiate treaties, maintain armies and navies, build forts, and govern territories in its own name.' Which of the following best characterizes the VOC based on this description?", "options": [{"text": "A traditional trading company that competed in Asian markets using purely commercial means — lower prices and better quality goods — without political or military intervention.", "isCorrect": false, "rationale": "The description explicitly lists military and governing powers: 'maintain armies and navies, build forts, and govern territories in its own name.' This was far beyond purely commercial competition."}, {"text": "A hybrid state-corporate entity that exercised sovereign powers (war, treaty, jurisdiction) while remaining organized around private investor profit, representing a privatization of empire.", "isCorrect": true, "rationale": "The source describes the VOC and similar companies as the solution to the problem of governance: 'a corporate entity in which multiple investors pooled capital... which received from the crown a charter granting it monopoly trading rights' with powers to 'negotiate treaties, maintain armies and navies, build forts, and govern territories' — precisely the definition of a hybrid state-corporate entity."}, {"text": "A state-owned enterprise in which the Dutch government directly controlled all operations and profit distributions, using it as a branch of the Dutch navy.", "isCorrect": false, "rationale": "The VOC was privately organized — shareholders pooled capital for profit shares. It was not a state-owned enterprise; it received a state charter granting monopoly rights, but its capital and profit structure were private."}, {"text": "A religious organization that used trading profits to fund Dutch Reformed Church missions in Asia, combining commercial and spiritual purposes.", "isCorrect": false, "rationale": "The VOC's purposes were commercial and colonial, not primarily religious. While Dutch Reformed Christianity was part of Dutch colonial culture, the VOC was organized around shareholder profit, not missionary activity."}]}, {"question": "The Banda Islands massacre of 1621, ordered by Jan Pieterszoon Coen, best illustrates which of the following about the VOC?", "options": [{"text": "That the VOC was unusual among European colonial enterprises in its willingness to use violence, unlike more commercially focused English and Portuguese trading companies.", "isCorrect": false, "rationale": "The Banda massacre illustrates how joint-stock companies combined profit motive with state-level violence — not that the VOC was uniquely violent. The source states this 'would characterize European colonialism for the next three centuries,' implying it was systemic, not exceptional."}, {"text": "That joint-stock companies combined the capitalist profit motive with state-level military violence to enforce monopolies — a combination that characterized European colonialism broadly.", "isCorrect": true, "rationale": "The source explicitly states: 'The Banda massacre illustrates how joint-stock companies combined capitalist profit motive with state-level violence — a combination that would characterize European colonialism for the next three centuries.' Coen reduced the islands' population from ~15,000 to fewer than 600 to enforce the VOC's nutmeg monopoly."}, {"text": "That the VOC's violence was motivated primarily by religious conflict between Dutch Calvinists and the Muslim population of the Banda Islands.", "isCorrect": false, "rationale": "The source identifies the Banda massacre as being about enforcing the nutmeg spice monopoly, not about religious conflict. The motive was commercial — controlling the world's only source of nutmeg — not theological."}, {"text": "That the VOC's headquarters in Batavia was designed primarily as a military base rather than a commercial center, reflecting the company's priority of military conquest over trade.", "isCorrect": false, "rationale": "Batavia was founded as the company's Asian headquarters — a commercial and administrative center, though with military dimensions. The source presents trade and violence as inseparable in the VOC model, not as sequential priorities with military displacing commerce."}]}, {"question": "The Treaty of Tordesillas (1494) drew an imaginary line dividing the non-European world between Spain and Portugal. Which of the following most accurately describes the significance of this treaty?", "options": [{"text": "It established a fair and internationally recognized division of the world that all major European powers respected throughout the sixteenth and seventeenth centuries.", "isCorrect": false, "rationale": "The source calls the treaty 'a legal fiction from the beginning' that 'was ignored by the Dutch, English, and French.' Its significance was not as an effective international agreement but as a precedent for European powers claiming the right to divide the world among themselves."}, {"text": "It was a legal fiction negotiated without indigenous consent, ignored by rival powers, but established the precedent that European states could negotiate ownership of the non-European world among themselves.", "isCorrect": true, "rationale": "The source states: 'The treaty was a legal fiction from the beginning — it was negotiated without the knowledge or consent of any of the peoples who actually inhabited the territories it divided, and it was ignored by the Dutch, English, and French.' Its significance was the precedent it established — 'that European powers could negotiate the ownership of the non-European world among themselves' — a logic culminating in the Berlin Conference of 1884."}, {"text": "It represented a significant diplomatic victory for Portugal because it assigned Brazil to Portugal, which became the most economically valuable colony in the New World.", "isCorrect": false, "rationale": "Brazil did go to Portugal under Tordesillas, but the source focuses on the treaty's legal-precedent significance and its status as a legal fiction rather than on Portuguese diplomatic achievement. Framing it as a 'victory' also misrepresents its effectiveness — rivals simply ignored it."}, {"text": "It created the foundations of modern international law by establishing that sovereign states had the right to negotiate territorial boundaries without military conquest.", "isCorrect": false, "rationale": "The source does not credit Tordesillas with founding modern international law. The treaty is framed negatively — as a legal fiction ignoring the existing inhabitants — and as a precedent for European self-dealing, not as a progressive legal development."}]}, {"question": "Why was bullion accumulation a 'self-defeating strategy in the long run' for Spain, according to this section?", "options": [{"text": "Spain spent its silver on military campaigns in Europe, leaving insufficient reserves to fund the administrative costs of the American colonial system.", "isCorrect": false, "rationale": "While Spain did use silver for military campaigns, the self-defeating mechanism the source describes is economic, not administrative. The problem was that silver inflows caused inflation and flowed through Spain to commercial rivals — not simply that military spending depleted reserves."}, {"text": "American silver caused price inflation in Spain and then flowed outward through purchases of foreign manufactured goods, enriching the Dutch, English, and French rather than Spain itself.", "isCorrect": true, "rationale": "The source explains the mechanism: silver inflows caused inflation (price revolution), and 'American silver also flowed through Spain to pay for manufactured goods from the Dutch Republic, England, and France, enriching Spain's commercial rivals. By the mid-seventeenth century, Spain was deeply in debt to northern European banking houses, and the economic benefits of American silver were diffused across the continent.'"}, {"text": "The production of silver at Potosí eventually declined because mercury for the amalgamation process ran out, reducing colonial revenues before Spain had diversified its economy.", "isCorrect": false, "rationale": "Mercury supply depletion is not the mechanism the source identifies. The self-defeating dynamic was structural and economic (inflation + commercial leakage to rivals), not a production supply-chain problem."}, {"text": "Indigenous workers at Potosí eventually organized a successful labor revolt, disrupting silver production and ending the quinto real revenue stream that Spanish imperialism depended on.", "isCorrect": false, "rationale": "The source does not describe a successful labor revolt ending Potosí's production. The self-defeating mechanism was the inflationary and trade-leakage dynamics of mercantilist theory itself, not production disruption."}]}, {"question": "The Virginia Company, founded in 1606, and the Dutch East India Company (VOC), founded in 1602, were both joint-stock companies. In what way were they similar as institutional forms, and in what way did they differ in scope?", "options": [{"text": "Both were similar in granting shareholders monopoly rights over specific territories; but the VOC was primarily a religious organization while the Virginia Company was purely commercial.", "isCorrect": false, "rationale": "Neither company was primarily religious. Both were commercial-colonial enterprises organized around investor profit. The comparison should focus on the scope of their sovereign powers and geographic scale, not on religion."}, {"text": "Both pooled investor capital with crown charter backing; but the VOC had broader sovereign powers (armies, navies, treaties) and a global scope, while the Virginia Company was focused on establishing a specific colonial settlement.", "isCorrect": true, "rationale": "Both were chartered joint-stock companies. The VOC 'was empowered to negotiate treaties, maintain armies and navies, build forts, and govern territories in its own name' across Asia; the Virginia Company 'established the first permanent English settlement in North America at Jamestown (1607)' — a more limited colonial-settlement purpose. Institutional form was similar; the scale and sovereign power differed significantly."}, {"text": "Both were identical in all respects — size, purpose, geographic scope, and degree of sovereign power — because both operated under the same English common law charter framework.", "isCorrect": false, "rationale": "The Virginia Company was English and the VOC was Dutch, so they did not share the same legal framework. More importantly, the VOC had vastly broader sovereign powers and operated across a much larger geographic scope than the Virginia Company."}, {"text": "Both were created to replace the Spanish-Portuguese Tordesillas agreement with a new multilateral framework that gave Protestant powers legitimate access to non-European territories.", "isCorrect": false, "rationale": "Neither company was designed as a legal framework to replace Tordesillas. They were organized around commercial profit with crown charter backing; the source notes that rival powers 'ignored' Tordesillas, not that they designed alternative treaty frameworks."}]}, {"question": "Which of the following best explains why the joint-stock company was described as 'the most consequential institutional innovation of the early modern period'?", "options": [{"text": "It allowed governments to reduce taxation by financing colonial ventures through private capital, freeing state revenues for military and cultural expenditure at home.", "isCorrect": false, "rationale": "Tax reduction is not the significance the source identifies. The joint-stock company's consequential innovation was solving the problems of capital accumulation (risk-sharing), governance (delegating sovereign powers), and political-economic alignment — not tax finance."}, {"text": "It solved capital accumulation (risk-sharing among investors), governance (delegating sovereign powers to a corporate entity), and political-economic alignment (aligning private profit with state geopolitical interests) simultaneously.", "isCorrect": true, "rationale": "The source's Key Concept states: 'It solved the problem of capital accumulation by spreading risk among multiple investors; it solved the problem of governance by delegating sovereign powers (war, treaty, jurisdiction) to a corporate entity; and it aligned the profit motive of private investors with the geopolitical interests of European states.' All three are cited."}, {"text": "It eliminated the need for state involvement in colonial ventures entirely, allowing private entrepreneurs to establish and govern colonies without royal charters or military support.", "isCorrect": false, "rationale": "The joint-stock company did not eliminate state involvement — it institutionalized a partnership between state power (charter, monopoly rights) and private capital. The charter from the crown was essential to the company's legal authority."}, {"text": "It allowed small European states to compete with larger neighbors by converting commercial profits into naval expansion without requiring parliamentary approval for military spending.", "isCorrect": false, "rationale": "Parliamentary approval dynamics are not the source's explanation for the joint-stock company's significance. The innovation was about capital accumulation, governance, and profit-state alignment — not about circumventing constitutional constraints on military spending."}]}, {"question": "The Spanish colonial policy of requiring all trade to flow through designated ports (Seville, then Cádiz) and licensed Spanish ships is best understood as an expression of:", "options": [{"text": "Free-trade liberalism, in which Spain competed openly with rival powers for colonial trade by offering the lowest-cost shipping routes.", "isCorrect": false, "rationale": "The opposite of free trade. Mercantilist port controls were trade monopolies that restricted colonial commerce to licensed channels — the antithesis of open market competition."}, {"text": "Mercantilist trade policy, in which the crown restricted colonial commerce to licensed channels to maximize the extraction of bullion revenue and prevent rivals from benefiting from Spanish colonial trade.", "isCorrect": true, "rationale": "The source identifies this as a direct expression of mercantilist logic: 'Spanish colonial policy required that all trade between Spain's American colonies and the outside world flow through designated ports... and licensed Spanish ships, making smuggling and contraband both illegal and enormously profitable.' This was mercantilist monopoly control in practice."}, {"text": "Joint-stock corporate governance, in which the Spanish crown delegated port management to the VOC as the most efficient colonial trading company available.", "isCorrect": false, "rationale": "Spanish port controls were a function of crown mercantilist policy through the Casa de Contratación — not a delegation to the VOC, which was a Dutch company operating in Asia, not in the Spanish Atlantic."}, {"text": "The Tordesillas Treaty's enforcement mechanism, in which designated ports ensured that only Spanish and Portuguese ships could legally use the Atlantic routes allocated to each power.", "isCorrect": false, "rationale": "Designated ports were a domestic Spanish mercantilist policy controlling trade with its own colonies, not an enforcement mechanism for the Tordesillas Treaty. The two are related to Atlantic commerce but are distinct institutional arrangements."}]}, {"question": "A student claims: 'The rise of joint-stock companies shows that European colonial expansion was driven entirely by private greed, with governments playing no significant role.' Based on this section, which of the following is the most accurate critique of this argument?", "options": [{"text": "The argument is entirely correct — governments were passive, and all meaningful colonial decision-making was made by private investors pursuing profit.", "isCorrect": false, "rationale": "This contradicts the source's argument. Crown charters granted monopoly rights and sovereign powers; governments extracted revenues (quinto real); state power was essential to joint-stock company authority. The companies were hybrids, not purely private actors."}, {"text": "The argument is partially right (private profit was a key motive) but overstates private agency: crown charters granted monopoly rights and sovereign powers, and state interests (geopolitical competition, revenue extraction) shaped the companies' structure and direction.", "isCorrect": true, "rationale": "The source describes joint-stock companies as 'hybrid state-corporate entities' that 'aligned the profit motive of private investors with the geopolitical interests of European states.' Private profit and state power were intertwined, not separate; the crown charter was essential to company authority."}, {"text": "The argument is wrong because European governments, not private investors, bore all the costs of colonial ventures, with profits returning entirely to state treasuries.", "isCorrect": false, "rationale": "Private investors did bear costs and received profits — that was the point of joint-stock financing. The argument is wrong not because governments bore all costs but because the companies were hybrids: private capital with state-granted powers and state benefit from revenues."}, {"text": "The argument is accurate for the VOC and EIC but inaccurate for the Spanish empire, where the crown directly financed and controlled all colonial ventures without private involvement.", "isCorrect": false, "rationale": "The source describes Spanish colonial finance as involving both royal agencies (Casa de Contratación) and Italian banking capital (joint-stock financing adapted by Iberian monarchs). Private capital was involved in Spanish colonialism; the empire was not purely state-financed."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
