        <div class="subtitle">AP World History: Modern &mdash; Global Spread and Competing Ideologies</div>

<script>
var QUESTIONS = [{"question": "Japan's Meiji government launched a state-directed industrialization program after 1868 primarily in response to", "options": [{"text": "The success of Germany's state-directed industrialization, which Japan consciously imitated as the best available model", "isCorrect": false, "rationale": "While Japan did study various foreign models, the source identifies the threat of Western imperialism — which had forced unequal treaties on China and Japan — as the primary driver, not imitation of Germany."}, {"text": "The threat of Western imperialism that had forced unequal treaties on China and Japan, creating urgency to industrialize for national defense", "isCorrect": true, "rationale": "The source states the Meiji government launched industrialization 'responding to the threat of Western imperialism that had forced unequal treaties on China and Japan in the mid-nineteenth century' — making defensive modernization the explicit motivation."}, {"text": "A popular democratic revolution that demanded economic modernization as the basis for constitutional government", "isCorrect": false, "rationale": "The Meiji Restoration was led by the Meiji government and Japanese elites, not by popular democratic revolution. The industrialization program was state-directed from above."}, {"text": "Britain's offer of capital investment in Japanese industry in exchange for preferential trade access", "isCorrect": false, "rationale": "Japan's industrialization was state-directed and often involved hiring foreign experts or sending Japanese students abroad — not British capital investment in exchange for trade concessions."}], "id": "q01"}, {"question": "Read the following: 'The history of all hitherto existing society is the history of class struggles. Freeman and slave, patrician and plebeian, lord and serf...oppressor and oppressed, stood in constant opposition to one another.' — Marx and Engels, Communist Manifesto (1848). This argument places capitalism within which broader historical framework?", "options": [{"text": "A view of history as driven by great leaders who made decisive choices that determined their societies' fates", "isCorrect": false, "rationale": "Marx and Engels' argument is explicitly anti-great-man history; they argue history is driven by class struggle over productive resources, not by individual leaders' decisions."}, {"text": "A view of history as driven by class struggle over productive resources, in which capitalism is the latest (and internally contradictory) form of exploitation", "isCorrect": true, "rationale": "The source notes that Marx and Engels 'developed a theory they called scientific socialism or historical materialism' arguing 'history was driven by class struggle over the control of productive resources' and that capitalism was a 'historically specific mode of production with its own internal contradictions.'"}, {"text": "A view of history as progressing steadily toward liberal democracy and free-market capitalism as the permanent endpoint of human political development", "isCorrect": false, "rationale": "Marx and Engels explicitly argued the opposite: capitalism would be overthrown by revolution and replaced by communism. The liberal view of history as culminating in capitalism was what they were arguing against."}, {"text": "A view of history as determined by geography and environmental factors that shaped the productive capacities of different civilizations", "isCorrect": false, "rationale": "Marx and Engels' historical materialism emphasized class struggle and modes of production, not geography or environment. Environmental determinism is a different historical framework."}], "id": "q02"}, {"question": "Classical liberalism's tension between economic and political principles is BEST illustrated by which scenario?", "options": [{"text": "Classical liberals' support for free trade opposed by socialist arguments for state ownership of industry", "isCorrect": false, "rationale": "This describes the tension between liberalism and socialism — a different conflict than the internal tension within liberalism between its economic and political principles."}, {"text": "Classical liberals supporting free markets (opposing labor regulations) while also supporting civil liberties and constitutional government", "isCorrect": true, "rationale": "The source explicitly identifies this as 'one of the defining fault lines of modern politics' — the tension between economic liberalism (free markets, limited government) and political liberalism (rights, democracy). Factory owners opposing regulations that would raise wages while supporting civil liberties captures the dual character."}, {"text": "Classical liberals' opposition to imperialism conflicting with their support for free trade in colonial markets", "isCorrect": false, "rationale": "The source does not identify anti-imperialism as a classical liberal position; it identifies free markets, individual rights, and constitutional government. The tension described is internal to liberalism, not between liberalism and imperialism."}, {"text": "Classical liberals' support for religious freedom conflicting with their support for secular public education", "isCorrect": false, "rationale": "This is a real tension in liberal politics but is not the one the source identifies. The source focuses specifically on the economic-political divide within liberalism."}], "id": "q03"}, {"question": "Germany's industrialization differed from Britain's primarily in that Germany", "options": [{"text": "Industrialized later through state-directed investment, systematic scientific research application, and railroad construction rather than market-driven private enterprise", "isCorrect": true, "rationale": "The source describes German industrialization as 'using state-directed investment (through the Prussian government and later the unified German state after 1871), railroad construction, and a systematic application of scientific research to industrial production.'"}, {"text": "Industrialized simultaneously with Britain by adopting identical free-market institutions and patent protections", "isCorrect": false, "rationale": "Germany industrialized later (1840s–1870s) and through a different model — state-directed investment rather than Britain's market-driven approach. The paths were distinct."}, {"text": "Remained agrarian until the 1900s because political fragmentation before unification in 1871 prevented any industrial investment", "isCorrect": false, "rationale": "The source states Germany industrialized in the 1840s–1860s, before unification in 1871. Prussian government direction of investment preceded unified German state industrialization."}, {"text": "Industrialized through colonial extraction from its African empire, which provided the raw materials and capital that Britain had obtained from the Caribbean", "isCorrect": false, "rationale": "Germany did not have a significant colonial empire during the industrial period described. German industrialization relied on state investment, scientific research, and domestic resources — not an African colonial empire."}], "id": "q04"}, {"question": "Russia's industrialization in the 1890s was characterized by which social tension that would prove historically consequential?", "options": [{"text": "A large industrial bourgeoisie and small peasant class, making Russia's social structure similar to Britain's by 1900", "isCorrect": false, "rationale": "Russia had the opposite social structure: a small industrial working class surrounded by an enormous peasant majority. The large bourgeoisie Russia lacked compared to Britain is part of what made Russian industrialization socially unstable."}, {"text": "A small industrial working class surrounded by an enormous peasant majority, governed by an autocratic tsar unable to manage industrialization's social conflicts", "isCorrect": true, "rationale": "The source describes exactly this: 'a small industrial working class surrounded by an enormous peasant majority, governed by an autocratic tsar with little capacity to manage the social conflicts industrialization generated' — tensions that would 'explode in 1905 and again, definitively, in 1917.'"}, {"text": "A powerful labor movement that negotiated successfully with the tsar for legal protections before industrialization-generated social tensions could explode", "isCorrect": false, "rationale": "Russia did not have a labor movement that successfully negotiated legal protections before 1917. The social tensions generated by industrialization exploded in revolution (1905, 1917), not in negotiated settlement."}, {"text": "Heavy dependence on German capital that gave Germany economic leverage over Russia's industrial development and foreign policy", "isCorrect": false, "rationale": "The source states Russian industrialization was dependent on 'foreign (especially French and Belgian) capital' — not specifically German capital."}], "id": "q05"}, {"question": "The 'utopian' socialists (Robert Owen, Charles Fourier, Henri de Saint-Simon) differed from Marx and Engels primarily in that they", "options": [{"text": "Opposed industrialization entirely and sought to return to pre-industrial craft production and rural life", "isCorrect": false, "rationale": "Saint-Simon believed industry should be managed by technical experts for social benefit — he was pro-industrial, not anti-industrial. Owen built model factory communities. None sought to abolish industrial production."}, {"text": "Proposed experimental alternatives to competitive capitalism through model communities and cooperative management without a systematic theory of historical development", "isCorrect": true, "rationale": "The source describes utopian socialists as 'experimenting with alternatives' — Owen built model communities, Fourier proposed cooperative 'phalansteries,' Saint-Simon advocated expert management — contrasted with Marx and Engels' 'scientific socialism' providing a systematic theory of capitalism's inevitable collapse."}, {"text": "Argued that capitalism was the most efficient economic system and that workers should focus on political rather than economic reform", "isCorrect": false, "rationale": "Utopian socialists were critics of competitive capitalism, not its defenders. They proposed cooperative alternatives precisely because they found capitalism's social outcomes unacceptable."}, {"text": "Were primarily politicians who focused on achieving socialist goals through parliamentary elections rather than revolutionary action", "isCorrect": false, "rationale": "The utopian socialists described in the source (Owen, Fourier, Saint-Simon) focused on experimental communities and intellectual advocacy, not parliamentary politics. Electoral socialism came later in the century."}], "id": "q06"}, {"question": "The United States surpassing Britain in industrial output by 1900 illustrates which broader pattern about industrialization's global spread?", "options": [{"text": "Countries that adopted state-directed industrialization always outpaced those relying on market competition", "isCorrect": false, "rationale": "American industrialization was primarily market-driven, not state-directed like Germany's or Japan's. The U.S. surpassing Britain demonstrates that market-driven industrialization could also achieve rapid growth — contradicting a state-direction-is-necessary conclusion."}, {"text": "Different societies industrialized through different mechanisms depending on their resources, social structure, and position in the global economy", "isCorrect": true, "rationale": "The source opens the section by stating that industrialization's spread 'was not a simple diffusion of a British model; different societies industrialized in different ways depending on their position in the global economy.' The U.S., Germany, Japan, and Russia illustrate this diversity."}, {"text": "Industrialization inevitably led to democracy as rising living standards created demands for political participation", "isCorrect": false, "rationale": "The source does not connect industrialization to democratization; Germany, Japan, and Russia all industrialized without producing stable democracies in the period discussed. Russia's industrialization produced revolution (1917), not democracy."}, {"text": "Britain's early industrialization gave it a permanent competitive advantage that no later industrializer could overcome", "isCorrect": false, "rationale": "The source explicitly states the U.S. surpassed Britain in industrial output by 1900 — demonstrating that Britain's early lead was not permanent."}], "id": "q07"}, {"question": "The zaibatsu in Japan and the Social Democratic Party in Germany both represent which broader pattern of industrialization's social consequences?", "options": [{"text": "Each country's industrialization produced both concentrated industrial ownership structures AND organized labor/political movements responding to industrial capitalism's social effects", "isCorrect": true, "rationale": "The source describes zaibatsu as the large industrial conglomerates that emerged in Japan (concentrated ownership) and the Social Democratic Party as 'the largest socialist party in Europe by 1914' (labor movement response) — both represent the social organizational responses industrialization generated in different forms."}, {"text": "Both were state institutions created by governments to manage industrial production directly", "isCorrect": false, "rationale": "The Social Democratic Party was a political party representing the labor movement, not a state institution managing production. The zaibatsu were private industrial conglomerates that the Japanese government had privatized from state-owned model factories."}, {"text": "Both represented the failure of industrial capitalism to generate social stability without direct political intervention", "isCorrect": false, "rationale": "Japan's zaibatsu represented industrial capitalism's success in Japan, not its failure. The Social Democratic Party represented a political response to capitalism's effects, but the source does not frame its existence as a capitalism-failure indicator."}, {"text": "Both were explicitly modeled on British industrial institutions transplanted to their respective national contexts", "isCorrect": false, "rationale": "Neither the zaibatsu nor the German SPD were modeled on British institutions. Germany's industrialization used systematic scientific research and state direction distinct from Britain; Japan sent students abroad to study multiple foreign models."}], "id": "q08"}, {"question": "Marx and Engels' theory of historical materialism argued that capitalism's internal contradictions would 'inevitably produce revolution.' Which element of capitalism did they identify as the key contradiction?", "options": [{"text": "The tension between capitalists' need for technological innovation and workers' resistance to machinery destroying their jobs", "isCorrect": false, "rationale": "While worker-machinery conflicts were a real phenomenon (Luddism), Marx and Engels' central contradiction was the class relationship between bourgeoisie and proletariat — the exploitation inherent in wage labor — not specifically the technology adoption conflict."}, {"text": "The exploitation inherent in the wage-labor relationship, in which owners extracted surplus value from workers' labor, creating irreconcilable class conflict", "isCorrect": true, "rationale": "The source describes Marx and Engels' argument that 'capitalism was a historically specific mode of production with its own internal contradictions, and that those contradictions would inevitably produce revolution' — rooted in the bourgeoisie/proletariat class relationship and the exploitation of wage labor described in the Manifesto excerpt."}, {"text": "The tendency of free markets to produce monopolies that eventually required state regulation, undermining laissez-faire principles", "isCorrect": false, "rationale": "The monopoly tendency critique is associated with later critics of capitalism (progressive-era reformers, anti-trust theory). Marx and Engels' central contradiction was class exploitation in the wage-labor relationship, not market monopolization."}, {"text": "The contradiction between democratic political systems and undemocratic economic structures in which a minority owned the means of production", "isCorrect": false, "rationale": "While Marx and Engels' analysis touched on the relationship between political and economic power, the source identifies the class struggle and exploitation in the wage-labor relationship — not specifically the political-democratic/economic-undemocratic contradiction — as the central focus."}], "id": "q09"}, {"question": "A student argues: 'The three competing ideologies of the nineteenth century — classical liberalism, socialism, and Marxist communism — were fundamentally different responses to the same cause.' What was that shared cause?", "options": [{"text": "The Atlantic Revolutions' failure to extend political rights to the working class, creating demands for economic reform", "isCorrect": false, "rationale": "While the Atlantic Revolutions influenced these ideologies indirectly, the source directly connects all three ideologies to industrial capitalism's social disruptions, not specifically to the revolutions' political limits."}, {"text": "The disruption of traditional social arrangements by industrial capitalism — specifically the new class conflicts between industrial owners and wage workers", "isCorrect": true, "rationale": "The source explicitly states: 'All three ideologies were responses to the same phenomenon: the disruption of traditional social arrangements by industrial capitalism.' Their conflict would define political history from the Russian Revolution to the Cold War."}, {"text": "The spread of democratic revolutions in 1848 that forced all social classes to develop coherent political programs", "isCorrect": false, "rationale": "The Revolutions of 1848 are mentioned in the source as context for the Communist Manifesto's publication, not as the root cause of all three ideologies. Classical liberalism and utopian socialism predated 1848."}, {"text": "The global competition between European states for colonial territories that required justifying imperial economic policies", "isCorrect": false, "rationale": "Imperialism is not identified in the source as the shared cause of these three ideologies. They were responses to industrialization and its class conflicts, not primarily to imperial competition."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
