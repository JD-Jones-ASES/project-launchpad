<script>
var QUESTIONS = [{"question": "Napoleon's 1808 invasion of Spain was the immediate catalyst for Latin American independence movements primarily because it", "options": [{"text": "Gave Napoleon control of Spain's colonies and imposed French revolutionary laws on them", "isCorrect": false, "rationale": "Napoleon did not directly control Spain's colonies; he placed his brother Joseph Bonaparte on the Spanish throne. The crisis arose from a legitimacy vacuum, not direct French colonial administration."}, {"text": "Created a legitimacy vacuum by making the Spanish throne illegitimate, prompting juntas across Spanish America to ask to whom colonial loyalty was owed", "isCorrect": true, "rationale": "The source explains that Napoleon's placement of Joseph Bonaparte on the Spanish throne created a legitimacy vacuum: 'to whom did colonial loyalty belong if the king was a French puppet?' Juntas formed in response, some evolving into independence movements."}, {"text": "Abolished the casta system in Spain's American colonies, triggering a conservative backlash by the creole elite", "isCorrect": false, "rationale": "Napoleon's invasion did not abolish the casta system. The legitimacy vacuum — not social reform — was the immediate catalyst. The casta system persisted in most Latin American societies even after independence."}, {"text": "Demonstrated that Spain lacked the military power to defend its colonies, encouraging creole elites to declare independence immediately", "isCorrect": false, "rationale": "The independence movements did not begin with immediate declarations; they began as juntas claiming loyalty to the deposed Ferdinand VII. The process took more than a decade, not an immediate military calculation."}], "id": "q01"}, {"question": "The casta system in Spanish America structured which fundamental tension that shaped independence movements?", "options": [{"text": "Competition between the Catholic Church and secular universities over education policy", "isCorrect": false, "rationale": "The casta system structured racial and social hierarchy, not ecclesiastical-educational competition. While the Church was a colonial institution, the key casta tensions were racial and administrative."}, {"text": "Structural exclusion of creoles from the highest colonial offices despite their wealth and education, generating specific grievances against the peninsular system", "isCorrect": true, "rationale": "The source identifies creoles — people of Spanish descent born in the Americas — as dominant in the lower levels of administration and economy but systematically excluded from the highest offices reserved for peninsulares, creating the specific grievances that made them 'natural leaders of independence movements.'"}, {"text": "Competition between mestizos and indigenous peoples for access to the agricultural land held by Spanish colonists", "isCorrect": false, "rationale": "While land was certainly a social tension, the casta system's primary political relevance for independence was the creole/peninsular division that drove elite leadership of the movements."}, {"text": "Religious disputes between Protestants and Catholics arriving from different parts of Spain's empire", "isCorrect": false, "rationale": "Spanish America was overwhelmingly Catholic; Protestant-Catholic religious dispute was not a feature of the casta system or of independence movements."}], "id": "q02"}, {"question": "Read the following: 'We are a small human species; we possess a world apart, surrounded by wide seas; new in the arts and sciences, but old in the vices of civilization.' — Simón Bolívar, Jamaica Letter (1815). In this passage, Bolívar expresses which assessment of Latin American independence?", "options": [{"text": "Formal political independence would automatically produce social equality and effective self-governance across South America", "isCorrect": false, "rationale": "The source states the opposite: 'Bolívar understood that formal political independence would not automatically produce social equality or effective self-governance' — his Jamaica Letter was honest about the region's divisions and challenges."}, {"text": "South America's unique conditions and internal divisions meant formal independence would not automatically resolve social inequality or guarantee effective governance", "isCorrect": true, "rationale": "The source explains that the Jamaica Letter analyzed Spain's colonial record and was 'also honest about the region's divisions,' with Bolívar understanding that independence alone would not produce equality or stability."}, {"text": "Latin American nations should model their governments entirely on the United States' federal republic, which had already proven effective", "isCorrect": false, "rationale": "Bolívar actually outlined a vision of a unified Hispanic American federation distinct from the U.S. model, not simple imitation of American federalism."}, {"text": "Spain's colonial record was so positive that independence risked destroying the institutions that had maintained social order", "isCorrect": false, "rationale": "The Jamaica Letter explicitly analyzed Spain's colonial record critically — Bolívar was arguing for independence, not defending Spanish colonialism."}], "id": "q03"}, {"question": "Father Miguel Hidalgo's Grito de Dolores (1810) was distinct from creole-led independence movements because it", "options": [{"text": "Sought the restoration of Spanish royal authority against Napoleon's usurpation of the throne", "isCorrect": false, "rationale": "Hidalgo's call to arms mobilized mestizo and indigenous peasants against both Spanish authority and local creole landowners — it was not a loyalist movement."}, {"text": "Mobilized tens of thousands of mestizo and indigenous peasants against Spanish authority AND local creole landowners", "isCorrect": true, "rationale": "The source states that Hidalgo mobilized 'tens of thousands of mestizo and indigenous peasants against not just Spanish authority but local creole landowners as well' — threatening the creole elite as much as Spanish colonialism."}, {"text": "Was a purely military campaign with no political program, focused only on expelling Spanish troops from Mexico", "isCorrect": false, "rationale": "The Grito was a political and social call to arms with clear social dimensions — its mobilization of the rural poor against creole landowners gave it social revolutionary content beyond mere anti-Spanish sentiment."}, {"text": "Successfully unified all social classes in Mexico under a single independence movement led by the Church", "isCorrect": false, "rationale": "Hidalgo's movement actually terrified the creole elite, creating a split. He was captured and executed, and Mexico's eventual independence in 1821 was achieved through a creole officer's compromise that excluded the popular movement."}], "id": "q04"}, {"question": "Simón Bolívar's enlisting of Haitian president Alexandre Pétion's support for his independence campaigns is historically significant because it", "options": [{"text": "Demonstrated that Bolívar was willing to promise slavery's abolition in liberated territories to gain strategic support, linking the Atlantic revolutions", "isCorrect": true, "rationale": "The source states that Bolívar 'enlisted the support of the Haitian president Alexandre Pétion in exchange for promising to abolish slavery in liberated territories' — directly linking the Haitian Revolution to Latin American independence through Bolívar's commitment."}, {"text": "Showed that Bolívar planned to establish a monarchy in Venezuela modeled on Haiti's post-independence government", "isCorrect": false, "rationale": "Bolívar explicitly rejected monarchy as a model for South America in his Jamaica Letter. The connection to Pétion was a strategic alliance, not a constitutional model-borrowing."}, {"text": "Forced France to withdraw its remaining claims to Caribbean colonies, enabling Spanish American independence to proceed without French interference", "isCorrect": false, "rationale": "France's Caribbean claims were not an obstacle to Spanish American independence. The Haitian-Bolívar connection was a specific strategic alliance about resources and anti-slavery commitments."}, {"text": "Established the first formal military alliance between a Caribbean nation and a South American independence movement, creating a unified Caribbean-South American federation", "isCorrect": false, "rationale": "No Caribbean-South American federation resulted from the Pétion-Bolívar relationship. It was a bilateral strategic alliance for specific military campaigns, not a federal structure."}], "id": "q05"}, {"question": "Brazil's path to independence differed from Spanish American independence movements primarily in that", "options": [{"text": "Brazil achieved independence through a violent popular revolution led by enslaved Africans and indigenous peoples", "isCorrect": false, "rationale": "The source describes Brazil's path as 'relatively peaceful': when Pedro I declared independence in 1822, it was under pressure from creole elites, not through violent popular revolution."}, {"text": "Brazil became an independent monarchy rather than a republic when Prince Pedro declared independence under pressure from creole elites in 1822", "isCorrect": true, "rationale": "The source states that Brazil followed 'a different and relatively peaceful path' and that Pedro I declared independence 'as Emperor Pedro I in 1822 — a monarchy rather than a republic, making Brazil's transition unusually conservative even by Latin American standards.'"}, {"text": "Brazil gained independence when Portugal voluntarily granted self-governance to avoid the costs of colonial administration", "isCorrect": false, "rationale": "Portugal did not voluntarily grant self-governance. The Portuguese royal family had fled to Brazil during Napoleon's invasion; when John VI returned to Portugal, Pedro remained and declared independence — it was an assertion, not a grant."}, {"text": "Brazil was the first Latin American territory to declare independence, serving as the model for later Spanish American movements", "isCorrect": false, "rationale": "Spanish American independence movements preceded Brazil's 1822 declaration. Haiti declared independence in 1804; Venezuela, Argentina, and Colombia declared independence in the 1810s."}], "id": "q06"}, {"question": "The concept of 'creole nationalism' — independence led by creoles — explains which characteristic outcome of most Latin American independence movements?", "options": [{"text": "Political independence was accompanied by sweeping land reform that redistributed wealth to mestizo, indigenous, and formerly enslaved populations", "isCorrect": false, "rationale": "The source is explicit that independence 'replaced peninsulares with creoles at the top of colonial structures without fundamentally redistributing land, wealth, or political power' — land reform was not a typical outcome."}, {"text": "Independence replaced peninsulares with creoles at the top without fundamentally redistributing land, wealth, or power to the popular classes", "isCorrect": true, "rationale": "The source defines 'creole nationalism' as exactly this: creoles sought political independence but were 'largely unwilling to dismantle the social hierarchies — racial classification, land concentration, indigenous tribute, and slavery — that benefited them.'"}, {"text": "New republics immediately abolished slavery and extended full citizenship to mestizos, indigenous peoples, and Africans", "isCorrect": false, "rationale": "The source notes that these groups 'participated in the independence wars and sometimes provided the decisive military force, but they were largely excluded from the political settlements that followed.'"}, {"text": "Creole leaders unified the former Spanish colonies into a single federal republic as Bolívar had envisioned", "isCorrect": false, "rationale": "Bolívar's dream of a unified South American federation collapsed by 1830. The new states were fragmented, not unified — one of the key failures the source identifies."}], "id": "q07"}, {"question": "José de San Martín's crossing of the Andes in 1817 is historically significant because it", "options": [{"text": "Was the moment Bolívar and San Martín formally united their campaigns under a single South American command", "isCorrect": false, "rationale": "The source states that San Martín 'coordinated with Bolívar in the liberation of Peru,' but they never formally united under a single command. Their 1822 Guayaquil meeting was actually inconclusive and they separated afterward."}, {"text": "Demonstrated military capability and strategic vision by moving Argentine and Chilean forces over the high Andes to attack royalist forces from an unexpected direction", "isCorrect": true, "rationale": "The source describes this as 'one of the great military feats of the era' — San Martín led Argentine and Chilean forces over the Andes, coordinated with Bolívar in Peru's liberation."}, {"text": "Forced Spain to negotiate a peace treaty recognizing the independence of all its South American colonies simultaneously", "isCorrect": false, "rationale": "Spain never formally recognized the independence of its South American colonies in the nineteenth century. Independence was won through military force across multiple campaigns, not a single treaty."}, {"text": "Established the first democratic elections in South America, transferring power from military to civilian government", "isCorrect": false, "rationale": "Independence brought constitutional republics in form, but the source notes that power 'cycled between creole factions (often dominated by caudillos — military strongmen)' rather than stable democratic elections."}], "id": "q08"}, {"question": "A student argues: 'Mexico's independence in 1821 shows that Latin American independence served creole interests, not popular ones.' Which evidence from the section BEST supports this?", "options": [{"text": "Father Hidalgo's Grito de Dolores mobilized mestizo and indigenous peasants, making Mexico the most socially radical of the independence movements", "isCorrect": false, "rationale": "This evidence would undermine the claim by pointing to popular mobilization. The student's argument about creole interests is better supported by what happened to Hidalgo's movement, not by the movement itself."}, {"text": "Iturbide, a royalist creole officer, co-opted the independence movement through a conservative deal that ensured the creole class retained its social position", "isCorrect": true, "rationale": "The source states that Mexico's independence came when 'a royalist creole officer, Agustín de Iturbide, struck a deal with moderate independence forces — effectively co-opting the movement and ensuring that the creole class retained its social position.' Hidalgo was executed; the popular movement was absorbed."}, {"text": "Mexico was the only Latin American country where indigenous peoples were given full voting rights immediately after independence", "isCorrect": false, "rationale": "The source does not claim this; indigenous peoples were largely excluded from political settlements across Latin America. Mexico was no exception to this pattern."}, {"text": "The Church supported popular revolutionary movements in Mexico, providing organizational capacity that creole elites lacked", "isCorrect": false, "rationale": "Hidalgo was a priest, but the broader creole elite and the institutional Church were often hostile to the popular movements. The Church's role was complex, not uniformly supportive of popular revolution."}], "id": "q09"}, {"question": "Which comparison MOST accurately characterizes the role of indigenous and mestizo people in Latin American independence movements?", "options": [{"text": "They were passive bystanders who played no meaningful military or political role in the independence struggles", "isCorrect": false, "rationale": "The source explicitly states that 'Crucially, independence was achieved with significant indigenous and mestizo participation' and that they 'sometimes provided the decisive military force.'"}, {"text": "They provided crucial military participation in independence struggles but were largely excluded from the political settlements that followed", "isCorrect": true, "rationale": "The source describes this exact dynamic: indigenous peoples, mestizos, and formerly enslaved people 'participated in the independence wars and sometimes provided the decisive military force, but they were largely excluded from the political settlements that followed.'"}, {"text": "They uniformly supported Spanish colonial authority and opposed independence movements throughout the wars", "isCorrect": false, "rationale": "Hidalgo's Grito de Dolores mobilized tens of thousands of mestizo and indigenous peasants in Mexico's independence movement. Indigenous and mestizo participation was widespread, if not always on the same side."}, {"text": "Indigenous and mestizo participation ensured that the new republics immediately abolished tribute and granted full citizenship to all residents", "isCorrect": false, "rationale": "The source notes that 'indigenous tribute was technically abolished but often replaced by other forms of coerced labor' — showing that formal abolition did not guarantee substantive change."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
