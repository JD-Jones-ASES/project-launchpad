    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_World.html">&larr; Back to AP World History: Modern</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP World History: Modern &mdash; Pax Mongolica and the Yam System</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Read the following primary source excerpt: 'From this city of Cambaluc go forth many roads to every province; and on each of these roads, every twenty-five or thirty miles, you shall find one of these inns, which they call yamb. There are some four hundred horses always kept in readiness at each of these inns.' — Marco Polo, c. 1298. What does this account MOST directly support?", "options": [{"text": "Marco Polo's account proves that Kublai Khan's empire was the wealthiest in world history.", "isCorrect": false, "rationale": "The passage describes postal infrastructure, not wealth comparisons. While Polo describes Khanbaliq's wealth, this specific excerpt is about the Yam relay system, not economic ranking."}, {"text": "The Yam system was a massive, empire-wide communication and transportation network that enabled rapid movement of people and information across Eurasia.", "isCorrect": true, "rationale": "Polo's description of stations every 25–30 miles, each with 400 ready horses, directly corroborates the text's account of the Yam system as the institutional backbone of Mongol communication and commerce."}, {"text": "The Mongol Empire depended primarily on maritime trade rather than overland routes for commercial exchange.", "isCorrect": false, "rationale": "The Yam system was explicitly an overland relay network; this source supports the centrality of overland infrastructure, not maritime trade."}, {"text": "Kublai Khan personally designed the postal relay system, demonstrating his superior administrative intelligence compared to prior Chinese emperors.", "isCorrect": false, "rationale": "The Yam system predates Kublai Khan and was institutionalized under Chinggis Khan's successors; the text does not make claims about individual administrative brilliance."}]}, {"question": "The paiza (letter of safe conduct) issued by Mongol rulers guaranteed merchants food, horses, and lodging at any imperial relay station. What was the KEY mechanism making this guarantee credible?", "options": [{"text": "The paiza was backed by the credible threat of imperial retribution against anyone who violated the guarantee.", "isCorrect": true, "rationale": "The text specifically states that the paiza guarantee was 'backed by the credible threat of imperial retribution against anyone who violated it'—making the promise binding through deterrence, not merely symbolic."}, {"text": "The paiza was an international treaty ratified by all the successor khanates, creating mutual legal obligations.", "isCorrect": false, "rationale": "The text describes the paiza as letters issued by individual Mongol rulers, backed by imperial enforcement power—not a multilateral treaty ratified by all khanates collectively."}, {"text": "Muslim religious law required all Muslim merchants in the empire to honor the paiza as part of their commercial obligations.", "isCorrect": false, "rationale": "The paiza was a Mongol imperial institution, not an Islamic legal requirement. Its enforcement mechanism was imperial retribution, not religious obligation."}, {"text": "The Chinese bureaucracy administered the paiza system and fined violators under Tang dynasty law.", "isCorrect": false, "rationale": "The Yam and paiza system was Mongol in origin; while the Yuan dynasty operated in China, the system predates the Yuan and was not administered under Tang dynasty legal structures."}]}, {"question": "Compare Marco Polo and Ibn Battuta as historical sources. According to the text, what did each traveler foreground in his account, and why?", "options": [{"text": "Both travelers foregrounded religious practice above all other topics, as they were both devout clerics traveling for spiritual purposes.", "isCorrect": false, "rationale": "Marco Polo was a merchant, not a cleric, and the text specifically notes he 'rarely commented on religious practices in detail,' instead foregrounding trade commodities and logistics."}, {"text": "Marco Polo foregrounded trade, wealth, and logistics (as a merchant seeking commercial intelligence); Ibn Battuta foregrounded mosques, courts, and Islamic learning (as a Muslim scholar and jurist seeking religious and juridical guidance).", "isCorrect": true, "rationale": "The text explicitly contrasts the two: Polo's 'audience wanted commercial intelligence,' while Ibn Battuta's 'audience wanted religious and juridical guidance'—each traveler's identity and purpose shaped what he noticed and reported."}, {"text": "Marco Polo foregrounded the Mongols' cruelty while Ibn Battuta praised Mongol governance—reflecting their different cultural backgrounds.", "isCorrect": false, "rationale": "The text does not characterize Polo as focusing on Mongol cruelty; he expressed 'amazement at Chinese technology and Yuan governance.' The distinction is commerce vs. religion, not cruelty vs. praise."}, {"text": "Both travelers were unreliable sources because they exaggerated everything they saw to impress their respective audiences.", "isCorrect": false, "rationale": "While the text notes both accounts were 'shaped by the traveler's identity, purpose, and audience,' it presents them as valuable primary sources providing a 'stereo view'—not as systematically unreliable or simply exaggerated."}]}, {"question": "The text describes the Pax Mongolica as 'real but limited.' Which of the following BEST illustrates a specific limitation of the Mongol peace?", "options": [{"text": "The Mongol Empire never established reliable overland routes between China and the Mediterranean.", "isCorrect": false, "rationale": "The text describes the Pax Mongolica precisely as the period when overland routes were 'policed, taxed, and maintained by Mongol authorities'—denying the existence of these routes contradicts the text."}, {"text": "The successor khanates frequently warred with each other—particularly the Ilkhanate and Golden Horde clashing over Azerbaijan—disrupting the network during civil conflicts.", "isCorrect": true, "rationale": "The text specifically notes the Ilkhanate–Golden Horde conflict over Azerbaijan as a concrete example of the Pax Mongolica's limitations. Merchants benefited most in periods of intra-dynastic peace and suffered during civil wars."}, {"text": "The Yam system was exclusively available to imperial couriers and never used by private merchants or diplomats.", "isCorrect": false, "rationale": "The text explicitly states that merchants who obtained a paiza could use relay stations for accommodation and horse exchange—the Polo family's use is given as a specific example of private commercial use."}, {"text": "The Mongol Empire's religious intolerance drove Muslim merchants out of the overland trade routes permanently.", "isCorrect": false, "rationale": "The empire's religious tolerance is described as one of its defining features; Muslim merchants remained active throughout the Pax Mongolica."}]}, {"question": "Niccolò and Maffeo Polo made their first journey to Kublai Khan's court (c. 1260–1269) using Yam infrastructure and returned with the Khan's invitation to the Pope. What does this episode BEST illustrate?", "options": [{"text": "The Mongol Empire had converted to Christianity and sought to establish a religious alliance with the Catholic Church.", "isCorrect": false, "rationale": "The text does not describe Mongol conversion to Christianity; the Khan's invitation for 100 learned Christian men reflects curiosity about Christianity and diplomacy, not conversion."}, {"text": "The Yam system and paiza infrastructure enabled unprecedented cross-continental diplomatic and commercial contact that would have been impossible in the pre-Mongol era.", "isCorrect": true, "rationale": "The Polo brothers' journey is presented in the text as a specific example of how Yam infrastructure facilitated cross-continental travel, culminating in the diplomatic exchange of letters between the Khan and the Pope."}, {"text": "Venetian merchants controlled the Mongol trade network and served as official diplomatic intermediaries between the Khan and European states.", "isCorrect": false, "rationale": "The Polo family was one family of merchants, not a representative of Venetian state-controlled trade. Their journey was private commercial enterprise that happened to produce a diplomatic exchange."}, {"text": "The Mongol Empire and the European states had established a formal treaty of free trade that guaranteed safe passage for all European merchants.", "isCorrect": false, "rationale": "The text describes paiza letters as individual grants, not a blanket European-Mongol free trade treaty. The invitation to send 100 learned men suggests an informal, personal diplomatic relationship."}]}, {"question": "Consider the following scenario: A student argues that the Pax Mongolica's most important contribution to world history was enabling the trade in silk and porcelain. Which counterargument does the source MOST strongly support?", "options": [{"text": "The Pax Mongolica's most important contribution was ending the trans-Saharan gold trade.", "isCorrect": false, "rationale": "The trans-Saharan trade was geographically outside Mongol control and was not disrupted or ended by the Pax Mongolica."}, {"text": "The Pax Mongolica's most important contribution was accelerating the diffusion of technologies—gunpowder weapons, printing, paper money, and agricultural crops—that would define the later medieval and early modern world.", "isCorrect": true, "rationale": "The text's key concept explicitly states that the Pax Mongolica was 'the world's first transcontinental technology-transfer mechanism,' with gunpowder, printing, paper money, and agricultural innovations diffusing across Eurasia—effects more consequential than any luxury commodity."}, {"text": "The Pax Mongolica's most important contribution was promoting Buddhism as the universal religion of the Eurasian landmass.", "isCorrect": false, "rationale": "The text does not claim Buddhism spread during the Pax Mongolica; the dominant religious diffusion of this period was Islam, and the Mongols were religiously tolerant rather than Buddhist missionaries."}, {"text": "The Pax Mongolica's most important contribution was increasing European knowledge of the Americas through overland trade.", "isCorrect": false, "rationale": "The Americas had no connection to Eurasian trade networks in this period; this option is historically impossible for 1260–1368."}]}, {"question": "The text warns that the Pax Mongolica 'carried an invisible and lethal cargo.' What was this cargo, and why was it a product of the very connectivity the Mongols created?", "options": [{"text": "Chinese gunpowder technology, which gave Islamic and European states weapons that eventually destroyed Mongol military supremacy.", "isCorrect": false, "rationale": "While gunpowder did diffuse westward, the text's 'invisible and lethal cargo' refers to Yersinia pestis (bubonic plague), carried by rats and fleas moving with Mongol armies and caravans—not a military technology."}, {"text": "The bacterium Yersinia pestis (bubonic plague), whose spread was enabled by the very road network and caravan infrastructure that made the Pax Mongolica commercially productive.", "isCorrect": true, "rationale": "The text states explicitly that 'the rats and fleas that moved with Mongol armies and the merchant caravans they protected carried Yersinia pestis,' and that 'the connectivity that made the Mongol empire a vehicle for commercial exchange also made it a vehicle for the most catastrophic pandemic in human history.'"}, {"text": "Islamic extremist movements that spread westward along Mongol-protected trade routes, undermining Christian kingdoms in Europe.", "isCorrect": false, "rationale": "No such claim appears in the text. The 'invisible cargo' is biological (plague bacteria), not ideological."}, {"text": "Paper money, which caused catastrophic inflation that destroyed the commercial economies of the Islamic world and Europe.", "isCorrect": false, "rationale": "While paper money's westward diffusion is noted, the text does not describe it as causing catastrophic inflation. The 'invisible and lethal cargo' is explicitly identified as bubonic plague."}]}, {"question": "Marco Polo's account was dictated to Rustichello da Pisa while both were prisoners of war in Genoa. How should this context shape a historian's use of the account as evidence?", "options": [{"text": "The prison context proves that Marco Polo fabricated the entire account, as he had no access to notes or documents.", "isCorrect": false, "rationale": "The text uses Polo's account extensively as a primary source for Mongol infrastructure; the prison context shapes interpretation of emphasis and audience but does not prove fabrication."}, {"text": "The account's audience (European merchants), medium (romance writer), and purpose (commercial intelligence/entertainment) shaped what Polo emphasized—making it useful evidence but requiring awareness of his perspective and potential exaggerations.", "isCorrect": true, "rationale": "The text's SOURCING NOTE framework asks students to consider historical context, intended audience, and purpose. The prison/romance-writer context and European merchant audience explain why Polo emphasized wealth and logistics over, say, religious practice or Chinese literary culture."}, {"text": "The prison context means the account accurately represents the interests of all social classes in Khanbaliq, since Polo had time to reflect carefully.", "isCorrect": false, "rationale": "Reflection time does not correct for perspective bias; a Christian Italian merchant will still foreground what a Christian Italian merchant notices. The text argues both Polo and Ibn Battuta were shaped by their identities, not just by reflection time."}, {"text": "Since Rustichello was a romance writer, the account should be treated as entirely fictional and excluded from historical evidence.", "isCorrect": false, "rationale": "The text treats Polo's account as a valuable primary source; the romance-writer context explains the narrative style and possible embellishment but does not make the account fictional. Historians use it critically, not dismiss it."}]}, {"question": "Technology diffusion during the Pax Mongolica included the westward movement of block printing technology. This pattern BEST supports which historical argument?", "options": [{"text": "China had no significant technological advantages over the Islamic world or Europe during the medieval period.", "isCorrect": false, "rationale": "The text describes multiple Chinese technologies (paper money, printing, gunpowder) moving westward via Mongol channels—evidence of Chinese technological leadership that contradicts this option."}, {"text": "Political connectivity—even connectivity created by violent conquest—can accelerate technology transfer across civilizational boundaries in ways that transform subsequent history.", "isCorrect": true, "rationale": "The text's key concept calls the Pax Mongolica 'the world's first transcontinental technology-transfer mechanism,' explicitly arguing that the Mongol political structure accelerated diffusion of technologies that defined the later medieval and early modern world."}, {"text": "Technology transfer between regions only occurs when both regions have achieved a similar level of economic development.", "isCorrect": false, "rationale": "The text describes technology moving from technologically advanced China to less technologically advanced regions in the Islamic world and Europe—technology transfer occurred across developmental differences, not only between equals."}, {"text": "European adoption of printing technology was primarily a result of independent invention rather than diffusion from East Asia.", "isCorrect": false, "rationale": "The text describes block printing spreading westward via Mongol channels; while Gutenberg's moveable type was a European innovation, the concept of printing as a technology had Mongol-era transmission precedents."}]}, {"question": "The Yam system could enable couriers to travel 300 or more kilometers per day. This speed was 'unmatched in Eurasia until the telegraph.' What does this comparison highlight about the Yam system's historical significance?", "options": [{"text": "The Yam system was primarily a military innovation that had no commercial or diplomatic applications.", "isCorrect": false, "rationale": "The text describes the Yam as serving 'not only state communication but also commercial travel,' with merchants using it for accommodation and horse exchange—explicitly multi-functional."}, {"text": "The Yam system represented a step-change in the speed of state communication and commercial travel that created qualitatively new possibilities for governing and trading across continental distances.", "isCorrect": true, "rationale": "The 300+ km/day speed—'unmatched until the telegraph'—enabled the Great Khan to communicate with distant khanates in days rather than weeks, and allowed merchants to traverse Eurasia at speeds previously impossible, qualitatively transforming the governance and commercial possibilities of the empire."}, {"text": "The Yam's speed meant that Mongol armies could be deployed anywhere in the empire within a day, making military rebellion impossible.", "isCorrect": false, "rationale": "While the Yam enabled rapid military communication, the text does not claim armies could be deployed in a day; the system's significance is communication and travel speed, not instantaneous military deployment."}, {"text": "The Yam system was unprecedented in human history, since no prior civilization had ever built a postal relay network.", "isCorrect": false, "rationale": "Earlier postal relay systems existed in the Persian Achaemenid Empire and Han China; the Yam's significance is its scale and the speed it achieved across a uniquely large empire—not absolute novelty."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
