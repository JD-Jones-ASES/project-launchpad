<script>
var QUESTIONS = [{"question": "The source argues that European decentralization was 'not a failure of civilization — it was a specific political outcome of particular historical conditions.' Which evidence from the source BEST supports this interpretation?", "options": [{"text": "Medieval European serfdom demonstrates that the continent lacked the moral foundations for advanced governance.", "isCorrect": false, "rationale": "The source explicitly rejects the idea that decentralization was a failure of civilization — evaluating it in moral terms would be the opposite of the analytical historical approach the source advocates."}, {"text": "Medieval European decentralization resulted from the collapse of Roman infrastructure, ecological and demographic constraints on agricultural surplus, and the absence of a commercial economy that could support a tax-funded bureaucratic state.", "isCorrect": true, "rationale": "The source explicitly identifies these three conditions — collapse of Roman infrastructure, agricultural surplus constraints, and absence of a commercial tax base — as the specific historical causes of decentralization, framing it as a structural outcome rather than a civilizational failure."}, {"text": "European feudalism failed because kings lacked the intellectual ability to build effective bureaucracies.", "isCorrect": false, "rationale": "The source attributes feudalism to structural historical conditions (infrastructure collapse, economic constraints), not to personal failures of royal intellect; this explanation is not supported by the source."}, {"text": "Feudalism was a uniquely European failure that no other civilization has experienced.", "isCorrect": false, "rationale": "The source actually identifies Japan as a parallel case of feudal decentralization that 'developed through entirely independent processes' — it explicitly contradicts the claim that decentralization was uniquely European."}]}, {"question": "Read the following definition: 'A system of political and social organization in which land grants were exchanged for military service and personal loyalty between lords and vassals.' Based on the source, which of the following is an important qualification historians make to this definition of feudalism?", "options": [{"text": "Feudalism never actually existed — it was a term invented by later historians to describe medieval arrangements that had no contemporary name.", "isCorrect": false, "rationale": "The source does not claim feudalism never existed; it notes that historians 'increasingly treat feudalism as an analytical category rather than a precise historical institution' because actual arrangements varied, not that the phenomenon itself was invented."}, {"text": "Historians increasingly treat 'feudalism' as an analytical category rather than a precise historical institution, since actual arrangements varied enormously by region and period.", "isCorrect": true, "rationale": "The source's definition explicitly includes this qualification: historians treat feudalism as 'an analytical category rather than a precise historical institution, since the actual arrangements varied enormously by region and period.'"}, {"text": "Feudalism only applied to serfs, not to the lord-vassal relationship between nobles.", "isCorrect": false, "rationale": "The source defines feudalism specifically as the lord–vassal relationship among elites, not as the serf system — manorialism is the separate concept describing peasant-lord economic arrangements."}, {"text": "Feudalism was identical in all parts of medieval Europe and underwent no change between 900 and 1300 CE.", "isCorrect": false, "rationale": "The source explicitly notes that feudalism 'was always a dynamic, evolving arrangement, not a static medieval equilibrium' and that 'actual arrangements varied enormously by region and period.'"}]}, {"question": "The source distinguishes between feudalism and manorialism as two related but distinct concepts. Which of the following CORRECTLY identifies the distinction?", "options": [{"text": "Feudalism described agricultural production; manorialism described military relationships between knights.", "isCorrect": false, "rationale": "This reverses the distinction: feudalism describes elite political-military relationships (lord–vassal), while manorialism describes the economic system of agricultural production on the lord's estate."}, {"text": "Feudalism described relationships among elites (lords and vassals exchanging land for military service); manorialism described the exploitation of agricultural labor (serfs working lords' estates in exchange for access and protection).", "isCorrect": true, "rationale": "The source explicitly states that feudalism 'described relationships among elites' while manorialism described 'the exploitation of agricultural labor' — and that 'the two systems reinforced each other and began to break down together in the fourteenth century.'"}, {"text": "Feudalism was limited to France and Germany; manorialism was the system used in England and Spain.", "isCorrect": false, "rationale": "The source treats both feudalism and manorialism as general features of Western European medieval society, not as regionally specific to different countries."}, {"text": "Manorialism was the system for free merchants in town markets; feudalism organized the peasant labor system.", "isCorrect": false, "rationale": "Manorialism organized the agricultural labor of serfs on rural estates, not urban merchants; feudalism organized elite lord–vassal military relationships."}]}, {"question": "The source identifies the Catholic Church as 'the single institution with genuinely trans-European reach and authority' in medieval Europe. Which of the following BEST explains how the Church performed this function despite political feudal fragmentation?", "options": [{"text": "The Church maintained a standing army that enforced its authority over feudal lords across Western Europe.", "isCorrect": false, "rationale": "The Church's authority was institutional and ideological, not primarily military; its 'trans-European reach' came from controlling rituals, training literacy, collecting tithes, and maintaining a network of monasteries and cathedrals, not from a standing army."}, {"text": "The Church controlled the rituals of birth, marriage, and death; trained the only substantial literate class; collected the tithe; and maintained the only Europe-wide administrative network of monasteries, cathedrals, and bishops.", "isCorrect": true, "rationale": "The source explicitly identifies all four functions — ritual control, literacy monopoly, tithe collection, and administrative network — as the basis for the Church's trans-European authority, making it the de facto institutional connective tissue of a politically fragmented continent."}, {"text": "The Church was controlled by secular kings who used it to extend royal authority into every village in Europe.", "isCorrect": false, "rationale": "The source describes the Church's relationship with secular rulers as 'a constant source of tension, negotiation, and occasional open conflict,' not as subordination to royal control; the Investiture Controversy specifically established papal over secular authority on Church appointments."}, {"text": "The Church maintained authority through the Crusades, which created a common enemy that united all European lords under Church command.", "isCorrect": false, "rationale": "While the Crusades mobilized trans-European effort, the Church's daily authority came from its institutional functions (rituals, literacy, tithe), not from the Crusades, which were episodic (1095–1291) and often politically contentious."}]}, {"question": "The source presents the comparison of European and Japanese feudalism as 'one of history's most striking cases of parallel institutional evolution.' Which of the following BEST captures the KEY DIFFERENCE the source identifies between the two systems?", "options": [{"text": "European knights used cavalry and lances, while Japanese samurai used bows and swords — so the systems produced different military technologies.", "isCorrect": false, "rationale": "While the source does describe different weapons (lance/sword vs. sword/bow), this is a description, not the KEY analytical difference; the source identifies the Catholic Church's trans-regional authority structure as the key distinction."}, {"text": "The Catholic Church gave Western European feudalism a trans-regional religious authority structure with no parallel in Japan, where Buddhism was more politically subordinate to the shogunate; and European feudal bonds were theoretically contractual, while Japanese samurai loyalty was framed as an absolute personal obligation.", "isCorrect": true, "rationale": "The source explicitly names these as the 'key differences': the Church's trans-regional authority (vs. Buddhism's political subordination in Japan) and the contractual vs. absolute nature of loyalty bonds."}, {"text": "Japanese feudalism was more economically developed than European feudalism because Japan had a monetized economy by 1200.", "isCorrect": false, "rationale": "The source does not claim Japanese economic superiority; it focuses on the political and religious structural differences between the two systems, not comparative economic development."}, {"text": "European feudalism was based on inherited land grants, while Japanese feudalism was based on merit — comparable to a military meritocracy.", "isCorrect": false, "rationale": "The source describes Japanese lords (daimyo) granting land (in the early period) or stipends (later) to retainer samurai — not a merit-based system; both systems involved personal loyalty bonds, not pure meritocracy."}]}, {"question": "A student claims: 'The Investiture Controversy of 1076–1122 proved that the Pope had complete and final authority over all European rulers.' Based on the source, which qualification would a historian add to this claim?", "options": [{"text": "The Investiture Controversy had no real significance because both sides quickly forgot about it.", "isCorrect": false, "rationale": "The source treats the Investiture Controversy as significant — it 'established the principle' about Church appointment authority; the correct qualification is about the gap between principle and practice."}, {"text": "The Investiture Controversy established the principle that the Pope had ultimate authority over Church appointments, but in practice kings and nobles continued to exercise enormous influence over the Church in their territories.", "isCorrect": true, "rationale": "The source explicitly states this: the Controversy 'established the principle that the Pope, not secular lords, had ultimate authority over Church appointments — but in practice, kings and nobles continued to exercise enormous influence over the Church in their territories.'"}, {"text": "The Investiture Controversy resulted in the Pope permanently surrendering all authority over Church appointments to secular rulers.", "isCorrect": false, "rationale": "The source describes the opposite outcome — the Controversy established papal (not secular) authority over appointments as the formal principle, even though practice was more complex."}, {"text": "The Investiture Controversy had no effect because the Church had no real institutional authority in Europe during the medieval period.", "isCorrect": false, "rationale": "The source explicitly identifies the Church as having 'genuinely trans-European reach and authority' through multiple institutional functions; denying Church institutional authority directly contradicts the source."}]}, {"question": "Medieval European serfs were 'bound by custom and law to the land of their lord's estate' and could not leave without the lord's permission. The source identifies this as DISTINCT from slavery. Which distinction does the source make?", "options": [{"text": "Serfs owned their own land; slaves did not own any property.", "isCorrect": false, "rationale": "The source does not describe serfs as landowners; they had access to strips of land in the open fields but did not own it — the distinction the source makes is about being sold and mobility, not about land ownership."}, {"text": "Unlike slaves, serfs could not legally be sold away from their land; unlike free peasants, they could not leave without the lord's permission.", "isCorrect": true, "rationale": "The source explicitly states: 'Unlike slaves, serfs could not legally be sold away from their land; unlike free peasants, they could not leave without their lord's permission' — a two-sided distinction that places serfs between chattel slavery and free peasant status."}, {"text": "Serfs were protected by the Church from abuse, while slaves had no legal protection.", "isCorrect": false, "rationale": "The source does not make this distinction; it defines serfdom in terms of mobility and sale, not Church protection from abuse."}, {"text": "Serfs were non-Christian minority groups, while slaves were always Christian European peoples.", "isCorrect": false, "rationale": "Serfdom and slavery were not defined by religious or ethnic identity in this period; the distinction the source makes is legal and economic — about attachment to land and the ability to be sold."}]}, {"question": "The Crusades (1095–1291) are described in the source as having consequences beyond their original military purpose. Which of the following correctly identifies ALL the consequences the source attributes to the Crusades?", "options": [{"text": "Military conquest of the Holy Land, permanent Crusader kingdom establishment, and elimination of Islamic political presence in the Levant.", "isCorrect": false, "rationale": "The Crusades ultimately failed to permanently hold the Holy Land; the source does not describe them as eliminating Islamic presence. The source's emphasis is on the Crusades' commercial and cultural consequences, not military permanence."}, {"text": "The most dramatic exercise of trans-European political mobilization by the Church; also opened new trade routes and brought Western Europeans into sustained contact with Byzantine and Islamic civilizations.", "isCorrect": true, "rationale": "The source explicitly attributes to the Crusades both their Church-mobilization function and their commercial-cultural consequences: 'opening new trade routes and bringing Western Europeans into sustained contact with Byzantine and Islamic civilizations.'"}, {"text": "The establishment of permanent European colonies in the Middle East and the conversion of the Islamic world to Christianity.", "isCorrect": false, "rationale": "The Crusades established temporary Crusader states, not permanent colonies; mass conversion of the Islamic world did not occur. The source focuses on the Crusades' commercial and cultural contact, not conversion or permanent colonization."}, {"text": "The destruction of feudalism in Europe by forcing knights to leave their fiefs and creating a soldier class no longer dependent on land grants.", "isCorrect": false, "rationale": "The source does not attribute the decline of feudalism to the Crusades; it notes feudalism began breaking down in the fourteenth century, accelerated by the Black Death, not primarily by Crusader military service."}]}, {"question": "The source notes that 'by 1200, conditions were shifting' in medieval Europe: population was growing, long-distance trade was reviving, and new institutions — chartered towns, royal courts, universities — were forming. This observation MOST DIRECTLY challenges which historical claim?", "options": [{"text": "Medieval Europe had any political institutions at all before the fifteenth century.", "isCorrect": false, "rationale": "The source does not deny the existence of medieval political institutions; it describes feudal lords, the Church, and the manorial system as functioning institutions, while noting their transition toward greater centralization."}, {"text": "That medieval European feudalism was a static equilibrium unchanged from its ninth-century origins to the late medieval period.", "isCorrect": true, "rationale": "The source explicitly argues that 'European feudalism was always a dynamic, evolving arrangement, not a static medieval equilibrium,' using the shifting conditions of post-1200 population growth, trade revival, and new institutions as evidence of ongoing change."}, {"text": "That the Catholic Church ever held any genuine authority in medieval Europe.", "isCorrect": false, "rationale": "The source affirms the Church's genuine trans-European authority; noting that conditions were shifting in 1200 does not challenge the Church's medieval authority — it was still functioning as described."}, {"text": "That Viking, Magyar, and Saracen raids played any role in shaping early medieval political arrangements.", "isCorrect": false, "rationale": "The source attributes the origin of feudalism to the response to those raids; the observation about post-1200 conditions changing is about feudalism's evolution, not about questioning its ninth-century origins."}]}, {"question": "Based on the comparison in the source, which statement BEST captures the KEY SIMILARITY between European and Japanese feudalism?", "options": [{"text": "Both systems developed in societies that had previously been governed by a Roman-style imperial bureaucracy.", "isCorrect": false, "rationale": "Japan had no Roman imperial predecessor; only Europe can be described as developing after Roman collapse. The shared similarity the source identifies is structural, not about Roman inheritance."}, {"text": "Both systems fragmented political authority among warrior-landholders, produced distinctive warrior codes, and operated in the absence of strong central bureaucratic states.", "isCorrect": true, "rationale": "The source explicitly states the 'key similarity: Both systems fragmented political authority among warrior-landholders, produced distinctive warrior codes, and operated in the absence of strong central bureaucratic states.'"}, {"text": "Both systems were supported by a single universal religion (Christianity) that provided trans-regional ideological authority.", "isCorrect": false, "rationale": "The source identifies the Catholic Church's trans-regional authority as a KEY DIFFERENCE — Japan's Buddhism was more subordinate to the shogunate and lacked an equivalent papal structure. Christianity was not common to both systems."}, {"text": "Both systems were undermined by the Black Death, which killed the serf and peasant populations sustaining both economies.", "isCorrect": false, "rationale": "The Black Death (primarily 14th–15th centuries) affected Europe, not Japan. The source mentions it as accelerating European feudal breakdown, but does not claim it similarly affected Japanese feudalism."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
