        <div class="subtitle">AP World History: Modern &mdash; Cultural Syncretism and Anti-Globalization Resistance</div>

    <div id="score-box" class="score-box">

        <div class="score-detail" id="score-detail"></div>
    </div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

    </div>

        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "The source states that globalization produced 'not homogenization but a more complex outcome: a simultaneous intensification of cultural exchange and of cultural resistance.' Which of the following best illustrates BOTH dimensions of this outcome?", "options": [{"text": "American fast food chains replaced local restaurants globally while all non-English languages declined.", "isCorrect": false, "rationale": "This describes pure homogenization — neither cultural hybridity nor resistance. The text explicitly argues against this simple 'McDonaldization' narrative, noting that global culture became hybrid rather than uniformly American."}, {"text": "K-pop borrowed from American hip-hop while projecting Korean identity, AND the French government introduced film quotas and advertising-language restrictions to protect French culture.", "isCorrect": true, "rationale": "K-pop is the text's example of cultural syncretism (creative blending producing something new) while French cultural protection legislation is an example of cultural defense/resistance — together illustrating 'simultaneous intensification of exchange and resistance.'"}, {"text": "The internet spread Western political ideals globally, causing uniform adoption of liberal democracy.", "isCorrect": false, "rationale": "The section specifically challenges the narrative of Western cultural dominance. It discusses religious revivalism, economic nationalism, and cultural resistance — all of which contradict the idea of uniform Western political adoption."}, {"text": "Chinese economic growth led China to adopt American consumer culture while abandoning Chinese traditions.", "isCorrect": false, "rationale": "The text uses Shanghai as an example of China being 'simultaneously deeply connected to global capital and finance, and governed by a state that insists on Chinese sovereignty over its cultural and political space' — not abandonment of Chinese traditions."}]}, {"question": "Cultural syncretism is defined in the source as 'the creative blending of elements from two or more distinct cultural traditions to produce new, hybrid forms.' Historical examples include Swahili culture and Jazz. Which of the following is the source's BEST contemporary example of syncretism?", "options": [{"text": "The Iranian Revolution (1979), which created a theocratic Islamic Republic blending traditional Islamic law with modern state institutions.", "isCorrect": false, "rationale": "The Iranian Revolution is presented as an example of resistance to Western cultural globalization — not a syncretic blending that the text celebrates as cultural production. The text places it in the religious revivalism section, not the syncretism section."}, {"text": "Brazilian funk, which blended Miami bass with baile funk and Caribbean rhythms to produce a new global music genre.", "isCorrect": true, "rationale": "The text explicitly lists Brazilian funk as an example of syncretism: 'blending Miami bass with baile funk and Caribbean rhythms' — the creative combination of multiple distinct cultural traditions producing a new, hybrid form."}, {"text": "The Bharatiya Janata Party's assertion of Hindu civilizational identity against post-independence secularism.", "isCorrect": false, "rationale": "The BJP/Hindutva movement is presented as a form of cultural resistance and assertion of civilizational identity — the opposite of syncretism. It specifically rejects the mixing of Hindu identity with outside influences."}, {"text": "The French government's introduction of film quotas to protect French-language cinema from Hollywood.", "isCorrect": false, "rationale": "French film quotas are an example of cultural defense/resistance to globalization — an attempt to prevent cultural mixing, not an example of creative hybrid production."}]}, {"question": "Nigerian Nollywood, Korean K-drama, and Mexican/Brazilian telenovelas all became global cultural exports in the twenty-first century. What do these examples most directly challenge?", "options": [{"text": "The effectiveness of WTO trade rules in regulating cultural exports.", "isCorrect": false, "rationale": "The emergence of non-Western cultural exports is not primarily a WTO regulation story. The text presents these examples as evidence challenging the cultural homogenization thesis — not commentary on trade rules."}, {"text": "The 'McDonaldization' thesis that global cultural flows were primarily one-directional from the West to the rest.", "isCorrect": true, "rationale": "The text explicitly invokes these examples to challenge the one-directionality assumption: 'global cultural flows were not simply one-directional from the West to the rest' — Nollywood, K-drama, and telenovelas are the evidence."}, {"text": "The claim that developing nations lack the technology infrastructure to produce globally competitive media.", "isCorrect": false, "rationale": "While technology is relevant, the text's argument is about the direction of cultural flows, not primarily a technological capacity argument. The point is cultural content, not technology access."}, {"text": "The effectiveness of surveillance capitalism in shaping global media consumption.", "isCorrect": false, "rationale": "Surveillance capitalism (from the Digital Revolution section) refers to data harvesting and behavioral profiling — it is not the concept being challenged by the emergence of non-Western cultural exports."}]}, {"question": "A historian studying Islamic revivalism in Turkey, Iran, and among al-Qaeda would note that these movements differ significantly from one another. Which commonality do they share, according to the source?", "options": [{"text": "All three movements used political violence to achieve their goals.", "isCorrect": false, "rationale": "Turkey's AKP governed within parliamentary institutions — the text specifically contrasts it with violent jihadism. The text carefully distinguishes the different forms of Islamic revivalism, including nonviolent democratic participation."}, {"text": "All three were funded primarily by Saudi Arabia's government as part of its religious foreign policy.", "isCorrect": false, "rationale": "The text does not attribute these movements to Saudi funding. Saudi Arabia's abstention from the UDHR is discussed in the human rights section, but not as the source of Islamic revivalism financing."}, {"text": "All three shared a rejection of the equation of modernity with Westernization and a claim that Islamic law and practice provided a superior framework for individual and social life.", "isCorrect": true, "rationale": "The text explicitly identifies this commonality: 'What these movements shared was a rejection of the equation of modernity with Westernization and a claim that Islamic law and practice provided a superior framework for individual and social life.'"}, {"text": "All three were primarily responses to economic displacement caused by China's integration into the WTO.", "isCorrect": false, "rationale": "Economic displacement from China's WTO integration is the text's explanation for Western economic nationalism (Brexit, Trump) — not for Islamic revivalism in Turkey, Iran, and jihadism. These are distinct phenomena with different causes."}]}, {"question": "The Iranian Revolution (1979) 'provided the most dramatic demonstration that an alternative path to modernity was possible.' What specifically makes this demonstration 'dramatic' in the source's framing?", "options": [{"text": "Iran developed nuclear weapons, challenging U.S. military dominance.", "isCorrect": false, "rationale": "Nuclear weapons development is not the source's framing of the Iranian Revolution's significance. The text focuses on its demonstration of an alternative modernity — an Islamic Republic governed by clerics — not military challenge."}, {"text": "The revolution overthrew a U.S.-backed monarchy and established an Islamic Republic governed by clerics under velayat-e faqih, demonstrating that a nation could achieve modernity on Islamic rather than Western terms.", "isCorrect": true, "rationale": "The text describes exactly this: overthrowing a U.S.-backed monarchy and establishing an Islamic Republic governed by the doctrine of velayat-e faqih (guardianship of the jurist) — demonstrating that 'an alternative path to modernity was possible,' not just a rejection of modernity."}, {"text": "Iran's revolution inspired the Arab Spring uprisings across the Middle East three decades later.", "isCorrect": false, "rationale": "The text does not draw a direct causal connection between the 1979 Iranian Revolution and the 2010–2012 Arab Spring. The Arab Spring is discussed in the Digital Revolution section as a social media–coordinated movement."}, {"text": "Iran became the first nation to formally challenge the Universal Declaration of Human Rights at the United Nations.", "isCorrect": false, "rationale": "The text does not frame the Iranian Revolution in terms of UDHR challenges. The Iranian Revolution is discussed as a form of cultural and political resistance to Western modernity, not specifically as a UDHR challenge."}]}, {"question": "Workers in U.S. Rust Belt and English post-industrial towns shared a structural grievance articulated in the source as: globalization 'benefited them as consumers (cheaper goods) while devastating them as workers (factory closures and wage stagnation).' This contradiction MOST directly explains which political phenomenon?", "options": [{"text": "The rise of environmental movements demanding carbon taxes and renewable energy subsidies.", "isCorrect": false, "rationale": "Environmental movements are covered in the Anthropocene section. The workers' consumer/worker contradiction described in the text is the explanation for economic nationalist political movements, not environmental politics."}, {"text": "The growth of religious revivalism as workers sought spiritual alternatives to secular materialism.", "isCorrect": false, "rationale": "The text connects religious revivalism primarily to resistance to Western cultural hegemony in non-Western societies — not to the economic displacement of industrial workers in the United States and England. These are presented as distinct phenomena."}, {"text": "Economic nationalist and populist movements — Brexit, Trump's America First, the National Rally in France, and the Law and Justice Party in Poland.", "isCorrect": true, "rationale": "The text explicitly connects this consumer/worker contradiction to these specific movements: 'Political entrepreneurs in the 2010s channeled this discontent into nationalist and populist movements: Donald Trump's America First... Brexit... National Rally in France... Law and Justice Party in Poland.'"}, {"text": "The adoption of structural adjustment programs in Western nations by the IMF.", "isCorrect": false, "rationale": "Structural adjustment was applied to Global South borrowing nations in the 1980s–1990s — not to wealthy Western industrial nations. The political backlash in Western nations was to trade-driven deindustrialization, not IMF conditionality."}]}, {"question": "The source introduces the French concept of métissage (mixture) as potentially more accurate than 'McDonaldization' for describing contemporary global culture. Which evidence BEST justifies this assessment?", "options": [{"text": "The French government's success in protecting French-language cinema through quotas demonstrates cultural resistance to American influence.", "isCorrect": false, "rationale": "French quotas are an example of cultural protectionism/resistance, not evidence of métissage. Métissage (mixture) describes hybrid cultural production, not defensive barriers against mixing."}, {"text": "TikTok videos and Chinese animated content reshaping global popular culture alongside K-pop, Nollywood, and telenovelas show that cultural production is multi-directional and hybrid.", "isCorrect": true, "rationale": "The text lists TikTok, Chinese video games, K-pop, Nollywood, and telenovelas as evidence that 'global culture became increasingly hybrid rather than uniformly American' — the very definition of métissage over McDonaldization."}, {"text": "Islamic revivalism rejected Western cultural models, proving that non-Western cultures resisted rather than mixed with globalizing influences.", "isCorrect": false, "rationale": "Islamic revivalism is an example of resistance/rejection, not métissage/mixture. The text presents revivalism and syncretism as different responses to globalization — conflating them misrepresents both."}, {"text": "One language becomes extinct approximately every two weeks as younger generations shift to national and international languages.", "isCorrect": false, "rationale": "Language extinction is presented as evidence that supports the homogenization concern — not as evidence for métissage. The disappearance of indigenous languages is a loss, not an example of creative hybrid culture."}]}, {"question": "The source argues that critics of globalization 'came from radically different positions' — including labor advocates, environmentalists, Islamic revivalists, Hindu nationalists, and displaced Western workers. What do these disparate groups SHARE, according to the text?", "options": [{"text": "All opposed any form of international trade and sought to return to pre-industrial subsistence economies.", "isCorrect": false, "rationale": "The text carefully distinguishes critics of globalization from those who wanted no trade at all. The critique is about the terms and distribution of globalization, not trade itself. Islamic revivalists and Hindu nationalists, for instance, do not oppose trade — they oppose specific cultural dimensions of globalization."}, {"text": "All were motivated primarily by religious opposition to Western secular values.", "isCorrect": false, "rationale": "Labor advocates, environmentalists, and displaced Western workers are not motivated by religious opposition to secularism. The text explicitly lists these as different motivations — religious revivalism is one strand, not the common thread."}, {"text": "A shared conviction that the dominant form of globalization served the interests of a relatively small transnational elite at the expense of most people.", "isCorrect": true, "rationale": "The text identifies this as the common thread: 'What these disparate movements shared was a conviction that the dominant form of globalization served the interests of a relatively small transnational elite at the expense of most people.'"}, {"text": "All ultimately supported the WTO's dispute-resolution mechanisms as an alternative to bilateral trade wars.", "isCorrect": false, "rationale": "The WTO is described as one of the institutions of globalization that critics objected to. Globalization critics were not supporters of WTO mechanisms — they were among those challenging the entire institutional architecture."}]}, {"question": "The Hindutva movement grew from 'a fringe ideology in the 1920s to a dominant political force by the 2010s.' The BJP's electoral victories under Narendra Modi (2014, 2019) represent which type of anti-globalization resistance?", "options": [{"text": "Economic populism — workers displaced by deindustrialization channeling grievances into nationalist politics.", "isCorrect": false, "rationale": "Economic populism (displaced workers) is the text's explanation for Brexit and Trump — wealthy-nation phenomena. Hindutva is presented as civilizational/cultural nationalism — assertion of India's identity as a Hindu civilization — not primarily an economic displacement movement."}, {"text": "Cultural/civilizational nationalism — the assertion that India is essentially a Hindu civilization, and that its identity should be governed by Hindu practices rather than post-independence secularism.", "isCorrect": true, "rationale": "The text defines Hindutva as 'the ideology that India is essentially a Hindu civilization and that Muslims and Christians are cultural outsiders' — a civilizational cultural nationalism, framing post-independence secularism as 'culturally alien.' Supporters saw BJP's victories as 'the legitimate assertion of India's civilizational identity.'"}, {"text": "Religious revivalism modeled directly on the Iranian Revolution's theocratic structure.", "isCorrect": false, "rationale": "The text presents Hindutva and Islamic revivalism as separate examples of religious/civilizational resistance to globalization. Hindutva is a Hindu nationalist movement, not modeled on the Iranian Shia theocratic model."}, {"text": "A response to China's growing economic dominance in South Asian manufacturing markets.", "isCorrect": false, "rationale": "The text does not connect BJP/Hindutva's rise to Chinese manufacturing competition. Hindutva's ideological roots trace to the 1920s — long before China's economic rise. The text presents it as a cultural-identity response to secularism and Western hegemony."}]}, {"question": "A student reading the source concludes: 'Anti-globalization resistance is fundamentally reactionary and regressive.' Which evidence from the source would MOST effectively challenge this characterization?", "options": [{"text": "The fact that indigenous communities in the Amazon documented language extinction at the rate of one language every two weeks.", "isCorrect": false, "rationale": "Language extinction is a consequence of globalization, not a form of anti-globalization resistance. This evidence describes what is happening to indigenous communities, not how they are responding — and it does not address whether resistance is reactionary."}, {"text": "The fact that the French film quota system successfully prevented American films from dominating French cinema.", "isCorrect": false, "rationale": "French film quotas are a state-led cultural protectionist measure that could be characterized as both progressive (protecting cultural diversity) and restrictive. However, the text does not present this as the strongest counter to the 'reactionary' characterization."}, {"text": "Critics of globalization came from radically different political positions — including labor advocates protecting workers' wages, environmentalists opposing deregulation, and small farmers undercut by subsidized exports — not only religious or nationalist movements.", "isCorrect": true, "rationale": "The text presents labor advocates protecting wages, environmentalists opposing deregulation, and small farmers undercut by subsidized exports as globalization critics — positions typically associated with progressive politics. Calling all anti-globalization resistance 'reactionary' ignores these left-wing critiques entirely."}, {"text": "Global merchandise exports tripled between 1990 and 2008, demonstrating that resistance to globalization had no practical effect on trade volumes.", "isCorrect": false, "rationale": "This describes trade growth despite resistance but does not address whether anti-globalization resistance is reactionary or progressive — it speaks to effectiveness, not character."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
