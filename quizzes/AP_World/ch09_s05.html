        <div class="subtitle">AP World History: Modern &mdash; The Anthropocene</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "In 2000, Paul Crutzen and Eugene Stoermer proposed the term 'Anthropocene.' What is the core insight captured by this term?", "options": [{"text": "Human civilization exists within nature and must therefore adapt to natural cycles rather than trying to control them.", "isCorrect": false, "rationale": "This is the opposite of the Anthropocene insight. The Anthropocene captures the idea that humans have become the dominant driver of natural change — not that humans exist within and must adapt to nature's cycles."}, {"text": "Human activity has become a geological force of planetary magnitude, altering Earth's chemistry, climate, and biodiversity in ways comparable to major natural events in Earth's history.", "isCorrect": true, "rationale": "The text states that the Anthropocene captures 'the insight that human activity...had become a force of geological magnitude, altering Earth's chemistry, climate, and biodiversity in ways comparable to the asteroid impact that ended the Cretaceous Period.'"}, {"text": "The use of atomic weapons in the twentieth century permanently damaged Earth's atmosphere, creating a new geological epoch.", "isCorrect": false, "rationale": "The text identifies fossil fuel burning, land transformation for agriculture, and industrial chemical discharge as the primary anthropogenic drivers — not nuclear weapons specifically."}, {"text": "Rapid population growth since 1950 is the single most important driver of environmental change.", "isCorrect": false, "rationale": "The text's Great Acceleration lists multiple simultaneous changes — GDP, water use, nitrogen, motor vehicles, CO₂ — not just population. Population tripled but is one indicator among many."}]}, {"question": "Read the following list of changes between 1950 and 2010 from the source: global population tripled; world GDP increased 15-fold; water use more than doubled; nitrogen in soils increased 10-fold; motor vehicles grew from 40 million to over 1 billion; CO₂ rose to levels not seen in 800,000 years.\n\nThis data collectively illustrates which concept?", "options": [{"text": "The epidemiological transition, as improved nutrition and sanitation extended human life expectancy globally.", "isCorrect": false, "rationale": "The epidemiological transition is a health-and-disease concept from the medical section. The data listed describes rates of resource use, economic activity, and atmospheric chemistry — not disease patterns or life expectancy."}, {"text": "Moore's Law applied to human consumption, showing that resource use doubles every two years as technology improves.", "isCorrect": false, "rationale": "Moore's Law specifically describes transistor density in computing hardware. The data listed shows resource and economic growth over 60 years — not a computing-hardware doubling pattern."}, {"text": "The Great Acceleration — the post-1950 period during which the major indicators of human impact on Earth's systems began rising at rates unprecedented in 10,000 years of settled civilization.", "isCorrect": true, "rationale": "The text explicitly defines the Great Acceleration as this post-1950 period and lists these exact indicators as its evidence — 'rates unprecedented in the 10,000-year history of settled civilization.'"}, {"text": "Structural adjustment, as IMF-driven development programs caused rapid industrialization in previously agrarian economies.", "isCorrect": false, "rationale": "Structural adjustment is an IMF loan-conditionality concept from the global institutions section. The Great Acceleration data shows global trends across all nations, not IMF-specific policy effects."}]}, {"question": "The text describes the 'distributional injustice of climate change.' A scholar of international relations argues this is the defining ethical challenge of the twenty-first century. Which evidence from the source BEST supports this characterization?", "options": [{"text": "The United States withdrew from the Paris Agreement in 2017, demonstrating the vulnerability of international agreements to domestic politics.", "isCorrect": false, "rationale": "U.S. withdrawal illustrates the political fragility of climate agreements, not the distributional injustice. Distributional injustice refers to who causes the crisis vs. who suffers from it — a different argument."}, {"text": "Small island states such as Tuvalu, Kiribati, and the Maldives face literal inundation of their entire national territory from sea-level rise caused almost entirely by emissions from other countries.", "isCorrect": true, "rationale": "The text presents this as the starkest example of distributional injustice: nations that 'face the literal inundation of their entire national territory from sea-level rise caused almost entirely by emissions from other countries' — the most extreme form of bearing the worst costs while having caused the least harm."}, {"text": "CO₂ concentrations in 2010 reached levels not seen in 800,000 years of ice-core records.", "isCorrect": false, "rationale": "This fact demonstrates the unprecedented scale of atmospheric change but does not itself illustrate distributional injustice — it does not reveal who is responsible or who suffers the consequences."}, {"text": "Coral reef bleaching threatens tropical reefs with functional death by mid-century under high-emissions scenarios.", "isCorrect": false, "rationale": "Reef bleaching is an ecological consequence of climate change but does not by itself illustrate the distributional injustice — the identity of who caused the emissions vs. who suffers the reef loss is not captured by this fact alone."}]}, {"question": "Compare the Kyoto Protocol (1997) and the Paris Agreement (2015). What was the key architectural difference between the two approaches?", "options": [{"text": "Kyoto established voluntary pledges for all nations; Paris imposed mandatory binding targets set by international negotiators.", "isCorrect": false, "rationale": "This inverts the actual comparison. The Kyoto Protocol established binding targets (for developed nations), while the Paris Agreement moved to voluntary Nationally Determined Contributions (self-set pledges) — not the other way around."}, {"text": "Kyoto imposed binding emissions targets only on wealthy nations and exempted rapidly industrializing countries; Paris used voluntary self-set pledges (NDCs) from all parties.", "isCorrect": true, "rationale": "The text states Kyoto 'required developed nations to reduce greenhouse gas emissions' while exempting China and India; Paris instead had each country submit its own NDC — a 'self-set pledge.' This architectural difference is the central comparison."}, {"text": "Kyoto was adopted by the United States but rejected by Europe; Paris reversed this, with European nations participating and the U.S. withdrawing.", "isCorrect": false, "rationale": "The text states the U.S. 'signed but never ratified' Kyoto; Paris was signed by 196 parties including the U.S. (which withdrew in 2017 and rejoined in 2021). The U.S. never fully committed to Kyoto and did not 'adopt' it."}, {"text": "Kyoto focused on biodiversity loss, while Paris focused exclusively on carbon dioxide reduction.", "isCorrect": false, "rationale": "Kyoto focused on greenhouse gas emissions reduction, not biodiversity. Paris also focused on emissions and temperature targets. Neither was primarily about biodiversity — that is addressed through separate frameworks."}]}, {"question": "The text states that 'the costs of [Anthropocene] change fell most heavily on the communities and nations least responsible for creating the crisis.' Which SPICE-T theme does this statement MOST directly invoke?", "options": [{"text": "Cultural (C) — because the Anthropocene represents a clash of civilizational values about humanity's relationship to nature.", "isCorrect": false, "rationale": "While cultural values intersect with environmentalism, the statement about costs falling on those least responsible is primarily an economic distribution and political power question — not a cultural values clash."}, {"text": "Technology (T) — because fossil fuel combustion technology is the primary cause of climate change's unequal distribution.", "isCorrect": false, "rationale": "Technology is the mechanism of the problem but not the theme invoked by the distributional statement. The core of 'who bears the costs' is an economic and political justice question, not a Technology theme question."}, {"text": "Interaction with Environment (I) and the intersection of economic/political power — the wealthiest industrial nations generated the crisis while the Global South and Pacific island nations bear the worst physical consequences.", "isCorrect": true, "rationale": "The statement is about how human industrial activity (Interaction with Environment) interacts with economic and political power to determine who suffers. The text explicitly connects this to global inequality: 'communities and nations least responsible...predominantly in South Asia, sub-Saharan Africa, Southeast Asia, and the Pacific Islands.'"}, {"text": "Social (S) — because climate change disproportionately affects women and children in the Global South.", "isCorrect": false, "rationale": "While climate impacts have gender and age dimensions, the statement specifically identifies nations and regions as the unit of analysis, not social categories within countries. The core argument is about global distribution between nations, making Interaction with Environment the primary theme."}]}, {"question": "The Paris Agreement's Nationally Determined Contributions (NDCs) were criticized from both the left and the right. What were the two contrasting criticisms?", "options": [{"text": "The left criticized NDCs for being too expensive; the right criticized them for not going far enough to protect the environment.", "isCorrect": false, "rationale": "This reverses the political positions. The text identifies left critics as arguing the voluntary framework was too weak to achieve goals; right critics argued it imposed economic costs without enforceable obligations on competitors."}, {"text": "Left critics argued the voluntary NDC framework was too weak to achieve stated warming goals; right critics argued it imposed economic costs without enforceable obligations on major competitors.", "isCorrect": true, "rationale": "The text explicitly states both criticisms: 'Critics on the left argued the voluntary NDC framework was too weak to achieve the stated goals; critics on the right argued it imposed economic costs without enforceable obligations on major competitors.'"}, {"text": "Left critics opposed including China and India; right critics wanted binding targets for all nations.", "isCorrect": false, "rationale": "This was more characteristic of the Kyoto critique. The Paris Agreement involved all nations submitting NDCs, so neither left nor right critics were objecting to China/India's exclusion — which was Kyoto's specific controversy."}, {"text": "Left critics supported U.S. withdrawal; right critics argued the U.S. should have stayed in but negotiated harder.", "isCorrect": false, "rationale": "The text does not present U.S. withdrawal as a position left critics supported. Left critics generally opposed withdrawal; right critics used arguments about unfair burden-sharing to justify withdrawal."}]}, {"question": "Scientists estimate that species are currently going extinct at 100 to 1,000 times the pre-industrial background rate. This phenomenon is described in the source as:", "options": [{"text": "The epidemiological transition applied to non-human species.", "isCorrect": false, "rationale": "The epidemiological transition is a human health concept about shifting disease patterns — it does not apply to non-human species extinction rates. Biodiversity loss and epidemiological transition are entirely distinct concepts."}, {"text": "Ocean acidification, caused by CO₂ absorption reducing ocean pH.", "isCorrect": false, "rationale": "Ocean acidification is a separate Anthropocene threat described in the text — it specifically refers to the chemical process of CO₂ absorption making oceans more acidic, threatening marine shells and corals. It is distinct from the terrestrial species extinction rate."}, {"text": "The 'sixth mass extinction,' caused primarily by habitat destruction, invasive species, overfishing, and climate change.", "isCorrect": true, "rationale": "The text explicitly calls this pace of extinction something 'some researchers call the sixth mass extinction' and attributes it to 'habitat destruction (primarily for agriculture and urban expansion), invasive species, overfishing, and climate change.'"}, {"text": "The Great Acceleration's direct effect, since industrial pollution is the primary driver of species loss globally.", "isCorrect": false, "rationale": "While the Great Acceleration and biodiversity loss are connected, the text attributes the sixth mass extinction primarily to habitat destruction, invasive species, overfishing, and climate change — not solely 'industrial pollution,' which is an imprecise characterization."}]}, {"question": "The SPICE-T connection box in the source states: 'Technology is simultaneously the source of the problem (fossil-fuel combustion, industrial agriculture, synthetic chemistry) and the proposed solution (renewable energy, carbon capture, precision agriculture).' This tension MOST closely parallels which earlier pattern in the course?", "options": [{"text": "The GMO controversy, in which genetic technology simultaneously increased yields and introduced new ecological risks like herbicide-resistant superweeds.", "isCorrect": true, "rationale": "The text's GMO section explicitly notes 'transformative innovations generate genuine benefits alongside genuine risks' — the same dual role of technology. In both cases, technology creates a problem (ecological risk / climate change) and is also invoked as the solution (precision agriculture / renewable energy)."}, {"text": "The boomerang effect, in which local advocacy leverages international pressure to achieve domestic policy change.", "isCorrect": false, "rationale": "The boomerang effect is an advocacy-strategy concept from the human rights section — it has no structural connection to the dual problem-and-solution role of technology."}, {"text": "Leapfrogging, in which Global South mobile networks bypassed landline infrastructure.", "isCorrect": false, "rationale": "Leapfrogging describes a sequencing of technology adoption, not the paradox of technology as both problem-creator and problem-solver. The structural parallel is not there."}, {"text": "The epidemiological transition, in which the same economic development that eliminated infectious diseases created the conditions for chronic non-communicable diseases.", "isCorrect": false, "rationale": "The epidemiological transition involves economic development both solving one problem (infectious disease) and creating another (chronic disease) — which is structurally parallel. However, the text's SPICE-T box specifically connects this to the Technology theme and to the GMO-like 'benefits alongside risks' pattern in a more direct way."}]}, {"question": "A historian studying the United States' relationship with the Paris Agreement (signed 2016, withdrew 2017 under Trump, rejoined 2021 under Biden) would most likely use this pattern to argue which of the following?", "options": [{"text": "The U.S. commitment to international climate agreements is structurally determined by economic conditions and will not change regardless of which party holds power.", "isCorrect": false, "rationale": "The text shows the exact opposite: U.S. policy on Paris changed with different administrations (Trump withdrew, Biden rejoined) — demonstrating that domestic political change, not structural economic determinism, drove the shifts."}, {"text": "International agreements relying on domestic ratification or administrative participation are vulnerable to changes in domestic political leadership, limiting their reliability.", "isCorrect": true, "rationale": "The text explicitly states this is what U.S. behavior 'illustrat[es]: the vulnerability of international agreements to domestic political change.' This is the historian's conclusion the evidence most directly supports."}, {"text": "The Paris Agreement was so strong that U.S. withdrawal had no effect on other nations' willingness to participate.", "isCorrect": false, "rationale": "The text does not make this claim. The point of noting U.S. withdrawal and return is the vulnerability of international agreements to domestic politics, not evidence of their invulnerability to such changes."}, {"text": "Climate change is primarily a domestic political issue and does not require international coordination to address effectively.", "isCorrect": false, "rationale": "The entire section presupposes that climate change requires international coordination — the UNFCCC, Kyoto, and Paris are all described as attempts at necessary international governance. The text does not argue that domestic action is sufficient."}]}, {"question": "Ocean acidification threatens 'the calcium carbonate shells of mollusks, corals, and many plankton species at the base of marine food chains.' Why does the phrase 'at the base of marine food chains' make this threat especially significant?", "options": [{"text": "Because corals and mollusks are economically valuable as tourist attractions and seafood, so their loss would primarily harm the tourism and fishing industries.", "isCorrect": false, "rationale": "While economic impacts are real, the text emphasizes the ecological significance of plankton 'at the base of marine food chains' — meaning their loss cascades throughout the entire marine ecosystem, not just specific commercial sectors."}, {"text": "Because disruption of organisms at the base of marine food chains would cascade throughout the entire marine ecosystem, threatening the stability of oceanic food webs on which billions of people and countless species depend.", "isCorrect": true, "rationale": "The text notes that acidification 'threatens the calcium carbonate shells of mollusks, corals, and many plankton species at the base of marine food chains' — the ecological significance of 'base of food chain' is that disruption there cascades upward through the entire ecosystem."}, {"text": "Because plankton are the primary producers of greenhouse gases and their decline would accelerate climate change.", "isCorrect": false, "rationale": "Plankton are important for oxygen production and carbon sequestration, not the primary producers of greenhouse gases. The text's concern is that acidification threatens the food-chain base, not that plankton extinction would cause more emissions."}, {"text": "Because the loss of corals and mollusks would eliminate the primary habitat for terrestrial species that depend on coastal environments.", "isCorrect": false, "rationale": "Marine food chains support marine species and human fisheries, not primarily terrestrial species. The threat described is oceanic ecosystem collapse, not terrestrial habitat loss."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
