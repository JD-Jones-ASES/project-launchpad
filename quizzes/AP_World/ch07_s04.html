<body>
<div class="quiz-container">

<script>
var QUESTIONS = [{"question": "The Great Depression undermined the Weimar Republic's political stability primarily through which mechanism?", "options": [{"text": "It caused France to invade the Ruhr Valley, humiliating Germany and triggering a nationalist backlash.", "isCorrect": false, "rationale": "France's Ruhr occupation occurred in 1923, during the hyperinflation crisis — before the Great Depression began in 1929. Conflating these events misattributes Depression-era political effects to an earlier crisis."}, {"text": "It produced 30 percent unemployment in Germany, discredited the Weimar Republic and capitalism itself, and drove voters toward extremes — both the Communist Party and the Nazi Party gained massively at Weimar democracy's expense.", "isCorrect": true, "rationale": "The source directly traces this causal chain: German unemployment reached 30 percent; the Weimar Republic 'was unable to manage mass unemployment politically'; 'voters turned to extremes: the Communist Party and the National Socialist (Nazi) Party both gained massively at Weimar democracy's expense.' This is the specific economic-to-political mechanism described."}, {"text": "It caused hyperinflation in Germany that wiped out middle-class savings, creating widespread support for radical alternatives.", "isCorrect": false, "rationale": "German hyperinflation occurred in 1922–1923, well before the Great Depression (which began in 1929). The Depression's German mechanism was mass unemployment and deflation, not hyperinflation. Conflating these two separate economic crises misrepresents the timeline."}, {"text": "It led Britain and France to demand immediate full payment of German reparations, which the Weimar government could not provide, triggering political collapse.", "isCorrect": false, "rationale": "The section does not cite reparations enforcement as the Depression's political mechanism. The mechanism described is mass unemployment discrediting liberal democracy and capitalism, driving voters to extremes."}], "id": "q01"}, {"question": "A political scientist in 1935 writes: 'Both fascism and Stalinism have arrived at single-party dictatorships, but from opposite ideological starting points.' Which of the following best expresses the historical basis for this observation?", "options": [{"text": "Fascism emerged from right-wing nationalism and anti-communism; Stalinism emerged from left-wing communist ideology — yet both systems produced single-party rule, cult of the leader, suppression of dissent, and identification of internal 'enemies.'", "isCorrect": true, "rationale": "The section's KEY CONCEPT explicitly states: 'Fascism (Italy, Germany) and Stalinism (Soviet Union) arrived at totalitarian governance from opposite ideological directions: fascism from the extreme nationalist right, Stalinism from the communist left. Yet both systems shared key structural features: single-party rule, the cult of the leader, suppression of dissent through terror, mobilization through propaganda, and the identification of internal \"enemies.\"'"}, {"text": "Fascism and Stalinism both began as labor movements before being co-opted by nationalist factions seeking economic control.", "isCorrect": false, "rationale": "Fascism did not begin as a labor movement in the standard sense; it was explicitly anti-communist and opposed organized labor's independence. Stalinism emerged from Bolshevik party control of the Soviet state, not a labor movement co-opted by nationalists. This description is historically inaccurate for both systems."}, {"text": "Both fascism and Stalinism adopted free-market capitalism as their economic base while controlling political life through single parties.", "isCorrect": false, "rationale": "Neither system adopted free-market capitalism. Fascism used state control of the economy within a nominally private-property framework, explicitly rejecting free-market liberalism. Stalinism nationalized all property and operated a command economy. Free-market capitalism is a defining feature of neither."}, {"text": "The two systems were structurally identical because both were responses to the failure of constitutional democracy in their respective countries.", "isCorrect": false, "rationale": "While both arose in contexts of political crisis, the section explicitly cautions against equating them: 'Comparing them does not equate them — their victims, ideologies, and methods differed in important ways.' Calling them structurally identical erases the important distinctions the source emphasizes."}], "id": "q02"}, {"question": "Stalin's collectivization policy beginning in 1928 is best analyzed using which SPICE-T theme?", "options": [{"text": "Cultural — because collectivization imposed Soviet secular values on religious Ukrainian peasants.", "isCorrect": false, "rationale": "While cultural dimensions existed, the section does not frame collectivization primarily as a cultural imposition on religious peasants. The dominant analytical frames are Economic (forced restructuring of agricultural production) and Political (coercive state control of the peasantry)."}, {"text": "Economic and Political — collectivization forcibly restructured agricultural production to extract grain for urban workers and industrial exports, while the state used political terror (deportation, execution as 'kulaks') to enforce compliance.", "isCorrect": true, "rationale": "The source describes collectivization as fundamentally about economic reorganization (grain extraction to feed urban workers and fund industrial imports) enforced by political terror ('peasant resistance was met with deportation to labor camps or execution as kulaks'). Both the Economic and Political SPICE-T themes are central to the analysis."}, {"text": "Technology — because collectivization introduced mechanized farming equipment that increased Soviet agricultural output.", "isCorrect": false, "rationale": "The section does not frame collectivization as a technology story. Mechanized farming on collective farms was part of the policy, but the section analyzes collectivization primarily through its political coercion and economic extraction dimensions — and its catastrophic human cost, not its technological achievements."}, {"text": "Interaction with the Environment — because collectivization disrupted traditional Ukrainian farming practices tied to seasonal environmental cycles.", "isCorrect": false, "rationale": "Environmental disruption is not the primary analytical frame the section uses for collectivization. The framework is political coercion and economic extraction, not environmental-agricultural disruption, even though famine (the Holodomor) resulted."}], "id": "q03"}, {"question": "The Holodomor (1932–1933) is described in the section as raising the question of whether it constitutes a genocide. What specific criterion makes the genocide classification contested?", "options": [{"text": "The death toll is disputed — Ukrainian scholars claim millions died while Soviet records show only a few thousand.", "isCorrect": false, "rationale": "The section acknowledges the death toll is estimated at 3.5 to 5 million — a massive and widely-recognized figure. The debate is not primarily about whether deaths occurred at scale, but about intentionality: whether the famine was deliberately targeted at Ukrainians as a group. Soviet historiography 'denied both the scale and the intentionality.'"}, {"text": "The intentionality question: whether the famine was deliberately targeted at Ukrainians as a national group or was an unintended result of collectivization policy applied across the USSR.", "isCorrect": true, "rationale": "The section explicitly describes the debate as centering on intentionality: Ukrainian scholars and many governments classify the Holodomor as genocide; Soviet and Russian historiography 'historically denied both the scale and the intentionality.' The UN Genocide Convention requires deliberate intent to destroy a group — whether the Soviet state specifically intended to destroy Ukrainians as a group is the contested question."}, {"text": "The perpetrator question: historians disagree about whether Stalin personally ordered the famine or whether local officials implemented grain seizures independently.", "isCorrect": false, "rationale": "While questions of individual responsibility are relevant to genocide trials, the section's framing of the Holodomor debate centers on intentionality toward Ukrainians as a group — whether the policy was deliberately designed to destroy them — rather than on whether Stalin personally issued specific orders vs. delegating to local officials."}, {"text": "The victim group question: whether Ukrainians qualify as a distinct national/ethnic group under the Genocide Convention's definition.", "isCorrect": false, "rationale": "The section does not identify the definition of Ukrainians as a group as the contested element. The debate as described centers on the intentionality of the Soviet policy — whether the famine was a deliberate act of destruction aimed at Ukrainians — not on whether Ukrainians constitute a definable group."}], "id": "q04"}, {"question": "Stalin's Great Terror of 1936–1938 is noted in the section for targeting not enemies of the revolution but 'former allies.' What was the most significant military consequence of this?", "options": [{"text": "It destroyed the Red Army's experienced leadership, leaving the Soviet Union militarily unprepared when Germany invaded in 1941.", "isCorrect": true, "rationale": "The source is explicit: 'The military was particularly devastated: three of five marshals, thirteen of fifteen army commanders, and fifty of fifty-seven corps commanders were shot. The destruction of experienced military leadership would prove catastrophic when Germany invaded in 1941.'"}, {"text": "It eliminated the Communist Party's civilian leadership, creating a power vacuum that allowed Germany to negotiate the Molotov-Ribbentrop Pact more easily.", "isCorrect": false, "rationale": "The Great Terror targeted military commanders alongside Bolshevik political leaders, but the primary consequence the section identifies is military incapacitation — not a power vacuum enabling diplomacy. The Molotov-Ribbentrop Pact (1939) was a Soviet strategic choice, not a product of political weakness."}, {"text": "It revealed to Western powers that the Soviet Union was too weak to serve as a reliable partner against Germany, accelerating Western appeasement of Hitler.", "isCorrect": false, "rationale": "While Western distrust of the Soviet Union contributed to appeasement logic, the section attributes appeasement primarily to Western unpreparedness for war and trauma from WWI, not specifically to knowledge of the Great Terror's military impact. The causal link is too direct as stated."}, {"text": "It caused a general strike by Soviet industrial workers who refused to produce weapons for a state that had murdered their union leaders.", "isCorrect": false, "rationale": "No such general strike is described in the section. The Great Terror suppressed all dissent; a general strike would have been impossible in the context described. This option invents a consequence not supported by the source."}], "id": "q05"}, {"question": "The Munich Conference of September 1938 is cited as the defining example of appeasement. Which of the following best evaluates the policy of appeasement in its historical context?", "options": [{"text": "Appeasement was simply cowardly and naive: British and French leaders failed to recognize that Hitler could not be satisfied with limited territorial gains.", "isCorrect": false, "rationale": "The section explicitly cautions against this retrospective condemnation: 'The historical reality is more complex.' Appeasement reflected genuine military unpreparedness, deep public trauma from WWI, and the isolation of the Soviet Union by Western anti-communism. Reducing it to cowardice or naivety misses the structural constraints on British and French decision-making."}, {"text": "Appeasement was the correct policy because Germany had legitimate grievances from Versailles, and concessions were the appropriate response to injustice.", "isCorrect": false, "rationale": "The section does not endorse appeasement as correct. Hitler occupied the remainder of Czechoslovakia six months after Munich, 'demonstrating that appeasement had not satisfied his ambitions.' The section ultimately shows appeasement failed, even while acknowledging the complex context in which it was practiced."}, {"text": "Appeasement reflected genuine military unpreparedness, public trauma from WWI, and Soviet isolation from Western collective security — but it failed because it could not satisfy Hitler's expansionist ambitions.", "isCorrect": true, "rationale": "The section explicitly describes the complex context: Britain and France 'were genuinely unprepared for war in 1938, their militaries only beginning rearmament programs'; 'their populations were deeply traumatized by the memory of 1914–1918'; and the Soviet Union 'was isolated by Western distrust of communism.' Yet appeasement failed: 'Six months later, Hitler occupied the remainder of Czechoslovakia.'"}, {"text": "Appeasement was a deliberate strategy to redirect Hitler's aggression eastward toward the Soviet Union, thus allowing a German-Soviet war to weaken both powers simultaneously.", "isCorrect": false, "rationale": "While some historians argue an eastern-redirection motive existed, the section does not present this as the primary explanation. It emphasizes military unpreparedness and war trauma as the main factors. Presenting the eastern-redirection theory as the primary explanation overstates a contested historical argument."}], "id": "q06"}, {"question": "Which of the following correctly identifies both a similarity and a difference between Hitler's rise to power in Germany and Mussolini's rise in Italy?", "options": [{"text": "Similarity: Both exploited economic crises and fears of communist revolution. Difference: Mussolini came to power through military coup in 1922; Hitler was legally appointed Chancellor in 1933 before consolidating dictatorship through the Enabling Act.", "isCorrect": true, "rationale": "Both Mussolini (1922) and Hitler (1933) rose in contexts of economic instability and widespread fear of communist revolution. The section notes Hitler was 'appointed Chancellor of Germany on 30 January 1933 and within months had converted the chancellorship into a dictatorship through the Enabling Act.' Mussolini's 1922 march on Rome was a more coercive seizure; Hitler's initial power was legally conferred. The distinction between fascism's legal vs. coercive arrival matters for AP analysis."}, {"text": "Similarity: Both came to power through democratic elections in which their parties won parliamentary majorities. Difference: Mussolini established a republic while Hitler established a monarchy.", "isCorrect": false, "rationale": "Neither Mussolini nor Hitler came to power through a democratic majority. The Nazis never won a parliamentary majority before Hitler's appointment. Neither established a monarchy — both created fascist dictatorships with no monarchical framework (though Mussolini operated alongside the Italian king until 1943)."}, {"text": "Similarity: Both governments maintained free-market capitalist economies without any state intervention. Difference: Mussolini allowed political opposition parties while Hitler did not.", "isCorrect": false, "rationale": "Fascism involves state control of the economy within a nominally private-property framework — not free-market capitalism. And both regimes suppressed political opposition; Mussolini did not allow meaningful opposition parties after his consolidation of power."}, {"text": "Similarity: Both were socialist movements that gradually moved rightward after gaining power. Difference: Mussolini maintained Jewish civil rights while Hitler immediately stripped them.", "isCorrect": false, "rationale": "Fascism was explicitly anti-socialist from its inception — it 'rejected Marxist class struggle.' And Mussolini did not maintain Jewish civil rights throughout his rule; Italian racial laws were enacted in 1938. These characterizations are historically inaccurate."}], "id": "q07"}, {"question": "The 'stab-in-the-back' myth (Dolchstoßlegende) is mentioned in the section as a burden the Weimar Republic carried. What was this myth and why was it politically significant?", "options": [{"text": "The myth that German Jewish bankers had funded both sides of WWI, which the Weimar government failed to refute, allowing anti-Semitic propaganda to flourish.", "isCorrect": false, "rationale": "While anti-Semitism was associated with the stab-in-the-back myth, the section defines it specifically as 'the false claim that Germany had been betrayed rather than defeated in 1918.' Its significance was undermining the Weimar Republic's legitimacy, not primarily as a vehicle for anti-Semitic financial conspiracy theories (though these were often linked)."}, {"text": "The false claim that Germany had been betrayed rather than militarily defeated in 1918, which delegitimized the Weimar Republic by associating it with national humiliation and treachery.", "isCorrect": true, "rationale": "The section defines the stab-in-the-back myth exactly this way: 'the false claim that Germany had been betrayed rather than defeated in 1918.' It was politically significant because it delegitimized the Weimar Republic — which had signed the armistice — by associating its founders with national betrayal rather than an accepted military defeat."}, {"text": "The Nazi claim that the Versailles Treaty had been negotiated by treasonous German diplomats who gave away territories that should have remained German.", "isCorrect": false, "rationale": "While Versailles resentment was real, the stab-in-the-back myth specifically targeted the armistice of 1918 (the claim that Germany had not been defeated militarily but betrayed by internal enemies), not the diplomatic negotiation of Versailles itself."}, {"text": "The Allied accusation, embedded in Article 231, that Germany had betrayed international law by attacking neutral Belgium.", "isCorrect": false, "rationale": "Article 231 is the war guilt clause — a real treaty provision imposed by the Allies. The stab-in-the-back myth was a German nationalist narrative, not an Allied accusation. This option conflates two distinct documents and their origins."}], "id": "q08"}, {"question": "The Five-Year Plans (beginning 1928) achieved genuine industrialization in the Soviet Union. What important qualification does the section attach to this achievement?", "options": [{"text": "The industrial growth was illusory because Soviet statistics were falsified to conceal the actual low production figures.", "isCorrect": false, "rationale": "The section does not dispute the reality of Soviet industrial growth — it states that 'Soviet steel, coal, and electricity production grew dramatically through the 1930s' and that 'this industrial capacity would prove essential to Soviet survival in World War II.' The issue was not falsified statistics but the human cost."}, {"text": "Soviet industrial growth depended on forced labor of political prisoners in gulag camps, dangerous working conditions, and the suppression of all independent economic life — achieved at staggering human cost.", "isCorrect": true, "rationale": "The source is explicit: 'the human cost was staggering: millions of workers in dangerous conditions, labor camps staffed by political prisoners whose forced labor subsidized the industrial program, and the suppression of any independent economic life.' Genuine industrialization and staggering human cost are both true simultaneously — the qualification is essential for AP-level analysis."}, {"text": "Soviet industrialization ultimately failed because the forced collectivization that funded it destroyed agricultural output, creating permanent food insecurity.", "isCorrect": false, "rationale": "The section does not claim the Five-Year Plans ultimately failed. Despite collectivization's agricultural devastation, Soviet industrial capacity grew dramatically and proved essential in WWII. The qualification is about human cost, not ultimate failure."}, {"text": "The industrial growth was limited to military industries and failed to produce consumer goods, creating widespread popular resentment of the Soviet government.", "isCorrect": false, "rationale": "While Soviet industrialization did prioritize heavy industry, the section does not frame the qualification in terms of consumer goods deprivation. The qualification it emphasizes is the human cost — forced labor, dangerous conditions, political terror — not the sectoral imbalance of production."}], "id": "q09"}, {"question": "Germany invaded Poland on 1 September 1939. What does the section identify as the primary reason Britain and France were unable to prevent this outcome through diplomacy or deterrence?", "options": [{"text": "Britain and France had secretly agreed not to defend Poland, choosing instead to redirect Hitler's aggression toward the Soviet Union.", "isCorrect": false, "rationale": "The section does not claim Britain and France secretly abandoned Poland. It states they 'declared war' on Germany after the invasion. The failure was diplomatic — appeasement at Munich — not a secret agreement to sacrifice Poland. Britain and France were simply too late to save Poland once they declared war."}, {"text": "The United States refused to participate in European collective security, leaving Britain and France isolated and unable to deter Germany.", "isCorrect": false, "rationale": "While US isolationism was a real factor, the section attributes Britain and France's failure to prevent war primarily to their own military unpreparedness and the failure of appeasement — not specifically to American absence from collective security arrangements."}, {"text": "Appeasement at Munich (1938) failed to satisfy Hitler's ambitions, and by the time Britain and France declared war on 1 September 1939 it was too late to save Poland.", "isCorrect": true, "rationale": "The section traces the causal chain clearly: Munich conceded the Sudetenland; Hitler then occupied the rest of Czechoslovakia; 'when Germany invaded Poland on 1 September 1939, Britain and France declared war — too late to save Poland, but no longer willing to concede.' The failure of appeasement to deter Hitler, not any single external factor, is the explanation."}, {"text": "The Soviet Union's non-aggression pact with Germany neutralized any eastern military threat to Germany, making deterrence impossible.", "isCorrect": false, "rationale": "The Molotov-Ribbentrop Pact (August 1939) is historically real and is relevant to Poland's fate. However, the section does not mention it directly as the primary explanation; it focuses on appeasement's failure and the moment when Britain and France chose war. The Soviet factor is contextually true but not the primary explanation offered in the section."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
