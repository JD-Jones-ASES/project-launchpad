<script>
var QUESTIONS = [{"question": "A historian writes: 'To frame the period 1450–1750 through a European lens — as merely the prelude to Western imperialism — is to misread history.' Which evidence BEST supports this argument specifically regarding China's role in global trade?", "options": [{"text": "The Ming dynasty built the Great Wall in its current stone-and-brick form, demonstrating enormous state capacity for large-scale construction.", "isCorrect": false, "rationale": "The Great Wall illustrates Ming state power internally but does not directly address China's global economic role or the Eurocentric framing the quote challenges."}, {"text": "Spanish silver mined in the Americas flowed across the Pacific to Manila and then into China, where the Ming tax system required silver payments — making Chinese demand one of the most powerful forces driving transoceanic trade.", "isCorrect": true, "rationale": "The source explicitly states that Chinese demand for silver 'was one of the most powerful forces driving transoceanic trade in the sixteenth and seventeenth centuries — a fact that underscores China's centrality in early modern globalization,' directly refuting a Eurocentric narrative."}, {"text": "Zheng He's voyages (1405–1433) demonstrated that China could have established maritime colonies in Africa and the Indian Ocean world had the Ming court chosen to pursue them.", "isCorrect": false, "rationale": "While this argument about counterfactual capability is interesting, the source does not make this claim. The source focuses on what actually structured trade — Chinese silver demand — not on what might have been."}, {"text": "The Qing Eight Banners system incorporated Manchu, Mongol, and Han Chinese soldiers, creating a more ethnically integrated military than any contemporary European army.", "isCorrect": false, "rationale": "The Eight Banners are described as the backbone of Qing imperial power, not as evidence of China's role in global trade — which is what the quote specifically challenges."}]}, {"question": "Zheng He led seven major naval expeditions between 1405 and 1433. After his death, the Ming court dismantled the ocean-going fleet and prohibited large-ship construction. Which explanation BEST fits the evidence presented in the source?", "options": [{"text": "The voyages were discontinued because they had achieved their diplomatic goal of bringing all Indian Ocean polities into the Chinese tributary system.", "isCorrect": false, "rationale": "The source does not claim the voyages succeeded so completely that they became unnecessary. It describes Confucian official opposition, fiscal conservatism, and northern frontier threats as the combination of causes — not diplomatic completion."}, {"text": "A combination of Confucian official hostility to maritime trade, fiscal conservatism about expensive voyages, and military pressure from Mongol threats on the northern frontier led to the fleet's dismantling.", "isCorrect": true, "rationale": "The source presents exactly these three factors as the likely causes, describing historians' ongoing debate but identifying this as the 'combination of causes' that best fits the evidence."}, {"text": "The Portuguese arrival in the Indian Ocean in the 1490s made Chinese competition too costly, so the Ming abandoned maritime ambitions to avoid conflict.", "isCorrect": false, "rationale": "Portuguese arrival in the Indian Ocean (1498) came after the voyages had already stopped (1433). The source does not mention Portuguese competition as a cause of the Ming inward turn."}, {"text": "The construction of large-ship fleets depleted China's forests and contributed to environmental crisis along the Yangtze River, forcing the state to prioritize land-based resource management.", "isCorrect": false, "rationale": "Environmental depletion is not mentioned as a cause in the source. This is a plausible historical argument but is not supported by the text provided."}]}, {"question": "The Chinese tributary system and the Ottoman millet system both served to manage subordinate or diverse peoples. Which statement identifies a key difference between the two systems?", "options": [{"text": "The tributary system was based on actual political control, while the millet system was purely symbolic.", "isCorrect": false, "rationale": "The source describes the tributary system as 'less about actual political control than about symbolic acknowledgment of a hierarchical world order.' It was the tributary system that was more symbolic, not the millet system."}, {"text": "The tributary system structured China's relationships with neighboring states through symbolic acknowledgment of Chinese supremacy and exchange of gifts and trade privileges; the millet system governed internal non-Muslim communities through communal autonomy and tax obligations.", "isCorrect": true, "rationale": "The source defines the tributary system as a diplomatic framework for foreign states performing ritual submission in exchange for trade privileges, while the millet system (from the s01 source) governed the empire's internal religious communities. These are external vs. internal management systems."}, {"text": "The tributary system required subject peoples to convert to Chinese culture, while the millet system protected cultural distinctiveness.", "isCorrect": false, "rationale": "The source explicitly states the tributary system 'was less about actual political control than about symbolic acknowledgment' — not cultural conversion. Korea, Vietnam, and Japan maintained distinct cultures while participating in the tributary system."}, {"text": "The millet system generated significant tax revenue, while the tributary system cost the Chinese state money through lavish gift-giving.", "isCorrect": false, "rationale": "While there is historical debate about the costs of the tributary trade, this comparison as stated overstates the economic angle. The source does not frame these systems primarily through revenue generation vs. expenditure."}]}, {"question": "The Manchu Qing dynasty faced the challenge of 'a numerically small ruling group governing a vast Chinese population.' Their strategy combined ethnic distinction with Confucian accommodation. Which pairing BEST illustrates these two sides of the strategy?", "options": [{"text": "Ethnic distinction: adopting the Chinese civil service examination. Confucian accommodation: requiring Han men to wear the queue hairstyle.", "isCorrect": false, "rationale": "These are reversed. The queue requirement was a mark of Han submission to Manchu rule (ethnic distinction enforced on Han subjects), while adopting the civil service examination was accommodation to Chinese cultural norms."}, {"text": "Ethnic distinction: requiring Han men to wear the queue (shaved forehead, long braid) on pain of death; segregating Manchus and Han in cities and the military. Confucian accommodation: retaining Ming bureaucratic structures, patronizing Chinese art, presenting emperors as Sons of Heaven.", "isCorrect": true, "rationale": "The source explicitly describes the queue requirement and military segregation as ethnic distinction measures, and the retention of Confucian institutions and artistic patronage as the accommodation side of the dual strategy."}, {"text": "Ethnic distinction: prohibiting Buddhism among Han Chinese. Confucian accommodation: allowing Manchus to practice shamanic rituals privately.", "isCorrect": false, "rationale": "The source does not describe a prohibition on Buddhism among Han Chinese. In fact, the Qing emperors patronized Buddhism to win Mongolian and Tibetan loyalty — Buddhism was a tool of accommodation, not restriction."}, {"text": "Ethnic distinction: replacing Confucian examinations with Manchu language tests. Confucian accommodation: permitting Han Chinese to serve in the Eight Banners.", "isCorrect": false, "rationale": "The Qing adopted, not replaced, the Confucian examination system. The Eight Banners segregated Manchu, Mongol, and Han Chinese soldiers — it was a system of ethnic military organization, not an accommodation of Han inclusion."}]}, {"question": "A student claims: 'The Kangxi Emperor's engagement with Jesuit missionaries shows that the Qing were becoming Westernized and open to European cultural influence.' Which response BEST critiques this interpretation using evidence from the source?", "options": [{"text": "The Kangxi Emperor was too busy with military campaigns to engage seriously with Jesuit intellectual ideas.", "isCorrect": false, "rationale": "The source states the Kangxi Emperor 'engaged directly with Jesuit missionaries at court, learning mathematics and Western science' — direct intellectual engagement occurred, making this critique incorrect."}, {"text": "While Kangxi learned mathematics and Western science from Jesuits, he ultimately rejected Christianity as incompatible with Confucian ritual — demonstrating selective engagement, not Westernization.", "isCorrect": true, "rationale": "The source explicitly states Kangxi 'engaged directly with Jesuit missionaries at court, learning mathematics and Western science while ultimately rejecting Christianity as incompatible with Confucian ritual.' This is selective utility, not cultural absorption."}, {"text": "The Jesuits at the Qing court were not intellectuals but merchants seeking trade concessions, so their influence was commercial rather than cultural.", "isCorrect": false, "rationale": "The source describes the Kangxi Emperor engaging with Jesuit missionaries in mathematics and Western science — an intellectual relationship, not a commercial one."}, {"text": "Kangxi's reign preceded European contact with East Asia, so his engagement with Jesuits was not possible.", "isCorrect": false, "rationale": "The Jesuits had been active in China since the late sixteenth century. The Treaty of Nerchinsk (1689) itself was with Russia — a European power — demonstrating active cross-cultural contact during Kangxi's reign."}]}, {"question": "Read the following scenario: In 1757, the Qing government restricts European merchants to trading only in the port city of Guangzhou (the Canton System). A European observer criticizes this as evidence of Chinese 'arrogance and weakness.' How would the source's interpretation challenge this characterization?", "options": [{"text": "The Canton System reflected genuine Chinese military weakness — the Qing could not defend multiple ports from European naval power.", "isCorrect": false, "rationale": "The source makes the opposite argument: the trade restrictions reflected the policy of a state 'confident in its own self-sufficiency,' not weakness. The Qing military was formidable throughout this period."}, {"text": "The Canton System was a European invention imposed on the Qing, not a Chinese policy choice.", "isCorrect": false, "rationale": "The source describes the Canton System as a Chinese state policy — a 'deliberate policy of a state confident in its own self-sufficiency' — not something imposed by European powers."}, {"text": "The Canton System and the earlier Ming maritime withdrawal reflected a consistent Chinese state priority — political stability and Confucian social hierarchy over commercial expansion — that was rational given the circumstances, even if costly in the long run.", "isCorrect": true, "rationale": "The source explicitly states these restrictions 'reflected the deliberate policy of a state confident in its own self-sufficiency — a confidence that proved costly in the nineteenth century but was entirely rational given the circumstances of the seventeenth and eighteenth centuries.'"}, {"text": "The Canton System was temporary and was quickly reversed after European diplomatic pressure demonstrated the economic benefits of open trade.", "isCorrect": false, "rationale": "The source does not describe a quick reversal. It describes the Canton System as part of a consistent pattern of Chinese prioritization of stability, which persisted until the pressures of the nineteenth century."}]}, {"question": "The Qing Empire's expansion into Xinjiang (1759), Tibet, and Outer Mongolia was driven by which combination of factors?", "options": [{"text": "The desire to convert Central Asian Muslim and Buddhist populations to Confucianism, and to establish maritime trade routes through Central Asia.", "isCorrect": false, "rationale": "The Qing did not attempt to convert Central Asian populations to Confucianism — they instead patronized Buddhism for Mongolian and Tibetan subjects. Central Asia is landlocked; maritime trade routes are not relevant here."}, {"text": "Strategic calculation about controlling steppe nomads who had historically threatened northern China, combined with the Qing's Manchu identity as Inner Asian rulers comfortable with frontier warfare.", "isCorrect": true, "rationale": "The source states Qing expansion 'was driven by a combination of strategic calculation — the need to control steppe nomads who had historically threatened northern China — and the Qing's Manchu identity as Inner Asian rulers comfortable with frontier warfare.'"}, {"text": "Economic necessity: Central Asia contained silver deposits that the Qing needed to fund the civil service examination system and maintain provincial bureaucracies.", "isCorrect": false, "rationale": "The source does not link Central Asian expansion to silver extraction. The silver connection in this period runs from the Americas through the Pacific to China, not from Central Asia."}, {"text": "The Qing expanded to preempt Russian expansion into East Asia, following the model established by the Treaty of Nerchinsk.", "isCorrect": false, "rationale": "The Treaty of Nerchinsk (1689) halted Russian expansion into Manchuria. While Russia was a factor in Qing diplomacy, the source specifically attributes Central Asian expansion to nomad-threat control and Manchu frontier identity, not preemptive anti-Russian strategy."}]}, {"question": "The Ming dynasty converted its tax system to silver payments in the sixteenth century. Which global consequence MOST directly resulted from this policy, according to the source?", "options": [{"text": "European merchants flooded into China seeking to sell manufactured goods, triggering a balance-of-trade crisis that weakened Ming finances.", "isCorrect": false, "rationale": "The source does not describe a manufactured-goods trade flooding China. The flow was the reverse: silver flowed into China in exchange for Chinese goods; China maintained a trade surplus, not deficit."}, {"text": "Chinese demand for silver became a primary driver of transoceanic trade, pulling Spanish silver from the Americas across the Pacific to Manila and then into China.", "isCorrect": true, "rationale": "The source explicitly traces this connection: 'Spanish silver mined in the Americas flowed across the Pacific to Manila and then into China, where the Ming government had converted its tax system to silver payments. This demand for silver was one of the most powerful forces driving transoceanic trade.'"}, {"text": "The Ming abandoned the tribute system because silver payments were incompatible with the ceremonial gift-exchange logic of tributary diplomacy.", "isCorrect": false, "rationale": "The source does not connect the silver tax reform to the abandonment of the tribute system. The two are discussed separately; the tribute system ended due to different political decisions."}, {"text": "The Ming tax reform caused inflation in Europe, since so much American silver left European markets and flowed east toward China.", "isCorrect": false, "rationale": "While this is a legitimate historical argument about the global silver flow's inflationary effects in Europe (sometimes called the 'Price Revolution'), the source does not make this specific causal claim."}]}, {"question": "Which concept BEST describes the Kangxi Emperor's practice of presenting himself as a Confucian scholar in Beijing, a Buddhist patron for Tibetan and Mongolian subjects, and a Manchu warrior-hunter in his northeastern homeland?", "options": [{"text": "Syncretism — the blending of all three traditions into a unified personal philosophy similar to Akbar's Din-i-Ilahi.", "isCorrect": false, "rationale": "Kangxi's approach was not syncretism (blending) but rather contextual identity performance — maintaining distinct identities for distinct audiences rather than fusing them into one. The source describes it as performing 'different cultural identities for different audiences.'"}, {"text": "Strategic cultural performance — deploying different legitimizing identities for different subject populations to maximize loyalty across the diverse Qing Empire.", "isCorrect": true, "rationale": "The source explicitly describes Qing emperors as 'masters of performing different cultural identities for different audiences' — a deliberate political strategy of contextual legitimacy, not genuine syncretism or conversion."}, {"text": "Coercive assimilation — forcing Tibetan, Mongolian, and Han Chinese subjects to adopt Manchu cultural norms in each region.", "isCorrect": false, "rationale": "The Qing strategy was the opposite of coercive assimilation across all subjects: they maintained distinct presentations for distinct audiences rather than imposing a single Manchu identity everywhere."}, {"text": "Tributary diplomacy — using ritual exchange and symbolic subordination to manage relationships with Tibet, Mongolia, and the Han heartland.", "isCorrect": false, "rationale": "The tributary system governed external foreign states, not internal subject populations like Han Chinese, Tibetans, and Mongolians who were incorporated into the Qing Empire itself."}]}, {"question": "Which SPICE-T connection BEST links the Ming decision to abandon maritime expansion and the Qing Canton System trade restrictions?", "options": [{"text": "Technology — both decisions reflect China's technological inability to compete with European innovations in shipbuilding and navigation after the fifteenth century.", "isCorrect": false, "rationale": "The source makes the opposite argument: these were deliberate policy choices by a state 'confident in its own self-sufficiency,' not evidence of technological inferiority. Zheng He's ships were the largest wooden vessels ever built."}, {"text": "Political — both decisions reflect a consistent Chinese state priority of political stability and Confucian social hierarchy over commercial expansion, expressing the judgment that long-distance maritime trade posed social and fiscal risks not worth the gains.", "isCorrect": true, "rationale": "The source's SPICE-T Connection section explicitly states: 'The Ming decision to abandon maritime expansion and the Qing's later trade restrictions reflect a consistent Chinese state priority: political stability and Confucian social hierarchy over commercial expansion.'"}, {"text": "Economic — both decisions reflect China's self-sufficient domestic economy, which generated enough internal demand that foreign trade was unnecessary for prosperity.", "isCorrect": false, "rationale": "While Chinese self-sufficiency is invoked, the source attributes the decisions to political priorities (stability, Confucian hierarchy) rather than purely economic self-sufficiency. The silver trade shows China was deeply integrated in global networks despite restrictions."}, {"text": "Interaction with Environment — both decisions were responses to deforestation caused by large-scale timber demand for ship construction.", "isCorrect": false, "rationale": "The source does not mention deforestation or timber resources as factors in either decision. This environmental explanation, while historically discussed by some scholars, is not supported by the text."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
