    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_World.html">&larr; Back to AP World History: Modern</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP World History: Modern &mdash; Dar al-Islam from the Abbasids to the Delhi Sultanate</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A student claims: 'Dar al-Islam maintained cultural and political unity because it was governed by a single, powerful empire centered in Baghdad.' Which of the following best refutes this claim using evidence from the source?", "options": [{"text": "The Abbasid caliphs were militarily powerful throughout the period 1200–1450 and kept regional sultans in check.", "isCorrect": false, "rationale": "This misrepresents the source, which explicitly states that Abbasid political power was 'hollow' by 1200 and that real power had shifted to regional sultans long before."}, {"text": "Dar al-Islam maintained coherence not through political unity but through shared institutions — Arabic scholarship, the ulama-madrasa network, the Hajj, and Sufi brotherhoods — that transcended any single dynasty.", "isCorrect": true, "rationale": "The source directly states that 'shared institutions, not any single empire, were the glue of the Islamic world,' listing Arabic as a lingua franca, the ulama-madrasa network, the Hajj, and Sufi orders as the actual mechanisms of coherence."}, {"text": "The Crusader states that carved into the Levant actually served to unite Muslim rulers against a common enemy, creating effective political unity.", "isCorrect": false, "rationale": "While the Crusades created some pressure toward Muslim unity, the source presents them as evidence of fragmentation and political challenge, not as the mechanism of Dar al-Islam's cohesion."}, {"text": "The Seljuk Turks replaced the Abbasids in Baghdad and immediately established a centralized Islamic empire.", "isCorrect": false, "rationale": "The Seljuks 'governed in the caliph's name as sultans' but did not create a centralized empire — they were one of many regional powers in a politically fragmented Islamic world."}]}, {"question": "The House of Wisdom (Bayt al-Hikma) in Baghdad brought together scholars from Arab, Persian, Greek, Indian, and Jewish backgrounds. Which historical significance does the source most directly attribute to this institution?", "options": [{"text": "It produced the first Arabic-language translation of the Qur'an, standardizing Islamic religious practice across Dar al-Islam.", "isCorrect": false, "rationale": "The Qur'an was already in Arabic; the House of Wisdom's translations involved Greek, Indian, and other non-Islamic texts into Arabic — religious standardization is not its attributed significance."}, {"text": "Its translations of Greek, Indian, and other classical works into Arabic preserved and extended knowledge in mathematics, astronomy, optics, and medicine, and those works later triggered the European Scholastic revolution when recovered from Islamic Spain.", "isCorrect": true, "rationale": "The source explicitly credits the House of Wisdom with translations that were later 'recovered from Islamic Spain and Sicily' and 'triggered the Scholastic revolution that transformed European universities.'"}, {"text": "It served as the political council of the Abbasid caliph, advising on military strategy against the Seljuk Turks.", "isCorrect": false, "rationale": "The source describes the House of Wisdom as a 'translation and research institution,' not a political advisory council; its significance is intellectual, not military."}, {"text": "It produced the first accurate world maps, enabling Abbasid merchants to dominate Indian Ocean trade routes.", "isCorrect": false, "rationale": "The source attributes cartographic and navigational advances to Islamic scholarship broadly, but does not specifically credit the House of Wisdom with world maps or Indian Ocean trade dominance."}]}, {"question": "Read the following scenario: A Muslim merchant travels from Cairo to Samarkand in the thirteenth century. Despite the political turmoil caused by Mongol invasions, he can rely on a common legal framework for commercial transactions, find educated judges to hear disputes, and access schools using a shared curriculum. Which of the following concepts from the source best explains how this was possible?", "options": [{"text": "The Abbasid caliphate maintained direct political control over trade routes across the Islamic world.", "isCorrect": false, "rationale": "By the thirteenth century the Abbasid caliphate was politically hollow; direct political control of trade routes did not exist, yet the merchant's experience was still possible through other institutions."}, {"text": "The institutional portability of Islamic civilization — the ulama, sharia, and madrasa network — provided consistent legal and educational frameworks that functioned under almost any regime.", "isCorrect": true, "rationale": "The source explicitly states that madrasa graduates 'shared a curriculum with counterparts in Samarkand or Timbuktu' and that ulama 'could function under almost any regime' because their authority derived from Quranic scholarship, not political appointment."}, {"text": "Sufi brotherhoods had established political control over the Silk Road, guaranteeing safe passage for all Muslim merchants.", "isCorrect": false, "rationale": "Sufi brotherhoods provided spiritual networks and missionary outreach, not political control of trade routes; the source does not describe them as guaranteeing commercial safety."}, {"text": "The Mongol conquests paradoxically unified the Islamic world by destroying competing regional powers and establishing a single Pax Mongolica.", "isCorrect": false, "rationale": "The source describes the Mongols as devastating Dar al-Islam (destroying Baghdad in 1258), not unifying it; the merchant's reliable experience predated and operated despite, not because of, Mongol conquest."}]}, {"question": "The Delhi Sultanate's treatment of Hindus as dhimmis (protected peoples) is described as 'more complex' than simple conquest and religious replacement. Which of the following best illustrates this complexity?", "options": [{"text": "The Sultans converted all Hindus to Islam through forced mass conversion ceremonies.", "isCorrect": false, "rationale": "The source explicitly states Hindus were classified as dhimmis who 'permitted practice of their religion in exchange for a poll tax' — forced mass conversion is not described."}, {"text": "Hindu administrators staffed much of the bureaucracy, Hindu merchants dominated internal trade, and cultural exchange produced syncretism in art, architecture, and devotional music.", "isCorrect": true, "rationale": "The source directly identifies these three elements — Hindu administrators, Hindu merchants, and cultural syncretism (including the Qutb Minar architecture combining Persian and Indian styles) — as evidence of the relationship's complexity beyond simple conquest."}, {"text": "The Sultans abolished the jizya poll tax and granted Hindus full legal equality with Muslims to encourage loyalty.", "isCorrect": false, "rationale": "The source describes the jizya as the condition under which dhimmis practiced their religion; it was not abolished — rather, the actual relationship was more complex than the formal legal structure suggests."}, {"text": "Hindu armies were integrated into the Delhi Sultanate's military on equal terms with Muslim troops from Turkic Central Asia.", "isCorrect": false, "rationale": "While Hindu administrators participated in government, the source does not describe equal military integration — it focuses on administrative, commercial, and cultural spheres."}]}, {"question": "According to the source, why were Sufi missionaries 'extraordinarily effective at spreading Islam to new regions' compared to legal scholars?", "options": [{"text": "Sufis commanded military forces that conquered sub-Saharan Africa, Central Asia, and Southeast Asia in the name of Dar al-Islam.", "isCorrect": false, "rationale": "The source contrasts Sufi effectiveness with military conquest — Sufis spread Islam 'precisely because they engaged local spiritual traditions rather than imposing a rigid external code,' not through force."}, {"text": "They engaged local spiritual traditions rather than imposing a rigid external code, creating a syncretic popular Islam compatible with local practices.", "isCorrect": true, "rationale": "The source explicitly attributes Sufi missionary success to their approach of engaging 'local spiritual traditions rather than imposing a rigid external code,' with veneration of Sufi saints at local shrines creating 'syncretic popular Islam.'"}, {"text": "They operated under direct orders from the Abbasid caliph, who delegated missionary authority to Sufi orders across the Islamic world.", "isCorrect": false, "rationale": "Sufi orders operated independently through charismatic teachers and brotherhoods (tariqa), not under caliphal command; by 1200 the Abbasid caliph had little real political authority."}, {"text": "The Sufi legal tradition was simpler than sharia, making conversion easier for populations unfamiliar with complex Islamic law.", "isCorrect": false, "rationale": "Sufism was a mystical devotional tradition, not a simplified legal code; its effectiveness came from personal spiritual relationships and cultural accommodation, not from replacing sharia with something simpler."}]}, {"question": "The source states that the Abbasid court's 'cosmopolitan patronage of knowledge — regardless of the scholar's religion or ethnic origin — modeled an intellectual culture that had no precise parallel in contemporary Europe.' This claim most directly supports which broader AP World History argument?", "options": [{"text": "Islamic civilization was superior to all other civilizations of the period 1200–1450.", "isCorrect": false, "rationale": "The source makes a specific comparative claim about intellectual culture during the Abbasid period, not a general civilizational superiority argument — AP World History emphasizes contextualized comparison, not ranking."}, {"text": "The Dar al-Islam fostered cross-cultural intellectual exchange at a scale unmatched by European institutions of the same era, challenging Eurocentric narratives of intellectual progress.", "isCorrect": true, "rationale": "The source explicitly uses the Abbasid court as evidence against a Eurocentric framing — the cosmopolitan, multiethnic, multireligious intellectual environment at Baghdad 'had no precise parallel in contemporary Europe,' directly challenging the assumption that Europe was the center of medieval intellectual life."}, {"text": "European universities developed independently of Islamic scholarship and owed nothing to Arabic translations of Greek texts.", "isCorrect": false, "rationale": "The source argues precisely the opposite — that the works of Aristotle 'triggered the Scholastic revolution' in Europe specifically after being 'recovered from Islamic Spain and Sicily' in Arabic translations."}, {"text": "The Abbasid House of Wisdom produced exclusively Islamic religious scholarship, with no contributions to secular fields.", "isCorrect": false, "rationale": "The source specifically credits the House of Wisdom with advances in mathematics (algebra, algorithms), astronomy, optics, and medicine — fields beyond Islamic religious scholarship."}]}, {"question": "Sharia, as defined in the source, governed which of the following areas of life in the Islamic world?", "options": [{"text": "Only religious ritual practice, such as prayer, fasting, and pilgrimage obligations.", "isCorrect": false, "rationale": "The source explicitly states sharia governed 'not only ritual practice but also family law, inheritance, commercial transactions, and criminal penalties' — it was far broader than ritual alone."}, {"text": "Religious ritual, family law, inheritance, commercial transactions, and criminal penalties — interpreted by ulama through the four Sunni legal schools.", "isCorrect": true, "rationale": "The source's definition of sharia explicitly lists all these domains and notes that interpretation was carried out by the ulama through 'different legal schools (Hanafi, Maliki, Shafi'i, Hanbali).'"}, {"text": "Only the territories directly governed by the Abbasid caliphate in Baghdad.", "isCorrect": false, "rationale": "Sharia applied across Dar al-Islam through the portable ulama-madrasa network, not only in caliphal-controlled territory; its authority derived from scholarship, not political control."}, {"text": "Military law governing jihad, with civilian matters left to local customary practices.", "isCorrect": false, "rationale": "The source presents sharia as a comprehensive legal system covering civilian life — family, commerce, inheritance, and criminal matters — not only military law."}]}, {"question": "Under Sultan Alauddin Khalji (r. 1296–1316), the Delhi Sultanate successfully repelled Mongol invasions. The source identifies this as historically significant primarily because:", "options": [{"text": "It demonstrated that the Delhi Sultanate had adopted Mongol military techniques superior to those of any other Islamic state.", "isCorrect": false, "rationale": "The source does not attribute Delhi's success to Mongol-derived techniques; the significance is about what preservation meant for Islamic institutions, not the military methods used."}, {"text": "It preserved Islamic institutions in South Asia at a moment when they were being destroyed or transformed by the Mongols elsewhere, including the destruction of Baghdad in 1258.", "isCorrect": true, "rationale": "The source explicitly states Delhi's resistance 'preserved Islamic institutions in South Asia at a moment when they were being extinguished or transformed elsewhere,' directly linking it to the fall of Baghdad in 1258."}, {"text": "It allowed the Delhi Sultanate to expand its territory north into Central Asia, replacing the Mongol Empire as the dominant power in the region.", "isCorrect": false, "rationale": "The source describes Delhi repelling invasions, not expanding northward; territorial expansion into Central Asia is not the claimed significance."}, {"text": "It forced the Mongol rulers to convert to Islam and integrate into Dar al-Islam, strengthening the political unity of the Islamic world.", "isCorrect": false, "rationale": "While some later Mongol rulers did convert to Islam (a separate historical development), the source's claim is specifically about preservation of Islamic institutions in South Asia during the crisis of Mongol devastation elsewhere."}]}, {"question": "The Seljuk Turks 'brought Turkic military organization and governance practices into the Islamic world.' The source identifies this as part of a broader pattern. Which of the following best describes that pattern?", "options": [{"text": "Central Asian migrants consistently destroyed Islamic civilization wherever they conquered.", "isCorrect": false, "rationale": "The Seljuks 'governed in the caliph's name' and maintained Islamic institutions while adding Turkic practices — disruption coexisted with institutional continuity; the Mongols' destruction of Baghdad was a more extreme case."}, {"text": "Successive waves of Turkic and Mongol migrants transformed the political landscape of Dar al-Islam while Islamic institutions maintained coherence through shared non-political frameworks.", "isCorrect": true, "rationale": "The source describes Turkic and Mongol migration as a recurring 'pattern' — Seljuks in 1055, then 'successive waves' — but notes that ulama, sharia, madrasas, and the Hajj maintained coherence across these political disruptions."}, {"text": "Turkic rulers were universally hostile to Islamic learning and shut down institutions like the House of Wisdom.", "isCorrect": false, "rationale": "The Seljuks patronized Islamic institutions and governed in the caliph's name; the destruction of the House of Wisdom came from the Mongols in 1258, not the Seljuks."}, {"text": "Turkic migration weakened Islam so severely that Dar al-Islam's population converted to Buddhism under Central Asian influence.", "isCorrect": false, "rationale": "There is no such mass conversion described; many Turkic rulers adopted Islam themselves, and the religion expanded despite political disruption."}]}, {"question": "The Qutb Minar minaret in Delhi 'combined Persian Islamic decorative vocabulary with Indian stonework techniques.' This architectural detail best illustrates which broader historical concept?", "options": [{"text": "Cultural imperialism: the complete replacement of Indian cultural traditions by Islamic ones under the Delhi Sultanate.", "isCorrect": false, "rationale": "The source describes synthesis, not replacement — the minaret combines Persian and Indian elements, illustrating cross-cultural encounter rather than the elimination of one tradition by another."}, {"text": "Syncretism: the blending of Islamic and Indian artistic traditions in a material record of cross-cultural encounter under the Delhi Sultanate.", "isCorrect": true, "rationale": "The source uses the Qutb Minar specifically as 'a material record of cross-cultural encounter' — the combination of Persian Islamic decoration and Indian stonework is a physical example of cultural synthesis under the Sultanate."}, {"text": "Resistance: Indian craftsmen deliberately undermined Islamic architectural ambitions by incorporating Hindu motifs.", "isCorrect": false, "rationale": "The source presents the combination as cross-cultural exchange and encounter, not as deliberate resistance or sabotage by Indian craftspeople."}, {"text": "Isolation: the Delhi Sultanate developed an entirely original architectural style with no connections to the broader Islamic world.", "isCorrect": false, "rationale": "The minaret's Persian Islamic decorative vocabulary demonstrates direct connection to the broader Islamic architectural tradition — it was not an isolated, original development."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
