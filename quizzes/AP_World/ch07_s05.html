<script>
var QUESTIONS = [{"question": "Which of the following best explains why historians consider the Eastern Front (Soviet-German war) the decisive theater of World War II in Europe?", "options": [{"text": "Because the Allied D-Day landings in Normandy (June 1944) opened the decisive western campaign that drove Germany to surrender.", "isCorrect": false, "rationale": "The section explicitly argues the opposite: 'The Western Allied landings in Normandy (D-Day, 6 June 1944) opened a second front but did not determine the overall outcome, which was decided primarily on Soviet soil.' D-Day is acknowledged but explicitly positioned as secondary to the Eastern Front."}, {"text": "Because the Soviet Union suffered approximately 27 million dead and its Red Army, from Stalingrad onward, was consistently on the offensive — absorbing and destroying the majority of German military capacity.", "isCorrect": true, "rationale": "The section's argument about Eastern Front decisiveness rests on scale: 27 million Soviet dead (the largest national toll of any belligerent), the Battle of Stalingrad as the turning point, and the fact that 'from Stalingrad onward, the Red Army was consistently on the offensive.' The destruction of Germany's largest army (330,000 men at Stalingrad) was the war's pivotal event."}, {"text": "Because Germany's invasion of the Soviet Union was the first military campaign that required Germany to fight a two-front war, preventing the use of Blitzkrieg tactics.", "isCorrect": false, "rationale": "Germany was already technically fighting on multiple fronts before Barbarossa (Britain, North Africa). And Blitzkrieg was used in the initial Soviet invasion — it was 'initially successful.' The issue is not that two-front war prevented Blitzkrieg but that the Soviet Union, unlike France, did not collapse — the scale of Soviet resistance and counterattack is what made the front decisive."}, {"text": "Because the Soviet Union's conquest of Berlin in May 1945 was the diplomatic leverage that allowed the USSR to dominate the postwar peace settlement.", "isCorrect": false, "rationale": "While Soviet forces did take Berlin, the section's argument for Eastern Front decisiveness is military-historical — the destruction of Germany's military power — not diplomatic. The postwar settlement's Cold War tensions are briefly mentioned at the end of the section but are not the basis for the Eastern Front's historical significance."}]}, {"question": "Read the following account: 'My forces swept through the lowland defenses in three weeks. The enemy, organized for static defense, could not respond to our speed. By the time they understood our direction of advance, they were already encircled.' This description most closely matches which military concept?", "options": [{"text": "Attrition warfare — wearing down the enemy through sustained losses over a prolonged campaign.", "isCorrect": false, "rationale": "Attrition warfare is slow and grinding — the opposite of what is described. The account emphasizes speed, rapid encirclement, and an opponent organized for static defense that cannot respond. This is not attrition warfare."}, {"text": "Blitzkrieg — rapid coordinated attacks combining armored tanks, motorized infantry, and close air support that overwhelm defenses through speed and shock rather than frontal attrition.", "isCorrect": true, "rationale": "The description maps precisely onto the section's Blitzkrieg definition: 'rapid coordinated attacks combining armored tanks, motorized infantry, and close air support to break through enemy lines, encircle defenders, and advance faster than the enemy can reorganize a coherent defense.' The account's emphasis on speed, encirclement, and opponents 'organized for static defense' is definitional Blitzkrieg."}, {"text": "Total war — the mobilization of the entire national economy and civilian population to support military operations.", "isCorrect": false, "rationale": "Total war describes economic and social mobilization, not a battlefield tactical doctrine. The account describes operational tactics (speed, encirclement, shock), not the relationship between civilian economies and military forces."}, {"text": "Island-hopping — bypassing heavily fortified positions to capture strategically important islands.", "isCorrect": false, "rationale": "Island-hopping was the American Pacific strategy. The account describes a land campaign in what appears to be continental terrain (lowlands, encirclement maneuvers), and the emphasis on speed and shock specifically matches Blitzkrieg rather than the deliberate strategic bypassing of island-hopping."}]}, {"question": "The Nanjing Massacre (December 1937–January 1938) is cited in the section primarily to illustrate which of the following?", "options": [{"text": "That the Pacific war began earlier than Western narratives typically acknowledge, with Japan's full-scale invasion of China in 1937 killing an estimated 20 million Chinese before Pearl Harbor.", "isCorrect": true, "rationale": "The section explicitly frames the Pacific theater's origins as distinct from the European conflict: Japan had been expanding militarily since 1931, and the full-scale 1937 invasion 'killed an estimated 20 million Chinese civilians and combatants, including in the Nanjing Massacre.' Citing Nanjing places the Pacific war's horror years before Pearl Harbor (1941), correcting a Western-centered chronology."}, {"text": "That Japan's military strategy in China was motivated primarily by the desire to liberate East Asia from Western colonial domination.", "isCorrect": false, "rationale": "The section explicitly contradicts this: Japan's Greater East Asia Co-Prosperity Sphere was 'framed in anti-colonial terms' but 'in practice substituted brutal Japanese colonial control for British, Dutch, and American colonial control.' The Nanjing Massacre — 200,000–300,000 civilians killed — directly undermines the liberation framing."}, {"text": "That Chinese civilian resistance to Japanese occupation made it impossible for Japan to consolidate control of Manchuria.", "isCorrect": false, "rationale": "Japan did successfully occupy Manchuria (from 1931) and large parts of China. The Nanjing Massacre was not an example of failed Japanese consolidation — it was an atrocity committed against a captured city whose population could not resist. The section does not cite Nanjing as evidence of Chinese resistance effectiveness."}, {"text": "That the United States entered the Pacific war primarily in response to Japanese atrocities against Chinese civilians.", "isCorrect": false, "rationale": "The United States entered the Pacific war in response to the Japanese attack on Pearl Harbor (7 December 1941). While US leaders were aware of Japanese atrocities in China, the immediate trigger for US entry was Pearl Harbor, not the Nanjing Massacre four years earlier."}]}, {"question": "Japan's Greater East Asia Co-Prosperity Sphere is characterized in the section as a contradiction. What was that contradiction?", "options": [{"text": "Japan claimed the sphere would industrialize Asia but in practice kept Asian economies agrarian to serve Japanese manufacturing needs.", "isCorrect": false, "rationale": "While economic exploitation was real, the section's specific characterization of the contradiction is about anti-colonial rhetoric vs. colonial practice — not industrialization vs. agrarianism. This option misidentifies the nature of the contradiction the section describes."}, {"text": "Japan framed its expansion as Asian liberation from Western imperialism, but in practice it substituted brutal Japanese colonial control for the European and American colonial control it displaced.", "isCorrect": true, "rationale": "The section states this directly: 'The ideology of Japanese expansion was framed in anti-colonial terms — Asian liberation from Western imperialism — but in practice it substituted brutal Japanese colonial control for British, Dutch, and American colonial control, extracting resources and compelling forced labor throughout occupied territories.'"}, {"text": "Japan promised economic cooperation among Asian nations but in practice used military force to prevent Asian nations from trading with each other.", "isCorrect": false, "rationale": "The section does not characterize the Co-Prosperity Sphere's contradiction in terms of inter-Asian trade prevention. The contradiction is specifically about anti-colonial rhetoric vs. the colonial reality of resource extraction and forced labor."}, {"text": "Japan claimed to represent Buddhist cultural values in opposition to Western materialism, but in practice adopted Western industrial methods of warfare.", "isCorrect": false, "rationale": "The section does not frame the Co-Prosperity Sphere's contradiction in religious or cultural terms. The contradiction is explicitly political-colonial: liberation rhetoric vs. colonial practice."}]}, {"question": "The section argues that the Pacific war served as a 'decolonization catalyst.' What was the specific causal mechanism through which the war accelerated decolonization movements?", "options": [{"text": "Japan's defeat in 1945 created a power vacuum in Southeast Asia that allowed independence movements to fill before European powers could return.", "isCorrect": false, "rationale": "Japan's defeat and the resulting power vacuum is part of the story, but the section's KEY CONCEPT identifies a different mechanism: the permanent destruction of European colonial invincibility. 'Populations that had witnessed the Japanese routing of British forces at Singapore, Dutch forces in Java, and French administration in Indochina could not un-see what had happened.' The mechanism is psychological-political, not just a vacuum."}, {"text": "Japan's rapid defeat of European colonial powers in Southeast Asia permanently shattered the myth of European invincibility that had sustained colonial rule — populations who witnessed it could not unsee that Europeans could be defeated by non-Europeans.", "isCorrect": true, "rationale": "The section's KEY CONCEPT is explicit: Japan's victories over Britain at Singapore, the Dutch in Java, and France in Indochina 'permanently shattered the myth of European invincibility that had sustained colonial rule.' 'Even though Japan's occupation was in many respects more brutal than the European colonialism it replaced, the political lesson was irreversible: Europeans could be defeated by non-Europeans, and colonial rule was not a permanent or natural order.'"}, {"text": "The United States, as the dominant postwar power, used its influence to require European allies to grant independence to their colonies as a condition of Marshall Plan aid.", "isCorrect": false, "rationale": "The Marshall Plan is not mentioned in this section, and US pressure on European decolonization as a formal condition of postwar aid is historically overstated for this period. The section's mechanism is the destruction of European invincibility myth through Japan's victories — not American postwar policy conditions."}, {"text": "Japan's occupation governments trained and armed local independence movements throughout Southeast Asia, who then used these skills to resist European recolonization after 1945.", "isCorrect": false, "rationale": "While Japan did work with some local nationalists, the section's KEY CONCEPT focuses on the psychological-political impact of European defeats — the destruction of colonial legitimacy — not on Japanese training of independence movements. This option overstates Japanese deliberate fostering of independence movements."}]}, {"question": "The atomic bombings of Hiroshima and Nagasaki in August 1945 are described in the section as 'one of history's most genuinely contested moral questions.' Which of the following best represents the nature of that debate?", "options": [{"text": "Whether President Truman acted within his constitutional authority in ordering the use of a new weapon without congressional approval.", "isCorrect": false, "rationale": "The section does not frame the atomic bomb debate as a constitutional question about executive authority. It frames it as a moral question about the necessity of targeting civilian cities, whether alternatives existed, and whether the bombings were justified — not about the separation of powers."}, {"text": "Whether the bombings were necessary to end the war without a costly land invasion, whether alternatives existed, and whether targeting civilian cities constituted a war crime.", "isCorrect": true, "rationale": "The section enumerates exactly these questions: 'whether they were necessary to end the war without a costly land invasion, whether alternatives existed, and whether the targeting of civilian cities was a war crime.' These are the three axes of the ongoing historical and ethical debate."}, {"text": "Whether the United States had the technical capability to use nuclear weapons against Japanese military installations rather than civilian cities.", "isCorrect": false, "rationale": "The question of technical capability (could the US have targeted military installations instead?) is one possible sub-element of the 'alternatives existed' debate, but the section frames the debate more broadly — necessity, alternatives, and war crime status. Reducing the debate to technical capability misses the primary moral dimensions."}, {"text": "Whether Japan's Emperor Hirohito was primarily responsible for prolonging the war and thus should bear personal responsibility for the atomic bomb casualties.", "isCorrect": false, "rationale": "The section does not frame the atomic bomb debate around Hirohito's personal responsibility. The debate as presented centers on American decision-making — necessity, alternatives, targeting of civilians — not on Japanese leadership's culpability for the war's duration."}]}, {"question": "Operation Barbarossa (22 June 1941) is described as 'the largest military invasion in history.' Which of the following best explains why the Soviet Union, despite suffering massive early losses, ultimately did not collapse as Germany expected?", "options": [{"text": "The Soviet military's superior strategic planning prevented Germany from achieving any early successes.", "isCorrect": false, "rationale": "Germany achieved enormous early successes in Barbarossa — 'penetrating deep into Soviet territory, capturing millions of Soviet prisoners.' The Soviet military was not superior in strategic planning in 1941 (partly because the Great Terror had decimated the officer corps). The Soviet Union survived despite early disasters, not because of early strategic superiority."}, {"text": "The Soviet Union's vast territory, industrial capacity developed by the Five-Year Plans, and willingness to absorb catastrophic losses ultimately prevented the quick collapse Germany's Blitzkrieg doctrine required.", "isCorrect": true, "rationale": "The section implies this: Blitzkrieg 'depended on speed: when opponents adapted and supply lines lengthened, as in the Soviet Union, Blitzkrieg's advantages diminished.' The combination of vast territory (lengthening supply lines), industrial capacity (the Five-Year Plans' legacy), and the willingness to absorb 27 million total casualties is the composite explanation for Soviet survival."}, {"text": "The United States provided critical Lend-Lease supplies to the Soviet Union in 1941 that prevented immediate Soviet military collapse.", "isCorrect": false, "rationale": "Lend-Lease aid was real and significant, but the section does not cite it as the reason for Soviet resilience. The Soviet Union's survival in 1941 preceded substantial Lend-Lease delivery. The section focuses on military dynamics — Blitzkrieg's limitations in vast territory — not external supply chains."}, {"text": "British air bombardment of German cities in 1941 forced Germany to redirect its air power from the Eastern Front to home defense.", "isCorrect": false, "rationale": "While the Battle of Britain (1940) and subsequent RAF operations were real, the section does not cite British bombing as the reason Germany failed to collapse the Soviet Union in 1941. The Eastern Front's dynamics are explained through the limitations of Blitzkrieg in vast territory, not through diversion of German air power."}]}, {"question": "The founding of the United Nations in 1945 is described as 'replacing the failed League of Nations.' In what specific way did the UN's Security Council structure address the League's key institutional weakness?", "options": [{"text": "The UN required all member states to maintain standing armies available for collective security missions, solving the League's problem of having no military enforcement capacity.", "isCorrect": false, "rationale": "The UN Charter's Article 43 envisioned member state military contributions, but in practice the UN has rarely deployed standing forces for enforcement. The section identifies the Security Council's five permanent veto-holding members (P5) as the structural innovation — not the creation of a standing UN army."}, {"text": "The UN included a Security Council with five permanent veto-holding members — the major powers — ensuring that the great powers with military capacity were institutionally invested in the system.", "isCorrect": true, "rationale": "The section notes: 'The United Nations, founded in 1945, replaced the failed League of Nations with a security architecture including a Security Council with five permanent veto-holding members (the United States, Soviet Union, Britain, France, and China).' The League's key weakness was that the United States never joined; the P5 veto structure ensures major powers are invested stakeholders."}, {"text": "The UN was headquartered in a neutral country (Switzerland), unlike the League of Nations, ensuring no single power could dominate its administration.", "isCorrect": false, "rationale": "The UN is headquartered in New York, USA — not in neutral Switzerland. The League of Nations was headquartered in Geneva, Switzerland. This option reverses the historical geography and misidentifies the structural innovation."}, {"text": "The UN replaced the League's consensus requirement with a simple majority voting system, making it faster to authorize collective security responses.", "isCorrect": false, "rationale": "The Security Council's veto structure actually makes major-power consensus harder to achieve, not easier — any P5 member can block action. The innovation was not majority voting but permanent great-power membership with veto rights, ensuring major powers were invested in the institution even if it meant they could obstruct it."}]}, {"question": "The section notes that 'by 1944–1945, US bombers were incinerating Japanese cities in firebombing campaigns,' citing the 9–10 March 1945 Tokyo raid as killing 80,000–100,000 civilians. What does the section use this statistic to argue?", "options": [{"text": "That conventional bombing was so effective it made the atomic bombings of Hiroshima and Nagasaki unnecessary.", "isCorrect": false, "rationale": "The section does not use the Tokyo statistic to argue the atomic bombs were unnecessary. It uses the comparison to note that the Tokyo raid killed 'comparable to the atomic bomb casualties at each of Hiroshima and Nagasaki' — meaning the atomic bombings were not categorically different in civilian casualty scale from existing conventional bombing. The question of necessity is presented as genuinely contested, not resolved."}, {"text": "That the civilian casualty scale of the atomic bombings was not categorically different from the conventional firebombing campaigns already underway, complicating the moral case for treating them as uniquely transgressive.", "isCorrect": true, "rationale": "The section places the Tokyo raid comparison immediately before discussing Hiroshima and Nagasaki, noting 'comparable' casualty figures. This frames the atomic bombings within an already-established pattern of mass civilian targeting, making the moral debate more complex: if conventional firebombing was already killing comparable numbers, the atomic bombs' special moral status must rest on radiation/long-term effects and norm-setting, not uniquely on immediate casualty scale."}, {"text": "That American air power in the Pacific was primarily designed to minimize US military casualties by avoiding ground invasions of the Japanese home islands.", "isCorrect": false, "rationale": "While casualty minimization for American forces was a stated rationale for both bombing campaigns and the atomic bombs, the section does not use the Tokyo statistic for this argument. The comparison is about civilian casualty scale, not about US military strategy calculations."}, {"text": "That Japan's civilian population was primarily responsible for the war because they supported the military government, justifying targeting them directly.", "isCorrect": false, "rationale": "The section makes no such argument about Japanese civilian responsibility. The section presents the targeting of civilian cities as a morally contested element of the debate — describing it as a potential 'war crime' — not as justified by civilian complicity."}]}, {"question": "The Bretton Woods system established at the end of WWII is best understood as which type of historical development?", "options": [{"text": "A military alliance that replaced the wartime Grand Alliance between the United States and the Soviet Union.", "isCorrect": false, "rationale": "The Bretton Woods system was an economic framework, not a military alliance. The Grand Alliance's replacement was the Cold War's competing military blocs (NATO and the Warsaw Pact), not Bretton Woods. Conflating the economic and military dimensions misidentifies what Bretton Woods was."}, {"text": "An economic framework establishing the US dollar as the world's reserve currency and creating the IMF and World Bank — the institutional foundation for postwar global economic management.", "isCorrect": true, "rationale": "The section identifies Bretton Woods as establishing 'the US dollar as the world's reserve currency and created the International Monetary Fund and World Bank.' This is an economic institution-building development, establishing US dollar hegemony and creating multilateral economic governance as part of the postwar international order."}, {"text": "A system of reparations imposed on Germany and Japan to fund European and Asian postwar reconstruction.", "isCorrect": false, "rationale": "Bretton Woods was not a reparations system. It was a currency and financial governance framework agreed upon by Allied nations in 1944. Germany's occupation zones and Japan's US occupation were managed separately from the Bretton Woods financial architecture."}, {"text": "A UN program for distributing Marshall Plan aid to war-damaged European economies.", "isCorrect": false, "rationale": "The Marshall Plan (1948) was a separate US foreign aid program, not part of the Bretton Woods system. Bretton Woods was established in 1944 at a conference in New Hampshire; the Marshall Plan was a later bilateral US initiative. They are complementary but distinct institutions."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
