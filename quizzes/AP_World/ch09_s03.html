<body>
<div class="quiz-container">

        <div class="subtitle">AP World History: Modern &mdash; Global Institutions and Economic Integration</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "The United Nations Security Council was designed with five permanent members holding veto power. Critics from the Global South argue this structure 'enshrined the power of the victorious colonial powers.' Which of the following best supports this critique?", "options": [{"text": "The five permanent members include the United States, Russia, the United Kingdom, France, and China — all 1945 great powers — but no nation from Africa, Latin America, or South Asia holds a permanent seat.", "isCorrect": true, "rationale": "The text explicitly states the structure 'enshrined the power of the victorious colonial powers and their allies' and notes that no permanent seat was given to any nation from Africa, Latin America, or South Asia — regions that were largely colonized by the permanent members in 1945."}, {"text": "The UN General Assembly allows all member states to cast binding votes, giving equal weight to large and small nations.", "isCorrect": false, "rationale": "The text notes that binding enforcement authority rests with the Security Council, not the General Assembly. The General Assembly provides a forum but its resolutions are not binding in the same way — this does not support the critique of the Security Council structure."}, {"text": "The UN's humanitarian agencies (UNICEF, WHO, WFP, UNHCR) are dominated by Global South nations.", "isCorrect": false, "rationale": "The text does not claim Global South domination of humanitarian agencies. Moreover, the critique is about Security Council veto power and permanent membership, not humanitarian agency governance."}, {"text": "The veto power was a compromise demanded by the Soviet Union to prevent Western powers from dominating the UN.", "isCorrect": false, "rationale": "The text does not discuss the Soviet Union's negotiating position on the veto. The critique from the Global South focuses on the exclusion of their nations from permanent membership, not on the U.S.–Soviet negotiation dynamic."}], "id": "q01"}, {"question": "A scholar comparing the IMF's original Bretton Woods mandate (1944) with its structural adjustment programs of the 1980s and 1990s would most likely conclude that:", "options": [{"text": "The IMF's role expanded from short-term stabilization lending to imposing long-term market reforms on borrowing nations as conditions of assistance.", "isCorrect": true, "rationale": "The text describes the original mandate as providing 'short-term stabilization loans to countries facing balance-of-payments crises.' By the 1980s, structural adjustment programs required 'privatization, deregulation, trade liberalization, and cuts to public spending' — a fundamental shift from short-term stabilization to conditional long-term reform."}, {"text": "The IMF abandoned its economic mission after 1971 and became primarily a political organization for resolving conflicts.", "isCorrect": false, "rationale": "The text says the IMF survived and grew after the 1971 Bretton Woods collapse — it did not abandon its economic mission. Its role evolved toward structural adjustment, not political conflict resolution."}, {"text": "Structural adjustment programs strengthened social safety nets in Africa and Latin America, improving long-term development outcomes.", "isCorrect": false, "rationale": "The text states the opposite: critics argued structural adjustment 'dismantled social safety nets and essential public services.' The text presents this as the central criticism of SAPs."}, {"text": "The IMF's fixed-exchange-rate system continued to operate successfully until the 2000s.", "isCorrect": false, "rationale": "The text states the Bretton Woods fixed-exchange system 'collapsed in 1971 when President Nixon suspended dollar–gold convertibility' — not in the 2000s."}], "id": "q02"}, {"question": "Read this passage: 'Countries in the Global South that integrated into the global economy found that the terms of integration mattered enormously: those that could export manufactured goods generally prospered; those locked into exporting raw materials found themselves disadvantaged by volatile commodity prices and deteriorating terms of trade.' Which historical example BEST illustrates this contrast?", "options": [{"text": "The contrast between South Korea and Taiwan (manufactured exports) vs. African commodity exporters.", "isCorrect": true, "rationale": "The text explicitly names South Korea, Taiwan, and China as examples that 'generally prospered' through manufactured exports, implying a contrast with raw-material exporters who faced volatile commodity prices and deteriorating terms of trade — the structural pattern described."}, {"text": "The contrast between the European Union (stable currency) vs. the United States (dollar dominance).", "isCorrect": false, "rationale": "This is a contrast between two wealthy, industrialized economies — neither of which exemplifies the raw-materials-exporter disadvantage described in the passage about Global South integration."}, {"text": "The contrast between countries that joined the UN in 1945 vs. those that joined later.", "isCorrect": false, "rationale": "UN membership year is unrelated to the type of exports a country produces or the terms-of-trade dynamics described in the passage."}, {"text": "The contrast between nations that accepted structural adjustment vs. those that refused IMF loans.", "isCorrect": false, "rationale": "The passage is about what type of goods a country exports (manufactured vs. raw materials), not about whether it accepted structural adjustment — these are distinct variables."}], "id": "q03"}, {"question": "China's admission to the WTO in 2001 generated two simultaneous effects described in the source. Which pair accurately captures both effects?", "options": [{"text": "China's agricultural sector surpassed the United States, AND Chinese workers gained political rights through WTO membership.", "isCorrect": false, "rationale": "Neither claim is supported by the text. China's exports are described as manufacturing-focused, not agricultural. The text says nothing about WTO membership conferring political rights."}, {"text": "Hundreds of millions were lifted out of poverty in China, AND manufacturing employment in the United States, Europe, and elsewhere was displaced — generating political backlash.", "isCorrect": true, "rationale": "The text explicitly states both outcomes: Chinese manufacturing exports 'lifting hundreds of millions out of poverty in China while simultaneously displacing manufacturing employment in the United States, Europe, and elsewhere — generating political backlash that contributed to the rise of economic nationalism.'"}, {"text": "China became the WTO's largest net contributor, AND the Bretton Woods system was restored under Chinese leadership.", "isCorrect": false, "rationale": "Neither claim is in the text. Bretton Woods collapsed in 1971, long before China's WTO accession. The text discusses China's export growth, not its financial contributions to the WTO."}, {"text": "The WTO's dispute-resolution mechanism was strengthened, AND China adopted Western labor standards under the agreement.", "isCorrect": false, "rationale": "The text describes the WTO having dispute-resolution authority, but it says nothing about China adopting Western labor standards as part of WTO accession."}], "id": "q04"}, {"question": "The European Union represents 'the most ambitious experiment in regional economic and political integration.' Which sequence correctly traces its institutional development?", "options": [{"text": "Treaty of Rome (1957) → European Coal and Steel Community (1952) → euro (1999) → Brexit (2020)", "isCorrect": false, "rationale": "This inverts the sequence: the European Coal and Steel Community (1952) preceded the Treaty of Rome (1957), not the other way around."}, {"text": "European Coal and Steel Community (1952) → Treaty of Rome (1957) → euro (1999) → Brexit (2020)", "isCorrect": true, "rationale": "The text lists these in this order: 'Beginning with the European Coal and Steel Community (1952) and the Treaty of Rome (1957)... a single currency (the euro, introduced 1999)... following the United Kingdom's departure in 2020 — Brexit.'"}, {"text": "European Coal and Steel Community (1952) → euro (1999) → Treaty of Rome (1957) → Brexit (2020)", "isCorrect": false, "rationale": "The Treaty of Rome (1957) preceded the euro (1999) by over four decades. The text presents them in correct chronological order — ECSC, Treaty of Rome, then euro."}, {"text": "Treaty of Rome (1957) → euro (1999) → Brexit (2020) → European Coal and Steel Community established", "isCorrect": false, "rationale": "The ECSC was the earliest institution (1952), not the latest. This sequence is completely inverted."}], "id": "q05"}, {"question": "Critics argued that the EU's handling of austerity in Greece became 'a symbol for critics who argued that economic integration had transferred sovereignty upward to institutions accountable primarily to financial markets rather than to citizens.' This argument most directly addresses which tension in global governance?", "options": [{"text": "The tension between democratic accountability and supranational technocratic governance.", "isCorrect": true, "rationale": "The critique is that EU institutions enforced austerity policies in Greece that citizens had voted against — transferring effective decision-making power 'upward to institutions accountable primarily to financial markets rather than to citizens.' This is the classic democratic-accountability vs. technocratic-governance tension."}, {"text": "The tension between free trade and environmental protection in the eurozone.", "isCorrect": false, "rationale": "The Greek austerity crisis was primarily a fiscal and sovereignty debate, not an environmental one. The source does not connect the Greece crisis to environmental policy."}, {"text": "The tension between military alliances (NATO) and economic unions (EU).", "isCorrect": false, "rationale": "The text does not discuss NATO or the relationship between military and economic alliances in the context of the Greek crisis. The tension described is between democratic and financial/technocratic governance."}, {"text": "The tension between bilateral trade agreements and multilateral WTO rules.", "isCorrect": false, "rationale": "The Greek austerity debate was about eurozone fiscal rules and IMF/EU creditor conditions, not about trade agreements or WTO rules."}], "id": "q06"}, {"question": "The text argues that 'economic globalization after 1945 was not a natural or automatic process — it was the result of deliberate policy choices made by governments with specific interests.' Which evidence BEST supports this claim?", "options": [{"text": "Global merchandise exports tripled between 1990 and 2008.", "isCorrect": false, "rationale": "This statistic describes the outcome of globalization (trade expansion), not evidence that globalization was driven by deliberate policy choices. It doesn't reveal the intentional policy architecture behind the trend."}, {"text": "The institutions governing globalization (IMF, World Bank, WTO) were designed primarily by and for wealthy nations, and their rules often reflected those nations' interests.", "isCorrect": true, "rationale": "The text presents this as direct evidence that globalization was designed, not natural: 'The institutions that governed globalization...were designed primarily by and for wealthy nations, and the rules they enforced often reflected those nations' interests.' The Bretton Woods design process itself was the deliberate architecture."}, {"text": "The Soviet Union and United States competed for influence in developing nations during the Cold War.", "isCorrect": false, "rationale": "Cold War geopolitical competition is a background context, not the text's primary evidence that post-1945 economic globalization was deliberately engineered. The text focuses on the institutional architecture of trade and finance, not Cold War rivalry."}, {"text": "The European Union's single market attracted foreign direct investment from non-European multinationals.", "isCorrect": false, "rationale": "This describes an outcome of EU integration, not evidence that the broader global economic architecture was deliberately designed by powerful actors to reflect their interests."}], "id": "q07"}, {"question": "A policymaker in a low-income African country in the 1990s faces the following choice: accept IMF structural adjustment loans requiring privatization and spending cuts, or seek alternative financing. The text suggests critics would argue that accepting structural adjustment was problematic because:", "options": [{"text": "It would require the country to abandon its membership in the United Nations.", "isCorrect": false, "rationale": "IMF structural adjustment has no connection to UN membership. The two institutions are distinct, and the text does not suggest any link between accepting IMF loans and UN participation."}, {"text": "It dismantled social safety nets and essential public services while primarily serving Western creditors and international investors rather than local populations.", "isCorrect": true, "rationale": "The text states explicitly that African and Latin American governments argued structural adjustment 'dismantled social safety nets and essential public services while primarily serving the interests of Western creditors and international investors.' This is the core criticism described."}, {"text": "Structural adjustment required countries to permanently peg their currencies to the U.S. dollar.", "isCorrect": false, "rationale": "Dollar pegging was part of the original Bretton Woods system (which collapsed in 1971), not a feature of 1980s–1990s structural adjustment programs. The text distinguishes between these two different IMF phases."}, {"text": "It prevented the country from joining the WTO, which offered better terms for developing economies.", "isCorrect": false, "rationale": "The text does not suggest any link between IMF loan acceptance and WTO membership. These were separate institutional relationships."}], "id": "q08"}, {"question": "Between 1990 and 2008, global merchandise exports more than tripled. Which factor does the source identify as MOST consequential for this expansion?", "options": [{"text": "The introduction of the euro, which stabilized currency exchange among EU member states.", "isCorrect": false, "rationale": "The euro (1999) is discussed in the context of EU integration, not as the primary explanation for the tripling of global merchandise exports between 1990 and 2008."}, {"text": "The collapse of the Bretton Woods fixed-exchange system, which freed currencies to float.", "isCorrect": false, "rationale": "The Bretton Woods collapse happened in 1971 — nearly two decades before the 1990–2008 export expansion. The text does not present the 1971 collapse as the cause of 1990s–2000s trade growth."}, {"text": "China's admission to the WTO in 2001, which enabled exponential growth in Chinese manufacturing exports.", "isCorrect": true, "rationale": "The text specifically identifies China's WTO admission in 2001 as 'particularly consequential,' with Chinese manufacturing exports growing exponentially thereafter — directly driving the global trade expansion of this era."}, {"text": "The founding of UNICEF and WHO, which improved health conditions and enabled greater labor productivity globally.", "isCorrect": false, "rationale": "UNICEF and WHO are humanitarian institutions; the text does not connect them to the tripling of merchandise exports in this period. The trade expansion is linked to WTO membership and China's manufacturing integration."}], "id": "q09"}, {"question": "The founders of the post-1945 institutional order were 'determined, above all else, not to repeat the catastrophes of the preceding three decades.' Which of the following best captures what those catastrophes were, as described in the source?", "options": [{"text": "The collapse of colonial empires, the rise of communist movements, and the Korean War.", "isCorrect": false, "rationale": "Decolonization, communism, and the Korean War are not what the text identifies as the motivating catastrophes for post-1945 institution-building. The text is specific about the three-decade precedent."}, {"text": "A World War, a global depression, another World War, and a genocide.", "isCorrect": true, "rationale": "The text explicitly lists these four catastrophes of the 'preceding three decades' that motivated the post-1945 institutional architecture: World War I, the Great Depression, World War II, and the Holocaust."}, {"text": "The breakdown of the gold standard, mass migration, and the rise of fascism in one nation.", "isCorrect": false, "rationale": "While related, this is too narrow. The text's formulation encompasses broader and more numerous catastrophes — two World Wars, a global depression, and genocide — not just fascism or gold standard collapse."}, {"text": "The failure of the League of Nations, the Suez Crisis, and Soviet nuclear proliferation.", "isCorrect": false, "rationale": "While the League's failure was a context for the UN's design, the text does not name the Suez Crisis or Soviet nuclear proliferation as the motivating catastrophes for the 1945 institutional architecture."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
