<body>
<div class="quiz-container">

    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP World History: Modern &mdash; Trans-Saharan Routes</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The text argues that understanding the trans-Saharan trade routes requires 'abandoning the Eurocentric habit of treating sub-Saharan Africa as isolated and peripheral.' Which of the following BEST supports this argument?", "options": [{"text": "Sub-Saharan African kingdoms were heavily dependent on European trading partners to develop their economies.", "isCorrect": false, "rationale": "This option reinforces the Eurocentric periphery model the text rejects. West African kingdoms developed their wealth through trans-Saharan connections to North Africa and the Islamic world, not through European partnerships."}, {"text": "The Mali Empire controlled both goldfields and major caravan routes, making it among the wealthiest and most sophisticated polities in the medieval world.", "isCorrect": true, "rationale": "The text explicitly states that Mali's wealth 'rivaled or exceeded those of any contemporary European kingdom' and that West Africa was 'a core node in the medieval global economy'—directly refuting the isolation narrative."}, {"text": "West African rulers adopted Islam only under military pressure from North African states.", "isCorrect": false, "rationale": "The text argues West African rulers adopted Islam voluntarily—for pragmatic benefits including literacy, legal structures, and access to Muslim trade networks—not under military coercion."}, {"text": "The Sahara Desert effectively cut off West Africa from meaningful trade with the rest of the world until the 15th century.", "isCorrect": false, "rationale": "The text explicitly argues the opposite: trans-Saharan commerce operated for more than two millennia and made West African kingdoms among the world's wealthiest, well before 1450."}]}, {"question": "Read the following: 'The camel's physiological adaptations—the ability to travel 160 kilometers between water sources, to carry 270 kg of cargo, and to withstand temperature swings of six degrees Celsius without harm—made it the only pack animal capable of crossing the Sahara reliably.' What historical concept does this passage BEST illustrate?", "options": [{"text": "The role of biological exchange in reshaping agricultural economies across regional networks.", "isCorrect": false, "rationale": "The passage is about how a specific technology (the camel, as a domesticated pack animal) enabled commerce across an environmental barrier—not about biological exchange affecting agriculture."}, {"text": "How a specific technological and environmental adaptation enabled commerce across an otherwise impassable geographic barrier.", "isCorrect": true, "rationale": "The camel was the key technology that unlocked Saharan crossing; the passage describes how its physiological features were an adaptation to desert conditions, enabling the entire trans-Saharan commercial system."}, {"text": "The ways in which state-sponsored animal domestication programs expanded imperial military power.", "isCorrect": false, "rationale": "The text describes the camel as essential for commerce, not state-sponsored domestication for military purposes. The camel saddle improved cargo capacity, enabling trade, not primarily warfare."}, {"text": "Environmental determinism—the idea that geography alone determines the prosperity or poverty of a civilization.", "isCorrect": false, "rationale": "The passage shows human adaptation to environment (domesticating and equipping the camel), not passive environmental determination. The Sahara was a barrier that human ingenuity overcame."}]}, {"question": "The gold–salt trade was described as the 'structural engine' of the trans-Saharan economy. Which of the following BEST explains why both commodities commanded such high value?", "options": [{"text": "Gold was scarce everywhere in the medieval world, and salt was a luxury food seasoning consumed only by wealthy elites.", "isCorrect": false, "rationale": "Salt was not a luxury—the text explicitly states it 'was not a luxury' but a physiological necessity, nearly as precious as gold by weight in tropical West Africa because of its scarcity in the interior."}, {"text": "Gold was the primary monetary metal of the Islamic world and Mediterranean, while salt was a physiological necessity scarce in the tropical interior—each region had what the other desperately needed.", "isCorrect": true, "rationale": "The text explains that West Africa produced gold in quantities making it the primary monetary source for the Islamic world and Europe, while salt deposits in the Sahara were essential for tropical regions where sodium deficiency was a real problem."}, {"text": "Gold was used in religious ceremonies by West African kings, making it sacred and therefore politically controlled by the state.", "isCorrect": false, "rationale": "While gold was politically significant in West African kingdoms, the text explains its value in terms of monetary use in the Islamic world and Mediterranean, not primarily domestic religious ceremony."}, {"text": "Both commodities were controlled by a single merchant cartel that manipulated supply to maintain high prices.", "isCorrect": false, "rationale": "The text describes a complementary geographic distribution—goldfields in West Africa, salt deposits in the Sahara—as the structural basis of value, not merchant cartel manipulation."}]}, {"question": "Consider the following scenario: A West African ruler in the 13th century is deciding whether to adopt Islam. According to the text, what were the MOST LIKELY practical reasons for conversion?", "options": [{"text": "Fear of military invasion by Moroccan armies that had converted neighboring kingdoms by force.", "isCorrect": false, "rationale": "The text explicitly states that West African rulers found Islam 'valuable for pragmatic reasons' and that adoption was voluntary, not driven by fear of military coercion from North Africa."}, {"text": "Access to a literate administrative class, legitimacy in trade with the Muslim world, and prestigious cultural connections—without abandoning indigenous spiritual practices.", "isCorrect": true, "rationale": "The text lists all three of these: Islamic clerics as literate administrators, trade legitimacy with Dar al-Islam, and prestigious cultural connections—while noting rulers maintained 'traditional African religious ceremonies' alongside Islam."}, {"text": "The spiritual authority of Islamic prophecy, which the ruler found personally compelling upon hearing it explained.", "isCorrect": false, "rationale": "While individual conviction is always possible, the text emphasizes pragmatic governance reasons—not personal spiritual motivation—as the structural explanation for West African rulers' conversion."}, {"text": "Pressure from enslaved laborers in the goldfields, who demanded religious freedom under Islamic law.", "isCorrect": false, "rationale": "The text makes no mention of enslaved workers in the goldfields driving religious conversion; conversions are explained by ruling-class political and commercial incentives."}]}, {"question": "Mansa Musa of Mali undertook the hajj to Mecca in 1324. The Catalan Atlas (1375) depicts him holding a gold nugget at the center of sub-Saharan Africa. What does this representation suggest about European perceptions of West Africa in the 14th century?", "options": [{"text": "European cartographers saw West Africa as a primitive region whose gold should be seized by Christian kingdoms.", "isCorrect": false, "rationale": "The Catalan Atlas placed Mansa Musa at the center of sub-Saharan Africa 'as a symbol of the region's wealth'—signifying admiration for or recognition of Mali's riches, not plans for seizure."}, {"text": "Europeans recognized Mali as an extraordinarily wealthy polity, using Mansa Musa's gold as a symbol of the region's central economic importance.", "isCorrect": true, "rationale": "The text states that European cartographers 'placed him at the center of sub-Saharan Africa as a symbol of the region's wealth,' showing that Mali's riches were known and represented in European geographic imagination."}, {"text": "European knowledge of West Africa was minimal before Portuguese exploration in the 15th century.", "isCorrect": false, "rationale": "The Catalan Atlas of 1375 shows Europeans knew enough about Mali to depict Mansa Musa with specific iconographic detail—evidence of real geographic knowledge flowing through Moroccan and Mediterranean contacts."}, {"text": "Mansa Musa's hajj converted West Africa to Islam, making it part of the Mediterranean cultural sphere.", "isCorrect": false, "rationale": "While the hajj amplified Mansa Musa's fame and Mali had already adopted Islam, the text does not claim his pilgrimage 'converted' West Africa. Islam had been spreading in the region for over a century before 1324."}]}, {"question": "Timbuktu became a center of Islamic scholarship hosting mosques, manuscript libraries, and madrasas. This development is BEST explained by which causal chain?", "options": [{"text": "North African states conquered Timbuktu and installed Islamic scholars as colonial administrators.", "isCorrect": false, "rationale": "The text describes Timbuktu's intellectual life as growing organically from Mali's commercial wealth and voluntary Islamic synthesis, not from North African conquest and colonial installation."}, {"text": "Trans-Saharan trade wealth funded urban growth; Islam's adoption brought literate scholars; their presence attracted more students, making scholarship self-reinforcing.", "isCorrect": true, "rationale": "The text describes Timbuktu as Mali's commercial and intellectual center: trade wealth built the city; Islamic adoption brought clerics and Arabic literacy; mosques and madrasas followed, attracting students from across North and West Africa."}, {"text": "The Mali Empire adopted a state-religion policy that mandated Islamic education for all citizens.", "isCorrect": false, "rationale": "The text describes Mali as maintaining 'pragmatic syncretism'—combining Islam with traditional religious ceremonies—not a mandatory state-religion policy of Islamic education for all."}, {"text": "Timbuktu's scholarship flourished because of its geographic isolation from political disruption.", "isCorrect": false, "rationale": "Timbuktu was a major trading hub on the Niger River bend—hardly isolated. Its scholarship flourished because of commercial wealth and Islamic connections, not isolation."}]}, {"question": "Ibn Battuta, visiting Mali in 1352–1353, 'simultaneously admired and criticized' the Malian court's religious practices. What does this tension reveal about cross-cultural observation in the 14th century?", "options": [{"text": "Ibn Battuta was anti-Islamic and preferred local African religious traditions to orthodox practice.", "isCorrect": false, "rationale": "Ibn Battuta was a devout Muslim scholar; his criticism was that Mali mixed Islamic and indigenous practices, not that he preferred indigenous religion over Islam."}, {"text": "A Muslim traveler could appreciate a society's prosperity and order while finding its religious syncretism insufficiently orthodox—reflecting the complexity of Islamic encounter with local practices.", "isCorrect": true, "rationale": "The text describes Ibn Battuta as admiring Mali's governance and wealth while criticizing its blend of Islamic and traditional African ceremonies—a response shaped by his perspective as a trained Islamic legal scholar and judge."}, {"text": "Mali's rulers had fully adopted Islam and eliminated all traditional religious practices by the time of Ibn Battuta's visit.", "isCorrect": false, "rationale": "The text says the opposite: Mali maintained 'pragmatic syncretism' combining Islam with traditional ceremonies—which is precisely what Ibn Battuta criticized."}, {"text": "Ibn Battuta's criticism shows that Mali was not a genuinely Islamic society and should not be included in discussions of Islam's spread.", "isCorrect": false, "rationale": "The text treats Mali as a prime example of Islam's trans-Saharan spread; the syncretic nature of its adoption is historically typical of early conversion contexts, not a disqualifier."}]}, {"question": "Kola nuts and enslaved people are mentioned alongside gold and salt as commodities in the trans-Saharan trade. What does the inclusion of these items suggest about the scope of the trade system?", "options": [{"text": "The trans-Saharan trade was limited to luxury goods consumed only by the elites of North African cities.", "isCorrect": false, "rationale": "The trade carried a diverse mix: staple necessities (salt), stimulants (kola), monetary metals (gold), enslaved human beings, textiles, and horses—spanning luxury, necessity, and human coercion."}, {"text": "The trade system transmitted a diverse mix of commodities—including stimulants, enslaved people, and military resources—reflecting a complex, multi-sector commercial economy linking West Africa to North Africa.", "isCorrect": true, "rationale": "The text lists kola nuts (valued in Islamic societies prohibiting alcohol), enslaved people (thousands crossing annually for domestic service), horses (essential for cavalry power), and textiles—showing the trade was economically and socially multi-dimensional."}, {"text": "Kola nuts were the most valuable commodity because they were unavailable anywhere outside the West African forest zone.", "isCorrect": false, "rationale": "While kola nuts were exclusively from West African forest zones, the text does not rank them as the most valuable commodity; gold is described as the structural foundation of the economy."}, {"text": "The trade in enslaved people indicates that the trans-Saharan system was organized primarily around coerced labor rather than commercial exchange.", "isCorrect": false, "rationale": "The text presents enslaved people as one of several significant commodities, not the organizing principle of the trade; the gold–salt exchange is described as the 'structural engine.'"}]}, {"question": "Compare the spread of Islam along the trans-Saharan routes to its spread along the Indian Ocean maritime network. What did the two processes have in common?", "options": [{"text": "Both processes involved military conquest by Arab armies followed by forced conversion of local populations.", "isCorrect": false, "rationale": "Neither section describes forced military conversion. Both routes transmitted Islam voluntarily—through merchant communities and rulers seeking commercial and administrative advantages."}, {"text": "In both cases, Islam spread through commercial contact, with local rulers adopting it voluntarily for practical advantages rather than through coercion.", "isCorrect": true, "rationale": "Section 2.2 states that Islam's spread through maritime Southeast Asia was 'largely voluntary'; Section 2.3 states that West African rulers adopted Islam 'for pragmatic reasons.' Both routes show commerce as the mechanism of religious diffusion without military force."}, {"text": "Both processes required Sufi missionaries to explicitly preach Islamic doctrine to ruling elites before conversion occurred.", "isCorrect": false, "rationale": "Neither section attributes the spread of Islam primarily to Sufi missionary activity. Merchant communities and commercial incentives are the mechanisms described for both networks."}, {"text": "Islam spread more rapidly along the trans-Saharan routes because the Sahara provided no geographic obstacles to the movement of religious ideas.", "isCorrect": false, "rationale": "The Sahara was a major geographic obstacle—that is the entire premise of the section. Islam's spread was driven by the caravan network that overcame the desert, not by the absence of geographic barriers."}]}, {"question": "The North African camel saddle (c. 3rd century CE) transferred the load from the animal's back to its sides. Why was this seemingly minor innovation historically significant?", "options": [{"text": "It allowed the camel to travel faster, reducing journey times across the Sahara from months to weeks.", "isCorrect": false, "rationale": "The text attributes the innovation's significance to heavier load capacity and more comfortable riding—not to increased travel speed. Saharan crossings still took 60–90 days."}, {"text": "It allowed heavier loads and more comfortable riding, dramatically increasing the volume of goods caravans could transport—scaling up the entire commercial system.", "isCorrect": true, "rationale": "The text directly states that the camel saddle 'allowed heavier loads and more comfortable riding, dramatically increasing the volume of goods that caravans could move'—a multiplicative effect on commercial capacity."}, {"text": "It enabled the camel to survive without water for longer periods, extending the desert routes it could cross.", "isCorrect": false, "rationale": "The camel's water-storage physiology (160 km between water sources) is a biological trait unrelated to the saddle innovation. The saddle improved cargo and rider comfort, not the animal's biological endurance."}, {"text": "It made the camel useful for warfare, allowing Berber cavalry to defeat North African armies.", "isCorrect": false, "rationale": "The text frames the camel saddle innovation in terms of commercial cargo capacity, not military cavalry applications. While camels were used in warfare, that is not the significance the text assigns to this innovation."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
