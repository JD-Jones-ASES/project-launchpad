        <div class="subtitle">AP World History: Modern &mdash; The Columbian Exchange</div>

    <div id="score-box" class="score-box">

        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "Alfred Crosby coined the term 'Columbian Exchange' and described it as 'the most significant ecological event since the last Ice Age.' Which of the following best supports this characterization?", "options": [{"text": "The exchange transferred gold and silver from the Americas to Europe, giving Spain the financial resources to dominate European politics for two centuries.", "isCorrect": false, "rationale": "Precious metals were economically significant but are not what Crosby's ecological framing addresses. The Columbian Exchange concept refers to biological transfers — crops, animals, diseases — not monetary flows."}, {"text": "The exchange permanently reorganized the biosphere of two hemispheres that had been ecologically isolated for twelve thousand years, moving crops, animals, and diseases with consequences that reshaped human demography across the globe.", "isCorrect": true, "rationale": "The source defines the Columbian Exchange as a 'massive, permanent, and largely unintended transfer of biological material between two hemispheres that had been ecologically isolated from each other for approximately twelve thousand years' — exactly the framing Crosby used when calling it the most significant ecological event since the Ice Age."}, {"text": "The exchange gave European nations the technical knowledge to establish permanent settlements in the Americas, making subsequent colonization economically viable.", "isCorrect": false, "rationale": "Technical and colonial knowledge is not what defines the Columbian Exchange as Crosby conceived it. The ecological significance lies in biological transfers, not colonization logistics."}, {"text": "The exchange introduced European legal and administrative institutions to the Americas, permanently reshaping indigenous political organization.", "isCorrect": false, "rationale": "Political institutions are not biological transfers. Crosby's concept is ecological — about organisms and their effects on demographics and environments — not about legal or administrative systems."}], "id": "q01"}, {"question": "The potato originated in the Andean highlands. Which of the following best explains its role in European demographic growth after 1492?", "options": [{"text": "Its high sugar content made it a luxury food that wealthy European merchants could sell at premium prices, generating capital for further Atlantic trade.", "isCorrect": false, "rationale": "The potato was not a luxury good; it was a caloric staple. Its significance was that it could be grown in cold, wet climates inhospitable to most Eurasian grains, expanding food production on marginal agricultural land."}, {"text": "It could be cultivated in cold, wet climates where Eurasian grains failed, becoming the caloric foundation of populations in Ireland, Germany, Russia, and northern China.", "isCorrect": true, "rationale": "The source states: 'The potato, originating in the Andean highlands, could be grown in cold, wet climates inhospitable to most Eurasian grains — it would eventually become the caloric foundation of Ireland, Germany, Russia, and northern China.' The Irish population roughly doubled between 1700 and 1845 on the strength of potato agriculture."}, {"text": "It replaced sugar cane as the primary plantation crop in the Caribbean because it grew faster and required less enslaved labor to harvest.", "isCorrect": false, "rationale": "The potato was a temperate-climate staple crop grown in Europe, not a tropical plantation crop. Sugar cane remained the dominant Caribbean plantation product throughout the period."}, {"text": "Its introduction to Europe eliminated famine entirely by providing a nutritionally complete food that required no additional grains or proteins.", "isCorrect": false, "rationale": "While potatoes dramatically increased caloric availability, they did not eliminate famine — the Irish Famine of 1845–1852 was caused by potato blight, precisely because Ireland had become dangerously dependent on the potato monoculture."}], "id": "q02"}, {"question": "A historian studying the Comanche people of the Great Plains notes that their equestrian bison-hunting culture, often described as 'traditional,' actually developed within a few generations after 1492. What does this example best illustrate?", "options": [{"text": "That indigenous American cultures were unable to adapt to new conditions and required European guidance to develop sustainable ways of life.", "isCorrect": false, "rationale": "This option is both factually wrong and contrary to the section's argument. The emergence of Comanche equestrian culture demonstrates remarkable indigenous adaptability, not inability to adapt."}, {"text": "That what appears to be timeless 'traditional' culture can itself be a product of the Columbian Exchange, as introduced species (horses) rapidly transformed indigenous societies.", "isCorrect": true, "rationale": "The source explicitly makes this point: 'Europeans would later encounter as \\\"traditional\\\" Native American life — forgetting that this \\\"tradition\\\" was itself a product of the Columbian Exchange.' The horse was an Old World introduction that created a new Plains culture within a generation or two."}, {"text": "That the horse was indigenous to the Americas and had been used by Plains peoples for thousands of years before European contact.", "isCorrect": false, "rationale": "Horses arrived in the Americas with the Spanish and are identified in the source as Old World livestock that transformed American environments. The ancestor of the modern horse had gone extinct in the Americas thousands of years earlier."}, {"text": "That European settlers deliberately introduced horses to Plains peoples as a diplomatic gesture to facilitate trade relations.", "isCorrect": false, "rationale": "The source describes horses as spreading with (not as a deliberate gift to) indigenous peoples. Feral horses spread on their own across grassland environments; there was no systematic diplomatic distribution."}], "id": "q03"}, {"question": "The demographic collapse of indigenous American populations following European contact was primarily caused by:", "options": [{"text": "European military superiority — specifically, the devastating effectiveness of firearms, steel armor, and cavalry against indigenous armies.", "isCorrect": false, "rationale": "The source directly counters this explanation: 'The \\\"conquest\\\" of the Aztec Triple Alliance was made possible by disease, by Tlaxcalan allies... and by political fragmentation — not simply by Spanish military superiority.' The section identifies epidemic disease as 'the primary engine of European colonial success.'"}, {"text": "Epidemic disease — specifically, the introduction of Eurasian pathogens like smallpox and measles to populations with zero prior exposure or immunological defense.", "isCorrect": true, "rationale": "The source is unambiguous: 'This demographic catastrophe — not Spanish military genius — was the primary engine of European colonial success in the Americas.' The Americas had been isolated from Eurasian disease pools for ~12,000 years; populations had no immunological defense against smallpox, measles, typhus, or influenza."}, {"text": "Agricultural disruption caused by the destruction of irrigation systems and stored food supplies during Spanish military campaigns.", "isCorrect": false, "rationale": "While colonial disruption of food systems occurred, this is not identified in the source as the primary cause of demographic collapse. Disease moved ahead of armies, killing populations before military contact in many regions."}, {"text": "Forced migration to silver mines, where brutal working conditions and starvation caused rapid population decline across the Americas.", "isCorrect": false, "rationale": "Forced labor in mines (the mita system) did cause significant mortality, but this is covered in Section 4.4. The primary cause of the 50–90% population decline across the Americas was epidemic disease, which preceded and exceeded the effects of forced labor."}], "id": "q04"}, {"question": "By 1620, the population of central Mexico had fallen from roughly 20–25 million in 1519 to approximately 1 million. Which of the following best explains why this population loss was so catastrophic in central Mexico specifically?", "options": [{"text": "Central Mexico was the site of the most intense Spanish military campaigns, exposing the population to decades of sustained warfare.", "isCorrect": false, "rationale": "While the Spanish conquest of Tenochtitlan (1521) was militarily significant, the source attributes the century-long population collapse to epidemic disease, not sustained warfare. The conquest itself took only a few years."}, {"text": "Central Mexico had the densest pre-contact indigenous population, making it the region with the most to lose, and epidemic disease spread more rapidly in dense urban environments.", "isCorrect": true, "rationale": "Central Mexico (the Aztec core) had a pre-contact population of 20–25 million — one of the densest populations in the hemisphere. The source notes that smallpox arrived before Cortés and 'killed the Aztec emperor Cuitláhuac and perhaps half the city's population within months.' Dense population accelerated epidemic spread, and the consequences were correspondingly catastrophic."}, {"text": "Central Mexico's dry climate made it impossible to grow the food crops introduced by the Spanish, causing famine conditions that outlasted the initial conquest.", "isCorrect": false, "rationale": "Central Mexico was agriculturally productive and the Spanish adapted its agriculture rather than destroying it. Climate and food supply are not identified in the source as the explanation for demographic collapse."}, {"text": "Central Mexican people had deliberately avoided all contact with neighboring regions for centuries, making them more genetically isolated and therefore more vulnerable to disease than other populations.", "isCorrect": false, "rationale": "The Aztec state had extensive trade and tributary networks across Mesoamerica; it was not isolated. The vulnerability of all indigenous Americans derived from 12,000 years of separation from Eurasian disease pools, not from local isolation within the Americas."}], "id": "q05"}, {"question": "Sugar cane moved westward to the Americas as part of the Columbian Exchange. Which of the following was the most significant consequence of its establishment in the Caribbean and Brazil?", "options": [{"text": "It displaced indigenous food crops, causing widespread famine that accelerated demographic collapse among Native Caribbean populations.", "isCorrect": false, "rationale": "Indigenous Caribbean populations had largely already been devastated by disease before sugar plantation agriculture fully developed. The most significant consequence of sugar's introduction was the creation of demand for enslaved African labor, not food displacement causing famine."}, {"text": "It became the defining plantation crop that drove demand for enslaved African labor, making the Atlantic slave trade economically central to colonial development.", "isCorrect": true, "rationale": "The source states that 'Sugar cane... became the defining crop of the Caribbean and Brazilian plantation economy — the engine that drove demand for enslaved African labor.' Sugar monoculture required large, disciplined, year-round workforces, directly creating the economic demand that the Atlantic slave trade was designed to supply."}, {"text": "It provided European sailors with a non-perishable source of calories that made longer transoceanic voyages possible without resupply stops.", "isCorrect": false, "rationale": "Refined sugar is not identified in the source as a sailor's provision. The significance of sugar in the Americas was as a plantation export crop generating profit, not as a navigational provisioning solution."}, {"text": "Its rapid spread across the Americas eliminated indigenous food sources like maize and cassava, restructuring American diets toward a European monocultural model.", "isCorrect": false, "rationale": "Maize, cassava, and other American crops were not eliminated; indeed, cassava spread across sub-Saharan Africa. Sugar plantation development occurred in specific coastal tropical zones rather than replacing indigenous agriculture across the continent."}], "id": "q06"}, {"question": "The following is a summary of population estimates for the Americas before and after 1492: 'Pre-contact population: 50–90 million; By 1600: 5–25 million (depending on region).' Which historical argument does this data BEST support?", "options": [{"text": "European colonization of the Americas was primarily motivated by a desire to reduce indigenous population pressure on scarce land and resources.", "isCorrect": false, "rationale": "The data shows a consequence of colonization, not a motivation for it. The source identifies gold, spices, and plantation agriculture as motivations; demographic reduction was an unintended consequence of disease, not a colonial goal."}, {"text": "The demographic catastrophe caused primarily by epidemic disease, not military conquest, was the primary factor enabling European colonial control of the Americas.", "isCorrect": true, "rationale": "The source uses exactly this population data (central Mexico: 20–25 million → ~1 million by 1620) to support the argument that epidemic disease, not military superiority, 'was the primary engine of European colonial success.' Population collapse left surviving societies unable to resist colonial extraction."}, {"text": "Spanish military technology was so advanced relative to indigenous weapons that a small number of conquistadors could defeat entire empires within a few years.", "isCorrect": false, "rationale": "The source explicitly rejects military superiority as the primary explanation: Cortés led 'relatively small forces; they succeeded because they arrived in societies already in demographic free fall.' The data supports disease, not military technology, as the primary factor."}, {"text": "The ecological disruption caused by introduced livestock was the primary driver of indigenous population collapse, as cattle and pigs destroyed food crops.", "isCorrect": false, "rationale": "While introduced livestock did cause ecological disruption (overgrazing, soil compaction), the source identifies epidemic disease as the primary demographic agent. Livestock impacts on vegetation patterns are noted but are not identified as the primary cause of population collapse."}], "id": "q07"}, {"question": "Cassava spread rapidly through sub-Saharan Africa after arriving from the Amazon basin. Which of the following best explains why cassava had such significant demographic effects in Africa?", "options": [{"text": "Cassava had medicinal properties that made African populations immune to the diseases introduced by Portuguese traders operating along the West African coast.", "isCorrect": false, "rationale": "The source makes no claim that cassava had medicinal or disease-resistance properties. Its demographic effect in Africa was caloric, not medical."}, {"text": "Cassava could provide calories in tropical soils that resisted other crops, expanding the agricultural carrying capacity of sub-Saharan Africa and contributing to population growth.", "isCorrect": true, "rationale": "The source states that cassava 'spread rapidly through sub-Saharan Africa, providing calories in tropical soils that resisted other crops.' Like the potato in Europe and maize in China, cassava expanded caloric production in environments previously underexploited by existing crop systems."}, {"text": "Cassava was adopted as a luxury trade good by West African merchants, whose profits from cassava sales funded political consolidation of coastal kingdoms.", "isCorrect": false, "rationale": "Cassava is a starchy caloric staple, not a luxury trade good. Its significance in Africa was as a subsistence and smallholder crop providing food security, not as a commodity generating commercial wealth."}, {"text": "Cassava replaced slave labor in sugar production because it required a smaller workforce to grow, reducing African participation in the Atlantic slave trade.", "isCorrect": false, "rationale": "Cassava is not a sugar-producing crop and was not used as a substitute for slave labor in sugar agriculture. This option confuses separate aspects of the Columbian Exchange."}], "id": "q08"}, {"question": "Which of the following most accurately describes the ecological asymmetry of the Columbian Exchange?", "options": [{"text": "Europe and the Americas each gained roughly equivalent benefits from the exchange — Europe gained new crops while the Americas gained new animals — making the exchange broadly symmetrical in its demographic consequences.", "isCorrect": false, "rationale": "The source explicitly identifies the exchange as 'ecologically asymmetrical': the Americas received diseases that caused demographic catastrophe, while Eurasia and Africa received crops that contributed to population growth. This was not a balanced exchange."}, {"text": "The Americas received Old World diseases causing demographic catastrophe while Eurasia gained American crops contributing to population growth, producing radically unequal consequences.", "isCorrect": true, "rationale": "The source defines the asymmetry precisely: 'Europe gained new foods that would eventually reshape its demography; the Americas lost the vast majority of their human population to pathogens against which they had zero immunological defense.' This asymmetry is why the Columbian Exchange was so historically significant."}, {"text": "Africa was the primary loser in the Columbian Exchange, as New World diseases crossed the Atlantic and devastated West African populations in the same way smallpox devastated the Americas.", "isCorrect": false, "rationale": "The source does not identify New World diseases devastating Africa in the way Eurasian diseases devastated the Americas. Africa received American crops (cassava) that expanded food production and contributed to population growth, not a wave of decimating American pathogens."}, {"text": "The Columbian Exchange was symmetrical in its disease effects because both hemispheres had previously been exposed to similar pathogen environments through the Indian Ocean trade network.", "isCorrect": false, "rationale": "The Americas had been ecologically isolated from Eurasian disease pools for 12,000 years — the opposite of sharing a common disease environment. The Indian Ocean trade network linked Eurasia and Africa but did not connect either to the pre-contact Americas."}], "id": "q09"}, {"question": "A student argues: 'Hernán Cortés defeated the Aztec empire because Spanish guns and steel weapons were overwhelmingly superior to Aztec military technology.' Based on this section, which of the following is the most historically accurate critique of this argument?", "options": [{"text": "The argument is accurate — Spanish military technology was the decisive factor, and the disease narrative is a modern attempt to diminish Spanish military achievement.", "isCorrect": false, "rationale": "The source directly refutes this: 'Cortés and Pizarro led relatively small forces; they succeeded because they arrived in societies already in demographic free fall.' The section explicitly states that explaining conquest primarily through military terms earns lower AP scores than integrating disease causation."}, {"text": "The argument understates the role of epidemic disease, which reached Tenochtitlan before Cortés, killed the Aztec emperor, and devastated the city's population — as well as the role of Tlaxcalan allies and political fragmentation within the Aztec state.", "isCorrect": true, "rationale": "The source states: 'When Cortés's forces besieged Tenochtitlan in 1521, they were not simply military conquerors — they were inheriting a city already devastated by a smallpox epidemic.' Disease, Tlaxcalan alliance, and Aztec political fragmentation are all identified as necessary causes the student's argument omits."}, {"text": "The argument is partly correct but needs to add the role of Portuguese navigational technology, which gave Spanish forces access to better tactical maps of the Aztec road system.", "isCorrect": false, "rationale": "Portuguese navigational technology (caravels, astrolabes) was maritime, not relevant to inland Aztec conquest tactics. This option confuses Section 4.1's content with Section 4.2's context."}, {"text": "The argument should acknowledge that Spanish horses, not steel weapons, were the decisive military advantage, since horses enabled rapid cavalry charges that Aztec foot soldiers could not withstand.", "isCorrect": false, "rationale": "While horses gave Spanish forces mobility advantages, the source's key concept identifies epidemic disease — not any single weapon or tactic — as the primary agent of conquest. Adding horses as a correction still leaves out disease, which the section identifies as most important."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
