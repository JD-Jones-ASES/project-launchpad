        <h1>QUIZ</h1>
        <div class="subtitle">AP World History: Modern &mdash; The Origins of Industrialization in Britain</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

<script>
var QUESTIONS = [{"question": "The enclosure movement was essential to British industrialization primarily because it", "options": [{"text": "Generated capital for investment in factories by increasing agricultural exports to European markets", "isCorrect": false, "rationale": "The enclosure movement's key contribution to industrialization was not export capital but labor supply — it displaced rural peasants and created the industrial workforce."}, {"text": "Displaced millions of peasants from the land, creating a mobile rural population that migrated to industrial towns as factory labor", "isCorrect": true, "rationale": "The source explains that enclosure 'dramatically increased agricultural productivity but also displaced millions of peasants from the land, creating a mobile rural population that migrated to growing industrial towns in search of wages — providing the proletariat that factory production required.'"}, {"text": "Brought previously uncultivated land under production, expanding Britain's food supply to feed the growing industrial population", "isCorrect": false, "rationale": "While enclosure did increase agricultural productivity, the source focuses on its role in creating the industrial labor force through displacement, not on food supply expansion as its key industrial contribution."}, {"text": "Allowed landlords to invest profits from agriculture directly into textile mills and iron foundries", "isCorrect": false, "rationale": "While there were connections between agricultural capital and industrial investment, the source emphasizes the enclosure movement's role in creating the labor force (proletariat), not as a direct source of factory investment capital."}]}, {"question": "Read the following: 'Historians Eric Williams and Joseph Inikori have documented the direct financial links between the slave economy and early industrial investment.' This evidence challenges which common interpretation of the Industrial Revolution?", "options": [{"text": "The argument that British industrialization was caused primarily by steam technology and mechanization", "isCorrect": false, "rationale": "The Williams/Inikori argument challenges the self-contained British domestic narrative, not a specifically technological explanation. The target is the framing that British industrialization was purely domestic, not the acknowledgment of technology's role."}, {"text": "The narrative that British industrialization was a purely domestic achievement produced by British ingenuity, institutions, and work ethic", "isCorrect": true, "rationale": "The source states that 'a common narrative presents Britain's Industrial Revolution as the product of British ingenuity, Protestant work ethic, and rational market institutions' and then explicitly argues this narrative is 'incomplete' — citing Williams and Inikori on the slave economy's financial links to industrial investment."}, {"text": "The claim that the enclosure movement was the primary mechanism creating Britain's industrial workforce", "isCorrect": false, "rationale": "The Williams/Inikori argument is about capital from the slave trade, not about the enclosure movement's role in labor supply. These are separate arguments about different inputs to industrialization."}, {"text": "The Marxist argument that industrial capitalism inevitably produces class conflict between workers and owners", "isCorrect": false, "rationale": "Williams and Inikori were making a historical argument about the origins of industrial capital — connecting it to the slave trade — not engaging with Marxist class-conflict theory."}]}, {"question": "James Watt's improved steam engine was transformative for industrialization compared to earlier steam engines primarily because", "options": [{"text": "It consumed coal more efficiently, reducing the cost of energy for existing mining and textile operations", "isCorrect": false, "rationale": "While efficiency was a benefit, the key innovation was functional — converting reciprocal (back-and-forth) motion into rotary motion that could drive machinery across many industries, not just efficiency in existing operations."}, {"text": "It converted reciprocal pump motion into rotary motion, allowing steam power to drive machinery across industries including textiles, iron foundries, and transportation", "isCorrect": true, "rationale": "The source states that earlier steam engines 'had been used only to pump water from mines' while 'Watt's rotary steam engine could power machinery directly, making it applicable to textile mills, iron foundries, and eventually transportation.'"}, {"text": "It used coal found only in Britain, giving Britain a technological monopoly that other nations could not replicate", "isCorrect": false, "rationale": "Other coal-producing nations (Belgium, Germany, the United States) adopted steam technology; Britain's advantage was earlier access and application, not a monopoly on coal or the technology."}, {"text": "It was the first device capable of producing mechanical motion from heat, with no prior technology having achieved this principle", "isCorrect": false, "rationale": "Earlier steam engines (Thomas Newcomen's atmospheric engine) also produced mechanical motion from heat. Watt's innovation was the rotary motion and the partnership with Boulton that made it commercially viable, not the basic principle."}]}, {"question": "By 1860, two-thirds of Britain's cotton imports came from the American South. This fact is historically significant because it demonstrates", "options": [{"text": "That British and American industrial economies were competitors who deliberately coordinated their production to avoid market conflict", "isCorrect": false, "rationale": "Britain and the U.S. were not deliberate coordinators; Britain imported slave-grown American cotton because it was the cheapest and most abundant source. The relationship was economic dependency, not coordination."}, {"text": "That British industrialization — especially its most important sector, the textile industry — was directly dependent on enslaved labor in the American South", "isCorrect": true, "rationale": "The source explicitly states that 'the mechanized cotton industry — the engine of British industrialization — consumed raw cotton grown almost entirely by enslaved people in the American South.' The 1860 statistic (two-thirds of cotton imports from the South) makes this dependency concrete."}, {"text": "That British abolition of the slave trade in 1807 had no practical effect on the British economy's reliance on slavery-connected production", "isCorrect": false, "rationale": "While this connection is implied, the source's point is about the structural dependency, not about the effectiveness of the slave trade abolition. The question asks what the two-thirds statistic specifically demonstrates."}, {"text": "That the American Civil War would inevitably cause a British economic crisis by disrupting its most important import", "isCorrect": false, "rationale": "While the American Civil War did disrupt British cotton supply ('cotton famine'), the source does not present the 1860 statistic as a prediction about the Civil War's economic effects."}]}, {"question": "Which combination of factors BEST explains why Britain industrialized before China, India, or Continental Europe, despite comparable or superior craft traditions in those regions?", "options": [{"text": "British workers were inherently more innovative and industrious than workers in other regions due to cultural characteristics", "isCorrect": false, "rationale": "The source explicitly rejects the 'Protestant work ethic' explanation as incomplete. The factors it identifies are structural: coal deposits, financial system, property rights, political stability, enclosure, and access to slave-produced inputs."}, {"text": "Britain possessed coal near navigable waterways, a sophisticated financial system, legal property protections, and access to capital and labor produced by the Atlantic slave economy", "isCorrect": true, "rationale": "The source identifies exactly these factors: coal deposits near navigable rivers, the Bank of England and capital markets, property rights and patents, political stability, enclosure-created labor force, and the capital and raw materials provided by the Atlantic slave economy."}, {"text": "Britain had the largest colonial empire, providing both raw materials and markets unavailable to non-colonial powers", "isCorrect": false, "rationale": "While colonial markets mattered, Britain did not have the largest colonial empire in this period — Spain and Portugal had larger American empires. The source's explanation involves more specific structural factors."}, {"text": "Britain's Protestant Reformation created values of thrift and hard work that uniquely prepared it for industrial capitalism", "isCorrect": false, "rationale": "The source explicitly identifies the 'Protestant work ethic' narrative as incomplete, noting that the origins of British industrialization were global (slave trade capital, colonial markets, slave-grown cotton) rather than rooted in cultural-religious values."}]}, {"question": "The Luddite movement (1811–1816) is significant as an example of", "options": [{"text": "A coordinated socialist political movement that demanded public ownership of the means of production", "isCorrect": false, "rationale": "The Luddites were not socialist theorists demanding collective ownership; they were textile workers who destroyed machinery they blamed for destroying their livelihoods — a direct, defensive response, not an ideological movement."}, {"text": "An early form of worker resistance to industrialization, in which textile workers destroyed machinery they blamed for destroying their livelihoods", "isCorrect": true, "rationale": "The source describes the Luddite movement as 'textile workers destroying machinery they blamed for destroying their livelihoods — a form of resistance that the government suppressed with military force,' noting that it 'anticipated the broader labor movements and socialist ideologies' to come."}, {"text": "The first successful trade union movement, which negotiated legal protections for British workers through parliamentary lobbying", "isCorrect": false, "rationale": "Trade unions were illegal under the Combination Acts (1799–1800) during the Luddite period. The government suppressed the Luddite movement militarily — there was no successful parliamentary lobbying."}, {"text": "A royalist political reaction against the French Revolutionary ideals spreading to British workers from France", "isCorrect": false, "rationale": "The Luddites were responding to economic displacement by machinery, not to French revolutionary ideology. Their target was industrial technology, not political ideas."}]}, {"question": "A historian argues that India was 'forcibly de-industrialized' by British industrial capitalism. Which mechanism described in the source BEST supports this argument?", "options": [{"text": "The British government imposed tariffs on Indian goods entering Britain, making Indian products non-competitive in global markets", "isCorrect": false, "rationale": "The source describes the opposite problem: cheap British machine-made cloth undercut Indian hand-weavers in their own markets — the mechanism was low-cost British production, not tariffs on Indian exports."}, {"text": "Cheap British machine-made cloth undercut Indian hand-weavers, destroying India's textile industry while forcing India to serve as a market for British goods", "isCorrect": true, "rationale": "The source states that 'India, for example, was forcibly de-industrialized as cheap British machine-made cloth undercut Indian hand-weavers' — the colonial market relationship meant India absorbed British industrial output while its own producers were destroyed."}, {"text": "Britain extracted India's coal and iron deposits, removing the raw materials Indian industries would have needed for their own industrialization", "isCorrect": false, "rationale": "The source does not describe British extraction of Indian coal or iron as the de-industrialization mechanism. The specific mechanism was cheap British cloth destroying Indian textile production."}, {"text": "The British East India Company forced Indian artisans to produce goods exclusively for export to Britain, preventing them from supplying domestic Indian markets", "isCorrect": false, "rationale": "The source's argument is about competitive pricing destroying Indian industry, not about compulsory production for export. The mechanism was market competition, not forced labor reorientation."}]}, {"question": "The proletariat, as a new social class created by industrialization, was distinct from earlier forms of labor primarily because", "options": [{"text": "Proletarians owned the tools and workshops they used and sold their finished goods directly to consumers", "isCorrect": false, "rationale": "The source describes the proletariat as the class that 'owns no productive property' and 'must sell their labor to employers in exchange for wages' — the opposite of owning tools and workshops."}, {"text": "Proletarians owned no productive property and could only sell their labor to factory owners for wages", "isCorrect": true, "rationale": "The source defines the proletariat as 'the class of industrial wage laborers who, owning no productive property, must sell their labor to employers in exchange for wages' — distinguishing them from artisans, farmers, and other earlier labor forms who had some control over their productive means."}, {"text": "Proletarians were bound to their employers by legally enforceable contracts that prevented them from changing jobs", "isCorrect": false, "rationale": "Unlike serfs, proletarians were legally free — their bondage was economic (they had nothing but their labor to sell), not legal. The Combination Acts outlawed organization but did not legally bind workers to specific employers."}, {"text": "Proletarians were recent immigrants who had moved from Continental Europe seeking industrial wages in British cities", "isCorrect": false, "rationale": "The British industrial proletariat was overwhelmingly formed from British rural workers displaced by enclosure, not Continental European immigrants."}]}, {"question": "Manchester's population growth from roughly 25,000 in 1772 to over 300,000 by 1850 illustrates which broader historical pattern?", "options": [{"text": "Industrial cities offered higher living standards than rural areas, attracting workers through better wages, housing, and public health", "isCorrect": false, "rationale": "The source states the opposite: Manchester's industrial districts had lower life expectancy than rural areas, with 'without adequate sewage, clean water, or housing' — industrial urbanization created worse conditions, not better."}, {"text": "Rapid urban industrial growth generated severe social problems — disease, overcrowding, inadequate infrastructure — before governments could address them", "isCorrect": true, "rationale": "The source notes that Manchester grew 'without adequate sewage, clean water, or housing' and that life expectancy in industrial districts was lower than rural areas — demonstrating that urban industrial growth outpaced the infrastructure needed to sustain a healthy population."}, {"text": "British industrial urbanization was carefully managed by local governments that planned infrastructure before factories were built", "isCorrect": false, "rationale": "The source describes the opposite: unplanned growth where factory towns grew 'faster than any infrastructure to support them.' Government management of industrial urbanization was reactive at best."}, {"text": "Urban migration patterns in industrial Britain were primarily driven by political refugees from the French and Haitian revolutions", "isCorrect": false, "rationale": "British urban migration was driven by enclosure (rural displacement) and industrial wage labor opportunity — not political refugees from the Atlantic revolutions."}]}, {"question": "The Stockton to Darlington (1825) and Liverpool to Manchester (1830) railways are historically significant primarily because they", "options": [{"text": "Demonstrated that steam power could be used for transportation, shrinking distance and lowering the costs of moving goods and people", "isCorrect": true, "rationale": "The source states the railways were 'transforming not just manufacturing but geography: the first commercial steam railway...shrank distance, lowered transport costs, and accelerated the movement of goods and people.'"}, {"text": "Were the first application of steam technology, proving that Watt's engine could be used in industrial settings", "isCorrect": false, "rationale": "Watt's steam engine was applied to textile mills and iron foundries before the railways. The railways represented the application of steam to transportation, not the first industrial use of steam."}, {"text": "Allowed Britain to export its coal directly to Continental European factories, spreading industrialization rapidly", "isCorrect": false, "rationale": "The first steam railways were domestic British lines connecting industrial centers and markets. Coal export to Europe was not their primary significance in the source."}, {"text": "Created the first modern labor unions, as railway workers organized to demand safe working conditions", "isCorrect": false, "rationale": "The source attributes early labor organization to factory workers and the Luddite resistance. Railway construction and early unions are distinct from what made the railways historically significant."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
