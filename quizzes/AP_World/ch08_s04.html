        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_World.html">&larr; Back to AP World History: Modern</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP World History: Modern &mdash; Decolonization: Negotiation versus Armed Struggle</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Gandhi led a 240-mile walk to the sea in March 1930 to illegally harvest salt, defying the British salt monopoly. A historian studying this event argues it was strategically brilliant for reasons that went beyond the immediate legal violation. Which interpretation best captures the source's analysis of the Salt March's strategic logic?", "options": [{"text": "The Salt March succeeded because it united Indian Hindus and Muslims in a single demonstration that embarrassed the British diplomatically on the international stage", "isCorrect": false, "rationale": "The source emphasizes salt's universal accessibility (every Indian used it), its simplicity (sea water evaporation), and the demonstration effect of British enforcement against peaceful protesters. Hindu-Muslim unity was Gandhi's deeper goal throughout his life but is not the specific strategic logic the source assigns to the Salt March."}, {"text": "By choosing salt — used by every Indian, monopolized by Britain, accessible to the poorest — Gandhi identified a form of civil disobedience that was accessible to the entire population and exposed colonial enforcement as brutal", "isCorrect": true, "rationale": "The source specifically analyzes salt's strategic choice: 'a commodity that every Indian used, that the British monopolized through taxation, and that could be produced simply by evaporating sea water — Gandhi identified a form of civil disobedience accessible to the poorest Indian.' It also notes the march attracted international press and 'demonstrated the brutality of British colonial enforcement when police beat peaceful protesters.'"}, {"text": "The Salt March succeeded because it caused an economic crisis by disrupting British salt exports from India, forcing Britain to negotiate", "isCorrect": false, "rationale": "The source focuses on the political and symbolic dimensions of the Salt March — mass accessibility, international press attention, and exposing colonial violence — not on economic disruption to British salt exports as the mechanism of success."}, {"text": "Gandhi chose salt because it had religious significance in Hindu ritual practice, making British taxation of it a direct attack on Indian religious freedom", "isCorrect": false, "rationale": "The source's analysis of salt's strategic choice focuses on its universality and accessibility to the poor — not on religious symbolism. The source does not mention Hindu religious significance of salt."}]}, {"question": "Gandhi's philosophy of satyagraha held that 'means and ends are inseparable — a free India could not be built by violent methods that replicated colonialism's coercive character.' Which of the following historical outcomes most directly supports or complicates this philosophical claim?", "options": [{"text": "Supports it: India achieved independence in August 1947 through a negotiated transfer, demonstrating that nonviolent mass resistance could succeed against a major colonial power", "isCorrect": true, "rationale": "The source presents India's independence as achieved through 'a combination of mass political mobilization and negotiated transfer of power' — one of the largest nonviolent transitions in history. This directly supports Gandhi's claim that means and ends are inseparable: the nonviolent means produced a negotiated (rather than violent) transition."}, {"text": "Complicates it: the Partition of 1947 and communal violence that killed hundreds of thousands occurred precisely because Gandhi refused to use state violence to prevent it", "isCorrect": false, "rationale": "While Partition violence did devastate Gandhi and complicates the picture of nonviolent liberation, the source does not attribute the violence to Gandhi's refusal of state force. The violence resulted from Partition's forced demographic reorganization, not from the independence movement's nonviolent methods."}, {"text": "Supports it: France granted India independence to avoid the kind of violent struggle it was simultaneously fighting in Algeria and Vietnam", "isCorrect": false, "rationale": "France was not India's colonial power — Britain was. France's Algerian and Vietnamese experiences are relevant to British calculations about holding colonies, but they didn't directly cause France to 'grant India' anything."}, {"text": "Complicates it: Gandhi's methods required the rural poor to accept violence from colonial authorities without responding, which critics argued replicated colonial submission rather than challenging it", "isCorrect": false, "rationale": "Frantz Fanon made this kind of critique of nonviolence — but the source attributes this argument to Fanon in the context of Algeria, not as a direct refutation of Gandhi's specific satyagraha philosophy. Presenting it as a direct complication of Gandhi's claim conflates two different thinkers' frameworks."}]}, {"question": "The Algerian War of Independence (1954–62) exposed, according to the source, 'a contradiction within French politics.' What was this contradiction?", "options": [{"text": "France claimed to uphold universal human rights as a republic while fighting to maintain colonial rule through methods (including systematic torture) that violated those rights", "isCorrect": true, "rationale": "The source states exactly this: 'a republic that claimed to uphold universal human rights was fighting to maintain colonial rule through methods that violated those rights.' The FLN launched its armed revolt, France responded with torture, and the international condemnation that followed exposed the contradiction between republican values and colonial practice."}, {"text": "France's National Assembly contained elected Algerian representatives who voted to end the war, but the military refused to follow civilian orders", "isCorrect": false, "rationale": "The source mentions that Algeria had voting representation in the French National Assembly (though massively underrepresenting Algerians), but does not describe Algerian representatives voting to end the war against military resistance. The contradiction the source identifies is between republican ideals and colonial practice, not between civilian and military authority."}, {"text": "France's defeat at Dien Bien Phu in 1954 left it militarily unable to fight a second colonial war simultaneously", "isCorrect": false, "rationale": "The source notes the FLN launched its revolt less than six months after Dien Bien Phu, suggesting the timing was strategic, but the contradiction the source identifies is ideological and moral — between republican values and colonial methods — not military capacity."}, {"text": "French public opinion supported Algerian independence, but the government refused to hold a referendum until de Gaulle came to power", "isCorrect": false, "rationale": "The source mentions that the Algerian War 'brought Charles de Gaulle to power' and ended with a referendum (91% for independence) — but does not describe prior French public opinion as uniformly pro-independence. The contradiction the source identifies is the ideological one between republican values and colonial practice."}]}, {"question": "The source identifies five variables that shaped whether decolonization occurred through negotiation or armed struggle. A student applies this framework to analyze why India achieved negotiated independence but Algeria did not. Which analysis is best supported by the source?", "options": [{"text": "India had a larger economy than Algeria, making its independence more valuable to Britain economically, which incentivized a negotiated settlement", "isCorrect": false, "rationale": "Economic value of the colony is listed as a variable, but the source's analysis emphasizes settler population as the key differentiating factor between India and Algeria. India was economically more important to Britain, but the source's explanation focuses on the structural absence of a large settler population in India (indirect rule over a large indigenous population) rather than economic value as the primary variable."}, {"text": "India had no large settler population with economic and political stakes in continued colonial rule; Algeria had one million European settlers (pieds-noirs) legally dominant over nine million Algerians, giving France strong internal incentives to resist independence", "isCorrect": true, "rationale": "The source explicitly contrasts the two cases: 'Where India had a colonial relationship characterized by indirect rule over a large indigenous population, Algeria illustrated the opposite scenario: a settler colony.' The key concept box identifies 'the presence or absence of a large settler population' as the primary structural variable determining whether compromise was possible."}, {"text": "India's independence movement was led by Western-educated elites who negotiated in terms British policymakers understood; Algeria's movement was led by rural peasants without diplomatic experience", "isCorrect": false, "rationale": "The source presents Gandhi as having explicitly transformed Indian nationalism 'from an elite political movement into a genuinely mass campaign' that mobilized the rural poor. And the FLN's leadership was educated and capable of international diplomacy. This contrast mischaracterizes both movements."}, {"text": "Britain was more willing to grant independence than France because Britain had no territory in Algeria, so French national pride made compromise impossible", "isCorrect": false, "rationale": "Algeria was French — France treated it as 'an integral part of metropolitan France.' The source's explanation focuses on the structural conditions of settler colonialism, not on national pride as a psychological variable distinguishing British and French approaches."}]}, {"question": "Frantz Fanon argued in The Wretched of the Earth (1961) that anti-colonial violence was necessary to 'cleanse' the psychological damage of colonialism. The source notes: 'Fanon's analysis was contested — Gandhi's nonviolent model suggested a different path.' What does this comparison reveal about the debate over decolonization's methods?", "options": [{"text": "Both Fanon and Gandhi believed psychological liberation required military victory over the colonial army", "isCorrect": false, "rationale": "Gandhi explicitly rejected violence, arguing means and ends were inseparable and that a free India could not be built through violent methods. The source presents Gandhi and Fanon as offering contrasting approaches to decolonization, not convergent ones."}, {"text": "Fanon and Gandhi agreed on the goal of cultural and political transformation but disagreed on whether violence was a necessary instrument of psychological liberation", "isCorrect": true, "rationale": "The source notes both thinkers shared the insight that decolonization 'required cultural as well as political transformation' — but Fanon argued violence was necessary to achieve psychological liberation while Gandhi's satyagraha insisted liberation required nonviolent methods that did not replicate colonial coercion. They shared the diagnosis; they disagreed on the cure."}, {"text": "Gandhi rejected violence because India's colonial relationship was more brutal than Algeria's, making violence counterproductive", "isCorrect": false, "rationale": "The source presents Gandhi's rejection of violence as a philosophical commitment (means and ends are inseparable), not as a strategic calculation based on comparing the brutality of different colonial situations."}, {"text": "Fanon's argument was irrelevant to Africa and the Caribbean because those regions achieved independence through negotiation", "isCorrect": false, "rationale": "The source specifically states Fanon's analysis 'influenced independence movements across Africa, the Caribbean, and Latin America' — the opposite of irrelevance. Algeria (where Fanon joined the FLN) and many other African independence movements involved armed struggle, not negotiation."}]}, {"question": "Ghana's independence in 1957 under Kwame Nkrumah was 'the first in sub-Saharan Africa,' and seventeen African nations became independent in 1960 alone — the 'Year of Africa.' The source explains these relatively rapid, mostly negotiated transitions primarily as the result of:", "options": [{"text": "American pressure on European colonial powers, who depended on Marshall Plan aid and could not afford to alienate Washington", "isCorrect": false, "rationale": "The source attributes the rapid transition primarily to European colonial powers' own cost-benefit calculations, not to American pressure. The source mentions the Algerian War's 'political damage to France' as accelerating these calculations, not Marshall Plan leverage."}, {"text": "European colonial powers' calculation that the cost of holding colonies by force exceeded the economic benefit — a calculation accelerated by the Algerian War's political damage to France", "isCorrect": true, "rationale": "The source states: 'France and Britain concluded that the cost of holding colonies by force exceeded the economic benefit — a calculation accelerated by the Algerian War's political damage to France.' This is the source's direct explanation for why most sub-Saharan African decolonization was negotiated."}, {"text": "The Soviet Union's active support for sub-Saharan African independence movements, which deterred European military resistance", "isCorrect": false, "rationale": "While the Cold War context shaped colonial calculations, the source attributes the rapid sub-Saharan decolonization primarily to the colonial powers' internal cost-benefit calculation, with the Algerian War as the most relevant accelerant — not to Soviet deterrence."}, {"text": "African independence movements' military strength, which demonstrated to colonial powers that armed resistance would be too costly", "isCorrect": false, "rationale": "The source contrasts sub-Saharan Africa's mostly negotiated transitions with Kenya's Mau Mau uprising and other armed paths. Many transitions (especially in francophone Africa) occurred before significant armed struggle developed. The explanation the source gives is the colonial powers' own calculations, not African military strength."}]}, {"question": "The Mau Mau Uprising in Kenya (1952–60) and the Algerian War (1954–62) both involved colonial responses including mass detention camps and systematic torture. Which of the following AP-style comparisons is best supported by the source?", "options": [{"text": "Kenya and Algeria both demonstrate that settler-colony structures made armed struggle inevitable, since the colonial powers faced the same structural incentives to resist", "isCorrect": false, "rationale": "The Mau Mau Uprising arose primarily from Kikuyu dispossession by British settler farming — settler dynamics were involved. However, Kenya did ultimately gain independence in 1963 through a process that included negotiation after the suppression of the Mau Mau. The source does not characterize Kenya as identical to Algeria, and Algeria's settler structure was larger and more legally entrenched."}, {"text": "Both cases illustrate that colonial violence was not unique to 'backward' or authoritarian colonial powers but was practiced by democratic republics (France) and a liberal empire (Britain) claiming to defend civilized values", "isCorrect": true, "rationale": "The source notes that France's torture was 'condemned internationally' and exposed a contradiction in a republic claiming to uphold human rights. It also notes Kenya's atrocities were 'suppressed from British public memory for decades' — only documented in detail by historians in the 2000s. Both cases illustrate the gap between democratic self-presentation and colonial practice."}, {"text": "Kenya and Algeria were identical cases because both were settler colonies that could only achieve independence through decades of armed struggle", "isCorrect": false, "rationale": "Kenya gained independence in 1963 — within a decade of the Mau Mau's beginning — while Algeria's war lasted eight years (1954–62). The source does not present them as identical; it places them on 'a wide spectrum of decolonization experiences.'"}, {"text": "Both cases show that indigenous populations lacked the military capacity to defeat colonial armies and relied entirely on international diplomatic pressure for independence", "isCorrect": false, "rationale": "The source emphasizes that armed struggle was a real force in both cases, even if not sufficient alone. It does not characterize indigenous military capacity as negligible or attribute independence entirely to diplomatic pressure."}]}, {"question": "Between 1945 and 1980, more than eighty new nations emerged from colonial rule. Which of the following best characterizes the broader historical significance of this process, as framed by the source?", "options": [{"text": "Decolonization was primarily a Cold War phenomenon: newly independent states were created by superpower competition for allies", "isCorrect": false, "rationale": "The source presents decolonization as 'arguably the most consequential political transformation of the twentieth century' driven by indigenous independence movements, colonial cost-benefit calculations, and the character of individual colonial relationships. Cold War pressures 'shaped every colonial power's calculations' but were one factor among several, not the primary driver."}, {"text": "Decolonization was the most consequential political transformation of the twentieth century, adding more than a billion people to the community of self-governing peoples and reshaping every major international institution", "isCorrect": true, "rationale": "This is nearly verbatim from the source's opening characterization: 'arguably the most consequential political transformation of the twentieth century... adding more than a billion people to the community of self-governing peoples and reshaping every major international institution.' The scale and systemic consequences are the source's framing."}, {"text": "Decolonization succeeded primarily because the United Nations pressured European colonial powers to grant independence through Resolution 1514", "isCorrect": false, "rationale": "The source does not attribute decolonization primarily to UN pressure. It explains the variation in paths through structural variables (settler populations, economic value, Cold War pressures) and gives the UN a supporting, not leading, role."}, {"text": "Decolonization was a smooth, peaceful process because colonial powers recognized the inevitability of independence after WWII", "isCorrect": false, "rationale": "The source explicitly states decolonization 'ranged from negotiated transfers of power... to bloody wars of national liberation in which indigenous populations fought for years or decades.' Characterizing it as 'smooth and peaceful' directly contradicts the source's opening characterization."}]}, {"question": "Gandhi insisted that 'a free India could not be built by violent methods that replicated colonialism's coercive character.' This principle most directly reflects which SPICE-T connection?", "options": [{"text": "Technology — Gandhi recognized that Indian independence movements lacked the military technology to defeat British forces", "isCorrect": false, "rationale": "Gandhi's rejection of violence was a philosophical and moral commitment, not a pragmatic assessment of military technology. The Technology theme concerns material tools and their use — Gandhi's satyagraha philosophy is a Political and Cultural commitment, not a technological calculation."}, {"text": "Political + Cultural — the means of achieving independence would shape the culture and political structure of the independent state; violent revolution would produce a violent state", "isCorrect": true, "rationale": "Gandhi's 'means and ends are inseparable' principle is fundamentally about the relationship between Political methods and Cultural values: a state built through coercive violence would reproduce colonial coercive structures. This is a SPICE-T Political + Cultural connection — political method shapes cultural outcome."}, {"text": "Economic — Gandhi recognized that economic disruption through salt production would undermine the British colonial economy", "isCorrect": false, "rationale": "While the Salt March had an economic dimension (salt taxation), Gandhi's principle that 'means and ends are inseparable' is a philosophical/ethical statement about method and outcome — not an economic analysis."}, {"text": "Interaction with Environment — Gandhi's return to artisan salt production represented opposition to industrialization", "isCorrect": false, "rationale": "While Gandhi did have views on industrialization, the source's analysis of the Salt March focuses on its political symbolism and mass accessibility, not on environmental or industrial themes."}]}, {"question": "Indian independence was granted in August 1947 and accompanied by the Partition of the subcontinent into India and Pakistan, triggering one of the largest mass migrations in history and communal violence killing an estimated 200,000 to 2 million people. This outcome best illustrates which analytical point about decolonization?", "options": [{"text": "Decolonization was always accompanied by violence, regardless of whether independence was achieved through negotiation or armed struggle", "isCorrect": false, "rationale": "While India's negotiated independence was accompanied by catastrophic Partition violence, characterizing all decolonization as 'always accompanied by violence regardless of method' overstates the evidence and contradicts the source's comparative framework, which distinguishes cases precisely to explain variation in outcomes."}, {"text": "Negotiated independence, even when achieved through nonviolent methods, could have devastating consequences arising from colonial-era policies that independence transferred rather than resolved — particularly the colonial manipulation of communal identity", "isCorrect": true, "rationale": "India's Partition violence illustrates that nonviolent independence did not guarantee a peaceful transition — colonial policies had deepened communal divisions that independence could not immediately overcome. Gandhi worked his entire life for Hindu-Muslim unity precisely because colonialism had sharpened these divisions, and the negotiated settlement ultimately produced catastrophic communal violence. The independence method (negotiated) and the post-independence violence were both shaped by the colonial inheritance."}, {"text": "The Partition demonstrated that Gandhi's philosophy had failed, since India was divided rather than unified at independence", "isCorrect": false, "rationale": "The source does not frame Partition as Gandhi's failure. Gandhi was 'devastated by the violence' and was assassinated by a Hindu nationalist who blamed him for Partition's concessions to Muslims — the source presents Gandhi as having opposed Partition, not as having caused it."}, {"text": "Partition was deliberately engineered by Britain as a strategy to keep India and Pakistan weak and dependent on continued British influence", "isCorrect": false, "rationale": "The source does not present Partition as a deliberate British strategy of continued domination. It describes Partition as accompanying the transfer of power and as 'triggered' communal violence — but does not characterize it as a British divide-and-rule engineering strategy."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
