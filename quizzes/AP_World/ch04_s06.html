<body>
<div class="quiz-container">

        <h1>QUIZ</h1>
        <div class="subtitle">AP World History: Modern &mdash; Synthesis: Reorganization of Global Hierarchies</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "The section argues that 'expansion' is a less accurate framework for the period 1450–1750 than 'reorganization.' Which of the following best explains why?", "options": [{"text": "'Expansion' accurately describes the period because European populations literally expanded geographically into previously uninhabited territories, filling empty ecological niches.", "isCorrect": false, "rationale": "The territories were not empty — they were 'already inhabited by complex societies that responded to contact in complex ways,' as the source explicitly states. The 'expansion into empty world' narrative is precisely what the reorganization framing rejects."}, {"text": "'Reorganization' is more accurate because transoceanic contact restructured existing hierarchies — elevating some actors while catastrophically diminishing others — rather than simply extending European presence into a passive world.", "isCorrect": true, "rationale": "The source states directly: 'A more accurate framework is reorganization: transoceanic interconnection reorganized existing hierarchies of power and wealth, elevating some actors (Atlantic European states, West African slave-trading elites, creole plantation owners) while catastrophically diminishing others (indigenous Americans, West African communities that supplied enslaved people, and the enslaved themselves). No region was simply \\\"found\\\" and incorporated.'"}, {"text": "'Reorganization' is preferred because it acknowledges that European cultures were also changed by contact with indigenous American and African cultures, not just that non-European societies were changed by Europeans.", "isCorrect": false, "rationale": "While European cultures were indeed transformed by contact, the source's primary argument for 'reorganization' over 'expansion' is about the restructuring of global power hierarchies — winners and losers — not about bidirectional cultural exchange as the main point."}, {"text": "'Expansion' implies military conquest, while 'reorganization' is more accurate because the period was characterized by entirely peaceful commercial exchanges rather than violence.", "isCorrect": false, "rationale": "The period was characterized by extreme violence — the source explicitly discusses epidemic disease, the slave trade, the Banda massacre, and coerced labor systems. The distinction between 'expansion' and 'reorganization' is not about peaceful vs. violent exchange."}], "id": "q01"}, {"question": "In 1450, Europe was 'by global standards, a peripheral region.' Which of the following best supports this characterization?", "options": [{"text": "European states had no written legal codes in 1450 and relied entirely on oral tradition for governance, unlike the sophisticated bureaucracies of China and the Ottoman Empire.", "isCorrect": false, "rationale": "This is factually wrong — European states had well-developed written legal traditions in 1450 (Roman law, canon law, common law). The source's evidence for Europe's peripheral status is based on economic and demographic comparisons, not legal or cultural ones."}, {"text": "The most sophisticated financial institutions were in China and the Islamic world; the largest cities were in China and the Ottoman Empire; the most extensive trade networks were the Indian Ocean system and the overland Silk Roads.", "isCorrect": true, "rationale": "The source uses exactly this evidence: 'The most sophisticated financial institutions were in China and the Islamic world. The largest cities were in China (Nanjing, Beijing) and the Ottoman Empire (Constantinople/Istanbul). The most extensive trade networks were the Indian Ocean system and the overland Silk Roads — neither centered on Europe.'"}, {"text": "European states in 1450 lacked gunpowder weapons, which gave Chinese and Ottoman armies overwhelming military advantages over any European force.", "isCorrect": false, "rationale": "European states had gunpowder weapons in 1450; the technology had diffused from China through the Islamic world to Europe well before this date. The source's argument about European peripheral status does not rest on a firearms gap."}, {"text": "European agricultural productivity in 1450 was so low that most of the population experienced chronic famine, unlike the more productive agricultural systems of East Asia and the Americas.", "isCorrect": false, "rationale": "While European agriculture was less productive per acre than Chinese in some respects, chronic famine is too strong a characterization. The source's specific evidence for European peripherality is financial institutions, city size, and trade network centrality."}], "id": "q02"}, {"question": "The section argues that the shift in global power toward Atlantic Europe by 1750 was NOT primarily caused by European cultural or technological superiority in any comprehensive sense. What does the source identify as the actual explanation?", "options": [{"text": "European states developed democratic political institutions that gave them superior military organization and economic efficiency compared to the autocratic states of Asia.", "isCorrect": false, "rationale": "The source does not identify democratic institutions as the explanation. The actual explanation identifies a specific combination of geographic, biological, and institutional factors — not political system type."}, {"text": "The specific combination of deep-water navigation technology, Atlantic geography, epidemic disease, joint-stock financing, and American resource endowments gave Atlantic Europe an asymmetric advantage in the specific configuration of opportunities that transoceanic contact created.", "isCorrect": true, "rationale": "The source states: 'What changed was the specific combination of deep-water navigation technology, Atlantic geography, epidemic disease (as a weapon, however unintended), joint-stock financing, and the specific resource endowments of the Americas (silver, plantation agriculture) that gave Atlantic Europe an asymmetric advantage in the specific configuration of opportunities that transoceanic contact created.'"}, {"text": "European Enlightenment rationalism gave European administrators superior problem-solving capabilities that allowed them to organize colonial extraction more efficiently than any non-European state could.", "isCorrect": false, "rationale": "The Enlightenment is not identified in the source as the explanation; it also post-dates the early period of European expansion. The source explicitly argues against 'European cultural or technological superiority in any comprehensive sense.'"}, {"text": "European states achieved a technological breakthrough in iron production that allowed them to manufacture superior weapons, giving them decisive military advantages over all Asian and American competitors.", "isCorrect": false, "rationale": "The source notes that 'Ming China in 1450 had superior iron production' — the opposite of a European iron advantage. The explanation is not a technology advantage in general but the specific combination of factors that applied to the new Atlantic-transoceanic context."}], "id": "q03"}, {"question": "Which of the following best describes the difference between the Spanish and Dutch colonial models, as discussed in this synthesis section?", "options": [{"text": "The Spanish model was commercial and profit-driven while the Dutch model was primarily ideological, driven by Calvinist missionary goals in Asia.", "isCorrect": false, "rationale": "This reverses the characterizations. The source identifies the Spanish empire as having 'explicit ideological (Catholic) justification' while the Dutch VOC was 'a private corporate enterprise that outsourced empire to shareholders' — commercial in its primary organization."}, {"text": "The Spanish empire was a state enterprise with explicit Catholic ideological justification; the Dutch VOC was a private corporate enterprise that outsourced empire to shareholders — but both were predicated on violence and extraction from non-European populations.", "isCorrect": true, "rationale": "The source's Comparison box states precisely: 'The key difference is institutional: the Spanish empire was a state enterprise with explicit ideological (Catholic) justification; the Dutch VOC was a private corporate enterprise that outsourced empire to shareholders. Both systems were predicated on violence and the extraction of labor and resources from non-European populations.'"}, {"text": "The Dutch model was less violent than the Spanish model because Dutch Calvinist theology prohibited the use of force against non-combatants, while Spanish Catholicism sanctioned conquest.", "isCorrect": false, "rationale": "The source explicitly states 'both systems were predicated on violence' and identifies the Banda massacre as a Dutch atrocity. Dutch colonialism was not less violent; it organized its violence through a corporate rather than state apparatus."}, {"text": "The Spanish model was limited to the Americas while the Dutch model extended only into Asia — ensuring the two powers never competed for the same colonial territories.", "isCorrect": false, "rationale": "The Spanish had colonial presence in Asia (the Philippines) and the Dutch competed with the Portuguese (and later the English) in multiple regions. The two models were not geographically exclusive."}], "id": "q04"}, {"question": "Creole languages and syncretic religions like Candomblé and Vodou emerged in the African diaspora. Which of the following best explains their historical significance?", "options": [{"text": "They represent the successful erasure of African cultural heritage, since enslaved people abandoned their original traditions and adopted entirely European-derived practices.", "isCorrect": false, "rationale": "The source argues the opposite: these cultural forms preserved and transformed African elements precisely because 'those elements represented connection to identity, community, and meaning in conditions designed to destroy all three.' They are hybrid but not erasure."}, {"text": "They represent the cultural creativity of enslaved Africans — blending African traditions with European elements to preserve identity and community under conditions of extreme violence and deprivation.", "isCorrect": true, "rationale": "The source states: 'Enslaved people preserved and transformed African cultural elements precisely because those elements represented connection to identity, community, and meaning in conditions designed to destroy all three.' These were neither purely African nor purely European — hybrid forms produced under violence that became major cultural contributions to the modern world."}, {"text": "They were primarily of interest to European anthropologists, who created and documented these cultural categories as part of colonial administrative record-keeping.", "isCorrect": false, "rationale": "Creole languages and syncretic religions were created by African diaspora communities, not by European anthropologists. The source emphasizes their origins in the conditions of slavery and their significance as African diaspora cultural productions."}, {"text": "They represent evidence that the Middle Passage was less traumatic than historians believe, since enslaved people arrived with enough cultural continuity to reconstruct their original traditions.", "isCorrect": false, "rationale": "The source explicitly states the opposite: these hybrid forms emerged because enslaved people had been stripped of direct cultural continuity. Candomblé and Vodou are hybrid, syncretic reconstructions — not preserved original traditions — produced under conditions of extreme trauma."}], "id": "q05"}, {"question": "The section describes the period 1450–1750 as establishing features of the 'modern world economy' that persisted long after colonial systems were dismantled. Which of the following is cited as one of those lasting features?", "options": [{"text": "The nation-state as the primary unit of international political organization, replacing the city-state and imperial models that had dominated global politics before 1450.", "isCorrect": false, "rationale": "Nation-state development is a political development more associated with the nineteenth century. The source identifies economic structures — price revolution, plantation monoculture, and racial labor hierarchies — as the lasting features of the modern world economy, not the political form of the state."}, {"text": "The plantation system as a template for export-oriented monoculture in tropical regions, which remained dominant in Latin America, the Caribbean, and Southeast Asia through the twentieth century.", "isCorrect": true, "rationale": "The source identifies this explicitly: 'The plantation system established the template for export-oriented monoculture agriculture in tropical regions — a template that remained dominant in Latin America, the Caribbean, and Southeast Asia through the twentieth century.' This is one of the three lasting features cited."}, {"text": "The joint-stock company form, which became the exclusive mechanism for organizing international trade in all subsequent centuries until replaced by multinational corporations in the twentieth century.", "isCorrect": false, "rationale": "While the joint-stock company was historically important, the source identifies different lasting features: global silver circuits, plantation monoculture, and racialized labor systems. The joint-stock form itself was not identified as the lasting economic template."}, {"text": "The European Union's predecessor institutions, which emerged from the need to regulate transoceanic trade disputes between the major maritime powers of the Atlantic seaboard.", "isCorrect": false, "rationale": "European Union predecessors are twentieth-century post-WWII institutions, not products of the 1450–1750 period. The source is discussing economic structures — plantation agriculture, silver circuits, racial labor hierarchies — that persisted from the colonial period."}], "id": "q06"}, {"question": "The section discusses how the Indian Ocean trade related to the rise of Atlantic European commercial dominance. Which of the following accurately describes this relationship?", "options": [{"text": "The Indian Ocean trade was completely destroyed by European military power, and the Ottoman, Indian, and Chinese merchants who had dominated it were replaced entirely by Dutch and English traders.", "isCorrect": false, "rationale": "The source explicitly states the Indian Ocean trade 'had not been destroyed — it remained vigorous.' European companies inserted themselves as 'toll-takers and armed intermediaries' but did not destroy the system they exploited."}, {"text": "The Indian Ocean trade remained vigorous, but European companies (especially the VOC and EIC) inserted themselves as armed intermediaries, extracting profit from trade flows they did not originate.", "isCorrect": true, "rationale": "The source states: 'The Indian Ocean trade had not been destroyed — it remained vigorous — but European actors (particularly the VOC and EIC) had inserted themselves as toll-takers and armed intermediaries, extracting profit from trade flows they did not originate.' This is the precise description of how European commercial dominance operated in the Indian Ocean."}, {"text": "The Indian Ocean trade gradually shifted entirely to the Atlantic as Asian merchants recognized the superior efficiency of Atlantic commercial networks.", "isCorrect": false, "rationale": "No such voluntary shift occurred. The Indian Ocean trade continued to operate on its own terms; European companies imposed themselves through force, not through competitive superiority that drew Asian merchants into Atlantic circuits."}, {"text": "Chinese demand for American silver caused the Indian Ocean trade to collapse, as Chinese merchants redirected their commercial attention from Indian Ocean goods to obtaining silver through the Manila galleon trade.", "isCorrect": false, "rationale": "The Manila galleon trade (Pacific silver route) was important, but it did not collapse the Indian Ocean trade — which continued to carry silk, spices, cotton, and other goods. The two trade systems coexisted."}], "id": "q07"}, {"question": "American silver's connection to Chinese demand is described as a key mechanism of global monetary integration. Which of the following best explains this connection?", "options": [{"text": "China and the Americas had direct commercial contact that allowed silver to move from Potosí to China without passing through Europe, creating a Pacific commercial circuit independent of European control.", "isCorrect": false, "rationale": "The source describes silver flowing 'west to Europe and then east to China' — through European commercial circuits, not bypassing them. The Manila galleon trade (Pacific route) was one path, but the source emphasizes the global circuit through Europe."}, {"text": "China used silver as currency and had insatiable demand for it; American silver flowed west to Europe (paying for manufactured goods) and then east to China (paying for Chinese silks, porcelain, and tea), linking the Americas, Europe, and Asia in a single monetary circuit.", "isCorrect": true, "rationale": "The source states: 'Chinese demand for silver was insatiable, since China used silver as currency; American silver flowed west to Europe and then east to China, paying for Chinese silks, porcelain, and tea.' This describes the global monetary circuit linking all three regions."}, {"text": "China exported silver to the Americas in exchange for tobacco and cocoa, which had become luxury goods in Chinese elite culture after the Columbian Exchange introduced them to Asian markets.", "isCorrect": false, "rationale": "The direction is reversed. China had a net demand for silver (it flowed east to China) and China exported manufactured goods (silk, porcelain, tea) in return. China was not exporting silver or receiving cacao and tobacco in exchange."}, {"text": "Chinese demand for silver was eventually satisfied by 1650, at which point silver stopped flowing east and accumulated in European banking centers, financing the Industrial Revolution.", "isCorrect": false, "rationale": "Chinese demand for silver was not satisfied by 1650; it continued as a structural feature of the Chinese monetary system through the eighteenth century. The source does not claim silver stopped flowing east or that accumulated silver directly financed industrialization."}], "id": "q08"}, {"question": "A student preparing for an AP World History long essay writes: 'Between 1450 and 1750, the world saw continuity in Indian Ocean commerce and Chinese commercial sophistication alongside change in the rise of Atlantic European commercial dominance.' Based on this section, which of the following best evaluates this claim?", "options": [{"text": "The claim is wrong because the Indian Ocean trade was destroyed by European competition and Chinese commerce became entirely dependent on Atlantic silver flows.", "isCorrect": false, "rationale": "The source contradicts this: the Indian Ocean trade 'remained vigorous' and Chinese commercial sophistication 'remained largely outside Atlantic circuits until the nineteenth century.' The continuity claim is well supported."}, {"text": "The claim accurately captures the complexity of the period: Indian Ocean commerce persisted, Chinese commercial sophistication remained largely outside Atlantic circuits, and Atlantic European power rose — but all within a reorganized global hierarchy, not simply parallel and unchanged systems.", "isCorrect": true, "rationale": "The source's AP exam emphasis is exactly this: 'Chinese commercial sophistication remaining largely outside Atlantic circuits until the nineteenth century' and Indian Ocean trade continuing while European actors inserted themselves. The student's claim is accurate, though the 'reorganized hierarchy' framing enriches it."}, {"text": "The claim is partially wrong because Chinese commercial sophistication declined significantly after 1450 as Ming China's isolation policies cut it off from all external trade.", "isCorrect": false, "rationale": "The source states that 'Chinese commercial sophistication remained largely outside Atlantic circuits until the nineteenth century' — not that it declined. China continued to engage in extensive regional trade; it was simply not drawn into the Atlantic commercial system during this period."}, {"text": "The claim is too nuanced for an AP essay — a strong essay should focus exclusively on European expansion without discussing non-European continuities.", "isCorrect": false, "rationale": "AP scoring explicitly values exactly this kind of complexity. The source notes: 'The AP exam's emphasis on continuity and change requires students to identify what changed... and what continued.' Essays that address only change, not continuity, score lower."}], "id": "q09"}, {"question": "Which of the following correctly identifies TWO winners and TWO losers in the reorganization of global hierarchies between 1450 and 1750, as described in this synthesis?", "options": [{"text": "Winners: Ottoman Empire and Aztec state. Losers: Spanish Empire and Dutch Republic.", "isCorrect": false, "rationale": "This inverts the source's analysis. The Ottoman Empire maintained regional power but lost its role as the central intermediary for Eurasian spice trade as Atlantic routes bypassed it. The Aztec state was destroyed. Spain and the Dutch Republic were among the Atlantic European powers that rose to global commercial dominance."}, {"text": "Winners: Atlantic European states and West African slave-trading elites. Losers: indigenous Americans and enslaved West Africans and their communities.", "isCorrect": true, "rationale": "The source explicitly identifies these as winners and losers: 'elevating some actors (Atlantic European states, West African slave-trading elites, creole plantation owners) while catastrophically diminishing others (indigenous Americans, West African communities that supplied enslaved people, and the enslaved themselves).'"}, {"text": "Winners: Ming China and the Mughal Empire. Losers: Spanish Empire and Portuguese Empire.", "isCorrect": false, "rationale": "The source notes that Ming China had superior iron production and the Mughal Empire had a larger GDP than England in 1600, but these facts are used to illustrate that the European rise was not due to comprehensive superiority — not that China and the Mughal Empire were 'winners' in the same sense as Atlantic European states."}, {"text": "Winners: indigenous Americans who gained horses and new crops. Losers: African merchants who lost their trade networks to Portuguese competition.", "isCorrect": false, "rationale": "Indigenous Americans acquired horses (a positive adaptation in some regions) but experienced catastrophic population decline that far outweighed any material gains. African merchants were partly winners (slave-trading elites gained power) and partly losers (communities supplying enslaved people were devastated)."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
