<html lang="en">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP World History: Modern &mdash; Quiz &mdash; Scholastica Codex</title>

    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_World.html">&larr; Back to AP World History: Modern</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP World History: Modern &mdash; The Silk Roads</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A historian studying the Silk Roads notes that merchants 'rarely crossed the entire distance themselves.' Which of the following best explains this pattern?", "options": [{"text": "Imperial governments prohibited foreign merchants from crossing political borders.", "isCorrect": false, "rationale": "Governments did not typically ban cross-border travel; rather, the relay system made it economically rational to trade in segments rather than travel the full route."}, {"text": "A relay system of middlemen allowed goods to change hands multiple times, reducing the need for any single merchant to travel the full distance.", "isCorrect": true, "rationale": "The text explains that goods passed from Chinese to Sogdian to Persian to Arab traders at successive stops, each adding value through translation, currency exchange, and security guarantee."}, {"text": "The physical geography made the full overland journey impossible in a single season.", "isCorrect": false, "rationale": "While terrain was challenging, the primary reason was economic specialization and the relay system, not seasonal impossibility—caravans did traverse the routes, just in segments."}, {"text": "Only state-sponsored merchants possessed the resources to fund long-distance expeditions.", "isCorrect": false, "rationale": "The text describes private merchants—Sogdians, Arabs, Persians—who operated commercially, not state-sponsored monopolies, as the main drivers of Silk Road commerce."}]}, {"question": "Read the following excerpt: 'The Silk Roads are commonly associated with luxury trade, but their most consequential exports were invisible: paper-making, printing, gunpowder, and the magnetic compass all moved westward from China.' According to this passage, what does the author argue mattered most about the Silk Roads?", "options": [{"text": "The volume of silk traded, which funded Chinese imperial expansion.", "isCorrect": false, "rationale": "The passage explicitly argues against a silk-centric view, stating that technology transfer 'ultimately mattered more than silk.'"}, {"text": "The transmission of technologies that transformed warfare, navigation, and intellectual life.", "isCorrect": true, "rationale": "The text states that paper-making, printing, gunpowder, and the compass moved westward and were the 'most consequential' exports—more significant than luxury goods."}, {"text": "The profits that merchant intermediaries extracted from each transaction along the relay chain.", "isCorrect": false, "rationale": "While the text acknowledges that each handoff added cost, the author's argument centers on technology transfer, not middlemen profits, as the most important outcome."}, {"text": "The military advantage gained by western polities that imported Chinese silk.", "isCorrect": false, "rationale": "The text does not argue that silk imports gave military advantages; it is gunpowder and the compass—technologies—that altered warfare and navigation."}]}, {"question": "The Sogdians played a central role in Silk Road commerce for centuries. Which of the following best describes their function in the trading system?", "options": [{"text": "They were the primary producers of silk and controlled Chinese imperial workshops.", "isCorrect": false, "rationale": "Chinese imperial workshops produced the silk; the Sogdians were middlemen traders, not producers. They excelled at commercial intermediation, not manufacturing."}, {"text": "They served as the dominant commercial intermediaries, maintaining diaspora colonies and a widely used commercial language across Central Asia.", "isCorrect": true, "rationale": "The text describes Sogdians as 'paramount middlemen' who established diaspora colonies in Chinese cities and used a script serving commercial correspondence from China to the Crimea."}, {"text": "They operated the caravanserai network under a state monopoly granted by the Tang dynasty.", "isCorrect": false, "rationale": "Caravanserais were government- or merchant-funded, but not operated as a Sogdian state monopoly. The Tang dynasty was Chinese, not Sogdian."}, {"text": "They provided military escorts for caravans in exchange for a share of the cargo.", "isCorrect": false, "rationale": "The text emphasizes Sogdians as commercial intermediaries—translators, brokers, financiers—not as military escorts, though security was part of the relay system generally."}]}, {"question": "The hawala system is best understood as evidence of which broader historical pattern?", "options": [{"text": "The dependence of medieval trade on physical transport of precious metals across long distances.", "isCorrect": false, "rationale": "The hawala system was specifically designed to avoid physically transporting coin, substituting a trust-based credit note system for the dangerous movement of metal."}, {"text": "The development of sophisticated financial instruments to facilitate long-distance trade across politically fragmented territory.", "isCorrect": true, "rationale": "The text describes hawala as a trust-based credit transfer enabling merchants to deposit in one city and withdraw equivalently elsewhere—an innovation solving the problem of transporting coin through bandit-plagued territory."}, {"text": "The role of the Chinese imperial government in standardizing currency across the Silk Road network.", "isCorrect": false, "rationale": "Hawala was developed by Muslim merchants, not the Chinese imperial government. It was a private commercial institution, not a state currency policy."}, {"text": "European banking innovations that were later adopted by Muslim and Asian merchants.", "isCorrect": false, "rationale": "The text explicitly attributes hawala to Muslim merchants. European banking came later and in a different context; the directionality here was not from Europe."}]}, {"question": "Consider the following scenario: A Byzantine emperor in the sixth century wishes to break China's monopoly on silk production. According to the source, what method was actually used to achieve this?", "options": [{"text": "The Byzantines captured Sogdian merchants who knew the silk-making process and forced them to reveal the technique.", "isCorrect": false, "rationale": "The text describes silkworm eggs being smuggled by agents, not the capture of Sogdian merchants. The key was obtaining biological material, not interrogating intermediaries."}, {"text": "Silkworm eggs were smuggled out of China in hollow walking staves, allowing Byzantines to begin domestic silk production.", "isCorrect": true, "rationale": "The text states that the Byzantine Empire broke China's monopoly 'by smuggling silkworm eggs out of China in hollow walking staves around 550 CE,' illustrating the economic significance of this technological control."}, {"text": "Byzantine military forces conquered the Central Asian oasis cities that controlled silk distribution.", "isCorrect": false, "rationale": "There is no mention of Byzantine military conquest of Central Asian cities. The silk monopoly was broken by industrial espionage—smuggling eggs—not conquest."}, {"text": "Chinese silk-workers were recruited to migrate to Constantinople by promise of imperial salary.", "isCorrect": false, "rationale": "The text specifies smuggling of silkworm eggs in walking staves. Worker recruitment is not described as the method; the key was obtaining the biological raw material."}]}, {"question": "Which of the following best describes how the Mongol expansion of the thirteenth century changed the human geography of Silk Road trade?", "options": [{"text": "It ended overland trade by redirecting merchants to maritime routes in order to avoid Mongol-controlled territories.", "isCorrect": false, "rationale": "The Mongol expansion increased overland trade by unifying the steppe under a single authority, not by forcing merchants to maritime alternatives."}, {"text": "It created conditions for cross-continental travel under a single legal authority, attracting new generations of merchants and travelers.", "isCorrect": true, "rationale": "The text states that the Mongols 'created conditions in which a merchant could travel from the Black Sea to Beijing under the protection of a single legal system,' attracting travelers like Marco Polo."}, {"text": "It replaced private merchant networks with state-controlled trade caravans managed by Mongol officials.", "isCorrect": false, "rationale": "The text describes private merchants continuing to operate under Mongol protection; it does not describe Mongol state control replacing private commerce."}, {"text": "It caused Chinese merchants to become the dominant intermediaries, replacing the Sogdians and Arabs.", "isCorrect": false, "rationale": "The text notes Chinese merchants were typically less prominent on overland routes due to Confucian ideology and the relay system; the Mongols did not install Chinese merchant dominance."}]}, {"question": "Buddhism spread along the Silk Roads, as evidenced by the cave complex at Dunhuang. This pattern best illustrates which historical concept?", "options": [{"text": "Religious diffusion driven primarily by military conquest and forced conversion.", "isCorrect": false, "rationale": "The text describes Buddhism spreading through merchants funding monasteries and pilgrimage sites—voluntary commercial patronage, not military conquest."}, {"text": "The role of trade networks in transmitting cultural and religious practices across large distances.", "isCorrect": true, "rationale": "The text explicitly states that 'religion traveled as surely as silk,' with merchants funding Buddhist monasteries along the routes—a classic example of commerce as a vehicle for cultural exchange."}, {"text": "State sponsorship of religion as a tool for consolidating imperial authority over trade routes.", "isCorrect": false, "rationale": "The text emphasizes merchant funding of Buddhist sites, not state-sponsored religious policy as the mechanism of diffusion."}, {"text": "Competition between Buddhism and Islam that led to armed conflict along the trade routes.", "isCorrect": false, "rationale": "The text describes the two faiths competing, blending, and adapting—not armed conflict. The spread was commercial and cultural, not military."}]}, {"question": "Examine the following comparison: The Silk Roads differed from the Indian Ocean maritime network in that the overland system relied heavily on relay merchants and caravanserais, while the maritime system relied on monsoon winds and diasporic port communities. What does this comparison suggest about premodern long-distance trade?", "options": [{"text": "Overland trade was always more profitable than maritime trade because it avoided the risks of ocean voyages.", "isCorrect": false, "rationale": "The text does not claim overland was more profitable; in fact, maritime trade moved heavier bulk goods more cheaply, while overland was better suited to high-value, low-weight items like silk."}, {"text": "Different environmental conditions produced different institutional solutions to the common problem of connecting distant markets.", "isCorrect": true, "rationale": "The relay system and caravanserai infrastructure were solutions to desert and steppe geography; monsoon-dependent dhow networks were solutions to oceanic conditions—both achieved long-distance exchange through context-specific adaptations."}, {"text": "Maritime trade was technologically superior and eventually replaced overland routes entirely.", "isCorrect": false, "rationale": "Both systems coexisted and complemented each other during this period. The text does not describe maritime replacing overland; a 'southern branch' of the Silk Roads even linked to Indian Ocean ports."}, {"text": "Overland trade was limited to luxury goods, while maritime trade moved staple commodities consumed by ordinary people.", "isCorrect": false, "rationale": "Both systems moved luxury and staple goods. The Silk Roads carried porcelain, spices, horses, and paper—not solely luxury items—and the Indian Ocean moved bulk cotton textiles alongside precious spices."}]}, {"question": "Confucian ideology in China ranked merchants below farmers in the social hierarchy. How did this cultural attitude shape Chinese participation in Silk Road trade?", "options": [{"text": "It prevented any Chinese goods from reaching Central Asian markets, because Chinese merchants were forbidden to sell abroad.", "isCorrect": false, "rationale": "Chinese goods, especially silk and porcelain, were abundant in Silk Road commerce; the constraint was on Chinese merchants traveling, not on goods reaching markets via intermediaries."}, {"text": "Chinese merchants were typically less prominent on overland routes, though Chinese goods traveled extensively via non-Chinese intermediaries.", "isCorrect": true, "rationale": "The text states Chinese merchants were 'less prominent than their products on the overland routes' due in part to Confucian ideology discouraging merchant travel, while Sogdian and Arab intermediaries moved Chinese goods."}, {"text": "Chinese imperial policy banned the export of strategic technologies such as paper-making and silk cultivation.", "isCorrect": false, "rationale": "While China tried to protect silk technology (the smuggling of silkworm eggs shows this), the text does not describe a comprehensive ban on technology export as the main effect of Confucian ideology."}, {"text": "Chinese merchants dominated the overland routes despite Confucian disapproval, because profit motive overrode cultural norms.", "isCorrect": false, "rationale": "The text indicates the opposite: Chinese merchants were less prominent on the overland routes, with Confucian attitudes partly explaining this—they were active in Southeast Asian ports instead."}]}, {"question": "A student argues: 'The most important thing the Silk Roads exchanged was silk.' Which of the following evidence from the source would BEST refute this claim?", "options": [{"text": "The Silk Roads also carried horses from Central Asia, which were militarily significant for China.", "isCorrect": false, "rationale": "While true and important, this only shows another commodity moved along the routes. It does not address the deeper argument that non-commodity exchanges (technologies, religions, diseases) mattered more."}, {"text": "The transmission of paper-making, gunpowder, the compass, and Buddhism along the Silk Roads transformed warfare, navigation, intellectual life, and religious geography more profoundly than silk commerce did.", "isCorrect": true, "rationale": "This directly engages the text's central argument: technologies and faiths were the 'most consequential exports' of the Silk Roads, and the text explicitly states that 'the exchange of ideas and techniques ultimately mattered more than silk.'"}, {"text": "Silk was a low-volume commodity that was less economically significant than gold and silver traded along the same routes.", "isCorrect": false, "rationale": "The text actually calls silk the 'paradigmatic Silk Road commodity' because of its high value and low weight—it was economically significant. Denying silk's economic importance misrepresents the source."}, {"text": "The Byzantine Empire eventually broke China's silk monopoly, reducing silk's commercial importance by the medieval period.", "isCorrect": false, "rationale": "While the Byzantine silk industry did emerge, the text does not argue that silk lost commercial importance. This option also does not address what mattered more than silk—the technology and cultural exchange argument."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
