    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_World.html">&larr; Back to AP World History: Modern</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP World History: Modern &mdash; Medical and Agricultural Advances</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Global life expectancy rose from approximately 32 years in 1900 to about 73 years by 2024. A historian argues this is 'the most rapid and dramatic alteration of the basic conditions of life in human history.' Which of the following evidence from the source BEST supports this claim?", "options": [{"text": "Penicillin was discovered in 1928 and mass-produced during the Second World War.", "isCorrect": false, "rationale": "The discovery of penicillin is a cause of the life-expectancy gain, not itself evidence of its unprecedented scale. The question asks for the evidence that the scale of change is historically unmatched."}, {"text": "The gain of more than four decades of life expectancy within a single century represents a pace of biological-condition improvement with no historical parallel.", "isCorrect": true, "rationale": "The text explicitly states 'no transformation in human history has so rapidly and dramatically altered the basic conditions of life' — a gain of more than four decades in one century is the evidence for this claim."}, {"text": "The COVID-19 pandemic (2020–2023) demonstrated that wealthy nations could secure vaccines faster than poor ones.", "isCorrect": false, "rationale": "Vaccine nationalism during COVID-19 illustrates the uneven distribution of medical progress, not the unprecedented overall scale of the life-expectancy gain."}, {"text": "Norman Borlaug estimated that his agricultural work saved one billion lives from famine.", "isCorrect": false, "rationale": "This supports the contribution of agricultural advances to population survival, but it is one specific claim about one cause, not evidence for the overall magnitude of the life-expectancy transformation."}]}, {"question": "A historian studying the Green Revolution argues that Norman Borlaug's development of high-yield grain varieties was ultimately more beneficial than harmful. Which piece of evidence from the source would MOST challenge this interpretation?", "options": [{"text": "India became a net exporter of grain by the 1980s after experiencing devastating famines as recently as 1943.", "isCorrect": false, "rationale": "This evidence supports the historian's interpretation — India's agricultural turnaround is one of the Green Revolution's cited achievements."}, {"text": "High-yield varieties required substantial inputs that smallholders could not afford without debt, displaced traditional agrobiodiversity, depleted aquifers, and disproportionately excluded women and smaller farmers from benefits.", "isCorrect": true, "rationale": "The text details these specific costs: debt for inputs, aquifer depletion in Punjab, displacement of indigenous crop varieties, and exclusion of smallholders, tenants, and women — each directly challenging a purely beneficial assessment."}, {"text": "The Rockefeller and Ford foundations and the Mexican government all supported Borlaug's research.", "isCorrect": false, "rationale": "Institutional support from major foundations and governments speaks to the resources and legitimacy of the research, not to whether the outcomes were more beneficial or harmful."}, {"text": "The Green Revolution focused primarily on wheat, rice, and maize varieties.", "isCorrect": false, "rationale": "The specific crops targeted is descriptive context, not an argument about the Green Revolution's net benefit or harm."}]}, {"question": "Consider the following scenario: A low-income country in sub-Saharan Africa has high childhood mortality from malaria and tuberculosis while simultaneously experiencing rising rates of diabetes and cardiovascular disease among its adult population. This pattern is best explained by which concept?", "options": [{"text": "The Green Revolution, because agricultural surplus has shifted diets toward processed foods.", "isCorrect": false, "rationale": "The Green Revolution is primarily a food-production story focused on grain yield in South Asia and Latin America — the text does not present it as the cause of simultaneous infectious and chronic disease burdens in sub-Saharan Africa."}, {"text": "Vaccine nationalism, because unequal access to vaccines has left malaria and tuberculosis untreated while wealth enables dietary excess.", "isCorrect": false, "rationale": "Vaccine nationalism (COVID-19 context) is a specific phenomenon related to pandemic vaccine access, not the general explanation for simultaneous infectious and chronic disease burdens."}, {"text": "The epidemiological transition in an incomplete state — the country faces both pre-transition infectious diseases and the post-transition rise of chronic non-communicable diseases simultaneously.", "isCorrect": true, "rationale": "The text defines the epidemiological transition and explicitly notes that many low-income nations are 'simultaneously burdened by both infectious diseases (HIV/AIDS, malaria) and rising rates of diabetes and cardiovascular disease' — precisely this scenario."}, {"text": "Agrobiodiversity loss, because reduced crop variety has increased nutritional deficiency and weakened immune systems.", "isCorrect": false, "rationale": "Agrobiodiversity loss is discussed in the context of Green Revolution risks to crop gene pools, not as the explanation for simultaneous infectious and chronic disease patterns in sub-Saharan Africa."}]}, {"question": "The text states that the WHO's Intensified Smallpox Eradication Program (1967–1980) achieved 'the complete elimination of smallpox — the only human disease ever eradicated.' What does this achievement most directly illustrate about medical advances in the twentieth century?", "options": [{"text": "That wealthy nations developed and entirely funded global vaccination programs without input from affected populations.", "isCorrect": false, "rationale": "The eradication program was a WHO initiative — a multilateral organization — and used ring vaccination strategies that required extensive local collaboration; the text does not describe it as exclusively funded by wealthy nations."}, {"text": "That systematic global coordination, when applied to a single-pathogen target, could permanently eliminate a disease that had killed humans for millennia.", "isCorrect": true, "rationale": "Smallpox eradication involved the WHO coordinating ring vaccination and surveillance across all nations — demonstrating that organized global coordination could achieve what no individual nation could accomplish alone."}, {"text": "That antibiotic therapy was the decisive tool in defeating the world's most dangerous infectious disease.", "isCorrect": false, "rationale": "Smallpox is a viral disease; antibiotics treat bacterial infections. The eradication program used vaccination, not antibiotics. This confuses two distinct medical tools."}, {"text": "That the epidemiological transition was complete in all nations by 1980.", "isCorrect": false, "rationale": "The text explicitly states that many low-income nations are still in the midst of the epidemiological transition — the eradication of smallpox was a specific targeted achievement, not evidence of a global completed transition."}]}, {"question": "The COVID-19 pandemic exposed what the source calls 'vaccine nationalism.' Which of the following BEST connects this phenomenon to a longer historical pattern discussed in the section?", "options": [{"text": "It shows that genetic engineering can fail under pandemic conditions, necessitating traditional vaccine approaches.", "isCorrect": false, "rationale": "The text does not argue that genetic engineering failed during COVID-19. mRNA vaccines (a genetic technology) were among the primary COVID-19 vaccines. Vaccine nationalism is about distribution, not technology failure."}, {"text": "It illustrates the recurring pattern that medical advances tend to benefit those with existing infrastructure, research capacity, and purchasing power — while disproportionate disease burdens fall on low-income nations.", "isCorrect": true, "rationale": "The text explicitly frames vaccine nationalism as an illustration of the key concept that medical progress benefits most those with 'existing infrastructure, research capacity, and purchasing power' — a pattern repeated across the entire twentieth century."}, {"text": "It demonstrates that the epidemiological transition accelerated in wealthy nations during the pandemic while reversing in low-income countries.", "isCorrect": false, "rationale": "The text does not make this specific causal claim about the epidemiological transition and COVID-19. Vaccine nationalism is about access inequality, not about the epidemiological transition specifically."}, {"text": "It proves that the Green Revolution's approach of technology-transfer from wealthy to poor nations was more equitable than direct pharmaceutical development.", "isCorrect": false, "rationale": "The text presents both the Green Revolution and vaccine nationalism as examples of unequal distribution of benefits — it does not argue that the Green Revolution's model was more equitable."}]}, {"question": "GMO critics in Africa and Asia have raised concerns about 'corporate control of seed supplies.' This concern connects most directly to which SPICE-T theme?", "options": [{"text": "Interaction with Environment (I), because seed corporate control affects biodiversity.", "isCorrect": false, "rationale": "While biodiversity is related to agrobiodiversity loss, the concern about 'corporate control of seed supplies' is primarily an Economic and Political question about market power and sovereignty, not the Environmental theme specifically."}, {"text": "Economic (E) and Political (P) — corporate monopolization of seed patents concentrates market power in ways that limit farmer autonomy and national food sovereignty.", "isCorrect": true, "rationale": "Corporate control of seed supplies is an economic power question (market concentration, patent law, farmer dependency on corporations) that intersects with political sovereignty (governments' ability to regulate food supplies against multinational interests) — core Economic and Political themes."}, {"text": "Cultural (C), because GMO adoption represents the imposition of Western agricultural practices on non-Western cultures.", "isCorrect": false, "rationale": "While cultural concerns about GMOs exist, the text specifically names 'corporate control of seed supplies' as the concern — a market-power issue, not primarily a cultural-imposition argument."}, {"text": "Technology (T), because the concern is that genetic engineering is an unproven technology.", "isCorrect": false, "rationale": "The text notes critics raised multiple concerns; 'corporate control of seed supplies' is specifically about market and political power, not about technical uncertainty."}]}, {"question": "A historical geographer comparing the Punjab region of India in 1970 and 2024 would find which long-term consequence most directly attributable to Green Revolution irrigation practices?", "options": [{"text": "Increased agrobiodiversity as farmers adopted multiple high-yield varieties of wheat and rice.", "isCorrect": false, "rationale": "The text states the opposite: high-yield varieties displaced traditional varieties, reducing agrobiodiversity. The adoption of a small number of high-yield varieties is precisely the cause of reduced diversity."}, {"text": "Severe groundwater depletion, as tube-well irrigation powered by subsidized electricity drew down aquifers faster than rainfall replenished them.", "isCorrect": true, "rationale": "The text explicitly identifies Punjab as the site of severe aquifer depletion resulting from tube-well irrigation under the Green Revolution — 'a deficit now threatening the region's agricultural future.'"}, {"text": "Higher incomes for smallholder farmers, who benefited most from Green Revolution productivity gains.", "isCorrect": false, "rationale": "The text states larger farmers with capital, connections, and secure land tenure benefited most — smaller farmers, tenants, and laborers were sometimes displaced, not enriched."}, {"text": "Elimination of dependence on synthetic fertilizers, as new crop varieties proved more nitrogen-efficient.", "isCorrect": false, "rationale": "The text states the opposite: high-yield varieties required 'substantial inputs of water, fertilizer, and pesticide.' They increased, not eliminated, dependence on synthetic inputs."}]}, {"question": "The discovery of penicillin reduced tuberculosis mortality by roughly 90 percent between 1900 and 2000 in countries where antibiotics were available. The qualifier 'in countries where antibiotics were available' is historically significant because it:", "options": [{"text": "Suggests that tuberculosis was eliminated globally by 2000.", "isCorrect": false, "rationale": "The text notes sub-Saharan Africa continued to bear disproportionate disease burdens including tuberculosis into the twenty-first century — global elimination is explicitly not claimed."}, {"text": "Demonstrates that the antibiotic era ultimately had no effect on mortality in low-income countries.", "isCorrect": false, "rationale": "The text does not claim antibiotics had no effect in low-income countries — it shows uneven distribution, not complete absence. The WHO Expanded Programme on Immunization is one example of extended benefits."}, {"text": "Reveals that the medical transformation was geographically and economically uneven, with life-saving treatments systematically unavailable in regions lacking infrastructure or purchasing power.", "isCorrect": true, "rationale": "The qualifier signals exactly what the section's key concept identifies: medical progress is not neutral in distribution. Countries and communities with infrastructure and purchasing power benefited most; those without them did not."}, {"text": "Shows that tuberculosis was primarily a disease of wealthy industrialized nations, not of the Global South.", "isCorrect": false, "rationale": "The text identifies sub-Saharan Africa as bearing a disproportionate disease burden including tuberculosis — it was, and remains, a disease that fell hardest on low-income populations."}]}, {"question": "The GMO controversy 'illustrates a pattern that recurs across the history of technological change: transformative innovations generate genuine benefits alongside genuine risks, and the distribution of both is shaped by political and economic power.' Which earlier example from this section BEST parallels this pattern?", "options": [{"text": "The eradication of smallpox through the WHO program, which was universally celebrated.", "isCorrect": false, "rationale": "The smallpox eradication program is presented as an unambiguous success without the pattern of contested benefits and risks. It does not parallel the GMO controversy's distribution-of-power dynamics."}, {"text": "The Green Revolution, which dramatically increased food production but also concentrated benefits among larger farmers, depleted groundwater, reduced agrobiodiversity, and excluded women from extension services.", "isCorrect": true, "rationale": "The Green Revolution is explicitly presented with both benefits and costs, and the text notes that 'the distribution of Green Revolution benefits also reflected existing inequalities' — the same distribution-by-power dynamic the GMO pattern illustrates."}, {"text": "The discovery of penicillin, which required no political choices about distribution and simply saved lives wherever it was used.", "isCorrect": false, "rationale": "The text's key concept specifically challenges this framing: medical progress was distributed by existing power structures, not neutrally. The penicillin story itself shows unequal distribution."}, {"text": "The epidemiological transition, in which wealthy nations simply progressed through natural biological stages faster than poor ones.", "isCorrect": false, "rationale": "The epidemiological transition is a descriptive framework, not a technological innovation with contested benefits and risks. The text explicitly rejects the idea that it reflects 'natural' progression rather than political and economic conditions."}]}, {"question": "A student argues: 'The Green Revolution proves that technology, not politics or economics, determines whether people escape famine.' Based on the source, what is the strongest rebuttal to this argument?", "options": [{"text": "Technology had no role in the Green Revolution; it was entirely the product of government land reform.", "isCorrect": false, "rationale": "The text is clear that the Green Revolution's technological achievements — high-yield varieties, synthetic fertilizers, irrigation — were central to its success. This rebuttal overstates the case against technology."}, {"text": "The Green Revolution's benefits were distributed according to pre-existing inequalities — land tenure, access to capital, gender, and institutional access — not simply by technological availability.", "isCorrect": true, "rationale": "The text explicitly shows that 'larger farmers with capital to purchase inputs, connections to access government credit, and secure land tenure benefited most,' while smallholders, tenants, and women were excluded — demonstrating that political and economic structures, not technology alone, determined outcomes."}, {"text": "Norman Borlaug actually opposed the Green Revolution's application in South Asia and Latin America.", "isCorrect": false, "rationale": "The text says the opposite — Borlaug himself estimated his work saved a billion lives and worked with the Rockefeller and Ford foundations to implement the Green Revolution in South Asia and Latin America."}, {"text": "Technology cannot solve famine because food supply is always sufficient; only political will to distribute it is lacking.", "isCorrect": false, "rationale": "This overstates the case against technology. The text shows that the Green Revolution genuinely increased food production and prevented famines — the issue is not that technology is irrelevant but that technology alone does not determine who benefits."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
