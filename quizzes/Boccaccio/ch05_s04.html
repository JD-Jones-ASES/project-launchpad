<script>
var QUESTIONS = [{"question": "According to the introductory commentary, how does the narrative register of Lisabetta's story (IV.5) differ from the story of Tancred and Ghismonda (IV.1)?", "options": [{"text": "It is rhetorical and grand in its dramatic confrontations.", "isCorrect": false, "rationale": "This description refers to the tale of Tancred and Ghismonda (IV.1) rather than Lisabetta's story."}, {"text": "It is quiet, intimate, and characterized by a devastating simplicity.", "isCorrect": true, "rationale": "The text explicitly contrasts the grand rhetoric of IV.1 with the intimate and simple nature of IV.5."}, {"text": "It focuses on the heroic defiance of the lovers against the state.", "isCorrect": false, "rationale": "While both involve tragedy, the 'defiant' register is attributed to the grander rhetoric of the earlier tale."}, {"text": "It utilizes a comic tone to highlight the absurdity of merchant class values.", "isCorrect": false, "rationale": "The commentary describes the story as 'lyrical and haunting' rather than comic or absurd."}], "id": "q01"}, {"question": "What is the primary motivation for the brothers' murder of Lorenzo, according to the 'What to Watch For' analysis?", "options": [{"text": "Inherent personal cruelty and a sadistic nature.", "isCorrect": false, "rationale": "The text states they did not act out of personal cruelty but rather out of specific social concerns."}, {"text": "A desire to inherit their sister's share of the family business.", "isCorrect": false, "rationale": "There is no mention of an inheritance dispute as the catalyst for the murder."}, {"text": "Concerns regarding family honor and commercial reputation.", "isCorrect": true, "rationale": "The text highlights that the brothers' actions are a critique of merchant class values where honor and business image are paramount."}, {"text": "Retaliation for Lorenzo embezzling funds from their shop.", "isCorrect": false, "rationale": "Lorenzo is described as managing their affairs well; the murder is solely due to the affair with their sister."}], "id": "q02"}, {"question": "Where was the father of the three merchant brothers originally from?", "options": [{"text": "Messina", "isCorrect": false, "rationale": "Messina is the city where the brothers currently live and conduct their business, not their father's origin."}, {"text": "San Gimignano", "isCorrect": true, "rationale": "The primary source mentions that the brothers were left rich by their father, who was from San Gimignano."}, {"text": "Pisa", "isCorrect": false, "rationale": "Pisa is the home of Lorenzo, the young man who worked for the brothers."}, {"text": "Salerno", "isCorrect": false, "rationale": "Salerno is associated with the origin of the basil mentioned later in the story."}], "id": "q03"}, {"question": "How do the brothers discover the secret love affair between Lisabetta and Lorenzo?", "options": [{"text": "The maidservant betrayed Lisabetta's trust for a bribe.", "isCorrect": false, "rationale": "The maid helped Lisabetta later, but she was not the source of the initial discovery."}, {"text": "Lisabetta confessed the affair to her brothers in hopes of marriage.", "isCorrect": false, "rationale": "Lisabetta kept the affair secret and only spoke of Lorenzo after he had disappeared."}, {"text": "The eldest brother observed Lisabetta going to Lorenzo's room at night.", "isCorrect": true, "rationale": "The text states the eldest brother saw her 'all unwitting' one night and decided to consult with his brothers."}, {"text": "They found a series of love letters hidden in the shop.", "isCorrect": false, "rationale": "The discovery was based on a visual observation of her movements rather than written evidence."}], "id": "q04"}, {"question": "John Keats's famous retelling of this tale, 'Isabella; or, The Pot of Basil,' was written in which specific poetic form?", "options": [{"text": "Terza rima", "isCorrect": false, "rationale": "While used by Dante, Keats chose a different Italian-originated form for this specific poem."}, {"text": "Blank verse", "isCorrect": false, "rationale": "Blank verse lacks the structured rhyme scheme found in Keats's narrative poem."}, {"text": "Ottava rima", "isCorrect": true, "rationale": "The text notes that Keats used ottava rima, the same stanza form Boccaccio used for his own poetry."}, {"text": "Spenserian stanzas", "isCorrect": false, "rationale": "Although Keats used this form in other works, the text specifically identifies ottava rima for 'Isabella'."}], "id": "q05"}, {"question": "What reason do the brothers give to the public and Lisabetta for Lorenzo's sudden disappearance?", "options": [{"text": "He had been sent away on a business trip.", "isCorrect": true, "rationale": "The brothers claimed they sent him away on business, which was a common occurrence for their firm."}, {"text": "He had returned to his home city of Pisa to marry.", "isCorrect": false, "rationale": "While he was Pisan, the brothers used their own commercial activities as a cover story."}, {"text": "He had died of a sudden, mysterious fever.", "isCorrect": false, "rationale": "Telling people he died would have raised questions about a funeral and burial; a trip was a more convenient lie."}, {"text": "He had been robbed and killed by bandits on the road.", "isCorrect": false, "rationale": "The brothers chose a more mundane explanation to avoid drawing unnecessary attention to his absence."}], "id": "q06"}, {"question": "According to the folk-song provided at the end of the text, which other plant did the speaker use to border the pot of basil?", "options": [{"text": "Rosemary", "isCorrect": false, "rationale": "Rosemary is a common literary herb, but it is not mentioned in the lyrics of the provided song."}, {"text": "Marjoram", "isCorrect": true, "rationale": "The song says, 'With marjoram I bordered it about / In May-time fresh and fair'."}, {"text": "Lavender", "isCorrect": false, "rationale": "Lavender is not listed as a decorative border in the Sicilian song included in the text."}, {"text": "Thyme", "isCorrect": false, "rationale": "While an herb, thyme is not specified as the border plant in the lyrical stanzas."}], "id": "q07"}, {"question": "Why did the brothers decide to move from Messina to Naples at the end of the story?", "options": [{"text": "To expand their merchant business to a larger port.", "isCorrect": false, "rationale": "The move was motivated by fear and guilt related to the murder, not by economic expansion."}, {"text": "They were driven out of town by angry neighbors who loved Lisabetta.", "isCorrect": false, "rationale": "The neighbors noticed her behavior, but the brothers left of their own accord to keep their secret."}, {"text": "They feared the discovery of Lorenzo's head would become public knowledge.", "isCorrect": true, "rationale": "The text states that after finding the head, they feared it would be 'bruited abroad' and took order for their 'privy departure'."}, {"text": "Lisabetta's ghost haunted their house in Messina.", "isCorrect": false, "rationale": "While Lorenzo appeared in a dream, the text does not mention the brothers being haunted as the reason for leaving."}], "id": "q08"}, {"question": "What detail about the discovery of Lorenzo's body in the forest confirms the truth of Lisabetta's dream?", "options": [{"text": "He was wearing a ring she had given him.", "isCorrect": false, "rationale": "The story does not mention a ring as a token of identification."}, {"text": "The body showed no signs of corruption or decay.", "isCorrect": true, "rationale": "The primary source notes that there was 'no trace of corruption or decay' when she first found him."}, {"text": "She found the knife her brothers used at the scene.", "isCorrect": false, "rationale": "The brothers buried him secretly; they did not leave incriminating weapons behind."}, {"text": "He was buried with a lock of her hair.", "isCorrect": false, "rationale": "The text focuses on the visual state of the body rather than buried tokens."}], "id": "q09"}, {"question": "In the folk-song, what does the speaker offer to give in exchange for buying back the 'fair plant'?", "options": [{"text": "Her entire inheritance from her father.", "isCorrect": false, "rationale": "The song mentions a specific currency amount rather than a general inheritance."}, {"text": "A thousand pieces of silver.", "isCorrect": false, "rationale": "The song specifies gold as the currency offered."}, {"text": "A hundred ounces of fine gold and a kiss.", "isCorrect": true, "rationale": "The lyrics say: 'Ounces an hundred of fine gold have I: / Him would I give the whole, / Ay, and a kiss to boot'."}, {"text": "Her life and soul to the 'sorry Christian' thief.", "isCorrect": false, "rationale": "The speaker is dying of grief, but the offer to buy it back involves gold and a physical gesture."}], "id": "q10"}, {"question": "The basil pot in Lisabetta's tale functions as what type of literary device?", "options": [{"text": "An objective correlative: a physical object that externalizes and concentrates an internal emotional state.", "isCorrect": true, "rationale": "The pot of basil — nourished by Lisabetta's tears and watered with her grief, secretly housing Lorenzo's head — transforms an abstract private sorrow into a single, visible, haunting object that carries the full emotional weight of the tragedy."}, {"text": "A symbol of rebirth, showing that love can transcend death and eventually triumph.", "isCorrect": false, "rationale": "The basil thrives on death and ends with the pot's theft and Lisabetta's own death; it symbolizes grief's consuming power, not transcendence or triumph."}, {"text": "A red herring: its value distracts readers from the real tragedy of the brothers' guilt.", "isCorrect": false, "rationale": "The basil pot is the emotional center of the tale, not a distraction. The brothers' guilt is fully present alongside it."}, {"text": "A memento mori, warning readers that all earthly love ends in death.", "isCorrect": false, "rationale": "While the tale is tragic, the pot is a personal grief object rather than a generalized moral warning about mortality."}], "id": "q11"}, {"question": "How does the inclusion of the Sicilian folk-song at the end of Lisabetta's tale affect the story's larger literary context?", "options": [{"text": "It grounds the fictional tale in a real cultural tradition, suggesting the story has genuine roots in popular memory.", "isCorrect": true, "rationale": "By attributing the song to Sicilian tradition, Boccaccio implies the tale is not purely invented but resonates with actual folk memory — elevating it from literary fiction to something approaching cultural myth."}, {"text": "It serves as a comic coda that lightens the tragic tone before the Day IV storytelling concludes.", "isCorrect": false, "rationale": "The song maintains the tale's haunting, grief-filled register; it is not comic and does not lighten the mood."}, {"text": "It provides the brothers' perspective on the events to create a balanced narrative.", "isCorrect": false, "rationale": "The folk-song is told from the perspective of the grieving speaker (Lisabetta's voice), not the brothers'."}, {"text": "It is a formal closing prayer that Filomena uses to end her narration in the traditional way.", "isCorrect": false, "rationale": "The Decameron narrators do not end tales with prayers; the folk-song is a unique feature that authenticates the tale's connection to popular tradition."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
