<script>
var QUESTIONS = [{"question": "In Boccaccio's terminology, what distinguishes a 'beffa' from a 'motto'?", "options": [{"text": "A beffa is a sustained and elaborate deception, while a motto is a brief, witty remark.", "isCorrect": true, "rationale": "The source defines the motto as a quick, pointed remark and the beffa as a sustained trick or practical joke."}, {"text": "A beffa is a verbal correction, whereas a motto is a physical practical joke.", "isCorrect": false, "rationale": "This reverses the definitions, as the motto is the verbal form of wit while the beffa is the deceptive action."}, {"text": "A beffa always involves religious themes, while a motto is strictly secular.", "isCorrect": false, "rationale": "While Ciappelletto's beffa is religious, the terms describe the structure of the wit rather than its specific thematic content."}, {"text": "A beffa is used by the nobility, while a motto is the tool of the lower classes.", "isCorrect": false, "rationale": "The source indicates that both forms of wit are used by various characters across different social strata."}], "id": "q01"}, {"question": "What is the primary target of Boccaccio's satire in his depiction of corrupt clergy members in Day I?", "options": [{"text": "The fallibility of human institutions and hypocrisy.", "isCorrect": true, "rationale": "The commentary explicitly states that Boccaccio targets human institutions and hypocrisy rather than faith or God itself."}, {"text": "The fundamental theological principles of the Christian faith.", "isCorrect": false, "rationale": "The source suggests Boccaccio is not hostile to religion or God, but to the people representing the church."}, {"text": "The lack of intelligence among common friars and monks.", "isCorrect": false, "rationale": "While characters may be deceived, the satire is directed at their moral failure and hypocrisy rather than a general lack of intelligence."}, {"text": "The intervention of divine grace in the lives of sinners.", "isCorrect": false, "rationale": "Boccaccio uses divine grace as a potential framing device (as seen in I.1) rather than the object of his satire."}], "id": "q02"}, {"question": "In Novel I.2, what logic leads Abraham the Jew to convert to Christianity after visiting Rome?", "options": [{"text": "The religion must be divinely supported to flourish despite such internal corruption.", "isCorrect": true, "rationale": "Abraham reasons that a religion surviving such visible corruption at its center must have God's support."}, {"text": "He is deeply moved by the piety and asceticism of the Pope.", "isCorrect": false, "rationale": "Abraham actually observes extreme corruption and skepticism in the papal court, not piety."}, {"text": "He discovers hidden scriptures in Rome that prove Christian doctrine.", "isCorrect": false, "rationale": "His conversion is based on ironic social observation of the Church's survival, not theological research."}, {"text": "He realizes that Christians are more successful merchants than Jews.", "isCorrect": false, "rationale": "While his friend Jehannot is a merchant, Abraham's conversion is based on his observation of the Church's leadership."}], "id": "q03"}, {"question": "According to the commentary on the 'Three Rings' (I.3), what is the core message of Melchisedech's parable?", "options": [{"text": "Human judgment is insufficient to settle which faith is the 'true' one.", "isCorrect": true, "rationale": "The parable suggests that the 'true' faith cannot be settled by argument, necessitating humility and respect."}, {"text": "All religions are equally false and used to deceive the masses.", "isCorrect": false, "rationale": "The source notes that the parable does not say religions are equally false, but that truth is unsettled by human judgment."}, {"text": "Christianity is the 'true ring' but its identity has been lost over time.", "isCorrect": false, "rationale": "The parable avoids identifying one specific religion as the objectively true one to avoid dogmatism."}, {"text": "The Sultan Saladin is the only one capable of determining religious truth.", "isCorrect": false, "rationale": "Saladin is the one asking the question, but the story shows that even powerful leaders cannot settle the matter."}], "id": "q04"}, {"question": "Why is Ciappelletto's false confession in I.1 described as the 'supreme beffa' of the Decameron?", "options": [{"text": "The deception is so successful that a wicked man is venerated as a saint.", "isCorrect": true, "rationale": "The beffa is considered supreme because it achieves the impossible: transforming a lifelong sinner into a holy figure through sustained trickery."}, {"text": "It involves the largest number of people ever tricked in a single tale.", "isCorrect": false, "rationale": "While many are tricked, the 'supremacy' refers to the scale and lasting impact of the transformation of his character."}, {"text": "Ciappelletto manages to steal from the Church during his confession.", "isCorrect": false, "rationale": "His goal in the confession was to deceive the friar regarding his soul, not to commit a physical theft."}, {"text": "It is the only trick in the collection that Boccaccio claims is a true story.", "isCorrect": false, "rationale": "The text does not claim this is uniquely true, but rather focuses on its irony and execution."}], "id": "q05"}, {"question": "The Marchioness of Monferrato (I.5) uses a banquet of chicken to deliver a motto to the King of France. What was the intent of her remark?", "options": [{"text": "To suggest that women are fundamentally the same and he should return to his wife.", "isCorrect": true, "rationale": "Her motto implies that noblewomen are no different from others, shaming the king into abandoning his pursuit of her."}, {"text": "To complain about the poverty of her estate during her husband's absence.", "isCorrect": false, "rationale": "The banquet was 'magnificent,' suggesting wealth; the chicken-only menu was a calculated symbolic choice, not a necessity."}, {"text": "To prove that chicken is the only food suitable for a Crusader.", "isCorrect": false, "rationale": "The meal was a metaphor for her lack of unique 'flavor' compared to other women, intended to rebuff his advances."}, {"text": "To mock the King's previous defeat in battle.", "isCorrect": false, "rationale": "The king was traveling to the Crusades and was visiting her because of her beauty, not her political or military standing."}], "id": "q06"}, {"question": "How does the narrator Panfilo's framing of I.1 affect the interpretation of Ciappelletto's wickedness?", "options": [{"text": "It suggests that God's grace can operate through even the most corrupt instruments.", "isCorrect": true, "rationale": "Panfilo opens the tale by noting that God might use unlikely instruments, which complicates the irony of Ciappelletto's 'sainthood'."}, {"text": "It provides a legal justification for Ciappelletto's crimes.", "isCorrect": false, "rationale": "The framing is theological/narrative, focusing on God's grace rather than legal exoneration."}, {"text": "It proves that Ciappelletto was secretly a good man all along.", "isCorrect": false, "rationale": "The text explicitly describes him as the 'worst human being alive,' making his secret goodness unlikely."}, {"text": "It warns the audience that they will also be judged as harshly as Ciappelletto.", "isCorrect": false, "rationale": "The framing focuses on the mystery of divine grace rather than serving as a direct moral warning to the readers."}], "id": "q07"}, {"question": "In Novel I.8, what specific subject does Guglielmo Borsiere suggest Ermino de' Grimaldi paint to shame his avarice?", "options": [{"text": "Generosity", "isCorrect": true, "rationale": "Guglielmo's one-word motto — suggesting he paint 'Generosity' — shames the miser because it is a concept Ermino has never seen."}, {"text": "Poverty", "isCorrect": false, "rationale": "While Ermino is a miser, 'Poverty' does not highlight the moral virtue he lacks like 'Generosity' does."}, {"text": "The Last Judgment", "isCorrect": false, "rationale": "This would be a standard religious subject, whereas Guglielmo's suggestion is a pointed personal critique."}, {"text": "Hospitality", "isCorrect": false, "rationale": "Though related, the specific word mentioned in the source material for the painting is 'Generosity'."}], "id": "q08"}, {"question": "Which quality does Boccaccio value above almost all others, serving as the common thread between the motto and the beffa?", "options": [{"text": "Ingegno", "isCorrect": true, "rationale": "The text identifies 'ingegno' (intelligence/resourcefulness) as the quality Boccaccio celebrates through both forms of comedy."}, {"text": "Piety", "isCorrect": false, "rationale": "Boccaccio's focus on hypocrisy and clever deceptions suggests that intelligence is valued more than traditional piety."}, {"text": "Chivalry", "isCorrect": false, "rationale": "While some characters are courtiers, the 'engines of comedy' are driven by resourcefulness rather than chivalric codes."}, {"text": "Humility", "isCorrect": false, "rationale": "Although suggested as a response to religious questions in I.3, the primary virtue celebrated in the comic action is intelligence."}], "id": "q09"}, {"question": "According to the comparison with Chaucer, what do Ciappelletto's confession and the Pardoner's sermon both demonstrate?", "options": [{"text": "Truth can emerge from the mouth of a liar.", "isCorrect": true, "rationale": "Both authors explore the paradox of how morally corrupt individuals can produce outcomes or narratives containing truth or holy results."}, {"text": "Clergy members are inherently more wicked than laypeople.", "isCorrect": false, "rationale": "The source states that Boccaccio sees clergy as wicked because they are human, not because of their office."}, {"text": "Oral confessions are legally binding in medieval courts.", "isCorrect": false, "rationale": "The focus of the comparison is on the narrative power and the gap between profession and practice, not legalities."}, {"text": "Satire is an ineffective tool for church reform.", "isCorrect": false, "rationale": "Both authors used satire extensively, suggesting they believed it was a powerful medium for highlighting societal gaps."}], "id": "q10"}, {"question": "In Novel I.4, a young monk escapes punishment for bringing a woman to his cell. How does he achieve this?", "options": [{"text": "He bribes the abbot with a share of his family's inheritance.", "isCorrect": false, "rationale": "The tale's lesson concerns hypocrisy, not financial dealings; the monk exposes the abbot's identical sin rather than paying him off."}, {"text": "He discovers that the abbot himself has committed the same offense and confronts him with this.", "isCorrect": true, "rationale": "Confronted with his own hypocrisy, the abbot has no choice but to pardon the monk; the tale's lesson is that those who judge must first judge themselves."}, {"text": "He convinces the woman to pretend she is his sister visiting from a nearby town.", "isCorrect": false, "rationale": "The monk's escape relies on exposing the abbot's identical secret, not on constructing a false identity for the woman."}, {"text": "He appeals to the Pope's representative who overrides the abbot's authority.", "isCorrect": false, "rationale": "The resolution is entirely local and personal — the abbot backs down because of his own guilt, without any appeal to higher authority."}], "id": "q11"}, {"question": "In Novel I.6, a man is accused before an Inquisitor for allegedly saying Christ himself would drink his wine. How does the accused escape the charge?", "options": [{"text": "He produces witnesses to testify that his words were taken out of context.", "isCorrect": false, "rationale": "The tale's resolution relies on a clever verbal riposte, not on witness testimony."}, {"text": "He points out that Christ suffered for humanity's sins and therefore loves what humanity loves — including good wine.", "isCorrect": true, "rationale": "The Inquisitor, himself a lover of wine, is forced to drop the charge when the man uses theological logic to make wine-appreciation sound devout."}, {"text": "He offers to purchase an indulgence to cover the offense and end the proceedings.", "isCorrect": false, "rationale": "The tale is a critique of the Inquisition's institutional power, resolved through wit rather than financial transaction."}, {"text": "He recants the statement and publicly condemns anyone who would enjoy wine.", "isCorrect": false, "rationale": "The man does not recant; he doubles down cleverly, which is precisely the motto that defeats the inquisitor's charge."}], "id": "q12"}, {"question": "Novel I.10 closes Day I with a tale about Master Alberto defending his love for a young woman despite his advanced age. What virtue does this tale ultimately celebrate?", "options": [{"text": "Youthful passion and its superiority over aged reserve.", "isCorrect": false, "rationale": "The tale actually defends mature love, using Alberto's clever reply to rebuke the young woman's mockery of his age."}, {"text": "Quick wit deployed in response to social mockery — the same wit that runs throughout Day I.", "isCorrect": true, "rationale": "Alberto's parable about leeks (the white root being more virtuous than the green stalk) is a classic motto, closing Day I with a final demonstration of ingegno."}, {"text": "Ascetic renunciation of earthly desire in the face of death.", "isCorrect": false, "rationale": "Alberto does not renounce his love; he defends it with wit, which is a celebration of human passion intelligently expressed."}, {"text": "The loyalty of friendship between a physician and his patient.", "isCorrect": false, "rationale": "Master Alberto is a physician, but the tale's drama centers on social mockery and verbal rebuttal, not medical friendship."}], "id": "q13"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
