<script>
var QUESTIONS = [{"question": "Based on the introduction to Day VI, how does Boccaccio characterize the relationship between 'eloquenza' and intelligence?", "options": [{"text": "Eloquence is viewed as a superficial decorative layer that masks a lack of intellect.", "isCorrect": false, "rationale": "The text explicitly states that eloquence is not mere decoration but a visible manifestation of intelligence."}, {"text": "Eloquence is considered a form of intelligence made visible through the art of speaking well.", "isCorrect": true, "rationale": "Boccaccio defines 'eloquenza' as the art of speaking well and views it as an external sign of an internal mental dexterity."}, {"text": "Eloquence is seen as a separate skill set that often conflicts with practical problem-solving.", "isCorrect": false, "rationale": "The theme of the day focuses on using verbal dexterity specifically to solve problems like avoiding danger or scorn."}, {"text": "Eloquence is defined primarily by the length and complexity of a speaker's narration.", "isCorrect": false, "rationale": "Day VI celebrates brevity and precision, suggesting that eloquence is about the quality and timing of words rather than their quantity."}], "id": "q01"}, {"question": "What structural role does Day VI serve within the overall framework of the Decameron, according to the provided text?", "options": [{"text": "It serves as the thematic conclusion where all prior conflicts are resolved.", "isCorrect": false, "rationale": "While it is a middle point, the text identifies it as a meditation on craft rather than a final resolution for the entire work."}, {"text": "It functions as a central meditation on the craft of storytelling itself.", "isCorrect": true, "rationale": "The source identifies Day VI as the structural center (six of ten days) and a thematic center where Boccaccio reflects on narrative art."}, {"text": "It acts as a transitional period that focuses strictly on physical adventure to bridge the romantic days.", "isCorrect": false, "rationale": "The text notes that Elissa chooses a theme reflecting verbal dexterity over physical adventure."}, {"text": "It is the longest section of the work, intended to provide the most detail on the characters' lives.", "isCorrect": false, "rationale": "The introduction explicitly mentions that Day VI is the shortest of the ten Days."}], "id": "q02"}, {"question": "In the kitchen dispute, what is the specific biological/social point that Licisca argues against Tindaro?", "options": [{"text": "That women are naturally more inclined to silence than men during domestic disputes.", "isCorrect": false, "rationale": "Licisca's own behavior and argument suggest the opposite, as she refuses to be silent and asserts her superior knowledge of women."}, {"text": "That a woman's first sexual encounter must necessarily involve force and the effusion of blood.", "isCorrect": true, "rationale": "Licisca denies Tindaro's claim about Sicofante's wife, asserting instead that women often welcome such encounters and rarely retain their virginity until marriage."}, {"text": "That young girls are too simple to seek out romantic opportunities without parental guidance.", "isCorrect": false, "rationale": "Licisca scoffs at this idea, arguing that girls are not so simple and do not wait for their fathers to arrange marriages."}, {"text": "That the primary cause of marital strife is the husband's inability to provide for the household.", "isCorrect": false, "rationale": "The dispute is specifically focused on female virginity and the reality of women's behavior before and during marriage, not economic factors."}], "id": "q03"}, {"question": "How does the character of Elissa influence the chosen theme for the stories of Day VI?", "options": [{"text": "Her preference for physical adventure leads to a theme of narrow escapes from wild animals.", "isCorrect": false, "rationale": "The text states Elissa appreciates verbal dexterity over physical adventure."}, {"text": "Her reserved and thoughtful nature is reflected in a theme centered on the precision of language.", "isCorrect": true, "rationale": "As a reserved and thoughtful member, Elissa's choice of the 'motto' theme reflects an appreciation for the intellect required for quick wit."}, {"text": "Her intense emotional history as 'Dido' causes her to decree a day of tragic romantic retorts.", "isCorrect": false, "rationale": "While her name is linked to Dido, the text says the brigata turns to something lighter and more playful for Day VI."}, {"text": "Her lack of interest in storytelling leads her to delegate the theme choice to Dioneo.", "isCorrect": false, "rationale": "Elissa is the crowned queen and she specifically decrees the theme herself."}], "id": "q04"}, {"question": "What is the outcome of Dioneo's 'final judgment' on the dispute between Licisca and Tindaro?", "options": [{"text": "He declares that both parties are equally at fault for disturbing the queen's peace.", "isCorrect": false, "rationale": "While they are both sent away, Dioneo takes a specific side in the intellectual debate."}, {"text": "He sides with Licisca, asserting that Tindaro is a fool and her claims are correct.", "isCorrect": true, "rationale": "Dioneo gives judgment 'without more ado,' stating that Licisca is in the right and Tindaro is a fool."}, {"text": "He refuses to judge the matter, claiming it is too vulgar for the company's ears.", "isCorrect": false, "rationale": "Dioneo immediately provides a judgment when prompted by the queen, despite the ribald nature of the topic."}, {"text": "He orders Tindaro to be whipped for his unmannerly behavior toward a senior servant.", "isCorrect": false, "rationale": "It is the queen who threatens both with a whipping if they do not stop the disturbance, not Dioneo."}], "id": "q05"}, {"question": "Which detail regarding the morning routine of the brigata suggests their continued leisure and high social standing?", "options": [{"text": "They spent the morning performing manual labor in the kitchen alongside Licisca and Tindaro.", "isCorrect": false, "rationale": "The company is served by attendants and stays away from the kitchen, which is the source of the 'uproar' they hear from a distance."}, {"text": "They walked through dewy meadows and played games like chess or dice after breakfast.", "isCorrect": true, "rationale": "The text describes them sauntering across the 'dewy mead' and engaging in leisure activities like singing, chess, and dice."}, {"text": "They were forced to return to the palace early due to a sudden summer storm.", "isCorrect": false, "rationale": "They returned to the palace due to the heat of the sun, not a storm."}, {"text": "They fasted all morning to prepare for the intellectual rigor of the day's stories.", "isCorrect": false, "rationale": "The text mentions they 'blithely breakfasted' at tables set with fragrant herbs and flowers."}], "id": "q06"}, {"question": "According to the excerpts, why does Boccaccio include the story of Madonna Oretta in Day VI?", "options": [{"text": "To demonstrate that a story's beauty is inherent regardless of how it is told.", "isCorrect": false, "rationale": "Madonna Oretta's tale is actually a criticism of poor narration, proving that delivery is essential."}, {"text": "To provide a definitive statement on the craft of narration and what can ruin a good story.", "isCorrect": true, "rationale": "The text describes this story as Boccaccio's own statement or meditation on the storytelling craft that animates the entire work."}, {"text": "To introduce a new character who will eventually replace Elissa as queen.", "isCorrect": false, "rationale": "Madonna Oretta is a character within a story told on Day VI, not a member of the brigata."}, {"text": "To argue that only noble knights have the authority to tell stories properly.", "isCorrect": false, "rationale": "The story involves Madonna Oretta's gentle criticism *of* a knight's poor narration, suggesting the opposite."}], "id": "q07"}, {"question": "What is the meaning of the Italian term 'motto' as used in the context of Day VI?", "options": [{"text": "A long, persuasive speech used to win a legal debate.", "isCorrect": false, "rationale": "The 'motto' is specifically described as witty and brief, contrasting with long speeches."}, {"text": "A witty or pointed remark delivered at exactly the right moment.", "isCorrect": true, "rationale": "The text defines 'motto' as an 'apt retort' used to avoid loss, danger, or scorn through verbal timing."}, {"text": "A traditional proverb passed down through generations of peasants.", "isCorrect": false, "rationale": "While proverbs can be short, a 'motto' in this context is an improvised, clever response to a specific situation."}, {"text": "A secret code used by the brigata to identify one another in the kitchen.", "isCorrect": false, "rationale": "The term refers to the literary device of the witty retort, not a literal password."}], "id": "q08"}, {"question": "How does Licisca justify her claim to have superior knowledge of women's behavior over Tindaro?", "options": [{"text": "She has read many ancient books on the subject of female psychology.", "isCorrect": false, "rationale": "Licisca relies on her lived experience and community observation, not academic study."}, {"text": "She is advanced in years and has closely observed the 'tricks' of her neighbors.", "isCorrect": true, "rationale": "Licisca asserts she has 'not lived for nothing' and claims to know how many tricks married dames play their husbands based on her neighborhood knowledge."}, {"text": "She was specifically instructed by the queen to act as an expert on the matter.", "isCorrect": false, "rationale": "Licisca's outburst was spontaneous and actually interrupted the queen's attempt to start the session."}, {"text": "She claims that as a servant, she sees things that noblewomen hide.", "isCorrect": false, "rationale": "While she is a servant, her argument is based on her general experience and her neighborhood, not specifically her status in the household."}], "id": "q09"}, {"question": "True or False: The tales of Day VI are notable for being the longest and most detailed in the Decameron to emphasize the importance of eloquence.", "options": [{"text": "True — length and detail are essential for demonstrating rhetorical mastery.", "isCorrect": false, "rationale": "The text explicitly says Day VI is the shortest and its tales are among the briefest, emphasizing precision over length."}, {"text": "False — Day VI is the shortest, emphasizing brevity and precision in its witty remarks.", "isCorrect": true, "rationale": "Day VI is characterized by its brevity; eloquence here is demonstrated through perfectly timed, short remarks rather than long narrations."}, {"text": "True — because Boccaccio needed many pages to explain the art of the 'motto'.", "isCorrect": false, "rationale": "The 'motto' is by definition a brief, witty retort, and the tales illustrating it are correspondingly short, not lengthy."}, {"text": "False — Day VI has no tales at all; it is entirely devoted to the Licisca-Tindaro dispute.", "isCorrect": false, "rationale": "Day VI does contain tales, including the story of Madonna Oretta; the kitchen dispute is only part of the cornice introduction to the Day."}], "id": "q10"}, {"question": "The Licisca-Tindaro dispute erupts just as the queen is about to begin the formal session. What narrative function does this kitchen interruption serve within the Decameron's structure?", "options": [{"text": "It dramatizes the very theme of the day by showing that wit and pointed speech occur naturally in all social strata, not just in the stories.", "isCorrect": true, "rationale": "Licisca's forceful argument is itself a kind of motto — a bold, pointed assertion delivered with the confidence of lived experience. The cornice, usually a civilized frame, enacts the day's theme before the formal tales even begin."}, {"text": "It is a comic interlude designed purely to make the reader laugh before the serious storytelling resumes.", "isCorrect": false, "rationale": "While it is humorous, the Licisca episode is also thematically significant: it previews the day's concern with verbal assertion and the social function of quick, decisive speech."}, {"text": "It reveals Boccaccio's discomfort with the servants, whom he portrays as disruptive and inferior.", "isCorrect": false, "rationale": "Dioneo sides with Licisca, and the episode is not a critique of servants but a demonstration that intelligence and argument are not class-bound."}, {"text": "It provides necessary backstory explaining why the brigata left Florence.", "isCorrect": false, "rationale": "The brigata's reason for leaving Florence (the plague) was established in the Decameron's opening; the kitchen uproar has nothing to do with that."}], "id": "q11"}, {"question": "Day VI's tales are consistently short and the witty remarks are often no more than a single sentence. What does this brevity reveal about Boccaccio's aesthetic priorities?", "options": [{"text": "That precision and timing are more important than elaboration — the right word at the right moment is its own form of mastery.", "isCorrect": true, "rationale": "The Day's very structure enacts its theme: by making the tales as brief and pointed as the mottos they describe, Boccaccio demonstrates rather than merely argues that economy of language is a mark of intelligence."}, {"text": "That Boccaccio grew tired by Day VI and reduced his effort compared to the earlier days.", "isCorrect": false, "rationale": "The brevity is clearly intentional and thematically motivated, not a sign of authorial fatigue."}, {"text": "That witty retorts require no narrative context and can be appreciated in isolation.", "isCorrect": false, "rationale": "While the mottos are brief, each requires the story's setup to be understood; context is what makes the timing devastating."}, {"text": "That Boccaccio believed stories about clever speech were less important than stories about love or fortune.", "isCorrect": false, "rationale": "The placement of Day VI at the structural center of the Decameron signals its importance, not its marginality."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
