        <div class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 9, Section 4</div>

        <div class="score-detail" id="score-detail"></div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "In which city did the scholar Rinieri spend most of his time studying before returning to Florence?", "options": [{"text": "Paris", "isCorrect": true, "rationale": "Rinieri is specifically described as having spent much time in study at Paris to learn the reasons and causes of things."}, {"text": "Bologna", "isCorrect": false, "rationale": "While Bologna was a major medieval university center, the text explicitly identifies Paris as the location of his studies."}, {"text": "Rome", "isCorrect": false, "rationale": "Rome is not mentioned as the place of his academic training; he returns to Florence from a more northern scholarly hub."}, {"text": "Padua", "isCorrect": false, "rationale": "The source material identifies Paris as his place of study, not Padua."}]}, {"question": "What structural symmetry does Boccaccio use to organize the two halves of the tale?", "options": [{"text": "Seasonal inversion of winter cold and summer heat", "isCorrect": true, "rationale": "The scholar is humiliated in the freezing winter snow, and his revenge involves exposing the lady to the blistering summer sun."}, {"text": "The contrast between urban Florence and the rural countryside", "isCorrect": false, "rationale": "While the settings change, the text emphasizes the physical mirror of temperature as the primary structural device."}, {"text": "The reversal of social status between the scholar and the widow", "isCorrect": false, "rationale": "Their social statuses remain relatively stable; the inversion is based on their physical suffering and the cleverness of their tricks."}, {"text": "A transition from religious devotion to secular magic", "isCorrect": false, "rationale": "Magic is only used as a deceptive pretext for revenge, rather than being a structural theme for the whole story."}]}, {"question": "Why does Elena initially trick the scholar and make him wait in the snow?", "options": [{"text": "To prove her devotion to her actual lover", "isCorrect": true, "rationale": "Elena uses the scholar's humiliation to reassure her jealous lover of her lack of interest in anyone else."}, {"text": "To test if he is truly a master of magic", "isCorrect": false, "rationale": "At this point in the story, magic has not yet been introduced; she simply views him as a 'gander' she has caught."}, {"text": "To punish him for his socially awkward behavior", "isCorrect": false, "rationale": "While he is described as socially awkward in the commentary, her motive is centered on entertaining her lover."}, {"text": "Because he had insulted her lineage in public", "isCorrect": false, "rationale": "The scholar actually praises her and seeks her favor; she is the one who initiates the mockery."}]}, {"question": "What is the material of the image Rinieri tells Elena she must use for the recovery of her lover?", "options": [{"text": "Tin", "isCorrect": true, "rationale": "Rinieri specifies that it is his part 'to fashion in tin an image' of the man she wishes to lure back."}, {"text": "Lead", "isCorrect": false, "rationale": "Lead was often used in medieval folk magic, but the text specifically identifies tin for this particular ruse."}, {"text": "Wax", "isCorrect": false, "rationale": "Wax images were common in necromancy tales, but Rinieri chooses a metal to make the lie sound more sophisticated."}, {"text": "Silver", "isCorrect": false, "rationale": "Silver is not mentioned; the scholar provides a 'tin' image inscribed with gibberish signs."}]}, {"question": "What reason does Rinieri give for refusing to let Elena come down from the tower initially?", "options": [{"text": "She must pay the 'debt' of the cold she caused him", "isCorrect": true, "rationale": "Rinieri explicitly tells her to remember the cold she caused him to endure to 'temper the sun's heat.'"}, {"text": "The magic damsels have not yet arrived to witness her", "isCorrect": false, "rationale": "While this was part of the original lie, he admits it was all a ruse once she is trapped."}, {"text": "He has lost the ladder and cannot find it", "isCorrect": false, "rationale": "Rinieri admits he intentionally shifted the ladder and has no intention of helping her down until his revenge is satisfied."}, {"text": "He wants to marry her now that she is humbled", "isCorrect": false, "rationale": "Rinieri states he no longer cares for her love and has found another lady who understands him better."}]}, {"question": "What specific physical torment, besides the sun, does Elena endure while trapped on the tower?", "options": [{"text": "Stings from flies and gadflies", "isCorrect": true, "rationale": "The text details how flies and gadflies swarm in prodigious quantity, stinging her excoriated flesh like javelin stabs."}, {"text": "Lacerations from a hailstorm", "isCorrect": false, "rationale": "The weather is described as perfectly clear and hot, which is what causes her skin to burn."}, {"text": "Attacks from predatory birds", "isCorrect": false, "rationale": "Rinieri uses the metaphor of an eagle and a dove, but the actual physical pests are insects."}, {"text": "Frostbite on her extremities", "isCorrect": false, "rationale": "Frostbite was the danger in the first half of the story; in the second half, the danger is heat and insects."}]}, {"question": "In the scholar's long speech, how does he compare 'mature' men (seniors) to 'young gallants'?", "options": [{"text": "Seniors have better experience and know where the 'fleas' lurk", "isCorrect": true, "rationale": "Rinieri uses the metaphor that seniors know better 'the places where the fleas lurk' to argue for their superior capability and discretion."}, {"text": "Young gallants are more loyal but less wealthy", "isCorrect": false, "rationale": "He actually argues that young gallants are never content with one woman and often rob their ladies."}, {"text": "Seniors are physically stronger for manual labor", "isCorrect": false, "rationale": "The comparison is focused on romantic and sexual prowess and discretion, not physical labor."}, {"text": "Young gallants are more likely to be scholars", "isCorrect": false, "rationale": "The scholar contrasts the 'mature' intellectual with the shallow, physical 'young gallants' that women typically prefer."}]}, {"question": "What is the scholar's ultimate warning regarding the 'might of the pen'?", "options": [{"text": "It can cause more shame than physical death", "isCorrect": true, "rationale": "Rinieri claims he would have written things that would make her want to put out her eyes so as not to see her own shame."}, {"text": "It is the only way to win a woman's true love", "isCorrect": false, "rationale": "He uses the pen as a weapon of revenge and destruction, not as a tool for wooing."}, {"text": "Only those who study in Paris are allowed to use it", "isCorrect": false, "rationale": "He mentions his time in Paris as a source of knowledge, but the pen's power is a general warning to those who flout scholars."}, {"text": "It is less effective than physical violence", "isCorrect": false, "rationale": "He explicitly states that the might of the pen is 'greater far' than many suppose, implying it is a superior weapon."}]}, {"question": "How is Elena finally removed from the top of the tower?", "options": [{"text": "A husbandman carries her down on his shoulders", "isCorrect": true, "rationale": "After being found by her husbandman, he takes her on his shoulders because she is unable to walk due to her injuries."}, {"text": "She jumps from the tower and is caught by her maid", "isCorrect": false, "rationale": "The maid is the one who falls from the ladder and breaks her thigh; she does not catch Elena."}, {"text": "Rinieri eventually feels guilty and assists her personally", "isCorrect": false, "rationale": "Rinieri leaves her to her own devices and goes home; he only provides the clothes to the maid, not the physical rescue."}, {"text": "She finds a secret staircase inside the tower", "isCorrect": false, "rationale": "The tower is described as having its ladder removed, leaving her with no way down until the husbandman arrives."}]}, {"question": "What excuse does Elena give her family to explain her physical state and her maid's broken leg?", "options": [{"text": "They were victims of the enchantments of evil spirits", "isCorrect": true, "rationale": "The text states she invented a fictitious story, persuading everyone that it was 'all due to the enchantments of evil spirits.'"}, {"text": "They were attacked by bandits in the Val d'Arno", "isCorrect": false, "rationale": "While a plausible medieval excuse, she chooses a supernatural explanation to cover the shame of the truth."}, {"text": "They got lost in a summer storm while seeking sheep", "isCorrect": false, "rationale": "She does not use the weather as an excuse; the husbandman was the one looking for sheep (hogs, specifically)."}, {"text": "They were punished by a vengeful scholar from Paris", "isCorrect": false, "rationale": "Revealing the scholar's involvement would expose her own trickery and shame, which she seeks to hide."}]}, {"question": "What term does Boccaccio use to describe the quality of intelligence and wit most celebrated in the Decameron?", "options": [{"text": "Ingegno", "isCorrect": true, "rationale": "Ingegno is the Italian term for the cleverness and wit that characters use to survive or exact revenge throughout the collection."}, {"text": "Vendetta", "isCorrect": false, "rationale": "Vendetta refers to the act of revenge itself, whereas 'ingegno' is the mental quality used to devise it."}, {"text": "Virtù", "isCorrect": false, "rationale": "Virtù relates to prowess or character strength, but Boccaccio specifically celebrates the sharp wit of the scholar."}, {"text": "Sapienza", "isCorrect": false, "rationale": "Sapienza means wisdom or knowledge, which the scholar has, but the text focuses on his 'cleverness' in the trick."}]}, {"question": "According to the narrator Pampinea, why is the story profitable for the ladies to hear?", "options": [{"text": "To learn to be more careful about mocking others", "isCorrect": true, "rationale": "Pampinea states the story will teach them to be 'more careful how you flout others,' noting that the retribution was just."}, {"text": "To learn the secrets of necromancy for their own use", "isCorrect": false, "rationale": "The necromancy in the story is revealed to be 'gibberish' and a trap, not actual useful knowledge."}, {"text": "To understand how to keep their lovers from straying", "isCorrect": false, "rationale": "While that is Elena's goal, the narrator's focus is on the danger of playing cruel tricks on clever men."}, {"text": "To encourage them to marry scholars rather than noblemen", "isCorrect": false, "rationale": "The narrator's intent is a cautionary warning about social behavior and 'flouting,' not a recommendation for marriage."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
