<script>
var QUESTIONS = [{"question": "Which specific literary term is used in the text to describe the narrative device Gillette employs to fulfill Beltramo's conditions?", "options": [{"text": "The bed trick", "isCorrect": true, "rationale": "This recurring motif involves one person secretly substituting for another in a sexual encounter to achieve a specific plot resolution."}, {"text": "The frame narrative", "isCorrect": false, "rationale": "While the Decameron itself uses a frame narrative, this term refers to the structural technique of stories within a story rather than Gillette's specific deception."}, {"text": "The pilgrimage motif", "isCorrect": false, "rationale": "Although Gillette disguises herself as a pilgrim, the specific device used to resolve the marital conflict is the physical substitution."}, {"text": "The physician's gambit", "isCorrect": false, "rationale": "This is not a recognized literary term, though it describes her initial medical intervention with the King."}], "id": "q01"}, {"question": "According to the source material, why did the King of France initially dismiss the possibility of being cured by Gillette?", "options": [{"text": "He believed her youth and gender precluded such high-level medical expertise.", "isCorrect": true, "rationale": "The King questioned how a young damsel could possess knowledge that the world's greatest physicians lacked."}, {"text": "He had already been poisoned by previous physicians and feared all medicine.", "isCorrect": false, "rationale": "While he had grown worse under others' hands, his specific skepticism toward Gillette was rooted in her identity and age."}, {"text": "He recognized her as the daughter of a physician who was under suspicion of magic.", "isCorrect": false, "rationale": "Although the text mentions medical knowledge hovered near magic, the King actually respected her father's fame once she mentioned him."}, {"text": "He was resigned to death as a form of religious penance.", "isCorrect": false, "rationale": "The King was in despair because many had failed, not because he was seeking death for spiritual reasons."}], "id": "q02"}, {"question": "What was the secondary condition Beltramo set for Gillette, which he considered a literal impossibility?", "options": [{"text": "She must have a son 'gotten of him' upon her arm.", "isCorrect": true, "rationale": "Beltramo intended this to be impossible because he refused to consummate the marriage or even remain in the same country."}, {"text": "She must produce a child of royal lineage to match his nobility.", "isCorrect": false, "rationale": "The condition was about paternity (his own child), not the child's specific social rank beyond that."}, {"text": "She must serve as a commander for the Florentines in his stead.", "isCorrect": false, "rationale": "Beltramo himself took service with the Florentines; he did not require this of Gillette."}, {"text": "She must return the lands of Roussillon to his absolute control.", "isCorrect": false, "rationale": "Gillette already managed the lands well; his conditions were personal and biological rather than administrative."}], "id": "q03"}, {"question": "When Gillette offered to help the poor gentlewoman in Florence, what was the primary reason the woman eventually agreed to the plan?", "options": [{"text": "She saw it as an honorable way to help a wife recover her husband while securing her daughter's future.", "isCorrect": true, "rationale": "The woman weighed the potential for reproach against the virtue of the Countess and the necessity of her daughter's dowry."}, {"text": "She was intimidated by Gillette's status as the Countess of Roussillon.", "isCorrect": false, "rationale": "The text emphasizes that the woman acted out of compassion and the spirit of a gentlewoman, not fear of status."}, {"text": "She intended to blackmail the Count using the ring Gillette obtained.", "isCorrect": false, "rationale": "The woman acted in faith with the Countess and even expressed that she didn't do it solely for the reward."}, {"text": "She believed the Count was actually a villain who deserved to be deceived.", "isCorrect": false, "rationale": "The host at the inn described the Count as 'very pleasant' and 'courteous,' suggesting he was well-liked in the city."}], "id": "q04"}, {"question": "Which Shakespearean play is directly cited as having been sourced from this Boccaccio tale?", "options": [{"text": "All's Well That Ends Well", "isCorrect": true, "rationale": "The text explicitly identifies this play as a 'problem comedy' that utilizes Boccaccio's plot and the 'bed trick' motif."}, {"text": "Measure for Measure", "isCorrect": false, "rationale": "While this play also uses the 'bed trick' motif, the text specifies it was the source for 'All's Well That Ends Well'."}, {"text": "The Merchant of Venice", "isCorrect": false, "rationale": "This play deals with complex social contracts, but it is not mentioned as the specific derivative of Gillette's story."}, {"text": "Twelfth Night", "isCorrect": false, "rationale": "This play features a woman in disguise, but its plot is not based on the Count of Roussillon or the healing of a King."}], "id": "q05"}, {"question": "In the context of medieval society as described in the chapter, why was Gillette's medical knowledge seen as 'hovering between science and something close to magic'?", "options": [{"text": "Medical prestige often carried an air of suspicion during that era.", "isCorrect": true, "rationale": "The text notes that in medieval society, the line between science and magic was blurred, leading to both high status and distrust."}, {"text": "She used incantations and prayers rather than physical herbs.", "isCorrect": false, "rationale": "The text specifically mentions she prepared a powder from 'certain herbs,' which is a physical, pharmacological approach."}, {"text": "She was an unregistered physician practicing without a license from the King.", "isCorrect": false, "rationale": "Her legitimacy came from her father's fame as a physician, not a formal licensing board mentioned in the text."}, {"text": "Her father was known to be an alchemist who sought the philosopher's stone.", "isCorrect": false, "rationale": "The text identifies him only as a 'famous physician,' not specifically as an alchemist."}], "id": "q06"}, {"question": "How did Beltramo react when the King commanded him to marry Gillette?", "options": [{"text": "He felt disdain because her social lineage was lower than his nobility.", "isCorrect": true, "rationale": "Beltramo explicitly objected to marrying a 'she-doctor' of unmatched lineage, despite finding her fair."}, {"text": "He was already secretly married to a lady in Tuscany.", "isCorrect": false, "rationale": "He fled to Tuscany only *after* the marriage to escape it, not because he was already wed."}, {"text": "He feared her medical knowledge and thought she would poison him.", "isCorrect": false, "rationale": "His objection was purely based on her social class and profession, not a fear of her physical medical skills."}, {"text": "He intended to marry the King's daughter instead.", "isCorrect": false, "rationale": "The King's sons and royal house were specifically excluded from Gillette's request, but Beltramo's refusal was about Gillette's status."}], "id": "q07"}, {"question": "What happened when Gillette returned to the County of Roussillon after the wedding but before going to Florence?", "options": [{"text": "She restored order to the decaying estate and gained the love of the tenants.", "isCorrect": true, "rationale": "Gillette proved her competence by rectifying the disorder caused by the Count's long absence, earning the esteem of the people."}, {"text": "The tenants rebelled against her because they supported the Count's exile.", "isCorrect": false, "rationale": "The tenants actually 'severely censured' the Count for not being satisfied with such a capable woman."}, {"text": "She sold the land to fund her search for the Count in Italy.", "isCorrect": false, "rationale": "She actually made a 'cession' of the governance to the notable men of the county, but she did not sell the land."}, {"text": "She was rejected by the local knights who refused to recognize a woman's authority.", "isCorrect": false, "rationale": "The knights actually delivered her messages and the 'honest men' of the county wept when she announced her departure."}], "id": "q08"}, {"question": "What was the significance of the ring that Beltramo wore?", "options": [{"text": "He believed it possessed a specific virtue and never removed it.", "isCorrect": true, "rationale": "The text states the Count prized the ring for a 'virtue' he believed it had, making its acquisition by Gillette even more unlikely."}, {"text": "It was a royal signet ring that allowed the wearer to command the King's army.", "isCorrect": false, "rationale": "The ring was a personal possession of the Count, not a royal artifact with military authority."}, {"text": "It was a poison ring used for assassinations during the war in Tuscany.", "isCorrect": false, "rationale": "The 'virtue' of the ring is not specified as being harmful, and it is framed as a prized personal item."}, {"text": "It was a family heirloom that Gillette's father had originally forged.", "isCorrect": false, "rationale": "There is no mention of Gerard of Narbonne having any connection to the ring's origin."}], "id": "q09"}, {"question": "How much money did Gillette ultimately give the gentlewoman as a dowry for her daughter?", "options": [{"text": "Five hundred pounds plus rare jewels.", "isCorrect": true, "rationale": "Gillette gave five times the requested amount (one hundred pounds) as a mark of her gratitude and sense of duty."}, {"text": "One hundred pounds as requested by the mother.", "isCorrect": false, "rationale": "While the mother asked for one hundred, Gillette significantly exceeded this request."}, {"text": "The entire treasury of the County of Roussillon.", "isCorrect": false, "rationale": "Gillette was 'amply provided with money,' but she gave a specific sum rather than her entire fortune."}, {"text": "A stipend paid annually by the King of France.", "isCorrect": false, "rationale": "The money came from Gillette's own resources as a 'sole heiress' and from her marriage settlement."}], "id": "q10"}, {"question": "On which day did Gillette finally reveal herself and her children to Beltramo at the palace?", "options": [{"text": "All Saints' Day", "isCorrect": true, "rationale": "She chose a major public reception on All Saints' Day to make her claim in front of the Count and all his vassals."}, {"text": "The Feast of the Epiphany", "isCorrect": false, "rationale": "While a feast, the text specifically identifies the holiday as All Saints' Day."}, {"text": "Christmas Day", "isCorrect": false, "rationale": "The reveal occurred at a great reception, but the text places it earlier in the autumn/winter calendar."}, {"text": "The anniversary of their wedding day", "isCorrect": false, "rationale": "The timing was based on the Count's gathering of ladies and gentlemen, not a specific personal anniversary."}], "id": "q11"}, {"question": "What proof did Gillette offer that the children she carried were indeed Beltramo's?", "options": [{"text": "Their physical resemblance to him was unmistakable.", "isCorrect": true, "rationale": "The Count recognized 'his own lineaments' in the children, who were 'as like as possible to their father'."}, {"text": "She produced a legal document signed by the Florentine widow.", "isCorrect": false, "rationale": "The reveal relied on physical evidence (the ring and the children) and her detailed oral account, not legal contracts."}, {"text": "The children were wearing the rare jewels the Count had given his lover.", "isCorrect": false, "rationale": "While she kept the jewels, the primary visual proof of paternity mentioned is the boys' appearance."}, {"text": "A miracle from God caused the children to speak his name.", "isCorrect": false, "rationale": "The story treats her success as a result of her 'address' and 'perseverance' rather than a supernatural miracle."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
