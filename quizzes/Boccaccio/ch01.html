<script>
var QUESTIONS = [{"question": "Which historical catastrophe serves as the primary backdrop and foundational event for Giovanni Boccaccio's *Decameron*?", "options": [{"text": "The Hundred Years' War", "isCorrect": false, "rationale": "While the Hundred Years' War was ongoing during Boccaccio's time, the text explicitly states that his masterpiece was written 'in the shadow of the worst catastrophe in European history — the Black Death of 1348,' not the war."}, {"text": "The Black Death of 1348", "isCorrect": true, "rationale": "The overview clearly identifies the Black Death of 1348 as the historical catastrophe that forms the backdrop for the *Decameron*, profoundly influencing its creation and narrative setting."}, {"text": "The Great Schism of the Western Church", "isCorrect": false, "rationale": "The Great Schism was a significant religious event, but the text attributes the *Decameron*'s context to the widespread devastation of the plague, not a church schism."}, {"text": "The fall of the Byzantine Empire", "isCorrect": false, "rationale": "The fall of the Byzantine Empire was a later event and not directly mentioned in the text as the backdrop for Boccaccio's work. The text focuses on the impact of the Black Death in Europe."}], "id": "q01"}, {"question": "According to the Proem, what is Boccaccio's primary motivation for dedicating his work, *The Decameron*, specifically to women?", "options": [{"text": "To challenge the patriarchal norms of his society by granting women a central role in literature.", "isCorrect": false, "rationale": "While the work does give women a significant role, Boccaccio's stated primary motivation is not explicitly to challenge patriarchy, but rather to offer solace and diversion to women who, unlike men, have fewer avenues for relief from melancholy."}, {"text": "To express his personal gratitude for comfort received during his own 'aspiring and noble love' and to offer similar solace to those with limited diversions.", "isCorrect": true, "rationale": "Boccaccio states, 'as among the virtues, gratitude is in my judgment most especially to be commended... therefore, that I show myself not ungrateful, I have resolved... to afford, so far as in me lies, some solace.' He specifically targets women because he perceives them as having 'much less power to support such a weight than men' due to their confined lives and lack of diversions, thus compensating for 'the injustice of Fortune'."}, {"text": "To secure the patronage of powerful female figures in Florence for financial support.", "isCorrect": false, "rationale": "The text does not mention securing patronage as a motivation. Boccaccio's stated reasons are rooted in gratitude, empathy, and a desire to provide emotional relief."}, {"text": "To provide moral instruction exclusively to women, whom he believed were more susceptible to sinful desires.", "isCorrect": false, "rationale": "While the stories offer 'good counsel' on 'what to shun, and likewise what to pursue,' the overarching motivation is for 'pleasure from the entertaining matters' and 'solace' or 'diversion,' not exclusively moral instruction due to perceived sinfulness."}], "id": "q02"}, {"question": "Boccaccio's description of the Black Death is noted for its distinctive combination of 'clinical observation and moral reflection.' Which of the following best exemplifies this combination as highlighted in the text?", "options": [{"text": "Detailing the origin of the plague in the East while also speculating about divine wrath as its cause.", "isCorrect": false, "rationale": "While the text mentions both the Eastern origin and divine wrath, this primarily reflects different theories of causation rather than a direct combination of 'clinical observation' (symptoms, spread) and 'moral reflection' (social breakdown, human duties)."}, {"text": "Listing the specific physical symptoms like 'gavoccioli' alongside the breakdown of family bonds and civic duties.", "isCorrect": true, "rationale": "The text explicitly states Boccaccio 'describes not only the symptoms and spread of the disease but also its devastating effect on the bonds of family, friendship, religion, and civic life.' The 'What to Watch For' notebox further emphasizes his movement from 'physical symptoms to its social and moral consequences,' such as parents abandoning children and priests refusing the sick."}, {"text": "Comparing his account to Thucydides' description of the Plague of Athens and Daniel Defoe's *A Journal of the Plague Year*.", "isCorrect": false, "rationale": "These comparisons highlight the historical and literary significance of Boccaccio's work but do not directly illustrate the combination of clinical observation and moral reflection *within* his own account."}, {"text": "Describing the attempts by Florentine officials to cleanse the city and offer public supplications to God.", "isCorrect": false, "rationale": "These are actions taken in response to the plague, showing human and religious efforts, but they don't represent the direct combination of observed symptoms and reflected moral breakdown in the way the correct answer does."}], "id": "q03"}, {"question": "The 'What to Watch For' notebox describes a crucial 'contrast' that forms the 'moral foundation of the entire Decameron.' What is this contrast?", "options": [{"text": "The contrast between the individual suffering from love (Boccaccio's experience) and the communal suffering from the plague.", "isCorrect": false, "rationale": "While both types of suffering are present, the notebox specifically highlights the contrast between the plague's destruction and the brigata's response, not Boccaccio's personal love story."}, {"text": "The contrast between the historical accounts of the plague and Boccaccio's fictionalized narrative.", "isCorrect": false, "rationale": "The notebox focuses on the internal structure and thematic core of Boccaccio's work, not a meta-commentary on its historical accuracy versus fictional elements."}, {"text": "The contrast between the plague's destruction, marked by social chaos and abandoned duties, and the brigata's creative response through companionship and storytelling to establish order.", "isCorrect": true, "rationale": "The notebox explicitly states: 'Notice especially how he describes the breakdown of ordinary human duties... Then notice the contrast when the brigata assembles: out of this chaos, a small group chooses to create order through companionship and storytelling. This contrast — between the plague's destruction and the brigata's creative response — is the moral foundation of the entire Decameron.'"}, {"text": "The contrast between the initial sorrowful memories of the pestilence and the eventual joy found in the 'fair and delectable plain' of the stories.", "isCorrect": false, "rationale": "This describes the *reader's* journey through the text, not the fundamental 'moral foundation' derived from the interaction between the plague's impact and the brigata's actions within the story itself."}], "id": "q04"}, {"question": "What were the initial and most notable physical symptoms of the plague in Florence, as described by Boccaccio, distinguishing them from symptoms observed in the East?", "options": [{"text": "A severe cough and persistent fever, unlike the boils seen in other regions.", "isCorrect": false, "rationale": "The text does not mention cough or fever as the primary distinguishing symptoms. It specifically notes a different type of external manifestation."}, {"text": "An issue of blood from the nose, which was a manifest sign of inevitable death.", "isCorrect": false, "rationale": "The text states: 'Not such were they as in the East, where an issue of blood from the nose was a manifest sign of inevitable death,' explicitly saying this was *not* the symptom in Florence."}, {"text": "Tumours, or 'gavoccioli,' in the groin or armpits, varying in size from an apple to an egg.", "isCorrect": true, "rationale": "Boccaccio states: 'but in men and women alike it first betrayed itself by the emergence of certain tumours in the groin or the armpits, some of which grew as large as a common apple, others as an egg, some more, some less, which the common folk called gavoccioli.' This directly answers the question."}, {"text": "Painful skin lesions all over the body, resembling small ulcers or pustules.", "isCorrect": false, "rationale": "The description specifically mentions 'tumours in the groin or the armpits,' not widespread skin lesions over the entire body."}], "id": "q05"}, {"question": "Boccaccio's comparison of the 'horrid beginning' (plague description) to a 'steep and rugged mountain' before a 'fair and delectable plain' (the stories) primarily serves what literary purpose?", "options": [{"text": "To emphasize the difficulty of writing such a comprehensive historical account of the plague.", "isCorrect": false, "rationale": "The comparison is aimed at the reader's experience, not the author's writing process. It prepares the audience for the narrative journey."}, {"text": "To warn readers that the entire work will be filled with somber and distressing content.", "isCorrect": false, "rationale": "The comparison clearly indicates a transition to 'sweets and delights' after the 'brief exordium of woe,' implying the opposite of an entirely somber work."}, {"text": "To contrast the necessary, grim reality of the plague with the hopeful escape and pleasure found in the subsequent tales.", "isCorrect": true, "rationale": "Boccaccio states, 'This horrid beginning will be to you even such as to wayfarers is a steep and rugged mountain, beyond which stretches a plain most fair and delectable,' and 'succeed forthwith the sweets and delights which I have promised you.' This directly establishes the contrast between the initial difficult reading and the forthcoming pleasurable stories."}, {"text": "To criticize the moral failings of society that led to the plague, suggesting a difficult path to redemption.", "isCorrect": false, "rationale": "While moral failings are mentioned in relation to the plague's cause ('God in His just wrath by way of retribution for our iniquities'), the metaphor itself focuses on the reading experience and narrative structure, not a critique of societal redemption."}], "id": "q06"}, {"question": "The Proem highlights a significant social distinction regarding how men and women cope with melancholy. What does this distinction reveal about the societal roles and opportunities of women in Boccaccio's time?", "options": [{"text": "Women were considered emotionally stronger and less prone to melancholy than men, requiring less diversion.", "isCorrect": false, "rationale": "The text explicitly states women 'have much less power to support such a weight than men' and describes them as suffering 'sore distress' from melancholy if not dispelled."}, {"text": "Women had equal access to public life and diverse activities as men, but chose more private forms of solace.", "isCorrect": false, "rationale": "The text directly contradicts this, stating women are 'restrained by the will, the caprice, the commandment of fathers, mothers, brothers, and husbands, confined most part of their time within the narrow compass of their chambers,' unlike men who 'may go where they will, may hear and see many things, may hawk, hunt, fish, ride, play or traffic.'"}, {"text": "Women were largely confined to their homes and lacked the varied social and outdoor activities available to men for diversion, making them more vulnerable to prolonged sadness.", "isCorrect": true, "rationale": "The text states women are 'confined most part of their time within the narrow compass of their chambers' and describes their lives as 'vacant ease,' meditating on 'divers matters which cannot all be cheerful.' It contrasts this sharply with men's 'many ways of relief and diversion,' such as going where they will, hawking, hunting, fishing, riding, playing, or trafficking. This reveals significant restrictions on women's autonomy and access to public life."}, {"text": "Women were expected to rely on religious devotion and prayer as their sole means of coping with emotional distress.", "isCorrect": false, "rationale": "While religious devotion was important, the text highlights the *lack* of secular diversions available to women, and Boccaccio's work itself aims to provide a secular form of 'solace' and 'diversion' beyond 'the needle and the spindle and the reel'."}], "id": "q07"}, {"question": "In the Proem, Boccaccio recounts that he found relief from his own 'inordinate distress' caused by 'ill-bridled desire' through the 'delectable discourse of a friend.' How does this personal experience directly influence his decision to write the *Decameron*?", "options": [{"text": "It inspires him to write a collection of stories exclusively about the pains and pleasures of love.", "isCorrect": false, "rationale": "While love is a theme, the stories cover 'love rudely crossed, with other courses of events of which the issues are felicitous,' and the overarching purpose is 'diversion' and 'solace' beyond just love stories. His motivation stems from the *relief* discourse provided."}, {"text": "It leads him to believe that communal storytelling and conversation can offer similar comfort to others experiencing distress.", "isCorrect": true, "rationale": "Boccaccio explicitly states his gratitude for the 'delectable discourse of a friend and his commendable consolations,' which he believes saved him from death. He then resolves 'to afford... some solace' to others, primarily women, by recounting 'one hundred Novels or Fables or Parables or Stories' that were 'recounted in ten days by an honourable company,' directly paralleling his own experience of finding comfort in discourse."}, {"text": "It serves as a cautionary tale within the *Decameron* about the dangers of unchecked desire.", "isCorrect": false, "rationale": "His personal story is presented as a foundational motivation for the entire work, not as a standalone cautionary tale within the collection."}, {"text": "It convinces him that only male friendship can truly alleviate deep emotional suffering.", "isCorrect": false, "rationale": "While he found solace from a male friend, his work is specifically dedicated to providing solace to women, implying that the *method* (discourse, stories) is universally effective, not limited by gender of the comforter."}], "id": "q08"}, {"question": "Which statement accurately describes the 'brigata' and their role in *The Decameron*?", "options": [{"text": "A group of ten young men who gather to pray for deliverance from the plague.", "isCorrect": false, "rationale": "The brigata consists of 'seven ladies and three young men,' and their primary activity is storytelling for 'delectation' and to create order, not solely prayer."}, {"text": "A company of seven ladies and three young men who retreat from Florence during the plague to tell one hundred tales over ten days.", "isCorrect": true, "rationale": "The text states the brigata is 'the company of ten young people' who will 'tell the hundred tales.' The Proem further specifies 'an honourable company of seven ladies and three young men... recounted in ten days... in the time of the late mortal pestilence.'"}, {"text": "The author's imaginary companions who help him compose the stories in isolation.", "isCorrect": false, "rationale": "The brigata is presented as a group of characters within the frame narrative who actually tell the stories, not imaginary aids to the author's writing process."}, {"text": "A secret society dedicated to observing the plague's effects and documenting social breakdown.", "isCorrect": false, "rationale": "While the plague's effects and social breakdown are described by Boccaccio, the brigata's purpose is to create order and provide diversion through storytelling, not to act as observers or documentarians."}], "id": "q09"}, {"question": "Aside from human wisdom and forethought (like cleansing the city), what other measure did the people of Florence take to try and avert the deadly pestilence?", "options": [{"text": "They imposed a strict quarantine on all incoming ships and goods.", "isCorrect": false, "rationale": "While 'refusal of entrance to all sick folk' is mentioned, a blanket quarantine on all ships and goods is not specifically detailed as a measure alongside 'human wisdom' as distinctly as the other option."}, {"text": "They consulted with physicians from the East for traditional remedies.", "isCorrect": false, "rationale": "The text mentions the plague originating in the East and its symptoms there, but not that Florentines specifically consulted Eastern physicians for remedies."}, {"text": "They organized 'humble supplications addressed to God, and often repeated both in public procession and otherwise, by the devout.'", "isCorrect": true, "rationale": "The text explicitly states: 'despite all that human wisdom and forethought could devise... despite also humble supplications addressed to God, and often repeated both in public procession and otherwise, by the devout; towards the beginning of the spring of the said year the doleful effects of the pestilence began to be horribly apparent'."}, {"text": "They established isolated camps outside the city for the healthy population.", "isCorrect": false, "rationale": "The brigata eventually retreats from the city, but this measure is not listed as a preventative action taken by the city's population as a whole or its officials to avert the plague."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
