    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Boccaccio.html">&larr; Back to Tales of the Decameron (Boccaccio)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 11, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "In the first movement of the tale, what strategy does Messer Torello use to ensure the strangers (Saladin and his retinue) accept his hospitality?", "options": [{"text": "He intercepts them with an armed escort and insists they stay for safety.", "isCorrect": false, "rationale": "While he was with his servants, there is no mention of using force or an armed escort to compel them to stay."}, {"text": "He instructs a servant to guide them to his estate via devious roads while they believe they are heading to Pavia.", "isCorrect": true, "rationale": "Torello uses a ruse where his servant leads the travelers to his own country estate under the guise of finding them lodgings, making it difficult for them to decline once they arrive."}, {"text": "He reveals his true identity as a high-ranking official and commands their presence at dinner.", "isCorrect": false, "rationale": "Torello purposefully keeps the interaction focused on spontaneous courtesy rather than using his social rank as a command."}, {"text": "He offers them a significant discount on their supposed merchandise if they lodge with him.", "isCorrect": false, "rationale": "Torello treats them as honored guests based on their appearance of being gentlemen, not as a business transaction involving their 'merchandise'."}]}, {"question": "What specific physical trait or action first causes Saladin to suspect that the 'Christian' falconer in Alexandria is actually Messer Torello?", "options": [{"text": "A distinctive scar on Torello's hand that Saladin noticed in Pavia.", "isCorrect": false, "rationale": "The text does not mention a scar; Saladin's recognition is based on facial expressions and emotional memory."}, {"text": "Torello's unique method of training hawks that Saladin had witnessed at the Ticino ford.", "isCorrect": false, "rationale": "Although Saladin saw Torello fly hawks, the text identifies a specific facial movement as the catalyst for his suspicion."}, {"text": "The way Torello's mouth shaped itself when he smiled during a conversation.", "isCorrect": true, "rationale": "Saladin had taken particular note of the way Torello's mouth shaped itself when he smiled during his earlier visit to Pavia, which allows him to recall Torello's identity years later."}, {"text": "Torello's refusal to eat pork, which Saladin remembered as a quirk of his host.", "isCorrect": false, "rationale": "This detail is not mentioned; the recognition is sparked by a specific physical expression of joy or amusement."}]}, {"question": "What is the primary reason the people of Pavia firmly believed Messer Torello d'Istria had died during the Crusade?", "options": [{"text": "His wife received a signed death certificate from the Soldan's administration.", "isCorrect": false, "rationale": "No official communication was sent by Saladin's administration regarding Torello's death; in fact, Torello was alive."}, {"text": "A different knight with a similar name was killed and buried in the sight of other Christians.", "isCorrect": true, "rationale": "The death of Messer Torello de Dignes, an obscure Provencal knight, was mistaken for the death of the well-known Messer Torello d'Istria, and eyewitnesses reported seeing the body."}, {"text": "Saladin intentionally sent false reports of his death to prevent Torello from returning home.", "isCorrect": false, "rationale": "Saladin was unaware of Torello's identity for a long time and later did everything in his power to help him return home."}, {"text": "The ship Torello was traveling on was confirmed lost at sea with no survivors.", "isCorrect": false, "rationale": "While a ship was lost (the Genoese galley), that occurred later and affected Torello's letter, not the initial report of his death."}]}, {"question": "Messer Torello's wife, Adalieta, agrees to remarry only after a specific timeframe has passed. What is this duration?", "options": [{"text": "Seven years and seven days.", "isCorrect": false, "rationale": "Seven years is a common folkloric timeframe, but Torello specifies a more precise period involving years, months, and days."}, {"text": "One year, one month, and one day.", "isCorrect": true, "rationale": "Torello asked his wife to wait exactly a year, a month, and a day from his departure before considering remarriage, which creates the dramatic deadline for his return."}, {"text": "Three years.", "isCorrect": false, "rationale": "While she spent months in mourning, the specific pledge was for a more complex unit of time."}, {"text": "Five hundred days.", "isCorrect": false, "rationale": "The text explicitly uses the traditional formula of years, months, and days rather than a flat count of days."}]}, {"question": "Which supernatural or 'romance' element does Boccaccio employ to facilitate the climax of the story?", "options": [{"text": "A divine intervention by an angel who carries Torello across the sea.", "isCorrect": false, "rationale": "The transport is explicitly described as the work of a necromancer, which is a magical rather than a strictly divine element."}, {"text": "A magical ring that allows Torello to become invisible and enter the wedding feast.", "isCorrect": false, "rationale": "While a ring is used to reveal his identity, it does not possess the power of invisibility."}, {"text": "The transport of Torello in a single night from Alexandria to Pavia on a magical bed.", "isCorrect": true, "rationale": "Using a necromancer's skill, Torello is put to sleep and transported on a sumptuous bed across the distance in one night, a rare supernatural occurrence in the Decameron."}, {"text": "A prophetic dream sent to Adalieta warning her not to marry the second husband.", "isCorrect": false, "rationale": "Adalieta remains unaware that Torello is alive until the actual moment of the reveal at the feast."}]}, {"question": "How does Messer Torello finally reveal his identity to his wife during the wedding banquet?", "options": [{"text": "He removes his turban and reveals a birthmark on his forehead.", "isCorrect": false, "rationale": "His reveal is much more interactive and involves a custom regarding drinking at a wedding."}, {"text": "He sings a song that only he and his wife knew from their youth.", "isCorrect": false, "rationale": "The text focuses on visual and physical tokens rather than musical cues."}, {"text": "He drops the ring she gave him into a wine cup that she then drinks from.", "isCorrect": true, "rationale": "By following a specific 'custom' of his country, Torello has his wife send him her cup; he then drops the ring into it so she will find it when she drinks the remainder."}, {"text": "He presents the crown given to him by Saladin as proof of his travels.", "isCorrect": false, "rationale": "He is wearing the crown, but it is the ring he received upon his departure that serves as the definitive proof of his identity."}]}, {"question": "What does the text suggest about Boccaccio's view of religious and cultural differences through the character of Saladin?", "options": [{"text": "He views non-Christians as inherently untrustworthy despite their outward displays of wealth.", "isCorrect": false, "rationale": "This contradicts the theme of the story, which emphasizes Saladin's extreme honor and integrity."}, {"text": "He presents 'cortesia' (courtesy) as a virtue that transcends religious boundaries, making a Muslim the moral equal of a Christian.", "isCorrect": true, "rationale": "The tale highlights how Saladin embodies the noble ideal of courtesy just as much as, or more than, his Christian counterparts, suggesting a view of moral equality across faiths."}, {"text": "He implies that Saladin's nobility is a result of his secret desire to convert to Christianity.", "isCorrect": false, "rationale": "The text never mentions a desire for conversion; Saladin's nobility is presented as an inherent trait of his character and culture."}, {"text": "He argues that only through conflict can the true quality of a man's faith be tested.", "isCorrect": false, "rationale": "The story emphasizes cross-cultural friendship and hospitality over the actual military conflict of the Crusades."}]}, {"question": "Upon his return, where is Messer Torello first discovered in Pavia?", "options": [{"text": "In his own bedroom, to the surprise of his servants.", "isCorrect": false, "rationale": "He was not taken directly to his house, as that would have disrupted his plan to observe his wife's conduct."}, {"text": "In the church of San Piero in Ciel d'Oro.", "isCorrect": true, "rationale": "Torello specifically requested to be deposited in this church, where his uncle was the abbot, leading to his discovery by the sacristan and monks."}, {"text": "At the city gates, still dressed in his Saracenic robes.", "isCorrect": false, "rationale": "He was transported directly into a specific building rather than appearing at the public entrance to the city."}, {"text": "In the middle of the wedding feast at the bridegroom's house.", "isCorrect": false, "rationale": "He goes to the feast later with the abbot, but his arrival in Pavia happens earlier in a religious setting."}]}, {"question": "Which of the following was NOT among the riches Saladin placed around the sleeping Torello for his journey home?", "options": [{"text": "A sword with highly valuable appointments.", "isCorrect": false, "rationale": "The text explicitly mentions that Saladin girded him with a sword of great value."}, {"text": "Two vast basins of gold full of pistoles.", "isCorrect": false, "rationale": "These are explicitly listed as part of the wealth placed on either side of Torello on the bed."}, {"text": "A set of maps detailing Saladin's military defenses.", "isCorrect": true, "rationale": "Saladin provides wealth and jewelry (crowns, rings, pearls) as tokens of friendship, but military intelligence is not mentioned as part of the gift."}, {"text": "A crown intended for Torello's wife.", "isCorrect": false, "rationale": "Saladin places a crown on the bed specifically as a gift for Torello's wife, along with various other jewels."}]}, {"question": "What reason does Saladin give for traveling through the West in the guise of a merchant?", "options": [{"text": "To escape an assassination plot in his own court in Egypt.", "isCorrect": false, "rationale": "There is no mention of internal political strife forcing him to flee."}, {"text": "To personally survey the preparations being made by Christian potentates for a Crusade.", "isCorrect": true, "rationale": "Saladin wants to 'see for himself' the strength and preparations of the Christians so he can better prepare his own defenses."}, {"text": "To find a legendary physician capable of curing his chronic illness.", "isCorrect": false, "rationale": "While he interacts with a physician later in the story, his initial reason for travel is purely strategic."}, {"text": "To establish new trade routes between Babylonia and Paris.", "isCorrect": false, "rationale": "This is the 'cover story' he gives to Torello, but his true purpose is military reconnaissance."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
