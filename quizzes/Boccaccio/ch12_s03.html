<script>
var QUESTIONS = [{"question": "In the context of the first day's tales, what central theme is established by the story of Ser Ciappelletto's false confession?", "options": [{"text": "The inherent corruption of the medieval ecclesiastical courts.", "isCorrect": false, "rationale": "While the story involves a religious setting, the primary focus is not on the court system but on the character's manipulation of truth."}, {"text": "The discrepancy between outward appearance and inner reality.", "isCorrect": true, "rationale": "Ciappelletto's monstrous life contrasted with his 'saintly' death highlights the recurring theme of the gap between how things seem and what they are."}, {"text": "The necessity of extreme penance for salvation.", "isCorrect": false, "rationale": "Ciappelletto does not actually perform penance; he performs a 'false confession,' which subverts the traditional idea of religious salvation."}, {"text": "The triumph of secular law over religious hypocrisy.", "isCorrect": false, "rationale": "The story ends with Ciappelletto being venerated as a saint, showing the triumph of a clever liar over religious perception, not a legal victory."}]}, {"question": "How does the 'fortuna' experienced by Andreuccio da Perugia in Day II differ from the general medieval understanding of fate?", "options": [{"text": "It suggests that fate is a static condition determined at birth.", "isCorrect": false, "rationale": "The text describes fortune as an unpredictable force that raises and ruins, implying movement rather than a static state."}, {"text": "It demonstrates that human plans are completely irrelevant to the outcome.", "isCorrect": false, "rationale": "While fortune is unpredictable, Andreuccio emerges 'wiser,' suggesting human agency and learning play a role in navigating fate."}, {"text": "It portrays fortune as a dynamic force that can lead to growth through adversity.", "isCorrect": true, "rationale": "Andreuccio's descent into the 'sewers' and 'tomb-robbing' results in him becoming both richer and wiser, reflecting a transformative view of chance."}, {"text": "It aligns with the idea that fortune only punishes the wicked.", "isCorrect": false, "rationale": "The text mentions the Soldan's Daughter, who is well-born and beautiful yet still subject to fortune's power, indicating it is not purely moralistic."}]}, {"question": "Which character's actions in Day III best illustrate 'ingegno' as a tool for social or personal advancement?", "options": [{"text": "Melchisedech, by using a parable to avoid a financial trap.", "isCorrect": false, "rationale": "Melchisedech appears in Day I, not Day III, although he does exhibit cleverness."}, {"text": "Gillette of Narbonne, by using persistence and intelligence to secure her marriage.", "isCorrect": true, "rationale": "Gillette uses her wit to overcome her husband's reluctance, embodying the day's theme of resourcefulness obtaining desire."}, {"text": "The Gascon Lady, by shaming a king into being just.", "isCorrect": false, "rationale": "The Gascon Lady is an example from Day I, representing the power of a 'well-aimed word' rather than the specific 'ingegno' focus of Day III."}, {"text": "Ghismonda, by defending her right to love her chosen partner.", "isCorrect": false, "rationale": "Ghismonda's story belongs to Day IV and focuses on tragedy and personal dignity rather than the clever 'triumphs' of Day III."}]}, {"question": "What does the text identify as the significant contribution of Ghismonda’s speech in Day IV to medieval literature?", "options": [{"text": "It provides a blueprint for the Provencal tradition of courtly love.", "isCorrect": false, "rationale": "The text links the 'eaten heart' to the Provencal tradition via Guillaume de Roussillon, not Ghismonda's speech."}, {"text": "It establishes the legal right of daughters to inherit property.", "isCorrect": false, "rationale": "Her speech is about the personal right to love and individual dignity, not property or legal inheritance."}, {"text": "It serves as a powerful declaration of personal dignity and the right to choose.", "isCorrect": true, "rationale": "The text highlights her defense of her right to love whom she chooses as a landmark statement of personal dignity."}, {"text": "It argues that tragedy is the inevitable result of violating social class boundaries.", "isCorrect": false, "rationale": "While her love choice might violate class, her speech is a defense of her agency, not a warning about social boundaries."}]}, {"question": "Why is Federigo degli Alberighi’s sacrifice in Day V considered 'the most perfect novella ever written' by many critics?", "options": [{"text": "It utilizes a complex supernatural vision to resolve the plot.", "isCorrect": false, "rationale": "The supernatural vision occurs in the story of Nastagio degli Onesti (V8), not Federigo's."}, {"text": "It depicts the ultimate sacrifice of a beloved possession for the sake of love.", "isCorrect": true, "rationale": "Federigo's act of sacrificing his falcon, his last possession, for the woman he loves is cited as the peak of narrative and thematic perfection."}, {"text": "It provides a realistic depiction of the economic downfall of the aristocracy.", "isCorrect": false, "rationale": "While his poverty is a factor, the focus is on the moral and romantic weight of his sacrifice, not a socio-economic analysis."}, {"text": "It is the only tale in Day V where the lovers do not suffer before finding happiness.", "isCorrect": false, "rationale": "Day V is specifically themed around lovers who find happiness *after* suffering, and Federigo suffers significant loss."}]}, {"question": "In Day VI, the story of Madonna Oretta serves as a 'miniature literary manifesto' because it:", "options": [{"text": "Argues that stories must always contain a moral lesson.", "isCorrect": false, "rationale": "The collection as a whole avoids simple moralism, and this specific story is about the craft of telling, not the lesson."}, {"text": "Criticizes the upper class for their lack of philosophical depth.", "isCorrect": false, "rationale": "This theme is more closely associated with the story of Guido Cavalcanti (VI9) rather than Madonna Oretta."}, {"text": "Demonstrates that the manner of telling a story is as important as the content.", "isCorrect": true, "rationale": "As a 'story about storytelling,' it emphasizes that a poorly told story 'kills' the narrative, making it a manifesto on literary technique."}, {"text": "Proves that religious relics are merely tools for linguistic manipulation.", "isCorrect": false, "rationale": "The manipulation of religious symbols through language is the theme of Fra Cipolla (VI10), not Madonna Oretta."}]}, {"question": "The tale of the Scholar and the Widow in Day VIII is described as pushing the 'beffa' to its 'darkest extreme' because:", "options": [{"text": "It involves the use of magic to deceive an innocent man.", "isCorrect": false, "rationale": "The use of magic to deceive (the stone of invisibility) is found in the comic story of Calandrino, not the Scholar's revenge."}, {"text": "It concludes with the tragic death of both protagonists.", "isCorrect": false, "rationale": "The text characterizes it as raising 'uncomfortable questions about ethics' rather than being a standard tragedy like those in Day IV."}, {"text": "It explores the ethical implications of using high intelligence for the purpose of cruelty.", "isCorrect": true, "rationale": "The shift from comic tricks to a vindictive 'beffa' highlights the potential for intellectual skill to be used for malicious ends."}, {"text": "It portrays a successful deception that goes unpunished by the law.", "isCorrect": false, "rationale": "The 'darkness' referred to is moral and ethical, concerning the nature of the revenge itself, rather than a lack of legal consequence."}]}, {"question": "How does Giuseppe Mazzotta’s concept of 'the world at play' describe the structural progression of the Decameron?", "options": [{"text": "It refers to the brigata’s literal games and dances between storytelling sessions.", "isCorrect": false, "rationale": "Mazzotta uses the term to describe the literary structure of the cosmos within the book, not just the characters' recreational activities."}, {"text": "It suggests the work is a chaotic collection of tales with no underlying order.", "isCorrect": false, "rationale": "The text explicitly states the arc is 'not accidental' and reflects a 'deliberate artistic design' of reordering the world."}, {"text": "It describes a literary cosmos that mirrors the disorder and reordering of the outside world.", "isCorrect": true, "rationale": "The structure moves from the chaos of the plague toward a vision of human virtue, creating an ordered internal world through narrative."}, {"text": "It indicates that the tales are meant purely for entertainment with no serious intent.", "isCorrect": false, "rationale": "While 'play' is involved, the text argues the structure reflects a serious transition from darkness toward light and human wisdom."}]}, {"question": "In what way does Boccaccio’s 'arc' toward light differ from Dante’s Commedia, according to the text?", "options": [{"text": "Boccaccio's journey ends in the vision of God, whereas Dante's is secular.", "isCorrect": false, "rationale": "The text states the opposite: Dante's journey is theological, while Boccaccio's is human."}, {"text": "Boccaccio’s focus is on human and social virtue rather than theological salvation.", "isCorrect": true, "rationale": "While both move from darkness to light, Boccaccio's 'light' is the vision of humans at their best—generous and wise—not a divine vision."}, {"text": "Dante uses a variety of narrators, while Boccaccio uses a single protagonist.", "isCorrect": false, "rationale": "The Decameron uses ten narrators (the brigata), whereas Dante's Commedia follows the singular journey of the character Dante."}, {"text": "Dante’s work begins with a celebration of life, while Boccaccio’s begins with death.", "isCorrect": false, "rationale": "Dante's Commedia begins in a 'dark wood' (often interpreted as a state of sin/death), but the text focuses on the theological vs. human distinction."}]}, {"question": "According to the 'Enduring Insights' section, how does Boccaccio’s portrayal of human nature in the novella influence Western literature?", "options": [{"text": "By proving that only the lives of saints and monarchs are worthy of literary attention.", "isCorrect": false, "rationale": "The text notes the novella includes 'merchants,' 'clever wives,' and 'gullible husbands,' expanding the scope beyond saints and monarchs."}, {"text": "By establishing that ordinary human experience is a valid subject for serious literature.", "isCorrect": true, "rationale": "The 'novella as a mirror' insight explains that by including all social classes and moral conditions, Boccaccio changed literature forever."}, {"text": "By asserting that human beings are fundamentally motivated by religious devotion.", "isCorrect": false, "rationale": "The text argues Boccaccio has a 'complex moral vision' where the sacred and profane coexist, rather than focusing solely on devotion."}, {"text": "By creating a simplified moral system where vice is always punished and virtue always rewarded.", "isCorrect": false, "rationale": "Boccaccio's refusal to simplify is highlighted; he acknowledges that people are capable of both generosity and cruelty simultaneously."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
