</div>

<script>
var QUESTIONS = [{"question": "What primary structural purpose does Boccaccio serve by transitioning from the lightheartedness of Day III to the tragedies of Day IV?", "options": [{"text": "To demonstrate that themes like love should not be taken for granted as purely comedic or safe.", "isCorrect": true, "rationale": "By subverting the reader's expectation of wit and fortune established in the first three days, Boccaccio emphasizes the volatile and potentially destructive nature of love."}, {"text": "To prove that fortune, the dominant theme of Day II, is the primary cause of human suffering.", "isCorrect": false, "rationale": "While fortune is central to Day II, the commentary specifies that Day IV's tragedies are typically caused by the intervention of social authority rather than random fortune."}, {"text": "To satisfy the criticisms of those who claimed he was too devoted to the concerns of women.", "isCorrect": false, "rationale": "While Boccaccio addresses these critics in his preface, the structural shift to tragedy is intended to challenge the reader's complacency regarding the text's themes."}, {"text": "To align the Decameron with the strict moralizing tradition of medieval Christian exempla.", "isCorrect": false, "rationale": "Boccaccio's focus on love as a natural force often complicates or challenges traditional moralizing structures rather than simply adhering to them."}]}, {"question": "In the context of Ghismonda's speech in IV.1, how does Boccaccio define the concept of 'Natural Law'?", "options": [{"text": "The principle that certain moral truths are inherent in nature and supersede human social decrees.", "isCorrect": true, "rationale": "Ghismonda argues that because nature plants love in the heart, it is a natural law that cannot be uprooted by human authority without doing violence to the natural order."}, {"text": "The biological necessity that dictates human survival through procreation and lineage.", "isCorrect": false, "rationale": "This interpretation is too narrow; the text defines Natural Law as a philosophical principle discoverable by reason that defends the legitimacy of desire against social claims."}, {"text": "The divine right of fathers and husbands to govern the behavior of their female relatives.", "isCorrect": false, "rationale": "The concept of Natural Law is used by Ghismonda specifically to challenge and invalidate the absolute authority of social figures like fathers."}, {"text": "The legal framework of fourteenth-century Italy that governed the rights of the nobility.", "isCorrect": false, "rationale": "Natural Law refers to truths independent of human convention, whereas legal frameworks are the very 'human conventions' Ghismonda argues against."}]}, {"question": "Ghismonda's argument regarding 'nobilta' (nobility) reflects a contemporary medieval debate also found in which other major work?", "options": [{"text": "Dante's Convivio", "isCorrect": true, "rationale": "The text notes that Dante argued in the fourth book of the Convivio that true nobility is determined by virtue rather than blood or lineage."}, {"text": "Chaucer's Troilus and Criseyde", "isCorrect": false, "rationale": "While Chaucer's work is mentioned as sharing a tragic sensibility, it is not cited as the source of the specific debate on the origins of nobility."}, {"text": "The Roman de Chatelain de Couci", "isCorrect": false, "rationale": "This work is mentioned in relation to the 'eaten heart' motif rather than the philosophical debate on lineage versus virtue."}, {"text": "The Provençal vidas", "isCorrect": false, "rationale": "The vidas provided the legendary source for specific plots, such as the 'eaten heart,' but are not credited with the intellectual argument regarding nobility."}]}, {"question": "What is the primary rhetorical goal of the parable of Filippo Balducci and the 'goslings' in the Preface to Day IV?", "options": [{"text": "To demonstrate that the impulse toward love is hardwired into human nature and thus inescapable.", "isCorrect": true, "rationale": "The parable shows that even a boy raised in total isolation is immediately captivated by women, proving that love is a natural force rather than a learned corruption."}, {"text": "To warn the youth of Florence about the dangers of excessive physical desire.", "isCorrect": false, "rationale": "The parable is defensive and celebratory of nature, rather than a cautionary tale meant to discourage desire."}, {"text": "To illustrate the effectiveness of religious education in suppressing worldly temptations.", "isCorrect": false, "rationale": "The parable actually shows the failure of the father's attempt to use religious seclusion to suppress the boy's natural instincts."}, {"text": "To satirize the ignorance of the clergy regarding the realities of peasant life.", "isCorrect": false, "rationale": "While Boccaccio often satirizes the clergy, this specific parable focuses on the universality of attraction rather than class or professional ignorance."}]}, {"question": "Why does Boccaccio include the comic tales of Fra Alberto (IV.2) and the Physician's Wife (IV.10) within a Day dedicated to tragedy?", "options": [{"text": "To frame the tragic content and prevent the tone from becoming overwhelmingly dark.", "isCorrect": true, "rationale": "The text explains that these tales serve as ironic counterpoints and deliberate lighteners of tone, providing variety within the dominant tragic theme."}, {"text": "To show that women are more likely to find happy endings than men in situations of illicit love.", "isCorrect": false, "rationale": "The outcome for women in Day IV is frequently tragic (e.g., Ghismonda, Lisabetta), so these comic tales are structural exceptions rather than a gender-based rule."}, {"text": "To indicate that Boccaccio was unable to sustain a purely tragic narrative for ten stories.", "isCorrect": false, "rationale": "The commentary describes the placement of these tales as 'deliberate' and 'strategic,' suggesting an intentional artistic choice rather than a failure of focus."}, {"text": "To argue that cleverness (industry) always overcomes the obstacles of authority.", "isCorrect": false, "rationale": "Day IV specifically highlights instances where cleverness fails to save lovers from social power, making these two tales exceptions to the prevailing rule."}]}, {"question": "According to the comparison with Chaucer, how does Boccaccio's approach to tragic love differ from that of the English poet?", "options": [{"text": "Boccaccio focuses on raw, direct emotional intensity, while Chaucer's mode is more philosophically meditative.", "isCorrect": true, "rationale": "The text states that Boccaccio demands the reader feel the injustice of destroyed love, whereas Chaucer pulls back to consider the broader implications of suffering."}, {"text": "Boccaccio views love as a destructive weakness, while Chaucer views it as a source of virtue.", "isCorrect": false, "rationale": "Both authors agree that love is a force beyond human control; they differ in their emotional response to that reality, not their fundamental view of its power."}, {"text": "Boccaccio's tragedies are rooted in political conflict, while Chaucer's are rooted in family disputes.", "isCorrect": false, "rationale": "The source material identifies social authority—including fathers and brothers—as the primary cause of tragedy in Boccaccio's Day IV."}, {"text": "Boccaccio uses irony to distance the reader, while Chaucer uses direct address to build empathy.", "isCorrect": false, "rationale": "The text actually suggests the opposite: Boccaccio is direct and passionate, while Chaucer introduces irony and ambiguity to complicate the tragedy."}]}, {"question": "In the tale of Guillaume de Roussillon (IV.9), what does the wife's suicide symbolize according to the commentary?", "options": [{"text": "An act of defiance and a statement of ultimate fidelity in a world that violated love.", "isCorrect": true, "rationale": "Her declaration that no food will follow the 'noble morsel' of her lover's heart transforms her death into a refusal to live where love is crushed."}, {"text": "A manifestation of medieval despair and a lack of Christian hope.", "isCorrect": false, "rationale": "The commentary frames her suicide as a powerful statement of loyalty and transcendence, rather than a theological failure or simple despair."}, {"text": "The inevitable end of those who prioritize physical passion over social duty.", "isCorrect": false, "rationale": "This interpretation would align with the 'authority' characters in the tales; the text itself invites readers to view the wife's action as heroic and absolute."}, {"text": "A psychological breakdown caused by the grotesque nature of the husband's crime.", "isCorrect": false, "rationale": "While the act is grotesque, the text emphasizes the symbolic weight of her devotion and her conscious choice of fidelity over life."}]}, {"question": "Which specific criticism does Boccaccio address in the Author's Preface to Day IV?", "options": [{"text": "That he should spend his time among the wise rather than writing about love.", "isCorrect": true, "rationale": "One of the three criticisms mentioned is that Boccaccio 'would do better to seek his bread among the wise' instead of writing frivolous tales for women."}, {"text": "That his use of the vernacular language is unsuitable for tragic subjects.", "isCorrect": false, "rationale": "While language was a common debate, the Preface specifically focuses on his devotion to women, his focus on love, and his professional choices."}, {"text": "That he has plagiarized the works of Provençal troubadours.", "isCorrect": false, "rationale": "Though he uses Provençal legends, this is not one of the three specific criticisms he identifies and defends himself against in the Preface."}, {"text": "That the Decameron is too lengthy and lacks structural unity.", "isCorrect": false, "rationale": "The criticisms are thematic and personal—related to his subject matter and audience—rather than focused on the length or unity of the work."}]}, {"question": "In the 'Teacher Note' section, what is identified as the core cause of tragedy in the Decameron's Fourth Day?", "options": [{"text": "The crushing of natural love by human authority without offering a legitimate alternative.", "isCorrect": true, "rationale": "The tragedy arises when fathers or brothers destroy natural desire rather than providing a socially acceptable path for it."}, {"text": "The inherent sinfulness of desire when it occurs outside of the bonds of marriage.", "isCorrect": false, "rationale": "Boccaccio argues that the capacity for love is natural and not inherently sinful; the tragedy is blamed on the suppression of that love by social power."}, {"text": "The lack of wisdom and prudence shown by young lovers in the face of danger.", "isCorrect": false, "rationale": "While some tales (like IV.3) involve a lack of prudence, the dominant pattern is the 'intervention of authority' against 'autonomous desire'."}, {"text": "A random series of misfortunes that prove the cruelty of a godless universe.", "isCorrect": false, "rationale": "Though misfortune plays a role in some tales (like IV.7), the commentary emphasizes that lovers are usually separated by deliberate human intervention."}]}, {"question": "How does the tale of Lisabetta (IV.5) create emotional power differently than the tale of Ghismonda (IV.1)?", "options": [{"text": "Through the use of poignant imagery and restraint rather than rhetorical elaboration.", "isCorrect": true, "rationale": "Lisabetta's tale relies on the enduring symbol of the basil pot and emotional restraint, whereas Ghismonda's tale centers on her long, intellectual speech."}, {"text": "By focusing on the economic motivations of the brothers rather than the passion of the lovers.", "isCorrect": false, "rationale": "While the brothers' economic motivations are part of the plot, the 'emotional power' for the reader comes from the imagery of Lisabetta's grief."}, {"text": "By providing a happy resolution that highlights the injustice of earlier tragedies.", "isCorrect": false, "rationale": "Lisabetta's tale is noted as 'the most emotionally affecting' tragedy, ending in her death and sorrow, not a happy resolution."}, {"text": "By utilizing the 'eaten heart' motif to shock the reader into sympathy.", "isCorrect": false, "rationale": "The 'eaten heart' motif belongs to the tale of Guillaume de Roussillon (IV.9), not to Lisabetta's story."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
