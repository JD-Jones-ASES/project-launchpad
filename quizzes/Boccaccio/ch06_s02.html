    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Boccaccio.html">&larr; Back to Tales of the Decameron (Boccaccio)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 6, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the introduction of Day the Fifth, what specific theme does Queen Fiammetta decree for the stories of the day?", "options": [{"text": "Lovers who achieve a happy resolution after facing severe or disastrous trials.", "isCorrect": true, "rationale": "The queen explicitly chooses a theme of 'happy issue' to balance the somber tragedies of the previous day."}, {"text": "The destructive nature of love leading to the death of protagonists by their kin.", "isCorrect": false, "rationale": "This theme describes the content of Day IV, which Day V is intended to counteract."}, {"text": "The idealized and ennobling romantic love between members of the high nobility.", "isCorrect": false, "rationale": "While courtly love is an influence, Boccaccio's lovers in Day V are noted for not always being knights and ladies."}, {"text": "The random and chaotic intervention of fate in the lives of ordinary merchants.", "isCorrect": false, "rationale": "While luck or fortuna plays a role, the central theme is the eventual happy ending for lovers specifically."}], "id": "q01"}, {"question": "What does the movement from Day IV to Day V represent within the deeper structural rhythm of the Decameron?", "options": [{"text": "The deliberate alternation between tragedy and comedy reflecting the turning of fortuna.", "isCorrect": true, "rationale": "The text states that the movement from sorrow to happiness reflects the unpredictable nature of luck or fortune."}, {"text": "A progression from secular romance toward more religious and moralistic storytelling.", "isCorrect": false, "rationale": "The source material emphasizes the shift between emotional states and luck rather than a shift toward religion."}, {"text": "The gradual decline of the brigata's spirits as the plague continues in the outside world.", "isCorrect": false, "rationale": "The brigata uses storytelling to create order and light to follow the darkness, not to mirror a decline in spirits."}, {"text": "A transition from focus on commoners to a focus on the courtly ideals of Naples.", "isCorrect": false, "rationale": "While Naples influenced Boccaccio, the structure is defined by the oscillation of mood and fate."}], "id": "q02"}, {"question": "How does Boccaccio transform the traditions of French courtly love in the tales of Day V?", "options": [{"text": "By rewarding lovers based on their individual suffering and luck rather than just noble birth.", "isCorrect": true, "rationale": "The text explains that happy endings are earned through sacrifice and luck, and characters are not limited to knights and ladies."}, {"text": "By strictly adhering to the medieval convention of idealized love between knights and noble ladies.", "isCorrect": false, "rationale": "The source explicitly states that Boccaccio 'transforms' these traditions and his lovers are not always of noble status."}, {"text": "By portraying love as a purely destructive force that only brings sorrow and death.", "isCorrect": false, "rationale": "This portrayal is associated with Day IV, whereas Day V focuses on love's ability to overcome obstacles."}, {"text": "By removing the element of adventure and focusing solely on the domestic lives of the characters.", "isCorrect": false, "rationale": "Day V is noted for drawing specifically on 'traditions of romance and adventure' rather than domestic realism."}], "id": "q03"}, {"question": "What is the meaning of the name 'Fiammetta,' the queen of Day V?", "options": [{"text": "Little flame.", "isCorrect": true, "rationale": "The text defines Fiammetta as 'Little flame,' the name Boccaccio gave to the woman he loved in early works."}, {"text": "Bright star.", "isCorrect": false, "rationale": "While it suggests light, the literal translation provided in the source refers to fire."}, {"text": "Golden flower.", "isCorrect": false, "rationale": "The name is associated with heat and light rather than flora."}, {"text": "Peaceful heart.", "isCorrect": false, "rationale": "The translation given in the text is specifically related to the imagery of a flame."}], "id": "q04"}, {"question": "In the primary source introduction to Day V, what causes the company to return to the villa from the meads?", "options": [{"text": "The rays of the sun becoming uncomfortably scorching.", "isCorrect": true, "rationale": "The text mentions that they retraced their steps after feeling the sun's rays grow 'somewhat scorching.'"}, {"text": "The arrival of the noon hour and the call for the siesta.", "isCorrect": false, "rationale": "The siesta occurs later; they return to the villa much earlier to take pastime in the garden before breakfast."}, {"text": "A sudden rainstorm that forced them to seek shelter.", "isCorrect": false, "rationale": "The morning is described as clear and bright, and the return is prompted by heat, not rain."}, {"text": "The queen's immediate desire to begin the day's storytelling.", "isCorrect": false, "rationale": "The storytelling does not begin until after the siesta, following several other communal activities."}], "id": "q05"}, {"question": "Which of the following activities does the brigata engage in immediately before sitting down to breakfast?", "options": [{"text": "Singing a stampita and a balladette or two.", "isCorrect": true, "rationale": "The primary source states they sang these musical forms gaily at the queen's behest before eating."}, {"text": "Dancing a few short measures to music.", "isCorrect": false, "rationale": "The text specifies that the dancing occurred after the meal was finished, not before."}, {"text": "Drinking excellent wines and eating comfits.", "isCorrect": false, "rationale": "The wines and comfits were consumed upon their return to the villa to repair 'slight fatigue,' prior to their pastime in the garden."}, {"text": "Listening to the first story told by Pamfilo.", "isCorrect": false, "rationale": "Pamfilo's storytelling is the final major event mentioned, occurring after the siesta."}], "id": "q06"}, {"question": "Who is the first member of the brigata called upon by Queen Fiammetta to begin the tales of good fortune?", "options": [{"text": "Pamfilo.", "isCorrect": true, "rationale": "The text states the queen glanced towards Pamfilo and bade him lead off with the stories."}, {"text": "Dioneo.", "isCorrect": false, "rationale": "While a member of the group, he is not the one designated by the queen to start Day V."}, {"text": "Filostrato.", "isCorrect": false, "rationale": "Filostrato was the king of the tragic Day IV, but he does not lead the storytelling here."}, {"text": "Elissa.", "isCorrect": false, "rationale": "The queen specifically chooses one of the 'gallants,' and the text identifies him as Pamfilo."}], "id": "q07"}, {"question": "What is the purpose of the 'discreet seneschal' mentioned in the primary source?", "options": [{"text": "Making all things ready for the meal.", "isCorrect": true, "rationale": "The text notes the meal was 'made ready by the discreet seneschal' before the company sat down to eat."}, {"text": "Enforcing the rules of the storytelling contest.", "isCorrect": false, "rationale": "The queen, not the seneschal, oversees the themes and the order of the stories."}, {"text": "Leading the musical accompaniment for the dances.", "isCorrect": false, "rationale": "The music and song are mentioned generally, while the seneschal's role is specifically linked to the preparations."}, {"text": "Guarding the villa from the spread of the plague.", "isCorrect": false, "rationale": "While the villa provides safety, the seneschal's described role is domestic and organizational."}], "id": "q08"}, {"question": "Where does the brigata reassemble to hear the stories after their afternoon rest?", "options": [{"text": "By the fountain.", "isCorrect": true, "rationale": "The text specifies that shortly after none, they reassembled 'according to their wont, by the fountain.'"}, {"text": "In the broad champaign.", "isCorrect": false, "rationale": "They walked there in the morning but returned to the villa when it became too hot."}, {"text": "On the roof of the villa.", "isCorrect": false, "rationale": "The villa is mentioned, but the specific site for storytelling is near a water feature in the garden."}, {"text": "Under the boughs where the birds carolled.", "isCorrect": false, "rationale": "This was the location of their dawn stroll, not the formal storytelling assembly."}], "id": "q09"}, {"question": "Which phrase from the text describes the types of obstacles lovers in Day V must overcome?", "options": [{"text": "Divers direful or disastrous adventures.", "isCorrect": true, "rationale": "This is the queen's formulation of the theme, emphasizing the difficulty before the happy issue."}, {"text": "The cruel dictates of noble fathers.", "isCorrect": false, "rationale": "This characterizes the tragedies of Day IV rather than the broader adventures of Day V."}, {"text": "The simple misunderstandings of common folk.", "isCorrect": false, "rationale": "The adventures are described as 'direful or disastrous,' suggesting higher stakes than simple misunderstandings."}, {"text": "The inevitable laws of tragedy.", "isCorrect": false, "rationale": "Day V is a move away from tragedy toward a comedic or romantic structure."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
