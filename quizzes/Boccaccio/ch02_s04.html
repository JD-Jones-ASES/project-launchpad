        <a href="../../courses/Boccaccio.html">&larr; Back to Tales of the Decameron (Boccaccio)</a>

        <div class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 2, Section 4</div>

        <div class="score-pct" id="score-pct"></div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the introductory text, what specific quality did medieval Western literature frequently attribute to Saladin, despite his religious identity?", "options": [{"text": "Religious dogmatism", "isCorrect": false, "rationale": "The text highlights Saladin as an example of cross-cultural respect rather than narrow religious intolerance."}, {"text": "Chivalric virtue", "isCorrect": true, "rationale": "Saladin was widely admired in the West as a model of chivalry, which served as a notable instance of medieval cross-cultural respect."}, {"text": "Unparalleled cruelty", "isCorrect": false, "rationale": "While he was a military adversary, the text emphasizes his admiration as a virtuous figure rather than a cruel one."}, {"text": "Theological scholarship", "isCorrect": false, "rationale": "While Saladin asks a theological question, his reputation in literature was built on his conduct and character as a leader."}], "id": "q01"}, {"question": "What is Saladin's primary motivation for summoning Melchisedech to his presence?", "options": [{"text": "To seek spiritual guidance regarding the three laws", "isCorrect": false, "rationale": "While he asks a spiritual question, his internal motive is described as a 'pretext' for a different goal."}, {"text": "To punish the Jew for his known miserly behavior", "isCorrect": false, "rationale": "Saladin was not disposed to use force ('constrain him') initially, though he found the Jew's miserliness an obstacle to his real goal."}, {"text": "To create a legal reason to extort a necessary loan", "isCorrect": true, "rationale": "Saladin needed a large sum of money quickly and devised the trap to provide a 'colorably reasonable pretext' for taking it."}, {"text": "To debate the merits of the Saracen law against others", "isCorrect": false, "rationale": "The debate was merely the means (the 'snare') to achieve a financial end necessitated by his empty treasury."}], "id": "q02"}, {"question": "In Melchisedech's parable, how is the legitimate heir to the father's estate historically determined?", "options": [{"text": "By the son who showed the most obedience", "isCorrect": false, "rationale": "The sons were all obedient, which is what led to the father's dilemma in the first place."}, {"text": "By the possession of a specific, ancient ring", "isCorrect": true, "rationale": "The father ordained that whichever son held the ring by his bequest would be designated the heir and superior."}, {"text": "By the decision of a cunning artificer", "isCorrect": false, "rationale": "The artificer was only employed to make copies of the ring, not to determine the lineage."}, {"text": "By the consensus of the other brothers", "isCorrect": false, "rationale": "The ring conferred the right to receive 'honour and homage' from the others, rather than being granted by them."}], "id": "q03"}, {"question": "Why does the father in the parable commission two additional rings?", "options": [{"text": "He wanted to confuse his sons to prevent any one of them from becoming too powerful", "isCorrect": false, "rationale": "The text states his motivation was love and a desire to satisfy his sons' requests, not a desire to limit their power."}, {"text": "The original ring had been lost or damaged beyond repair", "isCorrect": false, "rationale": "The original ring was still in his treasury; the copies were made to match its beauty and value."}, {"text": "He loved all three of his sons equally and could not bear to choose one over the others", "isCorrect": true, "rationale": "Because the sons were equally 'goodly and virtuous' and he loved them 'indifferently,' he sought a way to satisfy each of them."}, {"text": "To test which of his sons was wise enough to identify the true original", "isCorrect": false, "rationale": "The rings were made so perfectly that 'the maker himself could hardly tell' them apart, making it an impossible test of identification."}], "id": "q04"}, {"question": "Melchisedech concludes his story by stating that the question of the 'true law' is 'pendent.' What does this mean in the context of the tale?", "options": [{"text": "The question is irrelevant to the modern world", "isCorrect": false, "rationale": "The story suggests the question is still considered vital by each people, even if it cannot be resolved."}, {"text": "The answer has been decided by God but not yet revealed to man", "isCorrect": false, "rationale": "While implied, the term 'pendent' refers specifically to the ongoing, unresolved nature of the 'suit' or dispute."}, {"text": "The question remains undecided and currently impossible to settle through human judgment", "isCorrect": true, "rationale": "Just as the 'true ring' could not be distinguished, the claims of the three faiths remain unresolved in the eyes of men."}, {"text": "All three laws are equally false and mere copies of an original truth", "isCorrect": false, "rationale": "The parable suggests each believes they have the 'true law,' not that all are inherently fraudulent or secondary."}], "id": "q05"}, {"question": "How does Saladin respond to Melchisedech's refusal to provide a direct answer to his question?", "options": [{"text": "He grows angry at the Jew's perceived insolence and evasion", "isCorrect": false, "rationale": "The 'notebox' specifically highlights that Saladin does not react with anger."}, {"text": "He acknowledges the Jew's wit and honestly reveals his own financial need", "isCorrect": true, "rationale": "Saladin admires the 'excellent adroitness' of the Jew and decides to be transparent about his necessity for money."}, {"text": "He continues to press the question until Melchisedech admits which law is best", "isCorrect": false, "rationale": "Saladin recognizes that the snare was avoided and changes his approach entirely."}, {"text": "He banishes the Jew for failing to answer the Sultan's query", "isCorrect": false, "rationale": "On the contrary, he gives him a 'great and honourable position' near his person."}], "id": "q06"}, {"question": "Filomena introduces her story by stating that it will show how 'good sense' can help a person. What is the specific 'peril' the hero faces in this tale?", "options": [{"text": "Being executed for practicing Judaism in a Muslim state", "isCorrect": false, "rationale": "The danger is not religious persecution itself, but a verbal trap designed to lead to financial ruin or harassment."}, {"text": "Losing his entire fortune to a group of swindlers in Alexandria", "isCorrect": false, "rationale": "The threat comes directly from the Sultan, not from common thieves or swindlers."}, {"text": "Falling into a trap where any direct answer could be used against him", "isCorrect": true, "rationale": "Melchisedech realizes that praising any of the three laws over the others would provide Saladin with the 'pretext which he sought' to harass him."}, {"text": "The loss of a precious family heirloom ring", "isCorrect": false, "rationale": "The ring is a fictional element of the parable Melchisedech tells, not a physical object he actually possesses."}], "id": "q07"}, {"question": "What happens to the relationship between Saladin and Melchisedech by the end of the narrative?", "options": [{"text": "They remain wary business partners with mutual distrust", "isCorrect": false, "rationale": "The text describes 'lifelong amity,' which implies a deep bond of friendship rather than just business."}, {"text": "Melchisedech is forced into servitude to pay back the Sultan's debts", "isCorrect": false, "rationale": "The Sultan actually repaid the Jew in full and gave him 'munificent gifts'."}, {"text": "They develop a lasting friendship based on mutual respect and high status", "isCorrect": true, "rationale": "Melchisedech is granted lifelong amity, gifts, and an honorable position near the Sultan."}, {"text": "Melchisedech eventually converts to Islam to please his new friend", "isCorrect": false, "rationale": "The text does not mention conversion; the point of the story is the acceptance of unresolved religious differences."}], "id": "q08"}, {"question": "Which 18th-century literary work was directly inspired by Boccaccio's version of this story?", "options": [{"text": "The Ring of the Nibelung", "isCorrect": false, "rationale": "This is a 19th-century opera cycle by Wagner based on Norse mythology, not Boccaccio."}, {"text": "Nathan the Wise", "isCorrect": true, "rationale": "The text notes that Boccaccio's version later inspired Gotthold Ephraim Lessing's 1779 play, 'Nathan the Wise'."}, {"text": "The Merchant of Venice", "isCorrect": false, "rationale": "While it features a Jewish moneylender, it is a Shakespearean play from the 16th century with a different plot."}, {"text": "Candide", "isCorrect": false, "rationale": "This is a work by Voltaire that satirizes optimism, not a play inspired by the three rings parable."}], "id": "q09"}, {"question": "What does the 'cunning artificer' represent in the context of the story's outcome?", "options": [{"text": "The deceptive nature of false prophets", "isCorrect": false, "rationale": "There is no indication in the text that the artificer or the father's plan was intended to be malicious or deceptive."}, {"text": "The impossibility of humans distinguishing between the divine claims of different faiths", "isCorrect": true, "rationale": "The craftsman's skill in making the rings identical mirrors the equal conviction and evidence presented by the three religions."}, {"text": "The superiority of Islam as the final and most 'perfect' copy", "isCorrect": false, "rationale": "The parable emphasizes that no one, including the maker, can tell which is the original, implying equality among the three."}, {"text": "The inherent flaws in the original ring", "isCorrect": false, "rationale": "The copies were made to match the beauty and value of the original, not to replace a flawed item."}], "id": "q10"}, {"question": "What does the narrator Filomena mean when she says that 'good sense will extricate the wise from extremity of peril'?", "options": [{"text": "Physical strength is always superior to mental agility in moments of crisis.", "isCorrect": false, "rationale": "The tale of Melchisedech demonstrates the exact opposite: intellectual resourcefulness (good sense) defeats the power of a sultan."}, {"text": "Intellectual resourcefulness can rescue a person from dangerous situations where force or pleading fails.", "isCorrect": true, "rationale": "Melchisedech's wise response — a parable instead of a direct answer — sidesteps Saladin's trap and transforms a threat into a friendship, illustrating Boccaccio's value of ingegno."}, {"text": "A person of good character will always be protected from harm by divine providence.", "isCorrect": false, "rationale": "The tale is not about divine protection; it demonstrates the power of human wisdom and wit to navigate dangerous social situations."}, {"text": "Moral virtue is the only reliable defense against the wickedness of powerful men.", "isCorrect": false, "rationale": "Melchisedech's virtue is his wit, not specifically his moral character; the tale celebrates practical intelligence over abstract virtue."}], "id": "q11"}, {"question": "The tale of the Three Rings was not original to Boccaccio. What does his version uniquely accomplish compared to its earlier circulations in medieval literature?", "options": [{"text": "It resolves the question of the true religion by revealing Christianity as the authentic 'ring'.", "isCorrect": false, "rationale": "Boccaccio's version deliberately refuses to resolve the question, which is precisely what distinguishes it and made it influential."}, {"text": "It becomes the most famous and influential version, later inspiring Lessing's Nathan the Wise.", "isCorrect": true, "rationale": "While the tale circulated widely before Boccaccio, his polished, psychologically nuanced version became the canonical form — famous enough to inspire a major 18th-century philosophical play."}, {"text": "It transforms the tale from a Jewish parable into a Christian defense of Church authority.", "isCorrect": false, "rationale": "Boccaccio's version does not defend Church authority; it questions religious certainty and elevates cross-faith respect."}, {"text": "It is the first version to place the tale in the mouth of a Muslim character rather than a Jewish one.", "isCorrect": false, "rationale": "Melchisedech, the Jewish moneylender, tells the parable to Saladin in Boccaccio's version; the Jew remains the tale's wise protagonist."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
