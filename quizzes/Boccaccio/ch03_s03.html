<script>
var QUESTIONS = [{"question": "At the beginning of the tale, what specific behavior of Andreuccio's identifies him as 'raw and unwary' to the people of Naples?", "options": [{"text": "He openly displayed his purse of five hundred florins to demonstrate his purchasing power.", "isCorrect": true, "rationale": "Andreuccio's naivety is established when he repeatedly draws out his purse in the marketplace to show he 'meant business,' making him an easy target for thieves."}, {"text": "He traveled alone without any experienced merchants to guide him through the foreign city.", "isCorrect": false, "rationale": "The text states he was in the company of other merchants, though he failed to heed the social dangers they might have warned him about."}, {"text": "He stayed at an inn known for housing disreputable characters and swindlers.", "isCorrect": false, "rationale": "While he eventually ends up in a dangerous quarter, his choice of inn is not presented as the primary indicator of his lack of caution."}, {"text": "He attempted to bargain for horses on a Sunday evening during the time of vespers.", "isCorrect": false, "rationale": "The text notes he arrived on Sunday but waited until Monday morning to begin his 'chaffering' at the fair."}]}, {"question": "How did the Sicilian girl acquire the specific family details necessary to convince Andreuccio that she was his long-lost sister?", "options": [{"text": "She had once been a servant in his father's house in Perugia many years prior.", "isCorrect": false, "rationale": "While she used a servant's knowledge, the girl herself was never the servant; she was the one orchestrating the scam."}, {"text": "An old woman who previously served Andreuccio's father provided her with the information.", "isCorrect": true, "rationale": "The old woman had lived with Andreuccio's father in both Sicily and Perugia, and she unwittingly gave the girl the 'circumstantial information' needed for the ruse."}, {"text": "She overheard Andreuccio boasting about his father's past life in Palermo at the inn.", "isCorrect": false, "rationale": "Andreuccio was actually the one being questioned; he 'answered all her questions' only after she had already established her credibility using pre-acquired knowledge."}, {"text": "She found a collection of old letters belonging to Andreuccio's father in a discarded chest.", "isCorrect": false, "rationale": "The source material emphasizes a personal connection through the old woman rather than discovered documents."}]}, {"question": "According to the Sicilian girl's fabricated story, why did her father, Pietro, leave her behind in Palermo?", "options": [{"text": "He was forced to flee Sicily due to his political affiliations with the Guelf party.", "isCorrect": false, "rationale": "This detail was part of the husband's backstory, used to explain why the 'sister' was currently living in Naples."}, {"text": "He returned to Perugia and simply neglected his obligations to her and her mother.", "isCorrect": true, "rationale": "The girl claims Pietro left her as a little girl to return to Perugia and never 'bestowed a thought' upon them again, framing it as an act of ingratitude."}, {"text": "He believed she had died during a local uprising shortly after her birth.", "isCorrect": false, "rationale": "The story relies on the father's abandonment and silence rather than a misunderstanding of her survival."}, {"text": "He was a man of low degree who could not afford to take a child on his travels.", "isCorrect": false, "rationale": "The girl specifically mentions she was born to a 'gentlewoman' and not a 'woman of low degree' to heighten the father's perceived guilt."}]}, {"question": "What physical mechanism caused Andreuccio's initial 'fall' into the sewer in the 'Evil Hole' district?", "options": [{"text": "A trapdoor in the floor of the bedroom was triggered by the Sicilian girl.", "isCorrect": false, "rationale": "This would imply a mechanical device, whereas the text describes a structural hazard in a specific area of the house."}, {"text": "The balcony collapsed while he was attempting to call for help after the girl locked him in.", "isCorrect": false, "rationale": "The fall happened before he realized he was being swindled, occurring while he was seeking 'nature's discharge.'"}, {"text": "A plank spaning an alley was detached from its joists, giving way when he stepped on it.", "isCorrect": true, "rationale": "The text describes a narrow alley spanned by planks where 'that which fell with Andreuccio was one,' causing him to fall into the ordure below."}, {"text": "He slipped on a wet floor near a well while attempting to wash his hands before dinner.", "isCorrect": false, "rationale": "While he does encounter a well later, his initial fall was from a height into a blind alley used for waste."}]}, {"question": "Why did the two thieves Andreuccio met in the dismantled house tell him he was 'lucky' to have fallen into the sewer?", "options": [{"text": "The stench from the fall prevented the girl's bully from following and murdering him.", "isCorrect": false, "rationale": "The bully did not follow him because the girl already had the money; the thieves suggest a different danger he narrowly avoided."}, {"text": "Had he stayed in the house and fallen asleep, he likely would have been killed for his money.", "isCorrect": true, "rationale": "The thieves point out that falling was a blessing in disguise because otherwise, he would have been 'knocked on the head' and lost his life along with his florins."}, {"text": "The fall allowed him to hide in a place where the city patrols would never think to look.", "isCorrect": false, "rationale": "The patrols actually find him at the well later; the fall itself was what put him in the position to meet the thieves."}, {"text": "Falling into the sewer was considered a sign of good fortune among the local criminal underworld.", "isCorrect": false, "rationale": "There is no cultural superstition mentioned; the 'luck' is purely practical regarding his survival."}]}, {"question": "During the robbery of Archbishop Filippo Minutolo's tomb, why does Andreuccio decide to hide the ruby ring on his own person?", "options": [{"text": "He intended to return it to the church authorities the following morning.", "isCorrect": false, "rationale": "Andreuccio's motivations had shifted toward survival and recovery of his lost wealth, as noted by his 'cupidity getting the better of caution.'"}, {"text": "He suspected the thieves would abandon him in the tomb once they had the treasure.", "isCorrect": true, "rationale": "Andreuccio realized that if he handed everything up, the thieves would 'be off about their business' and leave him with nothing for his pains."}, {"text": "The ring was too small for the thieves' fingers, so he kept it for himself.", "isCorrect": false, "rationale": "The thieves specifically ask for the ring, indicating they wanted it; the size of the ring is never mentioned as a factor."}, {"text": "He forgot to hand it up because of the 'fetid odours' that were making him faint.", "isCorrect": false, "rationale": "He 'feigned' to search for it, which indicates a deliberate choice to keep it rather than an accidental omission."}]}, {"question": "What is the primary irony regarding the value of the ruby ring Andreuccio acquires from the tomb?", "options": [{"text": "The ring was actually a worthless glass imitation planted by the Archbishop.", "isCorrect": false, "rationale": "The ring is described as a 'ruby on his finger, worth over five hundred florins of gold,' and its value is confirmed by the outcome of the story."}, {"text": "It was the same ring his father had lost years earlier in Palermo.", "isCorrect": false, "rationale": "There is no mention of his father's possessions being related to the Archbishop's ring."}, {"text": "Its value was approximately equal to or greater than the five hundred florins he had originally lost.", "isCorrect": true, "rationale": "The story concludes with Andreuccio returning to Perugia having 'invested' his original sum in a ring that was worth even more than his lost florins."}, {"text": "The ring was cursed, leading to the series of misfortunes he suffered throughout the night.", "isCorrect": false, "rationale": "The misfortunes happened before he ever saw the ring; the ring was actually the reward at the end of his ordeal."}]}, {"question": "How did Andreuccio manage to escape from the tomb after being locked inside by his thieving companions?", "options": [{"text": "He used the iron crowbars left behind by the thieves to pry the lid open from the inside.", "isCorrect": false, "rationale": "The thieves took their tools, and Andreuccio found his efforts to 'heave it up' fruitless due to the weight of the marble."}, {"text": "A group of city patrols investigating the church heard his cries and released him.", "isCorrect": false, "rationale": "The patrols encountered him at the well earlier; the group at the tomb was there for a much more sinister reason."}, {"text": "He frightened away a second group of grave robbers, including a priest, who had opened the tomb.", "isCorrect": true, "rationale": "By grabbing the leg of a priest who was attempting to enter the tomb, Andreuccio caused a panic that left the tomb open, allowing him to spring out."}, {"text": "He waited until morning when the church was opened for Sunday mass and walked out unnoticed.", "isCorrect": false, "rationale": "The text states he arrived back at his inn towards daybreak, having already escaped the tomb while it was still dark."}]}, {"question": "What role do the city patrols play in Andreuccio's series of 'Fortune's Reversals'?", "options": [{"text": "They arrest him for public nuisance after he batters the door of the Sicilian girl.", "isCorrect": false, "rationale": "The neighbors merely threaten him, but the patrols do not arrive until the episode at the well."}, {"text": "They inadvertently rescue him from the bottom of a well while seeking a drink of water.", "isCorrect": true, "rationale": "The patrols, thirsty and tired, haul on the rope they believe is attached to a bucket, unintentionally bringing Andreuccio to the surface."}, {"text": "They provide him with the iron tools he eventually uses to enter the Archbishop's tomb.", "isCorrect": false, "rationale": "The thieves brought the tools; the patrols actually left their own arms and surcoats behind in terror at the well."}, {"text": "They guide him back to the Ruga Catalana so he can find his way to the sea.", "isCorrect": false, "rationale": "He was already on the Ruga Catalana when he hid from them; they were the reason he ended up at the well in the first place."}]}, {"question": "In the context of the story's structure, which of the following best describes the progression of Andreuccio's three main episodes?", "options": [{"text": "Each episode involves a higher level of physical danger and a greater potential reward.", "isCorrect": true, "rationale": "The episodes move from a financial swindle to a potential murder/drowning scenario, and finally to a high-stakes tomb robbery with a massive payoff."}, {"text": "The episodes represent Andreuccio's gradual descent into a life of crime in Naples.", "isCorrect": false, "rationale": "Though he participates in a robbery, the ending notes he returns to Perugia as a merchant, suggesting the events were an educational 'night' rather than a career shift."}, {"text": "Each episode is characterized by Andreuccio being rescued by the same group of merchants.", "isCorrect": false, "rationale": "The merchants at the inn only appear at the beginning and end; the central episodes involve different characters like the girl, the thieves, and the patrols."}, {"text": "The episodes occur over the course of a week to show the slow decay of Andreuccio's character.", "isCorrect": false, "rationale": "The narrator Fiammetta specifically highlights that 'a single night... sufficed for their occurrence.'"}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
