        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Boccaccio.html">&larr; Back to Tales of the Decameron (Boccaccio)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 4, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the commentary, what is the primary structural difference between the tales of Day II and Day III of the Decameron?", "options": [{"text": "Day II focuses on characters dominated by chance, while Day III features characters who actively shape their own destinies.", "isCorrect": true, "rationale": "The text states that whereas Day II shows characters buffeted by 'fortuna', Day III celebrates 'ingegno' where characters take fortune into their own hands."}, {"text": "Day II emphasizes religious devotion, whereas Day III focuses on secular cleverness and commercial success.", "isCorrect": false, "rationale": "While Day III does emphasize cleverness, the text defines the contrast specifically through the lens of 'fortuna' versus 'ingegno' rather than a shift from religious to secular themes."}, {"text": "Day II explores the lives of the nobility, while Day III shifts focus to the emerging Florentine merchant class.", "isCorrect": false, "rationale": "Although 'ingegno' is described as a Florentine value, the text does not claim that the social class of the protagonists is the primary structural divider between these specific Days."}, {"text": "Day II tales result in tragedy due to bad luck, while Day III tales always result in a comic 'happily ever after' for all characters.", "isCorrect": false, "rationale": "The text notes that Day III raises 'harder questions' and moral complexities, suggesting that outcomes are not always simple or universally 'happy'."}], "id": "q01"}, {"question": "Which quality does the source material identify as being the 'Supreme Virtue' in the world of the Decameron, valued even above moral virtue?", "options": [{"text": "Nobility of birth", "isCorrect": false, "rationale": "The text explicitly states that 'ingegno' is valued above birth and noble blood in the context of the commercial city of Florence."}, {"text": "Physical strength", "isCorrect": false, "rationale": "While physical attributes may appear in tales, the commentary identifies 'ingegno' as the quality that most reliably leads to success."}, {"text": "Ingegno", "isCorrect": true, "rationale": "The text defines 'ingegno' (intelligence, resourcefulness, wit) as the supreme quality that allows characters to achieve their desires and overcome obstacles."}, {"text": "Chastity", "isCorrect": false, "rationale": "The commentary notes that 'ingegno' is valued above moral virtue, and specifically mentions that tales like III.1 satireze the suppression of natural desires inherent in vows of chastity."}], "id": "q02"}, {"question": "How does Gillette of Narbonne's exercise of agency differ from typical medieval literary conventions for women?", "options": [{"text": "She rejects the authority of the patriarchy and the King to live an independent life.", "isCorrect": false, "rationale": "The text points out that she actually enlists the King's authority rather than rejecting it."}, {"text": "She acts as the architect of her own story rather than being a passive prize or victim.", "isCorrect": true, "rationale": "The commentary highlights that Boccaccio's women refuse passive roles like 'damsels to be rescued' and instead devise their own plans."}, {"text": "She uses magical intervention to circumvent social hierarchies that she cannot navigate.", "isCorrect": false, "rationale": "The text attributes her success to her understanding of social rules and her 'ingegno', not to magic."}, {"text": "She overtly subverts social norms by refusing to participate in the system of arranged marriage.", "isCorrect": false, "rationale": "The commentary states that she does not rebel against the system of arranged marriage but instead uses it to her advantage."}], "id": "q03"}, {"question": "In the comparison between Gillette of Narbonne and Chaucer's Wife of Bath, what is the shared characteristic that defines them both as compelling 14th-century voices?", "options": [{"text": "Their insistence on their right to act and choose based on their own intelligence and experience.", "isCorrect": true, "rationale": "The text notes that both women insist on their right to act, choose, and speak, achieving their aims through persistence and intelligence."}, {"text": "Their shared tactic of using quiet, submissive behavior to deceive the men in their lives.", "isCorrect": false, "rationale": "The text describes the Wife of Bath as 'louder and more openly subversive', which contradicts the idea of being quiet and submissive."}, {"text": "Their reliance on 'auctoritee' (authority) rather than 'experience' to justify their actions.", "isCorrect": false, "rationale": "The quote from the Wife of Bath specifically prioritizes 'Experience' over 'auctoritee'."}, {"text": "Their status as victims of a system that they are ultimately unable to influence.", "isCorrect": false, "rationale": "Both characters are presented as effective agents who successfully achieve their aims."}], "id": "q04"}, {"question": "According to the summary of Novel III.2 (the Groom and the King's Wife), what allows the groom to escape with his life after the King discovers the deception?", "options": [{"text": "His physical prowess in a fight against the King's guards.", "isCorrect": false, "rationale": "The text credits the groom's 'quick thinking' rather than physical combat for his survival."}, {"text": "The intervention of the Queen, who protects him from the King's wrath.", "isCorrect": false, "rationale": "The summary focuses on the groom's own 'ingegno' in the darkened dormitory as the key to his escape."}, {"text": "His ability to use 'ingegno' to outmaneuver the King in a darkened dormitory.", "isCorrect": true, "rationale": "The summary states that the groom's quick thinking in the dark saves his life, demonstrating daring resourcefulness across a social divide."}, {"text": "A sincere apology that moves the King to mercy.", "isCorrect": false, "rationale": "The themes of Day III emphasize cleverness and resourcefulness rather than moral repentance or emotional appeals."}], "id": "q05"}, {"question": "In Novel III.3, how is the friar characterized in his role as a go-between for the lady and her lover?", "options": [{"text": "As a corrupt official taking bribes for his services.", "isCorrect": false, "rationale": "The text describes him as 'naive' and 'unwitting', rather than actively corrupt or profit-seeking in this instance."}, {"text": "As an unwitting and gullible instrument of the lady's cunning.", "isCorrect": true, "rationale": "The summary identifies the tale as one of 'clerical gullibility', where the friar believes he is helping the lady resist temptation while actually facilitating the affair."}, {"text": "As a wise counselor who eventually reconciles the lady with her husband.", "isCorrect": false, "rationale": "The friar is described as being used for an affair, which is the opposite of reconciling a marriage."}, {"text": "As a vengeful figure who eventually exposes the secret lovers.", "isCorrect": false, "rationale": "The focus of the summary is on his current state as a dupe of the lady's 'ingegno', not as a threat to her."}], "id": "q06"}, {"question": "Which tale is highlighted for its use of 'rhetoric as seduction,' where language itself becomes the primary tool of 'ingegno'?", "options": [{"text": "Novel III.10 (Alibech and Rustico)", "isCorrect": false, "rationale": "III.10 is noted for its use of 'sustained double entendre' and metaphor, but not specifically for the persuasive power of formal speech mentioned in III.5."}, {"text": "Novel III.1 (Masetto and the Nuns)", "isCorrect": false, "rationale": "Masetto's trick involves pretending to be mute, which is the absence of speech rather than its effective use."}, {"text": "Novel III.5 (Zima and Francesco Vergellesi's Wife)", "isCorrect": true, "rationale": "The text explicitly states that in this tale, Zima delivers a speech so persuasive that it becomes the 'instrument of ingegno'."}, {"text": "Novel III.7 (Tedaldo and Ermellina)", "isCorrect": false, "rationale": "While this tale involves theological debate, III.5 is the one specifically identified with rhetoric as a tool for seduction."}], "id": "q07"}, {"question": "Why is Boccaccio's use of Purgatory in Novel III.8 described as 'characteristically irreverent'?", "options": [{"text": "Because he uses a central Catholic doctrine as the basis for a comedic deception involving adultery.", "isCorrect": true, "rationale": "The text notes that Purgatory was a central doctrine, and Boccaccio's use of it as a comedic 'beffa' to facilitate an abbot's affair is irreverent."}, {"text": "Because he argues that Purgatory does not actually exist, challenging the Church's authority.", "isCorrect": false, "rationale": "Boccaccio uses the concept for comedy and satire rather than presenting a theological argument against its existence."}, {"text": "Because he portrays Purgatory as a place of luxury rather than purification.", "isCorrect": false, "rationale": "In the tale, Ferondo is kept in a dark cell, which aligns more with a traditional view of suffering, even if it is a fake version of it."}, {"text": "Because the character Ferondo is actually a saint who does not belong there.", "isCorrect": false, "rationale": "Ferondo is described as a man who is tricked and 'resurrected', with no mention of him being a saint."}], "id": "q08"}, {"question": "The commentary on Novel III.6 (Ricciardo and Catella) notes that it raises uncomfortable questions regarding which issue?", "options": [{"text": "The morality of wealth redistribution.", "isCorrect": false, "rationale": "The summary of III.6 focuses on a romantic deception involving a bathhouse, not financial matters."}, {"text": "The validity of ecclesiastical law in secular matters.", "isCorrect": false, "rationale": "While the Decameron deals with the clergy, this specific tale's summary focuses on the 'bed-trick' and personal deception."}, {"text": "The ethics of deception and consent.", "isCorrect": true, "rationale": "The text states that the 'sophisticated bed-trick tale' raises 'uncomfortable questions about deception and consent'."}, {"text": "The role of fate in the lives of commoners.", "isCorrect": false, "rationale": "The central theme of Day III is 'ingegno' (choice/intelligence) rather than fate/fortune."}], "id": "q09"}, {"question": "What does the 'Think Deeper' section suggest about Boccaccio's view of 'ingegno' as a virtue?", "options": [{"text": "He believes 'ingegno' is only virtuous when it serves a just cause like Gillette's.", "isCorrect": false, "rationale": "The 'Think Deeper' section poses this as a question for the reader to consider rather than providing a definitive answer."}, {"text": "He suggests that the ability to succeed through cleverness might be considered its own justification or a kind of virtue.", "isCorrect": true, "rationale": "The text asks if Boccaccio suggests that 'cleverness is its own justification — that the ability to succeed is itself a kind of virtue'."}, {"text": "He explicitly condemns 'ingegno' when it is used for personal pleasure instead of justice.", "isCorrect": false, "rationale": "The commentary states that Boccaccio 'does not answer these questions directly' and lets the tales speak for themselves."}, {"text": "He views 'ingegno' as a dangerous quality that leads to the breakdown of social order.", "isCorrect": false, "rationale": "The text says he 'admires' this quality consistently throughout the hundred tales, even if he presents its moral complexities."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
