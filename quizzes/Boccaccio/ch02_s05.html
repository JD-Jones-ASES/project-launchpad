<script>
var QUESTIONS = [{"question": "In the context of the Decameron, what is the functional definition of a 'motto' as demonstrated in the ninth tale?", "options": [{"text": "A brief, witty remark used as a social weapon to correct or shame.", "isCorrect": true, "rationale": "The introductory notes define the motto as a 'bon mot' or social weapon capable of achieving results that force and supplication cannot."}, {"text": "A formal heraldic slogan used by the nobility to signify their lineage.", "isCorrect": false, "rationale": "While the term often refers to heraldry, in Boccaccio's work it specifically denotes a sharp piece of verbal wit."}, {"text": "A moralizing proverb used at the conclusion of a fable to provide instruction.", "isCorrect": false, "rationale": "The text contrasts Boccaccio's use of the motto with traditional moralizing literature, which tends to be lengthy rather than brief."}, {"text": "A lengthy legal argument intended to seek redress for a specific crime.", "isCorrect": false, "rationale": "The tale explicitly states that the motto's power lies in its brevity and its ability to act when formal supplication fails."}], "id": "q01"}, {"question": "The ninth tale is noted for its connection to the speculum principis genre. How does Boccaccio's treatment of this genre differ from traditional medieval examples?", "options": [{"text": "He achieves the genre's didactic purpose through extreme brevity rather than long moralizations.", "isCorrect": true, "rationale": "The text notes that while 'mirrors for princes' typically moralize at length, Boccaccio achieves the same instructional end in a single sentence."}, {"text": "He focuses on the economic reforms of the kingdom rather than the personal conduct of the ruler.", "isCorrect": false, "rationale": "The focus remains strictly on the king's personal character and his manner of governance regarding justice."}, {"text": "He uses a supernatural intervention to change the king's mind instead of human interaction.", "isCorrect": false, "rationale": "The transformation is sparked purely by the lady's clever use of language, emphasizing human wit."}, {"text": "He argues that monarchs are above the need for social correction by their subjects.", "isCorrect": false, "rationale": "The tale demonstrates the opposite: that a common subject can and should shame a ruler into proper conduct."}], "id": "q02"}, {"question": "What specific characteristic of the King of Cyprus made the lady of Gascony initially despair of receiving justice?", "options": [{"text": "His 'faineant' nature and reprehensible tameness toward his own affronts.", "isCorrect": true, "rationale": "The king is described as so spiritless that he not only neglected others' wrongs but also endured his own mortifications without reaction."}, {"text": "His active malice and personal involvement in the crimes against pilgrims.", "isCorrect": false, "rationale": "The king is criticized for his apathy and inaction (indolence), not for being a perpetrator of crimes himself."}, {"text": "His extreme religious devotion which made him refuse to engage in worldly judgments.", "isCorrect": false, "rationale": "While the setting involves pilgrimages, the king's failure is attributed to a lack of spirit and 'ill-humour,' not religious piety."}, {"text": "His political alliance with the ruffians who attacked the lady.", "isCorrect": false, "rationale": "There is no mention of an alliance; the issue is his general neglect of justice and his 'sluggish' nature."}], "id": "q03"}, {"question": "The setting of the tale is Gascony and Cyprus during the time of the 'first king of Cyprus.' What is the historical context mentioned regarding this period?", "options": [{"text": "It follows the conquest of the Holy Land by Godfrey de Bouillon.", "isCorrect": true, "rationale": "The text explicitly sets the story in the era following the conquest made by Godfrey de Bouillon."}, {"text": "It occurs during the height of the Hundred Years' War between France and England.", "isCorrect": false, "rationale": "While Gascony's status as part of the Duchy of Aquitaine is mentioned, the primary historical marker is the conquest of the Holy Land."}, {"text": "It takes place immediately after the fall of the Byzantine Empire.", "isCorrect": false, "rationale": "The text refers to the conquest of the Holy Land and the subsequent establishment of the kingdom in Cyprus, not the fall of Byzantium."}, {"text": "It is set during the reign of the Roman Emperor Justinian.", "isCorrect": false, "rationale": "The mention of Godfrey de Bouillon and the fourteenth-century context of the Decameron places it much later than the Roman era."}], "id": "q04"}, {"question": "What is the irony in the lady's address to the king regarding her own 'wrong'?", "options": [{"text": "She claims she wants to learn how to be as patient with insults as the king is with his own.", "isCorrect": true, "rationale": "The lady sarcastically asks the king to teach her his 'patience' so she can bear her own wrongs, which shames him for his lack of dignity."}, {"text": "She offers to pay the king for his time even though she has been robbed.", "isCorrect": false, "rationale": "There is no mention of payment; her strategy relies entirely on a verbal 'lesson' in patience."}, {"text": "She pretends to be the king's long-lost relative from Gascony to gain his favor.", "isCorrect": false, "rationale": "The lady is honest about her origins but uses a clever rhetorical strategy rather than a false identity."}, {"text": "She argues that her own outrage was actually a blessing from the ruffians.", "isCorrect": false, "rationale": "She is described as 'broken-hearted and disconsolate,' and her irony serves to highlight the gravity of the wrong, not to dismiss it."}], "id": "q05"}, {"question": "Elissa introduces this tale by suggesting that it serves as an illustration of a point made in a previous story. Which narrator told that previous story?", "options": [{"text": "Lauretta", "isCorrect": true, "rationale": "Elissa explicitly states that her story will further illustrate the point 'manifest by the story told by Lauretta.'"}, {"text": "Filostrato", "isCorrect": false, "rationale": "Filostrato is a narrator in the Decameron, but Elissa specifically cites Lauretta as the one who established the theme she is continuing."}, {"text": "Pampinea", "isCorrect": false, "rationale": "Pampinea is the queen of the first day, but Lauretta is the one whose story Elissa is building upon."}, {"text": "Dioneo", "isCorrect": false, "rationale": "Dioneo usually tells the final story of the day, but Elissa's introduction points back to Lauretta."}], "id": "q06"}, {"question": "Why does the lady state she would 'gladly transfer' her wrongs to the king if it were possible?", "options": [{"text": "Because he is so 'well fitted' to bear them due to his extreme passivity.", "isCorrect": true, "rationale": "This is the 'cutting remark' that shames the king; she implies he is so used to being insulted that he wouldn't mind more."}, {"text": "Because as a king, he has the legal power to absorb the guilt of others.", "isCorrect": false, "rationale": "The lady's remark is an insult to his character, not a statement about his legal or theological status."}, {"text": "Because she believes the king is actually the one responsible for the ruffians.", "isCorrect": false, "rationale": "The text states the king was spiritless and neglected wrongs, but does not suggest he was the mastermind behind her specific assault."}, {"text": "Because she wishes to curse the king with the same physical pain she felt.", "isCorrect": false, "rationale": "The 'transfer' is a rhetorical device to highlight his 'reprehensible tameness,' not a literal curse."}], "id": "q07"}, {"question": "What is the result of the king being 'aroused' by the lady's words?", "options": [{"text": "He begins to mete out rigorous justice to all who offend the crown.", "isCorrect": true, "rationale": "The story concludes by stating that after redressing the lady's wrong, he became a strict enforcer of justice from then on."}, {"text": "He abdicates the throne in favor of a more capable ruler from Gascony.", "isCorrect": false, "rationale": "The king reforms his own governance rather than stepping down."}, {"text": "He orders the lady to be imprisoned for her insolence.", "isCorrect": false, "rationale": "The king is transformed for the better by the remark, rather than reacting with further spiritless or petty anger."}, {"text": "He declares war on Gascony to restore his wounded pride.", "isCorrect": false, "rationale": "The lady is a pilgrim who helped him; he directs his new sense of justice toward those who offend his crown, not her homeland."}], "id": "q08"}, {"question": "How is the geography of the Decameron impacted by the setting of this particular tale?", "options": [{"text": "It broadens the reach of the work beyond the Italian peninsula.", "isCorrect": true, "rationale": "The notes explain that setting the tale in Gascony and Cyprus expands the geographical scope of Boccaccio's collection."}, {"text": "It localizes the story within the specific suburbs of Florence.", "isCorrect": false, "rationale": "The story explicitly moves outside Italy to France (Gascony) and the Mediterranean (Cyprus)."}, {"text": "It restricts the narrative to the interior of the Holy Sepulchre.", "isCorrect": false, "rationale": "The pilgrimage includes Jerusalem, but the main action of the tale occurs in Cyprus."}, {"text": "It focuses exclusively on the maritime trade routes of the Venetian Empire.", "isCorrect": false, "rationale": "While it involves travel to Cyprus, the historical focus is on the English-controlled Aquitaine and the Holy Land conquest."}], "id": "q09"}, {"question": "What does the text suggest about Boccaccio's choice to give the 'power of the motto' to a woman in this tale?", "options": [{"text": "It highlights how language can subvert traditional power dynamics when force is unavailable.", "isCorrect": true, "rationale": "The 'What to Watch For' section asks the reader to consider why Boccaccio gives this power to a woman, implying a relationship between wit and marginalized power."}, {"text": "It proves that women were the primary legal advisors in fourteenth-century Cyprus.", "isCorrect": false, "rationale": "The lady acts as an individual seeking redress, not as a professional legal official."}, {"text": "It reflects Boccaccio's belief that women were inherently more aggressive than kings.", "isCorrect": false, "rationale": "The lady's 'aggression' is purely verbal and rhetorical, used to correct a spiritless ruler."}, {"text": "It suggests that only pilgrims were allowed to speak directly to the King of Cyprus.", "isCorrect": false, "rationale": "The text notes that anyone looking to vent 'ill-humour' took occasion to vex the king, implying many had access to him due to his weakness."}], "id": "q10"}, {"question": "Elissa frames her tale as an illustration of what can be accomplished by 'some unpremeditated casual word.' What makes this description intentionally ironic?", "options": [{"text": "The lady's remark is actually very carefully calculated and deliberately constructed to shame the king.", "isCorrect": true, "rationale": "Elissa presents the lady's speech as spontaneous, but the tale shows a woman who despaired of formal redress and devised a precise rhetorical strategy — making the 'casual word' actually an act of skilled wit."}, {"text": "The irony is that the lady is not actually from Gascony and the geographic detail is purely fictional.", "isCorrect": false, "rationale": "The geographic specificity is part of the tale's setting; the irony Elissa's framing creates is about the nature of the lady's speech, not her origins."}, {"text": "The irony is that Elissa plans her own tales carefully but praises stories that appear unplanned.", "isCorrect": false, "rationale": "The comparison is between Elissa's rhetorical framing and the actual calculated nature of the lady's remark, not about Elissa's own storytelling habits."}, {"text": "The king is not actually reformed and relapsed into indolence after the lady departed.", "isCorrect": false, "rationale": "The text states clearly that the king 'thenceforth meted out the most rigorous justice'; the reform is presented as permanent."}], "id": "q11"}, {"question": "The tale is described as one of the shortest in the Decameron. According to the commentary, what literary principle does this brevity illustrate?", "options": [{"text": "The shorter a tale, the less artistic merit it possesses compared to longer narratives.", "isCorrect": false, "rationale": "The commentary treats the tale's brevity as an artistic virtue and a demonstration of its theme — that minimal words can accomplish maximum effect."}, {"text": "The power of verbal precision: that a single, perfectly aimed remark can achieve what elaborate arguments cannot.", "isCorrect": true, "rationale": "The tale's brevity mirrors the motto it celebrates; just as the lady needed only one sentence to reform a king, the tale needs only a few paragraphs to make its point."}, {"text": "Boccaccio included short tales as filler to reach the required count of ten tales per day.", "isCorrect": false, "rationale": "The commentary explicitly identifies the brevity as meaningful and connected to the tale's theme, not as a sign of carelessness or filler."}, {"text": "The tale is intentionally underdeveloped to allow the reader to imagine a more complex backstory.", "isCorrect": false, "rationale": "The tale is complete in itself; the commentary treats its concision as a deliberate artistic choice that reinforces the theme of the motto."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
