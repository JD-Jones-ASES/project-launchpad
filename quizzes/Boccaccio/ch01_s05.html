    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Boccaccio.html">&larr; Back to Tales of the Decameron (Boccaccio)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 1, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best describes the intended symbolic purpose of the 'cornice' within the Decameron?", "options": [{"text": "A reflection of the chaotic and lawless state of Florence during the plague.", "isCorrect": false, "rationale": "The frame narrative actually serves as a counterpoint to the chaos of the city, not a reflection of it."}, {"text": "An ordered and civilized microcosm established to counteract the social breakdown caused by the Black Death.", "isCorrect": true, "rationale": "The frame narrative depicts a structured society with rules and themes, representing the power of art to restore order in the face of despair."}, {"text": "A purely functional device used to transition between unrelated stories without a narrative of its own.", "isCorrect": false, "rationale": "The text explicitly states that the cornice is its own narrative with distinct characters, settings, and themes."}, {"text": "A religious allegory intended to mirror the journey of the soul from purgatory to paradise.", "isCorrect": false, "rationale": "While the work has a thematic arc, the source material identifies the cornice primarily as an architectural design for storytelling and survival, not a specific religious allegory."}]}, {"question": "In the structural organization of the Decameron, which storyteller is granted the unique privilege of ignoring the daily theme?", "options": [{"text": "Pampinea", "isCorrect": false, "rationale": "As the eldest and first queen, she establishes the rules and structure but follows the themes she or others set."}, {"text": "Panfilo", "isCorrect": false, "rationale": "While he is significant for telling the first and last tales, he is not exempt from the thematic constraints of the days."}, {"text": "Dioneo", "isCorrect": true, "rationale": "Known as the rule-breaker and provocateur, he is allowed to tell whatever tale he pleases and usually tells the final story of the day."}, {"text": "Filostrato", "isCorrect": false, "rationale": "His role is defined by his day of tragic love, and he remains within the thematic boundaries established for the group."}]}, {"question": "Boccaccio’s 'Proem' is considered historically significant primarily because it identifies which group as its primary audience?", "options": [{"text": "Exiled Florentine nobility seeking a return to social order.", "isCorrect": false, "rationale": "While the storytellers are of noble birth, the dedication specifically focuses on those restricted by social customs rather than political exile."}, {"text": "Clergymen and scholars who previously only used prose for sermons.", "isCorrect": false, "rationale": "The work actually moves away from traditional prose uses like sermons, targeting a lay audience instead."}, {"text": "Women confined by social expectations who suffer the 'pangs of love'.", "isCorrect": true, "rationale": "Boccaccio explicitly dedicates the work to women as consolation for their lack of social outlets like hunting or business."}, {"text": "Young men of the 'brigata' who need moral instruction through fables.", "isCorrect": false, "rationale": "The brigata are the narrators within the frame, not the primary external audience identified in the Proem's dedication."}]}, {"question": "How does the thematic progression of the ten days reflect the overall 'arc' of the Decameron?", "options": [{"text": "It moves from religious piety in Day I to secular trickery in Day X.", "isCorrect": false, "rationale": "The progression is actually the reverse, moving from earthly concerns toward more noble themes."}, {"text": "It transitions from the comic and earthly toward the noble and transcendent.", "isCorrect": true, "rationale": "The collection begins with free-ranging tales and ends with stories of magnanimity and moral greatness in Day X."}, {"text": "It follows a strict descent from tragic romance into farce and satire.", "isCorrect": false, "rationale": "The movement is generally upward toward virtue, although humor remains present throughout the work."}, {"text": "It cycles through the four seasons to represent the passage of time during the plague.", "isCorrect": false, "rationale": "The structure is organized by themes of human experience (fortune, wit, love), not seasonal allegory."}]}, {"question": "What literary shift did Boccaccio initiate by choosing prose for the Decameron?", "options": [{"text": "He replaced Latin with the vernacular as the only language for legal documents.", "isCorrect": false, "rationale": "While the work is in the vernacular, its primary impact was on literary art, not the language of legal administration."}, {"text": "He proved that prose could be a medium for high art, equal to traditional verse forms.", "isCorrect": true, "rationale": "Before Boccaccio, artistic literature was dominated by verse; prose was reserved for functional, non-artistic texts like chronicles or sermons."}, {"text": "He established prose as the required form for all future allegorical dream visions.", "isCorrect": false, "rationale": "The text notes that allegorical dream visions were traditionally verse-based forms that Boccaccio's prose art helped move beyond."}, {"text": "He restricted prose exclusively to comic and satirical subjects to distinguish it from epic poetry.", "isCorrect": false, "rationale": "Boccaccio used prose for a wide range of emotions, including tragedy and moral nobility, showing its versatility."}]}, {"question": "Which member of the brigata is associated with the theme of 'vanquished by love' and presides over the day of tragic endings?", "options": [{"text": "Filostrato", "isCorrect": true, "rationale": "His name literally translates to 'vanquished by love,' and he is the king on Day IV, which focuses on love with unhappy endings."}, {"text": "Panfilo", "isCorrect": false, "rationale": "His name means 'all-loving,' and he is associated with the opening and closing of the cycle rather than the specific theme of tragedy."}, {"text": "Dioneo", "isCorrect": false, "rationale": "His name suggests a connection to sensual love through Venus, but his role is that of the joker and rebel."}, {"text": "Filomena", "isCorrect": false, "rationale": "She is noted for favoring tales of fortune and adventure rather than tragic love."}]}, {"question": "Day VII and Day VIII of the Decameron are specifically focused on which recurring human behavior?", "options": [{"text": "Magnanimous gestures and self-sacrifice.", "isCorrect": false, "rationale": "These themes are reserved for the final day (Day X) as the peak of the collection's moral arc."}, {"text": "Tragic misunderstandings leading to death.", "isCorrect": false, "rationale": "Tragedy is the specific focus of Day IV, whereas Days VII and VIII are more lighthearted and deceptive."}, {"text": "Tricks and deceptions played by and upon various characters.", "isCorrect": true, "rationale": "Day VII focuses on tricks wives play on husbands, and Day VIII expands this to 'tricks of all kinds'."}, {"text": "The intervention of Fortune in human affairs.", "isCorrect": false, "rationale": "Fortune's reversals are the primary theme of Day II."}]}, {"question": "Why is the final tale of the Decameron, 'Patient Griselda,' described as paradoxical in the context of its narrator?", "options": [{"text": "It is a tale of extreme female submissiveness told by the group's most rebellious member.", "isCorrect": true, "rationale": "Dioneo, the most irreverent and rule-breaking member, tells the most morally serious and debated tale of the entire work."}, {"text": "It is a tragic story told on Day X, which is supposed to be about happiness.", "isCorrect": false, "rationale": "Day X is about virtue and magnanimity, not necessarily 'happiness' in a simple sense, and the paradox lies in the narrator's personality."}, {"text": "It is a prose story that Boccaccio accidentally wrote in verse format.", "isCorrect": false, "rationale": "The text confirms the Decameron is a prose work; the paradox mentioned relates to the thematic content and the character of Dioneo."}, {"text": "It was told by Pampinea, who usually avoids morally ambiguous subjects.", "isCorrect": false, "rationale": "The final tale is explicitly attributed to Dioneo, not Pampinea."}]}, {"question": "What is the specific thematic significance of Day VI in the structure of the Decameron?", "options": [{"text": "It marks the transition from tales of love to tales of trickery.", "isCorrect": false, "rationale": "While it sits between these themes, its specific focus is on the power of speech and wit."}, {"text": "It focuses on quick wit and the power of a clever remark to escape danger.", "isCorrect": true, "rationale": "Day VI is dedicated to those who use wit (motto) to avoid mockery or peril, highlighting Boccaccio's value on intelligence."}, {"text": "It is the first of the two days that has no set theme.", "isCorrect": false, "rationale": "Days I and IX are the days with no set theme."}, {"text": "It deals exclusively with the reversals of fortune and unexpected happiness.", "isCorrect": false, "rationale": "Fortune's reversals are the specific theme of Day II."}]}, {"question": "Which character in the brigata is the first to be elected queen and suggests the retreat to the countryside?", "options": [{"text": "Fiammetta", "isCorrect": false, "rationale": "Fiammetta is Boccaccio’s literary alter ego of his beloved, but she is not the one who proposes the initial retreat."}, {"text": "Pampinea", "isCorrect": true, "rationale": "As the eldest woman, she is described as practical and authoritative, taking the lead in organizing the flight from Florence."}, {"text": "Filomena", "isCorrect": false, "rationale": "Filomena is one of the seven women, but she follows the leadership established by others."}, {"text": "Elissa", "isCorrect": false, "rationale": "Elissa is mentioned as having less sharply drawn preferences and is not the initiator of the group's journey."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
