<script>
var QUESTIONS = [{"question": "Who does the narrator, Fiammetta, cite as the original source of the tale of Federigo degli Alberighi?", "options": [{"text": "Coppo di Borghese Domenichi", "isCorrect": true, "rationale": "Fiammetta describes him as a respected Florentine man of noble lineage and great memory who often shared historical stories with his neighbors."}, {"text": "Filomena", "isCorrect": false, "rationale": "Filomena was the storyteller of the previous tale, and Fiammetta is following her turn in the sequence."}, {"text": "Dioneo", "isCorrect": false, "rationale": "Dioneo is mentioned as the only other person left to speak, but he is not the source of this specific narrative."}, {"text": "Messer Filippo Alberighi", "isCorrect": false, "rationale": "While he is the father of the protagonist, the text identifies him as a character within the story rather than its narrator."}], "id": "q01"}, {"question": "What contingency was placed in the will of Monna Giovanna's husband regarding his estate?", "options": [{"text": "Monna Giovanna would inherit the estate if their son died without a lawful heir.", "isCorrect": true, "rationale": "The husband left the estate to his son first, naming Monna Giovanna as the successor only in the event of the son's death without heirs."}, {"text": "The estate would be divided equally between Monna Giovanna and Federigo degli Alberighi.", "isCorrect": false, "rationale": "Federigo was a stranger to the husband's legal affairs and was not mentioned in the will."}, {"text": "The wealth would be returned to the Florentine state if the son failed to marry.", "isCorrect": false, "rationale": "The text specifies a direct familial succession plan involving the wife rather than a state seizure."}, {"text": "Monna Giovanna was the primary heir, with the son inheriting only upon her death.", "isCorrect": false, "rationale": "The son was the primary heir, which is why his potential death triggered the secondary clause for Monna Giovanna."}], "id": "q02"}, {"question": "Why did Federigo initially move from the city of Florence to his small estate in Campi?", "options": [{"text": "He had exhausted his fortune through extravagant spending to win Monna Giovanna's love.", "isCorrect": true, "rationale": "The text explains that his 'largess' and 'expenditure' beyond his means reduced him to extreme poverty, making city life impossible."}, {"text": "He was exiled by the Florentine government due to his family's historical noble status.", "isCorrect": false, "rationale": "While the Alberighi were a historical noble family, his move was a result of personal financial ruin, not political exile."}, {"text": "He wanted to live closer to Monna Giovanna's country estate to watch her in secret.", "isCorrect": false, "rationale": "He moved out of necessity and lived in seclusion; it was Monna Giovanna who later moved near him by chance."}, {"text": "He intended to start a commercial hawking business to rebuild his lost wealth.", "isCorrect": false, "rationale": "Federigo used the falcon for his own diversion and 'bore his poverty as patiently as he might' rather than for business."}], "id": "q03"}, {"question": "What reason does Monna Giovanna give Federigo for her unexpected visit to his farm?", "options": [{"text": "She wishes to compensate him for his past devotion by sharing a meal with him.", "isCorrect": true, "rationale": "She frames the visit as a 'requital' for his lost fortune and love, using the breakfast as a pretense to approach him."}, {"text": "She wants to buy his falcon to fulfill her sick son's dying wish.", "isCorrect": false, "rationale": "While this is her hidden motive, she does not state this immediately, choosing instead to start with the breakfast request."}, {"text": "She is seeking his help to manage her late husband's country estates.", "isCorrect": false, "rationale": "Although they become neighbors, the text does not suggest she sought his professional or management assistance."}, {"text": "She intends to officially apologize for her past harshness and cruelty.", "isCorrect": false, "rationale": "While she acknowledges her past 'virtue' might have seemed like cruelty, her stated purpose is a social call for breakfast."}], "id": "q04"}, {"question": "What internal conflict does Monna Giovanna face before asking Federigo for the falcon?", "options": [{"text": "She feels it is unfeeling to deprive a man of his sole remaining source of solace.", "isCorrect": true, "rationale": "She recognizes that the falcon is the only thing left to Federigo and is hesitant to take his 'one solace' after he has already lost so much."}, {"text": "She is worried that Federigo will demand a high price that she cannot afford.", "isCorrect": false, "rationale": "Monna Giovanna is very wealthy and knows she could likely have the falcon 'for the asking' or by purchase."}, {"text": "She fears her brothers will disapprove of her visiting a man who is in poverty.", "isCorrect": false, "rationale": "The text focuses on her maternal concern and her empathy for Federigo rather than her brothers' social opinions at this stage."}, {"text": "She doubts whether the bird actually has the power to cure her son's illness.", "isCorrect": false, "rationale": "While the narrator suggests the boy's recovery might be 'unaided energy,' Monna's conflict is purely ethical regarding Federigo's loss."}], "id": "q05"}, {"question": "What is the primary reason Federigo decides to kill and serve his falcon for breakfast?", "options": [{"text": "His pride prevents him from asking his own husbandman for food or assistance.", "isCorrect": true, "rationale": "The text notes it was late and 'to crave help of his own husbandman was more than his pride could brook,' leading him to the falcon."}, {"text": "He believes the falcon is the only thing high-born enough to be 'meet food' for a lady of her rank.", "isCorrect": false, "rationale": "While he does deem the bird 'meet' for her, this decision is born from the 'desperate straits' of having absolutely nothing else to serve."}, {"text": "The falcon was old and no longer able to hunt effectively due to the weather.", "isCorrect": false, "rationale": "The falcon is described as 'brave' and 'the best in the world'; its death is a sacrifice of a prized possession, not the culling of a weak one."}, {"text": "He wants to show Monna Giovanna that he has moved on from his obsession with courtly hunting.", "isCorrect": false, "rationale": "Federigo kills the bird with great distress to honor her, not to make a symbolic statement about his lifestyle changes."}], "id": "q06"}, {"question": "How does Federigo provide evidence to Monna Giovanna that he cannot fulfill her request?", "options": [{"text": "He produces the feathers, feet, and beak of the bird.", "isCorrect": true, "rationale": "To prove his story and explain why he cannot give her the live bird, he brings out the physical remains of the falcon."}, {"text": "He shows her the empty spit where the bird was roasted.", "isCorrect": false, "rationale": "While the bird was roasted on a spit, the text explicitly mentions he brought the 'relics' of the bird (feathers, feet, and beak)."}, {"text": "He has his maidservant testify to the morning's menu.", "isCorrect": false, "rationale": "He personally explains the situation to the lady and provides the physical evidence himself."}, {"text": "He points to the empty perch in his small parlour.", "isCorrect": false, "rationale": "An empty perch would not explain what happened to the bird; he needed the 'relics' to confirm it was consumed."}], "id": "q07"}, {"question": "What is Monna Giovanna's immediate reaction upon hearing that Federigo killed the falcon for her?", "options": [{"text": "She chides him for killing such a fine bird to feed a woman, yet inwardly admires his greatness of spirit.", "isCorrect": true, "rationale": "She first scolds him for the sacrifice but then feels a 'no small share of inward commendation' for his unwavering magnanimity."}, {"text": "She falls into a deep depression, realizing her son will now certainly die.", "isCorrect": false, "rationale": "While she leaves with a 'heavy heart' and doubts her son's recovery, her immediate reaction involves a mix of rebuke and admiration for Federigo."}, {"text": "She offers to pay him for the bird's value to alleviate his poverty.", "isCorrect": false, "rationale": "She does not offer money; instead, she leaves and eventually decides to marry him as a form of reward for his merit."}, {"text": "She accuses him of purposefully sabotaging her son's health out of spite.", "isCorrect": false, "rationale": "She recognizes his act as one of extreme courtesy and 'magnificence,' even if she found the specific sacrifice regrettable."}], "id": "q08"}, {"question": "What reasoning does Monna Giovanna give her brothers for choosing to marry the impoverished Federigo?", "options": [{"text": "She prefers a man who lacks wealth over wealth that lacks a man.", "isCorrect": true, "rationale": "This famous line expresses her preference for Federigo's noble character and 'high desert' over a wealthy husband with no merit."}, {"text": "She believes Federigo's hidden farming talents will eventually make them the richest family in Tuscany.", "isCorrect": false, "rationale": "Her decision is based on his proven character ('a good man and true') rather than a gamble on his future financial success."}, {"text": "She feels legally obligated to marry him because he saved her from starvation.", "isCorrect": false, "rationale": "There is no legal obligation mentioned; she chooses him of her 'own accord' to reward his sacrifice."}, {"text": "She wants to fulfill the dying wish of her son, who loved Federigo.", "isCorrect": false, "rationale": "While her son liked Federigo, her decision to marry him is motivated by her own memory of his 'magnificent generosity' and merit."}], "id": "q09"}, {"question": "According to the text's conclusion, how does Federigo's behavior change after his marriage to Monna Giovanna?", "options": [{"text": "He becomes more diligent and keeps exact accounts of his finances.", "isCorrect": true, "rationale": "The text states he lived happily and kept 'more exact accounts' for the rest of his days, implying a move away from his former reckless spending."}, {"text": "He spends his new wealth on the most magnificent collection of falcons in Europe.", "isCorrect": false, "rationale": "There is no mention of him returning to hawking; the emphasis is on his newfound financial prudence and happiness."}, {"text": "He uses his wealth to reclaim his family's lost political power in Florence.", "isCorrect": false, "rationale": "The ending focuses on his domestic happiness and fiscal management rather than political ambition."}, {"text": "He dedicates his life to philanthropy to help other noblemen who fell into poverty.", "isCorrect": false, "rationale": "While he was generous in the past, the conclusion specifically mentions his improved accounting and happy life with his wife."}], "id": "q10"}, {"question": "The tale of Federigo's Falcon is often described as a 'perfect' novella. What structural feature most contributes to this assessment?", "options": [{"text": "Every narrative element introduced — Federigo's ruin, his falcon, Monna Giovanna's son, and her visit — converges on a single unavoidable irony.", "isCorrect": true, "rationale": "The tale's perfection lies in its compression: the falcon is simultaneously Federigo's greatest remaining treasure, the object of the boy's desire, and the sacrifice Federigo makes in ignorance. Nothing is superfluous — each detail doubles back to the central moment."}, {"text": "It is perfectly symmetrical in length, with each character receiving exactly equal narrative attention.", "isCorrect": false, "rationale": "The tale is not structurally balanced by equal character attention; it is admired for its economy of means and convergent plot logic, not symmetry."}, {"text": "It ends with a complete moral resolution that removes all ambiguity about Federigo's virtue.", "isCorrect": false, "rationale": "While Federigo is rewarded, the tale's 'perfection' is not primarily about moral clarity — it is about narrative economy and the devastating irony of the central sacrifice."}, {"text": "It is the only novella in the Decameron that contains no deception or manipulation.", "isCorrect": false, "rationale": "Monna Giovanna's stated reason for the visit (a 'requital' breakfast) is itself a social pretense masking her real intention to ask for the falcon."}], "id": "q11"}, {"question": "Monna Giovanna's brothers urge her to remarry because she is 'still young and very beautiful.' What does her resistance to this pressure, and her eventual choice of Federigo, suggest about Boccaccio's view of female agency?", "options": [{"text": "Boccaccio presents her independent judgment as admirable, rewarding her for prioritizing character over social calculation.", "isCorrect": true, "rationale": "Rather than accepting a wealthy match chosen by her family, she exercises her own moral reasoning and chooses Federigo for his demonstrated 'high desert.' The tale validates her judgment — and Boccaccio makes her the one who delivers the tale's most memorable line."}, {"text": "Her resistance is portrayed as selfish, and the tale implies she should have accepted a wealthier match to protect the family's fortune.", "isCorrect": false, "rationale": "The narrative presents her decision as wise and honorable, not selfish. The brothers' preference for wealth is implicitly critiqued by her counter-argument."}, {"text": "She is shown as passive throughout, with Federigo's virtue doing all the work of winning her affection.", "isCorrect": false, "rationale": "She is an active moral agent: she initiates the visit, grapples with her conscience over the request, and makes the final marriage decision independently."}, {"text": "Boccaccio suggests that widows should always defer to their brothers' judgment on remarriage.", "isCorrect": false, "rationale": "The tale does the opposite — her brothers represent a purely material calculation, and the narrative endorses her deviation from it."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
