</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Boccaccio.html">&larr; Back to Tales of the Decameron (Boccaccio)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 1, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which specific Florentine financial institution was Giovanni Boccaccio's father, Boccaccino di Chellino, associated with before its eventual collapse in the 1340s?", "options": [{"text": "The Peruzzi Bank", "isCorrect": false, "rationale": "While the Peruzzi bank was a major Florentine banking house that collapsed alongside the Bardi bank, Boccaccio's father was specifically connected to the Bardi family."}, {"text": "The Bardi Bank", "isCorrect": true, "rationale": "The Bardi bank was one of the great Florentine houses that financed European royalty and employed Boccaccio's father."}, {"text": "The Medici Bank", "isCorrect": false, "rationale": "The Medici bank rose to prominence later in the Renaissance, following the era of the Bardi and Peruzzi collapses."}, {"text": "The Angevin Treasury", "isCorrect": false, "rationale": "The Angevin court was a cultural influence in Naples, but Boccaccio's father's professional ties were rooted in Florentine private banking."}], "id": "q01"}, {"question": "Boccaccio's formative years in Naples (c. 1327–1340) exposed him to a unique cultural synthesis. Which of the following best describes the environment of the Angevin court during his stay?", "options": [{"text": "A strictly commercial center focused on the Mediterranean wool trade", "isCorrect": false, "rationale": "Though Boccaccio was sent there for commerce, the court itself was a crossroads of French, Italian, and classical culture."}, {"text": "A provincial outpost far removed from the intellectual trends of Florence", "isCorrect": false, "rationale": "The text describes the Angevin court as one of the most brilliant in Europe, rather than provincial."}, {"text": "A crossroads of French romances, classical Latin literature, and courtly society", "isCorrect": true, "rationale": "The Angevin court provided a diverse literary background that shaped Boccaccio's interest in storytelling and human passion."}, {"text": "A monastic intellectual center dominated by the study of Greek theology", "isCorrect": false, "rationale": "The influence in Naples was primarily courtly and literary rather than strictly monastic or Greek-focused."}], "id": "q02"}, {"question": "The identity of Boccaccio's muse, Fiammetta, remains a subject of scholarly debate. According to literary tradition, she is sometimes identified as which real historical figure?", "options": [{"text": "Beatrice Portinari", "isCorrect": false, "rationale": "Beatrice was the muse of Dante Alighieri, not Giovanni Boccaccio."}, {"text": "Maria d'Aquino", "isCorrect": true, "rationale": "Maria d'Aquino is often cited as the possible illegitimate daughter of King Robert of Naples who inspired the character of Fiammetta."}, {"text": "Laura de Noves", "isCorrect": false, "rationale": "Laura was the muse associated with Francesco Petrarch."}, {"text": "Griselda of Saluzzo", "isCorrect": false, "rationale": "Griselda is a fictional character from the final tale of the Decameron, not a suspected historical muse."}], "id": "q03"}, {"question": "In the context of the Black Death in 1348, which of the following best describes the demographic impact on Florence as noted in the text?", "options": [{"text": "The population decreased by approximately one-quarter of its pre-plague levels.", "isCorrect": false, "rationale": "The text states that more than half the city's population died, which is a much higher ratio than one-quarter."}, {"text": "Total mortality was estimated between 50,000 and 80,000 residents.", "isCorrect": true, "rationale": "This range reflects the staggering loss of life in Florence between March and October of 1348."}, {"text": "The city maintained its population of 100,000 due to an influx of rural refugees.", "isCorrect": false, "rationale": "While the pre-plague population was around 100,000, it fell significantly, possibly as low as 40,000-50,000."}, {"text": "The mortality rate was higher in the clergy than in the merchant class.", "isCorrect": false, "rationale": "The text mentions that priests abandoned their flocks, but it does not specifically compare mortality rates between classes."}], "id": "q04"}, {"question": "Petrarch’s influence on Boccaccio was significant, yet he held a dismissive view of certain aspects of Boccaccio's work. What was Petrarch's primary critique regarding the Decameron?", "options": [{"text": "He found the use of the Greek language for the title to be pretentious.", "isCorrect": false, "rationale": "The text does not mention Petrarch criticizing the title's Greek origin."}, {"text": "He disapproved of the historical inaccuracies regarding the Black Death.", "isCorrect": false, "rationale": "Petrarch's issues were with the genre and language of the work, not its historical accuracy."}, {"text": "He valued Latin scholarship and lyric poetry over vernacular prose narratives.", "isCorrect": true, "rationale": "Petrarch prioritized classical Latin and formal poetry, viewing Boccaccio's Italian prose as less serious literature."}, {"text": "He believed the tales were too focused on religious piety at the expense of art.", "isCorrect": false, "rationale": "If anything, the Decameron was known for its secular and bawdy nature, which Petrarch initially found unworthy of 'serious' status."}], "id": "q05"}, {"question": "Which of Boccaccio’s later works served as a foundational encyclopedic reference for classical mythology for centuries?", "options": [{"text": "The Divine Comedy", "isCorrect": false, "rationale": "The Divine Comedy was written by Dante; Boccaccio merely gave public lectures on it."}, {"text": "The Filostrato", "isCorrect": false, "rationale": "The Filostrato was an early narrative poem written during his youth in Naples."}, {"text": "Genealogy of the Pagan Gods", "isCorrect": true, "rationale": "This scholarly Latin work compiled classical myths and remained a standard reference for centuries."}, {"text": "Patient Griselda", "isCorrect": false, "rationale": "Patient Griselda is the final tale of the Decameron, which Petrarch translated into Latin."}], "id": "q06"}, {"question": "The title 'Decameron' is derived from Greek. What is its literal translation based on its etymology?", "options": [{"text": "One hundred tales", "isCorrect": false, "rationale": "While the book contains one hundred tales, the word 'Decameron' specifically refers to the time period."}, {"text": "Ten days", "isCorrect": true, "rationale": "The title comes from the Greek words 'deka' (ten) and 'hemera' (day)."}, {"text": "The Black Death", "isCorrect": false, "rationale": "The plague is the frame story, but the title refers to the storytelling duration."}, {"text": "The Three Crowns", "isCorrect": false, "rationale": "This term refers to the trio of Dante, Petrarch, and Boccaccio, not the title of the work."}], "id": "q07"}, {"question": "What event in 1362 is credited with triggering a spiritual crisis and a shift toward religious anxiety in Boccaccio's later life?", "options": [{"text": "The death of Francesco Petrarch", "isCorrect": false, "rationale": "Petrarch died in 1374, which was after Boccaccio's religious crisis began."}, {"text": "A visit from a Carthusian monk warning of damnation", "isCorrect": true, "rationale": "This warning led Boccaccio to become increasingly devout and focus on prayer and scholarly labor."}, {"text": "His appointment as a diplomat for the city of Florence", "isCorrect": false, "rationale": "His public service as a diplomat was a separate aspect of his later life, not the cause of his spiritual crisis."}, {"text": "The collapse of the Bardi banking house", "isCorrect": false, "rationale": "The banking collapse occurred in the 1340s, much earlier than his religious turning point."}], "id": "q08"}, {"question": "Boccaccio’s early work 'Filostrato' is historically significant in English literature because it was later adapted by which author?", "options": [{"text": "William Shakespeare", "isCorrect": false, "rationale": "While Shakespeare drew on many sources, the text specifically notes Chaucer's adaptation of this work."}, {"text": "Geoffrey Chaucer", "isCorrect": true, "rationale": "Chaucer adapted Filostrato into his poem Troilus and Criseyde, one of the finest works in Middle English."}, {"text": "John Milton", "isCorrect": false, "rationale": "Milton is known for later works; Chaucer is the Middle English poet linked to Boccaccio here."}, {"text": "Dante Alighieri", "isCorrect": false, "rationale": "Dante was an influence on Boccaccio, not someone who adapted Boccaccio's work into Middle English."}], "id": "q09"}, {"question": "In his self-composed epitaph, Boccaccio used the phrase 'studium fuit alma poesis.' What does this reveal about his self-perception?", "options": [{"text": "He viewed himself primarily as a victim of the plague.", "isCorrect": false, "rationale": "The epitaph focuses on his life's work and soul rather than his cause of death or suffering."}, {"text": "He defined his life's passion as the nourishment of poetry.", "isCorrect": true, "rationale": "The phrase translates to 'his passion was nourishing poetry,' highlighting his lifelong devotion to literature."}, {"text": "He regretted his illegitimate birth and merchant upbringing.", "isCorrect": false, "rationale": "While the epitaph mentions his father, it emphasizes his literary achievements rather than regret over his background."}, {"text": "He considered his diplomatic service his greatest legacy.", "isCorrect": false, "rationale": "Despite his public service, he chose to highlight poetry in his final inscription."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
