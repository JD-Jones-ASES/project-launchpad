    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Boccaccio.html">&larr; Back to Tales of the Decameron (Boccaccio)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 11, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which characteristic of Dioneo makes his choice to tell the story of Patient Griselda particularly ironic according to the source material?", "options": [{"text": "He is typically the most irreverent and subversive narrator in the group.", "isCorrect": true, "rationale": "Dioneo usually exercises a privilege to tell bawdy or unconventional tales, making his narration of a highly moralistic and submissive story a sharp departure from his persona."}, {"text": "He is the designated 'King' of the tenth day and must set a moral example.", "isCorrect": false, "rationale": "While he is a member of the brigata, Panfilo is the king of the tenth day; Dioneo is known for his independence from the day's themes."}, {"text": "He was the only member of the group who had not yet told a story about royalty.", "isCorrect": false, "rationale": "The irony is rooted in his character's typical vulgarity and defiance, not his lack of previous stories regarding nobility."}, {"text": "He intended to prove that the themes of the tenth day were impossible to satisfy.", "isCorrect": false, "rationale": "Dioneo often ignores themes, but the text specifically highlights the contrast between his irreverence and the 'moral' nature of this specific tale."}], "id": "q01"}, {"question": "What specific condition does Gualtieri demand of Griselda before they are married?", "options": [{"text": "She must renounce all ties to her father, Giannucolo.", "isCorrect": false, "rationale": "While she returns to him later, Gualtieri does not initially demand she cut ties, only that she obey him."}, {"text": "She must produce a male heir within the first three years of marriage.", "isCorrect": false, "rationale": "Gualtieri's concerns about heirs come from his vassals, but his personal condition for Griselda is focused on her behavior toward him."}, {"text": "She must obey him absolutely and never complain about his actions.", "isCorrect": true, "rationale": "Gualtieri explicitly asks if she will study to comply with his wishes and remain obedient regardless of what he says or does."}, {"text": "She must agree to live in the palace as a servant until she learns noble ways.", "isCorrect": false, "rationale": "Gualtieri has her dressed in fine robes immediately upon marriage, transforming her status from peasant to marchioness instantly."}], "id": "q02"}, {"question": "How does Gualtieri justify his initial reluctance to marry when speaking to his vassals?", "options": [{"text": "He believes that the financial burden of a wedding would deplete the state treasury.", "isCorrect": false, "rationale": "Gualtieri's objections are personal and psychological, focusing on domestic harmony rather than state finances."}, {"text": "He argues that it is difficult to find a wife whose temperament matches his own.", "isCorrect": true, "rationale": "He expresses fear that a wife might 'run counter' to his ways and that children do not always resemble their parents' virtues."}, {"text": "He claims that the daughters of neighboring lords are not sufficiently beautiful.", "isCorrect": false, "rationale": "Gualtieri dismisses the vassals' offer to find him a well-born wife based on character and parentage, not lack of beauty."}, {"text": "He asserts that his passion for hunting leaves no time for domestic life.", "isCorrect": false, "rationale": "While he spends his time hunting, his expressed concern regarding marriage is the risk of a mismatch in character."}], "id": "q03"}, {"question": "What does Griselda request from Gualtieri when she is ordered to leave the palace in 'her shift'?", "options": [{"text": "A small portion of the wealth she helped manage for $13$ years.", "isCorrect": false, "rationale": "Griselda explicitly states she brought nothing but herself and asks for nothing material save for basic modesty."}, {"text": "Permission to take her children with her back to her father's house.", "isCorrect": false, "rationale": "At this point in the story, Griselda believes her children are dead and does not ask for them."}, {"text": "A single shift to cover her nakedness in exchange for her lost virginity.", "isCorrect": true, "rationale": "She asks that the body which bore his children not be seen naked, requesting a shift as a 'guerdon' for the virginity she brought to the marriage."}, {"text": "A robe of state so that she does not shame him upon her departure.", "isCorrect": false, "rationale": "The ladies of the court ask for a robe on her behalf, but Gualtieri refuses, and Griselda only asks for a shift."}], "id": "q04"}, {"question": "Where are Griselda's children actually taken after they are removed from her care?", "options": [{"text": "They are hidden in the cottage of Giannucolo to be raised as peasants.", "isCorrect": false, "rationale": "Giannucolo is unaware of their survival and continues his humble life until the very end."}, {"text": "They are sent to Bologna to be raised by a kinswoman of Gualtieri.", "isCorrect": true, "rationale": "Gualtieri sends both children to a relative in Bologna to be educated in secret, ensuring their identity remains unknown."}, {"text": "They are placed in the care of the Count of Panago in Rome.", "isCorrect": false, "rationale": "While the Count of Panago eventually brings them back, their primary upbringing was handled by a kinswoman in Bologna."}, {"text": "They are sent to the King of France to ensure a noble upbringing.", "isCorrect": false, "rationale": "Gualtieri uses his own family connections in Bologna rather than international royalty."}], "id": "q05"}, {"question": "In Dioneo's concluding remarks, what does he suggest about the distribution of 'spirits divine' and 'base souls'?", "options": [{"text": "Divine spirits are only found in the palaces of kings.", "isCorrect": false, "rationale": "Dioneo's point is a subversion of this idea, suggesting that nobility is not inherent to rank."}, {"text": "They are equally distributed among all social classes by fate.", "isCorrect": false, "rationale": "He specifically contrasts the poor cottage with the palace to highlight the irony of Griselda's virtue vs Gualtieri's cruelty."}, {"text": "Divine spirits can fall into poor cots, while base souls can be found in palaces.", "isCorrect": true, "rationale": "He notes that the heavens sometimes drop divine spirits into poor homes while placing souls fit to 'tend hogs' into the bodies of kings."}, {"text": "The soul of a person is determined entirely by their upbringing and environment.", "isCorrect": false, "rationale": "Dioneo's comment suggests an innate quality bestowed by 'the heavens' rather than social conditioning."}], "id": "q06"}, {"question": "What task does Griselda perform for Gualtieri's supposed 'new wedding'?", "options": [{"text": "She acts as the primary witness for the papal dispensation.", "isCorrect": false, "rationale": "The dispensation was counterfeit and Griselda was not involved in the legal process."}, {"text": "She prepares the wedding feast and arranges the chambers like a servant.", "isCorrect": true, "rationale": "Despite her previous rank, she sweeps the chambers, sets the tables, and invites the guests as if she were a 'paltry serving-wench'."}, {"text": "She is forced to sew the wedding dress for the new bride.", "isCorrect": false, "rationale": "While she handles many chores, the text emphasizes her cleaning and organizing the house rather than dressmaking."}, {"text": "She is made to stand at the gates to welcome the guests in her peasant rags.", "isCorrect": false, "rationale": "She does welcome the guests, but her primary labor involves setting the interior of the house in order."}], "id": "q07"}, {"question": "According to the introduction to the tale, which famous authors retold the story of Griselda after Boccaccio?", "options": [{"text": "Dante and Machiavelli", "isCorrect": false, "rationale": "While significant Italian authors, they are not cited in the text as the primary retellers of this specific story."}, {"text": "Petrarch and Chaucer", "isCorrect": true, "rationale": "The source notes that Petrarch retold it in Latin in $1374$ and Chaucer included it in 'The Clerk's Tale' around $1395$."}, {"text": "Shakespeare and Milton", "isCorrect": false, "rationale": "These are later English authors who are not mentioned in the provided historical context of the tale."}, {"text": "Virgil and Ovid", "isCorrect": false, "rationale": "These are classical Roman authors who predated the medieval setting of the Decameron."}], "id": "q08"}, {"question": "What reason does Gualtieri give at the end of the story for subjecting Griselda to such 'hard and unheard-of' trials?", "options": [{"text": "He wanted to punish her for her father's low social standing.", "isCorrect": false, "rationale": "He chose her specifically because of her character, not to punish her origins."}, {"text": "He wanted to teach her and his vassals how to 'take and keep a wife'.", "isCorrect": true, "rationale": "He states his purpose was to ensure his own 'perpetual peace' and to provide a lesson on wifely obedience and marital management."}, {"text": "He was following a tradition of the Marquisate of Saluzzo.", "isCorrect": false, "rationale": "Gualtieri's 'strange humour' is presented as his own whim, and Dioneo labels it as 'mad folly'."}, {"text": "He sought to prove to the Pope that Griselda was a saint.", "isCorrect": false, "rationale": "The Pope's involvement was entirely fabricated by Gualtieri to justify the 'divorce'."}], "id": "q09"}, {"question": "Why does the brigata decide to return to Florence at the end of the tenth day?", "options": [{"text": "The plague has finally ended in the city.", "isCorrect": false, "rationale": "The text does not state the plague is over, only that they have been away for $15$ days."}, {"text": "They have run out of stories to tell each other.", "isCorrect": false, "rationale": "The decision is based on social propriety and the risk of weariness, not a lack of content."}, {"text": "To prevent their company from becoming too large and to avoid gossip.", "isCorrect": true, "rationale": "The king suggests that their long stay might lead to 'misconstruction' or an increase in company that would 'destroy' their pleasure."}, {"text": "A messenger arrives with urgent news regarding their families.", "isCorrect": false, "rationale": "The departure is a proactive decision by the king of the day to maintain their health and reputation."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
