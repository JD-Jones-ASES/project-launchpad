<script>
var QUESTIONS = [{"question": "What specifically distinguishes Boccaccio's account of the Black Death from other historical accounts like those of Thucydides or Daniel Defoe?", "options": [{"text": "Its focus on the physiological evolution of the virus over several years.", "isCorrect": false, "rationale": "While Boccaccio mentions the plague's origin in the East, his primary focus is on the immediate social and moral collapse rather than a long-term epidemiological study."}, {"text": "The combination of clinical observation with deep moral reflection on social bonds.", "isCorrect": true, "rationale": "The text emphasizes that Boccaccio captures both the physical symptoms and the devastating impact on family, religion, and civic duties."}, {"text": "The use of statistical data to quantify the exact mortality rate in rural versus urban areas.", "isCorrect": false, "rationale": "The narrative provides general estimations of death tolls but relies more on qualitative descriptions of the atmosphere and human behavior."}, {"text": "Its rejection of supernatural or divine explanations in favor of purely environmental factors.", "isCorrect": false, "rationale": "Boccaccio explicitly mentions that the pestilence might have been sent by God in 'just wrath' or disseminated by 'celestial bodies,' acknowledging both perspectives."}], "id": "q01"}, {"question": "Why does Boccaccio argue that his work is more necessary for women than for men?", "options": [{"text": "Women were more susceptible to the physical ailments of the plague due to their 'delicate frames.'", "isCorrect": false, "rationale": "Though he mentions their delicate frames, his primary argument for the book's necessity concerns their emotional and social restrictions."}, {"text": "Men already possessed the 'good sense' and 'good fortune' to avoid amorous suffering.", "isCorrect": false, "rationale": "Boccaccio admits men are also 'enamoured' and afflicted, but they have external outlets for relief that women lack."}, {"text": "Women lack the diverse external diversions, such as hunting or trade, available to men to relieve 'melancholy.'", "isCorrect": true, "rationale": "The author notes that women are confined to their chambers and lack the ability to 'hawk, hunt, fish, ride, play or traffic' to distract from the pains of love."}, {"text": "Men were traditionally more literate and had easier access to other forms of consolation.", "isCorrect": false, "rationale": "The text focuses on social freedom and physical activities as the primary distinction between the genders' ability to cope, not literacy rates."}], "id": "q02"}, {"question": "How did the symptoms of the plague in Florence differ from those initially observed in the East?", "options": [{"text": "The Florentine plague was characterized by a sudden and uncontrollable issue of blood from the nose.", "isCorrect": false, "rationale": "The text identifies nosebleeds as the primary manifest sign in the East, specifically contrasting it with the Florentine symptoms."}, {"text": "The Florentine plague manifested as 'gavoccioli' in the groin or armpits rather than nosebleeds.", "isCorrect": true, "rationale": "Boccaccio describes the emergence of tumors as large as apples or eggs as the first sign in the West, which then evolved into black or livid spots."}, {"text": "The symptoms in the East were primarily internal, whereas the Florentine plague was solely visible on the skin.", "isCorrect": false, "rationale": "Both variations had visible signs, but the specific location and nature of those signs (internal hemorrhaging vs. external tumors) differed."}, {"text": "The Florentine version was accompanied by high fevers that were absent in Eastern cases.", "isCorrect": false, "rationale": "Boccaccio notes that in Florence, death occurred in most cases 'without any fever or other attendant malady.'"}], "id": "q03"}, {"question": "Which social response to the plague involved carrying 'flowers or fragrant herbs' to 'comfort the brain'?", "options": [{"text": "The hedonistic group that spent their days in taverns and public resorts.", "isCorrect": false, "rationale": "This group prioritized satisfying their appetites through song, revelry, and drinking rather than olfactory protection."}, {"text": "The reclusive communities that lived in total isolation from the sick.", "isCorrect": false, "rationale": "The recluses focused on seclusion, delicate viands, and avoiding any tidings of death, whereas the herb-carriers still walked abroad."}, {"text": "The group that took a middle course, neither living as recluses nor as extreme dissipators.", "isCorrect": true, "rationale": "These individuals maintained a degree of freedom and used perfumes to mask the 'stench emitted by the dead and the dying.'"}, {"text": "The group that sought safety through 'voluntary exile' in the countryside.", "isCorrect": false, "rationale": "Those in exile relied on flight as their primary medicine, leaving the city entirely rather than managing its environment with scents."}], "id": "q04"}, {"question": "What does Boccaccio identify as the 'moral foundation' of the entire *Decameron*?", "options": [{"text": "The belief that divine intervention is the only cure for social decay.", "isCorrect": false, "rationale": "The text focuses on human agency and the 'creative response' of the characters rather than theological solutions."}, {"text": "The contrast between the plague's destruction of order and the brigata's creative effort to reconstruct it.", "isCorrect": true, "rationale": "The 'What to Watch For' section explicitly states that the contrast between chaos and the group's organized companionship is the work's moral basis."}, {"text": "The assertion that romantic love is the only virtue capable of surviving a catastrophe.", "isCorrect": false, "rationale": "While love is a central theme, the moral foundation rests on the broader reconstruction of social order and companionship through storytelling."}, {"text": "The critique of the Church for its failure to provide spiritual guidance during the Black Death.", "isCorrect": false, "rationale": "While Boccaccio mentions priests refusing the sick, this critique is a symptom of the social breakdown rather than the work's foundational moral principle."}], "id": "q05"}, {"question": "Which member of the *brigata* serves as the first queen and initiates the group's governance structure?", "options": [{"text": "Filomena", "isCorrect": false, "rationale": "Filomena is the one who crowns the first queen with a laurel wreath, but she is not the first to hold authority."}, {"text": "Fiammetta", "isCorrect": false, "rationale": "Fiammetta is identified as a member of the group and a player of the viol, but she does not lead on the first day."}, {"text": "Pampinea", "isCorrect": true, "rationale": "As the eldest, Pampinea proposes the retreat and the system of daily sovereignty, and is subsequently elected the first queen."}, {"text": "Elisa", "isCorrect": false, "rationale": "Elisa contributes to the discussion regarding the necessity of male guidance, but she follows Pampinea's lead in the organization."}], "id": "q06"}, {"question": "Who are the 'becchini,' and how did their role reflect the breakdown of social order?", "options": [{"text": "They were noble volunteers who organized the 'pious processions' to appease God.", "isCorrect": false, "rationale": "The *becchini* were actually from the 'baser ranks' and were motivated by hire rather than religious piety."}, {"text": "They were low-born corpse-carriers who buried the dead hastily and without traditional rites.", "isCorrect": true, "rationale": "Their presence signaled the end of 'funeral pomp' as they would carry biers to the nearest available tomb for a fee, often disregarding the deceased's wishes."}, {"text": "They were medical practitioners who took over when qualified physicians died.", "isCorrect": false, "rationale": "The text distinguishes between medical pretenders and the *becchini*, who were strictly involved in body disposal."}, {"text": "They were legal officials appointed to cleanse the city of its many 'impurities.'", "isCorrect": false, "rationale": "Officials were mentioned earlier in the text as having failed; the *becchini* emerged later as a chaotic, opportunistic force."}], "id": "q07"}, {"question": "In the country retreat, what is the role assigned to Parmeno, Dioneo's man-servant?", "options": [{"text": "Treasurer and chancellor of the exchequer.", "isCorrect": false, "rationale": "This specific financial role was assigned to Sirisco, Pamfilo's man-servant."}, {"text": "Seneschal, in charge of the household and hall service.", "isCorrect": true, "rationale": "Pampinea constitutes Parmeno as the seneschal to oversee the control of the entire household and service of the hall."}, {"text": "In charge of the kitchen and preparation of dishes.", "isCorrect": false, "rationale": "The kitchen duties were specifically delegated to the maids Misia and Licisca."}, {"text": "Officer of the bedchambers and cleanliness.", "isCorrect": false, "rationale": "Tindaro was assigned to the men's chambers, while Chimera and Stratilia were assigned to the ladies' chambers."}], "id": "q08"}, {"question": "Why does Boccaccio state that he will not reveal the real names of the seven ladies in the *brigata*?", "options": [{"text": "To protect them from the legal consequences of fleeing the city during a crisis.", "isCorrect": false, "rationale": "The text suggests their flight was actually a common and 'honourable' response, so legal trouble was not the primary concern."}, {"text": "To prevent 'detractors' from using the stories they tell as a reason to slur their honor.", "isCorrect": true, "rationale": "Boccaccio is 'solicitous' that the 'ample indulgence' of that time's manners might be judged harshly by the more restricted manners of his current day."}, {"text": "Because they were members of the royal family of King Robert of Naples.", "isCorrect": false, "rationale": "While Boccaccio dedicates the work to Fiammetta (Maria of Naples), the other ladies are described as friends or neighbors of noble birth, not necessarily royalty."}, {"text": "He claims to have forgotten their true identities over the course of the long pestilence.", "isCorrect": false, "rationale": "Boccaccio explicitly states he has 'good reason' to withhold the names, implying he remembers them but chooses to use appropriate pseudonyms instead."}], "id": "q09"}, {"question": "According to the text, approximately how many people died within the walls of Florence between March and July of $1348$?", "options": [{"text": "$50,000$", "isCorrect": false, "rationale": "This figure is significantly lower than the 'upwards of a hundred thousand' deaths estimated in the narrative."}, {"text": "$100,000$", "isCorrect": true, "rationale": "The text states that 'it is believed without any manner of doubt' that more than a hundred thousand human beings lost their lives in that short period."}, {"text": "$250,000$", "isCorrect": false, "rationale": "While the devastation was immense, the text notes the city would not even have been 'supposed to contain so many people' as $100,000$ before the plague."}, {"text": "$10,000$", "isCorrect": false, "rationale": "The text emphasizes the magnitude of the disaster, describing it as a near depopulation of one of Italy's fairest cities, making this number far too low."}], "id": "q10"}, {"question": "What concern does Filomena raise regarding the proposal to flee to the country?", "options": [{"text": "The danger of being robbed by bandits and criminals on the road.", "isCorrect": false, "rationale": "While security is a concern, her primary focus is on the group's internal governance and social reputation."}, {"text": "The lack of medical facilities and physicians in the 'sequestered villages.'", "isCorrect": false, "rationale": "The group already acknowledged that physicians were of no use, so the lack of them in the country was not the main deterrent."}, {"text": "The inherent difficulty women have in governing themselves without the 'guidance of some man.'", "isCorrect": true, "rationale": "Filomena argues that women are 'sensitive, perverse, suspicious, pusillanimous and timid,' leading her to doubt the company would last without male leadership."}, {"text": "The possibility of encountering more plague-stricken peasants in the rural homesteads.", "isCorrect": false, "rationale": "Pampinea had already addressed this, noting that while peasants die, they are 'dispersed' and thus less painful to witness."}], "id": "q11"}, {"question": "What unusual behavior was observed in animals, such as the two hogs described by Boccaccio?", "options": [{"text": "They began to return home at night without the guidance of herdsmen.", "isCorrect": false, "rationale": "While this did happen with livestock in the country, the story of the two hogs illustrates the virulence of the contagion rather than animal behavior."}, {"text": "They developed tumors and spots identical to those found on human victims.", "isCorrect": false, "rationale": "The text focuses on the speed of their death rather than a detailed description of their symptoms."}, {"text": "They died almost instantaneously after touching the contaminated rags of a plague victim.", "isCorrect": true, "rationale": "Boccaccio uses the hogs as an example of how 'energy of the contagion' was so potent it could spread from human objects to other species with fatal results."}, {"text": "They abandoned their young and their dwellings, much like the human citizens.", "isCorrect": false, "rationale": "The comparison of animal abandonment is used for the 'poor hapless husbandmen,' but the hogs are specifically cited for their reaction to physical contact with infected items."}], "id": "q12"}, {"question": "Which of the following describes the conditions in the rural areas ('the country parts') according to Boccaccio?", "options": [{"text": "The countryside remained largely unaffected, serving as a safe haven for all.", "isCorrect": false, "rationale": "Boccaccio states the 'surrounding country knew no mitigation' and deaths there were as common as in the city."}, {"text": "Husbandmen died 'not as men, but rather as beasts,' with their lands and animals left in total neglect.", "isCorrect": true, "rationale": "The text portrays a grim picture of agricultural collapse, where families died in sequestered villages or on the open fields without aid."}, {"text": "The nobility in their 'castles' were able to maintain perfect order and hygiene.", "isCorrect": false, "rationale": "While castles are mentioned as 'little cities,' the general tenor is one of universal disaster affecting everyone regardless of location."}, {"text": "The peasants developed a communal system of farming to ensure the survival of their crops.", "isCorrect": false, "rationale": "On the contrary, Boccaccio notes they 'abandoned all rule of life' and 'all habit of industry,' leaving corn unreaped."}], "id": "q13"}, {"question": "What condition does Dioneo set for his participation in the *brigata's* retreat?", "options": [{"text": "He must be allowed to serve as the first king to establish the laws of the group.", "isCorrect": false, "rationale": "Dioneo does not ask for power, but rather for the group to maintain a joyful atmosphere."}, {"text": "They must provide him with a lute and a viol to ensure constant entertainment.", "isCorrect": false, "rationale": "While he does play the lute later, it is not a prerequisite for his stay."}, {"text": "He will stay only if he can be merry and laugh, having left his cares at the city-gate.", "isCorrect": true, "rationale": "Dioneo explicitly asks the ladies to 'address yourselves to make merry' or give him leave to return to the 'stricken city.'"}, {"text": "The group must agree to tell exactly one hundred stories over ten days.", "isCorrect": false, "rationale": "This structure is established by Pampinea after she is elected queen, not as a condition set by Dioneo upon arrival."}], "id": "q14"}, {"question": "How were the dead buried once the 'consecrated ground' of the graveyards was full?", "options": [{"text": "They were burned in large pyres to prevent further spread of the infection.", "isCorrect": false, "rationale": "Burning is not mentioned; Boccaccio focuses on the change in burial practices within the churchyards."}, {"text": "They were cast into the river to be carried away to the sea.", "isCorrect": false, "rationale": "The text specifies that they were placed in trenches within the graveyards rather than being discarded in water."}, {"text": "They were piled in 'huge trenches' tier upon tier, like merchandise in a ship's hold.", "isCorrect": true, "rationale": "Boccaccio describes the mass burials where hundreds were laid together and covered with a little earth until the trench was full."}, {"text": "Individual tombs were built outside the city walls in the open fields.", "isCorrect": false, "rationale": "The text notes that ancient customs of separate resting-places were abandoned in favor of the efficiency of mass graves."}], "id": "q15"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
