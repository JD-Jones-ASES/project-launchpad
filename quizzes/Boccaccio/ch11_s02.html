<script>
var QUESTIONS = [{"question": "According to the text, what does the 'upward arc' of the Decameron's structure signify regarding the transition from Day I to Day $\\text{X}$?", "options": [{"text": "The movement from the social disorder of the plague toward a state of courtesy and virtue.", "isCorrect": true, "rationale": "The text explicitly states that the deliberate structure mirrors the ascent from the initial chaos and plague toward the noble, virtuous themes found in the final day."}, {"text": "A chronological progression through the liturgical calendar, ending on a high holy day.", "isCorrect": false, "rationale": "While the work has a structure, the text identifies the progression as a moral and thematic ascent rather than a specific religious or calendar-based one."}, {"text": "The shifting of focus from the rural landscape back to the urban setting of Florence.", "isCorrect": false, "rationale": "The arc described is conceptual and moral; the physical location of the brigata remains separated from the plague-stricken city to maintain their ideal society."}, {"text": "A transition from secular storytelling to exclusively theological allegories.", "isCorrect": false, "rationale": "Though the themes become more virtuous, the text notes that Boccaccio maintains his irony and some humorous elements, indicating the work remains secular in nature."}], "id": "q01"}, {"question": "How does the text define the Aristotelian concept of magnanimity ($\\textit{megalopsychia}$) in the context of Day $\\text{X}$?", "options": [{"text": "It is the crown virtue of the great-souled person, expressing itself through active and selfless deeds.", "isCorrect": true, "rationale": "The text links Boccaccio's use of 'magnificenza' to Aristotle's idea of a great-souled individual whose greatness is realized in generous action."}, {"text": "It is a form of intellectual superiority that allows characters to outwit their enemies.", "isCorrect": false, "rationale": "The text distinguishes the virtue of Day $\\text{X}$ from the 'wit' and 'cleverness' that characterized earlier storytelling days."}, {"text": "It represents the passive endurance of suffering without seeking vengeance.", "isCorrect": false, "rationale": "While some tales involve patience, the text defines magnanimity primarily as 'great-doing,' which implies an active rather than passive form of virtue."}, {"text": "It is a specialized form of fiscal generosity reserved for the nobility and ruling class.", "isCorrect": false, "rationale": "The text suggests the theme applies to various deeds, whether in love or otherwise, focusing on the soul's greatness rather than strictly financial status."}], "id": "q02"}, {"question": "What is the literal meaning of the Latin root $\\textit{magnificentia}$, which informs the theme of Day $\\text{X}$?", "options": [{"text": "Great-doing", "isCorrect": true, "rationale": "The text states that 'Magnificenza' derives from the Latin 'magnificentia,' which literally translates to 'great-doing.'"}, {"text": "Large-hearted", "isCorrect": false, "rationale": "While 'large-hearted' is a common synonym for magnanimous, it is not the literal Latin translation of 'magnificentia' provided in the source material."}, {"text": "Divine-power", "isCorrect": false, "rationale": "The root 'magn-' means great, but the 'facia' or '-centia' suffix relates to action and doing rather than power or divinity."}, {"text": "Noble-speech", "isCorrect": false, "rationale": "The text emphasizes that the virtue is expressed through 'generous action' and 'doing' rather than rhetorical skill."}], "id": "q03"}, {"question": "In the primary source excerpt, what occupies the company's time during their slow-paced morning walk led by Panfilo?", "options": [{"text": "Discussing their future way of life and answering questions about it.", "isCorrect": true, "rationale": "The text describes them beguiling the time with 'talk of their future way of life, whereof there was much to tell and much to answer.'"}, {"text": "Debating the specific philosophical definitions of virtue and vice.", "isCorrect": false, "rationale": "While Day $\\text{X}$ has a moral theme, the morning conversation specifically concerned their future lifestyle and practical arrangements."}, {"text": "Reciting poetry and singing to the accompaniment of musical instruments.", "isCorrect": false, "rationale": "While the group often engages in music, this specific walk is described as being filled with talk about their future."}, {"text": "Critiquing the tales told on the previous nine days.", "isCorrect": false, "rationale": "The text focuses on their forward-looking conversation about their 'future way of life' rather than a retrospective analysis of prior stories."}], "id": "q04"}, {"question": "Why does the text describe the final tale of Day $\\text{X}$—the story of Patient Griselda—as significant?", "options": [{"text": "It is the most discussed and debated tale in the entire collection.", "isCorrect": true, "rationale": "The introduction explicitly notes that Dioneo's story of Patient Griselda will prove to be the 'most discussed and debated' in the Decameron."}, {"text": "It is the only tale on Day $\\text{X}$ that avoids the use of irony.", "isCorrect": false, "rationale": "The text mentions that Boccaccio 'never entirely abandons his characteristic irony,' implying it may still be present even in this serious tale."}, {"text": "It serves as the definitive proof that 'wit' is superior to 'virtue.'", "isCorrect": false, "rationale": "Day $\\text{X}$ is intended to celebrate virtue and magnanimity; placing wit above virtue would contradict the 'upward arc' of the work."}, {"text": "It is the only story in the collection told by the king himself.", "isCorrect": false, "rationale": "The text identifies the teller of this story as Dioneo, not the king (Panfilo)."}], "id": "q05"}, {"question": "How does Panfilo frame the transition of themes after nine days of stories about trickery, fortune, and wit?", "options": [{"text": "He directs the company to save their 'best for last' by focusing on generosity and magnificent deeds.", "isCorrect": true, "rationale": "The text notes that the brigata 'saves its best for last' and Panfilo chooses a theme of 'generous or magnificent' deeds as the summit of the work."}, {"text": "He suggests that the previous themes were errors that now require moral correction.", "isCorrect": false, "rationale": "The text describes the work as an 'ascent' and a 'summit,' suggesting a progression toward higher themes rather than a rejection of previous ones."}, {"text": "He mandates that every story must involve a reconciliation between enemies.", "isCorrect": false, "rationale": "While generosity between enemies is one of the possible topics, the theme is broader, encompassing any 'generous or magnificent deed.'"}, {"text": "He demands that the tales move away from love and focus entirely on political sacrifice.", "isCorrect": false, "rationale": "Panfilo's theme specifically includes deeds performed 'in matters of love or otherwise,' maintaining the collection's interest in romantic themes."}], "id": "q06"}, {"question": "What sequence of events occurs in the primary source between the company's morning walk and the start of the storytelling?", "options": [{"text": "Drinking from the fountain, resting in the garden, eating breakfast, and then sleeping.", "isCorrect": true, "rationale": "The passage details that they returned to the palace, drank from the fountain, took pleasure in the garden, ate breakfast, and then 'slept as they were wont' before reassembling."}, {"text": "Storytelling, followed by a meal, and then a period of rest in the garden.", "isCorrect": false, "rationale": "The storytelling occurs only after the walk, the meal, and the habitual sleep period."}, {"text": "A return to the palace for breakfast, followed immediately by the king's opening remarks.", "isCorrect": false, "rationale": "The text indicates several activities occurred between returning to the palace and the reassembling for tales, including drinking at the fountain and sleeping."}, {"text": "Silent contemplation in the shade, followed by a formal beverage service and a light lunch.", "isCorrect": false, "rationale": "While they did drink and rest in the shade, the text describes them as being 'hied them hither and thither' in the garden rather than in silent contemplation."}], "id": "q07"}, {"question": "Which character is tasked by Panfilo to lead the storytelling on Day $\\text{X}$?", "options": [{"text": "Neifile", "isCorrect": true, "rationale": "The primary source concludes by stating that Neifile, having received the king's command, 'blithely thus began' the storytelling."}, {"text": "Dioneo", "isCorrect": false, "rationale": "While Dioneo tells the final, famous story of the day, Neifile is the one commanded to 'lead the way' and begin the session."}, {"text": "Filomena", "isCorrect": false, "rationale": "Filomena accompanied Panfilo during the morning walk, but she was not the one commanded to start the tales."}, {"text": "Fiammetta", "isCorrect": false, "rationale": "Like Filomena, Fiammetta walked with the king in the morning, but she did not lead the storytelling session."}], "id": "q08"}, {"question": "The text mentions that despite the 'elevated' tone of Day $\\text{X}$, Boccaccio does not entirely abandon which literary element?", "options": [{"text": "Irony", "isCorrect": true, "rationale": "The author notes that 'Boccaccio never entirely abandons his characteristic irony,' even when dealing with the noble themes of Day $\\text{X}$."}, {"text": "Tragedy", "isCorrect": false, "rationale": "While tragedy is mentioned as a cycle in the 'middle Days,' the text emphasizes that Day $\\text{X}$ is a 'summit' of virtue and magnanimity rather than a return to tragedy."}, {"text": "Miscellany", "isCorrect": false, "rationale": "The 'open miscellany' is associated with Day $\\text{I}$, whereas Day $\\text{X}$ is described as having a very specific, deliberate theme."}, {"text": "Solemnity", "isCorrect": false, "rationale": "The text actually states 'This is not to say that $\\text{X}$ is solemn,' pointing out that several tales are warm and humorous instead."}], "id": "q09"}, {"question": "According to the introduction, where does the 'brigata' reassemble to begin the tales of the tenth day?", "options": [{"text": "At a spot chosen by the king.", "isCorrect": true, "rationale": "The primary source specifies that they reassembled 'at a spot chosen by the king' after their customary sleep."}, {"text": "Inside the main hall of the palace.", "isCorrect": false, "rationale": "While they returned to the palace earlier, the reassembly for storytelling occurred at a specific location designated by Panfilo."}, {"text": "Directly beside the fountain where they drank.", "isCorrect": false, "rationale": "They gathered at the fountain earlier in the morning, but the text distinguishes the storytelling spot as a choice made by the king after their nap."}, {"text": "Under the vermeil flush of the western sky.", "isCorrect": false, "rationale": "The 'vermeil flush' describes the sky at dawn when Panfilo first arose, not the time or setting of the afternoon storytelling session."}], "id": "q10"}, {"question": "What specific quality makes Day X distinct from the days governed by themes of wit ($ingegno$) and fortune?", "options": [{"text": "Day X prizes selfless, costly virtue over clever self-interest.", "isCorrect": true, "rationale": "The contrast is between ingegno (personal cleverness that serves the individual) and magnificenza (the costly generosity that benefits others at personal expense)."}, {"text": "Day X restricts stories to religious subjects, excluding all secular material.", "isCorrect": false, "rationale": "Several Day X tales (Nathan, Saladin, Torello) are secular; the day is not restricted to explicitly religious subjects."}, {"text": "Day X introduces female narrators for the first time in the collection.", "isCorrect": false, "rationale": "Female narrators (Pampinea, Fiammetta, Neifile, Emilia, Lauretta, Elissa) appear throughout all ten days of storytelling."}, {"text": "Day X rejects the novella form in favor of longer allegorical poems.", "isCorrect": false, "rationale": "Day X tales remain in the novella prose form; longer allegorical poems describe Boccaccio's Latin works, not the Decameron."}], "id": "q11"}, {"question": "According to the commentary, why is it significant that Saladin travels to the West in disguise rather than as a declared ruler?", "options": [{"text": "It allows Boccaccio to test whether Torello's courtesy is genuine or merely performative toward the powerful.", "isCorrect": true, "rationale": "By disguising Saladin as a merchant, Boccaccio ensures Torello's hospitality is given freely without the advantage of knowing the guest's rank."}, {"text": "It establishes that Saladin is a coward who fears confrontation with Christian knights.", "isCorrect": false, "rationale": "Saladin's military prowess is not in question; the disguise is a narrative device to test authentic virtue."}, {"text": "It allows Boccaccio to satirize the incompetence of Christian border guards.", "isCorrect": false, "rationale": "The disguise episode has no satirical target; it is structured to demonstrate Torello's genuine magnanimity."}, {"text": "It shows that Muslim rulers routinely practiced espionage against Christian states.", "isCorrect": false, "rationale": "While Saladin's purpose is reconnaissance, the literary function is to set up a test of virtue, not to comment on political espionage practices."}], "id": "q12"}, {"question": "The commentary notes that Day X is 'not solemn.' Which word best describes the tone of its warmest tales?", "options": [{"text": "Genial and admiring.", "isCorrect": true, "rationale": "Tales like X.9 (Torello/Saladin) are described as warm and positive, generating admiration for human greatness without the solemnity of a sermon."}, {"text": "Satirical and subversive.", "isCorrect": false, "rationale": "Satire is more characteristic of Days I, VIII, and IX; Day X aims at elevation, not subversion."}, {"text": "Melancholy and resigned.", "isCorrect": false, "rationale": "Melancholy characterizes Day IV; Day X aims to inspire admiration and moral ambition."}, {"text": "Didactic and preachy.", "isCorrect": false, "rationale": "The text specifically contrasts Day X with didactic solemnity, noting that it preserves Boccaccio's characteristic irony and warmth."}], "id": "q13"}, {"question": "From a structural perspective, what does having Dioneo—rather than the king Panfilo—tell the final tale of the entire collection suggest?", "options": [{"text": "That the collection ends on a note of deliberate ambiguity rather than closed moral certainty.", "isCorrect": true, "rationale": "Dioneo's irreverent persona ensures that the final tale cannot be read as a simple endorsement; his presence keeps the ending open to debate."}, {"text": "That bawdy humor is Boccaccio's ultimate conclusion about human nature.", "isCorrect": false, "rationale": "Dioneo tells a morally serious tale about Patient Griselda, not a bawdy one; his narrator role adds complexity, not comedy."}, {"text": "That kings lack the moral authority to speak about virtue.", "isCorrect": false, "rationale": "Panfilo is not excluded from moral authority; the choice is a structural and ironic device, not a political statement about kingship."}, {"text": "That Boccaccio considered Griselda's story too dangerous for an authoritative narrator.", "isCorrect": false, "rationale": "The text does not suggest the story was dangerous; rather, Dioneo's narration introduces productive interpretive ambiguity."}], "id": "q14"}, {"question": "What is the relationship between the theme of Day I (open miscellany, often anticlerical satire) and the theme of Day X (magnificent deeds)?", "options": [{"text": "Day I establishes the low point of human behavior; Day X provides the ascending reply.", "isCorrect": true, "rationale": "The commentary reads the Decameron as an arc: Day I's hypocrites and scoundrels set the moral floor; Day X's great-souled characters represent the human summit."}, {"text": "Day I and Day X share the same theme of political satire against the Church.", "isCorrect": false, "rationale": "Day X explicitly moves away from satirical anticlerical content toward admiration for secular virtue."}, {"text": "Day X is a direct rebuttal to every story told on Day I.", "isCorrect": false, "rationale": "Day X is the culmination of a structural arc, not a point-by-point rebuttal of specific Day I tales."}, {"text": "Both days are free-theme days, reflecting Boccaccio's reluctance to impose moral order.", "isCorrect": false, "rationale": "Day I is a free theme, but Day X has a specific, elevated theme; the two days are structurally opposite in that respect."}], "id": "q15"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
