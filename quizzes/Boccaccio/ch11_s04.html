        <div class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 11, Section 4</div>

        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What was Madonna Dianora's primary intent when she demanded a blooming garden in the middle of January?", "options": [{"text": "To test the depth of Messer Ansaldo's courtly love and chivalric devotion.", "isCorrect": false, "rationale": "While the task did test him, her motive was not to find a worthy lover but to create a condition so impossible that he would stop his pursuit."}, {"text": "To provide a valid reason for her husband to confront and duel the suitor.", "isCorrect": false, "rationale": "Dianora actually sought to avoid a confrontation involving her husband and kinsmen by keeping the matter silent as long as possible."}, {"text": "To permanently discourage her suitor by setting a condition she believed was impossible to meet.", "isCorrect": true, "rationale": "The text explicitly states she 'bethought her how she might rid herself of him' by requiring an extraordinary and 'impossible' feat."}, {"text": "To seek a divine or magical sign to determine if she should leave her marriage.", "isCorrect": false, "rationale": "The text characterizes Dianora as a virtuous wife who was distressed by the suitor's importunity, not someone looking for an excuse to leave."}]}, {"question": "According to the introductory notes, why did Boccaccio frequently set the stories of the Decameron in regions like Friuli rather than strictly in Tuscany?", "options": [{"text": "To demonstrate that the concept of courtly love was more prevalent in the north than the south.", "isCorrect": false, "rationale": "The text does not suggest courtly love was regional, but rather focuses on the geographic breadth of the collection's themes."}, {"text": "To give the collection a pan-Italian scope that reached beyond his local region.", "isCorrect": true, "rationale": "The source material notes that Boccaccio used settings outside Tuscany to provide the Decameron with a scope that encompassed all of Italy."}, {"text": "To avoid political censorship from the local Florentine government.", "isCorrect": false, "rationale": "There is no mention in the provided text regarding political censorship or the safety of the author as a motive for setting locations."}, {"text": "To showcase the unique dialect and linguistic variations of northeastern Italy.", "isCorrect": false, "rationale": "While Boccaccio is known for his prose, the text specifies that the varied settings were intended to broaden the geographic scope of the tales."}]}, {"question": "Which factor, in addition to his wife's honor, swayed Giliberto to allow Dianora to fulfill her promise to Ansaldo?", "options": [{"text": "A desire to publicly shame Ansaldo for his lack of restraint.", "isCorrect": false, "rationale": "Giliberto's decision was based on generosity and fear, rather than a desire for public spectacle or revenge."}, {"text": "The belief that a contract made under oath is legally binding regardless of its morality.", "isCorrect": false, "rationale": "The text mentions the oath, but Giliberto's specific fear was tied to the supernatural consequences of the bargain."}, {"text": "The fear that the necromancer might harm his family if the agreement was broken.", "isCorrect": true, "rationale": "The text states Giliberto was 'swayed thereto by fear of the necromancer,' who might 'do us a mischief' if the lady played Ansaldo false."}, {"text": "An indifference toward his wife's fidelity due to his own previous indiscretions.", "isCorrect": false, "rationale": "Giliberto is described as a 'pleasant gentleman' and 'debonair' who values the 'purity' of his wife's soul."}]}, {"question": "What specific action did Messer Ansaldo take to prove to Dianora that the 'impossible task' had been completed?", "options": [{"text": "He invited her husband to inspect the meadow before her arrival.", "isCorrect": false, "rationale": "The husband only learned of the matter when Dianora revealed it to him after she had already been informed of the garden's existence."}, {"text": "He gathered the finest fruits and flowers from the garden and sent them to her privately.", "isCorrect": true, "rationale": "Ansaldo 'caused some of the finest fruits and flowers... to be gathered, and privily presented to his lady' as assurance of his success."}, {"text": "He brought the necromancer to her home to testify to the magic's success.", "isCorrect": false, "rationale": "While the necromancer performed the magic, Ansaldo sent the tangible results (flowers and fruit) to prove the deed was done."}, {"text": "He published a proclamation in Udine inviting the city to witness the miracle.", "isCorrect": false, "rationale": "While many folk eventually saw the garden, Ansaldo's first move was to send a private proof to Dianora herself."}]}, {"question": "In the 'chain of renunciation' described in the story, what does Messer Ansaldo give up, and why?", "options": [{"text": "He gives up his wealth because the necromancer demands a sum that leaves him bankrupt.", "isCorrect": false, "rationale": "Ansaldo had the money and was willing to pay; it was the necromancer who eventually waived the fee."}, {"text": "He gives up his social standing in Udine to protect Dianora's reputation.", "isCorrect": false, "rationale": "His social standing remained intact, and his actions actually resulted in a 'close and loyal friendship' with the husband."}, {"text": "He gives up the chance to satisfy his long-held passion out of respect for Giliberto's nobility.", "isCorrect": true, "rationale": "Moved by Giliberto's liberality in sending his wife, Ansaldo chooses to treat Dianora as a sister rather than satisfy his 'unruly appetite.'"}, {"text": "He gives up his magical powers after realizing the danger of necromancy.", "isCorrect": false, "rationale": "Ansaldo was never the one with magical powers; he merely hired an 'adept' to perform the task."}]}, {"question": "How did the necromancer's final act contribute to the theme of 'magnificenza' or upward-spiraling generosity?", "options": [{"text": "He offered to make the garden permanent so the town could enjoy it forever.", "isCorrect": false, "rationale": "The text states that the necromancer caused the garden to vanish after the third day."}, {"text": "He waived his large fee after witnessing the selfless behavior of the husband and the suitor.", "isCorrect": true, "rationale": "The necromancer observed the liberality of Giliberto and Ansaldo and decided to be equally liberal with his reward."}, {"text": "He used his magic to ensure Dianora and Giliberto would remain forever in love.", "isCorrect": false, "rationale": "The necromancer's final act was a financial renunciation, not a new enchantment for the couple."}, {"text": "He confessed that the garden was an illusion and therefore did not merit payment.", "isCorrect": false, "rationale": "The necromancer considered his work valid and successful; he refused payment to match the nobility shown by the other characters."}]}, {"question": "What is the specific literary significance of the 'impossible task' motif in Boccaccio's version of this tale?", "options": [{"text": "It serves to show that magic is always deceptive and leads to sorrow.", "isCorrect": false, "rationale": "The tale actually ends in friendship and communal praise, rather than a moralizing warning against magic."}, {"text": "The task remains unfulfilled, highlighting the tragedy of unreachable goals.", "isCorrect": false, "rationale": "The text explicitly notes the twist in Boccaccio's version is that the task is actually fulfilled."}, {"text": "The fulfillment of the task forces characters to face the reality of their promises and choose between honor and desire.", "isCorrect": true, "rationale": "Boccaccio uses the successful completion of the task to create a moral dilemma that tests the characters' generosity and honor."}, {"text": "It is used to satirize the unrealistic expectations of Arthurian romances.", "isCorrect": false, "rationale": "While the motif appears in Arthurian romance, Boccaccio uses it here to explore serious themes of virtue and magnanimity rather than satire."}]}, {"question": "Which detail regarding the garden's existence provides a clue to its supernatural origin?", "options": [{"text": "It contained exotic plants that were only known to grow in the far East.", "isCorrect": false, "rationale": "The garden contained grass and flowers typical of May; it was the timing, not the species, that was miraculous."}, {"text": "The necromancer made it vanish entirely after the third day.", "isCorrect": true, "rationale": "The source material mentions that the garden vanished after three days, marking it as a temporary magical creation."}, {"text": "The garden was surrounded by an invisible wall that only Ansaldo could pass.", "isCorrect": false, "rationale": "Dianora visited the garden with 'many other ladies of the city,' implying it was physically accessible to many."}, {"text": "It grew in a place where no water was available, yet remained lush.", "isCorrect": false, "rationale": "The text does not mention irrigation or water sources as the primary miracle; the miracle was the seasonal contradiction."}]}, {"question": "What was Emilia's intent in sharing this story following the tale of Messer Gentile?", "options": [{"text": "To argue that women are more capable of honor than men.", "isCorrect": false, "rationale": "The story focuses on the competing and shared generosity of the husband, the suitor, and the magician, rather than a gender-based hierarchy of honor."}, {"text": "To demonstrate that even greater degrees of magnificence were possible than what had already been described.", "isCorrect": true, "rationale": "Emilia states that while Gentile's actions were magnificent, her purpose is to show 'that more was possible.'"}, {"text": "To provide a cautionary tale about the dangers of making oaths.", "isCorrect": false, "rationale": "While the oath causes distress, the story is framed as a positive example of 'magnificence and virtue' rather than a warning."}, {"text": "To shift the mood of the brigata from serious to humorous through a magical tale.", "isCorrect": false, "rationale": "The tale deals with high stakes of honor, virtue, and reputation, maintaining the serious and noble tone of Day Ten."}]}, {"question": "At the end of the narrative, what does the text say about Ansaldo's 'carnal love' for Dianora?", "options": [{"text": "It was completely extinguished, and he never spoke to her again.", "isCorrect": false, "rationale": "He did not avoid her; instead, his feelings transformed into a different, more respectable kind of affection."}, {"text": "It turned into a bitter resentment toward her and her husband.", "isCorrect": false, "rationale": "The text notes that a 'most close and loyal friendship' developed between Ansaldo and Giliberto."}, {"text": "It was spent and transformed into a flame of honorable affection.", "isCorrect": true, "rationale": "The story concludes by stating that his carnal love was 'spent' and replaced by 'honourable affection.'"}, {"text": "It remained just as strong, though he chose to hide it for the sake of his reputation.", "isCorrect": false, "rationale": "The text suggests a genuine internal transformation from 'unbridled passion' to 'compassion' and honorable love."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
