<script>
var QUESTIONS = [{"question": "According to historian Gene Brucker, what characteristic defined fourteenth-century Florence during Boccaccio's lifetime?", "options": [{"text": "A society in transition that remained medieval in religious assumptions while becoming modern in economic dynamism.", "isCorrect": true, "rationale": "The source explicitly quotes Brucker describing Florence as a society shifting toward modern economic and social mobility while retaining medieval faith."}, {"text": "A fully secularized city-state that had successfully abandoned the feudal hierarchies of the Middle Ages.", "isCorrect": false, "rationale": "While the city was moving away from feudalism, it remained rooted in medieval religious assumptions and was not fully secularized."}, {"text": "A rigid hereditary society where social mobility was strictly prohibited by the Church.", "isCorrect": false, "rationale": "The text highlights that Florence was characterized by social mobility and individuals relying on their own wit rather than fixed orders."}, {"text": "A declining urban center struggling to maintain the literary traditions of romance and allegory.", "isCorrect": false, "rationale": "The text describes Florence as economically dynamic and at a turning point, not in a state of decline."}], "id": "q01"}, {"question": "How does Boccaccio's approach to characterization mirror the innovations of the painters Giotto and Cimabue?", "options": [{"text": "By replacing stylized, allegorical figures with individual characters possessing weight, emotion, and specificity.", "isCorrect": true, "rationale": "The text draws a parallel between Boccaccio's realistic human types and the visual shift from flat Byzantine figures to three-dimensional, emotional ones."}, {"text": "By focusing exclusively on the lives of saints and religious figures to evoke spiritual transcendence.", "isCorrect": false, "rationale": "Both Boccaccio and these painters moved away from purely spiritual or stylized representations toward recognizable human subjects."}, {"text": "By utilizing abstract symbols to represent the internal struggle between virtue and vice.", "isCorrect": false, "rationale": "The text notes that Boccaccio's characters were 'not' allegorical figures of virtue and vice, but recognizable human types."}, {"text": "By adhering to the flat, two-dimensional traditions established in the Byzantine era.", "isCorrect": false, "rationale": "Giotto and Cimabue are credited with 'replacing' the Byzantine tradition with a more realistic style."}], "id": "q02"}, {"question": "Which specific work of Boccaccio served as the primary source for Geoffrey Chaucer's 'The Knight's Tale'?", "options": [{"text": "The Teseida", "isCorrect": true, "rationale": "The text specifies that while Chaucer drew from the Decameron for other tales, 'The Knight's Tale' adapts Boccaccio's earlier work, the Teseida."}, {"text": "The Decameron (X10)", "isCorrect": false, "rationale": "Story X10, Patient Griselda, was the source for 'The Clerk's Tale,' not 'The Knight's Tale'."}, {"text": "The Magic Garden (X5)", "isCorrect": false, "rationale": "The theme of competing generosities in X5 influenced 'The Franklin's Tale'."}, {"text": "The Palace of Pleasure", "isCorrect": false, "rationale": "The Palace of Pleasure was an English translation used by Shakespeare, not a work by Boccaccio used by Chaucer."}], "id": "q03"}, {"question": "Through which intermediate source did William Shakespeare likely encounter the tales of the Decameron?", "options": [{"text": "William Painter's 'Palace of Pleasure'", "isCorrect": true, "rationale": "The text states Shakespeare likely accessed Boccaccio's plots through Painter's English translation of Italian and French novelle."}, {"text": "Petrarch's Latin translations", "isCorrect": false, "rationale": "While Petrarch translated some of Boccaccio's work into Latin, the text links Shakespeare specifically to Painter's collection."}, {"text": "The original Italian manuscripts found in Florence", "isCorrect": false, "rationale": "The text notes that Shakespeare usually drew on these tales through 'intermediate sources' rather than the original Italian."}, {"text": "Marguerite de Navarre's 'Heptam'eron'", "isCorrect": false, "rationale": "The Heptam'eron was a French collection influenced by Boccaccio, but Painter's work was the primary English conduit for Shakespeare."}], "id": "q04"}, {"question": "What distinguishes Chaucer's 'Canterbury Tales' from Boccaccio's 'Decameron' in terms of social composition?", "options": [{"text": "Chaucer features a boisterous cross-section of society, whereas Boccaccio's narrators are elegant aristocrats.", "isCorrect": true, "rationale": "The text notes that Boccaccio's brigata consists of young aristocrats, while Chaucer includes diverse roles like the Miller, Prioress, and Wife of Bath."}, {"text": "Boccaccio includes the lower classes in the narrating group, while Chaucer focuses solely on the Knight.", "isCorrect": false, "rationale": "It is actually Chaucer who broadens the narrating group; Boccaccio's stories feature lower classes, but his narrators are refined."}, {"text": "Chaucer's narrators are all clergy members, whereas Boccaccio's are all merchants.", "isCorrect": false, "rationale": "Neither collection restricts narrators to a single profession; Chaucer's are diverse and Boccaccio's are aristocratic."}, {"text": "Boccaccio's narrators represent the city of Naples, while Chaucer's narrators are all from London.", "isCorrect": false, "rationale": "Boccaccio's frame is set in Florence, and Chaucer's characters are travelers from various parts of England."}], "id": "q05"}, {"question": "What was Boccaccio's primary target when depicting corrupt religious figures in the Decameron?", "options": [{"text": "The discrepancy between the Church's professed ideals and the actual practices of its representatives.", "isCorrect": true, "rationale": "The text explains that Boccaccio targeted hypocrisy — the universal human tendency to fail to practice what one professes — rather than faith itself."}, {"text": "The fundamental theological tenets of the Christian faith which he sought to dismantle.", "isCorrect": false, "rationale": "The source states Boccaccio was not hostile to God or the Church as such, but rather to the human failings within it."}, {"text": "The authority of the Pope to place individuals in Hell, a power he believed should be secularized.", "isCorrect": false, "rationale": "This aligns more with Dante's themes; Boccaccio's focus in the Decameron was on social hypocrisy and character."}, {"text": "The practice of daily prayer and Mass, which he viewed as an obstacle to civil storytelling.", "isCorrect": false, "rationale": "The text notes the brigata maintains a devout routine of Mass and prayer, viewing storytelling as consistent with faith."}], "id": "q06"}, {"question": "Why did Boccaccio consider destroying the Decameron later in his life?", "options": [{"text": "He experienced a religious crisis and worried about the moral implications of his masterpiece.", "isCorrect": true, "rationale": "The text mentions a later religious crisis where Boccaccio doubted the Decameron, though Petrarch eventually persuaded him to preserve it."}, {"text": "He believed the prose was inferior to his later scholarly lectures on Dante.", "isCorrect": false, "rationale": "While he did lecture on Dante, the motivation for wanting to destroy the Decameron was rooted in a religious crisis."}, {"text": "He was threatened with excommunication by the Church for his depictions of lustful nuns.", "isCorrect": false, "rationale": "The text mentions no such threat; the crisis was an internal scholarly and devotional struggle."}, {"text": "He felt that the 'democratization' of the subject matter had been a literary failure.", "isCorrect": false, "rationale": "Boccaccio's concern was moral and religious, not a rejection of his revolutionary literary techniques."}], "id": "q07"}, {"question": "How did Petrarch argue against Boccaccio's desire to destroy the Decameron?", "options": [{"text": "He claimed the work served a moral purpose by depicting human nature in all its imperfection.", "isCorrect": true, "rationale": "Petrarch's letter argued that showing human nature truthfully was a moral act, according to the source."}, {"text": "He argued that the work was necessary to fund their shared classical research.", "isCorrect": false, "rationale": "There is no mention of financial motives; the argument was based on the moral value of literature."}, {"text": "He suggested that the work was actually a secret allegory for the Divine Comedy.", "isCorrect": false, "rationale": "Petrarch's defense focused on the realism and the representation of human imperfection, not a hidden Dantean allegory."}, {"text": "He convinced Boccaccio that the work would eventually make him the 'father of the novel'.", "isCorrect": false, "rationale": "While Boccaccio is credited with laying foundations for the novel, Petrarch's specific argument was regarding its moral purpose."}], "id": "q08"}, {"question": "Which of the following writers is credited with extending Boccaccio's novella tradition into the realm of fairy tales and folk narrative?", "options": [{"text": "Giambattista Basile", "isCorrect": true, "rationale": "The text lists Straparola and Basile as the figures who extended the novella tradition into fairy tales and folk narrative."}, {"text": "Franco Sacchetti", "isCorrect": false, "rationale": "Sacchetti wrote the Trecentonovelle in 'conscious imitation' of Boccaccio's style, rather than moving into fairy tales."}, {"text": "Matteo Bandello", "isCorrect": false, "rationale": "Bandello produced a vast collection that influenced Elizabethan drama, but the text associates fairy tales with Basile."}, {"text": "Guy de Maupassant", "isCorrect": false, "rationale": "Maupassant is a nineteenth-century master of the short story, not an early modern fairy tale writer."}], "id": "q09"}, {"question": "In the context of the Decameron, what does the term 'ingegno' represent?", "options": [{"text": "Individual wit and cleverness used to navigate a changing social world.", "isCorrect": true, "rationale": "The text describes ingegno as the quality individuals relied upon instead of the fixed orders of feudal society."}, {"text": "A strict adherence to the hierarchies of the feudal system.", "isCorrect": false, "rationale": "Ingegno is contrasted with the fixed order of feudal society; it is what allows a servant to outwit a nobleman."}, {"text": "The divine inspiration required to write epic poetry.", "isCorrect": false, "rationale": "The source identifies ingegno with the practical cleverness of merchants, bankers, and individuals in the tales."}, {"text": "A legal term describing the hereditary rights of the Florentine council.", "isCorrect": false, "rationale": "It is a character trait (wit), not a legal or administrative term for the city council."}], "id": "q10"}, {"question": "What does the text mean by the 'democratization of the literary subject' in the Decameron?", "options": [{"text": "Boccaccio broadened serious literary attention to include merchants, artisans, innkeepers, and other ordinary people alongside kings and scholars.", "isCorrect": true, "rationale": "The text describes the Decameron's population of horse-dealers, dyers, nuns, and notaries as 'revolutionary' — figures invisible in earlier literature — alongside nobles and royalty."}, {"text": "Boccaccio gave his ten narrators equal speaking time regardless of their social rank.", "isCorrect": false, "rationale": "The brigata is specifically a refined aristocratic group; the democratization refers to the characters within the tales, not the narrators' speaking turns."}, {"text": "Boccaccio argued that literacy should be made available to all social classes in Florence.", "isCorrect": false, "rationale": "The text discusses the literary subject matter of the tales, not a political program for public education."}, {"text": "Boccaccio replaced noble protagonists with peasant heroes in every tale of the collection.", "isCorrect": false, "rationale": "Kings, scholars, and princesses appear throughout the Decameron; the innovation was inclusion of lower classes alongside nobles, not their replacement."}], "id": "q11"}, {"question": "Which nineteenth-century writers does the text identify as heirs to Boccaccio's insight that a short prose tale could be a vehicle for serious art?", "options": [{"text": "Guy de Maupassant and Anton Chekhov", "isCorrect": true, "rationale": "The text traces the line from Boccaccio through Marguerite de Navarre and Cervantes to these two nineteenth-century short story masters in France and Russia."}, {"text": "Gustave Flaubert and Leo Tolstoy", "isCorrect": false, "rationale": "Flaubert and Tolstoy are major novelists of the era but are not named in the text as the specific inheritors of Boccaccio's short-story tradition."}, {"text": "Edgar Allan Poe and Nathaniel Hawthorne", "isCorrect": false, "rationale": "These American writers are not mentioned in the text's account of the European short story lineage descending from Boccaccio."}, {"text": "Matteo Bandello and Franco Sacchetti", "isCorrect": false, "rationale": "Bandello and Sacchetti are earlier Italian writers in the novella tradition, not the nineteenth-century masters identified at the end of the lineage."}], "id": "q12"}, {"question": "The text notes that the Decameron influenced the Heptameron of Marguerite de Navarre. What does this transmission demonstrate?", "options": [{"text": "That Boccaccio's frame narrative and novella form became a pan-European literary model.", "isCorrect": true, "rationale": "The Heptameron adopts the frame structure of a group of storytellers, directly importing Boccaccio's formal innovation into French literature."}, {"text": "That Marguerite de Navarre corrected Boccaccio's moral failings for a pious French audience.", "isCorrect": false, "rationale": "While the Heptameron has a more explicitly moral tone, the text presents it as an extension of Boccaccio's tradition rather than a correction."}, {"text": "That the novella form was invented by French authors and later attributed to Boccaccio.", "isCorrect": false, "rationale": "The text is clear that Boccaccio is the foundational figure; French and other European writers followed his model."}, {"text": "That the Decameron was banned in France and could only circulate through indirect imitation.", "isCorrect": false, "rationale": "No such ban is mentioned; the transmission is presented as straightforward literary influence."}], "id": "q13"}, {"question": "Why does the text describe the Decameron as 'bridging' medieval and Renaissance sensibilities?", "options": [{"text": "Because it combines a medieval plague frame and pious routines with Renaissance emphasis on individual agency and secular wit.", "isCorrect": true, "rationale": "The brigata's religious observance and the plague setting are medieval; the ingegno-driven plots and realistic characterization anticipate Renaissance humanism."}, {"text": "Because it was written in a mixture of medieval Latin and Renaissance Italian.", "isCorrect": false, "rationale": "The Decameron is written entirely in Italian prose; Latin is not part of the text."}, {"text": "Because it was composed over a 50-year period spanning both eras.", "isCorrect": false, "rationale": "The Decameron was written over a few years (c. 1348–1353), not across fifty years."}, {"text": "Because Boccaccio revised it after becoming a humanist scholar in his later years.", "isCorrect": false, "rationale": "Boccaccio considered destroying it in his later humanist phase; the text does not claim he revised it into a Renaissance document."}], "id": "q14"}, {"question": "What does the concept of 'foundations of realism' mean in the context of Boccaccio's literary legacy?", "options": [{"text": "He grounded fiction in recognizable social types, specific places, and everyday human motivations.", "isCorrect": true, "rationale": "By populating his tales with merchants, friars, wives, and students set in identifiable Italian cities, Boccaccio established the realistic mode that later prose fiction would develop further."}, {"text": "He insisted that all fiction must be drawn from historical sources to be legitimate.", "isCorrect": false, "rationale": "Boccaccio freely invented plots; realism here refers to character and setting specificity, not historical documentation."}, {"text": "He rejected all supernatural elements, making the Decameron the first rationalist text.", "isCorrect": false, "rationale": "The text acknowledges that Boccaccio occasionally uses supernatural devices (e.g., in X.9), so the claim of total rejection of the supernatural is false."}, {"text": "He developed a philosophy of empiricism that directly influenced Galileo's scientific method.", "isCorrect": false, "rationale": "While Boccaccio's realism is part of the broader humanist tradition, the text does not draw a direct line to Galileo's scientific methods."}], "id": "q15"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
