<script>
var QUESTIONS = [{"question": "In Boccaccio's terminology, which concept refers specifically to an elaborate, sustained practical joke or deception used as a primary engine of comedy?", "options": [{"text": "Beffa", "isCorrect": true, "rationale": "The beffa is defined as a sustained trick or deception, which Boccaccio uses as a central mechanism for his more complex comic narratives."}, {"text": "Motto", "isCorrect": false, "rationale": "While this is an engine of comedy, it refers specifically to quick, pointed remarks rather than sustained deceptions."}, {"text": "Ingegno", "isCorrect": false, "rationale": "This term refers to the underlying quality of intelligence and resourcefulness required to execute tricks, but it is not the name of the trick itself."}, {"text": "Novella", "isCorrect": false, "rationale": "This is the general literary form of the short prose tale, not a specific mechanism of comedic action."}], "id": "q01"}, {"question": "What paradoxical reasoning leads Abraham the Jew to convert to Christianity in Novel I.2?", "options": [{"text": "He concludes that a religion surviving such central corruption must be divinely supported.", "isCorrect": true, "rationale": "The irony of the tale is that Rome's visible corruption serves as proof of divine providence because the faith flourishes despite its human leadership."}, {"text": "He is moved by the deep piety and asceticism he witnesses at the Papal court in Rome.", "isCorrect": false, "rationale": "Abraham actually finds the court deeply corrupt, which was his friend Jehannot's original fear."}, {"text": "He discovers hidden scriptures in Rome that prove the lineage of the Christian faith.", "isCorrect": false, "rationale": "Abraham's decision is based on his observations of human behavior and institutional survival, not new textual evidence."}, {"text": "He realizes that the Christian merchants in Paris are more honest than their Roman counterparts.", "isCorrect": false, "rationale": "The conversion is sparked specifically by the contrast between Roman corruption and the religion's continued growth."}], "id": "q02"}, {"question": "How does the 'Three Rings' parable in Novel I.3 characterize the relationship between the three major monotheistic faiths?", "options": [{"text": "It suggests the question of the 'true' faith is beyond human judgment and remains pendent.", "isCorrect": true, "rationale": "The parable concludes that because the 'rings' (religions) are indistinguishable to human eyes, the claim to the true inheritance is currently unsettled."}, {"text": "It asserts that all religions are equally false deceptions created by man.", "isCorrect": false, "rationale": "The text explicitly states the parable does not claim all religions are false, but rather emphasizes humility and the limits of human argument."}, {"text": "It argues that the oldest religion (Judaism) is the only 'authentic' original ring.", "isCorrect": false, "rationale": "The point of the story is that the two copies are so perfect that even the maker cannot distinguish the original from the duplicates."}, {"text": "It proves that Islam is the final, perfected version of the previous two faiths.", "isCorrect": false, "rationale": "Melchisedech uses the story specifically to avoid choosing one faith over the others to escape Saladin's trap."}], "id": "q03"}, {"question": "What is the primary target of Boccaccio's anticlerical satire in Day I?", "options": [{"text": "Human institutions and the hypocrisy of individuals representing the faith.", "isCorrect": true, "rationale": "The commentary notes that Boccaccio targets the failure of humans to live up to their vows rather than attacking the faith or God directly."}, {"text": "The fundamental theological doctrines of the Catholic Church.", "isCorrect": false, "rationale": "Boccaccio's later religious anxiety and friendship with Petrarch suggest he remained a believer despite his critiques of the clergy."}, {"text": "The existence of a divine creator and the concept of the afterlife.", "isCorrect": false, "rationale": "The framing of the stories often invokes God's name, suggesting the satire is social and institutional rather than metaphysical."}, {"text": "The practice of confession and the validity of the sacraments themselves.", "isCorrect": false, "rationale": "While he shows how these can be mocked (as by Ciappelletto), the critique is directed at human credulity and deception within those practices."}], "id": "q04"}, {"question": "In Novel I.1, why does Musciatto Franzesi choose Ser Ciappelletto to handle his affairs in Burgundy?", "options": [{"text": "Ciappelletto's own wickedness makes him the only match for the wily Burgundians.", "isCorrect": true, "rationale": "Musciatto believes he needs a man so bad that he can confidently oppose his guile to the faithless and violent nature of the Burgundian debtors."}, {"text": "Ciappelletto is a highly respected notary with a reputation for absolute integrity.", "isCorrect": false, "rationale": "The text reveals that Ciappelletto's 'pride' was actually in making false documents and bearing false witness."}, {"text": "Ciappelletto is a close kinsman of the King of France and has diplomatic immunity.", "isCorrect": false, "rationale": "Ciappelletto is of low professional standing (a notary) and relies on Musciatto's power as his 'mainstay' rather than his own rank."}, {"text": "Ciappelletto has spent years living in Burgundy and speaks the local vernacular perfectly.", "isCorrect": false, "rationale": "The text states he was 'hardly known to a soul' in Burgundy when he arrived to settle the accounts."}], "id": "q05"}, {"question": "What specific 'sin' does Ciappelletto confess with the most performative grief to the holy friar?", "options": [{"text": "Cursing his mother when he was a small child.", "isCorrect": true, "rationale": "This is the final, most 'heinous' sin he confesses, using it to demonstrate a level of contrition that completely deceives the friar into believing he is a saint."}, {"text": "Stealing four farthings from a customer and giving them to alms.", "isCorrect": false, "rationale": "While he mentions the farthings, he presents it as a minor point of honesty, not as a source of devastating grief."}, {"text": "Spatting in a church by inadvertence.", "isCorrect": false, "rationale": "The friar dismisses this as a non-issue, which Ciappelletto uses to feign a more rigorous piety than the clergy."}, {"text": "Having his servant sweep the house on a Saturday after none.", "isCorrect": false, "rationale": "This is presented as a minor infraction regarding the observance of the Sabbath, part of his buildup to the 'greater' sin."}], "id": "q06"}, {"question": "Which member of the brigata is the first to be elected as queen and sets the initial lack of a theme for Day I?", "options": [{"text": "Pampinea", "isCorrect": true, "rationale": "Pampinea is the eldest woman who proposed the retreat and is elected as the first queen of the company."}, {"text": "Filomena", "isCorrect": false, "rationale": "Filomena tells the 'Three Rings' story but is not the first queen; she follows the orders of the reigning queen."}, {"text": "Elissa", "isCorrect": false, "rationale": "Elissa tells the story of the lady of Gascony (I.9) but does not preside over the first day."}, {"text": "Panfilo", "isCorrect": false, "rationale": "Panfilo is the first narrator to speak, but he does so at the command of the queen, Pampinea."}], "id": "q07"}, {"question": "The story of the Marchioness of Monferrato (I.5) is cited as a 'perfect motto.' What is the strategic function of her remark to the King of France?", "options": [{"text": "To defend her virtue by subtly pointing out the interchangeability of women's bodies.", "isCorrect": true, "rationale": "By serving only chicken and stating that 'the hens... are much like the women,' she shames the king's pursuit by making it seem redundant and uninspired."}, {"text": "To mock the king's poverty by serving only common poultry at a royal feast.", "isCorrect": false, "rationale": "The banquet is described as magnificent; the choice of chicken is a thematic choice for the motto, not a sign of lack."}, {"text": "To complain about the absence of her husband during the Crusades.", "isCorrect": false, "rationale": "While her husband is away, her speech is focused on checking the king's inappropriate advances."}, {"text": "To provide a riddle that the king must solve to win her hand.", "isCorrect": false, "rationale": "The motto is a rebuke designed to end the pursuit immediately, not a game to encourage further interaction."}], "id": "q08"}, {"question": "According to the commentary, what prompted Boccaccio to reportedly consider destroying the Decameron in 1362?", "options": [{"text": "A visit from a Carthusian monk that sparked deep religious anxiety.", "isCorrect": true, "rationale": "Boccaccio's later years were marked by religious crisis, and a monk's visit led him to question his work until Petrarch intervened."}, {"text": "The failure of the work to gain popularity in the Florentine commune.", "isCorrect": false, "rationale": "The Decameron was highly influential and popular; his concerns were moral and spiritual, not based on critical reception."}, {"text": "Legal threats from the Inquisition regarding his satirical treatment of the clergy.", "isCorrect": false, "rationale": "There is no evidence in the text of legal action; his distress was internal and religious in nature."}, {"text": "A falling out with his friend Petrarch over the use of the Tuscan vernacular.", "isCorrect": false, "rationale": "Petrarch was actually the one who talked him out of destroying the work, showing their supportive relationship."}], "id": "q09"}, {"question": "What literary parallel is drawn between Boccaccio's Ciappelletto and Geoffrey Chaucer's work?", "options": [{"text": "The Pardoner's ability to speak moral truths despite being a corrupt liar.", "isCorrect": true, "rationale": "Both authors explore the unsettling gap between the character of the speaker and the spiritual power of their words."}, {"text": "The use of the Black Death as a frame for a pilgrimage to Canterbury.", "isCorrect": false, "rationale": "The commentary notes that the plague frames the Decameron, but it does not claim Chaucer used the same framing device."}, {"text": "The shared use of the 'Three Rings' parable to promote religious tolerance.", "isCorrect": false, "rationale": "While the commentary discusses the 'Three Rings,' it links it to Boccaccio and later to Lessing, not Chaucer."}, {"text": "The invention of the 'beffa' as a way to mock the rising merchant class.", "isCorrect": false, "rationale": "The comparison with Chaucer specifically focuses on the treatment of corrupt clerics and the gap between profession and practice."}], "id": "q10"}, {"question": "What is the distinction between a 'motto' and a 'beffa' as engines of Boccaccio's comedy, according to the commentary?", "options": [{"text": "The motto is a quick, pointed verbal remark; the beffa is a sustained, elaborately planned practical joke.", "isCorrect": true, "rationale": "The text defines: 'The motto is the quick, pointed remark — verbal cleverness deployed in a single stroke. The beffa is the sustained practical joke or deception, often elaborately planned and executed.'"}, {"text": "The motto is a written satirical piece; the beffa is an oral tale told spontaneously.", "isCorrect": false, "rationale": "Both are narrative devices in Boccaccio's tales, not distinctions between written and oral forms."}, {"text": "The motto targets the clergy; the beffa targets merchants and tradespeople.", "isCorrect": false, "rationale": "Both devices appear in tales directed at all social groups; the distinction is about form and duration, not target."}, {"text": "The motto requires multiple participants; the beffa is executed by a single clever individual.", "isCorrect": false, "rationale": "The distinction the text makes is one of scope and duration (single stroke vs. sustained), not the number of participants involved."}], "id": "q11"}, {"question": "In Novel I.6, how does the 'good man' use a pointed remark to defeat the charges of the Inquisition?", "options": [{"text": "He claims that the wine he praised was so good that even Christ would drink it, and the wine-loving inquisitor cannot refute the logic.", "isCorrect": true, "rationale": "The text summarizes: 'A worthy man is brought before an inquisitor who accuses him of heretical speech: the man reportedly claimed he had found a wine so good that Christ himself would drink it. The man replies that he has heard Christ suffered for humanity's sins and therefore surely loves what people love. The inquisitor, who himself is a great lover of wine, is forced to drop the charge.'"}, {"text": "He presents a papal document proving that his speech was delivered in jest during a feast.", "isCorrect": false, "rationale": "The man's defense is a verbal wit, not a documentary one; he uses a single clever remark to expose the inquisitor's hypocrisy."}, {"text": "He bribes the inquisitor with a cask of fine wine to drop the charges quietly.", "isCorrect": false, "rationale": "The tale is about the power of a 'motto' — a verbal stroke — not a financial bribe."}, {"text": "He convinces multiple witnesses to testify that the original statement was misheard.", "isCorrect": false, "rationale": "The resolution is through a single, devastating remark that exploits the inquisitor's own love of wine, not through witness testimony."}], "id": "q12"}, {"question": "The tale of Bergamino and the miser lord (I.7) is described as 'a tale about the power of storytelling itself.' What method does Bergamino use to obtain hospitality from the stingy lord?", "options": [{"text": "He threatens the lord with a public performance that will shame him before the court.", "isCorrect": false, "rationale": "Bergamino does not use threats; he uses an indirect allegorical tale to make the lord understand his own failing."}, {"text": "He tells an allegorical tale about a poet left hungry by a patron, which the lord recognizes as a mirror of his own behavior.", "isCorrect": true, "rationale": "The summary states: 'Rather than beg directly, Bergamino tells an allegorical tale about a poet left hungry by a patron. The lord, understanding the lesson embedded in the story, immediately provides for Bergamino.'"}, {"text": "He composes a flattering poem that so pleases the lord that he is invited to stay indefinitely.", "isCorrect": false, "rationale": "The approach is indirect and critical (a tale about a stingy patron), not flattering praise of the lord."}, {"text": "He challenges the lord to a storytelling contest, winning the prize of room and board.", "isCorrect": false, "rationale": "There is no contest described; Bergamino uses embedded narrative to change the lord's behavior."}], "id": "q13"}, {"question": "How does Boccaccio's treatment of religion in Day I differ from outright hostility to the Church, according to the commentary?", "options": [{"text": "Boccaccio targets hypocrisy — the gap between what clergy profess and how they live — rather than attacking faith or God directly.", "isCorrect": true, "rationale": "The commentary states: 'His target is not God but the human institutions that claim to represent God. The clergy in these tales are not wicked because they are clergy — they are wicked because they are human beings who have failed to live up to their vows. Boccaccio's satire is directed at hypocrisy, not at faith itself.'"}, {"text": "He avoids depicting clergy entirely, keeping his anticlerical critique purely implicit through secular characters.", "isCorrect": false, "rationale": "Day I directly features corrupt friars, hypocritical monks, and an inquisitor, making the clergy very much present in the tales."}, {"text": "He balances each corrupt cleric story with a corresponding tale of saintly virtue to maintain religious neutrality.", "isCorrect": false, "rationale": "Day I does not follow a rigid formula of balancing corrupt with virtuous clerics; the commentary's point is that the satire's target is narrowed to human hypocrisy."}, {"text": "He limits his satire to monks and friars, deliberately exempting bishops and the papacy from criticism.", "isCorrect": false, "rationale": "Novel I.2 (Abraham and the Roman court) directly implicates the papacy in corruption, so the satire is not limited to lower clergy."}], "id": "q14"}, {"question": "How does Day I function as an 'overture' to the entire Decameron, according to the commentary?", "options": [{"text": "It introduces nearly every major theme of the Decameron — religious fraud, interfaith wisdom, royal justice, sharp-tongued women, foolish monks, and quick-witted courtiers.", "isCorrect": true, "rationale": "The commentary states: 'In these ten tales we encounter religious fraud, interfaith wisdom, royal justice, sharp-tongued women, foolish monks, and quick-witted courtiers. Nearly every major theme of the Decameron makes its first appearance here.'"}, {"text": "It provides a strict moral framework that all subsequent tales must follow, establishing rules for the storytelling competition.", "isCorrect": false, "rationale": "Day I is notable for having *no* prescribed theme, giving it the widest possible range — it functions as an introduction, not a rulebook."}, {"text": "It tells the same story ten times from different perspectives to show the full range of human responses to the plague.", "isCorrect": false, "rationale": "Day I consists of ten different tales on varied subjects, not ten versions of the same story."}, {"text": "It focuses exclusively on the misfortunes of religious figures to establish Boccaccio's anticlerical stance before moving on to secular themes.", "isCorrect": false, "rationale": "While religion features prominently, the tales of Day I also include royal justice (I.5, I.9), interfaith philosophy (I.3), and worldly wit, showing a broader range than only anticlerical satire."}], "id": "q15"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
