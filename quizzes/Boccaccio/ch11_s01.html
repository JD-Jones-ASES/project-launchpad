<div class="quiz-container">

        <a href="../../courses/Boccaccio.html">&larr; Back to Tales of the Decameron (Boccaccio)</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 11, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "In the context of the Decameron's Day X, how does Boccaccio's concept of $magnificenza$ differ from the resolution of Dante's Divine Comedy?", "options": [{"text": "It is a secular, human-centered virtue grounded in classical ethics rather than divine grace.", "isCorrect": true, "rationale": "While the structure mimics Dante's ascent, Boccaccio's 'paradise' is achieved through Aristotelian greatness of soul rather than theological salvation."}, {"text": "It rejects the classical Aristotelian tradition in favor of a strictly Christian asceticism.", "isCorrect": false, "rationale": "The text explicitly states that Boccaccio inherits the Aristotelian tradition of $megalopsychia$ to define Day X."}, {"text": "It suggests that magnanimity is only possible through the intervention of the Church.", "isCorrect": false, "rationale": "Boccaccio's vision is described as a human one, independent of the theological framework of divine grace used by Dante."}, {"text": "It focuses on the afterlife and the soul's eventual union with God.", "isCorrect": false, "rationale": "Unlike Dante's spiritual vision, Boccaccio's focus remains on human behavior and social conduct within the world."}]}, {"question": "Which specific narrative device does Chaucer use in the 'Clerk's Tale' to deviate from the moral tone established by Petrarch's version of the Griselda story?", "options": [{"text": "An ironic envoy that advises wives to dominate their husbands instead of imitating Griselda.", "isCorrect": true, "rationale": "Chaucer adds a postscript that mocks the idea of perfect obedience, suggesting it is unrealistic and warning about the legendary cow 'Chichevache'."}, {"text": "A prologue that explicitly condemns Gualtieri as a figure of demonic temptation.", "isCorrect": false, "rationale": "While modern readers see Gualtieri as an abuser, Chaucer's specific deviation was the addition of the ironic envoy at the end."}, {"text": "The removal of the children's 'murder' plot to make the husband more sympathetic.", "isCorrect": false, "rationale": "Chaucer followed Petrarch's version closely; the core plot of the tests remained intact."}, {"text": "A theological defense of Griselda as a direct parallel to the Virgin Mary.", "isCorrect": false, "rationale": "Petrarch provided the allegorical reading of the soul, while Chaucer's unique contribution was the ironic subversion of that seriousness."}]}, {"question": "The structural movement from Novel I.1 to Novel X.10 is described as an arc between which two extremes of human character?", "options": [{"text": "A deceitful, blasphemous man and a patient, enduring woman.", "isCorrect": true, "rationale": "The work begins with the 'worst of men' (Ser Ciappelletto) and ends with the 'most patient of women' (Griselda)."}, {"text": "A wealthy merchant's greed and a noble king's poverty.", "isCorrect": false, "rationale": "The comparison focuses on moral character (deception vs. virtue) rather than economic status."}, {"text": "A tragic lover's death and a comic trickster's triumph.", "isCorrect": false, "rationale": "While love and trickery are themes, the overarching arc specifically moves from moral degradation to superhuman endurance."}, {"text": "A religious hypocrite and a secular scholar.", "isCorrect": false, "rationale": "While Ciappelletto is a deceiver, Griselda's role is defined by her role as a wife and her patient endurance, not her scholarship."}]}, {"question": "How does Boccaccio’s portrayal of Saladin in Day X challenge typical 14th-century Christian perspectives?", "options": [{"text": "He presents a Muslim ruler as the supreme exemplar of the Christian virtue of magnanimity.", "isCorrect": true, "rationale": "Despite the recent history of the Crusades, Boccaccio portrays Saladin as a moral superior to his Christian counterparts in X.9."}, {"text": "He portrays Saladin's eventual conversion to Christianity as his highest act of virtue.", "isCorrect": false, "rationale": "The text emphasizes that virtue transcends religious boundaries, rather than requiring conversion."}, {"text": "He depicts Saladin as a villainous 'infidel' who is eventually defeated by Christian chivalry.", "isCorrect": false, "rationale": "Boccaccio explicitly rejects the 'enemy' trope, presenting Saladin as wise, generous, and honorable."}, {"text": "He limits Saladin's virtue to intellectual wisdom, denying him the capacity for true generosity.", "isCorrect": false, "rationale": "In X.9, Saladin is specifically praised for his royal magnificence and hospitality, which are acts of generosity."}]}, {"question": "What is the primary function of the 'chain of generosity' structure found in Novel X.5 (Madonna Dianora and the Magic Garden)?", "options": [{"text": "To demonstrate that virtue is infectious and multiplies through mutual respect.", "isCorrect": true, "rationale": "The tale shows how one character's magnanimity inspires the next, suggesting that generosity is not a competition but a contagion."}, {"text": "To establish a hierarchy of who is the most virtuous member of society.", "isCorrect": false, "rationale": "The commentary notes that the question of 'who is most generous' has no right answer, as the point is the collective escalation of virtue."}, {"text": "To warn against the dangers of making rash promises in romantic relationships.", "isCorrect": false, "rationale": "While a rash promise starts the plot, the 'chain' focus is on the resolution through sacrificial acts of honor."}, {"text": "To show that magic is necessary to resolve the complex moral dilemmas of the nobility.", "isCorrect": false, "rationale": "The magician's role is part of the chain, but his renunciation of the fee is what makes him magnanimous, not his magic."}]}, {"question": "According to Petrarch's allegorical reading, what does the character of Gualtieri represent in the story of Griselda?", "options": [{"text": "God testing the faithfulness of the human soul.", "isCorrect": true, "rationale": "Petrarch stripped away Boccaccio's irony to present the tale as an exemplum of the soul's relationship with the divine."}, {"text": "The irrationality of the secular ruling class.", "isCorrect": false, "rationale": "This aligns more with a modern or socio-political reading rather than Petrarch's specifically religious allegory."}, {"text": "A cautionary figure representing the 'mischievous folly' of men.", "isCorrect": false, "rationale": "This is Dioneo's framing in Boccaccio's version, which Petrarch explicitly ignored for his Latin translation."}, {"text": "The personification of the Plague that ravages the social order.", "isCorrect": false, "rationale": "While the Plague is the background of the Decameron, it is not the focus of Petrarch's allegory regarding Griselda."}]}, {"question": "Why is it significant that Dioneo narrates the story of Patient Griselda (X.10)?", "options": [{"text": "His typical role as an irreverent jokester creates an ironic frame that complicates the moral of the tale.", "isCorrect": true, "rationale": "By giving the most 'saintly' tale to the most bawdy narrator, Boccaccio introduces ambiguity and distances himself from a simple endorsement of the husband's cruelty."}, {"text": "He is the only narrator qualified to explain the theological nuances of wifely obedience.", "isCorrect": false, "rationale": "Dioneo is described as the least reverent narrator, making him an unlikely source for straightforward theological instruction."}, {"text": "He uses the tale to prove that women are inherently superior to men in all moral matters.", "isCorrect": false, "rationale": "Dioneo's comment suggests the husband was a 'fool,' but his narrative focuses on the extreme and troubling nature of the test itself."}, {"text": "He narrates it to provide a comedic relief after the heavy themes of Day X.", "isCorrect": false, "rationale": "The text notes that Day X changes the tune from laughter to 'quiet wonder' and 'moral provocation,' rather than simple comedy."}]}, {"question": "In Novel X.3, how does Nathan demonstrate the absolute limit of $magnificenza$?", "options": [{"text": "He offers his own life to the man who intends to murder him.", "isCorrect": true, "rationale": "Nathan’s willingness to die rather than withhold generosity is presented as the ultimate extreme of the virtue."}, {"text": "He provides a dowry for his enemy's daughters out of secret charity.", "isCorrect": false, "rationale": "This theme appears in other tales (like X.6), but Nathan's specific act involves his survival and the offer of his life."}, {"text": "He builds a palace for strangers without ever revealing his true identity.", "isCorrect": false, "rationale": "While Nathan is legendary for generosity, the 'limit' of his virtue is tested by Mithridanes' plot against his life."}, {"text": "He forgives a thief who has stolen his entire ancestral fortune.", "isCorrect": false, "rationale": "This might be generous, but Novel X.3 specifically deals with a plot of murder motivated by jealousy of Nathan's reputation."}]}, {"question": "Novel X.1 uses the metaphor of two coffers to explore which of the following themes?", "options": [{"text": "The obligation of rulers to recognize and reward merit vs. the randomness of fortune.", "isCorrect": true, "rationale": "The King of Spain uses the coffers to test why Ruggieri has not been rewarded, highlighting the tension between service and recognition."}, {"text": "The deceptive nature of physical beauty in choosing a spouse.", "isCorrect": false, "rationale": "The coffers contain earth and gold, but the context is a knight's service to a king, not a romantic pursuit."}, {"text": "The spiritual superiority of poverty over material wealth.", "isCorrect": false, "rationale": "The tale concludes with the king rewarding the knight magnificently, emphasizing proper recognition rather than the virtue of poverty itself."}, {"text": "The necessity of alchemical knowledge for 14th-century nobility.", "isCorrect": false, "rationale": "There is no alchemy involved; the coffers are a simple test of choice and desert."}]}, {"question": "Which classical text serves as the primary thematic foundation for Novel X.8, the story of Titus and Gisippus?", "options": [{"text": "Cicero's De amicitia.", "isCorrect": true, "rationale": "Boccaccio uses this tale to explore friendship as the highest form of human love, drawing directly from Cicero's widely read treatise."}, {"text": "Aristotle's Poetics.", "isCorrect": false, "rationale": "While Aristotle influenced the concept of magnanimity, Cicero is the specific source for the friendship theme in X.8."}, {"text": "Virgil's Aeneid.", "isCorrect": false, "rationale": "The Aeneid is an epic of empire and fate, whereas X.8 is a domestic and philosophical exploration of peer-to-peer friendship."}, {"text": "Ovid's Metamorphoses.", "isCorrect": false, "rationale": "Ovid focuses on transformation and desire, while Titus and Gisippus focus on the constancy and renunciation of virtue in friendship."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
