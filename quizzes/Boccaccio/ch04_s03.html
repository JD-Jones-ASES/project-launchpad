        <div class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 4, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the introductory notes, what does the term 'ingegno' specifically represent in the context of Masetto's actions?", "options": [{"text": "The ability to perform complex physical labor without fatigue.", "isCorrect": false, "rationale": "While Masetto is strong, 'ingegno' refers to a mental quality rather than physical stamina."}, {"text": "The capacity to see and act on an opportunity others would miss.", "isCorrect": true, "rationale": "The text defines 'ingegno' in its purest form as the decisive ability to recognize and seize a unique opportunity."}, {"text": "The spiritual wisdom gained through a life of silent contemplation.", "isCorrect": false, "rationale": "Masetto's silence is a calculated deception for personal gain, not a pursuit of spiritual enlightenment."}, {"text": "The skill of gardening used to manipulate the steward.", "isCorrect": false, "rationale": "Gardening is the means of employment, but the 'ingegno' lies in the strategic choice of silence as a tool."}]}, {"question": "Why did Nuto, the previous gardener, decide to quit his job at the convent?", "options": [{"text": "He was caught violating his religious duties.", "isCorrect": false, "rationale": "Nuto's reasons for leaving were practical and interpersonal, not related to religious infractions."}, {"text": "The pay was too low and the nuns were constantly micromanaging him.", "isCorrect": true, "rationale": "Nuto complained that the wages barely paid for shoes and the nuns constantly interfered with his gardening work."}, {"text": "He had a disagreement with the steward over the garden's layout.", "isCorrect": false, "rationale": "The steward actually asked him to find a replacement, suggesting their relationship was professional."}, {"text": "He felt the convent was too isolated and lonely.", "isCorrect": false, "rationale": "Nuto's primary frustration was the excessive and contradictory attention he received from the nuns."}]}, {"question": "What reason did the steward give the Abbess for why Masetto would be a safe choice to work around the young nuns?", "options": [{"text": "Masetto was much older than he appeared.", "isCorrect": false, "rationale": "The text notes that Masetto was actually quite young and handsome."}, {"text": "Masetto's disability meant he could not engage in gossip or flirtatious talk.", "isCorrect": true, "rationale": "The steward argued that since Masetto was supposedly a 'dumb' mute, he wouldn't be 'cracking jokes' with the women."}, {"text": "Masetto had previously taken a vow of chastity.", "isCorrect": false, "rationale": "Masetto's primary ruse was his inability to speak, not a formal religious commitment."}, {"text": "The steward planned to supervise Masetto at all times.", "isCorrect": false, "rationale": "The steward felt comfortable leaving Masetto alone because he believed the man was mentally and verbally incapable of trouble."}]}, {"question": "How did the first nun justify the decision to ignore her vow of virginity with Masetto?", "options": [{"text": "She claimed that God would not notice because they were in a remote hut.", "isCorrect": false, "rationale": "Her justification was based on the prevalence of unperformed vows rather than concealment from God's sight."}, {"text": "She argued that many vows are made to God but few are actually performed.", "isCorrect": true, "rationale": "She dismissed the weight of the vow by suggesting that many people fail to keep their promises to the divine."}, {"text": "She believed Masetto was sent by their patron saint as a reward.", "isCorrect": false, "rationale": "The 'miracle' of the patron saint was a lie invented later to cover their tracks, not their initial motivation."}, {"text": "She stated that her vow only applied to men who could speak.", "isCorrect": false, "rationale": "While his silence made the act safer, her primary justification was the general lack of adherence to religious vows."}]}, {"question": "In Boccaccio's satire, what is the primary target of his criticism?", "options": [{"text": "The validity of religious faith and spiritual beliefs.", "isCorrect": false, "rationale": "The notes specify that Boccaccio targets institutional behavior rather than faith itself."}, {"text": "The physical labor required of the lower classes in Italy.", "isCorrect": false, "rationale": "The story mocks the idea that labor removes natural desires, but the labor itself is not the target of the satire."}, {"text": "The gap between professed virtue and actual behavior in religious institutions.", "isCorrect": true, "rationale": "The satire highlights the irony of those who profess piety while acting on very worldly desires."}, {"text": "The lack of security measures in medieval convents.", "isCorrect": false, "rationale": "The failure of the convent is portrayed as a human and moral failing rather than a logistical one."}]}, {"question": "What event led to the Abbess herself becoming involved with Masetto?", "options": [{"text": "She overheard the other nuns boasting about their partnership.", "isCorrect": false, "rationale": "The Abbess was the last to find out and initially knew nothing of the nuns' activities."}, {"text": "The steward confessed the truth to her on his deathbed.", "isCorrect": false, "rationale": "The steward died without revealing any scandal; the Abbess discovered Masetto on her own."}, {"text": "She discovered him sleeping in the shade with his clothes disarranged.", "isCorrect": true, "rationale": "The Abbess found Masetto asleep under an almond tree on a hot day and was overcome by her own curiosity and appetite."}, {"text": "Masetto approached her directly to ask for more food.", "isCorrect": false, "rationale": "Masetto maintained his silence until the demands of the Abbess and the nuns became physically overwhelming."}]}, {"question": "What metaphor does Masetto use when he finally breaks his silence to the Abbess?", "options": [{"text": "A gardener who has too many rows of vegetables to tend.", "isCorrect": false, "rationale": "While he was a gardener, his metaphor focused on his physical exhaustion regarding the women."}, {"text": "A single cock serving ten hens.", "isCorrect": true, "rationale": "Masetto uses this agricultural analogy to explain that he cannot physically satisfy all nine women in the convent."}, {"text": "A donkey burdened with more wood than it can carry.", "isCorrect": false, "rationale": "Masetto did carry wood earlier in the story, but his final complaint uses a different animal comparison."}, {"text": "A single candle trying to light ten rooms at once.", "isCorrect": false, "rationale": "This metaphor is not used in the text to describe Masetto's predicament."}]}, {"question": "How did the nuns explain Masetto’s sudden ability to speak to the local community?", "options": [{"text": "They claimed he had been faking the disability to test their charity.", "isCorrect": false, "rationale": "This would have been too risky for the convent's reputation and their own secrets."}, {"text": "They said he was cured through the prayers and merits of their patron saint.", "isCorrect": true, "rationale": "The Abbess and nuns agreed on this 'miraculous' explanation to preserve the convent's repute."}, {"text": "They told the neighbors that a local doctor had performed a surgery.", "isCorrect": false, "rationale": "The nuns opted for a religious explanation to align with their status as a holy institution."}, {"text": "They claimed his silence was a temporary vow of penance.", "isCorrect": false, "rationale": "While plausible in a religious context, the text specifically mentions the attribution to their patron saint."}]}, {"question": "What was Masetto's status when he finally left the convent to return to Lamporecchio?", "options": [{"text": "He left in disgrace after the truth was revealed to the public.", "isCorrect": false, "rationale": "The text states that no breath of scandal ever stirred during his time there."}, {"text": "He returned home as a wealthy man and a father.", "isCorrect": true, "rationale": "Masetto waited until his old age to return home, having gained wealth and sired children without the usual expense of rearing them."}, {"text": "He remained at the convent until his death as a respected monk.", "isCorrect": false, "rationale": "He eventually expressed a desire to return home and was allowed to leave with his riches."}, {"text": "He was forced to flee when the new Abbess discovered the past errors.", "isCorrect": false, "rationale": "Masetto left voluntarily after the original Abbess died and he had reached an advanced age."}]}, {"question": "According to the narrator Filostrato, what error do people make regarding women who have taken the veil?", "options": [{"text": "They believe that nuns are more intelligent than common laywomen.", "isCorrect": false, "rationale": "The focus of the narrator is on physical nature rather than intellectual capacity."}, {"text": "They assume that putting on a nun's habit changes a woman's natural human desires.", "isCorrect": true, "rationale": "The narrator argues that many foolishly believe a nun ceases to be a woman subject to 'cravings proper to her sex'."}, {"text": "They think nuns are immune to the effects of idleness and solitude.", "isCorrect": false, "rationale": "Filostrato actually points out that idleness and solitude are forces that people fail to account for."}, {"text": "They believe that all nuns are forced into the convent against their will.", "isCorrect": false, "rationale": "The narrator's concern is with the false assumption of a change in human nature, not the circumstances of their entry."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
