        <div class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 3, Section 4</div>

<script>
var QUESTIONS = [{"question": "In the prologue to the seventh tale of Day II, Panfilo argues that human desires for beauty and wealth often lead to ruin. What specific 'poisoned' object does he use as a metaphor for the perils of regal estate?", "options": [{"text": "A chalice of gold", "isCorrect": true, "rationale": "Panfilo notes that experience proves a chalice may be poisoned even if it is made of gold and set on a king's table, representing the hidden cares of high status."}, {"text": "A crown of thorns", "isCorrect": false, "rationale": "While a common metaphor for the burdens of leadership, this specific biblical imagery is not used by Panfilo in this context."}, {"text": "A silken shroud", "isCorrect": false, "rationale": "This suggests death in luxury, but Panfilo specifically references the vessel from which a king drinks."}, {"text": "A jeweled dagger", "isCorrect": false, "rationale": "A dagger represents violence, but the text focuses on the hidden danger within the physical symbols of prosperity and consumption."}], "id": "q01"}, {"question": "What is the primary geographical irony regarding the location of 'Babylon' in Boccaccio's 14th-century Mediterranean setting?", "options": [{"text": "It refers to Cairo or Egypt rather than Mesopotamia.", "isCorrect": true, "rationale": "Medieval usage often identified 'Babylon' with the seat of the Sultan of Egypt, reflecting the expansive and sometimes imprecise geography of the era."}, {"text": "It refers to the ancient ruins of the Tower of Babel.", "isCorrect": false, "rationale": "The text explicitly defines the Sultan of Babylon as the Sultan of Egypt, not the ruler of ancient Mesopotamian ruins."}, {"text": "It is a fictional kingdom located in modern-day Portugal.", "isCorrect": false, "rationale": "The King of Algarve was in Portugal; the Sultan of Babylon was his ally in the eastern Mediterranean."}, {"text": "It designates a specific district within the city of Alexandria.", "isCorrect": false, "rationale": "While the ship departs from Alexandria, 'Babylon' represents the broader sultanate of Egypt in this narrative context."}], "id": "q02"}, {"question": "Following the shipwreck off Majorca, why do the male mariners perish while Alatiel and her women survive?", "options": [{"text": "The men overcrowded a small boat that capsized, while the ship remained embedded in sand.", "isCorrect": true, "rationale": "The men abandoned the leaky ship for a boat that went under, whereas the ship itself was hurled onto the shore and remained stable enough for the women."}, {"text": "The women were sheltered in the prow, which was the only part of the ship that did not break apart.", "isCorrect": false, "rationale": "Though they sheltered in the prow, their survival was primarily due to the men's fatal decision to abandon the vessel for an unmanageable boat."}, {"text": "The men were killed by the locals on the shore of Majorca.", "isCorrect": false, "rationale": "The men never reached the shore; they drowned at sea before Pericone da Visalgo arrived."}, {"text": "The women were able to swim to shore using pieces of the ship's timber.", "isCorrect": false, "rationale": "The women remained on the ship until the storm abated and were later rescued by Pericone's servants."}], "id": "q03"}, {"question": "Pericone da Visalgo successfully seduces Alatiel by exploiting her unfamiliarity with which specific 'incentive to hilarity'?", "options": [{"text": "Blended wines", "isCorrect": true, "rationale": "Alatiel, debarred by her law from using wine, found it palatable and drank freely, which lowered her inhibitions and 'overpowered the cold counsels of modesty'."}, {"text": "Majorcan dance steps", "isCorrect": false, "rationale": "The dancing was a symptom of her intoxication and 'frolicsome' mood, not the primary cause of her seduction."}, {"text": "Christian religious ceremonies", "isCorrect": false, "rationale": "While she noted the customs of the Christians, it was the consumption of alcohol that specifically facilitated Pericone's success."}, {"text": "Promises of marriage", "isCorrect": false, "rationale": "Pericone was prepared to take her as a mistress if he could not have her as a wife; he relied on 'Bacchus' rather than verbal promises."}], "id": "q04"}, {"question": "Which character is responsible for the murder of Pericone da Visalgo?", "options": [{"text": "Marato", "isCorrect": true, "rationale": "Marato, Pericone's brother, was enamored with Alatiel and orchestrated a ruthless plan to kill his brother and abduct her via a Genoese ship."}, {"text": "The Duke of Athens", "isCorrect": false, "rationale": "The Duke of Athens murdered the Prince of Morea, not Pericone da Visalgo."}, {"text": "The two Genoese ship captains", "isCorrect": false, "rationale": "The captains later murdered Marato, but it was Marato himself who killed Pericone."}, {"text": "Ciuriaci", "isCorrect": false, "rationale": "Ciuriaci was a chamberlain who was strangled by the Duke of Athens and his accomplice."}], "id": "q05"}, {"question": "How does the Duke of Athens dispose of the Prince of Morea to claim Alatiel for himself?", "options": [{"text": "He stabs him and throws him out of a window into the sea.", "isCorrect": true, "rationale": "The Duke ran the Prince through with a sword while he was standing at an open window and threw the body into the ruins below."}, {"text": "He poisons his chalice during a lordly breakfast.", "isCorrect": false, "rationale": "While the text mentions 'poisoned chalices' metaphorically, the Duke uses a more direct and violent method involving a blade and a window."}, {"text": "He strangles him with a halter with the help of a chamberlain.", "isCorrect": false, "rationale": "The halter was used to kill the chamberlain Ciuriaci, not the Prince."}, {"text": "He abandons him on a desert island during a voyage to Athens.", "isCorrect": false, "rationale": "The murder takes place in the Prince's own palace at Klarenza before the Duke flees to Athens."}], "id": "q06"}, {"question": "What reason does Constantine give to his sister, the Duchess of Athens, for removing Alatiel from the villa?", "options": [{"text": "To vindicate the Duchess's honor by sending the mistress away.", "isCorrect": true, "rationale": "Constantine feigns concern for his sister's marriage and honor to gain her permission to move the lady, though his true motive is to keep her for himself."}, {"text": "To protect Alatiel from the impending war with the Prince's brother.", "isCorrect": false, "rationale": "While war was imminent, Constantine specifically used the Duchess's jealousy to justify his actions."}, {"text": "To return Alatiel to the Sultan of Babylon in exchange for a treaty.", "isCorrect": false, "rationale": "Constantine had no intention of returning her to her father at this point; he took her to Chios for his own pleasure."}, {"text": "To hand her over to Osbech, the King of the Turks.", "isCorrect": false, "rationale": "Osbech captured her by force during a night raid on Chios; she was not given to him by Constantine."}], "id": "q07"}, {"question": "During her time with Antioco in Smyrna, what factor allowed the two to develop a deep intimacy that had been missing in Alatiel's previous captures?", "options": [{"text": "They shared a common language.", "isCorrect": true, "rationale": "Antioco knew her language, which was significant for Alatiel as she had lived 'the life of a deaf mute' with no one to understand her for years."}, {"text": "Antioco was a high-ranking prince from her father's court.", "isCorrect": false, "rationale": "Antioco was a 'faithful dependant and friend' of Osbech, not a prince of Egypt."}, {"text": "Antioco promised to marry her and make her a Queen.", "isCorrect": false, "rationale": "Alatiel's feelings were rooted in the ability to communicate, rather than political promises or rank."}, {"text": "They were both captives of the King of Cappadocia.", "isCorrect": false, "rationale": "They were in Smyrna together avoiding the advance of Basano (the King of Cappadocia)."}], "id": "q08"}, {"question": "In the deceptive story Alatiel tells her father, she claims to have spent her missing years in a convent. What was the name of the saint she supposedly worshipped there?", "options": [{"text": "St. Crescent-in-Hollow", "isCorrect": true, "rationale": "Alatiel tells the Sultan she paid devotions to 'St. Crescent-in-Hollow' in a convent of religious ladies, which serves as a satirical double entendre."}, {"text": "St. Crescent-in-hand", "isCorrect": false, "rationale": "This is the name the narrator, Panfilo, uses to describe how Marato consoled Alatiel, but it is not the name she uses in her official testimony to her father."}, {"text": "St. Bacchus of the Sea", "isCorrect": false, "rationale": "Bacchus is mentioned by the narrator in relation to wine, but he is not part of Alatiel's fabricated religious cover story."}, {"text": "The Holy Sepulchre", "isCorrect": false, "rationale": "The Holy Sepulchre is the destination of the French pilgrims who allegedly rescued her, not the name of the saint in the convent."}], "id": "q09"}, {"question": "Which character serves as the 'deus ex machina' by recognizing Alatiel in Baffa and engineering her restoration to her father?", "options": [{"text": "Antigono", "isCorrect": true, "rationale": "Antigono, an experienced servant of the King of Cyprus who had formerly been in the Sultan's service, recognized her and coached her on the lie to restore her honor."}, {"text": "The Cypriote Merchant", "isCorrect": false, "rationale": "The merchant was her lover who brought her to Baffa; he was not the one who restored her to her father."}, {"text": "The King of Algarve", "isCorrect": false, "rationale": "He was the intended husband who eventually received her, but he played no role in her rescue or the fabrication of her story."}, {"text": "Basano of Cappadocia", "isCorrect": false, "rationale": "Basano was the conqueror who defeated Osbech, but Alatiel fled his advance rather than seeking his help."}], "id": "q10"}, {"question": "What is the final count of men Alatiel has slept with before her marriage to the King of Algarve, and how is she presented to him?", "options": [{"text": "Eight men; she is presented as a virgin.", "isCorrect": true, "rationale": "Despite being with eight men 'perhaps ten thousand times', the fabricated story and her reputation allow her to be bedded by the King as a virgin."}, {"text": "Nine men; she is presented as a widow.", "isCorrect": false, "rationale": "The text states 'nine several times' she was wedded (including the final husband), meaning she was with eight men before him, and the 'virgin' status is the central irony."}, {"text": "Seven men; she is presented as a pious nun.", "isCorrect": false, "rationale": "She was with eight men before the King, and while her story involves a convent, she is presented as a bride, not a nun."}, {"text": "Ten men; she is presented as a recovered princess.", "isCorrect": false, "rationale": "The text lists her lovers specifically, and the number totals eight prior to her final marriage."}], "id": "q11"}, {"question": "What is the meaning of the proverb that concludes the tale: 'Mouth, for kisses, was never the worse: like as the moon reneweth her course'?", "options": [{"text": "Reputation can be restored through cleverness regardless of the truth.", "isCorrect": true, "rationale": "The proverb encapsulates Boccaccio's irony: Alatiel's physical experiences do not prevent her from being perceived as 'renewed' and virtuous in the eyes of society and her husband."}, {"text": "True love eventually triumphs over all instances of bad fortune.", "isCorrect": false, "rationale": "The tale is more about the whims of fortune and the malleability of reputation than about 'true love'."}, {"text": "Beauty is a fleeting gift that disappears with the passage of time.", "isCorrect": false, "rationale": "The proverb suggests a cyclical 'renewal', the opposite of a fleeting or disappearing quality."}, {"text": "A woman's silence is her greatest protection in a world of men.", "isCorrect": false, "rationale": "While Alatiel is passive, the proverb specifically highlights the disconnect between her history and her current status."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
