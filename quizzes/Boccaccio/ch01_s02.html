<script>
var QUESTIONS = [{"question": "While Dante and Petrarch achieved mastery in allegory and lyric poetry respectively, which specific literary gap did Boccaccio fill to complete the 'Three Crowns' of Italian literature?", "options": [{"text": "The elevation of the Tuscan dialect into a formal liturgical language.", "isCorrect": false, "rationale": "While all three writers helped establish the Tuscan dialect as a literary language, it was used for secular art and humanism rather than primarily for church liturgy."}, {"text": "The development of complex, realistic prose narrative.", "isCorrect": true, "rationale": "Boccaccio is credited with mastering prose narrative, transforming the short tale into a sophisticated art form that moved beyond the verse models of his predecessors."}, {"text": "The integration of Scholastic philosophy into vernacular epic poetry.", "isCorrect": false, "rationale": "This achievement is specifically attributed to Dante Alighieri in the Divine Comedy, which combined theology and philosophy."}, {"text": "The recovery of Greek dramatic structures for the Italian stage.", "isCorrect": false, "rationale": "Although Boccaccio and Petrarch were humanists, the source material focuses on Boccaccio's mastery of the novella rather than the revival of Greek drama."}], "id": "q01"}, {"question": "How does Boccaccio's treatment of the 'exemplum' tradition differ from its original medieval purpose?", "options": [{"text": "He replaced the short narrative structure with long, winding chivalric adventures.", "isCorrect": false, "rationale": "Boccaccio retained the short narrative format but changed the internal logic and thematic purpose of the stories."}, {"text": "He strictly adhered to biblical precedents to ensure his tales remained suitable for sermons.", "isCorrect": false, "rationale": "Boccaccio drew from varied sources and often subverted the moral religious utility of the form."}, {"text": "He used the form to deliver ironic or ambiguous conclusions that resisted simple moralizing.", "isCorrect": true, "rationale": "While traditional exempla were meant to teach clear moral lessons in sermons, Boccaccio often made the 'moral' of his tales ironic or irrelevant to the actual plot."}, {"text": "He translated the Latin sermon stories into French verse to reach a courtly audience.", "isCorrect": false, "rationale": "Boccaccio wrote in the Italian vernacular and focused on prose rather than adopting the French verse tradition for his exempla."}], "id": "q02"}, {"question": "In what way did Boccaccio's refinement of the 'fabliau' represent a departure from the original French tradition?", "options": [{"text": "He removed all elements of bawdy humor to make the stories acceptable for the aristocracy.", "isCorrect": false, "rationale": "Boccaccio maintained the comic and often crude plots of the fabliaux but elevated the literary execution."}, {"text": "He introduced psychological depth and narrative elegance to the crude, character-type plots.", "isCorrect": true, "rationale": "Unlike the raw, broad humor and character 'types' found in French fabliaux, Boccaccio provided his characters with individual depth and social commentary."}, {"text": "He shifted the setting from urban environments to idealized pastoral landscapes.", "isCorrect": false, "rationale": "The source states that Boccaccio's tales were grounded in 'real' urban settings like the streets of Florence and markets of Naples."}, {"text": "He transformed the short comic tales into epic poems written in terza rima.", "isCorrect": false, "rationale": "Boccaccio utilized the novella (prose) form for these stories, whereas the original fabliaux were already verse tales."}], "id": "q03"}, {"question": "What distinguishes the Decameron's contribution to the 'novella' form from earlier works like the 'Novellino'?", "options": [{"text": "The Novellino was written in Latin, while the Decameron was the first in Italian.", "isCorrect": false, "rationale": "The Novellino was an anonymous Italian collection; the primary difference lies in narrative complexity, not language."}, {"text": "The Decameron introduced supernatural elements that were absent in the realistic Novellino.", "isCorrect": false, "rationale": "The Decameron is noted for its realism, while the Novellino's primary limitation was its brevity and lack of sophisticated development."}, {"text": "The Decameron transformed brief anecdotes into complex narratives with vivid settings and developed voices.", "isCorrect": true, "rationale": "While the Novellino provided short, paragraph-long anecdotes, Boccaccio expanded the form to include intricate plots and character development."}, {"text": "Boccaccio invented the term 'novella' to distinguish his work from ancient fables.", "isCorrect": false, "rationale": "Boccaccio did not invent the word 'novella' (meaning 'new'), though his work established it as a distinct literary genre."}], "id": "q04"}, {"question": "When comparing the frame narratives of Boccaccio and Chaucer, which of the following represents a fundamental structural difference?", "options": [{"text": "Boccaccio's characters are a broad cross-section of society, while Chaucer's are limited to the elite.", "isCorrect": false, "rationale": "It is actually the reverse: Chaucer's pilgrims represent a social cross-section, while Boccaccio's brigata consists of young aristocrats."}, {"text": "Boccaccio organizes stories by daily themes, whereas Chaucer's tales arise from character interactions.", "isCorrect": true, "rationale": "The Decameron is structured around specific themes chosen for each day, while the Canterbury Tales focuses on the rivalries and personalities of the pilgrims."}, {"text": "Chaucer uses the frame to escape a pandemic, whereas Boccaccio uses it for a religious pilgrimage.", "isCorrect": false, "rationale": "This is a reversal: Boccaccio's frame is the flight from the plague, and Chaucer's is the pilgrimage to Canterbury."}, {"text": "Boccaccio's frame is written in verse to match the style of his predecessors, unlike Chaucer's prose frame.", "isCorrect": false, "rationale": "The Decameron is a prose work, and the comparison highlights their shared use of frame narratives despite different poetic or prose applications."}], "id": "q05"}, {"question": "Petrarch is described as the 'father of humanism' primarily because of which activity mentioned in the text?", "options": [{"text": "He was the first to write extensively about the inner psychological life in sonnets.", "isCorrect": false, "rationale": "While he was a poet of the inner life, his 'humanist' title refers specifically to his scholarly work with classical texts."}, {"text": "He actively sought out and studied classical Latin texts to recover ancient knowledge.", "isCorrect": true, "rationale": "His passion for finding, copying, and studying classical Latin manuscripts helped lay the intellectual foundation for the Renaissance."}, {"text": "He pioneered the use of the Tuscan dialect for philosophical inquiry.", "isCorrect": false, "rationale": "Dante is more closely associated with using the vernacular for high philosophy; Petrarch's humanism was rooted in the study of classical antiquity."}, {"text": "He established the first public library in Florence to house the Tre Corone works.", "isCorrect": false, "rationale": "The text mentions his scholarly passion and friendship with Boccaccio, but not the establishment of a public library."}], "id": "q06"}, {"question": "Which specific work by Chaucer is cited as drawing directly from Boccaccio's story of 'Patient Griselda'?", "options": [{"text": "The Miller's Tale", "isCorrect": false, "rationale": "The Miller's Tale is noted as reworking a plot Boccaccio used, but the story of Griselda is specifically linked to the Clerk."}, {"text": "The Franklin's Tale", "isCorrect": false, "rationale": "The Franklin's Tale echoes themes from Boccaccio's 'Magic Garden' story, not Griselda."}, {"text": "The Clerk's Tale", "isCorrect": true, "rationale": "The text explicitly states that Chaucer's Clerk's Tale retells the story of Patient Griselda (Decameron X.10)."}, {"text": "The Reeve's Tale", "isCorrect": false, "rationale": "The Reeve's Tale is mentioned as a general reworking of a Boccaccian plot, but not the specific Griselda narrative."}], "id": "q07"}, {"question": "How did Boccaccio's experience in Naples influence the realism of the Decameron compared to the romance tradition?", "options": [{"text": "It led him to reject all Italian influences in favor of French supernatural myths.", "isCorrect": false, "rationale": "He absorbed French and Italian influences but moved away from the supernatural toward the real."}, {"text": "It provided him with themes of noble lovers and adventures, which he then grounded in everyday urban life.", "isCorrect": true, "rationale": "Boccaccio took the ideal and marvelous elements of the romance tradition and placed them in the markets, bedrooms, and streets of real cities like Naples and Florence."}, {"text": "It encouraged him to write purely allegorical works based on Neapolitan theology.", "isCorrect": false, "rationale": "Unlike Dante's cosmic allegory, Boccaccio's work is characterized by its focus on 'earthly, human' stories."}, {"text": "It allowed him to study with Petrarch, who taught him how to avoid common street settings.", "isCorrect": false, "rationale": "Petrarch and Boccaccio became friends much later (1350), and Boccaccio's work is famous for its 'real' settings, not avoiding them."}], "id": "q08"}, {"question": "Dante's Divine Comedy is described as the supreme achievement of the Middle Ages. Which technical innovation of his proved Italian could handle high art?", "options": [{"text": "The invention of the sonnet form for address to a beloved.", "isCorrect": false, "rationale": "The sonnet form is more closely linked to Petrarch's Canzoniere and the lyric tradition."}, {"text": "The creation of the interlocking three-line rhyme scheme known as 'terza rima'.", "isCorrect": true, "rationale": "Dante invented terza rima specifically for the Divine Comedy to structure his complex narrative journey."}, {"text": "The use of the novella structure to frame theological arguments.", "isCorrect": false, "rationale": "Dante wrote an epic poem, not a novella; the novella was Boccaccio's primary contribution."}, {"text": "The first public use of the printing press to circulate vernacular texts.", "isCorrect": false, "rationale": "Dante lived in the late 13th and early 14th centuries, long before the invention of the printing press."}], "id": "q09"}, {"question": "What was the significance of Petrarch being crowned poet laureate in Rome in 1341?", "options": [{"text": "It marked the first time a writer was recognized for works written in the Tuscan dialect.", "isCorrect": false, "rationale": "While he wrote in Italian, the laurel crown was a revival of an ancient classical tradition, often associated with his Latin scholarship."}, {"text": "It established a legal precedent for copyright protection of poetry in Italy.", "isCorrect": false, "rationale": "The crowning was a symbolic and cultural honor, not a legal or administrative development regarding copyright."}, {"text": "It represented the revival of a classical honor that had not been bestowed since ancient times.", "isCorrect": true, "rationale": "The coronation as poet laureate was a major event because it signaled the return of ancient Roman cultural practices and honors."}, {"text": "It was a political appointment made to end his exile from Florence.", "isCorrect": false, "rationale": "Dante was the one famously exiled; Petrarch was born into an exiled family but his crowning in Rome was a literary honor."}], "id": "q10"}, {"question": "The Canzoniere's description as a collection of '366 poems' has structural significance. What does this number likely suggest about Petrarch's design?", "options": [{"text": "It corresponds to the number of tales in the Decameron, suggesting Boccaccio modeled his collection on Petrarch's.", "isCorrect": false, "rationale": "The Decameron contains 100 tales, not 366; and the two works differ in form and subject entirely."}, {"text": "It mirrors the days of a leap year, giving the collection a calendar-like completeness.", "isCorrect": true, "rationale": "366 corresponds to a leap year's days, implying the Canzoniere covers a full cycle of time — the entire arc of his love for Laura — with deliberate architectural design."}, {"text": "It reflects the number of classical Latin poets whose work Petrarch had recovered and catalogued.", "isCorrect": false, "rationale": "The number 366 relates to the structure of the Canzoniere itself, not to a count of classical sources."}, {"text": "It was determined by the number of audience members at his poet laureate coronation.", "isCorrect": false, "rationale": "There is no connection made between the coronation audience and the poem count in the text."}], "id": "q11"}, {"question": "What does the term 'novella' literally mean in Italian, and why is that meaning significant for Boccaccio's genre?", "options": [{"text": "'Brief' — reflecting the short length that defined the form in opposition to epic poetry.", "isCorrect": false, "rationale": "Brevità (brevity) is a different Italian word; 'novella' derives from 'new' or 'news.'"}, {"text": "'New' or 'news' — suggesting the tale brings fresh, topical content about human affairs.", "isCorrect": true, "rationale": "The word 'novella' comes from the Italian for 'new' or 'news,' which fits Boccaccio's grounded, contemporary stories about human life and society."}, {"text": "'Small novel' — marking it as a reduced version of the longer romance tradition.", "isCorrect": false, "rationale": "While the novella is shorter than a novel, the term 'novel' itself is a later development; 'novella' predates the novel form and means 'new,' not 'small novel.'"}, {"text": "'Night tale' — referring to the evening settings common in Italian oral storytelling.", "isCorrect": false, "rationale": "Night is 'notte' in Italian; 'novella' comes from 'nova' meaning new, not from any word for night or evening."}], "id": "q12"}, {"question": "Dante was exiled from Florence in 1302 and never returned. What does this biographical fact add to our understanding of Boccaccio's later work on Dante?", "options": [{"text": "It explains why Boccaccio wrote his Decameron primarily as a critique of Florentine politics.", "isCorrect": false, "rationale": "The Decameron is a broad human comedy, not primarily a political critique; Boccaccio's reverence for Dante is expressed through scholarship, not the tales."}, {"text": "It underscores the significance of Boccaccio delivering the first public lectures on the Divine Comedy in Florence — the city that had expelled its author.", "isCorrect": true, "rationale": "Boccaccio's public lectures on Dante in the very city that exiled him represent a powerful act of literary rehabilitation, honoring a poet who died in exile from Florence."}, {"text": "It shows that Boccaccio had to travel to Ravenna to research the lectures, adding authenticity to his commentary.", "isCorrect": false, "rationale": "While Dante died in Ravenna, the text does not mention Boccaccio traveling there for his lectures; the focus is on the lectures being given in Florence."}, {"text": "It caused Boccaccio to dedicate the Decameron to Dante's descendants as an act of homage.", "isCorrect": false, "rationale": "The Decameron is dedicated to women suffering from love, not to Dante's descendants."}], "id": "q13"}, {"question": "The text describes the Decameron as drawing on Arabic story collections as one of its sources. Which famous Arabic frame-narrative collection shares the structural concept of stories nested within a framing tale?", "options": [{"text": "The Masnavi by Rumi", "isCorrect": false, "rationale": "The Masnavi is a long Persian spiritual poem, not a frame-narrative prose collection of tales."}, {"text": "One Thousand and One Nights (Arabian Nights)", "isCorrect": true, "rationale": "The Arabian Nights is the paradigmatic Arabic frame-narrative collection, where Scheherazade tells stories within a framing story — a structure that influenced medieval European storytelling including the Decameron."}, {"text": "The Rubaiyat of Omar Khayyam", "isCorrect": false, "rationale": "The Rubaiyat is a collection of Persian quatrains (rubai), not a prose narrative or frame-narrative collection."}, {"text": "The Shahnameh by Ferdowsi", "isCorrect": false, "rationale": "The Shahnameh is a Persian epic poem about the history of Persia, not an Arabic frame-narrative collection of tales."}], "id": "q14"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
