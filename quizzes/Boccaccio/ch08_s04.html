        <a href="../../courses/Boccaccio.html">&larr; Back to Tales of the Decameron (Boccaccio)</a>
    </div>

        <div class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 8, Section 4</div>

        <div class="score-pct" id="score-pct"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "In the context of Boccaccio's parody of courtly love, how does the structure of Lydia's 'tests' invert traditional romance literature conventions?", "options": [{"text": "The lady is the one who must prove her devotion through trials of deception rather than the knight proving himself through feats of arms.", "isCorrect": true, "rationale": "The source material explicitly states that Boccaccio inverts the convention where a lady sets tasks for a knight, making the lady perform 'feats of deception' instead."}, {"text": "The trials are designed to protect the husband's honor rather than facilitate an extra-marital affair.", "isCorrect": false, "rationale": "The trials are specifically intended to prove her love to Pyrrhus and facilitate their affair, directly challenging Nicostrato's honor."}, {"text": "The knight must perform the tasks in secret to avoid the lady's public shame.", "isCorrect": false, "rationale": "The tasks are performed right under the husband's nose, often in front of witnesses, which is the opposite of a secret performance by a knight."}, {"text": "The tests are meant to discourage the lover by showing the lady's cruelty and lack of virtue.", "isCorrect": false, "rationale": "While the tests are shocking, their purpose is to provide 'signal proof' of her love and commitment to Pyrrhus, not to discourage him."}], "id": "q01"}, {"question": "What reason does Panfilo give in his introduction for advising the ladies NOT to rashly follow Lydia's example?", "options": [{"text": "Lydia's success relied more on the favor of Fortune than on the guidance of reason.", "isCorrect": true, "rationale": "Panfilo states that Lydia 'owed far more to the favour of Fortune than to the guidance of reason,' making her success unreliable for others."}, {"text": "The social consequences of such a 'beffa' in Florence would be far more severe than in Argos.", "isCorrect": false, "rationale": "While the setting is Argos, Panfilo's warning focuses on the unpredictability of Fortune, not a comparison of social codes."}, {"text": "Lydia's actions were driven by a 'distempered mind' rather than true romantic passion.", "isCorrect": false, "rationale": "The text describes her as acting out of 'ardent' love; the warning concerns the role of luck in her success."}, {"text": "Modern husbands are stated to be far less susceptible to self-deception than Nicostrato.", "isCorrect": false, "rationale": "Panfilo notes that 'the eyes of all men are not equally holden,' but focuses his warning on the 'unkindly mood' of Fortune."}], "id": "q02"}, {"question": "Why did Pyrrhus initially reject Lydia's advances through her maid, Lusca?", "options": [{"text": "He suspected that Nicostrato was using Lydia to test his loyalty.", "isCorrect": true, "rationale": "Pyrrhus tells Lusca that he fears Nicostrato, being 'wise and wary,' has instructed Lydia to try him to prove his faithfulness."}, {"text": "He was already in love with the chambermaid, Lusca.", "isCorrect": false, "rationale": "There is no evidence in the text of a romantic connection between Pyrrhus and Lusca; their interactions are strictly as messenger and recipient."}, {"text": "He believed Lydia was not of high enough birth to warrant his attention.", "isCorrect": false, "rationale": "Lydia is described as a 'great lady' of high birth; Pyrrhus's reluctance stems from fear and loyalty, not social snobbery."}, {"text": "He found her public displays of affection for Nicostrato too convincing.", "isCorrect": false, "rationale": "Pyrrhus's doubt is based on his lord's wisdom and the potential for a trap, not Lydia's behavior toward her husband."}], "id": "q03"}, {"question": "How does Lydia justify the killing of Nicostrato's prized sparrow-hawk to the guests at the breakfast?", "options": [{"text": "She claims the bird has stolen the time and attention that Nicostrato should have devoted to her.", "isCorrect": true, "rationale": "Lydia argues that the bird has 'cheated' her of time, as Nicostrato leaves her alone to go hawking at dawn."}, {"text": "She argues that the bird was diseased and posed a threat to the household's health.", "isCorrect": false, "rationale": "She frames the act as an act of 'vengeance' for neglect, not as a sanitary or safety precaution."}, {"text": "She pretends it was an accident caused by her clumsy attempt to hold the bird.", "isCorrect": false, "rationale": "She deliberately dashes the bird against the wall and then makes a formal speech to the gentlemen to justify her 'cause.'"}, {"text": "She asserts that the bird attacked her, necessitating an act of self-defense.", "isCorrect": false, "rationale": "The lady takes the bird by the jesses and kills it intentionally as a calculated part of her proof of love."}], "id": "q04"}, {"question": "In the third test involving the tooth, what secondary deception did Lydia use to convince Nicostrato that the tooth was truly rotten?", "options": [{"text": "She had Lusca pass her a previously obtained rotten tooth to show him after the extraction.", "isCorrect": true, "rationale": "The text states that after wrenching the tooth, she took from Lusca's hand 'another and horribly decayed tooth' to show the suffering husband."}, {"text": "She used a chemical application to blacken the tooth as soon as it was removed.", "isCorrect": false, "rationale": "She used sleight of hand with a pre-prepared tooth rather than modifying the one she actually pulled."}, {"text": "She bribed the boys, who served Nicostrato, to verify that they saw the decay.", "isCorrect": false, "rationale": "The boys were used earlier to make Nicostrato believe his breath smelled, but the physical proof of the tooth involved Lusca."}, {"text": "She showed him his reflection in a distorted mirror to make a healthy tooth appear black.", "isCorrect": false, "rationale": "The deception relied on a physical swap of the extracted tooth, not optical distortion or mirrors."}], "id": "q05"}, {"question": "What is the primary psychological mechanism that allows Nicostrato to be deceived by the pear-tree illusion?", "options": [{"text": "He prioritizes a logical explanation of an 'enchanted' location over the evidence of his own senses.", "isCorrect": true, "rationale": "Nicostrato is persuaded that the tree is 'enchanted' because he cannot reconcile his trust in his wife with what he saw, leading him to doubt his own eyes."}, {"text": "He is suffering from early-stage senility, which the text mentions as a factor of his age.", "isCorrect": false, "rationale": "While he is 'verging on old age,' the story focuses on his 'extraordinary capacity for self-deception' and the power of the 'beffa' rather than medical decline."}, {"text": "He is under the influence of a physical hallucinogen administered by Lydia during the 'sick' feign.", "isCorrect": false, "rationale": "The 'illusion' is purely psychological and based on the narrative created by Lydia and Pyrrhus, not chemical induction."}, {"text": "He is so terrified of Pyrrhus's physical strength that he pretends to believe the lie.", "isCorrect": false, "rationale": "Nicostrato genuinely 'marvelled' and 'deemed that what they both averred must be true,' indicating he was truly duped."}], "id": "q06"}, {"question": "What function does the Greek setting of Argos serve in the narrative, according to the source material?", "options": [{"text": "It creates an air of the exotic that distances the story from the immediate social reality of the Florentine audience.", "isCorrect": true, "rationale": "The text explicitly states the Greek setting gives an 'air of the exotic' and distances the 'audacious' tale from the audience's daily lives."}, {"text": "It provides a historical context where such deceptions were legally permitted by ancient law.", "isCorrect": false, "rationale": "The setting is used for atmosphere and psychological distance, not to suggest the behavior was legally sanctioned."}, {"text": "It highlights the superior intellect of the Greeks compared to the Italian characters in other tales.", "isCorrect": false, "rationale": "The characters' cleverness is attributed to 'Love' and wit, not their nationality; in fact, the husband is portrayed as a fool."}, {"text": "It allows Boccaccio to use mythological references to justify the 'magic' of the pear tree.", "isCorrect": false, "rationale": "The pear tree's 'magic' is a false claim made by the characters to deceive the husband, not a mythological element provided by the setting."}], "id": "q07"}, {"question": "Why does Lydia insist that Pyrrhus cut down the pear tree at the end of the story?", "options": [{"text": "To finalize her 'vindication' and symbolically remove the evidence of the perceived 'falsehood'.", "isCorrect": true, "rationale": "Lydia claims the tree is a 'foe' of her honor and wants it felled to remove the source of the 'false' visions that made Nicostrato doubt her."}, {"text": "To prevent Nicostrato from ever testing the tree again and discovering the truth.", "isCorrect": false, "rationale": "While this is a practical effect, her stated reason is to 'vindicate thy honour and mine' and punish the tree for causing 'illusions'."}, {"text": "Because the tree was actually rotten, as Pyrrhus had claimed during his first climb.", "isCorrect": false, "rationale": "Pyrrhus never claimed the tree was rotten; the focus was entirely on the visual illusion it supposedly created."}, {"text": "It was a requirement of the local lord to clear the garden of 'enchanted' objects.", "isCorrect": false, "rationale": "Nicostrato is the lord of the house; the order to cut the tree comes from Lydia as part of her psychological manipulation."}], "id": "q08"}, {"question": "Which argument does Lusca use to finally convince Pyrrhus to accept Lydia's love?", "options": [{"text": "That masters do not observe the same rules of loyalty toward servants as they do toward their own kin.", "isCorrect": true, "rationale": "Lusca argues that 'no such loyalty is demanded between servants and their masters' and notes that Nicostrato would use force if he wanted one of Pyrrhus's female kin."}, {"text": "That Lydia has promised to name Pyrrhus as the sole heir to Nicostrato's fortune.", "isCorrect": false, "rationale": "The promise involves immediate wealth and status ('arms and horses, clothes and money'), not a legal inheritance of the estate."}, {"text": "That Nicostrato is already planning to replace Pyrrhus with a new favorite servant.", "isCorrect": false, "rationale": "There is no mention of Pyrrhus being replaced; he is 'beloved and trusted by Nicostratus above all other.'"}, {"text": "That the city of Argos is under a curse that only their union can break.", "isCorrect": false, "rationale": "The arguments are purely pragmatic and focused on personal gain, risk, and the double standards of social class."}], "id": "q09"}, {"question": "In the summary provided in the source material, what distinguishes Lydia's trick from Peronella's trick in tale VII.2?", "options": [{"text": "Lydia's scheme is a calculated, escalating campaign, whereas Peronella's was a brilliant improvisation born of necessity.", "isCorrect": true, "rationale": "The analysis in Chapter 8, Section 4 notes that Lydia's is a 'calculated campaign of escalating daring' compared to Peronella's 'improvisation.'"}, {"text": "Lydia's trick relies on magic, while Peronella's relies on physical hiding places.", "isCorrect": false, "rationale": "Lydia's 'magic' is a fake explanation for a psychological trick, not actual magic; both tales focus on human cleverness."}, {"text": "Lydia is caught in the act, while Peronella successfully hides her lover.", "isCorrect": false, "rationale": "Lydia is 'seen' but successfully convinces her husband that he didn't actually see what he saw, making her trick even more audacious."}, {"text": "Peronella's trick is directed at a servant, while Lydia's is directed at a nobleman.", "isCorrect": false, "rationale": "Both tricks involve wives deceiving their husbands; the distinction lies in the planning versus the spontaneity."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
