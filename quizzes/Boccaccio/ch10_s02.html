    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Boccaccio.html">&larr; Back to Tales of the Decameron (Boccaccio)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 10, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "In the context of the Decameron's structure, what distinguishes Day IX and Day I from the other eight days of storytelling?", "options": [{"text": "They are the only days where the storytellers are permitted to choose their subjects freely.", "isCorrect": true, "rationale": "The text explicitly states that Day I and Day IX are the only two days without a prescribed theme, allowing for a varied miscellany."}, {"text": "They are the only days where the queen's authority is considered 'gentle' rather than 'absolute'.", "isCorrect": false, "rationale": "While Emilia's authority on Day IX is described as gentle, the text does not suggest this is a unique trait shared only with Day I."}, {"text": "They are the only days where the tales are primarily brief and anecdotal in nature.", "isCorrect": false, "rationale": "The text notes that several tales in Day IX are brief, but it describes this as a result of the company 'catching its breath' before Day X, not a structural rule shared with Day I."}, {"text": "They are the only days that do not feature the recurring themes of clerical foolishness or practical jokes.", "isCorrect": false, "rationale": "Day IX specifically revisits familiar subjects like clerical foolishness and practical jokes, albeit with a lighter touch."}]}, {"question": "How does the introduction to Day IX characterize the shift in the 'beffa' (practical joke) compared to the previous day?", "options": [{"text": "It moves away from the cruelty seen in Day VIII and returns toward laughter.", "isCorrect": true, "rationale": "The source material states that while Day VIII pushed the beffa toward cruelty, Day IX pulls it back toward a lighter mode of laughter."}, {"text": "It evolves into more elaborate and complex revenge plots than those found in Day VIII.", "isCorrect": false, "rationale": "The text describes Day IX as a return to a 'looser, lighter mode' rather than an escalation of complexity or revenge."}, {"text": "It abandons the concept of the beffa entirely in favor of romantic and chivalric themes.", "isCorrect": false, "rationale": "The tales of Day IX are noted to revisit practical jokes, indicating the beffa remains a subject, just with a different tone."}, {"text": "It becomes more anecdotal to mirror the 'gentle authority' established by Queen Emilia.", "isCorrect": false, "rationale": "While the stories are anecdotal and Emilia is gentle, the specific shift mentioned regarding the beffa concerns the transition from cruelty to laughter."}]}, {"question": "The introduction notes that wild creatures like goats and stags showed no fear of the company. According to Boccaccio, why did these animals behave as if they were tamed?", "options": [{"text": "They seemed to sense that hunters were no longer active during the pestilence.", "isCorrect": true, "rationale": "The text suggests the creatures stood without fear 'as if witting that in this time of pestilence they had nought to fear from the hunter'."}, {"text": "The palace grounds were a protected sanctuary where hunting was strictly forbidden by the queen.", "isCorrect": false, "rationale": "The text attributes the lack of fear to the specific circumstances of the plague rather than a permanent rule of the palace grounds."}, {"text": "The animals had been domesticated by previous inhabitants of the palace before the plague began.", "isCorrect": false, "rationale": "The passage describes them as 'wild creatures' and uses the word 'as if' regarding them being tamed, implying they were not actually domestic."}, {"text": "The brigata's singing and merry-making acted as a soothing influence that calmed the wild beasts.", "isCorrect": false, "rationale": "While the company was indeed singing and merry, the text specifically links the animals' lack of fear to the absence of the hunter during the pestilence."}]}, {"question": "Upon returning to the palace, what was the specific significance of the company being garlanded with oak leaves and carrying fragrant herbs?", "options": [{"text": "It symbolized their defiance of death or their intention to meet it with a light heart.", "isCorrect": true, "rationale": "The text states that anyone meeting them might say, 'Either shall death not vanquish these, or they will meet it with a light heart'."}, {"text": "It served as a medicinal precaution to ward off the 'corrupt air' of the plague-ridden city.", "isCorrect": false, "rationale": "While herbs were often used medicinally during the plague, the text focuses on the symbolic impression of their high spirits and vitality."}, {"text": "It was a traditional requirement for the start of any day governed by the 'Free Theme' format.", "isCorrect": false, "rationale": "The text describes this as a spontaneous activity during their walk rather than a formal requirement of the free theme days."}, {"text": "It signaled to the servants that the company had transitioned from a state of mourning to a state of revelry.", "isCorrect": false, "rationale": "The brigata had already been engaged in storytelling and revelry for eight days; the garlands are a specific expression of their current mood in nature."}]}, {"question": "In the Ptolemaic system mentioned in the footnotes, what does the 'eighth heaven' specifically represent?", "options": [{"text": "The region of the fixed stars.", "isCorrect": true, "rationale": "The footnote explicitly identifies the eighth heaven as the 'region of the fixed stars' within the Ptolemaic system."}, {"text": "The highest point of the sun's ascent during mid-day.", "isCorrect": false, "rationale": "The text refers to the 'eighth heaven' changing color before sunrise, and the footnote clarifies its astronomical location, which is distinct from the sun's path."}, {"text": "The boundary between the earthly atmosphere and the divine realm.", "isCorrect": false, "rationale": "While heavens are celestial, the Ptolemaic system uses specific designations; the eighth specifically refers to fixed stars, not a general boundary."}, {"text": "The layer of the sky that produces the 'cilestro' luminosity.", "isCorrect": false, "rationale": "Cilestro is described as a quality of the sky when the sun is up, whereas the eighth heaven is a region defined by stars."}]}, {"question": "Before sitting down to their meal on Day IX, what specific activity did the company engage in that continued to build the 'gay' atmosphere?", "options": [{"text": "They sang six ditties, with each song being more cheerful than the one before it.", "isCorrect": true, "rationale": "The text mentions that they did not go to the table until 'six ditties, each gayer than that which went before, had been sung'."}, {"text": "They performed a series of intricate dances accompanied by the palace musicians.", "isCorrect": false, "rationale": "The text states they 'trod some measures' (danced) after the meal, not before it."}, {"text": "They engaged in a preliminary round of lighthearted anecdotal storytelling to warm up.", "isCorrect": false, "rationale": "Storytelling occurred at the 'accustomed hour' after their rest, not immediately before the meal."}, {"text": "They participated in a competition to see who could find the most fragrant herbs in the copse.", "isCorrect": false, "rationale": "While they gathered herbs, the text does not describe this as a competition or as the specific activity occurring right before dinner."}]}, {"question": "What does the term 'cilestro' refer to in the context of Boccaccio's description of the Italian sky?", "options": [{"text": "The intense luminosity of the sky when the sun has risen.", "isCorrect": true, "rationale": "The footnote defines 'cilestro' as a word for which there is no exact English equivalent, representing the 'intense luminosity' of the Italian sky."}, {"text": "The transition from the azure of night to the pale blue of early dawn.", "isCorrect": false, "rationale": "The text mentions the eighth heaven changing from azure to lighter blue, but the footnote for 'cilestro' specifically highlights its luminosity when the sun is up."}, {"text": "The deep, dark blue characteristic of the 'eighth heaven' at midnight.", "isCorrect": false, "rationale": "The footnote contrasts with the night sky, emphasizing luminosity rather than the darkness of night."}, {"text": "The hazy, shimmering effect caused by the heat of the midday sun.", "isCorrect": false, "rationale": "While it relates to the sun being up, 'cilestro' specifically refers to the color/light quality of the sky itself, not a heat-induced shimmer."}]}, {"question": "Who does Queen Emilia command to begin the storytelling on Day IX?", "options": [{"text": "Filomena", "isCorrect": true, "rationale": "The introduction concludes by stating that the queen 'bade her [Filomena] make a beginning of the day's story-telling'."}, {"text": "Dioneo", "isCorrect": false, "rationale": "Although Dioneo is a member of the company, the text explicitly names Filomena as the one chosen to start the day."}, {"text": "Panfilo", "isCorrect": false, "rationale": "Panfilo is often involved in storytelling, but the Queen's specific command for the first story of Day IX was directed at Filomena."}, {"text": "Neifile", "isCorrect": false, "rationale": "The text identifies Filomena as the one who began 'on this wise' with a smile after the queen's command."}]}, {"question": "Which of the following best describes the narrative function of Day IX as a transition within the *Decameron*?", "options": [{"text": "It provides a 'breather' of light variety before the grand finale of Day X.", "isCorrect": true, "rationale": "The text describes Day IX as if the company is 'catching its breath before the grand finale of X'."}, {"text": "It serves as the thematic climax of the 'beffa' cycles started in Day VII.", "isCorrect": false, "rationale": "Rather than a climax, the text suggests Day IX pulls back from the intensity of the previous days' focus on trickery and revenge."}, {"text": "It marks the definitive end of the plague's influence on the brigata's psyche.", "isCorrect": false, "rationale": "The plague is still raging in Florence, and the text uses the frame to show that the company has simply found a temporary rhythm of order, not an end to the plague's influence."}, {"text": "It introduces a new, more rigid set of moral themes to prepare for the final days.", "isCorrect": false, "rationale": "Day IX is described as 'looser' and 'lighter' and lacking a prescribed theme, which is the opposite of a rigid moral structure."}]}, {"question": "How does Boccaccio use the behavior of the 'servants' to help set the tone for Day IX?", "options": [{"text": "They are described as being in 'blithe and merry cheer,' reinforcing the relaxed atmosphere.", "isCorrect": true, "rationale": "The text explicitly mentions that upon returning to the palace, the company found 'their servants in blithe and merry cheer'."}, {"text": "They are portrayed as being fearful and cautious, contrasting with the brigata's lightheartedness.", "isCorrect": false, "rationale": "The servants' mood mirrors the cheerful tone of the company rather than providing a contrast of fear."}, {"text": "They are noted for their absence, indicating the breakdown of social order during the plague.", "isCorrect": false, "rationale": "The text notes that 'all things in order meet' were found at the palace, including the servants, showing that order was maintained within their sheltered world."}, {"text": "They are shown garlanded with oak leaves, just like the members of the brigata.", "isCorrect": false, "rationale": "Only the members of the company ('whoso met them') are described as being garlanded with oak leaves and carrying herbs."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
