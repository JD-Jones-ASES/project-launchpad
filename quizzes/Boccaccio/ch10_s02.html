<script>
var QUESTIONS = [{"question": "In the context of the Decameron's structure, what distinguishes Day IX and Day I from the other eight days of storytelling?", "options": [{"text": "They are the only days where the storytellers are permitted to choose their subjects freely.", "isCorrect": true, "rationale": "The text explicitly states that Day I and Day IX are the only two days without a prescribed theme, allowing for a varied miscellany."}, {"text": "They are the only days where the queen's authority is considered 'gentle' rather than 'absolute'.", "isCorrect": false, "rationale": "While Emilia's authority on Day IX is described as gentle, the text does not suggest this is a unique trait shared only with Day I."}, {"text": "They are the only days where the tales are primarily brief and anecdotal in nature.", "isCorrect": false, "rationale": "The text notes that several tales in Day IX are brief, but it describes this as a result of the company 'catching its breath' before Day X, not a structural rule shared with Day I."}, {"text": "They are the only days that do not feature the recurring themes of clerical foolishness or practical jokes.", "isCorrect": false, "rationale": "Day IX specifically revisits familiar subjects like clerical foolishness and practical jokes, albeit with a lighter touch."}], "id": "q01"}, {"question": "How does the introduction to Day IX characterize the shift in the 'beffa' (practical joke) compared to the previous day?", "options": [{"text": "It moves away from the cruelty seen in Day VIII and returns toward laughter.", "isCorrect": true, "rationale": "The source material states that while Day VIII pushed the beffa toward cruelty, Day IX pulls it back toward a lighter mode of laughter."}, {"text": "It evolves into more elaborate and complex revenge plots than those found in Day VIII.", "isCorrect": false, "rationale": "The text describes Day IX as a return to a 'looser, lighter mode' rather than an escalation of complexity or revenge."}, {"text": "It abandons the concept of the beffa entirely in favor of romantic and chivalric themes.", "isCorrect": false, "rationale": "The tales of Day IX are noted to revisit practical jokes, indicating the beffa remains a subject, just with a different tone."}, {"text": "It becomes more anecdotal to mirror the 'gentle authority' established by Queen Emilia.", "isCorrect": false, "rationale": "While the stories are anecdotal and Emilia is gentle, the specific shift mentioned regarding the beffa concerns the transition from cruelty to laughter."}], "id": "q02"}, {"question": "The introduction notes that wild creatures like goats and stags showed no fear of the company. According to Boccaccio, why did these animals behave as if they were tamed?", "options": [{"text": "They seemed to sense that hunters were no longer active during the pestilence.", "isCorrect": true, "rationale": "The text suggests the creatures stood without fear 'as if witting that in this time of pestilence they had nought to fear from the hunter'."}, {"text": "The palace grounds were a protected sanctuary where hunting was strictly forbidden by the queen.", "isCorrect": false, "rationale": "The text attributes the lack of fear to the specific circumstances of the plague rather than a permanent rule of the palace grounds."}, {"text": "The animals had been domesticated by previous inhabitants of the palace before the plague began.", "isCorrect": false, "rationale": "The passage describes them as 'wild creatures' and uses the word 'as if' regarding them being tamed, implying they were not actually domestic."}, {"text": "The brigata's singing and merry-making acted as a soothing influence that calmed the wild beasts.", "isCorrect": false, "rationale": "While the company was indeed singing and merry, the text specifically links the animals' lack of fear to the absence of the hunter during the pestilence."}], "id": "q03"}, {"question": "Upon returning to the palace, what was the specific significance of the company being garlanded with oak leaves and carrying fragrant herbs?", "options": [{"text": "It symbolized their defiance of death or their intention to meet it with a light heart.", "isCorrect": true, "rationale": "The text states that anyone meeting them might say, 'Either shall death not vanquish these, or they will meet it with a light heart'."}, {"text": "It served as a medicinal precaution to ward off the 'corrupt air' of the plague-ridden city.", "isCorrect": false, "rationale": "While herbs were often used medicinally during the plague, the text focuses on the symbolic impression of their high spirits and vitality."}, {"text": "It was a traditional requirement for the start of any day governed by the 'Free Theme' format.", "isCorrect": false, "rationale": "The text describes this as a spontaneous activity during their walk rather than a formal requirement of the free theme days."}, {"text": "It signaled to the servants that the company had transitioned from a state of mourning to a state of revelry.", "isCorrect": false, "rationale": "The brigata had already been engaged in storytelling and revelry for eight days; the garlands are a specific expression of their current mood in nature."}], "id": "q04"}, {"question": "In the Ptolemaic system mentioned in the footnotes, what does the 'eighth heaven' specifically represent?", "options": [{"text": "The region of the fixed stars.", "isCorrect": true, "rationale": "The footnote explicitly identifies the eighth heaven as the 'region of the fixed stars' within the Ptolemaic system."}, {"text": "The highest point of the sun's ascent during mid-day.", "isCorrect": false, "rationale": "The text refers to the 'eighth heaven' changing color before sunrise, and the footnote clarifies its astronomical location, which is distinct from the sun's path."}, {"text": "The boundary between the earthly atmosphere and the divine realm.", "isCorrect": false, "rationale": "While heavens are celestial, the Ptolemaic system uses specific designations; the eighth specifically refers to fixed stars, not a general boundary."}, {"text": "The layer of the sky that produces the 'cilestro' luminosity.", "isCorrect": false, "rationale": "Cilestro is described as a quality of the sky when the sun is up, whereas the eighth heaven is a region defined by stars."}], "id": "q05"}, {"question": "Before sitting down to their meal on Day IX, what specific activity did the company engage in that continued to build the 'gay' atmosphere?", "options": [{"text": "They sang six ditties, with each song being more cheerful than the one before it.", "isCorrect": true, "rationale": "The text mentions that they did not go to the table until 'six ditties, each gayer than that which went before, had been sung'."}, {"text": "They performed a series of intricate dances accompanied by the palace musicians.", "isCorrect": false, "rationale": "The text states they 'trod some measures' (danced) after the meal, not before it."}, {"text": "They engaged in a preliminary round of lighthearted anecdotal storytelling to warm up.", "isCorrect": false, "rationale": "Storytelling occurred at the 'accustomed hour' after their rest, not immediately before the meal."}, {"text": "They participated in a competition to see who could find the most fragrant herbs in the copse.", "isCorrect": false, "rationale": "While they gathered herbs, the text does not describe this as a competition or as the specific activity occurring right before dinner."}], "id": "q06"}, {"question": "What does the term 'cilestro' refer to in the context of Boccaccio's description of the Italian sky?", "options": [{"text": "The intense luminosity of the sky when the sun has risen.", "isCorrect": true, "rationale": "The footnote defines 'cilestro' as a word for which there is no exact English equivalent, representing the 'intense luminosity' of the Italian sky."}, {"text": "The transition from the azure of night to the pale blue of early dawn.", "isCorrect": false, "rationale": "The text mentions the eighth heaven changing from azure to lighter blue, but the footnote for 'cilestro' specifically highlights its luminosity when the sun is up."}, {"text": "The deep, dark blue characteristic of the 'eighth heaven' at midnight.", "isCorrect": false, "rationale": "The footnote contrasts with the night sky, emphasizing luminosity rather than the darkness of night."}, {"text": "The hazy, shimmering effect caused by the heat of the midday sun.", "isCorrect": false, "rationale": "While it relates to the sun being up, 'cilestro' specifically refers to the color/light quality of the sky itself, not a heat-induced shimmer."}], "id": "q07"}, {"question": "Who does Queen Emilia command to begin the storytelling on Day IX?", "options": [{"text": "Filomena", "isCorrect": true, "rationale": "The introduction concludes by stating that the queen 'bade her [Filomena] make a beginning of the day's story-telling'."}, {"text": "Dioneo", "isCorrect": false, "rationale": "Although Dioneo is a member of the company, the text explicitly names Filomena as the one chosen to start the day."}, {"text": "Panfilo", "isCorrect": false, "rationale": "Panfilo is often involved in storytelling, but the Queen's specific command for the first story of Day IX was directed at Filomena."}, {"text": "Neifile", "isCorrect": false, "rationale": "The text identifies Filomena as the one who began 'on this wise' with a smile after the queen's command."}], "id": "q08"}, {"question": "Which of the following best describes the narrative function of Day IX as a transition within the *Decameron*?", "options": [{"text": "It provides a 'breather' of light variety before the grand finale of Day X.", "isCorrect": true, "rationale": "The text describes Day IX as if the company is 'catching its breath before the grand finale of X'."}, {"text": "It serves as the thematic climax of the 'beffa' cycles started in Day VII.", "isCorrect": false, "rationale": "Rather than a climax, the text suggests Day IX pulls back from the intensity of the previous days' focus on trickery and revenge."}, {"text": "It marks the definitive end of the plague's influence on the brigata's psyche.", "isCorrect": false, "rationale": "The plague is still raging in Florence, and the text uses the frame to show that the company has simply found a temporary rhythm of order, not an end to the plague's influence."}, {"text": "It introduces a new, more rigid set of moral themes to prepare for the final days.", "isCorrect": false, "rationale": "Day IX is described as 'looser' and 'lighter' and lacking a prescribed theme, which is the opposite of a rigid moral structure."}], "id": "q09"}, {"question": "How does Boccaccio use the behavior of the 'servants' to help set the tone for Day IX?", "options": [{"text": "They are described as being in 'blithe and merry cheer,' reinforcing the relaxed atmosphere.", "isCorrect": true, "rationale": "The text explicitly mentions that upon returning to the palace, the company found 'their servants in blithe and merry cheer'."}, {"text": "They are portrayed as being fearful and cautious, contrasting with the brigata's lightheartedness.", "isCorrect": false, "rationale": "The servants' mood mirrors the cheerful tone of the company rather than providing a contrast of fear."}, {"text": "They are noted for their absence, indicating the breakdown of social order during the plague.", "isCorrect": false, "rationale": "The text notes that 'all things in order meet' were found at the palace, including the servants, showing that order was maintained within their sheltered world."}, {"text": "They are shown garlanded with oak leaves, just like the members of the brigata.", "isCorrect": false, "rationale": "Only the members of the company ('whoso met them') are described as being garlanded with oak leaves and carrying herbs."}], "id": "q10"}, {"question": "According to the text, which member of the brigata is queen on Day IX, and how is her authority described?", "options": [{"text": "Neifile, whose authority is described as strict and demanding.", "isCorrect": false, "rationale": "Neifile is not the queen of Day IX; the text specifies a different member whose authority is described in a particular way."}, {"text": "Emilia, whose authority is described as gentle.", "isCorrect": true, "rationale": "The text states that Emilia reigns as queen on Day IX and that her authority is characterized as 'gentle' rather than strict."}, {"text": "Pampinea, described as particularly authoritative given her role as the original leader.", "isCorrect": false, "rationale": "Pampinea was the first queen on Day I; Day IX has a different queen."}, {"text": "Filomena, described as rigorous in enforcing the free-theme format.", "isCorrect": false, "rationale": "Filomena is not the queen of Day IX; she is the one who begins the storytelling at the queen's command."}], "id": "q11"}, {"question": "The text states that the tales of Day IX are notably shorter than those of previous days. What does this brevity itself represent, according to the commentary?", "options": [{"text": "It signals Boccaccio's declining narrative energy as the work nears its conclusion.", "isCorrect": false, "rationale": "The commentary presents the brevity as a deliberate artistic choice, not a sign of declining skill or energy."}, {"text": "It is a kind of artistry in itself, demonstrating that a tale need not be long to be effective.", "isCorrect": true, "rationale": "The text states: 'This brevity is itself a kind of artistry: Boccaccio demonstrates that a tale need not be long to be effective.'"}, {"text": "It reflects the company's fatigue after eight days of sustained storytelling.", "isCorrect": false, "rationale": "The company is described as cheerful and spirited; any brevity reflects artistic design rather than weariness."}, {"text": "It is required by the 'Free Theme' rules that set a maximum length for each story.", "isCorrect": false, "rationale": "No maximum length is described as a rule of the free-theme days; the brevity is a natural consequence of the lighter subject matter."}], "id": "q12"}, {"question": "Which tale from Day IX does the commentary link back to the very opening tale of the Decameron, and what theme connects them?", "options": [{"text": "IX.6 (the inn at Forli) connects back to I.1 (Ciappelletto) through the theme of false identity.", "isCorrect": false, "rationale": "The text connects IX.6 to II.5 (Andreuccio's adventure in Naples) through the comedy of mistaken identity, not to I.1."}, {"text": "IX.2 (the abbess's breeches) connects back to I.1 (Ciappelletto's false confession) through the theme of clerical hypocrisy.", "isCorrect": true, "rationale": "The commentary states: 'The abbess's breeches (IX.2) revisit the theme of clerical hypocrisy that opened the entire work with Ser Ciappelletto's false confession (I.1).'"}, {"text": "IX.5 (Calandrino in love) connects back to I.3 (the Three Rings) through the theme of religious tolerance.", "isCorrect": false, "rationale": "The Calandrino tales are about gullibility and practical jokes, not religious tolerance — that theme belongs to I.3."}, {"text": "IX.9 (Solomon's advice) connects back to I.9 (the Gascon lady) through the theme of women shaming men into virtue.", "isCorrect": false, "rationale": "IX.9 is noted as troubling for modern readers because of its endorsement of domestic violence, not as a parallel to the Gascon lady's clever motto."}], "id": "q13"}, {"question": "What is the morning routine of the brigata at the start of Day IX, as described in the primary source excerpt?", "options": [{"text": "They assemble immediately for breakfast, then go for a morning walk before the storytelling.", "isCorrect": false, "rationale": "The sequence in the primary source shows them walking before eating, not after."}, {"text": "They gather at the fountain, then hie through the garden until breakfast-time, eat, sleep, and reassemble for tales.", "isCorrect": true, "rationale": "The primary source describes them drinking from the fountain, taking pleasure in the garden until breakfast, eating, sleeping 'as they were wont,' and then reassembling for stories."}, {"text": "They begin with formal prayers led by the queen, then move to the garden for an outdoor breakfast.", "isCorrect": false, "rationale": "The text does not mention formal prayers as a morning activity on this specific day."}, {"text": "They set out on a long morning walk and then return directly to the storytelling circle without a midday break.", "isCorrect": false, "rationale": "The primary source explicitly includes a meal and a nap ('slept as they were wont') before the storytelling begins."}], "id": "q14"}, {"question": "According to the text, even in its 'lighter' mode, Day IX circles back to the *Decameron*'s deepest concerns. Which of the following pairs of tales best illustrates this observation?", "options": [{"text": "IX.2 (clerical hypocrisy) and IX.6 (mistaken identity comedy) revisit themes from earlier days.", "isCorrect": true, "rationale": "The commentary specifically states that IX.2 revisits clerical hypocrisy (from I.1) and IX.6 returns to the comedy of mistaken identity that animated Andreuccio's adventures (II.5), demonstrating that even without a theme, Boccaccio's themes reassert themselves."}, {"text": "IX.7 (prophetic dreams) and IX.10 (peasant comedy) introduce entirely new themes absent from earlier days.", "isCorrect": false, "rationale": "The commentary's point is the opposite — that Day IX revisits familiar themes rather than introducing entirely new ones."}, {"text": "IX.3 (Calandrino's pregnancy) and IX.9 (Solomon's advice) represent the two most original stories in the Decameron.", "isCorrect": false, "rationale": "The commentary uses IX.2 and IX.6 as illustrations of Day IX revisiting established themes, not IX.3 and IX.9."}, {"text": "IX.1 (Madonna Francesca) and IX.4 (Cecco di Fortarigo) mark the peak of the beffa cycle begun in Day VII.", "isCorrect": false, "rationale": "Day IX is described as pulling back from the intensity of the beffa cycles, not reaching their peak."}], "id": "q15"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
