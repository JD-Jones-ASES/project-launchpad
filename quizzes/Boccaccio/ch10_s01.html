    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Boccaccio.html">&larr; Back to Tales of the Decameron (Boccaccio)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 10, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How does the structural function of Day IX compare to Day I within the broader arc of the Decameron?", "options": [{"text": "Day IX acts as a reprise that revisits established themes, whereas Day I serves as an overture introducing them.", "isCorrect": true, "rationale": "The commentary describes IX as a lighter return to familiar territory before the finale, contrasting it with the introductory nature of Day I."}, {"text": "Day IX introduces the work's most complex moral dilemmas, while Day I focuses on simple comic relief.", "isCorrect": false, "rationale": "The source material explicitly states that IX offers gentler comic relief compared to the intense moral cycles of previous days."}, {"text": "Day IX establishes the strict thematic constraints that were absent in the 'free theme' of Day I.", "isCorrect": false, "rationale": "Both Day I and Day IX are noted for having no prescribed subject or theme."}, {"text": "Day IX serves as a somber meditation on death, mirroring the opening descriptions in Day I.", "isCorrect": false, "rationale": "Day IX is characterized as having a 'gentler' tone and 'easier laughter' rather than being somber."}]}, {"question": "What technical narrative device does Boccaccio use in the tale of the inn at Forlì (IX.6) to enhance the 'bed-trick' tradition?", "options": [{"text": "Precise spatial choreography and room layout", "isCorrect": true, "rationale": "Boccaccio describes the physical setting with the care of a stage designer to allow the audience to follow the movements in the dark."}, {"text": "The use of rhymed verse to mirror French fabliaux", "isCorrect": false, "rationale": "Boccaccio is noted for transforming the traditional verse fabliau into prose novella."}, {"text": "Allegorical representation of the characters' moral failings", "isCorrect": false, "rationale": "The text states Boccaccio moves away from allegorical frameworks toward a new kind of literary realism."}, {"text": "Complex internal monologues of the confused characters", "isCorrect": false, "rationale": "The comedy arises from concrete details and external circumstances rather than elaborate psychological exploration."}]}, {"question": "The text argues that Boccaccio's anticlerical tales are 'corrective, not destructive.' What is the basis for this distinction?", "options": [{"text": "They target the hypocrisy of institutional administrators rather than the faith itself.", "isCorrect": true, "rationale": "The satire holds the Church accountable to its own standards, assuming a world where God and moral law are still valid."}, {"text": "They suggest that the medieval Church was beyond reform and should be abolished.", "isCorrect": false, "rationale": "The text asserts the Decameron is not an atheist text and does not seek to destroy the faith."}, {"text": "They focus exclusively on the failures of low-level lay brothers rather than high-ranking officials.", "isCorrect": false, "rationale": "The satire includes high-ranking figures like an abbess, showing the critique is not limited to lower levels."}, {"text": "They use humor to mask a secret agenda of secular humanism.", "isCorrect": false, "rationale": "The commentary states the satire is an overt attempt to address the gap between profession and practice."}]}, {"question": "How does the commentary interpret the placement of Tale IX.9, regarding Solomon's advice on domestic violence?", "options": [{"text": "The specific narrator and placement invite a critical reading despite the lack of explicit condemnation.", "isCorrect": true, "rationale": "The text suggests the context of the story's telling allows for critical distance from its troubling medieval values."}, {"text": "Boccaccio uses the tale to advocate for a radical modernization of marital laws.", "isCorrect": false, "rationale": "The source material notes the tale reflects medieval attitudes and lacks explicit modern condemnation."}, {"text": "The tale is intended as a parody of Solomon’s biblical wisdom.", "isCorrect": false, "rationale": "There is no mention of the tale being a parody; rather, it reflects historical attitudes toward authority."}, {"text": "It is meant to be the moral centerpiece of Day IX to show the value of discipline.", "isCorrect": false, "rationale": "The commentary describes the tale as 'troubling' and notes that Day IX generally has less pressing moral questions."}]}, {"question": "According to Erich Auerbach’s 'Mimesis', what defines the 'new kind of literary realism' found in the Decameron?", "options": [{"text": "Taking the everyday world seriously without requiring an allegorical framework.", "isCorrect": true, "rationale": "Auerbach argued Boccaccio's work treats mundane reality as a subject for art independently of medieval allegory."}, {"text": "The use of strict historical accuracy in describing 14th-century Florence.", "isCorrect": false, "rationale": "Realism here refers to the treatment of the subject matter, not necessarily the literal truth of every detail."}, {"text": "The rejection of all comedic elements in favor of grim social commentary.", "isCorrect": false, "rationale": "The Decameron is noted for its wide range, including extensive comedy and farce."}, {"text": "Representing the world as a direct manifestation of divine will.", "isCorrect": false, "rationale": "Auerbach's point is that Boccaccio moves away from such overarching spiritual or allegorical requirements."}]}, {"question": "What does the tale of Talano d'Imolese (IX.7) suggest about the medieval worldview?", "options": [{"text": "Dreams were considered significant premonitions or messages.", "isCorrect": true, "rationale": "The source explains that dreams were taken seriously in the Middle Ages as potential warnings from God."}, {"text": "Stubbornness was legally punishable by exile.", "isCorrect": false, "rationale": "While the tale warns against stubbornness, the consequence is physical (a wolf attack), not legal."}, {"text": "Rationalism was beginning to override superstitious beliefs about nature.", "isCorrect": false, "rationale": "The tale emphasizes the accuracy of a supernatural dream, which supports traditional beliefs over rational skepticism."}, {"text": "The woods were viewed as a place of spiritual purification.", "isCorrect": false, "rationale": "In this tale, the woods are presented as a place of danger where a wolf attack occurs."}]}, {"question": "Which recurring character in Day IX is the victim of repeated Florentine practical jokes in Tales IX.3 and IX.5?", "options": [{"text": "Calandrino", "isCorrect": true, "rationale": "Calandrino is the 'gullible fool' who is tricked into believing he is pregnant and that a magic scroll can win him love."}, {"text": "Ciacco", "isCorrect": false, "rationale": "Ciacco is a glutton who actually takes revenge on a trickster in IX.8."}, {"text": "Cecco Angiolieri", "isCorrect": false, "rationale": "Cecco Angiolieri is a poet and gambler who is the subject of Tale IX.4, not the victim of the Florentine trio."}, {"text": "Donno Gianni", "isCorrect": false, "rationale": "Donno Gianni is the priest performing a 'transformation' in IX.10, not a victim of practical jokes."}]}, {"question": "What is the primary motive behind the actions in the tale of Biondello and Ciacco (IX.8)?", "options": [{"text": "Revenge for a social slight involving a deceptive dinner.", "isCorrect": true, "rationale": "Ciacco takes revenge on Biondello after being tricked into expecting a fine meal that never existed."}, {"text": "A dispute over the ownership of a rare hunting falcon.", "isCorrect": false, "rationale": "The story centers on gluttony and social tricks, not animals or property."}, {"text": "A theological debate between two competing friars.", "isCorrect": false, "rationale": "The characters are part of Florentine street life and the tale focuses on wit and gluttony."}, {"text": "The pursuit of the same woman by two rival suitors.", "isCorrect": false, "rationale": "This plot describes Tale IX.1 (Madonna Francesca), not the story of Ciacco."}]}, {"question": "Why does the narrator Dioneo traditionally tell the final tale of each Day, such as Tale IX.10?", "options": [{"text": "To maintain the tradition of ending each day with the most irreverent story.", "isCorrect": true, "rationale": "The commentary notes that Dioneo's closing stories, like the one about the farmer's wife and the 'tail,' are consistently coarse and irreverent."}, {"text": "To provide a solemn moral summary of the day's themes.", "isCorrect": false, "rationale": "Dioneo's stories are described as bawdy and irreverent, which is the opposite of a solemn summary."}, {"text": "Because he is the only narrator permitted to speak on religious topics.", "isCorrect": false, "rationale": "All narrators tell stories involving the clergy, but Dioneo specifically enjoys the most provocative ones."}, {"text": "To ensure the Day ends with a story that praises the nobility.", "isCorrect": false, "rationale": "Dioneo's tale in IX.10 is a 'coarse fabliau-type' about a farmer and a priest, not a praise of nobility."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
