<script>
var QUESTIONS = [{"question": "In the context of the Decameron, which quality distinguishes the 'beffa' from a simple prank or a 'motto'?", "options": [{"text": "The requirement of physical harm to the victim.", "isCorrect": false, "rationale": "While the beffa can range to calculated cruelty, physical harm is not a defining characteristic or requirement of the form."}, {"text": "The demonstration of 'ingegno' and resourcefulness in the trickster.", "isCorrect": true, "rationale": "Boccaccio views the beffa as a test of intelligence, verbal skill, and the ability to turn circumstances to one's advantage."}, {"text": "The use of a singular witty remark to resolve a conflict.", "isCorrect": false, "rationale": "This describes the 'motto', which the text identifies as the other great engine of comedy, distinct from the elaborate deception of the beffa."}, {"text": "The presence of a supernatural element to facilitate the trick.", "isCorrect": false, "rationale": "While supernatural stories (like ghosts) may be used as tools within a beffa, the trick itself relies on human cunning, not actual magic."}], "id": "q01"}, {"question": "What does the text suggest is a primary reason the husbands in Day VII are so easily deceived by their wives?", "options": [{"text": "The husbands possess a low level of education compared to their wives.", "isCorrect": false, "rationale": "The text does not correlate the success of the beffa with the formal education levels of the characters involved."}, {"text": "A psychological desire to preserve domestic order and trust.", "isCorrect": true, "rationale": "Boccaccio adds depth by showing that husbands often choose to believe their wives to avoid the humiliation of truth or the disruption of their household."}, {"text": "The husbands are consistently portrayed as inherently stupid or 'simpletons'.", "isCorrect": false, "rationale": "While some husbands are described as simple, the commentary emphasizes that even clever men are duped because they 'want to believe'."}, {"text": "The wives use supernatural charms and potions to cloud their judgment.", "isCorrect": false, "rationale": "The tales focus on psychological manipulation and verbal skill rather than magical intervention."}], "id": "q02"}, {"question": "How does Boccaccio's narrative approach to adultery in Day VII differ significantly from that of his contemporary, Dante Alighieri?", "options": [{"text": "Boccaccio treats adultery as a sin requiring divine punishment.", "isCorrect": false, "rationale": "This is actually Dante's perspective in the Inferno; Boccaccio takes a more secular and analytical approach."}, {"text": "Boccaccio views adultery as a social fact to be understood rather than a sin to be punished.", "isCorrect": true, "rationale": "Boccaccio moves away from moral outrage to focus on the drama, danger, and contest of wits inherent in the situation."}, {"text": "Boccaccio creates a more idealized and romanticized version of marital infidelity.", "isCorrect": false, "rationale": "The text explicitly states that Boccaccio's view is neither idealized nor cynical, but rather focused on the reality of human desire."}, {"text": "Boccaccio focuses on the legal repercussions of adultery in 14th-century Florence.", "isCorrect": false, "rationale": "The tales prioritize the 'beffa' and the triumph of intelligence over the institutional or legal consequences."}], "id": "q03"}, {"question": "Which historical tension in 14th-century Florence serves as the foundation for the conflicts in Day VII?", "options": [{"text": "The conflict between the merchant class and the landed nobility regarding land rights.", "isCorrect": false, "rationale": "While both classes appear in the Decameron, this specific socio-economic conflict is not the primary driver of the Day VII marital themes."}, {"text": "The gap between Church ideals of marital fidelity and the social reality of arranged marriages.", "isCorrect": true, "rationale": "The tension arises because marriages were often economic arrangements that disregarded personal desire, leading to the use of wit to satisfy those needs."}, {"text": "The legal dispute between Canon law and the civil laws regarding the status of dowries.", "isCorrect": false, "rationale": "Dowries were essential, but the primary conflict discussed is the lack of personal consent and emotional fulfillment within the institution."}, {"text": "The theological debate over whether marriage was a sacrament or a secular contract.", "isCorrect": false, "rationale": "The Church taught marriage was a sacrament; the conflict was the practical application of this ideal in a world of arranged alliances."}], "id": "q04"}, {"question": "According to the comparison with Geoffrey Chaucer, what is a key structural difference between the tales of the Decameron and the Canterbury Tales?", "options": [{"text": "Chaucer's tales are purely humorous, while Boccaccio's are always moralistic.", "isCorrect": false, "rationale": "Both authors use humor; the difference lies in the relationship between the narrator and the story told."}, {"text": "Boccaccio's narrators are interchangeable, whereas Chaucer's narrators' personalities shape their stories.", "isCorrect": true, "rationale": "In Chaucer, the social class and motives of the pilgrim (like the Miller) are central, while in Boccaccio, the meaning is carried by the tale itself."}, {"text": "Boccaccio uses the 'fabliau' tradition, while Chaucer rejects it in favor of epic poetry.", "isCorrect": false, "rationale": "Both authors utilize the fabliau tradition to explore social ideals and human reality."}, {"text": "Chaucer focuses on the cleverness of wives, while Boccaccio focuses on the cleverness of husbands.", "isCorrect": false, "rationale": "Both authors, especially in Day VII for Boccaccio, feature clever wives as the primary tricksters."}], "id": "q05"}, {"question": "In Novel VII.5, how does the wife use the husband's own suspicion to deceive him?", "options": [{"text": "She poisons him with a sleeping draught during his 'confession'.", "isCorrect": false, "rationale": "The deception is purely psychological and involves a false confession, not physical incapacitation."}, {"text": "She invents a story about a priest who visits her, leading the husband to guard the wrong door.", "isCorrect": true, "rationale": "She recognizes her disguised husband and plays into his fears, ensuring he is busy elsewhere while she meets her actual lover."}, {"text": "She convinces the neighbors that he has gone mad and lost his religious faith.", "isCorrect": false, "rationale": "This type of public shaming occurs in other tales (like VII.4), but VII.5 centers on the double-bluff of the confession."}, {"text": "She reports him to the local Bishop for impersonating a man of the cloth.", "isCorrect": false, "rationale": "While he is impersonating a priest, her goal is to facilitate her affair, not involve the Church authorities."}], "id": "q06"}, {"question": "The tale of Tingoccio and Meuccio (VII.10) is categorized as 'theological comedy' because it:", "options": [{"text": "Proves that only the clergy are exempt from the punishments of the afterlife.", "isCorrect": false, "rationale": "The tale actually suggests that laypeople (like Tingoccio) are also exempt from specific 'spiritual' sins."}, {"text": "Humorously suggests that spiritual incest carries no penalty in the afterlife.", "isCorrect": true, "rationale": "The punchline undermines Church teaching regarding sexual relations with a 'comare' (godmother), treating it as a non-issue in the afterlife."}, {"text": "Depicts a literal battle between angels and demons for a man's soul.", "isCorrect": false, "rationale": "The tale involves a ghost returning to speak to a friend, not a divine battle."}, {"text": "Argues that marriage is not recognized by God as a sacred bond.", "isCorrect": false, "rationale": "The focus is specifically on the subversion of rules regarding godparent relationships, not marriage as a whole."}], "id": "q07"}, {"question": "Which literary antecedent is cited as the most important influence on Boccaccio's 'beffa' tradition?", "options": [{"text": "The tragic Greek plays regarding domestic betrayal.", "isCorrect": false, "rationale": "The beffa is fundamentally comic and trick-based, aligning it with different genres than Greek tragedy."}, {"text": "The French 'fabliaux' of the twelfth and thirteenth centuries.", "isCorrect": true, "rationale": "These short, humorous verse tales frequently featured clever wives and cuckolded husbands, providing the direct blueprint for the beffa."}, {"text": "The Roman legal codes regarding marriage and property.", "isCorrect": false, "rationale": "While legal realities inform the setting, the literary structure and spirit come from the fabliaux tradition."}, {"text": "The high courtly love poetry of the Sicilian School.", "isCorrect": false, "rationale": "Courtly love is often earnest and idealized, whereas the fabliaux and the beffa are gritty, humorous, and practical."}], "id": "q08"}, {"question": "In Novel VII.4, how does Monna Ghita turn the tables on her husband Tofano when he locks her out?", "options": [{"text": "She calls the city guards to arrest him for domestic negligence.", "isCorrect": false, "rationale": "She uses social pressure and a clever ruse rather than direct legal intervention."}, {"text": "She fakes a suicide attempt to lure him out, then locks him out and shames him publicly.", "isCorrect": true, "rationale": "By throwing a stone into a well, she makes him believe she jumped; when he rushes to help, she takes his place inside."}, {"text": "She uses a string tied to her toe to alert her lover to come and rescue her.", "isCorrect": false, "rationale": "The string trick is the central mechanism of Novel VII.8, not VII.4."}, {"text": "She burns down the front door to regain entry to the household.", "isCorrect": false, "rationale": "The beffa relies on 'ingegno' (wit), not brute force or destructive violence."}], "id": "q09"}, {"question": "What is the specific 'marker of foolish credulity' Boccaccio often uses, as seen in the story of Gianni Lotteringhi (VII.1)?", "options": [{"text": "A character's obsession with accumulation of wealth.", "isCorrect": false, "rationale": "Boccaccio often celebrates merchant intelligence; greed is not his standard marker for being easily tricked."}, {"text": "Devotion to religious 'confraternite' or lay societies.", "isCorrect": true, "rationale": "Boccaccio uses religious simple-mindedness and devotion to these societies to indicate a character is ripe for a beffa."}, {"text": "A character's excessive pride in their noble lineage.", "isCorrect": false, "rationale": "While vanity can be a flaw, the text specifically identifies religious devotion in VII.1 as the marker of the husband's gullibility."}, {"text": "The inability to read or write in the vernacular.", "isCorrect": false, "rationale": "Intelligence in the Decameron is measured by 'ingegno' and wit, not necessarily formal literacy."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
