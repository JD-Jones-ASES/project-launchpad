    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

</div>

<script>
var QUESTIONS = [{"question": "According to the source material, why would a medieval audience have viewed Tancred’s refusal to remarry his daughter as a failure of paternal duty?", "options": [{"text": "Fathers were legally required to relinquish control of widowed daughters to the Church.", "isCorrect": false, "rationale": "While the Church had influence, the text specifically identifies the expectation of arranging suitable marriages as the primary paternal duty mentioned."}, {"text": "A father was expected to actively arrange suitable marriages for his children to ensure their social and personal welfare.", "isCorrect": true, "rationale": "The text explains that Tancred's possessive devotion was seen as selfish because it interfered with the societal expectation of providing for a daughter's future through marriage."}, {"text": "Widowed daughters were considered a financial burden that fathers were obligated to transfer to a new husband.", "isCorrect": false, "rationale": "The text focuses on the social and moral failure of the father's duty rather than financial motivations or burdens."}, {"text": "The law of Salerno mandated that widows must be remarried within a year of their husband's death.", "isCorrect": false, "rationale": "The text mentions the failure as a matter of custom and duty rather than a specific local mandate or law."}]}, {"question": "What 'novel expedient' did Ghismonda use to deliver her first set of instructions to Guiscardo?", "options": [{"text": "She hid a coded message within a hollowed-out book from her father's library.", "isCorrect": false, "rationale": "While books were common in medieval stories, the text specifies a different household object used for the message."}, {"text": "She whispered the details to him while he served her father during a banquet.", "isCorrect": false, "rationale": "The text notes that she was shy of making any confidant and preferred a secret written method over a public verbal one."}, {"text": "She placed a letter inside a cane and told him to use it as a bellows for his fire.", "isCorrect": true, "rationale": "Ghismonda hid the letter in the space between the knots of a cane, providing a clever excuse for him to take it home privately."}, {"text": "She tied a note to a stone and threw it through the window of his quarters.", "isCorrect": false, "rationale": "The text describes a more subtle and direct delivery method involving a gift of a cane."}]}, {"question": "Ghismonda’s argument that virtue, not birth, determines true nobility is noted for anticipating which intellectual movement?", "options": [{"text": "The Enlightenment", "isCorrect": false, "rationale": "The Enlightenment occurred much later; the text specifically links her views to the transition into the Renaissance."}, {"text": "Scholasticism", "isCorrect": false, "rationale": "Scholasticism was a dominant medieval method of learning, but her specific argument regarding human virtue aligns with a later movement."}, {"text": "Renaissance Humanism", "isCorrect": true, "rationale": "The text states that her speech anticipates the central ideas of Renaissance humanism, echoed by later thinkers like Pico della Mirandola."}, {"text": "Stoicism", "isCorrect": false, "rationale": "While she shows dignity and resolve, the text focuses on the humanist shift regarding the source of nobility and virtue."}]}, {"question": "How did Tancred accidentally discover the secret affair between Ghismonda and Guiscardo?", "options": [{"text": "He followed a trail of leather scraps leading from the grotto to her bedroom.", "isCorrect": false, "rationale": "The leather suit is mentioned as Guiscardo's attire, but it was not the means by which the affair was discovered."}, {"text": "He fell asleep in her room behind a bed curtain while waiting to speak with her.", "isCorrect": true, "rationale": "Tancred entered the room while she was in the garden, fell asleep on a divan behind the curtains, and woke up while the lovers were present."}, {"text": "He caught Guiscardo climbing the rope ladder from the grotto's orifice.", "isCorrect": false, "rationale": "Tancred's men caught Guiscardo later that night, but the initial discovery happened inside the bedroom."}, {"text": "One of Ghismonda’s damsels betrayed her secret to the Prince.", "isCorrect": false, "rationale": "The text explicitly states that Ghismonda kept the matter secret and Tancred discovered it alone by chance."}]}, {"question": "In her speech to her father, what does Ghismonda identify as the 'prime cause' of her actions?", "options": [{"text": "The inherent corruption of the courtly lifestyle.", "isCorrect": false, "rationale": "She mentions luxury as an influence, but she identifies her own nature and Tancred's negligence as the primary drivers."}, {"text": "Guiscardo’s manipulation of her feelings.", "isCorrect": false, "rationale": "She defends Guiscardo and takes full responsibility for luring him to her love."}, {"text": "The fact that she is a creature of 'flesh and blood' and her father's failure to provide a husband.", "isCorrect": true, "rationale": "She argues that she is human with natural desires and that Tancred ignored her biological reality and need for marriage."}, {"text": "Fortune’s desire to see a princess fall into low condition.", "isCorrect": false, "rationale": "She blames Fortune for Guiscardo's low birth, but not as the cause of her personal decision to love him."}]}, {"question": "What was Guiscardo’s only recorded response when Tancred confronted him with the 'outrage and dishonour' of the affair?", "options": [{"text": "He claimed that Ghismonda had forced him into the relationship.", "isCorrect": false, "rationale": "Guiscardo remained noble in character and did not shift blame to his lover."}, {"text": "He argued that his native worth made him a suitable match for the Princess.", "isCorrect": false, "rationale": "While Ghismonda makes this argument later, Guiscardo’s own response is much briefer and more focused on the nature of love."}, {"text": "He said, 'Love is more potent than either you or I.'", "isCorrect": true, "rationale": "Guiscardo offers a simple but profound defense, suggesting that love is an unstoppable force that transcends social and paternal authority."}, {"text": "He begged for mercy for Ghismonda, while accepting his own death.", "isCorrect": false, "rationale": "The text records a very specific, short statement about the power of love rather than a plea for mercy."}]}, {"question": "How did Ghismonda ensure she would die shortly after receiving the heart of Guiscardo?", "options": [{"text": "She used the same dagger that killed Guiscardo to stab herself.", "isCorrect": false, "rationale": "While she dies with the heart, she does not use a weapon; she uses a prepared liquid."}, {"text": "She drank water distilled from poisonous herbs that she had prepared in advance.", "isCorrect": true, "rationale": "Anticipating the worst, Ghismonda had already distilled poisonous water to use once she confirmed Guiscardo was dead."}, {"text": "She refused all food and water until her grief overcame her.", "isCorrect": false, "rationale": "Her death is portrayed as a resolute and immediate act of suicide rather than a slow decline from starvation."}, {"text": "She inhaled the fumes of a toxic substance placed inside the golden cup.", "isCorrect": false, "rationale": "She combined the poison with the heart in the cup and drank it."}]}, {"question": "Tancred is described as being 'distraught' between two conflicting emotions when deciding how to deal with his daughter. What are these two emotions?", "options": [{"text": "Fear of public scandal and religious guilt.", "isCorrect": false, "rationale": "Though he mentions dishonour, the primary conflict is internal and emotional rather than external or theological."}, {"text": "Paternal love and just indignation.", "isCorrect": true, "rationale": "The Prince struggles between the immense love he bears for his daughter and the anger caused by her 'signal folly' and dishonour."}, {"text": "Political ambition and personal grief.", "isCorrect": false, "rationale": "Tancred's motivations throughout the story are centered on his possessive love for his daughter, not politics."}, {"text": "Greed for her inheritance and hatred for Guiscardo.", "isCorrect": false, "rationale": "There is no mention of financial greed; his actions are driven by his emotional obsession with Ghismonda."}]}, {"question": "What irony exists in Tancred's final gift of the heart in a golden chalice, according to Ghismonda's response?", "options": [{"text": "She notes that gold is too common for such a noble heart.", "isCorrect": false, "rationale": "She actually praises the choice, stating that a less honourable sepulture would have been unfitting."}, {"text": "She views it as a sign that Tancred has finally forgiven Guiscardo's low birth.", "isCorrect": false, "rationale": "The gift is intended as a cruel punishment, not a gesture of forgiveness or social elevation."}, {"text": "She interprets the cruel punishment as her father’s 'last and greatest act of love' by providing Guiscardo a worthy burial.", "isCorrect": true, "rationale": "Ghismonda subverts Tancred's cruelty by thanking him for the 'goodly present' and using it as the vessel for her own death."}, {"text": "She points out that Tancred's own heart is far colder than the one in the cup.", "isCorrect": false, "rationale": "While she is critical of his actions, her response focuses on the dignity of the heart and the 'tender' nature of the gift in a tragic sense."}]}, {"question": "What was the eventual fate of the two lovers' remains?", "options": [{"text": "Guiscardo was cast into the sea, while Ghismonda was buried in the royal vault.", "isCorrect": false, "rationale": "Tancred initially intended to dispose of Guiscardo, but he changed his mind after Ghismonda's death."}, {"text": "They were both burned on a pyre to cleanse the dishonour of the palace.", "isCorrect": false, "rationale": "The text describes an interment (burial) rather than a cremation."}, {"text": "They were honourably interred side by side in the same tomb.", "isCorrect": true, "rationale": "Moved by regret, Tancred granted Ghismonda’s final wish that they be united in death and buried together in Salerno."}, {"text": "Ghismonda was buried alone, and Guiscardo’s heart was returned to his family.", "isCorrect": false, "rationale": "The story ends with the public mourning of Salerno and the unification of the lovers in one grave."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
