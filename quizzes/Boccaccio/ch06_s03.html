<script>
var QUESTIONS = [{"question": "What primary reason do Nastagio's kinsfolk and friends give for urging him to leave Ravenna?", "options": [{"text": "To escape the political instability and warring factions of the city.", "isCorrect": false, "rationale": "While Ravenna was an ancient and notable city, the text specifically focuses on Nastagio's personal affairs rather than regional politics."}, {"text": "To prevent him from wasting both his personal health and his inherited fortune.", "isCorrect": true, "rationale": "His family was concerned that his extravagant spending and unrequited obsession were leading to both physical and financial ruin."}, {"text": "To find a more suitable bride from a higher-ranking noble family in France.", "isCorrect": false, "rationale": "Although Nastagio loves a woman of higher birth, his friends' goal is to help him forget her, not to find a replacement in another country."}, {"text": "To fulfill a mandatory military service required of young noblemen at the time.", "isCorrect": false, "rationale": "The text mentions a journey to France or Spain only as a pretext for his departure, not as a legal or military obligation."}], "id": "q01"}, {"question": "Where does Nastagio actually establish his camp after pretending to leave for France or Spain?", "options": [{"text": "The port of Ravenna, waiting for a ship.", "isCorrect": false, "rationale": "Nastagio moves away from the city center but does not stay at the docks or prepare for a sea voyage."}, {"text": "A secluded villa in the mountains of Romagna.", "isCorrect": false, "rationale": "The setting is described as a specific location near the pine forests, not a mountain retreat."}, {"text": "A place called Chiassi, roughly three miles from the city.", "isCorrect": true, "rationale": "Nastagio halts at Chiassi to pitch his pavilions, allowing him to live lordly while staying close to his home city."}, {"text": "The ruins of an ancient Byzantine palace.", "isCorrect": false, "rationale": "While Ravenna is famous for Byzantine history, Nastagio chooses a site where he can set up tents and entertain guests in a natural setting."}], "id": "q02"}, {"question": "According to the knight in the vision, why is the damsel he pursues condemned to the 'pains of hell'?", "options": [{"text": "She committed the sin of adultery with a rival of the knight.", "isCorrect": false, "rationale": "There is no mention of adultery; her sin is specifically related to her lack of compassion for her lover."}, {"text": "She practiced witchcraft to induce the knight's despair.", "isCorrect": false, "rationale": "The supernatural elements are a punishment for her moral failings in a relationship, not for practicing magic."}, {"text": "She died without repenting for her cruelty and for the joy she took in his suffering.", "isCorrect": true, "rationale": "The knight explains that her condemnation stems from her lack of remorse regarding his suicide and her continued pride."}, {"text": "She was responsible for the death of the knight's father in a family feud.", "isCorrect": false, "rationale": "The conflict is strictly romantic and personal, involving the knight's unrequited love and subsequent suicide."}], "id": "q03"}, {"question": "What is the specific nature of the 'infernal hunt' witnessed by Nastagio?", "options": [{"text": "A knight is chased by a pack of wolves for betraying his lord.", "isCorrect": false, "rationale": "The vision involves a knight as the pursuer, not the one being pursued by animals."}, {"text": "A knight pursues a naked woman with dogs, kills her, and she subsequently revives.", "isCorrect": true, "rationale": "This motif involves the eternal reenactment of a crime and punishment where the victim is slaughtered and then restored to flee again."}, {"text": "A group of demons hunt the souls of those who died in the pine forest.", "isCorrect": false, "rationale": "The vision is specifically tied to the identities of Messer Guido degli Anastagi and his beloved, rather than general lost souls."}, {"text": "A lady is hunted by her own ancestors for refusing to marry.", "isCorrect": false, "rationale": "While the lady refused marriage, the huntsman is her former suitor, not her family members."}], "id": "q04"}, {"question": "How long is the knight destined to pursue the damsel?", "options": [{"text": "Until Nastagio's beloved agrees to marry him.", "isCorrect": false, "rationale": "The knight's punishment is independent of Nastagio's success, though Nastagio uses it to his advantage."}, {"text": "For eternity, as there is no release from the pains of hell.", "isCorrect": false, "rationale": "While he mentions 'eternal pains,' he specifies a calculation based on the duration of her earthly cruelty."}, {"text": "For as many years as the number of months she was harsh to him.", "isCorrect": true, "rationale": "The knight explicitly states that the length of the pursuit is mathematically tied to the duration of his suffering while he was alive."}, {"text": "Until a living witness intervenes with a holy relic.", "isCorrect": false, "rationale": "Nastagio's intervention is merely as a witness; he does not have the power to stop the divine decree."}], "id": "q05"}, {"question": "Why does Nastagio invite the Traversari family and their friends to breakfast in the pine forest?", "options": [{"text": "To celebrate his upcoming departure for France with a final feast.", "isCorrect": false, "rationale": "The breakfast is a calculated move to show them the vision, not a genuine farewell party."}, {"text": "To show them that he has found a new, more beautiful mistress in Chiassi.", "isCorrect": false, "rationale": "Nastagio is still very much in love with the Traversari daughter and has no intention of replacing her."}, {"text": "To ensure they witness the horrific vision at the exact time and place it occurs.", "isCorrect": true, "rationale": "Nastagio intentionally arranges the seating so his beloved will see the 'infernal hunt' and fear a similar fate."}, {"text": "To reconcile the long-standing feud between the Onesti and Traversari families.", "isCorrect": false, "rationale": "There is no mentioned feud; the conflict is entirely based on the lady's disdain for Nastagio's courtship."}], "id": "q06"}, {"question": "What is the 'vile woman's' heart compared to, according to the knight?", "options": [{"text": "A stone that cannot be broken by love.", "isCorrect": false, "rationale": "While it implies hardness, the knight uses specific adjectives to describe the temperature and accessibility of her heart."}, {"text": "A hard and cold heart to which neither love nor pity had access.", "isCorrect": true, "rationale": "The knight describes her heart as cold and inaccessible to emotion as he prepares to rip it out and feed it to his dogs."}, {"text": "A mirror that only reflects her own vanity.", "isCorrect": false, "rationale": "Although her vanity is mentioned as a reason for her pride, it is not the description used for the heart during the slaughter."}, {"text": "A poisonous fruit that withered his soul.", "isCorrect": false, "rationale": "The knight's description is more anatomical and visceral, focusing on the literal extraction of her internal parts."}], "id": "q07"}, {"question": "What is the immediate reaction of Nastagio's beloved after seeing the vision during the breakfast?", "options": [{"text": "She faints from terror and must be carried back to Ravenna.", "isCorrect": false, "rationale": "She remains conscious and active enough to take immediate steps to change her situation that very night."}, {"text": "She feels so much pity for the knight that she falls in love with his memory.", "isCorrect": false, "rationale": "Her primary motivation is fear for her own safety, not sympathy for the ghostly knight."}, {"text": "She converts her aversion into affection and sends a chambermaid to Nastagio.", "isCorrect": true, "rationale": "Driven by the terror of suffering the same fate, she immediately changes her attitude and offers herself to him."}, {"text": "She accuses Nastagio of practicing necromancy to frighten her.", "isCorrect": false, "rationale": "The text suggests she accepts the vision as a divine warning rather than a trick or sorcery performed by Nastagio."}], "id": "q08"}, {"question": "In the context of the story's conclusion, what broader social change occurs in Ravenna?", "options": [{"text": "The noble families of Ravenna banned hunting in the pine forests.", "isCorrect": false, "rationale": "The pine forests remain famous, and there is no mention of a ban on hunting."}, {"text": "The women of the city become much more compliant with men's desires.", "isCorrect": true, "rationale": "Filomena concludes that the terror inspired by the event led all the ladies of Ravenna to be more yielding in their courtships."}, {"text": "The Traversari family loses their noble standing due to the scandal.", "isCorrect": false, "rationale": "The marriage actually solidifies the connection between the families, and they approve of the match."}, {"text": "A church was built on the spot in the forest to appease the ghosts.", "isCorrect": false, "rationale": "The story ends with marriage and social compliance, not with the construction of religious monuments."}], "id": "q09"}, {"question": "Which detail identifies the knight in the vision as Guido degli Anastagi?", "options": [{"text": "He wears the coat of arms of the Onesti family.", "isCorrect": false, "rationale": "The knight identifies himself by name and mentions he was from the same city, but he does not wear Nastagio's specific coat of arms."}, {"text": "He tells Nastagio his name and that he knew him when Nastagio was a small boy.", "isCorrect": true, "rationale": "The knight provides his name and establishes a prior connection to Nastagio's childhood in Ravenna."}, {"text": "He carries a banner representing the city of Romagna.", "isCorrect": false, "rationale": "His appearance is described as 'sadly accoutred' and wrathful, focusing on his weapon and horse rather than banners."}, {"text": "The damsel calls out his name while begging for mercy.", "isCorrect": false, "rationale": "The damsel shrieks for mercy, but it is the knight who introduces himself to the startled Nastagio."}], "id": "q10"}, {"question": "When Nastagio first hears the shrieks in the woods, what is his initial emotional state?", "options": [{"text": "He is in a state of high spirits after a successful hunt.", "isCorrect": false, "rationale": "Nastagio was not hunting; he was wandering alone to meditate on his sorrows."}, {"text": "He is 'wrapt in thought' and 'brooding on the cruelty of his mistress.'", "isCorrect": true, "rationale": "His 'sweet melancholy' is interrupted by the screams, as he was wandering specifically to indulge in his thoughts about his unrequited love."}, {"text": "He is terrified because of local legends about the haunted pine wood.", "isCorrect": false, "rationale": "Nastagio seems unaware of the vision's recurrence until he actually witnesses it and talks to the knight."}, {"text": "He is hungry and looking for his servants to bring him food.", "isCorrect": false, "rationale": "The text explicitly states he was 'recking neither of food nor of aught else' while he walked."}], "id": "q11"}, {"question": "What does Filomena suggest is the purpose of telling this 'delightsome' yet 'touching' story?", "options": [{"text": "To entertain the group with a ghost story suited for the dark forest.", "isCorrect": false, "rationale": "While the story is supernatural, Filomena states a specific moral objective for her audience of ladies."}, {"text": "To prove that ghosts are real and that divine justice is visible on earth.", "isCorrect": false, "rationale": "The focus is less on the theology of ghosts and more on the behavioral lesson for the women listening."}, {"text": "To dispose the ladies to banish the passion of cruelty from their souls.", "isCorrect": true, "rationale": "She frames the story as a warning that 'Divine justice suffers not our cruelty to escape severe chastisement.'"}, {"text": "To explain the historical origins of the pine forests of Ravenna.", "isCorrect": false, "rationale": "The forest provides the setting, but the story is intended as a moral example regarding love."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
