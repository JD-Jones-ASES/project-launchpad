<script>
var QUESTIONS = [{"question": "Which translation of the Decameron is identified in the text as being the most widely regarded for its accuracy, fluency, and the depth of its annotations?", "options": [{"text": "J.M. Rigg", "isCorrect": false, "rationale": "This translation, dating from 1903, is noted primarily for being in the public domain and available for free online rather than for its modern scholarly annotations."}, {"text": "Wayne A. Rebhorn", "isCorrect": false, "rationale": "Although this 2013 translation is described as excellent and helpful, it is not singled out as the 'best' or most 'richly annotated' in comparison to the Penguin edition."}, {"text": "G.H. McWilliam", "isCorrect": true, "rationale": "The guide specifically highlights the 1995 Penguin Classics edition of this translation as the gold standard for English readers due to its balance of accuracy and scholarly notes."}, {"text": "Jonathan Usher", "isCorrect": false, "rationale": "Usher is cited as a contributor to the Oxford Companion to Italian Literature rather than as a primary translator of the Decameron's full text."}]}, {"question": "Boccaccio's 'The Fates of Illustrious Men' (De casibus virorum illustrium) is cited as having a significant influence on which specific part of Geoffrey Chaucer's 'The Canterbury Tales'?", "options": [{"text": "The General Prologue", "isCorrect": false, "rationale": "The General Prologue is compared to Boccaccio’s brigata for its character gallery, but it does not draw its primary structural influence from the falls of great men."}, {"text": "The Monk's Tale", "isCorrect": true, "rationale": "Chaucer's collection of tragedies involving the downfall of historical and mythological figures was directly modeled after Boccaccio’s biographical sketches."}, {"text": "The Clerk's Tale", "isCorrect": false, "rationale": "This tale is a retelling of the story of Patient Griselda, which appears within the Decameron itself rather than Boccaccio’s later Latin biographical works."}, {"text": "The Franklin's Tale", "isCorrect": false, "rationale": "The text links this tale to Decameron X, 5 because both explore themes of generosity, not the biographical falls found in the 'De casibus' tradition."}]}, {"question": "How does the guide characterize the primary difference between Dante Alighieri's and Giovanni Boccaccio's literary treatments of love?", "options": [{"text": "Dante focuses on courtly romance while Boccaccio focuses on theological virtues.", "isCorrect": false, "rationale": "This reverses the actual distinction, as Dante is the one who treats love with religious and philosophical weight."}, {"text": "Dante treats love with theological seriousness while Boccaccio deliberately avoids it.", "isCorrect": true, "rationale": "The text explains that where Dante views love through a spiritual and heretical-theological lens, Boccaccio chooses to focus on its secular and human aspects."}, {"text": "Dante explores the social diversity of lovers whereas Boccaccio limits love to the Florentine elite.", "isCorrect": false, "rationale": "The guide notes social diversity as a distinction between Chaucer and Boccaccio, not between Boccaccio and Dante."}, {"text": "Dante utilizes prose to describe love while Boccaccio uses lyric verse.", "isCorrect": false, "rationale": "The guide actually notes that Boccaccio is known for his 'earthy prose' in contrast to the lyric tradition represented by Petrarch."}]}, {"question": "According to the scholarly analysis by Giuseppe Mazzotta, what is the 'ludic' function of the Decameron?", "options": [{"text": "To provide a strict moral guideline for the mercantile class of Florence.", "isCorrect": false, "rationale": "Mazzotta's reading moves beyond simple moralizing to look at how play functions as a philosophy rather than a set of rules."}, {"text": "To act as a historical chronicle of the 1348 Black Death.", "isCorrect": false, "rationale": "While the plague is the setting, Mazzotta's specific 'ludic' interpretation focuses on the interplay of fiction and social structures."}, {"text": "To meditate on the relationship between fiction, play, and the social order.", "isCorrect": true, "rationale": "Mazzotta views the work as a masterpiece that uses the concept of 'play' (ludus) to explore how storytelling and entertainment shape society."}, {"text": "To create a self-conscious parody of Boccaccio's own earlier biographies.", "isCorrect": false, "rationale": "Self-consciousness in storytelling is the focus of Millicent Marcus’s work, rather than the primary 'ludic' thesis proposed by Mazzotta."}]}, {"question": "Which work is suggested for readers interested in the intellectual currents and political life of Italy specifically from the year 1216 to 1380?", "options": [{"text": "Barbara W. Tuchman, 'A Distant Mirror'", "isCorrect": false, "rationale": "Tuchman's work focuses on the broad 14th century across Europe rather than providing a concise political introduction to Italy specifically."}, {"text": "John Larner, 'Italy in the Age of Dante and Petrarch'", "isCorrect": true, "rationale": "Larner's book is specifically identified as covering the Italian city-states and papacy during this precise chronological window."}, {"text": "Gene Brucker, 'Florence: The Golden Age'", "isCorrect": false, "rationale": "Brucker's scope is much wider, covering Florence from 1138 to 1737, rather than the specific 13th-14th century Italian survey mentioned."}, {"text": "John Kelly, 'The Great Mortality'", "isCorrect": false, "rationale": "Kelly's book focuses narrowly on the history of the plague pandemic from 1347–1351 rather than long-term political currents."}]}, {"question": "Millicent Marcus’s study 'An Allegory of Form' links the theme of literary self-consciousness to which specific tale within the Decameron?", "options": [{"text": "The story of Ser Ciappelletto (I, 1)", "isCorrect": false, "rationale": "This story is compared to Chaucer’s Pardoner's Tale for its exploration of hypocrisy, but is not the primary focus of Marcus's analysis in this context."}, {"text": "The story of Patient Griselda (X, 10)", "isCorrect": false, "rationale": "This tale is discussed primarily in relation to Chaucer's Clerk's Tale and the irony of the retelling."}, {"text": "The story of Madonna Oretta (VI, 1)", "isCorrect": true, "rationale": "Marcus use this specific tale, where a character attempts to tell a story and fails, to analyze Boccaccio's own reflection on the art of narrative."}, {"text": "The story of Paolo and Francesca", "isCorrect": false, "rationale": "This is a story from Dante’s Inferno (Canto V) mentioned in the guide, not a tale from the Decameron focused on by Marcus."}]}, {"question": "What unique distinction does Boccaccio's 'On Famous Women' (De mulieribus claris) hold in Western literature according to the text?", "options": [{"text": "It was the first encyclopedia of classical mythology written in prose.", "isCorrect": false, "rationale": "This description refers to 'The Genealogy of the Pagan Gods' rather than the biographical work."}, {"text": "It was the first collection of biographies devoted exclusively to women.", "isCorrect": true, "rationale": "The guide highlights this work as a pioneering effort in the Western tradition, covering women ranging from Eve to Queen Joanna of Naples."}, {"text": "It is the only work by Boccaccio written in the Florentine vernacular.", "isCorrect": false, "rationale": "The biographies were actually part of his Latin output, similar to 'The Fates of Illustrious Men'."}, {"text": "It provided the primary source material for Dante's female characters in Paradise.", "isCorrect": false, "rationale": "While Boccaccio revered Dante, this work followed Dante's Commedia and focused on historical/mythological biographies rather than theological ones."}]}, {"question": "Robert Hollander’s 'Boccaccio’s Two Venuses' is noted for exploring the tension between which two concepts in Boccaccio's work?", "options": [{"text": "History and Mythology", "isCorrect": false, "rationale": "While Boccaccio wrote on both, Hollander’s specific thesis focuses on the ethical dimensions of romance."}, {"text": "Poetry and Prose", "isCorrect": false, "rationale": "The guide mentions the prose/verse distinction regarding Petrarch, but not as the central theme of Hollander's ethical study."}, {"text": "Sacred and Profane love", "isCorrect": true, "rationale": "Hollander argues that despite the comic surface, there is an underlying moral seriousness addressing the conflict between divine and earthly affection."}, {"text": "Monarchy and Republicanism", "isCorrect": false, "rationale": "These political themes are more likely covered by historical texts like Larner or Brucker rather than Hollander's literary study."}]}, {"question": "How does the guide describe the relationship between Boccaccio’s 'The Life of Dante' and the literary culture of his time?", "options": [{"text": "It served as a critique of Dante's outdated theological views.", "isCorrect": false, "rationale": "The text states Boccaccio revered Dante 'above all others,' suggesting the work was a tribute rather than a critique."}, {"text": "It provides a window into the literary culture of 14th-century Italy.", "isCorrect": true, "rationale": "The guide suggests the biography is useful for understanding the cultural environment and Boccaccio's personal admiration for his predecessor."}, {"text": "It was the first fictionalized autobiography of a poet in Italian history.", "isCorrect": false, "rationale": "The work is described as a biography of the poet Dante, not a fictionalized version of Boccaccio's own life."}, {"text": "It was written as a direct rebuttal to Petrarch's 'Canzoniere'.", "isCorrect": false, "rationale": "Boccaccio and Petrarch were friends; the guide contrasts their styles but does not suggest Boccaccio's biography of Dante was a rebuttal to Petrarch."}]}, {"question": "Which scholarly resource is recommended for students who want a comprehensive overview of Boccaccio's life, works, and critical reception in a concise format?", "options": [{"text": "Boccaccio: A Critical Guide to the Complete Works", "isCorrect": false, "rationale": "While comprehensive, this edited volume is described as a 'scholarly companion' with specialized chapters rather than a concise research starting point."}, {"text": "The World at Play in Boccaccio's Decameron", "isCorrect": false, "rationale": "This is a specific thematic study by Mazzotta, not a general overview of Boccaccio's entire life and reception."}, {"text": "The Oxford Companion to Italian Literature", "isCorrect": true, "rationale": "The entry by Jonathan Usher in this companion is cited as an authoritative and concise starting point for research on Boccaccio."}, {"text": "A Distant Mirror: The Calamitous 14th Century", "isCorrect": false, "rationale": "This is a historical narrative by Tuchman that provides world background, not a literary guide to Boccaccio’s specific life and works."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
