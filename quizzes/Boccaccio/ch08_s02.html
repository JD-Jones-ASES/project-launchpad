        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Boccaccio.html">&larr; Back to Tales of the Decameron (Boccaccio)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 8, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which specific attribute of Dioneo makes him a particularly appropriate choice for the king of the Seventh Day?", "options": [{"text": "His reputation for being the most playful and irreverent narrator.", "isCorrect": true, "rationale": "The text explicitly states that Dioneo's irreverent nature makes him a fitting choice for a day centered on domestic deception and tricks."}, {"text": "His status as the eldest member of the storytelling company.", "isCorrect": false, "rationale": "While seniority often dictates leadership in medieval contexts, the source material focuses on his personality and storytelling privileges rather than his age."}, {"text": "His previous experience as a seneschal for the group.", "isCorrect": false, "rationale": "The seneschal is a separate figure responsible for logistics; Dioneo's role is defined by his narrative flexibility and humor."}, {"text": "His unique ability to choose the theme for every single day.", "isCorrect": false, "rationale": "Dioneo can choose any subject for his own tale regardless of the theme, but he does not dictate the theme for the entire company every day."}], "id": "q01"}, {"question": "According to the rubric of Day VII, what are the two primary motivations for the wives' deceptions?", "options": [{"text": "Love or their own preservation.", "isCorrect": true, "rationale": "The text quotes this phrasing directly from the Day's rubric to explain why the wives engage in the 'beffa'."}, {"text": "Greed or the desire for political power.", "isCorrect": false, "rationale": "While these might be common themes in other literature, the text specifies passion and self-interest/survival as the drivers for these specific tales."}, {"text": "Religious devotion or the instruction of others.", "isCorrect": false, "rationale": "The introduction suggests Boccaccio often subverts moralizing traditions rather than adhering to them for these stories."}, {"text": "Revenge for physical harm or theft.", "isCorrect": false, "rationale": "Although deceptions occur, the text focuses on 'love' and 'preservation' as the broader thematic categories for the wives' actions."}], "id": "q02"}, {"question": "How does Boccaccio's use of the 'exemplum' in the Decameron differ from its traditional medieval usage?", "options": [{"text": "He subverts the form by turning stories meant for moral lessons inside out.", "isCorrect": true, "rationale": "Traditionally used in sermons to teach morals, Boccaccio uses the form of the exemplum but often applies it to witty or bawdy situations that challenge traditional morality."}, {"text": "He strictly adheres to the Latin format to ensure the stories remain educational.", "isCorrect": false, "rationale": "The text notes that Boccaccio 'subverts' the form, suggesting a departure from the educational or moralizing intent of the traditional exempla."}, {"text": "He replaces the narrative structure with psychological realism.", "isCorrect": false, "rationale": "While he adds psychological realism, he does not replace the structure; he uses the form but changes its moral outcome."}, {"text": "He only uses exempla when the husband is portrayed as a virtuous figure.", "isCorrect": false, "rationale": "In Day VII, the husbands are typically characterized as foolish or jealous, which contradicts the traditional use of exempla to praise virtue."}], "id": "q03"}, {"question": "In the context of the Decameron, what does the term 'beffa' specifically refer to?", "options": [{"text": "A practical joke or elaborate deception.", "isCorrect": true, "rationale": "The text defines 'beffa' as a central comic motif involving tricks that range from harmless fun to calculated cruelty."}, {"text": "A short verse tale originating from France.", "isCorrect": false, "rationale": "This definition describes 'fabliaux,' not the 'beffa,' although the two concepts are related in the storytelling tradition."}, {"text": "The specific crown worn by the king or queen of the day.", "isCorrect": false, "rationale": "The 'beffa' refers to the action or plot of the story, not a physical object or title within the frame narrative."}, {"text": "A legal contract used to settle domestic disputes.", "isCorrect": false, "rationale": "The term refers to an informal and often deceptive trick, which is the opposite of a formal legal proceeding."}], "id": "q04"}, {"question": "What justifies the wives' deceptions in the majority of the tales told on the Seventh Day?", "options": [{"text": "The husbands are presented as jealous, foolish, or inattentive.", "isCorrect": true, "rationale": "Boccaccio shows sympathy for the wives by portraying the husbands as figures who 'deserve to be deceived' due to their own character flaws."}, {"text": "The laws of the Ladies' Vale require husbands to be tested.", "isCorrect": false, "rationale": "The Ladies' Vale is a scenic setting for the storytelling, not a place with its own legal requirement for marital testing."}, {"text": "Dioneo issues a decree that all wives must act out of malice.", "isCorrect": false, "rationale": "Dioneo sets the theme of 'tricks,' but the motivation is described as love or preservation, not a mandated malice from the king."}, {"text": "The wives are under a magic spell cast by the nightingales.", "isCorrect": false, "rationale": "The nightingales are part of the atmospheric setting; the wives' actions are driven by psychological realism and human desire."}], "id": "q05"}, {"question": "Which celestial body is identified as still glowing in the dawn sky as the company prepares for Day VII?", "options": [{"text": "Lucifer", "isCorrect": true, "rationale": "The text mentions that all stars had fled save for 'that which we call Lucifer,' referring to the morning star."}, {"text": "Venus", "isCorrect": false, "rationale": "While Venus is often the morning star, the text specifically uses the name 'Lucifer' to describe the light in the whitening dawn."}, {"text": "Polaris", "isCorrect": false, "rationale": "Polaris is the North Star; the text identifies the remaining light as the one associated with the dawn, specifically named Lucifer."}, {"text": "Mars", "isCorrect": false, "rationale": "Mars is not mentioned in the text; the narrator identifies a single remaining star in the eastern sky as Lucifer."}], "id": "q06"}, {"question": "Following their arrival at the Ladies' Vale, what activity does the group engage in immediately after breaking their fast?", "options": [{"text": "Singing in a chorus that echoed through the vale.", "isCorrect": true, "rationale": "The text describes how they fell to singing, with the vale and the birds responding to their strains."}, {"text": "The immediate start of the first story by Emilia.", "isCorrect": false, "rationale": "Several activities, including singing, observing fish, and sleeping, occur between breakfast and the start of storytelling."}, {"text": "Playing games of chance on the carpets.", "isCorrect": false, "rationale": "While they might have 'wonted diversions,' the primary group activity emphasized after breakfast is singing."}, {"text": "Bathing in the little lake to cool off.", "isCorrect": false, "rationale": "They observe the fish in the lake and sit beside it, but the text does not state they bathed in it during this time."}], "id": "q07"}, {"question": "What logistical detail provided by the seneschal ensured the comfort of the company during the afternoon in the vale?", "options": [{"text": "Beds equipped with French coverlets placed in diverse locations.", "isCorrect": true, "rationale": "The discreet seneschal furnished beds with 'store of French coverlets' so that those who wished could sleep after breakfast."}, {"text": "A series of temporary wooden pavilions built near the lake.", "isCorrect": false, "rationale": "The text mentions a 'living canopy of trees' rather than man-made pavilions for their shelter."}, {"text": "Cooling fans operated by the servants.", "isCorrect": false, "rationale": "While the servants are busy with the baggage-train and lading horses, the text emphasizes the beds and coverlets for comfort."}, {"text": "A constant supply of ice brought from the mountains.", "isCorrect": false, "rationale": "The text mentions wine and comfits, but not the logistics of ice; the focus is on the beds provided for their rest."}], "id": "q08"}, {"question": "Which narrator is chosen by King Dioneo to open the storytelling session for the Seventh Day?", "options": [{"text": "Emilia", "isCorrect": true, "rationale": "The text concludes by stating that the king 'bade Emilia begin' the stories by the lake."}, {"text": "Pampinea", "isCorrect": false, "rationale": "Pampinea is one of the narrators, but for Day VII, Dioneo specifically calls upon Emilia to start."}, {"text": "Filostrato", "isCorrect": false, "rationale": "Filostrato was the king of the previous day (Day VI), but he is not the one chosen to start Day VII."}, {"text": "Fiammetta", "isCorrect": false, "rationale": "Fiammetta is a member of the company, but she is not the narrator who begins this specific day's cycle."}], "id": "q09"}, {"question": "Boccaccio's stories in Day VII are noted for their departure from traditional French 'fabliaux' primarily through which element?", "options": [{"text": "Psychological realism and sympathy for the characters.", "isCorrect": true, "rationale": "While sharing the bawdy humor of fabliaux, Boccaccio adds a layer of realism and a specific bias toward the wives' perspectives."}, {"text": "The use of prose instead of poetic verse.", "isCorrect": false, "rationale": "While true that Decameron is prose, the source text highlights 'psychological realism' as the distinguishing thematic trait."}, {"text": "A shift toward strictly religious and moral endings.", "isCorrect": false, "rationale": "Boccaccio's treatment is noted for being playful and testing propriety, often moving away from strict moralizing."}, {"text": "The removal of all deceptive elements to focus on romantic love.", "isCorrect": false, "rationale": "Deception (the beffa) remains central to the stories; it is the *treatment* and sympathy that changes."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
