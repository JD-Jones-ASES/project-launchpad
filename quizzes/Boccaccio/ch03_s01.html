        <div class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 3, Section 1</div>

        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "In the context of the Decameron's second day, how does the concept of 'ingegno' interact with the force of 'fortuna'?", "options": [{"text": "Ingegno is the human capacity to adapt to and manipulate the circumstances created by fortune.", "isCorrect": true, "rationale": "The text defines ingegno as the resourcefulness and quick thinking that allow individuals to turn misfortune into an advantage."}, {"text": "Ingegno is a divine gift that allows humans to completely bypass the influence of fortune.", "isCorrect": false, "rationale": "While ingegno is a powerful human quality, the text explicitly states that fortune is an inescapable force that wit alone cannot master."}, {"text": "Ingegno represents the moral purity required to appease the goddess Fortuna.", "isCorrect": false, "rationale": "The source material describes Fortuna as morally indifferent and ingegno as a practical, rather than moral, survival skill."}, {"text": "Ingegno and fortuna are synonyms used to describe the same unpredictable literary force.", "isCorrect": false, "rationale": "The text establishes a clear contrast between external forces (fortuna) and the internal human response (ingegno)."}]}, {"question": "Which historical philosopher's work provided the ubiquitous medieval metaphor of the 'Wheel of Fortune' referenced in the commentary?", "options": [{"text": "Boethius", "isCorrect": true, "rationale": "The commentary notes that the image of Fortuna's wheel was inherited from Boethius's 'Consolation of Philosophy'."}, {"text": "Dante Alighieri", "isCorrect": false, "rationale": "Although Boccaccio inherited the concept from Dante as well, the specific metaphor of the wheel is attributed to Boethius."}, {"text": "Cicero", "isCorrect": false, "rationale": "Cicero is part of the classical tradition mentioned, but the text specifically identifies Boethius as the source of the wheel imagery."}, {"text": "Thomas Aquinas", "isCorrect": false, "rationale": "Aquinas is not mentioned in the source material as a source for Boccaccio's philosophical framework regarding fortune."}]}, {"question": "At which point in the tale of Andreuccio da Perugia (II.5) does the protagonist most clearly demonstrate a transition from a 'naive provincial' to a 'resourceful survivor'?", "options": [{"text": "When he uses his companions' own trick to escape the archbishop's tomb.", "isCorrect": true, "rationale": "This third episode shows him actively adapting and turning a dangerous situation to his advantage, completing his character arc."}, {"text": "When he is first lured into the Sicilian woman's house.", "isCorrect": false, "rationale": "At this stage, Andreuccio is described as a fool who is easily deceived, representing his starting point rather than his growth."}, {"text": "When he is recruited by two men after falling into a well.", "isCorrect": false, "rationale": "While he begins to adapt here, he is still being led by others rather than exercising his own agency and wit."}, {"text": "When he first arrives in the city of Naples with a purse of gold.", "isCorrect": false, "rationale": "His arrival marks his status as a target for fortune rather than a master of it."}]}, {"question": "Why is the character Alatiel (II.7) considered a direct contrast to Andreuccio in the study of fortune?", "options": [{"text": "She possesses no agency and remains entirely passive as fortune acts upon her.", "isCorrect": true, "rationale": "The text highlights that unlike Andreuccio's improvisation, Alatiel does not choose, resist, or even speak for most of the tale."}, {"text": "She uses her wit to deceive her father into believing she is a virgin.", "isCorrect": false, "rationale": "The text describes her as passive; the conclusion about her 'virginity' is presented as an irony of circumstance and social perception rather than her own clever plan."}, {"text": "She represents the moral triumph of virtue over the chaos of chance.", "isCorrect": false, "rationale": "The commentary suggests the tale is a satire and that Alatiel is an object of exchange, not a symbol of moral triumph."}, {"text": "She is of royal birth, whereas Andreuccio is of low birth.", "isCorrect": false, "rationale": "While their social classes differ, the primary thematic contrast discussed is their differing responses to the force of fortune."}]}, {"question": "Which of the following best describes the 'picaresque' genre as it relates to Andreuccio's story?", "options": [{"text": "An episodic adventure following a clever protagonist through a corrupt or dangerous social world.", "isCorrect": true, "rationale": "The text defines the picaresque as featuring a 'picaro' who lives by their wits and learns through direct experience in a stratified society."}, {"text": "A narrative focused on the tragic fall of high-born individuals due to a single character flaw.", "isCorrect": false, "rationale": "This describes classical tragedy, whereas the picaresque focuses on a resourceful protagonist navigating the underside of society."}, {"text": "A romanticized depiction of pastoral life far removed from urban corruption.", "isCorrect": false, "rationale": "The picaresque is specifically noted for its gritty urban settings, like the 'streets and sewers of Naples'."}, {"text": "A formal religious allegory where every character represents a specific virtue or vice.", "isCorrect": false, "rationale": "The picaresque is a secular genre focused on survival and social experience rather than fixed religious symbolism."}]}, {"question": "In the tale of Landolfo Rufolo (II.4), how does fortune manifest its 'wheel' according to the summary?", "options": [{"text": "He is twice shipwrecked and reduced to clinging to a chest, only to find it filled with gems.", "isCorrect": true, "rationale": "This illustrates the rapid downward and upward turns of fortune characteristic of the 'wheel' metaphor."}, {"text": "He loses his wealth through bad investments but regains it through a miraculous saint.", "isCorrect": false, "rationale": "This confuses Landolfo's story with Rinaldo d'Asti's or Martellino's religious themes; Landolfo's reversal is tied to piracy and a chest of gems."}, {"text": "He is betrayed by his brothers but later finds they have been transformed into kings.", "isCorrect": false, "rationale": "This description incorrectly mixes elements of the 'Three Brothers' tale (II.3) with Landolfo's narrative."}, {"text": "He attempts to rob an archbishop but is saved by a widow.", "isCorrect": false, "rationale": "This incorrectly combines plot points from Andreuccio (II.5) and Rinaldo d'Asti (II.2)."}]}, {"question": "Which tale from Day II served as a direct source for William Shakespeare's play 'Cymbeline'?", "options": [{"text": "Novel II.9: Bernabò of Genoa", "isCorrect": true, "rationale": "The summary for II.9 explicitly identifies it as a source for 'Cymbeline', involving a wager on a wife's fidelity."}, {"text": "Novel II.8: The Count of Antwerp", "isCorrect": false, "rationale": "While this tale involves exile and disguises, it is not the one cited as the source for 'Cymbeline'."}, {"text": "Novel II.10: Paganino and Ricciardo", "isCorrect": false, "rationale": "This tale focuses on a mismatched marriage and a pirate abduction, not the specific plot used in 'Cymbeline'."}, {"text": "Novel II.5: Andreuccio da Perugia", "isCorrect": false, "rationale": "Andreuccio is cited as a forerunner of the picaresque tradition, but not as a source for this specific Shakespeare play."}]}, {"question": "The closing proverb of Alatiel's tale—'kissing-lips lose no flavor, but renew themselves like the moon'—serves what narrative function in the Decameron?", "options": [{"text": "It suggests that appearances alone determine social reality in Boccaccio's world.", "isCorrect": true, "rationale": "The text explains this 'joke' implies that as long as the appearance of virginity or status is maintained, the actual history matters little to society."}, {"text": "It provides a moral justification for Alatiel's lack of resistance to her captors.", "isCorrect": false, "rationale": "The proverb is described as 'sly' and 'philosophically suggestive' rather than a genuine moral defense of passivity."}, {"text": "It confirms that Alatiel was actually a virgin throughout her various travels.", "isCorrect": false, "rationale": "The text refers to the 'as a virgin' conclusion as one of the 'most pointed ironies,' indicating the proverb is a commentary on deception and perception."}, {"text": "It is a literal description of Alatiel's miraculous physical regeneration.", "isCorrect": false, "rationale": "The commentary notes the joke is 'philosophically suggestive' regarding social reality, not a literal miracle."}]}, {"question": "In the summary of Novel II.6 (Madam Beritola), what historical event provides the backdrop for the protagonist's separation from her family?", "options": [{"text": "The Sicilian Vespers of 1282", "isCorrect": true, "rationale": "The text identifies this 1282 rebellion against French Angevin rule as the cause of the political upheavals in her story."}, {"text": "The Black Death of 1348", "isCorrect": false, "rationale": "While the plague is the frame for the entire Decameron, this specific tale is set during the Sicilian Vespers."}, {"text": "The Fall of the Roman Empire", "isCorrect": false, "rationale": "The Sicilian Vespers is a medieval event, long after the fall of the Roman Empire."}, {"text": "The Angevin court of Naples (c. 1327–1340)", "isCorrect": false, "rationale": "The text mentions this court in relation to Boccaccio's personal biography, not as the setting for Madam Beritola's exile."}]}, {"question": "What common theme connects the tales of Rinaldo d'Asti (II.2) and Martellino (II.1)?", "options": [{"text": "The unpredictable and often humorous way fortune interacts with religious piety and trickery.", "isCorrect": true, "rationale": "Both tales involve characters engaging with religious settings (a saint's body, a prayer to St. Julian) and experiencing rapid reversals of fortune."}, {"text": "The triumph of noble blood over the limitations of poverty.", "isCorrect": false, "rationale": "This theme is more central to Novel II.3 (The Three Brothers) than to the tales of Rinaldo or Martellino."}, {"text": "The exploration of the picaresque hero's journey through Naples.", "isCorrect": false, "rationale": "Naples is the specific setting for Andreuccio (II.5); Rinaldo's story takes place on the road and Martellino's in Treviso."}, {"text": "The tragic consequences of failing to respect the power of fortune.", "isCorrect": false, "rationale": "The text describes these as 'comic tales' or 'humorous' suggestions, rather than tragedies."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
