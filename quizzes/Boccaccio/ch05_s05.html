var QUESTIONS = [{"question": "Based on the text, what historical literary form served as the primary source for Boccaccio's tale of the eaten heart?", "options": [{"text": "A biographical sketch known as a vida.", "isCorrect": true, "rationale": "The story is derived from the life of the troubadour Guilhem de Cabestanh, which was recorded in a traditional Provencal biographical format."}, {"text": "An epic poem written in Latin hexameter.", "isCorrect": false, "rationale": "While the story has epic themes, the source material specifies it comes from the Provencal troubadour tradition, not Latin epics."}, {"text": "A courtly manual on the rules of love.", "isCorrect": false, "rationale": "Though the tale involves courtly love, the specific source cited is a biographical account of a historical figure."}, {"text": "A collection of legal records from the Count of Provence.", "isCorrect": false, "rationale": "Although the Count of Provence is mentioned as a figure of authority, the narrative itself originated in literature rather than legal archives."}], "id": "q01"}, {"question": "How does the text characterize the relationship between Sieur Guillaume de Roussillon and Sieur Guillaume de Cabestaing prior to the conflict?", "options": [{"text": "They were bitter rivals in tournament and joust.", "isCorrect": false, "rationale": "While they participated in tournaments together, they were actually close allies who shared the same devices."}, {"text": "They were as brothers, frequently traveling and fighting together.", "isCorrect": true, "rationale": "The source describes them as doughty warriors and close comrades who even wore the same device in battle."}, {"text": "They were distant relatives who rarely interacted due to the distance between their castles.", "isCorrect": false, "rationale": "Despite their castles being $10$ miles apart, the text emphasizes their constant companionship and shared activities."}, {"text": "Cabestaing was a vassal serving in Roussillon's court.", "isCorrect": false, "rationale": "Both men are described as noble knights with their own castles and vassals, making them social equals."}], "id": "q02"}, {"question": "What reason does Roussillon give his wife for Cabestaing’s failure to arrive for supper on the night of the murder?", "options": [{"text": "He claims Cabestaing was injured in a hunting accident.", "isCorrect": false, "rationale": "Roussillon chooses to lie about Cabestaing's availability rather than inventing an accident that might prompt a search."}, {"text": "He tells her Cabestaing sent word that he could not arrive until the following day.", "isCorrect": true, "rationale": "Roussillon uses this deception to explain the absence while he prepares the gruesome meal for that evening."}, {"text": "He suggests Cabestaing was delayed by a sudden summons to the tourney in France.", "isCorrect": false, "rationale": "The tourney was the pretext used to lure Cabestaing, but the husband's specific excuse for the delay was simply a change in the arrival time."}, {"text": "He pretends to be equally surprised and angry at his friend's tardiness.", "isCorrect": false, "rationale": "Roussillon remains calm and provides a specific, albeit false, tidings from the friend to manage his wife's expectations."}], "id": "q03"}, {"question": "What does Roussillon tell his cook regarding the nature of the meat he is asked to prepare?", "options": [{"text": "He identifies it as a deer's heart found in the wood.", "isCorrect": false, "rationale": "Deer was common game, but Roussillon specified a different type of wild animal to explain the 'delicacy'."}, {"text": "He claims it is a boar's heart.", "isCorrect": true, "rationale": "By calling it a boar's heart, Roussillon provides a plausible explanation for the organ's size and the rich seasonings the cook uses."}, {"text": "He admits it is human but orders the cook to keep the secret.", "isCorrect": false, "rationale": "Roussillon chooses to deceive the cook entirely to ensure the dish is prepared without hesitation."}, {"text": "He tells the cook it is a rare delicacy sent from the Count of Provence.", "isCorrect": false, "rationale": "The source indicates Roussillon presented the item himself as if it were his own hunting prize."}], "id": "q04"}, {"question": "According to the analysis in the text, what was the primary purpose of using 'extreme scenarios' like the eaten heart in medieval literature?", "options": [{"text": "To serve as sensationalism intended only to shock and entertain.", "isCorrect": false, "rationale": "The text explicitly states these were not just for sensationalism, but for deeper thematic purposes."}, {"text": "To function as a moral exemplum that reveals truths about human nature.", "isCorrect": true, "rationale": "The horror is used to push scenarios to their furthest limit to illustrate the consequences of jealousy and honor."}, {"text": "To document historical crimes committed during the crusades.", "isCorrect": false, "rationale": "The narrative is a literary adaptation of a legend rather than a literal historical record of wartime crimes."}, {"text": "To discourage women from engaging in courtly love through fear.", "isCorrect": false, "rationale": "While the outcome is tragic, the analysis suggests the focus is on the nature of passion and the monstrosity of jealousy itself."}], "id": "q05"}, {"question": "What is significant about the wife's response after learning she has consumed her lover's heart?", "options": [{"text": "She immediately curses her husband and calls for the Count of Provence.", "isCorrect": false, "rationale": "She addresses the husband's disloyalty but focuses more on her own internal resolve and her lover's nobility."}, {"text": "She falls into a fit of weeping and rage that lasts until dawn.", "isCorrect": false, "rationale": "The 'notebox' highlights that she specifically does *not* weep or rage, emphasizing her composure."}, {"text": "She transforms from a passive figure into one of 'fierce, terrible dignity.'", "isCorrect": true, "rationale": "Her decision to commit suicide is presented as a declaration of absolute loyalty, elevating her role in the tragedy."}, {"text": "She denies the truth of her husband's claim and demands proof.", "isCorrect": false, "rationale": "She accepts the truth immediately and focuses on the 'high excellence' of the fare she has consumed."}], "id": "q06"}, {"question": "Which detail does Roussillon use to justify his killing of Cabestaing when speaking to his wife?", "options": [{"text": "He calls her a disloyal woman and claims he was defending his honor.", "isCorrect": true, "rationale": "He reveals his knowledge of their affair and his actions as a response to her betrayal."}, {"text": "He claims Cabestaing was planning to seize his castle.", "isCorrect": false, "rationale": "The motivation for the murder was entirely personal jealousy, not political or territorial gain."}, {"text": "He argues that Cabestaing challenged him to a duel to the death.", "isCorrect": false, "rationale": "The text makes it clear that Roussillon ambushed an unarmed and unsuspecting Cabestaing."}, {"text": "He asserts that the Count of Provence ordered the execution.", "isCorrect": false, "rationale": "Roussillon actually flees later specifically because he fears the vengeance of the Count of Provence."}], "id": "q07"}, {"question": "What final honor is bestowed upon the two lovers after their deaths?", "options": [{"text": "They are given a state funeral by the Count of Provence.", "isCorrect": false, "rationale": "While the country folk are involved, the primary honor is the specific manner of their interment."}, {"text": "They are buried together in the same tomb with an inscription.", "isCorrect": true, "rationale": "Folk from both castles gathered their remains and placed them together, memorializing the manner of their death."}, {"text": "Their story is banned by the church to prevent others from following their example.", "isCorrect": false, "rationale": "The text suggests their story was recorded and remembered through the verses on their tomb."}, {"text": "Guillaume de Roussillon is forced to pay for a monument in their honor.", "isCorrect": false, "rationale": "Roussillon fled the country immediately and was not involved in the burial or memorialization."}], "id": "q08"}, {"question": "Who is the narrator of this specific tale in the *Decameron*?", "options": [{"text": "Neifile", "isCorrect": false, "rationale": "Neifile told the preceding story, as mentioned in the opening of the primary source text."}, {"text": "Dioneo", "isCorrect": false, "rationale": "Dioneo has a special privilege to speak last, which the king chooses not to infringe upon before telling his own tale."}, {"text": "Filostrato", "isCorrect": true, "rationale": "Filostrato is the king of the fourth day and chooses to tell this most extreme tragic story himself."}, {"text": "Panfilo", "isCorrect": false, "rationale": "Panfilo is one of the narrators, but he is not the one identified as the king who tells this specific story of the eaten heart."}], "id": "q09"}, {"question": "In the context of the story, why does Roussillon flee the country after his wife's death?", "options": [{"text": "He is overcome by sudden remorse and seeks penance in a foreign land.", "isCorrect": false, "rationale": "While he is conscience-stricken, his primary motivation for leaving is fear of earthly punishment."}, {"text": "He fears the vengeance of the country folk and the Count of Provence.", "isCorrect": true, "rationale": "The text notes that the spectacle of her death stunned him and he fled to avoid the legal and social consequences."}, {"text": "He intends to join the tourney in France as he had originally planned.", "isCorrect": false, "rationale": "The tourney was merely a ruse; his flight was an escape from the fallout of his crime."}, {"text": "He is exiled by his own vassals who are disgusted by his cruelty.", "isCorrect": false, "rationale": "The text indicates he had his horses saddled and rode away of his own volition out of fear."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
