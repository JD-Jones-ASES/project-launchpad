        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<div class="quiz-container">

        <a href="../../courses/Boccaccio.html">&larr; Back to Tales of the Decameron (Boccaccio)</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 7, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "In the context of the metaphor 'portare a cavallo con una novella', what does the 'horse' represent in relation to the 'story'?", "options": [{"text": "The narrative rhythm and skill that carries the listener effortlessly to the conclusion.", "isCorrect": true, "rationale": "The source material explicitly links the quality of a horse's gait to the quality of a tale's delivery, both of which serve to transport the traveler/listener."}, {"text": "The social status of the knight which provides him the authority to speak.", "isCorrect": false, "rationale": "While the knight has status, the metaphor specifically focuses on the mechanics of travel and storytelling rather than social hierarchy."}, {"text": "The literal speed of the journey between the breakfast location and the country sojourn.", "isCorrect": false, "rationale": "Madonna Oretta and her company were traveling afoot, making the 'horse' a purely figurative element of the knight's offer."}, {"text": "The moral weight or 'baggage' that a story imposes upon its audience.", "isCorrect": false, "rationale": "The metaphor emphasizes ease and pleasant passage, which is the opposite of a heavy or burdensome moral weight."}], "id": "q01"}, {"question": "Why does the author characterize this specific tale as a 'manifesto on the art of narrative'?", "options": [{"text": "It explicitly outlines a set of formal rules for the Decameron's narrators to follow.", "isCorrect": false, "rationale": "The story functions as a demonstration through a negative example rather than a formal list of rules or guidelines."}, {"text": "It uses the knight's failure to demonstrate by implication what Boccaccio considers successful storytelling.", "isCorrect": true, "rationale": "The text notes that by showing 'what not to do,' Boccaccio implicitly defines his own high standards for narrative skill."}, {"text": "It provides a historical account of the transition from oral traditions to written literature.", "isCorrect": false, "rationale": "The focus is on the skill of the individual narrator in a social setting, not the broad historical evolution of literary mediums."}, {"text": "It is the only story in the collection where the narrator interrupts themselves to explain their technique.", "isCorrect": false, "rationale": "While the story is 'self-aware,' the text refers to the narrative's structure and themes as a manifesto, not an authorial interruption."}], "id": "q02"}, {"question": "Which of the following storytelling defects is specifically attributed to the knight in Filomena's account?", "options": [{"text": "Providing an overly long and unnecessary moral epilogue.", "isCorrect": false, "rationale": "The knight's errors were structural and performative, such as repetition and confusion, rather than an issue with the story's ending."}, {"text": "Mismatched names and frequent self-correction of his own words.", "isCorrect": true, "rationale": "The primary source mentions that the knight 'erred not seldom in the names' and would 'hark back' saying 'I said not well'."}, {"text": "Using overly complex vocabulary that the lady could not understand.", "isCorrect": false, "rationale": "The text suggests the story itself was 'excellent' but spoiled by the delivery; it does not mention vocabulary as a barrier."}, {"text": "Ignoring the audience's reactions to focus on his own amusement.", "isCorrect": false, "rationale": "While he was a poor narrator, the knight was actually 'quick of apprehension' enough to understand Oretta's hint and stop."}], "id": "q03"}, {"question": "How does the text link Boccaccio’s narrative philosophy to Aristotle's 'Poetics'?", "options": [{"text": "Both suggest that the moral character of the narrator is the most important element of a story.", "isCorrect": false, "rationale": "The link made in the text is specifically about the technical structure of the story, not the ethics of the narrator."}, {"text": "Boccaccio directly quotes Aristotle to justify the brevity of Madonna Oretta’s wit.", "isCorrect": false, "rationale": "The text mentions that Boccaccio may not have read Aristotle directly, but his principles align with Aristotelian thought."}, {"text": "They share the principle that the arrangement of incidents is more critical than the content itself.", "isCorrect": true, "rationale": "The source material states that Aristotle's focus on the 'arrangement of incidents' is the same principle Boccaccio demonstrates through the knight's failure."}, {"text": "Aristotle’s theories on tragedy are used to explain why the knight's failure is a social 'death'.", "isCorrect": false, "rationale": "While Oretta felt like she was at the point of death, the text links Aristotle to narrative skill rather than tragic theory."}], "id": "q04"}, {"question": "According to Filomena, why is 'wit with its bright sallies' considered especially proper for ladies?", "options": [{"text": "Ladies are inherently more humorous than men.", "isCorrect": false, "rationale": "The text does not claim inherent superiority in humor, but focuses on the appropriateness of brevity."}, {"text": "Brevity is preferred in their speech, making witty sallies more suitable than long discourses.", "isCorrect": true, "rationale": "Filomena states that 'wit with its bright sallies... [is] much more proper for ladies... seeing that prolixity of speech... is much less allowable to them'."}, {"text": "Women were historically denied the education required for longer narrative forms.", "isCorrect": false, "rationale": "While possibly true historically, the text frames this as a matter of social propriety and the 'excellence' of brief speech."}, {"text": "Witty remarks allow women to challenge men without appearing aggressive.", "isCorrect": false, "rationale": "The text emphasizes the 'ornament' and 'excellence' of wit rather than its use as a tool for social defiance."}], "id": "q05"}, {"question": "What is the specific meaning of the title 'Madonna' as used in the context of the Decameron?", "options": [{"text": "A specific reference to the Virgin Mary.", "isCorrect": false, "rationale": "The text notes that in the Decameron, it is 'not primarily a religious title'."}, {"text": "A title of respect meaning 'My lady' for a woman of rank.", "isCorrect": true, "rationale": "The notebox explicitly defines 'Madonna' as 'My lady'—a title of respect for women of rank."}, {"text": "A term used exclusively for women who have reached a certain age.", "isCorrect": false, "rationale": "The title relates to rank and respect rather than age specifically."}, {"text": "A designation for women who have successfully completed a pilgrimage.", "isCorrect": false, "rationale": "There is no indication in the text that the title is earned through religious acts like pilgrimages."}], "id": "q06"}, {"question": "Madonna Oretta’s physical reaction—sweating and nearly fainting—serves as a metaphor for what?", "options": [{"text": "The actual physical exhaustion of the long walk to their next sojourn.", "isCorrect": false, "rationale": "The text states she felt this way 'as she listened' to the story, identifying the bad narration as the cause of her distress."}, {"text": "The intense heat of the Florentine country sun.", "isCorrect": false, "rationale": "While they were in the country, her reaction is linked directly to the 'hard trot' of the knight's mishandled tale."}, {"text": "The visceral, almost 'mortal' discomfort caused by witnessing narrative incompetence.", "isCorrect": true, "rationale": "Boccaccio uses extreme physical symptoms to emphasize that bad storytelling is a significant social offense that causes genuine distress."}, {"text": "Her suppressed romantic attraction to the gentleman telling the story.", "isCorrect": false, "rationale": "The text describes her reaction as one of suffering due to a 'mess' he got into, not romantic tension."}], "id": "q07"}, {"question": "When Madonna Oretta says, 'Sir, this horse of yours trots too hard; I pray you be pleased to set me down,' what is the 'hard trot' referring to?", "options": [{"text": "The knight's inability to control his actual horse during the journey.", "isCorrect": false, "rationale": "The company was traveling on foot; the 'horse' is part of the knight's metaphorical offer to carry her with a story."}, {"text": "The repetitive and jarring nature of the knight’s clumsy storytelling style.", "isCorrect": true, "rationale": "The 'hard trot' is the narrative equivalent of a rough ride—full of repetitions, backtracking, and confusion."}, {"text": "The offensive or scandalous nature of the story's content.", "isCorrect": false, "rationale": "The text specifies that the story itself was 'in itself... indeed excellent,' but was 'spoiled' by the delivery."}, {"text": "The excessive speed at which the knight was speaking.", "isCorrect": false, "rationale": "The faults listed include repetition and 'harking back,' which suggests a lack of flow rather than simple speed."}], "id": "q08"}, {"question": "Which character is mentioned by Filomena as having previously discussed the decline in women's ability to use apt speech?", "options": [{"text": "Pampinea", "isCorrect": true, "rationale": "Filomena explicitly states: 'But as, touching this matter, enough has already been said by Pampinea, I purpose not to enlarge thereon'."}, {"text": "Madonna Oretta", "isCorrect": false, "rationale": "Madonna Oretta is the protagonist of the tale Filomena is telling, not the person who discussed the topic previously."}, {"text": "Messer Geri Spina", "isCorrect": false, "rationale": "Messer Geri Spina is identified as Oretta's husband and is not the narrator or a commentator on women's discourse."}, {"text": "The Knight", "isCorrect": false, "rationale": "The knight is the one whose poor speech serves as the negative example, not the one who discussed the theory of speech."}], "id": "q09"}, {"question": "The knight's reaction to Madonna Oretta's request to be 'set down' demonstrates that he:", "options": [{"text": "Was deeply offended and refused to speak to her for the rest of the trip.", "isCorrect": false, "rationale": "The text says he took her comment 'in all good and gay humour'."}, {"text": "Possessed a level of wit and understanding that exceeded his narrative skill.", "isCorrect": true, "rationale": "He was 'more quick of apprehension than he was skilful in narration,' allowing him to understand her metaphor and respond appropriately."}, {"text": "Was so embarrassed that he immediately left the company and returned to Florence.", "isCorrect": false, "rationale": "Instead of leaving, he 'addressed himself to tell her other stories' after abandoning the first one."}, {"text": "Completely missed the metaphor and tried to find her a physical horse.", "isCorrect": false, "rationale": "The text explicitly states he 'missed not the meaning of her sally'."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
