<script>
var QUESTIONS = [{"question": "What thematic significance does the narrator Panfilo attribute to the instability of Ser Ciappelletto's name?", "options": [{"text": "It represents the theme of false identity and the gap between appearance and reality.", "isCorrect": true, "rationale": "The text explicitly mentions that the diminutive nickname, which replaced his real name Cepparello, hints at the instability of his identity."}, {"text": "It symbolizes his transformation from a sinner to a saint through divine intervention.", "isCorrect": false, "rationale": "While he is venerated as a saint, the name change is a result of French linguistic misunderstanding, not a spiritual transformation."}, {"text": "It highlights the cultural divide between the Italian and French merchant classes.", "isCorrect": false, "rationale": "Although there is a linguistic shift, the primary thematic focus is on the nature of disguise and deception rather than class conflict."}, {"text": "It serves as a metaphor for the unpredictability of human fortune in the merchant world.", "isCorrect": false, "rationale": "The text links the name specifically to the theme of appearance versus reality in a religious and moral context."}], "id": "q01"}, {"question": "Why did Musciatto Franzesi specifically choose Ser Ciappelletto to handle his affairs with the Burgundians?", "options": [{"text": "He believed Ciappelletto's extreme guile was the only match for the faithless nature of the Burgundians.", "isCorrect": true, "rationale": "Musciatto knew the Burgundians were violent and ill-conditioned, and he needed a man bad enough to oppose their own deceit."}, {"text": "He hoped that Ciappelletto's legal expertise as a notary would intimidate the debtors.", "isCorrect": false, "rationale": "While he was a notary, his primary qualification for this specific task was his lack of scruples and talent for deception."}, {"text": "He wanted to provide Ciappelletto with an opportunity for redemption away from the temptations of Paris.", "isCorrect": false, "rationale": "Musciatto chose him because he was a 'reprobate' and well-acquainted with his wicked way of life, not for his moral improvement."}, {"text": "He was unaware of Ciappelletto's true nature and trusted him as a loyal family friend.", "isCorrect": false, "rationale": "Musciatto was 'very well acquainted' with Ciappelletto's wicked way of life and chose him precisely because of it."}], "id": "q02"}, {"question": "What was the primary concern of the two Florentine usurers regarding Ciappelletto's impending death in their house?", "options": [{"text": "The local population might use his lack of absolution as an excuse to riot and seize their property.", "isCorrect": true, "rationale": "The usurers feared that if he died unconfessed and was cast into a ditch, the locals would attack them as 'Lombards excluded by the Church'."}, {"text": "They were afraid of being held legally responsible for his many forgeries and crimes.", "isCorrect": false, "rationale": "Their concern was not legal liability for his past crimes, but the immediate social and physical threat posed by his religious status at death."}, {"text": "They feared that the ghost of such a wicked man would haunt their establishment.", "isCorrect": false, "rationale": "Their fears were grounded in practical social and economic consequences, specifically the threat of a physical raid by the townspeople."}, {"text": "They were concerned about losing the favor of Musciatto Franzesi if Ciappelletto died.", "isCorrect": false, "rationale": "While they respected Musciatto, their immediate dialogue focuses on the threat of a local tumult and the loss of their own lives and goods."}], "id": "q03"}, {"question": "In his false confession, how did Ciappelletto manipulate the concept of 'righteous wrath'?", "options": [{"text": "He claimed his anger was only directed at those who openly flouted God's commandments.", "isCorrect": true, "rationale": "He told the friar that he was only angry when seeing young men haunting taverns and avoiding churches, which the friar accepted as a holy anger."}, {"text": "He confessed to a single instance of physical violence justified by the protection of a woman.", "isCorrect": false, "rationale": "He explicitly denied ever hurting or wronging anyone, claiming his wrath never betrayed him into such deeds."}, {"text": "He argued that his temper was a result of his intense physical suffering during his illness.", "isCorrect": false, "rationale": "He presented his anger as a long-standing moral habit rather than a recent symptom of his sickness."}, {"text": "He suggested that his anger was a penance imposed upon him by a previous confessor.", "isCorrect": false, "rationale": "He did not mention previous confessors; he actually claimed he had never committed a sin that required a penance for anger."}], "id": "q04"}, {"question": "Which of the following 'sins' did Ciappelletto use to convince the friar of his extreme holiness through excessive scrupulosity?", "options": [{"text": "Accidentally spitting in a church and feeling deep remorse for it.", "isCorrect": true, "rationale": "By agonizing over a trivial act like spitting in church, he led the friar to believe that he must be free of all major sins."}, {"text": "Stealing a small loaf of bread to feed a starving beggar.", "isCorrect": false, "rationale": "Ciappelletto's fake sins were framed as minor impurities or accidents, not as purposeful acts of theft, even for 'noble' reasons."}, {"text": "Falling asleep during a particularly long and tedious sermon.", "isCorrect": false, "rationale": "While this is a minor fault, the text highlights his 'sin' of having his house swept on a Saturday as his example of poor Sabbath observance."}, {"text": "Coveting the wealth of the usurers while staying in their home.", "isCorrect": false, "rationale": "He actually claimed to be in their house only to 'admonish and reprehend' them for their iniquitous trade."}], "id": "q05"}, {"question": "What was Ciappelletto's explanation for having four extra farthings in his possession from a cloth sale?", "options": [{"text": "He kept them for a year to return to the owner, then gave them to charity when the man didn't return.", "isCorrect": true, "rationale": "He framed this potential act of theft as an example of his extreme honesty and eventual charity when he couldn't find the rightful owner."}, {"text": "He admitted to accidentally short-changing a customer and asked for penance.", "isCorrect": false, "rationale": "He claimed the opposite: that the customer overpaid him and he diligently tried to return the money."}, {"text": "He claimed they were a gift from a satisfied customer that he initially refused.", "isCorrect": false, "rationale": "The story he told involved finding the money in a box a month later, not a direct transaction or gift."}, {"text": "He stated he had found them on the floor of the tavern and searched for the owner.", "isCorrect": false, "rationale": "The context was specifically about his work as a merchant and a specific debt paid for cloth."}], "id": "q06"}, {"question": "What was the final 'heinous' sin Ciappelletto confessed that caused him to weep and convinced the friar of his sanctity?", "options": [{"text": "Cursing his mother once when he was a small child.", "isCorrect": true, "rationale": "By presenting this as a soul-crushing sin, he convinced the friar that he was so pure that even a childhood outburst was unbearable to his conscience."}, {"text": "Neglecting to fast for a single day during a previous year's Lent.", "isCorrect": false, "rationale": "He actually boasted about his fasting habits, claiming he fasted at least three days every week throughout his life."}, {"text": "Taking the Lord's name in vain during a moment of extreme physical pain.", "isCorrect": false, "rationale": "The text describes him as a 'profuse blasphemer' in reality, but in his confession, he focused on the curse against his mother to show contrition."}, {"text": "Failing to prevent a murder he witnessed in his youth.", "isCorrect": false, "rationale": "He denied any involvement in or desire for violence, making his 'greatest sin' a much more personal and emotional one."}], "id": "q07"}, {"question": "According to Panfilo's introduction and conclusion, how can a 'worst man' like Ciappelletto possibly serve God's purpose?", "options": [{"text": "God honors the sincerity of the believers' faith rather than the actual merit of the intercessor.", "isCorrect": true, "rationale": "Panfilo explains that God hears prayers based on the petitioner's faith, even if they mistakenly pray to someone in 'eternal exile' in hell."}, {"text": "Ciappelletto's last-minute contrition was so perfect that he actually became a saint in heaven.", "isCorrect": false, "rationale": "While Panfilo admits this is technically possible, he states he believes Ciappelletto is actually in the 'hands of the devil'."}, {"text": "The friar's own holiness was strong enough to sanctify Ciappelletto post-mortem.", "isCorrect": false, "rationale": "The text focuses on God's mercy and the people's faith as the source of the miracles, not the friar's inherent power."}, {"text": "The miracles performed at the tomb were tricks played by the usurers to keep the peace.", "isCorrect": false, "rationale": "The narrator treats the miracles as real occurrences granted by God despite the recipient's true nature."}], "id": "q08"}, {"question": "What did the two Florentine usurers do while Ciappelletto was making his confession to the friar?", "options": [{"text": "They listened from behind a wooden partition and struggled to contain their laughter.", "isCorrect": true, "rationale": "The text describes them standing on the other side of a partition, hearing everything and marvelling at his persistence in wickedness."}, {"text": "They prayed fervently in the next room for the success of the deception.", "isCorrect": false, "rationale": "They 'misdoubted' his power to deceive and were watching for amusement and relief rather than praying."}, {"text": "They prepared the marble tomb and tapers, anticipating a holy burial.", "isCorrect": false, "rationale": "This happened after his death; during the confession, they were simply listening to his lies."}, {"text": "They fled the city to avoid being associated with his death and the potential riot.", "isCorrect": false, "rationale": "They stayed and eventually provided the money for his 'honourable sepulture' once they saw the plan worked."}], "id": "q09"}, {"question": "Which detail of Ciappelletto's real life most directly contradicts his confession regarding his treatment of others?", "options": [{"text": "He took delight in fomenting enmities and dissensions between kinsfolk and friends.", "isCorrect": true, "rationale": "In reality, he loved creating conflict, whereas in his confession, he claimed to be a peacemaker who only spoke evil of a man beating his wife."}, {"text": "He was a notary who took great pride in making perfectly legal and accurate documents.", "isCorrect": false, "rationale": "The text states his pride was actually in making 'false documents' and he felt shame only when they were discovered."}, {"text": "He was a frequent churchgoer who held the sacraments in high regard.", "isCorrect": false, "rationale": "In reality, he was 'never seen at Church' and held the sacraments to be 'vile things'."}, {"text": "He was a frugal man who lived a life of strict poverty and self-denial.", "isCorrect": false, "rationale": "He was described as 'most gluttonous', 'inordinately fond of his cups', and a 'practised gamester'."}], "id": "q10"}, {"question": "After Ciappelletto's death, what ultimately happens to his reputation in the region where he died?", "options": [{"text": "The truth about his wickedness is eventually revealed and he is disinterred.", "isCorrect": false, "rationale": "The tale ends with him being venerated; there is no revelation or disinterment within the story."}, {"text": "He is canonized as a saint and miracles are reported at his tomb.", "isCorrect": true, "rationale": "The people venerate him as Saint Ciappelletto, and Panfilo reports that many miracles were performed through his intercession — a supreme irony that a great sinner became a great saint in popular belief."}, {"text": "The usurers confess the truth to Church authorities, who suppress his cult.", "isCorrect": false, "rationale": "The usurers keep quiet; having benefited from the outcome, they have no reason to expose the deception."}, {"text": "The friar publishes the confession, triggering a debate about the validity of deathbed absolution.", "isCorrect": false, "rationale": "The friar tells the community about the 'holy' man's life, not the truth; the confession remains secret per the sacramental seal."}], "id": "q11"}, {"question": "The tale of Ciappelletto opens Day I of the Decameron. What does this placement suggest about Boccaccio's literary strategy?", "options": [{"text": "He wants to establish from the outset that the Decameron is a fundamentally anti-religious work.", "isCorrect": false, "rationale": "Panfilo's framing acknowledges God's mercy; Boccaccio's satire targets hypocrisy and human credulity, not faith itself."}, {"text": "He opens with the most extreme case of moral complexity to immediately challenge the reader's assumptions.", "isCorrect": true, "rationale": "By beginning with a supreme villain who becomes a venerated saint through deception, Boccaccio signals that the Decameron will not offer simple moral clarity — and invites readers to think rather than judge."}, {"text": "He places it first because it is the funniest tale and humor is the book's only purpose.", "isCorrect": false, "rationale": "The text notes that Boccaccio is more than an entertainer; the tale raises profound questions about faith, truth, and human judgment."}, {"text": "The tale is placed first to honor Pamfilo as the most distinguished narrator of the brigata.", "isCorrect": false, "rationale": "Pamfilo tells the first tale because Pampinea asks him; the placement reflects thematic strategy, not a personal honor for the narrator."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
