<div class="quiz-container">

        <a href="../../courses/Boccaccio.html">&larr; Back to Tales of the Decameron (Boccaccio)</a>

        <div class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 9, Section 1</div>

        <div class="score-pct" id="score-pct"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "In the context of Day VIII, how does Boccaccio use the character of Calandrino to establish the concept of 'comic realism'?", "options": [{"text": "By placing him in a distant, allegorical landscape that mirrors the moral failings of the Florentine elite.", "isCorrect": false, "rationale": "Comic realism specifically rejects allegorical or distant settings in favor of recognizable, everyday locations."}, {"text": "By grounding his exploits in the actual streets and artisan districts of Florence, such as the Oltrarno.", "isCorrect": true, "rationale": "The use of real locations like the Mugnone stream and specific city gates grounds the farcical humor in the lived reality of Boccaccio's audience."}, {"text": "By depicting him as a high-ranking courtier whose fall from grace serves as a political critique.", "isCorrect": false, "rationale": "Calandrino is an artisan, not a courtier, and the tales focus on human psychology rather than high-level political critique."}, {"text": "By focusing on supernatural interventions that disrupt the mundane life of the Mugnone stream.", "isCorrect": false, "rationale": "While Calandrino believes in the supernatural (the stone of invisibility), the comedy arises from human deception, not actual magic."}], "id": "q01"}, {"question": "Which of the following best describes the 'polyphony of perspectives' mentioned regarding the Scholar and the Widow (VIII.7)?", "options": [{"text": "The narrator Pampinea's approval of the revenge reflects Boccaccio's definitive moral stance on the issue.", "isCorrect": false, "rationale": "The text explicitly states that the narrator and the author are not the same person, and their judgments may differ."}, {"text": "The story's horrific nature is mitigated by the fact that the other members of the brigata unanimously praise the scholar's wit.", "isCorrect": false, "rationale": "The text suggests that the multiple narrators create a space where the reader must decide whose judgment to trust, implying potential disagreement."}, {"text": "The distinction between the narrator's voice and the author's intent allows for a critique of the scholar's disproportionate cruelty.", "isCorrect": true, "rationale": "This separation creates moral complexity, as the reader is not forced to accept the narrator's endorsement of the violence."}, {"text": "The tale's narration by a female member of the brigata ensures a sympathetic portrayal of Elena's plight.", "isCorrect": false, "rationale": "Despite being narrated by Pampinea, the narrator actually seems to approve of the scholar's harsh revenge."}], "id": "q02"}, {"question": "How does the tale of Maestro Simone (VIII.9) expand upon the 'Calandrino pattern' of gullibility?", "options": [{"text": "It demonstrates that intellectual vanity can make even a learned professional as vulnerable as an uneducated artisan.", "isCorrect": true, "rationale": "Maestro Simone is an educated doctor, yet his desire for special status makes him succumb to the same type of tricks played on Calandrino."}, {"text": "It proves that the 'beffa' is only successful when the victim has committed a prior moral transgression.", "isCorrect": false, "rationale": "While some tales involve 'just revenge,' the Maestro Simone tale focuses more on the victim's vanity and gullibility than a specific crime."}, {"text": "It shifts the focus from physical humor to purely verbal deceptions involving complex medical terminology.", "isCorrect": false, "rationale": "The tale still involves physical humiliation, such as Maestro Simone being abandoned in a ditch of filth."}, {"text": "It introduces Bruno and Buffalmacco as protagonists who have evolved to use their 'ingegno' for altruistic purposes.", "isCorrect": false, "rationale": "Bruno and Buffalmacco remain heartless tricksters who exploit others for their own amusement."}], "id": "q03"}, {"question": "In the comparison between Boccaccio and Chaucer, what is identified as the fundamental root of gullibility?", "options": [{"text": "A lack of formal education and exposure to the 'ingegno' of the urban elite.", "isCorrect": false, "rationale": "Maestro Simone's character proves that formal education is no shield against gullibility."}, {"text": "The presence of external supernatural forces that overwhelm human reason.", "isCorrect": false, "rationale": "Both authors ground their comedy in human psychology rather than actual supernatural occurrences."}, {"text": "A failure of self-knowledge characterized by a gap between self-image and reality.", "isCorrect": true, "rationale": "The text notes that Calandrino and Chauntecleer both fail to recognize their own weaknesses (vanity, desire to be special), which tricksters exploit."}, {"text": "The inherent malice of the tricksters, which is portrayed as an unavoidable social force.", "isCorrect": false, "rationale": "While the tricksters are malicious, the 'root' of the victim's gullibility is their own psychological state."}], "id": "q04"}, {"question": "How does the resolution of the tale involving Spinelloccio and Zeppa (VIII.8) differ from the standard 'beffa' of Day VIII?", "options": [{"text": "It ends in a lethal 'vendetta' that destroys both households.", "isCorrect": false, "rationale": "The tale is described as having a surprisingly amicable resolution, unlike the lethal cruelty of VIII.7."}, {"text": "It utilizes a symmetrical revenge that leads to a new social equilibrium rather than further conflict.", "isCorrect": true, "rationale": "Zeppa matches the original deception with his own, leading the characters to share their arrangements openly and peacefully."}, {"text": "The victims are purely innocent, making the 'beffa' feel morally reprehensible to the narrators.", "isCorrect": false, "rationale": "Both men were sleeping with each other's wives, so neither party is portrayed as purely innocent."}, {"text": "It is the only tale in Day VIII where no 'ingegno' or cleverness is required to resolve the dispute.", "isCorrect": false, "rationale": "Zeppa uses a clever scheme involving a chest to achieve his symmetrical revenge, showcasing 'ingegno'."}], "id": "q05"}, {"question": "What is the structural significance of the locations for the first and last tales (VIII.1 and VIII.10) of Day VIII?", "options": [{"text": "They represent the spread of Florentine 'ingegno' to the rest of the Mediterranean.", "isCorrect": false, "rationale": "While they involve Florentines, the primary structural purpose is the geographical framing of the Day."}, {"text": "They frame the Day by taking place outside of Florence (Milan and Sicily), while the central tales remain in the city.", "isCorrect": true, "rationale": "Boccaccio uses these external settings to 'frame' the predominantly Florentine content of the Day."}, {"text": "They highlight the failure of commerce in comparison to the success of artisan cleverness in Florence.", "isCorrect": false, "rationale": "VIII.10 actually shows the success of a merchant using a counter-trick to recover his losses in the marketplace."}, {"text": "They provide a serious, moralistic contrast to the low-brow humor of the Calandrino cycle.", "isCorrect": false, "rationale": "These tales still focus on deception and 'beffa,' maintaining the Day's consistent tone of trickery."}], "id": "q06"}, {"question": "The concept of 'vendetta' in the Decameron is described as:", "options": [{"text": "A purely fictional device used by Boccaccio to heighten the drama of the 'beffa'.", "isCorrect": false, "rationale": "The text defines 'vendetta' as a recognized social institution in medieval Italy, not just a literary device."}, {"text": "An illegal practice that Boccaccio uses the narrators to condemn universally.", "isCorrect": false, "rationale": "Florentine law actually acknowledged the right to personal vengeance under certain circumstances, and the narrators do not always condemn it."}, {"text": "A social institution that Boccaccio both reflects and questions through varying outcomes in the tales.", "isCorrect": true, "rationale": "The Decameron shows both satisfying and disturbing sides of revenge, reflecting the complex reality of medieval Italian life."}, {"text": "A practice limited exclusively to high-ranking noble families like the Guelphs and Ghibellines.", "isCorrect": false, "rationale": "While mentioned in relation to those factions, the tales show that revenge was practiced across different social classes, including scholars and widows."}], "id": "q07"}, {"question": "In Tale VIII.1 (Gulfardo), how is the 'triple deception' accomplished?", "options": [{"text": "Gulfardo tricks the merchant into paying for his own wife's infidelity using a fake loan.", "isCorrect": false, "rationale": "Gulfardo uses the merchant's own money (a loan) to pay the wife, but the trick is how he 'returns' it."}, {"text": "He pays the wife with borrowed money, then claims to the husband he returned the loan to the wife, forcing her silence.", "isCorrect": true, "rationale": "By announcing the 'return' of the money in front of the husband, he recovers his funds because the wife cannot admit what the money was actually for."}, {"text": "The wife and Gulfardo conspire to rob the merchant, but Gulfardo flees with the entire sum.", "isCorrect": false, "rationale": "This would be a simple theft; the 'beffa' lies in the clever use of the husband's presence to secure the money's return."}, {"text": "He uses a forged document to prove the debt was paid, while the wife keeps the original gold.", "isCorrect": false, "rationale": "The trick relies on verbal manipulation and social pressure in the husband's presence, not forgery."}], "id": "q08"}, {"question": "What is the primary factor that distinguishes the cruelty of VIII.7 (Scholar and Widow) from the humor of VIII.3 (Calandrino)?", "options": [{"text": "The presence of a crowd of witnesses, which only occurs in the Calandrino tale.", "isCorrect": false, "rationale": "Both tales involve humiliation before witnesses; the Scholar even ensures people see the Widow's suffering."}, {"text": "The use of physical vs. purely psychological torment.", "isCorrect": false, "rationale": "Both tales involve physical elements (Calandrino's beating; the Widow's exposure/burns), but both also have psychological impacts."}, {"text": "The issue of proportionality and the permanence of harm inflicted on the victim.", "isCorrect": true, "rationale": "Calandrino suffers no lasting ruin, while the Widow's punishment is physically dangerous and wildly disproportionate to her offense."}, {"text": "The social status of the trickster, as only members of the elite are allowed to be cruel.", "isCorrect": false, "rationale": "Bruno and Buffalmacco are artisans, yet they are described as 'intelligent but heartless,' and the Scholar is an intellectual."}], "id": "q09"}, {"question": "The 'Priest of Varlungo' (VIII.2) is described as an 'anticlerical comedy' primarily because:", "options": [{"text": "The priest is depicted as a victim of a more intelligent and pious farmer's wife.", "isCorrect": false, "rationale": "The priest actually outwits the wife, and neither party is depicted as particularly pious."}, {"text": "It uses the priest's 'ingegno' to successfully navigate a sordid sexual bargain and keep his property.", "isCorrect": true, "rationale": "The priest tricks the wife into returning his cloak (his pledge) without actually paying her, satirizing the behavior of the clergy."}, {"text": "The Bishop intervenes to punish the priest, establishing a moral hierarchy.", "isCorrect": false, "rationale": "This happens in VIII.4 (Provost of Fiesole), not in the Priest of Varlungo tale."}, {"text": "It features a priest who is the only innocent character in a world of corrupt peasants.", "isCorrect": false, "rationale": "The text notes that 'neither party is innocent' in this tale."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
