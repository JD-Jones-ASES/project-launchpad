        <div class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 7, Section 4</div>
    </div>

        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What primary reason does the narrator provide for Fra Cipolla's warm reception in the town of Certaldo?", "options": [{"text": "The town produced famous onions, which shared a name with the friar.", "isCorrect": true, "rationale": "The text explicitly mentions that he was welcomed 'no less, perchance, by reason of his name' because the onions of that district were famous throughout Tuscany."}, {"text": "He was a high-ranking official from the abbey near Lucca.", "isCorrect": false, "rationale": "While he was a Friar of St. Antony, the text emphasizes his personal charisma and the coincidence of his name over his official rank."}, {"text": "He was a native of Certaldo and a close relative of the Baronci family.", "isCorrect": false, "rationale": "The Baronci family is mentioned as a comparison for the servant's appearance, not as the friar's lineage, and his arrival is described as a yearly resort rather than a homecoming."}, {"text": "He brought exotic spices and luxuries from Egypt to trade.", "isCorrect": false, "rationale": "The text notes that such luxuries were scarce in Tuscany at the time and were not the reason for his visit."}]}, {"question": "Which of the following best describes the 'nine qualities' Fra Cipolla attributes to his servant, Guccio?", "options": [{"text": "Lazy, uncleanly, a liar, negligent, disobedient, foulmouthed, reckless, witless, and mannerless.", "isCorrect": true, "rationale": "Fra Cipolla explicitly lists these nine vices in a rhyming sequence to describe Guccio's lack of virtue and wisdom."}, {"text": "Gluttonous, greedy, slothful, envious, proud, lustful, wrathful, deceptive, and cowardly.", "isCorrect": false, "rationale": "While these resemble the seven deadly sins, they are not the specific set of 'nine qualities' the friar recites in his rhyme."}, {"text": "Eloquent, seductive, wealthy, noble, handsome, brave, wise, holy, and virtuous.", "isCorrect": false, "rationale": "These are the qualities the friar ironically notes Guccio completely lacks, though Guccio himself falsely claims some of them to Nuta."}, {"text": "Adept at forgery, skilled in theft, silent, mysterious, observant, quick, loyal, frugal, and pious.", "isCorrect": false, "rationale": "Guccio is described as the opposite of these, specifically being negligent of his duties and highly talkative."}]}, {"question": "In Fra Cipolla's improvised speech, what is the 'India Pastinaca' where he claims to have seen 'pruning-hooks fly'?", "options": [{"text": "A fictionalized territory used as part of a series of nonsensical puns and double entendres.", "isCorrect": true, "rationale": "The name 'Pastinaca' (parsnip/stingray) and the flying pruning-hooks ('pennati', which also means feathered) are linguistic jokes typical of the friar's nonsensical travelogue."}, {"text": "A legitimate historical province in the Far East known for advanced agriculture.", "isCorrect": false, "rationale": "The entire itinerary is a 'geography of nonsense' intended to dazzle the gullible, not a record of actual exploration."}, {"text": "The ancestral home of the Baronci family in the Florentine countryside.", "isCorrect": false, "rationale": "While the puns often refer to local Florentine landmarks, 'India Pastinaca' is presented as an exotic, distant land in the friar's fiction."}, {"text": "The specific region where the Angel Gabriel was said to have left his feather.", "isCorrect": false, "rationale": "Cipolla claims to have received the feather in the Holy Land from a patriarch, not in India Pastinaca."}]}, {"question": "How does Fra Cipolla rhetorically justify the presence of charcoal in his casket instead of the expected feather?", "options": [{"text": "He claims God guided his hand to the wrong casket because the feast of St. Lawrence was imminent.", "isCorrect": true, "rationale": "Cipolla improvises that the mistake was a divine intervention to remind the people of St. Lawrence, who was roasted on coals."}, {"text": "He asserts that the feather was miraculously transformed into charcoal to test the townspeople's faith.", "isCorrect": false, "rationale": "He does not claim a transformation occurred; instead, he claims he simply grabbed the wrong casket from his collection of relics."}, {"text": "He blames his servant Guccio for swapping the items as a penance for his sins.", "isCorrect": false, "rationale": "Although he privately blames Guccio's negligence, he publicly claims the event was a purposeful 'interposition of God'."}, {"text": "He argues that the charcoal is actually the carbonized remains of the Angel Gabriel's light.", "isCorrect": false, "rationale": "His explanation specifically links the charcoal to the martyrdom of St. Lawrence, not to the nature of angels."}]}, {"question": "The 'Ladies' Vale' is described as having a unique topography. What specific feature characterizes the slopes of the surrounding hills?", "options": [{"text": "They were graduated like the tiers of a theatre and planted with various fruit trees.", "isCorrect": true, "rationale": "The text describes the slopes as graduated from summit to base like 'successive tiers... in our theatres,' densely planted with vines and fruit trees."}, {"text": "They were jagged cliffs of living rock that made the vale inaccessible to sunlight.", "isCorrect": false, "rationale": "While there were ledges of rock where the rivulet fell, the slopes themselves were cultivated and compared to an amphitheater."}, {"text": "They were covered in thick, dark forests that housed various wild beasts and exotic birds.", "isCorrect": false, "rationale": "The north-facing slopes had copses of oak and ash, but the overall description emphasizes symmetry, order, and agricultural beauty."}, {"text": "They were arranged in a perfect square, with a palace at each of the four corners.", "isCorrect": false, "rationale": "The text states the vale was exactly circular and surrounded by six hills, each with a palace."}]}, {"question": "What is the subject of the theme proposed by Dioneo for the seventh day of storytelling?", "options": [{"text": "Tricks that wives have played on their husbands for love or to escape peril.", "isCorrect": true, "rationale": "Dioneo ordains that they discourse on 'the tricks that... ladies have heretofore played their husbands,' specifically mentioning motives of love or deliverance from danger."}, {"text": "The various ways in which servants have outwitted their masters through ready wit.", "isCorrect": false, "rationale": "While Day VI focused on 'quick wit and ready speech,' Day VII shifts focus specifically to marital deception."}, {"text": "Stories concerning those who have acquired a long-desired object through great effort.", "isCorrect": false, "rationale": "This describes a different theme; Dioneo's choice is inspired specifically by the earlier comments made by the maid Licisca regarding wives."}, {"text": "Accounts of miracles performed by relics, whether genuine or fraudulent.", "isCorrect": false, "rationale": "Although Fra Cipolla's story involves a fraudulent relic, Dioneo chooses to move away from the current day's theme for the next session."}]}, {"question": "During his sermon, Fra Cipolla mentions 'the venerable father Nonmiblasmetesevoipiace.' What is the satirical meaning of this name?", "options": [{"text": "Do not blame me, if you please.", "isCorrect": true, "rationale": "The name is a long Italian phrase 'Non mi blasmete se voi piace,' which translates to 'Don't blame me if you please,' highlighting the absurdity of his 'travels'."}, {"text": "He who brings the holy light.", "isCorrect": false, "rationale": "The name does not refer to light or holiness, but is part of the friar's linguistic obfuscation to prevent listeners from questioning him."}, {"text": "The protector of the poor and the weak.", "isCorrect": false, "rationale": "The text uses puns to signal the friar's shamelessness; the name is a defensive plea disguised as a title."}, {"text": "The one who travels without moving.", "isCorrect": false, "rationale": "While the friar's journey is indeed stationary/imaginary, the specific translation of the name refers to avoiding blame."}]}, {"question": "What happens to the two pranksters, Giovanni and Biagio, at the conclusion of the story?", "options": [{"text": "They return the feather to the friar and share a laugh with him over his cleverness.", "isCorrect": true, "rationale": "After the sermon, the young men merrily confess their deed and return the feather, admiring how Cipolla handled the situation."}, {"text": "They are publicly shamed by the townspeople for attempting to steal a holy relic.", "isCorrect": false, "rationale": "The townspeople never realize they were tricked; they believe the charcoal is a genuine relic of St. Lawrence."}, {"text": "They are converted by the friar's eloquence and join his mendicant order.", "isCorrect": false, "rationale": "The pranksters remain 'wily young wags' who appreciate the friar's skill as a fellow performer/trickster."}, {"text": "They flee Certaldo in fear after the friar threatens them with a curse from St. Antony.", "isCorrect": false, "rationale": "There is no confrontation involving curses; the encounter is described as jovial and mutually appreciative of the 'ready wit'."}]}, {"question": "Guccio's interaction with Nuta in the kitchen is described as being 'all heedless of his cowl.' What does this detail suggest about his character?", "options": [{"text": "His physical and moral slovenliness, as the cowl was covered in grease and filth.", "isCorrect": true, "rationale": "The description of his greasy cowl and filthy doublet emphasizes that he is 'uncleanly' and has no respect for the religious garment he wears."}, {"text": "His extreme dedication to his duties, as he forgot his clothing while working.", "isCorrect": false, "rationale": "The text explicitly states he left the friar's things 'to take care of themselves' to pursue Nuta."}, {"text": "His noble origin, as he spoke to her with the tone of the Sieur de Chatillon.", "isCorrect": false, "rationale": "He only *pretends* to be a gentleman; his actual appearance and character are described as 'rascallion' and 'porco'."}, {"text": "His intense piety, as the grease was from the many candles he lit for St. Antony.", "isCorrect": false, "rationale": "The text attributes the grease to his love of the kitchen and his lack of personal hygiene, not religious devotion."}]}, {"question": "Which of the following is described as an 'exceeding great profit' for Fra Cipolla at the end of his sermon?", "options": [{"text": "He collected more offerings than usual by marking people with crosses of charcoal.", "isCorrect": true, "rationale": "The townspeople pressed forward with 'offerings beyond their wont' to be touched by the 'blessed' coals."}, {"text": "He was gifted a new, clean habit and a better horse by the townspeople.", "isCorrect": false, "rationale": "While he gained money, the text does not mention him receiving a new habit or horse as a direct result of the sermon."}, {"text": "He was appointed the new Patriarch of Jerusalem by the visiting Abbot.", "isCorrect": false, "rationale": "The Patriarch of Jerusalem is a character in his fictional story, not a real person who rewards him in Certaldo."}, {"text": "He successfully convinced the local bishop to validate his 'feather' as a genuine relic.", "isCorrect": false, "rationale": "The validation he mentions is part of his fabricated speech; the profit he gains is purely financial from the gullible crowd."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
