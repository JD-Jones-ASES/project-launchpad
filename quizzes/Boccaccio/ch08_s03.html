<div class="quiz-container">

        <a href="../../courses/Boccaccio.html">&larr; Back to Tales of the Decameron (Boccaccio)</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 8, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the introductory commentary, why is the setting of Naples particularly significant for this specific tale in the Decameron?", "options": [{"text": "Boccaccio spent his youth at the Angevin court there and understood the lives of the urban poor in that city.", "isCorrect": true, "rationale": "The commentary highlights Boccaccio's intimate knowledge of Naples and its lower classes as a key factor in the tale's realistic detail."}, {"text": "The legal codes in Naples were more lenient toward adultery than those in Florence, making the plot plausible.", "isCorrect": false, "rationale": "While legalities varied, the source material emphasizes Boccaccio's personal history and his depiction of class rather than specific legal codes."}, {"text": "Naples was the only city in the $14^{th}$ century where a woman of Peronella's rank could legally own property like the tun.", "isCorrect": false, "rationale": "The text focuses on the economic reality of the poor household rather than the legalities of female property ownership."}, {"text": "The tale was originally a Neapolitan folk legend that Boccaccio merely translated into the Tuscan dialect.", "isCorrect": false, "rationale": "While the plot of a hidden lover is old, the commentary attributes the specific craft and class-consciousness of this version to Boccaccio's own skill and experience."}]}, {"question": "What reason does Peronella's husband give for returning home early on the day the events take place?", "options": [{"text": "It is the feast of San Galeone, which is observed as a holiday.", "isCorrect": true, "rationale": "The husband explicitly states that he returned because it is a holiday for that specific saint."}, {"text": "He suspected Peronella was being unfaithful and returned to catch her in the act.", "isCorrect": false, "rationale": "The husband's internal monologue reveals he actually praises God for having such an 'honest girl' for a wife, indicating he suspects nothing."}, {"text": "He had already completed his work for the day and sold the tun to a passing merchant.", "isCorrect": false, "rationale": "He returns with the intent to sell the tun, but he has not yet completed the transaction until he arrives home with the buyer."}, {"text": "The construction site where he works as a mason was closed due to a lack of building materials.", "isCorrect": false, "rationale": "While he is a mason, the text attributes his early return to the religious holiday rather than professional logistical issues."}]}, {"question": "In the context of the 'beffa', how does Peronella pivot her strategy when her husband first knocks on the door?", "options": [{"text": "She shifts from a state of panic to an aggressive verbal attack, accusing her husband of laziness and neglect.", "isCorrect": true, "rationale": "The 'What to Watch For' section and the primary text describe her transition from fear ('I am a dead woman') to an offensive performance."}, {"text": "She feigns a sudden illness to distract him from the presence of the tun in the main room.", "isCorrect": false, "rationale": "Peronella uses verbal brilliance and accusations of poverty rather than a physical feint or illness to deceive him."}, {"text": "She immediately confesses to a minor fault to hide the major transgression of adultery.", "isCorrect": false, "rationale": "She does the opposite of confessing; she asserts her extreme honesty and 'pride' as a woman of virtue."}, {"text": "She uses the promise of a higher sale price for the tun to immediately placate his potential anger.", "isCorrect": false, "rationale": "While she does mention the higher price, this is part of her second phase of deception after her initial verbal assault."}]}, {"question": "The husband initially brings a man home to buy the tun for a specific price. What is that price, and what price does Peronella claim she has already secured?", "options": [{"text": "The husband agreed to $5$ gigliats; Peronella claims she sold it for $7$.", "isCorrect": true, "rationale": "The text specifies the husband's deal was for five gigliats, and Peronella outdoes him by claiming a deal for seven."}, {"text": "The husband agreed to $7$ gigliats; Peronella claims she sold it for $10$.", "isCorrect": false, "rationale": "These numbers are higher than those cited in the text; the actual figures highlight the modest but significant economic stakes for the poor couple."}, {"text": "The husband agreed to $3$ gigliats; Peronella claims she sold it for $5$.", "isCorrect": false, "rationale": "The husband's actual price was five, not three, as stated during his explanation to his wife."}, {"text": "The husband agreed to $5$ gigliats; Peronella claims she sold it for $12$.", "isCorrect": false, "rationale": "While she does claim a higher price, the jump to twelve is not supported by the dialogue in the primary source."}]}, {"question": "What physical 'defect' does Giannello feign to find in the tun to ensure the husband remains occupied inside it?", "options": [{"text": "He claims it is encrusted with dry lees that must be scoured off before he will take it.", "isCorrect": true, "rationale": "Giannello pretends he cannot raise the encrustation with his nail and insists the husband clean it as a condition of the sale."}, {"text": "He claims the bottom of the tun is cracked and might leak if not sealed with pitch.", "isCorrect": false, "rationale": "Cracks are not mentioned; the deception focuses on the cleanliness of the interior rather than the structural integrity."}, {"text": "He argues that the wood is rotten and requires a thorough inspection with a light and rasp.", "isCorrect": false, "rationale": "The rasp and light are used for cleaning the 'lees,' not for checking for rot in the wood."}, {"text": "He asserts that the tun smells of soured wine, which will ruin his intended storage.", "isCorrect": false, "rationale": "Though related to the 'lees,' the specific objection recorded is the physical encrustation that he cannot remove with his nail."}]}, {"question": "In the commentary, the tun (or jar) is described as having three simultaneous roles. Which of the following is NOT one of those roles?", "options": [{"text": "A religious metaphor for the 'empty' vessel of the husband's intellect.", "isCorrect": true, "rationale": "The commentary lists the roles as a hiding place, a commercial object, and a comic stage, but does not suggest it serves as a religious metaphor."}, {"text": "A hiding place for the lover during the husband's unexpected return.", "isCorrect": false, "rationale": "This is one of the three roles mentioned in the 'What to Watch For' section of the commentary."}, {"text": "A commercial object representing the economic reality of a poor household.", "isCorrect": false, "rationale": "The text explicitly discusses the tun as a valuable commodity in a household with very few possessions."}, {"text": "A comic stage upon which the 'beffa' or trick is performed.", "isCorrect": false, "rationale": "The commentary identifies the jar as the central setting for the final comedic performance of the tale."}]}, {"question": "How does Peronella supplement the household income, and what does she claim is happening to her as a result of this labor?", "options": [{"text": "She spins wool; she claims the flesh is falling away from her nails from the constant work.", "isCorrect": true, "rationale": "The text describes her spinning and her hyperbolic complaint about the physical toll it takes to keep the lamp lit."}, {"text": "She sews garments; she claims her eyesight is failing in the dim light of their home.", "isCorrect": false, "rationale": "While she mentions a gown, her primary work described in the text is spinning, and she focuses on her 'nails' rather than her eyes."}, {"text": "She washes laundry for the wealthy; she claims her back is broken from the heavy loads.", "isCorrect": false, "rationale": "The text specifically mentions spinning 'day and night' rather than laundering clothes."}, {"text": "She sells bread in the market; she claims she is mocked by the neighbors for her poverty.", "isCorrect": false, "rationale": "She does claim the neighbors mock her, but her work is spinning, and she complains about the husband's lack of work providing bread."}]}, {"question": "What is the primary motive Filostrato gives for telling this story to the assembled ladies?", "options": [{"text": "To warn men that women are just as clever at playing tricks as they are, discouraging them from being guileful.", "isCorrect": true, "rationale": "Filostrato states his intention is to let men know their ladies 'know somewhat,' which should serve as a 'notable check' on men's tricks."}, {"text": "To celebrate the cleverness of the Neapolitan lower classes over the Florentine elite.", "isCorrect": false, "rationale": "While the story does this, Filostrato's stated purpose is specifically about the gendered power dynamic of deception."}, {"text": "To provide a moral warning about the dangers of leaving one's wife unattended during holidays.", "isCorrect": false, "rationale": "Filostrato's introduction is celebratory of the woman's wit rather than a moralistic warning to husbands."}, {"text": "To encourage the ladies to find lovers who are wealthier than their husbands.", "isCorrect": false, "rationale": "Although money is a factor in the story's background, the stated purpose of the tale is the publication of women's wit in the face of men's guile."}]}, {"question": "What specific action does Peronella take to 'direct' her husband while he is inside the tun, which simultaneously assists her lover?", "options": [{"text": "She thrusts her head and arm into the vent, completely blocking his view of the outside.", "isCorrect": true, "rationale": "By blocking the vent to 'admonish' him, she provides cover for Giannello to take his pleasure without being seen."}, {"text": "She sings a loud song to drown out any noise Giannello might make as he moves.", "isCorrect": false, "rationale": "There is no mention of singing; her deception is visual and instructional."}, {"text": "She holds the light in such a way that it blinds her husband while he scrapes.", "isCorrect": false, "rationale": "While a light is involved, the text emphasizes her body blocking the vent as the key physical obstruction."}, {"text": "She constantly strikes the outside of the tun with his tools to create a rhythmic distraction.", "isCorrect": false, "rationale": "The husband is using the tools inside the tun; Peronella uses her voice and her position at the vent."}]}, {"question": "How does the story conclude regarding the sale of the tun?", "options": [{"text": "Giannello pays the seven gigliats and has the husband carry the scoured tun to his house.", "isCorrect": true, "rationale": "The final lines state that Giannello paid the higher price and the husband performed the delivery."}, {"text": "The husband discovers Giannello and refuses to finish the cleaning, resulting in no sale.", "isCorrect": false, "rationale": "The deception is successful; the husband never realizes he has been cuckolded and completes the sale happily."}, {"text": "Giannello leaves without paying, claiming the tun is still too dirty to be used.", "isCorrect": false, "rationale": "Giannello declares he is 'well content' and pays the husband the agreed-upon seven gigliats."}, {"text": "The original buyer that the husband brought home returns and offers eight gigliats, causing a dispute.", "isCorrect": false, "rationale": "The first buyer takes himself off as soon as he hears Peronella has secured a better price."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
