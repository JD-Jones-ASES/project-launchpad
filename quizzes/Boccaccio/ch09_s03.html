        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Boccaccio.html">&larr; Back to Tales of the Decameron (Boccaccio)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 9, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "In the context of the Decameron, what distinguishes the character of Calandrino from other protagonists in the collection?", "options": [{"text": "He is the only true recurring protagonist across multiple tales.", "isCorrect": true, "rationale": "Boccaccio devotes four separate tales to Calandrino, a unique treatment compared to other characters who usually appear in only one story."}, {"text": "He is the only character based on a documented historical figure.", "isCorrect": false, "rationale": "While Calandrino was a real person, his friends Bruno and Buffalmacco were also real painters documented by historians like Vasari."}, {"text": "He is the only character who successfully performs a 'beffa' on others.", "isCorrect": false, "rationale": "Calandrino is consistently depicted as the victim or 'dupe' of the 'beffa' (prank) rather than the perpetrator."}, {"text": "He is the only protagonist who resides in the city of Florence.", "isCorrect": false, "rationale": "Many tales in the Decameron are set in Florence or feature Florentine citizens as main characters."}], "id": "q01"}, {"question": "According to Maso del Saggio’s elaborate lie, what is a unique geographical feature of the land of Bengodi?", "options": [{"text": "A mountain made entirely of grated Parmesan cheese.", "isCorrect": true, "rationale": "Maso describes a mountain of Parmesan where people do nothing but make and boil macaroni and ravioli."}, {"text": "Rivers that flow with liquid gold instead of water.", "isCorrect": false, "rationale": "While the description is fantastical, the text specifically mentions a rivulet of Vernaccia wine, not gold."}, {"text": "Forests where the trees grow ready-to-eat loaves of bread.", "isCorrect": false, "rationale": "Maso mentions vines tied with sausages, but the bread tree detail is not part of his specific tall tale."}, {"text": "Fields where silver coins sprout like wildflowers.", "isCorrect": false, "rationale": "Maso mentions that a denier can buy a goose, implying a low cost of living, but not that money grows from the ground."}], "id": "q02"}, {"question": "Why does Bruno suggest that the group wait until Sunday to search for the heliotrope in the Mugnone?", "options": [{"text": "To avoid being spotted by others who might steal their idea.", "isCorrect": true, "rationale": "Bruno argues that on working days, many people would be around the stream and might guess what they are looking for."}, {"text": "Because the stone only gains its magical properties on a holiday.", "isCorrect": false, "rationale": "The magic of the stone is presented as inherent; the delay is purely a tactical excuse to further the prank."}, {"text": "Because the water level in the stream is lowest on the weekend.", "isCorrect": false, "rationale": "Bruno mentions the sun drying the stones to make them look white, but he does not mention water levels as a reason for the Sunday delay."}, {"text": "To ensure they have enough time for a religious pilgrimage first.", "isCorrect": false, "rationale": "The characters show little religious motivation; the Sunday choice is framed as a matter of privacy and leisure."}], "id": "q03"}, {"question": "What physical characteristic does Maso attribute to the heliotrope to help Calandrino identify it?", "options": [{"text": "It is nearly black in color.", "isCorrect": true, "rationale": "Maso informs Calandrino that while the stones vary in size and shape, they are all consistently black."}, {"text": "It glows with a faint green light at night.", "isCorrect": false, "rationale": "Maso mentions emeralds that shine at midnight elsewhere in his lie, but describes the heliotrope differently."}, {"text": "It is perfectly spherical and smooth to the touch.", "isCorrect": false, "rationale": "Maso explicitly states that the size and shape of the stones vary."}, {"text": "It has red flecks that resemble drops of blood.", "isCorrect": false, "rationale": "While 'bloodstone' is a real-world name for heliotrope, Maso specifies that these particular stones are nearly black."}], "id": "q04"}, {"question": "What does the text suggest about the 'psychology of belief' regarding Calandrino's behavior during the stoning?", "options": [{"text": "He endures physical pain rather than question his belief in the stone's power.", "isCorrect": true, "rationale": "Calandrino is so convinced he is invisible that he remains silent and continues walking despite being hit by heavy rocks."}, {"text": "He believes the stones are actually hitting an invisible barrier.", "isCorrect": false, "rationale": "Calandrino feels the pain (gasping and hopping), but attributes the event to his friends' inability to see him rather than a failure of the stone."}, {"text": "He thinks the pain is a necessary ritual to activate the stone's magic.", "isCorrect": false, "rationale": "The text indicates he simply wants to get home with his 'invisible' treasure and does not want to alert his friends to his presence."}, {"text": "He realizes he is being tricked but plays along to avoid embarrassment.", "isCorrect": false, "rationale": "The narrative emphasizes Calandrino's genuine gullibility and his shock upon realizing his wife can see him."}], "id": "q05"}, {"question": "What detail about Calandrino’s clothing is mentioned when he begins collecting stones in the Mugnone?", "options": [{"text": "His gown was not cut after the fashion of Hainault.", "isCorrect": true, "rationale": "The text notes this specific fashion detail to explain how he was able to gather up his skirts to create a large 'lap' for the stones."}, {"text": "He wore a specialized apron designed for carrying tools.", "isCorrect": false, "rationale": "He uses the folds of his tunic and cloak, rather than a specialized garment, to carry the heavy load."}, {"text": "He was dressed in expensive silks that were ruined by the rocks.", "isCorrect": false, "rationale": "Calandrino is a painter of modest means, and the text emphasizes his 'uncouth manners' and modest house."}, {"text": "He wore a hooded cowl that obscured his vision.", "isCorrect": false, "rationale": "His vision is not obscured; rather, he believes his own person is obscured from others' vision."}], "id": "q06"}, {"question": "How do the customs officers at the Porta a San Gallo participate in the prank?", "options": [{"text": "They were previously instructed by Bruno and Buffalmacco to ignore Calandrino.", "isCorrect": true, "rationale": "The text states the officers were 'primed' by the friends to let Calandrino pass unchallenged, reinforcing his belief in his invisibility."}, {"text": "They were distracted by a staged argument between the two friends.", "isCorrect": false, "rationale": "Bruno and Buffalmacco were following some distance behind Calandrino; the officers' silence was pre-arranged."}, {"text": "They were actually bribed with the very stones Calandrino had collected.", "isCorrect": false, "rationale": "Calandrino kept all his stones until he reached his house; the officers' cooperation was based on the friends' setup."}, {"text": "They were asleep at their posts when Calandrino passed through.", "isCorrect": false, "rationale": "The text mentions they were watching and later shared a laugh with the pranksters after Calandrino passed."}], "id": "q07"}, {"question": "According to Calandrino, why did the heliotrope lose its power when he arrived home?", "options": [{"text": "Magical virtues are nullified by the presence of a woman.", "isCorrect": true, "rationale": "Calandrino blames his wife, Monna Tessa, citing the belief that women cause things to lose their magical properties."}, {"text": "The stone's power only lasts while the possessor is in motion.", "isCorrect": false, "rationale": "Calandrino believes the stone's power was active throughout his walk; he only blames his wife's appearance for the failure."}, {"text": "He accidentally dropped the 'true' heliotrope among the common stones.", "isCorrect": false, "rationale": "While he has a pile of common stones, Calandrino is convinced he had the real one and that its power was destroyed by his wife."}, {"text": "He had forgotten the secret name of the stone, breaking the spell.", "isCorrect": false, "rationale": "Although he did forget the name 'heliotrope' earlier, he believed the stone worked regardless until he reached his house."}], "id": "q08"}, {"question": "What ironic meaning is behind the name 'Maso del Saggio'?", "options": [{"text": "His name suggests he is wise, but his talent lies in making fools of others.", "isCorrect": true, "rationale": "'Del Saggio' means 'of the wise', which is ironic given his reputation as a notorious joker and prankster."}, {"text": "He is a wealthy merchant who pretends to be a poor painter.", "isCorrect": false, "rationale": "Maso is described as a wit and a dexterous fellow, but his irony is linked to his name and actions, not his social class."}, {"text": "He is a real lapidary who claims to be a simple painter.", "isCorrect": false, "rationale": "He 'feigns' being a lapidary to trick Calandrino; he is not a real one."}, {"text": "His name means 'The Silent One,' yet he is famous for tall tales.", "isCorrect": false, "rationale": "The name 'Maso' is a diminutive of Tommaso; the irony is specifically in the 'Saggio' (Wise) part of his title."}], "id": "q09"}, {"question": "How do Bruno and Buffalmacco respond when they find Calandrino beating his wife?", "options": [{"text": "They feign anger at him for 'tricking' them at the stream and leaving them behind.", "isCorrect": true, "rationale": "They maintain the ruse by acting offended that Calandrino supposedly used the stone to ditch them, further cementing his belief that it worked."}, {"text": "They immediately confess the prank to save Monna Tessa from further harm.", "isCorrect": false, "rationale": "The pranksters do not confess; instead, they intervene only to gaslight him further by explaining why the 'luck' failed."}, {"text": "They join in the beating, claiming she ruined their chance at wealth.", "isCorrect": false, "rationale": "They actually hold him back and eventually persuade him to forgive her, though their reasons are still part of the lie."}, {"text": "They pretend they still cannot see him even while he is standing in the room.", "isCorrect": false, "rationale": "By the time they reach the house, they speak directly to him, acknowledging they can see him and asking about the stones."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
