        <h1>QUIZ</h1>
        <div class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 5, Section 2</div>

        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is structurally significant about Boccaccio's introduction to Day the Fourth?", "options": [{"text": "It is the only instance where the author's voice directly interrupts the fictional frame narrative.", "isCorrect": true, "rationale": "Boccaccio breaks the established frame narrative of the ten storytellers to address his critics directly in his own voice."}, {"text": "It serves as the first time the storytellers leave the garden to return to Florence.", "isCorrect": false, "rationale": "While Florence is mentioned in the parable, the frame narrative characters do not return to the city at this point."}, {"text": "It introduces the concept of a 'King' or 'Queen' ruling the day for the first time.", "isCorrect": false, "rationale": "The practice of electing a ruler for the day was established at the very beginning of the Decameron, well before Day IV."}, {"text": "It is written in Latin to distinguish the author's voice from the 'vulgar' Florentine of the tales.", "isCorrect": false, "rationale": "The text explicitly mentions that the stories are written in the 'vulgar Florentine,' and the preface continues in this accessible style."}], "id": "q01"}, {"question": "Boccaccio uses the metaphor of a leek to respond to which specific criticism?", "options": [{"text": "The idea that he is too old to be writing about love and women.", "isCorrect": true, "rationale": "He compares himself to a leek, which has a white head (old age) but a green tail (youthful passion or vitality)."}, {"text": "The accusation that his stories are factual inaccuracies.", "isCorrect": false, "rationale": "While he addresses accuracy, the leek metaphor specifically targets the 'white head' or gray hair associated with his age."}, {"text": "The claim that he should be pursuing 'daily bread' instead of fables.", "isCorrect": false, "rationale": "He responds to the 'bread' criticism by discussing the wealth of poets and his own self-sufficiency, not his physical appearance."}, {"text": "The criticism that he has abandoned the Muses on Parnassus.", "isCorrect": false, "rationale": "His defense regarding the Muses involves comparing the beauty of women to the appearance of the Muses themselves."}], "id": "q02"}, {"question": "In the parable of Filippo Balducci, what is the primary purpose of calling women 'goslings' (papere)?", "options": [{"text": "To prevent the son from developing a 'mischievous craving' by devaluing the women's identity.", "isCorrect": true, "rationale": "The father uses a dismissive, non-human name to hide the truth and suppress the boy's natural attraction."}, {"text": "To teach the son about the agricultural lifestyle of the Florentine countryside.", "isCorrect": false, "rationale": "The father's goal was total isolation from worldly matters, not education in agriculture or city life."}, {"text": "To imply that women are noisy and unintelligent creatures of the field.", "isCorrect": false, "rationale": "While 'goslings' might imply this to a reader, the father's specific intent was to mask their true nature as women to protect the boy's celibacy."}, {"text": "To honor a specific Florentine tradition regarding wedding processions.", "isCorrect": false, "rationale": "There is no indication in the text that calling women 'goslings' was a standard or honorable tradition."}], "id": "q03"}, {"question": "What does the etymology of the name 'Filostrato' reveal about the theme of Day IV?", "options": [{"text": "It suggests the stories will focus on those 'vanquished by love.'", "isCorrect": true, "rationale": "The name is derived from Greek and Italian roots meaning 'struck down' or 'prostrated' by love, fitting the tragic theme."}, {"text": "It indicates a return to the 'clever triumphs' seen in Day III.", "isCorrect": false, "rationale": "The text explicitly states that Day IV shifts away from clever triumphs toward love's unhappy and tragic endings."}, {"text": "It signifies 'lover of stars,' reflecting the cosmic nature of destiny.", "isCorrect": false, "rationale": "The text provides a specific etymology involving 'struck down' (strato) rather than 'stars' (astro)."}, {"text": "It means 'truth-teller,' defending the author's accuracy.", "isCorrect": false, "rationale": "The name is tied to the protagonist of Boccaccio's earlier poem about Troilus and Criseyde, centering on romantic tragedy."}], "id": "q04"}, {"question": "Boccaccio argues that his work does not truly stray from Mount Parnassus and the Muses because:", "options": [{"text": "The ladies he writes for share an outward semblance with the Muses.", "isCorrect": true, "rationale": "Boccaccio claims that because the Muses are 'ladies' and mortal women resemble them, he remains in their company metaphorically."}, {"text": "He only writes his stories after making a sacramental confession.", "isCorrect": false, "rationale": "While he mentions 'confess' in a rhetorical sense to his critics, he does not link his literary inspiration to religious confession."}, {"text": "The Muses themselves commanded him to write in the Florentine tongue.", "isCorrect": false, "rationale": "He credits the Muses with aid and influence, but notes that women—not the Muses—were the direct 'occasion' for his verses."}, {"text": "His critics are too 'witless' to understand the secret Latin codes in his prose.", "isCorrect": false, "rationale": "Boccaccio emphasizes the simple and 'homely' style of his prose rather than any hidden linguistic complexity."}], "id": "q05"}, {"question": "What is Boccaccio’s response to critics who suggest he should focus on 'getting his daily bread'?", "options": [{"text": "He asserts that poets often find more 'bread' in fables than rich men find in treasures.", "isCorrect": true, "rationale": "Boccaccio argues that literature provides its own form of sustenance and that chasing material wealth often leads to misery."}, {"text": "He admits he is currently starving and asks his critics for charity.", "isCorrect": false, "rationale": "He explicitly states that he is not in need of bread and would be beholden to no one but himself if he were."}, {"text": "He claims that his 'daily bread' is provided by the ladies of Florence.", "isCorrect": false, "rationale": "While he writes for the ladies, he characterizes his physical survival as something he manages independently, like 'the Apostle'."}, {"text": "He argues that writing prose is more profitable than writing poetry.", "isCorrect": false, "rationale": "The text does not compare the profitability of prose versus poetry; it defends the value of 'fables' generally."}], "id": "q06"}, {"question": "According to the preface, what is the 'vehement and scorching blast' that Boccaccio misjudged?", "options": [{"text": "The power of envy to reach even those in the 'depth of the valley.'", "isCorrect": true, "rationale": "Boccaccio thought envy only attacked the high and mighty, but found it reached him despite his simple style and humble subject matter."}, {"text": "The intensity of the plague currently ravaging Florence.", "isCorrect": false, "rationale": "While the plague is the background of the Decameron, this specific passage refers to the social 'hurricane' of criticism and envy."}, {"text": "The natural romantic urges of a young man raised in isolation.", "isCorrect": false, "rationale": "While he describes love as 'potent,' the 'scorching blast' specifically refers to the external attacks from his detractors."}, {"text": "The divine wrath of God against those who write secular fiction.", "isCorrect": false, "rationale": "Boccaccio attributes the attacks to human 'censors' and 'envy,' rather than divine judgment."}], "id": "q07"}, {"question": "Which trio of poets does Boccaccio cite as examples of men who honored ladies in their old age?", "options": [{"text": "Guido Cavalcanti, Dante Alighieri, and Cino da Pistoia.", "isCorrect": true, "rationale": "Boccaccio uses these esteemed poets to validate his own choice to write about women despite his advancing years."}, {"text": "Petrarch, Virgil, and Homer.", "isCorrect": false, "rationale": "These poets are not mentioned in this specific list of elderly poets who 'ministered gratification' to ladies."}, {"text": "Filippo Balducci, Filostrato, and Fiammetta.", "isCorrect": false, "rationale": "These are characters from the Decameron's frame or parable, not the historical poets Boccaccio cites as authorities."}, {"text": "Aristotle, the Apostle, and the Muses.", "isCorrect": false, "rationale": "While 'the Apostle' is mentioned elsewhere regarding self-sufficiency, this group does not represent the poets cited as precedents."}], "id": "q08"}, {"question": "What does the parable of the goslings argue about the nature of love?", "options": [{"text": "Love is a natural force that prevails even without prior knowledge or education.", "isCorrect": true, "rationale": "The boy desires the 'goslings' instantly despite having no concept of what women are, proving love is innate."}, {"text": "Love is a corruption of the mind that can be avoided through religious fasting.", "isCorrect": false, "rationale": "The story shows that despite years of fasting and prayer, the boy's natural instinct was still more powerful."}, {"text": "Love is only experienced by those who have seen the 'painted angels' of Florence.", "isCorrect": false, "rationale": "The boy notes that the women are fairer than the painted angels, suggesting love surpasses religious iconography."}, {"text": "Love is a culturally learned behavior that requires 'art' and social conditioning.", "isCorrect": false, "rationale": "Boccaccio explicitly states that nature was 'more potent than [the father's] art,' arguing the opposite."}], "id": "q09"}, {"question": "How does Boccaccio characterize the 'vulgar Florentine' style of his stories in the preface?", "options": [{"text": "As a 'homely and simple' style intended to elude the 'buffetings' of envy.", "isCorrect": true, "rationale": "He claims he chose a humble language and prose format to stay 'in the depth of the valley' and avoid being a target for critics."}, {"text": "As a revolutionary new dialect designed to replace the Muses' influence.", "isCorrect": false, "rationale": "Boccaccio still respects the Muses and claims to be under their influence; he does not see his style as an act of replacement."}, {"text": "As a complex linguistic experiment meant to challenge the 'wise'.", "isCorrect": false, "rationale": "The text states the stories are written 'without dedicatory flourish' and in a style as simple as possible."}, {"text": "As a sacred language equivalent to the orisons taught to Filippo's son.", "isCorrect": false, "rationale": "Boccaccio distinguishes his 'little stories' and 'idle toys' from the holy exercises of the religious life."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
