        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Boccaccio.html">&larr; Back to Tales of the Decameron (Boccaccio)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 10, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What specific realistic detail of medieval life does Boccaccio utilize to make the 'bed-trick' and the resulting chaos plausible in this setting?", "options": [{"text": "The common practice of multiple unrelated travelers and hosts sharing a single sleeping chamber.", "isCorrect": true, "rationale": "The text explains that privacy was a luxury of the wealthy and that medieval inns often housed everyone in one room, which is central to the confusion."}, {"text": "The strict religious laws requiring guests to be housed in the same room as the innkeeper for safety.", "isCorrect": false, "rationale": "While safety might be an implicit concern, the text specifically identifies the lack of privacy as a function of the host's economic status and general medieval customs."}, {"text": "The architectural design of provincial inns which mandated three beds per room to maximize space.", "isCorrect": false, "rationale": "The three-bed layout was specific to this host's 'economy' and the size of his family, not a universal architectural mandate mentioned in the text."}, {"text": "The absence of artificial lighting, making it impossible to identify faces even at close range.", "isCorrect": false, "rationale": "While darkness is the catalyst, the text emphasizes the shared spatial arrangement of the room as the primary realistic detail supporting the plot."}]}, {"question": "According to the introductory notes, how does Boccaccio differentiate his version of the 'bed-trick' from its classical or biblical predecessors?", "options": [{"text": "By applying a characteristically Italian spin within a crowded provincial inn setting.", "isCorrect": true, "rationale": "The text notes that Boccaccio gives the ancient device an Italian flavor by choosing a specific, realistically detailed provincial setting."}, {"text": "By introducing a moral lesson regarding the consequences of infidelity and deception.", "isCorrect": false, "rationale": "The introductory notes explicitly state that the tale is 'pure farce' with 'no moral lesson' and 'no satirical target'."}, {"text": "By focusing on the romantic emotional depth of the lovers rather than the physical comedy.", "isCorrect": false, "rationale": "The text describes the tale as a 'comedy of bodies in the dark,' prioritizing timing and spatial choreography over emotional depth."}, {"text": "By utilizing a female protagonist who orchestrates the confusion for her own gain.", "isCorrect": false, "rationale": "The confusion is initiated by Pinuccio and an accidental cat, though the host's wife later cleverly resolves the situation."}]}, {"question": "Which action by Adriano serves as the unintentional 'trigger' for the chain of mistaken identities regarding the beds?", "options": [{"text": "Moving the cradle from the host's bed to his own bed to clear a path.", "isCorrect": true, "rationale": "When Adriano moves the cradle to pass by, he inadvertently changes the physical marker that the wife and Pinuccio use to identify the 'correct' bed in the dark."}, {"text": "Loudly laughing at the host's anger to distract him from Pinuccio's confession.", "isCorrect": false, "rationale": "While Adriano laughs later to manage the situation, this occurs after the confusion has already reached its peak."}, {"text": "Leaving the room to check on the horses, causing the door to creak.", "isCorrect": false, "rationale": "Adriano gets up to 'answer the call of nature' within the room or its vicinity; he does not go to the horses during the main sequence of events."}, {"text": "Accidentally oversetting furniture and blaming it on a cat.", "isCorrect": false, "rationale": "The text states that things were 'overset by a cat,' which aroused the wife, but Adriano was not responsible for the noise."}]}, {"question": "Why does Pinuccio enter the host's bed and confess his exploits, thinking he is speaking to Adriano?", "options": [{"text": "He uses the cradle's new position as a landmark to determine which bed is his own.", "isCorrect": true, "rationale": "Pinuccio encounters the cradle and, assuming it is still by the host's bed, reasons that the bed *further* along must be his own, leading him straight to the host."}, {"text": "The host purposely moved into Pinuccio's bed to catch him in a lie.", "isCorrect": false, "rationale": "The host remained in his own bed; it was Pinuccio's orientation that failed due to the moved cradle."}, {"text": "He was intoxicated from the wine they drank with the host and lost his bearings.", "isCorrect": false, "rationale": "While Adriano later claims they drank too much as an excuse, Pinuccio's error is attributed to the spatial confusion of the cradle, not actual drunkenness."}, {"text": "He heard Adriano's voice coming from that side of the room and followed it.", "isCorrect": false, "rationale": "The room was silent until Pinuccio began speaking to the person he assumed was Adriano."}]}, {"question": "How does the host's wife successfully 'cloak' her own and her daughter's potential disgrace when the shouting begins?", "options": [{"text": "She moves the cradle to her daughter's bedside and claims she has been with the girl all night.", "isCorrect": true, "rationale": "By moving the cradle once more, she creates a physical 'proof' that she was sleeping by Niccolosa, allowing her to claim Pinuccio is merely dreaming."}, {"text": "She pretends to be a ghost to frighten the host into silence.", "isCorrect": false, "rationale": "This is a farce based on realism and quick thinking, not supernatural deception."}, {"text": "She threatens to leave the host if he continues to insult their guests.", "isCorrect": false, "rationale": "She uses a logical (if false) explanation of Pinuccio's behavior rather than emotional blackmail."}, {"text": "She hides in the valises brought by the guests until the host calms down.", "isCorrect": false, "rationale": "The valises were filled with straw to simulate luggage and were not used as hiding places in the story."}]}, {"question": "What reason does Adriano give to the host to support the wife's claim that Pinuccio is lying?", "options": [{"text": "Pinuccio has a chronic habit of sleepwalking and reciting his dreams as truth.", "isCorrect": true, "rationale": "Adriano reinforces the wife's lie by scolding Pinuccio for his 'bad habit' of walking and talking in his dreams."}, {"text": "Pinuccio is a known fabricator who often brags about imaginary conquests.", "isCorrect": false, "rationale": "Adriano specifically targets the idea of 'dreaming' to match the wife's explanation, rather than general character flaws."}, {"text": "The wine in that region is known to cause vivid hallucinations and night terrors.", "isCorrect": false, "rationale": "While he mentions they 'drank too much,' the specific excuse for the confession is the sleepwalking habit."}, {"text": "Pinuccio is actually blind in the dark and often wanders into the wrong beds.", "isCorrect": false, "rationale": "This would admit Pinuccio was in the wrong bed; the 'dream' excuse allows them to claim he was never in Niccolosa's bed at all."}]}, {"question": "At the conclusion of the story, who does the host's wife believe to be the only person who remained awake during the night?", "options": [{"text": "Herself.", "isCorrect": true, "rationale": "Because the host believes Pinuccio was dreaming and Niccolosa backs up the mother, the wife 'accounted herself the only one that had watched,' ironically ignoring Adriano's wakefulness."}, {"text": "Pinuccio.", "isCorrect": false, "rationale": "The wife believes her daughter and husband were fooled, but she assumes she is the only one who truly knows what happened (despite Adriano's involvement)."}, {"text": "The host.", "isCorrect": false, "rationale": "The host is the primary person being deceived in the end; he is convinced he was the one who 'woke' Pinuccio."}, {"text": "Niccolosa.", "isCorrect": false, "rationale": "Niccolosa assures her mother that Pinuccio dreamed, leading the mother to think the girl was asleep and unaware."}]}, {"question": "What does the narrator Panfilo suggest is the primary 'lesson' or purpose of this story?", "options": [{"text": "To show how a quick-witted woman can avoid a great scandal through her apprehension.", "isCorrect": true, "rationale": "Panfilo introduces the story by stating it will show how a 'good woman by her quick apprehension avoided a great scandal.'"}, {"text": "To warn young men against the dangers of traveling to Romagna after dark.", "isCorrect": false, "rationale": "The travel to Romagna was a ruse used by the young men, not a warning given by the narrator."}, {"text": "To provide a satirical critique of the poor conditions of provincial Italian inns.", "isCorrect": false, "rationale": "While the conditions are described, the text notes there is no 'satirical target,' only comedy."}, {"text": "To demonstrate that true love can overcome any obstacle, including a crowded room.", "isCorrect": false, "rationale": "The story is described as 'pure farce' and a 'comedy of errors' rather than a romantic epic."}]}, {"question": "Why did Pinuccio and Adriano pretend to come from Romagna when they arrived at the inn?", "options": [{"text": "To justify arriving so late and needing immediate lodging in such a small house.", "isCorrect": true, "rationale": "They 'fetched a compass' (took a detour) so they could appear as travelers coming from a distance who simply couldn't make it to Florence in time."}, {"text": "To hide the fact that they were actually Florentines, whom the host disliked.", "isCorrect": false, "rationale": "The host 'knew them both very well,' so their identity as Florentines was not a secret."}, {"text": "To explain why their horses were so exhausted and needed extra grooming.", "isCorrect": false, "rationale": "The horses were hired and the valises were fake; the exhaustion was part of the ruse to stay the night, but not the primary reason for the Romagna lie."}, {"text": "To avoid being recognized by the host's wife, who was from the same city.", "isCorrect": false, "rationale": "The host's wife is not mentioned as having any prior conflict with them that would require a false origin."}]}, {"question": "Which of the following is NOT listed in the text as an early source for the 'bed-trick' literary device?", "options": [{"text": "The Epic of Gilgamesh.", "isCorrect": true, "rationale": "The text lists the Bible (Genesis), classical comedy, and medieval fabliaux as sources, but does not mention the Epic of Gilgamesh."}, {"text": "Medieval fabliaux.", "isCorrect": false, "rationale": "The text explicitly mentions medieval fabliaux as a place where the bed-trick appeared."}, {"text": "Classical comedy.", "isCorrect": false, "rationale": "The text cites classical comedy as one of the oldest contexts for this plot device."}, {"text": "The Bible story of Jacob and Leah.", "isCorrect": false, "rationale": "The text identifies the Genesis story of Jacob and Leah as a primary example of the bed-trick."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
