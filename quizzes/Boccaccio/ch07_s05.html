<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tales of the Decameron (Boccaccio) &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Boccaccio.html">&larr; Back to Tales of the Decameron (Boccaccio)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 7, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the narrator, Elissa, why have the 'excellent and commendable' customs of Florence, such as the social companies, largely vanished?", "options": [{"text": "The growing greed of the citizens resulting from increased wealth.", "isCorrect": true, "rationale": "The text explicitly blames the 'greed which, growing with the wealth of our folk, has banished them all from among us.'"}, {"text": "The constant political exile of the city's most talented poets and philosophers.", "isCorrect": false, "rationale": "While Cavalcanti was exiled, the narrator specifically identifies economic greed as the cause for the decline of these social traditions."}, {"text": "The city was focused on military victories and no longer had time for tiltings.", "isCorrect": false, "rationale": "The text mentions that victories were actually occasions for these companies to celebrate, not a cause for their decline."}, {"text": "The Church of San Giovanni restricted public gatherings around the marble tombs.", "isCorrect": false, "rationale": "The text does not mention church restrictions as a factor in the disappearance of the social companies."}], "id": "q01"}, {"question": "What specific philosophical leaning led the 'vulgar' public to believe that Guido Cavalcanti was attempting to prove the non-existence of God?", "options": [{"text": "His adherence to Epicureanism.", "isCorrect": true, "rationale": "The text states he was 'somewhat inclined to the opinion of the Epicureans,' which the public interpreted as a search for proof that God did not exist."}, {"text": "His mastery of logic and natural philosophy.", "isCorrect": false, "rationale": "While he was a logician and philosopher, these are described as qualities his social peers 'made no great account' of, rather than the source of the atheism rumor."}, {"text": "His close literary association with Dante Alighieri.", "isCorrect": false, "rationale": "His friendship with Dante is mentioned in the introduction as a point of historical significance, not as a reason for the public's suspicion of his faith."}, {"text": "His preference for solitude and speculative thought over social gatherings.", "isCorrect": false, "rationale": "Isolation led Messer Betto to believe he was 'estranged from men,' but it was his specific philosophical school that triggered the rumors of atheism."}], "id": "q02"}, {"question": "Which of the following best describes the activities of the 'companies' led by men like Messer Betto Brunelleschi?", "options": [{"text": "They were exclusive circles that shared expenses for entertaining and held annual ride-throughs.", "isCorrect": true, "rationale": "The text describes them as companies of limited numbers who took turns entertaining and rode together on notable days."}, {"text": "They were philosophical schools dedicated to studying the works of Dante and logic.", "isCorrect": false, "rationale": "The text notes that the company 'made no great account' of Guido's logic or natural philosophy, focusing instead on social status and gallantry."}, {"text": "They were religious guilds tasked with the upkeep of the tombs at San Giovanni.", "isCorrect": false, "rationale": "While they encountered Guido at the tombs, their activities were social and festive, such as tilting and hosting visitors."}, {"text": "They were political factions responsible for the exile of prominent Florentine citizens.", "isCorrect": false, "rationale": "Though Cavalcanti died in exile, these companies are described as social organizations meant for 'honour' and 'glad events.'"}], "id": "q03"}, {"question": "When Guido says, 'Gentlemen, you may say to me what you please in your own house,' what is the 'house' he is referring to?", "options": [{"text": "The marble tombs where the dead are laid to rest.", "isCorrect": true, "rationale": "Betto explains that because the men are unlettered and 'simple,' they are effectively 'dead' compared to the learned, making the tombs their appropriate house."}, {"text": "The Piazza of Santa Reparata and the area surrounding San Giovanni.", "isCorrect": false, "rationale": "While physically present there, some of the men mistakenly thought he meant the public ground was literally their private property."}, {"text": "The city of Florence, which the gentlemen controlled through wealth.", "isCorrect": false, "rationale": "The text indicates a more metaphorical and insulting comparison related to death and lack of learning, rather than political control."}, {"text": "The literal residences of Messer Betto and his companions.", "isCorrect": false, "rationale": "The wit of the remark relies on the fact that they were in a public place, not their literal homes."}], "id": "q04"}, {"question": "How does Messer Betto distinguish the 'learned' from 'simple, unlettered men' like himself and his companions?", "options": [{"text": "The simple are compared to the dead, while the learned possess a higher form of life.", "isCorrect": true, "rationale": "Betto explains that unlettered men are in 'sorrier case than dead men' when compared to those with a life of the mind."}, {"text": "The learned are physically more agile, as demonstrated by Guido's vaulting.", "isCorrect": false, "rationale": "While Guido is described as nimble, the primary distinction Betto makes is intellectual rather than physical."}, {"text": "The simple follow Epicureanism, whereas the learned follow established religion.", "isCorrect": false, "rationale": "The text suggests the opposite: the learned Guido was the one following speculative Epicureanism."}, {"text": "The learned are wealthy enough to afford the expenses of the social companies.", "isCorrect": false, "rationale": "Actually, the members of the company were the wealthy ones; Guido's learning made him aloof from their specific type of social status."}], "id": "q05"}, {"question": "What physical action does Guido perform to emphasize his departure from the group?", "options": [{"text": "He vaults over one of the large marble tombs.", "isCorrect": true, "rationale": "The text describes him as 'being very nimble' and vaulting over a tomb to evade them."}, {"text": "He rides away on a horse that he had kept hidden nearby.", "isCorrect": false, "rationale": "Guido was on foot, coming from Or San Michele, while the gentlemen were the ones riding horses."}, {"text": "He locks himself inside the door of San Giovanni.", "isCorrect": false, "rationale": "The text mentions that the door of San Giovanni 'was locked' already, not that he entered it."}, {"text": "He points to the columns of porphyry to distract them.", "isCorrect": false, "rationale": "While the columns are part of the setting, his primary action is the vault over the tomb."}], "id": "q06"}, {"question": "In the introduction, which historical detail is provided about Guido Cavalcanti’s relationship with Dante Alighieri?", "options": [{"text": "Dante refers to him as his 'first friend' in the Vita Nuova.", "isCorrect": true, "rationale": "The text notes that Dante calls Cavalcanti his 'first friend' in that specific work."}, {"text": "They were political rivals who belonged to opposing social companies.", "isCorrect": false, "rationale": "They are described as 'closest friend and literary companion,' not rivals."}, {"text": "Guido was Dante's logic teacher in the schools of Florence.", "isCorrect": false, "rationale": "While Guido was a great logician, the text identifies them as friends and peers, not as teacher and student."}, {"text": "Dante dedicated the ninth tale of the sixth day to Guido.", "isCorrect": false, "rationale": "The ninth tale of the sixth day is told by Elissa; Dante is a historical figure mentioned in the context, not the author of this specific tale."}], "id": "q07"}, {"question": "Why did the young gentlemen initially believe Guido’s answer ('you may say to me what you please in your own house') was 'nought' or nonsensical?", "options": [{"text": "They believed the piazza was common public ground for all citizens.", "isCorrect": true, "rationale": "The text says they thought his answer was nothing 'seeing that the ground on which they stood was common to them with the rest of the citizens.'"}, {"text": "They thought he was literally referring to the tavern where they met.", "isCorrect": false, "rationale": "There is no mention of a tavern; they were confused because they were in a public square near a church."}, {"text": "They assumed he was suffering from a 'malaria' induced madness.", "isCorrect": false, "rationale": "While he eventually died of malaria, at the time of the story, they merely suspected he had 'taken leave of his wits' due to the oddity of the remark."}, {"text": "They believed Guido was claiming the church of San Giovanni was his private residence.", "isCorrect": false, "rationale": "They didn't think he was claiming it; they were confused because he called the space *their* house, not *his*."}], "id": "q08"}, {"question": "Who is the 'queen' of the Day who tells the ninth tale of Day VI?", "options": [{"text": "Elissa", "isCorrect": true, "rationale": "The text introduces the tale by saying it 'is told by Elissa, the queen of the Day herself.'"}, {"text": "Emilia", "isCorrect": false, "rationale": "Emilia is mentioned as the person who had just finished her story before Elissa began."}, {"text": "Santa Reparata", "isCorrect": false, "rationale": "Santa Reparata is the name of the piazza/church mentioned in the story's setting, not a person in the frame story."}, {"text": "Beatrice", "isCorrect": false, "rationale": "Beatrice is not mentioned in this excerpt; the female storytellers are Elissa and Emilia."}], "id": "q09"}, {"question": "What was the primary reason Messer Betto and his company were eager to have Guido join them?", "options": [{"text": "His gallantry, courtesy, and excellence of discourse as a gentleman.", "isCorrect": true, "rationale": "The text says they strove to bring him in because he was 'without a peer for gallantry and courtesy and excellence of discourse.'"}, {"text": "His ability to prove that God did not exist through logic.", "isCorrect": false, "rationale": "The text states that the company 'made no great account' of his logic or philosophical qualities."}, {"text": "His influence with Dante Alighieri, who was then in power.", "isCorrect": false, "rationale": "Dante's friendship is mentioned as a historical fact in the preface, but it is not listed as the reason the company wanted Guido."}, {"text": "His expertise in designing marble tombs and public monuments.", "isCorrect": false, "rationale": "While tombs are the setting, Guido's profession was poet and philosopher, and the company valued his social graces."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
