<script>
var QUESTIONS = [{"question": "How does Boccaccio's use of the Italian term 'motto' in Day VI differ from its typical English cognate?", "options": [{"text": "It encompasses any clever, pointed verbal retort delivered at the opportune moment to resolve a conflict.", "isCorrect": true, "rationale": "In the context of the Decameron, a motto is a broad category of witty speech, including quips and retorts, rather than just a fixed slogan or guiding maxim."}, {"text": "It refers exclusively to the heraldic slogans of the Florentine nobility mentioned in the tales.", "isCorrect": false, "rationale": "While the characters are often noble, the 'motto' describes the verbal action itself, not a family slogan or formal heraldry."}, {"text": "It is used to describe a long, moralizing sermon intended to reform the behavior of the listener.", "isCorrect": false, "rationale": "The motto is defined by its brevity and timing ('verbal ingegno made audible'), which is the opposite of a lengthy sermon."}, {"text": "It denotes a secret code word used by the Brigata to distinguish themselves from plague victims.", "isCorrect": false, "rationale": "The motto is a social and literary tool used within the stories, not a survival mechanism for the frame story's characters."}], "id": "q01"}, {"question": "Which specific narrative flaw committed by the knight in Novel VI.1 leads Madonna Oretta to request to be 'set down'?", "options": [{"text": "A failure of economy and clarity, including repetition and the confusion of character names.", "isCorrect": true, "rationale": "The text explicitly identifies the knight's 'narrative sins' as repeating things multiple times and losing the thread of the story, which tortured his audience."}, {"text": "The inclusion of supernatural elements that violated the realism expected by the Florentine elite.", "isCorrect": false, "rationale": "The failure described is one of technique (how to tell a story) rather than the inclusion of specific genres like the supernatural."}, {"text": "Using overly vulgar language that was inappropriate for a woman of Oretta's high social standing.", "isCorrect": false, "rationale": "Oretta's critique is literary rather than moral; she reacts to the knight's 'mangling' of the narrative structure, not his vocabulary."}, {"text": "Disclosing the ending of the story too early, thereby destroying the narrative suspense.", "isCorrect": false, "rationale": "The knight's failure was in the execution of the telling—repetition and confusion—not necessarily the pacing of the plot points."}], "id": "q02"}, {"question": "How does the concept of 'sprezzatura' apply to the verbal wit celebrated in Day VI?", "options": [{"text": "It refers to the ability to deliver complex or devastating remarks with apparent ease and nonchalance.", "isCorrect": true, "rationale": "Sprezzatura is the art of making difficult tasks, like a perfect retort or a philosophical leap, look effortless and spontaneous."}, {"text": "It describes the aggressive and disdainful tone used by the upper class to suppress lower-class characters.", "isCorrect": false, "rationale": "While the word sounds like 'disdain' in some contexts, in Renaissance aesthetics it specifically refers to effortless mastery, not social hostility."}, {"text": "It is the technical term for the specific meter Boccaccio uses for the poems at the end of each Day.", "isCorrect": false, "rationale": "Sprezzatura is a behavioral and social quality coined by Castiglione, not a formal poetic meter."}, {"text": "It signifies the exhaustive preparation and rehearsal required before one can perform a public motto.", "isCorrect": false, "rationale": "The essence of sprezzatura is the *concealment* of effort; even if prepared, it must appear spontaneous."}], "id": "q03"}, {"question": "What is the intended double meaning behind Guido Cavalcanti’s remark in Novel VI.9 that the young men are 'in their own house'?", "options": [{"text": "He implies they belong among the dead because they lack intellectual depth and philosophical purpose.", "isCorrect": true, "rationale": "Cavalcanti views the unphilosophical youth as 'intellectually dead,' making the cemetery their proper home, or suggests they cannot truly grasp mortality."}, {"text": "He is literally welcoming them to the cemetery, which he had recently purchased for his family plot.", "isCorrect": false, "rationale": "The tale emphasizes the philosophical and allusive nature of the wit, not a literal property dispute."}, {"text": "He suggests they are ghosts who have not yet realized they passed away from the plague.", "isCorrect": false, "rationale": "While the plague is the background of the Decameron, Cavalcanti’s remark is an intellectual insult aimed at their lifestyle, not their biological state."}, {"text": "He is mocking their lack of physical agility compared to his own ability to leap over tombs.", "isCorrect": false, "rationale": "The leap is physical sprezzatura that matches his verbal wit, but the remark itself is a philosophical motto about their intellectual status."}], "id": "q04"}, {"question": "In Novel VI.10, what makes Fra Cipolla's rhetorical performance 'democratic' according to Boccaccio’s commentary?", "options": [{"text": "It relies on the force of his personality and confidence, which can dazzle an audience regardless of their education level.", "isCorrect": true, "rationale": "Unlike Cavalcanti's wit, which requires high learning to decode, Cipolla's theatrical invention works on everyone through sheer nerve and performance."}, {"text": "He explicitly calls for the overthrow of the Florentine nobility in favor of a peasant-led government.", "isCorrect": false, "rationale": "Fra Cipolla is an entertainer and a fraud; his 'democracy' lies in the universal appeal of his rhetoric, not in a political agenda."}, {"text": "His stories are based on factual geographical data accessible to any traveler of the period.", "isCorrect": false, "rationale": "His geography is explicitly fake and nonsensical, using puns like 'Truffia' (fraud) that the townspeople fail to recognize."}, {"text": "He shares the proceeds of his relic exhibition equally with all members of the Certaldo community.", "isCorrect": false, "rationale": "Cipolla is using his wit to deceive and potentially profit from the townspeople, not to distribute wealth."}], "id": "q05"}, {"question": "What common literary technique do Boccaccio and Chaucer share regarding the inclusion of 'bad' storytelling in their respective works?", "options": [{"text": "They both use self-conscious, metaliterary moments to illustrate narrative principles by showing examples of how NOT to tell a story.", "isCorrect": true, "rationale": "Boccaccio's knight and Chaucer's 'Sir Thopas' are both deliberate parodies used to highlight the authors' own narrative virtues through contrast."}, {"text": "They both claim their stories were found in lost ancient Greek manuscripts to bypass church censorship.", "isCorrect": false, "rationale": "The text focuses on their use of bad storytelling as a critique of craft, not a method of avoiding censorship."}, {"text": "They both feature the same character, Fra Cipolla, to demonstrate the dangers of clerical rhetoric.", "isCorrect": false, "rationale": "While they both critique rhetoric, Fra Cipolla is unique to Boccaccio, and Chaucer has his own distinct characters (like the Pardoner)."}, {"text": "They both use the plague as a justification for why their characters have lost their narrative abilities.", "isCorrect": false, "rationale": "The knight's failure is a personal lack of skill, and Chaucer's 'Sir Thopas' is a parody of a genre, not a symptom of disease."}], "id": "q06"}, {"question": "What is the core of Madonna Filippa's argument in Novel VI.7 against the law prohibiting adultery?", "options": [{"text": "She argues that laws created without the consent and voice of women are fundamentally unjust and illegitimate.", "isCorrect": true, "rationale": "Filippa’s 'proto-feminist' stance centers on the lack of representation and consent in the legislative process for women."}, {"text": "She claims that her husband’s inability to satisfy her desires granted her a legal 'surplus' right to a lover.", "isCorrect": false, "rationale": "While she mentions satisfying her husband, her primary legal challenge is against the validity of the law itself due to a lack of female participation."}, {"text": "She argues that because she is a noblewoman, she is exempt from the laws governing the common citizens of Prato.", "isCorrect": false, "rationale": "Her argument is based on gender and legal personhood, not on class-based exemptions from the law."}, {"text": "She presents evidence that the law was originally written in a language that the citizens could not understand.", "isCorrect": false, "rationale": "The text highlights her wit and courage in addressing the unfairness of laws made without women's consultation."}], "id": "q07"}, {"question": "How does Michele Scalza (VI.6) successfully argue that the Baronci family is the noblest in the world?", "options": [{"text": "By using comic logic to suggest their extreme ugliness proves they were God's very first, unrefined creations.", "isCorrect": true, "rationale": "Scalza argues that because they look like God was still learning to draw, they must be the oldest and therefore most noble lineage."}, {"text": "By providing a detailed family tree that links the Baronci directly to the biblical figures in Genesis.", "isCorrect": false, "rationale": "The argument is based on 'mock-logical eloquence' and their appearance, not on actual genealogical documents."}, {"text": "By claiming that their lack of physical beauty has allowed them to focus purely on spiritual and intellectual growth.", "isCorrect": false, "rationale": "The tale is a celebration of absurd rhetoric; the point is the 'comic' nature of the proposition regarding God's drawing skills."}, {"text": "By winning a physical duel against those who insulted the family's honor.", "isCorrect": false, "rationale": "Scalza wins a 'supper bet' through verbal wit and argument, not through physical combat."}], "id": "q08"}, {"question": "In Novel VI.2, what does the baker Cisti’s motto, 'The Arno has not yet run dry,' communicate to Messer Geri Spini?", "options": [{"text": "It serves as a polite reminder that social generosity should be offered and accepted, not demanded by subordinates.", "isCorrect": true, "rationale": "The motto rebukes Geri for sending a servant to demand wine, emphasizing that the etiquette of giving requires mutual respect."}, {"text": "It is a warning that the city of Florence is about to suffer a water shortage that will ruin the wine harvest.", "isCorrect": false, "rationale": "The Arno reference is metaphorical regarding the abundance of his wine and the nature of social requests."}, {"text": "It suggests that Cisti's wine is actually watered down with river water to increase his profits.", "isCorrect": false, "rationale": "The wine is described as 'superb,' and Cisti is portrayed as a man of 'perfect courtesy,' making this interpretation unlikely."}, {"text": "It informs Geri that Cisti is closing his shop and moving his business to the banks of the river.", "isCorrect": false, "rationale": "The motto is a social correction delivered with grace, not a business announcement."}], "id": "q09"}, {"question": "What underlying principle does the tale of Giotto and Messer Forese (VI.5) illustrate regarding social worth?", "options": [{"text": "That true genius and personal worth are independent of physical appearance or external attire.", "isCorrect": true, "rationale": "Giotto retorts that Forese looks just as bedraggled as he does, proving that their high status (lawyer and artist) is masked by their shabby cloaks."}, {"text": "That nature is the ultimate equalizer, as the rainstorm affects the rich and poor identically.", "isCorrect": false, "rationale": "While the rain sets the scene, the focus of the motto is on the specific irony of two famous men looking like beggars."}, {"text": "That painters and lawyers are natural social rivals who constantly seek to humiliate each other.", "isCorrect": false, "rationale": "The tale celebrates Giotto as a man of wit and artistic genius, highlighting his ability to hold his own against a famous lawyer."}, {"text": "That peasants are inherently more generous than the urban elite, as they provided the cloaks.", "isCorrect": false, "rationale": "The peasants provide the tools for the irony, but the 'point' of the tale is Giotto's clever retort regarding their mutual appearance."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
