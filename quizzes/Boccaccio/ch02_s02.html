<script>
var QUESTIONS = [{"question": "Based on the text, why does Pampinea specifically reject playing dice or chess as a pastime for the group?", "options": [{"text": "The competitive nature of these games was considered inappropriate for the mourning period of the plague.", "isCorrect": false, "rationale": "While the plague is the context for their flight, the text focuses on the emotional outcome of the game itself rather than mourning etiquette."}, {"text": "The loser of such games inevitably becomes annoyed, while the winner and observers gain little lasting pleasure.", "isCorrect": true, "rationale": "The text explicitly states that in play, 'the loser must needs be vexed' and neither the winner nor onlooker is 'much the better pleased.'"}, {"text": "The heat of the afternoon made the mental concentration required for chess too physically exhausting.", "isCorrect": false, "rationale": "Pampinea mentions the heat as a reason not to leave the spot, but her specific critique of games rests on the lack of collective solace."}, {"text": "She believed that games of chance were a form of disordered behavior that mirrored the chaos of Florence.", "isCorrect": false, "rationale": "While she seeks to establish order, her argument against games is framed around the 'vexation' of the loser and the superior 'solace' of storytelling."}], "id": "q01"}, {"question": "What distinguishes the thematic structure of the storytelling on Day I and Day IX from the other days of the Decameron?", "options": [{"text": "The stories must exclusively focus on religious hypocrisy and royal rebukes.", "isCorrect": false, "rationale": "While these are themes present in Day I, they are not a requirement; they are examples of the range allowed by the lack of a theme."}, {"text": "The stories are told by the queen alone rather than the entire brigata.", "isCorrect": false, "rationale": "The text states that 'each in turn' will speak, meaning the storytelling duties are shared among the company."}, {"text": "There is no prescribed theme, granting the narrators total freedom in their choice of subject.", "isCorrect": true, "rationale": "The source material notes that 'Days I and IX are the only Days with no prescribed theme,' allowing for a 'remarkable range' of subjects."}, {"text": "The narrators are required to tell tales that only contrast the 'civilized order' of the estate.", "isCorrect": false, "rationale": "The civilized order is established by the narrative frame and Pampinea's rules, not by a thematic restriction on the stories themselves."}], "id": "q02"}, {"question": "According to the introduction to Section 2, what is the primary purpose of the brief narrative describing the company's arrival and first meal?", "options": [{"text": "To provide a historical account of the Villa Palmieri's architecture and ownership.", "isCorrect": false, "rationale": "While the villa is identified in the footnotes, the text identifies the narrative's primary function as establishing a conceptual contrast."}, {"text": "To establish a sense of civilized order that contrasts with the external chaos of the plague.", "isCorrect": true, "rationale": "The text states this passage 'establishes the civilized order... a deliberate contrast to the chaos of the plague they have left behind.'"}, {"text": "To introduce the specific family lineages of the ten young people fleeing Florence.", "isCorrect": false, "rationale": "The focus of this specific section is on their actions at the estate and the rules they set, rather than their individual backgrounds."}, {"text": "To explain the biological origins of the plague through the metaphor of a disordered meal.", "isCorrect": false, "rationale": "The meal is presented as an act of order and normalcy, not as a metaphor for the disease's spread."}], "id": "q03"}, {"question": "At what specific time of day does the queen rouse the company and lead them to the meadow to begin the storytelling?", "options": [{"text": "At the vesper hour, as the sun begins to set.", "isCorrect": false, "rationale": "The vesper hour is mentioned as the time they will finish their diversion, not when they begin."}, {"text": "Shortly after none, during the heat of the day.", "isCorrect": true, "rationale": "The text specifies that the queen rose 'shortly after none' to rouse the others because sleeping long in the daytime is 'injurious to health.'"}, {"text": "At daybreak, before the sun becomes too intense.", "isCorrect": false, "rationale": "The text mentions the sun is already 'high' and the heat 'intense' when the queen addresses the group."}, {"text": "Exactly at midday, when the cicalas are loudest.", "isCorrect": false, "rationale": "While the cicalas are mentioned, the canonical hour specified for their rising is 'shortly after none.'"}], "id": "q04"}, {"question": "Which individual is selected by Queen Pampinea to tell the very first story of the Decameron?", "options": [{"text": "Filomena", "isCorrect": false, "rationale": "While one of the ladies of the group, she is not the one addressed by the queen to start the first day."}, {"text": "Dioneo", "isCorrect": false, "rationale": "Dioneo is one of the young men in the company, but he is not the one seated on the queen's right who leads off."}, {"text": "Pamfilo", "isCorrect": true, "rationale": "The queen addressed Pamfilo, who 'sat on her right hand, bidding him with a gracious air to lead off with one of his stories.'"}, {"text": "Fiesole", "isCorrect": false, "rationale": "Fiesole is the name of the ancient Etruscan town where the estate is located, not a member of the brigata."}], "id": "q05"}, {"question": "According to the footnotes, what is the likely etymological origin of the name 'becchini' — the corpse-carriers who worked during the plague?", "options": [{"text": "It is derived from the Italian word for 'meadow' where victims were buried.", "isCorrect": false, "rationale": "The meadow is the setting for the storytelling, but the term for the implement is related to the physical action of moving bodies."}, {"text": "It refers to a pronged or hooked tool used to drag corpses from houses.", "isCorrect": true, "rationale": "The footnote explains the name likely comes from the 'prong' or 'hooked implement' used by those removing bodies from homes."}, {"text": "It comes from an ancient Etruscan term for 'the cleansing fire.'", "isCorrect": false, "rationale": "Fiesole is Etruscan, but the term in question is specifically linked to the grim practicalities of the plague."}, {"text": "It was the name given to the light breeze that fanned the ladies in the meadow.", "isCorrect": false, "rationale": "The breeze provided comfort to the living, while the implement mentioned was used for the deceased."}], "id": "q06"}, {"question": "Why was Pampinea chosen as the first queen of the brigata?", "options": [{"text": "She was the only one who knew the way to the Villa Palmieri in Fiesole.", "isCorrect": false, "rationale": "The text does not mention her navigational skills; it focuses on her seniority and initiative."}, {"text": "She was the eldest woman and the one who originally proposed the retreat.", "isCorrect": true, "rationale": "The text identifies her as 'the eldest of the women, who proposed the retreat in the first place.'"}, {"text": "She won a game of chess against the other young people upon arrival.", "isCorrect": false, "rationale": "Pampinea actually discourages playing chess in favor of storytelling."}, {"text": "She was the daughter of the owner of the country estate.", "isCorrect": false, "rationale": "While they arrive at an estate, the text emphasizes her leadership role through her initiative and age rather than ownership."}], "id": "q07"}, {"question": "In what way do the ten tales of Day I serve as an 'overture' to the entire Decameron?", "options": [{"text": "They provide a chronological history that the following ninety tales continue.", "isCorrect": false, "rationale": "The tales are not necessarily chronological; they function as an overture by introducing thematic breadth."}, {"text": "They establish a strict moral code that all subsequent storytellers must follow.", "isCorrect": false, "rationale": "The tales include religious hypocrisy and sharp wit, suggesting a complex range of human behavior rather than a strict moralizing code."}, {"text": "They introduce various themes, such as wit and religious hypocrisy, that Boccaccio develops throughout the work.", "isCorrect": true, "rationale": "The text states the ten tales 'serve as an overture... introducing themes that Boccaccio will develop across all one hundred tales.'"}, {"text": "They are the only tales in the book that are not dictated by a specific theme.", "isCorrect": false, "rationale": "While Day I has no theme, Day IX also shares this characteristic, so this is not what makes Day I an 'overture' specifically."}], "id": "q08"}, {"question": "Where is the country estate located in relation to Florence?", "options": [{"text": "To the west, along the banks of the Arno river.", "isCorrect": false, "rationale": "The text specifies the location is in the hills to the north, overlooking the city."}, {"text": "In the hills of Fiesole, overlooking the city from the north.", "isCorrect": true, "rationale": "The source describes Fiesole as an 'ancient Etruscan town overlooking Florence from the north' and identifies the retreat there."}, {"text": "In the southern marshlands, far from the Etruscan ruins.", "isCorrect": false, "rationale": "The area is described as hills associated with villas and rural retreats, not southern marshlands."}, {"text": "Within the ancient city walls of Florence to ensure protection from the plague.", "isCorrect": false, "rationale": "The group 'fled plague-stricken Florence' to reach the beautiful country estate."}], "id": "q09"}, {"question": "What reason does Pampinea give for moving the company to the meadow rather than staying indoors?", "options": [{"text": "The indoor air was stagnant and likely to carry the plague miasma.", "isCorrect": false, "rationale": "While they fled the plague, Pampinea's specific reason in the primary source relates to the health effects of daytime sleep."}, {"text": "She argued that sleeping for a long time during the day is injurious to health.", "isCorrect": true, "rationale": "The text says the queen roused the rest, 'averring that it was injurious to health to sleep long in the daytime.'"}, {"text": "The meadow was the only place where the cicalas could be heard clearly.", "isCorrect": false, "rationale": "The cicalas are mentioned as part of the atmosphere, but the motivation for moving was health and activity."}, {"text": "The light breeze in the meadow was needed to disperse the intense afternoon heat.", "isCorrect": false, "rationale": "While the breeze is a pleasant feature of the meadow, the initial reason for rousing the group was to prevent oversleeping."}], "id": "q10"}, {"question": "Pampinea argues that storytelling is superior to games as a way to pass the time. What specific benefit does she claim it offers that games do not?", "options": [{"text": "Storytelling can generate income for the storyteller, making it a productive use of time.", "isCorrect": false, "rationale": "Pampinea's argument is entirely about the emotional and social benefits of collective pleasure, not economic productivity."}, {"text": "The invention of one storyteller can afford solace to all listeners.", "isCorrect": true, "rationale": "Pampinea explicitly says that 'in telling of stories, the invention of one may afford solace to all the company of his hearers' — a collectively shared pleasure that games cannot match."}, {"text": "Stories require no equipment and can be enjoyed anywhere regardless of the heat.", "isCorrect": false, "rationale": "While convenience may be implicit, Pampinea's stated argument focuses on the emotional sharing rather than the logistics."}, {"text": "Storytelling improves the memory and sharpens the wits of the listener.", "isCorrect": false, "rationale": "Pampinea's case rests on comfort and solace, not intellectual self-improvement, as the primary virtue of storytelling."}], "id": "q11"}, {"question": "What does Pampinea's immediate and confident leadership at the estate reveal about her character as established in the brigata's formation?", "options": [{"text": "She is primarily concerned with her own reputation and uses authority to increase her social standing.", "isCorrect": false, "rationale": "The text presents her as genuinely practical and motivated by the group's wellbeing; she proposes rules and structures that benefit everyone."}, {"text": "She is a practical authority figure who creates structured order as an antidote to the surrounding chaos.", "isCorrect": true, "rationale": "She proposed the retreat, was elected first queen, and immediately organized the group's time and activities — all actions that establish civilized order against the plague's disorder."}, {"text": "She defers to the men in the group for approval before making any significant decision.", "isCorrect": false, "rationale": "She acts decisively and proposes the plan before consulting others; the men confirm her authority rather than the other way around."}, {"text": "Her leadership style is indistinguishable from those of the other women in the brigata.", "isCorrect": false, "rationale": "She is specifically described as 'eldest,' 'practical,' and 'authoritative,' with traits that set her apart as the initiating leader."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
