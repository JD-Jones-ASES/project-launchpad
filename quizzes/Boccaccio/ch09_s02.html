</div>

<script>
var QUESTIONS = [{"question": "How does the thematic scope of Day VIII differ from that of Day VII in the Decameron?", "options": [{"text": "It restricts the subject of trickery exclusively to the clergy and religious figures.", "isCorrect": false, "rationale": "While the stories involve various social classes, the text specifically notes an expansion of trickery beyond the marriage bed to include all combinations of men and women."}, {"text": "It broadens the trickery to include men tricking women and men tricking other men.", "isCorrect": true, "rationale": "The text explicitly states that Lauretta breaks the symmetry of Day VII by allowing tricks to be played by any person upon another, rather than just wives on husbands."}, {"text": "It limits the trickery to historical figures from distant lands to provide moral distance.", "isCorrect": false, "rationale": "The material highlights that the characters are recognizable Florentines, making the tales feel like urban gossip rather than distant legends."}, {"text": "It focuses solely on tricks played by husbands to provide a direct reversal of Day VII.", "isCorrect": false, "rationale": "Although husbands tricking wives is included, the scope is much broader, encompassing tricks played by 'one man upon another' as well."}], "id": "q01"}, {"question": "What distinction does the Italian critical tradition make regarding the nature of the 'beffa' in Day VIII?", "options": [{"text": "The distinction between a 'beffa di parole' (verbal trick) and a 'beffa di fatti' (physical trick).", "isCorrect": false, "rationale": "While these are types of tricks, the specific distinction mentioned in the text concerns the ethical severity and cruelty of the trick."}, {"text": "The distinction between 'beffa leggera' and 'beffa crudele'.", "isCorrect": true, "rationale": "This terminology is used to describe the shift from lighthearted pranks to those that explore the ethical limits of cleverness used as a weapon."}, {"text": "The distinction between 'beffa urbana' (city trick) and 'beffa rustica' (country trick).", "isCorrect": false, "rationale": "The text focuses on the tone and consequence of the tricks rather than their geographical or class-based setting."}, {"text": "The distinction between 'beffa d'amore' (love trick) and 'beffa d'odio' (hate trick).", "isCorrect": false, "rationale": "The source material emphasizes the transition from harmless games to genuinely cruel actions, regardless of the emotional motivation."}], "id": "q02"}, {"question": "According to the source, which historical source mentions the real-life counterparts of Bruno and Buffalmacco?", "options": [{"text": "The Florentine Chronicles by Giovanni Villani.", "isCorrect": false, "rationale": "The text specifically attributes the historical records of these painters to a famous 16th-century art historian."}, {"text": "Giorgio Vasari's Lives of the Artists.", "isCorrect": true, "rationale": "The text confirms that Bruno and Buffalmacco were real Florentine painters documented by Vasari in 1550."}, {"text": "Dante Alighieri's De vulgari eloquentia.", "isCorrect": false, "rationale": "While Dante is a major Florentine figure, the text identifies a different Renaissance author as the source for the painters' biographies."}, {"text": "Boccaccio's own Genealogy of the Gentile Gods.", "isCorrect": false, "rationale": "The source points to an external historical validation by Vasari rather than Boccaccio's other literary works."}], "id": "q03"}, {"question": "What is the historical name of the character Boccaccio transforms into the comic archetype 'Calandrino'?", "options": [{"text": "Nozzo di Perino", "isCorrect": true, "rationale": "The text identifies Calandrino as the historical person Nozzo di Perino, whom Boccaccio elevated to a recognizable archetype."}, {"text": "Bernardo di Bruno", "isCorrect": false, "rationale": "Bruno is one of the pranksters, but he is not the historical individual identified as Calandrino."}, {"text": "Buffalmacco di Buonamico", "isCorrect": false, "rationale": "Buffalmacco is another real painter used as a character, but the name does not correspond to the 'eternal dupe' Calandrino."}, {"text": "Pietro di Vinci", "isCorrect": false, "rationale": "This name is not mentioned in the text as the historical identity of Calandrino."}], "id": "q04"}, {"question": "Following the morning activities, at what specific time or condition does the queen muster the company for storytelling?", "options": [{"text": "Immediately after the conclusion of Divine service.", "isCorrect": false, "rationale": "The company returns to the palace for breakfast, singing, and dancing before being dismissed to rest."}, {"text": "When the sun has passed the meridian.", "isCorrect": true, "rationale": "The primary source text specifies that the company is mustered for their 'wonted pastime' (storytelling) once the sun has passed its highest point."}, {"text": "At half tierce, prior to the meal.", "isCorrect": false, "rationale": "Half tierce is when they go to the church for service, not when they begin the storytelling."}, {"text": "When the shades of night have finally fled.", "isCorrect": false, "rationale": "This describes the break of dawn when the company first arises, long before the storytelling session."}], "id": "q05"}, {"question": "Which narrator is chosen by Queen Lauretta to begin the storytelling on Day VIII?", "options": [{"text": "Pampinea", "isCorrect": false, "rationale": "Pampinea was the queen of the first day, but the text names a different narrator for the start of Day VIII."}, {"text": "Neifile", "isCorrect": true, "rationale": "The primary source text concludes by stating that 'at her [the queen's] command, Neifile began'."}, {"text": "Fiammetta", "isCorrect": false, "rationale": "Fiammetta is a member of the company, but she is not the one instructed to lead the eighth day's tales."}, {"text": "Filostrato", "isCorrect": false, "rationale": "The text identifies a female narrator as the one who begins the day's tales."}], "id": "q06"}, {"question": "What reason does the 'Reading Note' suggest for the shift toward darker themes on the eighth day?", "options": [{"text": "The narrators have become bored with the repetitiveness of romantic comedy.", "isCorrect": false, "rationale": "Boredom is not mentioned; rather, the shift is attributed to the increasing comfort and familiarity among the group."}, {"text": "The company has spent seven days together and is now comfortable enough to explore more complex ethics.", "isCorrect": true, "rationale": "The note observes that after seven days, the narrators have reached a level of comfort that allows them to venture into darker thematic territory."}, {"text": "The change in location to a darker palace influenced the tone of the stories.", "isCorrect": false, "rationale": "The text does not mention a change in physical location as the cause for the shift in storytelling mood."}, {"text": "The introduction of religious service at the church prompted a more serious moral outlook.", "isCorrect": false, "rationale": "While they attend church, the text links the darker themes to the broadening of the trickery theme rather than religious influence."}], "id": "q07"}, {"question": "How does the source characterize the shift in the use of 'cleverness' between Day VII and Day VIII?", "options": [{"text": "From a tool for social advancement to a means of religious penance.", "isCorrect": false, "rationale": "The shift is described in terms of the tone of the pranks, not social or religious utility."}, {"text": "From a lighthearted game to a potentially lethal weapon.", "isCorrect": true, "rationale": "The text explains that Day VIII explores cleverness as a weapon, where the consequences go beyond just a 'bruised ego'."}, {"text": "From a masculine trait to a feminine survival instinct.", "isCorrect": false, "rationale": "The text notes that both genders utilize cleverness in Day VIII, rather than it shifting from one gender to the other."}, {"text": "From a spontaneous impulse to a carefully planned political maneuver.", "isCorrect": false, "rationale": "The focus remains on the 'beffa' (trickery), but the transition is one of cruelty rather than political complexity."}], "id": "q08"}, {"question": "What is the significance of Boccaccio's choice of characters for the tales of Day VIII, such as Calandrino?", "options": [{"text": "They represent idealized virtues that the narrators wish to emulate.", "isCorrect": false, "rationale": "These characters are described as comic archetypes and dupes, rather than figures of virtue."}, {"text": "They are recognizable Florentines, giving the tales the texture of local urban gossip.", "isCorrect": true, "rationale": "The text notes that these characters were real people known to Boccaccio’s audience, grounding the stories in the contemporary world."}, {"text": "They are allegorical figures representing the seven deadly sins.", "isCorrect": false, "rationale": "The text emphasizes their historical reality and identity as painters rather than abstract allegorical representations."}, {"text": "They are fictional constructs designed to parody the lives of the saints.", "isCorrect": false, "rationale": "The characters are based on historical acquaintances, not religious parody."}], "id": "q09"}, {"question": "According to the primary source, what activity does the company engage in immediately after hearing Divine service?", "options": [{"text": "They return to the fountain to begin the first story of the day.", "isCorrect": false, "rationale": "The storytelling does not begin until after lunch and a period of rest."}, {"text": "They return to the palace to have breakfast with 'gay and gladsome cheer'.", "isCorrect": true, "rationale": "The sequence of events after church is the return to the palace for breakfast, followed by singing and dancing."}, {"text": "They walk for a while in the dewy mead while the sun is rising.", "isCorrect": false, "rationale": "The walk in the mead happens before they go to the church, not after."}, {"text": "They are immediately dismissed by the queen to rest until the sun passes the meridian.", "isCorrect": false, "rationale": "Dismissal for rest occurs after breakfast and a period of singing and dancing."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
