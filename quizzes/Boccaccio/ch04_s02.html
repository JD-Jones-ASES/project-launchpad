        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Boccaccio.html">&larr; Back to Tales of the Decameron (Boccaccio)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 4, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "In the introduction to Day III, which specific literary convention is cited as the basis for Boccaccio's idealized garden description?", "options": [{"text": "Memento mori", "isCorrect": false, "rationale": "While the plague context suggests mortality, this convention refers to symbols of death, which the garden specifically seeks to exclude or contrast."}, {"text": "Locus amoenus", "isCorrect": true, "rationale": "This classical and medieval convention describes a 'pleasant place' that serves as an idealized landscape, often reflecting safety and beauty."}, {"text": "Carpe diem", "isCorrect": false, "rationale": "Though the characters are enjoying the moment, 'carpe diem' is a philosophical stance rather than the specific literary landscape convention mentioned."}, {"text": "Ubi sunt", "isCorrect": false, "rationale": "This convention meditates on the fleeting nature of life and those who have passed, which is the opposite of the garden's vibrant, living focus."}]}, {"question": "According to the provided 'notebox,' how does the physical layout of the garden parallel the thematic focus of the stories told on Day III?", "options": [{"text": "The garden's wild, untamed sections mirror the unpredictability of human desire.", "isCorrect": false, "rationale": "The text describes the garden as highly structured and ordered, rather than wild and untamed."}, {"text": "The walled nature of the garden represents the constraints of social morality on the characters.", "isCorrect": false, "rationale": "While the garden is walled, the notebox specifically links the garden's order to the exercise of wit rather than social constraints."}, {"text": "The garden's order reflects the protagonists' use of wit to impose their will on circumstances.", "isCorrect": true, "rationale": "The notebox explains that just as the garden imposes order on nature, the characters use 'ingegno' to shape their own outcomes."}, {"text": "The abundance of fruit and flowers represents the random gifts of Fortune.", "isCorrect": false, "rationale": "Fortune was the theme of the Second Day; Day III shifts toward the active use of intelligence (ingegno)."}]}, {"question": "What unusual visual description is given to the central lawn to emphasize its quality and lushness?", "options": [{"text": "It was so green that it appeared almost black.", "isCorrect": true, "rationale": "The text explicitly states the turf was so green it seemed almost black, highlighting its density and richness."}, {"text": "It was as bright as an emerald under the noon sun.", "isCorrect": false, "rationale": "While emerald is a common comparison for green, the text uses a more striking contrast regarding the depth of its color."}, {"text": "It was dappled with gold from the fallen orange blossoms.", "isCorrect": false, "rationale": "Though orange trees are present, the primary description of the lawn focuses on the specific hue of its turf."}, {"text": "It was described as a silver carpet due to the morning dew.", "isCorrect": false, "rationale": "The morning dew is mentioned for the flowers, but the lawn itself is noted for its deep green color."}]}, {"question": "The water system in the garden is not merely decorative; what practical industrial purpose does its overflow serve?", "options": [{"text": "It powers the cooling system for the palace's wine vaults.", "isCorrect": false, "rationale": "The wine vaults are cooled by springs, but the external overflow from the lawn is used for a different purpose."}, {"text": "It is used to irrigate the vast jasmine and rose hedges.", "isCorrect": false, "rationale": "While the water penetrates the garden through channels, its final exit point serves a specific mechanical function."}, {"text": "It turns two mill-wheels with great velocity for the lord's profit.", "isCorrect": true, "rationale": "The text notes the water reunites and slides down toward the plain to turn two mill-wheels before leaving the property."}, {"text": "It fills a series of baths located in the palace chambers.", "isCorrect": false, "rationale": "The palace is described as sumptuous, but the specific mention of the water's exit focuses on its utility in the plain."}]}, {"question": "Which character is chosen as the first narrator to tell a story under the reign of Queen Neifile?", "options": [{"text": "Dioneo", "isCorrect": false, "rationale": "Dioneo is a member of the company, but he is not the one first charged with the duty of storytelling on this specific day."}, {"text": "Filostrato", "isCorrect": true, "rationale": "The primary source text concludes by stating that the queen first charged Filostrato with beginning the story-telling."}, {"text": "Pampinea", "isCorrect": false, "rationale": "Pampinea was the queen of the first day, but she does not lead the narrations on Day III."}, {"text": "Panfilo", "isCorrect": false, "rationale": "Panfilo is a storyteller in the group, but Filostrato is specifically named as the first to follow the theme of 'ingegno'."}]}, {"question": "What specific activities are the company members engaged in during the hottest part of the day while some are sleeping?", "options": [{"text": "Weaving garlands and singing hymns.", "isCorrect": false, "rationale": "These activities were done earlier in the morning; the afternoon heat led to more sedentary pastimes."}, {"text": "Hunting the conies and hares found in the garden.", "isCorrect": false, "rationale": "The animals are described as 'all but domesticated' and are observed for delight, not hunted."}, {"text": "Reading romances or playing at chess or dice.", "isCorrect": true, "rationale": "The text states that those who did not sleep amused themselves with these specific intellectual and social games."}, {"text": "Writing their own stories to prepare for the levee.", "isCorrect": false, "rationale": "While they tell stories later, the text focuses on reading existing romances and playing games during the break."}]}, {"question": "Which set of animals is described as inhabiting the garden, reinforcing the group's 'abundant delight'?", "options": [{"text": "Peacocks, swans, and golden pheasants.", "isCorrect": false, "rationale": "While these are common garden birds, they are not the specific animals listed in the Day III introduction."}, {"text": "Conies, hares, goats, and fawns.", "isCorrect": true, "rationale": "The text explicitly names these harmless creatures as being spotted by the company as they explored the grounds."}, {"text": "Lions, leopards, and other exotic beasts.", "isCorrect": false, "rationale": "The garden is an earthly paradise, but it is populated by harmless, nearly domesticated animals rather than dangerous predators."}, {"text": "Nightingales, blackbirds, and falcons.", "isCorrect": false, "rationale": "Birds are mentioned as singing, but the specific list of 'living creatures' that scampered or grazed refers to mammals."}]}, {"question": "What is the primary theme of the stories told on the Third Day, as announced by Queen Neifile?", "options": [{"text": "The tragic end of lovers who defied their parents.", "isCorrect": false, "rationale": "This is a theme for a different day; Day III focuses on successful outcomes through cleverness."}, {"text": "Those who have been victimized by Fortune but eventually find happiness.", "isCorrect": false, "rationale": "This describes the theme of Day II, whereas Day III emphasizes active wit over passive luck."}, {"text": "Using wit to obtain a desired object or recover something lost.", "isCorrect": true, "rationale": "Neifile defines the theme as 'ingegno'—intelligence or resourcefulness applied to achieving one's desires."}, {"text": "Tales of generosity and magnificent deeds among nobles.", "isCorrect": false, "rationale": "Magnificence is a theme explored later in the Decameron, not on Day III."}]}, {"question": "The move to the new palace occurs at what specific time and on which day of the week?", "options": [{"text": "Saturday at dusk.", "isCorrect": false, "rationale": "The Second Day ended on Saturday, but the move and the start of the Third Day occur the following morning."}, {"text": "Sunday at dawn.", "isCorrect": true, "rationale": "The text opens by describing the dawn of Sunday changing from vermilion to orange as the queen roused the company."}, {"text": "Monday before noon.", "isCorrect": false, "rationale": "The transition happens earlier in the week, specifically on the morning following the end of Day II."}, {"text": "Friday after the fast.", "isCorrect": false, "rationale": "The text explicitly mentions the dawn of Sunday, not a Friday."}]}, {"question": "What detail about the vines in the garden suggests the seasonal timing of the narrative?", "options": [{"text": "They were heavily laden with ripe purple grapes.", "isCorrect": false, "rationale": "The text states they were only in flower and gave 'promise' of bearing fruit, suggesting it was not yet harvest time."}, {"text": "They were barren and withered from the summer heat.", "isCorrect": false, "rationale": "The garden is described as lush and thriving, not suffering from drought or heat damage."}, {"text": "They were all in flower, dispersing a fragrance like Eastern spices.", "isCorrect": true, "rationale": "The description of the vines being in flower and highly fragrant indicates a springtime or early summer setting."}, {"text": "They had been recently pruned and showed no leaves.", "isCorrect": false, "rationale": "The vines were roofed in trellis and provided shade, indicating they were fully leafed and blooming."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
