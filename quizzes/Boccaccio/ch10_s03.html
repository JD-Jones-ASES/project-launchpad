<script>
var QUESTIONS = [{"question": "In the introduction to the tale, what is described as Boccaccio's unique contribution to the tradition of anticlerical satire?", "options": [{"text": "The combination of satire with narrative comedy.", "isCorrect": true, "rationale": "The text notes that while anticlerical satire was common in the Middle Ages, Boccaccio's specific contribution was blending it with narrative comedy."}, {"text": "The use of Latin goliardic verse to mock church officials.", "isCorrect": false, "rationale": "The text attributes the use of Latin goliardic poems to the twelfth century as a precursor to Boccaccio, not his specific innovation."}, {"text": "The focus on the corruption of high-ranking Roman bishops.", "isCorrect": false, "rationale": "The source material focuses on a local convent and an abbess, rather than high-ranking Roman officials."}, {"text": "The complete removal of moral lessons from the narrative.", "isCorrect": false, "rationale": "The text describes the punchline as having both a visual and moral dimension, rather than removing morality entirely."}], "id": "q01"}, {"question": "Why did the sisters who discovered Isabetta's lover choose to wait before informing the abbess?", "options": [{"text": "To ensure there was no possibility for Isabetta to deny the act.", "isCorrect": true, "rationale": "The text states they deemed it 'expedient' to catch her in the act so that there would be 'no room for denial.'"}, {"text": "Because they were afraid of the gallant's reaction.", "isCorrect": false, "rationale": "While the gallant was prepared to fight later, the text indicates the sisters' primary motivation for waiting was to secure proof."}, {"text": "They were waiting for the priest to arrive at the abbess's chamber first.", "isCorrect": false, "rationale": "The sisters were unaware that the abbess had a lover of her own at the time they planned their 'close espial.'"}, {"text": "They intended to blackmail Isabetta for her noble family's wealth.", "isCorrect": false, "rationale": "The source mentions her noble family to establish her background, but the nuns' motivation was to denounce her for her sin."}], "id": "q02"}, {"question": "What is the specific term used in the text for the type of veil the abbess intended to put on her head?", "options": [{"text": "The psalter.", "isCorrect": true, "rationale": "The narrative explains that the abbess caught up the breeches 'instead of the veil that they wear, which they call the psalter.'"}, {"text": "The coif.", "isCorrect": false, "rationale": "Although Isabetta uses the word 'coif' when addressing the abbess, the text identifies the specific monastic name for the veil as the psalter."}, {"text": "The wimple.", "isCorrect": false, "rationale": "While a wimple is a common historical term for a nun's head covering, it is not the term provided in this specific Boccaccio text."}, {"text": "The habit.", "isCorrect": false, "rationale": "A habit refers to the entire religious garment worn by the nun, whereas the text specifies a name for the veil itself."}], "id": "q03"}, {"question": "How did the abbess's lover typically enter her chamber without being detected by the convent?", "options": [{"text": "He was conveyed to her inside a chest.", "isCorrect": true, "rationale": "The text reveals that the abbess had a priest whom she used to have 'conveyed to her in a chest' to maintain secrecy."}, {"text": "He entered through a secret gate in the garden.", "isCorrect": false, "rationale": "This is a common trope in medieval literature, but the specific detail in this story involves a piece of furniture."}, {"text": "He was disguised as a visiting kinsman at the grate.", "isCorrect": false, "rationale": "Isabetta met her lover through a kinsman at the grate, but the abbess used a different method for her own lover."}, {"text": "He used a ladder to reach the upper cell windows.", "isCorrect": false, "rationale": "The text describes the priest being brought in a container rather than climbing into the building."}], "id": "q04"}, {"question": "What visual detail on the abbess's head finally alerts Isabetta and the other nuns to the hypocrisy of the situation?", "options": [{"text": "The points of the breeches hanging down.", "isCorrect": true, "rationale": "The text notes that the girl espied the 'points that hung down on this side and that,' which revealed the headgear was actually trousers."}, {"text": "The color of the priest's clerical collar.", "isCorrect": false, "rationale": "The headgear was not a collar but breeches, and it was the hanging 'points' rather than color that signaled the error."}, {"text": "The leather belt still attached to the garment.", "isCorrect": false, "rationale": "While breeches might have a belt, the specific detail mentioned in the text that 'hung down' is referred to as 'points.'"}, {"text": "A holy cross embroidered on the wrong side.", "isCorrect": false, "rationale": "The comedy arises from the secular, masculine nature of the garment, not a religious embroidery error."}], "id": "q05"}, {"question": "According to the analysis in the 'What to Watch For' section, how does the power dynamic shift when Isabetta notices the breeches?", "options": [{"text": "The real authority shifts from the individual superior to the community of women.", "isCorrect": true, "rationale": "The text suggests that once the secret is out, the abbess loses her moral standing and the community of women ultimately shares in a new freedom."}, {"text": "Authority shifts to the gallant, who is waiting to rescue Isabetta.", "isCorrect": false, "rationale": "While the gallant is ready to act, the text emphasizes the internal social dynamics of the women in the chapter-house."}, {"text": "Authority is restored to the strict laws of the Lombardy convent.", "isCorrect": false, "rationale": "The outcome is a relaxing of the rules rather than a restoration of strict monastic law."}, {"text": "The power moves to the priest, who remains hidden in the abbess's chamber.", "isCorrect": false, "rationale": "The priest is a passive character in the story and does not influence the chapter-house confrontation."}], "id": "q06"}, {"question": "What was the final 'rule' or understanding established by the abbess at the end of the tale?", "options": [{"text": "Nuns could enjoy their pleasures as long as they were discreet.", "isCorrect": true, "rationale": "After being exposed, the abbess declares that they could 'give themselves a good time' provided they observed 'due secrecy.'"}, {"text": "The convent would henceforth be closed to all male kinsmen.", "isCorrect": false, "rationale": "The abbess actually permits the opposite, allowing the nuns to continue their affairs."}, {"text": "Isabetta was to be exiled for her noble family's shame.", "isCorrect": false, "rationale": "Isabetta is not exiled; she is dismissed back to her cell to rejoin her lover."}, {"text": "The nuns must perform extra penance to cleanse the convent's reputation.", "isCorrect": false, "rationale": "The abbess changes her tone from severity to acceptance, making penance unnecessary for the group."}], "id": "q07"}, {"question": "Before her hypocrisy was revealed, how was Madonna Usimbalda perceived by her community?", "options": [{"text": "A good and holy woman.", "isCorrect": true, "rationale": "The text states she was 'reputed by the nuns, and indeed by all that knew her, to be a good and holy woman.'"}, {"text": "A harsh and universally disliked tyrant.", "isCorrect": false, "rationale": "While she gave a severe reprimand, her initial reputation was one of holiness and virtue."}, {"text": "A senile and easily confused figurehead.", "isCorrect": false, "rationale": "Her confusion with the headgear was due to haste, not a general reputation for senility."}, {"text": "A woman known to be secretly lenient toward the younger nuns.", "isCorrect": false, "rationale": "Her public persona was one of 'strict and holy living' before her own sin was uncovered."}], "id": "q08"}, {"question": "Which character in the *Decameron* is responsible for narrating this specific story on the Ninth Day?", "options": [{"text": "Elisa.", "isCorrect": true, "rationale": "The text explicitly states: 'this brief but devastating tale, told by Elissa' (alternatively spelled Elisa in the primary source)."}, {"text": "Filomena.", "isCorrect": false, "rationale": "Filomena tells the previous story, and the queen then turns to Elisa to 'follow' with her tale."}, {"text": "Madonna Francesca.", "isCorrect": false, "rationale": "Madonna Francesca is a character mentioned in the previous story's summary, not the narrator of the tale of the nun."}, {"text": "The Queen of the day.", "isCorrect": false, "rationale": "The Queen invites Elisa to speak, but the Queen herself does not narrate this specific tale."}], "id": "q09"}, {"question": "The text describes the image of the abbess with breeches on her head as a favorite subject of illustrators since which century?", "options": [{"text": "The fourteenth century.", "isCorrect": true, "rationale": "The analysis section states the image has been a favorite subject of Decameron illustrators 'since the fourteenth century.'"}, {"text": "The twelfth century.", "isCorrect": false, "rationale": "The twelfth century is mentioned in relation to Latin goliardic poems, which preceded Boccaccio's work."}, {"text": "The sixteenth century.", "isCorrect": false, "rationale": "While it likely remained popular, the text specifically traces the tradition back to the 1300s (the fourteenth century)."}, {"text": "The nineteenth century.", "isCorrect": false, "rationale": "The text highlights the long-standing historical popularity of the visual gag, starting much earlier than the nineteenth century."}], "id": "q10"}, {"question": "How does Isabetta's initial meeting with her gallant occur, according to the primary source?", "options": [{"text": "She meets him by chance at the marketplace during a permitted outing from the convent.", "isCorrect": false, "rationale": "The text specifies a different setting for their first meeting involving a convent visitor."}, {"text": "She meets him at the grate of the convent when he accompanies a kinsman who visits her.", "isCorrect": true, "rationale": "The text states: 'Isabetta — having speech one day of one of her kinsmen at the grate, became enamoured of a fine young gallant that was with him.'"}, {"text": "She meets him while gathering herbs in the convent garden, where he has hidden himself.", "isCorrect": false, "rationale": "The meeting takes place at the grate — the convent's formal reception area — not in the garden."}, {"text": "She meets him during a church pilgrimage when both are staying at the same inn.", "isCorrect": false, "rationale": "The story is set within the convent, and Isabetta does not travel to pilgrimages in this tale."}], "id": "q11"}, {"question": "The tale is described as a 'masterpiece of comic economy.' What does this phrase mean in the context of Boccaccio's storytelling craft?", "options": [{"text": "It achieves maximum comic impact with minimal narrative length through a single, perfectly timed visual punchline.", "isCorrect": true, "rationale": "The text states: 'The tale is a masterpiece of comic economy. In barely two pages, Boccaccio demolishes the pretense of monastic chastity, exposes the gap between public authority and private behavior, and delivers a punchline that is both visual and moral.'"}, {"text": "It is the most financially profitable tale for Boccaccio because it was widely copied and sold.", "isCorrect": false, "rationale": "'Comic economy' refers to narrative efficiency and compression, not financial economics or commercial success."}, {"text": "It is notable for avoiding any unnecessary characters, keeping only those essential to the plot.", "isCorrect": false, "rationale": "While the cast is small, the emphasis in 'comic economy' is on the brevity and efficiency of the storytelling rather than character count."}, {"text": "It uses a frugal prose style that deliberately avoids all literary ornamentation and imagery.", "isCorrect": false, "rationale": "Boccaccio is known for ornate prose; 'comic economy' refers to the tale's brevity and impact, not a stripped-down style."}], "id": "q12"}, {"question": "The text traces the arc of anticlerical satire across the *Decameron*. In what mode does the satire in Day IX operate, compared to Day I (intellectual) and Day VI (rhetorical)?", "options": [{"text": "Day IX operates in the physical mode — the abbess wearing a priest's breeches on her head.", "isCorrect": false, "rationale": "The commentary assigns the physical mode to Day III (Masetto's pretended muteness), not Day IX."}, {"text": "Day IX operates in the visual mode — the abbess wearing a priest's breeches on her head.", "isCorrect": true, "rationale": "The commentary outlines: 'In I, the satire is intellectual... In III, it is physical... In VI, it is rhetorical... And here in IX, the satire is visual — the abbess wearing a priest's breeches on her head.'"}, {"text": "Day IX operates in the emotional mode — the nun's tearful appeal shames the entire convent.", "isCorrect": false, "rationale": "The commentary categorizes Day IX's satire as 'visual,' not emotional."}, {"text": "Day IX operates in the juridical mode — exposing how institutions fail to enforce their own rules.", "isCorrect": false, "rationale": "While institutional failure is exposed, the specific mode the commentary assigns to Day IX is 'visual.'"}], "id": "q13"}, {"question": "What is the gallant's plan if the chapter-house confrontation goes badly for Isabetta, according to the primary source?", "options": [{"text": "He intends to flee the convent immediately by climbing back over the wall.", "isCorrect": false, "rationale": "The text states he waited to see the outcome and had a more aggressive plan than simple flight."}, {"text": "He plans to make as many nuns as possible pay dearly for any harm done to Isabetta and to bring her off with him.", "isCorrect": true, "rationale": "The text states: 'The gallant, left behind in the cell, put on his clothes and waited to see how the affair would end, being minded to make as many nuns as he might come at pay dearly for any despite that might be done his mistress, and to bring her off with him.'"}, {"text": "He plans to bribe the abbess with a large sum of money to secure Isabetta's release.", "isCorrect": false, "rationale": "No bribery is mentioned; his plan involves a direct threat of violence and rescue."}, {"text": "He plans to go to the nearest city and denounce the entire convent to the local bishop.", "isCorrect": false, "rationale": "The gallant's plan is immediate and physical, not an appeal to external ecclesiastical authority."}], "id": "q14"}, {"question": "In what region of Italy is the convent of this tale located, and what detail establishes its reputation in the community?", "options": [{"text": "Tuscany; it was known for its vast library and scholarly output.", "isCorrect": false, "rationale": "The text places the convent in Lombardy, not Tuscany, and describes a spiritual rather than scholarly reputation."}, {"text": "Lombardy; it was of 'very great repute for strict and holy living.'", "isCorrect": true, "rationale": "The primary source states: 'in a convent in Lombardy of very great repute for strict and holy living there was, among other ladies that there wore the veil, a young woman of noble family.'"}, {"text": "Rome; it was directly under the supervision of the papal court.", "isCorrect": false, "rationale": "The story is set in a provincial Lombard convent, not in Rome under papal oversight."}, {"text": "Naples; it was famous for its connections to the Angevin royal family.", "isCorrect": false, "rationale": "The convent is in Lombardy in northern Italy, not in Naples in the south."}], "id": "q15"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
