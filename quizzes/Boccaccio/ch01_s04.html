<body>
<div class="quiz-container">

        <a href="../../courses/Boccaccio.html">&larr; Back to Tales of the Decameron (Boccaccio)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 1, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the primary lens through which a reader should first approach the tales of the Decameron?", "options": [{"text": "As historical documents providing insight into the 14th-century Plague.", "isCorrect": false, "rationale": "While the book has historical context, the text explicitly advises reading them as crafted stories designed to entertain before analyzing history."}, {"text": "As works of entertainment designed to surprise and delight the reader.", "isCorrect": true, "rationale": "The author emphasizes that Boccaccio was a supreme entertainer and the tales function as stories before any other level of analysis."}, {"text": "As moral exemplums intended to provide clear ethical guidance.", "isCorrect": false, "rationale": "The text warns readers to resist looking for simple lessons, as the tales are often morally complex and ironic."}, {"text": "As allegorical critiques of the socio-political landscape of Florence.", "isCorrect": false, "rationale": "While literary analysis is possible, the text suggests prioritizing the narrative experience over complex thematic or allegorical decoding."}]}, {"question": "How does Boccaccio utilize the narrators within the structure of the Decameron?", "options": [{"text": "They serve as transparent mouthpieces for Boccaccio’s own personal philosophy.", "isCorrect": false, "rationale": "The text states the narrators are like characters in a play and are not always reliable, suggesting they do not directly represent the author."}, {"text": "They provide objective summaries to ensure the reader understands the intended moral.", "isCorrect": false, "rationale": "The text mentions that narrators' interpretations are sometimes deliberately wrong or incomplete."}, {"text": "They function as distinct characters whose individual perspectives may conflict with the tale's actual meaning.", "isCorrect": true, "rationale": "Boccaccio uses the gap between a narrator's stated meaning and the story's actual effect to create literary interest."}, {"text": "They are interchangeable voices meant to maintain a consistent tone throughout the ten days.", "isCorrect": false, "rationale": "The text highlights that narrators like Dioneo and Filomena have distinct styles and favor different types of stories."}]}, {"question": "Which character is cited as an example of moral complexity because they are simultaneously a 'monster' and a 'brilliant performer'?", "options": [{"text": "Griselda", "isCorrect": false, "rationale": "Griselda is described as both admirable and disturbing, but she is not characterized as a monster or a performer in this specific context."}, {"text": "Ser Ciappelletto", "isCorrect": true, "rationale": "The text uses Ser Ciappelletto from Tale I.1 to illustrate a character who is wicked yet possesses a brilliant ability to perform."}, {"text": "Fra Cipolla", "isCorrect": false, "rationale": "While Fra Cipolla is mentioned in the teacher's note as a figure audiences take seriously, the 'monster/performer' description is specifically applied to Ciappelletto."}, {"text": "Masetto", "isCorrect": false, "rationale": "Masetto is associated with the pedagogical value of sexual content in the teacher's note, not the specific moral paradox of the performer-monster."}]}, {"question": "What does the text suggest is a hallmark of Boccaccio's use of irony?", "options": [{"text": "A clear and consistent alignment between the narrator's praise and the character's virtue.", "isCorrect": false, "rationale": "Boccaccio's irony often involves a narrator praising a character whom the reader is actually meant to condemn."}, {"text": "The use of complex $14^{th}$-century metaphors that require deep historical knowledge to decode.", "isCorrect": false, "rationale": "While historical context exists, the irony described is rooted in the contrast between literal words and intended meaning."}, {"text": "Situations where the stated 'moral' at the end of a tale contradicts the actual effect of the story.", "isCorrect": true, "rationale": "The text identifies the contradiction between a stated lesson and the story's impact as a pervasive form of Boccaccio's irony."}, {"text": "The explicit avoidance of humor when dealing with serious religious or social themes.", "isCorrect": false, "rationale": "Boccaccio uses humor and the beffa tradition to illuminate human nature, even within serious themes."}]}, {"question": "According to the 'Architecture' of the book, how does the thematic progression of the Decameron generally move?", "options": [{"text": "From high tragedy and nobility toward low comedy and satire.", "isCorrect": false, "rationale": "The text states the arc moves in the opposite direction, starting with comedy/satire."}, {"text": "From cynical satire and comedy toward themes of nobility and virtue.", "isCorrect": true, "rationale": "The overall architecture moves from the satirical and comic toward the more virtuous and noble themes in the later Days."}, {"text": "Through a random sequence of tales intended to mimic the chaos of the Plague.", "isCorrect": false, "rationale": "The text emphasizes that the structure is deliberate and 'none of this is accidental'."}, {"text": "In a circular fashion that returns to the initial themes of the first Day.", "isCorrect": false, "rationale": "The description suggests a developmental arc or progression rather than a circular return."}]}, {"question": "What characterizes the J.M. Rigg translation of 1903 used in this edition?", "options": [{"text": "It uses modern slang to make the $14^{th}$-century tales accessible to contemporary students.", "isCorrect": false, "rationale": "The Rigg translation is noted for its Edwardian English and use of archaic words like 'whither' and 'hath'."}, {"text": "It is a loose adaptation that focuses on the 'spirit' rather than the literal Italian text.", "isCorrect": false, "rationale": "The text states that Rigg's translation is considered 'faithful to Boccaccio's Italian'."}, {"text": "It employs formal, slightly old-fashioned Edwardian English that may feel stiff to modern readers.", "isCorrect": true, "rationale": "The note on translation explains that Rigg uses Edwardian English, which includes words like 'prithee' and can feel formal."}, {"text": "It is a bilingual edition that presents the Italian text alongside the English.", "isCorrect": false, "rationale": "The text refers to it as an English translation and does not mention it being a bilingual edition."}]}, {"question": "How should readers interpret Boccaccio's anticlerical tales according to the provided material?", "options": [{"text": "As evidence that Boccaccio was fundamentally anti-religious and sought to dismantle the Church.", "isCorrect": false, "rationale": "The text explicitly states that Boccaccio is not anti-religious and that his satire is part of a Christian tradition."}, {"text": "As satires targeting the gap between religious profession and actual behavior (hypocrisy).", "isCorrect": true, "rationale": "The satire is directed at hypocrisy—how people behave versus what they profess—rather than at faith itself."}, {"text": "As realistic historical accounts of the widespread collapse of Church authority during the Plague.", "isCorrect": false, "rationale": "The text frames these as literary satires and comic performances rather than strictly historical accounts."}, {"text": "As moral warnings intended to reform the specific individuals mentioned in the stories.", "isCorrect": false, "rationale": "The tales are described as using humor to illuminate human nature generally, rather than acting as reformist tracts for individuals."}]}, {"question": "Which term describes a central motif in the Decameron involving a practical joke or elaborate trick?", "options": [{"text": "Fabliau", "isCorrect": false, "rationale": "While a fabliau is a type of comic tale, the specific term for the trick or joke itself provided in the text is 'beffa'."}, {"text": "Beffa", "isCorrect": true, "rationale": "The text defines 'beffa' as a practical joke or elaborate trick that celebrates cleverness and punishes gullibility."}, {"text": "Exemplum", "isCorrect": false, "rationale": "An exemplum is usually a moralizing tale; a beffa specifically focuses on the trickery and cleverness."}, {"text": "Brigata", "isCorrect": false, "rationale": "The 'brigata' refers to the group of narrators who tell the tales, not the motif of the practical joke."}]}, {"question": "The text notes that medieval audiences differed from modern readers in their approach to moral ambiguity. How so?", "options": [{"text": "Medieval audiences demanded strict moral clarity and rejected any tales that portrayed wicked characters as sympathetic.", "isCorrect": false, "rationale": "The text states the opposite: medieval audiences were less troubled by moral ambiguities than modern readers."}, {"text": "Medieval literature rarely addressed morality, focusing instead on purely aesthetic concerns.", "isCorrect": false, "rationale": "Literature did address complex moral situations; it simply didn't always feel the need to resolve them."}, {"text": "Medieval audiences were often comfortable with unresolved moral situations, trusting themselves to exercise judgment.", "isCorrect": true, "rationale": "The text explains that medieval literature frequently presented complex situations without resolution, inviting debate."}, {"text": "Medieval readers viewed tales primarily as legal precedents for contemporary social disputes.", "isCorrect": false, "rationale": "There is no mention of the tales serving as legal precedents in the source material."}]}, {"question": "What is the significance of the 'gap' mentioned in the section on narrators?", "options": [{"text": "It refers to the historical gap between the 14th century and the 1903 translation.", "isCorrect": false, "rationale": "While that gap exists, the text uses the term 'gap' specifically regarding the narrators' reliability."}, {"text": "It is the space between what a narrator claims a tale means and the story's actual meaning.", "isCorrect": true, "rationale": "The text identifies this specific discrepancy as where the 'real interest' of the Decameron often lies."}, {"text": "It describes the missing tales that were lost during the printing of the Edwardian edition.", "isCorrect": false, "rationale": "The text does not mention any missing or lost tales in the Rigg translation."}, {"text": "It represents the social distance between the aristocratic narrators and the peasant characters in the tales.", "isCorrect": false, "rationale": "While social class exists in the tales, the 'gap' emphasized is an interpretive one concerning narrator reliability."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
