    <link rel="stylesheet" href="../../styles.css">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Boccaccio.html">&larr; Back to Tales of the Decameron (Boccaccio)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 3, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Who assumes the role of queen and succeeds Pampinea for the second day of storytelling?", "options": [{"text": "Filomena", "isCorrect": true, "rationale": "She is the specific individual identified as taking the crown from the first day's ruler to lead the company for Day II."}, {"text": "Neifile", "isCorrect": false, "rationale": "While she is the first to tell a story on this day, she is not the person who was crowned as the ruler for the entire day."}, {"text": "Elissa", "isCorrect": false, "rationale": "Though she is a member of the company, she is not the one designated as queen for the theme of Fortune in this section."}, {"text": "Fiammetta", "isCorrect": false, "rationale": "This character is part of the brigade, but the text explicitly names Filomena as the successor to Pampinea's reign."}], "id": "q01"}, {"question": "The concept of Fortune in the tales of Day II is heavily influenced by which historical literary figure's work?", "options": [{"text": "Boethius", "isCorrect": true, "rationale": "His 'Consolation of Philosophy' established the ubiquitous medieval image of the goddess Fortune and her turning wheel."}, {"text": "Dante Alighieri", "isCorrect": false, "rationale": "While a contemporary of the era, the text specifically attributes the personification of the wheel of fortune to a work from c. 524."}, {"text": "Petrarch", "isCorrect": false, "rationale": "Though influential in the Renaissance, he is not the source cited for the medieval imagery of the wheel of fortune used by Boccaccio."}, {"text": "Virgil", "isCorrect": false, "rationale": "The source material points to a much later post-classical philosopher as the origin of the specific Fortune imagery discussed."}], "id": "q02"}, {"question": "Which specific condition must be met for a story to fit the theme established by the queen for Day II?", "options": [{"text": "The characters must achieve a happy ending they had not hoped for after various misadventures.", "isCorrect": true, "rationale": "The theme specifically focuses on the reversal of fortune where characters are brought to a positive outcome through unexpected means."}, {"text": "The characters must use divine intervention to escape their misfortunes.", "isCorrect": false, "rationale": "The text emphasizes luck, wit, or endurance rather than religious or supernatural intervention as the primary driver of the happy issue."}, {"text": "The protagonists must demonstrate perfect moral virtue to deserve their rewards.", "isCorrect": false, "rationale": "The theme is defined by 'Fortune' and 'misadventure' rather than a strict moralistic code or poetic justice."}, {"text": "The stories must conclude with the tragic downfall of those who were once prosperous.", "isCorrect": false, "rationale": "The prompt for Day II specifically requires a 'happy issue,' which contradicts the idea of a purely tragic conclusion."}], "id": "q03"}, {"question": "How does Boccaccio use the physical movement of the company between villas to support the narrative?", "options": [{"text": "To mirror the themes of movement and discovery present in the tales of that Day.", "isCorrect": true, "rationale": "The change in setting to a new estate reinforces the sense of movement that matches the adventurous stories the company is about to tell."}, {"text": "To provide a realistic explanation for how the company avoids being found by city officials.", "isCorrect": false, "rationale": "The movement is described as a symbolic element of the cornice mirroring themes, rather than a tactical maneuver for evasion."}, {"text": "To allow the characters to find more elaborate garden settings for their storytelling.", "isCorrect": false, "rationale": "While the company enjoys the gardens, the text specifies the purpose of movement is to reflect the thematic content of the Day."}, {"text": "To indicate the passage of time without having to mention specific dates.", "isCorrect": false, "rationale": "The text suggests the movement mirrors thematic discovery rather than acting as a simple chronological marker."}], "id": "q04"}, {"question": "What activity does the company engage in during the morning of the second day before they begin their storytelling at noon?", "options": [{"text": "Straying through dewy meads and weaving garlands of flowers.", "isCorrect": true, "rationale": "The introduction describes the ladies and men sauntering, culling flowers, and making garlands as their morning delight."}, {"text": "Discussing the philosophical implications of Fortune's wheel.", "isCorrect": false, "rationale": "They spend their morning in leisure and floral activities; the thematic discussion is part of the Queen's address at the storytelling session."}, {"text": "Preparing the meal that they will eat in the shade.", "isCorrect": false, "rationale": "The text states they breakfasted in the shade but does not suggest they were involved in the preparation of the food themselves."}, {"text": "Reading the 'Consolation of Philosophy' to prepare for the theme.", "isCorrect": false, "rationale": "While the book is the source of the theme's imagery, the characters are shown engaging in outdoor recreational activities."}], "id": "q05"}, {"question": "According to the source, why are the tales of Day II considered some of the most complex in the Decameron?", "options": [{"text": "They feature elaborate plots involving shipwrecks, disguises, and mistaken identities.", "isCorrect": true, "rationale": "The complexity arises from the world of adventure and the many variables like midnight escapades and unexpected reversals."}, {"text": "They include complex mathematical and scientific riddles that characters must solve.", "isCorrect": false, "rationale": "The source material focuses on narrative complexity and 'adventure' rather than academic or technical puzzles."}, {"text": "They are told in a strictly non-linear fashion with multiple narrators per story.", "isCorrect": false, "rationale": "The complexity noted refers to the elaborate plotting of the events within the stories, not a change in the narrating structure of the cornice."}, {"text": "They contain dense allegorical meanings that require deep theological knowledge.", "isCorrect": false, "rationale": "While they have themes, the source emphasizes the 'elaborately plotted' nature of the action-oriented adventures."}], "id": "q06"}, {"question": "Which character is selected by Queen Filomena to initiate the storytelling for the second day?", "options": [{"text": "Neifile", "isCorrect": true, "rationale": "After scanning the company, Filomena specifically bids Neifile to 'shew others the way with a story.'"}, {"text": "Pampinea", "isCorrect": false, "rationale": "She was the queen of the first day and is the one who passes the crown to Filomena."}, {"text": "Dioneo", "isCorrect": false, "rationale": "He is one of the three young men, but the text identifies a specific lady as the one who starts the session without excuse."}, {"text": "Filomena", "isCorrect": false, "rationale": "Filomena is the queen who gives the order; she directs another member of the group to begin the actual storytelling."}], "id": "q07"}, {"question": "In the context of the Day II theme, what is cited as a human quality that allows characters to navigate the 'forces beyond their control'?", "options": [{"text": "Wit", "isCorrect": true, "rationale": "The text lists luck, wit, and simple endurance as the factors that allow characters to reach their unexpected happy endings."}, {"text": "Aggression", "isCorrect": false, "rationale": "The characters' success is attributed to cleverness or persistence rather than violent or aggressive behavior."}, {"text": "Wealth", "isCorrect": false, "rationale": "While characters may be prosperous, it is their personal qualities or luck that help them overcome the misadventures described."}, {"text": "Political power", "isCorrect": false, "rationale": "The theme focuses on characters being 'tossed about' by Fortune, suggesting they lack control over external social or political structures."}], "id": "q08"}, {"question": "True or False: The company remains at the same villa for the duration of the storytelling to maintain stability against the theme of Fortune.", "options": [{"text": "False — Filomena leads the company to a new estate, mirroring the Day's themes of movement.", "isCorrect": true, "rationale": "The text explicitly states that the setting shifts as Filomena leads the company to a new estate to reinforce the themes of movement and discovery."}, {"text": "True — the company stays put to provide contrast with Fortune's instability.", "isCorrect": false, "rationale": "Remaining in one place would contradict the source's point that Boccaccio uses the company's movement to mirror the Day's themes."}, {"text": "True — the company remains at the original villa until the final day of storytelling.", "isCorrect": false, "rationale": "Boccaccio uses the physical movement between estates as a structural device to echo the thematic content of each Day's stories, not just at the very end."}, {"text": "False — the company is forced to relocate because plague victims are discovered near the first villa.", "isCorrect": false, "rationale": "The relocation is a deliberate artistic choice by Boccaccio to mirror thematic content, not a plot-driven response to the plague's spread."}], "id": "q09"}, {"question": "What is the specific atmospheric setting described just as the company assembles to begin the Day II tales?", "options": [{"text": "A cool meadow at noon.", "isCorrect": true, "rationale": "The text notes that they rose and assembled in a cool meadow at the queen's behest after sleeping until the midday hour."}, {"text": "A formal dining hall during breakfast.", "isCorrect": false, "rationale": "While they breakfasted in the shade, the storytelling itself takes place later in a meadow after a period of rest."}, {"text": "A moonlit garden after the sun has set.", "isCorrect": false, "rationale": "The assembly happens at noon, following their morning activities and midday sleep."}, {"text": "The steps of a church in Florence.", "isCorrect": false, "rationale": "The company has left the city for the countryside; their activities are centered around the gardens and meadows of their estates."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
