<script>
var QUESTIONS = [{"question": "Which characteristic distinguishes Boccaccio's 'novella' from the medieval literary form known as the 'exemplum'?", "options": [{"text": "The novella focuses on realistic human behavior rather than illustrating a specific moral lesson.", "isCorrect": true, "rationale": "As defined in the text, the novella presents recognizable people in recognizable situations and lets the reader draw their own conclusions, unlike the exemplum which serves a moralizing purpose."}, {"text": "The novella relies on supernatural interventions to resolve plot complications.", "isCorrect": false, "rationale": "The source material explicitly states that the novella is concerned with human behavior rather than supernatural events, distinguishing it from the romance."}, {"text": "The novella utilizes idealized heroes who perform impossible feats of chivalry.", "isCorrect": false, "rationale": "Idealized heroes and marvels are characteristics of the romance, whereas the novella focuses on realistic settings and people."}, {"text": "The novella is strictly written in verse to follow the tradition of Provencal troubadours.", "isCorrect": false, "rationale": "The novella is defined as a prose tale, whereas the troubadour tradition of courtly love was rooted in poetry."}], "id": "q01"}, {"question": "In the tale of Nastagio degli Onesti (V8), how is the concept of 'contrapasso' applied to the spectral woman?", "options": [{"text": "She is hunted eternally because her refusal to love was viewed as a form of 'cruelty' toward her suitor.", "isCorrect": true, "rationale": "The text explains that her punishment—being hunted and killed—mirrors her 'sin' of coldness and refusal to return a man's love within the logic of courtly tradition."}, {"text": "She is transformed into a beast to reflect her boorish and unrefined nature before meeting her lover.", "isCorrect": false, "rationale": "This describes the transformation of Cimone in tale V.1, not the punishment in Nastagio's vision."}, {"text": "She is forced to marry a man of lower station to compensate for her family's pride.", "isCorrect": false, "rationale": "While social class is a theme in other tales like V.7, Nastagio's tale uses a supernatural hunt rather than social realignment as punishment."}, {"text": "She is condemned for committing an act of physical violence against a devoted knight.", "isCorrect": false, "rationale": "The 'sin' being punished is her emotional coldness or refusal (crudeltade), not physical violence."}], "id": "q02"}, {"question": "According to the literary critic Erich Auerbach, what makes Federigo's Falcon (V9) a supreme example of narrative economy?", "options": [{"text": "Every detail provided in the setup serves as an essential link leading to the central sacrifice.", "isCorrect": true, "rationale": "Auerbach praised the tale's ability to convey complex emotions swiftly, where every fact—like the son's illness—leads inexorably to the killing of the falcon."}, {"text": "The story avoids all dialogue to maintain a fast-paced and objective narrative tone.", "isCorrect": false, "rationale": "The tale uses dialogue, particularly during the visit, to create emotional tension and irony; its economy refers to structural efficiency, not the absence of speech."}, {"text": "The plot relies on a complex series of subplots that converge at the end.", "isCorrect": false, "rationale": "Narrative economy implies the opposite of complexity; it is the lean, direct path of the plot that Auerbach admired."}, {"text": "The tale resolves its conflict through a sudden and unexpected supernatural intervention.", "isCorrect": false, "rationale": "Federigo's Falcon is praised for its realism and human-driven plot, whereas Nastagio's tale uses the supernatural."}], "id": "q03"}, {"question": "In what way does Chaucer's 'Franklin's Tale' differ from Boccaccio's tale of Federigo regarding the theme of generosity?", "options": [{"text": "Chaucer's tale presents generosity as a chain of reciprocal acts, whereas Federigo's sacrifice is entirely without calculation.", "isCorrect": true, "rationale": "Boccaccio's Federigo gives his last treasure without knowing why the lady has come, whereas Chaucer's characters respond to one another's nobility in a sequence of releases."}, {"text": "Chaucer's tale concludes that true generosity is impossible without the help of a magician.", "isCorrect": false, "rationale": "The magician is a character who performs a feat, but the theme of the tale is the human capacity for 'gentilesse' and generosity in response to one another."}, {"text": "Boccaccio's Federigo is motivated by a desire to clear his debts, unlike Chaucer's knight.", "isCorrect": false, "rationale": "Federigo has already lost his wealth due to his devotion; his sacrifice of the falcon is an act of hospitality, not financial strategy."}, {"text": "Chaucer's tale provides a definitive answer to who was the most generous, while Boccaccio leaves it open-ended.", "isCorrect": false, "rationale": "The text states the opposite: Chaucer leaves the question open-ended ('Which was the moost fre?'), while Federigo's act is presented as the supreme, simple answer."}], "id": "q04"}, {"question": "What is the specific 'irony' identified in the commentary regarding the encounter between Federigo and Monna Giovanna?", "options": [{"text": "Federigo destroys the very object the lady came to request in order to honor her arrival.", "isCorrect": true, "rationale": "The irony lies in the gap between their knowledge: he kills the falcon to feed her, unaware that the falcon is the reason for her visit."}, {"text": "Monna Giovanna marries Federigo only after he has become a wealthy man again.", "isCorrect": false, "rationale": "The marriage happens while he is poor, based on her recognition of his character; he only becomes wealthy through the marriage itself."}, {"text": "Federigo mistakes Monna Giovanna's son for his own long-lost child.", "isCorrect": false, "rationale": "There is no theme of mistaken parentage in V.9, though it appears in other tales like V.5 and V.7."}, {"text": "The falcon survives the meal and eventually helps Federigo regain his fortune.", "isCorrect": false, "rationale": "The falcon is explicitly killed and eaten, which is the 'devastating central moment' that defines the tale's sacrifice."}], "id": "q05"}, {"question": "Which tale is described as celebrating 'love's power to civilize' by transforming a boorish protagonist?", "options": [{"text": "Novel V.1: Cimone and Efigenia", "isCorrect": true, "rationale": "The summary for V.1 states that Cimone's boorishness is cured by the sight of Efigenia, awakening his intelligence and refinement."}, {"text": "Novel V.4: Ricciardo Manardi and Caterina", "isCorrect": false, "rationale": "This tale focuses on a pragmatic and humorous resolution to a secret tryst, not the intellectual transformation of a boor."}, {"text": "Novel V.10: Pietro di Vinciolo", "isCorrect": false, "rationale": "V.10 is described as a comic beffa and an earthy counterpoint to idealism, rather than a story of civilizing love."}, {"text": "Novel V.2: Gostanza and Martuccio", "isCorrect": false, "rationale": "This tale is about fortune's reversals and faithful love during a journey to Tunis, not the civilizing power of love."}], "id": "q06"}, {"question": "The resolution of the tale of Ricciardo and Caterina (V.4) is noted for its 'distinctly Boccaccian resolution' because:", "options": [{"text": "It handles a potentially scandalous situation with humor and common-sense pragmatism.", "isCorrect": true, "rationale": "Rather than reacting with violence to his daughter's lover, the father pragmatically arranges a marriage, reflecting Boccaccio's tendency toward humor and realism."}, {"text": "It ends in a tragic double suicide to preserve the family's honor.", "isCorrect": false, "rationale": "The text states the father avoids violence and arranges a marriage, specifically avoiding a tragic outcome."}, {"text": "It uses a supernatural vision to convince the parents to allow the union.", "isCorrect": false, "rationale": "V.4 is a realistic tale of a nighttime tryst; supernatural visions are characteristic of V.8."}, {"text": "It reveals that the lover is actually a high-ranking nobleman in disguise.", "isCorrect": false, "rationale": "While hidden noble birth is a trope in V.5, V.6, and V.7, V.4's resolution is based on the father's pragmatic choice, not a revelation of rank."}], "id": "q07"}, {"question": "Why does the commentary suggest that Boccaccio might be 'uncomfortable' with the tale of Nastagio degli Onesti?", "options": [{"text": "The narrator, Filomena, tells the story without explicit moral commentary, leaving a disturbing silence.", "isCorrect": true, "rationale": "The narrator's silence suggests an unease, as it forces the reader to supply the moral judgment for a tale involving manipulation and fear."}, {"text": "The tale concludes with the tragic death of both the protagonist and his beloved.", "isCorrect": false, "rationale": "The tale actually ends in a 'happy ending' (within the tale's logic) where Nastagio wins the lady, though the method is disturbing."}, {"text": "It contradicts the rules of courtly love laid out by Andreas Capellanus.", "isCorrect": false, "rationale": "Nastagio's tale actually aligns with the darker side of courtly expectations (that a lady owes a response), but it is the use of terror that creates the modern moral conflict."}, {"text": "Boccaccio later issued a public apology for the tale's graphic violence.", "isCorrect": false, "rationale": "There is no mention of a public apology; the commentary discusses the internal tone and the placement of the tale within the Decameron."}], "id": "q08"}, {"question": "What recurring plot device is used in tales V.5, V.6, and V.7 to resolve seemingly impossible conflicts or class divides?", "options": [{"text": "The revelation of a character's hidden noble birth or true identity.", "isCorrect": true, "rationale": "In V.5, V.6, and V.7, characters are saved from execution, poverty, or social disgrace when their noble connections or true parentage are discovered."}, {"text": "A formal debate on the rules of courtly love presided over by a king.", "isCorrect": false, "rationale": "While Andreas Capellanus wrote rules for love, Boccaccio's characters usually rely on fortune or identity revelations rather than formal debates to resolve Day 5's conflicts."}, {"text": "The protagonist performing a series of heroic labors to win the lady's hand.", "isCorrect": false, "rationale": "This describes the romance tradition; Boccaccio's Day 5 tales focus more on fortune, identity, and sacrifice."}, {"text": "A sudden religious conversion that leads the antagonists to forgive the lovers.", "isCorrect": false, "rationale": "The resolutions are secular—based on noble blood and social status—rather than theological conversions."}], "id": "q09"}, {"question": "How does Dioneo's final tale (V.10) contrast with the general theme of Day the Fifth?", "options": [{"text": "It provides an earthy, comic 'beffa' that undercuts the romantic idealism of the preceding tales.", "isCorrect": true, "rationale": "Dioneo's story of Pietro di Vinciolo's wife is farcical and cynical, serving as a counterpoint to the more idealized versions of 'love rewarded' seen earlier in the day."}, {"text": "It is the only tale of the day that features a truly tragic ending with no resolution.", "isCorrect": false, "rationale": "The tale ends in a compromise, albeit an undignified one; it is comic and farcical rather than tragic."}, {"text": "It is the most faithful adherence to the courtly love tradition in the entire collection.", "isCorrect": false, "rationale": "The text calls it a 'beffa' (trick) and an 'irreverent' counterpoint to courtly idealism."}, {"text": "It shifts the setting from Italy to a mythical, supernatural realm.", "isCorrect": false, "rationale": "The tale is described as 'earthy,' which in the context of the Decameron implies a realistic, human, and often scandalous urban setting, not a mythical one."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
