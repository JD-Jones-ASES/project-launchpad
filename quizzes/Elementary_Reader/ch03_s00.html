    };

        <a href="../../courses/Elementary_Reader.html">&larr; Back to The Open Page</a>

        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "What was the primary reason King Minos compelled the Athenians to send young people to Crete annually?", "options": [{"text": "To provide skilled labor for building and maintaining the labyrinth.", "isCorrect": false, "rationale": "The text states the labyrinth was built by Daedalus and the tribute was specifically to feed the Minotaur, not for labor."}, {"text": "To maintain a peace treaty with Athens and prevent war.", "isCorrect": false, "rationale": "The text describes it as a 'dreadful tribute,' indicating a forced submission rather than a mutually agreed peace treaty."}, {"text": "To feed the terrible creature known as the Minotaur.", "isCorrect": true, "rationale": "The text explicitly states the Minotaur 'fed upon human flesh' and that Minos 'compelled the Athenians to send seven young men and seven young maidens into the labyrinth, where the Minotaur devoured them all.'"}, {"text": "To recruit new soldiers and maidservants for his palace staff.", "isCorrect": false, "rationale": "The text clearly states the purpose was to provide victims for the Minotaur, not to augment King Minos's staff or army."}]}, {"question": "Which of the following best describes the contrast between Theseus's approach and the Minotaur's nature in the labyrinth?", "options": [{"text": "Theseus primarily relies on brute strength, while the Minotaur uses cunning to trap its victims.", "isCorrect": false, "rationale": "Theseus used a sword and bravery, but also Ariadne's thread, demonstrating cleverness. The Minotaur is described as a savage creature, not particularly cunning."}, {"text": "Theseus embodies both bravery and cleverness, while the Minotaur is a symbol of savage, unthinking power.", "isCorrect": true, "rationale": "The 'beforeyouread' section for 'The Minotaur' explicitly states, 'As you read, notice how Theseus uses both bravery and cleverness to succeed.' The Minotaur is depicted as a beast that 'rushed at him with lowered horns,' representing brute force."}, {"text": "Theseus is a mortal who succumbs to fear, whereas the Minotaur is an immortal guardian of the labyrinth.", "isCorrect": false, "rationale": "Theseus is brave and slays the Minotaur, proving he does not succumb to fear. The Minotaur is a creature, not an immortal guardian."}, {"text": "Theseus seeks wealth and power, while the Minotaur seeks freedom from its imprisonment.", "isCorrect": false, "rationale": "Theseus seeks to end the tribute and slay the monster, not wealth. The Minotaur's motivations are not detailed beyond its need for food."}]}, {"question": "The story of King Midas serves as a cautionary tale primarily about what human failing?", "options": [{"text": "The dangers of political ambition and unchecked power.", "isCorrect": false, "rationale": "While Midas is a king, the story focuses on his personal desire for gold, not political ambition."}, {"text": "The tragic consequences of extreme greed and misplaced values.", "isCorrect": true, "rationale": "The text states Midas's 'avarice was never satisfied' and that he discovered 'All the gold in the world was worthless now' after turning his daughter to gold, directly illustrating the danger of extreme greed."}, {"text": "The importance of valuing magic and supernatural gifts.", "isCorrect": false, "rationale": "The story shows the opposite, that such a gift can be dreadful if not wisely wished for."}, {"text": "The necessity of sacrificing personal happiness for the good of one's kingdom.", "isCorrect": false, "rationale": "The story shows Midas sacrificing his happiness (and his daughter's life) for his personal greed, not for the kingdom's good."}]}, {"question": "If a contemporary financial journalist describes a successful investor as having 'the Midas touch,' what characteristic are they most likely attributing to that investor?", "options": [{"text": "A tendency to make impulsive decisions that often lead to unforeseen negative outcomes.", "isCorrect": false, "rationale": "While King Midas's touch had negative outcomes for him, the 'didyouknow' section explains that the modern phrase 'the Midas touch' means 'when someone is very good at making money.'"}, {"text": "An uncanny ability to transform ordinary ventures into highly profitable enterprises.", "isCorrect": true, "rationale": "The 'didyouknow' section explicitly states, 'Today, when someone is very good at making money, we say they have “the Midas touch.”' This implies a talent for making things profitable."}, {"text": "A habit of prioritizing material wealth over personal relationships and emotional well-being.", "isCorrect": false, "rationale": "This describes Midas's fault, but the modern idiomatic phrase focuses on the successful outcome (making money), not the moral lesson Midas learned."}, {"text": "A magical power that literally turns objects into gold upon contact.", "isCorrect": false, "rationale": "This is a literal interpretation of the myth, but the question asks about the modern idiomatic usage, which is metaphorical."}]}, {"question": "What unexpected circumstance enabled Arthur to be the one to pull the sword from the stone?", "options": [{"text": "He had secretly trained for years to develop the strength required for the feat.", "isCorrect": false, "rationale": "The text describes him as a 'younger boy' and Kay's squire, not a specially trained warrior."}, {"text": "He was aware of his royal birthright and acted on his destiny.", "isCorrect": false, "rationale": "The text states he 'does not know he is special' and only learns of his kingship after pulling the sword."}, {"text": "He was simply trying to find a sword for his brother Kay, whose lodging was locked.", "isCorrect": true, "rationale": "The text states, 'Kay discovered he had left his sword at their lodging. 'Arthur,' he said, 'ride back and fetch my sword.' ... the lodging was locked and no one was within. On his way back, he passed through the churchyard and saw the sword in the stone.' This sequence of events leads to his attempt."}, {"text": "He was instructed by the Archbishop to try after all the knights had failed.", "isCorrect": false, "rationale": "Arthur stumbled upon the sword on his own initiative while running an errand, he was not officially called upon by the Archbishop."}]}, {"question": "The legend of King Arthur and the Sword in the Stone primarily suggests that true leadership is characterized by:", "options": [{"text": "Superior physical strength and martial prowess.", "isCorrect": false, "rationale": "Many 'lords and knights' tried their strength and failed, indicating physical strength alone was not the key."}, {"text": "Established noble lineage and a strong claim to the throne.", "isCorrect": false, "rationale": "Arthur's noble lineage was unknown to him and others; his kingship was proven by the act, not by prior recognition of his birthright."}, {"text": "Humility, a willingness to serve, and an innate sense of valor.", "isCorrect": true, "rationale": "Arthur is described as a 'younger boy' who served his brother 'with a cheerful and willing heart.' He pulls the sword for Kay, not himself, demonstrating humility and service, and his subsequent quest is for 'justice and valor.'"}, {"text": "Strategic political alliances and the ability to command respect through fear.", "isCorrect": false, "rationale": "The story emphasizes Arthur's character, not his political maneuvering or use of fear."}]}, {"question": "In Alfred, Lord Tennyson's poem 'The Eagle,' what imagery is used in the final line to vividly portray the eagle's powerful descent?", "options": [{"text": "It 'clasps the crag with crooked hands.'", "isCorrect": false, "rationale": "This line describes the eagle's stationary grip on the cliff, not its descent."}, {"text": "It 'watches from its mountain walls.'", "isCorrect": false, "rationale": "This describes the eagle's observation position, not its fall."}, {"text": "It is 'ring'd with the azure world.'", "isCorrect": false, "rationale": "This describes the eagle's position high in the sky, surrounded by blue, not its movement downward."}, {"text": "It 'like a thunderbolt he falls.'", "isCorrect": true, "rationale": "The final line 'And like a thunderbolt he falls' directly compares the eagle's dive to the swift and powerful descent of a thunderbolt."}]}, {"question": "William Blake's 'The Tyger' primarily explores which profound question regarding the natural world and its creator?", "options": [{"text": "How such a beautiful creature can be so destructive to its prey.", "isCorrect": false, "rationale": "While the 'fearful symmetry' acknowledges its power, the questions focus more broadly on its creation and the nature of the Creator, not just its impact on prey."}, {"text": "The process by which the Tyger evolved to have such powerful features.", "isCorrect": false, "rationale": "The poem uses words like 'immortal hand or eye' and 'frame,' indicating a focus on creation rather than evolutionary processes."}, {"text": "Whether the same divine being could create both a gentle creature like the Lamb and a terrifying one like the Tyger.", "isCorrect": true, "rationale": "The 'didyouknow' section explicitly states that 'The Tyger' and 'The Lamb' 'ask a deep question: How can the same Creator make both a soft, peaceful lamb and a fierce, burning tiger?' This central question is evident throughout the poem's inquiries about the 'immortal hand or eye.'"}, {"text": "The aesthetic appeal of its 'fearful symmetry' and its place in the ecosystem.", "isCorrect": false, "rationale": "The poem acknowledges its beauty but delves deeper into the philosophical questions of its origin and creator, not just its ecological role."}]}, {"question": "Considering both 'The Eagle' by Tennyson and 'The Tyger' by Blake, which statement best contrasts their poetic approaches to depicting powerful animals?", "options": [{"text": "Tennyson uses vivid descriptive imagery of an observed moment, while Blake employs rhetorical questions to ponder philosophical aspects of creation.", "isCorrect": true, "rationale": "Tennyson's poem is a descriptive snapshot ('He clasps the crag,' 'He watches,' 'he falls'), while Blake's 'The Tyger' is entirely composed of questions ('What immortal hand or eye...?', 'Did he who made the Lamb make thee?'), exploring the nature of the Creator."}, {"text": "Tennyson focuses on the internal thoughts and feelings of the eagle, whereas Blake emphasizes the physical characteristics of the tiger.", "isCorrect": false, "rationale": "Tennyson describes the eagle's external actions and appearance. Blake does describe physical features ('fire of thine eyes,' 'sinews of thy heart') but uses them to prompt questions about the creator, not as the sole focus."}, {"text": "Both poets use direct address to the animal to create a sense of intimacy and admiration.", "isCorrect": false, "rationale": "Tennyson describes the eagle in the third person. Blake addresses the 'Tyger' but his questions are directed more broadly at its creation and creator, not an intimate conversation."}, {"text": "Both poems primarily serve as allegories for human ambition and the pursuit of power.", "isCorrect": false, "rationale": "Tennyson's poem is a direct observation of nature. Blake's poem delves into theological questions about creation rather than human ambition."}]}, {"question": "According to the 'Overview' and the 'About Nathaniel Hawthorne' sections, what is a primary educational goal of including Hawthorne's retellings in this unit?", "options": [{"text": "To introduce students to the complex original language and structure of classical literature.", "isCorrect": false, "rationale": "The text states the stories have been 'retold and simplified' for young readers, indicating a focus on accessibility rather than original complexity."}, {"text": "To encourage critical analysis of historical inaccuracies found in ancient myths.", "isCorrect": false, "rationale": "The goal is to 'thrill and teach children' with the stories, not to critique their historical accuracy."}, {"text": "To make ancient myths accessible, engaging, and instructive for young readers.", "isCorrect": true, "rationale": "The 'Overview' mentions 'Every culture tells stories about heroes... to explain the world and teach courage.' The 'About Nathaniel Hawthorne' section states he 'retold the great myths... for young readers' and 'believed that these old stories still had the power to thrill and teach children.'"}, {"text": "To demonstrate how AI assistants can simplify complex texts without human oversight.", "isCorrect": false, "rationale": "While Claude (an AI) did the retelling for this 'reader-writer book,' the core educational goal of including the *myths themselves* and Hawthorne's *original intent* is broader than demonstrating AI capabilities."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
