<script>
var QUESTIONS = [{"question": "According to the Genesis creation account (Genesis 1:1–2:3), what significant event occurred on the fourth day?", "options": [{"text": "The creation of light and the separation of day and night.", "isCorrect": false, "rationale": "The creation of light and the separation of day and night occurred on the first day, as stated in the passage: 'And God said, Let there be light: and there was light. ...And the evening and the morning were the first day.'"}, {"text": "The appearance of dry land and the naming of Earth and Seas.", "isCorrect": false, "rationale": "The appearance of dry land and the naming of Earth and Seas took place on the third day, as the text describes: 'And God said, Let the dry land appear...And the evening and the morning were the third day.'"}, {"text": "The creation of the sun, moon, and stars to rule the day and night.", "isCorrect": true, "rationale": "The passage explicitly states for the fourth day: 'And God made two great lights; the greater light to rule the day, and the lesser light to rule the night: he made the stars also. ...And the evening and the morning were the fourth day.'"}, {"text": "The creation of great whales and every living creature that moves in the waters.", "isCorrect": false, "rationale": "The creation of great whales and other moving creatures in the waters occurred on the fifth day, according to the text: 'And God created great whales, and every living creature that moveth. ...And the evening and the morning were the fifth day.'"}]}, {"question": "The 'readingcontext' section about the King James Bible primarily serves to:", "options": [{"text": "Explain the historical rivalry between King James I and earlier English monarchs.", "isCorrect": false, "rationale": "The 'readingcontext' section does not discuss historical rivalries but rather focuses on the Bible's translation and language."}, {"text": "Highlight the King James Bible's importance as a theological text for religious scholars.", "isCorrect": false, "rationale": "While it mentions the KJV is 'one of the most important books in the English language,' the primary purpose of *this specific context section* is to address its linguistic challenges for modern readers, not its theological scholarship."}, {"text": "Prepare readers for the archaic language of the text and provide clarity on potentially unfamiliar words.", "isCorrect": true, "rationale": "The section explicitly states, 'Its language is over four hundred years old, so some words may sound unfamiliar. Words like firmament (the sky) and dominion (authority) are explained in the vocabulary section that follows,' indicating its main purpose is linguistic preparation and clarification."}, {"text": "Criticize the King James Bible for its outdated vocabulary compared to more modern translations.", "isCorrect": false, "rationale": "The context section provides factual information and clarification without expressing criticism or suggesting the KJV is inferior due to its age."}]}, {"question": "A young student struggles with a math problem and considers giving up after a few attempts. Which moral from Aesop's fables would best encourage them to persist?", "options": [{"text": "\"There is no believing a liar, even when he speaks the truth.\"", "isCorrect": false, "rationale": "This moral, from 'The Shepherd's Boy and the Wolf,' warns against the consequences of dishonesty and does not directly relate to persistence in tasks."}, {"text": "\"Slow but steady wins the race.\"", "isCorrect": true, "rationale": "This moral from 'The Hare and the Tortoise' directly promotes the idea that consistent effort and perseverance, even at a slow pace, leads to success, which is applicable to overcoming academic challenges."}, {"text": "The idea of 'sour grapes' when one cannot achieve a goal.", "isCorrect": false, "rationale": "The phrase 'sour grapes' refers to pretending not to want something one cannot have, and it does not encourage persistence; rather, it describes a reaction to failure."}, {"text": "The warning against a 'wolf in sheep's clothing.'", "isCorrect": false, "rationale": "This phrase, mentioned in the 'Did You Know' section, refers to deception and hidden danger, which is unrelated to the student's struggle with persistence in a task."}]}, {"question": "In 'The Hare and the Tortoise,' what contrast in character traits between the two animals ultimately determines the outcome of the race?", "options": [{"text": "The Hare's confidence versus the Tortoise's humility.", "isCorrect": false, "rationale": "While the Hare is confident and the Tortoise is humble, the direct actions stemming from these traits, rather than just the traits themselves, are what decide the race."}, {"text": "The Hare's speed versus the Tortoise's physical strength.", "isCorrect": false, "rationale": "The story contrasts the Hare's speed with the Tortoise's steady pace, not their physical strength. The Tortoise wins by consistent movement, not superior strength."}, {"text": "The Hare's arrogance and overconfidence versus the Tortoise's persistence and steady effort.", "isCorrect": true, "rationale": "The Hare's arrogance leads him to underestimate the Tortoise and fall asleep, while the Tortoise's consistent, unwavering effort ('never for a moment stopped, but went on with a slow but steady pace') is the direct cause of her victory, embodying persistence against overconfidence."}, {"text": "The Hare's desire to win versus the Tortoise's indifference to the outcome.", "isCorrect": false, "rationale": "The Tortoise is not indifferent; she accepts the challenge and maintains her effort to win, demonstrating a strong desire to prove her point, despite her slow pace."}]}, {"question": "A student repeatedly exaggerates stories to get attention from their friends. Based on the moral of 'The Shepherd's Boy and the Wolf,' what is the most likely consequence the student will face in a real crisis?", "options": [{"text": "Their friends will eventually get tired of the exaggerations and avoid them.", "isCorrect": false, "rationale": "While friends might get tired, the fable's moral points to a more specific and dire consequence during a crisis."}, {"text": "Their friends will learn to identify real threats from exaggerated ones.", "isCorrect": false, "rationale": "The fable illustrates the opposite: the friends become unable to distinguish truth from falsehood due to repeated lies."}, {"text": "Their friends will dismiss their genuine calls for help, believing them to be another exaggeration.", "isCorrect": true, "rationale": "The moral, 'There is no believing a liar, even when he speaks the truth,' directly illustrates that when a habitual liar faces a real crisis, their genuine pleas for help will be ignored because they have lost their credibility."}, {"text": "Their friends will feel sorry for them and try to understand why they exaggerate.", "isCorrect": false, "rationale": "The fable shows a practical, negative consequence (lack of help) rather than an empathetic or understanding response from the community."}]}, {"question": "In Psalm 19, the poet uses a simile to describe the sun's appearance and movement. Which two comparisons are used to illustrate its vigor and splendor?", "options": [{"text": "A powerful warrior and a watchful shepherd.", "isCorrect": false, "rationale": "The psalm does not use comparisons to a warrior or a shepherd to describe the sun."}, {"text": "A wise old king and a generous benefactor.", "isCorrect": false, "rationale": "These comparisons are not used in Psalm 19 to describe the sun's vigor and splendor."}, {"text": "A radiant bridegroom and a strong man running a race.", "isCorrect": true, "rationale": "The psalm states, 'Which is as a bridegroom coming out of his chamber, and rejoiceth as a strong man to run a race,' directly using these two vivid similes to describe the sun."}, {"text": "A guiding star and an endless river.", "isCorrect": false, "rationale": "The psalm does not compare the sun to a guiding star or an endless river."}]}, {"question": "What is the central message conveyed in the opening stanzas of Psalm 19?", "options": [{"text": "The importance of human language in communicating divine truths.", "isCorrect": false, "rationale": "The psalm emphasizes that nature speaks universally, even 'There is no speech nor language, where their voice is not heard,' implying nature's communication of divine truth transcends human language."}, {"text": "The vastness of the heavens makes human existence seem insignificant.", "isCorrect": false, "rationale": "While the heavens are vast, the primary focus of these stanzas is on their role in declaring God's glory and handywork, not on human insignificance."}, {"text": "The natural world universally reveals God's creative power and glory.", "isCorrect": true, "rationale": "The opening lines clearly state, 'The heavens declare the glory of God; and the firmament sheweth his handywork,' and later, 'Day unto day uttereth speech...Their line is gone out through all the earth, and their words to the end of the world,' conveying that nature universally proclaims God's attributes."}, {"text": "The sun's journey across the sky symbolizes the passage of time and the changing seasons.", "isCorrect": false, "rationale": "While the sun's circuit is described, its primary purpose in these stanzas is to demonstrate God's glory and power, not merely to symbolize the passage of time."}]}, {"question": "Which of the following themes is most evident across all three reading selections (Genesis, Aesop's Fables, and Psalm 19)?", "options": [{"text": "The struggle between good and evil in the world.", "isCorrect": false, "rationale": "While this theme might appear in some ancient stories, it is not a primary or explicit theme common to Genesis creation, Aesop's fables, and Psalm 19 in the provided excerpts."}, {"text": "The significance of written language for preserving history.", "isCorrect": false, "rationale": "The text mentions the King James Bible's importance in English, but the selections themselves are presented as stories or poems, and the overview notes 'Long before anyone could read or write, people told stories,' suggesting oral tradition as the origin rather than written language being the common theme across the texts' content."}, {"text": "The enduring power of ancient stories to convey fundamental truths or lessons.", "isCorrect": true, "rationale": "The Genesis account conveys fundamental truths about creation; Aesop's Fables teach moral lessons; and Psalm 19 conveys truths about God's glory through nature—all are ancient stories recognized for their lasting impact and teachings as mentioned in the overview ('oldest and most beloved stories')."}, {"text": "The superiority of human intellect over the forces of nature.", "isCorrect": false, "rationale": "This theme is not explicitly present in all three selections; Genesis emphasizes God's dominion *over* nature, and Psalm 19 celebrates nature's declaration of God's glory, not human intellect over it."}]}, {"question": "In the Genesis account, when God grants man 'dominion' over the fish of the sea and the fowl of the air, what ability or role is given to humanity?", "options": [{"text": "The ability to communicate with all living creatures.", "isCorrect": false, "rationale": "The text does not state that man gains the ability to communicate with animals, but rather a role of governance."}, {"text": "The responsibility to rule over and have authority over the animal kingdom.", "isCorrect": true, "rationale": "The glossary defines 'dominion' as 'Authority or rule over something; sovereignty,' and the text states God grants man 'dominion... over the fish of the sea, and over the fowl of the air,' meaning the role of ruling or having authority over them."}, {"text": "The power to create new species of animals.", "isCorrect": false, "rationale": "The power to create is attributed solely to God in the Genesis account; dominion refers to governance over existing creation, not new creation."}, {"text": "The task of naming every animal on Earth.", "isCorrect": false, "rationale": "While naming animals is part of a different Genesis account (Genesis 2), it is not mentioned in this specific passage (Genesis 1:1–2:3) as the meaning of 'dominion.'"}]}, {"question": "The 'Overview' states that 'In the beginning, there were stories.' Considering the three selections, what makes them effective as stories for an audience 'long before anyone could read or write'?", "options": [{"text": "Their reliance on complex vocabulary that challenged listeners to learn new words.", "isCorrect": false, "rationale": "While the King James Version has complex words, effective oral storytelling for pre-literate audiences typically relies on simpler, more accessible language, not complex vocabulary, to ensure comprehension."}, {"text": "Their use of vivid imagery, memorable characters (animals/God), and clear patterns or lessons.", "isCorrect": true, "rationale": "Vivid imagery (e.g., God creating light, the sun as a bridegroom), memorable characters (talking animals, God), and clear patterns (e.g., the daily creation sequence) or lessons (morals of fables) are highly effective techniques for oral tradition, aiding memorization and comprehension for audiences without written texts."}, {"text": "Their detailed historical accuracy and precise scientific explanations of natural phenomena.", "isCorrect": false, "rationale": "Ancient stories, particularly creation myths and fables, are typically narrative and symbolic, not primarily focused on detailed historical accuracy or precise scientific explanation, which are modern concepts."}, {"text": "Their primary focus on individual human experiences and personal introspection.", "isCorrect": false, "rationale": "While personal experience can be part of any story, these particular selections focus more on grand narratives of creation, universal moral lessons, or cosmic declarations of divine glory, rather than individual human introspection as their *primary* focus for pre-literate audiences."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
