<script>
var QUESTIONS = [{"question": "Which of the following was Frederick Douglass's most successful strategy for learning to read in defiance of the laws against enslaved literacy?", "options": [{"text": "Secretly studying his mistress's personal library at night.", "isCorrect": false, "rationale": "The text states his mistress ceased instruction and set her face against him being instructed, making access to her library for study unlikely and certainly not his 'most successful' method."}, {"text": "Bribing poor white street boys with bread to teach him letters and words.", "isCorrect": true, "rationale": "Douglass explicitly states, 'The plan which I adopted, and the one by which I was most successful, was that of making friends of all the little white boys whom I met in the street... I used also to carry bread with me, and to bestow it upon the hungry little urchins... who, in return, would give me that more valuable bread of knowledge.'"}, {"text": "Attending clandestine schools organized by sympathetic abolitionists.", "isCorrect": false, "rationale": "The text does not mention organized schools or abolitionists playing a direct role in his early literacy, emphasizing his individual 'stratagems'."}, {"text": "Copying legal documents and public notices without supervision.", "isCorrect": false, "rationale": "While he did learn to write by copying letters from the shipyard and using fences as a 'copy-book,' this was for writing, not his primary method for learning to read, and it was not 'without supervision' in the sense of formal learning."}], "id": "q01"}, {"question": "Frederick Douglass's mistress initially began to instruct him but later vehemently opposed his learning. What was the underlying reason for her change of heart, according to the text?", "options": [{"text": "She grew tired of his slow progress and lack of interest in academics.", "isCorrect": false, "rationale": "The text emphasizes Douglass's strong desire to learn, not his lack of interest or slow progress."}, {"text": "Her husband convinced her that education and slavery were incompatible, making enslaved people harder to control.", "isCorrect": true, "rationale": "The text states, 'My mistress...had, in compliance with the advice of her husband, not only ceased to instruct, but had set her face against my being instructed by any one else.' It further notes, 'education and slavery were incompatible with each other.'"}, {"text": "She discovered Douglass was planning to use his literacy to escape and expose their family.", "isCorrect": false, "rationale": "While Douglass did eventually use literacy for freedom, the text does not suggest this was the immediate reason for her opposition as a young boy."}, {"text": "She found it morally wrong for enslaved people to read religious texts without proper guidance.", "isCorrect": false, "rationale": "The text focuses on the master's fear of control, not a religious objection to reading without guidance."}], "id": "q02"}, {"question": "Sojourner Truth refutes the arguments that women are too delicate and weak for equal rights by primarily employing which rhetorical technique?", "options": [{"text": "Presenting statistical data on women's contributions to manual labor and childbearing.", "isCorrect": false, "rationale": "Truth uses personal anecdotes and experience, not statistical data, though her experiences imply statistics."}, {"text": "Appealing to complex legal precedents and constitutional rights for women.", "isCorrect": false, "rationale": "Her speech is direct and experiential, not based on legal precedents or constitutional arguments."}, {"text": "Using her own physical capabilities, experiences of hard labor, and motherhood as evidence.", "isCorrect": true, "rationale": "Truth explicitly challenges the stereotype: 'Look at me! Look at my arm! I have ploughed and planted, and gathered into barns, and no man could head me!... I could work as much and eat as much as a man... and bear the lash as well! I have borne thirteen children... And ain't I a woman?'"}, {"text": "Quoting respected male scholars who supported women's intellectual equality.", "isCorrect": false, "rationale": "Truth relies on her own authority and experience, not quotes from scholars."}], "id": "q03"}, {"question": "Beyond physical strength, Sojourner Truth also addresses the argument about women's intellect. How does she respond to the idea that intellect determines rights?", "options": [{"text": "She states that women's intellect is demonstrably superior to men's.", "isCorrect": false, "rationale": "She does not claim superiority, but rather argues for the right to fulfill one's own capacity."}, {"text": "She uses the analogy of different-sized cups to argue that even a small capacity deserves to be filled.", "isCorrect": true, "rationale": "Truth asks, 'If my cup won't hold but a pint, and yours holds a quart, wouldn't you be mean not to let me have my little half-measure full?' This analogy argues for rights based on individual capacity, not a universal standard or superiority."}, {"text": "She dismisses intellect as irrelevant to human worth or rights.", "isCorrect": false, "rationale": "She doesn't dismiss intellect, but rather puts it in perspective, arguing it shouldn't be a barrier to rights."}, {"text": "She asserts that intellectual differences are solely a product of unequal educational opportunities.", "isCorrect": false, "rationale": "While this might be a valid argument, it's not the specific point she makes in the provided text regarding intellect."}], "id": "q04"}, {"question": "What is the primary effect of the refrain, 'Gone, gone,—sold and gone,' in John Greenleaf Whittier's poem 'The Farewell of a Virginia Slave Mother'?", "options": [{"text": "It provides a musical cadence to the poem, making it more pleasant to read.", "isCorrect": false, "rationale": "While it adds cadence, its primary effect is emotional, not just aesthetic. The tone is mournful, not 'pleasant.'"}, {"text": "It emphasizes the relentless and irreversible nature of the separation and the mother's deepening grief.", "isCorrect": true, "rationale": "The 'didyouknow' section states, 'By repeating these words, Whittier makes the reader feel the mother's grief growing heavier with each stanza. The refrain echoes in the reader's mind long after the poem is finished,' highlighting its role in conveying sorrow and finality."}, {"text": "It serves as a factual summary, reminding the reader of the economic transaction taking place.", "isCorrect": false, "rationale": "While it refers to the sale, its main purpose is emotional and thematic, not a factual summary."}, {"text": "It implies a sense of hope that the children might eventually return.", "isCorrect": false, "rationale": "The phrase 'sold and gone' conveys permanence and loss, not hope of return."}], "id": "q05"}, {"question": "The imagery used to describe the 'rice-swamp dank and lone' in Whittier's poem, such as 'slave-whip ceaseless swings' and 'fever-demon strews Poison,' primarily serves to portray:", "options": [{"text": "A beautiful but challenging natural environment where the children will grow resilient.", "isCorrect": false, "rationale": "The imagery ('dank,' 'noisome insect stings,' 'fever-demon,' 'sickly sunbeams glare') evokes danger and suffering, not beauty or resilience-building."}, {"text": "A place of isolation and profound suffering, designed to instill fear and compassion in the reader.", "isCorrect": true, "rationale": "The descriptions of ceaseless whips, stinging insects, fever, and poisonous dews clearly aim to depict a place of extreme suffering and danger, eliciting strong emotional responses from the reader against slavery."}, {"text": "A mystical land where spirits reside and offer solace to the enslaved.", "isCorrect": false, "rationale": "The 'fever-demon' is a symbol of disease and torment, not mystical solace."}, {"text": "A productive agricultural region, despite its harsh working conditions.", "isCorrect": false, "rationale": "While it is an agricultural region, the poem focuses entirely on the suffering imposed by it, not its productivity."}], "id": "q06"}, {"question": "In Harriet Beecher Stowe's 'Eva and Uncle Tom,' the friendship between the two characters is depicted as:", "options": [{"text": "A typical, hierarchical relationship between a master's child and an enslaved person.", "isCorrect": false, "rationale": "The text explicitly states their friendship 'crosses every boundary that slavery tried to build,' indicating it is not typical or merely hierarchical."}, {"text": "A practical alliance where Eva provides literacy lessons and Tom offers protection.", "isCorrect": false, "rationale": "While Eva reads to Tom, it's more about shared spiritual experience than a structured 'literacy lesson,' and the text doesn't emphasize Tom's protection in this scene."}, {"text": "A deep, spiritual, and unconditional bond that transcends the oppressive social order.", "isCorrect": true, "rationale": "The text describes Tom loving Eva 'as something frail and earthly, yet almost worshipped her as something heavenly and divine,' and Eva being a 'beautiful reader' of the Bible to him. This spiritual connection and their mutual affection clearly transcend societal boundaries."}, {"text": "A forbidden romance that challenges societal norms.", "isCorrect": false, "rationale": "The relationship is described as a 'tender friendship' between a man and a 'young daughter,' not a romance."}], "id": "q07"}, {"question": "When Eva, after reading about 'a sea of glass, mingled with fire' from the Bible, points to the lake and says, 'there 't is,' this moment reveals her:", "options": [{"text": "Literal-mindedness and inability to understand abstract religious concepts.", "isCorrect": false, "rationale": "Her ability to see a spiritual vision reflected in nature suggests imaginative insight, not literal-mindedness or inability to grasp abstract concepts."}, {"text": "Profound spiritual intuition and ability to perceive divine echoes in the natural world.", "isCorrect": true, "rationale": "This action demonstrates Eva's unique spiritual perception, connecting a biblical vision of the divine ('sea of glass, mingled with fire') with the natural beauty of the lake, implying a deep, intuitive understanding beyond mere surface observation."}, {"text": "Playful attempt to distract Tom from serious biblical reflection.", "isCorrect": false, "rationale": "There is no indication of playfulness or distraction; it seems a genuine moment of shared wonder and insight."}, {"text": "Superior knowledge of scripture compared to Uncle Tom.", "isCorrect": false, "rationale": "While she is a 'beautiful reader,' this specific act highlights her spiritual connection, not merely her comparative knowledge."}], "id": "q08"}, {"question": "Considering the 'didyouknow' section about Douglass's Narrative, why was including real names and places a courageous act for him?", "options": [{"text": "It allowed him to identify specific individuals for praise and recognition.", "isCorrect": false, "rationale": "While it allowed identification, the context states it put him in danger, not for praise."}, {"text": "It put him in danger of being captured and returned to slavery, discrediting his freedom.", "isCorrect": true, "rationale": "The text explicitly states: 'To prove he was telling the truth, Douglass included real names and places—which put him in danger of being captured and returned to slavery.'"}, {"text": "It was legally required for all published autobiographies at the time.", "isCorrect": false, "rationale": "The text provides no information about such legal requirements."}, {"text": "It helped his friends raise money more effectively for the abolitionist cause.", "isCorrect": false, "rationale": "His friends raised money to purchase his freedom *after* he published, due to the danger, not because of the names themselves aiding fundraising."}], "id": "q09"}, {"question": "The collection of texts in 'Slavery and Freedom: Voices of Conscience' best illustrates which overarching theme about resisting injustice?", "options": [{"text": "Successful resistance against oppression primarily relies on organized political movements and legislative change.", "isCorrect": false, "rationale": "While these are important, the texts highlight individual acts of defiance, personal narratives, and emotional appeals through art and speech, not just organized political movements."}, {"text": "The power of individual voices, expressed through diverse literary forms, to challenge oppressive systems and humanize the experience of the oppressed.", "isCorrect": true, "rationale": "The overview states the unit will feature 'autobiography, speech, poetry, and fiction' from 'those who endured slavery and those who fought to end it,' precisely demonstrating the power of individual voices and diverse forms to confront injustice."}, {"text": "Effective advocacy for social change requires universal literacy among the oppressed population.", "isCorrect": false, "rationale": "While literacy (Douglass) is highlighted, Truth's powerful oral tradition and Whittier's poetry for a literate audience show that universal literacy among the oppressed isn't the *only* or primary theme for effective advocacy across all selections."}, {"text": "Religious faith is the sole motivator and foundation for all acts of resistance against slavery.", "isCorrect": false, "rationale": "While faith is present (Truth, Tom, Whittier), it's not the 'sole motivator.' Douglass's struggle for literacy is motivated by freedom and self-determination, not explicitly religious faith in the provided text."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
