<div class="quiz-container">

        <div class="subtitle">The Open Page &mdash; Chapter 16</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    </div>

<script>
var QUESTIONS = [{"question": "The texts by Emma Lazarus and Jacob Riis present contrasting views on the immigrant experience in America at the turn of the twentieth century. Which statement best encapsulates this contrast?", "options": [{"text": "Lazarus celebrated the individual achievements of wealthy immigrants, while Riis documented the decline of old money in New York.", "isCorrect": false, "rationale": "Lazarus's poem welcomes all, especially the 'tired, poor, huddled masses,' not just the wealthy. Riis focused on the harsh reality for the poor, not the decline of the wealthy."}, {"text": "Lazarus depicted America as a welcoming beacon for the oppressed, while Riis exposed the harsh, crowded reality many immigrants faced upon arrival.", "isCorrect": true, "rationale": "Lazarus's 'The New Colossus' is a welcoming poem for immigrants, while Riis's 'How the Other Half Lives' details the grim living conditions in New York's tenements, presenting a direct contrast between promise and reality."}, {"text": "Lazarus focused on the political rights gained by immigrants, whereas Riis was concerned with their cultural assimilation.", "isCorrect": false, "rationale": "Lazarus's poem is about welcome and sanctuary, not specific political rights. Riis focused on living conditions and social reform, not cultural assimilation."}, {"text": "Lazarus warned against excessive immigration, while Riis advocated for stricter border controls to improve living conditions.", "isCorrect": false, "rationale": "Lazarus's poem is an invitation, not a warning. Riis's work highlighted the need for housing reform, not stricter immigration controls."}], "id": "q01"}, {"question": "In 'The New Colossus,' Emma Lazarus writes, 'Give me your tired, your poor, / Your huddled masses yearning to breathe free, / The wretched refuse of your teeming shore.' What does this excerpt primarily communicate about America's role as envisioned by Lazarus?", "options": [{"text": "America primarily sought highly skilled laborers from other nations to boost its industrial growth.", "isCorrect": false, "rationale": "The poem specifically mentions the 'tired, poor, huddled masses' and 'wretched refuse,' indicating a welcome for those in need, not primarily skilled laborers."}, {"text": "America positioned itself as a sanctuary offering freedom and opportunity to the world's dispossessed.", "isCorrect": true, "rationale": "The lines express America's open embrace of those who are oppressed, poor, and yearning for freedom, positioning it as a haven or 'Mother of Exiles.'"}, {"text": "America acknowledged its responsibility to reform the social injustices prevalent in European societies.", "isCorrect": false, "rationale": "The poem focuses on accepting people into America, not on reforming their countries of origin."}, {"text": "America intended to send humanitarian aid to overcrowded foreign nations rather than accepting their populations.", "isCorrect": false, "rationale": "The poem is an explicit invitation for people to come to America ('Send these...to me'), not a plan for foreign aid."}], "id": "q02"}, {"question": "Jacob Riis's 'How the Other Half Lives' describes 'three-fourths of its people live in the tenements' and 'more than twelve hundred thousand persons call them home' in New York. How does this detail contribute to understanding the 'new century' theme of 'Immigration, Industry, and Hope'?", "options": [{"text": "It highlights the success of industrial expansion in providing ample housing for all new arrivals.", "isCorrect": false, "rationale": "The description of tenements as 'despair' and 'dark enough to send a chill to any heart' contradicts the idea of successful housing provision."}, {"text": "It exemplifies the dire social consequences of rapid urbanization and immigration without adequate infrastructure.", "isCorrect": true, "rationale": "Riis's account vividly shows the overcrowding and poor conditions in tenements, which were a direct result of the rapid influx of people (immigration) into cities during an era of industrial growth, highlighting the challenges rather than uniform hope."}, {"text": "It demonstrates the harmonious integration of diverse populations into existing housing structures.", "isCorrect": false, "rationale": "The text describes overcrowding and despair, not harmonious integration."}, {"text": "It suggests that hope was abundant as immigrants quickly found comfortable and spacious homes.", "isCorrect": false, "rationale": "Riis's work paints a picture of harsh reality and 'despair,' directly refuting the idea of comfort and spaciousness."}], "id": "q03"}, {"question": "According to 'The Call of the Wild' excerpt, what was the primary reason for the increased demand for 'heavy dogs, with strong muscles... and furry coats' that led to Buck's abduction?", "options": [{"text": "A sudden increase in competitive dog sled races across the country.", "isCorrect": false, "rationale": "The text does not mention dog sled races but focuses on the practical need for dogs in the Northland."}, {"text": "The booming popularity of dog breeding as a leisure activity among the wealthy.", "isCorrect": false, "rationale": "The reason given is for toil and protection from frost, not for leisure or breeding."}, {"text": "The discovery of 'yellow metal' (gold) in the Arctic darkness, driving men to the Northland.", "isCorrect": true, "rationale": "The passage explicitly states, 'Because men, groping in the Arctic darkness, had found a yellow metal...thousands of men were rushing into the Northland. These men wanted dogs...to toil.'"}, {"text": "A new government initiative requiring all northern settlements to use dog teams for mail delivery.", "isCorrect": false, "rationale": "The text attributes the demand to the Gold Rush, not a government mail delivery initiative."}], "id": "q04"}, {"question": "Jack London describes Buck's original home at Judge Miller's place as having 'great stables,' 'vine-clad servants' cottages,' 'endless and orderly array of outhouses,' and areas for swimming, hunting, and relaxing. What is the most likely purpose of this detailed description?", "options": [{"text": "To illustrate the luxury and comfort Buck is abruptly taken from, emphasizing the harshness of his new reality.", "isCorrect": true, "rationale": "The detailed description of Buck's idyllic life creates a stark contrast with the brutal conditions he is about to face in the Klondike, heightening the impact of his forced change."}, {"text": "To suggest that Judge Miller's estate was a symbol of the decline of the American aristocracy.", "isCorrect": false, "rationale": "The description focuses on Buck's comfortable life, not on the decline of the aristocracy."}, {"text": "To foreshadow Buck's future role as a leader among other dogs in a structured environment.", "isCorrect": false, "rationale": "While Buck does become a leader, the description of his home life primarily serves as a baseline for his transformation, not a direct foreshadowing of his future role among other dogs."}, {"text": "To provide historical context about typical Californian ranch sizes during the late 19th century.", "isCorrect": false, "rationale": "While it offers some context, the primary literary purpose within the narrative is to establish Buck's background for dramatic contrast, not just historical detail."}], "id": "q05"}, {"question": "Alfred, Lord Tennyson wrote 'The Charge of the Light Brigade' within minutes of reading about the disaster in a newspaper. The poem emphasizes the soldiers' courage despite a 'blunder'd' order. How does this immediate reaction and focus connect with the 'didyouknow' section about the Crimean War?", "options": [{"text": "It shows Tennyson's support for the officers who gave the mistaken order.", "isCorrect": false, "rationale": "The 'didyouknow' section states 'there was outrage at the officers who had given the mistaken order,' which contradicts Tennyson supporting them. His poem focuses on the soldiers' bravery, not the officers' judgment."}, {"text": "It exemplifies how contemporary media (newspapers) shaped public perception and artistic responses to wartime events.", "isCorrect": true, "rationale": "The 'didyouknow' section highlights that the Crimean War was 'one of the first wars to be covered by newspaper reporters' and Tennyson wrote his poem 'within minutes of reading the news,' demonstrating the direct influence of media on public and artistic reactions."}, {"text": "It highlights the widespread public demand for military reforms and accountability that followed the charge.", "isCorrect": false, "rationale": "While there was public outrage, Tennyson's poem focuses on honoring the soldiers' courage, not directly on demanding reforms or accountability."}, {"text": "It suggests that Tennyson was solely interested in reporting facts rather than expressing emotion or opinion.", "isCorrect": false, "rationale": "Tennyson's poem is clearly an emotional tribute and expression of admiration for courage, not a dry factual report."}], "id": "q06"}, {"question": "What central theme does Alfred, Lord Tennyson primarily intend to convey through 'The Charge of the Light Brigade'?", "options": [{"text": "The strategic brilliance of military commanders in wartime.", "isCorrect": false, "rationale": "The poem explicitly states 'Some one had blunder'd,' directly contradicting the idea of strategic brilliance."}, {"text": "The futility and senselessness of war in general.", "isCorrect": false, "rationale": "While the event was senseless, the poem's primary focus is on the *courage* of the soldiers within that senselessness, not a broad anti-war message."}, {"text": "The unwavering courage and obedience of soldiers in the face of certain death.", "isCorrect": true, "rationale": "The poem repeatedly emphasizes the soldiers' unwavering obedience ('Theirs not to make reply, / Theirs not to reason why, / Theirs but to do and die') and their immense bravery ('Boldly they rode and well') despite the mistaken order and heavy casualties."}, {"text": "The importance of questioning authority when orders are clearly mistaken.", "isCorrect": false, "rationale": "The poem praises the soldiers for *not* questioning authority, emphasizing their duty and obedience despite the blunder."}], "id": "q07"}, {"question": "Based on the 'beforeyouread' and 'readingcontext' for Langston Hughes, what overarching theme is central to his contribution to the Harlem Renaissance?", "options": [{"text": "Critiquing the economic disparities between rural and urban populations in America.", "isCorrect": false, "rationale": "While social issues might be present, the text emphasizes celebrating Black identity and heritage, not primarily rural-urban economic disparities."}, {"text": "Celebrating and dignifying the everyday lives, voices, and heritage of Black Americans.", "isCorrect": true, "rationale": "The text explicitly states Hughes 'believed that the everyday lives and voices of Black Americans deserved a place in great literature' and his poetry 'celebrates Black identity and American heritage with dignity and hope.'"}, {"text": "Advocating for the assimilation of African American culture into mainstream European traditions.", "isCorrect": false, "rationale": "The text suggests celebrating Black identity and heritage, implying distinction and pride, not necessarily assimilation into European traditions."}, {"text": "Documenting the struggles of immigrants from various backgrounds settling in New York City.", "isCorrect": false, "rationale": "Hughes's focus was specifically on African American life and identity, not the broader immigrant experience across all groups."}], "id": "q08"}, {"question": "Considering the 'OVERVIEW' of Chapter 16, which mentions 'seeing how the other half lived' and 'the words that greeted them,' which pair of authors most directly addresses the theme of the American immigrant experience, highlighting both its promise and its challenges?", "options": [{"text": "Alfred, Lord Tennyson and Jack London.", "isCorrect": false, "rationale": "Tennyson's poem is about a British military charge, and London's story is about a dog in the Gold Rush; neither directly addresses the American immigrant experience."}, {"text": "Emma Lazarus and Jacob Riis.", "isCorrect": true, "rationale": "Lazarus's 'The New Colossus' offers the welcoming 'words that greeted them,' embodying the promise. Riis's 'How the Other Half Lives' depicts 'how the other half lived' for many newcomers, showing the harsh reality and challenges faced by immigrants."}, {"text": "Jacob Riis and Langston Hughes.", "isCorrect": false, "rationale": "While Riis addresses immigrant challenges, Hughes's focus is on African American identity and heritage within the Harlem Renaissance, not the general immigrant experience at large."}, {"text": "Langston Hughes and Emma Lazarus.", "isCorrect": false, "rationale": "Lazarus addresses the immigrant welcome, but Hughes focuses on African American life, not the general immigrant experience, making this pair less direct for the specific 'promise and challenges' of new arrivals from other countries."}], "id": "q09"}, {"question": "The title of Chapter 16 is 'A NEW CENTURY: IMMIGRATION, INDUSTRY, AND HOPE.' Based on the provided sections, which statement best characterizes how these texts collectively illustrate the chapter's title?", "options": [{"text": "They exclusively focus on technological advancements in industry, ignoring social changes.", "isCorrect": false, "rationale": "The texts touch on social changes (tenements, Harlem Renaissance) and human experiences, not just technological advancements."}, {"text": "They showcase a period of significant demographic shifts (immigration), economic drivers (gold rush), and varying social realities (tenements, Harlem Renaissance) in shaping America.", "isCorrect": true, "rationale": "The texts cover immigration (Lazarus, Riis), the economic impact of industry/resource booms (Gold Rush in London's work), and the social landscape (Riis's tenements, Hughes's Harlem Renaissance), reflecting the multifaceted nature of the 'New Century' as promised by the title, including both challenges and expressions of hope."}, {"text": "They primarily detail the political structures and governmental policies of the early 1900s.", "isCorrect": false, "rationale": "While there are underlying social issues that might lead to policy, the texts primarily focus on individual experiences, social conditions, and cultural movements, not detailed political structures."}, {"text": "They present a uniformly optimistic view of American life, devoid of any challenges or societal problems.", "isCorrect": false, "rationale": "Riis's 'How the Other Half Lives' and Buck's abduction in 'Call of the Wild' clearly show challenges and hardships, indicating that the view is not uniformly optimistic."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
