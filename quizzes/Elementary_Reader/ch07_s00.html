    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">

        <a href="../../courses/Elementary_Reader.html">&larr; Back to The Open Page</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Open Page &mdash; Chapter 7</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the Preamble to the Constitution, what is the primary collective goal for \"We the People\" in establishing the Constitution?", "options": [{"text": "To ensure a powerful executive branch.", "isCorrect": false, "rationale": "While the Constitution establishes branches of government, the Preamble's purpose is broader than focusing on a single branch. Its goals are collective for the entire nation."}, {"text": "To secure the Blessings of Liberty to ourselves and our Posterity.", "isCorrect": true, "rationale": "This option is a direct quote from the Preamble and encapsulates the ultimate aim of the new government to safeguard freedom for current and future generations."}, {"text": "To define the powers of the legislative branch.", "isCorrect": false, "rationale": "Similar to option A, this is a specific function of the Constitution's articles, not the overarching primary goal expressed in the Preamble."}, {"text": "To declare independence from foreign rule.", "isCorrect": false, "rationale": "The American Revolution had already achieved independence; the Constitution was written to establish how the new, independent nation's government would function."}], "id": "q01"}, {"question": "The \"didyouknow\" section highlights that the phrase \"We the People\" was chosen carefully. What core principle of American government does this phrase primarily convey?", "options": [{"text": "The importance of judicial review in governmental decisions.", "isCorrect": false, "rationale": "Judicial review is an important aspect of American government, but it is not what the phrase 'We the People' primarily signifies. That phrase addresses the source of governmental authority."}, {"text": "That governmental authority originates from the consent of the governed, not a monarch.", "isCorrect": true, "rationale": "The text explicitly states, \"The phrase 'We the People' was chosen carefully to show that the government's power comes from ordinary citizens, not from a king.\" This reflects the principle of popular sovereignty."}, {"text": "The necessity of a strong military for national defense.", "isCorrect": false, "rationale": "While national defense is one purpose of government mentioned in the Preamble, 'We the People' specifically refers to the source of governmental power, not its functions."}, {"text": "The exclusive power of the federal government over state governments.", "isCorrect": false, "rationale": "The phrase emphasizes the collective will of the citizenry as the source of power, rather than defining the specific balance of power between federal and state entities."}], "id": "q02"}, {"question": "George Washington's refusal of the title \"Your Majesty\" and his voluntary stepping down from power after two terms demonstrated what important characteristic for the new republic?", "options": [{"text": "His personal humility and preference for a simple life.", "isCorrect": false, "rationale": "While Washington possessed these qualities, the text emphasizes the broader impact of his actions as setting an example for the nation, not just reflecting personal traits."}, {"text": "A commitment to preventing tyranny and establishing civilian control over government.", "isCorrect": true, "rationale": "By refusing a royal title and voluntarily relinquishing power, Washington set a critical precedent against the accumulation of unlimited power, reinforcing the republican ideal of a government accountable to the people rather than an individual ruler."}, {"text": "His belief in a rotating executive branch with frequent changes in leadership.", "isCorrect": false, "rationale": "Washington served two full terms, which was a significant period. His actions established a precedent for term limits (later codified), but not necessarily 'frequent changes' in the sense of rapid rotation."}, {"text": "His desire to return to his farm and personal affairs.", "isCorrect": false, "rationale": "While this was a personal motivation, the text highlights the political significance of his action for the nation, stating it 'amazed the world' as an example of peaceful leadership."}], "id": "q03"}, {"question": "In her letter to John Adams, what was Abigail Adams' central plea regarding the new code of laws?", "options": [{"text": "That women should be allowed to own property independently.", "isCorrect": false, "rationale": "While women's property rights were part of broader demands for equality, Abigail Adams' letter focuses on a more encompassing plea for 'care and attention' and a limitation on 'unlimited power' of husbands, implying a wider range of legal and social rights."}, {"text": "That women should have equal voting rights as men.", "isCorrect": false, "rationale": "She mentions 'no voice or representation,' which implies the desire for political participation, but her plea is broader: 'remember the ladies and be more generous and favorable to them than your ancestors.'"}, {"text": "That the new laws should be more generous and favorable to women, limiting husbands' unlimited power.", "isCorrect": true, "rationale": "Abigail Adams explicitly states, 'I desire you would remember the ladies and be more generous and favorable to them than your ancestors. Do not put such unlimited power into the hands of the husbands.' This directly captures her central plea."}, {"text": "That women should be included in the Continental Congress.", "isCorrect": false, "rationale": "This is a specific form of representation, but her request is more general for better treatment and consideration in lawmaking, rather than a direct demand for congressional seats."}], "id": "q04"}, {"question": "John Adams' playful response to Abigail's letter, mentioning \"another tribe, more numerous and powerful than all the rest,\" suggests his awareness of what underlying social reality at the time?", "options": [{"text": "The widespread support for women's suffrage among the Founding Fathers.", "isCorrect": false, "rationale": "John Adams' response is dismissive ('I cannot but laugh'), indicating a lack of support for such a progressive idea among the founders, not widespread acceptance."}, {"text": "The growing discontent among various marginalized groups in the new nation.", "isCorrect": true, "rationale": "Adams lists children, apprentices, Indians, and Negroes as groups whose 'bands of Government' had been loosened by the struggle for independence, before jokingly adding women as 'another tribe,' showing an awareness of a broader loosening of social hierarchies and demands for rights."}, {"text": "The immediate threat of a women's rebellion throughout the colonies.", "isCorrect": false, "rationale": "While Abigail threatens rebellion, John's response indicates he found the idea amusing, not an immediate or serious threat to the government's stability."}, {"text": "The legal equality already afforded to women in Massachusetts.", "isCorrect": false, "rationale": "Abigail's letter itself is a plea for *more* favorable treatment, which implies that legal equality for women was not yet a reality."}], "id": "q05"}, {"question": "What specific historical event inspired Francis Scott Key to write \"The Star-Spangled Banner\"?", "options": [{"text": "The Battle of Bunker Hill during the Revolutionary War.", "isCorrect": false, "rationale": "The Battle of Bunker Hill was a significant event in the Revolutionary War, but it occurred decades before the War of 1812, which is the context for Key's poem."}, {"text": "The signing of the Declaration of Independence.", "isCorrect": false, "rationale": "The Declaration of Independence was signed in 1776, a distinct event unrelated to the inspiration for 'The Star-Spangled Banner.'"}, {"text": "The British bombardment of Fort McHenry during the War of 1812.", "isCorrect": true, "rationale": "The text clearly states that Francis Scott Key 'watched the battle from a ship in the harbor' during 'the War of 1812,' as the 'British navy bombarded Fort McHenry in Baltimore Harbor.'"}, {"text": "George Washington's victory at Yorktown.", "isCorrect": false, "rationale": "The victory at Yorktown concluded the Revolutionary War, predating the War of 1812 and Key's experience."}], "id": "q06"}, {"question": "In \"The Star-Spangled Banner,\" the continued visibility of the American flag after a night of bombardment primarily symbolizes what?", "options": [{"text": "The vast size of the flag sewn by Mary Pickersgill.", "isCorrect": false, "rationale": "While the flag's size is a fascinating detail, its primary symbolic meaning in the poem is not its physical dimensions but what its presence represents."}, {"text": "The artistic talent of Francis Scott Key.", "isCorrect": false, "rationale": "The flag's symbolism relates to the nation and the battle, not to Key's personal talents as a writer."}, {"text": "The resilience and enduring spirit of the American nation despite adversity.", "isCorrect": true, "rationale": "The flag's continued flying after a relentless attack ('proof through the night that our flag was still there') signifies the survival, strength, and indomitable spirit of the nation in the face of immense challenge."}, {"text": "The superior firepower of the American military.", "isCorrect": false, "rationale": "The poem describes the British bombardment and the Americans enduring it, not a display of superior American firepower during the specific event."}], "id": "q07"}, {"question": "What was described as \"the great error in Rip's composition\" in Washington Irving's story?", "options": [{"text": "His excessive devotion to his wife and farm duties.", "isCorrect": false, "rationale": "The text states Rip was a 'henpecked husband' and that 'as to doing family duty, and keeping his farm in order, he found it impossible,' which is the opposite of excessive devotion."}, {"text": "An insuperable aversion to all kinds of profitable labour.", "isCorrect": true, "rationale": "The text explicitly states: 'The great error in Rip's composition was an insuperable aversion to all kinds of profitable labour.'"}, {"text": "His tendency to stir up political rebellion.", "isCorrect": false, "rationale": "Rip is described as a 'simple, good-natured fellow' and his escapism is from his wife and farm, not from political engagement."}, {"text": "His inability to make friends with his neighbors.", "isCorrect": false, "rationale": "The text says he 'would never refuse to assist a neighbour' and was 'a foremost man at all country frolics,' indicating he was well-liked and helpful in certain contexts."}], "id": "q08"}, {"question": "The story of Rip Van Winkle, where he sleeps through the American Revolution, serves what primary literary purpose within the context of the \"New Nation\" chapter?", "options": [{"text": "To highlight the rapid technological advancements that occurred during the Revolution.", "isCorrect": false, "rationale": "The text doesn't emphasize technological advancements; rather, it focuses on the societal and political transformation Rip experiences."}, {"text": "To emphasize the profound and transformative changes the Revolution brought to American society.", "isCorrect": true, "rationale": "Rip's awakening to a completely changed nation (politically, socially, and even in terms of leadership) after a long slumber effectively illustrates the dramatic and comprehensive impact of the American Revolution."}, {"text": "To criticize Rip's laziness as unpatriotic.", "isCorrect": false, "rationale": "While Rip is lazy, the story's primary purpose is not a direct moral criticism of his patriotism but rather a humorous and allegorical way to show societal change."}, {"text": "To provide a historical account of a minor battle in the Catskill Mountains.", "isCorrect": false, "rationale": "The story is a fictional tale designed to entertain and explore themes, not a literal historical account of a specific battle."}], "id": "q09"}, {"question": "Considering the diverse perspectives presented in the provided texts (Constitution, Adams' letters, Star-Spangled Banner, Rip Van Winkle), what overarching theme about the \"New Nation\" is most consistently explored?", "options": [{"text": "The inevitable conflicts arising from state versus federal power.", "isCorrect": false, "rationale": "While this was an important issue, it is not consistently explored across all four distinct texts, with some focusing more on individual rights, national identity, or societal change."}, {"text": "The continuous struggle to define and realize the ideals of liberty and self-governance.", "isCorrect": true, "rationale": "This theme connects the Preamble's goals, Washington's leadership example, Abigail Adams' fight for women's rights, and Key's patriotic defense of national liberty. Rip Van Winkle, by waking to a 'new nation,' highlights the outcome of this struggle. All pieces address different facets of what it means to be a free and self-governing people."}, {"text": "The economic challenges faced by the early American republic.", "isCorrect": false, "rationale": "Economic challenges are not a central or consistently explored theme across these specific selections."}, {"text": "The importance of military strength for national security.", "isCorrect": false, "rationale": "While present in 'The Star-Spangled Banner,' this is not a dominant theme across all texts. Other texts focus on governance, rights, and societal evolution."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
