    };

</head>
<body>
<div class="quiz-container">

        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to Christopher Columbus's letter to Luis de Santangel, what was his primary impression of the islands he discovered?", "options": [{"text": "The islands were barren and unsuitable for human habitation.", "isCorrect": false, "rationale": "Columbus describes the island of Juanana (Cuba) as 'exceedingly fertile' with 'many ranges of hills and very lofty mountains' and 'full of trees of a thousand kinds,' indicating a rich and abundant landscape, not barren."}, {"text": "The inhabitants possessed advanced weaponry and military fortifications.", "isCorrect": false, "rationale": "Columbus explicitly states that the people 'have no iron or steel or weapons, nor are they fit to use them,' which contradicts the idea of advanced weaponry."}, {"text": "They were remarkably beautiful, fertile, and abundant in natural resources.", "isCorrect": true, "rationale": "Columbus praises the islands as 'most beautiful, of a thousand shapes,' 'exceedingly fertile,' and 'full of trees of a thousand kinds.' He also mentions 'mines of metals' and promises 'gold as they need, and spices, and cotton,' highlighting their natural abundance."}, {"text": "The people were hostile and unwilling to interact with his crew.", "isCorrect": false, "rationale": "Columbus describes the people as 'remarkably timid' and 'so generous with all that they possess,' which indicates a lack of hostility and a willingness to share, not unfriendliness."}]}, {"question": "Based on Christopher Columbus's account, which characteristic best describes the indigenous people he encountered?", "options": [{"text": "They were aggressive and constantly engaged in warfare.", "isCorrect": false, "rationale": "Columbus states they 'have no iron or steel or weapons' and are 'remarkably timid,' directly contradicting the idea of them being aggressive warriors."}, {"text": "They were highly suspicious of strangers and guarded their possessions.", "isCorrect": false, "rationale": "Columbus notes they are 'so generous with all that they possess that no one would believe it who has not seen it,' indicating open generosity rather than suspicion or possessiveness."}, {"text": "They were generous, timid, and believed Columbus's crew came from the heavens.", "isCorrect": true, "rationale": "Columbus writes that they are 'so generous,' 'remarkably timid,' and 'believe very firmly that I, with these ships and men, came from the heavens,' capturing his observations about their character and beliefs."}, {"text": "They had established complex trade networks with distant lands.", "isCorrect": false, "rationale": "The letter does not mention any complex trade networks. Columbus's focus is on the people's immediate interactions and resources."}]}, {"question": "According to William Bradford's account, what was a significant challenge the Pilgrims faced during their voyage on the Mayflower, and how was it addressed?", "options": [{"text": "They ran out of food and water, but found a trading post mid-ocean.", "isCorrect": false, "rationale": "Bradford's account focuses on structural damage to the ship and storms, not a lack of provisions or finding a mid-ocean trading post."}, {"text": "A main beam of the ship cracked, but it was repaired using an iron screw brought from Holland.", "isCorrect": true, "rationale": "Bradford explicitly states 'one of the main beams in the midships was bowed and cracked' and that 'there was a great iron screw the passengers brought out of Holland, which would raise the beam into his place,' detailing both the problem and its solution."}, {"text": "They were attacked by pirates, but successfully fended them off.", "isCorrect": false, "rationale": "The narrative describes natural perils of the sea—storms and ship damage—but makes no mention of encounters with pirates."}, {"text": "Many became ill with a deadly plague, but a native cure was found on board.", "isCorrect": false, "rationale": "While seasickness is mentioned, there is no mention of a deadly plague or a native cure on board. The primary health concern was seasickness and the risk of drowning, as with John Howland."}]}, {"question": "The incident where John Howland was thrown into the sea during a 'mighty tempest' but saved by grabbing the topsail halyards best illustrates which aspect of the Pilgrims' journey?", "options": [{"text": "The Pilgrims' superior nautical skills and advanced safety equipment.", "isCorrect": false, "rationale": "Howland's survival is attributed to 'God's pleasure' and his quick grasp of the halyards, not 'superior nautical skills' or 'advanced safety equipment.' It highlights the unpredictable dangers and a stroke of luck/providence."}, {"text": "The relatively calm and uneventful nature of their transatlantic crossing.", "isCorrect": false, "rationale": "The text describes 'many fierce storms,' 'shroudly shaken' ship, and a 'mighty tempest' that threw Howland overboard, directly contradicting the idea of a calm and uneventful journey."}, {"text": "The extreme perils of sea travel combined with a strong sense of divine providence.", "isCorrect": true, "rationale": "The 'mighty tempest' emphasizes the extreme danger ('sundry fathoms under water'), while the phrase 'it pleased God that he caught hold' clearly highlights the Pilgrims' belief in divine intervention and providence in their survival."}, {"text": "The disorganization and lack of discipline among the ship's crew.", "isCorrect": false, "rationale": "The text does not suggest disorganization or lack of discipline among the crew; rather, it describes a violent act of nature ('seel roll of the ship') and an accidental falling, not crew negligence."}]}, {"question": "How does the excerpt from Psalm 107:23-31, 'They that go down to the sea in ships...These see the works of the Lord, and his wonders in the deep,' primarily relate to the experiences described by Bradford and Smith?", "options": [{"text": "It underscores the profitability of sea voyages and trade routes.", "isCorrect": false, "rationale": "While 'do business in great waters' is mentioned, the Psalm's dominant theme in this excerpt is about the Lord's power over natural elements and human distress at sea, not primarily economic gain. Neither Bradford nor Smith's excerpts emphasize profit over survival in this context."}, {"text": "It highlights the awe-inspiring beauty and tranquility of the ocean.", "isCorrect": false, "rationale": "The Psalm describes 'stormy wind,' 'lifteth up the waves,' and sailors' 'soul is melted because of trouble,' portraying the sea as powerful and dangerous, not primarily tranquil or merely beautiful in this section."}, {"text": "It serves as a testament to humanity's triumph over the forces of nature through technological advancement.", "isCorrect": false, "rationale": "The Psalm emphasizes God's command over the storm and his deliverance, rather than human technological triumph. Bradford's account also attributes survival partly to God's will."}, {"text": "It reflects the profound dangers of sea travel and the belief in divine intervention for safe passage.", "isCorrect": true, "rationale": "The Psalm details the 'stormy wind,' 'high waves,' and sailors being 'at their wit's end' before 'he bringeth them out of their distresses,' perfectly mirroring the perils described by Bradford and the general reliance on God's protection for those who 'go down to the sea in ships.'"}]}, {"question": "What was Captain John Smith's initial reaction upon discovering the land in Virginia, as described in 'Arrival in Virginia'?", "options": [{"text": "He was indifferent, as it was similar to other lands he had seen.", "isCorrect": false, "rationale": "Smith's language, 'I was almost ravished at the first sight thereof' and 'Heaven and earth never agreed better to frame a place for man's habitation,' indicates strong positive emotion, not indifference."}, {"text": "He was deeply concerned about its barrenness and lack of resources.", "isCorrect": false, "rationale": "Smith explicitly states 'the land was neither desert nor barren' and describes plentiful trees, blossoms, and fresh waters, indicating abundance, not barrenness."}, {"text": "He was 'almost ravished' by its natural beauty and suitability for settlement.", "isCorrect": true, "rationale": "Smith's words 'I was almost ravished at the first sight thereof' and his comment that 'Heaven and earth never agreed better to frame a place for man's habitation' clearly convey his profound admiration for the land's beauty and potential for settlement."}, {"text": "He immediately sought out existing settlements to establish trade relations.", "isCorrect": false, "rationale": "His description focuses on the natural landscape itself and its inherent beauty and resources, not on immediate trade relations, though he later did trade with the Powhatan people."}]}, {"question": "The 'didyouknow' section about Jamestown states that 'of the 104 colonists who landed, only 38 survived the first year.' Which of the following best explains this high mortality rate?", "options": [{"text": "Frequent natural disasters like hurricanes and tsunamis.", "isCorrect": false, "rationale": "While weather was a factor in other voyages, the text attributes Jamestown's high mortality to 'disease, starvation, and conflict' with the Powhatan people, not primarily natural disasters like hurricanes or tsunamis."}, {"text": "A lack of motivation among the colonists to work and build the settlement.", "isCorrect": false, "rationale": "While Captain John Smith's rule 'He that will not work shall not eat' suggests a need to enforce work, the text primarily cites 'disease, starvation, and conflict' as the causes of death, implying external challenges were more direct causes of mortality than a general lack of motivation."}, {"text": "Disease, starvation, and conflict with the indigenous Powhatan people.", "isCorrect": true, "rationale": "The text explicitly states: 'Many perished from disease, starvation, and conflict' and notes 'Captain John Smith helped keep the colony alive by organizing work and trading with the Powhatan people for food,' directly supporting this answer."}, {"text": "The colonists' deliberate decision to abandon the settlement after a few months.", "isCorrect": false, "rationale": "The text states Jamestown was 'the first permanent English settlement in America' and that Smith 'helped keep the colony alive,' indicating the intent to stay and the struggle for survival, not abandonment."}]}, {"question": "Compare the initial stated motivations for the voyages of Christopher Columbus and the Pilgrims. What is the fundamental difference?", "options": [{"text": "Columbus sought a route to Asia for trade and discovery; the Pilgrims sought new agricultural lands.", "isCorrect": false, "rationale": "While Columbus sought Asia for trade, the Pilgrims' primary motivation was not just agricultural land, but religious freedom. Columbus's 'Letter to Luis de Santangel' focuses on discovery and resources, not specifically new agricultural lands for settlement."}, {"text": "Columbus aimed for territorial expansion and military conquest; the Pilgrims desired peaceful coexistence with indigenous populations.", "isCorrect": false, "rationale": "Columbus's letter indicates taking possession of lands and promising resources, but 'military conquest' is too strong for his stated purpose. The Pilgrims' primary aim was religious freedom, and while they sought peaceful settlement, their initial stated motivation was not primarily about indigenous relations."}, {"text": "Columbus hoped to find a new route to Asia and claim lands for Spain; the Pilgrims sought freedom to worship God.", "isCorrect": true, "rationale": "The 'before you read' for Columbus states he 'sailed west from Spain, hoping to reach Asia. Instead, he found lands... I took possession of them all for their Highnesses.' The 'before you read' for the Pilgrims states they 'sailed to America in 1620 seeking freedom to worship God as they believed right.' This directly contrasts their core motivations."}, {"text": "Both Columbus and the Pilgrims were primarily driven by scientific curiosity and a desire to map uncharted territories.", "isCorrect": false, "rationale": "While discovery was a component, Columbus's letter focuses on 'success' and 'value' for the King and Queen. The Pilgrims' motivation was religious. Neither text presents scientific curiosity as their *primary* driver."}]}, {"question": "Based on the glossary, if a ship needed 'salvage' after a 'tempest,' what would have likely occurred?", "options": [{"text": "The ship encountered a period of calm weather and needed minor repairs to its sails.", "isCorrect": false, "rationale": "A 'tempest' is a 'violent storm with strong winds,' not calm weather. 'Salvage' is to 'rescue property from destruction,' implying significant damage, not minor repairs."}, {"text": "The ship suffered damage in a violent storm and needed to have property rescued from destruction.", "isCorrect": true, "rationale": "A 'tempest' is a 'violent storm with strong winds,' and 'salvage' means 'to rescue property from destruction' or 'anything saved from a wreck.' This perfectly describes a scenario where a ship caught in a severe storm would be damaged and need items rescued."}, {"text": "The ship entered a safe harbor and required more 'provision' for its long 'voyage.'", "isCorrect": false, "rationale": "A 'tempest' is a storm, not a safe harbor. 'Provision' means 'supplies of food and other necessities,' which is unrelated to 'salvage' after a storm, though they are both maritime terms."}, {"text": "The ship was involved in a peaceful exchange of goods with another vessel.", "isCorrect": false, "rationale": "Neither 'salvage' nor 'tempest' implies a peaceful exchange. A 'tempest' is a violent event, and 'salvage' implies rescue from destruction."}]}, {"question": "Which statement best synthesizes the descriptions of the New World by Columbus and Smith, concerning its natural attributes?", "options": [{"text": "Both primarily noted the arid, desert-like conditions that made settlement challenging.", "isCorrect": false, "rationale": "Columbus describes 'exceedingly fertile' land and Smith notes the land 'was neither desert nor barren,' directly contradicting this statement."}, {"text": "Both marveled at the immense natural beauty, fertility, and abundant resources of the land.", "isCorrect": true, "rationale": "Columbus describes 'exceedingly fertile' land, 'many ranges of hills and very lofty mountains,' and 'mines of metals.' Smith similarly says 'the land was neither desert nor barren,' 'full of sweet-smelling blossoms,' and that he was 'almost ravished' by its beauty, concluding 'Heaven and earth never agreed better to frame a place for man's habitation.' Both clearly emphasize beauty, fertility, and resources."}, {"text": "Both were primarily impressed by the advanced infrastructure built by the indigenous populations.", "isCorrect": false, "rationale": "Neither Columbus nor Smith focuses on 'advanced infrastructure.' Columbus mentions 'population... without number' but details natural features, and Smith describes the natural landscape."}, {"text": "Both expressed concern over the scarcity of fresh water and timber for building.", "isCorrect": false, "rationale": "Columbus mentions 'many wide rivers,' and Smith notes 'fresh waters running through the woods' and 'goodly tall trees,' indicating an abundance of both, not scarcity."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
