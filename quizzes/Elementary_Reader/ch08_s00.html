        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">

        <a href="../../courses/Elementary_Reader.html">&larr; Back to The Open Page</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">The Open Page &mdash; Chapter 8</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What was the primary objective of the expedition led by Meriwether Lewis and William Clark, as stated in the text?", "options": [{"text": "To establish trade routes with Spanish colonies.", "isCorrect": false, "rationale": "The text does not mention establishing trade routes with Spanish colonies as the primary objective. Their mission was to explore the territory."}, {"text": "To explore the vast territory west of the Mississippi River.", "isCorrect": true, "rationale": "The 'beforeyouread' section for Lewis and Clark clearly states: 'President Thomas Jefferson sent Meriwether Lewis and William Clark on an expedition to explore the vast territory west of the Mississippi River.'"}, {"text": "To map the entire continent for future settlement.", "isCorrect": false, "rationale": "While mapping was part of their work, the primary objective given was to 'explore the vast territory west of the Mississippi River,' not necessarily the entire continent or specifically for settlement."}, {"text": "To search for gold and other valuable resources.", "isCorrect": false, "rationale": "The text does not indicate that searching for gold or valuable resources was the primary purpose of the Lewis and Clark expedition."}], "id": "q01"}, {"question": "Meriwether Lewis's immediate reaction upon first seeing the Rocky Mountains (May 26, 1805 entry) best illustrates which complex aspect of frontier exploration?", "options": [{"text": "The overwhelming sense of fear experienced by explorers facing the unknown.", "isCorrect": false, "rationale": "Lewis initially felt 'secret pleasure' upon seeing the mountains, not an overwhelming sense of fear."}, {"text": "His certainty that the journey ahead would be a 'good comfortable road' as he consistently believed.", "isCorrect": false, "rationale": "Lewis explicitly states he 'will believe it a good comfortable road until I am compelled to believe differently,' indicating a deliberate choice to be optimistic, not a consistent certainty that ignored potential difficulties."}, {"text": "The duality of excitement for discovery tempered by anticipation of severe hardships.", "isCorrect": true, "rationale": "Lewis describes feeling 'secret pleasure' at seeing the mountains, but immediately reflects 'on the difficulties which this snowy barrier would most probably throw in my way,' which 'counterbalanced the joy,' showing both excitement and apprehension."}, {"text": "The frustration of encountering natural barriers that halted further progress westward.", "isCorrect": false, "rationale": "Lewis did not halt progress; he simply reflected on the future difficulties of crossing the mountains, expressing both joy and concern."}], "id": "q02"}, {"question": "The text suggests that Sacagawea's role as interpreter and guide was crucial beyond just translation. How did her presence, particularly with her infant son, aid the expedition?", "options": [{"text": "Her knowledge of medicinal plants helped the party overcome illnesses.", "isCorrect": false, "rationale": "While Sacagawea likely had such knowledge, the text specifically highlights a different impact: signaling peace to Native peoples."}, {"text": "It signaled to Native American tribes that the expedition was peaceful rather than a war party.", "isCorrect": true, "rationale": "The 'didyouknow' section states: 'Her presence, along with her infant son, helped signal to the Native peoples they met that the group came in peace, since a war party would not travel with a mother and baby.'"}, {"text": "She could physically carry more supplies, increasing the expedition's efficiency.", "isCorrect": false, "rationale": "The text does not mention Sacagawea's ability to carry supplies as a specific benefit of her presence."}, {"text": "She was an expert hunter, providing essential food for the large group.", "isCorrect": false, "rationale": "The text does not mention Sacagawea's hunting skills as a primary contribution to the expedition's success."}], "id": "q03"}, {"question": "According to Francis Parkman's account, what was the typical starting point and ultimate destination region for the emigrants on the Oregon Trail in the 1840s?", "options": [{"text": "From Santa Fé to California.", "isCorrect": false, "rationale": "The text mentions traders preparing for Santa Fé, but the Oregon Trail was for emigrants heading to the Pacific Northwest from Missouri."}, {"text": "From the Appalachian Mountains to the Mississippi River.", "isCorrect": false, "rationale": "This describes an earlier phase of westward movement, not the specific Oregon Trail described, which started west of the Mississippi."}, {"text": "From St. Louis, Missouri, to the Pacific Northwest.", "isCorrect": true, "rationale": "The 'beforeyouread' section states the Oregon Trail was a 'two-thousand-mile route from Missouri to the Pacific Northwest,' and Parkman's journey explicitly began from St. Louis."}, {"text": "From Illinois to Pike County.", "isCorrect": false, "rationale": "Illinois is mentioned as the origin of one specific wagon train, and Pike County is a fictional reference in 'Sweet Betsy from Pike,' not the general starting point or destination."}], "id": "q04"}, {"question": "Parkman's description of St. Louis in the spring of 1846, noting crowded hotels, busy gunsmiths, and steamboats 'crowded with passengers,' best indicates what about the westward movement?", "options": [{"text": "St. Louis was primarily a tourist destination for wealthy Easterners.", "isCorrect": false, "rationale": "The text specifies that 'emigrants' and 'traders' were preparing for journeys, not tourists seeking leisure in St. Louis."}, {"text": "The city was experiencing an economic boom due to unrelated industrial growth.", "isCorrect": false, "rationale": "The economic activity described is directly linked to preparations for westward travel (outfits, provisions, emigrants), not unrelated industrial growth."}, {"text": "Westward expansion was a widespread and highly active national phenomenon at the time.", "isCorrect": true, "rationale": "The widespread activity ('emigrants from every part of the country,' 'unusual number of traders,' 'almost every day steamboats were leaving... crowded with passengers') strongly suggests a vigorous national movement."}, {"text": "Most people were traveling to St. Louis to settle there permanently.", "isCorrect": false, "rationale": "The passengers and emigrants in St. Louis were 'preparing for the journey to Oregon and California' or Santa Fé, indicating St. Louis was a staging point, not their final destination."}], "id": "q05"}, {"question": "Considering the challenges faced by both Lewis's expedition (Rocky Mountains) and Parkman's journey (mule incident, muddy gully), which of the following represents a recurring significant obstacle for early American westward travelers?", "options": [{"text": "Conflicts with rival European powers over land claims.", "isCorrect": false, "rationale": "While historically relevant to the era, neither the Lewis and Clark entries nor Parkman's excerpt specifically highlight conflicts with European powers as a personal, recurring obstacle to their travel."}, {"text": "The harsh and unpredictable nature of the wilderness environment.", "isCorrect": true, "rationale": "Lewis's concern about the 'snowy barrier' of the Rocky Mountains and Parkman's initial struggles with a 'deep muddy gully' directly illustrate the persistent and unpredictable difficulties posed by the natural environment."}, {"text": "Lack of reliable maps and navigational tools.", "isCorrect": false, "rationale": "While navigation was challenging, the specific excerpts provided emphasize physical environmental obstacles (mountains, mud) rather than a direct lack of maps."}, {"text": "Shortages of skilled labor for wagon repairs.", "isCorrect": false, "rationale": "This is a specific logistical concern that is not broadly emphasized across both narratives as a primary, recurring obstacle, unlike the natural environment itself."}], "id": "q06"}, {"question": "How were traditional frontier folk songs primarily transmitted and preserved among pioneers, as described in the text?", "options": [{"text": "They were formally published in songbooks and distributed along the trails.", "isCorrect": false, "rationale": "The 'didyouknow' section explicitly states that folk songs 'were rarely written down' and 'instead were learned by listening.'"}, {"text": "Singers meticulously wrote them down in personal journals to ensure accuracy.", "isCorrect": false, "rationale": "The text notes that 'words sometimes changed from singer to singer' because they were not typically written down, indicating a lack of meticulous preservation through writing."}, {"text": "They were learned by listening and passed from person to person by word of mouth.", "isCorrect": true, "rationale": "The 'beforeyouread' section states that 'Folk songs like these were passed from person to person by word of mouth,' and the 'didyouknow' section adds they 'were learned by listening.'"}, {"text": "Professional musicians traveled the trails to teach new songs to settlers.", "isCorrect": false, "rationale": "The text describes an informal transmission process ('by word of mouth'), not a professional teaching structure."}], "id": "q07"}, {"question": "Compare 'Home on the Range' and 'Sweet Betsy from Pike.' What do these two songs collectively reveal about the pioneers' perceptions and experiences of the American West?", "options": [{"text": "Both songs primarily focus on the economic opportunities of the gold rush.", "isCorrect": false, "rationale": "'Home on the Range' focuses on natural beauty, and 'Sweet Betsy from Pike' on hardships; neither's primary focus is the gold rush, though 'panned out our pile' in Betsy refers to a desire for wealth."}, {"text": "They both served as cautionary tales to discourage further westward migration.", "isCorrect": false, "rationale": "'Home on the Range' celebrates the West, and 'Sweet Betsy from Pike' uses humor to cope with hardships, rather than explicitly discouraging migration."}, {"text": "'Home on the Range' depicts the idealized beauty of the West, while 'Sweet Betsy from Pike' highlights the humorous struggles and hardships.", "isCorrect": true, "rationale": "The 'beforeyouread' section for the songs states: 'These two songs show different sides of frontier life—one celebrates the beauty of the open West, while the other tells a humorous tale of the hardships along the way.'"}, {"text": "Both emphasize the importance of community and cooperation among travelers.", "isCorrect": false, "rationale": "While community was important, the specific themes of these two songs as described in the text are natural beauty and personal hardships, respectively."}], "id": "q08"}, {"question": "A group of pioneers on the Oregon Trail is facing a particularly difficult stretch, dealing with bad weather and dwindling supplies, leading to low morale. Based on the 'Songs on the Trail' context, which type of folk song would likely be most effective in lifting their spirits?", "options": [{"text": "A somber ballad reflecting on the dangers of the journey.", "isCorrect": false, "rationale": "A somber ballad would likely worsen, not lift, spirits during a difficult time."}, {"text": "A humorous song that pokes fun at the hardships they are experiencing.", "isCorrect": true, "rationale": "The 'readingcontext' for 'Songs on the Trail' explicitly states: 'Many trail songs were humorous, poking fun at the hardships of the journey, because laughter helped the travelers keep their spirits up.'"}, {"text": "A song celebrating the comforts of the cities back East.", "isCorrect": false, "rationale": "Such a song might make pioneers feel more nostalgic or regretful, potentially lowering morale further."}, {"text": "An intricate, complex song requiring professional musical skill.", "isCorrect": false, "rationale": "The effectiveness of the song in this context is about its thematic content and emotional impact, not its musical complexity. Folk songs were generally simple and accessible."}], "id": "q09"}, {"question": "The cumulative experiences described in the Lewis and Clark journals, Francis Parkman's 'The Oregon Trail,' and the frontier folk songs collectively portray westward expansion as a journey characterized by what central dynamic?", "options": [{"text": "A consistently smooth and well-planned progression due to federal support.", "isCorrect": false, "rationale": "The texts frequently highlight unexpected difficulties (Rocky Mountains, muddy gully, Betsy giving out), contradicting a consistently smooth progression."}, {"text": "A solely perilous and discouraging endeavor that few ultimately completed successfully.", "isCorrect": false, "rationale": "While perilous, the texts also mention 'secret pleasure,' 'beauty of the open West,' and the continuous flow of emigrants, suggesting a balance of challenge and appeal, not solely discouragement."}, {"text": "The pursuit of vast new opportunities and breathtaking landscapes, despite significant and often humorous challenges.", "isCorrect": true, "rationale": "Lewis finds 'secret pleasure' in the Rockies and the 'sublimely grand spectacle' of the falls, 'Home on the Range' celebrates beauty, while both Lewis and Parkman describe immense difficulties, and 'Sweet Betsy from Pike' uses humor to cope with these challenges. This option captures the dual nature effectively."}, {"text": "A rapid decline in American national identity as people left established communities.", "isCorrect": false, "rationale": "The texts do not suggest a decline in national identity; rather, they describe the formation of new experiences and a 'great western movement' integral to the nation's expansion."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
