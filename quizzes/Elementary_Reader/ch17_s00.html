    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "In 'The Glorious Whitewasher,' how does Tom's initial reaction to the fence contrast with his later 'magnificent inspiration'?", "options": [{"text": "He sees the whitewashing as a fun challenge, but then realizes it's boring and tries to avoid it.", "isCorrect": false, "rationale": "Tom's initial reaction is one of deep melancholy and discouragement, not fun. His inspiration comes from this negative starting point."}, {"text": "He initially views the whitewashing as a burdensome, endless chore, which then sparks his clever idea to make others perceive it as a privilege.", "isCorrect": true, "rationale": "The text explicitly states Tom's initial despair, viewing the fence as a 'continent of unwhitewashed fence.' His 'magnificent inspiration' is the turning of this dreaded work into an envied activity, demonstrating his cleverness."}, {"text": "He is happy to have a day off, but then his aunt punishes him with the chore.", "isCorrect": false, "rationale": "Tom is punished with the chore on a Saturday morning, which he initially perceives as a burden, not a day off."}, {"text": "He wants to help Jim with his water chore, but Jim refuses his offer of assistance.", "isCorrect": false, "rationale": "Tom offers to fetch water *if* Jim will whitewash, meaning he is trying to offload his own chore onto Jim, not genuinely help Jim with his task."}], "id": "q01"}, {"question": "Why does Jim firmly refuse Tom's offer to fetch water in exchange for whitewashing?", "options": [{"text": "Jim is too busy enjoying his singing and playing to consider Tom's proposition.", "isCorrect": false, "rationale": "While Jim is singing, his refusal is driven by a more serious concern than simply being too occupied with play."}, {"text": "Jim knows that Aunt Polly anticipates Tom's trickery and has specifically warned him not to engage in such deals.", "isCorrect": true, "rationale": "Jim directly states, 'Ole missis, she tole me I got to go an’ git dis water an’ not stop foolin’ roun’ wid anybody. She say she spec’ Mars Tom gwine to ax me to whitewash, an’ so she tole me go ’long an’ ’tend to my own business.' This shows Aunt Polly's foresight and Jim's fear of her punishment."}, {"text": "Jim genuinely enjoys fetching water from the town pump more than whitewashing.", "isCorrect": false, "rationale": "The text indicates fetching water was 'hateful work in Tom’s eyes, before, but now it did not strike him so.' It doesn't suggest Jim enjoys it, but rather that Tom's perception changed in comparison to whitewashing."}, {"text": "Jim fears Tom will be gone for too long with the water bucket, leading to more trouble from Aunt Polly.", "isCorrect": false, "rationale": "Jim's fear is directly related to Aunt Polly's specific instructions about Tom's anticipated attempt to avoid his chore, not about the duration of Tom's absence with the bucket."}], "id": "q02"}, {"question": "The 'Did you know' section about Mark Twain highlights his use of distinct dialects. What does this literary choice primarily reveal about Twain's purpose as a writer?", "options": [{"text": "He aimed to make his stories more challenging for readers, ensuring only those familiar with local speech could fully appreciate them.", "isCorrect": false, "rationale": "Twain's purpose was to create realism and authenticity, not to deliberately obscure meaning or limit his audience."}, {"text": "He believed in recording the authentic sounds of American speech to provide honest and realistic portrayals of his characters and their cultural contexts.", "isCorrect": true, "rationale": "The text states Twain 'believed that honest writing meant recording the actual sounds of American speech—not polishing them into formal English,' emphasizing his commitment to realism and authenticity through dialect."}, {"text": "He used dialect primarily to mock the speech patterns of certain social groups, adding a comedic element to his narratives.", "isCorrect": false, "rationale": "While Twain was a humorist, the 'Did you know' section stresses 'honest writing' and 'recording the actual sounds,' indicating a purpose beyond mere mockery."}, {"text": "He was experimenting with different languages to see which ones would be most popular with his diverse audience.", "isCorrect": false, "rationale": "Twain focused on different *dialects* of American English, not different languages, and his motivation was authenticity rather than popularity testing."}], "id": "q03"}, {"question": "According to Mark Twain's memoir 'Life on the Mississippi,' what was the 'one permanent ambition' shared by the boys in his village?", "options": [{"text": "To become famous circus clowns and travel the country.", "isCorrect": false, "rationale": "Becoming clowns was a 'transient ambition' that faded, not a permanent one."}, {"text": "To explore the wilderness beyond Cardiff Hill and discover new frontiers.", "isCorrect": false, "rationale": "While exploration might appeal to boys, the text specifically identifies a different 'permanent ambition' tied to the river."}, {"text": "To work as a steamboatman on the majestic Mississippi River.", "isCorrect": true, "rationale": "The memoir clearly states, 'When I was a boy, there was but one permanent ambition among my comrades in our village on the west bank of the Mississippi River. That was, to be a steamboatman.'"}, {"text": "To live a quiet, drowsy life in their peaceful town, away from adventure.", "isCorrect": false, "rationale": "The boys were energized and excited by the steamboat arrivals, indicating a desire for adventure and dynamism, not a sleepy life."}], "id": "q04"}, {"question": "How does Twain effectively portray the transformative power of a steamboat's arrival on his seemingly quiet hometown in 'Life on the Mississippi'?", "options": [{"text": "By contrasting the town's initial excitement with the captain's calm and imposing demeanor.", "isCorrect": false, "rationale": "While the captain's demeanor is mentioned, the primary focus for showing transformation is on the town itself, not a direct contrast with the captain's mood."}, {"text": "By describing the quiet, 'drowsing' town instantly becoming 'alive and moving' as every house and store pours out its inhabitants.", "isCorrect": true, "rationale": "Twain masterfully contrasts the 'white town drowsing in the sunshine' with the instant cry 'S-t-e-a-m-boat a-comin'!' after which 'the dead town is alive and moving.' This stark before-and-after imagery highlights the profound transformation."}, {"text": "By detailing the specific goods and passengers the steamboat brought to the town, affecting its commerce.", "isCorrect": false, "rationale": "The text focuses on the *social* transformation and excitement, not on the economic details of the cargo or passengers."}, {"text": "By emphasizing the boys' changing ambitions from aspiring cabin-boy to conspicuous deckhand.", "isCorrect": false, "rationale": "This describes Twain's personal progression of ambition, not the overall transformation of the town due to the steamboat's arrival."}], "id": "q05"}, {"question": "The 'Did you know' section explains that Mark Twain's pen name is not his real name. From what specific professional context is the term 'Mark Twain' derived?", "options": [{"text": "Mining, referring to a marker indicating a significant ore vein.", "isCorrect": false, "rationale": "Twain worked as a miner, but his pen name's origin is tied to a different profession."}, {"text": "Journalism, signifying a reporter's byline after achieving a certain number of published articles.", "isCorrect": false, "rationale": "Twain was a journalist, but this is not the origin of his pen name."}, {"text": "Riverboat piloting, indicating a safe water depth of two fathoms (twelve feet).", "isCorrect": true, "rationale": "The text explicitly states: '“Mark twain” was a river term used by steamboat crews measuring the depth of the water. It means “two fathoms” (twelve feet), the minimum depth safe for a steamboat.'"}, {"text": "Printing, meaning a measurement for setting a specific number of lines of text.", "isCorrect": false, "rationale": "Twain worked as a printer, but this is not the source of his pen name."}], "id": "q06"}, {"question": "In Robert Frost's 'Stopping by Woods on a Snowy Evening,' the speaker concludes with the lines: 'But I have promises to keep, / And miles to go before I sleep, / And miles to go before I sleep.' What do these lines most powerfully suggest beyond their literal meaning?", "options": [{"text": "The speaker has a long journey home and needs to rest soon because they are tired.", "isCorrect": false, "rationale": "While a literal interpretation, the poem's context of reflection suggests a deeper, more symbolic meaning beyond simple physical exhaustion or a short trip home."}, {"text": "The speaker feels the pull of immediate responsibilities and the ultimate journey towards the end of life or a final, profound rest.", "isCorrect": true, "rationale": "The 'promises to keep' represent duties and obligations in life, while 'miles to go before I sleep' symbolizes the remaining span of life or the journey towards death, contrasting with the tempting allure of the peaceful woods (rest/escape)."}, {"text": "The speaker regrets stopping to admire the woods and wishes to continue traveling without delay.", "isCorrect": false, "rationale": "The description 'The woods are lovely, dark and deep' indicates appreciation, not regret for stopping. The choice is between appreciation/rest and duty/life's journey."}, {"text": "The speaker is concerned about arriving late for an important appointment and must rush.", "isCorrect": false, "rationale": "This interpretation is too specific and lacks the broader, existential weight suggested by the poem's reflective tone and themes of time and endings."}], "id": "q07"}, {"question": "Which statement best captures the central theme of Robert Frost's concise poem, 'Nothing Gold Can Stay'?", "options": [{"text": "Gold is a precious metal that is difficult to find and keep.", "isCorrect": false, "rationale": "This is a literal interpretation of the word 'gold,' missing the poem's metaphorical meaning."}, {"text": "All things beautiful, pure, or perfect are inherently fleeting and cannot last forever.", "isCorrect": true, "rationale": "The poem uses 'gold' metaphorically to represent initial beauty and purity (Nature's first green, early leaf as a flower) and illustrates its impermanence with examples like Eden and dawn, concluding with the universal truth 'Nothing gold can stay.'"}, {"text": "Nature's colors change rapidly with the seasons, from green to gold and back again.", "isCorrect": false, "rationale": "While the poem references nature's changes, the core message extends beyond seasonal shifts to the fundamental impermanence of all 'gold' (beauty/perfection)."}, {"text": "The Garden of Eden was a place of sorrow and grief from its very beginning.", "isCorrect": false, "rationale": "'So Eden sank to grief' is an example used to support the theme of impermanence, not the central message about Eden itself."}], "id": "q08"}, {"question": "Given its historical context of World War I, what is the primary implication of Sara Teasdale's poem 'There Will Come Soft Rains' regarding humanity's conflicts?", "options": [{"text": "Nature has the power to intervene and stop human wars, bringing peace to the world.", "isCorrect": false, "rationale": "The poem implies nature's indifference, not its active intervention in human affairs. Nature simply continues its cycles regardless."}, {"text": "Even after humanity's self-destruction, the natural world will continue its cycles, largely unaffected and indifferent to our absence.", "isCorrect": true, "rationale": "The poem depicts a world where nature flourishes with 'soft rains,' 'swallows,' and 'frogs' even if 'mankind perished utterly.' The key message is nature's serene continuation and indifference to human existence and conflicts ('not one will know of the war, not one / Will care at last when it is done')."}, {"text": "Human conflict is a natural and unavoidable part of the world's ecosystem, similar to animal behaviors.", "isCorrect": false, "rationale": "The poem contrasts the destructive nature of human war with the peaceful, continuing cycles of nature, suggesting a disconnect rather than equivalence."}, {"text": "The beauty of nature can effectively distract humans from the horrors of war and lead to reconciliation.", "isCorrect": false, "rationale": "The poem does not suggest nature distracts or reconciles; it shows nature simply existing, unaware of human strife."}], "id": "q09"}, {"question": "The passage from Ecclesiastes, 'To Every Thing There Is a Season,' presents numerous contrasting pairs of human experiences (e.g., 'a time to be born, and a time to die'). What universal truth about life does this structure primarily emphasize?", "options": [{"text": "That every person's life follows a rigid, unchanging sequence of predetermined events.", "isCorrect": false, "rationale": "While it speaks of appointed 'times,' it emphasizes the natural rhythm and diversity of life's experiences rather than a strict, individual predestination for everyone."}, {"text": "That joy and sorrow are balanced by equal and opposite periods of neutrality throughout life.", "isCorrect": false, "rationale": "The text lists many contrasts but doesn't quantify them as 'equal and opposite periods of neutrality.' It highlights the existence of both."}, {"text": "That life is composed of diverse and often opposing experiences, each having its appropriate, divinely appointed time or season.", "isCorrect": true, "rationale": "The continuous listing of contrasting pairs (weep/laugh, mourn/dance, build up/break down) clearly illustrates that life encompasses a full spectrum of experiences, and each has its fitting 'season' or moment, implying a natural or divine order to these occurrences."}, {"text": "That individuals have complete control over when they choose to experience certain emotions or undertake specific actions.", "isCorrect": false, "rationale": "The phrase 'To every thing there is a season, and a time to every purpose under the heaven' implies an external, overarching order or timing, not complete individual control."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
