    };

    </div>

        <div class="subtitle">The Open Page &mdash; Chapter 9</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "What is the primary common purpose shared by Psalms, Hymns, and Spirituals as described in the overview?", "options": [{"text": "To document historical events and religious doctrines accurately.", "isCorrect": false, "rationale": "While these forms may contain historical or doctrinal elements, the overview emphasizes their role in expressing faith, hope, and worship, not primarily as historical records or academic texts."}, {"text": "To express faith, offer hope, and provide comfort through song.", "isCorrect": true, "rationale": "The overview states these songs are 'songs of faith' that 'sustained a people through suffering and gave them hope for deliverance,' directly aligning with expressing faith, hope, and comfort."}, {"text": "To provide entertainment and social commentary through music.", "isCorrect": false, "rationale": "While spirituals contain social commentary, and all music can be entertaining, the core purpose described for all three forms is spiritual and emotional sustenance rather than entertainment or general social critique."}, {"text": "To serve as educational tools for teaching moral lessons to children.", "isCorrect": false, "rationale": "The text does not state that the primary purpose of these songs is to teach moral lessons specifically to children, although moral principles might be embedded in their messages."}]}, {"question": "Isaac Watts is referred to as the 'Father of English Hymnody.' Based on the text, what was his most significant contribution to congregational singing?", "options": [{"text": "He introduced complex musical arrangements that required trained choirs.", "isCorrect": false, "rationale": "Watts's contribution was to make hymns more accessible and understandable for ordinary people, which suggests simpler, more congregational-friendly music rather than complex arrangements."}, {"text": "He created fresh, memorable hymns that expressed Biblical truths in language ordinary people could understand.", "isCorrect": true, "rationale": "The text explicitly states that 'Watts believed hymns should express Biblical truths in fresh, memorable language that ordinary people could understand,' highlighting his innovation in hymn writing."}, {"text": "He advocated for singing spirituals in church services.", "isCorrect": false, "rationale": "Watts wrote hymns based on Psalms and biblical truths; the spirituals tradition developed separately among enslaved African Americans."}, {"text": "He translated ancient Hebrew Psalms directly into English verse for church use.", "isCorrect": false, "rationale": "While he based his hymns on Psalms, the text states he 'puts the ideas of the Psalms into verse,' indicating interpretation and fresh expression rather than direct translation of the exact words."}]}, {"question": "The 'Did You Know' section explains that the image of God as a 'shepherd' in Psalm 23 was deeply meaningful to ancient Israel. Which of the following best encapsulates the meaning of God as a shepherd?", "options": [{"text": "God as a distant, authoritative ruler who commands obedience.", "isCorrect": false, "rationale": "The shepherd metaphor emphasizes close, personal care and guidance, which contrasts with a distant or purely authoritative ruler."}, {"text": "God as a protector and provider who guides His people with care.", "isCorrect": true, "rationale": "The text explicitly states that when the psalmist calls the Lord his shepherd, 'he is saying that God provides, protects, and guides with that same care' as a good shepherd."}, {"text": "God as a fierce warrior who leads His people into battle.", "isCorrect": false, "rationale": "The context of Psalm 23 and the explanation of the shepherd metaphor focus on comfort, provision, and guidance, not military leadership."}, {"text": "God as a judge who punishes those who stray from the path.", "isCorrect": false, "rationale": "While God is often depicted as a judge in other biblical contexts, the shepherd metaphor in Psalm 23 is primarily about compassionate leading and restoration rather than punishment."}]}, {"question": "Spirituals like 'Swing Low, Sweet Chariot' and 'Go Down, Moses' are identified as having hidden meanings. In addition to expressing faith, how did these songs primarily function for enslaved people?", "options": [{"text": "As historical records of specific escape routes and safe houses.", "isCorrect": false, "rationale": "While they contained coded messages about escape, they were not detailed 'historical records' or literal maps. They conveyed general themes of freedom and escape routes like the Underground Railroad or Ohio River metaphorically."}, {"text": "As a means of secret communication and a coded expression of longing for freedom.", "isCorrect": true, "rationale": "The text states that enslaved people 'understood them as messages about escape and freedom,' and that spirituals 'served as both worship and secret communication,' using metaphors like 'chariot' for the Underground Railroad and 'Jordan' for the Ohio River."}, {"text": "As a form of public protest demanding immediate emancipation.", "isCorrect": false, "rationale": "Their meanings were 'hidden' precisely because overt public protest was dangerous. These songs allowed for subtle expression of their desires without direct confrontation."}, {"text": "As entertainment performed solely for their enslavers to maintain peace.", "isCorrect": false, "rationale": "Spirituals were sung in fields, at prayer meetings, and in communities for the enslaved people themselves, expressing their own faith and hope, not primarily to entertain or appease enslavers."}]}, {"question": "John Newton's life dramatically shifted from a slave trader to a minister who spoke out against slavery. How does the hymn 'Amazing Grace' directly reflect this personal transformation?", "options": [{"text": "It explicitly condemns the institution of slavery and calls for its abolition.", "isCorrect": false, "rationale": "While Newton later became an abolitionist, the lyrics of 'Amazing Grace' itself do not explicitly mention or condemn slavery; its focus is on personal spiritual transformation."}, {"text": "It describes a personal journey from spiritual blindness and being lost to finding sight and salvation through grace.", "isCorrect": true, "rationale": "The lines 'I once was lost, but now am found, / Was blind, but now I see' directly reflect Newton's 'dramatic change of heart' and spiritual conversion from his troubled past."}, {"text": "It encourages listeners to become Anglican ministers and fight for social justice.", "isCorrect": false, "rationale": "The hymn's message is universal spiritual redemption, not a call to a specific vocation or social justice movement, although Newton's life after conversion led him to these actions."}, {"text": "It uses nautical metaphors to recount his near-death experience during a storm at sea.", "isCorrect": false, "rationale": "While a storm was a catalyst for his conversion, the hymn's lyrics focus on the spiritual 'dangers, toils and snares' and grace's saving power, not a literal retelling of his maritime struggles."}]}, {"question": "From which part of the Bible do the Psalms originate?", "options": [{"text": "The New Testament", "isCorrect": false, "rationale": "The Psalms are found in the Old Testament, which predates the New Testament."}, {"text": "The Old Testament", "isCorrect": true, "rationale": "The text clearly states, 'The Psalms are a collection of 150 songs and prayers found in the Old Testament of the Bible.'"}, {"text": "The Apocrypha", "isCorrect": false, "rationale": "The Apocrypha refers to a collection of books that are part of the biblical canon in some traditions but not others, and the Psalms are universally accepted as canonical Old Testament books."}, {"text": "The Gospels", "isCorrect": false, "rationale": "The Gospels (Matthew, Mark, Luke, John) are books in the New Testament that recount the life of Jesus, distinct from the Psalms."}]}, {"question": "The spiritual 'Go Down, Moses' draws heavily on the Biblical story of Exodus. Why was this particular story especially resonant and powerful for enslaved African Americans?", "options": [{"text": "It described a long and difficult journey to a promised land, mirroring their displacement from Africa.", "isCorrect": false, "rationale": "While the journey was long, the primary resonance of Exodus was not about displacement from Africa, but about divine deliverance from slavery, which directly mirrored their own condition."}, {"text": "It told of a divine leader who brought about the miraculous deliverance of a people from bondage.", "isCorrect": true, "rationale": "The text states that many spirituals draw on 'the Exodus, when God delivered Israel from slavery in Egypt—to express their own longing for freedom and hope in God's promises.' This direct parallel made the story deeply powerful."}, {"text": "It provided historical proof that all people were once enslaved at some point in history.", "isCorrect": false, "rationale": "The power of the story for enslaved people came from its thematic parallel to their own experience and hope for freedom, not from it being a historical 'proof' of universal past slavery."}, {"text": "It offered detailed instructions for escaping to a free state by crossing a river.", "isCorrect": false, "rationale": "While spirituals contained coded messages for escape, the story of Exodus itself provided thematic inspiration and hope for freedom, not literal, detailed instructions for escape routes."}]}, {"question": "In Psalm 23, the line 'my cup runneth over' concludes a stanza that describes the Lord preparing a table in the presence of enemies and anointing the psalmist's head with oil. What does 'my cup runneth over' most likely signify in this context?", "options": [{"text": "A feeling of being overwhelmed by stress and fear due to the presence of enemies.", "isCorrect": false, "rationale": "The context describes God's abundant provision and comfort ('preparest a table,' 'anointest my head with oil'), which would alleviate stress and fear, not cause it."}, {"text": "An abundance of blessings and overwhelming gratitude for God's provision.", "isCorrect": true, "rationale": "The imagery of a prepared table and anointing with oil signifies lavish hospitality and honor, even in difficult circumstances. 'My cup runneth over' therefore metaphorically represents an overflowing measure of blessings, provision, and favor."}, {"text": "A literal spilling of a drink due to carelessness during a meal.", "isCorrect": false, "rationale": "This phrase is a metaphor for superabundance, not a literal description of an accident. The poetic nature of Psalms suggests a deeper, symbolic meaning."}, {"text": "A desire for more possessions and material wealth.", "isCorrect": false, "rationale": "The Psalm emphasizes God's care and spiritual well-being ('He restoreth my soul,' 'goodness and mercy shall follow me'), not a longing for increased material possessions beyond what is provided."}]}, {"question": "Across all three types of songs discussed (Psalms, Hymns, and Spirituals), a recurring theme is their role in helping people cope with suffering and hardship. Which of the following best describes this shared role?", "options": [{"text": "They primarily served as historical archives, preserving memories of past struggles for future generations.", "isCorrect": false, "rationale": "While they can preserve culture and history, their primary role in times of suffering is more immediate—providing solace and hope to those currently enduring hardship, rather than just archiving for the future."}, {"text": "They provided a means to express complex emotions, find comfort, and sustain hope in challenging times.", "isCorrect": true, "rationale": "The text describes spirituals as 'born out of deep suffering and deep faith,' hymns like 'Amazing Grace' bringing 'comfort in its message of hope and redemption,' and Psalms offering guidance through 'the valley of the shadow of death,' all pointing to emotional and spiritual sustenance."}, {"text": "They were exclusively used in formal religious ceremonies to maintain strict doctrinal adherence.", "isCorrect": false, "rationale": "Spirituals were sung 'while working in the fields, at secret prayer meetings, and in their communities,' and Isaac Watts aimed for hymns 'ordinary people could understand' for congregational singing, indicating a broader, more accessible use than just formal ceremonies for doctrinal control."}, {"text": "They functioned mainly as educational tools to teach moral and ethical principles through storytelling.", "isCorrect": false, "rationale": "While these songs can contain moral lessons, their direct role in 'coping with suffering' is more about emotional expression, spiritual connection, and fostering resilience and hope, rather than primarily teaching morality."}]}, {"question": "After the Civil War, groups like the Fisk Jubilee Singers played a crucial role in the spiritual tradition. What was their primary contribution?", "options": [{"text": "They composed new spirituals that incorporated classical music elements.", "isCorrect": false, "rationale": "The text states they 'traveled the country performing spirituals,' and 'helped preserve these songs,' implying they performed existing traditional spirituals rather than composing new ones with classical elements."}, {"text": "They helped preserve and popularize spirituals by performing them for wide audiences.", "isCorrect": true, "rationale": "The text explicitly states that 'Their concerts helped preserve these songs and showed the world the beauty and power of African American sacred music,' indicating their role in both preservation and popularization."}, {"text": "They translated spirituals into other languages for international dissemination.", "isCorrect": false, "rationale": "The text mentions performing for wide audiences but does not suggest they translated the songs into other languages."}, {"text": "They established formal schools dedicated to teaching the history and creation of spirituals.", "isCorrect": false, "rationale": "While they were associated with Fisk University, their primary contribution mentioned in the text is performing and preserving the songs, not establishing new schools specifically for spirituals education."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
