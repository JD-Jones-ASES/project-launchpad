        <h2>Results</h2>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

<script>
var QUESTIONS = [{"question": "In the opening scene of Little Women, what does Beth's initial reaction to the lack of Christmas presents reveal about her character compared to her sisters?", "options": [{"text": "She is the most practical sister, focused on saving money.", "isCorrect": false, "rationale": "While practical decisions are made later, Beth's initial reaction is one of contentment and gratitude for family, not primarily financial practicality."}, {"text": "She possesses a contented and grateful spirit, contrasting with her sisters' complaints.", "isCorrect": true, "rationale": "Beth contentedly states, 'We've got Father and Mother, and each other,' directly contrasting Jo's grumbling, Meg's sighing, and Amy's injured sniff about being poor and lacking presents."}, {"text": "She is shy and often avoids expressing her true feelings about their poverty.", "isCorrect": false, "rationale": "Beth does express her feelings directly and contentedly. While she is described as shy in the 'did you know' section, her words here are clear and open."}, {"text": "She is secretly as upset as her sisters but tries to be optimistic for their sake.", "isCorrect": false, "rationale": "The text states Beth spoke 'contentedly from her corner,' indicating her genuine feeling rather than a hidden struggle to appear optimistic."}]}, {"question": "Mrs. March explains that playing 'Pilgrim's Progress' as adults involves recognizing 'our burdens are here, our road is before us, and the longing for goodness and happiness is the guide.' Which of the following best exemplifies a 'burden' for the March sisters in their current situation?", "options": [{"text": "The memory of their father being away in the army.", "isCorrect": false, "rationale": "Their father's absence is a source of sadness, but the text explicitly states the mother's reason for not having presents is 'because it is going to be a hard winter for everyone; and she thinks we ought not to spend money for pleasure, when our men are suffering so in the army,' linking poverty and wartime suffering as the current, immediate burden."}, {"text": "The societal expectation for girls to have pretty things and presents.", "isCorrect": false, "rationale": "While Amy alludes to this ('I don't think it's fair for some girls to have plenty of pretty things, and other girls nothing at all'), the primary and more encompassing burden presented is their family's financial hardship exacerbated by the war."}, {"text": "The financial hardship and sacrifices their family faces due to the Civil War.", "isCorrect": true, "rationale": "Meg explains Mrs. March's decision not to have presents is due to a 'hard winter for everyone' and not spending 'money for pleasure, when our men are suffering so in the army.' This directly aligns with the concept of a 'burden' as something difficult to bear, both financially and emotionally, caused by their circumstances."}, {"text": "Their individual struggles with impatience and grumbling.", "isCorrect": false, "rationale": "These are character flaws, or 'bosom enemies' as the father's letter mentions, which are challenges to conquer, but the immediate 'burden' impacting their Christmas is the external circumstance of poverty and war."}]}, {"question": "In John Bunyan's The Pilgrim's Progress, Christian carries a 'heavy burden' and flees the 'City of Destruction' seeking the 'Celestial City.' Given that The Pilgrim's Progress is an allegory, what does Christian's journey most likely symbolize?", "options": [{"text": "The challenge of finding a new home after natural disaster.", "isCorrect": false, "rationale": "The overview states it is an allegory where 'every character and event stands for something deeper,' and the 'before you read' section asks what the heavy burden might represent, pointing away from a literal natural disaster."}, {"text": "The pursuit of worldly wealth and social status.", "isCorrect": false, "rationale": "Christian is 'a poor burdened sinner' seeking deliverance from 'the wrath to come,' which points to spiritual salvation, not material gain."}, {"text": "The human struggle to escape sin and achieve spiritual salvation.", "isCorrect": true, "rationale": "Christian identifies himself as 'a poor burdened sinner' seeking to be 'delivered from the wrath to come' by reaching 'Mount Zion,' which are clear allegorical references to the spiritual journey of seeking salvation from sin."}, {"text": "The adventurous spirit of exploration and discovery.", "isCorrect": false, "rationale": "While there is a journey, the context of 'poor burdened sinner' and 'wrath to come' indicates a spiritual quest rather than an exploration."}]}, {"question": "When Christian approaches the Wicket Gate, Good-will pulls him inside, explaining that Beelzebub's castle shoots arrows at those trying to enter. What is the allegorical significance of Good-will's action?", "options": [{"text": "It demonstrates the dangers of travel in a hostile world.", "isCorrect": false, "rationale": "While it does show danger, the allegorical context implies a deeper spiritual meaning than just physical travel hazards. Beelzebub represents evil attempting to prevent salvation."}, {"text": "It represents divine intervention protecting a seeking soul from evil spiritual forces.", "isCorrect": true, "rationale": "Good-will's action of pulling Christian in to protect him from Beelzebub's arrows symbolizes the grace or protective power that helps a person overcome spiritual attacks and enter the path to salvation."}, {"text": "It highlights the importance of asking for help when faced with a difficult journey.", "isCorrect": false, "rationale": "Christian did 'knock' and ask to enter, but Good-will's pull is a specific act of protection from an external, malevolent force, symbolizing more than just general assistance."}, {"text": "It shows that only the strongest can overcome the obstacles to the Celestial City.", "isCorrect": false, "rationale": "Christian is described as a 'poor burdened sinner,' not necessarily strong. Good-will's action suggests external aid is crucial, not just individual strength."}]}, {"question": "Christina Rossetti's poem 'Who Has Seen the Wind?' describes an unseen entity by its effects (leaves trembling, trees bowing). This approach is mirrored in the introduction to her poems and the Beatitudes. What is the shared purpose of this literary technique?", "options": [{"text": "To emphasize the beauty and mystery of the natural world.", "isCorrect": false, "rationale": "While true for Rossetti's poem, the introduction explicitly connects it to the Beatitudes, suggesting a deeper shared purpose than just natural beauty."}, {"text": "To encourage readers to rely solely on sensory evidence for understanding.", "isCorrect": false, "rationale": "The technique describes the unseen *through* its effects, suggesting understanding beyond direct sensory input, particularly in the context of spiritual blessings."}, {"text": "To make abstract or spiritual concepts understandable through observable phenomena or consequences.", "isCorrect": true, "rationale": "The introduction states, 'notice how both Rossetti's poems and the Beatitudes describe things we cannot see—the wind, the Christ child, and the blessings of a humble heart.' This means understanding intangible or spiritual truths through their manifestations or effects."}, {"text": "To prove the existence of supernatural forces that govern human life.", "isCorrect": false, "rationale": "The purpose is more about describing and understanding, rather than proving, particularly in the context of the wind which is a natural phenomenon."}]}, {"question": "In Rossetti's 'In the Bleak Midwinter,' the speaker, feeling poor and unable to offer material gifts, resolves to 'Give my heart.' How does this sentiment align with the values expressed in the Beatitudes?", "options": [{"text": "It reflects the blessing for those who are merciful, as giving one's heart is an act of pity.", "isCorrect": false, "rationale": "While 'merciful' is a Beatitude, giving one's heart in this context is more about humble devotion and inner offering than an act of pity or mercy towards others."}, {"text": "It embodies the spirit of being 'poor in spirit,' where humble devotion is valued over material possessions.", "isCorrect": true, "rationale": "The Beatitudes begin with 'Blessed are the poor in spirit: for theirs is the kingdom of heaven.' Rossetti's speaker, 'Poor as I am,' offers a humble, internal gift (their heart) rather than material wealth, directly aligning with the value of humility and spiritual devotion over worldly riches."}, {"text": "It shows the importance of giving gifts during Christmas, regardless of their value.", "isCorrect": false, "rationale": "The focus is on the *type* of gift (heart/self) when material gifts are impossible, linking to spiritual virtue, not just the act of giving any gift."}, {"text": "It highlights the idea that true giving should always involve personal sacrifice.", "isCorrect": false, "rationale": "While it involves personal offering, the primary alignment with the Beatitudes is 'poor in spirit,' emphasizing the spiritual state rather than just the act of sacrifice itself."}]}, {"question": "The three sections—'Little Women,' 'The Pilgrim's Progress,' and 'Poems and the Beatitudes'—all contribute to the unit's theme of 'CHARACTER AND COURAGE: MORAL TALES.' What common element do they share in conveying moral lessons?", "options": [{"text": "They all feature characters who embark on literal, physical journeys to find a better life.", "isCorrect": false, "rationale": "While 'The Pilgrim's Progress' features a literal journey, 'Little Women' discusses a metaphorical one, and the Beatitudes are principles, not a narrative journey, making this incorrect."}, {"text": "They all emphasize the importance of outward displays of piety and religious observance.", "isCorrect": false, "rationale": "The texts emphasize internal states (contentment, humility, righteousness) rather than outward displays. The Beatitudes, especially, focus on inner qualities."}, {"text": "They all use storytelling, allegory, or declarative statements to guide individuals toward virtuous living and spiritual well-being.", "isCorrect": true, "rationale": "'Little Women' uses a story about sisters embodying virtues, 'The Pilgrim's Progress' is an explicit allegory for a spiritual journey, and the Beatitudes are declarative statements of blessings for virtuous character traits. All serve to teach moral lessons and guide towards 'goodness and happiness' or 'kingdom of heaven.'"}, {"text": "They all advocate for strict adherence to religious doctrines and dogma.", "isCorrect": false, "rationale": "While rooted in Christian faith, the focus is on universal moral character and spiritual principles (like meekness, mercy, purity of heart) rather than strict dogma."}]}, {"question": "According to the glossary, what is a 'pilgrim'?", "options": [{"text": "A person who is known for their adventurous spirit and love of travel.", "isCorrect": false, "rationale": "While a pilgrim travels, the definition specifies 'to a holy place' or 'on a spiritual journey,' making the purpose spiritual rather than just adventurous."}, {"text": "A person who leaves their home country to settle in a new land.", "isCorrect": false, "rationale": "This describes an immigrant or colonist, not specifically a pilgrim whose journey is defined by a spiritual purpose or destination."}, {"text": "A person who travels to a holy place or is on a spiritual journey.", "isCorrect": true, "rationale": "The glossary defines 'pilgrim' as 'A person who travels to a holy place; a person on a spiritual journey.'"}, {"text": "A person who is burdened by life's difficulties and seeks escape.", "isCorrect": false, "rationale": "While Christian in 'Pilgrim's Progress' is burdened, that is a characteristic of *a* pilgrim, not the definition of the word 'pilgrim' itself."}]}, {"question": "The 'did you know' section for John Bunyan mentions he wrote The Pilgrim's Progress while in prison for 'preaching without a license.' How does this context add depth to the meaning of Christian's 'hazards' and 'rejoice and tremble' moment at the Wicket Gate?", "options": [{"text": "It suggests that Bunyan himself felt a literal threat of arrows from authorities, making the danger concrete.", "isCorrect": false, "rationale": "While Bunyan faced real danger (imprisonment), the 'arrows' are symbolic within the allegory. The context deepens the spiritual, not just literal, understanding of hazards."}, {"text": "It highlights that the spiritual journey is often fraught with real-world persecution and risks, mirroring Bunyan's own experience.", "isCorrect": true, "rationale": "Bunyan's imprisonment for his faith (preaching without a license) provides a real-world example of 'hazards' and persecution for 'righteousness' sake, directly connecting his life to Christian's allegorical struggle against Beelzebub's arrows and the joy of finding refuge."}, {"text": "It implies that Bunyan was a rebel who challenged authority, and Christian similarly rebels against the City of Destruction.", "isCorrect": false, "rationale": "While Bunyan did defy authority, Christian's fleeing the City of Destruction is a spiritual act of seeking salvation, not primarily an act of political rebellion."}, {"text": "It reinforces the idea that true spiritual experiences only happen in isolated, difficult environments like prison.", "isCorrect": false, "rationale": "The text states Bunyan found success and wrote in prison, but it does not suggest that such conditions are *necessary* for spiritual experience, only that they can occur there."}]}, {"question": "The father's letter in 'Little Women' asks his daughters to 'fight their bosom enemies bravely, and conquer themselves.' Which of the Beatitudes most directly relates to the internal struggle against 'bosom enemies' and the idea of 'conquering themselves'?", "options": [{"text": "Blessed are the merciful: for they shall obtain mercy.", "isCorrect": false, "rationale": "Mercy is about compassion towards others, not primarily about conquering one's own internal flaws or 'bosom enemies'."}, {"text": "Blessed are the peacemakers: for they shall be called the children of God.", "isCorrect": false, "rationale": "Peacemaking is about fostering harmony with others, not the internal battle against personal vices."}, {"text": "Blessed are the meek: for they shall inherit the earth.", "isCorrect": false, "rationale": "Meekness (gentleness, humility) is a result of self-conquest but not the direct act of fighting an 'enemy' or 'conquering themselves' as a dynamic struggle."}, {"text": "Blessed are they which do hunger and thirst after righteousness: for they shall be filled.", "isCorrect": true, "rationale": "'Hungering and thirsting after righteousness' implies an active, strong desire and pursuit of moral rightness. This pursuit necessarily involves an internal struggle to overcome one's 'bosom enemies' (vices or flaws) and 'conquer themselves' to achieve that desired state of righteousness."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
