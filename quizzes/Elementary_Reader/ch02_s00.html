        <div class="subtitle">The Open Page &mdash; Chapter 2</div>

        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "Based on the \"Overview\" and \"beforeyouread\" sections, what is the fundamental difference in how fables and proverbs convey their lessons?", "options": [{"text": "Fables always use animals, while proverbs only refer to human actions.", "isCorrect": false, "rationale": "While fables often feature animals, the text does not state they 'always' do, and proverbs can use analogies from nature. This option oversimplifies and includes an absolute that isn't supported."}, {"text": "Fables teach through narrative stories, whereas proverbs teach through short, memorable sayings.", "isCorrect": true, "rationale": "The overview defines fables as teaching 'through animals' (implying stories) and proverbs as teaching 'through short, memorable sayings.' This option accurately captures the distinction in their pedagogical methods."}, {"text": "Fables are ancient, while proverbs are modern expressions of wisdom.", "isCorrect": false, "rationale": "The text describes both fables ('These ancient lessons') and proverbs ('The Book of Proverbs... was written... three thousand years ago') as ancient."}, {"text": "Fables focus on mistakes, while proverbs focus on success.", "isCorrect": false, "rationale": "Both fables and proverbs can highlight consequences of mistakes and paths to success. This is not their fundamental differentiating factor."}], "id": "q01"}, {"question": "The fable \"The Ants and the Grasshopper\" can be interpreted as a cautionary tale about what societal value?", "options": [{"text": "The importance of celebrating artistic expression during leisure time.", "isCorrect": false, "rationale": "While the Grasshopper sings, the fable's message critiques his lack of preparation due to excessive leisure, not the artistic expression itself. The focus is on the consequences of idleness."}, {"text": "The necessity of prudent planning and diligent effort for future security.", "isCorrect": true, "rationale": "The Ants diligently collect food in summer, while the Grasshopper sings and faces famine in winter. The pull quote states, 'It is best to prepare for the days of necessity,' directly supporting this interpretation."}, {"text": "The virtue of generosity towards those less fortunate.", "isCorrect": false, "rationale": "The Ants' response to the Grasshopper is derisive, not generous, reinforcing the lesson of self-reliance and preparation rather than charity in this specific fable."}, {"text": "The dangers of pride and haughtiness.", "isCorrect": false, "rationale": "Pride is a theme in other proverbs, but this fable specifically addresses diligence and foresight, contrasting the Ants' industry with the Grasshopper's improvidence."}], "id": "q02"}, {"question": "A student fails to get into their top-choice university. Instead of reflecting on their application, they declare, \"That university was probably too competitive and not even that good anyway.\" Which fable's lesson does this scenario most closely illustrate?", "options": [{"text": "The Ants and the Grasshopper.", "isCorrect": false, "rationale": "This fable focuses on the consequences of inadequate preparation and idleness, which does not align with the student's rationalization of failure."}, {"text": "The Fox and the Grapes.", "isCorrect": true, "rationale": "The Fox, unable to reach the grapes, declares them 'sour.' This perfectly mirrors the student's behavior of disparaging something they failed to obtain to hide their disappointment, as highlighted by the pull quote: 'It is easy to despise what you cannot get.'"}, {"text": "The North Wind and the Sun.", "isCorrect": false, "rationale": "This fable teaches about persuasion versus force, which is unrelated to the student's situation."}, {"text": "The Lion and the Mouse.", "isCorrect": false, "rationale": "This fable emphasizes unexpected kindness and reciprocal benefits, which is not applicable to the student's reaction to rejection."}], "id": "q03"}, {"question": "In the proverb section \"Go to the Ant,\" the \"sluggard\" is primarily criticized for which of the following character flaws?", "options": [{"text": "Excessive pride in their own abilities.", "isCorrect": false, "rationale": "While pride is a flaw addressed in other proverbs, this specific passage repeatedly emphasizes the sluggard's idleness and lack of foresight, contrasting it with the ant's diligent work."}, {"text": "A lack of respect for authority figures.", "isCorrect": false, "rationale": "The ant is praised for providing for itself 'having no guide, overseer, or ruler,' highlighting its self-motivation rather than the sluggard's disrespect for authority."}, {"text": "Failure to plan and work diligently for future needs.", "isCorrect": true, "rationale": "The proverb urges the sluggard to 'consider her ways, and be wise' because the ant 'provideth her meat in the summer, and gathereth her food in the harvest,' directly contrasting with the sluggard's continuous sleep and impending poverty."}, {"text": "Speaking grievous words that stir up anger.", "isCorrect": false, "rationale": "This specific criticism is found in a different proverb ('A soft answer turneth away wrath: but grievous words stir up anger'), not in 'Go to the Ant'."}], "id": "q04"}, {"question": "\"The North Wind and the Sun\" challenges the common perception of strength by demonstrating that true power can manifest as:", "options": [{"text": "The ability to overcome obstacles through sheer force and determination.", "isCorrect": false, "rationale": "The North Wind attempts to use sheer force and fails, demonstrating that this is not always the most effective form of power."}, {"text": "The capacity for subtle influence and gentle persuasion.", "isCorrect": true, "rationale": "The Sun succeeds by shining 'with all his warmth,' causing the Traveler to willingly remove his garments. The pull quote directly states, 'Persuasion is better than force,' encapsulating this lesson."}, {"text": "The skill of outsmarting an opponent through clever tricks.", "isCorrect": false, "rationale": "The Sun does not use trickery but rather a different, gentler approach. This describes a trickster tale, not this fable."}, {"text": "The dominance achieved by being the largest or most imposing figure.", "isCorrect": false, "rationale": "The fable directly refutes the idea that physical or imposing strength (like the Wind's blasts) is superior to subtle influence."}], "id": "q05"}, {"question": "Imagine two friends are arguing. One is becoming agitated, and the other is about to respond with equal anger. Which proverb from \"Wise Sayings\" offers the most direct advice for de-escalating the conflict?", "options": [{"text": "\"Pride goeth before destruction, and an haughty spirit before a fall.\"", "isCorrect": false, "rationale": "While important for humility, this proverb does not directly advise on the verbal response needed to calm an argument."}, {"text": "\"A friend loveth at all times, and a brother is born for adversity.\"", "isCorrect": false, "rationale": "This proverb describes the nature of true friendship but doesn't provide specific guidance for resolving an immediate conflict."}, {"text": "\"A soft answer turneth away wrath: but grievous words stir up anger.\"", "isCorrect": true, "rationale": "This proverb directly addresses the impact of one's words during a conflict, advising a gentle response to prevent escalation, which is precisely what is needed to de-escalate an argument."}, {"text": "\"Iron sharpeneth iron; so a man sharpeneth the countenance of his friend.\"", "isCorrect": false, "rationale": "This proverb speaks to mutual improvement and growth through interaction, not directly about de-escalating an argument."}], "id": "q06"}, {"question": "While both fables and proverbs convey wisdom, how do their primary teaching methods differ fundamentally?", "options": [{"text": "Fables rely on vivid imagery and allegorical characters, while proverbs provide direct, declarative statements of truth.", "isCorrect": true, "rationale": "Fables use narrative stories, often with animal characters representing human traits (allegory), to illustrate a moral. Proverbs, as described, are 'short, wise saying[s]' that are direct pieces of advice, fitting the description of declarative statements."}, {"text": "Fables are always humorous, whereas proverbs are consistently serious and solemn.", "isCorrect": false, "rationale": "While fables can have humor, they are not 'always humorous,' and proverbs, while serious, are not necessarily 'consistently solemn' and can possess subtle wit. This generalization is not supported by the text."}, {"text": "Fables are intended for children, while proverbs are exclusively for adults.", "isCorrect": false, "rationale": "The textbook itself is for students ('lessons for the young'), and the Book of Proverbs was written to 'teach young people how to live wisely,' indicating both are for a broad audience including the young."}, {"text": "Fables originate from specific authors, but proverbs are always anonymous.", "isCorrect": false, "rationale": "Aesop is named as the author for fables, and King Solomon is traditionally attributed with the Book of Proverbs, disproving the idea that proverbs are 'always anonymous'."}], "id": "q07"}, {"question": "What central message about interpersonal relationships is conveyed in \"The Lion and the Mouse\"?", "options": [{"text": "The powerful should always be wary of the weak.", "isCorrect": false, "rationale": "The fable contradicts this by showing the powerful Lion benefitting from the weak Mouse, challenging the initial assumption of power dynamics."}, {"text": "Kindness, regardless of the recipient's perceived status, can lead to unexpected and vital reciprocal benefits.", "isCorrect": true, "rationale": "The Lion's act of kindness in sparing the Mouse's life is unexpectedly repaid when the small Mouse saves the mighty Lion. The pull quote, 'No act of kindness, no matter how small, is ever wasted,' perfectly summarizes this lesson."}, {"text": "It is foolish to show mercy to those who are weaker than you.", "isCorrect": false, "rationale": "The fable proves the opposite: the Lion's mercy was ultimately beneficial, demonstrating it was a wise, not foolish, act."}, {"text": "All creatures possess hidden strengths that are only revealed in times of crisis.", "isCorrect": false, "rationale": "While the Mouse's hidden strength is revealed, the core message extends beyond just strength to the value of kindness and how it fosters beneficial relationships, irrespective of initial power imbalances."}], "id": "q08"}, {"question": "The \"did you know\" sections about fables from India and West Africa, along with La Fontaine's retellings, collectively suggest what about this literary form?", "options": [{"text": "Fables are an exclusive invention of ancient Greek culture.", "isCorrect": false, "rationale": "The text explicitly mentions the Panchatantra in India and Anansi the Spider in West Africa, directly contradicting the idea of fables being exclusive to ancient Greece."}, {"text": "The universal appeal and enduring relevance of fables transcend cultural and temporal boundaries.", "isCorrect": true, "rationale": "The sections highlight fables existing 'in nearly every culture on earth,' teaching wisdom 'much like Aesop,' and being retold for 'over 2,500 years' and 'still memorized' today, all emphasizing their widespread and lasting impact across time and cultures."}, {"text": "Modern societies no longer find value in traditional fables.", "isCorrect": false, "rationale": "The fact that La Fontaine's versions are 'still memorized by schoolchildren in France today' directly refutes this statement."}, {"text": "Fables primarily serve as historical records of ancient customs.", "isCorrect": false, "rationale": "While ancient, the text emphasizes their role in teaching 'wisdom' and 'lessons about life,' indicating their primary purpose is pedagogical rather than historical record-keeping."}], "id": "q09"}, {"question": "The \"About the Book of Proverbs\" section states its purpose is to \"teach young people how to live wisely\" and gives advice about \"hard work, honesty, and friendship.\" Considering these themes and the provided glossary, which quality would Solomon's proverbs most strongly advocate for in a young person trying to avoid the fate of the \"sluggard\"?", "options": [{"text": "Vain.", "isCorrect": false, "rationale": "The glossary defines 'vain' as having too much pride or being useless, which is antithetical to living wisely, working hard, and avoiding the sluggard's fate."}, {"text": "Prudent.", "isCorrect": true, "rationale": "The glossary defines 'prudent' as 'showing good judgment and careful thought.' This aligns perfectly with the goal of 'living wisely,' engaging in 'hard work' (which requires careful thought and planning), and avoiding the shortsighted idleness of a 'sluggard.'"}, {"text": "Haughty.", "isCorrect": false, "rationale": "The proverb 'Pride goeth before destruction, and an haughty spirit before a fall' explicitly warns against a haughty spirit, making it an undesirable quality."}, {"text": "Rebuke.", "isCorrect": false, "rationale": "The glossary defines 'rebuke' as a criticism, not a positive character trait to be developed. One might receive a rebuke, but not embody it."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
