    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Elementary_Reader.html">&larr; Back to The Open Page</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Open Page &mdash; Chapter 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "In \"To My Dear and Loving Husband,\" Anne Bradstreet uses hyperbole to express her profound feelings. Which statement best captures the ultimate aspiration Bradstreet conveys for her love?", "options": [{"text": "To achieve earthly wealth comparable to her love.", "isCorrect": false, "rationale": "Bradstreet states her love is 'more than whole mines of gold,' indicating her love surpasses earthly wealth, rather than aiming to achieve it."}, {"text": "To attain a love so enduring that it transcends their mortal lives.", "isCorrect": true, "rationale": "The concluding lines, 'That when we live no more, we may live ever,' explicitly state her aspiration for an eternal love that continues beyond their earthly existence."}, {"text": "To ensure their love is publicly recognized and celebrated.", "isCorrect": false, "rationale": "The poem focuses on the personal and spiritual intensity of their bond, not on public recognition or celebration."}, {"text": "To inspire other women to love their husbands equally.", "isCorrect": false, "rationale": "While she challenges other women to 'Compare with me, ye women, if you can,' this is a testament to the uniqueness of her love, not the ultimate aspiration for its endurance beyond life."}], "id": "q01"}, {"question": "Anne Bradstreet's \"The Author to Her Book\" employs an extended metaphor comparing her book to an \"ill-formed offspring.\" Which of the following details from the poem *least* supports the interpretation that she feels protective yet critical of her own work?", "options": [{"text": "Thy visage was so irksome in my sight.", "isCorrect": false, "rationale": "This line directly expresses her critical view of her book's appearance, supporting the 'critical' aspect of her feelings."}, {"text": "Thy blemishes amend, if so I could.", "isCorrect": false, "rationale": "This line shows her desire to improve and protect her 'offspring' (book), supporting both the 'protective' and 'critical' aspects."}, {"text": "Thou ill-formed offspring of my feeble brain.", "isCorrect": false, "rationale": "This opening line establishes her self-critical and humble assessment of her creative output, supporting the 'critical' aspect."}, {"text": "Till snatched from thence by friends, less wise than true.", "isCorrect": true, "rationale": "This line describes the actions of her friends in publishing the book without her full consent, reflecting on their judgment rather than directly revealing her own mixed feelings of protectiveness and self-criticism towards the work itself. While it suggests a protective instinct (she didn't want it exposed), the other options more directly express her internal conflict about the work's quality."}], "id": "q02"}, {"question": "What social and historical context makes Anne Bradstreet's achievement of being the first published poet in the American colonies particularly noteworthy?", "options": [{"text": "The widespread availability of publishing houses in the New World.", "isCorrect": false, "rationale": "The text states her brother-in-law 'secretly took her poems to London and had them published,' implying that publishing opportunities were not widespread or easily accessible in the colonies, especially for women."}, {"text": "The significant barriers and lack of opportunities for women in publishing during that era.", "isCorrect": true, "rationale": "The 'didyouknow' section explicitly states, 'Colonial women rarely had the chance to publish their writing, so Bradstreet's success was truly remarkable for her time,' highlighting the societal challenges she overcame."}, {"text": "The general encouragement for colonial women to pursue literary careers.", "isCorrect": false, "rationale": "The text contradicts this, stating women 'rarely had the chance to publish their writing,' indicating a lack of general encouragement for their literary careers."}, {"text": "The common practice of publishing literary works anonymously in the colonies.", "isCorrect": false, "rationale": "While her work was published without her knowledge, the text doesn't suggest anonymous publication was a common practice she engaged in; rather, it emphasizes the unusual circumstance of her work being published at all."}], "id": "q03"}, {"question": "A student is procrastinating on a complex school project, believing they have ample time before the deadline. Which proverb from Poor Richard's Almanack would offer the most pertinent advice to help them change their approach?", "options": [{"text": "An ounce of prevention is worth a pound of cure.", "isCorrect": false, "rationale": "This proverb advises taking small actions to avoid larger problems, which is related to preparedness but doesn't specifically address the issue of consistent effort over time for a project."}, {"text": "Little strokes fell great oaks.", "isCorrect": true, "rationale": "This proverb emphasizes that large tasks can be accomplished through persistent, small efforts. It directly addresses the student's procrastination by suggesting they start with 'little strokes' rather than waiting until the last minute."}, {"text": "Three may keep a secret, if two of them are dead.", "isCorrect": false, "rationale": "This proverb is about the difficulty of keeping secrets and is irrelevant to project management or procrastination."}, {"text": "Fish and visitors stink in three days.", "isCorrect": false, "rationale": "This proverb advises against overstaying one's welcome or prolonging unpleasant situations, which is unrelated to the student's project dilemma."}], "id": "q04"}, {"question": "The lesson Benjamin Franklin learned from his whistle purchase—\"Don't give too much for the whistle\"—can be applied to modern consumer behavior. Which scenario best illustrates this principle?", "options": [{"text": "Buying a top-of-the-line smartphone with features you'll never use, simply because it's the newest model.", "isCorrect": true, "rationale": "This scenario perfectly illustrates 'giving too much for the whistle' by spending excessively on something that offers little practical value or use to the individual, similar to Franklin's overpayment for a simple toy."}, {"text": "Investing in high-quality tools that are expensive but will last a lifetime for a professional trade.", "isCorrect": false, "rationale": "This represents a wise, long-term investment where the higher cost is justified by durability and utility, not an overpayment for something trivial or unnecessary."}, {"text": "Comparing prices from several retailers before purchasing an essential household appliance.", "isCorrect": false, "rationale": "This demonstrates thrift and careful spending, which is the opposite of 'giving too much for the whistle.' It ensures good value for an essential item."}, {"text": "Opting for a generic brand of a common grocery item instead of a more expensive name brand.", "isCorrect": false, "rationale": "This is another example of practicing thrift and smart shopping by choosing a more economical option that provides similar utility, not overspending on a 'whistle.'"}], "id": "q05"}, {"question": "The text highlights Benjamin Franklin's multifaceted talents. Which combination of roles best represents his diverse contributions to colonial American society?", "options": [{"text": "Farmer, Preacher, Musician, Explorer.", "isCorrect": false, "rationale": "These roles are not mentioned in the text as Franklin's primary contributions."}, {"text": "Printer, Scientist, Inventor, Statesman.", "isCorrect": true, "rationale": "The text explicitly states Franklin was 'a printer, scientist, inventor, writer, and statesman all at once,' and details his inventions and political roles."}, {"text": "Merchant, Teacher, Architect, Physician.", "isCorrect": false, "rationale": "While he may have dabbled in some adjacent areas, these are not the core roles highlighted by the text regarding his major contributions."}, {"text": "Soldier, Sculptor, Philosopher, Historian.", "isCorrect": false, "rationale": "These roles are not mentioned in the text as Franklin's primary contributions."}], "id": "q06"}, {"question": "The \"Did You Know\" section about The New England Primer states it was \"unlike schoolbooks today.\" What was the most significant distinction in its educational philosophy compared to modern textbooks?", "options": [{"text": "It prioritized rote memorization over critical thinking skills.", "isCorrect": false, "rationale": "While rote memorization was common, the text specifically emphasizes a different, more significant philosophical distinction: the integration of faith."}, {"text": "It integrated moral and religious instruction directly into every lesson.", "isCorrect": true, "rationale": "The text explicitly states, 'Unlike schoolbooks today, almost every lesson included a message about God, sin, or salvation. Colonial families believed that learning to read and learning about faith went hand in hand,' highlighting this fundamental philosophical difference."}, {"text": "It was designed for a one-room schoolhouse environment.", "isCorrect": false, "rationale": "This describes the logistical setting of colonial schools, not the underlying educational philosophy of the primer's content."}, {"text": "It used rhymes to teach the alphabet.", "isCorrect": false, "rationale": "Using rhymes is a pedagogical method, not the core philosophical distinction regarding the *content* and *purpose* of the lessons, which was the integration of faith."}], "id": "q07"}, {"question": "The rhyme for the letter 'A' in The New England Primer reads: \"In Adam's Fall, We sinned all.\" If a colonial parent wanted to ensure their child understood the concept of original sin as taught in their community, why would this rhyme be particularly effective?", "options": [{"text": "It uses simple language to introduce a foundational theological concept.", "isCorrect": true, "rationale": "The rhyme's straightforward and memorable couplet directly conveys the core concept of original sin (humanity's inheritance of sin from Adam's transgression) in a way accessible to young children, serving the primer's dual purpose of literacy and faith."}, {"text": "It encourages children to question religious dogma.", "isCorrect": false, "rationale": "Colonial primers were designed to instill religious doctrine and virtue, not to encourage questioning of fundamental beliefs."}, {"text": "It connects the letter 'A' to an agricultural theme relevant to daily life.", "isCorrect": false, "rationale": "The rhyme connects to a religious narrative ('Adam's Fall'), not an agricultural theme."}, {"text": "It suggests that all falls are caused by human sin.", "isCorrect": false, "rationale": "The rhyme specifically refers to 'Adam's Fall' and its universal consequence for humanity, not all 'falls' in a general sense."}], "id": "q08"}, {"question": "What was a practical reason mentioned in the text for children in colonial schools often using hornbooks for writing practice instead of paper?", "options": [{"text": "Hornbooks allowed for more artistic expression than paper.", "isCorrect": false, "rationale": "The text makes no mention of hornbooks offering more artistic expression; their purpose was primarily for basic writing practice."}, {"text": "Paper was a scarce and expensive resource in the colonies.", "isCorrect": true, "rationale": "The text explicitly states, 'Paper was expensive, so children often practiced writing on small boards covered with a thin sheet of horn, called hornbooks,' indicating cost was the practical reason."}, {"text": "Hornbooks were specifically designed to prevent cheating.", "isCorrect": false, "rationale": "The text does not mention hornbooks being used as a anti-cheating measure."}, {"text": "Colonial children preferred the feel and durability of hornbooks.", "isCorrect": false, "rationale": "While durability might have been a secondary benefit, the text attributes the use of hornbooks primarily to the high cost of paper, not children's preference."}], "id": "q09"}, {"question": "Although Anne Bradstreet, Benjamin Franklin, and The New England Primer represent different forms of colonial expression, a unifying theme across their works is the emphasis on certain core values. Which of the following sets of values best encapsulates this shared focus?", "options": [{"text": "Individual liberty, political revolution, and artistic freedom.", "isCorrect": false, "rationale": "While some of these themes might emerge later in American history, they are not the central unifying themes across all three diverse colonial texts presented."}, {"text": "Material wealth, social status, and scientific advancement.", "isCorrect": false, "rationale": "Franklin touches on wealth and science, but Bradstreet's focus is love and faith, and the Primer emphasizes faith and virtue. Material wealth and social status are not unifying themes across all three."}, {"text": "Diligence, virtue, and spiritual well-being.", "isCorrect": true, "rationale": "Bradstreet's poems reflect faith and perseverance in love; Franklin's Almanack promotes diligence ('Early to bed and early to rise'), thrift, and good character (virtue); and The New England Primer aims to instill faith ('In Adam's Fall') and virtue ('idle Fool, is whipt at school') alongside literacy, making these a strong unifying set of values."}, {"text": "Exploration, conquest, and indigenous relations.", "isCorrect": false, "rationale": "These themes are not addressed by any of the provided texts from Bradstreet, Franklin, or The New England Primer."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
