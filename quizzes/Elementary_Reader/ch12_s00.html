    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Elementary_Reader.html">&larr; Back to The Open Page</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Open Page &mdash; Chapter 12</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to Booker T. Washington's autobiography, what specific detail does he provide regarding the circumstances of his birth?", "options": [{"text": "He was born in a large, well-constructed cabin with glass windows.", "isCorrect": false, "rationale": "The text states his cabin was 'typical log cabin' and 'without glass windows,' making this option incorrect."}, {"text": "He clearly recalls the exact date and location of his birth in Virginia.", "isCorrect": false, "rationale": "Washington explicitly states, 'I am not quite sure of the exact place or exact date of my birth,' making this option incorrect."}, {"text": "He was born into slavery in Franklin County, Virginia, unsure of the precise date or place.", "isCorrect": true, "rationale": "The text clearly states, 'I was born a slave on a plantation... in Franklin County, Virginia. I am not quite sure of the exact place or exact date of my birth,' which directly matches this option."}, {"text": "He was born after the Civil War ended, in a free state.", "isCorrect": false, "rationale": "The text states he was 'born a slave' and lived in the cabin 'till after the Civil War, when we were all declared free,' indicating he was born before the war ended and in slavery."}], "id": "q01"}, {"question": "Booker T. Washington's detailed description of wearing a flax shirt primarily serves to illustrate which aspect of his experience as a slave?", "options": [{"text": "The resourcefulness of slaves in making their own garments from available materials.", "isCorrect": false, "rationale": "While flax was used, the focus is not on resourcefulness but on the 'tortures' caused by the rough material, describing it as 'refuse' and 'cheapest and roughest part' from which clothing was made, implying it was provided or imposed rather than a creative act of self-sufficiency."}, {"text": "The economic conditions of the plantation, where flax was a primary cash crop.", "isCorrect": false, "rationale": "The text mentions flax was 'common to use... as part of the clothing for the slaves,' but it does not specify it as a primary cash crop or focus on its economic role beyond being a cheap material for slave clothing."}, {"text": "The pervasive, subtle physical discomfort and indignity that contributed to the misery of daily life in slavery.", "isCorrect": true, "rationale": "Washington uses vivid analogies like 'a dozen or more chestnut burrs, or a hundred small pin-points' and calls it 'torture' to convey the constant, unbearable discomfort and dehumanization, highlighting a suffering beyond physical labor."}, {"text": "The kindness of his owners who provided new clothing, even if it was rough.", "isCorrect": false, "rationale": "Washington explicitly states his owners 'were not, as compared with many others' especially cruel, but the context of the flax shirt focuses on the inherent suffering of the garment itself, not the owners' intent or kindness in providing it."}], "id": "q02"}, {"question": "Based on the description of the Tuskegee Institute, which principle was central to Booker T. Washington's vision for the advancement of African Americans after emancipation?", "options": [{"text": "Emphasis on abstract academic theories and political activism.", "isCorrect": false, "rationale": "The text highlights 'practical skills—farming, carpentry, brick-making, and teaching' and 'tools to build independent lives,' which contrasts with a primary focus on abstract theories or political activism."}, {"text": "Migration to urban centers for industrial employment.", "isCorrect": false, "rationale": "While a possible path, Washington's vision for Tuskegee was about building self-sufficient communities through practical skills, not specifically about mass migration to cities for factory work."}, {"text": "Acquisition of practical skills and trades to foster economic independence and self-sufficiency.", "isCorrect": true, "rationale": "The text states Washington believed 'learning practical skills—farming, carpentry, brick-making, and teaching—would give African Americans the tools to build independent lives,' which directly supports this principle."}, {"text": "Exclusive focus on artistic and cultural expression as a means of uplift.", "isCorrect": false, "rationale": "While the overall unit includes artistic expression, Tuskegee's specific mission as described was about practical skills for independent living, not an exclusive focus on arts."}], "id": "q03"}, {"question": "In Paul Laurence Dunbar's poem 'We Wear the Mask,' what is the primary reason the speakers 'wear the mask'?", "options": [{"text": "To celebrate cultural festivals with traditional attire.", "isCorrect": false, "rationale": "The poem's tone is one of hidden suffering and pain ('torn and bleeding hearts,' 'tortured souls'), not celebration, making this option incorrect."}, {"text": "To conceal their inner pain and suffering from a world that might not understand or sympathize.", "isCorrect": true, "rationale": "The mask 'grins and lies,' hiding 'torn and bleeding hearts' and 'tortured souls,' so the world will 'dream otherwise' rather than 'count all our tears and sighs.' This directly supports concealing suffering."}, {"text": "To participate in secret societies that protect their identities.", "isCorrect": false, "rationale": "The poem focuses on the psychological burden of pretending happiness in the face of suffering, not on literal secret societies or identity protection in that sense."}, {"text": "To symbolize their freedom and new identity after emancipation.", "isCorrect": false, "rationale": "The mask represents hidden sorrow and deception, a contrast to freedom and new identity. The intro also mentions it expresses 'what it felt like to hide one's true feelings from the world.'"}], "id": "q04"}, {"question": "The central metaphor of a 'caged bird' in Dunbar's poem 'Sympathy' is most effective in conveying what message?", "options": [{"text": "The peaceful existence of animals in captivity, protected from the dangers of the wild.", "isCorrect": false, "rationale": "The poem describes the bird beating its wing 'Till its blood is red on the cruel bars' and singing a 'prayer' for freedom, directly contradicting a peaceful existence."}, {"text": "The joyful expression of song and dance, even in challenging circumstances.", "isCorrect": false, "rationale": "The poem explicitly states the song 'is not a carol of joy or glee, But a prayer that he sends from his heart's deep core,' making this option incorrect."}, {"text": "The deep longing for freedom and the painful struggle against oppressive confinement.", "isCorrect": true, "rationale": "The bird's actions (beating wings, blood on bars, singing a prayer for freedom) and feelings (pain, scars, longing 'would be on the bough a-swing') powerfully convey a yearning for liberty and a struggle against confinement."}, {"text": "The importance of adapting to one's environment, no matter how restrictive.", "isCorrect": false, "rationale": "The bird's actions are a rebellion against adaptation; it 'beats his wing' and 'would be free,' showing resistance rather than acceptance."}], "id": "q05"}, {"question": "Given the 'Did you know' fact about Paul Laurence Dunbar selling his first book to elevator passengers and Frederick Douglass's praise, what can be inferred about Dunbar's early career?", "options": [{"text": "He relied heavily on established literary networks and publishers for his initial success.", "isCorrect": false, "rationale": "Selling books to elevator passengers suggests a grassroots, independent effort, not reliance on established networks, to get his work out initially."}, {"text": "He achieved immediate widespread recognition and financial stability after his first publication.", "isCorrect": false, "rationale": "Working as an elevator operator and selling books himself implies a struggle for recognition and financial stability, not immediate success."}, {"text": "His talent was recognized and supported by influential figures, even as he faced challenges in gaining wider exposure.", "isCorrect": true, "rationale": "Working as an elevator operator and self-distributing indicates challenges, but the praise from Frederick Douglass signifies recognition from an influential figure, even before widespread fame."}, {"text": "His work was primarily popular with European audiences before gaining traction in America.", "isCorrect": false, "rationale": "The text mentions selling books in Dayton, Ohio, and praise from an American figure (Douglass) at a World's Fair in Chicago, not initial popularity with European audiences."}], "id": "q06"}, {"question": "What is Johnsy's specific psychological state and belief system that greatly concerns her doctor and Sue in 'The Last Leaf'?", "options": [{"text": "She is convinced that her illness is untreatable and refuses any medication.", "isCorrect": false, "rationale": "While she lacks will, the text doesn't say she refuses medication, but rather that her lack of will makes the 'pharmacopeia look silly.' Her focus is on the leaves."}, {"text": "She has developed a deep fascination with art and believes it holds the key to her recovery.", "isCorrect": false, "rationale": "Johnsy is an artist, but her current fascination is with the falling ivy leaves, not art as a cure."}, {"text": "She has a superstitious belief that her life is tied to the falling leaves of an ivy vine, and she will die when the last one falls.", "isCorrect": true, "rationale": "Johnsy explicitly states, 'When the last one falls I must go, too,' connecting her survival directly to the ivy leaves, which the doctor refers to as 'lining-up on the side of the undertaker.'"}, {"text": "She believes her friend Sue is conspiring against her and causing her illness.", "isCorrect": false, "rationale": "There is no indication of distrust or conspiracy; Sue is depicted as solicitous and concerned."}], "id": "q07"}, {"question": "The doctor's remark, 'This way people have of lining-up on the side of the undertaker makes the entire pharmacopeia look silly,' indicates what about Johnsy's primary obstacle to recovery?", "options": [{"text": "The ineffectiveness of 19th-century medical treatments for pneumonia.", "isCorrect": false, "rationale": "While medicine had limitations, the doctor is pointing to Johnsy's *attitude* and lack of will, which he feels undermines any medical treatment ('pharmacopeia')."}, {"text": "Her severe nutritional deficiencies caused by poverty.", "isCorrect": false, "rationale": "The text mentions her 'blood thinned by California zephyrs' but doesn't focus on nutritional deficiencies as the primary problem; it's her mental state."}, {"text": "Her psychological surrender and lack of will to live.", "isCorrect": true, "rationale": "The doctor explicitly states her 'chance is for her to want to live' and that her 'lining-up on the side of the undertaker' (i.e., giving up hope) is the problem, directly referring to her psychological state."}, {"text": "The contagious nature of pneumonia in crowded living conditions.", "isCorrect": false, "rationale": "The doctor's statement is about an individual patient's will, not the broader epidemiological context of the disease."}], "id": "q08"}, {"question": "Given O. Henry's reputation as a 'master of the surprise ending,' what can the reader anticipate about the character of Behrman based on his initial description as a 'failure in art'?", "options": [{"text": "He will remain a minor character, serving only as a source of comic relief.", "isCorrect": false, "rationale": "While he has quirky characteristics, O. Henry's style suggests even seemingly minor or failed characters can have a crucial, unexpected role in the twist ending, making him more than just comic relief."}, {"text": "He will finally sell one of his paintings and achieve success, fulfilling his artistic dreams.", "isCorrect": false, "rationale": "While possible, a 'surprise ending' typically involves a more selfless or profound twist, often defying surface appearances, rather than just a straightforward success story for a character described as a 'failure.'"}, {"text": "His artistic 'failure' will ironically become central to a crucial act of selflessness or heroism that impacts Johnsy's fate.", "isCorrect": true, "rationale": "O. Henry's surprise endings often involve characters defying expectations. Behrman being a 'failure in art' sets him up perfectly for an unexpected, significant, and perhaps sacrificial, artistic act that saves Johnsy, which aligns with the typical O. Henry twist."}, {"text": "He will discourage Sue from pursuing her art by highlighting his own struggles.", "isCorrect": false, "rationale": "The narrative sets up Behrman for a more direct interaction with Johnsy's predicament through Sue's request for him to model, and O. Henry's style leans towards a dramatic twist related to the main plot."}], "id": "q09"}, {"question": "Considering all three selections (Booker T. Washington, Paul Laurence Dunbar, O. Henry), which overarching theme is most consistently explored?", "options": [{"text": "The inevitable triumph of justice in the face of adversity.", "isCorrect": false, "rationale": "While some stories show resilience, 'inevitable triumph' is too strong and not consistently present. Dunbar's poems, for instance, focus on ongoing, hidden suffering rather than guaranteed triumph."}, {"text": "The power of education and practical skills to transform lives.", "isCorrect": false, "rationale": "This is central to Washington's section but less directly applied or central to Dunbar's poems or O. Henry's story, which focus more on emotional and survival struggles."}, {"text": "The internal and external struggles for survival, hope, and maintaining one's spirit amidst challenging circumstances.", "isCorrect": true, "rationale": "Washington's account details the struggle of slavery and the hope for freedom; Dunbar's poems depict the struggle against oppression and the longing for freedom/truth; O. Henry's story features Johnsy's struggle against illness and Sue/Behrman's fight to keep her hope alive. This theme broadly covers all three."}, {"text": "The romanticization of poverty and the simple life of artists.", "isCorrect": false, "rationale": "O. Henry's story describes struggling artists but doesn't romanticize their poverty (e.g., Johnsy's grave illness). The other sections do not touch on this theme at all."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
