    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">

        <a href="../../courses/Elementary_Reader.html">&larr; Back to The Open Page</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Open Page &mdash; Chapter 14</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to John Muir in 'My First Summer in the Sierra,' what was his primary, immediate reason for accepting Mr. Delaney's offer to go with his shepherd and flock?", "options": [{"text": "He wanted to escape his monotonous city life.", "isCorrect": false, "rationale": "While Muir certainly longed for the mountains, the text explicitly states his primary immediate concern was money ('money was scarce and I couldn't see how a bread supply was to be kept up') and the opportunity to go to the exact region he desired, which the job offered. Escaping city life is not mentioned as the immediate trigger."}, {"text": "He needed money for supplies and the job offered a way to reach the desired mountain region.", "isCorrect": true, "rationale": "The text states, 'money was scarce and I couldn't see how a bread supply was to be kept up.' Mr. Delaney's offer was for work that would take him to 'the headwaters of the Merced and Tuolumne rivers—the very region I had most in mind.' This directly addresses both the financial need and his desire for mountain exploration."}, {"text": "He was specifically interested in learning about shepherding techniques in the high country.", "isCorrect": false, "rationale": "Muir mentions traveling with a shepherd and flock, but his personal interest is clearly in the mountains themselves, not the shepherding profession. He was 'in the mood to accept work of any kind that would take me into the mountains.'"}, {"text": "He was asked by President Roosevelt to survey the area for a future national park.", "isCorrect": false, "rationale": "The interaction with President Roosevelt happened much later (1903), long after his 'First Summer in the Sierra' in 1869. This option confuses timelines and motivations."}], "id": "q01"}, {"question": "John Muir's profound connection to the Sierra Nevada, described as the mountains being 'in us, kindling enthusiasm' and a source of 'Divine, enduring, unwastable wealth,' later influenced what significant American initiative?", "options": [{"text": "The establishment of the Transcontinental Railroad to improve access to nature.", "isCorrect": false, "rationale": "While the railroad was a significant initiative, it was unrelated to Muir's specific conservation efforts. His focus was on preservation, not necessarily increased access through large infrastructure projects."}, {"text": "The push for scientific research into the geological formation of mountain ranges.", "isCorrect": false, "rationale": "Muir was a keen observer and contributed to understanding nature, but his direct impact was more on conservation policy rather than purely academic geological research funding."}, {"text": "The creation and expansion of national parks, particularly through his advocacy with President Theodore Roosevelt.", "isCorrect": true, "rationale": "The text explicitly states that Muir's writings 'helped convince President Theodore Roosevelt to protect Yosemite as a national park' and that Roosevelt 'signed laws that doubled the number of national parks in the United States' after Muir's influence. This directly links his personal experience and writing to a major conservation effort."}, {"text": "The development of sustainable logging practices in the national forests.", "isCorrect": false, "rationale": "Muir was a preservationist, often opposing resource extraction in natural areas. While sustainable practices are important, they were not the direct outcome of his advocacy; rather, it was the protection of lands as parks."}], "id": "q02"}, {"question": "What unusual circumstance surrounded the widespread publication of Emily Dickinson's poetry?", "options": [{"text": "She actively sought out publishers during her lifetime but was consistently rejected.", "isCorrect": false, "rationale": "The text states she published 'fewer than a dozen poems during her lifetime' and lived a very private life, indicating she did not actively seek widespread publication."}, {"text": "Her poems were discovered in large numbers and published posthumously by her sister.", "isCorrect": true, "rationale": "The reading context explicitly states: 'After her death, her sister Lavinia discovered hundreds of poems sewn into small booklets and hidden in a drawer. Nearly 1,800 poems were discovered in all—a lifetime of secret writing by a poet the world had never heard of.'"}, {"text": "She published her poems anonymously to avoid public scrutiny.", "isCorrect": false, "rationale": "While she published very little, there's no mention of her actively publishing anonymously; rather, the vast majority remained unpublished until after her death."}, {"text": "Her poems were initially considered too unconventional for the literary tastes of her time.", "isCorrect": false, "rationale": "While her style was unconventional, the text does not state this was the reason for her lack of publication during her life; rather, it emphasizes her private nature and the posthumous discovery."}], "id": "q03"}, {"question": "In Emily Dickinson's poem 'Hope Is the Thing with Feathers,' the image of hope singing 'sweetest—in the Gale—is heard—' most effectively conveys which characteristic of hope?", "options": [{"text": "Hope is fragile and easily silenced by life's difficulties.", "isCorrect": false, "rationale": "The line suggests the opposite: hope's song is heard 'sweetest' during a gale, implying its strength and clear presence precisely when conditions are harsh, not its fragility."}, {"text": "Hope thrives only when surrounded by calm and tranquility.", "isCorrect": false, "rationale": "The 'Gale' refers to a storm or adversity, directly contradicting the idea that hope requires calm. Hope's song is sweetest in the midst of trouble."}, {"text": "Hope's true strength and resilience are most evident during times of hardship and adversity.", "isCorrect": true, "rationale": "The 'Gale' symbolizes hardship. The fact that hope's song is 'sweetest' and still heard during such a storm highlights its enduring nature and ability to comfort even in the direst circumstances, demonstrating resilience."}, {"text": "Hope is a fleeting emotion that disappears quickly after a storm passes.", "isCorrect": false, "rationale": "The poem also states hope 'never stops—at all—,' suggesting its continuous nature, not its ephemerality."}], "id": "q04"}, {"question": "Emily Dickinson's poem 'I'm Nobody! Who Are You?' primarily serves as a commentary on the perceived value of:", "options": [{"text": "Social conformity and the dangers of standing out.", "isCorrect": false, "rationale": "The poem actually critiques the 'Somebody' who is 'public—like a Frog— / To tell one's name—the livelong June— / To an admiring Bog!', suggesting a disdain for public notoriety, not a fear of standing out."}, {"text": "The importance of fame and public recognition for personal fulfillment.", "isCorrect": false, "rationale": "The lines 'How dreary—to be—Somebody!' directly contradict the idea that the poem values fame or public recognition."}, {"text": "Individual privacy and the quiet satisfaction of shared anonymity.", "isCorrect": true, "rationale": "The speaker embraces being 'Nobody' and seeks another 'Nobody' to share this state, with the instruction 'Don't tell! they'd advertise—you know!' This clearly champions privacy and a quiet, unheralded existence over public attention."}, {"text": "The struggle for self-identity in a complex modern world.", "isCorrect": false, "rationale": "While identity is a theme, the poem doesn't focus on struggle but rather a deliberate embrace of anonymity and a critique of 'Somebody-ness,' emphasizing privacy rather than a search for identity."}], "id": "q05"}, {"question": "In William Wordsworth's 'I Wandered Lonely as a Cloud,' what 'wealth' do the daffodils ultimately bring to the poet?", "options": [{"text": "An improved understanding of botanical science and plant life.", "isCorrect": false, "rationale": "While the poem describes daffodils, its focus is not on their scientific classification but on their emotional and imaginative impact on the poet."}, {"text": "A tangible financial gain from sharing his experience with others.", "isCorrect": false, "rationale": "The 'wealth' is clearly not monetary; he states 'little thought / What wealth the show to me had brought,' referring to an internal, intangible benefit."}, {"text": "Lasting joy and inspiration that he can recall in moments of solitude.", "isCorrect": true, "rationale": "The poem's final stanza explains: 'For oft, when on my couch I lie / In vacant or in pensive mood, / They flash upon that inward eye / Which is the bliss of solitude; / And then my heart with pleasure fills, / And dances with the daffodils.' This describes a deep, internal, and lasting emotional benefit."}, {"text": "New social connections through sharing the beautiful sight with companions.", "isCorrect": false, "rationale": "The poem begins with 'I wandered lonely as a cloud,' indicating he was alone. The wealth brought is personal and internal, not social."}], "id": "q06"}, {"question": "Robert Frost's 'The Road Not Taken' is often interpreted as an endorsement of choosing the unconventional path. However, a closer reading, particularly of lines like 'Though as for that the passing there / Had worn them really about the same,' and the speaker's 'sigh,' suggests what about the nature of choice?", "options": [{"text": "That some choices are objectively better and more rewarding than others.", "isCorrect": false, "rationale": "The lines 'just as fair' and 'worn them really about the same' suggest the paths were not objectively different in their wear, questioning whether one was truly 'better' or 'less traveled' in reality. The poem is more about the subjective experience and narration of choice."}, {"text": "The inevitability of regret, regardless of the path chosen.", "isCorrect": false, "rationale": "While a 'sigh' can imply regret, it can also imply contemplation or reflection. The poem focuses more on the impact and narrative of choice rather than universal regret."}, {"text": "The subjective nature of memory and how we often rationalize our past decisions as uniquely impactful.", "isCorrect": true, "rationale": "The speaker admits the roads were 'worn them really about the same' but plans to tell his story 'with a sigh' of taking 'the one less traveled by' and that it 'has made all the difference.' This suggests that the 'difference' might be a constructed narrative or rationalization in retrospect, highlighting how we shape our understanding of past choices."}, {"text": "The importance of careful deliberation to find the truly 'less traveled' path.", "isCorrect": false, "rationale": "The poem suggests that the paths were 'really about the same' and that the speaker's claim of choosing the 'less traveled' might be a later embellishment, not a goal achieved through deliberation. The emphasis shifts from the actual choice to the storytelling of it."}], "id": "q07"}, {"question": "What explicit purpose did Henry David Thoreau state for moving to Walden Pond, as described in 'Where I Lived and What I Lived For'?", "options": [{"text": "To establish a self-sufficient farm and demonstrate agricultural independence.", "isCorrect": false, "rationale": "While he built a cabin and lived simply, his stated purpose was not agricultural demonstration. He focused on stripping life down to essentials for philosophical learning, not farming techniques."}, {"text": "To escape legal troubles and live off the grid away from society.", "isCorrect": false, "rationale": "The text provides no indication of legal troubles. His move was a deliberate philosophical experiment, not an escape from legal or social obligations."}, {"text": "To live deliberately, confront the essential facts of life, and avoid living superficially.", "isCorrect": true, "rationale": "Thoreau explicitly states: 'I went to the woods because I wished to live deliberately, to front only the essential facts of life, and see if I could not learn what it had to teach, and not, when I came to die, discover that I had not lived. I did not wish to live what was not life, living is so dear.'"}, {"text": "To write a comprehensive scientific study of the local flora and fauna of the pond.", "isCorrect": false, "rationale": "While he observed nature, his primary goal was philosophical introspection and understanding 'what truly mattered,' not a scientific survey."}], "id": "q08"}, {"question": "Thoreau's philosophy of 'living deliberately' and 'sucking out all the marrow of life' implies a strong emphasis on:", "options": [{"text": "Accumulating material wealth to ensure a comfortable existence.", "isCorrect": false, "rationale": "Thoreau's experiment at Walden was about simplification and stripping life down to essentials, which directly contrasts with the accumulation of material wealth."}, {"text": "Engaging in diverse social activities to broaden one's perspective.", "isCorrect": false, "rationale": "Thoreau lived alone at Walden Pond for two years, seeking to understand life's essentials through solitude and introspection, not extensive social engagement."}, {"text": "Intentional focus on what is truly essential and meaningful in one's existence.", "isCorrect": true, "rationale": "To 'live deliberately' means with conscious purpose, and to 'suck out all the marrow of life' means to extract the deepest meaning and essence. This aligns perfectly with an 'intentional focus on what is truly essential and meaningful.'"}, {"text": "Adhering strictly to societal norms and traditions for stability.", "isCorrect": false, "rationale": "Thoreau's experiment was a radical departure from societal norms, questioning conventional ways of living and working. His philosophy promotes self-reliance and individual truth over tradition."}], "id": "q09"}, {"question": "Which of the featured poets most strongly exemplifies finding profound meaning and wonder through intense, detailed observation of the *ordinary and often overlooked* aspects of nature, rather than through grand, sweeping landscapes?", "options": [{"text": "John Muir, with his descriptions of the vast Sierra Nevada mountains.", "isCorrect": false, "rationale": "Muir indeed finds profound meaning in nature, but his writing focuses heavily on grand, sweeping landscapes, 'snowy peaks,' 'mighty host' of trees, and 'alabaster cloud-mountains,' which are not 'ordinary and often overlooked' in the sense of a small bird."}, {"text": "William Wordsworth, who found bliss in a field of 'ten thousand' dancing daffodils.", "isCorrect": false, "rationale": "While daffodils can be seen as ordinary, Wordsworth's experience is with 'a crowd, A host, of golden daffodils' – a massive, overwhelming display, not a single, subtle observation."}, {"text": "Emily Dickinson, observing a bird on a walk, a beetle, or abstract concepts like hope.", "isCorrect": true, "rationale": "Dickinson's poem 'A Bird Came Down the Walk' is a prime example of intense, detailed observation of a very ordinary event—a bird eating a worm, drinking dew, letting a beetle pass. Her ability to find 'wonder in ordinary things' (as stated in the 'beforeyouread' section) perfectly fits this description, extending even to abstract concepts like hope personified as a 'thing with feathers.'"}, {"text": "Robert Frost, contemplating two paths diverging in a yellow wood.", "isCorrect": false, "rationale": "Frost uses a simple natural scene, but his focus is more on the metaphorical implications of choice and human reflection on that choice, rather than the intrinsic wonder derived from the detailed observation of the natural elements themselves (like a bird's eyes or a dewdrop)."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
