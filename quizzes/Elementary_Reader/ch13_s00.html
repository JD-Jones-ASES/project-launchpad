<script>
var QUESTIONS = [{"question": "Upon his arrival at the inn, the 'captain' in 'Treasure Island' reveals several distinct characteristics and habits. Which of the following best synthesizes his initial portrayal?", "options": [{"text": "He was an amiable, social sailor who enjoyed telling lighthearted stories and making friends.", "isCorrect": false, "rationale": "The text describes him as 'a very silent man by custom' who would 'sometimes force all the trembling company to listen to his stories,' which were 'dreadful stories,' indicating he was neither amiable nor lighthearted."}, {"text": "He was a sickly, timid man who sought a quiet refuge away from the sea.", "isCorrect": false, "rationale": "The description 'tall, strong, heavy, nut-brown man,' with 'hands ragged and scarred' and a 'sabre cut,' contradicts the idea of him being sickly or timid. His request for a 'berth' suggests a temporary stay, not a permanent refuge from his past."}, {"text": "He was a mysterious, intimidating figure with a rough past, seeking solitude but harboring dark secrets.", "isCorrect": true, "rationale": "The captain is described as a 'strong, heavy, nut-brown man' with 'tarry pigtail,' 'scared hands,' and a 'sabre cut,' suggesting a rough past. His silence, constant vigilance ('weather-eye open for a seafaring man with one leg'), and 'dreadful stories' confirm his mysterious, intimidating nature and the presence of dark secrets."}, {"text": "He was a wealthy merchant traveling incognito, looking for a place to conduct business.", "isCorrect": false, "rationale": "The captain's request for 'rum and bacon and eggs' and the mention of him paying Jim a 'silver fourpenny' do not align with the behavior or needs of a wealthy merchant. His appearance and stories suggest a life of piracy, not trade."}]}, {"question": "Jim Hawkins' observation that the captain 'promised me a silver fourpenny if I would only keep my “weather-eye open for a seafaring man with one leg”' primarily serves what purpose in the narrative?", "options": [{"text": "To highlight Jim's financial struggles and his willingness to work for small sums.", "isCorrect": false, "rationale": "While Jim's family runs an inn, the primary purpose of this detail isn't to emphasize his financial struggles, but rather to introduce a key plot point."}, {"text": "To establish the captain's generosity and his care for Jim's well-being.", "isCorrect": false, "rationale": "The captain's primary motivation for the payment is self-preservation and fear, not generosity or care for Jim. He is using Jim for his own safety."}, {"text": "To introduce a crucial element of suspense and foreshadow the arrival of a dangerous character connected to the captain's past.", "isCorrect": true, "rationale": "This detail immediately creates suspense by hinting at a hidden danger and a specific character the captain fears, directly foreshadowing future events and the unfolding adventure related to his pirate past."}, {"text": "To explain why the captain preferred to stay indoors rather than explore the cove.", "isCorrect": false, "rationale": "The text states the captain 'hung round the cove or upon the cliffs with a brass telescope,' indicating he did explore, but with a watchful eye, not to avoid it."}]}, {"question": "In 'Rikki-Tikki-Tavi (Part 1),' Rikki-tikki's family motto is 'Run and find out.' How does this motto exemplify Rikki-tikki's essential nature and drive his actions?", "options": [{"text": "It shows his recklessness and tendency to act without thinking, often putting himself in danger.", "isCorrect": false, "rationale": "While Rikki-tikki is brave, his actions are described as strategic and purposeful, not reckless. His 'curiosity' is framed as a strength for understanding threats, not a flaw leading to thoughtless danger."}, {"text": "It highlights his strong survival instinct, leading him to flee from danger rather than confront it.", "isCorrect": false, "rationale": "The story explicitly states, 'It is the hardest thing in the world to frighten a mongoose.' Rikki's nature is to confront and fight snakes, not flee from them."}, {"text": "It emphasizes his insatiable curiosity and proactive approach to understanding and confronting threats in his environment.", "isCorrect": true, "rationale": "The text states he is 'eaten up from nose to tail with curiosity' and applies this to his immediate investigation of the garden and the discovery of Nag and his threat. This active seeking of information is central to his character and effectiveness."}, {"text": "It suggests his loyalty to his human family, as he runs to find things for them.", "isCorrect": false, "rationale": "While he does protect the family, the motto refers to his inherent curiosity and investigative nature regarding his surroundings and potential threats, not specifically to serving the human family directly."}]}, {"question": "The setting of 'Rikki-Tikki-Tavi (Part 1)' in a bungalow garden in Segowlee cantonment, India, is significant because:", "options": [{"text": "It highlights the contrast between the British colonial lifestyle and the untamed Indian wilderness, a common theme in Kipling's work.", "isCorrect": false, "rationale": "While Kipling did write about British India, the text focuses more on the immediate conflict within the garden rather than a broader commentary on colonial life. The 'readingcontext' notes Kipling's love for India's wildlife and culture, not necessarily a critique of colonialism in this specific section."}, {"text": "It provides a contained environment where a small, domestic animal like a mongoose is safe from larger predators.", "isCorrect": false, "rationale": "The garden, while home-adjacent, is explicitly shown to be teeming with dangerous predators like cobras, making it anything but a safe haven from threats for a mongoose, small or otherwise."}, {"text": "It allows for a direct conflict between the mongoose, a natural predator of snakes, and dangerous cobras that naturally inhabit the region.", "isCorrect": true, "rationale": "The 'Did You Know' section confirms mongooses hunt cobras in India. The garden setting brings these natural adversaries into direct contact, creating the central conflict of the story. Kipling's 'deep love for the wildlife and culture of India' is also mentioned."}, {"text": "It symbolizes the interconnectedness of all creatures, as even a small garden can host a diverse ecosystem.", "isCorrect": false, "rationale": "While a garden is an ecosystem, the story's emphasis is on direct conflict and survival, not merely the diversity or interconnectedness of species."}]}, {"question": "In 'Rikki-Tikki-Tavi (Part 2),' Rikki-tikki's strategy for defeating Nagaina differs significantly from his direct confrontation with Nag. Which statement best describes this shift in strategy and its rationale?", "options": [{"text": "He uses the 'big man's' shotgun again to surprise Nagaina, just as he did with Nag.", "isCorrect": false, "rationale": "The big man's intervention was a surprise. Rikki-tikki's confrontation with Nagaina is primarily a solo effort where he uses psychological warfare and direct combat, without relying on the shotgun."}, {"text": "He waits for Nagaina to fall asleep before attacking her, demonstrating patience.", "isCorrect": false, "rationale": "Rikki-tikki does not wait for Nagaina to sleep; he actively seeks her out and provokes her, particularly by destroying her eggs."}, {"text": "He targets her emotional vulnerability by destroying her eggs, forcing her into a desperate, predictable chase that leads her to her burrow.", "isCorrect": true, "rationale": "Rikki-tikki deliberately destroys Nagaina's eggs, saving only one to use as bait. This act of emotional leverage drives Nagaina into a frenzy, causing her to abandon her attack on Teddy and flee to her hole, where Rikki pursues her for the final confrontation."}, {"text": "He enlists the help of Darzee and Chuchundra to corner Nagaina, overwhelming her with numbers.", "isCorrect": false, "rationale": "Darzee and Chuchundra offer advice and warnings, but Rikki-tikki 'fought single-handed' in the 'great war.' He does not rely on them for direct combat against Nagaina."}]}, {"question": "The 'Did You Know' sections for 'Rikki-Tikki-Tavi' confirm that mongooses are not immune to cobra venom but rely on speed, thick fur, and precise strikes to defeat them. How does this information enhance a reader's understanding of Rikki-tikki's 'great triumph'?", "options": [{"text": "It suggests that Rikki-tikki's victory was largely due to luck rather than skill.", "isCorrect": false, "rationale": "The information emphasizes the mongoose's 'lightning-fast reflexes' and strategic biting 'behind the head,' which highlights skill, not luck, as the basis of their success."}, {"text": "It underscores the immense danger and the extraordinary skill and bravery required for Rikki-tikki to defeat the cobras.", "isCorrect": true, "rationale": "Knowing that mongooses are not immune to venom increases the stakes and highlights that Rikki-tikki's victory is not a given. It showcases his exceptional speed, strategic thinking ('It must be the head'), and 'valiant little tail' (bravery) as crucial to his survival and triumph against a deadly foe."}, {"text": "It implies that Kipling exaggerated the mongoose's abilities for dramatic effect.", "isCorrect": false, "rationale": "The 'Did You Know' section explicitly states, 'Kipling's description of Rikki-tikki's fighting style is remarkably accurate,' indicating the opposite of exaggeration."}, {"text": "It explains why the human family was not concerned about the presence of the cobras.", "isCorrect": false, "rationale": "The human family clearly shows concern, especially when Teddy is threatened. Their welcome of mongooses as 'natural protectors' doesn't mean they're unconcerned about snakes themselves."}]}, {"question": "Rudyard Kipling's poem 'If—' offers a blueprint for an honorable life. What is the overarching message or ultimate reward promised for embodying the qualities listed throughout the poem?", "options": [{"text": "The accumulation of great wealth and widespread fame.", "isCorrect": false, "rationale": "The poem focuses on internal virtues and character ('keep your head,' 'trust yourself,' 'treat those two impostors just the same') rather than external rewards like wealth or fame. It even mentions risking 'all your winnings.'"}, {"text": "The ability to control others and bend them to one's will.", "isCorrect": false, "rationale": "The poem promotes self-control and resilience in the face of others' doubt or hatred, not the power to dominate them."}, {"text": "The attainment of inner peace and freedom from all worldly struggles.", "isCorrect": false, "rationale": "The poem acknowledges and advises on how to navigate struggles ('being lied about,' 'hated,' 'things you gave your life to, broken'), implying struggles are part of life, not something to be entirely free from."}, {"text": "Becoming a truly complete, capable, and honorable person, who will 'own the Earth and everything that's in it' and, more importantly, 'be a Man.'", "isCorrect": true, "rationale": "The final lines explicitly state the reward: 'you'll be a Man, my son!' This signifies becoming a person of ultimate worth and capability, implying mastery over oneself and one's circumstances, represented metaphorically by owning 'the Earth.'"}]}, {"question": "In the poem 'If—,' Kipling advises, 'If you can meet with Triumph and Disaster / And treat those two impostors just the same.' What is the most accurate interpretation of 'impostors' in this context?", "options": [{"text": "That success and failure are illusions and do not truly exist in reality.", "isCorrect": false, "rationale": "The poem doesn't deny the existence of triumph or disaster but rather counsels on how to react to them. They are real events with real consequences."}, {"text": "That both extreme success and extreme failure can deceive you into misjudging your true worth or the situation's true significance.", "isCorrect": true, "rationale": "An 'impostor' is someone who pretends to be something they are not. In this context, Kipling warns that both triumph and disaster can mislead us into becoming arrogant or despairing, causing us to lose perspective on our character and the temporary nature of these states."}, {"text": "That people who celebrate triumph or despair in disaster are faking their emotions.", "isCorrect": false, "rationale": "The 'impostors' refer to the concepts of triumph and disaster themselves, not the people experiencing them or their emotions."}, {"text": "That it is impossible to genuinely experience either great victory or profound loss.", "isCorrect": false, "rationale": "The poem clearly acknowledges 'great victory' (Triumph) and the negative impact of 'Disaster,' so it does not suggest these experiences are impossible or not genuine."}]}, {"question": "Consider the advice from 'If—': 'If you can trust yourself when all men doubt you, / But make allowance for their doubting too.' In a professional setting, how would an individual best apply this counsel?", "options": [{"text": "By rigidly sticking to their own ideas, refusing to consider any feedback from colleagues.", "isCorrect": false, "rationale": "This contradicts 'make allowance for their doubting too,' which implies openness to understanding others' perspectives, even if ultimately maintaining one's own conviction."}, {"text": "By doubting their own judgment if even one colleague expresses skepticism.", "isCorrect": false, "rationale": "This goes against 'trust yourself when all men doubt you.' The advice is to maintain self-trust."}, {"text": "By confidently pursuing their vision while also actively listening to and thoughtfully evaluating constructive criticism from others.", "isCorrect": true, "rationale": "This option perfectly balances 'trust yourself' (confidently pursuing their vision) with 'make allowance for their doubting too' (actively listening to and evaluating criticism), demonstrating both self-belief and intellectual humility."}, {"text": "By avoiding situations where their ideas might be questioned by others.", "isCorrect": false, "rationale": "This is an avoidance strategy and doesn't engage with the challenge of 'all men doubt you,' nor does it demonstrate the balance of self-trust and allowance for others' views."}]}, {"question": "Both Robert Louis Stevenson and Rudyard Kipling, authors featured in this unit, were inspired by personal experiences or observations. Which statement accurately compares their respective inspirations for the works presented?", "options": [{"text": "Both authors were inspired by their experiences living in distant lands with diverse cultures.", "isCorrect": false, "rationale": "While Kipling was inspired by his childhood in India for 'The Jungle Book,' Stevenson's inspiration for 'Treasure Island' was a map he drew in Scotland, not extensive foreign travel."}, {"text": "Stevenson's 'Treasure Island' was born from a creative game with his stepson, while Kipling's 'If—' was direct advice to his son.", "isCorrect": true, "rationale": "The 'Did You Know' section states 'Treasure Island began as a game' and 'Stevenson drew a colorful map...for his twelve-year-old stepson.' The 'before you read' for 'If—' clearly states 'Rudyard Kipling wrote this poem as advice to his son, John.' This accurately reflects their respective inspirations."}, {"text": "Both authors wrote to document historical events and provide factual accounts of adventure.", "isCorrect": false, "rationale": "Both works are fictional narratives or philosophical poems, not factual historical documentation. They are 'tales of adventure,' not historical reports."}, {"text": "Their works were primarily inspired by political unrest and social commentary in their native countries.", "isCorrect": false, "rationale": "The provided text focuses on personal inspirations like a map, a son, and wildlife, not political unrest or social commentary for these specific works."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
