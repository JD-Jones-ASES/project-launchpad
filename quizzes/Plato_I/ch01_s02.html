<script>
var QUESTIONS = [{"question": "The term \"pre-Socratics\" is primarily used to classify a diverse group of early Greek philosophers based on what criterion?", "options": [{"text": "Their shared belief that the arche of all things was water.", "isCorrect": false, "rationale": "While Thales, a prominent pre-Socratic, believed water was the arche, other pre-Socratics like Anaximander, Anaximenes, and Parmenides proposed different archai or even denied the concept of a changing arche, so this was not a shared belief."}, {"text": "Their chronological placement and the revolutionary impact of Socrates on subsequent philosophy.", "isCorrect": true, "rationale": "The text states, \"Later generations would call them the pre-Socratics — 'the ones who came before Socrates' — because Socrates marked such a turning point that everyone before him was grouped together.\" This indicates their classification is primarily chronological and due to Socrates' historical significance."}, {"text": "Their focus on ethical questions concerning the human soul and conduct.", "isCorrect": false, "rationale": "The text explicitly contrasts this, stating that Socrates marked 'the moment when philosophy stopped looking at the stars and started looking at the human soul,' implying the pre-Socratics generally focused on the natural world, not primarily ethics or the soul."}, {"text": "Their universal agreement on the concept of 'logos' as the underlying rational principle of the cosmos.", "isCorrect": false, "rationale": "While Heraclitus famously used the concept of 'logos,' it was not universally adopted or understood in the same way by all pre-Socratics, who held diverse views, and the term 'logos' itself has multiple meanings."}], "id": "q01"}, {"question": "In the context of the Milesian philosophers, the term \"arche\" (sometimes spelled archē or arché) refers to:", "options": [{"text": "A divine being or a pantheon of gods responsible for creating the world.", "isCorrect": false, "rationale": "The text explicitly states that the pre-Socratics shifted from mythological explanations to rational ones, seeking a 'natural rather than mythological answer' for the world's origin, making this option incorrect."}, {"text": "The fundamental substance or first principle from which everything in the universe derives.", "isCorrect": true, "rationale": "The text defines 'arche' as 'the \"beginning,\" \"origin,\" or \"first principle\" of all things' and specifies that 'The pre-Socratics used this word to mean the fundamental substance or principle from which everything in the universe derives.'"}, {"text": "The ultimate purpose or final goal toward which all natural processes strive.", "isCorrect": false, "rationale": "While 'arche' means 'beginning' or 'origin,' it refers to the material or foundational principle, not the teleological (purposeful) end. This concept of final cause was more developed by later philosophers like Aristotle."}, {"text": "A complex mathematical model used to predict astronomical events.", "isCorrect": false, "rationale": "The text notes that the Milesians 'were not building mathematical models' and were 'reasoning about the nature of reality from first principles,' not primarily focused on predictive modeling in a scientific sense."}], "id": "q02"}, {"question": "Which of the following best describes the fundamental difference between the Milesians' approach to understanding the natural world and what is typically considered modern scientific methodology?", "options": [{"text": "The Milesians exclusively relied on divine revelation, whereas modern science relies on empirical observation.", "isCorrect": false, "rationale": "The text clarifies that pre-Socratics moved away from divine/mythological explanations. While they didn't conduct formal experiments, they engaged in rational inquiry based on observation and logic, laying groundwork for science, not divine revelation."}, {"text": "The Milesians sought to identify a single, fundamental 'arche' through reasoned argument, while modern science employs experimentation and mathematical models to explain phenomena.", "isCorrect": true, "rationale": "The text states the Milesians 'were not performing experiments. They were not building mathematical models. They were reasoning about the nature of reality from first principles.' This highlights their deductive, reason-based search for a fundamental 'arche' versus modern science's empirical, experimental, and mathematical approach."}, {"text": "Modern science focuses on explaining only observable phenomena, while the Milesians explored non-physical, spiritual aspects of reality.", "isCorrect": false, "rationale": "The Milesians were 'investigators of nature' (physikoi) and sought natural, not supernatural, explanations for the physical world, aligning more with the 'observable phenomena' aspect, even if their methods differed from modern science."}, {"text": "The Milesians aimed to understand the world for practical applications, whereas modern science is purely theoretical.", "isCorrect": false, "rationale": "While Thales had practical achievements, the text emphasizes the Milesians' pursuit of fundamental philosophical questions ('what is everything made of?'), not primarily practical applications. Modern science, while theoretical, also has significant practical applications."}], "id": "q03"}, {"question": "Among the Milesian philosophers, which one proposed that qualitative differences in the world (e.g., fire, water, earth) could be explained by quantitative changes (rarefaction and condensation) in a single fundamental substance?", "options": [{"text": "Thales", "isCorrect": false, "rationale": "Thales proposed water as the arche, but his contribution was primarily asking the question and seeking a natural answer, not explaining qualitative changes through quantitative processes like rarefaction and condensation."}, {"text": "Anaximander", "isCorrect": false, "rationale": "Anaximander proposed the apeiron ('boundless' or 'indefinite') as the arche, arguing against specific elements. He did not explain qualitative changes through condensation and rarefaction of a concrete substance."}, {"text": "Anaximenes", "isCorrect": true, "rationale": "The text states: 'Anaximenes... returned to a concrete answer: the arche is air. By becoming thinner (rarefaction), air becomes fire; by becoming thicker (condensation), it becomes wind, cloud, water, earth, and stone. Anaximenes' contribution was the idea that qualitative differences in the world could be explained by quantitative changes in a single substance.'"}, {"text": "Heraclitus", "isCorrect": false, "rationale": "Heraclitus was not a Milesian, and while he spoke of fire as a primary element, his focus was on constant flux and the governing 'logos,' not explaining qualitative changes via rarefaction and condensation of a single substance."}], "id": "q04"}, {"question": "The central philosophical tension between Heraclitus and Parmenides primarily concerned:", "options": [{"text": "The existence of the gods and their influence on human affairs.", "isCorrect": false, "rationale": "Both Heraclitus and Parmenides, like other pre-Socratics, were engaged in moving from mythos to logos, seeking natural or logical explanations, not debating the existence or influence of traditional gods."}, {"text": "Whether the fundamental substance of reality was water or air.", "isCorrect": false, "rationale": "This was a debate among the Milesians (Thales, Anaximenes). Heraclitus spoke of fire and logos, while Parmenides argued for an unchanging 'Being,' moving beyond specific material archai."}, {"text": "The nature of change and permanence in the world.", "isCorrect": true, "rationale": "The text explicitly states: 'If the Milesians asked what the world is made of, the next generation asked an even deeper question: does the world change, or does it stay the same? Two thinkers gave opposite answers... Heraclitus taught that everything is in flux... Parmenides... argued that change is impossible.'"}, {"text": "The ethical principles governing a just society.", "isCorrect": false, "rationale": "While ethical questions became central for Socrates, the pre-Socratics, including Heraclitus and Parmenides, were primarily concerned with cosmology and metaphysics (the nature of reality)."}], "id": "q05"}, {"question": "How did Plato, as mentioned in the text, attempt to resolve the philosophical dilemma posed by Heraclitus's and Parmenides' opposing views on change and permanence?", "options": [{"text": "By completely rejecting the concept of change and affirming Parmenides' view that all motion is an illusion.", "isCorrect": false, "rationale": "Plato did not completely reject change. The text states he believed 'the physical world does change (Heraclitus),' acknowledging Heraclitus's insight about the sensory world."}, {"text": "By arguing that both views were incorrect and proposing that reality is an ever-evolving, unpredictable chaos.", "isCorrect": false, "rationale": "Plato's theory of Forms sought order and stable knowledge, not chaos. He believed both were 'partly right' and sought to reconcile them, not dismiss both."}, {"text": "By proposing that the physical world is constantly changing (Heraclitus), but there exists an unchanging realm of Forms that is the true object of knowledge (Parmenides).", "isCorrect": true, "rationale": "The text explicitly states: 'Plato's great insight was to argue that both were partly right: the physical world does change (Heraclitus), but behind it lies an unchanging reality — the world of Forms — that is the true object of knowledge (Parmenides).'"}, {"text": "By asserting that only observable, empirical changes are real, and any discussion of unchanging reality is mere speculation.", "isCorrect": false, "rationale": "Plato's Theory of Forms posits an unobservable, unchanging reality as the 'true object of knowledge,' contrasting with a purely empirical focus."}], "id": "q06"}, {"question": "Beyond his contributions to mathematics, Pythagoras is noted for introducing what distinctive philosophical and religious doctrine that later influenced Plato?", "options": [{"text": "The idea that the 'apeiron' is the fundamental substance of the universe.", "isCorrect": false, "rationale": "The 'apeiron' was proposed by Anaximander, a Milesian, not Pythagoras."}, {"text": "The belief in the immortality and transmigration of the soul.", "isCorrect": true, "rationale": "The text states: 'Pythagoras also taught the immortality and transmigration of the soul... a doctrine that deeply influenced Plato and appears in several of his dialogues.'"}, {"text": "The theory that all physical objects are composed of indivisible 'atoms'.", "isCorrect": false, "rationale": "The atomic theory was developed by Democritus and Leucippus, not Pythagoras."}, {"text": "The concept of 'logos' as the rational order governing all change.", "isCorrect": false, "rationale": "The concept of 'logos' as a governing principle of change is primarily associated with Heraclitus."}], "id": "q07"}, {"question": "Democritus's atomic theory presented a purely materialist view of reality, stating that everything is composed of indivisible \"atoms\" and the void. What was a primary philosophical implication of this view that put it in opposition to later thinkers like Socrates and Plato?", "options": [{"text": "It implied that the universe was governed by a divine mind (nous) rather than random motion.", "isCorrect": false, "rationale": "Democritus's theory posited that variety resulted from 'different arrangements of these invisible atoms moving through empty space,' which implies a materialist, mechanistic view, not governance by a divine mind (nous, a concept introduced by Anaxagoras)."}, {"text": "It suggested that change was impossible, aligning with Parmenides' immutable 'Being'.", "isCorrect": false, "rationale": "Democritus's atoms are in motion, and their rearrangement creates the 'variety of the visible world,' which implies change, in contrast to Parmenides' view."}, {"text": "It reduced non-physical concepts like the soul, goodness, and beauty to the motion and arrangement of matter.", "isCorrect": true, "rationale": "The text states: 'The atomists offered a purely materialist account of reality: there is nothing but atoms and the void. Socrates and Plato were deeply opposed to this view, arguing that the soul, goodness, and beauty are real and cannot be reduced to the motion of matter.'"}, {"text": "It emphasized that human knowledge is derived solely from sensory experience and is therefore always certain.", "isCorrect": false, "rationale": "While atomism implies a reliance on the physical world, the text does not claim it made knowledge 'always certain,' and the debate was more about the *nature* of reality (material vs. non-material) rather than epistemology (how we know)."}], "id": "q08"}, {"question": "The pre-Socratic shift from \"mythos\" to \"logos\" represents a fundamental change in human thought, best characterized as a transition from:", "options": [{"text": "Explaining natural events through divine narratives to explaining them through reasoned argument and observation.", "isCorrect": true, "rationale": "The text explicitly defines this shift: 'Before the pre-Socratics, Greeks explained natural events through mythos — stories about the gods... The pre-Socratics proposed a different approach: logos — reasoned argument based on observation and logic.'"}, {"text": "Relying on philosophical theories to accepting scientific experiments as the sole source of truth.", "isCorrect": false, "rationale": "The text states the Milesians 'were not performing experiments' and clarifies that pre-Socratic thought was philosophy, not science, though science grew out of it. It wasn't a direct leap to scientific experimentation."}, {"text": "A focus on the material world to an exclusive focus on spiritual and ethical concerns.", "isCorrect": false, "rationale": "The pre-Socratics largely focused on the 'natural world' or 'physis,' which is material. The shift to spiritual/ethical concerns is associated more with Socrates. This option inverts the actual transition in focus."}, {"text": "Dogmatic adherence to tradition to open-minded acceptance of all beliefs.", "isCorrect": false, "rationale": "While the shift was revolutionary, 'logos' emphasizes reasoned argument, which implies critical evaluation and not necessarily an 'open-minded acceptance of all beliefs' indiscriminately."}], "id": "q09"}, {"question": "According to the text, understanding the pre-Socratics is crucial for studying later philosophers like Socrates and Plato primarily because:", "options": [{"text": "The pre-Socratics provided definitive answers to all philosophical questions, which Socrates and Plato merely reiterated.", "isCorrect": false, "rationale": "The text indicates the pre-Socratics initiated questions and debates (like Heraclitus vs. Parmenides), which Plato later tried to solve, rather than providing definitive answers. Socrates was a 'turning point' from their focus, not a reiteration."}, {"text": "Socrates and Plato completely rejected pre-Socratic ideas, making it essential to understand what they opposed.", "isCorrect": false, "rationale": "While they opposed some views (like Democritus's materialism), Plato built upon the pre-Socratic debate of change/permanence, and Socrates' method grew from their tradition, indicating influence rather than complete rejection."}, {"text": "Their concepts and problems, such as the nature of reality and the method of rational inquiry, formed the foundational context for Socrates' methods and Plato's theories.", "isCorrect": true, "rationale": "The text explains: 'Socrates did not philosophize in a vacuum. When he cross-examines... he is using a method... that grows directly out of the pre-Socratic tradition. When Plato later develops the Theory of Forms, he is trying to solve the problem of Heraclitus and Parmenides.'"}, {"text": "The pre-Socratics were the first to record their dialogues, setting a literary precedent for Plato.", "isCorrect": false, "rationale": "The text does not mention pre-Socratics recording dialogues, and Plato's use of dialogue form is more specifically linked to Socrates. The importance is philosophical context, not literary form."}], "id": "q10"}, {"question": "Pythagoras taught the transmigration of souls ($metempsychosis$), a doctrine with far-reaching consequences. Which later Platonic concept does this doctrine most directly prefigure?", "options": [{"text": "The Theory of Forms — the idea that abstract universals exist independently of physical particulars.", "isCorrect": false, "rationale": "While Pythagoras influenced Plato broadly, the Theory of Forms is more directly prefigured by the Heraclitus-Parmenides debate about change and permanence. Soul transmigration specifically prefigures the doctrine of recollection and the immortal soul."}, {"text": "Plato's doctrine that the soul is immortal and that learning is a process of recollection ($anamnesis$) of knowledge the soul already possesses.", "isCorrect": true, "rationale": "Pythagorean soul transmigration — the soul persisting through multiple lives — directly prefigures Plato's argument in the Meno and Phaedo that the soul is immortal and that knowledge is recollection of what the soul learned before birth."}, {"text": "The Allegory of the Cave — the idea that ordinary people are trapped in ignorance like prisoners unable to see the sun.", "isCorrect": false, "rationale": "The Allegory of the Cave is more directly related to the epistemological contrast between doxa and episteme, and the philosopher's role in society — not specifically to soul transmigration."}, {"text": "The philosopher-king ideal — the belief that only those trained in mathematics should govern the city.", "isCorrect": false, "rationale": "While Pythagoras' mathematical emphasis influenced Plato's view of the philosopher's training, the philosopher-king concept is not specifically a consequence of soul transmigration."}], "id": "q11"}, {"question": "The text states that Democritus' atomic theory was 'in some ways a remarkable anticipation of modern physics.' Yet Socrates and Plato were 'deeply opposed' to it. What was the core philosophical objection?", "options": [{"text": "Democritus claimed atoms were too small to observe, which Socrates rejected as mere speculation without argumentative support.", "isCorrect": false, "rationale": "The text does not record Socrates objecting to the unobservability of atoms. The core objection was about what atomism left out — non-physical reality — not about whether atoms could be seen."}, {"text": "Democritus relied entirely on mythological imagery, which contradicted the logos-based inquiry Socrates championed.", "isCorrect": false, "rationale": "Democritus was firmly in the logos tradition, not the mythos tradition. The dispute was not about method but about whether material explanations were sufficient."}, {"text": "Atomism reduced the soul, goodness, and beauty to mere material arrangements, leaving no room for non-physical moral or metaphysical realities.", "isCorrect": true, "rationale": "The text states: 'Socrates and Plato were deeply opposed to this view, arguing that the soul, goodness, and beauty are real and cannot be reduced to the motion of matter.' Atomism threatened to make ethics and the soul merely physical phenomena."}, {"text": "Democritus denied that change was real, which conflicted with Socrates' belief in moral progress and improvement.", "isCorrect": false, "rationale": "It was Parmenides who denied real change. Democritus' atoms are constantly in motion — change is fundamental to his system."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
