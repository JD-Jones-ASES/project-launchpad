<script>
var QUESTIONS = [{"question": "What is the dramatic setting of the Crito, and why is Socrates still alive a month after his conviction?", "options": [{"text": "Socrates is in a temple, protected by religious sanctuary, and Athens cannot legally arrest him there.", "isCorrect": false, "rationale": "Socrates is not in a temple. He is in prison. The delay is caused by a different religious custom."}, {"text": "It is early morning in Socrates' prison cell. He is alive because Athens sent its sacred ship to Delos before his sentencing, and no executions may take place until the ship returns.", "isCorrect": true, "rationale": "Each year Athens sent a ceremonial ship to Delos to honor Apollo. During the voyage, the city was considered ritually pure and no executions could be carried out. This custom bought Socrates roughly thirty days between sentencing and death."}, {"text": "Socrates has been released on bail and is at his home, where Crito visits him to discuss an appeal.", "isCorrect": false, "rationale": "Socrates has not been released. He is in his prison cell, and there was no appeals process in Athenian law."}, {"text": "Socrates is in prison, but his execution has been delayed because the jury is reconsidering the verdict.", "isCorrect": false, "rationale": "Athenian juries did not reconsider verdicts. The delay is due to the religious custom of the Delian voyage."}]}, {"question": "What are the main arguments Crito presents in favor of Socrates escaping from prison?", "options": [{"text": "That Socrates' philosophical teachings were wrong and he should recant them, and that the gods have sent a sign approving escape.", "isCorrect": false, "rationale": "Crito never asks Socrates to recant his teachings, nor does he claim divine approval for escape. His arguments are practical and emotional."}, {"text": "That public opinion will blame Crito for not saving his friend; that Socrates' children will grow up fatherless; that escape is practically easy; and that the trial was unjust.", "isCorrect": true, "rationale": "Crito makes four main arguments: concern about his own reputation, the welfare of Socrates' three sons, the ease of the escape plan (with money and safe houses arranged), and the injustice of the conviction."}, {"text": "That the Laws of Athens have been corrupted and no longer deserve obedience, and that Socrates could do more good alive than dead.", "isCorrect": false, "rationale": "Crito does not argue that the Laws are fundamentally corrupted. His arguments center on personal loyalty, family duty, practicality, and the injustice of this particular verdict."}, {"text": "That Socrates should escape to Sparta, where his philosophical method would be better appreciated by the Spartans.", "isCorrect": false, "rationale": "Crito mentions Thessaly as a destination where safe houses are prepared, not Sparta. His arguments focus on personal and family concerns, not philosophical appreciation."}]}, {"question": "How does Socrates counter Crito's argument that public opinion will blame Crito for not saving him?", "options": [{"text": "He admits that public opinion matters and suggests Crito issue a public statement explaining the situation.", "isCorrect": false, "rationale": "Socrates does not concede that public opinion matters. He challenges the very premise that the crowd's opinion should guide decisions."}, {"text": "He uses the analogy of an athlete in training: just as an athlete should follow only the expert trainer and not the general public about diet and exercise, we should trust the expert on moral matters rather than the crowd.", "isCorrect": true, "rationale": "Socrates argues that if we would not trust the crowd with our physical health, why would we trust them with the far more important health of our soul? Only the expert's opinion on right and wrong counts, not the opinions of the many."}, {"text": "He tells Crito that public opinion is irrelevant because the gods will vindicate them both after death.", "isCorrect": false, "rationale": "Socrates does not appeal to divine vindication. His argument is based on the rational distinction between expert knowledge and popular opinion."}, {"text": "He argues that Crito's wealth will protect him from any social consequences regardless of what people think.", "isCorrect": false, "rationale": "Socrates does not appeal to Crito's wealth as protection. He challenges the very relevance of public opinion to moral decision-making."}]}, {"question": "What is Socrates' central moral principle in the Crito -- the principle that governs his entire decision about escape?", "options": [{"text": "That one should always prioritize the survival of one's family above all other considerations.", "isCorrect": false, "rationale": "Socrates explicitly refuses to prioritize survival -- his own or his family's -- over doing what is right. He argues the soul matters more than the body."}, {"text": "That it is never right to do wrong, even in response to wrong done to us -- doing wrong damages your own soul, regardless of what was done to you first.", "isCorrect": true, "rationale": "Socrates argues that returning injustice for injustice is always wrong. This principle is radical: most people believe retaliation is sometimes justified, but Socrates says the soul is more important than the body, and doing wrong corrupts the soul."}, {"text": "That the will of the gods must always be obeyed, and the gods have decreed that Socrates must die.", "isCorrect": false, "rationale": "While Socrates references the divine at the end of the dialogue, his central argument is based on rational moral principles about justice, not a direct divine decree about his death."}, {"text": "That all human laws are perfectly just and must be obeyed without question in every circumstance.", "isCorrect": false, "rationale": "Socrates acknowledges that his verdict was wrong. His argument is not that all laws are just, but that even an unjust verdict must be accepted once the legal process has run its course."}]}, {"question": "In the Allegory of the Laws, the personified Laws of Athens present four arguments for why Socrates should not escape. Which of the following best describes the 'social contract' argument?", "options": [{"text": "Socrates signed a written legal document promising to obey all Athenian laws for the rest of his life.", "isCorrect": false, "rationale": "There was no written document. The 'social contract' is an unwritten, implicit agreement based on Socrates' voluntary choice to live in Athens."}, {"text": "By choosing to live in Athens for seventy years, raising his children there, and enjoying its institutions when he was free to leave at any time, Socrates implicitly agreed to abide by the Laws' authority -- even when their judgments went against him.", "isCorrect": true, "rationale": "The Laws argue that Socrates was never forced to stay. He could have emigrated to any other city. By voluntarily remaining for seven decades, he entered into an implicit agreement to obey the laws. This is one of the earliest statements of social contract theory."}, {"text": "All Athenian citizens were required to swear a public oath of obedience to every law, and Socrates broke this oath by questioning the gods.", "isCorrect": false, "rationale": "The social contract argument is not about a formal oath but about Socrates' voluntary, lifelong choice to remain in Athens as a citizen."}, {"text": "The social contract means that citizens may disobey any law they personally consider unjust, as long as they are willing to face the consequences.", "isCorrect": false, "rationale": "The Laws' version of the social contract does not permit disobedience. The choice is binary: persuade the Laws that they are wrong, or obey them."}]}, {"question": "According to the Laws in the Crito, what is the only legitimate alternative to obeying a law you believe is unjust?", "options": [{"text": "Violent revolution to overthrow the unjust government.", "isCorrect": false, "rationale": "The Laws do not offer revolution as an option. Their framework is persuade or obey, not resist or revolt."}, {"text": "Persuasion -- working within the system to convince the Laws they are wrong -- but never simple disobedience.", "isCorrect": true, "rationale": "The Laws offer one qualification: if a citizen believes a law is unjust, he has every right to try to change it through argument and persuasion. But he may not simply disobey. Socrates had his chance to persuade at the trial; now he must accept the result."}, {"text": "Emigrating to another city immediately, since staying means automatic consent to every future law.", "isCorrect": false, "rationale": "While the Laws note that Socrates was always free to leave, emigration is presented as a past option, not as the remedy for disagreeing with a specific judgment. The active alternative to obedience is persuasion."}, {"text": "Appealing to a higher court, since Athens had a system of judicial review for unjust verdicts.", "isCorrect": false, "rationale": "Athens had no appeals courts or system of judicial review. The jury's verdict was final."}]}, {"question": "How does the text characterize the difference between Crito and Socrates as interlocutors in this dialogue?", "options": [{"text": "Crito is a hostile opponent who wants Socrates to suffer, while Socrates calmly defeats his arguments.", "isCorrect": false, "rationale": "Crito is not hostile at all. He is a devoted friend driven by loyalty, fear, and grief, begging Socrates to save his life."}, {"text": "Crito is driven by loyalty, fear, and grief as a practical man and devoted friend, while Socrates is driven by reason -- making this a conversation between two people who genuinely care about each other.", "isCorrect": true, "rationale": "Unlike the Euthyphro or Apology, the Crito is a dialogue between friends who love each other. Crito is not a philosopher but a wealthy, generous, devoted friend. The emotional power of the dialogue comes from Socrates gently but firmly explaining to someone who loves him why he cannot escape."}, {"text": "Both men are equally committed to philosophical reasoning, but they simply reach different conclusions about the same evidence.", "isCorrect": false, "rationale": "The text explicitly says Crito is not a philosopher. He is a practical man whose arguments come from emotional loyalty, not philosophical reasoning."}, {"text": "Crito is Socrates' student who has mastered the Socratic method and uses it against his teacher.", "isCorrect": false, "rationale": "Crito does not use the Socratic method. His arguments are practical and emotional -- think of your children, think of your reputation. Socrates is the one who redirects the conversation toward philosophical reasoning."}]}, {"question": "What device does Plato use when Socrates asks Crito to imagine the Laws of Athens speaking, and why is it so effective?", "options": [{"text": "It is called 'syllogism' -- a formal logical proof that the Laws are correct, presented in three steps.", "isCorrect": false, "rationale": "A syllogism is a form of deductive reasoning. The device Plato uses is prosopopoeia -- giving a voice to something that cannot literally speak."}, {"text": "It is called 'prosopopoeia' -- giving a voice to an abstract idea that cannot literally speak -- and it makes the philosophical arguments vivid and personal by having the Laws step forward like characters in a play.", "isCorrect": true, "rationale": "Prosopopoeia makes the Laws speak with the authority of parents, the logic of philosophers, and the solemnity of judges. It is one of the most dramatic and powerful moments in all of Plato's dialogues."}, {"text": "It is called 'dialectic' -- a back-and-forth debate between Socrates and the actual written laws of Athens.", "isCorrect": false, "rationale": "Dialectic is a method of philosophical inquiry through dialogue. The specific device of giving the Laws a voice to speak is prosopopoeia."}, {"text": "It is called 'allegory' -- a symbolic story in which the Laws represent Socrates' fear of death.", "isCorrect": false, "rationale": "The Laws do not symbolize fear of death. They represent the legal and political order of Athens, and the device of giving them a voice is specifically prosopopoeia."}]}, {"question": "Thrasymachus in the Republic argues that 'justice is nothing but the interest of the stronger.' How does this challenge undermine Socrates' position in the Crito?", "options": [{"text": "It proves that Socrates is physically weaker than his accusers and therefore cannot resist them.", "isCorrect": false, "rationale": "Thrasymachus' argument is not about physical strength. It is about how those in power design laws to benefit themselves and call obedience 'justice.'"}, {"text": "If laws are merely tools of domination created by the powerful to serve themselves, then Socrates' social contract is not a fair agreement but a trap -- he is dying for a principle that is nothing more than a convenient fiction.", "isCorrect": true, "rationale": "Thrasymachus argues that rulers design laws to benefit themselves and label obedience 'justice.' If this is true, then the Laws of Athens did not raise Socrates out of benevolence but shaped him into a compliant citizen serving others' interests -- making his decision to obey them deeply misguided."}, {"text": "It shows that Socrates should have become a tyrant himself instead of submitting to the law.", "isCorrect": false, "rationale": "Thrasymachus' challenge does not recommend tyranny for Socrates. It questions whether 'justice' has any real meaning beyond the interests of those in power."}, {"text": "It demonstrates that the Athenian jury was corrupt and therefore Socrates was right to stay in prison.", "isCorrect": false, "rationale": "Thrasymachus' argument actually undermines Socrates' decision to stay, not supports it. If justice is merely the interest of the stronger, then obeying the verdict is foolish, not noble."}]}, {"question": "How does the text compare the social contract ideas of Hobbes, Locke, and Rousseau in relation to Socrates' decision in the Crito?", "options": [{"text": "All three agree that Socrates was correct to stay in prison, since the social contract is absolute and can never be broken.", "isCorrect": false, "rationale": "The three thinkers disagree sharply. Only Hobbes would likely approve of Socrates' decision. Locke might argue Socrates was justified in escaping, and Rousseau would be torn."}, {"text": "Hobbes would likely approve (disobedience collapses the social order); Locke might challenge Socrates (a government that executes an innocent man has broken the contract first); Rousseau would be torn (depending on whether the verdict reflected the genuine general will).", "isCorrect": true, "rationale": "The text maps three positions onto the Crito debate: Hobbes valued order above all and would side with Socrates. Locke believed natural rights limit government authority and might justify escape. Rousseau's answer depends on whether the conviction expressed the authentic will of the community or mere prejudice."}, {"text": "Hobbes and Locke both would have told Socrates to escape, while Rousseau alone would have supported staying.", "isCorrect": false, "rationale": "This reverses the positions. Hobbes, who feared anarchy above all, would most likely approve of Socrates' obedience. Locke, the champion of natural rights, might have justified escape."}, {"text": "All three thinkers argued that Socrates should have escaped, since his trial violated fundamental principles of justice recognized by all social contract theories.", "isCorrect": false, "rationale": "The three thinkers would have responded differently based on their distinct theories. They agreed that government rests on consent but disagreed on what happens when government acts unjustly."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
