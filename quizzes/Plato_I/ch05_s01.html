<script>
var QUESTIONS = [{"question": "What does Alfred North Whitehead's statement, \"The safest general characterization of the European philosophical tradition is that it consists of a series of footnotes to Plato,\" primarily suggest about Plato's influence?", "options": [{"text": "Most Western philosophers merely copied Plato's doctrines without alteration.", "isCorrect": false, "rationale": "The text explicitly states that Whitehead was not saying every Western philosopher simply repeated what Plato said, citing Aristotle, Aquinas, and Kant as examples of those who disagreed or reworked his ideas."}, {"text": "The fundamental questions Plato posed continue to drive philosophical inquiry and debate.", "isCorrect": true, "rationale": "The text clarifies that Whitehead meant 'the questions Plato asked are still the questions philosophers argue about today,' emphasizing that subsequent thinkers have had to respond to these enduring questions."}, {"text": "Plato's specific answers to philosophical problems have remained universally accepted.", "isCorrect": false, "rationale": "The text notes that Aristotle rejected the Theory of Forms and other philosophers challenged Plato's ideas, indicating that his answers were not universally accepted but served as starting points for debate."}, {"text": "Later philosophers primarily focused on minor elaborations of Plato's less significant ideas.", "isCorrect": false, "rationale": "Whitehead's statement implies a foundational and broad influence, not a focus on minor elaborations. The questions Plato posed are described as 'living questions' of full philosophical rigor."}]}, {"question": "The Crito dialogue, where Socrates insists on obeying just laws and never returning injustice for injustice, exemplifies which aspect of Plato's lasting legacy?", "options": [{"text": "His theoretical exploration of the physical properties of the natural world.", "isCorrect": false, "rationale": "The Crito primarily deals with ethics, justice, and political obligation, not the physical properties of the natural world, which falls under metaphysics or natural philosophy."}, {"text": "His challenge to the conventional understanding of religious piety.", "isCorrect": false, "rationale": "The Euthyphro dialogue is cited as the one where Socrates questions the nature of piety and goodness in relation to divine commands, not the Crito."}, {"text": "His pioneering of abstract mathematical principles in governance.", "isCorrect": false, "rationale": "While Plato valued mathematics, the Crito's focus is on moral and political philosophy concerning obedience to laws and the nature of justice, not the application of mathematical principles to governance."}, {"text": "His initiation of ethical and political questions that continue to resonate in discussions of justice and civil obligation.", "isCorrect": true, "rationale": "The text highlights that Socrates' argument in the Crito — about obeying just laws and never returning injustice for injustice — is a living question, invoked by figures like Martin Luther King Jr., demonstrating its enduring relevance to ethics and political thought."}]}, {"question": "The famous (though possibly legendary) inscription 'Let no one ignorant of geometry enter here' over the entrance to Plato's Academy best reflects Plato's belief that:", "options": [{"text": "Only those with practical skills in construction and engineering were suitable for philosophical study.", "isCorrect": false, "rationale": "The text states that mathematical reasoning was meant to train the mind to think abstractly and grasp the universal, not to serve as a test for practical engineering skills."}, {"text": "Mathematical reasoning was a prerequisite for training the mind to grasp abstract, universal truths.", "isCorrect": true, "rationale": "The text explicitly states: 'Plato believed that mathematical reasoning trained the mind to think abstractly — to look past the particular and grasp the universal.'"}, {"text": "Geometry was the most important branch of philosophy and should be studied exclusively.", "isCorrect": false, "rationale": "The Academy studied philosophy, mathematics, astronomy, and harmonics, indicating a broad curriculum where geometry was a foundational tool, not an exclusive focus."}, {"text": "The Academy aimed to be a leading institution for mathematical research, rather than philosophy.", "isCorrect": false, "rationale": "The Academy was a 'community of thinkers who gathered to discuss philosophy, mathematics, and science.' Philosophy was central, with mathematics serving as a preparation for philosophical thinking."}]}, {"question": "Raphael's 'The School of Athens' depicts Plato pointing upward and Aristotle gesturing outward. This artistic representation effectively symbolizes their fundamental philosophical disagreement regarding:", "options": [{"text": "The importance of rhetoric versus logic in philosophical discourse.", "isCorrect": false, "rationale": "While both philosophers addressed rhetoric and logic, their central disagreement symbolized by these gestures pertains to metaphysics, not primarily methods of discourse."}, {"text": "The origin and nature of universal truths, whether in eternal Forms or particular things.", "isCorrect": true, "rationale": "The text explains this directly: 'Where Plato looked upward to the eternal Forms as the source of all reality, Aristotle looked outward at the natural world, insisting that universals exist in particular things, not apart from them. Raphael captured this disagreement perfectly...'"}, {"text": "The ethical imperative to pursue wisdom over material wealth.", "isCorrect": false, "rationale": "Both philosophers valued wisdom, and this ethical point is not the primary disagreement highlighted by their gestures in the painting, which focuses on their metaphysical stances."}, {"text": "The role of the state in educating its citizens.", "isCorrect": false, "rationale": "Both philosophers had views on education and the state, but the gestures in the painting are universally interpreted as signifying their contrasting metaphysical views on the Forms and empirical reality."}]}, {"question": "According to Plato's Theory of Forms, which statement accurately describes the relationship between physical objects and the Forms?", "options": [{"text": "Physical objects are more real and fundamental than the Forms.", "isCorrect": false, "rationale": "Plato argued the opposite: the eternal Forms 'are more real than the physical objects we see and touch.'"}, {"text": "Forms are perfect, unchanging realities that particular physical things merely imitate.", "isCorrect": true, "rationale": "The text states: 'Behind every beautiful thing, Plato argued, there is Beauty itself — a perfect, unchanging reality that particular beautiful things merely imitate.'"}, {"text": "Forms are mental constructs created by human consciousness to understand the physical world.", "isCorrect": false, "rationale": "Plato's Forms are objective, eternal realities existing independently of human minds, not subjective mental constructs."}, {"text": "Physical objects and Forms are distinct but equally real entities existing in parallel dimensions.", "isCorrect": false, "rationale": "Plato posited a hierarchy where Forms are 'more real' and physical objects are derivative, merely imitating the Forms, not existing in equal parallel dimensions."}]}, {"question": "Plato's proposal for the 'philosopher-king' in the Republic reflects his belief that true justice and societal guidance can only be achieved by those who:", "options": [{"text": "Possess vast experience in military strategy and political negotiation.", "isCorrect": false, "rationale": "While practical skills are valuable, Plato's emphasis for philosopher-kings was on philosophical wisdom and knowledge of ultimate truth, not primarily military or political experience."}, {"text": "Are chosen by democratic election after demonstrating their popularity.", "isCorrect": false, "rationale": "Plato was generally critical of democracy as a system of governance, arguing that it could lead to mob rule and ignorance, rather than rule by wisdom."}, {"text": "Have attained direct knowledge of the Form of the Good, enabling them to lead with genuine wisdom.", "isCorrect": true, "rationale": "The text explains: 'Plato argued that the ideal city would be governed by philosophers — those who have seen the Form of the Good and can therefore guide society toward true justice.'"}, {"text": "Accumulate immense wealth, allowing them to fund public works without corruption.", "isCorrect": false, "rationale": "Plato argued for wisdom over wealth; the pursuit of wisdom was considered more important than material possessions, and wealth was not a criterion for leadership in his ideal state."}]}, {"question": "In the Meno, Socrates' demonstration with the uneducated slave boy is used to illustrate Plato's theory that knowledge is ultimately:", "options": [{"text": "Acquired through rigorous empirical observation and scientific experimentation.", "isCorrect": false, "rationale": "The slave boy learns a geometric proof through Socratic questioning, which elicits knowledge from within, rather than through external empirical observation or experimentation."}, {"text": "Instinctive understanding of practical skills, not abstract concepts.", "isCorrect": false, "rationale": "The demonstration involves a complex geometric proof, which is an abstract concept, not merely a practical skill."}, {"text": "A process of remembering eternal Forms that the soul already knew before birth.", "isCorrect": true, "rationale": "The text states: 'Plato suggested that learning is really remembering: the soul once knew the Forms directly, and education draws out what it already knows.' The Meno example serves this purpose."}, {"text": "The accumulation of information passed down through generations of oral tradition.", "isCorrect": false, "rationale": "While traditions are important, Plato's theory of recollection emphasizes an individual's innate, pre-existing knowledge of the Forms, which is accessed through guided inquiry, not merely inherited information."}]}, {"question": "Plotinus's concept of 'the One' as the supreme principle from which all reality flows is characterized by being:", "options": [{"text": "A personal deity with specific attributes and commands.", "isCorrect": false, "rationale": "Plotinus's 'One' is described as beyond description and simple, not a personal deity with specific attributes or commands, which are usually associated with later theological concepts."}, {"text": "A complex, multifaceted entity containing all physical forms and attributes.", "isCorrect": false, "rationale": "The text specifies 'the One' as 'so perfect and so simple that it is beyond all description,' suggesting it is unitary and undifferentiated, not a complex or multifaceted entity."}, {"text": "A source of being so perfect and simple that it transcends all description.", "isCorrect": true, "rationale": "The text directly states that 'the One' is 'a source of being so perfect and so simple that it is beyond all description.'"}, {"text": "The material substratum of the universe, directly observable through sensory experience.", "isCorrect": false, "rationale": "'The One' is a transcendent principle, not a material entity or something directly observable through sensory experience; it is the ultimate, non-material source of all reality."}]}, {"question": "Neoplatonism's significance in later intellectual history, particularly for early Christian theologians, lay in its ability to:", "options": [{"text": "Provide a definitive refutation of Plato's Theory of Forms.", "isCorrect": false, "rationale": "Plotinus 'breathed new life into Platonic thought' and 'transformed Plato's ideas,' building upon them, rather than refuting the Theory of Forms."}, {"text": "Offer a philosophical framework for understanding the hierarchical relationship between the spiritual and material realms.", "isCorrect": true, "rationale": "The text states Neoplatonism 'gave later thinkers a powerful framework for understanding the relationship between God and the world, between the spiritual and the material, between the eternal and the changing,' which resonated with Christian theology."}, {"text": "Advocate for a return to polytheistic religious practices of ancient Greece.", "isCorrect": false, "rationale": "While Plotinus was pagan, his philosophical system influenced 'both pagan and Christian thought,' and it specifically helped Christian theologians articulate their own convictions, not return to polytheism."}, {"text": "Champion the empirical method as the sole path to divine knowledge.", "isCorrect": false, "rationale": "Neoplatonism, with its focus on 'mystical union with the One' and a hierarchy descending from a transcendent source, emphasizes intellectual and spiritual ascent rather than empirical observation for divine knowledge."}]}, {"question": "Considering the 'keyconcept' section, what is the most accurate summary of Plato's lasting legacy in Western philosophy?", "options": [{"text": "His successful establishment of a universally accepted set of doctrines and answers to life's biggest questions.", "isCorrect": false, "rationale": "The text explicitly states: 'Plato's legacy does not consist of a set of doctrines that everyone accepted.'"}, {"text": "His pioneering of a rigorous methodology for scientific experimentation and discovery.", "isCorrect": false, "rationale": "While Plato valued mathematics, his primary legacy is not framed as scientific methodology, but as initiating fundamental philosophical questions."}, {"text": "His articulation of fundamental philosophical questions that compelled subsequent generations to engage and respond.", "isCorrect": true, "rationale": "The 'keyconcept' states: 'It consists of a set of questions — about justice, knowledge, reality, the soul, and the good life — that every subsequent generation of thinkers has been compelled to answer.'"}, {"text": "His political theories, which provided the blueprint for every successful government in Western history.", "isCorrect": false, "rationale": "Plato's political theories, like the philosopher-king, were 'provocative claims' that launched debates, not universally adopted blueprints for governance."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
