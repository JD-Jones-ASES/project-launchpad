<script>
var QUESTIONS = [{"question": "When Alfred North Whitehead said that Western philosophy 'consists of a series of footnotes to Plato,' what did he mean?", "options": [{"text": "That every Western philosopher simply repeated what Plato said without adding anything new.", "isCorrect": false, "rationale": "The text explicitly states Whitehead was not saying this. Aristotle, Aquinas, and Kant all disagreed with Plato on fundamental questions."}, {"text": "That the questions Plato asked are still the questions philosophers argue about today -- every generation of thinkers has had to respond to Plato, whether by agreeing, refining, or pushing back against his ideas.", "isCorrect": true, "rationale": "Whitehead meant that Plato set the agenda for Western philosophy. The Euthyphro dilemma, the examined life, the social contract, the Theory of Forms -- these remain living questions that every subsequent thinker has been compelled to address."}, {"text": "That Plato's writings are so obscure they require extensive footnotes and commentary to be understood at all.", "isCorrect": false, "rationale": "Whitehead's remark is about Plato's intellectual influence, not about the difficulty of his texts."}, {"text": "That philosophy after Plato declined in quality and became merely academic and trivial.", "isCorrect": false, "rationale": "The 'footnotes' metaphor is about the enduring centrality of Plato's questions, not about a decline in the quality of later philosophy."}], "id": "q01"}, {"question": "What was Plato's Academy, and what made it historically significant?", "options": [{"text": "A formal university with classrooms and examinations, founded in 387 BC, that lasted about fifty years until Plato's death.", "isCorrect": false, "rationale": "The Academy was not a modern-style university with classrooms and examinations. It was a community of thinkers, and it continued for nearly nine hundred years after its founding -- far beyond Plato's death."}, {"text": "A school founded by Plato in 387 BC in a grove sacred to the hero Akademos, where students studied philosophy, mathematics, and science -- it continued under successors for nearly nine hundred years, making it the longest-running institution of higher learning in the ancient world.", "isCorrect": true, "rationale": "The Academy was a community of thinkers in a sacred grove, studying philosophy, geometry, astronomy, and harmonics. It was finally closed by Emperor Justinian in AD 529 -- nearly nine centuries after Plato founded it."}, {"text": "A private library where Plato stored his writings, open only to members of the Athenian aristocracy.", "isCorrect": false, "rationale": "The Academy was a teaching and research community, not a private library. Its most famous student, Aristotle, came from Macedon, not the Athenian aristocracy."}, {"text": "A political organization Plato founded to train philosopher-kings who would take power in Athens.", "isCorrect": false, "rationale": "While Plato advocated for philosopher-kings in the Republic, the Academy was an intellectual community dedicated to philosophy and mathematics, not a political organization."}], "id": "q02"}, {"question": "How did Aristotle's philosophical approach differ from Plato's, as captured symbolically in Raphael's School of Athens?", "options": [{"text": "Plato focused on rhetoric and persuasion, while Aristotle focused on mathematics and geometry.", "isCorrect": false, "rationale": "Plato actually valued mathematics highly (the Academy reputedly had the inscription 'Let no one ignorant of geometry enter here'). The key difference is about where reality resides."}, {"text": "Plato looked upward to the eternal Forms as the source of all reality, while Aristotle looked outward at the natural world, insisting that universals exist in particular things, not apart from them.", "isCorrect": true, "rationale": "Raphael captured this disagreement: Plato points to the heavens (the realm of Forms), while Aristotle gestures toward the earth (the world of experience). Aristotle rejected the idea that Forms exist in a separate realm."}, {"text": "Plato studied only ethics and politics, while Aristotle studied only biology and physics.", "isCorrect": false, "rationale": "Both thinkers covered an enormous range of subjects. Their disagreement was not about subject matter but about the fundamental nature of reality -- whether universals exist separately from particular things."}, {"text": "Plato and Aristotle agreed on all major philosophical questions but differed only in their writing styles.", "isCorrect": false, "rationale": "Aristotle famously wrote 'Plato is dear to me, but dearer still is truth.' He rejected the Theory of Forms and differed from Plato on fundamental metaphysical questions."}], "id": "q03"}, {"question": "What was Plotinus' key contribution to Platonic thought, and how did it transform Plato's philosophy?", "options": [{"text": "Plotinus rejected Plato entirely and developed an original system based on Aristotelian logic.", "isCorrect": false, "rationale": "Plotinus did not reject Plato. He built upon the Theory of Forms, transforming Plato's ideas into a grand philosophical system called Neoplatonism."}, {"text": "He took Plato's Theory of Forms and built a vision of all reality flowing from a single supreme principle called 'the One' -- from which proceeds divine Mind (containing the Forms), then Soul, then the material world, with the goal of human life being mystical ascent back to the One.", "isCorrect": true, "rationale": "Plotinus envisioned reality as a hierarchy emanating from the One, like light radiating from a sun. Everything flows from this transcendent source through Nous (Mind), Soul, and finally the material world. The philosopher's goal is to ascend back through these levels to union with the One."}, {"text": "Plotinus simplified Plato by eliminating the Theory of Forms and focusing exclusively on ethical questions.", "isCorrect": false, "rationale": "Plotinus did not eliminate the Forms. He placed them within the divine Mind (Nous) and built an elaborate metaphysical system around them."}, {"text": "Plotinus was primarily a political philosopher who used Plato's Republic as a blueprint for reforming the Roman Empire.", "isCorrect": false, "rationale": "Plotinus was a metaphysical and mystical thinker, not primarily a political philosopher. His concern was the soul's ascent to the One, not political reform."}], "id": "q04"}, {"question": "What was Justin Martyr's concept of the 'logos spermatikos' (seeds of the Word), and why was it a bold claim?", "options": [{"text": "The idea that Greek philosophy was entirely false and Christians should reject all pagan learning as dangerous.", "isCorrect": false, "rationale": "Justin argued the exact opposite: that God had scattered seeds of truth throughout the world, and Greek philosophers had cultivated some of them."}, {"text": "The idea that God had scattered seeds of truth throughout the world, that Greek philosophers cultivated some of them, and that Socrates lived according to the divine Logos even without knowing Christ -- making philosophy a forerunner of faith rather than its enemy.", "isCorrect": true, "rationale": "Justin claimed that the truths Plato discovered through reason were the same truths Christ would reveal through revelation. He even called Socrates a kind of 'Christian before Christ,' making philosophy not the enemy of faith but its preparation."}, {"text": "The idea that Christians should worship Socrates alongside Christ as a second divine figure.", "isCorrect": false, "rationale": "Justin did not propose worshiping Socrates. He argued that Socrates had glimpsed divine truth through reason, but the fullness of truth came only through Christ."}, {"text": "The idea that the Greek language itself contained hidden divine messages that predicted the coming of Christ.", "isCorrect": false, "rationale": "The logos spermatikos is about seeds of philosophical truth, not hidden linguistic messages. Justin meant that genuine philosophical insights reflect divine reason."}], "id": "q05"}, {"question": "How did Augustine of Hippo resolve the Euthyphro dilemma -- the question of whether something is good because God wills it, or God wills it because it is good?", "options": [{"text": "He accepted the first horn: things are good because God arbitrarily wills them, and morality could change if God changed his mind.", "isCorrect": false, "rationale": "Augustine rejected the idea that God's will is arbitrary. His resolution dissolves the dilemma entirely rather than choosing one horn."}, {"text": "He argued the dilemma is a false choice: God's will and God's nature are not two separate things. God is Goodness itself, so morality flows from the divine nature rather than from an arbitrary command imposed from outside.", "isCorrect": true, "rationale": "Augustine held that God does not choose to be good, as if goodness were external to him. God is Goodness itself. This doctrine of divine simplicity means God's will, goodness, knowledge, and being are ultimately one and the same, dissolving the dilemma."}, {"text": "He accepted the second horn: goodness exists independently of God, and God merely recognizes it like anyone else.", "isCorrect": false, "rationale": "Augustine did not place a standard of goodness above God. His solution was to identify God with Goodness itself, so the two horns collapse into one."}, {"text": "He argued the question was meaningless because human beings cannot understand the nature of God.", "isCorrect": false, "rationale": "Augustine did not dismiss the question. He engaged with it directly and proposed a sophisticated theological resolution through the doctrine of divine simplicity."}], "id": "q06"}, {"question": "What is Plato's Theory of Forms, and how does it answer the problem raised in the Euthyphro?", "options": [{"text": "The Forms are mental concepts that exist only in human minds, and they answer the Euthyphro by showing that piety is whatever each individual thinks it is.", "isCorrect": false, "rationale": "Plato's Forms are emphatically not subjective mental concepts. They are real, independent, eternal entities. The Theory of Forms provides an objective standard, not a subjective one."}, {"text": "Behind every general concept there exists a perfect, eternal, unchanging reality called a Form. Particular pious acts are pious because they participate in the Form of Piety -- an eternal standard independent of any opinion, human or divine.", "isCorrect": true, "rationale": "The Theory of Forms answers the Euthyphro's unresolved question by positing that piety has a real, eternal nature (the Form of Piety) that exists independently of what anyone -- even the gods -- happens to think about it."}, {"text": "The Forms are mathematical equations that Plato used to calculate the correct definition of every moral concept.", "isCorrect": false, "rationale": "While Plato valued mathematics, the Forms are not mathematical equations. They are perfect, eternal realities of which particular things are imperfect reflections."}, {"text": "The Forms are the collected opinions of all the Greek gods, unified into a single standard of moral truth.", "isCorrect": false, "rationale": "The Forms are not derived from divine opinions. They are independent realities that exist prior to and apart from any opinion -- which is precisely how they resolve the Euthyphro dilemma."}], "id": "q07"}, {"question": "What role did the rediscovery of Plato's dialogues play in the Renaissance, and who was responsible for making them available?", "options": [{"text": "Plato's dialogues were continuously read throughout the medieval period and required no rediscovery during the Renaissance.", "isCorrect": false, "rationale": "By the fourteenth century, Plato's actual dialogues were largely unread in the West. Scholars knew Plato mainly through Augustine and other intermediaries."}, {"text": "Greek scholars brought manuscripts of Plato's complete works to Florence during a church council in 1438-1439, and Marsilio Ficino translated the entire Platonic corpus into Latin by 1484, making Plato's actual words available to Western readers for the first time in over a thousand years.", "isCorrect": true, "rationale": "Cosimo de' Medici sponsored Ficino's translation project after Greek scholars brought Plato's manuscripts to Florence. Ficino also founded the Platonic Academy of Florence, helping spark the broader Renaissance intellectual movement."}, {"text": "Thomas Aquinas discovered Plato's dialogues in a monastery library and translated them into Latin in the thirteenth century.", "isCorrect": false, "rationale": "Aquinas worked primarily with Aristotle's texts, not Plato's dialogues. The Platonic revival came two centuries later through Ficino in Florence."}, {"text": "The dialogues were discovered in Egyptian tombs by archaeologists in the fifteenth century and immediately published using the new printing press.", "isCorrect": false, "rationale": "The manuscripts were brought by Greek scholars attending a church council, not discovered by archaeologists. Ficino's translations were the key to making them accessible."}], "id": "q08"}, {"question": "How does the Consolation of Philosophy by Boethius connect to the Crito?", "options": [{"text": "Boethius directly quotes the Crito and argues that Socrates was wrong to stay in prison.", "isCorrect": false, "rationale": "The connection is not a direct quotation or disagreement. It is a structural and thematic parallel between the two works."}, {"text": "Both works feature a man in prison awaiting execution who receives philosophical guidance from a personified abstraction -- Socrates from the personified Laws, and Boethius from Lady Philosophy -- using the device of prosopopoeia to make philosophical arguments vivid and personal.", "isCorrect": true, "rationale": "The text explicitly draws this parallel: Lady Philosophy appears to Boethius in his cell much as the personified Laws appeared to Socrates. Both use prosopopoeia, and both argue that true happiness cannot depend on fortune or survival but on the Good itself."}, {"text": "Boethius wrote the Consolation as a direct response to the Crito, arguing that Socrates should have escaped.", "isCorrect": false, "rationale": "The Consolation is not a direct response to the Crito. Rather, Boethius drew on Platonic and Neoplatonic ideas, and his work parallels the Crito in its dramatic situation and philosophical approach."}, {"text": "The only connection is that both authors were Greek philosophers who lived in Athens.", "isCorrect": false, "rationale": "Boethius was a Roman senator who lived over eight hundred years after Socrates. The connection is thematic and literary, not biographical."}], "id": "q09"}, {"question": "According to the chapter, what is the most important aspect of Plato's legacy for the Western philosophical tradition?", "options": [{"text": "A set of fixed doctrines that all subsequent philosophers accepted without modification.", "isCorrect": false, "rationale": "The text explicitly states that Plato's legacy does not consist of a set of doctrines that everyone accepted. Aristotle rejected the Forms, and later philosophers challenged other Platonic ideas."}, {"text": "A set of questions -- about justice, knowledge, reality, the soul, and the good life -- that every subsequent generation of thinkers has been compelled to answer, making Western philosophy an ongoing conversation that Plato started.", "isCorrect": true, "rationale": "The text states that 'to do philosophy in the Western tradition is to join a conversation that Plato started twenty-four centuries ago.' His legacy is the enduring questions, not fixed answers."}, {"text": "The invention of formal logic, which became the foundation for all subsequent scientific and philosophical reasoning.", "isCorrect": false, "rationale": "Formal logic is more associated with Aristotle than with Plato. Plato's legacy, as described in the text, is about the enduring questions he posed."}, {"text": "The establishment of democracy in Athens, which became the model for all Western governments.", "isCorrect": false, "rationale": "Plato was actually critical of democracy (the Republic proposes philosopher-kings). His legacy is philosophical, not political in that sense."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
