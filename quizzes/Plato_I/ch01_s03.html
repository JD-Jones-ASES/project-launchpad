<script>
var QUESTIONS = [{"question": "The 'Socratic problem' primarily refers to which challenge for scholars studying Socrates?", "options": [{"text": "The difficulty in understanding his complex philosophical theories without direct access to his students' notes.", "isCorrect": false, "rationale": "Socrates' philosophy was conveyed through conversation, not complex theories in the modern sense, and the problem isn't about the notes of his students, but rather distinguishing his actual words from Plato's literary interpretations."}, {"text": "Distinguishing between Socrates' actual beliefs and what Plato attributed to him in his dialogues.", "isCorrect": true, "rationale": "The text explicitly states, 'since Socrates left no writings, how can we tell the difference between what Socrates actually believed and what Plato put into his mouth?' This is the core of the Socratic problem."}, {"text": "The historical uncertainty surrounding his birth and death dates due to a lack of ancient records.", "isCorrect": false, "rationale": "While historical details can always have some uncertainty, the text provides clear dates for Socrates' birth and death, and the Socratic problem is not primarily concerned with these biographical facts, but with his philosophical content."}, {"text": "Reconciling the differing accounts of Socrates provided by Xenophon, Aristophanes, and Aristotle.", "isCorrect": false, "rationale": "While these different accounts contribute to the complexity, the Socratic problem, as defined in the text, specifically highlights the challenge with Plato's dialogues being the primary, but interpreted, source of Socrates' thought."}], "id": "q01"}, {"question": "Which of the following best describes the 'elenchus' as practiced by Socrates?", "options": [{"text": "A method of persuasive rhetoric used to convince audiences of a predetermined truth.", "isCorrect": false, "rationale": "The elenchus aims to expose contradictions and move towards truth, not to persuade an audience of a specific, predetermined truth through rhetoric. Socrates claimed to 'know nothing' and sought to strip away false beliefs."}, {"text": "A process of cross-examination that reveals contradictions in an interlocutor's definition, ultimately leading to the recognition of ignorance.", "isCorrect": true, "rationale": "The text defines elenchus as 'cross-examination' or 'refutation' that proceeds by 'drawing out the implications... showing that the definition leads to a contradiction,' and the goal is to 'strip away false beliefs and move closer to the truth,' often by admitting one does not truly know."}, {"text": "A lecture-based teaching style where Socrates would impart wisdom directly to his students.", "isCorrect": false, "rationale": "Socrates famously 'asked questions' and 'made almost no claims at all,' which is antithetical to a lecture-based teaching style where wisdom is imparted directly."}, {"text": "A technique for writing philosophical treatises that present arguments in a structured, logical sequence.", "isCorrect": false, "rationale": "Socrates wrote nothing, and the elenchus is a conversational method of inquiry, not a writing technique for treatises."}], "id": "q02"}, {"question": "Socrates' use of his mother's profession, midwifery, as a metaphor for his philosophical method implies that he:", "options": [{"text": "Believed that philosophical ideas are inherently feminine in nature.", "isCorrect": false, "rationale": "The metaphor is not about the gendered nature of ideas but about the process of bringing them forth. The text focuses on 'helping others give birth to ideas.'"}, {"text": "Saw his role as helping others bring their own latent ideas to fruition, rather than implanting his own.", "isCorrect": true, "rationale": "The text states Socrates used the metaphor to describe 'helping others give birth to ideas rather than producing ideas of his own,' directly aligning with the idea of facilitating others' intellectual discovery."}, {"text": "Viewed philosophical discourse as a painful and arduous process, similar to childbirth.", "isCorrect": false, "rationale": "While the elenchus could be 'relentless, logical, sometimes infuriating,' the midwifery metaphor primarily emphasizes the act of 'giving birth to ideas' and facilitating discovery, not specifically the pain."}, {"text": "Was primarily concerned with the origins of human thought and consciousness.", "isCorrect": false, "rationale": "The metaphor describes his method of inquiry and assisting others in their thinking, not a specific focus on the origins of thought itself."}], "id": "q03"}, {"question": "Plato chose the dialogue form for his philosophical writings primarily because he believed that:", "options": [{"text": "Treatises and lectures were too difficult for the average Athenian citizen to comprehend.", "isCorrect": false, "rationale": "While accessibility might have been a minor consideration, the text emphasizes a deeper philosophical reason: that philosophy itself is a living activity, not a static body of doctrines."}, {"text": "It was the only way to accurately record Socrates' unwritten teachings for posterity.", "isCorrect": false, "rationale": "While it was a tribute to Socrates, the text states it was 'also a philosophical choice.' The dialogue form was seen as capturing the 'process of questioning, reasoning, and discovering,' not just as a recording mechanism."}, {"text": "Philosophy is a dynamic process of questioning and discovery, best captured by interactive conversation.", "isCorrect": true, "rationale": "The text explicitly states, 'Plato believed that philosophy is not a body of doctrines to be memorized but a living activity — a process of questioning, reasoning, and discovering. The dialogue form captures this process in a way that a treatise cannot.'"}, {"text": "He wanted to entertain readers with dramatic narratives, even if it meant sacrificing philosophical rigor.", "isCorrect": false, "rationale": "Plato's choice was a 'philosophical choice,' not merely an artistic one for entertainment, and certainly not at the expense of rigor. The dialogues are rigorous philosophical works."}], "id": "q04"}, {"question": "Plato's disillusionment with Athenian democracy, which led him to found the Academy, stemmed primarily from:", "options": [{"text": "The Peloponnesian War's outcome, which he believed proved democracy's military inferiority.", "isCorrect": false, "rationale": "While the Peloponnesian War occurred, the text links Plato's disillusionment directly to the condemnation and execution of Socrates, not the war's outcome or military strategy."}, {"text": "His personal ambition to become a political leader, which was thwarted by the democratic system.", "isCorrect": false, "rationale": "The text does not mention personal ambition but rather his conviction that 'society needed a radically different kind of leadership' after Socrates' death, linking it to the incompatibility of mob rule and wisdom."}, {"text": "The Athenian assembly's condemnation and execution of his teacher, Socrates, which he saw as proof of democracy's failure.", "isCorrect": true, "rationale": "The text explicitly states: 'The execution of Socrates in 399 BC was the defining event of Plato's life. Disgusted by Athenian democracy... He believed that the Athenian assembly, by condemning Socrates, had proven that mob rule and genuine wisdom are incompatible.'"}, {"text": "The widespread corruption and bribery within the democratic institutions of Athens.", "isCorrect": false, "rationale": "While ancient democracies had their flaws, the text specifically attributes Plato's disillusionment to the judgment against Socrates, not general corruption, though the large juries were meant to prevent it."}], "id": "q05"}, {"question": "In Plato's early dialogues, the characteristic ending of 'aporia' is considered philosophically valuable because it signifies:", "options": [{"text": "The failure of Socrates to convince his interlocutor of the correct answer.", "isCorrect": false, "rationale": "Aporia isn't about Socrates failing to convince; it's about the interlocutor (and sometimes Socrates himself) failing to reach a satisfactory definition. The value is in the state of puzzlement itself."}, {"text": "A clear and definitive answer has been reached, thus concluding the philosophical inquiry.", "isCorrect": false, "rationale": "Aporia means 'without a path' and refers to a state of puzzlement where no satisfactory answer is found, directly contrary to reaching a clear and definitive answer."}, {"text": "That recognizing one's own ignorance is the essential first step toward genuine philosophical understanding.", "isCorrect": true, "rationale": "The text states aporia is 'philosophically valuable, because recognizing your own ignorance is the first step toward genuine understanding' and calls the early dialogues 'training exercises in intellectual humility.'"}, {"text": "The superiority of Socrates' wisdom over that of his less enlightened interlocutors.", "isCorrect": false, "rationale": "While Socrates often demonstrates greater insight, the value of aporia lies in intellectual humility and the process of inquiry for everyone involved, not merely in asserting Socrates' superiority."}], "id": "q06"}, {"question": "Which of the following characteristics is most indicative of Plato's 'Middle dialogues' period?", "options": [{"text": "They are short, dramatic, and consistently end in a state of puzzlement (aporia).", "isCorrect": false, "rationale": "This describes the 'Early dialogues,' which are noted for ending in aporia and the absence of clear answers."}, {"text": "Socrates often takes a smaller role, and Plato revisits and revises his earlier philosophical theories.", "isCorrect": false, "rationale": "This describes the 'Late dialogues,' where Plato engages in more technical and self-critical analysis, sometimes with Socrates playing a lesser part."}, {"text": "Socrates begins to advance positive theories, such as the Theory of Forms or the philosopher-king.", "isCorrect": true, "rationale": "The text states that in 'Middle dialogues,' Socrates 'begins to advance positive theories — the Theory of Forms, the immortality of the soul, the philosopher-king.'"}, {"text": "They focus exclusively on historical accounts of Socrates' life and trial without significant philosophical arguments.", "isCorrect": false, "rationale": "All of Plato's dialogues are philosophical works, and even the early ones focused on Socrates' trial (e.g., Apology) are deeply philosophical, not merely historical accounts."}], "id": "q07"}, {"question": "The text credits Socrates and Plato with a fundamental transformation in philosophy. What was this transformation?", "options": [{"text": "Shifting philosophy from abstract logic and mathematics to practical ethics and political theory.", "isCorrect": false, "rationale": "While they certainly influenced ethics and politics, the text defines the shift more broadly: from nature to 'how to live,' encompassing broader practical and humanistic concerns."}, {"text": "Moving philosophy from a focus on the nature of reality to an investigation into how humans ought to live.", "isCorrect": true, "rationale": "The text states they 'transformed philosophy from a speculation about nature into an investigation of how to live,' which captures this shift from cosmology to human conduct and ethics."}, {"text": "Transitioning philosophy from oral tradition to written texts, establishing the first literary philosophical works.", "isCorrect": false, "rationale": "While Plato wrote extensively, Socrates wrote nothing, and the primary transformation highlighted is thematic, not merely about the medium of philosophical expression."}, {"text": "Introducing the concept of 'the love of wisdom' (philosophia) as the core pursuit of intellectual inquiry.", "isCorrect": false, "rationale": "The term 'philosophia' existed before them, and the text emphasizes a change in the *subject matter* of philosophy rather than the introduction of its defining concept."}], "id": "q08"}, {"question": "The narrative sequence of the Euthyphro, Apology, and Crito dialogues in this book serves to:", "options": [{"text": "Illustrate three distinct philosophical problems, unrelated to Socrates' personal life.", "isCorrect": false, "rationale": "The text explicitly states these dialogues 'tell the story of Socrates' trial and death' and 'are set against the background of a man's impending death,' making them deeply personal and interconnected."}, {"text": "Showcase Plato's development as a writer from his early, less refined works to his mature style.", "isCorrect": false, "rationale": "While these are early dialogues, their purpose in this sequence is primarily narrative and thematic, focusing on Socrates' story, not merely Plato's stylistic evolution."}, {"text": "Provide a chronological account of Socrates' trial and his subsequent death, emphasizing the urgency of his philosophical questions.", "isCorrect": true, "rationale": "The text outlines the sequence: 'The Indictment,' 'The Euthyphro' (preliminary hearing), 'The Trial (Apology),' and 'The Imprisonment (Crito),' culminating in his death, underscoring that 'The philosophical questions... take on an urgency that purely theoretical discussions never have.'"}, {"text": "Argue against Athenian democracy by presenting a biased view of the legal proceedings.", "isCorrect": false, "rationale": "While Plato was disillusioned with democracy, the primary purpose of the sequence is to tell Socrates' story and explore the philosophical questions within that dramatic context, not solely to present a biased legal argument."}], "id": "q09"}, {"question": "In the Crito dialogue, Socrates refuses to escape from prison despite his friend Crito's arrangements. What is the primary philosophical reason given by Socrates for this refusal?", "options": [{"text": "He believed that escaping would validate the charges of impiety against him.", "isCorrect": false, "rationale": "While he wanted to uphold his principles, the text specifically states his argument was about the wrongness of breaking the law, not primarily about validating the impiety charges."}, {"text": "He thought that running away would make him appear cowardly and undermine his public image.", "isCorrect": false, "rationale": "Socrates' decision was based on a principle of justice and law, not primarily on concerns about his reputation or perceived courage."}, {"text": "He argued that breaking the law, even an unjust one, would be morally wrong and harmful to the state.", "isCorrect": true, "rationale": "The text states: 'Socrates refuses, arguing that breaking the law — even an unjust law — would be wrong.' This highlights his commitment to the principles of justice and the social contract."}, {"text": "He wanted to achieve martyrdom to inspire future generations of philosophers.", "isCorrect": false, "rationale": "The text attributes his refusal to a specific philosophical argument about obedience to the law, not a desire for martyrdom or to inspire future generations, though that was a consequence."}], "id": "q10"}, {"question": "The text identifies three distinct periods in Plato's philosophical development — Early, Middle, and Late. What is the single most significant change that marks the transition from the Early to the Middle period?", "options": [{"text": "Plato abandons the dialogue form in favor of philosophical treatises that state his views directly.", "isCorrect": false, "rationale": "Plato retained the dialogue form throughout his career, even in the late period. The shift is thematic and argumentative, not a change of literary form."}, {"text": "Socrates moves from posing questions that expose ignorance ($aporia$) to advancing substantive positive theories such as the Theory of Forms.", "isCorrect": true, "rationale": "The text distinguishes early dialogues as ending in aporia — 'training exercises in intellectual humility' — and middle dialogues as those where 'Socrates begins to advance positive theories — the Theory of Forms, the immortality of the soul, the philosopher-king.' This shift from deconstruction to construction is the key marker."}, {"text": "Plato shifts from ethical questions about how to live to purely cosmological questions about the origins of the universe.", "isCorrect": false, "rationale": "The Timaeus, which deals with cosmology, belongs to the late period. The middle period is defined by constructive ethical and metaphysical theory-building, not a move away from ethics toward cosmology."}, {"text": "Plato reduces Socrates' role in the dialogues and begins to present his own views through different fictional speakers.", "isCorrect": false, "rationale": "Reducing Socrates' role characterizes the late period, not the transition from early to middle. In the middle period, Socrates remains the primary spokesman, now advancing positive theories."}], "id": "q11"}, {"question": "The midwifery metaphor ($maieutics$) that Socrates used to describe his philosophical method has a specific implication about the source of philosophical insight. What does it imply?", "options": [{"text": "True knowledge must be transmitted from a wise teacher to a receptive student — the midwife transfers life from herself to the newborn.", "isCorrect": false, "rationale": "A midwife does not create the child; she assists a birth that is already happening. The metaphor implies the opposite of direct transmission: the knowledge comes from within the student, not from the teacher."}, {"text": "Philosophical inquiry is painful and risky, like childbirth, and only those with a high tolerance for intellectual discomfort can complete it.", "isCorrect": false, "rationale": "While elenchus can be uncomfortable, the midwifery metaphor is not primarily about intellectual pain tolerance. Its key claim is about the source of knowledge — internal, not external."}, {"text": "The capacity for genuine insight already exists within the student; the philosopher's role is to assist in bringing it to light, not to implant it.", "isCorrect": true, "rationale": "The text states Socrates described his role as 'helping others give birth to ideas rather than producing ideas of his own.' A midwife facilitates a birth that originates in the mother — the ideas come from within the interlocutor, not from Socrates himself."}, {"text": "Only those born with natural philosophical talent can benefit from Socratic questioning, just as a midwife can only assist in a birth that has already begun.", "isCorrect": false, "rationale": "The text does not restrict Socratic inquiry to the naturally gifted. The metaphor is about method — facilitation rather than implantation — not about who is capable of philosophy."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
