        <div class="subtitle">The Trial of Socrates (Plato I) &mdash; Chapter 2, Section 2</div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "What was Socrates primarily seeking from Euthyphro regarding piety?", "options": [{"text": "A collection of well-known examples of pious actions.", "isCorrect": false, "rationale": "The text explicitly states Socrates was 'not what examples of piety look like,' indicating he was looking beyond mere instances."}, {"text": "An understanding of what the gods happen to love.", "isCorrect": false, "rationale": "Socrates was interested in the 'essential nature' of piety, not 'what the gods happen to love,' as opinions can change and are not the essence itself."}, {"text": "The essential nature that makes all pious things pious.", "isCorrect": true, "rationale": "The text states Socrates wanted 'the essential nature that makes all pious things pious,' which is a universal definition."}, {"text": "A list of moral guidelines for pious behavior.", "isCorrect": false, "rationale": "While related to piety, Socrates' specific quest was for the underlying 'essential nature' or definition, not practical guidelines."}]}, {"question": "According to the text, what characteristic must a universal definition, as sought by Socrates, possess?", "options": [{"text": "It must be based on a particular example that everyone agrees upon.", "isCorrect": false, "rationale": "The text states a universal 'cannot be any particular pious act, because particular acts come and go,' ruling out definitions based on specific examples."}, {"text": "It must reflect the common opinion of the majority or powerful individuals.", "isCorrect": false, "rationale": "The text explains a universal 'cannot depend on what any person or god happens to think, because opinions change,' indicating independence from subjective views."}, {"text": "It must be stable, unchanging, and independent of any particular example.", "isCorrect": true, "rationale": "The text explicitly states a universal 'must be something stable, unchanging, and independent of any particular example.'"}, {"text": "It must be something that can evolve and adapt over time as societies change.", "isCorrect": false, "rationale": "The core requirement for a universal is that it must be 'unchanging,' directly contradicting the idea of evolution or adaptation."}]}, {"question": "How does Plato's concept of 'Forms' (eide) fundamentally differ from an ordinary person's understanding of an 'idea' in their mind?", "options": [{"text": "Plato's Forms are primarily mental constructs, whereas ordinary ideas are external realities.", "isCorrect": false, "rationale": "This statement reverses Plato's position. He argues Forms are independent, objective realities, not mere mental constructs."}, {"text": "Plato's Forms are perfect and eternal, whereas ordinary ideas are fleeting thoughts.", "isCorrect": false, "rationale": "While Forms are perfect and eternal, the primary distinction given in the text is their *ontological status* (real, independent entities) versus subjective thoughts."}, {"text": "Plato's Forms are real, independent entities existing in a realm beyond the physical world, not mere thoughts in anyone's mind.", "isCorrect": true, "rationale": "The text clarifies that 'Plato's Forms are not thoughts in anyone's mind — they are real, independent entities' existing 'in a realm beyond the physical world.'"}, {"text": "Plato's Forms are specific examples or instances, while ordinary ideas are universal concepts.", "isCorrect": false, "rationale": "This statement is the opposite of Plato's theory; Forms are universals, and particular things are specific examples."}]}, {"question": "In Plato's Theory of Forms, what constitutes 'true knowledge' (episteme) as opposed to 'opinion' (doxa)?", "options": [{"text": "True knowledge is a comprehensive understanding of the physical world achieved through keen sensory observation.", "isCorrect": false, "rationale": "The text states the 'physical world is the realm of opinion (doxa),' making sensory observation insufficient for true knowledge."}, {"text": "True knowledge is the mastery of hypothetical reasoning in disciplines like geometry and arithmetic.", "isCorrect": false, "rationale": "While geometry and arithmetic are part of the intelligible world, they are described as a lower subdivision of intellectual understanding, still relying on hypotheses rather than direct apprehension of first principles."}, {"text": "True knowledge is the direct apprehension of the perfect, eternal, and unchanging Forms.", "isCorrect": true, "rationale": "The text explicitly states, 'True knowledge is knowledge of the Forms, not of their fleeting copies. ... the world of Forms is the realm of knowledge (episteme).'"}, {"text": "True knowledge is the ability to form accurate and well-reasoned opinions about particular things in daily life.", "isCorrect": false, "rationale": "Forming opinions, even accurate ones, about particular things still resides in the realm of doxa (opinion), not episteme (knowledge of Forms)."}]}, {"question": "According to Plato's Sun Analogy, what is the primary function of the Form of the Good in the intelligible world?", "options": [{"text": "It physically illuminates objects, making them visible to the human eye, much like the sun.", "isCorrect": false, "rationale": "This describes the function of the sun in the *visible* world, not the analogous function of the Good in the *intelligible* world."}, {"text": "It is the direct cause of generation, nourishment, and growth for all living things.", "isCorrect": false, "rationale": "This describes the function of the sun in the *visible* world, not the analogous function of the Good in the *intelligible* world."}, {"text": "It imparts truth to things known and the power of knowing to the knower, and is the author of being and essence for all Forms.", "isCorrect": true, "rationale": "The text states the Good 'imparts truth to the known and the power of knowing to the knower' and is 'not only the author of knowledge... but of their being and essence.'"}, {"text": "It establishes the specific moral laws and virtues that govern human societies.", "isCorrect": false, "rationale": "While the Good is the source of all value, its primary function is broader: to make *all* Forms knowable and to provide their being and essence, not just to dictate specific moral laws."}]}, {"question": "How does Plato's Theory of Forms, particularly the Form of the Good, resolve the Euthyphro dilemma concerning the nature of piety?", "options": [{"text": "It concludes that piety is simply whatever the gods happen to love, thereby affirming divine authority as the ultimate standard.", "isCorrect": false, "rationale": "The text states the Form of the Good means there 'is a standard of goodness above and beyond any will, human or divine,' rejecting piety as mere divine preference."}, {"text": "It argues that piety is a matter of individual human opinion, which develops through societal consensus.", "isCorrect": false, "rationale": "Plato's Forms are independent of human opinion, stable and unchanging, directly contradicting the idea of societal consensus."}, {"text": "It establishes a perfect, eternal standard (the Form of Piety, ultimately derived from the Good) that is prior to any human or divine opinion.", "isCorrect": true, "rationale": "The text explains the Platonic answer: 'piety is the Form of Piety — an eternal, perfect standard... The Form is prior to any opinion about it, whether human or divine.'"}, {"text": "It suggests that piety is defined by a list of observable actions commonly agreed upon as pious within a community.", "isCorrect": false, "rationale": "This aligns with Socrates' initial rejection of examples, as such a list would not capture the 'essential nature' or universal quality."}]}, {"question": "When Plato states that the Form of the Good 'far exceeds essence in dignity and power,' what profound implication does this hold for its relationship to other Forms?", "options": [{"text": "It means the Good is simply a more important Form, but still one among many, within the hierarchy of Forms.", "isCorrect": false, "rationale": "The text states the Good 'is not just another Form among many,' indicating it holds a unique, transcendent status."}, {"text": "It implies that the Good is a subjective experience that surpasses objective truth in its ultimate value.", "isCorrect": false, "rationale": "The Forms are objective realities, and the Good is the source of objective truth and being, not a subjective experience."}, {"text": "It signifies that the Good is the ultimate source and ground of all reality, foundational to the very existence and knowability of all other Forms.", "isCorrect": true, "rationale": "The text clarifies that the Good 'is the source and ground of all reality,' implying it provides being and essence to other Forms, exceeding their individual essences."}, {"text": "It suggests that the Good is an abstract concept that can only be understood through faith, not through reason or knowledge.", "isCorrect": false, "rationale": "Plato emphasizes that the Good is 'knowable by reason,' which contradicts the idea of understanding through faith alone."}]}, {"question": "According to Plato's Divided Line, which segment represents the lowest level of human understanding or awareness?", "options": [{"text": "Understanding of physical objects such as animals and human-made artifacts.", "isCorrect": false, "rationale": "This is the second segment of the visible world, representing a higher degree of truth than mere images, but not the lowest."}, {"text": "Scientific and mathematical reasoning, which often relies on hypotheses and visual aids.", "isCorrect": false, "rationale": "This is a segment within the intelligible world, representing a much higher level of understanding than the visible world."}, {"text": "Perceiving mere images like shadows and reflections of physical things.", "isCorrect": true, "rationale": "The text states the 'first section in the sphere of the visible consists of images... shadows, and... reflections,' indicating this is the lowest level."}, {"text": "Grasping the Forms directly through dialectical thought, without reliance on images or hypotheses.", "isCorrect": false, "rationale": "This represents the highest level of understanding on the Divided Line, not the lowest."}]}, {"question": "In the context of the Divided Line, how does Plato describe the use of hypotheses in the lower subdivision of the intellectual sphere (e.g., in geometry)?", "options": [{"text": "Hypotheses are treated as ultimate first principles that require no further justification.", "isCorrect": false, "rationale": "The text states that in this subdivision, the soul does not go 'upwards to a principle,' meaning hypotheses are not treated as ultimate first principles."}, {"text": "Hypotheses are used as unproven assumptions from which conclusions are consistently derived, without ascending to a first principle.", "isCorrect": true, "rationale": "The text explains geometers 'assume... their hypotheses... and therefore they do not deign to give any account of them... but they begin with them, and go on until they arrive at last... at their conclusion.'"}, {"text": "Hypotheses serve primarily as tools to gain knowledge about the physical world through empirical observation.", "isCorrect": false, "rationale": "Although they may 'make use of the visible forms,' students of geometry are 'thinking not of these, but of the ideals which they resemble,' indicating a focus beyond the physical world."}, {"text": "Hypotheses are developed and refined until they lead directly to the apprehension of the Form of the Good.", "isCorrect": false, "rationale": "The text notes this level is 'not ascending to a first principle, because she is unable to rise above the region of hypothesis,' and thus cannot directly lead to the Form of the Good."}]}, {"question": "According to Plato's Theory of Forms, what is the relationship between a particular pious act observed in the world and the eternal Form of Piety?", "options": [{"text": "Particular pious acts collectively define and create the Form of Piety through repeated instances.", "isCorrect": false, "rationale": "Plato's Forms are independent and prior to particulars; they are not created by them."}, {"text": "The Form of Piety is merely a mental abstraction derived from observing many particular pious acts.", "isCorrect": false, "rationale": "The text clarifies that Forms are 'real, independent entities,' not just mental abstractions."}, {"text": "Particular pious acts are imperfect copies or participants in the perfect, unchanging Form of Piety.", "isCorrect": true, "rationale": "The text states, 'Particular pious acts are pious because they participate in or imitate the Form of Piety. The Form is the original; the particular acts are copies.'"}, {"text": "There is no direct relationship; particular acts exist in the physical world, and the Form exists in a completely separate, unrelated realm.", "isCorrect": false, "rationale": "The theory of participation/imitation establishes a direct, albeit hierarchical, relationship between particulars and Forms."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
