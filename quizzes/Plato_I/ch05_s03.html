<script>
var QUESTIONS = [{"question": "The primary purpose of the \"Where Next?\" section is to:", "options": [{"text": "Summarize the content of the three Plato dialogues readers have already finished.", "isCorrect": false, "rationale": "While the introduction briefly references past readings, the section's core focus is on *future* philosophical engagement, not summarizing prior content."}, {"text": "Provide guidance on further philosophical reading, both within Plato's works and beyond, and illustrate philosophy's broad relevance.", "isCorrect": true, "rationale": "The section explicitly offers 'suggestions for where to go next' in 'More Plato' and 'Beyond Plato,' and then demonstrates how 'Philosophy and Everything Else' connect, fulfilling this purpose."}, {"text": "Reiterate the importance of reading Plato's works in their original, untranslated Greek.", "isCorrect": false, "rationale": "The text mentions a public domain translation (Jowett's Republic) and does not advocate for reading in original Greek; it emphasizes accessible next steps."}, {"text": "Critique common misconceptions about Socrates' approach to the examined life.", "isCorrect": false, "rationale": "The section clarifies and elaborates on the 'examined life' but its primary purpose is not to critique misconceptions, nor is this the main theme of the entire section."}], "id": "q01"}, {"question": "In the Meno, Socrates introduces a striking idea about learning. What is this idea?", "options": [{"text": "That virtue can only be taught through practical application, not theoretical discussion.", "isCorrect": false, "rationale": "The Meno does explore whether virtue can be taught, but this specific statement is not the 'striking idea' mentioned in the text. The striking idea is about recollection."}, {"text": "That learning is fundamentally a process of recollection, where the soul already possesses truth.", "isCorrect": true, "rationale": "The text states: 'Socrates... introduces the striking idea that learning is really recollection: the soul already knows the truth and needs only the right questions to draw it out.'"}, {"text": "That all knowledge is derived solely from sensory experience and observation.", "isCorrect": false, "rationale": "This aligns with empiricism, a philosophical school, but is contrary to Plato's concept of innate knowledge or recollection in the Meno."}, {"text": "That true wisdom comes from recognizing the limitations of human reason.", "isCorrect": false, "rationale": "While humility is a Socratic virtue, the specific 'striking idea' attributed to the Meno in the text is recollection, not a general statement about rational limitations."}], "id": "q02"}, {"question": "How does the Phaedo specifically \"complete the story\" begun by the Apology and Crito?", "options": [{"text": "It resolves the Euthyphro dilemma by offering a definitive answer to the nature of piety.", "isCorrect": false, "rationale": "The Euthyphro dilemma is from a different dialogue (Euthyphro), and the Phaedo's focus is on Socrates' death and the soul's immortality."}, {"text": "It depicts Socrates' final hours and his arguments for the soul's immortality, concluding the narrative of his condemnation and impending death.", "isCorrect": true, "rationale": "The text explicitly states: 'This dialogue takes place on the last day of Socrates' life... It completes the story that the Apology and Crito began,' with a discussion on 'the immortality of the soul.'"}, {"text": "It presents Socrates' most ambitious development of the Theory of Forms, a concept absent from the earlier dialogues.", "isCorrect": false, "rationale": "The Theory of Forms is most extensively developed in the Republic, not the Phaedo, though it might be present in a nascent form."}, {"text": "It introduces Meno, a new interlocutor, to challenge Socrates' views on justice in a more profound way.", "isCorrect": false, "rationale": "Meno is a character in the dialogue named Meno, which is distinct from the Phaedo."}], "id": "q03"}, {"question": "Which of the following major philosophical concepts is primarily developed in Plato's Republic?", "options": [{"text": "The Socratic method and its application in daily life.", "isCorrect": false, "rationale": "The Socratic method is central to Plato's early dialogues (like Euthyphro, Apology, Crito), but the Republic delves into more extensive theoretical constructs."}, {"text": "The argument that happiness is an activity of the soul in accordance with virtue.", "isCorrect": false, "rationale": "This is a key tenet of Aristotle's Nicomachean Ethics, not Plato's Republic."}, {"text": "The Theory of Forms and the Allegory of the Cave.", "isCorrect": true, "rationale": "The text explicitly mentions that the Republic 'develops the Theory of Forms, presents the Allegory of the Cave, and argues that philosophers should be kings.'"}, {"text": "The idea that learning is a form of recollection.", "isCorrect": false, "rationale": "This idea is introduced in the Meno, as described earlier in the section."}], "id": "q04"}, {"question": "According to the text, how does Aristotle's approach to ethics in the Nicomachean Ethics generally differ from Plato's philosophy?", "options": [{"text": "Aristotle is more mystical and focuses on abstract ideals rather than practical experience.", "isCorrect": false, "rationale": "The text states the opposite, describing Aristotle as 'More practical and less mystical than Plato.'"}, {"text": "Aristotle grounds his ethics in the everyday experience of living well, making it more practical.", "isCorrect": true, "rationale": "The text explains: 'More practical and less mystical than Plato, Aristotle grounds his ethics in the everyday experience of living well.'"}, {"text": "Aristotle entirely dismisses the concept of virtue, focusing instead on hedonistic pleasure.", "isCorrect": false, "rationale": "Aristotle's ethics, centered on 'happiness (eudaimonia) is an activity of the soul in accordance with virtue,' clearly do not dismiss virtue."}, {"text": "Aristotle emphasizes the importance of divine revelation in understanding the good life.", "isCorrect": false, "rationale": "While 'Beyond Plato' includes Augustine who combines philosophy and the 'God of the Bible,' this is not characteristic of Aristotle's approach as described here."}], "id": "q05"}, {"question": "The text notes that Marcus Aurelius's Meditations \"carry forward the Socratic spirit of examining one's own life.\" Given the description, which characteristic of the \"examined life\" is most evident in the Meditations?", "options": [{"text": "Engaging in public debates to test philosophical arguments.", "isCorrect": false, "rationale": "The Meditations are described as a 'private journal' and 'reflections to himself,' which contrasts with public debate."}, {"text": "Systematically observing the natural world to derive universal laws.", "isCorrect": false, "rationale": "This describes a scientific approach, which, while connected to philosophy, is not the specific Socratic spirit of *self-examination* highlighted for Marcus Aurelius."}, {"text": "Persistent self-reflection and introspection on duties, impermanence, and self-control.", "isCorrect": true, "rationale": "The text describes Marcus Aurelius's Meditations as 'private journal of Stoic philosophy' with 'reflections to himself' on 'duty, death, impermanence, and self-control,' perfectly aligning with personal introspection for self-examination."}, {"text": "Constructing an ideal city-state as a blueprint for societal justice.", "isCorrect": false, "rationale": "This is a primary theme of Plato's Republic, not Marcus Aurelius's Meditations."}], "id": "q06"}, {"question": "Augustine's Confessions is described as uniquely significant because it:", "options": [{"text": "Is the first autobiography ever written in the Western tradition.", "isCorrect": false, "rationale": "While it is a significant autobiography, the text does not claim it to be the *first* in the Western tradition."}, {"text": "Represents a pivotal intersection of Greek philosophy with the theological concepts of the Bible.", "isCorrect": true, "rationale": "The text states: 'The Confessions shows what happens when Greek philosophy meets the God of the Bible — and the result is one of the most influential books ever written.'"}, {"text": "Focuses primarily on developing a new theory of government and social order.", "isCorrect": false, "rationale": "Augustine's Confessions is described as 'Part autobiography, part philosophical argument, part prayer to God' tracing a personal journey, not primarily a political theory."}, {"text": "Advocates for a purely secular approach to understanding human suffering and redemption.", "isCorrect": false, "rationale": "Augustine's work is explicitly Christian, describing his journey to becoming a 'Christian bishop at peace with truth' and engaging with the 'God of the Bible.'"}], "id": "q07"}, {"question": "A historian researching the American founders' political thought would likely find which aspect of philosophy, as described in this section, most relevant to their work?", "options": [{"text": "The pre-Socratics' search for natural explanations of the universe.", "isCorrect": false, "rationale": "While foundational to science, the pre-Socratics' focus on natural explanations is less directly relevant to political thought than specific political philosophers."}, {"text": "The influence of Plato, Aristotle, and Cicero on their understanding of governance and law.", "isCorrect": true, "rationale": "The text states under 'History': 'The American founders read Plato, Aristotle, and Cicero. You cannot understand history without understanding the ideas that moved historical actors.'"}, {"text": "The aphoristic style of Roman Stoic philosophy in private journals.", "isCorrect": false, "rationale": "While Stoicism is a philosophical tradition, the *style* of private journals is not highlighted as a primary influence on American founders' political thought compared to the direct influence of specific philosophers' ideas on governance."}, {"text": "Debates among Dostoevsky's characters about moral relativism.", "isCorrect": false, "rationale": "Dostoevsky is mentioned under 'Literature' as exploring philosophical questions, but he lived much later than the American founders and is not cited as an influence on them."}], "id": "q08"}, {"question": "The text clarifies that Socrates did not examine his life by \"sitting alone in a room thinking.\" What, according to the passage, was the central, active characteristic of Socrates' examined life?", "options": [{"text": "Engaging in solitary meditation and quiet contemplation.", "isCorrect": false, "rationale": "The passage explicitly states Socrates did *not* examine his life by 'sitting alone in a room thinking,' directly contradicting this option."}, {"text": "Continuously questioning, discussing, and testing assumptions through conversation with others.", "isCorrect": true, "rationale": "The text states: 'He examined it by talking — by asking questions, by testing his own assumptions, by listening to others and pushing back when their reasoning was sloppy. The examined life, for Socrates, was a life lived in conversation.'"}, {"text": "Documenting personal reflections in a private journal for future reference.", "isCorrect": false, "rationale": "This describes Marcus Aurelius's method, not Socrates' active, conversational approach to the examined life as described in the passage."}, {"text": "Seeking divine guidance through prayer and religious rituals.", "isCorrect": false, "rationale": "While Socrates was devout, the text emphasizes his method of examination through human conversation and reason, not primarily through religious rituals."}], "id": "q09"}, {"question": "The passage concludes by stating, \"The examined life is not a destination you arrive at once and for all. It is a practice — a habit of questioning, reflecting, and seeking truth.\" What is the most significant implication of defining the examined life as a \"practice\"?", "options": [{"text": "That it is a state of perfect wisdom one eventually achieves after years of study.", "isCorrect": false, "rationale": "The phrase 'not a destination you arrive at once and for all' directly contradicts the idea of it being a fixed, achievable state of perfect wisdom."}, {"text": "That it requires continuous, ongoing effort and consistent engagement throughout one's life.", "isCorrect": true, "rationale": "Describing something as a 'practice' or 'habit' inherently implies ongoing, regular, and continuous engagement rather than a finite achievement."}, {"text": "That it is a philosophical concept primarily applicable to professional academics and scholars.", "isCorrect": false, "rationale": "The concluding 'teacher note' and prompts suggest it's applicable to 'a high school student today,' indicating it's not limited to academics."}, {"text": "That its primary goal is to find definitive, unchanging answers to all philosophical questions.", "isCorrect": false, "rationale": "Socrates often ended with questions, and the text emphasizes 'seeking truth' and 'questioning,' implying a process rather than a final collection of fixed answers."}], "id": "q10"}, {"question": "The text recommends Boethius' Consolation of Philosophy as further reading alongside the Platonic dialogues. Given the thematic connections already established in this chapter, why is Boethius particularly suited to follow the Crito?", "options": [{"text": "Both works are set in prisons and dramatize a condemned man's philosophical reasoning about justice, fortune, and the soul — making them natural companions in the tradition of philosophical courage in the face of death.", "isCorrect": true, "rationale": "Like Socrates in the Crito, Boethius wrote from a prison cell while awaiting execution. Both works use a personified abstraction (the Laws; Lady Philosophy) to make philosophical arguments about the good, and both explore whether external misfortune can truly harm a person of philosophical integrity."}, {"text": "Both works arrive at the same political conclusion — that citizens should always obey the state, even when it acts unjustly.", "isCorrect": false, "rationale": "The Crito's conclusion about civic obedience is not the same as Boethius' conclusions about Providence and Fortune. The Consolation is more concerned with metaphysical questions about good and evil, fortune and necessity, than with political obligation."}, {"text": "Both works were written in the same century and reflect the same intellectual environment of late classical Athens.", "isCorrect": false, "rationale": "Socrates lived in 5th-century BC Athens; Boethius lived in 6th-century AD Rome — over nine hundred years later. Their connection is thematic and literary, not chronological or geographical."}, {"text": "Boethius directly quotes the Crito throughout the Consolation, making it a kind of extended commentary on Socrates' argument.", "isCorrect": false, "rationale": "While Boethius drew on Platonic ideas, the Consolation is not structured as a commentary on the Crito. The connection is structural and thematic — not a direct citation-by-citation commentary."}], "id": "q11"}, {"question": "The text identifies several 'broader connections' of philosophy to other disciplines — literature, history, theology, science. Which of the following best illustrates the connection between philosophy and literature as described in the section?", "options": [{"text": "Philosophy provides literary critics with technical vocabulary for analyzing metaphors, while literature provides philosophers with examples of bad reasoning.", "isCorrect": false, "rationale": "The text does not describe the connection in this reductive way. The relationship is more profound: great literature dramatizes philosophical questions, and philosophy helps readers understand what literature is about at its deepest level."}, {"text": "Great literature dramatizes philosophical questions — Dostoevsky's characters debate free will and suffering, Shakespeare's plays probe justice and the good life — making reading literature a form of philosophical engagement.", "isCorrect": true, "rationale": "The text states: 'Literature dramatizes philosophical questions. When you read Dostoevsky, you are thinking about free will, suffering, and meaning. When you read Shakespeare, you are thinking about justice, time, and the good life.' Philosophy and literature are partners in exploring the deepest questions of human existence."}, {"text": "Philosophy replaces literature as the primary means of exploring human experience, since arguments are more precise than stories.", "isCorrect": false, "rationale": "The text presents philosophy and literature as complementary rather than competitive. The connection is not about replacement but about how literature and philosophy illuminate the same fundamental questions from different angles."}, {"text": "Literature is purely entertainment, while philosophy is serious inquiry — but reading widely in both separately makes a person more well-rounded.", "isCorrect": false, "rationale": "The text treats great literature as itself philosophical — not as mere entertainment separate from serious inquiry. The connection is one of deep overlap in subject matter, not just parallelism in a well-rounded education."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
