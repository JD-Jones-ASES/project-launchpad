<script>
var QUESTIONS = [{"question": "What major event primarily motivated Plato to propose the concept of philosopher-kings in his work, The Republic?", "options": [{"text": "The Peloponnesian War, which devastated Athens.", "isCorrect": false, "rationale": "While the Peloponnesian War was a significant event, the text specifically states that Plato's teacher's death at the hands of the Athenian Assembly convinced him that no existing government could be trusted with justice, directly leading to his proposal of philosopher-kings."}, {"text": "The condemnation and execution of his teacher, Socrates, by a democratic jury.", "isCorrect": true, "rationale": "The text explicitly states: 'Plato never forgot the lesson of 399 BC. His teacher's death at the hands of the Athenian Assembly convinced him that no existing form of government could be trusted with justice. In the Republic... Plato proposes a radical alternative: the ideal city would be ruled by philosophers.'"}, {"text": "His own personal experience with political corruption.", "isCorrect": false, "rationale": "The text attributes Plato's motivation to Socrates' death, not his personal experiences with corruption, although this might have been a contributing factor not explicitly mentioned as the primary motivator for the philosopher-king concept."}, {"text": "The inherent instability of all monarchical governments.", "isCorrect": false, "rationale": "The event that triggered Plato's distrust in existing governments was the trial and execution of Socrates by a *democratic* assembly, not monarchical instability."}], "id": "q01"}, {"question": "According to the text, what was Socrates' unique insight that made him 'wiser than other men' in his defense speech?", "options": [{"text": "His mastery of dialectic and mathematics.", "isCorrect": false, "rationale": "While philosophers, including Socrates, engaged in dialectic, the text highlights a more fundamental insight for Socrates' specific claim of wisdom: his recognition of ignorance, not just his skill in certain fields."}, {"text": "His ability to predict future events.", "isCorrect": false, "rationale": "The text does not mention Socrates claiming or possessing the ability to predict future events."}, {"text": "His recognition of his own lack of knowledge.", "isCorrect": true, "rationale": "The text states: 'Socrates argued that he alone was wiser than other men because he alone recognized his own ignorance. The politicians, poets, and craftsmen all thought they knew things they did not actually know.'"}, {"text": "His possession of divine wisdom from the oracle at Delphi.", "isCorrect": false, "rationale": "Socrates claimed a divine mission, but his wisdom, as explained in the context of his defense, was specifically understanding his own ignorance, not simply receiving divine answers."}], "id": "q02"}, {"question": "In Plato's Allegory of the Cave, what do the prisoners initially perceive as reality?", "options": [{"text": "The true objects being carried behind them.", "isCorrect": false, "rationale": "The prisoners are chained and can only see the wall in front of them; they cannot see the true objects being carried behind the low wall."}, {"text": "The fire blazing behind them.", "isCorrect": false, "rationale": "The prisoners are chained with their necks fixed, preventing them from turning around to see the fire."}, {"text": "The shadows cast on the cave wall.", "isCorrect": true, "rationale": "The text states: 'Prisoners chained in a cave since childhood see only shadows projected on the wall before them by a fire behind their backs. They take these shadows for reality.'"}, {"text": "The reflections of objects in water.", "isCorrect": false, "rationale": "Seeing reflections in water is a stage of adaptation to the upper world, after being freed, not the initial perception of reality inside the cave."}], "id": "q03"}, {"question": "When the freed prisoner eventually perceives the sun itself in the Allegory of the Cave, what does Plato explicitly state this represents in the 'world of knowledge'?", "options": [{"text": "The ultimate understanding of mathematical principles.", "isCorrect": false, "rationale": "Mathematics is part of the rigorous study a philosopher undergoes, but the sun represents a higher, ultimate reality beyond specific disciplines."}, {"text": "The idea of Good, which is the universal author of all things beautiful and right.", "isCorrect": true, "rationale": "Plato directly interprets the allegory: 'in the world of knowledge the idea of good appears last of all, and is seen only with an effort; and, when seen, is also inferred to be the universal author of all things beautiful and right...'"}, {"text": "The recognition of political power.", "isCorrect": false, "rationale": "While the allegory has implications for political power (philosopher-kings), the sun itself is interpreted as the Idea of Good, the ultimate source of truth and reality, not just political power."}, {"text": "The ability to eloquently debate philosophical concepts.", "isCorrect": false, "rationale": "This is a skill developed through philosophical training, not the ultimate reality represented by the sun."}], "id": "q04"}, {"question": "What is the immediate reaction of a prisoner upon being first liberated and compelled to look towards the light in Plato's Allegory of the Cave?", "options": [{"text": "They immediately recognize the falsity of the shadows and embrace the new reality.", "isCorrect": false, "rationale": "The text describes a painful and disorienting process where the freed prisoner initially prefers the perceived 'truth' of the shadows."}, {"text": "They experience sharp pains and are distressed by the glare, finding it difficult to see the real objects.", "isCorrect": true, "rationale": "The text states: 'At first, when any of them is liberated and compelled suddenly to stand up and turn his neck round and walk and look towards the light, he will suffer sharp pains; the glare will distress him, and he will be unable to see the realities...'"}, {"text": "They feel gratitude towards their liberator for showing them the truth.", "isCorrect": false, "rationale": "Gratitude is not mentioned as the immediate reaction; instead, pain, distress, and a preference for the familiar darkness are described."}, {"text": "They instantly become enlightened and capable of clear reasoning.", "isCorrect": false, "rationale": "The process of ascent and gaining clearer vision is gradual, requiring adjustment, not instant enlightenment."}], "id": "q05"}, {"question": "According to the text, what is the most 'troubling' implication of Plato's argument for the philosopher-king?", "options": [{"text": "That philosophical training takes too long for effective governance.", "isCorrect": false, "rationale": "While philosophers spending 'decades training their minds' is mentioned, the specific 'troubling' aspect highlighted is democracy's inherent flaw, not the time commitment for training."}, {"text": "That it suggests democracy is fundamentally flawed because most citizens cannot perceive true reality.", "isCorrect": true, "rationale": "The text states: 'Troubling, because it implies that democracy — the rule of the many — is inherently defective, since the many are trapped in the Cave and cannot see clearly.'"}, {"text": "That philosophers might become corrupted by absolute power.", "isCorrect": false, "rationale": "While a valid concern, this specific 'troubling' implication is not the one highlighted in the text regarding Plato's argument for the philosopher-king."}, {"text": "That the philosopher-king might be lonely in their wisdom.", "isCorrect": false, "rationale": "This is not mentioned in the text as a 'troubling' implication of the philosopher-king concept."}], "id": "q06"}, {"question": "How does the text connect the Allegory of the Cave directly to Socrates' fate as described in the Apology?", "options": [{"text": "It suggests that Socrates, like the chained prisoners, was unable to see the truth.", "isCorrect": false, "rationale": "The text portrays Socrates as the *freed* prisoner, not one of the chained ones, who has 'seen something real'."}, {"text": "It portrays Socrates as the freed prisoner who attempts to enlighten others, only to be met with hostility and condemnation.", "isCorrect": true, "rationale": "The text explicitly states: 'Socrates is the freed prisoner who has seen something real... He returns to his fellow Athenians and tries to awaken them. They respond not with gratitude but with a death sentence.'"}, {"text": "It argues that Socrates was merely a shadow of a true philosopher-king.", "isCorrect": false, "rationale": "The text uses Socrates as the embodiment of the philosopher who attempts to enlighten, not as a lesser figure."}, {"text": "It uses Socrates' trial as an example of a successful democratic process.", "isCorrect": false, "rationale": "The text uses Socrates' trial as evidence of democracy's defectiveness, leading to Plato's philosopher-king idea, not as a successful process."}], "id": "q07"}, {"question": "Which of the following represents a key difference between Socrates and Jesus during their respective trials, as highlighted in the text?", "options": [{"text": "Socrates willingly accepted his death sentence, while Jesus sought to avoid it.", "isCorrect": false, "rationale": "The text states that *both* men chose death rather than compromise their message, implying neither sought to avoid it in principle."}, {"text": "Socrates actively engaged in philosophical argument and speech, whereas Jesus was largely silent.", "isCorrect": true, "rationale": "The text explicitly contrasts them: 'Socrates argued. He cross-examined Meletus, reasoned about death, and delivered a long philosophical speech. Jesus, before Pilate, was largely silent.'"}, {"text": "Socrates was accused by religious authorities, while Jesus was accused by political authorities.", "isCorrect": false, "rationale": "The text states that *both* men were accused by the religious authorities of their communities."}, {"text": "Socrates claimed a divine mission, while Jesus did not.", "isCorrect": false, "rationale": "The text states that *both* men claimed a divine mission."}], "id": "q08"}, {"question": "What remarkable claim did early Christian philosopher Justin Martyr make about figures like Socrates?", "options": [{"text": "That Socrates was a pagan enemy of Christian truth.", "isCorrect": false, "rationale": "Justin Martyr's claim reflects the early Church's conviction that Greek philosophy and Christian revelation were 'not enemies but allies'."}, {"text": "That Socrates was, in some sense, a 'Christian before Christ.'", "isCorrect": true, "rationale": "The text states: 'This remarkable claim — that Socrates was, in some sense, a Christian before Christ — reflects the early Church's conviction that Greek philosophy and Christian revelation were not enemies but allies.'"}, {"text": "That Socrates' teachings directly contradicted Christian doctrine.", "isCorrect": false, "rationale": "Justin Martyr viewed Socrates as an ally and compatible with Christian revelation, not a contradiction."}, {"text": "That Socrates' trial was an exact prophecy of Jesus' crucifixion.", "isCorrect": false, "rationale": "While parallels were drawn, the text does not state that Justin Martyr considered Socrates' trial an 'exact prophecy' of Jesus' crucifixion."}], "id": "q09"}, {"question": "Based on the 'troubling' aspect of Plato's philosopher-king argument and modern democratic responses, what is a primary goal of educational systems in contemporary democracies regarding the tension between wisdom and political power?", "options": [{"text": "To ensure that only philosophers are elected to political office.", "isCorrect": false, "rationale": "This aligns with Plato's ideal, but not the mechanisms modern democracies employ to address the tension, which focus on citizen enlightenment rather than philosopher rule."}, {"text": "To maintain the comfort of citizens in their existing beliefs.", "isCorrect": false, "rationale": "The analogy of being 'trapped in the Cave' implies a need to move beyond comfortable darkness, suggesting education should challenge, not maintain, static beliefs."}, {"text": "To produce thoughtful citizens capable of discerning truth and making informed decisions, thereby mitigating the risk of a 'trapped' populace.", "isCorrect": true, "rationale": "The text states modern democracies address this tension through 'educational systems designed to produce thoughtful citizens,' directly counteracting the idea of citizens 'trapped in the Cave' who 'cannot see clearly.'"}, {"text": "To suppress free speech that might challenge popular opinions.", "isCorrect": false, "rationale": "The text explicitly mentions 'constitutional protections for free speech' as a mechanism modern democracies use, indicating the opposite of suppression."}], "id": "q10"}, {"question": "The text describes how the Stoic school was inspired in part by the example of Socrates. Which specifically Stoic principle most directly reflects Socrates' conduct at his own trial?", "options": [{"text": "The Stoic belief that the philosopher should withdraw from public life to pursue inner peace in isolation.", "isCorrect": false, "rationale": "Socrates was deeply embedded in public life — arguing, questioning, and engaging Athens until his last moment. The Stoics who followed his example (Seneca, Marcus Aurelius) were also public figures. Withdrawal from the world is more associated with Epicureanism."}, {"text": "The Stoic conviction that virtue alone is sufficient for happiness and that externals — including death, poverty, and imprisonment — cannot harm the person of good character.", "isCorrect": true, "rationale": "The text notes that the Stoics took Socrates as a model of living and dying: he refused to compromise his principles, accepted the verdict calmly, and argued that nothing external — not even death — could harm a good soul. This became the cornerstone of Stoic ethics."}, {"text": "The Stoic argument that all political institutions are corrupt and must be abolished in favor of rational governance.", "isCorrect": false, "rationale": "Socrates did not advocate abolishing political institutions — he argued for obedience to the law even when unjust (in the Crito). The Stoics similarly worked within existing structures while maintaining personal virtue."}, {"text": "The Stoic preference for mathematical proof over rhetorical argument as the foundation of philosophical inquiry.", "isCorrect": false, "rationale": "This is not a defining Stoic principle derived from Socrates. Stoic philosophy focused on ethics and the relationship between virtue, reason, and happiness — not mathematics as the primary philosophical method."}], "id": "q11"}, {"question": "The concept of civil disobedience as developed by Thoreau and King draws on the Socratic legacy, yet there is a critical tension between the Apology and the Crito regarding this concept. What is the tension?", "options": [{"text": "In the Apology, Socrates says he would obey a divine command to stop philosophizing; in the Crito, he says he would obey the same command — making his position consistent but rigid.", "isCorrect": false, "rationale": "In the Apology, Socrates explicitly says he would disobey an Athenian order to stop philosophizing — 'I will obey God rather than you.' The tension is between this statement and his Crito position of accepting the laws."}, {"text": "In the Apology, Socrates seems willing to disobey an unjust order to stop philosophizing; in the Crito, he refuses to escape even from an unjust death sentence — suggesting both defiance and submission to law in the same person.", "isCorrect": true, "rationale": "This is the central tension civil disobedience theory inherits from Socrates: in the Apology he implies he would disobey an unjust law to preserve his philosophical mission, yet in the Crito he refuses to escape, accepting the legal outcome. Reconciling these two positions is a foundational challenge for political philosophy."}, {"text": "In the Apology, Socrates defends democracy as the best form of government; in the Crito, he attacks democracy as fundamentally flawed — creating a contradiction in his political theory.", "isCorrect": false, "rationale": "Socrates does not defend democracy in the Apology — he implicitly criticizes the system by noting that the jury was shaped by prejudice. The Apology/Crito tension is about obedience to law, not about evaluating democracy."}, {"text": "In the Apology, Socrates argues that philosophy must always be kept private; in the Crito, the Laws argue that philosophy should be publicly taught — reversing his earlier position.", "isCorrect": false, "rationale": "This does not accurately represent either dialogue. Socrates' philosophy was always public, and the Crito's Laws make no argument about public versus private philosophy."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
