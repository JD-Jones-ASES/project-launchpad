<script>
var QUESTIONS = [{"question": "Which statement best captures the essence of philosophy as suggested by its etymological roots and the story of Pythagoras?", "options": [{"text": "Philosophy is the attainment of ultimate answers to life's profoundest questions, making one a 'wise man'.", "isCorrect": false, "rationale": "The text states that Pythagoras called himself a 'lover of wisdom' (philosophos) rather than a 'wise man' (sophos), emphasizing philosophy as a pursuit, not a finished product or possession of all answers."}, {"text": "Philosophy is a continuous search for truth and understanding, driven by a love for wisdom rather than a claim to possess it.", "isCorrect": true, "rationale": "The text explains that 'philosophia' (love of wisdom) captures the discipline's true nature as 'a pursuit, not a finished product,' and a philosopher is 'not someone who already possesses all the answers, but someone who cares enough about the truth to keep searching for it.'"}, {"text": "Philosophy is primarily concerned with collecting and categorizing all known forms of knowledge across various fields.", "isCorrect": false, "rationale": "While philosophy engages with knowledge, its core is about the 'love of wisdom' and 'fundamental questions,' not merely cataloging existing information, which is more characteristic of encyclopedic work or data science."}, {"text": "Philosophy is the intellectual discipline of proving established truths through rigorous argument and scientific methodology.", "isCorrect": false, "rationale": "The text distinguishes philosophy from science, stating that philosophical questions cannot be settled by experiment. It is a pursuit of wisdom, not just the proof of established truths."}], "id": "q01"}, {"question": "According to the text, what distinguishes philosophical questions from those addressed by science or history?", "options": [{"text": "Philosophical questions are inherently subjective and therefore lack objective, universally agreed-upon answers.", "isCorrect": false, "rationale": "The text does not claim philosophical questions are subjective; rather, it highlights their fundamental nature that transcends empirical or historical evidence."}, {"text": "Philosophical questions are so fundamental that they cannot be resolved by empirical observation or historical documentation alone.", "isCorrect": true, "rationale": "The text explicitly states that philosophical questions are 'so basic that no experiment can settle them and no historical document can answer them,' citing examples like 'why there is a universe' or 'whether those laws were just.'"}, {"text": "Philosophical questions typically concern only abstract concepts, whereas science and history deal exclusively with concrete facts.", "isCorrect": false, "rationale": "While philosophy deals with abstract concepts, it often relates them to concrete realities (e.g., justice in society). The distinction is about the *kind* of questions asked, not just their abstractness."}, {"text": "Philosophical questions exclusively focus on supernatural phenomena, unlike scientific or historical inquiries.", "isCorrect": false, "rationale": "While metaphysics touches on questions beyond the physical, philosophy's scope (including ethics, logic, political philosophy) is not limited to supernatural phenomena."}], "id": "q02"}, {"question": "A group of community leaders is debating the fundamental principles of fairness in their local tax system and whether the current laws truly reflect what is morally right. Which definition of philosophy best describes their activity?", "options": [{"text": "The systematic observation and experimentation to uncover the mechanisms of the natural world.", "isCorrect": false, "rationale": "This describes scientific inquiry, not the philosophical debate on justice and morality."}, {"text": "The collection of widely accepted beliefs and traditions that guide a community's customs.", "isCorrect": false, "rationale": "This describes cultural or sociological study, not the critical, reasoned inquiry into fundamental moral principles that philosophy entails."}, {"text": "The disciplined pursuit of wisdom through reason and argument, investigating fundamental questions about morality and the good life.", "isCorrect": true, "rationale": "This aligns directly with the provided definition of philosophy, particularly its investigation into 'morality, and the good life,' using 'reason and argument' to address fundamental questions like what is 'morally right' or 'fairness.'"}, {"text": "The study of ancient texts to understand historical perspectives on human behavior and societal structures.", "isCorrect": false, "rationale": "This describes historical or textual analysis, which, while valuable, is distinct from the active philosophical pursuit of wisdom through reason and argument on fundamental questions."}], "id": "q03"}, {"question": "A philosopher is exploring whether individuals have a moral obligation to contribute to charitable causes, even if it entails personal sacrifice. Which branch of philosophy is this philosopher primarily engaged in?", "options": [{"text": "Metaphysics", "isCorrect": false, "rationale": "Metaphysics concerns what is ultimately real (e.g., existence of the soul, nature of God), not moral duties or obligations."}, {"text": "Epistemology", "isCorrect": false, "rationale": "Epistemology deals with the nature of knowledge and how we know, not questions of how we ought to live or moral obligations."}, {"text": "Ethics", "isCorrect": true, "rationale": "Ethics 'asks how we ought to live. What is good? What is just? What do we owe to one another?' The question of moral obligation to charity directly falls under this branch."}, {"text": "Political Philosophy", "isCorrect": false, "rationale": "Political philosophy asks how societies should be organized and concerns governmental rights and citizen obligations to the state. While related to 'what we owe,' the primary focus here is individual moral obligation, which is the domain of ethics."}], "id": "q04"}, {"question": "A debate arises among thinkers about whether consciousness can exist independently of a physical brain, or if it is entirely a product of neurological processes. This discussion falls under which branch of philosophy?", "options": [{"text": "Logic", "isCorrect": false, "rationale": "Logic studies the rules of correct reasoning and valid arguments, not the fundamental nature of reality or existence."}, {"text": "Ethics", "isCorrect": false, "rationale": "Ethics concerns moral conduct and how we ought to live, which is distinct from the question of consciousness and its existence."}, {"text": "Metaphysics", "isCorrect": true, "rationale": "Metaphysics 'asks what is ultimately real. Does the soul exist? Is the physical world all there is?' The question of consciousness existing independently of the brain directly addresses the ultimate nature of reality and existence, fitting squarely into metaphysics."}, {"text": "Political Philosophy", "isCorrect": false, "rationale": "Political philosophy focuses on how societies should be organized and questions of governance, not the nature of consciousness."}], "id": "q05"}, {"question": "Consider a scenario where a jury is trying to determine if an eyewitness testimony, given under highly stressful conditions, can be considered reliable evidence for conviction. This scenario most directly touches upon a core concern of which philosophical branch?", "options": [{"text": "Ethics", "isCorrect": false, "rationale": "While legal ethics might be involved, the core philosophical question here is about the reliability of knowledge, not moral conduct directly."}, {"text": "Metaphysics", "isCorrect": false, "rationale": "Metaphysics deals with the nature of reality and existence, not the validity or reliability of human perception and testimony."}, {"text": "Epistemology", "isCorrect": true, "rationale": "Epistemology 'asks what we can know and how we know it. What counts as genuine knowledge, as opposed to mere opinion? Can the senses be trusted?' The reliability of eyewitness testimony directly relates to how knowledge is acquired and validated, especially concerning sensory experience."}, {"text": "Political Philosophy", "isCorrect": false, "rationale": "Political philosophy concerns the organization of societies and governmental rights, not the nature of knowledge or evidence reliability."}], "id": "q06"}, {"question": "A student is constructing an argument to persuade their parents about a new curfew. They carefully ensure that their conclusion necessarily follows from their stated reasons, regardless of whether those reasons are factually true. Which branch of philosophy is most directly informing the *structure* of their argument?", "options": [{"text": "Ethics", "isCorrect": false, "rationale": "Ethics concerns moral values and conduct, not the internal consistency or validity of an argument's structure."}, {"text": "Epistemology", "isCorrect": false, "rationale": "Epistemology deals with the nature of knowledge and belief, not the rules by which conclusions are derived from premises in an argument."}, {"text": "Logic", "isCorrect": true, "rationale": "Logic 'studies the rules of correct reasoning. When does a conclusion truly follow from its premises? What makes an argument valid?' The student's focus on the conclusion necessarily following from premises, independent of factual truth, is a core concern of logic."}, {"text": "Political Philosophy", "isCorrect": false, "rationale": "Political philosophy deals with the organization of societies and governance, unrelated to the internal structure of an argument."}], "id": "q07"}, {"question": "Following a period of societal upheaval, a new government is being established. Debates arise regarding the legitimate source of governmental authority and the extent to which citizens are obligated to obey the new laws, especially if they are perceived as unjust. These discussions are central to which branch of philosophy?", "options": [{"text": "Metaphysics", "isCorrect": false, "rationale": "Metaphysics deals with fundamental reality and existence, not the principles of governance or citizen obligations."}, {"text": "Ethics", "isCorrect": false, "rationale": "While individual moral judgments (ethics) may influence views on unjust laws, the questions about the 'right to rule' and 'obligations to the state' concern the framework of society, making political philosophy the primary branch."}, {"text": "Political Philosophy", "isCorrect": true, "rationale": "Political philosophy 'asks how societies should be organized. What gives a government the right to rule? What obligations do citizens have to the state?' These questions directly align with the scenario presented."}, {"text": "Epistemology", "isCorrect": false, "rationale": "Epistemology concerns the nature of knowledge and how we know, which is distinct from the legitimacy of governmental power or civic duties."}], "id": "q08"}, {"question": "Which of the following was NOT identified in the text as a significant condition contributing to the rise of Western philosophy in ancient Greece?", "options": [{"text": "The prosperity and leisure afforded by trade in small, interconnected city-states.", "isCorrect": false, "rationale": "The text states that Greek city-states 'were small enough that citizens could debate public questions face to face, yet prosperous enough through trade that some men had leisure to think,' directly identifying this as a contributing factor."}, {"text": "A rigid, divinely ordained social hierarchy that encouraged intellectual conformity to traditional religious doctrines.", "isCorrect": true, "rationale": "The text explicitly states that 'Greek religion, unlike the priestly traditions of Egypt and Mesopotamia, had no sacred scripture and no official theology. This left more room for independent speculation,' which is the opposite of encouraging intellectual conformity to religious doctrines."}, {"text": "Frequent interactions with diverse cultures, prompting questions about universal truths versus local customs.", "isCorrect": false, "rationale": "The text mentions that 'the Greeks were seafaring people who encountered other cultures...and were forced to ask which customs were merely local and which might be universally true,' identifying this as a contributing factor."}, {"text": "The absence of a single, infallible sacred scripture or official religious theology that dictated belief.", "isCorrect": false, "rationale": "The text highlights that 'Greek religion...had no sacred scripture and no official theology,' which 'left more room for independent speculation,' thus identifying this as a contributing factor."}], "id": "q09"}, {"question": "The text describes a crucial 'birth of philosophy' as a shift in Greek thought. What was the fundamental nature of this shift, summarized as 'mythos to logos'?", "options": [{"text": "From a focus on individual spiritual enlightenment to collective societal reform.", "isCorrect": false, "rationale": "While philosophy can touch on both, this statement does not accurately capture the fundamental shift described in the text, which is about the *type* of explanation."}, {"text": "From artistic expression and storytelling to scientific observation and data collection.", "isCorrect": false, "rationale": "This captures part of the shift towards rationality but misses the core distinction from 'mythological' explanations. The shift isn't just to 'scientific observation' but to 'rational explanation' in a broader sense."}, {"text": "From explanations based on divine intervention and traditional stories to explanations based on natural processes and reason.", "isCorrect": true, "rationale": "The text states this shift began with thinkers asking 'not 'Which god makes the rain fall?' but 'What natural process explains the rain?' Not 'What did the ancestors say?' but 'What can reason discover?' This is explicitly described as 'the shift from mythological to rational explanation — from mythos to logos.'"}, {"text": "From regional dialects and oral traditions to standardized written language and formal education.", "isCorrect": false, "rationale": "This describes a linguistic and educational development, not the fundamental philosophical shift in *how* phenomena are explained, which is the core of 'mythos to logos.'"}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
