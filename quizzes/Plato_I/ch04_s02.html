<script>
var QUESTIONS = [{"question": "Which statement best summarizes Thrasymachus's core argument about justice?", "options": [{"text": "Justice is a divine principle that guides all human actions.", "isCorrect": false, "rationale": "Thrasymachus explicitly rejects the idea of justice as a noble or divine ideal, viewing it instead as a human construct for self-interest."}, {"text": "Justice is whatever the strongest members of society deem to be in their own self-interest, enforced through law.", "isCorrect": true, "rationale": "Thrasymachus declares that 'justice is nothing else than the interest of the stronger,' arguing that rulers make laws for their own benefit and then label obedience to these laws as 'justice.'"}, {"text": "Justice is a social contract formed by all citizens for the common good.", "isCorrect": false, "rationale": "This describes Rousseau's concept of the 'general will' or a general social contract idea, which is the opposite of Thrasymachus's cynical view that rulers impose laws for their own benefit, not the common good."}, {"text": "Justice is a natural right inherent to all individuals, regardless of government.", "isCorrect": false, "rationale": "This aligns with Locke's concept of natural rights, which contrasts sharply with Thrasymachus's belief that justice is an artificial construct serving the powerful."}], "id": "q01"}, {"question": "According to Thrasymachus, how does the 'perfectly unjust man,' such as a successful tyrant, compare to the just man?", "options": [{"text": "The perfectly unjust man is ultimately more miserable because he lives in constant fear of punishment.", "isCorrect": false, "rationale": "Thrasymachus argues the opposite, stating that the unjust man, particularly a successful tyrant, is 'happier and blessed' because he takes what he wants without punishment, while the just man is always a loser."}, {"text": "The just man is more respected and prosperous in private contracts and dealings with the State.", "isCorrect": false, "rationale": "Thrasymachus presents examples showing the just man paying more taxes, getting less in return, suffering losses in office, and being a 'loser' in private contracts compared to the unjust man."}, {"text": "The perfectly unjust man has more strength, freedom, and mastery, ultimately leading to a happier life.", "isCorrect": true, "rationale": "Thrasymachus explicitly states that 'injustice, when on a sufficient scale, has more strength and freedom and mastery than justice; and… injustice is a man's own profit and interest,' concluding that the criminal is the happiest of men."}, {"text": "Both the just and unjust men achieve similar levels of happiness, as justice is irrelevant to personal well-being.", "isCorrect": false, "rationale": "Thrasymachus clearly argues that injustice leads to greater personal profit and happiness, directly linking one's ethical stance to their well-being, disproving the idea of similar happiness levels."}], "id": "q02"}, {"question": "How did Thrasymachus's challenge affect the foundation of Socrates' arguments in the Crito?", "options": [{"text": "It reinforced Socrates' belief that the Laws of Athens were inherently just and benevolent.", "isCorrect": false, "rationale": "Thrasymachus's argument directly contradicted Socrates' premise in the Crito, suggesting that the Laws were not benevolent but rather tools of power, thus undermining his belief in their inherent justice."}, {"text": "It validated the idea that individual citizens had a duty to resist unjust laws, as suggested by Socrates.", "isCorrect": false, "rationale": "Socrates in the Crito argued against resistance, prioritizing obedience to the Laws. Thrasymachus's argument, if true, would mean Socrates was a fool for obeying, not that he should have resisted."}, {"text": "It suggested that Socrates' 'social contract' was not a fair agreement but a trap designed to serve the interests of the powerful.", "isCorrect": true, "rationale": "The text states that 'Thrasymachus' challenge is devastating because it strikes at the foundation of everything Socrates argued in the Crito. If laws are merely tools of power, then Socrates' “social contract” is not a fair agreement — it is a trap.'"}, {"text": "It had little impact, as Socrates' arguments were based on universal truths unaffected by cynical views.", "isCorrect": false, "rationale": "The text explicitly calls Thrasymachus's challenge 'devastating' and states that Plato felt its force, indicating a significant impact, not a minor one."}], "id": "q03"}, {"question": "Which of the following would best describe a 'Sophist' as defined in the text?", "options": [{"text": "A philosopher who seeks universal truths and moral principles.", "isCorrect": false, "rationale": "Socrates and Plato, who sought universal truths, were critical of sophists, whom they accused of teaching persuasion 'without regard for truth.'"}, {"text": "A traveling professional teacher in ancient Greece who taught rhetoric and argument for fees, often without concern for truth.", "isCorrect": true, "rationale": "The text defines a Sophist as 'A traveling professional teacher in ancient Greece who charged fees for instruction in rhetoric, argument, and public speaking. Socrates and Plato were deeply critical of the sophists, whom they accused of teaching persuasion without regard for truth.'"}, {"text": "A political leader focused on establishing a just and harmonious society.", "isCorrect": false, "rationale": "While sophists engaged with public speaking, their primary role was teaching rhetoric and argument, not necessarily leading a just society. Thrasymachus, a sophist, viewed justice as self-interest, not harmony."}, {"text": "An Athenian citizen dedicated to public service and community welfare.", "isCorrect": false, "rationale": "The definition highlights their professional, traveling, and fee-charging nature, not necessarily their dedication to Athenian public service or welfare, especially given the criticism from Socrates and Plato."}], "id": "q04"}, {"question": "Plato's Republic addresses Thrasymachus's challenge by arguing what central idea about justice?", "options": [{"text": "Justice is a pragmatic tool for maintaining social order, regardless of individual happiness.", "isCorrect": false, "rationale": "While social order is a component of Plato's ideal city, his ultimate answer emphasizes individual well-being ('harmony of the soul') and the happiness of the just person, directly countering Thrasymachus's claim that injustice leads to happiness."}, {"text": "Justice is a harmony of the soul, leading to greater happiness for the just person, and the wise should govern.", "isCorrect": true, "rationale": "The text explicitly states Plato's answer: 'justice is a harmony of the soul, that the just person is happier than the unjust, and that the truly wise should govern,' directly stemming from Thrasymachus's challenge."}, {"text": "Justice is a relative concept, varying from city to city based on the rulers' interests.", "isCorrect": false, "rationale": "This reflects Thrasymachus's view, not Plato's. Plato sought to prove that justice is an inherent good, not merely relative to the powerful."}, {"text": "Justice is primarily about ensuring economic equality among all citizens.", "isCorrect": false, "rationale": "While Plato's ideal city addresses societal structures, his primary philosophical answer to Thrasymachus focused on the internal state of the soul and the nature of happiness, not exclusively economic equality."}], "id": "q05"}, {"question": "Which statement accurately reflects Thomas Hobbes's view on the social contract and a citizen's obligation to obey the law?", "options": [{"text": "Citizens should obey laws only if they perceive them as just and beneficial to their natural rights.", "isCorrect": false, "rationale": "This aligns more with Locke's perspective. Hobbes prioritized security and order above all, even at the cost of individual perceived injustice, as the alternative (state of nature) was worse."}, {"text": "Individuals surrender their natural freedom to a sovereign for security, and disobedience is not an option, as anarchy is always worse.", "isCorrect": true, "rationale": "Hobbes believed that in the state of nature, life is 'solitary, poor, nasty, brutish, and short,' leading people to surrender their freedom to a sovereign in exchange for security and order. He argued that 'disobedience is not an option, because the alternative — the state of nature — is worse than any tyranny.'"}, {"text": "The social contract is a continuous negotiation between the ruler and the ruled, allowing for frequent rebellion.", "isCorrect": false, "rationale": "Hobbes explicitly states that once the agreement is made, citizens are 'bound by it,' making frequent rebellion antithetical to his philosophy of maintaining order at all costs."}, {"text": "Government legitimacy derives from the 'general will' of the people, which can change over time.", "isCorrect": false, "rationale": "This is Rousseau's concept of the general will, not Hobbes's. Hobbes focused on the absolute authority of the sovereign once power is transferred."}], "id": "q06"}, {"question": "Based on Hobbes's philosophy, how would he likely have viewed Socrates' decision to accept his death sentence in the Crito?", "options": [{"text": "He would have condemned it as an act of foolish compliance that encouraged tyranny.", "isCorrect": false, "rationale": "Hobbes prioritized obedience to the sovereign to prevent anarchy. He would not see Socrates' compliance as foolish but as essential for maintaining societal stability."}, {"text": "He would have approved, seeing it as essential for upholding the social contract and preventing society from descending into chaos.", "isCorrect": true, "rationale": "The text states, 'Hobbes would likely have approved of Socrates' decision. If citizens can simply ignore legal verdicts they dislike, the social contract collapses, and society slides back toward the chaos Hobbes feared.'"}, {"text": "He would have been indifferent, as individual choices have no bearing on the larger state of nature.", "isCorrect": false, "rationale": "Hobbes was deeply concerned with how individual actions, particularly disobedience, could lead back to the dreaded state of nature, so he would not be indifferent."}, {"text": "He would have argued that Socrates had a natural right to resist an unjust execution.", "isCorrect": false, "rationale": "This reflects Locke's perspective, not Hobbes's. Hobbes believed that surrendering freedom meant surrendering the right to resist, even if the ruler was bad, to prevent anarchy."}], "id": "q07"}, {"question": "What is a key difference between John Locke's and Thomas Hobbes's views on the social contract?", "options": [{"text": "Hobbes believed in natural rights, while Locke believed government power should be absolute.", "isCorrect": false, "rationale": "This statement reverses their positions. Locke was the proponent of natural rights, and Hobbes argued for absolute sovereign power to avoid the state of nature."}, {"text": "Locke argued that citizens have a duty to resist a government that violates natural rights, while Hobbes maintained that disobedience is never an option.", "isCorrect": true, "rationale": "The text states Locke's view: 'If a government tramples on these rights, citizens are not merely permitted to resist; they have a duty to do so.' Conversely, for Hobbes, 'Disobedience is not an option, because the alternative — the state of nature — is worse than any tyranny.'"}, {"text": "Hobbes focused on the common good (general will), while Locke emphasized individual liberty above all.", "isCorrect": false, "rationale": "The 'general will' is Rousseau's concept. Hobbes focused on security through absolute rule, and Locke focused on individual natural rights and limited government."}, {"text": "Locke believed the state of nature was one of perpetual war, while Hobbes saw it as a state of freedom and equality.", "isCorrect": false, "rationale": "This statement reverses their positions. Hobbes famously described the state of nature as 'war of every person against every other person,' whereas Locke envisioned it with natural rights, making it less chaotic than Hobbes's view, though still needing government for protection."}], "id": "q08"}, {"question": "How might John Locke have analyzed Socrates' decision to accept his death sentence?", "options": [{"text": "He would have fully supported Socrates' obedience as a testament to the binding nature of the social contract.", "isCorrect": false, "rationale": "Locke believed in limited government and the right to resist when natural rights are violated, making full support of Socrates' obedience unlikely if the trial was unjust."}, {"text": "He might have challenged Socrates, arguing that if the trial violated natural rights, the government broke the contract first, justifying escape.", "isCorrect": true, "rationale": "The text states: 'Locke might have challenged Socrates. If the trial violated Socrates' natural right to life and liberty, then the Laws' claim on his obedience is void. A government that executes an innocent man has broken the contract first. Socrates would be justified in escaping.'"}, {"text": "He would have emphasized the importance of the 'general will' in determining the justice of the verdict.", "isCorrect": false, "rationale": "The 'general will' is a concept introduced by Rousseau, not Locke. Locke's focus was on natural rights and limited government."}, {"text": "He would have seen Socrates' act as a necessary sacrifice to prevent a descent into the state of nature.", "isCorrect": false, "rationale": "This aligns more with Hobbes's perspective, who feared the state of nature and prioritized order above individual grievances, rather than Locke's emphasis on individual rights."}], "id": "q09"}, {"question": "What concept did Jean-Jacques Rousseau introduce as a cornerstone of his social contract theory?", "options": [{"text": "The absolute sovereignty of the ruler to prevent chaos.", "isCorrect": false, "rationale": "This is a key tenet of Hobbes's philosophy, not Rousseau's. Rousseau focused on collective governance through the 'general will'."}, {"text": "Natural rights to life, liberty, and property that no government may violate.", "isCorrect": false, "rationale": "This is John Locke's central contribution to social contract theory. While Rousseau believed in freedom, his primary concept here is different."}, {"text": "The idea of a 'state of nature' where all individuals are at war with each other.", "isCorrect": false, "rationale": "This infamous description of the state of nature comes from Thomas Hobbes."}, {"text": "The 'general will,' representing the collective will of citizens aiming for the common good.", "isCorrect": true, "rationale": "The text states that Rousseau's 'Social Contract... introduced the concept of the general will — the idea that when citizens come together to form a community, they create a collective will that aims at the common good.'"}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
