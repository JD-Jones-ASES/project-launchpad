<script>
var QUESTIONS = [{"question": "Why does Socrates reject Euthyphro's first attempt to define piety (prosecuting wrongdoers, as Zeus punished Kronos)?", "options": [{"text": "Because Socrates believes prosecuting one's own father is always impious and morally wrong.", "isCorrect": false, "rationale": "Socrates never says that prosecuting one's father is wrong. His objection is logical, not moral: an example cannot do the work of a definition."}, {"text": "Because Euthyphro has given a particular example of piety rather than a universal definition that identifies what all pious acts have in common.", "isCorrect": true, "rationale": "Socrates demands a universal definition -- a statement of the essential nature shared by all instances of piety. Prosecuting wrongdoers might be pious, but it does not tell us what piety is, since many pious acts have nothing to do with prosecution."}, {"text": "Because the story of Zeus punishing Kronos is historically inaccurate and cannot serve as a philosophical foundation.", "isCorrect": false, "rationale": "Socrates does not reject the definition on grounds of historical accuracy. His concern is the logical distinction between an example and a definition."}, {"text": "Because Euthyphro lacks the legal authority to prosecute his own father under Athenian law.", "isCorrect": false, "rationale": "Socrates does not raise legal objections. His point is purely philosophical: an example of a pious act is not the same as a definition of piety."}]}, {"question": "What is the fatal flaw Socrates identifies in Euthyphro's second definition, that piety is 'what is dear to the gods'?", "options": [{"text": "The definition is too abstract and fails to connect piety to concrete human actions.", "isCorrect": false, "rationale": "Socrates actually acknowledges this definition is an improvement because it offers a general principle rather than a single example. His objection lies elsewhere."}, {"text": "The Greek gods notoriously disagree among themselves, so the same action could be both loved and hated by different gods -- making it simultaneously pious and impious.", "isCorrect": true, "rationale": "The Greek gods, as portrayed by Homer and Hesiod, quarrel and love different things. If piety is what the gods love and the gods disagree, then the same action could be both pious and impious -- a logical contradiction."}, {"text": "Euthyphro has no way of knowing what the gods actually love, since mortals cannot access divine knowledge.", "isCorrect": false, "rationale": "Socrates does not challenge Euthyphro's ability to know what the gods love. His objection is about the logical problem of divine disagreement."}, {"text": "The definition reduces piety to mere popularity among the gods rather than grounding it in moral reasoning.", "isCorrect": false, "rationale": "While this concern arises later with the Euthyphro dilemma, the specific problem with Definition 2 is the contradiction caused by the gods disagreeing with one another."}]}, {"question": "The Euthyphro dilemma asks: 'Is the pious loved by the gods because it is pious, or is it pious because it is loved by the gods?' What serious problem does the second horn of this dilemma create?", "options": [{"text": "It implies that the gods are not powerful enough to determine what is pious.", "isCorrect": false, "rationale": "The second horn actually gives the gods full power to determine piety. The problem is not about divine power but about the arbitrariness of morality."}, {"text": "It means morality is arbitrary -- whatever the gods happen to approve is automatically right, even if it seems monstrous, and morality would change if the gods changed their minds.", "isCorrect": true, "rationale": "If things are pious simply because the gods love them, then piety has no independent nature. The gods could approve of anything, and that would make it pious by definition -- rendering morality wholly arbitrary."}, {"text": "It proves that the gods do not exist, undermining the entire framework of Greek religion.", "isCorrect": false, "rationale": "The dilemma does not question the existence of the gods. It questions the relationship between divine approval and the nature of goodness."}, {"text": "It contradicts Euthyphro's first definition by showing that the gods cannot love individual acts of piety.", "isCorrect": false, "rationale": "The second horn does not relate to the first definition's problem (example vs. definition). It raises the issue that morality becomes arbitrary if goodness is defined solely by divine preference."}]}, {"question": "Why does Euthyphro's fifth and final definition of piety -- that piety is a kind of sacred exchange between humans and gods -- ultimately fail?", "options": [{"text": "Because the gods are too powerful to enter into any exchange or transaction with mere humans.", "isCorrect": false, "rationale": "Socrates does not reject the idea of an exchange on grounds of divine power. He challenges what the gods actually receive from human offerings."}, {"text": "Because when pressed on what the gods gain from human sacrifices, Euthyphro can only say the gods receive what 'pleases' them -- collapsing the definition back into 'piety is what is dear to the gods,' creating a circular argument.", "isCorrect": true, "rationale": "Socrates asks what the gods get from our sacrifices, and Euthyphro says it is something that pleases or is dear to them. This brings the argument full circle to Definition 3, committing the fallacy of begging the question."}, {"text": "Because Socrates demonstrates that the gods do not actually answer human prayers or provide blessings in return.", "isCorrect": false, "rationale": "Socrates does not argue against the reality of divine blessings. His objection is logical: the definition is circular."}, {"text": "Because the concept of a transaction implies the gods are imperfect and needy, which contradicts Greek theology.", "isCorrect": false, "rationale": "While Socrates does note that the gods do not need our food or drink, the decisive reason the definition fails is its circularity, not a theological objection about divine perfection."}]}, {"question": "What does the Greek term 'aporia' mean, and what role does it play at the end of the Euthyphro?", "options": [{"text": "It means 'divine wisdom' and indicates that Socrates has finally discovered the true definition of piety through the conversation.", "isCorrect": false, "rationale": "Aporia means the opposite of having arrived at wisdom. It signifies a state of genuine puzzlement and the recognition that the answer remains unknown."}, {"text": "It means 'no passage' or genuine puzzlement -- the recognition that you do not know the answer to a question you thought you understood -- and Socrates regards it as the beginning of real thinking, not a failure.", "isCorrect": true, "rationale": "Aporia literally means 'no passage' or 'no way through.' The dialogue ends with Socrates still lacking a definition of piety, but this productive confusion is, for Socrates, the first step toward genuine wisdom."}, {"text": "It means 'logical contradiction' and refers to the moment when Euthyphro's arguments are formally disproven.", "isCorrect": false, "rationale": "While contradictions arise during the dialogue, aporia specifically refers to a state of puzzlement or impasse, not a formal logical contradiction."}, {"text": "It means 'moral defeat' and shows that Euthyphro was wrong to prosecute his father.", "isCorrect": false, "rationale": "Aporia is not a moral judgment about Euthyphro's legal case. It is a philosophical state of honest recognition that the question remains unanswered."}]}, {"question": "What is the irony of Socrates and Euthyphro meeting at the Porch of the King Archon?", "options": [{"text": "Socrates, who is accused of impiety, encounters a man who claims to be an expert on piety -- yet that supposed expert cannot define what piety actually is.", "isCorrect": true, "rationale": "Socrates faces charges of impiety, and Euthyphro claims such confident knowledge of piety that he is prosecuting his own father. If Euthyphro truly knew what piety was, Socrates could learn from him and defend himself. The irony is that Euthyphro's expertise crumbles under examination."}, {"text": "Both men are guilty of the same crime -- impiety -- but neither realizes it.", "isCorrect": false, "rationale": "The text does not suggest that both men are guilty of impiety. The irony lies in the contrast between Socrates' genuine philosophical inquiry and Euthyphro's overconfident claims."}, {"text": "The King Archon's court handles only trivial cases, making both men's legal matters seem unimportant.", "isCorrect": false, "rationale": "The King Archon handled cases involving religion and homicide -- among the most serious in Athenian law. Both cases carry enormous stakes."}, {"text": "Euthyphro is secretly working with Meletus to prosecute Socrates and has come to coordinate their strategy.", "isCorrect": false, "rationale": "There is no suggestion of collusion between Euthyphro and Meletus. Their meeting is presented as coincidental, and the dramatic irony lies in their contrasting relationships to the concept of piety."}]}, {"question": "According to the text, what is the key distinction between an 'example' and a 'definition' as Socrates uses these concepts?", "options": [{"text": "An example is always false, while a definition is always true.", "isCorrect": false, "rationale": "Examples can be perfectly accurate instances of a concept. The issue is not truth or falsehood but the difference between pointing to a particular case and identifying a universal nature."}, {"text": "An example identifies a particular instance of something, while a definition identifies the essential nature shared by all instances -- and only a definition can serve as a reliable standard for judging new cases.", "isCorrect": true, "rationale": "The text explains that an example like 'Prosecuting wrongdoers is pious' identifies one instance, while a definition captures the essential quality that all pious things share. Socrates insists that you cannot reliably identify examples unless you first know the definition."}, {"text": "An example appeals to emotions, while a definition appeals to logic.", "isCorrect": false, "rationale": "The distinction is not about emotional versus logical appeal. It is about whether one is pointing to a particular case or articulating a universal principle."}, {"text": "An example is something the gods approve of, while a definition is something humans create through reason.", "isCorrect": false, "rationale": "This conflates the example/definition distinction with the Euthyphro dilemma about divine approval. The distinction is about particular instances versus essential natures."}]}, {"question": "How does the Euthyphro dialogue connect to Plato's later Theory of Forms?", "options": [{"text": "Socrates explicitly teaches Euthyphro about the Forms during their conversation, but Euthyphro cannot understand them.", "isCorrect": false, "rationale": "Socrates does not mention the Theory of Forms in the Euthyphro. The dialogue predates Plato's full development of that theory."}, {"text": "Socrates' demand for a universal, stable, unchanging definition of piety -- something independent of particular examples or shifting opinions -- anticipates the concept of a Form: an eternal, perfect reality that particular things merely imitate.", "isCorrect": true, "rationale": "The text explains that Socrates' demand for a universal definition that cannot depend on any particular act or changing opinion led Plato to conclude that such universals really exist as Forms -- eternal realities of which particular things are imperfect copies."}, {"text": "The dialogue proves the Theory of Forms is false by showing that no definition of piety can be found.", "isCorrect": false, "rationale": "The failure to find a definition does not disprove the Forms. Rather, the difficulty of defining piety motivated Plato to develop the theory that perfect, unchanging Forms exist beyond the physical world."}, {"text": "Euthyphro's final definition is actually a correct description of the Form of Piety, but Socrates fails to recognize it.", "isCorrect": false, "rationale": "Euthyphro's final definition collapses into circularity. None of his definitions succeed, which is precisely what motivates Plato's later metaphysical solution."}]}, {"question": "Why does the text describe Euthyphro as 'unreflective' rather than 'stupid'?", "options": [{"text": "Because Euthyphro holds views that many educated Athenians shared and has the courage to act on them, but he has never examined his own assumptions -- making him a representative of common, uncritical moral thinking rather than a fool.", "isCorrect": true, "rationale": "The text explicitly warns against the misconception that Euthyphro is stupid. He is not unintelligent; he is unreflective. He represents the common failure to examine one's own assumptions, which makes him a more useful philosophical character."}, {"text": "Because Euthyphro eventually arrives at the correct definition of piety, showing he is capable of philosophical reasoning.", "isCorrect": false, "rationale": "Euthyphro never arrives at a successful definition. All five of his attempts fail under Socratic scrutiny."}, {"text": "Because Euthyphro is actually a professional philosopher who simply has a bad day in this particular conversation.", "isCorrect": false, "rationale": "Euthyphro is a religious expert -- a diviner -- not a philosopher. His problem is not having a bad day but never having questioned his own assumptions about piety."}, {"text": "Because Socrates privately admits to the reader that Euthyphro is actually correct about piety.", "isCorrect": false, "rationale": "Socrates never endorses any of Euthyphro's definitions. The dialogue ends in aporia precisely because no adequate definition has been found."}]}, {"question": "What is the Socratic elenchus, and how does Socrates use it in the Euthyphro?", "options": [{"text": "A method of teaching in which the philosopher delivers a lecture and the student takes notes, used when Socrates instructs Euthyphro on the correct definition of piety.", "isCorrect": false, "rationale": "The elenchus is the opposite of lecturing. Socrates asks questions rather than delivering answers, and he never instructs Euthyphro on a correct definition."}, {"text": "A method of cross-examination in which Socrates asks his interlocutor to state a thesis, then asks questions designed to reveal contradictions or inadequacies in that thesis -- testing whether a belief can withstand rational scrutiny.", "isCorrect": true, "rationale": "The elenchus is Socrates' characteristic method of philosophical inquiry. In the Euthyphro, he uses it to test each of Euthyphro's five definitions, revealing contradictions and inadequacies in every one."}, {"text": "A formal debate format in which two speakers take turns presenting opposing arguments before a panel of judges.", "isCorrect": false, "rationale": "The elenchus is not a formal debate. It is a conversational method of questioning in which Socrates draws out contradictions from his interlocutor's own claims."}, {"text": "A rhetorical trick Socrates uses to confuse his opponents and make himself appear wiser than he actually is.", "isCorrect": false, "rationale": "The text states that the goal of the elenchus is 'not to win an argument but to test whether a belief can withstand rational scrutiny.' It is a genuine philosophical method, not a rhetorical trick."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
