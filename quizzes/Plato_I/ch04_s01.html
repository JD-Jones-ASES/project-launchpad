<script>
var QUESTIONS = [{"question": "What specific religious event granted Socrates a thirty-day reprieve between his sentencing and his scheduled execution?", "options": [{"text": "The annual pilgrimage of a sacred ship to the island of Delos in honor of Apollo.", "isCorrect": true, "rationale": "Athens maintained a state of ritual purity during this voyage, during which no executions were permitted by law."}, {"text": "The festival of Poseidon at Sunium, requiring all prisoners to be held until the temple rites concluded.", "isCorrect": false, "rationale": "While Sunium is mentioned as the location where the ship was sighted, the religious restriction was tied specifically to the Delos pilgrimage."}, {"text": "A period of 'sacred silence' observed by the jury to reflect on the verdict of impiety.", "isCorrect": false, "rationale": "The Athenian legal system did not observe a period of silence or reflection after the independent voting process was completed."}, {"text": "A mandatory thirty-day appeal window granted to citizens convicted of corrupting the youth.", "isCorrect": false, "rationale": "The source material specifies that the delay was a matter of 'religious timing' rather than a standard legal appeal process."}], "id": "q01"}, {"question": "In the context of the dialogue, why is the etymology of Crito's name ($krites$) considered ironic?", "options": [{"text": "Because Crito comes to judge Socrates’ decision, but Socrates ends up acting as the true judge of justice.", "isCorrect": true, "rationale": "The name means 'judge,' yet Crito is guided by emotion while Socrates uses reason to pass judgment on the morality of escape."}, {"text": "Because Crito was one of the original jurors who voted for Socrates’ acquittal.", "isCorrect": false, "rationale": "The text identifies Crito as a wealthy friend and 'practical man' rather than a member of the jury that tried Socrates."}, {"text": "Because Crito refuses to make a decision about the escape until Socrates provides a logical proof.", "isCorrect": false, "rationale": "Crito has already decided that escape is the correct path and is actively trying to persuade Socrates to agree."}, {"text": "Because the name implies 'philosopher,' yet Crito relies entirely on the opinions of 'the many.'", "isCorrect": false, "rationale": "The Greek word $krites$ specifically translates to 'judge' or 'one who decides,' not 'philosopher.'"}], "id": "q02"}, {"question": "Socrates uses an analogy of an athlete and a trainer to counter Crito’s concern regarding public reputation. What does the 'trainer' represent in this moral context?", "options": [{"text": "The expert who understands the nature of justice and the health of the soul.", "isCorrect": true, "rationale": "Just as an athlete should only value the opinion of one who understands fitness, a moral agent should only value the truth regarding right and wrong."}, {"text": "The Laws of Athens, which provide the framework for civic and physical education.", "isCorrect": false, "rationale": "While the Laws are important, this specific analogy refers to the importance of expert knowledge over the uneducated opinions of the majority."}, {"text": "The jury of 501 citizens who delivered the final verdict on Socrates’ life.", "isCorrect": false, "rationale": "The jury represents 'the many,' whose collective opinion Socrates argues is unreliable compared to a single expert's insight."}, {"text": "The divine 'voice' or $\\delta\\alpha\\iota\\mu\\acute{o}\\nu\\iota\\omicron\\nu$ that guides Socrates’ internal reasoning.", "isCorrect": false, "rationale": "The analogy focuses on the distinction between the 'expert' (human or otherwise) and the 'crowd,' rather than specifically on Socrates' personal divine sign."}], "id": "q03"}, {"question": "Which principle does Socrates identify as the absolute foundation for his refusal to return harm for harm?", "options": [{"text": "Doing wrong damages the soul, which is far more valuable than the body.", "isCorrect": true, "rationale": "Socrates argues that the soul is the seat of moral goodness, and committing an injustice corrupts it, regardless of the provocation."}, {"text": "A citizen must always obey the State, even if the State is objectively evil.", "isCorrect": false, "rationale": "Socrates allows for persuasion to change unjust laws; his refusal to escape is based on the specific harm escape would do to his soul and the law."}, {"text": "The traditional Greek view that one must help friends and harm enemies is the highest form of justice.", "isCorrect": false, "rationale": "Socrates explicitly rejects this common view, claiming that harming anyone is always a moral wrong."}, {"text": "The physical body is an illusion, so death is not a true harm to the individual.", "isCorrect": false, "rationale": "While Socrates values the soul more, he does not claim the body is an illusion; rather, he prioritizes moral integrity over physical survival."}], "id": "q04"}, {"question": "According to the 'Social Contract' argument presented by the Laws, why is Socrates specifically obligated to follow the jury’s verdict?", "options": [{"text": "He chose to remain in Athens for seventy years, enjoying its benefits despite being free to leave.", "isCorrect": true, "rationale": "The Laws argue that his long-term residency and use of city resources constituted a tacit agreement to abide by their authority."}, {"text": "The Laws are divinely inspired and therefore carry the weight of Apollo’s will.", "isCorrect": false, "rationale": "The Social Contract argument is based on a mutual agreement between citizen and state, not on divine revelation or command."}, {"text": "Socrates took a formal oath of obedience when he reached the age of adulthood.", "isCorrect": false, "rationale": "The argument relies on his actions—staying, raising children, and participating in public life—rather than a single formal oath."}, {"text": "The majority of the jury voted for his execution, making the decision democratic and thus beyond reproach.", "isCorrect": false, "rationale": "Socrates acknowledges the verdict was likely wrong; the obligation comes from the agreement to follow the *process*, not the perfection of the *outcome*."}], "id": "q05"}, {"question": "The Laws of Athens present Socrates with a binary choice when he disagrees with a specific mandate. What is this choice?", "options": [{"text": "Persuade or Obey.", "isCorrect": true, "rationale": "Citizens have the right to try and change the laws through argument, but if they fail to persuade the state, they must comply with its judgments."}, {"text": "Reform or Exile.", "isCorrect": false, "rationale": "While exile was a possibility before the trial's conclusion, the 'social contract' logic demands obedience once the legal process is finished."}, {"text": "Analyze or Submit.", "isCorrect": false, "rationale": "While Socrates does analyze the situation, the Laws explicitly demand that he either convince them of their error or follow their lead."}, {"text": "Silence or Suffer.", "isCorrect": false, "rationale": "This misrepresents Socrates' stance, as he actively values speech and persuasion as tools for justice within the system."}], "id": "q06"}, {"question": "Why does Socrates argue that his escape would be an attempt to 'destroy' the city of Athens?", "options": [{"text": "Because a legal system has no force if individuals can ignore court verdicts when they are personally inconvenient.", "isCorrect": true, "rationale": "The rule of law depends on the consistency and authority of its judgments; subverting a verdict undermines the entire structure of the state."}, {"text": "Because Crito would be executed in his place, leading to civil unrest among the wealthy elite.", "isCorrect": false, "rationale": "There is no indication that Crito would be executed; the concern is the institutional damage to the legal system itself."}, {"text": "Because Socrates is the moral cornerstone of the city, and his absence would leave it without a philosopher.", "isCorrect": false, "rationale": "While Socrates is important, the Laws argue from a structural perspective regarding the stability of legal judgments, not his personal value."}, {"text": "Because the Laws are alive and feel physical pain when a citizen acts against them.", "isCorrect": false, "rationale": "The 'Laws' are personified through prosopopoeia as a rhetorical device to show moral obligation, not to imply they are biological entities."}], "id": "q07"}, {"question": "How do the Laws address Crito's argument that Socrates is abandoning his children by choosing death?", "options": [{"text": "They argue that his children would be no better off if he lived as a fugitive or dragged them into exile.", "isCorrect": true, "rationale": "The Laws point out that escape would lead to a life of shame or displacement, which does not provide a superior upbringing."}, {"text": "They claim that the State will take over the role of father and provide for their education.", "isCorrect": false, "rationale": "The Laws emphasize the damage Socrates would do to his reputation and children's futures by breaking the law, rather than offering state welfare."}, {"text": "They argue that a philosopher's duty to the Truth overrides any duty to his biological family.", "isCorrect": false, "rationale": "The argument is more practical: that the children are better served by a father who maintains his integrity even in death than by one who lives in dishonor."}, {"text": "They suggest that Socrates' friends, like Crito, are more capable of raising the children anyway.", "isCorrect": false, "rationale": "Crito makes this point to encourage escape, but the Laws focus on how Socrates' choices impact the children's standing and context."}], "id": "q08"}, {"question": "What is the primary rhetorical device used in the dialogue when Socrates gives the Laws of Athens a human voice?", "options": [{"text": "Prosopopoeia.", "isCorrect": true, "rationale": "This specific device involves attributing a voice or personality to an abstract concept or an inanimate object."}, {"text": "Hyperbole.", "isCorrect": false, "rationale": "While the passage is dramatic, it does not rely on exaggeration for effect, but rather on personification."}, {"text": "Syllogism.", "isCorrect": false, "rationale": "A syllogism is a form of logical reasoning; the device of giving the Laws a voice is a rhetorical, not purely logical, structure."}, {"text": "Allegory of the Cave.", "isCorrect": false, "rationale": "The Allegory of the Cave is a separate Platonic metaphor found in the 'Republic', not the 'Crito'."}], "id": "q09"}, {"question": "At the conclusion of the dialogue, Socrates compares the 'voice of the Laws' to which of the following?", "options": [{"text": "The sound of a flute in the ears of a mystic.", "isCorrect": true, "rationale": "This metaphor suggests that the arguments of the Laws are so resonant and all-encompassing that they drown out all other concerns, including Crito's pleas."}, {"text": "The crashing waves against the promontory of Sunium.", "isCorrect": false, "rationale": "Sunium is mentioned early in the text as the location of the ship, but it is not used in the final metaphor for the Laws."}, {"text": "The stern command of a military general to a soldier.", "isCorrect": false, "rationale": "While Socrates mentions military service elsewhere, the final metaphor emphasizes the inner resonance and persuasive power of the Laws' arguments."}, {"text": "The whisper of a parent to a sleeping child.", "isCorrect": false, "rationale": "The Laws compare themselves to parents, but the final metaphor for the sound of their voice is specifically musical and mystical."}], "id": "q10"}, {"question": "The Laws argue that they are like parents and teachers who 'brought Socrates into the world, nurtured and educated him.' If this parental analogy is accepted, what follows about the relationship between Socrates' personal conscience and the Laws' authority?", "options": [{"text": "Socrates owes the Laws unconditional obedience in every circumstance, just as a young child must obey a parent's every command.", "isCorrect": false, "rationale": "The Laws themselves limit the relationship: they allow persuasion as an alternative to obedience. Even by their own terms, the relationship is not one of unconditional submission but of a structured, quasi-familial obligation."}, {"text": "A son may sometimes express disagreement but must ultimately honor the family structure unless he can convince the parent — this mirrors how a citizen may argue against an unjust law but must accept the outcome if persuasion fails.", "isCorrect": true, "rationale": "The parent-child analogy establishes that disagreement expressed through proper means (argument, persuasion) is legitimate, but unilateral defiance is not. Socrates had his chance to persuade the jury; now the time for persuasion has passed."}, {"text": "Since Socrates proved the Laws unjust in his defense speech, the parental obligation is dissolved — a parent who acts criminally forfeits their claim on a child's obedience.", "isCorrect": false, "rationale": "The Laws do not concede they acted criminally. And even if their verdict was unjust, the Laws' argument is that the proper remedy was persuasion within the system, not unilateral escape."}, {"text": "The analogy shows that the Laws have no authority at all, because parental authority ends when a child reaches adulthood — and Socrates is seventy years old.", "isCorrect": false, "rationale": "Age alone does not dissolve the civic bond the Laws are describing. Their argument is about the ongoing relationship between a citizen and the political community that made him who he is — not just childhood dependency."}], "id": "q11"}, {"question": "Socrates' argument in the Crito has been criticized for being too conservative — prioritizing stability and rule of law over justice. Which of the following best represents this objection?", "options": [{"text": "Socrates argues that justice requires obedience to all laws, making morality identical to legality — but morality and legality are not the same thing.", "isCorrect": false, "rationale": "Socrates does not claim that all laws are just or that morality and legality are identical. He explicitly acknowledges the verdict was unjust. His argument is about whether an unjust verdict may be escaped, not whether the law is always morally correct."}, {"text": "By accepting an unjust verdict to preserve the legal system, Socrates prioritizes systemic stability over his own life — but if the system can kill innocent people and still demand compliance, the system's legitimacy is already compromised.", "isCorrect": true, "rationale": "This is the heart of the conservative-Socrates objection: if accepting unjust outcomes is required to preserve the legal system, what exactly is being preserved? The rule of law cannot be fully legitimate if it demands that the innocent comply with their own unjust death sentences."}, {"text": "Socrates' argument is too radical because it implies that any citizen may refuse to obey any law they personally disagree with.", "isCorrect": false, "rationale": "This is the opposite of the conservative-Socrates objection. Socrates' position is criticized for being too deferential to the legal system, not too permissive of individual disobedience."}, {"text": "The argument is flawed because Socrates should have used his $daimonion$ to determine the right course of action rather than relying on philosophical reasoning.", "isCorrect": false, "rationale": "Socrates does mention that his daimonion was silent, which he takes as a good sign. But the Crito's argument is conducted through rational philosophical reasoning — appealing to the daimonion as the primary authority would bypass the very process the dialogue enacts."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
