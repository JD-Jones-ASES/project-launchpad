<script>
var QUESTIONS = [{"question": "According to the text, how should readers approach a Socratic dialogue differently from a traditional textbook?", "options": [{"text": "By focusing solely on Socrates' final conclusions or explicit answers.", "isCorrect": false, "rationale": "Socratic dialogues often end in puzzlement (aporia) without clear answers, emphasizing the process of inquiry over definitive conclusions."}, {"text": "By recognizing it as a dramatic conversation where characters' personalities, motives, and flaws influence the arguments presented.", "isCorrect": true, "rationale": "The text explicitly states, 'A Socratic dialogue is not a textbook. It is a dramatic work — a conversation between characters who have personalities, motives, and flaws. The arguments matter, but so do the people making them.'"}, {"text": "By memorizing the definitions offered by Socrates' interlocutors as the foundational truths.", "isCorrect": false, "rationale": "Socrates typically tests and dismantles the proposed definitions, showing them to be inadequate, rather than accepting them as foundational truths."}, {"text": "By prioritizing the historical context of ancient Greece over the philosophical arguments themselves.", "isCorrect": false, "rationale": "While context is important, the text emphasizes engaging 'with the arguments' and 'following each step of the argument' as key to reading these dialogues well."}], "id": "q01"}, {"question": "When Socrates says to an interlocutor, 'You are younger and wiser than I — teach me what piety is,' what technique is he most likely employing, and what is its primary purpose?", "options": [{"text": "Genuine humility to encourage the interlocutor to lead the discussion without intimidation.", "isCorrect": false, "rationale": "The text explicitly states, 'When Socrates tells Euthyphro, “You are younger and wiser than I — teach me what piety is,” he is not being humble.'"}, {"text": "Socratic irony, a deliberate pose of ignorance used to draw others into philosophical examination and test their supposed knowledge.", "isCorrect": true, "rationale": "This is a direct description of Socratic irony: 'a deliberate pose of ignorance used to draw others into philosophical examination.' He is 'inviting Euthyphro to put his supposed knowledge to the test.'"}, {"text": "A rhetorical device to quickly establish agreement and build rapport before introducing complex ideas.", "isCorrect": false, "rationale": "Socratic irony is described as a 'philosophical trap designed to expose false confidence,' which is often confrontational rather than rapport-building."}, {"text": "A subtle way of admitting his own inability to define the concept, seeking genuine assistance.", "isCorrect": false, "rationale": "While he professes ignorance, it is a strategic pose; he often demonstrates a deeper understanding than his interlocutors, not a genuine inability."}], "id": "q02"}, {"question": "The text states that many Socratic dialogues end without a clear answer, leading to 'puzzlement.' What philosophical significance does this state of 'productive confusion' (aporia) hold?", "options": [{"text": "It indicates a failure of the philosophical method to consistently reach definitive truth.", "isCorrect": false, "rationale": "The text refutes this, stating 'This state of productive confusion... is not a failure. It is the first step toward wisdom.'"}, {"text": "It highlights Socrates' personal frustration with the limitations of human knowledge when seeking ultimate answers.", "isCorrect": false, "rationale": "While Socrates might experience puzzlement, the text presents aporia as a shared, productive state that Plato believed was essential for philosophical progress, not merely a personal frustration."}, {"text": "It serves as the initial step towards genuine wisdom by prompting individuals to realize the inadequacy of their previous understanding.", "isCorrect": true, "rationale": "The text explains: 'Plato believed that genuine philosophical progress begins when you realize that what you thought you knew, you do not really know. This state of productive confusion... is not a failure. It is the first step toward wisdom.'"}, {"text": "It suggests that all philosophical questions are inherently unanswerable, making further inquiry futile.", "isCorrect": false, "rationale": "Aporia is presented as a 'first step toward wisdom,' implying that further inquiry is necessary and valuable, not futile."}], "id": "q03"}, {"question": "What is the primary reason the textbook includes Benjamin Jowett's 19th-century translations of Plato's dialogues, despite their sometimes old-fashioned language?", "options": [{"text": "Jowett's translations are considered the most accurate ever produced and are therefore preferred over modern versions.", "isCorrect": false, "rationale": "The text mentions modern translations 'exist and are excellent,' and does not claim Jowett's are uniquely the 'most accurate.' Its primary reason is not superior accuracy."}, {"text": "The literary grace and elegant style of Jowett's writing make them universally easier to read and understand than more contemporary translations.", "isCorrect": false, "rationale": "The text notes Jowett's English is 'elegant but sometimes old-fashioned' and acknowledges that readers 'will encounter words and constructions that sound formal or archaic,' implying potential difficulty, not universal ease."}, {"text": "Jowett's versions are in the public domain, which allows the complete text of each dialogue to be included in the book.", "isCorrect": true, "rationale": "The text explicitly states: 'Jowett's translations are in the public domain, which allows us to include the complete text of each dialogue in this book.'"}, {"text": "Modern translations are generally considered too simplified and lack the philosophical depth required for serious study.", "isCorrect": false, "rationale": "The text explicitly states that 'Modern translations of Plato... exist and are excellent,' refuting the idea that they lack depth."}], "id": "q04"}, {"question": "The text encourages readers to actively engage with the dialogues by asking questions like 'Is the objection fair?' and 'Can you think of a better definition?' What does this approach emphasize about the nature of philosophy?", "options": [{"text": "Philosophy is a field where personal opinions are more important than reasoned arguments or textual analysis.", "isCorrect": false, "rationale": "While personal engagement is encouraged, the focus is on 'arguing with the text' and 'following the argument,' which implies reasoned engagement, not prioritizing opinion over reason."}, {"text": "Philosophy is best learned through passive observation and memorization of established ideas from ancient thinkers.", "isCorrect": false, "rationale": "The text states, 'Socrates believed that philosophy is not a spectator sport. You do not learn to think by watching someone else do it; you learn by doing it yourself,' directly opposing passive learning."}, {"text": "Philosophy requires active participation, critical thinking, and a willingness to challenge and contribute to the arguments, rather than merely absorbing information.", "isCorrect": true, "rationale": "The text states, 'your task is not simply to absorb information but to engage with the arguments' and encourages 'arguing with the text' as 'exactly what Socrates would want you to do.'"}, {"text": "The ultimate goal of philosophy is to arrive at easy, definitive answers to complex questions, which active engagement helps reveal.", "isCorrect": false, "rationale": "The text explicitly states, 'There are no trick questions in philosophy. But there are no easy answers, either.' The goal is thinking and engagement, not necessarily easy answers."}], "id": "q05"}, {"question": "The pre-Socratics, despite being a diverse group of thinkers from various cities and centuries, shared one 'revolutionary conviction.' What was it?", "options": [{"text": "That ethical conduct and the pursuit of justice are the most important aspects of human life.", "isCorrect": false, "rationale": "While ethics became central in later philosophy, the defining 'revolutionary conviction' of the pre-Socratics, as described in the text, was about understanding the world through reason, not primarily ethics."}, {"text": "That the world could be fundamentally understood through rational inquiry and observation, rather than relying on mythological explanations.", "isCorrect": true, "rationale": "The text states, 'But they shared one revolutionary conviction: the world could be understood through reason rather than myth.'"}, {"text": "That the *arche* (fundamental substance) of all things must ultimately be water, as proposed by Thales.", "isCorrect": false, "rationale": "This was Thales' specific belief, not a shared conviction among *all* pre-Socratics, who disagreed vigorously on the nature of the *arche*."}, {"text": "That experimentation and mathematical models are the essential tools for uncovering the secrets of nature.", "isCorrect": false, "rationale": "The text's 'Note on Milesians' explicitly clarifies that 'They were not performing experiments. They were not building mathematical models.'"}], "id": "q06"}, {"question": "Thales is traditionally regarded as the first Western philosopher for proposing water as the *arche*. According to the text, why was his contribution considered a breakthrough, even if his specific answer seems naive today?", "options": [{"text": "He was the first to accurately identify water as the most abundant element, demonstrating an early scientific understanding.", "isCorrect": false, "rationale": "The text states, 'the breakthrough was not the answer,' indicating that the accuracy of 'water' was not the key. His method was philosophical reasoning, not empirical science in the modern sense."}, {"text": "He introduced the concept of the *apeiron* as a boundless, indefinite underlying principle for the first time.", "isCorrect": false, "rationale": "Anaximander, Thales' student, introduced the concept of the *apeiron*."}, {"text": "He applied a natural, rational inquiry to understand the world's composition, moving away from purely mythological or divine explanations.", "isCorrect": true, "rationale": "The text states, 'the breakthrough was not the answer; it was the question. By asking what the world is made of and seeking a natural rather than mythological answer, Thales opened a new way of thinking.'"}, {"text": "He developed the first system of formal logic and argumentation that influenced all subsequent philosophy.", "isCorrect": false, "rationale": "While he was a philosopher, the text does not credit him with inventing formal logic. His breakthrough was the shift to naturalistic inquiry."}], "id": "q07"}, {"question": "Anaximander proposed the *apeiron* ('the boundless' or 'indefinite') as the *arche*, departing from Thales' idea of water. What was Anaximander's primary reasoning for this change?", "options": [{"text": "He believed the *arche* must be a specific, observable element like air or fire, but more refined than water.", "isCorrect": false, "rationale": "Anaximander explicitly moved away from specific elements. Anaximenes, not Anaximander, later proposed air."}, {"text": "He argued that no particular element could be truly fundamental because each is defined by its opposition to other elements.", "isCorrect": true, "rationale": "The text explains, 'Anaximander seems to have believed that no particular element (water, air, fire) could be truly fundamental, because each is defined by its opposition to the others. Only something unlimited and undefined could generate them all.'"}, {"text": "He concluded that the *arche* was unknowable and therefore not a subject for rational philosophical inquiry.", "isCorrect": false, "rationale": "Anaximander did propose an *arche* (the *apeiron*), indicating it was a subject for inquiry, even if abstract."}, {"text": "He introduced the idea that the fundamental substance must be something static and unchanging, unlike water.", "isCorrect": false, "rationale": "The *apeiron* is described as that 'from which all definite things emerge and into which they eventually dissolve,' implying a dynamic process, not necessarily static."}], "id": "q08"}, {"question": "Anaximenes contributed to early philosophy by proposing that qualitative differences in the world (e.g., air becoming fire, water, or stone) could be explained by quantitative changes in a single substance (air). This idea is significant because it suggests what?", "options": [{"text": "That the universe is ultimately composed of only two opposing forces, a principle later explored by other philosophers.", "isCorrect": false, "rationale": "Anaximenes' theory focuses on a single substance (air) and its changes, not on opposing forces."}, {"text": "That the true *arche* can only be a formless, indefinite substance, similar to Anaximander's *apeiron*.", "isCorrect": false, "rationale": "Anaximenes returned to a concrete element (air), directly contrasting Anaximander's abstract *apeiron*."}, {"text": "That observable diversity and the various forms of matter can arise from variations in density or state of a single underlying material.", "isCorrect": true, "rationale": "The text states, 'Anaximenes' contribution was the idea that qualitative differences in the world could be explained by quantitative changes in a single substance — an idea that, in a distant way, anticipates modern chemistry and physics.'"}, {"text": "That philosophical inquiry should primarily focus on predicting natural phenomena like eclipses, as Thales did.", "isCorrect": false, "rationale": "While some early philosophers had practical skills, Anaximenes' philosophical contribution, as described, was about the mechanism of change in the *arche*, not practical prediction."}], "id": "q09"}, {"question": "The 'Note on Milesians' explicitly clarifies that these early philosophers were *not* performing experiments or building mathematical models. Instead, it characterizes their primary method of inquiry as what?", "options": [{"text": "Relying on divine revelation and mythological narratives as the ultimate sources of truth about the world.", "isCorrect": false, "rationale": "The introduction to the pre-Socratics states they shared a conviction that the world 'could be understood through reason rather than myth,' directly contradicting reliance on myth."}, {"text": "Primarily engaging in empirical observation and systematic data collection to form hypotheses.", "isCorrect": false, "rationale": "The note explicitly states they 'were not performing experiments,' which distinguishes their method from modern empirical science."}, {"text": "Reasoning about the nature of reality from fundamental principles, seeking logical coherence to make sense of the world.", "isCorrect": true, "rationale": "The note states, 'They were reasoning about the nature of reality from first principles, asking what must be true if the world is to make sense. This is philosophy, not science.'"}, {"text": "Developing complex ethical systems and theories of human conduct as their main area of philosophical focus.", "isCorrect": false, "rationale": "The Milesians were focused on cosmology and metaphysics (the *arche*), not primarily ethical systems, which became more central with Socrates."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
