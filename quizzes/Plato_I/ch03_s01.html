<script>
var QUESTIONS = [{"question": "Which statement best describes a fundamental difference between the Athenian *dikasterion* where Socrates was tried and a modern Western courtroom?", "options": [{"text": "Athenian courts had multiple professional judges overseeing complex legal codes.", "isCorrect": false, "rationale": "The text explicitly states, 'Unlike modern courts, the dikasterion had no judge, no professional lawyers, and no rules of evidence in the modern sense. Cases were decided entirely by citizen jurors.'"}, {"text": "Athenian trials involved immediate jury voting without deliberation, based on speeches by citizen accusers and defendants.", "isCorrect": true, "rationale": "The text explains the Athenian legal system involved 'no deliberation, no discussion among jurors, just a show of hands' after the accuser and accused spoke, contrasting it with modern processes."}, {"text": "Defendants in Athens had the right to appeal verdicts to a higher court, similar to modern systems.", "isCorrect": false, "rationale": "The text states, 'There were no public prosecutors, no defense attorneys, no appeals courts' in the Athenian system."}, {"text": "The Athenian *klepsydra* was used to measure the time jurors spent deliberating their verdict.", "isCorrect": false, "rationale": "The *klepsydra* was a water clock used to measure 'a fixed amount of time' allotted for speeches by the accuser and defendant, not for jury deliberation, which did not occur."}], "id": "q01"}, {"question": "Socrates considered the 'old accusers' far more dangerous than the 'new accusers.' What is the primary analytical reason given for this assessment?", "options": [{"text": "The old accusers were specific, powerful politicians who had strong influence over the jury.", "isCorrect": false, "rationale": "The text clarifies that 'The old accusers are not specific people standing in the courtroom' but rather years of gossip and ridicule. Specific politicians like Anytus were among the 'new accusers.'"}, {"text": "The old accusations had been absorbed by the jurors since childhood, making them deeply ingrained and resistant to rational refutation.", "isCorrect": true, "rationale": "Socrates deemed the old accusations dangerous because 'they have been absorbed since childhood by the very jurors now judging him. You cannot cross-examine a rumor,' highlighting their pervasive and unassailable nature."}, {"text": "The old accusers charged Socrates with offenses that carried a more severe penalty than those brought by the new accusers.", "isCorrect": false, "rationale": "The formal charges by the new accusers (corrupting the young, impiety) were the ones that 'carried the death penalty.' The text does not suggest the old accusations had a formal legal penalty attached."}, {"text": "The old accusers represented a larger coalition of influential groups within Athenian society.", "isCorrect": false, "rationale": "While the old accusations were widespread, the new accusers were explicitly identified as representing specific influential groups: poets (Meletus), craftsmen/politicians (Anytus), and orators (Lycon), which were themselves powerful coalitions."}], "id": "q02"}, {"question": "Aristophanes' comedy *The Clouds* significantly contributed to the public's perception of Socrates. How did this play misrepresent the real Socrates, according to the text?", "options": [{"text": "It portrayed Socrates as a traditional Athenian general, despite his lack of military experience.", "isCorrect": false, "rationale": "The text makes no mention of Socrates being portrayed as a general. Instead, it describes him as a philosopher and teacher."}, {"text": "It depicted Socrates as engaging in natural philosophy and sophistry, activities he explicitly opposed.", "isCorrect": true, "rationale": "The text states that the theatrical caricature associated Socrates with 'two things he actually opposed: natural philosophy... and sophistry,' which involved studying the physical world and teaching dishonest arguments for a fee."}, {"text": "It showed Socrates charging high fees for his teaching, which he only did occasionally.", "isCorrect": false, "rationale": "The text emphasizes that the real Socrates 'never charged a fee for his teaching' and sharply distinguished himself from the Sophists who did."}, {"text": "It claimed Socrates held public office, which he actively avoided throughout his life.", "isCorrect": false, "rationale": "The text notes that Socrates 'had never held public office of any importance,' so this portrayal would be an inaccuracy, but it's not what *The Clouds* is specifically cited for."}], "id": "q03"}, {"question": "Socrates faced two formal charges brought by his 'new accusers.' Which pair accurately reflects these charges?", "options": [{"text": "Economic fraud and treason against the Athenian democracy.", "isCorrect": false, "rationale": "The text lists the formal charges as 'corrupting the young' and 'impiety,' not economic fraud or treason."}, {"text": "Corrupting the young and impiety by introducing new divinities.", "isCorrect": true, "rationale": "The text explicitly states the formal charges were twofold: 'Socrates is guilty of corrupting the young' and 'Socrates is guilty of impiety (asebeia)—specifically, of not believing in the gods the city believes in and of introducing new divinities (his daimonion).'"}, {"text": "Refusing military service and engaging in public discourse without a license.", "isCorrect": false, "rationale": "These are not mentioned as the formal charges against Socrates in the provided text."}, {"text": "Practicing sorcery and inciting rebellion among the youth.", "isCorrect": false, "rationale": "While 'corrupting the young' is related, 'practicing sorcery' is not listed as a formal charge; impiety refers to religious belief, not magic."}], "id": "q04"}, {"question": "Socrates' opening statement warns the jury not to expect polished rhetoric from him, claiming he will speak plainly 'like a man talking in the marketplace.' What analytical purpose does the text suggest this rhetorical strategy served, despite potentially alienating the jury?", "options": [{"text": "To demonstrate his advanced age and inability to prepare an elaborate speech.", "isCorrect": false, "rationale": "While he mentions his age, the primary purpose is strategic. The text refers to it as a 'rhetorical move' called parrhesia, not merely an admission of weakness due to age."}, {"text": "To distinguish himself from the Sophists and establish his credibility as someone concerned only with truth.", "isCorrect": true, "rationale": "The text explains this move: 'By refusing to use the tricks of professional orators, Socrates distinguishes himself from the Sophists and establishes his credibility as a man who cares only about truth.'"}, {"text": "To imply that the jury was too unsophisticated to appreciate complex oratory.", "isCorrect": false, "rationale": "The text suggests the opposite, that 'Athenian juries expected eloquence, and a plain speaker could seem arrogant or contemptuous,' implying the jury appreciated eloquence, not that they were unsophisticated."}, {"text": "To deliberately provoke the accusers into making more emotional, less rational arguments.", "isCorrect": false, "rationale": "While it might have had an effect on the accusers, the text focuses on Socrates' self-presentation and how it contrasts with the expectations of the jury and the practices of Sophists."}], "id": "q05"}, {"question": "What was the initial source of Socrates' philosophical quest and his confusion about his own wisdom, according to his defense speech?", "options": [{"text": "A personal dream that instructed him to seek out the wisest people in Athens.", "isCorrect": false, "rationale": "The text states his quest began with a story about the Oracle at Delphi, not a personal dream."}, {"text": "A challenge from Meletus, who dared him to prove his intelligence in public.", "isCorrect": false, "rationale": "Meletus was a new accuser; Socrates' quest originated much earlier, triggered by the oracle's pronouncement."}, {"text": "The Oracle at Delphi's declaration that no one was wiser than him, which puzzled him.", "isCorrect": true, "rationale": "The text explains that Socrates' friend Chaerephon asked the oracle if anyone was wiser than Socrates, and the oracle replied 'no one.' Socrates was 'puzzled by this response' because he 'knew he was not wise,' leading him to test the oracle."}, {"text": "His desire to become a renowned teacher of natural philosophy.", "isCorrect": false, "rationale": "The text clarifies that Socrates 'had no interest in such questions' as natural philosophy and opposed those who engaged in it."}], "id": "q06"}, {"question": "The concept of 'Socratic Ignorance' is presented as a 'starting point of genuine inquiry.' Based on the text, what is the core meaning of 'I know that I know nothing' in this context?", "options": [{"text": "Knowledge is inherently impossible to achieve, leading to despair and intellectual passivity.", "isCorrect": false, "rationale": "The text directly refutes this misreading, stating '“I know that I know nothing” is not a counsel of despair.' It implies knowledge *is* possible, but requires an honest starting point."}, {"text": "Socrates claimed he possessed no specific knowledge about any subject, unlike others.", "isCorrect": false, "rationale": "Socrates' point is more subtle. He acknowledges others have expertise (craftsmen knew their crafts well), but his 'ignorance' is about *deep wisdom* concerning life's great questions, and crucially, knowing his limits."}, {"text": "Socrates recognized his lack of deep wisdom and did not pretend to have answers he lacked, which made him wiser than those who falsely claimed wisdom.", "isCorrect": true, "rationale": "The key concept box defines Socratic Ignorance as 'that he himself does not possess the kind of deep wisdom... His advantage over others is simply that he does not pretend to have answers he lacks.'"}, {"text": "True wisdom comes from acquiring vast amounts of information and facts.", "isCorrect": false, "rationale": "Socrates found that those who claimed to know much (politicians, poets, craftsmen) often lacked true wisdom; his wisdom came from acknowledging limits, not accumulating facts."}], "id": "q07"}, {"question": "During his cross-examination of Meletus, Socrates employs an analogy involving horse training. What was the purpose of this analogy?", "options": [{"text": "To demonstrate that all citizens, regardless of their background, are equally capable of training the young.", "isCorrect": false, "rationale": "Socrates uses the analogy to argue the opposite: 'In every other area of expertise (horse training, for example), only a few specialists can do the job well, while the many are more likely to do harm.'"}, {"text": "To argue that expertise in any field, including education, belongs to a few specialists rather than the general populace.", "isCorrect": true, "rationale": "Socrates uses the horse training example to show that just as only a few specialists can train horses well, only a few can improve the young, exposing the absurdity of Meletus' claim that 'all Athenians except Socrates' improve them."}, {"text": "To highlight the dangerous consequences of poorly trained horses in a city like Athens.", "isCorrect": false, "rationale": "The analogy's focus is on the nature of expertise and improvement, not specifically on horse safety in Athens."}, {"text": "To prove that Meletus had no practical experience with animal husbandry.", "isCorrect": false, "rationale": "Socrates' goal was to expose the logical flaws in Meletus' arguments, not to test his knowledge of horse training."}], "id": "q08"}, {"question": "What critical blunder did Meletus make during Socrates' cross-examination regarding the charge of impiety?", "options": [{"text": "He admitted that he had no evidence to support the charge that Socrates corrupted the young.", "isCorrect": false, "rationale": "Meletus made a blunder regarding the gods, not explicitly admitting a lack of evidence for corrupting the young, though Socrates did expose logical inconsistencies in that charge too."}, {"text": "He claimed Socrates was a complete atheist who believed in no gods, contradicting the indictment that he introduced new divinities.", "isCorrect": true, "rationale": "The text states Meletus 'makes a critical blunder: he claims that Socrates is a complete atheist who believes in no gods whatsoever. But the indictment says Socrates introduces new divinities... These two claims contradict each other.'"}, {"text": "He revealed that Anytus and Lycon had pressured him into filing the formal complaint.", "isCorrect": false, "rationale": "The text does not mention Meletus revealing pressure from Anytus or Lycon during the cross-examination."}, {"text": "He proposed an excessively harsh penalty, which alienated the jury.", "isCorrect": false, "rationale": "The penalty phase comes *after* conviction. This blunder occurred during the initial cross-examination about the charges."}], "id": "q09"}, {"question": "Despite Socrates' intellectual brilliance in demolishing Meletus' arguments, the text cautions against assuming this meant he 'won' the jury's favor. What potential limitation of his Socratic method in a legal context is highlighted?", "options": [{"text": "His arguments were too simplistic for the complex legal issues at hand.", "isCorrect": false, "rationale": "The text portrays his arguments as intellectually superior and devastating to Meletus' case, not simplistic."}, {"text": "His display of intellectual superiority may have alienated jurors who felt embarrassed or had grievances.", "isCorrect": true, "rationale": "The text notes, 'Socrates destroys Meletus' arguments, but destroying arguments is not the same as winning hearts. The jury is watching a display of intellectual superiority that may have impressed some and alienated others.'"}, {"text": "The *dikasterion*'s rules of evidence prevented him from introducing crucial testimony.", "isCorrect": false, "rationale": "The text explicitly states 'no rules of evidence in the modern sense,' implying flexibility, not strict limitations that hindered him."}, {"text": "He ran out of time on the *klepsydra* before fully presenting his defense.", "isCorrect": false, "rationale": "The text describes the time allocation but does not suggest Socrates specifically ran out of time prematurely as a reason for not winning hearts."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
