<script>
var QUESTIONS = [{"question": "According to the text, what is the fundamental difference between a Socratic dialogue and a traditional textbook?", "options": [{"text": "Textbooks present information, while dialogues contain historical inaccuracies.", "isCorrect": false, "rationale": "The text does not suggest Socratic dialogues contain historical inaccuracies; rather, they are dramatic works, while textbooks directly transfer information."}, {"text": "Dialogues are dramatic works featuring characters with personalities and motives, unlike textbooks which focus on direct information transfer.", "isCorrect": true, "rationale": "The text explicitly states, 'A Socratic dialogue is not a textbook. It is a dramatic work — a conversation between characters who have personalities, motives, and flaws.'"}, {"text": "Textbooks are written by multiple authors, whereas dialogues have a single author.", "isCorrect": false, "rationale": "The text does not make a distinction based on the number of authors; the key difference is their nature as 'drama' vs. 'textbook'."}, {"text": "Dialogues always resolve philosophical questions, while textbooks only introduce them.", "isCorrect": false, "rationale": "The text notes that 'Many of the dialogues in this book end without a clear answer,' contradicting this statement."}]}, {"question": "When Socrates tells Euthyphro, “You are younger and wiser than I — teach me what piety is,” what is his primary intention according to the text?", "options": [{"text": "To genuinely acknowledge Euthyphro's superior wisdom and seek guidance.", "isCorrect": false, "rationale": "This is the literal interpretation, but the text warns against taking Socrates' ironic statements at face value, explicitly stating he 'says things he does not literally mean.'"}, {"text": "To use a pose of ignorance as a philosophical tool to challenge Euthyphro's confidence and initiate genuine inquiry.", "isCorrect": true, "rationale": "The text defines Socratic irony as 'a deliberate pose of ignorance used to draw others into philosophical examination' and 'a philosophical trap designed to expose false confidence and replace it with genuine inquiry.'"}, {"text": "To establish a humble and respectful tone for their upcoming discussion.", "isCorrect": false, "rationale": "While it might appear humble, the text clarifies that Socratic irony is a philosophical tool with a deeper purpose than merely setting a tone; it aims to test knowledge."}, {"text": "To subtly insult Euthyphro's intelligence by implying he needs to be taught basic concepts.", "isCorrect": false, "rationale": "The primary goal of Socratic irony is not insult, but rather to provoke philosophical examination and expose false knowledge, which can lead to discomfort but is not an insult in itself."}]}, {"question": "A student is reading a Socratic dialogue and finds themselves strongly disagreeing with one of Socrates' objections to a proposed definition. Based on the provided reading instructions, what is the most appropriate next step for the student?", "options": [{"text": "Assume Socrates is correct and reread the passage until they understand his point of view.", "isCorrect": false, "rationale": "While rereading is good, the text encourages active engagement and disagreement, stating, 'Arguing with the text is not disrespectful — it is exactly what Socrates would want you to do.'"}, {"text": "Mark their disagreement in the margin and articulate their reasons, viewing it as a valid form of engagement.", "isCorrect": true, "rationale": "The text advises, 'If you disagree with Socrates, write down why. Arguing with the text is not disrespectful — it is exactly what Socrates would want you to do.'"}, {"text": "Skip ahead, as getting bogged down in disagreement can hinder progress through the dialogue.", "isCorrect": false, "rationale": "The text advocates for 'slow, careful reading' and active engagement with the argument, rather than skipping sections of disagreement."}, {"text": "Consult a modern translation to see if the objection is clearer there.", "isCorrect": false, "rationale": "While modern translations can be helpful for archaic language, the primary instruction for disagreement is to engage directly with the text at hand, not immediately seek external clarification for philosophical content."}]}, {"question": "Many Socratic dialogues conclude without a definitive answer, leaving the reader in a state of 'aporia.' According to Plato, what is the ultimate value of this puzzlement?", "options": [{"text": "It demonstrates the inherent futility of philosophical inquiry, proving some questions have no answers.", "isCorrect": false, "rationale": "The text explicitly states that 'aporia' is 'not a failure' but 'the first step toward wisdom,' indicating it is productive, not futile."}, {"text": "It serves as the initial, crucial step towards genuine philosophical understanding and wisdom, by revealing one's own ignorance.", "isCorrect": true, "rationale": "The text explains, 'The point is the puzzlement itself. Plato believed that genuine philosophical progress begins when you realize that what you thought you knew, you do not really know. This state of productive confusion — aporia... is the first step toward wisdom.'"}, {"text": "It signifies a failure of the interlocutors and Socrates to reach a conclusive understanding.", "isCorrect": false, "rationale": "The text clearly states that 'aporia' is 'not a failure,' but rather a productive state."}, {"text": "It encourages the reader to seek out external sources for the 'correct' answers that the dialogue omitted.", "isCorrect": false, "rationale": "The value of puzzlement lies in its internal, transformative effect on the reader's self-perception of knowledge, not merely in prompting external research for definitive answers."}]}, {"question": "Despite their sometimes archaic language, Jowett's translations are used in this textbook primarily because:", "options": [{"text": "They are considered the most accurate and intellectually superior translations ever produced.", "isCorrect": false, "rationale": "While praised for 'literary grace,' the text notes modern translations are 'excellent,' implying Jowett's aren't necessarily superior in accuracy. The primary reason for *their inclusion* is practical."}, {"text": "They are in the public domain, enabling the inclusion of complete dialogue texts without copyright restrictions.", "isCorrect": true, "rationale": "The text explicitly states: 'Jowett's translations are in the public domain, which allows us to include the complete text of each dialogue in this book.'"}, {"text": "They offer a unique window into Victorian English literary style that enhances the reading experience.", "isCorrect": false, "rationale": "This is a characteristic of Jowett's translations, but not the *primary* reason given for their selection for inclusion in *this specific book*."}, {"text": "Modern translations are too simplistic and do not capture the complexity of Plato's original Greek.", "isCorrect": false, "rationale": "The text describes modern translations as 'excellent,' refuting the idea that they are too simplistic."}]}, {"question": "The text states that Socratic irony 'goes further' than Aristotle's description of *eironeia* as mere understatement. What is this 'further' dimension of Socratic irony?", "options": [{"text": "It is a form of deliberate deception intended to mislead opponents.", "isCorrect": false, "rationale": "While it can feel like a 'trap,' its purpose is philosophical examination and inquiry, not simply deception or misleading for its own sake."}, {"text": "It functions primarily as a philosophical tool to expose false confidence and promote genuine inquiry, rather than just a social grace.", "isCorrect": true, "rationale": "The text states: 'Socratic irony goes further: it is a philosophical tool, not just a social manner.'"}, {"text": "It is exclusively used by Socrates, making it a unique rhetorical device in ancient Greece.", "isCorrect": false, "rationale": "The text does not claim Socrates was the *only* one to use irony, but rather describes how *his* use of irony differed in purpose."}, {"text": "It is always accompanied by dramatic irony, enhancing the reader's understanding of the context.", "isCorrect": false, "rationale": "Dramatic irony is mentioned as an example within the 'Dialogue Is Drama' section, but it is not presented as the defining 'further' aspect of Socratic irony itself."}]}, {"question": "In a Socratic dialogue, an interlocutor confidently asserts a definition of justice. According to the section 'Dialogue Is Drama,' what analytical approach should a reader employ when evaluating this assertion?", "options": [{"text": "Focus solely on the logical coherence of the definition, irrespective of who is speaking.", "isCorrect": false, "rationale": "The text explicitly states, 'The arguments matter, but so do the people making them. Pay attention to who is speaking and why,' directly contradicting this approach."}, {"text": "Consider the interlocutor's personality, motives, and dramatic situation, as these might influence how their claim should be interpreted.", "isCorrect": true, "rationale": "The text advises, 'Pay attention to who is speaking and why. A claim that sounds reasonable coming from one character might look different when you consider that character's personality and situation.'"}, {"text": "Assume the interlocutor is attempting to deceive Socrates and approach their statement with immediate skepticism.", "isCorrect": false, "rationale": "While critical evaluation is encouraged, assuming outright deception is an overly strong and not universally applicable interpretation of character's motives."}, {"text": "Prioritize understanding Socrates' ultimate counter-argument before fully considering the interlocutor's initial claim.", "isCorrect": false, "rationale": "This approach skips the initial analytical step of evaluating the interlocutor's claim within its dramatic context before moving to Socrates' response."}]}, {"question": "The 'Think Deeper' section at the end of the reading introduces Socrates' famous quote, 'the unexamined life is not worth living.' Based on the overall tone and advice of the section, what is the intended purpose of presenting this quote to the reader?", "options": [{"text": "To present a definitive philosophical truth that readers should accept before proceeding.", "isCorrect": false, "rationale": "The text emphasizes active questioning and the absence of easy answers, rather than presenting definitive truths for passive acceptance."}, {"text": "To provoke personal reflection and critical engagement with a fundamental philosophical question, setting a precedent for active reading.", "isCorrect": true, "rationale": "The instruction 'Write a few sentences explaining your initial reaction' aligns with the section's overall message that 'philosophy is not a spectator sport' and 'your task is not simply to absorb information but to engage with the arguments.'"}, {"text": "To encourage readers to passively absorb Socrates' wisdom without critical engagement.", "isCorrect": false, "rationale": "The entire section advocates for active engagement, arguing with the text, and thinking critically, directly opposing passive absorption."}, {"text": "To summarize the main conclusions that will be drawn from the upcoming dialogues.", "isCorrect": false, "rationale": "It's framed as an introductory question for 'initial reaction,' not a summary of future conclusions, which would contradict the idea of embracing puzzlement."}]}, {"question": "While reading a Socratic dialogue, a reader finds themselves confused and unable to follow the progression from one definition to the next. According to the text, what is the most effective strategy to regain comprehension?", "options": [{"text": "Power through the confusion, hoping the argument will become clearer later in the dialogue.", "isCorrect": false, "rationale": "The text advises specific action when losing the thread, rather than passively hoping for clarity: 'If you lose the thread of the argument... go back a page and reread.'"}, {"text": "Return to the previous page or two and reread the section carefully, as Plato rewards this approach.", "isCorrect": true, "rationale": "The text explicitly states: 'If you lose the thread of the argument (and you will — everyone does), go back a page and reread. Plato rewards slow, careful reading.'"}, {"text": "Immediately consult a modern translation or a secondary commentary for clarification.", "isCorrect": false, "rationale": "While external resources can be helpful, the primary and immediate recommendation is to re-engage with the current text through rereading."}, {"text": "Assume the argument is intentionally convoluted and simply accept the puzzlement as the only outcome.", "isCorrect": false, "rationale": "While puzzlement is a valid outcome of the dialogues, the advice here is specifically for following the *argument structure*, which *can* be followed with careful reading, not just given up on."}]}, {"question": "According to the text, Socrates believed that thinking is both the most rewarding and what other characteristic for a human being?", "options": [{"text": "The most pleasurable.", "isCorrect": false, "rationale": "The text does not use the word 'pleasurable' to describe thinking in this context."}, {"text": "The most dangerous.", "isCorrect": true, "rationale": "The text states: 'thinking, as Socrates knew, is the most rewarding and the most dangerous thing a human being can do.'"}, {"text": "The most common.", "isCorrect": false, "rationale": "The text does not describe thinking as 'common'; in fact, the emphasis on the 'unexamined life' suggests it's not universally practiced in a deep sense."}, {"text": "The most solitary.", "isCorrect": false, "rationale": "While thinking can be solitary, the text emphasizes engaging with dialogues and arguments, suggesting a more interactive or challenging nature than just isolation."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
