<script>
var QUESTIONS = [{"question": "Why does Socrates consider the 'old accusers' -- years of gossip, suspicion, and comic ridicule -- more dangerous than his formal accusers Meletus, Anytus, and Lycon?", "options": [{"text": "Because the old accusers have more legal authority and political power than Meletus and Anytus.", "isCorrect": false, "rationale": "The old accusers are not specific people with legal authority. They represent decades of accumulated prejudice and rumor."}, {"text": "Because the old accusations have been absorbed since childhood by the very jurors now judging him, and you cannot cross-examine a rumor.", "isCorrect": true, "rationale": "Socrates explains that years of gossip and Aristophanes' comic portrayal have shaped the jurors' beliefs since they were young. Unlike a live accuser, a rumor cannot be questioned or refuted in court."}, {"text": "Because the old accusers include Aristophanes, who is present in the courtroom and testifies against Socrates directly.", "isCorrect": false, "rationale": "Aristophanes is not present as a witness. Socrates refers to his comedy The Clouds, performed over twenty years earlier, as part of the long buildup of prejudice."}, {"text": "Because the old accusers filed additional formal charges of treason that carry harsher penalties than impiety.", "isCorrect": false, "rationale": "The old accusers did not file formal charges. They represent informal prejudice and misunderstanding that had accumulated over decades."}]}, {"question": "What were the two formal charges brought against Socrates at his trial?", "options": [{"text": "Treason against Athens and teaching natural philosophy for profit.", "isCorrect": false, "rationale": "Socrates was never charged with treason. He explicitly denies involvement in natural philosophy and says he never charged fees."}, {"text": "Corrupting the young and impiety -- specifically, not believing in the gods of Athens and introducing new divinities (his daimonion).", "isCorrect": true, "rationale": "The text states that the formal charges were twofold: corrupting the youth by turning them against the values of their parents and city, and impiety in the form of not believing in the city's gods and introducing new divine things."}, {"text": "Practicing sophistry and undermining Athenian democracy through anti-democratic associations.", "isCorrect": false, "rationale": "Although Socrates was popularly associated with sophistry and some of his associates were involved in anti-democratic activities, the formal charges were about corrupting the youth and impiety."}, {"text": "Blasphemy against Apollo and refusing to pay taxes to the Athenian treasury.", "isCorrect": false, "rationale": "These were not the charges. Socrates actually claims to be carrying out a mission given to him by Apollo, and taxes are never mentioned."}]}, {"question": "How does Socrates interpret the oracle at Delphi's pronouncement that no one is wiser than he?", "options": [{"text": "He concludes that he possesses more factual knowledge than any other Athenian and therefore deserves the title of wisest man.", "isCorrect": false, "rationale": "Socrates explicitly says he has no special knowledge. His interpretation of the oracle is paradoxical, not a claim to superior factual knowledge."}, {"text": "He concludes that the oracle is wrong, since he knows he possesses no special wisdom.", "isCorrect": false, "rationale": "Socrates does not dismiss the oracle. He considers it unthinkable that the god would be wrong and sets out to test the oracle's meaning."}, {"text": "He concludes that he is wiser than others not because he knows more, but because he alone recognizes his own ignorance -- others claim knowledge they do not possess.", "isCorrect": true, "rationale": "After questioning politicians, poets, and craftsmen, Socrates concludes that the oracle was right in a paradoxical way: he is wiser because he does not pretend to have answers he lacks. 'I know that I know nothing' is the starting point of genuine inquiry."}, {"text": "He concludes that the oracle was speaking metaphorically about wisdom in military matters, not philosophical wisdom.", "isCorrect": false, "rationale": "Socrates interprets the oracle as referring to philosophical wisdom and self-knowledge, not military expertise."}]}, {"question": "During his cross-examination of Meletus, Socrates exposes a critical contradiction in the charges. What is it?", "options": [{"text": "Meletus claims Socrates is both too old and too young to be a corruptor of youth.", "isCorrect": false, "rationale": "Age is not part of the contradiction Socrates identifies. The contradiction concerns Socrates' beliefs about the gods."}, {"text": "Meletus claims Socrates is a complete atheist who believes in no gods, while the indictment says Socrates introduces new divinities -- you cannot introduce new divine things while believing in no divine things at all.", "isCorrect": true, "rationale": "Socrates traps Meletus into claiming he is a total atheist, which contradicts the charge of introducing new divinities (his daimonion). Socrates compares this to believing in horsemanship but not in horses."}, {"text": "Meletus claims Socrates corrupts the young intentionally but also admits Socrates has never met any young people.", "isCorrect": false, "rationale": "Meletus does not deny Socrates' contact with young people. The contradiction Socrates highlights is between atheism and introducing new divinities."}, {"text": "Meletus claims Socrates teaches for money but also admits Socrates lives in poverty.", "isCorrect": false, "rationale": "While Socrates' poverty is mentioned elsewhere, the key contradiction in the cross-examination concerns the inconsistency between atheism and introducing new divine beings."}]}, {"question": "In the famous 'gadfly speech,' Socrates compares himself to an insect that stings a large, sluggish horse. What does this metaphor convey about his philosophical mission?", "options": [{"text": "That his mission is to provide Athens with definitive answers to its political and moral problems.", "isCorrect": false, "rationale": "Socrates explicitly says his mission is not to provide answers but to provoke questioning. Philosophy for Socrates is an activity of relentless inquiry, not a body of doctrines."}, {"text": "That Athens is a great but self-satisfied city in danger of intellectual complacency, and Socrates' role is to sting it into wakefulness through uncomfortable questioning -- a mission the city needs even though it resents the sting.", "isCorrect": true, "rationale": "The gadfly metaphor captures Socrates' self-understanding: Athens is noble but sluggish, and his relentless public questioning is an irritant the city would rather swat away but genuinely needs to stay intellectually alive."}, {"text": "That Socrates intends to overthrow the Athenian government by annoying its leaders into resigning.", "isCorrect": false, "rationale": "Socrates has no political ambitions. The gadfly metaphor describes philosophical provocation, not political revolution."}, {"text": "That philosophy is a painful but temporary activity that should eventually be abandoned once a city reaches maturity.", "isCorrect": false, "rationale": "Socrates suggests the opposite: if the city kills the gadfly, it will sleep on undisturbed. The need for philosophical questioning is ongoing, not temporary."}]}, {"question": "After the jury convicts Socrates, Meletus proposes death as the penalty. What does Socrates initially propose as his counter-penalty, and why is this significant?", "options": [{"text": "He proposes exile to another Greek city, which would have been a standard and expected compromise.", "isCorrect": false, "rationale": "Socrates does not propose exile. He actually considers and rejects exile elsewhere in the speech, saying he cannot give up philosophy."}, {"text": "He proposes free meals at the Prytaneum for life -- the honor given to Olympic victors and war heroes -- claiming his philosophical mission is the greatest service Athens has ever received.", "isCorrect": true, "rationale": "In one of the most audacious moments in Western literature, Socrates says he deserves the same honor as Olympic victors. This enraged the jury and likely contributed to the death penalty passing by an even larger margin than the conviction vote."}, {"text": "He proposes paying a small fine of one mina, which he could easily afford from his savings.", "isCorrect": false, "rationale": "Socrates eventually proposes thirty minae (guaranteed by friends), not one. And his initial counter-proposal was the provocative Prytaneum suggestion."}, {"text": "He proposes that Meletus serve a year in prison for bringing a frivolous prosecution.", "isCorrect": false, "rationale": "Socrates does not propose punishment for Meletus. His counter-penalty was the honor of free meals at the Prytaneum."}]}, {"question": "What is Socrates' famous argument about why death should not be feared?", "options": [{"text": "He claims to have received a divine vision proving that the afterlife is pleasant, so there is nothing to worry about.", "isCorrect": false, "rationale": "Socrates does not claim a divine vision about the afterlife. His argument is a rational conjecture about two possible outcomes, not a revelation."}, {"text": "Death must be one of two things: either annihilation (like a dreamless sleep, which is restful) or a migration of the soul to another place (where he could question the great heroes and thinkers) -- either way, it is not bad.", "isCorrect": true, "rationale": "Socrates reasons that if death is annihilation, it is like the most restful dreamless sleep. If it is a journey to another realm, he could spend eternity questioning Homer, Hesiod, and the great heroes. Either outcome is nothing to fear."}, {"text": "He argues that death is simply the natural end of all living things and therefore not worth any emotional response at all.", "isCorrect": false, "rationale": "Socrates' argument is not about death being natural and therefore emotionally neutral. He specifically argues that both possible outcomes of death are positively good or at least not bad."}, {"text": "He claims that his daimonion has guaranteed him safe passage to the afterlife.", "isCorrect": false, "rationale": "Socrates notes that his daimonion was silent during the trial (a good sign), but he does not claim it guaranteed safe passage to the afterlife."}]}, {"question": "What does Socrates mean when he says 'the unexamined life is not worth living'?", "options": [{"text": "That people who do not study philosophy in a formal academic setting are wasting their lives.", "isCorrect": false, "rationale": "Socrates is not talking about formal academic study. The examined life is about regularly questioning your own beliefs, testing your values, and asking whether you are living as you ought."}, {"text": "That a human life without philosophical self-scrutiny -- without regularly questioning your beliefs and testing your values -- is not a fully human life, regardless of how comfortable or successful it may be.", "isCorrect": true, "rationale": "Socrates means something radical: that a life of unquestioned comfort is like sleepwalking. The examined life is not about intelligence but about the honesty and courage to question what you think you know."}, {"text": "That life is only worth living if you can prove the existence of the gods through rational argument.", "isCorrect": false, "rationale": "The examined life is about self-scrutiny and questioning one's own beliefs broadly, not specifically about proving the existence of the gods."}, {"text": "That only philosophers like Socrates have lives worth living, and all other professions are inferior.", "isCorrect": false, "rationale": "Socrates is not claiming that only professional philosophers live worthwhile lives. He is saying that anyone who fails to examine their own beliefs and values is missing something essential about being human."}]}, {"question": "How did the Athenian legal system differ from a modern courtroom, and how might this have affected Socrates' trial?", "options": [{"text": "Athens used professional judges and lawyers, which gave Socrates a fair chance because he had skilled legal representation.", "isCorrect": false, "rationale": "The text explicitly states there were no professional judges, no defense attorneys, and no rules of evidence in the modern sense. Cases were decided entirely by citizen jurors."}, {"text": "There were no professional judges or lawyers; any citizen could bring charges; the jury of 501 voted immediately without deliberation; and time was limited by a water clock -- making the outcome vulnerable to prejudice and rhetorical skill.", "isCorrect": true, "rationale": "The Athenian system had no deliberation, no appeals, and immediate voting by pebble. Each side had limited time measured by a water clock. This system meant that longstanding prejudice and rhetorical ability could heavily influence the outcome."}, {"text": "The Athenian system was essentially identical to modern courts but used Greek language, so the differences were merely superficial.", "isCorrect": false, "rationale": "The differences were fundamental: no judge, no lawyers, no deliberation, no appeals, voting by pebble, and time measured by water clock."}, {"text": "Athenian trials were decided by the King Archon alone, with no jury involved, making the system essentially a dictatorship.", "isCorrect": false, "rationale": "The King Archon oversaw religious and homicide cases but did not decide them alone. Socrates was judged by a jury of 501 citizens."}]}, {"question": "Why does Socrates refuse to use emotional appeals -- such as bringing his weeping children into court or begging for mercy -- even though this was standard practice in Athenian trials?", "options": [{"text": "Because he does not have any children and therefore cannot use this tactic.", "isCorrect": false, "rationale": "Socrates has three sons. He deliberately chooses not to bring them into the courtroom."}, {"text": "Because he believes the jury's job is to judge what is true, not to distribute favors based on emotional manipulation -- and he would rather die justly than live by manipulation.", "isCorrect": true, "rationale": "Socrates draws a sharp contrast between philosophy and rhetoric. A juror who acquits because of tears is not doing justice but being manipulated. Socrates applies to his own life-or-death situation the same principle from the Euthyphro: truth is discovered by argument, not emotional pressure."}, {"text": "Because Athenian law prohibited defendants from showing emotion during trials.", "isCorrect": false, "rationale": "The text explicitly states that bringing weeping family members was standard practice in Athenian courts. Socrates' refusal was unusual and practically defiant."}, {"text": "Because Socrates secretly wants to be convicted so he can become a martyr for philosophy.", "isCorrect": false, "rationale": "Whether Socrates sought martyrdom is a scholarly debate, but the text presents his reason as principled: the jury should judge truth, not respond to emotional manipulation."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
