<script>
var QUESTIONS = [{"question": "What is the primary reason Socrates is at the Porch of the King Archon at the beginning of the Euthyphro?", "options": [{"text": "To prosecute Euthyphro's father for murder.", "isCorrect": false, "rationale": "Euthyphro is the one prosecuting his own father for murder; Socrates has been summoned to answer an indictment."}, {"text": "To answer a formal indictment for impiety and corrupting the youth.", "isCorrect": true, "rationale": "The text explicitly states: 'Socrates has been summoned to answer a formal indictment brought by a young man named Meletus. ... The charge is serious: impiety (asebeia) — a failure to honor the gods of Athens — and corrupting the minds of young people.'"}, {"text": "To learn about the will of the gods from a renowned diviner.", "isCorrect": false, "rationale": "While Socrates expresses a hope to learn from Euthyphro, this is not the reason he was initially summoned to the court."}, {"text": "To witness the trial of another philosopher accused of atheism.", "isCorrect": false, "rationale": "Socrates himself is the one accused, not observing someone else's trial. Examples of past prosecutions (Anaxagoras, Protagoras) are given as context, not current events."}]}, {"question": "The meeting between Socrates and Euthyphro is described as 'sharp and deliberate' in its irony. What is the core of this irony?", "options": [{"text": "Both men are involved in legal proceedings, but Euthyphro's case involves divine law, while Socrates' involves human law.", "isCorrect": false, "rationale": "Both cases involve aspects of both divine and human law; the irony lies in their differing relationships to piety."}, {"text": "Socrates, accused of impiety, seeks wisdom from Euthyphro, who claims expert knowledge of piety and is prosecuting his own father in its name.", "isCorrect": true, "rationale": "The text states: 'Socrates, who has been accused of impiety, encounters a man who claims to know what piety is — and knows it so well that he is willing to prosecute his own father in its name.'"}, {"text": "Euthyphro is prosecuting his father for an act that many consider a minor offense, whereas Socrates faces a death penalty for more serious charges.", "isCorrect": false, "rationale": "Euthyphro's father's actions led to a death, and Euthyphro's family thinks the prosecution is outrageous, indicating it is not seen as minor. The core irony is about who claims piety and who is accused."}, {"text": "Socrates, a respected philosopher, is accused by a young, unknown poet, while Euthyphro is a professional religious expert.", "isCorrect": false, "rationale": "These are factual details but do not capture the specific irony of their encounter regarding the concept of piety itself."}]}, {"question": "Based on the description in the text, which characteristic best describes Euthyphro's approach to religious knowledge?", "options": [{"text": "Humble and inquisitive, constantly questioning his own assumptions about the gods.", "isCorrect": false, "rationale": "The text states Euthyphro 'speaks about piety with the assurance of a man who has never seriously questioned his own assumptions,' directly contradicting humility and inquisitiveness about his own views."}, {"text": "Dogmatic and self-important, confidently asserting his understanding of divine will without deep reflection.", "isCorrect": true, "rationale": "Euthyphro is described as 'confident, even self-important' and 'unreflective,' holding views that many educated Athenians shared without examining his own assumptions."}, {"text": "Cautious and pragmatic, always seeking advice from various religious authorities before acting.", "isCorrect": false, "rationale": "Euthyphro acts on his own conviction against his family's opinion, indicating a lack of caution or reliance on external authority for his specific action."}, {"text": "Skeptical and analytical, applying rational scrutiny to traditional religious beliefs.", "isCorrect": false, "rationale": "This description aligns more with Socrates' method (elenchus) than Euthyphro's."}]}, {"question": "What is the primary goal of the Socratic elenchus, as described in the text?", "options": [{"text": "To win an argument by demonstrating the interlocutor's intellectual inferiority.", "isCorrect": false, "rationale": "The text explicitly states: 'The goal is not to win an argument but to test whether a belief can withstand rational scrutiny.'"}, {"text": "To test whether a belief can withstand rational scrutiny by revealing contradictions or inadequacies.", "isCorrect": true, "rationale": "The Socratic elenchus involves asking questions 'designed to reveal contradictions or inadequacies in that thesis,' with the goal of testing beliefs."}, {"text": "To convince the interlocutor to adopt Socrates' philosophical views.", "isCorrect": false, "rationale": "The goal is to test the interlocutor's beliefs, not necessarily to persuade them to adopt Socrates' specific views, which he often claims not to have."}, {"text": "To gather a wide range of examples of a concept before attempting to define it.", "isCorrect": false, "rationale": "Socrates is consistently demanding a definition, not a list of examples, as examples alone are insufficient for his purpose."}]}, {"question": "When Socrates asks 'What is X?', he is seeking a universal definition. What is the fundamental difference between this and merely providing examples?", "options": [{"text": "Examples are always subjective, while definitions are always objective.", "isCorrect": false, "rationale": "The text does not discuss subjectivity/objectivity in this context, but rather the logical function of examples versus definitions."}, {"text": "An example identifies a particular instance, whereas a definition identifies the essential nature shared by all instances.", "isCorrect": true, "rationale": "The 'Socratic Demand for Definitions' key concept states: 'An example tells you that something is pious. A definition tells you what piety is.' It emphasizes finding 'the essential nature that all instances of X share.'"}, {"text": "Examples are useful for everyday communication, but definitions are only for philosophical debate.", "isCorrect": false, "rationale": "The text states that the demand for definitions is 'the foundation of all rigorous thinking,' not just for philosophical debate."}, {"text": "Providing examples requires less intelligence than formulating a definition.", "isCorrect": false, "rationale": "The text focuses on the logical distinction between examples and definitions, not the level of intelligence required for each."}]}, {"question": "A common misconception is that 'Socrates is just being difficult' when he rejects Euthyphro's answers. According to the text, why is this an incorrect interpretation of Socrates' philosophical concern?", "options": [{"text": "Socrates is actually trying to prove that Euthyphro is unintelligent.", "isCorrect": false, "rationale": "The 'teachernote' explicitly states: 'Euthyphro is not unintelligent.'"}, {"text": "Socrates genuinely seeks a universal principle or essence that defines piety, not just specific instances.", "isCorrect": true, "rationale": "The 'teachernote' clarifies: 'Socrates has a genuine philosophical concern: he wants a universal definition — one that captures what all pious acts have in common. This is not nit-picking; it is the foundation of all rigorous thinking.'"}, {"text": "Socrates is using the dialogue as an opportunity to publicly expose the flaws of traditional Athenian religion.", "isCorrect": false, "rationale": "While the dialogue may have implications for traditional religion, the text emphasizes Socrates' 'genuine philosophical concern' for definitions, not an agenda to expose flaws."}, {"text": "Socrates is deliberately trying to annoy Euthyphro to test his patience and resolve.", "isCorrect": false, "rationale": "The text stresses Socrates' 'genuine curiosity and even admiration' for Euthyphro at the outset, and a 'genuine philosophical concern' rather than a desire to annoy."}]}, {"question": "The text clarifies that Euthyphro is not unintelligent, but rather 'unreflective.' What does this distinction imply about his character's role in the dialogue?", "options": [{"text": "It suggests Euthyphro is too mentally slow to grasp Socrates' complex philosophical arguments.", "isCorrect": false, "rationale": "The text explicitly states: 'Euthyphro is not unintelligent.'"}, {"text": "It highlights that Euthyphro represents a common, uncritical approach to moral concepts, making him a useful character for Plato's purposes.", "isCorrect": true, "rationale": "The 'teachernote' explains: 'His failure is not a failure of intelligence but a failure to examine his own assumptions. This makes him a more useful character for Plato's purposes: he represents not a fool but a common, uncritical approach to moral concepts.'"}, {"text": "It means Euthyphro is deliberately withholding deeper insights from Socrates.", "isCorrect": false, "rationale": "There is no indication of Euthyphro deliberately withholding information; his issue is a lack of self-examination."}, {"text": "It indicates that Euthyphro is merely a fictional construct with no basis in real Athenian society.", "isCorrect": false, "rationale": "The text notes he 'holds views that many educated Athenians shared,' suggesting he represents a real-world perspective."}]}, {"question": "Euthyphro's first attempt to define piety is 'prosecuting wrongdoers.' Why does Socrates immediately reject this definition?", "options": [{"text": "Socrates believes prosecuting one's father is inherently impious, regardless of the circumstances.", "isCorrect": false, "rationale": "The 'caution' box clarifies: 'Socrates never says that prosecuting one's father is wrong. He says that this particular act, even if pious, does not define piety.'"}, {"text": "Euthyphro's definition is an example of piety, not a universal statement of its essential nature.", "isCorrect": true, "rationale": "The text explicitly states Socrates' objection: 'Euthyphro has given an example of piety, not a definition. ... Prosecuting your father might be pious, or it might not — but either way, it does not tell us what piety is.'"}, {"text": "Socrates knows that the gods themselves disagree on whether prosecuting one's father is pious.", "isCorrect": false, "rationale": "The problem of divine disagreement arises with Euthyphro's second definition, not his first."}, {"text": "The act described by Euthyphro does not align with the traditional myths of Zeus and Kronos.", "isCorrect": false, "rationale": "Euthyphro actually *uses* the myth of Zeus punishing Kronos to justify his action, so this is not Socrates' objection."}]}, {"question": "Euthyphro's second definition, 'Piety is what is dear to the gods,' is rejected by Socrates due to a 'fatal problem.' What is this problem?", "options": [{"text": "It is too specific and does not cover all possible pious acts.", "isCorrect": false, "rationale": "This definition is general, aiming to cover all acts the gods love. Its problem isn't specificity but internal contradiction."}, {"text": "The Greek gods, as traditionally portrayed, often disagree, meaning an action could be both pious and impious simultaneously.", "isCorrect": true, "rationale": "The text explains: 'The Greek gods... notoriously disagree among themselves. ... If piety is what the gods love, and the gods love different things, then the very same action could be both pious (loved by one god) and impious (hated by another) at the same time.'"}, {"text": "It relies on human opinion of what the gods love, rather than direct divine revelation.", "isCorrect": false, "rationale": "Socrates' objection focuses on the gods' *internal disagreements* as depicted in myths, not on the human interpretation of their will."}, {"text": "It fails to account for the fact that some acts are pious even if no god happens to love them.", "isCorrect": false, "rationale": "This idea relates more to the Euthyphro Dilemma, which follows this definition, rather than the immediate reason for rejecting 'what is dear to the gods.'"}]}, {"question": "Socrates poses the Euthyphro Dilemma: 'Is the pious loved by the gods because it is pious, or is it pious because it is loved by the gods?' What is the crucial distinction Socrates is highlighting with this question?", "options": [{"text": "Whether piety is determined by human interpretation or divine decree.", "isCorrect": false, "rationale": "The dilemma assumes divine involvement in piety; the question is about the *direction* of causality in that divine involvement, not human interpretation."}, {"text": "Whether an action's inherent quality makes the gods love it, or the gods' love *confers* that quality upon the action.", "isCorrect": true, "rationale": "The analogy provided clarifies: 'Is a song good because it is popular?' (popularity confers goodness) vs. 'Or is it popular because it is good?' (goodness is inherent and causes popularity). This directly maps to whether piety is inherent (causes love) or conferred by love."}, {"text": "Whether Euthyphro's father's actions were truly impious or merely unfortunate.", "isCorrect": false, "rationale": "The Euthyphro Dilemma is a general philosophical question about the nature of piety, not specifically about Euthyphro's family case."}, {"text": "Whether all the gods must agree for an act to be considered pious.", "isCorrect": false, "rationale": "This point was addressed when Euthyphro revised his definition from 'dear to the gods' to 'what *all* the gods love.' The dilemma delves deeper into the *nature* of that love and piety."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
