        <div class="subtitle">The Trial of Socrates (Plato I) &mdash; Chapter 5, Section 2</div>

        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Justin Martyr proposed the concept of $\\textit{logos spermatikos}$ to argue that Greek philosophers had what relationship to Christian truth?", "options": [{"text": "They possessed partial glimpses of the divine Word through the cultivation of 'seeds' of truth.", "isCorrect": true, "rationale": "Justin believed that because the Logos is universal reason, those who lived according to reason were participating in the divine Word even before the incarnation of Christ."}, {"text": "They were essentially atheists who accidentally stumbled upon biological truths.", "isCorrect": false, "rationale": "Justin explicitly argued that philosophers like Socrates were not truly atheists because they lived according to the Logos."}, {"text": "They were divinely inspired prophets equal in status to the Hebrew patriarchs.", "isCorrect": false, "rationale": "While Justin valued them, he viewed their insights as partial or 'seeds,' whereas the Gospel provided the full revelation."}, {"text": "They had plagiarized their best ideas from the secret writings of Moses.", "isCorrect": false, "rationale": "The source material focuses on the idea of natural reason discovering truth rather than a theory of literary plagiarism from Hebrew texts."}]}, {"question": "How did Augustine of Hippo reconcile Plato's Theory of Forms with the Christian understanding of a sovereign Creator?", "options": [{"text": "He argued that the Forms were the $\\textit{rationes aeternae}$ residing within the mind of God.", "isCorrect": true, "rationale": "By placing the Forms in the divine mind, Augustine ensured they were not independent of God but were the blueprints used by the Creator."}, {"text": "He rejected the Forms as physical idols that distracted from spiritual worship.", "isCorrect": false, "rationale": "Augustine actually embraced the hierarchy of the Forms, viewing them as a map leading the soul back to God."}, {"text": "He claimed the Forms were created beings similar to angels or celestial spirits.", "isCorrect": false, "rationale": "Forms are treated as eternal ideas or principles of reality, not as created, personal entities like angels."}, {"text": "He suggested that the Forms existed in a separate, parallel realm that God also obeys.", "isCorrect": false, "rationale": "This would contradict the sovereignty of God; Augustine integrated them into God's very nature."}]}, {"question": "In the context of Augustine's thought, how does the doctrine of divine simplicity resolve the Euthyphro dilemma?", "options": [{"text": "It posits that God's will and God's nature are identical, making the source of goodness internal to God.", "isCorrect": true, "rationale": "If God is Goodness itself, the dilemma becomes a false choice because God's commands are simply expressions of His own unchanging nature."}, {"text": "It suggests that God chooses to follow an external standard of goodness to set an example.", "isCorrect": false, "rationale": "This would mean goodness is external to God, which Augustine's doctrine of simplicity explicitly denies."}, {"text": "It argues that God's power is so absolute that He can make evil actions good by decree.", "isCorrect": false, "rationale": "This view, known as voluntarism, is the opposite of the idea that God's commands are rooted in His unchanging, good nature."}, {"text": "It claims that human reason is too simple to understand the complex parts of God's character.", "isCorrect": false, "rationale": "Divine simplicity actually means God has no parts, and the goal of the doctrine is to explain the unity of God's attributes."}]}, {"question": "Boethius's use of the figure 'Lady Philosophy' in the $\\textit{Consolation of Philosophy}$ is a prime example of which literary technique also used by Plato?", "options": [{"text": "$\\textit{Prosopopoeia}$, or giving a voice to an abstract idea.", "isCorrect": true, "rationale": "Both Boethius and Plato (in the Crito) personified abstract concepts to engage in philosophical dialogue."}, {"text": "$\\textit{Elenchus}$, or the method of logical refutation through questioning.", "isCorrect": false, "rationale": "While related to the Socratic method, the specific act of personifying an idea like Law or Philosophy is a different literary device."}, {"text": "$\\textit{Anamnesis}$, or the theory that all learning is actually recollection.", "isCorrect": false, "rationale": "This is a Platonic epistemological theory, not the specific literary technique of personification described in the text."}, {"text": "$\\textit{Allegory}$, used specifically to hide truths from the uninitiated.", "isCorrect": false, "rationale": "While Lady Philosophy is allegorical, the text highlights the specific technique of giving a voice to the concept, known as prosopopoeia."}]}, {"question": "Which intellectual shift allowed for the 'Baptism of Plato' to eventually be joined by an 'Aristotelian synthesis' in the High Middle Ages?", "options": [{"text": "The recovery of Aristotle's works through Arabic translations and Islamic commentaries.", "isCorrect": true, "rationale": "Thinkers like Avicenna and Averroes preserved Aristotle's texts, which were later translated into Latin and utilized by Thomas Aquinas."}, {"text": "The complete rejection of Augustine's Platonic framework by the Vatican.", "isCorrect": false, "rationale": "Augustine's influence remained central; Aquinas sought to synthesize, not replace, the existing tradition."}, {"text": "The discovery of the original Greek manuscripts of the $\\textit{Republic}$ in Rome.", "isCorrect": false, "rationale": "The textual recovery of Plato occurred later during the Renaissance; the medieval shift was focused on Aristotle."}, {"text": "The decree by the Council of Florence that Aristotle was a 'Christian before Christ.'", "isCorrect": false, "rationale": "The Council of Florence was focused on church union and the Platonic revival, not a decree about Aristotle's status."}]}, {"question": "According to Thomas Aquinas, what is the defining characteristic of 'Natural Law'?", "options": [{"text": "It is the rational creature's participation in the eternal law of God.", "isCorrect": true, "rationale": "Aquinas argued that human reason allows us to discern the moral order established by God, linking human action to divine wisdom."}, {"text": "It is a set of biological instincts shared by all animals to ensure survival.", "isCorrect": false, "rationale": "For Aquinas, natural law is specifically 'rational' and pertains to the human ability to discern moral truth, not just instinct."}, {"text": "It is a social contract that humans created to prevent a state of constant war.", "isCorrect": false, "rationale": "This describes a later political theory (like Hobbes); Aquinas believed the law was rooted in God's eternal reason, not human agreement."}, {"text": "It is the set of laws found in the Bible that apply only to nature and physics.", "isCorrect": false, "rationale": "Aquinas distinguished natural law as something knowable by reason alone, even without the special revelation of the Bible."}]}, {"question": "The 15th-century revival of Plato's original dialogues was significantly advanced by the patronage of which family?", "options": [{"text": "The Medici family, specifically Cosimo de' Medici.", "isCorrect": true, "rationale": "Cosimo sponsored Marsilio Ficino to translate the complete works of Plato, which catalyzed the Renaissance Platonic revival."}, {"text": "The Borgia family, during the height of the Italian wars.", "isCorrect": false, "rationale": "The Borgias are not cited in the text as the sponsors of the Platonic Academy or the translation of the corpus."}, {"text": "The Carolingian dynasty, who sought to preserve Roman law.", "isCorrect": false, "rationale": "The Carolingians were active much earlier (8th-9th centuries) and were not part of the 15th-century Renaissance revival."}, {"text": "The Habsburgs, who brought the manuscripts from the East.", "isCorrect": false, "rationale": "While the manuscripts came from the East, it was the Florentine scholars and their patrons who were responsible for the revival described."}]}, {"question": "Which philosophical movement provided Augustine with the breakthrough needed to move past the materialist errors of Manichaeism?", "options": [{"text": "Neoplatonism", "isCorrect": true, "rationale": "Reading Plotinus and Porphyry taught Augustine to conceive of God as an immaterial, pure Being rather than a physical substance."}, {"text": "Academic Skepticism", "isCorrect": false, "rationale": "Augustine briefly experimented with skepticism, but it was a 'temptation' he had to overcome, not the source of his theological breakthrough."}, {"text": "Stoicism", "isCorrect": false, "rationale": "While the text mentions Justin Martyr studied Stoicism, it credits Neoplatonism with transforming Augustine's understanding of God."}, {"text": "Aristotelianism", "isCorrect": false, "rationale": "Augustine was primarily influenced by the Platonic tradition; Aristotle's major influence on theology came later with Aquinas."}]}, {"question": "What is the significance of Raphael's $\\textit{The School of Athens}$ in the context of the history of Christian thought?", "options": [{"text": "It symbolizes the integration of Greek philosophy into the heart of the Christian world.", "isCorrect": true, "rationale": "The fresco's location in the Vatican and its placement of Plato and Aristotle at the center represents the grand intellectual synthesis of faith and reason."}, {"text": "It commemorates the final victory of Christian theology over pagan philosophy.", "isCorrect": false, "rationale": "Rather than a victory over it, the painting celebrates philosophy as a partner to theology."}, {"text": "It was intended to serve as a warning against the dangers of secular humanism.", "isCorrect": false, "rationale": "The presence of the painting in the Pope's apartments suggests an endorsement of the harmony between ancient wisdom and faith."}, {"text": "It marks the historical moment when the Church banned the study of Plato.", "isCorrect": false, "rationale": "The painting actually coincided with the Renaissance revival of Plato, not his banning."}]}, {"question": "Marsilio Ficino's Platonic Academy of Florence was notable for its belief that:", "options": [{"text": "Platonic philosophy and Christian theology were ultimately compatible.", "isCorrect": true, "rationale": "Following Augustine, Ficino believed that Plato had used reason to glimpse truths that were later confirmed by Christian revelation."}, {"text": "The Greek gods were actually historical kings who should be worshipped.", "isCorrect": false, "rationale": "Ficino's academy was focused on reconciling ancient philosophy with the Christian God, not reviving pagan polytheism."}, {"text": "Logic was superior to faith and should replace the sacraments.", "isCorrect": false, "rationale": "Ficino and his circle were 'humanists' who sought a synthesis of ancient wisdom and Christian faith, not the replacement of religion."}, {"text": "Plato was the only true author of the Bible.", "isCorrect": false, "rationale": "They believed Plato discovered truth through reason, but they maintained the distinctness of Christian revelation."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
