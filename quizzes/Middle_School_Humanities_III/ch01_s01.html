<script>
var QUESTIONS = [{"question": "What was the primary characteristic and goal of the Elizabethan Settlement, established by Elizabeth I?", "options": [{"text": "It aimed for a complete return to Roman Catholicism, similar to the reign of Mary I.", "isCorrect": false, "rationale": "The text states that the Elizabethan Settlement made England officially Protestant, rejecting a return to Rome. Mary I was the one who tried to bring England back to Catholicism."}, {"text": "It created a broad religious compromise, making England officially Protestant while retaining some Catholic forms of worship, to ensure peace and outward conformity.", "isCorrect": true, "rationale": "The text explicitly defines the Elizabethan Settlement as 'making England officially Protestant (Church of England) while keeping many Catholic forms of worship' with the goal 'to create a church broad enough that most English people could belong to it without violence' and Elizabeth caring 'more about outward conformity than private belief.'"}, {"text": "It established a radical form of Protestantism, removing all elements of traditional worship.", "isCorrect": false, "rationale": "While Protestant, the settlement deliberately 'kept many Catholic forms of worship' and was designed to satisfy 'moderate Protestants and traditionalists alike,' indicating it was not radical."}, {"text": "It completely abolished all forms of organized religion to prevent future conflict.", "isCorrect": false, "rationale": "The settlement re-established the Church of England under royal authority, demonstrating that it did not abolish organized religion, but rather redefined it."}]}, {"question": "Beyond preventing an invasion, what was a crucial long-term impact of the defeat of the Spanish Armada in 1588?", "options": [{"text": "It led to the immediate and complete cessation of all religious tensions within England, ushering in an era of perfect harmony.", "isCorrect": false, "rationale": "While it brought peace for Elizabeth's reign, religious tensions and Catholic plots against the monarch continued to be a factor in English politics, as seen with James II later."}, {"text": "It solidified English national identity around Protestantism, English liberty, and the rising importance of sea power.", "isCorrect": true, "rationale": "The text states that the 'victory crystallized English national identity around the Protestant queen, English liberty, and sea power — an identity that would define the nation for centuries.'"}, {"text": "It forced England to abandon its Protestant leanings and align with Catholic Europe.", "isCorrect": false, "rationale": "The defeat of the Catholic Spanish Armada, which aimed to return England to Rome, actually strengthened England's Protestant identity."}, {"text": "It resulted in a lasting military alliance between England and Spain against other European powers.", "isCorrect": false, "rationale": "Philip II of Spain was enraged by Mary Queen of Scots' execution and planned to invade England; the two nations were adversaries, not allies."}]}, {"question": "How did the belief in the 'divine right of kings' primarily influence the relationship between Stuart monarchs like James I and Charles I and the English Parliament?", "options": [{"text": "It fostered a collaborative relationship, as kings felt divinely obligated to consult Parliament on all matters.", "isCorrect": false, "rationale": "The doctrine held that monarchs answer 'only to God, not to their subjects or their parliaments,' which led to conflict rather than collaboration."}, {"text": "It provided a justification for monarchs to rule with absolute authority, often disregarding or bypassing Parliament's consent.", "isCorrect": true, "rationale": "The text explicitly states that kings like James I and Charles I 'used this doctrine to justify ruling without Parliamentary consent' and that monarchs answer 'only to God, not to their subjects or their parliaments.'"}, {"text": "It led to Parliament claiming its own divine right to legislate, creating a shared divine authority.", "isCorrect": false, "rationale": "The concept of divine right was claimed by the monarch, not Parliament, and Parliament sought to limit royal power based on constitutional principles, not divine mandate."}, {"text": "It encouraged kings to frequently convene Parliament to demonstrate their piety and seek religious guidance.", "isCorrect": false, "rationale": "James I was 'clumsy in his dealings with Parliament,' and Charles I 'dismissed Parliament in 1629 and ruled without it for eleven years,' directly contradicting this idea."}]}, {"question": "Despite Charles I's immediate actions, what was the long-term significance of the Petition of Right passed by Parliament in 1628?", "options": [{"text": "It immediately forced Charles I to rule as a constitutional monarch for the remainder of his reign.", "isCorrect": false, "rationale": "The text clearly states that Charles 'signed it to get his taxes, then ignored it' and subsequently 'dismissed Parliament in 1629 and ruled without it for eleven years.'"}, {"text": "It served as a foundational constitutional document, asserting limits on royal power and influencing future demands for parliamentary authority.", "isCorrect": true, "rationale": "The text identifies the Petition as 'one of England's foundational constitutional documents, alongside Magna Carta,' listing specific abuses of royal power and demanding acknowledgement of limits on authority."}, {"text": "It established a legal precedent for monarchs to levy taxes without parliamentary consent during times of national emergency.", "isCorrect": false, "rationale": "The Petition of Right specifically demanded that the king acknowledge he could not 'levy taxes without Parliament's consent,' directly opposing this statement."}, {"text": "It directly led to the immediate abolition of the monarchy and the establishment of the Commonwealth.", "isCorrect": false, "rationale": "The monarchy was abolished much later in 1649, after the English Civil War, not immediately following the Petition of Right in 1628."}]}, {"question": "Which statement accurately describes the conclusion of the English Civil War (1642-1651)?", "options": [{"text": "The Royalist forces (Cavaliers) decisively defeated Parliament's army, leading to the consolidation of the king's absolute power.", "isCorrect": false, "rationale": "The text states that 'Parliament's New Model Army... proved decisive' and that Charles I was captured and executed, indicating a Royalist defeat."}, {"text": "Parliament's New Model Army, led by figures like Oliver Cromwell, defeated the Royalist forces and resulted in the execution of Charles I.", "isCorrect": true, "rationale": "The text explicitly states, 'Parliament's New Model Army, reorganized and disciplined under Sir Thomas Fairfax and Oliver Cromwell, proved decisive. Charles was captured, tried by a special court, and executed on January 30, 1649.'"}, {"text": "The war concluded with a negotiated settlement, establishing a power-sharing agreement between the king and Parliament.", "isCorrect": false, "rationale": "The war ended with the execution of the king, not a power-sharing agreement, indicating a decisive victory for Parliament."}, {"text": "Oliver Cromwell immediately declared himself king, thereby ending the conflict and establishing a new dynasty.", "isCorrect": false, "rationale": "Cromwell became Lord Protector, ruling a Commonwealth, but 'refused the crown itself.'"}]}, {"question": "Oliver Cromwell's rule as Lord Protector during the Protectorate (1653-1659) is best characterized as:", "options": [{"text": "A fully democratic republic with a strong and consistently empowered Parliament.", "isCorrect": false, "rationale": "Cromwell was an 'increasingly authoritarian ruler who dissolved Parliament when it displeased him,' which is antithetical to a fully democratic and consistently empowered Parliament."}, {"text": "An authoritarian military rule, driven by Puritan beliefs, despite his refusal to accept the title of king.", "isCorrect": true, "rationale": "The text describes Cromwell as a 'genuine Puritan' and an 'increasingly authoritarian ruler who dissolved Parliament when it displeased him,' while also noting he 'refused the crown itself.'"}, {"text": "A period of peaceful transition back to a constitutional monarchy under his guidance.", "isCorrect": false, "rationale": "Cromwell ruled as Lord Protector in a state 'without a king' (Commonwealth), and it was not a monarchy. The monarchy was restored after his death."}, {"text": "A brief restoration of absolute royal power, as he eventually accepted the title of king.", "isCorrect": false, "rationale": "Cromwell 'refused the crown itself' and his rule was not a restoration of monarchy, but a republican period."}]}, {"question": "What pivotal event directly led to leading Protestants in Parliament inviting William of Orange to invade England, initiating the Glorious Revolution?", "options": [{"text": "The execution of Mary Queen of Scots by Elizabeth I.", "isCorrect": false, "rationale": "Mary Queen of Scots' execution occurred in 1587 under Elizabeth I, long before James II's reign and the Glorious Revolution (1688)."}, {"text": "James II's declaration that he was converting England back to radical Protestantism.", "isCorrect": false, "rationale": "James II was Catholic and was seen as 'steering England back toward Rome,' not radical Protestantism."}, {"text": "The birth of James II's son, guaranteeing a Catholic succession to the English throne.", "isCorrect": true, "rationale": "The text explicitly states: 'When his second wife gave birth to a son in June 1688 — guaranteeing a Catholic succession — leading Protestants in Parliament sent a secret invitation to William of Orange.'"}, {"text": "Charles II's secret conversion to Catholicism on his deathbed.", "isCorrect": false, "rationale": "While Charles II had Catholic sympathies, the crucial event involved James II and his son, not Charles II."}]}, {"question": "How did the Glorious Revolution fundamentally and permanently alter the balance of power within the English government?", "options": [{"text": "It fully restored the principle of the Divine Right of Kings, allowing monarchs to rule without any parliamentary interference.", "isCorrect": false, "rationale": "The Glorious Revolution and the Bill of Rights definitively ended the era of monarchs claiming divine right to rule without Parliament, establishing Parliament's supremacy instead."}, {"text": "It established the principle of parliamentary supremacy, declaring Parliament as the supreme law-making authority in England and limiting the monarch's power.", "isCorrect": true, "rationale": "The text states the Glorious Revolution 'permanently established that Parliament, not the monarch, was supreme in English government' and that 'parliamentary supremacy — that Parliament is the highest authority in the land — has governed England ever since.'"}, {"text": "It created a system where the monarch shared power equally with a council of religious leaders, separate from Parliament.", "isCorrect": false, "rationale": "The shift in power was towards Parliament, not a council of religious leaders, and parliamentary supremacy meant Parliament was the highest authority, not merely an equal sharer."}, {"text": "It led to the complete abolition of the monarchy and the establishment of a lasting republic.", "isCorrect": false, "rationale": "The monarchy was not abolished; instead, William and Mary were offered the crown jointly, with conditions, establishing a limited monarchy under parliamentary control."}]}, {"question": "Compared to the Stuart kings James I and Charles I, how did Queen Elizabeth I's approach to religious policy and governance contribute to greater stability during her reign?", "options": [{"text": "By aggressively persecuting all religious dissenters, thereby eliminating any potential for conflict.", "isCorrect": false, "rationale": "Elizabeth 'famously refused to “open windows into men's souls”' and sought outward conformity, which contrasted with the brutal persecutions under Mary I. Her goal was to avoid violence, not instigate it."}, {"text": "By establishing a broad religious compromise (the Elizabethan Settlement) and prioritizing outward conformity over strict private belief.", "isCorrect": true, "rationale": "The text highlights Elizabeth's 'brilliant and deliberate' solution to create 'a church broad enough that most English people could belong to it without violence' and her focus on 'outward conformity than private belief,' which brought peace."}, {"text": "By consistently asserting the Divine Right of Kings to override parliamentary opposition and enforce her religious views.", "isCorrect": false, "rationale": "The concept of the Divine Right of Kings was strongly associated with the Stuart monarchs James I and Charles I, leading to conflict with Parliament, not peace under Elizabeth."}, {"text": "By completely separating the Church and state, removing religion from political discourse entirely.", "isCorrect": false, "rationale": "Elizabeth re-established the Church of England under royal authority, demonstrating a strong connection between church and state, rather than a separation."}]}, {"question": "The Glorious Revolution and the subsequent English Bill of Rights had a profound influence on later political thought and movements, most notably by:", "options": [{"text": "Proving that a truly constitutional government was unachievable and leading to a return to absolute monarchies across Europe.", "isCorrect": false, "rationale": "The Glorious Revolution was a success in establishing constitutional limits on the monarchy and parliamentary supremacy, serving as a model for future constitutional governance."}, {"text": "Inspiring John Locke's theories on government by consent and serving as a direct influence on the American founding documents.", "isCorrect": true, "rationale": "The 'teachernote' explicitly states that 'John Locke published his Two Treatises of Government in 1689, arguing that government exists by the consent of the governed... He was responding directly to the Glorious Revolution — and the American founders would later read him carefully. The English Bill of Rights also directly influenced the American Bill of Rights.'"}, {"text": "Advocating for the widespread adoption of the Divine Right of Kings as the ideal form of governance.", "isCorrect": false, "rationale": "The Glorious Revolution fundamentally rejected the Divine Right of Kings in favor of parliamentary supremacy and government by consent."}, {"text": "Leading to a renewed commitment across Europe to a unified Catholic Church and suppression of Protestantism.", "isCorrect": false, "rationale": "The Glorious Revolution was a triumph for Protestantism in England, not a return to a unified Catholic Church across Europe."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
