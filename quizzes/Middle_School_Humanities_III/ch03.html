<script>
var QUESTIONS = [{"question": "Why is the Defenestration of Prague (1618) considered the trigger for the Thirty Years' War?", "options": [{"text": "It was the assassination of the Holy Roman Emperor, removing the only authority holding the empire together.", "isCorrect": false, "rationale": "No emperor was assassinated; Protestant Bohemian nobles threw three Catholic royal officials from a window, signaling rebellion against Habsburg authority."}, {"text": "Protestant Bohemian nobles threw three Catholic royal officials from a window, triggering a Bohemian revolt against the Catholic Emperor that escalated into a continent-wide war.", "isCorrect": true, "rationale": "The text identifies this act as the beginning of the war, explaining that the officials survived but the act was explosive because it touched off the Protestant-Habsburg conflict."}, {"text": "It was the moment when France formally declared war on the Holy Roman Empire, bringing all other European powers into the conflict.", "isCorrect": false, "rationale": "France did not declare war until 1635 (the French Phase); the war began in Bohemia in 1618."}, {"text": "Protestant leaders threw Catholic prayer books from a window during a religious council, symbolically rejecting papal authority.", "isCorrect": false, "rationale": "The text describes royal officials being thrown from a castle window, not prayer books at a religious council."}]}, {"question": "How does the text describe the Holy Roman Empire at the outbreak of the Thirty Years' War?", "options": [{"text": "A powerful, centralized state that had maintained religious peace through strict imperial authority over Catholic and Protestant alike.", "isCorrect": false, "rationale": "The Empire was described as deeply divided and neither powerful nor truly unified; its peace was 'uneasy' and breaking down."}, {"text": "A patchwork of kingdoms, duchies, bishoprics, and free cities covering central Europe - deeply divided between Catholics and Protestants, with an uneasy truce breaking down.", "isCorrect": true, "rationale": "The text uses Voltaire's joke ('neither holy, nor Roman, nor much of an empire') and describes it as dangerously divided with a failing religious truce."}, {"text": "A loosely allied group of Protestant nations that had banded together under Swedish leadership to resist Catholic Habsburg expansion.", "isCorrect": false, "rationale": "The Empire included both Catholics and Protestants; Sweden was not part of the Empire, it was an outside intervening power."}, {"text": "A unified Catholic state that had successfully suppressed Protestantism within its borders before the war began.", "isCorrect": false, "rationale": "The Empire had many Protestant territories; the war began precisely because Protestantism had not been suppressed."}]}, {"question": "Why is the Thirty Years' War described as both 'the last of the religious wars' and 'the first of the modern wars'?", "options": [{"text": "It was the last war fought on European soil and the first to be fought globally across European colonies.", "isCorrect": false, "rationale": "The war was fought primarily in Germany; the distinction is not geographic but ideological."}, {"text": "It began as a conflict over religion but ended as a struggle for political power, with Catholic France even fighting Catholic Austria for reasons of state interest.", "isCorrect": true, "rationale": "The text makes this point explicitly: the French Phase showed Catholic France funding Protestant armies against Catholic Habsburgs, demonstrating that raison d'etat had replaced religion as the driving force."}, {"text": "It was the last war fought with medieval weapons and the first to use gunpowder artillery as the primary weapon.", "isCorrect": false, "rationale": "The distinction is ideological (religion vs. power politics), not technological."}, {"text": "It was fought for religious reasons in Europe but for commercial reasons in the colonies, making it simultaneously the last religious and first commercial war.", "isCorrect": false, "rationale": "The text's distinction is that it began as religious and ended as power-political within Europe itself."}]}, {"question": "What was Cardinal Richelieu's role in the Thirty Years' War, and why did it shock contemporaries?", "options": [{"text": "A Catholic cardinal who secretly converted to Protestantism and openly led Protestant armies against Catholic forces.", "isCorrect": false, "rationale": "Richelieu did not convert; he remained Catholic while supporting Protestants for strategic reasons."}, {"text": "A Catholic cardinal who funded and eventually openly supported Protestant armies against the Catholic Habsburgs, not for religion but for raison d'etat - France's political interest in weakening a rival.", "isCorrect": true, "rationale": "The text identifies this as 'the most cynical actor' entering the war openly: a Catholic cardinal funding Protestant armies to weaken a Catholic emperor."}, {"text": "A French Protestant general who organized Protestant resistance against the Catholic League with secret Spanish backing.", "isCorrect": false, "rationale": "Richelieu was Catholic and French, not a Protestant general, and he was fighting against Spain, not with Spanish backing."}, {"text": "A papal legate who attempted to negotiate peace but was expelled from the negotiations for favoring Protestant terms.", "isCorrect": false, "rationale": "Richelieu was France's chief minister who actively promoted French state interests; he was not a papal negotiator."}]}, {"question": "What was the concept of raison d'etat, and how did the Thirty Years' War demonstrate it?", "options": [{"text": "The principle that states must always act according to their religious identity, which the war showed was impossible to maintain.", "isCorrect": false, "rationale": "Raison d'etat means the opposite: national interest may override religious identity, as France's actions demonstrated."}, {"text": "The idea that governments may take actions serving national political interests even if morally questionable; demonstrated when Catholic France funded Protestant armies against Catholic Habsburgs.", "isCorrect": true, "rationale": "The text defines raison d'etat and shows France practicing it: Catholic Richelieu funded Protestants to weaken rivals, regardless of religious consistency."}, {"text": "The legal doctrine that a sovereign state has the right to annex smaller neighboring territories for self-defense purposes.", "isCorrect": false, "rationale": "Raison d'etat is about the justification for state actions based on national interest, not specifically about annexation."}, {"text": "A German political theory arguing that the Holy Roman Emperor had absolute authority over all states within the empire.", "isCorrect": false, "rationale": "Raison d'etat was associated with Machiavelli and Richelieu; it argues for state autonomy against imperial authority, not for imperial supremacy."}]}, {"question": "What was the human cost of the Thirty Years' War for Germany?", "options": [{"text": "Germany lost approximately 5% of its population, primarily soldiers; civilian areas were largely unaffected.", "isCorrect": false, "rationale": "Germany lost between a quarter and a third of its entire population, mostly to starvation and disease, not primarily to battle."}, {"text": "Germany lost between a quarter and a third of its entire population - mostly not to battle but to starvation and disease caused by marauding armies. Some regions lost more than half their people.", "isCorrect": true, "rationale": "The text states this explicitly and adds that it took Germany a century to recover."}, {"text": "Germany's population was largely unaffected because most battles were fought in Belgium and France.", "isCorrect": false, "rationale": "Germany was the primary battlefield for thirty years; the text emphasizes it bore the most devastating losses."}, {"text": "Roughly 100,000 soldiers died in battle, but civilian deaths were minimal because both sides agreed to protect towns.", "isCorrect": false, "rationale": "The text describes millions of deaths, including the Sack of Magdeburg where 20,000 civilians were killed and the city burned."}]}, {"question": "What were the three foundational principles established by the Peace of Westphalia (1648)?", "options": [{"text": "Free trade, freedom of religion, and the right of all peoples to self-government.", "isCorrect": false, "rationale": "These are Enlightenment and later concepts; Westphalia established state sovereignty, legal equality of states, and non-interference."}, {"text": "State sovereignty (each ruler has supreme authority in his territory), equality of sovereign states in international law, and non-interference in other states' internal affairs.", "isCorrect": true, "rationale": "The text lists these three principles explicitly and states they remain the foundation of international relations today."}, {"text": "Disarmament, mandatory arbitration of all disputes, and the right of peoples to choose their religion by popular vote.", "isCorrect": false, "rationale": "These are not among the Westphalian principles; they resemble later 20th-century concepts."}, {"text": "Papal authority over all religious disputes, imperial authority over secular disputes, and national autonomy in taxation.", "isCorrect": false, "rationale": "Westphalia specifically reduced the authority of both the pope and the emperor; it did not affirm papal authority."}]}, {"question": "What does 'sovereignty' mean as established by the Peace of Westphalia?", "options": [{"text": "The right of a people to vote for their own government in free and fair elections.", "isCorrect": false, "rationale": "Sovereignty concerns territorial authority, not democratic elections; the Westphalian concept concerned rulers, not popular voting."}, {"text": "The supreme authority of a government over its own territory and people, free from outside control; no pope or emperor can override internal governance.", "isCorrect": true, "rationale": "The text defines sovereignty precisely this way: internal supremacy without external override by pope or emperor."}, {"text": "The right of the Holy Roman Emperor to veto military actions by member states of the empire.", "isCorrect": false, "rationale": "Sovereignty limits imperial authority rather than affirming it; the emperor's ability to override princes was what Westphalia eliminated."}, {"text": "The principle that a nation's laws only apply within its borders and cannot be enforced internationally.", "isCorrect": false, "rationale": "While related, this describes a consequence of sovereignty rather than its definition; Westphalia's sovereignty concerned the right to govern without external interference."}]}, {"question": "Who was Hugo Grotius, and what was his major contribution to political thought?", "options": [{"text": "A Dutch military commander who defeated the Spanish Armada and established the principle of freedom of the seas.", "isCorrect": false, "rationale": "Grotius was a legal scholar, not a military commander; the Armada was defeated by England."}, {"text": "A Dutch legal scholar who argued in The Rights of War and Peace (1625) that nations, like individuals, are subject to a natural law they cannot repeal - the founding argument for international law.", "isCorrect": true, "rationale": "The text describes Grotius exactly this way: the 'father of international law' who drew on Roman law, Aquinas, and Scripture to argue for binding natural law among nations."}, {"text": "A German theologian who argued that religious wars were the only legitimate form of warfare, setting rules for the conduct of crusades.", "isCorrect": false, "rationale": "Grotius argued that natural law governs all nations, Christian and non-Christian; he did not argue for religious war."}, {"text": "A French diplomat who negotiated the Peace of Westphalia and invented the modern concept of the neutral mediator in international disputes.", "isCorrect": false, "rationale": "Grotius was Dutch, died in 1645, and wrote the theoretical foundations of international law rather than negotiating Westphalia."}]}, {"question": "What was Louis XIV's approach to governing France, and how did he use Versailles?", "options": [{"text": "Louis XIV governed through a constitutional system that shared power with Parliament and an elected council of nobles.", "isCorrect": false, "rationale": "France had no Parliament in the English sense; Louis XIV embodied absolute monarchy with no institutional checks on his power."}, {"text": "Louis XIV embodied absolute monarchy, concentrating all power in himself and bringing nobles to the spectacular palace of Versailles where they could be watched and controlled.", "isCorrect": true, "rationale": "The text describes this strategy precisely: weakening the nobility by bringing them to Versailles and governing through loyal ministers."}, {"text": "Louis XIV governed primarily through the Catholic Church, delegating civil administration to bishops who reported directly to the Pope.", "isCorrect": false, "rationale": "Louis XIV controlled the Church as he controlled everything else; he did not govern through papal authority."}, {"text": "Louis XIV ruled as a constitutional monarch who allowed the Estates-General to meet regularly and advise him on legislation.", "isCorrect": false, "rationale": "Louis XIV did not convene the Estates-General; absolute monarchy meant governing without representative institutions."}]}, {"question": "What were the consequences of Louis XIV's revocation of the Edict of Nantes (1685)?", "options": [{"text": "It successfully unified France religiously and created internal peace that lasted for a century.", "isCorrect": false, "rationale": "The revocation caused a catastrophic emigration of 200,000-400,000 skilled Huguenots who strengthened France's rivals."}, {"text": "Some 200,000 to 400,000 Huguenots fled France, taking their skills to England, the Dutch Republic, Prussia, and South Africa, strengthening France's rivals while weakening France.", "isCorrect": true, "rationale": "The text describes this as a catastrophic miscalculation driven by religious intolerance; the Huguenot diaspora benefited every rival power."}, {"text": "The revocation triggered a second Huguenot revolt that required twenty years of civil war to suppress.", "isCorrect": false, "rationale": "The text describes mass emigration, not another civil war; most Huguenots fled rather than fighting."}, {"text": "It alienated Spain but earned the support of the Pope, who rewarded France with expanded territories in Italy.", "isCorrect": false, "rationale": "No such papal reward is described; the consequences were economic and strategic, not territorial gain."}]}, {"question": "What does absolute monarchy mean, and how does it contrast with England's constitutional monarchy?", "options": [{"text": "Absolute monarchy means the monarch owns all land in the kingdom; constitutional monarchy means land is privately owned.", "isCorrect": false, "rationale": "Absolute monarchy concerns political authority, not land ownership."}, {"text": "Absolute monarchy means the monarch holds supreme, unrestricted power not bound by constitution or Parliament; constitutional monarchy (England after 1689) means Parliament limits royal power through law.", "isCorrect": true, "rationale": "The text defines both: Louis XIV as the classic absolute monarch, and England after the Glorious Revolution as the constitutional model where Parliament checks the crown."}, {"text": "Absolute monarchy means the monarch serves for life; constitutional monarchy means the monarch is elected by Parliament.", "isCorrect": false, "rationale": "Both types of monarchy were hereditary; the distinction is about constitutional constraints on power, not term length."}, {"text": "Absolute monarchy applies to secular matters while the Church controls religious affairs; constitutional monarchy applies to both.", "isCorrect": false, "rationale": "Louis XIV controlled the French Church as well as secular affairs; absolute monarchy was not limited to secular matters."}]}, {"question": "How did the Thirty Years' War change the nature of European politics according to the text?", "options": [{"text": "It replaced all European monarchies with republican governments similar to the one established in England during the Interregnum.", "isCorrect": false, "rationale": "Monarchies continued; the change was in the basis for political action, not the form of government."}, {"text": "Before 1648 wars were often fought to impose a universal religious or political order; after 1648 wars were fought between sovereign states pursuing national interests.", "isCorrect": true, "rationale": "The text states this as a 'crucial shift': the end of the era when religion alone could explain European politics."}, {"text": "It eliminated warfare in Europe for two generations, as exhausted nations found the cost too great to risk another major conflict.", "isCorrect": false, "rationale": "Wars continued; the change was in their motivating logic, not their frequency."}, {"text": "It transferred political authority from secular monarchs to the Catholic Church, which had remained neutral throughout the war.", "isCorrect": false, "rationale": "The opposite: the war reduced both papal and imperial authority; sovereignty transferred to individual states."}]}, {"question": "What was the Sack of Magdeburg (1631), and why does Schiller's account of it matter?", "options": [{"text": "A Protestant victory over Catholic forces that turned the tide of the war; Schiller celebrated it as a triumph of religious liberty.", "isCorrect": false, "rationale": "Magdeburg was a Protestant city sacked by Imperial troops; it was an atrocity, not a Protestant victory."}, {"text": "The worst atrocity of the war, in which approximately 20,000 civilians were killed and the city burned; Schiller's account preserves the moral weight of the war's human cost without propaganda.", "isCorrect": true, "rationale": "The text identifies Magdeburg as the worst single atrocity and notes Schiller wrote moral history, not propaganda - even including Tilly's tears."}, {"text": "A mythical battle that Schiller invented to dramatize the war's religious causes for a German nationalist audience.", "isCorrect": false, "rationale": "Magdeburg was a real historical atrocity; Schiller based his account on archival sources."}, {"text": "A minor skirmish that Schiller exaggerated to make the war seem more destructive than it actually was.", "isCorrect": false, "rationale": "The text says historians call it the worst atrocity of the war; Schiller's account reflects the historical record."}]}, {"question": "What is international law, and why does the text connect it to the Christian natural law tradition rather than treating it as a secular invention?", "options": [{"text": "International law was invented by secular Enlightenment thinkers who deliberately broke from Christian natural law to create a universal system.", "isCorrect": false, "rationale": "The text argues the opposite: Grotius drew on Roman law, Aquinas, and Scripture; international law has deep roots in Christian natural law thinking."}, {"text": "Grotius drew on Roman law, Aquinas's natural law tradition, and Scripture to argue that a rational moral order binds all humanity; international law grew from this Christian intellectual tradition.", "isCorrect": true, "rationale": "The text explicitly makes this point: international law is not a secular invention but grows from Thomistic natural law extended into international relations."}, {"text": "International law was first developed by Islamic jurists in the medieval period and later adapted by Christian scholars in the 17th century.", "isCorrect": false, "rationale": "The text traces international law to Grotius and the Christian natural law tradition, not to Islamic jurisprudence."}, {"text": "International law emerged purely as a practical necessity when European states needed to coordinate trade routes and had no theoretical or philosophical foundation.", "isCorrect": false, "rationale": "Grotius provided the philosophical foundation explicitly drawing on natural law theory; it was not merely pragmatic."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
