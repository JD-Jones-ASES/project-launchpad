    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Middle_School_Humanities_III.html">&larr; Back to History &amp; Humanities III</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">History &amp; Humanities III &mdash; Chapter 6, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What was the most significant characteristic of the \"world turned upside down\" between 1800 and 1900, as described in the text?", "options": [{"text": "A rapid increase in agricultural output due to new farming techniques.", "isCorrect": false, "rationale": "While agricultural techniques did evolve, the text primarily emphasizes the dramatic shift from an agrarian society to an industrial one, not just an increase in agricultural output."}, {"text": "An unprecedented transformation of daily life driven by industrialization and urbanization.", "isCorrect": true, "rationale": "The text explicitly states: 'No transformation in human history...remade daily life so quickly and so completely' due to steam engines, factories, railroads, telegraphs, and massive urban growth, all hallmarks of the Industrial Revolution."}, {"text": "The collapse of ancient empires and the rise of new nation-states.", "isCorrect": false, "rationale": "While political changes occurred during this period, the section's focus for 'daily life' transformation is on economic and social changes brought by industrialization, not primarily geopolitical shifts."}, {"text": "A widespread return to pre-modern, hand-production methods in rural areas.", "isCorrect": false, "rationale": "This is the opposite of what occurred. The period saw a massive shift *away* from hand-production and towards machine manufacturing and factory labor."}]}, {"question": "Britain's early lead in the Industrial Revolution was supported by several factors. Which of the following best exemplifies a *political-economic* factor that fostered its industrial growth?", "options": [{"text": "Abundant deposits of coal and iron.", "isCorrect": false, "rationale": "Coal and iron are natural resources, which are geographic factors, not political-economic systems."}, {"text": "A stable legal system that protected private property and a Parliament that favored commerce.", "isCorrect": true, "rationale": "The text directly states Britain had 'a stable legal system that protected private property, a Parliament that favored commerce,' which are crucial political-economic conditions for industrial investment and growth."}, {"text": "Extensive river systems for power and transport.", "isCorrect": false, "rationale": "River systems are geographic features, providing resources and infrastructure, but not directly a political-economic system or policy."}, {"text": "A large rural population available for factory labor.", "isCorrect": false, "rationale": "While a labor force was essential, this is a demographic factor, a result of societal conditions, rather than a political-economic mechanism that directly fostered the *start* of industrialization."}]}, {"question": "The text describes a 'new kind of poverty' emerging in industrial cities. What distinguished this new poverty from the 'familiar poverty of bad harvests and hard winters'?", "options": [{"text": "It primarily affected rural farming communities.", "isCorrect": false, "rationale": "The text explicitly refers to 'mill towns of northern England' like Manchester, Leeds, and Birmingham, indicating it was an urban phenomenon."}, {"text": "It was a temporary condition, easily remedied by government aid.", "isCorrect": false, "rationale": "The text describes it as 'systematic, year-round,' implying it was deeply entrenched and not easily or temporarily fixed."}, {"text": "It was systematic, year-round, and intrinsically linked to the rhythms of machine manufacturing.", "isCorrect": true, "rationale": "The text states, 'It was not the familiar poverty of bad harvests and hard winters. It was systematic, year-round, and bound to the rhythms of the machine.'"}, {"text": "It was caused by a decline in international trade and global economic downturns.", "isCorrect": false, "rationale": "The text focuses on the internal conditions of factory work and urban slums as the cause, not external global trade issues."}]}, {"question": "Charles Dickens's novels, such as *Oliver Twist* and *Hard Times*, played a significant role in how the public understood the Industrial Revolution. According to the text, what was the primary nature of his contribution?", "options": [{"text": "He provided detailed economic analyses of capitalist markets.", "isCorrect": false, "rationale": "Dickens was a novelist, not an economist. His works depicted human stories and conditions, not economic theory."}, {"text": "He served as a political agitator, leading workers' strikes and protests.", "isCorrect": false, "rationale": "While his work could inspire, the text does not describe him as a direct leader of political movements but as a documentarian."}, {"text": "He offered fictional narratives that functioned as a form of social journalism, exposing the human cost of industrialization.", "isCorrect": true, "rationale": "The text states, 'Dickens was not writing fantasy; he was writing journalism in the form of fiction,' highlighting his role in documenting the social realities."}, {"text": "He proposed specific legislative reforms to Parliament.", "isCorrect": false, "rationale": "His influence was primarily through public awareness and empathy generated by his stories, rather than direct policy recommendations."}]}, {"question": "The 'social question' dominated European political thought from the 1840s. What was the central dilemma it sought to address?", "options": [{"text": "How to manage colonial expansion and imperial rivalries.", "isCorrect": false, "rationale": "While important at the time, the social question specifically dealt with internal issues of poverty and labor, not external colonial policy."}, {"text": "The appropriate balance between national sovereignty and international cooperation.", "isCorrect": false, "rationale": "This pertains to international relations and political philosophy, not the core economic and social issues of the industrial working class."}, {"text": "What obligations a just society has to its industrial workers and whether the state should intervene in poverty.", "isCorrect": true, "rationale": "The text defines the social question as: 'What does a just society owe to the workers who produce its wealth? Can the market solve the problem of poverty on its own? Does the state have an obligation to intervene?'"}, {"text": "The need to preserve traditional agricultural lifestyles against encroaching urbanization.", "isCorrect": false, "rationale": "The social question acknowledges the reality of industrialization and urbanization, focusing on the conditions *within* that new society, rather than a resistance to it."}]}, {"question": "According to Karl Marx's historical analysis, what is the fundamental engine that drives all human history?", "options": [{"text": "The development of new religious ideologies.", "isCorrect": false, "rationale": "Marx's analysis is fundamentally materialist and economic, not centered on religious development."}, {"text": "The competition between nation-states for resources.", "isCorrect": false, "rationale": "While Marx recognized international relations, his core theory of historical change is focused on internal class dynamics within societies."}, {"text": "The ongoing conflict between economic classes, or class struggle.", "isCorrect": true, "rationale": "The text explicitly states Marx's argument: 'all of human history, he argued, is the story of class struggle — the conflict between those who own the means of production and those who must sell their labor to survive.'"}, {"text": "The continuous progress of scientific and technological innovation.", "isCorrect": false, "rationale": "Technology is a factor in Marx's view, enabling changes in the means of production, but it's the resulting *class struggle* over these means that he saw as the ultimate driver of history."}]}, {"question": "In Marxist analysis, the **bourgeoisie** and the **proletariat** are the two primary classes in industrial society. What is the fundamental difference between them as defined in the text?", "options": [{"text": "The bourgeoisie are the landowners who employ serfs, while the proletariat are the feudal lords.", "isCorrect": false, "rationale": "This describes the classes of medieval Europe, not the industrial society as analyzed by Marx."}, {"text": "The bourgeoisie are the merchants who sell goods, while the proletariat are their customers.", "isCorrect": false, "rationale": "This defines roles in a market but doesn't capture Marx's distinction based on ownership of the means of production."}, {"text": "The bourgeoisie own the means of production (factories, capital), while the proletariat own only their labor and must sell it to survive.", "isCorrect": true, "rationale": "The definitions clearly state: the bourgeoisie 'own the means of production: factories, land, and capital,' and the proletariat are 'those who own no property and must sell their labor to the bourgeoisie to survive.'"}, {"text": "The bourgeoisie are the intellectuals and artists, while the proletariat are the uneducated masses.", "isCorrect": false, "rationale": "Marxist class definitions are based on economic relationships to production, not on intellectual or educational status."}]}, {"question": "The Revolutions of 1848, despite initial hopes, largely failed to achieve their radical goals. What crucial lesson did European radicals learn from this widespread failure?", "options": [{"text": "That violent revolution was inherently ineffective and should be abandoned.", "isCorrect": false, "rationale": "The text implies a need for *more effective* revolutionary methods, not an abandonment of the idea of revolution altogether. Marx still believed in violent overthrow."}, {"text": "That spontaneous popular uprisings were insufficient and required organized, disciplined movements.", "isCorrect": true, "rationale": "The text states: 'The failure of the 1848 revolutions taught European radicals that spontaneous popular uprisings were not enough. Organized, disciplined revolutionary movements — with explicit programs and committed leadership — were needed.'"}, {"text": "That constitutional monarchies were the only viable form of government for industrial societies.", "isCorrect": false, "rationale": "This was a goal for some middle-class liberals, but not the lesson learned by *radicals* who still aimed for more fundamental societal transformation."}, {"text": "That international alliances were necessary to overthrow conservative governments.", "isCorrect": false, "rationale": "The lesson focused on internal organizational structure and leadership within revolutionary movements, not primarily on international alliances."}]}, {"question": "Pope Leo XIII's encyclical *Rerum Novarum* presented a 'third way' in response to the 'social question.' Which two prevailing ideologies did it specifically reject?", "options": [{"text": "Absolute monarchy and radical democracy.", "isCorrect": false, "rationale": "While forms of government are relevant, the encyclical primarily addressed economic and social systems, not political structures like absolute monarchy or radical democracy."}, {"text": "Laissez-faire capitalism and socialism.", "isCorrect": true, "rationale": "The text explicitly states that *Rerum Novarum* 'firmly rejected both laissez-faire capitalism and socialism,' proposing a 'moral framework rooted in human dignity and natural law' as an alternative."}, {"text": "Feudalism and mercantilism.", "isCorrect": false, "rationale": "These are older economic systems largely predating the Industrial Revolution's peak and the 'social question' it generated."}, {"text": "Colonialism and nationalism.", "isCorrect": false, "rationale": "These are political and imperial ideologies, distinct from the economic and social systems of capitalism and socialism addressed by the encyclical."}]}, {"question": "*Rerum Novarum* argues against unrestrained capitalism by stating that 'workers are not commodities; they are human beings made in the image of God (imago Dei).' How does the concept of *imago Dei* primarily strengthen the argument for workers' rights?", "options": [{"text": "It suggests that divine law mandates a specific wage rate for all laborers.", "isCorrect": false, "rationale": "While it argues for a 'living wage,' *imago Dei* provides the *basis* for dignity, not a specific mandated wage amount."}, {"text": "It implies that private property is a sacred right, justifying capitalist accumulation.", "isCorrect": false, "rationale": "While *Rerum Novarum* defends private property, *imago Dei* is used to argue *against* the exploitation enabled by *unrestrained* capitalism, which would treat human beings as mere property or commodities."}, {"text": "It asserts that every human being possesses inherent dignity, making their exploitation morally unacceptable.", "isCorrect": true, "rationale": "The text clearly states *imago Dei* means 'every human being...possesses inherent dignity that cannot be taken away by any economic or political system,' thereby grounding the argument that treating workers as mere commodities is morally wrong."}, {"text": "It establishes a hierarchy of labor, where some jobs are inherently more valuable than others.", "isCorrect": false, "rationale": "The concept of *imago Dei* emphasizes the universal, equal dignity of all human beings, regardless of their labor or social status, thus opposing any hierarchy that would justify exploitation."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
