        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Middle_School_Humanities_III.html">&larr; Back to History &amp; Humanities III</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">History &amp; Humanities III &mdash; Chapter 1, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What was Francis Bacon's primary critique of the traditional Aristotelian approach to knowledge?", "options": [{"text": "It prioritized observation over rational deduction.", "isCorrect": false, "rationale": "This statement describes the inductive method Bacon advocated, not his critique of Aristotle. Aristotle's method was based on reasoning from first principles, with little emphasis on observation."}, {"text": "It began with accepted truths and failed to check conclusions against reality.", "isCorrect": true, "rationale": "Bacon argued that the Aristotelian approach (deduction) started with accepted truths, and if the starting principle was wrong, all subsequent conclusions would be wrong without ever being checked against reality. This is the core of his critique."}, {"text": "It relied too heavily on experiments without theoretical frameworks.", "isCorrect": false, "rationale": "The Aristotelian approach involved very few experiments. Bacon's method, the inductive method, introduced systematic experimentation and observation as foundational."}, {"text": "It was overly focused on practical applications rather than pure philosophy.", "isCorrect": false, "rationale": "Aristotle's method was more theoretical and based on reasoning from 'first principles.' Bacon's inductive method, by contrast, had a strong practical argument, as highlighted by 'Nature to be commanded must be obeyed.'"}]}, {"question": "A scientist observes that all objects, regardless of their weight, fall to the ground at the same rate in a vacuum. Based on these specific observations, they formulate a general principle about gravity. Which aspect of Francis Bacon's philosophy does this exemplify?", "options": [{"text": "The use of 'idols' to distort observation.", "isCorrect": false, "rationale": "Bacon described 'idols' as mental habits and prejudices that distorted observation; this scenario describes a systematic observation leading to a conclusion, which combats idols."}, {"text": "The deductive method of reasoning from general principles.", "isCorrect": false, "rationale": "The deductive method starts with a general principle and applies it to particular conclusions. This scenario describes moving from particular observations to a general principle, which is the opposite."}, {"text": "The inductive method of drawing general conclusions from particular observations.", "isCorrect": true, "rationale": "The inductive method, developed by Bacon, involves gathering evidence from the natural world, looking for patterns, and drawing conclusions only from what has been actually observed and tested, moving 'from particular observations to general conclusions.'"}, {"text": "The principle of 'Nature to be commanded must be obeyed.'", "isCorrect": false, "rationale": "While the inductive method helps achieve the understanding implied by 'Nature to be commanded must be obeyed,' this specific phrase refers to the practical application and utility of understanding nature, not the method of generalization itself."}]}, {"question": "Francis Bacon's statement, 'Nature to be commanded must be obeyed,' implies which of the following about scientific inquiry?", "options": [{"text": "Scientists should assert their will over natural processes through advanced technology.", "isCorrect": false, "rationale": "This interpretation misunderstands 'commanded.' The text clarifies that 'command' here means to use nature to one's advantage, which requires first 'obeying' or understanding its rules, not dominating it arbitrarily."}, {"text": "Understanding nature's actual workings and laws is a necessary prerequisite for humans to effectively utilize or manipulate it.", "isCorrect": true, "rationale": "The note explains: 'if you want to use nature to your advantage — to build machines, to cure diseases — you must first understand how nature actually works. You cannot command what you do not understand.' This highlights the practical necessity of understanding natural laws."}, {"text": "Human reason alone is sufficient to dictate the behavior of natural phenomena.", "isCorrect": false, "rationale": "This contradicts Bacon's emphasis on observation and experiment; he argued that the 'mind left to itself was full of... 'idols'' and needed systematic methods to avoid distortion."}, {"text": "Ancient authorities hold the ultimate command over interpreting natural laws, which scientists must obey.", "isCorrect": false, "rationale": "This directly opposes Bacon's entire philosophy, which sought to challenge and replace reliance on ancient authorities with direct observation and experiment."}]}, {"question": "The Royal Society's motto, 'Nullius in verba' ('Take nobody's word for it'), directly challenged which established aspect of medieval knowledge acquisition?", "options": [{"text": "The practice of publishing scientific journals.", "isCorrect": false, "rationale": "The Royal Society *initiated* the publication of scientific journals (Philosophical Transactions) to encourage transparency and verification, which aligns with their motto, rather than challenging it."}, {"text": "The authority derived from ancient philosophers like Aristotle.", "isCorrect": true, "rationale": "The text states the motto 'meant: do not accept a claim because an ancient authority made it... Demand evidence. Show your work.' This directly challenges the medieval reliance on figures like Aristotle."}, {"text": "The need for scientists to collaborate and share findings.", "isCorrect": false, "rationale": "The motto and the Royal Society's actions (like publishing journals) promoted collaboration and sharing findings for verification, not challenged it."}, {"text": "The funding of scientific research by the monarchy.", "isCorrect": false, "rationale": "Charles II granted the Royal Society its royal charter, indicating the monarchy's support, not a challenge to it by the motto."}]}, {"question": "The text highlights Galileo Galilei's conflict with Catholic authorities in Italy but notes that a similar 'collision of science and church authority did not repeat itself' in England. What is identified as a primary reason for this difference in England?", "options": [{"text": "English scientists avoided controversial topics like astronomy.", "isCorrect": false, "rationale": "This is incorrect; major astronomical work, such as Newton's theory of universal gravitation, was developed and supported in England."}, {"text": "The English monarchy actively suppressed religious interference in scientific matters.", "isCorrect": false, "rationale": "While the monarchy chartered the Royal Society, the text does not attribute the lack of conflict primarily to royal suppression of religious interference. Instead, it points to the religious identity of the scientists themselves."}, {"text": "Many Royal Society founders were Protestant clergymen who perceived no inherent conflict between careful observation of nature and Christian faith.", "isCorrect": true, "rationale": "The text explicitly states: 'the Royal Society's founders were overwhelmingly Protestant, and many were ordained clergymen who saw no conflict between careful observation of nature and Christian faith,' making Galileo's case an Italian Catholic affair that did not define English scientific culture."}, {"text": "English scientists deliberately kept their controversial findings secret from religious institutions.", "isCorrect": false, "rationale": "The Royal Society actively published its findings in *Philosophical Transactions*, promoting open discourse and verification, not secrecy."}]}, {"question": "Isaac Newton's *Principia Mathematica* is presented as a landmark achievement primarily because it:", "options": [{"text": "Introduced calculus, revolutionizing mathematical computation.", "isCorrect": false, "rationale": "Newton did invent calculus, but the text emphasizes a broader achievement of *Principia*: the unification of phenomena."}, {"text": "Unified diverse astronomical and terrestrial phenomena under a single mathematical law.", "isCorrect": true, "rationale": "The text states, 'Newton showed that both phenomena [Kepler's planetary motion and Galileo's falling objects] were explained by a single mathematical law... The universe was not a collection of separate mysteries. It was a single, rational system.'"}, {"text": "Proved that white light is composed of the spectrum's colors.", "isCorrect": false, "rationale": "This was another significant discovery by Newton, but the text highlights the unification of physical laws as the primary achievement of *Principia Mathematica*."}, {"text": "Advocated for the inductive method as the sole path to scientific truth.", "isCorrect": false, "rationale": "While Newton certainly used empirical methods, Francis Bacon is credited with articulating the inductive method, and Newton's achievement lay in applying it with mathematical rigor to unify physics."}]}, {"question": "Based on the text, what does the term 'natural philosophy' refer to in the seventeenth century?", "options": [{"text": "A branch of theology focused on interpreting nature through scripture.", "isCorrect": false, "rationale": "The text clarifies that 'Scripture and theology retained authority in matters of faith — but the natural world was now open to investigation,' implying a separation, not an integration, for 'natural philosophy'."}, {"text": "The study of the natural world through observation, experiment, and mathematics, which we now call science.", "isCorrect": true, "rationale": "The definition box explicitly states: 'The term used in the seventeenth century for what we now call “science.” Natural philosophers studied the workings of the natural world through observation, experiment, and mathematics.'"}, {"text": "Political philosophy concerning the natural rights of individuals.", "isCorrect": false, "rationale": "While the 17th century also saw developments in political philosophy, 'natural philosophy' was distinct and focused on the physical natural world, not governmental structures or rights."}, {"text": "The ancient Greek philosophical tradition, particularly that of Aristotle.", "isCorrect": false, "rationale": "Natural philosophy, as understood in the 17th century, represented a *departure* from the Aristotelian tradition, replacing its authority with empirical inquiry."}]}, {"question": "The text draws a parallel between the political and scientific revolutions of the seventeenth century. What fundamental question did both revolutions, in their different ways, collectively challenge?", "options": [{"text": "How can societal wealth be most effectively redistributed?", "isCorrect": false, "rationale": "While economic questions were present, the text focuses on a deeper question of authority in both realms."}, {"text": "By what authority do you claim the right to tell me what is true?", "isCorrect": true, "rationale": "The text explicitly states: 'Both the political and the scientific revolutions of the seventeenth century asked the same fundamental question: By what authority do you claim the right to tell me what is true?'"}, {"text": "What is the most efficient method for industrial production?", "isCorrect": false, "rationale": "The focus of the 17th-century revolutions was not industrial production, which became prominent later."}, {"text": "How can international trade agreements be best enforced?", "isCorrect": false, "rationale": "This relates to diplomacy and economics, not the core challenge to established authority in knowledge or governance discussed."}]}, {"question": "Imagine a 17th-century medical scholar reading an ancient text that posits 'diseases are caused by an imbalance of the four humors.' Applying Francis Bacon's key insight, what would be the most appropriate scientific response for this scholar?", "options": [{"text": "Accept the humoral theory as a foundational truth and deduce treatments based on it.", "isCorrect": false, "rationale": "This is the Aristotelian, deductive approach that Bacon explicitly criticized for not checking conclusions against reality."}, {"text": "Dismiss the theory immediately because it originated from an ancient authority.", "isCorrect": false, "rationale": "Bacon's insight was to 'Test it,' not to dismiss ancient authorities outright simply because of their age. The focus was on empirical verification."}, {"text": "Conduct systematic observations of patient symptoms, bodily fluids, and disease progression to test the humoral theory against actual evidence.", "isCorrect": true, "rationale": "Bacon's core insight was 'look before you conclude. Do not assume that what the ancient authorities said is correct. Test it. If the experiment contradicts the authority, trust the experiment.' This option demonstrates applying systematic observation and testing."}, {"text": "Seek out other ancient texts to find additional supporting evidence for the humoral theory.", "isCorrect": false, "rationale": "This response would still be relying on external authority (other texts) rather than direct observation and experimentation, which Bacon advocated."}]}, {"question": "The 'Then and Now' note connects the Royal Society's principle of 'Nullius in verba' to modern scientific practice. Which modern practice is explicitly identified as its direct descendant?", "options": [{"text": "The funding of university research by government grants.", "isCorrect": false, "rationale": "While important for science, government funding is not directly linked in the text to 'Nullius in verba,' which emphasizes verification and evidence."}, {"text": "The requirement for scientists to submit their work for independent peer review and replication.", "isCorrect": true, "rationale": "The text states: 'The Royal Society's principle of Nullius in verba is the ancestor of what scientists today call 'peer review' — the practice of requiring experiments to be independently repeated before their results are accepted.'"}, {"text": "The use of advanced computational models to predict experimental outcomes.", "isCorrect": false, "rationale": "Computational modeling is a modern scientific tool, but it's not the specific practice identified as a direct descendant of the 'Nullius in verba' principle of verification by others."}, {"text": "The widespread public dissemination of scientific findings through popular media.", "isCorrect": false, "rationale": "Public dissemination of results is important, but 'Nullius in verba' specifically emphasizes the *verification* and *replication* aspect, which is peer review, not just general media sharing."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
