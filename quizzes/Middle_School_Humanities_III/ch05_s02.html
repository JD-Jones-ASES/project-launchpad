<script>
var QUESTIONS = [{"question": "Beyond recounting his personal experiences, what was a significant goal Olaudah Equiano achieved with *The Interesting Narrative*?", "options": [{"text": "Establishing a definitive historical record of all slave voyages across the Atlantic.", "isCorrect": false, "rationale": "While Equiano's narrative provides valuable historical testimony about the Middle Passage, its primary goal was not to be a comprehensive record of all voyages, but to expose the institution of slavery and advocate for its abolition."}, {"text": "Generating widespread public and political awareness to galvanize the British abolitionist movement.", "isCorrect": true, "rationale": "The text states Equiano's Narrative was a 'political argument,' sold widely, and 'was read by members of Parliament, by abolitionists, and by ordinary readers,' indicating its success in raising awareness and supporting the abolitionist cause."}, {"text": "Providing detailed ethnographic studies of various African societies for academic purposes.", "isCorrect": false, "rationale": "Equiano did include ethnographic descriptions of Igbo culture, which served a rhetorical purpose, but this was a means to an end (humanization and abolition), not the significant overarching goal of the entire narrative as a political argument."}, {"text": "Founding a new religious denomination based on his spiritual transformation and ethical principles.", "isCorrect": false, "rationale": "Equiano converted to Christianity and used Christian theology in his arguments, but he did not found a new religious denomination."}]}, {"question": "Equiano's detailed descriptions of Igbo customs, food, and social life in his *Narrative* primarily served which rhetorical purpose?", "options": [{"text": "To provide a historical blueprint for future colonial administration in Africa by documenting local practices.", "isCorrect": false, "rationale": "Equiano's purpose was to condemn, not aid, colonialism. Documenting customs was for humanization, not administrative guidance."}, {"text": "To demonstrate the inherent superiority of African civilization over European cultures.", "isCorrect": false, "rationale": "Equiano aimed to show the humanity and civilization of African people, not to claim superiority over Europeans, but rather equality to counter 'barbaric' stereotypes."}, {"text": "To humanize enslaved people and counter arguments that Africans were 'barbaric' and thus benefited from European civilization.", "isCorrect": true, "rationale": "The 'teachernote' explicitly states this rhetorical strategy: 'it humanizes the people being enslaved... and it implicitly answers the argument that Africans were 'barbaric' and thus benefited from European civilization.'"}, {"text": "To distract readers from the horrors of the Middle Passage with pleasant recollections of his childhood.", "isCorrect": false, "rationale": "The descriptions of his childhood were a strategic argument, not a distraction, and were part of his broader abolitionist message."}]}, {"question": "If Olaudah Equiano were to address a contemporary issue of human exploitation, which combination of intellectual frameworks would he most likely draw upon to construct his argument, based on his historical approach?", "options": [{"text": "Economic utilitarianism and state-centric nationalism.", "isCorrect": false, "rationale": "Equiano's arguments focused on inherent human rights and dignity, not primarily economic efficiency or nationalist sentiments."}, {"text": "Post-modern relativism and historical materialism.", "isCorrect": false, "rationale": "These are later philosophical movements that do not align with Equiano's Enlightenment-era thinking or his Christian framework."}, {"text": "Principles of inherent human dignity derived from spiritual belief and universal natural rights.", "isCorrect": true, "rationale": "The text explicitly states Equiano combined 'Enlightenment natural rights philosophy of Locke' and 'the Christian understanding of human dignity rooted in *imago Dei*,' directly aligning with these two frameworks."}, {"text": "Empiricism and geopolitical power theory.", "isCorrect": false, "rationale": "While Equiano's narrative was an empirical account of suffering, his core arguments were moral and philosophical (natural rights, *imago Dei*), not geopolitical power theory."}]}, {"question": "According to the text, the *encomienda* system in Spanish colonial America was characterized by:", "options": [{"text": "A voluntary trade agreement between Spanish colonists and indigenous leaders for natural resources.", "isCorrect": false, "rationale": "The text clearly defines *encomienda* as a system that demanded 'labor and tribute' and resulted in 'brutal forced labor,' indicating it was not voluntary."}, {"text": "A system of land grants to indigenous people in exchange for military service to the Spanish Crown.", "isCorrect": false, "rationale": "The system granted colonists (encomenderos) rights over indigenous labor, not land to indigenous people, and it was primarily for labor/tribute, not military service."}, {"text": "A legal framework that theoretically protected indigenous welfare but in practice resulted in brutal forced labor and exploitation.", "isCorrect": true, "rationale": "The definition states: 'In theory, the encomendero was responsible for the spiritual and physical welfare of those in his care. In practice, the system was often brutal forced labor that killed enormous numbers of people.'"}, {"text": "An agricultural commune where Spanish and indigenous populations shared resources and labor equally for mutual benefit.", "isCorrect": false, "rationale": "Las Casas's account describes the Spanish treating indigenous people 'not as brute animals... so much as piles of dung,' which contradicts any idea of shared resources or equality."}]}, {"question": "How did Bartolomé de Las Casas's 'insider status' within the Spanish colonial system primarily influence the impact of his condemnations of the *encomienda*?", "options": [{"text": "It made his arguments easily dismissed as biased by the Spanish crown and colonial authorities.", "isCorrect": false, "rationale": "The text indicates the opposite, stating he 'used his insider status to gain audiences with the King of Spain' and his 'first-hand experience' lent weight to his testimony."}, {"text": "It allowed him to establish new, more humane colonial policies immediately after the Council of Valladolid.", "isCorrect": false, "rationale": "While he won the debate, the text explicitly states 'the conquest largely continued anyway,' indicating immediate policy change was limited."}, {"text": "It provided him direct access to powerful figures like the King of Spain and lent weight to his 'first-hand experience' testimony.", "isCorrect": true, "rationale": "The text states he 'used his insider status to gain audiences with the King of Spain' and 'speak from first-hand experience,' which gave his testimony particular authority."}, {"text": "It forced him to compromise his moral stance in order to maintain his position of influence within the Church.", "isCorrect": false, "rationale": "Las Casas's 'Short Account' is described as a 'polemic' and his language 'deliberately shocking,' showing he did not compromise his moral stance."}]}, {"question": "While both Olaudah Equiano and Bartolomé de Las Casas vehemently condemned systems of human exploitation, their primary rhetorical strategies and intellectual traditions differed. Which statement best describes this difference?", "options": [{"text": "Equiano appealed to economic efficiency, while Las Casas emphasized military strategy and conquest.", "isCorrect": false, "rationale": "Neither focused primarily on economic efficiency or military strategy; both used moral and theological arguments."}, {"text": "Equiano primarily drew on Enlightenment natural rights and Christian human dignity, whereas Las Casas focused on Christian theology and first-hand moral witness.", "isCorrect": true, "rationale": "The text states Equiano combined 'Enlightenment natural rights philosophy... and the Christian understanding of human dignity,' while Las Casas 'relied primarily on Christian theology and canon law' and spoke from 'first-hand experience.'"}, {"text": "Equiano used satirical drama to expose injustice, while Las Casas wrote historical fiction.", "isCorrect": false, "rationale": "Equiano's work was a memoir/political argument, and Las Casas's was a polemic based on first-hand accounts, not fictional works or satirical drama."}, {"text": "Equiano argued for individual self-interest as a motivator for freedom, while Las Casas advocated for collective land ownership by indigenous groups.", "isCorrect": false, "rationale": "This misrepresents their core arguments; Equiano focused on inherent rights and dignity, and Las Casas on Christian duty and condemning brutal exploitation."}]}, {"question": "The text describes Las Casas winning the debate at Valladolid and the *encomienda* system being officially condemned, yet the conquest continued. What lesson does this outcome primarily illustrate about the effectiveness of moral arguments against systemic injustice?", "options": [{"text": "Moral arguments are ultimately ineffective in altering established power structures or ingrained behaviors.", "isCorrect": false, "rationale": "The text explicitly states that 'moral argument can change the official record' and 'that changed record matters later,' implying a long-term, if not immediate, effectiveness."}, {"text": "Official condemnations are sufficient to immediately halt exploitative practices, proving the power of intellectual debate.", "isCorrect": false, "rationale": "The text clearly states 'the conquest largely continued anyway,' disproving the idea of immediate halt."}, {"text": "Moral arguments can reshape official records and provide precedents for future change, even if immediate behavioral change is limited.", "isCorrect": true, "rationale": "The text states: 'moral argument can change the official record even when it fails to change behavior. And sometimes that changed record matters later, when history is looking for precedents.'"}, {"text": "Debates like Valladolid are primarily for show and have no real-world consequences beyond symbolic gestures.", "isCorrect": false, "rationale": "The text highlights the eventual significance of the changed record and precedents, indicating consequences beyond mere symbolism."}]}, {"question": "Which real-world event is explicitly mentioned in the text as a source of 'raw material' for William Shakespeare's *The Tempest*?", "options": [{"text": "The founding of the Jamestown colony in Virginia.", "isCorrect": false, "rationale": "While Jamestown was founded around the same time, the text specifically mentions a different event as raw material for the play."}, {"text": "The Spanish Armada's attempted invasion of England.", "isCorrect": false, "rationale": "The Spanish Armada occurred in 1588, well before *The Tempest* (c. 1611) and is not mentioned as inspiration for this play."}, {"text": "The shipwreck of the *Sea Venture* off the coast of Bermuda.", "isCorrect": true, "rationale": "The text explicitly states: 'Shakespeare almost certainly knew about the shipwreck of the Sea Venture off the coast of Bermuda in 1609 — a real event that provided some of the play's raw material.'"}, {"text": "The beginning of the French Revolution.", "isCorrect": false, "rationale": "The French Revolution (1789) occurred much later than *The Tempest* (c. 1611)."}]}, {"question": "Caliban's direct accusation to Prospero, 'This island's mine, by Sycorax my mother, Which thou tak'st from me,' most powerfully embodies which central theme of the 'Expansion and Conquest' unit?", "options": [{"text": "The pursuit of scientific knowledge and exploration in uncharted territories.", "isCorrect": false, "rationale": "Caliban's statement is about unjust seizure and ownership, not scientific exploration."}, {"text": "The moral justification for colonial expansion based on civilizing missions and resource acquisition.", "isCorrect": false, "rationale": "Caliban is making an accusation against colonial seizure, not justifying it."}, {"text": "The experience of dispossession and the unjust seizure of land by a more powerful entity.", "isCorrect": true, "rationale": "The introduction states *The Tempest* 'contains one of literature's most haunting images of what it means to be dispossessed of your home by a more powerful stranger,' which directly reflects Caliban's accusation."}, {"text": "The economic benefits of forced labor for developing new colonial economies.", "isCorrect": false, "rationale": "While Caliban is enslaved, his specific quote focuses on the ownership and taking of his home, rather than the economic mechanics of his labor."}]}, {"question": "The collective examination of texts by Olaudah Equiano, Bartolomé de Las Casas, and William Shakespeare in this unit primarily encourages readers to confront which overarching question?", "options": [{"text": "What are the most effective economic models for colonial development and resource extraction?", "isCorrect": false, "rationale": "These texts focus on the ethical and human costs of expansion, not the economic efficiency of colonialism."}, {"text": "How can societies best suppress dissent and maintain order during periods of territorial expansion?", "isCorrect": false, "rationale": "The texts present critiques of power and injustice, prompting reflection on conscience, not on methods of suppression."}, {"text": "What is the interplay between power, conscience, and the human cost of empire?", "isCorrect": true, "rationale": "The introduction explicitly states, 'Together, these three texts ask us to think carefully about power, conscience, and what it costs to keep your eyes open,' encapsulating this overarching question."}, {"text": "Which geographical regions were most impacted by European exploration in the early modern period?", "isCorrect": false, "rationale": "While geography provides context, the literary section's focus is on the moral and human implications of these historical events, not a geographical survey."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
