<script>
var QUESTIONS = [{"question": "According to Hugo Grotius, what is the fundamental basis for the laws that should bind nations, even during wartime?", "options": [{"text": "Divine revelation as interpreted by the dominant religious authority.", "isCorrect": false, "rationale": "Grotius explicitly argued that natural law does not depend on Scripture alone, nor on any particular church, making this option incorrect."}, {"text": "A natural law inherent in the rational and social nature of human beings, discoverable by reason.", "isCorrect": true, "rationale": "The text states, 'Grotius argued that there is a natural law that governs nations just as it governs individuals... It is written into the rational nature of human beings and can be discovered by reason.' This is his central concept for international law."}, {"text": "The decrees and edicts issued by powerful sovereign rulers.", "isCorrect": false, "rationale": "Grotius's argument was 'explosive' precisely because it meant 'no sovereign could claim to be above it,' thus challenging the idea that rulers' decrees were the ultimate authority."}, {"text": "A consensus reached through formal treaties and agreements between all Christian nations.", "isCorrect": false, "rationale": "Grotius's law was revolutionary because it 'could apply to all nations — Christian and non-Christian alike,' extending beyond mere agreements between Christian states."}]}, {"question": "Friedrich Schiller's historical account of the Thirty Years' War, particularly his description of the Sack of Magdeburg, primarily serves what purpose?", "options": [{"text": "To glorify the military tactics and strategic brilliance of commanders like Field Marshal Tilly.", "isCorrect": false, "rationale": "Schiller's account describes the horrors and destruction, not the glorification of military tactics. He even notes Tilly's tears, suggesting a critique of war's outcomes."}, {"text": "To provide a propaganda piece emphasizing the atrocities committed solely by one religious faction.", "isCorrect": false, "rationale": "The teacher note explicitly states, 'Schiller is not writing propaganda; he is writing moral history,' and acknowledges that 'soldiers on all sides committed atrocities.'"}, {"text": "To demonstrate the moral purpose of history by confronting the past's horrors to teach future generations.", "isCorrect": true, "rationale": "The text clearly states Schiller was an Enlightenment figure who 'believed history had a moral purpose, that studying the past could teach nations and individuals how to live better.'"}, {"text": "To offer a dispassionate, objective timeline of events without any interpretive commentary.", "isCorrect": false, "rationale": "Schiller's inclusion of details like Tilly's tears and his strong language ('one of the most horrible') demonstrates a clear interpretive and moral stance, not dispassionate objectivity."}]}, {"question": "The text states that Grotius and Schiller both wrestle with the question: 'How do human beings, capable of such destruction, build rules and institutions that limit it?' How do their proposed solutions primarily differ?", "options": [{"text": "Grotius emphasizes religious doctrine, while Schiller focuses on economic incentives for peace.", "isCorrect": false, "rationale": "Grotius explicitly de-emphasizes reliance on 'Scripture alone, nor on any particular church,' and Schiller does not mention economic incentives."}, {"text": "Grotius seeks to establish rules and laws, while Schiller aims to preserve memory and the moral lessons of war.", "isCorrect": true, "rationale": "The text directly states, 'Grotius's answer is law: reason can establish norms that bind even nations at war. Schiller's answer is memory: only by honestly confronting what war does... can a civilization learn to prefer peace.'"}, {"text": "Grotius advocates for strong sovereign power, while Schiller argues for individual civil disobedience.", "isCorrect": false, "rationale": "Grotius's natural law limits sovereign power, and Schiller's text does not discuss individual civil disobedience."}, {"text": "Grotius proposes military alliances, while Schiller suggests educational reforms.", "isCorrect": false, "rationale": "Neither author's primary solution as described in the text involves military alliances or specific educational reforms."}]}, {"question": "The text describes Grotius's argument for natural law as 'explosive.' Which of the following best explains why this argument was considered revolutionary for its time?", "options": [{"text": "It suggested that nations could negotiate peace without a divine intermediary.", "isCorrect": false, "rationale": "While Grotius separated natural law from specific religious institutions, the core 'explosive' element was its universal applicability, not merely the ability to negotiate without an intermediary."}, {"text": "It meant that international law could apply universally to all nations, regardless of their religious beliefs or sovereign claims to be above the law.", "isCorrect": true, "rationale": "The text explicitly states: 'This argument was explosive: it meant that international law could apply to all nations — Christian and non-Christian alike — and that no sovereign could claim to be above it.'"}, {"text": "It provided a legal justification for colonial expansion by European powers.", "isCorrect": false, "rationale": "The text does not mention colonial expansion, and the principle of universal natural law would more likely oppose arbitrary actions than justify them."}, {"text": "It asserted that only a single, supreme global government could enforce true international law.", "isCorrect": false, "rationale": "The definition of international law clarifies that it 'depends on the consent of nations and the pressure of international opinion,' not a single global government."}]}, {"question": "In his account of the Sack of Magdeburg, Schiller notes that 'Even the most hardened soldiers were moved at a sight so horrible; and Tilly himself shed tears.' What is the most significant point Schiller makes by including this detail?", "options": [{"text": "That Field Marshal Tilly was secretly sympathetic to the Protestant cause.", "isCorrect": false, "rationale": "The text provides no evidence of Tilly's secret sympathies. He was the commander of Imperial and League troops attacking a Protestant city."}, {"text": "That even those involved in atrocities can be affected by the scale of human suffering and unintended destruction that war produces.", "isCorrect": true, "rationale": "The teacher note explains, 'Why does Schiller emphasize Tilly's tears? What point is he making about the difference between what commanders intend and what war produces?' It highlights the moral complexity and the unintended horrors of war."}, {"text": "That emotional displays were common among military commanders during the Thirty Years' War.", "isCorrect": false, "rationale": "While possible, the text emphasizes the *reason* for Tilly's tears within the context of Magdeburg's destruction as a point of moral history, not a general observation about military culture."}, {"text": "That the destruction of Magdeburg was an anomaly, not representative of other wartime events.", "isCorrect": false, "rationale": "The text describes it as 'one of the most horrible' but does not suggest it was an isolated incident in terms of type of atrocity, noting that 'soldiers on all sides committed atrocities throughout the war.'"}]}, {"question": "Based on the definition provided in the text, which scenario best illustrates a challenge specific to the enforcement of international law compared to national law?", "options": [{"text": "A national court rules against a citizen who broke a traffic law.", "isCorrect": false, "rationale": "This is an example of national law, which is enforced by internal courts and police, not a challenge specific to international law."}, {"text": "A police force arrests individuals for committing a crime within their country's borders.", "isCorrect": false, "rationale": "This is an example of national law enforcement, which is clearly defined by the presence of police and courts, unlike international law."}, {"text": "Two countries disagree on the interpretation of a treaty, with no immediate common authority to compel obedience from either side.", "isCorrect": true, "rationale": "The definition states: 'Unlike laws within a country (which are enforced by courts and police), international law depends on the consent of nations and the pressure of international opinion.' The lack of a common compelling authority highlights a key enforcement challenge."}, {"text": "A government passes a new environmental protection act for its own territory.", "isCorrect": false, "rationale": "This is an example of a sovereign nation exercising its internal legislative power, which is part of national law, not international law or its enforcement challenges."}]}, {"question": "The teacher's note explicitly connects Grotius's concept of natural law to an earlier intellectual tradition. Which tradition is mentioned as a foundation upon which Grotius built his ideas, extending them to international relations?", "options": [{"text": "The secular humanism of the Renaissance.", "isCorrect": false, "rationale": "While Grotius lived during a period of humanist thought, the text specifically identifies a different, older tradition as his intellectual foundation for natural law."}, {"text": "The Thomistic tradition of natural law as exemplified by Aquinas.", "isCorrect": true, "rationale": "The teacher note states: 'Ask students: ...How does this compare to what Aquinas said about natural law...? Grotius is building on the Thomistic tradition but extending it into international relations.'"}, {"text": "The Roman legal codes and municipal laws.", "isCorrect": false, "rationale": "Grotius acknowledges 'The municipal law of Rome and of other states' but distinguishes his work by focusing on 'That law which is common to many nations or rulers of nations.'"}, {"text": "The Protestant Reformation's emphasis on individual conscience.", "isCorrect": false, "rationale": "Grotius explicitly states his natural law 'does not depend on Scripture alone, nor on any particular church,' indicating a distinction from the particular tenets of the Reformation."}]}, {"question": "In the provided excerpt from *The Rights of War and Peace*, Grotius addresses the common saying, 'in war laws are silent.' What is his stance on this view?", "options": [{"text": "He agrees with it, acknowledging that war inherently negates all legal constraints.", "isCorrect": false, "rationale": "Grotius undertakes his work precisely to 'vindicate' the law among nations, directly refuting the idea that 'in war laws are silent.'"}, {"text": "He acknowledges it as a widely held belief but then proceeds to refute it by appealing to natural law and reason.", "isCorrect": true, "rationale": "The text states: 'He acknowledges the common view (“in war, laws are silent” — the idea that war is beyond law) and then refutes it by appealing to “right reason and conscience.”'"}, {"text": "He attributes the saying to specific non-Christian nations and dismisses it as barbarous.", "isCorrect": false, "rationale": "Grotius attributes the saying to Eupolis and describes it as a 'common saying,' not specifically tied to non-Christian nations or dismissed as barbaric on those grounds."}, {"text": "He argues that it only applies to civil wars, not wars between sovereign states.", "isCorrect": false, "rationale": "No such distinction is made in the text; Grotius's argument for international law is universal to all nations."}]}, {"question": "The introduction states that Grotius and Schiller, as 'Two Witnesses Across Time,' together show 'the difference between experiencing a historical moment and interpreting it.' Which of the following best exemplifies this distinction?", "options": [{"text": "Grotius's legal arguments are based on divine command, while Schiller's history relies on archival research.", "isCorrect": false, "rationale": "Grotius's arguments are based on natural law and reason, not solely divine command, and this option does not capture the 'experiencing vs. interpreting' distinction clearly."}, {"text": "Grotius, writing during the war, sought to impose rules on immediate actions, while Schiller, writing later, reflected on the moral lessons of past events.", "isCorrect": true, "rationale": "Grotius was 'writing during the war (1625) and trying to argue that even war must follow rules' (experiencing), while Schiller was 'writing more than 150 years after the war... looking back... and trying to make sense of the catastrophe' (interpreting)."}, {"text": "Grotius focused on the suffering of individuals, while Schiller detailed the political causes of the conflict.", "isCorrect": false, "rationale": "Both texts address aspects of suffering; Grotius focuses on nations' conduct, and Schiller on the moral cost of war, not exclusively political causes versus individual suffering."}, {"text": "Grotius proposed concrete peace treaties, while Schiller only offered abstract philosophical observations.", "isCorrect": false, "rationale": "Grotius proposed foundational laws for international relations, not specific treaties, and Schiller wrote a comprehensive history with a moral purpose, not just abstract observations."}]}, {"question": "According to Grotius's argument, which of the following actions would be considered explicitly forbidden in war, regardless of whether the opposing side is Christian or not?", "options": [{"text": "Blockading an enemy's port to cut off supplies.", "isCorrect": false, "rationale": "This action is not explicitly listed as forbidden by Grotius; it could be considered a legitimate act of warfare within certain rules."}, {"text": "Engaging in espionage to gather intelligence on enemy movements.", "isCorrect": false, "rationale": "This action is not explicitly listed as forbidden by Grotius in the provided text."}, {"text": "Using poison against enemy combatants or breaking a previously agreed-upon treaty.", "isCorrect": true, "rationale": "The text states: 'Grotius goes on to argue that certain acts are forbidden even in war: killing innocent civilians, using poison, breaking treaties, enslaving captives without legal cause.'"}, {"text": "Conscripting citizens into military service during wartime.", "isCorrect": false, "rationale": "This action is not explicitly listed as forbidden by Grotius; it is generally considered a sovereign right during wartime."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
