    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Middle_School_Humanities_III.html">&larr; Back to History &amp; Humanities III</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">History &amp; Humanities III &mdash; Chapter 5, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The text states, \"A map is never neutral. It is always made by someone, for a purpose, from a particular point of view.\" How do European colonial maps, as described, exemplify this statement?", "options": [{"text": "They accurately depicted existing geographical features without political bias.", "isCorrect": false, "rationale": "The text explicitly states that maps are 'never neutral' and were made 'for a purpose,' indicating they contained inherent biases, not neutral accuracy."}, {"text": "They highlighted the vastness of indigenous populations and their established settlements.", "isCorrect": false, "rationale": "The text explains that these maps 'were drawn as if they were empty land waiting to be filled — as if the people already living there were simply part of the landscape,' thereby obscuring indigenous presence."}, {"text": "They used distinct colors to show European territorial claims, framing occupied lands as 'empty' for European control.", "isCorrect": true, "rationale": "The text notes the use of colors (pink, blue, yellow, orange, green) to mark European claims and states these territories were 'drawn as if they were empty land,' demonstrating a clear European point of view and purpose of showing control."}, {"text": "They primarily served as navigational tools for trade routes, minimizing political claims.", "isCorrect": false, "rationale": "The text clarifies their purpose: 'to show Europeans how much of the world they controlled,' indicating a primary political and power-demonstrating function rather than just navigation."}], "id": "q01"}, {"question": "Which of the following accurately describes the primary flow of goods and people in the 'triangle trade' as detailed in the text?", "options": [{"text": "Raw materials from Europe to Africa, enslaved people to the Americas, manufactured goods back to Europe.", "isCorrect": false, "rationale": "This option incorrectly places the flow of raw materials and manufactured goods. Manufactured goods went from Europe to Africa, and colonial products (raw materials) went from the Americas to Europe."}, {"text": "Manufactured goods from Europe to Africa, enslaved people to the Americas, colonial products back to Europe.", "isCorrect": true, "rationale": "This accurately matches the definition: European ships carried manufactured goods to West Africa for enslaved people, then carried enslaved people to the Americas, and finally colonial products (sugar, tobacco, cotton, rum) back to Europe."}, {"text": "Colonial products from the Americas to Africa, manufactured goods to Europe, enslaved people back to the Americas.", "isCorrect": false, "rationale": "This option completely scrambles the sequence and direction of exchange, making it inaccurate according to the text."}, {"text": "Enslaved people from Africa to Europe, manufactured goods to the Americas, colonial products back to Africa.", "isCorrect": false, "rationale": "Enslaved people were transported to the Americas, not Europe, and the other legs are also incorrect."}], "id": "q02"}, {"question": "The 'mathematics of the triangle trade' reveal the immense human cost. Which statement best summarizes the impact of the Middle Passage based on the provided statistics?", "options": [{"text": "The vast majority of enslaved Africans transported across the Atlantic successfully arrived at their destinations.", "isCorrect": false, "rationale": "While 10.7 million arrived alive, approximately 1.8 million died, which represents a significant portion (around 14%) and indicates immense human suffering, not a 'vast majority' of successful arrivals in the context of human life."}, {"text": "Approximately 1.8 million enslaved Africans died during the Middle Passage, highlighting the brutality of the journey.", "isCorrect": true, "rationale": "The text explicitly states: 'approximately 1.8 million people... died on the Middle Passage,' directly illustrating the brutal conditions and immense human cost."}, {"text": "Brazil and the Caribbean islands were minor destinations for enslaved Africans compared to North America.", "isCorrect": false, "rationale": "The text states Brazil (4.9 million) and the Caribbean (4.7 million) were the 'largest single destinations,' receiving far more enslaved people than what is now the United States (400,000)."}, {"text": "The death toll on the Middle Passage was comparable to the population of London in 1867.", "isCorrect": false, "rationale": "The text compares the death toll to 'the entire population of London in 1700,' not 1867, making the temporal comparison incorrect."}], "id": "q03"}, {"question": "The text explains that the Caribbean plantations required a 'constant stream of new arrivals from Africa' while the North American enslaved population grew through 'natural increase.' What economic logic primarily explains this difference?", "options": [{"text": "North American planters valued enslaved lives more highly due to different cultural norms.", "isCorrect": false, "rationale": "The text emphasizes economic calculations, not differing cultural values, as the primary driver. It states the arithmetic was 'simple and horrifying' and 'shaped the entire system.'"}, {"text": "The brutal conditions and high death rates on Caribbean sugar plantations made it economically rational to constantly replace workers rather than sustain them.", "isCorrect": true, "rationale": "The text explicitly states: 'it was cheaper to work an enslaved person to death and buy another than to keep a workforce alive and healthy. This calculation shaped the entire system,' explaining the continuous demand for new imports in the Caribbean."}, {"text": "North American plantations had better medical facilities and fewer diseases than the Caribbean.", "isCorrect": false, "rationale": "While environmental factors might have played a role, the text specifically attributes the difference to the 'arithmetic' and the economic calculation of replacing versus sustaining labor due to brutal conditions."}, {"text": "European demand for sugar was significantly lower than for North American products like cotton and tobacco.", "isCorrect": false, "rationale": "The text states that 'Sugar, in particular, drove the trade' and produced 'enormous wealth,' indicating high, not low, demand."}], "id": "q04"}, {"question": "The 'missionary encounter' is described as complex, with missionaries exhibiting both 'genuine care' and representing 'European power and culture.' What does this complexity imply about evaluating their historical role?", "options": [{"text": "Missionaries were exclusively agents of cultural destruction and colonial subjugation.", "isCorrect": false, "rationale": "The text refutes this by noting 'genuine conversion and mutual respect' and that missionaries 'genuinely cared about the people they served,' indicating their role was not exclusively destructive."}, {"text": "Their work should be seen only as spiritual and separate from any political or economic consequences.", "isCorrect": false, "rationale": "The text states their work 'sometimes paved the way for conquest' and was 'embedded in structures of European power,' demonstrating that it could not be fully separated from political and economic contexts."}, {"text": "Their impact cannot be reduced to a single verdict, as it involved both altruistic intentions and an unwitting or intentional role in facilitating colonial power.", "isCorrect": true, "rationale": "The 'note' explicitly states, 'The history of Christian missions in the age of expansion is not reducible to a single verdict,' acknowledging both 'genuine spiritual work' and how it was 'compromised by its context.'"}, {"text": "Missionaries consistently opposed European colonial expansion and its abuses.", "isCorrect": false, "rationale": "While some like Las Casas and Wilberforce were critics, the text also notes that the establishment of missions 'often preceded and facilitated British colonial control, even when this was not the missionaries' intention,' indicating a mixed and complex relationship."}], "id": "q05"}, {"question": "The Jesuit reductions in Paraguay are presented as a unique experiment within the history of missions. What was their primary aim that made them 'unusually humane' compared to other colonial practices?", "options": [{"text": "To assimilate indigenous people completely into European culture and religious practices.", "isCorrect": false, "rationale": "The reductions combined 'Catholic religious life with indigenous governance and agricultural practice,' indicating a blend rather than complete assimilation."}, {"text": "To provide indigenous labor directly to Spanish colonists under Jesuit supervision.", "isCorrect": false, "rationale": "The text states the reductions 'operated outside Spanish colonial labor demands,' meaning they were designed to prevent, not provide, labor to colonists."}, {"text": "To create self-governing Christian communities that protected indigenous people from the worst abuses of the colonial labor system.", "isCorrect": true, "rationale": "The text describes them as 'self-governing communities for Guarani indigenous people that operated outside Spanish colonial labor demands' and were 'protected from the worst abuses of the colonial system,' making them uniquely humane."}, {"text": "To develop new agricultural techniques for the benefit of the Spanish crown.", "isCorrect": false, "rationale": "While agricultural practice was part of them, the primary aim highlighted was the protection and self-governance of the indigenous people, not the benefit of the Spanish crown."}], "id": "q06"}, {"question": "Matteo Ricci's missionary approach in China involved learning Chinese and studying Confucian philosophy. This strategy demonstrates an understanding of which key principle for effective cross-cultural engagement?", "options": [{"text": "The necessity of imposing European cultural norms to ensure religious conversion.", "isCorrect": false, "rationale": "Ricci's method was the opposite; he adapted to Chinese culture rather than imposing European norms, demonstrating a strategy of accommodation."}, {"text": "The importance of cultural immersion and adapting a religious message to local intellectual traditions.", "isCorrect": true, "rationale": "Ricci 'learned Chinese, studied Confucian philosophy, and presented Christianity in terms that made sense within Chinese intellectual culture,' which perfectly illustrates cultural immersion and adaptation for more effective communication."}, {"text": "The superiority of European philosophical systems over indigenous ones.", "isCorrect": false, "rationale": "By studying Confucian philosophy, Ricci acknowledged its significance within Chinese intellectual culture, rather than asserting European superiority."}, {"text": "The tactical advantage of linguistic fluency for military intelligence gathering.", "isCorrect": false, "rationale": "Ricci's motivations were related to religious conversion within the intellectual culture, not military intelligence."}], "id": "q07"}, {"question": "The text describes the relationship between Protestant missions in Africa and British colonialism as 'complex.' Which statement best reflects this complexity?", "options": [{"text": "Missionaries universally condemned British colonial expansion and actively fought against it.", "isCorrect": false, "rationale": "While 'many missionaries were genuinely opposed to the exploitation of Africans,' the text states this was not universal and that missions 'often preceded and facilitated British colonial control.'"}, {"text": "Missionary efforts were solely a tool for facilitating direct British colonial rule and exploitation.", "isCorrect": false, "rationale": "The text notes missionaries' 'genuinely religious' motivations and their opposition to exploitation, indicating their role was not solely a tool for colonial exploitation."}, {"text": "While many missionaries genuinely opposed exploitation, their presence often inadvertently paved the way for or facilitated British colonial control.", "isCorrect": true, "rationale": "This statement captures the nuance provided: 'Many missionaries were genuinely opposed to the exploitation of Africans... At the same time, the establishment of missions often preceded and facilitated British colonial control, even when this was not the missionaries' intention.'"}, {"text": "Protestant missionaries had no significant impact on either the anti-slavery movement or colonial expansion.", "isCorrect": false, "rationale": "David Livingstone's work combined missionary efforts with the campaign against the slave trade, and missions 'facilitated British colonial control,' demonstrating significant impact."}], "id": "q08"}, {"question": "While the Crusades and European colonial expansion both involved Western power moving outward, the text highlights a significant difference in their primary aims. What was this key distinction?", "options": [{"text": "The Crusades primarily sought trade routes, while colonial expansion focused on holy sites.", "isCorrect": false, "rationale": "This option reverses the actual aims described in the text."}, {"text": "The Crusades aimed at controlling specific holy sites and defending Christian territories, while colonial expansion was driven primarily by trade and wealth.", "isCorrect": true, "rationale": "The text clearly states: 'The Crusades were primarily aimed at controlling specific holy sites and defending Christian territories. The colonial expansion was aimed primarily at trade and wealth.'"}, {"text": "Colonial expansion involved temporary expeditions, whereas the Crusades created permanent settler societies.", "isCorrect": false, "rationale": "This reverses the characteristics: the Crusades were 'finite series of expeditions,' while colonial expansion 'created permanent settler societies.'"}, {"text": "The Crusades were justified by economic arguments, while colonial expansion used religious justifications.", "isCorrect": false, "rationale": "The text states 'Both were justified with religious arguments,' and colonial expansion was driven by economic aims, not justified by them."}], "id": "q09"}, {"question": "The text states that the 'plantation economy was not an accident or a side effect of colonial expansion. It was the economic logic that drove the entire Atlantic system.' This perspective implies that understanding the slave trade requires recognizing it as:", "options": [{"text": "An irrational and bizarre historical anomaly disconnected from broader economic forces.", "isCorrect": false, "rationale": "The text explicitly refutes this, stating 'the slave trade was not irrational or bizarre — it was a rational response to economic incentives.'"}, {"text": "A morally justifiable system given the economic incentives of the time.", "isCorrect": false, "rationale": "The text states 'Economic rationality and moral atrocity are not opposites,' clearly indicating that despite economic rationality, it was still a moral atrocity, not justifiable."}, {"text": "A supply chain connecting European consumer demand for colonial products with coerced labor in the Americas, driven by rational economic incentives.", "isCorrect": true, "rationale": "The text defines it as 'the supply chain that connected demand in Europe to coerced labor in the Americas' and 'a rational response to economic incentives,' which is precisely what this option describes."}, {"text": "Primarily a result of racial hatred rather than economic calculation.", "isCorrect": false, "rationale": "While racial hatred was undeniably present, the text emphasizes the 'economic logic' and 'rational response to economic incentives' as the driving force behind the *system* itself."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
