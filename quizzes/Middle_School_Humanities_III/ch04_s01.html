        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Middle_School_Humanities_III.html">&larr; Back to History &amp; Humanities III</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">History &amp; Humanities III &mdash; Chapter 4, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The central premise that allowed Enlightenment thinkers to apply scientific principles to society was the belief that:", "options": [{"text": "Human beings were inherently good and rational, unlike nature.", "isCorrect": false, "rationale": "While some Enlightenment thinkers, like Rousseau, believed in the inherent goodness of humans in their natural state, the broader premise for applying scientific principles to society stemmed from the observed order in the physical universe, not directly from human nature."}, {"text": "Traditional religious doctrines could be empirically proven.", "isCorrect": false, "rationale": "Enlightenment thinkers often questioned traditional religious doctrines and sought to apply reason, sometimes leading to skepticism or Deism, rather than seeking empirical proof for existing doctrines."}, {"text": "The universe was governed by knowable, rational laws, implying society could be too.", "isCorrect": true, "rationale": "The text explicitly states: 'If the universe obeyed rational laws, could not society do the same? This question drove the philosophes...' This demonstrates the direct link between the Scientific Revolution's findings about an orderly universe and the Enlightenment's application of reason to societal issues."}, {"text": "Absolute monarchs held their power through a divinely ordained contract.", "isCorrect": false, "rationale": "This doctrine (divine right) was a major target for challenge by Enlightenment political philosophers like Locke, who argued for authority based on the consent of the governed."}], "id": "q01"}, {"question": "René Descartes's \"Method of Doubt\" ultimately led him to conclude that the only undeniable truth was:", "options": [{"text": "The existence of an external, material world.", "isCorrect": false, "rationale": "Descartes deliberately doubted his senses and the existence of the external world as part of his method to find something absolutely certain."}, {"text": "The infallibility of religious scripture and tradition.", "isCorrect": false, "rationale": "Descartes questioned 'many things he had been taught,' including traditional beliefs, as he noticed they 'might be wrong.'"}, {"text": "The certainty of his own existence as a thinking being.", "isCorrect": true, "rationale": "The text states Descartes found certainty in 'the act of doubting itself' and famously concluded, 'I think, therefore I am' (cogito, ergo sum), meaning the fact of thinking proved his existence."}, {"text": "The perfect order and rationality of the universe, like Newton's laws.", "isCorrect": false, "rationale": "While Newton's work reinforced the idea of an orderly universe, this was not Descartes's starting point or his single undeniable truth discovered through doubt. Newton published his work decades after Descartes."}], "id": "q02"}, {"question": "While René Descartes himself intended his method to strengthen faith, its long-term philosophical impact was to shift the primary source of knowledge and authority from:", "options": [{"text": "Government edicts to the collective will of the people.", "isCorrect": false, "rationale": "This shift relates more directly to political philosophy (Locke, Rousseau) than to Descartes's foundational epistemological shift."}, {"text": "Scientific observation to philosophical speculation.", "isCorrect": false, "rationale": "Descartes was part of a broader intellectual shift towards scientific inquiry, and his method was not meant to move away from observation but to establish a rational foundation for knowledge itself."}, {"text": "Divine revelation and tradition to individual human reason.", "isCorrect": true, "rationale": "The text explicitly notes: 'By making the individual thinking mind the starting point of all knowledge, Descartes shifted the focus away from God, Scripture, and tradition toward human reason.' The teachernote also explains how later thinkers used his tool in ways he hadn't intended, attacking religious belief rather than defending it."}, {"text": "Empirical data to innate, universal moral laws.", "isCorrect": false, "rationale": "Descartes sought certainty for all knowledge, not specifically moral laws, and his method paved the way for empirical science rather than moving away from it."}], "id": "q03"}, {"question": "Isaac Newton's description of the universe as a \"vast machine running on precise mathematical laws\" significantly contributed to the rise of Deism by suggesting that:", "options": [{"text": "Miracles and divine intervention were necessary to explain natural phenomena.", "isCorrect": false, "rationale": "Newton's work showed the universe was orderly and predictable, suggesting that miracles and interventions were *unnecessary* to explain its workings, which is a core tenet of Deism."}, {"text": "God created an orderly universe and then allowed it to operate without further interference.", "isCorrect": true, "rationale": "The text states: 'For many Enlightenment thinkers, Newton's universe pointed toward Deism—the belief that God exists but does not intervene in the world after creating it. If the universe runs like a clock, perhaps God is the clockmaker who set it ticking and then stepped back.'"}, {"text": "Religious faith was entirely incompatible with scientific inquiry.", "isCorrect": false, "rationale": "Deism is a form of religious belief (belief in God as creator), which, while abstract, shows an attempt to reconcile belief with scientific understanding, rather than declare them incompatible."}, {"text": "The physical laws of the universe were ultimately unknowable to human reason.", "isCorrect": false, "rationale": "Newton's entire achievement was to *discover* and articulate these knowable laws, demonstrating their understandability through human reason."}], "id": "q04"}, {"question": "According to John Locke's concept of the social contract, under what circumstances do citizens have the right to replace their government?", "options": [{"text": "Whenever a majority of citizens express dissatisfaction with government policies.", "isCorrect": false, "rationale": "While dissatisfaction is a factor, Locke's criteria were more specific than general unhappiness; it revolved around the violation of rights."}, {"text": "If the government fails to protect the natural rights of its citizens and becomes tyrannical.", "isCorrect": true, "rationale": "The text states: 'If a government fails to protect natural rights—if it becomes tyrannical and attacks the very rights it was created to defend—then the people have the right to dissolve that government and form a new one.'"}, {"text": "Only if the government is dissolved by a divine decree from God.", "isCorrect": false, "rationale": "Locke's philosophy directly challenged the doctrine of divine right, asserting that authority came from the consent of the governed, not God."}, {"text": "When the government seeks to expand the natural rights of its citizens beyond those initially agreed upon.", "isCorrect": false, "rationale": "The purpose of government, according to Locke, is to protect existing natural rights, not primarily to expand them in ways that would trigger a right to revolution."}], "id": "q05"}, {"question": "Voltaire's primary strategy for combating \"l'infâme\" (religious intolerance and superstition) was to:", "options": [{"text": "Publish comprehensive philosophical treatises defending Deist principles.", "isCorrect": false, "rationale": "While Voltaire was a Deist, his most effective method against 'l'infâme' was not through dry philosophical treatises but through engaging and often provocative literary works."}, {"text": "Advocate for violent revolution to overthrow corrupt religious institutions.", "isCorrect": false, "rationale": "The text describes Voltaire's 'weapons' as satire and ridicule, not advocacy for violence or revolution."}, {"text": "Use satire, wit, and ridicule to expose the absurdity and cruelty of bigotry.", "isCorrect": true, "rationale": "The text explicitly states: 'Where Locke made careful philosophical arguments, Voltaire wielded wit like a blade... His weapons were satire and ridicule: he made bigotry look not only wrong but stupid.'"}, {"text": "Collaborate with religious leaders to reform the Church from within.", "isCorrect": false, "rationale": "Voltaire was critical of the established Church and its corruption, not a collaborator. He attacked it from the outside through his writings."}], "id": "q06"}, {"question": "Rousseau's concept of the \"general will\" differs from a simple majority vote in that it represents:", "options": [{"text": "The desires of an enlightened monarch guiding the people.", "isCorrect": false, "rationale": "Rousseau's ideas were critical of rule by a king or an elite; the general will was meant to be distinct from such individual or group interests."}, {"text": "The sum of all individual preferences expressed through a democratic process.", "isCorrect": false, "rationale": "The definition explicitly states: '—not the sum of individual desires, but the common good.' This distinguishes it from a mere aggregation of individual votes."}, {"text": "The common good or what is truly beneficial for the community as a whole, potentially overriding individual desires.", "isCorrect": true, "rationale": "The text defines the general will as 'what the community as a whole truly wants—not the sum of individual desires, but the common good.' The teachernote further highlights its potential to 'override individual rights in the name of the community's good.'"}, {"text": "A divine mandate for government derived from natural law.", "isCorrect": false, "rationale": "The general will is a concept of collective political sovereignty derived from the people themselves, not from a divine mandate."}], "id": "q07"}, {"question": "A fundamental difference between John Locke's political philosophy and Jean-Jacques Rousseau's concept of the \"general will\" lies in their primary emphasis on:", "options": [{"text": "Locke emphasized communal property, while Rousseau championed individual ownership.", "isCorrect": false, "rationale": "Locke identified 'property' as a natural right, implying individual ownership. Rousseau's critique of civilization linked property to inequality, but this option misrepresents their core distinction."}, {"text": "Locke prioritized individual natural rights, while Rousseau prioritized the collective good of the community.", "isCorrect": true, "rationale": "The teachernote explicitly identifies this as 'one of the great fault lines of modern politics': 'the difference between Locke's individual natural rights and Rousseau's collective general will'."}, {"text": "Locke advocated for an absolute monarchy, while Rousseau preferred a representative democracy.", "isCorrect": false, "rationale": "Locke was a critic of absolute monarchy, advocating for government by consent. Rousseau's concept of the general will, while influencing democratic thought, is distinct from a simple representative democracy and has problematic implications."}, {"text": "Locke believed government authority came from God, while Rousseau believed it came from tradition.", "isCorrect": false, "rationale": "Both Locke and Rousseau rejected divine right and authority based purely on tradition; Locke rooted it in consent, and Rousseau in the general will."}], "id": "q08"}, {"question": "Baron de Montesquieu's most significant contribution to political thought, aimed at preventing tyranny, was the principle of:", "options": [{"text": "Divine right of kings, ensuring stable leadership.", "isCorrect": false, "rationale": "Montesquieu's work was aimed at preventing tyranny, which he linked to concentrated power, thus opposing the absolute power implied by divine right."}, {"text": "Unlimited popular sovereignty, where the majority's will is always supreme.", "isCorrect": false, "rationale": "Montesquieu focused on *limiting* power, not making one branch or the majority's will supreme without checks."}, {"text": "Separation of powers, dividing government into distinct branches with checks and balances.", "isCorrect": true, "rationale": "The text explicitly states: 'His most important conclusion: tyranny occurs when power is concentrated in a single person or body. The remedy is separation of powers—dividing government into three distinct branches (legislative, executive, judicial), each with the ability to check the others.'"}, {"text": "A unified executive and legislative body for efficient governance.", "isCorrect": false, "rationale": "Unifying these bodies concentrates power, which Montesquieu saw as the path to tyranny, making this the opposite of his recommendation."}], "id": "q09"}, {"question": "According to the summary, what was identified as the Enlightenment's \"greatest failure\"?", "options": [{"text": "The inability to completely eradicate religious belief.", "isCorrect": false, "rationale": "Many Enlightenment figures were Deists, not atheists, and the goal was often religious toleration rather than eradication of belief."}, {"text": "The continued existence of absolute monarchies across Europe.", "isCorrect": false, "rationale": "While a target of Enlightenment reform, the text identifies a more specific 'greatest failure' rather than a general lack of progress in this area."}, {"text": "The French Revolution.", "isCorrect": true, "rationale": "The text clearly states in the key concept definition of the Enlightenment: 'Its greatest failure was the French Revolution.'"}, {"text": "The failure to universally adopt constitutional governments.", "isCorrect": false, "rationale": "Constitutional government is listed as one of the Enlightenment's 'greatest achievements,' not a failure."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
