<body>
<div class="quiz-container">

    <div class="quiz-actions">

<script>
var QUESTIONS = [{"question": "What was the central purpose of the Elizabethan Settlement of 1559?", "options": [{"text": "To convert all English Catholics to Protestantism by force.", "isCorrect": false, "rationale": "Elizabeth deliberately avoided coercion; she wanted outward conformity, not enforced private belief."}, {"text": "To create a Church of England broad enough for most English people to belong to without violence.", "isCorrect": true, "rationale": "The Settlement re-established the Church of England while keeping many Catholic forms, aiming for peace rather than uniformity of private belief."}, {"text": "To make England Catholic again after the reign of Edward VI.", "isCorrect": false, "rationale": "Elizabeth was Protestant; her half-sister Mary I had attempted the Catholic restoration, not Elizabeth."}, {"text": "To ally England formally with Catholic France against Spain.", "isCorrect": false, "rationale": "The Settlement was a domestic religious compromise, not a foreign policy alliance."}]}, {"question": "Elizabeth I famously refused to 'open windows into men's souls.' What did this mean in practice?", "options": [{"text": "She required all subjects to prove their faith through public confession.", "isCorrect": false, "rationale": "The opposite is true; Elizabeth cared more about outward conformity than private belief."}, {"text": "She cared more about outward conformity to the Church of England than about what subjects privately believed.", "isCorrect": true, "rationale": "This phrase captures Elizabeth's pragmatic approach: attend church, accept the queen's supremacy, and believe what you wish privately."}, {"text": "She banned all discussion of religion in Parliament.", "isCorrect": false, "rationale": "Religious matters were frequently debated in Parliament during her reign."}, {"text": "She allowed complete freedom of worship for Catholics and Protestants equally.", "isCorrect": false, "rationale": "The Settlement required acceptance of Protestant forms; Catholics faced legal penalties for open practice."}]}, {"question": "Why was the execution of Mary Queen of Scots in 1587 a significant trigger for Spain's decision to launch the Armada?", "options": [{"text": "Mary was Philip II's sister, making her execution a personal insult to the Spanish crown.", "isCorrect": false, "rationale": "Mary was not Philip's sister; she was a Scottish queen and Catholic claimant to the English throne."}, {"text": "Mary's execution enraged Philip II, who had long planned to invade England and now had a fresh grievance.", "isCorrect": true, "rationale": "Philip II was already planning invasion; Mary's execution as a Catholic queen gave him additional motivation and justification."}, {"text": "Mary had been the queen of Spain before fleeing to England.", "isCorrect": false, "rationale": "Mary was Queen of Scots who fled Scotland in 1568 after internal political problems, not from Spain."}, {"text": "Her execution violated a treaty between England and Spain.", "isCorrect": false, "rationale": "No such treaty is described in the text; the cause was religious and dynastic rivalry."}]}, {"question": "What combination of factors defeated the Spanish Armada in 1588?", "options": [{"text": "Superior Spanish navigation allowed English ships to trap the fleet in the English Channel.", "isCorrect": false, "rationale": "It was the English who used superior tactics; Spanish navigation was not the decisive factor."}, {"text": "English naval tactics using smaller faster ships and fire vessels, commanders like Drake, and catastrophic Atlantic storms.", "isCorrect": true, "rationale": "The text explicitly identifies all three factors: English tactics, leadership, and storms that destroyed roughly half the fleet."}, {"text": "A secret alliance between England and France that caught the Armada in a crossfire.", "isCorrect": false, "rationale": "No such alliance is mentioned; France was not an English ally against the Armada."}, {"text": "The Armada was destroyed before it reached England by a Portuguese naval ambush.", "isCorrect": false, "rationale": "Portugal was under Spanish control in 1588 and played no such role."}]}, {"question": "What was the doctrine of the 'divine right of kings,' and which Stuart monarchs relied on it?", "options": [{"text": "The belief that Parliament's authority comes from divine sanction, not the monarch's will.", "isCorrect": false, "rationale": "Divine right applied to monarchs, not Parliament; it was used to justify royal authority over Parliament."}, {"text": "The belief that a monarch's authority comes directly from God and cannot be limited by Parliament, used by James I and Charles I.", "isCorrect": true, "rationale": "Both James I and Charles I invoked divine right to justify ruling without Parliamentary consent, as defined in the text."}, {"text": "A legal theory developed by Parliament to justify removing kings who broke their coronation oaths.", "isCorrect": false, "rationale": "Divine right was a royal theory, not a Parliamentary one; Parliament challenged it rather than endorsed it."}, {"text": "The Catholic doctrine that popes had authority over all Christian monarchs.", "isCorrect": false, "rationale": "This describes papal supremacy, not the divine right of kings as used by the Stuarts."}]}, {"question": "What was the Petition of Right (1628), and why is it constitutionally significant?", "options": [{"text": "It was a request by Charles I for Parliament to grant him new taxes without conditions.", "isCorrect": false, "rationale": "The Petition was issued by Parliament against Charles I, not by Charles against Parliament."}, {"text": "It listed specific royal abuses and demanded Charles acknowledge limits on his authority; it is one of England's foundational constitutional documents.", "isCorrect": true, "rationale": "Parliament passed it to constrain Charles I, placing it alongside Magna Carta as a foundational constitutional document."}, {"text": "It permanently abolished the king's right to collect taxes without Parliamentary approval.", "isCorrect": false, "rationale": "Charles signed it to get his taxes but then ignored it; it did not permanently end royal tax abuses."}, {"text": "It gave citizens the right to petition courts against wrongful imprisonment for the first time.", "isCorrect": false, "rationale": "Habeas corpus is a related but distinct protection; the Petition addressed multiple royal abuses including but not limited to imprisonment."}]}, {"question": "What does the term 'Personal Rule' refer to in English history?", "options": [{"text": "Oliver Cromwell's period of direct military governance from 1653 to 1658.", "isCorrect": false, "rationale": "Cromwell's period of rule is called the Protectorate; the Personal Rule refers to Charles I's governance before the Civil War."}, {"text": "Charles I's eleven-year period of governing without Parliament, from 1629 to 1640.", "isCorrect": true, "rationale": "After dismissing Parliament in 1629, Charles ruled alone until financial crisis forced him to recall it in 1640."}, {"text": "James I's practice of personally reviewing all Parliamentary legislation before signing it.", "isCorrect": false, "rationale": "James I had ongoing conflicts with Parliament but did not govern for an extended period without it."}, {"text": "Elizabeth I's period of sole rule before she appointed the Privy Council.", "isCorrect": false, "rationale": "No such period is described for Elizabeth; the Personal Rule is specifically associated with Charles I."}]}, {"question": "What was the immediate cause that forced Charles I to recall Parliament after eleven years of personal rule?", "options": [{"text": "A French invasion of southern England that required Parliamentary authority to raise an army.", "isCorrect": false, "rationale": "The cause was a Scottish rebellion, not a French invasion."}, {"text": "Charles tried to impose a new prayer book on Scotland, triggering a Scottish rebellion that required Parliamentary funding to suppress.", "isCorrect": true, "rationale": "The Scots rebelled against the imposed prayer book, and Charles needed money to fight them, forcing him to recall Parliament."}, {"text": "Parliament petitioned the king directly and he was legally required to respond within a fixed period.", "isCorrect": false, "rationale": "No such legal mechanism compelled Charles; military necessity forced his hand."}, {"text": "A plague epidemic required Parliament to authorize public health measures.", "isCorrect": false, "rationale": "The cause was military and financial, not a public health emergency."}]}, {"question": "In the English Civil War, what did the terms 'Cavaliers' and 'Roundheads' refer to?", "options": [{"text": "Cavaliers were cavalry soldiers; Roundheads were infantry troops.", "isCorrect": false, "rationale": "These were political-military factions, not descriptions of military branch."}, {"text": "Cavaliers supported the king; Roundheads supported Parliament. The latter nickname came from their short-cropped hair.", "isCorrect": true, "rationale": "The text defines both terms: Cavaliers were royalists and Roundheads were Parliamentary supporters named for their hairstyle."}, {"text": "Cavaliers were Catholic nobles; Roundheads were Protestant merchants.", "isCorrect": false, "rationale": "While religious identity played a role, the terms referred to royal vs. Parliamentary allegiance, not denomination."}, {"text": "Cavaliers were English; Roundheads were Scottish soldiers fighting in England.", "isCorrect": false, "rationale": "Both factions were primarily English; the Scottish involvement was more complex and separate."}]}, {"question": "Why was the execution of Charles I in January 1649 historically unprecedented?", "options": [{"text": "It was the first time a European monarch had been executed at all.", "isCorrect": false, "rationale": "Other monarchs had been killed, but the specific precedent was the public legal trial and execution by subjects."}, {"text": "It was the first time in European history a reigning monarch had been publicly tried and beheaded by his own subjects.", "isCorrect": true, "rationale": "The text explicitly identifies this as the first such public legal execution of a reigning monarch by his subjects in European history."}, {"text": "It was the first time Parliament had ever passed a law without royal assent.", "isCorrect": false, "rationale": "The execution was the unprecedented event; Parliament had passed legislation in various forms before."}, {"text": "It ended a royal dynasty that had ruled England for five hundred years.", "isCorrect": false, "rationale": "The Stuarts had ruled since 1603, not five hundred years, and the dynasty was later restored."}]}, {"question": "How did Oliver Cromwell's rule as Lord Protector differ from what he had fought for during the Civil War?", "options": [{"text": "Cromwell embraced Catholicism after becoming Lord Protector, reversing the Protestant cause.", "isCorrect": false, "rationale": "Cromwell remained a devout Puritan throughout his life."}, {"text": "Despite fighting against royal tyranny, Cromwell himself dissolved Parliament when it displeased him, exercising near-kingly authority.", "isCorrect": true, "rationale": "The text notes this contradiction: a genuine Puritan who believed in God's work, but an increasingly authoritarian ruler who dissolved Parliament at will."}, {"text": "Cromwell restored the Church of England and reversed all the Puritan religious reforms.", "isCorrect": false, "rationale": "Cromwell was a committed Puritan; he did not restore Catholic or Anglican practices."}, {"text": "Cromwell accepted the crown of England and formally became king in 1655.", "isCorrect": false, "rationale": "Cromwell refused the crown, ruling as Lord Protector instead, though with near-royal powers."}]}, {"question": "What event in June 1688 triggered the invitation to William of Orange to take the English throne?", "options": [{"text": "James II declared England officially Catholic and banned Protestant worship.", "isCorrect": false, "rationale": "While James favored Catholics, he did not officially convert England or formally ban Protestant worship."}, {"text": "James II's second wife gave birth to a son, guaranteeing a Catholic succession and alarming Protestant leaders.", "isCorrect": true, "rationale": "The birth of a Catholic male heir made the Catholic succession permanent in Protestant eyes, prompting the invitation to William."}, {"text": "James II signed a secret treaty with Louis XIV of France to invade the Protestant Netherlands.", "isCorrect": false, "rationale": "No such treaty is described; the trigger was the birth of a Catholic heir."}, {"text": "James II attempted to dissolve Parliament permanently and rule as an absolute monarch.", "isCorrect": false, "rationale": "James's provocations were religious appointments and suspended laws; he did not attempt to dissolve Parliament permanently."}]}, {"question": "Why is the transfer of power in 1688 called the 'Glorious Revolution'?", "options": [{"text": "It was glorious because England gained a vast new empire as a result of the change in monarchy.", "isCorrect": false, "rationale": "The term refers to the peaceful nature and constitutional significance of the change, not imperial expansion."}, {"text": "It was accomplished without a battle on English soil and permanently established Parliamentary supremacy over the monarch.", "isCorrect": true, "rationale": "The text defines it precisely this way: nearly bloodless and constitutionally transformative."}, {"text": "It was glorified by the Catholic Church as a model of peaceful religious coexistence.", "isCorrect": false, "rationale": "The revolution displaced a Catholic king and established Protestant constitutional rule; the Catholic Church did not celebrate it."}, {"text": "It was called glorious because William of Orange won a decisive military victory over James II's army.", "isCorrect": false, "rationale": "James II's support collapsed and he fled; there was no decisive battle on English soil."}]}, {"question": "What specific rights did the English Bill of Rights (1689) establish?", "options": [{"text": "Universal male suffrage, freedom of religion, and the right to bear arms.", "isCorrect": false, "rationale": "The Bill of Rights did not establish universal suffrage; only a small fraction of the population could vote after 1689."}, {"text": "That the monarch could not suspend laws, levy taxes, or keep a standing army without Parliament; that elections be free; and that excessive bail and cruel punishments be prohibited.", "isCorrect": true, "rationale": "The text quotes these specific provisions directly from the Bill of Rights."}, {"text": "That Parliament could pass laws without royal assent if a two-thirds majority voted for them.", "isCorrect": false, "rationale": "No such provision is described; the Bill addressed royal abuses, not Parliamentary override procedures."}, {"text": "That all subjects of the crown had the right to a jury trial in all criminal and civil cases.", "isCorrect": false, "rationale": "Jury trial rights existed separately; the Bill addressed the specific abuses of the Stuart monarchs."}]}, {"question": "What is habeas corpus, and when was it strengthened in English law?", "options": [{"text": "A law preventing Parliament from passing bills of attainder; strengthened in 1628.", "isCorrect": false, "rationale": "Habeas corpus protects against imprisonment without charge; bills of attainder are a separate issue, and the key date is 1679."}, {"text": "A legal protection preventing imprisonment without charge and requiring the prisoner be brought before a court; confirmed by the Habeas Corpus Act of 1679.", "isCorrect": true, "rationale": "The text defines it exactly this way: the Latin means 'you shall have the body' and it was strengthened by the 1679 Act."}, {"text": "The right to petition the king without fear of prosecution; established in the Petition of Right (1628).", "isCorrect": false, "rationale": "The right to petition is a related but distinct protection; habeas corpus concerns imprisonment."}, {"text": "A requirement that all laws be written in English rather than Latin; established under Henry VIII.", "isCorrect": false, "rationale": "This is unrelated; habeas corpus is a specific legal protection against arbitrary imprisonment."}]}, {"question": "How does John Milton's Areopagitica (1644) connect to later developments in constitutional freedom?", "options": [{"text": "Milton argued that Parliament should have absolute authority over all publications, which became the model for Parliamentary sovereignty.", "isCorrect": false, "rationale": "Milton argued the opposite: against Parliamentary censorship of publications."}, {"text": "Milton's argument that truth will defeat falsehood in open debate without government help became foundational for freedom of the press, influencing Locke and the First Amendment.", "isCorrect": true, "rationale": "The text traces this lineage explicitly: Milton to Locke to the American founders to the First Amendment."}, {"text": "Areopagitica immediately succeeded in ending the Licensing Order of 1643, making England the first country with press freedom.", "isCorrect": false, "rationale": "Parliament ignored Milton's work; the Licensing Act only lapsed in 1695, six years after his death."}, {"text": "Milton's work inspired the French Declaration of the Rights of Man (1789) more directly than any other English text.", "isCorrect": false, "rationale": "The text connects Milton's influence to English and American developments, not primarily to France."}]}, {"question": "In Shakespeare's Henry V, what is the central tension in the night-before-battle exchange between Henry and the soldier Williams?", "options": [{"text": "Whether the king has the right to demand military service from common men.", "isCorrect": false, "rationale": "The exchange focuses on moral responsibility for deaths, not on the legality of military service."}, {"text": "Whether the king bears moral responsibility for the souls of soldiers who die in his cause, and whether his cause is just.", "isCorrect": true, "rationale": "Williams asks whether a bad cause makes the king responsible for soldiers' souls; Henry responds that duty belongs to the king but each soul is the subject's own."}, {"text": "Whether common soldiers should receive the same pay as officers, which Henry promises to reform.", "isCorrect": false, "rationale": "Pay equity is not the subject; the exchange is about moral and spiritual responsibility."}, {"text": "Whether France has legitimate sovereignty over the territories Henry plans to conquer.", "isCorrect": false, "rationale": "The legal claim to French territory is a separate matter; the nighttime exchange is about moral responsibility for life and death."}]}, {"question": "What principle of constitutional government did the Glorious Revolution and the English Bill of Rights permanently establish?", "options": [{"text": "That the Church of England had supreme authority over matters of law and taxation.", "isCorrect": false, "rationale": "The revolution strengthened Parliament, not the Church, as the supreme authority."}, {"text": "Parliamentary supremacy: that Parliament is the supreme law-making authority and no monarch may override or ignore Acts of Parliament.", "isCorrect": true, "rationale": "The text defines parliamentary supremacy precisely this way and states it has governed England ever since."}, {"text": "That England would become a republic with an elected president replacing the monarchy.", "isCorrect": false, "rationale": "The Glorious Revolution preserved the monarchy but subordinated it to Parliament; it did not create a republic."}, {"text": "That all future monarchs must be born in England and educated as Protestants.", "isCorrect": false, "rationale": "While the Act of Settlement (1701) addressed succession, the Bill of Rights focused on constitutional limits on royal power."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
