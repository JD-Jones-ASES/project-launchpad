    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Middle_School_Humanities_III.html">&larr; Back to History &amp; Humanities III</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">History &amp; Humanities III &mdash; Chapter 3, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which event is considered the immediate trigger for the start of the Thirty Years' War?", "options": [{"text": "The Battle of White Mountain", "isCorrect": false, "rationale": "The Battle of White Mountain was a significant early battle during the Bohemian Phase, but it occurred two years after the war began, not as its trigger."}, {"text": "The Defenestration of Prague", "isCorrect": true, "rationale": "The text explicitly states that the Defenestration of Prague, where Protestant noblemen threw royal officials from a window, 'touched off the Thirty Years' War'."}, {"text": "The assassination of Gustavus Adolphus", "isCorrect": false, "rationale": "Gustavus Adolphus was a key figure in the Swedish Phase of the war, dying in 1632, many years after the war had already begun."}, {"text": "The issuing of the Edict of Restitution", "isCorrect": false, "rationale": "The Edict of Restitution was issued in 1629 during the Danish Phase of the war, a decade after the conflict's commencement."}]}, {"question": "The text describes the Thirty Years' War as unique because its character evolved from what initial conflict motivation to what eventual motivation?", "options": [{"text": "Economic competition to territorial expansion", "isCorrect": false, "rationale": "While economic and territorial factors were present, the text highlights a more fundamental shift from religious to political motivations as the defining characteristic of the war's evolution."}, {"text": "Dynastic disputes to colonial rivalry", "isCorrect": false, "rationale": "Dynastic disputes were often intertwined with European conflicts, but the primary shift emphasized here is not towards colonial rivalry, but rather the nature of political power within Europe itself."}, {"text": "Religious differences to political power struggles", "isCorrect": true, "rationale": "The text explicitly states: 'It began as a conflict over religion and ended as a struggle for political power,' marking it as 'the last of the religious wars and the first of the modern wars.'"}, {"text": "Social class unrest to nationalistic movements", "isCorrect": false, "rationale": "Nationalistic movements as understood today were not the primary shift during this period. The focus was on the interests of states and rulers, moving beyond purely religious alignment."}]}, {"question": "Cardinal Richelieu's decision to openly fund Protestant armies against the Catholic Habsburgs during the French Phase of the Thirty Years' War is the quintessential example of which political principle?", "options": [{"text": "Divine Right of Kings", "isCorrect": false, "rationale": "Divine Right of Kings justifies a monarch's authority by God's will; it does not explain prioritizing state interests over religious alignment in foreign policy."}, {"text": "Balance of Power", "isCorrect": false, "rationale": "While maintaining a balance of power was a strategic goal, 'raison d'état' specifically describes the principle of prioritizing national interest above all else, which guided Richelieu's actions."}, {"text": "Raison d'état", "isCorrect": true, "rationale": "The text directly defines 'raison d'état' as a government taking actions, even morally questionable ones, for the nation's political interests and security, and explicitly states Richelieu 'used this principle to justify funding Protestant armies against the Catholic Habsburgs.'"}, {"text": "Ecumenicalism", "isCorrect": false, "rationale": "Ecumenicalism refers to the promotion of unity among Christian churches. Richelieu's actions were the opposite, exploiting religious divisions for political gain."}]}, {"question": "At the outbreak of the Thirty Years' War, which statement most accurately characterizes the Holy Roman Empire?", "options": [{"text": "A unified Catholic state under a powerful emperor", "isCorrect": false, "rationale": "The text states the Empire was 'deeply, dangerously divided between Catholics and Protestants' and that its 'uneasy truce' was breaking down, indicating it was far from unified or solely Catholic."}, {"text": "A highly centralized monarchy with vast territories", "isCorrect": false, "rationale": "The text quotes Voltaire joking that it was 'neither holy, nor Roman, nor much of an empire,' implying it lacked true imperial unity or centralized control."}, {"text": "A collection of religiously divided territories with limited imperial authority", "isCorrect": true, "rationale": "The text describes it as 'a vast, sprawling collection of kingdoms, duchies, bishoprics, and free cities' that was 'dangerously divided between Catholics and Protestants,' where 'each prince could choose the religion of his territory,' indicating decentralized control."}, {"text": "An alliance of independent Protestant states seeking to dismantle Catholicism", "isCorrect": false, "rationale": "While it contained Protestant territories, the Holy Roman Empire was not an alliance of independent Protestant states, nor was its primary goal to dismantle Catholicism outright at the war's onset; rather, it was the site of conflict over this very issue."}]}, {"question": "What was the primary objective of Emperor Ferdinand II in issuing the Edict of Restitution during the Danish Phase of the war?", "options": [{"text": "To establish religious tolerance throughout the empire", "isCorrect": false, "rationale": "The Edict of Restitution aimed to reverse Protestant gains and strengthen Catholicism, directly opposing religious tolerance."}, {"text": "To reclaim Catholic church property seized by Protestants", "isCorrect": true, "rationale": "The text explicitly states the Edict 'demanding that Protestants return all Catholic church property seized since 1552,' making this its primary objective."}, {"text": "To negotiate a peaceful settlement with Danish Protestants", "isCorrect": false, "rationale": "The Edict was an assertion of imperial power and Catholic dominance after military victories, not a negotiation for peace with Protestants."}, {"text": "To grant more autonomy to local princes", "isCorrect": false, "rationale": "The Edict was an imposition of imperial will that reduced the autonomy of Protestant princes regarding their religious territories, rather than granting more."}]}, {"question": "King Gustavus Adolphus of Sweden earned the title 'Lion of the North' due to his leadership and innovations in what area?", "options": [{"text": "Diplomacy and peace negotiations", "isCorrect": false, "rationale": "While a leader, Gustavus Adolphus is primarily celebrated in the text for his military achievements and innovations, not diplomatic ones."}, {"text": "Naval exploration and trade expansion", "isCorrect": false, "rationale": "Gustavus Adolphus's fame came from his land campaigns and military reforms within Germany, not from naval or trade exploits."}, {"text": "Military tactics and army reorganization", "isCorrect": true, "rationale": "The text states Gustavus 'reorganized the Swedish army with new tactics — faster artillery, disciplined infantry, mobile cavalry — and drove deep into Germany,' directly linking his fame to military innovation."}, {"text": "Religious reform and theological writing", "isCorrect": false, "rationale": "Though a Lutheran Protestant, his primary impact described here was as a military commander, not a religious reformer or theologian."}]}, {"question": "Which of the three core principles established by the Peace of Westphalia most directly challenged the traditional medieval authority of the Pope or Holy Roman Emperor over diverse European territories?", "options": [{"text": "Equality of sovereign states", "isCorrect": false, "rationale": "Equality of sovereign states ensures equal legal standing for all states, but state sovereignty directly addresses internal authority over external religious or imperial dictates."}, {"text": "Non-interference", "isCorrect": false, "rationale": "Non-interference prevents external meddling, but state sovereignty is the principle that grants the ruler the ultimate internal authority in the first place, thus challenging external religious or imperial claims."}, {"text": "Collective security alliances", "isCorrect": false, "rationale": "Collective security alliances are not one of the three core principles explicitly listed for the Peace of Westphalia."}, {"text": "State sovereignty", "isCorrect": true, "rationale": "The text defines state sovereignty as 'Each ruler has supreme authority within his own territory. No pope or emperor can override him on matters of religion or internal governance,' directly challenging the traditional medieval roles of these figures."}]}, {"question": "Hugo Grotius's seminal work, The Rights of War and Peace, is significant for laying the groundwork for what modern concept?", "options": [{"text": "Absolute monarchy", "isCorrect": false, "rationale": "Grotius's work, by arguing for natural laws binding nations, implicitly placed limits on the absolute power of sovereigns, contrasting with the principles of absolute monarchy."}, {"text": "Mercantilist economic policy", "isCorrect": false, "rationale": "Mercantilism is an economic theory; Grotius's focus was on legal and moral principles governing relations between states, not economic policy."}, {"text": "International law", "isCorrect": true, "rationale": "The text explicitly states Grotius 'is called the 'father of international law'' for his argument that nations are subject to a natural law that binds them even in war."}, {"text": "Religious toleration", "isCorrect": false, "rationale": "While his ideas might indirectly contribute to a framework where religious toleration could emerge, his direct contribution was to the laws governing conduct between states, not internal religious policy."}]}, {"question": "Louis XIV's revocation of the Edict of Nantes and the subsequent Huguenot diaspora had what primary long-term consequence for France?", "options": [{"text": "It significantly bolstered France's military strength", "isCorrect": false, "rationale": "The revocation led to a loss of skilled soldiers and craftsmen, which would weaken, not bolster, military strength and overall national capacity."}, {"text": "It led to greater religious unity and prosperity within France", "isCorrect": false, "rationale": "While it achieved religious uniformity, it came at a 'catastrophic miscalculation' cost, leading to economic and human loss rather than prosperity."}, {"text": "It weakened France's economy and enriched its Protestant rivals", "isCorrect": true, "rationale": "The text states that 'some 200,000 to 400,000 Huguenots fled France, taking their skills as craftsmen, merchants, and soldiers to England, the Dutch Republic, Prussia, and South Africa. This Huguenot diaspora strengthened France's rivals while weakening France itself.'"}, {"text": "It fostered stronger diplomatic ties with other Catholic nations", "isCorrect": false, "rationale": "The revocation was an internal policy primarily driven by religious intolerance; its main impact described was the weakening of France and strengthening of its rivals, not a primary diplomatic benefit with other nations."}]}, {"question": "A modern nation-state operating under the principles of Westphalia would be expected to uphold which of the following actions concerning another sovereign state?", "options": [{"text": "Offering military assistance to an internal rebel group based on shared religious beliefs", "isCorrect": false, "rationale": "This action would violate the principle of non-interference in the internal affairs of another sovereign state."}, {"text": "Imposing economic sanctions to influence another state's internal political structure", "isCorrect": false, "rationale": "While economic sanctions are a tool of modern diplomacy, actively interfering to change another state's internal political structure is generally seen as a violation of the Westphalian principle of non-interference."}, {"text": "Respecting the right of another state to determine its own internal laws and religion", "isCorrect": true, "rationale": "This action directly aligns with the Westphalian principles of state sovereignty ('Each ruler has supreme authority within his own territory') and non-interference ('No state has the right to interfere in the internal affairs of another sovereign state')."}, {"text": "Demanding that another state adopt a specific form of government for regional stability", "isCorrect": false, "rationale": "Demanding a specific form of government constitutes interference in the internal affairs of another state and disrespects its sovereignty."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
