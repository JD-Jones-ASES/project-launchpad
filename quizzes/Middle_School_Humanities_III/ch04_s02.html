<script>
var QUESTIONS = [{"question": "What is the primary purpose of John Locke's concept of the 'state of nature' in the Second Treatise of Government?", "options": [{"text": "To provide a historical account of pre-governmental societies and their evolution.", "isCorrect": false, "rationale": "Locke explicitly states that the state of nature is 'not a historical claim' but a philosophical thought experiment."}, {"text": "To explore the inherent rights and freedoms that human beings possess simply by virtue of being human, independent of any government.", "isCorrect": true, "rationale": "The text explains Locke's state of nature as a thought experiment to determine 'what rights do human beings have simply by virtue of being human, apart from any law or government?'"}, {"text": "To justify the divine right of kings by illustrating humanity's need for a sovereign authority.", "isCorrect": false, "rationale": "Locke's First Treatise explicitly demolished the divine right of kings, and the Second Treatise argues against natural authority, emphasizing consent."}, {"text": "To describe a chaotic and lawless society that would exist without any form of organized government.", "isCorrect": false, "rationale": "While 'perfect freedom,' Locke's state of nature is constrained 'within the bounds of the law of nature,' implying a moral order, not pure chaos."}], "id": "q01"}, {"question": "How does Locke's understanding of the 'law of nature' relate to earlier philosophical and religious traditions?", "options": [{"text": "He completely invents the concept of natural rights, making it unique to his Enlightenment philosophy.", "isCorrect": false, "rationale": "The text explicitly states, 'Locke is not inventing natural rights from scratch' but building on existing traditions."}, {"text": "He redefines it as solely a product of human reason, entirely separate from any religious or historical context.", "isCorrect": false, "rationale": "Locke translates 'a Christian natural law tradition into a new political vocabulary,' showing a clear link to historical and religious contexts."}, {"text": "He translates an existing Christian natural law tradition, informed by thinkers like Aquinas, into a new political vocabulary.", "isCorrect": true, "rationale": "The passage states Locke 'is translating a Christian natural law tradition into a new political vocabulary,' referencing Stoics, St. Paul, and Aquinas."}, {"text": "He argues against the Stoic and Thomistic views of natural law, dismissing them as irrelevant to modern governance.", "isCorrect": false, "rationale": "Locke incorporates these traditions rather than dismissing them, acknowledging their historical precedents for the concept."}], "id": "q02"}, {"question": "Based on John Locke's concept of property as a natural right that precedes government, what would be the most significant implication for a traditional feudal system?", "options": [{"text": "It would reinforce the king's ultimate ownership of all land, as a natural right of the sovereign.", "isCorrect": false, "rationale": "Under feudalism, the king owned all land in principle, but Locke argues property is a natural right belonging to the individual, challenging this hierarchy."}, {"text": "It would directly challenge the hierarchical structure of land ownership by asserting that individuals have inherent claims to property, independent of a monarch's grant.", "isCorrect": true, "rationale": "The teacher's note clarifies that 'Locke argues the opposite: property is a natural right that precedes government,' which was 'genuinely revolutionary for European thinking' by undermining feudal hierarchy."}, {"text": "It would lead to the redistribution of all land to ensure equal ownership among all citizens.", "isCorrect": false, "rationale": "While emphasizing individual rights, Locke's theory doesn't necessarily dictate equal redistribution, but rather the principle of individual ownership and its protection by government."}, {"text": "It would have no significant impact, as feudalism is primarily a system of military service, not property rights.", "isCorrect": false, "rationale": "Feudalism was fundamentally a system of land tenure tied to service, making Locke's ideas on property highly relevant and contradictory to its core tenets."}], "id": "q03"}, {"question": "Voltaire's novel Candide primarily aims to achieve which of the following?", "options": [{"text": "To advocate for a specific religious doctrine as the ultimate source of comfort and meaning.", "isCorrect": false, "rationale": "Voltaire ferociously attacked the institutional Church and its practices, rather than promoting a specific doctrine, especially through satire."}, {"text": "To provide a detailed historical account of the Lisbon earthquake and the Portuguese Inquisition.", "isCorrect": false, "rationale": "While these events serve as background, Candide is a satirical novel, not a historical document, used to make a philosophical point."}, {"text": "To satirically refute the philosophical notion that humanity lives in 'the best of all possible worlds,' often called optimism.", "isCorrect": true, "rationale": "The text states Candide 'demolishes false optimism with devastating wit' and was written as a 'refutation of the philosopher Leibniz's claim that we live in “the best of all possible worlds.”'"}, {"text": "To celebrate human resilience and the ultimate triumph of good over evil in the face of adversity.", "isCorrect": false, "rationale": "Candide's journey is one of 'disillusionment,' and its satire is aimed at the absurdity of false optimism, not a celebration of inherent good."}], "id": "q04"}, {"question": "In Candide's Chapter 6, Voltaire's depiction of the auto-da-fé after the Lisbon earthquake primarily serves to:", "options": [{"text": "Demonstrate the effectiveness of religious rituals in appeasing divine wrath and preventing further natural disasters.", "isCorrect": false, "rationale": "Voltaire's portrayal is satirical, highlighting the irrationality of the Inquisition's actions rather than their effectiveness."}, {"text": "Highlight the profound faith and piety of the Portuguese Inquisition members in their efforts to protect the kingdom.", "isCorrect": false, "rationale": "The text specifies that Voltaire's 'target is not God but the human institution that would torture and kill people in God's name, and then convince itself that this made the world better,' implying critique, not praise."}, {"text": "Critique human institutions that inflict cruelty in the name of God and rationalize their actions as morally beneficial.", "isCorrect": true, "rationale": "The passage clearly states, 'Voltaire's target is not God but the human institution that would torture and kill people in God's name, and then convince itself that this made the world better.'"}, {"text": "Argue for the necessity of strong governmental authority and decisive action in times of national crisis.", "isCorrect": false, "rationale": "While the Inquisition represents authority, the focus of the critique is on their methods and their self-serving justifications, not the general principle of authority."}], "id": "q05"}, {"question": "The enslaved man's argument in Candide, Chapter 19, that 'if what these preachers say is true, we are all second cousins; and I must own no one could treat his relations in a more barbarous manner,' is a direct challenge to what Enlightenment-era hypocrisy?", "options": [{"text": "The scientific community's failure to definitively prove the common ancestry of all humans.", "isCorrect": false, "rationale": "The challenge is moral and theological, not scientific, pointing to a contradiction between stated beliefs and actions."}, {"text": "The economic necessity of slavery for the production of cheap goods in Europe, despite its ethical implications.", "isCorrect": false, "rationale": "While the passage highlights the economic aspect, the enslaved man's quote specifically targets the moral inconsistency with Christian teaching, not the economic rationale itself."}, {"text": "The contradiction between Christian teachings of universal brotherhood and the inhumane practice of slavery.", "isCorrect": true, "rationale": "The note explicitly states this passage anticipates 'the contradiction between Christian teaching ('all men are children of Adam') and the practice of slavery.'"}, {"text": "The philosophical concept of the 'state of nature' as a state of perfect freedom and equality for all.", "isCorrect": false, "rationale": "While the passage reveals a lack of freedom, the specific quote targets religious hypocrisy, not Locke's philosophical concept, though they are related themes of human rights."}], "id": "q06"}, {"question": "Voltaire's concluding message in Candide, 'we must cultivate our garden,' is best interpreted as:", "options": [{"text": "A call for complete withdrawal from society and a rejection of all forms of political or social engagement.", "isCorrect": false, "rationale": "The teacher's note clarifies this is not 'defeatism' or ignoring the world's problems, but a call to action at a local scale."}, {"text": "An endorsement of grand philosophical theories as the ultimate solution to human suffering.", "isCorrect": false, "rationale": "The note states that grand philosophical systems 'are useless and dishonest,' making this option incorrect."}, {"text": "A recommendation for practical, local action and humility in the face of complex global problems, rejecting abstract philosophical systems.", "isCorrect": true, "rationale": "The teacher's note explains it means 'grand philosophical systems... are useless and dishonest' and 'the answer to suffering is not theory but work—practical effort to make the immediate world better.'"}, {"text": "A cynical declaration that human suffering is inevitable and beyond any possible remedy.", "isCorrect": false, "rationale": "The note explicitly states, 'It is not the same as cynicism or despair.'"}], "id": "q07"}, {"question": "What was the primary motivation behind René Descartes' 'method of doubt' as described in Discourse on Method?", "options": [{"text": "To justify the beliefs absorbed from his teachers and traditional books.", "isCorrect": false, "rationale": "Descartes' method was designed to challenge these beliefs, not justify them without examination."}, {"text": "To establish a foundation of certain knowledge by systematically rejecting any belief that could possibly be doubted.", "isCorrect": true, "rationale": "The text states he 'resolved to accept nothing as certain unless it was so clear and distinct to his reason that no doubt was possible.'"}, {"text": "To promote skepticism as the only valid approach to understanding the world, leading to a rejection of all knowledge.", "isCorrect": false, "rationale": "His goal was to build knowledge from scratch, not to reject all knowledge, but to find certainty."}, {"text": "To demonstrate the superiority of traditional Latin scholarship over contemporary French philosophical writing.", "isCorrect": false, "rationale": "He wrote in French specifically 'so that ordinary educated people, not just scholars, could read it,' contradicting this."}], "id": "q08"}, {"question": "Considering John Locke, Voltaire, and René Descartes, a central theme that broadly unifies their contributions to the Enlightenment is:", "options": [{"text": "The unwavering belief in the absolute authority of traditional institutions and dogma as guides for society.", "isCorrect": false, "rationale": "All three, in different ways (Locke on government, Voltaire on Church, Descartes on inherited beliefs), challenged traditional authorities and dogmas."}, {"text": "An emphasis on human reason and individual thought as critical tools for understanding the world, society, and self.", "isCorrect": true, "rationale": "Locke used reason to derive natural rights and consent, Voltaire used wit to critique irrationality, and Descartes' method of doubt centered on individual reason to build knowledge. This is a core Enlightenment theme."}, {"text": "The promotion of a return to pre-Reformation theological principles as the foundation for modern thought.", "isCorrect": false, "rationale": "The Enlightenment generally moved away from strict theological control, even while engaging with religious ideas (e.g., Voltaire's Deism)."}, {"text": "A shared advocacy for absolute monarchy as the most stable and effective form of government.", "isCorrect": false, "rationale": "Locke argued for government by consent and the right to revolution, which is directly opposed to absolute monarchy."}], "id": "q09"}, {"question": "Imagine a modern government consistently imposes taxes without the consent of its citizens and uses those funds to suppress dissent and limit individual freedoms. Which principle from Locke's Second Treatise of Government would be most directly violated, and what right would the people have?", "options": [{"text": "The 'law of nature' would be violated, but citizens would have no recourse as government is inherently supreme.", "isCorrect": false, "rationale": "Locke grants people the right to resist and replace a government that violates natural rights and the social contract."}, {"text": "The principle of 'state of equality' would be violated, and the people would have the right to politely petition the government for change.", "isCorrect": false, "rationale": "While equality is violated, Locke's view on government dissolution provides a more radical remedy than polite petitioning when the 'breach of trust' is severe."}, {"text": "The 'social contract' would be broken due to a breach of trust, giving the people the right and duty to replace the government.", "isCorrect": true, "rationale": "Locke states if the legislative 'shall transgress this fundamental rule of society' by seeking 'absolute power over the lives, liberties, and estates of the people; by this breach of trust they forfeit the power... the people are at liberty to provide for themselves, by erecting a new legislative.'"}, {"text": "The concept of 'property as a natural right' would be irrelevant, as taxation is a legitimate governmental prerogative.", "isCorrect": false, "rationale": "Locke argues that the reason men enter society is the 'preservation of their property,' and imposing taxes without consent, and suppressing freedom, directly attacks this fundamental right."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
