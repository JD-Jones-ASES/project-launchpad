        <a href="../../courses/Middle_School_Humanities_III.html">&larr; Back to History &amp; Humanities III</a>
    </div>

    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "The introduction to the 'Literature' section states that Shakespeare's Henry V, Milton's Areopagitica, and the English Bill of Rights share a common theme. What central question do these texts collectively explore?", "options": [{"text": "How does military strength determine a nation's sovereignty?", "isCorrect": false, "rationale": "While military strength is a factor in Henry V, it is not the overarching theme that connects all three texts discussed in the introduction."}, {"text": "What grants authority its legitimate right to govern?", "isCorrect": true, "rationale": "The introduction explicitly states, 'Each asks the same question: What gives authority its right to rule?' referring to all three texts."}, {"text": "To what extent should religious beliefs dictate state policy?", "isCorrect": false, "rationale": "Religious tension is mentioned as context for Henry V, but the core theme shared by all three texts is not primarily about religious policy."}, {"text": "How do individuals secure personal wealth and property rights?", "isCorrect": false, "rationale": "Property rights are tangentially related to some aspects of the Bill of Rights, but this is not the broad question that unifies all three literary pieces as described."}]}, {"question": "In Henry V, when a soldier questions the king's responsibility for the souls of those who die in an unjust cause, King Henry replies, 'Every subject's duty is the king's; but every subject's soul is his own.' What does this statement reveal about Henry's view of kingship and individual responsibility?", "options": [{"text": "Henry believes that a king bears no moral burden for the actions of his soldiers.", "isCorrect": false, "rationale": "Henry acknowledges the subject's 'duty is the king's,' indicating a shared burden of outcome, but separates the spiritual accountability for the soul."}, {"text": "Henry asserts that while soldiers owe the king their service, their spiritual fate is a matter of personal conscience, not royal command.", "isCorrect": true, "rationale": "Henry clearly distinguishes between the 'subject's duty' to the king (service in battle) and the 'subject's soul' as being 'his own,' thereby placing ultimate spiritual accountability on the individual, not the monarch."}, {"text": "Henry suggests that soldiers are solely responsible for discerning the justice of the king's cause before battle.", "isCorrect": false, "rationale": "The statement focuses on post-action spiritual accountability rather than pre-battle discernment of justice, and Henry does not explicitly grant soldiers that specific responsibility."}, {"text": "Henry implies that the king's cause is always just, making the question of individual souls irrelevant.", "isCorrect": false, "rationale": "Henry's response acknowledges the soldier's concern about the cause's justice by partitioning responsibility, rather than dismissing the concern as irrelevant. He doesn't state his cause is inherently just."}]}, {"question": "In his St. Crispin's Day speech, King Henry declares that anyone who fights with him 'shall be my brother; be he ne'er so vile, This day shall gentle his condition.' The 'teachernote' highlights this as a 'radical claim.' What makes this claim particularly radical in the context of Elizabethan society?", "options": [{"text": "It suggests that the king himself is willing to fight alongside common soldiers, blurring social distinctions.", "isCorrect": false, "rationale": "While Henry does appear disguised among his men, the radicalism of 'gentle his condition' refers to social elevation, not merely fighting alongside. Kings often led armies from the front."}, {"text": "It implies that military victory can erase past misdeeds and grant forgiveness for crimes.", "isCorrect": false, "rationale": "'Gentle his condition' specifically refers to being raised to noble rank, not to legal or moral absolution for past crimes."}, {"text": "It challenges the rigid hierarchy of a society where status and dignity were primarily determined by birth and hereditary privilege.", "isCorrect": true, "rationale": "In a society 'governed by birth and hereditary privilege,' the promise to 'gentle his condition' (raise to noble rank) for simply fighting alongside the king was a profoundly radical assertion of social mobility based on merit/action rather than birth."}, {"text": "It prioritizes personal loyalty to the king over traditional feudal obligations to local lords.", "isCorrect": false, "rationale": "While loyalty is a key theme, the radical claim specifically highlighted is the elevation of commoners to noble status, which directly confronts the established social order based on birthright."}]}, {"question": "The 'teachernote' on Henry's St. Crispin's Day speech encourages students to consider if Henry 'means what he says? Or is this effective wartime rhetoric?' Which of the following statements best captures the essence of this ambiguity?", "options": [{"text": "The speech's effectiveness depends entirely on the soldiers' pre-existing loyalty to the king.", "isCorrect": false, "rationale": "This focuses on the prerequisite for effectiveness rather than the dual nature of Henry's own words and intentions, which is the core of the ambiguity discussed."}, {"text": "Henry's words could be a genuine expression of social egalitarianism or a masterful manipulation to inspire outnumbered troops.", "isCorrect": true, "rationale": "This option directly mirrors the 'Does Henry mean what he says? Or is this effective wartime rhetoric?' question posed in the teachernote, presenting both possible interpretations of his radical claim."}, {"text": "The play deliberately avoids taking a stance on the justice of the war itself.", "isCorrect": false, "rationale": "The ambiguity discussed in the teachernote is specifically about the sincerity and intent behind Henry's promise of social elevation, not the broader justice of the war itself."}, {"text": "Shakespeare often writes speeches that are intentionally confusing to challenge the audience.", "isCorrect": false, "rationale": "This is a generalization about Shakespeare's style and doesn't address the specific, deliberate ambiguity within Henry's speech as highlighted by the teachernote."}]}, {"question": "John Milton's Areopagitica is presented as the first great argument for freedom of the press. What is the fundamental principle Milton asserts will allow truth to prevail over falsehood?", "options": [{"text": "Government intervention is necessary to guide public opinion toward truth.", "isCorrect": false, "rationale": "Milton directly argued against government intervention and censorship, believing it hinders truth."}, {"text": "Truth possesses an inherent strength that enables it to overcome falsehood in open and unfettered debate.", "isCorrect": true, "rationale": "Milton states, 'And though all the winds of doctrine were let loose to play upon the earth, so Truth be in the field, we do injuriously by licensing and prohibiting to misdoubt her strength. Let her and Falsehood grapple; who ever knew Truth put to the worse, in a free and open encounter?'"}, {"text": "Suppressing dangerous ideas prevents their spread and protects society from moral decay.", "isCorrect": false, "rationale": "Milton argued that suppressing ideas only 'drives them underground, where they become more dangerous.'"}, {"text": "Only qualified censors can accurately distinguish between beneficial and harmful publications.", "isCorrect": false, "rationale": "Milton questions 'who, he asks, is qualified to judge which ideas deserve to be heard?' suggesting the impossibility of finding such censors."}]}, {"question": "The 'keyconcept' box notes that Milton's Areopagitica became 'foundational for later liberal thought.' How did Milton's arguments most directly influence future legal frameworks, particularly in the United States?", "options": [{"text": "They led to the establishment of government-funded public education systems.", "isCorrect": false, "rationale": "Milton's arguments were primarily focused on the freedom of expression and the press, not public education systems."}, {"text": "They inspired constitutional guarantees of freedom of speech and the press, like the First Amendment.", "isCorrect": true, "rationale": "The text explicitly states: 'John Locke built on it; the American founders built on Locke. The First Amendment to the United States Constitution (1791) reflects Milton's argument directly.'"}, {"text": "They resulted in strict regulations on the publication of religious texts to ensure doctrinal purity.", "isCorrect": false, "rationale": "Milton argued for open debate and freedom of conscience, which is the opposite of strict regulations on religious texts."}, {"text": "They established the precedent for parliamentary oversight of all artistic and literary works.", "isCorrect": false, "rationale": "Milton's work was a direct argument against parliamentary censorship and oversight of publications."}]}, {"question": "The English Bill of Rights (1689) is described as 'not a request; it was a declaration of existing law.' What does this distinction signify about its purpose and the shift in power it represented?", "options": [{"text": "It meant Parliament was simply asking the new monarchs to consider their suggestions for reform.", "isCorrect": false, "rationale": "The text explicitly states it was 'not a request,' indicating it was more than mere suggestions."}, {"text": "It underscored that Parliament was asserting its authority by presenting non-negotiable conditions for the new monarchs to accept the crown.", "isCorrect": true, "rationale": "The text states it was 'presented to William and Mary as the conditions under which they would receive the crown,' signifying a powerful assertion of parliamentary authority and non-negotiable terms."}, {"text": "It indicated that the document was merely a historical record of past legal principles, with no binding power.", "isCorrect": false, "rationale": "Although it declared 'existing law,' its presentation as conditions for the crown gave it immediate and binding power for the new monarchs."}, {"text": "It was a public appeal to the common people for support against royal tyranny.", "isCorrect": false, "rationale": "The document was a formal declaration presented to the incoming monarchs by Parliament, not primarily a public appeal to the common people."}]}, {"question": "The English Bill of Rights (1689) addressed specific abuses of the Stuart kings. Which of the following provisions directly counteracted a common abuse related to military power?", "options": [{"text": "That election of members of Parliament ought to be free.", "isCorrect": false, "rationale": "This provision addresses electoral integrity, not military abuses."}, {"text": "That excessive bail ought not to be required.", "isCorrect": false, "rationale": "This provision addresses due process and legal protections, not military abuses."}, {"text": "That the raising or keeping a standing army within the kingdom in time of peace, unless it be with consent of Parliament, is against law.", "isCorrect": true, "rationale": "The text explicitly states that 'James II had suspended laws, kept a standing army... The Bill of Rights answered each abuse directly,' and then lists this provision regarding a standing army."}, {"text": "That it is the right of the subjects to petition the king.", "isCorrect": false, "rationale": "This provision addresses freedom of petition, not military abuses."}]}, {"question": "Although the English Bill of Rights (1689) did not immediately create a democracy, it established a 'principle that no English monarch would ever reverse.' What was this fundamental principle?", "options": [{"text": "That all citizens, regardless of wealth, have the right to vote.", "isCorrect": false, "rationale": "The text explicitly states that 'only a small fraction of the population could vote,' so this was not the principle established."}, {"text": "That the monarch's power is absolute and divinely ordained.", "isCorrect": false, "rationale": "The Bill of Rights was designed to limit monarchical power and assert parliamentary supremacy, directly contradicting the idea of absolute divine right."}, {"text": "That the law is supreme, standing above the king, and Parliament holds the authority to make those laws.", "isCorrect": true, "rationale": "The text states: 'But it established a principle that no English monarch would ever reverse: the law is above the king. Parliament makes the law. The king governs within it.'"}, {"text": "That religious freedom for all faiths must be legally protected.", "isCorrect": false, "rationale": "While religious issues were significant, the fundamental principle highlighted by the text as irreversible concerned the relationship between the monarch, the law, and Parliament, not broad religious freedom."}]}, {"question": "The 'teachernote' for Henry V's St. Crispin's Day speech compares his 'gentling' of common soldiers to the English Bill of Rights. What commonality, despite their different forms and contexts, links these two texts regarding rights and dignity?", "options": [{"text": "Both documents are primarily concerned with ensuring the divine right of kings to rule without challenge.", "isCorrect": false, "rationale": "The Bill of Rights severely limits the king's power, and while Henry is a king, his speech's radical element is about elevating commoners, not divine right."}, {"text": "Both assert, in different ways, that rights, status, or dignity can extend beyond the inherited privileges of the wealthy and well-born.", "isCorrect": true, "rationale": "The teachernote asks students to compare Henry's 'gentling' of common men to the Bill of Rights, noting 'both documents assert that rights and dignity are not only for the wealthy and well-born.'"}, {"text": "Both texts advocate for the complete abolition of social hierarchies and the creation of an egalitarian society.", "isCorrect": false, "rationale": "Neither document fully abolishes social hierarchies; Henry's speech is a specific wartime promise, and the Bill of Rights still allowed Parliament to be dominated by wealthy landowners."}, {"text": "Both highlight the importance of military service as the sole pathway to social advancement and legal protection.", "isCorrect": false, "rationale": "While Henry's speech is military-focused, the Bill of Rights addresses broader legal protections for subjects regardless of military service."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
