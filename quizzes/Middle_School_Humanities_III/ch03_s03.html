    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "The Peace of Westphalia negotiations, described as 'without real precedent in European history,' were significant primarily because:", "options": [{"text": "They were the shortest peace negotiations ever, demonstrating efficiency in diplomacy.", "isCorrect": false, "rationale": "The text states the negotiations took five years, indicating they were not short, and efficiency was not highlighted as their primary significance."}, {"text": "They exclusively involved the Holy Roman Emperor and the Pope, solidifying their universal authority.", "isCorrect": false, "rationale": "The text explicitly states that Westphalia weakened the claims of the Holy Roman Emperor and the Pope, and representatives of nearly all major European powers, not just these two figures, were involved."}, {"text": "They represented the first time nearly all major European powers simultaneously negotiated a comprehensive peace, fundamentally altering international politics.", "isCorrect": true, "rationale": "The text highlights this as the unprecedented aspect: 'For the first time, representatives of nearly all the major European powers sat down simultaneously to negotiate a comprehensive peace.' This created a 'new way of organizing international politics.'"}, {"text": "They resulted in a single, unified European empire, ending centuries of fragmentation.", "isCorrect": false, "rationale": "The outcome of Westphalia was the fragmentation of the Holy Roman Empire and the establishment of sovereign states, not a unified empire."}], "id": "q01"}, {"question": "Before the Peace of Westphalia, European politics was characterized by two rival claims to universal authority. These claims were held by:", "options": [{"text": "The King of France and the King of Spain.", "isCorrect": false, "rationale": "While significant monarchs, the Kings of France and Spain did not claim universal authority over all of Christendom in the same way the Emperor and Pope did."}, {"text": "The Holy Roman Emperor and the Pope.", "isCorrect": true, "rationale": "The text clearly states, 'Before Westphalia, European politics had been organized around two rival claims to universal authority: the Holy Roman Emperor (who claimed to be the secular head of Christendom) and the Pope (who claimed spiritual supremacy over all Christian rulers).'"}, {"text": "The Ottoman Sultan and the Byzantine Emperor.", "isCorrect": false, "rationale": "These figures were relevant to European history but are not described in the text as the primary rival claimants to universal authority in pre-Westphalian Europe as it relates to this specific context."}, {"text": "The English Parliament and the Dutch Republic's States General.", "isCorrect": false, "rationale": "These were representative bodies within specific states and did not claim universal authority over Europe."}], "id": "q02"}, {"question": "Which of the following scenarios best exemplifies the 'balance of power' principle established by the Congress of Westphalia?", "options": [{"text": "A powerful nation annexes a smaller, weaker neighbor without international opposition.", "isCorrect": false, "rationale": "This scenario contradicts the balance of power, which aims to prevent any single nation from dominating and would ideally see a coalition form to protect the weaker state or check the aggressor."}, {"text": "Several states form an alliance to contain the expansionist ambitions of a rising superpower, preventing it from dictating terms to others.", "isCorrect": true, "rationale": "This directly aligns with the definition: 'If France grew too strong, England and the German states and Spain and the Dutch Republic would form a coalition to check it.' The core idea is that when one power grows too strong, others combine against it to maintain equilibrium."}, {"text": "All European nations agree to disarm completely to prevent future conflicts.", "isCorrect": false, "rationale": "The balance of power system, as described, 'still allowed wars — in fact, it required them when the balance tipped.' It was about maintaining relative strength, not disarmament."}, {"text": "A single international body is created to mediate all disputes and enforce global laws.", "isCorrect": false, "rationale": "The balance of power is about decentralized alliances among sovereign states to prevent domination, not a single, centralized international authority."}], "id": "q03"}, {"question": "The text describes Louis XIV's use of the Palace of Versailles as an 'instrument of absolutism.' Which of the following best explains this concept?", "options": [{"text": "Louis XIV used Versailles primarily to house the national treasury and centralize tax collection, enhancing his economic power.", "isCorrect": false, "rationale": "While economic control was part of his reign (mercantilism), the text focuses on Versailles' role in controlling the nobility rather than direct treasury functions."}, {"text": "Versailles served as a symbol of French cultural dominance, promoting artistic and scientific achievements across Europe.", "isCorrect": false, "rationale": "While Versailles was a magnificent cultural symbol, its primary political purpose as an 'instrument of absolutism' detailed in the text was about controlling the nobility, not just cultural promotion."}, {"text": "By requiring powerful nobles to live at court and compete for royal favor, Louis XIV centralized their loyalty and prevented them from building independent power bases.", "isCorrect": true, "rationale": "The text explicitly states Louis XIV 'required the great nobles of France to live there... This was not mere vanity. It was a calculated strategy to keep potential rivals close, dependent, and distracted from organizing opposition to royal power.'"}, {"text": "It was a strategic military fortress that protected Paris from foreign invasions, consolidating Louis XIV's defensive capabilities.", "isCorrect": false, "rationale": "Versailles was a palace, not primarily a military fortress. Its political function described was internal control over the nobility."}], "id": "q04"}, {"question": "Which of the following was a long-term consequence of the Peace of Westphalia's impact on the Holy Roman Empire?", "options": [{"text": "It immediately unified all German-speaking territories into a single, powerful nation-state.", "isCorrect": false, "rationale": "The text states the opposite: 'The Peace of Westphalia had recognized the autonomy of the Empire's hundreds of constituent territories' and that Germany would not be unified until 1871."}, {"text": "It led to a stronger central authority for the Emperor, allowing him to enforce uniform policies across the Empire.", "isCorrect": false, "rationale": "The text states the Emperor's authority was 'drastically reduced' and the Empire became 'essentially a loose confederation of hundreds of nearly independent territories.'"}, {"text": "It prevented Germany from building a unified national economy and a coherent foreign policy for over two centuries.", "isCorrect": true, "rationale": "The text directly states: 'Without a strong central state, Germany could not build a unified national economy or a coherent foreign policy... Germany would not be unified as a single nation-state until 1871 — more than two centuries after Westphalia.'"}, {"text": "It solidified the Holy Roman Empire's position as the dominant military power in Western Europe.", "isCorrect": false, "rationale": "The fragmentation weakened the Empire, while France emerged as the dominant power."}], "id": "q05"}, {"question": "After the Peace of Westphalia, the primary unit of political identity shifted from 'Christendom' to the 'nation.' This implied that:", "options": [{"text": "Religious faith became irrelevant to individual identity and loyalty.", "isCorrect": false, "rationale": "The text states, 'This does not mean religion stopped mattering. It mattered enormously.' The shift was about its role in international politics, not its personal importance."}, {"text": "Loyalty to a universal community of Christians under the Pope and Emperor superseded all other affiliations.", "isCorrect": false, "rationale": "This describes the *pre*-Westphalian view of Christendom, which 'collapsed' after 1648."}, {"text": "Individual loyalty was now primarily directed towards the sovereign state, such as France or England, rather than a universal religious community.", "isCorrect": true, "rationale": "The text explicitly states: 'After Westphalia, this vision collapsed. The primary unit of political identity became the nation... and the primary loyalty was to the sovereign state.'"}, {"text": "All nations were required to adopt a single, official state religion.", "isCorrect": false, "rationale": "While religion still mattered, the text indicates it became more of a 'private matter or a local matter,' and Westphalia treated different religious states (Catholic France, Protestant Sweden) as 'legal equals,' not imposing a single religion."}], "id": "q06"}, {"question": "Cardinal Richelieu's strategy, which positioned France as the 'biggest winner' of the Thirty Years' War, involved:", "options": [{"text": "Forming a direct alliance with the Holy Roman Emperor to dominate Europe together.", "isCorrect": false, "rationale": "Richelieu's strategy was to back the Habsburgs' (who controlled the HRE) enemies, not ally with them, leading to the fragmentation of the Empire."}, {"text": "Promoting religious unity across Europe under Catholic leadership.", "isCorrect": false, "rationale": "While France was Catholic, Richelieu's strategy was geopolitical, backing Protestant princes against the Catholic Habsburgs, not promoting religious unity."}, {"text": "Isolating France from all European conflicts to focus on internal development.", "isCorrect": false, "rationale": "France actively engaged in the war through Richelieu's strategy, which paid off in increased dominance, not isolation."}, {"text": "Backing the enemies of the Habsburgs, thereby weakening Spain and fragmenting the Holy Roman Empire.", "isCorrect": true, "rationale": "The text states, 'Cardinal Richelieu's strategy of backing the Habsburgs' enemies paid off: Spain was weakened, the Holy Roman Empire was fragmented, and France emerged as the dominant power in continental Europe.'"}], "id": "q07"}, {"question": "The 'definition' box for the Peace of Westphalia describes it as the 'birth certificate of the modern state system.' This label is justified because the treaties established:", "options": [{"text": "A universal empire that governed all of Europe under one rule.", "isCorrect": false, "rationale": "Westphalia established sovereign states and fragmented existing claims to universal empire, rather than creating a new one."}, {"text": "The exclusive right of the Pope to intervene in the internal affairs of all Christian nations.", "isCorrect": false, "rationale": "Westphalia ended the Pope's claim to authority over internal affairs of sovereign states and enshrined non-interference."}, {"text": "Principles of state sovereignty, legal equality of states, and non-interference in internal affairs.", "isCorrect": true, "rationale": "The definition explicitly states these three principles as the foundation established by the Peace of Westphalia, which remain fundamental to international relations today."}, {"text": "A system where religion was the sole determinant of a state's political power and alliances.", "isCorrect": false, "rationale": "While religion still mattered, the text notes it became 'increasingly a private matter or a local matter, not the organizing principle of international politics' after Westphalia."}], "id": "q08"}, {"question": "The tension between Westphalian sovereignty and universal human rights is a continuing challenge in modern international relations. Which situation best illustrates this tension?", "options": [{"text": "A country closes its borders to control immigration, asserting its right to manage its internal population.", "isCorrect": false, "rationale": "While related to sovereignty, this typically falls within a state's recognized rights and doesn't usually present a direct 'tension' with universal human rights in the same controversial way as intervention."}, {"text": "International courts prosecuting war criminals, asserting a law that binds all nations, even against a state's claim of internal jurisdiction.", "isCorrect": true, "rationale": "The text states, 'When international courts try war criminals, they are asserting that Grotius was right: there is a law that binds all nations, and it can be enforced,' directly conflicting with a state's absolute sovereignty over its internal affairs and citizens."}, {"text": "Nations agreeing to free trade agreements to boost their respective economies.", "isCorrect": false, "rationale": "Free trade agreements are voluntary acts of sovereign states and generally reflect cooperation rather than tension with core Westphalian principles or human rights."}, {"text": "The United Nations Security Council unanimously approving a resolution for peaceful conflict mediation between two member states.", "isCorrect": false, "rationale": "Peaceful mediation, especially if mutually agreed upon or sanctioned by an international body following its charter (which itself balances sovereignty with other aims), does not necessarily represent the *tension* between sovereignty and human rights as defined by the text."}], "id": "q09"}, {"question": "Despite its improvements over the chaos of the Thirty Years' War, the balance of power system had inherent limitations. One significant limitation mentioned in the text was that it:", "options": [{"text": "Completely abolished all forms of warfare, leading to an era of absolute peace.", "isCorrect": false, "rationale": "The text explicitly states, 'It still allowed wars — in fact, it required them when the balance tipped,' disproving the idea of absolute peace."}, {"text": "Ensured the protection of all small states from aggression by any great power.", "isCorrect": false, "rationale": "The text states it 'had no mechanism for protecting small states from great powers when the great powers agreed among themselves,' directly contradicting this option."}, {"text": "Required wars when the balance of power tipped, and offered no protection for small states against great power consensus.", "isCorrect": true, "rationale": "The text clearly states these two limitations: 'It still allowed wars — in fact, it required them when the balance tipped. And it had no mechanism for protecting small states from great powers when the great powers agreed among themselves.'"}, {"text": "Led to the immediate unification of all German territories into a strong central state.", "isCorrect": false, "rationale": "The balance of power was a principle of international relations, distinct from the internal fragmentation of the Holy Roman Empire, which actually delayed German unification."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
