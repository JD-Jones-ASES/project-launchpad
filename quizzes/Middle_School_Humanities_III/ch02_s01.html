<script>
var QUESTIONS = [{"question": "The year 1492 is described as 'The Year Everything Changed' for Spain due to a confluence of significant events. Which of the following accurately represents a major event that occurred in 1492 and its immediate impact on Spanish identity or ambition?", "options": [{"text": "The Treaty of Tordesillas was signed, formally dividing the newly discovered Americas between Spain and Portugal.", "isCorrect": false, "rationale": "The Treaty of Tordesillas was signed in 1494, not 1492, two years after Columbus's initial voyage."}, {"text": "The defeat of the Spanish Armada by England, marking a significant decline in Spain's naval power.", "isCorrect": false, "rationale": "The defeat of the Spanish Armada occurred in 1588, much later in Spain's history, and was a sign of its decline, not its rise."}, {"text": "The completion of the Reconquista and the expulsion of the Jewish population, alongside Columbus's departure to find a western route to Asia.", "isCorrect": true, "rationale": "1492 saw the fall of Granada, completing the Reconquista, the issuance of the Alhambra Decree expelling Jews, and Columbus's first voyage, all of which profoundly shaped Spain's identity and global ambitions."}, {"text": "Hernán Cortés began his conquest of the Aztec Empire, establishing Spain's first major viceroyalty in the Americas.", "isCorrect": false, "rationale": "Hernán Cortés began his conquest of the Aztec Empire in 1519, almost three decades after 1492."}], "id": "q01"}, {"question": "The Reconquista is identified as a centuries-long campaign that shaped Spanish national identity. Which statement best analyzes the long-term impact of the Reconquista on Spain's approach to its overseas expansion?", "options": [{"text": "It instilled a strong sense of economic competition, leading Spain to prioritize trade agreements over military conquest in the Americas.", "isCorrect": false, "rationale": "The text emphasizes military conquest and religious expansion rather than prioritizing trade agreements, especially given the rapid conquests of Cortez and Pizarro. The Reconquista fostered a spirit of 'defense and expansion' of Christian civilization, often through force."}, {"text": "It fostered a conviction that Christian civilization must be defended and expanded at all costs, influencing Spain's fervent missionary efforts and justification for conquest in the New World.", "isCorrect": true, "rationale": "The definition of Reconquista explicitly states it 'shaped Spanish national identity and the conviction that Christian civilization must be defended and expanded at all costs,' which directly fueled their approach to colonization and conversion in the Americas."}, {"text": "It led to a policy of religious tolerance and cultural assimilation, as Spain sought to avoid past conflicts in its new territories.", "isCorrect": false, "rationale": "The Alhambra Decree, expelling Jews in the same year the Reconquista concluded, and the forced Christianization of native populations under the encomienda system, contradict a policy of religious tolerance."}, {"text": "It encouraged the Spanish crown to consult with native populations before claiming their lands, drawing lessons from the complexities of multifaith rule in Iberia.", "isCorrect": false, "rationale": "The Treaty of Tordesillas, which divided lands without 'asking any native people's opinion,' clearly indicates that Spain did not consult native populations, directly contradicting this statement."}], "id": "q02"}, {"question": "The Treaty of Tordesillas (1494) was a pivotal agreement between Spain and Portugal. What does this treaty primarily reveal about the European powers' initial approach to newly 'discovered' lands?", "options": [{"text": "It demonstrated an early commitment to international law and dispute resolution, preventing future conflicts over colonial claims.", "isCorrect": false, "rationale": "While it was a dispute resolution, the treaty was imposed without input from the indigenous peoples, leading to massive future conflicts with other European powers and native populations, rather than preventing all future conflicts."}, {"text": "It highlighted the European assumption of sovereignty over non-European territories and peoples, allowing for the arbitrary division of lands without native consent.", "isCorrect": true, "rationale": "The text explicitly states, 'Neither treaty had asked any native people's opinion,' indicating a clear assumption by European powers that they had the right to divide and claim these lands without regard for the indigenous inhabitants."}, {"text": "It established a precedent for cooperative European exploration and shared exploitation of resources in the Americas.", "isCorrect": false, "rationale": "The treaty divided territories, making them exclusive to either Spain or Portugal, rather than promoting cooperative exploration or shared exploitation among all European powers."}, {"text": "It reflected a concern for the equitable distribution of wealth and resources among all developing colonial powers.", "isCorrect": false, "rationale": "The treaty was a bilateral agreement between Spain and Portugal, designed to secure their respective claims, not to ensure equitable distribution among all colonial powers, some of whom had yet to emerge significantly."}], "id": "q03"}, {"question": "Hernán Cortés's conquest of the Aztec Empire and Francisco Pizarro's conquest of the Inca Empire, despite their relatively small forces, demonstrated several key factors contributing to Spain's rapid success. Which factor, though not primarily military, proved most devastating to the native populations?", "options": [{"text": "The superior military training and discipline of the Spanish soldiers.", "isCorrect": false, "rationale": "While Spanish military advantages (horses, steel weapons, tactics) were significant, the text highlights disease as more devastating in terms of lives lost."}, {"text": "The political divisions and internal conflicts within the Aztec and Inca Empires.", "isCorrect": false, "rationale": "Political divisions were a factor, but the text specifically states that 'smallpox... killed far more than Spanish swords ever did,' emphasizing disease as the most devastating factor."}, {"text": "The lack of immunity among the native populations to European diseases like smallpox.", "isCorrect": true, "rationale": "The text explicitly states, 'Disease played a devastating role: smallpox, to which the native population had no immunity, swept through the city during the siege, killing far more than Spanish swords ever did.'"}, {"text": "The advanced navigational technologies that allowed the Spanish to surprise their opponents.", "isCorrect": false, "rationale": "Navigational technology enabled their arrival, but it was not the primary factor in the devastating impact on native populations during the conquest itself."}], "id": "q04"}, {"question": "The encomienda system was established to manage labor in Spain's New World empire. Based on the text, what was the fundamental contradiction between the stated purpose and the practical reality of the encomienda system?", "options": [{"text": "It was intended to promote self-governance among native peoples but instead entrenched the power of Spanish viceroys.", "isCorrect": false, "rationale": "The encomienda system was not intended for native self-governance; it was designed to provide Spanish colonists with labor."}, {"text": "It aimed to provide an incentive for native populations to convert to Christianity but primarily served as a means of forced labor and exploitation.", "isCorrect": true, "rationale": "The system formally obligated encomenderos to Christianize and protect native people in exchange for their labor, but the text clarifies that 'In practice, the system became little more than forced labor. Native men were worked to death... Families were torn apart.'"}, {"text": "It sought to create a system of equal partnership between Spanish colonists and native leaders but instead led to the complete marginalization of indigenous authority.", "isCorrect": false, "rationale": "The encomienda system did not propose an equal partnership but rather a hierarchical one where Spanish colonists controlled native labor."}, {"text": "It was designed to protect native lands from European encroachment but ultimately facilitated their expropriation by colonists.", "isCorrect": false, "rationale": "The encomienda system dealt with labor, not primarily land protection. Land expropriation was a separate but related aspect of colonization."}], "id": "q05"}, {"question": "Bartolomé de las Casas exemplified 'prophetic witness from within a system.' Which of the following actions best illustrates this concept as applied to his efforts against the encomienda system?", "options": [{"text": "He led an armed rebellion of native peoples against Spanish colonial authorities.", "isCorrect": false, "rationale": "Las Casas used legal, theological, and literary means to protest, not armed rebellion. His witness was 'from within' the Spanish system, not against it externally by force."}, {"text": "He left Spain and his faith to advocate for native rights from an independent, external position.", "isCorrect": false, "rationale": "The text states he 'did not leave Spain or abandon his faith, but used both to indict injustice,' directly contradicting this option."}, {"text": "He testified before the Spanish court and published a scathing indictment of colonial practices, appealing directly to the king and using his position as a friar.", "isCorrect": true, "rationale": "Las Casas's actions—testifying before the court, writing reports, and publishing A Short Account of the Destruction of the Indies addressed to the king, all while remaining a Dominican friar—perfectly embody using his position and 'both' Spain and his faith to 'indict injustice' from within the system."}, {"text": "He advocated for the complete independence of all American viceroyalties from Spanish rule.", "isCorrect": false, "rationale": "Las Casas advocated for the humane treatment and recognition of indigenous rights, not necessarily for the complete political independence of the viceroyalties from Spain."}], "id": "q06"}, {"question": "Philip II's reign (1556–1598) marked the height of Spanish power and its role as a champion of the Catholic Counter-Reformation. How did the Battle of Lepanto (1571) reflect Spain's global ambitions and its Counter-Reformation identity under Philip II?", "options": [{"text": "It was a naval victory against English Protestants, solidifying Spain's control over the Atlantic trade routes.", "isCorrect": false, "rationale": "The Battle of Lepanto was fought against the Ottoman fleet, not English Protestants, and took place in the Mediterranean, not primarily for Atlantic trade routes (though it did reinforce Catholic naval power)."}, {"text": "It demonstrated Spain's commitment to defending Catholicism against the Ottoman Empire, a key aspect of the Counter-Reformation's struggle against non-Christian powers.", "isCorrect": true, "rationale": "The text states Philip II was the 'great champion of the Catholic Counter-Reformation,' and Lepanto was a 'Spanish-led coalition of Catholic navies' that 'destroyed the Ottoman fleet,' directly linking the battle to Spain's Counter-Reformation identity and its defense of Christendom against the Ottomans."}, {"text": "It secured Spain's land borders with France, allowing Philip II to focus entirely on colonial expansion.", "isCorrect": false, "rationale": "Lepanto was a naval battle in the Mediterranean, not a land battle securing borders with France, and Philip II was deeply involved in European affairs, not solely colonial expansion."}, {"text": "It marked the beginning of Spain's decline, as the cost of the victory severely weakened its finances.", "isCorrect": false, "rationale": "The text presents Lepanto as 'one of the great Christian naval victories of the era' under Philip II, marking the height of Spanish power, not its decline. The decline is discussed later in the text with other factors."}], "id": "q07"}, {"question": "The Valladolid debate of 1550-1551, involving Juan Ginés de Sepúlveda and Bartolomé de las Casas, was remarkable for its unique nature. What was the central question debated, and what does the debate itself signify about Spain's colonial enterprise?", "options": [{"text": "The debate centered on the economic viability of the encomienda system, signifying Spain's pragmatic approach to resource management.", "isCorrect": false, "rationale": "The debate was about the moral legitimacy of conquest, not primarily the economic viability of the encomienda system, though the system's abuses were certainly part of Las Casas's argument."}, {"text": "It questioned whether Spain's conquest of the Americas was morally just, indicating a unique self-reflection among colonial powers regarding the ethics of empire.", "isCorrect": true, "rationale": "The text explicitly states the question was 'was Spain's conquest of the Americas morally just?' and highlights that 'Spain — unlike almost any other colonial power in history — conducted a formal legal and theological inquiry into whether its own empire was morally legitimate.'"}, {"text": "It focused on the political structure of the viceroyalties, showing Spain's desire to incorporate native leaders into governance.", "isCorrect": false, "rationale": "The debate was about the fundamental moral right to conquer, not primarily about the administrative political structure or the inclusion of native leaders in governance."}, {"text": "The debate sought to establish scientific proof of European racial superiority, solidifying the legal basis for conquest.", "isCorrect": false, "rationale": "While Sepúlveda argued indigenous peoples were 'natural slaves' (an Aristotelian philosophical concept), the debate was a theological and legal inquiry into *justice*, not a scientific one to prove racial superiority, and Las Casas vehemently opposed this view."}], "id": "q08"}, {"question": "Following the reign of Philip II, Spain experienced a 'long decline.' Which of the following events represents a significant factor contributing to Spain's economic and political weakening, particularly highlighting a self-inflicted wound?", "options": [{"text": "The victory at the Battle of Lepanto, which, despite being a success, drained Spanish resources excessively.", "isCorrect": false, "rationale": "The Battle of Lepanto was a victory during the height of Spanish power under Philip II; the text identifies its cost as a later factor of decline, not a self-inflicted wound or immediate cause of the 'long decline' discussed after Philip II."}, {"text": "The signing of the Treaty of Tordesillas, which limited Spain's access to valuable eastern trade routes.", "isCorrect": false, "rationale": "The Treaty of Tordesillas was signed in 1494, long before the 'long decline' began, and actually secured Spain's claims to vast New World territories, enabling its rise, not causing its decline."}, {"text": "The expulsion of the Moriscos in 1609, removing skilled farmers and craftsmen and weakening the Spanish economy.", "isCorrect": true, "rationale": "The expulsion of the Moriscos in 1609 is explicitly cited as 'removing an estimated three hundred thousand skilled farmers and craftsmen from the Spanish economy in a single decade,' which is a clear example of a self-inflicted economic wound contributing to Spain's decline."}, {"text": "The discovery of new silver mines in Potosí, leading to over-reliance on colonial wealth.", "isCorrect": false, "rationale": "While over-reliance on New World silver *contributed* to long-term economic instability (inflation), the discovery of mines itself was a source of wealth, not a direct cause of decline, and this occurred earlier in Spain's rise."}], "id": "q09"}, {"question": "The final 'key concept' box analyzes Spain's rise and fall as a 'recurring pattern in history.' What is the central analytical insight offered by comparing Spain's experience to Rome's provincial system?", "options": [{"text": "Both empires failed due to an inability to adapt to new military technologies, leading to their eventual defeat by external enemies.", "isCorrect": false, "rationale": "The comparison focuses on economic structures and the sustainability of wealth extraction, not primarily military technological obsolescence. Spain's decline involved military setbacks, but the core analysis is economic."}, {"text": "Both Rome and Spain collapsed due to internal religious conflicts that destabilized their political systems.", "isCorrect": false, "rationale": "While Spain had religious dimensions (Counter-Reformation, expulsion of Moriscos), the comparison to Rome in the key concept focuses on economic structures, wealth extraction, and the costs of empire, not religious conflict as the primary cause of decline for both."}, {"text": "Spain's model of rapid expansion funded by extracted wealth, unlike Rome's taxation and trade, created less durable economic structures, making it vulnerable when wealth diminished and war costs rose.", "isCorrect": true, "rationale": "The text directly states, 'rapid expansion funded by extracted wealth, followed by the political and economic costs of maintaining too large an empire' and compares this to Rome: 'Rome extracted wealth too, but through taxation and trade rather than mining, creating more durable economic structures.' This highlights the difference in economic sustainability as the key insight."}, {"text": "Both empires suffered from a lack of effective leadership, which prevented them from addressing their economic and political challenges.", "isCorrect": false, "rationale": "The analysis in the key concept focuses on systemic economic structures and the nature of wealth extraction, rather than attributing the decline primarily to a lack of effective leadership in both cases."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
