<script>
var QUESTIONS = [{"question": "Which of the following statements best characterizes the fundamental difference in how Ernst J\"unger and Erich Maria Remarque experienced and depicted World War I?", "options": [{"text": "J\"unger focused on the political causes of the war, while Remarque explored its economic impact.", "isCorrect": false, "rationale": "The text states both authors wrote about their lived experience of the war, not its political or economic causes. Their focus was on the human experience of combat and its aftermath."}, {"text": "J\"unger found meaning, exhilaration, and a test of spirit in combat, while Remarque portrayed the war as a destructive force that annihilated a generation's idealism.", "isCorrect": true, "rationale": "The section explicitly states J\"unger described the war as a 'magnificent, if terrible, test of the human spirit' and felt 'exhilaration, pride, the intense aliveness.' Remarque, conversely, focused on how the war 'destroys them — not in dramatic heroic deaths, but in the slow, grinding way that the front destroys everything: idealism, youth, the capacity to feel at home anywhere.'"}, {"text": "J\"unger detailed the strategic military maneuvers, whereas Remarque focused on the logistical challenges of trench warfare.", "isCorrect": false, "rationale": "Both authors wrote personal memoirs or novels based on their experiences, focusing on the human and psychological impact rather than grand strategy or logistics."}, {"text": "J\"unger's work was widely celebrated, while Remarque's was largely ignored due to its controversial nature.", "isCorrect": false, "rationale": "Remarque's *All Quiet on the Western Front* was a massive success, selling 2.5 million copies in its first eighteen months, though it was later banned by the Nazis. J\"unger's work was also celebrated, particularly his combat memoirs, but his later political position was complicated."}], "id": "q01"}, {"question": "Ernst J\"unger describes feeling 'cold clarity' and 'intense aliveness' during a night raid. What does this particular description reveal about his unique perspective on extreme danger?", "options": [{"text": "He viewed danger as a means to escape reality and avoid the harsh truths of war.", "isCorrect": false, "rationale": "J\"unger's description of 'cold clarity' suggests a heightened awareness, not an escape from reality. He found a sharpened sense of self in these moments."}, {"text": "He saw it as a paralyzing force that stripped away his ability to act effectively.", "isCorrect": false, "rationale": "J\"unger states, 'Fear was there, but it was clean — it sharpened rather than paralyzed,' directly contradicting this option."}, {"text": "He interpreted danger as a catalyst for profound self-discovery and a heightened sense of existence.", "isCorrect": true, "rationale": "J\"unger's statements like 'cold clarity,' 'intense aliveness,' and 'the knowledge of what I was' indicate that he found moments of extreme danger to be clarifying and deeply formative experiences, leading to self-discovery."}, {"text": "He believed these feelings were a common delusion among soldiers and not truly reflective of combat.", "isCorrect": false, "rationale": "The text emphasizes that J\"unger is telling 'the truth of his own experience,' suggesting these feelings were genuine for him, not a delusion."}], "id": "q02"}, {"question": "Remarque's narrator, Paul B\"aumer, states, 'We are not youth any longer... We believe in such things no longer. We believe in the war.' What is the most significant implication of this statement regarding the generation of soldiers he represents?", "options": [{"text": "They had matured rapidly and were ready to assume leadership roles in post-war society.", "isCorrect": false, "rationale": "The quote indicates a loss of youthful idealism and belief in a future beyond war, not a readiness for constructive leadership roles. They are 'fleeing' from themselves and their life."}, {"text": "Their innocence and belief in progress were irrevocably destroyed, leaving war as their only perceived reality.", "isCorrect": true, "rationale": "The passage explicitly states, 'The first bomb, the first explosion, burst in our hearts. We are cut off from activity, from striving, from progress. We believe in such things no longer. We believe in the war.' This shows a profound destruction of their prior beliefs and a complete engulfment by the reality of war."}, {"text": "They had developed a strong collective identity based on their shared combat experiences, fostering optimism for the future.", "isCorrect": false, "rationale": "While they shared experiences, the statement 'We are fleeing. We fly from ourselves. From our life' suggests despair and alienation, not optimism."}, {"text": "They were disillusioned with the military leadership but maintained their faith in the ideals for which they fought.", "isCorrect": false, "rationale": "The statement 'We believe in such things no longer' refers to broader ideals like progress and purpose, suggesting a loss of faith in more than just leadership."}], "id": "q03"}, {"question": "The teachernote highlights that the comparison of J\"unger and Remarque demonstrates 'that primary sources — including literary ones — reflect the perspective of their author.' How does their combined work best illustrate this pedagogical principle?", "options": [{"text": "It proves that literary accounts of historical events are always less reliable than factual reports.", "isCorrect": false, "rationale": "The text does not suggest literary accounts are less reliable, but rather that they offer a unique and truthful *perspective* that enriches our understanding of history, rather than contradicting it."}, {"text": "It shows that even two individuals witnessing the same event can truthfully describe it in profoundly different and incompatible ways due to their subjective experiences.", "isCorrect": true, "rationale": "The text states, 'Two men can witness the same event and describe it truthfully in incompatible ways. This is not relativism; it is history.' This directly supports how J\"unger and Remarque offer valid yet contrasting truths."}, {"text": "It illustrates that only one definitive truth about a historical event can exist, and the student's task is to identify the 'winner.'", "isCorrect": false, "rationale": "The teachernote explicitly states, 'The goal is not to declare a winner. J\"unger is not simply “wrong” because he found meaning in combat; Remarque is not simply “right” because he found it meaningless.' This contradicts the idea of a single winner or definitive truth."}, {"text": "It emphasizes the importance of verifying every detail in literary works against official historical records.", "isCorrect": false, "rationale": "While historical accuracy is important, the pedagogical point here is about the *perspective* and *truth of experience* presented in primary literary sources, not solely about factual verification against other records."}], "id": "q04"}, {"question": "After a sustained bombardment, J\"unger writes that 'love for the dead is best expressed not in tears but in endurance.' What does this reveal about his approach to grief and loss in wartime?", "options": [{"text": "He was emotionally detached and incapable of feeling grief for his fallen comrades.", "isCorrect": false, "rationale": "The text explicitly states, 'I write this not to seem without feeling, but because the truth of it is important: mourning came later, in the years after, when I could afford it.' This shows he did feel grief, but processed it differently during combat."}, {"text": "He believed that showing emotion in battle was a sign of weakness and disrespect to the dead.", "isCorrect": false, "rationale": "While he prioritized continuing the fight, his rationale 'A soldier who stops to grieve in battle has, in some sense, abandoned the very men he mourns' indicates it was about operational necessity and honoring the fallen through continued effort, not simply a judgment of weakness."}, {"text": "He postponed personal mourning to prioritize the collective survival and continued struggle, viewing endurance as the ultimate tribute.", "isCorrect": true, "rationale": "J\"unger states, 'In the field, the dead demanded something else from us — that we continue. That we not let them be the last.' This demonstrates he saw endurance and continuing the fight as the most fitting way to honor the fallen and ensure their sacrifice was not in vain, postponing his own grief."}, {"text": "He felt that the losses were so immense that individual grief was irrelevant.", "isCorrect": false, "rationale": "His reflection on 'known all of them since the early campaigns' and the later mourning shows that individual grief was significant, but its expression was adapted to the harsh realities of war."}], "id": "q05"}, {"question": "Both *The Storm of Steel* (English translation) and *All Quiet on the Western Front* were published in 1929. What does this shared publication year suggest about the cultural and historical climate of the late 1920s?", "options": [{"text": "It indicates a resurgence of pro-war propaganda designed to prepare for future conflicts.", "isCorrect": false, "rationale": "While J\"unger's work could be interpreted nationally, Remarque's was explicitly anti-war and later banned by Nazis, suggesting a more complex cultural moment, not a simple resurgence of pro-war propaganda."}, {"text": "It reflects a societal desire to forget the war and move on without dwelling on its details.", "isCorrect": false, "rationale": "The immense popularity of these books, especially Remarque's, suggests the opposite: a strong societal need to grapple with and understand the war's impact, not forget it."}, {"text": "It signifies a widespread post-war reflection and an attempt by veterans and society to come to terms with the diverse experiences and lasting impact of the conflict.", "isCorrect": true, "rationale": "The simultaneous emergence and success of two such contrasting, yet profoundly influential, accounts of the war points to a broad societal grappling with the war's legacy, indicating a period of intense reflection and reckoning with diverse experiences of the conflict."}, {"text": "It demonstrates the growing political polarization in Germany, leading directly to the rise of the Nazi party.", "isCorrect": false, "rationale": "While there was political polarization, and Remarque's book was banned by Nazis in 1933, the publication year itself primarily reflects a broader post-war literary and cultural reckoning, not solely the direct rise of a political party."}], "id": "q06"}, {"question": "In Chapter 6, Remarque describes German soldiers during a counterattack as being 'overwhelmed by this wave that bears us along, that fills us with ferocity, turns us into thugs, into murderers, into God only knows what devils.' What literary effect does this vivid, violent imagery primarily achieve?", "options": [{"text": "It glorifies the soldiers' bravery and their transformation into formidable warriors.", "isCorrect": false, "rationale": "The terms 'thugs,' 'murderers,' and 'devils' do not glorify the soldiers but rather depict a brutal, dehumanizing transformation driven by primal fear and the desperation of combat."}, {"text": "It emphasizes the dehumanizing and brutalizing effect of combat, where soldiers lose their individual identity and become instruments of violence.", "isCorrect": true, "rationale": "The language highlights a loss of self ('turns us into...devils') and a descent into primal, violent action, portraying the war's capacity to strip away humanity and reduce soldiers to instruments of destruction. They are 'fighting for nothing but our deliverance' from the immediate threat."}, {"text": "It suggests that the soldiers were inherently violent individuals before the war, simply unleashed by combat.", "isCorrect": false, "rationale": "Remarque's novel, and the key quote about the 'generation that was destroyed,' focuses on how the war *changed* these young men, rather than revealing inherent violence. They were 'youth' who 'had begun to love life' before the war."}, {"text": "It critiques the soldiers' lack of discipline and training in adhering to military codes of conduct.", "isCorrect": false, "rationale": "The passage describes a desperate, overwhelming combat situation, not a failure of discipline. It's about the psychological impact of survival rather than adherence to codes of conduct."}], "id": "q07"}, {"question": "The teachernote explicitly connects the tension between J\"unger and Remarque to 'Homer's Iliad' by noting that 'the Iliad also presents war as both glorious and terrible, sometimes in the same breath.' What enduring aspect of the human experience of war does this comparison highlight?", "options": [{"text": "The consistent belief across cultures and time that war is an inevitable and unchanging part of human history.", "isCorrect": false, "rationale": "The comparison focuses on the *duality* of war's portrayal, not its inevitability or unchanging nature."}, {"text": "The universal tendency of all societies to glorify war, regardless of its true cost.", "isCorrect": false, "rationale": "The 'Iliad' presents war as *both* glorious and terrible, implying that glorification is only one side of a complex reality, not a universal tendency to ignore its cost."}, {"text": "The inherent complexity and paradox of war, which can simultaneously be perceived as a source of heroism, meaning, and destruction.", "isCorrect": true, "rationale": "The 'tension' between J\"unger's finding meaning/glory and Remarque's highlighting terror/destruction, mirrored in the Iliad, directly illustrates that war holds these contradictory facets simultaneously within human experience and narrative."}, {"text": "The progressive evolution of literature, moving from ancient glorification of war to modern anti-war sentiments.", "isCorrect": false, "rationale": "The comparison suggests an *ancient* tension that persists, implying a continuity rather than a simple linear progression from glorification to anti-war sentiment."}], "id": "q08"}, {"question": "Based on the provided text, what significant detail about Wilfred Owen's life and work places him in a unique and poignant position among the three authors presented (J\"unger, Remarque, Owen)?", "options": [{"text": "He was the only one who actively participated in political movements after the war.", "isCorrect": false, "rationale": "The text states J\"unger became a controversial literary and philosophical figure and had a complicated political position. Owen died before the Armistice, so he had no post-war political activity."}, {"text": "He was a British officer-poet who tragically died in combat just one week before the Armistice.", "isCorrect": true, "rationale": "The text explicitly states Owen 'was killed by machine-gun fire on November 4, 1918 — one week before the Armistice.' This detail highlights his tragic and poignant fate, making his 'Pity of War' theme particularly impactful."}, {"text": "He was the only author who based his writing purely on fictional accounts rather than personal diaries or experience.", "isCorrect": false, "rationale": "The text states he 'wrote the most famous poem of the war in 1917' and was encouraged to write about the war by Sassoon, implying his work was deeply rooted in his personal experience as an officer on the Western Front."}, {"text": "He was the earliest to publish his work, setting the tone for later war literature.", "isCorrect": false, "rationale": "J\"unger's *The Storm of Steel* was first published in German in 1920, while Owen's poems were largely published posthumously. Owen wrote his most famous poem in 1917, but his influence developed later."}], "id": "q09"}, {"question": "The teachernote asks students to consider, 'which mode do we tend to choose when we build memorials or teach about war? Which do we leave out?' Given the contrasting perspectives of J\"unger and Remarque, which 'mode' is typically emphasized in traditional historical accounts and memorials, and why?", "options": [{"text": "Remarque's mode, emphasizing the war's destructive futility, because it serves as a powerful deterrent against future conflicts.", "isCorrect": false, "rationale": "While Remarque's perspective is vital, traditional memorials often focus on more 'heroic' aspects. The teachernote itself suggests 'Literature like Remarque's preserves the other mode,' implying it's often 'left out' of official accounts."}, {"text": "A balanced synthesis of both J\"unger and Remarque, to provide a complete and nuanced understanding.", "isCorrect": false, "rationale": "The question asks which *tendency* is observed, not the ideal approach. The teachernote implies that a complete account 'needs both,' but that one mode tends to be emphasized more in memorials."}, {"text": "J\"unger's mode, emphasizing heroism, sacrifice, and endurance, because it aligns with narratives of national pride and collective purpose.", "isCorrect": true, "rationale": "The teachernote states, 'Monuments, memorials, and official histories tend toward J\"unger's mode — the heroism, the sacrifice, the endurance.' This is because such narratives often seek to honor national sacrifice and uphold collective values, making J\"unger's perspective more aligned with traditional commemorative purposes."}, {"text": "Neither mode is consistently chosen; the emphasis varies greatly depending on the specific cultural context.", "isCorrect": false, "rationale": "While cultural context plays a role, the teachernote points to a *tendency* towards one mode over the other in official memory, suggesting a more consistent pattern than simply 'varying greatly'."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
