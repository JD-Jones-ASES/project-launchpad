    };

<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Middle_School_Humanities_III.html">&larr; Back to History &amp; Humanities III</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">History &amp; Humanities III &mdash; Chapter 2, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "The Spanish adaptation of the Inca mita system at Potosí had what primary consequence for indigenous laborers?", "options": [{"text": "It provided fair wages and guaranteed safe working conditions for a fixed period, improving local economies.", "isCorrect": false, "rationale": "The text explicitly states that in practice, the mita was a 'death sentence' due to deadly conditions and often withheld wages, contradicting fair wages and safe conditions."}, {"text": "It ensured a steady supply of workers for the mines, leading to widespread death and organ failure due to hazardous conditions like mercury poisoning.", "isCorrect": true, "rationale": "The text describes the mita as requiring villages to send workers to mines where they faced 'death sentence' conditions, breathing 'silver dust and mercury vapor,' leading to 'tremors, madness, and organ failure,' and an estimated eight million deaths."}, {"text": "It allowed indigenous communities to self-govern their labor contributions and share in the silver profits from the mines.", "isCorrect": false, "rationale": "The mita under Spanish rule was a forced labor system to supply the Spanish mines, not an institution of self-governance or profit-sharing for indigenous communities."}, {"text": "It primarily focused on agricultural labor, shifting away from mining due to its inherent dangers and low yields.", "isCorrect": false, "rationale": "The text clearly states the mita was 'organized around the extraction of mineral wealth, particularly silver,' and specifically for 'mines' at Potosí, not primarily agriculture."}], "id": "q01"}, {"question": "Spain's repeated bankruptcies despite possessing immense silver wealth illustrate a critical economic principle. Which of the following best encapsulates this paradox, according to the text?", "options": [{"text": "The inherent instability of economies reliant on a single commodity, even one as valuable as silver.", "isCorrect": false, "rationale": "While reliance on a single commodity can be unstable, the text provides more specific reasons for Spain's paradox, focusing on its failure to build a domestic economy and the high costs of wars, not just the single commodity aspect itself."}, {"text": "The principle that raw wealth, without a robust domestic productive economy and responsible fiscal management, does not equate to durable economic strength.", "isCorrect": true, "rationale": "The text explicitly states: 'The Spanish case illustrates that raw wealth is not the same as economic strength,' explaining that silver 'flowed through Spain without stopping,' Spanish manufacturing 'never developed,' and the silver was 'consumed in wars, creating no durable economic base.'"}, {"text": "The unavoidable inflationary pressures of global trade networks in the early modern period that disproportionately affected Spain.", "isCorrect": false, "rationale": "The Price Revolution was a *consequence* of the silver flood, hitting ordinary people. While it contributed to Spain's weakness, it was one of several reasons for bankruptcy, and the core paradox lies in the lack of an economic base despite the wealth."}, {"text": "The inability of monarchical systems to effectively manage vast imperial resources due to corruption and inefficiency.", "isCorrect": false, "rationale": "While corruption might have been a factor, the text focuses on specific economic patterns: silver flowing out, lack of manufacturing, and war costs, rather than general monarchical inefficiency."}], "id": "q02"}, {"question": "Imagine an ordinary European farmer in the late 16th century. How would the Price Revolution, driven by New World silver, most likely affect their economic well-being?", "options": [{"text": "They would experience a significant increase in their purchasing power as silver became more abundant and goods remained stable.", "isCorrect": false, "rationale": "The text states that 'the purchasing power of silver fell,' meaning it would take more silver to buy the same goods, which diminishes purchasing power, not increases it."}, {"text": "They would find that their crops could be sold for less silver, requiring them to work harder to maintain their income.", "isCorrect": false, "rationale": "Prices *rose* during the Price Revolution, meaning goods would sell for *more* silver, but the value of that silver declined, so while they might get more silver, that silver bought less."}, {"text": "They would face higher costs for essential goods like food and cloth, effectively diminishing the value of their earnings.", "isCorrect": true, "rationale": "The text defines the Price Revolution as 'the dramatic rise in prices' where 'more silver was required to buy the same amount of food or cloth,' noting that 'This inflation hit ordinary people hardest.'"}, {"text": "They would benefit from stable prices due to the increased supply of currency in circulation, leading to economic stability.", "isCorrect": false, "rationale": "The Price Revolution was characterized by a 'dramatic rise in prices' and inflation, directly contradicting the idea of stable prices or economic stability for ordinary people."}], "id": "q03"}, {"question": "The Manila Galleon trade is described as one of the most remarkable commercial links in history. What was its most significant contribution to global economic history as outlined in the text?", "options": [{"text": "It established European dominance in all aspects of Asian luxury goods production and trade.", "isCorrect": false, "rationale": "The text describes silver being exchanged for Chinese goods, implying China's strong production, not European dominance over Asian production."}, {"text": "It initiated the first sustained large-scale direct trade route connecting the economies of the Americas, Europe, and East Asia.", "isCorrect": true, "rationale": "The definition of Manila Galleon states it 'connected the economies of the Americas, Europe, and East Asia into a single, if fragile, global system for the first time,' making it one of the 'longest-running trade routes in history'."}, {"text": "It primarily served to finance Spain's wars against the Dutch, with little impact beyond Europe.", "isCorrect": false, "rationale": "While Spain's wars consumed silver, the Manila Galleon trade's primary purpose was to exchange New World silver for Asian luxury goods, with the silver ultimately ending up in China, linking global economies."}, {"text": "It led to the rapid industrialization of China by supplying it with new technologies from the Americas.", "isCorrect": false, "rationale": "The text states the galleon carried 'New World silver' to exchange for 'Chinese silk, porcelain, and spices.' There is no mention of new technologies leading to industrialization."}], "id": "q04"}, {"question": "Among the various transfers during the Columbian Exchange, the introduction of Old World diseases to the Americas is considered 'one of the largest demographic catastrophes in human history.' What factor made these diseases so devastating for indigenous populations?", "options": [{"text": "The diseases mutated into more virulent forms upon reaching the New World environment, becoming more deadly.", "isCorrect": false, "rationale": "The text does not mention disease mutation as the primary reason for the high death toll. It focuses on the lack of existing immunity."}, {"text": "Indigenous peoples lacked any prior exposure or immune resistance to these specific pathogens.", "isCorrect": true, "rationale": "The text clearly states: 'The indigenous peoples of the Americas had no prior exposure to Old World diseases like smallpox, measles, influenza, and typhus, and therefore no immune resistance to them.'"}, {"text": "Spanish soldiers deliberately weaponized these diseases to weaken resistance and conquer indigenous groups more easily.", "isCorrect": false, "rationale": "While the impact was devastating, the text emphasizes the 'unintended consequences' of the biological exchange and the lack of immunity, not deliberate weaponization by the Spanish."}, {"text": "The diseases spread rapidly due to advanced trade networks and large urban centers within the Americas, facilitating infection.", "isCorrect": false, "rationale": "While disease spread rapidly, the *reason* for the catastrophe was the lack of immunity, not merely the speed or existing infrastructure for spread, which would have affected Old World populations similarly if they lacked immunity."}], "id": "q05"}, {"question": "A key concept states that the casta system reveals how empires sustain themselves 'not only by force, but by organizing society so that different groups have different interests and different enemies.' How did the casta system achieve this, fundamentally?", "options": [{"text": "By promoting widespread social mobility and equal opportunities for all residents, regardless of ancestry, to foster unity.", "isCorrect": false, "rationale": "The casta system created a rigid 'hierarchy of racial classification' that 'governed almost every aspect of daily life,' directly opposing social mobility and equal opportunity."}, {"text": "By creating a rigid social hierarchy based on perceived racial purity, which fostered divisions and prevented collective resistance against the colonial order.", "isCorrect": true, "rationale": "The text explains the casta system 'assigned social status, legal rights, and economic obligations based on ancestry' and was 'designed to maintain Spanish colonial control by ensuring that people of different backgrounds could not easily combine against the colonial order,' fostering 'divisions made collective resistance harder.'"}, {"text": "By encouraging intermarriage between all racial groups to integrate diverse populations into a unified Spanish identity.", "isCorrect": false, "rationale": "The text states that 'Marriages between castes were regulated,' indicating control and potential restriction, not broad encouragement for integration into a unified identity."}, {"text": "By establishing a meritocratic system where talent and skill, rather than birth, determined social status and roles.", "isCorrect": false, "rationale": "The casta system was explicitly based on 'ancestry and the perceived racial mixture,' not individual talent or skill, assigning status and roles based on birth."}], "id": "q06"}, {"question": "The Spanish Empire is characterized as 'the first empire to span the entire globe.' Which of the following details from the text best supports this claim?", "options": [{"text": "Its control of vast territories in Europe, surpassing any previous European power.", "isCorrect": false, "rationale": "While Spain had European territories, 'span the entire globe' implies a reach beyond just Europe. Many empires controlled vast European territories before."}, {"text": "Its extensive network of trade routes connecting the Americas, Europe, and East Asia, including the Manila Galleon.", "isCorrect": true, "rationale": "The text describes the empire as knitting together a world 'From the Philippine Islands in the Pacific to Manila, from Mexico City to Seville,' and details the Manila Galleon connecting 'Americas, Europe, and East Asia,' which demonstrates truly global reach."}, {"text": "The sheer amount of silver it extracted from the New World, fueling its economy.", "isCorrect": false, "rationale": "The amount of silver was the 'engine' of the empire, but it describes the wealth generated, not the geographical span itself."}, {"text": "The establishment of viceroyalties in New Spain and Peru, concentrating power in the Americas.", "isCorrect": false, "rationale": "Viceroyalties concentrated power within specific American regions. While important for colonial administration, they do not inherently represent a global span."}], "id": "q07"}, {"question": "The 'keyconcept' section notes that Spain 'extracted bullion... and consumed it in wars, creating no durable economic base.' What broader historical lesson does this observation convey regarding imperial economies?", "options": [{"text": "Empires are inherently unsustainable due to the high cost of maintaining military power and expansion.", "isCorrect": false, "rationale": "The text's comparison to the Roman Empire suggests that some empires *did* create sustainable systems, implying that unsustainability is not inherent to all empires, but rather dependent on their economic strategy."}, {"text": "Sustainable economic strength for an empire requires developing diverse productive sectors and integrated economic participation from its territories, beyond mere raw material extraction.", "isCorrect": true, "rationale": "The text contrasts Spain's bullion extraction with the Roman Empire's system where 'provinces also produced goods and services and participated in the economy,' concluding that 'extraction alone cannot sustain a civilization.'"}, {"text": "The most effective way to build imperial wealth is through direct taxation of provinces, rather than mineral extraction.", "isCorrect": false, "rationale": "The text highlights Rome's successful taxation system but emphasizes *how* that system integrated provinces into the economy, not just that taxation is inherently superior to extraction as a wealth-building method in all cases."}, {"text": "Naval power and control of trade routes are ultimately more important than land-based resource control for imperial longevity.", "isCorrect": false, "rationale": "While Spain did utilize naval power for trade, the text's economic lesson focuses on the *type* of economic base (extraction vs. production/participation), not specifically on the mode of transport or military control."}], "id": "q08"}, {"question": "Which of the following groups of caloric staple crops were transferred from the Americas to the Old World as part of the Columbian Exchange, fundamentally reshaping diets there?", "options": [{"text": "Wheat, rice, and sugar cane.", "isCorrect": false, "rationale": "Wheat, rice, and sugar cane are all crops that originated in the Old World (Europe, Asia, Africa), not the Americas."}, {"text": "Potatoes, corn, and tomatoes.", "isCorrect": true, "rationale": "The text explicitly lists these as plants that 'came from the Americas to the Old World' and 'were caloric staples that fed millions of people who had never heard of the Americas.'"}, {"text": "Coffee, tea, and citrus fruits.", "isCorrect": false, "rationale": "Coffee and tea originated in Africa and Asia, respectively, while citrus fruits are from Asia. These are Old World crops."}, {"text": "Grapes, olives, and barley.", "isCorrect": false, "rationale": "Grapes, olives, and barley are all crops that originated in the Old World, particularly the Mediterranean and Near East."}], "id": "q09"}, {"question": "According to the text, which of the following is identified as a lasting legacy of the Spanish colonial system in Latin America today?", "options": [{"text": "A strong tradition of indigenous self-governance and economic autonomy, empowered by colonial reforms.", "isCorrect": false, "rationale": "The Spanish colonial system, with its mita labor and casta hierarchy, was designed to exploit indigenous labor and maintain Spanish control, not to foster self-governance or autonomy."}, {"text": "A highly industrialized economy focused on domestic manufacturing and export of finished goods.", "isCorrect": false, "rationale": "The text states the colonial system left a legacy of 'the underdevelopment of manufacturing in favor of raw material export,' directly contradicting a highly industrialized economy."}, {"text": "The persistence of racial hierarchies and the concentration of land ownership among a small elite.", "isCorrect": true, "rationale": "The text explicitly states: 'The concentration of land in the hands of a small elite... and the racial hierarchies created by the casta system all have roots in the colonial period.'"}, {"text": "A completely uniform cultural identity across all Latin American nations, free from historical divisions.", "isCorrect": false, "rationale": "The casta system created deep divisions and hierarchies that have had lasting impacts, suggesting a complex and often unequal cultural landscape, not a uniform identity free from division."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
