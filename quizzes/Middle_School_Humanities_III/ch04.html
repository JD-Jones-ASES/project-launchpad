<script>
var QUESTIONS = [{"question": "What intellectual development gave rise to the Enlightenment, and what question did it inspire?", "options": [{"text": "The Protestant Reformation showed that tradition could be challenged, inspiring thinkers to question all authority.", "isCorrect": false, "rationale": "While the Reformation was relevant context, the text specifically traces the Enlightenment's intellectual origins to the Scientific Revolution and Newton."}, {"text": "The Scientific Revolution, particularly Newton's discovery that universal mathematical laws governed the physical universe, inspired the question: could reason unlock the laws of society, government, and morality too?", "isCorrect": true, "rationale": "The text explicitly says the Enlightenment grew from the Scientific Revolution: Newton's orderly universe suggested reason could similarly unlock laws of justice and human happiness."}, {"text": "The Thirty Years' War demonstrated that religious authority was bankrupt, leading thinkers to seek a purely secular foundation for political life.", "isCorrect": false, "rationale": "While the war was relevant context, the text traces the Enlightenment's intellectual inspiration specifically to the Scientific Revolution, not political disillusionment."}, {"text": "The invention of the printing press allowed ideas to spread rapidly, creating for the first time a mass intellectual movement.", "isCorrect": false, "rationale": "The printing press predated the Enlightenment by over two centuries; the text attributes the movement's origins to the Scientific Revolution."}]}, {"question": "What was Descartes's Method of Doubt, and what did it produce?", "options": [{"text": "A method of testing ideas through scientific experiments, leading to the discoveries in physics that later inspired Newton.", "isCorrect": false, "rationale": "The Method of Doubt is a philosophical technique of systematic skepticism, not a scientific experimental method."}, {"text": "A technique of systematically doubting every belief until reaching something undoubtable; led to 'I think, therefore I am' (cogito ergo sum) as the one certain foundation.", "isCorrect": true, "rationale": "The text describes Descartes doubting everything until he found the one undoubtable fact: the very act of thinking proves existence."}, {"text": "A method of consulting multiple authorities and weighing their testimony, producing the principle that majority scholarly opinion determines truth.", "isCorrect": false, "rationale": "Descartes doubted all received authorities; the Method of Doubt begins with individual reason, not consensus."}, {"text": "A technique for identifying government corruption by systematically testing each official's decisions against a standard of rational justice.", "isCorrect": false, "rationale": "The Method of Doubt is an epistemological technique about how to achieve certain knowledge, not a political accountability tool."}]}, {"question": "What was Deism, and why does the text describe it as a 'theological impoverishment'?", "options": [{"text": "Deism was the belief that multiple gods existed but only one was morally worthy of worship; the text calls it impoverished because it undermined monotheism.", "isCorrect": false, "rationale": "Deism was strictly monotheistic; the text's concern is about the nature of God, not the number."}, {"text": "Deism was the belief that God created the universe but does not intervene in it; the text calls it impoverished because the God of Deism is an abstract First Cause, not the personal God of Abraham who parts seas and raises the dead.", "isCorrect": true, "rationale": "The text makes this exact point: Deism's clockmaker God abandoned the universe after creation, unlike the Christian God who remains personally engaged with creation and humanity."}, {"text": "Deism was a form of atheism disguised as belief in God; the text calls it impoverished because it dishonestly used religious language while denying God's existence.", "isCorrect": false, "rationale": "Deists genuinely believed in God as the rational explanation for the universe's existence; they were not atheists."}, {"text": "Deism required expensive temple rituals that only wealthy people could afford, making it spiritually impoverished for the poor.", "isCorrect": false, "rationale": "Deism had no ritual practices; it was a philosophical position about God's nature and relationship to the world."}]}, {"question": "What was John Locke's concept of the 'state of nature,' and how did it support his theory of natural rights?", "options": [{"text": "Locke believed the state of nature was brutal and chaotic, which is why people needed strong government to protect them from each other.", "isCorrect": false, "rationale": "This describes Hobbes's view, not Locke's. For Locke, the state of nature was one of natural equality and freedom, not brutal chaos."}, {"text": "Locke imagined a pre-government state in which all human beings are naturally equal and free, possessing natural rights to life, liberty, and property - rights that precede and are not granted by government.", "isCorrect": true, "rationale": "The text describes Locke's state of nature as his philosophical thought experiment: it establishes that rights exist before government, which government is created to protect."}, {"text": "Locke believed the state of nature was a historical fact, that all humans once lived in freedom before civilization corrupted them.", "isCorrect": false, "rationale": "The text explicitly says Locke's state of nature 'is not a historical claim... but a philosophical thought experiment.'"}, {"text": "Locke's state of nature was a description of colonial America, where he believed European settlers had escaped the corruption of Old World government.", "isCorrect": false, "rationale": "The state of nature is a philosophical construct, not a description of colonial America specifically."}]}, {"question": "What is the social contract according to Locke, and what happens when it is broken?", "options": [{"text": "People agree to obey whatever government they are born under, and this obligation can never be dissolved regardless of the government's behavior.", "isCorrect": false, "rationale": "This describes passive political obligation; Locke specifically argued the opposite: the contract can be dissolved if government violates natural rights."}, {"text": "People agree to give up some unlimited freedom in exchange for government protection of their natural rights; if government becomes tyrannical and attacks those rights, the people have the right to dissolve and replace it.", "isCorrect": true, "rationale": "The text defines Locke's social contract precisely this way, including the revolutionary right of dissolution when government fails its purpose."}, {"text": "A formal written constitution signed by all citizens, which government must follow; if any official violates it, that official alone may be removed while the government continues.", "isCorrect": false, "rationale": "Locke's social contract is not a written document but a philosophical framework of consent; it concerns the legitimacy of the entire government, not individual officials."}, {"text": "People agree to pay taxes in exchange for military protection; if the government fails to provide military security, citizens may legally withhold taxes.", "isCorrect": false, "rationale": "The social contract concerns natural rights broadly (life, liberty, property), not specifically a tax-for-protection arrangement."}]}, {"question": "How did the American Declaration of Independence apply Locke's philosophy, and what did Jefferson add?", "options": [{"text": "Jefferson copied Locke's philosophy exactly, changing nothing and acknowledging Locke as the source of all the Declaration's ideas.", "isCorrect": false, "rationale": "Jefferson added the crucial phrase that rights are 'endowed by their Creator,' grounding natural rights in God rather than mere human reason."}, {"text": "Jefferson applied Locke's natural rights and social contract but added the crucial claim that rights are 'endowed by their Creator,' grounding them in God rather than in human opinion alone.", "isCorrect": true, "rationale": "The text notes that every phrase is Lockean but highlights Jefferson's addition: rights come from the Creator, making them unremovable by any majority vote."}, {"text": "Jefferson rejected Locke's philosophy and instead based the Declaration on the traditional rights of English subjects going back to Magna Carta.", "isCorrect": false, "rationale": "The text says 'every phrase here is Lockean'; Jefferson applied Locke's philosophy to a real political crisis."}, {"text": "Jefferson added the concept of republican government to Locke's philosophy, creating the idea that rights must be protected by elected representatives rather than a monarch.", "isCorrect": false, "rationale": "The distinctive addition the text highlights is the grounding of rights in the Creator, not the specific form of republican government."}]}, {"question": "What was Voltaire's main target, and what literary work expressed his philosophy?", "options": [{"text": "Voltaire's main target was absolute monarchy; he wrote The Social Contract arguing for popular sovereignty and democratic government.", "isCorrect": false, "rationale": "The Social Contract was Rousseau's work, not Voltaire's; Voltaire's main target was religious intolerance and superstition."}, {"text": "Voltaire's main target was religious intolerance ('l'infame'); his novel Candide (1759) used satire and catastrophe to demolish false optimism and arrive at the conclusion 'we must cultivate our garden.'", "isCorrect": true, "rationale": "The text identifies l'infame (religious intolerance) as Voltaire's target and describes Candide's satirical journey to modest practical wisdom."}, {"text": "Voltaire's main target was the feudal nobility; he wrote a philosophical history arguing that the middle class should replace them as the ruling class.", "isCorrect": false, "rationale": "While Voltaire criticized social institutions broadly, the text specifically identifies religious intolerance as his main target."}, {"text": "Voltaire was an atheist who argued against all belief in God; his works demolished both the Church and the concept of religion itself.", "isCorrect": false, "rationale": "The text explicitly notes Voltaire was not an atheist; he was a Deist who attacked the Church for cruelty and corruption, not Christianity itself."}]}, {"question": "What was Rousseau's concept of the 'general will,' and what made it dangerous?", "options": [{"text": "The general will was identical to the majority vote in any democratic election; dangerous because majorities could be wrong.", "isCorrect": false, "rationale": "The text explicitly says 'the general will is not the same as the majority vote'; this distinction is what made it dangerous."}, {"text": "The general will was what the community truly needs (not just the sum of individual desires); dangerous because someone must decide what it is, potentially overriding individual rights in the name of the common good - as Robespierre did during the Terror.", "isCorrect": true, "rationale": "The text identifies this danger precisely: if someone decides what the general will truly is, they can override individual rights, which is exactly what happened during the Terror."}, {"text": "The general will was the divine will of God expressed through a nation's king; dangerous because it justified absolute monarchy.", "isCorrect": false, "rationale": "Rousseau's general will was a democratic concept, not a monarchical one; it was meant to replace the king's will, not justify it."}, {"text": "The general will was the collective decision of property owners; dangerous because it excluded the poor from political life.", "isCorrect": false, "rationale": "The general will was meant to include all citizens and transcend property distinctions; the danger was different."}]}, {"question": "What was Montesquieu's most important political conclusion, and where did it lead?", "options": [{"text": "Montesquieu concluded that the best government was an enlightened monarchy; this led to the concept of the philosopher-king.", "isCorrect": false, "rationale": "Montesquieu's central conclusion was that tyranny results from concentrated power, and the remedy is separation of powers."}, {"text": "Montesquieu studied governments and concluded that tyranny results from concentrated power; the remedy is separating government into legislative, executive, and judicial branches that check each other - a principle Madison cited most in The Federalist Papers.", "isCorrect": true, "rationale": "The text describes both Montesquieu's method (studying governments empirically) and his conclusion (separation of powers) and its influence on Madison and the US Constitution."}, {"text": "Montesquieu concluded that geography determined government: maritime nations naturally become republics, while landlocked nations naturally become monarchies.", "isCorrect": false, "rationale": "While Montesquieu wrote about geographical influences on society, his most important political conclusion concerned separation of powers."}, {"text": "Montesquieu argued that all legitimate government must be based on religious law; his analysis of the English constitution showed how Christianity shaped its institutions.", "isCorrect": false, "rationale": "Montesquieu's approach was empirical and comparative, not theological; separation of powers was his structural conclusion."}]}, {"question": "What was the Encyclopedie, and why was it politically significant beyond being a reference work?", "options": [{"text": "It was a government-sponsored project to document all scientific discoveries, supporting the French monarchy's claim to lead European civilization.", "isCorrect": false, "rationale": "The French government banned the Encyclopedie twice; it was a project of the philosophes, not the monarchy."}, {"text": "Edited by Diderot and d'Alembert, it treated mechanical trades with the same seriousness as theology and philosophy, implicitly arguing that craftsmen deserved equal respect with bishops - and that no single authority owned the truth.", "isCorrect": true, "rationale": "The text identifies these two political implications: equal dignity of all workers and knowledge, and the implicit challenge to Church and Crown as sole arbiters of truth."}, {"text": "It was a secret manifesto for revolution, published in coded language that only educated readers could decode, which is why it sold 20,000 copies.", "isCorrect": false, "rationale": "The Encyclopedie was published openly (if controversially); it used 'indirect language to avoid censorship' but was not a secret revolutionary manifesto."}, {"text": "It was designed to replace the Bible as the primary educational text in French schools, with the Church's approval once it agreed to include orthodox theology.", "isCorrect": false, "rationale": "The Church condemned it; it was not designed as a replacement for Scripture and did not have Church approval."}]}, {"question": "What was the fundamental difference between the American Revolution and the French Revolution according to the text?", "options": [{"text": "The American Revolution was violent while the French Revolution was achieved peacefully through constitutional reform.", "isCorrect": false, "rationale": "The opposite is true: the French Revolution produced the Terror and mass executions; the American Revolution was a colonial independence war."}, {"text": "The American Revolution was conservative, appealing to existing English rights and God-given natural rights while preserving institutions; the French Revolution was based on Rousseau's abstract Reason that explicitly replaced Christianity, leading to the Terror.", "isCorrect": true, "rationale": "The text makes this distinction explicitly: the American Revolution preserved institutions and grounded rights in God; the French relied on abstract Reason without Christian restraint and ended in the guillotine."}, {"text": "The American Revolution was inspired by Rousseau's general will while the French Revolution followed Locke's natural rights theory.", "isCorrect": false, "rationale": "The text states the opposite: the Declaration of Independence was 'directly' Lockean, while the French revolutionaries were influenced by Rousseau's general will."}, {"text": "The American Revolution failed and was suppressed within a decade, while the French Revolution succeeded in creating lasting republican government.", "isCorrect": false, "rationale": "The American Revolution created a stable republic; the French Revolution ended with Napoleon's dictatorship."}]}, {"question": "What was Edmund Burke's critique of the French Revolution?", "options": [{"text": "Burke argued that France needed a more radical revolution that fully eliminated the monarchy and aristocracy, not a half-measure that left them in place.", "isCorrect": false, "rationale": "Burke was the great conservative critic of the revolution, not a more radical critic; he defended tradition against abstract reason."}, {"text": "Burke argued that the accumulated wisdom of tradition is more reliable than the abstract theories of any single generation of intellectuals; events proved him right when the Revolution ended with Napoleon.", "isCorrect": true, "rationale": "The text quotes this as Burke's argument from Reflections on the Revolution in France (1790) and notes 'he was right, and events proved it.'"}, {"text": "Burke argued that the French revolutionaries should have modeled their constitution more closely on the American one, rather than inventing abstract principles.", "isCorrect": false, "rationale": "While Burke admired the American Revolution, his main argument was for tradition and accumulated wisdom over abstract theory of any kind."}, {"text": "Burke opposed the French Revolution because it threatened British commercial interests in France and disrupted established trade relations.", "isCorrect": false, "rationale": "Burke's argument was philosophical and constitutional, not primarily commercial."}]}, {"question": "What did Locke's Second Treatise argue about the origins of political authority, and why was this revolutionary?", "options": [{"text": "Political authority comes from hereditary right; Locke argued that kings inherit their authority from Adam through unbroken lineage.", "isCorrect": false, "rationale": "The First Treatise demolished this argument (Filmer's divine right theory); the Second Treatise argued authority comes from consent of the governed."}, {"text": "Political authority comes from the consent of the governed, not from God directly or from hereditary right; this was revolutionary because it justified resistance to tyrannical government.", "isCorrect": true, "rationale": "The text says Locke's argument 'was revolutionary': for centuries kings claimed authority from God directly; Locke said authority comes from consent and can be withdrawn."}, {"text": "Political authority comes from rational expertise: only the most educated and philosophically trained individuals have the right to govern.", "isCorrect": false, "rationale": "Locke's argument is about consent of all the governed, not rule by educated elites."}, {"text": "Political authority is always temporary and must be reaffirmed by popular vote every ten years; if not reaffirmed it dissolves automatically.", "isCorrect": false, "rationale": "Locke did not propose specific election intervals; his argument was that authority requires ongoing consent and may be dissolved when violated."}]}, {"question": "What contradiction existed in the Declaration of Independence regarding slavery, and how does the text treat it?", "options": [{"text": "Jefferson deliberately included slavery in the Declaration as a protected institution, arguing that property rights justified it.", "isCorrect": false, "rationale": "Jefferson did not include slavery as a protected right; the contradiction was between the Declaration's universal language and the founders' ownership of enslaved people."}, {"text": "The Declaration proclaimed all men are created equal and endowed with unalienable rights, yet Jefferson and other founders enslaved hundreds of people - a contradiction noted by contemporaries and requiring a civil war to begin resolving.", "isCorrect": true, "rationale": "The text explicitly addresses this: Jefferson enslaved over 600 people, the contradiction was noted by contemporaries like Samuel Johnson, and it took nearly a century and a war to begin resolving."}, {"text": "The contradiction was fully resolved within a decade when the founders passed the Northwest Ordinance prohibiting slavery in new territories.", "isCorrect": false, "rationale": "The text says the contradiction 'would take nearly a century and a civil war to begin resolving' - it was not quickly resolved."}, {"text": "There was no contradiction because the phrase 'all men' was understood by everyone at the time to refer only to white male property owners.", "isCorrect": false, "rationale": "The text notes that contemporaries like Samuel Johnson and Abigail Adams recognized the contradiction; it was not universally accepted as a limited definition."}]}, {"question": "Why does the text argue that Enlightenment reason 'applied without Christian restraint' tends toward disaster?", "options": [{"text": "Because reason without faith leads inevitably to atheism, and atheists lack the moral framework needed for just government.", "isCorrect": false, "rationale": "The text makes a more specific argument: it is not atheism per se but the specific combination of Rousseau's general will, utopianism, and the absence of humility about human sinfulness that produces the Terror."}, {"text": "Without the humility that comes from acknowledging human sinfulness and God's transcendent authority, reason becomes convinced that a perfect society can be engineered by force - the road from the philosophes to Robespierre's guillotine.", "isCorrect": true, "rationale": "The text makes this argument precisely: Enlightenment reason without Christian restraint - without acknowledgment of human sin and divine transcendence - produces the illusion that perfect society can be forced into existence."}, {"text": "Because reason leads to scientific materialism, which denies free will, which makes moral responsibility impossible, which produces anarchic violence.", "isCorrect": false, "rationale": "The text's argument is about the political application of reason without humility, not a chain of philosophical implications about free will."}, {"text": "Because reason requires educated leadership that inevitably becomes an aristocracy, reproducing the same social inequality that Enlightenment thinkers sought to abolish.", "isCorrect": false, "rationale": "The text's argument concerns the specific danger of utopian perfectionism, not the creation of a new intellectual aristocracy."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
