<script>
var QUESTIONS = [{"question": "According to the text, how did the pre-World War I alliance system, as shown on maps, suggest an impending 'trap' for Germany?", "options": [{"text": "Germany was encircled by a powerful naval blockade controlled by Britain, cutting off its trade routes.", "isCorrect": false, "rationale": "While Britain controlled the seas, the 'trap' referred to Germany being 'surrounded on two sides' by the land alignment of France and Russia, not primarily a naval blockade in this specific context."}, {"text": "Germany was positioned between an aligned France and Russia, creating a two-front war scenario, with Britain controlling the seas.", "isCorrect": true, "rationale": "The text explicitly states: 'Look at the map of Europe's alliance system in 1914 and you can see the trap: Germany surrounded on two sides, France and Russia aligned, Britain controlling the seas.' This highlights the two-front challenge and naval dominance."}, {"text": "The Triple Alliance itself contained internal rivalries that weakened Germany's position against the Triple Entente.", "isCorrect": false, "rationale": "The text does not mention internal rivalries within the Triple Alliance as the primary 'trap' for Germany. It focuses on the geographical encirclement by the Triple Entente powers."}, {"text": "Italy's defection from the Triple Alliance before the war left Germany isolated against its rivals.", "isCorrect": false, "rationale": "The text identifies the Triple Alliance as Germany, Austria-Hungary, and Italy in 1914, implying Italy was still part of the alliance at the time the 'trap' was observed, not that it had already defected."}]}, {"question": "The text explains that the stalemate on the Western Front was a result of a mismatch between what two factors?", "options": [{"text": "The length of the front line and the number of troops available to hold it.", "isCorrect": false, "rationale": "While the Western Front was long (700 km), the text attributes the stalemate to the specific interaction of modernized weaponry and outdated tactics, not simply the length or troop numbers."}, {"text": "The industrial transformation of weaponry and the continued use of Napoleonic-era infantry assault tactics.", "isCorrect": true, "rationale": "The text states: 'The Industrial Revolution had transformed weapons but not tactics. Armies in 1914 still used the infantry assault tactics developed in the Napoleonic era... But the weapons available in 1914 made those tactics almost suicidal.'"}, {"text": "The introduction of tanks and airplanes and the lack of combined arms tactics to support them.", "isCorrect": false, "rationale": "Tanks and airplanes were introduced to *break* the stalemate later, but the initial cause of the stalemate was the mismatch between older tactics and new defensive weapons, not the failure of early offensive innovations."}, {"text": "The strategic objective of capturing territory versus the high casualty rates required to achieve it.", "isCorrect": false, "rationale": "This describes the *outcome* of the stalemate, but not the underlying cause of *why* movement was so difficult, which the text attributes to weapons and tactics."}]}, {"question": "Which of the following best analyzes why heavy artillery, despite its destructive power, contributed to the Western Front stalemate rather than breaking it?", "options": [{"text": "Artillery shells were often duds and failed to detonate, making barrages ineffective.", "isCorrect": false, "rationale": "The text does not mention duds as a reason for artillery's contribution to the stalemate. It focuses on other effects."}, {"text": "Its primary role was defensive, used to target enemy reinforcements far behind the front lines.", "isCorrect": false, "rationale": "The text describes artillery as used 'to destroy trench fortifications' preceding assaults, not primarily as a long-range defensive weapon to target reinforcements."}, {"text": "Artillery barrages churned the ground into an impassable wasteland, warned defenders of attacks, and allowed them to prepare their machine guns.", "isCorrect": true, "rationale": "The text states: 'Heavy artillery could destroy trench fortifications, but the barrages that preceded assaults also churned the ground into a cratered wasteland that attacking infantry then had to cross. The artillery warned the defenders an attack was coming. When it stopped, the defenders climbed out of their deep bunkers and were at their machine guns before the attackers crossed No Man's Land.'"}, {"text": "The ammunition for heavy artillery was scarce, limiting its sustained impact on enemy positions.", "isCorrect": false, "rationale": "The text does not discuss ammunition scarcity; it focuses on the operational effects of artillery barrages."}]}, {"question": "The 'teachernote' section compares the Western and Eastern Fronts. What key difference made the Eastern Front more mobile, despite both being 'catastrophically deadly'?", "options": [{"text": "The Eastern Front saw the widespread and successful deployment of tanks and airplanes much earlier than the West.", "isCorrect": false, "rationale": "The text notes tanks only began to restore movement in 1918, and doesn't suggest early widespread success in the East; it attributes the Eastern Front's mobility to other factors."}, {"text": "The Eastern Front was much longer, less densely held, and featured more cavalry and open terrain.", "isCorrect": true, "rationale": "The 'teachernote' explicitly states: 'Why was the Eastern Front so different? (Answer: it was much longer, less densely held, and featured cavalry and more open terrain — though still catastrophically deadly.)'"}, {"text": "The armies on the Eastern Front utilized superior offensive tactics that overcame the defensive technologies.", "isCorrect": false, "rationale": "The text doesn't suggest superior tactics in the East, but rather different geographical and troop density conditions."}, {"text": "The triple Entente focused their main resources on the Eastern Front, ensuring breakthroughs.", "isCorrect": false, "rationale": "The text focuses on the geographical and troop density differences, not a strategic resource allocation imbalance by the Entente to the East."}]}, {"question": "How did the post-Versailles redrawal of European borders, specifically regarding the 'Polish Corridor' and Germany's lost territory, contribute to future instability?", "options": [{"text": "It inadvertently strengthened the remaining German military by consolidating its defense lines.", "isCorrect": false, "rationale": "The text states Germany 'lost territory on every border' and was 'humiliated,' which would weaken, not strengthen, its overall military position."}, {"text": "It created new regions of homogeneous ethnic populations, inadvertently causing a refugee crisis.", "isCorrect": false, "rationale": "The text states that Europe's populations were 'too intermixed' and that 'Ethnic Germans and ethnic Poles were now on opposite sides of new boundaries,' indicating the opposite of homogeneous regions."}, {"text": "It separated East Prussia from the rest of Germany, placing ethnic Germans under Polish rule and fueling resentment.", "isCorrect": true, "rationale": "The text explains: 'But the 'Polish Corridor' — a strip of territory giving Poland access to the sea — cut off the German province of East Prussia from the rest of Germany. Ethnic Germans and ethnic Poles were now on opposite sides of new boundaries.'"}, {"text": "It granted Germany full control over vital industrial areas of Poland, upsetting the balance of power.", "isCorrect": false, "rationale": "Germany lost territory, including in areas bordering Poland, which would not grant it control over Polish industrial areas. The Polish Corridor was about Poland gaining sea access, at Germany's expense."}]}, {"question": "The concept of 'self-determination' was a key principle for redrawing the map of Europe after WWI. According to the text, why did this principle prove difficult to apply effectively in practice?", "options": [{"text": "Most European populations preferred to remain under imperial rule rather than form new nations.", "isCorrect": false, "rationale": "The text implies a desire for self-governance but highlights the practical difficulties in achieving it, not a lack of desire among populations."}, {"text": "The victorious powers deliberately ignored ethnic boundaries to weaken defeated empires further.", "isCorrect": false, "rationale": "While outcomes may have weakened empires, the text attributes the difficulty to the 'intermixed' nature of populations, not deliberate disregard by peacemakers."}, {"text": "Europe's populations were too intermixed, scattered, and divided by competing historical claims for clean boundaries.", "isCorrect": true, "rationale": "The text states: 'President Wilson's principle of self-determination... sounded clean in theory. In practice, Europe's populations were too intermixed, too scattered, and too divided by competing historical claims for any clean boundaries to exist.'"}, {"text": "Only a few ethnic groups were large enough to form viable independent states, limiting its application.", "isCorrect": false, "rationale": "The text highlights the complexity of existing populations, not an insufficient number of large ethnic groups."}]}, {"question": "The 'stabbed in the back' myth gained traction in Germany after WWI because:", "options": [{"text": "Germany had been decisively defeated on the battlefield with its capital occupied by Allied forces.", "isCorrect": false, "rationale": "The text explicitly states: 'Germany had not been invaded. In November 1918, German armies still occupied Belgian and French territory... Many Germans found it impossible to believe they had actually lost the war.' This contradicts the idea of an obvious battlefield defeat."}, {"text": "German propaganda intentionally spread this myth to justify future aggression against its neighbors.", "isCorrect": false, "rationale": "While the myth was exploited later, the text describes its *development* from the perception of an undefeated army returning home, not as a pre-planned propaganda tool."}, {"text": "German armies had not been invaded and returned home intact, making a battlefield defeat seem unbelievable to many.", "isCorrect": true, "rationale": "The text states: 'Germany had not been invaded... German soldiers marched home in orderly formation, their units intact. Many Germans found it impossible to believe they had actually lost the war. A dangerous myth developed: Germany had not been defeated on the battlefield but had been 'stabbed in the back' by revolutionaries and Jews at home.'"}, {"text": "The Treaty of Versailles formally declared that Germany's defeat was due to internal treachery.", "isCorrect": false, "rationale": "The Treaty of Versailles included a war-guilt clause and reparations, but it did not formally endorse the 'stabbed in the back' myth as a reason for Germany's defeat; that was an internal German narrative."}]}, {"question": "Which of the following was a fundamental structural flaw that made the League of Nations 'incapable of stopping a determined aggressor'?", "options": [{"text": "Its reliance on outdated diplomatic protocols from the 19th century that failed to address modern conflicts.", "isCorrect": false, "rationale": "The text describes the League as a 'genuine innovation' and notes its successes in 'small disputes and technical matters,' not as reliant on outdated protocols."}, {"text": "It lacked an independent military force and universal membership, including the absence of the United States.", "isCorrect": true, "rationale": "The text states the League 'had no army' and 'The United States... never joined... Without the United States, the League's 'collective' security was incomplete.' Both are listed as reasons why it could not keep the peace."}, {"text": "The League's headquarters in Geneva were too remote, hindering effective communication and swift decision-making.", "isCorrect": false, "rationale": "The location of its headquarters is not mentioned as a structural flaw in the text."}, {"text": "Its primary focus was on economic reconstruction rather than preventing future military conflicts.", "isCorrect": false, "rationale": "The text describes the League's purpose as an 'international organization where disputes between countries could be resolved by negotiation rather than war,' indicating its primary focus was peace and conflict resolution, though it also did humanitarian work."}]}, {"question": "How did the Treaty of Versailles' approach to Germany, specifically the 'war-guilt clause' and reparations, align with John Maynard Keynes's prediction about destabilizing Europe?", "options": [{"text": "Keynes predicted that such punitive measures would lead to Germany quickly rebuilding its military in defiance.", "isCorrect": false, "rationale": "While Germany eventually rebuilt its military, Keynes's specific prediction mentioned was that the 'treaty's combination of humiliation and economic burden would destabilize Europe,' not specifically military defiance."}, {"text": "Keynes believed that Germany deserved the full blame and economic burden, so the treaty would ensure stability.", "isCorrect": false, "rationale": "Keynes's prediction that the treaty would 'destabilize Europe' directly contradicts the idea that he believed it would ensure stability or that Germany deserved its burden for the sake of stability."}, {"text": "Keynes foresaw that the combination of humiliation and economic burden placed on Germany would lead to European instability.", "isCorrect": true, "rationale": "The text explicitly states: 'The economist and diplomat John Maynard Keynes predicted at the time that the treaty's combination of humiliation and economic burden would destabilize Europe. He was right.'"}, {"text": "Keynes argued for even harsher terms against Germany to prevent any resurgence of power, which the treaty failed to deliver.", "isCorrect": false, "rationale": "Keynes's prediction was about the destabilizing effect of the existing terms, not a call for harsher ones."}]}, {"question": "The text compares the Peace of Westphalia (1648) and the Treaty of Versailles (1919). What was a key aspect that Westphalia 'got right' that Versailles 'got wrong' regarding lasting peace?", "options": [{"text": "Westphalia established a powerful international army to enforce its terms, which Versailles failed to do.", "isCorrect": false, "rationale": "The text does not mention an international army being established by Westphalia. It contrasts Westphalia's inclusive approach with Versailles' punitive one."}, {"text": "Westphalia included the defeated parties in negotiations and avoided assigning blame or demanding punishment.", "isCorrect": true, "rationale": "The text states Westphalia 'included the defeated parties in the negotiations, giving them a stake in the outcome' and 'did not assign blame or demand punishment, so the defeated parties had less incentive to repudiate the settlement.' It concludes: 'Versailles violated each of these principles.'"}, {"text": "Westphalia successfully created a unified European empire, ending centuries of conflict.", "isCorrect": false, "rationale": "The Peace of Westphalia recognized the sovereignty of states and laid the groundwork for the modern state system, it did not create a unified empire."}, {"text": "Westphalia's terms were intentionally vague to allow for flexible interpretation over time, unlike Versailles' rigid demands.", "isCorrect": false, "rationale": "The text emphasizes Westphalia's explicit inclusion of defeated parties and lack of blame/punishment, not intentional vagueness, as its success factors."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
