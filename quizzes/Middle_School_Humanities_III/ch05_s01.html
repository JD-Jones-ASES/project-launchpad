        <a href="../../courses/Middle_School_Humanities_III.html">&larr; Back to History &amp; Humanities III</a>

        <h1>QUIZ</h1>
        <div class="subtitle">History &amp; Humanities III &mdash; Chapter 5, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The period of European expansion (roughly 1492-1888) is described as one of the most consequential in human history primarily because it:", "options": [{"text": "Led to the immediate abolition of all forms of forced labor worldwide.", "isCorrect": false, "rationale": "The text explicitly states that this period created suffering on a scale difficult to comprehend, including forced labor and the Atlantic slave trade, making this option incorrect."}, {"text": "Established the foundation for the current global economy and involved both profound suffering and new connections between peoples.", "isCorrect": true, "rationale": "The text states this period 'created the global economy we still live in. It also created suffering on a scale that is difficult to comprehend.' It also notes 'These empires brought trade, Christian mission, and new connections between peoples. They also brought conquest, forced labor, and the Atlantic slave trade,' aligning with the dual nature described."}, {"text": "Unified all global cultures under a single economic and political system.", "isCorrect": false, "rationale": "While it created a global economy and connections, it did not unify all cultures under a single system; rather, it established European dominance and created empires, making this option incorrect."}, {"text": "Resulted in European nations abandoning colonial ambitions in favor of international cooperation.", "isCorrect": false, "rationale": "The text clearly states that 'European nations had claimed vast stretches of territory on every inhabited continent,' indicating increased colonial ambition, not abandonment."}]}, {"question": "According to the text, approximately how many enslaved Africans were transported across the Atlantic Ocean during the main period of the Atlantic slave trade, and what proportion died during the Middle Passage?", "options": [{"text": "Six million transported, one in two died.", "isCorrect": false, "rationale": "These numbers do not match the statistics provided in the text."}, {"text": "Twelve million transported, roughly one in seven died during the ocean crossing.", "isCorrect": true, "rationale": "The text states: 'captured or purchased approximately twelve million African men, women, and children and transported them across the Atlantic Ocean... About 1.8 million of those people — roughly one in seven — died during the ocean crossing alone.'"}, {"text": "Eight million transported, one in ten died.", "isCorrect": false, "rationale": "These numbers do not match the statistics provided in the text."}, {"text": "Twenty million transported, one in three died.", "isCorrect": false, "rationale": "These numbers do not match the statistics provided in the text."}]}, {"question": "The demand for enslaved labor in the Americas was primarily driven by which of the following factors?", "options": [{"text": "A scarcity of indigenous populations willing to work on farms.", "isCorrect": false, "rationale": "While indigenous populations suffered greatly, the text specifically identifies the *type* of crops and the labor required as the primary driver for enslaved African labor, not simply a general scarcity of willing workers."}, {"text": "The need to cultivate specific cash crops like sugar and tobacco that required intense physical labor in difficult climates.", "isCorrect": true, "rationale": "The text states: 'The demand for enslaved labor was driven by the plantation economy of the Americas. Sugar, tobacco, cotton, and rice — crops that Europeans craved and that grew profitably in the Caribbean and the American South — required enormous amounts of hard physical labor in brutal heat.'"}, {"text": "European desire to establish new industrial factories in the Americas.", "isCorrect": false, "rationale": "The text focuses on 'plantation economy' and agricultural cash crops, not industrial factories, as the primary driver for enslaved labor."}, {"text": "African kings and merchants actively recruiting laborers for overseas work.", "isCorrect": false, "rationale": "African kings and merchants participated in capturing and selling enslaved people, but the demand originated from European colonists for their plantation economy, not from African recruitment for overseas work."}]}, {"question": "The English East India Company's evolution from a private trading corporation to a governing power in India exemplifies which broader historical pattern described in the text?", "options": [{"text": "The consistent and immediate direct control of colonial territories by European monarchs.", "isCorrect": false, "rationale": "The text emphasizes that the Company was a *private* entity that gradually gained power before the British crown took direct control much later (1858), contradicting 'consistent and immediate direct control.'"}, {"text": "How commercial interests can gradually expand into significant political and military authority.", "isCorrect": true, "rationale": "The text explicitly calls the East India Company 'one of history's most striking examples of how commercial interests can expand into political and military power.' It also notes the 'transition from trade to conquest was gradual.'"}, {"text": "The primary role of missionaries in establishing European political control in Asia.", "isCorrect": false, "rationale": "While missionaries played a role in European expansion generally, the text attributes the East India Company's rise to its commercial interests and the building of a 'private army,' not primarily missionary efforts."}, {"text": "The universal rejection of European trading influence by local rulers in Asia.", "isCorrect": false, "rationale": "The text states the Company would 'offer protection to a local ruler in exchange for trading privileges; the ruler would become dependent,' indicating collaboration and dependence, not universal rejection."}]}, {"question": "The 'contradiction' highlighted in the American Revolution's founding principles, as described in the text, refers to:", "options": [{"text": "The colonists' cry for economic independence from Britain while still relying on British goods.", "isCorrect": false, "rationale": "While there might have been economic complexities, the 'caution' box specifically addresses the moral contradiction between the Declaration's ideals and slavery, not economic reliance."}, {"text": "The declaration that 'all men are created equal' by leaders who themselves owned enslaved people.", "isCorrect": true, "rationale": "The text states: 'The contradiction between the Declaration's language and the reality of American slavery was not lost on people at the time. Abigail Adams wrote to her husband John that she could not reconcile the colonists' cry for liberty with their ownership of slaves.'"}, {"text": "The desire for a democratic republic while maintaining a social hierarchy.", "isCorrect": false, "rationale": "While social hierarchies existed, the text specifically points out the direct conflict between 'all men are created equal' and the institution of slavery practiced by the founders, making this a less precise answer."}, {"text": "The rejection of European monarchical rule while adopting European Enlightenment ideas.", "isCorrect": false, "rationale": "The text explains that the Declaration of Independence was 'shaped directly by the Enlightenment political philosophy,' indicating an embrace, not a rejection, of these ideas."}]}, {"question": "The Haitian Revolution holds a unique place in history primarily because it:", "options": [{"text": "Was the first successful challenge to European colonial rule in the Americas.", "isCorrect": false, "rationale": "The American Revolution predates the Haitian Revolution as the first successful challenge to European colonial rule in the Americas."}, {"text": "Led to the immediate and widespread abolition of slavery across all French colonies.", "isCorrect": false, "rationale": "The revolution abolished slavery in Saint-Domingue, leading to Haiti's independence, but it did not immediately abolish slavery across *all* French colonies; Napoleon even attempted to restore it."}, {"text": "Was the only successful slave revolt that resulted in the creation of a lasting independent state.", "isCorrect": true, "rationale": "The text states: 'It is unique in history as the only slave revolt that succeeded in creating a lasting independent state.'"}, {"text": "Demonstrated that enslaved people were content with their conditions if offered limited self-governance.", "isCorrect": false, "rationale": "The text states the revolution 'showed, undeniably, that enslaved people were not content, were not incapable of self-governance, and would fight for their freedom,' directly contradicting this option."}]}, {"question": "Which of the following best describes a key strategy employed by the British abolitionist movement?", "options": [{"text": "Engaging in armed rebellion against slave owners in the colonies.", "isCorrect": false, "rationale": "The British abolitionist movement primarily used political and moral lobbying tactics, not armed rebellion."}, {"text": "Forming a broad coalition to organize public campaigns, collect petitions, and lobby Parliament based on moral and philosophical principles.", "isCorrect": true, "rationale": "The text details: 'abolitionists organized public campaigns, collected petitions, published testimonies by formerly enslaved people... and lobbied Parliament for decades. Their arguments rested on both Christian moral principle... and Enlightenment natural rights philosophy.'"}, {"text": "Relying solely on the economic impracticality of slavery to convince slaveholders to free enslaved people.", "isCorrect": false, "rationale": "While economic arguments might have existed, the text emphasizes the moral and philosophical principles (Christian faith, natural rights) as the basis for their arguments, not solely economic impracticality."}, {"text": "Advocating for gradual emancipation over several centuries to minimize economic disruption.", "isCorrect": false, "rationale": "The movement successfully campaigned for the abolition of the slave trade in 1807 and then slavery itself in 1833, a relatively rapid timeline driven by strong moral conviction, not an extremely gradual approach over centuries."}]}, {"question": "A critical detail regarding the British Emancipation Act of 1833, which raises 'moral questions' according to the text, is that:", "options": [{"text": "It only freed enslaved people over the age of 60.", "isCorrect": false, "rationale": "The text states the Act freed 'approximately 800,000 enslaved people in British colonies,' without an age restriction."}, {"text": "The British government paid compensatory money to the slaveholders, not to the formerly enslaved people.", "isCorrect": true, "rationale": "The text explicitly notes: '(The British government also paid compensatory money — to the slaveholders, not to the enslaved people, which is a historical fact that raises its own moral questions.)'"}, {"text": "It immediately led to a widespread economic collapse in British colonies.", "isCorrect": false, "rationale": "The text does not mention an immediate widespread economic collapse as a direct consequence, only the compensation aspect."}, {"text": "It mandated that formerly enslaved people be immediately resettled in Africa.", "isCorrect": false, "rationale": "The text does not mention any such mandate for resettlement in Africa."}]}, {"question": "The British government's justification for the Opium Wars, when viewed through the 'note' in the text, demonstrates a tension between:", "options": [{"text": "The desire for territorial expansion and the cost of maintaining an empire.", "isCorrect": false, "rationale": "While territorial expansion was a factor in empire, the note specifically focuses on the *justification* of 'free trade' for the opium traffic, not the general costs of empire."}, {"text": "The principle of promoting 'free trade' and its application to selling a destructive, addictive substance.", "isCorrect": true, "rationale": "The text states: 'The British government was not simply acting out of blind cruelty; it genuinely believed in free trade as a universal good. But 'free trade' here meant the freedom to sell a destructive drug to an unwilling population. The gap between the principle and its application is instructive.'"}, {"text": "The support for local Chinese industries and the demand for British manufactured goods.", "isCorrect": false, "rationale": "The text mentions China had its own manufactures and little interest in European goods, which is background for the trade deficit, but not the core tension highlighted in the 'note' regarding the justification for war."}, {"text": "The enforcement of international law and the sovereignty of independent nations.", "isCorrect": false, "rationale": "Britain's actions in the Opium Wars were a violation of China's sovereignty, not an enforcement of international law, especially concerning the illegal opium trade."}]}, {"question": "A 'classical Christian assessment' of European expansion, as described in the text, requires historians to:", "options": [{"text": "Focus exclusively on the positive contributions, such as the spread of Christianity and literacy.", "isCorrect": false, "rationale": "The text explicitly states: 'A classical Christian assessment must hold both realities honestly: genuine goods and genuine evils, often carried by the same ships,' which contradicts focusing exclusively on positives."}, {"text": "Acknowledge both the genuine goods, like new connections and the spread of the Gospel, and the genuine evils, such as forced labor and conquest.", "isCorrect": true, "rationale": "The text emphasizes: 'European expansion was not simply good or simply evil. A classical Christian assessment holds both sides of the ledger,' listing examples of both positive and negative impacts."}, {"text": "Prioritize the suffering caused by European expansion over any benefits, labeling the entire period as an unmitigated tragedy.", "isCorrect": false, "rationale": "While acknowledging immense suffering, the text calls for holding 'both realities honestly,' not prioritizing one over the other to label it solely as an unmitigated tragedy."}, {"text": "Conclude that the benefits of global trade ultimately outweighed the moral costs of empire building.", "isCorrect": false, "rationale": "The text does not suggest one side ultimately 'outweighed' the other but rather emphasizes the need to 'hold both realities honestly' without reducing the complexity to a simple balance sheet where one side wins."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
