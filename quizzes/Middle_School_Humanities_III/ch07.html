<script>
var QUESTIONS = [{"question": "How did the assassination of Archduke Franz Ferdinand trigger a world war within six weeks?", "options": [{"text": "Franz Ferdinand's death gave France the pretext it had been waiting for to invade Germany and reclaim Alsace-Lorraine, triggering the alliance system.", "isCorrect": false, "rationale": "France did not initiate hostilities; the chain began with Austria-Hungary's ultimatum to Serbia following the assassination in Sarajevo."}, {"text": "The alliance system converted a regional Balkan crisis into a world war: Austria-Hungary declared war on Serbia; Russia mobilized; Germany declared war on Russia and France; Germany invaded Belgium; Britain declared war on Germany - all within six weeks.", "isCorrect": true, "rationale": "The text traces this exact chain of events, driven by the network of treaties that obligated each power in succession."}, {"text": "Germany immediately invaded France upon hearing of the assassination, using it as a pretext for a war it had already planned in detail.", "isCorrect": false, "rationale": "Germany did not immediately invade; the chain of events went through Serbia, Austria-Hungary, and Russia before Germany acted."}, {"text": "The Ottoman Empire allied with Serbia to avenge the assassination and its declaration of war brought all other European powers into the conflict.", "isCorrect": false, "rationale": "The Ottoman Empire eventually allied with Germany and Austria-Hungary against the Entente; it did not ally with Serbia."}], "id": "q01"}, {"question": "What was the alliance system in 1914, and why did it fail to prevent war?", "options": [{"text": "A network of trade agreements designed to prevent war through economic interdependence; it failed because industrialization made countries less dependent on each other.", "isCorrect": false, "rationale": "The alliance system consisted of military defense treaties, not trade agreements; it failed for military and diplomatic reasons."}, {"text": "A network of military defense treaties dividing Europe into the Triple Alliance (Germany, Austria-Hungary, Italy) and Triple Entente (France, Russia, Britain); designed to deter war but failed because military timetables moved faster than diplomats could negotiate, mobilization could not be cancelled, and leaders underestimated industrial war's destructiveness.", "isCorrect": true, "rationale": "The text defines both alliance blocs and gives the specific reasons for failure: timetables, irreversible mobilization, and underestimation of destructiveness."}, {"text": "A series of colonial agreements dividing Africa and Asia between European powers; it failed when competition for remaining territories produced irresolvable conflict.", "isCorrect": false, "rationale": "The alliance system was a military defense pact network, not colonial division agreements."}, {"text": "A diplomatic system of ambassadors stationed at every European capital who mediated disputes; it failed when the Austrian ambassador to Serbia was assassinated along with Franz Ferdinand.", "isCorrect": false, "rationale": "The alliance system was treaty-based, not ambassador-based; the assassination victim was Franz Ferdinand, not an ambassador."}], "id": "q02"}, {"question": "What was the Schlieffen Plan, and what happened when it failed?", "options": [{"text": "Germany's plan to invade Russia first, then turn west to face France; when Russia proved stronger than expected, Germany was forced to fight on two fronts simultaneously.", "isCorrect": false, "rationale": "The Schlieffen Plan was the opposite: knock out France first in the west through Belgium, then turn east to face Russia."}, {"text": "Germany's plan for a rapid six-week knockout of France through Belgium, then transfer forces east to face Russia; when it failed at the First Battle of the Marne (September 1914), Germany was stuck in the long attritional war it had hoped to avoid.", "isCorrect": true, "rationale": "The text describes the plan's logic and its failure at the Marne, leading to the four-year stalemate on the Western Front."}, {"text": "An Austro-Hungarian plan to defeat Serbia quickly before Russia could mobilize; when it failed to deliver quick victory, it triggered the Russian mobilization that expanded the war.", "isCorrect": false, "rationale": "The Schlieffen Plan was German, not Austro-Hungarian, and concerned the French front, not Serbia."}, {"text": "A defensive plan in which Germany would allow France to attack through Alsace-Lorraine while German forces secretly massed on the Russian border; it failed when France did not attack as expected.", "isCorrect": false, "rationale": "The Schlieffen Plan was an offensive strategy sending German forces through Belgium to attack France from the north."}], "id": "q03"}, {"question": "What was trench warfare, and why did it produce a stalemate on the Western Front?", "options": [{"text": "A defensive strategy in which both sides dug deep bunkers and refused to attack; the stalemate lasted because neither side had enough soldiers to continue fighting.", "isCorrect": false, "rationale": "Both sides repeatedly attacked; the stalemate resulted not from refusal to attack but from the inability to advance despite attacking."}, {"text": "Opposing armies dug parallel trench systems; machine guns, barbed wire, and artillery made attacking infantry almost impossible to advance across open ground (No Man's Land) faster than defenders could kill them.", "isCorrect": true, "rationale": "The text describes both the structure (parallel trenches, No Man's Land) and the mechanical reason for stalemate: industrial weapons favored defense over offense."}, {"text": "A new form of cavalry warfare in which horses were used to charge enemy trenches; stalemate resulted when both sides developed anti-cavalry defenses.", "isCorrect": false, "rationale": "Trench warfare made cavalry obsolete; the stalemate resulted from industrial weapons favoring defense, not cavalry attacks."}, {"text": "A naval strategy in which both sides blockaded each other's ports; the stalemate resulted from technological equality in submarine and surface warfare.", "isCorrect": false, "rationale": "Trench warfare was the land strategy on the Western Front; the naval war was a separate aspect."}], "id": "q04"}, {"question": "What happened on the first day of the Battle of the Somme (July 1, 1916), and what does it illustrate about the war?", "options": [{"text": "British forces achieved a decisive breakthrough of German lines and advanced twenty miles, illustrating that the war would soon end.", "isCorrect": false, "rationale": "The first day of the Somme was the bloodiest single day in British military history; there was no decisive breakthrough."}, {"text": "The British Army suffered approximately 57,000 casualties including nearly 20,000 dead in a single day - the bloodiest in British military history - illustrating that industrial-era defensive technology made offensive action catastrophically costly.", "isCorrect": true, "rationale": "The text gives these specific numbers and identifies it as the bloodiest single day in British military history."}, {"text": "French and British forces failed to coordinate their attacks, illustrating the alliance coordination problems that prevented effective strategy throughout the war.", "isCorrect": false, "rationale": "While Allied coordination was sometimes difficult, the text identifies the first day's losses as illustrating the defensive power of industrial weapons."}, {"text": "German forces launched a surprise attack on British supply lines, illustrating that the German high command was more strategically innovative than Allied commanders.", "isCorrect": false, "rationale": "The July 1 offensive was a British attack on German lines; the British suffered the catastrophic casualties, not the Germans."}], "id": "q05"}, {"question": "What was the Battle of Verdun (1916), and what was its strategic purpose?", "options": [{"text": "A French offensive intended to recapture Alsace-Lorraine; the French commander chose Verdun because its capture would psychologically break German morale.", "isCorrect": false, "rationale": "Verdun was a German offensive, not French; the German commander (Falkenhayn) chose Verdun as a symbolic French fortress specifically to bleed France."}, {"text": "The German commander Falkenhayn deliberately chose Verdun as a French fortress of great symbolic importance, attacking with the intention of 'bleeding France white'; lasted ten months and killed approximately 700,000 men.", "isCorrect": true, "rationale": "The text describes Falkenhayn's deliberate strategic calculation and the battle's ten-month duration and approximately 700,000 total casualties."}, {"text": "An Allied attempt to break through German lines in Flanders using massed tank attacks for the first time; Germany's defensive network stopped the advance.", "isCorrect": false, "rationale": "Verdun was in northeastern France, not Flanders; it was an infantry-and-artillery battle, not a tank offensive."}, {"text": "A German offensive to capture Paris; the attack was stopped when French reinforcements were rushed to Verdun by a famous convoy of taxi cabs.", "isCorrect": false, "rationale": "The taxi cab story belongs to the First Battle of the Marne (1914), not Verdun; Verdun was not an attempt to capture Paris."}], "id": "q06"}, {"question": "What was the Gallipoli campaign (1915-1916), and what was its outcome?", "options": [{"text": "A successful Allied campaign that knocked the Ottoman Empire out of the war and opened supply lines to Russia through the Dardanelles.", "isCorrect": false, "rationale": "The text describes Gallipoli as 'one of the most complete Allied failures of the war'; the Ottomans were not defeated."}, {"text": "An Allied attempt to force the Dardanelles strait and knock the Ottoman Empire out of the war; championed by Churchill; ended in catastrophe with nearly half a million casualties on both sides before the Allies withdrew after eight months.", "isCorrect": true, "rationale": "The text describes the campaign's purpose, Churchill's role, the eight months pinned on the beaches, and the catastrophic Allied failure."}, {"text": "An Ottoman invasion of Greece championed by German advisors that failed when British naval forces intervened to protect their Greek ally.", "isCorrect": false, "rationale": "Gallipoli was an Allied invasion of Ottoman territory, not an Ottoman invasion of Greece."}, {"text": "An Allied landing in southern France intended to outflank the German lines on the Western Front; it succeeded in drawing German reserves away from the Somme.", "isCorrect": false, "rationale": "Gallipoli was in the Ottoman Empire (modern Turkey), not southern France; it did not succeed in its objectives."}], "id": "q07"}, {"question": "What were the two decisive ways the war changed course in 1917?", "options": [{"text": "Germany developed poison gas as a new weapon and Italy switched from the Allied to the German side.", "isCorrect": false, "rationale": "Poison gas was first used in 1915; Italy joined the Allies in 1915. The 1917 transformations were US entry and Russia's collapse."}, {"text": "The United States entered the war (April 1917) providing fresh manpower and morale; Russia collapsed, with the Bolsheviks seizing power and immediately beginning peace negotiations with Germany.", "isCorrect": true, "rationale": "The text explicitly identifies these two transformations as decisive in 1917."}, {"text": "France and Britain signed the Treaty of London reorganizing their command structure under a unified general staff; Germany achieved a breakthrough at Passchendaele.", "isCorrect": false, "rationale": "The 1917 transformations the text identifies are US entry and Russia's collapse, not Allied command reorganization."}, {"text": "Ottoman Turkey and Austria-Hungary surrendered, freeing Allied forces to concentrate entirely against Germany on the Western Front.", "isCorrect": false, "rationale": "These Central Power surrenders came in late 1918, not 1917; the 1917 transformations were US entry and Russia's collapse."}], "id": "q08"}, {"question": "What were Wilson's Fourteen Points, and what happened to them at the Paris Peace Conference?", "options": [{"text": "Wilson's Fourteen Points became the basis of the Treaty of Versailles; his idealistic vision was fully implemented, creating a new world order based on national self-determination.", "isCorrect": false, "rationale": "Wilson's idealism collided with European realpolitik; many of his points were rejected or weakened; the treaty imposed punitive conditions on Germany."}, {"text": "Wilson's proposal for peace including open diplomacy, freedom of the seas, national self-determination, and a League of Nations; his idealism collided with France's demand to cripple Germany and Britain's desire to preserve empire; many points were rejected or weakened.", "isCorrect": true, "rationale": "The text describes both the content of Wilson's Fourteen Points and the outcome: European realpolitik overrode his idealism."}, {"text": "Wilson refused to attend the Paris Peace Conference in person, submitting his Fourteen Points by telegram; the Allied powers agreed to them in full as a precondition for the armistice.", "isCorrect": false, "rationale": "Wilson personally attended the Paris conference; his points were not accepted in full but were largely rejected or weakened."}, {"text": "Wilson's Fourteen Points were rejected by the American Senate before the conference, leaving the US without a position at the Paris negotiations.", "isCorrect": false, "rationale": "The Senate rejected the treaty and League of Nations after the conference, not before; Wilson attended and negotiated."}], "id": "q09"}, {"question": "What was the war guilt clause (Article 231) of the Treaty of Versailles, and why did it matter?", "options": [{"text": "The clause declaring Germany completely blameless for the war, which Germany used to demand that France and Britain pay reparations for starting the conflict.", "isCorrect": false, "rationale": "The war guilt clause forced Germany to accept full responsibility for the war, not blamelessness."}, {"text": "The clause forcing Germany to accept full responsibility for causing the war, used to justify massive reparations; most Germans considered it a lie; it became a source of lasting bitterness and a rallying cry for German nationalists.", "isCorrect": true, "rationale": "The text defines it precisely this way: the basis for reparations, rejected by most Germans as unjust, and a source of nationalist grievance."}, {"text": "A clause giving the League of Nations the power to prosecute German military commanders for war crimes committed against civilians.", "isCorrect": false, "rationale": "The war guilt clause was an acknowledgment of responsibility for causing the war, not a war crimes prosecution mechanism."}, {"text": "A mutual war guilt declaration in which all belligerent nations acknowledged shared responsibility for the conflict, allowing both sides to move forward without bitterness.", "isCorrect": false, "rationale": "The war guilt clause was one-sided: it forced Germany alone to accept responsibility, which is exactly why most Germans rejected it as unjust."}], "id": "q10"}, {"question": "What were the reparations imposed on Germany, and why were they economically significant?", "options": [{"text": "Modest payments spread over ten years that Germany paid in full within a decade, allowing rapid German economic recovery by the 1930s.", "isCorrect": false, "rationale": "The reparations were set at 132 billion gold marks - a sum economists then and now considered impossible to pay without destroying the German economy."}, {"text": "132 billion gold marks - an amount economists considered impossible to pay without destroying the German economy; contributed to German economic instability throughout the 1920s and early 1930s.", "isCorrect": true, "rationale": "The text gives the specific sum and the economic assessment, explicitly connecting reparations to German economic instability."}, {"text": "Reparations in the form of territorial concessions only - Germany surrendered colonies and European territories but paid no financial compensation.", "isCorrect": false, "rationale": "Versailles imposed both territorial losses and financial reparations; the 132 billion gold marks were financial payments."}, {"text": "Symbolic reparations of one year's prewar German GDP, intended to acknowledge German responsibility without actually damaging the German economy.", "isCorrect": false, "rationale": "The reparations were not symbolic but genuinely damaging; economists considered them impossible to pay without destroying the economy."}], "id": "q11"}, {"question": "What was the League of Nations, and why did it fail?", "options": [{"text": "A military alliance of the victorious Allied powers pledging to prevent Germany from rearming; it failed when Germany violated its terms in the 1930s without consequence.", "isCorrect": false, "rationale": "The League was an international peace organization, not a military alliance; it was not specifically about preventing German rearmament."}, {"text": "An international peace organization established by the Treaty of Versailles based on collective security; it failed because the United States never joined, it had no army, its only tools were economic sanctions and moral pressure, and it proved unable to stop aggressive nations in the 1930s.", "isCorrect": true, "rationale": "The text describes all of these failure factors: no US, no army, weak tools, and inability to stop aggressors."}, {"text": "A court system established to try war criminals from both sides; it failed because Germany refused to extradite the accused officers.", "isCorrect": false, "rationale": "The League was not a war crimes court; it was a collective security organization meant to maintain peace."}, {"text": "A successful international organization that maintained peace in Europe for two decades, only failing when Hitler dissolved it in 1938.", "isCorrect": false, "rationale": "The League was fatally weakened from the start (no US membership) and failed to stop aggression in the 1930s well before any formal dissolution."}], "id": "q12"}, {"question": "How does the text compare Ernst Junger's and Erich Maria Remarque's accounts of the same war?", "options": [{"text": "Junger was a patriotic propagandist who invented heroic stories; Remarque was a neutral observer who recorded the truth objectively.", "isCorrect": false, "rationale": "The text calls both men 'honest witnesses'; neither is dismissed as propagandist or pure objective observer."}, {"text": "Both are honest witnesses to the same events who drew opposite conclusions: Junger found in combat exhilaration, pride, and intense aliveness; Remarque found it meaningless and destructive. The difference shows that primary sources reflect their author's perspective, not just 'the facts.'", "isCorrect": true, "rationale": "The text describes them as 'two honest witnesses to the same catastrophe' who drew different conclusions, illustrating that even honest witnesses see the same event differently."}, {"text": "Junger wrote from the German perspective and Remarque from the Allied perspective; the difference illustrates how the same events look different depending on which side you fought for.", "isCorrect": false, "rationale": "Both Junger and Remarque were German veterans; their different perspectives are not a matter of which side they fought on."}, {"text": "Junger wrote immediately after the war; Remarque wrote decades later with the benefit of historical perspective; the difference shows how time changes our understanding of events.", "isCorrect": false, "rationale": "Both books were published in 1929; the difference is not about time but about temperament and experience."}], "id": "q13"}, {"question": "What was the principle of self-determination that Woodrow Wilson championed?", "options": [{"text": "The right of individual citizens to choose their personal religious affiliation without government interference.", "isCorrect": false, "rationale": "Self-determination in Wilson's sense refers to peoples of a common nationality governing themselves, not individual religious freedom."}, {"text": "The principle that peoples of a common nationality have the right to govern themselves; Wilson hoped peace boundaries would match ethnic and cultural lines; in practice, Europe's populations were too intermixed for clean boundaries, and new states contained large dissatisfied minorities.", "isCorrect": true, "rationale": "The text defines self-determination precisely this way and identifies the practical problem: Europe's intermixed populations made clean national boundaries impossible."}, {"text": "The right of individual workers to determine their own wages and working conditions through union collective bargaining without government interference.", "isCorrect": false, "rationale": "Wilson's self-determination was a principle of international politics about national governance, not labor relations."}, {"text": "The principle that nations could choose whether to participate in the League of Nations, making membership voluntary rather than obligatory.", "isCorrect": false, "rationale": "League membership was described as universal in Wilson's vision; self-determination concerned the right of peoples to govern themselves nationally."}], "id": "q14"}, {"question": "What unstable tensions did the Treaty of Versailles leave unresolved?", "options": [{"text": "The treaty successfully resolved all major disputes; the instability that followed came from economic depression rather than the treaty's terms.", "isCorrect": false, "rationale": "The text specifically notes the tensions the treaty left: humiliated Germany, dissatisfied minorities, toothless League, exhausted continent."}, {"text": "A humiliated Germany burning with grievance over the war guilt clause and reparations; ethnic minorities trapped in new states that did not want them; a League of Nations without teeth; a continent exhausted and grieving.", "isCorrect": true, "rationale": "The text lists precisely these unresolved tensions and notes that 'history rarely ends cleanly.'"}, {"text": "The failure to redraw colonial boundaries, leaving European empires intact and guaranteeing future wars of colonial independence.", "isCorrect": false, "rationale": "While colonial questions were indeed unresolved at Versailles, the text focuses on the specifically European tensions it created."}, {"text": "Britain and France's failure to pay their war debts to the United States, creating financial instability that threatened to collapse the global banking system.", "isCorrect": false, "rationale": "Allied war debts were a real issue but not what the text identifies as the primary tensions created by the Treaty of Versailles."}], "id": "q15"}, {"question": "Who was Wilfred Owen and what makes his poem 'Dulce et Decorum Est' significant?", "options": [{"text": "A French general who wrote poetry glorifying the sacrifice of French soldiers; the poem is significant for inspiring continued French resistance after massive losses.", "isCorrect": false, "rationale": "Owen was a British officer-poet, not a French general; his poem is known for challenging, not glorifying, war's sacrifice."}, {"text": "A young British officer-poet who wrote the most famous anti-war poem of the war in 1917 and died one week before the Armistice; his work is one of three literary voices in the chapter alongside Junger and Remarque.", "isCorrect": true, "rationale": "The text identifies Owen as the third literary voice alongside Junger and Remarque, noting he died one week before the Armistice."}, {"text": "An American volunteer poet who wrote about the horrors of the Western Front before the United States officially entered the war; his work helped turn American public opinion toward intervention.", "isCorrect": false, "rationale": "Owen was a British officer, not an American volunteer; his work did not specifically aim at turning American opinion."}, {"text": "A German poet whose work celebrating the war was later used as propaganda by the Nazi party; significant as an example of how literature can be weaponized.", "isCorrect": false, "rationale": "Owen was a British officer whose work is a powerful anti-war statement; he is not associated with Nazi Germany or war propaganda."}], "id": "q16"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
