<div class="quiz-container">

        <a href="../../courses/Middle_School_Humanities_III.html">&larr; Back to History &amp; Humanities III</a>
    </div>

        <div class="subtitle">History &amp; Humanities III &mdash; Chapter 4, Section 3</div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "The text states that 'the means of spreading ideas shapes the ideas themselves.' Which of the following best exemplifies this principle in the context of the Enlightenment?", "options": [{"text": "The exclusive nature of university lectures, limiting the reach of complex philosophical texts.", "isCorrect": false, "rationale": "University lectures were formal institutions from which many were excluded. The text emphasizes how more open means, like salons and coffeehouses, broadened participation and discourse, thus shaping the ideas themselves."}, {"text": "The collaborative, conversational atmosphere of salons and coffeehouses, fostering shared development and debate.", "isCorrect": true, "rationale": "Salons and coffeehouses created spaces for direct conversation, debate, and the sharing of diverse perspectives. This interactive environment, as a 'means' of spreading ideas, actively shaped how those ideas evolved, were challenged, and refined, rather than being static pronouncements."}, {"text": "The rapid printing of official government decrees, ensuring widespread compliance and understanding.", "isCorrect": false, "rationale": "Government decrees represent a top-down method of information dissemination, not typically associated with shaping complex philosophical ideas through open discourse. The Enlightenment emphasized critical thought and debate."}, {"text": "The slow and unreliable nature of the postal system, leading philosophers to write shorter, simpler letters.", "isCorrect": false, "rationale": "While the postal system had limitations, thinkers adapted by using coded language or pseudonyms, not necessarily simplifying their ideas. The system was robust enough to sustain a continent-wide conversation, influencing how ideas were shared, but not fundamentally simplifying their content."}], "id": "q01"}, {"question": "What implicit argument did the Encyclopédie make by treating all fields of knowledge, from theology to clockmaking, with equal seriousness?", "options": [{"text": "That the primary purpose of intellectual pursuit was to serve the practical needs of society.", "isCorrect": false, "rationale": "While the Encyclopédie included practical arts, its primary implicit argument was not merely utility, but a challenge to traditional hierarchies of knowledge and authority."}, {"text": "That human reason was capable of organizing and understanding all aspects of existence, thereby challenging singular authority.", "isCorrect": true, "rationale": "By giving equal weight to diverse fields, the Encyclopédie implicitly asserted that all knowledge could be subjected to human reason and systematic organization, undermining the exclusive claims to truth by any single institution like the Church or monarchy."}, {"text": "That religious dogma and scientific inquiry were inherently compatible and should be integrated.", "isCorrect": false, "rationale": "The Encyclopédie included theology but often presented it in a way that challenged traditional interpretations, leading to condemnation. Its aim was not necessarily integration but comprehensive, reasoned examination."}, {"text": "That only the knowledge developed through empirical scientific methods held true value.", "isCorrect": false, "rationale": "While valuing science, the Encyclopédie embraced a wide spectrum of knowledge, including philosophy, history, and arts, not just empirically derived scientific facts, and aimed for a comprehensive summary of human knowledge."}], "id": "q02"}, {"question": "Beyond specific offensive articles, why was the Encyclopédie fundamentally considered subversive by the French government and the Church?", "options": [{"text": "It openly advocated for the violent overthrow of the monarchy and the Church.", "isCorrect": false, "rationale": "While subversive, the Encyclopédie did not openly advocate for violent revolution. Its subversion was more intellectual, challenging the foundational principles of absolute authority rather than calling for immediate insurrection."}, {"text": "It claimed that human reason alone could organize, examine, and judge all knowledge, diminishing traditional authority.", "isCorrect": true, "rationale": "The core reason for its subversion was its assertion that all knowledge was subject to human reason, implying that tradition, Church dogma, and royal decrees were not sufficient justifications for belief, thus directly challenging the legitimacy of established powers."}, {"text": "It was primarily funded by foreign Protestant nations explicitly hostile to Catholic France.", "isCorrect": false, "rationale": "The text mentions Diderot received financial support from salonnières like Geoffrin, but does not state it was primarily funded by hostile foreign powers. The primary issue was its content and philosophical stance."}, {"text": "Its articles exposed widespread corruption within the royal court and clergy with specific accusations.", "isCorrect": false, "rationale": "While it implicitly criticized existing structures, the text highlights the philosophical challenge to authority rather than direct exposés of specific acts of corruption as the main reason for its banning."}], "id": "q03"}, {"question": "The Encyclopédie sold approximately 20,000 copies. Given the context of the 18th century, what does this sales figure primarily indicate about its impact?", "options": [{"text": "Its ideas failed to reach the general public, limiting its influence to a small, elite circle.", "isCorrect": false, "rationale": "The text explicitly states that 20,000 copies was significant, meaning 'virtually every educated household in France owned one,' contradicting the idea of limited influence to a 'small, elite circle' in the context of the era."}, {"text": "It created a widely shared intellectual foundation and vocabulary for educated households across France.", "isCorrect": true, "rationale": "For an era with expensive books and limited literacy (30-40%), 20,000 copies meant it reached virtually every educated household, creating a 'shared vocabulary of rights, reason, and reform' that profoundly influenced future events like the French Revolution."}, {"text": "Its limited distribution prevented it from becoming a significant factor in the political changes of the time.", "isCorrect": false, "rationale": "The text directly refutes this, stating its influence on the Revolution, though immeasurable precisely, was profound in creating a shared vocabulary for revolutionaries."}, {"text": "Its sales indicated a strong preference for practical guides over philosophical treatises among the literate population.", "isCorrect": false, "rationale": "While the Encyclopédie included practical arts, its significance lies in its comprehensive scope and subversive philosophical stance, not just a preference for practical guides."}], "id": "q04"}, {"question": "What significant opportunity did the French salon provide for women during the Enlightenment, despite their general exclusion from formal intellectual institutions?", "options": [{"text": "It offered a pathway for women to formally enroll in universities and academies as lecturers and researchers.", "isCorrect": false, "rationale": "The text explicitly states women were 'excluded from universities, academies, and most learned societies.' Salons were an alternative, not a pathway into these formal institutions."}, {"text": "It created a space where educated women could actively participate in and often direct the intellectual discourse of their time.", "isCorrect": true, "rationale": "Salons were almost always run by women, the 'salonnières,' who curated guest lists, managed conversations, and mediated intellectual disputes, thus allowing them to directly shape intellectual life despite formal exclusions."}, {"text": "It allowed women to publish their philosophical works anonymously under male pseudonyms.", "isCorrect": false, "rationale": "While some women might have published anonymously, the salon's primary role was as a physical gathering for direct intellectual engagement and discussion, not specifically for anonymous publishing."}, {"text": "It served as a training ground for women to become professional educators and tutors for aristocratic children.", "isCorrect": false, "rationale": "While some women might have been tutors, the salon's main purpose was intellectual exchange among adults, not professional training for specific careers."}], "id": "q05"}, {"question": "Marie Thérèse Rodet Geoffrin, a prominent salonnière, was called 'the mother of the Encyclopédie.' Which of the following actions best illustrates her influence in this role?", "options": [{"text": "She personally wrote numerous articles for the Encyclopédie, often under pseudonyms.", "isCorrect": false, "rationale": "The text states she was 'not a philosopher herself' and women did not contribute under their own names, indicating her influence was not as an author but as an organizer and patron."}, {"text": "She provided crucial financial support, mediated conflicts among contributors, and protected the project through her social connections.", "isCorrect": true, "rationale": "Geoffrin's role as a patron, mediator, and protector, using her social standing to secure the Encyclopédie's completion and mitigate government interference, directly supported its creation and continuity, earning her the title 'mother of the Encyclopédie.'"}, {"text": "She established a rival Encyclopédie project that presented an alternative, more skeptical viewpoint.", "isCorrect": false, "rationale": "The Marquise du Deffand ran a rival salon with a more skeptical outlook, but Geoffrin was central to the original Encyclopédie project, not a rival one."}, {"text": "She became the chief editor of the Encyclopédie after Diderot retired from the project.", "isCorrect": false, "rationale": "Diderot remained editor, and Geoffrin's role was supportive and organizational, not as a replacement editor."}], "id": "q06"}, {"question": "While both salons and coffeehouses fostered the spread of Enlightenment ideas, what was a key difference in their social accessibility and primary function?", "options": [{"text": "Salons were exclusively for scientists, while coffeehouses were for artists.", "isCorrect": false, "rationale": "Both types of venues hosted a mix of intellectuals, politicians, and artists, not exclusive to specific professions."}, {"text": "Salons were private, often hosted by women for a select, aristocratic audience; coffeehouses were public, offered cheap admission, and were more socially democratic for men.", "isCorrect": true, "rationale": "Salons were private gatherings led by elite women, curating guest lists. Coffeehouses, or 'penny universities,' were public spaces with low admission, fostering a more mixed-class, though still male-dominated, environment for casual discussion and news-sharing."}, {"text": "Salons focused on political debates, whereas coffeehouses focused on literary criticism.", "isCorrect": false, "rationale": "Both venues hosted diverse discussions. Salons covered philosophy, science, and politics, and specific coffeehouses often developed specializations (e.g., Lloyd's for business, Will's for literature)."}, {"text": "Salons were strictly monitored by the government, while coffeehouses operated freely without censorship.", "isCorrect": false, "rationale": "While letters via postal system were monitored, the text doesn't suggest salons were 'strictly monitored.' Coffeehouses also operated within a broader context of potential censorship, though their public nature made direct control more difficult."}], "id": "q07"}, {"question": "The 'Republic of Letters' played a crucial role in spreading Enlightenment ideas. What was its most distinctive characteristic as an institution?", "options": [{"text": "It was a formal academic body with a centralized headquarters and an elected leadership.", "isCorrect": false, "rationale": "The definition explicitly states it had 'no formal membership, no institutions, and no headquarters.'"}, {"text": "It was an international network of scholars bound by correspondence and a shared commitment to learning, without formal structure.", "isCorrect": true, "rationale": "This accurately reflects the text's definition: a 'virtual community' held together entirely by correspondence, sharing ideas and debating across national, religious, and political boundaries."}, {"text": "It was a secret society that aimed to overthrow European monarchies through covert operations.", "isCorrect": false, "rationale": "While its ideas could be subversive, the 'Republic of Letters' was an intellectual network for sharing and debating ideas, not a secret society for covert political action."}, {"text": "It was a system of traveling lecturers who delivered Enlightenment principles to remote villages.", "isCorrect": false, "rationale": "The 'Republic of Letters' was primarily a correspondence network among scholars and thinkers, not a system of public lectures."}], "id": "q08"}, {"question": "How did government monitoring of the postal system impact the communication strategies of Enlightenment thinkers?", "options": [{"text": "It forced them to abandon written correspondence in favor of exclusively oral communication in private gatherings.", "isCorrect": false, "rationale": "The postal system remained crucial; thinkers adapted their written communication rather than abandoning it entirely."}, {"text": "It led them to develop tactics such as using pseudonyms, coded language, and trusted couriers for sensitive information.", "isCorrect": true, "rationale": "Facing routine monitoring, thinkers engaged in a 'cat-and-mouse game,' using various methods like pseudonyms, coded messages, and private couriers to protect their sensitive correspondence and evade censors."}, {"text": "It discouraged them from discussing political or religious topics in any form of written communication.", "isCorrect": false, "rationale": "Thinkers continued to discuss sensitive topics; they just became more cautious and strategic about *how* they did so, rather than avoiding such topics altogether."}, {"text": "It primarily affected academic exchanges, as governments were less concerned with political discussions.", "isCorrect": false, "rationale": "Governments were highly concerned with political and religious challenges to their authority, making these types of discussions particularly vulnerable to monitoring."}], "id": "q09"}, {"question": "According to the text, what was a fundamental distinction between the print culture of the Protestant Reformation and that of the Enlightenment?", "options": [{"text": "The Reformation used print to debate religious authority, leading to religious diversity; the Enlightenment used it to debate reason and government, leading to political diversity.", "isCorrect": true, "rationale": "The text explicitly states: 'the Reformers debated the meaning of Scripture and the authority of the Church; the philosophes debated reason, government, and human nature. The Reformation produced religious diversity; the Enlightenment produced political diversity.'"}, {"text": "The Reformation's print was primarily in Latin for scholars, while the Enlightenment's was in vernacular languages for the masses.", "isCorrect": false, "rationale": "While the Enlightenment certainly used vernacular languages widely, the Reformation also significantly utilized vernacular printing to reach a broader audience beyond scholars. The text focuses on the *purpose* and *outcome*, not just the language."}, {"text": "The Reformation focused on spreading printed Bibles, whereas the Enlightenment focused on scientific journals.", "isCorrect": false, "rationale": "The Reformation certainly spread Bibles, but its print culture also included vast numbers of pamphlets and tracts debating theological points. The Enlightenment's print culture was broad, including encyclopedias, philosophical treatises, and scientific works, not solely scientific journals."}, {"text": "The Reformation utilized print to reinforce existing societal hierarchies, while the Enlightenment used it to challenge them.", "isCorrect": false, "rationale": "The Reformation, by challenging the authority of the Catholic Church, certainly had disruptive effects on existing hierarchies, although it also established new ones. Both movements had subversive elements relative to established powers of their time."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
