<script>
var QUESTIONS = [{"question": "What was the Middle Passage, and how many people died during it?", "options": [{"text": "The sea route from Europe to Asia; roughly 100,000 Europeans died sailing it over two centuries.", "isCorrect": false, "rationale": "The Middle Passage was the crossing from Africa to the Americas forced on enslaved Africans, not a European trade route."}, {"text": "The sea journey that enslaved Africans were forced to make from West Africa across the Atlantic; about 1.8 million of roughly 12 million transported people died on this crossing alone.", "isCorrect": true, "rationale": "The text defines the Middle Passage precisely: the middle leg of the triangle trade, conditions of horrifying overcrowding, and 1.8 million deaths during the crossing."}, {"text": "The land route through Central America connecting Spanish colonies in North and South America; thousands of enslaved workers died building the roads.", "isCorrect": false, "rationale": "The Middle Passage refers to the Atlantic sea crossing, not an overland route."}, {"text": "The name for the first year of enslavement, when newly arrived Africans had the highest death rate from disease and overwork.", "isCorrect": false, "rationale": "The Middle Passage specifically refers to the ocean crossing, not the period after arrival."}], "id": "q01"}, {"question": "What was the plantation economy, and how did it drive the Atlantic slave trade?", "options": [{"text": "A system of small family farms that used family labor to grow food crops for local consumption, unrelated to the slave trade.", "isCorrect": false, "rationale": "Plantations were large estates growing a single cash crop for export, entirely dependent on enslaved labor."}, {"text": "Large estates producing a single cash crop (sugar, tobacco, cotton, rice) for export, requiring enormous amounts of hard physical labor; European colonists decided enslaved African labor was the cheapest source.", "isCorrect": true, "rationale": "The text defines the plantation economy exactly this way and traces the demand for enslaved labor directly to the plantation cash-crop system."}, {"text": "European trade networks in which plantation owners in different colonies agreed to fixed prices for their crops, preventing competition and maximizing profits.", "isCorrect": false, "rationale": "A plantation economy is an agricultural production system, not a trade cartel."}, {"text": "Spanish colonial estates that used encomienda labor to grow food for silver miners, indirectly connected to the slave trade through shared administrative systems.", "isCorrect": false, "rationale": "The encomienda was a Spanish system in Latin America; plantation economies using enslaved Africans were primarily in the Caribbean and North America."}], "id": "q02"}, {"question": "What was the East India Company, and how did it transform from a trading company into a governing power?", "options": [{"text": "A government agency created by Queen Elizabeth I to administer England's Asian colonies, which became a major trading company in the 18th century.", "isCorrect": false, "rationale": "The East India Company started as a private trading corporation that later gained governmental powers, not the reverse."}, {"text": "A private English trading corporation founded in 1600 that followed a pattern of offering protection to local rulers, creating dependence, and eventually absorbing territories; by 1858 it effectively governed most of India.", "isCorrect": true, "rationale": "The text traces this exact trajectory: charter 1600, trade to protection to dependence to absorption, until the British crown took direct control after the Sepoy Mutiny."}, {"text": "A Dutch commercial enterprise that competed with England for Indian trade, which England eventually absorbed by military force in the early 18th century.", "isCorrect": false, "rationale": "The East India Company was English, not Dutch; the Dutch had their own separate East India Company."}, {"text": "A joint English-French company that traded in Asian goods until the two nations went to war and the company was dissolved.", "isCorrect": false, "rationale": "The East India Company was English; France had its own separate company."}], "id": "q03"}, {"question": "What was the Haitian Revolution, and why was it unique in world history?", "options": [{"text": "A peaceful transition from French colonial rule to independence, modeled on the American Revolution and negotiated without significant violence.", "isCorrect": false, "rationale": "The Haitian Revolution was a violent uprising after years of brutal warfare; it was not peaceful."}, {"text": "The 1791-1804 uprising of enslaved people in Saint-Domingue (modern Haiti) that resulted in abolition of slavery and the founding of the first Black republic - the only successful slave revolt in history to create a lasting independent state.", "isCorrect": true, "rationale": "The text identifies it precisely as unique in history: the only slave revolt that succeeded in creating a lasting independent state."}, {"text": "A joint rebellion of enslaved Africans and free mixed-race people in the British Caribbean that won limited rights but not full independence.", "isCorrect": false, "rationale": "The Haitian Revolution was in the French colony of Saint-Domingue; it achieved full independence, not limited rights."}, {"text": "A revolt of indigenous peoples in the Caribbean against Spanish colonial rule, inspired by the Haitian independence model.", "isCorrect": false, "rationale": "The Haitian Revolution was a revolt of enslaved Africans in French Saint-Domingue, not indigenous people against Spain."}], "id": "q04"}, {"question": "Who was Toussaint Louverture and what role did he play?", "options": [{"text": "A French colonial governor who voluntarily freed enslaved people in Saint-Domingue and negotiated independence with the French government.", "isCorrect": false, "rationale": "Louverture was a formerly enslaved man who led the revolution; he fought against French colonial forces, not with them."}, {"text": "A formerly enslaved man who became a brilliant military commander, led the Haitian Revolution against French colonial forces, a British invasion, and Napoleon's army, making Haiti the first Black republic.", "isCorrect": true, "rationale": "The text describes Louverture exactly this way, noting he fought multiple adversaries and became a hero to abolitionists worldwide."}, {"text": "A Haitian-born French officer who led French forces against the slave revolt but later changed sides when he witnessed the colonists' cruelty.", "isCorrect": false, "rationale": "Louverture was a formerly enslaved person who led the revolution from the start; he did not begin as a French officer."}, {"text": "An African king who led a naval expedition to rescue enslaved people from the Caribbean and established the first free Black colony.", "isCorrect": false, "rationale": "Louverture was born in Saint-Domingue and led an internal revolution; there was no African naval expedition."}], "id": "q05"}, {"question": "What was abolitionism, and on what two types of argument did it rest?", "options": [{"text": "A movement to reduce the harshness of slavery while preserving the institution; based on arguments for economic efficiency.", "isCorrect": false, "rationale": "Abolitionism sought to end slavery entirely, not merely reform it; its arguments were moral and philosophical, not economic efficiency."}, {"text": "The movement to abolish the slave trade and slavery itself; resting on both Christian moral principle (every person bears God's image and cannot be treated as property) and Enlightenment natural rights philosophy (all people are born free).", "isCorrect": true, "rationale": "The text explicitly identifies both pillars: Christian teaching (imago Dei) and Enlightenment natural rights."}, {"text": "A movement led entirely by formerly enslaved people; based solely on personal testimony about the horrors of slavery.", "isCorrect": false, "rationale": "The abolitionist movement included Christians, Enlightenment rationalists, and formerly enslaved people; it was not led exclusively by former slaves."}, {"text": "An economic argument that free labor is more productive than enslaved labor, combined with a statistical argument that the slave trade was unprofitable for European nations.", "isCorrect": false, "rationale": "While economic arguments were sometimes used, the text identifies moral and religious arguments as the foundation of abolitionism."}], "id": "q06"}, {"question": "What role did Olaudah Equiano play in the abolitionist movement?", "options": [{"text": "He served as a translator for the British Parliament during debates on abolition, providing real-time interpretation of African languages.", "isCorrect": false, "rationale": "Equiano's contribution was his published Narrative, not translation services."}, {"text": "He published The Interesting Narrative of His Life (1789), a memoir of kidnapping, the Middle Passage, and eventual self-purchased freedom, that put a human face on the statistics and helped turn public and Parliamentary opinion toward abolition.", "isCorrect": true, "rationale": "The text describes the Narrative's wide readership - members of Parliament, abolitionists, ordinary readers - and its role as a 'powerful weapon in the abolitionists' arsenal.'"}, {"text": "He led a slave revolt in Jamaica that forced the British government to abolish slavery in the Caribbean colonies immediately.", "isCorrect": false, "rationale": "Equiano worked through writing and political advocacy, not armed revolt; British abolition came through Parliamentary action."}, {"text": "He was a Quaker merchant who funded the Atlantic abolitionist movement and organized the petition campaign that led to the 1807 Act.", "isCorrect": false, "rationale": "Equiano was a former enslaved person of African origin who contributed his Narrative; the Quakers are described separately as early organized opponents of slavery."}], "id": "q07"}, {"question": "What happened in the First Opium War (1839-1842), and why does the text call it morally troubling?", "options": [{"text": "Britain conquered China to expand its empire; troubling because it used military force rather than diplomacy to open trade.", "isCorrect": false, "rationale": "The specific moral problem was not military vs. diplomatic means but that Britain went to war to force an unwilling country to accept a destructive drug."}, {"text": "Britain went to war after China destroyed British opium shipments, forcing China to open five ports, pay reparations, and cede Hong Kong; troubling because it was, honestly, a war fought to protect drug trafficking.", "isCorrect": true, "rationale": "The text calls it 'a war fought to protect drug trafficking' and notes the gap between the British belief in 'free trade' and what 'free trade' meant in practice here."}, {"text": "China attacked British trading ships in the South China Sea; troubling because Britain responded disproportionately by invading and occupying China's capital city.", "isCorrect": false, "rationale": "China was not the aggressor; the sequence was: China destroyed illegal opium, Britain went to war to restore the opium trade."}, {"text": "Britain and France jointly invaded China; troubling because the two nations violated international law established at Westphalia by attacking a sovereign state.", "isCorrect": false, "rationale": "Only Britain fought the First Opium War; the moral problem identified by the text is the drug trafficking, not a joint invasion."}], "id": "q08"}, {"question": "What was William Wilberforce's contribution to abolitionism, and what happened when the Emancipation Act passed?", "options": [{"text": "Wilberforce wrote the defining philosophical treatise on natural rights that provided the intellectual foundation for Parliamentary abolition.", "isCorrect": false, "rationale": "Wilberforce was a parliamentary politician who led the legislative campaign, not primarily a philosophical writer."}, {"text": "An evangelical Christian Member of Parliament who led the Parliamentary campaign for nearly twenty years; Parliament abolished the British slave trade in 1807 and freed all enslaved people in British colonies in 1833; Wilberforce died three days after hearing the bill had passed.", "isCorrect": true, "rationale": "The text describes Wilberforce's role exactly this way, including the poignant detail about his death three days after learning of the bill's passage."}, {"text": "Wilberforce led a boycott of slave-produced goods that so damaged the British economy that Parliament was forced to abolish slavery to restore commerce.", "isCorrect": false, "rationale": "While consumer boycotts were a tool of abolitionists, Wilberforce's primary method was Parliamentary legislation, not economic boycott."}, {"text": "Wilberforce worked with Equiano to found the first African colony for freed enslaved people, which became the modern nation of Sierra Leone.", "isCorrect": false, "rationale": "The founding of Sierra Leone involved other abolitionists; Wilberforce's primary contribution was the Parliamentary campaign for abolition."}], "id": "q09"}, {"question": "What does the text identify as the central contradiction of European expansion?", "options": [{"text": "European nations claimed to promote free trade but actually used monopolies and trade restrictions to extract wealth.", "isCorrect": false, "rationale": "The central contradiction the text identifies is moral and religious: European nations proclaimed human dignity while buying and selling human beings."}, {"text": "A civilization that proclaimed the dignity of every human soul while buying and selling human beings as property; the Christian conscience both enabled colonialism and produced its most effective critics.", "isCorrect": true, "rationale": "The text makes this its central question: how do we account for a civilization that proclaimed human dignity while practicing slavery? And notes that the same faith enabled both colonialism and its critics."}, {"text": "European nations spread democracy and self-governance while simultaneously imposing authoritarian colonial rule.", "isCorrect": false, "rationale": "While this is a related contradiction, the text specifically focuses on the tension between Christian proclamations of human dignity and the practice of slavery."}, {"text": "European missionaries preached Christ's message of peace while European soldiers conducted brutal military conquests.", "isCorrect": false, "rationale": "While this tension exists in the text, the central contradiction identified is specifically about human dignity and slavery."}], "id": "q10"}, {"question": "What is the triangle trade and what role did it play in the Atlantic slave trade?", "options": [{"text": "Trade between three colonial powers - England, France, and Spain - that divided the Americas into spheres of influence.", "isCorrect": false, "rationale": "The triangle trade refers to the three-leg commercial circuit involving goods, enslaved people, and American products, not a diplomatic division among colonial powers."}, {"text": "The three-leg commercial circuit: European ships carried goods to Africa, then enslaved Africans to the Americas (the Middle Passage), then American products back to Europe.", "isCorrect": true, "rationale": "The text defines the triangle trade exactly this way in the definition of the Middle Passage."}, {"text": "Trade between three commodities - silver, sugar, and cotton - that created the financial basis for the plantation economy.", "isCorrect": false, "rationale": "The triangle trade refers to the geographic circuit of ships and human cargo, not three commodities."}, {"text": "A British-Dutch-Portuguese shipping alliance that divided the routes of the Atlantic slave trade to prevent competition.", "isCorrect": false, "rationale": "The triangle trade was not an alliance between nations but a description of the commercial circuit of individual slave-trading voyages."}], "id": "q11"}, {"question": "Why does the text say the Haitian Revolution 'terrified slaveholders across the Americas'?", "options": [{"text": "Because Haiti's successful independence inspired other European colonies to seek independence, threatening European colonial power globally.", "isCorrect": false, "rationale": "While this is partially true, the text specifically emphasizes the terror felt by slaveholders because it proved enslaved people would fight for freedom."}, {"text": "Because it proved undeniably that enslaved people were not content, not incapable of self-governance, and would fight for their freedom with extraordinary courage; it also forced Napoleon to sell Louisiana to the United States.", "isCorrect": true, "rationale": "The text makes these specific points: the revolution disproved slaveholder arguments about enslaved peoples' nature, and Napoleon's failure led to the Louisiana Purchase."}, {"text": "Because Haitian forces invaded neighboring colonies and freed enslaved people by military force, directly threatening all slaveholders in the Caribbean.", "isCorrect": false, "rationale": "While Haiti inspired fear, the text does not describe Haitian military invasions of neighboring colonies."}, {"text": "Because the Haitian Revolution was supported by the British abolitionist movement, suggesting that Britain might use military force to impose abolition on other colonies.", "isCorrect": false, "rationale": "Britain actually supported crushing the Haitian Revolution; the terror was about what enslaved people themselves had demonstrated, not British support."}], "id": "q12"}, {"question": "What were the Latin American independence movements of the early nineteenth century, and what ideas inspired them?", "options": [{"text": "Military coups by Spanish colonial generals who wanted power for themselves; inspired primarily by career ambition rather than political philosophy.", "isCorrect": false, "rationale": "The movements drew on Enlightenment ideas and the examples of American and Haitian revolutions; they were not primarily military coups motivated by personal ambition."}, {"text": "A series of independence movements beginning around 1810, inspired by Enlightenment ideas and the examples of the American and Haitian Revolutions; led by figures like Simon Bolivar in South America and Miguel Hidalgo in Mexico; nearly all of Spanish America independent by 1826.", "isCorrect": true, "rationale": "The text describes all of these elements: Enlightenment influence, the American and Haitian examples, and the specific leaders and timeline."}, {"text": "Peaceful negotiations between Spain and its colonies that resulted in self-governing dominion status, similar to how Britain later managed its Empire.", "isCorrect": false, "rationale": "The Latin American independence movements involved 'uprisings' and years of struggle, not peaceful negotiations."}, {"text": "Rebellions of indigenous peoples reclaiming lands taken during the conquest; led by indigenous leaders rather than creole elites.", "isCorrect": false, "rationale": "While some indigenous participation occurred, the text describes the movements as led by Bolivar and Hidalgo - creole and mestizo figures - inspired by Enlightenment ideas."}], "id": "q13"}, {"question": "How does the text assess the balance sheet of European expansion?", "options": [{"text": "The text concludes that European expansion was entirely harmful, with no genuine benefits to any of the peoples involved.", "isCorrect": false, "rationale": "The text explicitly says 'European expansion was not simply good or simply evil' and lists genuine positives alongside genuine evils."}, {"text": "The text holds both sides honestly: positive contributions (spread of Christianity, literacy, eventual Western medicine, abolitionism itself) alongside genuine evils (slave trade, destroyed indigenous civilizations, plantation economy built on human suffering).", "isCorrect": true, "rationale": "The text explicitly identifies positives and negatives, concluding that the same Christian conscience enabled colonialism and produced its most effective critics."}, {"text": "The text concludes that economic benefits to Europe more than compensate for the suffering caused, and that historical progress requires such trade-offs.", "isCorrect": false, "rationale": "The text does not argue economic benefits compensate for moral evil; it insists on holding both honestly without resolving the tension through calculation."}, {"text": "The text concludes that European expansion was ultimately positive because it spread democracy and ended pre-existing forms of slavery and warfare in Africa and Asia.", "isCorrect": false, "rationale": "The text does not make this argument; it acknowledges real evils including the slave trade as 'a crime of staggering proportions.'"}], "id": "q14"}, {"question": "How does Equiano use the language of natural rights in his Narrative?", "options": [{"text": "He rejects Enlightenment natural rights philosophy as applicable only to Europeans and instead argues solely from African customary law.", "isCorrect": false, "rationale": "Equiano uses Enlightenment natural rights language strategically; he does not reject it."}, {"text": "He uses the same natural rights language as Locke and Jefferson to argue that if you accept that all humans have natural rights to life, liberty, and property, then the slave trade is philosophically incoherent - contradicting the very principles its defenders claimed to believe.", "isCorrect": true, "rationale": "The text identifies this as a 'powerful rhetorical strategy': Equiano uses Locke's premises to indict the system that enslaved him on its own terms."}, {"text": "He argues that natural rights apply only to Christians, and therefore his conversion to Christianity entitles him to freedom under Enlightenment principles.", "isCorrect": false, "rationale": "Equiano's argument is that all humans have natural rights by virtue of being human, not specifically because of Christian conversion."}, {"text": "He argues that natural rights are irrelevant to his situation and that the only valid argument against slavery is the practical harm it causes to economic productivity.", "isCorrect": false, "rationale": "Equiano makes a moral argument using natural rights; he does not dismiss natural rights or rely on economic efficiency arguments."}], "id": "q15"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
