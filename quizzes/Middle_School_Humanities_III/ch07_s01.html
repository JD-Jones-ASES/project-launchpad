<script>
var QUESTIONS = [{"question": "What event directly triggered the chain reaction of declarations of war in Europe in 1914, according to the text?", "options": [{"text": "The sinking of the Lusitania", "isCorrect": false, "rationale": "The sinking of the Lusitania was a later event in 1915 that contributed to the United States' eventual entry into the war, not the initial trigger for the war in 1914."}, {"text": "The assassination of Archduke Franz Ferdinand", "isCorrect": true, "rationale": "The text explicitly states that 'On the morning of June 28, 1914, Archduke Franz Ferdinand... was assassinated,' and 'What happened next was not inevitable, but it was terrifyingly fast,' leading to the alliance system converting a regional crisis into a world war."}, {"text": "Germany's invasion of neutral Belgium", "isCorrect": false, "rationale": "Germany's invasion of Belgium was a consequence of the chain reaction (Germany's plan to attack France) and led to Britain's entry, but it was not the initial spark that set off the declarations of war."}, {"text": "Russia's mobilization to defend Serbia", "isCorrect": false, "rationale": "Russia's mobilization was a key step in the escalation, occurring after Austria-Hungary declared war on Serbia, which in turn was a response to the assassination. It was part of the chain reaction, not the initial trigger."}]}, {"question": "According to the text, which of the following best explains why the alliance system, designed to deter war, ultimately failed in 1914?", "options": [{"text": "National leaders intentionally sought a prolonged global conflict.", "isCorrect": false, "rationale": "The text states that 'Most soldiers in August 1914 expected the war to be over by Christmas,' indicating that leaders underestimated the war's destructiveness, not that they intentionally sought a prolonged conflict."}, {"text": "Diplomatic efforts were unable to keep pace with rapid military mobilization plans.", "isCorrect": true, "rationale": "The text specifically states that alliances failed because 'military timetables moved faster than diplomats could negotiate; mobilization orders, once given, could not easily be cancelled; and national leaders underestimated how destructive a modern industrial war would be.'"}, {"text": "The Triple Entente secretly planned to provoke war with the Triple Alliance.", "isCorrect": false, "rationale": "The text does not mention any secret plans by the Triple Entente to provoke war; instead, it describes how the existing alliance system, built on 'secret treaties, military pledges, and imperial rivalries,' automatically escalated a regional crisis."}, {"text": "Archduke Franz Ferdinand's assassination was a premeditated act by an allied nation.", "isCorrect": false, "rationale": "The assassination was carried out by a Bosnian nationalist, Gavrilo Princip, not an allied nation. While Austria-Hungary blamed Serbia, it was not an 'allied nation' in the context of the main blocs."}]}, {"question": "The Schlieffen Plan aimed for a rapid knockout of France before turning attention to Russia. If the plan had succeeded as intended, what would have been a direct consequence for Germany?", "options": [{"text": "The United States would have entered the war much earlier.", "isCorrect": false, "rationale": "The US entry was tied to submarine warfare and the Zimmermann Telegram, not the success or failure of the Schlieffen Plan. A quick German victory might have delayed or changed US involvement, not necessarily accelerated it."}, {"text": "Germany would have been stuck in a long war of attrition on the Eastern Front.", "isCorrect": false, "rationale": "The plan's *failure* led to Germany being stuck in a long war of attrition on the Western Front. Its success would have allowed Germany to concentrate forces on the Eastern Front without a prolonged Western stalemate."}, {"text": "Germany would have avoided a two-front war of attrition.", "isCorrect": true, "rationale": "The text explicitly states that when the Schlieffen Plan failed, 'Germany was stuck in the long war of attrition it had hoped to avoid.' Therefore, a successful execution would have allowed Germany to avoid this outcome."}, {"text": "Britain would have remained neutral due to no invasion of Belgium.", "isCorrect": false, "rationale": "The Schlieffen Plan *called for* an invasion of Belgium. If it succeeded, Belgium would have been invaded, so this option describes a scenario contrary to the plan's execution."}]}, {"question": "What was the primary characteristic of warfare on the Western Front from late 1914 onwards, as described in the text?", "options": [{"text": "Rapidly shifting front lines and large-scale cavalry charges.", "isCorrect": false, "rationale": "The text states that 'For the next four years, the Western Front barely moved' and describes trench warfare, which is characterized by stagnant lines, not rapid shifts or cavalry charges."}, {"text": "Naval blockades and decisive sea battles.", "isCorrect": false, "rationale": "Naval blockades and sea battles were part of the war, but the text describes the Western Front as 'a line of trenches stretched from the English Channel to the Swiss border,' focusing on land warfare."}, {"text": "Stagnant trench lines and a strong defensive advantage.", "isCorrect": true, "rationale": "The text clearly defines trench warfare as a style where 'opposing armies dig parallel systems of trenches' and states that 'Technology had made offense almost impossible and defense almost impregnable,' leading to a stagnant front."}, {"text": "Guerrilla tactics and widespread civilian uprisings.", "isCorrect": false, "rationale": "While parts of the war might have involved some civilian impact, the description of the Western Front focuses on organized military trench warfare, not guerrilla tactics or widespread civilian uprisings."}]}, {"question": "The German commander Falkenhayn's strategy at the Battle of Verdun was to 'bleed France white.' What does this phrase imply about the German objective in that specific battle?", "options": [{"text": "To capture strategically vital French industrial zones.", "isCorrect": false, "rationale": "While industrial zones were important, the text specifies the goal at Verdun was to 'bleed France white,' focusing on personnel depletion rather than solely industrial capture."}, {"text": "To inflict such heavy casualties that France would be forced to surrender due to lack of manpower.", "isCorrect": true, "rationale": "To 'bleed France white' means to exhaust France's fighting capacity by inflicting maximum casualties, forcing them to deplete their forces and potentially surrender, aligning with the text's description of the objective."}, {"text": "To create a diversion to allow for a breakthrough on the Eastern Front.", "isCorrect": false, "rationale": "The text states Falkenhayn 'deliberately chose a French fortress town... and attacked it with the intention of 'bleeding France white',' indicating Verdun was a primary objective, not a diversion for another front."}, {"text": "To demonstrate Germany's superior artillery technology to the world.", "isCorrect": false, "rationale": "While artillery was used, the core objective was not to 'demonstrate technology' but to achieve a strategic goal through attrition of the French army."}]}, {"question": "Which campaign, championed by British First Lord of the Admiralty Winston Churchill, is described as one of the most complete Allied failures of the war, aimed at knocking the Ottoman Empire out of the conflict?", "options": [{"text": "The Battle of the Somme", "isCorrect": false, "rationale": "The Battle of the Somme was a major offensive on the Western Front, primarily involving British and German forces, and was not aimed at the Ottoman Empire."}, {"text": "The Eastern Front offensives", "isCorrect": false, "rationale": "The Eastern Front involved Russia against Germany and Austria-Hungary, and while there were offensives, none are specifically identified as 'Gallipoli' or championed by Churchill in this context."}, {"text": "The Gallipoli campaign", "isCorrect": true, "rationale": "The text clearly states, 'Gallipoli (1915–1916) was an Allied attempt to knock the Ottoman Empire... out of the war... The campaign, championed by British First Lord of the Admiralty Winston Churchill, became a catastrophe... It was one of the most complete Allied failures of the war.'"}, {"text": "The First Battle of the Marne", "isCorrect": false, "rationale": "The First Battle of the Marne was fought on the Western Front and halted the German advance into France in 1914, unrelated to the Ottoman Empire or Churchill's specific involvement described."}]}, {"question": "The year 1917 is identified as transforming the war. Which pair of events accurately reflects the decisive changes that occurred that year?", "options": [{"text": "The initiation of trench warfare and the assassination of Franz Ferdinand.", "isCorrect": false, "rationale": "Trench warfare began in late 1914, and Franz Ferdinand was assassinated in 1914, neither of which occurred in 1917."}, {"text": "Germany's successful implementation of the Schlieffen Plan and the Ottoman Empire's surrender.", "isCorrect": false, "rationale": "The Schlieffen Plan failed in 1914, and the Ottoman Empire surrendered in October 1918, not 1917."}, {"text": "The United States' entry into the war and Russia's withdrawal due to revolution.", "isCorrect": true, "rationale": "The text states, 'The United States entered the war in April 1917' and 'Russia collapsed... In February 1917, a revolution overthrew Tsar Nicholas II... Russia left the war in March 1918,' with the decision to negotiate peace starting in October 1917."}, {"text": "The signing of the Treaty of Versailles and the end of submarine warfare.", "isCorrect": false, "rationale": "The Treaty of Versailles was signed in 1919, and while submarine warfare was a factor, its end was part of the lead-up to the armistice in 1918, not a defining event of 1917 itself."}]}, {"question": "The text distinguishes between the Armistice of November 11, 1918, and the Treaty of Versailles. What is the fundamental difference highlighted?", "options": [{"text": "The Armistice formally ended the war, while the Treaty only addressed economic reparations.", "isCorrect": false, "rationale": "The Armistice stopped the fighting but was not the formal end of the war; the Treaty of Versailles was the formal peace settlement, which included reparations but also territorial changes and military limits."}, {"text": "The Armistice was a temporary ceasefire, while the Treaty was a formal peace settlement.", "isCorrect": true, "rationale": "The definition states, 'Armistice: A formal agreement to stop fighting, pending a peace treaty. It was not yet a peace treaty — that would come with the Treaty of Versailles in 1919 — but it stopped the killing.'"}, {"text": "The Armistice was negotiated by all belligerents, while the Treaty was dictated solely by Germany.", "isCorrect": false, "rationale": "The Armistice was an agreement between the warring parties, and the Treaty of Versailles was a 'dictated peace' to Germany by the victorious powers, not by Germany."}, {"text": "The Armistice resulted in territorial changes, while the Treaty focused on military disarmament.", "isCorrect": false, "rationale": "The Armistice primarily stopped the fighting. The Treaty of Versailles included significant territorial changes and military limits for Germany."}]}, {"question": "President Wilson's Fourteen Points emphasized national self-determination and a League of Nations, aiming for a generous peace. Why did his idealistic vision largely collide with European realpolitik during the Treaty of Versailles negotiations?", "options": [{"text": "European powers wanted to restore Germany to its pre-war strength to balance power.", "isCorrect": false, "rationale": "The text states that France, having suffered immensely, 'demanded a peace that would cripple Germany permanently,' directly contradicting the idea of restoring Germany's strength."}, {"text": "European powers, particularly France, sought punitive measures to cripple Germany and prevent future aggression.", "isCorrect": true, "rationale": "The text explains that 'France... demanded a peace that would cripple Germany permanently. Britain wanted to preserve its empire and its naval supremacy. Neither France nor Britain was interested in the kind of generous peace Wilson proposed.'"}, {"text": "Wilson's points were deemed too radical and completely irrelevant to the post-war situation by all parties.", "isCorrect": false, "rationale": "While many points were rejected or weakened, the League of Nations was still included, showing not all were deemed irrelevant, but rather some conflicted with European self-interest."}, {"text": "The United States had not suffered enough casualties to understand the need for retribution.", "isCorrect": false, "rationale": "While the US had fewer casualties, the text highlights the European powers' own desire for retribution and self-interest as the primary reason for conflict with Wilson's idealism, rather than attributing it to US inexperience."}]}, {"question": "What was the primary implication of the 'war guilt clause' (Article 231) in the Treaty of Versailles for Germany?", "options": [{"text": "It formally recognized Germany's right to rearm and expand its territory.", "isCorrect": false, "rationale": "The Treaty of Versailles severely limited Germany's military and stripped it of territory, making this option incorrect."}, {"text": "It exempted Germany from paying any reparations for war damages.", "isCorrect": false, "rationale": "The war guilt clause was directly linked to Germany being forced to pay 'massive reparations,' not exempted from them."}, {"text": "It offered Germany a path to immediate membership in the League of Nations.", "isCorrect": false, "rationale": "Germany was not invited to negotiate the treaty, nor was immediate League of Nations membership a primary implication of the war guilt clause, which was punitive."}, {"text": "It forced Germany to accept full responsibility for starting the war and its damages.", "isCorrect": true, "rationale": "The definition states: 'Article 231 of the Treaty of Versailles, which stated that Germany and its allies accepted responsibility for causing all the loss and damage of the war.'"}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
