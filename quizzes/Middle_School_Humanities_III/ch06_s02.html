<script>
var QUESTIONS = [{"question": "The introductory section states that Karl Marx, Pope Leo XIII, and Fyodor Dostoevsky all responded to a common crisis of their time. Which of the following best encapsulates this shared crisis?", "options": [{"text": "The rise of secularism and the decline of religious faith in Europe.", "isCorrect": false, "rationale": "While Dostoevsky's work touches on faith, the specific crisis identified as common to all three authors in the introduction focuses more broadly on social and economic issues, not primarily on secularism's rise as the central problem."}, {"text": "The suffering of the poor, the concentration of power, and the nature of human freedom and goodness.", "isCorrect": true, "rationale": "The introduction explicitly states these three interrelated issues—the suffering of the poor, the concentration of power, and the question of human freedom and goodness—as the common crisis that all three texts address."}, {"text": "The threat of international warfare and geopolitical instability.", "isCorrect": false, "rationale": "The provided text does not mention international warfare or geopolitical instability as the specific common crisis these authors were addressing; their focus was on internal societal structures and human condition."}, {"text": "The intellectual shift from Enlightenment rationalism to Romantic emotionalism.", "isCorrect": false, "rationale": "This describes a historical intellectual trend, but it is not presented as the direct societal crisis that Marx, Leo XIII, and Dostoevsky were responding to through their writings."}]}, {"question": "According to Karl Marx's *The Communist Manifesto*, what is the fundamental driving force behind all historical societal development?", "options": [{"text": "The evolution of religious beliefs and spiritual practices.", "isCorrect": false, "rationale": "Marx's philosophy, particularly his materialism and atheism, fundamentally rejects religious beliefs as the primary driver of history, instead viewing them as products of economic conditions."}, {"text": "The history of class struggles between oppressors and oppressed.", "isCorrect": true, "rationale": "The text directly quotes Marx's opening statement in *The Communist Manifesto*: 'The history of all hitherto existing society is the history of class struggles,' identifying this as the central tenet of his historical analysis."}, {"text": "The progression of scientific discovery and technological innovation.", "isCorrect": false, "rationale": "While technological innovation (like the Industrial Revolution) plays a role in Marx's analysis by shaping class relations, it is seen as a catalyst within the broader framework of class struggle, not the struggle itself."}, {"text": "The shifting balance of power between nation-states.", "isCorrect": false, "rationale": "Marx's focus in *The Communist Manifesto* is on the internal class dynamics within societies rather than international relations or conflicts between nation-states as the primary historical driver."}]}, {"question": "Marx argues that the bourgeoisie, upon gaining power, 'has left remaining no other nexus between man and man than naked self-interest, than callous 'cash payment.'' This statement indicates Marx's view that capitalism primarily:", "options": [{"text": "Enhances individual liberty by removing traditional constraints.", "isCorrect": false, "rationale": "Marx criticizes capitalism for replacing 'numberless indefeasible chartered freedoms' with the 'single, unconscionable freedom—Free Trade,' implying a reduction, not enhancement, of true liberty."}, {"text": "Fosters a stronger sense of community based on shared economic goals.", "isCorrect": false, "rationale": "Marx explicitly states that the bourgeoisie 'has pitilessly torn asunder the motley feudal ties,' destroying loyalty, tradition, and community by reducing relationships to self-interest and cash."}, {"text": "Reduces all human relationships and values to purely economic transactions.", "isCorrect": true, "rationale": "The phrases 'naked self-interest,' 'cash payment,' and 'resolved personal worth into exchange value' clearly demonstrate Marx's argument that capitalism commodifies human interactions and reduces all value to economic terms."}, {"text": "Leads to a more efficient and meritocratic social hierarchy.", "isCorrect": false, "rationale": "While Marx observed the economic changes, his writing is an indictment of capitalism's exploitative nature and the resulting suffering, not an endorsement of its efficiency or meritocracy."}]}, {"question": "According to the provided teacher's note, which of the following was *not* identified as a fundamental flaw in Karl Marx's proposed solution to societal problems?", "options": [{"text": "His atheism, which removed a moral check on power.", "isCorrect": false, "rationale": "The teacher's note explicitly states that Marx's atheism, which rejected the natural law tradition, was a reason his solution was 'catastrophically wrong.'"}, {"text": "His materialism, which reduced human beings to economic units.", "isCorrect": false, "rationale": "The teacher's note identifies Marx's materialism as a flaw, explaining he 'reduced human beings to economic units rather than persons made in God's image.'"}, {"text": "His utopianism, which believed a perfect society was achievable on earth.", "isCorrect": false, "rationale": "The teacher's note lists utopianism as a flaw, stating he 'believed a perfect society was achievable on earth,' which contributed to the violence of his proposed solutions."}, {"text": "His overemphasis on parliamentary reform and gradual societal change.", "isCorrect": true, "rationale": "Marx explicitly called for the 'forcible overthrow of all existing social conditions' and violent revolution, as highlighted in the text, directly contradicting any notion of gradual parliamentary reform."}]}, {"question": "Central to Pope Leo XIII's *Rerum Novarum* is the concept of a 'just wage.' According to the text, what defines a just wage?", "options": [{"text": "Any wage mutually agreed upon by the employer and employee through a free contract.", "isCorrect": false, "rationale": "Leo XIII explicitly refutes this, stating that 'natural justice' dictates a wage floor regardless of free consent, especially if the worker's agreement is coerced by necessity."}, {"text": "A wage sufficient to allow the worker and their family to live in reasonable dignity, not just to survive.", "isCorrect": true, "rationale": "The 'just wage' definition in the text clearly states it is 'sufficient to support themselves and their families in reasonable dignity,' emphasizing that workers are human beings, not mere machines."}, {"text": "The highest wage the market will bear, reflecting the worker's skills and productivity.", "isCorrect": false, "rationale": "Leo XIII argues that natural justice sets a floor 'below which no wage can fall regardless of what the market will bear,' indicating that market forces alone do not determine a just wage."}, {"text": "A wage determined solely by the state to ensure economic equality among all citizens.", "isCorrect": false, "rationale": "While Leo XIII agrees the state has a duty to intervene, he does not advocate for the state solely determining all wages or aiming for absolute economic equality, but rather for ensuring the conditions for a just wage based on human dignity."}]}, {"question": "Pope Leo XIII challenges the notion that a wage agreed upon by contract is automatically just. His primary argument against this capitalist position is that:", "options": [{"text": "All contracts involving labor are inherently exploitative due to power imbalances.", "isCorrect": false, "rationale": "Leo XIII does not claim *all* labor contracts are inherently exploitative, but rather identifies specific conditions, such as coercion by necessity, that render an otherwise 'free' agreement unjust."}, {"text": "True freedom requires real alternatives, and a starving worker's 'agreement' to a low wage is coerced by necessity.", "isCorrect": true, "rationale": "The text explicitly states this is 'the heart of the Catholic Social Teaching position': a starving man's 'free' acceptance of any wage is not real freedom because it is 'coerced by necessity,' thus making the agreement unjust."}, {"text": "The state, not individuals, should set all wages to prevent injustice.", "isCorrect": false, "rationale": "While Leo XIII argues for state intervention to ensure justice, he does not advocate for the state setting all wages, but rather for ensuring conditions where workers can negotiate truly freely and justly."}, {"text": "Employers are morally obligated to prioritize charity over profit in all business dealings.", "isCorrect": false, "rationale": "Leo XIII's argument focuses on the concept of 'natural justice' and the worker's moral right to a living wage, which is distinct from an employer's charitable obligations, though both are moral concerns."}]}, {"question": "Despite their significant disagreements, where do Karl Marx and Pope Leo XIII find common ground regarding the industrial age crisis, according to the text?", "options": [{"text": "Both advocate for the complete abolition of private property.", "isCorrect": false, "rationale": "Leo XIII explicitly rejects the abolition of private property, considering it a natural right, which is a key point of disagreement with Marx."}, {"text": "Both believe that class struggle is a necessary and positive force for change.", "isCorrect": false, "rationale": "Leo XIII rejects class struggle, arguing it 'destroys the social harmony that both workers and employers need,' while Marx sees it as the engine of history."}, {"text": "Both agree that workers are being exploited and that the state has a duty to intervene.", "isCorrect": true, "rationale": "The 'keyconcept' box explicitly states, 'Where does Leo XIII agree with Marx? Both agree that workers are being exploited and that the state has a duty to intervene. Both reject the laissez-faire position that the market will solve the problem on its own.'"}, {"text": "Both endorse violent revolution as the only means to achieve social justice.", "isCorrect": false, "rationale": "Marx explicitly calls for violent revolution, but Leo XIII unequivocally rejects revolution, advocating for reform and social harmony instead."}]}, {"question": "In Dostoevsky's 'The Grand Inquisitor,' the Inquisitor argues that Christ's fundamental error was to:", "options": [{"text": "Focus too much on worldly power and material wealth.", "isCorrect": false, "rationale": "The Inquisitor states that Christ *rejected* the temptations of worldly power and bread, and it is this rejection that the Inquisitor views as an error because humans desire these things."}, {"text": "Offer human beings the burden of true freedom, for which they are too weak.", "isCorrect": true, "rationale": "The Inquisitor's core argument is that Christ erred by offering humans freedom, as humans are 'not strong enough for freedom' and instead desire bread, miracle, and authority."}, {"text": "Fail to perform enough miracles to convince the masses of his divinity.", "isCorrect": false, "rationale": "Christ *does* perform a miracle in the story, but the Inquisitor criticizes the *principle* of offering freedom over miracle, implying humans prefer the spectacle to the responsibility of freedom."}, {"text": "Preach a message of hatred and division among people.", "isCorrect": false, "rationale": "The text depicts Christ as offering 'free love' and asking followers to follow Him 'freely,' not preaching hatred or division. The Inquisitor's critique is about the *consequence* of that freedom, not the message itself."}]}, {"question": "According to the Grand Inquisitor, what do human beings most desire, leading them to willingly surrender their freedom?", "options": [{"text": "The profound challenge of personal responsibility and moral choice.", "isCorrect": false, "rationale": "The Inquisitor believes humans fear the 'weight of their own freedom' and the responsibility that comes with it, hence they do not desire such a challenge."}, {"text": "Abstract philosophical truths and complex theological doctrines.", "isCorrect": false, "rationale": "The Inquisitor argues that humans want simple answers and authority, preferring certainty over complex intellectual pursuits when faced with the burdens of freedom."}, {"text": "Material security (bread), miraculous authority, and someone to tell them what to do.", "isCorrect": true, "rationale": "The Inquisitor explicitly states that humans 'want bread; they want miracle; they want someone to tell them what to do,' and for these, they are grateful to the Church for taking their freedom."}, {"text": "The opportunity to establish a perfectly just and egalitarian society.", "isCorrect": false, "rationale": "While a just society is a noble goal, the Inquisitor's argument focuses on the individual's desire for comfort, security, and relief from the burden of choice, rather than a collective utopian project."}]}, {"question": "Imagine a contemporary society grapples with widespread poverty and calls for significant social change. If this society sought to alleviate suffering by ensuring basic material security and workers' rights, while simultaneously upholding individual property rights and rejecting violent conflict, which of the three historical figures' perspectives would it most closely align with?", "options": [{"text": "Karl Marx.", "isCorrect": false, "rationale": "Marx's philosophy advocates for the abolition of private property and calls for violent revolution to achieve social change, which contradicts the conditions of upholding property rights and rejecting violence."}, {"text": "Pope Leo XIII.", "isCorrect": true, "rationale": "Pope Leo XIII's *Rerum Novarum* directly addresses worker exploitation, calls for a 'just wage' (ensuring material security), emphasizes workers' rights, rejects violent revolution and class struggle, and upholds private property as a natural right. This aligns perfectly with all the described societal aims."}, {"text": "Fyodor Dostoevsky's Grand Inquisitor.", "isCorrect": false, "rationale": "The Grand Inquisitor's approach involves taking away human freedom and subjecting people to absolute authority for the sake of material security, which contradicts the idea of upholding individual rights and true freedom, even if it aims to alleviate suffering."}, {"text": "All three figures, as they all recognize the problem of suffering.", "isCorrect": false, "rationale": "While all three recognize the problem of suffering, their proposed solutions and the underlying principles (e.g., private property, means of change) diverge significantly, making it impossible for all three to align with the specified approach."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
