<script>
var QUESTIONS = [{"question": "Where did the Industrial Revolution begin, and what conditions enabled it?", "options": [{"text": "In France, enabled by the revolutionary government's investment in state-owned factories and a large professional workforce.", "isCorrect": false, "rationale": "The Industrial Revolution began in Britain, not France, and was driven by private enterprise, not state investment."}, {"text": "In Britain around 1760-1780, enabled by coal, iron, rivers for power, a stable legal system protecting private property, a Parliament favoring commerce, and an empire providing raw materials and markets.", "isCorrect": true, "rationale": "The text identifies all of these specific enabling conditions for Britain's primacy in industrialization."}, {"text": "In Germany, enabled by the unified Prussian state's investment in railroad construction and technical education.", "isCorrect": false, "rationale": "Germany industrialized after Britain; Prussian unification came in 1871; the original Industrial Revolution began in Britain decades earlier."}, {"text": "In the Netherlands, enabled by Dutch maritime trade networks that provided access to raw materials from around the world.", "isCorrect": false, "rationale": "The Netherlands had the trade networks but it was Britain that first industrialized; the text specifically identifies Britain's enabling conditions."}], "id": "q01"}, {"question": "What was the 'social question' that dominated European political thought from the 1840s onward?", "options": [{"text": "Whether women and non-property-owning men should be given the right to vote in democratic elections.", "isCorrect": false, "rationale": "While suffrage was debated, the text defines the social question specifically as what a just society owes to workers who produce its wealth."}, {"text": "What does a just society owe to the workers who produce its wealth? Can the market solve poverty on its own? Does the state have an obligation to intervene? It generated three competing answers: liberal capitalism, socialism, and Catholic Social Teaching.", "isCorrect": true, "rationale": "The text defines the social question precisely this way, identifying all three major competing responses."}, {"text": "Whether European nations should extend citizenship rights to colonial subjects in Africa and Asia.", "isCorrect": false, "rationale": "Colonial citizenship was a separate question; the social question concerned industrial workers in European cities."}, {"text": "How to reconcile scientific advances with traditional religious faith, particularly evolution theory and biblical interpretation.", "isCorrect": false, "rationale": "The text treats this as the social question specifically, rooted in industrial conditions, not the science-religion debate."}], "id": "q02"}, {"question": "What were the working conditions in early industrial Britain, according to the text?", "options": [{"text": "Difficult but fairly compensated; factory owners provided housing, healthcare, and education for their workers as part of a paternalistic system.", "isCorrect": false, "rationale": "The text describes no such paternalistic system; conditions were brutal and wages were starvation-level."}, {"text": "Factory workers including women and children worked 12-16 hours a day in unventilated buildings; children as young as five worked in coal mines; workers lived in slums without clean water; cholera epidemics swept repeatedly through cities.", "isCorrect": true, "rationale": "The text describes all of these conditions in specific detail: hours, child labor, slums, cholera, and dangerous machinery."}, {"text": "Conditions were hard but temporary; most workers rapidly saved enough to move into skilled trades within five years.", "isCorrect": false, "rationale": "The text describes systematic, permanent poverty bound to the rhythms of the machine, not a temporary condition."}, {"text": "British factories were strictly regulated from the beginning; Parliament passed factory acts in the 1760s limiting hours and prohibiting child labor.", "isCorrect": false, "rationale": "Factory regulation came later in the 19th century after decades of agitation; the text describes the unregulated early conditions as brutal."}], "id": "q03"}, {"question": "What were the three parts of Marx's argument in The Communist Manifesto?", "options": [{"text": "A scientific history of religion, a philosophical critique of property rights, and a practical program for peaceful socialist reform.", "isCorrect": false, "rationale": "Marx argued for violent revolutionary overthrow, not peaceful reform; his analysis was of class struggle, not primarily of religion."}, {"text": "A 'scientific' analysis of history as class struggle; a prediction that the proletariat would inevitably overthrow the bourgeoisie; and a prescription for violent revolutionary overthrow of the capitalist order and abolition of private property.", "isCorrect": true, "rationale": "The text identifies these three parts: diagnosis (class struggle), prediction (inevitable revolution), and prescription (violent overthrow and communist society)."}, {"text": "A theory of economic cycles, a prediction of capitalism's collapse through market failure, and a proposal for worker cooperatives as the replacement economic model.", "isCorrect": false, "rationale": "Marx's argument was about class conflict and revolutionary overthrow, not market cycles or cooperative enterprises."}, {"text": "A historical analysis of ancient slavery, a moral argument for workers' rights, and a proposal for a new legal system protecting labor contracts.", "isCorrect": false, "rationale": "Marx dismissed moral arguments as 'bourgeois' ideology; he claimed a scientific theory of history, not a moral argument."}], "id": "q04"}, {"question": "What did Marx mean by 'bourgeoisie' and 'proletariat'?", "options": [{"text": "The bourgeoisie were aristocratic landowners; the proletariat were the middle-class merchants and factory owners who wanted to replace them.", "isCorrect": false, "rationale": "The bourgeoisie in Marxist analysis were the industrialist/capitalist class (factory owners), not the aristocracy; the proletariat were factory workers."}, {"text": "The bourgeoisie owned the means of production (factories, land, capital); the proletariat owned nothing but their labor and must sell it to survive. Marx predicted the proletariat would eventually overthrow the bourgeoisie.", "isCorrect": true, "rationale": "The text defines both terms in Marxist analysis precisely this way."}, {"text": "The bourgeoisie were educated professionals (lawyers, doctors, professors); the proletariat were skilled craftsmen and artisans.", "isCorrect": false, "rationale": "In Marx's framework, bourgeoisie = capitalist owners of production, proletariat = wage-dependent workers without property."}, {"text": "The bourgeoisie were rural landowners; the proletariat were urban factory workers; Marx predicted rural landowners would eventually dispossess factory workers.", "isCorrect": false, "rationale": "Marx's analysis centered on the industrial capitalism of cities; the bourgeoisie were industrial capitalists, not primarily rural landowners."}], "id": "q05"}, {"question": "What happened in the Revolutions of 1848, and what did they teach European radicals?", "options": [{"text": "Successful workers' revolutions across Europe established permanent socialist governments; they taught that organized labor was the most powerful political force.", "isCorrect": false, "rationale": "The 1848 revolutions mostly failed; conservative governments suppressed nearly all of them within two years."}, {"text": "Revolutions broke out across Europe in February-March 1848; most were led by liberal middle-class reformers, not factory workers; all were suppressed within two years; the lesson: organized, disciplined revolutionary movements were needed, not spontaneous uprisings.", "isCorrect": true, "rationale": "The text describes all of these elements: the wave of revolutions, the middle-class (not proletarian) character, the suppression, and the lesson drawn."}, {"text": "The 1848 revolutions proved that constitutional reform through Parliament was more effective than street protest; European countries responded by extending voting rights to all adult men.", "isCorrect": false, "rationale": "The 1848 revolutions failed and did not immediately produce constitutional reform; governments were restored, not reformed."}, {"text": "The revolutions succeeded in establishing the eight-hour workday across Europe, but failed to achieve political representation for workers.", "isCorrect": false, "rationale": "The 1848 revolutions were suppressed without achieving their economic or political goals; the eight-hour workday came much later."}], "id": "q06"}, {"question": "What was Rerum Novarum (1891), and what made it historically significant?", "options": [{"text": "A Marxist party platform that proposed the gradual nationalization of industry while preserving private property for small businesses.", "isCorrect": false, "rationale": "Rerum Novarum was a papal encyclical that explicitly rejected both socialism and unrestrained capitalism; it was not a Marxist document."}, {"text": "Pope Leo XIII's encyclical 'On the Condition of Labor' — the founding document of Catholic Social Teaching — arguing that workers have God-given rights to just wages, unions, and safe conditions, while firmly rejecting both socialism and laissez-faire capitalism.", "isCorrect": true, "rationale": "The text defines Rerum Novarum exactly this way: Leo XIII's response to industrial capitalism, rejecting both socialist and laissez-faire extremes."}, {"text": "A declaration by the Council of Bishops condemning industrial machinery as incompatible with the natural law and calling for a return to agricultural society.", "isCorrect": false, "rationale": "Rerum Novarum engaged with industrial society as a fact and proposed moral principles to govern it, not a rejection of industrial technology."}, {"text": "A papal condemnation of Marxism that declared all labor unions illegal as subversive organizations threatening social order.", "isCorrect": false, "rationale": "Rerum Novarum explicitly supported workers' right to form unions; it condemned socialism but affirmed workers' rights."}], "id": "q07"}, {"question": "On what key points did Rerum Novarum agree and disagree with Marx?", "options": [{"text": "Agreed: capitalism was producing great wealth. Disagreed: workers should be patient and wait for the market to gradually improve conditions.", "isCorrect": false, "rationale": "Leo XIII agreed with Marx that workers were being exploited and the exploitation was unjust - not merely that capitalism produced wealth."}, {"text": "Agreed: industrial workers were being exploited and the exploitation was unjust. Disagreed: private property is a natural right (against socialism), and the state must protect workers' dignity (against laissez-faire). Both agreements and disagreements were rooted in the principle of imago Dei.", "isCorrect": true, "rationale": "The text states precisely this: Leo agreed with Marx's diagnosis of exploitation, then disagreed with Marx's solution of abolishing private property."}, {"text": "Agreed: a communist revolution was necessary to end exploitation. Disagreed: religion should guide the revolutionary process rather than atheist materialism.", "isCorrect": false, "rationale": "Leo XIII firmly rejected violent revolution; he sought reform within existing social structures, not revolutionary overthrow."}, {"text": "Agreed: all private property should be communally owned. Disagreed: the transition should be gradual and peaceful rather than violent.", "isCorrect": false, "rationale": "Leo XIII explicitly defended private property as a natural right; he did not agree that it should be communally owned."}], "id": "q08"}, {"question": "What is the principle of imago Dei, and how does it function in Rerum Novarum?", "options": [{"text": "The medieval Catholic teaching that kings are made in God's image, which Leo XIII extended to include all citizens as justification for extending rights.", "isCorrect": false, "rationale": "Imago Dei (Genesis 1:27) teaches that every human being is made in God's image, not specifically kings; it is not a medieval extension but a biblical teaching."}, {"text": "Latin for 'image of God,' rooted in Genesis 1:27; it grounds Rerum Novarum's entire argument: every human being possesses inherent dignity that cannot be taken away by any economic system, therefore workers cannot be treated as mere commodities.", "isCorrect": true, "rationale": "The text defines imago Dei exactly this way and identifies it as the foundation of Leo XIII's entire argument for workers' rights."}, {"text": "A Kantian philosophical principle adapted by Leo XIII from secular ethics, asserting that all rational beings must be treated as ends in themselves, not means.", "isCorrect": false, "rationale": "While Kant's principle is related, the text identifies imago Dei as a Christian theological principle rooted in Genesis, not derived from Kant."}, {"text": "A scientific claim that all humans share the same genetic ancestry, which Leo XIII used to argue for universal equality of rights.", "isCorrect": false, "rationale": "Imago Dei is a theological claim about God's creation of humanity in his image, not a scientific genetic argument."}], "id": "q09"}, {"question": "What was laissez-faire economics, and why did Rerum Novarum reject it?", "options": [{"text": "The belief that government should own and manage all major industries; rejected because it would give too much power to the state.", "isCorrect": false, "rationale": "Laissez-faire means government non-interference (the opposite of state ownership); Rerum Novarum rejected it for a different reason."}, {"text": "The belief that free markets left alone produce the best outcomes; rejected by Leo XIII because workers are not commodities - they are human beings made in God's image, and market forces without moral limits can destroy their dignity.", "isCorrect": true, "rationale": "The text defines laissez-faire and gives Leo XIII's specific rejection: workers are persons with dignity, not economic units; the market alone cannot protect that dignity."}, {"text": "A French aristocratic economic system that allocated resources based on social class; rejected as incompatible with industrial capitalism.", "isCorrect": false, "rationale": "Laissez-faire was actually a liberal economic philosophy favoring free markets and opposing aristocratic privilege; it is not an aristocratic system."}, {"text": "The belief that trade should be managed by private guilds without state interference; rejected because guilds had historically protected workers from exploitation.", "isCorrect": false, "rationale": "Laissez-faire refers to free market economics generally, not specifically guild systems."}], "id": "q10"}, {"question": "What was Catholic Social Teaching, and what were its central principles?", "options": [{"text": "A medieval code of economic ethics governing the just price and the sin of usury, revived by Leo XIII for the industrial age.", "isCorrect": false, "rationale": "While it builds on medieval economic ethics, Catholic Social Teaching as a formal body of teaching begins with Rerum Novarum (1891) as the founding document."}, {"text": "The body of official Church teaching on social, economic, and political questions beginning with Rerum Novarum (1891); its central principles include human dignity (imago Dei), the common good, the right to private property, the option for the poor, and subsidiarity.", "isCorrect": true, "rationale": "The text defines Catholic Social Teaching and its central principles exactly this way."}, {"text": "A political movement within the Catholic Church calling for democratic governments in Catholic countries, inspired by the American and French Revolutions.", "isCorrect": false, "rationale": "Catholic Social Teaching is a body of official doctrine on economic and social questions, not a political movement for democracy."}, {"text": "The Church's position that Catholic nations should establish theocratic governments in which canon law replaces civil law.", "isCorrect": false, "rationale": "Catholic Social Teaching calls for moral reform of social and economic conditions, not theocratic government."}], "id": "q11"}, {"question": "What was the difference between Pope Leo XIII and Pope Pius X in their approach to the modern world?", "options": [{"text": "Leo XIII rejected any engagement with modern society; Pius X took a more open approach that welcomed secular philosophy.", "isCorrect": false, "rationale": "The opposite: Leo XIII engaged economic and social modernity with a reasoned alternative, while Pius X became alarmed by Modernism within the Church."}, {"text": "Leo XIII engaged economic and social modernity with Rerum Novarum's reasoned alternative; Pius X focused on condemning Modernism (the application of modern historical scholarship to Scripture and doctrine) within the Church itself.", "isCorrect": true, "rationale": "The text contrasts the two popes: Leo engaged the world's social problems, Pius addressed theological threats he perceived within the Church."}, {"text": "Leo XIII condemned socialism and capitalism equally; Pius X supported moderate socialism as more compatible with Catholic social principles.", "isCorrect": false, "rationale": "Pius X supported Catholic Social Teaching (which rejected socialism); he did not support moderate socialism."}, {"text": "Leo XIII supported democratic political reform; Pius X aligned the Church with conservative monarchical governments against democratic movements.", "isCorrect": false, "rationale": "The text does not describe Leo XIII as a democratic reformer or Pius X as a monarchist; their contrast is about engagement with modernity vs. defense against Modernism within theology."}], "id": "q12"}, {"question": "What is subsidiarity, and why is it an important principle of Catholic Social Teaching?", "options": [{"text": "The principle that all important decisions should be made by the highest authority (the Pope or state) to ensure consistency and justice.", "isCorrect": false, "rationale": "Subsidiarity is the opposite: decisions should be made at the most local level capable of handling them."}, {"text": "The principle that decisions should be made at the most local level capable of handling them - a 'third way' between centralizing all power in the state and leaving everything to the unregulated market.", "isCorrect": true, "rationale": "The text defines subsidiarity as one of Catholic Social Teaching's central principles: local governance is preferable, preventing both state overcentralization and complete market anarchy."}, {"text": "The principle that subsidiary nations (colonies) deserve the same rights as the nations that govern them, a foundation for decolonization arguments.", "isCorrect": false, "rationale": "Subsidiarity concerns the appropriate level of decision-making within society, not colonial relations."}, {"text": "The principle that Church authority is subsidiary to (below) civil authority in all matters of taxation and economic regulation.", "isCorrect": false, "rationale": "Subsidiarity asserts the opposite hierarchy of authority from the local up, not the subordination of Church to civil power."}], "id": "q13"}, {"question": "What was the significance of Otto von Bismarck's social insurance programs in Germany, and what motivated them?", "options": [{"text": "Bismarck implemented social insurance out of genuine Christian charity, inspired by reading Rerum Novarum.", "isCorrect": false, "rationale": "Bismarck's programs preceded Rerum Novarum (1891) and were explicitly motivated by calculation, not idealism or Christian charity."}, {"text": "Bismarck introduced the first national social insurance system not out of idealism but to reduce the appeal of socialism - a calculated political strategy that showed even conservative governments recognized they must address workers' conditions.", "isCorrect": true, "rationale": "The text explicitly states Bismarck's motivation: not idealism but the calculation that modest welfare programs would reduce socialism's appeal."}, {"text": "Bismarck's programs were cosmetic gestures that provided no real benefits and were designed only to deceive workers into supporting the Conservative Party.", "isCorrect": false, "rationale": "Bismarck's social insurance programs (accident, sickness, old age insurance) were real programs that became the model for the modern welfare state."}, {"text": "Bismarck opposed social insurance as contrary to liberal economic principles and tried to suppress it; the programs were passed over his veto by the Reichstag.", "isCorrect": false, "rationale": "Bismarck was the initiator of Germany's social insurance programs; he used them as a political tool against socialist parties."}], "id": "q14"}, {"question": "Why does the text say Marx's prescription was wrong even if his diagnosis was accurate?", "options": [{"text": "Marx's prescription failed because workers in industrial nations grew too wealthy to want revolution; prosperity resolved the class conflict he identified.", "isCorrect": false, "rationale": "The text's critique is theological and philosophical, not that prosperity made revolution unnecessary."}, {"text": "Marx proposed a purely material solution to what was ultimately a spiritual problem of human greed. His atheism rejected natural law, his materialism reduced persons to economic units, and his utopianism believed a perfect society achievable on earth - the twentieth-century Communist record demonstrated the catastrophic result.", "isCorrect": true, "rationale": "The text identifies these three specific failures: atheism (rejected moral check on power), materialism (reduced humans to economic units), and utopianism (believed perfection achievable by force)."}, {"text": "Marx's prescription was wrong because he underestimated nationalism; workers chose their nations over class solidarity, making international worker unity impossible.", "isCorrect": false, "rationale": "While this is a valid historical observation, it is not the critique the text makes; the text focuses on Marx's theological and philosophical errors."}, {"text": "Marx's prescription failed because he incorrectly predicted that capitalism would produce fewer jobs; instead, industrialization created more employment than it destroyed.", "isCorrect": false, "rationale": "The text's critique is not about Marx's economic predictions but about the spiritual and philosophical errors in his prescription."}], "id": "q15"}, {"question": "How does Dostoevsky's 'Grand Inquisitor' from The Brothers Karamazov engage with the Enlightenment project?", "options": [{"text": "The Grand Inquisitor argues that people are naturally rational and will choose the right if given sufficient education, vindicating Enlightenment optimism.", "isCorrect": false, "rationale": "The Grand Inquisitor makes the opposite argument: that most people cannot bear freedom and will trade it for bread and security."}, {"text": "The Grand Inquisitor argues that most people cannot bear the weight of true freedom and will surrender it for bread, security, and belonging; this challenges the Enlightenment and socialist assumption that people want to be truly free.", "isCorrect": true, "rationale": "The text identifies Dostoevsky's deeper question: what does it actually mean to be free? Could it be that what humans most fear is not oppression but the weight of their own freedom?"}, {"text": "The Grand Inquisitor vindicates Marx by showing that material want is the root cause of all human spiritual failure, and that eliminating poverty will enable true human freedom.", "isCorrect": false, "rationale": "The Grand Inquisitor's argument is exactly the reverse: that giving people bread (material satisfaction) is what allows the Church to control them; it is a critique of bread-and-security politics."}, {"text": "The Grand Inquisitor represents Dostoevsky's support for theocracy, arguing that religious authority must control all political and economic life.", "isCorrect": false, "rationale": "The Grand Inquisitor is a profoundly ambiguous figure; Dostoevsky presents him as simultaneously understanding human nature and representing a spiritual tyranny."}], "id": "q16"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
