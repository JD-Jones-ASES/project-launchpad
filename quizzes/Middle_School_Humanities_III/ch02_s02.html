<script>
var QUESTIONS = [{"question": "How do the literary contributions of Miguel de Cervantes and Bartolomé de las Casas collectively enrich our understanding of the Spanish Empire, as described in the text?", "options": [{"text": "They both primarily focused on chronicling the military victories and territorial expansion of the empire.", "isCorrect": false, "rationale": "The text states Las Casas argued against the conquest, and Cervantes's work highlighted the 'painful reality' rather than solely glorifying military victories."}, {"text": "Cervantes provided a comedic perspective on societal ideals, while Las Casas offered a tragic account of colonial atrocities.", "isCorrect": true, "rationale": "The introduction explicitly states, 'Together they give us comedy and tragedy, laughter and grief — the full range of what Spain was,' directly aligning with Cervantes's 'comic history' and Las Casas's 'nightmare' account of destruction."}, {"text": "Both writers exclusively used their works to advocate for the continued expansion and glorification of Spanish power.", "isCorrect": false, "rationale": "Las Casas was a fierce critic of Spanish colonial practices, arguing for reform, while Cervantes critiqued the gap between heroic ideals and harsh realities."}, {"text": "They primarily documented the daily lives of common Spanish citizens, avoiding political or moral commentary.", "isCorrect": false, "rationale": "Both authors engaged deeply with political and moral commentary, addressing the nature of the empire and its actions."}], "id": "q01"}, {"question": "Miguel de Cervantes's personal experiences, such as fighting at Lepanto, being a slave, and facing poverty, profoundly shaped 'Don Quixote' by:", "options": [{"text": "Inspiring him to create a purely escapist fantasy world detached from reality.", "isCorrect": false, "rationale": "The novel is explicitly stated to be about the 'gap between heroic ideals and painful reality,' meaning it is deeply connected to, not detached from, reality."}, {"text": "Highlighting the glory of military conquest and the rewards of service to the empire.", "isCorrect": false, "rationale": "While he fought heroically, his later experiences of poverty and being 'ignored, impoverished, and dismissed' led him to portray the 'world's indifference' to service, not just its glory."}, {"text": "Informing the novel's central theme of the stark contrast between heroic ideals and harsh realities.", "isCorrect": true, "rationale": "The text states, 'This biography matters because Don Quixote is a novel about the gap between heroic ideals and painful reality — written by a man who had tested both.'"}, {"text": "Leading him to write a historical account of his life to justify his financial struggles.", "isCorrect": false, "rationale": "Cervantes wrote a novel, 'Don Quixote,' which used fiction to explore broader themes, rather than a direct autobiographical justification."}], "id": "q02"}, {"question": "Don Quixote is often called the 'first modern novel' due to its innovative exploration of:", "options": [{"text": "Its detailed descriptions of 16th-century Spanish court life and political intrigue.", "isCorrect": false, "rationale": "While it provides context, the text does not highlight court life or political intrigue as the primary reason for its 'modern' label."}, {"text": "The psychological depth of its protagonist and the blurring lines between ideal and reality.", "isCorrect": true, "rationale": "The text describes Alonso Quijano losing his grip on reality due to his immersion in ideals, and the novel explores the 'gap between heroic ideals and painful reality,' which is a hallmark of modern psychological fiction."}, {"text": "Its strict adherence to traditional epic poetry structures and classical narrative forms.", "isCorrect": false, "rationale": "The novel satirizes chivalric romances, suggesting a departure from, rather than strict adherence to, traditional forms."}, {"text": "Its use of entirely new, never-before-seen linguistic structures in the Spanish language.", "isCorrect": false, "rationale": "The text does not mention linguistic innovation as the primary reason for its modernity, but rather its thematic and character depth."}], "id": "q03"}, {"question": "The windmill scene in Don Quixote, where the protagonist mistakes windmills for giants, functions on multiple levels primarily by:", "options": [{"text": "Serving as a literal historical document of a specific battle fought by Spanish knights.", "isCorrect": false, "rationale": "The scene is fictional and symbolic, not a literal historical account of a battle."}, {"text": "Showcasing Don Quixote's incredible physical strength in overcoming impossible odds.", "isCorrect": false, "rationale": "Don Quixote is knocked from his horse, demonstrating his delusion and vulnerability, not physical triumph."}, {"text": "Simultaneously offering slapstick comedy and allegorically depicting a man committed to an ideal despite reality.", "isCorrect": true, "rationale": "The teacher's note explicitly states it works 'Literally, it is slapstick comedy. Allegorically, it is a portrait of a man so committed to an ideal that reality cannot reach him.'"}, {"text": "Symbolizing the Spanish Empire's triumphant naval power against its enemies.", "isCorrect": false, "rationale": "Historically, the scene is linked to Spain 'still living in the rhetoric of crusade and chivalry while the economic and military ground was shifting beneath it,' especially after the Armada's failure, suggesting decline rather than triumph."}], "id": "q04"}, {"question": "How does Don Quixote's experience in the Cave of Montesinos in Part II contribute to the deepening of the novel's themes?", "options": [{"text": "It reinforces his unwavering belief in chivalric ideals by providing undeniable proof of their existence.", "isCorrect": false, "rationale": "The text states that 'For the first time, Sancho wonders if his master is simply lying, while Don Quixote himself begins to doubt whether the vision was real,' indicating a challenge to his belief, not reinforcement."}, {"text": "It introduces a new character who helps him achieve true heroism and overcome his delusions.", "isCorrect": false, "rationale": "The vision described is personal to Don Quixote and does not involve a new character guiding him out of delusion; rather, it prompts self-doubt."}, {"text": "It marks a shift towards a more melancholy tone, as his confident delusion begins to crack and he experiences self-doubt.", "isCorrect": true, "rationale": "The text states, 'By Part II, the comedy has deepened into something more melancholy... The old, confident delusion is cracking. The ideal is collapsing inward.'"}, {"text": "It resolves the conflict between ideal and reality by showing him the practical benefits of his adventures.", "isCorrect": false, "rationale": "The experience introduces doubt and cracks his delusion, complicating the conflict between ideal and reality rather than resolving it with practical benefits."}], "id": "q05"}, {"question": "Bartolomé de las Casas's 'A Short Account of the Destruction of the Indies' was written primarily to:", "options": [{"text": "Provide a comprehensive historical record of all Spanish discoveries in the Americas.", "isCorrect": false, "rationale": "While it contains historical information, its primary purpose was a moral critique and call to action, not a neutral historical record."}, {"text": "Persuade Prince Philip and the Spanish court to reform their brutal colonial practices.", "isCorrect": true, "rationale": "The text explicitly states it 'was addressed directly to Prince Philip (later Philip II) and intended to shock the Spanish court into reforming its colonial practices.'"}, {"text": "Justify the Spanish conquest of the Americas by highlighting the native peoples' submissiveness.", "isCorrect": false, "rationale": "Las Casas condemned the conquest and exploitation, portraying the natives' innocence to highlight Spanish cruelty, not to justify the conquest."}, {"text": "Serve as a guide for future Spanish colonizers on effective management of indigenous labor.", "isCorrect": false, "rationale": "Las Casas vehemently opposed the forced labor and exploitation, advocating for protection of indigenous peoples, not their management as labor."}], "id": "q06"}, {"question": "Las Casas's contrasting descriptions of the native peoples and the Spanish colonizers in 'A Short Account' aim to:", "options": [{"text": "Emphasize the cultural differences that made communication between the groups impossible.", "isCorrect": false, "rationale": "The focus is on moral character and actions, not communication barriers. He describes the natives as 'utterly faithful and obedient' to the Spaniards initially."}, {"text": "Undermine the Spanish justification for conquest by portraying the natives as innocent and the colonizers as brutal.", "isCorrect": true, "rationale": "Las Casas describes natives as 'open and as innocent,' 'unassuming, long-suffering,' and 'without malice or guile,' while the Spanish 'behaved like ravening wild beasts,' using 'new methods of cruelty,' directly challenging any moral justification for their actions."}, {"text": "Argue that both groups shared responsibility for the violence and destruction in the colonies.", "isCorrect": false, "rationale": "Las Casas clearly places the blame for 'killing, terrorizing, afflicting, torturing, and destroying' on the Spanish, describing them as aggressors against innocent victims."}, {"text": "Suggest that the native peoples' submissive nature invited exploitation by the Spaniards.", "isCorrect": false, "rationale": "While he notes their submissiveness, he presents it as a quality taken advantage of by 'ravenous wild beasts,' implying Spanish culpability for exploitation, not native responsibility."}], "id": "q07"}, {"question": "The fundamental basis of Bartolomé de las Casas's argument against Spanish colonial practices was rooted in:", "options": [{"text": "Economic theory, arguing that exploitation was ultimately unprofitable for the crown.", "isCorrect": false, "rationale": "While there might have been economic implications, the text states his argument was 'entirely in Christian theology,' not economic theory."}, {"text": "Military strategy, proposing alternative methods of conquest that would be less costly.", "isCorrect": false, "rationale": "His argument was a moral and theological critique of the conquest itself, not a proposal for alternative military strategies."}, {"text": "Christian theology, asserting that indigenous peoples were made in the image of God and deserved protection.", "isCorrect": true, "rationale": "The text explicitly states, 'Las Casas grounds his argument entirely in Christian theology. The indigenous peoples are human beings made in the image of God (imago Dei).'"}, {"text": "International law, citing specific treaties that prohibited the enslavement of non-Christians.", "isCorrect": false, "rationale": "While legal arguments might have been part of his overall advocacy, the text emphasizes Christian theology as the fundamental basis."}], "id": "q08"}, {"question": "What is the significance of Bartolomé de las Casas's transformation from an encomendero to a critic of Spanish colonialism?", "options": [{"text": "It demonstrates that only outsiders could truly understand and criticize the injustices of the empire.", "isCorrect": false, "rationale": "The text clearly states he was a 'priest, a Spaniard, and himself a former encomendero,' making him an insider, not an outsider."}, {"text": "It highlights the potential for internal moral awakening and conversion within the colonial system itself.", "isCorrect": true, "rationale": "The text refers to 'His conversion from participant to prophet is one of the most remarkable moral transformations in the history of colonialism,' underscoring an internal change within the system."}, {"text": "It suggests that his criticisms were less credible because he had once participated in the system.", "isCorrect": false, "rationale": "The text presents his transformation as 'remarkable' and influential, not as diminishing his credibility."}, {"text": "It indicates that his initial participation was a calculated move to gain influence before revealing his true intentions.", "isCorrect": false, "rationale": "There is no information in the text to suggest his initial participation was a calculated move; it describes a 'conversion' or moral transformation."}], "id": "q09"}, {"question": "The text concludes that Cervantes and Las Casas are enduring figures in Western civilization because they both:", "options": [{"text": "Successfully led military campaigns that expanded the Spanish Empire's influence and wealth.", "isCorrect": false, "rationale": "Cervantes fought but suffered personally, and Las Casas criticized the empire's actions; neither primarily led successful expansion campaigns."}, {"text": "Used their work to passionately defend and glorify the unblemished ideals of Spanish chivalry and conquest.", "isCorrect": false, "rationale": "Both challenged aspects of Spain; Cervantes questioned chivalric ideals, and Las Casas condemned the conquest."}, {"text": "Embodied a complex blend of loyalty to Spain and its faith with a powerful protest against its moral failings.", "isCorrect": true, "rationale": "The conclusion states, 'That combination — loyalty and protest, celebration and grief — makes them enduring figures not just in Spanish literature but in the moral history of Western civilization.'"}, {"text": "Advocated for Spain's complete withdrawal from the Americas and a return to medieval European social structures.", "isCorrect": false, "rationale": "Las Casas sought reform of colonial practices, not complete withdrawal, and neither author advocated for a return to medieval social structures."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
