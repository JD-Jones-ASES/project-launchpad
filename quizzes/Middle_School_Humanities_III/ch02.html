<script>
var QUESTIONS = [{"question": "What three world-historical events occurred in Spain in the single year of 1492?", "options": [{"text": "The defeat of the Armada, the execution of Columbus, and the founding of New Spain.", "isCorrect": false, "rationale": "The Armada was defeated in 1588; Columbus was not executed; these events did not occur in 1492."}, {"text": "The completion of the Reconquista with Granada's fall, the expulsion of Jews (Alhambra Decree), and Columbus's voyage west.", "isCorrect": true, "rationale": "The text explicitly identifies all three: Granada fell in January, the Alhambra Decree expelled Jews, and Columbus sailed in August 1492."}, {"text": "The unification of Spain under Ferdinand and Isabella, the conquest of Mexico, and the Treaty of Tordesillas.", "isCorrect": false, "rationale": "The Treaty of Tordesillas was 1494 and the conquest of Mexico began in 1519; unification had been in progress before 1492."}, {"text": "The founding of the Jesuit order, the Battle of Lepanto, and Pizarro's conquest of Peru.", "isCorrect": false, "rationale": "The Jesuits were founded in 1540, Lepanto was 1571, and Pizarro conquered Peru in the 1530s."}]}, {"question": "What was the Reconquista, and why did it shape Spanish national identity?", "options": [{"text": "Spain's sixteenth-century campaign to colonize the Americas, which made Catholicism central to Spanish identity.", "isCorrect": false, "rationale": "The Reconquista was the centuries-long reconquest of Iberia from Muslim rulers, not the American colonial campaign."}, {"text": "The centuries-long Christian campaign to retake the Iberian Peninsula from Muslim rulers, completed in 1492, shaping the conviction that Christian civilization must be defended at all costs.", "isCorrect": true, "rationale": "The text defines it precisely this way: ending in 1492 with Granada's fall, shaping the identity that drove Spanish expansion."}, {"text": "The Spanish Inquisition's campaign to root out Muslim and Jewish converts suspected of false conversion.", "isCorrect": false, "rationale": "The Inquisition is related but distinct; the Reconquista refers to the military campaign to retake territory."}, {"text": "Ferdinand and Isabella's diplomatic campaign to build alliances with other Catholic monarchs against the Ottoman Empire.", "isCorrect": false, "rationale": "The Reconquista was a military territorial reconquest, not a diplomatic alliance-building campaign."}]}, {"question": "How did Hernan Cortes defeat the Aztec Empire, which had millions of people and a capital larger than any European city?", "options": [{"text": "Cortes raised an army of 50,000 Spanish soldiers who overwhelmed the Aztecs through sheer numbers.", "isCorrect": false, "rationale": "Cortes landed with roughly 500 soldiers; superior numbers were not the reason for Spanish victory."}, {"text": "Cortes used roughly 500 soldiers, horses, and crucially the devastating effect of smallpox, to which the native population had no immunity.", "isCorrect": true, "rationale": "The text emphasizes that disease (smallpox) killed far more than Spanish swords, alongside military tactics and horses."}, {"text": "The Aztecs willingly surrendered because they believed Cortes was the god Quetzalcoatl returning as prophesied.", "isCorrect": false, "rationale": "While this story is sometimes told, the text emphasizes military conquest and disease as the decisive factors."}, {"text": "Spain formed an alliance with a rival empire that provided 10,000 native allies to fight the Aztecs.", "isCorrect": false, "rationale": "The text does not mention native alliances as the key factor; it emphasizes Spanish tactics and disease."}]}, {"question": "What was the encomienda system, and what was its practical effect on indigenous people?", "options": [{"text": "A system of land grants that gave Spanish colonists the right to farm land while indigenous people worked as free wage laborers.", "isCorrect": false, "rationale": "Indigenous laborers were not free wage earners; the encomienda was effectively forced labor."}, {"text": "A system granting Spanish colonists the labor of native people in exchange for Christianizing them, which in practice became forced labor that worked people to death.", "isCorrect": true, "rationale": "The text describes it as officially Christian education and protection but in practice forced labor causing death, depopulation, and family separation."}, {"text": "A treaty system between Spanish colonists and indigenous rulers that regulated trade and protected native rights.", "isCorrect": false, "rationale": "The encomienda was a labor grant system, not a treaty protecting native rights."}, {"text": "A taxation system requiring indigenous people to pay annual tribute in gold and silver to the Spanish crown.", "isCorrect": false, "rationale": "While tribute was extracted, the encomienda specifically concerned the grant of indigenous labor, not direct taxation."}]}, {"question": "What was Bartolome de las Casas's main argument in A Short Account of the Destruction of the Indies (1542)?", "options": [{"text": "That Spain should withdraw from the Americas entirely because the indigenous people were too numerous to govern.", "isCorrect": false, "rationale": "Las Casas argued for protection and reform, not withdrawal from the Americas."}, {"text": "That the indigenous peoples of the Americas were fully human with rational souls, and their enslavement was a mortal sin violating Christian teaching.", "isCorrect": true, "rationale": "Las Casas argued from Christian theology (imago Dei) that these peoples were fully human and their exploitation violated the faith Spain claimed to uphold."}, {"text": "That Portugal, not Spain, had the legal right to the Americas under the Treaty of Tordesillas.", "isCorrect": false, "rationale": "Las Casas was arguing moral theology, not challenging Spain's legal title to the Americas."}, {"text": "That the Spanish crown was losing money on its American colonies and should restructure the system for profit.", "isCorrect": false, "rationale": "Las Casas's argument was entirely moral and theological, not economic."}]}, {"question": "What was the Valladolid Debate (1550-1551), and why was it historically remarkable?", "options": [{"text": "A debate between Spanish and Portuguese diplomats over the division of the Americas under the Treaty of Tordesillas.", "isCorrect": false, "rationale": "The Valladolid debate was between theologians arguing whether the conquest of the Americas was morally just, not a diplomatic border dispute."}, {"text": "A formal theological and legal inquiry ordered by King Charles I asking whether Spain's conquest of the Americas was morally just - remarkable because Spain formally examined whether its own empire was legitimate.", "isCorrect": true, "rationale": "The text calls this extraordinary: Spain was unique among colonial powers in conducting a formal inquiry into the moral legitimacy of its own empire."}, {"text": "A church council that condemned Las Casas's writings and officially declared the encomienda system morally acceptable.", "isCorrect": false, "rationale": "The opposite occurred: the debate featured Las Casas arguing against the system; no official condemnation of Las Casas resulted."}, {"text": "A debate between Catholic and Protestant theologians about whether Spain's colonial methods were compatible with Christian teaching.", "isCorrect": false, "rationale": "Both debaters (Sepulveda and Las Casas) were Catholics; this was an internal Catholic theological dispute, not a Catholic-Protestant one."}]}, {"question": "What position did Juan Gines de Sepulveda argue at Valladolid?", "options": [{"text": "That indigenous peoples had natural rights equal to Europeans and could not justly be conquered.", "isCorrect": false, "rationale": "This was Las Casas's position; Sepulveda argued the opposite."}, {"text": "That indigenous peoples were natural slaves in the Aristotelian sense - barbarous, incapable of self-governance, and therefore legitimately conquered and Christianized by force.", "isCorrect": true, "rationale": "Sepulveda used Aristotle's concept of natural slavery to argue that the conquest was morally just and beneficial to the conquered."}, {"text": "That Spain should pay reparations to indigenous peoples for the destruction caused by the conquest.", "isCorrect": false, "rationale": "Sepulveda was defending the conquest as just; he did not argue for reparations."}, {"text": "That the Pope had the authority to grant Spain's right to the Americas, making the conquest legally and morally valid.", "isCorrect": false, "rationale": "While papal authority was used to justify some Spanish claims, Sepulveda's specific argument at Valladolid was the natural slavery argument from Aristotle."}]}, {"question": "What was the Battle of Lepanto (1571), and what was its significance?", "options": [{"text": "A Spanish naval battle against England that resulted in the destruction of the English fleet and established Spanish dominance of the seas.", "isCorrect": false, "rationale": "Lepanto was fought against the Ottoman Empire, not England; it established Spanish-Catholic naval power in the Mediterranean."}, {"text": "A Spanish-led Catholic naval coalition that destroyed the Ottoman fleet off the coast of Greece, shattering the myth of Ottoman naval invincibility.", "isCorrect": true, "rationale": "The text describes it as the largest Mediterranean naval battle since ancient times, destroying the Ottoman fleet and demonstrating Spanish-Catholic power."}, {"text": "A land battle in which Spanish troops defeated the last Muslim army in Iberia, completing the Reconquista.", "isCorrect": false, "rationale": "Lepanto was a naval battle in the Mediterranean against the Ottomans; the Reconquista had been completed in 1492 with the fall of Granada."}, {"text": "A Portuguese-led naval battle that opened the sea route to India, allowing Spain to bypass the Ottoman-controlled overland routes.", "isCorrect": false, "rationale": "It was Portuguese explorers (notably Vasco da Gama) who opened the sea route to India, and that occurred decades before Lepanto."}]}, {"question": "Who was Miguel de Cervantes, and how did his life experiences shape Don Quixote?", "options": [{"text": "A courtier who wrote from the luxury of Philip II's court, imagining an idealized version of Spanish chivalry.", "isCorrect": false, "rationale": "Cervantes lived in poverty and hardship, not courtly luxury; the gap between ideal and reality comes from his personal experience."}, {"text": "A veteran of Lepanto who was captured by pirates and enslaved for five years, then spent years in poverty as a tax collector; he wrote about the gap between heroic ideals and painful reality from deep personal experience.", "isCorrect": true, "rationale": "The text details his biography: Lepanto, pirates, five years in Algiers, poverty, and prison - all informing Don Quixote's themes."}, {"text": "A Dominican friar who wrote satire to defend indigenous peoples in the Americas against Spanish colonial abuses.", "isCorrect": false, "rationale": "This describes Las Casas, not Cervantes; Cervantes was a soldier and writer, not a friar involved in colonial reform."}, {"text": "A Spanish philosopher who used fiction to argue against Aristotle's theory of natural slavery.", "isCorrect": false, "rationale": "The Aristotelian natural slavery debate was at Valladolid; Cervantes's concerns in Don Quixote were different thematic ones."}]}, {"question": "What does Don Quixote's attack on windmills symbolize about the relationship between ideals and reality?", "options": [{"text": "It shows that courage in the face of overwhelming odds is always admirable, regardless of the outcome.", "isCorrect": false, "rationale": "The scene shows the danger of mistaking windmills for giants - it is about the failure of ideals to match reality, not simple courage."}, {"text": "It portrays a man so committed to an ideal that reality cannot reach him - simultaneously comic and tragic, suggesting Spain itself may have been living in outdated heroic rhetoric.", "isCorrect": true, "rationale": "The text describes the scene as 'funny' and 'unbearably sad,' and notes that many readers read Don Quixote as a figure for Spain itself - living in crusade rhetoric while the ground shifted beneath it."}, {"text": "It is a direct allegory for the Spanish Armada's failure against England's superior naval technology.", "isCorrect": false, "rationale": "While the parallel has been drawn, the text does not make this specific Armada allegory; it describes the scene more generally as Spain living in outdated heroic ideals."}, {"text": "It demonstrates the medieval belief that giants and monsters were real, which Cervantes is mocking as superstition.", "isCorrect": false, "rationale": "The point is not about medieval superstition but about the universal human tendency to see what we want to see rather than what is there."}]}, {"question": "How does Las Casas ground his moral argument against Spanish colonial practices?", "options": [{"text": "He argues from Enlightenment natural rights philosophy that all humans are born free and equal.", "isCorrect": false, "rationale": "Las Casas (1484-1566) predates the Enlightenment; his argument is rooted in Christian theology, not Enlightenment philosophy."}, {"text": "He argues from Christian theology: indigenous peoples are made in the image of God (imago Dei), and enslaving people you have nominally baptized is a mockery of the Christian faith.", "isCorrect": true, "rationale": "The text explicitly states Las Casas grounds his argument in Christian theology: these are humans made in the image of God, and baptizing people you exploit is not evangelism but mockery."}, {"text": "He argues from Roman law that indigenous peoples had established property rights that the conquest illegally violated.", "isCorrect": false, "rationale": "Las Casas's argument was theological, not based on Roman property law."}, {"text": "He argues from economic pragmatism that enslaved workers are less productive than free laborers and therefore unprofitable.", "isCorrect": false, "rationale": "Las Casas's argument was entirely moral and theological; he was not making an economic efficiency argument."}]}, {"question": "What event began Spain's long decline, according to the text?", "options": [{"text": "The Black Death of the late 14th century wiped out Spain's skilled labor force.", "isCorrect": false, "rationale": "The Black Death predates Spain's rise to imperial power; the text identifies internal 16th-17th century decisions as the causes of decline."}, {"text": "Multiple factors including the Dutch revolt, the Armada's defeat, expulsion of skilled Moriscos, and spending New World silver faster than it could be mined.", "isCorrect": true, "rationale": "The text identifies the Dutch revolt (c. 1568), the Armada defeat (1588), expulsion of Moriscos (1609), and fiscal overextension as causes of decline."}, {"text": "Spain lost its American colonies to local uprisings immediately after Philip II's death, cutting off silver revenues.", "isCorrect": false, "rationale": "Latin American independence movements came in the early 19th century, not immediately after Philip II's death in 1598."}, {"text": "The Council of Trent banned all further Spanish missionary activity in the Americas, removing Spain's justification for its empire.", "isCorrect": false, "rationale": "The Council of Trent supported Spanish Catholicism; it did not ban missionary activity."}]}, {"question": "What does the expulsion of the Moriscos (1609) reveal about Spain's economic and religious policies?", "options": [{"text": "It strengthened Spain's economy by redistributing Morisco lands to more productive Christian farmers.", "isCorrect": false, "rationale": "The opposite occurred; removing 300,000 skilled farmers and craftsmen weakened Spain's economy significantly."}, {"text": "It removed an estimated 300,000 skilled farmers and craftsmen from Spain's economy in a single decade, weakening Spain while strengthening its rivals.", "isCorrect": true, "rationale": "The text describes this as an act of religious intolerance that caused significant economic self-harm, similar to Louis XIV's expulsion of Huguenots."}, {"text": "It unified Spain religiously and created a period of internal peace that allowed Spain to focus on fighting France.", "isCorrect": false, "rationale": "No such peace dividend resulted; Spain continued to fight expensive wars while suffering the economic loss."}, {"text": "It demonstrated Spain's military strength by forcing a large population movement without significant resistance.", "isCorrect": false, "rationale": "The text frames this as a catastrophic miscalculation, not a demonstration of strength."}]}, {"question": "What pattern of rise and fall does Spain's history illustrate according to the text?", "options": [{"text": "That empires based on military conquest always collapse when the conquered peoples achieve military parity.", "isCorrect": false, "rationale": "The text identifies economic overextension, not military parity, as the key factor in Spain's decline."}, {"text": "Rapid expansion funded by extracted wealth, followed by the political and economic costs of maintaining too large an empire; silver created inflation that undermined the economy when wars kept coming.", "isCorrect": true, "rationale": "The text explicitly identifies this pattern and draws a comparison to Rome's provincial system as a more durable economic model."}, {"text": "That Protestant nations inevitably defeat Catholic ones because Protestantism encourages commercial enterprise while Catholicism discourages it.", "isCorrect": false, "rationale": "The text does not make this religious-economic argument; the decline is attributed to specific policies and structural factors."}, {"text": "That naval empires always succumb to land-based empires that can mobilize larger armies.", "isCorrect": false, "rationale": "Spain had both naval and land power; the decline is attributed to fiscal overextension and poor economic policy, not a land vs. sea dynamic."}]}, {"question": "What was the Counter-Reformation, and how did Spain's Philip II relate to it?", "options": [{"text": "A Protestant movement that attempted to reform the Catholic Church from within by demanding that it adopt some Lutheran practices.", "isCorrect": false, "rationale": "The Counter-Reformation was a Catholic reform movement, not a Protestant one."}, {"text": "The Catholic Church's reform movement in response to Protestantism; Philip II was its great political champion, ruling as the defender of orthodoxy and building the Escorial as its monument.", "isCorrect": true, "rationale": "The text identifies Philip II as the great champion of the Counter-Reformation, building the Escorial and fighting Protestant Europe."}, {"text": "A Spanish diplomatic initiative to reconcile Catholic and Protestant nations under a unified Christian alliance against the Ottoman Empire.", "isCorrect": false, "rationale": "Spain fought Protestant nations as well as the Ottomans; there was no unified Christian reconciliation under Philip II."}, {"text": "The Jesuit order's campaign to re-convert Protestant populations in northern Europe through education and preaching.", "isCorrect": false, "rationale": "While the Jesuits were part of the Counter-Reformation, Philip II's role was as political and military champion, not just through education."}]}, {"question": "What was the Treaty of Utrecht (1713), and what did it confirm about Spain's global position?", "options": [{"text": "It recognized Spain as the dominant European power and awarded it new territories in North America.", "isCorrect": false, "rationale": "Utrecht confirmed the end of Spanish hegemony; Spain lost territories rather than gaining them."}, {"text": "It settled the War of Spanish Succession by installing a French Bourbon as king of Spain but stripped Spain of its remaining European territories; the age of Spanish hegemony was over.", "isCorrect": true, "rationale": "The text states this directly: Utrecht ended the war, installed a Bourbon king, stripped Spain of the Netherlands and Italian possessions, and marked the end of Spanish dominance."}, {"text": "It granted Spain control of the Pacific trade routes in exchange for ceding its Caribbean colonies to France.", "isCorrect": false, "rationale": "No such Pacific-Caribbean trade is described; the treaty concerned European territorial settlement."}, {"text": "It was a peace treaty after the Thirty Years' War that first established France rather than Spain as Europe's dominant power.", "isCorrect": false, "rationale": "The Peace of Westphalia (1648) addressed the Thirty Years' War; Utrecht (1713) ended the War of Spanish Succession."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
