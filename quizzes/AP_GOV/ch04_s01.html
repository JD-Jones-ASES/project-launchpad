<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; American Attitudes About Government and Politics</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A student researcher is studying why Americans disagree sharply about whether the federal government should expand food assistance programs, even though both supporters and opponents claim to share the same underlying political values. Which statement best explains this phenomenon?", "options": [{"text": "Americans actually hold entirely different sets of core values, and any claim of shared values is superficial.", "isCorrect": false, "rationale": "The text explicitly states that Americans share core values like individualism, equality of opportunity, and limited government — disagreement arises from how these values are prioritized, not from lacking them."}, {"text": "Core American values like individualism and equality of opportunity can point in different directions on specific policies, creating tensions between principles most citizens hold simultaneously.", "isCorrect": true, "rationale": "The text identifies this directly: 'These tensions are not flaws in American political culture — they are its defining feature,' and cites individualism versus equality as a classic example playing out in welfare debates."}, {"text": "The disagreement reflects a breakdown in rule of law that has recently emerged in American political culture.", "isCorrect": false, "rationale": "Rule of law concerns due process and equal application of laws to officials and citizens, not disputes over spending priorities. The text treats rule of law as a shared, intact value."}, {"text": "Public opinion on food assistance is shaped entirely by partisan media rather than underlying values.", "isCorrect": false, "rationale": "While media influences opinion, the text locates the disagreement in structural tensions between shared values like individualism and equality, not in media exposure."}], "id": "q01"}, {"question": "The table below shows Pew Research Center data on public trust in the federal government:\n\nYear | % Trusting Government \"Most\" or \"All\" of the Time\n1964 | 77%\n1974 | 36%\n2001 | 60%\n2010 | 22%\n2023 | 16%\n\nWhich conclusion is best supported by this data?", "options": [{"text": "Trust has steadily declined in a straight line from 1964 to 2023 without interruption.", "isCorrect": false, "rationale": "The data shows a 2001 spike to 60% — a clear upward interruption, not a straight-line decline."}, {"text": "Trust in government has trended downward over the long term, but has shown temporary spikes tied to specific events like the September 11 attacks.", "isCorrect": true, "rationale": "The data shows both an overall decline from 77% in 1964 to 16% in 2023 and a clear 2001 spike to 60%, which the text attributes to rallying behavior after 9/11."}, {"text": "Americans' trust in government is cyclical and roughly equal in high and low periods.", "isCorrect": false, "rationale": "The twenty-first-century data hovers between 15 and 30 percent — much lower than mid-century levels of 73-77%, so the pattern is not cyclical equilibrium."}, {"text": "Trust in government is determined entirely by which party controls the White House.", "isCorrect": false, "rationale": "The data is not broken down by party control, and the text attributes swings to events (Watergate, 9/11) rather than partisan control."}], "id": "q02"}, {"question": "A legislator opposes a proposed regulation requiring all new cars to include expensive safety technology, arguing that the government should not dictate what private manufacturers produce. This position most directly reflects which American political value?", "options": [{"text": "Rule of law.", "isCorrect": false, "rationale": "Rule of law addresses whether officials follow legal procedures and whether laws apply equally — not whether economic regulations should exist."}, {"text": "Equality of opportunity.", "isCorrect": false, "rationale": "Equality of opportunity addresses whether individuals have a fair chance to succeed, not the scope of market regulation."}, {"text": "Free enterprise.", "isCorrect": true, "rationale": "The text defines free enterprise as support for a market-based economy with limited government intervention and opposition to government-controlled industries — exactly the reasoning in the scenario."}, {"text": "Equality of outcome.", "isCorrect": false, "rationale": "The text explicitly states Americans generally reject equality of outcome as a guiding value; the legislator's reasoning concerns market freedom, not outcome equality."}], "id": "q03"}, {"question": "Two voters support expanding public education funding but oppose a government-guaranteed minimum income. Which American value best explains this combination of positions?", "options": [{"text": "Equality of outcome, since both positions guarantee equal economic results.", "isCorrect": false, "rationale": "A minimum income would be closer to equality of outcome, which these voters oppose. The text explicitly distinguishes opportunity from outcome."}, {"text": "Equality of opportunity, because education provides a chance to succeed while a guaranteed income would guarantee a result.", "isCorrect": true, "rationale": "The text contrasts equality of opportunity (level playing field, access to education) with equality of outcome (guaranteed results), exactly the distinction in this scenario."}, {"text": "Limited government, because both positions reduce government power.", "isCorrect": false, "rationale": "Supporting expanded education funding expands government activity; this is not a limited-government position."}, {"text": "Free enterprise, because education and minimum income are both market mechanisms.", "isCorrect": false, "rationale": "Public education funding is a government program, not a market mechanism. Free enterprise refers to private competitive markets."}], "id": "q04"}, {"question": "Which statement most accurately captures the text's argument about why tensions between core American values should be understood as a normal feature of democratic politics?", "options": [{"text": "Democratic politics exists to permanently resolve value conflicts by choosing one value as supreme.", "isCorrect": false, "rationale": "The text explicitly argues the opposite — that ongoing negotiation between values, not permanent resolution, is the defining feature."}, {"text": "Democratic politics is the ongoing negotiation between competing values that most citizens hold simultaneously.", "isCorrect": true, "rationale": "This is nearly a direct quotation from the text: 'Democratic politics is, in many ways, the ongoing negotiation between competing values that most citizens hold simultaneously.'"}, {"text": "The existence of value tensions proves the American political system is fundamentally broken.", "isCorrect": false, "rationale": "The text states tensions 'are not flaws in American political culture — they are its defining feature,' directly refuting the 'broken' interpretation."}, {"text": "Democratic politics works best when citizens abandon competing values and agree on a single one.", "isCorrect": false, "rationale": "The text frames simultaneous commitment to multiple values as normal and productive, not as something citizens should abandon."}], "id": "q05"}, {"question": "A proposed law would allow federal agents to search individuals at transportation hubs without individualized suspicion in order to prevent terrorism. Supporters emphasize public safety; opponents emphasize personal freedom. This debate most directly illustrates which tension described in the text?", "options": [{"text": "Equality of opportunity versus equality of outcome.", "isCorrect": false, "rationale": "This tension concerns economic equality, not surveillance or security. The scenario does not involve economic outcomes."}, {"text": "Liberty versus order.", "isCorrect": true, "rationale": "The text explicitly names surveillance as an example of the liberty-versus-order tension: 'Those who prioritize liberty resist government restrictions; those who prioritize order argue that some limits are necessary for a functioning society.'"}, {"text": "Free enterprise versus rule of law.", "isCorrect": false, "rationale": "Neither free enterprise nor rule of law is the core dispute here — neither side argues the searches are illegal per se or that they affect markets."}, {"text": "Individualism versus free enterprise.", "isCorrect": false, "rationale": "This pairing does not describe the tension; the scenario concerns personal freedom versus safety, which the text categorizes as liberty versus order."}], "id": "q06"}, {"question": "Which scenario best illustrates the American principle of rule of law as defined in the text?", "options": [{"text": "A wealthy business owner receives a lower tax rate than a middle-income worker.", "isCorrect": false, "rationale": "Tax rate differences reflect debates over progressive versus flat taxation, not rule of law. Rule of law concerns procedural equality before the law, not economic policy."}, {"text": "A sitting president is subpoenaed by a federal court in a criminal investigation and must respond through legal channels.", "isCorrect": true, "rationale": "The text defines rule of law as the principle that 'no person — not even the president — is above the law' and that officials must follow established legal procedures."}, {"text": "Congress passes a popular new law without holding committee hearings.", "isCorrect": false, "rationale": "Skipping deliberative processes is not a rule-of-law scenario in the sense the text describes — it addresses procedural democracy rather than equal application of law to officials."}, {"text": "A state government increases funding for public schools.", "isCorrect": false, "rationale": "Education funding decisions are about policy preferences, not rule of law, which concerns whether legal procedures bind officials and protect due process."}], "id": "q07"}, {"question": "Based on the text's discussion of trust in government, which explanation best accounts for the temporary spike in trust to 60% in 2001 after years of lower numbers?", "options": [{"text": "Americans had come to believe the long-term decline in trust was over and a new era of confidence had begun.", "isCorrect": false, "rationale": "The text notes trust 'briefly' recovered and returned to low levels afterward — Americans did not permanently reassess the trajectory."}, {"text": "A major national crisis produced a short-term rally effect as citizens turned to government for security and unity.", "isCorrect": true, "rationale": "The text attributes the 2001 spike to the September 11 attacks, a crisis that temporarily increased trust before the overall downward pattern resumed."}, {"text": "Polling methodology changed in 2001 to produce artificially higher numbers.", "isCorrect": false, "rationale": "The text makes no such claim; it attributes the change to events, not methodology."}, {"text": "The 2001 economy was uniquely strong, making citizens more satisfied with government.", "isCorrect": false, "rationale": "The 2001 period actually included the dot-com crash, and the text ties the spike to the September 11 attacks, not economic conditions."}], "id": "q08"}, {"question": "A public policy scholar argues, \"Every government regulation of business reflects a choice between two competing American values.\" Which pair of values is the scholar most likely referring to, based on the text?", "options": [{"text": "Rule of law and limited government.", "isCorrect": false, "rationale": "Both of these values are broadly compatible; the text does not present them as a trade-off in the regulation debate."}, {"text": "Free enterprise and the expectation of collective protection (e.g., safe food, clean water).", "isCorrect": true, "rationale": "The text says: 'Americans value free markets, but they also expect safe food, clean water, and fair working conditions. Every regulation represents a choice between economic freedom and collective protection.'"}, {"text": "Equality of opportunity and equality of outcome.", "isCorrect": false, "rationale": "These concern economic equality and access, not the regulation-of-business debate the scholar references."}, {"text": "Individualism and rule of law.", "isCorrect": false, "rationale": "Rule of law is not positioned as a counterweight to individualism in regulatory policy; the text pairs free enterprise with collective protection for this specific tension."}], "id": "q09"}, {"question": "Two candidates in a congressional primary both claim to support \"limited government,\" but they disagree sharply on whether the government should expand border enforcement powers. Which insight from the text best explains how both candidates can sincerely claim the same value?", "options": [{"text": "The value of limited government has no consistent meaning, so any claim to it is purely rhetorical.", "isCorrect": false, "rationale": "The text treats limited government as a genuine shared value — it's operationally meaningful but can be applied differently across domains."}, {"text": "Core values shape expectations about government, but citizens can disagree sharply on specific policy applications of those values.", "isCorrect": true, "rationale": "The text says core values 'shape public expectations about what government should and should not do, even when citizens disagree sharply on specific policies' — exactly this scenario."}, {"text": "One of the two candidates must be insincere because limited government has only one correct policy meaning.", "isCorrect": false, "rationale": "The text acknowledges that Americans share values while disagreeing on how those values apply, so sincere disagreement is explicitly compatible with shared values."}, {"text": "Limited government applies only to economic policy, not security policy.", "isCorrect": false, "rationale": "The text connects limited government broadly to constraints on government power (e.g., Bill of Rights, separation of powers), not just economic issues."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
