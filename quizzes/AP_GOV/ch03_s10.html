    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Equal Protection</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The Equal Protection Clause of the Fourteenth Amendment provides that 'No State shall deny to any person within its jurisdiction the equal protection of the laws.' According to the section, what does this clause require of government classifications?", "options": [{"text": "All laws must treat everyone identically, with no classifications permitted.", "isCorrect": false, "rationale": "The section explicitly rejects this: 'The clause does not require that all laws treat everyone identically—governments routinely classify people (e.g., by age for driving or voting).'"}, {"text": "Government classifications must be justified by legitimate reasons, with the level of required justification depending on the classification involved.", "isCorrect": true, "rationale": "The text states the clause 'requires that government classifications be justified by legitimate reasons' and then describes three levels of scrutiny depending on classification type."}, {"text": "Only classifications based on race are prohibited.", "isCorrect": false, "rationale": "The Court has applied the clause to race, sex, and other categories; the section lists multiple classifications that trigger scrutiny."}, {"text": "Classifications are allowed only if they were in effect before 1868.", "isCorrect": false, "rationale": "The date of enactment is not a test; the test is whether the classification has legitimate justification under the appropriate scrutiny level."}]}, {"question": "A state law imposes different penalties for the same offense based on the defendant's race. Which level of judicial scrutiny applies, and what must the government prove?", "options": [{"text": "Rational basis review; the government need only show a legitimate interest.", "isCorrect": false, "rationale": "Race-based classifications receive strict scrutiny, not rational basis."}, {"text": "Intermediate scrutiny; the government must show an important interest substantially related to achieving that interest.", "isCorrect": false, "rationale": "Intermediate scrutiny applies to sex or gender classifications, not race."}, {"text": "Strict scrutiny; the government must show a compelling interest and that the law is narrowly tailored.", "isCorrect": true, "rationale": "The text identifies race as a 'suspect classification' triggering strict scrutiny: 'The government must show a compelling interest and the law must be narrowly tailored.'"}, {"text": "No scrutiny at all, because criminal penalties are discretionary.", "isCorrect": false, "rationale": "The Equal Protection Clause applies to criminal laws; race-based penalty differences trigger strict scrutiny."}]}, {"question": "A state law requires that only women may serve as nurses in state-operated facilities. An applicant challenges the law as sex discrimination. What standard of review applies?", "options": [{"text": "Strict scrutiny.", "isCorrect": false, "rationale": "Sex-based classifications are 'quasi-suspect' and receive intermediate scrutiny, not strict."}, {"text": "Intermediate scrutiny: the law must be substantially related to achieving an important government interest.", "isCorrect": true, "rationale": "The text states: 'Intermediate scrutiny: Applied to classifications based on sex or gender (\"quasi-suspect classifications\"). The government must show an important interest and the law must be substantially related to achieving that interest.'"}, {"text": "Rational basis review.", "isCorrect": false, "rationale": "Rational basis applies to classifications such as age, income, or disability—not sex."}, {"text": "No review—states have unlimited authority over employment.", "isCorrect": false, "rationale": "State employment decisions are subject to equal protection review; they are not immune from judicial scrutiny."}]}, {"question": "The section distinguishes DE JURE from DE FACTO discrimination. Which of the following best describes the difference?", "options": [{"text": "De jure discrimination is unintentional; de facto discrimination is intentional.", "isCorrect": false, "rationale": "The definitions are essentially reversed. De jure is intentional, established by law; de facto is discrimination in practice, often not involving intentional government action."}, {"text": "De jure discrimination is established by law or official policy; de facto discrimination exists in practice even without legal mandate.", "isCorrect": true, "rationale": "The text defines de jure ('by law') as 'discrimination established or enforced by law or official government policy' and de facto ('in fact') as 'discrimination that exists in practice, even without legal mandate.'"}, {"text": "De jure discrimination applies only to private employers; de facto discrimination applies only to governments.", "isCorrect": false, "rationale": "The distinction is not about private vs. governmental actors—it is about whether the discrimination is legally mandated or practical."}, {"text": "De jure discrimination is always subject to rational basis review; de facto is always subject to strict scrutiny.", "isCorrect": false, "rationale": "Scrutiny tiers depend on the type of classification (race, sex, etc.), not whether the discrimination is de jure or de facto."}]}, {"question": "In Brown v. Board of Education (1954), Chief Justice Earl Warren rejected the 'separate but equal' doctrine established in Plessy v. Ferguson (1896). Which of the following best summarizes Warren's reasoning?", "options": [{"text": "That tangible facilities at segregated schools were always unequal, making separation unconstitutional.", "isCorrect": false, "rationale": "Warren's opinion stated that even if tangible facilities were equal, segregation itself generated inequality—so this formulation is too narrow."}, {"text": "That 'separate educational facilities are inherently unequal' because racial separation generated a feeling of inferiority that denied equal educational opportunity.", "isCorrect": true, "rationale": "The text says Warren argued 'separation generates \"a feeling of inferiority\" in African American children' and held 'separate educational facilities are inherently unequal,' denying equal educational opportunity."}, {"text": "That the Equal Protection Clause does not apply to public education.", "isCorrect": false, "rationale": "This is the OPPOSITE of Brown's holding; Warren applied the Equal Protection Clause to public education."}, {"text": "That Congress had repealed Plessy v. Ferguson.", "isCorrect": false, "rationale": "Congress did not repeal Plessy; the Supreme Court overruled it through Brown v. Board of Education."}]}, {"question": "Why did the Court's follow-up decision, Brown II (1955), complicate the implementation of Brown v. Board of Education?", "options": [{"text": "It overturned the original Brown decision.", "isCorrect": false, "rationale": "Brown II did not overturn Brown; it addressed implementation, ordering desegregation 'with all deliberate speed.'"}, {"text": "It ordered desegregation 'with all deliberate speed,' allowing many Southern states to resist for years.", "isCorrect": true, "rationale": "The text states: 'The Court's follow-up decision in Brown II (1955) ordered desegregation \"with all deliberate speed,\" but many Southern states resisted for years.'"}, {"text": "It required immediate desegregation within 30 days.", "isCorrect": false, "rationale": "Brown II's 'all deliberate speed' formula was the OPPOSITE of a 30-day immediate requirement, and resistance persisted for many years."}, {"text": "It applied the Equal Protection Clause only to federal schools.", "isCorrect": false, "rationale": "Brown II did not limit the Equal Protection Clause's reach to federal schools; the case applied to state-mandated segregation."}]}, {"question": "A law imposes different driving age requirements on drivers over age 16 versus under age 16. A challenger claims the classification violates equal protection. Which standard of review most likely applies?", "options": [{"text": "Strict scrutiny, because age is a suspect classification.", "isCorrect": false, "rationale": "Age is not a suspect classification; strict scrutiny applies to race, ethnicity, national origin, or religion."}, {"text": "Rational basis review; the government need only show a legitimate interest and a rational relationship.", "isCorrect": true, "rationale": "The text explicitly identifies age as a classification receiving rational basis review: 'Applied to all other classifications (e.g., age, income, disability).'"}, {"text": "Intermediate scrutiny, because age approximates quasi-suspect status.", "isCorrect": false, "rationale": "Intermediate scrutiny applies to sex/gender, not age."}, {"text": "Heightened scrutiny because driving is a fundamental right.", "isCorrect": false, "rationale": "Driving is not recognized as a fundamental right triggering heightened scrutiny."}]}, {"question": "The phrase 'strict in theory, fatal in fact' describes the high rate at which strict scrutiny invalidates government laws. What does this phrase imply for attorneys challenging race-based government classifications?", "options": [{"text": "Race-based laws usually survive strict scrutiny.", "isCorrect": false, "rationale": "The phrase implies the OPPOSITE—most laws fail strict scrutiny."}, {"text": "Race-based laws are very difficult for the government to defend, because few classifications can meet the demanding requirements.", "isCorrect": true, "rationale": "The text says 'Strict scrutiny is sometimes called \"strict in theory, fatal in fact\" because so few government actions can meet its demanding requirements.'"}, {"text": "Strict scrutiny is the deferential standard applied to all government classifications.", "isCorrect": false, "rationale": "Strict scrutiny is the MOST demanding, not the most deferential, standard."}, {"text": "The phrase indicates that strict scrutiny is rarely applied to race-based classifications.", "isCorrect": false, "rationale": "Strict scrutiny is always applied to race-based classifications; the phrase describes its demanding nature, not its frequency."}]}, {"question": "The section identifies civil RIGHTS (rather than civil LIBERTIES) as beginning with Topic 3.10. Which statement captures the distinction as the section describes it?", "options": [{"text": "Civil liberties are protections of individuals from government interference; civil rights are guarantees of equal treatment by the government.", "isCorrect": true, "rationale": "The text states: 'the first nine topics in this unit have focused on civil liberties—protections of individuals from government interference—the remaining topics address civil rights: the guarantees of equal treatment by the government.'"}, {"text": "Civil liberties apply only to citizens; civil rights apply only to non-citizens.", "isCorrect": false, "rationale": "The text does not draw this distinction; civil liberties and civil rights both apply broadly."}, {"text": "Civil liberties are statutory; civil rights are constitutional.", "isCorrect": false, "rationale": "Both civil liberties and civil rights rest on constitutional foundations (with various statutory implementations)."}, {"text": "Civil liberties are found in the Fourteenth Amendment; civil rights are found in the Bill of Rights.", "isCorrect": false, "rationale": "The Bill of Rights protects civil liberties; the Fourteenth Amendment's Equal Protection Clause is the foundation for civil rights—the reverse of this option."}]}, {"question": "A student argues: 'The Equal Protection Clause directly requires the government to eliminate de facto discrimination, such as residential segregation caused by private choices.' Is this correct under the doctrine described in the section?", "options": [{"text": "Yes, because the Fourteenth Amendment prohibits any result that produces racial inequality.", "isCorrect": false, "rationale": "The text does not frame the Equal Protection Clause as requiring equal results; it focuses on intentional government action."}, {"text": "No, because the Equal Protection Clause most directly addresses de jure discrimination; de facto discrimination is more difficult to challenge constitutionally because it may not involve intentional government action.", "isCorrect": true, "rationale": "The text states: 'The Equal Protection Clause most directly addresses de jure discrimination. De facto discrimination is more difficult to challenge constitutionally because it may not involve intentional government action.'"}, {"text": "Yes, because Brown v. Board of Education outlawed de facto segregation.", "isCorrect": false, "rationale": "Brown addressed government-mandated (de jure) segregation in public schools, not de facto segregation produced by private choices."}, {"text": "No, because the Fourteenth Amendment applies only to federal action.", "isCorrect": false, "rationale": "The Fourteenth Amendment's Equal Protection Clause applies to state and local action; the issue is intentional government discrimination, not federal limitation."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
