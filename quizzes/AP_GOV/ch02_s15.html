<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP U.S. Government and Politics &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Policy and the Branches of Government</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "After a major hurricane devastates coastal cities, national news coverage and public pressure move disaster-preparedness legislation to the top of Congress's priorities. Which stage of the policy process does this scenario most directly illustrate?", "options": [{"text": "Policy evaluation.", "isCorrect": false, "rationale": "Evaluation assesses whether existing policies are achieving their goals — it is the final stage, not the moment a new issue enters the political agenda."}, {"text": "Agenda setting — a problem is identified and placed on the government's agenda.", "isCorrect": true, "rationale": "The text states agenda setting is influenced by 'media attention, interest group pressure, public opinion, focusing events (crises, disasters), and the priorities of political leaders' — exactly the dynamic in the scenario."}, {"text": "Policy adoption.", "isCorrect": false, "rationale": "Adoption is the formal enactment of a specific proposal through legislation, executive action, or judicial decision — it comes after agenda setting and formulation."}, {"text": "Policy implementation.", "isCorrect": false, "rationale": "Implementation is the bureaucratic execution of an already-adopted policy — which has not yet occurred in this scenario."}], "id": "q01"}, {"question": "Which statement best describes the difference between 'policy formulation' and 'policy adoption' in the text's five-stage model?", "options": [{"text": "Formulation involves developing proposals through research, debate, and drafting; adoption is the formal enactment through legislation, executive action, or judicial decision.", "isCorrect": true, "rationale": "The text defines formulation as the stage where 'Proposals to address the problem are developed' through research and drafting, and adoption as when 'A specific proposal is formally enacted' through a legal mechanism."}, {"text": "Formulation happens only in the judiciary; adoption only in the legislature.", "isCorrect": false, "rationale": "Both stages involve multiple actors and venues; neither is restricted to one branch."}, {"text": "Adoption precedes formulation in the policy cycle.", "isCorrect": false, "rationale": "The five stages flow in order: agenda setting → formulation → adoption → implementation → evaluation."}, {"text": "Formulation requires notice-and-comment; adoption requires a popular referendum.", "isCorrect": false, "rationale": "Notice-and-comment applies to agency rulemaking, and popular referendums are not required for federal policy adoption."}], "id": "q02"}, {"question": "Which stage of the policy process is described in the text as 'often the most complex and consequential,' because agency decisions 'can significantly alter a policy's real-world effects compared to what Congress intended'?", "options": [{"text": "Agenda setting.", "isCorrect": false, "rationale": "Agenda setting places issues on the agenda; its complexity is political but precedes implementation."}, {"text": "Policy adoption.", "isCorrect": false, "rationale": "Adoption is the formal enactment step, not the stage the text singles out as most complex and consequential."}, {"text": "Policy implementation.", "isCorrect": true, "rationale": "The text describes implementation as 'often the most complex and consequential stage' and explicitly notes that implementation decisions can significantly alter a policy's real-world effects."}, {"text": "Policy evaluation.", "isCorrect": false, "rationale": "Evaluation assesses outcomes after implementation; the text does not label it the most complex stage."}], "id": "q03"}, {"question": "Which feature of the legislative process makes 'major legislative change difficult' according to the text's discussion of the bill-to-law flowchart?", "options": [{"text": "Multiple veto points — committee review, floor votes in both chambers, conference reconciliation, and presidential action — at each of which opponents can block or modify the bill.", "isCorrect": true, "rationale": "The text identifies 'Multiple veto points' as the structural feature that biases the system toward the status quo, making major legislative change difficult."}, {"text": "The requirement that every bill pass by a two-thirds supermajority in both chambers.", "isCorrect": false, "rationale": "Ordinary bills require simple majorities, not two-thirds — supermajority thresholds apply to veto overrides and treaty ratification."}, {"text": "Mandatory Supreme Court review of all bills before passage.", "isCorrect": false, "rationale": "Supreme Court review is not part of the legislative process; it happens only after enactment when a law is challenged."}, {"text": "Required ratification by three-fourths of state legislatures.", "isCorrect": false, "rationale": "That is the threshold for constitutional amendments, not ordinary legislation."}], "id": "q04"}, {"question": "A bill passes both chambers in different forms. According to the text, what happens next in the bill-to-law flowchart?", "options": [{"text": "The Supreme Court reconciles the differences.", "isCorrect": false, "rationale": "The Court is not part of the legislative reconciliation process."}, {"text": "A conference committee negotiates a compromise, and both chambers re-vote on the reconciled text.", "isCorrect": true, "rationale": "The text describes conference committees as negotiating compromises 'that both chambers must then approve,' matching the flowchart's Conference Committee → Both Chambers Re-Vote path."}, {"text": "The President Pro Tempore rewrites the bill unilaterally.", "isCorrect": false, "rationale": "The President Pro Tempore has no rewriting authority; conference committees do the reconciliation."}, {"text": "The bill is abandoned automatically.", "isCorrect": false, "rationale": "The bill is not abandoned automatically; reconciliation through a conference committee is the standard path."}], "id": "q05"}, {"question": "Social Security is described as illustrating a 'policy ratchet.' What does this example tell us about policy feedback loops?", "options": [{"text": "Implementation can create politically powerful constituencies that make reducing a policy's benefits nearly impossible, locking in the policy and shaping future legislative politics.", "isCorrect": true, "rationale": "The text states Social Security's implementation 'created a politically powerful constituency of beneficiaries, making it nearly impossible to reduce benefits,' which is exactly the policy ratchet phenomenon."}, {"text": "Constitutional amendment is the only way to modify Social Security.", "isCorrect": false, "rationale": "The policy ratchet is political, not constitutional; Social Security can theoretically be modified by Congress but is politically difficult to cut."}, {"text": "The Supreme Court creates the feedback loop by striking down benefits.", "isCorrect": false, "rationale": "The feedback loop is driven by political constituencies, not judicial action."}, {"text": "Feedback loops disappear once a policy is implemented.", "isCorrect": false, "rationale": "Feedback loops make the process cyclical, not terminal — they keep shaping future agenda-setting and formulation."}], "id": "q06"}, {"question": "Which historical example of major legislation passing under DIVIDED government is specifically cited in the text?", "options": [{"text": "The 22nd Amendment.", "isCorrect": false, "rationale": "The 22nd Amendment is a constitutional amendment about presidential term limits; the text cites it elsewhere, but not as an example of divided-government legislation."}, {"text": "The Civil Rights Act of 1964, the Clean Air Act amendments of 1990, and welfare reform in 1996.", "isCorrect": true, "rationale": "The text lists these three as examples of significant legislation passed 'under divided government, when bipartisan coalitions formed around compromise legislation.'"}, {"text": "The Affordable Care Act.", "isCorrect": false, "rationale": "The ACA (2010) was passed under unified Democratic government, not divided government. The text uses it as an example of feedback loops, not bipartisan compromise under divided government."}, {"text": "The Pendleton Act of 1883.", "isCorrect": false, "rationale": "The Pendleton Act addressed civil service reform and is not used in this section as a divided-government example."}], "id": "q07"}, {"question": "A presidential system often leads to gridlock. According to the text, which condition has made bipartisan cooperation 'rarer' in the modern era?", "options": [{"text": "The extinction of swing-district members.", "isCorrect": false, "rationale": "The text references swing districts as producing cross-party voters, not extinction."}, {"text": "Intense partisan polarization, which has reduced the number of moderate members, the shared perception of pressing problems, and leaders' willingness to compromise.", "isCorrect": true, "rationale": "The text lists these three conditions as enabling bipartisan cooperation and notes they 'have become rarer in an era of intense partisan polarization.'"}, {"text": "Mandatory retirement of members at 40.", "isCorrect": false, "rationale": "No mandatory retirement age exists for members of Congress."}, {"text": "The replacement of Congress with a unicameral legislature.", "isCorrect": false, "rationale": "Congress remains bicameral; no such replacement has occurred."}], "id": "q08"}, {"question": "Based on the text's 'Skill' section, which of the following is an example of CLAIM + EVIDENCE + REASONING properly executed?", "options": [{"text": "'The president has too much power. The president can issue executive orders. This shows the president has too much power.'", "isCorrect": false, "rationale": "The text offers this as a WEAK example, calling it 'circular — no reasoning.'"}, {"text": "Arguing that executive orders shift policy-making power from Congress to the executive, citing DACA and travel restrictions, and explaining that this matters because Article I vests legislative power in Congress, meaning major changes should arise from bicameralism and presentment rather than unilateral action.", "isCorrect": true, "rationale": "The text offers exactly this example as the STRONG version — a claim, specific evidence (DACA, travel restrictions), and reasoning tied to Article I's design."}, {"text": "Citing polling numbers without connecting them to any constitutional principle.", "isCorrect": false, "rationale": "That approach lacks reasoning connecting evidence to the claim — the weakness the text warns against."}, {"text": "Restating the claim three times in different words.", "isCorrect": false, "rationale": "Restating the claim is circular; the text's formula is Claim → Evidence → Reasoning, not Claim → Claim → Claim."}], "id": "q09"}, {"question": "Divided government and gridlock can push policy into alternative venues. Which of the following is a likely CONSEQUENCE of prolonged legislative gridlock, according to the text?", "options": [{"text": "Government shutdowns, reliance on continuing resolutions instead of comprehensive budgets, and greater use of executive orders and agency regulations as substitutes for legislation.", "isCorrect": true, "rationale": "The text lists these exact consequences: 'The result may be government shutdowns, continuing resolutions instead of comprehensive budgets, and reliance on executive orders and agency regulations as substitutes for legislation.'"}, {"text": "Automatic constitutional amendment to resolve the stalemate.", "isCorrect": false, "rationale": "Constitutional amendments are rare and require two-thirds of Congress and three-fourths of state legislatures — not an automatic response to gridlock."}, {"text": "Dissolution of Congress until new elections.", "isCorrect": false, "rationale": "Unlike parliamentary systems, the U.S. does not dissolve Congress on gridlock; fixed terms apply."}, {"text": "Immediate Supreme Court legislation to break the deadlock.", "isCorrect": false, "rationale": "The Supreme Court does not legislate; it adjudicates cases brought to it."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
