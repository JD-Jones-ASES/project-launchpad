<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP U.S. Government and Politics &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Checks on the Presidency</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The president proposes ambitious new spending for a signature initiative, but Congress refuses to appropriate the funds. Which congressional check on the presidency is most directly at work?", "options": [{"text": "The impeachment power.", "isCorrect": false, "rationale": "Impeachment is the removal process for 'Treason, Bribery, or other high Crimes and Misdemeanors' — not a tool for blocking spending."}, {"text": "The power of the purse — Congress's control over federal appropriations.", "isCorrect": true, "rationale": "The text states 'Congress controls federal spending' and that the president 'cannot fund programs, military operations, or executive initiatives without legislative approval.'"}, {"text": "Judicial review.", "isCorrect": false, "rationale": "Judicial review is a judicial check, not a congressional one. The scenario describes Congress refusing to appropriate — a purse-power action."}, {"text": "The War Powers Resolution.", "isCorrect": false, "rationale": "The War Powers Resolution deals specifically with military deployments, not domestic spending initiatives."}], "id": "q01"}, {"question": "In Youngstown Sheet & Tube Co. v. Sawyer (1952), the Supreme Court held that President Truman's seizure of steel mills during the Korean War was unconstitutional. Which type of check on the presidency does this decision illustrate?", "options": [{"text": "Congressional override of a veto.", "isCorrect": false, "rationale": "Youngstown was a judicial decision, not a congressional override vote."}, {"text": "Judicial review of executive action.", "isCorrect": true, "rationale": "The text describes Youngstown and U.S. v. Nixon as examples of courts exercising 'judicial review over executive actions,' striking down presidential actions lacking constitutional or statutory authority."}, {"text": "An Electoral College rejection.", "isCorrect": false, "rationale": "The Electoral College selects presidents; it does not review executive actions."}, {"text": "A pocket veto.", "isCorrect": false, "rationale": "Pocket vetoes are a presidential tool against legislation, not a check on presidential action."}], "id": "q02"}, {"question": "A president deploys U.S. troops to a foreign conflict without congressional authorization. Under the War Powers Resolution of 1973, what is the president legally required to do?", "options": [{"text": "Obtain Supreme Court certification before deploying troops.", "isCorrect": false, "rationale": "The War Powers Resolution involves executive-legislative coordination, not Supreme Court certification."}, {"text": "Notify Congress within 48 hours and withdraw forces within 60 days (with a 30-day extension) unless Congress authorizes continued action.", "isCorrect": true, "rationale": "The text lists these exact requirements: 48-hour notification and 60-day withdrawal (plus a 30-day extension) absent congressional authorization."}, {"text": "Hold a national referendum within 30 days.", "isCorrect": false, "rationale": "The Resolution does not require referendums; the check runs through Congress, not a direct popular vote."}, {"text": "Submit the deployment decision to the United Nations Security Council.", "isCorrect": false, "rationale": "The War Powers Resolution is a domestic U.S. law about executive-legislative relations, not an international body consultation requirement."}], "id": "q03"}, {"question": "According to the text, why has the War Powers Resolution been 'difficult to enforce' in practice?", "options": [{"text": "Every president since Nixon has questioned its constitutionality, presidents have deployed forces without explicit authorization, and Congress has rarely forced the issue.", "isCorrect": true, "rationale": "The text lists these exact factors — ongoing presidential claims that it infringes Commander in Chief authority, repeated unauthorized deployments (Grenada, Kosovo, Libya, Syria), and congressional reluctance."}, {"text": "The Supreme Court struck down the Resolution in 1974.", "isCorrect": false, "rationale": "The text states the Resolution 'remains on the books as a statutory framework' — it has not been struck down."}, {"text": "The Resolution was repealed shortly after passage.", "isCorrect": false, "rationale": "The text explicitly says the Resolution 'remains on the books.'"}, {"text": "It applies only to nuclear conflicts, which have never occurred.", "isCorrect": false, "rationale": "The Resolution applies to any introduction of armed forces into hostilities, not just nuclear conflicts."}], "id": "q04"}, {"question": "The 22nd Amendment was ratified in 1951. Which of the following best explains the political context that drove its adoption?", "options": [{"text": "George Washington's acceptance of a third term alarmed Congress.", "isCorrect": false, "rationale": "Washington DECLINED a third term, establishing the two-term tradition. The amendment was a response to the violation of that tradition."}, {"text": "Franklin D. Roosevelt's unprecedented four election victories (1932-1944) alarmed many who feared concentration of power in a long-serving president.", "isCorrect": true, "rationale": "The text names FDR's four wins as the direct trigger and describes the resulting concern about concentration of presidential power."}, {"text": "John F. Kennedy's assassination required new succession rules.", "isCorrect": false, "rationale": "That led to the 25th Amendment (1967) on succession and disability, not the 22nd."}, {"text": "Andrew Jackson sought a constitutional right to a third term.", "isCorrect": false, "rationale": "The text does not attribute the 22nd Amendment to Jackson, and historically Jackson served only two terms."}], "id": "q05"}, {"question": "The text describes second-term presidents as 'lame ducks' losing leverage, but also notes they may be 'freed from reelection concerns.' What tension does this paradox highlight?", "options": [{"text": "The 22nd Amendment purely weakens presidents with no offsetting effect.", "isCorrect": false, "rationale": "The text says second-term presidents may be 'emboldened' precisely because they no longer face reelection — an offsetting effect."}, {"text": "Term limits simultaneously reduce a president's political leverage and remove incentive constraints, potentially enabling both weakness and boldness.", "isCorrect": true, "rationale": "The text captures exactly this duality: lame-duck status drains leverage, but freedom from reelection can embolden politically risky policies."}, {"text": "Second-term presidents gain extra powers under the 22nd Amendment.", "isCorrect": false, "rationale": "The 22nd Amendment does not expand any powers; it restricts eligibility to run."}, {"text": "Lame-duck status means the president is constitutionally removed from office automatically.", "isCorrect": false, "rationale": "Lame-duck status is a political term; the president remains in office through the end of the term."}], "id": "q06"}, {"question": "Which pattern best summarizes the text's description of presidential impeachment in U.S. history?", "options": [{"text": "Multiple presidents have been impeached by the House, but none has been convicted and removed by the Senate.", "isCorrect": true, "rationale": "The text lists Andrew Johnson, Clinton, and Trump (twice) as impeached by the House but states 'none has been convicted and removed by the Senate.'"}, {"text": "Every impeached president has been removed from office.", "isCorrect": false, "rationale": "The text states none has been removed, the direct opposite."}, {"text": "Only one president has ever been impeached.", "isCorrect": false, "rationale": "The text identifies at least four House impeachments across three presidents (Trump was impeached twice)."}, {"text": "The Supreme Court has acquitted every impeached president.", "isCorrect": false, "rationale": "The Senate, not the Supreme Court, tries impeachments (though the Chief Justice presides in a presidential impeachment)."}], "id": "q07"}, {"question": "Which president mentioned in the text resigned before the full House could vote on articles of impeachment?", "options": [{"text": "Andrew Johnson.", "isCorrect": false, "rationale": "Johnson was impeached by the House and acquitted by the Senate 'by a single vote' — he did not resign."}, {"text": "Richard Nixon.", "isCorrect": true, "rationale": "The text states the House Judiciary Committee approved articles but 'Nixon resigned before the full House voted, becoming the only president to resign from office.'"}, {"text": "Bill Clinton.", "isCorrect": false, "rationale": "Clinton was impeached by the House and acquitted by the Senate; he completed his term."}, {"text": "Donald Trump.", "isCorrect": false, "rationale": "Trump was impeached twice and acquitted both times; he did not resign."}], "id": "q08"}, {"question": "A president vetoes a bipartisan infrastructure bill. Why, according to the text, are presidents generally cautious about vetoing popular, bipartisan legislation?", "options": [{"text": "Because the pocket veto automatically negates their decision.", "isCorrect": false, "rationale": "Pocket vetoes apply only when Congress is adjourned and the president takes no action — not to bipartisan bills actively being considered."}, {"text": "Because Congress can override a veto with a two-thirds vote in both chambers, and popular bipartisan bills are more likely to muster that supermajority.", "isCorrect": true, "rationale": "The text notes overrides are 'relatively rare' but 'the possibility of an override constrains the president's veto calculus' — presidents are 'less likely to veto popular, bipartisan legislation.'"}, {"text": "Because the Supreme Court automatically nullifies vetoes of bipartisan bills.", "isCorrect": false, "rationale": "The Supreme Court does not review or nullify vetoes as a category."}, {"text": "Because the War Powers Resolution forbids vetoes during wartime.", "isCorrect": false, "rationale": "The Resolution addresses military deployments, not the veto power."}], "id": "q09"}, {"question": "A political commentator claims: 'Even though public opinion is not a constitutional check, it still functions as one.' Which argument from the text best supports that claim?", "options": [{"text": "Declining public support weakens a president's ability to advance legislation, maintain party unity, and exercise informal power.", "isCorrect": true, "rationale": "The text explicitly describes public opinion exerting 'powerful informal pressure' and lists exactly these political consequences of declining approval."}, {"text": "Public opinion polls are binding on the president under the 22nd Amendment.", "isCorrect": false, "rationale": "Public opinion has no legally binding force under any amendment."}, {"text": "Presidents can be recalled by popular vote mid-term.", "isCorrect": false, "rationale": "The federal Constitution does not provide for presidential recall by popular vote."}, {"text": "The Senate automatically convicts a president with low approval ratings.", "isCorrect": false, "rationale": "Senate conviction requires two-thirds vote based on impeachment articles, not approval ratings."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
