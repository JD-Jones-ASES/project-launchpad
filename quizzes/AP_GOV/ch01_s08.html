    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Constitutional Interpretations of Federalism</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, which phrase best describes 'dual federalism,' and what historical era is primarily associated with it?", "options": [{"text": "'Marble cake federalism,' associated with the New Deal era", "isCorrect": false, "rationale": "'Marble cake' is the metaphor for cooperative federalism, not dual federalism."}, {"text": "'Layer cake federalism,' associated with the period from 1789 to the 1930s, in which national and state governments operate in clearly defined, separate spheres", "isCorrect": true, "rationale": "The text identifies dual federalism as 'sometimes called layer cake federalism' and dates it '1789–1930s,' emphasizing 'clearly defined, separate spheres.'"}, {"text": "'Devolution,' associated with the 1960s Great Society programs", "isCorrect": false, "rationale": "Devolution is a late-twentieth-century movement, and the Great Society is an example of cooperative federalism, not devolution."}, {"text": "'Prosecutorial discretion,' associated with the Commerce Clause era", "isCorrect": false, "rationale": "Prosecutorial discretion is an executive practice discussed in Topic 1.9, not a model of federalism."}], "id": "q01"}, {"question": "What major historical event does the text identify as triggering the shift from dual federalism to cooperative federalism?", "options": [{"text": "The Civil War", "isCorrect": false, "rationale": "The Civil War profoundly affected federalism, but the text specifically names the Great Depression as the trigger for cooperative federalism."}, {"text": "The Great Depression", "isCorrect": true, "rationale": "The text states 'The Great Depression shattered the neat divisions of dual federalism,' leading to FDR's New Deal and a dramatic expansion of federal authority."}, {"text": "The War of 1812", "isCorrect": false, "rationale": "The War of 1812 predates the cooperative federalism era by more than a century."}, {"text": "The ratification of the Constitution in 1788", "isCorrect": false, "rationale": "Ratification begins the era of dual federalism, not its dissolution."}], "id": "q02"}, {"question": "Cooperative federalism, described in the text as 'marble cake federalism,' is characterized by which of the following features?", "options": [{"text": "Strict separation between federal and state responsibilities with no fiscal interaction", "isCorrect": false, "rationale": "Strict separation is the dual federalism model; cooperative federalism emphasizes intertwined authority and fiscal cooperation."}, {"text": "Federal grants to states, shared administration of programs, regulatory partnerships, and broad interpretation of the Commerce Clause", "isCorrect": true, "rationale": "The text lists all four as 'Key features of cooperative federalism.'"}, {"text": "The abolition of state governments in favor of national administration", "isCorrect": false, "rationale": "Cooperative federalism preserves state governments; it expands their collaboration with federal authorities, not their elimination."}, {"text": "Mandatory unanimity among states before Congress can pass legislation", "isCorrect": false, "rationale": "No such unanimity rule exists under any American constitutional regime except the Articles' amendment process."}], "id": "q03"}, {"question": "A state receives federal money that must be spent on Medicaid, with detailed regulations on eligibility and coverage. A different state receives federal money for 'community development' with broad discretion over how to allocate it. These two grant types are:", "options": [{"text": "Both block grants, because federal money is involved", "isCorrect": false, "rationale": "Medicaid funding is highly targeted and regulated — a categorical grant, not a block grant."}, {"text": "A categorical grant (Medicaid) and a block grant (community development), respectively", "isCorrect": true, "rationale": "The text defines categorical grants as 'provided to states for a specific, narrowly defined purpose' with 'detailed federal regulations' (citing Medicaid), and block grants as 'broad policy areas with fewer restrictions,' citing community development as an example."}, {"text": "Both categorical grants, because states receive funding", "isCorrect": false, "rationale": "Broad-discretion community development funding is block-grant style, not categorical."}, {"text": "Both revenue sharing, because both are federal-to-state", "isCorrect": false, "rationale": "Revenue sharing, a 1972–1986 program, had virtually no restrictions; neither example matches that definition exactly, and the text treats categorical and block grants as distinct categories."}], "id": "q04"}, {"question": "The Americans with Disabilities Act (1990) required state and local governments to make public facilities accessible to persons with disabilities but did not provide federal funds for compliance. What term does the text use for such requirements, and what common criticism is raised?", "options": [{"text": "Block grants; they give too much discretion to states", "isCorrect": false, "rationale": "Block grants provide funding; the ADA example involves federal requirements without funding."}, {"text": "Unfunded mandates; state and local officials argue federal requirements should not be imposed without federal funding", "isCorrect": true, "rationale": "The text defines unfunded mandates as 'federal requirements imposed on state and local governments without accompanying federal funding,' cites the ADA as an example, and notes officials' criticism."}, {"text": "Categorical grants; they impose narrow standards", "isCorrect": false, "rationale": "Categorical grants do provide funding with narrow restrictions; unfunded mandates specifically lack funding."}, {"text": "Revenue sharing; it grew during the Reagan years", "isCorrect": false, "rationale": "Revenue sharing was eliminated under Reagan, not expanded, and it was unrestricted funding — not an unfunded requirement."}], "id": "q05"}, {"question": "Justice Louis Brandeis famously described the states as 'laboratories of democracy.' Which political movement discussed in the text most explicitly invokes this idea, and who championed it?", "options": [{"text": "The New Deal, championed by Franklin D. Roosevelt", "isCorrect": false, "rationale": "The New Deal expanded federal authority; it did not emphasize state-level experimentation as its central philosophy."}, {"text": "Devolution (or New Federalism), championed most prominently by Presidents Richard Nixon and Ronald Reagan", "isCorrect": true, "rationale": "The text says devolution's proponents 'argue that states are laboratories of democracy' and names Nixon and Reagan as its most prominent champions."}, {"text": "Cooperative federalism, championed by Lyndon Johnson", "isCorrect": false, "rationale": "Johnson's Great Society expanded federal-state collaboration, deepening cooperative federalism rather than emphasizing state policy experimentation."}, {"text": "Dual federalism, championed by Chief Justice John Marshall", "isCorrect": false, "rationale": "Marshall's McCulloch opinion actually expanded federal authority under the Necessary and Proper Clause."}], "id": "q06"}, {"question": "The 1996 welfare reform law, signed by President Bill Clinton, replaced Aid to Families with Dependent Children (AFDC) with Temporary Assistance for Needy Families (TANF). What does this change exemplify in the text's discussion of federalism?", "options": [{"text": "A shift from a federal entitlement to a block grant, giving states wide latitude in designing welfare programs — a key example of devolution", "isCorrect": true, "rationale": "The text states the law 'replaced the federal welfare entitlement (Aid to Families with Dependent Children) with Temporary Assistance for Needy Families (TANF) — a block grant that gave states wide latitude in designing their own welfare programs.'"}, {"text": "A shift from state control to federal entitlement, expanding cooperative federalism", "isCorrect": false, "rationale": "This reverses the direction of the change; TANF gave states more discretion, not less."}, {"text": "An unfunded mandate with no federal funding", "isCorrect": false, "rationale": "TANF is funded by a block grant, not unfunded."}, {"text": "The elimination of all federal welfare spending", "isCorrect": false, "rationale": "TANF continues federal funding; it restructures rather than eliminates welfare spending."}], "id": "q07"}, {"question": "In United States v. Lopez (1995), the Supreme Court struck down the Gun-Free School Zones Act as exceeding Congress's authority under the Commerce Clause. According to the text, what reasoning led the Court to reject the government's argument?", "options": [{"text": "The government's argument — that gun violence affects education, which affects economic productivity, which affects interstate commerce — was too attenuated; if accepted, there would be no meaningful limit on congressional power.", "isCorrect": true, "rationale": "The text states exactly this reasoning: the government's argument 'was rejected as too attenuated. If accepted there would be no meaningful limit on congressional power.'"}, {"text": "The Court ruled that Lopez was not a student and thus lacked standing.", "isCorrect": false, "rationale": "The text identifies Lopez as a twelfth-grade student; standing was not the basis for the ruling."}, {"text": "The Court found that the Tenth Amendment had been repealed.", "isCorrect": false, "rationale": "The Tenth Amendment remains in force; the Lopez decision actually 'reinvigorated' it, according to the text."}, {"text": "The Court ruled the law was fine but was improperly signed.", "isCorrect": false, "rationale": "The text is clear the Court struck down the law on Commerce Clause grounds, not a signature defect."}], "id": "q08"}, {"question": "The text identifies three categories of activity Congress may regulate under the Commerce Clause, as articulated in Lopez. Which of the following lists these three correctly?", "options": [{"text": "Taxation; military spending; postal routes", "isCorrect": false, "rationale": "These are other enumerated powers, not the three Commerce Clause categories."}, {"text": "Channels of interstate commerce; instrumentalities of interstate commerce; activities that have a substantial effect on interstate commerce", "isCorrect": true, "rationale": "The text lists these three categories explicitly: '(1) the channels of interstate commerce (2) the instrumentalities of interstate commerce and (3) activities that have a substantial effect on interstate commerce.'"}, {"text": "Gun possession; education; local crime", "isCorrect": false, "rationale": "These are examples of the kinds of state/local activities the Court held Congress cannot regulate under the Commerce Clause."}, {"text": "Direct democracy; pluralism; elite democracy", "isCorrect": false, "rationale": "These are models of democratic governance from Topic 1.2, not Commerce Clause categories."}], "id": "q09"}, {"question": "The text observes that 'the Constitution's text does not change, but its interpretation does.' The Commerce Clause was read narrowly during dual federalism, broadly during cooperative federalism, and then narrowed again in Lopez. Which best captures the text's overall argument about the balance between national and state power?", "options": [{"text": "The balance is fixed by the Constitution's text and cannot change without a formal amendment.", "isCorrect": false, "rationale": "The text argues the opposite — the balance shifts through judicial interpretation, historical events, and political movements, not only by formal amendment."}, {"text": "The balance is shaped by historical events, political movements, judicial interpretation, and the practical demands of governance, making it dynamic rather than fixed.", "isCorrect": true, "rationale": "The text states precisely this: 'The balance between national and state power is not fixed — it is shaped by historical events, political movements, judicial interpretation, and the practical demands of governance.'"}, {"text": "Federalism has remained static since 1787.", "isCorrect": false, "rationale": "The text opens by noting the balance 'has not remained static since 1787.'"}, {"text": "Only Congress can change the balance; courts play no role.", "isCorrect": false, "rationale": "The text identifies judicial interpretation (Gibbons, Hammer, Lopez) as central to federalism's evolution."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
