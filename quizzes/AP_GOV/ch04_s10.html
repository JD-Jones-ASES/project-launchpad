    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Ideology and Social Policy</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement most accurately reflects the text's description of how the two major parties differ on healthcare?", "options": [{"text": "Both parties support eliminating private insurance in favor of single-payer healthcare.", "isCorrect": false, "rationale": "Only some liberals (not the mainstream Democratic position) support single-payer, and Republicans generally oppose it. The parties do not agree on eliminating private insurance."}, {"text": "Democrats tend to support expanding the government's role (protecting the ACA, with some supporting single-payer); Republicans tend to support market-based reforms, reduced mandates, and repealing or replacing the ACA.", "isCorrect": true, "rationale": "The text's Policy Matrix summarizes these exact positions for each party."}, {"text": "Republicans favor expanded Medicaid, while Democrats oppose it.", "isCorrect": false, "rationale": "The text describes the opposite: Democrats generally support Medicaid expansion, while some conservatives favor block-granting or limiting Medicaid."}, {"text": "Neither party takes a clear position on healthcare.", "isCorrect": false, "rationale": "The text establishes that both parties have clear, distinct positions on healthcare, even with internal diversity."}], "id": "q01"}, {"question": "Suppose a proposed policy would add stricter work requirements for SNAP (food assistance) recipients. According to the text, which party position would this proposal most closely reflect?", "options": [{"text": "The Democratic position, which defends SNAP as cost-effective hunger prevention.", "isCorrect": false, "rationale": "The text assigns SNAP defense to the Democratic position, not stricter work requirements."}, {"text": "The Republican position, which argues stricter work requirements should be tied to benefits.", "isCorrect": true, "rationale": "The text states: 'conservatives argue that stricter work requirements should be tied to benefits,' exactly the proposal in the scenario."}, {"text": "The Libertarian position of abolishing SNAP entirely.", "isCorrect": false, "rationale": "The text does not describe SNAP abolition as the conservative position described; adding work requirements is a reform, not abolition."}, {"text": "A position that neither party takes.", "isCorrect": false, "rationale": "The text explicitly identifies work-requirement advocacy as a conservative position."}], "id": "q02"}, {"question": "The text summarizes a policy matrix of positions on major social issues. Based on that matrix, which pairing of issue and Republican position is MOST accurate?", "options": [{"text": "Education — oppose vouchers; support universal pre-K.", "isCorrect": false, "rationale": "The text assigns vouchers to the Republican side and universal pre-K to the Democratic side."}, {"text": "Environment — regulate emissions; rejoin Paris Agreement.", "isCorrect": false, "rationale": "These are Democratic positions per the policy matrix."}, {"text": "Immigration — border security, enforcement first, and merit-based legal immigration.", "isCorrect": true, "rationale": "The policy matrix lists exactly these as Republican positions on immigration."}, {"text": "Social Safety Net — expand SNAP and Medicaid; raise the minimum wage.", "isCorrect": false, "rationale": "These are Democratic positions per the policy matrix."}], "id": "q03"}, {"question": "Which statement best summarizes the parties' positions on environmental policy as described in the text?", "options": [{"text": "Both parties want stricter regulation through the EPA.", "isCorrect": false, "rationale": "The text describes a sharp contrast: liberals tend to favor EPA regulatory authority while conservatives emphasize economic costs of regulation."}, {"text": "Liberals tend to support government regulation to reduce pollution and address climate change, while conservatives emphasize the economic costs of regulation, support fossil fuel production, and often prefer market-based environmental solutions.", "isCorrect": true, "rationale": "The text describes these precise differences in the environmental policy section."}, {"text": "Conservatives exclusively favor the EPA; liberals exclusively oppose it.", "isCorrect": false, "rationale": "This reverses the parties' positions on the EPA."}, {"text": "Neither party engages with environmental policy.", "isCorrect": false, "rationale": "The text describes active engagement by both parties."}], "id": "q04"}, {"question": "Both Social Security and Medicare face long-term funding shortfalls. According to the text, how do the parties' preferred solutions generally differ?", "options": [{"text": "Liberals favor raising the payroll tax cap; conservatives favor adjusting benefits or raising the retirement age.", "isCorrect": true, "rationale": "The text states this directly for Social Security: 'liberals favor raising the payroll tax cap, while conservatives favor adjusting benefits or raising the retirement age.'"}, {"text": "Liberals favor eliminating Social Security; conservatives favor doubling benefits.", "isCorrect": false, "rationale": "Neither party advocates these positions; the text notes 'Both parties publicly support Social Security.'"}, {"text": "Both parties agree on identical solutions.", "isCorrect": false, "rationale": "The text describes distinct preferred solutions for each party."}, {"text": "Liberals favor block-granting Social Security to the states.", "isCorrect": false, "rationale": "Block-granting is a conservative proposal (typically for Medicaid), not a liberal one for Social Security."}], "id": "q05"}, {"question": "A political analyst observes that \"No Child Left Behind (2001, signed by Bush) and Every Student Succeeds Act (2015, signed by Obama) both reflected bipartisan — if contested — agreement that the federal government has a role in setting educational standards.\" Which insight from the text is best illustrated by this observation?", "options": [{"text": "Both parties have supported federal education mandates at various times, even while disagreeing on many other education issues.", "isCorrect": true, "rationale": "The text makes this exact point, listing both NCLB and ESSA as evidence of bipartisan agreement on at least some federal role in education."}, {"text": "Education policy is entirely controlled by the federal government.", "isCorrect": false, "rationale": "The text explicitly states education is 'primarily a state and local responsibility,' even as the federal role has grown."}, {"text": "Both parties oppose any federal role in education.", "isCorrect": false, "rationale": "The NCLB and ESSA examples show active federal roles, supported by both parties in different administrations."}, {"text": "Only the Democratic Party has ever supported federal education legislation.", "isCorrect": false, "rationale": "NCLB was signed by a Republican president, disproving this claim."}], "id": "q06"}, {"question": "The ACA is described as \"a middle path.\" Which feature of the ACA, as presented in the text, best fits that description?", "options": [{"text": "It fully replaced private insurance with government-run single-payer healthcare.", "isCorrect": false, "rationale": "The ACA preserved private insurance rather than replacing it. Single-payer replacement would not be a 'middle path.'"}, {"text": "It preserved private insurance but added government subsidies, mandates, expanded Medicaid, and consumer protections such as prohibiting denial of coverage for preexisting conditions.", "isCorrect": true, "rationale": "The text describes the ACA as attempting a middle path by combining private insurance with government subsidies, mandates, and consumer protections."}, {"text": "It fully deregulated the health insurance market.", "isCorrect": false, "rationale": "The ACA added regulation (preexisting-condition protections, mandates) rather than removing it."}, {"text": "It eliminated Medicaid.", "isCorrect": false, "rationale": "The ACA expanded Medicaid, not eliminated it."}], "id": "q07"}, {"question": "Based on the text, why has comprehensive immigration reform been difficult to achieve even though both parties acknowledge the immigration system is dysfunctional?", "options": [{"text": "Both parties agree on every major provision.", "isCorrect": false, "rationale": "The text emphasizes that each party starts from different ideological premises that have prevented comprehensive reform."}, {"text": "The parties' ideological starting points — security and sovereignty on one side versus humanitarianism and economic integration on the other — have prevented comprehensive reform for decades.", "isCorrect": true, "rationale": "The text identifies this exact conflict as the central obstacle: 'their ideological starting points... have prevented comprehensive reform for decades.'"}, {"text": "Immigration is entirely a state responsibility.", "isCorrect": false, "rationale": "Immigration is primarily a federal responsibility; the text treats it as a federal policy area with active party platforms."}, {"text": "Neither party is interested in immigration policy.", "isCorrect": false, "rationale": "Both parties have clear, contested positions on immigration according to the text."}], "id": "q08"}, {"question": "A hypothetical candidate advocates for: (a) expanding Medicaid, (b) universal pre-K, (c) rejoining the Paris Agreement, and (d) a path to citizenship for undocumented immigrants. Based on the text's policy matrix, this candidate's platform most closely aligns with:", "options": [{"text": "The Republican policy matrix.", "isCorrect": false, "rationale": "None of the four positions match the Republican side of the text's matrix."}, {"text": "The Democratic policy matrix.", "isCorrect": true, "rationale": "The text's policy matrix assigns expanding Medicaid, universal pre-K, Paris Agreement re-entry, and a path to citizenship to the Democratic column across healthcare, education, environment, and immigration."}, {"text": "The Libertarian Party position.", "isCorrect": false, "rationale": "Libertarians oppose expansive government programs like universal pre-K and Medicaid expansion."}, {"text": "The populist conservative position.", "isCorrect": false, "rationale": "Populist conservatives would typically oppose expanded healthcare spending, universal pre-K, and broad paths to citizenship."}], "id": "q09"}, {"question": "The text argues that understanding both parties' positions is important \"even if you personally agree with one side.\" Which reason best supports this claim, based on the overall section?", "options": [{"text": "Because both parties' positions reflect underlying values and tradeoffs, understanding them enables more informed civic participation and more productive discussion.", "isCorrect": true, "rationale": "The section's discussion questions and policy matrix frame each party's position as rooted in values, with legitimate tradeoffs — implying that understanding both is necessary for informed citizenship."}, {"text": "Because only one party's position is ever based on values.", "isCorrect": false, "rationale": "The text frames both parties' positions as rooted in values, even when the values differ."}, {"text": "Because the parties' positions change randomly each year.", "isCorrect": false, "rationale": "The text describes stable ideological centers of gravity, not random change."}, {"text": "Because learning one side's views is sufficient.", "isCorrect": false, "rationale": "The text explicitly recommends understanding both sides, so learning only one is insufficient."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
