<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP U.S. Government and Politics &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Political Parties</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A political scientist notes that after an election the majority party in the House controls committee chairmanships, sets the legislative agenda, and decides which bills reach the floor. Which function of political parties does this best illustrate?", "options": [{"text": "Mobilizing voters", "isCorrect": false, "rationale": "Mobilizing voters refers to GOTV and registration activities, not organizing legislative power after the election."}, {"text": "Serving as the loyal opposition", "isCorrect": false, "rationale": "The loyal opposition is the function performed by the party out of power, not by the majority organizing Congress."}, {"text": "Organizing government", "isCorrect": true, "rationale": "The text describes 'organizing government' as the majority party's control of committee chairmanships, the legislative agenda, and floor access."}, {"text": "Recruiting candidates", "isCorrect": false, "rationale": "Candidate recruitment occurs before the election, not as a feature of majority control in Congress."}], "id": "q01"}, {"question": "Which of the following best explains why 'Duverger's Law' predicts a two-party system in the United States?", "options": [{"text": "The Constitution explicitly limits the number of political parties to two.", "isCorrect": false, "rationale": "The text states explicitly that the two-party system 'is not mandated by the Constitution.'"}, {"text": "Single-member district, plurality rules create strong incentives for political actors to coalesce into two broad coalitions.", "isCorrect": true, "rationale": "The text presents Duverger's Law as the finding that winner-take-all rules in single-member districts tend to produce two-party competition through strategic voting and coalition-building."}, {"text": "Federal campaign finance laws prohibit third-party contributions.", "isCorrect": false, "rationale": "Duverger's Law concerns electoral rules, not campaign finance. Third parties can legally raise money."}, {"text": "American voters are biologically predisposed toward binary political thinking.", "isCorrect": false, "rationale": "Duverger's Law is about institutional design, not biology or psychology."}], "id": "q02"}, {"question": "Which of the following best defines a 'party platform' as described in the text?", "options": [{"text": "A physical stage from which a candidate delivers speeches during a campaign.", "isCorrect": false, "rationale": "The text uses 'platform' in a programmatic, not physical, sense."}, {"text": "A document outlining the party's official positions on major issues.", "isCorrect": true, "rationale": "The text defines the party platform as 'a document outlining the party's official positions on major issues,' adopted at the national convention."}, {"text": "A television broadcast highlighting party candidates during election season.", "isCorrect": false, "rationale": "That describes campaign advertising, not a platform."}, {"text": "A list of registered donors to the national committee.", "isCorrect": false, "rationale": "Fundraising lists are not what the text means by a 'platform.'"}], "id": "q03"}, {"question": "A voter who prefers a third-party candidate but chooses the more viable major-party candidate because the third-party candidate 'cannot win' is engaging in which of the following behaviors described in the text?", "options": [{"text": "Retrospective voting", "isCorrect": false, "rationale": "Retrospective voting evaluates incumbent performance, not candidate viability."}, {"text": "Strategic voting", "isCorrect": true, "rationale": "The text describes strategic voting as choosing the 'lesser evil' among viable candidates, which is a key mechanism sustaining the two-party system under Duverger's Law."}, {"text": "Bullet voting", "isCorrect": false, "rationale": "The text does not reference bullet voting. Strategic voting is the term used to describe this behavior."}, {"text": "Split-ticket voting", "isCorrect": false, "rationale": "Split-ticket voting involves voting for candidates from different parties for different offices, not choosing the viable candidate over a preferred one."}], "id": "q04"}, {"question": "Which of the following most accurately contrasts single-member districts with proportional representation systems?", "options": [{"text": "Single-member districts elect one representative per district, while proportional representation allocates multiple seats based on each party's share of the vote.", "isCorrect": true, "rationale": "The text directly makes this contrast: single-member districts have one representative per area, while proportional representation allocates multiple seats based on party vote share."}, {"text": "Single-member districts allow each voter to select multiple candidates, while proportional representation allows only one vote per voter.", "isCorrect": false, "rationale": "The text does not describe multi-vote ballots in single-member districts; it describes them as each geographic area electing one representative."}, {"text": "Single-member districts are used only in presidential elections; proportional representation is used for Congress.", "isCorrect": false, "rationale": "Congress and most state legislatures in the United States use single-member districts; proportional representation is not used at the federal level."}, {"text": "Single-member districts produce multi-party legislatures; proportional representation produces two-party systems.", "isCorrect": false, "rationale": "This reverses Duverger's Law: plurality rules produce two-party systems, and proportional representation produces multi-party systems."}], "id": "q05"}, {"question": "Which of the following best characterizes the structural relationship among the national, state, and local levels of American political parties according to the text?", "options": [{"text": "A rigid hierarchy in which the national committee directs state parties, which direct local parties.", "isCorrect": false, "rationale": "The text explicitly states that the relationship is 'more collaborative than hierarchical' and that the national committee cannot compel state parties."}, {"text": "A loose confederation in which levels cooperate but do not command each other.", "isCorrect": true, "rationale": "The text describes American parties as organized at three levels, 'forming a loose confederation rather than a rigid hierarchy.'"}, {"text": "A single integrated organization in which all levels share the same staff and budget.", "isCorrect": false, "rationale": "The text describes distinct committees at each level with different responsibilities, not a single integrated organization."}, {"text": "A system in which local parties direct the national platform.", "isCorrect": false, "rationale": "The national convention adopts the platform; local parties often reflect regional political culture but do not draft the national platform."}], "id": "q06"}, {"question": "Why is the 'loyal opposition' considered an important function of political parties?", "options": [{"text": "It allows the opposition to override vetoes without constitutional amendments.", "isCorrect": false, "rationale": "The loyal opposition does not acquire special constitutional powers; it operates within normal political channels."}, {"text": "It gives the governing party final authority to silence dissent.", "isCorrect": false, "rationale": "The text presents the loyal opposition as holding the governing party accountable, not being silenced."}, {"text": "It forces public debate by offering alternative policies and scrutinizing the actions of those in power.", "isCorrect": true, "rationale": "The text explains that 'by offering alternative policy proposals and scrutinizing the actions of those in power, the opposition party ensures that government actions face public debate and criticism.'"}, {"text": "It guarantees that the minority party will win the next election.", "isCorrect": false, "rationale": "The loyal opposition concept makes no guarantees about electoral outcomes."}], "id": "q07"}, {"question": "A voter consistently votes for the Democratic candidate in every election, regardless of specific issues. According to the models in the text, which of the following factors most strongly predicts this behavior?", "options": [{"text": "A short-term evaluation of the economy", "isCorrect": false, "rationale": "A short-term economic judgment would fit retrospective voting, which varies election to election rather than producing consistent party support."}, {"text": "A long-term psychological attachment to a political party", "isCorrect": true, "rationale": "The text identifies long-term party identification, often formed through political socialization, as 'the single strongest predictor of how a person will vote.'"}, {"text": "A prospective analysis of campaign platforms", "isCorrect": false, "rationale": "Prospective voting responds to specific platforms. It would not predict consistent same-party voting regardless of issues."}, {"text": "A detailed cost-benefit calculation on every policy issue", "isCorrect": false, "rationale": "That describes the rational choice model and again would not necessarily produce consistent same-party voting."}], "id": "q08"}, {"question": "Which of the following best describes a 'winner-take-all' (plurality) election?", "options": [{"text": "The candidate with the most votes wins the seat and all other candidates receive nothing.", "isCorrect": true, "rationale": "The text defines winner-take-all (also called plurality or first-past-the-post) as a system in which 'the candidate who receives the most votes wins the seat, and all other candidates receive nothing.'"}, {"text": "Candidates are allocated legislative seats in proportion to the votes they receive.", "isCorrect": false, "rationale": "That describes proportional representation, not winner-take-all."}, {"text": "The candidate with a majority of votes must receive at least 50% plus one.", "isCorrect": false, "rationale": "Winner-take-all under plurality rules requires only the most votes, not an outright majority."}, {"text": "Voters rank all candidates and a runoff eliminates candidates in rounds.", "isCorrect": false, "rationale": "That describes instant-runoff (ranked-choice) voting, which the text does not describe as the American norm."}], "id": "q09"}, {"question": "According to the text, which function of political parties most directly addresses the fact that many citizens have limited information about candidates and low motivation to participate in elections?", "options": [{"text": "Organizing government", "isCorrect": false, "rationale": "Organizing government concerns post-election control of the legislative machinery, not voter information or motivation."}, {"text": "Mobilizing voters", "isCorrect": true, "rationale": "The text states that parties register voters, contact potential supporters, and run GOTV operations; without them 'many citizens would have less information about candidates and less motivation to participate.'"}, {"text": "Serving as the loyal opposition", "isCorrect": false, "rationale": "The loyal opposition concerns post-election accountability, not pre-election voter outreach."}, {"text": "Setting the party platform", "isCorrect": false, "rationale": "Drafting the platform is part of organizing the national convention; the text does not list it as a separate function aimed at addressing voter information gaps."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
