<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP U.S. Government and Politics &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Voter Turnout</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Using the turnout table, which demographic group experienced the largest percentage-point increase in turnout between the 2016 and 2020 presidential elections?", "options": [{"text": "Voters aged 65 and older", "isCorrect": false, "rationale": "This group rose from 71% in 2016 to 76% in 2020, a 5-point increase, which is substantial but not the largest."}, {"text": "Asian American voters", "isCorrect": true, "rationale": "Asian American turnout rose from 49% in 2016 to 60% in 2020, an 11-point increase, the largest jump of any group shown in the table."}, {"text": "White voters", "isCorrect": false, "rationale": "White turnout rose from 65% to 71%, a 6-point increase. This is notable but smaller than the Asian American jump."}, {"text": "Voters aged 18 to 29", "isCorrect": false, "rationale": "Turnout among 18- to 29-year-olds rose from 46% to 52%, a 6-point increase."}]}, {"question": "The text emphasizes that the midterm electorate is 'older, whiter, wealthier, and more ideologically polarized' than the presidential-year electorate. Which of the following is the most accurate conclusion that can be drawn from this fact?", "options": [{"text": "Midterm voters are the only voters who care about public policy.", "isCorrect": false, "rationale": "The text makes no such claim; many voters participate only in presidential years without being uninterested in policy."}, {"text": "Policy outcomes driven by midterm elections may differ systematically from those driven by presidential elections.", "isCorrect": true, "rationale": "The text states the midterm gap 'matters enormously' precisely because a different electorate 'can produce different policy outcomes.'"}, {"text": "Midterm elections consistently produce higher turnout than presidential elections.", "isCorrect": false, "rationale": "The text gives the opposite: presidential elections draw 55-65% turnout while midterms draw only 35-45%."}, {"text": "The Motor Voter Act has eliminated demographic disparities in midterm elections.", "isCorrect": false, "rationale": "The text states Motor Voter's effect on actual turnout was 'more modest' and does not claim demographic disparities have been eliminated."}]}, {"question": "Which of the following institutional features is correctly paired with its likely effect on voter turnout?", "options": [{"text": "Voter registration deadlines weeks before Election Day — increase turnout by giving voters time to prepare.", "isCorrect": false, "rationale": "The text describes registration deadlines as 'an additional hurdle,' meaning they depress rather than boost turnout."}, {"text": "Same-day registration — increases turnout by eliminating the registration deadline barrier.", "isCorrect": true, "rationale": "The text describes same-day registration, available in roughly twenty states, as eliminating the registration deadline barrier entirely, which is a turnout-facilitating reform."}, {"text": "Voter ID requirements — increase turnout among low-income and elderly voters.", "isCorrect": false, "rationale": "The text notes critics argue voter ID laws 'disproportionately burden low-income, elderly, and minority voters,' which depresses rather than increases their turnout."}, {"text": "Felony disenfranchisement — increases overall turnout by energizing community participation.", "isCorrect": false, "rationale": "Felony disenfranchisement removes roughly 4.6 million Americans from the electorate, depressing turnout."}]}, {"question": "Suppose a researcher observes that in a given presidential election, voters with incomes above $100,000 turned out at roughly 80% while voters with incomes below $20,000 turned out at roughly 45%. Based on the text, which of the following best explains this gap?", "options": [{"text": "Lower-income voters are legally barred from voting in most states.", "isCorrect": false, "rationale": "Lower-income Americans are not legally barred from voting; the text discusses structural and resource barriers, not legal disqualification."}, {"text": "Wealthier voters have more time off work, easier transportation, and a perception that government policy directly affects their interests.", "isCorrect": true, "rationale": "The text explicitly attributes the income-turnout gap to resource availability (time off work, transportation) and perceived policy relevance."}, {"text": "Lower-income voters are more likely to live in states with same-day registration.", "isCorrect": false, "rationale": "The text makes no such geographic claim, and same-day registration would actually reduce turnout barriers."}, {"text": "The Motor Voter Act excludes low-income voters from registration services.", "isCorrect": false, "rationale": "Motor Voter requires states to offer voter registration at motor vehicle agencies and other government offices to expand registration access, not restrict it."}]}, {"question": "Which of the following best defines 'political efficacy' as used in the text?", "options": [{"text": "The speed with which government responds to citizen demands.", "isCorrect": false, "rationale": "That concerns government responsiveness, not the voter's perception referenced in the text."}, {"text": "The belief that one's participation actually makes a difference.", "isCorrect": true, "rationale": "The text defines political efficacy as 'the belief that one's participation actually makes a difference' and links lower efficacy among younger voters to lower turnout."}, {"text": "The percentage of eligible voters who are registered to vote.", "isCorrect": false, "rationale": "That is closer to a measure of registration rates, not efficacy."}, {"text": "The total amount of money candidates spend on campaigns.", "isCorrect": false, "rationale": "Political efficacy is a psychological concept about individual voters' beliefs, not campaign spending."}]}, {"question": "Why did the National Voter Registration Act of 1993 (Motor Voter) have a smaller effect on actual turnout than on registration rates?", "options": [{"text": "The law applied only to states with histories of discrimination.", "isCorrect": false, "rationale": "Motor Voter applied nationally, not to a subset of states."}, {"text": "Registering is only the first step; many newly registered voters still do not cast a ballot.", "isCorrect": true, "rationale": "The text states the law 'significantly increased registration rates, though its effect on actual turnout was more modest,' implying that adding people to the rolls does not automatically produce new voters."}, {"text": "The Supreme Court struck down key enforcement provisions.", "isCorrect": false, "rationale": "The text makes no mention of the Supreme Court striking down Motor Voter provisions."}, {"text": "The law required voters to show government-issued photo identification.", "isCorrect": false, "rationale": "Motor Voter is a registration-facilitation statute; the text discusses voter ID laws separately as a burden on turnout."}]}, {"question": "From the 2020 presidential-year data, college graduates turned out at 80% while those without a college degree turned out at 57%. Which of the following best explains the education-turnout relationship described in the text?", "options": [{"text": "Colleges require students to vote as a graduation requirement.", "isCorrect": false, "rationale": "No such requirement exists and the text does not claim one."}, {"text": "Education increases civic knowledge, exposure to political information, and social networks that reinforce voting as a norm.", "isCorrect": true, "rationale": "The text states that education increases civic knowledge, exposure to political information, and the social networks that reinforce voting as a norm."}, {"text": "College graduates are automatically registered under federal law.", "isCorrect": false, "rationale": "There is no federal automatic registration tied to educational attainment."}, {"text": "Non-college voters are legally ineligible to vote in midterm elections.", "isCorrect": false, "rationale": "Educational attainment does not affect legal eligibility to vote."}]}, {"question": "Which of the following best describes the 'midterm gap' as identified in the text?", "options": [{"text": "The gap between eligible voters and registered voters in any election.", "isCorrect": false, "rationale": "That is a registration gap, not the midterm gap."}, {"text": "The difference between turnout rates in presidential-year elections and midterm elections.", "isCorrect": true, "rationale": "The text defines the midterm gap as the consistent pattern where presidential elections draw 55-65% turnout and midterms draw only 35-45%."}, {"text": "The difference between state-level and federal-level turnout.", "isCorrect": false, "rationale": "The midterm gap concerns timing of federal elections, not a state-federal comparison."}, {"text": "The racial gap in voter turnout during presidential elections.", "isCorrect": false, "rationale": "Race-based turnout differences are discussed separately as demographic variation, not as the midterm gap."}]}, {"question": "A student reviewing the turnout table claims that the relationship between age and turnout is 'essentially flat' in presidential elections. Which evidence from the table most directly refutes this claim?", "options": [{"text": "Black turnout was 67% in 2012 and 63% in 2020.", "isCorrect": false, "rationale": "This concerns race, not age, and does not address the age-turnout relationship."}, {"text": "In every election shown, voters aged 65+ turned out at much higher rates (71-76%) than voters aged 18-29 (45-52%).", "isCorrect": true, "rationale": "The table shows a consistent 20-plus-point gap between 65+ voters and 18- to 29-year-olds, directly contradicting the 'essentially flat' claim."}, {"text": "College-educated voters turn out at higher rates than non-college voters.", "isCorrect": false, "rationale": "That addresses education, not age."}, {"text": "Hispanic turnout was 54% in 2020.", "isCorrect": false, "rationale": "That addresses ethnicity, not age."}]}, {"question": "Which of the following best describes how felony disenfranchisement policies vary across the United States, according to the text?", "options": [{"text": "All states permanently disenfranchise individuals convicted of felonies.", "isCorrect": false, "rationale": "The text states only 'a few' states impose permanent disenfranchisement; others restore rights after incarceration or parole."}, {"text": "State practices range from restricting voting only during incarceration to permanent disenfranchisement absent gubernatorial restoration.", "isCorrect": true, "rationale": "The text describes a spectrum: some states restrict only during incarceration, others through parole and probation, and a few permanently absent executive restoration."}, {"text": "Felony disenfranchisement applies only in federal elections.", "isCorrect": false, "rationale": "Felony disenfranchisement is largely governed by state law and applies in state elections; the text does not restrict it to federal elections."}, {"text": "Felony disenfranchisement has been eliminated nationwide by the Voting Rights Act.", "isCorrect": false, "rationale": "The VRA did not eliminate felony disenfranchisement; the text says it currently affects roughly 4.6 million Americans."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
