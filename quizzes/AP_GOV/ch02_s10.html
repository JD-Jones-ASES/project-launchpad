<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP U.S. Government and Politics &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; The Court in Action</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The Supreme Court receives roughly 7,000-8,000 petitions per term but hears only about 70-80 cases. What does this disparity most directly illustrate about the Court's power?", "options": [{"text": "The Court lacks the capacity to issue rulings on any constitutional question.", "isCorrect": false, "rationale": "The Court is fully capable of ruling; it simply exercises discretion over which cases to hear."}, {"text": "The ability to choose which questions to answer is itself a form of agenda-setting power.", "isCorrect": true, "rationale": "The text states explicitly that 'the ability to choose which questions to answer is itself a form of agenda-setting,' central to understanding the Court's power."}, {"text": "Supreme Court justices are required by statute to hear every petition.", "isCorrect": false, "rationale": "No statute requires the Court to hear every petition — that is why certiorari is discretionary."}, {"text": "The Court automatically decides any case involving a state law.", "isCorrect": false, "rationale": "No such automatic rule exists; cases involving state laws still go through the certiorari process."}], "id": "q01"}, {"question": "Under the 'rule of four,' how many justices must agree to grant a writ of certiorari, and why does the text describe this threshold as significant?", "options": [{"text": "A majority of five, because that mirrors the vote needed for a majority opinion.", "isCorrect": false, "rationale": "The rule of four is four votes, not five. Majority-opinion thresholds apply at the merits stage, not the cert stage."}, {"text": "At least four of the nine justices, ensuring that a substantial minority can bring a case to the Court even without majority support.", "isCorrect": true, "rationale": "The text states 'if at least four of the nine justices vote to hear a case, certiorari is granted,' allowing a substantial minority to force consideration of a legal question."}, {"text": "Seven of nine justices.", "isCorrect": false, "rationale": "The threshold is four, not seven."}, {"text": "Three of nine, in line with the three-judge appellate panel structure.", "isCorrect": false, "rationale": "The three-judge panels operate at the Courts of Appeals, not the Supreme Court, and the Supreme Court's rule of four is a separate threshold."}], "id": "q02"}, {"question": "A case presents a legal question on which different federal circuits have reached conflicting conclusions. Why is the Supreme Court especially likely to grant certiorari?", "options": [{"text": "Because circuit splits create divergent legal rules in different regions, and the Court often intervenes to establish a uniform national rule.", "isCorrect": true, "rationale": "The text lists circuit splits as a key factor driving certiorari grants, noting the Court 'often intervenes to establish a uniform national rule.'"}, {"text": "Because the Court is constitutionally required to resolve every dispute between circuits.", "isCorrect": false, "rationale": "There is no constitutional mandate to hear every circuit split; the Court retains discretion, but splits increase the likelihood."}, {"text": "Because circuits automatically dissolve when splits occur.", "isCorrect": false, "rationale": "Circuits do not dissolve; they continue operating. The Supreme Court resolves the legal question."}, {"text": "Because circuit splits require Congress, not the Court, to act.", "isCorrect": false, "rationale": "Circuit splits on statutory or constitutional interpretation can be resolved by the Court — this is a core reason to grant certiorari."}], "id": "q03"}, {"question": "Which of the following is identified in the text as significantly increasing the likelihood that the Court will grant certiorari?", "options": [{"text": "A direct request from the House of Representatives.", "isCorrect": false, "rationale": "The House is not a party to the cert process; the Solicitor General is the government's advocate."}, {"text": "A recommendation from the Solicitor General urging the Court to hear the case.", "isCorrect": true, "rationale": "The text states that when the Solicitor General 'urges the Court to hear a case, the petition is granted at a significantly higher rate.'"}, {"text": "A tweet from the president.", "isCorrect": false, "rationale": "The text does not describe presidential social media as a cert factor; the Solicitor General is the formal government channel."}, {"text": "A two-thirds Senate vote.", "isCorrect": false, "rationale": "The Senate does not vote on certiorari; that is a judicial decision."}], "id": "q04"}, {"question": "Oral arguments at the Supreme Court typically allow 30 minutes per side. Which statement best describes what actually happens during them?", "options": [{"text": "Attorneys deliver uninterrupted speeches without justices speaking.", "isCorrect": false, "rationale": "The text says justices 'interrupt frequently with questions, hypotheticals, and challenges' — making oral arguments 'intense dialogues,' not speeches."}, {"text": "Intense dialogues in which justices test each side's position through questions, hypotheticals, and challenges.", "isCorrect": true, "rationale": "The text states oral arguments 'are not presentations; they are intense dialogues' with frequent interruptions designed to probe positions."}, {"text": "Silent reflection by all parties for 30 minutes.", "isCorrect": false, "rationale": "Oral arguments are verbal and dialogic, not silent."}, {"text": "A jury verdict rendered at the end.", "isCorrect": false, "rationale": "The Supreme Court does not use juries; decisions are made by the justices themselves."}], "id": "q05"}, {"question": "After oral arguments, the justices meet in a private conference. If the Chief Justice is in the majority, who assigns the writing of the majority opinion?", "options": [{"text": "The most junior justice in the majority.", "isCorrect": false, "rationale": "That is incorrect; seniority governs assignment, not junior status."}, {"text": "The Chief Justice.", "isCorrect": true, "rationale": "The text states: 'If the Chief Justice is in the majority, the Chief Justice assigns the writing of the majority opinion.'"}, {"text": "The Attorney General.", "isCorrect": false, "rationale": "The Attorney General is a member of the executive branch, not a part of the Court's opinion-writing process."}, {"text": "The President of the United States.", "isCorrect": false, "rationale": "The President has no role in assigning Supreme Court opinions."}], "id": "q06"}, {"question": "A justice agrees with the majority's result but writes separately to provide different legal reasoning. What type of opinion has the justice written?", "options": [{"text": "A dissenting opinion.", "isCorrect": false, "rationale": "A dissent is written by a justice who disagrees with the majority's result — not one who agrees with it."}, {"text": "A concurring opinion.", "isCorrect": true, "rationale": "The text defines a concurring opinion as 'written by a justice who agrees with the majority's result but wishes to express different or additional reasoning.'"}, {"text": "A plurality opinion.", "isCorrect": false, "rationale": "A plurality is the largest group when no majority coalesces around a single rationale — not a justice writing separately to agree."}, {"text": "An advisory opinion.", "isCorrect": false, "rationale": "Federal courts do not issue advisory opinions; they decide actual cases and controversies."}], "id": "q07"}, {"question": "According to the text, why do DISSENTING opinions, which have no binding legal force, still serve important functions?", "options": [{"text": "They articulate alternative legal reasoning, highlight perceived errors in the majority, and sometimes lay the groundwork for future reconsideration.", "isCorrect": true, "rationale": "The text identifies each of these purposes, noting Justice Ginsburg's dissents were 'often directed at Congress or future litigants' to prompt later action."}, {"text": "They are binding on lower courts immediately.", "isCorrect": false, "rationale": "Dissents 'have no legal force' — they are not binding."}, {"text": "They automatically overturn the majority opinion after ten years.", "isCorrect": false, "rationale": "No automatic-overturn mechanism exists; precedent changes only through new decisions."}, {"text": "They determine which lower courts receive cases.", "isCorrect": false, "rationale": "Docket assignment does not flow from dissents."}], "id": "q08"}, {"question": "A litigant argues that a previous Supreme Court ruling should be abandoned. Which principle does she need to overcome, and under what conditions has the Court historically done so?", "options": [{"text": "Stare decisis — 'let the decision stand' — which the Court has departed from when a prior decision was egregiously wrong or when changed circumstances warrant reconsideration (e.g., Brown overruling Plessy).", "isCorrect": true, "rationale": "The text defines stare decisis and notes the Court has overruled its own precedents when the prior decision was 'egregiously wrong or that changed circumstances warrant a new approach,' citing Brown v. Board overruling Plessy v. Ferguson."}, {"text": "Executive privilege, which automatically protects prior rulings.", "isCorrect": false, "rationale": "Executive privilege is a presidential doctrine, not a judicial principle protecting precedent."}, {"text": "The political-question doctrine, which forbids any overruling of precedent.", "isCorrect": false, "rationale": "The political-question doctrine concerns whether courts can hear certain cases, not overruling precedent."}, {"text": "Stare decisis, but the Court never overturns its own rulings.", "isCorrect": false, "rationale": "The Court DOES overturn precedent in rare circumstances — Brown v. Board is a famous example cited in the text."}], "id": "q09"}, {"question": "A Supreme Court decision strikes down a state law. The state's officials resist implementing the ruling. Based on the text's analysis, what is the key implication?", "options": [{"text": "Supreme Court decisions enforce themselves and require no cooperation from officials.", "isCorrect": false, "rationale": "The text states 'A Supreme Court decision is not self-executing. Its real-world impact depends on how effectively it is implemented.'"}, {"text": "A ruling's impact depends on implementation by lower courts, officials, and the public; examples like Brown II ('all deliberate speed') show how resistance can delay effective change.", "isCorrect": true, "rationale": "The text uses Brown II to illustrate that even landmark rulings can be delayed when implementation is resisted — 'with all deliberate speed' language permitted years of Southern delay."}, {"text": "The Court can unilaterally deploy troops to enforce its rulings.", "isCorrect": false, "rationale": "Enforcement relies on the executive branch; the Court itself cannot deploy troops."}, {"text": "Decisions have no political or public-opinion effects.", "isCorrect": false, "rationale": "The text notes Court decisions 'influence policy through their effects on political debate and public opinion,' even when direct compliance is contested."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
