<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP U.S. Government and Politics &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Government Power and Individual Rights</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Thomas Hobbes described the pre-political 'state of nature' as a condition in which life would be 'solitary, poor, nasty, brutish, and short.' According to the text, which purpose of government does this description most directly support?", "options": [{"text": "Promoting the general welfare through education and infrastructure", "isCorrect": false, "rationale": "Promoting general welfare is a distinct purpose discussed separately; Hobbes's claim addresses the baseline need for order."}, {"text": "Maintaining order and stability as a prerequisite for all other freedoms", "isCorrect": true, "rationale": "The text connects Hobbes's state-of-nature description directly to the purpose of 'maintaining order,' noting order is 'a prerequisite for all other freedoms.'"}, {"text": "Limiting the scope of governmental authority over daily life", "isCorrect": false, "rationale": "Hobbes's argument justifies robust government to escape chaos, not limitation of government for its own sake."}, {"text": "Guaranteeing equal outcomes across social classes", "isCorrect": false, "rationale": "Hobbes's argument is about security from chaos, not economic equality."}]}, {"question": "The text identifies three fundamental purposes of government: maintaining order, protecting individual rights, and promoting the general welfare. Which of the following accurately describes how these purposes sometimes conflict?", "options": [{"text": "They never conflict, because they were carefully aligned in the Constitution.", "isCorrect": false, "rationale": "The text explicitly identifies 'tensions' among these ideals, including liberty vs. order and individual rights vs. collective security."}, {"text": "Individual liberty is absolute and overrides order and welfare concerns.", "isCorrect": false, "rationale": "The text states directly: 'liberty is not absolute.'"}, {"text": "The state must navigate genuine tensions between liberty and order, rights and security, and liberty and equality.", "isCorrect": true, "rationale": "The text devotes a full section to 'Democratic Ideals in Tension,' naming each of these pairings."}, {"text": "Promoting the general welfare is the only legitimate purpose, so rights and order must yield to it.", "isCorrect": false, "rationale": "The text treats the three purposes as coexisting, not as hierarchical with welfare on top."}]}, {"question": "James Madison warned in Federalist No. 10 about the 'tyranny of the majority.' Based on the text, what did Madison propose as the most effective structural remedy?", "options": [{"text": "A powerful king who could overrule elected majorities", "isCorrect": false, "rationale": "Madison rejected monarchy; the Founders sought republican remedies, not monarchical ones."}, {"text": "Direct democracy, so passionate majorities would govern themselves", "isCorrect": false, "rationale": "Madison opposed direct democracy precisely because he feared passionate majorities."}, {"text": "A large republic with many diverse interests, making it difficult for any single faction to form a permanent majority", "isCorrect": true, "rationale": "The text states: 'The solution, Madison argued, was a large republic with many diverse interests, making it difficult for any single faction to form a permanent majority.'"}, {"text": "Unlimited judicial review of all majority preferences", "isCorrect": false, "rationale": "Judicial review is one mechanism, but the text names Madison's specific proposal as the large republic — not unlimited judicial power."}]}, {"question": "Suppose 80 percent of voters support a law banning a particular religious practice. Multiple courts strike the law down, citing the First Amendment. Which constitutional mechanism for protecting minority rights is operating in this scenario?", "options": [{"text": "Federalism, which divides power between national and state governments", "isCorrect": false, "rationale": "Federalism addresses the vertical division of power, not judicial protection of religious rights against majoritarian laws."}, {"text": "Supermajority requirements for constitutional amendments", "isCorrect": false, "rationale": "The scenario involves a court striking down a law, not a failed amendment."}, {"text": "Judicial review, striking down laws that violate constitutional protections despite majority support", "isCorrect": true, "rationale": "The text defines judicial review as the power to 'strike down laws that violate constitutional protections, even when those laws have majority support.'"}, {"text": "Recall of the justices who issued the ruling", "isCorrect": false, "rationale": "Recall is a state-level mechanism to remove officials; it is not operating in the scenario and would not protect minority rights."}]}, {"question": "In Brutus No. 1 (1787), the Anti-Federalist author argued that a large republic could not adequately represent diverse local interests and would grow distant from the people. According to the text, how does this argument most directly challenge the Federalist position?", "options": [{"text": "Brutus rejected republican government entirely in favor of direct democracy.", "isCorrect": false, "rationale": "Brutus did not reject republicanism; he argued a vast republic would fail at genuine representation."}, {"text": "Brutus claimed a large republic would concentrate power far from the people, undermining representation and local responsiveness.", "isCorrect": true, "rationale": "The text summarizes Brutus's concern that 'a large republic would inevitably lead to a distant, unresponsive government that could not adequately represent the diverse interests of its citizens.'"}, {"text": "Brutus argued only the Supreme Court could legitimate a republic.", "isCorrect": false, "rationale": "The text does not attribute a role for the Court in Brutus's argument; his concern was size and distance."}, {"text": "Brutus wanted the Constitution ratified without amendments.", "isCorrect": false, "rationale": "As an Anti-Federalist, Brutus opposed ratification; he did not urge uncomplicated ratification."}]}, {"question": "After the September 11 attacks, the USA PATRIOT Act expanded federal surveillance powers. The text uses this example to illustrate which specific democratic tension?", "options": [{"text": "Equality vs. liberty", "isCorrect": false, "rationale": "Equality vs. liberty concerns anti-discrimination and affirmative action policies, not surveillance and national security."}, {"text": "Individual rights vs. collective security", "isCorrect": true, "rationale": "The text discusses the PATRIOT Act under the heading 'Individual rights vs. collective security,' noting civil liberties advocates 'argued [it] violated privacy rights' while others prioritized security."}, {"text": "Federalism vs. judicial review", "isCorrect": false, "rationale": "The PATRIOT Act example in the text is about civil liberties and security, not the federal-state or court-legislature axis."}, {"text": "Popular sovereignty vs. the social contract", "isCorrect": false, "rationale": "These are foundational ideals, not the policy tension the text uses the PATRIOT Act to exemplify."}]}, {"question": "In McCulloch v. Maryland (1819), Maryland sued the cashier of the federally chartered Second Bank of the United States for refusing to pay a state tax. Which constitutional issue was central to Chief Justice Marshall's ruling that Congress could establish the Bank?", "options": [{"text": "The Tenth Amendment's reservation of non-delegated powers to the states", "isCorrect": false, "rationale": "Maryland invoked the Tenth Amendment, but Marshall's ruling was grounded in the Necessary and Proper Clause, not in strengthening the Tenth."}, {"text": "The Necessary and Proper Clause as a source of implied congressional powers", "isCorrect": true, "rationale": "The text states Marshall 'held that Congress had the authority to create the Bank under the necessary and proper clause' and established 'the doctrine of implied powers.'"}, {"text": "The Supremacy Clause granting Maryland equal authority with Congress", "isCorrect": false, "rationale": "The Supremacy Clause subordinates state law to valid federal law — it does not grant Maryland equal authority, and it was invoked to strike Maryland's tax, not to justify the Bank."}, {"text": "The First Amendment's protection of speech and association", "isCorrect": false, "rationale": "The First Amendment is unrelated to Congress's power to charter a national bank."}]}, {"question": "In McCulloch v. Maryland, Chief Justice Marshall interpreted the word 'necessary' in the Necessary and Proper Clause to mean which of the following?", "options": [{"text": "Strictly indispensable, with no reasonable alternative available", "isCorrect": false, "rationale": "The text states Marshall 'interpreted necessary broadly to mean useful or conducive to, not strictly indispensable.'"}, {"text": "Useful or conducive to carrying out an enumerated power", "isCorrect": true, "rationale": "The text says Marshall interpreted 'necessary' as 'useful' or 'conducive to,' expanding congressional flexibility."}, {"text": "Whatever the president declares to be necessary at the time", "isCorrect": false, "rationale": "The clause's meaning is about congressional authority, not presidential declaration."}, {"text": "Necessary only in time of declared war", "isCorrect": false, "rationale": "The text does not limit 'necessary' to wartime; the Bank was a peacetime institution."}]}, {"question": "The text states that McCulloch v. Maryland 'laid the groundwork for the growth of the national government over the next two centuries.' Which reasoning best supports this conclusion?", "options": [{"text": "Because the decision limited federal authority to powers explicitly listed in Article I, Section 8", "isCorrect": false, "rationale": "The opposite is true — McCulloch expanded federal authority beyond the explicitly listed powers through the doctrine of implied powers."}, {"text": "Because the decision gave Congress broad authority to choose means for carrying out its enumerated powers, and blocked states from interfering with legitimate federal operations", "isCorrect": true, "rationale": "The text identifies exactly these as the decision's enduring contributions: implied powers, broad congressional means, and immunity of federal operations from state interference."}, {"text": "Because the decision abolished the Tenth Amendment", "isCorrect": false, "rationale": "McCulloch did not abolish any amendment; it interpreted the Necessary and Proper Clause broadly while leaving the Tenth Amendment intact."}, {"text": "Because the decision transferred all state powers to Congress", "isCorrect": false, "rationale": "The text says McCulloch expanded the 'potential scope' of federal power, not that it stripped states of their reserved powers."}]}, {"question": "A state passes an anti-discrimination law requiring businesses to serve customers regardless of race. A business owner argues the law restricts her liberty to choose her customers. Which democratic ideal-tension does this scenario most directly illustrate, as described in the text?", "options": [{"text": "Liberty vs. order, because crime must be prevented", "isCorrect": false, "rationale": "The text's 'liberty vs. order' example concerns behavior like fraud and reckless driving, not anti-discrimination laws."}, {"text": "Individual rights vs. collective security, because national defense is at stake", "isCorrect": false, "rationale": "This tension concerns surveillance and security threats, not anti-discrimination laws."}, {"text": "Equality vs. liberty, because anti-discrimination laws restrict a business owner's freedom to choose customers.", "isCorrect": true, "rationale": "The text uses precisely this example under 'Equality vs. liberty,' noting that 'Anti-discrimination laws restrict a business owner's freedom to refuse service based on race, gender, or religion.'"}, {"text": "Federalism vs. judicial review, because states cannot make such laws", "isCorrect": false, "rationale": "Both federal and state anti-discrimination laws exist; the tension at issue is equality and liberty, not federalism."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
