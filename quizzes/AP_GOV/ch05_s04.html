<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP U.S. Government and Politics &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; How and Why Political Parties Change and Adapt</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Using the Party Identification Trends table, which of the following statements is best supported by the data from 1972 to 2024?", "options": [{"text": "Republican identification has grown steadily from 28% in 1972 to 45% in 2024.", "isCorrect": false, "rationale": "The table shows Republican identification fluctuated in a narrow band and fell slightly to 25% by 2024, not rising to 45%."}, {"text": "Independent identification has grown substantially, from 29% in 1972 to 47% in 2024.", "isCorrect": true, "rationale": "The table shows independents rising from 29% in 1972 to 47% in 2024, a clear and sustained upward trend."}, {"text": "Democratic identification remained essentially stable over the period.", "isCorrect": false, "rationale": "Democratic identification fell from 43% in 1972 to 28% in 2024, a 15-point decline, which is not stability."}, {"text": "By 2024, Democrats and Republicans together accounted for more than 70% of Americans.", "isCorrect": false, "rationale": "By 2024, Democrats (28%) plus Republicans (25%) equaled only 53%, well under 70%."}]}, {"question": "Which of the following best describes a 'critical election' or 'realigning election' as defined in the text?", "options": [{"text": "An election decided by the Supreme Court due to contested results.", "isCorrect": false, "rationale": "A Supreme Court-decided election (like 2000) is not what the text means by critical or realigning."}, {"text": "An election in which voter loyalties shift dramatically and a new dominant coalition emerges.", "isCorrect": true, "rationale": "The text defines critical elections as those in which voter loyalties shift dramatically and a new dominant coalition emerges, separating distinct party eras."}, {"text": "An election in which turnout exceeds 70%.", "isCorrect": false, "rationale": "Turnout levels do not define critical elections; realignment depends on shifts in party coalitions."}, {"text": "An election in which the incumbent president is defeated.", "isCorrect": false, "rationale": "Incumbent defeat alone does not constitute a realignment; many incumbent losses do not produce new coalitions."}]}, {"question": "Which of the following best describes the New Deal coalition assembled under Franklin D. Roosevelt?", "options": [{"text": "A coalition of Northern abolitionists, industrialists, and Whigs.", "isCorrect": false, "rationale": "That describes the early Republican coalition during the Civil War realignment, not the New Deal coalition."}, {"text": "An alliance of Southern whites, African Americans, labor unions, urban ethnic voters, intellectuals, and the poor.", "isCorrect": true, "rationale": "The text describes the New Deal coalition as this 'unlikely alliance' of Southern whites, African Americans, labor unions, urban ethnic voters, intellectuals, and the poor."}, {"text": "A coalition of white Southern voters and Western libertarians who opposed federal power.", "isCorrect": false, "rationale": "The New Deal coalition supported an active federal government and a social safety net; it was not built on opposition to federal power."}, {"text": "A coalition built entirely on the support of independent voters who rejected both parties.", "isCorrect": false, "rationale": "Independents were not the New Deal coalition; it was explicitly a Democratic Party coalition."}]}, {"question": "According to the text, which event most directly fractured the New Deal coalition and began shifting white Southern voters toward the Republican Party?", "options": [{"text": "The New Deal's agricultural programs in the 1930s", "isCorrect": false, "rationale": "New Deal programs helped build the coalition, not fracture it."}, {"text": "The Democratic Party's embrace of the Civil Rights Act of 1964 and the Voting Rights Act of 1965", "isCorrect": true, "rationale": "The text says Democratic support for the Civil Rights Act and the VRA fractured the New Deal coalition and led white Southern voters to migrate to the Republican Party."}, {"text": "The end of the Cold War", "isCorrect": false, "rationale": "The text does not identify the end of the Cold War as a realignment driver."}, {"text": "The ratification of the Nineteenth Amendment", "isCorrect": false, "rationale": "The Nineteenth Amendment predates the New Deal coalition and is not identified as the fracture point."}]}, {"question": "Which of the following best distinguishes 'realignment' from 'dealignment'?", "options": [{"text": "Realignment involves voters moving to a new dominant coalition, while dealignment involves voters moving away from both parties without forming a strong new attachment.", "isCorrect": true, "rationale": "The text distinguishes realignment (clean shift to a new dominant coalition) from dealignment (movement away from both major parties without strong attachment to a new one)."}, {"text": "Realignment refers to redistricting, while dealignment refers to party registration.", "isCorrect": false, "rationale": "Neither concept refers to redistricting; both concern partisan loyalty at the voter level."}, {"text": "Realignment occurs only in midterm elections, while dealignment occurs only in presidential elections.", "isCorrect": false, "rationale": "The text makes no such timing claim; realignment and dealignment are long-term trends not tied to one election type."}, {"text": "Realignment applies to presidential politics, while dealignment applies only to congressional politics.", "isCorrect": false, "rationale": "Both phenomena apply across elections; the text does not limit them to one branch."}]}, {"question": "The table shows independent identification rising while both Democratic and Republican identification decline. According to the text, which of the following is NOT presented as a cause of dealignment?", "options": [{"text": "Declining trust in institutions", "isCorrect": false, "rationale": "The text lists declining trust in institutions as a driver of dealignment."}, {"text": "Increased educational attainment correlating with issue-based voting", "isCorrect": false, "rationale": "The text explicitly identifies this as a driver of dealignment."}, {"text": "Generational shifts, with younger voters resisting fixed partisan labels", "isCorrect": false, "rationale": "The text lists generational resistance to partisan labels as a cause of dealignment."}, {"text": "Mandatory voter registration laws passed in the 1970s", "isCorrect": true, "rationale": "The text does not mention mandatory registration laws as a cause of dealignment, and no such federal law exists."}]}, {"question": "A student claims, 'Since 47% of Americans identify as independent in 2024, the median American voter is now politically moderate.' Which of the following statements from the text most directly complicates this claim?", "options": [{"text": "Party identification is the single strongest predictor of vote choice.", "isCorrect": false, "rationale": "That claim comes from an earlier topic on voting models. It does not directly bear on whether independents are moderate."}, {"text": "Many 'independents' lean toward one party and vote nearly as reliably as partisans.", "isCorrect": true, "rationale": "The text explicitly notes that many independents lean toward one party and vote nearly as reliably as partisans, which undermines the inference that independents are ideologically moderate."}, {"text": "Critical elections occur during periods of deep social crisis.", "isCorrect": false, "rationale": "That concerns realignment timing, not the moderation of independents."}, {"text": "The New Deal coalition assembled an unlikely alliance of many groups.", "isCorrect": false, "rationale": "That concerns the 1930s coalition, not modern independents."}]}, {"question": "Which of the following best describes the 'Solid South' as referenced in the text?", "options": [{"text": "The Republican South after 1860.", "isCorrect": false, "rationale": "After the Civil War realignment, the South was reliably Democratic, not Republican."}, {"text": "The South's reliable Democratic voting pattern from Reconstruction through the mid-twentieth century.", "isCorrect": true, "rationale": "The text states that the 'Solid South' refers to the post-Reconstruction through mid-twentieth-century period when the South voted reliably Democratic."}, {"text": "A Supreme Court ruling on Southern voting rights.", "isCorrect": false, "rationale": "The 'Solid South' is a political-behavior term, not a court ruling."}, {"text": "The coalition of Southern states that ratified the Twenty-Sixth Amendment.", "isCorrect": false, "rationale": "The Twenty-Sixth Amendment concerns voting age, not Southern partisan alignment."}]}, {"question": "Using the Party Identification Trends table, which of the following represents the most accurate calculation of the change in Democratic identification between 1984 and 2024?", "options": [{"text": "A 15-point increase (from 37% to 52%)", "isCorrect": false, "rationale": "The table shows Democratic identification at 37% in 1984 and 28% in 2024, not 52%."}, {"text": "A 9-point decline (from 37% to 28%)", "isCorrect": true, "rationale": "The table shows 37% Democrat in 1984 and 28% in 2024, for a 9-point decline."}, {"text": "No change, with both values at 37%", "isCorrect": false, "rationale": "The 1984 value is 37% and the 2024 value is 28%, so there is a clear decline."}, {"text": "A 3-point increase (from 37% to 40%)", "isCorrect": false, "rationale": "Democratic identification fell to 28% in 2024, not 40%."}]}, {"question": "Which of the following best summarizes the 'Southern Strategy' as referenced in the text?", "options": [{"text": "An economic plan to industrialize the Southern states after World War II.", "isCorrect": false, "rationale": "The text describes the Southern Strategy as a political alignment strategy, not an industrial policy."}, {"text": "Republican strategists' appeal to white racial anxieties to accelerate a partisan shift in the South.", "isCorrect": true, "rationale": "The text states that Republican strategists used the Southern Strategy to appeal to white racial anxieties and accelerate the migration of white Southern voters to the GOP."}, {"text": "A Supreme Court doctrine applied to Southern redistricting cases.", "isCorrect": false, "rationale": "The Southern Strategy is a political campaign strategy, not a judicial doctrine."}, {"text": "A Democratic Party plan to retain the Solid South during the 1980s.", "isCorrect": false, "rationale": "The Southern Strategy was a Republican strategy and accelerated Democratic losses in the South, not Democratic retention."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
