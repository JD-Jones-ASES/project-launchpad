        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Selective Incorporation</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What constitutional test does the Supreme Court apply to determine whether a specific Bill of Rights provision should be incorporated against the states?", "options": [{"text": "Whether a majority of state legislatures have ratified the provision.", "isCorrect": false, "rationale": "Ratification is the constitutional amendment process, not the incorporation test."}, {"text": "Whether the right is fundamental to the American scheme of ordered liberty.", "isCorrect": true, "rationale": "The text states the test asks 'whether a specific right is fundamental to the American scheme of ordered liberty.' Rights so deemed are incorporated via the Fourteenth Amendment."}, {"text": "Whether the right was explicitly listed in Barron v. Baltimore.", "isCorrect": false, "rationale": "Barron v. Baltimore (1833) held the Bill of Rights did NOT apply to states. It is the doctrine overcome by incorporation, not the test for it."}, {"text": "Whether a right has been invoked in at least fifty federal cases.", "isCorrect": false, "rationale": "There is no numerical threshold; the test is qualitative—whether the right is 'fundamental.'"}], "id": "q01"}, {"question": "According to the section, the word 'liberty' in which constitutional provision proved critical to the selective incorporation doctrine?", "options": [{"text": "Article I's Necessary and Proper Clause.", "isCorrect": false, "rationale": "The Necessary and Proper Clause expands Congress's legislative authority, not individual rights."}, {"text": "The Fourteenth Amendment's Due Process Clause.", "isCorrect": true, "rationale": "The text states: 'The word \"liberty\" in the Due Process Clause proved to be the key. Beginning in the early twentieth century, the Supreme Court interpreted \"liberty\" to encompass specific protections enumerated in the Bill of Rights.'"}, {"text": "The Fifth Amendment's Takings Clause.", "isCorrect": false, "rationale": "The Takings Clause restricts federal eminent domain; it did not drive the doctrine of selective incorporation."}, {"text": "The Tenth Amendment's reservation of powers.", "isCorrect": false, "rationale": "The Tenth Amendment reserves powers to states or the people; it is not the vehicle for incorporating rights against state action."}], "id": "q02"}, {"question": "A state prosecutes a defendant using information (a prosecutor's charge) rather than a grand jury indictment. The defendant argues this violates the Fifth Amendment. Based on the section's list of unincorporated provisions, how is the court most likely to rule?", "options": [{"text": "The state violated the Fifth Amendment because its grand jury requirement is incorporated.", "isCorrect": false, "rationale": "The text lists the Fifth Amendment grand jury requirement as NOT incorporated. States may use alternative procedures."}, {"text": "The state did not violate the federal Constitution, because the Fifth Amendment's grand jury requirement has not been incorporated and states may use alternative procedures such as prosecutorial information.", "isCorrect": true, "rationale": "The text states: 'The right to a grand jury indictment in criminal cases has not been incorporated. States may use alternative procedures such as prosecutorial information.'"}, {"text": "The state violated the Fourteenth Amendment's Equal Protection Clause.", "isCorrect": false, "rationale": "This is not an equal protection issue; the question concerns whether the federal grand jury right applies to state prosecutions."}, {"text": "Only federal courts can decide this question, so the state court lacks jurisdiction.", "isCorrect": false, "rationale": "State courts have jurisdiction over state criminal prosecutions and apply federal constitutional law to them."}], "id": "q03"}, {"question": "Which case from the section's incorporation table marks the incorporation of the FIRST Amendment free exercise of religion against the states?", "options": [{"text": "Everson v. Board of Education (1947).", "isCorrect": false, "rationale": "Everson incorporated the Establishment Clause, not the Free Exercise Clause."}, {"text": "Cantwell v. Connecticut (1940).", "isCorrect": true, "rationale": "The table lists Cantwell v. Connecticut (1940) as incorporating the 1st Amendment's 'free exercise of religion.'"}, {"text": "Gitlow v. New York (1925).", "isCorrect": false, "rationale": "Gitlow incorporated the freedom of speech, not free exercise of religion."}, {"text": "DeJonge v. Oregon (1937).", "isCorrect": false, "rationale": "DeJonge incorporated the freedom of assembly, not free exercise of religion."}], "id": "q04"}, {"question": "The section discusses Timbs v. Indiana (2019) in its table. What Bill of Rights provision did Timbs incorporate, and what does its late date illustrate?", "options": [{"text": "The Seventh Amendment's civil jury trial guarantee, showing that new amendments have been added to the Bill of Rights in the twenty-first century.", "isCorrect": false, "rationale": "Timbs incorporated the Eighth Amendment's excessive fines clause, not the Seventh Amendment, and no new Bill of Rights amendments were added."}, {"text": "The Eighth Amendment's prohibition on excessive fines, showing that incorporation is an ongoing process rather than a completed event.", "isCorrect": true, "rationale": "The table identifies Timbs as incorporating the 8th Amendment's excessive fines clause. The late date, decades after most incorporation cases, illustrates that selective incorporation remains ongoing."}, {"text": "The Third Amendment's quartering prohibition, showing that the Supreme Court has now incorporated every Bill of Rights provision.", "isCorrect": false, "rationale": "Timbs did not address the Third Amendment, which the text explicitly says 'has never been directly incorporated' by the Supreme Court."}, {"text": "The Fourth Amendment's warrant requirement, showing that the amendment needed to be re-incorporated in the digital age.", "isCorrect": false, "rationale": "Timbs concerned the Eighth Amendment's excessive fines clause, not the Fourth Amendment. The Fourth was incorporated in earlier cases like Mapp v. Ohio (1961)."}], "id": "q05"}, {"question": "Why was the Fourteenth Amendment (1868), rather than the original Bill of Rights, so important to the doctrine of selective incorporation?", "options": [{"text": "Because it was ratified in the aftermath of the Civil War specifically to protect the rights of newly freed slaves, and its Due Process Clause became the constitutional vehicle for applying rights against state action.", "isCorrect": true, "rationale": "The text states the Fourteenth Amendment 'was ratified in the aftermath of the Civil War to protect the rights of newly freed slaves. Its Due Process Clause... became the constitutional vehicle for incorporation.'"}, {"text": "Because it listed new individual rights not found in the original Bill of Rights.", "isCorrect": false, "rationale": "The Fourteenth Amendment did not enumerate the same set of rights; it provided the vehicle for applying existing Bill of Rights protections to the states."}, {"text": "Because Congress was unable to pass the original Bill of Rights without it.", "isCorrect": false, "rationale": "The Bill of Rights was ratified in 1791, more than 75 years before the Fourteenth Amendment, so this is historically incorrect."}, {"text": "Because it repealed Barron v. Baltimore by its text alone.", "isCorrect": false, "rationale": "The Fourteenth Amendment did not mention Barron; it was later Supreme Court interpretation of the Due Process Clause that effectively overcame Barron."}], "id": "q06"}, {"question": "A student claims: 'Every right in the Bill of Rights now applies to the states.' Based on the section, which response is most accurate?", "options": [{"text": "Correct; all ten amendments were fully incorporated by 2019.", "isCorrect": false, "rationale": "The section explicitly says the Third Amendment has never been directly incorporated, the Fifth Amendment grand jury right has not been incorporated, and the Seventh Amendment's civil jury trial guarantee has not been incorporated."}, {"text": "Incorrect; the Third Amendment, the Fifth Amendment grand jury requirement, and the Seventh Amendment civil jury right have not been fully incorporated.", "isCorrect": true, "rationale": "The text lists these three provisions as remaining unincorporated or partially incorporated."}, {"text": "Correct; the original Bill of Rights always applied to the states.", "isCorrect": false, "rationale": "Barron v. Baltimore (1833) held the Bill of Rights did NOT apply to states until incorporation began via the Fourteenth Amendment."}, {"text": "Incorrect; only the First Amendment has been incorporated.", "isCorrect": false, "rationale": "The table lists many other incorporated rights, including the Second, Fourth, Fifth (most provisions), Sixth, and Eighth Amendments."}], "id": "q07"}, {"question": "Miranda v. Arizona (1966) and Malloy v. Hogan (1964) both concern the Fifth Amendment, but for different aspects. Which pair correctly matches each case with the right it addresses?", "options": [{"text": "Malloy incorporated self-incrimination; Miranda required police to inform suspects of their rights.", "isCorrect": true, "rationale": "The section's table lists Malloy v. Hogan (1964) as incorporating 5th Amendment self-incrimination, and Miranda v. Arizona (1966) as establishing Miranda warnings."}, {"text": "Malloy required Miranda warnings; Miranda incorporated self-incrimination.", "isCorrect": false, "rationale": "The order is reversed. Malloy incorporated self-incrimination; Miranda created the warnings requirement."}, {"text": "Both cases addressed the right to counsel under the Sixth Amendment.", "isCorrect": false, "rationale": "Both cases concerned the Fifth Amendment (self-incrimination and related warnings), not the Sixth Amendment right to counsel (Gideon v. Wainwright, 1963)."}, {"text": "Both cases addressed double jeopardy under the Fifth Amendment.", "isCorrect": false, "rationale": "Double jeopardy was incorporated in Benton v. Maryland (1969), not Malloy or Miranda."}], "id": "q08"}, {"question": "According to the section, what is the significance of a right remaining UNINCORPORATED, such as the Seventh Amendment's civil jury trial right?", "options": [{"text": "It means the right is unimportant or has been repealed.", "isCorrect": false, "rationale": "The text explicitly says 'The fact that these provisions remain unincorporated does not mean they are unimportant.'"}, {"text": "It means the Supreme Court has not yet found a case requiring it to rule on whether the right is 'fundamental' enough to apply to the states.", "isCorrect": true, "rationale": "The text states: 'It means the Supreme Court has not yet found a case requiring it to rule on whether these specific rights are \"fundamental\" enough to apply to the states through the Fourteenth Amendment.'"}, {"text": "It means the right has been abolished by constitutional amendment.", "isCorrect": false, "rationale": "The Seventh Amendment has not been repealed; it remains in the federal Constitution."}, {"text": "It means the right applies to both state and federal governments by default.", "isCorrect": false, "rationale": "A right that is unincorporated does NOT apply by default to the states—that is precisely what unincorporated means."}], "id": "q09"}, {"question": "A resident of a state files a federal lawsuit claiming her Third Amendment rights were violated when state National Guard members were quartered in her home without consent. According to the section, the Supreme Court has:", "options": [{"text": "Directly incorporated the Third Amendment, so the state action is plainly unconstitutional.", "isCorrect": false, "rationale": "The text states the Third Amendment has 'never been directly incorporated' by the Supreme Court."}, {"text": "Not addressed the question of Third Amendment incorporation, though the Second Circuit applied it to state action in Engblom v. Carey (1982).", "isCorrect": true, "rationale": "The text states: 'The prohibition against quartering soldiers has never been directly incorporated, though the Second Circuit applied it to state action in Engblom v. Carey (1982). The Supreme Court has not addressed the question.'"}, {"text": "Repealed the Third Amendment in Engblom v. Carey.", "isCorrect": false, "rationale": "Engblom was a Second Circuit decision, not a Supreme Court one, and no court has 'repealed' the Third Amendment."}, {"text": "Held that the Third Amendment's quartering prohibition does not apply to the National Guard.", "isCorrect": false, "rationale": "The Supreme Court has not addressed this question according to the text; the Second Circuit's Engblom decision went the opposite direction, applying the Third to state action."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
