<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP U.S. Government and Politics &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Groups Influencing Policy Outcomes</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following accurately describes the key legal distinction between a Super PAC and a traditional PAC?", "options": [{"text": "Super PACs may donate unlimited amounts directly to candidates, while PACs have contribution limits.", "isCorrect": false, "rationale": "Super PACs may not coordinate with or donate directly to candidates; their defining feature is unlimited independent expenditures, not direct donations."}, {"text": "Super PACs may raise and spend unlimited amounts on independent expenditures but may not coordinate with candidates, while PACs may donate directly to candidates under strict contribution limits.", "isCorrect": true, "rationale": "The text describes this exact contrast: PACs donate directly with strict limits (e.g., $5,000 per candidate per election), while Super PACs may spend unlimited amounts on independent expenditures but cannot coordinate with campaigns."}, {"text": "PACs must disclose donors, while Super PACs are exempt from all disclosure.", "isCorrect": false, "rationale": "Super PACs are subject to full donor disclosure. The text attributes 'dark money' non-disclosure to 501(c)(4) organizations, not Super PACs."}, {"text": "PACs may only support federal candidates, while Super PACs may only support state candidates.", "isCorrect": false, "rationale": "No such distinction exists; both operate in federal elections."}], "id": "q01"}, {"question": "According to the text, which of the following is most accurately labeled a 'dark money' organization?", "options": [{"text": "A traditional political action committee (PAC)", "isCorrect": false, "rationale": "PACs are required to disclose donors and operate under contribution limits."}, {"text": "A 527 organization", "isCorrect": false, "rationale": "527 organizations can raise unlimited funds but are still required to disclose their donors."}, {"text": "A 501(c)(4) social welfare organization", "isCorrect": true, "rationale": "The text identifies 501(c)(4)s as 'dark money' groups because they may engage in political activity without disclosing donors, so long as politics is not their 'primary purpose.'"}, {"text": "A Super PAC", "isCorrect": false, "rationale": "Super PACs must disclose their donors; they are not the organizations most associated with dark money."}], "id": "q02"}, {"question": "In Citizens United v. FEC (2010), the Supreme Court held (5–4) that which of the following was unconstitutional?", "options": [{"text": "The $5,000 per-candidate PAC contribution limit.", "isCorrect": false, "rationale": "The case did not strike down PAC contribution limits; it addressed restrictions on corporate and union independent expenditures."}, {"text": "The Bipartisan Campaign Reform Act's restrictions on corporate and union independent expenditures for electioneering communications.", "isCorrect": true, "rationale": "The text states the Court struck down BCRA's restrictions on corporate and union independent expenditures as unconstitutional under the First Amendment."}, {"text": "The requirement that PACs disclose donors.", "isCorrect": false, "rationale": "PAC disclosure was not at issue in Citizens United; the text notes full disclosure for PACs remains."}, {"text": "All state-level limits on individual contributions to candidates.", "isCorrect": false, "rationale": "Citizens United addressed federal corporate and union independent expenditures, not state-level individual contribution limits."}], "id": "q03"}, {"question": "The text reports that total outside spending in federal elections rose from $338 million in 2008 to over $1 billion in 2012. Which of the following events most directly contributed to this jump?", "options": [{"text": "The passage of the Federal Election Campaign Act in 1971.", "isCorrect": false, "rationale": "FECA predates the spending surge by decades and established contribution limits, not unlimited spending."}, {"text": "The Citizens United v. FEC (2010) decision and the D.C. Circuit's SpeechNow.org v. FEC ruling, which enabled the creation of Super PACs.", "isCorrect": true, "rationale": "The text attributes the jump directly to Citizens United combined with SpeechNow.org v. FEC, which together led to the creation of Super PACs and the explosion of outside spending."}, {"text": "The passage of the Twenty-Sixth Amendment.", "isCorrect": false, "rationale": "The Twenty-Sixth Amendment lowered the voting age in 1971; it is unrelated to outside spending."}, {"text": "The creation of Section 230 of the Communications Decency Act.", "isCorrect": false, "rationale": "Section 230 governs internet platforms and has no direct effect on federal-election outside spending."}], "id": "q04"}, {"question": "Which of the following best summarizes Justice Kennedy's majority reasoning in Citizens United v. FEC?", "options": [{"text": "Corporations forfeit First Amendment protection when they engage in political advertising.", "isCorrect": false, "rationale": "This is the opposite of the majority's reasoning. The majority held that corporate political speech retains First Amendment protection."}, {"text": "Political speech does not lose First Amendment protection because its source is a corporation rather than an individual.", "isCorrect": true, "rationale": "The text summarizes Kennedy's majority opinion as holding that 'political speech does not lose First Amendment protection simply because its source is a corporation rather than an individual.'"}, {"text": "The BCRA's electioneering restrictions were a legitimate tool to prevent quid pro quo corruption.", "isCorrect": false, "rationale": "The majority struck the restrictions down; this was the position of the dissent, not the majority."}, {"text": "Corporations may not engage in political speech until they secure FEC preclearance.", "isCorrect": false, "rationale": "The majority rejected the electioneering restrictions; it did not impose a new preclearance requirement."}], "id": "q05"}, {"question": "Which of the following best captures Justice Stevens' dissenting argument in Citizens United?", "options": [{"text": "Corporations deserve broader First Amendment protection than individuals.", "isCorrect": false, "rationale": "Stevens argued precisely the opposite: that corporations should not enjoy the same political speech protections as individuals."}, {"text": "Corporations are not people, the Founders did not intend the First Amendment to protect corporate political spending, and unlimited corporate spending threatens self-governance.", "isCorrect": true, "rationale": "The text summarizes Stevens' dissent as making these three points: corporations are not people, the Founders did not intend corporate speech protection, and unlimited corporate spending threatens democratic self-governance."}, {"text": "PAC contribution limits violate the free speech rights of corporations.", "isCorrect": false, "rationale": "Stevens was defending contribution-style restrictions, not attacking them."}, {"text": "The BCRA failed to adequately protect corporate political speech.", "isCorrect": false, "rationale": "Stevens defended the BCRA; he did not argue it under-protected corporate speech."}], "id": "q06"}, {"question": "Before the Citizens United era, 527 organizations were a primary vehicle for which of the following?", "options": [{"text": "Corporate mergers", "isCorrect": false, "rationale": "527 organizations are political, not corporate-transaction, entities."}, {"text": "'Soft money' spending on voter mobilization and issue advocacy.", "isCorrect": true, "rationale": "The text states that before Citizens United, 527 organizations were a primary vehicle for so-called 'soft money' spending, used on voter mobilization and issue advocacy."}, {"text": "Direct contributions from foreign governments.", "isCorrect": false, "rationale": "Foreign contributions are prohibited under federal campaign finance law."}, {"text": "Nonprofit educational grants unrelated to elections.", "isCorrect": false, "rationale": "527s are explicitly organized primarily to influence elections, not for unrelated educational grants."}], "id": "q07"}, {"question": "A student summarizes campaign finance rules as follows: 'PACs have contribution caps and must disclose donors; Super PACs face no spending cap but must disclose donors; 527s face no spending cap but must disclose donors; 501(c)(4)s face no spending cap and need not disclose donors.' Which of the following best evaluates this summary against the text?", "options": [{"text": "The summary is wrong about Super PACs, which may coordinate directly with candidates.", "isCorrect": false, "rationale": "Super PACs may NOT coordinate directly with candidates; the rest of the summary is accurate."}, {"text": "The summary accurately distinguishes the four categories on the two key questions of spending limits and donor disclosure.", "isCorrect": true, "rationale": "The text's Key Concept uses exactly these two questions (spending limits and disclosure) to classify PACs, Super PACs, 527s, and 501(c)(4)s, and the summary matches that classification."}, {"text": "The summary is wrong about 527s, which are required to remain anonymous.", "isCorrect": false, "rationale": "527s are required to disclose their donors; they are not anonymous."}, {"text": "The summary is wrong about 501(c)(4)s, which must fully disclose donors.", "isCorrect": false, "rationale": "501(c)(4)s are the prototypical 'dark money' groups precisely because they do not have to disclose donors."}], "id": "q08"}, {"question": "Which of the following statements best explains the constitutional reasoning offered by the Citizens United majority for distinguishing independent expenditures from direct contributions?", "options": [{"text": "Direct contributions pose a greater risk of quid pro quo corruption than independent expenditures, which are not coordinated with candidates.", "isCorrect": true, "rationale": "The text says the majority distinguished direct contributions (which may be limited to prevent corruption) from independent expenditures (which pose a lesser risk because they are not coordinated with candidates)."}, {"text": "Direct contributions are protected by the First Amendment, but independent expenditures are not.", "isCorrect": false, "rationale": "The majority found that independent expenditures ARE protected speech; direct contributions may be capped precisely because they pose greater corruption risk."}, {"text": "The Court eliminated all distinctions between contributions and expenditures.", "isCorrect": false, "rationale": "The Court maintained the distinction; only restrictions on independent corporate expenditures were struck down."}, {"text": "Independent expenditures can only be made by registered political parties.", "isCorrect": false, "rationale": "The decision specifically enabled corporate and union independent expenditures, not a party-only rule."}], "id": "q09"}, {"question": "Which of the following is the most accurate description of the controversy surrounding 501(c)(4) 'dark money' groups in campaign finance?", "options": [{"text": "They are required to spend 100% of their funds on elections.", "isCorrect": false, "rationale": "Politics must not be their 'primary purpose,' which is the opposite of this claim."}, {"text": "Their anonymity allows wealthy individuals and corporations to influence elections secretly, undermining the transparency that voters need to make informed choices.", "isCorrect": true, "rationale": "The text states that the anonymity of dark money spending lets wealthy individuals and corporations influence elections secretly, 'undermining the transparency that voters need to make informed choices.'"}, {"text": "They are banned outright by the Supreme Court's decision in Citizens United.", "isCorrect": false, "rationale": "Citizens United expanded, not restricted, the ability of such groups to spend in elections."}, {"text": "They are required to coordinate their spending directly with candidates.", "isCorrect": false, "rationale": "Coordination with candidates is prohibited for independent expenditures; it is not a requirement."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
