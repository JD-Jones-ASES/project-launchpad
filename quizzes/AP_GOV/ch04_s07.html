        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Ideologies of Political Parties</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A voter supports strict environmental regulations, higher minimum wages, and universal access to healthcare. On the standard left-right American political spectrum, this voter's positions most closely align with:", "options": [{"text": "The Libertarian perspective.", "isCorrect": false, "rationale": "Libertarians favor minimal government in both economic and social life — they would generally oppose strict environmental regulation and minimum-wage increases."}, {"text": "The Republican Party.", "isCorrect": false, "rationale": "These positions (more regulation, higher minimum wage, expanded government healthcare) conflict with the Republican Party's general commitments to lower taxes and reduced regulation."}, {"text": "The Democratic Party.", "isCorrect": true, "rationale": "The text identifies the Democratic Party with government regulation of business, higher minimum wage, and a larger federal role in healthcare — all three commitments listed."}, {"text": "Populism as defined on the two-dimensional spectrum.", "isCorrect": false, "rationale": "Populism in the text combines economic intervention with more traditional social policies. The scenario provides only economic and healthcare views, not traditional social positions."}], "id": "q01"}, {"question": "A candidate argues that both federal taxes and government regulation should be reduced, but also supports legalizing recreational drug use and opposes government involvement in personal lifestyle choices. Which ideological label best fits, according to the text's two-dimensional model?", "options": [{"text": "Populist.", "isCorrect": false, "rationale": "Populists favor MORE government involvement in both economic and social spheres — the candidate wants less in both, which is the opposite quadrant."}, {"text": "Libertarian.", "isCorrect": true, "rationale": "The text defines libertarians as favoring less government involvement in both the economy (lower taxes, less regulation) and social life (personal freedom on lifestyle, drugs, privacy)."}, {"text": "Conservative.", "isCorrect": false, "rationale": "Conservatives in the text's model combine economic restraint with more traditional social policies — they would not typically support drug legalization."}, {"text": "Liberal.", "isCorrect": false, "rationale": "Liberals in the text's model favor more government involvement in the economy — not less."}], "id": "q02"}, {"question": "A political science textbook describes a voter who supports both government intervention in the economy (for example, strong labor protections and economic regulation) and traditional social policies (for example, restrictive positions on cultural issues). On the two-dimensional spectrum, this voter is best described as:", "options": [{"text": "Libertarian.", "isCorrect": false, "rationale": "Libertarians oppose government intervention in BOTH economics and social life — the opposite of this voter's positions."}, {"text": "Liberal.", "isCorrect": false, "rationale": "Liberals favor progressive social policies alongside economic intervention; this voter's social views are traditional, not progressive."}, {"text": "Populist.", "isCorrect": true, "rationale": "The text defines populists (sometimes called communitarians) as favoring 'more government involvement in both spheres — economic intervention and social regulation based on traditional values.'"}, {"text": "Moderate.", "isCorrect": false, "rationale": "Moderates occupy the middle ground on each axis, not a clearly defined quadrant. The scenario describes strong positions on both axes."}], "id": "q03"}, {"question": "The text describes moderates as playing an \"outsized role\" in general elections. Which explanation best supports this claim?", "options": [{"text": "Because moderates are the largest group in both major parties.", "isCorrect": false, "rationale": "The text does not claim moderates are the largest group; it ties their importance to electoral competitiveness rather than sheer numbers."}, {"text": "Because moderates often determine the outcome in competitive districts and swing states.", "isCorrect": true, "rationale": "The text states moderates 'play an outsized role in general elections, since they often determine the outcome in competitive districts and swing states.'"}, {"text": "Because moderates vote at higher rates than any other group.", "isCorrect": false, "rationale": "The text does not make this claim; if anything, ideologically committed voters tend to turn out more reliably."}, {"text": "Because moderates always support the incumbent.", "isCorrect": false, "rationale": "The text does not describe moderates as reliably pro-incumbent."}], "id": "q04"}, {"question": "Consider this hypothetical survey of party elites and party voters:\n\n                      | Democratic Support | Republican Support\nExpand ACA coverage   | 78%                | 22%\nLower business taxes  | 31%                | 79%\nStricter gun laws     | 82%                | 27%\nIncrease defense spending | 45%            | 71%\n\nWhich statement best summarizes what these data illustrate about the parties?", "options": [{"text": "Both parties are in basic agreement on economic policy but disagree on social policy.", "isCorrect": false, "rationale": "The data show sharp disagreement on business taxes (economic) and defense spending (another economic/policy area), not basic agreement."}, {"text": "The parties show distinct ideological centers of gravity: Democrats favoring expanded government roles in healthcare and regulation, Republicans favoring lower taxes, stronger defense, and looser gun regulation.", "isCorrect": true, "rationale": "These patterns match the text's descriptions of each party's core commitments — Democrats toward regulation and expanded government role, Republicans toward lower taxes, stronger defense, and Second Amendment rights."}, {"text": "The data prove both parties are ideologically monolithic with no internal disagreement.", "isCorrect": false, "rationale": "The text emphasizes that 'neither party is ideologically uniform,' citing internal factions like democratic socialists vs. moderates and traditional conservatives vs. populist nationalists."}, {"text": "The libertarian position is best represented in the data.", "isCorrect": false, "rationale": "Libertarians would oppose increased defense spending and not strongly support stricter gun laws — neither party's profile matches the libertarian profile."}], "id": "q05"}, {"question": "Which pair best describes the text's characterization of each major party's approach to social issues?", "options": [{"text": "Democrats emphasize traditional values and religious liberty; Republicans emphasize civil rights protections and LGBTQ+ rights.", "isCorrect": false, "rationale": "The text assigns these positions to the opposite parties from this pairing."}, {"text": "Democrats support civil rights protections, LGBTQ+ rights, reproductive rights, and gun regulation; Republicans emphasize traditional values, religious liberty, Second Amendment rights, and oppose abortion.", "isCorrect": true, "rationale": "The text states these directly for each party."}, {"text": "Democrats favor fossil-fuel production; Republicans favor strict environmental regulation.", "isCorrect": false, "rationale": "The text reverses these positions — Democrats generally favor environmental regulation, Republicans tend to emphasize energy production."}, {"text": "Neither party has coherent positions on social issues.", "isCorrect": false, "rationale": "The text identifies distinct social-issue positions for each party, while acknowledging internal diversity."}], "id": "q06"}, {"question": "The text argues that many Americans do not fit neatly into the \"liberal\" or \"conservative\" label. Which scenario best illustrates this claim?", "options": [{"text": "A voter who supports universal healthcare but also opposes gun regulations.", "isCorrect": true, "rationale": "The text uses this exact example, writing that such a voter 'does not fall cleanly on the left-right spectrum — but they make perfect sense on the two-dimensional map.'"}, {"text": "A voter who supports both universal healthcare and gun regulation.", "isCorrect": false, "rationale": "This voter aligns cleanly with the Democratic side of the left-right spectrum."}, {"text": "A voter who opposes both universal healthcare and gun regulation.", "isCorrect": false, "rationale": "This voter aligns cleanly with the Republican side of the spectrum."}, {"text": "A voter who never votes in elections.", "isCorrect": false, "rationale": "Non-voting is not about ideological fit; the text's point is about voters whose views mix party positions."}], "id": "q07"}, {"question": "According to the text, which statement about the Libertarian Party is most accurate?", "options": [{"text": "The Libertarian Party has won multiple presidential elections.", "isCorrect": false, "rationale": "The text explicitly states the Libertarian Party 'has never won a presidential election.'"}, {"text": "Libertarian ideas have no influence on the major parties.", "isCorrect": false, "rationale": "The text states the opposite: 'libertarian ideas influence both major parties and a significant share of the American electorate.'"}, {"text": "While the Libertarian Party has never won a presidential election, libertarian ideas influence both major parties and a significant share of the electorate.", "isCorrect": true, "rationale": "This quotes the text directly."}, {"text": "Libertarians favor extensive government intervention in both economic and social life.", "isCorrect": false, "rationale": "Libertarians favor MINIMAL government involvement in both spheres; this option describes the opposite (populist) position."}], "id": "q08"}, {"question": "A news analyst writes that \"the Republican Party includes both traditional fiscal conservatives and populist nationalists, while the Democratic Party includes both moderate centrists and democratic socialists.\" This observation best supports which claim from the text?", "options": [{"text": "Each major party is ideologically uniform.", "isCorrect": false, "rationale": "The analyst's statement is explicitly about internal diversity, the opposite of uniformity."}, {"text": "Ideological diversity within each party creates internal tension and factional competition over the platform and candidate selection.", "isCorrect": true, "rationale": "The text uses nearly identical language: 'neither party is ideologically uniform... This internal diversity creates tension within each party as factions compete for influence over the platform and candidate selection.'"}, {"text": "Third parties like the Libertarian Party dominate American politics.", "isCorrect": false, "rationale": "The text describes third parties as influential but not dominant, and this is not what the analyst's quote is about."}, {"text": "The two-dimensional spectrum is unnecessary because parties are uniform.", "isCorrect": false, "rationale": "The text argues the two-dimensional spectrum is valuable precisely because parties contain internal diversity and many voters don't fit a single axis."}], "id": "q09"}, {"question": "A voter believes markets should be mostly free of government regulation and that same-sex marriage should be legally protected. On the two-dimensional spectrum described in the text, this voter would be placed in the:", "options": [{"text": "Conservative quadrant (less economic government, more traditional social policy).", "isCorrect": false, "rationale": "Conservatives combine less economic intervention with more traditional social policy; this voter supports a progressive social position."}, {"text": "Liberal quadrant (more economic government, more progressive social policy).", "isCorrect": false, "rationale": "Liberals favor MORE government involvement in the economy; this voter favors less."}, {"text": "Libertarian quadrant (less economic government, more progressive social policy).", "isCorrect": true, "rationale": "The text defines libertarians as favoring less government involvement in both economic life (free markets) and social life (broad personal freedoms including LGBTQ+ rights)."}, {"text": "Populist quadrant (more economic government, more traditional social policy).", "isCorrect": false, "rationale": "Populists favor more government involvement in both spheres with traditional social values; this voter favors less economic government and progressive social policy."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
