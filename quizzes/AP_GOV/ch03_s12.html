    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Balancing Majority and Minority Rights</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "James Madison warned in Federalist No. 10 about the dangers of 'faction.' How does the section define faction in this context?", "options": [{"text": "A formal political party recognized by the Constitution.", "isCorrect": false, "rationale": "The Constitution does not formally recognize parties, and Madison's concept of faction is broader than formal parties."}, {"text": "A group united by a common interest adverse to the rights of others or the community as a whole.", "isCorrect": true, "rationale": "The text states: 'Madison's solution was a large, diverse republic with multiple competing factions,' defined as 'a group united by a common interest adverse to the rights of others or the community as a whole.'"}, {"text": "A rebellion by states against federal authority.", "isCorrect": false, "rationale": "Madison's faction concept concerned interest groups whose interests conflict with others or the community, not state rebellions."}, {"text": "A branch of the federal government acting independently.", "isCorrect": false, "rationale": "Faction refers to interest groups within society, not branches of government."}], "id": "q01"}, {"question": "In Federalist No. 51, Madison extended his logic about faction by arguing that the rights of minorities will be insecure if:", "options": [{"text": "Minorities are not represented in the electoral college.", "isCorrect": false, "rationale": "The text does not tie minority security to electoral college representation; Madison's concern was about structural protection against majority faction."}, {"text": "A majority is united by a common interest.", "isCorrect": true, "rationale": "The text quotes Madison: 'If a majority be united by a common interest, the rights of the minority will be insecure.'"}, {"text": "The government is too weak to enforce laws.", "isCorrect": false, "rationale": "Madison's concern was majority tyranny, not weak government enforcement."}, {"text": "Majorities are prevented from voting.", "isCorrect": false, "rationale": "Madison's concern was the opposite—the danger of united majority power, not disenfranchised majorities."}], "id": "q02"}, {"question": "Which constitutional structural features does the section identify as specifically designed to guard against the tyranny of the majority?", "options": [{"text": "The electoral college and the census.", "isCorrect": false, "rationale": "These are voting and representation mechanisms, not the primary structural protections the section cites."}, {"text": "Separation of powers, checks and balances, federalism, and the Bill of Rights.", "isCorrect": true, "rationale": "The text states: 'The Constitution's structural protections—separation of powers, checks and balances, federalism, and the Bill of Rights—are all designed to guard against this danger.'"}, {"text": "The Supremacy Clause and the Necessary and Proper Clause.", "isCorrect": false, "rationale": "These clauses address federal authority and implementation, not majority faction protection in the sense Madison described."}, {"text": "The Reserve Clause and the Takings Clause.", "isCorrect": false, "rationale": "There is no 'Reserve Clause' by that name, and the Takings Clause concerns eminent domain, not majority faction."}], "id": "q03"}, {"question": "Why, according to the section, is the judiciary uniquely positioned to protect minority rights in a democratic system?", "options": [{"text": "Judges are elected directly by minority groups.", "isCorrect": false, "rationale": "Federal judges are appointed, not elected by minority groups."}, {"text": "Federal judges, appointed for life, are insulated from majoritarian pressure and can enforce constitutional principles even when unpopular.", "isCorrect": true, "rationale": "The text states: 'the judiciary plays a unique role in protecting minority rights because federal judges, appointed for life, are insulated from majoritarian pressure. Unlike legislators who must win elections, judges can enforce constitutional principles even when those principles are unpopular with the majority.'"}, {"text": "Only courts may enforce the Equal Protection Clause.", "isCorrect": false, "rationale": "Both executive and legislative branches have roles in enforcing civil rights; courts are not the exclusive enforcer."}, {"text": "Judges are appointed by minority leaders.", "isCorrect": false, "rationale": "Federal judges are appointed by the President with Senate confirmation; not by 'minority leaders.'"}], "id": "q04"}, {"question": "Which Supreme Court decision does the section cite as a COUNTER-MAJORITARIAN ruling that recognized the right to same-sex marriage nationwide?", "options": [{"text": "Loving v. Virginia (1967).", "isCorrect": false, "rationale": "Loving struck down anti-miscegenation laws banning interracial marriage; it did not involve same-sex marriage."}, {"text": "Obergefell v. Hodges (2015).", "isCorrect": true, "rationale": "The text identifies Obergefell v. Hodges (2015) as having 'Recognized the right to same-sex marriage nationwide, even in states where voters had passed constitutional amendments banning it.'"}, {"text": "Brown v. Board of Education (1954).", "isCorrect": false, "rationale": "Brown addressed school segregation, not same-sex marriage."}, {"text": "Griswold v. Connecticut (1965).", "isCorrect": false, "rationale": "Griswold concerned contraceptives for married couples, not same-sex marriage."}], "id": "q05"}, {"question": "According to the section, the COUNTER-MAJORITARIAN function of the judiciary is both celebrated and criticized. Which statement best captures the CRITICS' position?", "options": [{"text": "That courts are too deferential to the political branches.", "isCorrect": false, "rationale": "Critics argue the opposite—that courts override the democratic will, not that they defer to it."}, {"text": "That it gives unelected judges too much power to override the democratic will.", "isCorrect": true, "rationale": "The text states: 'Critics argue it gives unelected judges too much power to override the democratic will.'"}, {"text": "That it violates the Tenth Amendment.", "isCorrect": false, "rationale": "The section does not frame the counter-majoritarian critique as a Tenth Amendment issue; it frames it as a democratic-legitimacy question."}, {"text": "That courts must defer to state legislatures in all cases.", "isCorrect": false, "rationale": "Critics do not argue for universal deference to state legislatures; they argue courts should be cautious about overriding democratically expressed will."}], "id": "q06"}, {"question": "A student summarizes: 'Political equality and social equality are the same thing; the Constitution guarantees both.' How does the section respond to this view?", "options": [{"text": "The student is correct, as both forms of equality are guaranteed by the Fourteenth Amendment.", "isCorrect": false, "rationale": "The section explicitly says 'The Constitution does not guarantee social equality.'"}, {"text": "The student is incorrect: political equality concerns formal rights under law; social equality concerns equality of condition—and the Constitution guarantees the former but not the latter.", "isCorrect": true, "rationale": "The text explicitly distinguishes the two: political equality is 'the same formal rights under the law,' while social equality is 'equality of condition—equal access to wealth, education, housing, healthcare, and social status. The Constitution does not guarantee social equality.'"}, {"text": "The student is correct, but only because Congress has guaranteed social equality by statute.", "isCorrect": false, "rationale": "The section frames social equality as a matter of ongoing political debate, not as a statutory guarantee."}, {"text": "The student is incorrect because political and social equality have no relationship.", "isCorrect": false, "rationale": "The section notes that political and social equality are related—legal equality may not produce lived equality. They are distinct but connected concepts."}], "id": "q07"}, {"question": "Which of the following Supreme Court cases does the section cite as an EXAMPLE of the judiciary overturning a widely supported law to protect minority rights?", "options": [{"text": "Brown v. Board of Education (1954), which overturned segregation despite widespread public support for it in the South.", "isCorrect": true, "rationale": "The text lists Brown v. Board of Education (1954) as a case that 'Overturned segregation despite widespread public support for it in the South.'"}, {"text": "Schenck v. United States (1919), which upheld wartime speech restrictions.", "isCorrect": false, "rationale": "Schenck upheld, rather than struck down, a government restriction; it is not cited as a minority-rights protection case in this section."}, {"text": "Korematsu v. United States (1944), which upheld Japanese American internment.", "isCorrect": false, "rationale": "Korematsu upheld internment and was later repudiated; it is not cited as a counter-majoritarian example protecting minority rights."}, {"text": "Marbury v. Madison (1803), which established judicial review.", "isCorrect": false, "rationale": "Marbury is the foundational judicial review case but is not cited in this section's list of counter-majoritarian minority-rights decisions."}], "id": "q08"}, {"question": "The section states that 'legal equality does not automatically produce equality in practice.' Which scenario best illustrates this principle?", "options": [{"text": "A state passes a law banning racial discrimination in public accommodations, but housing patterns and economic inequalities continue to produce racial segregation in neighborhoods and schools.", "isCorrect": true, "rationale": "This mirrors the section's discussion of the gap between political equality (formal legal rights) and social equality (lived experience), explaining why civil rights movements persist after discriminatory laws are repealed."}, {"text": "A state passes a constitutional amendment requiring strict racial segregation in all public places.", "isCorrect": false, "rationale": "This is de jure discrimination, not an illustration of the gap between legal and lived equality after laws have been reformed."}, {"text": "Congress passes a law requiring identical salaries for all federal employees.", "isCorrect": false, "rationale": "This is a specific policy choice about salaries; it does not illustrate the gap between political and social equality the section describes."}, {"text": "The Supreme Court strikes down an anti-miscegenation law.", "isCorrect": false, "rationale": "While important, this example illustrates judicial protection of minority rights; it does not itself illustrate the gap between legal and practical equality after such laws are struck down."}], "id": "q09"}, {"question": "The section suggests Madison's solution to majority tyranny involved structural rather than substantive protections. What specific structural design did Madison propose in Federalist No. 10?", "options": [{"text": "A national referendum on every significant policy question.", "isCorrect": false, "rationale": "Madison did not propose national referendums; he opposed pure democratic procedures susceptible to majority faction."}, {"text": "A large, diverse republic with multiple competing factions, making it difficult for any single majority to dominate.", "isCorrect": true, "rationale": "The text states: 'Madison's solution was a large, diverse republic with multiple competing factions, making it difficult for any single majority to dominate.'"}, {"text": "A unitary government that concentrated power in one branch.", "isCorrect": false, "rationale": "Madison favored separation of powers and checks and balances, not concentrated unitary government."}, {"text": "An executive veto over all state legislation.", "isCorrect": false, "rationale": "Madison did not propose executive veto over all state legislation; he favored a compound republic with diffused power."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
