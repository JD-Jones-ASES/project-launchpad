<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP U.S. Government and Politics &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Government Responses to Social Movements</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The section describes the Civil Rights Movement of the 1950s and 1960s as the 'most transformative social movement in modern American history.' Which combination of tactics does it identify as central to the movement?", "options": [{"text": "Military intervention and violent rebellion.", "isCorrect": false, "rationale": "The text emphasizes NONVIOLENT protest, not violent rebellion or military intervention."}, {"text": "Legal challenges, nonviolent protest, and political organizing.", "isCorrect": true, "rationale": "The text says African Americans and their allies 'challenged the system of Jim Crow segregation through a combination of legal challenges, nonviolent protest, and political organizing.'"}, {"text": "Private boycotts only, without any legal or political strategy.", "isCorrect": false, "rationale": "Boycotts were one tactic among many; the movement also used litigation, civil disobedience, political organizing, and public demonstration."}, {"text": "Armed self-defense as the primary method.", "isCorrect": false, "rationale": "The section highlights nonviolent tactics, not armed self-defense, as central to the movement."}]}, {"question": "A student is asked to identify the event that launched Dr. Martin Luther King Jr. into national prominence. Based on the section, which event did this?", "options": [{"text": "The Greensboro sit-ins of 1960.", "isCorrect": false, "rationale": "The Greensboro sit-ins involved students, not King; they occurred AFTER King had already gained prominence through the Montgomery Bus Boycott."}, {"text": "The Montgomery Bus Boycott (1955–1956), which followed Rosa Parks's arrest.", "isCorrect": true, "rationale": "The text states the Montgomery Bus Boycott was 'a year-long boycott that brought Dr. Martin Luther King Jr. to national prominence.'"}, {"text": "The Freedom Rides of 1961.", "isCorrect": false, "rationale": "The Freedom Rides came after King was already nationally prominent; they tested compliance with desegregation orders."}, {"text": "The March on Washington of 1963.", "isCorrect": false, "rationale": "The March on Washington (where King delivered 'I Have a Dream') came AFTER his rise to national prominence, which began with the Montgomery Bus Boycott."}]}, {"question": "In his 'Letter from Birmingham Jail' (1963), King drew a distinction between 'just' and 'unjust' laws. Which statement best summarizes his definition?", "options": [{"text": "A just law is any law passed by a democratically elected legislature.", "isCorrect": false, "rationale": "King did NOT equate justness with democratic passage. His test was moral, not procedural."}, {"text": "A just law is a man-made code that squares with the moral law; an unjust law is a code out of harmony with the moral law.", "isCorrect": true, "rationale": "The text quotes King: 'A just law is a man-made code that squares with the moral law or the law of God. An unjust law is a code that is out of harmony with the moral law.'"}, {"text": "A just law is one that a majority of citizens support.", "isCorrect": false, "rationale": "King's test was moral, not majoritarian. Unjust laws can be popular."}, {"text": "A just law is one that is codified in the Constitution.", "isCorrect": false, "rationale": "King's standard was moral law, not constitutional text; an immoral constitutional provision would still be unjust under his framework."}]}, {"question": "King writes: 'Any law that uplifts human personality is just. Any law that degrades human personality is unjust.' How does he apply this test to segregation statutes?", "options": [{"text": "He argues that segregation statutes are just because they maintain public order.", "isCorrect": false, "rationale": "King argues the opposite—that segregation statutes are UNJUST."}, {"text": "He argues that segregation statutes are unjust because 'segregation distorts the soul and damages the personality.'", "isCorrect": true, "rationale": "The text quotes King: 'All segregation statutes are unjust because segregation distorts the soul and damages the personality.'"}, {"text": "He argues that segregation statutes are neither just nor unjust.", "isCorrect": false, "rationale": "King takes a clear moral position: segregation statutes are unjust."}, {"text": "He argues segregation statutes are just only when applied equally.", "isCorrect": false, "rationale": "King rejects this view; he argues no application of segregation can be just because it inherently degrades personality."}]}, {"question": "The Selma to Montgomery marches of 1965, described in the section, generated national outrage primarily because of which specific event?", "options": [{"text": "The arrest of Rosa Parks for refusing to give up her bus seat.", "isCorrect": false, "rationale": "Parks's arrest occurred in 1955, not during the Selma to Montgomery marches."}, {"text": "'Bloody Sunday,' when peaceful marchers demanding voting rights were attacked by state troopers.", "isCorrect": true, "rationale": "The text says the Selma to Montgomery marches involved 'peaceful marchers demanding voting rights... attacked by state troopers on \"Bloody Sunday,\" generating national outrage.'"}, {"text": "The delivery of King's 'I Have a Dream' speech.", "isCorrect": false, "rationale": "The 'I Have a Dream' speech was delivered at the March on Washington (1963), not during the Selma marches."}, {"text": "A sit-in at a whites-only lunch counter.", "isCorrect": false, "rationale": "Sit-ins began in Greensboro in 1960, not during the Selma marches."}]}, {"question": "The Freedom Rides of 1961 were designed to:", "options": [{"text": "Establish a boycott of segregated lunch counters.", "isCorrect": false, "rationale": "The lunch counter challenges were sit-ins (1960), not Freedom Rides."}, {"text": "Test compliance with federal desegregation orders by riding integrated interstate buses through the South.", "isCorrect": true, "rationale": "The text states the Freedom Rides involved 'Integrated groups rode interstate buses through the South to test compliance with federal desegregation orders.'"}, {"text": "Organize mass protests at the Lincoln Memorial.", "isCorrect": false, "rationale": "Mass protests at the Lincoln Memorial occurred during the March on Washington (1963), not the Freedom Rides."}, {"text": "Circulate petitions for a voting rights amendment.", "isCorrect": false, "rationale": "The Freedom Rides were a physical civil disobedience campaign, not a petition drive."}]}, {"question": "What is the most direct connection, as described in the section, between King's distinction between just and unjust laws and the concept of CIVIL DISOBEDIENCE?", "options": [{"text": "King says all laws must be obeyed regardless of moral content.", "isCorrect": false, "rationale": "King expressly says 'one has a moral responsibility to disobey unjust laws.'"}, {"text": "King's position is that one has a moral responsibility to DISOBEY unjust laws, which is the core of civil disobedience—the deliberate, nonviolent refusal to obey laws considered unjust.", "isCorrect": true, "rationale": "The text quotes King: 'one has a moral responsibility to disobey unjust laws' and describes civil disobedience as 'the deliberate, nonviolent refusal to obey laws considered unjust.'"}, {"text": "King argues that civil disobedience requires secret, covert action.", "isCorrect": false, "rationale": "Civil disobedience as King describes it is public and NONVIOLENT—not covert."}, {"text": "Civil disobedience requires overthrowing the government.", "isCorrect": false, "rationale": "Civil disobedience in King's formulation is nonviolent refusal to obey specific unjust laws, not revolutionary action against government itself."}]}, {"question": "King quotes St. Augustine that 'an unjust law is no law at all.' What does this phrase mean within King's argument?", "options": [{"text": "Unjust laws are automatically void and cannot be enforced by police.", "isCorrect": false, "rationale": "King is making a moral claim, not a legal one. Unjust laws may still be enforced by police; the argument is that they lack moral authority."}, {"text": "Unjust laws lack moral legitimacy, so there is no moral duty to obey them.", "isCorrect": true, "rationale": "King's point is that unjust laws carry no moral authority; the phrase supports his claim that moral responsibility supports disobedience of such laws."}, {"text": "Unjust laws are rare and need not concern citizens.", "isCorrect": false, "rationale": "King is writing FROM jail after protesting segregation; his letter argues that unjust laws are prevalent and moral response is required."}, {"text": "Laws are valid only if passed by unanimous consent.", "isCorrect": false, "rationale": "King does not base legitimacy on unanimous consent; he bases it on moral content."}]}, {"question": "The section describes the March on Washington (1963) as gathering over 250,000 people. Which event occurred at the march?", "options": [{"text": "Rosa Parks was arrested for refusing to give up her bus seat.", "isCorrect": false, "rationale": "Parks was arrested in Montgomery in 1955, not at the March on Washington."}, {"text": "King delivered his 'I Have a Dream' speech at the Lincoln Memorial.", "isCorrect": true, "rationale": "The text states: 'Over 250,000 people gathered at the Lincoln Memorial, where King delivered his \"I Have a Dream\" speech.'"}, {"text": "President Kennedy signed the Civil Rights Act.", "isCorrect": false, "rationale": "The Civil Rights Act (1964) was signed by President Johnson, not at the March on Washington."}, {"text": "State troopers attacked peaceful marchers.", "isCorrect": false, "rationale": "State troopers attacked marchers during the Selma to Montgomery marches ('Bloody Sunday'), not at the March on Washington."}]}, {"question": "King's Letter from Birmingham Jail responds to white clergymen who had called his demonstrations 'unwise and untimely.' What was King's overall strategy in the letter?", "options": [{"text": "To argue that segregation is legally correct under the Fourteenth Amendment.", "isCorrect": false, "rationale": "King argues segregation is UNJUST and violates moral law; he did not defend its constitutionality."}, {"text": "To justify the morality of disobeying unjust laws through a distinction between just and unjust laws, while advocating obedience of just laws.", "isCorrect": true, "rationale": "The text quotes King: 'I would be the first to advocate obeying just laws. One has not only a legal but a moral responsibility to obey just laws. Conversely, one has a moral responsibility to disobey unjust laws.'"}, {"text": "To call for violent overthrow of the government.", "isCorrect": false, "rationale": "King's method is NONVIOLENT disobedience, not violent overthrow."}, {"text": "To apologize for the Birmingham protests.", "isCorrect": false, "rationale": "The letter defends and justifies the protests; it is not an apology."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
