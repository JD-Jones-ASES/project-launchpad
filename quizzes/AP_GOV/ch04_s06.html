<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP U.S. Government and Politics &mdash; Quiz &mdash; Scholastica Codex</title>

    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Evaluating Public Opinion Data</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The text distinguishes sampling error from non-sampling error. Which of the following is the key practical difference between the two?", "options": [{"text": "Sampling error is a mistake, while non-sampling error is expected.", "isCorrect": false, "rationale": "The text reverses this: sampling error is 'expected and measurable — it is not a mistake,' while non-sampling error is dangerous because it cannot be quantified by a margin of error."}, {"text": "Sampling error decreases as sample size grows (quantified by the margin of error); non-sampling error cannot be reduced simply by increasing sample size.", "isCorrect": true, "rationale": "The text states directly: 'Non-sampling error... is far more dangerous because it cannot be reduced simply by increasing sample size,' while sampling error 'decreases as sample size increases.'"}, {"text": "Non-sampling error affects only online polls, while sampling error affects only phone polls.", "isCorrect": false, "rationale": "Both types of error can affect any survey mode; the text does not tie them to specific technologies."}, {"text": "Sampling error causes biased question wording, while non-sampling error causes random variation.", "isCorrect": false, "rationale": "Biased wording is measurement error (a type of non-sampling error), and random variation is sampling error — this option inverts them."}], "id": "q01"}, {"question": "A polling firm conducts a survey of 1,200 U.S. adults by calling only landline numbers. Which type of non-sampling error is most directly introduced?", "options": [{"text": "Nonresponse error, because some respondents hung up.", "isCorrect": false, "rationale": "Nonresponse error is about people who refuse to participate; the specific issue here is about who could even be reached — a coverage problem."}, {"text": "Coverage error, because the sampling frame (landline-only) does not match the target population (all adults, including cell-only users).", "isCorrect": true, "rationale": "The text uses this exact example: 'A telephone poll conducted only on landlines would miss the majority of young adults who use only cell phones.'"}, {"text": "Weighting error, because pollsters did not adjust for demographics.", "isCorrect": false, "rationale": "The scenario describes whom the pollster can reach, not how they weight the raw data afterward."}, {"text": "Measurement error, because questions were poorly worded.", "isCorrect": false, "rationale": "The scenario specifies a sampling mode, not question wording."}], "id": "q02"}, {"question": "The following is a summary of two hypothetical polls on raising the federal minimum wage to $15/hour, as presented in the text:\n\n             | Poll A                               | Poll B\nOrganization | University Research Center            | Advocacy Group for Workers\nSample       | 1,500                                | 600\nMargin       | ±2.5%                                | ±4.0%\nMethod       | Random digit dialing (cell + landline)| Online opt-in panel\nPopulation   | Registered voters                    | All adults\nQuestion     | \"Do you favor or oppose raising...\"  | \"Do you support raising the minimum wage so working families can make ends meet?\"\nSupport      | 55%                                  | 72%\n\nBased on the text's criteria, which poll is more likely to accurately represent public opinion, and why?", "options": [{"text": "Poll B, because it shows higher support and therefore more enthusiasm.", "isCorrect": false, "rationale": "Levels of support do not indicate accuracy. The text explicitly lists methodological quality, not headline numbers, as the test of reliability."}, {"text": "Poll A, because it is from a reputable research organization, uses random digit dialing on cell and landline phones, has a larger sample and smaller margin of error, and uses neutral question wording.", "isCorrect": true, "rationale": "The text lists these criteria explicitly: reputable organization, random sampling, large sample size with smaller margin of error, and neutral wording. Poll A scores better on each."}, {"text": "Poll B, because online opt-in polls are more modern.", "isCorrect": false, "rationale": "The text explicitly identifies online opt-in panels as not representative, not as superior."}, {"text": "Both polls are equally reliable because they both have reported margins of error.", "isCorrect": false, "rationale": "The text lists multiple additional criteria beyond reporting a margin of error (sampling method, wording, organization, population), and Polls A and B differ on all of them."}], "id": "q03"}, {"question": "Reconsidering the polls above, Poll B uses the question: \"Do you support raising the minimum wage so working families can make ends meet?\" The text would most likely categorize this wording as:", "options": [{"text": "Neutral and unbiased.", "isCorrect": false, "rationale": "The phrase 'so working families can make ends meet' is an emotionally sympathetic framing that pushes respondents toward support — exactly the type of wording the text labels as response bias."}, {"text": "Biased because it frames the policy in emotionally sympathetic terms that push respondents toward supporting it.", "isCorrect": true, "rationale": "The text identifies this kind of sympathetic framing as a classic form of measurement error through biased wording, and the prior section used nearly identical language to illustrate the problem."}, {"text": "A double-barreled question.", "isCorrect": false, "rationale": "Double-barreled questions ask about two distinct policies at once; this question asks about only one (minimum wage increase) with a loaded rationale."}, {"text": "A push poll question.", "isCorrect": false, "rationale": "Push polls are coordinated campaigns to spread negative information disguised as surveys, not just biased wording in an otherwise legitimate poll."}], "id": "q04"}, {"question": "An analyst writes: \"Polling averages reduce the impact of any single outlier poll, but they cannot correct for problems that every contributing poll shares.\" Which specific scenario best illustrates this limitation?", "options": [{"text": "Every contributing poll uses a different methodology and different question wording.", "isCorrect": false, "rationale": "Methodological diversity across polls is generally a feature that strengthens aggregation, not a limitation."}, {"text": "All polls systematically undercount a particular demographic group (for example, voters without landlines).", "isCorrect": true, "rationale": "The text states: 'if all polls share the same systematic bias (such as undercounting a particular demographic group), aggregation will not correct the problem.'"}, {"text": "One outlier poll shows a 15-point spread.", "isCorrect": false, "rationale": "Aggregation is designed to minimize the effect of individual outliers — that is its strength, not a limitation."}, {"text": "Polls are conducted in different weeks.", "isCorrect": false, "rationale": "Temporal variation is a reason aggregation uses multiple polls; it is not the specific limitation the text identifies."}], "id": "q05"}, {"question": "A pollster collects raw survey data and then adjusts the results so that the sample's demographic breakdown (by age, gender, race) matches the known breakdown of the target population. If the pollster's assumptions about the true population demographics are incorrect, which type of error is introduced?", "options": [{"text": "Coverage error.", "isCorrect": false, "rationale": "Coverage error concerns who is reachable in the sampling frame, not how raw data is adjusted afterward."}, {"text": "Weighting error.", "isCorrect": true, "rationale": "The text defines weighting error as adjustments based on 'incorrect assumptions' about known demographics, which will produce 'adjusted results [that] will be skewed.'"}, {"text": "Sampling error, which can be fixed by adding more respondents.", "isCorrect": false, "rationale": "Sampling error is random variation from sampling; weighting error is a distinct non-sampling error that more respondents cannot fix."}, {"text": "Response bias.", "isCorrect": false, "rationale": "Response bias concerns question wording and answer distortion, not post-hoc demographic adjustments."}], "id": "q06"}, {"question": "A media outlet reports a poll as follows: \"43% of Latino voters age 18-29 favor Policy Z.\" Based on the text, what is one caveat a careful reader should consider about this subgroup statistic?", "options": [{"text": "Subgroup results always have the same margin of error as the overall sample.", "isCorrect": false, "rationale": "The text says the opposite: 'Subgroup results... have larger margins of error than the overall sample.'"}, {"text": "Subgroup results have larger margins of error than the overall sample because the subgroup contains fewer respondents.", "isCorrect": true, "rationale": "The text states directly: 'Subgroup results (e.g., Latino voters ages 18-29) have larger margins of error than the overall sample.'"}, {"text": "Subgroup results are more accurate than the overall sample.", "isCorrect": false, "rationale": "Smaller subgroups produce less precise estimates, not more precise ones."}, {"text": "Subgroup results do not require random sampling.", "isCorrect": false, "rationale": "All reliable polling subgroup data require random sampling within the subgroup as well."}], "id": "q07"}, {"question": "The text identifies several questions a careful reader should ask when evaluating a poll. Which of the following is NOT among those questions?", "options": [{"text": "Who conducted the poll?", "isCorrect": false, "rationale": "The text lists this as a key question: 'Reputable polling organizations... have established track records.'"}, {"text": "What is the sample size and margin of error?", "isCorrect": false, "rationale": "The text lists this explicitly: 'A poll of 200 people has a much larger margin of error than one of 1,500.'"}, {"text": "What is the political affiliation of each respondent individually?", "isCorrect": true, "rationale": "The text does not instruct readers to verify individual respondents' affiliations; this is outside the evaluation framework it provides."}, {"text": "When was the poll conducted?", "isCorrect": false, "rationale": "The text lists timing among its criteria: 'Polls taken immediately after a major event may reflect temporary spikes or dips. Context matters.'"}], "id": "q08"}, {"question": "An AP Government student is asked to complete a Quantitative Analysis FRQ. According to the text, a complete response must include all of the following EXCEPT:", "options": [{"text": "A description of a trend or pattern in the data.", "isCorrect": false, "rationale": "The text lists this as a required element: 'Describe a trend or pattern in the data.'"}, {"text": "A conclusion based on the data that connects to a political principle or concept.", "isCorrect": false, "rationale": "The text lists this: 'Draw a conclusion based on the data that connects to a political principle or concept.'"}, {"text": "A limitation of the data or an alternative explanation.", "isCorrect": false, "rationale": "The text lists this: 'Explain a limitation of the data or an alternative explanation.'"}, {"text": "A prediction of the next poll's exact result.", "isCorrect": true, "rationale": "The text never asks students to predict exact results, which would be statistically impossible and unrelated to the FRQ scoring criteria."}], "id": "q09"}, {"question": "A reporter compares two polls: one measuring \"all adults,\" the other measuring \"likely voters.\" The likely-voter poll shows 8 points more support for Candidate A than the all-adults poll. Based on the text, what is the most accurate interpretation?", "options": [{"text": "One of the polls must be wrong, since they measure the same policy issue.", "isCorrect": false, "rationale": "The text explicitly notes that 'All adults, registered voters, and likely voters are different populations that can produce different results' — both polls can be correctly reporting different populations."}, {"text": "The two polls measure different populations, so different results can be genuinely valid, and readers should ask who is being measured.", "isCorrect": true, "rationale": "The text lists 'Who is the population being measured?' as a critical evaluation question and warns that these populations routinely produce different results."}, {"text": "The discrepancy is entirely explained by sampling error.", "isCorrect": false, "rationale": "An 8-point gap between two different population definitions is more likely explained by the population difference than by sampling error alone."}, {"text": "Only the 'all adults' poll is ever useful for predicting elections.", "isCorrect": false, "rationale": "The text does not establish this ranking; in fact, likely-voter polls are typically more predictive of election outcomes, though both serve different analytical purposes."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
