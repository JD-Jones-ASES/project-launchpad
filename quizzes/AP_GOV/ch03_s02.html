    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Freedom of Speech</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A state university punishes a student for wearing a T-shirt with a political slogan criticizing a presidential candidate. The student sues. Based on the section, which type of speech receives the HIGHEST level of First Amendment protection and best supports the student's claim?", "options": [{"text": "Commercial speech, because the shirt was purchased in commerce.", "isCorrect": false, "rationale": "Commercial speech receives only intermediate protection. The speech here is political, not an advertisement."}, {"text": "Symbolic political speech, which the Court has said lies at the core of self-governance.", "isCorrect": true, "rationale": "The text states that 'Political speech—speech about government policy, candidates, and public affairs—receives the highest level of protection because it lies at the core of self-governance,' and includes symbolic speech (e.g., wearing armbands)."}, {"text": "Fighting words, which receive heightened protection because they express strong emotion.", "isCorrect": false, "rationale": "Fighting words are explicitly listed as UNPROTECTED speech under Chaplinsky v. New Hampshire (1942)."}, {"text": "Obscenity, which is protected under the Miller test.", "isCorrect": false, "rationale": "The Miller test defines what IS obscenity—and obscenity is unprotected, not protected."}], "id": "q01"}, {"question": "Which case established that public officials suing for libel must prove 'actual malice' to recover damages?", "options": [{"text": "Schenck v. United States (1919).", "isCorrect": false, "rationale": "Schenck addressed wartime restrictions on speech and created the 'clear and present danger' test, not the actual malice standard."}, {"text": "Brandenburg v. Ohio (1969).", "isCorrect": false, "rationale": "Brandenburg established the 'imminent lawless action' standard for incitement, not the defamation standard for public officials."}, {"text": "New York Times v. Sullivan (1964).", "isCorrect": true, "rationale": "The section identifies New York Times v. Sullivan (1964) as the case requiring public figures to prove 'actual malice'—that the statement was made with knowledge of falsity or reckless disregard for the truth."}, {"text": "Tinker v. Des Moines (1969).", "isCorrect": false, "rationale": "Tinker addressed student speech in public schools (substantial disruption test), not defamation."}], "id": "q02"}, {"question": "A city ordinance requires anyone holding a parade on public streets to obtain a permit at least 30 days in advance. The permit process is handled by a neutral administrator and applies to any group regardless of message. Under the framework described in the section, this ordinance is most likely:", "options": [{"text": "Unconstitutional, because any permit requirement is prior restraint on speech.", "isCorrect": false, "rationale": "The text expressly gives a parade permit as a permissible example of a time, place, and manner restriction—not a per se prior restraint."}, {"text": "Constitutional, as a content-neutral time, place, and manner restriction, provided it is narrowly tailored and leaves alternative channels open.", "isCorrect": true, "rationale": "The section explicitly states that a city may require a parade permit without violating the First Amendment, 'so long as the permit process does not discriminate based on the message.'"}, {"text": "Unconstitutional, because the First Amendment absolutely prohibits any regulation of political expression.", "isCorrect": false, "rationale": "The text states that 'the Supreme Court has never interpreted the speech clause as protecting all expression without limit'—reasonable regulation is allowed."}, {"text": "Constitutional only if the government can satisfy strict scrutiny for content-based restrictions.", "isCorrect": false, "rationale": "Strict scrutiny is the test for content-BASED restrictions. Content-NEUTRAL time, place, and manner restrictions use the three-prong test described in the section, not strict scrutiny."}], "id": "q03"}, {"question": "In Schenck v. United States (1919), Justice Holmes wrote that the character of speech depends on 'the circumstances in which it is made.' Which phrase best captures the standard he articulated?", "options": [{"text": "Imminent lawless action.", "isCorrect": false, "rationale": "This is the Brandenburg standard (1969), which the text says LATER refined and narrowed Schenck's approach."}, {"text": "Clear and present danger.", "isCorrect": true, "rationale": "The text quotes Holmes directly: speech may be restricted when the words 'create a clear and present danger that they will bring about the substantive evils that Congress has a right to prevent.'"}, {"text": "Substantial disruption.", "isCorrect": false, "rationale": "'Substantial disruption' is the standard from Tinker v. Des Moines for student speech, not from Schenck."}, {"text": "Actual malice.", "isCorrect": false, "rationale": "Actual malice is the defamation standard from New York Times v. Sullivan, not the Schenck wartime speech standard."}], "id": "q04"}, {"question": "A student at a public high school wears a black armband during class to silently protest an ongoing war. School officials suspend her without showing any actual classroom disturbance. Under Tinker v. Des Moines (1969), the school's action is most likely:", "options": [{"text": "Constitutional, because students shed their First Amendment rights when they enter a school building.", "isCorrect": false, "rationale": "The text directly quotes Tinker rejecting this view: students do not 'shed their constitutional rights to freedom of speech or expression at the schoolhouse gate.'"}, {"text": "Constitutional, because armbands are not 'pure speech.'", "isCorrect": false, "rationale": "Tinker described the armbands as 'closely akin to \"pure speech\"' and held them to be protected symbolic expression."}, {"text": "Unconstitutional, because the school failed to show that the expression caused or would cause a substantial disruption.", "isCorrect": true, "rationale": "Tinker held that school officials must 'demonstrate that the expression would cause a substantial disruption of school activities or invade the rights of others,' and a silent, passive protest that causes no disruption cannot be banned."}, {"text": "Unconstitutional, because all forms of student expression in school are absolutely protected.", "isCorrect": false, "rationale": "The section notes that later cases (Bethel, Hazelwood, Morse) recognized additional categories where schools MAY restrict student expression—student speech is not absolutely protected."}], "id": "q05"}, {"question": "Which of the following categories of speech is identified in the section as UNPROTECTED by the First Amendment?", "options": [{"text": "Truthful commercial speech about a lawful product.", "isCorrect": false, "rationale": "The text says 'truthful commercial speech about lawful products is generally protected,' although at an intermediate level."}, {"text": "Symbolic speech such as wearing armbands.", "isCorrect": false, "rationale": "Symbolic speech is explicitly listed among protected forms of expression."}, {"text": "Speech directed at producing imminent lawless action that is likely to produce such action.", "isCorrect": true, "rationale": "The section lists incitement under Brandenburg v. Ohio (1969) as an unprotected category: 'Speech directed at producing imminent lawless action and likely to produce such action.'"}, {"text": "Criticism of government policy.", "isCorrect": false, "rationale": "Criticism of government policy is core political speech, which receives the highest protection."}], "id": "q06"}, {"question": "According to the section, how did Brandenburg v. Ohio (1969) change the standard established in Schenck v. United States (1919)?", "options": [{"text": "Brandenburg abandoned Schenck's test entirely, holding that all speech about government is absolutely protected.", "isCorrect": false, "rationale": "Brandenburg narrowed the standard but did not adopt an absolute-protection rule; the text still identifies incitement as unprotected."}, {"text": "Brandenburg made it easier for the government to restrict speech by lowering the danger threshold.", "isCorrect": false, "rationale": "Brandenburg made restriction HARDER, not easier, by raising the threshold from 'clear and present danger' to imminent AND likely lawless action."}, {"text": "Brandenburg refined and narrowed Schenck by requiring that the speech be directed at imminent lawless action AND likely to produce such action.", "isCorrect": true, "rationale": "The section states the Brandenburg test 'requires that speech be directed at producing imminent lawless action and be likely to produce such action,' refining and narrowing Schenck's broader clear-and-present-danger approach."}, {"text": "Brandenburg extended First Amendment protections only to peacetime speech.", "isCorrect": false, "rationale": "Brandenburg's framework applies regardless of wartime or peacetime status; its focus is on imminence and likelihood, not wartime context."}], "id": "q07"}, {"question": "Which of the following describes the four elements of the Miller test for obscenity, as used by the Supreme Court?", "options": [{"text": "The material must be directed at children, contain nudity, appear in print, and be distributed commercially.", "isCorrect": false, "rationale": "The Miller test has nothing to do with targeting children, nudity alone, the print format, or commercial distribution as such."}, {"text": "The material must appeal to the prurient interest, depict sexual conduct in a patently offensive way, and lack serious literary, artistic, political, or scientific value—all taken as a whole.", "isCorrect": true, "rationale": "The text defines obscenity under Miller as material 'that, taken as a whole, appeals to the prurient interest, depicts sexual conduct in a patently offensive way, and lacks serious literary, artistic, political, or scientific value.'"}, {"text": "The material must incite lawless action and actually produce harm.", "isCorrect": false, "rationale": "This describes the Brandenburg incitement test, not the Miller obscenity test."}, {"text": "The material must defame a public figure without proof of actual malice.", "isCorrect": false, "rationale": "This describes the New York Times v. Sullivan defamation standard, not obscenity."}], "id": "q08"}, {"question": "A political activist posts an online message stating, 'I will kill the mayor tomorrow if he attends the rally.' Based on the section's categories of unprotected speech, this statement is most likely:", "options": [{"text": "Protected political commentary because it concerns public affairs.", "isCorrect": false, "rationale": "Although political speech is broadly protected, statements expressing a serious intent to commit violence against an identifiable person are NOT protected."}, {"text": "A 'true threat,' which the Court has identified as a category of unprotected speech.", "isCorrect": true, "rationale": "The section defines true threats as 'statements where the speaker means to communicate a serious intent to commit violence against an identifiable individual or group,' placing them outside First Amendment protection."}, {"text": "Symbolic speech protected under Tinker.", "isCorrect": false, "rationale": "Tinker's symbolic-speech framework involves expressive conduct like armbands, not statements of serious intent to commit violence."}, {"text": "Commercial speech subject to intermediate scrutiny.", "isCorrect": false, "rationale": "Commercial speech concerns advertising or business-related expression, which is irrelevant to a statement threatening to kill a public official."}], "id": "q09"}, {"question": "Why does the section say the First Amendment's speech clause gives the HIGHEST level of protection to political speech?", "options": [{"text": "Because political speech is rarely controversial and almost never restricted.", "isCorrect": false, "rationale": "The text describes political speech as frequently contested and protected precisely because it IS controversial, not because it is bland."}, {"text": "Because political speech lies at the core of self-governance.", "isCorrect": true, "rationale": "The text directly states political speech 'receives the highest level of protection because it lies at the core of self-governance.'"}, {"text": "Because political speech is always delivered in public forums.", "isCorrect": false, "rationale": "The venue of speech is not the rationale for protection; the rationale is democratic self-government."}, {"text": "Because the Framers explicitly listed political speech as the only form of speech protected by the First Amendment.", "isCorrect": false, "rationale": "The text makes no claim that the Framers restricted the First Amendment to 'political' speech—the Court protects many categories, with political speech receiving the highest tier."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
