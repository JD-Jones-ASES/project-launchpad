<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP U.S. Government and Politics &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Principles of American Government</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The Constitution distributes governmental authority among three branches: legislative, executive, and judicial. Which Enlightenment thinker does the text credit as the primary influence on this design, and what was his central argument?", "options": [{"text": "John Locke, who argued that government exists only to protect property", "isCorrect": false, "rationale": "Locke's influence is central elsewhere in the chapter, but the text names Montesquieu as the key source for separation of powers."}, {"text": "Baron de Montesquieu, who argued that concentrating legislative, executive, and judicial power in the same hands is the definition of tyranny", "isCorrect": true, "rationale": "The text states the Founders adopted separation of powers 'primarily from the French philosopher Baron de Montesquieu,' whose work argued concentrating these powers 'is the very definition of tyranny.'"}, {"text": "Thomas Hobbes, who argued that a single sovereign must hold all powers", "isCorrect": false, "rationale": "Hobbes favored concentrated sovereignty — the opposite of separation of powers."}, {"text": "Joseph Schumpeter, who argued that only elites should govern", "isCorrect": false, "rationale": "Schumpeter is associated with elite democracy (Topic 1.2), not with separation of powers."}]}, {"question": "Suppose the President vetoes a bill that the Senate believes is essential national policy. The Senate and House each muster a two-thirds vote to override the veto. Which constitutional mechanism is operating, and which branch is checking which?", "options": [{"text": "Judicial review; the courts are checking the executive.", "isCorrect": false, "rationale": "No court action is described; the scenario involves a congressional vote."}, {"text": "The veto override; the legislative branch is checking the executive.", "isCorrect": true, "rationale": "The text lists 'Congress can override a presidential veto with a two-thirds vote in both chambers' as a legislative check on the executive."}, {"text": "Impeachment; the executive is checking the legislative.", "isCorrect": false, "rationale": "Impeachment is a legislative check on the executive or judiciary; the scenario involves no impeachment and runs in the opposite direction."}, {"text": "Federalism; the states are checking the national government.", "isCorrect": false, "rationale": "No state action is described; all actors in the scenario are federal."}]}, {"question": "The Senate confirms presidential appointments to the cabinet and federal judiciary, ratifies treaties by a two-thirds vote, and controls the federal budget. According to the text, what is the overarching purpose of these specific powers?", "options": [{"text": "To grant Congress exclusive authority over foreign policy", "isCorrect": false, "rationale": "These powers check the executive but do not give Congress exclusive foreign-policy authority; treaty ratification requires presidential initiative."}, {"text": "They operate as legislative checks on the executive branch, preventing unilateral executive action.", "isCorrect": true, "rationale": "The text catalogs 'advice and consent,' treaty ratification, and the 'power of the purse' under 'Legislative checks on the Executive,' restraining unilateral executive action."}, {"text": "To allow the Senate to make laws without House agreement", "isCorrect": false, "rationale": "Both chambers are required for most legislation; these are checks on the executive, not a Senate-only legislative pathway."}, {"text": "To enable the judiciary to write legislation", "isCorrect": false, "rationale": "These are legislative powers over the executive, not judicial lawmaking."}]}, {"question": "James Madison argued in Federalist No. 51: 'Ambition must be made to counteract ambition.' According to the text, what does this phrase reveal about the constitutional design?", "options": [{"text": "That the system relies on the goodwill and virtue of individual officeholders", "isCorrect": false, "rationale": "The text says the opposite: 'Rather than relying on the goodwill of officeholders, the system harnesses human self-interest.'"}, {"text": "That the system harnesses the self-interest of officeholders in each branch as a structural check on every other branch", "isCorrect": true, "rationale": "The text explains Madison's argument: 'the system harnesses human self-interest to maintain the balance of power,' giving each branch 'both the incentive and the constitutional tools to resist encroachments by the other two.'"}, {"text": "That only a philosopher-king can balance power among branches", "isCorrect": false, "rationale": "Madison's design intentionally avoids reliance on any single virtuous ruler."}, {"text": "That the judiciary should be abolished to prevent ambition", "isCorrect": false, "rationale": "The text describes the judiciary as an essential part of the checking system, not a target for abolition."}]}, {"question": "Federalism, as described in the text, divides authority in which direction, and how does it differ from separation of powers?", "options": [{"text": "Federalism divides power horizontally among branches; separation of powers divides it vertically between levels.", "isCorrect": false, "rationale": "The text assigns the opposite directions to each principle."}, {"text": "Federalism divides power vertically between national and state governments; separation of powers divides it horizontally among the three branches.", "isCorrect": true, "rationale": "The text states separation of powers 'divides authority horizontally among the three branches' while 'federalism divides authority vertically between the national government and the state governments.'"}, {"text": "They are identical and interchangeable.", "isCorrect": false, "rationale": "The text distinguishes them by direction and function; they operate on different axes of power."}, {"text": "Federalism divides only judicial power; separation divides only executive power.", "isCorrect": false, "rationale": "Both principles affect all three branches at multiple levels; this mischaracterizes their scope."}]}, {"question": "According to the text, why was federalism considered a 'novel innovation' when the Constitution was drafted?", "options": [{"text": "Because no previous government had ever used elections", "isCorrect": false, "rationale": "Elections predated 1787 in various forms; that is not the innovation the text highlights."}, {"text": "Because political theorists had generally assumed sovereignty was indivisible, but the Founders created a system where sovereignty is shared between two levels of government, each supreme within its own domain", "isCorrect": true, "rationale": "The text states 'political theorists generally assumed that sovereignty was indivisible' and that the Founders created 'a system in which sovereignty is shared between two levels of government, each supreme within its own domain.'"}, {"text": "Because it was the first government to use written laws", "isCorrect": false, "rationale": "Written laws predate American federalism by millennia; this is not the innovation described."}, {"text": "Because it eliminated all state governments", "isCorrect": false, "rationale": "Federalism preserves state governments; it does not eliminate them."}]}, {"question": "Although the Constitution does not explicitly mention the power, courts routinely strike down acts of Congress and executive actions as unconstitutional. Which landmark decision established this practice, and which Chief Justice authored the opinion?", "options": [{"text": "McCulloch v. Maryland (1819), authored by Chief Justice John Marshall", "isCorrect": false, "rationale": "Although Marshall authored McCulloch, that case addressed implied powers — not the establishment of judicial review."}, {"text": "Marbury v. Madison (1803), authored by Chief Justice John Marshall", "isCorrect": true, "rationale": "The text states judicial review 'was established by Chief Justice John Marshall in Marbury v. Madison (1803).'"}, {"text": "United States v. Lopez (1995), authored by Chief Justice William Rehnquist", "isCorrect": false, "rationale": "Lopez addressed Commerce Clause limits, not the establishment of judicial review, and occurred nearly two centuries after Marbury."}, {"text": "Federalist No. 51 (1788), authored by James Madison", "isCorrect": false, "rationale": "The Federalist Papers are essays, not Supreme Court decisions, and judicial review was established in 1803."}]}, {"question": "The Tenth Amendment reserves to the states or to the people all powers not delegated to the United States nor prohibited to the states. According to the text, what principle does the Tenth Amendment most directly express?", "options": [{"text": "Judicial review, because courts must enforce the Tenth Amendment", "isCorrect": false, "rationale": "While courts interpret the Tenth Amendment, the amendment itself expresses limited government and federalism, not the courts' review power."}, {"text": "Limited government: the federal government may exercise only those powers granted by the Constitution, with remaining powers reserved.", "isCorrect": true, "rationale": "The text states 'The Tenth Amendment makes this explicit' immediately after defining limited government."}, {"text": "Direct democracy, because the people can nullify federal laws", "isCorrect": false, "rationale": "The Tenth Amendment is about enumerated versus reserved powers, not citizen nullification of federal law."}, {"text": "Elite democracy, because elites control state governments", "isCorrect": false, "rationale": "The Tenth Amendment's principle is limited government; it makes no claim about who holds state power."}]}, {"question": "In Federalist No. 51, Madison wrote: 'If men were angels, no government would be necessary. If angels were to govern men, neither external nor internal controls on government would be necessary.' Based on the text's analysis, what does this rhetorical construction accomplish?", "options": [{"text": "It argues that government is unnecessary because humans are basically virtuous.", "isCorrect": false, "rationale": "Madison argues the opposite — humans are not angels, and government is needed."}, {"text": "It justifies a monarchy over representative institutions.", "isCorrect": false, "rationale": "Madison was defending a republican constitution, not monarchy."}, {"text": "It acknowledges human self-interest and ambition, and uses that realistic view to defend a dual-purpose design: government must control the governed AND control itself.", "isCorrect": true, "rationale": "The text's analysis states precisely this: Madison 'acknowledged that people are not angels' and that the Constitution must be structured so government can 'control the governed' and also 'control itself.'"}, {"text": "It argues that checks and balances are unnecessary if the right people are elected.", "isCorrect": false, "rationale": "Madison's entire point is that structural checks are necessary because you cannot count on the right people; the scheme relies on institutional design, not personal virtue."}]}, {"question": "Article IV, Section 4 guarantees every state a 'Republican Form of Government.' Based on the text, what does this provision prohibit?", "options": [{"text": "It prohibits states from establishing a monarchy, dictatorship, or direct democracy inconsistent with representative government.", "isCorrect": true, "rationale": "The text states the Guarantee Clause 'ensures that no state can establish a monarchy, dictatorship, or direct democracy inconsistent with representative government.'"}, {"text": "It prohibits states from holding elections more often than every four years.", "isCorrect": false, "rationale": "The text sets no such minimum; the Guarantee Clause concerns the form of state government, not election frequency."}, {"text": "It prohibits the federal government from using judicial review.", "isCorrect": false, "rationale": "The Guarantee Clause does not address judicial review."}, {"text": "It prohibits the existence of the Republican Party.", "isCorrect": false, "rationale": "The text explicitly distinguishes republican government from the political party, and the Clause does not address party politics."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
