    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Ratification of the U.S. Constitution</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "In May 1787, delegates gathered in Philadelphia for what was officially called the Federal Convention. Which state refused to send delegates, and why, based on the text?", "options": [{"text": "Virginia, because it had already proposed a competing constitution", "isCorrect": false, "rationale": "Virginia was active at the convention; George Washington (a Virginian) presided."}, {"text": "Rhode Island, because it was suspicious of any effort to strengthen the national government", "isCorrect": true, "rationale": "The text states 'Rhode Island, suspicious of any effort to strengthen the national government, refused to send delegates.'"}, {"text": "New York, because it already had its own constitution", "isCorrect": false, "rationale": "New York sent delegates, including Alexander Hamilton."}, {"text": "Massachusetts, because it was recovering from Shays' Rebellion", "isCorrect": false, "rationale": "Massachusetts participated in the convention; its recent rebellion actually heightened its interest in strengthening the national government."}], "id": "q01"}, {"question": "The text states that delegates at the Constitutional Convention conducted their proceedings in strict secrecy, with sentries posted and windows shut despite the summer heat. What purpose did this secrecy serve, according to the text?", "options": [{"text": "It prevented the British Crown from learning the convention's agenda.", "isCorrect": false, "rationale": "The text does not cite British espionage as the reason; secrecy was an internal political strategy."}, {"text": "It allowed delegates to speak candidly, change their minds, and negotiate compromises without political pressure from constituents or the press.", "isCorrect": true, "rationale": "The text states 'This secrecy allowed delegates to speak candidly, change their minds, and negotiate compromises without political pressure from constituents or the press.'"}, {"text": "It was required by the Articles of Confederation.", "isCorrect": false, "rationale": "No such requirement existed under the Articles; the delegates chose secrecy themselves."}, {"text": "It protected the delegates from Shays' rebels.", "isCorrect": false, "rationale": "Shays' Rebellion was largely suppressed by early 1787, and the secrecy was about political deliberation, not physical safety."}], "id": "q02"}, {"question": "The text describes the convention delegates' decision to set aside the Articles and draft a new constitution as 'by any strict reading of their mandate, revolutionary.' Which of the following best explains that characterization?", "options": [{"text": "Congress had authorized them only to propose revisions to the Articles of Confederation, not to replace them.", "isCorrect": true, "rationale": "The text states Congress authorized them 'only to propose revisions to the Articles of Confederation,' so drafting a new document exceeded their mandate."}, {"text": "The delegates were secretly loyal to Britain and wanted to restore monarchy.", "isCorrect": false, "rationale": "The text provides no evidence of British loyalty; the delegates were American political leaders forming a new national government."}, {"text": "The delegates had no legal authority to meet at all.", "isCorrect": false, "rationale": "Congress had in fact authorized the convention; the issue was that delegates exceeded the scope of their mandate."}, {"text": "They refused to allow any state to participate.", "isCorrect": false, "rationale": "Twelve of thirteen states participated; only Rhode Island abstained."}], "id": "q03"}, {"question": "According to the ratification data and text, New Hampshire was the ninth state to ratify the Constitution, making it legally effective. Why might the Founders have chosen a nine-state threshold rather than unanimous consent?", "options": [{"text": "Because the Articles themselves required a nine-state threshold for ratification.", "isCorrect": false, "rationale": "The Articles required unanimous consent; the new Constitution deliberately departed from that standard."}, {"text": "Because unanimity had proven a fatal flaw in the Articles, allowing a single state to block reform; a supermajority threshold ensured the Constitution could take effect over any single state's objection.", "isCorrect": true, "rationale": "The text's questions invite precisely this inference: the 'fatal flaw' of unanimous consent under the Articles made the Founders design a lower, supermajority threshold that could not be blocked by any one state."}, {"text": "Because only nine states actually existed at the time.", "isCorrect": false, "rationale": "There were thirteen states; nine was a supermajority threshold, not a total count."}, {"text": "Because the British monarchy required a nine-state agreement for any American constitution.", "isCorrect": false, "rationale": "The text offers no such British requirement; the Constitution was a purely American design."}], "id": "q04"}, {"question": "The ratification table shows that the Virginia convention voted 89–79 and New York's voted 30–27. Based on the text's invitation to analyze these margins, which interpretation is best supported?", "options": [{"text": "Virginia and New York ratified unanimously after brief debate.", "isCorrect": false, "rationale": "The vote margins (10 votes in Virginia, 3 votes in New York) show the opposite of unanimity."}, {"text": "Virginia and New York were among the closest ratification contests, suggesting strong Anti-Federalist opposition in both states.", "isCorrect": true, "rationale": "The table lists narrow margins (+10 and +3) and the 'Questions' section explicitly asks students to consider 'strong opposition in those states,' consistent with significant Anti-Federalist presence."}, {"text": "Virginia and New York refused to ratify the Constitution.", "isCorrect": false, "rationale": "Both states ratified in 1788, as the table shows."}, {"text": "New York ratified before Virginia, indicating northeast enthusiasm.", "isCorrect": false, "rationale": "The table shows Virginia ratified June 25, 1788 — before New York on July 26, 1788."}], "id": "q05"}, {"question": "The text's Check Your Understanding prompt asks students to compare the Virginia Plan and the New Jersey Plan and explain how the Great Compromise resolved their dispute. Based on general AP Gov knowledge consistent with the text, which statement best summarizes the Great Compromise?", "options": [{"text": "It created a single-chamber legislature with proportional representation, favoring the Virginia Plan.", "isCorrect": false, "rationale": "A single chamber with proportional representation is the Virginia Plan itself, not the compromise."}, {"text": "It established a bicameral legislature: a House apportioned by population (from the Virginia Plan) and a Senate with equal state representation (from the New Jersey Plan).", "isCorrect": true, "rationale": "The text invites this comparison in its Check Your Understanding; this resolution bridges the Virginia Plan (population-based representation) and the New Jersey Plan (equal state representation) that the section places in dialogue."}, {"text": "It eliminated the legislative branch altogether in favor of a single elected president.", "isCorrect": false, "rationale": "The compromise produced Congress; it did not eliminate the legislature."}, {"text": "It required each state to ratify separately with unanimous consent.", "isCorrect": false, "rationale": "Unanimous ratification was the Articles' rule; the Constitution required nine states. The Great Compromise concerned legislative representation, not ratification rules."}], "id": "q06"}, {"question": "A Federalist pamphleteer in 1788 argues that the new Constitution's structure — separation of powers, checks and balances, and a strong national government — is necessary to preserve liberty and prevent the chaos seen under the Articles. An Anti-Federalist replies that the new plan will create a distant, unresponsive government. Based on the text, which claim does the Anti-Federalist's critique most closely echo?", "options": [{"text": "James Madison's argument in Federalist No. 51 that 'ambition must counteract ambition'", "isCorrect": false, "rationale": "This is a Federalist argument in favor of the Constitution, not an Anti-Federalist critique."}, {"text": "The concern expressed in Brutus No. 1 that a large republic would produce a government distant from and unresponsive to its citizens", "isCorrect": true, "rationale": "The text's Check Your Understanding explicitly invites Anti-Federalist arguments, and Brutus No. 1 (cited in Topic 1.3) is the canonical Anti-Federalist expression of the 'distant, unresponsive government' concern."}, {"text": "Locke's argument that government should protect natural rights", "isCorrect": false, "rationale": "Locke's natural rights framework was common ground for both sides; the distinctive Anti-Federalist argument was about scale and distance."}, {"text": "Hobbes's argument that strong central authority prevents chaos", "isCorrect": false, "rationale": "This view supported the Federalist case for a stronger national government, not the Anti-Federalist critique."}], "id": "q07"}, {"question": "Based on the text's invitation to evaluate the importance of Marbury v. Madison, which statement best explains why that 1803 decision is 'considered one of the most important Supreme Court decisions in American history'?", "options": [{"text": "It established the presidency's unlimited authority over foreign affairs.", "isCorrect": false, "rationale": "Marbury addressed the judicial power, not presidential foreign affairs authority."}, {"text": "It established the principle of judicial review — the courts' power to declare laws unconstitutional — which the Constitution did not explicitly grant.", "isCorrect": true, "rationale": "The text references Marbury's importance in its Check Your Understanding prompt; the case is canonical for establishing the Supreme Court's power of judicial review, a principle not explicitly stated in the Constitution."}, {"text": "It required states to ratify amendments with unanimous consent.", "isCorrect": false, "rationale": "The amendment process is fixed by Article V, not by Marbury v. Madison."}, {"text": "It abolished slavery in the federal territories.", "isCorrect": false, "rationale": "Marbury addressed judicial review, not slavery; the subsequent Dred Scott case addressed (and notoriously expanded) slavery in territories."}], "id": "q08"}, {"question": "The delegates at the convention included George Washington (president of the convention), Benjamin Franklin, James Madison, Alexander Hamilton, and Gouverneur Morris. What does the text's identification of these figures suggest about the convention's political significance?", "options": [{"text": "That the convention was held without attention from prominent leaders", "isCorrect": false, "rationale": "The text describes these delegates as 'some of the most prominent figures in American political life,' undercutting this claim."}, {"text": "That the convention attracted some of the most prominent political figures in the new nation, giving its proceedings exceptional weight", "isCorrect": true, "rationale": "The text explicitly states the attendees 'included some of the most prominent figures in American political life,' signaling the convention's high political stature."}, {"text": "That only one state contributed influential delegates", "isCorrect": false, "rationale": "The named figures came from multiple states (Virginia, Pennsylvania, New York), demonstrating broad participation."}, {"text": "That the convention was led entirely by Benjamin Franklin", "isCorrect": false, "rationale": "George Washington, not Franklin, was elected president of the convention."}], "id": "q09"}, {"question": "Rhode Island did not ratify the Constitution until May 1790 — nearly two years after the document took legal effect in June 1788. Based on the text, what best explains Rhode Island's long delay?", "options": [{"text": "Rhode Island had ratified immediately but was ignored by Congress.", "isCorrect": false, "rationale": "The ratification date in the text is May 29, 1790, showing late, not immediate, ratification."}, {"text": "Rhode Island had refused to send delegates to the convention and remained deeply suspicious of national government strengthening; it also ratified by the narrowest margin (34–32).", "isCorrect": true, "rationale": "The text notes Rhode Island 'refused to send delegates' out of suspicion of a stronger national government, and the table shows a 34–32 ratification vote — the closest margin — consistent with prolonged resistance."}, {"text": "Rhode Island was still under British colonial rule until 1790.", "isCorrect": false, "rationale": "Independence was achieved in 1783; Rhode Island was an independent state throughout this period."}, {"text": "Rhode Island ratified quickly but demanded a different document.", "isCorrect": false, "rationale": "The table shows late ratification of the actual Constitution, not a different document."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
