<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP U.S. Government and Politics &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Modern Campaigns</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best distinguishes a campaign's 'ground game' from its 'air war'?", "options": [{"text": "The ground game refers to door-to-door canvassing, phone banking, and turnout operations; the air war refers to paid media such as television and digital advertising.", "isCorrect": true, "rationale": "The text defines the ground game as field operations (canvassing, phone banking, registration drives, Election Day turnout) and the air war as all forms of paid media, particularly television and digital advertising."}, {"text": "The ground game refers to campaign events held in airports; the air war refers to outdoor rallies.", "isCorrect": false, "rationale": "This reverses and misinterprets the terminology; neither is defined this way in the text."}, {"text": "The ground game is legally regulated, while the air war is not.", "isCorrect": false, "rationale": "The text does not draw this regulatory distinction."}, {"text": "The ground game is used only in primaries; the air war is used only in general elections.", "isCorrect": false, "rationale": "Both are used across both kinds of elections; the text treats them as complementary components."}], "id": "q01"}, {"question": "Which of the following best explains why campaigns use data analytics for 'targeting' rather than reaching every voter with equal intensity?", "options": [{"text": "Federal law forbids campaigns from contacting every registered voter.", "isCorrect": false, "rationale": "No such law exists; targeting is driven by strategy, not legal prohibition."}, {"text": "Campaigns have limited resources, so they prioritize swing voters and low-propensity supporters where marginal effort produces the most impact.", "isCorrect": true, "rationale": "The text states that campaigns 'cannot reach every voter with equal intensity' and therefore target swing voters and low-propensity supporters for the most impact."}, {"text": "The FEC requires all campaigns to target only voters over 65.", "isCorrect": false, "rationale": "No such FEC rule exists."}, {"text": "Polling data is not available to modern campaigns.", "isCorrect": false, "rationale": "The text states that polling and data analytics are central to modern campaign strategy."}], "id": "q02"}, {"question": "A campaign uses voter registration files, consumer data, and television viewing habits to build detailed profiles of persuadable voters and send different ads to each segment. Which concept does this best illustrate?", "options": [{"text": "Horse-race journalism", "isCorrect": false, "rationale": "Horse-race journalism refers to media coverage of election 'winners,' not a campaign strategy."}, {"text": "Micro-targeting", "isCorrect": true, "rationale": "The text defines micro-targeting as using data analytics to identify and contact individual voters with tailored messages, merging voter registration files with consumer data such as magazine subscriptions, car purchases, and television viewing habits."}, {"text": "Astroturfing", "isCorrect": false, "rationale": "Astroturfing creates fake grassroots support; it is not individualized targeting."}, {"text": "Franking privilege", "isCorrect": false, "rationale": "The franking privilege allows incumbents to send official mail; it is not data-driven targeting."}], "id": "q03"}, {"question": "According to the text, which campaign is credited with pioneering the use of micro-targeting in presidential politics?", "options": [{"text": "The 2008 McCain campaign", "isCorrect": false, "rationale": "The text attributes the pioneering role to Obama in 2012, not McCain in 2008."}, {"text": "The 2012 Obama campaign", "isCorrect": true, "rationale": "The text states, 'The 2012 Obama campaign pioneered the use of micro-targeting.'"}, {"text": "The 1992 Clinton campaign", "isCorrect": false, "rationale": "The 1992 campaign predates the data analytics described; the text identifies 2012 as the pioneering campaign."}, {"text": "The 1980 Reagan campaign", "isCorrect": false, "rationale": "Reagan's campaign is cited for its messaging, not for pioneering data analytics."}], "id": "q04"}, {"question": "Which of the following best describes 'opposition research' as defined in the text?", "options": [{"text": "Survey research conducted on behalf of the opposition party by an independent pollster.", "isCorrect": false, "rationale": "Opposition research is not a survey; it is investigative work about the opponent."}, {"text": "Systematic investigation of an opponent's record, statements, finances, and personal history to identify vulnerabilities.", "isCorrect": true, "rationale": "The text defines opposition research as the systematic investigation of an opponent's record, statements, finances, and personal history, with the goal of identifying vulnerabilities to exploit."}, {"text": "The party's official fact-check of its own campaign ads.", "isCorrect": false, "rationale": "Internal fact-checking is not opposition research; opposition research targets the opponent."}, {"text": "A legal filing at the Federal Election Commission challenging an opponent's finances.", "isCorrect": false, "rationale": "The text describes opposition research as information gathering, not FEC litigation."}], "id": "q05"}, {"question": "Which of the following best describes the Cambridge Analytica controversy referenced in the text?", "options": [{"text": "Campaign volunteers falsified signatures on ballot petitions.", "isCorrect": false, "rationale": "The controversy involved Facebook data, not ballot petitions."}, {"text": "Millions of Facebook users' data were harvested without meaningful consent and used to target political advertisements with extraordinary precision.", "isCorrect": true, "rationale": "The text states that Cambridge Analytica used Facebook data to target political advertisements with extraordinary precision, and that millions of users' data had been harvested without meaningful consent."}, {"text": "Foreign governments directly donated to a presidential campaign.", "isCorrect": false, "rationale": "That would involve separate foreign-contribution allegations, not the Cambridge Analytica data issue described in the text."}, {"text": "Campaign staff used federal government computers to run ads.", "isCorrect": false, "rationale": "The text describes a Facebook data harvesting controversy, not government computer use."}], "id": "q06"}, {"question": "A campaign manager says, 'Our message must be simple, memorable, and repeated.' Which of the following historical campaign messages is cited in the text as an example of this principle?", "options": [{"text": "Thomas Jefferson's 'Equal rights for all, special privileges for none.'", "isCorrect": false, "rationale": "This line is historically attributed to Jefferson but is not cited in the text as a modern campaign example."}, {"text": "Ronald Reagan's 'Are you better off than you were four years ago?' and Barack Obama's 'Hope and Change.'", "isCorrect": true, "rationale": "The text uses both of these slogans as examples of messaging that resonated with voters."}, {"text": "Franklin D. Roosevelt's 'I like Ike.'", "isCorrect": false, "rationale": "'I like Ike' was Eisenhower's slogan, not FDR's, and is not the example cited in the text."}, {"text": "Richard Nixon's 'Yes We Can.'", "isCorrect": false, "rationale": "'Yes We Can' is associated with Obama, not Nixon."}], "id": "q07"}, {"question": "Which of the following best describes a use of internal polling in modern campaigns, according to the text?", "options": [{"text": "Internal polls are used to test messages, assess candidate favorability, and identify which issues resonate with which demographic groups.", "isCorrect": true, "rationale": "The text states that campaigns use internal polls to test messages, assess candidate favorability, and identify which issues resonate with which demographic groups."}, {"text": "Internal polls are publicly released to shape national narratives.", "isCorrect": false, "rationale": "Public polls shape the broader narrative; internal polls typically inform campaign strategy."}, {"text": "Internal polling has been banned by the FEC since the 1990s.", "isCorrect": false, "rationale": "No such FEC ban exists; internal polling is standard practice."}, {"text": "Internal polling is used only by incumbents, not challengers.", "isCorrect": false, "rationale": "The text does not restrict internal polling to incumbents; it is broadly used by campaigns."}], "id": "q08"}, {"question": "A campaign strategist argues that despite the rise of digital campaigning, direct personal contact remains essential. Which of the following pieces of evidence from the text most directly supports this claim?", "options": [{"text": "Campaigns increasingly rely on Super PACs for fundraising.", "isCorrect": false, "rationale": "That concerns campaign finance rather than voter contact effectiveness."}, {"text": "Campaigns that invest in ground game infrastructure typically outperform those that rely solely on advertising.", "isCorrect": true, "rationale": "The text states that direct personal contact remains one of the most effective methods of persuading and mobilizing voters, and that campaigns investing in ground game infrastructure typically outperform those that rely solely on advertising."}, {"text": "Negative advertising consistently depresses an opponent's support.", "isCorrect": false, "rationale": "That is a claim about advertising effectiveness, not the ground game."}, {"text": "Micro-targeting has moved heavily onto social media platforms.", "isCorrect": false, "rationale": "That describes the shift of digital targeting, not the value of personal contact."}], "id": "q09"}, {"question": "Which of the following best characterizes the trade-off that the text identifies in the rise of social media campaigning?", "options": [{"text": "Social media has centralized political communication under a few gatekeepers.", "isCorrect": false, "rationale": "The text says social media has democratized communication by bypassing gatekeepers, not centralized it."}, {"text": "Social media has democratized political communication but has also created new vulnerabilities to misinformation and manipulation.", "isCorrect": true, "rationale": "The text describes the trade-off explicitly: social media has democratized political communication while also creating new vulnerabilities to misinformation and manipulation."}, {"text": "Social media has eliminated the need for door-to-door canvassing.", "isCorrect": false, "rationale": "The text still identifies ground-game operations as essential, not eliminated."}, {"text": "Social media can only be used by candidates, not by ordinary citizens.", "isCorrect": false, "rationale": "The text says citizens can share, comment on, and amplify political content, so usage is not limited to candidates."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
