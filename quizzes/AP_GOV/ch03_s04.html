    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Freedom of the Press</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The section describes the free press as serving a 'structural function' in American democracy. Which statement best captures that function?", "options": [{"text": "The press generates revenue for government through advertising taxes.", "isCorrect": false, "rationale": "Press revenue is not the structural function the section describes. The text identifies the press's watchdog role, not tax revenue."}, {"text": "An independent press acts as a watchdog on government power, informing citizens and enabling self-governance.", "isCorrect": true, "rationale": "The text states that 'an independent press acts as a watchdog on government power, informing citizens and enabling self-governance.'"}, {"text": "The press represents political parties in elections.", "isCorrect": false, "rationale": "Political parties represent themselves in elections; the press is described as independent, not a party organ."}, {"text": "The press administers the electoral process by counting votes.", "isCorrect": false, "rationale": "Vote counting is a governmental function, not a press function."}]}, {"question": "The federal government obtains a court injunction stopping a newspaper from publishing a story about alleged government misconduct. The newspaper challenges the order. Based on the doctrine described in the section, the government must overcome:", "options": [{"text": "The rational basis test.", "isCorrect": false, "rationale": "Rational basis is a deferential equal protection or due process standard. Prior restraint of the press faces a much higher bar."}, {"text": "A 'heavy presumption' of unconstitutionality against prior restraint.", "isCorrect": true, "rationale": "The text explicitly states that 'prior restraints carry a \"heavy presumption\" of unconstitutionality, meaning the government must meet an extraordinarily high burden to justify censoring expression in advance.'"}, {"text": "Only a preponderance of the evidence.", "isCorrect": false, "rationale": "The text describes the burden as 'extraordinarily high,' not a simple preponderance."}, {"text": "Simply a showing that publication may cause some inconvenience.", "isCorrect": false, "rationale": "Mere inconvenience is far below the standard required to justify prior restraint. 'Heavy presumption of unconstitutionality' is the governing standard."}]}, {"question": "In New York Times Co. v. United States (1971), why did the Supreme Court reject the Nixon administration's attempt to halt publication of the Pentagon Papers?", "options": [{"text": "Because the newspapers had obtained the papers legally.", "isCorrect": false, "rationale": "The Court did not hinge its ruling on how the papers were obtained; it focused on the government's failure to meet the heavy burden for prior restraint."}, {"text": "Because the government had not met the 'heavy burden' required to justify prior restraint.", "isCorrect": true, "rationale": "The text states: 'the Supreme Court ruled that the government had not met the \"heavy burden\" required to justify a prior restraint on publication.'"}, {"text": "Because national security concerns never justify any restriction on the press.", "isCorrect": false, "rationale": "The Court did not rule that national security NEVER justifies restriction; Justice Stewart's concurrence allowed for restraint in cases of 'direct, immediate, and irreparable damage.'"}, {"text": "Because the Court ordered the government to declassify all documents.", "isCorrect": false, "rationale": "The Court did not order declassification; it lifted the injunction against publication."}]}, {"question": "The section distinguishes between PRIOR RESTRAINT and SUBSEQUENT PUNISHMENT. Which statement best captures the distinction?", "options": [{"text": "Prior restraint silences speech entirely; subsequent punishment allows the public to hear the expression and evaluate it.", "isCorrect": true, "rationale": "The text states: 'The distinction matters because prior restraint silences speech entirely, while subsequent punishment allows the public to hear the expression and evaluate it.'"}, {"text": "Prior restraint is always constitutional; subsequent punishment is always unconstitutional.", "isCorrect": false, "rationale": "The relationship is reversed: prior restraint carries a heavy PRESUMPTION of unconstitutionality, while subsequent punishment is generally permissible."}, {"text": "Prior restraint applies only to books; subsequent punishment applies only to newspapers.", "isCorrect": false, "rationale": "The distinction is temporal (before or after publication), not medium-based."}, {"text": "Prior restraint is imposed by state courts; subsequent punishment is imposed by federal courts.", "isCorrect": false, "rationale": "Both types of action can be imposed at either level; the distinction is timing relative to publication, not judicial level."}]}, {"question": "A newspaper publishes a story based on information from a confidential source alleging official corruption. A grand jury subpoenas the reporter to identify the source. Under federal law as described in the section, the reporter's options are best summarized as:", "options": [{"text": "The reporter has an absolute constitutional privilege under the First Amendment to refuse to testify.", "isCorrect": false, "rationale": "The text states: 'In Branzburg v. Hayes (1972), the Supreme Court ruled that the First Amendment does not grant reporters an absolute privilege to refuse to testify before grand juries.'"}, {"text": "The reporter must reveal the source immediately; no protection exists at any level.", "isCorrect": false, "rationale": "The section notes that most states have shield laws, and federal courts often use a Powell-style balancing test—so some protection exists, just not absolute."}, {"text": "There is no federal shield law, but courts may balance press freedom against the need for testimony under the approach suggested by Justice Powell's concurrence in Branzburg.", "isCorrect": true, "rationale": "The text explains: 'there is no federal shield law... Justice Powell's concurrence suggested that courts should balance press freedom against the need for testimony on a case-by-case basis, and many lower courts have adopted this balancing approach.'"}, {"text": "The reporter is automatically shielded by the relevant state's shield law even in federal court.", "isCorrect": false, "rationale": "State shield laws may not automatically control federal proceedings; federal law is unsettled. The text describes federal law as having 'no federal shield law,' leaving room for balancing, not automatic state-law protection."}]}, {"question": "A local newspaper publishes a story falsely claiming that a senator accepted a bribe. The senator sues for libel. Under the standard described in the section, what must the senator prove to recover damages?", "options": [{"text": "That the statement was false and damaged his reputation.", "isCorrect": false, "rationale": "Because the senator is a public official, under New York Times v. Sullivan he must ALSO prove actual malice—mere falsity and reputational harm are not enough."}, {"text": "That the statement was made with 'actual malice'—knowledge of falsity or reckless disregard for the truth.", "isCorrect": true, "rationale": "The text states that under New York Times v. Sullivan (1964), public officials must prove actual malice: 'that the statement was made with knowledge of its falsity or with reckless disregard for the truth.'"}, {"text": "That the newspaper obtained the information from an anonymous source.", "isCorrect": false, "rationale": "Sourcing is not the legal standard; actual malice (knowledge of falsity or reckless disregard) is the governing test for public official defamation claims."}, {"text": "That the newspaper had a larger readership than his own campaign communications.", "isCorrect": false, "rationale": "Readership is irrelevant to the actual malice standard."}]}, {"question": "Based on the section, why is the Pentagon Papers case considered a 'landmark precedent'?", "options": [{"text": "It established that all government secrets may be published at any time.", "isCorrect": false, "rationale": "The text does not support unlimited publication of all government secrets. Rather, the case set an extremely high bar for prior restraint but did not eliminate limits entirely."}, {"text": "It affirmed that national security claims alone do not override the First Amendment's protection of a free press.", "isCorrect": true, "rationale": "The text concludes: 'It affirmed the press's role as a check on government power and reinforced the principle that national security claims alone do not override the First Amendment's protection of a free press.'"}, {"text": "It required Congress to pass a shield law for reporters.", "isCorrect": false, "rationale": "The section states explicitly there is 'no federal shield law.' The Pentagon Papers case did not address or require one."}, {"text": "It overruled New York Times v. Sullivan.", "isCorrect": false, "rationale": "The two cases address different issues; New York Times v. Sullivan governs defamation of public officials and remains good law."}]}, {"question": "Justice Stewart's separate view in the Pentagon Papers case suggested that prior restraint MIGHT be permissible when:", "options": [{"text": "The government is embarrassed by the information.", "isCorrect": false, "rationale": "Embarrassment is not a basis Stewart articulated; he required direct, immediate, and irreparable damage."}, {"text": "Publication would 'surely result in direct, immediate, and irreparable damage to our Nation or its people.'", "isCorrect": true, "rationale": "The text quotes Stewart: 'restraint would be justified only if publication would \"surely result in direct, immediate, and irreparable damage to our Nation or its people.\"'"}, {"text": "The information concerns any classified document.", "isCorrect": false, "rationale": "Classification status alone is not sufficient under Stewart's formulation; the harm must be direct, immediate, and irreparable."}, {"text": "A foreign government opposes publication.", "isCorrect": false, "rationale": "Foreign government opposition is not a constitutional test; Stewart focused on U.S. national harm, not foreign relations."}]}, {"question": "Why, according to the section, does the Supreme Court view prior restraint as MORE serious than subsequent punishment?", "options": [{"text": "Because prior restraint leads to higher monetary fines than subsequent punishment.", "isCorrect": false, "rationale": "The comparison is not about financial penalties; it is about whether speech is ever heard at all."}, {"text": "Because prior restraint silences speech entirely, while subsequent punishment allows the public to hear and evaluate it first.", "isCorrect": true, "rationale": "The section explicitly notes that prior restraint 'silences speech entirely, while subsequent punishment allows the public to hear the expression and evaluate it.'"}, {"text": "Because prior restraint is unconstitutional while subsequent punishment is always constitutional.", "isCorrect": false, "rationale": "The section does not say subsequent punishment is always constitutional. It says prior restraint is the 'most serious and the least tolerable infringement' on press rights."}, {"text": "Because subsequent punishment only applies to private citizens, not journalists.", "isCorrect": false, "rationale": "The section describes subsequent punishment as applying to 'publishers,' not distinguished by private/journalist status."}]}, {"question": "The phrase 'heavy presumption against its constitutional validity' appears in the Pentagon Papers per curiam opinion. Which procedural inference follows most directly from this phrase?", "options": [{"text": "Once the government seeks prior restraint, the burden shifts to the government to overcome a strong presumption that the restraint is unconstitutional.", "isCorrect": true, "rationale": "The phrase 'heavy presumption against constitutional validity' means the default position is that the restraint is unconstitutional, and the government bears the high burden of rebutting that presumption."}, {"text": "The newspaper bears the burden of proving the publication serves the public interest.", "isCorrect": false, "rationale": "The burden is reversed; the government, not the press, bears the burden when seeking prior restraint."}, {"text": "Prior restraints are automatically invalid with no opportunity for the government to justify them.", "isCorrect": false, "rationale": "A 'heavy presumption' can be rebutted, though only with an 'extraordinarily high burden.' Prior restraint is not automatically void."}, {"text": "Courts should review prior restraints only in times of declared war.", "isCorrect": false, "rationale": "The presumption applies in all circumstances, not only during declared war."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
