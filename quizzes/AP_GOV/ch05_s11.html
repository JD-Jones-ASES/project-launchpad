<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP U.S. Government and Politics &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Campaign Finance</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the Total Spending in Federal Elections table, which period shows the most dramatic increase in outside spending, and what legal change best explains it?", "options": [{"text": "2000 to 2004, caused by the passage of FECA.", "isCorrect": false, "rationale": "FECA was enacted in 1971 and outside spending rose only modestly from $0.1 to $0.2 billion in that window."}, {"text": "2008 to 2012, when outside spending jumped from $0.3 billion to $1.1 billion following Citizens United v. FEC (2010).", "isCorrect": true, "rationale": "The table shows outside spending rising from $0.3 billion in 2008 to $1.1 billion in 2012, and the text attributes this surge to Citizens United striking down BCRA's restrictions on corporate and union independent expenditures."}, {"text": "2000 to 2008, caused by the Bipartisan Campaign Reform Act.", "isCorrect": false, "rationale": "BCRA (McCain-Feingold) was designed to reduce soft money, and outside spending rose only modestly over this interval."}, {"text": "2020 to 2024, caused by the ratification of the Twenty-Sixth Amendment.", "isCorrect": false, "rationale": "The Twenty-Sixth Amendment concerns the voting age, not campaign finance. The largest jump in outside spending occurred following Citizens United."}], "id": "q01"}, {"question": "Which of the following best summarizes the holding of Buckley v. Valeo (1976)?", "options": [{"text": "Both contribution limits and expenditure limits are unconstitutional.", "isCorrect": false, "rationale": "Buckley upheld contribution limits as valid anti-corruption measures."}, {"text": "Contribution limits may be upheld, but expenditure limits are unconstitutional restrictions on political speech.", "isCorrect": true, "rationale": "The text explicitly states that Buckley upheld contribution limits as valid anti-corruption measures while striking down expenditure limits as unconstitutional restrictions on political speech."}, {"text": "Corporations may contribute directly to candidates without any limit.", "isCorrect": false, "rationale": "Buckley did not remove the prohibition on direct corporate contributions; FECA prohibited such contributions, and Buckley did not disturb that rule."}, {"text": "Congress may establish public financing only if it abolishes private contributions.", "isCorrect": false, "rationale": "That is not the Buckley holding; public financing under FECA was voluntary."}], "id": "q02"}, {"question": "Which of the following best describes the 'soft money loophole' that McCain-Feingold (BCRA) attempted to close?", "options": [{"text": "Direct contributions from individuals to candidates that exceeded FECA's hard-money limits.", "isCorrect": false, "rationale": "Hard money is regulated under FECA; soft money referred to unlimited donations to party organizations, not direct individual contributions to candidates."}, {"text": "Unlimited donations to party organizations for 'party-building' activities, which were used in practice to run thinly veiled campaign ads.", "isCorrect": true, "rationale": "The text defines the soft money loophole as unlimited funds donated to party organizations for party-building activities such as voter registration and issue advertising, used in practice for thinly veiled campaign ads."}, {"text": "Foreign nationals contributing indirectly through party committees.", "isCorrect": false, "rationale": "Foreign contributions are prohibited; the soft money loophole concerned domestic party-building donations."}, {"text": "Corporate political ads produced within 30 days of a primary.", "isCorrect": false, "rationale": "BCRA regulated 'electioneering communications' separately; soft money specifically referred to donations to party committees, not corporate ads within a time window."}], "id": "q03"}, {"question": "Which of the following pairs correctly distinguishes 'hard money' from 'soft money' as used in the text?", "options": [{"text": "Hard money refers to contributions made directly to candidates under federal limits; soft money historically referred to unlimited contributions to party organizations.", "isCorrect": true, "rationale": "The text defines hard money as contributions made directly to candidates, regulated under FECA, and soft money as unlimited donations to party organizations for 'party-building' activities before BCRA."}, {"text": "Hard money refers to cash donations; soft money refers to checks.", "isCorrect": false, "rationale": "The distinction is about legal regulation, not payment method."}, {"text": "Hard money may be used only in general elections; soft money may be used only in primaries.", "isCorrect": false, "rationale": "The text does not draw an election-stage distinction; the distinction concerns regulated candidate contributions versus unregulated party donations."}, {"text": "Hard money is a tax-deductible donation; soft money is not.", "isCorrect": false, "rationale": "Political contributions are not tax-deductible, and the hard/soft distinction is not about tax treatment."}], "id": "q04"}, {"question": "Which of the following best describes the rise of 'small-dollar fundraising' in recent campaign cycles?", "options": [{"text": "Wealthy donors pool their contributions through PACs to evade hard-money limits.", "isCorrect": false, "rationale": "Small-dollar fundraising refers to many individual donors giving small sums, not wealthy donor pooling."}, {"text": "Digital platforms like ActBlue and WinRed let candidates raise vast sums from millions of individual donors giving $5, $10, or $25 at a time.", "isCorrect": true, "rationale": "The text states that digital platforms like ActBlue (Democrats) and WinRed (Republicans) enable candidates to raise large sums from millions of individual donors giving small contributions."}, {"text": "Super PACs bundle individual checks at fundraising dinners.", "isCorrect": false, "rationale": "That describes traditional major-donor fundraising, not small-dollar online fundraising."}, {"text": "Foreign nationals donate small amounts through online platforms to candidates.", "isCorrect": false, "rationale": "Foreign contributions to candidates are prohibited and are not the basis of small-dollar fundraising."}], "id": "q05"}, {"question": "A campaign finance reformer argues that small-dollar fundraising has mixed effects. Which of the following best captures the trade-off the text identifies?", "options": [{"text": "It reduces candidates' dependence on wealthy donors and PACs but tends to reward the most ideologically polarizing candidates who generate the most intense online enthusiasm.", "isCorrect": true, "rationale": "The text identifies this exact trade-off: small-dollar fundraising reduces dependence on wealthy donors but tends to reward polarizing candidates who generate intense online enthusiasm."}, {"text": "It eliminates all campaign spending inequities between major and minor parties.", "isCorrect": false, "rationale": "The text does not claim small-dollar fundraising eliminates spending inequities; it describes a trade-off, not a cure."}, {"text": "It requires all federal candidates to accept public financing.", "isCorrect": false, "rationale": "Small-dollar fundraising is voluntary and does not require public financing."}, {"text": "It is illegal under federal campaign finance law.", "isCorrect": false, "rationale": "Small-dollar fundraising is legal and encouraged by federal law."}], "id": "q06"}, {"question": "Which of the following best captures the central tension that has shaped modern campaign finance law according to the text?", "options": [{"text": "The balance between preventing corruption and protecting free speech.", "isCorrect": true, "rationale": "The text frames the regulation of money in American elections as 'a constant struggle between two competing values: preventing corruption and protecting free speech.'"}, {"text": "The balance between federal power and state power.", "isCorrect": false, "rationale": "Federalism is not the central tension in campaign finance law described here."}, {"text": "The balance between executive power and judicial power.", "isCorrect": false, "rationale": "Separation of powers is not the central tension; the text identifies anti-corruption vs. free speech."}, {"text": "The balance between private property and public welfare.", "isCorrect": false, "rationale": "Property rights are not the central tension in this context."}], "id": "q07"}, {"question": "Using the Total Spending in Federal Elections table, approximately how did total federal election spending change from 2000 to 2024?", "options": [{"text": "It fell from $1.8 billion to $0.6 billion, a decline of roughly two-thirds.", "isCorrect": false, "rationale": "Total spending rose dramatically from 2000 to 2024; it did not fall."}, {"text": "It remained essentially flat at about $2 billion.", "isCorrect": false, "rationale": "The table shows total spending growing from $1.8 billion in 2000 to $10.3 billion in 2024, which is far from flat."}, {"text": "It rose from about $1.8 billion in 2000 to about $10.3 billion in 2024, a more than fivefold increase.", "isCorrect": true, "rationale": "The table shows total spending at approximately $1.8 billion in 2000 and $10.3 billion in 2024, representing a more than fivefold increase."}, {"text": "It rose from $1.8 billion to $10.3 billion only because of a change in inflation accounting.", "isCorrect": false, "rationale": "The text attributes the rise primarily to outside spending growth after Citizens United, not merely to accounting changes."}], "id": "q08"}, {"question": "Which of the following best describes the relationship between Citizens United v. FEC and the creation of Super PACs?", "options": [{"text": "Citizens United expressly authorized Super PACs by name in its holding.", "isCorrect": false, "rationale": "Citizens United did not name or authorize Super PACs directly; Super PACs resulted from the combined effect of Citizens United and SpeechNow.org v. FEC."}, {"text": "Citizens United struck down BCRA's restrictions on corporate and union independent expenditures, and — combined with SpeechNow.org v. FEC — led directly to the creation of Super PACs.", "isCorrect": true, "rationale": "The text states that Citizens United struck down BCRA's restrictions on corporate and union independent expenditures, and that combined with SpeechNow.org v. FEC, it led to the creation of Super PACs."}, {"text": "Citizens United required Congress to create Super PACs to regulate corporate speech.", "isCorrect": false, "rationale": "Congress did not create Super PACs in response to Citizens United; the legal structure emerged through federal regulation of existing election law after the decisions."}, {"text": "Citizens United banned the creation of Super PACs.", "isCorrect": false, "rationale": "Citizens United enabled, rather than banned, these independent-expenditure organizations."}], "id": "q09"}, {"question": "Which of the following best explains what the Federal Election Commission (FEC) was created to do under FECA of 1971?", "options": [{"text": "Enforce campaign finance law, including contribution limits, disclosure requirements, and public financing for presidential campaigns.", "isCorrect": true, "rationale": "The text states that FECA created the FEC to enforce the law, and that FECA imposed contribution limits, required disclosure of campaign donations, and established a voluntary system of public financing for presidential campaigns."}, {"text": "Supervise the Electoral College vote certification.", "isCorrect": false, "rationale": "The Electoral College certification is a constitutional process, not an FEC function."}, {"text": "Draft constitutional amendments to regulate money in politics.", "isCorrect": false, "rationale": "The FEC does not draft constitutional amendments; it enforces statutory campaign finance rules."}, {"text": "Administer federal primaries and caucuses.", "isCorrect": false, "rationale": "Primaries and caucuses are administered primarily by state governments and parties, not by the FEC."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
