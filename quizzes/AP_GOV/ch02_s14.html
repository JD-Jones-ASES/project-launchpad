<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP U.S. Government and Politics &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Holding the Bureaucracy Accountable</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following is described in the text as Congress's 'most powerful oversight tool' for controlling the bureaucracy?", "options": [{"text": "Congressional hearings and investigations.", "isCorrect": false, "rationale": "Hearings are described as a significant tool, but the text explicitly names the power of the purse as the MOST powerful."}, {"text": "The power of the purse — control over the federal budget through appropriations.", "isCorrect": true, "rationale": "The text states 'Congress's most powerful oversight tool is its control over the federal budget' and describes appropriations as central leverage over agencies."}, {"text": "Issuing executive orders to reorganize agencies.", "isCorrect": false, "rationale": "Executive orders are a presidential tool, not a congressional one."}, {"text": "The Government Accountability Office's auditing power alone.", "isCorrect": false, "rationale": "GAO provides independent analysis but is described as a support to congressional oversight, not the single most powerful tool."}], "id": "q01"}, {"question": "A committee chair attaches a 'rider' to an appropriations bill requiring an agency to implement a specific policy. What broader congressional power does this illustrate?", "options": [{"text": "Reauthorization — allowing a program to continue.", "isCorrect": false, "rationale": "Reauthorization is a separate legislative action extending a program's legal authority; the scenario describes conditional appropriations, not reauthorization."}, {"text": "The power of the purse combined with the ability to attach conditions to appropriations that direct or limit agency spending.", "isCorrect": true, "rationale": "The text describes exactly this dynamic: Congress can 'attach conditions (riders) to appropriations that direct or limit how agencies spend their money.'"}, {"text": "The filibuster.", "isCorrect": false, "rationale": "The filibuster is a Senate debate-blocking tool, not an appropriations rider."}, {"text": "Executive privilege.", "isCorrect": false, "rationale": "Executive privilege is a presidential claim to withhold information, not a congressional appropriations power."}], "id": "q02"}, {"question": "The Government Accountability Office (GAO) is described in the text as which of the following?", "options": [{"text": "A cabinet department headed by a secretary who serves at the president's pleasure.", "isCorrect": false, "rationale": "The GAO is not a cabinet department; it is a nonpartisan congressional agency."}, {"text": "A nonpartisan congressional agency that audits federal programs and investigates allegations of waste and fraud.", "isCorrect": true, "rationale": "The text describes the GAO as 'a nonpartisan congressional agency that audits federal programs, investigates allegations of waste and fraud, and evaluates whether agencies are achieving their statutory objectives.'"}, {"text": "A presidential office that reviews regulations before publication.", "isCorrect": false, "rationale": "That is the role of OMB/OIRA, not the GAO."}, {"text": "A Supreme Court commission that reviews agency actions.", "isCorrect": false, "rationale": "Judicial review of agency actions happens through the federal courts, not a 'Supreme Court commission,' and the GAO is a congressional body."}], "id": "q03"}, {"question": "How does the Office of Information and Regulatory Affairs (OIRA), within OMB, check the bureaucracy on behalf of the president?", "options": [{"text": "It reviews significant proposed regulations before publication, providing a centralized White House mechanism to align agency rules with presidential priorities.", "isCorrect": true, "rationale": "The text states OIRA 'reviews significant proposed regulations before they are published,' giving the White House a centralized mechanism to align agency action with presidential priorities."}, {"text": "It holds hearings on impeachment charges.", "isCorrect": false, "rationale": "Impeachment is a legislative function, not an OIRA responsibility."}, {"text": "It elects agency heads.", "isCorrect": false, "rationale": "Agency heads are appointed by the president (with Senate confirmation for senior positions), not elected by OIRA."}, {"text": "It issues certiorari.", "isCorrect": false, "rationale": "Certiorari is a Supreme Court procedure."}], "id": "q04"}, {"question": "Under the Administrative Procedure Act, courts can strike down agency regulations for several specific reasons. Which of the following is NOT listed in the text as a valid ground for judicial review?", "options": [{"text": "The agency acted beyond the scope of its statutory authority.", "isCorrect": false, "rationale": "The text lists acting within statutory authority as a review ground — going beyond it invalidates the rule."}, {"text": "The agency failed to follow required procedures, such as notice-and-comment.", "isCorrect": false, "rationale": "The text specifically lists failure to follow required procedures as a review ground."}, {"text": "The decision was 'arbitrary and capricious.'", "isCorrect": false, "rationale": "The text explicitly lists the 'arbitrary and capricious' standard as a basis for striking down regulations."}, {"text": "The regulation was politically unpopular with voters.", "isCorrect": true, "rationale": "The text does NOT list political unpopularity as a ground for judicial review; courts evaluate authority, procedure, reasonableness, and statutory interpretation, not popularity."}], "id": "q05"}, {"question": "A federal employee reports agency fraud to an Inspector General. Which federal law most directly protects that employee from retaliation?", "options": [{"text": "The Pendleton Act of 1883.", "isCorrect": false, "rationale": "The Pendleton Act established the merit system; it does not specifically protect modern whistleblowers."}, {"text": "The Whistleblower Protection Act (1989, amended 2012).", "isCorrect": true, "rationale": "The text states the Whistleblower Protection Act 'prohibits retaliation against federal employees who report wrongdoing to Congress, inspectors general, or other designated recipients.'"}, {"text": "The Civil Rights Act of 1991.", "isCorrect": false, "rationale": "The Civil Rights Act of 1991 addresses employment discrimination, not whistleblowing."}, {"text": "The Administrative Procedure Act of 1946.", "isCorrect": false, "rationale": "The APA governs agency rulemaking and adjudication; it does not specifically protect whistleblowers."}], "id": "q06"}, {"question": "According to the text, Inspectors General are best described as:", "options": [{"text": "Partisan appointees of the president's political party.", "isCorrect": false, "rationale": "IGs are described as 'independent watchdogs,' not partisan appointees."}, {"text": "Independent watchdogs embedded within federal agencies who conduct audits, investigations, and inspections and report both to the agency head and to Congress.", "isCorrect": true, "rationale": "The text states IGs are 'independent watchdogs embedded within federal agencies' who 'report both to the agency head and to Congress, maintaining a degree of independence.'"}, {"text": "Elected officials chosen during midterm elections.", "isCorrect": false, "rationale": "IGs are not elected; they are statutorily established independent watchdogs."}, {"text": "Federal judges with lifetime tenure.", "isCorrect": false, "rationale": "IGs are executive-branch watchdogs, not Article III judges."}], "id": "q07"}, {"question": "The 9/11 Commission (2002-2004) is cited in the text as an example of congressional oversight in action. Which concrete policy outcome is specifically attributed to its recommendations?", "options": [{"text": "Creation of the Department of Homeland Security and the Office of the Director of National Intelligence.", "isCorrect": true, "rationale": "The text says the Commission 'produced recommendations that led to the creation of the Department of Homeland Security and the Office of the Director of National Intelligence.'"}, {"text": "Passage of the War Powers Resolution.", "isCorrect": false, "rationale": "The War Powers Resolution was passed in 1973, decades before the 9/11 Commission."}, {"text": "The ratification of the 22nd Amendment.", "isCorrect": false, "rationale": "The 22nd Amendment was ratified in 1951, long before the 9/11 Commission and on an unrelated subject (presidential term limits)."}, {"text": "The creation of the Pentagon.", "isCorrect": false, "rationale": "The Pentagon pre-dated the Commission by more than a half-century."}], "id": "q08"}, {"question": "Which statement BEST describes the relationship between the Dodd-Frank Wall Street Reform Act and congressional oversight, according to the text?", "options": [{"text": "Congressional financial-crisis hearings (2008-2010) produced testimony and findings that shaped Dodd-Frank.", "isCorrect": true, "rationale": "The text identifies the financial crisis hearings as an oversight event whose findings 'shaped the Dodd-Frank Wall Street Reform Act.'"}, {"text": "Dodd-Frank was passed by executive order without congressional input.", "isCorrect": false, "rationale": "Dodd-Frank is legislation enacted by Congress, not an executive order."}, {"text": "Dodd-Frank repealed the Whistleblower Protection Act.", "isCorrect": false, "rationale": "No such repeal is described in the text; the Whistleblower Protection Act remains in force."}, {"text": "Dodd-Frank was struck down by the Supreme Court in 2010.", "isCorrect": false, "rationale": "The text describes Dodd-Frank as an oversight-driven statute, not a struck-down law."}], "id": "q09"}, {"question": "A senator wants to use the confirmation process to hold the incoming agency head accountable in advance. Which approach is consistent with the text's description of confirmation power?", "options": [{"text": "Using the confirmation process to extract commitments from the nominee about how they will manage the agency.", "isCorrect": true, "rationale": "The text states: 'Senators can use the confirmation process to extract commitments from nominees about how they will manage their agencies' — leverage over the bureaucracy's leadership."}, {"text": "Filing a writ of certiorari against the agency.", "isCorrect": false, "rationale": "Certiorari is a Supreme Court procedure; it cannot be filed against an agency by a senator."}, {"text": "Sending federal troops to the agency's headquarters.", "isCorrect": false, "rationale": "Troop deployment is a presidential function; it is not a confirmation tool."}, {"text": "Issuing an executive order to block the appointment.", "isCorrect": false, "rationale": "Executive orders are a presidential tool; senators do not issue them."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
