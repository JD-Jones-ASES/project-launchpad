<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP U.S. Government and Politics &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Relationship Between States and the Federal Government</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Article I, Section 8 lists many specific powers granted to Congress, including the power to coin money, declare war, and regulate commerce among the states. What are such explicitly granted powers called?", "options": [{"text": "Reserved powers", "isCorrect": false, "rationale": "Reserved powers are those retained by the states under the Tenth Amendment, not those granted to Congress."}, {"text": "Enumerated (expressed or delegated) powers", "isCorrect": true, "rationale": "The text defines enumerated powers as 'those explicitly granted to the national government by the Constitution,' most of which appear in Article I, Section 8."}, {"text": "Concurrent powers", "isCorrect": false, "rationale": "Concurrent powers are those exercised by both national and state governments; the powers listed here are specifically federal."}, {"text": "Implied powers", "isCorrect": false, "rationale": "Implied powers are those inferred from the Necessary and Proper Clause, not those explicitly listed."}], "id": "q01"}, {"question": "Suppose Congress passes a law establishing a national research agency that was not explicitly authorized by the Constitution but is a means for executing Congress's enumerated power to promote science. Which clause is most likely invoked to justify this law, and what doctrine does it support?", "options": [{"text": "The Supremacy Clause, supporting reserved powers", "isCorrect": false, "rationale": "The Supremacy Clause resolves conflicts between federal and state law; it does not create new federal powers."}, {"text": "The Necessary and Proper Clause (Elastic Clause), supporting the doctrine of implied powers as in McCulloch v. Maryland", "isCorrect": true, "rationale": "The text ties this exact reasoning together: the Necessary and Proper Clause is 'sometimes called the Elastic Clause,' has been interpreted broadly 'as established in McCulloch v. Maryland (1819),' and gives Congress 'implied powers that go beyond its explicitly listed authorities.'"}, {"text": "The Tenth Amendment, supporting state sovereignty", "isCorrect": false, "rationale": "The Tenth Amendment reserves powers to the states; it does not justify federal authority beyond enumerated powers."}, {"text": "The Full Faith and Credit Clause, supporting interstate reciprocity", "isCorrect": false, "rationale": "This clause concerns recognition of other states' laws and judgments, not federal power."}], "id": "q02"}, {"question": "Under the Tenth Amendment, which category of powers do states retain, and which of the following is an example cited in the text?", "options": [{"text": "Enumerated powers; examples include coining money", "isCorrect": false, "rationale": "Coining money is an enumerated federal power, not a state power."}, {"text": "Reserved powers; examples include establishing public schools and exercising police power", "isCorrect": true, "rationale": "The text defines reserved powers as those retained by the states under the Tenth Amendment and lists 'Establishing and maintaining public schools' and 'Exercising police power' among the examples."}, {"text": "Implied powers; examples include declaring war", "isCorrect": false, "rationale": "Declaring war is an enumerated federal power, and implied powers are federal, not state."}, {"text": "Concurrent powers only; examples include regulating interstate commerce", "isCorrect": false, "rationale": "Interstate commerce is a federal enumerated power; state reserved powers are a distinct category."}], "id": "q03"}, {"question": "Both the federal government and state governments levy and collect taxes, borrow money, establish courts, and make laws. What are these shared powers called?", "options": [{"text": "Enumerated powers", "isCorrect": false, "rationale": "Enumerated powers are federal-only; they are not shared."}, {"text": "Reserved powers", "isCorrect": false, "rationale": "Reserved powers belong exclusively to the states; they are not shared."}, {"text": "Concurrent powers", "isCorrect": true, "rationale": "The text defines concurrent powers as 'those exercised by both the national and state governments simultaneously' and lists taxation, borrowing, courts, and lawmaking among them."}, {"text": "Prohibited powers", "isCorrect": false, "rationale": "Prohibited powers are those denied to either level; the category described here is shared authority."}], "id": "q04"}, {"question": "Consider this hypothetical: A state passes a law contradicting a valid federal statute enacted within Congress's constitutional authority. Which clause resolves the conflict, and in whose favor?", "options": [{"text": "The Tenth Amendment resolves it in the state's favor.", "isCorrect": false, "rationale": "The Tenth Amendment reserves non-delegated powers to states; it does not override valid federal law in an area of federal authority."}, {"text": "The Supremacy Clause resolves it in favor of valid federal law.", "isCorrect": true, "rationale": "The text states the Supremacy Clause (Article VI, Clause 2) declares federal law 'the supreme Law of the Land' and binds state judges, 'any Thing in the Constitution or Laws of any State to the Contrary notwithstanding,' provided the federal law is within Congress's authority."}, {"text": "The Full Faith and Credit Clause resolves it in favor of whichever state acted first.", "isCorrect": false, "rationale": "This clause concerns interstate recognition, not federal-state supremacy."}, {"text": "The Privileges and Immunities Clause resolves it in favor of the state.", "isCorrect": false, "rationale": "Privileges and Immunities concerns discrimination between states' citizens, not federal-state conflicts."}], "id": "q05"}, {"question": "A marriage legally performed in New York is challenged in Virginia, where state officials refuse to recognize it. Which constitutional provision most directly speaks to this situation?", "options": [{"text": "The Privileges and Immunities Clause", "isCorrect": false, "rationale": "That clause addresses discrimination against citizens of other states generally, not recognition of public acts and records."}, {"text": "The Full Faith and Credit Clause", "isCorrect": true, "rationale": "The text states Full Faith and Credit (Article IV, Section 1) 'requires each state to recognize the public Acts, Records, and judicial Proceedings of every other state,' and explicitly notes that 'A marriage performed in one state must be recognized by all states.'"}, {"text": "The Extradition Clause", "isCorrect": false, "rationale": "Extradition applies to criminal fugitives, not civil marriage recognition."}, {"text": "The Guarantee Clause", "isCorrect": false, "rationale": "The Guarantee Clause concerns the republican form of state government, not recognition of marriage across states."}], "id": "q06"}, {"question": "A person charged with bank robbery in Georgia flees to Florida. Which constitutional provision requires Florida to return the fugitive upon request?", "options": [{"text": "The Supremacy Clause", "isCorrect": false, "rationale": "The Supremacy Clause governs conflicts between federal and state law, not interstate fugitive return."}, {"text": "The Privileges and Immunities Clause", "isCorrect": false, "rationale": "This clause prevents discrimination against out-of-state citizens; it does not mandate fugitive return."}, {"text": "The Extradition Clause (Article IV, Section 2)", "isCorrect": true, "rationale": "The text states Extradition 'requires that a person charged with a crime in one state who flees to another state must be returned to the state where the crime was committed upon request.'"}, {"text": "The Tenth Amendment", "isCorrect": false, "rationale": "The Tenth Amendment addresses reserved state powers broadly; it does not govern interstate extradition."}], "id": "q07"}, {"question": "The Port Authority of New York and New Jersey is a regional transportation agency jointly created by the two states. Which constitutional mechanism authorizes such arrangements, and what must happen for them to be valid?", "options": [{"text": "They are interstate compacts, which require the consent of Congress under Article I, Section 10.", "isCorrect": true, "rationale": "The text states interstate compacts allow states 'to enter into agreements with one another with the consent of Congress,' citing the Port Authority of New York and New Jersey as an example."}, {"text": "They are treaties, which require Senate ratification by two-thirds.", "isCorrect": false, "rationale": "Treaties are agreements with foreign nations, not between states."}, {"text": "They are federal grants, which bypass state consent.", "isCorrect": false, "rationale": "Federal grants involve federal funding to states, not interstate arrangements."}, {"text": "They are reserved powers, requiring no national oversight at all.", "isCorrect": false, "rationale": "The text explicitly requires congressional consent for interstate compacts, so no oversight is incorrect."}], "id": "q08"}, {"question": "A public university charges out-of-state students higher tuition than in-state residents. Based on the text, is this arrangement permissible under the Privileges and Immunities Clause?", "options": [{"text": "No, because any differential treatment of non-residents is unconstitutional.", "isCorrect": false, "rationale": "The text explicitly allows 'reasonable distinctions' in some areas, including this one."}, {"text": "Yes, because the text identifies higher out-of-state tuition as an example of a 'reasonable distinction' states may make.", "isCorrect": true, "rationale": "The text states 'states may make reasonable distinctions in some areas, such as charging higher tuition at public universities for out-of-state students.'"}, {"text": "No, because tuition is a concurrent federal-state concern.", "isCorrect": false, "rationale": "Public university tuition is generally a state matter, and the text does not invoke concurrent powers here."}, {"text": "Yes, because the Supremacy Clause allows states to tax federal students.", "isCorrect": false, "rationale": "The Supremacy Clause is about federal-state conflicts, not tuition policy, and does not authorize discrimination of this kind."}], "id": "q09"}, {"question": "The text concludes its Key Concept by describing the Tenth Amendment as 'the Anti-Federalists' legacy.' Which of the following best explains that characterization?", "options": [{"text": "Because the Tenth Amendment gave the Anti-Federalists control of Congress", "isCorrect": false, "rationale": "The Tenth Amendment does not assign congressional control to any faction; it limits federal power in favor of states."}, {"text": "Because the Tenth Amendment embodies the Anti-Federalists' insistence that the national government possesses only those powers granted to it, with the rest reserved to the states or the people", "isCorrect": true, "rationale": "The text frames the Tenth Amendment as 'the Anti-Federalists' legacy — a reminder that the national government possesses only those powers granted to it,' reflecting their demand for explicit limits on federal authority."}, {"text": "Because Anti-Federalists wrote all ten amendments in the Bill of Rights alone", "isCorrect": false, "rationale": "The Bill of Rights resulted from negotiated compromises; the text credits the Tenth Amendment specifically to the Anti-Federalists' concerns, not all ten."}, {"text": "Because the Tenth Amendment abolished enumerated federal powers", "isCorrect": false, "rationale": "The Tenth Amendment preserves, rather than abolishes, federal enumerated powers; it assigns only what remains after those powers to the states."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
