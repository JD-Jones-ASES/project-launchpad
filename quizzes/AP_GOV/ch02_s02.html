    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Structures, Powers, and Functions of Congress</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following is best categorized as an enumerated power of Congress?", "options": [{"text": "Establishing a national bank.", "isCorrect": false, "rationale": "A national bank is the classic example of an implied power, upheld in McCulloch v. Maryland (1819) through the Necessary and Proper Clause — not an enumerated power."}, {"text": "Setting minimum wages for private employers.", "isCorrect": false, "rationale": "Federal wage regulation flows from implied powers under the Commerce Clause combined with the Necessary and Proper Clause, not from an explicit enumerated grant."}, {"text": "Coining money and regulating its value.", "isCorrect": true, "rationale": "The text lists 'coin money' among the powers 'explicitly listed' in Article I, Section 8 — the textbook definition of an enumerated power."}, {"text": "Requiring public schools to teach a national curriculum.", "isCorrect": false, "rationale": "Education is not an enumerated federal power; federal education statutes rely on the spending power and implied authority, and many aspects remain reserved to the states."}], "id": "q01"}, {"question": "Suppose Congress passes a statute creating a new federal regulatory agency to enforce interstate commerce rules. Which clause provides the most direct constitutional basis for the parts of the statute that are not spelled out in Article I, Section 8?", "options": [{"text": "The Supremacy Clause.", "isCorrect": false, "rationale": "The Supremacy Clause establishes that valid federal law overrides conflicting state law; it does not authorize creation of new federal institutions."}, {"text": "The Necessary and Proper Clause.", "isCorrect": true, "rationale": "The text identifies the Necessary and Proper (Elastic) Clause as 'the constitutional foundation for implied powers,' which is precisely what is at stake when Congress legislates beyond the literal enumerated list."}, {"text": "The Contracts Clause.", "isCorrect": false, "rationale": "The Contracts Clause restricts states from impairing contracts; it is not a source of additional federal power."}, {"text": "The Full Faith and Credit Clause.", "isCorrect": false, "rationale": "Full Faith and Credit governs recognition of other states' public acts; it is unrelated to expanding congressional authority."}], "id": "q02"}, {"question": "A senator introduces a bill to raise revenue through a new federal tax. The bill begins in the Senate, passes, and is sent to the House. What is the most likely constitutional problem?", "options": [{"text": "Revenue bills must originate in the House of Representatives, so starting in the Senate violates Article I, Section 7.", "isCorrect": true, "rationale": "The text states 'All bills for raising revenue must originate in the House (Article I, Section 7),' reflecting the Framers' view that the chamber closest to the people should control taxation."}, {"text": "Only the Supreme Court can originate new taxes through judicial review.", "isCorrect": false, "rationale": "The Court cannot originate legislation; it reviews cases brought to it. Tax statutes originate in Congress."}, {"text": "Taxation is reserved to the states, so Congress cannot pass any federal taxes.", "isCorrect": false, "rationale": "Taxation is an enumerated congressional power in Article I, Section 8 — the issue here is which chamber originates the bill, not whether Congress may tax at all."}, {"text": "All tax bills must first be approved by the president.", "isCorrect": false, "rationale": "Presidential approval comes after both chambers pass a bill, not before origination."}], "id": "q03"}, {"question": "The House passes a healthcare bill; the Senate passes a different version of the same bill. What structural step must occur before the legislation can go to the president?", "options": [{"text": "The Supreme Court must certify that the versions are constitutional.", "isCorrect": false, "rationale": "Supreme Court review, if any, happens after enactment through litigation, not as a precondition to presentment."}, {"text": "A conference committee must reconcile the differences, and both chambers must approve the resulting compromise.", "isCorrect": true, "rationale": "The text defines conference committees as temporary joint committees formed 'to reconcile differences between House and Senate versions of the same bill' and notes 'both chambers must vote on the conference report.'"}, {"text": "The House version automatically prevails because revenue is involved.", "isCorrect": false, "rationale": "Even for revenue bills, the Senate amends and both chambers must pass identical language — the House does not automatically override differences."}, {"text": "A standing committee in the Senate must kill the bill before the president can act.", "isCorrect": false, "rationale": "Standing committees vet bills, but their role is not to kill legislation before presidential action; they are not the reconciliation mechanism described in the text."}], "id": "q04"}, {"question": "A bill with 55 Senate supporters fails to reach a final vote because opponents refuse to yield the floor. Which procedural tool would supporters use to break the impasse, and why is it difficult?", "options": [{"text": "A simple majority vote on cloture, which is easy to obtain.", "isCorrect": false, "rationale": "Cloture ordinarily requires 60 votes, not a simple majority, for most legislation — making it hard even when a majority exists."}, {"text": "A cloture motion requiring 60 votes, which is difficult because a 55-vote majority falls short of the three-fifths threshold.", "isCorrect": true, "rationale": "The text specifies cloture requires '60 votes (three-fifths of the full Senate)' — meaning 55 supporters cannot end the filibuster, giving the minority significant blocking power."}, {"text": "A pocket veto from the Vice President, who then presides over debate.", "isCorrect": false, "rationale": "The pocket veto is a presidential tool, not a Senate procedure. The Vice President can break ties but does not end filibusters."}, {"text": "A writ of certiorari, which the Senate uses to escalate disputes to the Supreme Court.", "isCorrect": false, "rationale": "Certiorari is a judicial procedure for the Supreme Court to hear cases; it has nothing to do with Senate floor debate."}], "id": "q05"}, {"question": "Which congressional position is described by the text as 'the most powerful figure in the Senate' and is responsible for controlling the floor schedule and legislative agenda?", "options": [{"text": "The Vice President, acting as President of the Senate.", "isCorrect": false, "rationale": "The Vice President 'rarely presides' and votes only to break ties — not the most powerful Senate figure in practice."}, {"text": "The President Pro Tempore.", "isCorrect": false, "rationale": "The text explicitly calls this role 'largely ceremonial,' even though it holds presidential succession significance."}, {"text": "The Senate Majority Leader.", "isCorrect": true, "rationale": "The text names the Majority Leader 'the most powerful figure in the Senate,' responsible for controlling the floor schedule and legislative agenda."}, {"text": "The Speaker of the Senate.", "isCorrect": false, "rationale": "There is no Speaker of the Senate — the Speaker leads the House of Representatives."}], "id": "q06"}, {"question": "Congress creates a temporary body composed of members from both chambers to investigate a rapidly unfolding national crisis. Which committee type does this most closely resemble?", "options": [{"text": "A standing committee.", "isCorrect": false, "rationale": "Standing committees are permanent and specialized by policy area, not temporary investigative bodies."}, {"text": "A select (or special) committee.", "isCorrect": false, "rationale": "Select committees are temporary investigative bodies but, as the text describes, they are typically drawn from a single chamber (e.g., the House Select Committee on January 6)."}, {"text": "A joint committee.", "isCorrect": true, "rationale": "The text defines joint committees as bodies that 'include members from both chambers' — matching the bicameral membership in the scenario. (If it were purely investigative of a scandal, a select committee might apply, but bicameral membership signals 'joint.')"}, {"text": "A conference committee.", "isCorrect": false, "rationale": "Conference committees have a very narrow purpose — reconciling House and Senate versions of the same bill — not open-ended investigations."}], "id": "q07"}, {"question": "Why does the text describe committee chairs as wielding 'significant power' in Congress?", "options": [{"text": "They can single-handedly veto legislation passed by both chambers.", "isCorrect": false, "rationale": "Only the president has the veto power; committee chairs do not possess it."}, {"text": "They set hearing schedules, control committee agendas, and influence which bills advance.", "isCorrect": true, "rationale": "The text specifies chairs 'set hearing schedules, control the agenda, and influence which bills advance' — and most bills 'die in committee,' making this gatekeeping power decisive."}, {"text": "They are constitutionally required to preside over floor debates in both chambers.", "isCorrect": false, "rationale": "Floor debate is presided over by chamber leadership (Speaker, presiding officer), not committee chairs."}, {"text": "They alone decide which nominees the Senate will confirm.", "isCorrect": false, "rationale": "Confirmation requires a full Senate vote; committee chairs schedule hearings but cannot unilaterally decide confirmation."}], "id": "q08"}, {"question": "In 2013 and 2017, the Senate used the 'nuclear option' to reduce the cloture threshold for certain judicial confirmations. What broader question does this change illustrate about congressional rules?", "options": [{"text": "Senate procedural rules are constitutionally fixed and cannot change without amendment.", "isCorrect": false, "rationale": "The nuclear option demonstrates precisely the opposite — that supermajority thresholds like cloture are created by Senate rules and alterable by simple majority, not by constitutional amendment."}, {"text": "The Senate's own majority can alter supermajority procedural rules, with significant consequences for minority influence.", "isCorrect": true, "rationale": "The text notes the option was 'used to lower the cloture threshold to a simple majority for judicial confirmations,' showing that internal rules — and therefore minority leverage — rest on whatever the current majority tolerates."}, {"text": "The House must approve any changes to Senate procedure.", "isCorrect": false, "rationale": "Each chamber sets its own rules; House approval is not required to change Senate procedure."}, {"text": "The Supreme Court sets cloture thresholds through judicial review.", "isCorrect": false, "rationale": "Cloture thresholds are matters of internal legislative procedure, not judicial rulings."}], "id": "q09"}, {"question": "A federal official is charged by the House with 'high crimes and misdemeanors' and then tried in the Senate. Which combination of requirements correctly describes the process?", "options": [{"text": "Two-thirds House majority to impeach; simple Senate majority to convict.", "isCorrect": false, "rationale": "The thresholds are reversed: impeachment requires only a simple House majority; conviction requires two-thirds of the Senate."}, {"text": "Simple House majority to impeach; two-thirds Senate majority to convict and remove.", "isCorrect": true, "rationale": "The text specifies 'A simple majority vote is required' for House impeachment and 'a two-thirds vote required for conviction and removal' in the Senate."}, {"text": "Three-fifths House majority to impeach; unanimous Senate vote to convict.", "isCorrect": false, "rationale": "Neither threshold exists in the Constitution for impeachment proceedings."}, {"text": "Two-thirds of both chambers to impeach; three-fourths of state legislatures to convict.", "isCorrect": false, "rationale": "Those numbers describe the constitutional amendment process, not impeachment."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
