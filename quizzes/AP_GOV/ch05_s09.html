<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP U.S. Government and Politics &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Congressional Elections</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the House Incumbency Reelection Rates table, which year had the lowest reelection rate for House incumbents?", "options": [{"text": "1980, at 90.7%", "isCorrect": false, "rationale": "1980 shows 90.7%, which is higher than 2010's rate."}, {"text": "2000, at 97.8%", "isCorrect": false, "rationale": "2000 is the highest rate in the table, not the lowest."}, {"text": "2010, at 85.4%", "isCorrect": true, "rationale": "The table shows 2010 with a reelection rate of 85.4%, the lowest among the years listed."}, {"text": "2022, at 88.8%", "isCorrect": false, "rationale": "2022 was 88.8%, which is higher than 2010's rate."}], "id": "q01"}, {"question": "Which of the following factors is NOT identified in the text as a contributor to the incumbency advantage?", "options": [{"text": "Name recognition", "isCorrect": false, "rationale": "The text identifies name recognition as a major incumbency advantage."}, {"text": "The franking privilege", "isCorrect": false, "rationale": "The text lists franking as an incumbency advantage."}, {"text": "A constitutional guarantee of reelection for sitting members of Congress.", "isCorrect": true, "rationale": "No such constitutional guarantee exists; the text attributes the advantage to political, organizational, and financial factors, not constitutional fiat."}, {"text": "Campaign finance advantage and constituency service (casework).", "isCorrect": false, "rationale": "Both are listed as sources of the incumbency advantage."}], "id": "q02"}, {"question": "Since World War II, the president's party has lost an average of how many House seats in midterm elections?", "options": [{"text": "6 seats", "isCorrect": false, "rationale": "The text specifies an average of 26 seats, not 6."}, {"text": "16 seats", "isCorrect": false, "rationale": "The figure in the text is 26, not 16."}, {"text": "26 seats", "isCorrect": true, "rationale": "The text states that since World War II, the president's party has lost an average of 26 House seats in midterm elections."}, {"text": "60 seats", "isCorrect": false, "rationale": "60 would exceed typical midterm losses; the text's figure is 26."}], "id": "q03"}, {"question": "Which of the following best describes the 'coattail effect' in presidential-year elections?", "options": [{"text": "A popular presidential candidate boosts turnout among the party's supporters, helping down-ballot candidates win.", "isCorrect": true, "rationale": "The text states that in presidential election years, a popular presidential candidate can boost turnout among the party's supporters, carrying down-ballot candidates to victory 'on the president's coattails.'"}, {"text": "The president's party gains seats only in states already aligned with the opposing party.", "isCorrect": false, "rationale": "That is not how the coattail effect is defined; coattails carry same-party down-ballot candidates."}, {"text": "Voters split tickets more frequently in presidential years.", "isCorrect": false, "rationale": "The text notes that ticket-splitting actually weakens the coattail effect; they are not the same phenomenon."}, {"text": "The Supreme Court orders redistricting after presidential elections.", "isCorrect": false, "rationale": "This is not what the coattail effect means; redistricting occurs after the decennial census, not presidential election results."}], "id": "q04"}, {"question": "A state legislature redraws a congressional map to concentrate opposition voters into a single district, ensuring that opposition strength is 'wasted' in one seat. Which of the following best describes this practice?", "options": [{"text": "Cracking", "isCorrect": false, "rationale": "Cracking spreads opposition voters across many districts to dilute influence; the scenario concentrates them into one."}, {"text": "Packing", "isCorrect": true, "rationale": "The text defines packing as concentrating opposition voters into a few districts 'to waste their votes,' which matches this scenario exactly."}, {"text": "Strict scrutiny", "isCorrect": false, "rationale": "Strict scrutiny is a judicial standard of review, not a gerrymandering technique."}, {"text": "One person, one vote", "isCorrect": false, "rationale": "That is the constitutional principle from Baker v. Carr, not a gerrymandering technique."}], "id": "q05"}, {"question": "According to the text, which of the following best describes the holding of Shaw v. Reno (1993)?", "options": [{"text": "Redistricting disputes are political questions that courts cannot hear.", "isCorrect": false, "rationale": "Baker v. Carr established that redistricting disputes are justiciable; Shaw v. Reno addressed racial gerrymandering under equal protection."}, {"text": "Districts drawn primarily on the basis of race are subject to strict scrutiny under the Equal Protection Clause.", "isCorrect": true, "rationale": "The text states that Shaw v. Reno held that districts drawn primarily on the basis of race are subject to strict scrutiny under the Equal Protection Clause."}, {"text": "Congress has exclusive authority to draw district lines.", "isCorrect": false, "rationale": "Redistricting is controlled by state legislatures in most states; the text does not suggest Shaw v. Reno transferred authority to Congress."}, {"text": "All districts must be drawn to produce proportional racial representation.", "isCorrect": false, "rationale": "Shaw v. Reno subjected race-based districting to strict scrutiny; it did not require proportional representation."}], "id": "q06"}, {"question": "Which of the following best describes the principle established by Baker v. Carr (1962)?", "options": [{"text": "Campaign contribution limits are unconstitutional under the First Amendment.", "isCorrect": false, "rationale": "That concerns Buckley v. Valeo, not Baker v. Carr."}, {"text": "Redistricting disputes are justiciable and courts can apply a 'one person, one vote' principle.", "isCorrect": true, "rationale": "The text states that Baker v. Carr established that redistricting disputes are justiciable — meaning courts can hear and decide them — and laid the groundwork for the 'one person, one vote' principle."}, {"text": "Primary elections must be open to all registered voters.", "isCorrect": false, "rationale": "Baker v. Carr concerned redistricting and justiciability, not primary access."}, {"text": "Voters may not be required to show identification at the polls.", "isCorrect": false, "rationale": "That is not the holding of Baker v. Carr."}], "id": "q07"}, {"question": "A journalist writes, 'With 393 incumbents running and 349 reelected in 2022, House incumbents won reelection roughly 89% of the time.' Which of the following best explains the political implication of this fact, given the text's discussion of midterm politics?", "options": [{"text": "High reelection rates alone prove that voters are highly satisfied with Congress as a whole.", "isCorrect": false, "rationale": "The text's analysis questions note this inference is not warranted; voters may approve of their own member while disapproving of Congress generally."}, {"text": "High individual reelection rates can coexist with broad voter dissatisfaction, as voters often approve of their own representative even while disapproving of Congress.", "isCorrect": true, "rationale": "The text's analysis questions explicitly probe this tension: 'Does a 90% reelection rate mean that voters are satisfied with Congress as a whole? Explain,' and the text's discussion of incumbency advantages implies these reelection rates do not require Congress-wide satisfaction."}, {"text": "The 2022 rate proves that redistricting had no impact on elections.", "isCorrect": false, "rationale": "The text discusses redistricting and gerrymandering as factors that can shape congressional elections."}, {"text": "The reelection rate shows that Super PAC spending has been completely eliminated.", "isCorrect": false, "rationale": "The text describes campaign finance flows to incumbents as a source of the advantage, not their elimination."}], "id": "q08"}, {"question": "Which of the following best defines 'casework' as practiced by members of Congress and their staff?", "options": [{"text": "The drafting of new legislation during committee markups.", "isCorrect": false, "rationale": "Drafting legislation is a different legislative activity, not casework."}, {"text": "Helping individual constituents navigate bureaucratic problems, such as Social Security claims or veterans' benefits.", "isCorrect": true, "rationale": "The text defines casework as helping individual constituents navigate bureaucratic problems, ranging from Social Security claims to veterans' benefits."}, {"text": "Conducting opposition research on electoral challengers.", "isCorrect": false, "rationale": "Opposition research is a campaign activity and not what the text calls casework."}, {"text": "Organizing party caucus meetings.", "isCorrect": false, "rationale": "Caucus organization is internal party business, not constituent service."}], "id": "q09"}, {"question": "Which of the following best explains why the president's party tends to lose congressional seats in midterm elections, according to the text?", "options": [{"text": "A constitutional rule automatically transfers seats to the opposing party in midterms.", "isCorrect": false, "rationale": "There is no such constitutional rule; the text describes political and turnout dynamics."}, {"text": "Voter frustration with the party in power, lower turnout among the president's supporters, and greater opposition energy to check presidential power.", "isCorrect": true, "rationale": "The text attributes midterm losses to voter frustration with the party in power, lower turnout among the president's supporters, and the opposition being energized to check presidential power."}, {"text": "Midterm elections feature twice as many candidates as presidential elections.", "isCorrect": false, "rationale": "The text makes no such claim; candidate counts do not drive midterm losses."}, {"text": "Third parties automatically win midterm elections.", "isCorrect": false, "rationale": "The text notes that third parties rarely win under the current system; they do not automatically win midterms."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
