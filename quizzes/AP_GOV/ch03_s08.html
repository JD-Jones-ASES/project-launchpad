    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Due Process and Rights of the Accused</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Police officers search a suspect's apartment without a warrant and without a valid exception, then use the evidence they find to secure a conviction at trial. The suspect appeals. Under the exclusionary rule described in the section, what result is most likely?", "options": [{"text": "The conviction stands because illegally obtained evidence is admissible if reliable.", "isCorrect": false, "rationale": "The exclusionary rule makes evidence obtained through an unconstitutional search generally inadmissible, regardless of its reliability."}, {"text": "The evidence is generally inadmissible; the conviction is likely reversed because the exclusionary rule bars its use at trial.", "isCorrect": true, "rationale": "The text states that 'evidence obtained through an unconstitutional search or seizure is generally inadmissible in court—it is the \"fruit of the poisonous tree.\"'"}, {"text": "The conviction stands, but the officers must pay a fine.", "isCorrect": false, "rationale": "The exclusionary rule addresses admissibility of evidence, not officer fines, and does not save convictions resting on inadmissible evidence."}, {"text": "The exclusionary rule applies only in federal court, so the state conviction stands.", "isCorrect": false, "rationale": "The text explains the exclusionary rule was 'extended to state courts in Mapp v. Ohio (1961).' It applies in both federal and state courts."}], "id": "q01"}, {"question": "In Gideon v. Wainwright (1963), the Supreme Court held that states must:", "options": [{"text": "Provide free legal counsel to indigent felony defendants under the Sixth Amendment, incorporated through the Fourteenth Amendment.", "isCorrect": true, "rationale": "The section says Gideon held the Sixth Amendment right to counsel is 'incorporated against the states through the Fourteenth Amendment's Due Process Clause,' requiring states to provide attorneys for indigent felony defendants."}, {"text": "Appoint prosecutors in all felony cases.", "isCorrect": false, "rationale": "Gideon addressed appointed DEFENSE counsel for indigent defendants, not prosecutors."}, {"text": "Waive jury trials for indigent defendants.", "isCorrect": false, "rationale": "Gideon did not address jury trial waiver; the right to jury trial is a separate protection incorporated in Duncan v. Louisiana (1968)."}, {"text": "Provide legal counsel only in capital cases.", "isCorrect": false, "rationale": "The text says Florida had provided counsel 'only in capital cases' before Gideon, and that Gideon rejected this limitation by requiring counsel in felony cases generally."}], "id": "q02"}, {"question": "A suspect is arrested and questioned by police without being informed of his rights. He confesses. Under Miranda v. Arizona (1966), which component of the Miranda warnings was the police required to give?", "options": [{"text": "That he has the right to confront witnesses.", "isCorrect": false, "rationale": "The right to confront witnesses is a Sixth Amendment trial right, not part of the Miranda warnings required before custodial interrogation."}, {"text": "That he has the right to remain silent, that anything said can be used against him, the right to an attorney, and the right to appointed counsel if he cannot afford one.", "isCorrect": true, "rationale": "The text lists these four components: the right to remain silent, that anything said can be used against them, the right to an attorney, and that an attorney will be appointed if they cannot afford one."}, {"text": "That he has the right to speedy trial and an impartial jury.", "isCorrect": false, "rationale": "These are Sixth Amendment TRIAL rights, not Miranda warnings given at the point of custodial interrogation."}, {"text": "That he has the right to protest his arrest publicly.", "isCorrect": false, "rationale": "This is not one of the four components listed in the Miranda warnings described in the text."}], "id": "q03"}, {"question": "In Carpenter v. United States (2018), the Supreme Court held that law enforcement must obtain a warrant before:", "options": [{"text": "Searching a cell phone incident to arrest.", "isCorrect": false, "rationale": "That holding is from Riley v. California (2014), a different case. Carpenter addressed historical cell-site location information."}, {"text": "Accessing cell-site location information from a suspect's wireless carrier.", "isCorrect": true, "rationale": "The text says Carpenter 'held that accessing cell-site location information requires a warrant, extending Fourth Amendment protections into the digital age.'"}, {"text": "Reading publicly posted social media content.", "isCorrect": false, "rationale": "Public social media is not the subject of Carpenter; the case addressed third-party-held location records."}, {"text": "Recording a statement already volunteered in public.", "isCorrect": false, "rationale": "Publicly volunteered statements are not addressed by Carpenter, which focuses on historical cell-site location data."}], "id": "q04"}, {"question": "The 'separate sovereigns' doctrine, as described in the section, explains why:", "options": [{"text": "Congress alone may regulate multi-state crimes.", "isCorrect": false, "rationale": "The separate sovereigns doctrine addresses double jeopardy treatment when state and federal governments each prosecute—not congressional exclusivity."}, {"text": "A defendant acquitted in state court may still be prosecuted by the federal government for the same conduct without violating double jeopardy.", "isCorrect": true, "rationale": "The text states: 'separate state and federal prosecutions for the same conduct do not violate double jeopardy under the \"separate sovereigns\" doctrine.'"}, {"text": "Federal agents may search a home without a warrant if state officers are present.", "isCorrect": false, "rationale": "The separate sovereigns doctrine concerns prosecution and double jeopardy, not search-and-seizure procedures."}, {"text": "State courts may override federal judgments on constitutional matters.", "isCorrect": false, "rationale": "State courts cannot override federal judgments on federal constitutional questions; this is not what the separate sovereigns doctrine addresses."}], "id": "q05"}, {"question": "A police officer, without a warrant, sees a plain bag of drugs on the passenger seat of a car through the window during a lawful traffic stop. He opens the car door and seizes the evidence. Based on the exceptions to the warrant requirement listed in the section, which exception most likely applies?", "options": [{"text": "Exigent circumstances.", "isCorrect": false, "rationale": "Exigent circumstances require an urgent emergency (e.g., imminent destruction of evidence, hot pursuit). A plain-sight traffic-stop observation is not governed by exigent circumstances here."}, {"text": "The plain view doctrine.", "isCorrect": true, "rationale": "The text lists 'plain view doctrine' as an exception to the warrant requirement. An officer lawfully positioned who observes evidence in plain view may seize it without a warrant."}, {"text": "Consent search.", "isCorrect": false, "rationale": "A consent search requires the suspect's voluntary agreement; the scenario describes an officer acting on observation, not consent."}, {"text": "Search incident to arrest.", "isCorrect": false, "rationale": "Search incident to arrest requires a lawful arrest; the scenario does not indicate an arrest at the time of the observation."}], "id": "q06"}, {"question": "Clarence Earl Gideon's case began when, too poor to afford a lawyer, he was denied appointed counsel under Florida law. According to the section, what motivated the Supreme Court to reverse his conviction?", "options": [{"text": "Justice Black's reasoning that, in an adversary system, a fair trial requires counsel for anyone too poor to hire a lawyer.", "isCorrect": true, "rationale": "The text quotes Black: 'in our adversary system of criminal justice, any person haled into court, who is too poor to hire a lawyer, cannot be assured a fair trial unless counsel is provided for him.'"}, {"text": "Florida's violation of the Second Amendment.", "isCorrect": false, "rationale": "Gideon was a Sixth Amendment right-to-counsel case. The Second Amendment (arms) is unrelated."}, {"text": "Gideon's innocence being conclusively proven before the Supreme Court.", "isCorrect": false, "rationale": "The Supreme Court ruled on the constitutional question of appointed counsel; Gideon's innocence was adjudicated at his retrial, not at the Supreme Court."}, {"text": "The state's failure to follow federal sentencing guidelines.", "isCorrect": false, "rationale": "The issue was denial of appointed counsel, not federal sentencing guidelines."}], "id": "q07"}, {"question": "The Fifth Amendment's Takings Clause, described in the section, allows the government to take private property only:", "options": [{"text": "For any reason it chooses, with no compensation required.", "isCorrect": false, "rationale": "The text says takings require 'just compensation' and must be 'for public use.'"}, {"text": "For public use, and only with just compensation.", "isCorrect": true, "rationale": "The text states: 'The government may take private property for public use, but only with \"just compensation.\"'"}, {"text": "For private commercial use by any developer.", "isCorrect": false, "rationale": "The constitutional text requires 'public use,' not simply private commercial use."}, {"text": "Only if the owner consents to the taking.", "isCorrect": false, "rationale": "Eminent domain is, by definition, a taking that need not depend on the owner's consent—only on public use and just compensation."}], "id": "q08"}, {"question": "The Sixth Amendment, according to the section, includes all of the following rights for criminal defendants EXCEPT:", "options": [{"text": "A speedy and public trial.", "isCorrect": false, "rationale": "The section lists 'A speedy and public trial' as a Sixth Amendment right."}, {"text": "An impartial jury.", "isCorrect": false, "rationale": "The section lists 'An impartial jury' as a Sixth Amendment right."}, {"text": "Protection against double jeopardy.", "isCorrect": true, "rationale": "Double jeopardy is a FIFTH Amendment protection, not a Sixth Amendment right. It is listed separately in the section under the Fifth Amendment."}, {"text": "The right to confront witnesses.", "isCorrect": false, "rationale": "The section lists 'The right to confront witnesses' as a Sixth Amendment right."}], "id": "q09"}, {"question": "According to the section, the primary purpose of the exclusionary rule is to:", "options": [{"text": "Compensate victims of unlawful searches.", "isCorrect": false, "rationale": "The exclusionary rule is a remedial rule for trials, not a compensation scheme."}, {"text": "Deter police misconduct by ensuring illegally seized evidence is excluded at trial.", "isCorrect": true, "rationale": "The text states: 'Its purpose is to deter police misconduct: if officers know that illegally seized evidence will be excluded, they have a strong incentive to obtain proper warrants and follow constitutional procedures.'"}, {"text": "Allow prosecutors to use illegally obtained evidence if it is reliable.", "isCorrect": false, "rationale": "The rule does the opposite—it bars such evidence regardless of reliability, to deter illegal searches."}, {"text": "Punish defendants who resist arrest.", "isCorrect": false, "rationale": "The rule limits government conduct, not defendant conduct, and is not a punishment mechanism."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
