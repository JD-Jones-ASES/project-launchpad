        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Influence of Political Events on Ideology</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement best captures how the New Deal shifted the ideological center of American politics, according to the text?", "options": [{"text": "Republicans aggressively dismantled the New Deal once they regained power.", "isCorrect": false, "rationale": "The text notes that 'President Eisenhower did not attempt to dismantle Social Security or the FDIC,' showing Republicans largely accepted the New Deal framework."}, {"text": "What had been considered radical government intervention became the new mainstream baseline, accepted even by most Republicans.", "isCorrect": true, "rationale": "The text states directly: 'what had been considered radical government intervention became the new baseline for mainstream politics. Even Republicans largely accepted the New Deal framework.'"}, {"text": "The New Deal had no long-term ideological impact because the Great Depression ended.", "isCorrect": false, "rationale": "The text describes the New Deal as establishing an enduring principle about federal responsibility for economic security and forming a coalition that dominated politics for decades."}, {"text": "Americans became uniformly opposed to all forms of federal economic intervention.", "isCorrect": false, "rationale": "The text describes the opposite: public support for federal responsibility for economic security became the new center of gravity."}], "id": "q01"}, {"question": "A student argues that President Reagan's declaration \"government is not the solution to our problem; government is the problem\" illustrates an ideological reframing of the post-New Deal consensus. Which statement from the text best supports this argument?", "options": [{"text": "The Reagan Revolution eliminated the welfare state entirely.", "isCorrect": false, "rationale": "The text explicitly notes that the Reagan Revolution 'did not eliminate the welfare state.'"}, {"text": "The Reagan Revolution reframed the debate so that 'the burden of proof shifted from those who wanted to limit government to those who wanted to expand it.'", "isCorrect": true, "rationale": "This is quoted directly from the text and captures the ideological reframing the student describes."}, {"text": "Reagan's economic policy was essentially identical to Johnson's Great Society.", "isCorrect": false, "rationale": "The text describes Reaganomics as a fundamental ideological shift away from the Great Society, not a continuation."}, {"text": "Stagflation had nothing to do with the conservative backlash.", "isCorrect": false, "rationale": "The text specifically identifies stagflation as discrediting the Keynesian consensus and setting up the Reagan-era shift."}], "id": "q02"}, {"question": "Reaganomics as described in the text rested on three pillars. Which option correctly lists them?", "options": [{"text": "Expanded welfare, higher taxes on the wealthy, and expanded labor protections.", "isCorrect": false, "rationale": "These are the opposite of supply-side and Reagan-era priorities."}, {"text": "Tax cuts (especially for high earners and businesses), deregulation, and reduced domestic spending.", "isCorrect": true, "rationale": "The text lists these three pillars exactly: 'tax cuts (especially for high earners and businesses), deregulation, and reduced domestic spending.'"}, {"text": "Progressive taxation, environmental regulation, and social insurance expansion.", "isCorrect": false, "rationale": "None of these match Reaganomics as described; they align more with Great Society or New Deal approaches."}, {"text": "A national healthcare mandate, tax credits for low-income earners, and expanded housing subsidies.", "isCorrect": false, "rationale": "These policies do not match Reaganomics; they describe later Democratic or liberal initiatives."}], "id": "q03"}, {"question": "The September 11 attacks produced an immediate bipartisan response in the form of which piece of legislation, according to the text?", "options": [{"text": "The Affordable Care Act.", "isCorrect": false, "rationale": "The ACA was passed in 2010 in response to healthcare policy concerns, not as an immediate 9/11 response."}, {"text": "The Civil Rights Act.", "isCorrect": false, "rationale": "The Civil Rights Act was passed in 1964, decades before 9/11."}, {"text": "The USA PATRIOT Act.", "isCorrect": true, "rationale": "The text specifies that 'the USA PATRIOT Act, which expanded government surveillance powers, passed with overwhelming bipartisan support.'"}, {"text": "Medicare Part D.", "isCorrect": false, "rationale": "Medicare Part D expanded prescription drug coverage in 2003; it was not the immediate legislative response to 9/11."}], "id": "q04"}, {"question": "The text presents the following hypothetical summary about the COVID-19 pandemic's effect on ideology:\n\n- CARES Act and American Rescue Plan distributed trillions in direct payments (initial bipartisan support)\n- Governors issued stay-at-home orders and mask mandates\n- Vaccine mandates and gathering restrictions weighed collective safety against personal freedom\n\nWhich conclusion from this summary is best supported by the text's discussion?", "options": [{"text": "The pandemic resolved long-running ideological tensions in American politics.", "isCorrect": false, "rationale": "The text frames the pandemic as sharpening tensions (e.g., liberty vs. public welfare), not resolving them."}, {"text": "The pandemic challenged traditional conservative skepticism of government spending in its initial bipartisan response and sharpened debates over the limits of emergency powers.", "isCorrect": true, "rationale": "The text lists both phenomena as illustrative of how a single event can reshape ideological positions, including challenging conservative anti-spending positions and provoking liberty-vs.-safety debates."}, {"text": "Both parties ended up taking identical positions on all pandemic issues.", "isCorrect": false, "rationale": "The text emphasizes ongoing debates over mask mandates, vaccine mandates, and executive authority, not bipartisan agreement."}, {"text": "The pandemic had no long-term effect on American ideology.", "isCorrect": false, "rationale": "The text's discussion questions explicitly suggest the pandemic may produce lasting ideological shifts comparable to the New Deal or 9/11."}], "id": "q05"}, {"question": "Which event does the text identify as \"the high-water mark of liberal confidence in government's ability to solve social problems\"?", "options": [{"text": "The New Deal.", "isCorrect": false, "rationale": "The text reserves the \"high-water mark\" language specifically for the Great Society, not the New Deal."}, {"text": "The Reagan Revolution.", "isCorrect": false, "rationale": "The Reagan Revolution represented a conservative reorientation, not a peak of liberal confidence."}, {"text": "The Great Society programs (Medicare, Medicaid, Head Start, federal education funding).", "isCorrect": true, "rationale": "The text states: 'The Great Society represented the high-water mark of liberal confidence in government's ability to solve social problems.'"}, {"text": "The Affordable Care Act.", "isCorrect": false, "rationale": "The ACA is described as a major healthcare expansion but is not labeled the high-water mark of liberal confidence in the text."}], "id": "q06"}, {"question": "The Affordable Care Act crystallized an ideological divide because it included all of the following provisions EXCEPT:", "options": [{"text": "A mandate that most Americans obtain health insurance.", "isCorrect": false, "rationale": "The text states the ACA 'mandated that most Americans obtain health insurance.'"}, {"text": "A prohibition on denial of coverage for preexisting conditions.", "isCorrect": false, "rationale": "The text lists this provision: the ACA 'prohibited denial of coverage for preexisting conditions.'"}, {"text": "Expanded Medicaid eligibility.", "isCorrect": false, "rationale": "The text includes expanded Medicaid as part of the ACA."}, {"text": "Elimination of private health insurance, replacing it with a single-payer system.", "isCorrect": true, "rationale": "The ACA did NOT replace private insurance with a single-payer system; it preserved private insurance while adding mandates, subsidies, and marketplaces."}], "id": "q07"}, {"question": "Consider this hypothetical trend: Support for \"strong military action against terrorism\" surged across both parties in late 2001, then began to diverge by 2004, with liberals growing concerned about civil liberties and conservatives continuing to emphasize executive authority. This pattern most directly illustrates:", "options": [{"text": "A permanent end to partisan disagreement on foreign policy.", "isCorrect": false, "rationale": "The pattern described involves divergence, not permanent consensus."}, {"text": "How a major event can produce short-term ideological convergence followed by renewed divergence along partisan lines — exactly what the text describes regarding 9/11.", "isCorrect": true, "rationale": "The text describes this pattern: an immediate 9/11 shift in favor of strong response, then over time, 'the 9/11 era deepened existing divisions' as liberals emphasized civil liberties and conservatives emphasized executive power."}, {"text": "The failure of polling to measure foreign policy views.", "isCorrect": false, "rationale": "The scenario assumes polling worked as expected; it describes a pattern that polling captured, not a methodological failure."}, {"text": "The realignment of the Republican Party into a peace party.", "isCorrect": false, "rationale": "The text describes conservatives continuing to emphasize military response, not a realignment toward pacifism."}], "id": "q08"}, {"question": "A historian argues that the Civil Rights Act of 1964 and Voting Rights Act of 1965 \"cemented a liberal view of government as an instrument of justice and equality.\" Which evidence in the text best supports this claim?", "options": [{"text": "The legislation established the federal government as the primary protector of minority rights against state-level discrimination.", "isCorrect": true, "rationale": "The text states directly: 'The resulting legislation... established the federal government as the primary protector of minority rights against state-level discrimination. This cemented a liberal view of government as an instrument of justice and equality.'"}, {"text": "The legislation dismantled the federal role in civil rights enforcement.", "isCorrect": false, "rationale": "The text describes the opposite: the legislation expanded federal enforcement authority."}, {"text": "The legislation originated in the Reagan administration.", "isCorrect": false, "rationale": "The acts were signed by President Lyndon B. Johnson in 1964 and 1965, during the Great Society era."}, {"text": "The legislation passed unanimously in both houses of Congress.", "isCorrect": false, "rationale": "The text does not claim unanimous passage; in fact, passage required Northern Republican votes to overcome Southern Democratic opposition."}], "id": "q09"}, {"question": "Which generalization best captures what the text's survey of five events (New Deal, civil rights, Reagan, 9/11, ACA) — plus COVID-19 — illustrates about the relationship between events and ideology?", "options": [{"text": "Political ideology is fixed and unaffected by real-world events.", "isCorrect": false, "rationale": "The text argues the opposite: events 'do not merely reflect existing ideologies — they reshape them.'"}, {"text": "Major events can reshape what Americans believe about government's proper role for generations, sometimes permanently shifting the ideological center.", "isCorrect": true, "rationale": "This is the explicit thesis the text opens with: major events can 'alter what Americans believe about government's proper role for generations.'"}, {"text": "Only economic events affect ideology; cultural and security events do not.", "isCorrect": false, "rationale": "The text explicitly discusses the civil rights movement (cultural) and 9/11 (security) as ideologically transformative events, contradicting this claim."}, {"text": "Ideological change is always bipartisan and resolves in consensus.", "isCorrect": false, "rationale": "The text shows that events often deepen divisions (e.g., 9/11 liberties debate, ACA), not that they produce lasting consensus."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
