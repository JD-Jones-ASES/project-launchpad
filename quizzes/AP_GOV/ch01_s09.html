        <div class="score-detail" id="score-detail"></div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "In Arizona v. United States (2012), the Supreme Court struck down several provisions of Arizona's SB 1070 immigration law but upheld one provision. Which constitutional doctrine did the Court apply, and to what effect?", "options": [{"text": "The Tenth Amendment reserved immigration entirely to Arizona.", "isCorrect": false, "rationale": "The text says the opposite: the Court struck down most Arizona provisions under the Supremacy Clause because federal law preempted state enforcement."}, {"text": "The Supremacy Clause — holding that federal immigration law preempted most of Arizona's enforcement mechanisms, while upholding the provision permitting officers to check immigration status during lawful stops", "isCorrect": true, "rationale": "The text states the Court 'struck down several provisions of SB 1070 under the Supremacy Clause, holding that federal immigration law preempted most of Arizona's enforcement mechanisms,' while upholding the 'reasonable suspicion' status-check provision."}, {"text": "The First Amendment, protecting immigrant speech", "isCorrect": false, "rationale": "The case did not turn on speech protections; it turned on federalism and preemption."}, {"text": "The Commerce Clause, expanding state power", "isCorrect": false, "rationale": "Commerce Clause reasoning was not central; preemption under the Supremacy Clause drove the ruling."}], "id": "q01"}, {"question": "Under the federal Controlled Substances Act, marijuana is a Schedule I drug, but as of 2025, twenty-four states and DC have legalized recreational marijuana. Why has this direct conflict between state and federal law largely gone unresolved in courts?", "options": [{"text": "Because the Supreme Court ruled marijuana legalization constitutional in 1970", "isCorrect": false, "rationale": "No such ruling exists; the text describes the conflict as unresolved."}, {"text": "Because the federal government has generally exercised prosecutorial discretion — choosing not to enforce federal marijuana laws in states that have legalized the drug and built regulatory frameworks", "isCorrect": true, "rationale": "The text states 'the federal government has generally adopted a hands-off approach, choosing not to enforce federal marijuana laws in states that have legalized the drug. This is an exercise of prosecutorial discretion.'"}, {"text": "Because the Tenth Amendment explicitly authorizes state drug laws regardless of federal policy", "isCorrect": false, "rationale": "The Controlled Substances Act is a valid federal law; the Tenth Amendment does not grant states authority to override it, and the conflict remains constitutionally unresolved."}, {"text": "Because marijuana is not a Schedule I drug under federal law", "isCorrect": false, "rationale": "The text explicitly states marijuana is 'classified as a Schedule I drug' under federal law."}], "id": "q02"}, {"question": "Colorado's legal marijuana industry generates over $400 million in annual tax revenue, yet marijuana businesses face serious banking obstacles. Based on the text, what best explains these banking difficulties?", "options": [{"text": "Banks are federally regulated and have been reluctant to provide services to marijuana businesses because those businesses comply with state law but violate federal law.", "isCorrect": true, "rationale": "The text states exactly this: 'Banks, which are federally regulated, have been reluctant to provide services to marijuana businesses, forcing many to operate on a cash-only basis.'"}, {"text": "Colorado state law prohibits banking for marijuana businesses.", "isCorrect": false, "rationale": "Colorado has legalized recreational marijuana; the state does not prohibit banking for that industry."}, {"text": "Marijuana businesses refuse to use banks as a matter of principle.", "isCorrect": false, "rationale": "The text attributes the difficulty to banks' federal regulatory risk, not business owners' preferences."}, {"text": "The Full Faith and Credit Clause prevents banks from recognizing marijuana businesses.", "isCorrect": false, "rationale": "That clause concerns interstate recognition of legal acts, not federal banking regulation."}], "id": "q03"}, {"question": "No Child Left Behind (NCLB), signed by President George W. Bush in 2002, was later replaced by the Every Student Succeeds Act (ESSA), signed by President Barack Obama in 2015. Which description best captures the shift from NCLB to ESSA, according to the text?", "options": [{"text": "ESSA maintained federal testing requirements but gave states greater flexibility in designing accountability systems — a shift from greater federal control toward greater state discretion.", "isCorrect": true, "rationale": "The text states ESSA 'returned more authority to the states' and 'gave states greater flexibility in designing accountability systems,' illustrating 'the pendulum of federalism in education.'"}, {"text": "ESSA abolished federal testing entirely.", "isCorrect": false, "rationale": "The text says ESSA 'maintained federal testing requirements,' not that it abolished them."}, {"text": "ESSA stripped states of all authority over curriculum.", "isCorrect": false, "rationale": "ESSA moved in the opposite direction — returning more authority to states."}, {"text": "ESSA made education a federal function for the first time.", "isCorrect": false, "rationale": "Federal education funding and regulation long predated ESSA; NCLB itself dates to 2002."}], "id": "q04"}, {"question": "Common Core State Standards were developed by a consortium of states (not the federal government), but the Obama administration incentivized adoption through the Race to the Top grant program. Which federalism concept most directly explains how the federal government influenced state curriculum without formally mandating it?", "options": [{"text": "Fiscal federalism — using federal spending power to shape state and local policy", "isCorrect": true, "rationale": "The text introduces fiscal federalism as 'the use of federal spending power to influence state and local policy' (Topic 1.8), and applies the concept here when noting the federal government 'used financial leverage' via Race to the Top to encourage state adoption of Common Core."}, {"text": "The Privileges and Immunities Clause", "isCorrect": false, "rationale": "This clause addresses state discrimination against non-residents, not federal influence via grants."}, {"text": "The Extradition Clause", "isCorrect": false, "rationale": "Extradition addresses criminal fugitives between states, not curriculum policy."}, {"text": "Judicial review", "isCorrect": false, "rationale": "No court ruling is described; the mechanism is grant conditions, not judicial enforcement."}], "id": "q05"}, {"question": "Under the Clean Air Act, California can set its own vehicle emission standards that are more stringent than federal requirements, and other states may choose to follow either federal or California standards. What does the text argue this arrangement demonstrates?", "options": [{"text": "That the Supremacy Clause prohibits any state environmental standards", "isCorrect": false, "rationale": "States can adopt stricter standards under the text's framework; the Supremacy Clause does not prohibit stricter state rules here."}, {"text": "That California functions as a 'federalism laboratory' in environmental policy, driving innovation in vehicle emissions technology", "isCorrect": true, "rationale": "The text states 'This arrangement has created a federalism laboratory in environmental policy, with California driving innovation in vehicle emissions technology.'"}, {"text": "That federal environmental standards do not exist", "isCorrect": false, "rationale": "The EPA sets minimum national standards, according to the text; the California waiver is an exception for stricter standards."}, {"text": "That California opposes all environmental regulation", "isCorrect": false, "rationale": "The text describes California adopting stricter, not looser, environmental rules."}], "id": "q06"}, {"question": "During the COVID-19 pandemic, state governors issued stay-at-home orders, mandated masks, and set vaccination priorities, while the federal government coordinated vaccine development and issued CDC guidance. Which constitutional concept most directly supports the states' role described here?", "options": [{"text": "The enumerated power to 'regulate commerce with foreign nations'", "isCorrect": false, "rationale": "That enumerated power is federal, not state, and concerns foreign commerce, not domestic public health."}, {"text": "The police power — a state reserved power to protect public health, safety, welfare, and morals", "isCorrect": true, "rationale": "The text states 'States exercised their reserved police power to issue stay-at-home orders, close businesses, mandate masks, restrict gatherings.' The police power is listed among states' reserved powers in Topic 1.7."}, {"text": "The Necessary and Proper Clause", "isCorrect": false, "rationale": "That clause is a source of federal (not state) implied powers."}, {"text": "Judicial review", "isCorrect": false, "rationale": "Judicial review is a check on other branches, not a grant of state authority."}], "id": "q07"}, {"question": "In NFIB v. OSHA (2022), the Supreme Court struck down OSHA's workplace vaccine mandate for large private employers but upheld a narrower mandate for healthcare workers receiving federal funds. What federalism principle does this split ruling most clearly illustrate?", "options": [{"text": "That federal agencies possess unlimited regulatory authority during emergencies", "isCorrect": false, "rationale": "The text shows the opposite — the Court struck down the broader private-employer mandate, confirming federal power has constitutional limits."}, {"text": "That there are constitutional limits on federal regulatory authority even in a public health crisis, but federal conditions tied to federal funding can reach further", "isCorrect": true, "rationale": "The text contrasts the struck-down workplace mandate with the upheld mandate for 'healthcare workers receiving federal funds,' showing judicial limits on general federal regulation but broader reach when federal funding conditions apply — consistent with the fiscal federalism framework in Topic 1.8."}, {"text": "That states have exclusive authority over all workplace safety", "isCorrect": false, "rationale": "OSHA exercises federal authority over workplace safety; the Court limited, not eliminated, that authority in specific contexts."}, {"text": "That pandemics suspend the Constitution", "isCorrect": false, "rationale": "The Court's willingness to strike down the broader mandate shows exactly the opposite — constitutional limits remained enforceable."}], "id": "q08"}, {"question": "Nebraska and Oklahoma once sued Colorado in the Supreme Court, arguing that Colorado's marijuana legalization increased trafficking across state lines and burdened their law enforcement. The Court declined to hear the case (Nebraska v. Colorado, 2016). Based on the text, what underlying federalism tension did the lawsuit expose?", "options": [{"text": "The Full Faith and Credit Clause's requirement that states honor each other's marriages", "isCorrect": false, "rationale": "Full Faith and Credit concerns marriages, judgments, and records — not drug policy spillovers."}, {"text": "Whether states may effectively nullify federal law through legalization, and how one state's policy choices create cross-border costs for neighboring states whose laws differ", "isCorrect": true, "rationale": "The text frames marijuana federalism as raising whether states can 'effectively nullify federal law through legalization' and notes the Nebraska/Oklahoma suit about cross-border costs; the underlying tension persists despite the Court's declining to hear the case."}, {"text": "The Extradition Clause's fugitive return requirement", "isCorrect": false, "rationale": "The case was not about extradition of fugitives; it was about state-to-state spillover effects of legalization."}, {"text": "Whether the federal government can regulate interstate highways", "isCorrect": false, "rationale": "Highway regulation is not the issue in this lawsuit; trafficking across state lines is treated as a federalism and interstate-effects question."}], "id": "q09"}, {"question": "The text introduces a three-part framework — 'Claim + Evidence + Reasoning' — for constructing AP Gov arguments. Which option below best matches the text's definition of a strong claim (as opposed to a weak one)?", "options": [{"text": "Weak: 'The system of federalism strengthens democratic governance by allowing states to serve as laboratories.' Strong: 'Federalism divides power between national and state governments.'", "isCorrect": false, "rationale": "This reverses the text's labels: the definitional statement is weak, while the defensible position is strong."}, {"text": "A strong claim is a clear, defensible statement that directly answers the question — a position, not a fact or summary — as in: 'The system of federalism strengthens democratic governance by allowing states to serve as laboratories for policy innovation while maintaining national unity on essential matters.'", "isCorrect": true, "rationale": "The text states 'A claim is not a fact or a summary — it is a position' and gives precisely this example as 'Strong,' contrasted with the weak, definitional statement."}, {"text": "A strong claim simply summarizes the section being discussed.", "isCorrect": false, "rationale": "The text explicitly rejects summary as a claim; a claim must take a defensible position."}, {"text": "A strong claim is always a direct quotation from a Supreme Court ruling.", "isCorrect": false, "rationale": "The text's framework distinguishes claim (the position) from evidence (which may include case law); the claim is the author's position, not the citation itself."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
