<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP U.S. Government and Politics &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Roles and Powers of the President</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which set of presidential roles is most accurately paired with its constitutional responsibility?", "options": [{"text": "Chief Diplomat — formally declares war on foreign nations.", "isCorrect": false, "rationale": "Only Congress can formally declare war; the president's diplomatic role involves negotiating treaties, receiving ambassadors, and recognizing governments."}, {"text": "Commander in Chief — commands the armed forces, although only Congress can formally declare war.", "isCorrect": true, "rationale": "The text specifies the Commander in Chief role gives the president 'direct control over military operations, though only Congress can formally declare war.'"}, {"text": "Chief Legislator — introduces bills directly on the floor of Congress.", "isCorrect": false, "rationale": "The text makes clear the president 'cannot introduce bills in Congress' but shapes the agenda through messaging, proposals, and the veto."}, {"text": "Chief Executive — writes all federal laws.", "isCorrect": false, "rationale": "Laws are written by Congress; the Chief Executive role is to oversee the bureaucracy and ensure laws are 'faithfully executed.'"}]}, {"question": "The president signs a bill into law and attaches a written statement asserting that one provision will not be enforced because the president believes it is unconstitutional. Which presidential tool is being exercised?", "options": [{"text": "An executive agreement.", "isCorrect": false, "rationale": "Executive agreements are diplomatic instruments with foreign governments, not attachments to domestic legislation."}, {"text": "A signing statement.", "isCorrect": true, "rationale": "The text defines signing statements as 'Written comments issued by the president when signing a bill into law, sometimes indicating that the president interprets certain provisions differently or may not fully enforce specific sections.'"}, {"text": "A pocket veto.", "isCorrect": false, "rationale": "A pocket veto occurs when the president takes no action while Congress has adjourned; signing and annotating a bill is not a pocket veto."}, {"text": "A writ of certiorari.", "isCorrect": false, "rationale": "Certiorari is a Supreme Court device for selecting cases to review, not a presidential power."}]}, {"question": "Alexander Hamilton argued in Federalist No. 70 that the executive must have 'energy.' Which of the following does Hamilton explicitly identify as a requirement for energy in the executive?", "options": [{"text": "A plural executive council to prevent dominance by one person.", "isCorrect": false, "rationale": "Hamilton argued the opposite — for UNITY, 'a single president rather than a council or plural executive.'"}, {"text": "Unity, duration, adequate provision for support, and competent powers.", "isCorrect": true, "rationale": "The text lists these four requirements verbatim: '(1) unity…(2) duration…(3) adequate provision for support…(4) competent powers.'"}, {"text": "Annual rotation of the presidency among state governors.", "isCorrect": false, "rationale": "Rotation and duration are opposites; Hamilton stressed a term long enough to provide stability."}, {"text": "A salary that Congress can reduce at will during the president's term.", "isCorrect": false, "rationale": "Hamilton argued the salary should NOT be reducible during the president's term — that is the 'adequate provision for support' feature."}]}, {"question": "Congress passes a controversial bill. The president dislikes it but knows a veto override is unlikely to succeed. Which formal power can the president still use to constrain the bill's path, and how?", "options": [{"text": "Judicial review — by unilaterally striking down the bill.", "isCorrect": false, "rationale": "Judicial review belongs to the courts, not the president."}, {"text": "The veto, because returning the bill forces Congress to reach a two-thirds supermajority in both chambers to override.", "isCorrect": true, "rationale": "The text explains that a vetoed bill 'returns to Congress, where a two-thirds vote in both chambers is required to override' — a difficult threshold that in practice constrains even legislation the president cannot outright defeat."}, {"text": "The contingent election power, forcing the House to re-vote.", "isCorrect": false, "rationale": "Contingent election applies to presidential elections without an Electoral College majority, not to ordinary legislation."}, {"text": "The filibuster, used by the president on the floor of the Senate.", "isCorrect": false, "rationale": "The filibuster is a Senate prerogative used by senators, not a presidential tool."}]}, {"question": "Which of the following best captures Richard Neustadt's central claim about presidential power in 'Presidential Power' (1960)?", "options": [{"text": "Presidents rule through the force of executive orders alone.", "isCorrect": false, "rationale": "Neustadt's argument is that formal powers alone are 'insufficient,' directly contradicting the idea that orders are enough."}, {"text": "Presidential power is fundamentally the power to persuade — presidents must bargain with Congress, the bureaucracy, interest groups, and the public.", "isCorrect": true, "rationale": "The text paraphrases Neustadt: 'the power of the presidency is fundamentally the power to persuade' and lists exactly those constituencies the president must bargain with."}, {"text": "Presidential power is purely ceremonial in a modern democracy.", "isCorrect": false, "rationale": "Neustadt's thesis emphasized substantive political power through persuasion, not ceremony."}, {"text": "Presidents derive their authority primarily from treaty-making.", "isCorrect": false, "rationale": "Treaty-making is one formal power, but Neustadt's broader argument is about persuasion across domestic and political actors."}]}, {"question": "An executive agreement differs from a formal treaty primarily because it:", "options": [{"text": "Requires a simple majority of the House rather than the Senate.", "isCorrect": false, "rationale": "Executive agreements do not require House approval; their key distinction is that they bypass Senate ratification entirely."}, {"text": "Does not require Senate ratification and can be reversed by successor presidents.", "isCorrect": true, "rationale": "The text states executive agreements 'do not require Senate ratification' and 'can be reversed by successors,' contrasting them with treaties, which need two-thirds Senate ratification."}, {"text": "Must be ratified by three-quarters of the states like a constitutional amendment.", "isCorrect": false, "rationale": "That is the amendment ratification threshold, not a requirement for executive agreements."}, {"text": "Is explicitly described in Article II of the Constitution.", "isCorrect": false, "rationale": "The text notes executive agreements are 'not mentioned in the Constitution,' unlike treaties."}]}, {"question": "Theodore Roosevelt coined the term 'bully pulpit' to describe which presidential capability?", "options": [{"text": "The president's ability to command public attention and shape public opinion.", "isCorrect": true, "rationale": "The text defines the bully pulpit as 'the president's unique ability to command public attention and shape public opinion,' using speeches, media, and social media to pressure Congress."}, {"text": "The president's power to dismiss federal judges for disagreeing with executive policy.", "isCorrect": false, "rationale": "Federal judges have life tenure and cannot be dismissed by the president; the bully pulpit is a communicative, not coercive, tool."}, {"text": "The president's ability to confirm Supreme Court justices without Senate input.", "isCorrect": false, "rationale": "Senate confirmation is constitutionally required; the bully pulpit is about public persuasion, not unilateral action."}, {"text": "The president's authority to levy new taxes by decree.", "isCorrect": false, "rationale": "Taxation is a congressional enumerated power; the bully pulpit does not confer taxing authority."}]}, {"question": "In United States v. Nixon (1974), the Supreme Court addressed a claim of executive privilege. Which conclusion best reflects the decision as described in the text?", "options": [{"text": "Executive privilege does not exist in any form.", "isCorrect": false, "rationale": "The text says the Court 'recognized the principle' of executive privilege — not that it dismissed it entirely."}, {"text": "Executive privilege is recognized as a principle but is not absolute.", "isCorrect": true, "rationale": "The text says the Supreme Court 'recognized the principle but held it is not absolute,' balancing presidential confidentiality against other constitutional interests."}, {"text": "Executive privilege is explicitly enumerated in Article II.", "isCorrect": false, "rationale": "The text says executive privilege 'is not mentioned in the Constitution' — it is an informal claimed right."}, {"text": "Executive privilege automatically overrides subpoenas in all criminal investigations.", "isCorrect": false, "rationale": "The 'not absolute' holding means it does not automatically override competing interests like criminal investigations."}]}, {"question": "Which combination correctly pairs a FORMAL presidential power with an INFORMAL one, based on the text?", "options": [{"text": "Formal: veto; Informal: bully pulpit.", "isCorrect": true, "rationale": "The text classifies the veto as a formal constitutional power and the bully pulpit as an informal tool of influence — a direct match."}, {"text": "Formal: bully pulpit; Informal: appointment power.", "isCorrect": false, "rationale": "The pairing is reversed: appointments are formal; the bully pulpit is informal."}, {"text": "Formal: signing statements; Informal: pardon power.", "isCorrect": false, "rationale": "Pardons are a formal constitutional power; signing statements are debated but typically classified as informal tools."}, {"text": "Formal: persuasion; Informal: veto.", "isCorrect": false, "rationale": "Persuasion is Neustadt's informal concept, and the veto is explicitly a formal power — this pairing is inverted."}]}, {"question": "A president issues an executive order limiting imports from a specific country. A successor president issues a new executive order reversing the first. Which statement best reflects the text's view of this pattern?", "options": [{"text": "Executive orders are invalid because they are not mentioned in the Constitution.", "isCorrect": false, "rationale": "The text says executive orders 'have the force of law' even though they derive from Article II rather than explicit enumeration."}, {"text": "Executive orders illustrate both the power and fragility of unilateral executive action — presidents can reshape policy quickly, but successors can reverse those choices just as quickly.", "isCorrect": true, "rationale": "The text notes presidents have used orders extensively on contested issues, 'often reversing their predecessors' orders, illustrating both the power and the fragility of unilateral executive action.'"}, {"text": "Executive orders can only be overturned by constitutional amendment.", "isCorrect": false, "rationale": "Executive orders can be 'overturned by subsequent presidents, struck down by courts, or superseded by legislation,' per the text — no amendment needed."}, {"text": "Executive orders require two-thirds Senate confirmation.", "isCorrect": false, "rationale": "No Senate confirmation is required for executive orders; that threshold applies to treaty ratification."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
