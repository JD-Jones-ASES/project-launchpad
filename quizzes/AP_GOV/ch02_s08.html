        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">

        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; The Judicial Branch</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Article III of the Constitution establishes the judicial branch but creates only one court directly. Which court is that, and what does it mean for the rest of the federal judiciary?", "options": [{"text": "The Supreme Court is the only court created directly by the Constitution; all other federal courts are established by Congress through legislation.", "isCorrect": true, "rationale": "The text states Article III creates 'one supreme Court, and in such inferior Courts as the Congress may from time to time ordain and establish,' making the Supreme Court the sole constitutionally mandated federal court."}, {"text": "All federal courts are named in Article III and cannot be abolished.", "isCorrect": false, "rationale": "Only the Supreme Court is named in Article III; other federal courts exist by statute and can be restructured."}, {"text": "The Court of Appeals is created directly by the Constitution.", "isCorrect": false, "rationale": "Courts of Appeals are congressionally created inferior courts, not constitutionally required."}, {"text": "The District Courts are created by the Supreme Court, not by Congress.", "isCorrect": false, "rationale": "Lower federal courts are created by Congress, not by the Supreme Court."}], "id": "q01"}, {"question": "Which Article III protection most directly insulates federal judges from political retaliation by the elected branches?", "options": [{"text": "Life tenure during 'good Behaviour' and a guarantee that compensation 'shall not be diminished during their Continuance in Office.'", "isCorrect": true, "rationale": "The text lists these two protections together as mechanisms that 'shield judges from political pressure,' letting them decide cases on law rather than popular opinion."}, {"text": "Mandatory retirement at age 70.", "isCorrect": false, "rationale": "There is no mandatory federal judicial retirement age; life tenure is the protection."}, {"text": "Election by the people every six years.", "isCorrect": false, "rationale": "Federal judges are appointed, not elected — and election would itself introduce political pressure."}, {"text": "Annual salary votes by Congress.", "isCorrect": false, "rationale": "Annual votes would increase vulnerability; the protection is the prohibition on diminishing compensation during a judge's tenure."}], "id": "q02"}, {"question": "A case begins in a U.S. District Court. The losing party appeals, and after review by a three-judge panel, the appellate court affirms. The losing party now wants the Supreme Court to hear the case. What must happen next?", "options": [{"text": "The Supreme Court must hear the case because there is an automatic right of appeal.", "isCorrect": false, "rationale": "There is no automatic right of appeal to the Supreme Court for most federal cases; review is discretionary via certiorari."}, {"text": "The party files a petition for a writ of certiorari, and the Supreme Court's appellate jurisdiction is discretionary — it may choose whether to hear the case.", "isCorrect": true, "rationale": "The text explains the Court's appellate jurisdiction is 'largely discretionary: it chooses which cases to hear through the certiorari process.'"}, {"text": "The case automatically goes to the Chief Justice for a personal ruling.", "isCorrect": false, "rationale": "The Chief Justice does not rule personally; Supreme Court cases are decided by the full Court after collective review."}, {"text": "The District Court, not the appellate court, reviews it a second time.", "isCorrect": false, "rationale": "District courts are trial courts; they do not conduct second reviews of appellate outcomes."}], "id": "q03"}, {"question": "What is senatorial courtesy, and at which level of the federal judiciary does it most significantly operate?", "options": [{"text": "A formal Senate rule requiring unanimous consent before any judicial vote; it operates only for Supreme Court nominations.", "isCorrect": false, "rationale": "Senatorial courtesy is informal, not a formal Senate rule, and it operates at the district-court level, not the Supreme Court."}, {"text": "An informal tradition giving home-state senators — particularly of the president's party — significant influence over district court appointments.", "isCorrect": true, "rationale": "The text defines senatorial courtesy as an informal norm that gives senators influence over district-court appointments in their states, allowing them to block nominees effectively."}, {"text": "A constitutional requirement that the Vice President approve each nominee.", "isCorrect": false, "rationale": "The Vice President's role is limited to tie-breaking in the Senate; there is no courtesy-based approval of nominees."}, {"text": "A rule requiring Supreme Court justices to consult with senators before issuing opinions.", "isCorrect": false, "rationale": "Justices do not consult senators before ruling; senatorial courtesy operates in the nomination process, not in decision-making."}], "id": "q04"}, {"question": "A justice believes the meaning of the Constitution should be fixed by what the text meant when it was ratified. Which judicial philosophy does this reflect, and who was its most prominent modern advocate?", "options": [{"text": "Living constitutionalism, championed by William Brennan.", "isCorrect": false, "rationale": "Living constitutionalism holds that meaning evolves with society — the opposite of fixed original meaning."}, {"text": "Originalism, championed by Antonin Scalia.", "isCorrect": true, "rationale": "The text states originalism 'holds that the Constitution should be interpreted according to the original meaning of its text' and names Justice Antonin Scalia as its most prominent modern advocate."}, {"text": "Judicial activism, championed by Thurgood Marshall.", "isCorrect": false, "rationale": "Judicial activism is an approach to the scope of judicial action (discussed elsewhere), not a theory of textual meaning; the scenario describes a textual theory."}, {"text": "Strict scrutiny, championed by John Roberts.", "isCorrect": false, "rationale": "Strict scrutiny is a standard of review in equal-protection and fundamental-rights cases, not a theory of constitutional interpretation."}], "id": "q05"}, {"question": "In Federalist No. 78, Hamilton famously described the judiciary as the 'least dangerous branch.' Which quotation from the text most directly supports that characterization?", "options": [{"text": "The judiciary 'has no influence over either the sword or the purse…It may truly be said to have neither FORCE nor WILL, but merely judgment.'", "isCorrect": true, "rationale": "This is the exact Federalist No. 78 quote provided in the text, supporting Hamilton's 'least dangerous' characterization by noting the courts' lack of enforcement or funding power."}, {"text": "The judiciary controls both the military and the Treasury.", "isCorrect": false, "rationale": "Hamilton argues the opposite — the judiciary has neither."}, {"text": "Judges are the most politically accountable branch.", "isCorrect": false, "rationale": "Hamilton stresses judicial INDEPENDENCE, not accountability; life tenure insulates judges from political pressure."}, {"text": "The judiciary alone amends the Constitution.", "isCorrect": false, "rationale": "Constitutional amendment requires two-thirds of Congress and three-fourths of state legislatures, not judicial action."}], "id": "q06"}, {"question": "The text notes that modern Supreme Court confirmation battles have become 'increasingly contentious,' citing Bork, Thomas, Garland, Kavanaugh, and Barrett. Which broader trend does this pattern illustrate?", "options": [{"text": "Through the mid-20th century, most nominees were confirmed with broad bipartisan support, but confirmations have grown more politicized in recent decades.", "isCorrect": true, "rationale": "The text states that mid-20th century confirmations typically received 'broad bipartisan support' and recent battles reflect 'the growing politicization of judicial appointments.'"}, {"text": "All Supreme Court nominees are now confirmed unanimously.", "isCorrect": false, "rationale": "The text describes contested confirmations and blocked nominations — far from unanimous."}, {"text": "The Constitution was amended to allow simple-majority confirmations for the Supreme Court.", "isCorrect": false, "rationale": "Although the Senate changed its rules in 2017 for Supreme Court confirmations, that is a Senate rule, not a constitutional amendment."}, {"text": "Presidents no longer nominate justices; the Senate chooses directly.", "isCorrect": false, "rationale": "Presidents retain the nomination power; Senate consent is a separate step."}], "id": "q07"}, {"question": "Which pair correctly matches a court with its primary function in the federal hierarchy?", "options": [{"text": "U.S. District Courts — trial courts where evidence is presented and findings of fact are made.", "isCorrect": true, "rationale": "The text states district courts are 'where cases begin: witnesses testify, evidence is presented, juries deliberate, and findings of fact are made.'"}, {"text": "U.S. Courts of Appeals — trial courts that empanel juries.", "isCorrect": false, "rationale": "Appellate courts do not hear evidence or empanel juries; they review questions of law through three-judge panels."}, {"text": "The Supreme Court — trial court in almost all federal disputes.", "isCorrect": false, "rationale": "The Supreme Court's jurisdiction is primarily appellate; original jurisdiction is narrow (ambassadors, states as parties)."}, {"text": "The Federal Circuit — a regional court covering one state only.", "isCorrect": false, "rationale": "The Federal Circuit is a specialized court (patents, international trade, contracts) — not a single-state court."}], "id": "q08"}, {"question": "The Constitution grants the Supreme Court ORIGINAL jurisdiction in which type of case?", "options": [{"text": "Any case challenging a state law under the Equal Protection Clause.", "isCorrect": false, "rationale": "Equal-protection state-law challenges typically come to the Court through appellate jurisdiction from lower federal courts, not original jurisdiction."}, {"text": "Cases involving ambassadors, other public ministers, and cases in which a state is a party.", "isCorrect": true, "rationale": "The text specifies that original jurisdiction is 'granted to the Supreme Court in cases involving ambassadors, other public ministers, and cases in which a state is a party.'"}, {"text": "All criminal appeals from state courts.", "isCorrect": false, "rationale": "Criminal appeals from state courts reach the Supreme Court through appellate jurisdiction, not original jurisdiction."}, {"text": "Cases involving federal employment discrimination.", "isCorrect": false, "rationale": "Those cases begin in district courts and reach the Supreme Court only through appeal."}], "id": "q09"}, {"question": "A justice argues that constitutional interpretation must adapt to address contemporary conditions the Framers could not have anticipated. Which judicial philosophy does this reflect, and what is the strongest originalist counter from the text?", "options": [{"text": "Living constitutionalism; originalists argue that adapting meaning invites judges to impose personal policy preferences, weakening the rule of law.", "isCorrect": true, "rationale": "The text describes living constitutionalism as viewing the Constitution as 'a dynamic document whose meaning evolves' and describes originalism's central worry that adaptation would let judges 'impose their personal policy preferences.'"}, {"text": "Originalism; the counter-argument is that constitutional text is binding only between even-numbered years.", "isCorrect": false, "rationale": "The philosophy described is living constitutionalism, not originalism, and there is no 'even-numbered years' rule anywhere in the text."}, {"text": "Strict scrutiny; originalists reject any adaptation of the Constitution.", "isCorrect": false, "rationale": "Strict scrutiny is a standard of review, not a theory of constitutional interpretation."}, {"text": "Judicial restraint; the counter-argument is that restraint requires aggressive interpretation.", "isCorrect": false, "rationale": "Judicial restraint is about the scope of judicial action, not about textual adaptation; and restraint does not entail aggressive interpretation."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
