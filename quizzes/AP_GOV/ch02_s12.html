<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP U.S. Government and Politics &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; The Bureaucracy</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Why is the federal bureaucracy sometimes called the 'fourth branch' of government?", "options": [{"text": "Because it is explicitly mentioned alongside the other branches in Article I.", "isCorrect": false, "rationale": "The bureaucracy is not explicitly named as a fourth branch in the Constitution; the label reflects practical power, not constitutional text."}, {"text": "Because of its enormous size, power, and relative independence from direct democratic accountability.", "isCorrect": true, "rationale": "The text states the label reflects the bureaucracy's 'enormous size, power, and relative independence from direct democratic accountability.'"}, {"text": "Because bureaucrats are elected alongside the president.", "isCorrect": false, "rationale": "The text specifies bureaucrats 'are not elected; most are career civil servants' — the opposite of elected status."}, {"text": "Because the Constitution creates four co-equal branches.", "isCorrect": false, "rationale": "The Constitution creates three branches, not four; 'fourth branch' is an informal description of the bureaucracy's practical role."}], "id": "q01"}, {"question": "The Environmental Protection Agency (EPA) is NOT headed by a secretary in the president's cabinet, yet it oversees environmental regulations nationwide. Which category best describes the EPA?", "options": [{"text": "An executive (cabinet) department.", "isCorrect": false, "rationale": "Cabinet departments are headed by cabinet-level secretaries; the EPA is not a cabinet department."}, {"text": "An independent agency — operating outside cabinet departments with a narrower policy focus.", "isCorrect": true, "rationale": "The text uses the EPA as an example of an independent agency, noting these agencies 'operate outside the cabinet departments and typically have a narrower focus.'"}, {"text": "A government corporation like Amtrak.", "isCorrect": false, "rationale": "Government corporations operate like businesses, charging fees for services. The EPA is a regulatory body, not a commercial operation."}, {"text": "A regulatory commission headed by multi-member boards.", "isCorrect": false, "rationale": "The EPA is led by a single administrator, not a multi-member board with fixed staggered terms like the SEC or FCC."}], "id": "q02"}, {"question": "Which of the following is an independent regulatory commission, designed to insulate regulatory decisions from short-term political pressure?", "options": [{"text": "The Department of State.", "isCorrect": false, "rationale": "The Department of State is a cabinet department led by the Secretary of State, not a regulatory commission."}, {"text": "The Federal Communications Commission (FCC).", "isCorrect": true, "rationale": "The text lists the FCC as an example of an independent regulatory commission, 'headed by multi-member boards or commissions whose members serve fixed, staggered terms and can only be removed for cause.'"}, {"text": "The United States Postal Service.", "isCorrect": false, "rationale": "The USPS is a government corporation, not a regulatory commission."}, {"text": "The National Aeronautics and Space Administration (NASA).", "isCorrect": false, "rationale": "NASA is an independent AGENCY; the text lists it alongside CIA and EPA — not a multi-member regulatory commission."}], "id": "q03"}, {"question": "The Pendleton Civil Service Reform Act of 1883 transformed federal employment. Which event galvanized its passage, according to the text?", "options": [{"text": "The resignation of Richard Nixon.", "isCorrect": false, "rationale": "Nixon's resignation occurred in 1974, long after the Pendleton Act of 1883."}, {"text": "The assassination of President James Garfield in 1881 by a disappointed office-seeker.", "isCorrect": true, "rationale": "The text states 'The assassination of President James Garfield in 1881 by a disappointed office-seeker galvanized reform,' leading directly to the Pendleton Act."}, {"text": "Andrew Jackson's election victory.", "isCorrect": false, "rationale": "Jackson's election occurred decades before the Pendleton Act; Jackson championed the SPOILS system, not reform of it."}, {"text": "Franklin D. Roosevelt's court-packing plan.", "isCorrect": false, "rationale": "The court-packing plan (1937) came 54 years after the Pendleton Act and concerned the judiciary, not civil service reform."}], "id": "q04"}, {"question": "What did the Pendleton Act establish, and how did it reshape the federal workforce?", "options": [{"text": "It established the merit system, hiring and promoting federal employees based on competitive examinations and demonstrated ability.", "isCorrect": true, "rationale": "The text states the Act 'established the merit system — a system of hiring and promoting government employees based on competitive examinations and demonstrated ability rather than political connections.'"}, {"text": "It required every federal job to be filled by the president personally.", "isCorrect": false, "rationale": "The Act reduced presidential patronage, limiting direct political control over most federal jobs."}, {"text": "It guaranteed lifetime employment for every federal employee regardless of performance.", "isCorrect": false, "rationale": "The merit system emphasizes competence, not lifetime tenure regardless of performance."}, {"text": "It abolished the civil service entirely.", "isCorrect": false, "rationale": "The Act CREATED the civil service commission, not abolished it."}], "id": "q05"}, {"question": "Despite the merit system, approximately what portion of federal positions remain subject to presidential appointment outside the merit process?", "options": [{"text": "Essentially none — all positions are now covered.", "isCorrect": false, "rationale": "The text states '90% of federal positions are covered by the merit system,' which means roughly 10% — including several thousand senior appointments — remain presidential."}, {"text": "About 10% — including cabinet secretaries, agency heads, ambassadors, and policy advisors.", "isCorrect": true, "rationale": "The text says the president retains power over 'several thousand senior positions — cabinet secretaries, agency heads, ambassadors, and policy advisors — without going through the merit system,' preserving political control."}, {"text": "About 50%, as Congress prefers political control.", "isCorrect": false, "rationale": "The text puts the merit-system share around 90%, leaving roughly 10% for political appointment — not 50%."}, {"text": "All positions are chosen by the Supreme Court.", "isCorrect": false, "rationale": "The Supreme Court does not make federal personnel decisions."}], "id": "q06"}, {"question": "The text describes defense contractors, the Armed Services committees, and the Department of Defense forming a self-reinforcing relationship. Which model of policy-making does this illustrate?", "options": [{"text": "An iron triangle — a stable, mutually beneficial relationship among a congressional committee, a bureaucratic agency, and an interest group.", "isCorrect": true, "rationale": "The text explicitly offers the defense industry as 'a classic example' of an iron triangle, with each of the three actors providing something the others need."}, {"text": "An issue network.", "isCorrect": false, "rationale": "Issue networks are fluid and open — with multiple agencies, think tanks, and academic experts. The scenario describes the closed, three-actor structure of an iron triangle."}, {"text": "A conference committee.", "isCorrect": false, "rationale": "A conference committee reconciles House and Senate legislation; it is not a policy-making relationship among agencies and interest groups."}, {"text": "Checks and balances.", "isCorrect": false, "rationale": "Checks and balances describes inter-branch constraints, not policy collaboration among agencies, committees, and interest groups."}], "id": "q07"}, {"question": "Which of the following describes the exchange between a bureaucratic agency and an interest group in an iron triangle?", "options": [{"text": "The agency provides favorable regulations and policy decisions; the interest group provides political support and information.", "isCorrect": true, "rationale": "The text lists exactly these flows: Agency → Interest group: 'Issues favorable regulations and policy decisions'; Interest group → Agency: 'Provides political support and information.'"}, {"text": "The agency provides campaign contributions; the interest group provides favorable legislation.", "isCorrect": false, "rationale": "Campaign contributions come from interest groups to congressional committees, not from agencies. Favorable legislation is a committee output."}, {"text": "The agency elects the interest group's board; the interest group appoints the agency head.", "isCorrect": false, "rationale": "No such cross-electoral structure exists between agencies and interest groups."}, {"text": "The agency and interest group have no policy relationship.", "isCorrect": false, "rationale": "The iron-triangle model specifically describes their relationship as one of the three key links."}], "id": "q08"}, {"question": "An issue network differs from an iron triangle primarily because:", "options": [{"text": "Issue networks involve only the three branches of government, with no outside actors.", "isCorrect": false, "rationale": "Issue networks include 'a broader range of participants' — agencies, committees, interest groups, think tanks, academic experts, journalists, and state/local officials."}, {"text": "Issue networks are more fluid and open, involving multiple agencies, committees, think tanks, academic experts, journalists, and state/local officials.", "isCorrect": true, "rationale": "The text distinguishes issue networks as 'more fluid, open policy-making systems involving a broader range of participants' than the closed three-actor iron triangle."}, {"text": "Issue networks are permanently stable while iron triangles shift constantly.", "isCorrect": false, "rationale": "The reverse is true: the text describes issue networks as 'less stable than iron triangles.'"}, {"text": "Issue networks require unanimous approval from all participants.", "isCorrect": false, "rationale": "Issue networks feature participants 'entering and leaving as issues evolve,' with no unanimity requirement."}], "id": "q09"}, {"question": "Based on the text, which policy area is most likely to operate as an issue network rather than an iron triangle in the modern era?", "options": [{"text": "Healthcare policy.", "isCorrect": true, "rationale": "The text cites 'healthcare, environmental regulation, immigration' as modern policy areas 'better described by the issue network model than by iron triangles.'"}, {"text": "Defense procurement.", "isCorrect": false, "rationale": "Defense is the text's classic iron-triangle example — not a modern issue network."}, {"text": "Article III court structure.", "isCorrect": false, "rationale": "Court structure is a constitutional and statutory issue, not a policy domain characterized by interest groups, committees, and agencies."}, {"text": "The rule of four.", "isCorrect": false, "rationale": "The rule of four governs Supreme Court certiorari, unrelated to iron triangles or issue networks."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
