<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP U.S. Government and Politics &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Congressional Behavior</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Representative Chen votes against a trade bill that 68% of her constituents support because she believes the economic evidence shows it would harm national welfare. Which model of representation best describes her decision?", "options": [{"text": "The delegate model, because she is reflecting constituent preferences.", "isCorrect": false, "rationale": "Under the delegate model she would have voted for the bill to mirror her constituents' majority preference. She did the opposite."}, {"text": "The trustee model, because she is exercising her own expertise and judgment against constituent opinion.", "isCorrect": true, "rationale": "The text defines the trustee model as representatives using 'their own expertise, judgment, and conscience…even if those decisions conflict with the views of their constituents' — precisely what Chen did."}, {"text": "The politico model, because she considered both her judgment and her constituents.", "isCorrect": false, "rationale": "The scenario shows her overriding constituent opinion based on her own analysis rather than blending approaches issue-by-issue; this is a purer trustee move."}, {"text": "The partisan model, because she followed her party's line.", "isCorrect": false, "rationale": "The scenario references her own analysis of economic evidence, not party discipline, and the text does not define a separate 'partisan model.'"}]}, {"question": "Which sentence best captures the politico model described in the text?", "options": [{"text": "Representatives always defer to their party's leadership.", "isCorrect": false, "rationale": "Party leadership pressure is one influence noted, but the politico model is defined by blending delegate and trustee behavior based on the issue — not by universal party deference."}, {"text": "Representatives blend delegate and trustee approaches depending on the salience and nature of the issue.", "isCorrect": true, "rationale": "The text states politicos 'blend these approaches depending on the issue,' acting as delegates on intense local concerns and as trustees on diffuse or complex policy."}, {"text": "Representatives vote randomly to avoid being held accountable.", "isCorrect": false, "rationale": "The politico model is strategic and issue-responsive, not random; representatives remain accountable through elections."}, {"text": "Representatives mirror constituent preferences regardless of the policy area.", "isCorrect": false, "rationale": "That describes the delegate model. Politicos sometimes use their own judgment."}]}, {"question": "Based on the data table in the text showing congressional approval ratings and House incumbent reelection rates (2006-2022), which interpretation best captures the paradox the data reveal?", "options": [{"text": "Approval and reelection move together — when approval rises, reelection rises.", "isCorrect": false, "rationale": "The table shows approval hovering between 15% and 25% while reelection stayed above 85% throughout — the two do not move together."}, {"text": "Congress as an institution is deeply unpopular, yet voters overwhelmingly return individual incumbents to office.", "isCorrect": true, "rationale": "The data (approval 15-25%, reelection 85-95%) mirror the classic paradox the text invites students to explain using incumbency advantages like casework and name recognition."}, {"text": "Voters in the data prefer challengers, driving high turnover.", "isCorrect": false, "rationale": "The data show reelection rates consistently above 85%, indicating low turnover — the opposite of a preference for challengers."}, {"text": "Incumbent reelection dropped to below 50% during periods of low approval.", "isCorrect": false, "rationale": "Even in the lowest year listed (2010 at 85%), reelection remained high — never approaching 50%."}]}, {"question": "Which of the following contributes to the incumbency advantage by allowing sitting members to maintain visibility between elections at taxpayer expense?", "options": [{"text": "Logrolling.", "isCorrect": false, "rationale": "Logrolling is the practice of trading votes among legislators — it does not involve taxpayer-funded outreach to constituents."}, {"text": "The franking privilege.", "isCorrect": true, "rationale": "The text identifies the franking privilege as the ability of members to 'send official mail to constituents at taxpayer expense, maintaining visibility between elections.'"}, {"text": "Cloture.", "isCorrect": false, "rationale": "Cloture is a Senate procedural motion to end debate, unrelated to incumbent visibility."}, {"text": "Gerrymandering alone.", "isCorrect": false, "rationale": "Gerrymandering is listed as a separate incumbency advantage, distinct from franking. The question specifically asks about taxpayer-funded outreach, which is franking."}]}, {"question": "Two senators agree: 'I'll vote for your farm subsidy if you vote for my military base appropriation.' Which practice does this exchange illustrate, and what is its main critique?", "options": [{"text": "Gerrymandering — it distorts representation geographically.", "isCorrect": false, "rationale": "Gerrymandering concerns district boundaries, not vote trading on legislation."}, {"text": "Logrolling — it can produce legislation that may not serve the broader public interest.", "isCorrect": true, "rationale": "The text defines logrolling as trading votes and notes that 'critics argue that logrolling produces legislation that may not serve the broader public interest.'"}, {"text": "Cloture — it cuts off debate prematurely.", "isCorrect": false, "rationale": "Cloture is a debate-ending procedure, not a mutual vote-trade."}, {"text": "Casework — it diverts agency resources to personal favors.", "isCorrect": false, "rationale": "Casework refers to helping individual constituents with federal agencies, not inter-member vote trading."}]}, {"question": "Congress banned earmarks in 2011 but partially reinstated them in 2021 under the new label 'community project funding.' What broader tension does this reversal illustrate?", "options": [{"text": "The difficulty of balancing the use of targeted funding for local needs against the risk of corruption and waste.", "isCorrect": true, "rationale": "The text frames earmarks as reflecting 'a broader tension: while they can direct resources to genuine local needs, they can also be vehicles for corruption and wasteful spending.'"}, {"text": "A constitutional requirement that Congress fund local projects.", "isCorrect": false, "rationale": "The Constitution does not require earmarks; their existence is driven by political incentives, not constitutional mandate."}, {"text": "The need to remove all transparency from appropriations.", "isCorrect": false, "rationale": "The 2021 reinstatement actually added 'transparency requirements,' moving in the opposite direction."}, {"text": "The president's desire to concentrate spending power in the executive branch.", "isCorrect": false, "rationale": "The earmark debate described is internal to Congress and does not reflect a presidential power grab."}]}, {"question": "The text notes that 'bipartisan coalitions can form on issues that cut across traditional party divides.' Which of the following is LEAST likely to produce such coalitions based on the text's examples?", "options": [{"text": "Infrastructure spending.", "isCorrect": false, "rationale": "The text explicitly identifies infrastructure spending as an issue that can cut across party divides."}, {"text": "Trade policy.", "isCorrect": false, "rationale": "The text lists trade policy as another area where bipartisan coalitions can form."}, {"text": "Criminal justice reform.", "isCorrect": false, "rationale": "The text includes criminal justice reform among the issues producing cross-party coalitions."}, {"text": "Routine party-line reauthorizations with clear ideological stakes.", "isCorrect": true, "rationale": "The text implicitly contrasts those cross-cutting issues with 'most significant votes [that] split along party lines,' which — with clear ideological stakes — are the least likely to generate bipartisan coalitions."}]}, {"question": "Representative Garcia represents a competitive swing district where many voters are independents. Based on the text, how is Garcia's voting behavior most likely to differ from a member in a safe partisan district?", "options": [{"text": "Garcia is more likely to cross party lines to appeal to moderate and independent voters.", "isCorrect": true, "rationale": "The text states that 'members from swing districts — those with competitive elections — are more likely to break with their party, as they must appeal to moderate and independent voters.'"}, {"text": "Garcia will vote with the party 100% of the time to prove loyalty.", "isCorrect": false, "rationale": "Garcia's district incentives point in the opposite direction; strict party-line voting is more common in safe districts."}, {"text": "Garcia cannot serve on committees because of the competitive district.", "isCorrect": false, "rationale": "District competitiveness does not determine committee eligibility; committee assignments are made by party leadership."}, {"text": "Garcia must use the trustee model because Burke required it.", "isCorrect": false, "rationale": "No representational model is legally required, and Burke championed, rather than mandated, the trustee view centuries ago."}]}, {"question": "Which of the following tools do party leaders use to punish or reward members, according to the text?", "options": [{"text": "Controlling committee assignments and channeling campaign support.", "isCorrect": true, "rationale": "The text lists 'Committee assignments' and 'Campaign support' as mechanisms leaders use — rewarding loyalty with desirable placements or funds and punishing dissent by removing members or withholding support."}, {"text": "Directly choosing each member's replacement in the next primary.", "isCorrect": false, "rationale": "Primaries are decided by voters, not by leadership designation; leaders can back challengers but not install them."}, {"text": "Vetoing individual members' votes after the fact.", "isCorrect": false, "rationale": "There is no mechanism to void an individual member's vote after it is cast; the veto is a presidential power over full bills."}, {"text": "Reassigning members to different state delegations.", "isCorrect": false, "rationale": "State delegations are determined by election, not by leadership reassignment."}]}, {"question": "A political commentator argues that even when Congress has record-low approval, 'the system still works because voters keep sending the same people back.' Using the text, what is the most important counter-consideration?", "options": [{"text": "Congressional approval is actually highest when reelection rates are lowest.", "isCorrect": false, "rationale": "The data in the text show persistently low approval alongside persistently high reelection — the two do not invert."}, {"text": "Structural advantages like franking, casework, campaign finance gaps, and safe gerrymandered districts may be driving reelection independent of voter judgment on Congress's performance.", "isCorrect": true, "rationale": "The text's incumbency-advantage list and the approval-vs-reelection data suggest that the pattern reflects structural asymmetries — so the commentator cannot treat high reelection as a clean endorsement of performance."}, {"text": "Reelection rates are actually below 50%, so the commentator is wrong on the facts.", "isCorrect": false, "rationale": "The text shows House incumbent reelection consistently above 85%, not below 50%."}, {"text": "The 22nd Amendment term-limits House members, so the pattern cannot continue.", "isCorrect": false, "rationale": "The 22nd Amendment applies to the presidency, not to members of Congress."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
