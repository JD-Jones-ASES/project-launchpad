<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP U.S. Government and Politics &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Types of Democracy</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the fundamental distinction between direct democracy and representative democracy?", "options": [{"text": "Direct democracy uses secret ballots, while representative democracy uses open voting.", "isCorrect": false, "rationale": "The text does not distinguish them by ballot secrecy; the distinction concerns who makes policy decisions."}, {"text": "In direct democracy, citizens themselves vote on laws; in representative democracy, they elect leaders who make those decisions for them.", "isCorrect": true, "rationale": "The text states this directly: direct democracy means 'citizens themselves vote on laws,' while representative democracy means 'citizens choose leaders [who] make governing decisions on behalf of the people.'"}, {"text": "Direct democracy exists only in ancient societies; representative democracy exists only in modern ones.", "isCorrect": false, "rationale": "The text shows direct democracy elements persist today (referendum, initiative, recall), so this is too absolute."}, {"text": "Direct democracy requires unanimous agreement; representative democracy uses majority rule.", "isCorrect": false, "rationale": "Athenian direct democracy used 'majority vote,' not unanimous agreement; this distinction is incorrect."}]}, {"question": "In Federalist No. 10, James Madison warned that direct democracy was vulnerable to the 'mischiefs of faction.' Based on the text, what did Madison most fear?", "options": [{"text": "That foreign spies would infiltrate popular assemblies.", "isCorrect": false, "rationale": "The text does not raise foreign infiltration as Madison's concern; his concern was internal."}, {"text": "That a passionate majority could trample the rights of minorities.", "isCorrect": true, "rationale": "The text states Madison warned of 'the danger that a passionate majority could trample the rights of minorities.'"}, {"text": "That wealthy citizens would refuse to serve as representatives.", "isCorrect": false, "rationale": "This concerns representation, not the specific danger Madison identified in direct democracy."}, {"text": "That elected officials would become tyrants once in office.", "isCorrect": false, "rationale": "Madison's concern in Federalist No. 10 about direct democracy specifically was majority faction, not tyrannical officials."}]}, {"question": "A group of California residents gathers enough petition signatures to place a measure on the state ballot proposing to raise the minimum wage. If passed by voters, it becomes law. This process is best identified as which mechanism of direct democracy?", "options": [{"text": "Referendum", "isCorrect": false, "rationale": "A referendum is a vote to approve or reject a law the legislature has already passed, not a citizen-proposed new law."}, {"text": "Recall", "isCorrect": false, "rationale": "Recall removes an elected official from office before the end of a term; it does not create laws."}, {"text": "Initiative", "isCorrect": true, "rationale": "The text defines initiative as the mechanism that 'allows citizens to propose new laws or constitutional amendments by gathering a required number of petition signatures.'"}, {"text": "Impeachment", "isCorrect": false, "rationale": "Impeachment is a legislative process for removing officials, not a tool of direct democracy exercised by voters."}]}, {"question": "The text notes that ballot initiatives, popular referenda, and recall procedures are 'more common in western states.' Which historical movement does the text credit for this pattern?", "options": [{"text": "The Civil Rights movement of the 1960s", "isCorrect": false, "rationale": "The text does not associate these mechanisms with the Civil Rights movement."}, {"text": "The Progressive movement of the early twentieth century", "isCorrect": true, "rationale": "The text explicitly states the Progressive movement 'of the early twentieth century championed direct democracy as a check on corrupt political machines and powerful corporate interests.'"}, {"text": "The abolitionist movement of the mid-nineteenth century", "isCorrect": false, "rationale": "Abolitionism addressed slavery, not direct democracy mechanisms."}, {"text": "The Tea Party movement of the early twenty-first century", "isCorrect": false, "rationale": "The Tea Party postdates the adoption of initiative, referendum, and recall in most western states."}]}, {"question": "Robert Dahl's study Who Governs? concluded that no single elite controlled all areas of policy in New Haven; instead, different groups exercised influence over different issues. This conclusion most directly supports which model of democracy?", "options": [{"text": "Elite democracy, because Dahl found a cohesive ruling class", "isCorrect": false, "rationale": "Dahl found the opposite — that 'power was dispersed, not concentrated,' which contradicts elite democracy's core claim."}, {"text": "Participatory democracy, because New Haven held frequent town meetings", "isCorrect": false, "rationale": "The text does not cite New Haven town meetings; Dahl's analysis focused on competition among organized groups."}, {"text": "Pluralist democracy, because power was distributed among competing groups on different issues", "isCorrect": true, "rationale": "The text identifies Dahl as examining pluralism and concludes that 'different groups exercised influence over different issues Power was dispersed, not concentrated.'"}, {"text": "Direct democracy, because New Haven citizens voted on all major issues", "isCorrect": false, "rationale": "Dahl's study concerned the dynamics of group influence on local policy, not direct citizen votes on laws."}]}, {"question": "Critics of the pluralist model argue that 'pluralism describes how democracy should work, not necessarily how it does work.' Which observation best captures the reasoning behind this critique?", "options": [{"text": "Not all groups have equal resources; wealthy, well-organized interests can afford lobbyists and campaigns that grassroots groups cannot match.", "isCorrect": true, "rationale": "The text states directly: 'Wealthy, well-organized interests such as large corporations and professional associations can afford lobbyists, campaign contributions, and media campaigns that grassroots citizen groups cannot match.'"}, {"text": "Pluralism assumes citizens vote directly on every policy, which is impractical.", "isCorrect": false, "rationale": "Pluralism is about group competition within representative institutions, not direct citizen voting."}, {"text": "Pluralism requires a small population to function, like Athenian democracy.", "isCorrect": false, "rationale": "The text does not claim this; pluralism operates in large, diverse societies."}, {"text": "Pluralism ignores the role of the courts in protecting rights.", "isCorrect": false, "rationale": "The text's critique of pluralism focuses on resource inequality among groups, not on courts."}]}, {"question": "Joseph Schumpeter, in Capitalism, Socialism and Democracy, described democracy as 'simply a method for selecting leaders from among competing elites.' Which statement best reflects how the text characterizes his view?", "options": [{"text": "He saw this as a failure of democracy that reform could correct.", "isCorrect": false, "rationale": "The text says the opposite: 'Schumpeter saw this not as a failure of democracy but as its realistic description.'"}, {"text": "He saw elite selection as a realistic description of how democracy actually functions.", "isCorrect": true, "rationale": "The text states 'Schumpeter saw this not as a failure of democracy but as its realistic description.'"}, {"text": "He urged a return to direct democracy on the Athenian model.", "isCorrect": false, "rationale": "The text associates Schumpeter with elite democracy, not with direct democracy advocacy."}, {"text": "He argued that citizens should govern continuously between elections.", "isCorrect": false, "rationale": "The text says Schumpeter believed 'between elections, governance was left to the experts,' the opposite of continuous citizen governance."}]}, {"question": "In 2020, technology companies spent over $200 million in support of California's Proposition 22, making it the most expensive ballot measure campaign in American history. The text uses this example to raise a concern about which model of democracy?", "options": [{"text": "That participatory democracy may be ineffective because turnout is too low.", "isCorrect": false, "rationale": "The text's concern here is not about turnout but about the influence of concentrated wealth."}, {"text": "That even direct democracy mechanisms can be influenced by concentrated wealth, raising elite theory concerns.", "isCorrect": true, "rationale": "The text frames Prop 22 as 'raising questions about whether direct democracy can be influenced by concentrated wealth,' which aligns with elite theorists' critique."}, {"text": "That ballot initiatives are unconstitutional under the Supremacy Clause.", "isCorrect": false, "rationale": "The text does not raise a Supremacy Clause issue about Prop 22."}, {"text": "That California has too many propositions for voters to understand.", "isCorrect": false, "rationale": "The text raises the money concern, not voter comprehension, in this passage."}]}, {"question": "A 2014 study by Martin Gilens and Benjamin Page found that policy outcomes in the United States 'more closely reflect the preferences of economic elites and organized interest groups than those of average citizens.' Which interpretation of American democracy does this finding most directly support?", "options": [{"text": "Participatory democracy, because ordinary citizens drive policy", "isCorrect": false, "rationale": "The finding shows the opposite — ordinary citizens' preferences do not drive policy outcomes."}, {"text": "Pure pluralist democracy, because all groups compete equally", "isCorrect": false, "rationale": "The Gilens and Page finding that economic elites outweigh average citizens undercuts the idea of equal competition."}, {"text": "Elite democracy, because power appears concentrated among wealthy and organized interests", "isCorrect": true, "rationale": "The text groups this study among 'patterns that seem consistent with elite theory,' specifically the dominance of economic elites and organized interest groups."}, {"text": "Direct democracy, because policy tracks the most recent referendum", "isCorrect": false, "rationale": "The finding concerns ordinary representative governance, not referenda."}]}, {"question": "A state legislature passes a controversial new gun law. Opponents gather enough petition signatures to place it on the next general election ballot, where voters can approve or repeal the law. This is best identified as which direct-democracy mechanism, and how does it differ from an initiative?", "options": [{"text": "It is an initiative; an initiative proposes new laws, while a referendum recalls officials.", "isCorrect": false, "rationale": "This misidentifies the mechanism and confuses referendum with recall."}, {"text": "It is a referendum; a referendum lets voters approve or reject a law already passed, whereas an initiative proposes new laws.", "isCorrect": true, "rationale": "The text defines a referendum as a vote 'in which citizens approve or reject a law that has already been passed,' contrasted with initiative, which 'allows citizens to propose new laws.'"}, {"text": "It is a recall; a recall removes laws, while an initiative removes officials.", "isCorrect": false, "rationale": "Recall removes officials, not laws; the mechanism described here does not target an officeholder."}, {"text": "It is impeachment; impeachment removes laws that are unconstitutional.", "isCorrect": false, "rationale": "Impeachment is a legislative removal process for officials, not a citizen veto on legislation."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
