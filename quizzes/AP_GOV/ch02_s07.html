<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP U.S. Government and Politics &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Presidential Communication</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Article II, Section 3 directs the president to 'from time to time give to the Congress Information of the State of the Union.' Which modern practice most directly fulfills this constitutional duty?", "options": [{"text": "The annual televised State of the Union address.", "isCorrect": true, "rationale": "The text identifies this as the evolution of the constitutional requirement, serving as 'the president's premier platform for setting the national agenda.'"}, {"text": "Daily briefings by the White House Press Secretary.", "isCorrect": false, "rationale": "Press secretary briefings manage information for journalists but do not fulfill the constitutional text's specific directive to address Congress."}, {"text": "Presidential pardons.", "isCorrect": false, "rationale": "Pardons are a formal power from Article II, Section 2, unrelated to the State of the Union requirement."}, {"text": "Signing statements attached to bills.", "isCorrect": false, "rationale": "Signing statements accompany the signing of specific legislation, not the general update to Congress on the state of the union."}], "id": "q01"}, {"question": "The text describes Franklin D. Roosevelt's fireside chats as a transformative moment in presidential communication. What made them distinctive?", "options": [{"text": "They were delivered to Congress in person and followed the State of the Union format.", "isCorrect": false, "rationale": "Fireside chats were RADIO addresses to the public, not in-person speeches to Congress."}, {"text": "They used radio to speak directly and intimately to Americans in their living rooms during the Great Depression and World War II.", "isCorrect": true, "rationale": "The text describes fireside chats as radio addresses that 'spoke to Americans in their living rooms,' giving a 'warm, conversational tone' that made the president a personal presence for the first time."}, {"text": "They bypassed both Congress and the courts to issue binding policy.", "isCorrect": false, "rationale": "Fireside chats were communicative, not policy-issuing — no binding policy flowed directly from them."}, {"text": "They were pre-recorded messages distributed through movie theaters.", "isCorrect": false, "rationale": "The fireside chats were live radio broadcasts into American homes, not theatrical releases."}], "id": "q02"}, {"question": "A president's approval jumps dramatically after the country is struck by a major terrorist attack. Within months, approval has declined sharply. Which phenomenon does this sequence illustrate?", "options": [{"text": "The rally-around-the-flag effect, which is typically temporary.", "isCorrect": true, "rationale": "The text defines this effect as public support surging during international crises and notes it is 'typically temporary,' giving the example of Bush dropping from 90% post-9/11 to below 30% by term's end."}, {"text": "The bully pulpit, which permanently elevates approval.", "isCorrect": false, "rationale": "The bully pulpit is a communicative capability, not a crisis-driven approval surge, and the text describes rally effects as temporary — not permanent."}, {"text": "Executive privilege, which protects the president from scrutiny.", "isCorrect": false, "rationale": "Executive privilege concerns withholding information, not approval ratings."}, {"text": "A pocket veto applied to domestic legislation.", "isCorrect": false, "rationale": "A pocket veto is a legislative tool, not a public-opinion phenomenon."}], "id": "q03"}, {"question": "Which president's approval surged to 89% after a major international crisis, according to the text?", "options": [{"text": "George H.W. Bush after the 1991 Gulf War.", "isCorrect": true, "rationale": "The text specifically names George H.W. Bush with an approval jump to 89% after the 1991 Gulf War."}, {"text": "Barack Obama after the 2011 killing of Osama bin Laden.", "isCorrect": false, "rationale": "The text describes Obama's post-bin Laden bump as 'a more modest but measurable increase,' not 89%."}, {"text": "Franklin D. Roosevelt after Pearl Harbor.", "isCorrect": false, "rationale": "Pearl Harbor is not among the rally examples cited in this section."}, {"text": "Ronald Reagan after the Berlin Wall fell.", "isCorrect": false, "rationale": "Reagan is discussed for TV mastery; the text does not link 89% approval to the Berlin Wall."}], "id": "q04"}, {"question": "A journalist argues that social media has fundamentally disrupted the 'gatekeeping function of traditional media.' Which claim from the text best illuminates that disruption?", "options": [{"text": "Social media requires congressional approval before a president can use it.", "isCorrect": false, "rationale": "There is no such requirement; social media is used at presidential discretion."}, {"text": "Social media allows presidents to 'publish messages instantaneously, without editorial review, to audiences of millions,' bypassing traditional media filters.", "isCorrect": true, "rationale": "The text's Digital era section states this explicitly, framing it as a fundamental disruption to media gatekeeping."}, {"text": "Social media requires daily press conferences to validate every post.", "isCorrect": false, "rationale": "Press conferences and social media posts are independent channels; no validation link is mandated."}, {"text": "Social media is banned for presidents under Article II.", "isCorrect": false, "rationale": "Article II does not address social media, and modern presidents have used it extensively."}], "id": "q05"}, {"question": "Which of the following risks of direct presidential social-media communication does the text highlight?", "options": [{"text": "A single tweet can move financial markets, provoke diplomatic incidents, or commit the government to positions not vetted through normal policy processes.", "isCorrect": true, "rationale": "The text identifies these exact consequences: 'a single tweet can move financial markets, provoke diplomatic incidents, or commit the government to positions that have not been vetted.'"}, {"text": "Social media requires a supermajority of Congress to sign off on posts.", "isCorrect": false, "rationale": "No such congressional procedure exists for presidential posts."}, {"text": "Posts automatically trigger Supreme Court review.", "isCorrect": false, "rationale": "The Supreme Court does not review social-media posts as a category."}, {"text": "All posts require a two-thirds House override.", "isCorrect": false, "rationale": "Overrides apply to vetoes, not to presidential communications."}], "id": "q06"}, {"question": "Which era of presidential communication does the text date from 2008 to the present?", "options": [{"text": "The Print era.", "isCorrect": false, "rationale": "The text dates the Print era as 1789 through the 1920s."}, {"text": "The Radio era.", "isCorrect": false, "rationale": "The Radio era is dated from the 1920s to the 1950s in the text."}, {"text": "The Television era.", "isCorrect": false, "rationale": "The Television era is dated from the 1960s to the 2000s."}, {"text": "The Digital era.", "isCorrect": true, "rationale": "The text specifically frames the Digital era as '2008-present,' emphasizing Obama's use of social media as a governing tool."}], "id": "q07"}, {"question": "Why does the text describe each president as developing 'a distinct media strategy'?", "options": [{"text": "Because the Constitution assigns each president a specific media format.", "isCorrect": false, "rationale": "The Constitution does not dictate media formats; strategy reflects personal and political choices."}, {"text": "Because the choice reflects both personal style and strategic calculation about how to maintain public support and control the political narrative.", "isCorrect": true, "rationale": "The text states exactly this — media strategy 'reflects both personal style and strategic calculation' about public support and narrative control."}, {"text": "Because the FCC assigns each president a specific media platform.", "isCorrect": false, "rationale": "The FCC is a regulatory body over broadcasting, not a media-assignment authority for presidents."}, {"text": "Because each president is constitutionally required to hold weekly press conferences.", "isCorrect": false, "rationale": "No such requirement exists; press-conference frequency varies widely by president."}], "id": "q08"}, {"question": "Why, according to the text, does the State of the Union address remain symbolically important even as it has become more partisan?", "options": [{"text": "Because the audience — Congress, Supreme Court justices, the cabinet, military leaders, and invited guests — reinforces the speech's significance as a moment of national presentation.", "isCorrect": true, "rationale": "The text identifies this specific audience and notes its presence 'reinforces the speech's symbolic importance as a moment of national unity (or, increasingly, partisan display).'"}, {"text": "Because the Constitution requires the speech to be delivered in a neutral tone.", "isCorrect": false, "rationale": "The Constitution has no tonal requirement; the text acknowledges the speech has become 'increasingly partisan.'"}, {"text": "Because only members of the president's party may attend.", "isCorrect": false, "rationale": "The speech is attended by all members of Congress, justices, cabinet, and guests — regardless of party."}, {"text": "Because each speech produces binding legislation immediately after delivery.", "isCorrect": false, "rationale": "The speech outlines priorities; it does not produce binding legislation on its own."}], "id": "q09"}, {"question": "A student argues that presidential use of direct communication technology is democratizing because it bypasses elite media filters. What is the strongest counter-argument drawn from the text?", "options": [{"text": "Direct communication can spread misinformation, inflame polarization, and erode the norms of deliberative governance.", "isCorrect": true, "rationale": "The text states critics argue direct presidential communication 'can spread misinformation, inflame polarization, and erode the norms of deliberative governance.'"}, {"text": "Direct communication is unconstitutional under Article II.", "isCorrect": false, "rationale": "The text does not describe direct communication as unconstitutional; both supporters and critics are discussed within a legal presidency."}, {"text": "Direct communication requires Supreme Court pre-clearance.", "isCorrect": false, "rationale": "No such Supreme Court clearance exists for presidential communication."}, {"text": "Only press conferences count as legitimate communication.", "isCorrect": false, "rationale": "The text describes multiple legitimate forms — speeches, press conferences, fireside chats, televised events, and social media — not just press conferences."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
