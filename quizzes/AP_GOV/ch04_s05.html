<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP U.S. Government and Politics &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Measuring Public Opinion</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A poll of 1,000 randomly selected American adults reports: \"52% of Americans support Policy X, ±3 percentage points, at a 95% confidence level.\" Which interpretation of this result is most accurate, according to the text?", "options": [{"text": "There is a 95% chance that exactly 52% of Americans support Policy X.", "isCorrect": false, "rationale": "The text explicitly rejects this interpretation: 'It does not mean there is a 95% chance that exactly 52% of Americans hold this view.'"}, {"text": "If this poll were repeated many times with proper random sampling, 95% of the results would show support between 49% and 55%.", "isCorrect": true, "rationale": "This is the exact interpretation the text provides in its Key Concept box for the same scenario."}, {"text": "The margin of error proves that the poll is unreliable.", "isCorrect": false, "rationale": "Margin of error is an expected feature of all sample-based polling and does not prove unreliability."}, {"text": "Exactly 49% to 55% of Americans support Policy X.", "isCorrect": false, "rationale": "The margin of error describes where repeated samples would fall, not the definite true population value."}]}, {"question": "Why is random sampling essential to accurate polling, according to the text?", "options": [{"text": "Because it allows pollsters to choose only respondents who agree with their preferred outcome.", "isCorrect": false, "rationale": "That is the opposite of random sampling — it describes biased, non-random selection that would distort results."}, {"text": "Because every member of the target population has an equal chance of being selected, which eliminates systematic bias and makes it possible to generalize from a small sample to a very large population.", "isCorrect": true, "rationale": "The text says exactly this: random sampling gives every member an equal probability, 'eliminates systematic bias,' and enables generalization from 1,000-1,500 respondents to over 250 million adults."}, {"text": "Because it reduces the sample size needed to just 100 people.", "isCorrect": false, "rationale": "Well-designed polls typically use 1,000+ respondents; random sampling enables valid inference at that size, not at 100."}, {"text": "Because it only works if the population is already politically uniform.", "isCorrect": false, "rationale": "Random sampling is valuable precisely because populations are diverse; it ensures representation of that diversity."}]}, {"question": "A political reporter describes a survey conducted daily throughout the final three weeks of a campaign, adding new respondents each day while dropping the oldest. Which poll type does the text describe this way?", "options": [{"text": "Benchmark poll.", "isCorrect": false, "rationale": "A benchmark poll is a one-time comprehensive survey early in the campaign, not a daily rolling survey."}, {"text": "Exit poll.", "isCorrect": false, "rationale": "An exit poll is conducted on Election Day, not continuously throughout the campaign."}, {"text": "Tracking poll.", "isCorrect": true, "rationale": "The text defines tracking polls as rolling surveys with overlapping samples that 'add new respondents each day while dropping the oldest' — exactly the scenario described."}, {"text": "Push poll.", "isCorrect": false, "rationale": "Push polls are not legitimate polls at all; they are negative campaigning disguised as research, not rolling measurement."}]}, {"question": "A volunteer for a campaign calls voters and asks, \"Would you be more or less likely to vote for Candidate Y if you knew they had been investigated for fraud?\" This is best described as:", "options": [{"text": "A legitimate tracking poll.", "isCorrect": false, "rationale": "Tracking polls measure shifts in preferences; they are not designed to plant negative information in respondents' minds."}, {"text": "A push poll — not a legitimate poll, but negative campaigning disguised as survey research using leading questions designed to change opinions.", "isCorrect": true, "rationale": "The text gives this exact scenario as its example of a push poll: 'Would you be more or less likely to vote for Candidate X if you knew they had been investigated for fraud?'"}, {"text": "A benchmark poll.", "isCorrect": false, "rationale": "Benchmark polls assess standing, name recognition, and priorities — not designed to plant negative information."}, {"text": "An exit poll.", "isCorrect": false, "rationale": "Exit polls are conducted at polling places on Election Day, not during the campaign."}]}, {"question": "Consider these two hypothetical question wordings for the same underlying policy:\n\nQ1: \"Do you support government assistance programs that help struggling families put food on the table?\"\nQ2: \"Do you support welfare programs that give government handouts to people who don't work?\"\n\nWhat concept best explains why these two questions are likely to produce very different response rates?", "options": [{"text": "Random sampling error, which would disappear with a larger sample.", "isCorrect": false, "rationale": "Sampling error would not systematically produce different responses to differently worded questions; this is a wording effect, not a sample-size issue."}, {"text": "Response bias introduced by question wording, with loaded terms like 'handouts' and 'don't work' pushing respondents against the policy.", "isCorrect": true, "rationale": "The text presents this exact scenario as an illustration of response bias: one wording uses sympathetic language ('struggling families'), the other uses 'handouts' and 'don't work' as loaded terms."}, {"text": "Coverage error from using landlines only.", "isCorrect": false, "rationale": "The scenario does not involve phone technology; the variance is wording-driven."}, {"text": "The Margin of error was too small.", "isCorrect": false, "rationale": "Margin of error governs sampling precision, not wording effects."}]}, {"question": "A campaign strategist wants to run a single comprehensive survey at the start of a senate race to assess the candidate's name recognition, initial standing, and voters' issue priorities. Which poll type is most appropriate, according to the text?", "options": [{"text": "Exit poll.", "isCorrect": false, "rationale": "Exit polls are conducted on Election Day, not at the start of a campaign."}, {"text": "Tracking poll.", "isCorrect": false, "rationale": "Tracking polls are rolling daily surveys meant to detect trends over time, not a one-time initial assessment."}, {"text": "Benchmark poll.", "isCorrect": true, "rationale": "The text defines a benchmark poll as 'a comprehensive survey taken at the beginning of a campaign to assess a candidate's initial standing, name recognition, and the public's issue priorities.'"}, {"text": "Push poll.", "isCorrect": false, "rationale": "Push polls are not legitimate measurement tools; they are negative campaigning."}]}, {"question": "A pollster presents this question: \"Do you support lower taxes and increased military spending?\" Which type of question bias is present here?", "options": [{"text": "Social desirability bias.", "isCorrect": false, "rationale": "Social desirability bias is about respondents giving answers they think are socially acceptable, not about question structure."}, {"text": "Double-barreled question, which asks about two issues at once.", "isCorrect": true, "rationale": "The text identifies 'double-barreled questions that ask about two issues at once' and uses essentially this example — someone might support one but not the other."}, {"text": "Coverage error.", "isCorrect": false, "rationale": "Coverage error is a sampling concept about who is reachable, not a question wording issue."}, {"text": "Question order effect.", "isCorrect": false, "rationale": "Question order effects concern how earlier questions influence later ones, not the structure of a single question."}]}, {"question": "A poll reports that \"47% of likely voters support Candidate A, ±4 percentage points.\" Which conclusion is best supported by this data?", "options": [{"text": "Candidate A clearly has minority support.", "isCorrect": false, "rationale": "The margin of error means the true value could be between 43% and 51%. Because 51% exceeds a majority, we cannot confidently say the candidate has minority support."}, {"text": "The true level of support could reasonably be between 43% and 51%, so we cannot confidently say the candidate has minority support — the result is too close to 50%.", "isCorrect": true, "rationale": "This is exactly the type of analytical reasoning the text's Check Your Understanding question illustrates: 47% ±4% overlaps 50%, so minority status is not confidently supported."}, {"text": "Candidate A has exactly 47% support with certainty.", "isCorrect": false, "rationale": "The margin of error indicates uncertainty around this estimate; exactness is not implied."}, {"text": "The poll is useless because of the margin of error.", "isCorrect": false, "rationale": "The margin of error is expected and measurable, not a disqualifying flaw. The text describes it as a standard feature of proper polling."}]}, {"question": "A polling organization doubles its sample size from 500 to 1,000. Based on the text, what is the most accurate expectation about the margin of error?", "options": [{"text": "The margin of error will be cut in half exactly.", "isCorrect": false, "rationale": "The text notes the relationship is not linear: 'doubling the sample size does not double the precision.' So margin of error decreases, but not by half."}, {"text": "The margin of error will decrease, but not linearly — larger samples produce smaller margins of error but with diminishing returns.", "isCorrect": true, "rationale": "The text states directly: 'Larger samples produce smaller margins of error, but the relationship is not linear.'"}, {"text": "The margin of error will remain exactly the same.", "isCorrect": false, "rationale": "The text says larger samples produce smaller margins of error, so no change is not correct."}, {"text": "The margin of error will increase.", "isCorrect": false, "rationale": "Increasing sample size reduces, not increases, margin of error."}]}, {"question": "Which of the following would be the BEST example of a legitimately conducted poll according to the text's standards?", "options": [{"text": "A polling firm conducts random digit dialing (including both landlines and cell phones) of 1,500 American adults, asks neutrally worded questions, and reports results with a 3-point margin of error at 95% confidence.", "isCorrect": true, "rationale": "This meets the text's requirements: random sampling that covers the target population, neutral wording, appropriate sample size, and properly reported margin of error and confidence level."}, {"text": "An online opt-in survey posted on a political advocacy group's website, with 10,000 self-selected responses.", "isCorrect": false, "rationale": "Opt-in, self-selected samples are not random; the text (and next section) identifies them as unreliable regardless of size."}, {"text": "A telephone poll conducted only on landlines, asking leading questions designed to push respondents toward a specific answer.", "isCorrect": false, "rationale": "Both landline-only (coverage error) and leading questions (response bias) violate the text's standards."}, {"text": "A man-on-the-street interview with 50 people outside one shopping mall.", "isCorrect": false, "rationale": "This is not random sampling and is not representative — exactly the type the next section warns against."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
