<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP U.S. Government and Politics &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Discretionary and Rulemaking Authority</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Congress passes a statute directing the EPA to set 'safe' levels for an air pollutant without defining 'safe.' Which practice does this illustrate?", "options": [{"text": "Statutory override.", "isCorrect": false, "rationale": "Statutory override describes Congress responding to prior court interpretations by amending statutes; the scenario describes initial delegation of authority to an agency."}, {"text": "Congressional delegation of authority to an executive agency, which the agency will fill in through regulations.", "isCorrect": true, "rationale": "The text uses this precise example — Congress directing the EPA to set 'safe' levels of a pollutant — as a classic illustration of how Congress delegates policy-making authority to agencies with specialized expertise."}, {"text": "Jurisdiction stripping.", "isCorrect": false, "rationale": "Jurisdiction stripping removes cases from federal court review; the scenario involves agency rulemaking, not court jurisdiction."}, {"text": "Court packing.", "isCorrect": false, "rationale": "Court packing concerns changing the number of justices, unrelated to agency delegation."}]}, {"question": "Which of the following is NOT a reason the text gives for why Congress delegates authority to executive agencies?", "options": [{"text": "Technical expertise that members of Congress typically lack.", "isCorrect": false, "rationale": "The text identifies technical expertise as one of the main practical reasons for delegation."}, {"text": "Flexibility to update regulations as conditions change without new legislation.", "isCorrect": false, "rationale": "Flexibility is explicitly listed as a reason for delegation in the text."}, {"text": "Political cover, since agencies bear the blame for unpopular regulatory choices.", "isCorrect": false, "rationale": "Political cover is listed as one of the four reasons for delegation."}, {"text": "A constitutional requirement that every statute specify complete details.", "isCorrect": true, "rationale": "The text offers the opposite view — that 'it is impossible for Congress to specify every detail' of modern policy; delegation is driven by practical necessity, not constitutional requirement."}]}, {"question": "Critics argue that excessive congressional delegation 'transfers legislative power to unelected bureaucrats, violating the Constitution's vesting of all legislative Powers in Congress.' What is the Supreme Court's response to this concern, as described in the text?", "options": [{"text": "The Court has banned all delegation.", "isCorrect": false, "rationale": "The text describes a broad judicial acceptance of delegation, not a blanket ban."}, {"text": "The Court has upheld delegation so long as Congress provides an 'intelligible principle' to guide the agency's discretion — a standard interpreted broadly.", "isCorrect": true, "rationale": "The text specifies that delegation is constitutional 'so long as Congress provides an intelligible principle to guide the agency's discretion — a standard the Supreme Court has interpreted broadly.'"}, {"text": "The Court has required every regulation to receive two-thirds Senate confirmation.", "isCorrect": false, "rationale": "No such confirmation procedure exists for regulations."}, {"text": "The Court has deferred to executive orders only.", "isCorrect": false, "rationale": "The question is about delegation to agencies through statutes, not about executive orders."}]}, {"question": "Which element of bureaucratic discretion is BEST illustrated by the FDA's interpretation of what 'safe and effective' means for a new drug?", "options": [{"text": "Filling gaps in legislation.", "isCorrect": false, "rationale": "Filling gaps refers to situations where the statute doesn't address a specific situation. Here, Congress provided a standard; the FDA interprets its meaning."}, {"text": "Setting priorities for enforcement resources.", "isCorrect": false, "rationale": "Priority-setting is about which violations to investigate, not about interpreting statutory standards."}, {"text": "Interpreting statutory language — determining what broad or ambiguous terms mean in practice.", "isCorrect": true, "rationale": "The text explicitly uses this FDA example to illustrate how agencies interpret statutory language, stating 'The FDA's interpretation of safe and effective determines which drugs reach the market.'"}, {"text": "Issuing pardons.", "isCorrect": false, "rationale": "Pardons are a presidential power, not a bureaucratic function."}]}, {"question": "Order the steps of the notice-and-comment rulemaking process established by the Administrative Procedure Act of 1946 and identify which step is numbered FIRST.", "options": [{"text": "Effective date — the final rule takes effect 30 days after publication.", "isCorrect": false, "rationale": "The effective date is the final step, not the first."}, {"text": "Public comment period.", "isCorrect": false, "rationale": "The comment period follows the agency's publication of the proposed rule."}, {"text": "Notice of Proposed Rulemaking (NPRM) — the agency publishes a proposed rule in the Federal Register.", "isCorrect": true, "rationale": "The text lists NPRM first: 'The agency publishes a proposed rule in the Federal Register, explaining the rule's purpose, legal basis, and expected effects.'"}, {"text": "Final rule publication.", "isCorrect": false, "rationale": "The final rule comes after reviewing comments — the third step, not the first."}]}, {"question": "A federal agency publishes a proposed rule. Comment periods typically last 30 to 90 days. Why does the text describe notice-and-comment as a 'democratic check on bureaucratic power'?", "options": [{"text": "Because it ensures transparency, provides affected parties with an opportunity to be heard, and creates a written record courts can review if the rule is challenged.", "isCorrect": true, "rationale": "The text identifies exactly these three democratic functions of notice-and-comment: transparency, public input, and a reviewable record."}, {"text": "Because every comment automatically changes the rule.", "isCorrect": false, "rationale": "Agencies must CONSIDER significant comments but retain discretion in how they weigh them; comments do not automatically change rules."}, {"text": "Because comments are submitted to Congress, which then writes the rule.", "isCorrect": false, "rationale": "Comments go to the agency, not Congress. The agency writes the rule."}, {"text": "Because the Supreme Court must approve each comment.", "isCorrect": false, "rationale": "There is no Supreme Court approval step; judicial review is available only if a rule is later challenged."}]}, {"question": "Which limitation of the notice-and-comment process does the text explicitly identify?", "options": [{"text": "Comments are never allowed from individuals.", "isCorrect": false, "rationale": "The text says 'Interested parties — individuals, businesses, interest groups, state and local governments' may all submit comments."}, {"text": "Comment periods can be dominated by well-organized interest groups, and agencies retain substantial discretion in weighing competing comments.", "isCorrect": true, "rationale": "The text states these as key limitations: domination by well-organized groups and agency discretion in weighing comments."}, {"text": "Final rules take effect the same day they are proposed.", "isCorrect": false, "rationale": "The final rule 'takes effect on a specified date, typically 30 days after publication' — not instantly."}, {"text": "Courts cannot review notice-and-comment rules under any circumstance.", "isCorrect": false, "rationale": "The written record precisely enables judicial review when rules are challenged."}]}, {"question": "Which statement correctly captures the constitutional difference between legislation and regulations?", "options": [{"text": "Legislation is created by Congress under Article I authority; regulations are created by executive agencies under authority delegated by Congress.", "isCorrect": true, "rationale": "The text's comparison table distinguishes exactly these sources of authority — Article I for legislation, delegated authority for regulations."}, {"text": "Regulations are created by the Supreme Court; legislation by the bureaucracy.", "isCorrect": false, "rationale": "The Supreme Court does not create regulations; agencies do. And Congress creates legislation, not the bureaucracy."}, {"text": "Regulations are constitutional law; legislation is informal policy.", "isCorrect": false, "rationale": "Both carry the force of law; the distinction is about source and creator, not law versus policy."}, {"text": "Legislation requires notice-and-comment; regulations require bicameralism and presentment.", "isCorrect": false, "rationale": "The reverse is true: legislation requires bicameralism and presentment; regulations require notice-and-comment."}]}, {"question": "According to the text, changing a regulation is generally easier than changing legislation because:", "options": [{"text": "The agency can revise the rule through another rulemaking, whereas changing legislation requires new legislation.", "isCorrect": true, "rationale": "The comparison table shows 'Agency can revise through rulemaking' for regulations vs. 'New legislation required' for statutes."}, {"text": "Only the Supreme Court can change regulations.", "isCorrect": false, "rationale": "Courts can strike down regulations but do not generally amend them; agencies revise through rulemaking."}, {"text": "Regulations expire automatically each year.", "isCorrect": false, "rationale": "The text does not describe automatic annual expiration of regulations."}, {"text": "Regulations cannot be enforced, so they are easier to change.", "isCorrect": false, "rationale": "The text says 'violations of regulations can result in fines, penalties, and other enforcement actions' — they are enforceable."}]}, {"question": "A legal scholar argues that agency rulemaking 'effectively makes binding rules, a quasi-legislative function, even though agencies are part of the executive branch.' How does the text respond to the accountability concern this raises?", "options": [{"text": "It dismisses the concern entirely as irrelevant in modern governance.", "isCorrect": false, "rationale": "The text acknowledges the concern: 'it also raises concerns about accountability, as unelected bureaucrats make decisions that carry the force of law.'"}, {"text": "It acknowledges the concern — noting that delegation raises accountability questions — while explaining that flexibility and expertise justify the approach through notice-and-comment and judicial review.", "isCorrect": true, "rationale": "The text's Key Concept captures both sides: delegation provides flexibility and expertise, and the process 'raises concerns about accountability,' which is why notice-and-comment, judicial review, and congressional oversight exist."}, {"text": "It says bureaucrats are elected, so no concern exists.", "isCorrect": false, "rationale": "The text repeatedly notes bureaucrats are NOT elected; that is the source of the concern."}, {"text": "It argues the Supreme Court has banned rulemaking under Article I.", "isCorrect": false, "rationale": "The Court has upheld delegation under the 'intelligible principle' standard; it has not banned rulemaking."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
