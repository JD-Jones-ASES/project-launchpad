<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP U.S. Government and Politics &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Changing Media</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best describes the Fairness Doctrine?", "options": [{"text": "An FCC rule from 1949 to 1987 that required broadcasters to present opposing viewpoints on controversial issues.", "isCorrect": true, "rationale": "The text states that the FCC historically enforced the Fairness Doctrine (1949-1987), which required broadcasters to present opposing viewpoints on controversial issues."}, {"text": "A constitutional amendment requiring equal time for all political candidates.", "isCorrect": false, "rationale": "The Fairness Doctrine was an FCC rule, not a constitutional amendment."}, {"text": "A Supreme Court decision that required broadcasters to show every campaign ad.", "isCorrect": false, "rationale": "The text describes the Fairness Doctrine as an FCC rule, not a Supreme Court decision."}, {"text": "A current FCC rule still in force today.", "isCorrect": false, "rationale": "The text states the Fairness Doctrine was repealed in 1987 and is widely credited with enabling the rise of partisan talk radio and cable opinion programming after its repeal."}]}, {"question": "Which of the following best describes Section 230 of the Communications Decency Act (1996)?", "options": [{"text": "A law that requires platforms to remove all political content during campaign seasons.", "isCorrect": false, "rationale": "Section 230 does not require content removal; it shields platforms from liability for user-generated content."}, {"text": "A provision giving internet platforms broad immunity from liability for content posted by their users.", "isCorrect": true, "rationale": "The text describes Section 230 as 'the twenty-six words that created the internet' because it provides internet platforms with broad immunity from liability for user-posted content."}, {"text": "A federal statute that bans the collection of user data by social media companies.", "isCorrect": false, "rationale": "Section 230 concerns liability for user content, not data collection."}, {"text": "A provision requiring all news websites to be fact-checked by the FCC.", "isCorrect": false, "rationale": "The FCC does not fact-check news websites, and Section 230 does not establish such a requirement."}]}, {"question": "Which of the following best explains what the text means by a 'news desert'?", "options": [{"text": "A region where no newspapers are printed in English.", "isCorrect": false, "rationale": "The text does not describe news deserts in linguistic terms."}, {"text": "A community with no local journalism to cover city councils, school boards, and county government.", "isCorrect": true, "rationale": "The text states that the closure of thousands of local newspapers has created 'news deserts' — communities with no local journalism to cover city councils, school boards, and county government."}, {"text": "A time period when no major national events are occurring.", "isCorrect": false, "rationale": "That describes a slow news cycle, not a news desert."}, {"text": "A region where cable news is unavailable.", "isCorrect": false, "rationale": "News deserts concern the absence of local journalism, not cable availability."}]}, {"question": "Which of the following best distinguishes an 'echo chamber' from a 'filter bubble'?", "options": [{"text": "An echo chamber is created by deliberate self-selection into sources that reinforce one's existing beliefs; a filter bubble is created by algorithmic curation that serves content tailored to the user without the user's deliberate selection.", "isCorrect": true, "rationale": "The text describes echo chambers as environments where individuals primarily encounter reinforcing views, and filter bubbles as algorithmically curated versions of that phenomenon where platforms tailor content based on user behavior."}, {"text": "Both concepts refer to exactly the same phenomenon.", "isCorrect": false, "rationale": "The text treats them as related but distinct, with filter bubbles specifically driven by algorithmic curation."}, {"text": "Echo chambers exist only in cable news; filter bubbles exist only in newspapers.", "isCorrect": false, "rationale": "The text does not restrict the concepts this way; filter bubbles are specifically tied to algorithmic platforms."}, {"text": "Echo chambers are mandated by federal law; filter bubbles are not.", "isCorrect": false, "rationale": "Neither is mandated by federal law."}]}, {"question": "Which of the following best captures the difference between 'misinformation' and 'disinformation' as defined in the text?", "options": [{"text": "Misinformation is spread without intent to deceive; disinformation is spread deliberately to mislead.", "isCorrect": true, "rationale": "The text explicitly defines misinformation as false information spread without intent to deceive, and disinformation as false information spread deliberately to mislead."}, {"text": "Misinformation concerns foreign actors; disinformation concerns domestic actors.", "isCorrect": false, "rationale": "The text does not make a domestic-foreign distinction; it distinguishes based on intent."}, {"text": "Misinformation is always fact-checked; disinformation never is.", "isCorrect": false, "rationale": "The distinction concerns intent, not fact-checking status."}, {"text": "Misinformation is shared on television; disinformation is shared only on social media.", "isCorrect": false, "rationale": "The text ties both concepts to information ecosystems broadly, including social media."}]}, {"question": "Which of the following best describes 'net neutrality' as referenced in the text?", "options": [{"text": "The principle that internet service providers should treat all data equally and not favor particular websites or services.", "isCorrect": true, "rationale": "The text defines net neutrality as the principle that internet service providers should treat all data equally and not favor particular websites or services."}, {"text": "A rule that bans all political content on the internet.", "isCorrect": false, "rationale": "Net neutrality does not restrict political content; it concerns ISP neutrality in data treatment."}, {"text": "A Supreme Court doctrine protecting corporations from disclosing digital advertising spending.", "isCorrect": false, "rationale": "Net neutrality is about ISP data treatment, not corporate disclosure."}, {"text": "A constitutional amendment guaranteeing universal internet access.", "isCorrect": false, "rationale": "No such constitutional amendment exists; net neutrality has been an FCC regulatory policy."}]}, {"question": "According to the text, which of the following best describes the FCC's recent history with net neutrality rules?", "options": [{"text": "The FCC has consistently refused to regulate internet service providers.", "isCorrect": false, "rationale": "The text describes active regulatory engagement, not refusal."}, {"text": "The FCC adopted net neutrality rules in 2015, repealed them in 2017, and the issue remains politically contested.", "isCorrect": true, "rationale": "The text states that the FCC adopted net neutrality rules in 2015, repealed them in 2017, and notes that the issue remains politically contested."}, {"text": "Congress has passed a constitutional amendment codifying net neutrality.", "isCorrect": false, "rationale": "There is no constitutional amendment on net neutrality."}, {"text": "The Supreme Court struck down all FCC authority over internet policy in 2015.", "isCorrect": false, "rationale": "The text does not describe such a Supreme Court ruling; the FCC continues to regulate broadcast and has been active on net neutrality policy."}]}, {"question": "A citizen with a smartphone records and shares video of a newsworthy event on social media. Which of the following best describes this practice as used in the text?", "options": [{"text": "Citizen journalism", "isCorrect": true, "rationale": "The text defines citizen journalism as the collection and dissemination of news by ordinary individuals rather than professional journalists, often aided by smartphone cameras and social media."}, {"text": "Horse-race journalism", "isCorrect": false, "rationale": "Horse-race journalism refers to election coverage focused on 'who is winning,' not citizen reporting."}, {"text": "Opposition research", "isCorrect": false, "rationale": "Opposition research is campaign-related investigation of political opponents, not citizen reporting."}, {"text": "Astroturfing", "isCorrect": false, "rationale": "Astroturfing creates fake grassroots movements; it is not the spontaneous reporting described here."}]}, {"question": "Which of the following best captures a drawback of citizen journalism identified in the text?", "options": [{"text": "Citizen journalism is illegal under federal law.", "isCorrect": false, "rationale": "The text does not claim citizen journalism is illegal, and the First Amendment protects speech and the press."}, {"text": "Citizen journalism lacks the editorial standards, fact-checking processes, and accountability structures of professional journalism.", "isCorrect": true, "rationale": "The text states that citizen journalism 'lacks the editorial standards, fact-checking processes, and accountability structures of professional journalism.'"}, {"text": "Citizen journalism is regulated by the FCC under the Fairness Doctrine.", "isCorrect": false, "rationale": "The Fairness Doctrine was repealed in 1987 and in any event applied to broadcast media, not citizen journalism."}, {"text": "Citizen journalism can only occur during election years.", "isCorrect": false, "rationale": "The text gives no such limitation; citizen journalism is year-round."}]}, {"question": "Which of the following best describes the central tension the text highlights about social media's role in political life?", "options": [{"text": "Social media has completely displaced traditional media, so traditional journalism no longer matters.", "isCorrect": false, "rationale": "The text notes that social media has reshaped, not eliminated, traditional media, and discusses both the benefits and risks of the new landscape."}, {"text": "Social media has enabled mass political mobilization (as in the Arab Spring, Black Lives Matter, and the Tea Party) but has also become a vector for misinformation, including false claims during COVID-19 and unfounded voter-fraud narratives after 2020.", "isCorrect": true, "rationale": "The text highlights both sides: social media has enabled political mobilization through movements like the Arab Spring, Black Lives Matter, and the Tea Party, while simultaneously becoming a vector for misinformation during the COVID-19 pandemic and after the 2020 election."}, {"text": "Social media is prohibited from covering political content under Section 230.", "isCorrect": false, "rationale": "Section 230 shields platforms from liability for user content; it does not prohibit political content."}, {"text": "Social media has eliminated political polarization in the United States.", "isCorrect": false, "rationale": "The text says social media algorithms tend to promote divisive content, contributing to polarization rather than eliminating it."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
