<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP U.S. Government and Politics &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Balancing Liberty and Public Safety</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "When a government law restricts a fundamental right, what three requirements must the government meet under strict scrutiny, according to the section?", "options": [{"text": "A compelling interest, narrow tailoring, and the least restrictive means.", "isCorrect": true, "rationale": "The text defines strict scrutiny as requiring that (1) the law serves a compelling government interest, (2) it is narrowly tailored to achieve that interest, and (3) it uses the least restrictive means available."}, {"text": "A legitimate interest and a reasonable relationship to that interest.", "isCorrect": false, "rationale": "This is rational basis review, the lowest and most deferential standard, not strict scrutiny."}, {"text": "An important interest and a substantial relationship to that interest.", "isCorrect": false, "rationale": "This is intermediate scrutiny, used for classifications such as gender—not strict scrutiny."}, {"text": "A majority vote in Congress and ratification by states.", "isCorrect": false, "rationale": "These are constitutional amendment procedures, not elements of strict scrutiny."}]}, {"question": "During World War II, the federal government forcibly relocated approximately 120,000 Japanese Americans under Executive Order 9066. Which statement about the Supreme Court's treatment of that policy is most consistent with the section?", "options": [{"text": "The Court struck down the order in Korematsu v. United States (1944).", "isCorrect": false, "rationale": "The Court UPHELD the order in Korematsu (1944); it did not strike it down at that time."}, {"text": "The Court upheld the order in Korematsu v. United States (1944), a decision later repudiated by the Court.", "isCorrect": true, "rationale": "The text states the Court 'upheld the order in Korematsu v. United States (1944), a decision later repudiated by the Court.'"}, {"text": "The Court refused to hear the case on jurisdictional grounds.", "isCorrect": false, "rationale": "Korematsu was a merits decision, not dismissed on jurisdictional grounds."}, {"text": "The Court required the internment to pass strict scrutiny but upheld it anyway.", "isCorrect": false, "rationale": "The text describes the decision as being upheld and later repudiated; it does not characterize the Korematsu ruling as a strict scrutiny application leading to an upheld order."}]}, {"question": "The USA PATRIOT Act, enacted 45 days after the September 11 attacks, expanded federal surveillance powers. Which of the following is identified in the section as one of its key provisions?", "options": [{"text": "Section 215, which allowed the FBI to obtain tangible things (including phone records) relevant to terrorism investigations with FISA Court approval.", "isCorrect": true, "rationale": "The text explicitly lists Section 215 as allowing 'the FBI to obtain \"any tangible things\" (including phone records) relevant to terrorism investigations, with approval from the Foreign Intelligence Surveillance Court (FISA Court).'"}, {"text": "A nationwide ban on encrypted communications.", "isCorrect": false, "rationale": "The text does not mention encryption bans as a provision of the PATRIOT Act."}, {"text": "Required personal identification cards for all citizens.", "isCorrect": false, "rationale": "National ID cards are not mentioned in the section as a PATRIOT Act provision."}, {"text": "A constitutional amendment limiting Fourth Amendment rights.", "isCorrect": false, "rationale": "The PATRIOT Act is statutory, not a constitutional amendment; the section does not describe any such amendment."}]}, {"question": "In Jacobson v. Massachusetts (1905), the Supreme Court upheld a state's compulsory vaccination law. What constitutional principle did the Court invoke?", "options": [{"text": "The Commerce Clause, allowing federal regulation of interstate health matters.", "isCorrect": false, "rationale": "Jacobson concerned state police power, not Commerce Clause regulation."}, {"text": "The principle that individual liberty is not absolute and may be subjected to restraint as public safety demands.", "isCorrect": true, "rationale": "The text quotes the Court: individual liberty 'may at times, under the pressure of great dangers, be subjected to such restraint as the safety of the general public may demand.'"}, {"text": "The Takings Clause, compensating citizens for vaccinations.", "isCorrect": false, "rationale": "The Takings Clause addresses property expropriation, not compulsory vaccination."}, {"text": "The Full Faith and Credit Clause, which standardizes state health requirements.", "isCorrect": false, "rationale": "Full Faith and Credit concerns recognition of judicial and public acts between states, not vaccination."}]}, {"question": "In 2013, Edward Snowden revealed that the National Security Agency was collecting metadata on millions of Americans' phone calls under Section 215. Congress responded with which of the following?", "options": [{"text": "The Patriot Act Extension of 2013.", "isCorrect": false, "rationale": "The section does not mention a 'Patriot Act Extension of 2013.' It identifies a different statute."}, {"text": "The USA FREEDOM Act (2015), which ended bulk metadata collection and required more targeted requests.", "isCorrect": true, "rationale": "The text states Congress 'responded with the USA FREEDOM Act (2015), which ended bulk metadata collection and required the government to make more targeted requests.'"}, {"text": "The Homeland Security Act of 2002.", "isCorrect": false, "rationale": "The Homeland Security Act was enacted before the Snowden revelations, not in response to them."}, {"text": "A constitutional amendment repealing the Fourth Amendment.", "isCorrect": false, "rationale": "No such amendment was passed; the statutory response was the USA FREEDOM Act."}]}, {"question": "A state legislature passes a law requiring every adult to receive a new vaccine during a public health emergency, with only medical exemptions. A citizen sues, claiming violation of individual liberty. Based on Jacobson v. Massachusetts, how is a court most likely to rule?", "options": [{"text": "The law automatically violates the Fourteenth Amendment's liberty interest.", "isCorrect": false, "rationale": "Jacobson recognized states' police power over public health during emergencies; the liberty claim does not automatically prevail."}, {"text": "The court would likely uphold the law under the state's police power, recognizing that liberty is not absolute during a public health emergency.", "isCorrect": true, "rationale": "Under Jacobson, the text notes that 'individual liberty is not absolute and \"may at times, under the pressure of great dangers, be subjected to such restraint as the safety of the general public may demand.\"'"}, {"text": "The court would require the federal government, not the state, to enact such a law.", "isCorrect": false, "rationale": "Jacobson is a state police-power case; federal legislation is not required for this kind of law."}, {"text": "The court would apply strict scrutiny and almost certainly strike down the law.", "isCorrect": false, "rationale": "Jacobson did not require strict scrutiny for public health measures; strict scrutiny applies when a fundamental right is burdened, not automatically to every vaccination law."}]}, {"question": "The section describes three historical moments when civil liberties were restricted in the name of security. Which of the following was NOT explicitly mentioned?", "options": [{"text": "The Alien and Sedition Acts (1798).", "isCorrect": false, "rationale": "The Alien and Sedition Acts ARE mentioned as an example of wartime speech restriction."}, {"text": "Japanese American internment (1942).", "isCorrect": false, "rationale": "Japanese American internment IS explicitly mentioned in the section."}, {"text": "The USA PATRIOT Act (2001).", "isCorrect": false, "rationale": "The PATRIOT Act IS explicitly mentioned in the section."}, {"text": "The Palmer Raids (1919–1920).", "isCorrect": true, "rationale": "The Palmer Raids are not mentioned in the section. The three examples listed are the Alien and Sedition Acts, Japanese American internment, and the USA PATRIOT Act."}]}, {"question": "Which of the following best describes 'police power' as used in the section?", "options": [{"text": "A federal power to investigate interstate crimes.", "isCorrect": false, "rationale": "Police power in American constitutional law refers to state regulatory authority, not a federal investigatory power."}, {"text": "A state's authority to regulate behavior for the health, safety, and welfare of the public.", "isCorrect": true, "rationale": "The text defines police power as 'the authority to regulate behavior for the health, safety, and welfare of the public.'"}, {"text": "The authority of police officers to make arrests.", "isCorrect": false, "rationale": "Police power is a constitutional term of art referring to state regulatory authority, not law-enforcement arrest procedures."}, {"text": "The power of the President to declare a public emergency.", "isCorrect": false, "rationale": "Presidential emergency declarations are a federal executive action, not 'police power' in the constitutional sense."}]}, {"question": "The section describes strict scrutiny as 'strict in theory, fatal in fact' in some contexts. Which statement best explains why courts apply this demanding standard to fundamental rights?", "options": [{"text": "To ensure all laws are struck down.", "isCorrect": false, "rationale": "The purpose is not wholesale invalidation; it is heightened protection of fundamental rights."}, {"text": "To reflect the presumption that fundamental rights should be infringed only when absolutely necessary.", "isCorrect": true, "rationale": "The text says 'This high bar reflects the presumption that fundamental rights should be infringed only when absolutely necessary.'"}, {"text": "To give legislatures complete discretion over fundamental rights.", "isCorrect": false, "rationale": "Strict scrutiny restricts legislative discretion when fundamental rights are at stake; it does not defer to legislatures."}, {"text": "To implement the rational basis test.", "isCorrect": false, "rationale": "Strict scrutiny is distinct from (and more demanding than) rational basis review."}]}, {"question": "National Security Letters (NSLs), as described in the section, are significant because they permitted the FBI to:", "options": [{"text": "Search homes without any warrant.", "isCorrect": false, "rationale": "The text does not state NSLs authorize home searches without warrants. NSLs target records held by third parties."}, {"text": "Demand records from telecommunications companies and financial institutions without a judge's approval.", "isCorrect": true, "rationale": "The text states NSLs 'permitted the FBI to demand records from telecommunications companies and financial institutions without a judge's approval.'"}, {"text": "Arrest any foreign national without probable cause.", "isCorrect": false, "rationale": "NSLs are a records-demand tool, not an arrest authority."}, {"text": "Censor news stories about ongoing investigations.", "isCorrect": false, "rationale": "NSLs do not authorize censorship of news stories; prior restraint issues are governed by separate First Amendment doctrine."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
