<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP U.S. Government and Politics &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Ideology and Policymaking</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A liberal member of Congress and a conservative member are both presented with data showing rising prescription drug costs. Based on the text's description of ideological shortcuts, how are their initial policy instincts most likely to differ?", "options": [{"text": "The liberal member will ask how government action can correct the problem, while the conservative member will ask how to remove government barriers and let the private sector innovate.", "isCorrect": true, "rationale": "The text states exactly this contrast: liberals ask 'What can government do to fix this?' while conservatives ask 'How can we remove government barriers and let the private sector innovate?'"}, {"text": "Both will support identical market-based solutions.", "isCorrect": false, "rationale": "The text explicitly states that different starting points 'lead to predictable disagreements across nearly every policy domain.'"}, {"text": "The liberal member will reject government action; the conservative will seek more regulation.", "isCorrect": false, "rationale": "This reverses the typical ideological positions the text describes."}, {"text": "Both will abandon their ideology and wait for public opinion polls.", "isCorrect": false, "rationale": "The text describes ideology as a decision-making shortcut legislators use to evaluate proposals quickly; it is not abandoned when facing new data."}]}, {"question": "Which definition best describes a \"party platform\" as the text presents it?", "options": [{"text": "A legally binding contract between voters and the party.", "isCorrect": false, "rationale": "Party platforms are not legally binding; the text treats them as declarative documents that signal priorities and frame governance."}, {"text": "A formal document, adopted every four years, stating the party's positions on major issues that signals priorities to voters, provides a framework for governing, and resolves or papers over internal disagreements.", "isCorrect": true, "rationale": "The text states this directly: platforms are formally adopted every four years, and their functions include signaling priorities, providing a governing framework, and resolving internal disputes."}, {"text": "A campaign slogan used in television advertisements.", "isCorrect": false, "rationale": "A platform is a comprehensive policy document, not a slogan."}, {"text": "A list of candidates running in primary elections.", "isCorrect": false, "rationale": "Platforms concern positions, not candidate lists."}]}, {"question": "A moderate Republican from a swing district joins with Democrats on a clean energy bill, gaining their support for a provision that protects fossil-fuel workers in her district. This scenario most directly illustrates:", "options": [{"text": "Gridlock.", "isCorrect": false, "rationale": "Gridlock is the failure to assemble a majority. This scenario shows successful coalition-building, not gridlock."}, {"text": "Coalition-building through compromise — assembling enough votes to pass legislation by finding common ground across parties.", "isCorrect": true, "rationale": "The text uses nearly this exact scenario: 'A moderate Republican who supports environmental regulation might join with Democrats on a clean energy bill in exchange for provisions that benefit fossil fuel workers in their district.'"}, {"text": "A realignment of the Republican Party.", "isCorrect": false, "rationale": "A single lawmaker's cross-partisan vote is not a realignment of a party's coalition."}, {"text": "Elimination of ideological differences.", "isCorrect": false, "rationale": "The scenario preserves both sides' priorities through bargaining; it does not eliminate ideological differences."}]}, {"question": "Which piece of legislation does the text cite as having required Northern Republican votes to overcome Southern Democratic opposition?", "options": [{"text": "The Affordable Care Act.", "isCorrect": false, "rationale": "The text explicitly notes the ACA 'passed on party-line votes.'"}, {"text": "The Civil Rights Act of 1964.", "isCorrect": true, "rationale": "The text states: 'The Civil Rights Act of 1964 required Northern Republican votes to overcome Southern Democratic opposition.'"}, {"text": "The Reagan tax cuts of 1981.", "isCorrect": false, "rationale": "The text does not describe the Reagan tax cuts as an example of bipartisan coalition-building; that example is reserved for civil rights legislation."}, {"text": "The American Rescue Plan.", "isCorrect": false, "rationale": "The American Rescue Plan passed primarily on party-line votes, not through the kind of cross-partisan coalition described."}]}, {"question": "According to the text, which structural feature of American government makes pure ideological governance \"nearly impossible\" even when one party controls the presidency, House, and Senate?", "options": [{"text": "The Bill of Rights guarantees ideological purity.", "isCorrect": false, "rationale": "The Bill of Rights protects civil liberties; it does not mandate ideological purity or compromise in legislation."}, {"text": "Divided government is the only force preventing ideological governance.", "isCorrect": false, "rationale": "The text notes that even under unified government, narrow majorities and internal party divisions require compromise — so divided government is only one factor."}, {"text": "Separation of powers, federalism, and diverse constituencies — combined with narrow majorities and internal party divisions — require compromise and coalition-building.", "isCorrect": true, "rationale": "The Key Concept box summarizes exactly this: 'the American system's separation of powers, federalism, and diverse constituencies require compromise and coalition-building.'"}, {"text": "The two-party system guarantees agreement.", "isCorrect": false, "rationale": "The two-party system with polarization tends to produce the opposite — disagreement and gridlock rather than agreement."}]}, {"question": "A student claims: \"As polarization increases, so does gridlock.\" Which statement from the text best supports this claim?", "options": [{"text": "Legislators face pressure from party leaders, activist bases, and primary voters to maintain ideological purity, and the result is more frequent gridlock.", "isCorrect": true, "rationale": "The text states this directly: pressures to maintain ideological purity have made bipartisan coalition-building more difficult, and 'the result is more frequent gridlock.'"}, {"text": "Polarization has been declining since 1994.", "isCorrect": false, "rationale": "The text says polarization has grown, not declined."}, {"text": "Gridlock has no connection to the primary election process.", "isCorrect": false, "rationale": "The text ties gridlock to pressure from primary voters and activist bases, so the connection is direct."}, {"text": "Bipartisan coalition-building has become easier in recent decades.", "isCorrect": false, "rationale": "The text states bipartisan coalition-building has become more difficult, not easier."}]}, {"question": "When gridlock prevents comprehensive lawmaking, the text says government increasingly operates through all of the following EXCEPT:", "options": [{"text": "Executive orders.", "isCorrect": false, "rationale": "The text lists executive orders as one substitute for comprehensive lawmaking."}, {"text": "Judicial decisions.", "isCorrect": false, "rationale": "The text lists judicial decisions as another substitute."}, {"text": "Short-term continuing resolutions.", "isCorrect": false, "rationale": "The text explicitly mentions 'short-term continuing resolutions' as a gridlock symptom."}, {"text": "Direct citizen referenda at the federal level.", "isCorrect": true, "rationale": "The United States does not have a federal referendum mechanism, and the text does not list this as a substitute for comprehensive lawmaking."}]}, {"question": "A party platform must balance the views of business interests (wanting more immigration for labor supply), cultural conservatives (wanting less immigration to preserve social cohesion), and humanitarian advocates (emphasizing refugee protection). Which function of party platforms does this scenario most directly illustrate?", "options": [{"text": "Signaling priorities only to the opposing party.", "isCorrect": false, "rationale": "Platforms signal priorities to voters broadly; there is no special \"opposing party\" audience mentioned."}, {"text": "Resolving — or papering over — internal factional disagreements.", "isCorrect": true, "rationale": "The text uses this exact example of immigration policy balancing business, cultural, and humanitarian factions to illustrate that platforms 'resolve (or paper over) internal disagreements.'"}, {"text": "Legally binding the party's future lawmakers.", "isCorrect": false, "rationale": "The text does not describe platforms as legally binding."}, {"text": "Selecting the party's presidential candidate.", "isCorrect": false, "rationale": "Candidate selection is conducted through primaries and conventions, not through the platform document."}]}, {"question": "Based on the text's discussion of party platforms, a platform position on immigration typically reflects all of the following EXCEPT:", "options": [{"text": "The ideological center of gravity of the party.", "isCorrect": false, "rationale": "The text explicitly says platform positions reflect the ideological center of each party."}, {"text": "Negotiation among internal factions with different priorities.", "isCorrect": false, "rationale": "The text describes platforms as 'products of negotiation among factions.'"}, {"text": "Strict legal mandates that force the party's elected officials to comply.", "isCorrect": true, "rationale": "The text does not describe platforms as legally binding; elected officials are not legally required to follow them."}, {"text": "Signals about priorities for voters.", "isCorrect": false, "rationale": "The text explicitly lists 'signal priorities to voters' as a function of platforms."}]}, {"question": "Which trend does the text most directly associate with the rise of ideological purity pressure from party leaders, activist bases, and primary voters?", "options": [{"text": "An increase in bipartisan comprehensive lawmaking.", "isCorrect": false, "rationale": "The text says this trend makes bipartisan coalition-building MORE difficult, not more common."}, {"text": "A rise in legislative gridlock, with governance shifting toward executive orders, judicial decisions, and continuing resolutions.", "isCorrect": true, "rationale": "The text ties ideological purity pressures to more frequent gridlock and a shift toward non-legislative mechanisms of governance."}, {"text": "The disappearance of party platforms.", "isCorrect": false, "rationale": "The text describes party platforms as continuing to function, particularly as four-year adoption documents."}, {"text": "A consolidation of all policymaking in state governments.", "isCorrect": false, "rationale": "The text does not describe complete consolidation in states; it describes a shift toward executive and judicial action at the federal level when Congress is gridlocked."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
