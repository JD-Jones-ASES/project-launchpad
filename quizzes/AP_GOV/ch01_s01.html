<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP U.S. Government and Politics &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Ideals of Democracy</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A political theorist argues that government may only exercise authority that the people themselves have delegated to it through a founding charter, and that when government exceeds those bounds the people may withdraw their consent. This argument most directly combines which two Enlightenment concepts?", "options": [{"text": "Divine right and hereditary succession", "isCorrect": false, "rationale": "These are precisely the principles popular sovereignty was designed to reject; the text notes most eighteenth-century governments 'claimed authority by birthright.'"}, {"text": "Popular sovereignty and the social contract", "isCorrect": true, "rationale": "The text defines popular sovereignty as authority 'flowing from the people' and the social contract as an agreement that is 'conditional' — people retain 'the right to alter or abolish' a government that fails to uphold its end."}, {"text": "Pluralism and elite democracy", "isCorrect": false, "rationale": "These are models describing how power is distributed in practice, not philosophical foundations of government legitimacy."}, {"text": "Checks and balances and federalism", "isCorrect": false, "rationale": "These are structural features of the U.S. Constitution, not the underlying Enlightenment ideas about the origin of governmental authority."}], "id": "q01"}, {"question": "According to the text, which statement best captures John Locke's view of natural rights?", "options": [{"text": "Rights are privileges granted by legitimate governments to reward civic virtue.", "isCorrect": false, "rationale": "The text explicitly rejects this: 'Government does not create rights; it exists to protect them.'"}, {"text": "Rights belong to individuals by virtue of being human and exist independent of any government.", "isCorrect": true, "rationale": "The text states Locke argued rights 'exist independent of any government' and 'belong to individuals simply by virtue of being human.'"}, {"text": "Rights flow from the monarch's consent to the governed.", "isCorrect": false, "rationale": "The text describes Locke as a rival to monarchical theories, not a defender of royal grants of rights."}, {"text": "Rights are collective property of the community, distributed by majority vote.", "isCorrect": false, "rationale": "Locke's rights were individual and pre-political — not subject to majority distribution; indeed Madison later worried about majorities trampling such rights."}], "id": "q02"}, {"question": "The Declaration of Independence states that governments 'deriv[e] their just powers from the consent of the governed' and that when government becomes destructive of its ends, 'it is the Right of the People to alter or to abolish it.' Which Lockean concept does this passage most directly invoke?", "options": [{"text": "Republicanism, because it describes election of representatives", "isCorrect": false, "rationale": "The passage does not mention elections or representatives; it addresses the conditions under which government itself is legitimate."}, {"text": "The social contract, including the conditional nature of the people's consent", "isCorrect": true, "rationale": "The text explicitly ties this language to social contract theory: 'if a government fails to uphold its end of the bargain the people retain the right to alter or abolish it.'"}, {"text": "Elite democracy, because only educated citizens can judge government", "isCorrect": false, "rationale": "Elite democracy describes concentration of power in a small group, not a general right of the people to dissolve government."}, {"text": "Judicial review, because courts enforce constitutional limits", "isCorrect": false, "rationale": "Judicial review is a constitutional mechanism developed later; the Declaration appeals directly to the people, not to courts."}], "id": "q03"}, {"question": "The text contrasts Thomas Hobbes and John Locke as rival social contract theorists. What is the key difference in the governments each theory justifies?", "options": [{"text": "Hobbes justified direct democracy; Locke justified pure monarchy.", "isCorrect": false, "rationale": "This reverses the actual positions and is not supported by the text."}, {"text": "Hobbes justified strong central authority to prevent chaos; Locke justified limited government to protect individual rights.", "isCorrect": true, "rationale": "The 'Key Concept' box states exactly this: 'Hobbes envisioned a social contract that justified strong central authority Locke envisioned one that justified limited government to protect individual rights.'"}, {"text": "Hobbes rejected the social contract entirely; Locke endorsed it.", "isCorrect": false, "rationale": "Both are named as social contract theorists in the text; their disagreement is about what the contract authorizes."}, {"text": "Hobbes favored pluralism; Locke favored elite democracy.", "isCorrect": false, "rationale": "Neither thinker is associated with the twentieth-century models of democracy described later in the section."}], "id": "q04"}, {"question": "A small New Hampshire town holds an annual meeting at which all residents gather to debate and vote directly on the town budget, zoning changes, and school policies. This practice best exemplifies which model of democracy?", "options": [{"text": "Elite democracy, because only civic-minded citizens participate", "isCorrect": false, "rationale": "Elite democracy describes concentrated power among wealthy, well-connected individuals, not open town meetings where all residents can vote."}, {"text": "Pluralist democracy, because competing interest groups bargain", "isCorrect": false, "rationale": "Pluralism describes competition among organized groups; this scenario features individual residents voting directly, not organized factions negotiating."}, {"text": "Participatory democracy, because ordinary citizens directly engage in governance", "isCorrect": true, "rationale": "The text explicitly identifies New England town meetings as 'one of the oldest forms of participatory democracy,' where citizens 'vote directly on local policies.'"}, {"text": "Republicanism, because decisions are filtered through elected representatives", "isCorrect": false, "rationale": "There are no elected representatives filtering decisions in a town meeting; residents vote directly."}], "id": "q05"}, {"question": "A political scientist studying policy in a mid-sized American city finds that business associations, labor unions, environmental groups, and religious coalitions each influence different policy outcomes, with no single group dominating across issues. Whose analytical framework does this finding most closely support?", "options": [{"text": "C. Wright Mills's theory of a unified power elite", "isCorrect": false, "rationale": "Mills argued power was concentrated in a small interlocking network of military, corporate, and government leaders — the opposite of dispersed group competition."}, {"text": "Robert Dahl's pluralist model", "isCorrect": true, "rationale": "The text identifies Dahl as 'a leading proponent of pluralism' who argued policy outcomes reflect 'the give-and-take among many interests, not the will of any single faction.'"}, {"text": "Joseph Schumpeter's elite democracy", "isCorrect": false, "rationale": "Schumpeter saw democracy as a choice among competing elite-led teams, not as ongoing competition among diverse issue-specific groups."}, {"text": "Thomas Hobbes's social contract", "isCorrect": false, "rationale": "Hobbes's theory concerns the legitimacy of central authority, not the empirical distribution of influence among modern interest groups."}], "id": "q06"}, {"question": "Critics of American democracy point out that campaigns increasingly rely on wealthy donors, that political office-holders disproportionately come from elite educational institutions, and that corporate lobbyists shape major legislation. These observations most directly support which model of democracy?", "options": [{"text": "Participatory democracy", "isCorrect": false, "rationale": "These observations cut against participatory ideals, which emphasize ordinary citizen engagement."}, {"text": "Pluralist democracy", "isCorrect": false, "rationale": "Pluralism assumes rough parity among competing groups; concentrated donor and lobbyist influence is precisely the concern pluralism's critics raise."}, {"text": "Elite democracy", "isCorrect": true, "rationale": "The text identifies exactly these patterns — 'outsized influence of campaign donors, corporate lobbyists, and political dynasties' — as 'evidence that American democracy sometimes operates more as an elite system than a pluralist one.'"}, {"text": "Republicanism", "isCorrect": false, "rationale": "Republicanism is a structural principle (representation through elections), not a descriptive claim about who actually holds power."}], "id": "q07"}, {"question": "The text states that the Founders 'preferred republicanism over pure democracy.' Which reason, drawn from Federalist No. 10, best explains this preference?", "options": [{"text": "Elected representatives could deliberate carefully and filter popular passions to protect against faction.", "isCorrect": true, "rationale": "The text notes Madison argued in Federalist No. 10 that 'a large republic with elected representatives was the best safeguard against the dangers of faction' and that representatives could 'filter popular passions.'"}, {"text": "Pure democracy was more efficient but unfair to wealthy landowners.", "isCorrect": false, "rationale": "The text does not frame the Founders' preference in terms of efficiency or protection of landowners; the concern was faction."}, {"text": "Republicanism required fewer elections, reducing political turmoil.", "isCorrect": false, "rationale": "The text does not argue that republicanism minimizes elections; it argues representatives deliberate more carefully than masses."}, {"text": "Representatives could be chosen by the monarch to ensure continuity.", "isCorrect": false, "rationale": "This describes a monarchical system, not republicanism — which the text defines as the people electing their own representatives."}], "id": "q08"}, {"question": "According to the text, why did Jefferson substitute 'the pursuit of Happiness' for Locke's 'property' in the Declaration of Independence?", "options": [{"text": "Because Locke had never actually identified property as a natural right.", "isCorrect": false, "rationale": "The text explicitly attributes 'life, liberty, and property' to Locke, so this contradicts the source."}, {"text": "The text does not give a definitive answer; it poses the substitution as a discussion question for the reader to consider.", "isCorrect": true, "rationale": "The Discussion Prompt asks 'Why might Jefferson have chosen the pursuit of Happiness rather than property as the third natural right?' — the text raises the question without resolving it."}, {"text": "Because property ownership was prohibited under colonial British law.", "isCorrect": false, "rationale": "The text makes no such claim; colonial protests actually centered on protecting property from taxation without representation."}, {"text": "Because Jefferson intended to include enslaved people as property-holders.", "isCorrect": false, "rationale": "The text does not advance this claim; it presents the substitution as an open interpretive question."}], "id": "q09"}, {"question": "The text argues that the six core American ideals form 'an interconnected framework.' Which chain of reasoning best captures this interconnection as the text describes it?", "options": [{"text": "Judicial review produces federalism, which produces checks and balances, which produces natural rights.", "isCorrect": false, "rationale": "These are structural constitutional mechanisms, not the philosophical ideals the text links in this passage, and the causal order is wrong."}, {"text": "Popular sovereignty requires consent of the governed; consent implies natural rights government must respect; respecting rights demands limited government, best maintained through republicanism.", "isCorrect": true, "rationale": "The text states this chain almost verbatim: 'Popular sovereignty requires consent of the governed; consent of the governed implies natural rights that government must respect; respecting natural rights demands limited government; and limited government is best maintained through republicanism.'"}, {"text": "Elite democracy leads to pluralist democracy, which leads to participatory democracy.", "isCorrect": false, "rationale": "These are three distinct models describing how power actually functions — not a developmental sequence of ideals."}, {"text": "Natural rights are granted by the Constitution, which is ratified by republicanism, which requires popular sovereignty.", "isCorrect": false, "rationale": "This reverses the Lockean premise: the text emphasizes rights exist independent of government, not that the Constitution grants them."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
