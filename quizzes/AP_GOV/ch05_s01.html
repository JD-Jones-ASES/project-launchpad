<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Voting Rights and Models of Voting Behavior</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Black voter registration in Mississippi rose from 6.7 percent in 1964 to 59.8 percent by 1968. Which of the following best explains this dramatic change?", "options": [{"text": "Ratification of the Fifteenth Amendment finally took legal effect in Mississippi in 1964.", "isCorrect": false, "rationale": "The Fifteenth Amendment was ratified in 1870. Its guarantees were ignored in practice for nearly a century, which is precisely why further action was needed."}, {"text": "The Voting Rights Act of 1965 banned literacy tests and imposed federal preclearance on jurisdictions with histories of discrimination.", "isCorrect": true, "rationale": "The text directly links the VRA's ban on literacy tests and Section 5 preclearance to the dramatic rise in Black voter registration in the Deep South between 1964 and 1968."}, {"text": "The Twenty-Fourth Amendment lowered the voting age in Southern states to 18.", "isCorrect": false, "rationale": "The Twenty-Fourth Amendment abolished poll taxes in federal elections; it was the Twenty-Sixth Amendment (1971) that lowered the voting age to 18."}, {"text": "The Nineteenth Amendment was finally enforced in Southern states following a series of federal court orders.", "isCorrect": false, "rationale": "The Nineteenth Amendment extended the vote to women and was ratified in 1920. It is not relevant to the racial disenfranchisement addressed in the 1960s."}], "id": "q01"}, {"question": "A voter states, 'The economy has improved over the past four years, so I am going to support the incumbent party.' Which model of voting behavior does this statement best illustrate?", "options": [{"text": "Rational choice voting, because the voter is calculating costs and benefits of future policy proposals.", "isCorrect": false, "rationale": "Rational choice voting emphasizes comparing candidates' prospective policy positions, not judging the incumbent by recent economic performance."}, {"text": "Party identification, because the voter is following a long-term psychological attachment formed through socialization.", "isCorrect": false, "rationale": "The voter refers to recent economic conditions rather than a long-standing party loyalty, so this is not a party-identification decision."}, {"text": "Retrospective voting, because the voter is evaluating the incumbent's past performance to decide the next vote.", "isCorrect": true, "rationale": "The text defines retrospective voting as asking 'Am I better off now than I was before?' and rewarding or punishing the incumbent accordingly."}, {"text": "Prospective voting, because the voter is judging the candidate's future promises and platform.", "isCorrect": false, "rationale": "Prospective voting focuses on future vision and promises; this voter is focused on what has already happened."}], "id": "q02"}, {"question": "Which of the following best describes the distinction between 'de jure' and 'de facto' voting rights as emphasized in the text?", "options": [{"text": "De jure rights exist only at the state level, while de facto rights exist only at the federal level.", "isCorrect": false, "rationale": "The de jure / de facto distinction concerns legal versus practical existence of a right, not the level of government that protects it."}, {"text": "De jure rights are rights in law, while de facto rights are rights actually exercised in practice.", "isCorrect": true, "rationale": "The text explicitly defines de jure as 'rights in law' and de facto as 'rights in practice,' and notes the gap between them is a recurring theme in American democracy."}, {"text": "De jure rights apply to citizens, while de facto rights apply to non-citizen residents.", "isCorrect": false, "rationale": "The distinction has nothing to do with citizenship status; it concerns formal law versus lived experience."}, {"text": "De jure rights are constitutional, while de facto rights are statutory.", "isCorrect": false, "rationale": "Both constitutional and statutory protections can exist de jure. The point is whether rights are actually enjoyed, not their legal source."}], "id": "q03"}, {"question": "Which pair of constitutional amendments most directly addressed barriers that had been used to suppress voting among low-income Americans, particularly African Americans in the South?", "options": [{"text": "The Fifteenth and Nineteenth Amendments", "isCorrect": false, "rationale": "The Nineteenth Amendment addressed sex discrimination in voting, not poll taxes or other tools used against low-income voters."}, {"text": "The Fifteenth and Twenty-Fourth Amendments", "isCorrect": true, "rationale": "The Fifteenth prohibited race-based denial of the vote, and the Twenty-Fourth abolished poll taxes in federal elections, removing one of the most effective tools used to disenfranchise poor voters, particularly African Americans in the South."}, {"text": "The Nineteenth and Twenty-Sixth Amendments", "isCorrect": false, "rationale": "The Twenty-Sixth Amendment lowered the voting age to 18; it did not address poll taxes or racial barriers."}, {"text": "The Twenty-Third and Twenty-Sixth Amendments", "isCorrect": false, "rationale": "The Twenty-Third Amendment gave the District of Columbia electors in presidential elections, and the Twenty-Sixth lowered the voting age."}], "id": "q04"}, {"question": "Which of the following best captures why the Twenty-Sixth Amendment was ratified with unusual speed in 1971?", "options": [{"text": "Widespread support for giving the District of Columbia voting representation in presidential elections.", "isCorrect": false, "rationale": "That was the subject of the Twenty-Third Amendment (1961), not the Twenty-Sixth."}, {"text": "Pressure from the Voting Rights Act of 1965 to extend federal oversight to young voters.", "isCorrect": false, "rationale": "The VRA focused on racial discrimination, not the voting age."}, {"text": "The argument that Americans old enough to be drafted for Vietnam were old enough to vote.", "isCorrect": true, "rationale": "The text states ratification was 'driven largely by the argument that those old enough to be drafted and sent to fight in Vietnam were old enough to vote,' and was completed in just 107 days."}, {"text": "A Supreme Court ruling that the voting age of 21 violated the Equal Protection Clause.", "isCorrect": false, "rationale": "The text attributes the amendment to the draft-age argument, not a Supreme Court equal-protection holding."}], "id": "q05"}, {"question": "A candidate proposes a new childcare subsidy, and a voter decides to support the candidate because the voter believes the subsidy will benefit the voter's family going forward. Which model of voting behavior does this best illustrate?", "options": [{"text": "Retrospective voting", "isCorrect": false, "rationale": "Retrospective voting is based on past performance, not a future promise."}, {"text": "Prospective voting", "isCorrect": true, "rationale": "The text defines prospective voting as evaluating candidates based on promises and platforms that align with the voter's own preferences about the future."}, {"text": "Party identification", "isCorrect": false, "rationale": "Party identification is a long-term psychological attachment, not an issue-specific evaluation of a candidate's proposal."}, {"text": "Strategic voting", "isCorrect": false, "rationale": "Strategic voting involves choosing a less-preferred but more viable candidate. This voter is supporting the candidate based on policy preference, not viability calculations."}], "id": "q06"}, {"question": "Which of the following best summarizes the central critique of the rational choice model of voting behavior described in the text?", "options": [{"text": "It assumes voters always vote along party lines.", "isCorrect": false, "rationale": "That would be a critique of the party identification model, not rational choice."}, {"text": "It overestimates voters' policy knowledge and underestimates the role of emotion, identity, and habit.", "isCorrect": true, "rationale": "The text states that critics 'note that this model overestimates how much policy knowledge voters actually possess and underestimates the role of emotion, identity, and habit in political decision-making.'"}, {"text": "It ignores past performance of incumbent officeholders.", "isCorrect": false, "rationale": "Ignoring past performance is a feature of prospective voting, not the main critique of rational choice theory."}, {"text": "It assumes voters cannot make independent judgments about candidates.", "isCorrect": false, "rationale": "Rational choice actually assumes voters are independent actors calculating self-interest, so the critique is about the limits of that assumption, not its absence."}], "id": "q07"}, {"question": "Political scientists consistently find that party identification explains more variance in vote choice than any other single factor. Which of the following groups does this model least help explain?", "options": [{"text": "Voters with long-standing ties to a political party", "isCorrect": false, "rationale": "Party identification is designed precisely to explain the behavior of these voters."}, {"text": "Voters socialized into a party affiliation early in life", "isCorrect": false, "rationale": "These voters fit squarely within the model, which emphasizes political socialization through family, peers, and community."}, {"text": "Independents and swing voters", "isCorrect": true, "rationale": "The text states the model 'is less useful for explaining the behavior of independents and swing voters,' since they lack a stable partisan attachment."}, {"text": "Voters whose parents belong to the same party", "isCorrect": false, "rationale": "These voters typically inherit party identification through socialization, which is a central prediction of the model."}], "id": "q08"}, {"question": "A political scientist argues that the Fifteenth Amendment alone was insufficient to secure Black voting rights in the South. Which of the following pieces of evidence from the text best supports this argument?", "options": [{"text": "The Nineteenth Amendment was ratified decades after the Fifteenth, showing suffrage expansion was slow.", "isCorrect": false, "rationale": "That concerns women's suffrage and does not directly demonstrate the Fifteenth Amendment's enforcement gap for African Americans."}, {"text": "Poll taxes, literacy tests, grandfather clauses, and violence kept Black voter registration in the single digits for nearly a century after ratification.", "isCorrect": true, "rationale": "The text describes these barriers and the persistence of single-digit Black registration in the Deep South as direct evidence that de jure rights did not produce de facto rights."}, {"text": "The Twenty-Sixth Amendment was ratified in record time.", "isCorrect": false, "rationale": "Speed of the Twenty-Sixth Amendment's ratification concerns the voting age, not the enforcement gap for the Fifteenth Amendment."}, {"text": "Susan B. Anthony and Elizabeth Cady Stanton campaigned for suffrage from 1848 onward.", "isCorrect": false, "rationale": "This relates to women's suffrage activism, not enforcement of the Fifteenth Amendment."}], "id": "q09"}, {"question": "In an economic recession, which of the following models would most strongly predict that voters would turn against the incumbent party?", "options": [{"text": "Rational choice voting, because voters carefully analyze all future policy positions before voting.", "isCorrect": false, "rationale": "Rational choice focuses on prospective calculations across many policy dimensions, not specifically on punishing incumbents for current conditions."}, {"text": "Retrospective voting, because voters ask whether they are better off now than before and punish the incumbent when conditions have deteriorated.", "isCorrect": true, "rationale": "The text explicitly notes that retrospective voting explains why presidential approval tracks economic indicators: if conditions have deteriorated, voters punish the incumbent by choosing the challenger."}, {"text": "Party identification, because voters always stick with their party regardless of conditions.", "isCorrect": false, "rationale": "Stable partisans would remain loyal in a recession, so party identification predicts less incumbent punishment, not more."}, {"text": "Prospective voting, because voters ignore current economic conditions and focus entirely on future platforms.", "isCorrect": false, "rationale": "Prospective voting looks forward. Recession-driven punishment of incumbents is rooted in retrospective evaluation."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
