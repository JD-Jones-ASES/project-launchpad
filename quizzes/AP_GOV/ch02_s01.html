        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Congress: The Senate and House of Representatives</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The Framers' decision to create a bicameral legislature is most directly rooted in which of the following conflicts at the Constitutional Convention of 1787?", "options": [{"text": "The dispute over whether to abolish slavery in the new Constitution.", "isCorrect": false, "rationale": "The text identifies the bicameral design as a product of the Great Compromise over representation, not the slavery debate (which was resolved through the Three-Fifths Compromise)."}, {"text": "The conflict between large and small states over how representation in Congress would be allocated.", "isCorrect": true, "rationale": "The text states that the Great Compromise resolved 'the bitter dispute between large and small states over representation,' producing a population-based House and an equal-state Senate."}, {"text": "The disagreement between federalists and anti-federalists over ratification.", "isCorrect": false, "rationale": "The federalist-anti-federalist debate occurred after the Convention, during ratification; the bicameral structure was settled inside the Convention itself."}, {"text": "The argument over whether to retain the Articles of Confederation's unicameral Congress.", "isCorrect": false, "rationale": "Although the Articles had a unicameral Congress, the text attributes the bicameral choice to the Great Compromise on representation, not a unicameral-versus-bicameral debate."}]}, {"question": "A state legislature draws a new congressional map. Party A wins 60% of statewide votes, but is packed into just three of five districts, giving Party B control of two districts. Which gerrymandering technique does this most clearly illustrate?", "options": [{"text": "Cracking — diluting Party A by splitting it across all five districts.", "isCorrect": false, "rationale": "Cracking spreads a party thinly across many districts so it cannot achieve a majority anywhere. Here, Party A is concentrated, not dispersed."}, {"text": "Packing — concentrating Party A voters into a small number of districts to waste their votes.", "isCorrect": true, "rationale": "The source table shows 'Packed A' distributing Party A's voters 10-0 into three districts while leaving the other two to Party B — classic packing, which wastes surplus votes in the packed districts."}, {"text": "Majority-minority districting under the Voting Rights Act.", "isCorrect": false, "rationale": "Majority-minority districts are drawn to ensure minority voters can elect a candidate of choice; the scenario describes partisan manipulation, not racial districting compliance."}, {"text": "Proportional representation based on statewide vote share.", "isCorrect": false, "rationale": "Proportional representation would allocate seats close to the 60-40 vote split. The scenario produces a 3-2 outcome that under-represents Party A's majority — the opposite of proportionality."}]}, {"question": "What is the most significant doctrinal shift that Baker v. Carr (1962) produced?", "options": [{"text": "It required all states to use independent redistricting commissions.", "isCorrect": false, "rationale": "Baker did not mandate a particular redistricting mechanism; it addressed whether federal courts could hear redistricting challenges at all."}, {"text": "It declared that racial gerrymandering triggers strict scrutiny.", "isCorrect": false, "rationale": "That holding comes from Shaw v. Reno (1993), which dealt with race-based district lines — not from Baker, which was a Fourteenth Amendment equal-protection case about rural-urban vote dilution."}, {"text": "It held that redistricting disputes are justiciable rather than non-justiciable political questions.", "isCorrect": true, "rationale": "The text specifies that Baker held redistricting disputes 'are justiciable…and are not merely political questions beyond judicial review,' opening federal courts to apportionment challenges."}, {"text": "It created the 'one person, one vote' standard.", "isCorrect": false, "rationale": "Baker opened the door to such a standard, but the text credits Reynolds v. Sims (1964) with actually articulating 'one person, one vote.'"}]}, {"question": "In Shaw v. Reno (1993), Justice O'Connor warned that redistricting plans drawn predominantly on the basis of race risk 'balkanizing' citizens. Which constitutional test did the Court require such plans to satisfy?", "options": [{"text": "Rational-basis review, which is highly deferential to the legislature.", "isCorrect": false, "rationale": "Rational-basis review applies to most economic regulation, not race-based classifications. The Court deliberately rejected the deferential standard here."}, {"text": "Strict scrutiny, requiring the plan to be narrowly tailored to a compelling governmental interest.", "isCorrect": true, "rationale": "The text states the Court held such plans 'require strict scrutiny under the Equal Protection Clause' and 'must be narrowly tailored to serve a compelling governmental interest.'"}, {"text": "Intermediate scrutiny, a balancing test used for gender-based classifications.", "isCorrect": false, "rationale": "Intermediate scrutiny applies primarily to gender and legitimacy classifications, not to the racial gerrymandering the Court analyzed in Shaw."}, {"text": "The political-question doctrine, which bars judicial review entirely.", "isCorrect": false, "rationale": "That doctrine would have prevented the Court from deciding Shaw; instead, the Court decided the case on the merits using strict scrutiny."}]}, {"question": "Which of the following special powers belongs exclusively to the Senate rather than the House of Representatives?", "options": [{"text": "Originating all bills to raise revenue.", "isCorrect": false, "rationale": "Per the comparison table and Article I, Section 7, revenue bills must originate in the House — not the Senate."}, {"text": "Impeaching federal officials through a formal vote of charges.", "isCorrect": false, "rationale": "The House — not the Senate — has the sole power of impeachment (bringing charges). The Senate's role is to try impeachments."}, {"text": "Confirming presidential appointments and ratifying treaties.", "isCorrect": true, "rationale": "The comparison table identifies 'Confirm appointments, ratify treaties, try impeachments' as Senate-exclusive powers."}, {"text": "Choosing the president when no candidate wins an Electoral College majority.", "isCorrect": false, "rationale": "The contingent election of a president falls to the House (each state delegation casting one vote), while the Senate would select the vice president in that scenario."}]}, {"question": "Why does the Senate permit unlimited debate (the filibuster) while the House imposes strict debate limits through the Rules Committee?", "options": [{"text": "The Constitution explicitly requires the Senate to allow unlimited debate.", "isCorrect": false, "rationale": "The Constitution does not mandate unlimited debate; the filibuster is a Senate tradition that has evolved through the chamber's own rules."}, {"text": "The House operates under strict rules to manage its larger membership and shorter timelines, while the Senate's smaller size and longer terms support extended deliberation.", "isCorrect": true, "rationale": "The comparison table shows the House has 435 members on 2-year cycles, making strict floor rules necessary, while the 100-member Senate on 6-year cycles emphasizes deliberation, reflected in unlimited debate and the filibuster."}, {"text": "The Senate's rules are enforced by the Speaker, while the House's are enforced by the President Pro Tempore.", "isCorrect": false, "rationale": "The roles are reversed and mismatched: the Speaker leads the House; the President Pro Tempore is a Senate role. Neither sets the rule on debate limits in this way."}, {"text": "House members represent entire states, so they need less debate than senators representing districts.", "isCorrect": false, "rationale": "The representation is reversed: senators represent entire states; House members represent congressional districts."}]}, {"question": "James Madison argued in Federalist No. 51 that dividing the legislature would 'help prevent the concentration of power in a single body.' Which feature of a bicameral Congress best reflects this purpose?", "options": [{"text": "The requirement that both chambers agree before any bill becomes law.", "isCorrect": true, "rationale": "The text explicitly cites this internal check — 'requiring both chambers to agree before any bill becomes law' — as a central purpose of bicameralism."}, {"text": "The president's power to veto legislation.", "isCorrect": false, "rationale": "The veto is an inter-branch check from the executive, not an internal check within the legislative branch described by Madison."}, {"text": "Judicial review of statutes by the Supreme Court.", "isCorrect": false, "rationale": "Judicial review is a separation-of-powers check between the judiciary and Congress, not an internal division within the legislature."}, {"text": "The Tenth Amendment's reservation of powers to the states.", "isCorrect": false, "rationale": "Federalism between state and federal governments is distinct from the division of power within Congress itself."}]}, {"question": "A senator must be at least how old and a citizen for how many years, according to the comparison of constitutional qualifications?", "options": [{"text": "25 years old; 7 years of citizenship.", "isCorrect": false, "rationale": "Those are the qualifications for the House of Representatives, not the Senate."}, {"text": "30 years old; 9 years of citizenship.", "isCorrect": true, "rationale": "The comparison table lists the Senate's minimum age as 30 and citizenship requirement as 9 years, reflecting the Framers' intention that senators be more established."}, {"text": "35 years old; natural-born citizen from birth.", "isCorrect": false, "rationale": "Those are the qualifications for the presidency (Article II), not a Senate seat."}, {"text": "21 years old; no citizenship requirement.", "isCorrect": false, "rationale": "Both chambers have minimum-age and citizenship requirements; neither matches these numbers."}]}, {"question": "A small state worries that a new piece of legislation, popular in densely populated states, will overwhelm its interests in Congress. Which chamber's structure most directly protects that small state?", "options": [{"text": "The House, because revenue bills must start there.", "isCorrect": false, "rationale": "Origination of revenue bills in the House does not offset small-state concerns — the House's population-based apportionment actually amplifies large-state influence."}, {"text": "The Senate, because it grants each state equal representation regardless of population.", "isCorrect": true, "rationale": "The text states the Senate 'would grant each state equal representation with two senators, protecting the interests of smaller states' — the core small-state protection built into bicameralism."}, {"text": "Neither, because Article I gives larger states proportionally more power in both chambers.", "isCorrect": false, "rationale": "Only the House apportions by population; the Senate is explicitly equal across states."}, {"text": "Both equally, because the Great Compromise guaranteed population-based representation in both chambers.", "isCorrect": false, "rationale": "The Great Compromise split representation — population-based in the House and equal in the Senate — precisely so the chambers would not work identically."}]}, {"question": "Which statement best describes the combined significance of Baker v. Carr (1962) and Shaw v. Reno (1993) for congressional redistricting?", "options": [{"text": "Both decisions prohibited partisan gerrymandering outright.", "isCorrect": false, "rationale": "Neither case banned partisan gerrymandering outright; Baker opened judicial review of apportionment, and Shaw subjected race-predominant districting to strict scrutiny."}, {"text": "Baker opened federal courts to redistricting challenges generally, while Shaw specifically limited race-predominant district drawing.", "isCorrect": true, "rationale": "The text makes clear Baker established justiciability of apportionment disputes and Shaw held race-based districting must pass strict scrutiny — together they define the federal judicial role in redistricting."}, {"text": "Baker required majority-minority districts; Shaw later overruled that requirement.", "isCorrect": false, "rationale": "Baker did not require majority-minority districts, and Shaw did not overrule Baker — the cases address different questions."}, {"text": "Both cases were decided on First Amendment grounds rather than the Equal Protection Clause.", "isCorrect": false, "rationale": "The text repeatedly grounds both decisions in the Equal Protection Clause of the Fourteenth Amendment, not the First Amendment."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
