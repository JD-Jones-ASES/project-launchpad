<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP U.S. Government and Politics &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Expansion of Presidential Power</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The text says 'the presidency that exists today bears little resemblance to the office the Framers designed.' Which factor is NOT identified in the text as a driver of that expansion?", "options": [{"text": "National crises.", "isCorrect": false, "rationale": "The text identifies national crises as one of the drivers of presidential expansion."}, {"text": "Congressional delegation of authority.", "isCorrect": false, "rationale": "The text lists congressional delegation as a key driver — and treats it in a dedicated section."}, {"text": "Constitutional amendments expanding Article II.", "isCorrect": true, "rationale": "The text says 'the Constitution's text has changed only modestly'; expansion has come through crises, delegation, bureaucratic growth, and personal ambition — NOT Article II amendments."}, {"text": "The growth of the federal government and the personal ambitions of individual presidents.", "isCorrect": false, "rationale": "The text identifies both as drivers of expansion."}]}, {"question": "Lincoln's Emancipation Proclamation (1863) and Truman's Executive Order 9981 (1948) are both cited in the text as examples of what?", "options": [{"text": "Constitutional amendments ratified during wartime.", "isCorrect": false, "rationale": "Neither is a constitutional amendment; both are executive orders."}, {"text": "Executive orders that reshaped major policy areas without congressional action.", "isCorrect": true, "rationale": "The text introduces both as 'landmark executive orders' that 'reshape policy without congressional action' — Lincoln freeing enslaved people in Confederate states and Truman desegregating the armed forces."}, {"text": "Court rulings that struck down presidential power.", "isCorrect": false, "rationale": "Both are assertions of presidential power, not judicial strikes against it."}, {"text": "Informal signing statements attached to routine legislation.", "isCorrect": false, "rationale": "Signing statements attach to bills during signing; these were stand-alone executive orders."}]}, {"question": "The internment of Japanese Americans under Executive Order 9066 (1942) was upheld in Korematsu v. United States (1944). Why is that decision relevant in the modern discussion of presidential power?", "options": [{"text": "It demonstrated that the Supreme Court always blocks executive overreach.", "isCorrect": false, "rationale": "In fact Korematsu shows the opposite — the Court upheld a sweeping executive action widely now regarded as unjust."}, {"text": "It is regarded as one of the Court's worst decisions and was formally repudiated in Trump v. Hawaii (2018), illustrating the long shadow of wartime executive orders.", "isCorrect": true, "rationale": "The text calls Korematsu 'widely regarded as one of the Court's worst' and notes it was 'formally repudiated in Trump v. Hawaii (2018),' showing how executive-order expansions are revisited later."}, {"text": "It was overturned the same year it was decided.", "isCorrect": false, "rationale": "The text dates the formal repudiation to 2018 — not 1944."}, {"text": "It forbade future executive orders of any kind.", "isCorrect": false, "rationale": "The text shows later presidents have continued to rely on executive orders extensively."}]}, {"question": "President Bush issued signing statements challenging over 1,200 provisions of legislation. In Clinton v. City of New York (1998), the Supreme Court struck down what related presidential tool?", "options": [{"text": "The line-item veto.", "isCorrect": true, "rationale": "The text specifically says signing statements prompted debate about whether they 'effectively create a presidential line-item veto — a power the Supreme Court struck down in Clinton v. City of New York (1998).'"}, {"text": "The pocket veto.", "isCorrect": false, "rationale": "The pocket veto was not struck down and is a different mechanism (inaction when Congress is adjourned)."}, {"text": "The War Powers Resolution.", "isCorrect": false, "rationale": "The War Powers Resolution is a congressional statute, not a presidential power that could be struck down in Clinton v. City of New York."}, {"text": "Executive privilege.", "isCorrect": false, "rationale": "Executive privilege was addressed in U.S. v. Nixon (1974), not in Clinton v. City of New York."}]}, {"question": "A president invokes the Authorization for Use of Military Force (AUMF) passed after September 11, 2001, to justify a new military operation in a country that did not exist as a target when the AUMF was passed. Which modern trend does this illustrate?", "options": [{"text": "The AUMF's use has expanded far beyond its original scope, reflecting the expansion of presidential national security authority.", "isCorrect": true, "rationale": "The text states the AUMF 'has been used by multiple presidents to justify military operations across the globe, far beyond its original scope,' illustrating the pattern of expanding executive national-security power."}, {"text": "Congress has repealed the AUMF, so presidents now rely on the War Powers Resolution exclusively.", "isCorrect": false, "rationale": "The text describes continued presidential reliance on the AUMF — it has not been repealed."}, {"text": "The AUMF automatically expires every two years.", "isCorrect": false, "rationale": "The text offers no such sunset clause; its continued use across decades contradicts automatic expiration."}, {"text": "The AUMF applies only to Afghanistan.", "isCorrect": false, "rationale": "The text describes its use 'across the globe,' not a narrow Afghanistan-only application."}]}, {"question": "Which feature of the National Emergencies Act of 1976, as described in the text, provides ongoing legal basis for expansive presidential action?", "options": [{"text": "It abolishes all emergency powers held by the president.", "isCorrect": false, "rationale": "Quite the opposite — the Act grants access to special statutory powers upon formal declaration."}, {"text": "It requires formal emergency declarations and then grants the president access to more than 100 special statutory powers.", "isCorrect": true, "rationale": "The text states the Act 'requires presidents to formally declare emergencies and grants them access to more than 100 special statutory powers,' with 'dozens of national emergency declarations' still in effect in 2024."}, {"text": "It requires Supreme Court approval of each emergency declaration.", "isCorrect": false, "rationale": "The Act involves executive declaration, not judicial pre-approval."}, {"text": "It limits the president to one emergency declaration per decade.", "isCorrect": false, "rationale": "Dozens of declarations remain in effect — inconsistent with a decade-by-decade cap."}]}, {"question": "Why does the text argue that congressional delegation has contributed to the growth of executive power?", "options": [{"text": "Because Congress transfers policy-making power to executive agencies through broad legislation directing them to regulate 'in the public interest' or to set 'reasonable' standards.", "isCorrect": true, "rationale": "The text describes precisely this mechanism and notes the president, as head of the executive branch, can shape how agencies exercise that delegated authority."}, {"text": "Because Congress has no constitutional authority to legislate on complex issues.", "isCorrect": false, "rationale": "Congress does have broad Article I authority; delegation is a choice, not a constitutional necessity."}, {"text": "Because the Framers explicitly required Congress to delegate.", "isCorrect": false, "rationale": "The Framers vested 'all legislative Powers' in Congress; delegation is a modern development, not a Framer mandate."}, {"text": "Because executive orders automatically override any congressional statute.", "isCorrect": false, "rationale": "Executive orders can be 'superseded by legislation' per earlier sections — they do not automatically override statutes."}]}, {"question": "A student writes an AP Argument Essay arguing that the expansion of presidential power has strengthened American democracy. Based on the text's 'Skill' section, which piece of evidence most directly supports that claim?", "options": [{"text": "Executive Order 9066 (Japanese American internment).", "isCorrect": false, "rationale": "This evidence weighs against presidential expansion's benefits; it is more naturally used to argue expansion has harmed democracy and civil liberties."}, {"text": "The Emancipation Proclamation as an executive order that advanced freedom during crisis.", "isCorrect": true, "rationale": "The Emancipation Proclamation is listed as an evidence option; framed as an executive order that expanded liberty, it supports the claim that presidential expansion can strengthen democracy."}, {"text": "The War Powers Resolution's inability to constrain deployments.", "isCorrect": false, "rationale": "The Resolution's failure to constrain executives is typically cited to criticize expansion as unchecked — not to support the strengthening claim."}, {"text": "Clinton v. City of New York striking down the line-item veto.", "isCorrect": false, "rationale": "This case is not among the listed evidence options and actually demonstrates a JUDICIAL limit on presidential power."}]}, {"question": "The text references a 'Whig presidency' in the early republic. Which characterization best describes that model?", "options": [{"text": "A vigorous executive who dominated domestic policy.", "isCorrect": false, "rationale": "The text describes the Whig presidency as 'relatively restrained' and deferential — not dominant."}, {"text": "A relatively restrained executive who deferred to congressional leadership on most domestic policy.", "isCorrect": true, "rationale": "The text describes the Whig presidency exactly this way: 'a relatively restrained executive who deferred to congressional leadership on most domestic policy,' with Monroe and Buchanan viewing the role narrowly."}, {"text": "An executive modeled explicitly on the British monarchy.", "isCorrect": false, "rationale": "The text does not describe the Whig presidency as monarchical; the Framers deliberately broke from that model."}, {"text": "A presidency that used executive orders aggressively to reshape domestic policy.", "isCorrect": false, "rationale": "Aggressive use of executive orders characterizes the modern presidency, not the Whig model."}]}, {"question": "Which claim is most consistent with the text's overall account of the 'administrative state'?", "options": [{"text": "The administrative state has made the president the manager of a federal workforce and budget far exceeding anything the Framers could have anticipated.", "isCorrect": true, "rationale": "The text states the administrative state made the president 'the manager of a federal workforce of over two million civilian employees and a budget of trillions of dollars, far exceeding anything the Framers could have anticipated.'"}, {"text": "The administrative state consists solely of the armed forces.", "isCorrect": false, "rationale": "The text describes 'a vast network of executive departments, independent agencies, and regulatory commissions' — far broader than the military."}, {"text": "The administrative state has shrunk dramatically since the New Deal.", "isCorrect": false, "rationale": "The text describes growth, not shrinkage, and specifically references the trillions in budget and millions of employees."}, {"text": "The Framers designed the administrative state with over two million employees in mind.", "isCorrect": false, "rationale": "The text explicitly says the current scale 'exceeds anything the Framers could have anticipated.'"}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
