        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; The Bill of Rights</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "During the ratification debates of 1787–1788, Federalists like James Madison initially argued against adding a bill of rights. Which of the following best captures their reasoning?", "options": [{"text": "A bill of rights would distract from the more important project of strengthening federal authority.", "isCorrect": false, "rationale": "The text makes no claim about Federalists viewing a bill of rights as a 'distraction' from federal power; their concern was conceptual, not about competing priorities."}, {"text": "Because the federal government held only enumerated powers, it could not threaten liberties it had no authority to touch.", "isCorrect": true, "rationale": "The text states that Federalists 'initially countered that a bill of rights was unnecessary—the federal government possessed only enumerated powers and therefore could not threaten liberties not granted to it.'"}, {"text": "A bill of rights would duplicate protections already written into the body of the Constitution itself.", "isCorrect": false, "rationale": "The Federalists did not argue the body of the 1787 Constitution already contained a comprehensive rights enumeration; they argued that limited enumerated powers made such an enumeration unnecessary."}, {"text": "State constitutions already contained adequate protections that would remain in force regardless of federal action.", "isCorrect": false, "rationale": "State protections are not the rationale described in the text; the Federalist argument focused on the structure of enumerated federal power."}]}, {"question": "A state legislature passes a law imposing prior restraint on newspapers that criticize the governor. A journalist challenges the law. In 1830, before the ratification of the Fourteenth Amendment, how would a federal court most likely rule based on Barron v. Baltimore (1833)?", "options": [{"text": "The law violates the First Amendment because freedom of the press is a fundamental right.", "isCorrect": false, "rationale": "Before incorporation, the First Amendment's press protection did not bind the states—this reasoning would reflect modern doctrine, not pre-1868 law."}, {"text": "The law is unconstitutional under the Due Process Clause of the Fourteenth Amendment.", "isCorrect": false, "rationale": "The Fourteenth Amendment was ratified in 1868—it did not exist in 1830 and could not be invoked."}, {"text": "The Bill of Rights restricts only the federal government, so the federal Constitution offers no remedy against the state law.", "isCorrect": true, "rationale": "The text cites Barron v. Baltimore (1833), which ruled that the Bill of Rights constrained only the federal government. Before the Fourteenth Amendment, 'states could restrict speech, religion, and other rights without violating the federal Constitution.'"}, {"text": "The Tenth Amendment empowers the state to enact the restriction, making it presumptively valid.", "isCorrect": false, "rationale": "The Tenth Amendment is not the operative doctrine here; the controlling principle is that the Bill of Rights simply did not apply to the states, not that the Tenth Amendment affirmatively authorized the law."}]}, {"question": "Which constitutional provision serves as the doctrinal vehicle by which the Supreme Court applies Bill of Rights protections to state and local governments?", "options": [{"text": "The Supremacy Clause of Article VI.", "isCorrect": false, "rationale": "The Supremacy Clause establishes federal law's priority over conflicting state law, but it is not the mechanism of incorporation."}, {"text": "The Privileges and Immunities Clause of Article IV.", "isCorrect": false, "rationale": "Article IV's Privileges and Immunities Clause addresses the treatment of out-of-state citizens, not the incorporation of enumerated rights against the states."}, {"text": "The Due Process Clause of the Fourteenth Amendment.", "isCorrect": true, "rationale": "The text explicitly states that 'Over the following century, the Supreme Court used [the Fourteenth Amendment's Due Process Clause] to apply—or incorporate—most Bill of Rights protections against state and local governments.'"}, {"text": "The Necessary and Proper Clause of Article I.", "isCorrect": false, "rationale": "The Necessary and Proper Clause expands congressional power to execute enumerated authorities; it is irrelevant to incorporating individual rights against the states."}]}, {"question": "A student claims that the Supreme Court 'incorporated the Bill of Rights against the states' in a single sweeping decision. Based on the section, why is this characterization inaccurate?", "options": [{"text": "The Court has never incorporated any Bill of Rights provision; Congress did so by statute.", "isCorrect": false, "rationale": "The text describes incorporation as a judicial doctrine carried out through Supreme Court decisions, not congressional statutes."}, {"text": "The Court used selective incorporation, evaluating each right individually across more than a century of cases.", "isCorrect": true, "rationale": "The text explicitly contrasts selective incorporation—'evaluates rights one at a time'—with total incorporation, and notes that 'a series of landmark cases over more than a century gradually extended federal protections to the states.'"}, {"text": "Only the First Amendment has ever been incorporated; other amendments remain purely federal.", "isCorrect": false, "rationale": "The text lists incorporations of the First, Second, Fourth, Fifth, Sixth, and Eighth Amendments, as well as a penumbral privacy right—clearly more than the First alone."}, {"text": "Incorporation was completed by constitutional amendment in 1868 rather than by judicial interpretation.", "isCorrect": false, "rationale": "The Fourteenth Amendment (1868) provided the vehicle for incorporation, but the actual application of specific rights to the states occurred through later Supreme Court decisions, not the ratification itself."}]}, {"question": "Which landmark case cited in this section represents the most recent completion of incorporation of a major Bill of Rights provision against the states?", "options": [{"text": "Gitlow v. New York (1925), incorporating free speech.", "isCorrect": false, "rationale": "Gitlow was an important early incorporation case but occurred almost a century before the cases the section identifies as recent."}, {"text": "Mapp v. Ohio (1961), incorporating the exclusionary rule.", "isCorrect": false, "rationale": "Mapp incorporated the Fourth Amendment exclusionary rule, but the section highlights a later case for Second Amendment incorporation."}, {"text": "McDonald v. Chicago (2010), incorporating the right to bear arms.", "isCorrect": true, "rationale": "The timeline lists McDonald v. Chicago (2010) as the most recent major incorporation, extending the Second Amendment right to keep and bear arms to the states."}, {"text": "Gideon v. Wainwright (1963), incorporating the right to counsel.", "isCorrect": false, "rationale": "Gideon incorporated the Sixth Amendment right to counsel, but it predates McDonald by nearly fifty years."}]}, {"question": "Which of the following Bill of Rights provisions is identified in the section as having received only LIMITED or DELAYED incorporation?", "options": [{"text": "The First Amendment's freedom of speech.", "isCorrect": false, "rationale": "Free speech was incorporated in Gitlow v. New York (1925), well-settled rather than limited."}, {"text": "The Sixth Amendment's right to counsel.", "isCorrect": false, "rationale": "Right to counsel was fully incorporated in Gideon v. Wainwright (1963)."}, {"text": "The Seventh Amendment's civil jury trial guarantee.", "isCorrect": true, "rationale": "The text specifically lists the Seventh Amendment's civil jury trial guarantee as one of the provisions with 'limited or delayed incorporation,' alongside the Third Amendment and parts of the Fifth and Eighth."}, {"text": "The Fourth Amendment's protection against unreasonable searches.", "isCorrect": false, "rationale": "Fourth Amendment protections were incorporated through cases like Mapp v. Ohio (1961) and Katz v. United States (1967)."}]}, {"question": "The section notes that the Eighth Amendment's excessive fines clause was incorporated only recently, in Timbs v. Indiana (2019). What does this fact illustrate about the nature of selective incorporation?", "options": [{"text": "The Supreme Court has a rigid schedule for incorporating rights in the order they appear in the Bill of Rights.", "isCorrect": false, "rationale": "Incorporation has not followed the numeric order of the amendments; for example, the Second Amendment was incorporated after many Fourth and Fifth Amendment provisions."}, {"text": "Incorporation is an ongoing, case-by-case process, not a completed historical event.", "isCorrect": true, "rationale": "The Timbs example, decided more than 150 years after the Fourteenth Amendment, shows that 'the Court evaluates each right individually' and continues to address previously unincorporated or partially incorporated provisions."}, {"text": "All Bill of Rights provisions have now been incorporated as of 2019.", "isCorrect": false, "rationale": "The text explicitly notes that certain provisions (e.g., the Third Amendment quartering ban, Fifth Amendment grand jury, Seventh Amendment civil jury) remain unincorporated or partially incorporated."}, {"text": "The Court incorporates a right only when Congress passes a statute requesting it.", "isCorrect": false, "rationale": "Incorporation is a judicial doctrine carried out by Supreme Court interpretation of the Fourteenth Amendment, not a process triggered by congressional request."}]}, {"question": "According to the section, which standard does the Supreme Court apply when deciding whether to incorporate a specific Bill of Rights provision against the states?", "options": [{"text": "Whether a majority of states have already enacted equivalent statutory protections.", "isCorrect": false, "rationale": "State statutory adoption is not the test the Court uses; the text frames incorporation as a constitutional, not legislative, question."}, {"text": "Whether the right is 'fundamental to the American scheme of justice.'", "isCorrect": true, "rationale": "The section defines the selective incorporation test as asking 'whether each right is \"fundamental to the American scheme of justice.\"'"}, {"text": "Whether Congress has explicitly voted to apply the right to the states.", "isCorrect": false, "rationale": "Congress does not vote to incorporate constitutional rights—the Supreme Court applies them through interpretation of the Fourteenth Amendment."}, {"text": "Whether the Framers of the Bill of Rights expressly intended the right to apply to states.", "isCorrect": false, "rationale": "Barron v. Baltimore demonstrates the Bill of Rights originally did NOT apply to states. Incorporation proceeds through the Fourteenth Amendment's fundamental-rights standard, not original Founding-era intent."}]}, {"question": "A student argues: 'Without selective incorporation, a state could establish an official religion or censor a newspaper critical of the governor, and the federal Constitution would provide no remedy.' Is this argument consistent with the section?", "options": [{"text": "No, because the Supremacy Clause would independently invalidate any state law restricting speech or religion.", "isCorrect": false, "rationale": "The Supremacy Clause subordinates conflicting state law to federal law, but it does not itself extend Bill of Rights protections to the states—incorporation through the Fourteenth Amendment does."}, {"text": "Yes, because without incorporation the Bill of Rights restrained only the federal government, so states could indeed restrict such rights without violating the federal Constitution.", "isCorrect": true, "rationale": "The section makes exactly this argument: 'Without it, a state government could establish an official religion, censor the press, or deny criminal defendants the right to an attorney—all without violating the federal Constitution.'"}, {"text": "No, because the Tenth Amendment already prevents states from infringing on individual liberty.", "isCorrect": false, "rationale": "The Tenth Amendment reserves powers to the states or the people; it does not limit what states may do to individuals."}, {"text": "Yes, but only because Congress has passed statutory equivalents of each Bill of Rights guarantee to fill the gap.", "isCorrect": false, "rationale": "The point of the section is that selective incorporation—not statutory legislation—is what extends the Bill of Rights to the states."}]}, {"question": "Which statement best captures the difference between SELECTIVE incorporation and TOTAL incorporation as described in the section?", "options": [{"text": "Selective incorporation applies only to civil liberties; total incorporation applies only to civil rights.", "isCorrect": false, "rationale": "The distinction is not a civil liberties/civil rights split; it concerns the methodology of applying the Bill of Rights to the states."}, {"text": "Selective incorporation evaluates rights one at a time; total incorporation would apply all Bill of Rights provisions to the states simultaneously.", "isCorrect": true, "rationale": "The section expressly contrasts the two: 'Unlike total incorporation, which would apply all amendments at once, selective incorporation evaluates rights one at a time.'"}, {"text": "Selective incorporation is used by state courts; total incorporation is used by federal courts.", "isCorrect": false, "rationale": "Both are models for applying federal Bill of Rights provisions to the states—not methodologies divided between federal and state tribunals."}, {"text": "Selective incorporation applies to the states; total incorporation applies to the federal government.", "isCorrect": false, "rationale": "Both incorporation approaches concern how the Bill of Rights applies to states; neither governs the federal government's own obligations."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
