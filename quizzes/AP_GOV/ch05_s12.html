<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP U.S. Government and Politics &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; The Media</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best defines 'agenda-setting' as used in the text?", "options": [{"text": "The media's power to tell people what to think on any given issue.", "isCorrect": false, "rationale": "The text specifically notes that the media cannot tell people what to think, but can tell them what to think about."}, {"text": "The media's ability to influence which issues the public and policymakers consider important.", "isCorrect": true, "rationale": "The text defines agenda-setting as the media's ability to influence which issues the public and policymakers consider important, adding that 'the media cannot tell people what to think, but it can tell them what to think about.'"}, {"text": "The legislative process by which Congress sets its committee calendars.", "isCorrect": false, "rationale": "Congressional scheduling is not media agenda-setting."}, {"text": "The constitutional authority of the president to set national priorities.", "isCorrect": false, "rationale": "That concerns executive-branch priorities, not the media concept in the text."}]}, {"question": "Which of the following best describes 'gatekeeping' as used in the text?", "options": [{"text": "The process by which editors, producers, and journalists decide which stories merit coverage and how they should be framed.", "isCorrect": true, "rationale": "The text defines gatekeeping as the editorial process of choosing which stories become news, noting that gatekeepers 'filter the vast stream of potential stories into a manageable set.'"}, {"text": "The First Amendment's protection of press freedom from government censorship.", "isCorrect": false, "rationale": "Press freedom is a constitutional protection that supports journalism; it is not the gatekeeping function itself."}, {"text": "The process by which the FCC licenses broadcasters.", "isCorrect": false, "rationale": "FCC licensing is a regulatory function, not the editorial gatekeeping described in the text."}, {"text": "The Supreme Court's doctrine governing libel suits against public officials.", "isCorrect": false, "rationale": "Libel doctrine is not gatekeeping, although it may shape media behavior."}]}, {"question": "The Washington Post's reporting on the Watergate scandal led to President Nixon's resignation. Which media function does this classic example best illustrate?", "options": [{"text": "The gatekeeping function", "isCorrect": false, "rationale": "Gatekeeping describes editorial selection, not investigation of misconduct."}, {"text": "The watchdog function", "isCorrect": true, "rationale": "The text cites Watergate as an example of the watchdog role: investigating government misconduct and exposing abuses of power."}, {"text": "The horse-race function", "isCorrect": false, "rationale": "Horse-race journalism focuses on who is 'winning' elections, not on investigating corruption."}, {"text": "The gatekeeping and agenda-setting combined", "isCorrect": false, "rationale": "Watergate coverage is best described as investigative watchdog journalism, not merely agenda-setting or gatekeeping."}]}, {"question": "Which of the following best defines the 'Fourth Estate'?", "options": [{"text": "The Supreme Court as an unofficial check on Congress and the president.", "isCorrect": false, "rationale": "The Fourth Estate refers to the press, not the judiciary."}, {"text": "The press as an unofficial branch of government that checks the power of the other three.", "isCorrect": true, "rationale": "The text calls the press 'the Fourth Estate' — an unofficial branch of government that checks the power of the other three."}, {"text": "Independent agencies outside the three constitutional branches.", "isCorrect": false, "rationale": "Independent agencies are administrative bodies, not the press."}, {"text": "State governments, considered a fourth partner in federalism.", "isCorrect": false, "rationale": "State governments are part of federalism but are not called the Fourth Estate."}]}, {"question": "Which of the following describes 'horse-race journalism' as used in the text?", "options": [{"text": "Coverage that focuses on who is 'winning' elections rather than on policy differences, reflecting commercial pressures for ratings and clicks.", "isCorrect": true, "rationale": "The text defines horse-race journalism as election coverage that focuses on who is 'winning' rather than on policy differences, rooted in structural bias tied to commercial pressures."}, {"text": "Coverage that is paid for by political campaigns rather than news organizations.", "isCorrect": false, "rationale": "That describes paid political advertising, not horse-race journalism."}, {"text": "Coverage of sports events that competes with political news.", "isCorrect": false, "rationale": "The term is a metaphor for election coverage, not actual horse races."}, {"text": "Investigative reporting on campaign finance.", "isCorrect": false, "rationale": "Campaign finance reporting is investigative or watchdog journalism, not horse-race coverage."}]}, {"question": "A researcher finds that a news outlet focuses on conflict, novelty, and personality rather than on substantive policy. Which type of media bias does this best illustrate?", "options": [{"text": "Ideological bias", "isCorrect": false, "rationale": "Ideological bias is systematic favoritism of liberal or conservative perspectives, not an emphasis on conflict and personality."}, {"text": "Structural bias", "isCorrect": true, "rationale": "The text defines structural bias as an emphasis on conflict, novelty, drama, and personality over substance, rooted in the commercial pressures of news production."}, {"text": "Corporate ownership bias", "isCorrect": false, "rationale": "Corporate ownership bias concerns how media conglomeration shapes story selection based on corporate interests, not commercial sensationalism generally."}, {"text": "Gatekeeping bias", "isCorrect": false, "rationale": "Gatekeeping refers to editorial selection; structural bias is the specific dynamic that favors conflict and personality."}]}, {"question": "Which of the following best captures the text's claim about 'corporate ownership bias' in the media?", "options": [{"text": "Media conglomeration may influence which stories are pursued and how they are framed, with concerns that corporate-owned media are unlikely to aggressively investigate their parent companies.", "isCorrect": true, "rationale": "The text states that media conglomeration can influence which stories are pursued and how they are framed, and raises critic concerns that corporate-owned media are unlikely to aggressively investigate their parent companies' business interests."}, {"text": "Corporations are legally prohibited from owning more than one news outlet.", "isCorrect": false, "rationale": "There is no such blanket legal prohibition; the text describes conglomeration as a real phenomenon with editorial implications."}, {"text": "Corporate-owned media always reports more aggressively on their parent companies to prove independence.", "isCorrect": false, "rationale": "The text describes the opposite concern: corporate-owned media are suspected of going easy on their parent companies."}, {"text": "The First Amendment forbids any corporate ownership of news organizations.", "isCorrect": false, "rationale": "The First Amendment protects press freedom and does not ban corporate ownership."}]}, {"question": "Which of the following best describes the relationship between agenda-setting and gatekeeping?", "options": [{"text": "Gatekeeping decides which stories get coverage, while agenda-setting elevates certain covered stories into matters of public and policy importance.", "isCorrect": true, "rationale": "The text describes gatekeeping as the editorial filter on what becomes news, while agenda-setting is the media's power to influence which issues the public and policymakers consider important. They are related but distinct."}, {"text": "They are identical terms for the same media function.", "isCorrect": false, "rationale": "The text presents them as related but distinct functions; they are not synonyms."}, {"text": "Gatekeeping is done by government censors; agenda-setting is done by editors.", "isCorrect": false, "rationale": "Both are performed by journalists and editors, not government censors; the First Amendment prevents government censorship of the press."}, {"text": "Agenda-setting tells people what to think; gatekeeping tells them what to think about.", "isCorrect": false, "rationale": "The text says agenda-setting tells people 'what to think about,' not what to think, and does not frame gatekeeping this way."}]}, {"question": "Which of the following conditions is NOT identified by the text as essential for the media to perform its watchdog role effectively?", "options": [{"text": "Press freedom from government censorship", "isCorrect": false, "rationale": "The text lists press freedom as a prerequisite for the watchdog role."}, {"text": "Access to information through freedom of information laws and source protection", "isCorrect": false, "rationale": "The text lists access to information as essential to the watchdog role."}, {"text": "Editorial independence and public trust", "isCorrect": false, "rationale": "The text lists both editorial independence and public trust as conditions for effective watchdog journalism."}, {"text": "A government-issued journalism license for all reporters", "isCorrect": true, "rationale": "No such licensure exists, and the text makes no such claim. Such a requirement would conflict with First Amendment press freedom principles."}]}, {"question": "A commentator asserts that 'ideological bias is the only real form of media bias.' Which of the following best evaluates this claim against the text?", "options": [{"text": "It is consistent with the text, which identifies only ideological bias.", "isCorrect": false, "rationale": "The text identifies three forms: ideological, structural, and corporate ownership."}, {"text": "It is incomplete, because the text identifies at least three forms of bias (ideological, structural, and corporate ownership) that can coexist in the same outlet.", "isCorrect": true, "rationale": "The text's Key Concept states that 'media bias is not a single phenomenon' and identifies ideological, structural, and corporate bias — noting that 'all three can coexist in the same outlet.'"}, {"text": "It is correct because structural bias only affects entertainment coverage.", "isCorrect": false, "rationale": "The text specifically ties structural bias to news coverage, including election coverage."}, {"text": "It is correct because corporate ownership bias has been eliminated by federal law.", "isCorrect": false, "rationale": "No such federal law exists, and the text describes corporate ownership bias as an ongoing concern."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
