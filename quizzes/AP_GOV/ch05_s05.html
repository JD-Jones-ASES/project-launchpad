<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP U.S. Government and Politics &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Third-Party Politics</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best illustrates the 'spoiler effect' as described in the text?", "options": [{"text": "A major-party candidate withdraws from the race before Election Day.", "isCorrect": false, "rationale": "Withdrawal before the election is not the spoiler effect; the spoiler effect requires the third-party candidate to draw votes that change the outcome."}, {"text": "A third-party candidate wins enough votes to deny either major-party candidate a majority, changing the outcome without winning.", "isCorrect": true, "rationale": "The text defines the spoiler effect as a third-party candidate drawing enough votes from a major-party candidate to change the outcome without winning themselves."}, {"text": "A major party absorbs a third party into its coalition after the election.", "isCorrect": false, "rationale": "That is coalition-building, not a spoiler effect."}, {"text": "A state election commission removes a candidate from the ballot for failing to qualify.", "isCorrect": false, "rationale": "Ballot removal is about ballot access rules, not the spoiler effect."}]}, {"question": "In the 2000 presidential election, Ralph Nader won 97,421 votes in Florida while the state was decided by just 537 votes. Which conclusion from this data is best supported by the text?", "options": [{"text": "Nader's candidacy proves that third-party candidates can win statewide elections in the United States.", "isCorrect": false, "rationale": "Nader did not win Florida or any state; the text uses this example to illustrate the spoiler effect, not a third-party victory."}, {"text": "Many analysts argue Nader's voters would have preferred Gore, making Nader a classic spoiler.", "isCorrect": true, "rationale": "The text states that 'many analysts argue that Nader's voters would have overwhelmingly preferred Gore, making Nader a classic spoiler.'"}, {"text": "The Green Party displaced the Democratic Party as a major political force.", "isCorrect": false, "rationale": "The text notes no third party has displaced a major party since the 1850s."}, {"text": "Nader's Florida performance led to a constitutional amendment banning third parties.", "isCorrect": false, "rationale": "No such amendment exists and the text does not mention one."}]}, {"question": "Which of the following is NOT identified in the text as a structural barrier to third-party success?", "options": [{"text": "Ballot access rules requiring signature thresholds and filing fees", "isCorrect": false, "rationale": "The text lists ballot access as a barrier."}, {"text": "A 15% polling threshold to participate in presidential debates", "isCorrect": false, "rationale": "The text describes debate exclusion at the 15% threshold as a barrier."}, {"text": "Winner-take-all elections that allocate zero seats to parties below the plurality threshold", "isCorrect": false, "rationale": "The text lists winner-take-all elections as a major structural barrier."}, {"text": "A constitutional requirement that parties be registered with the FEC to run candidates", "isCorrect": true, "rationale": "No such constitutional requirement exists, and the text does not mention one as a barrier. The Constitution does not recognize parties at all."}]}, {"question": "According to the text, in the 1992 presidential election, Ross Perot won approximately what share of the popular vote?", "options": [{"text": "5%", "isCorrect": false, "rationale": "The text states Perot won 19% of the popular vote, not 5%."}, {"text": "19%", "isCorrect": true, "rationale": "The text states that Perot 'won 19 percent of the popular vote — the strongest third-party showing since Theodore Roosevelt's Bull Moose Party in 1912.'"}, {"text": "29%", "isCorrect": false, "rationale": "The text specifically says 19%, not 29%."}, {"text": "37%", "isCorrect": false, "rationale": "Perot won 19%. The text explicitly notes he did not carry a single state."}]}, {"question": "Which of the following best describes the 'catch-22' created by the Commission on Presidential Debates' 15% polling threshold?", "options": [{"text": "Third-party candidates must win a primary to appear on the ballot, but cannot afford primaries.", "isCorrect": false, "rationale": "The catch-22 in the text concerns debates and media, not primaries."}, {"text": "Media coverage drives polling, and debate participation drives media coverage, so third-party candidates cannot break through.", "isCorrect": true, "rationale": "The text explicitly states that media coverage drives polling numbers and debate participation drives media coverage, creating a catch-22 that keeps third-party candidates invisible."}, {"text": "Candidates must win the Electoral College to receive debate invitations.", "isCorrect": false, "rationale": "The Electoral College determines the presidency, not pre-election debate invitations."}, {"text": "The FEC requires candidates to raise $10 million before debating.", "isCorrect": false, "rationale": "The text identifies polling at or above 15% as the requirement, not a fundraising threshold."}]}, {"question": "Which of the following historical third-party examples is correctly paired with an issue that was later adopted by the major parties?", "options": [{"text": "The Populist Party — progressive income tax, direct election of senators, and railroad regulation", "isCorrect": true, "rationale": "The text states the Populist Party of the 1890s championed these issues, 'all eventually adopted by the major parties.'"}, {"text": "The Green Party — abolition of the Electoral College", "isCorrect": false, "rationale": "The text associates the Green Party with environmental protection, not Electoral College reform."}, {"text": "The Libertarian Party — Social Security expansion", "isCorrect": false, "rationale": "The text associates the Libertarian Party with civil liberties, not Social Security expansion."}, {"text": "The Bull Moose Party — repeal of the Twenty-Fourth Amendment", "isCorrect": false, "rationale": "The Twenty-Fourth Amendment postdates the Bull Moose Party and the text makes no such claim."}]}, {"question": "After Ross Perot's 1992 campaign, both Democrats and Republicans adopted deficit reduction as a priority. Which function of third parties does this best illustrate?", "options": [{"text": "Winning legislative seats", "isCorrect": false, "rationale": "The text specifically notes third parties do not win major seats under winner-take-all rules."}, {"text": "Pressuring major parties to respond by adopting new issues on the agenda", "isCorrect": true, "rationale": "The text describes this exact example: after Perot's focus on the deficit, both major parties adopted deficit reduction as a priority. This illustrates how third parties pressure major parties."}, {"text": "Replacing an incumbent major party in the electoral college", "isCorrect": false, "rationale": "Perot did not carry a single state, so no replacement in the Electoral College occurred."}, {"text": "Eliminating the two-party system", "isCorrect": false, "rationale": "Third parties have not eliminated the two-party system; the text notes it has been stable since the 1850s."}]}, {"question": "Which of the following statements best captures the difference between how third parties are treated in the United States versus in proportional representation systems?", "options": [{"text": "In the United States, third parties automatically receive committee chairs in Congress; in proportional systems they do not.", "isCorrect": false, "rationale": "No such automatic committee rule exists in Congress; the contrast is about seat allocation."}, {"text": "In the United States, a party that wins 10% of the vote nationwide may receive zero seats; in proportional systems it would receive roughly 10% of legislative seats.", "isCorrect": true, "rationale": "The text makes exactly this contrast, noting that in the American system a party winning 10% nationally can receive nothing while proportional representation would award roughly 10% of seats."}, {"text": "In the United States, third parties receive automatic public financing; in proportional systems they do not.", "isCorrect": false, "rationale": "The text notes third parties typically lack established donor networks and financing advantages, not that they receive automatic public financing."}, {"text": "Proportional systems require winner-take-all rules, making them more similar to the United States than is commonly assumed.", "isCorrect": false, "rationale": "Proportional representation is explicitly contrasted with winner-take-all, not similar to it."}]}, {"question": "Which of the following best describes why the text characterizes the barriers to third-party success as 'features of institutional design, not constitutional mandates'?", "options": [{"text": "The Constitution explicitly endorses the two-party system.", "isCorrect": false, "rationale": "The Constitution does not mention parties at all, let alone endorse a two-party system."}, {"text": "Barriers like winner-take-all rules, ballot access, and debate thresholds are products of statutory and regulatory choices, not of the Constitution.", "isCorrect": true, "rationale": "The text states the barriers are 'features of institutional design, not constitutional mandates,' meaning they can be changed through ordinary political processes."}, {"text": "The Supreme Court has ruled that third parties are unconstitutional.", "isCorrect": false, "rationale": "No such ruling exists; third parties are legal and routinely appear on ballots."}, {"text": "The Electoral College requires exactly two parties by constitutional amendment.", "isCorrect": false, "rationale": "The Electoral College does not require a two-party system; multiple parties can compete for electoral votes."}]}, {"question": "A political analyst argues, 'Even though third parties rarely win, they matter.' Which of the following combinations of evidence from the text best supports this argument?", "options": [{"text": "Third parties control most congressional committees, and they routinely win the presidency.", "isCorrect": false, "rationale": "Third parties do not control committees or win the presidency under the current system; the text describes the opposite."}, {"text": "Third parties raise new issues (like deficit reduction or environmental protection), pressure major parties to adopt those issues, and provide voter choice.", "isCorrect": true, "rationale": "The text identifies exactly these three functions — raising new issues, pressuring major parties, and providing voter choice — as the reasons third parties matter despite rarely winning."}, {"text": "Third parties have replaced the major parties twice in American history.", "isCorrect": false, "rationale": "The text states that no third party has displaced a major party since the Republicans replaced the Whigs in the 1850s — only once, not twice."}, {"text": "Third parties automatically qualify for the 15% polling threshold and receive equal debate time.", "isCorrect": false, "rationale": "Third parties typically cannot meet the 15% threshold, which is one of the barriers the text highlights."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
