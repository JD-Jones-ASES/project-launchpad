<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP U.S. Government and Politics &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; The Role of the Judicial Branch</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Judicial review is not explicitly mentioned in the Constitution. Which case established it, and through what reasoning?", "options": [{"text": "Brown v. Board of Education (1954), which held that 'separate but equal' was unconstitutional.", "isCorrect": false, "rationale": "Brown desegregated public schools but did not establish judicial review; that doctrine was established more than 150 years earlier."}, {"text": "Marbury v. Madison (1803), in which Chief Justice Marshall declared it 'emphatically the province and duty of the judicial department to say what the law is.'", "isCorrect": true, "rationale": "The text states judicial review 'was established in Marbury v. Madison (1803), when Chief Justice John Marshall declared' that exact quotation."}, {"text": "United States v. Lopez (1995), which limited congressional Commerce Clause authority.", "isCorrect": false, "rationale": "Lopez is one application of judicial review cited in the text, not its origin."}, {"text": "Citizens United v. FEC (2010).", "isCorrect": false, "rationale": "Citizens United applied judicial review to campaign-finance regulation; it did not establish the doctrine itself."}]}, {"question": "Which case listed in the text is an example of judicial review being used to LIMIT congressional power?", "options": [{"text": "Brown v. Board of Education (1954).", "isCorrect": false, "rationale": "Brown limited STATE power to segregate schools, not congressional power."}, {"text": "Gideon v. Wainwright (1963).", "isCorrect": false, "rationale": "Gideon established the right to counsel against the states, not a limit on Congress."}, {"text": "United States v. Lopez (1995).", "isCorrect": true, "rationale": "The text lists Lopez under 'Limit congressional power,' distinguishing it from cases addressing state action or individual rights."}, {"text": "Tinker v. Des Moines (1969).", "isCorrect": false, "rationale": "Tinker protected student free speech from school officials, not Congress."}]}, {"question": "A critic argues that 'the Court's power depends less on enforcement mechanisms and more on whether the public and other branches accept its rulings.' Which concept from the text does this best describe?", "options": [{"text": "Stare decisis.", "isCorrect": false, "rationale": "Stare decisis is the principle of following precedent, not the source of the Court's authority over other branches."}, {"text": "Legitimacy — public acceptance that the courts have the rightful authority to make binding legal decisions.", "isCorrect": true, "rationale": "The text states explicitly, 'The judiciary's power rests ultimately on legitimacy — the public's acceptance that the courts have the rightful authority to make binding legal decisions.'"}, {"text": "Judicial activism.", "isCorrect": false, "rationale": "Judicial activism describes how aggressively courts use their power, not the source of their authority."}, {"text": "The filibuster.", "isCorrect": false, "rationale": "The filibuster is a Senate procedure unrelated to judicial legitimacy."}]}, {"question": "After Brown v. Board of Education (1954), what did Southern states do, and what does their response demonstrate about judicial power?", "options": [{"text": "They complied immediately, showing that judicial rulings are self-executing.", "isCorrect": false, "rationale": "The text describes 'massive resistance' to Brown — compliance was far from immediate."}, {"text": "They engaged in 'massive resistance,' defying desegregation orders for years, ultimately prompting President Eisenhower to send federal troops to Little Rock.", "isCorrect": true, "rationale": "The text describes Southern resistance and Eisenhower's intervention, illustrating that judicial rulings require executive enforcement and public acceptance to be effective."}, {"text": "They appealed the decision to the United Nations.", "isCorrect": false, "rationale": "The text describes domestic resistance, not international appeal."}, {"text": "They overruled the decision by simple legislative act.", "isCorrect": false, "rationale": "State legislatures cannot overrule Supreme Court constitutional decisions directly."}]}, {"question": "Which statement most accurately distinguishes 'judicial activism' from 'judicial restraint' as described in the text?", "options": [{"text": "Activism is always liberal, and restraint is always conservative.", "isCorrect": false, "rationale": "The text explicitly warns: 'activism and restraint are not synonymous with liberal and conservative.'"}, {"text": "Activism is willingness to strike down laws, overrule precedent, and interpret the Constitution expansively; restraint is reluctance to overturn laws or deviate from precedent.", "isCorrect": true, "rationale": "The text defines each term precisely this way, noting both liberal and conservative courts have engaged in each approach."}, {"text": "Activism means ignoring the Constitution; restraint means enforcing it.", "isCorrect": false, "rationale": "Both activist and restrained courts work within the Constitution; they differ on how aggressively to apply it."}, {"text": "Activism applies only to state courts; restraint applies only to federal courts.", "isCorrect": false, "rationale": "Both philosophies apply across the judiciary, not along state-federal lines."}]}, {"question": "The text describes the Supreme Court as a 'counter-majoritarian institution.' Which of the following is the strongest DEFENSE of that role, as presented in the text?", "options": [{"text": "The Court protects unpopular minorities and safeguards fundamental rights from 'the tyranny of the majority,' enforcing structural limits the Constitution establishes.", "isCorrect": true, "rationale": "The text offers exactly this defense, citing Tocqueville's 'tyranny of the majority' and the Bill of Rights as evidence that certain rights should not be subject to majority vote."}, {"text": "The Court enforces whatever majority opinion currently prevails in Congress.", "isCorrect": false, "rationale": "That would make the Court majoritarian — the opposite of counter-majoritarian."}, {"text": "The Court defers entirely to elected officials in all cases.", "isCorrect": false, "rationale": "Full deference would negate judicial review, not defend the counter-majoritarian role."}, {"text": "The Court's justices are directly elected to represent public opinion.", "isCorrect": false, "rationale": "Federal justices are appointed, not elected — their lack of electoral accountability IS the counter-majoritarian concern."}]}, {"question": "Which statement best captures the 'temporal disconnect' the text identifies as a consequence of life tenure?", "options": [{"text": "Justices rotate off the Court every six years, matching the Senate election cycle.", "isCorrect": false, "rationale": "Justices do not rotate on any term; they serve during 'good Behaviour' — effectively for life."}, {"text": "A single justice may serve 30 or more years, meaning the Court's composition can reflect the politics of a previous era rather than the current landscape.", "isCorrect": true, "rationale": "The text identifies this exact dynamic, noting life tenure 'creates a temporal disconnect' between appointing-era politics and contemporary realities."}, {"text": "The Court is composed entirely of justices appointed in the last two years.", "isCorrect": false, "rationale": "The text describes long tenures (30+ years), not short ones."}, {"text": "Justices are legally required to align with the current president.", "isCorrect": false, "rationale": "Life tenure is specifically designed to insulate justices from the political pressures of the current president."}]}, {"question": "Which of the following Supreme Court decisions is cited in the text as an example of judicial review being used to EXPAND individual rights?", "options": [{"text": "United States v. Lopez (1995).", "isCorrect": false, "rationale": "Lopez is cited for limiting congressional power, not for expanding individual rights."}, {"text": "Gideon v. Wainwright (1963) — establishing the right to counsel.", "isCorrect": true, "rationale": "The text lists Gideon under judicial review's uses, specifically to 'establish the right to counsel.'"}, {"text": "Shelby County v. Holder (2013).", "isCorrect": false, "rationale": "Shelby County is cited elsewhere as an example of conservative activism; the text does not list it as expanding individual rights in this section."}, {"text": "Citizens United v. FEC (2010), as a civil-rights expansion.", "isCorrect": false, "rationale": "Citizens United is cited as regulating campaign finance, not as expanding civil rights."}]}, {"question": "A political scientist writes: 'Public trust in the Supreme Court has declined to historic lows, and this matters for the institution.' Based on the text, why does that decline matter?", "options": [{"text": "Because the Court's long-term authority depends on public confidence, and declining legitimacy can weaken its institutional power over time.", "isCorrect": true, "rationale": "The text states the Court's 'legitimacy depends on public confidence in its impartiality and legal reasoning,' and declines in trust may weaken institutional authority."}, {"text": "Because the Court is elected and will lose the next election.", "isCorrect": false, "rationale": "The Court is not elected; justices are appointed for life."}, {"text": "Because declining trust triggers automatic impeachment.", "isCorrect": false, "rationale": "There is no automatic impeachment trigger based on public opinion; removal requires a House majority and two-thirds Senate conviction."}, {"text": "Because the Court loses its power to enforce executive orders.", "isCorrect": false, "rationale": "The Court does not ordinarily enforce executive orders; that is an executive function. Legitimacy concerns the Court's own rulings."}]}, {"question": "Chief Justice John Roberts once said, 'Judges are like umpires. Umpires don't make the rules, they apply them.' Which philosophy does this comment most closely reflect?", "options": [{"text": "Judicial activism, where judges shape constitutional meaning expansively.", "isCorrect": false, "rationale": "Activism emphasizes judges' role in shaping law, not merely applying rules."}, {"text": "Judicial restraint, emphasizing deference to existing legal rules and limited judicial intervention.", "isCorrect": true, "rationale": "The 'umpire' metaphor, as the text uses it, illustrates judicial restraint: applying rules rather than creating them, consistent with deference to the elected branches."}, {"text": "Living constitutionalism, emphasizing evolving meaning.", "isCorrect": false, "rationale": "Living constitutionalism actively adapts meaning; the umpire metaphor is about applying existing rules."}, {"text": "The political-question doctrine.", "isCorrect": false, "rationale": "The political-question doctrine is a specific limit on justiciability, not a general 'umpire' stance on judging."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
