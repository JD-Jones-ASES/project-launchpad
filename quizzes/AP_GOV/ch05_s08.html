<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP U.S. Government and Politics &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Electing a President</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How many total electoral votes are at stake in a presidential election, and what is the minimum number required to win the presidency outright?", "options": [{"text": "435 total; 218 required", "isCorrect": false, "rationale": "435 is the size of the House of Representatives. The Electoral College has 538 votes."}, {"text": "538 total; 270 required", "isCorrect": true, "rationale": "The text states that the total number of electoral votes is 538, and a candidate must win at least 270 to become president."}, {"text": "538 total; 300 required", "isCorrect": false, "rationale": "A majority (270) is required, not 300."}, {"text": "100 total; 51 required", "isCorrect": false, "rationale": "That is the size and majority threshold of the Senate, not the Electoral College."}], "id": "q01"}, {"question": "Which of the following best describes what happens if no presidential candidate receives a majority of electoral votes?", "options": [{"text": "A national runoff election is held between the top two candidates.", "isCorrect": false, "rationale": "The Constitution does not call for a national runoff; the text describes House action instead."}, {"text": "The Senate selects the president, with each senator casting one vote.", "isCorrect": false, "rationale": "Historically the Senate selects the vice president in that situation; the text describes the House's role for the presidency."}, {"text": "The election is decided by the House of Representatives, with each state delegation casting one vote.", "isCorrect": true, "rationale": "The text states that if no candidate reaches 270, 'the election is decided by the House of Representatives, with each state delegation casting one vote.'"}, {"text": "The sitting president retains office until the next scheduled election.", "isCorrect": false, "rationale": "The text does not describe retention of the sitting president; the House chooses among the top candidates."}], "id": "q02"}, {"question": "Which of the following best describes the 'winner-take-all' rule in the Electoral College?", "options": [{"text": "In every state, the candidate receiving any vote at all wins all of that state's electoral votes.", "isCorrect": false, "rationale": "Winner-take-all requires the plurality of the popular vote, not 'any vote at all.'"}, {"text": "In 48 states and D.C., the candidate with the plurality of the state popular vote receives all of that state's electoral votes.", "isCorrect": true, "rationale": "The text states that in 48 states and the District of Columbia, the candidate who wins the plurality of the popular vote in that state receives all of its electoral votes."}, {"text": "Electoral votes are distributed proportionally to each candidate's vote share in all 50 states.", "isCorrect": false, "rationale": "Proportional allocation is not the standard U.S. rule; only Maine and Nebraska use a district-based system, and even that is not strict proportional allocation."}, {"text": "Each state's governor assigns electoral votes based on their own preference.", "isCorrect": false, "rationale": "Electoral votes are assigned based on voter results, not gubernatorial preference."}], "id": "q03"}, {"question": "Which two states are exceptions to the winner-take-all rule in the Electoral College?", "options": [{"text": "California and Texas", "isCorrect": false, "rationale": "California and Texas both use winner-take-all and are highlighted as safe blue and safe red states, respectively."}, {"text": "Florida and Ohio", "isCorrect": false, "rationale": "Both use winner-take-all; Ohio is a swing state and Florida is described as safe red in the cartogram."}, {"text": "Maine and Nebraska", "isCorrect": true, "rationale": "The text specifies that 'Only Maine and Nebraska use a district-based system, awarding two electoral votes to the statewide winner and one to the winner in each congressional district.'"}, {"text": "Wyoming and Alaska", "isCorrect": false, "rationale": "Wyoming and Alaska both use winner-take-all. The text classifies Wyoming as safe red."}], "id": "q04"}, {"question": "Which of the following best explains why presidential candidates focus heavily on swing states such as Pennsylvania and Michigan while largely ignoring states like California and Wyoming?", "options": [{"text": "The Constitution requires campaigning only in swing states.", "isCorrect": false, "rationale": "No constitutional provision mandates campaign geography; the behavior is driven by strategy, not law."}, {"text": "Winner-take-all rules give all of a state's electoral votes to the plurality winner, so competitive states are where marginal effort pays off; safe states are essentially predetermined.", "isCorrect": true, "rationale": "The text states that winner-take-all 'means that candidates focus their campaigns on swing states,' while states reliably Democratic or Republican receive less attention because outcomes are essentially predetermined."}, {"text": "Swing states are the only ones where voters are registered.", "isCorrect": false, "rationale": "Voter registration exists in every state, not only swing states."}, {"text": "The Twelfth Amendment requires campaigning only in swing states.", "isCorrect": false, "rationale": "The Twelfth Amendment concerns ballot procedures for president and vice president, not campaign geography."}], "id": "q05"}, {"question": "A state allows only registered party members to vote in its presidential primary. This is best described as which of the following?", "options": [{"text": "An open primary", "isCorrect": false, "rationale": "An open primary allows any registered voter to participate regardless of party affiliation."}, {"text": "A closed primary", "isCorrect": true, "rationale": "The text defines a closed primary as one that 'allows only registered party members to vote.'"}, {"text": "A caucus", "isCorrect": false, "rationale": "Caucuses are local meetings with public declarations, not secret-ballot primaries restricted by party registration alone."}, {"text": "A runoff election", "isCorrect": false, "rationale": "Runoffs are not how presidential primaries are categorized; the key distinction is open versus closed."}], "id": "q06"}, {"question": "Which of the following is NOT identified in the text as an argument against the Electoral College?", "options": [{"text": "The Electoral College can produce a president who loses the national popular vote, as in 2000 and 2016.", "isCorrect": false, "rationale": "The text lists this as a critique."}, {"text": "The Electoral College overrepresents small states.", "isCorrect": false, "rationale": "The text explicitly lists overrepresentation of small states as a critique."}, {"text": "Winner-take-all effectively disenfranchises millions of voters in non-competitive states.", "isCorrect": false, "rationale": "The text describes this disenfranchisement argument as a critique."}, {"text": "The Electoral College requires candidates to win the national popular vote to take office.", "isCorrect": true, "rationale": "The text makes the opposite point: under the Electoral College, a candidate can win the presidency without winning the national popular vote."}], "id": "q07"}, {"question": "Which of the following best describes a 'superdelegate' in the Democratic Party's presidential nomination process?", "options": [{"text": "A delegate pledged to the candidate winning the national popular vote.", "isCorrect": false, "rationale": "Superdelegates are not pledged to any candidate; they are free to support whomever they choose."}, {"text": "A party leader or elected official who can support any candidate regardless of primary results.", "isCorrect": true, "rationale": "The text defines superdelegates as party leaders and elected officials who are free to support any candidate regardless of primary results, though recent reforms have reduced their influence."}, {"text": "A voter who participates in both the primary and general election.", "isCorrect": false, "rationale": "That describes a general participant, not a superdelegate."}, {"text": "An unelected member of the Federal Election Commission.", "isCorrect": false, "rationale": "FEC commissioners are not delegates in nomination contests."}], "id": "q08"}, {"question": "Which of the following is most commonly identified as a reason that early-voting states like Iowa and New Hampshire have outsized influence in presidential primaries?", "options": [{"text": "They are the two largest states by population.", "isCorrect": false, "rationale": "Neither Iowa nor New Hampshire is among the largest states by population."}, {"text": "They generate disproportionate media attention and momentum because they come first on the primary calendar.", "isCorrect": true, "rationale": "The text says these early contests have outsized influence 'because of the media attention and momentum they generate.'"}, {"text": "They control the most electoral votes in the Electoral College.", "isCorrect": false, "rationale": "Electoral votes for these states are small; their influence comes from timing, not size."}, {"text": "Their state law requires other states to follow their results.", "isCorrect": false, "rationale": "No such legal requirement exists."}], "id": "q09"}, {"question": "Which of the following pairs of arguments most accurately reflects defenses of the Electoral College identified in the text?", "options": [{"text": "It preserves federalism and forces candidates to build geographically broad coalitions.", "isCorrect": true, "rationale": "The text identifies these two arguments as defenses: the Electoral College preserves federalism, forces candidates to build geographically broad coalitions, and protects the interests of smaller states."}, {"text": "It eliminates the need for candidates to campaign at all.", "isCorrect": false, "rationale": "The system intensifies campaign activity in swing states; it does not eliminate campaigning."}, {"text": "It ensures that the national popular-vote winner always becomes president.", "isCorrect": false, "rationale": "The text notes the opposite: the Electoral College can produce a president who loses the popular vote."}, {"text": "It gives Congress direct authority over presidential elections.", "isCorrect": false, "rationale": "Congress has only a contingency role if no candidate reaches 270; the Electoral College itself is designed to avoid direct congressional selection."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
