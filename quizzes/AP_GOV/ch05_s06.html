<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP U.S. Government and Politics &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Interest Groups Influencing Policymaking</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best describes an 'iron triangle' as defined in the text?", "options": [{"text": "A three-way alliance of the House, Senate, and president to pass major legislation.", "isCorrect": false, "rationale": "That describes the normal legislative process across branches, not the iron-triangle concept."}, {"text": "A mutually beneficial relationship among a congressional committee, a federal agency, and an interest group.", "isCorrect": true, "rationale": "The text defines iron triangles as mutually beneficial relationships among a congressional committee (or subcommittee), a federal agency, and an interest group, each providing something the others need."}, {"text": "A partnership between three federal agencies regulating the same industry.", "isCorrect": false, "rationale": "Iron triangles involve one agency, not three; the other two actors are a committee and an interest group."}, {"text": "A coalition of three separate interest groups lobbying Congress.", "isCorrect": false, "rationale": "An iron triangle has only one interest group as one of its three nodes, not a coalition of three."}]}, {"question": "A consumer advocacy group claims to benefit society as a whole rather than just its own members. Which of the following concepts does this best illustrate?", "options": [{"text": "The iron triangle", "isCorrect": false, "rationale": "Iron triangles describe policy-area relationships among committees, agencies, and groups, not the broad social benefit described here."}, {"text": "A public interest group", "isCorrect": true, "rationale": "The text defines public interest groups as those that 'advocate for policies they believe benefit society as a whole, not just their members.'"}, {"text": "An economic interest group", "isCorrect": false, "rationale": "Economic interest groups represent the material concerns of their members, not society as a whole."}, {"text": "A 501(c)(4) organization", "isCorrect": false, "rationale": "501(c)(4) is a tax classification; public interest group is the category of advocacy described here."}]}, {"question": "Which of the following best describes the 'free-rider problem' faced by public interest groups?", "options": [{"text": "Individuals can benefit from the group's achievements without contributing to the effort.", "isCorrect": true, "rationale": "The text states that public interest groups face the free-rider problem because 'individuals can benefit from the group's achievements without contributing to the effort.'"}, {"text": "Public interest groups receive free legal services from federal agencies.", "isCorrect": false, "rationale": "The text does not describe such a service; the free-rider problem concerns participation, not legal aid."}, {"text": "Members of Congress vote on legislation without reading bills.", "isCorrect": false, "rationale": "That is not the free-rider problem. Free riding concerns individuals enjoying public goods without paying costs."}, {"text": "Interest groups are permitted to lobby federal agencies without registering.", "isCorrect": false, "rationale": "Lobbying registration is a separate regulatory issue; the free-rider problem concerns collective-action dynamics."}]}, {"question": "The NAACP Legal Defense Fund's strategy in Brown v. Board of Education (1954) is cited in the text as a classic example of which interest-group strategy?", "options": [{"text": "Grassroots mobilization", "isCorrect": false, "rationale": "Grassroots mobilization involves activating ordinary citizens to contact officials, not pursuing a test case in court."}, {"text": "Litigation", "isCorrect": true, "rationale": "The text identifies litigation, including sponsoring test cases to establish favorable precedents, as the strategy exemplified by the NAACP Legal Defense Fund in Brown v. Board of Education."}, {"text": "Electioneering", "isCorrect": false, "rationale": "Electioneering involves activities aimed at influencing election outcomes, not Supreme Court precedent."}, {"text": "Astroturfing", "isCorrect": false, "rationale": "Astroturfing manufactures the appearance of grassroots support; it is not the strategy described here."}]}, {"question": "Which of the following best describes the 'revolving door' concern in lobbying, according to the text?", "options": [{"text": "The rapid turnover of elected officials due to term limits.", "isCorrect": false, "rationale": "The text does not use 'revolving door' to refer to term limits."}, {"text": "The movement of individuals between government positions and lobbying jobs, which raises conflict-of-interest concerns.", "isCorrect": true, "rationale": "The text defines the revolving door as the movement of individuals between government positions and lobbying jobs, noting it raises concerns about conflicts of interest."}, {"text": "Lobbyists who rotate between multiple clients on the same issue.", "isCorrect": false, "rationale": "That describes diversified lobbying work, not the revolving door concept."}, {"text": "Members of Congress who switch parties after losing an election.", "isCorrect": false, "rationale": "Party switching is not the revolving door described in the text."}]}, {"question": "Which of the following is an example of 'astroturfing' as described in the text?", "options": [{"text": "Ordinary citizens spontaneously organize to petition their representative.", "isCorrect": false, "rationale": "Genuine grassroots activity is the opposite of astroturfing."}, {"text": "A wealthy interest funds a public-relations campaign designed to appear as a spontaneous citizens' movement.", "isCorrect": true, "rationale": "The text defines astroturfing as creating the appearance of grassroots support through manufactured campaigns funded by wealthy interests."}, {"text": "An interest group files an amicus brief in a pending court case.", "isCorrect": false, "rationale": "That is litigation, not astroturfing."}, {"text": "A PAC donates directly to a candidate's campaign.", "isCorrect": false, "rationale": "Direct contributions are electioneering, not astroturfing."}]}, {"question": "Which of the following best distinguishes 'issue networks' from 'iron triangles'?", "options": [{"text": "Issue networks are limited to one agency; iron triangles include many.", "isCorrect": false, "rationale": "The text presents the opposite: iron triangles are closed three-way arrangements while issue networks are broader."}, {"text": "Issue networks are broader, more fluid collections of experts, advocates, journalists, academics, and officials; iron triangles are closed three-way arrangements.", "isCorrect": true, "rationale": "The text describes issue networks as broader, more fluid, and more open than iron triangles, which are closed three-way mutual-benefit arrangements."}, {"text": "Issue networks are constitutionally required; iron triangles are not.", "isCorrect": false, "rationale": "Neither is constitutionally required; both are features of policymaking."}, {"text": "Issue networks operate only in state government; iron triangles only in federal government.", "isCorrect": false, "rationale": "The text does not draw a state-federal distinction between these concepts."}]}, {"question": "Which of the following scenarios best illustrates an iron triangle in defense policy, as described in the text?", "options": [{"text": "The House Armed Services Committee, the Department of Defense, and defense contractors sustaining high military spending through reciprocal support.", "isCorrect": true, "rationale": "The text gives this exact example: the House Armed Services Committee, the Department of Defense, and defense contractors sustaining high military spending in a three-way cycle."}, {"text": "The Supreme Court, the Department of Defense, and the president of the United States reviewing military strategy.", "isCorrect": false, "rationale": "Iron triangles connect committees, agencies, and interest groups, not branches of government."}, {"text": "Two major political parties coordinating defense spending during budget negotiations.", "isCorrect": false, "rationale": "Iron triangles are not party-to-party negotiations."}, {"text": "The United Nations, NATO, and the Department of Defense coordinating foreign policy.", "isCorrect": false, "rationale": "International organizations are not part of the iron triangle concept."}]}, {"question": "A professional association such as the American Medical Association is best classified as which type of interest group?", "options": [{"text": "Ideological group", "isCorrect": false, "rationale": "Ideological groups promote a broad political philosophy (like the ACLU or Heritage Foundation), not issues specific to one profession."}, {"text": "Economic interest group (a professional association)", "isCorrect": true, "rationale": "The text classifies professional associations, including the American Medical Association, as economic interest groups that lobby on issues specific to their professions."}, {"text": "Governmental interest group", "isCorrect": false, "rationale": "Governmental interest groups (intergovernmental lobbies) represent state and local governments, not private professionals."}, {"text": "Single-issue group", "isCorrect": false, "rationale": "Single-issue groups focus on one narrow policy area, like the NRA on gun rights. Professional associations address a broader set of issues tied to their professions."}]}, {"question": "Which of the following best captures the critique the text raises against iron triangles?", "options": [{"text": "They ensure that policy experts have no voice in government.", "isCorrect": false, "rationale": "The text notes that issue networks, not iron triangles, bring in broader expert voices; the critique of iron triangles is not about excluding expertise in this way."}, {"text": "They create self-reinforcing relationships that make policy change from outside the triangle extremely difficult.", "isCorrect": true, "rationale": "The text states that the three-way exchange in an iron triangle can become self-reinforcing, 'making policy change from the outside extremely difficult.'"}, {"text": "They are unconstitutional under the Tenth Amendment.", "isCorrect": false, "rationale": "The text does not describe iron triangles as unconstitutional; they are an observation about policymaking dynamics."}, {"text": "They cause interest groups to lose access to congressional committees.", "isCorrect": false, "rationale": "Iron triangles grant interest groups significant access; losing access is the opposite of what the triangle produces."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
