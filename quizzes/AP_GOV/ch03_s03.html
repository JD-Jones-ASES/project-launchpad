    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Freedom of Religion</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The First Amendment contains two religion clauses. Which statement best describes how they work together?", "options": [{"text": "The Establishment Clause guarantees religious exercise while the Free Exercise Clause forbids government endorsement of religion.", "isCorrect": false, "rationale": "The clauses are reversed. Establishment bars endorsement; Free Exercise protects practice."}, {"text": "Both clauses prohibit any government regulation that affects religion in any way.", "isCorrect": false, "rationale": "The text explicitly states government may regulate religiously motivated conduct if the regulation is neutral and generally applicable—religion is not immune from all regulation."}, {"text": "The Establishment Clause bars government from promoting religion, while the Free Exercise Clause bars government from prohibiting religious practice.", "isCorrect": true, "rationale": "The section explains that together, the two clauses create 'a dual guarantee: the government may neither promote nor prohibit religious belief and practice.'"}, {"text": "The Free Exercise Clause applies only to federal action; the Establishment Clause applies only to state action.", "isCorrect": false, "rationale": "Both clauses have been incorporated against the states through the Fourteenth Amendment and apply to all levels of government."}]}, {"question": "A state legislature enacts a law providing public funds to buy religious textbooks used in parochial school religion classes. A citizen challenges the law. Under the Lemon test from Lemon v. Kurtzman (1971), which question would lead most directly to striking it down?", "options": [{"text": "Whether the law has a purpose that is popular with a majority of voters.", "isCorrect": false, "rationale": "Popular support is not part of the Lemon test; Lemon asks about secular purpose, effect, and entanglement."}, {"text": "Whether the law's primary effect neither advances nor inhibits religion.", "isCorrect": true, "rationale": "The text lists three Lemon prongs. Funding religious textbooks for religion classes would likely fail the 'primary effect' prong because the primary effect would advance religion."}, {"text": "Whether the law creates new taxes on religious institutions.", "isCorrect": false, "rationale": "Taxation on religious institutions is not one of Lemon's three prongs."}, {"text": "Whether the law was passed during a legislative session that included prayer.", "isCorrect": false, "rationale": "The circumstances of a session's opening prayer are irrelevant to the Lemon test's substantive questions about purpose, effect, and entanglement."}]}, {"question": "In Engel v. Vitale (1962), New York's Board of Regents had composed a nondenominational prayer and recommended that public schools recite it daily; participation was voluntary. Why did the Court still find an Establishment Clause violation?", "options": [{"text": "Because the prayer endorsed a specific denomination.", "isCorrect": false, "rationale": "The prayer was expressly nondenominational; denominational neutrality was NOT enough to save it."}, {"text": "Because the government composed and promoted the prayer, and the school setting made voluntariness illusory for young students.", "isCorrect": true, "rationale": "Justice Black reasoned 'it is no part of the business of government to compose official prayers' and the section says 'The coercive pressure of the school environment made the voluntary nature illusory for young students.'"}, {"text": "Because the prayer was too short to qualify as meaningful religious expression.", "isCorrect": false, "rationale": "The length of the prayer is irrelevant to the Court's Establishment Clause analysis."}, {"text": "Because the state permitted students of all religions to participate.", "isCorrect": false, "rationale": "Inclusive participation does not resolve the Establishment Clause issue; government composition and promotion of the prayer was the problem."}]}, {"question": "Wisconsin v. Yoder (1972) held that Wisconsin could not compel Amish parents to send their children to public school past the eighth grade. Which of the following best explains the Court's reasoning?", "options": [{"text": "The Court held that all compulsory education laws violate the Free Exercise Clause.", "isCorrect": false, "rationale": "The Court did not invalidate compulsory education generally; it carved out a narrow exemption for the Amish based on their specific circumstances."}, {"text": "The Court ruled that states may never regulate any religious practice.", "isCorrect": false, "rationale": "States can regulate practice under neutral, generally applicable laws (per Employment Division v. Smith); Yoder did not establish absolute Free Exercise protection."}, {"text": "The Court balanced the state's education interest against the Amish community's sincere religious beliefs and 300-year history, finding the state's interest insufficient.", "isCorrect": true, "rationale": "The section says the Court 'balanced the state's interest in universal education against the Amish community's 300-year history of self-sufficient, law-abiding living' and found one or two additional years of formal education would not serve a compelling state interest."}, {"text": "The Court found that Wisconsin's law discriminated on the basis of denomination.", "isCorrect": false, "rationale": "The law was generally applicable and neutral; the Court's concern was the substantial burden on the Amish, not denominational discrimination."}]}, {"question": "In Employment Division v. Smith (1990), the Supreme Court held that the Free Exercise Clause does NOT exempt individuals from:", "options": [{"text": "Laws specifically targeting a religious group.", "isCorrect": false, "rationale": "Laws targeting a specific religious group are subject to heightened scrutiny; Smith addressed GENERALLY APPLICABLE laws, not discriminatory ones."}, {"text": "Laws that are neutral and generally applicable.", "isCorrect": true, "rationale": "The text states: 'In Employment Division v. Smith (1990), the Supreme Court held that the Free Exercise Clause does not exempt individuals from neutral, generally applicable laws.'"}, {"text": "Any law that burdens religion in any way.", "isCorrect": false, "rationale": "This is an absolute rule Smith did not announce; the Court addressed a specific category—neutral, generally applicable laws."}, {"text": "Tax laws of any kind.", "isCorrect": false, "rationale": "The text does not frame Smith's holding in terms of tax law; it addresses generally applicable laws broadly."}]}, {"question": "Which federal statute did Congress enact in response to Employment Division v. Smith, and what did it require?", "options": [{"text": "The USA PATRIOT Act, which expanded religious surveillance authority.", "isCorrect": false, "rationale": "The PATRIOT Act concerns anti-terrorism surveillance, not religious exercise protections."}, {"text": "The Religious Freedom Restoration Act (1993), requiring the government to show a compelling interest before substantially burdening religious exercise.", "isCorrect": true, "rationale": "The text states: 'Congress responded by passing the Religious Freedom Restoration Act (RFRA, 1993), which requires the government to demonstrate a compelling interest before substantially burdening religious exercise.'"}, {"text": "The Defense of Religion Act, which granted absolute immunity to religious organizations.", "isCorrect": false, "rationale": "No such statute is mentioned in the section; the named statute is RFRA."}, {"text": "The First Amendment Restoration Act, which restored prayer in public schools.", "isCorrect": false, "rationale": "No such statute is mentioned in the section, and Engel v. Vitale's ban on state-composed school prayer remains standing."}]}, {"question": "A state law prohibits anyone from ingesting peyote as a controlled substance, regardless of religious practice. A Native American church member is denied unemployment benefits after being fired for religious peyote use. Based on the doctrine described in the section as applied before RFRA, the state's action:", "options": [{"text": "Automatically violates the Free Exercise Clause, since it burdens religious practice.", "isCorrect": false, "rationale": "Under Smith, neutral and generally applicable laws do not automatically violate Free Exercise even when they burden religious practice."}, {"text": "Likely survives Free Exercise challenge if the drug law is neutral and generally applicable.", "isCorrect": true, "rationale": "This scenario mirrors Smith. The section explains Smith held Free Exercise does not exempt religious actors from neutral, generally applicable laws."}, {"text": "Always violates the Establishment Clause, because it disadvantages a religion.", "isCorrect": false, "rationale": "The Establishment Clause governs government promotion of religion, not incidental burdens on religious practice. This is a Free Exercise question."}, {"text": "Fails strict scrutiny because religious practice is always a fundamental right.", "isCorrect": false, "rationale": "Smith held strict scrutiny does NOT automatically apply to neutral, generally applicable laws, even when religious practice is incidentally burdened."}]}, {"question": "The section notes that in Kennedy v. Bremerton School District (2022) the Court signaled a shift away from the Lemon test. What did it emphasize instead?", "options": [{"text": "Popular referendum results and elected officials' views on religion.", "isCorrect": false, "rationale": "The text does not mention popular referendums; it describes a doctrinal shift based on judicial standards, not political votes."}, {"text": "Historical practices and the coercion standard.", "isCorrect": true, "rationale": "The text explicitly says Kennedy v. Bremerton 'signaled a shift away from the Lemon test, emphasizing historical practices and the coercion standard.'"}, {"text": "A new four-part 'balancing' test that combined Lemon with the Miller test.", "isCorrect": false, "rationale": "No such combined test is described; the Miller test concerns obscenity under the First Amendment's speech clause, not religion."}, {"text": "A return to the 'separate but equal' doctrine of religious accommodation.", "isCorrect": false, "rationale": "'Separate but equal' was a Fourteenth Amendment segregation doctrine, unrelated to Establishment Clause analysis."}]}, {"question": "Which statement best distinguishes the Establishment Clause from the Free Exercise Clause?", "options": [{"text": "The Establishment Clause applies only to Christianity; the Free Exercise Clause applies to all religions.", "isCorrect": false, "rationale": "Neither clause is limited to a specific religion; both apply to all religions."}, {"text": "The Establishment Clause limits government endorsement of religion; the Free Exercise Clause protects individuals from government interference with their religious practice.", "isCorrect": true, "rationale": "The section states the Establishment Clause 'bars the government from endorsing, sponsoring, or financially supporting religion' and the Free Exercise Clause 'protects the right of individuals to practice their religion without government interference.'"}, {"text": "Both clauses prohibit the government from regulating any aspect of religious life.", "isCorrect": false, "rationale": "Neutral, generally applicable regulation of conduct is permissible under Smith; both clauses have limits."}, {"text": "The Establishment Clause protects only individuals; the Free Exercise Clause protects only institutions.", "isCorrect": false, "rationale": "Both clauses protect individuals; institutional protection is not the distinguishing line."}]}, {"question": "According to the section, the Free Exercise Clause protects religious BELIEF absolutely. How is the protection of religious PRACTICE different?", "options": [{"text": "Religious practice receives no protection at all.", "isCorrect": false, "rationale": "The text does not say practice is unprotected; it says practice may be regulated by neutral, generally applicable laws but is otherwise protected."}, {"text": "Religious practice is also absolutely protected from any regulation.", "isCorrect": false, "rationale": "Only BELIEF is described as absolutely protected. Practice is subject to neutral, generally applicable regulations."}, {"text": "Practice may be regulated if the law is neutral and generally applicable, even when the regulation is religiously motivated conduct.", "isCorrect": true, "rationale": "The text states: 'The government may regulate conduct, even religiously motivated conduct, if the regulation is neutral and generally applicable,' distinguishing the treatment of practice from the absolute protection of belief."}, {"text": "Practice is protected only if the religion is recognized by federal law.", "isCorrect": false, "rationale": "The Free Exercise Clause does not turn on federal recognition of religions; no such gatekeeping mechanism is described."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
