<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP U.S. Government and Politics &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Political Socialization</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A political scientist studies two siblings raised in the same household. Both parents are highly politically engaged and frequently discuss candidates and issues at family meals. As adults, both siblings share their parents' party identification. Which agent of political socialization most directly accounts for this outcome?", "options": [{"text": "Peers, because siblings reinforce each other's views.", "isCorrect": false, "rationale": "While peers matter, the scenario emphasizes the parental household environment rather than outside peer groups. The text identifies family — especially engaged families — as the dominant force here."}, {"text": "Family, because it is the most powerful agent of political socialization, particularly when the household is politically engaged.", "isCorrect": true, "rationale": "The text states family is 'the single most powerful agent' and that 'the strength of parental influence depends on how politically engaged the household is,' matching the scenario."}, {"text": "Media, because both children likely consumed similar content.", "isCorrect": false, "rationale": "The scenario specifies active family political discussion as the primary socializing force, not media consumption."}, {"text": "Religion, because family and religion are interchangeable socializing agents.", "isCorrect": false, "rationale": "The text treats religion and family as distinct agents, and religion is not mentioned in the scenario."}]}, {"question": "A college freshman arrives on campus after growing up in a conservative rural community. By senior year, her views on several social issues have shifted to be more liberal. Which socialization dynamic best explains this change?", "options": [{"text": "A generational effect, because her entire generation shifted to the left during her college years.", "isCorrect": false, "rationale": "A generational effect involves a shared historical event shaping a whole cohort, not an individual college experience. This scenario describes a peer-driven change."}, {"text": "A lifecycle effect, because people always become more liberal as they age.", "isCorrect": false, "rationale": "The text actually suggests the opposite lifecycle tendency: older Americans often become more conservative on economic issues. Lifecycle effects also don't specifically track college socialization."}, {"text": "Peer influence exposing her to diverse perspectives, combined with higher education's correlation with greater political participation and tolerance.", "isCorrect": true, "rationale": "The text explicitly notes that college students may adopt views different from their parents as they encounter diverse perspectives and that higher education is correlated with greater tolerance for dissent."}, {"text": "Family influence weakening because her parents stopped being politically active.", "isCorrect": false, "rationale": "The scenario does not mention any change in parental engagement; it identifies the college peer environment as the new influence."}]}, {"question": "The gender gap in American politics is typically reported as a difference of:", "options": [{"text": "30 to 40 percentage points in presidential elections.", "isCorrect": false, "rationale": "The text specifies 5 to 10 percentage points, not 30 to 40. A gap that large would be described as enormous rather than persistent but modest."}, {"text": "5 to 10 percentage points in presidential elections.", "isCorrect": true, "rationale": "The text states the gap is 'typically 5 to 10 percentage points in presidential elections' — not enormous, but persistent and politically significant."}, {"text": "Near zero, since men and women now vote identically.", "isCorrect": false, "rationale": "The text describes the gap as persistent since the 1980s and politically significant, not near zero."}, {"text": "A gap that varies wildly from election to election with no reliable pattern.", "isCorrect": false, "rationale": "The text specifically describes the gap as 'consistent' and 'persistent,' not erratic."}]}, {"question": "An analyst observes that Americans born between 1928 and 1945 are unusually supportive of Social Security and the social safety net compared with younger generations. Which socialization concept best explains this pattern?", "options": [{"text": "Lifecycle effect, because older people always favor larger government.", "isCorrect": false, "rationale": "The text suggests older Americans often become more conservative on economic issues with age, which would contradict rather than explain this support pattern."}, {"text": "Generational effect, because the Silent Generation came of age during the Great Depression and New Deal, developing loyalty to those institutions.", "isCorrect": true, "rationale": "The text directly states that the Silent Generation 'developed strong institutional loyalty, respect for authority, and support for the social safety net programs created during the New Deal era.'"}, {"text": "Selective exposure, because they only consume pro-government media.", "isCorrect": false, "rationale": "Selective exposure is a media concept about choosing confirmatory information, not an explanation tied to a specific generation's formative experiences."}, {"text": "Peer effects from their college classmates.", "isCorrect": false, "rationale": "The text locates this generation's distinctive views in shared historical events (Depression, WWII), not peer-group dynamics in college."}]}, {"question": "A media researcher reports: \"Americans increasingly consume news that confirms their existing views and avoid sources that challenge them.\" Which concept best describes this behavior?", "options": [{"text": "Generational effect.", "isCorrect": false, "rationale": "A generational effect concerns how shared historical events shape cohorts, not individual media choices."}, {"text": "Selective exposure.", "isCorrect": true, "rationale": "The text defines selective exposure as people seeking out sources that confirm existing beliefs, which 'can reinforce rather than challenge political attitudes.'"}, {"text": "Gender gap.", "isCorrect": false, "rationale": "The gender gap refers to differences in political attitudes between men and women, not to media consumption patterns."}, {"text": "Political realignment.", "isCorrect": false, "rationale": "Realignment is about durable shifts in party coalitions, discussed in the next section — unrelated to individual media behavior."}]}, {"question": "Consider the following hypothetical survey data from voters aged 65 and older:\n\nIssue | % Supporting Conservative Position\nLower capital gains taxes | 62%\nReducing government spending | 58%\nOpposing inheritance taxes | 65%\n\nBased on the text's discussion of lifecycle effects, which conclusion is best supported?", "options": [{"text": "Older Americans became conservative because of a shared generational event like the Great Depression.", "isCorrect": false, "rationale": "The Great Depression would be a generational effect tied to one cohort, not the aging-related lifecycle pattern these data suggest across economic issues related to accumulated wealth."}, {"text": "The data are consistent with lifecycle effects: older Americans may become more conservative on economic issues as they accumulate wealth and pay more taxes.", "isCorrect": true, "rationale": "The text explicitly describes this lifecycle pattern: 'Older Americans... may become more conservative on economic issues as they accumulate wealth and pay more taxes,' which fits tax-and-spending-focused data."}, {"text": "Older voters are influenced entirely by media selective exposure.", "isCorrect": false, "rationale": "Selective exposure is possible but is not the concept the text uses to explain age-related economic conservatism; that is the lifecycle effect."}, {"text": "These data disprove the existence of a gender gap.", "isCorrect": false, "rationale": "The data are not disaggregated by gender, so they cannot disprove or prove a gender gap."}]}, {"question": "Which pairing of religious group and political tendency is consistent with the text's description of religion as an agent of political socialization?", "options": [{"text": "Evangelical Protestants lean conservative; religiously unaffiliated Americans lean liberal on social issues.", "isCorrect": true, "rationale": "The text states evangelicals 'tend to align with conservative positions' and religiously unaffiliated Americans 'lean liberal on social issues.'"}, {"text": "Black Protestant churches have historically supported Republican candidates.", "isCorrect": false, "rationale": "The text states Black Protestant churches 'have historically supported Democratic candidates and civil rights causes.'"}, {"text": "Religiously unaffiliated Americans lean conservative on social issues.", "isCorrect": false, "rationale": "The text says the opposite: religiously unaffiliated Americans lean liberal on social issues."}, {"text": "All religious groups have identical political tendencies in the United States.", "isCorrect": false, "rationale": "The text documents distinct tendencies across evangelicals, Black Protestants, Catholics, and the unaffiliated, directly contradicting uniformity."}]}, {"question": "A student argues that the September 11 attacks reshaped attitudes on national security and civil liberties across an entire generation of Americans. This argument is an example of which socialization concept?", "options": [{"text": "A lifecycle effect.", "isCorrect": false, "rationale": "Lifecycle effects change with age regardless of historical context; the scenario invokes a specific shared event."}, {"text": "The influence of major life events producing a generational effect.", "isCorrect": true, "rationale": "The text identifies September 11 specifically as an example of a major event reshaping attitudes and describes generational effects as occurring when 'a shared historical experience shapes the political attitudes of an entire age cohort.'"}, {"text": "A peer effect isolated to college campuses.", "isCorrect": false, "rationale": "Peer effects are small-group dynamics, not nationwide attitudinal shifts from a singular event."}, {"text": "Selective exposure to media coverage.", "isCorrect": false, "rationale": "Selective exposure is about choosing confirming information, not about how an event directly reshapes public opinion."}]}, {"question": "A civics teacher assigns reading on the Bill of Rights, leads the Pledge of Allegiance, and enforces classroom rules. According to the text, which form of political socialization is occurring?", "options": [{"text": "Only explicit socialization through civics content.", "isCorrect": false, "rationale": "The text notes education socializes both explicitly and implicitly; limiting the answer to explicit content misses the structural component."}, {"text": "Both explicit socialization (civics content, Pledge) and implicit socialization (rule-following, accepting institutional authority).", "isCorrect": true, "rationale": "The text states schools socialize 'in both explicit and implicit ways,' listing civics courses and the Pledge alongside structural learning about following rules and accepting institutional authority."}, {"text": "A lifecycle effect, because students age while in school.", "isCorrect": false, "rationale": "Lifecycle effects describe attitudinal shifts with aging generally, not the specific explicit/implicit instruction occurring in schools."}, {"text": "Only implicit socialization, since explicit instruction has no effect on political attitudes.", "isCorrect": false, "rationale": "The text identifies both forms as operative; explicit civics instruction is specifically named as transmitting knowledge about government."}]}, {"question": "Which of the following best explains why the gender gap, despite being only 5-10 percentage points, is described as \"politically significant\"?", "options": [{"text": "Because it reflects inherent ideological differences between men and women.", "isCorrect": false, "rationale": "The text explicitly rejects this: the gap 'reflects differences in economic vulnerability, social roles, and life experiences rather than any inherent ideological difference.'"}, {"text": "Because it is persistent across multiple elections and issue areas, and even a 5-10 point difference can determine outcomes in competitive races.", "isCorrect": true, "rationale": "The text describes the gap as 'persistent and politically significant' and ties it to consistent differences in party support and issue priorities since the 1980s."}, {"text": "Because it completely reverses every four years.", "isCorrect": false, "rationale": "The text describes the gap as stable since the 1980s, not reversing."}, {"text": "Because women vote at lower rates, amplifying the gap's effect.", "isCorrect": false, "rationale": "The text does not claim women vote at lower rates; the gap refers to differences in preferences among those who do vote, and women actually vote at similar or higher rates than men in most elections."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
