<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP U.S. Government and Politics &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Changes in Ideology</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The following data are from Pew Research Center's study of ideological consistency (scores range from $-$1 most liberal to +1 most conservative):\n\nYear | Median Democrat | Median Republican\n1994 | $-$0.03 | +0.04\n2017 | $-$0.13 | +0.17\n\nWhich conclusion is best supported by these data?", "options": [{"text": "Both parties have become more moderate over time.", "isCorrect": false, "rationale": "Both medians have moved further from zero (the center), not toward it — the opposite of moderation."}, {"text": "The ideological distance between the median Democrat and median Republican has grown substantially, consistent with partisan polarization.", "isCorrect": true, "rationale": "In 1994, the distance was 0.07; by 2017, it was 0.30 — a more than fourfold increase. The text explicitly identifies this trend as polarization."}, {"text": "Democrats have become more conservative while Republicans have become more liberal.", "isCorrect": false, "rationale": "The data show the opposite: Democrats moved from $-$0.03 to $-$0.13 (more liberal) and Republicans moved from +0.04 to +0.17 (more conservative)."}, {"text": "Only the Republican Party has shifted ideologically.", "isCorrect": false, "rationale": "Both parties' medians moved from near-center values to more ideologically extreme positions; the Democratic shift is smaller but clearly present."}]}, {"question": "Which definition best captures \"realignment\" as presented in the text?", "options": [{"text": "A short-term swing in voter preferences that reverses at the next election.", "isCorrect": false, "rationale": "The text describes realignment as 'significant, lasting' and typically following a critical election — not short-term."}, {"text": "A significant, lasting shift in the electoral coalition of one or both major parties.", "isCorrect": true, "rationale": "This quotes the text's definition almost directly: 'a significant, lasting shift in the electoral coalition of one or both major parties.'"}, {"text": "Voters simply disengaging from party politics and calling themselves independents.", "isCorrect": false, "rationale": "That describes dealignment, which the text distinguishes as a 'related but distinct phenomenon' from realignment."}, {"text": "A temporary increase in polarization after a critical election.", "isCorrect": false, "rationale": "Realignment is durable coalition change, not a temporary effect or a polarization measure per se."}]}, {"question": "A historian writes: \"Before the 1960s, many Southern Democrats were more conservative than Northern Republicans; today, almost all conservatives are Republicans and almost all liberals are Democrats.\" This statement best describes:", "options": [{"text": "The decline of partisan media.", "isCorrect": false, "rationale": "Partisan media has increased, not declined, and is not what the description captures — this is about party sorting."}, {"text": "The ideological sorting of the parties resulting from the Southern realignment and broader polarization.", "isCorrect": true, "rationale": "The text describes exactly this process: 'The Democratic Party became more uniformly liberal, while the Republican Party became more uniformly conservative' as regional diversity faded."}, {"text": "Dealignment.", "isCorrect": false, "rationale": "Dealignment involves voters leaving parties altogether, not ideological sorting within them."}, {"text": "A shift toward bipartisanship within both parties.", "isCorrect": false, "rationale": "The text describes the opposite trend — intra-party ideological uniformity has grown while bipartisan overlap has declined."}]}, {"question": "Which factor is NOT identified in the text as a cause of polarization?", "options": [{"text": "Partisan media that allows selective exposure.", "isCorrect": false, "rationale": "The text explicitly lists partisan media: 'Cable news, talk radio, and social media allow people to consume only information that reinforces their existing views.'"}, {"text": "Geographic sorting into politically homogeneous communities.", "isCorrect": false, "rationale": "The text cites geographic sorting: Americans 'increasingly live in communities where most neighbors share their political orientation.'"}, {"text": "A federal law mandating that parties adopt extreme positions.", "isCorrect": true, "rationale": "No such law exists or is mentioned in the text. Polarization arises from voluntary and structural dynamics, not legal mandate."}, {"text": "Congressional redistricting that creates safe seats.", "isCorrect": false, "rationale": "The text explicitly lists gerrymandered districts as a cause: 'Gerrymandered districts create safe seats where the real contest is the primary... further rewarding ideological purity.'"}]}, {"question": "How did the civil rights movement contribute to the Southern realignment, according to the text?", "options": [{"text": "It led Southern whites to support the Democratic Party more strongly than ever before.", "isCorrect": false, "rationale": "The text describes the opposite — Southern whites migrated away from the Democratic Party after civil rights legislation."}, {"text": "By prompting the Civil Rights Act and Voting Rights Act under a Democratic president, it led many white Southern voters to feel abandoned by the Democratic Party, while Republican strategists pursued a Southern Strategy.", "isCorrect": true, "rationale": "The text lays out exactly this sequence: Johnson signed the landmark acts, 'many white Southern voters felt abandoned,' and Nixon's advisers pursued the Southern Strategy."}, {"text": "It caused African American voters to leave the Democratic Party.", "isCorrect": false, "rationale": "The text states African American voters 'consolidated behind Democrats,' the opposite of leaving."}, {"text": "It pushed the Republican Party to become the party of Reconstruction-era civil rights.", "isCorrect": false, "rationale": "The text describes Republicans pursuing an appeal to racial conservatives in this era, not a return to Reconstruction-era advocacy."}]}, {"question": "An analyst observes that primary elections tend to produce more ideologically extreme nominees than general elections. What mechanism does the text give to explain this pattern?", "options": [{"text": "Primary voters tend to be more ideologically extreme than general election voters, so candidates adopt more partisan positions to win nominations.", "isCorrect": true, "rationale": "The text states this directly: 'Because primary voters tend to be more ideologically extreme than general election voters, candidates face incentives to adopt more partisan positions to win their party's nomination.'"}, {"text": "Primary elections are held in the summer, when moderate voters are on vacation.", "isCorrect": false, "rationale": "The text offers no such explanation — the mechanism is about the ideological composition of primary voters, not timing."}, {"text": "Partisan media require candidates to adopt extreme positions by law.", "isCorrect": false, "rationale": "There is no legal requirement, and partisan media is listed separately as a cause."}, {"text": "Primary voters are chosen randomly by the parties.", "isCorrect": false, "rationale": "Primary voters are self-selected citizens, not randomly chosen. The text's mechanism turns on their self-selected ideological character."}]}, {"question": "A pollster reports that 42% of Americans now identify as independents, up from 30% two decades ago — yet over 75% of these independents consistently vote for one party. Which concept best describes this pattern?", "options": [{"text": "Realignment in favor of a third party.", "isCorrect": false, "rationale": "No third-party consolidation is occurring; these voters still vote for one of the two major parties."}, {"text": "Dealignment, modified by the observation that many 'independents' are actually 'leaners' who consistently vote for one party.", "isCorrect": true, "rationale": "The text defines dealignment as voters disengaging from party labels and explicitly notes many independents 'consistently vote for the same party and are better described as leaners.'"}, {"text": "Polarization of the Democratic and Republican electorates.", "isCorrect": false, "rationale": "Polarization is about growing ideological distance between parties, not about changes in party identification per se."}, {"text": "A critical election producing a durable new coalition.", "isCorrect": false, "rationale": "Nothing in the scenario describes a realigning election; the pattern shown is dealignment with persistent partisan voting behavior."}]}, {"question": "Which example best fits the text's definition of a \"critical election\"?", "options": [{"text": "A midterm election with unusually low turnout.", "isCorrect": false, "rationale": "Low turnout does not define a critical election. The text ties critical elections to durable coalition change, not turnout."}, {"text": "A presidential contest that reveals a new, durable pattern of party loyalty and reshapes future coalitions.", "isCorrect": true, "rationale": "The text defines a critical election as 'a contest that reveals a new, durable pattern of party loyalty.'"}, {"text": "Any election decided by fewer than 5,000 votes.", "isCorrect": false, "rationale": "Narrow margins do not define critical elections; the defining feature is durable realignment of coalitions."}, {"text": "An election determined entirely by polling data.", "isCorrect": false, "rationale": "This is not the text's definition; critical elections are defined by their structural effect on coalitions, not by polling influence."}]}, {"question": "Before the 1960s, the Democratic Party's electoral coalition is described as the \"New Deal coalition.\" Which grouping best matches this coalition as described in the text?", "options": [{"text": "Southern whites only.", "isCorrect": false, "rationale": "Southern whites were part of the coalition, but the text names several additional groups."}, {"text": "Southern whites, Northern labor unions, urban ethnic groups, African Americans, and progressive intellectuals.", "isCorrect": true, "rationale": "The text lists these exact components: 'a partnership of Southern whites, Northern labor unions, urban ethnic groups, African Americans, and progressive intellectuals.'"}, {"text": "Evangelical Protestants and rural voters.", "isCorrect": false, "rationale": "The text does not include evangelicals as a New Deal coalition group; their political alignment is discussed elsewhere in Topic 4.2."}, {"text": "Only African American voters.", "isCorrect": false, "rationale": "African Americans were one component of the coalition, not its entirety."}]}, {"question": "A political strategist argues that safe congressional districts contribute to polarization even when candidates might personally prefer moderate positions. Which mechanism from the text best supports this argument?", "options": [{"text": "In safe seats, the real electoral contest is the primary rather than the general election, so candidates face incentives to emphasize ideological purity.", "isCorrect": true, "rationale": "The text states: 'Gerrymandered districts create safe seats where the real contest is the primary, not the general election, further rewarding ideological purity.'"}, {"text": "Candidates in safe seats must appeal to the median general-election voter.", "isCorrect": false, "rationale": "The text describes the opposite: safe seats de-emphasize the general-election median voter and elevate primary voters."}, {"text": "Safe seats increase voter turnout in the general election, forcing candidates toward the center.", "isCorrect": false, "rationale": "Higher turnout is not identified as a feature of safe seats, nor would it push toward the center in the text's analysis."}, {"text": "Safe districts eliminate primary elections altogether.", "isCorrect": false, "rationale": "Safe districts still have primaries — in fact, the text emphasizes that primaries become the decisive contest."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
