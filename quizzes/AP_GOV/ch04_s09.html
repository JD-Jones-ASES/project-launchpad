<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP U.S. Government and Politics &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Ideology and Economic Policy</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A senator argues that cutting income tax rates for high earners and businesses will expand production, lead to more hiring, and eventually generate higher wages for everyone. Which economic theory best describes this argument?", "options": [{"text": "Keynesian (demand-side) economics.", "isCorrect": false, "rationale": "Keynesian economics focuses on stimulating consumer demand, not on tax cuts for high earners and businesses as the primary engine."}, {"text": "Supply-side economics (sometimes called trickle-down economics).", "isCorrect": true, "rationale": "The text defines supply-side economics as reducing taxes on businesses and high-income earners, arguing that expanded production, hiring, and wealth creation will follow. It's most closely associated with Republican policy."}, {"text": "Regressive taxation.", "isCorrect": false, "rationale": "Regressive taxation describes tax burdens on income, not a theory about how to stimulate growth."}, {"text": "Progressive taxation.", "isCorrect": false, "rationale": "Progressive taxation is a structure of tax rates. The senator is making an argument about tax cuts, which is a policy choice, not the definition of progressive taxation."}]}, {"question": "During a recession, a governor advocates for direct stimulus payments to households, expanded unemployment benefits, and infrastructure investment to boost consumer demand. This approach most closely reflects:", "options": [{"text": "Supply-side economics.", "isCorrect": false, "rationale": "Supply-side economics focuses on producers via tax cuts and deregulation, not on direct spending to boost consumer demand."}, {"text": "Keynesian (demand-side) economics, associated more closely with liberal and Democratic policy.", "isCorrect": true, "rationale": "The text defines Keynesian economics as holding that growth is driven by consumer demand and as supporting 'stimulus checks, infrastructure projects, unemployment benefits' during recessions."}, {"text": "Balanced-budget conservatism.", "isCorrect": false, "rationale": "Balanced-budget conservatism would oppose stimulus spending that increases deficits. The approach described is the opposite."}, {"text": "Regressive taxation.", "isCorrect": false, "rationale": "This is a tax structure concept, not a stimulus theory."}]}, {"question": "Consider the following hypothetical rates in a proposed tax system:\n\nAnnual Income | Tax Rate\n$30,000 | 10%\n$100,000 | 10%\n$500,000 | 10%\n$5,000,000 | 10%\n\nWhich term from the text best describes this system?", "options": [{"text": "Progressive tax.", "isCorrect": false, "rationale": "A progressive tax applies higher rates to higher incomes. This system applies the same rate to all."}, {"text": "Flat tax.", "isCorrect": true, "rationale": "The text defines a flat tax as applying the same rate to all income levels, exactly as shown here."}, {"text": "Regressive tax.", "isCorrect": false, "rationale": "A regressive tax takes a LARGER percentage from lower earners. A flat percentage on income is not mechanically regressive, though critics argue it has regressive effects in practice."}, {"text": "Payroll tax.", "isCorrect": false, "rationale": "The payroll tax is a specific tax for Social Security and Medicare with a cap, not a general structure like this system."}]}, {"question": "Which of the following most clearly illustrates a regressive tax as defined in the text?", "options": [{"text": "Federal income tax, which applies higher rates at higher income levels.", "isCorrect": false, "rationale": "Federal income tax is progressive, not regressive — the text cites it as the example of a progressive tax."}, {"text": "A state sales tax of 7% on all taxable goods, which low-income families pay on a larger share of their income than high-income families.", "isCorrect": true, "rationale": "The text uses exactly this example: 'Sales taxes are regressive because everyone pays the same rate, but lower-income families spend a larger share of their income on taxable goods.'"}, {"text": "A wealth tax on estates over $11 million.", "isCorrect": false, "rationale": "An estate or wealth tax on very large estates is progressive, not regressive."}, {"text": "A capital gains tax on stock sales.", "isCorrect": false, "rationale": "Capital gains taxes generally have tiered rates and are paid mostly by higher-income households; the text does not describe them as regressive."}]}, {"question": "The text presents the following breakdown of the federal budget (FY 2023):\n\nCategory | % of Total\nSocial Security | 21%\nMedicare | 13%\nMedicaid | 10%\nOther mandatory | 16%\nDefense | 13%\nNon-defense discretionary | 14%\nNet interest on debt | 10%\n\nWhich conclusion is best supported by these data?", "options": [{"text": "Discretionary spending accounts for the majority of the federal budget.", "isCorrect": false, "rationale": "Discretionary spending (Defense + Non-defense discretionary = 27%) is less than half the budget; mandatory spending (60%) plus net interest (10%) consume most of it."}, {"text": "Mandatory spending (Social Security + Medicare + Medicaid + Other mandatory = 60%), plus net interest, consumes 70% of the federal budget, meaning cuts to discretionary alone cannot balance the budget.", "isCorrect": true, "rationale": "Summing the mandatory categories (21+13+10+16=60%) plus net interest (10%) yields 70%, which the text uses to argue that discretionary-only cuts are insufficient to close the deficit."}, {"text": "Net interest on the debt is a trivial part of the budget and not a concern for either party.", "isCorrect": false, "rationale": "The text says exactly the opposite: net interest is 10% and represents 'a growing concern for policymakers of both parties.'"}, {"text": "Defense is the largest single category.", "isCorrect": false, "rationale": "Social Security (21%) exceeds Defense (13%), making Social Security the largest single category."}]}, {"question": "Which statement best describes the difference between the federal deficit and the national debt, as defined in the text?", "options": [{"text": "They are the same thing.", "isCorrect": false, "rationale": "The text treats them as distinct: the deficit is annual, while the debt is cumulative."}, {"text": "The deficit is the annual difference between government spending and revenue; the national debt is the accumulated total of all past deficits (minus any surpluses).", "isCorrect": true, "rationale": "The text gives these exact definitions."}, {"text": "The deficit applies only to state governments; the national debt applies only to the federal government.", "isCorrect": false, "rationale": "The text discusses deficits and debt at the federal level — both terms apply to federal spending."}, {"text": "The deficit is inflation, while the debt is recession.", "isCorrect": false, "rationale": "Neither term refers to inflation or recession."}]}, {"question": "The text argues that both parties have contributed to the growth of the national debt. Which explanation does the text give for this shared responsibility?", "options": [{"text": "Both parties always support identical fiscal policies.", "isCorrect": false, "rationale": "The text describes distinct fiscal priorities: Republican tax cuts and Democratic spending programs. Identical policies is not the explanation."}, {"text": "Republican tax cuts tend to reduce revenue, and Democratic spending programs tend to increase outlays — both dynamics expand the gap between revenue and spending.", "isCorrect": true, "rationale": "The text states: 'Republican tax cuts reduce revenue, and Democratic spending programs increase outlays,' so each party's preferred policies contribute to deficits."}, {"text": "Only one party is actually responsible for the debt.", "isCorrect": false, "rationale": "The text explicitly argues both parties have contributed."}, {"text": "The Federal Reserve controls all federal spending and taxes.", "isCorrect": false, "rationale": "The Federal Reserve controls monetary policy, not taxing and spending decisions — those belong to Congress and the President."}]}, {"question": "Conservatives generally argue that economic regulation imposes costs on businesses, slows growth, and stifles innovation. Liberals generally counter that regulation corrects market failures. Which example best fits the liberal case for regulation as defined in the text?", "options": [{"text": "Requiring the Environmental Protection Agency to enforce clean-air standards that the market alone would not produce.", "isCorrect": true, "rationale": "The text cites the EPA as an example of regulation that 'corrects market failures — situations where the free market produces harmful outcomes such as pollution, unsafe products, or financial fraud.'"}, {"text": "Eliminating the EPA and OSHA entirely.", "isCorrect": false, "rationale": "This describes deregulation, the conservative position."}, {"text": "Reducing corporate tax rates.", "isCorrect": false, "rationale": "Tax policy is separate from regulation, and lower corporate taxes is generally a conservative supply-side position."}, {"text": "Outlawing all private business activity.", "isCorrect": false, "rationale": "The text describes liberal regulation as correcting market failures, not abolishing markets."}]}, {"question": "According to the text, the debate between liberals and conservatives over regulation is rarely about whether regulation should exist at all. What is the actual focus of the disagreement?", "options": [{"text": "Whether the government should exist.", "isCorrect": false, "rationale": "The text does not frame the debate as one about the existence of government itself."}, {"text": "How much regulation is appropriate and who should bear the costs.", "isCorrect": true, "rationale": "The text says directly: 'The disagreement is about how much regulation is appropriate and who should bear the costs.'"}, {"text": "Whether fraud should be legal.", "isCorrect": false, "rationale": "The text notes that even committed free-market advocates accept laws against fraud, so this is not the disagreement."}, {"text": "Whether any basic safety standards should exist.", "isCorrect": false, "rationale": "The text states that even free-market advocates typically accept basic safety standards."}]}, {"question": "A pragmatic economist says, \"Most actual U.S. economic policy represents a blend of supply-side and Keynesian approaches.\" Which evidence in the text best supports this statement?", "options": [{"text": "Supply-side tax cuts have always produced surpluses, so no blending is needed.", "isCorrect": false, "rationale": "The text says supply-side tax cuts have 'sometimes spurred growth but have also increased budget deficits,' not that they always produce surpluses."}, {"text": "Neither approach has proven universally correct — supply-side has sometimes spurred growth but increased deficits; Keynesian stimulus has helped end recessions but raised concerns about debt and inflation.", "isCorrect": true, "rationale": "The text states exactly this, concluding that 'most actual economic policy represents a pragmatic blend of both approaches.'"}, {"text": "Keynesian policies are always rejected by both parties.", "isCorrect": false, "rationale": "The text describes Keynesianism as associated with Democratic policy and as historically influential. Both parties have used elements of each approach."}, {"text": "Economists have proven one approach is wrong.", "isCorrect": false, "rationale": "The text says neither approach has proven universally correct; it does not claim one has been proven wrong."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
