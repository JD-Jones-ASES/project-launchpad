        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Right to Privacy</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The section notes that the word 'privacy' does NOT appear in the text of the Constitution. How, then, did the Supreme Court recognize a constitutional right to privacy in Griswold v. Connecticut (1965)?", "options": [{"text": "By finding that the Fourteenth Amendment explicitly lists a right to privacy.", "isCorrect": false, "rationale": "The Fourteenth Amendment does not list 'privacy' explicitly; the word is absent from the constitutional text."}, {"text": "By identifying 'penumbras' of privacy that 'emanate' from the First, Third, Fourth, Fifth, and Ninth Amendments.", "isCorrect": true, "rationale": "The text says Justice Douglas found 'zones of privacy created by the \"emanations\" of several specific guarantees,' listing the First, Third, Fourth, Fifth, and Ninth Amendments."}, {"text": "By relying on the Tenth Amendment's reservation of powers.", "isCorrect": false, "rationale": "The Tenth Amendment reserves powers, not individual rights. It was not the basis of the penumbral privacy doctrine in Griswold."}, {"text": "By applying the Commerce Clause to household affairs.", "isCorrect": false, "rationale": "The Commerce Clause addresses interstate commerce, not private intimate decisions."}], "id": "q01"}, {"question": "The section defines a 'penumbra' as:", "options": [{"text": "An enumerated constitutional right.", "isCorrect": false, "rationale": "A penumbra is precisely the OPPOSITE of an enumerated right—it is an implied right derived from emanations of enumerated ones."}, {"text": "An implied right derived from the 'emanations' of explicitly stated constitutional protections.", "isCorrect": true, "rationale": "The text states: 'A penumbra is an implied right derived from the \"emanations\" of explicitly stated constitutional protections.'"}, {"text": "A provision repealed by the Fourteenth Amendment.", "isCorrect": false, "rationale": "The Fourteenth Amendment did not repeal any provision; a penumbra is not related to repeal."}, {"text": "A federal statute expanding Bill of Rights protections.", "isCorrect": false, "rationale": "A penumbra is a judicial-interpretive doctrine about constitutional text, not a statutory expansion."}], "id": "q02"}, {"question": "Roe v. Wade (1973) established a trimester framework balancing a woman's privacy interest against the state's interests in maternal health and potential life. Which statement accurately captures the original framework?", "options": [{"text": "The state could ban abortion in all three trimesters once viability was reached.", "isCorrect": false, "rationale": "The original trimester framework allowed abortion regulations to become stricter across trimesters, not an across-the-board ban."}, {"text": "In the first trimester the decision was left to the woman and physician; in the second the state could regulate to protect maternal health; after viability, the state could prohibit abortion except to preserve life or health of the mother.", "isCorrect": true, "rationale": "The text describes this as the Roe trimester framework, with progressively greater state interests across the three phases."}, {"text": "The state had no interest in regulating abortion at any time.", "isCorrect": false, "rationale": "The text says the right 'is not absolute and must be balanced against legitimate state interests,' rejecting absolute non-regulation."}, {"text": "The Court held that abortion was protected only under the Equal Protection Clause.", "isCorrect": false, "rationale": "Roe grounded the right in privacy/personal liberty under the Fourteenth Amendment, not equal protection."}], "id": "q03"}, {"question": "In Dobbs v. Jackson Women's Health Organization (2022), the Supreme Court:", "options": [{"text": "Reaffirmed Roe v. Wade and extended its protections.", "isCorrect": false, "rationale": "Dobbs did the opposite; the Court overruled Roe and Casey."}, {"text": "Overruled Roe and Casey, holding that the Constitution does not confer a right to abortion, and returned the authority to regulate abortion to the states.", "isCorrect": true, "rationale": "The text states: 'In Dobbs... the Supreme Court overruled both Roe and Casey, holding that the Constitution does not confer a right to abortion. The decision returned the authority to regulate abortion to the states.'"}, {"text": "Replaced the trimester framework with the 'undue burden' test.", "isCorrect": false, "rationale": "The undue burden test was introduced in Planned Parenthood v. Casey (1992), not Dobbs."}, {"text": "Transferred regulation of abortion to the federal government only.", "isCorrect": false, "rationale": "The text says Dobbs 'returned the authority to regulate abortion to the states,' not to the federal government."}], "id": "q04"}, {"question": "Why, according to the section, does Roe v. Wade remain a REQUIRED case for AP Government even though Dobbs overturned it?", "options": [{"text": "Because the specific holding of Roe is still binding in federal courts.", "isCorrect": false, "rationale": "Roe's specific holding has been overturned. What remains important is the principle it illustrates about unenumerated rights."}, {"text": "Because it illustrates the constitutional principle of unenumerated rights derived from the right to privacy.", "isCorrect": true, "rationale": "The text states: 'Roe remains a required case for AP Government because it illustrates the constitutional principle of unenumerated rights derived from the right to privacy, even though its specific holding has been overturned.'"}, {"text": "Because Roe was ratified as a constitutional amendment.", "isCorrect": false, "rationale": "Roe was a Supreme Court decision, not a constitutional amendment."}, {"text": "Because Dobbs only affected federal law, not state courts.", "isCorrect": false, "rationale": "Dobbs overturned Roe's federal constitutional holding and returned regulation to the states, which is a substantive change, not a federal-only effect."}], "id": "q05"}, {"question": "Police arrest a suspect and seize his smartphone incident to the arrest. Without a warrant, they browse the phone's contents for evidence. Under Riley v. California (2014), this action is:", "options": [{"text": "Constitutional, because any item on the person at arrest is searchable without a warrant.", "isCorrect": false, "rationale": "Riley specifically rejected this reasoning for cell phones, recognizing the special privacy interests they carry."}, {"text": "Unconstitutional, because the Court unanimously held that police must obtain a warrant before searching a cell phone's digital contents.", "isCorrect": true, "rationale": "The text states: 'In Riley v. California (2014), the Court unanimously held that police must obtain a warrant before searching the digital contents of a cell phone seized during an arrest, recognizing that cell phones contain \"the privacies of life.\"'"}, {"text": "Constitutional, because Carpenter v. United States authorized all digital searches.", "isCorrect": false, "rationale": "Carpenter addressed cell-site location records and required a warrant—it did not authorize all digital searches."}, {"text": "Unconstitutional, but only if the phone is encrypted.", "isCorrect": false, "rationale": "Riley requires a warrant regardless of encryption status."}], "id": "q06"}, {"question": "The 'third-party doctrine' mentioned in the section traditionally holds that:", "options": [{"text": "Individuals retain full privacy interests in information shared with third parties.", "isCorrect": false, "rationale": "This reverses the doctrine. The traditional third-party doctrine says no privacy interest attaches to voluntarily shared information."}, {"text": "Individuals have no reasonable expectation of privacy in information voluntarily shared with others.", "isCorrect": true, "rationale": "The text states: 'The traditional \"third-party doctrine\" holds that individuals have no reasonable expectation of privacy in information voluntarily shared with others.'"}, {"text": "Third parties may share all private information with the government.", "isCorrect": false, "rationale": "The third-party doctrine addresses what the government may access, not third-party conduct directly."}, {"text": "Only information held in a safety deposit box is protected by the Fourth Amendment.", "isCorrect": false, "rationale": "The third-party doctrine is a broader principle about privacy expectations, not a rule limited to safety deposit boxes."}], "id": "q07"}, {"question": "Which case BEGAN to limit the third-party doctrine, according to the section?", "options": [{"text": "Griswold v. Connecticut (1965).", "isCorrect": false, "rationale": "Griswold concerned contraceptive use by married couples and established the penumbral right to privacy; it did not address the third-party doctrine."}, {"text": "Carpenter v. United States (2018).", "isCorrect": true, "rationale": "The text states 'Carpenter began to limit this [third-party] doctrine' by requiring a warrant for historical cell-site location data held by wireless carriers."}, {"text": "Roe v. Wade (1973).", "isCorrect": false, "rationale": "Roe addressed reproductive autonomy under the privacy doctrine, not the third-party doctrine."}, {"text": "Dobbs v. Jackson Women's Health Organization (2022).", "isCorrect": false, "rationale": "Dobbs addressed abortion rights, not the third-party doctrine."}], "id": "q08"}, {"question": "The section identifies several different constitutional groundings the Griswold Justices offered for the right to privacy. Which pair correctly matches a Justice to the source he or she relied on?", "options": [{"text": "Justice Goldberg relied on the Commerce Clause.", "isCorrect": false, "rationale": "The text says Goldberg grounded privacy in the Ninth Amendment, not the Commerce Clause."}, {"text": "Justice Goldberg relied on the Ninth Amendment; Justices Harlan and White relied on substantive due process under the Fourteenth Amendment.", "isCorrect": true, "rationale": "The text states: 'Other justices grounded the right to privacy in the Ninth Amendment (Justice Goldberg) or in the concept of substantive due process under the Fourteenth Amendment (Justices Harlan and White).'"}, {"text": "Justice Douglas relied on the Tenth Amendment.", "isCorrect": false, "rationale": "Douglas relied on penumbras emanating from several enumerated rights (First, Third, Fourth, Fifth, Ninth), not the Tenth Amendment."}, {"text": "All Justices unanimously grounded the right in the Second Amendment.", "isCorrect": false, "rationale": "The Second Amendment concerns bearing arms, and Justices differed in their grounding of privacy—they were not unanimous about the source."}], "id": "q09"}, {"question": "The 'undue burden' standard from Planned Parenthood v. Casey (1992) replaced what earlier framework from Roe v. Wade (1973)?", "options": [{"text": "The trimester framework.", "isCorrect": true, "rationale": "The text says 'The trimester framework was later replaced by the \"undue burden\" standard in Planned Parenthood v. Casey (1992).'"}, {"text": "The clear and present danger test.", "isCorrect": false, "rationale": "Clear and present danger was a First Amendment speech standard from Schenck v. United States (1919), not a Roe v. Wade framework."}, {"text": "The Miranda warnings requirement.", "isCorrect": false, "rationale": "Miranda warnings are a Fifth Amendment self-incrimination protection, unrelated to Roe's abortion framework."}, {"text": "The rational basis test.", "isCorrect": false, "rationale": "Rational basis is an equal protection tier, not the Roe framework replaced by Casey."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
