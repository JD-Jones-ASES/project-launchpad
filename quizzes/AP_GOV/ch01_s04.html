    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Challenges of the Articles of Confederation</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Article II of the Articles of Confederation declares that 'Each state retains its sovereignty, freedom, and independence, and every power not by this Confederation expressly delegated to the United States, in Congress assembled.' Which aspect of the confederation's design does this language most directly establish?", "options": [{"text": "The supremacy of national law over state law", "isCorrect": false, "rationale": "Article II does the opposite — it strictly limits national authority in favor of state sovereignty; national supremacy is not established until the Constitution."}, {"text": "The primacy of state sovereignty, with national authority limited to powers expressly delegated", "isCorrect": true, "rationale": "The text notes Article II 'makes clear that the states, not the national government, held primary authority' and that 'expressly delegated' 'sharply limited national power.'"}, {"text": "The president's authority to enforce national laws in the states", "isCorrect": false, "rationale": "The Articles established no executive branch, so they could not grant the president enforcement authority."}, {"text": "The Supreme Court's power of judicial review", "isCorrect": false, "rationale": "The Articles created no judicial branch; judicial review was established later under the Constitution."}]}, {"question": "According to the text, what structural feature of the Articles of Confederation made effective fiscal management essentially impossible?", "options": [{"text": "A requirement that taxes be collected in paper currency only", "isCorrect": false, "rationale": "The text does not describe such a requirement for national taxation; it says the issue was the lack of national taxing authority."}, {"text": "Congress had no direct power to tax; it could only request funds from the states, which routinely ignored or underfunded the requests.", "isCorrect": true, "rationale": "The text states 'Congress could request funds from the states, but it had no authority to compel payment. States routinely ignored or underfunded these requisitions.'"}, {"text": "The Supreme Court repeatedly struck down national tax laws.", "isCorrect": false, "rationale": "No national judiciary existed under the Articles; courts did not strike anything down."}, {"text": "A balanced-budget amendment prohibited national borrowing.", "isCorrect": false, "rationale": "No such constitutional provision existed under the Articles."}]}, {"question": "Imagine that in 1785, merchants in New Jersey must pay a New York tariff when shipping goods to New York City, while Connecticut imposes its own duty on the same goods passing through. According to the text, this scenario most directly reflects which weakness of the Articles?", "options": [{"text": "The lack of congressional authority to regulate interstate commerce, which allowed each state to impose its own tariffs", "isCorrect": true, "rationale": "The text states 'Each state could impose its own tariffs, trade restrictions, and commercial regulations' and gives the exact New York / New Jersey / Connecticut example."}, {"text": "An executive veto that blocked uniform trade rules", "isCorrect": false, "rationale": "The Articles had no executive, so no veto existed."}, {"text": "A judicial ruling that reserved commerce to the states", "isCorrect": false, "rationale": "No national judiciary issued any such ruling under the Articles."}, {"text": "A unanimous-consent requirement for declaring war on other states", "isCorrect": false, "rationale": "While unanimity was required to amend the Articles, the scenario describes trade, not war declarations."}]}, {"question": "Under the Articles of Confederation, how many states had to approve an amendment, and why did this prove problematic?", "options": [{"text": "Nine of thirteen; it was too easily met, leading to frequent amendments", "isCorrect": false, "rationale": "Nine states was the threshold for passing ordinary legislation, not amendments, and the Articles were almost never amended."}, {"text": "All thirteen states; any single state could block reforms supported by the other twelve, making amendments nearly impossible.", "isCorrect": true, "rationale": "The text states 'Any change to the Articles required the approval of all thirteen state legislatures. A single state could block reforms this made the Articles virtually impossible to amend.'"}, {"text": "A simple majority of states; it was too easy, so amendments proliferated", "isCorrect": false, "rationale": "A simple majority was not the amendment threshold, and the text says amendments almost never succeeded."}, {"text": "Two-thirds of Congress plus three-fourths of the states, as in the Constitution", "isCorrect": false, "rationale": "This is the U.S. Constitution's Article V standard, not the Articles of Confederation's standard."}]}, {"question": "Daniel Shays led an armed uprising in western Massachusetts in 1786–1787 that the national government was unable to suppress. According to the text, what does this episode most directly demonstrate about the Articles?", "options": [{"text": "The national government's total authority over state militias", "isCorrect": false, "rationale": "The text says precisely the opposite: 'Congress could not raise an army without state cooperation, and most states refused to contribute troops.'"}, {"text": "The national government's impotence in responding to domestic crises", "isCorrect": true, "rationale": "The text states the rebellion 'exposed the national government's impotence in dramatic fashion' because Congress could not raise an army without state cooperation."}, {"text": "The success of unanimous consent in resolving rebellion", "isCorrect": false, "rationale": "Unanimous consent rules governed amendments; they did not resolve the rebellion, which was suppressed by a privately funded Massachusetts militia."}, {"text": "The effectiveness of the federal judiciary in suppressing insurrection", "isCorrect": false, "rationale": "No federal judiciary existed under the Articles."}]}, {"question": "George Washington wrote that the events in Massachusetts showed 'there are combustibles in every State, which a spark might set fire to.' Based on the text, how did this sentiment contribute to subsequent political action?", "options": [{"text": "It inspired a national referendum to dissolve Congress.", "isCorrect": false, "rationale": "No such referendum occurred; the text describes a call for a constitutional convention, not a referendum."}, {"text": "It added urgency to calls for a constitutional convention to strengthen the national government.", "isCorrect": true, "rationale": "The text states Shays' Rebellion 'lent urgency to calls for a constitutional convention to strengthen the national government.'"}, {"text": "It caused Washington to propose a return to British rule.", "isCorrect": false, "rationale": "The text does not support this; Washington was a leader of the independence movement."}, {"text": "It led Congress to abolish state legislatures.", "isCorrect": false, "rationale": "State legislatures were not abolished; instead, the push was for a stronger national government alongside continuing state institutions."}]}, {"question": "According to the text, how did the mandate of the 1787 Philadelphia Convention compare to what the delegates actually did?", "options": [{"text": "The mandate was to abolish Congress, but delegates kept it intact.", "isCorrect": false, "rationale": "The mandate authorized 'revising the Articles of Confederation,' not abolishing Congress."}, {"text": "The mandate was to revise the Articles, but the delegates set them aside and drafted an entirely new framework.", "isCorrect": true, "rationale": "The text states the convention was called 'for the sole and express purpose of revising the Articles' but that delegates 'set aside the Articles entirely and begun drafting an entirely new framework.'"}, {"text": "The mandate was to ratify independence, but delegates drafted a trade treaty.", "isCorrect": false, "rationale": "Independence had already been declared in 1776; the convention addressed governance, not trade treaties."}, {"text": "The mandate was to write a new Constitution, which delegates rejected in favor of keeping the Articles.", "isCorrect": false, "rationale": "This reverses the actual events; the delegates replaced, not preserved, the Articles."}]}, {"question": "Which of the following best captures the 'Key Concept' the text draws from the failure of the Articles of Confederation?", "options": [{"text": "A weak national government is always preferable to a strong one.", "isCorrect": false, "rationale": "The Key Concept argues the opposite — the resulting system was 'too weak to govern effectively.'"}, {"text": "Government must be strong enough to function while remaining limited enough to protect liberty.", "isCorrect": true, "rationale": "The Key Concept box states exactly this: 'government must be strong enough to function while remaining limited enough to protect liberty.'"}, {"text": "Direct democracy should replace representative government at the national level.", "isCorrect": false, "rationale": "The text does not offer this as a lesson; the Founders moved toward strengthened representative government."}, {"text": "The states should unilaterally determine all national policy.", "isCorrect": false, "rationale": "The whole lesson of the Articles, the text argues, is that leaving all authority to states produced ineffective governance."}]}, {"question": "The 'Discussion Prompt' in the section asks students to compare Article II of the Articles of Confederation with the Tenth Amendment. Which textual change does the prompt highlight as reflecting a deliberate shift in the balance of power?", "options": [{"text": "The Tenth Amendment added the word 'expressly' to further limit federal power.", "isCorrect": false, "rationale": "The prompt notes the opposite — the Tenth Amendment omits the word 'expressly.'"}, {"text": "The Tenth Amendment omits the word 'expressly' that appeared in Article II, giving the national government implied powers in addition to enumerated ones.", "isCorrect": true, "rationale": "The prompt asks about 'the omission of the word expressly in the Tenth Amendment,' which allowed for broader federal authority, e.g., implied powers established in McCulloch v. Maryland."}, {"text": "The Tenth Amendment replaced 'sovereignty' with 'liberty.'", "isCorrect": false, "rationale": "The prompt focuses on the word 'expressly,' not this substitution."}, {"text": "The Tenth Amendment eliminated state sovereignty entirely.", "isCorrect": false, "rationale": "The Tenth Amendment preserves state reserved powers; it does not eliminate state sovereignty."}]}, {"question": "A student claims that 'the Articles of Confederation failed because the Founders did not trust the people with self-government.' Based on the text, how should this claim be evaluated?", "options": [{"text": "It is correct; the Articles concentrated power in an elite class.", "isCorrect": false, "rationale": "The Articles were structured around state sovereignty, not elite concentration; this reading does not match the text."}, {"text": "It is incorrect; the Articles failed because the revolutionary generation deeply distrusted central authority, not the people, and thus created a national government too weak to function.", "isCorrect": true, "rationale": "The text says the Articles 'reflected the revolutionary generation's deep distrust of centralized authority' after fighting the British Crown, and that the government was 'deliberately weak by design.'"}, {"text": "It is correct; the Articles banned popular participation.", "isCorrect": false, "rationale": "The Articles did not ban popular participation; state legislatures chose delegates and states retained sovereignty."}, {"text": "It is incorrect; the Articles actually gave the national government unlimited power.", "isCorrect": false, "rationale": "The opposite is true — national power was sharply limited, leading to the collapse of the system."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
