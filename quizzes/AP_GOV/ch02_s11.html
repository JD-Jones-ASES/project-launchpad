    <link rel="stylesheet" href="../../styles.css">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Checks on the Judicial Branch</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which historical example best illustrates a CONSTITUTIONAL AMENDMENT overriding a Supreme Court decision?", "options": [{"text": "The 13th Amendment (1865) overruled the Dred Scott decision (1857), which had held that enslaved people were not citizens.", "isCorrect": true, "rationale": "The text specifically lists the 13th Amendment as overruling Dred Scott through the amendment process — the most definitive check on judicial power."}, {"text": "The Civil Rights Act of 1991 overruled several 1989 Supreme Court decisions.", "isCorrect": false, "rationale": "That is an example of STATUTORY OVERRIDE, not a constitutional amendment — the Act is ordinary legislation."}, {"text": "The Pendleton Act overruled Marbury v. Madison.", "isCorrect": false, "rationale": "The Pendleton Act (1883) reformed the civil service; it had no connection to Marbury."}, {"text": "The 22nd Amendment overruled Brown v. Board of Education.", "isCorrect": false, "rationale": "The 22nd Amendment is about presidential term limits, entirely unrelated to Brown."}], "id": "q01"}, {"question": "After the Supreme Court narrowed employment discrimination protections in several 1989 decisions, Congress passed the Civil Rights Act of 1991. What type of check does this illustrate?", "options": [{"text": "Court packing.", "isCorrect": false, "rationale": "Court packing involves changing the number of justices; the Civil Rights Act of 1991 did not alter the Court's composition."}, {"text": "Statutory override — Congress changed the statute's language to restore the broader interpretations the Court had narrowed.", "isCorrect": true, "rationale": "The text explicitly describes this as statutory override: when the Court interprets a federal statute, Congress can pass new legislation changing the statutory language, as it did with the Civil Rights Act of 1991."}, {"text": "Jurisdiction stripping.", "isCorrect": false, "rationale": "Jurisdiction stripping removes cases from federal court review entirely; the 1991 Act instead modified substantive statutory language."}, {"text": "Impeachment of the justices who wrote the decisions.", "isCorrect": false, "rationale": "No justices were impeached over those decisions; the response was legislative."}], "id": "q02"}, {"question": "President Franklin D. Roosevelt's 1937 court-packing plan proposed adding one new justice for every sitting justice over age 70. Which outcome best describes the plan's legacy?", "options": [{"text": "The plan succeeded, and the Court now has 15 justices.", "isCorrect": false, "rationale": "The plan was defeated in Congress; the Court remained at nine justices."}, {"text": "The plan was defeated, but the Court subsequently shifted jurisprudence toward New Deal legislation — sometimes called 'the switch in time that saved nine.'", "isCorrect": true, "rationale": "The text recounts this outcome exactly: the plan was 'defeated in Congress, though the Court subsequently shifted its jurisprudence…sometimes called the switch in time that saved nine.'"}, {"text": "Court packing was declared unconstitutional by the Supreme Court in 1937.", "isCorrect": false, "rationale": "The number of justices is set by statute; the plan was not struck down by the Court."}, {"text": "Roosevelt was impeached for proposing the plan.", "isCorrect": false, "rationale": "Roosevelt was not impeached; the plan was simply defeated through the legislative process."}], "id": "q03"}, {"question": "A litigant wants to challenge a federal statute she dislikes. She has not been affected by it and has suffered no concrete harm. Which judicial self-restraint doctrine will likely bar her suit?", "options": [{"text": "Stare decisis.", "isCorrect": false, "rationale": "Stare decisis governs precedent, not threshold requirements to bring a case."}, {"text": "Mootness.", "isCorrect": false, "rationale": "Mootness bars cases where the controversy has been resolved; here the problem is that she has no personal stake, not that the issue is resolved."}, {"text": "Standing — she must demonstrate a concrete, personal injury to bring the case.", "isCorrect": true, "rationale": "The text defines standing as the requirement that plaintiffs 'demonstrate a concrete, personal injury'; they cannot challenge a law merely because they disagree with it."}, {"text": "The rule of four.", "isCorrect": false, "rationale": "The rule of four is about granting certiorari at the Supreme Court, not about whether a litigant can file a case at all."}], "id": "q04"}, {"question": "A federal court is asked to rule on whether the president properly conducted foreign negotiations with a hostile regime. The court declines to decide, saying the question is committed to the other branches. Which doctrine did the court invoke?", "options": [{"text": "The political-question doctrine.", "isCorrect": true, "rationale": "The text defines this doctrine as courts declining to rule on questions 'committed to the other branches (e.g., the conduct of foreign affairs, the impeachment process).'"}, {"text": "Strict scrutiny.", "isCorrect": false, "rationale": "Strict scrutiny is a test applied in equal-protection and fundamental-rights cases, not a basis for refusing to hear a case."}, {"text": "Jurisdiction stripping.", "isCorrect": false, "rationale": "Jurisdiction stripping is an ACT of Congress, not a doctrine courts themselves apply."}, {"text": "The case or controversy requirement.", "isCorrect": false, "rationale": "That requirement bars advisory opinions, but the scenario describes an active dispute; the issue is that resolution is committed to another branch — classic political-question territory."}], "id": "q05"}, {"question": "Congress passes a law removing a category of cases from Supreme Court review, citing Article III, Section 2. Which check on the judiciary is Congress exercising?", "options": [{"text": "Court packing.", "isCorrect": false, "rationale": "Court packing changes the number of justices; this scenario describes removing categories of cases from federal review — jurisdiction stripping."}, {"text": "Jurisdiction stripping.", "isCorrect": true, "rationale": "The text explains Article III, Section 2 permits Congress to regulate the Supreme Court's appellate jurisdiction 'with such Exceptions, and under such Regulations as the Congress shall make' — known as jurisdiction stripping."}, {"text": "The political-question doctrine.", "isCorrect": false, "rationale": "That is a judicial self-restraint doctrine, not a legislative check."}, {"text": "Senatorial courtesy.", "isCorrect": false, "rationale": "Senatorial courtesy is an informal tradition in the nomination of district court judges, unrelated to jurisdictional limits."}], "id": "q06"}, {"question": "Why has impeachment historically been a weak check on Supreme Court justices, according to the text?", "options": [{"text": "Because no Supreme Court justice has ever been successfully removed, and the one impeached justice (Samuel Chase, 1804) was acquitted, establishing a norm that judges should not be removed for their opinions.", "isCorrect": true, "rationale": "The text states these exact facts: 15 lower judges impeached, 8 removed, but 'no Supreme Court justice has ever been successfully removed,' and Chase's 1804 acquittal 'established an important norm.'"}, {"text": "Because the Constitution does not permit impeachment of judges.", "isCorrect": false, "rationale": "The Constitution does permit impeachment of judges for high crimes and misdemeanors; the weakness is in historical practice, not in constitutional authority."}, {"text": "Because Supreme Court justices cannot be impeached for high crimes and misdemeanors.", "isCorrect": false, "rationale": "Justices can be impeached on that constitutional standard — historically, however, they have not been removed."}, {"text": "Because life tenure explicitly forbids removal.", "isCorrect": false, "rationale": "Life tenure means 'during good Behaviour,' which allows impeachment; it does not forbid removal entirely."}], "id": "q07"}, {"question": "Beyond formal powers, why does the text describe presidential 'enforcement discretion' as a meaningful check on the judiciary?", "options": [{"text": "Because courts have no independent means to enforce their decisions, so compliance ultimately depends on executive action.", "isCorrect": true, "rationale": "The text states 'the judiciary has no independent means of enforcing its decisions' — making executive implementation essential even when outright defiance is rare."}, {"text": "Because the president has unilateral power to overrule Supreme Court decisions at will.", "isCorrect": false, "rationale": "Presidents cannot legally overrule Court decisions; their discretion is more subtle — how vigorously they implement and enforce rulings."}, {"text": "Because the Constitution grants the president judicial review.", "isCorrect": false, "rationale": "Judicial review belongs to the courts; the president's role is enforcement, not interpretation."}, {"text": "Because Congress requires presidential approval of every court ruling.", "isCorrect": false, "rationale": "Presidential approval of court rulings is not required or provided for in the Constitution."}], "id": "q08"}, {"question": "Which reason best explains why even the Supreme Court's counter-majoritarian role may be subtly constrained by public opinion?", "options": [{"text": "Because the Court's legitimacy depends on public confidence, and some scholars argue it tends to stay within the bounds of mainstream public sentiment to avoid backlash.", "isCorrect": true, "rationale": "The text explains 'the Court's legitimacy depends on public confidence' and notes 'Some argue that the Court generally stays within the bounds of mainstream public sentiment, avoiding decisions so far from popular consensus that they would provoke serious backlash.'"}, {"text": "Because the Court is legally required to follow the most recent Gallup poll.", "isCorrect": false, "rationale": "There is no such requirement; the connection is informal — through legitimacy and institutional authority."}, {"text": "Because the Constitution subjects each Court ruling to a popular referendum.", "isCorrect": false, "rationale": "No referendum requirement exists in the Constitution."}, {"text": "Because justices are elected every four years.", "isCorrect": false, "rationale": "Justices are appointed for life, not elected."}], "id": "q09"}, {"question": "A president wants to influence the judicial branch's long-term direction. According to the text, which is the most durable tool available to the president?", "options": [{"text": "The appointment power, by nominating federal judges whose judicial philosophy aligns with the president's preferences — potentially shaping the courts for decades.", "isCorrect": true, "rationale": "The text states the appointment power allows the president to 'shape the ideological direction of the courts for decades,' making it a long-term rather than short-term check."}, {"text": "The pocket veto applied to court rulings.", "isCorrect": false, "rationale": "The pocket veto applies to legislation, not court rulings."}, {"text": "Issuing executive orders that overrule judicial decisions.", "isCorrect": false, "rationale": "Executive orders cannot legally overrule Supreme Court decisions; they can be struck down by courts."}, {"text": "Proposing constitutional amendments single-handedly.", "isCorrect": false, "rationale": "Amendments require two-thirds of Congress and three-fourths of state legislatures; the president cannot propose them alone."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
