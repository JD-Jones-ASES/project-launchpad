    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GOV.html">&larr; Back to AP U.S. Government and Politics</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP U.S. Government and Politics &mdash; Second Amendment Rights</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The Second Amendment's unusual two-clause structure has generated long-running debate. Which statement best captures the interpretive dispute described in the section?", "options": [{"text": "Whether the amendment protects self-defense with knives and other weapons, or only firearms.", "isCorrect": false, "rationale": "The dispute described concerns whether the right is individual or collective, not which types of weapons are covered."}, {"text": "Whether the amendment protects an individual right to own firearms or a collective right tied to service in a state militia.", "isCorrect": true, "rationale": "The text explicitly frames the question: 'Does it protect an individual right to own firearms, or a collective right tied to service in a state militia?'"}, {"text": "Whether the amendment applies to the federal government or the states.", "isCorrect": false, "rationale": "Incorporation is a separate issue resolved in McDonald v. Chicago; the two-clause structure dispute concerns the individual/collective right question."}, {"text": "Whether the amendment may be amended without a constitutional convention.", "isCorrect": false, "rationale": "The section does not address constitutional amendment procedures; the dispute is about interpretation of the existing text."}]}, {"question": "In District of Columbia v. Heller (2008), the Supreme Court held that the Second Amendment protects:", "options": [{"text": "An unlimited right to own any firearm in any location.", "isCorrect": false, "rationale": "The text states the Heller Court explicitly emphasized the right 'is not unlimited' and allowed various regulations."}, {"text": "An individual right to possess firearms unconnected with militia service, for traditionally lawful purposes such as self-defense in the home.", "isCorrect": true, "rationale": "The section says Heller 'held for the first time that the Second Amendment protects an individual right to possess firearms unconnected with militia service,' for 'traditionally lawful purposes, including self-defense in the home.'"}, {"text": "Only the states' right to maintain organized militias.", "isCorrect": false, "rationale": "This describes the collective right interpretation, which Heller rejected."}, {"text": "A right limited to members of formal National Guard units.", "isCorrect": false, "rationale": "Heller explicitly rejected limiting the right to militia membership. The right extends to individuals unconnected with militia service."}]}, {"question": "Heller (2008) struck down a Washington, D.C., handgun ban. Why did that decision not immediately invalidate similar municipal ordinances in other cities?", "options": [{"text": "Because the Supreme Court only issues advisory opinions on federal matters.", "isCorrect": false, "rationale": "The Supreme Court does not issue advisory opinions. The issue is jurisdictional reach over state and local governments."}, {"text": "Because D.C. is a federal district, so the decision applied only to the federal government.", "isCorrect": true, "rationale": "The text explains: 'Heller struck down a Washington, D.C., handgun ban, but because D.C. is a federal district, the decision applied only to the federal government.'"}, {"text": "Because Heller did not address handgun bans.", "isCorrect": false, "rationale": "Heller specifically struck down the D.C. handgun ban; it clearly addressed the issue of banning handguns."}, {"text": "Because the ruling was decided unanimously and therefore had no binding effect.", "isCorrect": false, "rationale": "Unanimous rulings are binding; moreover, Heller was a 5–4 decision according to standard constitutional scholarship, though the section does not specify the vote. The reason Heller did not reach states is the federal character of D.C."}]}, {"question": "McDonald v. City of Chicago (2010) extended Heller by holding that:", "options": [{"text": "The Second Amendment applies to state and local governments through the Fourteenth Amendment's Due Process Clause.", "isCorrect": true, "rationale": "The text states: 'the Supreme Court held that the Second Amendment right to keep and bear arms is incorporated against the states through the Due Process Clause of the Fourteenth Amendment.'"}, {"text": "The Second Amendment guarantees the right to conceal firearms in public.", "isCorrect": false, "rationale": "McDonald incorporated the right to the states but did not decide concealed-carry issues, which were later addressed in Bruen (2022)."}, {"text": "All firearms regulations are unconstitutional.", "isCorrect": false, "rationale": "McDonald, following Heller, acknowledged that the right is not unlimited and that many regulations remain presumptively lawful."}, {"text": "Congress has exclusive authority to regulate firearms.", "isCorrect": false, "rationale": "McDonald applied the Second Amendment to the states; it did not grant exclusive authority to Congress over firearms."}]}, {"question": "The Court's plurality opinion in McDonald relied on which two constitutional criteria to incorporate the Second Amendment right?", "options": [{"text": "Popular sovereignty and majoritarian approval.", "isCorrect": false, "rationale": "Incorporation does not turn on popular sovereignty or majority votes; it turns on whether the right is fundamental and historically rooted."}, {"text": "Whether the right is 'fundamental to our scheme of ordered liberty' and 'deeply rooted in this Nation's history and tradition.'", "isCorrect": true, "rationale": "The text says Justice Alito found the right 'fundamental to our scheme of ordered liberty' and 'deeply rooted in this Nation's history and tradition'—'the standard criteria for selective incorporation.'"}, {"text": "Whether a majority of states have enacted similar statutes.", "isCorrect": false, "rationale": "State legislation is not the constitutional test for incorporation."}, {"text": "Whether Congress has explicitly consented to incorporation.", "isCorrect": false, "rationale": "Congressional consent is not required for judicial incorporation; it is a judicial doctrine applying the Fourteenth Amendment."}]}, {"question": "A state enacts a law prohibiting individuals convicted of a felony from possessing firearms. A challenger argues the law violates the Second Amendment. Under Heller, this law would most likely be:", "options": [{"text": "Unconstitutional, because the Second Amendment right is unlimited.", "isCorrect": false, "rationale": "Heller expressly rejected this position: the right 'is not unlimited.'"}, {"text": "Presumptively lawful, because Heller identified prohibitions on felon firearm possession as among the regulations that remain permissible.", "isCorrect": true, "rationale": "The text states that under Heller regulations 'such as prohibitions on felons possessing weapons... remain presumptively lawful.'"}, {"text": "Subject to strict scrutiny in all cases.", "isCorrect": false, "rationale": "Heller identified felon-possession bans as presumptively lawful; it did not require strict scrutiny of such regulations."}, {"text": "Unconstitutional because McDonald overruled Heller's dicta on felon possession.", "isCorrect": false, "rationale": "McDonald did not overrule Heller on felon possession; it incorporated Heller's holding to the states."}]}, {"question": "The section notes that in New York State Rifle & Pistol Association v. Bruen (2022), the Court established a new test for firearms regulations. What does that test require?", "options": [{"text": "Firearms regulations must pass strict scrutiny based on compelling interests.", "isCorrect": false, "rationale": "The text describes Bruen as establishing a historical tradition test, not a strict scrutiny framework."}, {"text": "Firearms regulations must be consistent with the Nation's historical tradition of firearm regulation.", "isCorrect": true, "rationale": "The text states: Bruen 'established a new test requiring firearms regulations to be consistent with the Nation's historical tradition of firearm regulation.'"}, {"text": "All firearms regulations passed before 2022 are automatically valid.", "isCorrect": false, "rationale": "Bruen struck down New York's concealed-carry regime, showing that pre-2022 regulations are not automatically valid."}, {"text": "Firearms regulations must be approved by a national referendum.", "isCorrect": false, "rationale": "There is no national referendum procedure under the Constitution, and Bruen does not require one."}]}, {"question": "Why did the Court in McDonald highlight the historical importance of the right to bear arms during Reconstruction?", "options": [{"text": "Because the Fourteenth Amendment's framers intended to protect the right of freed slaves to arm themselves against racial violence.", "isCorrect": true, "rationale": "The text says the Court noted 'the Fourteenth Amendment's framers specifically intended to protect the right of freed slaves to arm themselves for self-defense against racial violence.'"}, {"text": "Because Reconstruction-era Congresses passed federal gun control statutes.", "isCorrect": false, "rationale": "The text does not cite Reconstruction-era federal gun control statutes. It emphasizes protection of freed slaves' self-defense rights."}, {"text": "Because Reconstruction overturned the Bill of Rights.", "isCorrect": false, "rationale": "Reconstruction did not overturn the Bill of Rights; it enacted the Fourteenth Amendment, which EXTENDED rights via later incorporation."}, {"text": "Because only Reconstruction-era weapons are protected by the Second Amendment.", "isCorrect": false, "rationale": "The section makes no claim that only Reconstruction-era weapons are protected. The point about Reconstruction was about demonstrating historical rootedness."}]}, {"question": "A city bans firearms in all schools. A parent challenges the ordinance. Based on Heller's language, how would this ordinance most likely fare?", "options": [{"text": "It would be struck down as a total ban on Second Amendment rights.", "isCorrect": false, "rationale": "A school-specific ban is not a total ban. Heller explicitly identified restrictions on carrying firearms in sensitive places as presumptively lawful."}, {"text": "It would likely be upheld, as Heller identified 'sensitive places like schools' as areas where restrictions are presumptively lawful.", "isCorrect": true, "rationale": "The text explicitly cites 'restrictions on carrying in sensitive places like schools' among the 'presumptively lawful' regulations under Heller."}, {"text": "It would automatically be invalid because Bruen overruled Heller's discussion of sensitive places.", "isCorrect": false, "rationale": "Bruen did not overrule Heller; it established a historical tradition test but did not invalidate Heller's sensitive-places framework."}, {"text": "Only federal courts could uphold it; state courts could not.", "isCorrect": false, "rationale": "Both federal and state courts apply the same Second Amendment doctrine after McDonald's incorporation to the states."}]}, {"question": "A student summarizes the relationship between Heller and McDonald as: 'Heller decided WHAT the Second Amendment protects; McDonald decided WHERE it applies.' Is this summary consistent with the section?", "options": [{"text": "No, because Heller held only a collective right and McDonald later recognized an individual right.", "isCorrect": false, "rationale": "This reverses the history. Heller recognized an individual right; McDonald extended that recognition to the states."}, {"text": "Yes, because Heller recognized the individual right against federal action, and McDonald incorporated it against state and local governments through the Fourteenth Amendment.", "isCorrect": true, "rationale": "The text frames Heller as recognizing the individual right (applying to federal D.C.) and McDonald as applying that right to state and local governments via the Fourteenth Amendment—matching the student's summary."}, {"text": "No, because McDonald rejected Heller's individual-right framework.", "isCorrect": false, "rationale": "McDonald built on Heller's individual-right framework rather than rejecting it."}, {"text": "Yes, but only because McDonald overruled Heller.", "isCorrect": false, "rationale": "McDonald did not overrule Heller; it extended Heller's holding to state and local governments."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
