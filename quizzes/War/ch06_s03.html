        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/War.html">&larr; Back to War: A Debate in Primary Sources</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 6, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the fundamental question that the rhetorical mode of pathos attempts to answer for an audience?", "options": [{"text": "Why should I care?", "isCorrect": true, "rationale": "The text explicitly states that if ethos asks why one should listen, pathos asks why one should care about the subject at hand."}, {"text": "Why should I believe you?", "isCorrect": false, "rationale": "This question is more closely aligned with ethos, which focuses on the credibility and authority of the speaker."}, {"text": "What is the logical proof?", "isCorrect": false, "rationale": "This pertains to logos, which relies on facts, evidence, and logical structures rather than emotional engagement."}, {"text": "How will this benefit me?", "isCorrect": false, "rationale": "While related to motivation, this is a specific utilitarian inquiry rather than the broad emotional 'why' of pathos."}]}, {"question": "What is the primary risk associated with Oliver Wendell Holmes' use of 'elevation' as an emotional appeal?", "options": [{"text": "It may oversimplify complex geopolitical issues into a story of pure villainy.", "isCorrect": false, "rationale": "This is actually the risk attributed to Smedley Butler's appeal to outrage and indignation."}, {"text": "It can obscure the gruesome physical realities of war by focusing on its perceived beauty.", "isCorrect": true, "rationale": "The text warns that Holmes' focus on 'the monument' and 'spiritual exaltation' removes the ugliness of the hospital ward and physical suffering."}, {"text": "It makes war seem like an inevitable duty, foreclosing diplomatic alternatives.", "isCorrect": false, "rationale": "The text identifies this as the specific risk of Woodrow Wilson's rhetoric of duty."}, {"text": "It leaves the reader overwhelmed without a framework for responding to the trauma.", "isCorrect": false, "rationale": "This is the risk the text associates with Remarque's strategy of unmediated experience."}]}, {"question": "Why does Smedley Butler specifically choose to invoke 'fury' rather than 'sadness' in his rhetorical strategy?", "options": [{"text": "Sadness is viewed as an unmanly emotion in the context of military pamphlets.", "isCorrect": false, "rationale": "The text does not discuss gendered perceptions of emotion, focusing instead on the functional outcomes of specific feelings."}, {"text": "Fury is more likely to lead to contemplation and deep reflection on the nature of war.", "isCorrect": false, "rationale": "The text suggests the opposite: sadness produces contemplation, while fury produces movement and action."}, {"text": "He believes fury is a more honest representation of the soldier's experience than sadness.", "isCorrect": false, "rationale": "While he values the physical reality, his choice of fury is based on its ability to motivate political reform, not just its honesty."}, {"text": "Anger serves as a catalyst for action, such as protesting or demanding reform.", "isCorrect": true, "rationale": "Butler, as a pamphleteer, needs his audience to take action, and the text notes that anger tends to motivate movement while sadness leads to contemplation."}]}, {"question": "How does Woodrow Wilson's use of pathos differ from a standard celebration of military glory?", "options": [{"text": "He utilizes the logic of a tragic hero, presenting war as a heavy burden accepted out of necessity.", "isCorrect": true, "rationale": "Wilson's appeal is built on 'solemn resolve' and the tension between the 'fearful' nature of war and the moral demand of duty."}, {"text": "He avoids all emotional language to maintain a strictly rational, legislative tone.", "isCorrect": false, "rationale": "The text states that Wilson's appeal is 'carefully controlled' but still uses pathos effectively through the lens of duty."}, {"text": "He focuses exclusively on the economic benefits of defending democracy.", "isCorrect": false, "rationale": "Wilson's argument is framed around honor, justice, and duty, rather than the economic arguments used by Butler."}, {"text": "He uses graphic imagery of the battlefield to shock the audience into agreement.", "isCorrect": false, "rationale": "This 'showing' strategy is attributed to Remarque, while Wilson is noted for acknowledging the cost without celebrating or raging."}]}, {"question": "Which of the following best describes the 'pathos' strategy employed by Erich Maria Remarque?", "options": [{"text": "An appeal to moral gravity that makes inaction feel like a betrayal of values.", "isCorrect": false, "rationale": "This describes Wilson’s appeal to duty, whereas Remarque avoids imposing such moral frameworks."}, {"text": "The use of 'spiritual exaltation' to make the soldier's sacrifice appear noble.", "isCorrect": false, "rationale": "This is the strategy of Holmes, which Remarque actively strips away to show raw experience."}, {"text": "A presentation of raw, unmediated experience that lacks an explicit argument or policy prescription.", "isCorrect": true, "rationale": "Remarque simply 'shows' the horror of war without attaching it to glory, profit, or justice, leaving the reader with 'empathic horror'."}, {"text": "A calculated use of righteous indignation to expose the 'con game' of war.", "isCorrect": false, "rationale": "This characterizes Butler's approach, which seeks to channel emotion into a specific political critique."}]}, {"question": "The text identifies a specific risk in Wilson's rhetoric of duty. What is it?", "options": [{"text": "It can make war appear so beautiful that the physical suffering is ignored.", "isCorrect": false, "rationale": "This is the risk associated with Holmes' rhetoric of elevation and sacrifice."}, {"text": "It might coerce the audience by making any form of dissent feel like cowardice or treason.", "isCorrect": true, "rationale": "The text notes that the rhetoric of duty creates pressure where opposing the war appears to be 'shirking a moral obligation'."}, {"text": "It relies too heavily on shock value, which can desensitize the reader.", "isCorrect": false, "rationale": "The text does not mention desensitization; it notes that Remarque's shock leaves readers overwhelmed without a framework."}, {"text": "It focuses so much on anger that it ignores the possibility of rational negotiation.", "isCorrect": false, "rationale": "Anger and the risk of oversimplification are linked to Butler, not Wilson."}]}, {"question": "According to the section 'Evaluating Emotional Appeals,' when does a pathos appeal become 'emotional manipulation'?", "options": [{"text": "Whenever a writer uses strong imagery to evoke a physical reaction from the audience.", "isCorrect": false, "rationale": "Strong imagery is a legitimate tool of pathos; it only becomes manipulation under specific conditions like substituting for evidence."}, {"text": "When it substitutes for evidence rather than accompanying it or distorts facts to produce an unearned reaction.", "isCorrect": true, "rationale": "Manipulation occurs when the speaker uses emotion to bypass rational judgment rather than to illuminate a truth supported by evidence."}, {"text": "When the writer fails to provide a specific policy prescription for the emotion they evoke.", "isCorrect": false, "rationale": "A lack of policy prescription (like in Remarque) is not manipulation; manipulation requires distortion or replacement of evidence."}, {"text": "If the appeal is used in ceremonial oratory where audiences expect to feel inspired.", "isCorrect": false, "rationale": "Ceremonial oratory is a legitimate context for elevation; the manipulation depends on the relationship between emotion and truth/evidence."}]}, {"question": "In the context of evaluating Butler's rhetoric, how does the author suggest the reader should view his descriptions of wounded veterans?", "options": [{"text": "As manipulative tools that have no place in a rational economic argument.", "isCorrect": false, "rationale": "The text argues that emotions are a legitimate part of reasoning and that Butler's use of them is tied to his evidence."}, {"text": "As evidence that reinforces his logical argument about who pays the cost of war.", "isCorrect": true, "rationale": "The author notes that Butler's images of veterans serve as evidence for his economic argument regarding the disparity between those who suffer and those who profit."}, {"text": "As a distraction from the complex financial realities of the industrial class.", "isCorrect": false, "rationale": "The text suggests the opposite: the emotion is intended to highlight those financial realities and injustices."}, {"text": "As an attempt to evoke pity rather than the anger he claims to seek.", "isCorrect": false, "rationale": "While the images might evoke sympathy, the text explicitly states they are tools designed to produce 'fury' for reform."}]}, {"question": "What 'common misunderstanding' among students does the author clarify regarding the use of emotion in arguments?", "options": [{"text": "That logic (logos) is always more effective than emotion (pathos) in political debate.", "isCorrect": false, "rationale": "The text focuses on the legitimacy of emotion rather than a hierarchy of effectiveness between modes of rhetoric."}, {"text": "That any use of emotion is automatically unfair, dishonest, or manipulative.", "isCorrect": true, "rationale": "The author emphasizes that emotions are necessary for reasoning about moral questions and that using emotion is not inherently 'wrong'."}, {"text": "That writers should only use emotion when their evidence is weak.", "isCorrect": false, "rationale": "The text states the opposite: using emotion to obscure a weak argument is exactly what constitutes manipulation."}, {"text": "That pathos is only useful for personal narratives rather than formal policy arguments.", "isCorrect": false, "rationale": "The text shows how pathos is central to the formal arguments of leaders like Wilson and political critics like Butler."}]}, {"question": "The text suggests that a writer who uses emotion to 'illuminate a genuine truth' is doing what?", "options": [{"text": "Persuading", "isCorrect": true, "rationale": "The text distinguishes between persuading (using emotion to highlight truth) and manipulating (using emotion to hide a weak argument)."}, {"text": "Manipulating", "isCorrect": false, "rationale": "Manipulation is specifically the use of emotion to obscure a weak argument or bypass judgment, not to illuminate truth."}, {"text": "Coercing", "isCorrect": false, "rationale": "Coercion involves making dissent feel intolerable, which is a specific form of pressure rather than the general act of illuminating truth."}, {"text": "Exhorting", "isCorrect": false, "rationale": "While exhortation involves strong encouragement, the specific term used for the positive use of emotion in the concluding paragraph is persuasion."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
