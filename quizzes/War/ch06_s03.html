<script>
var QUESTIONS = [{"question": "What fundamental question does the rhetorical appeal of pathos primarily aim to answer for an audience?", "options": [{"text": "Why should I trust you?", "isCorrect": false, "rationale": "This question aligns with ethos, the appeal to credibility and character, as described in the introductory context of the text ('If ethos asks “Why should I listen to you?”')."}, {"text": "Why should I care?", "isCorrect": true, "rationale": "The text explicitly states in its opening paragraph, 'If ethos asks “Why should I listen to you?” then pathos asks “Why should I care?”' This directly defines the core function of pathos."}, {"text": "What logical conclusion should I draw?", "isCorrect": false, "rationale": "This question relates to logos, the appeal to logic and reason, which focuses on the structure and validity of an argument rather than emotional engagement."}, {"text": "What are the facts of the situation?", "isCorrect": false, "rationale": "While facts may support an appeal, this question primarily focuses on objective information, which is distinct from the emotional engagement that pathos seeks to achieve."}], "id": "q01"}, {"question": "Holmes describes the soldier's sacrifice using language of 'beauty, faith, and spiritual exaltation.' Based on the text, what is the primary risk associated with this specific emotional appeal?", "options": [{"text": "It might make the audience feel overly sympathetic, hindering rational judgment.", "isCorrect": false, "rationale": "While excessive sympathy can be a risk with some emotional appeals, Holmes's appeal is more about admiration and reverence. The text highlights a more specific risk for his approach."}, {"text": "It could oversimplify the complexities of war into a battle of pure good versus evil.", "isCorrect": false, "rationale": "This risk is more closely associated with Butler's pathos, which the text describes as potentially 'oversimplifying, turning a complex question into a story of pure villainy.'"}, {"text": "It risks obscuring the physical horrors and true suffering of warfare.", "isCorrect": true, "rationale": "The text states, 'By making war beautiful, Holmes removes the ugliness — the shattered limbs, the dysentery, the screaming. His pathos is the pathos of the memorial, not the hospital ward.' This explicitly identifies the risk of obscuring reality."}, {"text": "It might make war seem like an inevitable duty, discouraging calls for peace.", "isCorrect": false, "rationale": "This risk is attributed to Wilson's rhetoric of duty, which 'can make war seem inevitable, foreclosing the possibility that peace might still have been an option.'"}], "id": "q02"}, {"question": "Butler's portrayal of war veterans and their suffering is described as serving a purpose beyond mere sympathy. What is the ultimate goal of Butler's pathos?", "options": [{"text": "To inspire reverence and awe for the soldiers' noble sacrifice.", "isCorrect": false, "rationale": "Inspiring reverence and awe is characteristic of Holmes's pathos, which aims to evoke feelings of elevation and sacredness."}, {"text": "To elicit empathic horror, showing the unmediated experience of war.", "isCorrect": false, "rationale": "Eliciting empathic horror through raw, unmediated experience is the distinct strategy employed by Remarque, not Butler."}, {"text": "To generate outrage and righteous anger, prompting demands for reform against profiteering.", "isCorrect": true, "rationale": "The text clearly states, 'Butler appeals to outrage and indignation. He wants his audience to feel that they have been swindled... The emotion he seeks is righteous anger.' It also notes his images 'serve a purpose beyond sympathy: they are evidence in an argument about who benefits... a tool designed to make the audience so angry that they demand reform.'"}, {"text": "To instill a solemn sense of duty and resolve in the audience.", "isCorrect": false, "rationale": "Instilling solemn resolve and a sense of duty is the primary aim of Wilson's emotional appeal, not Butler's."}], "id": "q03"}, {"question": "Wilson's emotional appeal draws power from the 'tension between reluctance and resolve.' Which statement best characterizes the core emotion he seeks to evoke and its potential risk?", "options": [{"text": "He seeks awe and admiration, but risks ignoring the human cost.", "isCorrect": false, "rationale": "Awe and admiration are associated with Holmes, and the risk of ignoring human cost is also his, whereas Wilson acknowledges the cost."}, {"text": "He seeks righteous anger, but risks oversimplifying the enemy.", "isCorrect": false, "rationale": "Righteous anger and the risk of oversimplification are characteristics of Butler's pathos."}, {"text": "He seeks solemn resolve born of duty, but risks making war seem unavoidable.", "isCorrect": true, "rationale": "The text states, 'Wilson appeals to duty and moral gravity... The emotion he seeks is solemn resolve. The risk: the rhetoric of duty can make war seem inevitable, foreclosing the possibility that peace might still have been an option.'"}, {"text": "He seeks empathic horror, but risks leaving the audience without a call to action.", "isCorrect": false, "rationale": "Empathic horror and the risk of lack of framework for response are associated with Remarque's approach."}], "id": "q04"}, {"question": "Remarque's emotional strategy is characterized as 'simply shows' and focuses on 'raw experience.' Which statement accurately describes the unique effect or risk of Remarque's approach to pathos?", "options": [{"text": "It creates a call to action by clearly defining villains and victims.", "isCorrect": false, "rationale": "Remarque explicitly 'leaves only the raw experience' with 'no argument attached to it, no policy prescription, no call to action.'"}, {"text": "It allows for critical analysis by presenting an argument for reform.", "isCorrect": false, "rationale": "Remarque strips away layers of meaning and argument; his approach is about conveying experience rather than providing a framework for critical analysis or reform arguments."}, {"text": "It produces empathic horror and deep sadness, but may leave the audience without a framework for response.", "isCorrect": true, "rationale": "The text explains, 'The emotional effect... is something closer to shock followed by a deep, inarticulate sadness... The emotion he produces is empathic horror... The risk: raw experience without argument can leave the reader overwhelmed but without a framework for response.'"}, {"text": "It elevates the audience above the ordinary, making war seem noble and transcendent.", "isCorrect": false, "rationale": "This effect aligns with Holmes's pathos, which aims for elevation and reverence, the opposite of Remarque's focus on raw, unbearable reality."}], "id": "q05"}, {"question": "Consider Holmes' and Butler's approaches to pathos. Which of the following best describes their fundamental difference in how they portray the soldier's experience?", "options": [{"text": "Holmes focuses on collective action, while Butler focuses on individual suffering.", "isCorrect": false, "rationale": "While both refer to individual and collective aspects, this doesn't capture their fundamental difference in *emotional appeal* or *portrayal* as highlighted in the text."}, {"text": "Holmes seeks to ennoble sacrifice by removing its ugliness, while Butler highlights suffering to provoke anger against injustice.", "isCorrect": true, "rationale": "The text states Holmes's pathos is 'of the memorial, not the hospital ward,' removing 'ugliness.' Butler, conversely, 'does not flinch from the physical costs' and uses these images as 'evidence in an argument about who benefits,' seeking 'outrage.'"}, {"text": "Holmes presents war as an inevitable duty, while Butler frames it as a tragic necessity.", "isCorrect": false, "rationale": "The concepts of inevitable duty and tragic necessity are most closely associated with Wilson's pathos, not Holmes or Butler."}, {"text": "Holmes uses detached observation, while Butler employs vivid personal anecdotes.", "isCorrect": false, "rationale": "Both authors use vivid language to evoke emotion, but their *purpose* and the *type* of emotion evoked are what differentiate them, not necessarily their narrative style in terms of detachment or personal anecdotes."}], "id": "q06"}, {"question": "According to the text, what is the defining characteristic of 'emotional manipulation' in rhetoric?", "options": [{"text": "Any use of emotion in an argument, as emotions are irrational.", "isCorrect": false, "rationale": "The text explicitly refutes this in 'A Common Misunderstanding,' stating that 'Not all emotional appeals are manipulative' and 'Emotions are a legitimate and necessary part of how human beings reason.'"}, {"text": "The use of emotional appeals that bypass rational judgment or distort facts.", "isCorrect": true, "rationale": "The definition provided states, 'Emotional manipulation occurs when a speaker uses emotional appeals to bypass the audience's rational judgment — to make them feel so strongly that they stop thinking critically... or when it distorts the facts to produce a stronger emotional reaction than the truth warrants.'"}, {"text": "Employing emotional language to accompany strong factual evidence.", "isCorrect": false, "rationale": "The text describes this as a legitimate use of emotion: 'The emotion reinforces the logic.' It's when emotion *replaces* evidence that it becomes suspicious."}, {"text": "Appealing to reverence or duty, as these emotions are inherently coercive.", "isCorrect": false, "rationale": "The text acknowledges that rhetoric of duty *can* create pressure, but it doesn't state that these emotions are *inherently* manipulative. It’s a question of whether they leave room for disagreement, not their inherent nature."}], "id": "q07"}, {"question": "The text suggests evaluating if an emotional appeal 'accompanies evidence or replaces it.' Which author's use of pathos is given as an example of effectively accompanying evidence?", "options": [{"text": "Holmes, by showing the beauty of sacrifice alongside accounts of heroism.", "isCorrect": false, "rationale": "Holmes's pathos is noted for *omitting* evidence of the physical horrors, which raises questions about fair representation, rather than effectively accompanying it in the sense of a complete picture."}, {"text": "Butler, whose descriptions of wounded veterans serve as evidence for his economic argument.", "isCorrect": true, "rationale": "The text states, 'Butler's descriptions of wounded veterans are emotionally powerful, but they also serve as evidence for his economic argument — these are the people who paid the cost while corporations collected the profits. The emotion reinforces the logic.'"}, {"text": "Wilson, by acknowledging the costs of war while insisting on duty's demands.", "isCorrect": false, "rationale": "Wilson's rhetoric is discussed in relation to creating pressure and potentially foreclosing debate, not primarily as an example of effectively combining emotional appeals with explicit evidence to bolster a logical argument."}, {"text": "Remarque, by simply showing raw experience without explicit argument.", "isCorrect": false, "rationale": "Remarque's approach is characterized by stripping away arguments and policy prescriptions, focusing on raw experience that leaves the reader 'without a framework for response,' rather than providing evidence for a specific logical point."}], "id": "q08"}, {"question": "A speaker uses emotionally compelling language to describe a nation's military strength and past victories, inspiring pride and patriotism. However, they entirely omit any mention of the human cost or potential negative consequences of conflict. Based on the evaluation principles in the text, which question should a critical audience ask about this appeal?", "options": [{"text": "Does this appeal make war seem inevitable, foreclosing peace options?", "isCorrect": false, "rationale": "This question relates to Wilson's risk of making dissent seem like cowardice or making war appear unavoidable, which is a different issue than the specific omission described."}, {"text": "Does this appeal accompany evidence, or does it replace it entirely?", "isCorrect": false, "rationale": "While related to the broader topic of manipulation, the prompt describes a specific *omission* rather than a complete lack of evidence, making the question about fair representation more direct and fitting."}, {"text": "Does this emotional appeal fairly represent the situation, or does it omit crucial negative aspects?", "isCorrect": true, "rationale": "The text directly addresses this: 'Second, does the emotional appeal fairly represent the situation? Holmes' celebration of martial virtue is emotionally compelling, but it omits the physical horror of the battlefield... does he leave out the suffering because it is irrelevant to his point, or because including it would undermine his argument?'"}, {"text": "Does this appeal generate outrage and indignation, turning complex questions into pure villainy?", "isCorrect": false, "rationale": "This describes Butler's pathos and its associated risk, which is not what the hypothetical scenario is about."}], "id": "q09"}, {"question": "The text states, 'A writer who uses emotion to illuminate a genuine truth is persuading. A writer who uses emotion to obscure a weak argument is manipulating.' This distinction primarily addresses which common misunderstanding about emotional appeals?", "options": [{"text": "That emotional appeals should always lead to a specific policy prescription.", "isCorrect": false, "rationale": "While some emotional appeals (like Butler's) aim for policy, the text highlights Remarque's approach as intentionally lacking a policy prescription, showing this isn't a universal expectation or misunderstanding."}, {"text": "That all emotional appeals are inherently unfair or dishonest in argument.", "isCorrect": true, "rationale": "The text explicitly titles a section 'A Common Misunderstanding' and states, 'Students sometimes conclude that any use of emotion in argument is automatically unfair or dishonest. This is not true.' The distinction provided helps clarify when emotion is legitimate persuasion versus manipulation."}, {"text": "That emotions are separate from, and irrelevant to, human reasoning.", "isCorrect": false, "rationale": "While related, the core misunderstanding addressed is about the *legitimacy* of emotion in argument (fair vs. unfair), not its relevance to human reasoning in general, though that is an underlying premise."}, {"text": "That the goal of pathos is always to make the audience feel positive emotions.", "isCorrect": false, "rationale": "The text clearly shows examples of pathos aiming for negative emotions like outrage (Butler) or empathic horror (Remarque), demonstrating this is not a common misunderstanding the text addresses."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
