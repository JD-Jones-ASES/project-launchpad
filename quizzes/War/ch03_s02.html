<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War: A Debate in Primary Sources &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/War.html">&larr; Back to War: A Debate in Primary Sources</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 3, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Why did President Wilson feel it was necessary to call Congress into an extraordinary session on April 2, 1917?", "options": [{"text": "He believed the choice of policy was too grave for the executive branch to make alone under the Constitution.", "isCorrect": true, "rationale": "Wilson explicitly stated that the choices to be made were ones that he should not and could not constitutionally assume the responsibility of making by himself."}, {"text": "He needed to request immediate funding to pay for the property lost to German submarine attacks.", "isCorrect": false, "rationale": "While property loss was mentioned, Wilson prioritized the principles of human rights and the constitutional necessity of the declaration over mere financial reimbursement."}, {"text": "He wanted to bypass the Supreme Court's involvement in military declarations.", "isCorrect": false, "rationale": "The speech notes the presence of Supreme Court justices as part of the audience, but the session was called for legislative action, not to bypass judicial review."}, {"text": "He sought to establish a new trade agreement with Great Britain and Ireland.", "isCorrect": false, "rationale": "The focus of the session was the German submarine campaign and the state of war, not the negotiation of new trade agreements."}], "id": "q01"}, {"question": "According to Wilson, what distinguish the new German submarine policy enacted on February 1st from previous methods?", "options": [{"text": "It targeted only warships rather than merchant or passenger vessels.", "isCorrect": false, "rationale": "The new policy was 'unrestricted,' meaning it targeted every vessel regardless of its character, cargo, or flag."}, {"text": "It removed all previous restraints of law, humanity, and compassion.", "isCorrect": true, "rationale": "Wilson argues that the new policy swept aside all restrictions, including those previously promised regarding the safety of crews and the warning of vessels."}, {"text": "It was limited strictly to the Mediterranean ports controlled by Germany's enemies.", "isCorrect": false, "rationale": "Wilson noted that the policy applied to the ports of Great Britain, Ireland, the western coasts of Europe, and the Mediterranean."}, {"text": "It introduced a system of 'safe conduct' for neutral ships carrying relief supplies.", "isCorrect": false, "rationale": "Wilson specifically mentions that even relief ships provided with safe conduct were being sunk under the new policy."}], "id": "q02"}, {"question": "Why did Wilson eventually conclude that 'armed neutrality' was no longer a viable policy for the United States?", "options": [{"text": "The United States lacked enough merchant ships to justify the cost of arming them.", "isCorrect": false, "rationale": "The text focuses on the strategic and legal failure of the policy, not the number of available merchant ships."}, {"text": "The German government declared that armed guards on merchant ships would be treated as pirates.", "isCorrect": true, "rationale": "Wilson explains that Germany intended to treat armed guards as beyond the pale of law, making the defense of neutral rights through armed merchantmen impossible."}, {"text": "It would require the U.S. to attack the navies of Great Britain and Ireland to maintain fairness.", "isCorrect": false, "rationale": "Wilson's concern was with the German submarine threat, not with being forced to attack British or Irish naval forces."}, {"text": "The American people were demanding an immediate invasion of the German mainland.", "isCorrect": false, "rationale": "Wilson notes that he must put 'excited feeling away' and that the nation is peaceful; he does not cite public demand for invasion as the reason."}], "id": "q03"}, {"question": "Wilson draws a sharp distinction between the 'Imperial German Government' and what other group?", "options": [{"text": "The Austro-Hungarian diplomatic corps.", "isCorrect": false, "rationale": "While he mentions the Austro-Hungarian government, his primary distinction is between the German rulers and their citizens."}, {"text": "The German people.", "isCorrect": true, "rationale": "Wilson asserts that the U.S. has no quarrel with the German people and felt only sympathy for them, blaming the war on their autocratic rulers."}, {"text": "The governments of neutral European nations.", "isCorrect": false, "rationale": "Though he mentions other neutrals, the core of his moral argument rests on the difference between the German population and its administration."}, {"text": "The crews of the German undersea craft.", "isCorrect": false, "rationale": "Wilson blames the government's policy for the 'unmanly business' of the submarines, rather than focusing on a distinction with the crews specifically."}], "id": "q04"}, {"question": "What primary method did Wilson propose for raising the initial 500,000 men for the war effort?", "options": [{"text": "A call for volunteers from the National Guard units of every state.", "isCorrect": false, "rationale": "While he mentions existing law, he specifically advocates for a new principle for the additional force."}, {"text": "The recruitment of mercenaries from neutral European countries.", "isCorrect": false, "rationale": "Wilson emphasizes American involvement and does not suggest hiring foreign mercenaries."}, {"text": "The principle of universal liability to service.", "isCorrect": true, "rationale": "Wilson states his opinion that the additional force should be chosen based on the principle of universal liability to service, commonly known as a draft."}, {"text": "Offering financial bounties to any citizen who enlisted voluntarily.", "isCorrect": false, "rationale": "Wilson argues for taxation and service based on liability rather than using financial incentives for recruitment."}], "id": "q05"}, {"question": "How did Wilson view the recent political changes in Russia at the time of his address?", "options": [{"text": "He feared the revolution would lead to a separate peace with Germany.", "isCorrect": false, "rationale": "Though this happened later, in this speech, Wilson viewed the Russian revolution as a 'heartening' addition to the forces of freedom."}, {"text": "He believed the Russian people had always been democratic at heart and were now 'fit partners.'", "isCorrect": true, "rationale": "Wilson claims the autocracy was 'not Russian in origin' and that the people are now added to the forces fighting for freedom and justice."}, {"text": "He suspected the revolution was a cunning plan of deception by the Prussian court.", "isCorrect": false, "rationale": "Wilson attributed deception to the Prussian autocracy, but he viewed the Russian change as a genuine triumph of the people."}, {"text": "He intended to send American troops immediately to stabilize the new Russian government.", "isCorrect": false, "rationale": "Wilson's focus was on Russia as a partner in the war against Germany, not on a mission to stabilize their internal government."}], "id": "q06"}, {"question": "What does Wilson claim is the 'eloquent evidence' of the German government's hostile purpose toward the United States?", "options": [{"text": "The deployment of German battleships to the coast of New York.", "isCorrect": false, "rationale": "Wilson's argument focuses on submarines and clandestine intrigue, not a surface fleet presence at U.S. ports."}, {"text": "The intercepted note addressed to the German Minister at Mexico City.", "isCorrect": true, "rationale": "Wilson refers to the intercepted note (the Zimmermann Telegram) as proof that Germany meant to stir up enemies at America's 'very doors.'"}, {"text": "A formal declaration of war delivered by the German Ambassador.", "isCorrect": false, "rationale": "Germany had not formally declared war; Wilson was asking Congress to recognize that Germany's actions constituted a state of war."}, {"text": "The public admission by the Kaiser that he intended to conquer North America.", "isCorrect": false, "rationale": "Wilson cites secret intrigues and intercepted communications rather than public admissions of a plan for conquest."}], "id": "q07"}, {"question": "Why did Wilson argue that war credits should be sustained by taxation rather than entirely by borrowed money?", "options": [{"text": "To prevent the future generation from having to participate in any wars.", "isCorrect": false, "rationale": "While he mentions the present generation, his primary economic concern is about the immediate effects on the economy."}, {"text": "To protect the population from the hardships of inflation caused by vast loans.", "isCorrect": true, "rationale": "Wilson explicitly urges taxation to avoid the 'very serious hardships and evils' associated with inflation from massive borrowing."}, {"text": "Because the Allied governments refused to accept credit from the United States.", "isCorrect": false, "rationale": "Wilson actually planned to extend 'the most liberal financial credit' to the Allied governments."}, {"text": "To ensure that the German people would eventually pay for the war through indemnities.", "isCorrect": false, "rationale": "Wilson stated that the U.S. desired 'no indemnities' for itself and sought no material compensation."}], "id": "q08"}, {"question": "Wilson describes a 'League of Honor' as a partnership that can only be maintained by which type of nations?", "options": [{"text": "Nations with the largest standing armies and navies.", "isCorrect": false, "rationale": "Wilson argues that 'organized force' controlled by autocrats is the menace, not the source of a league of honor."}, {"text": "Democratic nations.", "isCorrect": true, "rationale": "Wilson asserts that 'a steadfast concert for peace can never be maintained except by a partnership of democratic nations,' as autocrats cannot be trusted."}, {"text": "Nations that remained strictly neutral throughout the first three years of the war.", "isCorrect": false, "rationale": "Wilson is calling for an end to neutrality and for democratic belligerents to form this partnership."}, {"text": "Nations that share a common religious and cultural heritage with the United States.", "isCorrect": false, "rationale": "Wilson focuses on political liberty and democratic governance rather than shared religion or culture."}], "id": "q09"}, {"question": "In his conclusion, what does Wilson describe as 'more precious than peace'?", "options": [{"text": "The physical might of the nation.", "isCorrect": false, "rationale": "Wilson explicitly states that the motive is not the assertion of physical might, but the vindication of right."}, {"text": "The right.", "isCorrect": true, "rationale": "Wilson concludes by saying, 'But the right is more precious than peace,' emphasizing that principles of democracy and liberty outweigh the desire to avoid conflict."}, {"text": "The expansion of American territory.", "isCorrect": false, "rationale": "Wilson states that 'We desire no conquest, no dominion,' rejecting the idea of territorial expansion."}, {"text": "The preservation of international trade routes.", "isCorrect": false, "rationale": "While trade routes (free highways of the world) are part of his grievance, he elevates 'the right' and 'democracy' as the ultimate precious goals."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
