    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "Which of the following was the *earliest* significant crisis that began to push President Wilson away from strict neutrality towards intervention in World War I?", "options": [{"text": "The British naval blockade of Germany, which caused widespread hunger.", "isCorrect": false, "rationale": "While the British blockade was a significant issue and caused protests from Wilson, the text indicates that the sinking of the Lusitania (May 1915) was the earliest event explicitly described as 'outraging the American public' and demanding a strong diplomatic response, making it the initial significant crisis pushing Wilson towards a decision."}, {"text": "Germany's unrestricted submarine warfare, particularly the sinking of the Lusitania.", "isCorrect": true, "rationale": "The text highlights the sinking of the Lusitania in May 1915 as a major incident that 'outraged the American public' and prompted Wilson's first strong diplomatic notes regarding submarine warfare. This event predates the Sussex pledge (March 1916), the resumption of unrestricted warfare in 1917, and the Zimmermann Telegram (January 1917)."}, {"text": "The interception and publication of the Zimmermann Telegram in March 1917.", "isCorrect": false, "rationale": "The Zimmermann Telegram was a critical turning point, especially in shifting public opinion, but it occurred much later in the timeline (published March 1917) than the Lusitania sinking (May 1915)."}, {"text": "America's extensive economic ties and loans to the Allied powers by 1917.", "isCorrect": false, "rationale": "While economic ties were a 'deeper economic reality' influencing American 'neutrality' by 1917, the text describes them more as a background factor explaining Wilson's milder protests against Britain, rather than an 'earliest significant crisis' pushing him directly towards war in the same way submarine attacks did."}], "id": "q01"}, {"question": "Critics argued that American 'neutrality' was merely nominal. Which of the following best supports this claim based on the text?", "options": [{"text": "President Wilson winning re-election in November 1916 on the strength of his peace record.", "isCorrect": false, "rationale": "Wilson's re-election on a peace platform suggests a public desire for neutrality, not that the neutrality was nominal. The text explicitly states he won 'on the strength of his peace record,' which would argue against nominal neutrality from a public perception standpoint."}, {"text": "The Wilson administration protested the British blockade less vigorously than German submarine warfare, partly due to economic ties and the absence of American deaths from the blockade.", "isCorrect": true, "rationale": "The text explicitly states: 'Wilson protested the British blockade, but his protests were notably milder than his responses to German submarine warfare.' It attributes this to the fact that 'Britain's blockade did not kill American citizens, while German torpedoes did' and the 'deeper economic reality' of American loans and trade with the Allies, which the British blockade protected. This differential treatment despite claims of neutrality supports the idea of nominal neutrality."}, {"text": "Wilson's decision to arm merchant ships by executive order after a Senate filibuster.", "isCorrect": false, "rationale": "Arming merchant ships was a defensive measure Wilson took after the resumption of unrestricted submarine warfare, showing a move away from neutrality, but it doesn't directly illustrate the *nominal* nature of earlier neutrality, but rather its breakdown."}, {"text": "The severing of diplomatic relations with Germany on February 3, 1917.", "isCorrect": false, "rationale": "Severing diplomatic relations was a strong step away from neutrality, but it was a reaction to Germany's explicit resumption of unrestricted submarine warfare, indicating a *shift* from neutrality rather than demonstrating its nominal nature *prior* to that point in how both belligerents were treated."}], "id": "q02"}, {"question": "What was the central proposal made by German Foreign Secretary Arthur Zimmermann in the telegram intercepted by British intelligence?", "options": [{"text": "Germany offering substantial financial aid to Mexico to modernize its military.", "isCorrect": false, "rationale": "While an alliance might imply aid, the core proposal was not merely financial assistance but a military pact with specific territorial gains as incentives."}, {"text": "A military alliance between Germany and Mexico, with Germany supporting Mexico in recovering lost territories from the United States.", "isCorrect": true, "rationale": "The text explicitly states: 'Germany sent a coded telegram to the German ambassador in Mexico proposing a military alliance: if the United States entered the war against Germany, Mexico would attack the United States, and Germany would help Mexico recover Texas, New Mexico, and Arizona.'"}, {"text": "A secret German plan to encourage an uprising among American citizens of German descent.", "isCorrect": false, "rationale": "The telegram's content, as described, focused on a military alliance with Mexico and territorial promises, not an internal uprising within the US."}, {"text": "Germany demanding that the United States remain strictly neutral in exchange for a cessation of submarine warfare.", "isCorrect": false, "rationale": "The Zimmermann Telegram was a hostile overture against the United States, not an attempt to ensure its neutrality or offer a peace deal for submarine warfare."}], "id": "q03"}, {"question": "Which sequence of events most accurately reflects the escalating crises that led President Wilson to request a declaration of war?", "options": [{"text": "British blockade implemented → Germany issues Sussex Pledge → Zimmermann Telegram publicized → Lusitania sunk.", "isCorrect": false, "rationale": "This sequence is incorrect chronologically. The Lusitania was sunk well before the Sussex Pledge, and the British blockade was earlier than the Zimmermann Telegram."}, {"text": "Sinking of the Lusitania → Sussex Pledge → Germany resumes unrestricted submarine warfare → Zimmermann Telegram publicized.", "isCorrect": true, "rationale": "This sequence correctly identifies the major chronological escalations: Lusitania (May 1915) leads to diplomatic notes, then the Sussex pledge (May 1916) temporarily restricts U-boat activity. Germany resumes unrestricted submarine warfare (Feb 1917), and finally, the Zimmermann Telegram is publicized (March 1917), dramatically shifting public opinion towards war."}, {"text": "Zimmermann Telegram publicized → Germany resumes unrestricted submarine warfare → Wilson severs diplomatic relations → Lusitania sunk.", "isCorrect": false, "rationale": "This sequence is incorrect chronologically. The Lusitania was sunk long before the Zimmermann Telegram and Germany's final resumption of unrestricted submarine warfare in 1917."}, {"text": "Sussex Pledge issued → Lusitania sunk → Wilson arms merchant ships → Germany withdraws from U-boat warfare.", "isCorrect": false, "rationale": "This sequence is incorrect. The Lusitania was sunk before the Sussex Pledge. Germany resumed, not withdrew from, U-boat warfare, and Wilson armed ships in response to that resumption."}], "id": "q04"}, {"question": "After Germany announced the resumption of unrestricted submarine warfare on February 1, 1917, what was one of President Wilson's immediate actions to avoid full-scale war while still asserting American rights?", "options": [{"text": "He immediately asked Congress for a declaration of war.", "isCorrect": false, "rationale": "The text states that Wilson 'still hesitated to ask for war' even after severing diplomatic relations. His request for war came later, on April 2."}, {"text": "He severed diplomatic relations with Germany and later sought authority to arm merchant ships.", "isCorrect": true, "rationale": "The text states: 'Wilson severed diplomatic relations with Germany on February 3. But he still hesitated to ask for war. ... He asked Congress for authority to arm merchant ships — a defensive measure short of war.' This shows his attempts to avoid war while taking firm action."}, {"text": "He ignored the German announcement, hoping it was a bluff.", "isCorrect": false, "rationale": "Wilson clearly did not ignore the announcement; he severed diplomatic relations, indicating a serious response."}, {"text": "He imposed comprehensive economic sanctions on all European belligerents.", "isCorrect": false, "rationale": "The text does not mention comprehensive economic sanctions on all belligerents. His actions were specifically targeted at Germany's submarine policy."}], "id": "q05"}, {"question": "According to international law as described in the text, what specific requirement did German unrestricted submarine warfare violate regarding merchant vessels?", "options": [{"text": "Submarines were forbidden from entering designated war zones without prior approval.", "isCorrect": false, "rationale": "The text specifies rules about *how* warships should engage merchant vessels, not prohibitions on submarines entering war zones."}, {"text": "Warships were required to surface, identify themselves, and allow crews to evacuate before sinking merchant ships.", "isCorrect": true, "rationale": "The text explicitly states: 'International law required warships to surface, identify themselves, and allow crews to evacuate before sinking merchant vessels. Submarines could not do this — surfacing made them vulnerable...'"}, {"text": "Merchant ships were required to carry a neutral flag to avoid attack.", "isCorrect": false, "rationale": "While flying a neutral flag was a practice, the text does not state it was an international law requirement to *avoid attack* under these circumstances, especially given Germany's policy of attacking 'any ship, including neutral vessels' without warning."}, {"text": "Germany was required to compensate neutral nations for any merchant vessels lost due to warfare.", "isCorrect": false, "rationale": "The text describes the requirements for engagement before sinking, not a post-facto compensation requirement as the primary violation."}], "id": "q06"}, {"question": "The text describes the Zimmermann Telegram as 'transforming the debate' for Americans. How did it primarily achieve this transformation?", "options": [{"text": "It exposed Germany's hidden military weaknesses and its desperate strategic situation.", "isCorrect": false, "rationale": "The telegram revealed a strategic plot, not Germany's weaknesses. If anything, it presented Germany as a cunning and dangerous adversary."}, {"text": "It shifted the perception of the conflict from a distant maritime dispute to a tangible, territorial threat against American soil.", "isCorrect": true, "rationale": "The text states: 'Before its publication, the submarine crisis was a maritime dispute... The Zimmermann Telegram made the threat tangible and territorial. Germany was not merely sinking ships; it was plotting to invade American soil, using Mexico as a proxy.'"}, {"text": "It revealed that Britain had been secretly supporting Mexico against the United States.", "isCorrect": false, "rationale": "The telegram revealed a German plot, not British support for Mexico. In fact, British intelligence intercepted and decoded the telegram, then passed it to the US."}, {"text": "It led to a massive, immediate economic recession in the American Southwest.", "isCorrect": false, "rationale": "The text describes a shift in public opinion and a 'personal' feeling about the war for Americans, especially in the Southwest, but not an immediate economic recession."}], "id": "q07"}, {"question": "What was the direct commitment Germany made in the Sussex pledge of May 1916?", "options": [{"text": "To cease all submarine warfare in the Atlantic.", "isCorrect": false, "rationale": "Germany did not agree to cease all submarine warfare, only to restrict its tactics. They resumed unrestricted warfare later."}, {"text": "To give warning before sinking merchant ships.", "isCorrect": true, "rationale": "The text explicitly states: 'The Sussex pledge of May 1916 committed Germany to giving warning before sinking merchant ships.'"}, {"text": "To compensate American victims of previous submarine attacks.", "isCorrect": false, "rationale": "While compensation might have been discussed, the primary commitment highlighted in the text was about *future* conduct: giving warning."}, {"text": "To withdraw its forces from the Western Front if the U.S. remained neutral.", "isCorrect": false, "rationale": "The Sussex pledge was related to submarine warfare, not to troop movements on the Western Front, nor did it involve such a significant concession."}], "id": "q08"}, {"question": "How did America's substantial economic ties to the Allied powers (Britain and France) complicate its claims of neutrality during the early years of World War I?", "options": [{"text": "They directly led to an immediate declaration of war against Germany in 1915.", "isCorrect": false, "rationale": "While economic ties were a factor, they did not lead to an *immediate* declaration of war in 1915. The US remained neutral for several more years."}, {"text": "They forced the U.S. to completely halt all trade with European nations to maintain strict impartiality.", "isCorrect": false, "rationale": "The text describes extensive trade with and loans to the Allies, contradicting the idea that all trade was halted. In fact, trade was thriving with the Allies."}, {"text": "These ties created a vested interest in the Allies' success, as the British blockade protected American trade with them, while German submarines threatened it.", "isCorrect": true, "rationale": "The text explains: 'By 1917, American banks had lent the Allies over $2 billion, and American industry was supplying Britain and France... The British blockade protected that trade; the German submarines threatened it.' This created a practical bias towards the Allies, making neutrality difficult to uphold in practice."}, {"text": "They were the primary reason President Wilson won re-election in 1916 on a platform of peace.", "isCorrect": false, "rationale": "Wilson won re-election on his 'peace record,' which means his efforts to *avoid* war, not because of the economic ties themselves, which were a point of contention for his critics regarding neutrality."}], "id": "q09"}, {"question": "Based on the 'Reading Ahead' note, how did Woodrow Wilson intend to frame the decision to go to war in his April 2, 1917, address to Congress?", "options": [{"text": "As a celebration of American military might and an opportunity for territorial expansion.", "isCorrect": false, "rationale": "The note explicitly contrasts Wilson's framing with that of Holmes, who might 'celebrate war.' Wilson's approach was distinctly different, emphasizing reluctance."}, {"text": "As a grim necessity, a last resort for a peaceful nation after all other options had failed.", "isCorrect": true, "rationale": "The 'Reading Ahead' note states: 'He presents it as a grim necessity — something a peaceful nation must do when all other options have been tried and have failed. Watch for the tension between Wilson's evident reluctance and his ultimate resolve.'"}, {"text": "As a condemnation of all warfare and a call for immediate peace negotiations.", "isCorrect": false, "rationale": "While Wilson was a proponent of peace, his speech was to request a declaration of *war*, not to condemn all warfare or call for peace negotiations at that moment. The note contrasts his stance with Butler, who would 'condemn it'."}, {"text": "As an urgent demand for retribution against Germany for its unprovoked acts of aggression.", "isCorrect": false, "rationale": "While German actions were indeed aggressive, the note emphasizes Wilson's framing as a 'grim necessity' and 'reluctance,' not a focus on immediate retribution, although that would be an underlying motivation for public support."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
