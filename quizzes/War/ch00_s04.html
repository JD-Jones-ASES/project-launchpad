<script>
var QUESTIONS = [{"question": "What was Oliver Wendell Holmes Jr.'s primary experience that most profoundly shaped his perspective on the purpose and value of war?", "options": [{"text": "His tenure as a U.S. Supreme Court Justice, where he deliberated on constitutional matters related to conflict.", "isCorrect": false, "rationale": "While his legal career was influential, the text specifies his direct combat experience in the Civil War as formative for his views on war's virtues."}, {"text": "His service as an officer in the Union Army during the American Civil War, where he was wounded multiple times in major engagements.", "isCorrect": true, "rationale": "The text states he 'enlisted in the Union Army at the age of twenty and fought in some of the bloodiest engagements of the Civil War,' and 'was seriously wounded three times,' directly linking this experience to his argument that 'War is a crucible that forges virtues.'"}, {"text": "His upbringing as the son of a distinguished Boston physician and writer, which instilled in him a strong sense of civic duty.", "isCorrect": false, "rationale": "His background is mentioned, but the text attributes his specific views on war's purpose and virtues to his direct military experience."}, {"text": "His reputation as 'The Great Dissenter,' which cultivated a critical perspective on prevailing societal norms.", "isCorrect": false, "rationale": "This describes his later judicial philosophy, not the foundational experience that shaped his core argument about the inherent purpose of war itself."}], "id": "q01"}, {"question": "Smedley Butler's transformation after his military retirement is best described as a shift from:", "options": [{"text": "A decorated military leader to a proponent of expanding American military presence globally.", "isCorrect": false, "rationale": "Butler's transformation was into an antiwar activist who exposed what he saw as corrupt military practices, directly opposing increased military expansion."}, {"text": "A career soldier celebrated for his service to an antiwar activist who criticized the motives behind military conflicts.", "isCorrect": true, "rationale": "The text explicitly states: 'After his retirement in 1931, Butler underwent a remarkable transformation: the warrior became an antiwar activist,' and he 'accused the American military-industrial system of waging wars for private profit.'"}, {"text": "A military strategist focused on combat effectiveness to a humanitarian aid organizer in post-conflict zones.", "isCorrect": false, "rationale": "While his shift was profound, his primary post-retirement role was as an antiwar activist and whistle-blower, not specifically a humanitarian aid organizer."}, {"text": "A nationalist who championed American military power to an isolationist advocating for complete withdrawal from international affairs.", "isCorrect": false, "rationale": "His criticism focused on the 'racket' of war and profit, not necessarily a complete isolationist stance, but rather a re-evaluation of the reasons for intervention."}], "id": "q02"}, {"question": "Woodrow Wilson's core argument for America's entry into World War I, as described, was primarily focused on:", "options": [{"text": "Securing new colonial territories and expanding American economic influence abroad.", "isCorrect": false, "rationale": "The text explicitly states his war was 'not a war of conquest,' which contradicts the idea of securing colonial territories or purely economic expansion."}, {"text": "A moral imperative to protect and propagate democratic governance and human rights globally.", "isCorrect": true, "rationale": "The text directly quotes his argument: 'This war is not a war of conquest but a war for democracy and human rights. America fights...because the world must be made safe for democratic governance, and only American power can accomplish that.'"}, {"text": "Strengthening international alliances and preventing future European conflicts through military deterrence.", "isCorrect": false, "rationale": "While he later championed the League of Nations, his initial argument for entering the war was framed in terms of making the world safe for democracy and human rights, not solely alliance strengthening."}, {"text": "Punishing Germany for its aggressive actions and establishing American military supremacy.", "isCorrect": false, "rationale": "His argument was presented as a higher ideal for democracy and human rights, not primarily as a punitive measure or for establishing military supremacy."}], "id": "q03"}, {"question": "Unlike the other three figures, Erich Maria Remarque's method of conveying his perspective on war is characterized by:", "options": [{"text": "Formulating detailed policy recommendations for demilitarization and international peace treaties.", "isCorrect": false, "rationale": "Remarque's approach is described as 'shows' rather than arguing in a traditional sense or advocating for specific policies."}, {"text": "Presenting a scholarly critique of historical military strategies and their ethical implications.", "isCorrect": false, "rationale": "He does not offer a scholarly critique but rather a narrative portrayal of the soldier's experience."}, {"text": "Using vivid narrative and experiential accounts to expose the brutal, unromanticized reality of combat.", "isCorrect": true, "rationale": "The text states: 'Remarque does not argue in the traditional sense. He shows. Through the eyes of an ordinary soldier, he presents the physical and psychological reality of trench warfare — the mud, the terror, the senseless death — and lets the reader draw conclusions.'"}, {"text": "Constructing a philosophical defense of pacifism based on universal ethical principles.", "isCorrect": false, "rationale": "While his work might lead to pacifist conclusions, his method is described as showing the reality of war, not constructing a philosophical defense."}], "id": "q04"}, {"question": "The introduction states that 'Holmes celebrates what Butler condemns.' This highlights a fundamental disagreement between them regarding:", "options": [{"text": "The necessity of international cooperation in resolving global conflicts.", "isCorrect": false, "rationale": "Their core disagreement is not about international cooperation but about the fundamental nature and purpose of war itself."}, {"text": "The role of military power in establishing democratic governance worldwide.", "isCorrect": false, "rationale": "This aligns more with Wilson's argument. Holmes and Butler's core disagreement is on whether war is a source of virtue or a corrupt racket."}, {"text": "Whether war is a noble forge of character or a cynical enterprise driven by profit.", "isCorrect": true, "rationale": "Holmes argues 'War is a crucible that forges virtues,' while Butler argues 'War is a racket — a scheme in which a small group of insiders reaps enormous profits.' This is the direct opposition described."}, {"text": "The psychological impact of trench warfare on the individual soldier.", "isCorrect": false, "rationale": "This specific aspect is central to Remarque's work, not the primary point of contention between Holmes and Butler."}], "id": "q05"}, {"question": "If a political leader argued that a military intervention was justified because it would instill a renewed sense of national duty and sacrifice among the populace, which of the four voices would most likely resonate with this perspective?", "options": [{"text": "Smedley Darlington Butler", "isCorrect": false, "rationale": "Butler would likely dismiss such rhetoric as a cover for the 'racket' of war, as his argument condemns war as a means for private profit, not public virtue."}, {"text": "Erich Maria Remarque", "isCorrect": false, "rationale": "Remarque challenges 'every abstraction about war, whether noble or necessary,' and would likely expose the grim reality behind such idealized notions of duty and sacrifice."}, {"text": "Thomas Woodrow Wilson", "isCorrect": false, "rationale": "Wilson's justification for war was centered on making the world 'safe for democratic governance' and human rights, not primarily on forging national duty and sacrifice within the intervening nation."}, {"text": "Oliver Wendell Holmes Jr.", "isCorrect": true, "rationale": "Holmes's argument explicitly states that 'War is a crucible that forges virtues — courage, self-sacrifice, devotion to a cause greater than oneself — that a comfortable, commercial society cannot produce on its own.' This aligns directly with the idea that war can instill duty and sacrifice."}], "id": "q06"}, {"question": "What is the overarching goal of the book by presenting these four distinct perspectives on war?", "options": [{"text": "To definitively declare which of the four arguments about war is morally correct.", "isCorrect": false, "rationale": "The text explicitly states: 'This book is not designed to tell you which of them is right.'"}, {"text": "To provide a comprehensive historical overview of different approaches to warfare throughout the 20th century.", "isCorrect": false, "rationale": "While the figures are historical, the primary goal is about critical thinking and evaluation, not just historical cataloging."}, {"text": "To enable readers to critically analyze arguments about war and formulate their own informed conclusions.", "isCorrect": true, "rationale": "The text states: 'It is designed to give you the tools to evaluate their arguments for yourself — to read carefully, think critically, and reach your own conclusions... you will know how to evaluate what anyone thinks about war, including yourself.'"}, {"text": "To persuade readers to adopt an anti-war stance by highlighting the horrors and futility of conflict.", "isCorrect": false, "rationale": "The book presents varied viewpoints, including those that justify or celebrate war, indicating its purpose is not to advocate a single stance but to foster independent evaluation."}], "id": "q07"}, {"question": "Which two authors' perspectives, when combined, would most strongly support the idea that war is fundamentally a destructive force that benefits a select few while causing immense suffering to the masses?", "options": [{"text": "Oliver Wendell Holmes Jr. and Woodrow Wilson", "isCorrect": false, "rationale": "Holmes celebrates war's virtues, and Wilson justifies it for democracy, neither portraying it as primarily a destructive force benefiting a few at the expense of many."}, {"text": "Smedley Darlington Butler and Erich Maria Remarque", "isCorrect": true, "rationale": "Butler argues 'War is a racket — a scheme in which a small group of insiders reaps enormous profits while millions of ordinary soldiers pay with their bodies, their minds, and their lives.' Remarque 'shows' the 'physical and psychological reality of trench warfare — the mud, the terror, the senseless death.' Both align with the idea of war being destructive and benefiting few at great cost."}, {"text": "Woodrow Wilson and Erich Maria Remarque", "isCorrect": false, "rationale": "Wilson justifies war for democracy, which contrasts sharply with Remarque's exposure of its senseless destruction. They do not combine to primarily emphasize benefit to a select few."}, {"text": "Oliver Wendell Holmes Jr. and Smedley Darlington Butler", "isCorrect": false, "rationale": "These two are presented as direct opposites ('Holmes celebrates what Butler condemns'), so their views would not combine to support a unified argument about war's destructive nature."}], "id": "q08"}, {"question": "Based on Oliver Wendell Holmes Jr.'s argument, a society that successfully avoids all armed conflict through constant diplomacy and comfort might paradoxically miss the opportunity to cultivate what?", "options": [{"text": "Significant economic growth and technological advancement.", "isCorrect": false, "rationale": "Holmes's argument focuses on moral virtues, not economic or technological outcomes of peace."}, {"text": "Certain profound human virtues, such as courage, self-sacrifice, and devotion to a greater cause.", "isCorrect": true, "rationale": "Holmes explicitly states: 'War is a crucible that forges virtues — courage, self-sacrifice, devotion to a cause greater than oneself — that a comfortable, commercial society cannot produce on its own.'"}, {"text": "International respect and a strong global standing.", "isCorrect": false, "rationale": "His argument is about internal human character, not external national reputation."}, {"text": "A deeper understanding of historical patterns and human nature.", "isCorrect": false, "rationale": "While these could be outcomes of studying war, Holmes's specific argument is about the active forging of virtues through conflict itself."}], "id": "q09"}, {"question": "Erich Maria Remarque's 'challenge to every abstraction about war, whether noble or necessary' suggests he would view heroic or romanticized depictions of battle as:", "options": [{"text": "Necessary psychological tools for bolstering national morale and patriotism.", "isCorrect": false, "rationale": "Remarque's work aims to strip away abstractions and show the 'senseless death,' directly contradicting the idea of romanticizing war for morale."}, {"text": "Valid artistic interpretations that capture a different facet of the human experience in conflict.", "isCorrect": false, "rationale": "His challenge to *every abstraction* implies that he sees such depictions as obscuring, rather than revealing, the true nature of war."}, {"text": "Dangerous misrepresentations that obscure the brutal and senseless realities faced by ordinary soldiers.", "isCorrect": true, "rationale": "By 'challenging every abstraction' and focusing on 'the mud, the terror, the senseless death,' Remarque implicitly argues that romanticized depictions are deceptive and prevent an honest understanding of war."}, {"text": "Acceptable as long as they acknowledge the sacrifices made by individuals.", "isCorrect": false, "rationale": "His focus on the unvarnished 'reality' and his challenge to *all* abstractions suggest that even with acknowledgment of sacrifice, idealization would still be problematic."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
