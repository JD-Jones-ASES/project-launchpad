    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/War.html">&larr; Back to War: A Debate in Primary Sources</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 4, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "In Chapter 3, how does Butler utilize 'pathos' differently than a typical emotional appeal?", "options": [{"text": "He uses it as a rhetorical bridge to connect corporate profit data to human suffering.", "isCorrect": true, "rationale": "Butler strategically juxtaposes the cold statistics of profit from previous chapters with the visceral reality of veterans' hospitals to create a contrast that functions as logical evidence."}, {"text": "He employs it to replace the logical arguments of the first two chapters entirely.", "isCorrect": false, "rationale": "While the register changes, the text argues that pathos is an extension of his logos, not a replacement for it."}, {"text": "He uses it to ask the reader for charitable donations for wounded 'boys'.", "isCorrect": false, "rationale": "Butler's goal is systemic policy change and the dismantling of the 'war racket,' not a plea for private charity."}, {"text": "He uses it to soften the bluntness of his earlier accusations against corporations.", "isCorrect": false, "rationale": "The emotional descriptions of destroyed men actually sharpen the accusations by showing the human cost of those profits."}], "id": "q01"}, {"question": "What is the primary rhetorical risk identified in Butler's 'Plain Style' in Chapter 4?", "options": [{"text": "The use of ornate Victorian oratory may alienate the common reader.", "isCorrect": false, "rationale": "Butler specifically avoids Victorian oratory, opting instead for a blunt, direct style."}, {"text": "His absolute certainty leaves no room for complexity or alternative solutions.", "isCorrect": true, "rationale": "By presenting his proposals as the 'only' solution, Butler risks losing credibility if any part of his singular analysis is proven incomplete."}, {"text": "The use of the imperative mood makes him sound like a civilian professor rather than a soldier.", "isCorrect": false, "rationale": "The imperative mood actually reinforces his military ethos, sounding like a man giving orders."}, {"text": "His focus on constitutional amendments makes the argument too academic for a pamphlet.", "isCorrect": false, "rationale": "Butler's prose is described as straightforward and devoid of academic or ornate flourishes."}], "id": "q02"}, {"question": "How does Butler's explanation for the U.S. entry into World War I differ from Woodrow Wilson's account?", "options": [{"text": "Butler emphasizes the Zimmermann Telegram as the primary catalyst for war.", "isCorrect": false, "rationale": "Butler actually ignores the Zimmermann Telegram entirely in favor of a financial explanation."}, {"text": "Butler argues that unrestricted submarine warfare was a fabrication by the media.", "isCorrect": false, "rationale": "Butler does not claim the events were fake; rather, he ignores these specific military justifications to focus on economic ones."}, {"text": "Butler attributes the war to a 'collection operation' for Allied debt held by American bankers.", "isCorrect": true, "rationale": "Butler posits that the financial interests of bankers who lent billions to England and France were the true drivers of American involvement."}, {"text": "Butler claims Wilson was forced into war by a popular uprising of the American people.", "isCorrect": false, "rationale": "Butler acknowledges that the people generally do not want war and suggests they are pushed into it by other forces."}], "id": "q03"}, {"question": "Which of the following best describes the 'peroration' as defined in the context of Chapter 5?", "options": [{"text": "The introductory section intended to establish the speaker's ethos.", "isCorrect": false, "rationale": "This describes an exordium; the peroration is the final section."}, {"text": "A detailed technical breakdown of policy proposals and legislative steps.", "isCorrect": false, "rationale": "Technical details usually precede the peroration, which focuses on summary and emotional impact."}, {"text": "The closing section designed to summarize points and move the audience to action.", "isCorrect": true, "rationale": "In classical rhetoric, the peroration is the final opportunity to leave a lasting emotional and persuasive impression."}, {"text": "A logical rebuttal of the opposing side's most powerful evidence.", "isCorrect": false, "rationale": "While a peroration might touch on main points, its primary function is to inspire and conclude, not to engage in granular debate."}], "id": "q04"}, {"question": "The text suggests that Butler and Wilson's arguments can 'coexist without directly contradicting each other.' Why is this?", "options": [{"text": "Both authors agree that war is fundamentally a racket for profit.", "isCorrect": false, "rationale": "Wilson argued the war was a necessary crusade for democracy, not a profit-seeking racket."}, {"text": "They operate at different levels of generality: one against war in general, the other for a specific war.", "isCorrect": true, "rationale": "Butler's structural critique of the war system doesn't technically disprove that a specific instance (like WWI) could also have legitimate security causes."}, {"text": "Wilson's argument was primarily based on pathos, while Butler's was entirely logos.", "isCorrect": false, "rationale": "The source material notes that Butler shifts heavily into pathos, while Wilson uses formal deliberation."}, {"text": "Butler eventually concedes that Wilson's reasons for war were justified by German aggression.", "isCorrect": false, "rationale": "Butler does not concede this point; he simply ignores Wilson's specific justifications in favor of his own theory."}], "id": "q05"}, {"question": "According to the analysis of Butler's word choice in Chapter 3, why does he refer to veterans as 'boys'?", "options": [{"text": "To highlight their lack of training and military discipline.", "isCorrect": false, "rationale": "There is no indication in the text that Butler is questioning their training; rather, he is highlighting their humanity."}, {"text": "To emphasize their youth and vulnerability in contrast to their treatment like animals 'in pens'.", "isCorrect": true, "rationale": "This word choice creates a sense of lost innocence and emphasizes the tragedy of their mental and physical destruction."}, {"text": "To satisfy the linguistic conventions of 1930s military reporting.", "isCorrect": false, "rationale": "The text describes this as a 'distinctive' word choice intended to elicit a specific emotional response, not a standard convention."}, {"text": "To suggest that they were too young to have legally enlisted in the first place.", "isCorrect": false, "rationale": "The text focuses on the emotional impact of the word 'boys' regarding their vulnerability, not their legal status."}], "id": "q06"}, {"question": "How does the closing line 'TO HELL WITH WAR!' function rhetorically in Butler's work?", "options": [{"text": "It serves as a nuanced summary of the legislative proposals in Chapter 4.", "isCorrect": false, "rationale": "The line is described as a 'shout' that abandons complexity and analysis in favor of raw emotion."}, {"text": "It leverages Butler's ethos as a decorated combat veteran to provide an authoritative verdict.", "isCorrect": true, "rationale": "The weight of his military history gives this blunt, profane statement a power that a civilian critic could not achieve."}, {"text": "It provides a clear roadmap for how the audience should lobby Congress.", "isCorrect": false, "rationale": "The line is a summary of feeling rather than a practical set of instructions for political action."}, {"text": "It bridges the gap between Butler’s anger and Oliver Wendell Holmes’s sense of 'The Soldier's Faith'.", "isCorrect": false, "rationale": "The text contrasts Butler’s raw anger with Holmes’s reverential and worshipful tone."}], "id": "q07"}, {"question": "What is the critical difference between the 'Three Closings' of Holmes, Wilson, and Butler?", "options": [{"text": "Holmes seeks admiration, Wilson seeks acceptance, and Butler seeks revolt.", "isCorrect": true, "rationale": "Each writer uses a different tone—reverential, grave, and raw—to move their audience toward a different final response."}, {"text": "Butler is the only one who mentions the financial costs of war in his conclusion.", "isCorrect": false, "rationale": "The source notes that Butler's data is 'gone' in the final chapter, replaced by pure anger and his four-word verdict."}, {"text": "Wilson is the only one who uses emotional appeals to reach his audience.", "isCorrect": false, "rationale": "All three use emotional appeals (pathos), though their methods and desired outcomes differ significantly."}, {"text": "Holmes and Wilson agree with Butler's economic findings but disagree on the solution.", "isCorrect": false, "rationale": "There is no evidence in the text that Holmes or Wilson addressed Butler's specific economic 'racket' framework."}], "id": "q08"}, {"question": "In the context of Chapter 4, what is 'the imperative mood' and why does Butler use it?", "options": [{"text": "A style of writing that asks polite questions to encourage the reader to think.", "isCorrect": false, "rationale": "The imperative mood is used for commands, not for polite questioning."}, {"text": "A formal mode of address used by presidents to express the gravity of a situation.", "isCorrect": false, "rationale": "This describes Wilson’s style; Butler’s imperative mood is much more blunt and directive."}, {"text": "A grammatical form that gives orders, reflecting Butler's background as a military commander.", "isCorrect": true, "rationale": "Sentences like 'Let the officers... be conscripted' show Butler writing like a man accustomed to leading rather than persuading."}, {"text": "A logical framework that uses 'if-then' statements to prove a point.", "isCorrect": false, "rationale": "The imperative mood focuses on direct commands rather than the conditional logic of 'if-then' statements."}], "id": "q09"}, {"question": "Which potential historical evidence does Butler ignore when presenting his theory about Allied debt in Chapter 5?", "options": [{"text": "The existence of veterans' psychiatric wards.", "isCorrect": false, "rationale": "Butler relies heavily on the description of these wards in Chapter 3."}, {"text": "The campaign promises made by Woodrow Wilson in 1916.", "isCorrect": false, "rationale": "Butler explicitly mentions Wilson's campaign promise to keep the U.S. out of the war."}, {"text": "The Zimmermann Telegram and unrestricted submarine warfare.", "isCorrect": true, "rationale": "The text notes that Butler offers a single-cause explanation (money) and avoids engaging with Wilson's specific security-based arguments."}, {"text": "The fact that corporate profits increased during the war.", "isCorrect": false, "rationale": "The increase in corporate profits is a central pillar of Butler's argument in the earlier chapters."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
