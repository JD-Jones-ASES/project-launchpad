<script>
var QUESTIONS = [{"question": "What is the primary rhetorical shift observed in Smedley Butler's 'The Bill Comes Due' from Chapters 1-2 to Chapter 3?", "options": [{"text": "From policy proposals to historical analysis.", "isCorrect": false, "rationale": "Chapter 3 marks a shift in rhetorical appeal, not a complete change in the type of content from policy to history. Policy proposals are primarily in Chapter 4."}, {"text": "From logical, data-driven exposé to raw emotional appeal.", "isCorrect": true, "rationale": "The text explicitly states, 'The shift from data-driven exposé in Chapters 1–2 to the raw emotion of Chapter 5 is deliberate,' and specifically for Chapter 3, 'The data gives way to description... This is pathos — the appeal to emotion.'"}, {"text": "From personal anecdote to statistical evidence.", "isCorrect": false, "rationale": "Chapters 1-2 were characterized by 'evidence and data,' not personal anecdotes, and Chapter 3 moves away from this data, not towards it."}, {"text": "From informal language to formal academic tone.", "isCorrect": false, "rationale": "Butler's language, especially in Chapter 3 and later, becomes more direct and emotionally charged, which is not typically described as a shift to a formal academic tone."}], "id": "q01"}, {"question": "In Chapter 3, Butler describes veterans as 'boys' and being 'in pens.' What is the primary rhetorical effect of these specific word choices?", "options": [{"text": "To highlight the bureaucratic inefficiencies of government hospitals.", "isCorrect": false, "rationale": "While the description might implicitly suggest inefficiencies, the primary focus of Butler's word choice is on the dehumanizing effect and the plight of the veterans, rather than administrative problems."}, {"text": "To emphasize the youth and dehumanization of the soldiers, evoking sympathy and outrage.", "isCorrect": true, "rationale": "The text explains: '“boys” — a word choice that emphasizes their youth and vulnerability. He describes them as being “in pens,” language that evokes animals in cages, not heroes honored for their service.' This is intended to stir strong emotions."}, {"text": "To provide a factual, objective description of their living conditions.", "isCorrect": false, "rationale": "The language used ('boys,' 'in pens,' 'looks on their faces!') is highly evocative and emotional, deliberately crafted to be anything but factual or objective."}, {"text": "To shift the blame for their condition from the military to the veterans themselves.", "isCorrect": false, "rationale": "Butler's entire argument aims to critique the system and those who profit from war, not to shift blame onto the veterans who suffered its consequences."}], "id": "q02"}, {"question": "The key concept 'Pathos in the Service of Logos' in Chapter 3 implies that Butler uses emotional descriptions for what ultimate purpose?", "options": [{"text": "To distract the reader from the lack of concrete evidence in his argument.", "isCorrect": false, "rationale": "The text states it's an 'extension' of his logical argument, not a distraction. He already provided data in earlier chapters."}, {"text": "To directly accuse specific corporations of unethical practices.", "isCorrect": false, "rationale": "While he critiques corporate profits, Chapter 3 focuses on the human cost. The emotional appeal is used to bridge the profit data with the injustice, not to make direct accusations in that chapter."}, {"text": "To create an emotional contrast that functions as evidence for a logical argument about systemic corruption.", "isCorrect": true, "rationale": "The text states: 'By placing the human cost directly after the profit data, he creates a contrast that functions as evidence. The emotional response the reader feels is the argument: if this is what war costs and that is who profits, then the system is corrupt.'"}, {"text": "To offer a sympathetic apology to the veterans for their suffering.", "isCorrect": false, "rationale": "Butler's purpose is argumentative and critical of the system, not primarily to offer an apology, though sympathy is an intended byproduct for the reader."}], "id": "q03"}, {"question": "Which of the following best characterizes the 'plain style' Butler employs in Chapter 4?", "options": [{"text": "Ornate sentences with classical allusions, similar to Holmes.", "isCorrect": false, "rationale": "The text explicitly contrasts Butler's style with Holmes's 'Victorian oratory' and its lack of 'ornate sentences, no classical allusions.'"}, {"text": "Long, cresting periods with stately cadence, reminiscent of Wilson.", "isCorrect": false, "rationale": "The text explicitly contrasts Butler's style with Wilson's 'stately cadence of formal deliberation' and emphasizes Butler's 'short and direct' sentences."}, {"text": "Direct, declarative prose using the imperative mood, reflecting a commander's tone.", "isCorrect": true, "rationale": "The text notes: 'Butler writes like a man giving orders. His sentences are short and direct. He uses the imperative mood... He tells them flatly that it will work...'"}, {"text": "Complex, nuanced arguments acknowledging multiple perspectives.", "isCorrect": false, "rationale": "Butler's style in Chapter 4 is marked by bluntness and certainty, dismissing objections rather than acknowledging complexity or multiple perspectives."}], "id": "q04"}, {"question": "The caution 'Certainty Is Not the Same as Correctness' following Chapter 4's discussion of Butler's proposals suggests which potential weakness in his rhetorical strategy?", "options": [{"text": "His proposals are too complex for the average reader to understand.", "isCorrect": false, "rationale": "The 'plain style' makes his proposals straightforward, not overly complex for the average reader."}, {"text": "His confidence might alienate readers who prefer a more humble tone.", "isCorrect": false, "rationale": "While possible, the text focuses on the logical risk rather than just reader alienation, stating it 'is rhetorically powerful but logically risky.'"}, {"text": "By presenting his solutions as the only possible ones, he risks oversimplifying complex issues and rejecting viable alternatives.", "isCorrect": true, "rationale": "The text states: 'By presenting his proposals as the only possible solution, Butler leaves no room for compromise, modification, or the possibility that he might be wrong... When a writer says “that and nothing else,” he closes the door on alternative solutions.'"}, {"text": "The plain style used in Chapter 4 makes his arguments seem less authoritative.", "isCorrect": false, "rationale": "The text indicates his confidence and style are 'part of his ethos' and that he 'speaks as a man who has seen war from the inside,' which adds authority, not diminishes it."}], "id": "q05"}, {"question": "According to the provided definition, what are the two primary purposes of a peroration in classical rhetoric?", "options": [{"text": "To introduce the main argument and establish the speaker's credibility.", "isCorrect": false, "rationale": "These are functions typically associated with the exordium or introduction of a speech, not the peroration."}, {"text": "To summarize main points and move the audience to action or strong feeling.", "isCorrect": true, "rationale": "The definition states: 'In classical rhetoric, the peroration had two purposes: to summarize the main points and to move the audience to action or strong feeling.'"}, {"text": "To provide counter-arguments and acknowledge limitations of the speaker's own proposals.", "isCorrect": false, "rationale": "These elements are usually found within the body of the argument (confirmatio or refutatio), not typically in the emotionally charged closing peroration."}, {"text": "To present data-driven evidence and logical conclusions based on that evidence.", "isCorrect": false, "rationale": "While conclusions are part of an argument, the peroration's emphasis is on emotional impact and summary, often moving beyond new data presentation."}], "id": "q06"}, {"question": "In Chapter 5, Butler challenges Woodrow Wilson's justification for entering World War I by:", "options": [{"text": "Directly refuting Wilson's claims about submarine warfare and the Zimmermann Telegram with counter-evidence.", "isCorrect": false, "rationale": "The text explicitly states: 'Notice what Butler does not do. He does not engage with Wilson's specific arguments about submarine warfare or the rights of neutral nations. He does not address the Zimmermann Telegram.'"}, {"text": "Suggesting that Wilson was genuinely torn between peace and war but ultimately made the wrong decision.", "isCorrect": false, "rationale": "Butler's account offers a clear, single-cause explanation (Allied debt), which leaves no room for Wilson being 'genuinely torn' in his framework."}, {"text": "Proposing an alternative, single-cause explanation centered on financial interests (Allied debt) without engaging Wilson's specific arguments.", "isCorrect": true, "rationale": "The text explains that Butler 'offers a single-cause explanation — money — and treats it as self-evidently sufficient... The war, in Butler's telling, was a collection operation disguised as a crusade for democracy.'"}, {"text": "Acknowledging the complexity of the situation but still concluding Wilson's decision was flawed.", "isCorrect": false, "rationale": "Butler's framework, as discussed, 'has no room for this kind of complexity' where financial interests and genuine security threats might both be real."}], "id": "q07"}, {"question": "The closing line, 'TO HELL WITH WAR!', is described as rhetorically powerful but potentially problematic for a policy argument because:", "options": [{"text": "It is too polite and lacks the necessary force to convey Butler's anger.", "isCorrect": false, "rationale": "The line is described as 'blunt, profane, and unmistakably the voice of a soldier,' carrying 'anger, accusation,' which contradicts the idea of it being too polite."}, {"text": "It shifts from a specific, detailed policy discussion to an emotional shout, potentially undercutting the seriousness of his prior proposals.", "isCorrect": true, "rationale": "The text poses the question: 'Is this a powerful capstone to a carefully built argument? Or does it undercut the seriousness of the proposals that preceded it by replacing analysis with emotion?' This highlights the potential for the emotional conclusion to undermine the policy argument."}, {"text": "Its profane nature diminishes Butler's ethos as a decorated military man.", "isCorrect": false, "rationale": "The text argues the opposite, stating it 'carries the full weight of Butler's ethos — his two Medals of Honor, his decades of combat, his firsthand knowledge of what war looks like up close.'"}, {"text": "It implies a compromise is possible, which contradicts Butler's overall stance.", "isCorrect": false, "rationale": "The line expresses an absolute, uncompromising rejection of war, not a suggestion of compromise. 'There is no nuance here, no qualification, no acknowledgment that the question might be complicated.'"}], "id": "q08"}, {"question": "The 'General vs. Specific Arguments' key concept explains that Butler's thesis and Wilson's argument about WWI:", "options": [{"text": "Are direct contradictions that cannot logically coexist.", "isCorrect": false, "rationale": "The text states they 'operate at different levels of generality, which means they can coexist without directly contradicting each other,' although they create tension."}, {"text": "Operate at different levels of generality, meaning they can coexist without directly contradicting each other, but create tension.", "isCorrect": true, "rationale": "The text clearly explains: 'These two arguments operate at different levels of generality, which means they can coexist without directly contradicting each other. It is logically possible that most wars are rackets and that some wars are necessary.'"}, {"text": "Both agree that financial interests are the sole drivers of all wars.", "isCorrect": false, "rationale": "Butler argues that wars are rackets driven by private profit, but Wilson's argument (as presented by the text) focuses on threats like submarine warfare, not solely financial drivers, for that specific war."}, {"text": "Both ignore the human cost of war in favor of political or economic considerations.", "isCorrect": false, "rationale": "Butler's Chapter 3 heavily emphasizes the human cost, showing that he does not ignore it. Wilson also acknowledges the 'fearful thing' of leading people into war."}], "id": "q09"}, {"question": "The text concludes by stating that a 'strongest reading of Butler' requires accepting which of his claims?", "options": [{"text": "That all wars are necessarily rackets driven by private profit.", "isCorrect": false, "rationale": "The text explicitly states: 'The strongest reading of Butler does not require accepting his claim that all wars are rackets.'"}, {"text": "That financial incentives within the war system make it dangerously easy to disguise profitable ventures as noble causes.", "isCorrect": true, "rationale": "The text clarifies: 'It requires only accepting his claim that the financial incentives built into the war system make it dangerously easy to dress up a profitable venture as a noble cause.'"}, {"text": "That Woodrow Wilson was a dishonest president who intentionally misled the American public.", "isCorrect": false, "rationale": "While Butler implies this, the 'strongest reading' focuses on the structural critique of the war system, allowing for the possibility that Wilson might have been sincere despite the system's flaws."}, {"text": "That the existence of genuine threats never justifies military action.", "isCorrect": false, "rationale": "The text raises this as a point of complexity that Butler's framework doesn't accommodate, rather than stating it's a necessary acceptance for a strong reading of Butler. It asks 'whether that structural critique is enough to justify Butler's absolutism, or whether the existence of genuine threats demands a more flexible framework.'"}], "id": "q10"}, {"question": "Butler's plain style in Chapter 4 — short sentences, imperative mood, no hedging — is the opposite of Wilson's long, periodic sentences and qualified phrasing. What does this contrast reveal about the different rhetorical problems each writer faced?", "options": [{"text": "It reveals that Butler was less educated than Wilson and therefore unable to write in a sophisticated style.", "isCorrect": false, "rationale": "The choice of plain style is rhetorical strategy, not a reflection of Butler's education. A two-time Medal of Honor recipient writing for a mass audience had strong reasons to choose directness as a deliberate craft decision."}, {"text": "Wilson needed to appear reluctant and reasonable to justify a decision already made; Butler needed to appear certain and action-oriented to overcome the inertia of audiences who might find his proposals too radical.", "isCorrect": true, "rationale": "Wilson was asking Congress and the public to accept a reversal of long-held neutrality — he had to seem measured, reluctant, and hedged to avoid appearing reckless. Butler was asking audiences to support sweeping structural reforms and needed to project total conviction to overcome skepticism. Their styles mirror their rhetorical situations."}, {"text": "Wilson was writing for a less sophisticated audience than Butler, requiring more elaborate explanation.", "isCorrect": false, "rationale": "Wilson addressed Congress and a national public, while Butler wrote a popular pamphlet explicitly aimed at ordinary Americans. If anything, Butler's audience was broader and less specialized than Wilson's Congressional audience."}, {"text": "The contrast is purely aesthetic and has no bearing on the persuasive effect of either text.", "isCorrect": false, "rationale": "Style is inseparable from persuasive effect. Hedged, qualified prose conveys deliberation and reluctance; direct, imperative prose conveys certainty and urgency. Both effects are essential to the respective rhetorical situations."}], "id": "q11"}, {"question": "The text says Butler's 'strongest reading' requires only accepting that financial incentives make it easy to dress profitable ventures as noble causes — not that all wars are rackets. Why is this a rhetorically important distinction for readers who are persuaded by Butler's diagnosis but uncertain about his proposals?", "options": [{"text": "It is important because it allows readers to dismiss Butler's proposals without engaging with his diagnosis.", "isCorrect": false, "rationale": "The distinction actually does the opposite: it allows readers to accept Butler's structural critique without being required to accept his most extreme claims, making the argument harder to dismiss wholesale."}, {"text": "It allows readers to accept Butler's structural critique of the war system without committing to his most absolutist claims, making his argument accessible to people who believe some wars are necessary.", "isCorrect": true, "rationale": "By separating the structural critique (financial incentives corrupt war decisions) from the absolutist claim (all wars are rackets), the text identifies a version of Butler's argument that does not require rejecting the possibility of necessary wars. This is a more defensible and persuasive form of the argument because it demands less of the reader."}, {"text": "It is important because it shows Butler himself was uncertain whether all wars were rackets.", "isCorrect": false, "rationale": "Butler shows no such uncertainty in the primary text — he writes with absolute conviction. The distinction is an analytical move by the textbook authors, not a reflection of Butler's own hedging."}, {"text": "It is important primarily for historians who want to evaluate Butler's specific claims about World War I.", "isCorrect": false, "rationale": "The distinction has broader rhetorical and logical significance for any reader evaluating Butler's argument, not just historians assessing a specific historical claim."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
