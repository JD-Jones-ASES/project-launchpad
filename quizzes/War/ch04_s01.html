<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War: A Debate in Primary Sources &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/War.html">&larr; Back to War: A Debate in Primary Sources</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 4, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to Butler, how did bankers manipulate the market for Liberty Bonds to maximize their own profits at the expense of the public?", "options": [{"text": "By depressing the price to approximately $84$ or $86$ dollars before stimulating a boom to sell at par.", "isCorrect": true, "rationale": "Bankers utilized their control of security marts to lower the value of bonds, buy them back from frightened citizens at a discount, and then sell them at or above the original price."}, {"text": "By increasing interest rates on the bonds to $1,800 \\%$ during the height of the conflict.", "isCorrect": false, "rationale": "While Butler mentions profits of $1,800 \\%$, these refer to general war profits, not the specific interest rate paid to the public on Liberty Bonds."}, {"text": "By forcing the government to default on bond payments to veterans returning from the front lines.", "isCorrect": false, "rationale": "Butler's argument is that the bonds were paid, but the profit came from the manipulation of market prices rather than a government default."}, {"text": "By preventing the public from selling their bonds until the price reached a pre-determined ceiling.", "isCorrect": false, "rationale": "The text states that the people 'got frightened and sold' because they were influenced by the bankers' manipulation of the market price."}]}, {"question": "What does Butler describe as the 'most crowning insolence' regarding the financial treatment of American soldiers during the World War?", "options": [{"text": "Being virtually forced to buy Liberty Bonds, effectively paying for their own ammunition and equipment.", "isCorrect": true, "rationale": "Butler highlights the irony of soldiers being 'blackjacked' into using their meager remaining wages to fund the very war they were fighting."}, {"text": "Having to pay $6$ dollars a month for accident insurance that the government refused to cover.", "isCorrect": false, "rationale": "While Butler mentions this expense, he reserves the term 'crowning insolence' for the forced purchase of Liberty Bonds."}, {"text": "The refusal of the government to pay any salary to conscripted soldiers until the Armistice was signed.", "isCorrect": false, "rationale": "Soldiers were paid a base salary of $30$ dollars, though most of it was deducted for other expenses."}, {"text": "Requiring soldiers to pay a community charge to support local charities while they were deployed.", "isCorrect": false, "rationale": "Half the wage was taken to support 'dependents' so they would not become a charge upon the community, but this was a separate deduction from the 'insolence' of bond purchases."}]}, {"question": "In Butler's proposed reform to 'take the profit out of war,' what specific economic restriction does he suggest for the nation's leadership and industry?", "options": [{"text": "Limiting the monthly income of all executives, politicians, and military officers to the wage of a soldier in the trenches.", "isCorrect": true, "rationale": "Butler argues that if everyone from the CEO to the General were restricted to $30$ dollars a month, the incentive for war would vanish within thirty days."}, {"text": "Mandating that $100 \\%$ of all corporate profits be donated to the families of deceased soldiers.", "isCorrect": false, "rationale": "Butler proposes conscripting capital and industry rather than simply taxing profits after they are made."}, {"text": "Requiring all munitions manufacturers to work for a fixed $10 \\%$ profit margin determined by Congress.", "isCorrect": false, "rationale": "Butler suggests that a limited profit is still a 'racket'; his reform is more radical, capping individual income at the level of a common soldier."}, {"text": "Freezing all bank accounts associated with international trade until a peace treaty is signed.", "isCorrect": false, "rationale": "While Butler critiques bankers, his specific reform focuses on the conscription of labor and income parity during the conflict."}]}, {"question": "How does Butler propose to change the voting process for declaring war through a 'limited plebiscite'?", "options": [{"text": "Only those who are of military age and eligible to be called to service would be permitted to vote.", "isCorrect": true, "rationale": "Butler believes that those who must 'do the fighting and dying' should be the only ones with the power to decide if the nation enters a war."}, {"text": "Restricting the vote to veterans who have already served in at least one foreign conflict.", "isCorrect": false, "rationale": "The proposal focuses on those who *would be* called to serve in the specific war being voted upon, not just existing veterans."}, {"text": "Excluding any person who owns more than $10,000$ dollars in stocks or bonds from the decision-making process.", "isCorrect": false, "rationale": "While he critiques the wealthy, his plebiscite is restricted based on military eligibility and physical fitness, not property ownership."}, {"text": "Allowing only the mothers and wives of potential soldiers to vote on a declaration of war.", "isCorrect": false, "rationale": "Butler mentions the suffering of families, but his specific legislative proposal for the plebiscite targets the men who would actually bear arms."}]}, {"question": "What geographical limitation does Butler suggest for the United States Navy to ensure it remains a purely defensive force?", "options": [{"text": "Ships should be prohibited by law from traveling further than $200$ miles from the United States coastline.", "isCorrect": true, "rationale": "Butler argues that such a limit would prevent offensive maneuvers and provocations, such as the USS Maine's presence in Havana Harbor."}, {"text": "The Navy should be restricted to patrolling only the Atlantic and Pacific ports without entering international waters.", "isCorrect": false, "rationale": "The text provides a specific numerical distance of $200$ miles as the proposed legal limit for naval operations."}, {"text": "Naval vessels should be forbidden from approaching within $500$ miles of any foreign territory.", "isCorrect": false, "rationale": "Butler's limit is measured from the U.S. coastline inward, not based on the distance from foreign shores."}, {"text": "The fleet should be permanently anchored in domestic harbors unless an invasion has already begun.", "isCorrect": false, "rationale": "Butler allows for movement and 'defense purposes' within a specified zone of $200$ miles from the coast."}]}, {"question": "According to the text, what was the underlying reason the United States entered the World War despite Woodrow Wilson's campaign promises?", "options": [{"text": "The financial necessity of ensuring the Allied powers could repay their massive debts to American bankers and manufacturers.", "isCorrect": true, "rationale": "Butler asserts that the Allied commission told the President they could not pay back the $5$ to $6$ billion dollars owed if they lost the war."}, {"text": "A sudden shift in public opinion following a series of radio broadcasts by the Allied commission.", "isCorrect": false, "rationale": "Butler explicitly states that radio was not available to broadcast these proceedings and that the public was never asked for their opinion."}, {"text": "The discovery of a German plot to dismantle American democracy through the use of secret agents.", "isCorrect": false, "rationale": "Butler dismisses the 'safe for democracy' rhetoric as a cover for the true motive, which he claims was related to the debt owed to bankers."}, {"text": "The collapse of the 'medal business' which left the military unable to recruit volunteers.", "isCorrect": false, "rationale": "While Butler discusses medals as a cheap recruitment tool, he cites the five-billion-dollar debt as the reason for the actual declaration of war."}]}, {"question": "Why does Butler believe that professional soldiers and sailors are unlikely to support genuine disarmament at international conferences?", "options": [{"text": "Disarmament would lead to the loss of their jobs, commands, and institutional power.", "isCorrect": true, "rationale": "Butler argues that no admiral wants to be without a ship and no general without a command, as it renders them 'men without jobs.'"}, {"text": "They believe that modern warfare can only be won through the use of chemical and gas weapons.", "isCorrect": false, "rationale": "While scientists are developing these weapons, Butler's critique of the professional military focuses on their personal career interests in maintaining large fleets and armies."}, {"text": "They are prohibited from speaking at these conferences due to diplomatic secrecy laws.", "isCorrect": false, "rationale": "Butler notes that we *do* send professional soldiers and sailors to these conferences, but they fail to achieve peace for other reasons."}, {"text": "They are fundamentally 'sentimental' and prefer the aesthetic of large-scale naval maneuvers.", "isCorrect": false, "rationale": "Butler uses the term 'swivel-chair admirals' to describe their lobbying, but emphasizes their economic and career-driven motivations over sentiment."}]}, {"question": "What irony does Butler point out regarding the technology and manufacturing used against American soldiers on the battlefield?", "options": [{"text": "American soldiers were often killed by weapons or submarines built using United States patents and domestic manufacturing.", "isCorrect": true, "rationale": "Butler highlights that soldiers were never told they might be shot by 'bullets made by their own brothers' or torpedoed by ships built with U.S. patents."}, {"text": "The American government purposely provided the Germans with inferior steel to ensure an Allied victory.", "isCorrect": false, "rationale": "There is no mention of sabotage by the government; Butler instead emphasizes that the profit motive led to the cross-border sharing of lethal technology."}, {"text": "The soldiers were required to build their own equipment in the trenches while manufacturers took the credit.", "isCorrect": false, "rationale": "Butler describes soldiers being 'blackjacked' into paying for equipment, but the manufacturing itself was done by profitable domestic firms."}, {"text": "The use of chemical gases made the traditional weapons produced by munitions makers obsolete.", "isCorrect": false, "rationale": "Butler discusses gases as a future threat, but the irony he mentions regarding current weaponry is its domestic origin."}]}, {"question": "According to the Chief Surgeon at the Milwaukee veteran's hospital, how much higher is the mortality rate for veterans compared to those who stayed home?", "options": [{"text": "Three times as great.", "isCorrect": true, "rationale": "The text explicitly states that mortality among veterans is three times that of those who did not serve in the conflict."}, {"text": "Two times as great.", "isCorrect": false, "rationale": "Butler cites the figure as three times, highlighting the severe long-term physical toll of the war."}, {"text": "$1,500 \\%$ higher.", "isCorrect": false, "rationale": "$1,500 \\%$ is a figure Butler uses to describe corporate war profits, not the human mortality rate."}, {"text": "Ten times as great.", "isCorrect": false, "rationale": "Butler notes the 'destroyed men' but specifies the mortality multiplier as three, not ten."}]}, {"question": "How does Butler characterize the use of 'beautiful ideals' and propaganda during the World War?", "options": [{"text": "As a means to stuff patriotism down the throats of the youth to hide the reality of huge war profits.", "isCorrect": true, "rationale": "Butler argues that phrases like 'safe for democracy' were slogans used to distract from the economic motives of the war racket."}, {"text": "As a necessary tool for maintaining the morale of the $4,000,000$ young men in uniform.", "isCorrect": false, "rationale": "Butler is critical of the propaganda, viewing it as a manipulative tactic rather than a 'necessary' morale booster."}, {"text": "As a successful strategy for ensuring that the world remained democratic eighteen years later.", "isCorrect": false, "rationale": "Butler points out that eighteen years after the war, the world actually had less democracy than it did before the conflict."}, {"text": "As a way to encourage clergymen to promote a message of peace and divine intervention.", "isCorrect": false, "rationale": "Butler notes the opposite: that clergymen joined the 'clamor to kill' and claimed God was on their side."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
