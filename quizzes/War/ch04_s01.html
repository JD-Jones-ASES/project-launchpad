<script>
var QUESTIONS = [{"question": "What is the fundamental shift in content and purpose from Chapters 1-2 to Chapters 3-5 of Smedley Butler's War Is a Racket, as described in the section?", "options": [{"text": "From historical anecdotes to detailed statistical data.", "isCorrect": false, "rationale": "Chapters 1-2 already contained significant corporate profit data. The shift is not primarily in the type of evidence but its purpose."}, {"text": "From a detailed diagnosis of the problem to proposed solutions and a passionate call to action.", "isCorrect": true, "rationale": "The text explicitly states this shift: 'Chapters 1–2... are diagnostic... Chapters 3–5 are prescriptive... This shift from analysis to action is a common structure in persuasive writing'."}, {"text": "From personal testimonials of soldiers to academic theories of warfare.", "isCorrect": false, "rationale": "While Chapter 3 discusses the human cost, the overall shift for Chapters 3-5 is broader than just testimonials, focusing on policy and passionate argument rather than academic theories."}, {"text": "From a global analysis of war to a focus solely on American domestic policy.", "isCorrect": false, "rationale": "The text does not indicate a shift in the geographical scope of the analysis, but rather in the nature of the argument (diagnosis to prescription)."}], "id": "q01"}, {"question": "According to the text, what was the primary rhetorical purpose of Butler's detailed description of veterans' suffering in Chapter 3, before presenting his policy proposals?", "options": [{"text": "To provide additional statistical evidence of war's economic cost.", "isCorrect": false, "rationale": "Chapter 3 focuses on the human, emotional, and physical cost, not additional economic statistics, which were prominent in Chapters 1-2."}, {"text": "To establish the urgency of the problem and ensure readers evaluate reforms as urgent responses to real suffering.", "isCorrect": true, "rationale": "The text states, 'By placing the human cost before his policy proposals, Butler ensures that readers evaluate his reforms not as abstract ideas but as urgent responses to real suffering.'"}, {"text": "To emotionally manipulate readers without offering practical solutions.", "isCorrect": false, "rationale": "While it uses emotion, it is placed specifically to *frame* the practical solutions that follow, making them seem more necessary, not to avoid offering them."}, {"text": "To critique the medical system's inability to care for veterans.", "isCorrect": false, "rationale": "While the descriptions imply failures in care, the primary rhetorical purpose described is to make the subsequent policy proposals urgent and relevant to human suffering, not solely a critique of healthcare."}], "id": "q02"}, {"question": "Butler's first proposal, 'Conscript capital before conscripting men,' directly aims to address which aspect of the 'war is a racket' diagnosis?", "options": [{"text": "The lack of military readiness among the general population.", "isCorrect": false, "rationale": "The proposal focuses on capital, industry, and labor, not on the physical readiness of individuals for military service."}, {"text": "The financial exploitation and profit motive that drives war for a small number of insiders.", "isCorrect": true, "rationale": "The text explicitly states this proposal 'removes the profit motive' by limiting everyone involved, including corporate executives, to the same pay as soldiers."}, {"text": "The ethical dilemma of involuntary military service.", "isCorrect": false, "rationale": "While related to conscription, the 'conscript capital' part of the proposal specifically targets financial equality and the profit motive, not the ethics of conscription itself."}, {"text": "The difficulty in funding prolonged military conflicts.", "isCorrect": false, "rationale": "The proposal seeks to redistribute the burden and remove profit, not to simply make funding easier. It addresses *who* profits, not the availability of funds."}], "id": "q03"}, {"question": "Who, according to Butler's 'limited plebiscite' proposal, should have the sole power to authorize war?", "options": [{"text": "The sitting President and military generals.", "isCorrect": false, "rationale": "Butler's proposal specifically transfers this decision away from those who typically make it, like Congress or military leaders."}, {"text": "All adult citizens of the nation through a general election.", "isCorrect": false, "rationale": "The plebiscite is 'limited,' meaning it is not open to all adult citizens but restricted to a specific demographic."}, {"text": "Members of Congress, as per the U.S. Constitution.", "isCorrect": false, "rationale": "The text states the decision to go to war should be made 'not by Congress' under Butler's proposal."}, {"text": "Young men of military age who pass a physical examination.", "isCorrect": true, "rationale": "The text states the decision should be made 'by those who will actually fight — young men of military age who pass a physical examination.'"}], "id": "q04"}, {"question": "If Butler's proposal to restrict the military to defense were implemented, what specific outcome would he expect regarding offensive wars?", "options": [{"text": "It would significantly reduce the financial burden of maintaining a large military.", "isCorrect": false, "rationale": "While a possible secondary effect, the text's primary stated goal for this proposal is about making offensive war impossible, not just reducing cost."}, {"text": "It would make offensive war physically impossible by limiting operational range for naval vessels, aircraft, and the army.", "isCorrect": true, "rationale": "The text explicitly states this proposal 'makes offensive war physically impossible' by setting specific distance limits for military operations."}, {"text": "It would enhance America's ability to respond to immediate threats within its borders.", "isCorrect": false, "rationale": "The focus of the proposal is on preventing *offensive* war, not specifically enhancing domestic defense capabilities, though that might be a byproduct."}, {"text": "It would require a larger standing army to compensate for reduced naval and air power.", "isCorrect": false, "rationale": "The proposal limits all branches of the military to defensive roles and specified ranges, not shifting resources to enlarge one branch."}], "id": "q05"}, {"question": "The text describes Butler's rhetorical strategy in Chapters 3-5 as moving from 'evidence to policy to passion.' Which sequence best exemplifies this structure within these chapters?", "options": [{"text": "Corporate profit data → arguments for capitalism → 'TO HELL WITH WAR!'", "isCorrect": false, "rationale": "Corporate profit data was the focus of Chapters 1-2, not the starting 'evidence' for the Ch 3-5 sequence."}, {"text": "Descriptions of veterans' suffering → three concrete reforms → naming Woodrow Wilson and his 'TO HELL WITH WAR!' cry.", "isCorrect": true, "rationale": "This sequence directly matches the text: 'He moves from evidence (the human cost) to policy (the three proposals) to passion (the peroration),' which includes naming Wilson and the famous closing line."}, {"text": "Definitions of military terms → historical accounts of past wars → calls for peace treaties.", "isCorrect": false, "rationale": "This does not align with the specific content or the 'evidence, policy, passion' structure described for Chapters 3-5."}, {"text": "Analysis of international relations → detailed economic models → an appeal to national pride.", "isCorrect": false, "rationale": "This is too generalized and does not reflect the specific content or the 'evidence, policy, passion' structure of Butler's argument."}], "id": "q06"}, {"question": "What distinguishes Butler's 'peroration' in Chapter 5 from his earlier chapters (3 and 4)?", "options": [{"text": "It introduces new statistical data and detailed financial analysis.", "isCorrect": false, "rationale": "The text states Chapter 5 'drops the data, drops the policy details'."}, {"text": "It shifts from emotional appeals to a purely logical and dispassionate conclusion.", "isCorrect": false, "rationale": "Chapter 5 'speaks from the gut' and is described as a 'passionate conclusion,' indicating increased emotional appeal rather than a shift away from it."}, {"text": "It becomes more personal, emotional, and focuses on a passionate call to action rather than data or policy details.", "isCorrect": true, "rationale": "Chapter 5 is described as Butler's 'closing argument,' where he 'drops the data, drops the policy details, and speaks from the gut,' ending with a powerful, emotional statement."}, {"text": "It primarily serves to summarize the proposals without adding new arguments.", "isCorrect": false, "rationale": "While it serves as a conclusion, it also introduces new specific arguments, such as naming Woodrow Wilson and attributing the war to financial interests, rather than just summarizing."}], "id": "q07"}, {"question": "According to Butler's argument in Chapter 5, what was the true underlying reason for Woodrow Wilson's sudden reversal on his promise to keep America out of World War I?", "options": [{"text": "A direct threat to American security posed by the Zimmermann Telegram.", "isCorrect": false, "rationale": "The text states this was 'Wilson's own explanation,' not Butler's. Butler offers a different, financially-driven reason."}, {"text": "The pressure from American public opinion which overwhelmingly favored war.", "isCorrect": false, "rationale": "The text does not mention public opinion as Butler's reason for Wilson's reversal; instead, it focuses on financial motives."}, {"text": "The financial interests and billions owed to American bankers by Allied powers.", "isCorrect": true, "rationale": "Butler 'argues that the real reason America entered the war was money — the billions owed to American bankers by the Allied powers.'"}, {"text": "A desire to establish America as a dominant global military power.", "isCorrect": false, "rationale": "This is not the reason Butler gives for Wilson's reversal; Butler's argument centers on financial self-interest."}], "id": "q08"}, {"question": "Among Butler's three proposals, which one is most directly designed to attack the 'racket' by changing *who* benefits or suffers from the decision to go to war?", "options": [{"text": "Conscript capital before conscripting men.", "isCorrect": false, "rationale": "This proposal targets the *profit motive* by ensuring financial equality, but not directly *who makes the decision* to go to war."}, {"text": "Hold a limited plebiscite.", "isCorrect": true, "rationale": "The text states this proposal 'transfers the decision from those who benefit to those who suffer,' directly addressing who makes the war decision and bears its consequences."}, {"text": "Restrict the military to defense.", "isCorrect": false, "rationale": "This proposal aims to make offensive war impossible by limiting military range, but it doesn't directly alter the decision-making process for initiating war."}, {"text": "Establish an international peace-keeping organization.", "isCorrect": false, "rationale": "This is not one of the three specific proposals mentioned in the text for Butler."}], "id": "q09"}, {"question": "The text asks readers to consider whether the 'passion of Chapter 5 strengthen or weaken the policy arguments of Chapter 4.' This question primarily prompts readers to analyze what aspect of Butler's writing?", "options": [{"text": "The factual accuracy of his corporate profit data and historical claims.", "isCorrect": false, "rationale": "The question is about the *impact of passion on policy arguments*, not the factual accuracy of earlier data or claims."}, {"text": "The logical consistency and emotional impact of his rhetorical strategies.", "isCorrect": true, "rationale": "This question directly asks about how a specific rhetorical element (passion) affects the perception of other elements (policy arguments), which is an analysis of rhetorical strategy and its impact on judgment."}, {"text": "The feasibility and practicality of his three specific policy proposals.", "isCorrect": false, "rationale": "While the question might indirectly touch on how passion affects the perception of feasibility, its primary focus is on the *interaction* between emotion and logic in persuasive writing, not just the proposals' practicality."}, {"text": "The biographical details of Smedley Butler's military career.", "isCorrect": false, "rationale": "The question is about the text's argument and structure, not the author's biography."}], "id": "q10"}, {"question": "Butler's pamphlet shifts from diagnosis (Chapters 1-2) to prescription (Chapters 3-5). The section warns that 'diagnosing a problem well does not mean the diagnosis implies a particular cure.' What does this warning reveal about the logical structure of Butler's argument?", "options": [{"text": "It means Butler's factual evidence in Chapters 1-2 was unreliable, undermining his entire argument.", "isCorrect": false, "rationale": "The warning is about logical structure, not factual reliability. The diagnosis could be entirely accurate and the proposed cures could still not follow necessarily from it."}, {"text": "It reveals that the first half (diagnosis) and second half (prescription) are logically separable — readers might accept that war is a racket while rejecting his specific proposals for ending it.", "isCorrect": true, "rationale": "Even if Butler has proven that war serves corporate interests (diagnosis), it does not logically follow that his specific solutions (conscript capital, limit plebiscite, defense-only military) are the correct ones. Other responses to the same problem are possible, and accepting his analysis does not commit a reader to his proposals."}, {"text": "It suggests that Butler's three proposals were added to the pamphlet by his publisher and do not represent his own thinking.", "isCorrect": false, "rationale": "The warning is about logical relationships between parts of an argument, not about authorship of specific sections."}, {"text": "It shows that Butler was a better critic than a policy thinker, and therefore his diagnosis should be trusted more than his prescription.", "isCorrect": false, "rationale": "The warning is a general logical principle about the relationship between identifying a problem and proposing solutions, not a personal assessment of Butler's comparative strengths."}], "id": "q11"}, {"question": "Butler proposes that only those who would fight in a war should vote on whether to declare one — including service members and those within artillery range of the coast. What assumption about democratic legitimacy underlies this proposal, and what is its strongest critique?", "options": [{"text": "The assumption is that Congress is corrupt; the critique is that it ignores the wisdom of elected representatives.", "isCorrect": false, "rationale": "While Butler distrusts the war-making process, the proposal's democratic logic is more specific: it concerns who has standing to decide on something that will directly cost them their lives or safety."}, {"text": "The assumption is that democratic legitimacy requires that those who bear the costs of a decision have the primary right to make it; the critique is that this framework would exclude the civilian population whose safety and economic security are also at stake.", "isCorrect": true, "rationale": "Butler's proposal rests on the principle that decision rights should follow risk and sacrifice. The strongest critique is that wars affect civilians as well as soldiers — those who lose livelihoods, homes, or family members in wartime also bear real costs and arguably deserve a voice in the decision."}, {"text": "The assumption is that soldiers are more patriotic than civilians; the critique is that military service does not confer superior moral judgment.", "isCorrect": false, "rationale": "Butler's proposal is not based on patriotism or superior moral judgment but on direct stake in the outcome. The distinction is about risk and sacrifice, not character."}, {"text": "The assumption is that professionals should make decisions in their own domain; the critique is that it creates a military oligarchy where soldiers rule on all questions of war.", "isCorrect": false, "rationale": "Butler's proposal specifically limits the vote to a single war declaration question, not a general principle that soldiers should govern all military matters."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
