        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">

        <a href="../../courses/War.html">&larr; Back to War: A Debate in Primary Sources</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 5, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How did Woodrow Wilson's perspective on the nature of combat differ from that of Oliver Wendell Holmes as described in the text?", "options": [{"text": "Wilson viewed war as a 'fearful thing' rather than a means of ennobling the human soul.", "isCorrect": true, "rationale": "The text explicitly contrasts Holmes's belief that battle ennobles the soul with Wilson's description of entering the war as a 'fearful thing'."}, {"text": "Wilson argued that the system producing war was corrupt, while Holmes believed the system was inherently just.", "isCorrect": false, "rationale": "The text states that the philosophical disagreement about war's effect on character was between Holmes and Butler, not Wilson."}, {"text": "Wilson believed war was a biological necessity, whereas Holmes saw it as a political failure.", "isCorrect": false, "rationale": "The source material does not attribute a belief in biological necessity to Wilson, focusing instead on his political and moral justifications."}, {"text": "Wilson celebrated the martial virtues of soldiers, while Holmes focused on the economic costs.", "isCorrect": false, "rationale": "This reverses the roles; Holmes is the one associated with the ennobling nature of war, while Butler, not Holmes, focuses on economic costs."}]}, {"question": "According to Wilson's political argument, why was the United States justified in entering World War I despite the generally unjust nature of most historical conflicts?", "options": [{"text": "The war was an inevitable result of global economic competition that the U.S. could no longer avoid.", "isCorrect": false, "rationale": "While Wilson said the war was unavoidable, his justification rested on moral principles and specific provocations, not general economic competition."}, {"text": "He distinguished between the corrupt category of 'war-in-general' and the specific moral necessity of this particular conflict.", "isCorrect": true, "rationale": "Wilson's argument rests on the distinction between war as a general category and a particular war fought for democratic principles and self-defense."}, {"text": "The Zimmermann Telegram proved that Germany intended to seize American territory for resource extraction.", "isCorrect": false, "rationale": "The telegram concerned drawing Mexico into the war, and while it was a provocation, Wilson's broader argument was about the survival of democracy."}, {"text": "He believed that any war fought by a democratic nation is inherently more just than those fought by autocracies.", "isCorrect": false, "rationale": "Wilson admitted that many wars are unjust or selfish; his claim was specific to the principles at stake in 1917, not a blanket rule for democracies."}]}, {"question": "What primary evidence did Smedley Butler provide to support his claim that the war was motivated by profit rather than principle?", "options": [{"text": "Leaked diplomatic cables showing that Wall Street dictated the terms of the Zimmermann Telegram.", "isCorrect": false, "rationale": "Butler used public economic data rather than secret diplomatic leaks to make his case."}, {"text": "Testimony from soldiers who were forced to pay for their own supplies while overseas.", "isCorrect": false, "rationale": "While he mentions soldier pay, his primary evidence consists of corporate profit data compared to peacetime earnings."}, {"text": "Comparative data showing the massive disparity between soldier pay and the increased profits of specific industrial corporations.", "isCorrect": true, "rationale": "Butler provided specific dollar figures for companies like Du Pont and Bethlehem Steel to highlight the gap between soldier sacrifice and corporate gain."}, {"text": "Documents proving that British and French banks had bribed American congressmen to authorize the war.", "isCorrect": false, "rationale": "Butler argued that the motive was to save existing investments and loans, not necessarily through direct bribery of officials."}]}, {"question": "In the context of Butler’s critique, what is the function of 'window dressing'?", "options": [{"text": "To provide a transparent account of the logistical requirements of modern warfare.", "isCorrect": false, "rationale": "Window dressing is described as a misleading display, the opposite of a transparent account."}, {"text": "To create a misleadingly favorable impression of war by using noble rhetoric like 'democracy' to hide economic motives.", "isCorrect": true, "rationale": "The text defines window dressing as a deceptive display designed to mask the reality of war as a profitable enterprise."}, {"text": "To ensure that the civilian population is properly informed about the costs of combat.", "isCorrect": false, "rationale": "Butler argues that this rhetoric is used to 'convince' or mislead ordinary citizens, not to inform them of the true costs."}, {"text": "To justify the peacetime expansion of the military-industrial complex.", "isCorrect": false, "rationale": "While related, Butler's specific use of the term refers to the language used to justify entry into a specific war for profit."}]}, {"question": "How does the text qualify the comparison between Wilson and Butler regarding the 'Timing Problem'?", "options": [{"text": "Butler had the advantage of knowing that the Treaty of Versailles failed to secure a lasting democratic peace.", "isCorrect": true, "rationale": "The text notes that Butler wrote in 1935 with the benefit of hindsight, seeing the 'wreckage' of the failed peace settlement."}, {"text": "Wilson was writing during the Great Depression, which influenced his focus on international commerce.", "isCorrect": false, "rationale": "Wilson spoke in 1917, before the Great Depression; it was Butler who wrote in the 1930s."}, {"text": "The disparity in their dates makes Butler’s argument inherently more accurate than Wilson’s.", "isCorrect": false, "rationale": "The text cautions that hindsight is not the same as refutation; an argument can be reasonable at the time it was made even if it fails."}, {"text": "Both men were speaking with full knowledge of the economic outcomes of the war.", "isCorrect": false, "rationale": "Wilson was making decisions in real-time with incomplete information, whereas Butler had eighteen years of retrospective data."}]}, {"question": "Which statement best summarizes the 'Caution' regarding 'Hindsight' provided in the text?", "options": [{"text": "If a war's predicted outcomes do not manifest, the initial reasons for the war must have been dishonest.", "isCorrect": false, "rationale": "This is exactly what the caution warns against, stating that sincerity and accuracy are not the same thing."}, {"text": "Sincerity in making an argument does not guarantee its accuracy, and a reasonable argument can still lead to a wrong prediction.", "isCorrect": true, "rationale": "The caution clarifies that Wilson might have been sincere even if his predictions failed, and Butler might be right about motives despite his retrospective vantage point."}, {"text": "Retrospective analysis is always more valid than real-time decision-making because it relies on completed data sets.", "isCorrect": false, "rationale": "The text suggests both methods (stated reasons vs. structural incentives) have merits and should be used together."}, {"text": "Wilson’s failure to predict the Second World War proves that his initial justifications were mere window dressing.", "isCorrect": false, "rationale": "The text argues it is 'not quite fair' to judge a leader's justification solely by subsequent events they could not have known."}]}, {"question": "Wilson's argument that the righteousness of a cause is independent of the financial interests involved contrasts with Butler’s view that:", "options": [{"text": "Democratic principles can only be upheld through economic stability.", "isCorrect": false, "rationale": "Butler does not argue for democratic principles; he argues that those principles are a cover for economic interests."}, {"text": "The presence of massive profit means the stated cause is never truly independent of financial interests.", "isCorrect": true, "rationale": "Butler contends that when enormous profits are at stake, the 'noble cause' is inextricably linked to those financial incentives."}, {"text": "War is only justified when the profit is shared equally among the citizens and soldiers.", "isCorrect": false, "rationale": "Butler highlights the inequality of profit, but his core argument is that the pursuit of profit is the secret driver of war itself."}, {"text": "Nations should only fight wars that provide a clear return on investment for the taxpayers.", "isCorrect": false, "rationale": "Butler's critique is that the 'return' goes to corporations and banks, not the ordinary citizens who do the fighting."}]}, {"question": "In the section 'Principled War vs. Profitable War,' what is identified as the fundamental clash between Wilson and Butler's analytical methods?", "options": [{"text": "Whether democratic nations are superior to autocratic ones.", "isCorrect": false, "rationale": "This was a provocation Wilson cited, but the core clash is about how to analyze a nation's motives for war."}, {"text": "Whether we should prioritize military readiness or economic growth.", "isCorrect": false, "rationale": "The text focuses on the motives for war, not a general debate on national priorities."}, {"text": "Whether to trust the stated reasons of leaders or the structural incentives of the system.", "isCorrect": true, "rationale": "The conclusion of the text summarizes the clash as a choice between taking principles seriously (Wilson) or following the money (Butler)."}, {"text": "Whether diplomacy is more effective than armed conflict in preserving sovereignty.", "isCorrect": false, "rationale": "While Wilson initially tried to avoid war, the text focuses on the justification for entering it, not the efficacy of diplomacy."}]}, {"question": "Which of the following was NOT a specific industrial entity mentioned by Butler as having profited from the war?", "options": [{"text": "Standard Oil", "isCorrect": true, "rationale": "While a major corporation, Standard Oil is not among the four specific companies listed in the text (Du Pont, Bethlehem Steel, U.S. Steel, Anaconda Copper)."}, {"text": "U.S. Steel", "isCorrect": false, "rationale": "U.S. Steel is explicitly named as one of the companies that earned profits in the hundreds of millions."}, {"text": "Anaconda Copper", "isCorrect": false, "rationale": "Anaconda Copper is specifically listed by Butler as a company that benefited from the war."}, {"text": "Du Pont", "isCorrect": false, "rationale": "Du Pont is cited by Butler as one of the corporations that saw massive profit increases during the conflict."}]}, {"question": "According to the text, what did the Zimmermann Telegram represent in Wilson's argument for war?", "options": [{"text": "A general example of the corruption inherent in all European diplomacy.", "isCorrect": false, "rationale": "Wilson used it as a specific provocation, not a general indictment of all diplomacy."}, {"text": "A structural incentive that benefited American manufacturing interests.", "isCorrect": false, "rationale": "The telegram was a political/military provocation; Butler, not Wilson, focused on structural economic incentives."}, {"text": "An immediate provocation that threatened American sovereignty.", "isCorrect": true, "rationale": "The text lists the Zimmermann Telegram as a revelation of active German attempts to draw Mexico into a war against the U.S."}, {"text": "The primary economic reason for protecting Wall Street's investments.", "isCorrect": false, "rationale": "The telegram was about military alliance and territory, whereas Butler argued the economic reasons were hidden behind such rhetoric."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
