<script>
var QUESTIONS = [{"question": "According to the section, why is Erich Maria Remarque's novel, All Quiet on the Western Front, included in a book about American arguments over war, despite Remarque not being American and the work being fiction?", "options": [{"text": "Because it offers a highly accurate historical account of specific battles and strategic decisions on the Western Front, serving as a primary source for military historians.", "isCorrect": false, "rationale": "The text explicitly states that a novel is 'not a primary source in the way that a speech or a pamphlet is' and is 'not factually accurate in every detail.' Its value is in capturing a truth, not providing factual accuracy of specific events or strategies."}, {"text": "Because it provides a unique, visceral perspective into the direct experience of combat, which other authoritative voices in the book, like Holmes, Butler, and Wilson, do not.", "isCorrect": true, "rationale": "The text states, 'Remarque provides something the other three voices cannot... he puts you in the trench, under the shells, next to the dying.' This direct, experiential perspective is highlighted as the primary reason for its inclusion."}, {"text": "To demonstrate that even authors from enemy nations shared similar patriotic ideals and motivations for fighting during World War I.", "isCorrect": false, "rationale": "The novel's plot describes Paul Bäumer's initial patriotic ideals being 'swept up by patriotic speeches' only to find 'no resemblance to the glorious war their teacher described,' suggesting a disillusionment rather than shared ideals. The text emphasizes the *experience* of war, not shared patriotism."}, {"text": "It serves as an example of how persuasive rhetoric, even in a fictional form, can be used to influence public opinion against war, similar to Butler's pamphlet.", "isCorrect": false, "rationale": "While the novel does argue against war by showing its horrors, the text differentiates it from traditional rhetoric, noting it makes its argument 'without ever stating a thesis.' Its inclusion is for its unique experiential depth, not primarily as a model of persuasive rhetoric."}], "id": "q01"}, {"question": "The narrator in the excerpt states, 'The front is a cage in which we must await fearfully whatever may happen. We lie under the network of arching shells and live in a suspense of uncertainty. Over us Chance hovers. If a shot comes, we can duck, that is all; we neither know nor can determine where it will fall.' This description most directly challenges which concept presented by one of the other historical figures mentioned in the section?", "options": [{"text": "Wilson's assertion that war is a 'fearful thing' by showing the soldiers' indifference to their fate.", "isCorrect": false, "rationale": "While the passage does mention that 'Chance... makes us indifferent,' it also explicitly states the soldiers 'await fearfully' and live in 'suspense of uncertainty.' This doesn't challenge Wilson's acknowledgment of war's fearfulness, but rather elaborates on its pervasive, arbitrary nature."}, {"text": "Butler's economic analysis of war as a 'racket' by emphasizing the existential rather than financial cost.", "isCorrect": false, "rationale": "The excerpt focuses on the immediate, physical, and psychological experience of combat. While this perspective is different from Butler's economic analysis, it doesn't directly challenge the *validity* of Butler's claim, but rather its *relevance* to the men in the trenches, as suggested in the 'Reality Check' section."}, {"text": "Holmes' 'soldier's faith' by depicting war as a random and uncontrollable ordeal where individual virtue or purpose holds little sway over survival.", "isCorrect": true, "rationale": "The 'Reality Check' section specifically asks: 'Where is Holmes' 'soldier's faith' in this passage? Does the experience Remarque describes look like a school of virtue?' The excerpt's emphasis on 'Chance' and uncontrollable events, where survival is arbitrary ('No soldier outlives a thousand chances. But every soldier believes in Chance and trusts his luck'), directly contradicts the idea of a virtuous, purposeful 'soldier's faith' that shapes destiny."}, {"text": "The idea that technology, like advanced artillery, makes warfare more predictable and less deadly for individual soldiers.", "isCorrect": false, "rationale": "The text actually describes increased enemy artillery strength and the danger of their own worn-out artillery, indicating that technology contributes to the unpredictability and deadliness of war, not the opposite. This option misinterprets the role of technology."}], "id": "q02"}, {"question": "Based on the 'Reading Fiction as Evidence' note, what is the most appropriate way for a historian studying World War I to utilize *All Quiet on the Western Front*?", "options": [{"text": "To verify the exact casualty numbers and movements of specific units during the Battle of the Somme and other engagements.", "isCorrect": false, "rationale": "The note explicitly states that the novel is not 'factually accurate in every detail' and that historians cite it 'not because it is factually accurate.' Therefore, using it for precise statistical or tactical verification would be inappropriate."}, {"text": "To understand the authentic physical sensations, emotional impact, and psychological truths of trench warfare from a soldier's perspective.", "isCorrect": true, "rationale": "The note explains that the novel 'draws on Remarque's own experience... and its power comes from the authenticity of its physical and emotional detail.' Historians cite it because 'it captures a truth about the war that statistics and policy arguments cannot convey.' This aligns perfectly with using it for emotional and psychological understanding."}, {"text": "As a direct, unmediated primary source document, equivalent to a soldier's diary or an official military report from the front lines.", "isCorrect": false, "rationale": "The note clarifies, 'A novel is not a primary source in the way that a speech or a pamphlet is. Remarque invented Paul Bäumer and the specific events of the story.' Therefore, treating it as an unmediated primary source would be incorrect."}, {"text": "To analyze the political propaganda techniques used by the German government to motivate young men to enlist in the war.", "isCorrect": false, "rationale": "While the novel mentions Paul Bäumer being 'swept up by patriotic speeches from their schoolteacher,' the text focuses on Remarque's depiction of the *reality* of war, not an analysis of propaganda techniques. The section's main point about Remarque is his unique depiction of combat experience."}], "id": "q03"}, {"question": "Erich Maria Remarque's eventual exile from Germany and loss of citizenship was a direct consequence of which of the following?", "options": [{"text": "His decision to enlist in the German army at eighteen, which was seen as a betrayal by pacifist groups after the war.", "isCorrect": false, "rationale": "Remarque was 'drafted into the German army' at eighteen, not that he 'decided to enlist.' His military service itself was not the cause of his exile; it was his truthful portrayal of its horrors later that led to persecution."}, {"text": "His work as a journalist and advertising copywriter, which the Nazi regime deemed as promoting foreign ideas.", "isCorrect": false, "rationale": "While he worked as a journalist and copywriter, these professions were not stated as the cause of his exile. The text specifically links his persecution to his book."}, {"text": "The international success of *All Quiet on the Western Front*, which the Nazi regime condemned for its truthful, unromantic portrayal of war and its impact on his generation.", "isCorrect": true, "rationale": "The text states, 'When the Nazis came to power in 1933, they burned Remarque's books and revoked his German citizenship... a man whose crime was telling the truth about what war had done to his generation.' This clearly links his exile to the content and success of his novel."}, {"text": "His emigration to Switzerland and then the United States, which the German government considered an act of disloyalty during a time of national rebuilding.", "isCorrect": false, "rationale": "His emigration occurred *after* the Nazis came to power, burned his books, and revoked his citizenship. It was a consequence of his persecution, not the cause of his exile."}], "id": "q04"}, {"question": "In the excerpt, the soldiers' initial encounter with 'a high double wall of yellow, unpolished, brand-new coffins' stacked against a shelled school-house primarily serves to foreshadow what for the upcoming offensive?", "options": [{"text": "The meticulous organizational skills of the German military, ensuring all necessary supplies are prepared in advance.", "isCorrect": false, "rationale": "While 'The organization surpasses itself in that kind of thing' is mentioned, the context (coffins for *them*) and the soldiers' grim reactions ('They're for us,' 'unpleasant jests') indicate a darker implication than mere organizational efficiency."}, {"text": "A shift in military strategy towards more defensive trench warfare, emphasizing casualty management.", "isCorrect": false, "rationale": "The rumors are 'of an offensive,' which implies attacking, not a shift to defensive warfare. The coffins indicate the *outcome* of the offensive, not a change in strategy."}, {"text": "The exceptionally high number of casualties expected among their own ranks during the impending battle.", "isCorrect": true, "rationale": "The soldiers explicitly state, 'They're for us,' and 'The coffins are really for us.' The sheer quantity ('at least a hundred') and newness of the coffins for an offensive strongly foreshadows an expectation of massive fatalities."}, {"text": "The breakdown of supply lines, forcing soldiers to prepare their own burial arrangements.", "isCorrect": false, "rationale": "The coffins are described as a part of 'organization' and 'preparation,' not a sign of breakdown. The issue is that the coffins are for *them*, not a failure in supply lines."}], "id": "q05"}, {"question": "Based on the excerpt from *All Quiet on the Western Front*, what was a significant and recurring danger that soldiers faced due to a failure on their *own* side?", "options": [{"text": "Friendly fire incidents caused by their own worn-out artillery barrels, which often landed shells within their own lines.", "isCorrect": true, "rationale": "The text clearly states, 'our own shells begin to fall in the trench. This is the third time in four weeks... the barrels are worn out. The shots are often so uncertain that they land within our own lines. To-night two of our men were wounded by them.' This directly describes a danger from their own side due to equipment failure."}, {"text": "Sabotage by new recruits who were secretly working for the enemy, leading to trench collapses and supply theft.", "isCorrect": false, "rationale": "The text mentions issues with recruits having saw-bayonets, but no mention of sabotage or working for the enemy. This is an unsupported inference."}, {"text": "Disease and infection spreading rapidly through the trenches due to overcrowded dug-outs.", "isCorrect": false, "rationale": "While disease was a known issue in trenches, the excerpt does not mention it as a specific danger. It focuses on combat, rats, and equipment issues. The excerpt makes no mention of overcrowding in dug-outs causing disease."}, {"text": "Internal conflicts and desertion among the soldiers, leading to violent confrontations within their own ranks.", "isCorrect": false, "rationale": "The excerpt shows camaraderie and shared struggle, such as fighting rats together and replacing dangerous bayonets for recruits. There is no mention of internal violence or desertion."}], "id": "q06"}, {"question": "The detailed description of the soldiers' battle against the 'corpse-rats' for their bread, culminating in a collective, violent attack with spades, best illustrates which aspect of life in the trenches?", "options": [{"text": "The psychological toll of constant combat, which drove soldiers to irrational and violent behavior towards non-human threats.", "isCorrect": false, "rationale": "While the psychological toll is present, the 'battle' against the rats is described as a calculated, necessary action for survival. It's not irrational behavior but a desperate measure for an essential resource (food)."}, {"text": "The primitive and dehumanizing struggle for basic survival, where even fundamental needs like food became a brutal contest against the elements and other creatures.", "isCorrect": true, "rationale": "The text emphasizes, 'We cannot afford to throw the bread away, because already we have practically nothing left to eat in the morning.' The meticulous planning, the shared effort, and the gruesome nature of the fight for bread against 'corpse-rats' highlight the desperate and dehumanizing conditions where basic survival overrides all other concerns."}, {"text": "The unique comradery developed among soldiers, as they found innovative ways to entertain themselves during lulls in fighting.", "isCorrect": false, "rationale": "While comradery is evident in their shared struggle, fighting rats for food is not presented as entertainment. It's a grim necessity, reflecting the harsh realities rather than leisure or morale-boosting activities."}, {"text": "The effective resourcefulness of the German army in combating widespread pest infestations in the trenches.", "isCorrect": false, "rationale": "The struggle against the rats is a desperate, personal fight for their own meager rations, not an organized military effort to combat infestations efficiently. The rats have 'become much more numerous lately because the trenches are no longer in good condition,' implying a failure of upkeep, not effective combat against pests."}], "id": "q07"}, {"question": "Based on the excerpt, what was the primary reason soldiers in the trenches preferred the sharpened spade over the bayonet for close-quarters combat?", "options": [{"text": "Spades were more readily available and easier to sharpen than standard-issue bayonets.", "isCorrect": false, "rationale": "The text does not mention availability or ease of sharpening as primary reasons. It focuses on the functional advantages of the spade and disadvantages of the bayonet once in combat."}, {"text": "The spade was a more versatile and effective weapon due to its weight, cleaving power, and reduced risk of jamming compared to the bayonet.", "isCorrect": true, "rationale": "The text explicitly states: 'The sharpened spade is a more handy and many-sided weapon; not only can it be used for jabbing a man under the chin, but it is much better for striking with because of its greater weight, and if one hits between the neck and shoulder it easily cleaves as far down as the chest. The bayonet frequently jams on the thrust and then a man has to kick hard on the other fellow's belly to pull it out again; and in the interval he may easily get one himself. And what's more the blade often gets broken off.'"}, {"text": "Bayonets were reserved for officers and specialized assault units, making spades a necessary alternative for regular infantry.", "isCorrect": false, "rationale": "The text indicates that recruits had bayonets, but veteran soldiers took them away, suggesting bayonets were standard but less preferred by experienced fighters. There's no mention of bayonets being restricted to officers or special units."}, {"text": "The bayonet's dull edge made it ineffective against the enemy's new, heavier uniforms and body armor.", "isCorrect": false, "rationale": "The text describes issues with the bayonet jamming and breaking, but not its ineffectiveness against specific enemy equipment. It mentions 'saw-bayonets' which were even more dangerous due to their blunt edge, but this refers to a specific brutal type, not the general dullness of all bayonets."}], "id": "q08"}, {"question": "Which combination of observations from the excerpt most strongly indicates to the soldiers that a major offensive is imminent?", "options": [{"text": "The presence of unusually large numbers of 'corpse-rats' and the issuance of new waterproof sheets.", "isCorrect": false, "rationale": "Detering says the rats are a 'sure sign of a coming bombardment,' which is a prelude to an offensive, but not the strongest indicator on its own. Waterproof sheets are mentioned for wrapping bread or for casualties, but not as a primary sign of an *imminent offensive* in the same way coffins or special rations are."}, {"text": "A notable increase in enemy artillery activity and the discovery of new, French-made instantaneous fuses.", "isCorrect": false, "rationale": "The strengthening of English artillery is noted, and new fuses are mentioned, indicating heightened enemy readiness. However, while significant, these alone do not represent the *full combination* of specific indicators that point to an *imminent large-scale offensive* as strongly as other factors."}, {"text": "The ceaseless enemy transports behind their lines, the appearance of new coffins for their own side, and the issuing of Edamer cheese and rum.", "isCorrect": true, "rationale": "The text explicitly links all these elements to an impending offensive: 'rumours of an offensive... high double wall of... coffins... 'They're for us'' then 'transports behind the enemy lines rolling ceaselessly until dawn... bringing up troops–troops, munitions, and shells.' Finally, 'issue of Edamer cheese... a sign of a bad time coming' and 'rum is served out.' These multiple, concrete signs collectively point to a major offensive."}, {"text": "Their own artillery barrels being worn out, causing shells to fall within their own lines, and the replacement of saw-bayonets for recruits.", "isCorrect": false, "rationale": "Worn-out barrels indicate equipment failure and danger, but not necessarily an impending offensive. The replacement of bayonets for recruits is a measure taken by experienced soldiers for safety and battlefield effectiveness, not an explicit sign of an offensive itself."}], "id": "q09"}, {"question": "The main purpose of the 'Reality Check' questions posed in the section before the excerpt is to encourage readers to:", "options": [{"text": "Evaluate the factual accuracy of Remarque's fictional account against historical records of the Western Front.", "isCorrect": false, "rationale": "The 'Reading Fiction as Evidence' note clarifies that the novel's value is not in factual accuracy of details. The 'Reality Check' is about contrasting the *experience* Remarque portrays with the abstract arguments of others, not checking historical facts."}, {"text": "Compare Remarque's portrayal of war with the more abstract or removed perspectives of other historical figures and consider how the direct experience might alter those perspectives.", "isCorrect": true, "rationale": "The questions directly ask: 'Where is Holmes' “soldier's faith” in this passage? Does the experience Remarque describes look like a school of virtue?' 'Where is Wilson's “world safe for democracy”?' 'Where is Butler's “racket”?' This explicitly guides readers to contrast Remarque's 'voice from the trenches' with the 'position of authority and distance' of the other speakers, thereby analyzing how direct combat experience impacts their arguments."}, {"text": "Identify specific rhetorical devices and persuasive techniques that Remarque uses in his writing to convey his message about war.", "isCorrect": false, "rationale": "While the section notes Remarque makes an 'argument... without ever stating a thesis,' the 'Reality Check' questions are not primarily focused on rhetorical devices. They are about the *content* and *impact* of Remarque's depiction in contrast to others' arguments."}, {"text": "Determine if Remarque's experiences align with the generalized soldier experiences depicted in other works of World War I literature.", "isCorrect": false, "rationale": "The 'Reality Check' questions direct the reader to compare Remarque's experience with the *arguments* of Holmes, Butler, and Wilson, not with other literature. The focus is on contrasting a soldier's direct experience with authoritative, distanced arguments about war."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
