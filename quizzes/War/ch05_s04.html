<script>
var QUESTIONS = [{"question": "How does Erich Maria Remarque's *All Quiet on the Western Front* primarily enhance the understanding of war compared to the perspectives of Holmes, Butler, and Wilson?", "options": [{"text": "It provides a comprehensive historical analysis of military strategies on the Western Front.", "isCorrect": false, "rationale": "The text explicitly states that Remarque's work is a novel, a work of fiction, not a historical analysis of strategies. Its value lies elsewhere."}, {"text": "It offers a critical economic perspective on the financial motivations behind warfare.", "isCorrect": false, "rationale": "While Butler's pamphlet offers an economic critique of war, Remarque's novel focuses on the soldier's direct experience, not an economic analysis."}, {"text": "It immerses the reader in the unvarnished, personal, and brutal experience of combat from an ordinary soldier's viewpoint.", "isCorrect": true, "rationale": "The section emphasizes that Remarque 'puts you in the trench, under the shells, next to the dying,' providing the direct combat experience that the other speakers, due to their positions of authority and distance, cannot."}, {"text": "It analyzes the political rhetoric used by leaders to persuade their audiences about the necessity of war.", "isCorrect": false, "rationale": "Remarque's novel shows the contrast between patriotic rhetoric and the reality of war, but it is not itself an analysis of rhetoric in the way the other works are."}]}, {"question": "What significant personal consequence did Erich Maria Remarque face due to the publication and success of *All Quiet on the Western Front*?", "options": [{"text": "He was awarded a prestigious literary prize by the German government for his honest portrayal of soldiers.", "isCorrect": false, "rationale": "The German government under the Nazis did the opposite of celebrating him; they persecuted him."}, {"text": "He was commissioned by the German military to write additional works of patriotic fiction.", "isCorrect": false, "rationale": "The Nazis rejected his work as anti-patriotic and anti-German, leading to his exile."}, {"text": "His books were burned, and his German citizenship was revoked by the Nazis, forcing him into exile.", "isCorrect": true, "rationale": "The text explicitly states, 'When the Nazis came to power in 1933, they burned Remarque's books and revoked his German citizenship. He emigrated first to Switzerland and then to the United States.'"}, {"text": "He became a high-ranking journalist and government spokesperson due to his wartime experiences.", "isCorrect": false, "rationale": "He was a journalist *before* the novel's success, but his fate after was exile, not a government position."}]}, {"question": "The text describes *All Quiet on the Western Front* as a work of fiction, yet states it 'captures a truth about the war that statistics and policy arguments cannot convey.' What kind of 'truth' does the novel primarily offer for historical and literary understanding?", "options": [{"text": "Precise factual data on casualty counts and logistical challenges of World War I.", "isCorrect": false, "rationale": "The text clarifies, 'Remarque invented Paul Bäumer and the specific events of the story,' indicating it's not for precise factual data, but authenticity of detail."}, {"text": "An accurate chronological timeline of major battles and military campaigns on the Western Front.", "isCorrect": false, "rationale": "As fiction, its primary aim is not to provide a factual timeline but to convey the experience."}, {"text": "The authentic physical and emotional experiences of soldiers in combat, including their psychological and moral erosion.", "isCorrect": true, "rationale": "The text emphasizes the novel's 'power comes from the authenticity of its physical and emotional detail' and how it captures 'what war had done to his generation,' including the 'slow erosion of everything they believed about duty, honor, and country.'"}, {"text": "The strategic decisions made by high command and the diplomatic efforts to end the war.", "isCorrect": false, "rationale": "The novel focuses on the 'ordinary soldier in the middle of the war itself,' not high-level strategy or diplomacy."}]}, {"question": "Based on the 'historicalcontext' box, which statement most accurately characterizes the typical nature of warfare on the Western Front during World War I?", "options": [{"text": "A highly mobile front with cavalry charges and rapid territorial gains, similar to earlier wars.", "isCorrect": false, "rationale": "The text states, 'For most of the war (1914–1918), the front barely moved,' contradicting the idea of a highly mobile front."}, {"text": "Frequent, decisive breakthroughs that consistently led to significant strategic advantages for one side.", "isCorrect": false, "rationale": "The text notes, 'Attacks typically gained a few hundred yards at the cost of thousands of lives,' indicating that breakthroughs were rare and extremely costly, not consistently decisive."}, {"text": "A static conflict fought from extensive trench systems, yielding minimal territorial gain for immense casualties.", "isCorrect": true, "rationale": "The description of trenches, 'no man's land,' and battles like the Somme 'killed or wounded over a million men on both sides and moved the front line approximately six miles' perfectly illustrates a static, high-casualty, low-gain conflict."}, {"text": "Primarily naval engagements and aerial combat, with ground troops playing a secondary, support role.", "isCorrect": false, "rationale": "The description focuses entirely on ground warfare in trenches, 'no man's land,' and bayonet/spade combat, not naval or aerial dominance."}]}, {"question": "In the excerpt from *All Quiet on the Western Front*, the soldiers' experience of their own artillery shells landing within their trench due to 'worn out' barrels most directly challenges which concept presented by one of the other speakers?", "options": [{"text": "Wilson's assertion that the war was to make the 'world safe for democracy.'", "isCorrect": false, "rationale": "While the incident contributes to the grim reality that contrasts with Wilson's ideals, it doesn't directly challenge the 'safe for democracy' claim as much as it questions the efficacy and integrity of their own side."}, {"text": "Butler's argument that war is essentially a 'racket' designed to enrich industrialists.", "isCorrect": false, "rationale": "The malfunctioning artillery highlights incompetence or resource scarcity, but doesn't directly speak to the economic motivations of war."}, {"text": "Holmes' concept of 'soldier's faith' in the justice of their cause and the nobility of their service.", "isCorrect": true, "rationale": "Being wounded by their own faulty equipment ('This is the third time in four weeks') fundamentally undermines any sense of a noble, virtuous, or even competent cause, eroding trust and faith in their command and purpose. It contradicts the idea of war as a 'school of virtue.'"}, {"text": "Remarque's own narrative theme of profound psychological indifference caused by constant danger.", "isCorrect": false, "rationale": "This incident reinforces Remarque's themes of arbitrary death and loss of control, rather than challenging them."}]}, {"question": "The narrator states, 'Over us Chance hovers. If a shot comes, we can duck, that is all; we neither know nor can determine where it will fall.' This statement, combined with the example of the dug-out being blown up, best illustrates the soldiers' experience of:", "options": [{"text": "Their growing mastery and strategic control over the battlefield environment.", "isCorrect": false, "rationale": "The statement explicitly highlights a lack of control ('neither know nor can determine where it will fall')."}, {"text": "The predictable and logical patterns of enemy artillery bombardment.", "isCorrect": false, "rationale": "The text emphasizes uncertainty and randomness, contradicting predictability ('Chance hovers,' 'matter of chance')."}, {"text": "Profound powerlessness and the arbitrary, random nature of life and death in the trenches.", "isCorrect": true, "rationale": "The concept of 'Chance' determining who lives or dies, even in a 'bomb-proof dug-out,' vividly conveys the soldiers' powerlessness and the arbitrary nature of their survival."}, {"text": "The superior effectiveness of well-constructed dug-outs as safe havens.", "isCorrect": false, "rationale": "The narrator's experience of a 'bomb-proof dug-out' being 'smashed to atoms' refutes the idea of their superior effectiveness as safe havens."}]}, {"question": "Upon seeing the new coffins stacked against the school-house before an offensive, the soldiers' grim realization ('The coffins are really for us') primarily conveys a sense of:", "options": [{"text": "The unexpected generosity and efficiency of the German supply chain for fallen soldiers.", "isCorrect": false, "rationale": "The jests are 'unpleasant,' and the organization is said to 'surpass itself in that kind of thing' – an ironic and bitter observation, not genuine appreciation."}, {"text": "A highly successful and well-prepared military offensive that promises victory.", "isCorrect": false, "rationale": "The sight of mass coffins before an offensive is a terrifying omen, suggesting mass death, not success or victory."}, {"text": "Impending, unavoidable mass casualties and the dehumanizing expectation of death.", "isCorrect": true, "rationale": "The abundance of 'brand-new coffins' explicitly indicates that command anticipates extremely heavy losses, stripping soldiers of individual significance and highlighting the expectation of their deaths as statistics."}, {"text": "The importance of proper burial rituals and respect for the dead in wartime.", "isCorrect": false, "rationale": "While related to death, the primary impact is the foreboding of their own demise, not the quality of their burial."}]}, {"question": "Why do the soldiers in the excerpt from *All Quiet on the Western Front* describe preferring the sharpened spade over the bayonet as a weapon for close combat?", "options": [{"text": "Spades were more readily available in the trenches than bayonets, making them a practical necessity.", "isCorrect": false, "rationale": "The text doesn't mention availability as the reason, but rather effectiveness and versatility."}, {"text": "Bayonets were considered dishonorable and cowardly weapons, whereas spades were seen as more 'manly.'", "isCorrect": false, "rationale": "The text mentions the danger of saw-bayonets if caught by the enemy, but not a general dishonor for bayonets. The preference is practical, not moral."}, {"text": "The spade was more versatile, effective for striking, less prone to jamming, and could inflict more decisive wounds.", "isCorrect": true, "rationale": "The text states the spade is 'more handy and many-sided,' 'much better for striking because of its greater weight,' 'easily cleaves,' and the bayonet 'frequently jams on the thrust' and 'the blade often gets broken off.'"}, {"text": "Using a spade allowed soldiers to maintain a greater safe distance from the enemy during an attack.", "isCorrect": false, "rationale": "Both are close-combat weapons. The spade is preferred for its combat effectiveness, not for creating distance."}]}, {"question": "In the excerpt, the soldiers interpret the issue of Edamer cheese and rum as a 'sign of a bad time coming.' This interpretation suggests that the soldiers:", "options": [{"text": "Are ungrateful for the provisions provided by their command, despite the scarcity of food.", "isCorrect": false, "rationale": "They say Edamer is 'tasty' and they drink the rum, indicating they appreciate it as sustenance, but its appearance is a bad omen."}, {"text": "Have learned to recognize specific patterns in supply issues that precede major, costly offensives.", "isCorrect": true, "rationale": "The text states, 'the fat red balls have long been a sign of a bad time coming,' indicating their experience has taught them that these particular provisions foreshadow heavy casualties and an impending attack."}, {"text": "Are critical of the quality of food and drink they receive, viewing them as inadequate for morale.", "isCorrect": false, "rationale": "They state Edamer is 'tasty' and they drink the rum, so it's not a critique of quality but a recognition of what the issue signifies."}, {"text": "Believe these specific items are essential for boosting morale and preparing for effective combat.", "isCorrect": false, "rationale": "They are 'not greatly comforted' by the rum, indicating it does not boost morale in the face of their forebodings; it's a sign of doom."}]}, {"question": "Considering the entire section, if Woodrow Wilson acknowledged war as a 'fearful thing' but did not describe the fear, how does Remarque's detailed account of fighting rats and enduring friendly fire contribute to a deeper understanding of that 'fearful thing'?", "options": [{"text": "It demonstrates how soldiers effectively overcome fear through strict discipline and adherence to military protocol.", "isCorrect": false, "rationale": "The excerpt shows the constant presence of fear, powerlessness, and the breakdown of trust (friendly fire), not the overcoming of fear through discipline."}, {"text": "It illustrates the abstract strategic challenges faced by wartime leaders, validating Wilson's distant perspective.", "isCorrect": false, "rationale": "Remarque's purpose is to show the *soldier's* experience, contrasting with the 'authority and distance' of leaders, not to validate their abstract perspective."}, {"text": "It humanizes the fear by depicting its constant, mundane, and psychologically devastating manifestations in the soldiers' daily trench life.", "isCorrect": true, "rationale": "Remarque 'puts you in the trench,' detailing the relentless threats from enemy shells, faulty friendly fire, rats, and the constant suspense. These specific, visceral details transform an abstract 'fearful thing' into a tangible, pervasive, and psychologically erosive reality for the individual soldier."}, {"text": "It argues that fear is largely a misconception driven by propaganda, rather than a genuine emotion of combat.", "isCorrect": false, "rationale": "The entire excerpt, from the coffins to the shelling and rats, demonstrates the omnipresent and rational basis for profound fear among the soldiers, not its dismissal."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
