<script>
var QUESTIONS = [{"question": "The text introduces four figures (Holmes, Butler, Wilson, Remarque) whose debate about war has endured. Which of the following statements best describes the central argument presented about the legacy of their debate?", "options": [{"text": "One of the four figures ultimately proved to be correct, settling the debate for future generations.", "isCorrect": false, "rationale": "The text explicitly states that 'The historical legacy... is not that one of them “won.” It is that all four remain active in American public discourse,' indicating no single figure proved definitively correct."}, {"text": "While the names and places change, the fundamental questions about war and its justifications remain constant.", "isCorrect": true, "rationale": "The text repeatedly emphasizes this point, stating, 'The names and places change; the underlying questions do not' and 'But the questions remain constant, and the rhetorical strategies used to argue for and against war remain remarkably stable.'"}, {"text": "The debate largely faded after World War II, as subsequent conflicts presented entirely new ethical dilemmas.", "isCorrect": false, "rationale": "The text directly refutes this, showing how 'Every American war since has rehearsed the same arguments,' demonstrating the enduring nature of the debate, not its fading."}, {"text": "The influence of these four thinkers is primarily historical, rarely manifesting in contemporary discourse.", "isCorrect": false, "rationale": "The text states the debate 'is not a relic of the past. It is a permanent feature of democratic life' and that 'all four remain active in American public discourse,' indicating their continued contemporary relevance."}], "id": "q01"}, {"question": "World War II is described as 'the good war,' where 'Wilson's logic... found its fullest vindication' and 'Holmes' vision of martial virtue flourished.' However, the text also mentions 'Butler's questions did not disappear entirely' and Remarque's observations. This suggests that even in a widely justified conflict:", "options": [{"text": "The economic benefits of war production always outweigh any moral concerns.", "isCorrect": false, "rationale": "Butler's questions about 'War production made fortunes for industrialists' are presented as a lingering critique, not an accepted benefit that outweighs moral concerns."}, {"text": "The challenges of wartime injustices and the harsh realities for soldiers are secondary to the overall justness of the cause.", "isCorrect": false, "rationale": "The text highlights 'The internment of Japanese Americans showed that wartime could justify its own injustices' and soldiers' experiences of the 'gap between patriotic rhetoric and battlefield reality' as significant issues, not secondary ones."}, {"text": "No war, regardless of its clear justification, is free from the critical scrutiny concerning its costs, beneficiaries, and human impact.", "isCorrect": true, "rationale": "This option best synthesizes the dual narrative: while the war was 'good' and justified (Wilson, Holmes), critical questions (Butler, Remarque) about injustices, profiteering, and soldier's realities still persisted, demonstrating that no conflict is without complex scrutiny."}, {"text": "The unified national purpose during wartime inherently silences dissenting voices like Butler's and Remarque's.", "isCorrect": false, "rationale": "The text explicitly states 'Butler's questions did not disappear entirely' and that soldiers' memoirs 'reveal' Remarque's type of experiences, indicating that these voices were not silenced."}], "id": "q02"}, {"question": "President Truman framed the Korean War in 'explicitly Wilsonian terms.' However, the conflict also saw 'Butler's question — who profits? — found a new audience.' This indicates that:", "options": [{"text": "Wilsonian ideals are incompatible with the realities of undeclared wars.", "isCorrect": false, "rationale": "The text states Wilsonian terms were *used* to frame the conflict, not that they were incompatible, but rather that the *reality* of the war (undeclared, stalemate, costs) led to other questions."}, {"text": "Even when framed idealistically, prolonged conflicts with ambiguous outcomes tend to provoke economic scrutiny.", "isCorrect": true, "rationale": "Despite Truman's Wilsonian framing, the war's undeclared nature, three-year duration, stalemate, and increasing costs led Americans to question 'whether the costs of global leadership were worth paying' and to notice the military budget, aligning with Butler's economic scrutiny."}, {"text": "The Cold War context rendered traditional arguments about war obsolete.", "isCorrect": false, "rationale": "The text states 'The argument for intervention was familiar,' indicating that traditional arguments, including Wilson's, were still relevant, not obsolete."}, {"text": "Butler's perspective is only relevant when there is a clear military defeat.", "isCorrect": false, "rationale": "Butler's questions in Korea arose from the *costs* and *ongoing nature* of the conflict and the non-shrinking military budget, not solely from a clear military defeat (it ended in a stalemate)."}], "id": "q03"}, {"question": "The Vietnam War is explicitly labeled 'Butler's moment.' Which aspect of the war's portrayal in the text best supports this characterization?", "options": [{"text": "The initial framing of the war in Wilsonian language of defending self-determination.", "isCorrect": false, "rationale": "This was the *initial* framing, which later gave way to Butler's arguments as the 'gap between official optimism and battlefield reality widened.'"}, {"text": "The eventual public exposure of government deception and the 'war a racket' sentiment.", "isCorrect": true, "rationale": "The text states 'Butler's arguments came roaring back. Protesters called the war a racket,' and 'The publication of the Pentagon Papers in 1971 revealed that officials had systematically deceived the public,' directly aligning with Butler's skepticism about motives and beneficiaries."}, {"text": "The widespread appeal of Holmes's martial idealism among the troops.", "isCorrect": false, "rationale": "The text explicitly states that 'Holmes' martial idealism... seemed almost obscene to a generation that had watched the war on television every night.'"}, {"text": "The relatively low American casualty count compared to World War II.", "isCorrect": false, "rationale": "The text mentions 'as the body count rose,' indicating significant casualties, which fueled the opposition and Butler's arguments, rather than being low."}], "id": "q04"}, {"question": "The Gulf War is presented as a reassertion of Wilson's and Holmes's perspectives. However, Butler's skeptics raised an 'uncomfortable question' about strategic resources (oil). This suggests that:", "options": [{"text": "The presence of clear aggression automatically validates Wilsonian and Holmesian arguments, silencing all others.", "isCorrect": false, "rationale": "The fact that Butler's skeptics raised an 'uncomfortable question' demonstrates that these arguments were not silenced, even with clear aggression and military success."}, {"text": "Even when a war appears justified and successful, critical questions about underlying motives and beneficiaries can still persist.", "isCorrect": true, "rationale": "Despite the clear aggression against Kuwait and the swift, successful military campaign that seemed to vindicate Wilson and Holmes, Butler's skeptics still questioned the underlying motives (oil reserves), highlighting that such questions can always persist."}, {"text": "Post-Vietnam, American public opinion became uniformly supportive of military interventions that involved oil-rich regions.", "isCorrect": false, "rationale": "The 'uncomfortable question' posed by Butler's skeptics suggests that public opinion was not uniformly supportive and that critical analysis of motives remained."}, {"text": "Congressional authorization for military action effectively addresses all potential Butlerian critiques.", "isCorrect": false, "rationale": "While Congressional authorization was obtained, it did not prevent Butler's skeptics from raising the 'uncomfortable question,' showing that such authorization does not eliminate deeper critiques."}], "id": "q05"}, {"question": "The wars in Iraq and Afghanistan are described as combining 'every strand of the old debate.' This comprehensive blending of perspectives is best exemplified by:", "options": [{"text": "The unwavering public support for the mission throughout its entire duration.", "isCorrect": false, "rationale": "The description of the mission expanding 'year after year' and the eventual withdrawal after 'twenty years of war' with 'unmistakable' echoes of the 1935 debate suggests changing public sentiment and sustained critique, not unwavering support."}, {"text": "The clear and consistent application of Wilsonian principles from start to finish.", "isCorrect": false, "rationale": "The text notes that the justification for Iraq 'shifted' from WMDs to spreading democracy, indicating an *inconsistent* application of Wilsonian principles, not a clear and consistent one."}, {"text": "The initial justification for self-defense evolving into nation-building, alongside persistent Butlerian critiques of profiteering.", "isCorrect": true, "rationale": "This option captures the blend: initial Wilsonian logic (self-defense), mission creep and shifting justifications (Wilson's language in new contexts), and strong Butlerian critiques ('contractors who made billions,' 'revolving door')."}, {"text": "The complete absence of Remarque's perspective due to modern military technology.", "isCorrect": false, "rationale": "The text mentions 'the soldiers who served tour after tour while the country went shopping,' which is a direct echo of Remarque's theme of the soldier's reality versus civilian life and the rhetoric."}], "id": "q06"}, {"question": "Remarque's voice, highlighting the 'gap between patriotic rhetoric and battlefield reality,' resonated in different conflicts. In which of the following pairs of wars is the manifestation of Remarque's perspective *most similar* according to the text?", "options": [{"text": "World War II and The Gulf War", "isCorrect": false, "rationale": "While WWII had Remarque's echoes, the Gulf War is described more in terms of decisive action and relatively few casualties, not explicitly highlighting the gap in the same intense way Remarque is described in other conflicts."}, {"text": "Korea and Vietnam", "isCorrect": false, "rationale": "Korea focuses more on the costs of global leadership and stalemate, while Vietnam explicitly names writers echoing Remarque. While the underlying theme might be present, the text emphasizes it more directly in Vietnam and WWII."}, {"text": "World War II and Vietnam", "isCorrect": true, "rationale": "In WWII, soldiers' 'memoirs and letters reveal — often experienced the same gap between patriotic rhetoric and battlefield reality that Remarque had described.' In Vietnam, 'Remarque's voice echoed in a new generation of writers... who described combat with the same unflinching honesty.' This shows a direct and explicit similarity in the manifestation of Remarque's perspective."}, {"text": "The Gulf War and Iraq/Afghanistan", "isCorrect": false, "rationale": "Iraq/Afghanistan clearly evokes Remarque's theme with 'soldiers who served tour after tour,' but the Gulf War narrative is less explicit about this specific aspect of Remarque's perspective compared to WWII or Vietnam."}], "id": "q07"}, {"question": "The text emphasizes that Butler's questions, particularly 'who profits?' and 'is this war a racket?', have remained remarkably relevant. Which war most vividly demonstrated the *re-emergence and intensification* of Butler's critique after a period where other perspectives seemed to dominate?", "options": [{"text": "World War II", "isCorrect": false, "rationale": "Butler's questions existed in WWII ('War production made fortunes for industrialists') but were overshadowed by the war's 'good' and justified nature, not representing a re-emergence after dominance by others."}, {"text": "Korea", "isCorrect": false, "rationale": "Butler's questions 'found a new audience' in Korea, but the intensity and explicit labeling ('Butler's moment') were less pronounced than in Vietnam."}, {"text": "Vietnam", "isCorrect": true, "rationale": "The text explicitly states 'Vietnam was Butler's moment,' and that 'Butler's arguments came roaring back. Protesters called the war a racket,' alongside revelations of government deception, signifying a powerful re-emergence and intensification of his critique."}, {"text": "The Gulf War", "isCorrect": false, "rationale": "Butler's skeptics noted the oil reserves, but the war also saw a reassertion of Wilson and Holmes, and it wasn't described with the same intensity or as 'Butler's moment' as Vietnam was."}], "id": "q08"}, {"question": "Wilson's language about defending the free world and spreading democracy was used to justify interventions in Korea, Vietnam, and Iraq/Afghanistan. How did the *application* of Wilson's arguments in Iraq and Afghanistan specifically highlight a complex or problematic aspect of their enduring use?", "options": [{"text": "It demonstrated that Wilsonian ideals are universally applicable to any international conflict.", "isCorrect": false, "rationale": "The shifting justifications and the phrase 'deployed in circumstances Wilson could not have imagined' suggest complexity and potential stretching of applicability, not universal applicability."}, {"text": "It showed that Wilsonian justifications can shift and be deployed in unforeseen circumstances, potentially stretching their original intent.", "isCorrect": true, "rationale": "The text notes the justification for the Iraq invasion 'shifted to spreading democracy — Wilson's language again, deployed in circumstances Wilson could not have imagined,' illustrating how Wilsonian arguments can be adapted and reinterpreted beyond their original context."}, {"text": "It proved that democratic nations will always fight to survive, as Wilson predicted.", "isCorrect": false, "rationale": "The text describes an evolution of justification and criticism of the wars, not a straightforward proof of Wilson's prediction about democracies fighting to survive."}, {"text": "It highlighted that Wilson's framework is primarily effective in declared wars with clear congressional authorization.", "isCorrect": false, "rationale": "The Korean War example showed Wilsonian framing in an undeclared war, and the Iraq/Afghanistan section focuses on the shifting justifications rather than the type of authorization as the primary complexity."}], "id": "q09"}, {"question": "The section concludes by stating that the debate among Holmes, Butler, Wilson, and Remarque is 'not a problem to be solved,' but 'a responsibility to be met.' This implies that citizens in a democracy should:", "options": [{"text": "Strive to identify which of the four arguments is definitively correct for any given conflict.", "isCorrect": false, "rationale": "The text explicitly states the legacy is 'not that one of them “won”' and that the debate is 'not a problem to be solved,' meaning there is no single 'correct' argument to be found."}, {"text": "Accept that military action is an unavoidable aspect of global leadership without questioning its premises.", "isCorrect": false, "rationale": "The emphasis on 'evidence, with honesty, and with respect for the stakes involved' implies active questioning and critical engagement, not passive acceptance."}, {"text": "Engage critically with diverse perspectives on war, using evidence and honesty, rather than seeking a singular, permanent answer.", "isCorrect": true, "rationale": "This option aligns directly with the concluding statement: 'The debate is not a problem to be solved. It is a responsibility to be met — with evidence, with honesty, and with respect for the stakes involved,' emphasizing ongoing critical engagement with multiple viewpoints."}, {"text": "Rely on political leaders to synthesize these arguments and present a unified, unchallenged rationale for war.", "isCorrect": false, "rationale": "The text highlights the ongoing nature of the debate as a 'permanent feature of democratic life,' implying citizen participation and scrutiny, not passive reliance on leaders for an unchallenged rationale."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
