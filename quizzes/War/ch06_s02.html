<script>
var QUESTIONS = [{"question": "Every argument begins with a question the audience asks silently: 'Why should I listen to you?' The answer to this question, concerning a speaker's credibility, character, and authority, is defined as which rhetorical concept?", "options": [{"text": "Pathos", "isCorrect": false, "rationale": "Pathos refers to an appeal to emotion, not the speaker's credibility or authority."}, {"text": "Ethos", "isCorrect": true, "rationale": "The text explicitly defines ethos as 'the credibility, character, and authority a speaker brings to the podium' in response to the audience's question 'Why should I listen to you?'"}, {"text": "Logos", "isCorrect": false, "rationale": "Logos refers to an appeal to logic or reason, not the speaker's credibility."}, {"text": "Kairos", "isCorrect": false, "rationale": "Kairos refers to the opportune moment or timing for an argument, not the speaker's inherent credibility."}], "id": "q01"}, {"question": "Oliver Wendell Holmes Jr.'s ethos, as described in the text, is primarily built upon which foundation?", "options": [{"text": "His academic credentials from Harvard.", "isCorrect": false, "rationale": "While Holmes was a Harvard man, the text states his ethos is 'not theorizing about war from a library' but from direct experience."}, {"text": "His direct personal experience and sacrifice in combat.", "isCorrect": true, "rationale": "The text emphasizes that Holmes' authority rests on the fact he 'felt the bullet, seen the dead, and carried the memory' and 'paid for that faith in blood,' establishing his ethos through personal sacrifice as a volunteer."}, {"text": "His status as the son of a famous American writer.", "isCorrect": false, "rationale": "The text mentions this detail but highlights his choice to fight *despite* his background as the foundation of his ethos, not the background itself."}, {"text": "His ability to theorize about war from a scholarly perspective.", "isCorrect": false, "rationale": "The text explicitly states his ethos is *not* 'theorizing about war from a library' but is based on his firsthand experience."}], "id": "q02"}, {"question": "The 'devastating' power of Smedley Butler's denunciation of war as 'a racket' primarily stems from what aspect of his ethos?", "options": [{"text": "His background as a lifelong pacifist who never engaged in combat.", "isCorrect": false, "rationale": "The text explicitly states Butler is 'not speaking as a pacifist who has never held a rifle' but as a 'career professional.'"}, {"text": "His unexpected reversal from a highly decorated insider to a critic.", "isCorrect": true, "rationale": "The text highlights 'the reversal' and the 'surprise' that a 'decorated general' would attack the institution that decorated him, lending his words 'enormous force.' This is described as 'insider betrayal.'"}, {"text": "His sophisticated logical arguments supported by economic data.", "isCorrect": false, "rationale": "While his arguments might include logic, the text attributes the *power* of his ethos to his insider status and subsequent turning against the system, not the specific logical structure of his claims."}, {"text": "His appeal to universal moral principles against violence.", "isCorrect": false, "rationale": "While his denunciation might align with such principles, the text specifically attributes the *power* of his ethos to his insider status and subsequent betrayal, rather than the moral content itself."}], "id": "q03"}, {"question": "If President Woodrow Wilson were to address Congress about an urgent national crisis that he had initially tried to avoid, which rhetorical strategy would most effectively align with the ethos described in the text?", "options": [{"text": "Emphasizing his extensive military background and combat experience.", "isCorrect": false, "rationale": "The text states Wilson 'is not a soldier at all' and his authority does 'not come from personal experience of combat.'"}, {"text": "Presenting himself as a reluctant leader compelled by duty to act.", "isCorrect": true, "rationale": "Wilson's ethos is defined by 'positional authority combined with reluctance,' as he comes to action 'not eagerly but with a profound sense of moral duty,' making him a 'reluctant warrior.'"}, {"text": "Citing detailed statistical evidence to prove the crisis's severity.", "isCorrect": false, "rationale": "While logical evidence (logos) might be part of his speech, this option doesn't describe the unique aspect of Wilson's *ethos*, which focuses on his character and position."}, {"text": "Appealing directly to the audience's emotions of fear and patriotism.", "isCorrect": false, "rationale": "This describes pathos, an appeal to emotion, not the specific nature of Wilson's ethos as presented in the text."}], "id": "q04"}, {"question": "The text suggests a key difference between Remarque's ethos and Holmes' ethos regarding their combat experience. What is it?", "options": [{"text": "Holmes volunteered out of principle, while Remarque was conscripted.", "isCorrect": true, "rationale": "The text states Holmes 'enlisted' and 'did not have to fight,' indicating choice, while Remarque 'was drafted at eighteen' and 'did not choose to serve,' highlighting the difference between voluntary and involuntary service."}, {"text": "Remarque suffered more severe wounds than Holmes.", "isCorrect": false, "rationale": "Both were wounded, but the text does not compare the severity of their wounds as a point of distinction for their respective ethos."}, {"text": "Holmes' experience was typical, while Remarque's was exceptional.", "isCorrect": false, "rationale": "The text states Holmes' experience was 'exceptional, not typical,' while Remarque's ethos comes from 'typicality' and representing the 'common experience.'"}, {"text": "Remarque fought for Germany, while Holmes fought for the Union.", "isCorrect": false, "rationale": "While historically accurate, the text does not use their respective sides in the war as the defining difference in their *ethos*."}], "id": "q05"}, {"question": "According to the definition provided, an 'Appeal to Authority' becomes problematic when:", "options": [{"text": "It relies solely on the speaker's credentials or position.", "isCorrect": false, "rationale": "The definition states that appeals to authority 'draws its persuasive force from the speaker's credentials, experience, or position' and are 'not inherently fallacious,' implying reliance itself isn't the problem."}, {"text": "The authority cited is irrelevant to the claim being made.", "isCorrect": true, "rationale": "The definition explicitly states that appeals to authority become problematic 'when the authority cited is irrelevant to the claim being made, or when the appeal substitutes for evidence that should be provided.'"}, {"text": "The argument uses persuasive force.", "isCorrect": false, "rationale": "Appeals to authority are defined as arguments that 'draws its persuasive force.' Persuasive force is an inherent characteristic, not what makes it problematic."}, {"text": "Experts are deferred to in their fields.", "isCorrect": false, "rationale": "The definition explicitly states 'we reasonably defer to experts in their fields,' indicating this is a non-problematic use."}], "id": "q06"}, {"question": "A contemporary political commentator, known for previously working within a government agency and now publicly exposing its alleged corrupt practices, would most closely align with which type of ethos discussed in the text?", "options": [{"text": "The Volunteer (Holmes)", "isCorrect": false, "rationale": "Holmes' ethos is about personal sacrifice in chosen combat, not exposing institutional corruption."}, {"text": "The Statesman (Wilson)", "isCorrect": false, "rationale": "Wilson's ethos is about positional authority and reluctance to act from that office, not insider betrayal or whistle-blowing."}, {"text": "The Insider (Butler)", "isCorrect": true, "rationale": "Butler's ethos is described as 'insider betrayal,' where he 'knows the institution from the inside and declares it corrupt.' This aligns perfectly with a former government insider exposing alleged corrupt practices."}, {"text": "The Witness (Remarque)", "isCorrect": false, "rationale": "Remarque's ethos is about representative, ordinary experience of combat, not specifically about exposing internal institutional wrongdoing."}], "id": "q07"}, {"question": "What is identified as a potential weakness of Woodrow Wilson's ethos?", "options": [{"text": "He lacked significant political experience before becoming president.", "isCorrect": false, "rationale": "The text identifies Wilson as a 'scholar, a university president, a politician,' suggesting he had substantial experience."}, {"text": "His arguments were often based on emotion rather than reason.", "isCorrect": false, "rationale": "The text discusses the source of his authority (ethos) rather than the nature of his arguments (logos or pathos)."}, {"text": "He had never personally experienced the combat he was asking others to endure.", "isCorrect": true, "rationale": "The 'Four Types of Authority' comparison section lists Wilson's weakness as: 'he has never experienced what he is asking others to endure.'"}, {"text": "Critics could question his sincerity, given his past peace campaigns.", "isCorrect": false, "rationale": "The text presents his past peace campaigns as reinforcing his *reluctance*, which adds to his ethos as a 'reluctant warrior,' rather than diminishing it as a weakness."}], "id": "q08"}, {"question": "The concluding paragraph of the section emphasizes what crucial point about different forms of ethos?", "options": [{"text": "Some forms of ethos are inherently superior to others for persuasive arguments.", "isCorrect": false, "rationale": "The text explicitly states: 'None of these forms of ethos is inherently superior to the others.'"}, {"text": "The goal is to determine which type of authority is universally 'best.'", "isCorrect": false, "rationale": "The text states the critical reader's task is 'not to decide which authority is 'best''."}, {"text": "Each writer's specific authority shapes what arguments they can effectively make or are prevented from making.", "isCorrect": true, "rationale": "The text concludes by stating, 'The question is not who has the right to speak, but what each speaker's particular authority allows — and prevents — him from saying.'"}, {"text": "Ethos is only effective when it relies on direct personal experience.", "isCorrect": false, "rationale": "Wilson's ethos, for example, relies on positional authority and reluctance, not direct personal combat experience, yet is presented as effective."}], "id": "q09"}, {"question": "What is highlighted as a unique strength of Remarque's ethos compared to the others?", "options": [{"text": "His extensive military training and strategic expertise.", "isCorrect": false, "rationale": "The text describes Remarque as an 'ordinary young man,' emphasizing his common experience rather than strategic expertise."}, {"text": "His ability to speak for the common, non-exceptional soldier.", "isCorrect": true, "rationale": "The text states Remarque's strength is that 'he speaks for the common soldier' and his authority comes from 'typicality — the ability to speak for the common experience rather than the exceptional one.'"}, {"text": "His deliberate choice to fight for a cause he believed in.", "isCorrect": false, "rationale": "The text explicitly states Remarque 'did not choose to serve' and 'was not a volunteer animated by principle.'"}, {"text": "His eloquent philosophical arguments against war.", "isCorrect": false, "rationale": "The text notes his weakness is that 'he offers no argument, only testimony,' focusing on his experience as a witness rather than his argumentative skill."}], "id": "q10"}, {"question": "The text notes that each type of authority both enables and limits what a writer can credibly say. Specifically, Holmes's strength (exceptional personal experience) is also his weakness (narrow and unrepresentative sample), and Remarque's strength (typicality) is also his weakness (cannot prescribe policy). What does this pattern reveal about the nature of ethos?", "options": [{"text": "It reveals that all ethos is ultimately fraudulent, since every strength conceals a corresponding weakness.", "isCorrect": false, "rationale": "The text does not conclude that ethos is fraudulent — it concludes that each form of authority has genuine strengths and genuine limitations. Recognizing both is a mark of critical reading, not a basis for dismissing ethos altogether."}, {"text": "It reveals that the same quality that gives a speaker authority on one question simultaneously limits their authority on other questions — the source of credibility defines both what the speaker can claim and what they cannot.", "isCorrect": true, "rationale": "Holmes's firsthand heroism gives him authority to speak about what war costs personally, but that experience was unusual — he cannot speak for ordinary soldiers. Remarque's typicality lets him represent the common soldier but leaves him unable to prescribe policy. This is not a flaw but the structural nature of all ethos: it empowers some claims while leaving others beyond the speaker's reach."}, {"text": "It reveals that the most credible speakers are those who combine all four types of ethos — military service, insider status, institutional authority, and typicality.", "isCorrect": false, "rationale": "The text does not suggest that combining all types of ethos produces superior credibility. It analyzes each type on its own terms, showing that different questions require different types of authority."}, {"text": "It reveals that audiences are irrational, since they grant authority based on irrelevant biographical details rather than the quality of the argument.", "isCorrect": false, "rationale": "The text treats ethos as a legitimate and rational dimension of argument, not as audience irrationality. Whether a speaker has relevant personal experience is genuinely relevant to whether their claims deserve credence."}], "id": "q11"}, {"question": "Butler served as a Marine for decades, executing interventions he later called rackets, before writing War Is a Racket. A skeptical reader might ask: if the system was so corrupt, why did he serve so long? How should a critical reader evaluate this challenge to Butler's ethos?", "options": [{"text": "The challenge is decisive and invalidates Butler's ethos entirely, since a man who participated in the system for decades cannot credibly critique it.", "isCorrect": false, "rationale": "If long participation automatically invalidated insider critique, no whistleblower would ever have credibility. The text presents long service as both a weakness (why wait so long?) and a strength (deep insider knowledge), requiring the reader to weigh both."}, {"text": "The challenge is a legitimate one that Butler must answer — his late conversion raises the question of whether he knew all along or arrived at his critique only through experience and reflection — but it does not automatically invalidate his argument, since insider knowledge accumulated over decades may be necessary to understand systemic patterns.", "isCorrect": true, "rationale": "A critic who served briefly might have limited knowledge; Butler's decades of service give him the knowledge base for his claims. The timing question is real but not fatal: many people understand a system only after long immersion in it, and the critique developed from inside may be more credible, not less, even if delayed."}, {"text": "The challenge is irrelevant because ethos has nothing to do with past behavior, only with present credentials.", "isCorrect": false, "rationale": "Ethos is precisely about character, past behavior, and the whole pattern of a person's conduct. The challenge is relevant — it just does not automatically determine the conclusion."}, {"text": "The challenge would only matter if Butler's argument relied entirely on his ethos rather than on data; since he provides economic evidence, the ethos question is secondary.", "isCorrect": false, "rationale": "While Butler does provide data, his ethos as an insider is central to why his accusation carries special weight. If his credibility is undermined, the data alone would be less compelling because any economist could cite similar figures without the insider's authority."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
