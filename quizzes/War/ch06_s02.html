    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/War.html">&larr; Back to War: A Debate in Primary Sources</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 6, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Every argument begins with a question the audience asks silently: 'Why should I listen to you?' The answer to this question, concerning a speaker's credibility, character, and authority, is defined as which rhetorical concept?", "options": [{"text": "Pathos", "isCorrect": false, "rationale": "Pathos refers to an appeal to emotion, not the speaker's credibility or authority."}, {"text": "Ethos", "isCorrect": true, "rationale": "The text explicitly defines ethos as 'the credibility, character, and authority a speaker brings to the podium' in response to the audience's question 'Why should I listen to you?'"}, {"text": "Logos", "isCorrect": false, "rationale": "Logos refers to an appeal to logic or reason, not the speaker's credibility."}, {"text": "Kairos", "isCorrect": false, "rationale": "Kairos refers to the opportune moment or timing for an argument, not the speaker's inherent credibility."}]}, {"question": "Oliver Wendell Holmes Jr.'s ethos, as described in the text, is primarily built upon which foundation?", "options": [{"text": "His academic credentials from Harvard.", "isCorrect": false, "rationale": "While Holmes was a Harvard man, the text states his ethos is 'not theorizing about war from a library' but from direct experience."}, {"text": "His direct personal experience and sacrifice in combat.", "isCorrect": true, "rationale": "The text emphasizes that Holmes' authority rests on the fact he 'felt the bullet, seen the dead, and carried the memory' and 'paid for that faith in blood,' establishing his ethos through personal sacrifice as a volunteer."}, {"text": "His status as the son of a famous American writer.", "isCorrect": false, "rationale": "The text mentions this detail but highlights his choice to fight *despite* his background as the foundation of his ethos, not the background itself."}, {"text": "His ability to theorize about war from a scholarly perspective.", "isCorrect": false, "rationale": "The text explicitly states his ethos is *not* 'theorizing about war from a library' but is based on his firsthand experience."}]}, {"question": "The 'devastating' power of Smedley Butler's denunciation of war as 'a racket' primarily stems from what aspect of his ethos?", "options": [{"text": "His background as a lifelong pacifist who never engaged in combat.", "isCorrect": false, "rationale": "The text explicitly states Butler is 'not speaking as a pacifist who has never held a rifle' but as a 'career professional.'"}, {"text": "His unexpected reversal from a highly decorated insider to a critic.", "isCorrect": true, "rationale": "The text highlights 'the reversal' and the 'surprise' that a 'decorated general' would attack the institution that decorated him, lending his words 'enormous force.' This is described as 'insider betrayal.'"}, {"text": "His sophisticated logical arguments supported by economic data.", "isCorrect": false, "rationale": "While his arguments might include logic, the text attributes the *power* of his ethos to his insider status and subsequent turning against the system, not the specific logical structure of his claims."}, {"text": "His appeal to universal moral principles against violence.", "isCorrect": false, "rationale": "While his denunciation might align with such principles, the text specifically attributes the *power* of his ethos to his insider status and subsequent betrayal, rather than the moral content itself."}]}, {"question": "If President Woodrow Wilson were to address Congress about an urgent national crisis that he had initially tried to avoid, which rhetorical strategy would most effectively align with the ethos described in the text?", "options": [{"text": "Emphasizing his extensive military background and combat experience.", "isCorrect": false, "rationale": "The text states Wilson 'is not a soldier at all' and his authority does 'not come from personal experience of combat.'"}, {"text": "Presenting himself as a reluctant leader compelled by duty to act.", "isCorrect": true, "rationale": "Wilson's ethos is defined by 'positional authority combined with reluctance,' as he comes to action 'not eagerly but with a profound sense of moral duty,' making him a 'reluctant warrior.'"}, {"text": "Citing detailed statistical evidence to prove the crisis's severity.", "isCorrect": false, "rationale": "While logical evidence (logos) might be part of his speech, this option doesn't describe the unique aspect of Wilson's *ethos*, which focuses on his character and position."}, {"text": "Appealing directly to the audience's emotions of fear and patriotism.", "isCorrect": false, "rationale": "This describes pathos, an appeal to emotion, not the specific nature of Wilson's ethos as presented in the text."}]}, {"question": "The text suggests a key difference between Remarque's ethos and Holmes' ethos regarding their combat experience. What is it?", "options": [{"text": "Holmes volunteered out of principle, while Remarque was conscripted.", "isCorrect": true, "rationale": "The text states Holmes 'enlisted' and 'did not have to fight,' indicating choice, while Remarque 'was drafted at eighteen' and 'did not choose to serve,' highlighting the difference between voluntary and involuntary service."}, {"text": "Remarque suffered more severe wounds than Holmes.", "isCorrect": false, "rationale": "Both were wounded, but the text does not compare the severity of their wounds as a point of distinction for their respective ethos."}, {"text": "Holmes' experience was typical, while Remarque's was exceptional.", "isCorrect": false, "rationale": "The text states Holmes' experience was 'exceptional, not typical,' while Remarque's ethos comes from 'typicality' and representing the 'common experience.'"}, {"text": "Remarque fought for Germany, while Holmes fought for the Union.", "isCorrect": false, "rationale": "While historically accurate, the text does not use their respective sides in the war as the defining difference in their *ethos*."}]}, {"question": "According to the definition provided, an 'Appeal to Authority' becomes problematic when:", "options": [{"text": "It relies solely on the speaker's credentials or position.", "isCorrect": false, "rationale": "The definition states that appeals to authority 'draws its persuasive force from the speaker's credentials, experience, or position' and are 'not inherently fallacious,' implying reliance itself isn't the problem."}, {"text": "The authority cited is irrelevant to the claim being made.", "isCorrect": true, "rationale": "The definition explicitly states that appeals to authority become problematic 'when the authority cited is irrelevant to the claim being made, or when the appeal substitutes for evidence that should be provided.'"}, {"text": "The argument uses persuasive force.", "isCorrect": false, "rationale": "Appeals to authority are defined as arguments that 'draws its persuasive force.' Persuasive force is an inherent characteristic, not what makes it problematic."}, {"text": "Experts are deferred to in their fields.", "isCorrect": false, "rationale": "The definition explicitly states 'we reasonably defer to experts in their fields,' indicating this is a non-problematic use."}]}, {"question": "A contemporary political commentator, known for previously working within a government agency and now publicly exposing its alleged corrupt practices, would most closely align with which type of ethos discussed in the text?", "options": [{"text": "The Volunteer (Holmes)", "isCorrect": false, "rationale": "Holmes' ethos is about personal sacrifice in chosen combat, not exposing institutional corruption."}, {"text": "The Statesman (Wilson)", "isCorrect": false, "rationale": "Wilson's ethos is about positional authority and reluctance to act from that office, not insider betrayal or whistle-blowing."}, {"text": "The Insider (Butler)", "isCorrect": true, "rationale": "Butler's ethos is described as 'insider betrayal,' where he 'knows the institution from the inside and declares it corrupt.' This aligns perfectly with a former government insider exposing alleged corrupt practices."}, {"text": "The Witness (Remarque)", "isCorrect": false, "rationale": "Remarque's ethos is about representative, ordinary experience of combat, not specifically about exposing internal institutional wrongdoing."}]}, {"question": "What is identified as a potential weakness of Woodrow Wilson's ethos?", "options": [{"text": "He lacked significant political experience before becoming president.", "isCorrect": false, "rationale": "The text identifies Wilson as a 'scholar, a university president, a politician,' suggesting he had substantial experience."}, {"text": "His arguments were often based on emotion rather than reason.", "isCorrect": false, "rationale": "The text discusses the source of his authority (ethos) rather than the nature of his arguments (logos or pathos)."}, {"text": "He had never personally experienced the combat he was asking others to endure.", "isCorrect": true, "rationale": "The 'Four Types of Authority' comparison section lists Wilson's weakness as: 'he has never experienced what he is asking others to endure.'"}, {"text": "Critics could question his sincerity, given his past peace campaigns.", "isCorrect": false, "rationale": "The text presents his past peace campaigns as reinforcing his *reluctance*, which adds to his ethos as a 'reluctant warrior,' rather than diminishing it as a weakness."}]}, {"question": "The concluding paragraph of the section emphasizes what crucial point about different forms of ethos?", "options": [{"text": "Some forms of ethos are inherently superior to others for persuasive arguments.", "isCorrect": false, "rationale": "The text explicitly states: 'None of these forms of ethos is inherently superior to the others.'"}, {"text": "The goal is to determine which type of authority is universally 'best.'", "isCorrect": false, "rationale": "The text states the critical reader's task is 'not to decide which authority is 'best''."}, {"text": "Each writer's specific authority shapes what arguments they can effectively make or are prevented from making.", "isCorrect": true, "rationale": "The text concludes by stating, 'The question is not who has the right to speak, but what each speaker's particular authority allows — and prevents — him from saying.'"}, {"text": "Ethos is only effective when it relies on direct personal experience.", "isCorrect": false, "rationale": "Wilson's ethos, for example, relies on positional authority and reluctance, not direct personal combat experience, yet is presented as effective."}]}, {"question": "What is highlighted as a unique strength of Remarque's ethos compared to the others?", "options": [{"text": "His extensive military training and strategic expertise.", "isCorrect": false, "rationale": "The text describes Remarque as an 'ordinary young man,' emphasizing his common experience rather than strategic expertise."}, {"text": "His ability to speak for the common, non-exceptional soldier.", "isCorrect": true, "rationale": "The text states Remarque's strength is that 'he speaks for the common soldier' and his authority comes from 'typicality — the ability to speak for the common experience rather than the exceptional one.'"}, {"text": "His deliberate choice to fight for a cause he believed in.", "isCorrect": false, "rationale": "The text explicitly states Remarque 'did not choose to serve' and 'was not a volunteer animated by principle.'"}, {"text": "His eloquent philosophical arguments against war.", "isCorrect": false, "rationale": "The text notes his weakness is that 'he offers no argument, only testimony,' focusing on his experience as a witness rather than his argumentative skill."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
