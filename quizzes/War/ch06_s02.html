        <div class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 6, Section 2</div>
    </div>

    <div id="score-box" class="score-box">

        <div class="score-pct" id="score-pct"></div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "According to the text, what is the fundamental question an audience silently asks that ethos primarily addresses?", "options": [{"text": "What evidence supports your claim?", "isCorrect": false, "rationale": "While evidence is crucial for an argument, ethos specifically addresses the speaker's right to speak, not the evidence itself. This relates more to logos."}, {"text": "Why should I listen to you?", "isCorrect": true, "rationale": "The text explicitly states: 'Every argument begins with a question the audience asks silently: Why should I listen to you? The answer to that question is ethos…'"}, {"text": "What emotional connection do you have to this topic?", "isCorrect": false, "rationale": "Emotional connection relates more to pathos, the appeal to emotion, rather than the speaker's inherent credibility, character, and authority, which is ethos."}, {"text": "What are your logical conclusions?", "isCorrect": false, "rationale": "Logical conclusions pertain to the structure and reasoning of the argument, which falls under logos, not the initial credibility of the speaker (ethos)."}], "id": "q01"}, {"question": "Oliver Wendell Holmes Jr.'s ethos is described as stemming from 'personal sacrifice.' How does this specific form of authority impact the audience's reception of his celebration of martial virtue?", "options": [{"text": "It makes his views seem theoretical and detached, as he romanticizes past events.", "isCorrect": false, "rationale": "The text states the opposite; his experience means he is 'not theorizing about war from a library' and makes his views 'far more difficult to dismiss.'"}, {"text": "It prompts the audience to question his objectivity due to his deep emotional involvement.", "isCorrect": false, "rationale": "While emotional involvement is present, his personal sacrifice primarily grants him authority, not immediate skepticism about objectivity, according to the text's description of his ethos's impact."}, {"text": "It lends undeniable credibility, making his celebration of war's virtues far more persuasive and difficult to dismiss.", "isCorrect": true, "rationale": "The text explains that his authority 'rests on the fact that he paid for that faith in blood' and 'makes his celebration of martial virtue far more difficult to dismiss.'"}, {"text": "It highlights his exceptional experience, making his perspective unrelatable to the common person.", "isCorrect": false, "rationale": "While his experience was exceptional (a weakness noted in the spectrum comparison), the immediate impact discussed for Holmes' ethos is the strength it gives to his argument, not its unrelatability."}], "id": "q02"}, {"question": "Smedley Butler's denunciation of war as 'a racket' is considered 'devastating' primarily because of what aspect of his ethos?", "options": [{"text": "His academic background provides an intellectual foundation for his critique.", "isCorrect": false, "rationale": "Butler's ethos is based on his career as a decorated professional warrior, not an academic background."}, {"text": "He speaks as a lifelong pacifist who has always opposed military action.", "isCorrect": false, "rationale": "The text explicitly states he is 'not speaking as a pacifist who has never held a rifle,' but as 'the man who held the rifle longer and more effectively than almost anyone else.'"}, {"text": "His authority comes from an 'insider betrayal,' where a highly decorated general turns against the very institution that honored him.", "isCorrect": true, "rationale": "The text highlights his 'insider betrayal' and 'reversal,' where 'the audience expects a decorated general to defend the institution... When he attacks it instead, the surprise lends his words enormous force.'"}, {"text": "His arguments are based purely on logical economic analysis rather than personal experience.", "isCorrect": false, "rationale": "While he condemns war's economics, his authority comes from his extensive personal experience as a warrior, not solely from logical analysis."}], "id": "q03"}, {"question": "Woodrow Wilson's ethos combines positional authority with 'reluctance.' How does the 'reluctance' factor specifically strengthen his appeal for war?", "options": [{"text": "It makes him seem less committed to the cause, suggesting an open mind to alternatives.", "isCorrect": false, "rationale": "His reluctance isn't about being uncommitted, but about having exhausted all alternatives, which strengthens the case for war, implying it's the only option left."}, {"text": "It demonstrates his humility, making him more personally likable to the audience.", "isCorrect": false, "rationale": "While it might contribute to likability, the primary rhetorical effect described is making the case for war stronger by showing it's a last resort."}, {"text": "It suggests that if even someone who desperately tried to avoid war concludes it's necessary, the reasons for war must be exceptionally compelling.", "isCorrect": true, "rationale": "The text explains: 'if even the man who tried hardest to avoid war concludes that war is necessary, the case must be strong indeed.' This is the core of the 'reluctant warrior' ethos."}, {"text": "It distinguishes him from soldiers, allowing him to present a detached, objective perspective.", "isCorrect": false, "rationale": "His distinction from soldiers comes from his office, not his reluctance. Reluctance provides a moral rather than an objective dimension to his appeal."}], "id": "q04"}, {"question": "According to the definition provided, an 'Appeal to Authority' becomes problematic under which specific condition?", "options": [{"text": "When the speaker is a recognized expert in their field.", "isCorrect": false, "rationale": "The text states that 'we reasonably defer to experts in their fields,' indicating this is a valid use of authority, not problematic."}, {"text": "When it is used to support a claim that is already widely accepted.", "isCorrect": false, "rationale": "The text does not mention this as a condition for an appeal to authority becoming problematic. Authority can still be used to reinforce accepted claims."}, {"text": "When the authority cited is irrelevant to the claim being made, or when it substitutes for necessary evidence.", "isCorrect": true, "rationale": "The definition explicitly states that appeals to authority become problematic 'when the authority cited is irrelevant to the claim being made, or when the appeal substitutes for evidence that should be provided.'"}, {"text": "When it is presented by a speaker with a strong emotional connection to the subject.", "isCorrect": false, "rationale": "A strong emotional connection relates to pathos. While it can influence an audience, it is not the condition given for when an appeal to authority becomes problematic."}], "id": "q05"}, {"question": "Erich Maria Remarque's ethos is rooted in 'representativeness.' How does this differentiate his authority from that of Holmes, Butler, or Wilson?", "options": [{"text": "Remarque's authority comes from his deliberate choice to serve, similar to Holmes.", "isCorrect": false, "rationale": "The text explicitly states Remarque 'did not choose to serve' and was drafted, contrasting him with Holmes who 'chose his war'."}, {"text": "Remarque speaks from the perspective of an ordinary conscript, representing the common experience, unlike the exceptional figures of the others.", "isCorrect": true, "rationale": "The text highlights Remarque's 'typicality' and 'ordinariness,' noting he 'speaks for the common soldier' rather than the 'exceptional one' like Holmes, Butler, or Wilson."}, {"text": "Remarque holds a high office, giving him positional authority similar to Wilson.", "isCorrect": false, "rationale": "Remarque was a drafted soldier, not a high-ranking official or president, so his authority does not come from office."}, {"text": "Remarque's authority is based on his extensive professional military career, like Butler's.", "isCorrect": false, "rationale": "Remarque was a conscript, not a 'career professional who climbed the ranks' like Butler."}], "id": "q06"}, {"question": "Which of the four figures discussed would likely face the criticism that their ethos, while strong, might struggle to convince an audience unfamiliar with the specific experience of choosing to confront danger?", "options": [{"text": "Smedley Butler, due to his 'insider betrayal' ethos.", "isCorrect": false, "rationale": "Butler's weakness is critics questioning why he served so long before speaking out, not a lack of understanding of chosen danger."}, {"text": "Woodrow Wilson, due to his 'statesman' ethos.", "isCorrect": false, "rationale": "Wilson's weakness is that 'he has never experienced what he is asking others to endure,' which is a lack of direct combat experience, not a misunderstanding of chosen danger."}, {"text": "Erich Maria Remarque, due to his 'witness' ethos.", "isCorrect": false, "rationale": "Remarque's ethos is based on representing the typical, shared experience, which would be widely relatable, not hard to convince. His weakness is offering testimony, not argument."}, {"text": "Oliver Wendell Holmes Jr., due to his 'volunteer' ethos of chosen sacrifice.", "isCorrect": true, "rationale": "Holmes' strength is 'no one can accuse him of cowardice,' but his weakness is 'his experience was exceptional, not typical.' This exceptionalism, tied to his choice to fight, might be less universally understood than the common experience."}], "id": "q07"}, {"question": "A historian is analyzing a speech by a former military general who, after a long and distinguished career, has become a vocal critic of military spending, arguing from personal knowledge that much of it is wasteful and ineffective. Which type of ethos, as described in the text, most closely aligns with this general's persuasive approach?", "options": [{"text": "Holmes's 'volunteer' ethos, as he chose to serve and now reflects.", "isCorrect": false, "rationale": "Holmes's ethos is about chosen sacrifice to celebrate war's virtues; this general is condemning an aspect of the military, reflecting Butler's 'insider betrayal.'"}, {"text": "Butler's 'insider' ethos, as a professional who turned against the system from within.", "isCorrect": true, "rationale": "The general's scenario mirrors Butler's ethos: a decorated professional ('long and distinguished career') who uses their intimate knowledge ('personal knowledge') to criticize ('vocal critic') the institution they served ('military spending')."}, {"text": "Wilson's 'statesman' ethos, as he holds a position of authority and expresses reluctance.", "isCorrect": false, "rationale": "This general's authority comes from experience, not a political office like Wilson's, nor is the primary driver 'reluctance' to act."}, {"text": "Remarque's 'witness' ethos, as he represents the common soldier's experience.", "isCorrect": false, "rationale": "Remarque's ethos is about the ordinary conscript experience. A 'former military general' is an 'exceptional' figure, not an ordinary witness in this sense."}], "id": "q08"}, {"question": "The text concludes by stating that 'The question is not who has the right to speak, but what each speaker's particular authority allows — and prevents — him from saying.' What is the most accurate interpretation of this concluding thought?", "options": [{"text": "Some forms of ethos are inherently superior and grant a broader right to speak on all subjects.", "isCorrect": false, "rationale": "The text explicitly states: 'None of these forms of ethos is inherently superior to the others' and that the task is not to decide which is 'best'."}, {"text": "A speaker's ethos dictates the topics they are credible to address and the perspective they can authentically convey.", "isCorrect": true, "rationale": "This aligns perfectly with the conclusion that ethos 'allows — and prevents — him from saying,' meaning each type of authority shapes and limits the specific arguments a speaker can make effectively."}, {"text": "Ethos is a static quality, and speakers should only address topics strictly within their established sphere of authority.", "isCorrect": false, "rationale": "While ethos defines credibility for specific topics, the text emphasizes understanding its function, not imposing strict, static boundaries, or suggesting it prevents speaking outside a narrow sphere entirely, but rather shapes the *type* of argument that is persuasive."}, {"text": "The most effective arguments come from speakers who possess multiple forms of ethos simultaneously.", "isCorrect": false, "rationale": "The text does not suggest combining ethos types is superior; rather, it focuses on understanding the strengths and limitations of each distinct type."}], "id": "q09"}, {"question": "What is identified as a key 'weakness' of Woodrow Wilson's 'statesman' ethos?", "options": [{"text": "His positional authority is often seen as unearned.", "isCorrect": false, "rationale": "The text does not suggest his positional authority as President is 'unearned'; it's explicitly stated as a source of strength ('the weight of the presidency')."}, {"text": "He has never personally experienced the combat he is asking others to endure.", "isCorrect": true, "rationale": "The 'comparison' section lists Wilson's weakness as: 'he has never experienced what he is asking others to endure,' which is a crucial limitation of his particular ethos."}, {"text": "His reluctance makes him appear indecisive and weak to a wartime audience.", "isCorrect": false, "rationale": "The text describes his reluctance as a *strength*, making his case for war stronger because he tried to avoid it, not a weakness making him appear indecisive."}, {"text": "He is unable to provide strong logical arguments due to his focus on duty.", "isCorrect": false, "rationale": "The text does not state that his ethos prevents him from making logical arguments; it focuses on his lack of personal combat experience as his weakness."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
