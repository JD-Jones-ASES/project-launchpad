    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/War.html">&larr; Back to War: A Debate in Primary Sources</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 6, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the fundamental question an audience silently asks that 'ethos' is designed to answer?", "options": [{"text": "What evidence do you have to support these claims?", "isCorrect": false, "rationale": "This question seeks 'logos' or logical proof, whereas ethos focuses on the speaker's personal standing."}, {"text": "Why should I listen to you?", "isCorrect": true, "rationale": "The text identifies this specific question as the starting point of every argument, which ethos addresses through credibility and authority."}, {"text": "How does this argument affect my personal well-being?", "isCorrect": false, "rationale": "This relates more to the audience's interests or 'pathos' rather than the speaker's right to speak."}, {"text": "Are you speaking from a position of objective truth?", "isCorrect": false, "rationale": "While related to credibility, the text emphasizes the speaker's character and right to the podium over abstract objectivity."}], "id": "q01"}, {"question": "Why is Oliver Wendell Holmes Jr.'s celebration of martial virtue described as difficult to dismiss?", "options": [{"text": "He used his status as a son of a famous writer to gain literary credibility.", "isCorrect": false, "rationale": "While he was the son of a famous writer, the text argues this background actually made his choice to serve more significant, rather than being the source of his martial authority."}, {"text": "He spoke from a position of academic expertise gained at Harvard.", "isCorrect": false, "rationale": "The text explicitly states his authority does not come from 'theorizing about war from a library'."}, {"text": "He chose to enlist and suffered multiple life-threatening wounds in combat.", "isCorrect": true, "rationale": "His ethos is rooted in personal sacrifice and the fact that he 'paid for that faith in blood,' giving him the right to speak on the subject."}, {"text": "He was the only speaker mentioned who volunteered for three different wars.", "isCorrect": false, "rationale": "Holmes served in one war (the Civil War) where he was wounded three times, whereas Butler is the one noted for serving in multiple global conflicts."}], "id": "q02"}, {"question": "What specific rhetorical mechanism gives Smedley Butler's denunciation of war such 'enormous force'?", "options": [{"text": "The use of statistical evidence regarding the economics of the 'racket'.", "isCorrect": false, "rationale": "While he mentions the racket, the text emphasizes his authority comes from his identity rather than his data."}, {"text": "The unexpected reversal of a decorated insider attacking his own institution.", "isCorrect": true, "rationale": "The audience expects a high-ranking hero to defend the military; his betrayal of those expectations provides his words with unique power."}, {"text": "His status as a pacifist who refused to hold a rifle for moral reasons.", "isCorrect": false, "rationale": "The text explicitly states he is not a pacifist and that he held a rifle 'longer and more effectively than almost anyone else'."}, {"text": "His ability to speak for the common conscript despite being a General.", "isCorrect": false, "rationale": "Speaking for the common experience is the hallmark of Remarque's ethos, not Butler's."}], "id": "q03"}, {"question": "Woodrow Wilson's ethos as a 'reluctant warrior' is strengthened by which historical context?", "options": [{"text": "His previous experience as a high-ranking military officer in the Spanish-American War.", "isCorrect": false, "rationale": "Wilson was not a soldier; he was a scholar and politician with no personal combat experience."}, {"text": "His 1916 re-election campaign slogan, 'He Kept Us Out of War'.", "isCorrect": true, "rationale": "By reversing a core campaign promise, he signaled that the necessity of war was so great it compelled him to act against his own previous efforts for peace."}, {"text": "His refusal to seek Congressional approval before declaring war.", "isCorrect": false, "rationale": "The text notes he stood 'before Congress on April 2, 1917' to request the declaration, which is a standard use of positional authority."}, {"text": "The fact that he had been wounded in a previous conflict, similar to Holmes.", "isCorrect": false, "rationale": "Wilson's ethos is distinct because it does not rely on physical sacrifice or combat experience."}], "id": "q04"}, {"question": "In the comparison of ethos types, what is identified as the primary 'weakness' of Erich Maria Remarque's authority?", "options": [{"text": "He offers only personal testimony rather than a logical policy argument.", "isCorrect": true, "rationale": "The text notes that testimony alone cannot settle complex policy questions, making his 'witness' ethos limited in certain rhetorical contexts."}, {"text": "He was a volunteer who could not relate to the common soldier.", "isCorrect": false, "rationale": "Remarque was a conscript, not a volunteer; his strength was specifically his ability to relate to the common soldier."}, {"text": "His experience was too exceptional to be considered typical.", "isCorrect": false, "rationale": "The text attributes 'exceptional' experience to Holmes, while Remarque is defined by his 'typicality'."}, {"text": "Critics can question why he didn't turn against the system sooner.", "isCorrect": false, "rationale": "This specific criticism is attributed to Butler's 'insider' ethos, not Remarque's 'witness' ethos."}], "id": "q05"}, {"question": "According to the definition provided, when does an 'appeal to authority' become problematic in an argument?", "options": [{"text": "Whenever a speaker uses their professional credentials to support a claim.", "isCorrect": false, "rationale": "The text states that deferring to experts is reasonable and not inherently fallacious."}, {"text": "When the speaker has a personal bias that the audience is aware of.", "isCorrect": false, "rationale": "While bias is a factor in rhetoric, the text specifically identifies irrelevance and substitution for evidence as the key problems."}, {"text": "When the authority cited is irrelevant to the claim or is used to substitute for necessary evidence.", "isCorrect": true, "rationale": "An appeal to authority is fallacious if it bypasses logic and evidence where they are required, or if the authority lacks pertinent expertise."}, {"text": "Only when the speaker is a politician using positional power rather than experience.", "isCorrect": false, "rationale": "The text demonstrates that even politicians like Wilson can use positional power effectively; the problem lies in the relevance and application of that authority."}], "id": "q06"}, {"question": "How does Remarque's service record distinguish his ethos from that of Oliver Wendell Holmes Jr.?", "options": [{"text": "Holmes was a conscript who served out of duty, while Remarque was a professional soldier.", "isCorrect": false, "rationale": "The text describes Holmes as a volunteer and Remarque as a conscript."}, {"text": "Remarque's authority comes from his 'ordinariness' and lack of choice, unlike Holmes' deliberate sacrifice.", "isCorrect": true, "rationale": "Holmes' ethos is built on the choice to face danger, whereas Remarque speaks for the common, drafted soldier swept up by external forces."}, {"text": "Remarque spent the entire war in a hospital, while Holmes fought through multiple campaigns.", "isCorrect": false, "rationale": "Both were wounded and spent time in hospitals; the distinction is based on 'choice' versus 'representativeness'."}, {"text": "Holmes' ethos is based on the 'witness' model, while Remarque uses the 'insider' model.", "isCorrect": false, "rationale": "The text categorizes Holmes as 'The Volunteer' and Remarque as 'The Witness'."}], "id": "q07"}, {"question": "Which speaker's ethos is described as deriving from the weight of his office combined with the moral duty of acting against his own inclinations?", "options": [{"text": "Smedley Butler", "isCorrect": false, "rationale": "Butler's ethos comes from his career expertise and subsequent rebellion, not positional moral duty."}, {"text": "Woodrow Wilson", "isCorrect": true, "rationale": "Wilson combines the positional power of the Presidency with the 'ethos of reluctance' to create a powerful statesman-like authority."}, {"text": "Oliver Wendell Holmes Jr.", "isCorrect": false, "rationale": "Holmes' authority is based on personal combat sacrifice, not the power of a political office."}, {"text": "Erich Maria Remarque", "isCorrect": false, "rationale": "Remarque's authority is based on being a representative witness, and he held no high office."}], "id": "q08"}, {"question": "What is the primary strength of Butler's 'Insider' ethos according to the 'Ethos Spectrum'?", "options": [{"text": "He can speak for the millions of common soldiers who had no voice.", "isCorrect": false, "rationale": "This is the strength of Remarque's 'witness' ethos."}, {"text": "He knows the system from within and can expose its inner workings.", "isCorrect": true, "rationale": "As a highly decorated professional, he has deep, internal knowledge of the institution he is criticizing."}, {"text": "He cannot be accused of cowardice because he was a volunteer.", "isCorrect": false, "rationale": "While he wasn't a coward, the text specifically attributes the 'unassailable courage' strength to Holmes."}, {"text": "He carries the full weight of the United States government behind his words.", "isCorrect": false, "rationale": "This is the strength of Wilson's 'statesman' ethos."}], "id": "q09"}, {"question": "True or False: The text suggests that one form of ethos is inherently superior to the others in any rhetorical situation.", "options": [{"text": "True", "isCorrect": false, "rationale": "The text argues that no form is inherently superior and that each has specific strengths and limitations."}, {"text": "False", "isCorrect": true, "rationale": "The conclusion explicitly states that 'None of these forms of ethos is inherently superior' and that the reader's task is to understand how authority shapes the argument."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
