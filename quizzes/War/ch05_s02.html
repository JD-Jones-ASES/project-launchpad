        <h2>Results</h2>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary focus of 'reception history' as defined in the text?", "options": [{"text": "The study of how successive audiences interpreted and utilized a work over time.", "isCorrect": true, "rationale": "Reception history looks beyond original intent to see how an idea evolves and is applied by different generations."}, {"text": "The analysis of a writer's original intent and personal motivations.", "isCorrect": false, "rationale": "The text explicitly contrasts the writer's intent with the broader scope of how later generations understood the work."}, {"text": "The verification of the historical and logical truth of a rhetorical argument.", "isCorrect": false, "rationale": "Reception history focuses on the life of the idea in the public sphere rather than evaluating its objective truth."}, {"text": "The quantitative measurement of a text's sales or distribution figures.", "isCorrect": false, "rationale": "While distribution is a factor, the concept focuses more on interpretation and usage by audiences."}]}, {"question": "Which historical figure's rhetoric provided the foundational framework for American internationalism throughout the 20th century?", "options": [{"text": "Woodrow Wilson", "isCorrect": true, "rationale": "Wilson's argument that American power serves a moral purpose became the dominant operating framework for US foreign policy."}, {"text": "Oliver Wendell Holmes", "isCorrect": false, "rationale": "While Holmes' ideas persist in military culture, they did not become official government policy in the way Wilson's did."}, {"text": "Smedley Butler", "isCorrect": false, "rationale": "Butler's argument was largely marginalized for decades and stood in opposition to the dominant internationalist framework."}, {"text": "Erich Maria Remarque", "isCorrect": false, "rationale": "Remarque's impact was primarily literary and cultural rather than a direct shaper of official foreign policy."}]}, {"question": "Why was Smedley Butler's 'War Is a Racket' argument ineffective during the early 1940s despite its popularity in the 1930s?", "options": [{"text": "The existence of a war against fascism appeared to provide a clear moral justification.", "isCorrect": true, "rationale": "The perception of WWII as 'genuinely necessary' undercut Butler's claim that war is always an economic scheme for profit."}, {"text": "The American public had become entirely isolationist and ignored all war rhetoric.", "isCorrect": false, "rationale": "The text states the public was ready to accept a moral justification for war once the conflict with fascism began."}, {"text": "The government successfully suppressed the distribution of Butler's pamphlets.", "isCorrect": false, "rationale": "The failure was rhetorical and historical; the argument simply felt 'inadequate' to the audience's current circumstances."}, {"text": "Economic profits from the defense industry were at an all-time low during that period.", "isCorrect": false, "rationale": "The text suggests the issue was not the lack of profit, but that the moral stakes of the war against Hitler outweighed the 'racket' critique."}]}, {"question": "How does Oliver Wendell Holmes' 'martial idealism' continue to influence contemporary American culture?", "options": [{"text": "Through the belief that hardship and military service are essential for building virtue and character.", "isCorrect": true, "rationale": "Holmes' vision of war as a 'forge of virtue' persists in how many Americans talk about sacrifice and personal development."}, {"text": "By serving as the legal basis for modern Selective Service and draft laws.", "isCorrect": false, "rationale": "Holmes' influence is described as cultural and rhetorical rather than a specific legal or policy mechanism."}, {"text": "Through the widespread adoption of pacifism in modern military memorial ceremonies.", "isCorrect": false, "rationale": "Holmes represents the opposite of pacifism, focusing instead on the moral strength gained through combat and discipline."}, {"text": "By advocating for the complete removal of economic interests from military conflicts.", "isCorrect": false, "rationale": "This aligns more with Butler's critique; Holmes focused on the internal character of the soldier rather than the external economic motives."}]}, {"question": "In what way did Erich Maria Remarque's 'All Quiet on the Western Front' represent a paradigm shift in war literature?", "options": [{"text": "It replaced heroic imagery of war with depictions of mud, terror, and waste.", "isCorrect": true, "rationale": "Remarque moved the literary focus away from 'brave charges' toward the visceral, human cost of modern warfare."}, {"text": "It provided a successful political framework for ending international conflicts.", "isCorrect": false, "rationale": "The text notes that Remarque did not make a political argument or shape foreign policy directly."}, {"text": "It was the first novel to argue that war is primarily driven by economic profit.", "isCorrect": false, "rationale": "While it is an antiwar novel, the specific 'war as a racket' argument is attributed to Smedley Butler."}, {"text": "It reconciled the views of Wilson and Holmes into a single narrative.", "isCorrect": false, "rationale": "Remarque's work serves as a counterpoint to both moral internationalism and martial idealism by showing the physical reality of war."}]}, {"question": "According to the text, what is the determining factor in whether a rhetorical argument 'wins'?", "options": [{"text": "Whether the argument meets the needs of its audience at a particular historical moment.", "isCorrect": true, "rationale": "The text argues that timing, power, and circumstance determine which ideas take hold, regardless of their 'truth'."}, {"text": "The objective logical merits and factual accuracy of the argument.", "isCorrect": false, "rationale": "The text explicitly states that arguments succeed or fail based on historical factors, not just logical merits."}, {"text": "The author's ability to remain consistent across different generations.", "isCorrect": false, "rationale": "The text shows that the *same* argument can be effective at one time and ineffective at another due to changing contexts."}, {"text": "The complete absence of emotional or pathetic appeals in the delivery.", "isCorrect": false, "rationale": "Pathos is mentioned as a tool of rhetorical analysis, but the text emphasizes historical timing as the key to success."}]}, {"question": "Which conflict led to a major revival of Smedley Butler's argument 'War Is a Racket'?", "options": [{"text": "The Vietnam War", "isCorrect": true, "rationale": "The perceived lack of clear justification and the disproportionate cost to the working class mirrored Butler's earlier claims."}, {"text": "The Second World War", "isCorrect": false, "rationale": "The text notes that Butler's argument was marginalized during WWII because the war against Hitler felt justified."}, {"text": "The Korean War", "isCorrect": false, "rationale": "The text uses the Korean War as an example of Truman following the Wilsonian framework of defending freedom."}, {"text": "The First World War", "isCorrect": false, "rationale": "Butler wrote his pamphlet in the mid-1930s reflecting back on his service; his 'revival' happened much later."}]}, {"question": "How does the text link the concept of the 'Greatest Generation' to the four arguments?", "options": [{"text": "It views the praise of that generation as a modern expression of Holmes' martial idealism.", "isCorrect": true, "rationale": "Praising the sacrifices and virtue of soldiers channels Holmes' vision of war as a forge for moral strength."}, {"text": "It uses that generation as proof that Wilson's internationalism is objectively true.", "isCorrect": false, "rationale": "While they fought in a Wilsonian framework, the text links the 'praise' itself specifically to Holmes' ideas of character."}, {"text": "It argues that Butler's pamphlet was the primary inspiration for that generation's service.", "isCorrect": false, "rationale": "Butler's argument was largely ignored by that generation during their actual service in the 1940s."}, {"text": "It claims the 'Greatest Generation' rejected Remarque's depiction of war as waste.", "isCorrect": false, "rationale": "The text doesn't suggest a rejection, but rather that different rhetorical traditions (like Holmes') are used to talk about their legacy."}]}, {"question": "The text concludes that the debate between these four voices is 'never over.' What is the rationale for this statement?", "options": [{"text": "Every new war reopens these questions, requiring each generation to evaluate the arguments anew.", "isCorrect": true, "rationale": "The shifting visibility of war's costs and threats causes different arguments to surge or fade over time."}, {"text": "The four authors are still alive and continue to update their rhetorical strategies.", "isCorrect": false, "rationale": "These are historical figures; the 'debate' continues through the persistence of their ideas in current events."}, {"text": "The United States has reached a permanent consensus that combines all four views into one policy.", "isCorrect": false, "rationale": "The text argues that the arguments often compete and that no single one is a 'permanent winner'."}, {"text": "Rhetorical analysis tools have proven that all four arguments are equally true in all circumstances.", "isCorrect": false, "rationale": "The text suggests the effectiveness of the arguments is highly dependent on timing and context, not universal truth."}]}, {"question": "Which rhetorical element is specifically associated with Remarque's 'All Quiet on the Western Front' in the context of this chapter?", "options": [{"text": "Testimony", "isCorrect": true, "rationale": "Remarque's work is described as testimony that reminds people of the human cost of abstractions like 'democracy'."}, {"text": "Logos", "isCorrect": false, "rationale": "While it contains logical elements, the text emphasizes Remarque's power to shape 'imagination' and provide 'testimony'."}, {"text": "Official Government Policy", "isCorrect": false, "rationale": "The text explicitly states that Remarque's novel did *not* shape foreign policy."}, {"text": "Economic Critique", "isCorrect": false, "rationale": "Economic interest is the hallmark of Butler's argument, whereas Remarque focuses on the physical and psychological experience."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
