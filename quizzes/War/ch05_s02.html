<script>
var QUESTIONS = [{"question": "What was the fundamental distinction Woodrow Wilson made when justifying America's entry into World War I?", "options": [{"text": "Between wars fought for economic gain and wars fought for humanitarian reasons.", "isCorrect": false, "rationale": "While relevant to the debate, Wilson's core distinction for justification was not this; he focused on the nature of the specific war versus war in general."}, {"text": "Between war as a general category and a particular war fought for particular reasons.", "isCorrect": true, "rationale": "Wilson explicitly distinguished between wars-in-general (admitting many are unjust) and the specific war he proposed, which he deemed necessary and principled."}, {"text": "Between wars initiated by democracies and wars initiated by autocracies.", "isCorrect": false, "rationale": "Wilson did make a moral claim about democracy versus autocracy, but his fundamental *justification* for *this war* rested on a broader distinction about particularity, not just the type of government initiating it."}, {"text": "Between defensive wars and wars of aggression.", "isCorrect": false, "rationale": "While he framed it as self-defense, his argument went deeper, distinguishing this specific, principled conflict from the broader concept of war itself."}], "id": "q01"}, {"question": "According to Butler, what was the primary, disguised motivation for the United States' entry into World War I?", "options": [{"text": "To prevent the spread of communism in Europe and Russia.", "isCorrect": false, "rationale": "The text does not mention communism as a motive for WWI entry; this is historically inaccurate for the period and not Butler's argument."}, {"text": "To secure new colonial territories and expand American influence globally.", "isCorrect": false, "rationale": "While global influence might be a side effect, Butler specifically focused on tangible financial interests rather than territorial expansion."}, {"text": "To protect American economic investments and the profits of corporations and banks.", "isCorrect": true, "rationale": "Butler argued that Wilson's lofty language was a 'window dressing' for the real motive: saving Wall Street's investments and the enormous profits made by American manufacturers supplying the Allies."}, {"text": "To establish the United States as the undisputed military superpower.", "isCorrect": false, "rationale": "This could be a long-term consequence, but Butler's immediate focus for the *disguised* motive was specific financial gain rather than abstract power projection."}], "id": "q02"}, {"question": "Which of the following best represents the core difference in analytical approach between Wilson and Butler regarding the United States' involvement in WWI?", "options": [{"text": "Wilson believed in military intervention, while Butler advocated for diplomatic solutions.", "isCorrect": false, "rationale": "This oversimplifies their positions; the core difference lies in their analysis of *why* nations go to war, not just the preferred method of conflict resolution."}, {"text": "Wilson focused on the immediate tactical necessities of war, while Butler focused on long-term peace settlements.", "isCorrect": false, "rationale": "Wilson did speak of long-term goals like 'making the world safe for democracy,' and Butler's critique was about immediate motives, not necessarily long-term settlements."}, {"text": "Wilson prioritized stated principles and moral obligations, while Butler prioritized structural economic incentives.", "isCorrect": true, "rationale": "Wilson asked readers to take seriously the possibility of principled action, while Butler urged them to 'follow the money' and consider the economic structures driving war."}, {"text": "Wilson emphasized the importance of public opinion, while Butler highlighted the influence of military leaders.", "isCorrect": false, "rationale": "Neither the text suggests this as their core difference. Wilson sought public support for his principles, and Butler pointed to corporate influence, not military leaders directly."}], "id": "q03"}, {"question": "A nation's leader argues that a current military intervention, though costly, is necessary to prevent a humanitarian crisis and uphold international law, even if previous interventions were unjust. This leader's argument most closely aligns with the perspective of whom?", "options": [{"text": "Holmes, who believed war ennobles the soul.", "isCorrect": false, "rationale": "Holmes's argument was about the effect of war on human character, not the justification of a specific war based on principles or humanitarian concerns."}, {"text": "Butler, who believed war rhetoric disguised economic motives.", "isCorrect": false, "rationale": "Butler would likely be skeptical of such rhetoric and look for hidden financial interests, not agree with the stated principles."}, {"text": "Wilson, who distinguished a particular necessary war from war in general.", "isCorrect": true, "rationale": "This scenario perfectly mirrors Wilson's argument: admitting many wars are unjust but insisting that *this particular war* is justified by principles (like humanitarian concerns and international law), akin to his 'war to make the world safe for democracy.'"}, {"text": "The Treaty of Versailles, which aimed for lasting peace.", "isCorrect": false, "rationale": "The Treaty of Versailles was a historical document, not a person or a philosophical position on war justification."}], "id": "q04"}, {"question": "An investigative journalist uncovers evidence that a government's decision to go to war was heavily influenced by lobbyists from defense contractors who stood to gain billions. This finding would most strongly support the argument of whom?", "options": [{"text": "Woodrow Wilson, who advocated for national self-interest.", "isCorrect": false, "rationale": "Wilson presented his case for war as one of principle and self-defense, not as a result of lobbying by defense contractors."}, {"text": "Butler, who argued that war rhetoric often disguised economic profit.", "isCorrect": true, "rationale": "This scenario directly aligns with Butler's central argument that the stated reasons for war are a cover for the real motive of economic profit, influenced by those who benefit."}, {"text": "The authors of the Zimmermann Telegram, who sought to provoke conflict.", "isCorrect": false, "rationale": "The Zimmermann Telegram was an external provocation, not an argument about internal motives for war."}, {"text": "Holmes, who focused on the moral impact of war on individuals.", "isCorrect": false, "rationale": "Holmes's focus was on the philosophical impact of war on human character, not the political or economic motivations behind its initiation."}], "id": "q05"}, {"question": "Beyond unrestricted submarine warfare, what other immediate provocation did Wilson cite as justification for the U.S. entering World War I?", "options": [{"text": "The sinking of the Lusitania.", "isCorrect": false, "rationale": "While the Lusitania was a casualty of submarine warfare, the text lists 'unrestricted submarine warfare' as a policy and the 'Zimmermann Telegram' as another distinct immediate provocation."}, {"text": "The assassination of Archduke Franz Ferdinand.", "isCorrect": false, "rationale": "This event sparked WWI but occurred in 1914 and was not a direct or immediate provocation for the *U.S. entry* in 1917."}, {"text": "The Zimmermann Telegram.", "isCorrect": true, "rationale": "The text explicitly states that 'The Zimmermann Telegram revealed that Germany was actively trying to draw Mexico into a war against the United States,' serving as a key immediate provocation alongside submarine warfare."}, {"text": "Germany's invasion of Belgium.", "isCorrect": false, "rationale": "Germany's invasion of Belgium was a major factor in drawing Britain into WWI but was not cited as an immediate provocation for U.S. entry in 1917 by Wilson in this context."}], "id": "q06"}, {"question": "The 'Timing Problem' discussed in the text primarily highlights what challenge in evaluating historical arguments about war?", "options": [{"text": "The difficulty of accessing complete and accurate historical data from different eras.", "isCorrect": false, "rationale": "While data access is a general historical challenge, the 'Timing Problem' specifically refers to the difference in knowledge and context between a real-time decision-maker and a retrospective critic."}, {"text": "The influence of personal biases and political affiliations on historical interpretation.", "isCorrect": false, "rationale": "While biases exist, the 'Timing Problem' focuses on the impact of chronological perspective, not just general bias."}, {"text": "The role of hindsight in shaping one's judgment of decisions made under pressure with incomplete information.", "isCorrect": true, "rationale": "The text explains that Wilson made his decision in real-time without full knowledge of future outcomes, while Butler wrote with the benefit of hindsight, knowing how the war ended and the peace failed."}, {"text": "The tendency of leaders to intentionally distort facts during wartime for propaganda purposes.", "isCorrect": false, "rationale": "While possible, the 'Timing Problem' doesn't focus on intentional distortion but on the natural disparity of information available at different points in time."}], "id": "q07"}, {"question": "When the text asks, 'can a war be both principled and profitable?', how would Butler most likely respond?", "options": [{"text": "Yes, profitability is an inevitable and acceptable outcome of any successful war effort.", "isCorrect": false, "rationale": "This view aligns more with Wilson's potential response that profit doesn't negate principle; Butler strongly disputes this."}, {"text": "Yes, if the profits are equitably distributed among all citizens.", "isCorrect": false, "rationale": "Butler's critique is not about the distribution of profits but about the profits themselves being the underlying motive, irrespective of how they are shared."}, {"text": "No, because when enormous profits are at stake, the stated cause is never truly independent of the financial interests behind it.", "isCorrect": true, "rationale": "Butler explicitly states that to think so is 'naive at best and dishonest at worst,' arguing that financial interests fundamentally corrupt the stated principles when profits are high."}, {"text": "It depends on whether the profits are used for national development or personal enrichment.", "isCorrect": false, "rationale": "Butler's argument is more fundamental, questioning the very independence of principle from profit, rather than the subsequent use of profits."}], "id": "q08"}, {"question": "The text states, 'An argument can be reasonable at the time it is made and still turn out to be wrong in its predictions.' Which of the following scenarios best exemplifies this idea?", "options": [{"text": "A military general's battle plan fails due to unforeseen enemy movements.", "isCorrect": false, "rationale": "This is a failure of prediction in a tactical context, but the 'Timing Problem' specifically discusses the validity of a *justification for war* given evolving historical outcomes."}, {"text": "A political leader's promise of economic prosperity after a war is not realized due to post-war instability.", "isCorrect": true, "rationale": "This mirrors Wilson's situation: his argument for making the world 'safe for democracy' was reasonable at the time, but the Treaty of Versailles' failures meant the prediction of lasting peace did not hold true, without necessarily invalidating the original sincerity or immediate reasonableness."}, {"text": "A historian's theory about a past event is disproven by newly discovered archaeological evidence.", "isCorrect": false, "rationale": "This relates to the accuracy of historical interpretation, not an argument being reasonable but having its predictions fail over time."}, {"text": "A country's alliance strategy backfires, leading to unforeseen enemies.", "isCorrect": false, "rationale": "This is a strategic miscalculation, not an example of an initially reasonable *argument* for war failing in its long-term predictions."}], "id": "q09"}, {"question": "The concluding paragraph suggests that a 'mature reader' should approach the arguments of Wilson and Butler by:", "options": [{"text": "Choosing the perspective that aligns most closely with their personal political beliefs.", "isCorrect": false, "rationale": "The text advocates for a balanced, analytical approach, not one driven by personal bias."}, {"text": "Primarily focusing on whether the war ultimately achieved its stated goals.", "isCorrect": false, "rationale": "While important, this is only one aspect of evaluation. The text specifically advises considering both stated reasons and underlying incentives, irrespective of outcomes."}, {"text": "Applying both methods of analysis—considering both stated reasons and structural incentives.", "isCorrect": true, "rationale": "The text explicitly concludes that 'a mature reader will learn to apply both rather than choosing one and ignoring the other,' recognizing the merits of analyzing both principled motivations and economic realities."}, {"text": "Discrediting Wilson's sincerity due to the later failures of the peace settlement.", "isCorrect": false, "rationale": "The text specifically warns against this, noting that sincerity and accuracy are not the same and an argument can be reasonable even if its predictions fail."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
