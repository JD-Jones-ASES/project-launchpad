<script>
var QUESTIONS = [{"question": "What is the central political disagreement between Woodrow Wilson and Butler concerning American involvement in World War I?", "options": [{"text": "Whether war itself is inherently ennobling or corrupting to human character.", "isCorrect": false, "rationale": "This describes the philosophical disagreement between Holmes and Butler, not the political one between Wilson and Butler as introduced in this section."}, {"text": "Whether a specific war can be justified, even if the system that produces wars is corrupt.", "isCorrect": true, "rationale": "The text explicitly states this as the core political disagreement: 'The political disagreement — between Wilson and Butler — concerns something more immediate: whether a specific war is justified, even if the system that produces wars is corrupt.'"}, {"text": "Whether Germany's actions truly constituted a direct threat to American lives and sovereignty.", "isCorrect": false, "rationale": "While Wilson certainly believed Germany posed a threat, the fundamental disagreement with Butler was about the underlying motives and justifications, not just the factual existence of the threat."}, {"text": "Whether the Treaty of Versailles successfully produced a lasting democratic order as Wilson promised.", "isCorrect": false, "rationale": "This is an outcome evaluated by Butler with hindsight, not the immediate political disagreement Wilson faced when justifying entry into the war."}], "id": "q01"}, {"question": "Which of the following was NOT one of Woodrow Wilson's primary stated justifications for the United States entering World War I?", "options": [{"text": "Germany's policy of unrestricted submarine warfare threatening American lives and commerce.", "isCorrect": false, "rationale": "Wilson explicitly cited Germany's unrestricted submarine warfare as a key immediate provocation and justification."}, {"text": "The Zimmermann Telegram revealing Germany's attempt to draw Mexico into a war against the United States.", "isCorrect": false, "rationale": "The Zimmermann Telegram was another immediate provocation that Wilson used to justify American entry into the war."}, {"text": "The need to secure profitable trade routes and protect American financial investments in Allied nations.", "isCorrect": true, "rationale": "This was Butler's core argument for the *real* motive behind the war, not Wilson's stated justification. Wilson presented his arguments in terms of defending principles and democracy."}, {"text": "A moral obligation to defend democratic governments against the autocratic powers of Central Europe.", "isCorrect": false, "rationale": "Wilson made a 'larger moral claim' that the autocratic governments threatened democracy itself, framing the war as a fight for principle."}], "id": "q02"}, {"question": "According to Butler, what was the fundamental flaw in Woodrow Wilson's justification for entering World War I?", "options": [{"text": "Wilson failed to adequately acknowledge the human cost and suffering that the war would inflict on American soldiers.", "isCorrect": false, "rationale": "Wilson explicitly called the decision to enter the war a 'fearful thing' and acknowledged it would cost American lives, so this was not Butler's main critique."}, {"text": "Wilson's lofty language about democracy and self-determination was a deceptive 'window dressing' for underlying economic motives.", "isCorrect": true, "rationale": "Butler argued that Wilson's rhetoric was a cover for the true motive: profit, especially concerning American banks and manufacturers."}, {"text": "Wilson overestimated the actual military threat posed by Germany to the United States' mainland.", "isCorrect": false, "rationale": "Butler focused on the *motive* behind the war, not an assessment of the military threat itself. His argument was about who benefits, not the degree of danger."}, {"text": "Wilson did not have the constitutional authority to declare war without a direct invasion of American soil.", "isCorrect": false, "rationale": "The text does not discuss constitutional arguments; Butler's critique is focused on economic incentives."}], "id": "q03"}, {"question": "Woodrow Wilson's argument for entering World War I rested on a key distinction that Butler refused to make. What was this distinction?", "options": [{"text": "The distinction between defensive wars fought to protect national borders and offensive wars fought to expand territory.", "isCorrect": false, "rationale": "While Wilson framed the war as self-defense, the text specifies a more fundamental distinction he made regarding the nature of war itself."}, {"text": "The distinction between wars fought by democratic nations and wars fought by autocratic empires.", "isCorrect": false, "rationale": "This was part of Wilson's *justification* for the war's principle, but not the *key distinction* he made about war as a concept, which Butler rejected."}, {"text": "The distinction between war as a general category and a particular war fought for specific reasons.", "isCorrect": true, "rationale": "The text explicitly states: 'Wilson's argument rests on a distinction that Butler refuses to make — the distinction between war as a general category and a particular war fought for particular reasons.'"}, {"text": "The distinction between wars motivated by sincere moral principles and wars driven by cynical self-interest.", "isCorrect": false, "rationale": "This aligns with Wilson's *view* of the war, but the text identifies a more foundational distinction he made about categorizing conflicts."}], "id": "q04"}, {"question": "A historian applying Butler's analytical framework to a modern international conflict would MOST LIKELY focus on which of the following?", "options": [{"text": "The official diplomatic statements and humanitarian justifications provided by the participating nations and international bodies.", "isCorrect": false, "rationale": "This aligns more with Wilson's approach of taking stated reasons seriously. Butler would consider these 'window dressing'."}, {"text": "The long-term societal impacts and psychological effects of warfare on the civilian population and combatants.", "isCorrect": false, "rationale": "While important, this reflects a sociological or philosophical analysis of war's consequences, not Butler's specific focus on economic *motivation* for entry into war."}, {"text": "The financial interests of corporations, banks, and arms manufacturers connected to the conflict, and their lobbying efforts.", "isCorrect": true, "rationale": "Butler's argument is summarized by 'follow the money.' He provided 'data — specific dollar figures showing how much corporations earned' and named names to support his claim of economic profit as the true motive."}, {"text": "The historical precedents of similar conflicts and their resolutions to predict the current conflict's outcome.", "isCorrect": false, "rationale": "This is a general historical methodology. Butler's framework offers a specific lens for analyzing the *causes* of war, not necessarily its outcomes by comparison to history."}], "id": "q05"}, {"question": "How do Wilson and Butler differ on the relationship between a war's stated principles and the financial profits derived from it?", "options": [{"text": "Wilson believes profits inherently invalidate any stated principles for war, while Butler believes they can coexist.", "isCorrect": false, "rationale": "This statement inverts their positions. Wilson believed principles and profits could coexist; Butler saw profits as undermining stated principles."}, {"text": "Wilson argues that a war's righteousness is independent of any aligning financial interests, whereas Butler sees stated principles as a cover for profit.", "isCorrect": true, "rationale": "Wilson stated 'the fact that some people profit from a just war does not make the war unjust.' Butler, conversely, believed 'the stated cause is never truly independent of the financial interests behind it,' seeing rhetoric as a disguise."}, {"text": "Both agree that war is primarily driven by profit, but disagree on whether it can ever be justified morally.", "isCorrect": false, "rationale": "Butler believed war was primarily driven by profit, but Wilson did not. Wilson believed it could be driven by principle."}, {"text": "Both believe that financial interests can never genuinely align with moral principles in warfare, leading to hypocrisy.", "isCorrect": false, "rationale": "This reflects Butler's skepticism, but Wilson believed such alignment was possible, arguing that profit did not negate righteousness."}], "id": "q06"}, {"question": "The 'Timing Problem' highlights a crucial aspect of evaluating the arguments of Wilson and Butler. What is it?", "options": [{"text": "It suggests that Wilson deliberately misrepresented facts to Congress because he was under immediate pressure to act.", "isCorrect": false, "rationale": "The text does not accuse Wilson of deliberate misrepresentation but rather notes he made his decision in 'real time, under pressure, with incomplete information.'"}, {"text": "It emphasizes that Butler's critique benefits from the clarity of hindsight, allowing him to analyze the war's actual outcomes and economic realities.", "isCorrect": true, "rationale": "The text states: 'Butler was writing with the benefit of eighteen years of hindsight, knowing how the war ended, knowing how much money was made, and knowing that the peace settlement at Versailles had failed.'"}, {"text": "It demonstrates that all historical justifications for war are ultimately proven wrong by subsequent events and a lack of lasting peace.", "isCorrect": false, "rationale": "The 'caution' box warns against this conclusion, stating 'It is tempting to say that because the war did not produce the lasting peace Wilson promised, his argument was wrong from the start. But that is not quite fair.'"}, {"text": "It proves that Wilson's stated reasons for war were fundamentally insincere from the very moment he presented them.", "isCorrect": false, "rationale": "The 'caution' box clarifies that 'Sincerity and accuracy are not the same thing,' suggesting Butler's critique could be accurate about motivation even if Wilson was sincere."}], "id": "q07"}, {"question": "The 'Hindsight Is Not the Same as Refutation' caution primarily means that:", "options": [{"text": "An argument can only be considered valid if all its predictions about future outcomes ultimately come true.", "isCorrect": false, "rationale": "This contradicts the caution, which states, 'An argument can be reasonable at the time it is made and still turn out to be wrong in its predictions.'"}, {"text": "It is important to judge past decisions and justifications based on the information and context available to decision-makers at that specific time.", "isCorrect": true, "rationale": "The caution argues it's 'not quite fair' to judge Wilson's argument solely by what happened after the war, implying the importance of contemporary context and available information."}, {"text": "Butler's entire argument is invalid because he wrote his critique years after World War I had concluded.", "isCorrect": false, "rationale": "The text explicitly states, 'This does not automatically discredit Butler's argument,' but rather raises 'a fair question about rhetoric and context.'"}, {"text": "A leader's personal sincerity in making an argument guarantees the factual accuracy of their claims and predictions.", "isCorrect": false, "rationale": "The caution directly states, 'Sincerity and accuracy are not the same thing,' distinguishing between belief and factual correctness."}], "id": "q08"}, {"question": "The text concludes that the political clash between Wilson and Butler is ultimately about what we should trust. What two elements represent this ultimate clash?", "options": [{"text": "The power of individual charisma versus the influence of organized political parties.", "isCorrect": false, "rationale": "While both may be factors in politics, the text identifies a more fundamental clash of analytical approaches."}, {"text": "The effectiveness of military strength versus the potential of diplomatic negotiations to prevent conflict.", "isCorrect": false, "rationale": "This is a debate about foreign policy tools, not the core analytical distinction presented as the ultimate clash between Wilson and Butler."}, {"text": "Stated reasons for action versus underlying structural incentives.", "isCorrect": true, "rationale": "The concluding paragraph explicitly states: 'The political clash between Wilson and Butler is ultimately a clash about what we should trust: stated reasons or structural incentives.'"}, {"text": "Idealistic visions for the future versus pragmatic assessments of immediate threats.", "isCorrect": false, "rationale": "While related to their perspectives, 'stated reasons' and 'structural incentives' are the precise terms used by the text to define their ultimate clash."}], "id": "q09"}, {"question": "Which type of specific evidence did Butler use to support his claim that economic profit was the real motive for American entry into World War I?", "options": [{"text": "Testimony from foreign diplomats confirming Germany's aggressive intentions against the U.S.", "isCorrect": false, "rationale": "This type of evidence would support Wilson's case for German provocation, not Butler's argument about economic motivation."}, {"text": "Detailed accounts from American soldiers about the poor quality of equipment and supplies they received.", "isCorrect": false, "rationale": "While possibly related to profiteering, this isn't the specific, direct evidence Butler provided to link war entry to profit. His focus was on the *scale* of profits."}, {"text": "Specific dollar figures showing corporate wartime profits compared to their peacetime earnings, and named corporations.", "isCorrect": true, "rationale": "The text states: 'He provided data — specific dollar figures showing how much corporations earned during the war, compared to their peacetime profits. He named names: Du Pont, Bethlehem Steel, U.S. Steel, Anaconda Copper.'"}, {"text": "Secret government documents revealing Wilson's personal financial investments in companies that benefited from the war.", "isCorrect": false, "rationale": "The text mentions Butler's focus on corporate profits and lobbying, not personal investments or secret documents from Wilson himself."}], "id": "q10"}, {"question": "Wilson's argument that the fact some people profit from a just war does not make the war unjust could be called the 'independent justification' defense. What is the strongest challenge to this position?", "options": [{"text": "The strongest challenge is that Wilson himself personally profited from the war, making his stated principles hypocritical.", "isCorrect": false, "rationale": "The text does not allege personal financial profit by Wilson. Butler's argument is about structural incentives and who influenced policy, not Wilson's personal wealth."}, {"text": "The strongest challenge is that when structural incentives systematically favor one outcome, they shape which evidence gets emphasized, which threats get taken seriously, and which arguments seem persuasive — making it nearly impossible to verify whether the stated principle was truly independent.", "isCorrect": true, "rationale": "Wilson's defense assumes the stated reasons can be cleanly separated from the financial incentives. But Butler's deeper point is that when enormous profits are at stake, the very perception of threats, the selection of which arguments feel compelling, and the weighing of evidence are all tilted by financial interest. This makes the independence claim nearly untestable."}, {"text": "The strongest challenge is that no war in history has ever been fought for purely principled reasons, making Wilson's claim historically implausible.", "isCorrect": false, "rationale": "Even if true, this historical generalization would not directly refute Wilson's specific claim about WWI. The challenge to the 'independent justification' defense needs to engage with the specific logical structure of the claim."}, {"text": "The strongest challenge is that Butler's data proves profits were the only cause of the war, leaving no room for Wilson's principles.", "isCorrect": false, "rationale": "Butler's data shows profits existed and were large; it does not prove they were the only cause. The text notes Butler never directly engages Wilson's specific arguments about submarine warfare or the Zimmermann Telegram."}], "id": "q11"}, {"question": "The text notes that Butler wrote eighteen years after the war, with hindsight about Versailles' failure and the scale of profits. Wilson wrote in 1917 under real-time pressure. Which of the following best describes the relationship between these different vantage points and the quality of their respective arguments?", "options": [{"text": "Wilson's argument is stronger because he was closer to the events and had access to classified information Butler lacked.", "isCorrect": false, "rationale": "Proximity to events does not automatically improve the quality of an argument; it may actually limit perspective. The text suggests Wilson's real-time position created the risk of acting on incomplete information, not an advantage."}, {"text": "Butler's argument is stronger because hindsight eliminates uncertainty; since Wilson's predictions did not come true, his reasoning was flawed from the start.", "isCorrect": false, "rationale": "The text explicitly warns against this: 'Hindsight is not the same as refutation.' An argument can be reasonable at the time it is made and still turn out to be wrong in its predictions."}, {"text": "Each vantage point has genuine advantages and genuine limitations: Wilson's real-time argument carries the risk of incomplete information and pressure; Butler's hindsight argument carries the risk of treating outcomes as proof of original intent.", "isCorrect": true, "rationale": "Wilson's contemporaneous argument is weakened by incomplete information and the distorting pressure of a crisis; Butler's retrospective argument is strengthened by knowing outcomes but risks assuming that because the war failed to produce lasting peace, Wilson must have been wrong or insincere from the start. Both risks must be held simultaneously."}, {"text": "Vantage point is irrelevant; what matters is whether the evidence each man cites is accurate.", "isCorrect": false, "rationale": "Vantage point is directly relevant to what evidence was available and how it was interpreted. The text devotes significant attention to the 'timing problem' precisely because when you write affects what you can know and how you frame what you know."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
