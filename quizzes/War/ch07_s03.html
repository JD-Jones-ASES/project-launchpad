<script>
var QUESTIONS = [{"question": "According to the 'A Final Word' section, why is there no single answer to the question 'What is war for'?", "options": [{"text": "Because historical records are incomplete and biased, making a definitive conclusion impossible.", "isCorrect": false, "rationale": "The text does not attribute the lack of a single answer to incomplete or biased historical records. Instead, it focuses on the inherent complexity of war itself."}, {"text": "War is too vast and terrible to be fully captured by any single perspective or analytical framework.", "isCorrect": true, "rationale": "The text explicitly states: 'It is a reflection of the fact that war is too vast and too terrible to be captured by any one frame of analysis.'"}, {"text": "Different nations have fundamentally different objectives for engaging in warfare.", "isCorrect": false, "rationale": "While different nations do have different objectives, the text attributes the lack of a single answer to the *nature* of war as an event, not solely to the diversity of national goals."}, {"text": "Philosophers and strategists have intentionally obfuscated the true purposes of war over centuries.", "isCorrect": false, "rationale": "The text does not suggest intentional obfuscation. It frames the differing views as genuine attempts to understand a complex phenomenon, each grasping some truth while missing others."}]}, {"question": "Erich Maria Remarque's 'voice of the soldier' is presented as crucial because it primarily provides:", "options": [{"text": "A definitive moral judgment on whether war is noble or corrupt.", "isCorrect": false, "rationale": "The text explicitly states, 'Remarque does not tell you whether war is noble or corrupt, necessary or avoidable.' His role is not to offer a moral judgment in the same vein as the other authors."}, {"text": "An economic analysis of the costs and benefits of armed conflict.", "isCorrect": false, "rationale": "Remarque's voice reports on the human cost and experience, not an economic analysis. Butler is associated with economic arguments."}, {"text": "A direct report of the human cost and suffering, challenging all other arguments with human reality.", "isCorrect": true, "rationale": "The text emphasizes that Remarque 'tells you what it costs' and that 'Every argument about war... must eventually confront the human reality that Remarque describes.'"}, {"text": "A historical account of specific battles and their strategic implications.", "isCorrect": false, "rationale": "Remarque's passage focuses on the psychological and emotional impact of war on soldiers, not specific historical battles or strategic implications."}]}, {"question": "The text differentiates between a 'moral argument' and an 'economic argument.' Which of the following best exemplifies a moral argument for war?", "options": [{"text": "A senator arguing that military intervention is necessary to secure vital oil resources for the nation's economy.", "isCorrect": false, "rationale": "This argument is grounded in 'calculations of cost and benefit' related to resources and economy, making it an economic argument according to the text's definition."}, {"text": "A general claiming that a preemptive strike will prevent higher future costs in lives and resources.", "isCorrect": false, "rationale": "This argument, while involving lives, frames it as a calculation to 'prevent higher future costs,' which leans towards an economic (cost-benefit) analysis rather than a claim about inherent right/wrong or justice."}, {"text": "A diplomat asserting that military action is imperative to defend universal human rights against an oppressive regime.", "isCorrect": true, "rationale": "This argument is 'grounded in claims about right and wrong, justice and injustice,' specifically concerning human rights, which aligns with the text's definition of a moral argument."}, {"text": "A business leader explaining how wartime contracts will boost national employment figures.", "isCorrect": false, "rationale": "This is clearly an economic argument, focused on 'calculations of cost and benefit' related to employment and the economy."}]}, {"question": "The skills presented as 'tools for citizenship' in this section are primarily intended to enable individuals to:", "options": [{"text": "Persuade others to adopt a unified stance on the necessity of war.", "isCorrect": false, "rationale": "The text emphasizes that people 'will continue to disagree' and that the goal is to 'participate in that disagreement with intelligence and integrity,' not to enforce a unified stance."}, {"text": "Memorize the arguments of Holmes, Butler, Wilson, and Remarque for historical context.", "isCorrect": false, "rationale": "While understanding these figures is part of it, the core purpose of the skills is to apply critical thinking to *future* debates, not just recall historical arguments."}, {"text": "Identify emotional appeals, evaluate evidence, and understand different types of arguments in future debates about war.", "isCorrect": true, "rationale": "The text lists these specific skills: 'identify when a speaker is appealing to your emotions rather than your reason,' 'ask what evidence supports a claim,' 'recognize the difference between a moral argument and an economic one.'"}, {"text": "Determine which of the four presented perspectives (Holmes, Butler, Wilson, Remarque) is ultimately correct.", "isCorrect": false, "rationale": "The text states that 'no single voice has the last word' and that one should 'hold four competing positions in your mind at once without collapsing them into a simple answer,' implying there isn't one 'correct' perspective to identify."}]}, {"question": "When the text states, 'Holmes makes a moral argument for war; Butler makes an economic one. Wilson makes both,' it implies that:", "options": [{"text": "Holmes and Butler represent opposing views, while Wilson attempts to reconcile them.", "isCorrect": false, "rationale": "While they do represent differing views, the statement is specifically about the *type* of argument each makes (moral/economic), not about reconciliation efforts."}, {"text": "It is possible for arguments about war to be grounded in principles of right/wrong, calculations of cost/benefit, or a combination of both.", "isCorrect": true, "rationale": "This statement directly reflects the definitions provided: Holmes's argument is about 'right and wrong,' Butler's about 'cost and benefit,' and Wilson's incorporates both, showing that arguments can be categorized in these ways."}, {"text": "Moral arguments are inherently superior to economic arguments in justifying war.", "isCorrect": false, "rationale": "The text does not establish a hierarchy of argument types but advises the reader to 'evaluate each on its own terms,' suggesting equal consideration, not superiority."}, {"text": "Only political leaders like Wilson can effectively combine moral and economic justifications for war.", "isCorrect": false, "rationale": "The text presents Wilson as an example of making both types of arguments, but it does not imply that only political leaders can do so or that it's an exclusive skill."}]}, {"question": "Imagine a national debate about potential military intervention. A speaker emphasizes the need to uphold national dignity and honor, and to demonstrate resolve on the global stage. Whose 'voice' would the textbook suggest you are hearing in these statements?", "options": [{"text": "Butler's voice, questioning who profits from conflict.", "isCorrect": false, "rationale": "Butler's voice is associated with questions about profiteering and economic aspects of war, not honor or dignity."}, {"text": "Remarque's voice, testifying to the human cost of war.", "isCorrect": false, "rationale": "Remarque's voice is about the brutal reality and suffering of soldiers, not abstract concepts like national dignity or honor."}, {"text": "Holmes's voice, in the calls to honor and sacrifice.", "isCorrect": true, "rationale": "The text states, 'You will hear Holmes' voice in the calls to honor and sacrifice,' directly linking these concepts to Holmes's perspective on martial virtue."}, {"text": "Wilson's voice, arguing for democratic necessity.", "isCorrect": false, "rationale": "Wilson's voice is linked to arguments about necessity and democracy, which are distinct from calls to national dignity and honor."}]}, {"question": "The statement 'The question is not whether war causes suffering; everyone agrees that it does. The question is whether any purpose, any principle, any national interest is large enough to justify that suffering' highlights which central dilemma of war?", "options": [{"text": "The logistical challenges of minimizing casualties in modern warfare.", "isCorrect": false, "rationale": "The statement addresses the *justification* of suffering, not the logistical challenges of minimizing it, though that is a related but distinct issue."}, {"text": "The unavoidable ethical trade-off between suffering and perceived greater good or objective.", "isCorrect": true, "rationale": "This directly captures the essence of the statement: acknowledging suffering is inevitable but questioning if the 'purpose, principle, or national interest' is weighty enough to 'justify' that suffering, which is an ethical trade-off."}, {"text": "The differing definitions of 'suffering' across cultures and historical periods.", "isCorrect": false, "rationale": "The text takes 'suffering' as a generally understood concept and focuses on its justification, not its definition or cultural variations."}, {"text": "The difficulty in accurately measuring the extent of human suffering caused by war.", "isCorrect": false, "rationale": "While measuring suffering can be difficult, the core question posed is about *justification*, assuming suffering occurs, rather than its quantification."}]}, {"question": "One of the key messages of 'A Final Word' is that for future debates on war, individuals should primarily aim to:", "options": [{"text": "Align their opinions with established historical precedents and expert consensus.", "isCorrect": false, "rationale": "The text encourages critical thinking and independent decision-making ('decide for yourself'), rather than simply aligning with existing precedents or consensus."}, {"text": "Become skilled at rhetorical persuasion to influence public opinion towards peace.", "isCorrect": false, "rationale": "While advocating for peace might be a personal outcome, the skills provided are for intelligent participation and evaluation ('demand evidence,' 'identify assumptions'), not specifically for rhetorical persuasion towards a particular outcome."}, {"text": "Listen to diverse perspectives, critically analyze arguments, and form their own informed conclusions.", "isCorrect": true, "rationale": "The text advises: 'Listen carefully to all of them. Demand evidence. Identify assumptions. Ask what has been left out. And then decide for yourself.' This encapsulates listening, critical analysis, and independent conclusion-forming."}, {"text": "Prioritize the economic impact of war as the most objective metric for decision-making.", "isCorrect": false, "rationale": "The text highlights both moral and economic arguments and advises evaluating 'each on its own terms,' not prioritizing one type of argument over another as 'most objective.'"}]}, {"question": "The text suggests that when a country debates whether to go to war, questions about 'who profits' from the conflict would resonate with the perspective of:", "options": [{"text": "Holmes, who focused on martial virtue.", "isCorrect": false, "rationale": "Holmes's perspective is linked to 'honor and sacrifice,' not questions of profit."}, {"text": "Remarque, who described the soldier's experience.", "isCorrect": false, "rationale": "Remarque's voice reports the human cost and reality for soldiers, not economic profiteering."}, {"text": "Wilson, who defended democratic necessity.", "isCorrect": false, "rationale": "Wilson's voice is associated with arguments about 'necessity and democracy,' not primarily with who profits."}, {"text": "Butler, who indicted profiteering.", "isCorrect": true, "rationale": "The text explicitly states, 'You will hear Butler's voice in the questions about who profits,' directly linking his perspective to concerns about profiteering."}]}, {"question": "The final sentence, 'The question remains. It always will,' reinforces the idea that:", "options": [{"text": "Humanity is incapable of learning from past conflicts.", "isCorrect": false, "rationale": "The text emphasizes learning (gaining 'tools') to participate intelligently, not an inability to learn. The 'question remains' refers to the ongoing debate, not a failure to learn."}, {"text": "There will never be a universally agreed-upon answer to the fundamental purpose or justification of war.", "isCorrect": true, "rationale": "The entire section argues that war is too complex for a single answer and that 'Honest people have answered that question differently for thousands of years, and they will continue to disagree.' The concluding sentence reinforces this perpetual nature of the debate."}, {"text": "Political leaders consistently fail to address the core issues leading to war.", "isCorrect": false, "rationale": "While political leadership is involved, the focus of the conclusion is on the inherent complexity of the 'What is war for?' question itself, rather than a critique of political failure."}, {"text": "The study of war is an academic exercise with no practical application.", "isCorrect": false, "rationale": "On the contrary, the text frames the acquired skills as 'skills for citizenship' and vital for future participation in real-world debates, implying significant practical application."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
