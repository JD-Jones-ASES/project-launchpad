<script>
var QUESTIONS = [{"question": "According to Holmes, what societal shift significantly characterized the generation governing the world in 1895, diverging from traditional ideals?", "options": [{"text": "A renewed emphasis on scientific discovery as the ultimate truth.", "isCorrect": false, "rationale": "While Holmes notes science shaking established religion, he primarily critiques the shift towards commercialism and away from ideals of honor, rather than highlighting science as the dominant new ideal."}, {"text": "A global movement towards universal suffrage and political equality.", "isCorrect": false, "rationale": "The text does not mention universal suffrage or political equality as a defining characteristic or a point of critique in Holmes's analysis of his contemporary society."}, {"text": "The dominance of commercial aspirations and a rejection of war as \"out of fashion.\"", "isCorrect": true, "rationale": "Holmes explicitly states, 'Commerce is the great power. The aspirations of the world are those of commerce,' and observes that 'war is out of fashion' and declared 'wicked, foolish, and soon to disappear.'"}, {"text": "A widespread return to established religious practices and moral codes.", "isCorrect": false, "rationale": "Holmes suggests the opposite, stating that 'science has shaken established religion in the minds of very many' and that traditional creeds are collapsing."}], "id": "q01"}, {"question": "When Holmes begins his speech with the analogy of a blind man playing a flute in Washington Street, what is he primarily suggesting about his own address?", "options": [{"text": "That his message, like the flute's music, might be largely ignored by the busy crowd.", "isCorrect": true, "rationale": "Holmes states, 'I suppose that someone hears him. Perhaps also my pipe may reach the heart of some passer in the crowd,' implying that in a bustling, commercially-focused world, his message (his 'pipe') might only reach a few, just as the blind flutist's music might only be heard by 'someone.'"}, {"text": "That his speech is intended only for a select, discerning few who appreciate art.", "isCorrect": false, "rationale": "While he acknowledges his message might not be widely heard, his phrasing 'some passer' suggests he hopes to reach anyone willing to listen, not just an exclusive artistic elite."}, {"text": "That he, like the blind man, possesses a hidden talent that will surprise his audience.", "isCorrect": false, "rationale": "The analogy focuses on the act of being heard amidst distraction, not on hidden talents or surprising the audience."}, {"text": "That his argument, though unconventional, will resonate universally due to its emotional depth.", "isCorrect": false, "rationale": "Holmes's phrasing indicates uncertainty ('Perhaps') about the reach of his message, not an expectation of universal resonance, especially given the preceding context about commercialism."}], "id": "q02"}, {"question": "Holmes identifies a particular societal force as \"the great power\" in his contemporary world, shaping its aspirations. What is this force?", "options": [{"text": "Established religion.", "isCorrect": false, "rationale": "Holmes notes that 'science has shaken established religion,' indicating it is not 'the great power' of his time."}, {"text": "Military might.", "isCorrect": false, "rationale": "Holmes explicitly states that 'war is out of fashion,' contradicting the idea that military might is the defining power of society."}, {"text": "Commerce.", "isCorrect": true, "rationale": "Holmes directly states, 'Commerce is the great power. The aspirations of the world are those of commerce,' highlighting its dominant influence."}, {"text": "Scientific inquiry.", "isCorrect": false, "rationale": "While science has a role in changing perspectives, Holmes attributes 'the great power' directly to commerce, not science."}], "id": "q03"}, {"question": "How does Holmes describe his contemporary society's prevailing attitude towards pain and suffering?", "options": [{"text": "It sees pain as a necessary catalyst for personal growth and strength.", "isCorrect": false, "rationale": "Holmes observes the opposite trend, stating that 'evil means pain, and the revolt against pain in all its forms has grown more and more marked.'"}, {"text": "It increasingly views suffering as a wrong that can and ought to be prevented.", "isCorrect": true, "rationale": "Holmes states, 'we express in numberless ways the notion that suffering is a wrong which can be and ought to be prevented,' citing examples from animal cruelty societies to socialism."}, {"text": "It believes that science will eventually eradicate all forms of physical and emotional discomfort.", "isCorrect": false, "rationale": "While science plays a part in modern tendencies, Holmes describes the general societal 'revolt against pain,' not a specific belief in scientific eradication of it."}, {"text": "It romanticizes the experience of hardship as a path to spiritual enlightenment.", "isCorrect": false, "rationale": "The text does not support the idea that society romanticizes hardship; rather, it seeks to avoid it."}], "id": "q04"}, {"question": "Holmes's central claim about \"the faith is true and adorable\" refers most accurately to which of the following?", "options": [{"text": "The unwavering belief in a divine providence that guides all human affairs.", "isCorrect": false, "rationale": "Holmes explicitly mentions 'the collapse of creeds' and states 'I do not know the meaning of the universe,' indicating his 'faith' is not tied to conventional divine providence."}, {"text": "A soldier's willingness to sacrifice his life for a duty he may not fully comprehend.", "isCorrect": true, "rationale": "Holmes defines this faith as that 'which leads a soldier to throw away his life in obedience to a blindly accepted duty, in a cause which he little understands, in a plan of campaign of which he has little notion, under tactics of which he does not see the use.'"}, {"text": "The shared camaraderie and loyalty among soldiers in times of peace and war.", "isCorrect": false, "rationale": "While camaraderie is a part of military life, it is not the core 'faith' Holmes describes, which centers on individual sacrifice and a 'blind belief' beyond understanding."}, {"text": "The intellectual pursuit of knowledge and understanding about the universe's meaning.", "isCorrect": false, "rationale": "Holmes states, 'I do not know what is true. I do not know the meaning of the universe,' contrasting this with the soldier's faith, which is not about intellectual understanding."}], "id": "q05"}, {"question": "To underscore the enduring value of a warrior's ideals, Holmes invokes figures like Beowulf and Tennyson's Merlin. What common theme do these references primarily serve to highlight?", "options": [{"text": "The historical evolution of military tactics and strategy.", "isCorrect": false, "rationale": "Holmes uses these figures to illustrate an enduring spirit and ideal, not to discuss military strategies."}, {"text": "The timeless human fascination with mythical creatures and fantasy.", "isCorrect": false, "rationale": "While Beowulf and Merlin are mythical, Holmes references them for their association with heroic ideals, not just their mythical quality."}, {"text": "The persistent presence of heroism, honor, and struggle across different eras.", "isCorrect": true, "rationale": "Holmes quotes Beowulf: 'Let him who may, gain honor ere death. That is best for a warrior when he is dead,' and Tennyson's 'Follow The Gleam,' connecting ancient and modern concepts of valor and pursuit of ideals despite struggle."}, {"text": "The inevitable decline of traditional heroic values in the face of modern progress.", "isCorrect": false, "rationale": "Holmes uses these examples to argue *against* the decline of such values, suggesting they are a part of human destiny that persists."}], "id": "q06"}, {"question": "Holmes includes vivid, graphic descriptions of battle experiences (e.g., spherical case-shot, bullets splashing in mud, dead men's bodies). What is the primary rhetorical purpose of these detailed accounts?", "options": [{"text": "To shock and deter young men from pursuing military careers.", "isCorrect": false, "rationale": "Holmes is addressing veterans and advocating for the inherent value of the soldier's experience and faith, not deterring future service."}, {"text": "To provide historical documentation of specific Civil War engagements.", "isCorrect": false, "rationale": "While the examples are from the Civil War, their primary purpose in the speech is not merely historical accuracy but to support his philosophical argument."}, {"text": "To challenge the prevailing societal view that war is \"wicked\" by illustrating its harsh realities.", "isCorrect": false, "rationale": "While he does challenge the view that war is wicked, the descriptions specifically serve to validate the 'soldier's faith' that emerges from such realities, rather than just illustrating them."}, {"text": "To validate the existence and nature of \"the faith\" he describes by appealing to the shared experience of veterans.", "isCorrect": true, "rationale": "Holmes builds to the conclusion, 'if, in short... you have known the vicissitudes of terror and triumph in war; you know that there is such a thing as the faith I spoke of,' directly linking the shared, visceral experiences to the undeniable reality of this 'blind belief.'"}], "id": "q07"}, {"question": "What is Holmes's fundamental belief regarding \"the struggle for life\"?", "options": [{"text": "It is a temporary condition that human ingenuity will eventually overcome.", "isCorrect": false, "rationale": "Holmes explicitly states, 'I cannot imagine that it ever will be lifted from men's backs,' indicating it is not temporary."}, {"text": "It is the inherent and inescapable \"order of the world.\"", "isCorrect": true, "rationale": "Holmes declares, 'I believe that the struggle for life is the order of the world, at which it is vain to repine,' affirming its fundamental and unavoidable nature."}, {"text": "It is a regrettable consequence of societal failures that can be reformed.", "isCorrect": false, "rationale": "Holmes views struggle as inherent to existence, not merely a remediable societal failure."}, {"text": "It is primarily an intellectual battle, not a physical one.", "isCorrect": false, "rationale": "While intellectual struggles exist, Holmes uses the vivid, physical realities of war and battle to exemplify this struggle, indicating it's not solely intellectual."}], "id": "q08"}, {"question": "Holmes contrasts the traditional ideal of a \"gentleman\" with the aspirations of his contemporary society. What is the key distinction he draws?", "options": [{"text": "Gentlemen prioritize intellectual pursuits, while modern society values artistic expression.", "isCorrect": false, "rationale": "This contrast is not the main point Holmes makes about the gentleman ideal versus modern aspirations, which focuses more on honor vs. comfort/wealth."}, {"text": "Gentlemen are defined by a \"splendid carelessness for life\" and honor, while modern society seeks comfort and wealth.", "isCorrect": true, "rationale": "Holmes asks, 'What has that name been built on but the soldier's choice of honor rather than life?' and critiques modern society's longing for a world 'in which they may be comfortable and may shine without much trouble or any danger.'"}, {"text": "Gentlemen adhere to strict religious doctrines, whereas modern society embraces secularism.", "isCorrect": false, "rationale": "While he mentions science shaking religion, this is not the core contrast he draws when discussing the ideal of a 'gentleman.'"}, {"text": "Gentlemen are rooted in local communities, while modern society pursues cosmopolitanism for its own sake.", "isCorrect": false, "rationale": "He mentions 'cosmopolitanism' dismissively, but the primary contrast for the 'gentleman' ideal is specifically honor/sacrifice versus comfort/material gain."}], "id": "q09"}, {"question": "The introductory paragraph before \"primarysourceThe Soldier's Faith\" instructs the reader to \"Read with attention to his sentence rhythms,\" \"Notice where Holmes draws on his personal experience,\" and \"think critically about the argument underneath it.\" What is the primary purpose of these instructions?", "options": [{"text": "To prepare the reader for a purely historical analysis of the Civil War era.", "isCorrect": false, "rationale": "While the speech is historical, the instructions push beyond mere historical analysis, focusing on rhetorical and philosophical engagement."}, {"text": "To highlight Holmes's biography as a wounded soldier and his literary achievements.", "isCorrect": false, "rationale": "It mentions his personal experience and masterful writing but does so to guide *how* to read the text, not merely to present biographical facts."}, {"text": "To guide the reader in analyzing both the rhetorical force and the underlying arguments of the speech.", "isCorrect": true, "rationale": "The introduction explicitly states, 'Your job is to feel the force of the rhetoric and to think critically about the argument underneath it,' encapsulating the dual focus on style ('sentence rhythms') and content ('argument,' 'boldest claims')."}, {"text": "To encourage readers to accept Holmes's arguments as self-evident truths.", "isCorrect": false, "rationale": "The instruction explicitly warns that 'masterful writing can make even debatable ideas sound self-evident' and emphasizes the need to 'think critically,' directly opposing uncritical acceptance."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
