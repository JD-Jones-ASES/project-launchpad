<script>
var QUESTIONS = [{"question": "What is the core idea Holmes refers to as \"the faith is true and adorable\" in \"The Soldier's Faith\"?", "options": [{"text": "The belief that wealth and commerce are the true drivers of societal progress and happiness.", "isCorrect": false, "rationale": "Holmes explicitly criticizes the contemporary glorification of wealth and commerce, stating that 'Commerce is the great power' but then contrasts it with the soldier's ideal."}, {"text": "The conviction that humanity will eventually eliminate all forms of pain and suffering through scientific advancement.", "isCorrect": false, "rationale": "Holmes laments the modern doctrine that 'evil means pain' and the 'revolt against pain,' arguing that struggle is the 'order of the world' and cannot be lifted."}, {"text": "The willingness of a soldier to sacrifice their life in obedience to a blindly accepted duty for a cause they may not fully comprehend.", "isCorrect": true, "rationale": "Holmes explicitly states, 'the faith is true and adorable which leads a soldier to throw away his life in obedience to a blindly accepted duty, in a cause which he little understands...'"}, {"text": "The inherent human desire for comfort and safety above all other virtues.", "isCorrect": false, "rationale": "Holmes portrays the desire for comfort and safety as a negative modern aspiration, contrasting it with the 'splendid carelessness for life' embodied by the soldier."}]}, {"question": "Holmes critiques several contemporary societal trends. Which of the following best encapsulates his concern about modern aspirations?", "options": [{"text": "The overwhelming focus on scientific innovation as the sole path to truth and meaning.", "isCorrect": false, "rationale": "While Holmes critiques how science has 'shaken established religion' and reduced the world to 'an aimless web,' this is a part of his broader concern, not the sole encapsulation of it."}, {"text": "The increasing popularity of nationalist movements over international cooperation.", "isCorrect": false, "rationale": "Holmes actually dismisses 'cosmopolitanism' (global community) as 'rootless self-seeking,' implying a desire for more, not less, love of country or national identity."}, {"text": "A widespread shift towards prioritizing personal comfort, wealth, and the avoidance of pain over honor and struggle.", "isCorrect": true, "rationale": "Holmes directly criticizes those who 'may be comfortable and may shine without much trouble or any danger,' the belief that 'money is the main thing,' and the 'revolt against pain,' all in contrast to the ideals of honor and struggle."}, {"text": "The decline of traditional religious institutions and the rise of secular humanism.", "isCorrect": false, "rationale": "Holmes mentions science shaking religion, but his critique extends beyond just religion to a fundamental shift in values, emphasizing the devaluing of struggle, honor, and duty."}]}, {"question": "According to Holmes, what is the fundamental characteristic that has historically defined a \"gentleman\"?", "options": [{"text": "A man of significant inherited wealth and social standing.", "isCorrect": false, "rationale": "Holmes explicitly contrasts the desire for wealth ('Vanderbilt sits, there is the head of the table') with the true meaning of a gentleman, implying wealth is not the defining factor."}, {"text": "One who possesses a deep understanding of philosophy and moral principles.", "isCorrect": false, "rationale": "While a gentleman might possess these qualities, Holmes's definition focuses on a specific type of courage and sacrifice, not intellectual achievement alone."}, {"text": "The soldier's choice of honor and duty over the preservation of his own life.", "isCorrect": true, "rationale": "Holmes states, 'Who is there who would not like to be thought a gentleman? Yet what has that name been built on but the soldier’s choice of honor rather than life?'"}, {"text": "An individual dedicated to philanthropic endeavors and labor reform.", "isCorrect": false, "rationale": "Holmes groups 'philanthropists, labor reformers, and men of fashion' as those who long for a society where 'they may be comfortable,' implicitly critiquing their focus over the soldier's virtue."}]}, {"question": "Holmes posits a view on human suffering and struggle that directly contrasts with prevailing contemporary beliefs. What is his stance?", "options": [{"text": "He believes that suffering is an evil that can and ought to be prevented through societal progress.", "isCorrect": false, "rationale": "Holmes describes this as the 'doctrine that evil means pain, and the revolt against pain... has grown more and more marked,' which he clearly views as a negative modern trend he opposes."}, {"text": "He asserts that the struggle for life is an inherent and inescapable order of the world, essential for human destiny.", "isCorrect": true, "rationale": "Holmes states, 'I believe that the struggle for life is the order of the world, at which it is vain to repine... I cannot imagine that it ever will be lifted from men's backs.' He sees battle as man's destiny."}, {"text": "He argues that pain serves as a critical motivator for individuals to pursue wealth and comfort.", "isCorrect": false, "rationale": "While he links the desire for comfort to the avoidance of pain, he does not suggest pain is a positive motivator for these ends; rather, he laments the flight from struggle."}, {"text": "He suggests that while suffering is unavoidable, its only value lies in inspiring 'a whole literature of sympathy.'", "isCorrect": false, "rationale": "Holmes mentions 'a whole literature of sympathy' as an outcome of the modern 'revolt against pain,' but he critiques this as focusing on failure rather than the transformative power of struggle and honor."}]}, {"question": "In \"The Soldier's Faith,\" Holmes expresses a critical view of modern science's impact on human perception. How does he characterize this impact?", "options": [{"text": "Science has fostered a universal, catholic acceptance of new, empowering truths.", "isCorrect": false, "rationale": "Holmes mentions 'catholic acceptance' in a hypothetical future where science 'shall take control of life, and condemn at once with instant execution,' indicating a dystopian rather than empowering vision."}, {"text": "Science has enhanced the perception of the world's thrilling colors, passions, and sounds.", "isCorrect": false, "rationale": "Holmes states the opposite: science has made 'this thrilling world of colors and passions and sounds has seemed fatally to resolve itself into one vast network of vibrations endlessly weaving an aimless web.'"}, {"text": "Science has stripped the world of spiritual meaning, reducing it to an aimless network of vibrations.", "isCorrect": true, "rationale": "Holmes argues that science 'has shaken established religion' and caused the world to seem to 'resolve itself into one vast network of vibrations endlessly weaving an aimless web,' causing the 'smile of God' to fade 'into the pale irony of the void.'"}, {"text": "Science has proven the inherent wickedness and foolishness of war, leading to its imminent disappearance.", "isCorrect": false, "rationale": "Holmes attributes the declaration that 'war is wicked, foolish, and soon to disappear' to 'Moralists and philosophers, following its [commerce's] lead,' not directly to science."}]}, {"question": "Holmes vividly describes scenes of battle, such as the \"blue line of fire at the dead angle of Spotsylvania\" or \"feeling your foot slip upon a dead man's body.\" What is the primary rhetorical purpose of these descriptions?", "options": [{"text": "To illustrate the unmitigated horror and futility of war, advocating for its abolition.", "isCorrect": false, "rationale": "While the descriptions convey horror, Holmes's ultimate purpose is to validate the 'soldier's faith' that emerges from such experiences, not to argue for war's abolition."}, {"text": "To provide historical context for the audience, many of whom were Civil War veterans.", "isCorrect": false, "rationale": "While these descriptions reference historical events familiar to his audience, their primary function within the speech is not merely informational but deeply persuasive, connecting experience to his core argument."}, {"text": "To demonstrate the 'cynic force' of common sense that assails soldiers, which must be overcome by faith.", "isCorrect": true, "rationale": "Holmes states, 'Most men who know battle know the cynic force with which the thoughts of common sense will assail them in times of stress; but they know that in their greatest moments faith has trampled those thoughts underfoot.' These descriptions serve to illustrate the conditions under which such faith is forged."}, {"text": "To emphasize the importance of training and tactics in overcoming the chaos of combat.", "isCorrect": false, "rationale": "Holmes's focus in these passages is on the internal human response to extreme conditions and the emergence of faith, not on the practicalities of military training or strategy."}]}, {"question": "Holmes refers to figures like Beowulf and Tennyson primarily to:", "options": [{"text": "Suggest that historical narratives about war are often romanticized and inaccurate.", "isCorrect": false, "rationale": "Holmes uses these figures as evidence of a long-standing tradition of valuing struggle and honor, not to critique the accuracy or romanticism of their depictions."}, {"text": "Argue that the ideals of courage and honor have been consistently valued throughout Western history.", "isCorrect": true, "rationale": "Holmes states that from 'Beowulf' to Tennyson, 'all have had the same vision, and all have had a glimpse of a light to be followed,' citing Beowulf's emphasis on gaining 'honor ere death' and Tennyson's 'Follow The Gleam' as examples of enduring heroic ideals."}, {"text": "Show how literature, in the \"stall-fed poetry of modern English drawing rooms,\" has grown soft and sentimental.", "isCorrect": false, "rationale": "While he mentions 'stall-fed poetry' as a contrast, Beowulf and Tennyson are presented as embodying the robust, enduring vision he advocates, not as examples of modern softness."}, {"text": "Highlight the evolving understanding of military strategy from ancient times to modern warfare.", "isCorrect": false, "rationale": "Holmes's discussion revolves around human ideals, character, and spirit in the face of conflict, not the technical evolution of military strategy."}]}, {"question": "Near the end of his speech, Holmes acknowledges that the \"business of youth and early middle age\" is war, and addresses the younger members of his audience. What is the significance of this direct address?", "options": [{"text": "It serves as a somber warning about the inevitability of future conflicts they will face.", "isCorrect": false, "rationale": "While it acknowledges the possibility of future wars, the tone is more of a challenge and an entrustment of ideals than merely a warning."}, {"text": "It challenges the younger generation to embrace the \"soldier's faith\" and be prepared to uphold traditional martial ideals.", "isCorrect": true, "rationale": "Holmes directly tells them, 'You who called this assemblage together... would be the soldiers of another war... and it is for you to hear the bugles as once we heard them... For you it is that now is sung the Song of the Sword,' effectively passing on the responsibility of this 'faith'."}, {"text": "It apologizes for the previous generation's failures in preventing war, placing the burden on the youth.", "isCorrect": false, "rationale": "There is no apology in Holmes's address; instead, he expresses the continuity of human destiny in struggle and the responsibility of each generation to face it."}, {"text": "It criticizes the youth for their lack of experience and understanding of true combat.", "isCorrect": false, "rationale": "Holmes shares his own past 'illusion' about soldiers being old, but he doesn't criticize the youth. Instead, he prepares them, acknowledging their potential role."}]}, {"question": "Holmes asks, \"What kind of world do you want?\" and then describes a comfortable, well-fed world \"without the divine folly of honor, without the senseless passion for knowledge... without ideals the essence of which is that they can never be achieved?\" What is he arguing about this hypothetical world?", "options": [{"text": "That it is a utopian vision that humanity should strive to achieve through peace and comfort.", "isCorrect": false, "rationale": "Holmes directly challenges the desirability of such a world with the rhetorical question, 'But who of us could endure a world... without the divine folly of honor...?' indicating he finds it undesirable."}, {"text": "That such a world, devoid of challenging ideals and honor, would ultimately be unsatisfying and undesirable for humanity.", "isCorrect": true, "rationale": "Holmes uses rhetorical questions to suggest that despite the comfort, such a world would be hollow and lacking the essential 'divine folly of honor' and unachievable ideals that make life meaningful for him."}, {"text": "That while comfortable, it represents a necessary sacrifice of old ideals for modern progress.", "isCorrect": false, "rationale": "Holmes does not see this as a 'necessary sacrifice' but rather a problematic erosion of vital human qualities. He explicitly defends the 'inheritance' of warrior ideals."}, {"text": "That it represents a realistic future that science and philanthropy will inevitably create.", "isCorrect": false, "rationale": "Holmes introduces this world as a hypothetical scenario within a challenge ('Who of us could endure a world...') rather than an inevitable or desirable future."}]}, {"question": "Considering the entire speech, what is Holmes's overarching message or primary aim in delivering \"The Soldier's Faith\"?", "options": [{"text": "To mourn the sacrifices of Civil War veterans and advocate for increased support for them.", "isCorrect": false, "rationale": "While the speech is delivered on Memorial Day to veterans, its scope is much broader than specific veteran support; it addresses universal human values and destiny."}, {"text": "To challenge the prevailing societal trends that devalue martial virtues and elevate comfort and wealth, asserting the enduring value of struggle and honor.", "isCorrect": true, "rationale": "Holmes explicitly contrasts the 'man of wealth' and the societal longing for comfort and prevention of pain with his belief that 'struggle for life is the order of the world' and that the 'soldier's faith' represents the highest form of human honor and duty."}, {"text": "To provide a historical account of warfare and its impact on the development of national identity.", "isCorrect": false, "rationale": "Holmes uses historical and personal examples, but these serve his larger persuasive argument about enduring human nature and ideals, rather than being an aim to simply recount history."}, {"text": "To encourage the audience to seek personal enlightenment through self-reflection and philosophical inquiry.", "isCorrect": false, "rationale": "While the speech is philosophical, its primary call is for an active, duty-bound 'faith' that embraces external struggle and sacrifice, rather than solely internal philosophical inquiry."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
