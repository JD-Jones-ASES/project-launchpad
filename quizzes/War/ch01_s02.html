<script>
var QUESTIONS = [{"question": "In 1895, thirty years after the Civil War, the text describes a significant societal shift in America. Which of the following best characterizes this transformation?", "options": [{"text": "A renewed focus on military expansion and global power projection, driven by a new generation of veterans.", "isCorrect": false, "rationale": "The text states that the 'generation that had known the sound of cannon was giving way to a generation that knew only the sound of commerce,' indicating a shift away from military focus, not towards it."}, {"text": "A transition from a wartime economy focused on manufacturing armaments to an agrarian society centered on farming.", "isCorrect": false, "rationale": "The text explicitly states that America 'was now the world's largest industrial economy,' highlighting industrialization, not a return to an agrarian society."}, {"text": "A cultural shift where the experiences and values of Civil War veterans were increasingly dominant in public discourse.", "isCorrect": false, "rationale": "The text implies the opposite, noting that the 'generation that had known the sound of cannon was giving way to a generation that knew only the sound of commerce,' suggesting a decrease in the dominance of veteran experiences."}, {"text": "A move from a generation defined by military conflict and duty to one increasingly driven by industrial commerce and material comfort.", "isCorrect": true, "rationale": "The text directly stated and implied throughout the Gilded Age section that the 'generation that had known the sound of cannon was giving way to a generation that knew only the sound of commerce' and that the nation's aspirations 'had shifted from honor to profit, from duty to comfort.' This option accurately captures the described transformation."}]}, {"question": "Oliver Wendell Holmes Jr. was troubled by the aspirations of Gilded Age America primarily because he believed:", "options": [{"text": "The nation's industrial growth was unsustainable and would inevitably lead to economic collapse.", "isCorrect": false, "rationale": "While an economic concern, the text focuses on Holmes's moral and societal concerns about the *values* being lost, rather than purely economic sustainability."}, {"text": "The pursuit of vast fortunes by individuals like Carnegie and Rockefeller was inherently immoral and exploitative.", "isCorrect": false, "rationale": "Holmes mentions these figures to illustrate the 'staggering size' of fortunes, but his concern extends beyond the individual morality of wealth accumulation to the broader societal values of profit and comfort replacing honor and duty."}, {"text": "A society solely focused on material comfort and profit risked losing essential virtues like sacrifice and the willingness to act for a greater good.", "isCorrect": true, "rationale": "The text directly states Holmes 'believed that a society devoted entirely to material comfort would lose something essential — the capacity for sacrifice, the willingness to risk everything for something larger than oneself.' This is his primary concern."}, {"text": "The growing emphasis on business and law careers would deter young men from pursuing military service, weakening national defense.", "isCorrect": false, "rationale": "While Holmes notes that few young men would 'hear a shot fired in anger,' his core concern is the loss of virtues such as sacrifice and courage, which he believes are essential for a healthy civilization, rather than just military recruitment."}]}, {"question": "By the 1890s, Memorial Day had evolved beyond its initial purpose. Which statement accurately describes its character at the time Holmes delivered 'The Soldier's Faith'?", "options": [{"text": "It was exclusively a private day of mourning for individual families who had lost loved ones in the Civil War.", "isCorrect": false, "rationale": "The text states that 'by the 1890s it had become a national occasion for speeches, parades, and public remembrance,' indicating a broader, public nature."}, {"text": "It had transformed into a national holiday primarily celebrating industrial achievement and economic prosperity.", "isCorrect": false, "rationale": "While the Gilded Age was characterized by industrial growth, Memorial Day's focus remained on remembrance of the war dead, not industrial celebration, as indicated by the Harvard tradition of addresses on the 'meaning of the war'."}, {"text": "It served as a national occasion for public remembrance, speeches, and parades, often featuring addresses on the war's meaning and civic obligations.", "isCorrect": true, "rationale": "The text explicitly states, 'By the 1890s it had become a national occasion for speeches, parades, and public remembrance,' and mentions the Harvard tradition of 'an annual address... on the meaning of the war and the obligations of the living to the dead.'"}, {"text": "It was a day dedicated to lobbying efforts by veterans' organizations for increased government benefits and pensions.", "isCorrect": false, "rationale": "The text mentions veterans' organizations (like the Grand Army of the Republic) organized 'ceremonies throughout the country' for remembrance, not lobbying for benefits."}]}, {"question": "What is the central argument Holmes makes in 'The Soldier's Faith,' beyond being a nostalgic tribute?", "options": [{"text": "That the physical scars and psychological trauma of war are a necessary foundation for national unity.", "isCorrect": false, "rationale": "The text emphasizes the *virtues* cultivated by war as indispensable, not the trauma itself as a foundation for unity."}, {"text": "That the virtues cultivated by war, such as courage and willingness to sacrifice, are essential for a healthy and thriving civilization.", "isCorrect": true, "rationale": "The text explicitly states, 'It is an argument — a carefully constructed case that the virtues cultivated by war are indispensable to a healthy civilization.' It further clarifies these virtues as 'courage, faith, and the willingness to act without guarantees.'"}, {"text": "That historical remembrance is crucial to prevent future generations from engaging in armed conflict.", "isCorrect": false, "rationale": "While remembrance is part of the context, Holmes's core argument is about the *transfer of virtues* from the past to the living for societal health, rather than solely preventing future wars."}, {"text": "That the Gilded Age's industrial leaders should be celebrated for their economic courage and entrepreneurial spirit.", "isCorrect": false, "rationale": "Holmes's speech is presented as a challenge to the Gilded Age's shift towards profit and comfort, suggesting he would not celebrate these specific attributes in this context."}]}, {"question": "Considering Holmes's stated concerns about Gilded Age America, how might his speech, 'The Soldier's Faith,' have been perceived differently by the surviving Civil War veterans in his audience compared to the young Harvard students destined for professions?", "options": [{"text": "Veterans would likely have found his critique of material comfort irrelevant, while students would have felt directly challenged.", "isCorrect": false, "rationale": "Veterans, having experienced war's sacrifices, would likely resonate with a critique of purely material comfort and the call for higher virtues, making the critique relevant to them."}, {"text": "Veterans might have appreciated the validation of their past sacrifices, while students might have found the call for sacrifice confronting in their pursuit of prosperous careers.", "isCorrect": true, "rationale": "The text notes veterans 'carried the scars of battle,' implying they embodied the sacrifices Holmes championed. The young men, destined for 'business, law, or the professions' and knowing 'only the sound of commerce,' would find Holmes's emphasis on sacrifice 'troubling' and a direct challenge to their comfortable, secure futures."}, {"text": "Both groups would have universally embraced the speech as a powerful call to patriotism and national unity.", "isCorrect": false, "rationale": "The text explicitly states the argument 'was controversial in 1895 and remains so today,' indicating a lack of universal embrace, especially from those whose values were being challenged."}, {"text": "Students would have seen it as an antiquated view irrelevant to the modern industrial age, while veterans would have dismissed it as overly romanticizing war.", "isCorrect": false, "rationale": "While some might interpret it as romanticized (one of the noted controversies), veterans would more likely connect with the validation of their sacrifices. Students might indeed find it less relevant but the primary challenge is to their lack of 'capacity for sacrifice.'"}]}, {"question": "According to the text, what specific virtues did Holmes argue the living needed from the dead, which he believed were cultivated by war and indispensable to civilization?", "options": [{"text": "Wealth accumulation, entrepreneurial spirit, and economic foresight.", "isCorrect": false, "rationale": "These represent the Gilded Age values of 'profit' and 'comfort' that Holmes aimed to challenge, rather than the virtues he sought to promote."}, {"text": "Political savvy, diplomatic skill, and international negotiation.", "isCorrect": false, "rationale": "These are not the virtues specifically identified in the text as being cultivated by war and indispensable to civilization by Holmes."}, {"text": "Courage, faith, and the willingness to act without guarantees.", "isCorrect": true, "rationale": "The text clearly states that Holmes is 'telling the living that they need what the dead had: courage, faith, and the willingness to act without guarantees.'"}, {"text": "Intellectual curiosity, academic rigor, and critical thinking.", "isCorrect": false, "rationale": "While important, these are not the specific virtues the text attributes to Holmes's argument about the lessons from soldiers."}]}, {"question": "The text states that 'The Soldier's Faith' was controversial both in 1895 and today. What is the fundamental tension that makes the speech controversial?", "options": [{"text": "The debate over whether the Civil War was a just war or an unnecessary conflict.", "isCorrect": false, "rationale": "The controversy described is about the interpretation of Holmes's speech itself and its message, not a re-litigation of the Civil War's justification."}, {"text": "The differing views on whether Holmes was a prophetic voice recalling national ideals or someone who romanticized the horrors of war for moral instruction.", "isCorrect": true, "rationale": "The text explicitly outlines this tension: 'To some listeners, Holmes sounded like a prophet calling a complacent nation back to its highest ideals. To others, he sounded like a man who had romanticized the worst experience of his life — who had turned the horror of war into a source of moral instruction.'"}, {"text": "The disagreement regarding the appropriate role of veterans in civic life and political discourse.", "isCorrect": false, "rationale": "While veterans are Holmes's subject, the controversy isn't about their 'role' but about the validity and implications of Holmes's philosophical argument regarding war's virtues."}, {"text": "The conflict between honoring the dead and the need to move forward as a progressive, industrial nation.", "isCorrect": false, "rationale": "While this conflict exists in the societal context, the specific controversy mentioned in the text concerns the *interpretation* of Holmes's message, not this broader societal dilemma."}]}, {"question": "The 'Reading Ahead' note describes Holmes's use of a 'periodic sentence.' What is the primary characteristic and effect of this sentence structure?", "options": [{"text": "It concludes sentences with the main subject and verb to create a sense of directness and clarity.", "isCorrect": false, "rationale": "This describes a typical, direct sentence structure, which is the opposite of a periodic sentence's delayed main idea."}, {"text": "It delays the main idea until the very end, building suspense and emphasizing the final resolution with accumulated clauses.", "isCorrect": true, "rationale": "The text defines a periodic sentence as one 'in which the main idea is not completed until the very end, creating suspense and emphasis as subordinate clauses pile up before the final resolution.' It also notes this 'builds toward emotional climaxes.'"}, {"text": "It uses short, declarative sentences to deliver information quickly and forcefully, mimicking military commands.", "isCorrect": false, "rationale": "The text describes Holmes's sentences as 'long, rolling sentences,' directly contradicting the idea of short, declarative ones."}, {"text": "It employs rhetorical questions and exclamations to directly engage the audience's emotions and provoke immediate reactions.", "isCorrect": false, "rationale": "While the style aims to 'create an experience' and 'emotional climaxes,' the mechanism described for the periodic sentence is structural delay, not rhetorical questions or exclamations."}]}, {"question": "Based on Holmes's concerns about Gilded Age America, which of the following scenarios would most likely exemplify what he believed society was losing?", "options": [{"text": "A community pooling resources to build a new public library, demonstrating collective civic engagement.", "isCorrect": false, "rationale": "This scenario demonstrates collective action and sacrifice for a public good, which aligns with the virtues Holmes valued, rather than what he believed was being lost."}, {"text": "A young professional prioritizing a high-paying, secure corporate job over a riskier but potentially more impactful career in public service.", "isCorrect": true, "rationale": "This scenario directly reflects Holmes's concern that the nation's aspirations 'had shifted from honor to profit, from duty to comfort,' and that society was losing the 'capacity for sacrifice, the willingness to risk everything for something larger than oneself.'"}, {"text": "An inventor developing new technologies that increase industrial efficiency and national productivity.", "isCorrect": false, "rationale": "While technological advancement was characteristic of the Gilded Age, Holmes's critique was focused on the *values* replacing duty and sacrifice, not innovation or productivity itself."}, {"text": "A group of citizens organizing a charitable fundraiser to support families in need within their city.", "isCorrect": false, "rationale": "This action demonstrates altruism and concern for others, embodying the kind of 'sacrifice' and 'something larger than oneself' that Holmes believed was essential."}]}, {"question": " 'The Soldier's Faith' is presented as a significant speech not merely for its historical context but also for its enduring message. What is the enduring significance of Holmes's address as presented in the text?", "options": [{"text": "It provides a definitive historical account of the Civil War from a veteran's perspective, settling long-standing debates.", "isCorrect": false, "rationale": "The text explicitly states the speech 'is not simply a nostalgic tribute' but 'an argument,' indicating it's not primarily a historical account meant to settle debates."}, {"text": "It offers a timeless argument about the necessity of certain virtues, cultivated through sacrifice, for a healthy society, even in times of peace and prosperity.", "isCorrect": true, "rationale": "The text highlights that 'It is an argument — a carefully constructed case that the virtues cultivated by war are indispensable to a healthy civilization' and that 'This argument was controversial in 1895 and remains so today,' signifying its lasting relevance and significance."}, {"text": "It serves as a primary source document illustrating the widespread nostalgic sentiment for the Civil War in the late 19th century.", "isCorrect": false, "rationale": "The text clarifies that the speech 'is not simply a nostalgic tribute to fallen comrades, though it is partly that. It is an argument,' indicating its purpose goes beyond mere nostalgia."}, {"text": "It initiated a national movement to increase recognition and benefits for Civil War veterans across the country.", "isCorrect": false, "rationale": "The text focuses on the philosophical and moral arguments of the speech, not its political or social reform outcomes like a movement for veteran benefits."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
