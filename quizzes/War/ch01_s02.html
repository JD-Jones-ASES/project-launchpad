<script>
var QUESTIONS = [{"question": "How much time had passed between Robert E. Lee's surrender at Appomattox Courthouse and the delivery of Oliver Wendell Holmes Jr.'s “The Soldier's Faith” in 1895?", "options": [{"text": "Approximately 10 years.", "isCorrect": false, "rationale": "The text states that 'Thirty years had passed,' which is significantly longer than 10 years."}, {"text": "Three decades.", "isCorrect": true, "rationale": "The text explicitly states, 'Thirty years had passed since Robert E. Lee surrendered,' and three decades is equivalent to 30 years."}, {"text": "Exactly 20 years.", "isCorrect": false, "rationale": "The text specifies 'Thirty years had passed,' not 20 years."}, {"text": "Nearly 50 years.", "isCorrect": false, "rationale": "The time elapsed was 30 years, which is far less than nearly 50 years."}], "id": "q01"}, {"question": "According to the text, what significant evolution did Memorial Day undergo by the 1890s?", "options": [{"text": "It became exclusively a private family day for mourning.", "isCorrect": false, "rationale": "The text states it 'had become a national occasion for speeches, parades, and public remembrance,' contradicting the idea of it being exclusively private."}, {"text": "It transformed from honoring only Union dead to commemorating all Civil War soldiers.", "isCorrect": false, "rationale": "While Memorial Day eventually broadened, the text specifically mentions its origin 'to honor the Union dead' and organizations like the Grand Army of the Republic, implying a continued focus on Union remembrance, with the main change being its public and national scope."}, {"text": "It evolved into a national occasion for public remembrance, speeches, and parades, organized by groups like the Grand Army of the Republic.", "isCorrect": true, "rationale": "The text clearly states, 'By the 1890s it had become a national occasion for speeches, parades, and public remembrance. Veterans' organizations such as the Grand Army of the Republic organized ceremonies throughout the country.'"}, {"text": "It shifted its focus primarily to celebrating economic prosperity rather than military sacrifice.", "isCorrect": false, "rationale": "While Holmes observed a societal shift toward commerce, Memorial Day's purpose remained public remembrance of the fallen."}], "id": "q02"}, {"question": "Holmes delivered “The Soldier's Faith” to an audience that included Harvard students, faculty, civic leaders, and surviving Civil War veterans. Which group in his audience would most likely have the deepest personal connection to the 'scars of battle' Holmes carried?", "options": [{"text": "The Harvard graduating class.", "isCorrect": false, "rationale": "The graduating class belonged to a new generation that 'knew only the sound of commerce,' not the direct experience of battle."}, {"text": "Boston civic leaders.", "isCorrect": false, "rationale": "While some civic leaders might have been veterans, the text specifically identifies the 'surviving veterans' as those who, 'like Holmes himself, carried the scars of battle,' highlighting their shared experience."}, {"text": "Surviving veterans of the Civil War.", "isCorrect": true, "rationale": "The text explicitly states that 'surviving veterans of the Civil War — men who, like Holmes himself, carried the scars of battle beneath their formal dress' — shared this profound personal experience."}, {"text": "Harvard faculty members who were non-veterans.", "isCorrect": false, "rationale": "Non-veteran faculty members would not have carried the direct physical or emotional 'scars of battle.'"}], "id": "q03"}, {"question": "The text describes Gilded Age America as a nation where 'fortunes of staggering size had been amassed.' Which group of figures does the text specifically mention as exemplifying this accumulation of wealth, and which Holmes would invoke in his speech?", "options": [{"text": "Thomas Edison, Alexander Graham Bell, and Henry Ford.", "isCorrect": false, "rationale": "These individuals are associated with invention and innovation, but the text specifically names others as amassing 'staggering fortunes' relevant to Holmes's speech."}, {"text": "Andrew Carnegie, John D. Rockefeller, and Cornelius Vanderbilt.", "isCorrect": true, "rationale": "The text states, 'Fortunes of staggering size had been amassed by men like Andrew Carnegie, John D. Rockefeller, and Cornelius Vanderbilt — names that Holmes would invoke in his speech.'"}, {"text": "Abraham Lincoln, Ulysses S. Grant, and William Tecumseh Sherman.", "isCorrect": false, "rationale": "These are prominent Civil War political and military leaders, not Gilded Age industrialists known for vast personal fortunes."}, {"text": "Frederick Douglass, Susan B. Anthony, and Mark Twain.", "isCorrect": false, "rationale": "These are notable social reformers and literary figures, not industrialists mentioned in the context of accumulating vast Gilded Age wealth in the text."}], "id": "q04"}, {"question": "What societal shift in Gilded Age America particularly troubled Holmes, leading him to believe that something essential would be lost, and which he challenged in “The Soldier's Faith”?", "options": [{"text": "The decline of agricultural production in favor of industrialization.", "isCorrect": false, "rationale": "While industrialization is mentioned, Holmes's core concern was not the decline of agriculture itself, but the shift in societal values accompanying the new economy."}, {"text": "The increasing political power of labor unions.", "isCorrect": false, "rationale": "The text does not mention labor unions as a concern for Holmes in this context."}, {"text": "The nation's aspirations shifting from honor and duty to profit and material comfort.", "isCorrect": true, "rationale": "The text states, 'The nation's aspirations, as Holmes saw it, had shifted from honor to profit, from duty to comfort,' and this is what troubled him, fearing the loss of 'the capacity for sacrifice, the willingness to risk everything for something larger than oneself.'"}, {"text": "The weakening of national unity due to ongoing regional tensions.", "isCorrect": false, "rationale": "The text notes the nation had 'torn itself apart in civil war' but was now an industrial economy, focusing Holmes's concern on new societal values rather than persistent regional disunity."}], "id": "q05"}, {"question": "Beyond being a nostalgic tribute to fallen comrades, what does “The Soldier's Faith” fundamentally represent, as described in the text?", "options": [{"text": "A historical recounting of specific Civil War battles and strategies.", "isCorrect": false, "rationale": "The text characterizes it as an 'argument' about virtues, not a detailed historical recounting of battles."}, {"text": "A political manifesto advocating for increased military spending.", "isCorrect": false, "rationale": "The text does not suggest that Holmes's speech was a political manifesto for military expansion."}, {"text": "A carefully constructed argument that war's cultivated virtues are essential for a healthy civilization.", "isCorrect": true, "rationale": "The text clearly states, 'It is an argument — a carefully constructed case that the virtues cultivated by war are indispensable to a healthy civilization.'"}, {"text": "A purely spiritual sermon on the afterlife for soldiers.", "isCorrect": false, "rationale": "While 'faith' is in the title, the speech's purpose is described as a societal argument about virtues, not a purely spiritual sermon on the afterlife."}], "id": "q06"}, {"question": "Holmes argued that society needed what the Civil War dead had. Which combination of virtues did he believe were indispensable and that the living needed to recover?", "options": [{"text": "Innovation, efficiency, and material ambition.", "isCorrect": false, "rationale": "These traits are more aligned with the Gilded Age's focus on commerce and profit, which Holmes sought to challenge, not promote."}, {"text": "Courage, faith, and the willingness to act without guarantees.", "isCorrect": true, "rationale": "The text explicitly states Holmes is 'telling the living that they need what the dead had: courage, faith, and the willingness to act without guarantees.'"}, {"text": "Intellectual curiosity, artistic expression, and civic engagement.", "isCorrect": false, "rationale": "While these are valuable virtues, they are not the specific ones the text attributes to Holmes's argument about the 'soldier's faith.'"}, {"text": "Economic prudence, social networking, and technological advancement.", "isCorrect": false, "rationale": "These reflect the commercial and comfortable aspects of Gilded Age society that Holmes believed lacked essential virtues."}], "id": "q07"}, {"question": "The text states that “The Soldier's Faith” was controversial, with some listeners feeling Holmes 'romanticized the worst experience of his life.' What is the most likely reason for this particular criticism?", "options": [{"text": "They believed Holmes exaggerated the economic prosperity of the Gilded Age.", "isCorrect": false, "rationale": "The criticism of 'romanticizing' war relates to his portrayal of battle, not his economic observations."}, {"text": "They felt he overlooked the suffering and horror of war by portraying it as a source of moral instruction.", "isCorrect": true, "rationale": "The text explains this perspective: 'To others, he sounded like a man who had romanticized the worst experience of his life — who had turned the horror of war into a source of moral instruction.'"}, {"text": "They disagreed with his assessment of the declining importance of Memorial Day.", "isCorrect": false, "rationale": "Holmes delivered his speech on Memorial Day, contributing to its importance, not diminishing it."}, {"text": "They thought he was too critical of the new generation's focus on commerce.", "isCorrect": false, "rationale": "While he was critical of the focus on commerce, the 'romanticizing' criticism specifically refers to his view of war itself."}], "id": "q08"}, {"question": "The 'Reading Ahead' note describes Holmes' writing style, particularly his use of the 'periodic sentence.' What primary effect does this stylistic choice aim to achieve for the reader/listener?", "options": [{"text": "To simplify complex ideas for easier understanding.", "isCorrect": false, "rationale": "Periodic sentences, by delaying the main point and stacking clauses, tend to add complexity rather than simplify, building anticipation."}, {"text": "To create an experience, building toward emotional climaxes with significant force.", "isCorrect": true, "rationale": "The text states this style 'build[s] toward emotional climaxes' and that the sentence 'arrives at its destination with the force of a wave breaking on shore. This is deliberate. Holmes is not just making an argument; he is creating an experience.'"}, {"text": "To ensure precise, unambiguous communication of legal arguments.", "isCorrect": false, "rationale": "While Holmes was a jurist, the description of his rhetorical style here emphasizes emotional impact and building experience, not purely legal precision."}, {"text": "To directly persuade the audience with a series of clear, concise statements.", "isCorrect": false, "rationale": "The periodic sentence delays the main point and stacks clauses, which is contrary to direct, concise statements."}], "id": "q09"}, {"question": "Considering the historical context of 1895 and the central argument of “The Soldier's Faith,” what fundamental tension was Oliver Wendell Holmes Jr. primarily attempting to address in his speech?", "options": [{"text": "The tension between industrial progress and environmental preservation.", "isCorrect": false, "rationale": "The text does not mention environmental preservation as a concern for Holmes."}, {"text": "The tension between the memory of wartime sacrifice and the prevailing Gilded Age values of material comfort and profit.", "isCorrect": true, "rationale": "Holmes observed the shift in national aspirations 'from honor to profit, from duty to comfort' in the Gilded Age and argued that the virtues of sacrifice from war were indispensable, directly addressing this tension."}, {"text": "The tension between federal authority and states' rights.", "isCorrect": false, "rationale": "While a critical issue during the Civil War, the speech delivered 30 years later focuses on societal values and national character rather than this specific political debate."}, {"text": "The tension between traditional religious beliefs and emerging scientific theories.", "isCorrect": false, "rationale": "Religious and scientific tensions are not identified as the primary focus of Holmes's speech in this text."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
