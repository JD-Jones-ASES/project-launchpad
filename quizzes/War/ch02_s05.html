<script>
var QUESTIONS = [{"question": "According to the text, what is the primary purpose of Smedley Butler's \"vernacular\" writing style?", "options": [{"text": "To demonstrate his lack of formal education compared to Holmes.", "isCorrect": false, "rationale": "The text explicitly states that Butler's vernacular style is a 'rhetorical choice' and 'deliberate,' not a sign of a lack of education. It warns against mistaking his blunt style for simplicity."}, {"text": "To signal his identity as a soldier and citizen, relatable to a mass audience.", "isCorrect": true, "rationale": "The text explains that Butler's vernacular style 'signals that he is speaking as a soldier and a citizen, not as an intellectual or a statesman,' making his message accessible and relatable to 'ordinary people'."}, {"text": "To confuse readers who are accustomed to more formal prose.", "isCorrect": false, "rationale": "The text states the opposite: 'No one can misunderstand Butler.' His plain language is intended for clarity, not confusion, as it is 'harder to evade'."}, {"text": "To mimic the style of military reports and official documents.", "isCorrect": false, "rationale": "While he is a soldier, the text defines vernacular as 'ordinary, everyday language of common people,' not necessarily the formal style of military reports. His style is characterized by 'short sentences, plain words' of ordinary conversation."}], "id": "q01"}, {"question": "The text describes Butler's opening \"WAR is a racket\" as having \"no qualifications. No subordinate clauses. No literary allusions.\" What rhetorical effect does this stylistic choice achieve compared to Holmes' writing?", "options": [{"text": "It makes Butler's argument seem less credible due to its lack of complexity.", "isCorrect": false, "rationale": "The text argues that Butler's style is 'just as effectively' serving his argument, and his simplicity is a 'weapon,' not a limitation, making his points clear and impactful."}, {"text": "It delivers a direct, forceful conclusion that challenges the reader to dispute it.", "isCorrect": true, "rationale": "The text states, 'He hits you with the conclusion first and then dares you to argue.' The 'stripped to the bone' prose with 'no qualifications' creates an effect 'like a fist on a table,' directly confronting the reader."}, {"text": "It allows for a more nuanced and detailed exploration of his thesis.", "isCorrect": false, "rationale": "Butler's prose is 'stripped to the bone' and states his thesis in six words, which is antithetical to a nuanced and detailed exploration, contrasting sharply with Holmes' 'long, winding clauses'."}, {"text": "It demonstrates Butler's humility by avoiding elevated language.", "isCorrect": false, "rationale": "While he uses plain language, the effect described is one of forceful assertion and challenge ('dares you to disagree'), rather than humility. His purpose is to deliver a blunt accusation."}], "id": "q02"}, {"question": "Butler states, \"For a great many years, as a soldier, I had a suspicion that war was a racket; not until I retired to civil life did I fully realize it.\" How does this admission strengthen his ethos, according to the text?", "options": [{"text": "It highlights his intellectual evolution, proving he is capable of deep thought.", "isCorrect": false, "rationale": "While it shows a realization, the text focuses on how the admission of being 'part of the machine' he now condemns makes him a more credible critic, not primarily on his intellectual capacity."}, {"text": "It shows his honesty and deep personal understanding, making him harder to dismiss as an outsider.", "isCorrect": true, "rationale": "The text explicitly states: 'A critic who confesses his own complicity is much harder to ignore.' This admission strengthens his ethos by showing he understands the system intimately, not as an outside observer."}, {"text": "It suggests he was initially naive, which makes his later condemnation more powerful.", "isCorrect": false, "rationale": "The text frames it as a 'confession as much as an accusation,' implying an insider's perspective and evolution of understanding, rather than simple naiveté. The power comes from his complicity, not prior naiveté."}, {"text": "It indicates a change of heart, appealing to readers' sense of forgiveness.", "isCorrect": false, "rationale": "The text does not discuss appealing to forgiveness. Instead, it emphasizes that this admission makes his criticism more authoritative and difficult to dismiss, enhancing his credibility (ethos)."}], "id": "q03"}, {"question": "Which statement best describes Butler's primary use of \"logos\" in his pamphlet?", "options": [{"text": "He appeals to philosophical principles and abstract concepts of justice.", "isCorrect": false, "rationale": "The text contrasts Butler with Holmes, stating, 'Where Holmes appeals to abstract ideals... Butler appeals to ledger books.' Butler's logos is empirical, not philosophical."}, {"text": "He relies on extensive historical anecdotes to illustrate the long history of war.", "isCorrect": false, "rationale": "While he mentions war is 'the oldest,' his primary logos strategy is not historical anecdotes but 'concrete financial data,' 'profit figures,' and 'percentage increases'."}, {"text": "He presents concrete financial data and profit figures to demonstrate war's economic motivations.", "isCorrect": true, "rationale": "The text clearly states, 'Butler's most distinctive rhetorical technique is his use of concrete financial data. ... He names companies. He cites profit figures. He calculates percentage increases. This is logos in its most empirical form.'"}, {"text": "He uses logical deductions based on common-sense assumptions about human nature.", "isCorrect": false, "rationale": "Butler's logos relies on hard numbers ('The numbers do not lie') rather than assumptions, asking the reader to 'look at the numbers and draw the obvious conclusion.'"}], "id": "q04"}, {"question": "The text includes a \"Common Misreading\" caution. What is the key error that readers are warned against making regarding Butler's blunt style?", "options": [{"text": "Believing that Butler's arguments are simplistic and lack intellectual depth.", "isCorrect": true, "rationale": "The caution states: 'Some readers mistake Butler's blunt style for simplicity. Do not make this error. Butler's rhetoric is strategically simple.' The simplicity is a 'weapon,' indicating deliberate craft, not a lack of depth."}, {"text": "Assuming that Butler's language is emotionally manipulative rather than factual.", "isCorrect": false, "rationale": "While Butler uses pathos, the common misreading specifically addresses his 'blunt style' and 'simplicity' being mistaken for lack of sophistication, not for being purely emotional."}, {"text": "Misinterpreting Butler's short sentences as a sign of hasty or careless writing.", "isCorrect": false, "rationale": "The text emphasizes that his rhetorical choices are 'as deliberate as Holmes',' indicating careful crafting, not haste. The simplicity is strategic."}, {"text": "Overlooking the classical allusions hidden within Butler's plain language.", "isCorrect": false, "rationale": "The text explicitly states 'No literary allusions' in Butler's prose, making this option incorrect. The contrast is precisely in the absence of such ornate elements."}], "id": "q05"}, {"question": "In Butler's series of \"How many\" questions, the repetition of the phrase at the beginning of each question is identified as \"anaphora.\" What is the specific rhetorical effect of this technique in conveying pathos?", "options": [{"text": "It creates a sense of intellectual curiosity, inviting the reader to research the answers.", "isCorrect": false, "rationale": "The questions are rhetorical and accusatory, not designed to elicit research. Their purpose is to highlight a stark contrast and generate outrage."}, {"text": "It builds a rhythmic, accusatory drumbeat that emphasizes the profiteers' lack of sacrifice.", "isCorrect": true, "rationale": "The text explains, 'The technique... creates a drumbeat of accusation. Each question makes the same point — the profiteers never fought — but the repetition drives the point deeper with every line,' evoking a sense of moral outrage (pathos)."}, {"text": "It provides a structured list of different combat experiences, informing the reader.", "isCorrect": false, "rationale": "While it lists experiences, the primary rhetorical effect is not informative but accusatory, emphasizing the contrast between soldiers' suffering and profiteers' ease. It's about outrage, not education on combat experiences."}, {"text": "It suggests that the answer to each question is universally known, thus requiring no response.", "isCorrect": false, "rationale": "The questions do imply a known answer (zero), but the effect is to powerfully underscore this fact and create a sense of injustice, not to simply state a known fact without impact."}], "id": "q06"}, {"question": "The text states that Butler chose the pamphlet genre for \"War Is a Racket.\" What does this choice primarily reveal about his intentions?", "options": [{"text": "He aimed to appeal to academic scholars and policy experts for rigorous debate.", "isCorrect": false, "rationale": "The text explicitly states, 'He was not writing for scholars or policy experts.' The pamphlet is designed for a mass audience."}, {"text": "He sought to create a detailed historical account for future generations.", "isCorrect": false, "rationale": "The pamphlet genre imposes constraints: 'it must be brief' and 'build toward a clear call to action,' which is contrary to creating a detailed historical account."}, {"text": "He intended to reach a broad, ordinary mass audience with a clear, urgent message.", "isCorrect": true, "rationale": "The text states the pamphlet is 'aimed at a mass audience' and that Butler 'was writing for the same ordinary Americans whose sons would be called upon to fight the next war.' Its brevity implies the 'truth about war... is not complicated.'"}, {"text": "He believed a shorter work would be more profitable than a full-length book.", "isCorrect": false, "rationale": "The text focuses on the rhetorical and communicative advantages of the pamphlet (brevity, accessibility, directness for a mass audience), not its potential profitability."}], "id": "q07"}, {"question": "From what source does Smedley Butler's most powerful rhetorical tool, his ethos, primarily derive?", "options": [{"text": "His superior education and intellectual achievements.", "isCorrect": false, "rationale": "The text explicitly states his ethos 'does not come from education' or 'eloquence,' distinguishing him from Holmes."}, {"text": "His social standing and political connections.", "isCorrect": false, "rationale": "The text states his ethos 'does not come from... social standing,' reinforcing that his authority comes from a different source."}, {"text": "His extensive combat service and military honors.", "isCorrect": true, "rationale": "The text states: 'His ethos — his credibility as a speaker — does not come from education, social standing, or eloquence. It comes from thirty-three years of combat service and two Medals of Honor.'"}, {"text": "His eloquent and persuasive writing style.", "isCorrect": false, "rationale": "The text states his ethos 'does not come from... eloquence.' His style is described as plain and blunt, not eloquent in the traditional sense, though it is rhetorically effective."}], "id": "q08"}, {"question": "What is the rhetorical effect of Butler's use of specific financial data, such as Du Pont's earnings or the appearance of new millionaires?", "options": [{"text": "It provides irrefutable evidence that requires no further discussion or analysis.", "isCorrect": false, "rationale": "While the data is strong, the text explains it 'shifts the burden of proof,' meaning it still requires a response or explanation from those who disagree, rather than ending all discussion."}, {"text": "It shifts the burden of proof, compelling defenders of war to explain away the figures.", "isCorrect": true, "rationale": "The text explicitly states: 'The rhetorical effect of this strategy is to shift the burden of proof. Once Butler has laid out the profit figures, anyone who wishes to defend the war must explain those figures away.'"}, {"text": "It allows readers to independently verify his claims by conducting their own research.", "isCorrect": false, "rationale": "While the data is verifiable, the text emphasizes the *rhetorical* effect of challenging the opponent's argument and creating a presumption of truth, rather than encouraging independent verification by the reader."}, {"text": "It demonstrates his expertise in economics, adding another layer to his credibility.", "isCorrect": false, "rationale": "The text focuses on the impact of the data itself ('The numbers do not lie'), rather than on Butler's personal expertise in economics. His primary ethos comes from military experience."}], "id": "q09"}, {"question": "The comparison section highlights a \"central tension\" between Holmes and Butler. Which statement best captures this fundamental difference, despite both drawing authority from military experience?", "options": [{"text": "Holmes argues for war as a necessity for national defense, while Butler views it as preventable.", "isCorrect": false, "rationale": "This is too specific and misses the core philosophical and moral divergence highlighted. The central tension is about the *meaning* and *value* of war itself, not specific justifications or preventability."}, {"text": "Holmes sees war as a noble expression of human virtue, while Butler exposes it as driven by greed.", "isCorrect": true, "rationale": "The text directly states: 'Holmes sees in war the highest expression of human virtue. Butler sees in war the lowest expression of human greed.' This is presented as the 'central tension of the entire debate.'"}, {"text": "Holmes focuses on the psychological toll of war, while Butler emphasizes its economic consequences.", "isCorrect": false, "rationale": "Holmes' focus is on 'abstract ideals' and Butler's on 'ledger books' and 'furious moral energy' rooted in physical reality. This option oversimplifies and misrepresents their specific emphases."}, {"text": "Holmes believes war can be justified by abstract ideals, while Butler rejects all forms of conflict.", "isCorrect": false, "rationale": "While Butler condemns war as a 'racket,' the text doesn't state he rejects 'all forms of conflict.' His focus is on the profiteering and moral corruption within war, contrasting with Holmes' idealized view."}], "id": "q10"}, {"question": "Butler's vernacular style uses phrases like 'beautiful ideals' (sarcastically) and 'To Hell with War!' rather than formal academic language. What does this stylistic choice reveal about his assumptions regarding his intended audience?", "options": [{"text": "He assumed his audience was uneducated and incapable of understanding complex arguments.", "isCorrect": false, "rationale": "The vernacular style is not condescending — it is a deliberate choice to be accessible and direct, not a concession to an unintelligent audience. Butler's argument itself is sophisticated, even if its language is plain."}, {"text": "He intended to reach ordinary Americans who were not trained in rhetoric or philosophy, and who needed to be shocked into attention rather than elevated into reflection.", "isCorrect": true, "rationale": "The text explains Butler's audience was 'ordinary Americans who may not yet see the connection between corporate profits and their sons' graves.' The vernacular style — blunt, punchy, emotionally direct — is designed to reach that audience where they are, not where Holmes's Harvard crowd was."}, {"text": "He was writing specifically for fellow soldiers who would respond to military language and informal speech.", "isCorrect": false, "rationale": "While veterans might appreciate his style, the pamphlet's target was the broader American public, not specifically a military audience."}, {"text": "The vernacular style was forced upon him by his publisher, who wanted a more accessible document.", "isCorrect": false, "rationale": "The text presents Butler's style as a deliberate rhetorical choice reflecting his character and his audience, not as an external editorial constraint."}], "id": "q11"}, {"question": "Both Holmes and Butler were decorated combat veterans, yet they reached opposite conclusions about war. The section asks 'which lens is correct.' What does the existence of these two equally credentialed, opposite views suggest about the relationship between personal experience and argument?", "options": [{"text": "It suggests that personal experience is an unreliable basis for any argument and should always be replaced with statistical data.", "isCorrect": false, "rationale": "The text does not conclude that experience is unreliable. It identifies a genuine tension between two forms of experience-based argument, not a reason to dismiss experience altogether."}, {"text": "It reveals that personal experience provides ethos but not conclusions — what a person concludes from experience depends on what questions they ask and what frameworks they bring to interpretation.", "isCorrect": true, "rationale": "Both men fought in wars and both earned the right to speak from experience. But Holmes asked 'What does war reveal about the human spirit?' while Butler asked 'Who profits from war?' Different questions, applied to the same raw experience, yield opposite conclusions — suggesting experience is filtered through interpretive frameworks."}, {"text": "It shows that veterans should not be trusted to evaluate war objectively because they are too emotionally invested.", "isCorrect": false, "rationale": "The text treats both men's arguments seriously and respectfully; the point is not to discredit experience-based argument but to show that it must be supplemented with other forms of reasoning."}, {"text": "It proves that Holmes was wrong and Butler was right, since Butler had more combat experience across more conflicts.", "isCorrect": false, "rationale": "The text does not resolve the debate by counting years of service. Both men's frameworks are presented as capturing genuine aspects of the truth about war."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
