        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/War.html">&larr; Back to War: A Debate in Primary Sources</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 2, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Under the World War Adjusted Compensation Act of 1924, when were the promised cash bonuses originally intended to be distributed to veterans?", "options": [{"text": "1945", "isCorrect": true, "rationale": "The Act granted certificates that were essentially deferred payments, not redeemable for cash until twenty-one years after the legislation's passage."}, {"text": "1932", "isCorrect": false, "rationale": "This was the year the Bonus Expeditionary Force marched on Washington to demand early payment, not the date set by the original law."}, {"text": "1924", "isCorrect": false, "rationale": "While this was the year the Act was passed, the actual payments were structured as a long-term obligation rather than immediate compensation."}, {"text": "1935", "isCorrect": false, "rationale": "This was the year Smedley Butler published 'War Is a Racket', but it was not the statutory date for the bonus maturity."}], "id": "q01"}, {"question": "During the 1932 dispersal of the Bonus Army, which military figure served as an aide to General Douglas MacArthur?", "options": [{"text": "Dwight Eisenhower", "isCorrect": true, "rationale": "The text notes that Major Dwight Eisenhower served as MacArthur's aide during the controversial operation against the unarmed veterans."}, {"text": "George Patton", "isCorrect": false, "rationale": "While Patton was present, he was a Major commanding the cavalry units rather than acting as MacArthur's direct aide."}, {"text": "Smedley Butler", "isCorrect": false, "rationale": "Butler had already retired by 1931 and was actually a vocal public supporter of the veterans' cause."}, {"text": "Herbert Hoover", "isCorrect": false, "rationale": "Hoover was the President who issued the order to clear the camp, not a military aide involved in the tactical execution."}], "id": "q02"}, {"question": "What was the primary objective of the so-called 'Business Plot' as reported by Smedley Butler in 1933?", "options": [{"text": "To install a fascist-style government by seizing control from President Roosevelt", "isCorrect": true, "rationale": "Butler testified that wealthy financiers wanted to use a private army to force a change in government toward a fascist model."}, {"text": "To lobby Congress for the immediate payment of the veteran bonuses", "isCorrect": false, "rationale": "The plotters intended to use the veterans for a coup, not to advocate for their existing legislative demands."}, {"text": "To establish a communist regime modeled after the Soviet Union", "isCorrect": false, "rationale": "The plotters were wealthy businessmen and Wall Street financiers who were hostile to communism and labor unions."}, {"text": "To prevent the United States from entering future European conflicts", "isCorrect": false, "rationale": "While Butler became antiwar, the conspirators were focused on domestic political control and economic interests through a coup."}], "id": "q03"}, {"question": "According to the source material, why did the Business Plot conspirators specifically target Smedley Butler to lead their movement?", "options": [{"text": "His popularity and influence among the massive population of veterans", "isCorrect": true, "rationale": "The plotters believed his status as a military hero would allow him to mobilize 500,000 veterans into a private army."}, {"text": "His known sympathies for fascist economic ideologies", "isCorrect": false, "rationale": "Butler was actually moving toward radical antiwar views and eventually exposed the plotters."}, {"text": "His high-ranking position within the active-duty Marine Corps command", "isCorrect": false, "rationale": "Butler had retired from the military in 1931, two years before the plotters approached him."}, {"text": "His family's long-standing ties to Wall Street investment firms", "isCorrect": false, "rationale": "The text emphasizes his role as a 'warrior' and soldier, not a member of the financial elite."}], "id": "q04"}, {"question": "What was the outcome of the McCormack-Dickstein Committee's investigation into Butler’s testimony regarding the coup?", "options": [{"text": "The committee confirmed the testimony as credible but no prosecutions followed", "isCorrect": true, "rationale": "The final report validated Butler's claims that a plot was discussed, yet the matter was largely buried without legal action."}, {"text": "The committee dismissed the story as a 'White House Putsch' hoax", "isCorrect": false, "rationale": "While newspapers may have dismissed it, the congressional committee's final report actually confirmed the credibility of the testimony."}, {"text": "Several high-profile Wall Street financiers were convicted of treason", "isCorrect": false, "rationale": "The source explicitly states that despite the confirmation of the plot, no one was actually prosecuted."}, {"text": "The investigation was blocked by a presidential veto from Franklin Roosevelt", "isCorrect": false, "rationale": "Roosevelt was the intended target of the plot; there is no mention of him blocking the investigation."}], "id": "q05"}, {"question": "How did the historical context of the early 1930s affect the perception of fascism among some American and British businessmen?", "options": [{"text": "It was viewed as an efficient system that countered labor unions and communism", "isCorrect": true, "rationale": "At the time, fascism was seen by some elites as a successful ideology for maintaining order and economic efficiency."}, {"text": "It was universally condemned as a discredited and violent ideology", "isCorrect": false, "rationale": "The text states that it was not yet discredited and was instead admired by many prominent businessmen for its efficiency."}, {"text": "It was ignored as a fringe movement with no potential for international spread", "isCorrect": false, "rationale": "Mussolini and Hitler's rises were prominent and considered highly relevant to domestic political strategy."}, {"text": "It was perceived as the primary driver behind the global economic collapse", "isCorrect": false, "rationale": "The Great Depression was the context in which fascism appeared to be a 'successful' alternative, not the cause of it."}], "id": "q06"}, {"question": "Which characteristic of the 'pamphlet' genre is most evident in Butler’s 'War Is a Racket'?", "options": [{"text": "Brevity and directness aimed at delivering an urgent message", "isCorrect": true, "rationale": "The source describes the pamphlet as being short and lacking nuance, rewarding urgency over scholarly qualification."}, {"text": "Nuanced, scholarly analysis of international relations", "isCorrect": false, "rationale": "The text explicitly states that 'War Is a Racket' is not a calm or scholarly analysis."}, {"text": "A comprehensive history of the U.S. Marine Corps' Caribbean campaigns", "isCorrect": false, "rationale": "While Butler served in those campaigns, the book is described as a specific argument against war profits and corruption."}, {"text": "An objective, balanced reporting of both sides of the military-industrial complex", "isCorrect": false, "rationale": "The genre rewards urgency and cause-driven rhetoric rather than balanced or dispassionate reporting."}], "id": "q07"}, {"question": "What specific terminology did critics use to label the Bonus Marchers, which Butler subsequently adopted for himself during his visit to their camp?", "options": [{"text": "Reds and Radicals", "isCorrect": true, "rationale": "Butler told the veterans that if they were called Reds and Radicals, they could tell people he was a radical too."}, {"text": "The Bonus Expeditionary Force", "isCorrect": false, "rationale": "This was the name the veterans gave themselves, not a derogatory label used by critics."}, {"text": "The Wall Street Putsch", "isCorrect": false, "rationale": "This term refers to the Business Plot allegations, not the veterans in the Bonus Army."}, {"text": "Fascists and Coup-plotters", "isCorrect": false, "rationale": "The veterans were demanding payment; it was the wealthy financiers who were associated with the fascist plot later on."}], "id": "q08"}, {"question": "How did major newspapers respond to Butler's 1933 testimony about the conspiracy to overthrow the President?", "options": [{"text": "They largely dismissed the story as incredible", "isCorrect": true, "rationale": "The source notes that major newspapers, often owned by the same class as the accused, dismissed the story."}, {"text": "They conducted deep investigative reporting that led to arrests", "isCorrect": false, "rationale": "The affair was 'quickly buried' and newspapers played a role in minimizing its significance."}, {"text": "They praised Butler for his courage and called for a national inquiry", "isCorrect": false, "rationale": "The newspapers largely dismissed the story rather than supporting Butler's claims."}, {"text": "They advocated for the implementation of the fascist reforms proposed by the plotters", "isCorrect": false, "rationale": "While the owners might have shared interests with the plotters, the papers primarily dismissed the reality of the conspiracy itself."}], "id": "q09"}, {"question": "In the context of Butler's transformation, what did the 1932 government action against the Bonus Army confirm for him?", "options": [{"text": "The rotten nature of the relationship between the military, government, and big business", "isCorrect": true, "rationale": "The sight of the army attacking veterans confirmed Butler's suspicions about a corrupt core in the American establishment."}, {"text": "The necessity of a strong, centralized fascist leadership to maintain order", "isCorrect": false, "rationale": "The event radicalized Butler against the establishment and toward an antiwar stance, not toward fascism."}, {"text": "That the Great Depression was caused by lack of military spending", "isCorrect": false, "rationale": "Butler's focus was on the betrayal of veterans and the profit motive of war, not on advocating for more military spending."}, {"text": "The effectiveness of non-violent protest in changing federal law", "isCorrect": false, "rationale": "The outcome was violent dispersal and injury, which would suggest the failure or danger of the protest rather than its effectiveness."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
