<script>
var QUESTIONS = [{"question": "Which of the following best defines the concept of 'Talking Past Each Other' as presented in the text?", "options": [{"text": "A situation where debaters deliberately avoid engaging with their opponent's weakest points.", "isCorrect": false, "rationale": "This describes a strategic rhetorical move, but 'talking past each other' specifically refers to a fundamental misalignment in the underlying questions, assumptions, or frameworks, rather than a deliberate avoidance of weak points."}, {"text": "A debate where participants address different core questions, operate under varying assumptions, or use distinct frameworks, leading to parallel monologues.", "isCorrect": true, "rationale": "This directly aligns with the definition provided: 'A situation in which two or more people appear to be debating but are actually addressing different questions, using different assumptions, or operating within different frameworks. They are not truly engaging each other's arguments; they are delivering parallel monologues.'"}, {"text": "When speakers use overly complex jargon, making it difficult for their audience and opponents to understand their arguments.", "isCorrect": false, "rationale": "While jargon can hinder communication, 'talking past each other' is about the substance of the arguments being misaligned, not primarily about the clarity or complexity of language used."}, {"text": "A discussion where one participant dominates the conversation, preventing others from presenting their views effectively.", "isCorrect": false, "rationale": "This describes a power imbalance in a discussion. 'Talking past each other' describes a fundamental disconnect in the arguments themselves, regardless of speaking time or dominance."}], "id": "q01"}, {"question": "According to the text, what crucial aspect of war does Oliver Wendell Holmes Jr. notably ignore in his celebration of martial virtues?", "options": [{"text": "The psychological toll and trauma experienced by soldiers in combat.", "isCorrect": false, "rationale": "While Holmes does not explicitly address the psychological toll, his primary blind spot highlighted in the text is not the individual's mental state, but rather the political and economic underpinnings of war itself."}, {"text": "The political and economic motivations and beneficiaries behind the conflicts.", "isCorrect": true, "rationale": "The text states: 'What he never asks is who benefits from that sacrifice. Holmes treats war as a philosophical abstraction... without examining the political and economic machinery that produces wars in the first place.'"}, {"text": "The importance of military strategy and tactical decisions in determining the outcome of battles.", "isCorrect": false, "rationale": "The text focuses on Holmes's philosophical view of war and his omissions regarding its causes and beneficiaries, not his understanding of military tactics."}, {"text": "The role of international diplomacy in preventing or escalating conflicts.", "isCorrect": false, "rationale": "Holmes's focus is on the individual soldier's virtue. The text identifies his blind spot as the 'political and economic machinery that produces wars,' not specifically international diplomacy."}], "id": "q02"}, {"question": "Smedley Butler argues that war is 'a racket.' What potential justification for war does his framework struggle to accommodate?", "options": [{"text": "The necessity of strong military leadership and discipline.", "isCorrect": false, "rationale": "Butler's argument focuses on the economic motives of war, not the internal structure or leadership of military forces."}, {"text": "The possibility of wars being genuinely necessary for self-defense or to stop atrocities like genocide.", "isCorrect": true, "rationale": "The text explicitly states: 'What he never seriously considers is the possibility that some wars might be genuinely necessary regardless of who profits from them... His thesis — war is always a racket — cannot admit exceptions without collapsing.'"}, {"text": "The valor and courage displayed by soldiers on the battlefield.", "isCorrect": false, "rationale": "Butler acknowledges courage, but questions the purpose it serves. His framework's blind spot is about the *justification* for war, not the virtues displayed within it."}, {"text": "The historical precedents of conflict resolution through peaceful negotiations.", "isCorrect": false, "rationale": "Butler's focus is on the economic drivers of war. While he might implicitly favor peaceful solutions, the text highlights his specific blind spot regarding potentially necessary wars."}], "id": "q03"}, {"question": "President Woodrow Wilson presented World War I as a 'moral crusade.' Which significant dimension did he consciously or unconsciously omit from his argument?", "options": [{"text": "The human cost of trench warfare and new military technologies.", "isCorrect": false, "rationale": "While Wilson's focus was on the moral case, the text specifically highlights his omission of the economic aspects, rather than the physical realities of combat, which Remarque addresses."}, {"text": "The strategic military objectives of the Allied forces.", "isCorrect": false, "rationale": "Wilson's omission, as described, was not about military strategy, but about the financial underpinnings of the war effort."}, {"text": "The economic interests and financial investments of American banks and manufacturers.", "isCorrect": true, "rationale": "The text states: 'What he never addresses is the economic dimension — the billions of dollars that American banks had lent to the Allies, the profits flowing to American manufacturers, the financial catastrophe that would follow an Allied defeat.'"}, {"text": "The diplomatic efforts to prevent the war before American intervention.", "isCorrect": false, "rationale": "The text identifies Wilson's omission as the 'economic dimension' of the war, not prior diplomatic failures."}], "id": "q04"}, {"question": "Erich Maria Remarque's approach to the debate about war is described as the 'Argument from Silence.' How does this technique function?", "options": [{"text": "By explicitly refuting all opposing arguments and then remaining silent, letting the refutations stand.", "isCorrect": false, "rationale": "Remarque does not explicitly refute arguments; rather, he bypasses them by focusing on the lived experience of war."}, {"text": "By presenting only personal, emotional testimony without any logical reasoning or broader claims.", "isCorrect": false, "rationale": "While Remarque offers testimony, the 'Argument from Silence' is a rhetorical strategy that uses this testimony to implicitly challenge broader claims, not simply to present emotion without reason."}, {"text": "By refusing to engage with the justifications for war and instead focusing solely on the brutal reality of the experience, thereby implicitly challenging all other arguments.", "isCorrect": true, "rationale": "The text explains: 'By refusing to engage with the justifications for war and focusing entirely on the experience of war, Remarque forces every other argument to confront a reality that none of them fully addresses.'"}, {"text": "By documenting the silence of war zones and the psychological impact of sensory deprivation on soldiers.", "isCorrect": false, "rationale": "This is a literal interpretation of 'silence' that misses the rhetorical meaning of 'Argument from Silence' as described in the text, which refers to a refusal to engage with certain arguments."}], "id": "q05"}, {"question": "Imagine two political commentators debating a new healthcare policy. One argues it will stimulate economic growth by creating jobs in the healthcare sector. The other argues it will improve public health outcomes by increasing access to care. Which rhetorical phenomenon is most evident if they continue without acknowledging each other's primary focus?", "options": [{"text": "Ad hominem fallacy", "isCorrect": false, "rationale": "An ad hominem fallacy involves attacking the person making the argument rather than the argument itself. The scenario describes a disconnect in the substance of the arguments."}, {"text": "Straw man argument", "isCorrect": false, "rationale": "A straw man argument involves misrepresenting an opponent's argument to make it easier to attack. The scenario suggests they are genuinely pursuing different lines of reasoning, not misrepresenting each other."}, {"text": "Talking past each other", "isCorrect": true, "rationale": "This scenario perfectly illustrates 'talking past each other,' where each commentator is 'addressing different questions' (economic growth vs. public health) and potentially using 'different assumptions or operating within different frameworks' without truly engaging the other's core premise."}, {"text": "Begging the question", "isCorrect": false, "rationale": "Begging the question (circular reasoning) involves assuming the truth of what one is trying to prove. The scenario describes different premises, not a circular argument."}], "id": "q06"}, {"question": "The text suggests that the fact that Holmes, Butler, Wilson, and Remarque 'talk past each other' is not a weakness but a 'feature of all serious debate.' What is the primary implication of this observation?", "options": [{"text": "It proves that deep disagreements are ultimately unresolvable through logical argument.", "isCorrect": false, "rationale": "The text implies that a complete understanding requires all perspectives, not that the disagreements are unresolvable. It highlights that they are answering different questions, not necessarily that resolution is impossible."}, {"text": "It highlights that fundamental disagreements stem from people valuing different aspects or asking different core questions.", "isCorrect": true, "rationale": "The text explicitly states: 'When people disagree at a fundamental level — about what matters most, about how to weigh competing values — they tend to construct arguments that are internally coherent but externally incomplete. Each writer answers his own question brilliantly. But they are not all answering the same question.'"}, {"text": "It demonstrates the inherent subjectivity of truth, where no single perspective can be deemed superior.", "isCorrect": false, "rationale": "While the text acknowledges multiple perspectives, it doesn't declare truth to be purely subjective. Instead, it argues that a 'complete reckoning' requires integrating these different, albeit partial, truths."}, {"text": "It shows that effective rhetoric requires speakers to skillfully avoid addressing inconvenient truths.", "isCorrect": false, "rationale": "The text analyzes omissions as rhetorical choices but frames 'talking past each other' as a feature of deep disagreement, not as a recommended rhetorical strategy for avoidance."}], "id": "q07"}, {"question": "In the context of the four authors, how does Butler's perspective most directly challenge Holmes's view of war?", "options": [{"text": "Butler emphasizes the psychological scars of war, which Holmes overlooks.", "isCorrect": false, "rationale": "While Butler exposes the brutality of war, his primary challenge to Holmes is not about psychological scars but about the underlying purpose and beneficiaries of war."}, {"text": "Butler argues that courage, when serving a 'racket,' is not true virtue but rather a tool for exploitation, directly questioning the nobility Holmes assigns to sacrifice.", "isCorrect": true, "rationale": "The text states: 'Butler would say it is not enough — not nearly. Courage exercised in the service of a racket is still courage, but calling it virtue without asking whose purposes it served is, at best, incomplete and, at worst, a way of making exploitation look noble.'"}, {"text": "Butler focuses on the individual's experience of suffering, contrasting it with Holmes's abstract ideals.", "isCorrect": false, "rationale": "Remarque is the one who primarily focuses on the individual's experience and contrasts it with abstract ideals. Butler's focus is on the economic system."}, {"text": "Butler highlights the futility of military campaigns, whereas Holmes sees strategic purpose.", "isCorrect": false, "rationale": "Butler focuses on economic motivations and profiteering, not on the strategic futility of specific campaigns."}], "id": "q08"}, {"question": "What is the ultimate conclusion drawn by the text regarding a 'complete reckoning with war'?", "options": [{"text": "It is impossible to achieve, as the topic is inherently too complex for human understanding.", "isCorrect": false, "rationale": "The text implies that a complete reckoning is possible by considering multiple perspectives, stating 'A complete reckoning with war would need to answer all four questions,' not that it's impossible."}, {"text": "It requires synthesizing all four distinct perspectives, as no single argument can fully encompass the multifaceted nature of war.", "isCorrect": true, "rationale": "The text concludes: 'A complete reckoning with war would need to answer all four questions. No single writer in this book does that... That is precisely why we need all four voices at the table.'"}, {"text": "It necessitates identifying the single most accurate perspective among the four and discarding the others.", "isCorrect": false, "rationale": "The text explicitly argues against this, stating that all four voices are needed because the question of war is 'too large and too many-sided for any one argument to contain.'"}, {"text": "It can only be achieved through direct personal experience of combat, as Remarque demonstrates.", "isCorrect": false, "rationale": "While Remarque's testimony is vital, the text emphasizes integrating all four perspectives (virtue, economics, morality, experience) for a 'complete reckoning,' not just one."}], "id": "q09"}, {"question": "The text states that Wilson's omission of economic factors was 'itself a rhetorical choice.' What does this suggest about the nature of argument?", "options": [{"text": "That all omissions in an argument are unintentional oversights.", "isCorrect": false, "rationale": "The text suggests the opposite, stating Wilson 'may have omitted it because mentioning it would have undermined the purity of his moral appeal,' indicating a conscious choice."}, {"text": "That effective arguments must always present a comprehensive and exhaustive view of all relevant facts.", "isCorrect": false, "rationale": "The text highlights that arguments are often 'internally coherent but externally incomplete,' implying that comprehensive views are rare and omissions are common, sometimes deliberately so."}, {"text": "That what a speaker chooses *not* to say can be as significant and communicative as what they *do* say.", "isCorrect": true, "rationale": "The first paragraph states: 'One of the most important skills in rhetoric is the ability to notice not just what a speaker says but what a speaker refuses to say.' This idea is reinforced by Wilson's omission being a 'rhetorical choice.'"}, {"text": "That rhetorical choices are solely about the style and delivery of a message, not its content.", "isCorrect": false, "rationale": "The example of Wilson's omission clearly shows that rhetorical choices extend to the content, specifically what is included or excluded from the argument's substance."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
