<script>
var QUESTIONS = [{"question": "According to the section, what is the core characteristic of a situation where people are 'talking past each other'?", "options": [{"text": "They are deliberately trying to mislead their audience.", "isCorrect": false, "rationale": "The text states they 'appear to be debating' but are actually addressing different questions, assumptions, or frameworks, not necessarily deliberately misleading."}, {"text": "They are debating different questions, using different assumptions, or operating within different frameworks.", "isCorrect": true, "rationale": "The definition provided states: 'A situation in which two or more people appear to be debating but are actually addressing different questions, using different assumptions, or operating within different frameworks.'"}, {"text": "They lack the rhetorical skills to articulate their own arguments clearly.", "isCorrect": false, "rationale": "The text explicitly states that 'The fact that these four writers talk past each other is not a sign that they are poor thinkers.'"}, {"text": "One party is simply refusing to acknowledge the other's points due to stubbornness.", "isCorrect": false, "rationale": "While stubbornness could be a factor in some debates, the text defines 'talking past each other' as a structural issue of addressing different fundamental aspects, not just a behavioral refusal."}]}, {"question": "What is a primary blind spot identified in Holmes's celebratory view of the soldier?", "options": [{"text": "He fails to acknowledge the physical courage required in combat.", "isCorrect": false, "rationale": "Holmes 'celebrates the virtues of the soldier: courage, sacrifice,' directly acknowledging courage."}, {"text": "He ignores the philosophical implications of warfare on society.", "isCorrect": false, "rationale": "Holmes 'treats war as a philosophical abstraction,' indicating he *does* consider its philosophical aspects."}, {"text": "He neglects to examine the political and economic machinery that produces wars and who benefits from them.", "isCorrect": true, "rationale": "The text states, 'What he never asks is who benefits from that sacrifice. Holmes treats war... without examining the political and economic machinery that produces wars.'"}, {"text": "He overemphasizes individual sacrifice at the expense of communal victory.", "isCorrect": false, "rationale": "The text doesn't suggest he overemphasizes individual sacrifice in this way; rather, his focus is on the virtue of the individual soldier without questioning the larger context."}]}, {"question": "Butler's argument that war is 'always a racket' presents a significant blind spot by failing to adequately consider which possibility?", "options": [{"text": "That soldiers might genuinely display courage and sacrifice.", "isCorrect": false, "rationale": "Butler acknowledges courage, stating 'Courage exercised in the service of a racket is still courage,' but questions its virtue without examining its purpose."}, {"text": "That economic motives are not the sole factor in all conflicts.", "isCorrect": true, "rationale": "The text notes, 'What he never seriously considers is the possibility that some wars might be genuinely necessary regardless of who profits from them,' such as wars against aggressors or to stop genocide."}, {"text": "That some nations might be too poor to profit significantly from war.", "isCorrect": false, "rationale": "Butler's focus is on the profit motive itself, not the varying capacities of nations to profit."}, {"text": "That the human cost of war often outweighs any potential economic gain.", "isCorrect": false, "rationale": "Butler's critique of war as a racket implicitly highlights its negative impacts, but his blind spot is the *necessity* of some wars, not the cost-benefit analysis of profit vs. human life."}]}, {"question": "Wilson's address to Congress is noted for a significant rhetorical omission. What was it, and why might it have been omitted?", "options": [{"text": "He omitted any mention of American casualties to maintain morale, possibly because he wanted to preserve the moral purity of his appeal.", "isCorrect": false, "rationale": "The text specifically states he omitted 'the economic dimension' not casualties, and linked it to the purity of his moral appeal or genuine belief in its irrelevance."}, {"text": "He omitted details about the war's military strategy, possibly to prevent revealing sensitive information to the enemy.", "isCorrect": false, "rationale": "The text discusses omissions related to the *justification* for war, not military tactics."}, {"text": "He omitted the economic dimension—loans, profits, trade—possibly to preserve the purity of his moral appeal for democracy.", "isCorrect": true, "rationale": "The text states: 'What he never addresses is the economic dimension... This omission is itself a rhetorical choice. Wilson may have omitted the economic dimension because he genuinely believed it was irrelevant to the moral case. Or he may have omitted it because mentioning it would have undermined the purity of his moral appeal.'"}, {"text": "He omitted the historical context of the conflict, possibly because he wanted the focus to be solely on future ideals.", "isCorrect": false, "rationale": "While he focuses on future ideals, the specific omission highlighted is economic factors, not historical context."}]}, {"question": "How does Remarque's approach to the topic of war fundamentally differ from the other three authors (Holmes, Butler, Wilson)?", "options": [{"text": "He provides a comprehensive argument addressing moral, economic, and spiritual dimensions simultaneously.", "isCorrect": false, "rationale": "Remarque 'does not argue at all' in the conventional sense, and focuses on the 'physical reality of combat,' not a comprehensive multi-dimensional argument."}, {"text": "He attempts to synthesize the different perspectives to find a common ground.", "isCorrect": false, "rationale": "Remarque implicitly challenges other perspectives by stripping away their justifications, rather than synthesizing them."}, {"text": "He avoids making an explicit argument, instead offering testimony and raw description of the physical experience of war.", "isCorrect": true, "rationale": "The text states: 'He does not argue at all. He does not claim that war is noble or corrupt, necessary or profitable. He simply describes what it is like... His novel is not an argument; it is testimony.'"}, {"text": "He argues that war is inherently senseless and without any purpose or virtue.", "isCorrect": false, "rationale": "While his descriptions might lead to this conclusion, the text emphasizes he 'does not argue at all' and does not claim war is 'senseless' explicitly; he simply shows its reality."}]}, {"question": "Remarque's 'argument from silence' is described as a powerful rhetorical technique. What is its primary effect?", "options": [{"text": "It subtly convinces the audience that all wars are inherently immoral without direct assertion.", "isCorrect": false, "rationale": "While his work challenges justifications, the 'argument from silence' is about forcing confrontation with reality, not directly asserting immorality."}, {"text": "It demonstrates that the most effective way to debate is by refusing to engage with opposing viewpoints.", "isCorrect": false, "rationale": "The text describes it as a specific technique to force other arguments to confront an unaddressed reality, not as a general model for all debate."}, {"text": "It forces other arguments to confront the physical and human reality of war that they often abstract or ignore.", "isCorrect": true, "rationale": "The text states: 'By refusing to engage with the justifications for war and focusing entirely on the experience of war, Remarque forces every other argument to confront a reality that none of them fully addresses.'"}, {"text": "It highlights the inability of language to fully capture the horrors of war.", "isCorrect": false, "rationale": "While Remarque's descriptions are powerful, the 'argument from silence' specifically refers to the *absence* of argument and its effect on other viewpoints, not the limitations of language itself."}]}, {"question": "The text asserts that 'Every argument has blind spots.' What is the broader implication of this statement within the context of serious debate?", "options": [{"text": "It suggests that all arguments are fundamentally flawed and unreliable.", "isCorrect": false, "rationale": "The text clarifies that 'talking past each other is not a sign that they are poor thinkers' and that each writer answers 'his own question brilliantly.'"}, {"text": "It means debaters should focus on exploiting the weaknesses in opponents' arguments.", "isCorrect": false, "rationale": "The text encourages recognizing blind spots to achieve a 'complete reckoning,' not just to exploit weaknesses."}, {"text": "It indicates that deeply held disagreements often lead to arguments that are internally coherent but externally incomplete.", "isCorrect": true, "rationale": "The text explains: 'When people disagree at a fundamental level... they tend to construct arguments that are internally coherent but externally incomplete.'"}, {"text": "It implies that it's impossible to have a truly comprehensive understanding of complex issues.", "isCorrect": false, "rationale": "The text argues for the necessity of *all four voices* for a complete reckoning, implying that comprehension is possible by combining perspectives, not impossible."}]}, {"question": "If a political leader justifies military action primarily by citing an immediate existential threat to national security, regardless of potential economic gains, whose central question is this leader most directly attempting to answer or engage?", "options": [{"text": "Holmes, by emphasizing the character and virtues of soldiers.", "isCorrect": false, "rationale": "While soldiers' character might be relevant, the primary justification here (existential threat) aligns more with moral or practical obligations than abstract virtues."}, {"text": "Butler, by refuting the notion that profit is the sole motive for war.", "isCorrect": false, "rationale": "While indirectly refuting Butler, the leader's primary *justification* (existential threat) is not *answering* Butler's 'who profits?' question, but rather a question about moral/practical obligation."}, {"text": "Wilson, by addressing the moral obligations that justify the use of force.", "isCorrect": true, "rationale": "Wilson 'asks: What moral obligations justify the use of force?' An existential threat is a moral/practical obligation that would justify force in his framework."}, {"text": "Remarque, by acknowledging the brutal realities faced by soldiers.", "isCorrect": false, "rationale": "Remarque describes the reality of war; a leader justifying action by citing a threat is providing a rationale, which Remarque generally strips away."}]}, {"question": "The text concludes that a 'complete reckoning with war' would require what?", "options": [{"text": "The definitive refutation of all arguments that portray war positively.", "isCorrect": false, "rationale": "The text doesn't seek to refute any specific argument, but rather to combine them for a fuller picture."}, {"text": "A single, unifying theory that encompasses all aspects of warfare.", "isCorrect": false, "rationale": "The text states the question 'What is war for?' is 'too large and too many-sided for any one argument to contain,' implying no single theory is sufficient."}, {"text": "Answering the specific questions posed by all four authors discussed in the section.", "isCorrect": true, "rationale": "The text explicitly states: 'A complete reckoning with war would need to answer all four questions.' It then lists the questions asked by Holmes, Butler, Wilson, and Remarque."}, {"text": "A renewed focus on the historical context and origins of past conflicts.", "isCorrect": false, "rationale": "While historical context is valuable, the text's focus for a 'complete reckoning' is on integrating the diverse questions posed by the four specific authors."}]}, {"question": "Consider a historian presenting a new analysis of a past war, focusing exclusively on the long-term psychological impact on veterans and their families, explicitly avoiding discussion of political causes, economic benefits, or national honor. This historian's approach most closely mirrors which author's method?", "options": [{"text": "Holmes, by focusing on individual experiences and character.", "isCorrect": false, "rationale": "Holmes focuses on virtues and character in the abstract, not the long-term psychological impact or avoiding political/economic causes."}, {"text": "Butler, by exposing the hidden costs and suffering associated with war.", "isCorrect": false, "rationale": "Butler focuses on economic machinery and profit, not psychological impact or avoiding political causes in this manner."}, {"text": "Wilson, by advocating for a moral understanding of the conflict's aftermath.", "isCorrect": false, "rationale": "Wilson frames war as a moral crusade and political ideal, not primarily the psychological impact on individuals, nor would he avoid political causes."}, {"text": "Remarque, by stripping away justifications and focusing on the lived, often brutal, human reality.", "isCorrect": true, "rationale": "Remarque 'strips away all justification—all talk of virtue, profit, and democracy—and leaving only the physical reality of combat.' The historian's focus on psychological impact and avoidance of justifications directly parallels Remarque's 'argument from silence' and focus on experience."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
