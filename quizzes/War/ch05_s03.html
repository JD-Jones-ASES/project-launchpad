    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

        Scholastica Codex &mdash; Self-Grading Quiz

</div>

<script>
var QUESTIONS = [{"question": "Which of the following best defines the phenomenon of 'talking past each other' as described in the text?", "options": [{"text": "Engaging in a debate where participants operate within different frameworks and address different core questions.", "isCorrect": true, "rationale": "This captures the essence of delivering parallel monologues where the underlying assumptions and questions do not intersect."}, {"text": "A heated disagreement where speakers fail to use clear language, leading to simple misunderstandings.", "isCorrect": false, "rationale": "The text suggests the issue is deeper than clarity; it involves fundamentally different questions and blind spots."}, {"text": "A rhetorical strategy where one speaker intentionally ignores an opponent's argument to win a debate.", "isCorrect": false, "rationale": "While it can be a strategy, the text defines it as a feature of fundamental disagreement where arguments are internally coherent but externally incomplete."}, {"text": "A situation where multiple speakers agree on the facts but disagree on the emotional impact of those facts.", "isCorrect": false, "rationale": "Talking past each other often involves ignoring different types of evidence entirely rather than just disagreeing on emotional impact."}], "id": "q01"}, {"question": "What is the primary 'blind spot' identified in Holmes's celebration of soldierly virtues?", "options": [{"text": "He fails to consider the political and economic machinery that determines who benefits from a soldier's sacrifice.", "isCorrect": true, "rationale": "Holmes focuses on the internal character of the soldier while abstracting the war away from its external causes and consequences."}, {"text": "He ignores the physical suffering of the soldiers in favor of a purely economic analysis of the battlefield.", "isCorrect": false, "rationale": "Actually, Holmes is criticized for ignoring the economic analysis that authors like Butler provide."}, {"text": "He focuses too heavily on the outcome of specific battles like Antietam rather than the virtues of the individual.", "isCorrect": false, "rationale": "The text states Holmes treats war as a test of character and virtue, which is an individual-centric view."}, {"text": "He denies that courage and sacrifice are real, viewing them instead as propaganda for the state.", "isCorrect": false, "rationale": "Holmes insists that the courage of the soldier is real and sufficient in itself."}], "id": "q02"}, {"question": "According to the text, why would Butler's framework be insufficient to address Wilson's justification for entering the war?", "options": [{"text": "Butler's thesis that 'war is a racket' cannot easily account for wars fought in response to direct provocations or to stop genocide.", "isCorrect": true, "rationale": "Butler's focus on profit leaves no room for necessary defensive or moral actions that Wilson highlights."}, {"text": "Butler ignores the fact that American banks had lent billions to the Allies, which Wilson uses as his primary argument.", "isCorrect": false, "rationale": "Wilson actually omits the bank loans entirely; it is Butler who focuses on economic machinery."}, {"text": "Butler's analysis focuses too much on the individual virtues of generals rather than the economic system.", "isCorrect": false, "rationale": "Butler is the author who 'exposes the economic machinery' rather than focusing on individual virtue."}, {"text": "Butler believes that democracy is a more important motivator for war than the profit motive.", "isCorrect": false, "rationale": "Butler's central claim is that war is always a racket, prioritizing the profit motive above all else."}], "id": "q03"}, {"question": "What is the significance of the 'rhetorical omission' in Wilson's address to Congress?", "options": [{"text": "By excluding economic data, Wilson maintains the purity of his moral appeal for democracy and self-determination.", "isCorrect": true, "rationale": "Omission is a tool used to prevent complicating the audience's response or weakening the moral case with financial realities."}, {"text": "Wilson's failure to mention money proves that he was unaware of the financial interests of American manufacturers.", "isCorrect": false, "rationale": "The text suggests the omission was a 'rhetorical choice,' implying it could be a deliberate exclusion rather than ignorance."}, {"text": "The omission allows Wilson to directly refute Butler's claims about the Zimmermann Telegram.", "isCorrect": false, "rationale": "The text notes that Wilson uses the Zimmermann Telegram as a justification, but this is a separate point from his omission of economics."}, {"text": "It demonstrates Wilson's agreement with Remarque that the physical reality of war is more important than profit.", "isCorrect": false, "rationale": "Wilson focuses on moral crusades, whereas Remarque strips away all justifications, including moral ones."}], "id": "q04"}, {"question": "In the context of the text, how does Remarque's 'argument from silence' function as a critique of the other authors?", "options": [{"text": "By focusing solely on the sensory experience of combat, he forces the other authors to justify their abstractions against the reality of death.", "isCorrect": true, "rationale": "Remarque's refusal to provide an ideological justification acts as a silent challenge to the 'virtue,' 'democracy,' and 'profit' frameworks."}, {"text": "By refusing to describe the violence, he allows the reader to focus purely on the economic arguments made by Butler.", "isCorrect": false, "rationale": "Remarque does the opposite; he focuses intensely on the physical reality and 'corpses' rather than economics."}, {"text": "He uses silence to agree with Holmes that the forge of virtue is the most important aspect of the trench experience.", "isCorrect": false, "rationale": "Remarque's descriptions of mud and shell craters are presented as a challenge to Holmes's 'martial virtues'."}, {"text": "His silence on the causes of war indicates that he believes Wilson's moral crusade was completely justified.", "isCorrect": false, "rationale": "The text says Remarque 'strips away all justification,' which includes the moral ones offered by Wilson."}], "id": "q05"}, {"question": "The text argues that when people disagree at a fundamental level, they construct arguments that are 'internally coherent but externally incomplete.' What does this mean in practice?", "options": [{"text": "The arguments make logical sense within their own set of assumptions but fail to address valid points raised by competing views.", "isCorrect": true, "rationale": "This describes the nature of 'talking past each other' where each writer answers their own specific question perfectly."}, {"text": "The arguments are full of logical fallacies but are saved by the authors' strong emotional conviction.", "isCorrect": false, "rationale": "The text explicitly states these writers are not 'poor thinkers,' implying their logic is sound, even if their scope is narrow."}, {"text": "The authors are being intentionally deceptive by only presenting half of the truth to win the debate.", "isCorrect": false, "rationale": "While omission can be a choice, the text frames this incompleteness as a natural 'feature of all serious debate' involving competing values."}, {"text": "Each argument is missing key evidence because the authors did not have access to the same historical facts.", "isCorrect": false, "rationale": "The incompleteness stems from the framework and 'questions asked' rather than a lack of historical data."}], "id": "q06"}, {"question": "How does the text contrast the 'questions' asked by Holmes and Remarque?", "options": [{"text": "Holmes asks what war reveals about the human spirit, while Remarque asks what war actually feels like.", "isCorrect": true, "rationale": "This highlights the shift from Holmes's philosophical focus on character to Remarque's sensory focus on testimony."}, {"text": "Holmes asks who profits from the war, while Remarque asks what the moral obligations of the state are.", "isCorrect": false, "rationale": "Butler is the one who asks about profit, and Wilson is the one concerned with moral obligations."}, {"text": "Holmes focuses on the physical reality of the trenches, while Remarque focuses on the virtues of sacrifice.", "isCorrect": false, "rationale": "This is a reversal of their actual positions; Remarque focuses on physical reality and Holmes on virtue."}, {"text": "Both authors ask the same question but arrive at different conclusions because of their political leanings.", "isCorrect": false, "rationale": "The text argues they are specifically 'not all answering the same question,' which is why they talk past each other."}], "id": "q07"}, {"question": "Butler's critique of viewing war as 'noble' centers on which specific concern?", "options": [{"text": "That calling courage a 'virtue' without questioning its purpose serves to mask exploitation.", "isCorrect": true, "rationale": "Butler argues that courage in the service of a racket does not justify the moral label of 'noble'."}, {"text": "That soldiers are inherently less brave when fighting for a profit-driven cause.", "isCorrect": false, "rationale": "Butler acknowledges that 'courage exercised in the service of a racket is still courage'."}, {"text": "That the human spirit is weakened by the mechanical nature of modern artillery.", "isCorrect": false, "rationale": "This sounds more like a point Remarque might imply; Butler's focus remains on the economic 'racket'."}, {"text": "That democratic ideals are the only thing that can truly make a war noble.", "isCorrect": false, "rationale": "This is Wilson's position; Butler is skeptical of noble labels in a system driven by the profit motive."}], "id": "q08"}, {"question": "Why does the text conclude that 'all four voices' are needed at the table?", "options": [{"text": "Because the question 'What is war for?' is too complex for any single perspective to fully encompass.", "isCorrect": true, "rationale": "The text suggests a 'complete reckoning' requires the integration of all four frameworks: virtue, profit, morality, and experience."}, {"text": "Because each writer eventually admits that they were wrong and the others were right.", "isCorrect": false, "rationale": "The text describes them as delivering parallel monologues, not reaching a consensus or admitting error."}, {"text": "Because having more voices makes the debate more entertaining for the reader.", "isCorrect": false, "rationale": "The text frames the need for four voices as a logical requirement for a 'complete reckoning' with a multifaceted issue."}, {"text": "Because they are the only four people who have ever written accurately about World War I.", "isCorrect": false, "rationale": "The text uses them as examples of different rhetorical frameworks, not as the exclusive authorities on the subject."}], "id": "q09"}, {"question": "Wilson justifies the use of force based on which of the following?", "options": [{"text": "The defense of democracy and the response to real provocations like the Zimmermann Telegram.", "isCorrect": true, "rationale": "Wilson's framework is built on moral crusades and the necessity of responding to aggression."}, {"text": "The need to protect American bank loans from an Allied defeat.", "isCorrect": false, "rationale": "Wilson specifically *ignores* the economic dimension, including bank loans, in his rhetorical approach."}, {"text": "The inherent value of the martial spirit and the test of character it provides.", "isCorrect": false, "rationale": "This is Holmes's perspective, which Wilson's moral crusade framework partially overlaps but does not center on."}, {"text": "The exposure of the economic machinery that benefits from submarine attacks.", "isCorrect": false, "rationale": "Butler is the one who exposes economic machinery; Wilson focuses on the moral and political justification."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
