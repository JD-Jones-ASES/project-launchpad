<script>
var QUESTIONS = [{"question": "According to the text, which of the following best describes the nature of rhetoric?", "options": [{"text": "It is exclusively used for manipulative or deceptive purposes.", "isCorrect": false, "rationale": "The text states rhetoric is 'not inherently good or bad — it is a tool,' indicating it can be used for various purposes, both ethical and unethical."}, {"text": "It is the art of effective communication and persuasion, serving as a tool that can be used for various purposes.", "isCorrect": true, "rationale": "The definition box explicitly defines rhetoric as 'the art of effective communication and persuasion' and clarifies that 'it is a tool' whose purpose can vary."}, {"text": "It is the study of historical speeches and documents, without evaluating their persuasive techniques.", "isCorrect": false, "rationale": "While rhetoric has been studied since ancient Greece and involves historical texts, its core focus is 'how speakers and writers use language to convince an audience,' which involves evaluation."}, {"text": "It refers solely to the emotional appeals used by a speaker to sway an audience.", "isCorrect": false, "rationale": "Emotional appeals are a part of rhetoric (pathos), but rhetoric encompasses all methods of persuasion, including character (ethos) and logic (logos)."}]}, {"question": "A renowned climate scientist testifies before Congress about the urgent need for renewable energy policies, citing her decades of research and publications in peer-reviewed journals. Which rhetorical appeal is she primarily utilizing?", "options": [{"text": "Pathos, by appealing to the public's fear of climate change.", "isCorrect": false, "rationale": "While the topic might evoke fear, the description emphasizes her 'decades of research and publications,' which builds her credibility, not primarily emotional appeals."}, {"text": "Logos, by presenting scientific data and logical arguments.", "isCorrect": false, "rationale": "She likely uses logos with data, but the specific details in the prompt ('decades of research and publications') are designed to establish her authority and trustworthiness, which is ethos."}, {"text": "Ethos, by leveraging her expertise and credibility as a scientist.", "isCorrect": true, "rationale": "Ethos is an appeal based on the speaker's character, credibility, or authority. Her long career, research, and publications directly establish her expertise and trustworthiness on the subject."}, {"text": "Counterargument, by addressing potential objections to her stance.", "isCorrect": false, "rationale": "Counterargument is a part of an argument's structure, not one of the three rhetorical appeals (ethos, pathos, logos)."}]}, {"question": "Consider two statements:\n1. 'Thousands of innocent children are suffering from famine in war-torn regions, their skeletal frames a testament to human cruelty.'\n2. 'Reports indicate a 30% increase in food prices over the last quarter, directly correlating with disruptions in global supply chains.'\nWhich statement primarily employs pathos, and why?", "options": [{"text": "Statement 1 uses pathos by presenting verifiable statistics to evoke a sense of urgency.", "isCorrect": false, "rationale": "Statement 1 does not use statistics; it uses vivid imagery. Statistics are characteristic of logos."}, {"text": "Statement 2 uses pathos by appealing to the logical consequences of economic shifts.", "isCorrect": false, "rationale": "Statement 2 uses statistics and correlations, which are elements of logos (logic and evidence), not pathos."}, {"text": "Statement 1 uses pathos by appealing to emotions like pity and outrage through vivid, distressing imagery.", "isCorrect": true, "rationale": "Pathos is an appeal to the audience's emotions. Statement 1 uses evocative language ('innocent children,' 'skeletal frames,' 'human cruelty') to make the audience feel pity and outrage."}, {"text": "Statement 2 uses pathos by creating a sense of fear about rising costs.", "isCorrect": false, "rationale": "While rising costs might induce fear, Statement 2 itself is presented as factual and statistical, which is an appeal to logos, not directly designed to stir emotions in the way pathos does."}]}, {"question": "A speaker argues: 'Our city should invest heavily in public green spaces (Claim) because studies show access to nature significantly reduces stress and improves mental well-being (Evidence).' What unstated warrant is most likely connecting this evidence to the claim?", "options": [{"text": "Green spaces are more cost-effective than other public health initiatives.", "isCorrect": false, "rationale": "This warrant focuses on cost-effectiveness, which is not directly implied by the evidence of stress reduction and mental well-being improvements."}, {"text": "The city government has a responsibility to improve the mental well-being of its citizens.", "isCorrect": true, "rationale": "A warrant is the underlying assumption connecting evidence to a claim. For the city to 'invest heavily' based on improved mental well-being, the unstated assumption is that such improvement falls within the city's governmental responsibilities."}, {"text": "Stress and mental well-being are the only factors determining a healthy society.", "isCorrect": false, "rationale": "This statement is too extreme; the argument doesn't imply that these are the *only* factors, just important ones that the city should address."}, {"text": "All citizens equally value access to public green spaces.", "isCorrect": false, "rationale": "This warrant focuses on citizen preference rather than the underlying principle that justifies the city's action in relation to the evidence provided."}]}, {"question": "The text states that strong writers acknowledge counterarguments. Why is addressing counterarguments considered a sign of a strong argument?", "options": [{"text": "It demonstrates the writer's ability to compromise and change their original claim.", "isCorrect": false, "rationale": "While a writer *might* adjust their claim, acknowledging counterarguments primarily serves to strengthen their own position by demonstrating they've considered objections, not necessarily to change their stance."}, {"text": "It allows the writer to avoid presenting evidence for their own claim.", "isCorrect": false, "rationale": "Evidence for one's own claim remains crucial. Addressing counterarguments adds another layer of strength, it doesn't replace the need for evidence."}, {"text": "It shows the writer has considered alternative perspectives, making their own argument more robust and credible.", "isCorrect": true, "rationale": "The text explains that strong writers acknowledge and respond to counterarguments, implying that this act makes their position more resilient and believable by showing thorough consideration."}, {"text": "It primarily functions to confuse the audience by introducing conflicting information.", "isCorrect": false, "rationale": "The goal of a strong argument is clarity and persuasion, not confusion. Addressing counterarguments aims to neutralize objections, not introduce ambiguity."}]}, {"question": "When analyzing a primary source, asking 'What is the speaker not saying?' is often the most revealing question. According to the text, what does a speaker's omission tell us?", "options": [{"text": "It indicates the speaker is deliberately trying to deceive the audience.", "isCorrect": false, "rationale": "While deception is possible, the text states omission is a 'choice about what to include and what to leave out,' which isn't always malicious but reflects framing."}, {"text": "It reveals as much about the speaker's argument as what they choose to include.", "isCorrect": true, "rationale": "The text explicitly states: 'What a speaker chooses to omit tells you as much about his argument as what he chooses to say.'"}, {"text": "It suggests the speaker is unaware of alternative viewpoints or facts.", "isCorrect": false, "rationale": "Omission is often a strategic choice, not necessarily a lack of awareness, as the examples with Holmes, Butler, and Wilson suggest they were brilliant and likely aware of complex issues."}, {"text": "It primarily highlights areas where the speaker lacks sufficient evidence.", "isCorrect": false, "rationale": "While an omission could *sometimes* mask a lack of evidence, its primary role, as described, is to show what the speaker chose *not* to focus on as part of their persuasive strategy."}]}, {"question": "Which of the following would be considered a primary source according to the provided definitions?", "options": [{"text": "A history textbook chapter analyzing the causes of the American Civil War.", "isCorrect": false, "rationale": "A textbook chapter is a secondary source; it describes and analyzes primary sources but is not an original document from the period."}, {"text": "A scholarly journal article reviewing interpretations of Shakespeare's plays.", "isCorrect": false, "rationale": "A scholarly review is a secondary source, offering analysis and interpretation of original works or other scholarly works."}, {"text": "A letter written by Abraham Lincoln during the Civil War discussing battlefield strategies.", "isCorrect": true, "rationale": "A letter written by a historical figure during the period under study is an original document and a firsthand account, fitting the definition of a primary source."}, {"text": "A documentary film about World War II featuring expert interviews and archival footage.", "isCorrect": false, "rationale": "While a documentary may *contain* primary source footage, the film itself is a secondary interpretation or compilation, created after the period of study."}]}, {"question": "The text warns that most real arguments 'use all three appeals at once.' What is the primary implication of this for a critical reader?", "options": [{"text": "It simplifies the analysis because all appeals reinforce each other equally.", "isCorrect": false, "rationale": "The text implies it makes analysis *more* complex: 'Part of your job as a critical reader is to untangle these appeals and evaluate each one on its own terms.'"}, {"text": "It means the reader should only focus on the strongest appeal used.", "isCorrect": false, "rationale": "The advice is to 'untangle these appeals and evaluate each one on its own terms,' suggesting a comprehensive analysis, not selective focus."}, {"text": "It requires the reader to untangle each appeal and evaluate it independently to assess the argument's overall strength.", "isCorrect": true, "rationale": "The 'Word of Caution' explicitly states that a critical reader's job is 'to untangle these appeals and evaluate each one on its own terms' because an argument can be persuasive even with weak logos if ethos and pathos are strong."}, {"text": "It indicates that arguments using all three appeals are always strong and persuasive.", "isCorrect": false, "rationale": "The text states: 'An argument can have strong ethos and powerful pathos but weak logos — and it can still be persuasive,' meaning using all three doesn't guarantee overall strength."}]}, {"question": "A political candidate gives a passionate speech, sharing personal anecdotes of hardship (pathos) and emphasizing his long career in public service (ethos). However, he offers no specific policies or data to support his claims about improving the economy. Based on the text, what is the most significant potential weakness of his argument?", "options": [{"text": "A weak ethos, as personal anecdotes are not always credible.", "isCorrect": false, "rationale": "Personal anecdotes are pathos. His 'long career in public service' builds ethos, which seems strong in this scenario."}, {"text": "An absence of effective counterarguments.", "isCorrect": false, "rationale": "While a strong argument addresses counterarguments, the scenario specifically highlights a lack of support for claims, not an omission of counterarguments."}, {"text": "A strong reliance on emotional appeals without sufficient logical support (weak logos).", "isCorrect": true, "rationale": "The scenario describes strong pathos (personal anecdotes) and strong ethos (long career) but a clear lack of 'specific policies or data,' which are elements of logos (logic and evidence). This aligns with the text's caution about arguments with strong ethos/pathos but weak logos."}, {"text": "His claim is likely too broad and not specific enough.", "isCorrect": false, "rationale": "The issue described is the lack of *evidence* for his claims, not necessarily that the claims themselves are too broad, though that could be a separate issue."}]}, {"question": "According to the introduction, what is the primary purpose of this book?", "options": [{"text": "To provide a comprehensive history of rhetoric from ancient Greece to the present.", "isCorrect": false, "rationale": "The text explicitly states: 'This is not a history book, though it contains history.'"}, {"text": "To teach readers how to construct arguments that are always successful in persuasion.", "isCorrect": false, "rationale": "The focus is on understanding and evaluating arguments, including telling 'a strong one from a weak one,' not guaranteeing success."}, {"text": "To equip readers with the skills to understand how arguments are built, how they work, and how to evaluate their strength.", "isCorrect": true, "rationale": "The introduction states the book is 'about arguments — how they are built, how they work, and how to tell a strong one from a weak one.'"}, {"text": "To present famous primary sources without any secondary analysis or interpretation.", "isCorrect": false, "rationale": "The text states: 'This book gives you both: the primary sources themselves and secondary analysis to help you understand them.'"}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
