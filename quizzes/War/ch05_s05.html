<script>
var QUESTIONS = [{"question": "According to the section, what is the primary focus of 'Reception History'?", "options": [{"text": "To analyze the original author's intended meaning of a text or speech.", "isCorrect": false, "rationale": "While an author's intention might be part of a broader study, Reception History specifically examines 'not just what a writer intended but how later generations understood, applied, or rejected the work.'"}, {"text": "To study how a text, speech, or idea was received, interpreted, and used by successive audiences over time.", "isCorrect": true, "rationale": "The definition provided states, 'Reception History: The study of how a text, speech, or idea was received, interpreted, and used by successive audiences over time.'"}, {"text": "To determine the absolute truthfulness and logical merits of historical arguments.", "isCorrect": false, "rationale": "The text explicitly states that asking which argument 'won' is 'a question about rhetoric and history, not about truth,' distinguishing it from assessing logical merits or truthfulness."}, {"text": "To document the historical timeline of conflicts and diplomatic relations between nations.", "isCorrect": false, "rationale": "Reception History focuses on the audience's interaction with ideas and texts, not primarily on the factual timeline of events or diplomatic relations."}], "id": "q01"}, {"question": "Which of the following best explains why Wilson's argument 'dominated American foreign policy' for much of the twentieth century?", "options": [{"text": "It offered a pragmatic, cost-effective approach to international relations that appealed to isolationists.", "isCorrect": false, "rationale": "Wilson's argument was about 'moral obligation' and 'American ideals' and led to internationalism, which is not primarily pragmatic or appealing to isolationists in the sense of avoiding engagement."}, {"text": "It established a framework where American power served a moral purpose, aligning with American ideals and justifying intervention.", "isCorrect": true, "rationale": "The text states Wilson's argument was that 'the United States has a moral obligation to defend democracy abroad — that American power should serve American ideals — became the operating framework for American internationalism' and that 'American military power serves a moral purpose.'"}, {"text": "It advocated for a strictly non-interventionist foreign policy, which gained traction after devastating world wars.", "isCorrect": false, "rationale": "Wilson's framework encouraged 'internationalism' and 'defend[ing] democracy abroad,' which implies intervention rather than non-intervention."}, {"text": "It was the only argument presented during that period that had strong logical merits and universal applicability.", "isCorrect": false, "rationale": "The text states that arguments succeed or fail 'not only on their logical merits but also in the arena of history,' and it specifically contrasts Wilson's success with other arguments, implying that it wasn't just about universal applicability or sole logical merit."}], "id": "q02"}, {"question": "How did the reception of Butler's 'War Is a Racket' argument evolve from the 1930s to the Vietnam War era?", "options": [{"text": "It was widely accepted in the 1930s but became irrelevant by the Vietnam War due to changing economic conditions.", "isCorrect": false, "rationale": "While it resonated in the 1930s, it 'found a new and enormous audience' during the Vietnam War, meaning it was far from irrelevant then."}, {"text": "It was initially ignored due to its radical nature but slowly gained mainstream acceptance over several decades.", "isCorrect": false, "rationale": "It 'resonated' in the 1930s, so it wasn't initially ignored, and it was marginalized during WWII before its massive revival during Vietnam, not a slow, steady gain."}, {"text": "It resonated with the public in the 1930s, was marginalized during World War II, but resurfaced powerfully during the Vietnam War.", "isCorrect": true, "rationale": "The text states it 'resonated with an American public that was determined to stay out of another European conflict' in the 1930s, was 'largely marginalized for decades' after WWII (as it 'seemed inadequate'), and 'found a new and enormous audience' during the Vietnam War."}, {"text": "It consistently served as the primary counter-argument to official government policy throughout the entire period.", "isCorrect": false, "rationale": "Butler's argument was marginalized during WWII, so it did not consistently serve as a primary counter-argument throughout the entire period, especially when contrasted with Wilson's dominance."}], "id": "q03"}, {"question": "A political speech advocating for military intervention gains significant public support during a time of perceived national threat, even though a similar argument failed to gain traction a decade prior. This scenario best illustrates which key concept from the section?", "options": [{"text": "Holmes' Persistence, showing that martial idealism always resurfaces during times of crisis.", "isCorrect": false, "rationale": "While Holmes' ideas do resurface, this scenario specifically highlights the impact of historical context on an argument's reception, rather than just the nature of martial idealism itself."}, {"text": "Remarque's Quiet Power, demonstrating how artistic representations can shift public opinion over time.", "isCorrect": false, "rationale": "Remarque's influence is on how people imagine war through art, not on the immediate success or failure of political arguments based on timing."}, {"text": "Rhetoric and Historical Timing, where the success of an argument depends on meeting audience needs at a particular historical moment.", "isCorrect": true, "rationale": "The 'keyconcept' of 'Rhetoric and Historical Timing' explains that 'The success or failure of a rhetorical argument depends not only on the quality of the argument itself but on whether it meets the needs of its audience at a particular historical moment.' This directly applies to an argument succeeding or failing due to timing and perceived needs."}, {"text": "Wilson's Triumph, proving that arguments rooted in moral necessity inevitably gain dominance.", "isCorrect": false, "rationale": "Wilson's triumph was specific to a certain framework, and the text cautions against declaring any argument 'the permanent “winner,”' indicating success is not inevitable but contextual."}], "id": "q04"}, {"question": "What is the key difference between the influence of Wilson's internationalism and Holmes' martial idealism, as described in the text?", "options": [{"text": "Wilson's ideas shaped military culture, while Holmes' ideas became official government foreign policy.", "isCorrect": false, "rationale": "This is reversed. Wilson's ideas 'dominated American foreign policy,' while Holmes' ideas 'persist in military culture.'"}, {"text": "Wilson's framework became dominant official government policy, whereas Holmes' ideas persisted more subtly in culture and military ethos.", "isCorrect": true, "rationale": "The text states 'Holmes' martial idealism never became official government policy in the way Wilson's internationalism did,' but 'persists in military culture... and in the way many Americans talk about veterans and service.'"}, {"text": "Wilson's argument was entirely focused on economic interests, while Holmes' was solely about moral virtue.", "isCorrect": false, "rationale": "Wilson's argument was about 'moral obligation' and 'American ideals,' not purely economic interests. Holmes' was about 'virtue' and 'character,' but the contrast isn't about exclusive focus on economic vs. moral."}, {"text": "Wilson's ideas quickly faded after his presidency, while Holmes' gained prominence immediately after World War I.", "isCorrect": false, "rationale": "Wilson's argument 'dominated American foreign policy... throughout the twentieth century,' indicating it did not quickly fade. Holmes' ideas persist but are not described as gaining immediate prominence after WWI in this section."}], "id": "q05"}, {"question": "Remarque's 'All Quiet on the Western Front' is described as having 'quiet power.' How did his novel primarily impact the understanding of war?", "options": [{"text": "It provided a new political argument for pacifism that influenced government foreign policy.", "isCorrect": false, "rationale": "The text explicitly states 'Remarque did not make a political argument, and his novel did not shape foreign policy.'"}, {"text": "It offered a definitive historical account of World War I, correcting many inaccuracies.", "isCorrect": false, "rationale": "The text describes its impact as shaping how people 'imagine war' and shifting literary images, not as a definitive historical account correcting inaccuracies."}, {"text": "It shifted the dominant literary image of war from heroic and glorious to one emphasizing mud, terror, and waste.", "isCorrect": true, "rationale": "The text states, 'After Remarque, the dominant literary image shifted toward the mud, the terror, and the waste,' contrasting it with previous heroic images."}, {"text": "It directly inspired the creation of military academies focused on character building and discipline.", "isCorrect": false, "rationale": "The influence on character building in military contexts is more aligned with Holmes' ideas, not Remarque's novel."}], "id": "q06"}, {"question": "What is the central irony highlighted in Butler's legacy?", "options": [{"text": "That his antiwar message resonated in the 1930s but was rejected during the Vietnam War.", "isCorrect": false, "rationale": "This is incorrect; his message was rejected during WWII, but it 'found a new and enormous audience' during the Vietnam War."}, {"text": "That a decorated Marine Corps general became a hero of the peace movement due to his antiwar insights.", "isCorrect": true, "rationale": "The text explicitly states, 'Ironically, Butler the Marine Corps general became a hero of the peace movement,' because his insight was that 'war serves economic interests disguised as patriotic ones.'"}, {"text": "That his pamphlet 'War Is a Racket' was widely distributed but had minimal impact on public opinion.", "isCorrect": false, "rationale": "The text indicates it had 'enormous audience' and 'became one of the defining questions of a generation,' showing significant impact."}, {"text": "That his call for economic reform was misinterpreted as a call for military disarmament.", "isCorrect": false, "rationale": "The text describes his argument as a 'blanket condemnation of all war as a racket' and 'who profits?', directly aligning it with antiwar sentiments and questioning economic motives behind war, not a misinterpretation of economic reform."}], "id": "q07"}, {"question": "According to the section, in what contexts do Holmes' ideas about martial idealism primarily persist in American culture?", "options": [{"text": "Mainly as a fringe philosophical movement, rarely discussed in public discourse.", "isCorrect": false, "rationale": "The text describes its persistence as more significant and widespread than a fringe movement, appearing in political rhetoric and broader cultural beliefs."}, {"text": "Primarily in official government documents and international treaties.", "isCorrect": false, "rationale": "The text states his ideas 'never became official government policy in the way Wilson's internationalism did.'"}, {"text": "In military culture, memorial ceremonies, political rhetoric praising soldiers, and the belief that hardship builds character.", "isCorrect": true, "rationale": "The text mentions persistence 'in military culture, in memorial ceremonies, and in the way many Americans talk about veterans and service' and 'the widespread belief that hardship and adversity build character,' given a 'specifically martial expression' by Holmes."}, {"text": "Solely in academic debates about the ethics of warfare, with no impact on general public perception.", "isCorrect": false, "rationale": "Its influence extends beyond academic debates to military culture, political speech, and general cultural beliefs about character and service."}], "id": "q08"}, {"question": "The title 'The Argument That Won' for this section is ultimately presented as a nuanced statement. What does the conclusion suggest about declaring any argument the permanent 'winner'?", "options": [{"text": "It is appropriate to declare a permanent winner if an argument dominates for at least fifty years.", "isCorrect": false, "rationale": "The text states, 'This observation should make us cautious about declaring any argument the permanent “winner” of this debate,' regardless of duration, because arguments resurface."}, {"text": "Such a declaration is problematic because arguments succeed based on historical timing and audience, and debates are never truly over.", "isCorrect": true, "rationale": "The text concludes, 'The debate among these four voices is not over. It is never over,' and emphasizes that success is tied to 'rhetoric and historical timing,' making permanent declarations problematic."}, {"text": "The 'winning' argument is always the one that is most logically sound and universally accepted as true.", "isCorrect": false, "rationale": "The introduction states, arguments succeed or fail 'not only on their logical merits but also in the arena of history — where timing, power, audience, and circumstance determine which ideas take hold and which are pushed to the margins,' explicitly decoupling 'winning' from universal truth or sole logical merit."}, {"text": "The only true 'winner' is the argument that leads to peace and global stability.", "isCorrect": false, "rationale": "The text focuses on the *reception* of arguments and their historical success, not on their ultimate outcomes in terms of peace or stability, nor does it define 'winning' by such criteria."}], "id": "q09"}, {"question": "According to the final paragraph, what tools will students need to navigate future debates about war, such as those discussed in the section?", "options": [{"text": "Extensive knowledge of military history and international law.", "isCorrect": false, "rationale": "While helpful, the text specifically mentions 'the tools of rhetorical analysis' as the ones developed throughout the book and needed for this debate."}, {"text": "The ability to identify ethos, pathos, and logos; detect omissions; and distinguish argument from testimony.", "isCorrect": true, "rationale": "The text states, 'The tools of rhetorical analysis you have been developing throughout this book — the ability to identify ethos, pathos, and logos; to detect omissions and blind spots; to distinguish argument from testimony — are the tools you will need.'"}, {"text": "A strong personal conviction about which argument is definitively correct.", "isCorrect": false, "rationale": "The text encourages caution about declaring permanent winners and emphasizes analytical tools, rather than strong personal conviction as the primary navigation tool."}, {"text": "The capacity to predict future geopolitical conflicts and their outcomes.", "isCorrect": false, "rationale": "The focus is on analyzing arguments when they resurface, not on predicting future events."}], "id": "q10"}, {"question": "Wilson's argument 'won' in the sense that it dominated American foreign policy for most of the twentieth century. Butler's argument was marginalized during WWII but revived during Vietnam. What does this pattern reveal about the relationship between an argument's logical quality and its political success?", "options": [{"text": "It reveals that politically successful arguments are always logically superior; Wilson's dominance proves his argument was better than Butler's.", "isCorrect": false, "rationale": "The text explicitly says arguments succeed or fail 'not only on their logical merits but also in the arena of history — where timing, power, audience, and circumstance determine which ideas take hold.' Political dominance is not proof of logical superiority."}, {"text": "It reveals that logical quality and political success are largely independent: an argument can be logically strong but politically marginalized, and vice versa — historical circumstances, institutional power, and audience needs shape which arguments gain traction.", "isCorrect": true, "rationale": "Butler's argument was not refuted during WWII — it was marginalized because the historical circumstances (a war widely understood as genuinely necessary) made his blanket anti-war framework feel inadequate. Its revival during Vietnam, when that sense of necessity was widely questioned, shows that the argument's force depended on context, not on changes in its logical content."}, {"text": "It reveals that political success is purely a matter of marketing and public relations, with no connection to the substance of the argument.", "isCorrect": false, "rationale": "While rhetoric and timing matter, the text does not reduce political success to mere marketing. Butler's argument revived because the Vietnam War context made its claims about profit and deception genuinely plausible to a new audience — the substance mattered, but the context determined whether audiences were ready to engage with it."}, {"text": "It reveals that arguments always return to prominence once their original audiences have died — Butler simply had to wait for a new generation.", "isCorrect": false, "rationale": "The mechanism is not generational replacement but contextual resonance. Butler's argument revived during Vietnam because that war generated the specific combination of doubt, sacrifice, and suspected deception that made his framework feel applicable — not simply because older audiences had passed."}], "id": "q11"}, {"question": "The section concludes that the debate among the four voices 'is not over. It is never over.' What does this mean for a reader who has just finished this textbook, and what is the practical implication of that claim?", "options": [{"text": "It means the textbook has failed to resolve the debate, and readers should look elsewhere for definitive answers about war.", "isCorrect": false, "rationale": "The statement is not a confession of failure but an affirmation that debates about fundamental human questions have no permanent resolution. The textbook's purpose is to equip readers with tools to engage such debates, not to settle them."}, {"text": "It means readers will encounter versions of these same arguments — about virtue, profit, moral obligation, and the experience of combat — whenever war is debated in their own time, and the analytical tools developed in this book will help them navigate those recurring encounters.", "isCorrect": true, "rationale": "Each of the four arguments recurs whenever war is debated: Holmes' virtues, Butler's profit motive, Wilson's moral obligation, and Remarque's testimony all appear in contemporary arguments. The practical implication is that close reading, identification of ethos/pathos/logos, detection of omissions, and distinguishing argument from testimony are durable skills, not just tools for understanding 1917 or 1935."}, {"text": "It means readers should form a definitive personal position on war before engaging in any public debate, since unresolved uncertainty is intellectually irresponsible.", "isCorrect": false, "rationale": "The text consistently values the ability to hold multiple perspectives in tension and to recognize blind spots in every position. Premature closure on a 'definitive position' would replicate exactly the failure it identifies in each of the four writers."}, {"text": "It means the four arguments are permanent truths about war that cannot be added to or superseded by future evidence or argument.", "isCorrect": false, "rationale": "The claim is about recurrence, not permanence or completeness. The debate continues as new wars create new contexts; it does not mean the four arguments are the final word on the subject."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
