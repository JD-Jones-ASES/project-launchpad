    };

        <a href="../../courses/War.html">&larr; Back to War: A Debate in Primary Sources</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 5, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What specifically led the Nazi regime to revoke Erich Maria Remarque’s citizenship and burn his books in 1933?", "options": [{"text": "His decision to emigrate to the United States and renounce his German heritage.", "isCorrect": false, "rationale": "Remarque emigrated after the Nazis came to power and his books were already targeted; he did not become a U.S. citizen until 1947."}, {"text": "The perception that his writing told a 'truth' about war that was damaging to the national image.", "isCorrect": true, "rationale": "The text states his 'crime' was telling the truth about what the war had done to his generation, which conflicted with the Nazi glorification of conflict."}, {"text": "His active service as a general in the German army during the failed Western Front offensive.", "isCorrect": false, "rationale": "Remarque was an ordinary soldier (drafted at eighteen), not a general, which is why his perspective is called the 'voice from the trenches.'"}, {"text": "The discovery that his novel was funded by Allied propaganda organizations.", "isCorrect": false, "rationale": "The text notes the novel was based on his personal experience and was an international sensation, but makes no mention of Allied funding."}], "id": "q01"}, {"question": "How does the source describe the primary difference between Remarque's work and the writings of Holmes, Butler, and Wilson?", "options": [{"text": "Remarque uses statistical evidence and policy analysis rather than moral claims.", "isCorrect": false, "rationale": "The text explicitly states that Remarque's novel captures truths that 'statistics and policy arguments cannot convey.'"}, {"text": "Remarque's work is a rhetorical pamphlet designed to persuade a specific political audience.", "isCorrect": false, "rationale": "The text clarifies that unlike the other three, Remarque's novel is not a work of rhetoric but a work of fiction based on experience."}, {"text": "Remarque provides a concrete, visceral experience of combat rather than an abstract argument about it.", "isCorrect": true, "rationale": "The text explains that while the others argue about war from a distance, Remarque 'puts you in the trench' to show the immediate physical reality."}, {"text": "Remarque focuses on the economic motivations of the German high command.", "isCorrect": false, "rationale": "This describes Smedley Butler's 'racket' argument, which Remarque's characters find 'distant and irrelevant' to their immediate survival."}], "id": "q02"}, {"question": "In the excerpt, why do the experienced soldiers view the issue of 'Edamer cheese' and rum with foreboding?", "options": [{"text": "The rations are often poisoned by enemy spies to weaken the front lines before an attack.", "isCorrect": false, "rationale": "There is no mention of poisoned rations; the soldiers actually describe the cheese as 'tasty.'"}, {"text": "Good rations are traditionally served only to those about to be sent on 'suicide missions.'", "isCorrect": false, "rationale": "The text suggests the rations are for the whole company, not just specific volunteers for special missions."}, {"text": "The appearance of luxury rations has historically signaled that a period of high casualties is imminent.", "isCorrect": true, "rationale": "The soldiers have learned through experience that 'fat red balls' of cheese are a sign of a 'bad time coming'—likely a preparation for an offensive."}, {"text": "The scent of the cheese attracts 'corpse-rats' that keep the men from sleeping.", "isCorrect": false, "rationale": "While rats are a major problem, the soldiers' foreboding about the cheese specifically relates to the expectation of a coming battle."}], "id": "q03"}, {"question": "According to Paul B\"aumer's observations, which factor most determines whether a soldier lives or dies during a bombardment?", "options": [{"text": "The soldier's level of patriotic 'faith' and moral character.", "isCorrect": false, "rationale": "This aligns with Holmes's views, but Paul argues that the experience of war erodes these beliefs and does not protect the soldier."}, {"text": "The quality of the soldier's training and hand-to-hand combat skills.", "isCorrect": false, "rationale": "While skills are mentioned, the bombardment is described as a force against which skill is useless."}, {"text": "Pure 'Chance,' as even 'bomb-proof' shelters can be destroyed while someone in the open survives.", "isCorrect": true, "rationale": "Paul emphasizes that 'Chance hovers' over them and that survival is a matter of luck rather than determination or skill."}, {"text": "The soldier's ability to distinguish the 'calibre' of incoming shells by sound.", "isCorrect": false, "rationale": "Soldiers can distinguish calibres, but Paul notes they 'neither know nor can determine' where a shot will actually fall."}], "id": "q04"}, {"question": "Why do the soldiers in the excerpt prefer using sharpened spades over bayonets in hand-to-hand fighting?", "options": [{"text": "Spades are lighter and allow for faster movement across no man's land.", "isCorrect": false, "rationale": "The text actually notes the spade is better because of its 'greater weight,' making it a more effective striking weapon."}, {"text": "Bayonets are frequently confiscated by officers to prevent 'unpleasant jests.'", "isCorrect": false, "rationale": "Officers do not confiscate bayonets for this reason; the soldiers themselves modify or swap them for practical reasons."}, {"text": "The spade is easier to pull out of an opponent, whereas bayonets often get stuck in the ribs or body.", "isCorrect": true, "rationale": "The text explains that bayonets frequently 'jam on the thrust,' requiring the soldier to kick the opponent to free the blade, which is dangerous."}, {"text": "The 'saw-bayonets' are too heavy to use effectively in the narrow confines of a trench.", "isCorrect": false, "rationale": "The issue with saw-bayonets is that the enemy will kill any soldier caught with one because of the horrific wounds they inflict, not their weight."}], "id": "q05"}, {"question": "What does the text identify as a 'fundamental limitation' shared by the arguments of Holmes, Butler, and Wilson when compared to Remarque’s narrative?", "options": [{"text": "They all rely on fictionalized accounts that lack historical accuracy.", "isCorrect": false, "rationale": "Holmes, Butler, and Wilson are historical figures providing non-fiction rhetoric; it is Remarque who uses fiction to convey truth."}, {"text": "They each attempt to fit war into a rational framework or 'story' that the actual experience of combat resists.", "isCorrect": true, "rationale": "The 'Key Concept' notes that while they offer ways to make sense of war (virtue, profit, democracy), Remarque's described experience is too chaotic to be contained by them."}, {"text": "They focus exclusively on the experiences of the Allied forces, ignoring the German perspective.", "isCorrect": false, "rationale": "While they are American voices, the text's critique is that their *rhetorical frameworks*—regardless of nationality—cannot capture the physical reality."}, {"text": "They fail to acknowledge that war is a 'fearful thing' or that it involves suffering.", "isCorrect": false, "rationale": "The text explicitly says Wilson acknowledges war is 'fearful' and Butler describes 'broken bodies,' but they don't provide the *immediate* experience of it."}], "id": "q06"}, {"question": "What specific psychological reaction is described in the recruit who eventually tries to flee the dug-out during the bombardment?", "options": [{"text": "A 'soldier's faith' that he is invincible to the incoming shells.", "isCorrect": false, "rationale": "The recruit is terrified and has 'hunted, protruding eyes,' which is the opposite of Holmes's 'soldier's faith.'"}, {"text": "An intense case of claustrophobia triggered by the confinement and shelling.", "isCorrect": true, "rationale": "The text explicitly identifies it as a 'case of claustrophobia,' where the soldier feels he is suffocating and must get out at any price."}, {"text": "A calculated 'racket' to get himself wounded and sent to the rear.", "isCorrect": false, "rationale": "The recruit's actions are described as 'meaningless words' and 'raving,' indicating a loss of control rather than a calculated plan."}, {"text": "A sudden burst of 'patriotic speeches' learned from his schoolteacher.", "isCorrect": false, "rationale": "While patriotic speeches brought them to the war, the reality of the bombardment causes the recruit to collapse 'like a rotten tree.'"}], "id": "q07"}, {"question": "How do the soldiers in the trench manage the problem of the 'corpse-rats' stealing their limited bread supply?", "options": [{"text": "They hang the bread from the roof using thin wires to keep it out of reach.", "isCorrect": false, "rationale": "Detering tried this, but he saw a rat 'riding' the bread on the wire, proving the method unsuccessful."}, {"text": "They use the bread as bait to lure the rats into a central area and then strike them with spades.", "isCorrect": true, "rationale": "The text describes how they heap the gnawed bits in the middle of the floor and wait with spades and pocket-lamps to 'slaughter' them."}, {"text": "They share their rations with the cats and dogs in the sector to encourage them to hunt the rats.", "isCorrect": false, "rationale": "The text mentions that the rats actually 'attacked two large cats and a dog, bit them to death and devoured them.'"}, {"text": "They stop eating bread entirely and switch to the 'Edamer cheese' issued by the commander.", "isCorrect": false, "rationale": "The soldiers cannot afford to throw the bread away because they have 'practically nothing left to eat,' so they merely cut off the gnawed bits."}], "id": "q08"}, {"question": "What historical evidence is provided in the 'Historical Context' box to illustrate the stagnation of the Western Front?", "options": [{"text": "The Battle of the Somme resulted in the front moving only six miles despite over a million casualties.", "isCorrect": true, "rationale": "The text uses this specific statistic to show that massive loss of life resulted in almost no territorial gain."}, {"text": "The English artillery was so superior that the German lines could not advance more than a few hundred yards.", "isCorrect": false, "rationale": "While English artillery is mentioned in the excerpt, the historical context box focuses on the general lack of movement across the whole 440-mile front."}, {"text": "The use of 'flame-throwers' and 'tanks' effectively ended the era of trench warfare by 1916.", "isCorrect": false, "rationale": "The text notes these were 'rumours' or feared weapons, but the front remained 'barely moved' for most of the war (1914–1918)."}, {"text": "The average soldier spent only ten hours in a trench before being rotated to the rear.", "isCorrect": false, "rationale": "Paul mentions surviving 'ten hours' bombardment' as a matter of chance, but the historical context says millions 'lived in trenches' for most of the war."}], "id": "q09"}, {"question": "In the 'After the Excerpt' analysis, what does the author suggest about the perspective of the German soldiers compared to Wilson’s goals?", "options": [{"text": "The German soldiers were more focused on the 'racket' of war than on democracy.", "isCorrect": false, "rationale": "The text states the 'racket' (economic profit) was as distant to them as the moral arguments."}, {"text": "The German soldiers were fighting specifically to prevent the world from being made 'safe for democracy.'", "isCorrect": false, "rationale": "The text doesn't say they opposed Wilson's goal, but rather that they were told the 'same things about duty and necessity' by their own leaders."}, {"text": "The suffering of German soldiers mirrors that of Allied soldiers, regardless of the political justifications for the war.", "isCorrect": true, "rationale": "The analysis points out that Wilson's framework ignores that the 'enemy' soldiers were enduring the same horrors and were motivated by similar appeals to duty."}, {"text": "The German soldiers viewed the war as a 'school of virtue' similar to Holmes's ideal.", "isCorrect": false, "rationale": "The text explicitly asks if Remarque's description looks like a 'school of virtue' and concludes it describes 'desperate survival' instead."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
