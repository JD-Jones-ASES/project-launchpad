<script>
var QUESTIONS = [{"question": "According to the text, what does 'Reception History' primarily examine?", "options": [{"text": "The original intentions of a writer or speaker when creating a text or speech.", "isCorrect": false, "rationale": "While original intention is part of understanding a work, reception history focuses more broadly on how 'later generations understood, applied, or rejected the work,' not just the initial intent."}, {"text": "How a text, speech, or idea was received, interpreted, and used by successive audiences over time.", "isCorrect": true, "rationale": "The definition provided states, 'Reception History: The study of how a text, speech, or idea was received, interpreted, and used by successive audiences over time.'"}, {"text": "The inherent logical merits and truthfulness of an argument regardless of historical context.", "isCorrect": false, "rationale": "The text explicitly states that 'Reception history examines not just what a writer intended but how later generations understood, applied, or rejected the work,' focusing on audience and time rather than just inherent truth or logic in a vacuum."}, {"text": "Only the immediate impact and contemporary understanding of an argument upon its initial presentation.", "isCorrect": false, "rationale": "Reception history specifically emphasizes 'successive audiences over time,' indicating a long-term study beyond just the immediate impact."}], "id": "q01"}, {"question": "Which of the following best describes the core of Wilson's argument that dominated American foreign policy?", "options": [{"text": "The belief that military service primarily builds individual character and national moral strength.", "isCorrect": false, "rationale": "This describes Holmes' martial idealism, not Wilson's argument for international engagement."}, {"text": "A blanket condemnation of all wars as schemes for profit and economic interests.", "isCorrect": false, "rationale": "This aligns with Butler's anti-war argument, not Wilson's internationalist stance."}, {"text": "The idea that the United States has a moral obligation to defend democracy abroad, using its power to serve American ideals.", "isCorrect": true, "rationale": "The text states, 'The idea that the United States has a moral obligation to defend democracy abroad — that American power should serve American ideals — became the operating framework for American internationalism throughout the twentieth century,' directly describing Wilson's triumph."}, {"text": "The portrayal of war as a horrific and dehumanizing experience, shifting literary perception.", "isCorrect": false, "rationale": "This accurately describes Remarque's impact through his novel, not Wilson's political argument."}], "id": "q02"}, {"question": "Why did Butler's anti-war argument, which resonated in the 1930s, become marginalized during World War II?", "options": [{"text": "The public lost interest in all political arguments once the war began.", "isCorrect": false, "rationale": "The text does not suggest a general loss of interest in arguments, but rather a specific rejection of Butler's stance in the context of WWII."}, {"text": "Wilson's argument became overwhelmingly popular, overshadowing all others.", "isCorrect": false, "rationale": "While Wilson's framework was dominant, the reason for Butler's marginalization was specifically related to the nature of WWII, not just Wilson's popularity."}, {"text": "The perceived clear justification of the war against Hitler undermined his blanket condemnation of all war as a racket.", "isCorrect": true, "rationale": "The text explains, 'The existence of a war that appeared clearly justified undercut Butler's central claim that war is always a scheme for profit.'"}, {"text": "Butler himself retracted his argument due to new evidence.", "isCorrect": false, "rationale": "The text does not mention Butler retracting his argument; rather, it discusses how its reception changed due to historical circumstances."}], "id": "q03"}, {"question": "What historical context primarily led to the revival and enormous audience for Butler's argument in the 1960s and 1970s?", "options": [{"text": "A renewed appreciation for heroic narratives of war and military service.", "isCorrect": false, "rationale": "This contradicts the nature of Butler's anti-war argument; his revival was linked to anti-war sentiment."}, {"text": "The widespread belief that hardship and adversity build character among soldiers.", "isCorrect": false, "rationale": "This reflects Holmes' ideas, not the reason for Butler's revival, which was tied to skepticism about war's motives."}, {"text": "The Vietnam War, due to its perceived lack of clear explanation, disproportionate cost, and profit for defense contractors.", "isCorrect": true, "rationale": "The text states, 'It was not until the Vietnam War in the 1960s and 1970s that Butler's argument found a new and enormous audience. The Vietnam War looked to many Americans exactly like the kind of conflict Butler had described: a war fought for reasons that the government could not clearly explain, at a cost borne disproportionately by the poor and working class, while defense contractors earned record profits.'"}, {"text": "The success of American interventions based on moral justifications abroad.", "isCorrect": false, "rationale": "This describes Wilson's legacy; the Vietnam War's controversial nature was the catalyst for Butler's comeback."}], "id": "q04"}, {"question": "How does Holmes' martial idealism primarily persist in American culture, despite never becoming official government policy?", "options": [{"text": "Through explicit government mandates requiring military service for all citizens.", "isCorrect": false, "rationale": "The text explicitly states that Holmes' idealism 'never became official government policy in the way Wilson’s internationalism did.'"}, {"text": "By shaping foreign policy decisions and international interventions.", "isCorrect": false, "rationale": "This was Wilson's impact; Holmes' influence is more cultural and philosophical."}, {"text": "Through military culture, memorial ceremonies, and the way many Americans talk about veterans and service, along with a broader belief in hardship building character.", "isCorrect": true, "rationale": "The text explains that these ideas 'persist in military culture, in memorial ceremonies, and in the way many Americans talk about veterans and service,' and also in the 'widespread belief that hardship and adversity build character.'"}, {"text": "Solely through academic debates about military ethics in universities.", "isCorrect": false, "rationale": "While it may be discussed academically, the text describes a much broader cultural persistence beyond academia."}], "id": "q05"}, {"question": "What was Remarque's unique and lasting impact, as described in the text, despite not making a political argument or shaping foreign policy?", "options": [{"text": "He established the moral framework for American internationalism.", "isCorrect": false, "rationale": "This was Wilson's contribution, not Remarque's."}, {"text": "He provided economic arguments against war, exposing its true beneficiaries.", "isCorrect": false, "rationale": "This was Butler's focus on war as a 'racket,' not Remarque's literary impact."}, {"text": "He fundamentally shifted the dominant literary image of war from heroic to one emphasizing its grim realities, terror, and waste.", "isCorrect": true, "rationale": "The text states, 'Before Remarque, the dominant literary image of war was heroic... After Remarque, the dominant literary image shifted toward the mud, the terror, and the waste.'"}, {"text": "He articulated the idea that military service builds character and virtue.", "isCorrect": false, "rationale": "This is a core idea of Holmes' martial idealism, not Remarque's portrayal of war."}], "id": "q06"}, {"question": "Based on the key concept of 'Rhetoric and Historical Timing,' why might an argument that is logically sound and eloquently presented still fail to gain traction?", "options": [{"text": "The argument's inherent truthfulness is secondary to its aesthetic appeal.", "isCorrect": false, "rationale": "The text emphasizes historical timing and audience needs, not merely aesthetic appeal, as factors determining success beyond logical merits."}, {"text": "Its logical merits are always less important than the speaker's ethos.", "isCorrect": false, "rationale": "While ethos is important, the text highlights that success also depends on 'whether it meets the needs of its audience at a particular historical moment,' not just ethos."}, {"text": "It fails to meet the specific needs or readiness of its audience at that particular historical moment.", "isCorrect": true, "rationale": "The text explicitly states, 'The success or failure of a rhetorical argument depends not only on the quality of the argument itself but on whether it meets the needs of its audience at a particular historical moment.'"}, {"text": "The argument is too complex for a general audience to understand.", "isCorrect": false, "rationale": "While complexity can be a factor, the text specifically points to the alignment with audience needs and historical context as the primary reason for success or failure, even for brilliant arguments."}], "id": "q07"}, {"question": "Which of the four arguments discussed in the text *most directly* became the 'operating framework' for American foreign policy for a significant portion of the 20th century?", "options": [{"text": "Butler's argument against war as a racket.", "isCorrect": false, "rationale": "Butler's argument was largely marginalized and only resurfaced later; it did not become an operating framework for foreign policy."}, {"text": "Holmes' martial idealism about military service building character.", "isCorrect": false, "rationale": "Holmes' ideas persisted culturally but 'never became official government policy in the way Wilson's internationalism did.'"}, {"text": "Remarque's portrayal of the horrors of war.", "isCorrect": false, "rationale": "Remarque's novel shaped how people imagine war but 'did not shape foreign policy.'"}, {"text": "Wilson's argument for American internationalism and moral obligation to defend democracy.", "isCorrect": true, "rationale": "The text clearly states, 'Wilson's argument dominated American foreign policy. The idea... became the operating framework for American internationalism throughout the twentieth century.'"}], "id": "q08"}, {"question": "What is the ultimate conclusion the text draws about declaring any argument the permanent 'winner' of the debate among these four voices?", "options": [{"text": "Wilson's argument has definitively won and permanently shaped global policy.", "isCorrect": false, "rationale": "The text cautions against declaring a permanent winner, noting that arguments resurface and fade depending on historical context."}, {"text": "Remarque's artistic impact has proven to be the most lasting and universally accepted.", "isCorrect": false, "rationale": "While Remarque's impact is lasting, the text's conclusion is that the debate itself is never over, and no single argument is a permanent winner."}, {"text": "The debate is never truly over; arguments resurface and are re-evaluated by each generation as new conflicts arise.", "isCorrect": true, "rationale": "The text concludes, 'This observation should make us cautious about declaring any argument the permanent 'winner' of this debate... The debate among these four voices is not over. It is never over. Every new war reopens the same questions, and every generation must decide for itself which arguments hold up and which do not.'"}, {"text": "The most logical argument, regardless of timing, will eventually prevail.", "isCorrect": false, "rationale": "The text explicitly states that arguments succeed or fail not only on 'logical merits but also in the arena of history — where timing, power, audience, and circumstance determine which ideas take hold.'"}], "id": "q09"}, {"question": "According to the final paragraph, what rhetorical tools will be necessary to navigate the ongoing debate about war whenever it surfaces again?", "options": [{"text": "Primarily the ability to recall specific historical dates and figures.", "isCorrect": false, "rationale": "While historical knowledge is useful, the text emphasizes analytical rhetorical tools over mere recall of facts."}, {"text": "The capacity to prioritize emotional appeals over logical reasoning.", "isCorrect": false, "rationale": "The text mentions identifying 'pathos' but equally stresses 'logos' and other analytical skills, not prioritizing one over the other."}, {"text": "Identifying ethos, pathos, and logos; detecting omissions and blind spots; distinguishing argument from testimony.", "isCorrect": true, "rationale": "The text explicitly lists these as 'the tools you will need to navigate this debate whenever it surfaces again.'"}, {"text": "An understanding of current events without reference to historical context.", "isCorrect": false, "rationale": "The entire section highlights the importance of historical context ('reception history,' 'historical timing') for understanding arguments."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
