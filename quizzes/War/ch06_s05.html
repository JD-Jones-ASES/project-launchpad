<script>
var QUESTIONS = [{"question": "According to the text, what is the fundamental distinction between propaganda and legitimate persuasion?", "options": [{"text": "Propaganda always contains falsehoods, while legitimate persuasion relies solely on verified facts.", "isCorrect": false, "rationale": "This is identified as 'Mistake 2' in the text; effective propaganda often uses true facts, selectively presented."}, {"text": "Propaganda subordinates truth to effect, whereas legitimate persuasion subordinates effect to truth.", "isCorrect": true, "rationale": "The text explicitly states: 'propaganda subordinates truth to effect, while legitimate persuasion subordinates effect to truth.'"}, {"text": "Propaganda is primarily designed to inform, while legitimate persuasion aims to change behavior.", "isCorrect": false, "rationale": "The definition states propaganda is 'designed primarily to influence attitudes and behavior rather than to inform or reason.'"}, {"text": "Propaganda is typically employed by governments, while legitimate persuasion is used by individuals.", "isCorrect": false, "rationale": "While governments use propaganda, the text does not limit its application based on who employs it, focusing instead on techniques and intent."}]}, {"question": "The text describes the line between persuasion and propaganda as 'maddeningly blurry.' Which of the following best explains why this distinction is so difficult to make?", "options": [{"text": "Because all persuasive communication inherently involves unethical manipulation.", "isCorrect": false, "rationale": "The text differentiates between legitimate persuasion and propaganda, implying not all persuasion is unethical manipulation."}, {"text": "Because both types of communication naturally involve techniques like selective evidence and emotional appeals, and a writer's intent is often unknowable.", "isCorrect": true, "rationale": "The text states, 'Every effective argument selects its evidence' and 'Every effective argument uses emotion,' noting the difficulty in discerning manipulative intent ('which we cannot know with certainty')."}, {"text": "Because only academic experts are truly qualified to identify propaganda, making it inaccessible to the average reader.", "isCorrect": false, "rationale": "The chapter's purpose is to give readers the tools to think about it clearly, implying it's a skill for everyone."}, {"text": "Because propaganda is always illegal, making its identification a legal rather than rhetorical challenge.", "isCorrect": false, "rationale": "The text does not discuss the legality of propaganda."}]}, {"question": "A political candidate asserts, 'My opponent's environmental plan is simply to shut down all factories, which would devastate our economy and leave millions jobless.' However, the opponent's actual plan proposes gradual shifts to renewable energy and targeted industry regulations. This scenario exemplifies which common propaganda technique?", "options": [{"text": "False Dilemma", "isCorrect": false, "rationale": "A false dilemma presents only two options when more exist. Here, the issue is misrepresenting an opponent, not limiting options."}, {"text": "Emotional Manipulation", "isCorrect": false, "rationale": "While the statement might evoke fear, the primary technique described is the misrepresentation of the opponent's argument."}, {"text": "Straw Man", "isCorrect": true, "rationale": "The scenario perfectly matches the definition of a straw man argument: misrepresenting an opponent's position in a weaker or distorted way to make it easier to attack."}, {"text": "Selective Presentation of Facts", "isCorrect": false, "rationale": "While facts might be selected, the core issue is fabricating or distorting the *opponent's* position, not just choosing which facts to present about one's own."}]}, {"question": "During a public health crisis, a government official declares, 'Either we implement a complete lockdown immediately, or our healthcare system will collapse entirely.' Critics argue that other options, such as targeted restrictions, increased testing, or vaccine distribution, are also available. The official's statement is an example of which rhetorical device or propaganda technique?", "options": [{"text": "Demonization of Opponents", "isCorrect": false, "rationale": "No specific opponent is demonized in this statement."}, {"text": "Repetition of Slogans", "isCorrect": false, "rationale": "This is a single statement, not a repeated slogan."}, {"text": "False Dilemma", "isCorrect": true, "rationale": "The official presents only two extreme options (total lockdown or total collapse) when, as critics suggest, more nuanced or alternative solutions might exist, which is the definition of a false dilemma."}, {"text": "Straw Man", "isCorrect": false, "rationale": "The official is not misrepresenting an opponent's position; they are limiting the perceived choices."}]}, {"question": "When discussing Oliver Wendell Holmes' address, the text questions whether his 'omissions distort the truth or simply reflect the appropriate focus of a Memorial Day address.' This analytical approach primarily focuses on which aspect of distinguishing persuasion from propaganda?", "options": [{"text": "The speaker's explicit intent to recruit soldiers for war.", "isCorrect": false, "rationale": "The text explicitly states Holmes was 'not trying to start a war or recruit soldiers' and that intent is hard to know for certain."}, {"text": "The potential for selective presentation of facts to become manipulation.", "isCorrect": true, "rationale": "Holmes' 'omissions' (e.g., of physical horrors) while focusing on virtue represent selective presentation, which is a key technique that can blur the line between emphasis and manipulation."}, {"text": "The use of repetition of slogans to indoctrinate an audience.", "isCorrect": false, "rationale": "Repetition of slogans is a propaganda technique, but it's not the primary focus of the analysis regarding Holmes' omissions."}, {"text": "The degree to which he demonizes an enemy nation or group.", "isCorrect": false, "rationale": "Demonization is a propaganda technique, but it's not the specific aspect highlighted in the analysis of Holmes' omissions."}]}, {"question": "The text states that Remarque's novel, 'All Quiet on the Western Front,' despite being a truthful account and making no explicit arguments, was banned by the Nazi regime as propaganda because it 'made war harder to glorify.' This example primarily supports which idea from the section?", "options": [{"text": "Propaganda must contain blatant lies to be effective.", "isCorrect": false, "rationale": "Remarque's novel was a 'truthful witness account,' directly contradicting the idea that propaganda must contain lies."}, {"text": "The political effect of a communication, regardless of the author's intent, can define it as propaganda.", "isCorrect": true, "rationale": "The text says, 'If propaganda is defined by its effect rather than its intent, then even a truthful witness account can function as propaganda,' which Remarque's case illustrates."}, {"text": "Only texts with explicit policy recommendations can be classified as propaganda.", "isCorrect": false, "rationale": "Remarque's novel 'makes no policy recommendations,' yet was considered propaganda, disproving this statement."}, {"text": "Any argument one disagrees with is automatically propaganda.", "isCorrect": false, "rationale": "While the Nazis disagreed, the text distinguishes this 'common mistake' and clarifies that propaganda refers to specific techniques and effects, not mere disagreement."}]}, {"question": "President Wilson's address for war is presented as a 'hardest case' for distinguishing persuasion from propaganda, partly because he 'presents a false dilemma of sorts.' What additional factor makes Wilson's case particularly complex to evaluate?", "options": [{"text": "He relied solely on fabricated evidence and invented threats to manipulate public opinion.", "isCorrect": false, "rationale": "The text explicitly states 'Germany's submarine warfare was real, the Zimmermann Telegram was real, and the threat...was genuine. Wilson was not fabricating a crisis.'"}, {"text": "His primary goal was to demonize the Allied powers rather than Germany.", "isCorrect": false, "rationale": "Wilson's argument was framed against Germany, not the Allied powers."}, {"text": "His speech was delivered for the explicit purpose of persuading Congress to declare war, an act with enormous real-world consequences.", "isCorrect": true, "rationale": "The text notes this explicit purpose ('life-and-death consequences for millions') as a factor making it a 'hardest case,' as the stakes amplify the ethical questions around rhetorical framing."}, {"text": "He acknowledged all counterarguments and invited dissenting voices to speak.", "isCorrect": false, "rationale": "The text mentions he framed the conflict simplistically and presented a false dilemma, suggesting he did not acknowledge all counterarguments."}]}, {"question": "One 'common mistake' identified in the text is believing 'Propaganda must contain lies.' Why is this considered a mistake?", "options": [{"text": "Because outright lies are too easily detected and thus ineffective for sustained propaganda.", "isCorrect": false, "rationale": "While possibly true, this is not the reason provided in the text."}, {"text": "Because the most effective propaganda often uses true facts, but strategically selects, frames, and packages them to prevent critical thinking and push a predetermined conclusion.", "isCorrect": true, "rationale": "The text explicitly states this: 'The most effective propaganda often uses true facts. What makes it propaganda is not falsehood but the systematic selection, framing, and emotional packaging of those facts...'"}, {"text": "Because propaganda is primarily about emotional manipulation and rarely involves factual claims at all.", "isCorrect": false, "rationale": "Propaganda involves both emotional manipulation and the presentation of facts, albeit selectively framed."}, {"text": "Because the definition of propaganda focuses solely on the speaker's malicious intent, not the truthfulness of the content.", "isCorrect": false, "rationale": "The text emphasizes effect and methods over unknowable intent."}]}, {"question": "A student is critically evaluating a current news article. They ask: 'Does the writer acknowledge the strongest counterarguments?' and 'Does the emotional intensity match the strength of the evidence?' According to the text, what is the primary purpose of asking these types of diagnostic questions?", "options": [{"text": "To determine the author's political party affiliation.", "isCorrect": false, "rationale": "These questions focus on rhetorical techniques and argument quality, not personal political alignment."}, {"text": "To classify the author as either a 'hero' or a 'villain.'", "isCorrect": false, "rationale": "The text explicitly states the goal is to 'locate writers along that spectrum rather than simply sorting them into heroes and villains.'"}, {"text": "To definitively prove that the article contains factual errors.", "isCorrect": false, "rationale": "While factual errors might be discovered, the questions are designed to assess rhetorical manipulation and critical thinking, not just factual accuracy."}, {"text": "To help distinguish whether the writing is legitimate persuasion or crosses into propaganda.", "isCorrect": true, "rationale": "These are precisely the 'diagnostic questions' provided in the text to help readers evaluate persuasive writing and locate it on the spectrum between persuasion and propaganda."}]}, {"question": "The chapter concludes by stating that learning to identify and distinguish persuasion from propaganda are 'survival skills for citizens in a democracy.' What is the underlying implication of this statement?", "options": [{"text": "That modern democratic societies are constantly at risk of military intervention and national crises.", "isCorrect": false, "rationale": "While these events produce rhetoric, the 'survival skill' refers to critical thinking about that rhetoric, not merely the existence of crises."}, {"text": "That the rhetorical techniques examined in the chapter are outdated and primarily relevant to historical contexts.", "isCorrect": false, "rationale": "The text states 'their techniques are very much alive,' indicating contemporary relevance."}, {"text": "That citizens must be able to critically evaluate the 'flood of rhetoric' they encounter daily to make informed decisions and maintain their autonomy.", "isCorrect": true, "rationale": "The 'note' section explicitly links these skills to 'every election cycle, every military intervention, every national crisis [producing] a flood of rhetoric designed to shape your opinions,' and states these skills are 'practice for reading the arguments that will be aimed at you for the rest of your life.'"}, {"text": "That all forms of persuasive communication should be viewed with inherent suspicion and rejected.", "isCorrect": false, "rationale": "The goal is to 'distinguish' legitimate persuasion from propaganda, not to reject all persuasion outright."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
