        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/War.html">&larr; Back to War: A Debate in Primary Sources</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 6, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the fundamental distinction between legitimate persuasion and propaganda?", "options": [{"text": "The distinction lies in the degree to which truth is subordinated to the desired effect.", "isCorrect": true, "rationale": "The text states that propaganda subordinates truth to effect, while legitimate persuasion subordinates effect to truth."}, {"text": "The distinction is defined by whether the information presented is factually true or false.", "isCorrect": false, "rationale": "The text explicitly notes that propaganda often uses true facts, making factual accuracy an unreliable sole metric for distinction."}, {"text": "Persuasion seeks to change minds, whereas propaganda only seeks to reinforce existing beliefs.", "isCorrect": false, "rationale": "The text argues that both seek to change minds, meaning they do not differ in kind but in degree and intent."}, {"text": "Propaganda is characterized by the use of emotional appeals, which are absent in legitimate persuasion.", "isCorrect": false, "rationale": "Emotional appeals are described as a legitimate part of reasoning and effective argument, used by both persuaders and propagandists."}], "id": "q01"}, {"question": "In the context of Oliver Wendell Holmes' Memorial Day address, why might his omissions not necessarily qualify as propaganda?", "options": [{"text": "His primary purpose was philosophical and ceremonial rather than manipulative or recruitment-oriented.", "isCorrect": true, "rationale": "The text suggests the question of propaganda turns on whether his omissions reflect the appropriate focus of a commemorative address versus a calculated distortion."}, {"text": "He provided a comprehensive account of the physical horrors of war to balance his martial imagery.", "isCorrect": false, "rationale": "The text notes that Holmes specifically left out 'the screaming and the gangrene' in favor of soaring language."}, {"text": "He explicitly acknowledged the counterarguments of those who found the war unjustifiable.", "isCorrect": false, "rationale": "The text states that Holmes presented no counterarguments in his address."}, {"text": "His use of religious devotion imagery served to inform the audience rather than influence their attitudes.", "isCorrect": false, "rationale": "The text describes his language as being used to elevate the soldier's experience, which is an attempt to influence attitude."}], "id": "q02"}, {"question": "Why does the text describe Woodrow Wilson's address as the 'hardest case' when evaluating propaganda?", "options": [{"text": "He interpreted a genuine crisis using moral framing that simplified complex geopolitical interests.", "isCorrect": true, "rationale": "Wilson dealt with real threats like the Zimmermann Telegram but framed the war as democracy versus autocracy, ignoring his allies' imperial nature."}, {"text": "He was the only writer who relied entirely on fabricated evidence to justify his position.", "isCorrect": false, "rationale": "The text confirms that the threats Wilson cited, such as German submarine warfare, were real and not fabricated."}, {"text": "His address was the only one that did not utilize any emotional manipulation or selective facts.", "isCorrect": false, "rationale": "The text points out that Wilson used moral necessity and a false dilemma to create pressure for agreement."}, {"text": "He successfully engaged with the strongest counterarguments regarding the imperial interests of Britain and France.", "isCorrect": false, "rationale": "Wilson's framing actually omitted the complicated imperial interests of the Allied powers."}], "id": "q03"}, {"question": "Which logical fallacy is committed when an arguer misrepresents an opponent's position to make it easier to attack?", "options": [{"text": "Straw Man", "isCorrect": true, "rationale": "A straw man argument involves attacking a weaker or distorted version of a claim rather than the opponent's actual position."}, {"text": "False Dilemma", "isCorrect": false, "rationale": "A false dilemma limits options to two choices when more exist, rather than misrepresenting a specific counter-position."}, {"text": "Ad Hominem", "isCorrect": false, "rationale": "While common in propaganda, the text specifically identifies the misrepresentation of a position as a 'straw man' argument."}, {"text": "Selective Presentation", "isCorrect": false, "rationale": "Selective presentation refers to picking specific facts to support a case, not necessarily distorting an opponent's specific claim."}], "id": "q04"}, {"question": "How does the Nazi regime's reaction to Remarque's 'All Quiet on the Western Front' challenge the standard definition of propaganda?", "options": [{"text": "It suggests that a truthful account can function as propaganda based on its political effect rather than the author's intent.", "isCorrect": true, "rationale": "The Nazis viewed the book's unflinching horror as a political tool that made war harder to glorify, regardless of Remarque's goals."}, {"text": "It proves that propaganda must contain lies to be effective enough to warrant a government ban.", "isCorrect": false, "rationale": "The text notes that Remarque simply described what happened, yet the work was still treated as propaganda."}, {"text": "It demonstrates that Remarque intentionally used demonization techniques against the German leadership.", "isCorrect": false, "rationale": "The text states that Remarque did not demonize any nation or leader and offered no explicit argument."}, {"text": "It shows that only fictional narratives can be classified as propaganda by opposing regimes.", "isCorrect": false, "rationale": "The classification depended on the work's effect on the population's willingness to glorify war, not its status as fiction."}], "id": "q05"}, {"question": "Which diagnostic question helps distinguish if an argument is crossing from legitimate persuasion into manipulation?", "options": [{"text": "Does the emotional intensity match the strength of the evidence?", "isCorrect": true, "rationale": "The text identifies 'generating more heat than evidence warrants' as a sign of a potential shift toward manipulation."}, {"text": "Does the writer use any emotional language at all?", "isCorrect": false, "rationale": "Emotional appeals are a legitimate part of reasoning, so their mere presence does not indicate manipulation."}, {"text": "Is the argument based on the writer's personal opinion?", "isCorrect": false, "rationale": "Propaganda is not defined by being an opinion, but by the techniques used to package that opinion."}, {"text": "Does the writer present every known fact about the subject?", "isCorrect": false, "rationale": "The text acknowledges that all effective arguments must select evidence; the issue is whether the selection becomes manipulation."}], "id": "q06"}, {"question": "According to the text, why is it a mistake to assume that propaganda must contain lies?", "options": [{"text": "The most effective propaganda uses true facts framed to prevent critical thinking.", "isCorrect": true, "rationale": "Propaganda relies on systematic selection and emotional packaging of facts to reach a predetermined conclusion."}, {"text": "Lies are too easily debunked by the public to be useful in modern communication.", "isCorrect": false, "rationale": "The text does not claim lies are ineffective; it emphasizes that truth can be used as a tool for propaganda through framing."}, {"text": "If a statement is factually true, it cannot by definition function as propaganda.", "isCorrect": false, "rationale": "The text explicitly rejects this idea, stating a true statement can still be propaganda if it suppresses alternative interpretations."}, {"text": "Propaganda is defined strictly by the speaker's status, not the truth of the content.", "isCorrect": false, "rationale": "The definition focuses on communication techniques and the subordination of truth to effect, not just the identity of the speaker."}], "id": "q07"}, {"question": "The claim 'Either we go to war or we surrender our freedoms' is used as an example of which technique?", "options": [{"text": "False Dilemma", "isCorrect": true, "rationale": "This statement presents only two extreme options when other diplomatic or economic responses may exist."}, {"text": "Straw Man", "isCorrect": false, "rationale": "A straw man would involve misrepresenting an opponent's specific argument, not reducing all choices to two options."}, {"text": "Demonization", "isCorrect": false, "rationale": "While it implies a threat, the structure specifically limits the range of possible actions to a binary choice."}, {"text": "Selective Fact Presentation", "isCorrect": false, "rationale": "This is a logical framing of choices (a dichotomy) rather than a list of selected data points."}], "id": "q08"}, {"question": "When evaluating Smedley Butler's 'War is a Racket,' what factor complicates its categorization as propaganda?", "options": [{"text": "His central factual claims about wartime profits were largely accurate.", "isCorrect": true, "rationale": "The text notes that although he was one-sided, his data was grounded in verifiable facts and real suffering."}, {"text": "He offered no concrete policy proposals, focusing only on emotional imagery.", "isCorrect": false, "rationale": "The text specifically mentions that Butler offered concrete policy proposals that can be evaluated on their merits."}, {"text": "He balanced his argument by discussing the necessity of just wars.", "isCorrect": false, "rationale": "The text states that Butler did not engage with the possibility that some wars might be justified."}, {"text": "He avoided using vivid emotional imagery to prevent manipulation of the audience.", "isCorrect": false, "rationale": "Butler used vivid emotional imagery of wounded veterans specifically to provoke outrage."}], "id": "q09"}, {"question": "What is identified as the primary goal of the diagnostic questions provided at the end of the text?", "options": [{"text": "To help readers locate a piece of writing on the spectrum between persuasion and propaganda.", "isCorrect": true, "rationale": "The questions are intended to be a test rather than a final verdict, acknowledging that the line is blurry."}, {"text": "To provide a definitive formula for identifying a 'propagandist.'", "isCorrect": false, "rationale": "The text warns that the label 'propagandist' tends to end conversation rather than start it, preferring diagnostic analysis."}, {"text": "To prove that any writing containing emotional appeals is propaganda.", "isCorrect": false, "rationale": "The text maintains that emotion is a legitimate part of argument and suggests testing its intensity against evidence instead."}, {"text": "To teach students how to write more effective propaganda for modern audiences.", "isCorrect": false, "rationale": "The skills are described as 'survival skills for citizens' to protect against manipulation, not to practice it."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
