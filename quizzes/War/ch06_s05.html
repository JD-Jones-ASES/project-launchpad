<div class="quiz-container">

        <div class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 6, Section 5</div>

    <div id="score-box" class="score-box">

        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "According to the text, what is the fundamental difference in *intent* between propaganda and legitimate persuasion?", "options": [{"text": "Propaganda always contains outright lies, while persuasion uses only verifiable facts.", "isCorrect": false, "rationale": "The text explicitly states that 'Mistake 2' is believing 'Propaganda must contain lies,' clarifying that effective propaganda often uses true facts, but selects and frames them to prevent critical thinking."}, {"text": "Propaganda primarily aims to influence attitudes and behavior, while persuasion primarily aims to inform or reason.", "isCorrect": true, "rationale": "The text's definition of propaganda states it is 'communication designed primarily to influence attitudes and behavior rather than to inform or reason,' which directly contrasts with the informing or reasoning goal of legitimate persuasion."}, {"text": "Propaganda relies on emotional appeals, whereas legitimate persuasion relies solely on logic.", "isCorrect": false, "rationale": "The text clarifies that 'Every effective argument uses emotion' and that 'emotional appeals are a legitimate part of reasoning' in persuasion, so this is not a fundamental difference."}, {"text": "Propaganda demonizes opponents, while legitimate persuasion acknowledges their strongest counterarguments.", "isCorrect": false, "rationale": "While propaganda often demonizes and legitimate persuasion should acknowledge counterarguments, the fundamental difference in *intent* as defined is about influencing behavior vs. informing/reasoning, not just these specific techniques."}], "id": "q01"}, {"question": "The text describes the 'blurry line' between persuasion and propaganda, especially concerning the selection of evidence. Which of the following examples from the text *best* illustrates this difficulty?", "options": [{"text": "Wilson explicitly described war as a 'fearful thing' but still argued for it as a last resort.", "isCorrect": false, "rationale": "This example is used to clarify that characterizing Wilson as wanting war for enjoyment would be a straw man, not to illustrate the blurry line of evidence selection in general."}, {"text": "Butler presenting corporate profit figures without mentioning those companies also supplied life-saving goods.", "isCorrect": true, "rationale": "The text directly uses this example to ask, 'Is that propaganda, or is it legitimate emphasis?' highlighting the difficulty in distinguishing between selective presentation and manipulative omission."}, {"text": "The Nazi regime banning Remarque's novel because it made war harder to glorify.", "isCorrect": false, "rationale": "This example primarily highlights the idea of propaganda defined by its *effect* rather than the author's intent, not specifically the blurry line of selecting evidence."}, {"text": "Presenting 'Either we go to war or we surrender our freedoms' as the only options.", "isCorrect": false, "rationale": "This is an example of a 'false dilemma,' a specific propaganda technique, rather than a general illustration of the blurry line involved in selecting evidence."}], "id": "q02"}, {"question": "Which of the following statements best exemplifies a 'straw man' argument as described in the text?", "options": [{"text": "Arguing that Wilson wanted war because he enjoyed it, despite his stated view of war as a 'fearful thing.'", "isCorrect": true, "rationale": "This is the exact example provided in the text to illustrate a straw man: misrepresenting an opponent's position (Wilson's view on war) to make it easier to attack."}, {"text": "Claiming that a policy will either lead to prosperity or utter ruin, with no middle ground.", "isCorrect": false, "rationale": "This scenario describes a 'false dilemma,' presenting only two extreme options when more may exist."}, {"text": "Presenting statistics about economic growth while omitting data on rising income inequality.", "isCorrect": false, "rationale": "This is an example of 'selective presentation of facts,' a technique often used in propaganda but not specifically a straw man."}, {"text": "Using vivid language to describe the suffering of soldiers to evoke sympathy for a cause.", "isCorrect": false, "rationale": "This describes an 'emotional appeal,' which can be legitimate persuasion or part of propaganda, but is not a straw man."}], "id": "q03"}, {"question": "A local politician declares, 'We must either invest heavily in our city's public transportation system, or our economy will stagnate and our citizens will suffer.' Based on the text, what rhetorical technique is the politician most likely employing?", "options": [{"text": "A straw man argument, by misrepresenting the economic situation.", "isCorrect": false, "rationale": "There is no misrepresentation of an opponent's specific argument in this statement, which is central to a straw man."}, {"text": "A false dilemma, by presenting only two extreme options when more may exist.", "isCorrect": true, "rationale": "The statement presents only two options ('invest heavily' OR 'economy will stagnate') as if they are the only possibilities, fitting the definition of a false dilemma, which 'presents only two options when more actually exist'."}, {"text": "Legitimate persuasion, by appealing to the public's concern for their economy.", "isCorrect": false, "rationale": "While it does appeal to concern, the framing of choices as only two, if other viable options exist, moves it into the realm of a false dilemma rather than purely legitimate persuasion."}, {"text": "Selective presentation of facts, by highlighting positive outcomes of investment while ignoring costs.", "isCorrect": false, "rationale": "The statement's primary characteristic is the binary choice it presents, not necessarily the highlighting of specific facts or omission of others, though those might be related."}], "id": "q04"}, {"question": "The text discusses whether Holmes's address, which selectively presents war as a crucible of virtue and uses powerful emotional language, is propaganda. What is the *primary* reason the text hesitates to give a definitive 'yes' or 'no' verdict for Holmes?", "options": [{"text": "Holmes's central factual claims about wartime virtue were independently verifiable.", "isCorrect": false, "rationale": "The text does not focus on the verifiability of Holmes's claims; rather, it questions whether his omissions distorted truth or reflected appropriate focus."}, {"text": "His purpose was philosophical and ceremonial, not to start a war or manipulate an unwilling populace.", "isCorrect": true, "rationale": "The text explicitly states, 'His purpose is philosophical and ceremonial: he wants to honor the dead and argue that their sacrifice had meaning,' and that he was 'not trying to manipulate an unwilling populace.' This contextualizes his rhetoric, making a propaganda label less straightforward."}, {"text": "He acknowledged and fairly represented the strongest counterarguments to his view of war.", "isCorrect": false, "rationale": "The text notes that Holmes 'presents no counterarguments,' which would suggest a leaning towards propaganda, not away from it."}, {"text": "The emotional intensity of his language matched the undeniable horrors of war.", "isCorrect": false, "rationale": "The text points out that 'Holmes' soaring language about martial virtue leaves out the screaming and the gangrene,' suggesting his language did *not* fully match the complete reality of war's horrors."}], "id": "q05"}, {"question": "The text labels Wilson's address as the 'hardest case' when considering whether it is propaganda. Which of the following best explains why it is considered so difficult to categorize?", "options": [{"text": "Wilson used complex philosophical arguments that are difficult for a lay audience to deconstruct.", "isCorrect": false, "rationale": "The text describes his framing as 'simplification' (democracy vs. autocracy) and a 'false dilemma,' not overly complex philosophical arguments."}, {"text": "While he employed propaganda-like techniques, his claims were grounded in genuine and severe threats.", "isCorrect": true, "rationale": "The text notes he 'frames the conflict as democracy versus autocracy, a simplification' and 'presents a false dilemma,' but also acknowledges that 'Germany's submarine warfare was real... and the threat to American lives and neutral rights was genuine.' This combination of manipulative framing with real threats makes it difficult to judge."}, {"text": "His address primarily aimed to inform Congress rather than to influence public behavior.", "isCorrect": false, "rationale": "The text states his explicit purpose was 'persuading Congress to declare war,' which is a clear attempt to influence a specific and significant behavior."}, {"text": "He explicitly acknowledged counterarguments, which is uncharacteristic of propaganda.", "isCorrect": false, "rationale": "The text implies he *didn't* acknowledge counterarguments by presenting a 'simplification' and a 'false dilemma' of sorts, which would exclude other possibilities."}], "id": "q06"}, {"question": "Remarque's novel, *All Quiet on the Western Front*, described war's horrors without explicit argument or demonization, yet the Nazi regime banned and burned it as propaganda. What crucial insight about propaganda does this example highlight?", "options": [{"text": "Propaganda is only effective if it contains deliberate falsehoods.", "isCorrect": false, "rationale": "The text explicitly states this is 'Mistake 2' and that 'The most effective propaganda often uses true facts.'"}, {"text": "An author's personal intent is irrelevant; communication can function as propaganda based solely on its effect.", "isCorrect": true, "rationale": "The text explains, 'If propaganda is defined by its effect rather than its intent, then even a truthful witness account can function as propaganda,' directly aligning with Remarque's case where his depiction (effect) made war harder to glorify, regardless of his direct intent."}, {"text": "Propaganda is primarily determined by the political affiliations of the audience.", "isCorrect": false, "rationale": "While audience reaction is part of the effect, the core insight here is about the power of effect over intent in defining propaganda, not solely the audience's affiliations."}, {"text": "Only governments can produce effective propaganda.", "isCorrect": false, "rationale": "The text does not suggest this limitation. Remarque was an individual author, and his work was deemed propaganda by a government due to its effect."}], "id": "q07"}, {"question": "According to the 'Two Common Mistakes' section, which statement about propaganda is *false*?", "options": [{"text": "Propaganda can effectively use true facts.", "isCorrect": false, "rationale": "The text states, 'The most effective propaganda often uses true facts,' making this statement true."}, {"text": "Calling an argument propaganda without identifying specific techniques is not analysis.", "isCorrect": false, "rationale": "This is described as 'Mistake 1' ('not analysis — it is name-calling'), making this statement true."}, {"text": "Propaganda always contains lies or fabricated information.", "isCorrect": true, "rationale": "The text identifies this as 'Mistake 2' and clarifies that propaganda is about 'systematic selection, framing, and emotional packaging of those facts' rather than necessarily falsehoods, making this statement false."}, {"text": "Propaganda aims to prevent critical thinking in its audience.", "isCorrect": false, "rationale": "The text implies this through techniques like suppressing alternative interpretations and creating predetermined conclusions, making this statement true regarding propaganda's function."}], "id": "q08"}, {"question": "A writer advocating for a new foreign policy presents a vivid, emotional description of a potential enemy, but offers very little verifiable data to support the threat. They also dismiss any opposing viewpoints as 'naïve' or 'unpatriotic.' Which diagnostic question from the text would *most directly* raise a red flag about this writer's persuasive approach?", "options": [{"text": "Does the writer leave the audience free to disagree?", "isCorrect": false, "rationale": "While dismissing opposing views discourages disagreement, the more direct connection for 'dismisses any opposing viewpoints' is the failure to acknowledge them."}, {"text": "Does the writer acknowledge the strongest counterarguments?", "isCorrect": true, "rationale": "The scenario's description of the writer dismissing 'any opposing viewpoints as 'naïve' or 'unpatriotic'' directly indicates a failure to acknowledge or engage with counterarguments, a key diagnostic for identifying potential propaganda."}, {"text": "Does the writer simplify a complex situation into a binary choice?", "isCorrect": false, "rationale": "The scenario does not explicitly describe a simplification into only two options, though it might be implied by the overall approach."}, {"text": "Does the emotional intensity match the strength of the evidence?", "isCorrect": false, "rationale": "While the scenario describes 'vivid, emotional description' with 'very little verifiable data,' indicating a mismatch, the explicit action of 'dismissing any opposing viewpoints' more directly aligns with the diagnostic question about acknowledging counterarguments."}], "id": "q09"}, {"question": "The text concludes by stating that the line between persuasion and propaganda is 'not a wall but a spectrum.' What is the most significant implication of this perspective for readers?", "options": [{"text": "It implies that all forms of rhetoric are inherently manipulative to some degree.", "isCorrect": false, "rationale": "The text offers tools to distinguish legitimate persuasion from manipulation, indicating that not all rhetoric is inherently manipulative, but rather exists on a spectrum."}, {"text": "It emphasizes the need for critical evaluation of all persuasive communication, rather than quick categorization.", "isCorrect": true, "rationale": "The text introduces diagnostic questions to 'locate writers along that spectrum rather than simply sorting them into heroes and villains,' directly advocating for thoughtful analysis over simplistic labeling."}, {"text": "It suggests that the author's intent is the only reliable factor in determining propaganda.", "isCorrect": false, "rationale": "The case of Remarque explicitly challenges this, demonstrating that a text can function as propaganda by its effect regardless of intent."}, {"text": "It means that discerning propaganda is impossible, so readers should be skeptical of all arguments.", "isCorrect": false, "rationale": "The text provides 'tools to think about it clearly' and diagnostic questions, implying that discernment is possible and necessary, not that all arguments should be met with blanket skepticism."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
