<script>
var QUESTIONS = [{"question": "What is the central characteristic of a 'racket' according to Smedley Butler's definition?", "options": [{"text": "It is always illegal and prosecuted by law enforcement.", "isCorrect": false, "rationale": "Butler defines a racket as something that is not what it seems, conducted for private profit under the guise of public service, implying deception and exploitation rather than strictly illegal activity that is always prosecuted."}, {"text": "It appears to benefit the public but secretly serves a small, self-interested group.", "isCorrect": true, "rationale": "Butler explicitly states a racket 'is not what it seems to the majority of the people. Only a small 'inside' group knows what it is about. It is conducted for the benefit of the very few, at the expense of the very many.'"}, {"text": "It provides a valuable public service under transparent leadership.", "isCorrect": false, "rationale": "This is the opposite of Butler's definition, which describes rackets as deceptive schemes for private profit, not transparent public service."}, {"text": "It is primarily driven by national security concerns and government policy.", "isCorrect": false, "rationale": "Butler argues that while national security might be the *guise*, the true driver of war, which he calls a racket, is private profit for a few."}], "id": "q01"}, {"question": "Which of the following best describes Smedley Butler's approach to supporting his thesis that 'War Is A Racket'?", "options": [{"text": "He relies solely on emotional appeals and abstract philosophical arguments to sway readers.", "isCorrect": false, "rationale": "While Butler uses emotional appeals, the introductory text and Chapter 2 highlight his use of 'concrete numbers,' 'company names,' and 'profit margins' to support his abstract claims, not solely relying on emotion."}, {"text": "He presents abstract claims and then substantiates them with specific financial data and corporate examples.", "isCorrect": true, "rationale": "The introductory text notes how Butler 'moves between abstract claims and concrete numbers. He does not merely assert... he names the companies, cites the profit margins, and compares peacetime earnings to wartime earnings,' which is further detailed in Chapter 2 with examples like du Ponts and Bethlehem Steel."}, {"text": "He uses only anecdotal evidence from soldiers' experiences to illustrate the human cost of war.", "isCorrect": false, "rationale": "Butler asks rhetorical questions about soldiers' experiences to highlight disparity, but his primary evidence for the 'racket' claim comes from financial data and corporate profits, not solely anecdotes."}, {"text": "He primarily uses historical accounts of battles and military strategies to prove his point.", "isCorrect": false, "rationale": "Butler explicitly avoids military strategy, focusing instead on the economic and social costs and the private profits generated by war."}], "id": "q02"}, {"question": "Beyond financial debt, what significant long-term costs of war does Butler emphasize for the general public and future generations?", "options": [{"text": "Advances in medical technology and industrial innovation.", "isCorrect": false, "rationale": "Butler does not focus on potential benefits like technological advancements; his emphasis is on the immense human and societal costs."}, {"text": "Increased national unity and global prestige.", "isCorrect": false, "rationale": "These are often cited as potential benefits of war, but Butler's narrative focuses on the negative consequences for the majority, such as suffering and economic instability."}, {"text": "Mangled bodies, shattered minds, broken homes, and back-breaking taxation.", "isCorrect": true, "rationale": "Butler explicitly lists these as the 'horrible accounting' of war, alongside 'Newly placed gravestones,' 'Economic instability,' and 'Depression and all its attendant miseries,' impacting generations."}, {"text": "Expansion of democratic ideals and international cooperation.", "isCorrect": false, "rationale": "Butler portrays war as driven by private profit, not by the altruistic expansion of ideals or genuine cooperation, noting nations are 'choosing sides' for conflict."}], "id": "q03"}, {"question": "According to Butler's framework, if a nation goes to war to protect a private investment of less than $200,000,000 in a foreign territory, potentially costing tens of billions and hundreds of thousands of lives, who would be considered the primary beneficiaries of this 'racket'?", "options": [{"text": "The average American taxpayer and consumer.", "isCorrect": false, "rationale": "Butler argues that the average American 'pays the bills' and bears the cost, rather than profiting from war."}, {"text": "The soldiers who fight and potentially gain new territory for the nation.", "isCorrect": false, "rationale": "Butler highlights that soldiers are the ones who 'fight and pay and die,' suffering the losses, rather than being the primary beneficiaries."}, {"text": "The munitions makers, bankers, and speculators who profit from wartime expenditures.", "isCorrect": true, "rationale": "Butler explicitly names these groups ('Munitions makers. Bankers. Ship builders. Manufacturers. Meat packers. Speculators.') as the 'few' who make 'huge profits' from war, contrasting them with the public who bears the costs, as exemplified by his discussion of China trade and Philippine investments."}, {"text": "The government officials and diplomats who negotiate peace treaties.", "isCorrect": false, "rationale": "While government officials play a role, Butler's focus for 'racket' beneficiaries is on the private economic actors who directly profit from war financing and production."}], "id": "q04"}, {"question": "What specific evidence does Butler provide to illustrate the extraordinary profits made in the United States during World War I?", "options": [{"text": "The number of new government contracts awarded to small businesses.", "isCorrect": false, "rationale": "While government contracts increased, Butler's specific evidence focuses on the personal wealth accumulated by a few, not the general distribution of contracts."}, {"text": "The increase in the national debt by over $24 billion.", "isCorrect": false, "rationale": "The national debt increase is presented as a *cost* to the nation, not as evidence of *private profits* for individuals or corporations."}, {"text": "The creation of at least 21,000 new millionaires and billionaires, who admitted their gains on tax returns.", "isCorrect": true, "rationale": "Butler directly states, 'At least 21,000 new millionaires and billionaires were made in the United States during the World War. That many admitted their huge blood gains in their income tax returns,' making this a key piece of evidence for extraordinary profits."}, {"text": "The post-war economic boom and low unemployment rates.", "isCorrect": false, "rationale": "Butler describes 'Economic instability' and 'Depression' as consequences of war, not a boom, and focuses on the concentration of wealth rather than broad economic prosperity."}], "id": "q05"}, {"question": "Butler quotes Mussolini saying, 'War alone brings up to its highest tension all human energy and puts the stamp of nobility upon the people who have the courage to meet it.' How does Butler implicitly counter this view throughout the chapter?", "options": [{"text": "By arguing that war is necessary for national defense and territorial expansion.", "isCorrect": false, "rationale": "Butler explicitly critiques territorial acquisition as serving 'the selfsame few who wrung dollars out of blood,' and views national defense claims as a pretext for private gain."}, {"text": "By presenting war as a scheme for private enrichment, leading to immense suffering for the masses.", "isCorrect": true, "rationale": "Butler's entire argument positions war as a 'racket' where a 'few people make huge fortunes' while the public shoulders 'horrible accounting' in lives, injuries, and financial burdens, directly contradicting any notion of war as noble or collectively uplifting."}, {"text": "By suggesting that peace treaties after war always lead to long-term stability.", "isCorrect": false, "rationale": "Butler highlights ongoing economic instability and the continued payment of war debts for 'generations and generations,' implying a lack of true long-term stability."}, {"text": "By emphasizing the technological advancements spurred by wartime innovation.", "isCorrect": false, "rationale": "Butler focuses on the human and financial costs and the illicit profits, not on technological benefits."}], "id": "q06"}, {"question": "Butler cites the U.S. national debt jumping from $1,000,000,000 to over $25,000,000,000 after becoming 'internationally minded' and going to war. What conclusion does he draw about the national economic benefit of this foreign engagement?", "options": [{"text": "The foreign trade gained offset the increased national debt, proving the wars were profitable.", "isCorrect": false, "rationale": "Butler refutes this, stating, 'on a purely bookkeeping basis, we ran a little behind year for year, and that foreign trade might well have been ours without the wars,' indicating it did not offset the debt."}, {"text": "The average American would have been far better off economically by avoiding foreign entanglements.", "isCorrect": true, "rationale": "He explicitly concludes, 'It would have been far cheaper (not to say safer) for the average American who pays the bills to stay out of foreign entanglements,' reinforcing that the nation as a whole, particularly its citizens, does not benefit financially."}, {"text": "The acquisition of new territory directly led to a significant increase in national wealth for all citizens.", "isCorrect": false, "rationale": "Butler argues that newly acquired territory is 'exploited by the few,' and the general public 'shoulders the bill' of war, not benefiting directly from the territory."}, {"text": "The economic benefits were evenly distributed across all sectors of the American economy.", "isCorrect": false, "rationale": "Butler's core argument is that only 'a few' (munitions makers, bankers, etc.) profit hugely, not that benefits are evenly distributed."}], "id": "q07"}, {"question": "When Butler asks, 'How many of these war millionaires shouldered a rifle? How many of them dug a trench?', what is the primary purpose of these rhetorical questions?", "options": [{"text": "To solicit actual statistics on the military service of wealthy individuals during the war.", "isCorrect": false, "rationale": "The introductory text explains rhetorical questions are asked 'not because Butler wants an answer, but because the answer is already obvious,' implying he isn't seeking data but making a point."}, {"text": "To highlight the stark contrast between those who profit from war and those who bear its physical burdens.", "isCorrect": true, "rationale": "The obvious answer to these questions is 'very few, if any,' which serves to emphasize the dramatic imbalance between the immense profits garnered by a few and the profound sacrifices made by the soldiers."}, {"text": "To suggest that all wealthy individuals are inherently unpatriotic and unwilling to serve.", "isCorrect": false, "rationale": "While implying a lack of shared sacrifice, the questions' primary aim is to draw attention to the *disparity* between profit and suffering, rather than making a blanket judgment on all wealthy individuals' patriotism."}, {"text": "To encourage readers to research the personal histories of wartime millionaires.", "isCorrect": false, "rationale": "Butler's intent is persuasive and illustrative, using the questions to make an immediate, impactful point, not to initiate individual reader research into specific personal histories."}], "id": "q08"}, {"question": "In describing the international situation in 1935, Butler paints a picture of:", "options": [{"text": "Widespread global disarmament and an earnest pursuit of perpetual peace.", "isCorrect": false, "rationale": "Butler explicitly states 'Again they are choosing sides,' '40,000,000 men under arms,' and quotes Mussolini rejecting 'perpetual peace,' indicating the opposite of disarmament."}, {"text": "Nations forming defensive alliances and rearming, with leaders like Mussolini and Hitler openly preparing for war.", "isCorrect": true, "rationale": "Butler details countries like France, Russia, Italy, Austria, Poland, Germany 'choosing sides,' mentions '40,000,000 men under arms,' Mussolini's war-ready pronouncements, and Hitler's 'rearming Germany,' all pointing to active preparations for conflict."}, {"text": "A focus on international trade agreements and economic cooperation to prevent conflict.", "isCorrect": false, "rationale": "While trade is mentioned, Butler frames it as a *pretext* for war (e.g., China trade, Philippine investments) rather than a means of cooperation to prevent it."}, {"text": "Colonial powers peacefully relinquishing control over their acquired territories.", "isCorrect": false, "rationale": "Butler discusses nations acquiring and exploiting new territory, and the US maintaining investments in the Philippines, not relinquishing control."}], "id": "q09"}, {"question": "Based on Butler's entire argument in these chapters, which statement would he most likely endorse regarding the relationship between war and national prosperity?", "options": [{"text": "Wars are generally beneficial for national economies, stimulating growth and reducing unemployment.", "isCorrect": false, "rationale": "Butler argues that war leads to 'Economic instability,' 'Depression,' and 'Back-breaking taxation' for the nation, contradicting the idea of general national economic benefit."}, {"text": "While wars are costly, they are often necessary for protecting national honor and expanding cultural influence.", "isCorrect": false, "rationale": "Butler dismisses such justifications by focusing on the hidden motive of private profit and the disproportionate costs borne by the public, undermining claims of national honor or cultural expansion as true drivers or benefits."}, {"text": "The financial and human costs of war far outweigh any national benefits, with prosperity concentrated among a select few.", "isCorrect": true, "rationale": "This statement encapsulates Butler's central thesis: war is a 'racket' where 'a few people make huge fortunes' (munitions makers, bankers, etc.) while the nation accrues massive debt, 'mangled bodies,' 'shattered minds,' and long-term economic misery, making any 'national' benefit negligible compared to the costs and concentrated private profits."}, {"text": "International trade disputes are the sole cause of wars, and resolving them peacefully would eliminate conflict.", "isCorrect": false, "rationale": "While Butler mentions trade as a pretext for conflict, his analysis is broader, encompassing political maneuvering, rearmament, and the overarching motivation of private profit for an 'inside group,' not solely trade disputes or their peaceful resolution as the panacea."}], "id": "q10"}, {"question": "Butler presents specific profit figures for Du Pont, steel companies, and copper companies during World War I. Why does naming specific companies and providing exact dollar figures strengthen his argument more than general claims about 'war profiteering' would?", "options": [{"text": "Specific names and numbers are more emotionally shocking to the audience, generating outrage through visceral detail.", "isCorrect": false, "rationale": "While named examples are more vivid, Butler's use of specific figures serves a logical rather than purely emotional purpose: verifiability. Vague claims about 'huge profits' can be dismissed; specific figures can be checked."}, {"text": "Specific names and verifiable figures transform a general accusation into checkable claims, shifting the burden of proof onto those who would defend the corporations.", "isCorrect": true, "rationale": "By naming Du Pont and citing specific profit percentages, Butler creates an evidentiary record. Critics who disagree must either show his numbers are wrong or explain why such profits are legitimate — they cannot simply dismiss an unspecified allegation."}, {"text": "Naming specific companies proves that Butler had insider access to corporate financial records, establishing his authority on economic matters.", "isCorrect": false, "rationale": "His figures were drawn from public records and congressional testimony, not insider access. The value is their verifiability, not proof of special access."}, {"text": "Specific examples from one war prove that the same corporations will profit from all future wars, making his predictions reliable.", "isCorrect": false, "rationale": "Documented profit from one war does not logically prove a universal pattern across all future wars; that requires additional argumentation. The section notes Butler's evidence supports the existence of profiteering but not necessarily his broadest causal claims."}], "id": "q11"}, {"question": "Butler opens Chapter 1 with 'War is a racket. It is the only one international in scope. It is the only one in which the profits are reckoned in dollars and the losses in lives.' What rhetorical effect does this opening achieve, and what logical vulnerability does it create?", "options": [{"text": "It establishes a clear, memorable thesis and demonstrates Butler's literary skill, but it overstates the case by ruling out any exceptions before presenting any evidence.", "isCorrect": true, "rationale": "The blunt, declarative opening immediately positions war as categorically and universally a racket. This is rhetorically powerful — it commands attention and frames everything that follows. But logically, asserting a universal claim ('war is always X') before providing any evidence is vulnerable to even a single counterexample, such as a war that does not fit the racket pattern."}, {"text": "It uses a legal metaphor ('racket') to signal Butler's intention to prosecute a formal case, establishing a quasi-judicial tone throughout the pamphlet.", "isCorrect": false, "rationale": "'Racket' is a criminal, not legal, term — it implies organized crime rather than a formal legal proceeding. Butler's tone is accusatory, not lawyerly."}, {"text": "It introduces a false dilemma by implying that only two options exist: accepting Butler's view or supporting war profiteers.", "isCorrect": false, "rationale": "The opening does not present two options; it asserts one claim. The logical vulnerability is the universality of the claim, not a false dilemma structure."}, {"text": "It builds toward an emotional climax through subordinate clauses, mirroring Holmes's periodic sentence technique.", "isCorrect": false, "rationale": "Butler's opening is the opposite of a periodic sentence — it leads with the main clause immediately, employing the 'plain style' of short, direct declarative statements."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
