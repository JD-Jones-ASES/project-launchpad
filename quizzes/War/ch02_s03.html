    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/War.html">&larr; Back to War: A Debate in Primary Sources</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 2, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How does the text contrast the sentence structures used by Oliver Wendell Holmes and Smedley Butler?", "options": [{"text": "Holmes uses long, periodic sentences that build toward meaning, while Butler uses short, blunt sentences.", "isCorrect": true, "rationale": "The source material contrasts Holmes' ornate, winding clauses with Butler's direct, stripped-to-the-bone prose."}, {"text": "Holmes utilizes short, punchy sentences for clarity, while Butler relies on academic, winding prose.", "isCorrect": false, "rationale": "This reverses the styles described; Butler is the one noted for short sentences like 'WAR is a racket.'"}, {"text": "Both men use short, declarative sentences to emphasize their shared military background.", "isCorrect": false, "rationale": "The text explicitly states that their rhetorical choices are 'as stark' as the difference between a Harvard professor and a Marine sergeant."}, {"text": "Holmes focuses on vernacular speech patterns, whereas Butler employs elevated, classical diction.", "isCorrect": false, "rationale": "The text identifies Butler as the user of the vernacular and Holmes as the user of elevated diction and classical allusions."}]}, {"question": "What is the primary rhetorical purpose of Butler adopting a 'vernacular' voice in his writing?", "options": [{"text": "To establish himself as a relatable citizen-soldier rather than an intellectual elite.", "isCorrect": true, "rationale": "The text states the vernacular signals he is speaking as a soldier and citizen, not as an intellectual or statesman."}, {"text": "To hide his lack of formal education from a scholarly audience.", "isCorrect": false, "rationale": "The text notes that his rhetorical choices are 'deliberate,' suggesting it is a strategic tool rather than a deficiency."}, {"text": "To mirror the complex legal arguments found in the Federalist Papers.", "isCorrect": false, "rationale": "While the pamphlet genre is linked to the Federalist Papers, the vernacular style is specifically chosen to reach 'everyone' rather than specialists."}, {"text": "To appeal specifically to Harvard gentlemen who were used to plain speech.", "isCorrect": false, "rationale": "The text argues that it is Holmes who spoke to Harvard gentlemen, while Butler's style is meant for the common man."}]}, {"question": "Butler opens his pamphlet with: 'WAR is a racket. It always has been.' What rhetorical effect does the text attribute to this specific phrasing?", "options": [{"text": "It functions like a 'fist on a table' by stating a conclusion first and daring the reader to argue.", "isCorrect": true, "rationale": "The text explains that Butler hits the reader with the conclusion immediately and hammers it with superlatives to overwhelm disagreement."}, {"text": "It builds a sense of mystery that is only resolved through long, subordinate clauses.", "isCorrect": false, "rationale": "Butler's style is described as having 'no qualifications' and 'no subordinate clauses,' avoiding ambiguity or suspense."}, {"text": "It uses classical allusions to place the concept of 'rackets' within a historical context.", "isCorrect": false, "rationale": "The text specifically mentions that Butler avoids literary or classical allusions in favor of plain words."}, {"text": "It attempts to soften the impact of his claim by using qualifying language.", "isCorrect": false, "rationale": "The text emphasizes that there are 'no qualifications,' making the statement more extreme and direct."}]}, {"question": "According to the analysis of Butler's 'ethos,' why is his admission of being part of the 'machine' significant?", "options": [{"text": "Confessing his own complicity makes his criticism harder to dismiss than that of an outsider.", "isCorrect": true, "rationale": "The text argues that a critic who was part of the system has more credibility than one who never participated in it."}, {"text": "It shows that he lacks the moral standing to criticize the military accurately.", "isCorrect": false, "rationale": "The text asserts the opposite: his background as a highly decorated soldier actually provides the authority for his claims."}, {"text": "It proves that he was forced to write the pamphlet as a form of penance.", "isCorrect": false, "rationale": "The text characterizes the admission as a rhetorical tool to strengthen ethos, not as a court-ordered or forced confession."}, {"text": "It demonstrates that he only became critical of the war once he was denied further medals.", "isCorrect": false, "rationale": "The text focuses on his 33 years of service and two Medals of Honor as the source of his authority, not a source of bitterness over lack of recognition."}]}, {"question": "What does the text identify as a 'Common Misreading' of Butler's rhetorical style?", "options": [{"text": "Mistaking his strategically simple language for a lack of intellectual sophistication.", "isCorrect": true, "rationale": "The text warns that the simplicity is a 'weapon' used to make the argument harder to evade, not a sign of limited ability."}, {"text": "Assuming that Butler's use of numbers is meant to confuse the reader.", "isCorrect": false, "rationale": "The text states that the numbers make the argument 'unusually concrete' and easier for the reader to draw conclusions from."}, {"text": "Believing that Butler's tone is too aggressive to be effective.", "isCorrect": false, "rationale": "The text suggests the aggressive, blunt tone is actually highly effective for his specific purpose and audience."}, {"text": "Viewing his use of anaphora as an accidental repetition of phrases.", "isCorrect": false, "rationale": "The text describes anaphora as an ancient and deliberate technique used to create a drumbeat of accusation."}]}, {"question": "In terms of logos, what is the primary rhetorical effect of Butler citing specific profit figures like those of Du Pont?", "options": [{"text": "It shifts the burden of proof to the reader to explain away the financial data.", "isCorrect": true, "rationale": "By presenting concrete numbers, Butler creates a presumption of truth that others must attempt to disprove."}, {"text": "It provides a theoretical framework for understanding global macroeconomics.", "isCorrect": false, "rationale": "Butler's use of data is described as 'empirical' and concrete, rather than theoretical or purely logical."}, {"text": "It appeals to the reader's sense of patriotism and national sacrifice.", "isCorrect": false, "rationale": "The text contrasts financial data (logos) with abstract ideals like sacrifice, which it associates more with Holmes."}, {"text": "It encourages the reader to invest in war industries to secure their financial future.", "isCorrect": false, "rationale": "The context of the pamphlet is an indictment of war profiteering, not an investment guide."}]}, {"question": "The text defines 'anaphora' using Butler's series of 'How many' questions. What is the intended emotional impact of this technique?", "options": [{"text": "To create a rhythmic drumbeat of accusation that builds in intensity.", "isCorrect": true, "rationale": "The repetition of the starting phrase is described as a 'hammering effect' that drives the point deeper with each line."}, {"text": "To allow the reader to pause and reflect on their own military service.", "isCorrect": false, "rationale": "The questions are directed at 'war millionaires,' intended to highlight their lack of service, not the reader's service."}, {"text": "To provide a balanced view of both the profiteers and the soldiers.", "isCorrect": false, "rationale": "The technique is described as a 'drumbeat of accusation' against the profiteers, making it a one-sided rhetorical attack."}, {"text": "To simplify the complex financial data presented in the previous sections.", "isCorrect": false, "rationale": "Anaphora is categorized under 'Pathos' (emotion/outrage) rather than 'Logos' (logic/data)."}]}, {"question": "How does Butler’s use of pathos differ from typical 'sentimental' appeals?", "options": [{"text": "It is rooted in concrete, physical suffering like 'rat-infested dug-outs' rather than abstract emotion.", "isCorrect": true, "rationale": "The text notes that Butler's language involves 'bodily experience' and 'steel,' making it physical rather than sentimental."}, {"text": "It relies on the reader's pre-existing religious faith to find meaning in loss.", "isCorrect": false, "rationale": "The text contrasts Butler's focus on 'mud, hunger, fear' with abstract ideals or faith."}, {"text": "It uses flowery metaphors to describe the beauty of the battlefield.", "isCorrect": false, "rationale": "Butler is described as using 'plain words' and language that is 'stripped to the bone,' avoiding ornamentation."}, {"text": "It focuses on the emotional internal monologues of the war millionaires.", "isCorrect": false, "rationale": "His pathos is focused on the physical reality of the soldiers' experiences to shame the profiteers."}]}, {"question": "What does the text suggest is the significance of Butler choosing the 'pamphlet' as his rhetorical genre?", "options": [{"text": "It implies that the truth about war is simple enough to be stated plainly and briefly for ordinary people.", "isCorrect": true, "rationale": "The text argues that the pamphlet's brevity is itself an argument that the truth doesn't require hundreds of pages of analysis."}, {"text": "It indicates that he intended for his work to be preserved in academic libraries.", "isCorrect": false, "rationale": "The pamphlet is described as a 'polemical work aimed at a mass audience,' not a scholarly or archival document."}, {"text": "It demonstrates his desire to create a long-form, comprehensive history of American warfare.", "isCorrect": false, "rationale": "The text highlights the 'brevity' of the pamphlet as a key feature, contrasting it with long-form analysis."}, {"text": "It shows that he wanted to mimic the elevated style of Thomas Paine’s 'Common Sense.'", "isCorrect": false, "rationale": "While it mentions Paine, the text focuses on the functional constraints of the genre (brevity, readability) rather than stylistic mimicry."}]}, {"question": "What central tension is identified in the comparison between Oliver Wendell Holmes and Smedley Butler?", "options": [{"text": "The view of war as the highest human virtue versus the view of war as the lowest human greed.", "isCorrect": true, "rationale": "The conclusion of the text highlights this diametric opposition as the central tension of the debate."}, {"text": "The dispute over whether the Navy or the Marine Corps is more effective in combat.", "isCorrect": false, "rationale": "The text does not discuss branch rivalry; it focuses on the moral and rhetorical interpretation of war itself."}, {"text": "The conflict between academic rhetoric and military field manuals.", "isCorrect": false, "rationale": "The comparison is about their 'conclusions' regarding the nature of war, not just their writing styles."}, {"text": "The difference between those who served in the Civil War and those who served in World War I.", "isCorrect": false, "rationale": "While they served at different times, the text emphasizes their differing moral interpretations rather than their historical eras."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
