<script>
var QUESTIONS = [{"question": "What is the central argument Smedley Butler presents in \"Who Pays The Bills?\" regarding the nature of war?", "options": [{"text": "Wars are an inevitable part of human history, driven by complex geopolitical factors.", "isCorrect": false, "rationale": "Butler dismisses the idea of war as an inevitable geopolitical necessity; instead, he frames it as a 'racket' driven by profit, implying it is not inevitable."}, {"text": "War is a deliberate scheme orchestrated by a select few for immense financial gain, with the common people and soldiers bearing the true cost.", "isCorrect": true, "rationale": "Butler's entire argument centers on war being a 'racket' where bankers and industrialists make huge profits (e.g., '20, 100, 300, 1,500 and 1,800 per cent'), while soldiers and their families pay with their lives, health, and finances."}, {"text": "The primary cause of war is a nation's failure to adequately support its military and veterans.", "isCorrect": false, "rationale": "While Butler strongly critiques the lack of support for veterans, he presents this as a *consequence* of the war racket, not its primary cause. His focus is on the profit motive."}, {"text": "Strong national defense is crucial, even if it comes at a significant financial and human cost.", "isCorrect": false, "rationale": "Butler is critical of the costs and mechanisms of war, not endorsing them as necessary for national defense. He argues that wars are made for profit, not necessarily defense."}], "id": "q01"}, {"question": "According to Butler, how did bankers primarily profit from Liberty Bonds during and after World War I?", "options": [{"text": "They acted as government agents, earning a fixed commission on every bond sold directly to soldiers.", "isCorrect": false, "rationale": "The text describes manipulation of bond prices by bankers, not a fixed commission on sales."}, {"text": "They depressed bond prices after the war, bought them cheaply from frightened citizens and discharged soldiers, and then resold them at par or above.", "isCorrect": true, "rationale": "Butler explicitly states: 'The bankers control the security marts. It was easy for them to depress the price of these bonds. Then all of us... got frightened and sold the bonds at $84 or $86. The bankers bought them. Then these same bankers stimulated a boom and government bonds went to par – and above. Then the bankers collected their profits.'"}, {"text": "They loaned money to the government at exorbitant interest rates, which was then paid back through bond sales.", "isCorrect": false, "rationale": "While bankers might have been involved in government loans, the specific mechanism Butler details for profit from Liberty Bonds involves buying and selling at manipulated prices."}, {"text": "They created new financial instruments backed by Liberty Bonds, which only they could trade for profit.", "isCorrect": false, "rationale": "The text describes a direct manipulation of the Liberty Bond market, not the creation of new derivative instruments."}], "id": "q02"}, {"question": "Butler extensively details the plight of veterans in hospitals, referring to them as \"destroyed men\" and \"living dead.\" His primary explanation for their severe mental state after the war is:", "options": [{"text": "The physically debilitating conditions of trench warfare led directly to psychological breakdown.", "isCorrect": false, "rationale": "While physical conditions were harsh, Butler emphasizes the *psychological* struggle of readjustment rather than physical conditions directly causing mental destruction. He notes, 'Physically, they are in good shape; mentally, they are gone.'"}, {"text": "Their inability to transition from being trained killers back to normal civilian life without societal or governmental support.", "isCorrect": true, "rationale": "Butler states, 'They had to do their own readjustment, sans mass psychology, sans officers' aid and advice and sans nation-wide propaganda... Many, too many, of these fine young boys are eventually destroyed, mentally, because they could not make that final 'about face' alone.'"}, {"text": "The trauma of witnessing atrocities committed by enemy combatants on the battlefield.", "isCorrect": false, "rationale": "The text focuses on the psychological conditioning received *from their own side* ('made to regard murder as the order of the day') and the subsequent lack of de-conditioning support, rather than specific enemy actions."}, {"text": "A genetic predisposition to mental illness that was exacerbated by the stresses of military service.", "isCorrect": false, "rationale": "Butler provides no information suggesting genetic predispositions; his explanation is purely environmental and psychological, focusing on training and lack of support."}], "id": "q03"}, {"question": "According to Butler, how did the government and society primarily ensure enlistment and compliance during the World War?", "options": [{"text": "By offering generous financial incentives and job security after the war.", "isCorrect": false, "rationale": "Butler explicitly states soldiers were poorly paid and struggled to find work after the war, directly contradicting the idea of generous incentives or job security."}, {"text": "Through effective public education campaigns on geopolitical necessity.", "isCorrect": false, "rationale": "Butler describes a campaign of 'vicious war propaganda' that included false ideals and shaming, not objective education on geopolitical necessity."}, {"text": "By appealing to patriotism, using medals, religious justification, and shaming non-enlistment.", "isCorrect": true, "rationale": "Butler describes 'the medal business,' 'propaganda to make the boys accept conscription' by making them 'feel ashamed if they didn't join,' and 'even God was brought into it' by clergymen."}, {"text": "Primarily through mandatory conscription without any psychological persuasion.", "isCorrect": false, "rationale": "While conscription was used, Butler details extensive psychological manipulation ('mass psychology,' 'propaganda') that accompanied it."}], "id": "q04"}, {"question": "Butler highlights the \"crowning insolence\" regarding soldiers' pay. Which statement accurately summarizes the financial burdens placed on a soldier earning $30 a month?", "options": [{"text": "They received $30, but had to pay for all their uniforms, food, and basic supplies themselves.", "isCorrect": false, "rationale": "While they were forced to buy Liberty Bonds that covered these, the primary deduction mentioned first was half their wage for dependents."}, {"text": "Half their salary was deducted for dependents, plus war risk insurance, and they were compelled to buy Liberty Bonds, leaving them with very little or no actual cash.", "isCorrect": true, "rationale": "Butler states: 'Half of that wage... was promptly taken from him to support his dependents... that cost him $6 a month' for insurance, leaving 'less than $9 a month.' Then, 'he was virtually blackjacked into paying for his own ammunition, clothing, and food by being made to buy Liberty Bonds. Most soldiers got no money at all on pay days.'"}, {"text": "Their entire salary was automatically sent to their families, leaving them with no personal funds.", "isCorrect": false, "rationale": "Only half their wage was for dependents, with other deductions and forced bond purchases accounting for the rest, not the entire salary."}, {"text": "They were only paid when actively engaged in combat, not during training or transit.", "isCorrect": false, "rationale": "The text details regular monthly pay with deductions, not conditional payment based on combat."}], "id": "q05"}, {"question": "How does Butler primarily contrast the experience of soldiers with that of \"kings and tycoons and masters of business\" during wartime?", "options": [{"text": "Soldiers are portrayed as selfless patriots, while the elite are depicted as unpatriotic slackers.", "isCorrect": false, "rationale": "While soldiers' patriotism is implied, Butler's contrast focuses on the *tangible costs and risks* borne by soldiers versus the *profits and safety* of the elite, rather than patriotism alone."}, {"text": "Soldiers pay with their bodies, minds, and meager wages, enduring extreme physical and psychological risks, while the elite accrue vast profits without any personal risk.", "isCorrect": true, "rationale": "Butler states, 'They aren't running any risk of being killed or of having their bodies mangled or their minds shattered. They aren't sleeping in muddy trenches. They aren't hungry. The soldiers are!' In contrast, the elite make 'nice little profits of 20, 100, 300, 1,500 and 1,800 per cent.'"}, {"text": "Soldiers receive extensive government support upon returning home, whereas the elite face economic struggles during post-war recessions.", "isCorrect": false, "rationale": "This statement directly contradicts Butler's description of veterans being neglected and struggling, and bankers profiting from economic manipulations."}, {"text": "Soldiers gain valuable skills and experience that help them in civilian life, unlike the isolated elite who contribute little.", "isCorrect": false, "rationale": "Butler describes soldiers as 'destroyed men' who struggled to 'make that final 'about face' alone,' indicating a negative, not positive, impact on their civilian prospects."}], "id": "q06"}, {"question": "Butler states that war cannot be ended by \"disarmament conferences\" or \"peace parleys at Geneva.\" Why does he believe these efforts are futile?", "options": [{"text": "Because they are often insincere attempts by powerful nations to gain strategic advantages.", "isCorrect": false, "rationale": "While this might be true in general, Butler's text doesn't explicitly state insincerity but rather focuses on a different, more fundamental reason for their failure."}, {"text": "Because they fail to address the fundamental economic incentive, the \"profit out of war,\" that drives the \"racket.\"", "isCorrect": true, "rationale": "Butler explicitly states: 'It can be smashed effectively only by taking the profit out of war.' He argues that conferences and parleys do not address this core issue, making them ineffective."}, {"text": "Because international diplomacy is inherently incapable of resolving deep-seated national rivalries.", "isCorrect": false, "rationale": "Butler attributes the failure of these efforts to their inability to remove the profit motive, not a general critique of diplomacy's capacity to resolve rivalries."}, {"text": "Because such conferences are too focused on military technology rather than underlying political ideologies.", "isCorrect": false, "rationale": "The text does not detail the specific focus of these conferences but rather critiques their inability to stop war by failing to remove the profit incentive."}], "id": "q07"}, {"question": "What is the radical reform Butler proposes as the *only* effective way to \"smash the war racket\"?", "options": [{"text": "Mandating global disarmament treaties and establishing a powerful international peace-keeping force.", "isCorrect": false, "rationale": "Butler explicitly dismisses disarmament conferences as ineffective, so this cannot be his proposed solution."}, {"text": "Implementing a system where all war-related industries are nationalized and run by the government for public benefit.", "isCorrect": false, "rationale": "While his proposal involves strict government control over wartime compensation for industry, he does not use the term 'nationalization' or focus on public ownership, but rather on removing profit by capping wages."}, {"text": "Conscripting capital, industry, and labor to receive the same meager $30 monthly wage as soldiers, *before* conscripting manpower.", "isCorrect": true, "rationale": "Butler states: 'The only way to smash this racket is to conscript capital and industry and labor before the nations manhood can be conscripted... Let the officers and the directors... be conscripted – to get $30 a month, the same wage as the lads in the trenches get.'"}, {"text": "Educating the public about the true costs of war to build a widespread anti-war sentiment.", "isCorrect": false, "rationale": "While Butler's writing serves to educate the public, his *proposed reform* is a structural economic change, not merely an educational campaign."}], "id": "q08"}, {"question": "Butler's rationale for restricting the income of all war-related executives, bankers, and even politicians to $30 a month during wartime is primarily to:", "options": [{"text": "Equalize wealth distribution across all segments of society during a national crisis.", "isCorrect": false, "rationale": "While it would create wartime income equality, the primary goal, according to Butler, is to remove the *motive for war* by making it unprofitable for those who otherwise gain from it, not general wealth redistribution."}, {"text": "Ensure that those who instigate or profit from war share the same financial sacrifice and lack of comfort as the soldiers.", "isCorrect": true, "rationale": "Butler asks, 'Why shouldn't they? They aren't running any risk of being killed or of having their bodies mangled or their minds shattered. They aren't sleeping in muddy trenches. They aren't hungry. The soldiers are!' This highlights his aim for shared sacrifice and deterrence."}, {"text": "Fund the national war effort by redirecting their excessive profits into government coffers.", "isCorrect": false, "rationale": "The goal is to eliminate profit as a motivator for war, not to use those profits to fund the war. If no one profits, the war itself is less likely."}, {"text": "Demonstrate that money holds no value in the face of national emergency.", "isCorrect": false, "rationale": "The proposal directly manipulates the *value* of income during war to remove the profit incentive, showing that money still holds value in determining actions."}], "id": "q09"}, {"question": "Which statement best characterizes Smedley Butler's tone and persuasive strategy in \"Who Pays The Bills?\" and \"How To Smash This Racket!\"?", "options": [{"text": "He employs a formal, academic tone, relying heavily on economic theory and historical precedent to support his claims.", "isCorrect": false, "rationale": "Butler's tone is far from formal or academic; it is passionate, direct, and often accusatory. While he uses some data and historical context, his primary appeal is emotional and moral."}, {"text": "He uses a passionate, direct, and often sarcastic tone, blending statistics with emotional appeals and personal observations to expose the moral bankruptcy of war profiteering.", "isCorrect": true, "rationale": "Butler's language ('munificent' used sarcastically, 'black-jacked,' 'horrible lullaby'), personal anecdotes (visiting hospitals), emotional descriptions ('looks on their faces!'), and statistics (profit percentages, bond prices) all combine for a highly passionate and direct persuasive style aimed at moral outrage."}, {"text": "His writing is primarily objective and journalistic, presenting facts without explicit judgment or emotional language.", "isCorrect": false, "rationale": "Butler is highly subjective and judgmental, using strong emotional language and moral arguments to condemn war profiteering, directly contradicting an objective or journalistic style."}, {"text": "He adopts a cautious, diplomatic approach, suggesting reforms that would gradually reduce the profitability of war over time.", "isCorrect": false, "rationale": "Butler's approach is radical and uncompromising ('smash this racket,' 'pulls no punches'), not cautious or diplomatic, and his reforms are immediate and drastic."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
