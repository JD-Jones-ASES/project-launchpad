    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/War.html">&larr; Back to War: A Debate in Primary Sources</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 4, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "In the structural transition between the early and later chapters of 'War Is a Racket', which rhetorical shift does Butler employ to move his audience toward action?", "options": [{"text": "A shift from diagnostic analysis to prescriptive reform.", "isCorrect": true, "rationale": "Butler first identifies the 'racket' through data in chapters 1-2 and then provides specific policy solutions in chapters 3-5."}, {"text": "A shift from anecdotal evidence to statistical corporate data.", "isCorrect": false, "rationale": "This reverses Butler's actual structure, as he leads with corporate profit data and follows with human-interest stories and policy."}, {"text": "A shift from isolationist theory to international interventionism.", "isCorrect": false, "rationale": "Butler's arguments remain focused on limiting military engagement to domestic defense rather than advocating for international involvement."}, {"text": "A shift from legal definitions to emotional appeals.", "isCorrect": false, "rationale": "While Butler uses emotion, the primary structural shift described is moving from the 'diagnosis' of the problem to the 'cure' or prescription."}], "id": "q01"}, {"question": "What primary rhetorical purpose does Chapter 3 serve by focusing on the 'living dead' in veterans' hospitals before presenting policy reforms?", "options": [{"text": "To frame policy changes as urgent moral necessities rather than abstract ideas.", "isCorrect": true, "rationale": "By highlighting human suffering first, Butler ensures readers evaluate his following proposals through the lens of preventing such trauma."}, {"text": "To provide a medical justification for the expansion of the Veterans Administration.", "isCorrect": false, "rationale": "Butler's focus is on stopping war as a racket, not primarily on the administrative growth of hospital systems."}, {"text": "To demonstrate that modern warfare has become technologically obsolete.", "isCorrect": false, "rationale": "The focus on psychiatric and physical injuries serves to show the human cost, not the failure of military technology itself."}, {"text": "To argue that soldiers are mentally unfit to participate in democratic processes.", "isCorrect": false, "rationale": "This contradicts Butler's proposal in Chapter 4, where he argues that these very men should be the ones to vote on going to war."}], "id": "q02"}, {"question": "According to Butler's first proposal for reform, what must happen before the government is permitted to draft a single soldier?", "options": [{"text": "The nation's capital, industry, and labor must be conscripted.", "isCorrect": true, "rationale": "Butler argues that everyone—from CEOs to generals—should be limited to the same pay as a soldier to remove the profit motive."}, {"text": "A national tax on corporate windfall profits must be enacted.", "isCorrect": false, "rationale": "While Butler hates war profits, his specific proposal is more radical: the total conscription of capital and labor at a fixed low wage."}, {"text": "The military must prove that a direct invasion of the mainland is imminent.", "isCorrect": false, "rationale": "While he favors defense, this specific requirement is not the prerequisite for the draft mentioned in the first proposal."}, {"text": "All existing Liberty Bonds must be repaid to veterans at face value.", "isCorrect": false, "rationale": "The exploitation regarding Liberty Bonds is a grievance he mentions, but its repayment is not his primary 'conscription' proposal."}], "id": "q03"}, {"question": "Butler's 'limited plebiscite' proposal is unique because it restricts the right to vote on a declaration of war specifically to which group?", "options": [{"text": "Young men of military age who pass a physical examination.", "isCorrect": true, "rationale": "Butler believes that only those who will physically bear the consequences of combat should have the authority to authorize it."}, {"text": "Active-duty military officers and high-ranking generals.", "isCorrect": false, "rationale": "Butler's proposal aims to take power away from those who might benefit from war and give it to those who will suffer in the ranks."}, {"text": "The families of veterans who served in previous foreign conflicts.", "isCorrect": false, "rationale": "Butler limits the vote to the potential fighters themselves, not their extended families or survivors."}, {"text": "The entire tax-paying civilian population.", "isCorrect": false, "rationale": "Butler's plebiscite is 'limited' specifically to exclude those who would not be eligible for the front lines."}], "id": "q04"}, {"question": "To make offensive war 'physically impossible,' Butler proposes specific geographical limits. What is the proposed operational limit for the United States Navy?", "options": [{"text": "Within 200 miles of the American coastline.", "isCorrect": true, "rationale": "Restricting the fleet to this range ensures it can defend the coast but cannot project power across the ocean to attack other nations."}, {"text": "Within 500 miles of any American-owned territory.", "isCorrect": false, "rationale": "The 500-mile limit was specifically designated for aircraft in Butler's proposal, not the navy."}, {"text": "Within the territorial waters of the Western Hemisphere.", "isCorrect": false, "rationale": "This is too broad; Butler proposed a specific numerical mileage limit to strictly constrain the navy to domestic defense."}, {"text": "Only within sight of American ports and harbors.", "isCorrect": false, "rationale": "While restrictive, Butler provided a specific distance of 200 miles rather than a visual range requirement."}], "id": "q05"}, {"question": "What does Butler identify as the primary driver behind the United States' entry into World War I, contradicting President Wilson's stated reasons?", "options": [{"text": "The financial interests of American bankers who loaned money to the Allies.", "isCorrect": true, "rationale": "Butler argues that the risk of losing billions in loans to the Allied powers was the true motivation for joining the conflict."}, {"text": "The direct threat to American soil posed by the Zimmermann Telegram.", "isCorrect": false, "rationale": "This was one of Wilson's justifications, which Butler views as a distraction from the underlying financial 'racket'."}, {"text": "The ideological goal of making the world 'safe for democracy'.", "isCorrect": false, "rationale": "Butler dismisses this high-minded rhetoric as a cover for the profit-seeking nature of the war racket."}, {"text": "The need to test new military technologies in a live combat environment.", "isCorrect": false, "rationale": "While technology led to casualties, Butler focuses on the profit motive of the 'insiders' as the cause for entry."}], "id": "q06"}, {"question": "In classical rhetoric, the 'peroration' (as seen in Butler's Chapter 5) is designed to accomplish what specific goal?", "options": [{"text": "To move the audience to action through an emotionally intense concluding argument.", "isCorrect": true, "rationale": "The peroration is the speaker's final, passionate appeal, often dropping technical details to speak 'from the gut'."}, {"text": "To provide a neutral summary of the statistical evidence presented earlier.", "isCorrect": false, "rationale": "A summary is purely informational, whereas a peroration is specifically intended to be the most emotionally charged part of the speech."}, {"text": "To introduce new policy proposals that were not previously discussed.", "isCorrect": false, "rationale": "New proposals belong in the body of the argument; the peroration is for concluding and motivating."}, {"text": "To offer a rebuttal to potential counter-arguments from the opposition.", "isCorrect": false, "rationale": "While rebuttals are part of persuasive writing, the peroration focuses on the final emotional 'punch' and call to action."}], "id": "q07"}, {"question": "How does Butler use the political history of Woodrow Wilson to support his argument about the war racket?", "options": [{"text": "By highlighting Wilson's rapid reversal from a peace platform to a war declaration.", "isCorrect": true, "rationale": "Butler notes Wilson was reelected on a promise to keep America out of war, only to ask for a war declaration five months later."}, {"text": "By praising Wilson's tactical restraint during the early years of the European conflict.", "isCorrect": false, "rationale": "Butler is critical of Wilson, suggesting his eventual entry into the war was driven by secret financial pressures."}, {"text": "By arguing that Wilson was an 'insider' who personally profited from Bethlehem Steel.", "isCorrect": false, "rationale": "While Butler mentions Bethlehem Steel's profits, he focuses on Wilson's political reversal and the influence of bankers, not personal dividends."}, {"text": "By contrasting Wilson's 1916 slogan with the actual military defense limits of the time.", "isCorrect": false, "rationale": "The contrast is between his 'keep us out of war' promise and the subsequent declaration, regardless of military limits."}], "id": "q08"}, {"question": "According to the text, how were ordinary soldiers financially exploited regarding 'Liberty Bonds'?", "options": [{"text": "They were pressured to buy them at a discount and sell them back at a loss.", "isCorrect": false, "rationale": "This is slightly reversed; they bought them through deductions and were later forced to sell them to bankers at a discount."}, {"text": "They were forced to purchase them, then sold them to bankers at a steep discount due to unemployment.", "isCorrect": true, "rationale": "Soldiers had pay deducted for bonds and, upon returning home without jobs, sold them to bankers for less than their value."}, {"text": "The interest rates on the bonds were legally reduced by Congress after the war ended.", "isCorrect": false, "rationale": "The text focuses on the secondary market where bankers repurchased the bonds from desperate veterans at a discount."}, {"text": "The government refused to honor the bonds when veterans attempted to redeem them.", "isCorrect": false, "rationale": "The bonds were honored, but veterans sold them to third parties (bankers) early because they needed immediate cash."}], "id": "q09"}, {"question": "In the context of Chapter 4, why does Butler propose that aircraft be restricted to 500 miles?", "options": [{"text": "To ensure they remain within range of domestic airfields for purely defensive purposes.", "isCorrect": true, "rationale": "Restricting flight distance prevents the military from using air power to conduct offensive operations against other nations."}, {"text": "To account for the limited fuel capacity of 1930s-era aviation technology.", "isCorrect": false, "rationale": "Butler's proposal is a legal restriction for reform, not a commentary on the technical limitations of planes."}, {"text": "To align with the 200-mile limit established for the Navy's operations.", "isCorrect": false, "rationale": "He sets different limits for different branches (200 for navy, 500 for aircraft, and territorial for the army)."}, {"text": "To prevent air mail carriers from being conscripted into the military.", "isCorrect": false, "rationale": "The proposal specifically addresses the 'military' use of aircraft to prevent offensive warfare."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
