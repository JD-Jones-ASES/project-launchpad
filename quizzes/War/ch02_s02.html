</div>

<script>
var QUESTIONS = [{"question": "Smedley Butler's dramatic transformation from a celebrated warrior to an outspoken antiwar crusader was primarily fueled by which of the following?", "options": [{"text": "His personal experiences of combat injuries and the physical toll of war.", "isCorrect": false, "rationale": "The text does not mention personal combat injuries as a catalyst for Butler's transformation. His disillusionment stemmed from systemic issues he observed."}, {"text": "His growing realization that the wars he fought benefited corporations and led to government betrayal of veterans, compounded by the Business Plot.", "isCorrect": true, "rationale": "The text explicitly states that witnessing corporations profit, the government attacking veterans (Bonus Army), and being recruited for the Business Plot confirmed his suspicions about the corruption between the military, government, and big business, leading to his transformation."}, {"text": "A newfound spiritual awakening that led him to pacifism in his retirement.", "isCorrect": false, "rationale": "The text attributes his change to specific political and economic observations and experiences, not a spiritual awakening."}, {"text": "His desire to enter politics and distinguish himself from previous military leaders.", "isCorrect": false, "rationale": "The text focuses on his anger and sense of betrayal, not a political ambition to differentiate himself."}], "id": "q01"}, {"question": "What was the core demand of the Bonus Expeditionary Force that marched on Washington in 1932?", "options": [{"text": "To receive immediate government pensions for disabled World War I veterans.", "isCorrect": false, "rationale": "While veterans faced hardships, their specific demand was for early payment of the bonus, not general pensions for disability."}, {"text": "To secure government-sponsored employment programs for all unemployed Americans.", "isCorrect": false, "rationale": "Their focus was specifically on the promised bonus, not a broader employment program for all citizens, though the Great Depression context influenced their urgency."}, {"text": "To obtain early payment of a cash bonus promised to World War I veterans by the World War Adjusted Compensation Act of 1924.", "isCorrect": true, "rationale": "The text clearly states that veterans demanded early payment of the cash bonus promised by the 1924 act, which was originally not due until 1945."}, {"text": "To protest the U.S. involvement in international conflicts and demand isolationist policies.", "isCorrect": false, "rationale": "The Bonus Army's protest was economic and specific to their promised compensation, not a broader foreign policy stance."}], "id": "q02"}, {"question": "The suppression of the Bonus Army encampment involved several prominent future military leaders. Who were they?", "options": [{"text": "General John J. Pershing, Major George C. Marshall, and Captain Omar Bradley.", "isCorrect": false, "rationale": "These individuals were prominent figures but not the ones explicitly named in the text as leading the forces against the Bonus Army."}, {"text": "President Herbert Hoover, Secretary of War Patrick Hurley, and Chief of Staff Douglas MacArthur.", "isCorrect": false, "rationale": "Hoover ordered the action, but MacArthur led the troops with Eisenhower and Patton as his aides."}, {"text": "General Douglas MacArthur, Major Dwight Eisenhower, and Major George Patton.", "isCorrect": true, "rationale": "The text specifically identifies General Douglas MacArthur, with Major Dwight Eisenhower as his aide and Major George Patton commanding the cavalry, as leading the forces against the Bonus Army."}, {"text": "General Smedley Butler, Major General Ben Lear, and Colonel Leslie Groves.", "isCorrect": false, "rationale": "Smedley Butler supported the Bonus Marchers, and the other figures are not mentioned in this context."}], "id": "q03"}, {"question": "Smedley Butler's testimony regarding the 'Business Plot' revealed an alleged conspiracy with what ultimate goal?", "options": [{"text": "To influence President Roosevelt's economic policies to favor big business.", "isCorrect": false, "rationale": "The alleged plot was far more drastic than merely influencing policy; it aimed to remove the President."}, {"text": "To establish a national bank controlled by Wall Street financiers.", "isCorrect": false, "rationale": "While related to wealthy businessmen, the core allegation was political overthrow, not a banking scheme."}, {"text": "To assassinate President Franklin Roosevelt and install an interim government.", "isCorrect": false, "rationale": "The plot's aim was to overthrow the President and install a fascist-style government, but not explicitly through assassination according to the text."}, {"text": "To overthrow President Franklin Roosevelt and install a fascist-style government in the United States.", "isCorrect": true, "rationale": "Butler testified that wealthy businessmen and financiers sought to overthrow President Roosevelt and replace his administration with a fascist-style government."}], "id": "q04"}, {"question": "Why was Smedley Butler allegedly chosen by the conspirators in the Business Plot?", "options": [{"text": "Because of his extensive experience in international diplomacy.", "isCorrect": false, "rationale": "The text highlights his military fame and influence, not his diplomatic experience."}, {"text": "Due to his public support for the economic policies favored by wealthy businessmen.", "isCorrect": false, "rationale": "Butler was actually critical of the wealthy elite profiting from war, making this option incorrect."}, {"text": "Because of his fame and his influence among veterans, which could be used to mobilize a private army.", "isCorrect": true, "rationale": "The conspirators sought Butler specifically for his popularity and influence among veterans, believing he could rally 500,000 men for their cause."}, {"text": "He was known for his quiet obedience and willingness to follow orders without question.", "isCorrect": false, "rationale": "Butler's outspoken nature and eventual reporting of the plot contradict this description."}], "id": "q05"}, {"question": "The McCormack-Dickstein Committee found Butler's testimony regarding the Business Plot to be 'credible,' yet no one was prosecuted and the story was largely dismissed. What does the text suggest was the primary reason for this outcome?", "options": [{"text": "Butler eventually retracted his testimony, rendering the investigation moot.", "isCorrect": false, "rationale": "The text states his testimony was found credible, implying he did not retract it."}, {"text": "The conspirators voluntarily abandoned their plans after Butler reported them.", "isCorrect": false, "rationale": "The text implies a cover-up and dismissal, not a voluntary cessation by the plotters."}, {"text": "The major newspapers, many owned by the same class of businessmen Butler accused, largely dismissed the story, and there was a lack of political will for further action.", "isCorrect": true, "rationale": "The text explicitly states that 'The major newspapers, many of them owned by the same class of businessmen Butler accused, largely dismissed the story,' contributing to the affair being buried and no one prosecuted."}, {"text": "The committee concluded that while the plot was credible, it posed no real threat to the government.", "isCorrect": false, "rationale": "The committee finding it 'credible' implies it was a serious concern; the issue was the lack of follow-through and public attention."}], "id": "q06"}, {"question": "How did the rise of fascism in Europe influence the perception of the Business Plot in 1933?", "options": [{"text": "It made the idea of an American fascist movement seem entirely impossible and absurd.", "isCorrect": false, "rationale": "The text states the opposite: fascism's 'apparent success' made an American movement 'not as far-fetched.'"}, {"text": "It led to strong international condemnation that prevented any similar movements in the U.S.", "isCorrect": false, "rationale": "The text notes that prominent American and British businessmen admired fascist efficiency, suggesting a different international perception at the time."}, {"text": "It highlighted fascism as a discredited ideology, making any American attempt at it immediately unpopular.", "isCorrect": false, "rationale": "The text explicitly states fascism was 'not a discredited ideology but an apparently successful one' in the early 1930s."}, {"text": "It provided a context where fascism was seen as a successful political model, making the idea of an American fascist movement more plausible.", "isCorrect": true, "rationale": "The text explains that with Mussolini and Hitler in power, fascism was viewed as 'apparently successful,' leading to some American and British businessmen admiring it and making an American fascist movement not 'far-fetched.'"}], "id": "q07"}, {"question": "Which phrase best describes the tone and style of Smedley Butler's book, 'War Is a Racket'?", "options": [{"text": "A calm, scholarly analysis supported by extensive historical research.", "isCorrect": false, "rationale": "The text explicitly states it is 'not a calm, scholarly analysis' and Butler 'was not interested in nuance.'"}, {"text": "An objective, dispassionate critique of military strategy and tactics.", "isCorrect": false, "rationale": "The text describes it as 'written in anger by a man who felt personally betrayed' and 'not a man making a dispassionate case.'"}, {"text": "A direct, forceful, and angry condemnation of war profiteering and government corruption, born from personal betrayal.", "isCorrect": true, "rationale": "The text describes it as 'written in anger by a man who felt personally betrayed,' 'short...because Butler was not interested in nuance. He wanted to name the crime, name the criminals, and propose a remedy,' and 'writes the way he fought: directly, forcefully, and without apology.'"}, {"text": "A nostalgic memoir reflecting on the glories of his military career.", "isCorrect": false, "rationale": "The book is a condemnation of war, stemming from disillusionment, which is the opposite of nostalgic reflection on military glory."}], "id": "q08"}, {"question": "According to the definition provided in the text, what is a key characteristic of a pamphlet as a genre?", "options": [{"text": "It is a comprehensive academic study, typically over a hundred pages, aimed at in-depth analysis.", "isCorrect": false, "rationale": "The definition states it is 'typically fewer than a hundred pages' and 'rewards brevity, directness, and urgency over balance and scholarly qualification.'"}, {"text": "It is a lengthy, bound publication intended for archival purposes.", "isCorrect": false, "rationale": "The definition describes it as 'short, unbound publication.'"}, {"text": "It is a short, unbound publication devoted to a single argument or cause, prioritizing brevity and directness.", "isCorrect": true, "rationale": "The text defines a pamphlet as 'a short, unbound publication — typically fewer than a hundred pages — devoted to a single argument or cause,' which 'rewards brevity, directness, and urgency.'"}, {"text": "It is a fictional narrative designed to entertain rather than inform or persuade.", "isCorrect": false, "rationale": "The definition explicitly states pamphlets have a 'long history in political rhetoric' and are devoted to an 'argument or cause.'"}], "id": "q09"}, {"question": "Based on the section content, which of the following best describes Butler's fundamental shift in understanding the purpose of his military service?", "options": [{"text": "He initially believed he was fighting for national defense, but later saw it as service to specific political parties.", "isCorrect": false, "rationale": "His disillusionment was broader than political parties; it was about the underlying motives of war itself."}, {"text": "He moved from believing his service protected American values to realizing it primarily served the financial interests of big business and a corrupt government.", "isCorrect": true, "rationale": "The text states he 'had come to believe that the causes he had fought for were not the causes he had been told about,' specifically linking it to corporations profiting, government attacking veterans, and the Business Plot involving wealthy businessmen, indicating a shift from patriotic ideals to economic exploitation."}, {"text": "He shifted from supporting aggressive expansionism to advocating for increased military intervention for humanitarian causes.", "isCorrect": false, "rationale": "His transformation was towards antiwar sentiment, not a different form of intervention."}, {"text": "He initially thought war was glorious but later came to view it as a necessary evil for global stability.", "isCorrect": false, "rationale": "His view became much more condemnatory, seeing war as a 'racket' for profit, not merely a 'necessary evil.'"}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
