<script>
var QUESTIONS = [{"question": "What overarching factor is presented as the primary catalyst for Smedley Butler's transformation from a celebrated warrior to an outspoken antiwar crusader?", "options": [{"text": "His personal financial losses during the Great Depression.", "isCorrect": false, "rationale": "While the Great Depression was the backdrop, the text does not mention Butler's personal financial losses as the catalyst for his transformation. Instead, it focuses on public events and his observations of societal issues."}, {"text": "Disillusionment stemming from the government's violent suppression of the Bonus Army and revelations of the Business Plot.", "isCorrect": true, "rationale": "The text explicitly states that 'The sight of the government turning its own army against the men who had fought its wars confirmed something Butler had been suspecting for years' and that if the Bonus Army 'radicalized Butler, what came next pushed him even further' (referring to the Business Plot). These two events are presented as the key factors in his transformation."}, {"text": "A newfound academic interest in socialist and communist ideologies.", "isCorrect": false, "rationale": "The text does not mention any academic interest in socialist or communist ideologies as a cause for Butler's transformation. His change was driven by direct observations and experiences related to the military, government, and business."}, {"text": "His post-retirement desire for a quieter, non-political life.", "isCorrect": false, "rationale": "This option contradicts the text, which describes Butler undergoing 'one of the most dramatic transformations in American public life: from celebrated warrior to outspoken antiwar crusader,' indicating a move towards a more politically engaged, rather than quieter, life."}]}, {"question": "The primary demand of the Bonus Expeditionary Force in 1932 was for:", "options": [{"text": "Immediate job creation programs for unemployed veterans.", "isCorrect": false, "rationale": "While unemployment was a severe issue during the Depression, the specific demand of the Bonus Army was not primarily for jobs, but for early payment of a promised financial bonus."}, {"text": "Early payment of a promised cash bonus for World War I service.", "isCorrect": true, "rationale": "The text clearly states that the veterans 'marched on Washington to demand early payment' of the cash bonus promised by the World War Adjusted Compensation Act of 1924, which was originally not due until 1945."}, {"text": "Increased military pensions for all retired service members.", "isCorrect": false, "rationale": "The issue was specifically about a one-time cash bonus promised for World War I service, not a general increase in ongoing military pensions."}, {"text": "Recognition of their wartime sacrifices through national monuments.", "isCorrect": false, "rationale": "While veterans sought recognition, their immediate and pressing demand was financial, driven by the severe economic conditions of the Great Depression."}]}, {"question": "How did the government's violent response to the Bonus Army, as described in the text, reinforce Smedley Butler's evolving worldview?", "options": [{"text": "It solidified his belief in the necessity of a strong, centralized government to maintain order.", "isCorrect": false, "rationale": "The text indicates the opposite: Butler saw the attack on veterans as a confirmation of corruption, not a justification for a strong, centralized government acting against its own citizens."}, {"text": "It convinced him that military leaders like MacArthur were primarily motivated by personal political ambition.", "isCorrect": false, "rationale": "While General MacArthur led the operation, Butler's conclusion was broader, focusing on the systemic 'rotten core' of the military, government, and big business, not just individual ambition."}, {"text": "It confirmed his suspicion that the relationship between the military, government, and big business was fundamentally corrupt.", "isCorrect": true, "rationale": "The text explicitly states that 'The sight of the government turning its own army against the men who had fought its wars confirmed something Butler had been suspecting for years: that the relationship between the military, the government, and big business was rotten at its core.'"}, {"text": "It led him to advocate for a complete demilitarization of the United States.", "isCorrect": false, "rationale": "The text describes Butler becoming an antiwar crusader and writing 'War Is a Racket,' but it does not state that he advocated for complete demilitarization. His focus was on the misuse of military power and war for profit."}]}, {"question": "According to Smedley Butler's testimony, what was the ultimate objective of the wealthy businessmen behind the 'Business Plot'?", "options": [{"text": "To pressure President Roosevelt into implementing more business-friendly policies.", "isCorrect": false, "rationale": "The plot was far more extreme than merely pressuring the President; it aimed for a complete change in leadership and governmental structure."}, {"text": "To divert national attention away from the Depression and towards foreign conflicts.", "isCorrect": false, "rationale": "The text states the conspirators wanted to 'overthrow President Franklin Roosevelt and install a fascist-style government in the United States,' not to distract from the Depression by shifting focus abroad."}, {"text": "To overthrow President Franklin Roosevelt and establish a fascist-style government in the U.S.", "isCorrect": true, "rationale": "The text explicitly states that Butler testified 'that a group of wealthy businessmen and Wall Street financiers had approached him with a plan to overthrow President Franklin Roosevelt and install a fascist-style government in the United States.'"}, {"text": "To create a private security force to protect their assets from labor unrest.", "isCorrect": false, "rationale": "While the plot involved mobilizing veterans into a private army, its purpose was to 'seize control of the government,' not merely to protect assets from labor unrest."}]}, {"question": "Butler's decision to report the Business Plot to Congress, rather than participate, best demonstrates which of the following about his character?", "options": [{"text": "His unwavering loyalty to the wealthy elite who funded his military career.", "isCorrect": false, "rationale": "Butler's action was directly *against* the wealthy elite he accused, showing a lack of loyalty to them in this context, and instead a commitment to higher principles."}, {"text": "His commitment to upholding democratic principles and the rule of law.", "isCorrect": true, "rationale": "By reporting a conspiracy to overthrow a democratically elected president to Congress, Butler demonstrated a strong commitment to democratic institutions and the legal process, even when it put him at odds with powerful figures."}, {"text": "His strategic ambition to gain political power by exposing others.", "isCorrect": false, "rationale": "The text presents Butler's actions as principled resistance ('Butler did exactly what the plotters did not expect'), not as a calculated move for personal political gain. There is no mention of him seeking power for himself."}, {"text": "His pacifist beliefs, leading him to avoid any form of armed conflict.", "isCorrect": false, "rationale": "Butler was a celebrated warrior who 'had given his entire adult life to the military.' His opposition to the Business Plot was based on principle and the misuse of power, not an aversion to all armed conflict as a pacifist."}]}, {"question": "Despite the McCormack-Dickstein Committee confirming the credibility of Butler's testimony regarding the Business Plot, what was the immediate public consequence?", "options": [{"text": "Several prominent businessmen were prosecuted and jailed for treason.", "isCorrect": false, "rationale": "The text explicitly states, 'No one was prosecuted' for the Business Plot."}, {"text": "President Roosevelt used the revelations to significantly expand his executive powers.", "isCorrect": false, "rationale": "The affair was 'quickly buried,' and the major newspapers 'largely dismissed the story,' indicating no immediate public or political expansion of presidential power stemming from it."}, {"text": "The story was largely dismissed by major newspapers, and no prosecutions resulted.", "isCorrect": true, "rationale": "The text states: 'The committee's final report confirmed that such a plot had been discussed, though no prosecutions resulted... The major newspapers, many of them owned by the same class of businessmen Butler accused, largely dismissed the story.'"}, {"text": "Public outcry led to immediate reforms in military-industrial relations.", "isCorrect": false, "rationale": "The story being buried and dismissed by the press means there was no significant public outcry or immediate reforms as a direct consequence."}]}, {"question": "The text suggests that the idea of an 'American fascist movement' was not considered 'far-fetched in 1933' primarily because:", "options": [{"text": "The United States already had a history of military dictatorships.", "isCorrect": false, "rationale": "The historical context provided does not mention any history of military dictatorships in the U.S. that would make fascism seem less far-fetched."}, {"text": "Fascist governments in Europe, like those in Italy and Germany, were seen as successful and admired by some.", "isCorrect": true, "rationale": "The text explicitly states: 'Butler's testimony about the Business Plot must be understood against the backdrop of the early 1930s, when fascism was not a discredited ideology but an apparently successful one... Prominent American and British businessmen openly admired the efficiency of fascist governments.'"}, {"text": "American political discourse at the time openly embraced anti-democratic ideologies.", "isCorrect": false, "rationale": "While some prominent businessmen admired fascism, it was not presented as a widely embraced ideology in American political discourse at large, making this statement too broad."}, {"text": "The Great Depression had caused a complete collapse of democratic institutions in the U.S.", "isCorrect": false, "rationale": "While the Depression caused severe economic hardship and challenged institutions, the text does not state that it led to a 'complete collapse of democratic institutions' in the U.S."}]}, {"question": "Which statement best characterizes the tone and objective of Smedley Butler's book, *War Is a Racket*?", "options": [{"text": "A dispassionate, scholarly analysis of military expenditures.", "isCorrect": false, "rationale": "The text explicitly states, 'War Is a Racket is not a calm, scholarly analysis' and that 'Butler was not interested in nuance.'"}, {"text": "An angry and direct indictment of war profiteering and the betrayal of veterans.", "isCorrect": true, "rationale": "The text describes it as 'a book written in anger by a man who felt personally betrayed,' whose purpose was to 'name the crime, name the criminals, and propose a remedy.' It also emphasizes its 'direct, forcefully, and without apology' tone."}, {"text": "A nuanced exploration of the ethical dilemmas faced by soldiers in combat.", "isCorrect": false, "rationale": "The text states Butler 'was not interested in nuance,' indicating it did not aim for a nuanced exploration of dilemmas but rather a forceful declaration."}, {"text": "A historical chronicle of American military interventions throughout the 20th century.", "isCorrect": false, "rationale": "While informed by his experiences, the book is described as a 'pamphlet' with a 'single argument or cause,' focusing on the specific 'racket' of war, rather than a broad historical chronicle."}]}, {"question": "Given the description of a pamphlet, why was this format particularly suitable for Smedley Butler's *War Is a Racket*?", "options": [{"text": "It allowed for extensive academic citations and footnotes, strengthening his scholarly argument.", "isCorrect": false, "rationale": "The definition states that the pamphlet genre 'rewards brevity, directness, and urgency over balance and scholarly qualification,' suggesting it is not ideal for extensive academic citations."}, {"text": "Its brevity and directness enabled him to convey an urgent message without excessive detail or nuance.", "isCorrect": true, "rationale": "The text notes that 'The pamphlet is short — barely fifty pages — because Butler was not interested in nuance. He wanted to name the crime, name the criminals, and propose a remedy,' aligning perfectly with the pamphlet's characteristics of 'brevity, directness, and urgency.'"}, {"text": "Its unbound nature made it cheaper to produce in large quantities for widespread public distribution.", "isCorrect": false, "rationale": "While pamphlets generally are suitable for widespread distribution due to their format, the text's explanation for its suitability focuses on Butler's specific intentions regarding tone and content (brevity, directness, urgency), not primarily on production cost."}, {"text": "It was traditionally associated with military strategy documents, lending authority to his veteran status.", "isCorrect": false, "rationale": "The definition states pamphlets have a 'long history in political rhetoric,' not specifically military strategy documents. While Butler's veteran status was important, the format's suitability was about his message's style."}]}, {"question": "Based on the entire section, which statement best encapsulates the 'rotten at its core' relationship Butler suspected between the military, the government, and big business?", "options": [{"text": "That military leaders were consistently undervalued and underpaid by the government.", "isCorrect": false, "rationale": "The text focuses on the betrayal of *veterans* and the *profits* of war, not the underpayment of military leaders."}, {"text": "That wars were primarily instigated and profited from by a wealthy elite, with soldiers and veterans bearing the true cost.", "isCorrect": true, "rationale": "This synthesizes several key points: 'watched the profits flow to corporations while veterans begged for their bonuses,' the government attacking those veterans, and the Business Plot where 'the very class of men who profited from war' tried to overthrow the president. Butler felt 'betrayed' because the causes he fought for were not what he was told."}, {"text": "That the government was too slow to respond to economic crises, leading to social unrest.", "isCorrect": false, "rationale": "While the Depression set the stage, Butler's core concern went beyond governmental inefficiency in crisis response to a deeper, systemic corruption and manipulation for profit and power."}, {"text": "That military technology was becoming too advanced, threatening global peace.", "isCorrect": false, "rationale": "The text does not discuss advanced military technology or its threat to global peace; Butler's focus is on the motivations and beneficiaries of war, rather than the tools of warfare."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
