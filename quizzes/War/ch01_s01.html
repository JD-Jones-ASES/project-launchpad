<script>
var QUESTIONS = [{"question": "Which of the following positions did Oliver Wendell Holmes Jr. hold *before* being appointed to the Massachusetts Supreme Judicial Court?", "options": [{"text": "Associate Justice of the U.S. Supreme Court", "isCorrect": false, "rationale": "Holmes was appointed to the U.S. Supreme Court in 1902, twenty years after his initial appointment to the Massachusetts Supreme Judicial Court."}, {"text": "Chief Justice of the Massachusetts Supreme Judicial Court", "isCorrect": false, "rationale": "Holmes served as an Associate Justice on the Massachusetts Supreme Judicial Court for seventeen years before becoming Chief Justice for the last three years of his service on that court."}, {"text": "Private legal practitioner", "isCorrect": true, "rationale": "After graduating from Harvard Law, Holmes spent 'fifteen years in private practice and legal scholarship' before his appointment to the Massachusetts Supreme Judicial Court in 1882."}, {"text": "Professor at Harvard Law School", "isCorrect": false, "rationale": "While he studied law at Harvard and engaged in legal scholarship, the text does not state that he held a professorship there before his judicial appointment."}], "id": "q01"}, {"question": "Oliver Wendell Holmes Jr. was wounded in three significant Civil War engagements. Which of the following battles is *not* listed as one where he sustained a wound?", "options": [{"text": "Ball's Bluff, Virginia", "isCorrect": false, "rationale": "Holmes was 'shot through the chest' at Ball's Bluff, his first serious wound."}, {"text": "Antietam, Maryland", "isCorrect": false, "rationale": "Holmes was 'shot through the neck' at Antietam, considered the bloodiest single day in American history."}, {"text": "Gettysburg, Pennsylvania", "isCorrect": true, "rationale": "The text lists Ball's Bluff, Antietam, and Fredericksburg as the three battles where Holmes was wounded. Gettysburg is not mentioned in this context."}, {"text": "Fredericksburg, Virginia", "isCorrect": false, "rationale": "Holmes was 'struck in the heel by a shell fragment' at Fredericksburg, his third wound."}], "id": "q02"}, {"question": "The text states that Holmes's Civil War experiences became 'the raw material for everything he would later say about war, courage, and the meaning of sacrifice.' Which aspect of his post-war legal philosophy most directly reflects this influence?", "options": [{"text": "His belief that law is a set of fixed logical propositions.", "isCorrect": false, "rationale": "In *The Common Law*, Holmes explicitly 'argued that law is not a set of fixed logical propositions but a living body of rules shaped by experience and the needs of society,' directly contradicting this option."}, {"text": "His advocacy for strict adherence to precedent in all judicial rulings.", "isCorrect": false, "rationale": "Holmes championed the idea of law as a 'living document' and judicial restraint, suggesting a flexible approach to precedent when societal needs evolve, rather than strict adherence in all cases."}, {"text": "His view that the Constitution should be read as a 'living document' and judges should defer to the democratic process.", "isCorrect": true, "rationale": "This aligns with his 'soldier's mind' philosophy that 'life is struggle,' 'certainty is an illusion,' and the highest quality is 'willingness to act decisively.' A living document view allows for societal evolution (struggle), and judicial restraint defers to the democratic process, embracing the uncertainty of collective action over judicial certainty."}, {"text": "His insistence that virtue would always be rewarded and justice would prevail through legal means.", "isCorrect": false, "rationale": "The text explicitly states that Holmes's 'uncomfortable philosophy' 'did not promise that virtue would be rewarded or that justice would prevail,' contradicting this option."}], "id": "q03"}, {"question": "In his masterwork, *The Common Law*, what radical argument did Oliver Wendell Holmes Jr. put forth regarding the nature of law?", "options": [{"text": "That law is primarily a reflection of divine will and moral absolutes.", "isCorrect": false, "rationale": "Holmes's argument was grounded in practical experience and societal needs, not divine or moral absolutes."}, {"text": "That law is a living body of rules shaped by societal experience and needs.", "isCorrect": true, "rationale": "The text states, 'His masterwork, The Common Law (1881), argued that law is not a set of fixed logical propositions but a living body of rules shaped by experience and the needs of society.'"}, {"text": "That law should be strictly interpreted as a rigid, unchanging code.", "isCorrect": false, "rationale": "This is the opposite of his argument for a 'living body of rules' and his later view of the Constitution as a 'living document.'"}, {"text": "That legal scholarship is irrelevant to judicial decision-making.", "isCorrect": false, "rationale": "Holmes himself was a prominent legal scholar, making this option highly unlikely and unsupported by the text."}], "id": "q04"}, {"question": "Oliver Wendell Holmes Jr. earned the nickname 'The Great Dissenter' on the United States Supreme Court. This title primarily signifies his support for which pair of judicial principles?", "options": [{"text": "Judicial activism and expanding federal power.", "isCorrect": false, "rationale": "Holmes championed 'judicial restraint,' which is generally opposed to judicial activism. While he served on the federal court, his dissents often argued against what he saw as overreach."}, {"text": "Strict constructionism and original intent.", "isCorrect": false, "rationale": "Holmes argued 'that the Constitution should be read as a living document, not a rigid code,' which is contrary to strict constructionism and original intent."}, {"text": "Free speech and judicial restraint.", "isCorrect": true, "rationale": "The text explicitly states: 'His dissents championed free speech, legislative experimentation, and judicial restraint.'"}, {"text": "Unanimous court decisions and rapid legal reform.", "isCorrect": false, "rationale": "'The Great Dissenter' implies frequent disagreement with the majority, not an aim for unanimity. Rapid legal reform is not a stated principle, but an outcome of evolving law."}], "id": "q05"}, {"question": "According to the text, what significant aspect defined Oliver Wendell Holmes Jr.'s family background and early life in Boston?", "options": [{"text": "His family's long history of military service.", "isCorrect": false, "rationale": "While Holmes served, the text emphasizes his family's intellectual distinction, not primarily military service history."}, {"text": "His humble origins and self-made success.", "isCorrect": false, "rationale": "The text states he was born 'into one of the most distinguished families in American intellectual life,' indicating a privileged background, not humble origins."}, {"text": "His immersion in one of America's most distinguished intellectual families.", "isCorrect": true, "rationale": "The text explicitly states he was born 'into one of the most distinguished families in American intellectual life.'"}, {"text": "His early career as a renowned orator and public speaker.", "isCorrect": false, "rationale": "The text focuses on his Harvard studies and enlistment during his early life, not an early career as an orator, though he became eloquent later."}], "id": "q06"}, {"question": "The 'Note on Holmes' Legacy' concludes by stating, 'Understanding the soldier is essential to understanding the judge.' This statement implies that:", "options": [{"text": "Holmes primarily used military metaphors in his legal opinions.", "isCorrect": false, "rationale": "The text does not mention his use of military metaphors in legal writing; the connection is deeper, philosophical, not merely stylistic."}, {"text": "His judicial decisions were often influenced by military strategy.", "isCorrect": false, "rationale": "While his 'soldier's mind' influenced him, it was a philosophical framework, not a direct application of military strategy to legal cases."}, {"text": "His fundamental worldview, shaped by combat, informed his approach to law and justice.", "isCorrect": true, "rationale": "The note explains that 'the war was the defining experience of his life' and gave him 'a philosophy as much as a set of memories,' which influenced his legal brilliance, thus linking the soldier's experience to the judge's mindset."}, {"text": "He believed veterans should receive preferential treatment in legal matters.", "isCorrect": false, "rationale": "This specific belief is not mentioned in the text. The connection between soldier and judge is philosophical and personal, not about specific policy preferences for veterans."}], "id": "q07"}, {"question": "Holmes's 'uncomfortable philosophy,' forged in combat, posited several key beliefs. Which of the following statements best encapsulates a central tenet of this philosophy?", "options": [{"text": "Absolute certainty is achievable through rigorous logical analysis.", "isCorrect": false, "rationale": "His philosophy stated that 'certainty is an illusion,' directly contradicting this option."}, {"text": "The highest human quality is the pursuit of safety and comfort.", "isCorrect": false, "rationale": "His philosophy contrasted this, stating 'a life lived with courage was better than a life lived in the pursuit of safety.'"}, {"text": "Life is a struggle, and one must be willing to act decisively for a cause, even without absolute proof of its righteousness.", "isCorrect": true, "rationale": "This option synthesizes several core ideas from 'A Soldier's Mind': 'He believed that life is struggle, that certainty is an illusion, and that the highest human quality is the willingness to act decisively — even to die — for something one cannot prove is right.'"}, {"text": "Virtue is always rewarded, and justice inevitably prevails in the long run.", "isCorrect": false, "rationale": "The text explicitly states this philosophy 'did not promise that virtue would be rewarded or that justice would prevail.'"}], "id": "q08"}, {"question": "Which of the following sequences accurately represents the progression of Oliver Wendell Holmes Jr.'s major judicial appointments?", "options": [{"text": "Associate Justice of U.S. Supreme Court, Chief Justice of Massachusetts Supreme Judicial Court, Associate Justice of Massachusetts Supreme Judicial Court.", "isCorrect": false, "rationale": "This sequence is incorrect. The U.S. Supreme Court appointment came after his Massachusetts court service, and he was an Associate Justice before Chief Justice in Massachusetts."}, {"text": "Associate Justice of Massachusetts Supreme Judicial Court, Chief Justice of Massachusetts Supreme Judicial Court, Associate Justice of U.S. Supreme Court.", "isCorrect": true, "rationale": "The text states he was 'appointed to the Massachusetts Supreme Judicial Court' in 1882, served 'the last three as Chief Justice,' and then in 1902, President Roosevelt appointed him to the 'United States Supreme Court.'"}, {"text": "Private practice, Associate Justice of U.S. Supreme Court, Chief Justice of Massachusetts Supreme Judicial Court.", "isCorrect": false, "rationale": "Private practice is a legal role, not a judicial appointment, and the order of judicial appointments is incorrect."}, {"text": "Chief Justice of Massachusetts Supreme Judicial Court, Associate Justice of U.S. Supreme Court, Private practice.", "isCorrect": false, "rationale": "This sequence is incorrect. He was an Associate Justice before Chief Justice in Massachusetts, and private practice was before any judicial appointment."}], "id": "q09"}, {"question": "The final paragraph of the section, leading into 'The Soldier's Faith' speech, emphasizes that for Holmes, the Civil War was 'never really over.' What does this statement signify about its impact on him?", "options": [{"text": "He continued to participate in veterans' organizations and re-enactments.", "isCorrect": false, "rationale": "The text does not mention his involvement in such activities, focusing instead on the war's philosophical impact."}, {"text": "The physical pain from his wounds persisted throughout his life, reminding him daily of the war.", "isCorrect": false, "rationale": "While his wounds were severe, the statement 'the war was never really over' refers to its profound and lasting philosophical influence, not merely persistent physical pain."}, {"text": "The war's experiences and the philosophy forged within them remained a fundamental, guiding force in his entire life and work.", "isCorrect": true, "rationale": "The text explains that the war 'gave him a philosophy' and was 'the defining experience of his life,' which he returned to 'again and again.' The statement 'never really over' signifies this enduring philosophical and personal impact that shaped his entire worldview and subsequent career."}, {"text": "He constantly advocated for new military conflicts and interventions during his time as a jurist.", "isCorrect": false, "rationale": "The text highlights his judicial work on free speech and judicial restraint, not advocacy for military interventions."}], "id": "q10"}, {"question": "Holmes served in the 20th Massachusetts Volunteer Infantry and was wounded three times. How does this biographical detail primarily strengthen his argument in 'The Soldier's Faith'?", "options": [{"text": "It proves that Harvard-educated men made better officers than those with less education.", "isCorrect": false, "rationale": "Holmes makes no argument about educational background and officer quality; his point is about the personal transformation that combat produces regardless of social origins."}, {"text": "It establishes that he speaks from direct experience rather than theoretical speculation, giving his claims about war's virtues personal authority.", "isCorrect": true, "rationale": "The text emphasizes he was 'not a desk-bound philosopher spinning theories' but a man who 'felt the bullet, seen the dead, and carried the memory.' His wounds are not just biographical facts but the foundation of his ethos."}, {"text": "It demonstrates that the Civil War produced more casualties among officers than enlisted men.", "isCorrect": false, "rationale": "The text uses Holmes's wounds to establish personal credibility, not to make statistical claims about officer casualty rates."}, {"text": "It shows that his pacifist views were formed through direct contact with war's horror.", "isCorrect": false, "rationale": "Holmes's views were not pacifist; he glorified the virtues cultivated by war. His combat experience led him to celebrate martial courage, not oppose all war."}], "id": "q11"}, {"question": "Holmes was appointed to the U.S. Supreme Court by President Theodore Roosevelt in 1902 and served until 1932. Which aspect of his tenure most directly contradicts the idea that his philosophy was simple pro-war nationalism?", "options": [{"text": "He refused to hear cases involving military courts-martial.", "isCorrect": false, "rationale": "The text does not mention Holmes refusing to hear military cases; this detail is not supported by the biographical information provided."}, {"text": "His dissents championing free speech protected antiwar voices as well as prowar ones, showing his philosophy valued the right to dissent over any particular position.", "isCorrect": true, "rationale": "The text notes his famous dissents championing 'free speech, legislative experimentation, and judicial restraint.' A committed nationalist would not protect dissent against government war policies, which Holmes's free speech rulings did."}, {"text": "He retired voluntarily from the Supreme Court before his health declined.", "isCorrect": false, "rationale": "The text states he served until age 90 'when failing health finally forced him to step down,' indicating he did not retire voluntarily."}, {"text": "He publicly opposed every American military intervention during his time on the Court.", "isCorrect": false, "rationale": "The text does not claim Holmes publicly opposed military interventions; his philosophical position celebrated martial virtue while his judicial work protected speech rights."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
