<script>
var QUESTIONS = [{"question": "What distinguished Oliver Wendell Holmes Jr.'s family background in American intellectual life?", "options": [{"text": "They were a prominent military family with a long history of service.", "isCorrect": false, "rationale": "The text highlights his father as a celebrated physician, poet, and essayist, placing the family in the intellectual elite, not primarily military."}, {"text": "His father was a celebrated physician, poet, and essayist, placing them among the intellectual giants of nineteenth-century New England.", "isCorrect": true, "rationale": "The text explicitly states his father's professions and their impact on his upbringing, surrounded by 'books, conversation, and the expectation of greatness.'"}, {"text": "They were recent immigrants who achieved success through hard work and industrial innovation.", "isCorrect": false, "rationale": "The text describes them as one of the 'most distinguished families' in Boston, implying an established intellectual lineage, not recent immigration or industrial wealth."}, {"text": "They were known for their wealth derived from extensive landholdings and agricultural ventures.", "isCorrect": false, "rationale": "The focus is on their intellectual prominence, not their wealth from landholdings or agriculture."}], "id": "q01"}, {"question": "Which of the following accurately describes Oliver Wendell Holmes Jr.'s Civil War experience?", "options": [{"text": "He served primarily in a support role, not seeing front-line combat.", "isCorrect": false, "rationale": "The text clearly states he was with the Twentieth Massachusetts Volunteer Infantry, which 'saw some of the heaviest fighting of the war,' and he was wounded three times in front-line engagements."}, {"text": "He was wounded three times in battle, including a severe chest wound at Ball's Bluff, and spent three years in combat.", "isCorrect": true, "rationale": "The text details all three wounds and the duration of his active combat service."}, {"text": "His service was brief, ending after a single minor injury at Antietam.", "isCorrect": false, "rationale": "He sustained three serious wounds over three years, not a single minor injury."}, {"text": "He led his regiment to significant victories without suffering any personal injuries.", "isCorrect": false, "rationale": "He was wounded three times, and the engagement at Ball's Bluff was described as 'disastrous'."}], "id": "q02"}, {"question": "The text states that Holmes 'spent the rest of his long life thinking about what those wounds meant.' How did this experience primarily shape his intellectual development?", "options": [{"text": "It led him to advocate for pacifism and international cooperation to prevent future wars.", "isCorrect": false, "rationale": "While the war deeply impacted him, his post-war philosophy focused on 'duty, sacrifice,' and 'life is struggle,' rather than explicit pacifism."}, {"text": "It instilled in him a pragmatic philosophy centered on duty, sacrifice, and the acceptance of uncertainty in action.", "isCorrect": true, "rationale": "The text explicitly links his war experience to a philosophy where 'life is struggle, that certainty is an illusion,' and the 'willingness to act decisively... for something one cannot prove is right' is paramount."}, {"text": "It caused him to abandon the pursuit of knowledge in favor of practical business ventures.", "isCorrect": false, "rationale": "He pursued a distinguished legal career and became a renowned legal scholar and jurist, directly contradicting this statement."}, {"text": "It made him a staunch advocate for strict adherence to traditional legal codes as a means of societal stability.", "isCorrect": false, "rationale": "His legal philosophy, detailed later, was pragmatic, emphasizing law as a 'living body of rules shaped by experience,' not a rigid code."}], "id": "q03"}, {"question": "Oliver Wendell Holmes Jr.'s masterwork, *The Common Law* (1881), introduced a groundbreaking concept regarding the nature of law. What was its central argument?", "options": [{"text": "Law is an immutable set of divine principles that must be strictly interpreted.", "isCorrect": false, "rationale": "Holmes' famous opening sentence, 'The life of the law has not been logic: it has been experience,' directly refutes the idea of law as fixed logical propositions or immutable divine principles."}, {"text": "Law is primarily a collection of historical precedents that cannot be altered.", "isCorrect": false, "rationale": "While precedents are part of law, his argument emphasized law as a 'living body of rules shaped by experience and the needs of society,' indicating adaptability, not unalterable history."}, {"text": "Law is a dynamic system, shaped by societal experience and needs rather than fixed logical propositions.", "isCorrect": true, "rationale": "This statement accurately reflects the core argument of *The Common Law*, as described in the text, emphasizing law's evolving nature based on experience."}, {"text": "Law should always prioritize individual liberties above all other societal concerns.", "isCorrect": false, "rationale": "While Holmes championed free speech, the central argument of *The Common Law* was about the *nature* of law itself, not a specific hierarchy of legal concerns."}], "id": "q04"}, {"question": "Holmes became known as 'The Great Dissenter' on the U.S. Supreme Court. What does this nickname reveal about his approach to jurisprudence?", "options": [{"text": "He frequently sided with the majority, but offered elaborate separate opinions to clarify their reasoning.", "isCorrect": false, "rationale": "The text states he was known for his 'minority opinions' that 'challenged' majority rulings, indicating disagreement rather than clarification of majority views."}, {"text": "He was often in the minority, challenging majority rulings with influential arguments for free speech, legislative experimentation, and judicial restraint.", "isCorrect": true, "rationale": "The text explicitly describes 'The Great Dissenter' as a justice 'whose minority opinions often proved more influential than the majority rulings they challenged,' championing these specific principles."}, {"text": "He believed in strictly adhering to the original intent of the Constitution, often disagreeing with expansive interpretations.", "isCorrect": false, "rationale": "He argued the Constitution should be read as a 'living document,' which contradicts a strict originalist interpretation."}, {"text": "He frequently dissented on procedural grounds, rather than substantive legal issues, to ensure proper court function.", "isCorrect": false, "rationale": "His dissents championed substantive issues like free speech and judicial restraint, not primarily procedural matters."}], "id": "q05"}, {"question": "What was Oliver Wendell Holmes Jr.'s view on the interpretation of the Constitution during his time on the Supreme Court?", "options": [{"text": "He believed it should be interpreted as a rigid code, unchangeable by modern circumstances.", "isCorrect": false, "rationale": "He argued that the Constitution should be read as a 'living document, not a rigid code,' directly contradicting this option."}, {"text": "He argued for an interpretation that strictly followed the original intentions of the framers.", "isCorrect": false, "rationale": "His 'living document' philosophy implies an adaptable interpretation, not necessarily strict adherence to original intent, especially when deferring to the democratic process."}, {"text": "He championed it as a 'living document,' adaptable to evolving societal needs and generally deferring to the democratic process.", "isCorrect": true, "rationale": "This statement directly reflects his stated judicial philosophy on the Constitution."}, {"text": "He thought it was largely irrelevant to modern legal challenges and should be significantly rewritten.", "isCorrect": false, "rationale": "He advocated for an interpretive approach to the existing Constitution, not its irrelevance or rewriting."}], "id": "q06"}, {"question": "Holmes' 'Soldier's Mind' philosophy emphasized that 'life is struggle, that certainty is an illusion, and that the highest human quality is the willingness to act decisively... for something one cannot prove is right.' Which of the following actions best embodies this philosophy?", "options": [{"text": "A scholar dedicating years to meticulously proving a complex mathematical theorem with absolute certainty.", "isCorrect": false, "rationale": "This action directly contradicts the idea that 'certainty is an illusion' and focuses on proving something definitively right, rather than acting in its absence."}, {"text": "A politician always waiting for universal public consensus and guaranteed success before taking a stance on an issue.", "isCorrect": false, "rationale": "This avoids 'acting decisively' in the face of uncertainty and seeks comfort/safety, which Holmes' philosophy explicitly de-emphasized."}, {"text": "An entrepreneur launching a new venture with high risk, driven by conviction despite uncertain outcomes and the possibility of failure.", "isCorrect": true, "rationale": "This action perfectly aligns with the principles of accepting 'struggle,' embracing 'uncertainty,' and 'acting decisively' for something one 'cannot prove is right,' prioritizing courage over safety."}, {"text": "A judge meticulously applying established precedents to ensure predictable legal outcomes in every case.", "isCorrect": false, "rationale": "While an important part of legal work, this emphasizes certainty and predictability, which runs counter to the core tenets of Holmes' 'Soldier's Mind' philosophy of embracing uncertainty and struggle."}], "id": "q07"}, {"question": "The 'Note on Holmes' Legacy' states, 'Understanding the soldier is essential to understanding the judge.' What is the primary reason for this assertion?", "options": [{"text": "His military rank gave him authority and respect in legal circles throughout his career.", "isCorrect": false, "rationale": "While his military background might have commanded respect, the text emphasizes how the war experience shaped his fundamental philosophy, not merely his rank's authority in legal circles."}, {"text": "His battlefield experiences directly led to specific legal reforms he enacted during his time as a jurist.", "isCorrect": false, "rationale": "The text indicates his war experience forged his *philosophy* which then informed his judicial approach, not that it led directly to specific reforms."}, {"text": "The philosophical insights and lessons about duty, sacrifice, and uncertainty forged in his combat experience deeply influenced his later legal and judicial thought.", "isCorrect": true, "rationale": "The text explicitly states that 'the war had given him a philosophy as much as a set of memories' and that this philosophy 'forged in combat, refined in law,' was what he brought to his legal career."}, {"text": "He frequently used military metaphors in his legal arguments to persuade other justices and lawyers.", "isCorrect": false, "rationale": "While he might have used metaphors, this is a minor stylistic point, not the primary reason his soldier experience is essential to understanding his judicial mind."}], "id": "q08"}, {"question": "Holmes' 'pragmatic philosophy' is mentioned in connection with *The Common Law*, stating that 'the life of the law has not been logic: it has been experience.' How does this connect with his broader 'Soldier's Mind' perspective?", "options": [{"text": "Both emphasize strict adherence to established rules and traditions, resisting change.", "isCorrect": false, "rationale": "Both philosophies embrace adaptability ('living document,' 'experience') and challenge rigid certainty, directly contradicting strict adherence to tradition."}, {"text": "Both suggest that absolute certainty is unattainable, and decisions (whether in war or law) must be made based on evolving circumstances and lived experience.", "isCorrect": true, "rationale": "This option correctly links the 'experience' in law with the 'illusion of certainty' and the necessity of 'acting decisively' in the 'struggle' of life, all rooted in his pragmatic soldier's philosophy."}, {"text": "Both advocate for a purely intellectual, detached approach to problems, free from emotional bias.", "isCorrect": false, "rationale": "His war experience was deeply personal and emotional, shaping his philosophy, which was far from purely intellectual or detached."}, {"text": "Both prioritize theoretical ideals over practical outcomes in decision-making.", "isCorrect": false, "rationale": "His 'pragmatic philosophy' and emphasis on 'acting decisively' suggest a focus on practical application and outcomes, not theoretical ideals."}], "id": "q09"}, {"question": "Which of the following accurately outlines the progression of Oliver Wendell Holmes Jr.'s judicial career?", "options": [{"text": "U.S. Supreme Court Justice -> Massachusetts Supreme Judicial Court Justice -> Private Practice.", "isCorrect": false, "rationale": "This reverses the order of his major judicial appointments and places private practice last, which is incorrect."}, {"text": "Private Practice and legal scholarship -> Massachusetts Supreme Judicial Court Justice -> U.S. Supreme Court Justice.", "isCorrect": true, "rationale": "The text states he spent fifteen years in private practice and legal scholarship after the war, then was appointed to the Massachusetts Supreme Judicial Court, and later to the U.S. Supreme Court."}, {"text": "Harvard Law Professor -> Massachusetts Supreme Judicial Court Chief Justice -> U.S. Supreme Court Justice.", "isCorrect": false, "rationale": "The text mentions him studying law at Harvard, but not becoming a professor. He also became Chief Justice of the Massachusetts court *during* his tenure there, before moving to the U.S. Supreme Court, not as a direct step from being a professor."}, {"text": "Massachusetts Supreme Judicial Court Justice -> U.S. Supreme Court Justice -> Chief Justice of Massachusetts Supreme Judicial Court.", "isCorrect": false, "rationale": "He served as Chief Justice of the Massachusetts Supreme Judicial Court *before* his appointment to the U.S. Supreme Court."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
