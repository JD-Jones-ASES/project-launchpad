<script>
var QUESTIONS = [{"question": "Why does Wilson prioritize a recitation of facts regarding German submarine activity at the beginning of his address?", "options": [{"text": "To establish himself as a reasonable leader driven by necessity rather than emotion.", "isCorrect": true, "rationale": "The text explains that by leading with facts, Wilson portrays himself as a man compelled by extreme circumstances rather than one eager for war."}, {"text": "To incite immediate emotional outrage and a desire for vengeance in the American public.", "isCorrect": false, "rationale": "The source specifically notes that Wilson avoids leading with emotion to establish his character as a reasonable man."}, {"text": "To provide legal evidence for an upcoming international maritime tribunal.", "isCorrect": false, "rationale": "While the facts involve maritime law, Wilson's primary goal was to build a moral and rhetorical case for domestic and international support for entry into the war."}, {"text": "To demonstrate that the United States had already exhausted all diplomatic channels.", "isCorrect": false, "rationale": "While diplomacy may have been exhausted, the text focuses on the rhetorical choice to lead with facts to establish the speaker's credibility and restraint."}], "id": "q01"}, {"question": "In contrast to the perspectives of Holmes and Butler, how does Wilson frame the nature of the war?", "options": [{"text": "As a grim and necessary duty forced upon a peaceful nation.", "isCorrect": true, "rationale": "Wilson views the war not as a virtue or a racket, but as an honorable alternative to submission, necessitated by German aggression."}, {"text": "As a glorious opportunity for national and personal spiritual growth.", "isCorrect": false, "rationale": "This view is attributed to Holmes, who suggests war is a virtue, whereas Wilson describes it as a 'fearful thing'."}, {"text": "As a complex economic struggle for control of global trade routes.", "isCorrect": false, "rationale": "This aligns more with Butler's critique of war as a racket for profit, which Wilson notably leaves out of his argument."}, {"text": "As an inevitable historical cycle that nations must periodically endure.", "isCorrect": false, "rationale": "Wilson frames the war as a specific response to the actions of an autocratic power, not an unavoidable law of history."}], "id": "q02"}, {"question": "What is the primary distinction Wilson makes when discussing the German threat to world peace?", "options": [{"text": "The distinction between the German government and the German people.", "isCorrect": true, "rationale": "Wilson argues that the autocratic rulers, not the citizens, chose the war, which is a central component of his democratic peace argument."}, {"text": "The distinction between industrial warfare and traditional naval engagement.", "isCorrect": false, "rationale": "While submarine warfare is mentioned, the core ideological distinction in his argument is based on government types and their relation to their citizens."}, {"text": "The distinction between European territorial disputes and American maritime rights.", "isCorrect": false, "rationale": "Wilson actually elevates the argument away from mere maritime rights to a universal struggle for democracy."}, {"text": "The distinction between the economic interests of the Allies and the Central Powers.", "isCorrect": false, "rationale": "The text states that Wilson omits economic considerations, focusing instead on principles like democracy and autocracy."}], "id": "q03"}, {"question": "Which political philosophy concept suggests that democratic nations are naturally inclined toward peace because their citizens bear the costs of war?", "options": [{"text": "Democratic peace theory", "isCorrect": true, "rationale": "This theory, derived from Kant's work, posits that because citizens vote and suffer the costs of war, they are less likely to choose it than autocratic leaders."}, {"text": "Liberal institutionalism", "isCorrect": false, "rationale": "While related to liberal democracy, the specific theory regarding the inherent peacefulness of republics described in the text is the democratic peace theory."}, {"text": "The principle of self-determination", "isCorrect": false, "rationale": "Self-determination refers to the right of a people to choose their own government, not necessarily the theory of why those governments are peaceful."}, {"text": "The social contract theory", "isCorrect": false, "rationale": "Social contract theory deals with the origins of government authority, whereas the text focuses on the behavior of democracies in international relations."}], "id": "q04"}, {"question": "How does Wilson redefine the American motivation for entering the war beyond the sinking of ships?", "options": [{"text": "As a crusade to make the world 'safe for democracy' against autocratic aggression.", "isCorrect": true, "rationale": "Wilson transforms a specific maritime grievance into a universal struggle for an international order based on democratic peace."}, {"text": "As a necessary intervention to protect American financial investments in the Allied nations.", "isCorrect": false, "rationale": "The text notes that Wilson purposefully omits economic ties and war profits from his moral argument."}, {"text": "As a retaliatory strike against the violation of the Monroe Doctrine by the Zimmermann Telegram.", "isCorrect": false, "rationale": "While the telegram is evidence of hostility, Wilson’s argument reaches for a higher universal principle of democracy rather than simple retaliation."}, {"text": "As a strategic move to secure a seat at the table for postwar territorial negotiations.", "isCorrect": false, "rationale": "Wilson frames the intervention as a duty to universal principles rather than a pursuit of national strategic interests or territory."}], "id": "q05"}, {"question": "Which of the following is a key component of 'Liberal Democracy' as defined in the source material?", "options": [{"text": "The protection of individual rights and limits on government power.", "isCorrect": true, "rationale": "The definition provided highlights free elections, the rule of law, individual rights, and government limits as the core characteristics."}, {"text": "A government system where the state owns the means of production to ensure equality.", "isCorrect": false, "rationale": "This describes socialism or communism, which is not part of the provided definition of liberal democracy."}, {"text": "A system where the majority has absolute power without constitutional restraint.", "isCorrect": false, "rationale": "Liberal democracy specifically includes limits on government power and the rule of law, preventing absolute majority power."}, {"text": "The mandatory participation of all citizens in the military to ensure national defense.", "isCorrect": false, "rationale": "Mandatory military service is not listed as a defining characteristic of liberal democracy in the text's definition."}], "id": "q06"}, {"question": "Wilson argues that neutrality is no longer possible because of which specific German action listed in his reasoning?", "options": [{"text": "German plots against American territory revealed in the Zimmermann Telegram.", "isCorrect": true, "rationale": "The text lists the telegram as part of the reasoning that neutrality is impossible when a nation is actively plotting against your territory."}, {"text": "The German violation of the neutral territory of Belgium.", "isCorrect": false, "rationale": "While a historical fact, the source material focuses on the Zimmermann Telegram and submarine warfare as the primary evidence in Wilson's argument map."}, {"text": "The failure of Germany to pay reparations for previous shipping losses.", "isCorrect": false, "rationale": "Reparations are not mentioned as a reason in Wilson's argument map; he focuses on the resumption of attacks and active hostility."}, {"text": "The German alliance with the Ottoman Empire against democratic values.", "isCorrect": false, "rationale": "Wilson's argument as mapped in the text centers on German government aggression and specific threats to the U.S., not their broader alliance network."}], "id": "q07"}, {"question": "What significant omission regarding British naval policy might a critical reader use to challenge Wilson's stance on 'neutral rights'?", "options": [{"text": "Britain's blockade of Germany, which also violated neutral rights and impacted civilians.", "isCorrect": true, "rationale": "The text notes that Britain seized cargo and blacklisted firms, yet Wilson protested these actions far less vigorously than German submarine warfare."}, {"text": "Britain's refusal to allow American diplomats to monitor their naval exercises.", "isCorrect": false, "rationale": "This is not mentioned as a violation of neutral rights or an omission in the text's analysis of the blockade."}, {"text": "The British use of passenger ships to transport secret munitions from the U.S.", "isCorrect": false, "rationale": "While historically debated, the text specifically identifies the blockade and the seizure of cargo as the key British violation Wilson ignores."}, {"text": "Britain's failure to repay loans provided by American banks during the neutrality period.", "isCorrect": false, "rationale": "The text identifies American financial investment as a potential motive Wilson omits, but the blockade is the specific violation of neutral rights mentioned."}], "id": "q08"}, {"question": "According to the text, what domestic contradiction exists in Wilson's call to fight for democracy abroad?", "options": [{"text": "The existence of Jim Crow laws that denied democracy to many American citizens at home.", "isCorrect": true, "rationale": "The author points out that Wilson fails to acknowledge that millions of African Americans were denied the very democratic rights he claimed to be defending."}, {"text": "The suppression of anti-war protests by the federal government during the draft.", "isCorrect": false, "rationale": "While censorship occurred, the specific domestic inequality cited in the text involves the denial of democracy to citizens under Jim Crow."}, {"text": "The lack of women's suffrage at the time of the 1917 declaration of war.", "isCorrect": false, "rationale": "While true, the text specifically highlights the exclusion of African Americans under Jim Crow laws as the primary domestic omission."}, {"text": "The extreme poverty in rural America that prevented equal participation in government.", "isCorrect": false, "rationale": "Economic inequality is mentioned in the context of Butler's critique, but Jim Crow is the specific systemic denial of democracy mentioned."}], "id": "q09"}, {"question": "How should students interpret the 'omissions' in Wilson's argument according to the text's 'Caution' section?", "options": [{"text": "They could be either strategic attempts to hide the truth or practical choices based on the audience.", "isCorrect": true, "rationale": "The text argues that identifying omissions doesn't automatically mean an argument is wrong; they may be necessary due to the occasion or focus."}, {"text": "They are definitive proof that Wilson's argument was fundamentally dishonest and economically motivated.", "isCorrect": false, "rationale": "The text warns against this exact conclusion, stating that every argument must be selective and not all omissions are deceptive."}, {"text": "They suggest that Wilson was unaware of the British blockade and domestic civil rights issues.", "isCorrect": false, "rationale": "The text suggests the omissions were likely 'strategic' or 'practical,' implying Wilson was aware of them but chose not to include them."}, {"text": "They indicate that the moral argument for war is always superior to the economic argument.", "isCorrect": false, "rationale": "The text presents both views (Wilson vs. Butler) as having merit and does not state that one is inherently superior."}], "id": "q10"}, {"question": "What is the relationship between the 'self-determination' principle and Wilson's postwar vision?", "options": [{"text": "It was the essential foundation for a lasting peace where nations govern themselves by the will of their citizens.", "isCorrect": true, "rationale": "According to the definition, Wilson believed that lasting peace required every nation to choose its own form of government without interference."}, {"text": "It was a tactical promise made only to European allies to ensure they would continue the fight.", "isCorrect": false, "rationale": "The text frames self-determination as a cornerstone principle for the 'postwar world' and universal peace, not just a tactical promise."}, {"text": "It allowed for external interference only when a nation failed to adopt a liberal democratic model.", "isCorrect": false, "rationale": "The definition explicitly states that nations have the right to choose their government 'without external interference'."}, {"text": "It was designed to expand American colonial interests under the guise of democratic reform.", "isCorrect": false, "rationale": "Wilson’s argument is presented as based on principles of liberty and equality, the opposite of the colonial expansion that critics might allege."}], "id": "q11"}, {"question": "In the argument map, which of the following is categorized as 'Reasoning' rather than 'Evidence'?", "options": [{"text": "The conflict is a struggle between democracy and autocracy rather than a European quarrel.", "isCorrect": true, "rationale": "This is a logical interpretation and elevation of the facts into a conceptual framework, which constitutes reasoning."}, {"text": "Germany has resumed unrestricted submarine warfare.", "isCorrect": false, "rationale": "The text identifies the sinking of ships and resumption of warfare as established facts or 'Evidence'."}, {"text": "The Zimmermann Telegram reveals German hostility.", "isCorrect": false, "rationale": "The telegram is treated as a piece of record or 'Evidence' that supports the broader reasoning."}, {"text": "American citizens have been killed by German submarines.", "isCorrect": false, "rationale": "This is a 'matter of record' and is classified as the 'Grievance' or evidence portion of the argument."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
