    };

<body>
<div class="quiz-container">

        <a href="../../courses/War.html">&larr; Back to War: A Debate in Primary Sources</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 3, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Wilson's address begins by establishing 'the grievance' primarily through:", "options": [{"text": "Emotional appeals to American patriotism and outrage.", "isCorrect": false, "rationale": "The text explicitly states Wilson leads with 'facts rather than emotions' to establish himself as reasonable, making emotional appeals an incorrect description of his initial strategy."}, {"text": "A detailed account of German actions, such as unrestricted submarine warfare and the killing of noncombatants.", "isCorrect": true, "rationale": "The text states, 'Wilson begins with facts. German submarines have been sinking American ships and killing American citizens.' It emphasizes he establishes 'what has happened' before drawing conclusions."}, {"text": "Philosophical discussions about the inherent aggression of autocratic governments.", "isCorrect": false, "rationale": "While Wilson later discusses autocracy, he begins by establishing factual grievances. The philosophical discussion comes later as 'The Principle.'"}, {"text": "Comparisons between American and German military capabilities.", "isCorrect": false, "rationale": "The text does not mention Wilson beginning with military comparisons; his initial focus is on factual transgressions against American neutrality and citizens."}], "id": "q01"}, {"question": "According to the text, Wilson's core claim regarding America's entry into World War I is that the war is:", "options": [{"text": "A virtuous endeavor to spread American influence globally.", "isCorrect": false, "rationale": "The text explicitly states, 'War is not a virtue (as Holmes suggests)'. Wilson presents it as a duty, not a virtuous endeavor for influence."}, {"text": "A necessary and grim duty forced upon the United States by German aggression.", "isCorrect": true, "rationale": "The 'Wilson's Core Claim' section states he 'argues that this particular war is necessary — that the actions of the German government have left the United States no honorable alternative. War is... a grim duty forced upon a peaceful nation by the aggression of an autocratic power.'"}, {"text": "An opportunity for economic prosperity and strategic advantage.", "isCorrect": false, "rationale": "The section 'What Wilson Does Not Say' highlights that he 'does not discuss war profits or economic entanglement,' suggesting this was not part of his presented core claim."}, {"text": "Primarily a European quarrel in which America must defend its economic interests.", "isCorrect": false, "rationale": "Wilson elevates the argument beyond economic interests, framing it as 'a struggle between democracy and autocracy,' not merely a European quarrel."}], "id": "q02"}, {"question": "How does Wilson distinguish between the German people and the German government in his argument?", "options": [{"text": "He argues that both the German people and their government are equally responsible for the aggression.", "isCorrect": false, "rationale": "The text states, 'Wilson draws a sharp distinction between the German people and the German government. The German people, he says, did not choose this war; their autocratic rulers did.'"}, {"text": "He claims the German people are inherently militaristic, while their government seeks peace.", "isCorrect": false, "rationale": "This is the opposite of Wilson's argument. He portrays the autocratic government as aggressive and the people as victims or not responsible for the war."}, {"text": "He asserts that the German people were compelled into war by their autocratic rulers, who do not answer to their citizens.", "isCorrect": true, "rationale": "The text clearly states: 'The German people, he says, did not choose this war; their autocratic rulers did. And that is precisely the problem. Autocracies can wage aggressive war because their leaders do not answer to their citizens.'"}, {"text": "He suggests the German people would choose democracy if given the chance, but their government is inherently democratic.", "isCorrect": false, "rationale": "Wilson argues the German government is autocratic, not democratic, and that it is this autocracy that leads to war."}], "id": "q03"}, {"question": "The concept of 'self-determination' as defined in the text refers to:", "options": [{"text": "The right of powerful nations to determine the fate of weaker nations.", "isCorrect": false, "rationale": "The definition states it is 'the right to choose their own form of government without external interference,' directly contradicting the idea of powerful nations determining others' fates."}, {"text": "A system of government characterized by free elections and individual rights.", "isCorrect": false, "rationale": "This describes 'liberal democracy,' not self-determination. Self-determination focuses on the right to *choose* the government."}, {"text": "The principle that peoples and nations have the right to choose their own form of government without external interference.", "isCorrect": true, "rationale": "This is the exact definition provided in the text: 'The principle that peoples and nations have the right to choose their own form of government without external interference.'"}, {"text": "The idea that economic ties between nations prevent aggressive war.", "isCorrect": false, "rationale": "This concept is not related to the definition of self-determination provided in the text; it touches upon an omission Wilson made regarding economic entanglement."}], "id": "q04"}, {"question": "Wilson's argument escalates from a 'maritime dispute' to a 'clash of civilizations' primarily by:", "options": [{"text": "Focusing solely on the economic impact of German submarine warfare on global trade.", "isCorrect": false, "rationale": "While submarine warfare is the initial grievance, Wilson elevates the argument beyond mere economics, as stated: 'America is not fighting to avenge sunken ships. It is fighting to make the world “safe for democracy”.'"}, {"text": "Shifting the focus from specific attacks on ships to the universal struggle between democracy and autocracy.", "isCorrect": true, "rationale": "The text states, 'Wilson elevates the argument from the specific to the universal. This war, he argues, is not merely about submarine attacks or even about American rights. It is about the survival of democratic government itself.' It later calls this a 'clash of civilizations: democracy versus autocracy.'"}, {"text": "Introducing evidence of Germany's secret alliances with other autocratic powers in Europe.", "isCorrect": false, "rationale": "The text mentions the Zimmermann Telegram as evidence of German hostility, but the 'clash of civilizations' elevation comes from the general principle of democracy versus autocracy, not specific alliances."}, {"text": "Calling for a global revolution to overthrow all autocratic regimes.", "isCorrect": false, "rationale": "Wilson's call is to 'make the world “safe for democracy”' and establish an international order, not necessarily to instigate global revolution to overthrow all autocracies directly."}], "id": "q05"}, {"question": "What does Wilson argue is America's 'special responsibility' in the world?", "options": [{"text": "To secure exclusive trade routes and economic advantages for itself.", "isCorrect": false, "rationale": "The text does not mention this as America's special responsibility; Wilson explicitly omits economic motivations from his public argument."}, {"text": "To maintain strict neutrality and avoid all foreign entanglements.", "isCorrect": false, "rationale": "Wilson argues that neutrality is 'no longer possible' and that America has a duty to respond when democracy is threatened, directly contradicting strict neutrality."}, {"text": "To defend the principles of liberty, equality, and self-government globally because of its founding ideals.", "isCorrect": true, "rationale": "The text states: 'The United States... is a nation founded on principles — liberty, equality, self-government — and those principles impose obligations. If democracy is threatened anywhere, America has a duty to respond.'"}, {"text": "To lead military interventions in any country where its economic interests are threatened.", "isCorrect": false, "rationale": "Again, the text highlights Wilson's omission of economic factors in his public argument and frames America's duty around principles, not financial interests."}], "id": "q06"}, {"question": "Which of the following is NOT presented as a point of Wilson's 'Reasoning' for entering the war?", "options": [{"text": "Neutrality is no longer possible given German aggression.", "isCorrect": false, "rationale": "This is listed directly under 'Reasoning' in the 'Wilson's Argument Structure' section."}, {"text": "The conflict represents a universal struggle between democracy and autocracy.", "isCorrect": false, "rationale": "This is listed directly under 'Reasoning' in the 'Wilson's Argument Structure' section."}, {"text": "America has a duty to defend democratic principles when they are under attack.", "isCorrect": false, "rationale": "This is listed directly under 'Reasoning' in the 'Wilson's Argument Structure' section."}, {"text": "The war will be easy and inexpensive to win, ensuring swift victory.", "isCorrect": true, "rationale": "The text states, 'He does not promise victory will be easy or cheap' and calls war 'a fearful thing,' directly contradicting this option. This is something Wilson *does not say*."}], "id": "q07"}, {"question": "The text notes that Wilson 'does not discuss war profits or economic entanglement.' This omission suggests that Wilson aimed to:", "options": [{"text": "Acknowledge the practical economic realities underlying the decision for war.", "isCorrect": false, "rationale": "The text clearly states he *does not* discuss these, indicating he aimed to *avoid* acknowledging them publicly, not acknowledge them."}, {"text": "Present the decision for war as driven solely by moral principles and national duty.", "isCorrect": true, "rationale": "The text explains, 'His argument operates entirely in the realm of principle, not economics,' by omitting these factors, thus framing the war as a moral imperative."}, {"text": "Criticize corporations that might profit from the war, aligning with Butler's later views.", "isCorrect": false, "rationale": "Wilson *omitted* these discussions; he did not criticize them, nor did he align with Butler's views, which he implicitly contrasts with."}, {"text": "Admit that American neutrality had never been truly neutral due to financial interests.", "isCorrect": false, "rationale": "The text states, 'Wilson does not ask his audience to consider whether American 'neutrality' was ever truly neutral,' meaning he avoided admitting this."}], "id": "q08"}, {"question": "A 'critical reader' might question Wilson's stance on 'neutral rights on the high seas' due to his failure to mention:", "options": [{"text": "The Zimmermann Telegram as a violation of American sovereignty.", "isCorrect": false, "rationale": "The Zimmermann Telegram is about German hostility and plotting against American territory, not primarily a violation of neutral rights on the high seas, and Wilson *did* mention it as evidence."}, {"text": "The British blockade, which also violated neutral rights by seizing American cargo.", "isCorrect": true, "rationale": "The text specifically states: 'He does not mention the British blockade. Wilson frames the submarine crisis as an unprovoked assault on neutral rights, but he does not acknowledge that Britain was also violating neutral rights... A critical reader might ask: if the principle at stake is neutral rights on the high seas, why does the violation of those rights matter only when Germany does it?'"}, {"text": "The historical precedents of naval warfare and blockades.", "isCorrect": false, "rationale": "While a broader historical context might be relevant, the text specifically points to the British blockade as a direct omission regarding neutral rights violations."}, {"text": "The differing legal interpretations of international maritime law by various nations.", "isCorrect": false, "rationale": "The text focuses on the *factual omission* of Britain's similar actions, not a debate over legal interpretations."}], "id": "q09"}, {"question": "Regarding the 'Common Misreading' caution, identifying omissions in Wilson's argument is significant because:", "options": [{"text": "It definitively proves that Wilson's entire argument was dishonest and manipulative.", "isCorrect": false, "rationale": "The caution explicitly states: 'That is not necessarily the case. Every argument must be selective.' So, it does not *definitively* prove dishonesty."}, {"text": "It highlights areas where Wilson chose to focus or deflect, which could be strategic or practical.", "isCorrect": true, "rationale": "The caution explains that omissions are 'whether the omissions are strategic (the speaker is hiding something) or practical (the speaker is focusing on what matters most to the audience and occasion). With Wilson, both interpretations have merit.'"}, {"text": "It demonstrates that Wilson lacked a comprehensive understanding of international affairs.", "isCorrect": false, "rationale": "The text does not suggest Wilson lacked understanding; rather, it analyzes his *rhetorical choices* in crafting his argument."}, {"text": "It suggests that arguments containing omissions are inherently weak and invalid.", "isCorrect": false, "rationale": "The caution refutes this, stating that 'Every argument must be selective' and an omission doesn't necessarily mean an argument is 'dishonest or wrong.'"}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
