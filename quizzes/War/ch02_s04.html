<script>
var QUESTIONS = [{"question": "What is the correct sequence of the three stages in Smedley Butler's argument, as outlined in the text from Chapters 1–2 of 'The Racket Revealed'?", "options": [{"text": "Presentation of evidence, definition of the problem, channeling moral outrage.", "isCorrect": false, "rationale": "This sequence is incorrect. Butler begins by defining the problem before presenting evidence."}, {"text": "Definition of the problem, presentation of evidence, channeling moral outrage.", "isCorrect": true, "rationale": "The text explicitly states Butler's argument unfolds in three stages: 'he defines the problem, he presents the evidence, and he channels the moral outrage'."}, {"text": "Channeling moral outrage, definition of the problem, presentation of evidence.", "isCorrect": false, "rationale": "This sequence is incorrect. Moral outrage is the final stage, building upon the previous two."}, {"text": "Defining war profiteering, listing corporate profits, discussing human cost.", "isCorrect": false, "rationale": "While these are elements of the argument, they are not the overarching three stages, but rather details within them (e.g., listing profits is part of presenting evidence)."}], "id": "q01"}, {"question": "By opening with a 'sweeping, categorical claim' that war itself is a 'racket,' rather than arguing that specific wars are unjust, what rhetorical effect does Butler achieve?", "options": [{"text": "He limits the scope of his argument, making it easier to defend.", "isCorrect": false, "rationale": "His categorical claim makes the scope very broad, encompassing 'war itself,' not limiting it."}, {"text": "He allows for a nuanced discussion about the causes and justifications of various conflicts.", "isCorrect": false, "rationale": "The text states his 'absolute statement' leaves 'no middle ground,' forcing readers to accept or argue against his framing, which is not conducive to nuanced discussion of specific conflicts."}, {"text": "He immediately forces the reader to either accept his fundamental premise or directly challenge his entire framing of war.", "isCorrect": true, "rationale": "The text explains, 'By opening with this absolute statement, Butler forces the reader to either accept his framing or argue against it. There is no middle ground.'"}, {"text": "He prioritizes emotional appeal over factual evidence in his initial argument.", "isCorrect": false, "rationale": "While his definition is a bold rhetorical move, it's not solely about emotion; it's about establishing a premise. Factual evidence comes in Stage Two."}], "id": "q02"}, {"question": "According to Butler's 'Central Thesis,' war is a racket because it operates like organized crime. Which scenario best exemplifies this thesis?", "options": [{"text": "A government increases its military budget to upgrade outdated equipment and improve soldier welfare.", "isCorrect": false, "rationale": "While related to military spending, this scenario doesn't explicitly involve 'insiders' reaping 'enormous profits' at the public's expense and deception, which is central to Butler's definition of a racket."}, {"text": "A small group of industrial executives and bankers significantly increase their personal wealth through lucrative wartime government contracts, while the general populace endures high casualties and economic hardship.", "isCorrect": true, "rationale": "This directly reflects Butler's thesis: 'a small group of insiders (industrialists, bankers, arms manufacturers) reap enormous profits, while the general public pays the cost in blood, treasure, and broken lives.'"}, {"text": "An international coalition forms to intervene in a humanitarian crisis, leading to shared financial and military burdens among member nations.", "isCorrect": false, "rationale": "This describes international cooperation for a stated humanitarian purpose, not the self-serving, deceptive profit motive Butler describes as a 'racket.'"}, {"text": "Soldiers volunteer for military service motivated by patriotism and a sense of duty to their country.", "isCorrect": false, "rationale": "This describes the motivations of soldiers, but not the systemic profit-making by insiders at the public's expense that defines war as a racket for Butler."}], "id": "q03"}, {"question": "In Stage Two, 'The Evidence,' what is the most prominent type of support Butler uses to demonstrate wartime profiteering?", "options": [{"text": "Personal testimonies and letters from soldiers describing their hardships.", "isCorrect": false, "rationale": "While human cost is discussed later, Stage Two focuses on financial evidence. Personal testimonies are more aligned with Stage Three's moral reckoning."}, {"text": "Detailed historical accounts of specific battles and military strategies.", "isCorrect": false, "rationale": "Butler's evidence in Stage Two is not focused on military tactics but on economic data."}, {"text": "Specific, documented financial figures showing enormous increases in profits for named corporations during the war compared to peacetime.", "isCorrect": true, "rationale": "The text explicitly states: 'Chapter 2 is where the numbers appear, and the numbers are staggering. Butler catalogs the wartime profits of specific American industries... He names the companies. He cites the dollar figures. He compares peacetime earnings to wartime earnings.'"}, {"text": "Philosophical arguments about the inherent injustice of armed conflict.", "isCorrect": false, "rationale": "Butler uses 'logos at its most concrete,' focusing on 'documented facts' rather than abstract philosophical arguments in Stage Two."}], "id": "q04"}, {"question": "The text defines war profiteering as making 'excessive profits from the sale of goods or services to a government during wartime.' Butler goes further, asserting that war profiteering is 'not an abuse of the system but the system's actual purpose.' What critical implication does this assertion have for Butler's overall argument?", "options": [{"text": "It suggests that war profiteering is an accidental byproduct of war that can be easily remedied with better oversight.", "isCorrect": false, "rationale": "If it's the 'system's actual purpose,' it's not accidental and implies a fundamental design, making easy remedies unlikely from Butler's perspective."}, {"text": "It implies that the primary objective of war, from the perspective of the 'insiders,' is the accumulation of wealth rather than national defense or ideological conflict.", "isCorrect": true, "rationale": "By stating it's the 'system's actual purpose,' Butler is fundamentally claiming that the *true objective* behind war, for those who orchestrate and profit, is financial gain, irrespective of any stated noble reasons."}, {"text": "It clarifies that only specific individuals, not the system itself, are responsible for exploiting wartime conditions.", "isCorrect": false, "rationale": "The phrase 'the system's actual purpose' indicates a systemic issue, not just the actions of a few individuals."}, {"text": "It argues that war profiteering is a necessary evil that ensures wartime industrial productivity.", "isCorrect": false, "rationale": "Butler defines war as a 'racket,' not a 'necessary evil,' and certainly does not endorse profiteering as beneficial for the system."}], "id": "q05"}, {"question": "Butler's argument hinges on the 'asymmetry of cost and profit.' Which of the following scenarios best illustrates this core concept?", "options": [{"text": "A national economy experiences a boom during wartime due to increased manufacturing and employment.", "isCorrect": false, "rationale": "While an economic effect of war, this doesn't highlight the specific asymmetry between those who profit financially and those who suffer human cost."}, {"text": "Soldiers, often from working-class backgrounds, suffer severe injuries or death on the battlefield, while corporate executives and shareholders of war-related industries accrue vast fortunes and remain physically safe.", "isCorrect": true, "rationale": "This precisely captures the 'asymmetry': 'the people who profit from war are not the people who fight it. The industrialists, the bankers, and the arms dealers stay safely at home. The soldiers — and their families — bear the cost in suffering, disability, and death.'"}, {"text": "A government raises taxes on all citizens to fund military operations during a conflict.", "isCorrect": false, "rationale": "This describes how the public funds the war (a cost), but doesn't explicitly contrast this cost with the profits of a select few insiders or the human toll on soldiers."}, {"text": "A country develops advanced military technology that gives its forces a strategic advantage in combat.", "isCorrect": false, "rationale": "This relates to military capability, not the core asymmetry of who benefits (financially) versus who pays the ultimate human price."}], "id": "q06"}, {"question": "Butler 'deliberately placed' his accounting of the human cost (Stage Three) after the financial evidence (Stage Two). What is the primary rhetorical reason for this structural choice?", "options": [{"text": "To first establish the grim reality of combat before detailing the financial incentives.", "isCorrect": false, "rationale": "The order is reversed; human cost comes after financial profits. The text specifies this order to build impact."}, {"text": "To allow the reader to fully grasp the 'obscenity of the profits' before being confronted with the devastating human 'price' of war.", "isCorrect": true, "rationale": "The text states this directly: 'Butler's accounting of the human cost is deliberately placed after the financial evidence, so the reader has already absorbed the obscenity of the profits before being confronted with the price.'"}, {"text": "To separate logical arguments from emotional appeals, ensuring the evidence stands on its own.", "isCorrect": false, "rationale": "Butler intentionally combines them for 'cumulative force,' not separation, to amplify the moral outrage."}, {"text": "To suggest that economic hardship is a more significant consequence of war than human suffering.", "isCorrect": false, "rationale": "Butler clearly emphasizes the 'blood gains' and 'human cost,' indicating that human suffering is paramount, but its impact is heightened by preceding financial obscenity."}], "id": "q07"}, {"question": "The text notes that Butler's thesis is 'sweeping' and raises questions he doesn't fully address in these early chapters. Which of the following is explicitly mentioned as a question Butler leaves open?", "options": [{"text": "Whether the specific corporations he named actually engaged in illegal activities.", "isCorrect": false, "rationale": "The text focuses on 'excessive profits,' not necessarily the legality of their actions within the framework of his argument about the 'racket.'"}, {"text": "The precise number of casualties in World War I.", "isCorrect": false, "rationale": "While he mentions millions killed, the exact count is not listed as a question he leaves open for his argument."}, {"text": "Whether the existence of profit from war necessarily proves that profit was the fundamental purpose of the war.", "isCorrect": true, "rationale": "The text states: 'But does the existence of profit prove that profit was the purpose of the war? This is a crucial logical distinction that Butler does not always make explicit.'"}, {"text": "His personal experiences and involvement in military conflicts.", "isCorrect": false, "rationale": "Butler's personal experiences are not listed as an unaddressed question within the logical structure of his argument in these chapters."}], "id": "q08"}, {"question": "Butler's central claim is that war is a 'racket,' like organized crime. Which characteristic of a racket, as defined by Butler, is most crucial to understanding his condemnation of war?", "options": [{"text": "That it involves violent acts and military confrontation.", "isCorrect": false, "rationale": "While war involves violence, the definition of a racket emphasizes benefits to a few at the expense of many and public deception, not just violence itself."}, {"text": "That it is 'not what it seems to the majority of the people,' benefiting a small group of insiders at the expense of the many who pay the cost.", "isCorrect": true, "rationale": "The text defines a racket as 'something that benefits a few insiders at the expense of the many, something that is 'not what it seems to the majority of the people'.' This deception and asymmetry of benefit/cost is central."}, {"text": "That it always leads to the creation of new millionaires and billionaires.", "isCorrect": false, "rationale": "The creation of millionaires is presented as evidence of profits in Stage Two, but the fundamental definition of a racket is broader, focusing on who benefits and who pays."}, {"text": "That it is inherently an illegal activity according to international law.", "isCorrect": false, "rationale": "Butler frames war as a 'criminal scheme' metaphorically; his focus is on the moral and economic criminality of the system, not necessarily its legality under existing international statutes."}], "id": "q09"}, {"question": "Imagine you are applying Butler's analytical framework from Chapters 1-2 to a new, hypothetical conflict. Based on his three-stage structure, what would be your *absolute first step* in analyzing this conflict through his lens?", "options": [{"text": "Quantify the human casualties and suffering endured by soldiers and civilians.", "isCorrect": false, "rationale": "This would be part of Stage Three, 'The Moral Reckoning,' which comes after the definition and evidence stages."}, {"text": "Identify companies that have seen a significant increase in profits due to their involvement in supplying goods or services for the conflict.", "isCorrect": false, "rationale": "This is a key part of Stage Two, 'The Evidence,' which follows the initial definition of the problem."}, {"text": "Define the nature of the conflict, specifically determining if it fits the criteria of a 'racket' benefitting a few at the expense of the many.", "isCorrect": true, "rationale": "Butler's argument begins with Stage One, 'The Definition.' He opens by defining war as a racket, so applying his framework would start by attempting to define the new conflict similarly."}, {"text": "Interview politicians and military leaders to understand their stated motivations for engaging in the conflict.", "isCorrect": false, "rationale": "While understanding stated motivations might be background, Butler's framework focuses on uncovering the *true*, hidden purpose (the racket) rather than simply accepting stated reasons."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
