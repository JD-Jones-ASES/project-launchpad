<script>
var QUESTIONS = [{"question": "What is the correct sequence of the three stages in Smedley Butler's argument in Chapters 1 and 2?", "options": [{"text": "Presenting evidence, defining the problem, channeling moral outrage.", "isCorrect": false, "rationale": "The text states the order is 'he defines the problem, he presents the evidence, and he channels the moral outrage'."}, {"text": "Defining the problem, presenting the evidence, channeling the moral outrage.", "isCorrect": true, "rationale": "The text explicitly outlines Butler's three-stage argument as: Stage One (Definition), Stage Two (Evidence), and Stage Three (Moral Reckoning)."}, {"text": "Defining the problem, channeling moral outrage, presenting evidence.", "isCorrect": false, "rationale": "The text states the order is 'he defines the problem, he presents the evidence, and he channels the moral outrage'."}, {"text": "Channeling moral outrage, defining the problem, presenting evidence.", "isCorrect": false, "rationale": "The text states the order is 'he defines the problem, he presents the evidence, and he channels the moral outrage'."}], "id": "q01"}, {"question": "Smedley Butler deliberately uses the word 'racket' to describe war primarily because:", "options": [{"text": "It was a popular slang term in 1935, making his argument more accessible to the public.", "isCorrect": false, "rationale": "While 'racket' was associated with the Prohibition era, Butler's primary motivation was to establish a moral equivalency, not just to be accessible."}, {"text": "He believed war was an inefficient system, similar to a poorly run business operation.", "isCorrect": false, "rationale": "Butler's use of 'racket' implies criminality and exploitation, not mere inefficiency."}, {"text": "It associates war with organized crime and places it in the same moral category as the Mafia.", "isCorrect": true, "rationale": "The text explicitly states that 'By calling war a racket, Butler places it in the same moral category as the Mafia' to signify it as a criminal scheme."}, {"text": "He wanted to emphasize the noise and chaos inherent in battle and the military industrial complex.", "isCorrect": false, "rationale": "The textual explanation of 'racket' relates to deceit, insider profit, and criminality, not literal noise or chaos."}], "id": "q02"}, {"question": "Which statement best summarizes Smedley Butler's central thesis presented in Chapters 1-2?", "options": [{"text": "War is sometimes unjust and fought for the wrong reasons, but can be noble in defense.", "isCorrect": false, "rationale": "The text notes Butler 'makes a sweeping, categorical claim: war itself is a racket,' indicating no room for 'sometimes unjust' or 'noble' exceptions in his initial framing."}, {"text": "War is a necessary evil that, despite its costs, sometimes serves a greater good for national interest.", "isCorrect": false, "rationale": "Butler explicitly states war is 'not a noble enterprise, not a necessary evil,' directly contradicting this option."}, {"text": "War is a criminal scheme, benefiting a few insiders at the expense of the many, operating exactly like organized crime.", "isCorrect": true, "rationale": "The 'keyconcept: Butler's Central Thesis' directly states this: 'War is a racket because it operates exactly like organized crime: a small group of insiders... reap enormous profits, while the general public pays the cost...'"}, {"text": "War profiteering is an unfortunate but largely unavoidable side effect of large-scale military conflicts.", "isCorrect": false, "rationale": "Butler argues that war profiteering is 'not an abuse of the system but the system's actual purpose,' suggesting it's central, not a side effect."}], "id": "q03"}, {"question": "By opening with the absolute statement that 'war itself is a racket,' Butler primarily intends to:", "options": [{"text": "Offer a nuanced perspective on the historical justifications for various conflicts.", "isCorrect": false, "rationale": "The text states Butler makes a 'sweeping, categorical claim' and 'There is no middle ground,' which contradicts a nuanced approach."}, {"text": "Immediately present his proposed solutions for ending war and preventing future conflicts.", "isCorrect": false, "rationale": "The text indicates Butler addresses solutions in Chapters 3-5, not in these opening chapters."}, {"text": "Force the reader to either accept his categorical framing or argue against it, eliminating any middle ground.", "isCorrect": true, "rationale": "The text explicitly states: 'By opening with this absolute statement, Butler forces the reader to either accept his framing or argue against it. There is no middle ground.'"}, {"text": "Suggest that only specific, historically documented wars were rackets, not all wars.", "isCorrect": false, "rationale": "Butler's statement is 'categorical' and 'war itself is a racket. It always has been,' implying a universal claim, though the text later questions if his evidence supports this scope."}], "id": "q04"}, {"question": "Which example from Stage Two best illustrates Butler's use of *logos* as described in the text?", "options": [{"text": "His vivid descriptions of soldiers' suffering and the human cost of war.", "isCorrect": false, "rationale": "Vivid descriptions and human cost are elements of Stage Three (Moral Reckoning) and primarily appeal to pathos, not logos."}, {"text": "His specific citation of Du Pont's wartime profit increase from $6,000,000 to $58,000,000.", "isCorrect": true, "rationale": "The text defines logos as an appeal based on 'logic, reason, and evidence — including facts, statistics, and logical arguments.' The specific profit numbers are concrete facts and statistics, demonstrating logos."}, {"text": "His initial categorical claim that war is a racket, associating it with the Mafia.", "isCorrect": false, "rationale": "This is from Stage One and is a rhetorical framing device, not direct evidence or statistics appealing to logos in the way the profits are."}, {"text": "His questioning of how many war millionaires shouldered a rifle or dug a trench.", "isCorrect": false, "rationale": "This is from Stage Three (Moral Reckoning) and serves to channel moral outrage, which is more aligned with pathos."}], "id": "q05"}, {"question": "According to Butler's argument, as presented in the 'War Profiteering' definition box, what is the *true* nature of war profiteering?", "options": [{"text": "It is a rare occurrence, an abuse of the system by a few unscrupulous individuals.", "isCorrect": false, "rationale": "The text states Butler's 'central charge is that war profiteering is not an abuse of the system but the system's actual purpose.'"}, {"text": "It is an unfortunate but largely unavoidable consequence of wartime economic mobilization.", "isCorrect": false, "rationale": "Butler views it as the fundamental purpose, not a mere consequence."}, {"text": "It is the system's actual purpose, where excessive profits are made from conflict, benefiting from suffering.", "isCorrect": true, "rationale": "The definition box explicitly states: 'Butler's central charge is that war profiteering is not an abuse of the system but the system's actual purpose.'"}, {"text": "It is a necessary incentive to encourage industries to produce vital wartime supplies efficiently.", "isCorrect": false, "rationale": "The term 'war profiteering' carries a 'strong negative connotation' in the text, linking it to benefiting from suffering, not as a positive incentive."}], "id": "q06"}, {"question": "The 'asymmetry of cost and profit' is a key concept in Butler's moral reckoning. Which statement accurately describes this asymmetry?", "options": [{"text": "The financial profits from war are consistently lower than the actual monetary cost of conducting the war.", "isCorrect": false, "rationale": "The concept focuses on the *disparity between who profits and who pays the human cost*, not the overall financial balance of the war."}, {"text": "The people who profit enormously from war are typically not the ones who bear the direct human costs of fighting it.", "isCorrect": true, "rationale": "The 'keyconcept: The Asymmetry of Cost and Profit' states: 'the people who profit from war are not the people who fight it. The industrialists... stay safely at home. The soldiers... bear the cost in suffering, disability, and death.'"}, {"text": "The financial gains of corporations during wartime are disproportionately large compared to their peacetime earnings.", "isCorrect": false, "rationale": "While true and part of Butler's evidence, this describes the magnitude of profit increase, not the asymmetry of *who* bears the cost versus *who* profits, which is the specific focus of the key concept."}, {"text": "The number of new millionaires created during war is far greater than the number of soldiers wounded or killed.", "isCorrect": false, "rationale": "The text doesn't make this specific quantitative comparison, but rather highlights the *type* of people (profiteers vs. soldiers) involved in the asymmetry."}], "id": "q07"}, {"question": "How does the order of Butler's three-stage argument contribute to its 'cumulative force'?", "options": [{"text": "By starting with moral outrage, he ensures emotional engagement before presenting facts.", "isCorrect": false, "rationale": "Moral outrage is the *last* stage, not the first."}, {"text": "By presenting evidence first, he establishes credibility before making bold claims.", "isCorrect": false, "rationale": "The *definition* is presented first, followed by evidence, then moral outrage."}, {"text": "Each stage builds logically on the previous one, moving from defining the crime, to proving it, to explaining its significance.", "isCorrect": true, "rationale": "The text states: 'Each stage builds on the one before it. The definition tells you what to look for. The evidence shows you it is real. The moral reckoning tells you why it matters.'"}, {"text": "He introduces solutions early, allowing readers to consider practical applications throughout his critique.", "isCorrect": false, "rationale": "The text explicitly states that Butler addresses solutions in later chapters (3-5), not in these opening chapters."}], "id": "q08"}, {"question": "According to the text, which of the following is a question Butler *does not* fully address in Chapters 1 and 2?", "options": [{"text": "What specific corporations profited immensely from the World War?", "isCorrect": false, "rationale": "Butler explicitly names companies like Du Pont, Bethlehem Steel, and U.S. Steel, and provides their profit figures in Stage Two."}, {"text": "Does his argument apply to wars of national defense or against genuine tyranny?", "isCorrect": true, "rationale": "The text lists this as one of the 'Questions Butler Leaves Open,' specifically noting that his evidence is mostly from a single conflict, raising questions about the scope of his categorical claim."}, {"text": "What was the magnitude of profit increases for specific industries during the war?", "isCorrect": false, "rationale": "Butler provides specific dollar figures for wartime profit increases for several companies in Stage Two, demonstrating the magnitude."}, {"text": "How many new millionaires and billionaires were created in the United States during the war?", "isCorrect": false, "rationale": "The text explicitly states: 'At least 21,000 new millionaires and billionaires were created in the United States during the war,' addressing this question."}], "id": "q09"}, {"question": "If a contemporary critic were to apply Butler's methodology to a modern conflict, what would be the most crucial initial step they would undertake after defining the conflict as a 'racket'?", "options": [{"text": "Interviewing veterans to document the psychological and physical toll of combat.", "isCorrect": false, "rationale": "While important, this aligns with the 'moral reckoning' stage (Stage Three), which comes *after* presenting the financial evidence."}, {"text": "Calling for immediate legislative action to prevent war profiteering in the future.", "isCorrect": false, "rationale": "Proposing solutions or actions comes in later chapters of Butler's work (Chapters 3-5), not as an initial step in building the argument in Chapters 1-2."}, {"text": "Categorically defining the conflict as a 'racket,' associating it with exploitative schemes, and then seeking specific financial evidence of insider profit.", "isCorrect": true, "rationale": "Butler's methodology begins with defining war as a racket (Stage One) and then immediately moves to presenting detailed financial evidence of profiteering (Stage Two) to prove his claim, before moving to the moral reckoning."}, {"text": "Engaging in an in-depth debate on the geopolitical complexities and necessity of the conflict.", "isCorrect": false, "rationale": "Butler's approach avoids a 'middle ground' debate on necessity; he makes a sweeping, categorical claim that war *is* a racket, rather than debating if it *could be* justified."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
