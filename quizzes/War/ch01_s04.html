        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "According to Holmes, what is the primary failing of Gilded Age American society that leads to his \"diagnosis\"?", "options": [{"text": "A resurgence of religious fundamentalism replacing scientific inquiry.", "isCorrect": false, "rationale": "While Holmes notes the corrosive effects of scientific materialism, his primary critique is not a resurgence of religious fundamentalism but a societal shift away from traditional virtues."}, {"text": "A devotion to comfort, profit, and the avoidance of pain, replacing hard virtues.", "isCorrect": true, "rationale": "The text states, 'Holmes argues that Gilded Age America has become a society devoted to comfort, profit, and the avoidance of pain. He sees this not as progress but as decline — a nation that has traded the hard virtues of its warrior past for the soft pleasures of material success.'"}, {"text": "An overemphasis on military expansion and conquest.", "isCorrect": false, "rationale": "Holmes' diagnosis is a 'critique of peace,' not an overemphasis on military expansion. He finds society too soft, not too militaristic."}, {"text": "A lack of national unity due to regional political disputes.", "isCorrect": false, "rationale": "The text does not mention regional political disputes as a key part of Holmes' critique of Gilded Age society."}], "id": "q01"}, {"question": "What does Holmes propose as the \"cure\" for the societal \"disease\" he diagnoses?", "options": [{"text": "A return to traditional religious values and institutions.", "isCorrect": false, "rationale": "While Holmes critiques the dissolution of old religious certainties, his proposed cure is not explicitly a return to religious institutions but the cultivation of specific virtues."}, {"text": "The cultivation of virtues fostered by war, such as courage, obedience, and faith.", "isCorrect": true, "rationale": "The text explicitly states, 'Having diagnosed the disease, Holmes offers his cure: the virtues that war cultivates. These are... courage in the face of death, obedience to duty... and above all, the capacity for faith.'"}, {"text": "Increased government regulation to curb corporate greed and promote social welfare.", "isCorrect": false, "rationale": "Holmes' critique targets societal values and individual virtues, not governmental policies or economic regulation."}, {"text": "Greater investment in scientific research to overcome human suffering.", "isCorrect": false, "rationale": "Holmes critiques the 'revolt against suffering' and the 'corrosive effects of scientific materialism,' suggesting he would not see scientific research as the primary cure for societal decline."}], "id": "q02"}, {"question": "Holmes defines \"The Soldier's Faith\" as the supreme expression of human nobility. Which of the following best characterizes this concept?", "options": [{"text": "The conviction that one's cause is just and will lead to a favorable outcome.", "isCorrect": false, "rationale": "The text explicitly states, 'He is not claiming that the soldier's faith leads to good outcomes... His argument is more radical than any of these: he claims that the act of faith itself — regardless of whether the cause is right or the outcome favorable — is the highest thing a human being can do.'"}, {"text": "The willingness to die for a cause, acting on belief without certainty or guaranteed reward.", "isCorrect": true, "rationale": "The text defines it as 'the soldier's willingness to die for a cause he does not fully understand, in a plan he did not choose, under orders he cannot question. This “blind” faith — acting without certainty, sacrificing without guarantee of reward — is, for Holmes, the supreme expression of human nobility.'"}, {"text": "The rational decision to sacrifice personal safety for strategic military advantage.", "isCorrect": false, "rationale": "Holmes emphasizes 'obedience to duty even when duty makes no rational sense' and acting 'without certainty,' which contradicts the idea of a purely rational decision."}, {"text": "The ability to understand and justify the political motivations behind a war.", "isCorrect": false, "rationale": "Holmes explicitly states that he is not discussing the political causes or justification of specific wars."}], "id": "q03"}, {"question": "Which of the following statements accurately reflects a point Holmes *explicitly avoids* making in \"The Soldier's Faith\"?", "options": [{"text": "That war is inherently horrible and dull.", "isCorrect": false, "rationale": "The 'caution' section notes that 'Holmes explicitly says that war 'is horrible and dull',' meaning he *does* make this point, rather than avoiding it."}, {"text": "That the qualities war demands are indispensable.", "isCorrect": false, "rationale": "This is a central claim of Holmes' argument, not something he avoids. The text states, 'His argument is not that war is pleasant but that the qualities war demands are indispensable.'"}, {"text": "That any particular war was just or that the Union cause was superior.", "isCorrect": true, "rationale": "The text states under 'Notice what Holmes is not saying': 'He is not arguing that any particular war was just. He is not defending the Union cause or attacking the Confederacy.'"}, {"text": "That the warrior ideal is an inheritance of Western civilization.", "isCorrect": false, "rationale": "Holmes *does* argue this, using 'Cultural and literary tradition' like Beowulf and Tennyson as evidence."}], "id": "q04"}, {"question": "What are the two primary sources of evidence Holmes uses to support his claims about martial virtue?", "options": [{"text": "Economic data on wartime profits and sociological studies of soldier rehabilitation.", "isCorrect": false, "rationale": "Holmes explicitly omits the economic dimension of war and does not mention studies on soldier rehabilitation."}, {"text": "Personal combat experience and appeals to Western cultural and literary tradition.", "isCorrect": true, "rationale": "The text enumerates these as his two principal sources: 'His own combat experience' and 'Cultural and literary tradition. Holmes invokes Beowulf, Tennyson, Swinburne, and Spenser...'"}, {"text": "Philosophical treatises on ethics and contemporary political manifestos.", "isCorrect": false, "rationale": "While his argument is philosophical, his direct evidence is not presented as formal treatises or political manifestos."}, {"text": "Historical accounts of specific military victories and strategic analyses.", "isCorrect": false, "rationale": "Holmes avoids discussing the political causes or justifications of specific wars, making it unlikely he would rely on detailed accounts of specific victories or strategic analyses."}], "id": "q05"}, {"question": "According to the \"argumentmap\" provided in the text, what is the unstated assumption in Holmes' reasoning?", "options": [{"text": "That all societies will eventually succumb to moral complacency if not challenged by war.", "isCorrect": false, "rationale": "While related to his overall concern, this is not the specific 'Unstated assumption' explicitly stated in the argument map."}, {"text": "That war is an inevitable and permanent feature of human existence.", "isCorrect": false, "rationale": "Holmes treats war as such, but the specific 'Unstated assumption' in the argument map is more focused on the cultivation of virtues."}, {"text": "That the virtues developed through war cannot be cultivated by any other means.", "isCorrect": true, "rationale": "The argument map explicitly lists: 'Unstated assumption: The virtues developed through war cannot be cultivated by any other means.'"}, {"text": "That officers' experiences of war are identical to those of enlisted men.", "isCorrect": false, "rationale": "This is listed as a 'question worth asking' regarding what Holmes leaves out, not an unstated assumption of his argument."}], "id": "q06"}, {"question": "The text highlights several significant omissions in Holmes' argument. Which of the following is *not* listed as something Holmes leaves out?", "options": [{"text": "Who profits from war.", "isCorrect": false, "rationale": "The text explicitly states: 'He does not discuss who profits from war.'"}, {"text": "The political causes or justification of specific wars.", "isCorrect": false, "rationale": "The text explicitly states: 'He does not discuss the political causes of specific wars.'"}, {"text": "The long-term psychological effects of combat on veterans.", "isCorrect": true, "rationale": "While Holmes does not dwell on the 'suffering of common soldiers,' the specific phrase 'long-term psychological effects of combat on veterans' is not listed among the explicit omissions in the text's 'What Holmes Leaves Out' section."}, {"text": "The suffering and futility experienced by common soldiers.", "isCorrect": false, "rationale": "The text explicitly states: 'He does not dwell on the suffering of common soldiers.'"}], "id": "q07"}, {"question": "Why does the \"caution\" section warn against dismissing Holmes as a \"warmonger\"?", "options": [{"text": "Because he advocates for universal military conscription.", "isCorrect": false, "rationale": "The text does not mention Holmes advocating for universal military conscription."}, {"text": "Because he explicitly states that war is \"horrible and dull\" and hopes it won't be fought again soon.", "isCorrect": true, "rationale": "The 'caution' section states, 'Holmes explicitly says that war 'is horrible and dull' and that he hopes it will be long before America is called to fight again.' This clarifies that his argument is not pro-war for its own sake."}, {"text": "Because his primary focus is on promoting international peace treaties.", "isCorrect": false, "rationale": "Holmes' focus is on the virtues cultivated by war, not on promoting peace treaties."}, {"text": "Because he believes war is always justified for the sake of national honor.", "isCorrect": false, "rationale": "Holmes explicitly avoids discussing whether any particular war was just or justified."}], "id": "q08"}, {"question": "Considering Holmes' diagnosis of Gilded Age society and his proposed \"cure,\" which statement best summarizes his overarching philosophical concern?", "options": [{"text": "The need for strong governmental leadership to direct national purpose.", "isCorrect": false, "rationale": "Holmes' focus is on the moral and spiritual health of society and individuals, not on the structure or strength of government."}, {"text": "The danger of a society losing its capacity for essential virtues like sacrifice and faith due to excessive comfort.", "isCorrect": true, "rationale": "This statement synthesizes his 'Diagnosis: A Society Gone Soft' (devotion to comfort, profit, avoidance of pain) and his 'Prescription: Martial Virtue' (cultivating sacrifice, courage, and faith), reflecting his core argument map reasoning: 'A society that knows only comfort will lose the capacity for sacrifice, courage, and faith. War — or at minimum, the willingness to face danger — is the antidote to moral complacency.'"}, {"text": "The superiority of military power in resolving international disputes.", "isCorrect": false, "rationale": "Holmes deliberately omits the political causes of wars and does not focus on military power as a means of dispute resolution."}, {"text": "The importance of historical accuracy in recounting military events.", "isCorrect": false, "rationale": "While he uses personal experience as evidence, his central concern is about virtues and societal health, not the meticulous accuracy of historical accounts."}], "id": "q09"}, {"question": "What does the text suggest is the ultimate significance of war for Holmes, especially given what he chooses to omit from his argument?", "options": [{"text": "Its ability to redistribute wealth and challenge economic hierarchies.", "isCorrect": false, "rationale": "Holmes explicitly omits the economic dimension of war ('who profits from war')."}, {"text": "Its capacity to reveal and cultivate humanity's spiritual dimensions of faith and sacrifice.", "isCorrect": true, "rationale": "The final paragraph states, 'For Holmes, the meaning of war lies not in its politics or its economics but in its spiritual dimension — in what it reveals about the human capacity for faith and sacrifice.' His omissions reinforce this focus."}, {"text": "Its role in establishing national identity and consolidating political power.", "isCorrect": false, "rationale": "Holmes deliberately avoids the political causes and justifications of specific wars, suggesting this is not his primary focus."}, {"text": "Its contribution to technological advancement and industrial innovation.", "isCorrect": false, "rationale": "The text does not mention technological or industrial contributions of war as a point of significance for Holmes."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
