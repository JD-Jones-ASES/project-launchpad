<script>
var QUESTIONS = [{"question": "According to Holmes' initial diagnosis, what has become the defining characteristic of Gilded Age American society, leading to its decline?", "options": [{"text": "A renewed emphasis on religious certainty and spiritual enlightenment.", "isCorrect": false, "rationale": "Holmes argues that scientific materialism has dissolved old religious certainties, not renewed them. This option contradicts his diagnosis."}, {"text": "A shift from martial honor and hard virtues to comfort, profit, and the avoidance of pain.", "isCorrect": true, "rationale": "The text explicitly states that Holmes sees Gilded Age America as 'a society devoted to comfort, profit, and the avoidance of pain,' trading 'hard virtues of its warrior past for the soft pleasures of material success.' This is his core cultural critique."}, {"text": "An unprecedented expansion of democratic ideals and social equality.", "isCorrect": false, "rationale": "While such changes might have been occurring, Holmes' critique focuses on the moral and cultural decline he perceives, not political or social advancements in this context."}, {"text": "A resurgence of interest in traditional literary and artistic expressions.", "isCorrect": false, "rationale": "Holmes uses cultural and literary tradition as evidence for his solution, but his diagnosis of society's decline points to a loss of core virtues, not a lack of interest in arts."}]}, {"question": "Why is Holmes' critique of Gilded Age peace and societal softness considered 'the foundation of everything that follows' in his argument?", "options": [{"text": "It demonstrates his deep knowledge of economic history.", "isCorrect": false, "rationale": "While he mentions commerce and wealth, his critique is primarily moral and cultural, not an economic analysis. His argument's foundation is conceptual, not historical data."}, {"text": "It establishes a shared feeling of loss that prepares the audience to accept his proposed solution of martial virtues.", "isCorrect": true, "rationale": "The text states, 'Holmes needs his audience to feel that something has been lost before he can argue for what should replace it.' This critique sets the stage for his 'prescription.'"}, {"text": "It provides a historical backdrop for the specific wars he will later advocate for.", "isCorrect": false, "rationale": "Holmes explicitly 'is not arguing that any particular war was just' and does not advocate for specific wars; he focuses on the virtues war cultivates."}, {"text": "It highlights the superior moral standing of the military over civilian life.", "isCorrect": false, "rationale": "While he promotes martial virtues, his critique is of society's *decline* in general, not an assertion of military moral superiority per se, but rather what society has lost."}]}, {"question": "The concept of 'Martial Virtue,' as defined in the text, primarily refers to:", "options": [{"text": "The ability to strategize and lead large armies effectively.", "isCorrect": false, "rationale": "While important in military service, the text defines 'Martial virtue' as qualities of character like 'courage, discipline, self-sacrifice, loyalty, and the willingness to act decisively,' not tactical leadership."}, {"text": "Qualities of character developed through military service, such as courage, discipline, and the capacity for faith.", "isCorrect": true, "rationale": "The text explicitly defines 'Martial virtue' as 'The qualities of character believed to be developed through military service and combat — courage, discipline, self-sacrifice, loyalty, and the willingness to act decisively... and above all, the capacity for faith.'"}, {"text": "The economic benefits and societal stability that a strong military provides.", "isCorrect": false, "rationale": "Holmes intentionally omits the economic dimensions of war. His focus is on character, not economic outcomes."}, {"text": "The intellectual capacity to question and challenge military orders when they lack rational sense.", "isCorrect": false, "rationale": "The text states martial virtue includes 'obedience to duty even when duty makes no rational sense,' which contradicts the idea of questioning orders."}]}, {"question": "According to Holmes, what is the 'supreme expression of human nobility' embodied in 'The Soldier's Faith'?", "options": [{"text": "The strategic genius required to win battles and minimize casualties.", "isCorrect": false, "rationale": "Holmes' focus is not on military outcomes or intellectual strategy, but on the act of faith and sacrifice itself."}, {"text": "The willingness to die for a cause without full understanding or certainty of outcome, driven by 'blind' faith.", "isCorrect": true, "rationale": "The text states, 'Holmes' central claim is that the highest human quality is the soldier's willingness to die for a cause he does not fully understand, in a plan he did not choose, under orders he cannot question. This “blind” faith... is, for Holmes, the supreme expression of human nobility.'"}, {"text": "The ability to convince others to join a cause through eloquent rhetoric and appeals to justice.", "isCorrect": false, "rationale": "This describes a form of persuasion, not the soldier's faith, which is an internal act of sacrifice and commitment."}, {"text": "The capacity to critically evaluate the political causes and justifications of a war.", "isCorrect": false, "rationale": "Holmes explicitly states that whether a particular war was necessary or justified 'is, for Holmes, beside the point.' His argument is more radical, focusing on the act of faith itself."}]}, {"question": "When discussing the soldier's faith, what is Holmes explicitly *not* arguing, which highlights the radical nature of his claim?", "options": [{"text": "That military service is beneficial for personal growth.", "isCorrect": false, "rationale": "This aligns with his argument that war cultivates virtues, so he *is* implicitly arguing this."}, {"text": "That martial virtues are superior to commercial virtues.", "isCorrect": false, "rationale": "This is a core part of his critique of Gilded Age society and his prescription, so he *is* arguing this."}, {"text": "That the cause for which one fights must be just or lead to good outcomes.", "isCorrect": true, "rationale": "The text states, 'He is not arguing that any particular war was just... He is not even claiming that the soldier's faith leads to good outcomes. His argument is more radical than any of these: he claims that the act of faith itself — regardless of whether the cause is right or the outcome favorable — is the highest thing a human being can do.'"}, {"text": "That courage is a desirable human quality.", "isCorrect": false, "rationale": "Courage is explicitly listed as a martial virtue and a key quality he promotes, so he *is* arguing this."}]}, {"question": "What are the two primary sources of evidence Holmes employs to support his claims about martial virtue?", "options": [{"text": "Statistical data on war casualties and economic impact.", "isCorrect": false, "rationale": "Holmes explicitly omits the economic dimension and suffering of common soldiers, so these are not his primary sources of evidence."}, {"text": "Philosophical treatises on ethics and contemporary political analyses.", "isCorrect": false, "rationale": "While he presents a philosophy, his evidence is rooted in personal experience and cultural memory, not abstract philosophical works or current politics."}, {"text": "His own combat experience and appeals to Western literary and cultural tradition.", "isCorrect": true, "rationale": "The text lists 'His own combat experience' (ethos) and 'Cultural and literary tradition' (invoking figures like Beowulf and Tennyson) as his two principal sources of evidence."}, {"text": "Interviews with decorated soldiers and historical documents from various wars.", "isCorrect": false, "rationale": "The text specifies his *own* experience and general cultural/literary tradition, not interviews or specific historical documents beyond his own memories."}]}, {"question": "According to the 'argumentmap' section, what is an *unstated assumption* underlying Holmes' argument?", "options": [{"text": "That all wars are inherently justifiable.", "isCorrect": false, "rationale": "Holmes explicitly states he is not arguing whether a particular war was just, so this is not an assumption."}, {"text": "That the virtues developed through war cannot be cultivated by any other means.", "isCorrect": true, "rationale": "The 'argumentmap' explicitly lists the 'Unstated assumption: The virtues developed through war cannot be cultivated by any other means.'"}, {"text": "That a society's wealth directly correlates with its moral decline.", "isCorrect": false, "rationale": "While he critiques wealth's worship, his argument is broader about comfort and avoidance of pain, and this isn't identified as an *unstated assumption* in the argument map."}, {"text": "That literary tradition accurately reflects universal human experiences.", "isCorrect": false, "rationale": "He uses literary tradition as evidence, but the 'unstated assumption' focuses on the *uniqueness* of war as a virtue cultivator, not the universality of literature."}]}, {"question": "Which of the following is a significant omission from Holmes' analysis of war, as highlighted in the text?", "options": [{"text": "The spiritual transcendence experienced by soldiers.", "isCorrect": false, "rationale": "Holmes *emphasizes* spiritual transcendence; this is not an omission but a focus of his argument."}, {"text": "The psychological impact of combat on officers.", "isCorrect": false, "rationale": "While he omits the suffering of *common soldiers*, the text doesn't specifically mention omitting officer psychology but rather the general 'suffering of common soldiers' and the officer-enlisted gap."}, {"text": "The economic dimensions of armed conflict and who profits from war.", "isCorrect": true, "rationale": "The text explicitly states: 'He does not discuss who profits from war. The economic dimension of armed conflict — who pays, who benefits, who bears the cost — is entirely absent from Holmes' analysis.'"}, {"text": "The importance of courage in the face of danger.", "isCorrect": false, "rationale": "Courage is a central martial virtue that Holmes champions; it is not an omission."}]}, {"question": "The 'A Common Misreading' caution explicitly warns against dismissing Holmes as a 'warmonger.' Why is this interpretation considered 'too simple'?", "options": [{"text": "Because Holmes was primarily an academic, not a military leader.", "isCorrect": false, "rationale": "While true, this is not the reason given in the text for why 'warmonger' is a misreading. The text focuses on his explicit statements about war."}, {"text": "Because he explicitly states that war 'is horrible and dull' and hopes America will not fight again soon.", "isCorrect": true, "rationale": "The text states: 'Holmes explicitly says that war “is horrible and dull” and that he hopes it will be long before America is called to fight again.' This directly counters the idea of him being a warmonger."}, {"text": "Because his argument is rooted in historical analysis rather than personal opinion.", "isCorrect": false, "rationale": "Holmes' argument is deeply personal (his own experience) and philosophical, not solely historical analysis."}, {"text": "Because he focuses on the positive outcomes of specific wars, not war in general.", "isCorrect": false, "rationale": "Holmes explicitly 'is not even claiming that the soldier's faith leads to good outcomes' and treats war as a permanent feature, not evaluating specific wars."}]}, {"question": "What overarching significance do Holmes' 'omissions' (e.g., economic dimensions, political causes, soldier suffering) hold for understanding his central argument?", "options": [{"text": "They reveal his limited understanding of the complexities of warfare.", "isCorrect": false, "rationale": "The text argues these omissions are 'not accidental' and reflect his 'deepest convictions,' implying deliberate choice, not limited understanding."}, {"text": "They demonstrate a strategic rhetorical choice to appeal only to certain segments of his audience.", "isCorrect": false, "rationale": "While rhetorical, the text frames them as reflecting his convictions, not just a strategic audience appeal."}, {"text": "They emphasize his focus on war's spiritual dimension and its capacity to reveal human faith and sacrifice, rather than its practical aspects.", "isCorrect": true, "rationale": "The concluding paragraph states: 'These omissions are not accidental. They reflect Holmes' deepest convictions about what matters. For Holmes, the meaning of war lies not in its politics or its economics but in its spiritual dimension — in what it reveals about the human capacity for faith and sacrifice.'"}, {"text": "They indicate his belief that these aspects are irrelevant to the experience of officers.", "isCorrect": false, "rationale": "While he was an officer, the text states his omissions are about the meaning of war universally, not just for officers, though the officer-enlisted gap is mentioned as a point *worth asking*."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
