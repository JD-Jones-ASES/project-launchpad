<script>
var QUESTIONS = [{"question": "Which of the following is a primary characteristic of the 'Victorian grand style' of oratory, as described in the text?", "options": [{"text": "Short, direct sentences focused on conveying information efficiently.", "isCorrect": false, "rationale": "This describes a more modern style of writing, contrasting with the Victorian grand style's preference for long, complex sentences."}, {"text": "Long, complex sentences, elevated diction, and classical and literary allusions.", "isCorrect": true, "rationale": "The text explicitly states that the Victorian grand style is 'characterized by long, complex sentences, elevated diction, classical and literary allusions, and a deliberate building of emotional intensity'."}, {"text": "An informal, conversational tone designed to connect with a broad, uneducated audience.", "isCorrect": false, "rationale": "The Victorian grand style assumes an 'educated audience' and uses elevated diction, which is not informal or conversational."}, {"text": "Exclusive reliance on statistical data and logical proofs to establish authority.", "isCorrect": false, "rationale": "While Logos is present, the grand style is described more by its linguistic complexity, allusions, and emotional intensity, not 'exclusive reliance' on data."}], "id": "q01"}, {"question": "According to the text, how does Holmes's use of long, winding sentences in the Victorian grand style relate to the 'faith' he describes?", "options": [{"text": "It ensures that the audience can easily grasp the main idea without distraction.", "isCorrect": false, "rationale": "The text states that modern readers often find this style 'difficult' and implies that the length can make it challenging to follow, rather than easy."}, {"text": "It is an enactment of the soldier's willingness to follow a difficult path toward an unseen destination, trusting the journey will be worthwhile.", "isCorrect": true, "rationale": "The text directly states: 'Holmes' long, winding sentences are themselves an enactment of the faith he describes: the willingness to follow a path whose destination you cannot yet see, trusting that the journey will prove worthwhile.'"}, {"text": "It serves to impress the audience with Holmes's intellectual superiority and command of language.", "isCorrect": false, "rationale": "While it showcases his skill, the text emphasizes its function as an enactment of faith, not merely as a display of intellect."}, {"text": "It mimics the chaotic and disorienting nature of combat, making the audience feel confused.", "isCorrect": false, "rationale": "While combat is disorienting, the purpose of the sentence structure is about the journey of faith, not confusion."}], "id": "q02"}, {"question": "Which of the following best defines a 'periodic sentence' as exemplified by Holmes's battlefield passage?", "options": [{"text": "A sentence that employs a series of rhetorical questions to engage the audience.", "isCorrect": false, "rationale": "While rhetorical devices are used, this is not the definition of a periodic sentence."}, {"text": "A sentence where the main clause is presented at the beginning, followed by supporting details.", "isCorrect": false, "rationale": "This describes a loose or cumulative sentence, which is the opposite of a periodic sentence."}, {"text": "A sentence that delays its main clause until the very end, building suspense and emphasis through a series of subordinate clauses or phrases.", "isCorrect": true, "rationale": "The text provides this exact definition: 'A periodic sentence delays its main clause until the very end, building suspense and emphasis through a series of subordinate clauses or phrases.'"}, {"text": "A sentence that uses parallel structure exclusively for short, impactful statements.", "isCorrect": false, "rationale": "While Holmes uses repetition and parallel structure, the defining characteristic of a periodic sentence is the delayed main clause, not just parallel short statements."}], "id": "q03"}, {"question": "Beyond creating a visceral sense of combat (pathos), what is the *secondary* rhetorical effect of Holmes's periodic sentence in the battlefield passage?", "options": [{"text": "It establishes Holmes's credibility (ethos) as a military historian.", "isCorrect": false, "rationale": "While Holmes's experience contributes to his ethos, the *secondary effect of the periodic structure itself* is not primarily about historical credibility but experiential empathy."}, {"text": "It forces the audience to undergo a miniature version of the soldier's experience, moving through uncertainty toward a resolution.", "isCorrect": true, "rationale": "The text states the rhetorical effect is twofold: 'the periodic structure forces the audience to undergo a miniature version of the soldier's experience — moving forward through uncertainty toward a conclusion that is not yet visible, sustained only by trust in the speaker.'"}, {"text": "It logically demonstrates (logos) the inevitability of the soldier's ultimate fate.", "isCorrect": false, "rationale": "The effect is emotional and experiential, appealing to pathos and a shared journey, not a logical demonstration of fate."}, {"text": "It creates a sense of detachment, allowing the audience to objectively analyze the horrors of war.", "isCorrect": false, "rationale": "The passage aims to create a 'visceral sense' of combat, appealing to emotion and immersion, which is the opposite of detachment."}], "id": "q04"}, {"question": "In the 'Central Creed' passage, after declaring 'I do not know what is true. I do not know the meaning of the universe,' what is the 'one thing' Holmes states he does not doubt?", "options": [{"text": "The ultimate triumph of a just political cause.", "isCorrect": false, "rationale": "The text explicitly states: 'Not a political cause. Not a religious doctrine. Not a logical proof.'"}, {"text": "The inherent value of intellectual understanding and logical inquiry.", "isCorrect": false, "rationale": "Holmes celebrates 'faith without understanding' and contrasts it with intellectual pretension."}, {"text": "The faith that leads a soldier to sacrifice his life in obedience to a blindly accepted, poorly understood duty.", "isCorrect": true, "rationale": "The text states he believes 'that the faith is true and adorable which leads a soldier to throw away his life in obedience to a blindly accepted duty, in a cause which he little understands...'"}, {"text": "The existence of a divine purpose guiding human events.", "isCorrect": false, "rationale": "This leans towards religious doctrine, which Holmes explicitly disclaims as his certainty."}], "id": "q05"}, {"question": "The text notes that Holmes's argument in the 'Central Creed' is both powerful and vulnerable. What is identified as its primary vulnerability?", "options": [{"text": "Its potential to be misunderstood by an uneducated audience due to its philosophical depth.", "isCorrect": false, "rationale": "The vulnerability lies in the *content* of the argument, not its comprehensibility by the audience."}, {"text": "Its reliance on outdated military examples that lack relevance to contemporary warfare.", "isCorrect": false, "rationale": "The text does not mention this as a vulnerability of *the argument itself* in this passage."}, {"text": "Its celebration of blind faith could be used to justify almost any cause, regardless of its moral implications.", "isCorrect": true, "rationale": "The text states the argument is 'Vulnerable, because it can be used to justify almost anything. If the value of faith lies in its blindness, then what prevents it from serving a wicked cause as easily as a just one?'"}, {"text": "Its failure to acknowledge the psychological trauma experienced by soldiers in combat.", "isCorrect": false, "rationale": "This is not discussed as the primary vulnerability in the context of the argument's ethical implications."}], "id": "q06"}, {"question": "When Holmes concludes his speech with literary quotations from figures like Beowulf and Tennyson, what rhetorical appeal is he primarily leveraging, and for what purpose?", "options": [{"text": "Pathos, to evoke a sense of national pride and cultural heritage.", "isCorrect": false, "rationale": "While it might evoke emotion, the primary purpose is to establish authority through tradition."}, {"text": "Logos, to logically demonstrate the historical consistency of his arguments.", "isCorrect": false, "rationale": "This is more about claiming authority and tradition (ethos) than logical demonstration."}, {"text": "Ethos, to claim the authority of Western civilization and a long tradition of warrior culture.", "isCorrect": true, "rationale": "The text explicitly states: 'By embedding his argument within a tradition of heroic literature, Holmes claims the authority of Western civilization itself... he is the voice of a thousand years of warrior culture.'"}, {"text": "Kairos, to make his speech timely and relevant to current political debates.", "isCorrect": false, "rationale": "Kairos refers to the timeliness of an argument; while a speech is always given at a particular time, using allusions for authority is not primarily a kairotic appeal."}], "id": "q07"}, {"question": "In the closing 'Song of the Sword' passage, Holmes describes the old colonel's funeral. How does this scene primarily contribute to Holmes's ethos?", "options": [{"text": "By demonstrating his vast knowledge of military funeral rituals and customs.", "isCorrect": false, "rationale": "The focus is on personal connection and grief, not ceremonial knowledge."}, {"text": "By providing an objective, historical account of a veteran's burial.", "isCorrect": false, "rationale": "The scene is framed as 'ethos at its most intimate,' focusing on personal experience and memory, not objective historical recounting."}, {"text": "By claiming authority through shared experience and grief, conveying 'I was there. I knew these men. I carry their memory. Trust me.'", "isCorrect": true, "rationale": "The text directly states: 'This is ethos at its most intimate... He is saying: I was there. I knew these men. I carry their memory. Trust me.'"}, {"text": "By appealing to the audience's sense of duty to remember fallen heroes (pathos).", "isCorrect": false, "rationale": "While it evokes emotion, its primary function here is to build Holmes's *credibility* (ethos) through shared personal experience, not primarily as a call to duty."}], "id": "q08"}, {"question": "The text describes Holmes's 'logos' as 'less about formal logic than about a coherent worldview.' Which of the following best encapsulates this worldview as presented in the speech?", "options": [{"text": "The belief that intellectual discourse and critical analysis are the highest forms of human endeavor.", "isCorrect": false, "rationale": "Holmes's 'creed' emphasizes faith without understanding, which contrasts with the paramountcy of intellectual discourse."}, {"text": "The idea that life is a fundamental struggle, comfort leads to weakness, and true human potential is revealed through danger.", "isCorrect": true, "rationale": "The text states: 'Holmes' logos is less about formal logic than about a coherent worldview: life is struggle; comfort breeds weakness; only through danger can human beings discover what they are truly capable of.'"}, {"text": "A philosophical system that emphasizes the individual's right to question authority and tradition.", "isCorrect": false, "rationale": "Holmes celebrates 'blindly accepted duty' and uses classical allusions to align with tradition, not question it."}, {"text": "The conviction that societal progress depends on embracing peace and avoiding all forms of conflict.", "isCorrect": false, "rationale": "This contradicts Holmes's celebration of martial virtue and the 'struggle for existence'."}], "id": "q09"}, {"question": "The 'Rhetoric Is Not Proof' cautionary note encourages readers to distinguish between a sound argument and beautiful language. Which scenario best exemplifies a reader applying this critical thinking skill to Holmes's speech?", "options": [{"text": "A reader who is deeply moved by the eloquent descriptions of combat and therefore fully accepts Holmes's philosophy of faith.", "isCorrect": false, "rationale": "This reader is swayed by the 'beautiful language' and 'emotional momentum' without necessarily questioning the soundness of the argument, failing to distinguish between rhetoric and proof."}, {"text": "A reader who acknowledges the stylistic brilliance and emotional power of the speech, yet critically evaluates whether a 'blindly accepted duty' is always morally defensible.", "isCorrect": true, "rationale": "This reader appreciates the rhetoric but consciously questions the underlying logical or ethical validity of the argument, which is precisely the skill the text encourages."}, {"text": "A reader who agrees with Holmes's views on military service because they share a similar personal background as a veteran.", "isCorrect": false, "rationale": "While personal experience can inform perspective, agreeing based on shared experience does not inherently demonstrate the ability to distinguish between rhetoric and proof in the *argument itself*."}, {"text": "A reader who researches other speeches from the same era to compare Holmes's rhetorical techniques with those of his contemporaries.", "isCorrect": false, "rationale": "This is a good analytical skill for understanding rhetoric, but it doesn't directly address the specific distinction of whether the *argument* itself is sound versus merely persuasive."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
