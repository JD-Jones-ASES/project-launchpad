<script>
var QUESTIONS = [{"question": "What are the defining characteristics of the 'Victorian grand style' as described in the text?", "options": [{"text": "Short, direct sentences, simple vocabulary, and a focus on logical proofs.", "isCorrect": false, "rationale": "This describes a modern, direct style, which is contrasted with the Victorian grand style in the text."}, {"text": "Long, complex sentences, elevated diction, classical and literary allusions, and building emotional intensity.", "isCorrect": true, "rationale": "The text explicitly defines the Victorian grand style by these characteristics: 'long, complex sentences, elevated diction, classical and literary allusions, and a deliberate building of emotional intensity toward climactic moments.'"}, {"text": "A conversational tone, contemporary references, and a light-hearted approach to serious topics.", "isCorrect": false, "rationale": "This description does not align with the formal and elevated nature of the Victorian grand style discussed in the text."}, {"text": "A journalistic style characterized by objective reporting and minimal authorial intrusion.", "isCorrect": false, "rationale": "The Victorian grand style is oratorical and deliberately seeks to build emotional intensity, which contrasts with objective reporting."}], "id": "q01"}, {"question": "In the battlefield passage, how does Holmes's use of a periodic sentence contribute to the rhetorical effect?", "options": [{"text": "It simplifies the complex experience of combat, making it easier for the audience to grasp.", "isCorrect": false, "rationale": "The text states that modern readers find this style difficult, and its complexity is part of the point, mirroring the journey."}, {"text": "It allows Holmes to quickly deliver his main point, demonstrating conciseness.", "isCorrect": false, "rationale": "A periodic sentence delays its main clause until the very end, thus not delivering the point quickly."}, {"text": "It builds suspense and forces the audience to actively hold details in mind, mirroring the soldier's journey through uncertainty.", "isCorrect": true, "rationale": "The text explains that a periodic sentence 'delays its main clause until the very end, building suspense and emphasis' and that 'the periodic structure forces the audience to undergo a miniature version of the soldier's experience — moving forward through uncertainty.'"}, {"text": "It primarily serves to entertain the audience with a clever linguistic trick.", "isCorrect": false, "rationale": "While a linguistic technique, its purpose is deeper than mere entertainment; it's to create a visceral and empathetic experience for the audience."}], "id": "q02"}, {"question": "According to Holmes's 'Central Creed' passage, what is the core nature of the 'faith' he celebrates in the soldier?", "options": [{"text": "A deep understanding of political causes and strategic objectives.", "isCorrect": false, "rationale": "The text explicitly states the soldier acts 'in a cause which he little understands, in a plan of campaign of which he has no notion, under tactics of which he does not see the use.'"}, {"text": "A faith without understanding, rooted in blindly accepted duty and pure will.", "isCorrect": true, "rationale": "The text emphasizes that Holmes celebrates 'faith without understanding — faith as an act of pure will,' driven by 'blindly accepted duty.'"}, {"text": "A certainty in the meaning of the universe and an adherence to specific religious doctrines.", "isCorrect": false, "rationale": "Holmes opens this passage by stating, 'I do not know what is true. I do not know the meaning of the universe,' explicitly denying such certainties."}, {"text": "A rational conviction based on logical proofs and expected rewards.", "isCorrect": false, "rationale": "The text contrasts this faith with logical proof and suggests it's often performed 'without expectation of reward or certainty of success.'"}], "id": "q03"}, {"question": "The text notes a 'stark simplicity' in the opening of the 'Central Creed' passage ('I do not know what is true...'). What is the primary rhetorical effect of this stylistic shift?", "options": [{"text": "It signals a return to the Victorian grand style after a brief departure.", "isCorrect": false, "rationale": "The 'stark simplicity' is a direct contrast to the 'baroque complexity' of the previous style, not a return to it."}, {"text": "It makes Holmes appear less educated, appealing to a broader, less sophisticated audience.", "isCorrect": false, "rationale": "The text states he 'strips away every intellectual pretension,' implying a conscious choice, not a lack of education or an attempt to appear less sophisticated."}, {"text": "It disarms the audience by presenting Holmes as vulnerable and searching, highlighting the sincerity of his subsequent belief.", "isCorrect": true, "rationale": "The text explains this shift 'strips away every intellectual pretension and presents himself as a man standing in the void — a man who has lost his certainties but found one thing he can still believe in,' thus emphasizing sincerity."}, {"text": "It introduces a moment of comic relief before a serious philosophical argument.", "isCorrect": false, "rationale": "There is no indication in the text that this shift is intended for comic relief; rather, it sets a serious, contemplative tone."}], "id": "q04"}, {"question": "The text identifies a key vulnerability in Holmes's argument regarding the soldier's faith. What is it?", "options": [{"text": "It fails to account for the physical and psychological trauma experienced by soldiers.", "isCorrect": false, "rationale": "While a valid point, the text does not identify this as a *vulnerability of the argument's logic* within the discussion of 'power and vulnerability.'"}, {"text": "It cannot be applied to civilian life, making the 'faith' irrelevant outside of combat.", "isCorrect": false, "rationale": "The text does not discuss the applicability of this faith to civilian life as a vulnerability of the argument itself."}, {"text": "Its emphasis on 'blindness' means it could justify a wicked cause as easily as a just one.", "isCorrect": true, "rationale": "The text directly states this vulnerability: 'If the value of faith lies in its blindness, then what prevents it from serving a wicked cause as easily as a just one?'"}, {"text": "Its reliance on classical allusions alienates modern readers who lack a classical education.", "isCorrect": false, "rationale": "This is a difficulty for modern readers interacting with the *style*, not a logical vulnerability of the core argument about faith itself."}], "id": "q05"}, {"question": "In the 'Song of the Sword' section, Holmes concludes his speech with literary quotations and a funeral scene. What is the primary rhetorical purpose of this strategy?", "options": [{"text": "To create a light-hearted ending to balance the seriousness of the preceding arguments.", "isCorrect": false, "rationale": "The conclusion shifts to an 'elegy' and focuses on grief and things forgotten, which is not light-hearted."}, {"text": "To demonstrate his personal erudition and impress the audience with his knowledge of literature.", "isCorrect": false, "rationale": "While demonstrating erudition, the primary purpose, as stated, is to claim authority and evoke emotion, not just impress."}, {"text": "To embed his argument within a tradition of heroic literature and claim authority through shared cultural heritage, while shifting to an elegy to show what is lost.", "isCorrect": true, "rationale": "The text explains Holmes 'claims the authority of Western civilization itself' and that the funeral 'shifts the speech from argument to elegy,' showing 'what happens when it is forgotten.'"}, {"text": "To distract the audience from the potentially controversial aspects of his 'Central Creed.'", "isCorrect": false, "rationale": "The text does not suggest this strategy is a distraction but rather a deliberate and integrated part of his persuasive effort."}], "id": "q06"}, {"question": "How does Holmes primarily establish his ethos in 'The Soldier's Faith'?", "options": [{"text": "By presenting extensive logical data and empirical evidence to support his claims.", "isCorrect": false, "rationale": "While Holmes employs logos, his primary ethos comes from personal experience, not purely empirical data."}, {"text": "By adopting a detached, academic tone to convey objectivity and scholarly rigor.", "isCorrect": false, "rationale": "Holmes's style involves deliberate emotional intensity and personal appeals, not a detached academic tone."}, {"text": "By speaking as a thrice-wounded veteran, using his personal experience and grief to establish authority and trust.", "isCorrect": true, "rationale": "The text explicitly states: 'Holmes speaks as a thrice-wounded veteran. His authority is not abstract; it is written on his body' and 'He is claiming it through grief.'"}, {"text": "By citing renowned philosophers and military strategists to bolster his credibility.", "isCorrect": false, "rationale": "He cites literary figures but his primary ethos is personal, not derived from citing authorities."}], "id": "q07"}, {"question": "Which of the following rhetorical techniques is most indicative of Holmes's use of pathos in the speech?", "options": [{"text": "The clear and logical progression of his philosophical arguments about existence.", "isCorrect": false, "rationale": "This describes logos, which appeals to logic and reason, not emotion."}, {"text": "The detailed historical accounts of specific battles he participated in.", "isCorrect": false, "rationale": "While he describes combat, the text highlights the *sensory details* to create visceral feeling, not just historical accounts."}, {"text": "The accumulation of sensory details in the battlefield passage to create a visceral experience of combat.", "isCorrect": true, "rationale": "The text explicitly links this to pathos, stating 'the accumulation of detail creates a visceral sense of what combat is like... This is pathos at its most powerful: Holmes makes his audience feel the battlefield.'"}, {"text": "The use of Latin phrases and complex grammatical structures to impress the audience.", "isCorrect": false, "rationale": "These are elements of the Victorian grand style, which can contribute to emotional intensity but are not primarily indicators of pathos alone; pathos is specifically about evoking emotion."}], "id": "q08"}, {"question": "The 'Rhetoric Is Not Proof' caution box suggests a critical skill for the reader. What is that skill?", "options": [{"text": "The ability to identify all literary allusions in a complex text.", "isCorrect": false, "rationale": "While helpful for understanding, this is a literary analysis skill, not the core critical thinking skill highlighted for evaluating rhetoric vs. proof."}, {"text": "The capacity to separate the persuasive power of beautiful language from the soundness of the argument itself.", "isCorrect": true, "rationale": "The text explicitly states: 'As you reflect on the speech, ask yourself: Am I persuaded because the argument is sound, or because the language is beautiful? The ability to distinguish between the two is one of the most important skills this course aims to develop.'"}, {"text": "The skill of memorizing oratorical techniques for future public speaking engagements.", "isCorrect": false, "rationale": "The caution is about *evaluating* rhetoric, not simply applying it."}, {"text": "The ability to reconstruct the historical context of a speech accurately.", "isCorrect": false, "rationale": "Understanding context is important, but the specific skill mentioned here is distinguishing persuasion from sound argument."}], "id": "q09"}, {"question": "Considering the entire section, what is the overarching purpose of examining Holmes's 'The Soldier's Faith' through the lens of rhetoric?", "options": [{"text": "To prove that Holmes's philosophical conclusions about war are universally true and unassailable.", "isCorrect": false, "rationale": "The 'Rhetoric Is Not Proof' caution directly contradicts this, emphasizing that persuasion doesn't equate to truth."}, {"text": "To demonstrate that only veterans can effectively speak about the meaning of war.", "isCorrect": false, "rationale": "The section focuses on *how* Holmes, as a veteran, uses rhetoric, not that only veterans can speak effectively."}, {"text": "To illustrate how masterful use of rhetorical techniques can make an audience not just understand an argument but deeply feel it, even while prompting critical evaluation of its soundness.", "isCorrect": true, "rationale": "The introduction states the goal is 'how Holmes uses the tools of rhetoric to make his audience not just understand his argument but feel it,' and the conclusion stresses the need to critically evaluate whether the language conceals weaknesses in reasoning."}, {"text": "To encourage readers to adopt the 'Victorian grand style' in their own writing and speaking.", "isCorrect": false, "rationale": "The section is analytical and critical, not prescriptive about adopting a specific style, especially one noted as difficult for modern readers."}], "id": "q10"}, {"question": "Holmes's speech uses the periodic sentence, where subordinate clauses accumulate before the main clause arrives. How does this sentence structure serve his argument about the soldier's faith specifically?", "options": [{"text": "It mirrors the soldier's experience of waiting under uncertainty before an outcome is revealed.", "isCorrect": true, "rationale": "The periodic sentence enacts in syntax the experience Holmes is describing: a long accumulation of tension before the main point arrives 'with the force of a wave breaking on shore.' This formal mimicry reinforces the content — faith sustained under uncertainty."}, {"text": "It allows Holmes to include more historical facts per sentence, demonstrating his scholarly knowledge.", "isCorrect": false, "rationale": "The periodic sentence is about creating emotional momentum, not packing in historical data. Holmes's evidence is personal and literary, not primarily factual in the scholarly sense."}, {"text": "It makes his sentences shorter and more forceful, cutting through the ornate language of his opponents.", "isCorrect": false, "rationale": "The opposite is true. Periodic sentences are long and complex by definition, building through multiple clauses before reaching their conclusion."}, {"text": "It was a legal writing convention that Holmes carried over from his Supreme Court opinions.", "isCorrect": false, "rationale": "The text identifies this as the 'Victorian grand style' characteristic of Victorian-era oratory, not as a specifically legal writing technique."}], "id": "q11"}, {"question": "The section warns that Holmes's rhetorical skill 'is precisely what makes him worth studying carefully and critically.' What specific danger does rhetorical mastery pose for the audience?", "options": [{"text": "A masterful rhetorician may discourage the audience from reading other perspectives on the same topic.", "isCorrect": false, "rationale": "While possible, the section's specific warning is about the effect of rhetoric on the audience's reasoning within the argument itself, not about foreclosing additional reading."}, {"text": "Beautiful, emotionally compelling language can make debatable ideas seem self-evident, causing the audience to stop thinking critically precisely when they should be thinking most carefully.", "isCorrect": true, "rationale": "The text warns that 'masterful writing can make even debatable ideas sound self-evident' and that rhetoric is 'persuasion, not proof.' The danger is that the audience mistakes feeling convinced for having evaluated an argument."}, {"text": "Audiences may mistake Holmes for a professional rhetorician rather than a legal scholar, undermining his credibility.", "isCorrect": false, "rationale": "Holmes's ethos was enhanced, not undermined, by his rhetorical skill; the danger the section identifies is the audience being persuaded beyond what the evidence justifies."}, {"text": "The complexity of his sentences may cause less educated audiences to misunderstand his argument entirely.", "isCorrect": false, "rationale": "The section's concern is not about misunderstanding but about being too convinced — about the rhetoric working so well that critical judgment is suspended."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
