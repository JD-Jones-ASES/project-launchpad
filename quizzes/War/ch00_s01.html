    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "What does the text identify as the most significant consequences of war on a nation?", "options": [{"text": "Strengthening international alliances and cultural exchange.", "isCorrect": false, "rationale": "The text does not mention these as positive consequences of war in the introductory paragraph; it focuses on destructive impacts."}, {"text": "Emptying treasuries, reshaping borders, toppling governments, and causing mass casualties.", "isCorrect": true, "rationale": "The text explicitly states: 'It empties treasuries, reshapes borders, topples governments, and kills people by the millions.'"}, {"text": "Promoting scientific advancement and economic prosperity.", "isCorrect": false, "rationale": "These are not mentioned as direct consequences of war in this introductory section; the focus is on negative impacts."}, {"text": "Unifying diverse populations under a common banner.", "isCorrect": false, "rationale": "While war might sometimes unify, the text highlights the destructive, divisive consequences like death and political upheaval, not unification."}], "id": "q01"}, {"question": "Which of the following descriptions accurately pairs a perspective on war with its main idea as presented in the text?", "options": [{"text": "War as a 'racket' suggests it's a necessary evil for defense.", "isCorrect": false, "rationale": "War as a 'racket' is described as 'a scheme run by the powerful to enrich themselves,' not a necessary evil."}, {"text": "War as 'noble' implies it is a scheme for the powerful's profit.", "isCorrect": false, "rationale": "War as 'noble' is described as calling out 'the best in human beings,' not a scheme for profit."}, {"text": "War as 'sometimes necessary' indicates it calls out the best in human beings.", "isCorrect": false, "rationale": "War as 'sometimes necessary' is described as 'not good in itself, but the lesser evil when civilization is threatened,' not calling out the best in humans (which is the 'noble' view)."}, {"text": "War as 'brutal and unjustifiable' questions if any argument can justify battlefield reality.", "isCorrect": true, "rationale": "The text states this perspective 'simply point to the bodies and ask whether any argument, however eloquent, can justify what happens on a battlefield.'"}], "id": "q02"}, {"question": "The text emphasizes that 'intelligent, sincere, and experienced' people look at war and see 'something different.' What is the fundamental implication of this statement for the reader's task?", "options": [{"text": "The reader's goal is to choose the most eloquent argument and dismiss others.", "isCorrect": false, "rationale": "The text explicitly states, 'Your job as a reader is not to pick a favorite.'"}, {"text": "The reader should acknowledge the complexity of war and the validity of diverse viewpoints, even if conflicting.", "isCorrect": true, "rationale": "The fact that intelligent people disagree implies that the issue is complex and that there isn't a single, obvious answer, requiring the reader to understand multiple perspectives."}, {"text": "The reader must seek a definitive, universal answer to 'What is war for?'", "isCorrect": false, "rationale": "The text states, 'If the answer were obvious, there would be no argument,' and 'This book does not answer the question for you,' indicating that a single definitive answer is not the goal."}, {"text": "The reader should prioritize the views of those with direct combat experience above all others.", "isCorrect": false, "rationale": "While the text features experienced individuals, it presents all four as equally intelligent and sincere, implying no automatic hierarchy based solely on experience. The goal is to understand each argument."}], "id": "q03"}, {"question": "Oliver Wendell Holmes Jr. and Smedley Butler, despite both having extensive military experience, held fundamentally opposing views on war. Which statement best captures their contrasting stances as described in the text?", "options": [{"text": "Holmes saw war as a necessary evil, while Butler viewed it as a test of national character.", "isCorrect": false, "rationale": "Holmes celebrated war as a school of virtue, not a necessary evil. Butler called it a racket, not a test of national character."}, {"text": "Holmes celebrated war as a school of virtue, whereas Butler condemned it as a racket for profit.", "isCorrect": true, "rationale": "The text states Holmes 'celebrated war as a school of virtue' and Butler 'called war a racket run for the profit of the few.'"}, {"text": "Holmes believed war to be inherently brutal, while Butler argued it was sometimes noble.", "isCorrect": false, "rationale": "Holmes did not believe war to be inherently brutal (he saw it as virtuous), and Butler certainly did not argue it was noble (he saw it as a racket)."}, {"text": "Holmes focused on war's political outcomes, while Butler emphasized its economic benefits.", "isCorrect": false, "rationale": "While Butler's view has economic implications ('profit of the few'), Holmes's focus was on virtue and national character, not political outcomes in the way this option suggests."}], "id": "q04"}, {"question": "What does the book explicitly state is its primary purpose for the reader regarding the central question of 'What is war for?'", "options": [{"text": "To provide a definitive answer to the question based on historical evidence.", "isCorrect": false, "rationale": "The text explicitly states, 'This book does not answer the question for you.'"}, {"text": "To present various arguments and encourage the reader to critically evaluate them and form their own conclusion.", "isCorrect": true, "rationale": "The text says, 'It gives you the arguments and asks you to think,' and 'Your job as a reader is not to pick a favorite. It is to understand each argument on its own terms... and to decide for yourself which claims hold up under scrutiny.'"}, {"text": "To persuade the reader to adopt a specific, pre-determined perspective on war.", "isCorrect": false, "rationale": "The book avoids providing an answer or picking a favorite, instead encouraging independent thought."}, {"text": "To simplify the debate by highlighting only the most logical arguments.", "isCorrect": false, "rationale": "The book emphasizes the complexity and the existence of multiple, intelligent viewpoints, rather than simplifying by cherry-picking."}], "id": "q05"}, {"question": "According to the text, why is the debate about 'What is war for?' considered 'worth having'?", "options": [{"text": "Because historical figures like Holmes and Butler were famous for their arguments.", "isCorrect": false, "rationale": "While the figures are important, their fame isn't the reason the debate is worth having. It's the nature of their disagreement."}, {"text": "Because intelligent people have consistently disagreed about war, indicating no obvious answer exists.", "isCorrect": true, "rationale": "The text states, 'Each looked at war and saw something different. That is what makes this debate worth having. If the answer were obvious, there would be no argument. But intelligent people have disagreed about war for as long as there have been wars, and they disagree still.'"}, {"text": "Because all arguments for war are ultimately proven false by battlefield reality.", "isCorrect": false, "rationale": "This is one perspective presented (Remarque's), but not the reason the entire debate is worth having."}, {"text": "Because understanding war's economic impact requires studying diverse opinions.", "isCorrect": false, "rationale": "While economic impact is one aspect (Butler's view), it's not the encompassing reason given for the debate's value."}], "id": "q06"}, {"question": "The text states that the reader's job requires 'a particular set of skills.' Which skill is specifically identified as crucial for understanding the arguments presented in the book?", "options": [{"text": "Strategic planning and military tactics.", "isCorrect": false, "rationale": "These are not the skills mentioned for evaluating arguments about war."}, {"text": "Economic forecasting and market analysis.", "isCorrect": false, "rationale": "While relevant to Butler's view, this isn't the general skill identified for all arguments."}, {"text": "Rhetoric, the ancient art of persuasion and argument.", "isCorrect": true, "rationale": "The text explicitly states: 'That requires a particular set of skills — the skills of rhetoric, the ancient art of persuasion and argument.'"}, {"text": "Archival research and historical data compilation.", "isCorrect": false, "rationale": "While historical context is mentioned ('understand the world they lived in'), the specific skill for evaluating arguments is rhetoric."}], "id": "q07"}, {"question": "Considering the perspective that war 'calls out the best in human beings — courage, sacrifice, loyalty to something larger than oneself,' which of the following actions would a proponent of this view likely advocate during a time of national crisis?", "options": [{"text": "Prioritizing diplomatic solutions and avoiding military confrontation at all costs.", "isCorrect": false, "rationale": "This perspective suggests that a society that cannot fight has 'lost its spine,' implying a readiness for conflict rather than avoiding it at all costs."}, {"text": "Strengthening the nation's military capabilities and fostering a culture of civic duty and preparedness.", "isCorrect": true, "rationale": "A belief in war as a 'school of virtue' and a test of national character would logically lead to advocating for strength and preparedness to demonstrate those virtues, especially in a crisis."}, {"text": "Investigating the financial motives of those advocating for war.", "isCorrect": false, "rationale": "This aligns with the 'war as a racket' perspective, not the 'noble' view."}, {"text": "Documenting the human cost of conflict to deter future engagements.", "isCorrect": false, "rationale": "This aligns with the 'brutal and unjustifiable' perspective, focusing on deterrence through highlighting negative aspects."}], "id": "q08"}, {"question": "Woodrow Wilson campaigned on peace but led his nation into war, while Erich Maria Remarque wrote a novel stripping away justifications for war. How do their roles in the text illustrate different aspects of the war debate?", "options": [{"text": "Wilson represents the idea of war as a racket, while Remarque represents war as a noble endeavor.", "isCorrect": false, "rationale": "Wilson aligns with 'necessary evil' in the text's description, and Remarque with 'brutal and unjustifiable,' not noble."}, {"text": "Wilson demonstrates the practical complexities and shifts in leadership decisions regarding war, while Remarque highlights the brutal, unjustifiable reality from a soldier's perspective.", "isCorrect": true, "rationale": "Wilson's description highlights the paradox of a peace-campaigning leader entering the bloodiest war, showing the weighty decisions involved. Remarque, as a trench survivor who stripped away justifications, embodies the brutal reality from a ground-level perspective."}, {"text": "Wilson argues for war as a school of virtue, while Remarque views it as a necessary evil.", "isCorrect": false, "rationale": "Wilson is characterized as seeing war as 'sometimes necessary' (a lesser evil), and Remarque's work challenged all justifications, not seeing it as a 'necessary evil' in the same sense."}, {"text": "Wilson focuses on the economic benefits of war, while Remarque emphasizes the political maneuvering.", "isCorrect": false, "rationale": "The text does not attribute economic focus to Wilson or political maneuvering to Remarque."}], "id": "q09"}, {"question": "The concluding paragraph states, 'This book does not answer the question for you. It gives you the arguments and asks you to think.' This statement primarily conveys which message about engaging with complex societal issues?", "options": [{"text": "That only historical figures possess the authority to define such issues.", "isCorrect": false, "rationale": "While historical figures present arguments, the book empowers the reader to evaluate them, not just defer to authority."}, {"text": "That definitive answers are always elusive, so personal conviction is paramount without supporting evidence.", "isCorrect": false, "rationale": "The book asks the reader to 'decide for yourself which claims hold up under scrutiny,' implying that evidence and evaluation are crucial, not just arbitrary personal conviction."}, {"text": "That critical thinking and independent evaluation of diverse viewpoints are essential for understanding, rather than passively accepting pre-packaged answers.", "isCorrect": true, "rationale": "By presenting arguments without a pre-set answer and asking the reader to 'think' and 'scrutinize,' the book emphasizes the importance of active, critical engagement and independent judgment."}, {"text": "That complex questions are ultimately unresolvable, making detailed study futile.", "isCorrect": false, "rationale": "The act of presenting arguments and encouraging thinking implies that understanding is possible and valuable, even if a single definitive answer is not provided."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
