        <div class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 7, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is Oliver Wendell Holmes's central argument about war, based on his personal experience?", "options": [{"text": "War is a destructive force that mocks all attempts to find meaning in it.", "isCorrect": false, "rationale": "This perspective aligns with Remarque's description of war, not Holmes's. Holmes believed war built character."}, {"text": "War is primarily a means for the powerful to accumulate wealth.", "isCorrect": false, "rationale": "This argument is attributed to Smedley Butler, who saw war as a 'racket' for profit."}, {"text": "War serves as a crucible that forges character and human virtue through sacrifice.", "isCorrect": true, "rationale": "Holmes argued that 'war is a crucible of character, that the willingness to fight and die for a cause greater than oneself is the highest expression of human virtue.'"}, {"text": "War is a political tool necessary to defend democratic ideals against autocracy.", "isCorrect": false, "rationale": "This justification for war was made by President Woodrow Wilson, framing it as a political necessity."}]}, {"question": "Major General Smedley Butler's argument characterizes war primarily as:", "options": [{"text": "An ennobling experience that builds individual character.", "isCorrect": false, "rationale": "This view is attributed to Holmes, who believed war enhanced virtue."}, {"text": "A moral imperative when facing existential threats to international order.", "isCorrect": false, "rationale": "This aligns with Woodrow Wilson's justification for war as a moral necessity."}, {"text": "A 'racket' designed by the powerful for economic gain at the expense of ordinary people.", "isCorrect": true, "rationale": "Butler explicitly argued that 'war is a racket — a scheme organized by the powerful to enrich themselves while ordinary people pay in blood.'"}, {"text": "An indescribable horror that defies any rational justification.", "isCorrect": false, "rationale": "This perspective is characteristic of Remarque's experience of war, highlighting its destruction."}]}, {"question": "President Woodrow Wilson's perspective on the First World War emphasized which justification?", "options": [{"text": "Its capacity to reveal the profound courage and self-sacrifice of individuals.", "isCorrect": false, "rationale": "This aligns with Holmes's argument about war's ennobling effect on individuals."}, {"text": "Its economic benefits for corporations and the powerful elite.", "isCorrect": false, "rationale": "This is a key point of Smedley Butler's 'racket' argument."}, {"text": "Its role as a moral necessity for the survival of democracy against autocratic threats.", "isCorrect": true, "rationale": "Wilson argued that 'this particular war was a moral necessity, that the survival of democracy itself required the United States to take up arms against autocracy.'"}, {"text": "Its inherent futility and the destruction it brings, regardless of cause.", "isCorrect": false, "rationale": "This perspective is most closely associated with Remarque's description of war's reality."}]}, {"question": "Erich Maria Remarque's contribution to the discussion about war primarily offers:", "options": [{"text": "A philosophical justification for the necessity of conflict in certain situations.", "isCorrect": false, "rationale": "Remarque offered 'no argument at all' and focused on the brutal reality, not justification."}, {"text": "An economic critique of who profits from warfare.", "isCorrect": false, "rationale": "This critique is central to Smedley Butler's argument."}, {"text": "A vivid description of the brutal, destructive reality of combat, challenging abstract justifications.", "isCorrect": true, "rationale": "Remarque 'simply described what it was like to be shelled, to watch friends die, and to wonder whether anyone back home had any idea what was actually happening,' concluding that 'War destroys. No argument survives contact with the reality.'"}, {"text": "An argument for the ennobling effect of wartime service on character.", "isCorrect": false, "rationale": "This view is presented by Oliver Wendell Holmes."}]}, {"question": "The section states, 'Can all four be right? In a sense, yes.' This statement primarily highlights which concept about war?", "options": [{"text": "That only one perspective can ultimately be proven true through evidence.", "isCorrect": false, "rationale": "The text directly contradicts this by stating 'all four can be right' and that 'these truths exist simultaneously.'"}, {"text": "That war is a multifaceted phenomenon where seemingly contradictory truths can coexist simultaneously.", "isCorrect": true, "rationale": "The text explains, 'The difficulty is that these truths exist simultaneously. War can ennoble individual soldiers and enrich war profiteers.'"}, {"text": "That all arguments about war are equally valid and no judgment can be made.", "isCorrect": false, "rationale": "The text clarifies, 'Acknowledging this complexity is not the same as refusing to judge. It is the beginning of honest judgment.'"}, {"text": "That the validity of an argument depends solely on the personal experience of the speaker.", "isCorrect": false, "rationale": "While personal experience adds ethos, the text doesn't suggest it's the sole determinant of validity, especially when considering 'simultaneous truths' from different perspectives."}]}, {"question": "The 'Question of Framing' section distinguishes between Holmes, Butler, and Wilson based on their levels of abstraction. If a historian focused on the geopolitical alliances and shifts in power leading to a conflict, which author's *frame* would they most closely align with?", "options": [{"text": "Holmes, as it examines the personal sacrifices of leaders.", "isCorrect": false, "rationale": "Holmes frames war as a 'personal experience' on the individual soul, not geopolitical strategy."}, {"text": "Butler, as it scrutinizes the economic motivations behind international agreements.", "isCorrect": false, "rationale": "Butler frames war as an 'economic system,' focusing on who pays and profits, not primarily geopolitical power shifts."}, {"text": "Wilson, as it addresses war from a perspective of political necessity and international order.", "isCorrect": true, "rationale": "Wilson 'frames war as a political necessity — what happens when democracies face aggression,' which aligns with focusing on geopolitical factors and international order."}, {"text": "Remarque, as it emphasizes the human cost of large-scale international conflicts.", "isCorrect": false, "rationale": "Remarque offers an experiential frame of war's destruction, not its geopolitical causes."}]}, {"question": "When a political commentator argues that a military intervention is crucial to 'protect national interests and project global stability,' what critical question, as suggested by the 'A Question of Framing' note, should a reader immediately ask?", "options": [{"text": "What personal stories of bravery and sacrifice define this intervention?", "isCorrect": false, "rationale": "This question relates to Holmes's frame of personal experience, which is likely 'left out' rather than the immediate critical question about the commentator's stated frame."}, {"text": "What are the individual psychological impacts of this intervention on soldiers?", "isCorrect": false, "rationale": "This question relates to Remarque's or Holmes's frame, which is likely 'left out' by the political commentary's frame, but not the direct question about what the chosen frame *conceals*."}, {"text": "What specific evidence supports the claim that national interests are at stake?", "isCorrect": false, "rationale": "While a valid critical question ('distinguish evidence from assertion'), it's not the specific question highlighted by the 'A Question of Framing' section, which emphasizes 'what that frame leaves out'."}, {"text": "What economic motivations or humanitarian costs might this particular frame of 'national interests' and 'global stability' be leaving out?", "isCorrect": true, "rationale": "The text advises, 'Part of reading arguments critically is identifying what frame the writer has chosen and asking what that frame leaves out.' This question directly applies that principle by considering other frames (like Butler's economic or Remarque's human cost) that might be concealed by a 'political necessity' frame."}]}, {"question": "What is the ultimate purpose of this textbook section, 'Racket or Crusade,' regarding the different arguments about war?", "options": [{"text": "To definitively declare which of the four voices provides the most accurate depiction of war.", "isCorrect": false, "rationale": "The text explicitly states, 'The point of this book has never been to tell you which voice is correct.'"}, {"text": "To equip readers with the analytical tools necessary to evaluate complex arguments for themselves.", "isCorrect": true, "rationale": "The text states, 'The point has been to give you the tools to evaluate each argument for yourself.'"}, {"text": "To advocate for a specific stance on the morality and necessity of war.", "isCorrect": false, "rationale": "The section focuses on evaluation and synthesis, not advocacy for a particular stance."}, {"text": "To demonstrate that war is an inherently irrational act that defies all attempts at reasoned debate.", "isCorrect": false, "rationale": "The section provides tools for engaging in 'honest judgment' and 'considered judgment,' implying reasoned debate is possible and necessary."}]}, {"question": "According to the text, 'synthesis' in the context of evaluating arguments about war involves:", "options": [{"text": "Selecting the single most compelling argument and discarding all others.", "isCorrect": false, "rationale": "The definition states, 'Synthesis does not mean choosing one side.'"}, {"text": "Identifying the logical fallacies in each argument to discredit them.", "isCorrect": false, "rationale": "While critical analysis is involved, synthesis goes beyond discrediting to combining and understanding relationships."}, {"text": "Combining multiple perspectives to form a coherent analysis, understanding their relationships, and reaching a considered judgment.", "isCorrect": true, "rationale": "The text defines synthesis as 'The process of combining multiple arguments, perspectives, or sources of evidence into a coherent analysis. Synthesis does not mean choosing one side; it means understanding how different positions relate to each other and evaluating them together.'"}, {"text": "Focusing solely on the emotional impact of each argument to determine its persuasive power.", "isCorrect": false, "rationale": "The text states that emotional appeals are 'not automatically invalid' but emphasizes broader tools for reasoned judgment, not solely emotional impact."}]}, {"question": "Beyond identifying ethos, pathos, and logos, what other crucial critical reading skill does the section highlight as essential for evaluating arguments about war?", "options": [{"text": "Prioritizing arguments that rely solely on empirical scientific data.", "isCorrect": false, "rationale": "While evidence is important ('distinguish evidence from assertion'), the text does not advocate for *solely* empirical scientific data or prioritize it over other forms of evidence/argument."}, {"text": "Determining the personal political affiliation of the author to assess bias.", "isCorrect": false, "rationale": "While understanding an author's background is part of ethos, the text does not specifically highlight this as *the* other crucial skill, focusing instead on structural elements of arguments."}, {"text": "Asking 'What has been left out?' to identify what a chosen frame might conceal.", "isCorrect": true, "rationale": "The text explicitly states, 'You know how to ask the question that every argument must answer: What has been left out?' and links this to understanding what a chosen frame 'conceals.'"}, {"text": "Discounting any argument that uses emotional appeals, as they are automatically invalid.", "isCorrect": false, "rationale": "The text clearly states, 'you know that emotional appeals are not automatically invalid.'"}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
