    };

        <div class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 5, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the primary reason Oliver Wendell Holmes Jr. argued that a 'comfortable' commercial society requires the experience of war?", "options": [{"text": "To ensure that national profit remains the primary driver of civilian innovation.", "isCorrect": false, "rationale": "Holmes actually viewed the focus on profit and material comfort as a potential cause of moral atrophy that war needed to counteract."}, {"text": "To prevent the atrophy of moral virtues like self-sacrifice and courage.", "isCorrect": true, "rationale": "Holmes believed that without the severe test of battle, the moral 'muscles' of a society focused on material gain would weaken and disappear."}, {"text": "To provide a practical application for the abstract theories of desk-bound philosophers.", "isCorrect": false, "rationale": "While the text mentions Holmes was not a desk-bound philosopher, his argument for war was based on character development, not merely providing work for intellectuals."}, {"text": "To expand the reach of American commerce into new territories through military force.", "isCorrect": false, "rationale": "This aligns more with the economic motivations that Smedley Butler criticized rather than Holmes' philosophical defense of war as a forge of character."}]}, {"question": "How does Smedley Butler’s view of soldierly virtue differ from that of Oliver Wendell Holmes Jr.?", "options": [{"text": "Butler believed that true courage is only displayed by those who profit from the conflict.", "isCorrect": false, "rationale": "Butler argued that profiteers never hear a shot fired, meaning they do not display the courage shown by soldiers in the trenches."}, {"text": "Butler argued that soldiers lack moral courage because they do not understand the causes they fight for.", "isCorrect": false, "rationale": "Butler acknowledged that soldiers display extraordinary courage, but he focused on how that courage is misused by the system."}, {"text": "Butler maintained that while soldierly virtue is real, it is exploited by a system designed for economic gain.", "isCorrect": true, "rationale": "Butler did not deny the existence of courage; rather, he argued that this genuine virtue is used as a tool for corporate profiteering."}, {"text": "Butler claimed that the rigors of war actually destroy the soul rather than building character.", "isCorrect": false, "rationale": "While Butler noted the destruction of bodies and minds, his primary philosophical critique was the systemic exploitation of the soldier's virtues."}]}, {"question": "The text suggests that the 'ethos' of both Holmes and Butler is high because they both:", "options": [{"text": "Transitioned from military service into successful careers in the Gilded Age corporate world.", "isCorrect": false, "rationale": "Neither man is described as becoming a corporate leader; in fact, Butler was highly critical of the corporate world's role in war."}, {"text": "Authored widely read novels that captured the reality of trench warfare for a global audience.", "isCorrect": false, "rationale": "Erich Maria Remarque wrote the novel mentioned, whereas Holmes and Butler are discussed for their personal arguments and military service."}, {"text": "Reached a consensus that war is a necessary evil for the preservation of democracy.", "isCorrect": false, "rationale": "The two men reached opposite conclusions, with Butler viewing war as a 'racket' and Holmes viewing it as a crucible of virtue."}, {"text": "Earned the right to their opinions through direct, personal experience in combat.", "isCorrect": true, "rationale": "The text emphasizes that their authority (ethos) comes from the fact that both put their lives on the line—Holmes in the Civil War and Butler over three decades in the Marines."}]}, {"question": "According to the 'Note on Scale,' how might the arguments of Holmes and Butler be reconciled?", "options": [{"text": "By acknowledging that Holmes is describing the individual experience while Butler is describing the systemic function.", "isCorrect": true, "rationale": "The text suggests that an individual can display genuine virtue (Holmes) even if the system they serve is corrupt or profit-driven (Butler)."}, {"text": "By concluding that Holmes' view applies to 19th-century warfare while Butler's applies to modern conflicts.", "isCorrect": false, "rationale": "The text treats their clash as a fundamental philosophical tension rather than a chronological shift in the nature of war."}, {"text": "By arguing that only career Marines like Butler can understand the economic dimension of war.", "isCorrect": false, "rationale": "While Butler's experience informed his view, the text presents the systemic critique as a lens available to anyone analyzing the machinery of war."}, {"text": "By realizing that the courage Holmes celebrates is only possible if the war is economically justified.", "isCorrect": false, "rationale": "Holmes' argument specifically highlights 'faith without certainty,' implying that the soldier's virtue exists independently of the war's justification or purpose."}]}, {"question": "", "options": [{"text": "A bureaucratic process that slows down national decision-making.", "isCorrect": false, "rationale": "A crucible is described as a severe test that transforms, which is the opposite of a stagnant bureaucratic process."}, {"text": "A severe trial that burns away weakness and transforms the individual.", "isCorrect": true, "rationale": "The text defines a crucible as a container for melting metals at high heat, using it to describe how war tests and changes human character."}, {"text": "A mechanism used by corporations to increase the production of ammunition.", "isCorrect": false, "rationale": "This interpretation aligns with Butler's 'machine' imagery rather than Holmes' metaphor for character development."}, {"text": "The peaceful resolution of conflict through diplomatic negotiations.", "isCorrect": false, "rationale": "Holmes' use of 'crucible' specifically refers to the intense pressure and violence of battle, not diplomacy."}]}, {"question": "What is the 'uncomfortable question' raised by the comparison of Holmes and Butler regarding the celebration of soldierly virtue?", "options": [{"text": "Whether soldiers who display courage should be given shares in the companies that profit from war.", "isCorrect": false, "rationale": "The text does not suggest profit-sharing as a solution, but rather questions the philosophical implications of honoring virtue."}, {"text": "Whether modern technology has made the individual courage Holmes describes obsolete.", "isCorrect": false, "rationale": "The text focuses on the tension between virtue and systems, not on the impact of technology on the nature of courage."}, {"text": "Whether acknowledging a soldier's virtue makes it harder to confront the corrupt systems that exploit them.", "isCorrect": true, "rationale": "The text asks if celebrating the best in human beings (Holmes' lens) distracts us from seeing the worst in institutions (Butler's lens)."}, {"text": "Whether pacifists have the same moral authority as veterans to speak on the nature of war.", "isCorrect": false, "rationale": "While it mentions pacifism, the core tension described is between two different veteran perspectives, not between veterans and civilians."}]}, {"question": "Butler’s claim that 'war is a racket' primarily targets which of the following groups as the 'real beneficiaries'?", "options": [{"text": "The families of soldiers who receive government pensions.", "isCorrect": false, "rationale": "Butler argues that families are often destroyed by war, making them victims rather than beneficiaries."}, {"text": "Soldiers who earn high-ranking positions and medals of honor.", "isCorrect": false, "rationale": "Butler, a recipient of two Medals of Honor, argued that even those with medals are part of a system that exploits them for others' profit."}, {"text": "Corporations and profiteers who sell goods and ammunition.", "isCorrect": true, "rationale": "Butler explicitly names those who sell uniforms, ammunition, and canned goods as the ones who profit while never hearing a shot fired."}, {"text": "Generations of youth who find a sense of purpose in military service.", "isCorrect": false, "rationale": "This aligns more with Holmes' view of war providing a 'forge of character' rather than Butler's economic critique."}]}, {"question": "Which statement best describes Woodrow Wilson’s position in the debate as presented in the text?", "options": [{"text": "War is a glorious endeavor that defines the progress of a civilization.", "isCorrect": false, "rationale": "This view is attributed to Holmes, while Wilson is described as taking a more moderate, middle-ground position."}, {"text": "War is an inherently corrupt enterprise that must be abolished at all costs.", "isCorrect": false, "rationale": "This more closely matches Butler's condemnation or a strict pacifist view, whereas Wilson acknowledged war's necessity."}, {"text": "War is terrible and destructive, yet it is sometimes a necessary course of action.", "isCorrect": true, "rationale": "The text identifies Wilson as holding the middle ground, viewing war as a tragedy that must occasionally be undertaken."}, {"text": "War is primarily a tool for economic expansion that benefits the working class.", "isCorrect": false, "rationale": "Wilson's argument focused on the political necessity and the 'terrible' nature of war, not on economic benefits for workers."}]}, {"question": "How does the text use Erich Maria Remarque's novel 'All Quiet on the Western Front' to frame the debate?", "options": [{"text": "As a primary example of Holmes' theory that war reveals the best in human beings.", "isCorrect": false, "rationale": "The text says Remarque's novel gave voice to a generation who found that arguments did not match the harsh reality of the trenches."}, {"text": "To suggest that the actual experience of the trenches may defy any philosophical argument for or against war.", "isCorrect": true, "rationale": "Remarque is presented as a witness to a reality that 'no argument' could fully capture or justify."}, {"text": "As the definitive evidence supporting Butler's claim that war is purely an economic racket.", "isCorrect": false, "rationale": "While Remarque and Butler both offer critical views, Remarque's focus is on the disconnect between rhetoric and the physical reality of the soldiers."}, {"text": "To demonstrate that the Gilded Age produced a generation of soldiers ready for the 'crucible'.", "isCorrect": false, "rationale": "Remarque’s work typically highlights the disillusionment and destruction of that generation rather than their readiness for a 'crucible'."}]}, {"question": "What is the significance of the term 'faith without certainty' in Holmes’ argument?", "options": [{"text": "It refers to the soldier's hope that the war will end quickly without further loss of life.", "isCorrect": false, "rationale": "Holmes' argument is about the moral quality of the action itself, not the optimism regarding its duration."}, {"text": "It describes the highest form of moral courage: acting and risking death for a cause one may not fully understand.", "isCorrect": true, "rationale": "Holmes believed that the willingness to act on faith, despite a lack of absolute understanding or guarantee, was the peak of human virtue."}, {"text": "It criticizes soldiers for following orders blindly without questioning the economic motives of their leaders.", "isCorrect": false, "rationale": "This would be a critique from Butler's perspective; Holmes saw this 'faith' as an admirable quality of character."}, {"text": "It represents the uncertainty of the profiteers regarding whether a war will be lucrative.", "isCorrect": false, "rationale": "Profiteers are associated with calculating benefits, whereas Holmes is discussing the spiritual and moral state of the soldier."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
