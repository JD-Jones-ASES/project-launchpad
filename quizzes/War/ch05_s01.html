        <div class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 5, Section 1</div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the core philosophical disagreement between Oliver Wendell Holmes Jr. and Smedley Butler regarding war?", "options": [{"text": "Whether war is financially profitable for specific industries.", "isCorrect": false, "rationale": "While Butler highlights war's profitability for certain corporations, this is a part of his argument about exploitation, not the fundamental philosophical clash both men are debating."}, {"text": "What war does to the human soul and character.", "isCorrect": true, "rationale": "The text explicitly states: 'They are arguing about what war does to the human soul,' identifying this as the 'deepest disagreement' beyond policy."}, {"text": "Whether war is politically justified for national defense.", "isCorrect": false, "rationale": "The text notes that Woodrow Wilson occupied a middle ground on the necessity of war, but states that Holmes and Butler's disagreement goes deeper than policy or justification."}, {"text": "The psychological impact of combat trauma on veterans.", "isCorrect": false, "rationale": "While related to the 'human soul,' the core debate is broader, encompassing the cultivation or destruction of character and virtue, not solely trauma."}]}, {"question": "According to Holmes, what unique quality does war cultivate that Gilded Age America's society could not produce on its own?", "options": [{"text": "Economic prosperity and material comfort.", "isCorrect": false, "rationale": "Holmes argued that the Gilded Age society, with its focus on profit and material comfort, *failed* to produce the virtues he valued, implying war was needed to counteract this trend."}, {"text": "A focus on profit and individual gain.", "isCorrect": false, "rationale": "This describes the Gilded Age society, which Holmes saw as lacking the moral fiber that war could provide, not a quality war itself cultivates."}, {"text": "Moral courage, self-sacrifice, and discipline.", "isCorrect": true, "rationale": "Holmes believed war was a 'crucible' that produced 'courage, self-sacrifice, discipline, and faith,' virtues he felt a peaceful, commercial society lacked."}, {"text": "The ability to avoid conflict and maintain international peace.", "isCorrect": false, "rationale": "Holmes glorified war and its ability to forge character, not its role in promoting peace."}]}, {"question": "The text states that Holmes' 'ethos' gave his argument 'a weight that a civilian's version of the same claim would lack.' What does this imply about the nature of his argument?", "options": [{"text": "It was based purely on abstract philosophical reasoning, making it universally applicable.", "isCorrect": false, "rationale": "The text explicitly states Holmes was 'not a desk-bound philosopher spinning theories' and spoke from 'direct experience,' contradicting pure abstraction."}, {"text": "Its credibility and authority were significantly enhanced by his personal, direct experience in combat.", "isCorrect": true, "rationale": "Holmes' personal authority (ethos) derived from his firsthand experience, having been shot and left for dead in battle, giving his claims about war's effect on character unique credibility."}, {"text": "It was primarily aimed at persuading fellow veterans, rather than the general public.", "isCorrect": false, "rationale": "While his experience resonated, the statement addresses the inherent weight of his argument due to experience, not its target audience."}, {"text": "It was inherently biased due to his personal involvement, diminishing its objectivity.", "isCorrect": false, "rationale": "The text presents his experience as adding 'weight' and 'personal authority,' implying enhanced credibility rather than diminished objectivity."}]}, {"question": "Smedley Butler argues that the courage of individual soldiers is ultimately exploited in war. Who does he identify as the primary beneficiaries of this exploitation?", "options": [{"text": "The soldiers themselves, through personal growth and honor.", "isCorrect": false, "rationale": "Butler's view is the opposite; he believes soldiers' courage is exploited, and they come home broken, while others profit."}, {"text": "The nation, by successfully achieving its strategic objectives.", "isCorrect": false, "rationale": "Butler focuses on economic beneficiaries, viewing war as a 'racket' primarily serving financial interests, not necessarily the broader strategic good of the nation."}, {"text": "Corporations and profiteers who supply the war effort.", "isCorrect": true, "rationale": "Butler explicitly states that 'the real beneficiaries are not the men in the trenches but the corporations that sell the ammunition, the uniforms, and the canned goods.'"}, {"text": "Future generations, who inherit a more peaceful world.", "isCorrect": false, "rationale": "Butler's argument focuses on the immediate, exploitative nature of war for economic gain, not its long-term societal benefits."}]}, {"question": "Why is Butler's ethos considered 'at least as powerful as Holmes'' by the author?", "options": [{"text": "Because he was initially an intellectual who later became a pacifist out of abstract principles.", "isCorrect": false, "rationale": "The text explicitly states he was 'not an intellectual who turned pacifist out of abstract principle' but a warrior who changed his mind."}, {"text": "He earned two Medals of Honor and spent decades as a career Marine, validating his firsthand experience with war's realities.", "isCorrect": true, "rationale": "Like Holmes, Butler's ethos comes from direct, extensive experience in combat, including earning two Medals of Honor, making his condemnation of war uniquely powerful because it comes from a decorated warrior."}, {"text": "He had a more comprehensive understanding of the financial mechanisms behind war, making his critique more robust.", "isCorrect": false, "rationale": "While he critiques the economic aspects, the strength of his ethos stems from his direct military experience, not primarily his financial expertise."}, {"text": "His arguments were more widely accepted by the public due to his celebrity status.", "isCorrect": false, "rationale": "The text attributes his ethos to his personal experience and transformation, not his public reception or celebrity."}]}, {"question": "Consider a soldier making the decision to advance under heavy fire to protect comrades. How would Holmes and Butler likely interpret this act, based on their core claims?", "options": [{"text": "Holmes would see it as proof of systemic exploitation, while Butler would celebrate the soldier's individual virtue.", "isCorrect": false, "rationale": "This reverses their core viewpoints. Holmes focuses on individual virtue, Butler on systemic exploitation."}, {"text": "Both would agree it's a tragic consequence of war, but disagree on its necessity.", "isCorrect": false, "rationale": "While tragedy is part of war, their interpretations go deeper into the meaning of such acts and the system that enables them."}, {"text": "Holmes would highlight the soldier's courage and self-sacrifice, while Butler would acknowledge the courage but point to the exploitative system that put the soldier in that situation.", "isCorrect": true, "rationale": "Holmes focuses on the individual's virtues ('courage...self-sacrifice...faith'), while Butler acknowledges 'extraordinary courage' but argues it's 'exploited' by the system."}, {"text": "Both would agree it's an admirable act, but Holmes would argue it's unnecessary, and Butler would say it's essential for morale.", "isCorrect": false, "rationale": "This misrepresents their positions; Holmes would certainly not see it as unnecessary, and Butler's focus is on exploitation, not morale."}]}, {"question": "Which figure mentioned in the text held a perspective on war that could be described as occupying a 'middle ground' between glorification and condemnation?", "options": [{"text": "Oliver Wendell Holmes Jr.", "isCorrect": false, "rationale": "Holmes glorified war as a forge of character."}, {"text": "Smedley Butler.", "isCorrect": false, "rationale": "Butler condemned war as a racket."}, {"text": "Woodrow Wilson.", "isCorrect": true, "rationale": "The text explicitly states Wilson 'occupied a middle ground, arguing that war is terrible but sometimes necessary.'"}, {"text": "Erich Maria Remarque.", "isCorrect": false, "rationale": "Remarque's novel conveyed the harsh reality of war but did not present a philosophical 'middle ground' argument in the text."}]}, {"question": "The text asks, 'Can Both Be Right?' and proposes a 'Question of Scale.' What is the fundamental distinction drawn to suggest that Holmes and Butler might not entirely contradict each other?", "options": [{"text": "Holmes focuses on historical analysis, while Butler focuses on predicting future conflicts.", "isCorrect": false, "rationale": "The text does not frame their distinction in terms of historical analysis versus future prediction."}, {"text": "Holmes examines war's impact on individual persons, while Butler examines its impact on economic and political systems.", "isCorrect": true, "rationale": "The text explicitly states: 'Holmes is talking about what war does to persons. Butler is talking about what war does to systems.'"}, {"text": "Holmes discusses the physical aspects of war, while Butler discusses the psychological aspects.", "isCorrect": false, "rationale": "Both implicitly touch on physical and psychological aspects, but their core distinction is about individual experience versus systemic function."}, {"text": "Holmes applies his view to defensive wars, while Butler applies his to offensive wars.", "isCorrect": false, "rationale": "This distinction is not made in the provided text."}]}, {"question": "The text states that the tension between individual virtue and systemic exploitation 'is not unique to war' but that war 'intensifies the tension to a breaking point.' Which of the following scenarios best exemplifies this tension outside of war?", "options": [{"text": "A student studying diligently and sacrificing social time to achieve a high grade in a difficult course.", "isCorrect": false, "rationale": "This primarily illustrates individual virtue and sacrifice for personal gain, without a clear element of systemic exploitation of that virtue by external interests."}, {"text": "An athlete pushing physical limits to win a competition, bringing glory to their team and coach.", "isCorrect": false, "rationale": "While there's individual virtue and benefits to others, the 'systemic exploitation' aspect, where the individual is fundamentally harmed or cheated for someone else's profit, is less pronounced than in the correct answer."}, {"text": "A factory worker performing dangerous tasks with exceptional skill and dedication, while the factory owner profits immensely from their labor and maintains unsafe working conditions.", "isCorrect": true, "rationale": "This scenario perfectly illustrates individual skill and dedication (virtue) being exploited by a system (the factory owner/company) for profit, often at the expense of the worker's well-being, directly mirroring the text's description."}, {"text": "A scientist making a groundbreaking discovery purely out of intellectual curiosity and sharing it freely with the world.", "isCorrect": false, "rationale": "This highlights individual virtue (curiosity) and positive societal contribution, but lacks the element of systemic exploitation of that virtue."}]}, {"question": "The concluding paragraph refers to 'two lenses' through which to view war. If someone chooses to focus primarily on Holmes' lens, what potential consequence does the author suggest?", "options": [{"text": "They risk becoming overly critical of individual soldiers' actions and motivations.", "isCorrect": false, "rationale": "Holmes' lens celebrates individual soldiers' virtues, so focusing on it would likely lead to admiration, not criticism, of their actions."}, {"text": "They might overlook or struggle to confront the systemic issues and corrupt purposes of war.", "isCorrect": true, "rationale": "The text explicitly asks 'whether acknowledging the soldier's virtue — as Holmes does — distracts us from questioning the system — as Butler demands,' and concludes, 'whether celebrating the first makes it harder to confront the second.'"}, {"text": "They will inevitably adopt a pacifist stance towards all conflicts due to a deeper understanding.", "isCorrect": false, "rationale": "Holmes glorified war and its virtues, so focusing on his lens would likely not lead to pacifism."}, {"text": "They will gain a complete and balanced understanding of war's multifaceted nature.", "isCorrect": false, "rationale": "The text implies that focusing on *one* lens (Holmes' or Butler's) provides only a partial truth; a complete understanding requires considering both."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
