<script>
var QUESTIONS = [{"question": "Which aspect of Smedley Butler's background makes his decision to enlist in the Marine Corps particularly striking, according to the text?", "options": [{"text": "His father's long career in politics.", "isCorrect": false, "rationale": "While true that his father was a congressman, the text highlights a different aspect as 'all the more striking' regarding Butler's career choice."}, {"text": "His family's prominent Quaker pacifist tradition.", "isCorrect": true, "rationale": "The text explicitly states that 'The Quaker pacifist tradition ran deep in the Butler household, which makes his choice of career all the more striking.'"}, {"text": "His relatively young age of sixteen at enlistment.", "isCorrect": false, "rationale": "Though he did lie about his age to enlist at sixteen, the text emphasizes his Quaker background as the particularly striking element of his career choice."}, {"text": "His desire to escape a comfortable upbringing.", "isCorrect": false, "rationale": "The text does not mention any desire to escape his upbringing as a motivation for enlistment, focusing instead on the contrast with his family's pacifist tradition."}]}, {"question": "According to the text, what is the primary reason Smedley Butler's indictment of war is 'difficult to dismiss'?", "options": [{"text": "His eloquence as a speaker and writer, which made his arguments compelling.", "isCorrect": false, "rationale": "The text explicitly states that his ethos 'comes not from his education or his eloquence,' suggesting this is not the primary reason for his message's power."}, {"text": "His personal transformation from a committed pacifist to a war hawk.", "isCorrect": false, "rationale": "Butler was never a pacifist soldier; he came from a pacifist family but became a soldier at a young age, so this description of his transformation is inaccurate."}, {"text": "His unparalleled record as one of the most decorated combat soldiers in U.S. history.", "isCorrect": true, "rationale": "The text states, 'He was, by any measure, one of the most accomplished combat soldiers the United States has ever produced — and that is precisely what makes his indictment of war so difficult to dismiss.'"}, {"text": "His family's political influence and connections within the government.", "isCorrect": false, "rationale": "While his father was a congressman, the text does not attribute the power of Butler's indictment to his family's political connections but rather to his personal military credibility."}]}, {"question": "Smedley Butler's candid description of himself as 'a muscle man for Big Business' primarily refers to his role in what series of military interventions?", "options": [{"text": "The Spanish-American War.", "isCorrect": false, "rationale": "While Butler served in the Spanish-American War, the quote 'muscle man for Big Business' is specifically linked in the text to the 'Banana Wars' context."}, {"text": "The Boxer Rebellion in China.", "isCorrect": false, "rationale": "Butler served during the Boxer Rebellion, but this particular self-description is contextualized within the 'Banana Wars' section of the text."}, {"text": "The Banana Wars in Central America and the Caribbean.", "isCorrect": true, "rationale": "The text explicitly states that 'The military interventions that consumed most of Butler's career — in Central America, the Caribbean, and Mexico — are collectively known as the Banana Wars,' and immediately after, that 'Butler would later describe his role in these interventions with brutal candor: he had been, in his own words, “a muscle man for Big Business.”'"}, {"text": "World War I in France.", "isCorrect": false, "rationale": "Butler's role in World War I involved commanding a debarkation camp, which does not fit the 'muscle man for Big Business' description tied to the Latin American interventions."}]}, {"question": "The text identifies a 'great irony' in Butler's life. What is it?", "options": [{"text": "He was a Quaker by birth but became the most decorated Marine of his generation.", "isCorrect": false, "rationale": "While this is a striking contradiction, the 'great irony' highlighted in the text refers specifically to his actions and later condemnation."}, {"text": "He received two Medals of Honor, but many of his interventions were not officially declared wars.", "isCorrect": false, "rationale": "The receipt of medals is a fact of his career, and the undeclared nature of some interventions is a historical context, but this is not identified as the 'great irony' of his life."}, {"text": "He spent three decades actively enforcing American commercial interests abroad, which he later condemned as a 'racket.'", "isCorrect": true, "rationale": "The text states: 'The great irony of Butler's life is that he spent three decades doing precisely the work he would later condemn. He enforced American commercial interests abroad with rifle and bayonet.'"}, {"text": "He retired as a Major General but never held a political office despite his father's career.", "isCorrect": false, "rationale": "His career path is a fact, not an irony. The irony lies in the direct contradiction between his actions and his later views."}]}, {"question": "How does the text distinguish the impact of Smedley Butler's anti-war message from that of a 'career pacifist'?", "options": [{"text": "Butler's message was more easily understood by the average citizen due to its plain language.", "isCorrect": false, "rationale": "The text does not compare the clarity of language; it focuses on the credibility of the speaker."}, {"text": "Butler's message was based on insider knowledge of government operations and corruption.", "isCorrect": false, "rationale": "While Butler did have firsthand knowledge, the key distinction highlighted is his military standing, not just his 'insider knowledge' in general."}, {"text": "Butler's status as a highly decorated combat veteran gave his condemnation significant, undeniable credibility.", "isCorrect": true, "rationale": "The text explicitly states: 'When a career pacifist calls war a racket, it is easy to dismiss. When the most decorated Marine of his generation does so, people listen.' His combat experience lends weight."}, {"text": "Butler's message avoided political partisanship, unlike many pacifists who were often aligned with specific political movements.", "isCorrect": false, "rationale": "The text does not discuss the political alignment of Butler's message or compare it to that of other pacifists in this way."}]}, {"question": "When the text states Butler's 'ethos... comes not from his education or his eloquence but from his scars,' what is it emphasizing as the foundation of his authority in 'War Is a Racket'?", "options": [{"text": "His physical injuries sustained in combat, which garnered public sympathy.", "isCorrect": false, "rationale": "The 'scars' are used metaphorically here to represent his deep personal experience and not solely literal physical wounds."}, {"text": "His intellectual capacity and formal schooling, which enabled him to articulate complex arguments.", "isCorrect": false, "rationale": "The text explicitly contrasts his ethos with his 'education,' indicating this is not the foundation of his authority."}, {"text": "His extensive firsthand experience and personal suffering from witnessing the grim realities and profiteering of war.", "isCorrect": true, "rationale": "The text connects 'scars' to 'firsthand knowledge,' stating 'When Butler describes how war enriches a few at the expense of the many, he is not speculating. He is reporting what he saw.' This experience forms his ethos."}, {"text": "His ability to rally public support through powerful speeches and public appearances.", "isCorrect": false, "rationale": "The text contrasts his ethos with his 'eloquence,' implying his public speaking ability is not the primary source of his authority."}]}, {"question": "Smedley Butler's father, Thomas S. Butler, held a significant position in government. What was this position?", "options": [{"text": "General in the United States Army.", "isCorrect": false, "rationale": "Thomas S. Butler was a politician, not a military general."}, {"text": "Chairman of the House Naval Affairs Committee.", "isCorrect": true, "rationale": "The text states, 'His father, Thomas S. Butler, served in the United States House of Representatives for thirty-one years and chaired the House Naval Affairs Committee.'"}, {"text": "Secretary of State during the Banana Wars.", "isCorrect": false, "rationale": "Thomas S. Butler was a member of the House of Representatives, not the Secretary of State."}, {"text": "Ambassador to Haiti during the American occupation.", "isCorrect": false, "rationale": "Thomas S. Butler served in the U.S. House of Representatives, not as an ambassador."}]}, {"question": "Before World War I, Smedley Butler's service record included military interventions in all of the following regions EXCEPT:", "options": [{"text": "China.", "isCorrect": false, "rationale": "Butler served in China during the Boxer Rebellion of 1900, which was before World War I."}, {"text": "Philippines.", "isCorrect": false, "rationale": "Butler fought in the Philippines during the insurrection that followed the Spanish-American War, which was before World War I."}, {"text": "Nicaragua.", "isCorrect": false, "rationale": "Butler led Marines in Nicaragua in 1910, which was before World War I."}, {"text": "Germany.", "isCorrect": true, "rationale": "Butler fought in France during World War I, but the text does not mention any service in Germany prior to or during WWI."}]}, {"question": "The 'Banana Wars' are characterized by the text as differing from wars like World War I or the Spanish-American War in what primary way?", "options": [{"text": "They involved direct combat only, without any long-term occupation or nation-building efforts.", "isCorrect": false, "rationale": "The text mentions Butler commanding the Gendarmerie d'Haïti during the American occupation, indicating occupations did occur."}, {"text": "They were undeclared by Congress and primarily served American commercial interests.", "isCorrect": true, "rationale": "The text explicitly states: 'These were not wars declared by Congress or fought for national survival. They were interventions ordered by presidents and the State Department, frequently at the behest of American business interests.'"}, {"text": "They were fought exclusively by the Marine Corps, without involvement from other branches of the military.", "isCorrect": false, "rationale": "While Marines were heavily involved, the text does not specify the exclusivity of Marine involvement or use this as a primary distinguishing characteristic."}, {"text": "They were fought primarily for humanitarian reasons rather than strategic or economic ones.", "isCorrect": false, "rationale": "The text clearly states they were 'often conducted to protect the commercial interests of American corporations,' which contradicts the idea of humanitarian motivations."}]}, {"question": "The text highlights a distinct contrast between Smedley Butler's family background and his chosen career. This contrast primarily serves to:", "options": [{"text": "Explain his eventual disillusionment with military life and his anti-war stance.", "isCorrect": false, "rationale": "While his background might have contributed, the text presents the contrast more as an initial striking choice rather than the direct cause of his later disillusionment."}, {"text": "Emphasize the depth of his personal conviction in his military service despite his family's pacifist beliefs.", "isCorrect": true, "rationale": "The text notes 'The Quaker pacifist tradition ran deep in the Butler household, which makes his choice of career all the more striking,' highlighting his personal resolve in choosing a path contrary to his upbringing."}, {"text": "Suggest that his family secretly encouraged him to defy their traditions and pursue a military career.", "isCorrect": false, "rationale": "There is no evidence in the text to suggest his family encouraged him to defy their traditions; it only notes the contrast."}, {"text": "Illustrate the common path of young men from prominent families into military service at the turn of the 20th century.", "isCorrect": false, "rationale": "The text emphasizes the *uniqueness* of his choice given his *specific* family background (Quaker pacifist), rather than presenting it as a common path."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
