<script>
var QUESTIONS = [{"question": "Smedley Butler's decision to enlist in the Marine Corps at age sixteen is described as 'striking' primarily because:", "options": [{"text": "He was too young to legally enlist without parental consent.", "isCorrect": false, "rationale": "While true that he lied about his age, the text highlights his family's Quaker pacifist tradition as the primary reason his choice of career was 'all the more striking,' implying a deeper conflict with his upbringing than just legal age."}, {"text": "He came from a family with a deep pacifist tradition.", "isCorrect": true, "rationale": "The text explicitly states, 'The Quaker pacifist tradition ran deep in the Butler household, which makes his choice of career all the more striking.' This contrasts sharply with his decision to enlist in the military."}, {"text": "The Spanish-American War was not a conflict supported by most Americans.", "isCorrect": false, "rationale": "The text does not provide information about public support for the Spanish-American War, nor does it link this to the 'striking' nature of Butler's enlistment."}, {"text": "He had already achieved significant academic success, suggesting a different path.", "isCorrect": false, "rationale": "The text makes no mention of Butler's academic achievements before his enlistment. His 'ethos' is later described as coming 'not from his education'."}], "id": "q01"}, {"question": "According to the text, what is the most significant factor that makes Smedley Butler's condemnation of war exceptionally powerful and difficult to dismiss?", "options": [{"text": "His eloquence as a speaker and writer.", "isCorrect": false, "rationale": "The text explicitly states that Butler's authority comes 'not from his education or his eloquence,' but from his firsthand experience."}, {"text": "His direct personal experience as a highly decorated combat soldier.", "isCorrect": true, "rationale": "The text emphasizes that Butler was 'one of the most accomplished combat soldiers' and 'the most decorated Marine of his generation,' stating this is 'precisely what makes his indictment of war so difficult to dismiss' and that 'people listen' when he speaks."}, {"text": "His academic background in political science and economics.", "isCorrect": false, "rationale": "The text clarifies that his authority does not come from his education, but from his 'scars' and what he 'saw'."}, {"text": "His early life as a pacifist, which gave him an objective perspective.", "isCorrect": false, "rationale": "While he came from a pacifist family, Butler spent 33 years in uniform, almost all in combat, making him far from an 'early life pacifist' in the context of his critique. His authority comes from his combat experience, not from a detached pacifist viewpoint."}], "id": "q02"}, {"question": "The 'great irony' of Smedley Butler's life, as described in the text, stems from the fact that he:", "options": [{"text": "Achieved the highest ranks in the military despite his Quaker upbringing.", "isCorrect": false, "rationale": "While an irony, the text specifically identifies the 'great irony' as his active participation in the very acts he later denounced, rather than just his career progression."}, {"text": "Condemned war after benefiting personally from military contracts.", "isCorrect": false, "rationale": "The text describes him as 'a muscle man for Big Business' who enforced commercial interests, not as someone who personally profited from military contracts in the way corporations did."}, {"text": "Became a pacifist intellectual after his retirement from active service.", "isCorrect": false, "rationale": "The text specifically contrasts Butler with a 'pacifist intellectual,' emphasizing that his critique came from combat experience, not detached intellectualism."}, {"text": "Dedicated his military career to enforcing the very commercial interests he later exposed as beneficiaries of war.", "isCorrect": true, "rationale": "The text explicitly states, 'The great irony of Butler's life is that he spent three decades doing precisely the work he would later condemn. He enforced American commercial interests abroad... on behalf of administrations that answered, in part, to the same corporate interests that profited from his campaigns.'"}], "id": "q03"}, {"question": "Which statement best characterizes the 'Banana Wars' as described in the text?", "options": [{"text": "They were official wars declared by Congress for national defense.", "isCorrect": false, "rationale": "The text explicitly states, 'These were not wars declared by Congress or fought for national survival.'"}, {"text": "They primarily involved American military efforts to establish democratic governments.", "isCorrect": false, "rationale": "The text does not mention establishing democratic governments as the primary motivation; instead, it highlights 'at the behest of American business interests.'"}, {"text": "They were military interventions in Latin America driven by American corporate interests.", "isCorrect": true, "rationale": "The text identifies the Banana Wars as 'military interventions... in Central America, the Caribbean, and Mexico' that were 'frequently at the behest of American business interests,' with Butler describing himself as 'a muscle man for Big Business.'"}, {"text": "They were conflicts primarily fought against European colonial powers in the Americas.", "isCorrect": false, "rationale": "The text focuses on American interventions for American business interests, not conflicts against European powers."}], "id": "q04"}, {"question": "When Smedley Butler referred to himself as 'a muscle man for Big Business,' he was most likely expressing:", "options": [{"text": "Pride in his ability to protect American economic interests abroad.", "isCorrect": false, "rationale": "The text states he described his role 'with brutal candor' and later condemned the system, suggesting regret or disillusionment rather than pride."}, {"text": "Regret for his role in enforcing corporate profits through military force.", "isCorrect": true, "rationale": "His 'brutal candor' and subsequent condemnation of war as a 'racket,' where he had 'done the thing he was denouncing,' strongly imply a sense of regret and critical self-awareness regarding his past actions serving corporate interests."}, {"text": "His strategic insights into geopolitical economic power dynamics.", "isCorrect": false, "rationale": "While he undoubtedly had such insights, the specific phrase 'muscle man' points to his direct, forceful role in the field, acknowledging he was an instrument for others' profits, rather than just an analytical observation."}, {"text": "A desire to continue serving the interests of American corporations post-retirement.", "isCorrect": false, "rationale": "His post-retirement condemnation of war directly contradicts any desire to continue serving the interests he exposed."}], "id": "q05"}, {"question": "The text asserts that Butler's 'ethos' or authority in condemning war stemmed primarily from what source?", "options": [{"text": "His extensive formal education and rhetorical skills.", "isCorrect": false, "rationale": "The text explicitly states his authority comes 'not from his education or his eloquence.'"}, {"text": "His personal observations and direct experience with military operations and their economic beneficiaries.", "isCorrect": true, "rationale": "The text emphasizes his 'scars,' that 'he is reporting what he saw,' and 'drawing on decades of watching money flow from government contracts to private hands,' indicating his firsthand knowledge as the foundation of his authority."}, {"text": "His family's strong pacifist traditions and moral philosophy.", "isCorrect": false, "rationale": "While his background is noted, the text clarifies that his *authority* comes from his *personal experience* and having 'done the thing he was denouncing,' not from inherited philosophical principles."}, {"text": "His connections to influential political figures and government officials.", "isCorrect": false, "rationale": "The text does not mention his political connections as the source of his authority; it focuses on his combat and observational experience."}], "id": "q06"}, {"question": "Based on the text, which scenario would *least* likely produce a compelling and widely accepted critique of war, similar to Butler's?", "options": [{"text": "A highly decorated general publishing a memoir detailing the hidden corporate agendas behind conflicts he commanded.", "isCorrect": false, "rationale": "This scenario closely mirrors Butler's situation: a decorated military figure with firsthand knowledge exposing corporate interests, which the text suggests is highly compelling."}, {"text": "An investigative journalist exposing financial corruption in military contracting, citing classified documents.", "isCorrect": false, "rationale": "While different from Butler's direct combat role, an investigative journalist's exposure of corruption would be compelling, though perhaps lacking the unique 'ethos' of a decorated soldier."}, {"text": "A lifelong peace activist publishing a philosophical treatise on the immorality of violence and warfare.", "isCorrect": true, "rationale": "The text explicitly contrasts Butler with 'a pacifist intellectual who had never heard a shot fired in anger,' stating that 'When a career pacifist calls war a racket, it is easy to dismiss.' This scenario represents the type of critique deemed 'easy to dismiss'."}, {"text": "A former diplomat detailing how specific international interventions primarily served the economic interests of a select few nations.", "isCorrect": false, "rationale": "This scenario involves insider knowledge of economic interests, which aligns with parts of Butler's critique, though it lacks the 'combat soldier' aspect that makes Butler uniquely powerful."}], "id": "q07"}, {"question": "Which of the following regions was *not* explicitly mentioned as a location where Smedley Butler served during his military career?", "options": [{"text": "China", "isCorrect": false, "rationale": "The text states Butler 'served in China during the Boxer Rebellion of 1900.'"}, {"text": "Haiti", "isCorrect": false, "rationale": "The text mentions he 'commanded the Gendarmerie d'Haïti during the American occupation of Haiti.'"}, {"text": "Germany", "isCorrect": true, "rationale": "The text mentions service in France during WWI ('commanded Camp Pontanezen'), but Germany is not listed as a country where he served."}, {"text": "Nicaragua", "isCorrect": false, "rationale": "The text states he 'led Marines in Honduras (1903), in Panama (1903), in Nicaragua (1910), and in Veracruz, Mexico (1914).'"}], "id": "q08"}, {"question": "The author emphasizes that Butler's background notably distinguished him from conventional anti-war figures by highlighting that he was not:", "options": [{"text": "Driven by religious convictions.", "isCorrect": false, "rationale": "While he came from a Quaker family, the text emphasizes his combat experience, not his religious motivation, as the distinguishing factor for his critique compared to other anti-war figures."}, {"text": "An academic theorist or a non-combatant politician.", "isCorrect": true, "rationale": "The text directly states, 'Butler was not a pacifist intellectual who had never heard a shot fired in anger. He was not a politician who sent other men's sons to fight while he stayed safely behind a desk.' This explicitly contrasts him with these types of conventional anti-war figures."}, {"text": "Primarily concerned with international diplomacy.", "isCorrect": false, "rationale": "The text focuses on his combat role and his critique of war as a racket, not on his involvement or lack thereof in diplomacy."}, {"text": "Motivated by personal financial gain from conflict.", "isCorrect": false, "rationale": "While true he wasn't personally motivated by financial gain, the text focuses on his *type* of anti-war figure (combat veteran vs. pacifist/politician) as the key distinction, not his personal motives for joining."}], "id": "q09"}, {"question": "Considering Butler's background and early enlistment during the Spanish-American War, which of the following best describes his initial motivation for joining the Marine Corps, as implied by the text?", "options": [{"text": "A deep-seated commitment to the Quaker pacifist tradition.", "isCorrect": false, "rationale": "His enlistment at 16, lying about his age, directly contradicts his family's pacifist tradition, which the text highlights as making his choice 'striking.'"}, {"text": "A desire for adventure and to participate in a historical conflict despite his youth.", "isCorrect": true, "rationale": "Lying about his age to enlist at 16 during a war, and then spending 'thirty-three years in uniform, and almost all of that time in combat,' strongly implies a youthful eagerness for military life, action, and participation in significant events, overcoming his pacifist upbringing."}, {"text": "Pressure from his prominent family to pursue a military career.", "isCorrect": false, "rationale": "The text implies his choice was contrary to his family's pacifist values, making 'pressure' from them highly unlikely."}, {"text": "A clear understanding of the geopolitical and commercial interests driving the war.", "isCorrect": false, "rationale": "While he developed this understanding later, it's unlikely a 16-year-old would possess this complex geopolitical insight as his *initial* motivation. His later condemnation was based on *decades* of observation."}], "id": "q10"}, {"question": "Butler served in conflicts across the Philippines, China, Nicaragua, Haiti, and Mexico before World War I. How does this geographic breadth shape the authority of his eventual critique in 'War Is a Racket'?", "options": [{"text": "It shows Butler had personal experience with the specific corporate interests operating in each of those countries, making his economic claims verifiable.", "isCorrect": false, "rationale": "While Butler later identified corporate connections to specific conflicts, the geographic breadth primarily establishes his range of experience, not his personal knowledge of corporate records."}, {"text": "It means his critique is not based on one war or one theater but on a pattern observed across many different conflicts in multiple countries over decades, making his generalization much harder to dismiss as anomalous.", "isCorrect": true, "rationale": "If Butler had only served in one war, critics could say he drew sweeping conclusions from a single experience. Having participated in conflicts across three continents over thirty-three years, his claim that 'war is always a racket' is grounded in a much broader evidentiary base."}, {"text": "It demonstrates that American military power was necessary for global stability, which partly validates the wars Butler later criticized.", "isCorrect": false, "rationale": "Butler drew the opposite conclusion from his experience — that these interventions served corporate interests rather than genuine security needs."}, {"text": "It shows that Butler was more interested in personal adventure than in the strategic goals of each mission, undermining his credibility as an analyst.", "isCorrect": false, "rationale": "The text presents Butler as a serious professional who executed his missions effectively; his critique came from reflection on those missions' purposes, not from a cavalier attitude toward them."}], "id": "q11"}, {"question": "Butler came from a Quaker family with a tradition of pacifism yet became one of America's most decorated combat soldiers. When he ultimately denounced war as a racket, critics questioned why it took him thirty-three years to speak out. What is the strongest defense of Butler's delayed critique?", "options": [{"text": "His Quaker upbringing meant he was always secretly opposed to war and was simply waiting for a safe moment to say so.", "isCorrect": false, "rationale": "This speculative explanation is not supported by the text; Butler enlisted enthusiastically at 16 and demonstrated no reluctance during his long career."}, {"text": "The full pattern of corporate exploitation only becomes visible in retrospect, requiring years of service before the systemic nature of the racket could be recognized and documented.", "isCorrect": true, "rationale": "The text suggests his 'transformation' came from accumulated experience and reflection. An insider view requires enough cases to see the pattern; a single intervention might look necessary, but the same dynamic repeated across Nicaragua, Haiti, Mexico, and WWI makes the systemic critique compelling in a way it could not be early on."}, {"text": "He was legally prohibited from criticizing the military while on active duty and could only speak after retirement.", "isCorrect": false, "rationale": "While military members face real constraints on public speech, the text presents Butler's transformation as a genuine intellectual and moral development rather than a strategic waiting for legal clearance."}, {"text": "Butler was not intelligent enough to understand the economic forces behind war until late in his career.", "isCorrect": false, "rationale": "The text presents Butler as highly capable; his delayed critique reflects the gradual accumulation of evidence, not a limitation in his analytical abilities."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
