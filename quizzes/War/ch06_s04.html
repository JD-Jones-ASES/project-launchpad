    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/War.html">&larr; Back to War: A Debate in Primary Sources</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 6, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Oliver Wendell Holmes Jr. utilizes a logical method known as inductive generalization. Which of the following best describes the inherent vulnerability of this specific logical framework as applied in his argument?", "options": [{"text": "The reasoning is circular because it assumes the virtues of war are the cause of the soldier's faith rather than the result.", "isCorrect": false, "rationale": "While circular reasoning is a fallacy, the text identifies Holmes' specific vulnerability as the limited and potentially unrepresentative nature of his sample size."}, {"text": "The transition from specific personal observations to universal principles relies on a narrow and potentially unrepresentative sample.", "isCorrect": true, "rationale": "Inductive logic is only as strong as its supporting observations; Holmes' conclusions are drawn from a single war and a specific group of men, which may not apply universally."}, {"text": "The argument relies on deductive premises that cannot be verified through empirical observation or historical data.", "isCorrect": false, "rationale": "Holmes uses an inductive approach, moving from specific experience to general rules, rather than a deductive approach which starts with general premises."}, {"text": "The evidence provided consists of abstract philosophical claims that lack concrete, lived experience to support them.", "isCorrect": false, "rationale": "The text explicitly states that the strength of Holmes' approach is its concrete and personal evidence based on his lived experience in the Civil War."}]}, {"question": "Smedley Butler's argument that 'war is a racket' is primarily supported by economic data. According to the text, what is the primary logical 'gap' in Butler's indictment?", "options": [{"text": "The dollar figures and profit percentages cited by Butler have been proven by historians to be largely fabricated.", "isCorrect": false, "rationale": "The text notes that Butler's figures are 'broadly accurate' and that the pattern of wartime profit is well-documented."}, {"text": "Butler fails to account for the economic benefits that soldiers received from the high wages paid to munitions makers.", "isCorrect": false, "rationale": "Butler actually highlights the gap between soldier pay and corporate earnings as evidence of the 'racket,' not as a benefit."}, {"text": "The evidence of corporate profit does not inherently prove that the pursuit of those profits was the actual cause of the war.", "isCorrect": true, "rationale": "This represents a causal error; showing that profit followed war (correlation) does not prove that the desire for profit initiated the war (causation)."}, {"text": "Butler’s logic is purely philosophical and lacks the testable criteria found in the arguments of Wilson or Holmes.", "isCorrect": false, "rationale": "The text states that Butler's logos is 'testable' because it relies on verifiable numbers, unlike Holmes' more philosophical claims."}]}, {"question": "In the context of Smedley Butler's economic analysis, the text mentions the logical error $post\\ hoc\\ ergo\\ propter\\ hoc$. How does this fallacy apply to his argument?", "options": [{"text": "He assumes that because the government failed to pay soldiers fairly, the war was inherently immoral.", "isCorrect": false, "rationale": "This relates to moral judgment rather than the specific chronological-causal fallacy of $post\\ hoc\\ ergo\\ propter\\ hoc$."}, {"text": "He argues that because economic exploitation occurred after the war began, it must have been the reason the war was started.", "isCorrect": true, "rationale": "This fallacy involves the mistaken belief that because event B followed event A, event A must have caused event B."}, {"text": "He generalizes from a single instance of corporate profit to conclude that all corporations are inherently corrupt.", "isCorrect": false, "rationale": "This describes a hasty generalization rather than the $post\\ hoc$ fallacy, which specifically deals with the sequence of events."}, {"text": "He relies on the authority of his military rank to validate economic data that he did not personally collect.", "isCorrect": false, "rationale": "This would be an appeal to authority (ethos), whereas the $post\\ hoc$ fallacy is a breakdown in logical causality (logos)."}]}, {"question": "Woodrow Wilson’s logical method is described as essentially deductive. Which of the following serves as the major premise in his primary chain of reasoning?", "options": [{"text": "The United States must enter the war to ensure that Du Pont stockholders do not profit further.", "isCorrect": false, "rationale": "This is an economic argument associated with Butler, whereas Wilson focuses on legal and moral principles."}, {"text": "Nations possess the inherent right to navigate the seas and trade freely without interference.", "isCorrect": true, "rationale": "Wilson's deductive logic begins with this general principle of international right, from which he derives the necessity of war following Germany's violations."}, {"text": "The experience of war reveals a universal truth about the ennobling nature of struggle.", "isCorrect": false, "rationale": "This is the core of Holmes' inductive reasoning, not Wilson's deductive framework."}, {"text": "The sensory reality of the battlefield is the only evidence that cannot be disputed by politicians.", "isCorrect": false, "rationale": "This describes Remarque's testimonial approach, which Wilson's logical structure seeks to transcend through political reasoning."}]}, {"question": "According to the text, why is Wilson’s moral argument about the threat to democracy more difficult to evaluate than his argument about neutral rights?", "options": [{"text": "It is based on predictions about future outcomes that cannot be verified at the time the argument is made.", "isCorrect": true, "rationale": "Arguments based on hypotheticals and predictions about what 'will happen' if action is not taken are inherently speculative and depend on contested assumptions."}, {"text": "It contradicts the economic data provided by Butler regarding the costs of the war to the taxpayer.", "isCorrect": false, "rationale": "While they offer different perspectives, the difficulty in evaluating Wilson's claim stems from its predictive nature, not a direct contradiction with economic data."}, {"text": "Wilson lacks the personal 'lived experience' that Holmes uses to justify the necessity of military action.", "isCorrect": false, "rationale": "While true, the text emphasizes that the difficulty in evaluating the democracy argument lies in its reliance on unverifiable predictions."}, {"text": "The rights of neutral nations are considered 'conveniences' rather than absolute moral principles.", "isCorrect": false, "rationale": "The text mentions this as a possible skeptical challenge to his first premise, but it doesn't explain why the democracy argument specifically is hard to evaluate."}]}, {"question": "Erich Maria Remarque utilizes 'experiential testimony' as his logical method. What is identified as the 'greatest limitation' of this approach in the context of a debate on war?", "options": [{"text": "Sensory data is subjective and can be easily dismissed by those who did not experience it.", "isCorrect": false, "rationale": "The text actually states that Remarque's evidence is 'impossible to argue with' and that no one can claim these experiences did not happen."}, {"text": "The focus on the human body ignores the psychological effects of warfare on the soldier.", "isCorrect": false, "rationale": "Remarque includes the loss of the ability to imagine a future, which is a psychological effect, so this is not the identified limitation."}, {"text": "It provides powerful evidence of war's reality but does not offer a clear direction for policy or action.", "isCorrect": true, "rationale": "The text notes that while the evidence is irrefutable, it doesn't tell us 'what to do,' as different thinkers can use the same horror to justify different conclusions."}, {"text": "It relies on a syllogistic structure that is easily dismantled by economic analysts like Butler.", "isCorrect": false, "rationale": "The text explicitly states that Remarque offers 'no syllogisms,' but rather raw sensory data."}]}, {"question": "A reader applying 'critical thinking' as defined in the concluding note of the text would perform which of the following actions?", "options": [{"text": "Identify the single logical framework that is objectively the strongest among the four authors.", "isCorrect": false, "rationale": "The text states there is 'no single correct answer' and that readers will naturally disagree on which is most convincing."}, {"text": "Accept Remarque's testimony as the final word because physical facts are more important than logic.", "isCorrect": false, "rationale": "Critical thinking involves evaluating all frameworks, including their weaknesses, rather than declaring one as beyond critique."}, {"text": "Articulate the weaknesses of their own preferred logical framework as clearly as they do for the ones they reject.", "isCorrect": true, "rationale": "The text defines critical thinking as honest evaluation and the ability to recognize flaws in the arguments we find most appealing."}, {"text": "Reject Wilson’s deductive logic because it is based on principles that are no longer relevant in the modern world.", "isCorrect": false, "rationale": "Critical thinking requires analyzing the internal logic and premises of an argument, not just dismissing it based on modern preference."}]}, {"question": "How might Holmes respond to Remarque’s evidence of the horrors of the battlefield, according to the comparison provided in the text?", "options": [{"text": "By arguing that the horror is exactly what allows a soldier to demonstrate admirable faith.", "isCorrect": true, "rationale": "The text suggests Holmes would accept the reality of the horror but interpret it as the necessary condition for the virtues he celebrates."}, {"text": "By dismissing the sensory data as unrepresentative of the 'average' soldier's experience.", "isCorrect": false, "rationale": "The text notes that each author (including Holmes) would accept Remarque's evidence while drawing a different conclusion from it."}, {"text": "By providing data that shows the mortality rates of the Civil War were lower than those in Remarque's experience.", "isCorrect": false, "rationale": "Holmes uses inductive generalization from experience, not the empirical data or 'body counts' found in economic or statistical analysis."}, {"text": "By claiming that Remarque's focus on the body is a 'commercial' concern that lacks philosophical depth.", "isCorrect": false, "rationale": "While Holmes critiques 'commercial society,' he values the soldier's struggle; he wouldn't necessarily view Remarque's focus as commercial."}]}, {"question": "Which logical framework is described as having the virtue of being 'testable' in a way that philosophical claims are not?", "options": [{"text": "Holmes’ Inductive Generalization", "isCorrect": false, "rationale": "Holmes' claims are based on interpretation of experience and philosophical principles, making them harder to 'test' than hard data."}, {"text": "Butler’s Economic Analysis", "isCorrect": true, "rationale": "The text states that Butler's logos is testable because his dollar figures and profit percentages are verifiable facts."}, {"text": "Wilson’s Deductive Reasoning", "isCorrect": false, "rationale": "While disciplined, Wilson's logic relies on premises about rights and future threats that are often contested and not easily 'tested' like financial data."}, {"text": "Remarque’s Testimonial Evidence", "isCorrect": false, "rationale": "Remarque's evidence is irrefutable on its own terms, but it's raw sensory data rather than a 'testable' logical framework for policy."}]}, {"question": "What does the text suggest is a potential counterexample to Holmes' claim that war ennobles men?", "options": [{"text": "The fact that some corporations make excessive profits during wartime.", "isCorrect": false, "rationale": "This is Butler's evidence, not a direct logical counterexample to the effect of war on the individual soldier's character."}, {"text": "The violation of neutral rights by nations like Germany using submarines.", "isCorrect": false, "rationale": "This is a geopolitical point used by Wilson, not a counterexample to the cultivation of personal virtue."}, {"text": "The existence of soldiers who returned from war 'broken' rather than 'ennobled.'", "isCorrect": true, "rationale": "The text notes that Holmes does not address those who were destroyed by war, which serves as a significant counterexample to his generalization that war produces virtue."}, {"text": "The failure of diplomacy to prevent international conflict.", "isCorrect": false, "rationale": "This is a link in Wilson's deductive chain regarding the necessity of force, not a critique of Holmes' views on virtue."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
