<script>
var QUESTIONS = [{"question": "According to the text, what essential role does logos play in an argument?", "options": [{"text": "It moves the audience emotionally to care about the issue.", "isCorrect": false, "rationale": "This describes pathos, which appeals to emotion, not logos, which provides logic and evidence."}, {"text": "It establishes the speaker's credibility and right to speak.", "isCorrect": false, "rationale": "This describes ethos, which concerns the speaker's authority and character, not logos, which is about the argument's logical structure."}, {"text": "It provides the logical framework and evidence supporting a claim.", "isCorrect": true, "rationale": "The text explicitly states that logos is 'the logic and evidence that support a claim' and 'what gives an argument its backbone.'"}, {"text": "It vividly describes personal experiences to engage the reader.", "isCorrect": false, "rationale": "While vividness can be a characteristic of some forms of evidence (like Holmes's), it is not the defining role of logos itself, but rather a quality of certain types of supporting material."}], "id": "q01"}, {"question": "Which of the following best describes the primary vulnerability of Holmes' logical method?", "options": [{"text": "His philosophical principles are inherently untestable.", "isCorrect": false, "rationale": "While philosophical claims can be difficult to test empirically, the text points to a more specific vulnerability for Holmes related to his evidence, not the nature of philosophy itself."}, {"text": "His evidence relies on unverifiable economic data.", "isCorrect": false, "rationale": "This is a vulnerability associated with Butler's method if his data were unverifiable, not Holmes's, whose evidence is personal observation."}, {"text": "He generalizes sweeping conclusions about war from a narrow personal sample.", "isCorrect": true, "rationale": "The text states, 'Holmes' sample is narrow. He served in one war... From this limited experience, he draws sweeping conclusions about the nature of war itself.'"}, {"text": "His argument depends on contested geopolitical predictions.", "isCorrect": false, "rationale": "This is a vulnerability identified with Wilson's argument, which relies on predictions about future geopolitical scenarios if autocracy is unchecked."}], "id": "q02"}, {"question": "Unlike Holmes' reliance on personal experience, Butler supports his central claim that 'war is a racket' primarily through what type of evidence?", "options": [{"text": "Inductive generalizations about human nature.", "isCorrect": false, "rationale": "Inductive generalization from personal experience is Holmes' method, not Butler's."}, {"text": "Moral and geopolitical principles.", "isCorrect": false, "rationale": "Moral and geopolitical principles form the basis of Wilson's argument, not Butler's."}, {"text": "Verifiable economic data and profit figures.", "isCorrect": true, "rationale": "The text states Butler's claim 'is supported by concrete dollar figures: the profits of specific corporations... the costs borne by taxpayers...'. This evidence is 'testable in a way that Holmes' philosophical claims are not.'"}, {"text": "Raw sensory descriptions of battlefield trauma.", "isCorrect": false, "rationale": "Raw sensory data and experiential testimony are characteristic of Remarque's approach, not Butler's."}], "id": "q03"}, {"question": "The text identifies a significant vulnerability in Butler's logic, stating that his conclusion overreaches his evidence. What is the essence of this vulnerability?", "options": [{"text": "His data points were fabricated and cannot be verified.", "isCorrect": false, "rationale": "The text explicitly states Butler's numbers 'can, in principle, be checked' and if true, are 'verifiable fact.' The vulnerability is not the data's veracity, but its interpretation."}, {"text": "He confuses correlation between war and profit with causation of war by profit.", "isCorrect": true, "rationale": "The text explains, 'Butler proves that some corporations profited from war. He then concludes that profit is the reason wars are fought. This is a much larger claim than his evidence supports. It is possible for war to produce profits for some without those profits being the cause of the war.'"}, {"text": "He fails to acknowledge the suffering of soldiers and civilians.", "isCorrect": false, "rationale": "While Butler's focus is on economics, the text identifies his *logical* vulnerability as the leap from correlation to causation, not a lack of empathy or emotional appeal."}, {"text": "His economic analysis ignores the impact of international trade agreements.", "isCorrect": false, "rationale": "This is too specific and not mentioned in the text as the core logical flaw in Butler's argument. The central vulnerability is the jump from observed profit to profit as the *cause* of war."}], "id": "q04"}, {"question": "Wilson's logical method is characterized as deductive reasoning. Which of the following best illustrates this approach?", "options": [{"text": "Starting with specific observations and concluding a universal truth.", "isCorrect": false, "rationale": "This describes inductive reasoning, which is Holmes's method."}, {"text": "Presenting raw sensory data and letting it speak for itself.", "isCorrect": false, "rationale": "This describes Remarque's experiential testimony."}, {"text": "Applying established principles to specific events to derive a necessary conclusion.", "isCorrect": true, "rationale": "The text outlines Wilson's deductive structure: 'Nations have the right... Germany has violated... Diplomacy has failed... Therefore, armed force is the only means...'. He begins with principles and applies them to specific events."}, {"text": "Analyzing economic patterns to reveal a hidden motive.", "isCorrect": false, "rationale": "This describes Butler's economic analysis method."}], "id": "q05"}, {"question": "Despite its 'tightly constructed chain of reasoning,' Wilson's argument is vulnerable because:", "options": [{"text": "The historical events he cites, like unrestricted submarine warfare, are fictional.", "isCorrect": false, "rationale": "The text accepts that these events occurred and are part of Wilson's 'evidence'; the vulnerability lies in the interpretation and premises, not the events themselves."}, {"text": "His evidence of German actions was disproven by subsequent investigations.", "isCorrect": false, "rationale": "The text does not suggest his evidence was disproven. Instead, it questions the premises and predictions derived from it."}, {"text": "His premises, such as the absolute right to free navigation or the necessity of immediate war, can be reasonably challenged.", "isCorrect": true, "rationale": "The text explicitly states, 'A skeptical reader might challenge the first premise (is free navigation an absolute right, or a convenience that can be suspended in wartime?) or the third (had every diplomatic option truly been exhausted?).' Additionally, his moral argument rests on predictions about autocracy that were debated."}, {"text": "He fails to incorporate any emotional appeal or personal testimony.", "isCorrect": false, "rationale": "This is a rhetorical choice, not a logical vulnerability in his deductive structure. The text focuses on the logical structure's clarity but also its dependence on accepted premises."}], "id": "q06"}, {"question": "Remarque's 'logical method' is described as 'experiential testimony.' What does this primarily involve?", "options": [{"text": "Formulating complex philosophical arguments based on wartime events.", "isCorrect": false, "rationale": "This is closer to Holmes's inductive method."}, {"text": "Presenting irrefutable raw sensory data from the human body's experience of war.", "isCorrect": true, "rationale": "The text states Remarque's 'evidence' is 'the evidence of the human body: what it feels like to be shelled, to be gassed, to watch a friend die...' and is 'raw sensory data.'"}, {"text": "Analyzing geopolitical shifts to understand the motivations for conflict.", "isCorrect": false, "rationale": "This describes Wilson's method of geopolitical reasoning."}, {"text": "Compiling financial records to expose the economic beneficiaries of war.", "isCorrect": false, "rationale": "This describes Butler's economic analysis."}], "id": "q07"}, {"question": "While Remarque's evidence is considered 'impossible to argue with on its own terms,' its main limitation in the context of policy debate is that it:", "options": [{"text": "Is too abstract and lacks vivid details.", "isCorrect": false, "rationale": "The text emphasizes the exact opposite: Remarque presents 'unflinching precision' of 'raw sensory data,' which is inherently vivid and concrete."}, {"text": "Cannot, by itself, dictate a course of action or answer policy questions.", "isCorrect": true, "rationale": "The text explains, 'Remarque's testimony is powerful, but it does not, by itself, tell us what to do.' Others can accept his evidence but draw different conclusions about policy."}, {"text": "Presents a biased view, as it only focuses on the suffering and not the virtues of war.", "isCorrect": false, "rationale": "While Remarque focuses on suffering, the text frames this as a limitation of his *method's scope* in policy-making (it doesn't prescribe action), rather than an inherent bias invalidating his testimony."}, {"text": "Relies on personal accounts that are difficult to verify objectively.", "isCorrect": false, "rationale": "The text states his evidence is 'impossible to argue with on its own terms,' implying its factual basis in human experience is accepted, making verification less of an issue than its applicability to policy."}], "id": "q08"}, {"question": "Considering the four authors, which pair represents the most contrasting approaches to evidence, specifically regarding its verifiability and scope?", "options": [{"text": "Holmes (personal experience) and Remarque (sensory testimony).", "isCorrect": false, "rationale": "Both rely on personal, lived experience, albeit with different logical aims. Their evidence sources are quite similar."}, {"text": "Butler (economic data) and Remarque (sensory testimony).", "isCorrect": true, "rationale": "Butler's evidence is external, quantifiable, objective, and verifiable economic data. Remarque's is internal, subjective, raw, immediate sensory experience that is irrefutable on its own terms but not 'verifiable' in the same way. These represent highly contrasting types of evidence and scope."}, {"text": "Wilson (moral principles) and Holmes (philosophical principles).", "isCorrect": false, "rationale": "Both deal with abstract principles as a starting point, even if derived differently (deductive vs. inductive), making them less contrasting in *type* of evidence than other pairs."}, {"text": "Butler (economic data) and Wilson (moral principles).", "isCorrect": false, "rationale": "While different (empirical data vs. abstract principles), Butler's data is verifiable, and Wilson's principles are subject to logical challenge. However, the contrast between Butler's hard, external data and Remarque's raw, internal, sensory data is more fundamental in terms of 'verifiability and scope' as highlighted in the text's comparisons."}], "id": "q09"}, {"question": "According to the 'Which Framework Is Strongest?' note, what is the ultimate goal of critically evaluating different logical frameworks?", "options": [{"text": "To definitively determine the single most convincing argument.", "isCorrect": false, "rationale": "The text explicitly states, 'There is no single correct answer to this question, and reasonable readers will disagree.' The goal is not certainty but evaluation."}, {"text": "To identify the framework that aligns best with one's existing beliefs.", "isCorrect": false, "rationale": "This would be confirmation bias, not critical thinking. The note emphasizes explaining *why* one finds a framework convincing, which implies a reasoned assessment beyond mere alignment."}, {"text": "To achieve certainty in one's conclusions about complex issues.", "isCorrect": false, "rationale": "The note concludes by stating critical thinking requires 'not certainty, but honest evaluation.'"}, {"text": "To explain one's reasoning for finding a framework convincing while identifying its weaknesses and those of others.", "isCorrect": true, "rationale": "The note states, 'What matters is not which logical framework you find most convincing, but whether you can explain why you find it convincing — and whether you can identify the weaknesses in the framework you prefer as clearly as you can identify the weaknesses in the ones you reject.' This encompasses the complete scope of the correct option."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
