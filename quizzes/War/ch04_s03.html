<script>
var QUESTIONS = [{"question": "What is the primary mechanism of Butler's 'Conscript Capital' proposal to prevent war?", "options": [{"text": "Nationalizing all industries deemed essential for wartime production.", "isCorrect": false, "rationale": "While a related concept, Butler's proposal does not explicitly call for nationalization but rather limits the financial incentives within existing industries."}, {"text": "Limiting all wartime incomes, including corporate executives and soldiers, to thirty dollars per month.", "isCorrect": true, "rationale": "The text explicitly states Butler's method is 'blunt: cap everyone's wartime income at the same level as a soldier's pay. No exceptions.'"}, {"text": "Implementing a progressive tax system to heavily penalize corporate profits generated during wartime.", "isCorrect": false, "rationale": "Butler's goal is to eliminate profit as a motive entirely by capping income, not just to tax it after it has been earned."}, {"text": "Requiring all corporate leaders and politicians who advocate for war to serve on the front lines.", "isCorrect": false, "rationale": "The proposal focuses on economic sacrifice and financial incentives, not a mandate for physical combat service for non-military personnel."}], "id": "q01"}, {"question": "A key assumption underlying Butler's 'Conscript Capital' proposal is that:", "options": [{"text": "Government control of industry leads to more efficient production during times of conflict.", "isCorrect": false, "rationale": "The proposal is about eliminating profit as a motive, not about the efficiency of government-controlled industry."}, {"text": "War is primarily caused by the profit motive.", "isCorrect": true, "rationale": "The text states, 'Assumption: War is primarily caused by the profit motive. If profits are eliminated, wars will not occur — or at least will be far less likely.'"}, {"text": "All individuals are motivated solely by financial gain, irrespective of patriotic duty.", "isCorrect": false, "rationale": "While it targets financial gain, the assumption is more specifically about profit driving war, not a blanket statement about all human motivation."}, {"text": "Soldiers' pay of thirty dollars a month is a fair and sustainable wage for all citizens during wartime.", "isCorrect": false, "rationale": "The fairness is in the *equality* of sacrifice, not necessarily that the amount is sufficient for everyone to live comfortably or sustainably in a peacetime economy."}], "id": "q02"}, {"question": "According to Butler's 'Limited Plebiscite' proposal, who should have the final say on whether the nation goes to war?", "options": [{"text": "The U.S. Congress, as stipulated by the Constitution, with a supermajority vote.", "isCorrect": false, "rationale": "Butler's proposal challenges the constitutional authority of Congress, suggesting a direct vote instead."}, {"text": "All citizens of voting age, regardless of physical fitness or military status.", "isCorrect": false, "rationale": "Butler's proposal is for a 'deliberately restricted democracy,' not a universal adult suffrage."}, {"text": "Young men of military age who are physically fit for service.", "isCorrect": true, "rationale": "The text clearly states, 'Claim: The decision to go to war should be made by a direct vote of those who will actually fight — young men of military age who are physically fit for service.'"}, {"text": "A council of military strategists and experienced foreign policy experts.", "isCorrect": false, "rationale": "Butler's reasoning is that those who bear the consequences (the fighters) should make the decision, not a select group of experts."}], "id": "q03"}, {"question": "Which of the following would be the most significant practical challenge to the 'Limited Plebiscite' proposal in a scenario of a surprise foreign attack?", "options": [{"text": "The constitutional requirement that only Congress can declare war, necessitating an amendment.", "isCorrect": false, "rationale": "This is a constitutional/legal challenge, not primarily a practical one in terms of speed of response during an attack."}, {"text": "The assumption that young men will always vote against war, which history may contradict.", "isCorrect": false, "rationale": "This is an assumption about voting behavior, not a practical challenge to the *process* of holding the vote itself in a crisis."}, {"text": "The time required to organize and conduct a national vote, potentially delaying a necessary immediate military response.", "isCorrect": true, "rationale": "The text raises this 'practical question of speed: wars sometimes begin with surprise attacks. Could a nation hold a national vote while enemy forces were advancing?'"}, {"text": "The potential for widespread public apathy, leading to low voter turnout among the eligible demographic.", "isCorrect": false, "rationale": "Low turnout is a general concern for plebiscites but not the most significant practical impediment to a timely response during a surprise attack."}], "id": "q04"}, {"question": "What is the core restriction Butler proposes for the American military under his 'Defense Only' policy?", "options": [{"text": "Eliminating all offensive weaponry and focusing solely on defensive arms development.", "isCorrect": false, "rationale": "The proposal focuses on geographical restrictions of deployment, not necessarily the type of weaponry."}, {"text": "Limiting naval vessels and aircraft to operating within a specified distance from American coastlines and territory, and keeping the army on American territory.", "isCorrect": true, "rationale": "The text states: 'American naval vessels should be limited by law to operating within two hundred miles of the coastline. Aircraft should be restricted to five hundred miles. The army should never leave American territory.'"}, {"text": "Requiring all military engagements to be approved by an international peace-keeping organization.", "isCorrect": false, "rationale": "Butler's proposal focuses on unilateral U.S. restrictions, not on external approval mechanisms."}, {"text": "Reducing the overall size and budget of the military to prevent any capacity for large-scale conflict.", "isCorrect": false, "rationale": "While a consequence, the direct proposal is about geographical deployment, not specifically budget or overall size."}], "id": "q05"}, {"question": "Butler's 'Defense Only' proposal directly challenges the viewpoint that:", "options": [{"text": "A nation's economy can thrive without a strong military presence abroad.", "isCorrect": false, "rationale": "While related to economic interests, the core challenge is about military projection for security, not just economic prosperity."}, {"text": "Neutrality in the face of aggression is a moral duty for non-involved nations.", "isCorrect": false, "rationale": "This statement reflects Wilson's counter-argument, which Butler's proposal *rejects*, implying Butler challenges the opposite view."}, {"text": "American security necessitates the ability to project military power globally to address threats far from its borders.", "isCorrect": true, "rationale": "The 'Butler vs. Wilson on Military Scope' comparison highlights this direct disagreement, with Wilson arguing 'some threats to American security... originate thousands of miles away,' which Butler's proposal would prevent responding to."}, {"text": "All military engagements beyond a nation's borders are, by definition, imperialistic.", "isCorrect": false, "rationale": "While Butler implies this, his proposal *challenges* the idea that some interventions are necessary for national security or moral duty, as argued by Wilson."}], "id": "q06"}, {"question": "How do Butler's three proposals — Conscript Capital, Limited Plebiscite, and Defense Only — function as a coherent system to prevent war?", "options": [{"text": "They collectively aim to strengthen diplomatic ties and international alliances to avoid conflict.", "isCorrect": false, "rationale": "The proposals are internal structural changes to the U.S. war machine, not primarily about international diplomacy or alliances."}, {"text": "They remove the financial motive, transfer the decision-making power, and eliminate the physical capability for offensive war.", "isCorrect": true, "rationale": "The 'Logic of Butler's System' states: 'Proposal 1 removes the motive (profit). Proposal 2 transfers the decision (from those who benefit to those who suffer). Proposal 3 removes the capability (by restricting force to defense).'"}, {"text": "They decentralize military command and control, making it harder for a single entity to declare war.", "isCorrect": false, "rationale": "While the plebiscite changes decision-making, the system's focus isn't primarily on decentralization of military command itself."}, {"text": "They prioritize humanitarian aid and economic development over military spending to address root causes of conflict.", "isCorrect": false, "rationale": "The proposals target the *mechanisms* of war-making, not alternative foreign policy approaches like humanitarian aid or economic development."}], "id": "q07"}, {"question": "The concept of 'Feasibility,' as defined in the text, implies that a strong criticism of Butler's proposals could be based on:", "options": [{"text": "Their ethical implications, even if they are logically sound.", "isCorrect": false, "rationale": "The definition states a proposal 'may be morally sound and logically consistent but still lack feasibility,' meaning feasibility is distinct from ethics."}, {"text": "Their logical consistency and internal coherence.", "isCorrect": false, "rationale": "Feasibility concerns implementation, not logical consistency, which a proposal might possess yet still be infeasible."}, {"text": "Their practical implementability given real-world constraints like political opposition or economic disruption.", "isCorrect": true, "rationale": "The definition states 'Feasibility refers to whether a proposed plan can actually be carried out in practice' and lists 'political opposition, economic disruption, constitutional limitations, or human nature' as constraints."}, {"text": "Their historical accuracy in predicting the outcomes of past military conflicts.", "isCorrect": false, "rationale": "Feasibility is about the ability to implement *now*, not historical predictive accuracy."}], "id": "q08"}, {"question": "What is identified as the fundamental weakness underlying *all three* of Butler's proposals, according to the text?", "options": [{"text": "Their overly simplistic understanding of human nature and economic incentives.", "isCorrect": false, "rationale": "While potentially true, the text's core criticism is more specific than just a general 'simplistic understanding.'"}, {"text": "Their failure to account for rapid technological advancements in modern warfare.", "isCorrect": false, "rationale": "The text does not highlight technological advancements as the fundamental weakness."}, {"text": "The assumption that war is always a racket driven by profit, rather than sometimes by genuine threats or self-defense.", "isCorrect": true, "rationale": "The text states: 'The weakness is the assumption that underlies all three: that war is always a racket, driven by profit rather than by genuine threats.'"}, {"text": "Their disregard for international law and treaties regarding declarations of war.", "isCorrect": false, "rationale": "The constitutional question is mentioned for the plebiscite, but the fundamental weakness across all three proposals is the underlying assumption about the cause of war itself."}], "id": "q09"}, {"question": "If Butler's complete system were implemented, how might it impact a situation similar to the attack on Pearl Harbor in 1941, as mentioned in the text?", "options": [{"text": "It would likely prevent such an attack from ever occurring, as foreign powers would perceive the U.S. as non-aggressive.", "isCorrect": false, "rationale": "Butler's system aims to prevent offensive U.S. actions, but does not guarantee prevention of attacks by other nations on U.S. territory."}, {"text": "It would ensure a swift and unified national response, as citizens would directly vote for self-defense.", "isCorrect": false, "rationale": "While the desire for defense might be unified, the plebiscite process itself would likely introduce delays, hindering a 'swift' response, and economic caps would impede rapid industrial mobilization."}, {"text": "It would likely hinder the nation's ability to mount an effective and timely counter-response due to economic disruptions and restricted military projection.", "isCorrect": true, "rationale": "The text highlights that economic caps 'might cripple the very industries needed to mount an effective defense' and that a plebiscite might be too slow for 'surprise attacks.' The 'Defense Only' rule would also severely limit the ability to project power to respond effectively beyond a narrow perimeter."}, {"text": "It would ensure that any retaliatory actions were purely defensive and limited to American territory, satisfying international agreements.", "isCorrect": false, "rationale": "While the military would be restricted to defense, the ability to launch an 'effective' counter-response, especially globally against the aggressor, would be severely hampered, regardless of international agreements."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
