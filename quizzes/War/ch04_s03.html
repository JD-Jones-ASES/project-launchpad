        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/War.html">&larr; Back to War: A Debate in Primary Sources</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 4, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to Butler's first proposal, what is the prerequisite for the government drafting men into military service?", "options": [{"text": "The nation's capital, industry, and labor must first be conscripted, capping all incomes.", "isCorrect": true, "rationale": "Butler argues that the profit motive must be eliminated before lives are put at risk, ensuring shared economic sacrifice."}, {"text": "A formal declaration of war must be approved by a two-thirds majority in Congress.", "isCorrect": false, "rationale": "While this is a current constitutional requirement, Butler's proposal specifically focuses on the sequencing of conscripting resources before people."}, {"text": "The national debt must be audited to ensure the war is not being funded by private banks.", "isCorrect": false, "rationale": "While Butler is critical of bankers, his specific policy requires the immediate conscription of all capital and labor, not just an audit."}, {"text": "The military must prove that the threat is within the 200-mile coastal defensive perimeter.", "isCorrect": false, "rationale": "This confuses Proposal 1 regarding capital with Proposal 3 regarding the geographic scope of military operations."}]}, {"question": "What core assumption underlies Butler's argument that capping wartime incomes at thirty dollars per month would prevent war?", "options": [{"text": "Modern economies cannot survive the inflation caused by excessive wartime profits.", "isCorrect": false, "rationale": "Butler's argument is rooted in the psychological and political motivations for war, rather than a technical economic theory of inflation."}, {"text": "Soldiers are more likely to fight effectively if they know their commanders earn the same wage.", "isCorrect": false, "rationale": "Butler's focus is on preventing the decision to go to war, not improving the tactical effectiveness of the soldiers."}, {"text": "The profit motive is the primary driver behind the push for military conflict.", "isCorrect": true, "rationale": "Butler believes that if you remove the financial incentive for those in power, the pressure to engage in war will disappear."}, {"text": "The federal government lacks the legal authority to tax corporate profits during peacetime.", "isCorrect": false, "rationale": "Butler’s proposal is a wartime measure specifically designed to neutralize the 'racket' of war, not a commentary on peacetime tax law."}]}, {"question": "Which of the following describes a 'Limited Plebiscite' as proposed by Butler?", "options": [{"text": "A nationwide vote where every registered citizen decides on the declaration of war.", "isCorrect": false, "rationale": "Butler's proposal is specifically restricted to a subset of the population, not the entire electorate."}, {"text": "A vote conducted by Congress that is later ratified by a simple majority of the public.", "isCorrect": false, "rationale": "This would still involve the political body Butler is trying to bypass in the final decision-making process."}, {"text": "A direct vote restricted to those of military age who are physically fit for service.", "isCorrect": true, "rationale": "Butler argues that only those who will bear the physical burden and risk of combat should have the right to decide if the war happens."}, {"text": "A ballot cast only by veterans who have previously experienced combat conditions.", "isCorrect": false, "rationale": "While veterans have experience, Butler's proposal targets those who *will* fight in the upcoming conflict, not those who have already served."}]}, {"question": "What constitutional challenge is identified regarding Butler's plebiscite proposal?", "options": [{"text": "The Second Amendment protects the right to bear arms without a public vote.", "isCorrect": false, "rationale": "The Second Amendment concerns the right to own weapons, not the collective decision-making process for declaring war."}, {"text": "Article I, Section 8 explicitly grants the power to declare war to Congress, not the people.", "isCorrect": true, "rationale": "A plebiscite would transfer power away from the legislative branch, necessitating a constitutional amendment."}, {"text": "The Supreme Court has ruled that literacy tests for voting are universally constitutional.", "isCorrect": false, "rationale": "The text notes Butler's reference to literacy tests as a precedent but points out their historical use in disenfranchisement, not their current legality."}, {"text": "The executive branch maintains sole authority over military deployments under Article II.", "isCorrect": false, "rationale": "While the President is Commander-in-Chief, the text specifically notes the conflict with the Congressional power to declare war."}]}, {"question": "In Proposal 3, Butler suggests limiting the operational range of the U.S. Navy and Air Force. What are the specific limits he recommends?", "options": [{"text": "Naval vessels within 200 miles and aircraft within 500 miles of the coastline.", "isCorrect": true, "rationale": "These specific geographic constraints are designed to ensure the military can only perform defensive functions."}, {"text": "Naval vessels within 500 miles and aircraft within 1000 miles of the coastline.", "isCorrect": false, "rationale": "These numbers exceed the restrictive limits Butler proposed to prevent the projection of offensive power."}, {"text": "Both naval and air forces restricted to within 200 miles of American soil.", "isCorrect": false, "rationale": "Butler proposed different ranges for the two branches, allowing aircraft a slightly larger operational radius."}, {"text": "A floating limit based on the distance to the nearest allied territory.", "isCorrect": false, "rationale": "Butler's proposal is a rigid geographic perimeter around the U.S. coastline, explicitly to avoid foreign entanglements."}]}, {"question": "How does the 'Defense Only' proposal attempt to eliminate offensive war?", "options": [{"text": "By making war too expensive for the Treasury to fund.", "isCorrect": false, "rationale": "While related to his first proposal, the third proposal focuses on physical capability rather than financial cost."}, {"text": "By removing the physical capability of the military to project force abroad.", "isCorrect": true, "rationale": "If a nation cannot legally or physically send its forces beyond its borders, it cannot engage in aggression against other nations."}, {"text": "By requiring a plebiscite before any ship enters international waters.", "isCorrect": false, "rationale": "This incorrectly combines Proposal 2 and Proposal 3; Proposal 3 is a legal restriction on range, not a voting requirement."}, {"text": "By ensuring that all military leaders are subject to civilian income caps.", "isCorrect": false, "rationale": "This refers to Proposal 1, whereas the defense-only proposal is about geographic and operational scope."}]}, {"question": "What is Woodrow Wilson's primary counter-argument to the isolationist logic found in Butler's 'Defense Only' plan?", "options": [{"text": "Neutrality in the face of aggression is a form of complicity with that aggression.", "isCorrect": true, "rationale": "Wilson argued that threats to democracy and civilization elsewhere can affect American security, making engagement a moral duty."}, {"text": "A 200-mile limit is technically impossible to enforce given the speed of modern torpedoes.", "isCorrect": false, "rationale": "Wilson's objection is philosophical and strategic regarding the nature of threats, not a technical dispute over distance."}, {"text": "The American economy relies on colonial expansion to maintain industrial output.", "isCorrect": false, "rationale": "This sounds more like the 'racket' Butler is criticizing than the moralistic 'defense of principles' argument attributed to Wilson."}, {"text": "Congress will never vote to limit its own power to declare war abroad.", "isCorrect": false, "rationale": "While true, this is a constitutional/practical objection rather than Wilson's specific argument about the global nature of security."}]}, {"question": "How do Butler's three proposals function as a single 'coherent system'?", "options": [{"text": "They create a sequential timeline for phasing out the military over a decade.", "isCorrect": false, "rationale": "The proposals are meant to work simultaneously to constrain the existing 'war machine,' not gradually abolish it."}, {"text": "They focus on different branches of government to ensure checks and balances.", "isCorrect": false, "rationale": "While they impact different areas, their logic is based on attacking the components of the 'racket,' not purely governmental structure."}, {"text": "They simultaneously attack the motive, the decision-maker, and the capability of the war machine.", "isCorrect": true, "rationale": "Proposal 1 removes profit (motive), Proposal 2 moves the vote (decision), and Proposal 3 limits range (capability)."}, {"text": "They rely on the same \\$30-per-month funding pool to operate.", "isCorrect": false, "rationale": "The thirty-dollar limit is a mechanism of Proposal 1, not a funding source for the implementation of the other two."}]}, {"question": "In the context of policy evaluation, how is 'Feasibility' defined in the text?", "options": [{"text": "Whether a proposal is morally justified by human rights standards.", "isCorrect": false, "rationale": "The text explicitly contrasts feasibility with moral soundness, noting a plan can be moral but still unfeasible."}, {"text": "Whether a plan can be carried out in practice given real-world constraints.", "isCorrect": true, "rationale": "Feasibility concerns the practical implementation, considering politics, economics, and human nature."}, {"text": "The logical consistency of a set of arguments presented in a proposal.", "isCorrect": false, "rationale": "Logical consistency is a separate intellectual requirement; feasibility is specifically about the 'can it be done' aspect."}, {"text": "The speed at which a military can respond to a surprise attack.", "isCorrect": false, "rationale": "While speed is a practical constraint for Proposal 2, the general definition of feasibility is broader than just military response time."}]}, {"question": "Which historical event does the text use to suggest that Butler's system might be too rigid?", "options": [{"text": "The sinking of the U.S.S. Maine in 1898.", "isCorrect": false, "rationale": "The text uses the Maine as evidence *supporting* Butler's range restriction, not as a counter-example to his system's rigidity."}, {"text": "World War I and the rise of corporate profits.", "isCorrect": false, "rationale": "This serves as Butler's primary evidence for why his proposals are necessary in the first place."}, {"text": "Nazi Germany's aggression leading into World War II.", "isCorrect": true, "rationale": "The text argues that if a threat is genuine aggression rather than a profit-driven racket, Butler's system might prevent a necessary defense."}, {"text": "The introduction of literacy tests in the early 20th century.", "isCorrect": false, "rationale": "Literacy tests are discussed as a problematic precedent for restricted voting, not as a historical event that tests the rigidity of the three proposals."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
