<script>
var QUESTIONS = [{"question": "The text states that the European alliance system, intended to prevent war, \"made it almost inevitable.\" Which scenario best illustrates this paradoxical effect?", "options": [{"text": "Germany's invasion of Belgium, which was a neutral country, bringing Britain into the conflict.", "isCorrect": false, "rationale": "While Germany's invasion of Belgium was a critical event that brought Britain into the war, it was an act of aggression within the existing framework. The paradox of the alliance system lay in how a regional dispute *triggered* a continental war due to pre-existing defense obligations, not just an act of aggression by one power."}, {"text": "Austria-Hungary's declaration of war on Serbia, which then obligated other European powers to mobilize due to their defensive pacts.", "isCorrect": true, "rationale": "The text explicitly states that 'What began as a regional dispute in the Balkans escalated into a continental war because each alliance obligated its members to fight if any partner was attacked.' Austria-Hungary's war declaration on Serbia directly triggered this chain reaction through the alliance system, making the larger war almost inevitable."}, {"text": "Britain's involvement being primarily motivated by imperial ambitions rather than defensive alliances.", "isCorrect": false, "rationale": "The text mentions imperial ambitions as a general backdrop but specifically highlights that 'France and Britain were pulled in by their own alliances,' indicating defensive obligations as the direct cause for their entry into the war, not solely imperial ambitions."}, {"text": "The Ottoman Empire joining the Central Powers, thereby expanding the conflict into the Middle East.", "isCorrect": false, "rationale": "The Ottoman Empire's entry certainly expanded the scope of the war, but it happened *after* the initial escalation of the regional dispute into a continental war due to the alliance system. It was a consequence of the war's initial spread, not the primary illustration of how alliances made the initial war inevitable."}], "id": "q01"}, {"question": "What two primary events are cited as forcing President Woodrow Wilson's decision to ask for a declaration of war against Germany in 1917?", "options": [{"text": "The sinking of the Lusitania and the ongoing trench warfare on the Western Front.", "isCorrect": false, "rationale": "The sinking of the Lusitania occurred earlier in the war (1915) and while significant, it wasn't one of the *final* triggers cited for Wilson's 1917 decision. Trench warfare was a characteristic of the war itself, not a direct cause for US entry."}, {"text": "Germany's decision to resume unrestricted submarine warfare and the revelation of the Zimmermann Telegram.", "isCorrect": true, "rationale": "The text explicitly states: 'Germany's decision to resume unrestricted submarine warfare in early 1917... and the revelation of the Zimmermann Telegram... forced Wilson's hand.' These were the direct and immediate causes for the US declaration of war."}, {"text": "The Battle of the Somme and the Russian mobilization to defend Serbia.", "isCorrect": false, "rationale": "The Battle of the Somme was a major engagement on the Western Front, not a cause for US entry. Russia's mobilization was an initial trigger for the general European war, long before the US decided to enter."}, {"text": "The rise of fascism in Italy and Germany, and the U.S. desire to establish the League of Nations.", "isCorrect": false, "rationale": "The rise of fascism occurred in the interwar years, after WWI. While Wilson championed the League of Nations, its establishment was a post-war goal, not a cause for entering the war itself."}], "id": "q02"}, {"question": "The description of the Western Front most vividly conveys which core characteristic of World War I warfare?", "options": [{"text": "The rapid and decisive movements of cavalry and infantry across open battlefields.", "isCorrect": false, "rationale": "The text describes a 'line of trenches' stretching for hundreds of miles, with soldiers 'lived in mud, surrounded by barbed wire,' and attacks gaining 'yards at the cost of thousands of lives.' This indicates the opposite of rapid and decisive movements."}, {"text": "The strategic importance of aerial combat and sophisticated air superiority tactics.", "isCorrect": false, "rationale": "While air combat was emerging, the description of the Western Front focuses overwhelmingly on ground-level trench warfare, artillery, poison gas, and muddy conditions, not air superiority."}, {"text": "The static, brutal, and incredibly costly nature of trench warfare, with minimal territorial gains.", "isCorrect": true, "rationale": "The text highlights 'a line of trenches,' 'mud,' 'barbed wire,' 'constant threat of artillery bombardment and poison gas,' and 'attacks gained yards at the cost of thousands of lives,' citing the Battle of the Somme moving the front line 'barely six miles' for over a million casualties. This perfectly describes the static, brutal, and costly nature of trench warfare."}, {"text": "The innovative use of amphibious landings and naval power to bypass entrenched positions.", "isCorrect": false, "rationale": "The description centers entirely on land-based trench warfare, stretching 'from the English Channel to the Swiss border,' with no mention of amphibious landings or significant naval operations as characteristic of the Western Front itself."}], "id": "q03"}, {"question": "The Treaty of Versailles is presented as a factor contributing to \"disillusionment\" in the interwar years. Which aspect of the treaty, as described, would most directly foster such a sentiment?", "options": [{"text": "The establishment of the League of Nations, which aimed for international cooperation.", "isCorrect": false, "rationale": "While the U.S. Senate rejected the League of Nations, the League itself was Wilson's dream for peace and cooperation. Its *aim* was not disillusioning, though its eventual ineffectiveness or the U.S. rejection contributed to later problems, not the treaty's inherent terms for Germany."}, {"text": "Germany being forced to accept sole responsibility for the conflict and pay enormous reparations.", "isCorrect": true, "rationale": "The text states Germany was 'forced to accept sole responsibility for the conflict and pay enormous reparations.' Such punitive measures would inevitably lead to economic instability, resentment, and a sense of injustice in Germany, contributing significantly to widespread disillusionment in the interwar period."}, {"text": "The redrawing of national borders across Central and Eastern Europe.", "isCorrect": false, "rationale": "The text doesn't explicitly mention the redrawing of borders as a source of disillusionment, though it was a consequence of the treaty. The specific reasons given for disillusionment relate to Germany's punishment and the US rejection of the League."}, {"text": "The demilitarization clauses that limited Germany's armed forces.", "isCorrect": false, "rationale": "Demilitarization was a part of punishing Germany, but the text specifically highlights 'sole responsibility' and 'enormous reparations' as the key drivers of interwar disillusionment from the Treaty of Versailles."}], "id": "q04"}, {"question": "According to the text, what specific experiences and observations likely shaped Smedley Butler's critical views expressed in \"War Is a Racket\"?", "options": [{"text": "His participation in the drafting of the Treaty of Versailles and advocating for German rearmament.", "isCorrect": false, "rationale": "Butler was a retired Marine general, not a diplomat involved in drafting treaties. There is no mention of him advocating for German rearmament."}, {"text": "Witnessing the impoverishment of the Bonus Army veterans and learning about the alleged Business Plot to overthrow President Roosevelt.", "isCorrect": true, "rationale": "The text explicitly states: 'Butler had seen the Bonus Army march on Washington in 1932... He had testified before Congress about the so-called Business Plot... Butler was angry, and he had the credentials to be heard.' These events directly influenced his critical stance."}, {"text": "His experiences as a soldier on the Western Front during the Battle of the Somme.", "isCorrect": false, "rationale": "While Butler was a career military man, the text emphasizes his post-war observations and involvement in specific political events (Bonus Army, Business Plot) as the direct influences on his writing 'War Is a Racket' in 1935, rather than a specific battle experience on the Western Front."}, {"text": "His early life as a wealthy industrialist, which exposed him to corporate corruption.", "isCorrect": false, "rationale": "Butler is identified as a 'retired Marine general,' not an industrialist, indicating this option contradicts his described background."}], "id": "q05"}, {"question": "The text describes World War I as a \"catastrophe\" that fundamentally changed how people thought about war. Which piece of evidence from the text best supports this claim?", "options": [{"text": "The intricate network of alliances that ultimately pulled Europe into a wider conflict.", "isCorrect": false, "rationale": "The alliance system explains *how* the war escalated, but not its catastrophic *impact* on human perception. It describes the mechanism of war's onset, not its profound effect on society's understanding of war itself."}, {"text": "The detailed proposal made in the Zimmermann Telegram for Mexico to attack the United States.", "isCorrect": false, "rationale": "The Zimmermann Telegram was a significant factor in U.S. entry into the war, but it doesn't directly illustrate the *overall* catastrophic scale of human suffering and trauma that fundamentally changed global perceptions of war."}, {"text": "The unprecedented scale of death and injury, with approximately ten million soldiers dead and millions more wounded, leading to entire nations being traumatized.", "isCorrect": true, "rationale": "The text directly states: 'The scale of death was so vast that it changed how people thought about war itself' and details the immense casualties and national trauma. This is the clearest evidence supporting the idea of a 'catastrophe' that redefined views on war."}, {"text": "President Wilson's initial re-election slogan, 'He Kept Us Out of War,' reflecting American neutrality.", "isCorrect": false, "rationale": "Wilson's slogan reflects initial American sentiment toward neutrality, but it doesn't describe the *impact* of the war itself on changing perceptions once the conflict had run its course and its true cost was revealed."}], "id": "q06"}, {"question": "The four writers discussed in the book created their works within what approximate historical timeframe, as stated in the introduction?", "options": [{"text": "The mid-19th century, during the American Civil War.", "isCorrect": false, "rationale": "The text clearly states the period as 'from 1895 to 1935,' making the mid-19th century incorrect."}, {"text": "From 1895 to 1935, encompassing the First World War and its immediate aftermath.", "isCorrect": true, "rationale": "The introductory sentence directly states, 'The four writers in this book span forty years of American and European history, from 1895 to 1935.'"}, {"text": "The period immediately following the Second World War, from 1945 to 1985.", "isCorrect": false, "rationale": "The Second World War started after the specified period (1939). The given timeframe is incorrect."}, {"text": "The late 18th century, coinciding with the American and French Revolutions.", "isCorrect": false, "rationale": "This period is much earlier than the stated 1895-1935 timeframe."}], "id": "q07"}, {"question": "President Woodrow Wilson's political shift from campaigning on \"He Kept Us Out of War\" in 1916 to requesting a declaration of war in 1917 primarily reveals:", "options": [{"text": "His personal ambition to lead the United States into becoming a dominant global military power.", "isCorrect": false, "rationale": "The text attributes Wilson's shift to external pressures ('forced Wilson's hand') like unrestricted submarine warfare and the Zimmermann Telegram, not to a stated personal ambition for military dominance."}, {"text": "The immense pressure on the U.S. to protect its economic interests and national security in the face of escalating German aggression.", "isCorrect": true, "rationale": "Germany's unrestricted submarine warfare directly threatened American merchant ships and economic interests, while the Zimmermann Telegram posed a direct national security threat to U.S. territory. These aggressive actions forced Wilson's hand, demonstrating the pressure to protect U.S. interests."}, {"text": "The overwhelming demand from the American public for immediate military intervention in Europe.", "isCorrect": false, "rationale": "While public opinion shifted after the German provocations, Wilson's initial campaign indicates a significant segment of the public wished to stay out of war. The decision was more about protecting U.S. sovereignty and security against German actions rather than a simple 'overwhelming demand' for war."}, {"text": "The failure of the League of Nations to prevent conflicts, thus necessitating direct military action.", "isCorrect": false, "rationale": "The League of Nations was established *after* World War I, and the U.S. ultimately rejected joining it. Its existence or failure could not have influenced Wilson's decision to enter the war in 1917."}], "id": "q08"}, {"question": "Based on the text's description of the Zimmermann Telegram's impact, what is the most likely inference about its importance to the U.S. decision to enter World War I?", "options": [{"text": "It primarily revealed Germany's advanced cryptographic capabilities, prompting the U.S. to invest heavily in intelligence gathering.", "isCorrect": false, "rationale": "While the telegram was coded and intercepted, the text focuses on its *content* and its effect on American sentiment, not on the revelation of German cryptographic capabilities as its primary importance to the war decision."}, {"text": "It was the sole decisive factor that compelled President Wilson to declare war, overshadowing all other issues.", "isCorrect": false, "rationale": "The text states it 'forced Wilson's hand' *alongside* Germany's resumption of unrestricted submarine warfare. It was a crucial factor, but not the *sole* one according to the passage."}, {"text": "It exposed a direct and credible threat to U.S. territorial integrity, significantly galvanizing public and political support for war.", "isCorrect": true, "rationale": "The telegram proposed Mexico attacking the U.S. to reclaim Texas, New Mexico, and Arizona. This represented a direct threat to U.S. territory, and the text notes that when it was made public, 'American outrage helped push the nation toward war,' indicating its role in galvanizing support."}, {"text": "It was a minor diplomatic incident that had little long-term effect on U.S. foreign policy.", "isCorrect": false, "rationale": "The text explicitly states it 'helped push the nation toward war,' directly contradicting the idea that it was a minor incident with little effect."}], "id": "q09"}, {"question": "The text distinguishes the perspectives of Butler and Remarque from Holmes and Wilson based on their relationship to World War I. This distinction primarily highlights:", "options": [{"text": "The differing literary styles employed by authors before and after major global conflicts.", "isCorrect": false, "rationale": "The text focuses on *when* they wrote in relation to the war and what they observed, not on their literary styles. The core idea is about their historical vantage point and its impact on their message."}, {"text": "The ideological divide between American and European writers concerning military interventionism.", "isCorrect": false, "rationale": "While such divides might exist, the text's emphasis is specifically on the *timing* of their writings relative to WWI (before, during, after) and the visibility of the 'full cost,' rather than a broad ideological divide across continents."}, {"text": "How direct experience or the immediate aftermath of a global catastrophe profoundly shaped viewpoints on war's cost and justification.", "isCorrect": true, "rationale": "The text states Holmes spoke 'before the First World War,' Wilson 'at the moment of decision,' and Butler and Remarque 'after the war, when the full cost was visible and the question was whether it had been worth paying.' This directly illustrates how proximity to the war's full impact shaped their perspectives on its cost and justification."}, {"text": "The shift from advocating for military expansion to promoting isolationist foreign policies.", "isCorrect": false, "rationale": "While some might have shifted to isolationist views, the text describes a broader change in *how they thought about war itself* and its costs, not solely a shift to isolationism or expansionism. The key is the impact of seeing the war's full cost."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
