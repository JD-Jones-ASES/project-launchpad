        <div class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 3, Section 5</div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How did the British blockade of Germany differ from German submarine warfare in its diplomatic impact on the United States?", "options": [{"text": "The British blockade primarily targeted civilian resources without causing American fatalities, whereas German U-boats killed American citizens.", "isCorrect": true, "rationale": "The text explains that while the British blockade caused civilian hunger and death in Germany, it did not kill American citizens, unlike German torpedoes."}, {"text": "The British blockade was considered legal under international law, while unrestricted submarine warfare was a total violation of maritime codes.", "isCorrect": false, "rationale": "While the U.S. considered German actions a violation of rights, Wilson also protested the British blockade as an interference with neutral shipping."}, {"text": "Wilson successfully used the British blockade to justify a military alliance with the Allied powers early in the conflict.", "isCorrect": false, "rationale": "Wilson actually protested the British blockade through diplomatic channels and initially maintained a policy of neutrality."}, {"text": "The British blockade only affected munitions, while German submarines targeted all merchant vessels regardless of cargo.", "isCorrect": false, "rationale": "The source states that the British blockade prevented food and raw materials from reaching civilians, not just military supplies."}], "id": "q01"}, {"question": "What was the primary strategic calculation made by German generals in early $1917$ regarding the resumption of unrestricted submarine warfare?", "options": [{"text": "They believed they could starve Britain into submission before the United States could effectively mobilize for war.", "isCorrect": true, "rationale": "German military leaders calculated that the impact of sinking supply ships would knock Britain out of the war before American intervention became a factor."}, {"text": "They intended to provoke the United States into a war to divert American resources away from the Western Front.", "isCorrect": false, "rationale": "The goal was to win the war against Britain quickly, not to intentionally invite American military participation."}, {"text": "They assumed the United States would remain neutral due to the significant financial debt owed to American banks by the Allies.", "isCorrect": false, "rationale": "Germany recognized that the U.S. might enter the war but bet on a swift victory over Britain before that happened."}, {"text": "They sought to protect German merchant vessels from the British Royal Navy's blockade in the North Sea.", "isCorrect": false, "rationale": "The U-boat campaign was an offensive strategy to sink British merchant ships, not a defensive measure for German trade."}], "id": "q02"}, {"question": "In what way did the Zimmermann Telegram transform the American public's perception of the conflict?", "options": [{"text": "It shifted the perception of the war from an abstract maritime dispute to a direct territorial threat against the American mainland.", "isCorrect": true, "rationale": "The telegram proposed a military alliance with Mexico to help them recover lost territories, making the war feel personal and tangible to Americans."}, {"text": "It proved that the British had been manipulating American intelligence to force a declaration of war.", "isCorrect": false, "rationale": "While British intelligence intercepted the telegram, the text emphasizes the German plot itself as the catalyst for public outrage."}, {"text": "It confirmed that Mexico had already begun military operations against Texas, New Mexico, and Arizona.", "isCorrect": false, "rationale": "The telegram was a proposal for a future alliance if the U.S. entered the war, not a report of ongoing hostilities."}, {"text": "It highlighted the economic necessity of protecting American trade routes from German-Mexican naval coalitions.", "isCorrect": false, "rationale": "The threat was territorial and military in nature, specifically involving land invasion rather than just trade disruption."}], "id": "q03"}, {"question": "Which detail regarding the $Lusitania$ incident illustrates the complexity of 'selective facts' mentioned in the text?", "options": [{"text": "The British denied the ship was carrying munitions, a claim that was later proven false by investigations.", "isCorrect": true, "rationale": "The British portrayed the ship as a strictly innocent passenger liner to stir outrage, despite the reality of its cargo."}, {"text": "Germany admitted the attack was a mistake caused by poor visibility and offered immediate reparations.", "isCorrect": false, "rationale": "Germany actually justified the attack by pointing out that the ship was carrying war materiel."}, {"text": "The United States government suppressed evidence that there were no Americans on board to justify entering the war.", "isCorrect": false, "rationale": "The text confirms that $128$ Americans were among the deceased, which was a primary point of contention."}, {"text": "International law at the time explicitly allowed submarines to sink passenger liners if they were in a declared war zone.", "isCorrect": false, "rationale": "The text states that killing civilians violated international law, regardless of the cargo the ship was carrying."}], "id": "q04"}, {"question": "What was the significance of the Sussex Pledge of May $1916$?", "options": [{"text": "It was a temporary commitment by Germany to provide warnings before sinking merchant ships.", "isCorrect": true, "rationale": "Germany agreed to restrict its submarine warfare following the sinking of the Sussex, providing a short-lived diplomatic reprieve."}, {"text": "It officially established a formal military alliance between the United States and Great Britain.", "isCorrect": false, "rationale": "The pledge was a diplomatic agreement between Germany and the U.S. to prevent American entry into the war."}, {"text": "It marked the moment Wilson decided that neutrality was no longer a viable path for the nation.", "isCorrect": false, "rationale": "The pledge actually allowed Wilson to maintain neutrality and run for re-election on a peace record later that year."}, {"text": "It was a British promise to end the naval blockade of Germany in exchange for American financial support.", "isCorrect": false, "rationale": "The pledge was made by Germany, not Britain, and concerned submarine tactics rather than surface blockades."}], "id": "q05"}, {"question": "Why did critics argue that American neutrality was 'neutral in name only' by $1917$?", "options": [{"text": "American industry and banks were heavily invested in the success of the Allies through trade and loans.", "isCorrect": true, "rationale": "By $1917$, U.S. banks had lent the Allies over $\\$2$ billion, creating a deep economic tie that favored an Allied victory."}, {"text": "Wilson had already signed a secret treaty with Britain to enter the war if the stalemate on the Western Front continued.", "isCorrect": false, "rationale": "There is no mention of a secret treaty; Wilson's public and private actions showed significant hesitation and a desire for peace."}, {"text": "The United States had begun sending volunteer troops to the Western Front under the guise of 'armed neutrality.'", "isCorrect": false, "rationale": "Wilson only asked for authority to arm merchant ships for defense and did not deploy troops until after the declaration of war."}, {"text": "The German government had officially blacklisted all American firms from trading with European nations.", "isCorrect": false, "rationale": "It was the British who blacklisted American firms that traded with the Central Powers, not the Germans."}], "id": "q06"}, {"question": "How did President Wilson respond to the Senate filibuster that blocked his bill to arm merchant ships?", "options": [{"text": "He denounced the senators as 'willful men' and used an executive order to arm the ships anyway.", "isCorrect": true, "rationale": "Wilson bypasssed the legislative obstruction by exercising executive authority to provide defensive armaments to merchant vessels."}, {"text": "He immediately asked Congress for a full declaration of war to bypass the need for smaller defensive measures.", "isCorrect": false, "rationale": "Wilson still hesitated and pursued 'armed neutrality' as a defensive measure short of a full war declaration."}, {"text": "He withdrew the request and attempted one final round of secret diplomacy with the German Foreign Secretary.", "isCorrect": false, "rationale": "Wilson proceeded with the arming of ships via executive order because diplomatic alternatives were failing and sailors were dying."}, {"text": "He resigned his position as Commander-in-Chief of the military to protest the lack of legislative support.", "isCorrect": false, "rationale": "Wilson remained in office and continued to lead the nation's transition toward war despite the internal opposition."}], "id": "q07"}, {"question": "According to the text, what was the primary reason submarines could not follow the traditional international law of 'cruiser rules'?", "options": [{"text": "Surfacing to identify themselves made the submarines highly vulnerable to being rammed or fired upon.", "isCorrect": true, "rationale": "The physical limitations and fragility of early submarines made the requirement to surface and give warning tactically dangerous."}, {"text": "The German high command forbade U-boat captains from communicating with neutral vessels to maintain secrecy.", "isCorrect": false, "rationale": "The issue was one of physical vulnerability and tactical disadvantage, not just a command for secrecy."}, {"text": "Merchant vessels were often faster than submarines, making it impossible for U-boats to overtake and identify them.", "isCorrect": false, "rationale": "The text focuses on the vulnerability of the submarine when it surfaced, rather than a lack of speed."}, {"text": "International law did not yet recognize submarines as legitimate naval vessels subject to standard rules.", "isCorrect": false, "rationale": "The law did apply to them; however, the nature of the submarine as a weapon made compliance with those laws nearly impossible."}], "id": "q08"}, {"question": "How does the author characterize Woodrow Wilson's approach to his April $2, 1917$, speech?", "options": [{"text": "He framed the war as a 'grim necessity' rather than a cause for celebration or a racket for profit.", "isCorrect": true, "rationale": "The text notes that Wilson presented the decision as something a peaceful nation must do when all other options have failed."}, {"text": "He used the opportunity to aggressively promote American imperialism and the expansion of the Navy.", "isCorrect": false, "rationale": "Wilson's speech was characterized by reluctance and a focus on the necessity of action after exhausted diplomacy."}, {"text": "He relied on a team of speechwriters to ensure the message resonated with the isolationist Midwest.", "isCorrect": false, "rationale": "The source specifically mentions that Wilson was one of the few presidents who wrote his own speeches, typing them himself."}, {"text": "He adopted the same enthusiastic and pro-war rhetoric used by historical figures like Oliver Wendell Holmes.", "isCorrect": false, "rationale": "The text explicitly contrasts Wilson's framing with that of Holmes, noting that Wilson did not 'celebrate' war."}], "id": "q09"}, {"question": "What role did the British government play in the revelation of the Zimmermann Telegram?", "options": [{"text": "British intelligence intercepted and decoded the coded telegram before passing it to American officials.", "isCorrect": true, "rationale": "The text credits British intelligence with the discovery and decoding of the telegram that shifted American opinion."}, {"text": "The British leaked the telegram to the American press before Wilson had a chance to read it.", "isCorrect": false, "rationale": "The text states the British passed it to the American government; its later publication on March $1$ shifted public opinion."}, {"text": "The British fabricated the telegram to ensure the United States would enter the war on their side.", "isCorrect": false, "rationale": "The text presents the telegram as a factual German proposal intercepted by the British, not as a forgery."}, {"text": "The British initially blocked the telegram's release to avoid alerting Germany that their codes had been broken.", "isCorrect": false, "rationale": "While the British may have been careful, they ultimately passed the information to the U.S. to encourage intervention."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
