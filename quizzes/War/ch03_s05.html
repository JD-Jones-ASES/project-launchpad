<script>
var QUESTIONS = [{"question": "According to the text, what characteristic most distinctly defines Wilson's address to Congress as a \"Presidential Address\" genre, setting it apart from other types of orations?", "options": [{"text": "Its use of vivid imagery to inspire the audience.", "isCorrect": false, "rationale": "While a speech might use vivid imagery, the text defines a Presidential Address primarily by its official nature and purpose, not by its use of imagery. Wilson's pathos was noted as restrained."}, {"text": "Its status as an official act requesting legislative action.", "isCorrect": true, "rationale": "The text explicitly defines a Presidential Address: 'a presidential address to Congress is an official act — a request for legislative action.' This is the defining characteristic that differentiates it from other genres like campaign speeches or memorial orations."}, {"text": "Its direct appeal to the American public's emotions.", "isCorrect": false, "rationale": "While the American public was one of Wilson's audiences, the defining characteristic of the genre as an official act is its request for legislative action from Congress, not primarily an emotional appeal to the public."}, {"text": "Its focus on moral principles rather than practical considerations.", "isCorrect": false, "rationale": "Wilson's *choice* to focus on moral principles was a rhetorical strategy within the genre, not the definition of the genre itself. The genre definition focuses on its official capacity and purpose."}], "id": "q01"}, {"question": "Wilson's speech is noted for its \"extraordinarily difficult rhetorical balance\" in tone. Which of the following best explains why he adopted a tone described as \"resolute but sober, principled but practical, willing to fight but grieved by the necessity\"?", "options": [{"text": "To establish himself as a strong military leader ready for decisive action.", "isCorrect": false, "rationale": "Wilson's ethos was that of a 'reluctant warrior' or peacemaker pushed past his limit, not a strong military leader. His tone aimed for a nuanced balance rather than overt martial strength."}, {"text": "To avoid alienating the peace faction and reassure allies of genuine commitment.", "isCorrect": true, "rationale": "The text explains this directly: 'Wilson cannot afford to sound eager — that would alarm the peace faction... He cannot afford to sound reluctant — that would undermine Allied confidence and encourage Germany.' This difficult balance was necessary to address his multiple, often conflicting, audiences effectively."}, {"text": "To mirror the general sentiment of the American public, which was eager for war.", "isCorrect": false, "rationale": "The text states that 'millions of Americans who voted for him because he kept them out of war,' indicating the public was not eager for war. His tone was designed to win over a public that was largely peace-minded."}, {"text": "To universally appeal to all nations involved in the conflict, including Germany.", "isCorrect": false, "rationale": "While Germany was an audience, the primary balance was for domestic support and Allied confidence. A tone of being 'grieved by the necessity' would not be an appeal to Germany."}], "id": "q02"}, {"question": "In the \"fearful thing\" passage, Wilson begins by acknowledging, \"It is a fearful thing to lead this great peaceful people into war, into the most terrible and disastrous of all wars...\" According to the text, what is the primary rhetorical purpose of this opening concession?", "options": [{"text": "To highlight the overwhelming power of the United States military.", "isCorrect": false, "rationale": "The passage highlights the horror and cost of war, not the military's power. It emphasizes the gravity of the decision."}, {"text": "To position himself as a reluctant warrior, driven by necessity rather than desire.", "isCorrect": true, "rationale": "The text states: 'By acknowledging the horror of war before arguing for it, Wilson positions himself as a reluctant warrior — a man of peace driven to fight by forces beyond his control.' This concession builds his ethos."}, {"text": "To create a sense of urgency and immediate need for action.", "isCorrect": false, "rationale": "While acknowledging the stakes might create urgency, the text specifically identifies the primary purpose as establishing Wilson's persona as a reluctant warrior, rather than generating immediate urgency."}, {"text": "To downplay the potential costs of war to the American public.", "isCorrect": false, "rationale": "Wilson explicitly names the costs ('fearful thing,' 'terrible and disastrous'), he does not minimize or downplay them."}], "id": "q03"}, {"question": "The \"fearful thing\" passage is noted for Wilson's pivot on a single word: \"But.\" What is the main rhetorical effect of this conjunction in his argument?", "options": [{"text": "It introduces a contrasting viewpoint, creating internal conflict for the audience.", "isCorrect": false, "rationale": "The pivot resolves internal conflict by presenting a moral equation, arguing that the stakes outweigh the terror, rather than creating conflict."}, {"text": "It signals a shift from acknowledging the costs of war to asserting the moral imperative for it.", "isCorrect": true, "rationale": "The text explains: 'Everything before 'but' concedes the case against war. Everything after 'but' makes the case for it. The effect is to present the decision as a moral equation: yes, war is terrible, but something is at stake that outweighs the terror.'"}, {"text": "It abruptly dismisses the concerns of those who oppose the war.", "isCorrect": false, "rationale": "The use of 'but' acknowledges the concerns before overriding them with a greater moral cause, rather than dismissing them abruptly."}, {"text": "It serves as a transition to a more detailed explanation of military strategy.", "isCorrect": false, "rationale": "The 'but' pivot shifts the argument towards moral principles ('the right is more precious than peace'), not towards military strategy."}], "id": "q04"}, {"question": "Wilson's \"fearful thing\" passage escalates from \"this great peaceful people\" to \"make the world itself at last free.\" What is the analytical significance of this rhetorical move?", "options": [{"text": "It subtly suggests that American isolationism is a viable option.", "isCorrect": false, "rationale": "The escalation argues *against* isolationism by making the cause universal, implying that America's involvement is necessary for global freedom."}, {"text": "It broadens the war's justification from national interest to a universal cause of human freedom.", "isCorrect": true, "rationale": "The text states: 'Wilson starts with America's specific situation and expands outward until the entire cause of human freedom is at stake. By the end of the sentence, to oppose the war is to oppose freedom itself.' This move elevates the conflict to a universal moral plane."}, {"text": "It minimizes the specific challenges facing the United States in favor of broader themes.", "isCorrect": false, "rationale": "It doesn't minimize challenges but rather frames them within a larger, universal context, making the stakes higher and the decision more profound."}, {"text": "It shifts blame for the war onto external global powers.", "isCorrect": false, "rationale": "This rhetorical move is about justifying America's necessary involvement and the high stakes, not about shifting blame."}], "id": "q05"}, {"question": "Which of the following statements accurately defines \"Rhetorical Omission\" according to the provided text?", "options": [{"text": "The strategic use of silence to create dramatic effect in a speech.", "isCorrect": false, "rationale": "While silence can be dramatic, rhetorical omission specifically refers to the *content* that is left out, not just the act of being silent."}, {"text": "The unintentional oversight of certain details due to time constraints in an address.", "isCorrect": false, "rationale": "The definition in the text explicitly states 'The deliberate exclusion,' indicating it is intentional, not unintentional."}, {"text": "The deliberate exclusion of information, arguments, or perspectives to shape an audience's understanding.", "isCorrect": true, "rationale": "The text defines 'Omission (Rhetorical)' as 'The deliberate exclusion of information, arguments, or perspectives from a speech or text. Omission can be a powerful rhetorical tool: what a speaker chooses not to say can shape an audience's understanding as effectively as what the speaker does say.'"}, {"text": "The technique of asking rhetorical questions to highlight unspoken truths.", "isCorrect": false, "rationale": "Asking rhetorical questions is a different rhetorical device entirely; omission is about what is left out of the discourse."}], "id": "q06"}, {"question": "Wilson's decision to omit details such as economic ties to the Allies or the impending military draft serves what primary rhetorical purpose?", "options": [{"text": "To present a comprehensive overview of the war's practical implications.", "isCorrect": false, "rationale": "His omissions were precisely to avoid a comprehensive practical overview, focusing instead on moral clarity."}, {"text": "To encourage volunteerism by not mentioning compulsory service.", "isCorrect": false, "rationale": "While it might have a secondary effect, the text states the primary reason for omitting the draft was to avoid reminding the audience that the 'great peaceful people' would be compelled to fight, complicating his moral argument."}, {"text": "To maintain the argument's focus on moral principles and avoid complicating its clarity.", "isCorrect": true, "rationale": "The text explicitly states: 'Wilson is constructing an argument built entirely on moral principle, and economic details would complicate the moral clarity he seeks.' Omitting the draft also supported the image of a 'great peaceful people' freely choosing war for moral reasons."}, {"text": "To prevent public panic by not discussing the true costs of war.", "isCorrect": false, "rationale": "While avoiding panic might be a secondary effect, the text highlights that the primary reason was to preserve the moral clarity of his argument against practical or self-serving motivations."}], "id": "q07"}, {"question": "Wilson's ethos is described as that of a \"reluctant warrior.\" How does this specific form of authority contribute to his credibility in asking for a declaration of war?", "options": [{"text": "His past military experience assures the public of his strategic competence.", "isCorrect": false, "rationale": "The text does not mention Wilson's military experience. His credibility comes from his prior actions as a peacemaker, not a warrior."}, {"text": "His long resistance to war makes his eventual call to arms seem unavoidable and principled.", "isCorrect": true, "rationale": "The text states: 'Wilson's personal authority in this speech rests on a paradox: he is credible as a war leader precisely because he resisted war for so long... When Wilson says war is fearful, the audience believes him because he has spent three years trying to avoid it.' His reluctance validates the necessity."}, {"text": "It portrays him as someone who understands the economic benefits of war.", "isCorrect": false, "rationale": "Wilson intentionally omitted economic dimensions from his speech; his ethos was built on moral necessity, not economic understanding."}, {"text": "It aligns him with figures like Holmes who found nobility in suffering.", "isCorrect": false, "rationale": "The text explicitly contrasts Wilson's ethos with Holmes's, stating Wilson speaks as a man who 'has tried everything else, and nothing worked,' while Holmes speaks as a veteran who 'found meaning in it.'"}], "id": "q08"}, {"question": "The text describes Wilson's pathos as \"controlled and architectural,\" channeling emotion into principle rather than evoking anger or pity. What is the primary effect of this approach on his audience?", "options": [{"text": "It makes the speech feel more like a passionate call to arms.", "isCorrect": false, "rationale": "A 'controlled' approach to pathos would generally not lead to a 'passionate call to arms' in the sense of demagoguery; it's more about reasoned acceptance."}, {"text": "It allows for a greater focus on individual heroism and sacrifice.", "isCorrect": false, "rationale": "The text notes he 'does not paint vivid pictures of battlefield heroism' like Holmes, indicating a lack of focus on individual heroism."}, {"text": "It enables him to present the decision as a reasoned act of statesmanship rather than demagoguery.", "isCorrect": true, "rationale": "The text explicitly states: 'A president asking Congress for a declaration of war cannot afford to sound like a demagogue. He must sound like a statesman: moved by events, but governed by reason.' This controlled pathos helps achieve that statesmanlike image."}, {"text": "It encourages the audience to question the emotional basis of the decision.", "isCorrect": false, "rationale": "By channeling emotion into principle, Wilson aims to guide the audience to accept the decision as just and necessary, not to question its emotional foundation."}], "id": "q09"}, {"question": "According to the analysis of Wilson's logos, what is identified as the \"weakest link\" in his logical chain arguing for America's entry into the war?", "options": [{"text": "His assertion that Germany committed hostile acts against the United States.", "isCorrect": false, "rationale": "The text presents Germany's hostile acts (submarine warfare, Zimmermann Telegram) as a factual premise, not the weakest link in the *logical* chain itself."}, {"text": "His claim that these acts left the United States with no choice but to respond.", "isCorrect": false, "rationale": "This claim logically follows from the hostile acts within Wilson's argument structure, leading to the necessity for action."}, {"text": "His leap from a specific dispute over shipping rights to a universal struggle for democracy.", "isCorrect": true, "rationale": "The text explicitly states: 'The weakest link in the chain is step 3, the leap from a specific dispute (submarine warfare) to a universal principle (democracy versus autocracy).' This is where Butler's critique of propaganda arises."}, {"text": "His declaration that America has a duty to defend democratic principles globally.", "isCorrect": false, "rationale": "This declaration is a consequence of the 'leap' to universal principles, not the leap itself. The leap from specific grievance to universal principle is the identified weakness."}], "id": "q10"}, {"question": "Wilson's address is described as a 'formal act of state' that had to balance being resolute without sounding eager, grave without sounding afraid. How does this generic constraint shape the rhetorical choices available to Wilson in ways that were not available to Holmes or Butler?", "options": [{"text": "Wilson could use more emotional language than Holmes or Butler because a presidential address carries inherent authority.", "isCorrect": false, "rationale": "The text suggests Wilson's emotional appeals are 'carefully controlled' precisely because of his genre's constraints. The formal presidential address actually restricts rather than expands the range of acceptable emotional register."}, {"text": "The formal act of state required Wilson to justify his position to an opposing audience (Congress that must vote), rather than address an already sympathetic one, forcing him to construct a legally and morally tight case rather than inspiring or outrage-generating rhetoric.", "isCorrect": true, "rationale": "Holmes spoke to veterans who already shared his values; Butler wrote a pamphlet for the converted. Wilson was asking Congress — a body that must formally vote — for a declaration of war. He could not assume sympathy; he had to construct a complete case that would hold up to scrutiny and serve as the historical record of why America went to war."}, {"text": "The presidential address genre allowed Wilson to avoid making any explicit argument, relying instead on the authority of his office to persuade.", "isCorrect": false, "rationale": "The text emphasizes Wilson's careful argumentative architecture (three-layer logical structure). His genre required, rather than bypassed, explicit argumentation."}, {"text": "Wilson could be more direct and colloquial than Holmes because Congress was a less formal audience than Holmes's Harvard crowd.", "isCorrect": false, "rationale": "The opposite is true. Wilson's address is described as 'careful, legalistic' precisely because Congress required a more formal register than the educated but informal Harvard audience Holmes addressed."}], "id": "q11"}, {"question": "The section identifies anaphora — the repetition of 'for' at the beginning of successive clauses at the speech's end — as a key rhetorical technique. What emotional and logical effect does this device create?", "options": [{"text": "It creates a sense of urgency and panic, suggesting that the moment for action is rapidly passing.", "isCorrect": false, "rationale": "Anaphora creates accumulation and elevation rather than panic or urgency. Wilson's tone is solemn and grave, not frantic."}, {"text": "It builds an accumulating list of principles and purposes that makes the war seem comprehensively justified across multiple dimensions simultaneously, gaining emotional force with each repetition.", "isCorrect": true, "rationale": "By repeating 'for' before each stated purpose — for democracy, for the rights of those who submit to authority, for free and self-governed peoples — Wilson creates a rhythm that accumulates moral weight. Each item reinforces the others, so the war appears not as a single act for a single reason but as a comprehensive defense of fundamental values."}, {"text": "It demonstrates Wilson's grammatical sophistication, establishing his credibility as a scholar-politician.", "isCorrect": false, "rationale": "Anaphora is a classical rhetorical figure used for persuasion and emotional effect, not primarily as a demonstration of grammatical knowledge."}, {"text": "It mirrors Butler's rhetorical technique of numbered lists to provide an orderly presentation of evidence.", "isCorrect": false, "rationale": "Butler's numbered lists are a logical device presenting separate pieces of evidence. Wilson's anaphora is a poetic-rhetorical device creating emotional accumulation — they serve very different functions."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
