<script>
var QUESTIONS = [{"question": "According to the text, what is the fundamental purpose of conducting an audience analysis?", "options": [{"text": "To determine if the audience is hostile or friendly, thereby deciding whether to speak at all.", "isCorrect": false, "rationale": "While identifying audience sentiment is part of audience analysis, the text specifies a broader, more fundamental purpose than simply deciding to speak or not."}, {"text": "To identify who a writer or speaker is addressing and understand how that audience should shape the argument.", "isCorrect": true, "rationale": "The text defines audience analysis precisely as 'the practice of identifying who a writer or speaker is addressing and how that audience shapes the argument,' making this the core purpose."}, {"text": "To predict potential counter-arguments the audience might have and prepare rebuttals.", "isCorrect": false, "rationale": "Anticipating counter-arguments can be a *result* or *application* of audience analysis, but it is not its fundamental definition or purpose according to the text."}, {"text": "To choose the most eloquent and complex language possible to impress the listeners.", "isCorrect": false, "rationale": "Audience analysis helps tailor language, but the text emphasizes making *appropriate* choices (e.g., simple for one audience, elaborate for another), not necessarily the most 'eloquent and complex' universally."}], "id": "q01"}, {"question": "The text describes Butler's pamphlet as a 'weapon designed to provoke outrage and action' and Holmes's oration as 'a performance meant to inspire.' How do these genre choices primarily differentiate their argumentative strategies?", "options": [{"text": "Butler relies heavily on emotional appeals to bypass logical reasoning, while Holmes uses only classical logic.", "isCorrect": false, "rationale": "Both can use emotional and logical appeals. The text focuses on the *style* and *purpose* associated with their genres rather than an absolute dichotomy of appeal types."}, {"text": "Butler uses short, punchy sentences and concrete dollar figures to convince and provoke, whereas Holmes uses long, rolling sentences and classical allusions for ceremonial inspiration.", "isCorrect": true, "rationale": "The text explicitly states these stylistic differences as direct consequences of their chosen genres: Butler's genre suits a reader who needs convincing with concrete facts, while Holmes's suits a ceremonial, inspirational occasion."}, {"text": "Butler aims for an uneducated, mass audience, while Holmes exclusively targets an elite, academic one.", "isCorrect": false, "rationale": "While their audiences differed, the question asks about *genre choices differentiating argumentative strategies*, and the text links genre to stylistic choices, not just audience demographics."}, {"text": "Butler avoids ethical considerations entirely, focusing only on profits, while Holmes emphasizes moral duty and virtue.", "isCorrect": false, "rationale": "The text does not state Butler avoids ethical considerations, nor that Holmes *only* emphasizes moral duty. It describes their specific content choices within their genre and audience contexts."}], "id": "q02"}, {"question": "If a contemporary activist wanted to galvanize a skeptical public into demanding political reform, which author's approach to shaping tone based on audience would be most appropriate to emulate, and why?", "options": [{"text": "Holmes, because his ability to inspire sympathetic audiences can be adapted to any context requiring strong emotional appeal.", "isCorrect": false, "rationale": "Holmes speaks to an audience that *already shares his values* and is sympathetic; this approach would likely be ineffective for a *skeptical* public needing to be galvanized."}, {"text": "Wilson, because his careful, legalistic tone is effective at persuading decision-makers without appearing reckless.", "isCorrect": false, "rationale": "Wilson's approach is tailored for politicians needing to cast a vote, aiming for persuasion without recklessness, which differs from shocking a *skeptical public* into *demanding reform*."}, {"text": "Butler, because he aims to shock ordinary Americans into attention regarding corporate profits and motivate them to action.", "isCorrect": true, "rationale": "Butler's strategy of using 'short, punchy sentences and concrete dollar figures' to 'shock them into attention' and provoke 'outrage and action' among ordinary Americans directly aligns with the goal of galvanizing a skeptical public for reform."}, {"text": "Remarque, because his focus on making the incomprehensible comprehensible can universally move an audience to deeper understanding.", "isCorrect": false, "rationale": "Remarque aims for readers to *experience* and *judge*, bearing witness rather than explicitly arguing or galvanizing for political action, which is the activist's goal."}], "id": "q03"}, {"question": "Remarque's 'argument,' as presented in the text, is described as implicit. What does this imply about his primary method of communication compared to the other three writers?", "options": [{"text": "He directly states his thesis and uses evidence to convince the reader of a specific viewpoint.", "isCorrect": false, "rationale": "This describes an *explicit* argument, which the text contrasts with Remarque's implicit approach."}, {"text": "He presents an experience and allows the reader to form their own judgment or conclusion, rather than explicitly persuading them.", "isCorrect": true, "rationale": "The text explicitly states Remarque 'does not argue at all in the conventional sense, but instead places the reader inside an experience and lets the experience do the work,' with his 'argument' being 'this is what it was like; now you judge.'"}, {"text": "He relies solely on emotional appeals to bypass logical reasoning and elicit a gut reaction.", "isCorrect": false, "rationale": "While he uses pathos, the text notes he uses *all three* (ethos, pathos, logos) 'in the service of testimony rather than persuasion,' suggesting a more nuanced approach than just bypassing logic."}, {"text": "He avoids taking any stance, offering only neutral facts and observations.", "isCorrect": false, "rationale": "His 'argument' ('this is what it was like; now you judge') implies a powerful stance or implication, even if not an explicit political opinion on the war itself."}], "id": "q04"}, {"question": "The text states that Wilson 'does not dwell on the physical horrors his listeners' constituents will endure.' Based on the section's discussion of 'silences,' what is the most likely strategic reason for this omission in a presidential address asking for a declaration of war?", "options": [{"text": "He wanted to appear detached and objective, maintaining presidential decorum during a solemn request.", "isCorrect": false, "rationale": "While decorum is part of a presidential address, the strategic omission of physical horrors likely serves a more direct persuasive purpose related to the vote at hand."}, {"text": "Dwelling on such horrors could provoke too much public opposition or make legislators hesitant and undermine the urgency of his appeal.", "isCorrect": true, "rationale": "Wilson's address 'must persuade legislators while speaking to history' and he 'must be persuasive without appearing reckless.' Focusing on graphic details could deter support and make him seem reckless, thus strategically, he omits them to secure the vote."}, {"text": "He assumed his audience was already fully aware of such horrors, making it redundant to mention them.", "isCorrect": false, "rationale": "The text emphasizes *strategic choices* behind silences, implying more than mere redundancy. Even if aware, reiterating might evoke counterproductive emotions."}, {"text": "He believed focusing on the abstract ideals of war, such as freedom and justice, was more inspiring and effective.", "isCorrect": false, "rationale": "While Wilson likely did focus on ideals, this option doesn't explain the *omission* of horrors as a strategic silence, but rather a choice of what *to* include."}], "id": "q05"}, {"question": "What is the most significant insight gained by comparing Holmes, Butler, Wilson, and Remarque side by side, as emphasized by the text?", "options": [{"text": "That all effective communicators ultimately rely on the same universal rhetorical techniques regardless of their specific circumstances.", "isCorrect": false, "rationale": "The text emphasizes how rhetorical choices *differ* based on circumstances, genre, and audience, not that they are universally the same."}, {"text": "That understanding the genre, the intended audience, and the unspoken choices (silences) are critical to analyzing any persuasive or testimonial effort.", "isCorrect": true, "rationale": "The text explicitly structures its comparison around these three key patterns: how genre shapes argument, how audience shapes tone, and what each writer chooses not to say, highlighting their collective importance for analysis."}, {"text": "That explicit arguments, with a clear thesis and marshaled evidence, are always more impactful than implicit arguments or bearing witness.", "isCorrect": false, "rationale": "The text distinguishes Remarque's 'bearing witness' without evaluating its impact against explicit arguments, simply noting its difference."}, {"text": "That the most powerful arguments always come from formal orations or presidential addresses, not pamphlets or novels.", "isCorrect": false, "rationale": "The text analyzes different genres without ranking their inherent power; power is dependent on context, audience, and purpose."}], "id": "q06"}, {"question": "Imagine a journalist is writing an investigative report exposing unethical practices by a large corporation, aiming to inform the public and potentially spur regulatory action. Based on the 'genre shapes argument' and 'audience shapes tone' principles, which author's rhetorical choices would be most analogous?", "options": [{"text": "Holmes, using inspiring, ceremonial language to rally corporate executives towards self-correction.", "isCorrect": false, "rationale": "Holmes inspires *sympathetic* audiences with ceremonial language, which is unsuitable for exposing unethical practices to the general public to spur regulatory action."}, {"text": "Butler, employing short, punchy sentences and concrete figures to provoke outrage and action among ordinary readers.", "isCorrect": true, "rationale": "Butler's approach of using 'short, punchy sentences and concrete dollar figures' to 'provoke outrage and action' in 'ordinary Americans' aligns well with a journalist's goal of exposing corporate wrongdoing to the public to stimulate reform."}, {"text": "Wilson, adopting careful, legalistic phrasing to persuade policymakers to pass new laws.", "isCorrect": false, "rationale": "While the journalist might hope for regulatory action, Wilson's direct address and legalistic tone are for legislators, whereas the journalist's primary aim is to inform and galvanize the *public* first."}, {"text": "Remarque, presenting the detailed experience of those affected by the corporate practices without explicit judgment or call to action.", "isCorrect": false, "rationale": "A journalist exposing unethical practices typically has an explicit goal of critiquing and prompting action, which differs from Remarque's 'bearing witness' without conventional argument."}], "id": "q07"}, {"question": "The text notes Remarque uses ethos, pathos, and logos 'in the service of testimony rather than persuasion.' What does this statement imply about the *function* of his rhetorical appeals?", "options": [{"text": "His appeals are designed to convince readers of a specific political solution or ideological stance against war.", "isCorrect": false, "rationale": "The text explicitly states Remarque 'does not offer a political opinion on whether the war should have been fought' and that his aim is testimony, not explicit persuasion or offering solutions."}, {"text": "His appeals work to establish the credibility of the experience, evoke genuine emotion, and logically present the reality of war, allowing the reader to interpret and judge.", "isCorrect": true, "rationale": "Serving 'testimony' means presenting an authentic, believable, and impactful account ('this is what it was like'). Ethos builds credibility of the account, pathos evokes the emotional reality, and logos provides the logical framework of the experience, all for the reader to form their own judgment."}, {"text": "He primarily uses these appeals to subtly manipulate readers into agreeing with a predetermined anti-war sentiment without an overt argument.", "isCorrect": false, "rationale": "While his work is anti-war in effect, 'bearing witness' is distinct from manipulation. The text emphasizes giving the reader an experience for judgment, not a manipulated agreement."}, {"text": "He uses them only incidentally, as his main goal is literary artistry, not effective communication.", "isCorrect": false, "rationale": "Remarque's use of rhetorical appeals is deliberate and serves a specific communicative purpose (testimony), demonstrating a clear goal beyond just 'artistry.'"}], "id": "q08"}, {"question": "Which statement best encapsulates the interconnectedness of genre, audience, and a communicator's choices as presented in the text?", "options": [{"text": "Genre is the most dominant factor, always dictating both the audience and the specific rhetorical strategies employed.", "isCorrect": false, "rationale": "The text shows an interplay, where genre, audience, and the speaker's choices are all significant and interdependent, not that one factor unilaterally dictates the others."}, {"text": "A writer's choices regarding tone and specific omissions are largely independent of their genre and intended audience.", "isCorrect": false, "rationale": "The text directly states how 'audience shapes tone' and how 'silences' are revealing, linking them intimately to context, audience, and argumentative purpose."}, {"text": "Genre provides the structural framework and typical stylistic elements, while audience determines the appropriate tone, persuasive needs, and what topics can be left unsaid, all shaping the overall argument.", "isCorrect": true, "rationale": "This option accurately synthesizes the three main patterns discussed: genre shapes argument (structure/style), audience shapes tone, and choices not to say (silences) are revealing, demonstrating their interconnected roles in communication."}, {"text": "Audience analysis primarily helps a speaker decide what evidence to include, but has little impact on the overall structure or tone of the argument.", "isCorrect": false, "rationale": "Audience analysis impacts the entire argument, including tone, emphasis, choice of topics, and what is omitted, as detailed in the text."}], "id": "q09"}, {"question": "When critically analyzing a contemporary public health campaign's message about a new vaccine, why would it be particularly important to consider 'what each writer chooses not to say,' as discussed in the text?", "options": [{"text": "To determine if the campaign's language is sufficiently inspirational for the general public to comply.", "isCorrect": false, "rationale": "While inspiration might be a goal, analyzing 'silences' is not primarily about assessing inspirational language but rather about what is *absent* from the message."}, {"text": "To identify potential gaps in information, unaddressed concerns, or underlying motives that might be influencing the message's presentation.", "isCorrect": true, "rationale": "The text states that 'These silences are as revealing as the arguments themselves,' and 'a careful reader learns as much from what is absent as from what is present.' This critical analysis helps uncover what might be deliberately omitted or downplayed, which is crucial for a public health message."}, {"text": "To assess the campaign's adherence to classical rhetorical traditions and historical precedents.", "isCorrect": false, "rationale": "While historical context can be useful, the discussion of 'silences' specifically points to strategic omissions and their meaning in a given argument, not an adherence to tradition."}, {"text": "To compare the campaign's chosen genre with other forms of public address to see which is most effective.", "isCorrect": false, "rationale": "Comparing genres is a separate analytical point discussed in the text; it's not the primary reason for examining 'what is not said' within a single message."}], "id": "q10"}, {"question": "All four writers share one silence: none of them addresses what the other three are primarily arguing about. Holmes never asks who profits; Butler never concedes any war might be necessary; Wilson avoids dwelling on physical horror; Remarque offers no political opinion. What does this pattern of mutual silence suggest about the relationship between a writer's chosen question and the blind spots it creates?", "options": [{"text": "It suggests that the writers were unaware of each other's work and therefore could not engage with competing arguments.", "isCorrect": false, "rationale": "Whether or not they knew each other's work, the pattern of mutual silence reflects the structure of their chosen arguments, not ignorance. Butler explicitly engages with Wilson's framing; the silences are strategic or structural, not accidental."}, {"text": "It suggests that committing deeply to one question tends to make the questions other thinkers are asking seem irrelevant or secondary — the frame of inquiry shapes what the writer sees as worth addressing.", "isCorrect": true, "rationale": "Each writer's chosen question — what does war do to the soul? who profits? what obligations justify force? what does it feel like? — determines not only what they argue but what they do not bother to address. The depth of their engagement with their own question makes the others' questions invisible or unimportant within their framework."}, {"text": "It suggests that all four writers were engaging in propaganda, since effective propaganda always avoids addressing counterarguments.", "isCorrect": false, "rationale": "The pattern of silences is a general feature of argument at high levels of analytical commitment, not unique to propaganda. The text presents this as a feature of how deeply committed thinkers operate, not as evidence of manipulation."}, {"text": "It suggests that the four texts should not be read together, since they address fundamentally incompatible questions.", "isCorrect": false, "rationale": "The textbook's entire purpose is to read them together precisely because their different questions illuminate different aspects of a common subject. Incompatibility in question does not mean incompatibility in value."}], "id": "q11"}, {"question": "A novelist, a pamphleteer, a presidential speaker, and an orator all address the same subject — war — but make very different choices about genre, audience, and what to leave unsaid. What does comparing these four across those dimensions reveal about the relationship between form and content?", "options": [{"text": "It reveals that form is irrelevant — what matters is the truth of the claims, not how they are packaged.", "isCorrect": false, "rationale": "The entire comparison chapter exists to show that genre shapes argument, audience shapes tone, and silences shape meaning. Form is inseparable from the content's persuasive and analytical meaning."}, {"text": "It reveals that the same underlying truth can be expressed in any form with equal effectiveness, as long as the writer is sincere.", "isCorrect": false, "rationale": "Sincerity does not overcome the constraints of genre. A presidential address cannot function like a novel; a pamphlet cannot do what a Memorial Day oration does. Each form enables some kinds of communication and forecloses others."}, {"text": "It reveals that form and content are inseparable: the genre chosen determines what can be said, what must be left out, who can be reached, and what kind of authority the argument carries.", "isCorrect": true, "rationale": "Holmes's oration inspires but cannot shock; Butler's pamphlet provokes but cannot carry presidential authority; Wilson's address carries positional weight but cannot dwell on horror; Remarque's novel immerses but cannot prescribe policy. Each form-content relationship is a different kind of argument, with different capabilities and limitations."}, {"text": "It reveals that genre is a matter of taste and that effective writers can always transcend the conventions of their chosen form.", "isCorrect": false, "rationale": "Genre conventions are not arbitrary stylistic preferences — they are expectations that audiences bring to texts. A Memorial Day oration that became a pamphlet-style exposé of war profits would confuse or alienate its audience, regardless of the writer's skill."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
