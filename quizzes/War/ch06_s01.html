    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/War.html">&larr; Back to War: A Debate in Primary Sources</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 6, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best defines the concept of 'rhetorical situation analysis' as described in the text?", "options": [{"text": "The study of how the specific moment of creation—including audience, occasion, and purpose—shapes a text.", "isCorrect": true, "rationale": "This concept emphasizes that arguments do not exist in a vacuum and are defined by the context surrounding their production."}, {"text": "The evaluation of a text's success based solely on its internal logic and the strength of its primary thesis.", "isCorrect": false, "rationale": "Rhetorical situation analysis looks beyond internal logic to the external factors like audience and occasion."}, {"text": "A method of critiquing literature by focusing on the biography of the author rather than the historical context.", "isCorrect": false, "rationale": "While authors are part of the situation, the focus is on the interplay of audience, occasion, and purpose, not just biography."}, {"text": "The process of identifying the ethical flaws in a speaker's argument regardless of their intended audience.", "isCorrect": false, "rationale": "The text suggests that understanding the audience is central to analysis, rather than applying a universal standard of ethics."}]}, {"question": "How does the text distinguish Smedley Butler's rhetorical approach from that of Oliver Wendell Holmes?", "options": [{"text": "Butler utilizes short, aggressive sentences to provoke a skeptical audience, while Holmes employs rolling sentences for a sympathetic one.", "isCorrect": true, "rationale": "The text contrasts Butler's 'weaponized' pamphlet style for readers who need convincing with Holmes's ceremonial oration for fellow veterans."}, {"text": "Butler relies on classical allusions to build authority, whereas Holmes uses concrete dollar figures to prove his points.", "isCorrect": false, "rationale": "The text actually attributes classical allusions to Holmes's oration and dollar figures to Butler's pamphlet."}, {"text": "Butler seeks to console his readers with shared values, while Holmes seeks to shock his listeners into political action.", "isCorrect": false, "rationale": "It is Butler who seeks to shock his audience into action, while Holmes's ceremonial occasion is more about inspiration and shared values."}, {"text": "Butler delivers a legalistic address intended for legislators, while Holmes writes a novel to provide an immersive experience.", "isCorrect": false, "rationale": "The text identifies Wilson as the one delivering a legalistic address and Remarque as the novelist."}]}, {"question": "What is the primary function of Woodrow Wilson's 'legalistic phrasing' according to the analysis?", "options": [{"text": "To reflect the gravity of the declaration of war while persuading cautious legislators.", "isCorrect": true, "rationale": "Wilson's specific audience (Congress) and occasion (asking for a declaration of war) demand a tone that balances persuasion with historical weight."}, {"text": "To hide the physical horrors of war from the public through abstract and complex terminology.", "isCorrect": false, "rationale": "While the text notes Wilson avoids dwelling on horrors, the primary function of his phrasing is to address the gravity of the political decision."}, {"text": "To establish a baseline of sympathy among a crowd of already supportive veterans.", "isCorrect": false, "rationale": "Establishing sympathy with veterans describes Holmes's rhetorical situation, not Wilson's address to Congress."}, {"text": "To simplify complex economic arguments for an audience of ordinary American citizens.", "isCorrect": false, "rationale": "Simplifying arguments for ordinary citizens is more characteristic of Butler's pamphlet style than Wilson's legalistic address."}]}, {"question": "In what way does Erich Maria Remarque's work differ from the 'explicit arguments' of Holmes, Butler, and Wilson?", "options": [{"text": "His argument is implicit, relying on testimony and experience rather than a stated thesis and marshaled evidence.", "isCorrect": true, "rationale": "Remarque is 'bearing witness' through a novel, allowing the reader's immersion in the experience to serve as the message."}, {"text": "He avoids using ethos, pathos, or logos because a novel is purely for entertainment.", "isCorrect": false, "rationale": "The text explicitly states that Remarque uses all three rhetorical appeals, but in the service of testimony."}, {"text": "His primary goal is to provide a political opinion on whether the war should have been fought.", "isCorrect": false, "rationale": "The text identifies the absence of political opinion on the war's justification as one of Remarque's key silences."}, {"text": "He writes exclusively for a younger generation that did not experience the war to convince them to enlist.", "isCorrect": false, "rationale": "The text notes he writes for both the survivors and the younger generation, and his goal is to make the incomprehensible comprehensible."}]}, {"question": "According to the text, what can a 'careful reader' learn from the silences in a text?", "options": [{"text": "What the author deems unnecessary, inconvenient, or outside the scope of their specific rhetorical purpose.", "isCorrect": true, "rationale": "Silences are revealing because they show which topics an author intentionally avoids to maintain their specific argument or tone."}, {"text": "That the author was likely uneducated about the topics they chose to omit from their argument.", "isCorrect": false, "rationale": "The text suggests these silences are strategic choices related to audience and purpose, not necessarily a lack of knowledge."}, {"text": "That the text is incomplete and cannot be used for a thorough rhetorical analysis.", "isCorrect": false, "rationale": "The text argues that silences are just as revealing and useful for analysis as the arguments themselves."}, {"text": "Which facts were censored by the government at the time the text was published.", "isCorrect": false, "rationale": "While censorship might occur, the text focuses on silences as rhetorical choices made by the author to suit their audience."}]}, {"question": "Which silence is specifically attributed to Smedley Butler in his pamphlet?", "options": [{"text": "The refusal to concede that any war might ever be justified.", "isCorrect": true, "rationale": "Butler's purpose is to provoke outrage against war profiteering, so acknowledging justified wars would weaken his 'weaponized' stance."}, {"text": "The failure to address the economic profits gained from military conflict.", "isCorrect": false, "rationale": "Discussing profits is central to Butler's argument; it is Holmes who remains silent on this issue."}, {"text": "The omission of the physical horrors endured by soldiers in the trenches.", "isCorrect": false, "rationale": "Wilson is the one noted for not dwelling on physical horrors, whereas Butler uses concrete figures of 'sons' graves' to shock."}, {"text": "The lack of historical context regarding the origins of the declaration of war.", "isCorrect": false, "rationale": "The text does not mention this as a specific silence of Butler's; his silence is regarding the potential justification of war."}]}, {"question": "How does the text characterize the audience for Oliver Wendell Holmes's address?", "options": [{"text": "A sympathetic group that already shares the speaker's core values.", "isCorrect": true, "rationale": "Holmes speaks to Harvard graduates and veterans, allowing him to use an inspirational tone that builds on a shared foundation."}, {"text": "A skeptical crowd of ordinary citizens who are unaware of the war's true costs.", "isCorrect": false, "rationale": "This describes the audience Butler targets with his pamphlet, not Holmes's audience."}, {"text": "A body of politicians who must cast a high-stakes vote for their constituents.", "isCorrect": false, "rationale": "This describes the specific legislative audience that Wilson addresses."}, {"text": "A diverse generation seeking to understand the psychological reality of combat.", "isCorrect": false, "rationale": "This describes the readership of Remarque's novel."}]}, {"question": "What role do ethos, pathos, and logos play in Erich Maria Remarque's novel, according to the 'Note on Remarque'?", "options": [{"text": "They are utilized in the service of testimony rather than for direct persuasion.", "isCorrect": true, "rationale": "While Remarque uses the three appeals, he does so to bear witness to an experience, letting the reader judge the implications."}, {"text": "They are absent because a novel relies on narrative rather than rhetorical appeals.", "isCorrect": false, "rationale": "The text explicitly states that Remarque *does* use all three, contradicting the idea that they are absent."}, {"text": "They are used to form a traditional thesis that the war should never have been fought.", "isCorrect": false, "rationale": "The text notes that Remarque does not offer a political opinion or a conventional explicit argument."}, {"text": "They are only used to appeal to the younger generation that did not live through the war.", "isCorrect": false, "rationale": "The text says he writes for both generations, using his testimony to make the incomprehensible comprehensible to all."}]}, {"question": "Why does Oliver Wendell Holmes avoid discussing the financial profits of war in his oration?", "options": [{"text": "To maintain an inspirational tone appropriate for a ceremonial occasion among peers.", "isCorrect": true, "rationale": "Holmes's purpose is to inspire his audience, and introducing the gritty reality of war profiteering would disrupt that ceremonial atmosphere."}, {"text": "Because his audience of Harvard graduates was largely unaware that war could be profitable.", "isCorrect": false, "rationale": "The text suggests silences are strategic rhetorical choices, not reflections of the audience's ignorance."}, {"text": "Because he believed that the economic impact of war was a legalistic detail only relevant to Congress.", "isCorrect": false, "rationale": "Wilson is the one concerned with legalistic details for Congress; Holmes is focused on inspiration."}, {"text": "To distance himself from the aggressive tactics used by pamphleteers like Smedley Butler.", "isCorrect": false, "rationale": "While their styles differ, the text attributes Holmes's silence to the nature of his occasion and audience, not a specific reaction to Butler."}]}, {"question": "Which pairing correctly matches a writer with a core rhetorical challenge they faced regarding their audience?", "options": [{"text": "Wilson must be persuasive to politicians without appearing reckless during a moment of high consequence.", "isCorrect": true, "rationale": "The text highlights that Wilson's phrasing reflects the gravity of a situation where he must convince legislators to vote for war."}, {"text": "Holmes must shock his audience into recognizing the connection between corporate greed and war.", "isCorrect": false, "rationale": "This describes Butler's challenge; Holmes's challenge is to inspire an already sympathetic audience."}, {"text": "Remarque must argue for specific policy changes to prevent future conflicts.", "isCorrect": false, "rationale": "Remarque's work is testimony, and the text notes he specifically avoids offering political opinions on the war."}, {"text": "Butler must provide a legalistic framework to satisfy the constitutional requirements of his readers.", "isCorrect": false, "rationale": "Wilson provides the legalistic framework; Butler's pamphlet is designed as a 'weapon' to provoke outrage."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
