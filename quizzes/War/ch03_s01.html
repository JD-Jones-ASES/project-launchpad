        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/War.html">&larr; Back to War: A Debate in Primary Sources</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 3, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "In his 1885 doctoral dissertation, 'Congressional Government', what was Woodrow Wilson's primary argument regarding the balance of power in the United States?", "options": [{"text": "Congress had become disproportionately powerful compared to the presidency.", "isCorrect": true, "rationale": "Wilson argued that the legislative branch had overshadowed the executive, though he later reversed this stance by expanding presidential power during the war."}, {"text": "The executive branch required a significant reduction in authority to prevent tyranny.", "isCorrect": false, "rationale": "While many progressives feared tyranny, Wilson's early academic work specifically focused on the weakness of the presidency relative to Congress."}, {"text": "The Supreme Court was the primary obstacle to effective democratic governance.", "isCorrect": false, "rationale": "Wilson focused his critique on the legislative and executive relationship rather than judicial overreach in this specific work."}, {"text": "A parliamentary system should replace the existing American constitutional framework.", "isCorrect": false, "rationale": "Wilson admired different systems, but his dissertation specifically analyzed the existing power imbalance between the American presidency and Congress."}], "id": "q01"}, {"question": "How did Woodrow Wilson's upbringing in the postwar South, specifically under the influence of his father, shape his political identity?", "options": [{"text": "It instilled a belief that moral principles were absolute and should dictate a leader's convictions.", "isCorrect": true, "rationale": "His father, a Presbyterian minister, taught him that right and wrong were not matters of opinion, leading to a sense of moral certainty in his presidency."}, {"text": "It fostered a commitment to military strategy as the primary tool for national leadership.", "isCorrect": false, "rationale": "The text explicitly states that Wilson was a 'man of books' and a professor rather than a soldier like his contemporaries."}, {"text": "It encouraged a flexible, pragmatic approach to policy based on political convenience.", "isCorrect": false, "rationale": "The text describes his moral certainty as a defining trait that often favored conviction over convenience."}, {"text": "It led him to prioritize racial integration as a core component of his progressive agenda.", "isCorrect": false, "rationale": "Wilson's Southern roots actually contributed to his support for segregation within the federal government."}], "id": "q02"}, {"question": "Which of the following best describes the economic reality of American neutrality between 1914 and 1917?", "options": [{"text": "The U.S. remained financially impartial, providing nearly equal loans to both the Allies and Germany.", "isCorrect": false, "rationale": "The source material highlights a massive disparity, with over $2 billion in loans to the Allies compared to only $27 million to Germany."}, {"text": "American financial interests became deeply tied to an Allied victory through massive loans and trade.", "isCorrect": true, "rationale": "The scale of loans to Britain and France meant that a German victory would have caused a significant financial crisis for American banks like J.P. Morgan."}, {"text": "The British naval blockade completely halted all American trade with European nations.", "isCorrect": false, "rationale": "While the blockade made trade with Germany difficult, it did not stop the extensive trade and lending to the Allied powers."}, {"text": "Wilson strictly prohibited private banks from lending money to any nations involved in the conflict.", "isCorrect": false, "rationale": "The Wilson administration permitted these loans to proceed, even though they compromised the spirit of even-handed neutrality."}], "id": "q03"}, {"question": "What significant contradiction existed between Wilson's international rhetoric and his domestic policy regarding civil rights?", "options": [{"text": "He advocated for global self-determination while overseeing the re-segregation of the federal government.", "isCorrect": true, "rationale": "Wilson's war address emphasized the rights of all peoples, yet he dismissed Black federal employees and brought segregation to previously integrated agencies."}, {"text": "He promoted free trade abroad while establishing the first federal income tax at home.", "isCorrect": false, "rationale": "While both occurred, they are not presented in the text as a moral or ideological contradiction regarding human rights."}, {"text": "He championed women's suffrage while denying voting rights to immigrants in New Jersey.", "isCorrect": false, "rationale": "The text focuses on his record with African American leaders and segregation rather than suffrage or immigrant voting rights."}, {"text": "He sought to abolish monopolies but protected the interests of party bosses in the Democratic party.", "isCorrect": false, "rationale": "The text states that Wilson actually turned on the party bosses after they helped him get elected as Governor."}], "id": "q04"}, {"question": "Upon becoming the Governor of New Jersey, how did Wilson interact with the political 'bosses' who had recruited him?", "options": [{"text": "He worked closely with them to ensure the passage of conservative legislation.", "isCorrect": false, "rationale": "Wilson was recruited because they expected him to be compliant, but he immediately challenged their authority."}, {"text": "He abandoned his progressive ideals to maintain party unity.", "isCorrect": false, "rationale": "The text describes his governorship as a period of successful progressive reform, not a compromise of his ideals."}, {"text": "He turned against them to implement reforms like a direct primary law and utility regulation.", "isCorrect": true, "rationale": "Wilson defied the expectations of the party bosses by pushing through a series of progressive reforms that limited their power."}, {"text": "He was successfully manipulated by the bosses until he reached the presidency.", "isCorrect": false, "rationale": "The text notes that the party bosses 'miscalculated' and that Wilson immediately asserted his independence."}], "id": "q05"}, {"question": "Which piece of legislation signed by Wilson established the modern central banking system of the United States?", "options": [{"text": "The Clayton Antitrust Act", "isCorrect": false, "rationale": "This act was designed to strengthen the regulation of monopolies, not to manage the banking system."}, {"text": "The Federal Reserve Act", "isCorrect": true, "rationale": "The Federal Reserve Act, signed during Wilson's first term, created the modern central banking system used today."}, {"text": "The Federal Trade Commission Act", "isCorrect": false, "rationale": "This act established the FTC to oversee business practices, rather than handling central banking."}, {"text": "The Sixteenth Amendment", "isCorrect": false, "rationale": "The Sixteenth Amendment authorized the federal income tax, which is a different fiscal mechanism than central banking."}], "id": "q06"}, {"question": "According to the source, Wilson viewed the study of government similarly to how a physician studies:", "options": [{"text": "Medical ethics.", "isCorrect": false, "rationale": "While Wilson was focused on ethics, the analogy specifically refers to the study of the structure and function of a system."}, {"text": "The human body.", "isCorrect": true, "rationale": "Wilson studied government methodically and theoretically, believing that understanding the 'body' of a system was required to improve it."}, {"text": "Infectious diseases.", "isCorrect": false, "rationale": "The text emphasizes the study of the system itself rather than just the 'diseases' or problems within it."}, {"text": "Surgical procedures.", "isCorrect": false, "rationale": "Wilson's approach was described as theoretical and methodical, focusing on the study of the system rather than just direct intervention."}], "id": "q07"}, {"question": "What was the outcome of the 1914 meeting between Woodrow Wilson and African American leader William Monroe Trotter?", "options": [{"text": "Wilson agreed to investigate the re-segregation of federal offices.", "isCorrect": false, "rationale": "Wilson did not offer to investigate; instead, he defended the practice of segregation."}, {"text": "Trotter was ordered out of the White House after challenging Wilson's defense of segregation.", "isCorrect": true, "rationale": "The meeting ended in a national scandal when Wilson ejected Trotter for protesting the administration's discriminatory policies."}, {"text": "The meeting led to the immediate integration of the Department of the Treasury.", "isCorrect": false, "rationale": "Under Wilson, agencies were re-segregated, and this meeting did nothing to reverse that trend."}, {"text": "Wilson convinced Trotter that segregation was a necessary temporary measure for progress.", "isCorrect": false, "rationale": "Trotter actively challenged Wilson, and the incident was viewed as a scandal rather than a successful persuasion."}], "id": "q08"}, {"question": "Woodrow Wilson was the only American president to have achieved which academic distinction?", "options": [{"text": "A Nobel Peace Prize while in office.", "isCorrect": false, "rationale": "While he won the Nobel Peace Prize in 1919, he is not the only president to have received one."}, {"text": "An earned doctorate degree.", "isCorrect": true, "rationale": "Wilson earned his PhD in political science from Johns Hopkins University in 1886, making him unique among U.S. presidents."}, {"text": "The presidency of an Ivy League university.", "isCorrect": false, "rationale": "While he was president of Princeton, the text specifies the 'earned doctorate' as his unique presidential distinction."}, {"text": "A degree in both law and political science.", "isCorrect": false, "rationale": "The text highlights his doctorate in political science specifically as his unique academic credential."}], "id": "q09"}, {"question": "True or False: Woodrow Wilson entered the presidency as a seasoned military commander, similar to predecessors like Theodore Roosevelt.", "options": [{"text": "True", "isCorrect": false, "rationale": "The text explicitly contrasts Wilson with soldiers like Holmes and Butler, noting he earned his authority in the classroom, not on the battlefield."}, {"text": "False", "isCorrect": true, "rationale": "Wilson was a scholar and professor; he was 'not a soldier' and had no military background prior to becoming commander-in-chief."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
