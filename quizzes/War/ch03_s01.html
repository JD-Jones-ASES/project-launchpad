<script>
var QUESTIONS = [{"question": "Which aspect of Woodrow Wilson's background most uniquely distinguished him among American presidents, according to the text?", "options": [{"text": "His experience as a wartime commander-in-chief.", "isCorrect": false, "rationale": "While Wilson was a wartime commander-in-chief, this experience is not unique among presidents; many have served in this capacity during conflicts."}, {"text": "He was the only American president to hold an earned doctorate.", "isCorrect": true, "rationale": "The text explicitly states Wilson was 'The only American president to hold an earned doctorate,' highlighting this as a unique distinction."}, {"text": "His upbringing in the postwar South.", "isCorrect": false, "rationale": "Wilson was indeed raised in the postwar South, but this background is not unique among all American presidents throughout history."}, {"text": "His role as an architect of the League of Nations.", "isCorrect": false, "rationale": "Wilson was instrumental in the League of Nations, earning him a Nobel Peace Prize, but this is an accomplishment during his presidency, not a unique background characteristic compared to all presidents."}], "id": "q01"}, {"question": "The text describes Woodrow Wilson's 'moral certainty' as both his greatest strength and his most dangerous blind spot. Which of the following best exemplifies this dual nature?", "options": [{"text": "His systematic approach to studying government, like a physician studies the human body.", "isCorrect": false, "rationale": "Wilson's methodical approach reflects his academic discipline and desire for improvement, but doesn't directly illustrate the moral certainty's dual nature as both strength and blind spot."}, {"text": "His progressive reforms in domestic policy contrasted with the re-segregation of federal agencies under his administration.", "isCorrect": true, "rationale": "Wilson's conviction in progressive reforms (strength) was deeply contradicted by his decision to re-segregate federal agencies, stemming from his Southern upbringing and a belief that segregation was in 'best interest' (blind spot), even while championing universal rights."}, {"text": "His initial declaration of American neutrality in WWI followed by his eventual decision to enter the conflict.", "isCorrect": false, "rationale": "His shift from neutrality to war was a reluctant decision based on evolving circumstances, reflecting a change in policy, not necessarily the inherent dual nature of his moral certainty."}, {"text": "His battle with old-money alumni at Princeton over university reforms.", "isCorrect": false, "rationale": "This demonstrates his strength as a reformer willing to challenge entrenched power, but it doesn't clearly show a 'dangerous blind spot' in the same context as his moral certainty."}], "id": "q02"}, {"question": "As president of Princeton University, Wilson engaged in several reforms. Which of the following was NOT among his reform efforts?", "options": [{"text": "Modernizing the curriculum.", "isCorrect": false, "rationale": "The text states Wilson 'modernizing the curriculum' was one of his reforms at Princeton."}, {"text": "Breaking up exclusive eating clubs.", "isCorrect": false, "rationale": "The text mentions Wilson 'breaking up the exclusive eating clubs' as part of his reform efforts at Princeton."}, {"text": "Establishing a direct primary law for state elections.", "isCorrect": true, "rationale": "A direct primary law was a progressive reform Wilson pushed through as Governor of New Jersey, not during his tenure as Princeton University president."}, {"text": "Battling old-money alumni who resisted change.", "isCorrect": false, "rationale": "The text notes Wilson was 'battling the old-money alumni who resisted change' as part of his reform efforts at Princeton."}], "id": "q03"}, {"question": "New Jersey Democrats recruited Wilson to run for governor, expecting a 'compliant academic they could control.' How did Wilson's subsequent actions challenge this expectation?", "options": [{"text": "He immediately focused on national issues rather than state-level reforms.", "isCorrect": false, "rationale": "The text indicates he 'immediately turned on the party bosses...pushing through progressive reforms' at the state level, contradicting this option."}, {"text": "He allied himself with powerful industrial leaders to bypass party influence.", "isCorrect": false, "rationale": "The text states he 'turned on the party bosses' and pushed through reforms like utility regulation, not that he allied with industrial leaders."}, {"text": "He promptly enacted progressive reforms, directly challenging the party bosses who helped him win.", "isCorrect": true, "rationale": "The text explicitly states Wilson 'won the governorship and immediately turned on the party bosses who had put him in office, pushing through progressive reforms,' demonstrating his independence and defiance of their control."}, {"text": "He resigned shortly after his election to pursue the presidency directly.", "isCorrect": false, "rationale": "Wilson served as governor and 'Two years later, he won the presidency,' implying he completed his gubernatorial term or a significant portion of it."}], "id": "q04"}, {"question": "Which of the following domestic achievements from Wilson's first term fundamentally reshaped the American financial system and market regulation?", "options": [{"text": "The establishment of the Social Security Act.", "isCorrect": false, "rationale": "The Social Security Act was established much later, during Franklin D. Roosevelt's administration, not Wilson's."}, {"text": "The implementation of the Interstate Commerce Act.", "isCorrect": false, "rationale": "The Interstate Commerce Act was passed in 1887, well before Wilson's presidency."}, {"text": "The Federal Reserve Act and the Clayton Antitrust Act.", "isCorrect": true, "rationale": "The text credits Wilson with signing the Federal Reserve Act (creating the modern central banking system) and the Clayton Antitrust Act (strengthening regulation of monopolies), both pivotal in reshaping finance and market regulation."}, {"text": "The creation of the Environmental Protection Agency (EPA).", "isCorrect": false, "rationale": "The EPA was established in 1970, under President Richard Nixon, not Wilson."}], "id": "q05"}, {"question": "The text highlights a significant contradiction in Wilson's presidency, particularly relevant to his later war address. What was this contradiction?", "options": [{"text": "He advocated for isolationism but ultimately led America into a global conflict.", "isCorrect": false, "rationale": "While he declared neutrality and then entered the war, the text focuses on a deeper contradiction related to his stated principles versus his domestic policies."}, {"text": "He promoted economic policies that benefited corporations while campaigning as a progressive reformer.", "isCorrect": false, "rationale": "The text states he strengthened regulation of monopolies and created a federal income tax, aligning with progressive reform rather than solely benefiting corporations."}, {"text": "He championed the rights of all peoples globally but oversaw the re-segregation of federal agencies and denied basic rights to African American citizens.", "isCorrect": true, "rationale": "The text explicitly states Wilson's war address was 'built on the claim that America fights for the rights of all peoples,' but 'presided over a government that denied basic rights to millions of its own citizens' through re-segregation, a direct contradiction."}, {"text": "He came from an academic background but earned his authority through political maneuvering rather than intellectual debate.", "isCorrect": false, "rationale": "Wilson's political career did involve maneuvering, but the text emphasizes his reformist drive and intellectual approach to government, not a fundamental contradiction between his academic roots and political actions."}], "id": "q06"}, {"question": "During the period of American neutrality in WWI, the text suggests that this neutrality was 'not as even-handed as the word implies.' What evidence supports this claim?", "options": [{"text": "Wilson secretly authorized American military advisors to train Allied forces.", "isCorrect": false, "rationale": "The text does not mention secret military advisors; it focuses on economic ties."}, {"text": "American banks provided substantial loans and factories supplied vast amounts of materials exclusively to the Allied powers.", "isCorrect": true, "rationale": "The text states, 'American economic ties to the Allies grew enormously... American banks... extended over $2 billion in loans to Britain and France... American factories were supplying the Allies with munitions, food, and raw materials on a vast scale,' demonstrating an economic leaning towards the Allies."}, {"text": "The U.S. Navy conducted joint exercises with British naval forces in the Atlantic.", "isCorrect": false, "rationale": "The text discusses economic entanglement, not military exercises with belligerents during a declared neutrality."}, {"text": "Wilson publicly denounced German aggression while remaining silent on Allied transgressions.", "isCorrect": false, "rationale": "While Wilson's rhetoric might have been analyzed, the text specifically points to economic entanglement as the reason neutrality was not 'even-handed.'"}], "id": "q07"}, {"question": "What significant financial consequence for Wall Street would a German victory in WWI have entailed, according to the text, given American economic ties during neutrality?", "options": [{"text": "A massive influx of German capital, disrupting the American stock market.", "isCorrect": false, "rationale": "The text implies a negative financial impact for Wall Street due to American loans to the Allies, not a disruptive influx of German capital."}, {"text": "Loss of access to valuable German industrial patents and markets.", "isCorrect": false, "rationale": "The primary concern highlighted was the risk to American investments in the Allied cause, not patents or German markets."}, {"text": "Financial catastrophe due to unrecoverable loans and unpaid debts from the Allied powers.", "isCorrect": true, "rationale": "The text explicitly states that American banks extended over $2 billion in loans to Britain and France, and 'A German victory would have meant financial catastrophe for Wall Street' because these loans would likely not be repaid."}, {"text": "An immediate shift of global financial power from New York to Berlin.", "isCorrect": false, "rationale": "While a German victory would have had global implications, the text specifically points to the direct 'financial catastrophe' for Wall Street due to the loans to the Allies."}], "id": "q08"}, {"question": "The author presents the question of whether America's economic entanglement influenced Wilson's decision to enter WWI as 'one of the most debated questions in American diplomatic history.' What is the implied significance of this debate for understanding Wilson's war address?", "options": [{"text": "It suggests Wilson's personal wealth played a role in his decision-making.", "isCorrect": false, "rationale": "The text refers to Wall Street's interests and national economic ties, not Wilson's personal wealth."}, {"text": "It questions whether his stated principles or financial interests truly drove America's entry into the war.", "isCorrect": true, "rationale": "The text states 'Wilson himself insisted that principle, not profit, drove his decision' and highlights the debate over economic entanglement. This implies that understanding the war address requires considering whether the stated 'principles' were the sole drivers or if economic factors were also influential."}, {"text": "It implies that Wilson was fundamentally dishonest in his public statements.", "isCorrect": false, "rationale": "While it raises a question about motivation, it doesn't definitively label Wilson as dishonest; it presents a historical debate about the 'true' drivers behind the decision."}, {"text": "It proves that international law was insufficient to prevent conflict during that era.", "isCorrect": false, "rationale": "The text notes that trade with belligerents did not violate the letter of international law, but it doesn't use this debate to comment on the sufficiency of international law itself."}], "id": "q09"}, {"question": "The text concludes by stating that understanding 'how he reached that conclusion [to enter the war] is essential to understanding the speech he delivered.' What overarching theme does the author encourage the reader to consider when evaluating Wilson's war address?", "options": [{"text": "The inevitable nature of American involvement in global conflicts.", "isCorrect": false, "rationale": "The author focuses on Wilson's specific motivations and contradictions, not the inevitability of war in general."}, {"text": "The tension between Wilson's high-minded ideals for global rights and the practical realities of American economic interests.", "isCorrect": false, "rationale": "While the economic entanglement vs. principle debate is highlighted, this option is missing the crucial element of Wilson's domestic contradictions."}, {"text": "The complex interplay between personal conviction, national economic interests, and the profound moral contradictions within his own governance.", "isCorrect": true, "rationale": "The text highlights Wilson's deep moral seriousness (personal conviction), the economic ties to the Allies (national economic interests), and his re-segregation of federal agencies (profound moral contradictions). The author encourages holding these factors in mind to fully grasp his war address."}, {"text": "The consistency of American foreign policy across different presidential administrations.", "isCorrect": false, "rationale": "The text focuses exclusively on Woodrow Wilson's presidency and his specific decisions, not a broader analysis of consistent foreign policy across administrations."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
