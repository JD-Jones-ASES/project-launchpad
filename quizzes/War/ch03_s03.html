<script>
var QUESTIONS = [{"question": "What was the primary reason Woodrow Wilson called an extraordinary session of Congress on April 2, 1917?", "options": [{"text": "To secure additional funding for the existing armed neutrality policy.", "isCorrect": false, "rationale": "While funding was a concern, the primary reason was to address the failure of armed neutrality and the need for a new policy, not just to fund the old one."}, {"text": "To ask Congress to declare war on Germany due to its policy of unrestricted submarine warfare.", "isCorrect": true, "rationale": "Wilson explicitly states that he advises Congress to declare the German government's actions as an act of war and formally accept the status of belligerent, which was the ultimate purpose of the address."}, {"text": "To inform Congress about new intelligence regarding German espionage activities in the United States.", "isCorrect": false, "rationale": "The text focuses entirely on German submarine warfare and its implications, not on espionage."}, {"text": "To negotiate a peace treaty with Germany, contingent on their cessation of submarine attacks.", "isCorrect": false, "rationale": "Wilson's address is a call to action against Germany's warfare, not an attempt to negotiate peace at that moment."}], "id": "q01"}, {"question": "Wilson describes the Imperial German Government's new submarine policy, announced on February 3, 1917, as having done what?", "options": [{"text": "Introduced new, stricter warnings for all vessels before sinking.", "isCorrect": false, "rationale": "The text states the 'new policy has swept every restriction aside' and vessels are sunk 'without warning,' directly contradicting this option."}, {"text": "Restrained its commanders to only target belligerent military vessels.", "isCorrect": false, "rationale": "Wilson explicitly states that 'Vessels of every kind, whatever their flag, their character, their cargo... have been ruthlessly sent to the bottom: without warning and without thought of help or mercy for those on board, the vessels of friendly neutrals along with those of belligerents.'"}, {"text": "Put aside all restraints of law or of humanity and begun sinking every vessel without warning.", "isCorrect": true, "rationale": "The text explicitly states the German government's purpose was 'to put aside all restraints of law or of humanity and use its submarines to sink every vessel' without warning."}, {"text": "Prioritized the rescue of noncombatants before sinking any vessel.", "isCorrect": false, "rationale": "Wilson condemns the 'ruthless' sinking 'without thought of help or mercy for those on board,' directly contradicting this option."}], "id": "q02"}, {"question": "Wilson distinguishes the 'new policy' of German submarine warfare from previous practices. How did the pre-February 1917 policy, following April of the previous year, differ?", "options": [{"text": "It completely ceased submarine attacks on all vessels.", "isCorrect": false, "rationale": "The text indicates a 'certain degree of restraint' was observed, not a complete cessation of attacks."}, {"text": "It focused solely on military ships and avoided merchant vessels entirely.", "isCorrect": false, "rationale": "The text mentions 'passenger boats should not be sunk' and 'due warning would be given to all other vessels,' implying merchant vessels were still targets but with precautions."}, {"text": "It observed some restraint, such as giving warnings to merchant vessels and allowing crews a chance to save their lives.", "isCorrect": true, "rationale": "Wilson states that 'since April of last year the Imperial Government had somewhat restrained the commanders... passenger boats should not be sunk and that due warning would be given to all other vessels... and care taken that their crews were given at least a fair chance to save their lives.'"}, {"text": "It targeted only ships sailing under the British flag.", "isCorrect": false, "rationale": "The text does not specify this limitation; rather, it speaks of 'due warning... to all other vessels' in general before the new policy."}], "id": "q03"}, {"question": "Wilson characterizes Germany's unrestricted submarine warfare not just as an attack on property, but fundamentally as a 'warfare against mankind.' What is his primary justification for this strong claim?", "options": [{"text": "The vast financial losses incurred by the United States and other neutral nations.", "isCorrect": false, "rationale": "Wilson states, 'I am not now thinking of the loss of property involved, immense and serious as that is, but only of the wanton and wholesale destruction of the lives of noncombatants,' indicating property loss is secondary to human life."}, {"text": "The violation of international trade agreements and economic treaties.", "isCorrect": false, "rationale": "While economic disruption is implicit, Wilson's focus is on the human cost and the violation of fundamental human rights and international law, not specifically trade agreements."}, {"text": "The indiscriminate and wholesale destruction of innocent civilian lives, including women and children.", "isCorrect": true, "rationale": "Wilson explicitly says he is 'only of the wanton and wholesale destruction of the lives of noncombatants, men, women, and children,' deeming this a war against mankind, as 'Property can be paid for; the lives of peaceful and innocent people cannot be.'"}, {"text": "The targeting of military convoys carrying essential supplies to the Allies.", "isCorrect": false, "rationale": "Wilson emphasizes the sinking of 'friendly neutrals' and 'noncombatants' engaged in 'innocent and legitimate' pursuits, not just military targets."}], "id": "q04"}, {"question": "Wilson previously advocated for 'armed neutrality' to protect American rights at sea. Why did he conclude this policy was no longer sustainable or effective?", "options": [{"text": "Germany had agreed to cease its submarine warfare if the U.S. remained strictly neutral.", "isCorrect": false, "rationale": "The text states the opposite; Germany's new policy swept aside all restraints, making neutrality untenable."}, {"text": "He believed armed neutrality would eventually draw the U.S. into war without the full rights or effectiveness of a belligerent.", "isCorrect": true, "rationale": "Wilson argues 'armed neutrality is ineffectual enough at best; in such circumstances and in the face of such pretensions it is worse than ineffectual: it is likely only to produce what it was meant to prevent; it is practically certain to draw us into the war without either the rights or the effectiveness of belligerents.'"}, {"text": "American merchant ships were too slow to evade German submarines, making defense futile.", "isCorrect": false, "rationale": "Wilson's reasoning focuses on the nature of submarine warfare making traditional defense impossible against 'outlaws' that do not surface, not on the speed of ships."}, {"text": "Other neutral nations had successfully defended themselves, demonstrating the policy's efficacy.", "isCorrect": false, "rationale": "The text does not mention the success of other neutral nations; instead, it highlights the universal challenge posed by Germany's actions."}], "id": "q05"}, {"question": "What significant measure does Wilson propose for funding the war effort, in addition to obtaining 'adequate credits'?", "options": [{"text": "Selling off national assets to foreign governments.", "isCorrect": false, "rationale": "The text does not mention selling national assets. It focuses on internal funding mechanisms."}, {"text": "Relying entirely on borrowed money, as it is the fastest way to raise funds.", "isCorrect": false, "rationale": "Wilson explicitly states, 'it would be most unwise to base the credits which will now be necessary entirely on money borrowed' to avoid inflation."}, {"text": "Sustaining the credits, 'so far as they can equitably be sustained by the present generation, by well conceived taxation.'", "isCorrect": true, "rationale": "Wilson advocates for 'well conceived taxation' to equitably sustain credits and protect against inflation from 'vast loans.'"}, {"text": "Requiring all private citizens to contribute a percentage of their wealth to the war bonds.", "isCorrect": false, "rationale": "While taxation might imply contributions, 'universal liability to service' refers to military service, not a direct wealth contribution. The specific method of taxation is not detailed as a requirement for all citizens in this way."}], "id": "q06"}, {"question": "Beyond financial and naval preparations, what immediate and substantial increase to the armed forces does Wilson recommend?", "options": [{"text": "A voluntary recruitment drive targeting experienced sailors and pilots.", "isCorrect": false, "rationale": "Wilson specifically mentions adding 'at least five hundred thousand men, who should, in my opinion, be chosen upon the principle of universal liability to service,' indicating a draft, not just a voluntary drive."}, {"text": "An immediate addition of at least five hundred thousand men, chosen upon the principle of universal liability to service.", "isCorrect": true, "rationale": "Wilson proposes 'the immediate addition to the armed forces of the United States already provided for by law in case of war at least five hundred thousand men, who should, in my opinion, be chosen upon the principle of universal liability to service.'"}, {"text": "Deploying existing troops from the Mexican border to European fronts.", "isCorrect": false, "rationale": "The text speaks of *adding* men to the armed forces, not redeploying existing ones."}, {"text": "Establishing a new military academy to train a specialized corps for submarine warfare.", "isCorrect": false, "rationale": "While naval equipment is mentioned, the immediate large-scale personnel increase proposed is a general mobilization based on universal service."}], "id": "q07"}, {"question": "In stating the ultimate motives and objects of the United States entering the war, Wilson asserts that they are unchanged from his previous addresses. What is this overarching goal?", "options": [{"text": "To acquire new territories and expand American colonial influence.", "isCorrect": false, "rationale": "Wilson's stated goals are principled, focusing on justice and peace, not territorial expansion."}, {"text": "To exact revenge upon Germany for its transgressions against American lives and property.", "isCorrect": false, "rationale": "Wilson explicitly states, 'Our motive will not be revenge or the victorious assertion of the physical might of the nation, but only the vindication of right, of human right.'"}, {"text": "To establish the United States as the dominant global superpower.", "isCorrect": false, "rationale": "While the U.S. would become a significant player, Wilson frames the goal as 'to vindicate the principles of peace and justice in the life of the world' and establish a 'concert of purpose' among free peoples, not solely American dominance."}, {"text": "To vindicate the principles of peace and justice in the world and establish a concert of free and self-governed peoples.", "isCorrect": true, "rationale": "Wilson states, 'Our object now, as then, is to vindicate the principles of peace and justice in the life of the world as against selfish and autocratic power and to set up amongst the really free and self governed peoples of the world such a concert of purpose and of action as will henceforth insure the observance of those principles.'"}], "id": "q08"}, {"question": "What is the dual duty Wilson outlines for the United States in 'carrying out the measures by which these things are to be accomplished'?", "options": [{"text": "To secure trade routes for American exports and restrict imports from enemy nations.", "isCorrect": false, "rationale": "While trade is implicitly involved in a global conflict, Wilson's focus here is on military and material support, not just securing trade for profit."}, {"text": "To provide humanitarian aid to war-torn regions and mediate peace negotiations.", "isCorrect": false, "rationale": "The immediate 'practical duty' outlined is related to military support and self-preparation, not primarily humanitarian aid or mediation."}, {"text": "To prepare its own military forces and, simultaneously, supply nations already at war with Germany with necessary materials.", "isCorrect": true, "rationale": "Wilson states, 'we should keep constantly in mind the wisdom of interfering as little as possible in our own preparation and in the equipment of our own military forces with the duty... of supplying the nations already at war with Germany with the materials which they can obtain only from us or by our assistance.'"}, {"text": "To develop new military technologies and share them exclusively with its allies.", "isCorrect": false, "rationale": "The text mentions equipping the navy but does not specify developing *new* technologies or exclusive sharing; the emphasis is on immediate material supply."}], "id": "q09"}, {"question": "Wilson concludes by stating, 'Neutrality is no longer feasible or desirable where the peace of the world is involved and the freedom of its peoples.' This statement signifies a fundamental shift in American foreign policy from what to what?", "options": [{"text": "From isolationism to economic protectionism.", "isCorrect": false, "rationale": "While economic factors are present, the shift described is about engagement in global peace and freedom, not purely economic policy."}, {"text": "From non-interventionism in European conflicts to active global engagement for peace and justice.", "isCorrect": true, "rationale": "The statement marks a clear departure from the traditional American stance of avoiding 'entangling alliances' and European conflicts, advocating instead for intervention based on global principles of peace and freedom."}, {"text": "From reliance on international law to unilateral military action.", "isCorrect": false, "rationale": "Wilson argues Germany has *violated* international law, compelling the U.S. to act, but the underlying goal is to *vindicate* principles of peace and justice, which implies a desire to restore a lawful international order, not abandon it for unilateralism."}, {"text": "From an emphasis on domestic prosperity to prioritizing foreign aid.", "isCorrect": false, "rationale": "While the war effort involves supporting allies, the shift is broader than just foreign aid; it concerns the nation's role in global security and principles, with domestic prosperity still vital for war production."}], "id": "q10"}, {"question": "Wilson states 'We have no quarrel with the German people. Our quarrel is solely with their government.' What rhetorical function does this distinction serve in his argument for war?", "options": [{"text": "It establishes the legal basis for declaring war, since international law requires distinguishing civilian populations from enemy states.", "isCorrect": false, "rationale": "While the distinction has some legal relevance, its primary function in Wilson's speech is rhetorical and moral, not purely legal. He uses it to pre-empt criticism that the war would be fought against ordinary Germans."}, {"text": "It frames the conflict as a defense of universal democratic principles against autocratic government rather than ethnic or national hatred, making the war about ideas rather than peoples.", "isCorrect": true, "rationale": "By separating 'the German people' from 'their government,' Wilson positions the war as a principled struggle against a form of government (autocracy) rather than against a nation or ethnic group. This is essential to his framing of the war as a fight for democracy — democracies should not make war on peoples, only on the tyrannies that oppress them."}, {"text": "It attempts to recruit German-Americans to support the war effort by assuring them that their heritage would not make them suspect.", "isCorrect": false, "rationale": "While the distinction may have had that beneficial effect, Wilson's primary purpose in the speech is to establish the moral character of the war, not to address the specific concerns of German-American citizens."}, {"text": "It signals that the United States was open to a negotiated peace with Germany if the German government changed its policies.", "isCorrect": false, "rationale": "By the time of this speech Wilson had concluded that diplomacy had been exhausted; the distinction between people and government does not signal an opening for negotiation but rather frames the moral nature of the conflict."}], "id": "q11"}, {"question": "Wilson's closing line — 'God helping her, she can do no other' — echoes Martin Luther's declaration before the Diet of Worms: 'Here I stand, I can do no other.' What effect does this allusion create for his Congressional audience?", "options": [{"text": "It positions Wilson as a religious martyr willing to sacrifice himself for his beliefs, making him appear humble and self-sacrificial.", "isCorrect": false, "rationale": "The allusion frames the decision as morally compelled, not Wilson personally as a martyr. The focus is on America's moral imperative, not Wilson's personal sacrifice."}, {"text": "It frames America's entry into the war as a morally compelled act of conscience — one that, like Luther's stand against institutional corruption, cannot be compromised without violating one's deepest principles.", "isCorrect": true, "rationale": "Luther's declaration was the archetypal moment of principled refusal to capitulate despite overwhelming pressure. By invoking it, Wilson suggests that America's moral obligation is equally non-negotiable — not a political choice but a matter of conscience from which no honest person could retreat."}, {"text": "It suggests that Wilson opposed the war but was forced into it by Congressional pressure, just as Luther was forced to defend his positions.", "isCorrect": false, "rationale": "Wilson was asking Congress for the declaration; he was the one making the request, not being pressured by Congress. The allusion frames moral compulsion, not external political pressure."}, {"text": "It demonstrates Wilson's religious faith and establishes his personal ethos as a devout Christian, appealing to the religious values of his Congressional audience.", "isCorrect": false, "rationale": "While Wilson's religious background is real, the allusion's primary function is to frame the moral weight of the decision, not to establish his personal piety as a credential."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
