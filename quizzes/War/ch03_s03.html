        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/War.html">&larr; Back to War: A Debate in Primary Sources</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 3, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the defining characteristic of a 'Presidential Address' that distinguishes it from a campaign speech?", "options": [{"text": "It is an official act intended to request specific legislative action from Congress.", "isCorrect": true, "rationale": "A presidential address is defined as a formal act of state where the head of government asks for a consequential decision or legislative support."}, {"text": "It is primarily designed to commemorate historical events or national tragedies.", "isCorrect": false, "rationale": "Commemorating events is the function of a memorial oration, which the text explicitly contrasts with Wilson's formal address."}, {"text": "It is exclusively focused on persuading the domestic public during an election cycle.", "isCorrect": false, "rationale": "This describes a campaign speech, whereas the presidential address targets multiple audiences including Congress and foreign governments."}, {"text": "It serves as a blunt polemic aimed at discrediting political opponents.", "isCorrect": false, "rationale": "The text states that Wilson's address is not a blunt polemic like Butler’s pamphlet, but a formal act of state."}], "id": "q01"}, {"question": "How does Wilson's multiplicity of audiences dictate the tone of his 1917 address?", "options": [{"text": "He must maintain a delicate balance between appearing resolute and appearing soberly reluctant.", "isCorrect": true, "rationale": "To satisfy peace factions at home while reassuring Allies abroad, Wilson had to sound principled yet grieved by the necessity of war."}, {"text": "He adopts an eager and aggressive tone to intimidate the German government.", "isCorrect": false, "rationale": "An eager tone would have alarmed the domestic peace faction and contradicted his image as a reluctant warrior."}, {"text": "He focuses entirely on the American public to ensure maximum volunteer enrollment.", "isCorrect": false, "rationale": "The text identifies multiple audiences, including the Allied governments and posterity, rather than just the domestic public."}, {"text": "He utilizes a purely academic tone to distance himself from the emotional weight of the decision.", "isCorrect": false, "rationale": "While formal, the text notes his use of controlled pathos and moral language rather than a detached academic tone."}], "id": "q02"}, {"question": "What rhetorical function does the word 'But' serve in the 'Fearful Thing' passage?", "options": [{"text": "It acts as a pivot from the concession of war's horrors to the moral justification for fighting.", "isCorrect": true, "rationale": "The conjunction allows Wilson to acknowledge the 'terrible and disastrous' nature of war before arguing that higher principles outweigh those costs."}, {"text": "It introduces a logical fallacy that obscures the economic motives of the war.", "isCorrect": false, "rationale": "While the text mentions omissions of economic motives, 'But' is analyzed as a structural pivot for a moral equation, not a fallacy."}, {"text": "It serves as a rhythmic bridge intended to confuse the audience about the speech's intent.", "isCorrect": false, "rationale": "The text argues the structure is a 'masterclass' in clarity and purpose rather than a tool for confusion."}, {"text": "It signals the transition from a discussion of domestic policy to international shipping rights.", "isCorrect": false, "rationale": "The transition is from the 'fearful' nature of war to the 'precious' nature of the rights being defended."}], "id": "q03"}, {"question": "Which of the following was intentionally omitted from Wilson's address to maintain 'moral clarity'?", "options": [{"text": "The specific economic loans made by American banks to the Allied powers.", "isCorrect": true, "rationale": "Including the financial stake, such as the approximately $\\$2.3$ billion loaned to Allies, would have complicated the moral narrative with suggestions of self-interest."}, {"text": "The hostile acts committed by the German government, such as submarine warfare.", "isCorrect": false, "rationale": "Wilson explicitly used these hostile acts as the logical foundation for the necessity of war."}, {"text": "The distinction between democratic and autocratic forms of government.", "isCorrect": false, "rationale": "This distinction was a central pillar of Wilson's argument to elevate the conflict to a universal cause."}, {"text": "The mention of the 'great peaceful people' that make up the United States.", "isCorrect": false, "rationale": "Wilson explicitly invokes this image of the American people to establish his ethos as a reluctant leader of a peace-loving nation."}], "id": "q04"}, {"question": "How does Wilson's ethos differ from that of Oliver Wendell Holmes as described in the chapter comparison?", "options": [{"text": "Wilson relies on the authority of a peacemaker who has exhausted all alternatives, whereas Holmes speaks as a veteran who found nobility in suffering.", "isCorrect": true, "rationale": "Wilson's credibility comes from his three-year effort to avoid war, while Holmes’s authority is rooted in his personal experience on the battlefield."}, {"text": "Wilson uses his military background to command respect, while Holmes uses legalistic arguments.", "isCorrect": false, "rationale": "The text states Wilson's ethos is not that of a warrior, and Holmes is characterized by his veteran status."}, {"text": "Wilson projects an image of disillusionment, while Holmes projects an image of unwavering optimism.", "isCorrect": false, "rationale": "Disillusionment is the authority attributed to Smedley Butler, not Wilson."}, {"text": "Wilson's authority is based on his role as a commander-in-chief, while Holmes's is based on academic achievement.", "isCorrect": false, "rationale": "The comparison is between the 'reluctant warrior' (Wilson) and the 'suffering veteran' (Holmes)."}], "id": "q05"}, {"question": "In the structural analysis of Wilson's logos, what is identified as the most vulnerable 'link' in his argument?", "options": [{"text": "The leap from a specific dispute over shipping rights to a universal struggle for democracy.", "isCorrect": true, "rationale": "The transition from Step 2 (hostile acts) to Step 3 (fundamental struggle of democracy vs. autocracy) is cited as the point where the argument becomes potentially manipulative."}, {"text": "The assertion that Germany had committed hostile acts against the United States.", "isCorrect": false, "rationale": "The text lists Germany's acts, such as the Zimmermann Telegram, as established steps in the logical chain."}, {"text": "The claim that the United States is a nation composed of a 'great peaceful people'.", "isCorrect": false, "rationale": "While this is part of his ethos, the logical critique focuses on the connection between shipping rights and global ideology."}, {"text": "The conclusion that the United States must enter the war to ensure its own safety.", "isCorrect": false, "rationale": "The conclusion follows logically if the previous steps are accepted; the 'weakness' lies in the ideological leap in the middle."}], "id": "q06"}, {"question": "What is the intended rhetorical effect of the rhythmic repetition of the word 'for' in the passage beginning 'for democracy, for the right...'?", "options": [{"text": "It creates a drumbeat of purpose that builds momentum toward the climactic goal of global freedom.", "isCorrect": true, "rationale": "The repetition adds layers to the cause, making the conclusion that the world must be 'at last free' feel inevitable and powerful."}, {"text": "It is used to distract the audience from the lack of a clear military strategy.", "isCorrect": false, "rationale": "While Wilson omits military details, the text interprets the repetition as a tool for building momentum and purpose, not distraction."}, {"text": "It serves to provide a detailed list of the specific legislative goals for the postwar era.", "isCorrect": false, "rationale": "The phrases refer to broad moral principles like 'democracy' and 'rights of small nations' rather than specific legislation."}, {"text": "It aims to evoke pity for the victims of the Central Powers in Europe.", "isCorrect": false, "rationale": "The text notes Wilson does not focus on pity for victims, but rather uses these phrases to build the cause's momentum."}], "id": "q07"}, {"question": "Wilson's use of pathos is described as 'controlled and architectural.' What does this suggest about his emotional appeal?", "options": [{"text": "Emotions are integrated into the structural movement of the argument rather than presented as vivid, standalone imagery.", "isCorrect": true, "rationale": "Wilson avoids the 'vivid pictures' used by Holmes or Butler, instead letting the weight of the moral decision generate the emotional response."}, {"text": "He uses highly technical language to suppress any emotional response from the audience.", "isCorrect": false, "rationale": "The text states he does use pathos, particularly in the 'fearful thing' passage, but in a restrained and structured way."}, {"text": "He relies on the frequent use of angry, demagogic outbursts to stir the passion of Congress.", "isCorrect": false, "rationale": "The text explicitly states that a statesman in this position 'cannot afford to sound like a demagogue'."}, {"text": "The emotion is purely fictional and was added by later historians to improve the speech's legacy.", "isCorrect": false, "rationale": "The text analyzes Wilson's actual rhetorical choices in the 1917 address, not the interventions of historians."}], "id": "q08"}, {"question": "According to the text, what is the primary rhetorical goal of Wilson positioning himself as a 'Reluctant Warrior'?", "options": [{"text": "To suggest that he is being driven to fight by forces beyond his control, thereby appearing more credible to a peaceful public.", "isCorrect": true, "rationale": "By acknowledging war as 'fearful' and 'disastrous,' he aligns himself with the people's desire for peace while justifying the move to war."}, {"text": "To mask his secret desire for military glory and colonial expansion.", "isCorrect": false, "rationale": "While critics might suggest this, the rhetorical analysis focuses on how he builds credibility with a peace-loving audience."}, {"text": "To persuade Germany that the United States is not prepared for a long conflict.", "isCorrect": false, "rationale": "The text notes he must avoid sounding reluctant to Germany, as that would encourage them; his reluctance is a moral stance for his domestic audience."}, {"text": "To deflect responsibility for the war onto the Allied powers.", "isCorrect": false, "rationale": "Wilson takes responsibility for 'leading this great peaceful people into war' but frames it as a moral necessity."}], "id": "q09"}, {"question": "The 'Fearful Thing' passage escalates the scope of the conflict. Which of the following best describes that escalation?", "options": [{"text": "It moves from the specific concerns of 'this great peaceful people' to the universal 'safety to all nations.'", "isCorrect": true, "rationale": "Wilson starts with the American context and expands outward until the cause of human freedom itself is at stake."}, {"text": "It moves from the financial cost of war to the spiritual cost of defeat.", "isCorrect": false, "rationale": "The text explicitly states that Wilson omits the economic and financial dimensions of the war."}, {"text": "It moves from the immediate threat of German submarines to the historical legacy of the American Revolution.", "isCorrect": false, "rationale": "The text describes an expansion from the national level to a global, universal dominion of right."}, {"text": "It moves from the rights of major world powers to the rights of individual American citizens.", "isCorrect": false, "rationale": "The escalation described in the text actually moves outward toward 'small nations' and a 'concert of free peoples'."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
