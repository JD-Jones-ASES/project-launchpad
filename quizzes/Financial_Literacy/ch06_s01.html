    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 6, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best defines 'earned income' according to the textbook section?", "options": [{"text": "Money received from owning assets that generate income without active effort.", "isCorrect": false, "rationale": "This describes unearned income, which comes from assets rather than active work."}, {"text": "Compensation received for performing work or services, requiring active effort.", "isCorrect": true, "rationale": "The text defines earned income as 'compensation received for performing work or services' and states, 'It requires your active effort.'"}, {"text": "Payments made by a bank for keeping money in a savings account.", "isCorrect": false, "rationale": "This is interest income, which is explicitly listed as an example of unearned income."}, {"text": "Profit from selling an asset, like a stock or property, for more than you paid.", "isCorrect": false, "rationale": "This is a capital gain, which the text identifies as a type of unearned income."}]}, {"question": "Maya works as a freelance graphic designer, creating logos for small businesses. The money she receives from her clients is considered which type of income?", "options": [{"text": "Interest income", "isCorrect": false, "rationale": "Interest income is money paid by a bank for keeping money in an account, not for services performed."}, {"text": "Self-employment income", "isCorrect": true, "rationale": "The text lists 'self-employment income: profit from your own business, freelance work, or gig work' as a common example of earned income, which Maya's work exemplifies."}, {"text": "Dividend income", "isCorrect": false, "rationale": "Dividend income is payments from a company's profits to stockholders, not from providing freelance services."}, {"text": "Rental income", "isCorrect": false, "rationale": "Rental income is money received from tenants for using property, not from freelance design work."}]}, {"question": "Which of these scenarios describes a source of *unearned* income?", "options": [{"text": "Receiving a bi-weekly paycheck for working at a local grocery store.", "isCorrect": false, "rationale": "This is wages, a form of earned income, as it requires active work."}, {"text": "Getting tips from customers after delivering pizzas.", "isCorrect": false, "rationale": "Tips are specifically mentioned as a common example of earned income."}, {"text": "Earning money from a percentage of sales as a car salesperson.", "isCorrect": false, "rationale": "This describes commissions, which are categorized as earned income."}, {"text": "Collecting quarterly payments from a company whose stock you own.", "isCorrect": true, "rationale": "The text defines dividends as 'payments made to stockholders from a company's profits' and includes them as an example of unearned income because it comes from an asset (stock) rather than active labor."}]}, {"question": "According to the text, what is one significant reason the distinction between earned and unearned income matters for tax purposes?", "options": [{"text": "All unearned income is completely tax-exempt, unlike earned income.", "isCorrect": false, "rationale": "The text states that 'Even small amounts of interest income are technically taxable' and that certain unearned incomes receive 'special, often lower, tax treatment,' not full exemption."}, {"text": "Certain types of unearned income, like long-term capital gains, may be taxed at lower rates than ordinary earned income.", "isCorrect": true, "rationale": "The text explicitly states, 'Long-term capital gains... and qualified dividends are taxed at 0%, 15%, or 20%—potentially far lower than ordinary income rates,' which apply to most earned income."}, {"text": "Earned income is always taxed at a flat rate, while unearned income uses progressive tax brackets.", "isCorrect": false, "rationale": "This statement reverses the information in the text. Most earned income is taxed at 'ordinary income tax rates (the brackets),' while some unearned income gets special, potentially lower, *flat* rates (0%, 15%, 20%)."}, {"text": "Unearned income makes a person eligible for the Earned Income Tax Credit (EITC), but earned income does not.", "isCorrect": false, "rationale": "The text clearly states that the EITC 'requires earned income' and 'does not apply to interest, dividends, or other unearned income.'"}]}, {"question": "A single parent is trying to maximize their eligibility for government benefits. Based on the text, which type of income would directly contribute to their eligibility for the Earned Income Tax Credit (EITC)?", "options": [{"text": "Interest earned from a savings account.", "isCorrect": false, "rationale": "Interest is unearned income, and the text states the EITC 'does not apply to interest... or other unearned income.'"}, {"text": "Dividends received from stock investments.", "isCorrect": false, "rationale": "Dividends are unearned income, and the text states the EITC 'does not apply to... dividends, or other unearned income.'"}, {"text": "Wages from a part-time job.", "isCorrect": true, "rationale": "The text explicitly states, 'The Earned Income Tax Credit (EITC), a government benefit for lower-income workers, requires earned income,' and wages are a common example of earned income."}, {"text": "Capital gains from selling an antique collection.", "isCorrect": false, "rationale": "Capital gains are unearned income, and the text states the EITC 'does not apply to... unearned income.'"}]}, {"question": "Sarah deposited $500 into a savings account, and over a year, she earned $15 in interest. How would this $15 typically be categorized for tax purposes?", "options": [{"text": "It is a gift and therefore not taxable income.", "isCorrect": false, "rationale": "A gift is money given by another person, not interest earned from a bank. Interest income is generally taxable."}, {"text": "It is earned income because her money 'worked' for her.", "isCorrect": false, "rationale": "While the text uses the phrase 'your money worked for you,' it clearly states that the $40 interest in the example is 'unearned income,' distinguishing it from income earned through active labor."}, {"text": "It is unearned income, and the bank will report it on Form 1099-INT.", "isCorrect": true, "rationale": "The text's 'Unearned Income in Action' example clearly labels interest earned from a savings account as 'unearned income' and mentions the bank will send a 'Form 1099-INT showing this $40,' which applies to Sarah's $15."}, {"text": "It is an inheritance and not considered taxable income.", "isCorrect": false, "rationale": "An inheritance is property or money received upon someone's death, not interest from a bank account. Inheritances are typically not income to the recipient, but interest certainly is."}]}, {"question": "Emily sold shares of a company stock she had owned for three years, making a profit of $500. This profit would likely be subject to which tax treatment?", "options": [{"text": "It would be taxed at her ordinary income tax rate, just like wages.", "isCorrect": false, "rationale": "Because the stock was held for more than one year, the profit is a 'long-term capital gain,' which the text states is taxed at special, potentially lower rates, not ordinary income rates."}, {"text": "It would be entirely tax-exempt because it's an investment.", "isCorrect": false, "rationale": "The text notes that capital gains are taxable, albeit at preferential rates, not exempt."}, {"text": "It would be taxed at special, potentially lower, long-term capital gains rates.", "isCorrect": true, "rationale": "The 'Why the Distinction Matters' and 'Did You Know' sections explain that 'Long-term capital gains (profit from selling assets held more than one year)' are 'taxed at special rates: 0%, 15%, or 20%,' which are 'potentially far lower than ordinary income rates.'"}, {"text": "It would be considered a gift and not subject to income tax.", "isCorrect": false, "rationale": "The profit from selling stock is a capital gain, not a gift. Gifts are generally not income to the recipient, but capital gains are."}]}, {"question": "John received a $10,000 cash gift from his grandmother for his graduation. A year later, he inherited a small apartment building from an aunt, which now generates $800 in rental income each month. How are these typically treated for John's income taxes?", "options": [{"text": "Both the cash gift and the inheritance are considered taxable income to John.", "isCorrect": false, "rationale": "The text states that 'gifts and inheritances are not income to the recipient for federal tax purposes.'"}, {"text": "The cash gift is taxable, but the rental income from the inherited property is not.", "isCorrect": false, "rationale": "The gift is not taxable to John, but the rental income generated by the inherited property *is* taxable income."}, {"text": "Neither the cash gift nor the inheritance are taxable to John, but the $800 monthly rental income is considered his taxable income.", "isCorrect": true, "rationale": "The text clarifies that 'gifts and inheritances are not income to the recipient,' but 'any income the inherited assets generate after you receive them (interest, dividends)' becomes taxable income. Rental income is specifically listed as unearned income."}, {"text": "Only the $800 monthly rental income is taxable to John, while the initial inheritance value is also taxable.", "isCorrect": false, "rationale": "The initial inheritance value is not taxable to John; only the income it generates afterward is."}]}, {"question": "An individual works full-time as a software engineer, earning a salary. They also occasionally sell antique coins they've collected for years, sometimes at a profit. Additionally, they own a small apartment building and collect rent. Which of the following statements accurately classifies these income sources?", "options": [{"text": "The salary is unearned income, while the coin profits and rental income are earned.", "isCorrect": false, "rationale": "Salary is a primary example of earned income, and both coin profits (capital gains) and rental income are explicitly listed as unearned income."}, {"text": "The salary is earned income, and both the coin profits (capital gains) and rental income are unearned income.", "isCorrect": true, "rationale": "Salary is earned income. Profits from selling assets like coins are capital gains (unearned income), and rental income from property is also unearned income, as per the text's definitions and examples."}, {"text": "The salary and rental income are earned income, but the coin profits are unearned.", "isCorrect": false, "rationale": "Rental income is a clear example of unearned income, not earned income."}, {"text": "All three sources—salary, coin profits, and rental income—are considered earned income because they all involve effort.", "isCorrect": false, "rationale": "Only the salary is earned income. Coin profits (capital gains) and rental income are derived from assets and do not require ongoing active effort from the recipient, classifying them as unearned income."}]}, {"question": "Why is it important for individuals to keep careful records of all their income sources, including interest from savings accounts and profits from selling assets?", "options": [{"text": "Because the IRS only tracks earned income, not unearned income.", "isCorrect": false, "rationale": "The 'moneytip' states, 'Banks and brokerages are required to report interest and dividends to the IRS, so they already know' about unearned income sources."}, {"text": "To ensure their tax return accurately matches what financial institutions report to the IRS.", "isCorrect": true, "rationale": "The 'moneytip' advises, 'Make sure your return matches what they report,' referring to banks and brokerages reporting interest and dividends to the IRS."}, {"text": "To prove that all their income is tax-exempt and avoid paying any taxes.", "isCorrect": false, "rationale": "The text clarifies that 'most earned income is taxed' and 'Even small amounts of interest income are technically taxable,' so the goal isn't to prove tax exemption."}, {"text": "Only earned income needs to be reported to the IRS, so other records are for personal budgeting.", "isCorrect": false, "rationale": "The 'moneytip' explicitly states, 'Keep records of all your income sources—not just your job,' and that 'If you earn interest on savings... or sell something for a profit, those amounts may be taxable.'"}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
