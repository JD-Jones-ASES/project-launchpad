<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 6, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following would NOT be included in an individual's gross income according to the general principles outlined in the text?", "options": [{"text": "Rental income from a property owned by the individual", "isCorrect": false, "rationale": "Rental income is explicitly listed as a component of gross income in the text."}, {"text": "Money received as a gift from a grandparent", "isCorrect": true, "rationale": "The text states that 'Some items are excluded by law—gifts and inheritances, for example—but assume all income counts unless you know a specific exclusion applies.'"}, {"text": "Dividends from stock investments", "isCorrect": false, "rationale": "Dividends are explicitly listed as a component of gross income in the text."}, {"text": "Wages earned from a part-time job", "isCorrect": false, "rationale": "Wages are explicitly listed as a component of gross income in the text."}]}, {"question": "Which of the following is considered an 'above-the-line' adjustment that directly reduces gross income to arrive at Adjusted Gross Income (AGI)?", "options": [{"text": "Charitable contributions documented by receipts", "isCorrect": false, "rationale": "Charitable contributions are typically itemized deductions, not above-the-line adjustments. They are subtracted from AGI, not gross income."}, {"text": "Property taxes paid on a primary residence", "isCorrect": false, "rationale": "Property taxes are generally an itemized deduction, subtracted from AGI, not an above-the-line adjustment."}, {"text": "Student loan interest paid within the IRS limits", "isCorrect": true, "rationale": "The text specifically lists 'Student loan interest paid' as a common above-the-line adjustment."}, {"text": "Unreimbursed medical expenses exceeding a certain percentage of AGI", "isCorrect": false, "rationale": "Unreimbursed medical expenses are typically itemized deductions, subtracted from AGI, not an above-the-line adjustment."}]}, {"question": "Sarah earned $65,000 in wages and paid $1,500 in student loan interest. Assuming no other income or adjustments, what is Sarah's Adjusted Gross Income (AGI)?", "options": [{"text": "$65,000", "isCorrect": false, "rationale": "This would be her gross income, but AGI is calculated after subtracting adjustments."}, {"text": "$66,500", "isCorrect": false, "rationale": "This calculation incorrectly adds the adjustment to gross income instead of subtracting it."}, {"text": "$63,500", "isCorrect": true, "rationale": "AGI is calculated as Gross Income ($65,000) minus Adjustments ($1,500), which equals $63,500."}, {"text": "Cannot be determined without knowing her filing status", "isCorrect": false, "rationale": "Filing status affects the standard deduction, but not the calculation of AGI from gross income and adjustments."}]}, {"question": "Why is Adjusted Gross Income (AGI) considered a 'key figure' in calculating a taxpayer's final tax bill?", "options": [{"text": "It directly determines the marginal tax rate applied to all income.", "isCorrect": false, "rationale": "AGI does not directly determine the marginal tax rate; that is determined by taxable income. However, AGI can influence the amount of taxable income."}, {"text": "It is the amount immediately subject to federal income tax before any deductions.", "isCorrect": false, "rationale": "AGI is not immediately subject to tax; deductions (standard or itemized) are subtracted from AGI to arrive at taxable income."}, {"text": "It serves as a benchmark for eligibility for various other deductions, credits, and benefits.", "isCorrect": true, "rationale": "The text explicitly states, 'It is a key figure used to determine eligibility for various deductions, credits, and benefits.'"}, {"text": "It represents the total amount of money a person earned from all sources before any subtractions.", "isCorrect": false, "rationale": "This describes gross income, not AGI. AGI is gross income minus adjustments."}]}, {"question": "What is the primary advantage of taking the standard deduction for most taxpayers, especially young adults, as highlighted in the text?", "options": [{"text": "It always results in a lower tax bill than itemizing deductions.", "isCorrect": false, "rationale": "While often true, it's not 'always' lower. Itemizing can be better if qualifying expenses exceed the standard deduction."}, {"text": "It allows for the deduction of specific, documented expenses like mortgage interest.", "isCorrect": false, "rationale": "This describes itemized deductions, not the standard deduction. The standard deduction is a fixed amount that does not require documentation of specific expenses."}, {"text": "It simplifies tax preparation by not requiring documentation or tracking of specific expenses.", "isCorrect": true, "rationale": "The text emphasizes that 'Most people take it, because it is simpler than itemizing deductions. You do not need to keep receipts, track charitable donations...'"}, {"text": "It eliminates the need to calculate Adjusted Gross Income.", "isCorrect": false, "rationale": "AGI must always be calculated first, as the standard deduction (or itemized deductions) is subtracted from AGI."}]}, {"question": "Under which circumstance would a taxpayer most likely choose to itemize deductions instead of taking the standard deduction?", "options": [{"text": "Their total qualified itemized expenses are less than the standard deduction amount.", "isCorrect": false, "rationale": "In this scenario, the standard deduction would result in a larger reduction to taxable income, making it the better choice."}, {"text": "They have no 'above-the-line' adjustments to their gross income.", "isCorrect": false, "rationale": "The presence or absence of 'above-the-line' adjustments does not determine whether itemizing is beneficial; that depends on the total amount of itemizable expenses."}, {"text": "Their qualifying expenses, such as significant mortgage interest and charitable contributions, exceed the standard deduction amount.", "isCorrect": true, "rationale": "The text states, 'Itemizing only makes sense if your qualifying expenses (mortgage interest, state taxes, large charitable donations, large unreimbursed medical costs) exceed the standard deduction.'"}, {"text": "They want to avoid keeping records of their expenses for tax purposes.", "isCorrect": false, "rationale": "Itemizing requires extensive record-keeping, which is contrary to this desire."}]}, {"question": "A single filer has an Adjusted Gross Income (AGI) of $50,000. If they take the 2024 standard deduction for a single filer ($14,600), what is their taxable income?", "options": [{"text": "$50,000", "isCorrect": false, "rationale": "This would be their AGI, but taxable income is calculated after subtracting deductions from AGI."}, {"text": "$35,400", "isCorrect": true, "rationale": "Taxable Income = AGI - Deductions. So, $50,000 - $14,600 = $35,400."}, {"text": "$64,600", "isCorrect": false, "rationale": "This calculation incorrectly adds the standard deduction to AGI instead of subtracting it."}, {"text": "$40,000", "isCorrect": false, "rationale": "This amount is arbitrary and does not reflect the correct calculation using the provided figures."}]}, {"question": "In the provided example, the person with $42,000 gross income had an effective tax rate of 7.3%, significantly lower than their marginal rate of 12%. What are the two primary factors contributing to this lower effective rate?", "options": [{"text": "The taxpayer claimed numerous tax credits, and their income was too low to owe significant federal tax.", "isCorrect": false, "rationale": "The example states 'No other income. No adjustments.' and does not mention tax credits. While income level is a factor, it's not the full explanation given in the text."}, {"text": "The standard deduction reduced taxable income, and the progressive nature of the tax brackets meant lower portions of income were taxed at lower rates.", "isCorrect": true, "rationale": "The text explicitly states these two factors: 'The standard deduction reduced taxable income... The staircase structure means the first $11,600 was taxed at only 10%, even though the marginal rate is 12%.'"}, {"text": "Their gross income was below the threshold for federal income taxes, and state taxes were not included in the calculation.", "isCorrect": false, "rationale": "Their income was not below the tax threshold (they owed $3,056), and the discussion is specifically about federal income tax."}, {"text": "They received a large refund, and their employer over-withheld taxes throughout the year.", "isCorrect": false, "rationale": "The question asks about the calculation of the tax bill itself, not about withholding or refunds, which are separate issues."}]}, {"question": "An individual has a gross income of $50,000. If they make a qualified $2,000 contribution to a traditional IRA (an adjustment), how does this impact their taxable income compared to if they had made no adjustments (assuming they take the standard deduction and no other changes)?", "options": [{"text": "It increases their taxable income by $2,000.", "isCorrect": false, "rationale": "Adjustments reduce gross income to AGI, and a lower AGI (assuming same deductions) leads to lower taxable income, not higher."}, {"text": "It reduces their taxable income by $2,000.", "isCorrect": true, "rationale": "Adjustments are subtracted from gross income to calculate AGI. A $2,000 adjustment reduces AGI by $2,000. Since taxable income is AGI minus deductions, a $2,000 lower AGI results in a $2,000 lower taxable income."}, {"text": "It has no effect on their taxable income, only their AGI.", "isCorrect": false, "rationale": "A change in AGI directly impacts taxable income, as deductions are subtracted from AGI."}, {"text": "It only affects their effective tax rate, not their taxable income directly.", "isCorrect": false, "rationale": "While it affects the effective tax rate, it does so by directly reducing taxable income, which is the underlying cause."}]}, {"question": "Following the 'Path from Gross Income to Tax Bill,' which step directly precedes the application of tax brackets to calculate the total tax owed?", "options": [{"text": "Calculating the Adjusted Gross Income (AGI).", "isCorrect": false, "rationale": "Calculating AGI occurs earlier in the process; taxable income is calculated after AGI and before applying tax brackets."}, {"text": "Determining the total amount of gross income from all sources.", "isCorrect": false, "rationale": "Gross income is the very first step in the process, well before applying tax brackets."}, {"text": "Subtracting the standard deduction (or itemized deductions) from AGI to find Taxable Income.", "isCorrect": true, "rationale": "The roadmap in the text and the worked example show that after calculating AGI, deductions are subtracted to arrive at 'Taxable Income,' which is then used with the tax brackets."}, {"text": "Identifying eligible 'above-the-line' adjustments.", "isCorrect": false, "rationale": "Adjustments are subtracted from gross income to get AGI, which is an earlier step than applying tax brackets."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
