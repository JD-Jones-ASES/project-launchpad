    };

</head>
<body>
<div class="quiz-container">

        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 23, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following statements accurately describes the fundamental difference in how a will and a beneficiary designation function regarding asset distribution?", "options": [{"text": "A will always takes precedence over a beneficiary designation if there is a conflict.", "isCorrect": false, "rationale": "The text explicitly states, 'Beneficiary designations override a will.' This option is incorrect because the will does not control accounts with beneficiary designations."}, {"text": "Beneficiary designations govern specific financial accounts and policies directly, while a will covers assets without such designations and goes through probate.", "isCorrect": true, "rationale": "The text explains that beneficiary designations are 'established directly on the account or policy form' for specific accounts, and that 'a will governs assets that do not have a named beneficiary' and 'goes through probate.'"}, {"text": "A will is primarily for naming guardians, whereas beneficiary designations are solely for distributing personal property.", "isCorrect": false, "rationale": "While a will can name guardians, its primary function is to specify how assets are distributed. Beneficiary designations apply to financial accounts and policies, not typically personal property."}, {"text": "Both wills and beneficiary designations always avoid the probate process for all assets.", "isCorrect": false, "rationale": "The text clearly states that a will 'must be submitted to and validated by a probate court.' Only assets with valid beneficiary designations bypass probate."}], "id": "q01"}, {"question": "Sarah's will states that her 401(k) should go to her brother, John. However, her 401(k) beneficiary designation form names her ex-spouse, David. Upon Sarah's death, who will legally receive the funds from her 401(k)?", "options": [{"text": "John, because the will is the most recent legal document.", "isCorrect": false, "rationale": "The recency of the will does not override a beneficiary designation. The text emphasizes that beneficiary designations override a will, regardless of when the will was created."}, {"text": "David, because beneficiary designations supersede the instructions in a will.", "isCorrect": true, "rationale": "The text explicitly states: 'Beneficiary designations override a will. If your will says 'I leave my 401(k) to my brother,' but your 401(k) form names your ex-spouse as beneficiary, the ex-spouse receives the money.'"}, {"text": "The 401(k) funds will go through probate to determine the rightful heir due to the conflict.", "isCorrect": false, "rationale": "A conflict between a will and a beneficiary designation is resolved by the beneficiary designation taking precedence, not by requiring probate for that specific asset. Probate would only occur if there were no valid designation."}, {"text": "The funds will be split equally between John and David.", "isCorrect": false, "rationale": "There is no provision in estate law for splitting assets equally in such a conflict; one document takes clear precedence. In this case, the beneficiary designation dictates the distribution."}], "id": "q02"}, {"question": "Which of the following is NOT a typical characteristic or function of a Last Will and Testament?", "options": [{"text": "It names an executor responsible for administering the estate.", "isCorrect": false, "rationale": "The text clearly states a will 'names an executor—the person responsible for carrying out your wishes.' This is a typical function."}, {"text": "It designates guardians for minor children.", "isCorrect": false, "rationale": "The text notes that a will 'can designate guardians for minor children.' This is a typical function."}, {"text": "It governs the distribution of assets for which a beneficiary designation already exists, such as a life insurance policy.", "isCorrect": true, "rationale": "The text states: 'A will governs assets that do not have a named beneficiary... The will does not control accounts with beneficiary designations.' Therefore, this statement is NOT a typical function of a will."}, {"text": "It specifies how assets without named beneficiaries should be distributed after death.", "isCorrect": false, "rationale": "The text specifies that a will 'governs assets that do not have a named beneficiary (such as personal property, vehicles, furniture, or a sole bank account with no beneficiary).' This is a typical function."}], "id": "q03"}, {"question": "An executor's responsibilities typically include all of the following EXCEPT:", "options": [{"text": "Gathering the deceased's assets.", "isCorrect": false, "rationale": "The definition of an executor explicitly includes 'gathering assets.' This is a responsibility."}, {"text": "Paying the deceased's outstanding debts.", "isCorrect": false, "rationale": "The definition of an executor explicitly includes 'paying debts.' This is a responsibility."}, {"text": "Determining state laws for intestate succession if no will is found.", "isCorrect": true, "rationale": "An executor is named in a will. If there is no will, there is no executor, and state laws for intestate succession automatically apply. The executor's role is to follow the will's instructions, not to determine intestate laws."}, {"text": "Filing the final tax return for the deceased.", "isCorrect": false, "rationale": "The definition of an executor explicitly includes 'filing the final tax return.' This is a responsibility."}], "id": "q04"}, {"question": "Why is it crucial to name a contingent beneficiary in addition to a primary beneficiary for accounts like a 401(k) or life insurance policy?", "options": [{"text": "Naming a contingent beneficiary makes the account immune to being contested by family members.", "isCorrect": false, "rationale": "While beneficiary designations generally bypass probate, they can still potentially be challenged under specific circumstances, though it's less common than contesting a will. The primary reason for a contingent beneficiary is not to prevent contestation."}, {"text": "It ensures the account proceeds are immediately distributed to the contingent beneficiary if the primary beneficiary dies before you, avoiding probate.", "isCorrect": true, "rationale": "The text states: 'If your primary beneficiary dies and you named no contingent, the account reverts to your estate and goes through probate.' Naming a contingent ensures the funds go directly to the backup beneficiary, bypassing probate if the primary dies first."}, {"text": "A contingent beneficiary designation automatically updates other financial accounts to match.", "isCorrect": false, "rationale": "Beneficiary designations are account-specific. Naming a contingent beneficiary on one account does not affect other accounts."}, {"text": "The contingent beneficiary becomes the primary beneficiary as soon as the account owner passes away, regardless of the primary's status.", "isCorrect": false, "rationale": "The contingent beneficiary only receives the account 'if all primary beneficiaries have died before you.' They do not automatically become primary upon the owner's death."}], "id": "q05"}, {"question": "Marcus dies without a will. He is survived by his wife, his children, and his unmarried long-term partner. According to the section on intestate succession, who is most likely to inherit his assets that do not have beneficiary designations?", "options": [{"text": "His unmarried long-term partner, as she was a significant part of his life.", "isCorrect": false, "rationale": "The text explicitly states: 'a longtime partner you are not married to would typically receive nothing under intestate rules.' Intestate succession follows legal relationships, not emotional ones."}, {"text": "His children, as they are direct descendants and supersede other relationships.", "isCorrect": false, "rationale": "While children are typically next in line after a spouse, state laws generally prioritize the spouse first, then children. The text says 'typically spouse first, then children.'"}, {"text": "His wife, as state laws usually prioritize a legal spouse in intestate succession.", "isCorrect": true, "rationale": "The text states that in intestate succession, state laws follow a priority order 'typically spouse first, then children, then parents, then siblings.' Therefore, his wife would be the primary inheritor."}, {"text": "His assets will be distributed based on a court's assessment of his presumed wishes.", "isCorrect": false, "rationale": "Without a will, assets are distributed strictly according to state law (intestate succession), not according to a court's presumed wishes. That is precisely why having a will is important to ensure wishes are met."}], "id": "q06"}, {"question": "A key implication of a will going through the probate process is that:", "options": [{"text": "The distribution of assets is expedited and guaranteed to be private.", "isCorrect": false, "rationale": "The text states probate 'can take months' and 'This process is public,' directly contradicting this option."}, {"text": "Assets are protected from any potential legal challenges by family members.", "isCorrect": false, "rationale": "The text specifically notes that a will 'Can be contested' by family members in court, indicating probate does not prevent challenges."}, {"text": "The process ensures assets with beneficiary designations are validated by the court before distribution.", "isCorrect": false, "rationale": "The text clarifies that a will 'Covers assets without beneficiary designations' and that beneficiary designations override a will, meaning assets with designations typically bypass probate entirely."}, {"text": "The process is public, can be time-consuming, and may involve legal fees.", "isCorrect": true, "rationale": "The text explicitly lists these as key features of a will, stating 'This process is public, can take months, and may involve legal fees.'"}], "id": "q07"}, {"question": "After getting married, Maria neglected to update the beneficiary on her life insurance policy, which still lists her former college roommate. If Maria were to pass away, what would be the likely outcome for the life insurance proceeds?", "options": [{"text": "The proceeds would go to her new spouse, as marriage automatically revokes prior beneficiary designations.", "isCorrect": false, "rationale": "Beneficiary designations do not automatically update with life events; they must be manually changed. Marriage does not revoke prior designations on its own."}, {"text": "The proceeds would go to her college roommate, as beneficiary designations override a will and require explicit updates.", "isCorrect": true, "rationale": "The 'moneytip' section explicitly warns about this: 'Many people forget to update their 401(k) beneficiary after a divorce, and the ex-spouse ends up receiving the balance...' This principle applies to any outdated designation, including a former roommate."}, {"text": "The proceeds would revert to her estate and be distributed according to her will or intestate laws.", "isCorrect": false, "rationale": "The proceeds would only revert to her estate if there were no living primary or contingent beneficiary. Since a primary (the roommate) is still designated and alive, they would receive the funds, bypassing the will and probate."}, {"text": "A court would review the circumstances and award the proceeds to the person they believe Maria would have intended.", "isCorrect": false, "rationale": "Courts strictly adhere to legal designations. If a valid beneficiary is named, they receive the funds, regardless of presumed intent or outdated wishes."}], "id": "q08"}, {"question": "For a young adult with minimal assets but with minor children, what is typically the most significant purpose of creating a simple will?", "options": [{"text": "To ensure all their financial accounts with beneficiary designations are properly managed.", "isCorrect": false, "rationale": "Beneficiary designations on financial accounts operate outside of a will. While important, the will does not manage these directly."}, {"text": "To avoid probate entirely for all their personal property and assets.", "isCorrect": false, "rationale": "While a will can specify distribution of personal property, the will itself goes through probate. It doesn't entirely avoid probate for all assets, especially those without beneficiary designations."}, {"text": "To legally designate guardians for their minor children.", "isCorrect": true, "rationale": "The 'warning' section states: 'For most young adults with minimal assets, a simple will primarily serves to name guardians (if they have children) and cover personal property not held in an account.' Naming guardians is the key purpose here."}, {"text": "To establish complex trusts for future inheritances and tax planning.", "isCorrect": false, "rationale": "The text specifies that 'complex situations' (like significant assets or special-needs dependents) might require an attorney for advanced tools like trusts, but this is not the primary purpose of a 'simple will' for 'minimal assets'."}], "id": "q09"}, {"question": "Which scenario best illustrates a situation where consulting an estate planning attorney would be highly recommended, rather than relying on a DIY will template?", "options": [{"text": "A single individual with a modest bank account, a car, and no dependents.", "isCorrect": false, "rationale": "The 'warning' section suggests that 'Online “DIY will” templates exist and can work for simple situations,' which this scenario represents."}, {"text": "A young couple with minimal assets, a life insurance policy, and two minor children for whom they wish to name guardians.", "isCorrect": false, "rationale": "The text states: 'For most young adults with minimal assets, a simple will primarily serves to name guardians (if they have children) and cover personal property not held in an account,' suggesting a DIY option might suffice here."}, {"text": "An individual with significant investment portfolios, ownership in a family business, and children from a previous marriage as well as a current spouse.", "isCorrect": true, "rationale": "The 'warning' section advises consulting an attorney 'If your situation is complex—significant assets, blended family, business ownership, or special-needs dependents.' This scenario includes significant assets, a blended family, and business ownership, making it complex."}, {"text": "Someone who wants to leave all their personal belongings to a single, adult beneficiary.", "isCorrect": false, "rationale": "This is a straightforward request that a simple will template would likely handle adequately. It does not involve the complexities listed in the warning."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
