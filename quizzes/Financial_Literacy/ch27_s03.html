<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 27, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary characteristic that distinguishes revenue from profit?", "options": [{"text": "Revenue only includes money from services, while profit includes goods.", "isCorrect": false, "rationale": "The text states that revenue is from selling 'goods or services,' making this option incorrect."}, {"text": "Revenue is the total money taken in before subtracting any costs, while profit is what remains after all costs are subtracted.", "isCorrect": true, "rationale": "The text defines revenue as 'total money your business takes in... before subtracting any costs' and profit as 'Revenue - Total Costs,' clearly distinguishing the two as before and after cost deduction."}, {"text": "Revenue accounts for fixed costs, but profit accounts for variable costs.", "isCorrect": false, "rationale": "Revenue accounts for no costs. Profit accounts for both fixed and variable costs (Total Costs)."}, {"text": "Profit is also known as gross sales, while revenue is top-line income.", "isCorrect": false, "rationale": "The text states that 'gross sales' and 'top-line income' are alternative names for revenue, not profit."}]}, {"question": "A student starts a side hustle selling custom-designed t-shirts. Which of the following would most accurately be classified as a fixed cost for this business?", "options": [{"text": "The cost of a blank t-shirt for each design sold.", "isCorrect": false, "rationale": "The cost of a blank t-shirt changes directly with the number of units sold, making it a variable cost."}, {"text": "The monthly subscription for graphic design software used for designs.", "isCorrect": true, "rationale": "A monthly subscription fee remains the same regardless of how many t-shirts are designed or sold within that month, fitting the definition of a fixed cost."}, {"text": "The shipping cost for each t-shirt sent to a customer.", "isCorrect": false, "rationale": "Shipping costs are incurred per item shipped, varying with the number of sales, thus making them variable costs."}, {"text": "The ink used for printing each t-shirt design.", "isCorrect": false, "rationale": "Ink is consumed per print, meaning its cost varies with the number of t-shirts produced, making it a variable cost."}]}, {"question": "A small coffee stand has monthly fixed costs of $500. Each cup of coffee costs $1 in ingredients (variable cost) and is sold for $4. If the stand sells 600 cups of coffee in a month, what is their total profit?", "options": [{"text": "$2,400", "isCorrect": false, "rationale": "This amount ($600 cups * $4/cup) represents the total revenue, not the profit."}, {"text": "$1,800", "isCorrect": false, "rationale": "This calculation subtracts only variable costs from revenue ($2400 revenue - $600 variable costs = $1800), omitting fixed costs from the profit calculation."}, {"text": "$1,300", "isCorrect": true, "rationale": "Revenue = 600 units * $4/unit = $2,400. Variable Costs = 600 units * $1/unit = $600. Total Costs = Fixed Costs + Variable Costs = $500 + $600 = $1,100. Profit = Revenue - Total Costs = $2,400 - $1,100 = $1,300."}, {"text": "$1,900", "isCorrect": false, "rationale": "This answer results from incorrect calculation of either total costs or profit."}]}, {"question": "The break-even point in business is significant because it represents the moment when a business:", "options": [{"text": "Begins to earn its first revenue.", "isCorrect": false, "rationale": "Revenue begins with the very first sale. The break-even point is when total revenue equals total costs."}, {"text": "Has enough money to cover its variable costs, but not yet fixed costs.", "isCorrect": false, "rationale": "The break-even point implies that *all* costs (both fixed and variable) have been covered by revenue."}, {"text": "Is no longer losing money, but has not yet made a profit.", "isCorrect": true, "rationale": "As stated in the text, the break-even point is 'where you are no longer losing money, but you have not yet made a profit,' meaning revenue exactly equals total costs."}, {"text": "Has maximized its contribution margin for all units sold.", "isCorrect": false, "rationale": "Contribution margin is a per-unit value and does not get 'maximized' at the break-even point. It remains constant per unit."}]}, {"question": "Sarah bakes and sells specialty cakes. Each cake sells for $50. The ingredients for one cake cost $20, and the special packaging for one cake costs $5. What is the contribution margin per cake?", "options": [{"text": "$50", "isCorrect": false, "rationale": "This is the selling price per unit, not the contribution margin."}, {"text": "$20", "isCorrect": false, "rationale": "This only represents the ingredient cost, which is part of the variable cost, not the full contribution margin."}, {"text": "$25", "isCorrect": true, "rationale": "Contribution Margin = Price per Unit - Variable Cost per Unit. Here, Variable Cost per Unit = $20 (ingredients) + $5 (packaging) = $25. So, Contribution Margin = $50 - $25 = $25."}, {"text": "$30", "isCorrect": false, "rationale": "This results from an incorrect calculation of total variable costs or the contribution margin."}]}, {"question": "A local artist sells handcrafted jewelry. Her monthly fixed costs (studio rent, tools) are $150. Each piece of jewelry sells for $35, and the variable cost (materials, unique beads) per piece is $10. How many pieces of jewelry must she sell each month to break even?", "options": [{"text": "4 pieces", "isCorrect": false, "rationale": "This is an incorrect calculation. (150 / (35-10)) = 6."}, {"text": "5 pieces", "isCorrect": false, "rationale": "This is an incorrect calculation. (150 / (35-10)) = 6."}, {"text": "6 pieces", "isCorrect": true, "rationale": "First, calculate the Contribution Margin = Price per Unit - Variable Cost per Unit = $35 - $10 = $25. Then, Break-Even Units = Fixed Costs / Contribution Margin = $150 / $25 = 6 pieces."}, {"text": "10 pieces", "isCorrect": false, "rationale": "This is an incorrect calculation. (150 / (35-10)) = 6."}]}, {"question": "According to the text, once a business has reached its break-even point, what does the sale of each *additional* unit contribute towards?", "options": [{"text": "Primarily towards covering remaining fixed costs.", "isCorrect": false, "rationale": "At the break-even point, all fixed costs have already been covered. Subsequent sales contribute beyond this."}, {"text": "Covering the variable costs of that specific unit only.", "isCorrect": false, "rationale": "The unit's price covers its variable costs, but the concept of contribution margin highlights that any excess contributes beyond just variable costs."}, {"text": "Pure profit, equivalent to the unit's contribution margin.", "isCorrect": true, "rationale": "The text explicitly states: 'After break-even: every additional unit sold is pure profit (the contribution margin per unit, since fixed costs are already covered).'"}, {"text": "Decreasing the overall price per unit for future sales.", "isCorrect": false, "rationale": "The unit price is typically set and does not decrease automatically after break-even. This is not mentioned in the text."}]}, {"question": "A startup business with very high initial equipment purchases (high fixed costs) compared to a side hustle with minimal setup expenses (low fixed costs) will generally:", "options": [{"text": "Have a higher per-unit variable cost.", "isCorrect": false, "rationale": "Fixed costs and variable costs are distinct. High fixed costs do not directly imply higher variable costs per unit."}, {"text": "Reach its break-even point more quickly.", "isCorrect": false, "rationale": "The text states the opposite: 'Businesses with low fixed costs reach break-even quickly.'"}, {"text": "Require a higher sales volume to reach its break-even point.", "isCorrect": true, "rationale": "The text explains: 'Businesses with high fixed costs need high sales volume to reach break-even,' because more contribution margin is needed to cover the larger initial fixed expenses."}, {"text": "Generate profit on every unit sold from the very first sale.", "isCorrect": false, "rationale": "No business generates pure profit from the first sale unless fixed costs are zero and variable costs are lower than price, and even then, usually fixed costs need to be covered first."}]}, {"question": "Referring to Emma's baked goods business from the example, if she wants to make a profit of $80 per month, how many dozen cookies must she sell? (Recall: Fixed costs = $40, Price per dozen = $15, Variable cost per dozen = $7).", "options": [{"text": "5 dozen", "isCorrect": false, "rationale": "5 dozen is the break-even point where profit is $0, not $80."}, {"text": "10 dozen", "isCorrect": false, "rationale": "At 10 dozen, profit is $40 ($10 dozen * $8 contribution margin - $40 fixed costs), not $80."}, {"text": "15 dozen", "isCorrect": true, "rationale": "First, find the Contribution Margin: $15 - $7 = $8 per dozen. To achieve a profit of $80, she needs to cover her $40 fixed costs AND make an additional $80 in profit. Total contribution needed = $40 (fixed costs) + $80 (target profit) = $120. Number of dozens = $120 / $8 (contribution margin) = 15 dozen."}, {"text": "20 dozen", "isCorrect": false, "rationale": "At 20 dozen, profit would be $120 ($20 dozen * $8 contribution margin - $40 fixed costs), which exceeds the target profit."}]}, {"question": "Which of the following scenarios best demonstrates a clear understanding of the difference between revenue and profit?", "options": [{"text": "A business owner proudly announces $10,000 in sales, claiming that's how much money the business 'made.'", "isCorrect": false, "rationale": "This statement confuses revenue (sales) with profit, as it doesn't account for costs."}, {"text": "A service provider calculates their total billings for the month and then subtracts all operational expenses to determine their take-home pay.", "isCorrect": true, "rationale": "This scenario accurately describes the calculation of profit: starting with total money taken in (revenue/billings) and then subtracting all costs (operational expenses)."}, {"text": "An entrepreneur focuses solely on increasing the number of units sold, believing it automatically guarantees a profitable business.", "isCorrect": false, "rationale": "While increasing sales can lead to profit, focusing *solely* on units sold without considering costs (especially variable costs) might not guarantee profitability if costs are too high."}, {"text": "A shop owner counts the money in the till at the end of the day and considers that their profit for the day.", "isCorrect": false, "rationale": "The money in the till represents daily cash revenue, not profit, as it does not account for the costs associated with the goods sold or the day's operations."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
