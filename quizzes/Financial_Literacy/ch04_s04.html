    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 4, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement best captures the fundamental essence of entrepreneurship as described in the text?", "options": [{"text": "Finding a stable, high-paying job in a large corporation.", "isCorrect": false, "rationale": "This describes traditional employment, not entrepreneurship, which focuses on creating a job or business."}, {"text": "Identifying a problem or need in the market and creating a solution for profit.", "isCorrect": true, "rationale": "The text defines an entrepreneur as someone who 'identifies a need in the market, create a product or service to meet that need, and build an organization around delivering it.'"}, {"text": "Working as a freelancer or independent contractor for multiple clients.", "isCorrect": false, "rationale": "While related to self-employment, freelancing primarily involves offering existing skills to clients, whereas entrepreneurship often involves identifying a new problem/solution and building a sustainable business around it, taking on greater risk and seeking scalable profit."}, {"text": "Investing in the stock market to earn passive income.", "isCorrect": false, "rationale": "Investing is a different financial activity and does not involve starting and operating a business or creating a product/service."}], "id": "q01"}, {"question": "A college student designs a unique t-shirt that uses environmentally friendly dyes and donates a portion of profits to a wildlife charity. They set up an online store to sell these shirts. According to the text, which entrepreneurial activity is this student primarily demonstrating?", "options": [{"text": "Managing money and tracking expenses.", "isCorrect": false, "rationale": "While managing money is a part of entrepreneurship, the scenario describes the initial act of creating a product and starting a business, not specifically the financial tracking aspect."}, {"text": "Delivering value and building systems.", "isCorrect": false, "rationale": "Delivering value is part of the process, but the core activity described is the conceptualization and launch of the solution and business."}, {"text": "Creating a solution to a perceived market need (for unique, eco-friendly apparel) and building an organization around it.", "isCorrect": true, "rationale": "This directly aligns with the definition of an entrepreneur: identifying a need (unique, eco-friendly apparel) and creating a product/service (the t-shirts and online store) to meet it."}, {"text": "Finding customers through traditional advertising.", "isCorrect": false, "rationale": "Finding customers is a subsequent step, but the scenario focuses on the initial creation and setup of the business, implying the 'create a solution' phase."}], "id": "q02"}, {"question": "How does the 'Risk vs. Reward' profile of an entrepreneur primarily differ from that of a typical employee?", "options": [{"text": "Entrepreneurs have more predictable income but less potential for growth than employees.", "isCorrect": false, "rationale": "The text states the opposite: employees have predictable income with limited upside, while entrepreneurs have less predictable income with far greater potential upside."}, {"text": "Employees face higher financial risk, while entrepreneurs have guaranteed returns.", "isCorrect": false, "rationale": "This is incorrect. Entrepreneurs take on financial risk for potential profit, while employees have relatively predictable income."}, {"text": "Entrepreneurs have the potential for significantly higher income but also the risk of losing initial investments.", "isCorrect": true, "rationale": "The text explicitly states that an entrepreneur's income 'can grow far beyond what any employer might pay you,' but also that 'You can also lose money, especially in the early stages' and 'invest time and money into an idea that does not succeed.'"}, {"text": "Both employees and entrepreneurs have identical risk and reward profiles.", "isCorrect": false, "rationale": "The text clearly contrasts the risk and reward profiles, showing them to be distinct."}], "id": "q03"}, {"question": "According to the text, what is a key strategy smart entrepreneurs use to manage the inherent risks of starting a business?", "options": [{"text": "Investing heavily in an idea from day one to show commitment.", "isCorrect": false, "rationale": "The text advises against this, stating that smart entrepreneurs 'test ideas before investing heavily.'"}, {"text": "Quitting their day jobs immediately to focus entirely on their new venture.", "isCorrect": false, "rationale": "The text suggests the opposite strategy: 'They keep their day jobs while they experiment.'"}, {"text": "Starting small, testing ideas, and learning from failures.", "isCorrect": true, "rationale": "The text explicitly states: 'Smart entrepreneurs manage risk carefully. They start small. They test ideas before investing heavily. They keep their day jobs while they experiment. They learn from failures and adjust.'"}, {"text": "Delegating all financial responsibilities to a partner without oversight.", "isCorrect": false, "rationale": "The text emphasizes that managing money is a core entrepreneurial activity, implying direct involvement and oversight."}], "id": "q04"}, {"question": "Which of the following is identified as the *first* activity in the predictable set of activities for starting a business?", "options": [{"text": "Find customers.", "isCorrect": false, "rationale": "Finding customers is a later step, after a problem has been identified and a solution created."}, {"text": "Identify a problem.", "isCorrect": true, "rationale": "The enumerated list begins with 'Identify a problem: What do people need that they are not getting?'"}, {"text": "Manage money.", "isCorrect": false, "rationale": "Managing money is an ongoing activity but not the initial step in starting the business itself."}, {"text": "Create a solution.", "isCorrect": false, "rationale": "Creating a solution comes after a problem has been identified."}], "id": "q05"}, {"question": "A local coffee shop owner notices that many of her customers complain about the lack of healthy, quick breakfast options nearby. She decides to introduce a new line of gourmet oatmeal and fruit bowls. According to the entrepreneurial activities described, what step is she undertaking?", "options": [{"text": "Managing money.", "isCorrect": false, "rationale": "While managing money will be involved, the primary action of responding to a customer need with a new product is not specifically 'managing money.'"}, {"text": "Delivering value.", "isCorrect": false, "rationale": "Delivering value is about setting up systems, whereas introducing a new product to solve a complaint falls under 'creating a solution' to an identified problem."}, {"text": "Identifying a problem and creating a solution.", "isCorrect": true, "rationale": "She 'notices that many of her customers complain' (identifying a problem) and 'decides to introduce a new line' (creating a solution)."}, {"text": "Finding customers.", "isCorrect": false, "rationale": "Her existing customers are the source of the problem identification; the action is creating the solution for them, not initially finding new ones."}], "id": "q06"}, {"question": "In the 'Student Entrepreneur: The Lawn Care Business' example, Marcus learned that 'happy customers refer their neighbors — his best marketing was simply doing a great job.' What does this imply about effective marketing for a new small business?", "options": [{"text": "Extensive advertising campaigns are crucial for initial customer acquisition.", "isCorrect": false, "rationale": "Marcus's experience suggests that word-of-mouth from satisfied customers was his 'best marketing,' implying less reliance on extensive campaigns, especially initially."}, {"text": "Marketing is only necessary for large, established businesses.", "isCorrect": false, "rationale": "Marcus did some marketing (flyers), but the key takeaway was the effectiveness of customer satisfaction, indicating marketing is important for all businesses."}, {"text": "Providing excellent service and customer satisfaction can be a powerful, organic marketing tool.", "isCorrect": true, "rationale": "Marcus's experience directly states that 'his best marketing was simply doing a great job,' leading to customer referrals, which is a form of organic marketing."}, {"text": "Only paid flyers are effective for reaching new customers in a local service business.", "isCorrect": false, "rationale": "While Marcus used flyers, the text highlights customer referrals as his *best* marketing, indicating other methods are also valuable."}], "id": "q07"}, {"question": "Marcus, the student entrepreneur, earned $2,000 in revenue and had expenses totaling $250. What was his profit for the summer?", "options": [{"text": "$2,250", "isCorrect": false, "rationale": "This would be the sum of revenue and expenses, not profit."}, {"text": "$1,750", "isCorrect": true, "rationale": "Profit is calculated as Revenue - Expenses. So, $2,000 - $250 = $1,750."}, {"text": "$250", "isCorrect": false, "rationale": "This represents his expenses, not his profit."}, {"text": "$2,000", "isCorrect": false, "rationale": "This represents his total revenue, not his profit after expenses."}], "id": "q08"}, {"question": "According to the 'moneytip' section, what is a practical starting point for someone considering entrepreneurship without a grand, innovative idea?", "options": [{"text": "Immediately seek venture capital funding for a complex technological solution.", "isCorrect": false, "rationale": "The moneytip suggests starting small with existing skills or observed needs, not immediately pursuing large-scale funding for complex ideas."}, {"text": "Start with a skill you already have, a problem you've experienced, or a clear community need, and test the idea on a small scale.", "isCorrect": true, "rationale": "The moneytip advises exactly this: 'Start with a skill you already have, a problem you have personally experienced, or a service people in your community clearly need. Test the idea on a small scale.'"}, {"text": "Spend a significant amount of money upfront to build a professional brand.", "isCorrect": false, "rationale": "The moneytip advises against 'spending significant time or money' before testing the idea."}, {"text": "Wait until a truly revolutionary idea emerges before taking any action.", "isCorrect": false, "rationale": "The moneytip encourages starting with smaller, more accessible ideas, rather than waiting indefinitely for a 'big idea.'"}], "id": "q09"}, {"question": "What is the overarching message the section aims to convey about career options and personal agency?", "options": [{"text": "Working for a large corporation is the only path to financial security and success.", "isCorrect": false, "rationale": "The text explicitly states: 'working for someone else is not the only option' and highlights entrepreneurship as an alternative."}, {"text": "Entrepreneurship is exclusively for those with extensive financial resources and groundbreaking inventions.", "isCorrect": false, "rationale": "The text counters this by saying 'You do not need a big idea' and that many large companies started with 'limited resources' and 'a single person solving a single problem.'"}, {"text": "Individuals have the ability to create value and earn income independently, using financial literacy skills in diverse career paths.", "isCorrect": true, "rationale": "The 'Looking Ahead' section concludes with: 'working for someone else is not the only option. You have the ability to create value in the world and earn income doing it. The financial literacy skills you are building in this course apply whether you work for a corporation, freelance on weekends, or build your own business from scratch.'"}, {"text": "Financial literacy skills are only relevant for traditional employment and not for starting a business.", "isCorrect": false, "rationale": "The text states that financial literacy skills 'apply whether you work for a corporation, freelance on weekends, or build your own business from scratch.'"}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
