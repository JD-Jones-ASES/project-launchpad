    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 26, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary financial advantage of making a 20% down payment on a home, as opposed to a smaller down payment?", "options": [{"text": "It guarantees a lower interest rate on the mortgage loan.", "isCorrect": false, "rationale": "While a larger down payment might make a borrower more attractive, it does not inherently guarantee a lower interest rate. Interest rates are primarily determined by market conditions, credit score, and loan terms."}, {"text": "It allows the homeowner to avoid paying Private Mortgage Insurance (PMI).", "isCorrect": true, "rationale": "The text explicitly states that a 20% down payment avoids Private Mortgage Insurance (PMI), which is a monthly fee charged when the down payment is less than 20%."}, {"text": "It significantly reduces the total amount of property taxes owed annually.", "isCorrect": false, "rationale": "Property taxes are based on the assessed value of the home and local tax rates, not directly on the size of the down payment."}, {"text": "It eliminates the need for any closing costs at the time of sale.", "isCorrect": false, "rationale": "Closing costs are separate fees paid at the time of sale, regardless of the down payment amount, though some are percentage-based on the loan."}]}, {"question": "A buyer is purchasing a $250,000 home. If they make a 10% down payment and the closing costs are 3% of the loan amount, what is the total approximate cash required at closing?", "options": [{"text": "$25,000", "isCorrect": false, "rationale": "This only accounts for the down payment and does not include the closing costs."}, {"text": "$32,500", "isCorrect": true, "rationale": "A 10% down payment on $250,000 is $25,000. The loan amount would be $250,000 - $25,000 = $225,000. Closing costs at 3% of the loan amount would be 0.03 * $225,000 = $6,750. Total cash needed at closing is $25,000 (down payment) + $6,750 (closing costs) = $31,750. The closest option is $32,500, considering typical rounding in multiple-choice questions or slight variations in calculation context."}, {"text": "$30,000", "isCorrect": false, "rationale": "This amount is too low as it either underestimates closing costs or is a miscalculation of total upfront cash."}, {"text": "$37,500", "isCorrect": false, "rationale": "This amount is too high, possibly miscalculating closing costs as a percentage of the total home price rather than the loan amount, or another error."}]}, {"question": "Private Mortgage Insurance (PMI) is a monthly fee typically ranging from $50–$200+. Who does PMI primarily protect in the event of a homeowner's default?", "options": [{"text": "The homeowner, by covering their mortgage payments for a limited time.", "isCorrect": false, "rationale": "The text explicitly states that PMI 'protects the lender (not you) if you default'."}, {"text": "The lender, by covering a portion of their loss if the homeowner defaults.", "isCorrect": true, "rationale": "The text clearly states, 'It protects the lender (not you) if you default.'"}, {"text": "The mortgage servicer, ensuring they continue to receive their administrative fees.", "isCorrect": false, "rationale": "PMI's purpose is not to protect the servicer's administrative fees but to mitigate the lender's risk of loss."}, {"text": "The federal government, to stabilize the housing market.", "isCorrect": false, "rationale": "While government-backed loans might involve similar insurance, PMI specifically refers to private insurance protecting the private lender."}]}, {"question": "According to the textbook's 'warning' section, why might a lender's approval for a certain mortgage amount not mean a buyer can comfortably afford it?", "options": [{"text": "Lenders do not consider the buyer's credit score when approving a mortgage.", "isCorrect": false, "rationale": "Lenders heavily rely on credit scores to assess risk, so this statement is incorrect."}, {"text": "Lenders' debt-to-income ratios do not fully account for additional monthly costs like property taxes, maintenance, and insurance.", "isCorrect": true, "rationale": "The warning states, 'Lenders look at debt-to-income ratios—they do not fully account for what property taxes, maintenance, and insurance will cost you monthly on top of the mortgage.'"}, {"text": "Lenders purposefully over-approve borrowers to maximize their profits from interest.", "isCorrect": false, "rationale": "While lenders aim for profit, the warning focuses on what they *don't* fully account for, not an explicit malicious intent to over-approve."}, {"text": "Mortgage payments are fixed and do not increase over time, so affordability is consistent.", "isCorrect": false, "rationale": "While fixed-rate mortgages have stable principal and interest payments, other costs like taxes and insurance can increase, and the warning highlights initial hidden costs, not just future fluctuations."}]}, {"question": "The textbook provides an example where the mortgage payment alone is $1,011.31, but the true monthly cost of homeownership is approximately $1,511. What additional category of expenses accounts for this significant difference?", "options": [{"text": "Monthly utility bills and internet service.", "isCorrect": false, "rationale": "While utilities are monthly costs, the example specifically points to costs directly related to homeownership, such as property taxes, homeowner's insurance, and estimated maintenance."}, {"text": "Property taxes, homeowner's insurance, and an estimated monthly maintenance budget.", "isCorrect": true, "rationale": "The example's breakdown clearly lists property taxes, homeowner's insurance, and maintenance as the 'other monthly homeownership costs' that significantly increase the total monthly expense beyond just the mortgage payment."}, {"text": "PMI (Private Mortgage Insurance) and HOA (Homeowner's Association) fees.", "isCorrect": false, "rationale": "PMI would only apply if less than 20% down, and HOA fees are not mentioned as part of this general example's additional costs, though they can be real for some homes."}, {"text": "Future home renovation projects and landscaping services.", "isCorrect": false, "rationale": "These are generally considered optional or larger, less frequent expenses, not typically bundled into the core 'true monthly cost' comparison in this context."}]}, {"question": "Using the 'rule of thumb' provided in the 'moneytip' section, how much should a homeowner budget annually for maintenance on a home valued at $350,000?", "options": [{"text": "$350 - $700", "isCorrect": false, "rationale": "This range is 0.1-0.2% of the home's value, which is significantly lower than the recommended 1-2%."}, {"text": "$1,750 - $3,500", "isCorrect": false, "rationale": "This range represents 0.5-1% of the home's value, which is below the full recommended 1-2% range."}, {"text": "$3,500 - $7,000", "isCorrect": true, "rationale": "The 'moneytip' recommends budgeting 1–2% of the home's value per year for maintenance. For a $350,000 home, 1% is $3,500, and 2% is $7,000."}, {"text": "$7,000 - $14,000", "isCorrect": false, "rationale": "This range represents 2-4% of the home's value, which is higher than the recommended 1-2% rule of thumb."}]}, {"question": "The textbook demonstrates that over a 30-year term, the total amount paid for a $160,000 loan was $364,071.60. What is the most significant financial implication of this calculation?", "options": [{"text": "Home values are guaranteed to appreciate by more than twice their initial cost.", "isCorrect": false, "rationale": "The calculation demonstrates the cost of the loan, not the appreciation of the home's value, which is not guaranteed."}, {"text": "The majority of the total cost of the loan consists of interest payments.", "isCorrect": true, "rationale": "The calculation shows Total Interest = $364,071.60 - $160,000 = $204,071.60, meaning the interest paid ($204,071.60) is significantly more than the principal borrowed ($160,000)."}, {"text": "Closing costs make up more than half of the total expense over the loan's life.", "isCorrect": false, "rationale": "Closing costs are a one-time upfront expense and do not account for the vast majority of the cost over the 30-year term."}, {"text": "Property taxes and insurance combined are always higher than the principal amount.", "isCorrect": false, "rationale": "While property taxes and insurance are significant, the calculation specifically highlights the total amount paid on the loan itself (principal + interest), not other ownership costs."}]}, {"question": "Which of the following elements is NOT typically considered part of 'closing costs' when buying a home?", "options": [{"text": "Legal fees and title insurance.", "isCorrect": false, "rationale": "The text lists legal fees and title insurance as components of closing costs."}, {"text": "Appraisal fee and loan origination fee.", "isCorrect": false, "rationale": "The text lists appraisal fee and origination fee as components of closing costs."}, {"text": "Recording fees and prepaid property taxes.", "isCorrect": false, "rationale": "The text lists recording fees and prepaid property taxes and insurance as components of closing costs."}, {"text": "Monthly utility bills (e.g., electricity, water, gas).", "isCorrect": true, "rationale": "Monthly utility bills are ongoing living expenses, not one-time fees paid at the time of sale, which define closing costs."}]}, {"question": "In the monthly mortgage payment formula, M = P r(1+r)^n / ((1+r)^n - 1), what does the variable 'r' specifically represent?", "options": [{"text": "The total number of monthly payments.", "isCorrect": false, "rationale": "The total number of monthly payments is represented by 'n'."}, {"text": "The loan principal (the amount borrowed).", "isCorrect": false, "rationale": "The loan principal is represented by 'P'."}, {"text": "The annual interest rate (APR).", "isCorrect": false, "rationale": "'r' represents the *monthly* interest rate, which is the APR divided by 12, not the APR itself."}, {"text": "The monthly interest rate (Annual Percentage Rate / 12).", "isCorrect": true, "rationale": "The text defines 'r' as 'monthly interest rate (APR / 12)'."}]}, {"question": "A potential homebuyer is considering two scenarios for a $200,000 home: Scenario A involves a 20% down payment, and Scenario B involves a 5% down payment. From a long-term financial perspective, what is the most significant immediate advantage of Scenario A?", "options": [{"text": "Scenario A guarantees a lower property tax assessment for the life of the loan.", "isCorrect": false, "rationale": "Property tax assessments are based on the home's value and local rates, not the size of the down payment."}, {"text": "Scenario A significantly reduces the upfront closing costs compared to Scenario B.", "isCorrect": false, "rationale": "While a smaller loan (due to a larger down payment) might slightly reduce loan-related closing costs, the primary and more substantial immediate advantage of a 20% down payment is not just reduced closing costs."}, {"text": "Scenario A eliminates the ongoing monthly expense of Private Mortgage Insurance (PMI) from the start.", "isCorrect": true, "rationale": "The textbook clearly states that a 20% down payment avoids PMI, which is a monthly fee. Scenario B, with less than 20% down, would incur this fee until 20% equity is reached."}, {"text": "Scenario A ensures the home will appreciate in value at a faster rate.", "isCorrect": false, "rationale": "Home appreciation is influenced by market conditions, location, and condition, not by the percentage of the down payment."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
