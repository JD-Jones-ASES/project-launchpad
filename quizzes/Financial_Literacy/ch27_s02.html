        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

<body>
<div class="quiz-container">

        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 27, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the section, what is the primary purpose of a business plan for a small side hustle or student business?", "options": [{"text": "To secure a bank loan or investor funding for large-scale operations.", "isCorrect": false, "rationale": "The section explicitly states that a business plan for a small side hustle doesn't need to be extensive, and securing large funding is not its primary purpose in this context."}, {"text": "To answer six core questions to get started and provide initial direction.", "isCorrect": true, "rationale": "The text states, 'For a small side hustle or student business, a one-page plan that answers six core questions is enough to get started,' making this the primary purpose."}, {"text": "To provide a detailed, 50-page document covering every potential market fluctuation.", "isCorrect": false, "rationale": "The section opens by saying, 'A business plan does not need to be a 50-page document,' directly contradicting this option."}, {"text": "To identify every possible risk and develop a comprehensive contingency plan.", "isCorrect": false, "rationale": "While risk assessment is part of planning, the primary purpose highlighted for small businesses is getting started with core questions, not an exhaustive risk plan which can lead to over-planning."}], "id": "q01"}, {"question": "A student spends three months perfecting a 40-page business plan for their new dog-walking service, including detailed financial projections, without talking to any potential customers. Based on the provided content, what is the most significant concern with this approach?", "options": [{"text": "The plan might be too short and lack necessary detail for a successful launch.", "isCorrect": false, "rationale": "The text advises *against* long, detailed plans for side hustles and prioritizes getting started quickly, making 'too short' an unlikely concern here."}, {"text": "They should have researched more competitors before writing the plan.", "isCorrect": false, "rationale": "While competitor research is useful, the core issue described is the lack of market validation before extensive planning, not just a lack of competitive analysis."}, {"text": "They are committing a common mistake by over-planning without market validation.", "isCorrect": true, "rationale": "The 'Warning' section explicitly states, 'Spending months writing a detailed business plan without talking to any potential customers is the most common mistake new entrepreneurs make,' and the 'moneytip' emphasizes 'Validate before you invest.'"}, {"text": "Dog-walking services don't typically require a business plan, making the effort unnecessary.", "isCorrect": false, "rationale": "The text implies all businesses, even small side hustles, benefit from a plan (even if it's one-page) to structure their thinking."}], "id": "q02"}, {"question": "Sarah wants to start a baking business. Which of the following descriptions best demonstrates a specific and well-defined 'Idea' and 'Target Market' according to the business plan basics?", "options": [{"text": "I bake cakes for people who like sweets.", "isCorrect": false, "rationale": "This description is too general, lacking specificity on the problem solved, the specific type of customer, or a defined market."}, {"text": "I make custom-themed cupcakes for children's birthday parties in my local community, focusing on busy parents who want unique, convenient treats.", "isCorrect": true, "rationale": "This option is highly specific: it identifies the problem (busy parents wanting unique/convenient treats), the solution (custom-themed cupcakes), and the target market (children's birthday parties in the local community)."}, {"text": "I sell baked goods to anyone who wants them, focusing on profit.", "isCorrect": false, "rationale": "This statement is entirely too broad, failing to specify the product, target customer, or the unique value proposition (problem solved)."}, {"text": "My idea is to bake and sell cookies to various stores.", "isCorrect": false, "rationale": "While better than 'people who like sweets,' 'various stores' is still not specific enough to define a clear target market, and it doesn't clearly articulate the problem being solved for those stores."}], "id": "q03"}, {"question": "A student starts a calligraphy service. They purchase a beginner's calligraphy pen set for $30. Each month, they buy specialized ink and paper, costing about $20. How would these expenses be categorized in their business plan?", "options": [{"text": "The pen set is an ongoing cost; the ink and paper are startup costs.", "isCorrect": false, "rationale": "This option incorrectly swaps the definitions. The pen set is a one-time initial purchase, while ink and paper are recurring operational expenses."}, {"text": "Both the pen set and the ink/paper are startup costs.", "isCorrect": false, "rationale": "Startup costs are 'what you need to purchase before your first dollar comes in.' Ongoing costs are 'what it costs to operate each month.' Ink and paper are clearly monthly operational costs."}, {"text": "The pen set is a startup cost; the ink and paper are ongoing costs.", "isCorrect": true, "rationale": "The pen set is an initial, one-time purchase necessary before starting (startup cost), while the ink and paper are recurring monthly expenses for operating the business (ongoing costs)."}, {"text": "Both the pen set and the ink/paper are considered marketing expenses.", "isCorrect": false, "rationale": "Neither the pen set nor the ink/paper are directly used for promoting the business; they are operational supplies."}], "id": "q04"}, {"question": "For a student business just starting out, what does the text suggest is the *most effective* marketing strategy?", "options": [{"text": "Extensive social media advertising campaigns targeting a broad audience.", "isCorrect": false, "rationale": "While social media is mentioned as a marketing option, it's not highlighted as the *most* effective for a student business starting out."}, {"text": "Distributing flyers to every household in the entire city.", "isCorrect": false, "rationale": "Flyers are mentioned as a local option, but this is an extensive and likely inefficient method compared to the most effective one highlighted."}, {"text": "Relying on word-of-mouth referrals from satisfied clients.", "isCorrect": true, "rationale": "The 'realworld' section states, 'The most effective marketing for a student business is word of mouth,' emphasizing referrals."}, {"text": "Purchasing a sponsored listing on a neighborhood app or local directory.", "isCorrect": false, "rationale": "This is listed as a valid marketing method, but the text specifically calls out word-of-mouth as 'most effective' for student businesses."}], "id": "q05"}, {"question": "A student wants to start a T-shirt design business. They are considering buying a new screen-printing machine for $500. According to the 'Validate before you invest' tip, what should their *first* step be?", "options": [{"text": "Write a detailed 50-page business plan for their T-shirt designs.", "isCorrect": false, "rationale": "The text advises against over-planning and prioritizing validation over extensive documentation, especially before an investment."}, {"text": "Research the most expensive screen-printing machines available to ensure quality.", "isCorrect": false, "rationale": "The tip focuses on validation of the business idea, not on extensive equipment research before finding a customer."}, {"text": "Find their first customer willing to pay for a custom T-shirt design.", "isCorrect": true, "rationale": "The 'moneytip' states, 'Before buying equipment or supplies, find your first customer. If someone is willing to pay you, the business is real.'"}, {"text": "Create several unique T-shirt designs and print them as samples for a portfolio.", "isCorrect": false, "rationale": "Printing samples would involve spending money ('invest') before validating if there's a paying customer, which goes against the 'Validate before you invest' principle."}], "id": "q06"}, {"question": "The text describes a 5-client tutoring business growing to 10 clients through referrals. What is the key benefit highlighted by this scenario?", "options": [{"text": "It proves the business's marketing budget was initially too high.", "isCorrect": false, "rationale": "The scenario highlights efficiency of growth, not necessarily an initial overspending on marketing. It mentions 'no additional marketing cost' for the growth."}, {"text": "It demonstrates the business's ability to double revenue with no additional marketing cost.", "isCorrect": true, "rationale": "The 'realworld' section explicitly states, 'A 5-client tutoring business that grows to 10 clients through referrals doubles revenue with $0 in additional marketing cost,' making this the key benefit."}, {"text": "It shows the importance of offering extensive discounts to new clients to attract them.", "isCorrect": false, "rationale": "The text mentions a 'small thank-you' for referrals, not extensive discounts, and the focus is on the power of referrals themselves."}, {"text": "It suggests that the initial hourly pricing of $30/hour was too low.", "isCorrect": false, "rationale": "The scenario focuses on the efficiency of referral growth, not an analysis of the initial pricing strategy."}], "id": "q07"}, {"question": "Which core question of a business plan would help an entrepreneur determine if they should charge an hourly rate, a flat fee, or a monthly retainer for their services?", "options": [{"text": "The Idea", "isCorrect": false, "rationale": "The Idea focuses on the problem solved and for whom, not the pricing structure."}, {"text": "Target Market", "isCorrect": false, "rationale": "Target Market identifies who will buy and how many potential customers exist, but not *how* money is charged."}, {"text": "Revenue Model", "isCorrect": true, "rationale": "The 'Revenue Model' section directly asks, 'How do you make money? What do you charge? Hourly rate? Flat fee per project? Monthly retainer?'"}, {"text": "Startup Costs", "isCorrect": false, "rationale": "Startup Costs are about initial purchases needed before earning money, not the method of charging customers."}], "id": "q08"}, {"question": "Considering the 'Warning' about over-planning and the 'moneytip' on validation, what is the *most critical initial action* for a student starting a new business?", "options": [{"text": "Thoroughly documenting every potential risk in a detailed plan before launching.", "isCorrect": false, "rationale": "This aligns with 'over-planning' mentioned in the warning, which is advised against as a first step without market validation."}, {"text": "Purchasing all necessary equipment and supplies immediately to be fully prepared.", "isCorrect": false, "rationale": "The 'moneytip' explicitly advises 'Validate before you invest,' meaning one should find a customer *before* buying equipment or supplies."}, {"text": "Creating a simple plan and immediately seeking the first paying customer to validate the idea.", "isCorrect": true, "rationale": "This combines the advice for a simple plan with the crucial 'Validate before you invest' and 'Get your first customer as quickly as possible' messages."}, {"text": "Spending significant time researching every competitor's pricing structure in depth.", "isCorrect": false, "rationale": "While competitor research is important for the Revenue Model, the text emphasizes getting the first customer and market validation as the most critical initial action over extensive research."}], "id": "q09"}, {"question": "A student wants to start a cleaning service. Based on the advice for 'The Idea' question, which statement is the *most effective* description?", "options": [{"text": "I clean houses for people in my city.", "isCorrect": false, "rationale": "This description is too general. The text advises to 'Be specific' and gives an example of improving 'I help people' to 'I help busy families in my neighborhood.'"}, {"text": "I offer deep cleaning services for busy professionals and small businesses in the downtown district who lack time for thorough maintenance.", "isCorrect": true, "rationale": "This description is highly specific, identifying the precise problem (lack of time for thorough maintenance), the target customers (busy professionals and small businesses), and the specific location (downtown district), aligning with the text's guidance."}, {"text": "I want to make money by cleaning different places.", "isCorrect": false, "rationale": "This statement is vague and doesn't specify the service, target customer, or problem solved, making it ineffective."}, {"text": "My service provides cleaning solutions for residential and commercial properties.", "isCorrect": false, "rationale": "While better than 'different places,' 'cleaning solutions for residential and commercial properties' is still not specific enough regarding the unique problem solved or the niche within those broad categories."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
