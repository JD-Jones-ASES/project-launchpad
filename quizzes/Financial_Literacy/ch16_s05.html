<script>
var QUESTIONS = [{"question": "What is the core question that distinguishes $good debt$ from $bad debt$?", "options": [{"text": "Does this borrowing create value greater than its cost?", "isCorrect": true, "rationale": "The fundamental test for any debt is whether the return — in increased net worth or earning power — exceeds the cost of the loan."}, {"text": "Is the monthly payment affordable within my current budget?", "isCorrect": false, "rationale": "Affordability matters, but it is not the defining distinction. Debt can be affordable and still be bad if it creates no lasting value."}, {"text": "Is the interest rate below the national average?", "isCorrect": false, "rationale": "A below-average interest rate does not automatically make debt 'good.' The return on the borrowed money must exceed the cost."}, {"text": "Did a financial institution approve the loan?", "isCorrect": false, "rationale": "Lender approval does not determine whether debt is good or bad — lenders approve all kinds of high-cost, low-value loans."}], "id": "q01"}, {"question": "Which of the following is the best example of $good debt$?", "options": [{"text": "A student loan to obtain a degree that increases lifetime earnings by $500,000", "isCorrect": true, "rationale": "When the return on borrowing — increased lifetime earnings — far exceeds the loan amount, the debt is creating value and meets the definition of good debt."}, {"text": "A credit card balance for a vacation that was charged at 22% APR", "isCorrect": false, "rationale": "A vacation is pure consumption — it provides no lasting financial return, and the 22% interest keeps accumulating on something already spent."}, {"text": "A payday loan to cover a cash flow gap between paychecks", "isCorrect": false, "rationale": "Payday loans carry extremely high APRs (sometimes 400%+) and are used for consumption. This is a textbook example of bad debt."}, {"text": "A 7-year car loan for a luxury vehicle that depreciates immediately", "isCorrect": false, "rationale": "Cars depreciate, and long-term luxury car loans can leave you owing more than the car is worth. This is bad debt."}], "id": "q02"}, {"question": "Why can a mortgage be considered $good debt$ even though it is borrowed money?", "options": [{"text": "It builds equity over time, the home may appreciate, and you need housing regardless", "isCorrect": true, "rationale": "A mortgage can build equity as the home appreciates and as principal is paid down — functioning as forced savings. Since housing costs are unavoidable, borrowing to own can be better than renting."}, {"text": "Interest rates on mortgages are always lower than inflation", "isCorrect": false, "rationale": "Mortgage rates are not always below inflation. The good debt case rests on equity-building and appreciation, not rate comparisons."}, {"text": "Mortgages are tax deductible, making them free to carry", "isCorrect": false, "rationale": "Mortgage interest may be partially deductible, but it is far from free. The good debt argument is about equity and appreciation, not deductibility."}, {"text": "Banks only approve mortgages for assets that increase in value", "isCorrect": false, "rationale": "Banks approve mortgages based on creditworthiness, not a guarantee of appreciation."}], "id": "q03"}, {"question": "Which of the following best describes $bad debt$?", "options": [{"text": "Borrowing for depreciating assets or pure consumption, where interest provides no financial return", "isCorrect": true, "rationale": "Bad debt is defined as borrowing where the purchased item loses value (depreciates) or is consumed entirely, leaving you paying interest with no lasting financial benefit."}, {"text": "Any debt with an interest rate above 5%", "isCorrect": false, "rationale": "The interest rate alone does not define bad debt. A higher-rate loan for education could be good debt if the return justifies the cost."}, {"text": "Borrowing from family members rather than financial institutions", "isCorrect": false, "rationale": "The source of the loan is irrelevant to whether it is good or bad debt. What matters is what the money is used for."}, {"text": "Debt that has not been approved by a bank", "isCorrect": false, "rationale": "Bank approval has no bearing on the good/bad debt distinction."}], "id": "q04"}, {"question": "$Payday loans$ are an example of bad debt primarily because of which feature?", "options": [{"text": "They carry extremely high APRs — sometimes 400% or more — and can trap borrowers in a cycle of debt", "isCorrect": true, "rationale": "Payday loans are short-term, very high-cost loans. Their astronomical APRs mean small amounts can quickly snowball into unmanageable debt."}, {"text": "They require collateral such as a car or home", "isCorrect": false, "rationale": "Payday loans are typically unsecured — they do not require collateral. Their problem is the extreme cost, not collateral requirements."}, {"text": "They are only available to people with excellent credit", "isCorrect": false, "rationale": "Payday lenders typically lend to borrowers with poor credit or limited options — the opposite of requiring excellent credit."}, {"text": "They must be repaid over a period of 10 years or more", "isCorrect": false, "rationale": "Payday loans are short-term products, typically due on the borrower's next payday. Their problem is cost, not duration."}], "id": "q05"}, {"question": "What does it mean to be 'upside down' on a car loan?", "options": [{"text": "You owe more on the loan than the car is currently worth", "isCorrect": true, "rationale": "Being 'upside down' (also called negative equity) means the remaining loan balance exceeds the car's market value. This is common with long-term auto loans because cars depreciate faster than loan balances fall."}, {"text": "Your monthly payment exceeds your monthly income", "isCorrect": false, "rationale": "This describes an unaffordable payment, not the specific meaning of 'upside down.'"}, {"text": "The interest rate on your loan exceeds the inflation rate", "isCorrect": false, "rationale": "Comparing interest rates to inflation is a different concept. 'Upside down' refers specifically to loan balance vs. asset value."}, {"text": "You have paid off more than half the loan principal", "isCorrect": false, "rationale": "Paying more than half the principal would actually help you avoid being upside down, not cause it."}], "id": "q06"}, {"question": "What is the first question to ask yourself before taking on any debt, according to the debt decision framework?", "options": [{"text": "Does this create lasting value (education, home equity, income-producing asset)?", "isCorrect": true, "rationale": "The first test for any borrowing decision is whether the money will be used for something that creates lasting financial value — the foundation of the good debt definition."}, {"text": "What is the minimum monthly payment I must make?", "isCorrect": false, "rationale": "Minimum payments matter but are the fourth consideration, after establishing whether the debt creates value."}, {"text": "How quickly can I pay off this loan?", "isCorrect": false, "rationale": "Repayment speed is important but comes after determining whether the debt is worthwhile in the first place."}, {"text": "What is my current credit score?", "isCorrect": false, "rationale": "Your credit score affects the rate you receive, but it is not the first question in evaluating whether to take on debt."}], "id": "q07"}, {"question": "Why is carrying a $credit card$ balance at 20-25% APR compared to a 'financial emergency' in the text?", "options": [{"text": "No investment reliably returns 20%+ per year, so paying off that debt is the best guaranteed return available", "isCorrect": true, "rationale": "When you pay off 20-25% APR debt, you are effectively earning a guaranteed 20-25% return on that money. No investment reliably matches that, making debt payoff the highest-priority financial move."}, {"text": "Credit card companies can legally seize your assets without notice at those rates", "isCorrect": false, "rationale": "Credit card companies cannot seize assets without a court judgment. The emergency framing is about the economic cost, not legal risk."}, {"text": "High-APR credit cards always increase their rates further over time", "isCorrect": false, "rationale": "Rates can change, but the emergency framing is about the current guaranteed cost versus any available investment return."}, {"text": "Federal law requires immediate payoff of any balance above 20% APR", "isCorrect": false, "rationale": "No such law exists. The text frames it as a financial priority, not a legal requirement."}], "id": "q08"}, {"question": "A $100,000 student loan for a career paying $35,000 per year is described as potentially failing the good debt test. Why?", "options": [{"text": "The cost of the loan may not be proportional to the income boost it generates", "isCorrect": true, "rationale": "Good debt requires that the return exceeds the cost. A $100,000 loan that leads to a modest salary may take decades to repay and may never generate a net positive return."}, {"text": "Student loans are never considered good debt under any circumstances", "isCorrect": false, "rationale": "The text explicitly identifies student loans as potentially good debt when borrowed amounts are proportional to the income boost. This example tests the proportionality condition."}, {"text": "Only graduate school loans qualify as good debt", "isCorrect": false, "rationale": "The good debt test applies to all student loans based on return versus cost, not degree level."}, {"text": "Federal student loans cannot exceed $35,000 regardless of the career", "isCorrect": false, "rationale": "There is no such universal cap. The example uses these numbers to illustrate a proportionality problem."}], "id": "q09"}, {"question": "Even though a car always depreciates, an auto loan is described as a 'gray area.' What is the recommended approach?", "options": [{"text": "Borrow as little as possible at the lowest rate for the shortest term you can afford", "isCorrect": true, "rationale": "Since almost everyone needs a car to work, the goal is to minimize the bad-debt impact: buy a reliable, less expensive vehicle with a short loan at a low rate."}, {"text": "Avoid any car loan entirely and only pay cash", "isCorrect": false, "rationale": "While paying cash eliminates interest, the text acknowledges that car loans are often necessary. The key is to minimize cost, not necessarily avoid all loans."}, {"text": "Choose a longer loan term to keep monthly payments low", "isCorrect": false, "rationale": "Longer loan terms increase total interest paid and increase the risk of going upside down. Shorter terms are recommended."}, {"text": "Always buy new to minimize repair costs and offset depreciation", "isCorrect": false, "rationale": "The text specifically recommends a reliable used car over a new or luxury vehicle to reduce borrowing."}], "id": "q10"}, {"question": "What was the average total debt carried by an American household in 2023 (including mortgages)?", "options": [{"text": "Approximately $104,215", "isCorrect": true, "rationale": "The text reports that the average American household carried about $104,215 in total debt in 2023, including mortgages, auto loans, student loans, and credit card balances."}, {"text": "Approximately $21,800", "isCorrect": false, "rationale": "$21,800 is the average non-mortgage consumer debt figure cited in the text, not the total including mortgages."}, {"text": "Approximately $50,000", "isCorrect": false, "rationale": "The actual figure including mortgages was about $104,215 in 2023."}, {"text": "Approximately $250,000", "isCorrect": false, "rationale": "This is too high. The total household debt figure including mortgages was about $104,215."}], "id": "q11"}, {"question": "A $business loan$ used to start a business that generates income greater than the loan cost is classified as what?", "options": [{"text": "Good debt, because the borrowing creates income greater than its cost", "isCorrect": true, "rationale": "When a business loan funds a venture that generates more income than the loan costs, the debt passes the core good-debt test: value created exceeds the cost of borrowing."}, {"text": "Bad debt, because all business lending is speculative", "isCorrect": false, "rationale": "The good/bad classification depends on outcomes, not speculation. A business loan with a positive return is good debt."}, {"text": "Neutral debt, because businesses can fail unexpectedly", "isCorrect": false, "rationale": "The text classifies business loans that generate income greater than cost as 'potentially good debt,' not neutral."}, {"text": "Bad debt, because borrowed money should never be used to fund a business", "isCorrect": false, "rationale": "Business borrowing is common and can be excellent use of debt when the return exceeds the cost."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
