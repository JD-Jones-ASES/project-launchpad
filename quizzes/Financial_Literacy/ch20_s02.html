<body>
<div class="quiz-container">

        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 20, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the central message conveyed by the section 'Small Amounts Add Up' regarding personal finance?", "options": [{"text": "Only large, aggressive investments can build significant wealth over a lifetime.", "isCorrect": false, "rationale": "The section explicitly states that 'small monthly contributions—as little as $50 or $100—can grow to over a lifetime of investing,' contradicting this option."}, {"text": "Investing consistently, even small amounts, can lead to substantial wealth accumulation over a long period, especially when started early.", "isCorrect": true, "rationale": "This option accurately captures the core message, which is supported by all the examples and calculations in the section demonstrating how modest monthly contributions grow significantly with time and compounding."}, {"text": "High annual return rates are the most critical factor for achieving significant financial growth, far outweighing the duration of investment.", "isCorrect": false, "rationale": "While rates matter, the section emphasizes that 'Time Matters More,' demonstrating a much larger difference in future value for an earlier start (47 years vs. 27 years) than for different rates."}, {"text": "It is financially irresponsible to spend money on discretionary items like coffee or streaming services before maximizing investment contributions.", "isCorrect": false, "rationale": "The text explicitly states, 'The point is not that you should feel guilty about spending money on things you enjoy.' Instead, it advocates automating small investments before spending on discretionary items, not necessarily sacrificing enjoyment."}]}, {"question": "Based on the linearity of the investment formula mentioned in the text, if investing $100/month at 8% from age 18 to 65 results in approximately $621,790, what would be the approximate future value of investing $200/month under the same conditions?", "options": [{"text": "$621,790", "isCorrect": false, "rationale": "This amount represents the future value for $100/month, not $200/month. The formula is linear, meaning doubling the contribution doubles the outcome."}, {"text": "$310,895", "isCorrect": false, "rationale": "This would be half of the $100/month scenario, corresponding to a $50/month contribution, not $200/month."}, {"text": "$1,243,580", "isCorrect": true, "rationale": "The text states, 'Since the formula is linear in PMT, $50/month produces exactly half the values of the $100/month scenarios.' Therefore, $200/month (twice $100/month) would produce twice the value, which is $621,790 * 2 = $1,243,580."}, {"text": "$932,685", "isCorrect": false, "rationale": "This value does not follow the linear relationship described for different monthly contributions. It's approximately 1.5 times the $100/month scenario."}]}, {"question": "The section compares Scenario A ($100/month at 8% for 47 years) with Scenario B ($100/month at 8% for 27 years). What critical insight does this comparison primarily highlight regarding long-term wealth accumulation?", "options": [{"text": "Achieving a higher annual return rate is always more crucial than the duration of the investment.", "isCorrect": false, "rationale": "The comparison explicitly holds the return rate constant (8%) and varies the duration, demonstrating that the extra 20 years of compounding 'are worth more than five times the eventual balance.' This contradicts the idea that rate is 'always more crucial.'"}, {"text": "Consistent monthly contributions are only effective if they exceed $150 per month.", "isCorrect": false, "rationale": "The section shows significant results even with $50/month and $100/month, disproving the idea that a contribution must exceed $150/month to be effective."}, {"text": "The power of compounding over time, particularly starting early, has a vastly more significant impact on future wealth than the initial investment amount or even the return rate.", "isCorrect": true, "rationale": "Scenario A, with 20 extra years of compounding, results in over five times the final balance compared to Scenario B, despite identical monthly contributions and return rates. This strongly illustrates that 'Time Matters More' due to compounding."}, {"text": "Waiting to invest until one is financially stable, even if it means starting later, is a more prudent strategy.", "isCorrect": false, "rationale": "The entire section, especially the comparison of Scenario A and B, argues against waiting, showing the massive financial cost of delaying investment due to lost compounding."}]}, {"question": "According to the calculations presented in the text, what is the approximate future value of investing $100 per month from age 18 to 65 at an 8% annual return?", "options": [{"text": "$313,160", "isCorrect": false, "rationale": "This is the future value for a 6% annual return, not 8%."}, {"text": "$1,281,360", "isCorrect": false, "rationale": "This is the future value for a 10% annual return, not 8%."}, {"text": "$621,790", "isCorrect": true, "rationale": "The section explicitly states, '$100/Month at 8% Annual Return (r = 0.006667/month)' yields '$621,790.'"}, {"text": "$114,150", "isCorrect": false, "rationale": "This is the future value for investing for only 27 years (starting at age 38), not the full 47 years from age 18."}]}, {"question": "The 'Coffee-Shop Comparison' is used in the text to effectively convey which of the following messages?", "options": [{"text": "People should eliminate all discretionary spending to maximize their investment contributions.", "isCorrect": false, "rationale": "The text explicitly clarifies, 'The point is not that you should feel guilty about spending money on things you enjoy.' The comparison aims to reframe the cost, not demand elimination of all such expenses."}, {"text": "The daily cost of making small, consistent investments is often negligible and comparable to common everyday discretionary expenses.", "isCorrect": true, "rationale": "The comparison directly states that $100/month is '$3.33 per day—less than a daily coffee from a café,' or equivalent to 'skipping one restaurant meal per week,' illustrating the affordability of small investments."}, {"text": "Only by giving up luxury items like daily coffee can one hope to save enough for retirement.", "isCorrect": false, "rationale": "While it shows a trade-off, the main point is the affordability and relative insignificance of the daily cost of investing, not a mandate to give up all enjoyable items."}, {"text": "High-interest debt should be prioritized over investing small amounts, as coffee money is insufficient to make a difference.", "isCorrect": false, "rationale": "The text focuses on the *power* of small investments, directly contradicting the idea that they are insufficient to make a difference. Debt prioritization is not discussed."}]}, {"question": "If an individual were to invest $50 per month from age 18 to 65 at a 10% annual return, what would be the approximate future value of their investment, based on the information provided?", "options": [{"text": "$1,281,360", "isCorrect": false, "rationale": "This is the future value for a $100/month contribution at 10%, not $50/month."}, {"text": "$313,160", "isCorrect": false, "rationale": "This is the future value for a $100/month contribution at 6%, not $50/month at 10%."}, {"text": "$640,680", "isCorrect": true, "rationale": "The text states that '$50/month produces exactly half the values of the $100/month scenarios.' The $100/month scenario at 10% yields $1,281,360, so $50/month would yield half of that, which is $640,680."}, {"text": "$200,000", "isCorrect": false, "rationale": "This value is significantly lower than what the calculations for $50/month at 10% suggest, which should be half of the $100/month at 10% value."}]}, {"question": "What is the primary financial advantage gained by the investor in Scenario A (starting at age 18) compared to the investor in Scenario B (starting at age 38), both investing $100/month at 8%?", "options": [{"text": "Scenario A benefits from a higher average annual return rate over its investment period.", "isCorrect": false, "rationale": "Both scenarios are stated to use the same 8% annual return rate, so this is not the advantage."}, {"text": "Scenario A benefits from an additional 20 years of compounding, resulting in a significantly larger total accumulation due to exponential growth.", "isCorrect": true, "rationale": "The text explicitly states that 'The person who starts 20 years earlier ends up with $621,790 vs. $114,150... Those 20 extra years of compounding are worth more than five times the eventual balance.' This highlights the immense power of time and compounding."}, {"text": "Scenario A makes a larger total monetary contribution over the life of the investment.", "isCorrect": false, "rationale": "While Scenario A does contribute for longer (47 years vs. 27 years), the massive difference in future value ($621,790 vs. $114,150) is attributed primarily to the effect of compounding over the additional 20 years, not just the sum of contributions."}, {"text": "Scenario B faces higher investment fees and taxes, diminishing its overall returns.", "isCorrect": false, "rationale": "The text does not mention differences in fees or taxes between the scenarios; it attributes the difference solely to the duration of compounding."}]}, {"question": "The concept of the 'Latte Factor in Reverse' is introduced to explain that:", "options": [{"text": "Individuals should feel guilty about spending money on coffee and redirect it all to investments.", "isCorrect": false, "rationale": "The text explicitly states, 'The point is not that you should feel guilty about spending money on things you enjoy.' The 'Latte Factor' is used as an analogy, not a guilt trip."}, {"text": "Just as small daily expenditures add up over time, small daily or monthly investments also accumulate enormously over decades due to compounding.", "isCorrect": true, "rationale": "The text explains, 'The same principle that makes small purchases add up also makes small investments add up—enormously—over decades.' This option captures the essence of how the 'Latte Factor' (often used for spending) is reversed to explain investing."}, {"text": "Only by avoiding all minor purchases can one ever hope to accumulate significant investment capital.", "isCorrect": false, "rationale": "The section advocates for automating small investments before spending, not necessarily avoiding all minor purchases. The point is the *power* of small amounts, not their complete elimination."}, {"text": "The actual return on investment for small amounts is often too low to make a meaningful difference.", "isCorrect": false, "rationale": "The entire section, with its calculations showing hundreds of thousands or even over a million dollars from small monthly investments, directly contradicts this statement."}]}, {"question": "To consistently invest $100 per month, approximately how much money would an individual need to set aside on a daily basis?", "options": [{"text": "$1.67", "isCorrect": false, "rationale": "This is the approximate daily amount for investing $50 per month ($50/30 days)."}, {"text": "$5.00", "isCorrect": false, "rationale": "This is higher than the calculated daily amount for $100/month."}, {"text": "$3.33", "isCorrect": true, "rationale": "The text explicitly states, 'That is $3.33 per day—less than a daily coffee from a café,' when referring to $100/month."}, {"text": "$10.00", "isCorrect": false, "rationale": "This is significantly higher than the daily amount required for $100/month."}]}, {"question": "Based on the comprehensive advice and examples provided in 'Small Amounts Add Up,' what is identified as the most impactful strategy for building substantial long-term wealth?", "options": [{"text": "Waiting to invest until one has a large lump sum, as small amounts are largely ineffective.", "isCorrect": false, "rationale": "This directly contradicts the entire premise of the section, which shows the immense effectiveness of small amounts and the importance of starting early, not waiting for a lump sum."}, {"text": "Prioritizing high-risk, high-reward investments to achieve rapid growth, regardless of consistency.", "isCorrect": false, "rationale": "The section discusses consistent monthly contributions and various (but not necessarily 'high-risk') annual return rates, emphasizing consistency and time, not risk-taking."}, {"text": "Automating a small, consistent monthly investment as early in life as possible, making it 'invisible' in daily spending.", "isCorrect": true, "rationale": "The conclusion of the section advises, 'automate a small monthly investment before you spend on discretionary items. Even $50 or $100/month, automated... becomes invisible in your daily spending and transformative over your lifetime.' This synthesizes the key takeaways."}, {"text": "Focusing solely on increasing one's income dramatically, as investment returns on small amounts are too low to matter.", "isCorrect": false, "rationale": "While increasing income is helpful, the section's core argument is about the power of *small amounts* through compounding, even for students with limited income, contradicting the idea that investment returns on small amounts don't matter."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
