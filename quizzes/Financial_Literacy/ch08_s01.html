<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 8, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the fundamental relationship between budgeting and spending tracking?", "options": [{"text": "Budgeting is a substitute for tracking.", "isCorrect": false, "rationale": "The text states they are 'two halves of the same process,' indicating they are complementary, not substitutes."}, {"text": "Tracking creates the budget, and budgeting executes it.", "isCorrect": false, "rationale": "The text implies budgeting is the plan first, and tracking measures adherence to that plan, not that tracking creates the initial plan."}, {"text": "Budgeting is the financial plan, while tracking measures adherence to that plan.", "isCorrect": true, "rationale": "The text explicitly states: 'A budget is a plan... one is the plan, the other is the measurement.'"}, {"text": "Both budgeting and tracking are only necessary for people with debt.", "isCorrect": false, "rationale": "The text presents budgeting and tracking as universal financial practices, not limited to those with debt."}], "id": "q01"}, {"question": "Which of the following best defines spending tracking as presented in the text?", "options": [{"text": "The process of creating a financial plan for future income and expenses.", "isCorrect": false, "rationale": "This describes budgeting, not spending tracking."}, {"text": "The act of comparing one's spending with friends or family to identify discrepancies.", "isCorrect": false, "rationale": "While comparison might occur, this is not the core definition provided by the text."}, {"text": "The systematic recording of every purchase to assess actual spending against a budget.", "isCorrect": true, "rationale": "The text defines spending tracking as 'the practice of recording every purchase you make so that you can compare your actual spending to your budget.'"}, {"text": "A method used solely to identify fraudulent charges on bank statements.", "isCorrect": false, "rationale": "Identifying fraud may be a byproduct, but the primary purpose is comparing actual spending to a budget."}], "id": "q02"}, {"question": "The text states that people often underestimate their monthly spending by 25-50%. Which of the following is NOT presented as a primary reason for this 'gap between perception and reality'?", "options": [{"text": "The physical sensation of spending cash makes digital transactions feel less real.", "isCorrect": false, "rationale": "The text mentions 'Digital payments are invisible' and 'people spend more when using cards versus cash because the transaction feels abstract,' which aligns with this reason."}, {"text": "Individuals tend to forget the cumulative impact of many small, inexpensive purchases.", "isCorrect": false, "rationale": "The text states 'Small purchases feel insignificant' and 'these accumulate rapidly,' supporting this reason."}, {"text": "Most people intentionally conceal their true spending habits from themselves.", "isCorrect": true, "rationale": "The text does not suggest intentional concealment; rather, it highlights psychological factors like forgetting small purchases or the abstract nature of digital payments."}, {"text": "Our brains are more likely to recall significant, large expenditures than frequent, smaller ones.", "isCorrect": false, "rationale": "The text notes 'We remember the big purchases, not the small ones,' which is a direct reason given."}], "id": "q03"}, {"question": "A student finds they consistently overspend on impulse buys when using their mobile payment app, even though they have a budget for discretionary items. Based on the text, what is the most likely reason for this behavior?", "options": [{"text": "The mobile payment app provides less security, leading to careless spending.", "isCorrect": false, "rationale": "The text does not mention security as a factor in overspending."}, {"text": "The student is intentionally trying to undermine their own financial goals.", "isCorrect": false, "rationale": "The text attributes overspending to psychological factors and lack of awareness, not intentional sabotage."}, {"text": "Digital transactions lack the physical sensation of cash, making the spending feel less tangible.", "isCorrect": true, "rationale": "The text explicitly states: 'Digital payments are invisible. When you swipe a card or tap a phone, money leaves without the physical sensation that cash spending creates.'"}, {"text": "Mobile payment apps often have hidden fees that contribute to higher overall spending.", "isCorrect": false, "rationale": "Hidden fees are not mentioned as a reason for overspending in the context of perceived vs. actual spending."}], "id": "q04"}, {"question": "According to the text, what is a key benefit of tracking spending for even a short period?", "options": [{"text": "It guarantees immediate financial independence and wealth accumulation.", "isCorrect": false, "rationale": "While beneficial, tracking alone does not guarantee these outcomes, which require consistent effort over time."}, {"text": "It primarily helps in finding new ways to generate income.", "isCorrect": false, "rationale": "The text focuses on understanding and managing expenses, not income generation."}, {"text": "It reveals surprising spending categories, patterns, and forgotten recurring charges.", "isCorrect": true, "rationale": "The text lists 'Category totals that surprise them,' 'Patterns and triggers,' and 'Forgotten recurring charges' as typical discoveries from tracking."}, {"text": "It automatically adjusts your budget to match your actual spending.", "isCorrect": false, "rationale": "Tracking reveals discrepancies; the individual must then make conscious adjustments to their budget or spending."}], "id": "q05"}, {"question": "Jordan's experience, where they were over budget due to unbudgeted dining out and coffee/snack categories, best illustrates which crucial aspect of spending tracking?", "options": [{"text": "The necessity of always keeping dining out and groceries as separate budget categories.", "isCorrect": false, "rationale": "While a good practice, the core lesson is about identifying *any* overlooked spending, not just specific categories."}, {"text": "That some individuals are inherently bad at budgeting, regardless of tracking.", "isCorrect": false, "rationale": "Jordan's experience shows a learning opportunity, not an inherent inability, as tracking allowed them to 'fix the budget and make different choices.'"}, {"text": "How tracking identifies unacknowledged or miscategorized spending, enabling budget adjustments.", "isCorrect": true, "rationale": "Jordan 'had not budgeted separately for this' and a 'category that did not exist... because Jordan had not thought of it as a significant category. Tracking revealed both gaps.'"}, {"text": "The importance of having a budget so strict that no overspending is possible.", "isCorrect": false, "rationale": "The text advocates for understanding and adjusting, not necessarily an impossibly strict budget."}], "id": "q06"}, {"question": "The text emphasizes that 'Tracking Is Not Judgment—It Is Data.' What is the primary implication of this statement for someone engaging in spending tracking?", "options": [{"text": "Tracking should only be used to identify areas where spending can be drastically cut.", "isCorrect": false, "rationale": "The text states the goal is 'not to feel guilty about every purchase' and that if spending makes you happy and you can afford it, 'keep it and budget for it honestly.'"}, {"text": "The main purpose of tracking is to feel guilty about past financial mistakes.", "isCorrect": false, "rationale": "The text explicitly states: 'The goal is not to feel guilty about every purchase—it is to understand your patterns.'"}, {"text": "Tracking serves as a neutral tool for understanding spending patterns to inform future choices, not to assign blame.", "isCorrect": true, "rationale": "The text describes tracking as 'data collection, not a moral report card' and emphasizes using the information to 'make intentional decisions.'"}, {"text": "All spending decisions, regardless of financial impact, are equally acceptable once tracked.", "isCorrect": false, "rationale": "The text distinguishes between spending that aligns with goals and that which hinders them, implying not all spending is equally acceptable if goals are not being met."}], "id": "q07"}, {"question": "A person tracks their spending and discovers they spend $200 monthly on hobby-related items. They are consistently meeting their savings goals and feel happy with this expenditure. According to the text, what is the most appropriate action based on this information?", "options": [{"text": "Immediately cut all hobby spending to increase savings even further.", "isCorrect": false, "rationale": "The text advises against feeling guilty and suggests budgeting honestly if the spending makes you happy and you can afford it."}, {"text": "Feel guilty about spending on hobbies instead of necessities.", "isCorrect": false, "rationale": "The text explicitly states that tracking is not about judgment or guilt, but about understanding and making intentional choices."}, {"text": "Budget for the $200 hobby expenditure honestly, as it aligns with their financial goals and happiness.", "isCorrect": true, "rationale": "The text says: 'If tracking reveals that you spend $150/month on dining out and that makes you happy and you can afford it, that is useful information. Keep it and budget for it honestly.'"}, {"text": "Stop tracking spending since this category doesn't seem to be a problem.", "isCorrect": false, "rationale": "Tracking provides ongoing data and context, even for categories that are currently well-managed."}], "id": "q08"}, {"question": "Why does the 'Money Tip' suggest checking your budget and actual spending weekly rather than only at the end of the month?", "options": [{"text": "Weekly checks prevent any spending deviations whatsoever.", "isCorrect": false, "rationale": "Weekly checks help correct deviations, but they don't guarantee their complete prevention."}, {"text": "It allows for early course correction, preventing small overspends from becoming significant problems.", "isCorrect": true, "rationale": "The text states: 'A mid-month check-in lets you correct course before the damage compounds... instead of discovering the problem after the month is over.'"}, {"text": "Most financial apps only update spending data on a weekly basis.", "isCorrect": false, "rationale": "The text does not mention limitations of financial apps as a reason."}, {"text": "End-of-month checks are inherently less accurate than weekly ones.", "isCorrect": false, "rationale": "Accuracy isn't the issue; timeliness for intervention is the benefit of weekly checks."}], "id": "q09"}, {"question": "Based on the entire section 'Why Track Spending?', which statement best encapsulates its core message?", "options": [{"text": "Strict adherence to a budget is impossible without professional financial guidance.", "isCorrect": false, "rationale": "The text empowers individuals to manage their own spending through tracking and budgeting, without suggesting professional guidance is strictly necessary."}, {"text": "Spending tracking is primarily about identifying unnecessary purchases to cut them completely.", "isCorrect": false, "rationale": "While identifying overspending is a part, the text emphasizes understanding patterns for intentional decisions, not just cutting everything."}, {"text": "Understanding where your money actually goes, even small amounts, is crucial for effective budgeting and intentional financial decision-making.", "isCorrect": true, "rationale": "The section repeatedly highlights the gap between perception and reality, the accumulation of small purchases, and how tracking provides data to make informed, intentional decisions to align spending with financial plans and goals."}, {"text": "Most people are naturally aware of their spending, making tracking largely redundant for personal finance.", "isCorrect": false, "rationale": "The text explicitly states the opposite, highlighting the significant 'gap between perception and reality' regarding spending."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
