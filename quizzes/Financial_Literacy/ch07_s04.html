<body>
<div class="quiz-container">

        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 7, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is Alex's total monthly net income available for budgeting?", "options": [{"text": "$2,160", "isCorrect": false, "rationale": "This amount is not mentioned as Alex's net income. It might represent a gross income before deductions."}, {"text": "$1,600", "isCorrect": true, "rationale": "The text explicitly states in 'Step 1: Establish Monthly Income' that Alex's 'Monthly net income = $1,600'."}, {"text": "$1,300", "isCorrect": false, "rationale": "This amount is not stated as Alex's net monthly income in the provided scenario."}, {"text": "$1,800", "isCorrect": false, "rationale": "This amount is not stated as Alex's net monthly income in the provided scenario."}], "id": "q01"}, {"question": "Which of the following items from Alex's budget would be categorized as a fixed expense?", "options": [{"text": "Groceries", "isCorrect": false, "rationale": "Groceries are listed under 'Variable Needs' because their cost can change month to month, though they are necessary."}, {"text": "Car insurance", "isCorrect": true, "rationale": "The text explicitly lists 'Car insurance' under 'Step 2: List Fixed Expenses First', defining fixed expenses as 'locked in and non-negotiable'."}, {"text": "Gas (transportation to work)", "isCorrect": false, "rationale": "Gas is listed under 'Variable Needs' as its cost fluctuates based on usage and fuel prices."}, {"text": "Dining out / food delivery", "isCorrect": false, "rationale": "Dining out is listed under 'Wants and Giving', representing discretionary spending rather than a fixed expense."}], "id": "q02"}, {"question": "After covering all fixed expenses and variable needs, how much money does Alex have remaining to allocate towards savings, wants, and giving?", "options": [{"text": "$869", "isCorrect": false, "rationale": "This is the amount remaining after only fixed expenses ($1,600 - $731)."}, {"text": "$731", "isCorrect": false, "rationale": "This is the total amount of Alex's fixed expenses, not the remaining balance."}, {"text": "$474", "isCorrect": true, "rationale": "The text states that after fixed expenses ($731) and variable needs ($395), Alex has '$869 - $395 = $474' remaining."}, {"text": "$199", "isCorrect": false, "rationale": "This is the amount remaining after assigning savings goals, before allocating to wants and giving."}], "id": "q03"}, {"question": "The concept of 'paying yourself first' in budgeting, as demonstrated in Alex's scenario, primarily involves what action?", "options": [{"text": "Prioritizing discretionary spending like dining out and entertainment.", "isCorrect": false, "rationale": "This describes allocating funds to 'wants,' which comes after 'paying yourself first' (savings)."}, {"text": "Allocating funds to savings goals before assigning money to wants.", "isCorrect": true, "rationale": "The text states, 'Before spending on wants, Alex assigns money to savings. This is 'paying yourself first'.'"}, {"text": "Paying all fixed expenses before any other category.", "isCorrect": false, "rationale": "While fixed expenses are paid first, 'paying yourself first' specifically refers to prioritizing savings over discretionary spending."}, {"text": "Ensuring the budget ends with $0 remaining.", "isCorrect": false, "rationale": "This is the ultimate goal of zero-based budgeting, but 'paying yourself first' is a specific strategy within it, focused on savings."}], "id": "q04"}, {"question": "Which of the following statements best describes the outcome of Alex's completed budget, adhering to a zero-based budgeting approach?", "options": [{"text": "Alex has a surplus of $29 left over after all expenses.", "isCorrect": false, "rationale": "A zero-based budget aims for $0 remaining, meaning all income is allocated, not a surplus."}, {"text": "Every dollar of Alex's income has been assigned a specific purpose.", "isCorrect": true, "rationale": "The text explains, 'The completed budget assigns all $1,600 to categories... Remaining: $199 - $199 = $0,' which is the core principle of zero-based budgeting."}, {"text": "Alex can only spend money on fixed expenses and variable needs.", "isCorrect": false, "rationale": "Alex's budget also includes significant allocations for savings goals and 'wants and giving'."}, {"text": "Alex has successfully identified areas to cut spending by 10%.", "isCorrect": false, "rationale": "While budgeting can reveal areas for cuts, the primary outcome described for a completed zero-based budget is the allocation of all income."}], "id": "q05"}, {"question": "Based on the financial goal guidelines provided, how well is Alex performing in terms of monthly savings?", "options": [{"text": "Alex is saving exactly 10%, meeting the minimum requirement.", "isCorrect": false, "rationale": "Alex is saving more than 10%, specifically 17.2%."}, {"text": "Alex's savings are below the recommended 10%, indicating a need for adjustment.", "isCorrect": false, "rationale": "Alex's savings are above the recommended minimum, not below."}, {"text": "Alex is saving 17.2%, which is above the minimum recommended 10%.", "isCorrect": true, "rationale": "The text explicitly states: '(Alex: $275 of $1,600 = 17.2%—above the minimum. Good.)'."}, {"text": "Alex's savings are too high, potentially restricting necessary spending.", "isCorrect": false, "rationale": "The text describes Alex's savings as 'Good,' implying it's not excessively high but a strong financial habit."}], "id": "q06"}, {"question": "Alex's housing cost percentage is 34.4% of net income. According to the budget guidelines, what does this indicate about Alex's housing situation?", "options": [{"text": "It is well below the recommended range, offering significant flexibility.", "isCorrect": false, "rationale": "34.4% is at the upper end of the 30-35% range, not well below it."}, {"text": "It is exactly within the ideal range, requiring no further consideration.", "isCorrect": false, "rationale": "The text states it's 'just at the upper edge. Ideally lower,' suggesting it's not perfectly ideal."}, {"text": "It is at the upper edge of the recommended range and ideally should be lower.", "isCorrect": true, "rationale": "The text explicitly states: '(Alex: 34.4%—just at the upper edge. Ideally lower.)'."}, {"text": "It is significantly above the recommended range, indicating a major financial burden.", "isCorrect": false, "rationale": "While it's at the upper edge, the text qualifies it as 'just at,' not 'significantly above,' and doesn't explicitly call it a 'major financial burden' in this context."}], "id": "q07"}, {"question": "According to the 'moneytip' section, when is the most effective time to build your monthly budget?", "options": [{"text": "During the first week of the month to account for initial spending.", "isCorrect": false, "rationale": "The moneytip explicitly states to build it 'before the month begins—not during or after'."}, {"text": "On the last day of the previous month, as a plan for the future.", "isCorrect": true, "rationale": "The moneytip advises, 'A budget written before the 1st is a plan for the future. Many people find it helpful to spend 15–20 minutes on the last day of each month building next month's budget'."}, {"text": "After the month ends, to accurately record all actual expenditures.", "isCorrect": false, "rationale": "The text clarifies that a budget written at the end of the month is 'just a record of the past,' not a plan."}, {"text": "Whenever an unexpected expense arises, to adjust categories.", "isCorrect": false, "rationale": "While adjustments are necessary, proactive budget building is done before the month, not reactively when surprises occur."}], "id": "q08"}, {"question": "Alex initially forgot to budget for an annual car registration fee of $120, which is due in three months. Based on the 'warning' section, what is the best way for Alex to incorporate this expense into the zero-based budget moving forward?", "options": [{"text": "Cut an equivalent amount from 'Wants and Giving' in the month the fee is due.", "isCorrect": false, "rationale": "This is a reactive approach that doesn't use a sinking fund and could cause a budget strain in that specific month."}, {"text": "Create a sinking fund by assigning $40 each month to a 'Car Registration' category for the next three months.", "isCorrect": true, "rationale": "The 'warning' section advises using 'sinking funds (saving a small amount each month) to prepare for' irregular expenses like annual fees, preventing them from 'blow[ing] up your budget'."}, {"text": "Add it as a new fixed expense in the current month's budget.", "isCorrect": false, "rationale": "An annual fee is an irregular expense, not a monthly fixed expense, so adding it as fixed for one month would be inaccurate and disrupt the budget."}, {"text": "Borrow money from the emergency fund when the fee is due.", "isCorrect": false, "rationale": "The emergency fund is for unexpected emergencies, not for predictable irregular expenses that can be planned for with sinking funds."}], "id": "q09"}, {"question": "What is the logical sequence of steps Alex follows to build a zero-based budget, as presented in the section?", "options": [{"text": "List fixed expenses, establish income, assign savings, assign variable needs, assign wants.", "isCorrect": false, "rationale": "This sequence incorrectly places 'establish income' and 'list fixed expenses' and mixes the order of variable needs and savings."}, {"text": "Establish income, list fixed expenses, assign variable needs, assign savings goals, assign wants and giving.", "isCorrect": true, "rationale": "This precisely matches the 'Step 1,' 'Step 2,' 'Step 3,' 'Step 4,' and 'Step 5' headings in the text."}, {"text": "Assign variable needs, establish income, list fixed expenses, assign wants, assign savings.", "isCorrect": false, "rationale": "This sequence begins incorrectly with variable needs and has an incorrect order for several steps."}, {"text": "Establish income, assign savings, list fixed expenses, assign variable needs, assign wants and giving.", "isCorrect": false, "rationale": "This sequence incorrectly places 'assign savings' before 'list fixed expenses' and 'assign variable needs'."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
