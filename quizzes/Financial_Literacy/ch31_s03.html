        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 31, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the word $tithe$ literally mean, based on its Old English origin?", "options": [{"text": "Tenth", "isCorrect": true, "rationale": "The section states that 'tithe' comes from the Old English word for 'tenth,' reflecting the traditional 10% giving rate in Christian tradition."}, {"text": "Gift", "isCorrect": false, "rationale": "The Old English origin of 'tithe' means 'tenth,' not gift. The concept of giving is implied, but the literal meaning is a fraction."}, {"text": "Offering", "isCorrect": false, "rationale": "'Offering' is not the literal translation of the Old English root. The word tithe specifically refers to one-tenth."}, {"text": "Pledge", "isCorrect": false, "rationale": "'Pledge' does not reflect the Old English origin of tithe. The word literally means tenth."}], "id": "q01"}, {"question": "In Christian tradition, tithing typically refers to giving what percentage of income?", "options": [{"text": "2.5%", "isCorrect": false, "rationale": "2.5% of accumulated net assets is the rate for zakat in Islam, not the Christian tithe."}, {"text": "5%", "isCorrect": false, "rationale": "5% is not the traditional Christian tithing percentage. The traditional tithe is 10%."}, {"text": "10%", "isCorrect": true, "rationale": "The section states that in Christian tradition, a tithe refers to giving 10% of one's income, originally to the local church or religious community."}, {"text": "20%", "isCorrect": false, "rationale": "20% is the upper range of the Jewish tzedakah guideline, not the standard Christian tithe amount."}], "id": "q02"}, {"question": "The Hebrew practice of $tzedakah$ is best described as:", "options": [{"text": "A voluntary virtue practiced only by the wealthy as an act of charity.", "isCorrect": false, "rationale": "Tzedakah is rooted in the word for 'righteousness' or 'justice' and is considered a moral obligation, not an optional virtue for the wealthy."}, {"text": "Charitable giving as a moral obligation, rooted in the concept of righteousness or justice, suggesting 10–20% of income.", "isCorrect": true, "rationale": "The section explains that tzedakah comes from the root word for 'righteousness/justice' and is treated as a moral obligation, with 10% as the minimum and 20% as the upper guideline."}, {"text": "A tax levied by rabbinical courts on Jewish communities to fund communal institutions.", "isCorrect": false, "rationale": "Tzedakah is a personal giving practice rooted in religious law, not a communal tax levied by courts."}, {"text": "A one-time giving ceremony performed during major Jewish holidays.", "isCorrect": false, "rationale": "Tzedakah is an ongoing giving practice described as a moral obligation, not a one-time ceremonial act."}], "id": "q03"}, {"question": "How is $zakat$ in Islam different from income-based tithing in Christianity?", "options": [{"text": "Zakat is 10% of income while tithing is 2.5% of assets.", "isCorrect": false, "rationale": "The percentages are reversed. Zakat is 2.5% of accumulated net assets; the Christian tithe is traditionally 10% of income."}, {"text": "Zakat is calculated on total accumulated wealth held for a lunar year, not just earnings, and the rate is 2.5%.", "isCorrect": true, "rationale": "The section explains that zakat is calculated on total net assets (above a minimum threshold called nisab) held for a lunar year — unlike income-based tithes — and the rate is 2.5%."}, {"text": "Zakat is a free-will offering while Christian tithing is legally mandated by church law.", "isCorrect": false, "rationale": "Zakat is one of the Five Pillars of Islam — a religious requirement — while Christian tithing varies in how strictly it is applied across denominations."}, {"text": "Zakat is paid to the government as a tax, while tithing goes to religious institutions.", "isCorrect": false, "rationale": "Zakat goes to specified categories of recipients (the poor, etc.) and is a religious obligation, not a government tax, in the context described."}], "id": "q04"}, {"question": "What is the minimum wealth threshold called in Islamic zakat calculations?", "options": [{"text": "Tzedakah", "isCorrect": false, "rationale": "Tzedakah is the Hebrew/Jewish term for charitable giving, not an Islamic wealth threshold."}, {"text": "Dana", "isCorrect": false, "rationale": "Dana is the Buddhist concept of generosity, not the Islamic wealth threshold for zakat."}, {"text": "Nisab", "isCorrect": true, "rationale": "The section states that Muslims who meet a minimum wealth threshold called nisab must give zakat — 2.5% of their accumulated net assets annually."}, {"text": "Tithe", "isCorrect": false, "rationale": "Tithe is the Old English word for 'tenth' used in Christian tradition. Nisab is the specific Islamic term for the wealth threshold."}], "id": "q05"}, {"question": "Which of the following correctly matches a religious tradition with its giving concept?", "options": [{"text": "Buddhism — zakat; Islam — dana; Judaism — tithe", "isCorrect": false, "rationale": "These are mismatched. Zakat belongs to Islam, dana to Buddhism, and tzedakah to Judaism."}, {"text": "Buddhism — dana; Islam — zakat; Judaism — tzedakah", "isCorrect": true, "rationale": "The section correctly identifies dana as the Buddhist generosity concept, zakat as the Islamic pillar, and tzedakah as the Hebrew charitable giving obligation."}, {"text": "Christianity — tzedakah; Judaism — tithe; Islam — dana", "isCorrect": false, "rationale": "These are mismatched. Tithe belongs to Christianity, tzedakah to Judaism, and dana to Buddhism."}, {"text": "Islam — tithe; Buddhism — tzedakah; Christianity — zakat", "isCorrect": false, "rationale": "All three are mismatched. Tithe is Christian, tzedakah is Jewish, zakat is Islamic."}], "id": "q06"}, {"question": "What is the key financial planning benefit of $percentage-based giving$?", "options": [{"text": "It guarantees the donation qualifies for a tax deduction each year.", "isCorrect": false, "rationale": "Tax deductibility depends on itemizing and exceeding the standard deduction — not on using percentage-based giving."}, {"text": "It scales automatically with income — giving grows when income grows and decreases when income drops, without recalculation.", "isCorrect": true, "rationale": "The section highlights this as the practical benefit: percentage-based giving requires no renegotiation. The percentage does the work as income changes."}, {"text": "It allows you to give less total money over a lifetime than fixed-dollar giving.", "isCorrect": false, "rationale": "The section does not make a comparison between total lifetime amounts. The benefit is the automatic scaling, not a reduction in total giving."}, {"text": "It ensures giving stays below the standard deduction threshold to avoid complicated taxes.", "isCorrect": false, "rationale": "The section does not frame percentage giving as a tax avoidance strategy. The benefit described is income-proportional scaling."}], "id": "q07"}, {"question": "Using the section's table, what is the monthly gift at a 10% rate for someone earning $60,000 annually?", "options": [{"text": "$333", "isCorrect": false, "rationale": "$333/month is the result for a $40,000 annual income at 10% ($4,000 ÷ 12 ≈ $333)."}, {"text": "$500", "isCorrect": true, "rationale": "10% of $60,000 = $6,000 per year; $6,000 ÷ 12 = $500/month. The section's table shows this explicitly."}, {"text": "$600", "isCorrect": false, "rationale": "$600/month would equal $7,200/year, which is 12% of $60,000 — not 10%."}, {"text": "$667", "isCorrect": false, "rationale": "$667/month corresponds to the $80,000 income row in the table (10% of $80,000 = $8,000 ÷ 12 ≈ $667)."}], "id": "q08"}, {"question": "What does the etymology of the word $philanthropy$ reveal about its meaning?", "options": [{"text": "It comes from the Latin words for 'free' and 'money,' meaning a voluntary financial gift.", "isCorrect": false, "rationale": "Philanthropy comes from ancient Greek, not Latin, and the roots mean 'loving' and 'human,' not 'free' and 'money.'"}, {"text": "It comes from the ancient Greek words for 'loving' (philos) and 'human' (anthropos), meaning 'love of humanity.'", "isCorrect": true, "rationale": "The 'Did You Know' sidebar in the section states this etymology exactly: philos (loving) + anthropos (human) = love of humanity."}, {"text": "It comes from the Hebrew word for righteousness, linking charity to justice.", "isCorrect": false, "rationale": "That etymology describes tzedakah. Philanthropy derives from ancient Greek roots meaning 'love of humanity.'"}, {"text": "It comes from the Old English word for 'tenth,' signifying a traditional tithing practice.", "isCorrect": false, "rationale": "The Old English 'tenth' etymology belongs to 'tithe.' Philanthropy has Greek roots meaning 'love of humanity.'"}], "id": "q09"}, {"question": "Which statement best reflects the section's stance on which giving tradition or percentage is correct?", "options": [{"text": "The section recommends 10% as the universal standard because it is supported by the most religious traditions.", "isCorrect": false, "rationale": "The section explicitly does not recommend any specific percentage. It presents giving traditions as factual information, not prescriptions."}, {"text": "The specific percentage, recipients, and motivation for giving are entirely personal — no single practice is recommended.", "isCorrect": true, "rationale": "The section states directly: 'The specific percentage, the recipients, and the motivation for giving are entirely personal.' All choices are described as valid."}, {"text": "Faith-based giving is superior to secular giving because it is rooted in thousands of years of tradition.", "isCorrect": false, "rationale": "The section presents faith traditions respectfully and factually but does not declare faith-based giving superior to secular approaches."}, {"text": "Giving money is always more meaningful than volunteering time.", "isCorrect": false, "rationale": "The section mentions volunteering time as a valid alternative to financial giving — not inferior to it."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
