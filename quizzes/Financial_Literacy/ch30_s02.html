<script>
var QUESTIONS = [{"question": "What is the primary characteristic of an organization to which donations can receive a charitable deduction?", "options": [{"text": "It primarily serves local community needs.", "isCorrect": false, "rationale": "While many qualified charities serve local needs, this is not the universal legal characteristic for a charitable deduction. The text specifies a legal classification."}, {"text": "It is a 501(c)(3) organization recognized by the IRS.", "isCorrect": true, "rationale": "The text explicitly defines a qualified tax-exempt organization as commonly called a 501(c)(3) organization, which is the IRS classification required for donations to be deductible."}, {"text": "It is an organization that does not solicit political donations.", "isCorrect": false, "rationale": "While 501(c)(3) organizations are generally non-political, the defining characteristic for a deduction is its 501(c)(3) status itself, not merely the absence of political solicitation."}, {"text": "It provides direct financial assistance to individuals in need.", "isCorrect": false, "rationale": "Qualified charities encompass a wide range of purposes beyond direct financial assistance, such as education, arts, environmental protection, and medical research. This is too narrow a definition."}], "id": "q01"}, {"question": "According to the text, what is a prerequisite for an individual to claim a charitable deduction on their tax return?", "options": [{"text": "Their total adjusted gross income must be below a certain threshold.", "isCorrect": false, "rationale": "The text does not mention an adjusted gross income threshold as a prerequisite for claiming a deduction, although income levels can influence the overall tax situation."}, {"text": "They must donate at least 10% of their annual income to charity.", "isCorrect": false, "rationale": "The text does not specify any percentage of income that must be donated to claim a deduction. This is an unsupported claim."}, {"text": "They must choose to itemize deductions on their tax return.", "isCorrect": true, "rationale": "The text states, 'to claim a charitable deduction, you must itemize deductions on your tax return,' highlighting this as 'the key concept.'"}, {"text": "The charitable donation must exceed a minimum amount set by the IRS.", "isCorrect": false, "rationale": "While there might be overall limits on how much can be deducted, the text emphasizes the necessity of itemizing deductions rather than a minimum amount per donation to qualify for claiming it."}], "id": "q02"}, {"question": "Why do most young, single earners often not receive an additional tax benefit from their charitable donations?", "options": [{"text": "Their charitable donations are typically too small to qualify for any deduction.", "isCorrect": false, "rationale": "The size of the individual donation is not the primary factor; the issue is the total sum of all itemized deductions."}, {"text": "They are usually in lower tax brackets, which negates the benefit.", "isCorrect": false, "rationale": "Being in a lower tax bracket reduces the *amount* of tax savings, but it doesn't negate the benefit *if* they itemize. The issue is usually not itemizing at all."}, {"text": "Their total itemized deductions, including donations, are usually less than the standard deduction.", "isCorrect": true, "rationale": "The text explicitly states that 'For most young, single earners with no mortgage, total itemized deductions are usually below 14,600. This means most young people do not receive any additional tax benefit from charitable giving.'"}, {"text": "Young donors are often unaware of the tax benefits available to them.", "isCorrect": false, "rationale": "While awareness may be a factor, the text identifies the financial reality of their itemized deductions falling below the standard deduction as the reason they don't receive additional tax benefits."}], "id": "q03"}, {"question": "A single filer has mortgage interest of $8,000, state and local taxes of $4,000, and donates $3,000 to qualified charities. Based on the 2024 standard deduction for a single filer ($14,600), what is the most advantageous deduction for this individual to take?", "options": [{"text": "Itemized deductions, resulting in a $15,000 deduction.", "isCorrect": true, "rationale": "The total itemized deductions are $8,000 (mortgage interest) + $4,000 (state and local taxes) + $3,000 (charitable donations) = $15,000. Since $15,000 is greater than the standard deduction of $14,600, itemizing provides a larger deduction."}, {"text": "The standard deduction, resulting in a $14,600 deduction.", "isCorrect": false, "rationale": "The standard deduction is $14,600. However, the total itemized deductions are $15,000, which is higher, making itemizing more advantageous."}, {"text": "Only the charitable donation deduction, resulting in a $3,000 deduction.", "isCorrect": false, "rationale": "Deductions are typically combined, not taken individually in this manner. An individual chooses between the total itemized deductions or the standard deduction, whichever is greater."}, {"text": "They cannot take any deduction as the charitable donation alone doesn't exceed the standard deduction.", "isCorrect": false, "rationale": "This statement is incorrect because all eligible itemized deductions are combined before comparing to the standard deduction. In this scenario, their combined itemized deductions do exceed the standard deduction."}], "id": "q04"}, {"question": "The 'moneytip' section emphasizes that giving is a 'values decision.' What does this statement imply about the role of tax benefits in charitable giving?", "options": [{"text": "Tax benefits are the primary financial incentive that encourages people to give generously.", "isCorrect": false, "rationale": "The text explicitly states, 'The tax benefit is a bonus for those who happen to itemize — not the primary reason to give,' directly contradicting this option."}, {"text": "Donors should only give to charity if they can receive a significant tax deduction.", "isCorrect": false, "rationale": "The 'moneytip' states, 'Just because you do not get a tax deduction does not mean giving is financially unwise,' indicating that giving is not contingent on tax benefits."}, {"text": "The intrinsic desire to support a cause is more important than any potential tax advantage.", "isCorrect": true, "rationale": "By calling giving a 'values decision' and describing tax benefits as a 'bonus,' the text emphasizes that the personal motivation and impact of giving outweigh the financial incentive of a deduction."}, {"text": "Financial planning for tax benefits is generally more important than the choice of charity.", "isCorrect": false, "rationale": "The text prioritizes the 'values decision' of giving, implying the choice of charity and its support are primary, with tax benefits being secondary."}], "id": "q05"}, {"question": "A married couple filing jointly is in the 22% tax bracket and donates $3,500 to a qualified charity. If they itemize deductions, what is their effective out-of-pocket cost for this donation?", "options": [{"text": "$3,500", "isCorrect": false, "rationale": "This amount would be the cost if there were no tax savings. Since they itemize, they receive a tax benefit."}, {"text": "$2,730", "isCorrect": true, "rationale": "Tax savings are calculated as Donation * Tax Bracket Rate: $3,500 * 0.22 = $770. The effective out-of-pocket cost is the donation minus tax savings: $3,500 - $770 = $2,730."}, {"text": "$770", "isCorrect": false, "rationale": "This amount represents the tax savings from the donation, not the effective out-of-pocket cost."}, {"text": "$2,250", "isCorrect": false, "rationale": "This calculation is incorrect. The correct calculation involves multiplying the donation by the tax bracket rate and subtracting that from the original donation."}], "id": "q06"}, {"question": "How does an individual's tax bracket influence the tax savings derived from a charitable deduction?", "options": [{"text": "A higher tax bracket means the charitable deduction itself is larger.", "isCorrect": false, "rationale": "The charitable deduction amount is the amount of the donation, not directly influenced by the tax bracket. The tax bracket influences the *value* of that deduction."}, {"text": "Individuals in lower tax brackets receive a greater percentage of their donation back in tax savings.", "isCorrect": false, "rationale": "The text clearly states the opposite: a lower tax bracket results in a smaller percentage and dollar amount of tax savings for the same donation."}, {"text": "The higher the tax bracket, the larger the dollar amount of tax savings for the same donation.", "isCorrect": true, "rationale": "The text explicitly states, 'The higher your tax bracket, the larger the effective subsidy,' meaning a higher tax bracket results in greater tax savings for the same donation amount."}, {"text": "Tax brackets only affect whether someone can itemize, not the amount of savings.", "isCorrect": false, "rationale": "Tax brackets do not affect the ability to itemize; rather, they directly influence the financial benefit received from itemized deductions, including charitable giving."}], "id": "q07"}, {"question": "Which scenario best illustrates the strategic use of a Donor-Advised Fund (DAF) for 'bunching' as described in the text?", "options": [{"text": "A donor making small, regular donations to multiple charities throughout the year to ensure consistent support.", "isCorrect": false, "rationale": "This describes regular giving, not the 'bunching' strategy which involves consolidating donations into a single year for tax purposes."}, {"text": "A donor contributes $9,000 to a DAF in a single tax year to potentially exceed the standard deduction, then distributes $3,000 annually to charities over the next three years.", "isCorrect": true, "rationale": "This scenario directly matches the example of 'bunching' provided in the text, where a large donation is made to a DAF in one year for an immediate deduction, then distributed over subsequent years."}, {"text": "A donor uses a DAF to keep their donations anonymous from the public and the charities.", "isCorrect": false, "rationale": "While DAFs can offer anonymity, the text focuses on 'bunching' as the strategic benefit, not anonymity, for the purpose of tax benefits."}, {"text": "A donor creates a DAF to invest their charitable contributions, hoping to grow the fund before distributing to charities.", "isCorrect": false, "rationale": "DAFs can indeed involve investment, but the text's explanation of 'bunching' specifically highlights consolidating donations for an immediate deduction, not primarily for investment growth."}], "id": "q08"}, {"question": "The 'warning' section advises consulting a tax professional. What is the most critical reason given for this recommendation?", "options": [{"text": "To ensure donations are made to the most impactful charities.", "isCorrect": false, "rationale": "Tax professionals primarily provide tax advice, not guidance on the impactfulness of charities. That falls under philanthropic advising."}, {"text": "Because tax laws, including deduction limits and rules, are subject to change over time.", "isCorrect": true, "rationale": "The warning states, 'Tax laws change. Always verify current deduction limits and rules — this chapter provides educational guidance only, not tax advice. Consult a tax professional for your specific situation.' This explicitly highlights the dynamic nature of tax laws."}, {"text": "To avoid making financially unwise giving decisions.", "isCorrect": false, "rationale": "While a tax professional can help optimize financial decisions, the specific emphasis in the 'warning' is on the changing nature of tax laws, rather than general financial prudence."}, {"text": "To understand how giving can improve one's overall financial generosity.", "isCorrect": false, "rationale": "The focus of the warning is on the legal and regulatory aspects of tax deductions, not broader concepts of financial generosity, which are typically addressed elsewhere in the textbook."}], "id": "q09"}, {"question": "Suppose a single filer is in the 12% tax bracket and donates $500 to a qualified charity. Their other itemized deductions total $13,000. Based on the 2024 standard deduction for a single filer ($14,600), what is the effective out-of-pocket cost for their $500 donation?", "options": [{"text": "$500, because their total itemized deductions do not exceed the standard deduction.", "isCorrect": true, "rationale": "Total itemized deductions ($13,000 + $500 = $13,500) are less than the standard deduction ($14,600). Therefore, the individual would take the standard deduction, and the charitable donation provides no *additional* tax benefit, meaning the full $500 is paid out-of-pocket."}, {"text": "$440, as they receive a $60 tax saving from the donation.", "isCorrect": false, "rationale": "This calculation would only apply if they itemized and gained a tax benefit from the donation. In this scenario, they do not itemize."}, {"text": "$490, as they are in the 12% bracket.", "isCorrect": false, "rationale": "This calculation is incorrect. Even if they itemized, $500 * 0.12 = $60 in savings, making the cost $440, but this doesn't apply here as they don't itemize."}, {"text": "$0, because the donation fully offsets their tax liability.", "isCorrect": false, "rationale": "A donation reduces taxable income; it does not typically offset the entire tax liability, and certainly not if the individual does not itemize deductions."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
