<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 29, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary purpose of an emergency fund, as described in the text, during a period of income disruption?", "options": [{"text": "To provide funds for investing in new skills training or education.", "isCorrect": false, "rationale": "While training might be considered during job loss, the primary purpose of an emergency fund is not investment but rather providing a financial buffer against immediate income loss to prevent debt."}, {"text": "To offer a financial buffer that prevents going into debt while actively searching for new income.", "isCorrect": true, "rationale": "The text explicitly states that an emergency fund 'gives you time to find new income without going into debt,' making it the first line of defense."}, {"text": "To replace 100% of lost income indefinitely until a new job is secured.", "isCorrect": false, "rationale": "The text recommends 3–6 months of living expenses, not an indefinite 100% replacement of income. Unemployment benefits also only replace part of previous wages."}, {"text": "To allow individuals to take an unplanned vacation without financial stress immediately after job loss.", "isCorrect": false, "rationale": "The purpose of an emergency fund is for financial security, not leisure. Furthermore, unemployment benefits require active job searching."}]}, {"question": "A person facing job loss considers withdrawing $5,000 from their traditional 401(k) to cover immediate expenses, believing it's their only option. Based on the 'moneytip' warning, what is the most significant financial consequence they should anticipate from this action?", "options": [{"text": "An increase in their credit score due to quick access to funds.", "isCorrect": false, "rationale": "Withdrawing from a retirement account has no direct positive impact on a credit score. In fact, it's often a sign of financial distress."}, {"text": "The loss of future investment gains only, with no immediate penalties.", "isCorrect": false, "rationale": "While future investment gains are lost, the text specifically highlights immediate penalties and taxes as a significant consequence."}, {"text": "A penalty of 10% plus income taxes on the withdrawn amount.", "isCorrect": true, "rationale": "The 'moneytip' explicitly warns that early withdrawal from a traditional IRA or 401(k) before age 59 typically results in a '10% penalty plus income taxes on the withdrawal.'"}, {"text": "Mandatory enrollment in a financial literacy course to prevent future withdrawals.", "isCorrect": false, "rationale": "This is not a stated consequence of early retirement account withdrawals."}]}, {"question": "Sarah was fired from her job for consistent poor performance and absenteeism. She plans to apply for unemployment benefits next month after a short break. Based on the text, what is the most likely outcome of her plan?", "options": [{"text": "She will receive full benefits immediately due to her previous employment history.", "isCorrect": false, "rationale": "Unemployment benefits are not immediate due to a waiting period, and eligibility requires not being at fault for job loss."}, {"text": "Her application will likely be denied because she lost her job 'through no fault of her own.'", "isCorrect": true, "rationale": "The text states eligibility for unemployment benefits is 'If you lose your job through no fault of your own (layoff, company closure).' Losing a job due to poor performance is generally considered 'fault of her own.'"}, {"text": "She will qualify, but her benefits will be reduced due to the waiting period.", "isCorrect": false, "rationale": "The primary barrier here is eligibility, not just the waiting period. Even if eligible, delaying the application would further reduce the total benefit period."}, {"text": "She will be required to take a skills inventory before applying.", "isCorrect": false, "rationale": "A skills inventory is a proactive step for job seekers, not a requirement for applying for unemployment benefits."}]}, {"question": "Which statement best describes a crucial financial detail often overlooked regarding unemployment benefits?", "options": [{"text": "They are always equivalent to 100% of previous weekly wages.", "isCorrect": false, "rationale": "The text states benefits typically replace 'about 40–50% of your previous weekly wages,' not 100%."}, {"text": "They are automatically tax-exempt and do not affect one's annual tax liability.", "isCorrect": false, "rationale": "The 'warning' explicitly states, 'Unemployment benefits are taxable income. Many people do not realize this and end up with a tax bill at the end of the year.'"}, {"text": "They are considered taxable income, and without withholding, can lead to a surprise tax bill.", "isCorrect": true, "rationale": "The text warns that unemployment benefits are taxable income and advises choosing to have federal income tax withheld to avoid a surprise tax bill."}, {"text": "They are only available for a maximum of 12 weeks regardless of the state.", "isCorrect": false, "rationale": "The text states 'Most states provide benefits for up to 26 weeks (about 6 months), though this varies,' which is longer than 12 weeks."}]}, {"question": "Upon experiencing income disruption, what is the *first and most immediate* type of expense reduction recommended by the text?", "options": [{"text": "Contacting lenders to defer loan payments.", "isCorrect": false, "rationale": "Contacting lenders is listed as the third priority after cutting non-essential and variable expenses."}, {"text": "Halting all retirement contributions.", "isCorrect": false, "rationale": "Pausing investing temporarily is listed as the fourth priority."}, {"text": "Eliminating non-essential subscriptions like streaming services and gym memberships.", "isCorrect": true, "rationale": "The text's priority list begins with 'Cancel non-essential subscriptions immediately (streaming services, gym memberships, subscription boxes). These are easy cuts that add up fast.'"}, {"text": "Reducing essential utility payments.", "isCorrect": false, "rationale": "The text explicitly warns against stopping essential payments like utilities without a plan due to severe consequences."}]}, {"question": "John has lost his job and is struggling to cover his essential bills. He is considering skipping his car payment for a month to ensure he can pay for food and utilities. According to the text's warning, what is the potential danger of this approach without a plan?", "options": [{"text": "His credit score will slightly decrease, but he can recover it quickly.", "isCorrect": false, "rationale": "While a credit score decrease is true, the text highlights a more severe and immediate consequence for non-payment of essential bills like car payments."}, {"text": "He risks repossession of his car, making his transportation issue worse.", "isCorrect": true, "rationale": "The 'warning' explicitly states that 'car payment... non-payment — ...repossession can happen quickly and make a bad situation much worse.' This is a direct and severe consequence."}, {"text": "He will be unable to apply for unemployment benefits.", "isCorrect": false, "rationale": "Skipping a car payment is unrelated to unemployment benefit eligibility."}, {"text": "He will be forced to sell personal items to make up the difference.", "isCorrect": false, "rationale": "This is a potential coping strategy, not a direct consequence of skipping the payment itself, and less severe than repossession."}]}, {"question": "What is the primary strategic benefit of generating 'bridge income' during a period of job loss?", "options": [{"text": "To fully replace the lost income to maintain one's previous lifestyle.", "isCorrect": false, "rationale": "Bridge income is described as 'temporary income to reduce the drain on your emergency fund,' not necessarily to fully replace lost income or maintain a previous lifestyle."}, {"text": "To demonstrate to future employers that you are actively working.", "isCorrect": false, "rationale": "While it might have this secondary effect, the primary strategic benefit stated is financial, not related to employer perception."}, {"text": "To minimize the depletion of an emergency fund, thereby extending its buffer period.", "isCorrect": true, "rationale": "The text defines bridge income as 'temporary income to reduce the drain on your emergency fund,' directly indicating its role in preserving the emergency fund."}, {"text": "To gain new professional skills unrelated to previous employment.", "isCorrect": false, "rationale": "Gaining new skills is related to a 'skills inventory,' which is a separate strategy from generating bridge income, though both are recommended."}]}, {"question": "Beyond finding immediate employment, what is the broader, forward-looking purpose of conducting a 'skills inventory' during job loss?", "options": [{"text": "To justify increased unemployment benefits.", "isCorrect": false, "rationale": "A skills inventory is not a factor in determining unemployment benefit amounts."}, {"text": "To identify areas for quick training that could lead to new or better career opportunities.", "isCorrect": true, "rationale": "The text states a skills inventory helps determine 'What training could you complete quickly... to open new opportunities? Job loss is painful, but it is sometimes also a catalyst for a better path.'"}, {"text": "To prove to creditors that you are actively seeking solutions.", "isCorrect": false, "rationale": "While being proactive is good, the primary purpose of a skills inventory is career-focused, not directly for creditor relations."}, {"text": "To qualify for specific government-sponsored relief programs.", "isCorrect": false, "rationale": "A skills inventory is for personal career development, not a direct qualification for relief programs."}]}, {"question": "Marcus had an emergency fund for just over 2 months of essential expenses. He successfully navigated 9 weeks of unemployment without going into debt. Which combination of actions, as highlighted in his story, was *most critical* to stretching his emergency fund?", "options": [{"text": "Prioritizing only luxury cuts and avoiding all contact with lenders.", "isCorrect": false, "rationale": "Marcus did contact his car lender for deferral, and his success was due to a combination of strategies, not just luxury cuts."}, {"text": "Relying solely on his emergency fund and waiting for unemployment benefits to kick in.", "isCorrect": false, "rationale": "Marcus supplemented his emergency fund significantly by cutting expenses and generating bridge income, rather than just waiting."}, {"text": "Immediately applying for unemployment, cutting non-essential spending, and generating bridge income.", "isCorrect": true, "rationale": "The 'Key lesson' from Marcus's story states: 'The same emergency fund that seemed too small was enough because Marcus cut spending immediately and found bridge income fast,' in addition to applying for unemployment."}, {"text": "Withdrawing from his retirement account and selling all his personal belongings.", "isCorrect": false, "rationale": "Marcus did neither of these; the text specifically warns against retirement withdrawals, and selling all belongings wasn't mentioned as a primary factor in his success."}]}, {"question": "Considering all the advice presented, which comprehensive strategy is most effective for an individual facing immediate job loss to mitigate financial disaster?", "options": [{"text": "Prioritizing immediate withdrawal from retirement savings to cover all expenses, then applying for unemployment benefits.", "isCorrect": false, "rationale": "The text strongly advises against draining retirement accounts due to penalties and taxes, making this an ineffective and costly primary strategy."}, {"text": "Relying solely on an emergency fund and unemployment benefits while avoiding any contact with lenders.", "isCorrect": false, "rationale": "The text emphasizes the need to cut expenses and generate bridge income in addition to an emergency fund and unemployment. It also explicitly advises contacting lenders proactively."}, {"text": "Cutting non-essential spending, seeking bridge income, applying for unemployment immediately, and contacting lenders proactively for essential bills.", "isCorrect": true, "rationale": "This option synthesizes the key recommendations: immediate expense cuts, bridge income, quick unemployment application, and proactive communication with lenders regarding essential bills, as demonstrated by Marcus's success."}, {"text": "Stopping all payments to prioritize food, then slowly looking for a new job and considering bridge income later.", "isCorrect": false, "rationale": "The text explicitly warns, 'Never stop paying your rent or mortgage, utilities, or car payment without a plan,' due to severe consequences. A slow job search is also contrary to the advice to respond quickly and strategically."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
