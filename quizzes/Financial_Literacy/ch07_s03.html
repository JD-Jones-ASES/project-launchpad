<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 7, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the primary benefit of classifying budget expenses into categories like 'fixed vs. variable' and 'needs vs. wants'?", "options": [{"text": "It helps determine which expenses are tax-deductible.", "isCorrect": false, "rationale": "The text does not mention tax deductions as a benefit of these classification methods. The focus is on making financial decisions."}, {"text": "It provides a clear framework for making informed decisions when faced with a tight budget.", "isCorrect": true, "rationale": "The text explicitly states that knowing these classifications 'tells you where you can cut' and 'what you should consider cutting first' when the budget doesn't balance, thus enabling smarter decisions."}, {"text": "It ensures that all discretionary spending is eliminated from the budget.", "isCorrect": false, "rationale": "While classifications help identify discretionary spending, the goal is not necessarily to eliminate all of it, but to understand its role and priority in a budget, especially when making cuts."}, {"text": "It guarantees that a budget will always balance each month.", "isCorrect": false, "rationale": "Classifying expenses is a tool for budgeting, but it doesn't guarantee a balanced budget. It helps in the process of achieving balance, especially when making adjustments."}], "id": "q01"}, {"question": "Sophia wants to save for new tires for her car, which she anticipates needing in about six months and will cost around $600. Based on the text, what is the most appropriate budgeting strategy for this expense?", "options": [{"text": "She should use a credit card to pay for the tires when she needs them and pay off the balance later.", "isCorrect": false, "rationale": "The 'moneytip' specifically advises against using a credit card for predictable future expenses by instead utilizing a sinking fund, emphasizing 'no surprise, no credit card.'"}, {"text": "She should designate it as a 'variable want' and cut other expenses drastically in the month she buys the tires.", "isCorrect": false, "rationale": "Car tires are generally a 'need' for safe transportation, not a 'want.' Additionally, waiting to cut expenses drastically in one month for a predictable expense is inefficient when a sinking fund is an option."}, {"text": "She should create a sinking fund, saving approximately $100 each month until the tires are needed.", "isCorrect": true, "rationale": "The definition of a sinking fund is for a 'predictable future expense that does not happen every month.' Saving a small amount monthly ($600 / 6 months = $100/month) prepares for the expense without financial strain, exactly as the text describes."}, {"text": "She should classify it as a 'fixed need' and budget the full $600 every month.", "isCorrect": false, "rationale": "A fixed expense is a dollar amount that 'stays the same every month' on an ongoing basis, like rent. New tires are a one-time, periodic expense, not a recurring fixed expense in the monthly budget sense."}], "id": "q02"}, {"question": "Which of the following expenses would most accurately be classified as a 'fixed expense' according to the definitions provided?", "options": [{"text": "Monthly grocery bill, which fluctuates between $300 and $400.", "isCorrect": false, "rationale": "Groceries are explicitly listed as an example of a variable expense because the dollar amount changes from month to month."}, {"text": "An electric bill that averages $80 but can range from $60 to $110 depending on the season.", "isCorrect": false, "rationale": "The electric bill is listed as an example of a variable expense because its amount changes, often by season."}, {"text": "A student loan payment of $250 due on the 15th of every month.", "isCorrect": true, "rationale": "A fixed expense is defined as a spending category where the dollar amount stays the same every month, and one has little control over it once committed, like a loan payment."}, {"text": "Gas for commuting to work, typically $60–$90 per month.", "isCorrect": false, "rationale": "Gas is listed as an example of a variable expense, as its cost can change based on usage and fuel prices."}], "id": "q03"}, {"question": "A key difference between fixed and variable expenses, as highlighted in the text, is:", "options": [{"text": "Fixed expenses are always needs, while variable expenses are always wants.", "isCorrect": false, "rationale": "This is incorrect. The text explicitly states there are fixed needs (rent) and variable needs (groceries), as well as fixed wants (subscriptions) and variable wants (dining out)."}, {"text": "Fixed expenses are easier to adjust monthly, while variable expenses require significant life changes to alter.", "isCorrect": false, "rationale": "This statement reverses the definitions. The text states variable expenses 'offer flexibility' and can be reduced, whereas fixed expenses 'cannot be adjusted without a larger life change.'"}, {"text": "Fixed expenses form the 'budget foundation' and offer less flexibility, while variable expenses provide opportunities for monthly adjustments.", "isCorrect": true, "rationale": "The text states, 'Fixed expenses are your budget foundation—they are locked in, so budget them first. Variable expenses offer flexibility: if your budget is tight one month, you can reduce grocery spending...'"}, {"text": "Variable expenses must always be paid by direct debit, unlike fixed expenses.", "isCorrect": false, "rationale": "The text does not mention payment methods as a distinguishing factor between fixed and variable expenses."}], "id": "q04"}, {"question": "Considering the definitions in the text, which of the following best exemplifies a 'variable want'?", "options": [{"text": "A fixed monthly payment for health insurance.", "isCorrect": false, "rationale": "Health insurance is generally a 'need' and, if the payment is consistent, it's a 'fixed expense,' not a 'variable want.'"}, {"text": "The cost of streaming services, paid monthly.", "isCorrect": false, "rationale": "Streaming services are typically a 'want' but, if paid monthly at a set rate, they are a 'fixed expense,' not 'variable.'"}, {"text": "Monthly spending on hobby supplies that changes based on projects.", "isCorrect": true, "rationale": "Hobby supplies are explicitly mentioned as examples of 'wants.' Since the spending on them 'changes based on projects,' the amount is variable."}, {"text": "The fluctuating cost of gasoline for commuting to work.", "isCorrect": false, "rationale": "Gas for commuting is generally considered a 'need' (transportation to work), even though it is variable. Therefore, it is a 'variable need,' not a 'variable want.'"}], "id": "q05"}, {"question": "The concept of the 'gray zone' in classifying needs vs. wants implies that:", "options": [{"text": "Most expenses cannot be definitively categorized as either a need or a want.", "isCorrect": false, "rationale": "The text notes the gray zone is real but emphasizes that the goal isn't perfect classification, but clear thinking about negotiability. Many expenses are clearly one or the other."}, {"text": "The classification of an expense can depend on individual circumstances and context.", "isCorrect": true, "rationale": "The text uses the example of a smartphone: 'If your job requires you to have it... it may be a need. If it is the newest model... the upgrade is a want.' This clearly illustrates that context matters."}, {"text": "It is not important to distinguish between needs and wants for effective budgeting.", "isCorrect": false, "rationale": "The 'Why the Classification Matters' section explicitly states that knowing needs vs. wants 'tells you what you should consider cutting first,' indicating its importance."}, {"text": "All 'wants' should eventually be reclassified as 'needs' over time.", "isCorrect": false, "rationale": "The text does not suggest a reclassification of wants into needs over time. It focuses on the current necessity and negotiability of expenses."}], "id": "q06"}, {"question": "You are creating a budget and need to decide which expenses to tackle first. Based on the text, what is the most strategic approach to budget planning?", "options": [{"text": "Focus primarily on reducing fixed expenses immediately, as they are the largest part of most budgets.", "isCorrect": false, "rationale": "The text states fixed expenses 'cannot be adjusted without a larger life change,' making them difficult to reduce immediately. It also advises budgeting them first because they are 'locked in,' not necessarily cutting them first."}, {"text": "Prioritize budgeting for all variable expenses before considering any fixed costs.", "isCorrect": false, "rationale": "The text states 'Fixed expenses are your budget foundation—they are locked in, so budget them first.' Variable expenses offer flexibility after the foundation is set."}, {"text": "Classify all expenses as either fixed or variable, and then further as needs or wants, to understand flexibility and priority.", "isCorrect": true, "rationale": "The text introduces both classification methods precisely 'to help you make smarter decisions when money is tight' by understanding 'where you can cut' (fixed/variable) and 'what you should consider cutting first' (needs/wants)."}, {"text": "Only include 'needs' in your budget, eliminating all 'wants' from the start.", "isCorrect": false, "rationale": "While 'wants' are a lower priority for cuts, the text does not advocate for eliminating all 'wants' from a budget entirely, only considering reducing or cutting them if necessary."}], "id": "q07"}, {"question": "Liam's budget is severely unbalanced, with expenses exceeding income. Following the priority order for cuts provided in the text, which expense should Liam consider reducing or eliminating first?", "options": [{"text": "His monthly rent payment.", "isCorrect": false, "rationale": "Rent is a 'fixed need,' which the text categorizes as 'cut last' due to its essential nature and fixed commitment."}, {"text": "His car insurance payment.", "isCorrect": false, "rationale": "Car insurance is typically a 'fixed need' (assuming it's essential for legal driving/work), also prioritized to be cut last or only adjusted with significant life changes."}, {"text": "His weekly dining out expenses.", "isCorrect": true, "rationale": "Dining out is explicitly listed as a 'variable want.' The text's priority order states 'Variable wants (dining out, entertainment) — cut first,' making this the primary target for cuts."}, {"text": "His monthly grocery spending.", "isCorrect": false, "rationale": "Groceries are a 'variable need.' While they can be reduced ('reduce where possible'), they are higher in priority than 'variable wants' and should not be the absolute first cut."}], "id": "q08"}, {"question": "How would a $100 annual subscription to a hobby magazine, paid in one lump sum at the beginning of the year, most accurately be classified using both methods?", "options": [{"text": "Fixed Need", "isCorrect": false, "rationale": "A hobby magazine is a 'want,' not a 'need.' While the annual payment is a set amount, it's not a fixed *monthly* expense in the budget category sense, though it could be a sinking fund item."}, {"text": "Variable Need", "isCorrect": false, "rationale": "It's a 'want,' not a 'need,' and the amount, once paid for the year, is set, not variable."}, {"text": "Fixed Want", "isCorrect": true, "rationale": "A hobby magazine is a 'want.' If treated as a monthly sinking fund contribution (e.g., ~$8.33/month), it becomes a 'fixed want' in terms of the monthly budget allocation. Even if paid annually, its nature as a set-cost, non-essential item aligns best with a 'fixed want' for the purposes of long-term budgeting and cut prioritization."}, {"text": "Variable Want", "isCorrect": false, "rationale": "It is a 'want,' but once the subscription is purchased, the annual cost is fixed, not variable. If it were individual magazine purchases, it would be variable."}], "id": "q09"}, {"question": "A student receives a significant pay raise at their part-time job. To make the most financially responsible decision, how should they use the two expense classification methods from the text?", "options": [{"text": "Immediately upgrade all 'fixed needs' like their phone plan and internet service to premium tiers.", "isCorrect": false, "rationale": "Upgrading to premium tiers for things like phone plans makes them more expensive 'fixed expenses.' While it's a fixed expense, the 'upgrade' might be considered a 'want' if a basic service suffices. Rushing to increase fixed costs can reduce future flexibility."}, {"text": "Increase spending on 'variable wants' like dining out and entertainment first, as these are the most flexible.", "isCorrect": false, "rationale": "While 'variable wants' are flexible, prioritizing increased spending on them first after a raise isn't the most 'financially responsible decision.' It's better to save or address higher-priority financial goals first."}, {"text": "Re-evaluate if any 'variable needs' like groceries or gas could be reduced further, despite the increased income.", "isCorrect": false, "rationale": "While continuous evaluation is good, a pay raise typically allows for *more* spending flexibility, not necessarily more reduction in essential variable needs, unless past spending was excessive."}, {"text": "Consider allocating the extra income towards savings, debt repayment, or 'fixed wants' (like a new subscription) after ensuring all needs are met.", "isCorrect": true, "rationale": "This option represents a balanced, responsible approach. It prioritizes saving/debt repayment (often considered 'needs' or smart financial planning) and then allows for 'fixed wants' (subscriptions) only after 'needs' are securely covered, aligning with the principles of making smarter decisions."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
