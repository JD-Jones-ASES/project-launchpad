    <meta charset="UTF-8">

    <link rel="stylesheet" href="../../styles.css">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 11, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary purpose of the Rule of 72?", "options": [{"text": "To calculate the exact total compound interest earned over a specified period.", "isCorrect": false, "rationale": "The Rule of 72 provides an *estimate* and specifically for *doubling time*, not the total amount of interest or exact calculations."}, {"text": "To quickly estimate how long it takes an investment to double in value.", "isCorrect": true, "rationale": "The text explicitly states its purpose is for a 'quick estimate' of 'how long it takes your money to double' without requiring a calculator."}, {"text": "To compare simple interest rates between different savings accounts.", "isCorrect": false, "rationale": "The Rule of 72 applies to *compound interest* and its effect on doubling time, not simple interest."}, {"text": "To determine the precise future value of an investment after a specific number of years.", "isCorrect": false, "rationale": "The rule calculates time to double, not the specific future value, and it provides an estimate, not a precise value."}]}, {"question": "If you invest money at an annual interest rate of 4%, approximately how long will it take for your investment to double according to the Rule of 72?", "options": [{"text": "12 years", "isCorrect": false, "rationale": "This would be the doubling time for an investment growing at 6% (72/6 = 12)."}, {"text": "18 years", "isCorrect": true, "rationale": "The Rule of 72 formula is 72 / r. For an annual interest rate of 4%, this is 72 / 4 = 18 years."}, {"text": "24 years", "isCorrect": false, "rationale": "This would be the doubling time for an investment growing at 3% (72/3 = 24)."}, {"text": "36 years", "isCorrect": false, "rationale": "This would be the doubling time for an investment growing at 2% (72/2 = 36)."}]}, {"question": "When using the Rule of 72 formula, what is the correct way to input an interest rate of 7%?", "options": [{"text": "0.07", "isCorrect": false, "rationale": "The rule specifies using the interest rate 'as a whole number,' not its decimal equivalent."}, {"text": "7", "isCorrect": true, "rationale": "The text explicitly states, 'r = interest rate as a whole number (use 6 for 6, not 0.06).'"}, {"text": "70", "isCorrect": false, "rationale": "70 would imply a 70% interest rate, not 7%."}, {"text": "72", "isCorrect": false, "rationale": "72 is the numerator in the formula, not the interest rate."}]}, {"question": "An investor is choosing between two investment options: Option A offers an 8% annual return, and Option B offers a 4% annual return. Based on the Rule of 72, how much faster will Option A double the investment compared to Option B?", "options": [{"text": "Option A will double in 9 years, while Option B will double in 18 years, making Option A 9 years faster.", "isCorrect": true, "rationale": "For Option A (8%), 72 / 8 = 9 years. For Option B (4%), 72 / 4 = 18 years. The difference in doubling time is 18 - 9 = 9 years."}, {"text": "Option A will double in 18 years, while Option B will double in 9 years, making Option B faster.", "isCorrect": false, "rationale": "The doubling times are reversed for options A and B in this statement; Option A doubles faster."}, {"text": "Option A will double twice as fast as Option B, meaning it takes 4.5 years.", "isCorrect": false, "rationale": "Option A takes 9 years to double, which is indeed twice as fast as 18 years, but 4.5 years is not the doubling time for an 8% return."}, {"text": "Both options will double at approximately the same rate because the rule is only an estimate.", "isCorrect": false, "rationale": "While an estimate, the rule clearly shows a significant difference in doubling times between 8% and 4% rates, illustrating the powerful impact of higher interest."}]}, {"question": "If the annual inflation rate is consistently 6%, according to the Rule of 72, how long will it take for the purchasing power of your money to be cut in half?", "options": [{"text": "6 years", "isCorrect": false, "rationale": "This would imply a 12% inflation rate (72/12=6)."}, {"text": "9 years", "isCorrect": false, "rationale": "This would imply an 8% inflation rate (72/8=9)."}, {"text": "12 years", "isCorrect": true, "rationale": "The Rule of 72 applies to inflation: 72 / 6 = 12 years. If prices double in 12 years due to inflation, the purchasing power of a fixed amount of money will be halved."}, {"text": "18 years", "isCorrect": false, "rationale": "This would imply a 4% inflation rate (72/4=18)."}]}, {"question": "The text states, 'if you put $1,000 in a mattress today, and inflation runs at 3%, your $1,000 will only buy about $500 worth of goods 24 years from now.' What key financial lesson does this illustrate?", "options": [{"text": "Inflation is always unpredictable and cannot be accurately estimated.", "isCorrect": false, "rationale": "The text demonstrates how the Rule of 72 can be used to *estimate* the impact of inflation."}, {"text": "Saving money in a mattress is a safe way to preserve capital.", "isCorrect": false, "rationale": "The example directly shows that money in a mattress *loses* purchasing power over time due to inflation."}, {"text": "To preserve purchasing power, investments need to grow at a rate faster than the inflation rate.", "isCorrect": true, "rationale": "The text concludes, 'This is why saving alone is not enough—your money needs to grow at a rate faster than inflation to preserve its purchasing power.'"}, {"text": "The Rule of 72 only applies to investments and not to the cost of goods.", "isCorrect": false, "rationale": "The 'Did you know' box explicitly states, 'The Rule of 72 applies to any exponential growth—including inflation.'"}]}, {"question": "Which statement accurately describes the precision of the Rule of 72?", "options": [{"text": "It provides an exact calculation, identical to the compound interest formula.", "isCorrect": false, "rationale": "The text explicitly states, 'The result is approximate—within about 1 year of the exact answer.'"}, {"text": "It offers an estimate, typically within about 1 year of the exact answer for typical rates.", "isCorrect": true, "rationale": "This statement directly quotes or accurately paraphrases the description of the Rule of 72's accuracy provided in the text."}, {"text": "It is only accurate for interest rates above 10% because it simplifies calculations.", "isCorrect": false, "rationale": "The examples provided (2%, 5%, 6%, 8%) demonstrate its applicability and approximate accuracy for a range of 'typical' rates, not just those above 10%."}, {"text": "Its accuracy decreases significantly for lower interest rates compared to higher ones.", "isCorrect": false, "rationale": "The text does not specify that accuracy decreases significantly for lower rates, only that it is 'approximate—within about 1 year... for typical interest rates.'"}]}, {"question": "An investment offer promises to double your money in 4 years. According to the Rule of 72, what annual interest rate is implied by this offer, and what sentiment does the text suggest regarding such offers?", "options": [{"text": "12%; such a claim is typical for long-term growth.", "isCorrect": false, "rationale": "Using the Rule of 72, 72 / 4 years = 18%, not 12%. Furthermore, the text advises skepticism for high returns."}, {"text": "18%; this sounds amazing, but you should be skeptical.", "isCorrect": true, "rationale": "Using the Rule of 72, 72 / 4 years = 18%. The 'moneytip' explicitly states, 'Somebody promises 18% returns per year? ...That sounds amazing—which is exactly why you should be very skeptical.'"}, {"text": "18%; this is a standard, achievable return for most investors.", "isCorrect": false, "rationale": "While 18% is the implied rate, the text advises skepticism, noting that 'Returns that seem too good to be true usually are.'"}, {"text": "24%; this is impossible and immediately fraudulent.", "isCorrect": false, "rationale": "The implied rate is 18% (72/4), not 24%. While skepticism is warranted, the text doesn't label such claims as immediately impossible or fraudulent, but as meriting high skepticism."}]}, {"question": "If an investment doubles its value in approximately 14.4 years, what was its annual interest rate, according to the Rule of 72?", "options": [{"text": "2%", "isCorrect": false, "rationale": "At 2%, money doubles in 72/2 = 36 years."}, {"text": "5%", "isCorrect": true, "rationale": "If Years to Double = 72 / r, then r = 72 / Years to Double. So, r = 72 / 14.4 = 5%."}, {"text": "8%", "isCorrect": false, "rationale": "At 8%, money doubles in 72/8 = 9 years."}, {"text": "10%", "isCorrect": false, "rationale": "At 10%, money doubles in 72/10 = 7.2 years."}]}, {"question": "A person wants their savings to double in approximately 9 years. Based on the Rule of 72 and the comparison of savings accounts, what type of account or investment strategy would they most likely need to pursue?", "options": [{"text": "A regular savings account yielding 2% APY.", "isCorrect": false, "rationale": "At 2% APY, it takes 36 years (72/2 = 36) for money to double, which is much longer than 9 years."}, {"text": "A high-yield savings account at 5% APY.", "isCorrect": false, "rationale": "At 5% APY, it takes 14.4 years (72/5 = 14.4) for money to double, which is longer than 9 years."}, {"text": "An investment with a long-term average return similar to the stock market, around 8%.", "isCorrect": true, "rationale": "At 8% annual return, it takes 9 years (72/8 = 9) for money to double, matching the desired timeframe according to the text's examples."}, {"text": "Any savings account, as long as the initial deposit is large enough.", "isCorrect": false, "rationale": "The interest rate is the determining factor for the *time* it takes for money to double, not the initial deposit amount."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
