        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 6, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best defines active income according to the provided text?", "options": [{"text": "Income that is always taxed at a higher rate compared to passive income.", "isCorrect": false, "rationale": "The text states this distinction is not primarily about tax law, making tax rates an incorrect primary definition for active income."}, {"text": "Money earned in exchange for time and effort, requiring the earner's direct and ongoing participation.", "isCorrect": true, "rationale": "The text explicitly defines active income as 'money earned in exchange for time and effort. It requires the earner's active participation.'"}, {"text": "Earnings derived from assets or activities that do not require continuous active involvement.", "isCorrect": false, "rationale": "This describes passive income, not active income, as defined in the text."}, {"text": "Income that automatically adjusts with inflation without any personal effort.", "isCorrect": false, "rationale": "The text does not mention inflation adjustment as a defining characteristic of active income. Active income stops when the work stops."}]}, {"question": "A key characteristic of passive income, as described in the text, is that it:", "options": [{"text": "Is always generated from a traditional full-time job with benefits.", "isCorrect": false, "rationale": "Income from a traditional full-time job is a classic example of active income, not passive income."}, {"text": "Stops immediately if the earner takes a vacation or stops working.", "isCorrect": false, "rationale": "This describes active income. Passive income 'continues flowing with little or no ongoing active work from you' even when you are not actively working."}, {"text": "Continues flowing with little or no ongoing active work after the initial asset or system setup.", "isCorrect": true, "rationale": "The text defines passive income as 'income that continues flowing with little or no ongoing active work from you' once the asset or system is set up."}, {"text": "Requires continuous day-to-day management to maintain its generation.", "isCorrect": false, "rationale": "While initial setup or occasional oversight may be needed, 'continuous day-to-day management' contradicts the 'little or no ongoing active work' characteristic of passive income."}]}, {"question": "Sarah works as a freelance graphic designer, charging clients per project. She also owns a small apartment that she rents out, collecting monthly rent. Based on the text, which statement accurately categorizes her income sources?", "options": [{"text": "Both her graphic design income and rental income are active.", "isCorrect": false, "rationale": "While graphic design income is active, rental income is explicitly listed as an example of passive income."}, {"text": "Both her graphic design income and rental income are passive.", "isCorrect": false, "rationale": "Her freelance graphic design income requires her direct time and effort, making it active income."}, {"text": "Her graphic design income is active, while her rental income is passive.", "isCorrect": true, "rationale": "Her freelance graphic design work is self-employment income, requiring her direct involvement (active). Her rental income from property she owns is a common example of passive income mentioned in the text."}, {"text": "Her graphic design income is passive, while her rental income is active.", "isCorrect": false, "rationale": "This reverses the correct classifications. Graphic design is active (time for money), and rental income is passive (from an asset)."}]}, {"question": "The text states that 'active income has a ceiling' while 'passive income has no such ceiling.' What is the primary reason for this distinction?", "options": [{"text": "Active income is subject to higher progressive tax rates, which limits its net growth potential.", "isCorrect": false, "rationale": "The text explicitly states this distinction is 'not primarily about tax law.' The ceiling is about time, not tax rates."}, {"text": "Passive income streams are inherently more profitable per hour than any form of active income.", "isCorrect": false, "rationale": "While passive income can be highly profitable, the 'ceiling' concept relates to the *volume* of potential income, not necessarily its per-hour profitability, and is tied to the continuous nature of assets vs. finite time."}, {"text": "Active income is limited by the finite amount of time an individual can work, whereas passive income-generating assets can work around the clock.", "isCorrect": true, "rationale": "The text explains, 'There are only 24 hours in a day... A rental property earns rent whether you are awake or asleep. Dividends arrive quarterly regardless of how many hours you worked that week.'"}, {"text": "Only passive income can be invested to generate further income, unlike active income which must be spent.", "isCorrect": false, "rationale": "Active income can certainly be saved and invested; the limitation of active income is in its generation, not its subsequent use."}]}, {"question": "According to financial planning experts mentioned in the text, what is the recommended long-term strategy for achieving financial independence?", "options": [{"text": "Focusing solely on increasing one's hourly wage through active employment to maximize immediate earnings.", "isCorrect": false, "rationale": "While increasing active income is beneficial, the text emphasizes that active income has a ceiling and is not the sole path to financial independence."}, {"text": "Gradually building passive income streams alongside active income by consistently saving and investing.", "isCorrect": true, "rationale": "The text states, 'many financial planning experts describe the path to financial independence as gradually building passive income streams alongside your active income. Early in your career, nearly all your income may be active (from a job). Over time, by saving and investing, you build assets that generate passive income.'"}, {"text": "Quickly accumulating a large amount of active income and then immediately retiring once a lump sum is reached.", "isCorrect": false, "rationale": "This strategy is not mentioned, and relying solely on a lump sum without ongoing income streams can be risky. The text promotes *building streams* of income."}, {"text": "Avoiding all forms of active income as soon as possible to prevent reaching an income ceiling.", "isCorrect": false, "rationale": "The text advises building passive income *alongside* active income, especially early in a career. It doesn't suggest avoiding active income entirely from the start."}]}, {"question": "The 'Two Very Different Lives' example illustrates the benefit of passive income primarily by showing how it:", "options": [{"text": "Always leads to a higher total annual income for an individual, regardless of their active earnings.", "isCorrect": false, "rationale": "The example explicitly states both Person A and Person B earn '$40,000 per year,' demonstrating that passive income provides benefits beyond just a higher total income."}, {"text": "Provides a crucial financial cushion and greater stability, even when the total income is the same.", "isCorrect": true, "rationale": "The example shows Person B, with passive income, having a 'significantly more stable' financial position because they still have income 'coming in while they search for new work' if their job is lost."}, {"text": "Eliminates the need for any active employment whatsoever, allowing complete leisure.", "isCorrect": false, "rationale": "While sufficient passive income can lead to financial independence where work isn't necessary, the example highlights the cushion, not necessarily the complete elimination of work, especially with a mixed income scenario."}, {"text": "Is entirely exempt from income taxes, making it inherently more valuable dollar-for-dollar.", "isCorrect": false, "rationale": "The text states the active vs. passive distinction is 'not primarily about tax law,' and does not claim passive income is tax-exempt."}]}, {"question": "Which of the following would NOT typically be considered a source of passive income as defined in the text?", "options": [{"text": "Dividends received from owning shares in a company.", "isCorrect": false, "rationale": "Dividends are explicitly listed as an example of passive income in the text."}, {"text": "Interest earned on money held in a high-yield savings account.", "isCorrect": false, "rationale": "Interest is explicitly listed as an example of passive income in the text."}, {"text": "Royalties from a book you authored five years ago that continues to sell.", "isCorrect": false, "rationale": "Royalties for intellectual property created (like a book) are listed as an example of passive income, continuing without ongoing active work."}, {"text": "Your weekly paycheck from working as a retail cashier.", "isCorrect": true, "rationale": "Wages/salary from a job like a retail cashier require direct, ongoing involvement and exchange of time for money, making it a clear example of active income."}]}, {"question": "The text warns against the 'Passive Income Trap' and advises skepticism towards promises of 'easy passive income.' What is the underlying message of this warning?", "options": [{"text": "Passive income is inherently unstable and should generally be avoided by most individuals.", "isCorrect": false, "rationale": "The text strongly advocates for building passive income, highlighting its stability and benefits. The warning is about *how* it's built, not its inherent nature."}, {"text": "All forms of passive income generation are illegal or unethical schemes designed to defraud people.", "isCorrect": false, "rationale": "The text clearly provides legitimate examples of passive income like rental income, dividends, and interest, debunking the idea that all are schemes."}, {"text": "Truly passive income requires significant upfront work or capital investment, and there are no shortcuts.", "isCorrect": true, "rationale": "The text explicitly states: 'Truly passive income takes real upfront work or capital... Anyone promising you “easy passive income” with no upfront work or investment is likely selling a fantasy—or a scheme. Real passive income is earned through disciplined saving, smart investing, and patience. There are no shortcuts.'"}, {"text": "Passive income opportunities are only available to those who are already wealthy and have extensive connections.", "isCorrect": false, "rationale": "The 'moneytip' section explicitly states, 'You do not need a lot of money to start building passive income,' countering this claim."}]}, {"question": "The 'moneytip' section suggests starting small and early to build passive income. What principle does it emphasize as doing 'the heavy lifting' in this process?", "options": [{"text": "Consistently seeking out high-risk, high-reward investments for quick gains.", "isCorrect": false, "rationale": "The tip advocates for steady saving and investing, not specifically high-risk options, and emphasizes patience rather than quick gains."}, {"text": "Relying primarily on large inheritance or windfall gains to provide initial capital.", "isCorrect": false, "rationale": "The tip focuses on personal actions like 'save more and invest over time' rather than external windfalls."}, {"text": "The power of compounding interest and long-term investment growth over time.", "isCorrect": true, "rationale": "The text states, 'Start small, start early, and let compounding do the heavy lifting,' directly pointing to the principle of compounding."}, {"text": "Immediately quitting active employment to dedicate all time and energy to passive ventures.", "isCorrect": false, "rationale": "This contradicts the overall strategy of building passive income *alongside* active income, especially early on, and is not mentioned as the 'heavy lifting' factor."}]}, {"question": "Imagine two recent college graduates. Graduate X focuses entirely on securing the highest-paying active job possible. Graduate Y takes a slightly lower-paying job but consistently saves and invests a portion of their income into dividend-paying stocks. Based on the text, who is likely building a more financially resilient future and why?", "options": [{"text": "Graduate X, because a higher active income always translates to inherently greater financial security.", "isCorrect": false, "rationale": "The text's 'Two Very Different Lives' example shows that even with the same total income, a mix of active and passive income provides more stability than active income alone."}, {"text": "Graduate Y, because they are actively building passive income streams that provide a financial cushion, enhancing stability.", "isCorrect": true, "rationale": "Graduate Y is following the advice to 'gradually building passive income streams alongside your active income,' which the text highlights as providing a 'financial cushion' and greater stability, similar to Person B in the example."}, {"text": "Graduate X, because they can always pivot to passive income later in life with their higher earnings, making early passive income unnecessary.", "isCorrect": false, "rationale": "The 'moneytip' emphasizes 'start small, start early' to benefit from compounding, suggesting that delaying passive income building is less optimal."}, {"text": "Graduate Y, but only if they eventually quit their job entirely to manage their investments full-time.", "isCorrect": false, "rationale": "The definition of passive income is that it requires 'little or no ongoing active work,' implying full-time management is not required for it to be beneficial or to continue."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
