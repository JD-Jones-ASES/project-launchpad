    <link rel="stylesheet" href="../../styles.css">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 28, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the fundamental goal of building a personal financial plan?", "options": [{"text": "To eliminate all debt immediately.", "isCorrect": false, "rationale": "While debt repayment is a component of a financial plan, the text states the plan 'moves that number [net worth] in the right direction,' which is a broader goal than solely eliminating debt immediately."}, {"text": "To increase your net worth by managing income, expenses, savings, and debt effectively.", "isCorrect": true, "rationale": "The introduction states the plan 'moves that number [net worth] in the right direction,' and the five questions outlined cover income, expenses, savings, and debt, indicating these are the levers for increasing net worth."}, {"text": "To ensure every dollar has a specific purpose.", "isCorrect": false, "rationale": "This describes zero-based budgeting, which is an important *aspect* of the financial plan (Step 5) but not the overarching fundamental goal of the entire plan."}, {"text": "To identify only your fixed monthly expenses.", "isCorrect": false, "rationale": "This is too narrow; a financial plan covers all income and expenses, both fixed and variable, as well as savings and debt."}], "id": "q01"}, {"question": "When calculating your monthly take-home pay for a personal financial plan, what specific amount should you use?", "options": [{"text": "Your gross salary before any deductions.", "isCorrect": false, "rationale": "The text explicitly states to 'Start with what actually lands in your bank account after taxes, not your gross salary.'"}, {"text": "The amount that lands in your bank account after taxes and other deductions.", "isCorrect": true, "rationale": "Step 1 instructs to 'Start with what actually lands in your bank account after taxes,' which implicitly includes other deductions that affect the final deposited amount."}, {"text": "Only the money earned from your primary full-time job.", "isCorrect": false, "rationale": "The example mentions income could come from 'a full-time job... or from two part-time jobs combined,' implying all sources of take-home pay should be included."}, {"text": "Your estimated income for the year divided by twelve.", "isCorrect": false, "rationale": "The focus is on the *actual* amount received each month, not an estimation of gross annual income."}], "id": "q02"}, {"question": "Why are variable expenses typically the first area to examine when you need to cut costs in your budget?", "options": [{"text": "They are usually much larger than fixed expenses.", "isCorrect": false, "rationale": "This is not necessarily true; fixed expenses like rent or a mortgage can be much larger than most variable expenses."}, {"text": "You have more control over adjusting or reducing them month to month.", "isCorrect": true, "rationale": "The text states, 'You have more control over these, which makes them the first place to look for savings.'"}, {"text": "They are easier to track and categorize.", "isCorrect": false, "rationale": "Variable expenses can often be harder to track due to their changing nature, unlike fixed expenses which are consistent."}, {"text": "Skipping them has fewer serious consequences than skipping fixed expenses.", "isCorrect": false, "rationale": "While potentially true for some variable expenses, the primary reason for looking at them first for *cuts* is the level of control, not just the consequences of skipping."}], "id": "q03"}, {"question": "The principle of 'zero-based budgeting' emphasizes that:", "options": [{"text": "All your expenses must total exactly zero each month.", "isCorrect": false, "rationale": "This is a misunderstanding; zero-based budgeting means income minus assigned expenses/savings/debt repayment equals zero, not that the expenses themselves are zero."}, {"text": "You should only budget for essential needs, leaving discretionary spending at zero.", "isCorrect": false, "rationale": "Zero-based budgeting is about assigning a job to every dollar, which can include discretionary spending, not eliminating it entirely."}, {"text": "Every dollar of your income should be assigned a specific purpose, leaving no unallocated funds.", "isCorrect": true, "rationale": "The text explicitly asks, 'Does every dollar have a job? (Zero-based budgeting)' and the example shows 'Income minus assigned: $2,200 - $2,200 = $0', confirming every dollar is accounted for."}, {"text": "You should aim to have exactly zero dollars in your bank account at the end of each month.", "isCorrect": false, "rationale": "The goal is to assign every dollar a purpose (including savings), not necessarily to spend or deplete your bank balance to zero."}], "id": "q04"}, {"question": "The instruction to 'Pay yourself first' regarding savings goals means that:", "options": [{"text": "You should prioritize saving money for large purchases like a new car or house before paying any bills.", "isCorrect": false, "rationale": "The text states savings are 'not optional — treat them like bills,' indicating they are on par with, not necessarily before, all other essential bills."}, {"text": "Your savings goals should only be addressed if there is money left over after all other expenses are paid.", "isCorrect": false, "rationale": "This contradicts the 'pay yourself first' principle, which advises prioritizing savings rather than treating them as an afterthought."}, {"text": "You should set aside money for your savings goals immediately after calculating income, before allocating funds to other expenses.", "isCorrect": true, "rationale": "Step 4 states, 'Pay yourself first. Before spending what is left, assign money to specific savings goals. These are not optional — treat them like bills.'"}, {"text": "You should invest in yourself through education or career development before focusing on any financial savings.", "isCorrect": false, "rationale": "'Pay yourself first' in this financial planning context specifically refers to monetary savings goals, not personal development."}], "id": "q05"}, {"question": "If, after building your initial budget, you discover that your total assigned expenses exceed your take-home pay, what is the recommended first course of action?", "options": [{"text": "Immediately increase your income by seeking a new job or additional work.", "isCorrect": false, "rationale": "While increasing income is a valid long-term strategy, the text first advises looking at expenses for cuts."}, {"text": "Re-evaluate and reduce your variable expenses, as you have more control over these.", "isCorrect": true, "rationale": "The 'moneytip' section advises: 'Look at variable expenses first for cuts. Then look at fixed expenses...'"}, {"text": "Review your fixed expenses for potential cuts, such as finding a cheaper phone plan.", "isCorrect": false, "rationale": "The text suggests looking at fixed expenses *after* variable expenses, as variable expenses offer more immediate control."}, {"text": "Abandon the budget, as it indicates an unsolvable financial problem.", "isCorrect": false, "rationale": "The text explicitly states that finding expenses exceed income is 'actually useful information' and shows 'where the problem is,' encouraging adjustments rather than abandonment."}], "id": "q06"}, {"question": "What does the text emphasize about the nature of a personal financial plan after its initial creation?", "options": [{"text": "It should remain static once established, to provide consistent financial guidelines.", "isCorrect": false, "rationale": "The text explicitly states, 'A budget is not a one-time document. Review it monthly.'"}, {"text": "It needs to be regularly reviewed and updated to reflect changes in income, expenses, or goals.", "isCorrect": true, "rationale": "The 'Updating Your Plan' section clearly states, 'Review it monthly. When your income changes, when a bill changes, or when a goal is reached, update the plan.'"}, {"text": "It should only be updated if your net worth significantly decreases.", "isCorrect": false, "rationale": "Updates are recommended for changes in income, bills, or goals, not just a decrease in net worth."}, {"text": "It primarily serves as a historical record of past financial decisions.", "isCorrect": false, "rationale": "While it can reflect past choices, its primary purpose is forward-looking planning and decision-making."}], "id": "q07"}, {"question": "Which of the following correctly orders a sequence of steps in building a personal financial plan as described in the section?", "options": [{"text": "List fixed expenses, calculate take-home pay, assign savings goals.", "isCorrect": false, "rationale": "The correct order starts with calculating take-home pay (Step 1), then listing fixed expenses (Step 2)."}, {"text": "Calculate take-home pay, list fixed expenses, estimate variable expenses.", "isCorrect": true, "rationale": "This sequence correctly follows Steps 1, 2, and 3 as outlined in the section."}, {"text": "Assign savings goals, calculate take-home pay, give the rest a specific job.", "isCorrect": false, "rationale": "Calculating take-home pay is Step 1, while assigning savings goals is Step 4, and giving the rest a job is Step 5."}, {"text": "Give the rest a specific job, estimate variable expenses, list fixed expenses.", "isCorrect": false, "rationale": "This sequence is in reverse and incorrect order of the budget building steps."}], "id": "q08"}, {"question": "Based on the example provided in the text, after accounting for fixed expenses, variable expenses, and savings goals, how much money was initially remaining to be given a specific job under zero-based budgeting?", "options": [{"text": "$1,130", "isCorrect": false, "rationale": "This is the amount assigned to fixed expenses only, not the remaining amount."}, {"text": "$2,200", "isCorrect": false, "rationale": "This is the total monthly take-home pay, not the remaining amount after initial assignments."}, {"text": "$440", "isCorrect": true, "rationale": "The text states, 'Subtract from take-home pay: $2,200 - $1,760 = $440 remaining' and 'You have 440 left. In a zero-based budget, this cannot just “float.” Give it a job.'"}, {"text": "$1,760", "isCorrect": false, "rationale": "This is the *sum* of fixed expenses, variable expenses, and savings goals ($1,130 + $380 + $250 = $1,760), not the remaining amount."}], "id": "q09"}, {"question": "What is the overarching message conveyed by the section about the role of a budget in personal finance?", "options": [{"text": "A budget's main purpose is to accumulate as much savings as possible.", "isCorrect": false, "rationale": "While savings are an important part, the overall role is broader, encompassing all aspects of financial management."}, {"text": "A budget automatically solves financial problems by increasing available funds.", "isCorrect": false, "rationale": "The 'moneytip' states, 'A budget does not create money.'"}, {"text": "A budget is a tool that provides clarity and enables informed financial decision-making.", "isCorrect": true, "rationale": "The 'moneytip' concludes with 'A budget does not create money. It helps you see clearly so you can make better choices,' highlighting its role as a decision-making tool."}, {"text": "A budget is primarily designed to prevent any unnecessary spending.", "isCorrect": false, "rationale": "A budget helps assign money to all categories, including discretionary spending, not just prevent 'unnecessary' spending, which is subjective."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
