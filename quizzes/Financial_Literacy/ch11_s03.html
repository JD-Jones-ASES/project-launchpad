<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 11, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does APR primarily represent in the context of interest rates?", "options": [{"text": "The actual annual rate earned after accounting for all fees.", "isCorrect": false, "rationale": "APR is the stated interest rate before considering compounding, and typically does not account for all possible fees."}, {"text": "The effective annual rate considering compounding frequency.", "isCorrect": false, "rationale": "This describes APY, not APR. APR does not account for compounding frequency."}, {"text": "The stated annual interest rate before accounting for compounding.", "isCorrect": true, "rationale": "APR stands for Annual Percentage Rate and is defined as the basic interest rate the bank states—before accounting for how often interest is compounded."}, {"text": "The total interest paid over the life of a loan.", "isCorrect": false, "rationale": "APR is an annual rate, not the total interest paid over an entire loan term."}]}, {"question": "Which of the following best describes the Annual Percentage Yield (APY)?", "options": [{"text": "It is the basic interest rate stated by the bank before considering compounding.", "isCorrect": false, "rationale": "This is the definition of APR, not APY."}, {"text": "It is the annual rate used for loans, showing the total cost of borrowing.", "isCorrect": false, "rationale": "While APR is used for loans, APY primarily refers to the effective rate on deposit accounts reflecting compounding, not necessarily the 'total cost' of a loan in a general sense."}, {"text": "It is the effective annual rate earned on a deposit account, reflecting the impact of compounding.", "isCorrect": true, "rationale": "APY is defined as the effective annual rate you actually earn, after accounting for compounding."}, {"text": "It is the maximum interest rate a bank is legally allowed to charge.", "isCorrect": false, "rationale": "APY is a calculated rate of return, not a legal limit on interest rates."}]}, {"question": "How does the compounding frequency influence the relationship between APY and APR for a savings account?", "options": [{"text": "APY is always equal to APR, regardless of compounding frequency.", "isCorrect": false, "rationale": "APY equals APR only when compounding is annual; otherwise, APY is greater than APR."}, {"text": "The more frequently interest compounds, the lower the APY compared to the APR.", "isCorrect": false, "rationale": "The opposite is true; more frequent compounding leads to a higher APY."}, {"text": "APY is always lower than APR when interest compounds more than once a year.", "isCorrect": false, "rationale": "This statement is incorrect. APY is always equal to or greater than APR."}, {"text": "The more frequently interest compounds, the higher the APY compared to the APR.", "isCorrect": true, "rationale": "The text states, 'The more frequently interest compounds, the higher the APY compared to the APR.'"}]}, {"question": "Under what specific condition will the Annual Percentage Yield (APY) be exactly equal to the Annual Percentage Rate (APR)?", "options": [{"text": "When the interest rate is very low, close to zero.", "isCorrect": false, "rationale": "The magnitude of the rate does not determine the equality of APY and APR; compounding frequency does."}, {"text": "When interest is compounded daily.", "isCorrect": false, "rationale": "Daily compounding causes APY to be higher than APR."}, {"text": "When the compounding frequency is once per year (annual compounding).", "isCorrect": true, "rationale": "The text explicitly states, 'When the compounding frequency is once per year (annual compounding), APY equals APR exactly.'"}, {"text": "When the account is a checking account, not a savings account.", "isCorrect": false, "rationale": "The type of account does not determine the equality; the compounding frequency does."}]}, {"question": "A savings account advertises a 4% APR with semi-annual compounding ($n=2$). What is the approximate APY for this account?", "options": [{"text": "4.00%", "isCorrect": false, "rationale": "This is the APR; APY will be higher due to compounding more than once a year."}, {"text": "4.04%", "isCorrect": true, "rationale": "Using the formula APY = (1 + r/n)^n - 1, with r=0.04 and n=2: APY = (1 + 0.04/2)^2 - 1 = (1.02)^2 - 1 = 1.0404 - 1 = 0.0404, or 4.04%."}, {"text": "4.08%", "isCorrect": false, "rationale": "This calculation incorrectly assumes simple multiplication (APR * n) rather than compound interest."}, {"text": "4.16%", "isCorrect": false, "rationale": "This calculation is incorrect and does not follow the APY formula."}]}, {"question": "You are comparing two savings accounts: Account X offers 5.00% APR compounded monthly, and Account Y offers 5.05% APR compounded annually. Which account provides a better actual return, and why?", "options": [{"text": "Account Y, because its APR is explicitly higher, and with annual compounding, its APY is equal to its APR.", "isCorrect": false, "rationale": "While Account Y has a higher APR (5.05% vs 5.00%), its APY is only 5.050% because annual compounding means APY equals APR. Account X's monthly compounding produces an APY of approximately 5.116%, which is higher."}, {"text": "Account X, because its APY is higher due to more frequent compounding, despite a lower APR.", "isCorrect": true, "rationale": "Account X's APY is calculated as (1 + 0.05/12)^12 - 1 ≈ 5.116%. Account Y's APY is 5.050% (since compounded annually, APY=APR). Account X's APY (5.116%) is higher than Account Y's APY (5.050%), making it the better choice despite a lower initial APR."}, {"text": "They offer the same effective return, as the difference in compounding balances out.", "isCorrect": false, "rationale": "The APYs are different, meaning the actual returns are not the same."}, {"text": "Account Y, because annual compounding is simpler and always yields a better return in the long run.", "isCorrect": false, "rationale": "Simplicity of compounding does not determine the better return; the actual APY does. More frequent compounding often leads to higher APY if APRs are close."}]}, {"question": "If a savings account's APR remains constant but its compounding frequency increases from monthly to daily, what will happen to its APY?", "options": [{"text": "The APY will decrease.", "isCorrect": false, "rationale": "More frequent compounding always leads to a higher APY, not a decrease."}, {"text": "The APY will remain the same.", "isCorrect": false, "rationale": "APY only remains the same as APR if compounding is annual. Increasing compounding frequency always changes (increases) the APY."}, {"text": "The APY will increase.", "isCorrect": true, "rationale": "The text states, 'The more frequently interest compounds, the higher the APY compared to the APR.' Therefore, increasing compounding frequency will increase the APY."}, {"text": "The APY will only change if the APR is also adjusted.", "isCorrect": false, "rationale": "APY is directly affected by compounding frequency, even if the stated APR stays constant."}]}, {"question": "According to the text, why should you 'always compare APY, not APR' when choosing between savings accounts?", "options": [{"text": "APR is a legal requirement, while APY is optional for banks to disclose.", "isCorrect": false, "rationale": "The text does not discuss the legal requirements for disclosing APR or APY, but rather their mathematical distinction."}, {"text": "APY reflects the impact of compounding, showing the actual earnings.", "isCorrect": true, "rationale": "The text explicitly states: 'Rule: When comparing savings accounts, always compare APY, not APR. APY tells you what you actually earn.'"}, {"text": "Banks intentionally make APR misleading to attract customers.", "isCorrect": false, "rationale": "While the difference can be confusing, the text focuses on the mathematical reason for using APY, not intentional deception by banks."}, {"text": "APY includes all bank fees, giving a complete cost analysis.", "isCorrect": false, "rationale": "APY accounts for compounding interest but does not necessarily include all bank fees."}]}, {"question": "How does the concept of compounding frequency apply differently when considering loans (like credit cards) compared to savings accounts?", "options": [{"text": "For loans, APY is always lower than APR, benefiting the borrower.", "isCorrect": false, "rationale": "Compounding, whether for deposits or loans, makes the effective rate (like APY) higher than the stated rate (APR) when compounding is more frequent than annual. For loans, this works against the borrower."}, {"text": "For loans, more frequent compounding works against the borrower, increasing the total interest paid.", "isCorrect": true, "rationale": "The warning box states: 'APR is also used for loans... where more frequent compounding works against you (you pay more interest). On a loan, a higher compounding frequency means you owe more.'"}, {"text": "For loans, APR already includes all compounding effects, making APY irrelevant.", "isCorrect": false, "rationale": "APR for loans, like for savings, is the stated rate. Compounding still affects the *effective* rate paid by the borrower."}, {"text": "Loans typically only use simple interest, making APR and APY identical.", "isCorrect": false, "rationale": "Many loans, especially credit cards, use compound interest, meaning APR and APY would not be identical if compounding is more frequent than annual."}]}, {"question": "Based on the information provided, why do credit card companies often compound interest daily?", "options": [{"text": "To simplify their accounting and interest calculation processes.", "isCorrect": false, "rationale": "Daily compounding is more complex to calculate manually than less frequent compounding. Its purpose is financial gain, not simplification."}, {"text": "To allow cardholders to pay off their balances more quickly.", "isCorrect": false, "rationale": "Daily compounding increases the amount owed, making it harder for cardholders to pay off balances quickly, not easier."}, {"text": "To increase the total amount of interest borrowers pay them.", "isCorrect": true, "rationale": "The text explains: 'This is another reason why credit card companies compound interest daily—it increases how much you pay them.'"}, {"text": "To ensure the APR and APY remain as close as possible for transparency.", "isCorrect": false, "rationale": "Daily compounding makes the APY significantly higher than the APR, which works against transparency if consumers only focus on the APR."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
