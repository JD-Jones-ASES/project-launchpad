<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 13, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A financial advisor recommends staggering the pulling of your free annual credit reports. What is the primary benefit of this strategy?", "options": [{"text": "It ensures all three bureaus report the same information immediately.", "isCorrect": false, "rationale": "Staggering means you pull reports at different times, not simultaneously. While checking for consistency is important, this strategy's primary benefit is not immediate confirmation across all bureaus."}, {"text": "It allows for more frequent checks on your credit file throughout the year for free.", "isCorrect": true, "rationale": "The text states, 'Instead of pulling all three reports at once, some financial advisors suggest staggering them throughout the year—one bureau every four months. This gives you more frequent checks on your file throughout the year, all for free.'"}, {"text": "It reduces the chance of hard inquiries affecting your credit score.", "isCorrect": false, "rationale": "Pulling your own credit report is considered a soft inquiry and does not affect your credit score, regardless of whether you pull all three at once or stagger them."}, {"text": "It combines all three reports into one comprehensive document.", "isCorrect": false, "rationale": "Staggering reports does not combine them; you still receive separate reports from each of the three major bureaus at different times."}]}, {"question": "Under federal law, what is the *only* government-mandated website for accessing your free annual credit reports from all three major bureaus?", "options": [{"text": "MyFICO.com", "isCorrect": false, "rationale": "MyFICO.com is associated with the FICO scoring model and offers credit services, but it is not the government-mandated website for free annual credit reports."}, {"text": "CreditKarma.com", "isCorrect": false, "rationale": "CreditKarma.com is a popular commercial service for free credit monitoring and reports, but it is not the government-mandated site."}, {"text": "AnnualCreditReport.com", "isCorrect": true, "rationale": "The text explicitly states, 'This is the only government-mandated free credit report website.' for accessing reports from Equifax, Experian, and TransUnion."}, {"text": "FreeCreditScore.com", "isCorrect": false, "rationale": "FreeCreditScore.com is often a commercial site or one used in scams, not the official government-mandated source for free annual credit reports."}]}, {"question": "While reviewing your credit report, you discover an account you never opened. What is the most appropriate immediate action to take according to the text?", "options": [{"text": "Call the account's creditor directly to close the account.", "isCorrect": false, "rationale": "While eventually necessary in cases of identity theft, the text's guidance on credit report errors specifically advises disputing with the bureau first to get the error investigated and corrected on the report itself."}, {"text": "Dispute the error in writing with the credit bureau that issued the report.", "isCorrect": true, "rationale": "The text states, 'If you find one, you have the right to dispute it with the bureau in writing. The bureau must investigate and correct any verified errors—usually within 30 days.'"}, {"text": "Assume it's a minor error and wait for it to be removed automatically.", "isCorrect": false, "rationale": "Accounts you did not open could indicate identity theft or fraud and should be addressed promptly, not ignored."}, {"text": "Apply for a new credit card to offset the negative impact of the fraudulent account.", "isCorrect": false, "rationale": "This action does not address the fraudulent account on the report and could lead to more hard inquiries, potentially further impacting your score."}]}, {"question": "Which of the following actions typically results in an inquiry that *does not* affect your credit score?", "options": [{"text": "Applying for a new car loan.", "isCorrect": false, "rationale": "Applying for a new loan or credit product generally results in a hard inquiry, which can affect your credit score."}, {"text": "Checking your own credit score through your bank's mobile app.", "isCorrect": true, "rationale": "The text specifies that checking your credit score monthly through your bank or card app is a 'soft inquiry—no score impact.'"}, {"text": "Opening a new line of credit with a retailer.", "isCorrect": false, "rationale": "Opening a new line of credit involves a hard inquiry, which can affect your credit score."}, {"text": "Applying for a mortgage.", "isCorrect": false, "rationale": "Applying for a mortgage involves a hard inquiry, which can affect your credit score."}]}, {"question": "You encounter a website claiming it can legally remove accurate negative information, such as a bankruptcy, from your credit report for a fee. Based on the provided text, what is the most important red flag about this offer?", "options": [{"text": "The website's URL is slightly different from AnnualCreditReport.com.", "isCorrect": false, "rationale": "While a different URL is a red flag for official credit reports, the primary issue with this specific offer is the promise of removing accurate negative information, which is illegal."}, {"text": "It promises to remove *accurate* negative information, which is illegal.", "isCorrect": true, "rationale": "The text explicitly states this as a major red flag: 'Promising to remove accurate negative information from your report (this is illegal—no one can legally do this).'"}, {"text": "It asks for a credit card number to access your 'free' credit report.", "isCorrect": false, "rationale": "This is a red flag for 'free' reports, but the core issue in the question relates to the legality of removing *accurate* negative items, not the report access fee."}, {"text": "It does not offer free monthly score access.", "isCorrect": false, "rationale": "The availability of free monthly score access is unrelated to the legality of removing accurate negative information for a fee."}]}, {"question": "The text suggests getting free annual credit reports from *all three* major bureaus. What is the primary reason for doing this, rather than just one?", "options": [{"text": "Each bureau uses a different credit scoring model, providing varied results.", "isCorrect": false, "rationale": "While different scoring models exist, the primary reason stated for checking all three reports is about the underlying data's consistency, not the scoring models used within the reports themselves."}, {"text": "It allows you to compare the data to see if it is consistent and to catch any bureau-specific errors.", "isCorrect": true, "rationale": "The text explains, 'Getting reports from all three bureaus lets you see if the data is consistent and catch any bureau-specific errors.'"}, {"text": "Some lenders only report to one specific bureau, so you need all three to see all accounts.", "isCorrect": false, "rationale": "Most major lenders report to all three bureaus, although reporting can vary. The text's primary reason for checking all three is explicitly stated as ensuring data consistency and catching errors across them."}, {"text": "Federal law requires you to review all three reports annually to maintain good credit.", "isCorrect": false, "rationale": "Federal law entitles you to these reports but does not mandate that you review all three annually for credit maintenance."}]}, {"question": "According to federal law, after how many years must most negative items, excluding bankruptcies, typically be removed from your credit report?", "options": [{"text": "Three years.", "isCorrect": false, "rationale": "Three years is too short for most negative items to be removed from a credit report."}, {"text": "Five years.", "isCorrect": false, "rationale": "Five years is too short for most negative items to be removed from a credit report."}, {"text": "Seven years.", "isCorrect": true, "rationale": "The text states, 'Most negative items must be removed after seven years; bankruptcies after ten years.'"}, {"text": "Ten years.", "isCorrect": false, "rationale": "Ten years is the removal period for bankruptcies, not for most other negative items."}]}, {"question": "Liam, an 18-year-old, is trying to rent his first apartment but is told he has no credit history. Based on the 'Your Credit Score at 18' section, what is the most accurate understanding of Liam's situation?", "options": [{"text": "Liam must have made a mistake, as everyone automatically gets a credit score at 18.", "isCorrect": false, "rationale": "The text explicitly states that it is 'completely normal' for young adults at 18 to have no credit history."}, {"text": "Liam's situation is completely normal, and building credit takes time and active effort.", "isCorrect": true, "rationale": "The text states, 'Many young adults discover at 18...that they have no credit history at all. This is completely normal. The best time to start building credit is before you need it.'"}, {"text": "Liam should immediately apply for as many credit cards as possible to quickly build his history.", "isCorrect": false, "rationale": "While building credit is important, applying for many credit lines at once can be detrimental, especially for someone with no established credit."}, {"text": "Liam should only worry about building credit once he has a steady full-time job.", "isCorrect": false, "rationale": "The text advises starting to build credit 'before you need it,' implying that waiting until full-time employment might be too late for immediate needs like an apartment or car loan."}]}, {"question": "As part of a simple annual monitoring routine, how often does the text recommend checking your credit score through your bank or credit card app?", "options": [{"text": "Annually, when pulling your free credit reports.", "isCorrect": false, "rationale": "The text recommends pulling reports every four months (staggered) and checking scores more frequently."}, {"text": "Quarterly, every four months.", "isCorrect": false, "rationale": "This frequency is suggested for pulling individual credit reports, not for checking credit scores via apps."}, {"text": "Monthly.", "isCorrect": true, "rationale": "The text outlines a routine that includes: 'Check your credit score monthly through your bank or card app (soft inquiry—no score impact).'"}, {"text": "Only when you plan to apply for new credit.", "isCorrect": false, "rationale": "The text encourages a regular monitoring habit, not just reactive checks when applying for new credit."}]}, {"question": "When utilizing a free credit score monitoring service (e.g., through a bank or a website), what crucial detail should you confirm to ensure you're getting the most relevant information?", "options": [{"text": "Whether the service is a government-mandated provider.", "isCorrect": false, "rationale": "Only AnnualCreditReport.com is government-mandated for free *reports*, not for general credit score monitoring services."}, {"text": "If the service offers 'credit repair' options for a fee.", "isCorrect": false, "rationale": "This is a red flag for potential scams, not a 'crucial detail' to confirm for a legitimate monitoring service. Legitimate services focus on monitoring, not 'fixing' for a fee."}, {"text": "Whether it's showing you a true FICO score or a different scoring model.", "isCorrect": true, "rationale": "The text advises, 'When using any monitoring service, confirm whether it is showing you a true FICO score or a different scoring model—results can vary slightly between models.'"}, {"text": "If it provides a detailed payment history for all your accounts.", "isCorrect": false, "rationale": "While a detailed payment history is important for understanding your credit, the text specifically highlights confirming the *scoring model* used by free monitoring services as crucial."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
