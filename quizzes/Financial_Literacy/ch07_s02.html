<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 7, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement best describes the primary goal of zero-based budgeting?", "options": [{"text": "To ensure that monthly expenses never exceed fixed income sources.", "isCorrect": false, "rationale": "This statement is too narrow; zero-based budgeting encompasses all income and assigns every dollar, not just ensuring expenses don't exceed fixed income."}, {"text": "To assign every dollar of income to a specific purpose (spending, saving, or giving), resulting in a zero balance.", "isCorrect": true, "rationale": "This accurately reflects the core principle of zero-based budgeting, where 'every dollar has a job' and the goal is Income - Expenses - Savings - Giving = $0."}, {"text": "To minimize all spending categories to maximize savings at the end of the month.", "isCorrect": false, "rationale": "While saving is important, the goal is not solely to minimize spending to maximize savings, but rather to intentionally assign every dollar to a category, which includes spending, saving, and giving."}, {"text": "To pay all bills and then save any remaining money at the end of the month.", "isCorrect": false, "rationale": "This describes the opposite approach of 'save whatever is left,' which zero-based budgeting aims to avoid by proactively assigning funds."}], "id": "q01"}, {"question": "How does the 'every dollar has a job' principle in zero-based budgeting fundamentally differ from the approach of 'save whatever is left'?", "options": [{"text": "'Every dollar has a job' prioritizes spending on wants before needs, while 'save whatever is left' prioritizes saving.", "isCorrect": false, "rationale": "Zero-based budgeting explicitly recommends prioritizing fixed expenses, then variable needs, then savings, then wants, which contradicts this statement. 'Save whatever is left' often results in less saving."}, {"text": "'Every dollar has a job' ensures intentional allocation of funds for all purposes, including savings, whereas 'save whatever is left' often leads to minimal or no savings due to unexpected spending.", "isCorrect": true, "rationale": "The text highlights that zero-based budgeting reverses the 'save whatever is left' approach by deciding how much to save first, giving savings a job, and preventing 'leftover' money from being consumed by unplanned spending."}, {"text": "'Every dollar has a job' focuses only on fixed expenses, while 'save whatever is left' accounts for variable expenses.", "isCorrect": false, "rationale": "Zero-based budgeting accounts for all categories of spending, saving, and giving, including both fixed and variable expenses."}, {"text": "'Every dollar has a job' requires using gross pay, while 'save whatever is left' uses net pay.", "isCorrect": false, "rationale": "The text explicitly states that zero-based budgeting uses net pay, not gross pay."}], "id": "q02"}, {"question": "When building a zero-based budget, what type of income should be used for 'Net Income'?", "options": [{"text": "Total earnings before taxes and deductions (gross pay).", "isCorrect": false, "rationale": "The text explicitly states to 'Use net pay, not gross pay' for total take-home pay."}, {"text": "Only predictable transfers from other accounts.", "isCorrect": false, "rationale": "While predictable transfers are part of income, it also includes paychecks and any other side income, not exclusively transfers."}, {"text": "All take-home pay and any other predictable income after taxes and deductions.", "isCorrect": true, "rationale": "Net income is defined as 'total take-home pay (and any other income) for the month,' which means after taxes and deductions."}, {"text": "Income that is hoped for but not yet received.", "isCorrect": false, "rationale": "The text warns against budgeting based on 'income you are hoping for,' especially for variable income, advocating for conservative estimates."}], "id": "q03"}, {"question": "In a zero-based budget, achieving a balance of $0 at the end of the planning process signifies what?", "options": [{"text": "That all available funds have been spent on immediate consumption, leaving nothing for savings or giving.", "isCorrect": false, "rationale": "This is incorrect. Savings and giving are considered 'jobs' for money in a zero-based budget, so they are included in the $0 balance."}, {"text": "That all income has been deliberately assigned to spending, saving, or giving categories.", "isCorrect": true, "rationale": "A $0 balance means 'every dollar has a job' and has been given a deliberate assignment, including savings and giving."}, {"text": "That the budget was inaccurate, as there should always be a surplus left over.", "isCorrect": false, "rationale": "A surplus means money is unassigned, which is the opposite of the zero-based budgeting goal."}, {"text": "That debt payments have been prioritized above all other categories.", "isCorrect": false, "rationale": "While debt repayment can be a category, the $0 balance applies to all categories equally, not just debt."}], "id": "q04"}, {"question": "A freelance graphic designer's monthly income varies significantly. According to zero-based budgeting principles, how should she determine her 'Net Income' for the upcoming month's budget?", "options": [{"text": "Budget based on her highest earning month to ensure she can cover all her desired expenses.", "isCorrect": false, "rationale": "The text specifically warns against budgeting based on hoped-for or best-case income, as this leads to overspending in average or low months."}, {"text": "Budget based on her average income over the past six months.", "isCorrect": false, "rationale": "While an average might seem reasonable, the text advises a more conservative approach for variable income, specifically the 'lowest expected income'."}, {"text": "Budget based on her lowest expected income for the month as a conservative baseline.", "isCorrect": true, "rationale": "For variable income, the text advises to 'Base the budget on your lowest expected income for the month. This is conservative and keeps you from over-committing.'"}, {"text": "Budget based on last month's income, assuming it will be similar.", "isCorrect": false, "rationale": "This assumes consistency that doesn't apply to variable income, and if last month was high, it wouldn't be a conservative estimate."}], "id": "q05"}, {"question": "When assigning dollar amounts to categories in a zero-based budget (Step 2), what is the recommended order of prioritization for allocating funds?", "options": [{"text": "Variable wants, then fixed expenses, then savings goals, then variable needs.", "isCorrect": false, "rationale": "This order is incorrect; fixed expenses and variable needs typically come before wants and often savings."}, {"text": "Savings goals, then fixed expenses, then variable needs, then variable wants.", "isCorrect": false, "rationale": "Savings goals usually follow fixed expenses and variable needs in the recommended prioritization."}, {"text": "Fixed expenses, then variable needs, then savings goals, then variable wants.", "isCorrect": true, "rationale": "The text states: 'Cover fixed expenses (rent, car payment) first, then variable needs (groceries, gas), then savings goals, then wants (entertainment, dining out).'"}, {"text": "Giving, then all expenses, then savings.", "isCorrect": false, "rationale": "Giving is one category, but the prioritization is more granular, distinguishing between different types of expenses and savings goals."}], "id": "q06"}, {"question": "After listing all income and assigning initial amounts to categories, Jordan finds that her total assigned amounts are $150 less than her net income. What should she do next, according to the zero-based budgeting process?", "options": [{"text": "Spend the extra $150 on an unplanned purchase since it's 'leftover.'", "isCorrect": false, "rationale": "This goes against the 'every dollar has a job' principle; unassigned money needs to be given a purpose."}, {"text": "Carry the $150 over to next month's budget as a starting balance.", "isCorrect": false, "rationale": "The goal of zero-based budgeting is to assign every dollar in the current month, not to carry over unassigned funds."}, {"text": "Reduce her income estimate for the month by $150 to make the numbers match.", "isCorrect": false, "rationale": "Manipulating the income figure to match assigned amounts is not part of the adjustment process; the assigned amounts should match the actual income."}, {"text": "Assign the remaining $150 to a category such as savings, a sinking fund, or extra debt repayment.", "isCorrect": true, "rationale": "Step 3 clearly states: 'If the total is less than your income, assign the leftover to a category—savings, a sinking fund, or extra debt repayment.'"}], "id": "q07"}, {"question": "Why is it cautioned against budgeting based on 'income you are hoping for' when income varies?", "options": [{"text": "It creates an unnecessarily complex budget that is hard to manage.", "isCorrect": false, "rationale": "While complexity can be a factor, the primary warning is about financial risk, not just complexity."}, {"text": "It may lead to overspending and a budget shortfall if actual income is lower than hoped.", "isCorrect": true, "rationale": "The warning box explicitly states: 'This leads to overspending when average or low months arrive.'"}, {"text": "It discourages saving and makes it harder to meet long-term financial goals.", "isCorrect": false, "rationale": "This is an indirect consequence, but the direct warning focuses on the immediate risk of overspending."}, {"text": "It primarily affects fixed expenses, which are usually easier to adjust.", "isCorrect": false, "rationale": "Budgeting based on hoped-for income primarily affects flexible categories, as fixed expenses are generally non-negotiable."}], "id": "q08"}, {"question": "Emily has a net income of $2,500 per month. Her fixed expenses are $1,200 (rent, car payment), and she plans to contribute $300 to her emergency fund savings. She also wants to give $100 to charity. How much money does Emily have left for variable expenses like groceries, transportation, and entertainment?", "options": [{"text": "$1,000", "isCorrect": false, "rationale": "This calculation (2500 - 1200 - 300 = 1000) incorrectly omits the giving category."}, {"text": "$900", "isCorrect": true, "rationale": "Net Income ($2,500) - Fixed Expenses ($1,200) - Savings ($300) - Giving ($100) = $900 remaining for variable expenses."}, {"text": "$1,300", "isCorrect": false, "rationale": "This calculation (2500 - 1200 = 1300) omits both savings and giving categories."}, {"text": "$1,100", "isCorrect": false, "rationale": "This calculation is incorrect."}], "id": "q09"}, {"question": "Which of the following is a key outcome or benefit of consistently applying zero-based budgeting?", "options": [{"text": "It guarantees a surplus of unassigned funds at the end of each month.", "isCorrect": false, "rationale": "Zero-based budgeting explicitly aims for a zero balance, meaning all funds are assigned, not that there's a surplus."}, {"text": "It provides a clear and intentional plan for every dollar, enhancing financial control and awareness.", "isCorrect": true, "rationale": "The text emphasizes intentionality, giving 'every dollar a job,' leading to greater control and clarity over one's finances."}, {"text": "It eliminates the need to track variable expenses, as they are automatically covered.", "isCorrect": false, "rationale": "Zero-based budgeting requires careful assignment and tracking of all categories, including variable expenses."}, {"text": "It focuses solely on reducing expenses, making savings the only priority.", "isCorrect": false, "rationale": "Zero-based budgeting balances spending (fixed and variable), saving, and giving, and is not solely about reducing expenses or prioritizing only savings."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
