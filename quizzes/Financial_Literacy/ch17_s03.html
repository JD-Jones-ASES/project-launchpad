    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 17, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "During a widespread economic recession, when even good, well-run companies see their stock prices fall because investors are selling broadly, which type of risk is primarily at play?", "options": [{"text": "Inflation risk", "isCorrect": false, "rationale": "Inflation risk concerns the purchasing power of money over time, not a general market decline due to broad economic events like a recession."}, {"text": "Market risk", "isCorrect": true, "rationale": "The text defines Market Risk as 'the risk that the entire investment market declines due to broad economic events—a recession, a financial crisis, a pandemic, or a war.' This precisely matches the scenario described."}, {"text": "Interest rate risk", "isCorrect": false, "rationale": "Interest rate risk is specifically about rising interest rates reducing the value of investments, particularly bonds, not a broad market decline from a recession affecting stocks generally."}, {"text": "Concentration risk", "isCorrect": false, "rationale": "Concentration risk is about having too much money in a single investment, company, or industry. The scenario describes a broad market downturn affecting many companies, not just one concentrated holding."}]}, {"question": "The text states that market risk 'cannot be completely eliminated.' However, it suggests a primary strategy for managing this risk. What is it?", "options": [{"text": "Selling all investments immediately at the first sign of a downturn.", "isCorrect": false, "rationale": "The text explicitly warns against this, stating, 'If you sell in a panic, you lock in your losses permanently.'"}, {"text": "Investing solely in high-yield bonds to offset potential stock losses.", "isCorrect": false, "rationale": "While bonds are mentioned in relation to interest rate risk, the text does not suggest this as the primary strategy for managing market risk."}, {"text": "Maintaining a long time horizon and staying invested through downturns.", "isCorrect": true, "rationale": "The text advises, 'Market risk cannot be completely eliminated, but it can be managed with a long time horizon. If you stay invested through a downturn, you benefit when the market recovers.'"}, {"text": "Diversifying exclusively into real estate and alternative investments.", "isCorrect": false, "rationale": "Diversification is mentioned for reducing concentration risk, but not specifically for managing market risk in this manner. Real estate also has its own liquidity considerations."}]}, {"question": "An investor places their savings in an account that yields a 1% annual return. If the annual inflation rate is consistently 3%, what risk is the investor primarily facing, and what is the practical outcome?", "options": [{"text": "Interest rate risk; the value of their bonds will decrease.", "isCorrect": false, "rationale": "This scenario does not mention bonds, and interest rate risk is about rising rates affecting bond prices, not the general purchasing power of savings in relation to inflation."}, {"text": "Liquidity risk; they will have difficulty withdrawing their money quickly.", "isCorrect": false, "rationale": "The scenario describes an issue with the real value of money over time, not the ability to access funds quickly."}, {"text": "Inflation risk; their money will effectively lose purchasing power over time.", "isCorrect": true, "rationale": "The text defines inflation risk as 'the risk that your investment's return does not keep up with inflation—meaning your money buys less in the future than it does today.' With a 1% return and 3% inflation, the investor is effectively losing 2% of purchasing power annually."}, {"text": "Market risk; the entire market is declining.", "isCorrect": false, "rationale": "This scenario is specific to the purchasing power of money in an account, not a broad market decline affecting all investments."}]}, {"question": "The text describes inflation risk as 'invisible but very real.' Which of the following best illustrates why this type of risk might be considered 'invisible'?", "options": [{"text": "The dollar amount in a savings account may still grow, masking a loss of purchasing power.", "isCorrect": true, "rationale": "The text's warning box states, 'Suppose you keep all your savings in an account earning 1% per year, but inflation is running at 3% per year. ...After 10 years, your dollars buy significantly less even though your account balance grew.' This demonstrates how nominal growth can hide real losses in purchasing power, making the risk seem invisible."}, {"text": "It only affects investments that are not publicly traded.", "isCorrect": false, "rationale": "Inflation risk affects any investment where the return doesn't keep pace with inflation, regardless of its public trading status."}, {"text": "Investors are typically unaware of current inflation rates.", "isCorrect": false, "rationale": "While awareness varies, the 'invisibility' refers more to the deceptive nature of nominal gains versus real losses, even if inflation rates are known."}, {"text": "It only impacts investments during periods of economic recession.", "isCorrect": false, "rationale": "Inflation can occur independently of a recession, and inflation risk is a continuous factor in long-term financial planning."}]}, {"question": "Interest rate risk is defined as the risk that rising interest rates will reduce the value of your investments. Which specific investment type is highlighted as being 'mainly affected' by this risk?", "options": [{"text": "Stocks", "isCorrect": false, "rationale": "The text explicitly states, 'Stocks are less directly affected' by interest rate risk, although they can be indirectly impacted."}, {"text": "Real estate", "isCorrect": false, "rationale": "Real estate is primarily mentioned in the context of liquidity risk, not as the main asset affected by interest rate risk in this section."}, {"text": "Bonds and bond funds", "isCorrect": true, "rationale": "The text clearly states, 'Interest rate risk mainly affects bonds and bond funds.'"}, {"text": "Commodities", "isCorrect": false, "rationale": "Commodities are not mentioned in the context of interest rate risk in this section."}]}, {"question": "While interest rate risk primarily impacts bonds, how does the text explain its *indirect* influence on stock prices?", "options": [{"text": "Rising interest rates make it more expensive for companies to borrow, directly reducing stock market liquidity.", "isCorrect": false, "rationale": "The text does not mention reduced stock market liquidity as the indirect effect. While higher borrowing costs can affect companies, the stated indirect impact is different."}, {"text": "It causes investors to panic and sell all their stock holdings immediately.", "isCorrect": false, "rationale": "This describes a general investor reaction to fear, not the specific indirect impact of rising rates on stock prices mentioned in the text."}, {"text": "Rising interest rates can slow economic growth, which can, in turn, impact stock prices.", "isCorrect": true, "rationale": "The text states, 'though rising rates can slow economic growth and indirectly impact stock prices.'"}, {"text": "Companies are forced to issue more shares to raise capital, diluting existing stock value.", "isCorrect": false, "rationale": "While companies might issue shares, the text does not link this to the indirect impact of rising rates on stock prices."}]}, {"question": "A person invests nearly all of their retirement savings in shares of the single company they work for. Based on the provided text, what is the primary risk this individual is taking with their investment strategy?", "options": [{"text": "Market risk", "isCorrect": false, "rationale": "While market risk could affect the company, the *specific* risk of having 'nearly all of their retirement savings in shares of the single company' points to a different, more acute danger than general market movements."}, {"text": "Liquidity risk", "isCorrect": false, "rationale": "Shares of a publicly traded company are typically highly liquid. The core issue here is not difficulty selling, but over-reliance on one asset."}, {"text": "Concentration risk", "isCorrect": true, "rationale": "The text explicitly states, 'Concentration risk is the risk of having too much of your money in a single investment, company, or industry,' and provides the example of 'employees who invested their entire retirement savings in their own company's stock sometimes lost nearly everything when the company went bankrupt.'"}, {"text": "Inflation risk", "isCorrect": false, "rationale": "This strategy doesn't inherently present an inflation risk different from any other stock investment; the core issue is the lack of diversification across holdings."}]}, {"question": "The financial adage, 'Never put all your eggs in one basket,' is directly presented in the text as a strategy to mitigate which specific type of investment risk?", "options": [{"text": "Interest rate risk", "isCorrect": false, "rationale": "Interest rate risk is managed by considering bond characteristics and interest rate movements, not primarily by avoiding concentration in a general sense."}, {"text": "Market risk", "isCorrect": false, "rationale": "Market risk is managed with a long time horizon, not directly by avoiding putting all eggs in one basket, which refers to specific asset allocation choices."}, {"text": "Inflation risk", "isCorrect": false, "rationale": "Inflation risk is managed by ensuring investment returns outpace inflation, not by the 'eggs in one basket' principle."}, {"text": "Concentration risk", "isCorrect": true, "rationale": "The text states, 'Never put all your eggs in one basket—diversification...directly addresses this risk' in the context of concentration risk."}]}, {"question": "An investor owns a piece of undeveloped land. When an urgent financial need arises, they discover it takes several months and considerable effort to find a buyer willing to pay a fair price. This situation best exemplifies which type of investment risk?", "options": [{"text": "Market risk", "isCorrect": false, "rationale": "This scenario is about the ease and speed of selling an asset, not a broad market decline affecting all investments."}, {"text": "Liquidity risk", "isCorrect": true, "rationale": "The text defines liquidity risk as 'the risk that you cannot sell an investment quickly—or at a fair price—when you need the money,' and explicitly uses real estate as an example of an illiquid asset."}, {"text": "Interest rate risk", "isCorrect": false, "rationale": "This scenario has no direct connection to rising interest rates impacting bond values."}, {"text": "Concentration risk", "isCorrect": false, "rationale": "While owning only one piece of land could be a form of concentration, the *problem* described (difficulty selling quickly at a fair price) points specifically to liquidity risk."}]}, {"question": "According to the 'moneytip' box, what is the primary benefit of diversification in an investment portfolio?", "options": [{"text": "It eliminates market risk completely from a portfolio.", "isCorrect": false, "rationale": "The text states market risk 'cannot be completely eliminated,' and diversification is presented as reducing 'overall portfolio risk,' not eliminating market risk entirely."}, {"text": "It guarantees higher returns compared to a highly concentrated portfolio.", "isCorrect": false, "rationale": "The text states it reduces risk 'while giving up very little of the potential return,' not that it guarantees higher returns. Its primary benefit is risk reduction."}, {"text": "It significantly reduces overall portfolio risk while giving up very little of the potential return.", "isCorrect": true, "rationale": "The 'moneytip' box explicitly states, 'Research consistently shows that spreading investments across many different assets reduces overall portfolio risk significantly—while giving up very little of the potential return.'"}, {"text": "It ensures all investments within the portfolio are highly liquid.", "isCorrect": false, "rationale": "Diversification can include illiquid assets; its primary benefit as described is risk reduction, not universal liquidity for all portfolio components."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
