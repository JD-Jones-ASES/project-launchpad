<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 31, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Why does giving that happens only when there is money 'left over' rarely occur?", "options": [{"text": "Most people are too selfish to give spontaneously without planning.", "isCorrect": false, "rationale": "The section frames this as a planning problem, not a moral failing. The issue is that discretionary money gets spent on unplanned items."}, {"text": "Because there is almost never money left over when you are not planning for it — discretionary funds get absorbed by spending.", "isCorrect": true, "rationale": "The section states: 'there is almost never money left over when you are not planning for it.' Unplanned giving is crowded out by unplanned spending."}, {"text": "Banking regulations prevent spontaneous wire transfers to nonprofit organizations.", "isCorrect": false, "rationale": "No banking regulation issue is discussed. The barrier is a planning and behavioral one."}, {"text": "Most charities only accept donations at the beginning of the calendar year.", "isCorrect": false, "rationale": "This is not stated in the section. Most charities accept donations year-round."}], "id": "q01"}, {"question": "What is the recommended starting point for someone who is 'just starting out' and money is tight?", "options": [{"text": "Wait until income exceeds $40,000 before beginning any giving.", "isCorrect": false, "rationale": "The section recommends starting small immediately — even 1% — rather than waiting for a higher income threshold."}, {"text": "Start with even 1% of income — one penny out of every dollar — and let the habit grow over time.", "isCorrect": true, "rationale": "The section advises starting small: 'Even 1% of your income—one penny out of every dollar—is a meaningful start.' The habit grows as financial stability improves."}, {"text": "Start by volunteering time until you can afford a minimum $100/month donation.", "isCorrect": false, "rationale": "Volunteering is mentioned as a valid form of generosity, but no $100/month minimum is prescribed before giving money."}, {"text": "Focus on paying off debt first, then allocate giving from the freed-up cash flow.", "isCorrect": false, "rationale": "While debt repayment is covered elsewhere in the course, this section does not prescribe that giving must wait until debt is paid off."}], "id": "q02"}, {"question": "Which approach does the section describe as almost always resulting in consistent giving?", "options": [{"text": "Approach A: 'I'll give when I have extra money.'", "isCorrect": false, "rationale": "The section explicitly identifies Approach A as the one that rarely results in consistent giving, because extra money rarely materializes without a plan."}, {"text": "Approach B: Automatic giving of a set amount each month before spending anything else.", "isCorrect": true, "rationale": "Approach B ('I give $25/month, automatically, before I spend anything else') ensures giving happens every month regardless of mood or impulse spending."}, {"text": "Annual lump-sum giving during the tax filing period to maximize deductions.", "isCorrect": false, "rationale": "Annual lump-sum giving is not described as the most consistent approach. The section favors automatic recurring monthly giving."}, {"text": "Matching your employer's charitable contribution whenever your company runs a giving campaign.", "isCorrect": false, "rationale": "Employer matching campaigns are not discussed in this section as the model for consistent giving."}], "id": "q03"}, {"question": "What psychology principle makes $automatic giving$ effective, according to the section?", "options": [{"text": "It exploits cognitive dissonance by committing donors to a public pledge.", "isCorrect": false, "rationale": "The section does not mention cognitive dissonance or public pledges as the mechanism."}, {"text": "The same psychology that makes automatic retirement contributions powerful — removing ongoing decision-making from the equation.", "isCorrect": true, "rationale": "The section explicitly draws this parallel: 'This is exactly the same psychology that makes automatic retirement contributions so powerful.'"}, {"text": "It creates a tax-deductible record that motivates more giving over time.", "isCorrect": false, "rationale": "Tax record-keeping is not the behavioral mechanism the section highlights. The key is removing ongoing decision-making."}, {"text": "It triggers loss aversion so that donors feel obligated to continue once started.", "isCorrect": false, "rationale": "Loss aversion is not invoked. The section's emphasis is on automation removing friction from the decision, not on emotional obligation."}], "id": "q04"}, {"question": "Which of the following questions does the section suggest researching before donating to an organization?", "options": [{"text": "What is the CEO's salary and tenure at the organization?", "isCorrect": false, "rationale": "While executive compensation can be a factor in charity evaluation generally, the section does not specifically mention this question."}, {"text": "What percentage of donations goes to programs vs. overhead, and is it a qualified 501(c)(3)?", "isCorrect": true, "rationale": "The section lists both of these: overhead ratio (programs vs. overhead) and 501(c)(3) status as key research questions before donating."}, {"text": "Whether the organization has a matching gift program for corporate donors.", "isCorrect": false, "rationale": "Corporate matching programs are not listed among the due diligence questions in the section."}, {"text": "Whether the charity has been endorsed by a nationally recognized celebrity or public figure.", "isCorrect": false, "rationale": "Celebrity endorsement is not among the evaluation criteria the section recommends."}], "id": "q05"}, {"question": "According to the example in the section, what is $25/month as a percentage of a $2,000/month income?", "options": [{"text": "1%", "isCorrect": false, "rationale": "$25/$2,000 = 0.0125 = 1.25%, not 1.00%. The section's math shows 1.25%."}, {"text": "1.25%", "isCorrect": true, "rationale": "$25 ÷ $2,000 = 0.0125 = 1.25%. The section walks through this calculation explicitly."}, {"text": "2.5%", "isCorrect": false, "rationale": "$25/$2,000 = 1.25%, not 2.5%. For 2.5% you would need to give $50/month."}, {"text": "0.125%", "isCorrect": false, "rationale": "0.125% would be $2.50 on a $2,000 income. The correct calculation is $25/$2,000 = 1.25%."}], "id": "q06"}, {"question": "How much total would $25/month in giving accumulate over 10 years, without adjustment?", "options": [{"text": "$300", "isCorrect": false, "rationale": "$300 is the one-year total ($25 × 12). Over 10 years the total is $3,000."}, {"text": "$1,500", "isCorrect": false, "rationale": "$1,500 would result from $12.50/month over 10 years, not $25/month."}, {"text": "$3,000", "isCorrect": true, "rationale": "$25 × 12 months × 10 years = $3,000. The section provides this calculation explicitly."}, {"text": "$30,000", "isCorrect": false, "rationale": "$30,000 would require $250/month over 10 years, or $25/month over 100 years."}], "id": "q07"}, {"question": "The section compares building a '$giving portfolio$' to which financial concept?", "options": [{"text": "Laddering bonds to manage interest rate risk over time.", "isCorrect": false, "rationale": "Bond laddering is not the analogy used. The section compares a giving portfolio to diversifying investments."}, {"text": "Diversifying investments across different assets to spread impact and reduce concentration.", "isCorrect": true, "rationale": "The section explicitly draws the parallel: 'Just as you diversify investments across different assets, some people diversify their giving across different types of organizations.'"}, {"text": "Rebalancing a retirement account to maintain target asset allocations.", "isCorrect": false, "rationale": "Rebalancing is not the analogy. The concept invoked is diversification, not periodic rebalancing."}, {"text": "Setting up a sinking fund for a large one-time anticipated expense.", "isCorrect": false, "rationale": "A sinking fund is not the analogy used for a giving portfolio. The section uses investment diversification as the parallel."}], "id": "q08"}, {"question": "Which three categories does the section suggest for a 'giving portfolio'?", "options": [{"text": "International, faith-based, and political advocacy organizations.", "isCorrect": false, "rationale": "Political advocacy is not one of the three categories. Faith-based organizations may fall under 'personal' but the three stated categories are local, national/global, and personal."}, {"text": "Local, national or global, and personal (connected to your own experience or values).", "isCorrect": true, "rationale": "The section lists exactly these three: local organizations (food bank, shelter), national/global causes (disease research, disaster relief), and personal causes tied to your own experience or values."}, {"text": "Emergency, long-term, and legacy giving categories.", "isCorrect": false, "rationale": "These are not the three categories described. The section organizes by geographic/personal reach: local, national/global, and personal."}, {"text": "Cash donations, stock donations, and in-kind service contributions.", "isCorrect": false, "rationale": "These describe types of giving instruments, not the giving portfolio categories in the section, which are organized by cause type and geography."}], "id": "q09"}, {"question": "What is the simple rule the section offers as a framework for prioritizing giving in a budget?", "options": [{"text": "Save first, invest second, give third, live on the rest.", "isCorrect": false, "rationale": "The section's rule puts giving first alongside savings — not third. The order stated is: give first, save second, live on the rest."}, {"text": "Give first, save second, live on the rest.", "isCorrect": true, "rationale": "The closing money tip states: 'give first, save second, live on the rest' — placing giving at the top of the priority order, like savings, to ensure it actually happens."}, {"text": "Budget for needs, then wants, then savings, then giving from whatever remains.", "isCorrect": false, "rationale": "This describes a 'giving last' approach, which the section explicitly argues against as ineffective."}, {"text": "Invest 15% of income, give 10%, and live on the remaining 75%.", "isCorrect": false, "rationale": "No specific percentages for investing and giving are mandated in this rule. The principle is the order: give first, save second, live on the rest."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
