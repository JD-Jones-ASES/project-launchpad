<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 9, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following expenses would typically NOT be included when calculating your essential monthly expenses for an emergency fund?", "options": [{"text": "Minimum required debt payments", "isCorrect": false, "rationale": "The text explicitly lists 'Minimum required debt payments' as an essential expense to be included in an emergency fund calculation."}, {"text": "Health insurance premiums", "isCorrect": false, "rationale": "The text explicitly lists 'Health insurance premiums and essential prescriptions' as essential expenses."}, {"text": "Streaming service subscriptions", "isCorrect": true, "rationale": "The text states that an emergency fund 'does not need to cover dining out, entertainment, subscriptions, clothing, or other discretionary spending.' Streaming service subscriptions fall under discretionary entertainment."}, {"text": "Basic groceries", "isCorrect": false, "rationale": "The text explicitly lists 'Basic groceries' as an essential expense."}]}, {"question": "Sarah's monthly budget includes: Rent $800, Car Payment $300, Utilities $120, Dining Out $250, Groceries $350, Phone $60, Gym Membership $40, Student Loan Minimum $100. What is the total of her essential monthly expenses for an emergency fund calculation?", "options": [{"text": "$1,980", "isCorrect": false, "rationale": "This total likely includes non-essential items like dining out and gym membership, which should be excluded."}, {"text": "$1,730", "isCorrect": true, "rationale": "Essential expenses include: Rent ($800), Car Payment ($300 - considered a minimum required debt payment), Utilities ($120), Groceries ($350), Phone ($60), and Student Loan Minimum ($100). Dining Out ($250) and Gym Membership ($40) are discretionary. Sum: $800 + $300 + $120 + $350 + $60 + $100 = $1,730."}, {"text": "$1,470", "isCorrect": false, "rationale": "This calculation incorrectly excludes one or more essential debt payments or other core expenses, such as the car payment."}, {"text": "$1,380", "isCorrect": false, "rationale": "This calculation omits significant essential expenses, leading to an incorrect total."}]}, {"question": "Based on the standard recommendation, if your essential monthly expenses are $1,800, what is the *stronger* emergency fund target you should aim for?", "options": [{"text": "$1,800", "isCorrect": false, "rationale": "This represents only one month of essential expenses, which is neither the minimum nor the stronger target."}, {"text": "$3,600", "isCorrect": false, "rationale": "This represents two months of essential expenses, falling short of the recommended minimum target of three months."}, {"text": "$5,400", "isCorrect": false, "rationale": "This is the minimum (3-month) target ($1,800 x 3 = $5,400), not the stronger target."}, {"text": "$10,800", "isCorrect": true, "rationale": "The 'stronger target' uses N=6 months of essential expenses. Therefore, $1,800 (essential monthly expenses) × 6 months = $10,800."}]}, {"question": "The recommendation to save 3 to 6 months of essential expenses for an emergency fund primarily suggests that:", "options": [{"text": "Most financial emergencies last exactly three to six months.", "isCorrect": false, "rationale": "The text does not state that emergencies always last this specific duration, but rather that this range provides adequate coverage for various situations."}, {"text": "This range provides a balance between immediate readiness and comprehensive protection against common, longer-term crises like job loss.", "isCorrect": true, "rationale": "The '3 to 6 months' recommendation aims to provide sufficient coverage for a range of crises, from shorter-term issues to more extended periods, such as a prolonged job search where income is lost and discretionary spending is cut."}, {"text": "Saving more than six months is generally considered excessive and financially inefficient.", "isCorrect": false, "rationale": "The text does not make a judgment about saving more than six months; it simply provides a recommended target range."}, {"text": "This amount is sufficient to cover discretionary spending during an extended crisis.", "isCorrect": false, "rationale": "The text explicitly states the emergency fund covers 'essential expenses only—not total spending' and does not cover 'dining out, entertainment, subscriptions, clothing, or other discretionary spending.'"}]}, {"question": "Liam has calculated his 3-month emergency fund target to be $4,500. If he is able to consistently save $250 per month, approximately how many months will it take him to reach this target?", "options": [{"text": "17 months", "isCorrect": false, "rationale": "This calculation is less than the actual time needed to reach the target."}, {"text": "18 months", "isCorrect": true, "rationale": "To calculate the months to goal, divide the Emergency Fund Target by the Monthly Savings Amount: $4,500 / $250 = 18 months."}, {"text": "19 months", "isCorrect": false, "rationale": "This calculation is more than the actual time needed to reach the target."}, {"text": "20 months", "isCorrect": false, "rationale": "This calculation is significantly more than the actual time needed."}]}, {"question": "If someone's 6-month emergency fund target is $9,000, and they are currently saving $300 per month, how much would they need to *increase* their monthly savings by to reduce their timeline by approximately half?", "options": [{"text": "$300", "isCorrect": true, "rationale": "First, calculate the current timeline: $9,000 / $300 = 30 months. To reduce the timeline by half, the new timeline would be 15 months. Next, calculate the required monthly savings for a 15-month timeline: $9,000 / 15 months = $600 per month. The increase needed is $600 (new savings) - $300 (current savings) = $300."}, {"text": "$600", "isCorrect": false, "rationale": "This would be their *new total* monthly savings, not the amount by which they need to increase their current savings."}, {"text": "$900", "isCorrect": false, "rationale": "This amount is significantly higher than the required increase and would result in a much shorter timeline than half."}, {"text": "$1,200", "isCorrect": false, "rationale": "This amount is excessively high and not necessary to halve the timeline."}]}, {"question": "The core purpose of building an emergency fund, as described in the text, is to:", "options": [{"text": "Accumulate wealth for future investments.", "isCorrect": false, "rationale": "While savings can lead to investments, the emergency fund's immediate and core purpose is specifically for covering essential expenses during crises, not general wealth accumulation."}, {"text": "Provide a safety net for essential expenses during unexpected financial crises.", "isCorrect": true, "rationale": "The text explicitly states the emergency fund 'covers essential expenses—the baseline of what you need to survive a crisis,' directly aligning with providing a safety net for unexpected financial events."}, {"text": "Cover all typical monthly expenses, including wants, during short-term disruptions.", "isCorrect": false, "rationale": "The text specifies that the emergency fund covers 'essential expenses only—not total spending' and does not cover 'discretionary spending.'"}, {"text": "Fund large discretionary purchases without using credit.", "isCorrect": false, "rationale": "This is a goal for general savings, not the specific purpose of an emergency fund, which is reserved for genuine crises."}]}, {"question": "What is the primary benefit of establishing a 'starter fund' of $500 to $1,000 before working towards a full 3-6 month emergency fund?", "options": [{"text": "It provides enough capital to invest in low-risk financial products.", "isCorrect": false, "rationale": "The text highlights the starter fund's use for small emergencies, not for investment purposes."}, {"text": "It's a quick, achievable goal that covers most common, smaller financial surprises.", "isCorrect": true, "rationale": "The text states that a starter fund is 'achievable in weeks or a few months for most workers, and it handles the most common financial surprises' like minor car repairs or medical co-pays."}, {"text": "It allows individuals to immediately pay off all high-interest debt.", "isCorrect": false, "rationale": "A starter fund of $500-$1,000 is typically not large enough to pay off significant high-interest debt."}, {"text": "It serves as a down payment for a major purchase like a car or house.", "isCorrect": false, "rationale": "This amount is generally too small for major down payments, and that is not its stated purpose."}]}, {"question": "David's 6-month emergency fund target is $7,500. He is able to save $175 per month. How many months will it take him to reach his target?", "options": [{"text": "41 months", "isCorrect": false, "rationale": "This calculation is lower than the actual time needed after appropriate rounding."}, {"text": "42 months", "isCorrect": false, "rationale": "The exact division is 42.857... months. The text instructs to 'Round up to the nearest whole month,' making this option incorrect."}, {"text": "43 months", "isCorrect": true, "rationale": "Months to Goal = Emergency Fund Target / Monthly Savings Amount = $7,500 / $175 = 42.857... months. According to the text, you must 'Round up to the nearest whole month,' so 43 months."}, {"text": "44 months", "isCorrect": false, "rationale": "This calculation is higher than the actual time needed after rounding up."}]}, {"question": "According to the text, the 'moneytip' about automating emergency fund savings implies which of the following about human financial behavior?", "options": [{"text": "Individuals are generally better at making one-time large savings decisions than consistent small ones.", "isCorrect": false, "rationale": "The moneytip focuses on the difficulty of *consistent* saving if left to choice, not the comparative effectiveness of large vs. small amounts."}, {"text": "People often overestimate their ability to save consistently without a structured system due to competing immediate desires.", "isCorrect": true, "rationale": "The text states, 'If you wait to save “whatever is left,” something almost always consumes the remainder first. Automation removes the decision and makes saving the default,' which directly addresses how immediate desires can derail consistent manual saving."}, {"text": "Manual transfers provide a greater sense of control and accomplishment, leading to faster savings growth.", "isCorrect": false, "rationale": "The text advocates for automation precisely because manual saving is often prone to failure due to procrastination or other priorities."}, {"text": "The primary challenge in saving is a lack of understanding of where to put the money, not the act of saving itself.", "isCorrect": false, "rationale": "The moneytip addresses the *act* of making savings happen consistently, implying that understanding *where* to save is less of a barrier than actually *doing* it."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
