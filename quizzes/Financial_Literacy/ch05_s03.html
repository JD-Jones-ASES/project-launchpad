    };

<body>

        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 5, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the correct way to convert 8.5% to a decimal for use in calculations?", "options": [{"text": "Multiply by 100, resulting in 850.", "isCorrect": false, "rationale": "Multiplying by 100 converts a decimal to a percentage, not the other way around, and would result in an incorrect value for calculations."}, {"text": "Divide by 10, resulting in 0.85.", "isCorrect": false, "rationale": "Dividing by 10 is incorrect for percentage to decimal conversion. It would result in a decimal that is ten times too large."}, {"text": "Divide by 100, resulting in 0.085.", "isCorrect": true, "rationale": "To convert a percentage to a decimal, you must divide by 100, which is equivalent to moving the decimal point two places to the left. 8.5 / 100 = 0.085."}, {"text": "Move the decimal point one place to the left, resulting in 0.85.", "isCorrect": false, "rationale": "Moving the decimal point one place to the left is incorrect; it effectively divides by 10, not 100. This would result in 0.85, which is 85%, not 8.5% as a decimal."}]}, {"question": "A state imposes a property tax of 1.75% on assessed home values. If a home is assessed at $300,000, what is the annual property tax due?", "options": [{"text": "$175.00", "isCorrect": false, "rationale": "This amount is incorrect. It might arise from misplacing the decimal or incorrect multiplication."}, {"text": "$525.00", "isCorrect": false, "rationale": "This amount is incorrect. $525 would be 0.175% of $300,000, or 1.75% of $30,000."}, {"text": "$1,750.00", "isCorrect": false, "rationale": "This amount is incorrect. $1,750 would be 1.75% of $100,000, not $300,000."}, {"text": "$5,250.00", "isCorrect": true, "rationale": "To calculate this, first convert 1.75% to a decimal (0.0175). Then multiply the decimal by the assessed value: $300,000 * 0.0175 = $5,250.00."}]}, {"question": "Which of the following best describes a progressive tax system as used in the United States?", "options": [{"text": "All income is taxed at a single, fixed rate, regardless of amount.", "isCorrect": false, "rationale": "This describes a flat-rate tax system, not a progressive one. The text explicitly states that a progressive system means higher income is taxed at higher rates."}, {"text": "Higher-income individuals pay a higher percentage of their total income in taxes.", "isCorrect": true, "rationale": "A progressive tax system means that as income increases, the tax rate applied to higher portions of that income also increases, leading to a higher effective tax rate for higher earners."}, {"text": "The tax rate decreases as income increases, encouraging economic growth.", "isCorrect": false, "rationale": "This describes a regressive tax system, which is the opposite of a progressive system. Progressive means rates increase with income."}, {"text": "Only the portion of income that falls into a higher bracket is taxed at that higher rate.", "isCorrect": false, "rationale": "While this statement is true about how tax brackets work within a progressive system, it does not fully describe the *system* itself. The *system* means higher overall income generally leads to a higher effective tax rate because different portions of income are taxed at increasingly higher rates."}]}, {"question": "Consider an individual whose income places them in the 12% federal tax bracket. Which statement accurately distinguishes their marginal and effective tax rates based on the text?", "options": [{"text": "Their marginal tax rate is 12%, and their effective tax rate will be higher than 12%.", "isCorrect": false, "rationale": "The effective tax rate is always lower than the marginal rate for most taxpayers in a progressive system because lower income portions are taxed at lower rates."}, {"text": "Their effective tax rate is 12%, and their marginal tax rate will be lower than 12%.", "isCorrect": false, "rationale": "This is incorrect. The marginal rate is the rate for the highest income bracket reached, and the effective rate is the average across all income, which is always lower than the marginal for most taxpayers."}, {"text": "Their marginal tax rate is 12%, and their effective tax rate will be lower than 12%.", "isCorrect": true, "rationale": "The text explains that the marginal tax rate is the rate for the highest bracket reached (in this case, 12%). The effective tax rate is the percentage of total income actually paid in taxes, which is always lower than the marginal rate because lower income portions are taxed at the 10% rate."}, {"text": "Both their marginal and effective tax rates are exactly 12% because they are in that bracket.", "isCorrect": false, "rationale": "This is a common misconception highlighted in the text. Only the income *within* the 12% bracket is taxed at 12%; income below that is taxed at the 10% rate, making the overall effective rate lower."}]}, {"question": "Using the simplified federal tax brackets (10% on income up to $11,600; 12% on income over $11,600), calculate the total annual federal income tax for an individual with an annual income of $35,000.", "options": [{"text": "$3,500.00", "isCorrect": false, "rationale": "This calculation incorrectly applies the 10% rate to the entire $35,000 income, ignoring the progressive bracket system."}, {"text": "$4,200.00", "isCorrect": false, "rationale": "This calculation incorrectly applies the 12% marginal rate to the entire $35,000 income, which is a common misunderstanding of progressive taxation."}, {"text": "$3,968.00", "isCorrect": true, "rationale": "The calculation is as follows: 10% on the first $11,600 = $1,160. The remaining income is $35,000 - $11,600 = $23,400. This $23,400 is taxed at 12%, which equals $23,400 * 0.12 = $2,808. The total annual tax is $1,160 + $2,808 = $3,968.00."}, {"text": "$2,808.00", "isCorrect": false, "rationale": "This calculation only accounts for the tax on the income within the second bracket ($23,400 * 0.12) and fails to include the tax from the first bracket."}]}, {"question": "Referencing Samira's income ($26,880 annual) and her calculated federal taxes from the example, why is her effective tax rate (approximately 11.137%) lower than her marginal tax rate (12%)?", "options": [{"text": "Because the progressive tax system only applies the higher rate to a portion of her income, while a lower rate applies to the initial portion.", "isCorrect": true, "rationale": "This is precisely why the effective tax rate is lower. The first $11,600 of Samira's income is taxed at 10%, and only the income above that threshold is taxed at 12%. The effective rate is the average across these different rates."}, {"text": "Because she qualifies for various deductions and credits that are not mentioned in this simplified calculation.", "isCorrect": false, "rationale": "The example explicitly states that for simplicity, it uses income *before* the standard deduction and W-4 elections. Even without these, the effective rate is lower due to the progressive nature of the brackets themselves."}, {"text": "Her employer made an error in withholding, leading to a lower effective rate.", "isCorrect": false, "rationale": "The calculation in the example is presented as a correct application of the tax brackets, not an error. Withholding is an estimate, but the effective rate calculation reflects the tax structure."}, {"text": "The effective tax rate calculation formula inherently results in a lower number for all taxpayers, regardless of income.", "isCorrect": false, "rationale": "The formula for effective tax rate (Total Tax Paid / Total Income) * 100% does not inherently yield a lower number than the marginal rate; it's the progressive *structure* of the tax brackets that ensures this outcome for taxpayers with income spanning multiple brackets."}]}, {"question": "According to the \"Did You Know\" section, which category accounts for the *largest combined* percentage of federal spending?", "options": [{"text": "National Defense and Interest on the National Debt.", "isCorrect": false, "rationale": "National Defense (13%) and Interest on the National Debt (10%) combine for 23%, which is less than Social Security and Medicare/Medicaid."}, {"text": "Social Security and Medicare/Medicaid.", "isCorrect": true, "rationale": "Social Security (about 21%) and Medicare/Medicaid (about 24%) combine for approximately 45% of the federal budget, making it the largest combined category mentioned."}, {"text": "Education and Transportation.", "isCorrect": false, "rationale": "These are part of 'the remaining budget' and are not listed as the largest categories. The text indicates they are covered by the remaining smaller portion of the budget."}, {"text": "Law Enforcement and Scientific Research.", "isCorrect": false, "rationale": "These are part of 'the remaining budget' and are not listed as the largest categories. The text indicates they are covered by the remaining smaller portion of the budget."}]}, {"question": "Which of the following scenarios accurately describes a type of state income tax system mentioned in the text?", "options": [{"text": "A \"regressive\" state tax system where higher earners pay a lower percentage.", "isCorrect": false, "rationale": "The text mentions flat-rate, progressive, and no income tax states, but not explicitly a 'regressive' state tax system."}, {"text": "A state that taxes all income at a single, fixed rate, regardless of the amount earned.", "isCorrect": true, "rationale": "The text describes 'Flat-rate states' where some states tax all income at one rate, regardless of how much is earned."}, {"text": "A system where state income tax is only collected if federal income tax is also collected.", "isCorrect": false, "rationale": "The text does not suggest such a dependency. State income tax systems operate independently of federal tax collection rules, although they both affect total deductions."}, {"text": "A state income tax bracket system that is identical to the federal system in terms of rates and brackets.", "isCorrect": false, "rationale": "The text states that 'State tax systems vary significantly,' implying they are not identical to the federal system. Some use a bracket system similar to federal, but not necessarily identical rates and brackets."}]}, {"question": "If an individual has a gross monthly income of $4,500 and lives in a state with a flat income tax rate of 3.8%, what would be their estimated monthly state income tax withholding?", "options": [{"text": "$38.00", "isCorrect": false, "rationale": "This amount is incorrect. It would be 0.38% of $10,000, or a miscalculation of 3.8%."}, {"text": "$171.00", "isCorrect": true, "rationale": "To calculate this, convert the percentage to a decimal (3.8% = 0.038). Then multiply the gross monthly pay by the decimal rate: $4,500 * 0.038 = $171.00."}, {"text": "$450.00", "isCorrect": false, "rationale": "This amount is incorrect. It represents 10% of the gross monthly income, not 3.8%."}, {"text": "$1,710.00", "isCorrect": false, "rationale": "This amount is incorrect. It would be 38% of the gross monthly income, which is ten times the given rate."}]}, {"question": "An employee discovers they received a very large tax refund after filing their annual tax return. Based on the \"Warning\" section, what is the most accurate interpretation of this situation?", "options": [{"text": "Their employer underestimated their income, leading to too much tax being withheld.", "isCorrect": false, "rationale": "An underestimate of income by the employer would typically lead to *too little* tax being withheld, potentially resulting in the employee owing money, not receiving a large refund."}, {"text": "They intentionally overpaid throughout the year to earn interest from the government.", "isCorrect": false, "rationale": "The text explicitly states that getting a large refund means you gave the government an *interest-free loan* of your money, indicating that overpaying does not earn interest."}, {"text": "Too much tax was withheld from their paychecks, effectively giving the government an interest-free loan of their money.", "isCorrect": true, "rationale": "The 'Warning' section explains that a large refund means too much was withheld, and this is equivalent to providing an interest-free loan to the government because the money could have been earning interest for the taxpayer."}, {"text": "This is the ideal outcome, as it means they paid more than required and demonstrated financial responsibility.", "isCorrect": false, "rationale": "The text states that 'The goal is to have withholding match your actual tax bill as closely as possible,' implying that a large refund, while seemingly positive, is not the ideal outcome from a personal finance perspective."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
