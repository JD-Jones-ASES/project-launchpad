<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 5, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What two specific government programs are primarily funded by FICA taxes?", "options": [{"text": "National defense and infrastructure projects.", "isCorrect": false, "rationale": "FICA taxes are earmarked for specific programs, not general government operations like national defense or infrastructure."}, {"text": "Public education and unemployment benefits.", "isCorrect": false, "rationale": "While important government functions, public education and unemployment benefits are funded through other tax revenues, not specifically FICA."}, {"text": "Social Security and Medicare.", "isCorrect": true, "rationale": "The text explicitly states that 'FICA taxes fund two specific programs that most Americans will depend on someday: Social Security and Medicare.'"}, {"text": "Environmental protection and scientific research.", "isCorrect": false, "rationale": "These are typically funded through general government revenue, not the dedicated FICA taxes."}]}, {"question": "Which statement best describes the nature of FICA taxes for W-2 employees?", "options": [{"text": "Employees can choose to opt out of FICA taxes if they have other retirement or health insurance plans.", "isCorrect": false, "rationale": "The text explicitly states FICA taxes are 'automatic — every W-2 employee pays them on every paycheck, with no exceptions and no opt-out option.'"}, {"text": "FICA taxes are optional for employees earning below a certain income threshold.", "isCorrect": false, "rationale": "FICA taxes apply to every W-2 employee's paycheck, regardless of income level, up to the Social Security wage base for Social Security, and on all earnings for Medicare."}, {"text": "FICA taxes are automatically deducted from every W-2 employee's paycheck, with no exceptions.", "isCorrect": true, "rationale": "The text clearly states, 'FICA taxes are automatic — every W-2 employee pays them on every paycheck, with no exceptions and no opt-out option.'"}, {"text": "Only employers contribute to FICA; employees do not have a direct deduction from their pay.", "isCorrect": false, "rationale": "Employees pay a portion of FICA (6.2% for Social Security and 1.45% for Medicare) directly from their paycheck, while employers pay a matching portion."}]}, {"question": "If an employee's gross pay is $1,000, how much is contributed to the Social Security system on their behalf in total by both the employee and employer?", "options": [{"text": "$6.20", "isCorrect": false, "rationale": "This would be 0.62% of gross pay, not the correct employee contribution rate of 6.2%."}, {"text": "$62.00", "isCorrect": false, "rationale": "This is only the employee's 6.2% contribution ($1,000 * 0.062), not the total contribution including the employer match."}, {"text": "$124.00", "isCorrect": true, "rationale": "The employee pays 6.2% and the employer pays an additional 6.2%, for a total of 12.4% of gross pay. So, $1,000 * 0.124 = $124.00."}, {"text": "$12.40", "isCorrect": false, "rationale": "This would be 1.24% of gross pay, not the correct total contribution rate of 12.4%."}]}, {"question": "An employee earns $200,000 annually. For Social Security tax purposes in 2024, on what portion of their earnings would the 6.2% tax apply?", "options": [{"text": "The full $200,000.", "isCorrect": false, "rationale": "Social Security tax has a wage base cap, meaning not all earnings are subject to the tax if they exceed this limit."}, {"text": "$168,600.", "isCorrect": true, "rationale": "The text states the Social Security wage base for 2024 was approximately $168,600, and earnings above this amount are not subject to Social Security tax. Therefore, only the first $168,600 of the employee's income would be taxed."}, {"text": "The earnings above $168,600.", "isCorrect": false, "rationale": "Earnings *above* the Social Security wage base are specifically *not* subject to Social Security tax."}, {"text": "Only the first $6,200 of their income.", "isCorrect": false, "rationale": "This is a misunderstanding of the 6.2% tax rate and the wage base amount."}]}, {"question": "What is a key difference between the Social Security tax and the Medicare tax regarding their application to earnings?", "options": [{"text": "Social Security tax applies to all earnings, while Medicare tax has an annual wage base cap.", "isCorrect": false, "rationale": "This statement is incorrect; it reverses the true difference. Social Security has a wage base cap, while Medicare does not."}, {"text": "Both Social Security and Medicare taxes have the same annual wage base cap.", "isCorrect": false, "rationale": "This is incorrect. Social Security has a wage base cap, but Medicare tax has no upper limit."}, {"text": "Medicare tax applies to all earnings with no upper limit, unlike Social Security which has a wage base cap.", "isCorrect": true, "rationale": "The text explicitly states, 'No wage base cap: Unlike Social Security, Medicare tax applies to all earnings — there is no upper limit.'"}, {"text": "Neither Social Security nor Medicare taxes have any wage base limits.", "isCorrect": false, "rationale": "This is incorrect, as Social Security tax does have an annual wage base cap."}]}, {"question": "Jamie's gross bi-weekly pay is $1,500. Assuming she has not yet reached the Social Security wage base, how much Social Security tax will be deducted from her paycheck?", "options": [{"text": "$15.00", "isCorrect": false, "rationale": "This would be a 1% Social Security tax, which is incorrect. The Social Security employee rate is 6.2%."}, {"text": "$62.00", "isCorrect": false, "rationale": "This would be the Social Security tax for a gross pay of $1,000 ($1,000 * 0.062), not $1,500."}, {"text": "$93.00", "isCorrect": true, "rationale": "Social Security tax is 6.2% of gross pay. So, $1,500 * 0.062 = $93.00."}, {"text": "$186.00", "isCorrect": false, "rationale": "This would be double the employee's Social Security contribution, or 12.4% of gross pay ($1,500 * 0.124), which represents the combined employee and employer contribution."}]}, {"question": "David's gross monthly pay is $3,000. Assuming he has not reached the Social Security wage base, what will be his total FICA deduction for the month?", "options": [{"text": "$43.50", "isCorrect": false, "rationale": "This amount represents only the Medicare tax deduction ($3,000 * 0.0145), not the total FICA deduction."}, {"text": "$186.00", "isCorrect": false, "rationale": "This amount represents only the Social Security tax deduction ($3,000 * 0.062), not the total FICA deduction."}, {"text": "$229.50", "isCorrect": true, "rationale": "Total FICA deduction for an employee is 7.65% of gross pay (6.2% Social Security + 1.45% Medicare). So, $3,000 * 0.0765 = $229.50."}, {"text": "$459.00", "isCorrect": false, "rationale": "This amount would be double the total FICA deduction, which would include both the employee and employer portions."}]}, {"question": "The Medicare program, funded by FICA taxes, primarily provides:", "options": [{"text": "Monthly income benefits to retired workers.", "isCorrect": false, "rationale": "Monthly income benefits for retired workers are provided by the Social Security program, not Medicare."}, {"text": "Financial assistance for higher education expenses.", "isCorrect": false, "rationale": "Financial aid for education is not a function of FICA-funded programs."}, {"text": "Health insurance coverage for Americans aged 65 and older and those with certain disabilities.", "isCorrect": true, "rationale": "The text states, 'Medicare provides health insurance coverage for Americans aged 65 and older and for people with certain disabilities.'"}, {"text": "Unemployment benefits for workers who lose their jobs.", "isCorrect": false, "rationale": "Unemployment benefits are typically administered by state governments and funded through other specific taxes, not FICA."}]}, {"question": "A self-employed individual earning $5,000 in net business income for the month would owe what combined percentage of FICA taxes compared to a W-2 employee?", "options": [{"text": "7.65%, the same as a W-2 employee.", "isCorrect": false, "rationale": "7.65% is only the employee's portion of FICA. Self-employed individuals pay both the employee and employer portions."}, {"text": "12.4%, only covering Social Security.", "isCorrect": false, "rationale": "This only covers the Social Security portion (employee + employer). Self-employed individuals also pay both portions of Medicare tax."}, {"text": "15.3%, covering both employee and employer portions of Social Security and Medicare.", "isCorrect": true, "rationale": "The text states that self-employed people pay both sides of FICA: the full 12.4% Social Security tax and 2.9% Medicare tax (1.45% employee + 1.45% employer), for a combined 15.3% self-employment tax."}, {"text": "25-30%, as recommended for setting aside gig income for all taxes.", "isCorrect": false, "rationale": "25-30% is a general recommendation for setting aside money for *all* taxes (including income tax, not just FICA) for gig income, not the specific FICA percentage."}]}, {"question": "Which statement accurately describes the Additional Medicare Tax mentioned in the FICA Summary Table?", "options": [{"text": "It applies to all earnings above the Social Security wage base for both employees and employers.", "isCorrect": false, "rationale": "The Additional Medicare Tax is specifically for earnings over $200,000/year and is paid only by the employee, not by both employees and employers, nor is it directly tied to the Social Security wage base."}, {"text": "It is an extra 0.9% tax applied to earnings over $200,000 annually, paid exclusively by the employee.", "isCorrect": true, "rationale": "The text clearly states, 'An Additional Medicare Tax of 0.9% applies to individuals earning over $200,000/year, paid only by the employee.'"}, {"text": "It replaces the standard 1.45% Medicare tax for high-income earners.", "isCorrect": false, "rationale": "It is an *additional* tax, meaning it's added on top of the standard Medicare tax, it does not replace it."}, {"text": "Employers are responsible for matching this additional tax contribution.", "isCorrect": false, "rationale": "The text specifies that this tax is 'paid only by the employee,' meaning employers do not match it."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
