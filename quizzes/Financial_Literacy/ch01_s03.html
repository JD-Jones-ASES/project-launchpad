<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 1, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to economists, what is the primary reason money is considered useful?", "options": [{"text": "Its physical composition, such as precious metals or durable paper.", "isCorrect": false, "rationale": "The text states, 'Money is useful not because of what it is made of—paper, metal, electrons—but because of what it does.'"}, {"text": "The functions it performs in facilitating economic activity.", "isCorrect": true, "rationale": "Economists identify three core functions that any good form of money must perform, which are the basis of its usefulness."}, {"text": "Its aesthetic appeal and symbolic representation of wealth.", "isCorrect": false, "rationale": "While money can have symbolic value, its usefulness to economists is tied to its practical economic functions, not its appearance."}, {"text": "Its ability to be easily counterfeited and regulated by governments.", "isCorrect": false, "rationale": "The ability to be counterfeited would detract from money's usefulness, not enhance it. Regulation is about maintaining stability, not the primary reason for usefulness itself."}], "id": "q01"}, {"question": "The concept of money breaking the trading problem into two separate steps—selling goods/labor for money, then using money to buy what you want—best describes which function of money?", "options": [{"text": "Store of Value", "isCorrect": false, "rationale": "The Store of Value function relates to holding wealth over time, not directly to the two-step trading process."}, {"text": "Unit of Account", "isCorrect": false, "rationale": "The Unit of Account function involves measuring and comparing value, not facilitating the physical exchange of goods and services in two steps."}, {"text": "Medium of Exchange", "isCorrect": true, "rationale": "As a medium of exchange, money solves the complexities of barter by allowing individuals to sell what they have for money, and then use that money to buy what they need, breaking trade into two distinct steps."}, {"text": "Financial Record Keeping", "isCorrect": false, "rationale": "Financial record keeping is a benefit enabled by money, particularly its unit of account function, but it is not one of the three core functions itself."}], "id": "q02"}, {"question": "Imagine a society decides to use large, intricately carved wooden totems as its form of money. While these totems are widely accepted for their cultural significance, they are extremely heavy and fragile. Which essential characteristic of a good medium of exchange do these totems most likely fail to meet?", "options": [{"text": "Widely accepted", "isCorrect": false, "rationale": "The question states the totems are 'widely accepted,' so this characteristic is met."}, {"text": "Divisible", "isCorrect": false, "rationale": "While divisibility might be an issue with totems, the primary limitations highlighted (heavy and fragile) relate more directly to other characteristics."}, {"text": "Portable", "isCorrect": true, "rationale": "The text defines portability as 'easy to carry around.' Objects that are 'extremely heavy' directly contradict this requirement, making them a poor medium of exchange for practical transactions."}, {"text": "Durable", "isCorrect": false, "rationale": "The fact that they are 'fragile' means they would also fail the durability test ('does not wear out or spoil quickly'). However, 'extremely heavy' more strongly points to a lack of portability, as carrying is directly impaired by weight."}], "id": "q03"}, {"question": "A farmer decides to store his wealth by hoarding a large quantity of perishable vegetables. An economist would point out that these vegetables are a poor choice for storing wealth primarily because they lack which crucial function of money?", "options": [{"text": "Medium of Exchange", "isCorrect": false, "rationale": "While perishable vegetables are inefficient as a medium of exchange, the scenario specifically focuses on 'storing wealth,' making this not the primary failure being highlighted."}, {"text": "Unit of Account", "isCorrect": false, "rationale": "The unit of account function relates to measuring value, not the ability to hold wealth over time. Perishable goods don't inherently prevent measurement."}, {"text": "Store of Value", "isCorrect": true, "rationale": "The store of value function requires something that 'holds its worth over time.' Perishable vegetables, by their nature, spoil quickly, directly failing this function."}, {"text": "Durability as a Medium of Exchange", "isCorrect": false, "rationale": "Durability is a characteristic *of* a good medium of exchange, but 'Store of Value' is the overarching function that is compromised when wealth is held in perishable goods."}], "id": "q04"}, {"question": "While money generally functions as a store of value, allowing individuals to save for the future, what is a significant challenge that can erode its effectiveness in this role?", "options": [{"text": "Its portability, making it difficult to secure.", "isCorrect": false, "rationale": "Portability is a positive characteristic for a medium of exchange; it doesn't inherently erode money's store of value function. Security is a separate issue from money's inherent functions."}, {"text": "The difficulty in dividing it into smaller units for transactions.", "isCorrect": false, "rationale": "Divisibility is a characteristic of a medium of exchange, not a primary challenge to money's ability to hold worth over time."}, {"text": "Rapid inflation, which diminishes its purchasing power over time.", "isCorrect": true, "rationale": "The text explicitly states that modern money 'can also serve as a store of value, as long as inflation does not erode its purchasing power too quickly' and notes that 'inflation slowly erodes the purchasing power of money that just sits in a savings account.'"}, {"text": "Its widespread acceptance, which can lead to overspending.", "isCorrect": false, "rationale": "Widespread acceptance is a positive characteristic for a medium of exchange and doesn't inherently challenge money's store of value function. Overspending is a personal finance issue, not a flaw in the money's function."}], "id": "q05"}, {"question": "The 'moneytip' box mentions that 'investing is the most powerful way to use money's store-of-value function.' Why is investing considered more powerful than simply keeping money in a savings account for long-term wealth preservation?", "options": [{"text": "Investing makes money more portable and divisible.", "isCorrect": false, "rationale": "Portability and divisibility are characteristics related to money as a medium of exchange, not the primary benefit of investing for wealth growth."}, {"text": "Investing directly contributes to money's function as a unit of account.", "isCorrect": false, "rationale": "Investing is about growing wealth, not directly about establishing a standard unit for measuring value."}, {"text": "Investing allows money to grow, potentially outpacing inflation, thereby enhancing its real purchasing power over time.", "isCorrect": true, "rationale": "The 'moneytip' states that 'inflation slowly erodes the purchasing power of money that just sits in a savings account,' implying that investing counteracts this by allowing money to grow, preserving or increasing its real value over the long term."}, {"text": "Investing simplifies transactions by eliminating the need for a medium of exchange.", "isCorrect": false, "rationale": "Investing is distinct from the function of money as a medium of exchange. It does not eliminate the need for it."}], "id": "q06"}, {"question": "What is the primary advantage of money serving as a unit of account in an economy?", "options": [{"text": "It allows for the easy physical transfer of wealth between individuals.", "isCorrect": false, "rationale": "This describes the portability aspect of money's medium of exchange function, not its unit of account function."}, {"text": "It provides a common standard for measuring and comparing the value of diverse goods and services.", "isCorrect": true, "rationale": "The text defines a unit of account as 'a standard measurement for expressing and comparing the value of different goods and services,' highlighting its role in giving us a 'common language for prices.'"}, {"text": "It guarantees the long-term durability of currency against wear and tear.", "isCorrect": false, "rationale": "This relates to the durability characteristic of a medium of exchange, not the unit of account function."}, {"text": "It ensures that money retains its purchasing power over extended periods.", "isCorrect": false, "rationale": "This relates to the store of value function, specifically its stability against inflation."}], "id": "q07"}, {"question": "When a country experiences hyperinflation, the text states that businesses often switch to a foreign currency as their 'unit of account' even while using local currency for transactions. This behavior most strongly indicates a failure in which of money's functions regarding the local currency?", "options": [{"text": "Medium of Exchange", "isCorrect": false, "rationale": "The text specifies that the local currency is still used 'for transactions,' indicating it continues to function, albeit imperfectly, as a medium of exchange."}, {"text": "Store of Value", "isCorrect": false, "rationale": "While hyperinflation severely impairs money's store of value, the specific action of switching the *unit of account* highlights the failure of its measuring function, rather than just its ability to hold wealth."}, {"text": "Unit of Account", "isCorrect": true, "rationale": "The text explicitly links hyperinflation to money losing 'its meaning as a measuring stick' and describes businesses switching their 'unit of account' because 'the measuring function is that important,' directly pointing to a failure in this function."}, {"text": "Portability", "isCorrect": false, "rationale": "Portability, a characteristic of a medium of exchange, is not directly affected by hyperinflation. The physical ease of carrying money remains the same."}], "id": "q08"}, {"question": "During a severe economic crisis, people begin hoarding physical goods like canned food and tools, refusing to accept paper money for major transactions, and struggling to determine fair prices for direct trades. Which function of money is the *first* to break down in this scenario, leading to the other difficulties?", "options": [{"text": "Store of Value", "isCorrect": false, "rationale": "While hoarding goods implies a distrust in the money's store of value, the refusal to accept money for transactions directly impacts its use as a medium of exchange first, which then creates further problems."}, {"text": "Unit of Account", "isCorrect": false, "rationale": "Struggling to determine fair prices is a consequence of a failing unit of account, but the underlying cause often stems from a prior breakdown in trust or acceptance of the money itself."}, {"text": "Medium of Exchange", "isCorrect": true, "rationale": "The refusal to accept paper money 'for major transactions' directly indicates that money is no longer 'widely accepted as payment for goods and services,' which is the definition of a failure in its medium of exchange function. This breakdown would immediately complicate all trade and then cascade into issues with other functions."}, {"text": "Divisibility", "isCorrect": false, "rationale": "Divisibility, a characteristic of a medium of exchange, is not the primary breakdown. The problem is not that the money cannot be divided, but that it is not accepted at all for transactions."}], "id": "q09"}, {"question": "The text concludes by stating that a 'healthy monetary system performs all three functions simultaneously.' What is the overarching implication of this statement for economic stability?", "options": [{"text": "That governments should prioritize making money physically durable above all else.", "isCorrect": false, "rationale": "Durability is only one characteristic of the medium of exchange function; the statement emphasizes the importance of *all three* core functions for overall stability."}, {"text": "That the failure of even one core function of money can lead to significant economic disruption and hardship.", "isCorrect": true, "rationale": "The text explicitly states, 'When money stops performing one of these functions—usually because of runaway inflation or a collapse in public trust—the effects on ordinary people can be devastating.' This highlights the critical interdependence of the functions for a stable economy."}, {"text": "That digital currencies are inherently superior to physical money due to their ease of transaction.", "isCorrect": false, "rationale": "The text mentions digital money but does not make a general claim about its superiority or focus on transaction ease as the overarching implication of the simultaneous functions."}, {"text": "That the most complex function, the unit of account, is the least important for daily transactions.", "isCorrect": false, "rationale": "The text states the unit of account is 'equally important' and 'one of its most economically powerful features,' directly contradicting the idea that it's least important."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
