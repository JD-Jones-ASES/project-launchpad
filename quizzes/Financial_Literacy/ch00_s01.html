<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 0, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the core definition of financial literacy as presented in the text?", "options": [{"text": "The ability to earn a high income and avoid all forms of debt.", "isCorrect": false, "rationale": "This option is too narrow and focuses on outcomes rather than the foundational skills. The text defines financial literacy as the 'ability to understand and use financial skills,' not merely the ability to earn high income or avoid debt."}, {"text": "The ability to understand and use financial skills, including personal financial management, budgeting, and investing.", "isCorrect": true, "rationale": "This option directly quotes and accurately captures the definition provided in the text: 'the ability to understand and use financial skills, including personal financial management, budgeting, and investing.'"}, {"text": "The specialized knowledge required to invest in complex financial instruments like stocks and bonds.", "isCorrect": false, "rationale": "While investing is a component, this definition is too specific and misses the broader scope of personal financial management and budgeting that financial literacy encompasses."}, {"text": "The practice of consistently saving money for long-term goals such as retirement or a home purchase.", "isCorrect": false, "rationale": "Saving is an important aspect of financial management, but it represents only one skill within the comprehensive definition of financial literacy given in the text."}]}, {"question": "Based on the research findings cited in the text, which statement best summarizes the primary reason for widespread financial challenges among adults?", "options": [{"text": "Most adults are inherently irresponsible with money, leading to poor financial outcomes.", "isCorrect": false, "rationale": "The text explicitly refutes this, stating, 'the problem is not that people are bad with money. The problem is that no one taught them.' This option unfairly blames individuals rather than systemic issues."}, {"text": "A systemic lack of formal financial education leaves many adults unprepared for complex financial decisions.", "isCorrect": true, "rationale": "This option accurately synthesizes the research findings, which highlight that 'most say they never received formal personal finance instruction' and that 'school rarely teaches you how to read a pay stub' or other crucial skills, leading to a 'gap' in knowledge."}, {"text": "The financial system is too inherently complex for the average person to understand, regardless of education.", "isCorrect": false, "rationale": "While finance can be complex, the premise of the course is that with proper instruction, individuals *can* understand and make informed decisions, implying the complexity is surmountable with education, not insurmountable."}, {"text": "High interest rates on credit cards and student loans are the sole cause of debt accumulation.", "isCorrect": false, "rationale": "While high interest rates contribute to debt, the text emphasizes that people 'do not fully understand how interest compounds against them' or 'signed loan agreements without fully understanding the total cost,' pointing to a lack of knowledge as the primary issue, not just the rates themselves."}]}, {"question": "Marcus's experience with his credit card, where minimum payments led to significant interest accumulation over a long period, best illustrates which key financial concept described in the text?", "options": [{"text": "The importance of budgeting for discretionary spending to avoid overspending.", "isCorrect": false, "rationale": "While budgeting could have prevented some initial spending, Marcus's core problem, as highlighted, was the rapid growth of his debt due to interest, not simply his spending habits."}, {"text": "How interest compounds against borrowers, especially when only making minimum payments.", "isCorrect": true, "rationale": "The text explicitly states Marcus 'did not know how credit card interest worked' and notes that much credit card debt is carried by people who 'do not fully understand how interest compounds against them,' directly connecting to Marcus's scenario."}, {"text": "The necessity of building an emergency fund to cover unexpected expenses.", "isCorrect": false, "rationale": "Marcus's story describes regular small purchases leading to accumulating debt, not a single, unexpected emergency that an emergency fund would address."}, {"text": "The benefits of starting to invest early for long-term wealth growth.", "isCorrect": false, "rationale": "Marcus's situation is about debt and the cost of borrowing, which is the opposite of investing and growing wealth."}]}, {"question": "According to the 'didyouknow' section, what percentage of U.S. high school students are *not* required to take a personal finance course before graduating?", "options": [{"text": "20%", "isCorrect": false, "rationale": "The text states 'about one in five' (which is 20%) *is* required, not the percentage that is not."}, {"text": "80%", "isCorrect": true, "rationale": "If 'only about one in five' (20%) are required, then the remaining 'roughly four out of five students' (80%) are not required to take a personal finance course."}, {"text": "50%", "isCorrect": false, "rationale": "The text does not mention 50% in relation to high school personal finance requirements."}, {"text": "100%", "isCorrect": false, "rationale": "The text states that *some* students (one in five) are required, so it is not 100% who are not required."}]}, {"question": "The 'moneytip' section, which advises asking 'What is one small thing I can do with this information right now?' emphasizes which strategy for applying financial knowledge?", "options": [{"text": "Waiting to take action until all course material is thoroughly mastered.", "isCorrect": false, "rationale": "The text explicitly contradicts this by stating, 'You do not need to master every topic in this course before taking your first financial step.'"}, {"text": "Immediately applying small, actionable steps from learned concepts to build momentum.", "isCorrect": true, "rationale": "The 'moneytip' states, 'Knowledge + action is the winning combination' and encourages asking 'What is one small thing I can do with this information right now?', directly supporting the idea of immediate, small applications."}, {"text": "Focusing solely on theoretical understanding rather than practical implementation.", "isCorrect": false, "rationale": "The tip emphasizes 'action' in combination with knowledge, indicating that practical implementation is crucial, not just theoretical understanding."}, {"text": "Delegating complex financial decisions to professional experts once a basic understanding is achieved.", "isCorrect": false, "rationale": "The tip encourages personal action based on knowledge, not delegation, as the primary strategy for application."}]}, {"question": "The comparison between Aaliyah and Derek, two students investing $100 a month at different ages, primarily highlights the powerful impact of which financial principle?", "options": [{"text": "The importance of diversifying investments across various asset classes to reduce risk.", "isCorrect": false, "rationale": "The example focuses on the *time* the money is invested, not the types of investments, so diversification is not the primary lesson here."}, {"text": "The extended time horizon required for compound interest to maximize wealth accumulation.", "isCorrect": true, "rationale": "The text explicitly links Aaliyah's significantly greater wealth to 'time horizon — the length of time your money has to grow and your habits have to compound,' underscoring the power of starting early with compounding."}, {"text": "The effect of inflation on the purchasing power of money over extended periods.", "isCorrect": false, "rationale": "While inflation is mentioned elsewhere as eroding purchasing power, the Aaliyah/Derek example specifically highlights the growth due to time and compounding, not the erosion due to inflation."}, {"text": "The necessity of selecting high-return investment vehicles to achieve financial goals quickly.", "isCorrect": false, "rationale": "The example uses a consistent investment amount and focuses on the *timing* of the investment, not the specific rate of return or type of investment vehicle, implying the choice of vehicle is secondary to the starting time."}]}, {"question": "Which course unit would be most relevant for someone looking to understand how their gross pay differs from their take-home pay and how taxes are applied?", "options": [{"text": "Unit 1: Foundations of Money and Decision-Making", "isCorrect": false, "rationale": "Unit 1 focuses on the history of money, prices, and decision-making frameworks, not the specifics of paychecks and taxes."}, {"text": "Unit 2: Earning Income and Understanding Paychecks", "isCorrect": true, "rationale": "Unit 2's description clearly states, 'you will learn the difference between gross pay and take-home pay, how to read every line of a pay stub, and how the tax system works,' directly addressing the question."}, {"text": "Unit 3: Budgeting and Everyday Money Management", "isCorrect": false, "rationale": "Unit 3 covers building budgets, tracking spending, and emergency funds, which comes after understanding how income is earned and taxed."}, {"text": "Unit 5: Credit, Debt, and Borrowing", "isCorrect": false, "rationale": "Unit 5 focuses on credit scores, credit cards, and loans, which are distinct from understanding the components of a paycheck."}]}, {"question": "What is the ultimate goal of this financial literacy course, as stated by the authors?", "options": [{"text": "To transform students into certified financial experts capable of advising others.", "isCorrect": false, "rationale": "The text explicitly states, 'The goal of this course is not to turn you into a financial expert,' refuting this option."}, {"text": "To equip individuals with the knowledge and confidence to make informed personal financial decisions throughout their lives.", "isCorrect": true, "rationale": "The text clearly states the goal: 'It is to give you the knowledge and confidence to make informed decisions about your own money — now and throughout your life.'"}, {"text": "To advocate for mandatory personal finance education in all high schools across the United States.", "isCorrect": false, "rationale": "While the text highlights the need for formal education, advocating for policy change is not stated as the primary goal of *this specific course*."}, {"text": "To eliminate all personal debt for course participants by teaching advanced financial strategies.", "isCorrect": false, "rationale": "While managing debt is a topic, the goal is broader and focuses on knowledge and confidence for decision-making, not a specific outcome like complete debt elimination for all participants."}]}, {"question": "Which of the following actions best exemplifies the habit of 'Save before you spend' as described in the text?", "options": [{"text": "Using a credit card for a purchase and planning to pay off the balance in full when the next paycheck arrives.", "isCorrect": false, "rationale": "This describes spending with credit and then paying it off, which is not the same as 'saving before you spend' (i.e., treating savings as a primary expense)."}, {"text": "Setting up an automatic transfer of a fixed amount from each paycheck into a savings account immediately upon deposit.", "isCorrect": true, "rationale": "This action directly reflects the text's advice to 'Treating savings as a non-negotiable expense — like rent or a phone bill' by prioritizing savings before other expenditures."}, {"text": "Carefully comparing prices and reading reviews before making a significant purchase to get the best deal.", "isCorrect": false, "rationale": "This aligns with being a 'smarter consumer' or 'think before you spend,' but not specifically the 'save before you spend' habit."}, {"text": "Refraining from making impulsive purchases by pausing to consider whether an item is truly needed.", "isCorrect": false, "rationale": "This is an example of 'Think before you spend,' one of the other key habits mentioned, but not 'Save before you spend.'"}]}, {"question": "According to the text, what is identified as the fundamental reason for the widespread financial literacy gap, rather than individual fault?", "options": [{"text": "The inherent complexity of modern financial products and services, making them difficult to understand.", "isCorrect": false, "rationale": "While complexity exists, the text specifically states the problem is 'not that people are bad with money' but that they haven't been taught how to navigate it."}, {"text": "A societal failure to provide formal and comprehensive financial education to most individuals.", "isCorrect": true, "rationale": "The text clearly states, 'the problem is not that people are bad with money. The problem is that no one taught them,' and highlights the lack of formal instruction in schools, identifying this societal gap as the core issue."}, {"text": "The personal inability of most adults to grasp basic mathematical and economic concepts.", "isCorrect": false, "rationale": "The text dismisses this as 'not an insult' but a documented fact stemming from lack of teaching, not an inherent inability to learn the concepts."}, {"text": "The rapid and unpredictable changes in the global economy, rendering past financial knowledge obsolete.", "isCorrect": false, "rationale": "The text focuses on fundamental skills that have always been relevant (budgeting, interest, etc.) and the lack of teaching them, rather than the obsolescence of knowledge due to rapid economic change."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
