    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">

        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 29, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Upon receiving an inheritance, after parking the money in a savings account for 30-90 days, what is the most financially sound *first* major move recommended by the text?", "options": [{"text": "Invest a significant portion in speculative stocks recommended by an acquaintance.", "isCorrect": false, "rationale": "The text advises against rushing decisions and being skeptical of 'financial friends' urging fast decisions or specific investment pitches."}, {"text": "Pay off any existing high-interest debt, such as credit card balances or high-rate personal loans.", "isCorrect": true, "rationale": "The text explicitly states to 'Pay off high-interest debt first,' highlighting it as a 'guaranteed, tax-free return'."}, {"text": "Immediately purchase a luxury item to honor the deceased's memory.", "isCorrect": false, "rationale": "While honoring a legacy, the text emphasizes handling the money wisely and making sound financial moves, not impulsive purchases."}, {"text": "Donate a large sum to charity to avoid potential tax implications.", "isCorrect": false, "rationale": "While charitable giving is noble, it's not the first financial priority listed. The text also clarifies that inherited money is generally not subject to income tax."}], "id": "q01"}, {"question": "After addressing high-interest debt with an inheritance, what is the *next* critical financial priority according to the section?", "options": [{"text": "Purchase a rental property as a long-term investment.", "isCorrect": false, "rationale": "While investing is mentioned, the immediate next step is more fundamental. Purchasing property is a specific investment, not the general principle."}, {"text": "Build or complete an emergency fund to cover 3-6 months of living expenses.", "isCorrect": true, "rationale": "The text explicitly states, 'Build or complete your emergency fund. If yours is not at 3–6 months, get it there,' as a key principle after paying off debt."}, {"text": "Upgrade personal vehicles for better reliability and comfort.", "isCorrect": false, "rationale": "This is a discretionary spending decision and not a priority in building a robust financial foundation as outlined for an inheritance."}, {"text": "Invest the entire remaining amount in a diversified stock portfolio.", "isCorrect": false, "rationale": "Investing wisely is advised, but not necessarily the *entire* remaining amount immediately, and it comes after establishing the emergency fund."}], "id": "q02"}, {"question": "Regarding the tax implications of inherited money, which statement is accurate according to the provided text?", "options": [{"text": "All inherited money received directly is subject to federal income tax.", "isCorrect": false, "rationale": "The text states: 'In most cases, inherited money (received directly) is not subject to income tax.'"}, {"text": "Interest earned on inherited money parked in a savings account becomes taxable income.", "isCorrect": true, "rationale": "The text clearly states: 'But interest earned on that money is' subject to tax."}, {"text": "Inheriting a traditional IRA or 401(k) typically has no tax implications if handled quickly.", "isCorrect": false, "rationale": "The text warns that 'if you inherit a traditional IRA or 401(k), the rules are complex and the tax implications are significant,' advising consultation with a tax professional."}, {"text": "It is generally not necessary to consult a tax professional for inherited retirement accounts.", "isCorrect": false, "rationale": "The text specifically advises: 'Consult a tax professional before making decisions about inherited retirement accounts.'"}], "id": "q03"}, {"question": "A 20-year-old worker might undervalue long-term disability insurance, despite having a 1-in-4 chance of experiencing a disabling event before retirement. How does long-term disability insurance function to address this risk?", "options": [{"text": "It provides a one-time lump sum payment at the onset of a disability to cover initial expenses.", "isCorrect": false, "rationale": "Long-term disability insurance covers a 'portion of income for years or even until retirement age,' not a one-time lump sum."}, {"text": "It covers medical expenses related to the disability, similar to health insurance.", "isCorrect": false, "rationale": "Disability insurance covers a portion of lost income, not medical expenses directly, which are typically covered by health insurance."}, {"text": "It replaces a portion of income for several years or until retirement, typically kicking in after short-term disability ends.", "isCorrect": true, "rationale": "The text states long-term disability insurance 'kicks in after short-term ends, covering a portion of income for years or even until retirement age.'"}, {"text": "It primarily covers short-term income gaps for 3-6 months, making it redundant if an emergency fund is in place.", "isCorrect": false, "rationale": "This describes short-term disability insurance. Long-term disability covers much longer periods, after short-term ends, and addresses a risk beyond what most emergency funds can sustain."}], "id": "q04"}, {"question": "Upon the start of a divorce separation, which two immediate financial steps are explicitly recommended to protect one's individual financial standing?", "options": [{"text": "Initiate the sale of all joint property and distribute the proceeds.", "isCorrect": false, "rationale": "While property division is part of divorce, selling assets is often a later, legally complex step, not an immediate first action at separation."}, {"text": "Separate all joint bank accounts and update all beneficiary designations on financial assets.", "isCorrect": true, "rationale": "The text lists 'Separate all joint accounts and open individual accounts as soon as the separation begins' and 'Update all beneficiary designations on retirement accounts, life insurance, and bank accounts' as key immediate steps."}, {"text": "Conceal income and assets from the divorcing spouse to gain an advantage.", "isCorrect": false, "rationale": "This action is unethical and illegal, and not advised by the textbook content."}, {"text": "Immediately open multiple new credit cards to establish individual credit.", "isCorrect": false, "rationale": "The text advises pulling credit reports to understand debt, but not immediately opening multiple new credit cards, which could impact credit scores negatively."}], "id": "q05"}, {"question": "A key financial challenge highlighted during a divorce is the transition from a dual-income to a single-income household. What analytical step is crucial for an individual to take in response to this change?", "options": [{"text": "Immediately seek a second job to compensate for the lost income.", "isCorrect": false, "rationale": "While income generation might be necessary, the text specifically emphasizes a planning step first, which is to create a new budget."}, {"text": "Transfer all remaining assets into a single high-yield savings account.", "isCorrect": false, "rationale": "This action does not address the core budgeting challenge and might not be suitable for all assets."}, {"text": "Build a new solo budget based on the individual's new single income.", "isCorrect": true, "rationale": "The text states: 'Build a new solo budget based on your individual income — the transition from two incomes to one is significant,' directly addressing this challenge."}, {"text": "Avoid reviewing credit reports to prevent emotional distress.", "isCorrect": false, "rationale": "The text explicitly advises to 'Pull your credit reports to identify any joint debt and understand your individual credit position,' which is crucial for financial separation."}], "id": "q06"}, {"question": "When considering a job offer in a new city with a seemingly higher salary, what crucial financial factor should be analyzed *before* accepting the offer?", "options": [{"text": "The reputation of the new employer within its industry.", "isCorrect": false, "rationale": "While important for career, this is not a direct financial implication beyond salary as highlighted in the text."}, {"text": "The local sports team's performance and ticket prices.", "isCorrect": false, "rationale": "This is a lifestyle consideration, not a core financial factor for relocating as described."}, {"text": "The cost of living comparison between the current and new cities to determine actual purchasing power.", "isCorrect": true, "rationale": "The text advises: 'Compare the cost of living between your current city and the new one. A higher salary in a more expensive city may actually leave you with less purchasing power.'"}, {"text": "The average commute time from potential new housing to the workplace.", "isCorrect": false, "rationale": "While relevant for quality of life and potentially fuel costs, the text prioritizes broader financial comparisons like cost of living and tax rates over specific commute times."}], "id": "q07"}, {"question": "Which of the following scenarios, according to the text, would *not* necessarily trigger a comprehensive review of your financial plan?", "options": [{"text": "You receive a promotion that significantly increases your annual income.", "isCorrect": false, "rationale": "The text explicitly states to ask 'Has my income changed?' as a trigger for review."}, {"text": "Your mortgage payment adjusts, causing your fixed expenses to rise.", "isCorrect": false, "rationale": "The text explicitly states to ask 'Have my fixed expenses changed?' as a trigger for review."}, {"text": "You decide to save for a child's college education instead of a down payment on a vacation home.", "isCorrect": false, "rationale": "The text explicitly states to ask 'Do my savings goals still reflect my priorities?' as a trigger for review."}, {"text": "You buy a new smartphone with a small, discretionary bonus from work.", "isCorrect": true, "rationale": "A small, discretionary purchase like a smartphone with a bonus doesn't fundamentally alter your income, fixed expenses, savings goals, beneficiary designations, or insurance needs in a way that necessitates a full financial plan review, unlike the other options which are direct triggers mentioned."}], "id": "q08"}, {"question": "The 'moneytip' suggests setting recurring calendar reminders for January 1 and July 1 to review one's financial plan. What does this practice primarily aim to prevent?", "options": [{"text": "The need for a financial advisor, as self-review is sufficient.", "isCorrect": false, "rationale": "The tip encourages self-review but doesn't imply it replaces the need for a financial advisor, especially for complex issues."}, {"text": "Major financial mistakes that could take years to correct.", "isCorrect": true, "rationale": "The moneytip explicitly states this practice 'can prevent financial mistakes that take years to correct,' emphasizing the preventative nature of regular review."}, {"text": "Impulsive spending that occurs during holiday seasons.", "isCorrect": false, "rationale": "While prudent budgeting helps with spending, the specific purpose of this recurring review is broader than just holiday spending and focuses on plan integrity."}, {"text": "The necessity of updating beneficiary designations after every purchase.", "isCorrect": false, "rationale": "Beneficiary designations are typically updated after significant life events, not every purchase. The review is about assessing existing designations."}], "id": "q09"}, {"question": "The section concludes by stating: 'The skill is not building the perfect plan once. The skill is updating it as life unfolds.' What core principle of financial planning does this statement best encapsulate?", "options": [{"text": "Financial plans are inherently flawed and should be frequently discarded for new ones.", "isCorrect": false, "rationale": "The statement emphasizes updating and adapting, not discarding flawed plans. It suggests continuous refinement."}, {"text": "A static, unchanging financial plan is the most reliable approach for achieving long-term financial security.", "isCorrect": false, "rationale": "This directly contradicts the idea of a 'living document' and 'updating it as life unfolds.' Financial plans must adapt."}, {"text": "Financial planning is an ongoing, dynamic process that requires regular adjustments to remain effective throughout different life stages.", "isCorrect": true, "rationale": "This option perfectly summarizes the concluding philosophy: a financial plan is a 'living document' that must be updated as circumstances change, reflecting adaptability and continuous review."}, {"text": "Only major, unpredictable life events necessitate a review or update of one's financial plan.", "isCorrect": false, "rationale": "The text advocates for regular reviews (Jan 1/July 1 reminder) and implies that both planned and unplanned changes, as well as evolving goals, require updates, not just unpredictable major events."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
