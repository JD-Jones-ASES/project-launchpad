    <link rel="stylesheet" href="../../styles.css">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 31, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What do economists and psychologists consistently find about people who regularly give money to others?", "options": [{"text": "They tend to report higher levels of personal satisfaction and happiness than those who spend the same amount on themselves.", "isCorrect": true, "rationale": "Research spanning decades shows that generous giving, when it reflects one's values, is associated with higher reported happiness than equivalent self-spending."}, {"text": "They accumulate more wealth over time because giving creates social capital.", "isCorrect": false, "rationale": "The research finding is about personal happiness and satisfaction, not wealth accumulation."}, {"text": "They experience more financial stress because they have less money for themselves.", "isCorrect": false, "rationale": "The research finding is the opposite — givers tend to report greater satisfaction, not more stress."}, {"text": "Their happiness is unrelated to how much they give, only to which cause they support.", "isCorrect": false, "rationale": "The research focuses on the act of giving relative to values alignment, not exclusively on cause selection."}], "id": "q01"}, {"question": "According to the section, what is the most accurate statement about giving more money and happiness?", "options": [{"text": "Giving more money automatically makes a person happier.", "isCorrect": false, "rationale": "The section explicitly states this is NOT what the research means — the effect depends on whether giving reflects your values."}, {"text": "Generosity, when it reflects your values, adds a dimension to financial life that accumulation alone cannot provide.", "isCorrect": true, "rationale": "The section is careful to clarify that it is values-aligned generosity — not just the dollar amount — that adds meaning beyond accumulation."}, {"text": "Spending money on experiences produces more happiness than giving it away.", "isCorrect": false, "rationale": "The section does not make this claim; it contrasts giving with self-spending and finds giving more satisfying for regular givers."}, {"text": "Happiness from giving only applies to wealthy donors who can afford large gifts.", "isCorrect": false, "rationale": "The section discusses this benefit across all income levels and explicitly uses the example of very small contributions having meaning."}], "id": "q02"}, {"question": "In the 100-Person Village thought experiment, if each of 99 families gives $5, how much does the family in crisis receive?", "options": [{"text": "$99", "isCorrect": false, "rationale": "$99 would result from each family giving $1, not $5."}, {"text": "$495", "isCorrect": true, "rationale": "99 families × $5 = $495, described as enough to cover a month of groceries for the family in crisis."}, {"text": "$500", "isCorrect": false, "rationale": "$500 would require 100 families giving $5 — but the family in crisis is one of the 100, so only 99 others contribute."}, {"text": "$450", "isCorrect": false, "rationale": "$450 would result from 90 families giving $5, not 99."}], "id": "q03"}, {"question": "What is the primary purpose of the 100-Person Village thought experiment in this section?", "options": [{"text": "To show that community giving programs are more efficient than government aid.", "isCorrect": false, "rationale": "The experiment does not compare giving to government programs — it illustrates how small individual contributions scale into large collective impact."}, {"text": "To illustrate how small individual contributions, multiplied across many people, create enormous collective impact.", "isCorrect": true, "rationale": "The thought experiment specifically demonstrates that even $5 from 99 people provides meaningful help, and asks the reader to imagine this scaled to thousands of organizations."}, {"text": "To prove that every person has an obligation to give at least $5 per month.", "isCorrect": false, "rationale": "The section explicitly states there is no single right answer about how much or whether to give. It is not prescribing a specific amount."}, {"text": "To compare the impact of cash donations versus volunteering.", "isCorrect": false, "rationale": "The thought experiment focuses entirely on cash donations and their multiplication — volunteering is not part of this illustration."}], "id": "q04"}, {"question": "How does the section describe $giving$ as an expression of personal values?", "options": [{"text": "Giving to charity signals social status and earns community respect.", "isCorrect": false, "rationale": "The section frames giving as a personal expression of values, not as a status signal or social performance."}, {"text": "Donating money to organizations in areas you care about is a concrete, measurable expression of what you actually value.", "isCorrect": true, "rationale": "The section notes that it is easy to say you care about a cause but that giving money to it is a tangible, measurable act of values alignment."}, {"text": "Values alignment only applies when donations exceed a threshold of 5% of income.", "isCorrect": false, "rationale": "The section places no income percentage threshold on the values-alignment benefit of giving."}, {"text": "Giving is mainly valuable for expressing values when the recipient organization is well-known.", "isCorrect": false, "rationale": "The section does not limit values-alignment to well-known organizations — it applies to any cause that reflects your values."}], "id": "q05"}, {"question": "Which of the following is cited as an example of $legacy$ giving in the section?", "options": [{"text": "Setting up automatic monthly donations to a food bank.", "isCorrect": false, "rationale": "Automatic monthly giving is discussed as a budgeting strategy elsewhere in the chapter, not specifically as legacy giving."}, {"text": "A scholarship in a parent's name or a conservation fund that protects land for future generations.", "isCorrect": true, "rationale": "The section specifically lists a scholarship in a parent's name, a hospital building, and a conservation fund as examples of legacy giving."}, {"text": "Claiming a charitable deduction on your tax return.", "isCorrect": false, "rationale": "Tax deductions are a financial mechanism, not an example of legacy giving as described in this section."}, {"text": "Volunteering two hours per week at a local nonprofit.", "isCorrect": false, "rationale": "Volunteering is discussed in a later section on non-financial generosity, not as legacy giving."}], "id": "q06"}, {"question": "The section states you do not need to be wealthy to think about $legacy$. What supports this claim?", "options": [{"text": "Wealthy donors can simply write a large check, while others must volunteer time.", "isCorrect": false, "rationale": "The section does not frame the distinction around writing checks vs. volunteering when discussing legacy."}, {"text": "Even small, consistent giving over a lifetime creates a real impact and a real story.", "isCorrect": true, "rationale": "The section explicitly states that you do not need to be wealthy — small, consistent giving over time creates a meaningful legacy."}, {"text": "Tax deductions make large donations effectively affordable for middle-income earners.", "isCorrect": false, "rationale": "Tax deductions are covered in a different section and are not used here to argue about the accessibility of legacy giving."}, {"text": "Only institutional gifts like buildings qualify as legacy donations.", "isCorrect": false, "rationale": "The section offers buildings as one example but emphasizes that even small consistent giving constitutes a legacy."}], "id": "q07"}, {"question": "Which of the following does this section explicitly say it will NOT do?", "options": [{"text": "Explain why people give", "isCorrect": false, "rationale": "The section does explain several reasons why people give — happiness research, community impact, values alignment, and legacy."}, {"text": "Tell you how much to give, where to give, or whether to give at all", "isCorrect": true, "rationale": "The section explicitly states: 'This chapter does not tell you how much to give, where to give, or whether to give at all.' These are personal decisions."}, {"text": "Present research on giving and happiness", "isCorrect": false, "rationale": "The section does present happiness research — this is explicitly included."}, {"text": "Discuss how giving can express your values", "isCorrect": false, "rationale": "Values alignment is explicitly covered in a dedicated subsection."}], "id": "q08"}, {"question": "Which factors does the section identify as shaping giving decisions?", "options": [{"text": "Your credit score, investment portfolio size, and age", "isCorrect": false, "rationale": "Credit score and portfolio size are not mentioned as factors shaping giving decisions in this section."}, {"text": "Your values, faith tradition (if any), income, and life stage", "isCorrect": true, "rationale": "The section lists these four factors explicitly as the personal dimensions that shape giving decisions."}, {"text": "Your employer's matching program, tax bracket, and marital status", "isCorrect": false, "rationale": "Employer matching and tax bracket are financial mechanics discussed elsewhere; they are not listed here as the core personal factors."}, {"text": "Your childhood experiences with money and your parents' giving habits", "isCorrect": false, "rationale": "While plausible in real life, these are not the factors the section lists."}], "id": "q09"}, {"question": "Which of the following best describes money's role as described in the opening of this section?", "options": [{"text": "Money is primarily a store of value and measure of personal success.", "isCorrect": false, "rationale": "The section's framing is that money is a tool — not primarily a measure of success or store of value in itself."}, {"text": "Money is a tool that can serve many purposes, including giving some of it away as one of its most meaningful uses.", "isCorrect": true, "rationale": "The section opens by calling money a tool and identifying giving as one of the most meaningful uses alongside essential expenses and investing."}, {"text": "Money should be used for security first; giving is only appropriate after retirement savings are complete.", "isCorrect": false, "rationale": "The section does not impose a sequencing rule — it presents giving as part of an intentional financial plan at any stage."}, {"text": "Money is inherently neutral and its value depends entirely on tax efficiency.", "isCorrect": false, "rationale": "The section frames money around purpose and values, not tax efficiency."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
