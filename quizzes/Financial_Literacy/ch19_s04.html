<script>
var QUESTIONS = [{"question": "What is a primary tax advantage of contributing to a traditional 401(k) plan?", "options": [{"text": "Withdrawals are tax-free in retirement.", "isCorrect": false, "rationale": "This is a feature of a Roth 401(k) or Roth IRA, not a traditional 401(k). Traditional 401(k) withdrawals are taxed as ordinary income in retirement."}, {"text": "Contributions reduce current taxable income.", "isCorrect": true, "rationale": "The text states, 'Contributions reduce your taxable income now' and 'That money is taken out before taxes are calculated, which means it also reduces your current taxable income.'"}, {"text": "Earnings grow tax-exempt.", "isCorrect": false, "rationale": "Earnings grow 'tax-deferred,' meaning taxes are postponed until withdrawal, not 'tax-exempt,' which implies no taxes ever."}, {"text": "Contributions are matched by the government.", "isCorrect": false, "rationale": "Employer matches are made by the employer, not the government. There is no mention of government matching contributions to 401(k) plans."}], "id": "q01"}, {"question": "An employee earns $60,000 annually. Their employer offers a 401(k) match of 100% on the first 3% of salary contributed. If the employee contributes 5% of their salary, how much will the employer contribute to their 401(k) this year?", "options": [{"text": "$3,000", "isCorrect": false, "rationale": "This amount represents 5% of the employee's salary ($60,000 * 0.05 = $3,000), which is the employee's contribution, not the employer's match."}, {"text": "$1,800", "isCorrect": true, "rationale": "The employer matches 100% on the first 3% of salary. Three percent of $60,000 is $1,800 ($60,000 * 0.03 = $1,800). Since the employee contributes at least 3% (they contribute 5%), they will receive the full $1,800 match."}, {"text": "$900", "isCorrect": false, "rationale": "This amount would be correct if the employer matched 50% of the first 3% of salary ($1,800 * 0.50 = $900), but the problem states a 100% match."}, {"text": "$1,500", "isCorrect": false, "rationale": "This amount does not correspond to the given match structure or salary. It might be confused with a 50% match on 5% of salary, but that's not what's described."}], "id": "q02"}, {"question": "The text states, 'Always contribute at least enough to get the full employer match. This is the most important 401(k) rule in personal finance.' Why is securing the full employer match considered so crucial?", "options": [{"text": "It makes all future withdrawals from the 401(k) tax-free.", "isCorrect": false, "rationale": "While a Roth 401(k) offers tax-free withdrawals, the employer match itself does not inherently make all withdrawals from any 401(k) tax-free. The primary benefit of the match is the immediate return."}, {"text": "It provides an immediate, guaranteed return on investment that no market strategy can reliably beat.", "isCorrect": true, "rationale": "The text explicitly states, 'By contributing $3,000, you receive $1,500 in employer contributions—a 50% instant return before any market gains. No investment strategy can reliably beat this.' This 'free money' is the most valuable aspect."}, {"text": "It guarantees your employer contributions are 100% vested immediately.", "isCorrect": false, "rationale": "Employer match contributions are subject to vesting schedules, meaning they are not always 100% yours immediately. The match being 'free money' is separate from its vesting terms."}, {"text": "It is required by law for all employees to receive once they join the company.", "isCorrect": false, "rationale": "Employer matches are not automatic; employees 'must contribute yourself to receive the match.' It's also an employer benefit, not a universal legal requirement for all companies."}], "id": "q03"}, {"question": "An employee is under a graded vesting schedule where they gain 20% ownership of employer contributions each year. If they leave the company after 3 years, what percentage of the employer's contributions will they typically own?", "options": [{"text": "0%", "isCorrect": false, "rationale": "0% vesting would only occur under a cliff vesting schedule if the employee left before the cliff period (e.g., before 3 years in a 3-year cliff) or if they hadn't met any vesting requirements yet."}, {"text": "100%", "isCorrect": false, "rationale": "100% vesting under a graded schedule usually requires completing the full vesting period, which in this case would be 5 years (20% per year for 5 years)."}, {"text": "60%", "isCorrect": true, "rationale": "Under a graded vesting schedule of 20% per year, after 3 full years, the employee would own 3 years * 20% per year = 60% of the employer's contributions."}, {"text": "40%", "isCorrect": false, "rationale": "40% would be the vesting percentage after 2 years of service (2 years * 20% per year)."}], "id": "q04"}, {"question": "Based on the section's advice, for which scenario is a Roth 401(k) option generally considered the better choice compared to a traditional 401(k)?", "options": [{"text": "A high-income earner looking to reduce their current taxable income as much as possible.", "isCorrect": false, "rationale": "A traditional 401(k) allows pre-tax contributions, which reduce current taxable income. A Roth 401(k) uses after-tax contributions, so it doesn't offer this immediate tax reduction."}, {"text": "A young worker currently in a low tax bracket who expects to be in a higher tax bracket in retirement.", "isCorrect": true, "rationale": "The text states, 'For young workers in low tax brackets, the Roth 401(k) option is often the better choice' because you pay taxes now at a lower rate and enjoy tax-free withdrawals in retirement when you might be in a higher tax bracket."}, {"text": "Someone who prefers their investment growth to be tax-deferred rather than tax-free.", "isCorrect": false, "rationale": "A Roth 401(k) offers tax-free growth and qualified withdrawals. Tax-deferred growth is a feature of a traditional 401(k)."}, {"text": "An employee nearing retirement who expects their tax bracket to decrease significantly.", "isCorrect": false, "rationale": "If one expects a significantly lower tax bracket in retirement, a traditional 401(k) would be more advantageous, as current contributions reduce taxes now, and withdrawals are taxed later at a lower rate."}], "id": "q05"}, {"question": "How does the annual contribution limit for a 401(k) compare to that of a Traditional or Roth IRA, as mentioned in the text?", "options": [{"text": "The 401(k) limit ($23,000) is significantly higher than the IRA limit ($7,000).", "isCorrect": true, "rationale": "The text explicitly states, 'Notice the contribution limit: $23,000 per year is much higher than the $7,000 IRA limit.'"}, {"text": "The 401(k) limit is lower than the IRA limit.", "isCorrect": false, "rationale": "This is incorrect; the text clearly indicates the 401(k) limit is much higher."}, {"text": "Both have the same annual contribution limit.", "isCorrect": false, "rationale": "This is incorrect; the text provides different limits for 401(k)s and IRAs."}, {"text": "The 401(k) limit is only slightly higher, differing by less than $1,000.", "isCorrect": false, "rationale": "This is incorrect; the difference is substantial ($23,000 vs. $7,000, a $16,000 difference)."}], "id": "q06"}, {"question": "According to the 'ideal retirement savings order,' why is contributing to your 401(k) at least up to the full employer match listed as the *first* step?", "options": [{"text": "It provides the largest immediate tax deduction available for retirement savings.", "isCorrect": false, "rationale": "While a traditional 401(k) provides a tax deduction, the primary reason for prioritizing the match is the 'free money' aspect, not solely the tax deduction, which might not apply to Roth 401(k) contributions."}, {"text": "It secures 'free money' from the employer, offering an unparalleled instant return on contributions.", "isCorrect": true, "rationale": "The text emphasizes that the employer match is 'free money' and represents an 'instant return' that 'No investment strategy can reliably beat this,' making it the top priority."}, {"text": "It ensures all contributions are immediately 100% vested.", "isCorrect": false, "rationale": "Vesting schedules apply to employer contributions, meaning they are not always immediately 100% vested. The vesting status doesn't change the fact that the match is free money."}, {"text": "It is a mandatory step before opening any other retirement account.", "isCorrect": false, "rationale": "While highly recommended, it is not a mandatory prerequisite for opening other retirement accounts like an IRA."}], "id": "q07"}, {"question": "Which statement accurately describes how an employer match typically works with a 401(k) plan?", "options": [{"text": "The employer automatically contributes a fixed percentage of salary regardless of employee contributions.", "isCorrect": false, "rationale": "The definition states, 'You must contribute yourself to receive the match—it is not automatic.' An employer match is typically contingent on the employee's contribution."}, {"text": "The employer contributes based on the employee's own contributions, and the employee must contribute to receive it.", "isCorrect": true, "rationale": "The definition of employer match clearly states it is 'based on how much you contribute' and 'You must contribute yourself to receive the match—it is not automatic.'"}, {"text": "The employer match is a government incentive that all 401(k) plans must offer.", "isCorrect": false, "rationale": "The employer match is an employer benefit, not a government incentive that all 401(k) plans are legally required to offer. Many employers offer it, but not all."}, {"text": "The employer matches 100% of all employee contributions up to the annual limit.", "isCorrect": false, "rationale": "Common structures vary, such as matching 50% of contributions up to a certain percentage of salary, not always 100% of all contributions up to the annual limit."}], "id": "q08"}, {"question": "An employee's company has a 3-year cliff vesting schedule for 401(k) employer contributions. If the employee starts on January 1, 2023, and decides to leave the company on December 31, 2025, how much of their employer-contributed funds will they own?", "options": [{"text": "0%", "isCorrect": false, "rationale": "Under a 3-year cliff vesting schedule, 0% would be owned if the employee left *before* completing 3 full years. Leaving on December 31, 2025, means exactly 3 full years have been completed (2023, 2024, 2025)."}, {"text": "33%", "isCorrect": false, "rationale": "This percentage does not align with a cliff vesting schedule, which specifies either 0% or 100% ownership at the cliff date."}, {"text": "100%", "isCorrect": true, "rationale": "With a 3-year cliff vesting schedule, an employee becomes 100% vested after completing 3 full years of service. Starting Jan 1, 2023, and leaving Dec 31, 2025, means exactly 3 years have been completed, making them 100% vested."}, {"text": "66%", "isCorrect": false, "rationale": "This percentage does not align with a cliff vesting schedule. It might be confused with a graded vesting schedule."}], "id": "q09"}, {"question": "Which statement best summarizes the comprehensive benefits of a 401(k) plan with an employer match for an employee?", "options": [{"text": "It guarantees immediate vesting of all contributions, provides unlimited tax-free withdrawals, and is the only retirement savings option available.", "isCorrect": false, "rationale": "This statement is incorrect on multiple points: vesting is not always immediate, withdrawals are not always tax-free (traditional 401k), and it's not the only retirement option (e.g., IRAs)."}, {"text": "It offers pre-tax or after-tax contributions with tax-deferred or tax-free growth, significantly higher contribution limits than IRAs, and potentially 'free money' from the employer.", "isCorrect": true, "rationale": "This option correctly synthesizes the key benefits mentioned: tax treatment flexibility (traditional/Roth), higher contribution limits, and the crucial 'free money' from the employer match."}, {"text": "It primarily serves as a short-term savings vehicle with no tax implications upon withdrawal.", "isCorrect": false, "rationale": "A 401(k) is a retirement savings plan, designed for long-term growth, not short-term savings. Withdrawals typically have tax implications, unless it's a qualified Roth withdrawal."}, {"text": "All contributions are matched dollar-for-dollar by the employer, and withdrawals are never taxed.", "isCorrect": false, "rationale": "Employer matches are not always dollar-for-dollar (e.g., 50% match), and withdrawals from a traditional 401(k) are taxed in retirement."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
