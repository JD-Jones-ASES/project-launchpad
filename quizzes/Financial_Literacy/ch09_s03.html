        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 9, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, which of the following is NOT one of the three essential characteristics for where to keep your emergency fund?", "options": [{"text": "Safe", "isCorrect": false, "rationale": "Safety is explicitly stated as one of the three essential characteristics for an emergency fund account."}, {"text": "High-yield interest", "isCorrect": true, "rationale": "While a high-yield interest rate is a significant benefit of the recommended account type (High-Yield Savings Account), it is not listed as one of the three *essential characteristics* for *any* emergency fund account. The three essentials are safe, accessible, and separate from daily spending."}, {"text": "Accessible", "isCorrect": false, "rationale": "Accessibility is explicitly stated as one of the three essential characteristics for an emergency fund account."}, {"text": "Separate from daily spending", "isCorrect": false, "rationale": "Separation from daily spending is explicitly stated as one of the three essential characteristics for an emergency fund account."}]}, {"question": "Which statement accurately describes a key characteristic of a high-yield savings account as recommended for an emergency fund?", "options": [{"text": "It offers returns comparable to long-term stock market investments.", "isCorrect": false, "rationale": "The text states that an emergency fund is not an investment and implies that while high-yield accounts offer better interest than standard savings, they do not offer returns comparable to long-term stock market investments, which come with higher risk."}, {"text": "Funds are instantly accessible, often through a linked debit card.", "isCorrect": false, "rationale": "The text explicitly states that funds are accessible within one to three business days and recommends against getting a debit card for the account, highlighting that 'instant' access is not a feature and 'slight friction' is a benefit."}, {"text": "It provides a significantly higher interest rate than standard savings while maintaining FDIC insurance.", "isCorrect": true, "rationale": "This statement is directly supported by the text, which defines a high-yield savings account as offering 'significantly higher interest rate than a standard bank savings account, while maintaining FDIC insurance and ready access to funds.'"}, {"text": "It is primarily designed for daily spending, making it highly convenient.", "isCorrect": false, "rationale": "The text stresses that an emergency fund account should be 'separate from daily spending' to reduce temptation, making it unsuitable for primary daily spending."}]}, {"question": "The text explicitly warns against using the stock market for an emergency fund primarily due to which risk?", "options": [{"text": "High fees associated with stock market accounts.", "isCorrect": false, "rationale": "While investment accounts may have fees, the text does not cite high fees as the primary reason to avoid the stock market for an emergency fund."}, {"text": "The potential for short-term volatility and significant loss of capital when funds are urgently needed.", "isCorrect": true, "rationale": "The text specifically warns, 'The stock market provides higher returns over long periods—but it is volatile in the short term. In 2008–2009, stock values dropped by about 50%.' This highlights the risk of losing value precisely when funds are needed most."}, {"text": "The difficulty in accessing funds quickly, often taking weeks for transfers.", "isCorrect": false, "rationale": "While transfers from investment accounts can take time, the primary concern raised by the text is the *value* of the funds, not just the speed of transfer. The text's main example focuses on value loss."}, {"text": "Stock market investments are not FDIC insured.", "isCorrect": false, "rationale": "While true that stock investments are not FDIC insured, the text's primary warning about the stock market for emergency funds focuses on its inherent volatility and potential for significant capital loss, rather than lack of FDIC insurance itself, which is specific to bank deposits."}]}, {"question": "The text describes the 1-3 business day transfer time for a high-yield savings account as 'fast enough for almost every real emergency... but slow enough to create a pause before impulsive use.' This suggests that the slight delay serves primarily as a:", "options": [{"text": "Disadvantage that most banks are working to eliminate.", "isCorrect": false, "rationale": "The text frames the delay as a 'feature, not a bug,' indicating it's an intended characteristic, not a disadvantage to be eliminated."}, {"text": "Security measure against online fraud.", "isCorrect": false, "rationale": "While transfer delays can sometimes be part of security protocols, the text explicitly states its purpose is to 'create a pause before impulsive use,' not primarily for fraud prevention."}, {"text": "Feature designed to prevent non-emergency spending from the fund.", "isCorrect": true, "rationale": "The text clearly states the delay helps 'create a pause before impulsive use' and that the 'slight friction of a transfer—and the separation from your checking account—reduces the temptation to dip into it for non-emergencies.'"}, {"text": "Regulatory requirement for all savings accounts.", "isCorrect": false, "rationale": "The text does not attribute the transfer time to a regulatory requirement but rather to its beneficial psychological effect on spending habits."}]}, {"question": "Sarah wants to set up her emergency fund according to the textbook's recommendations. Which action would *best* help her maintain the 'separate from daily spending' characteristic?", "options": [{"text": "Linking her high-yield savings account directly to her daily checking account for easy transfers.", "isCorrect": false, "rationale": "Linking accounts directly, while convenient, reduces the psychological and practical separation, making it easier to impulsively transfer funds for non-emergencies."}, {"text": "Getting a debit card for her emergency fund account to ensure instant access.", "isCorrect": false, "rationale": "The text advises specifically 'Do not get a debit card for this account if you can avoid it,' as it removes the beneficial friction and makes the fund too readily accessible for non-emergency use."}, {"text": "Opening the account at a different institution from her checking account and avoiding a linked debit card.", "isCorrect": true, "rationale": "The text recommends, 'Open an account at a different institution from your checking account (to increase the psychological and practical separation)' and 'Do not get a debit card for this account if you can avoid it.' These actions directly enforce separation and create friction."}, {"text": "Setting up a monthly automatic transfer into a standard savings account at her primary bank.", "isCorrect": false, "rationale": "While automatic transfers are recommended for building the fund, using a *standard savings account* at her *primary bank* does not achieve the same level of separation or higher interest as a high-yield account at a separate institution."}]}, {"question": "A recent graduate is trying to decide where to keep their emergency fund. Based on the textbook's guidance, which option is *most* suitable and why?", "options": [{"text": "A regular checking account, because it offers instant access via a debit card.", "isCorrect": false, "rationale": "A regular checking account is too integrated with daily spending, lacks the beneficial separation, and usually offers negligible interest, making it unsuitable for an emergency fund despite instant access."}, {"text": "A 2-year Certificate of Deposit (CD), because it typically offers higher interest than a savings account.", "isCorrect": false, "rationale": "The text's checkpoint explicitly states a 2-year CD is 'not accessible enough' for an emergency fund, as funds are locked up for a fixed term, violating the 'accessible' characteristic."}, {"text": "A diversified stock market index fund, because it offers the highest potential for long-term growth.", "isCorrect": false, "rationale": "The text strongly warns against using the stock market for an emergency fund due to its short-term volatility and risk of capital loss, stating 'Security and growth are different goals that require different tools.'"}, {"text": "A high-yield savings account at an online bank, because it balances safety, accessibility, and separation.", "isCorrect": true, "rationale": "This option directly aligns with the textbook's primary recommendation, as a high-yield savings account meets all three essential criteria (safe via FDIC, accessible within 1-3 days, and easily kept separate from daily spending)."}]}, {"question": "What does FDIC insurance primarily guarantee for funds held in a high-yield savings account?", "options": [{"text": "That the account will always earn a high interest rate.", "isCorrect": false, "rationale": "FDIC insurance protects the principal amount of deposits, not the interest rate, which can fluctuate."}, {"text": "Protection of funds up to $250,000 even if the bank fails.", "isCorrect": true, "rationale": "The text explicitly states, 'FDIC-insured up to $250,000, meaning your money is protected by the federal government even if the bank fails,' directly addressing the safety aspect."}, {"text": "Instant access to funds at any time.", "isCorrect": false, "rationale": "FDIC insurance relates to the security of funds against bank failure, not the speed of access, which is a separate characteristic."}, {"text": "That the funds will never lose value due to market fluctuations.", "isCorrect": false, "rationale": "FDIC insurance protects against bank failure, not against market fluctuations. However, savings accounts themselves are not subject to market fluctuations in the way investments are."}]}, {"question": "The textbook advises looking at the APY (Annual Percentage Yield) when comparing savings accounts. Why is APY considered a more accurate measure than just the interest rate?", "options": [{"text": "APY includes any bank fees deducted from the interest earned.", "isCorrect": false, "rationale": "APY primarily reflects the effect of compounding interest, not bank fees."}, {"text": "APY only applies to high-yield accounts, not standard savings accounts.", "isCorrect": false, "rationale": "APY is a standard measure used for comparing all interest-bearing accounts, including both high-yield and standard savings accounts."}, {"text": "APY accounts for how often interest is compounded, giving the true annual return.", "isCorrect": true, "rationale": "The text explicitly states, 'APY accounts for how often interest is compounded and gives you the true annual return,' highlighting its importance for an accurate comparison."}, {"text": "APY guarantees that your emergency fund will grow significantly faster.", "isCorrect": false, "rationale": "APY provides an accurate calculation of returns but does not 'guarantee' faster growth; that depends on the rate itself."}]}, {"question": "The text states, 'Security and growth are different goals that require different tools.' In the context of an emergency fund, this statement emphasizes that its primary purpose is:", "options": [{"text": "To generate the highest possible returns over time.", "isCorrect": false, "rationale": "The text explicitly differentiates emergency funds from investments, stating an emergency fund is 'not an investment' and prioritizes security over growth."}, {"text": "To act as a liquid investment vehicle.", "isCorrect": false, "rationale": "The text distinguishes between security (for emergency funds) and growth (for investments), indicating that an emergency fund should not be viewed primarily as an investment vehicle."}, {"text": "To provide a reliable financial safety net, even if it means sacrificing significant growth.", "isCorrect": true, "rationale": "This statement highlights that the core purpose of an emergency fund is security and availability (a safety net), which sometimes means choosing lower-growth but safer options over high-growth but volatile investments like stocks."}, {"text": "To offer a convenient way to manage daily expenses.", "isCorrect": false, "rationale": "The text emphasizes keeping the emergency fund separate from daily spending to prevent impulsive use, so it's not for daily expense management."}]}, {"question": "John decided to keep his emergency fund in a regular checking account at his primary bank, linked to his debit card, believing it offered the fastest access. Based on the textbook's criteria, which essential characteristic is John *most likely* compromising with this setup?", "options": [{"text": "Safety (due to lack of FDIC insurance).", "isCorrect": false, "rationale": "Regular checking accounts at primary banks are typically FDIC-insured, so safety itself is not necessarily compromised, assuming the bank is federally insured."}, {"text": "Higher interest rate (missing out on growth).", "isCorrect": false, "rationale": "While he would miss out on a higher interest rate, the text identifies 'high-yield interest' as a benefit of HYSA, not one of the three *essential characteristics* that define a suitable emergency fund location. Missing out on interest is a secondary concern to the core characteristics."}, {"text": "Separation from daily spending (making it prone to impulsive use).", "isCorrect": true, "rationale": "A checking account at the primary bank linked to a debit card makes the funds extremely easy to access for daily spending, directly compromising the 'separate from daily spending' characteristic and increasing the likelihood of impulsive use for non-emergencies."}, {"text": "Accessibility (transfers might be slow).", "isCorrect": false, "rationale": "A checking account linked to a debit card offers *instant* accessibility, which the text argues can be *too* accessible for an emergency fund, leading to impulsive use, rather than being slow."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
