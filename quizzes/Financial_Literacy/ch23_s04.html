    };

</head>
<body>

        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 23, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following is NOT typically considered a digital asset according to the provided text?", "options": [{"text": "Cryptocurrency held in a personal wallet", "isCorrect": false, "rationale": "The text explicitly lists cryptocurrency (Bitcoin, Ethereum, etc.) as a digital asset, noting its monetary value."}, {"text": "An Etsy shop with active listings and sales", "isCorrect": false, "rationale": "The text includes 'Online businesses or content creation (YouTube channels, Etsy shops, monetized blogs)' as digital assets."}, {"text": "Physical jewelry stored in a fire-proof safe, documented with photos in cloud storage", "isCorrect": true, "rationale": "Digital assets are defined as 'any property or account that exists in digital form.' While photos of physical jewelry are digital, the jewelry itself is a physical asset, not a digital one."}, {"text": "A monetized YouTube channel with years of content", "isCorrect": false, "rationale": "The text includes 'Online businesses or content creation (YouTube channels, Etsy shops, monetized blogs)' as digital assets."}], "id": "q01"}, {"question": "Sarah invested heavily in a new cryptocurrency and stores it in a personal digital wallet. She dies unexpectedly without sharing her private key or seed phrase. Based on the text, what is the most likely outcome for her beneficiaries regarding this cryptocurrency?", "options": [{"text": "Her family can request access through the cryptocurrency exchange she used.", "isCorrect": false, "rationale": "The text specifies 'held only in a personal wallet,' which means it's not managed by an exchange, eliminating this recovery method."}, {"text": "The cryptocurrency is permanently lost and inaccessible to her estate.", "isCorrect": true, "rationale": "The text explicitly states, 'Cryptocurrency held only in a personal wallet is permanently inaccessible if the private key or seed phrase is lost. Billions of dollars in cryptocurrency have been permanently lost this way.'"}, {"text": "State laws (like RUFADAA) will ensure her executor can recover the assets.", "isCorrect": false, "rationale": "While RUFADAA gives some rights, it cannot recover assets for which the fundamental access (like a private key) has been permanently lost."}, {"text": "A password manager with emergency access would have allowed recovery even without the private key.", "isCorrect": false, "rationale": "A password manager would store login credentials, but for a personal crypto wallet, the private key/seed phrase is the direct access, which needs to be documented, not just a password."}], "id": "q02"}, {"question": "According to the text, what is identified as the primary challenge families face in managing digital assets after a loved one's death?", "options": [{"text": "The high cost of transferring digital assets to beneficiaries.", "isCorrect": false, "rationale": "The text does not mention cost as the primary challenge; it focuses on access issues."}, {"text": "The lack of legal recognition for digital assets as part of an estate.", "isCorrect": false, "rationale": "The text discusses evolving laws (RUFADAA) that grant some rights, implying recognition, but the core issue is not a lack of recognition itself."}, {"text": "The deceased person's exclusive knowledge of account passwords.", "isCorrect": true, "rationale": "The text clearly states, 'The most common problem with digital assets is simple: the account passwords are known only to you,' which leads to all other access difficulties."}, {"text": "The immediate deactivation of all digital accounts upon death.", "isCorrect": false, "rationale": "While some accounts may be deactivated or memorialized, the immediate and universal deactivation of 'all' accounts is not presented as the primary problem; rather, it's the inability to access them due to forgotten passwords."}], "id": "q03"}, {"question": "Which of the following statements best reflects the recommended approach for including digital asset access information in estate planning?", "options": [{"text": "Store a comprehensive list of all passwords directly within your legal will for easy executor access.", "isCorrect": false, "rationale": "The text explicitly warns, 'Do not include actual passwords in your will—wills become public records during probate.'"}, {"text": "Entrust your full password list to a trusted friend via email for quick retrieval.", "isCorrect": false, "rationale": "The text warns, 'Never store your list of passwords in your will, in an email, in an unencrypted document,' due to security risks."}, {"text": "Document important account usernames, instructions for accessing a password manager, and wishes for accounts in a secure, separate document.", "isCorrect": true, "rationale": "This aligns with the 'Written Instructions in a Secure Location' solution and the 'moneytip,' which advises creating a secure document with instructions on how to find passwords (e.g., in a password manager) and account wishes, kept separate from the will."}, {"text": "Rely solely on RUFADAA to grant your executor automatic access to all digital accounts without any prior documentation.", "isCorrect": false, "rationale": "The text cautions against this, stating, 'do not assume your digital accounts will be automatically accessible or transferable. Take proactive steps to document your digital life.'"}], "id": "q04"}, {"question": "John wants to ensure his spouse can quickly access his email and online banking accounts shortly after his death to manage immediate financial matters and cancel subscriptions. Which digital estate planning solution would be most effective for this specific goal?", "options": [{"text": "Relying on state laws like RUFADAA for his executor to gain access.", "isCorrect": false, "rationale": "While RUFADAA provides a legal framework, access can be complicated by varying state laws and platform terms of service, and may not provide 'quick' access."}, {"text": "Designating a legacy contact for his email and banking platforms.", "isCorrect": false, "rationale": "The text primarily mentions legacy contacts for social media and tech platforms. While useful for those, a password manager provides more direct and comprehensive access to multiple account types for immediate financial management."}, {"text": "Using a password manager with an emergency access feature.", "isCorrect": true, "rationale": "The text highlights that the emergency access feature of a password manager 'gives your family access to your digital accounts in an emergency,' which directly addresses the need for quick access to various accounts for managing immediate financial matters."}, {"text": "Storing all account passwords in his will, updated annually.", "isCorrect": false, "rationale": "The text strongly warns against placing actual passwords in a will because it becomes a public record during probate, compromising security."}], "id": "q05"}, {"question": "Based on the security warnings provided, which of the following should explicitly NOT be included directly in a legal will regarding digital assets?", "options": [{"text": "Instructions for how to access your password manager.", "isCorrect": false, "rationale": "The text suggests these instructions be in a secure document, but the explicit warning for the will is against passwords themselves, not general access instructions."}, {"text": "Your wishes for specific social media accounts (e.g., memorialize or delete).", "isCorrect": false, "rationale": "Wishes for accounts are not sensitive access information and can be part of estate planning documents."}, {"text": "A list of your important online account usernames.", "isCorrect": false, "rationale": "Usernames are generally not considered as sensitive as passwords, and the text recommends listing important accounts in a secure document."}, {"text": "Actual passwords for your email and banking accounts.", "isCorrect": true, "rationale": "The text emphatically states, 'Do not include actual passwords in your will—wills become public records during probate,' making this the most crucial omission from a will."}], "id": "q06"}, {"question": "What is the primary implication of the text's discussion on RUFADAA for individuals planning their digital estate?", "options": [{"text": "RUFADAA guarantees automatic and universal access to all digital accounts for executors nationwide.", "isCorrect": false, "rationale": "The text explicitly states 'the specifics vary by state and by platform terms of service' and advises against assuming automatic access."}, {"text": "RUFADAA eliminates the need for personal digital estate planning due to comprehensive legal coverage.", "isCorrect": false, "rationale": "The text contradicts this by stating, 'The practical takeaway: do not assume your digital accounts will be automatically accessible or transferable. Take proactive steps to document your digital life.'"}, {"text": "While RUFADAA offers some legal framework, individuals should still take proactive steps due to varying specifics and platform terms.", "isCorrect": true, "rationale": "This statement accurately summarizes the text's position: RUFADAA provides a basis, but its limitations (state variations, platform terms) necessitate personal proactive planning."}, {"text": "RUFADAA primarily focuses on transferring ownership of digital storefronts and in-game items, not personal accounts.", "isCorrect": false, "rationale": "The text broadly states RUFADAA 'gives executors and agents some rights to access digital accounts,' not limiting it to specific types of digital assets like storefronts or gaming items."}], "id": "q07"}, {"question": "A financially savvy individual has created a secure 'digital estate' document listing important accounts and instructions. How often does the 'moneytip' suggest this document should be reviewed and updated?", "options": [{"text": "Only when major life events occur, such as marriage or the birth of a child.", "isCorrect": false, "rationale": "While major life events are a good trigger, the 'moneytip' recommends a more frequent review regardless of such events."}, {"text": "Every five years, coinciding with a general review of the will.", "isCorrect": false, "rationale": "The 'moneytip' specifies a much shorter, annual review period for this dynamic document."}, {"text": "At least once a year to ensure accuracy and relevance.", "isCorrect": true, "rationale": "The 'moneytip' explicitly advises: 'Review and update this document at least once a year.'"}, {"text": "Only if their primary password manager changes.", "isCorrect": false, "rationale": "This is too narrow; accounts, instructions, and wishes can change independently of the password manager."}], "id": "q08"}, {"question": "Which statement best summarizes the process of managing a deceased person's social media accounts without prior planning, compared to using a platform's legacy contact feature?", "options": [{"text": "Without prior planning, social media content is automatically deleted, while a legacy contact preserves it.", "isCorrect": false, "rationale": "The text says platforms may 'memorialize' or 'deactivate' without prior planning, not necessarily 'automatically deleted.' A legacy contact allows for choice (access, memorialize, or delete)."}, {"text": "Without prior planning, managing accounts is simpler as platforms prefer direct family contact; a legacy contact complicates the process.", "isCorrect": false, "rationale": "The text indicates the opposite: without planning, it requires 'significant effort and proof of relationship.'"}, {"text": "Without prior planning, accessing or deleting content requires significant effort and proof of relationship, whereas a legacy contact streamlines this process.", "isCorrect": true, "rationale": "The text states that without planning, 'accessing or deleting the content requires proof of relationship and significant effort.' In contrast, legacy contacts 'take effect automatically upon verified death, with no probate involvement,' indicating a streamlined process."}, {"text": "Both methods equally result in the immediate and automatic memorialization of the account, with no difference in effort.", "isCorrect": false, "rationale": "The text clearly distinguishes the effort required and the automatic nature of legacy contact features versus the 'significant effort' without them."}], "id": "q09"}, {"question": "Emily is starting her digital estate planning. She has numerous digital assets, including cryptocurrency, social media, and online banking. Considering all solutions presented in the text, which action represents the most comprehensive and secure first step in establishing her digital estate plan?", "options": [{"text": "Creating a secure document listing all actual passwords and storing it in her safe deposit box.", "isCorrect": false, "rationale": "The text strictly warns against listing actual passwords due to security risks, even in a secure location, as passwords change frequently."}, {"text": "Designating legacy contacts for all her social media platforms immediately.", "isCorrect": false, "rationale": "While a good step for social media, this isn't comprehensive enough for other digital assets like banking or cryptocurrency access, nor does it establish a central instruction hub."}, {"text": "Setting up a password manager with an emergency access feature and creating a separate secure document with instructions on how to access it, along with her wishes for accounts.", "isCorrect": true, "rationale": "This combines the three main solutions: secure password management with emergency access, written instructions in a secure location for broader account information and wishes, and aligns with the moneytip for comprehensive, secure planning."}, {"text": "Assuming RUFADAA will cover her needs and doing nothing else.", "isCorrect": false, "rationale": "The text explicitly warns against this assumption, stating, 'Take proactive steps to document your digital life.'"}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
