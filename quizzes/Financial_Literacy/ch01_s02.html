<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 1, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following characteristics *most directly* explains why precious metals like gold and silver became the dominant form of commodity money worldwide, compared to items like salt or cowrie shells?", "options": [{"text": "Their aesthetic appeal and common use in jewelry.", "isCorrect": false, "rationale": "While true, the text does not highlight aesthetic appeal as the primary reason for their dominance as commodity money. It focuses on their practical characteristics for exchange."}, {"text": "Their universal religious significance across various ancient cultures.", "isCorrect": false, "rationale": "The text does not mention religious significance as a factor in the dominance of precious metals as commodity money."}, {"text": "Their durability, divisibility, portability, and rarity.", "isCorrect": true, "rationale": "The text explicitly states that precious metals 'eventually became the dominant commodity money worldwide because they were durable, divisible, portable, and rare enough to hold value.'"}, {"text": "The ease with which they could be mass-produced and distributed globally.", "isCorrect": false, "rationale": "Rarity, not ease of mass production, was a key factor in their value. Mass production would diminish their value, contradicting their role as money."}]}, {"question": "Imagine a remote village where inhabitants barter goods. Due to a new resource discovery, a specific type of durable, brightly colored stone becomes highly sought after for decorative purposes and is also relatively rare. If villagers begin accepting these stones in exchange for other goods and services, what stage of money evolution would this represent?", "options": [{"text": "Fiat money, because its value is based on collective trust.", "isCorrect": false, "rationale": "Fiat money requires a government decree to be legal tender, which is not present in this scenario. While trust is involved, the primary value comes from its intrinsic desirability/usefulness."}, {"text": "Digital currency, as it's not traditional government-issued money.", "isCorrect": false, "rationale": "Digital currency exists in electronic form. These are physical stones, not electronic records."}, {"text": "Commodity money, because the stones have intrinsic value and usefulness (for decoration) beyond their role as currency.", "isCorrect": true, "rationale": "This scenario perfectly matches the definition of commodity money: 'money made from something people already wanted and could use' and whose 'value comes from the material it is made of or its usefulness as a good.'"}, {"text": "Gold-backed currency, as rarity implies backing.", "isCorrect": false, "rationale": "Gold-backed currency means its value is tied to a fixed amount of gold, usually by a government or financial institution, which is not the case here."}]}, {"question": "The invention of minted coins around 600 BCE represented a significant breakthrough in the evolution of money primarily because it:", "options": [{"text": "Introduced the concept of intrinsic value to currency.", "isCorrect": false, "rationale": "Commodity money already possessed intrinsic value. Coins simply standardized the form of intrinsically valuable metals."}, {"text": "Eliminated the need for any form of physical currency.", "isCorrect": false, "rationale": "Coins are a physical form of currency. They did not eliminate the need for physical money."}, {"text": "Standardized value and guaranteed authenticity, simplifying transactions.", "isCorrect": true, "rationale": "The text states coins were a breakthrough because 'Instead of weighing out lumps of gold or silver for every transaction, you could hand over a coin whose weight and purity were guaranteed by the government. Coins solved the problem of having to verify the metal's authenticity each time.'"}, {"text": "Allowed governments to easily debase currency for the first time.", "isCorrect": false, "rationale": "Debasement was a negative consequence governments discovered they could exploit, but it was not the primary 'breakthrough' or intended benefit of coins."}]}, {"question": "The Tang Dynasty's 'flying money' initially emerged to address which specific problem faced by merchants?", "options": [{"text": "The lack of secure storage options for gold and silver at home.", "isCorrect": false, "rationale": "While storage is a concern, the text specifically highlights the challenges of transporting wealth. 'Flying money' focused on transfer, not just static storage."}, {"text": "The danger and impracticality of transporting large amounts of heavy coins across long distances.", "isCorrect": true, "rationale": "The text states 'flying money' developed so merchants 'could deposit in one city and redeem in another, avoiding the danger of carrying heavy coins across long distances.'"}, {"text": "The difficulty in determining the purity and weight of coins in transactions.", "isCorrect": false, "rationale": "Minted coins had already largely addressed this issue by standardizing weight and purity. 'Flying money' was a separate innovation related to transport."}, {"text": "The desire to shift to a currency with no intrinsic value.", "isCorrect": false, "rationale": "'Flying money' were certificates redeemable for coins, meaning they were still indirectly tied to intrinsic value. The shift to purely fiat money came much later."}]}, {"question": "The 'warning' box describes how Roman emperors debased their coins. What was the most significant *long-term economic consequence* of this practice?", "options": [{"text": "It led to a permanent increase in the intrinsic value of the currency.", "isCorrect": false, "rationale": "Debasing coins (mixing in cheaper metals) *decreased* their intrinsic value, making them worth less in real terms."}, {"text": "It dramatically expanded the empire's trade routes due to increased money supply.", "isCorrect": false, "rationale": "The text states debasement 'contributed to inflation and economic instability,' which would hinder, not expand, trade."}, {"text": "It contributed to inflation and general economic instability.", "isCorrect": true, "rationale": "The text explicitly states that debasement 'contributed to inflation and economic instability.' This is a classic economic consequence of reducing the metallic content of coinage while maintaining its face value."}, {"text": "It caused a rapid shift towards digital forms of payment.", "isCorrect": false, "rationale": "Digital money is a much more recent development, thousands of years after the Roman Empire."}]}, {"question": "What is the fundamental distinction in how value is primarily derived between a gold-backed currency and fiat money?", "options": [{"text": "Gold-backed currency relies on government decree, while fiat money relies on market forces.", "isCorrect": false, "rationale": "This is incorrect. Fiat money relies on government decree, and while market forces play a role, the primary backing for gold-backed currency is the physical commodity."}, {"text": "Gold-backed currency's value is tied to a physical commodity, whereas fiat money's value comes from government declaration and public trust.", "isCorrect": true, "rationale": "The text clearly defines gold-backed currency as 'money whose value is directly tied to a fixed amount of gold' and fiat money as 'currency that has value because a government declares it to be legal tender and because the public trusts it—not because it is backed by a physical commodity.'"}, {"text": "Fiat money is designed to be easily counterfeited, unlike gold-backed currency.", "isCorrect": false, "rationale": "Counterfeiting is a challenge for both types of currency, and it is not a defining characteristic of how their value is derived."}, {"text": "Gold-backed currency is only used for international trade, while fiat money is exclusively for domestic use.", "isCorrect": false, "rationale": "Both types of currency can be used for both domestic and international trade, depending on the historical context and specific currency."}]}, {"question": "If a major global power's government were to collapse entirely and lose all public trust and authority, what would be the most immediate and profound impact on its national fiat currency?", "options": [{"text": "The currency's value would automatically convert to its equivalent in gold reserves.", "isCorrect": false, "rationale": "Fiat money is explicitly *not* backed by gold. A government collapse would not magically convert it to gold."}, {"text": "The currency would immediately be replaced by a new digital currency issued by a private entity.", "isCorrect": false, "rationale": "While a new system might emerge, it would not be immediate or automatic. The primary effect would be on the existing currency's value."}, {"text": "The currency would lose most or all of its value, as its backing (government authority and public trust) would be gone.", "isCorrect": true, "rationale": "The text states fiat money has value because 'The U.S. government declares it legal tender' and 'The public trusts it.' Without these pillars, the currency's value would collapse."}, {"text": "The currency's value would increase due to its sudden rarity as a collectible item.", "isCorrect": false, "rationale": "While old currencies can become collectibles, this is not the immediate or profound economic impact on a functional currency whose backing has disappeared. Its utility as money would cease."}]}, {"question": "According to the text, which of the following is *NOT* listed as a reason the U.S. dollar holds value today as fiat money?", "options": [{"text": "The U.S. government declares it legal tender, meaning it must be accepted for debts.", "isCorrect": false, "rationale": "This is explicitly listed as the first reason: 'The U.S. government declares it legal tender, meaning it must be accepted for all debts, public and private.'"}, {"text": "The public trusts it because people are confident others will accept it too.", "isCorrect": false, "rationale": "This is explicitly listed as the second reason: 'The public trusts it—people accept dollars because they are confident others will accept them too.'"}, {"text": "It is directly convertible to a fixed amount of gold at the Federal Reserve.", "isCorrect": true, "rationale": "The text explicitly states: 'The United States dollar became fully fiat in 1971, when President Nixon ended the direct conversion of dollars to gold.' And 'There is no promise to give you gold or silver.'"}, {"text": "The Federal Reserve manages the money supply to try to keep the currency stable.", "isCorrect": false, "rationale": "This is explicitly listed as the third reason: 'The Federal Reserve manages the money supply to try to keep the currency stable and the economy functioning.'"}]}, {"question": "The 'latest evolution' of money, digital currency, is fundamentally characterized by:", "options": [{"text": "Its complete independence from any government or central authority.", "isCorrect": false, "rationale": "While cryptocurrencies are decentralized, the text also mentions 'Bank account balances and digital transfers' and 'Central Bank Digital Currencies (CBDCs)' which are often regulated or issued by governments."}, {"text": "Its primary existence as electronic records and transfers rather than physical objects.", "isCorrect": true, "rationale": "The text states: 'Today, most money never exists as physical bills or coins at all. When your parent gets paid by direct deposit, no physical cash moves anywhere—only numbers change in computer systems.'"}, {"text": "Its inherent susceptibility to debasement by governments.", "isCorrect": false, "rationale": "Debasement was a characteristic problem of physical coinage. Digital currencies have different security and management challenges, but 'debasement' in the traditional sense is not their fundamental characteristic."}, {"text": "Its exclusive use in international banking and large corporate transactions.", "isCorrect": false, "rationale": "The text gives the example 'When you tap a phone to pay, you are moving digital records,' indicating everyday use."}]}, {"question": "The entire evolution of money, from barter to digital currency, can best be understood as a continuous process driven by:", "options": [{"text": "Governments' desires to centralize control over economic activity.", "isCorrect": false, "rationale": "While government control increased at certain stages (coins, fiat), the overarching theme presented in the text is broader than just government aims."}, {"text": "The increasing scarcity of physical resources like gold and silver.", "isCorrect": false, "rationale": "While rarity played a role for commodity money, it doesn't explain the move to paper or digital money, which aren't limited by physical scarcity in the same way."}, {"text": "Humanity's ongoing efforts to solve practical problems associated with trade and exchange.", "isCorrect": true, "rationale": "The introduction states: 'each stage solved problems the previous one created.' The 'moneytip' reiterates: 'it unfolded over thousands of years as people solved practical problems.' This is the central theme."}, {"text": "The gradual reduction of inflation across different economic systems.", "isCorrect": false, "rationale": "Inflation has been a persistent problem throughout history, sometimes exacerbated by monetary evolution (e.g., debasement), rather than being the primary driving force behind the evolution itself."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
