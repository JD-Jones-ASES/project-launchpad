<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 3, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary characteristic that defines 'reverse planning' as described in the text?", "options": [{"text": "Estimating how much surplus money you might have at the end of each month to save.", "isCorrect": false, "rationale": "Reverse planning does not start by estimating surplus; instead, it starts with a goal and calculates the required savings."}, {"text": "Starting with a target financial goal and its deadline, then calculating the specific monthly savings amount needed.", "isCorrect": true, "rationale": "Reverse planning is defined as starting with a goal and a deadline and working backward to determine the exact monthly savings required."}, {"text": "Adjusting your financial goals based on your current income and expenses.", "isCorrect": false, "rationale": "Adjusting goals is a potential *response* to reverse planning's findings, not its definition."}, {"text": "Analyzing past spending habits to predict future savings potential.", "isCorrect": false, "rationale": "While analyzing spending can help free up money, it's not the core definition of reverse planning, which is goal-driven."}]}, {"question": "According to the text, what is the most significant benefit or 'power' reverse planning offers to an individual setting financial goals?", "options": [{"text": "It eliminates the need for any financial sacrifices to reach a goal.", "isCorrect": false, "rationale": "Reverse planning often reveals that sacrifices or adjustments may be necessary, rather than eliminating them."}, {"text": "It automatically guarantees the attainment of any financial goal, regardless of its size.", "isCorrect": false, "rationale": "Reverse planning provides clarity on what's needed, but doesn't guarantee attainment without action."}, {"text": "It provides clarity by making financial constraints visible, which enables informed decision-making.", "isCorrect": true, "rationale": "The text states that the power of reverse planning 'is in the clarity it gives you' and that it 'makes the constraint visible so you can make a real decision'."}, {"text": "It identifies the best investment vehicles for your savings to maximize returns.", "isCorrect": false, "rationale": "The current section focuses on calculating savings amounts, not investment vehicles; that's covered in a later chapter."}]}, {"question": "A student wants to save $720 for a new laptop and needs it in 9 months. Using the reverse planning formula, how much must they save each month?", "options": [{"text": "$70", "isCorrect": false, "rationale": "To calculate, divide the goal amount by the number of months: $720 / 9 months = $80/month."}, {"text": "$80", "isCorrect": true, "rationale": "Using the formula: Monthly Savings = Goal Amount / Number of Months. So, $720 / 9 months = $80 per month."}, {"text": "$90", "isCorrect": false, "rationale": "To calculate, divide the goal amount by the number of months: $720 / 9 months = $80/month."}, {"text": "$100", "isCorrect": false, "rationale": "To calculate, divide the goal amount by the number of months: $720 / 9 months = $80/month."}]}, {"question": "David wants to save $5,400 for a vacation trip and plans to go in 3 years. According to the reverse planning formula, what amount must he save each month?", "options": [{"text": "$450", "isCorrect": false, "rationale": "This calculation assumes 12 months ($5400 / 12 = $450), but the goal is for 3 years, which is 36 months."}, {"text": "$1,800", "isCorrect": false, "rationale": "This amount represents the yearly savings ($5400 / 3 years = $1800/year), not the monthly savings."}, {"text": "$150", "isCorrect": true, "rationale": "First, convert 3 years to months: 3 years * 12 months/year = 36 months. Then, apply the formula: $5,400 / 36 months = $150 per month."}, {"text": "$100", "isCorrect": false, "rationale": "This amount is too low. $5400 / $100 = 54 months, which is longer than 3 years."}]}, {"question": "The monthly savings formula presented in this section explicitly makes which of the following assumptions about your savings?", "options": [{"text": "That your savings will be invested in a market-linked account with high returns.", "isCorrect": false, "rationale": "The text explicitly states this formula 'assumes no interest is earned on your savings' and is a 'baseline'."}, {"text": "That your income will consistently increase over the savings period.", "isCorrect": false, "rationale": "The formula itself does not make assumptions about income changes, though increasing income is a strategy discussed."}, {"text": "That no interest or returns will be earned on your saved money.", "isCorrect": true, "rationale": "The text explicitly notes: 'This formula assumes no interest is earned on your savings.' It is presented as a baseline before discussing compound interest."}, {"text": "That you will withdraw money from your savings account regularly.", "isCorrect": false, "rationale": "The formula assumes a consistent monthly deposit towards a goal, not regular withdrawals."}]}, {"question": "After using reverse planning, Maria realizes her required monthly savings for her goal is significantly more than she can afford. Which of the following is NOT one of the three recommended actions she could take, according to the text?", "options": [{"text": "Extend the timeline for her goal, allowing more months to save.", "isCorrect": false, "rationale": "Extending the timeline is one of the three recommended actions ('More months = smaller monthly amount')."}, {"text": "Reduce the goal amount, or break a large goal into smaller phases.", "isCorrect": false, "rationale": "Reducing the goal amount or breaking it down is one of the three recommended actions."}, {"text": "Take out a short-term personal loan to cover the initial deficit.", "isCorrect": true, "rationale": "Taking out a loan is not mentioned as a recommended action; the text focuses on adjusting the savings plan, goal, or income."}, {"text": "Increase her income or reduce other spending to free up more for savings.", "isCorrect": false, "rationale": "Increasing income or reducing expenses is one of the three recommended actions ('Increase your income' or 'reduce spending')."}]}, {"question": "Ben needs to save $1,200 for a new computer in 8 months, requiring him to save $150 per month. If he finds he can only realistically save $100 per month, how long would he need to extend his timeline to still reach his $1,200 goal?", "options": [{"text": "2 months, making the total timeline 10 months.", "isCorrect": false, "rationale": "If he saves $100/month for 10 months, he would only save $1,000, not $1,200."}, {"text": "4 months, making the total timeline 12 months.", "isCorrect": true, "rationale": "To reach $1,200 saving $100 per month, he would need $1,200 / $100 = 12 months. Since his original plan was 8 months, he needs to extend his timeline by 12 - 8 = 4 months."}, {"text": "6 months, making the total timeline 14 months.", "isCorrect": false, "rationale": "If he saves $100/month for 14 months, he would save $1,400, which is more than his goal."}, {"text": "12 months, making the total timeline 20 months.", "isCorrect": false, "rationale": "This would mean he saves $100/month for 20 months, totaling $2,000, which far exceeds his $1,200 goal and required extension."}]}, {"question": "The 'pay yourself first' approach is recommended as a valuable money skill. What does this approach primarily involve?", "options": [{"text": "Prioritizing spending on personal desires before paying bills.", "isCorrect": false, "rationale": "This is incorrect. 'Pay yourself first' means prioritizing savings, not spending on desires."}, {"text": "Waiting until the end of the month to see how much money is left over to save.", "isCorrect": false, "rationale": "This is the opposite of 'pay yourself first,' which advocates for saving immediately."}, {"text": "Setting up an automatic transfer to move the savings amount to a separate account immediately after receiving a paycheck.", "isCorrect": true, "rationale": "The text describes 'pay yourself first' as setting up an automatic transfer for savings the day your paycheck arrives, 'before you have a chance to spend it'."}, {"text": "Investing a significant portion of your income into high-risk, high-reward ventures.", "isCorrect": false, "rationale": "While investing is part of financial planning, 'pay yourself first' specifically refers to the *habit* of automatic savings, not necessarily the investment strategy."}]}, {"question": "Beyond just calculating a number, what is the ultimate value or most valuable money skill derived from making reverse planning a habit?", "options": [{"text": "It eliminates the need for any future financial planning or adjustments.", "isCorrect": false, "rationale": "Reverse planning provides a starting point and informs adjustments, but doesn't eliminate the need for ongoing planning."}, {"text": "It guarantees that all financial goals will be met exactly as planned without any deviations.", "isCorrect": false, "rationale": "Reverse planning shows what's needed, but external factors and discipline are still crucial for goal achievement."}, {"text": "It allows individuals to spend freely without worrying about future financial needs.", "isCorrect": false, "rationale": "Reverse planning introduces discipline and awareness of financial needs, rather than promoting free spending."}, {"text": "It translates abstract goals into concrete, immediate monthly actions, enabling realistic decision-making.", "isCorrect": true, "rationale": "The text states, 'This habit—immediately translating goals into monthly actions—is one of the most valuable money skills you will ever build,' facilitating realistic assessment and action."}]}, {"question": "Why does the current reverse planning formula intentionally NOT account for interest earned on savings, according to the text?", "options": [{"text": "Because interest is only applicable to very long-term financial goals, not the ones discussed.", "isCorrect": false, "rationale": "The text mentions interest is 'minimal' for short-term goals, implying it's relevant for longer ones, but not the reason for its exclusion here."}, {"text": "To keep the math simpler for introductory purposes and to provide a conservative baseline for savings.", "isCorrect": true, "rationale": "The text states, 'That is intentional for now—the math is simpler, and for short-term goals, interest on a small savings balance is minimal,' and calls it 'your baseline: the most you would need to save if your money earns nothing.'"}, {"text": "Because earning interest on personal savings accounts is illegal in most countries.", "isCorrect": false, "rationale": "This statement is factually incorrect and not mentioned in the text."}, {"text": "To encourage individuals to save more than necessary, promoting financial security.", "isCorrect": false, "rationale": "While it results in saving a bit more, the primary stated reason is simplicity and providing a baseline, not intentionally over-saving for security."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
