        <h2>Results</h2>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the fundamental reason why trade-offs are unavoidable in financial decisions?", "options": [{"text": "People often make impulsive choices.", "isCorrect": false, "rationale": "While impulsive choices can lead to poor trade-offs, the text states that trade-offs themselves are unavoidable due to the inherent nature of limited resources, not human behavior."}, {"text": "Resources are limited relative to unlimited desires.", "isCorrect": true, "rationale": "The text explicitly defines scarcity as 'the condition in which resources (money, time, materials) are limited relative to the unlimited desires people have for them. Scarcity is what makes trade-offs necessary.'"}, {"text": "Financial markets are unpredictable.", "isCorrect": false, "rationale": "Market unpredictability can complicate financial decisions but is not the fundamental reason why trade-offs exist. The core reason is scarcity, as explained in the text."}, {"text": "Most people lack proper financial education.", "isCorrect": false, "rationale": "Lack of education can lead to poor trade-offs, but it does not cause the existence of trade-offs. Trade-offs are a result of scarcity, a universal economic reality."}], "id": "q01"}, {"question": "Sarah is trying to decide between buying a new laptop or saving for a vacation. Applying Step 1 of the decision-making framework, what should Sarah prioritize after identifying these two initial choices?", "options": [{"text": "Immediately calculate the opportunity cost of each option.", "isCorrect": false, "rationale": "Calculating opportunity cost is Step 2. Step 1 focuses on identifying all available options, including those not immediately obvious."}, {"text": "Consider if there are other, less obvious alternatives, such as buying a used laptop or taking a shorter vacation.", "isCorrect": true, "rationale": "Step 1 is to 'Identify your options. What are the real choices available to you? Do not just look at the obvious two — are there other alternatives you have not considered?' This includes options like 'do nothing for now, or wait.'"}, {"text": "Seek advice from a financial expert.", "isCorrect": false, "rationale": "While good general advice, seeking external advice is not explicitly part of the 'Identify your options' step in the framework provided."}, {"text": "Focus only on which option aligns best with her immediate desires.", "isCorrect": false, "rationale": "Aligning with desires and values is part of Step 3. Step 1 is about comprehensively listing all choices."}], "id": "q02"}, {"question": "When Priya chose Option C (part-time job + enrichment program) over Option A (full-time job only) in the 'Summer Job Decision' example, what was the opportunity cost of her final decision?", "options": [{"text": "The free summer enrichment program's academic benefits.", "isCorrect": false, "rationale": "Priya gained the enrichment program's benefits with Option C, so this was not given up."}, {"text": "The long-term career advantages gained from the enrichment program.", "isCorrect": false, "rationale": "Priya gained these advantages with Option C, so this was not given up. Opportunity cost is what is sacrificed."}, {"text": "The higher income she would have earned from full-time work.", "isCorrect": true, "rationale": "The example states: 'The opportunity cost of this choice is the higher income she would have earned with full-time work.' This is the 'best thing I give up if I choose this' relative to the next best option (full-time work)."}, {"text": "The satisfaction of aligning her choice with her values and goals.", "isCorrect": false, "rationale": "Priya achieved this satisfaction by choosing Option C; it was a benefit, not a cost."}], "id": "q03"}, {"question": "Which of the following best defines a 'sunk cost' according to the textbook section?", "options": [{"text": "Money spent on an investment that generated a loss.", "isCorrect": false, "rationale": "While a sunk cost might be associated with a loss, the definition in the text is broader and specifically about money that cannot be recovered, regardless of whether it was an investment or a consumption expense."}, {"text": "Money that has already been spent and cannot be recovered.", "isCorrect": true, "rationale": "The text explicitly states: 'A sunk cost is money (or time) that has already been spent and cannot be recovered.'"}, {"text": "The potential profit lost by choosing one alternative over another.", "isCorrect": false, "rationale": "This describes opportunity cost, not a sunk cost."}, {"text": "An unexpected expense that arises after a decision is made.", "isCorrect": false, "rationale": "This describes an unforeseen cost, but not necessarily a 'sunk' cost that cannot be recovered. Sunk costs are about past, irrecoverable expenditures."}], "id": "q04"}, {"question": "David bought tickets for a concert months ago for $100. On the day of the concert, he feels unwell but considers going anyway because he 'already paid for the tickets.' What advice would the textbook section offer David?", "options": [{"text": "He should go to the concert to avoid wasting the money.", "isCorrect": false, "rationale": "The text warns against this exact 'sunk cost trap,' stating that 'Going to the concert while sick does not get your money back; it just makes you sicker.'"}, {"text": "He should sell the tickets to a friend to recover some of the cost.", "isCorrect": false, "rationale": "While a practical financial move, the text's specific advice on sunk costs is that the money 'is gone whether you go or not,' and the decision should be based on the present situation, not the past expense. Selling tickets is not directly addressed as a way to avoid the *trap* of influencing *future* decisions with sunk costs."}, {"text": "The $100 is a sunk cost and should not influence his decision about what is best for him *now*.", "isCorrect": true, "rationale": "The text explicitly states regarding sunk costs: 'The key rule about sunk costs: they should not influence your future decisions.' The rational question is 'Given where I am right now, what is the best choice going forward?'"}, {"text": "He should always prioritize getting his money's worth, regardless of his current well-being.", "isCorrect": false, "rationale": "This directly contradicts the advice on sunk costs, which emphasizes making the best choice from the present forward, rather than trying to 'recover' past, unrecoverable expenses."}], "id": "q05"}, {"question": "The textbook compares a $15,000 used car with high gas mileage to a $10,000 used car with poor gas mileage. What is the primary lesson this example illustrates about financial decision-making?", "options": [{"text": "Always choose the option with the lowest initial price.", "isCorrect": false, "rationale": "The example shows that the $10,000 car might be more expensive overall, directly contradicting this statement."}, {"text": "High gas mileage cars are always a better financial choice.", "isCorrect": false, "rationale": "The text states 'often changes which option looks smarter,' implying it's not always the case, and depends on the specific numbers and time frame."}, {"text": "It's crucial to estimate all relevant costs and benefits over time, not just the initial sticker price.", "isCorrect": true, "rationale": "The text states: 'The key is to estimate all the relevant costs and benefits, not just the sticker price,' and 'Over five years, the cheaper car might cost $4,000 more in gasoline, making it the more expensive choice overall.'"}, {"text": "Used cars are generally more expensive in the long run due to maintenance.", "isCorrect": false, "rationale": "The example focuses on gas mileage, not maintenance, and the primary point is about total cost over time, not a blanket statement about used cars being more expensive."}], "id": "q06"}, {"question": "The four-step decision-making framework does not guarantee a perfect choice every time. What is its primary benefit, as stated in the text?", "options": [{"text": "It ensures all available information is gathered before a decision.", "isCorrect": false, "rationale": "The text acknowledges that 'sometimes you will not have all the information you need,' so it doesn't guarantee this."}, {"text": "It helps eliminate all financial trade-offs.", "isCorrect": false, "rationale": "The text states, 'Because trade-offs are unavoidable, the goal is not to eliminate them — it is to make them wisely.'"}, {"text": "It promotes deliberate decision-making rather than impulsive or default choices.", "isCorrect": true, "rationale": "The text concludes, 'But making decisions deliberately — rather than impulsively or by default — is one of the most valuable financial skills you can build.'"}, {"text": "It provides a mathematical formula for optimal outcomes.", "isCorrect": false, "rationale": "The framework is a 'consistent process for thinking through your options,' not a mathematical formula."}], "id": "q07"}, {"question": "Maria is using the four-step framework to decide between two job offers. She is at Step 3: 'Consider your values and goals.' Which of the following actions best aligns with this step?", "options": [{"text": "Listing all potential future job opportunities that might arise from each offer.", "isCorrect": false, "rationale": "This might be part of identifying options or benefits, but Step 3 specifically asks, 'Which option is most aligned with what matters most to you? Does any option get you closer to a financial goal you have set?'"}, {"text": "Calculating the exact salary and benefits difference between the two offers.", "isCorrect": false, "rationale": "This would be part of evaluating options and their dollar values, possibly in Step 2 (opportunity cost) or for general comparison, but not the core of 'values and goals.'"}, {"text": "Reflecting on which job allows her to pursue her passion for environmental conservation and offers opportunities for skill development in areas she values.", "isCorrect": true, "rationale": "This action directly addresses Step 3's directives: 'Which option is most aligned with what matters most to you?' and considering if it gets her 'closer to a financial goal you have set' (which can include non-monetary goals like skill development related to values)."}, {"text": "Asking friends and family which job they think she should take.", "isCorrect": false, "rationale": "While seeking advice can be helpful, Step 3 focuses on *her* personal values and goals, emphasizing internal reflection rather than external opinion."}], "id": "q08"}, {"question": "How do the concepts of scarcity, trade-offs, and personal values ultimately connect to promote 'intentional decision-making,' as discussed in the section?", "options": [{"text": "Scarcity forces trade-offs, making it essential to choose based on what matters most (values) rather than impulsively.", "isCorrect": true, "rationale": "The text explains that scarcity makes trade-offs unavoidable, and the framework helps make these trade-offs wisely by considering values and goals, leading to intentional decisions. 'Every dollar you spend (or save) is a vote for what you value.'"}, {"text": "Personal values determine the extent of scarcity, which in turn influences the number of trade-offs.", "isCorrect": false, "rationale": "Scarcity is a condition of limited resources, independent of personal values. Values guide choices *within* scarcity, not determine its extent."}, {"text": "Trade-offs eliminate scarcity, allowing values to be pursued without constraint.", "isCorrect": false, "rationale": "Trade-offs are a *consequence* of scarcity, not a way to eliminate it. Scarcity remains, and trade-offs are how we manage it."}, {"text": "Intentional decision-making is about avoiding scarcity and trade-offs by setting strict financial values.", "isCorrect": false, "rationale": "The text states trade-offs are unavoidable and the goal is to make them wisely, not to avoid them. Scarcity cannot be avoided."}], "id": "q09"}, {"question": "Emily is considering signing up for a new streaming service that costs $12 per month. Applying the 'moneytip' advice from the text, what should Emily calculate before making this recurring spending commitment?", "options": [{"text": "How much she will save if she cancels her existing streaming services.", "isCorrect": false, "rationale": "While a good financial practice, the specific 'moneytip' focuses on the cost of *this* new commitment over time, not savings from other actions."}, {"text": "The total annual cost of the new streaming service.", "isCorrect": true, "rationale": "The 'moneytip' states: 'Before making any recurring spending commitment, calculate the annual cost.' It gives examples like '$15/month subscription you forgot about costs $180/year.'"}, {"text": "The opportunity cost of subscribing to the service instead of buying a new book.", "isCorrect": false, "rationale": "This relates to opportunity cost (Step 2 of the framework), but the 'moneytip' specifically highlights calculating the *long-term cost of the commitment itself*."}, {"text": "How many hours of content she expects to watch each month.", "isCorrect": false, "rationale": "This would help evaluate value, but the specific 'moneytip' is about calculating the financial cost over time for recurring expenses."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
