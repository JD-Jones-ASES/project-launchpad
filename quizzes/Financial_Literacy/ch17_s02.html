    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "According to the \"Fundamental Rule\" of investing discussed in the section, what is the inherent relationship between potential return and risk?", "options": [{"text": "Higher potential return always comes with lower risk.", "isCorrect": false, "rationale": "This statement is the opposite of the Fundamental Rule. The text explicitly states there are 'no exceptions' to the rule that higher returns come with higher risk."}, {"text": "Higher potential return always comes with higher risk.", "isCorrect": true, "rationale": "The text clearly states, 'potential return always comes with higher risk,' and calls this the 'Fundamental Rule' with 'no exceptions'."}, {"text": "Lower potential return always comes with higher risk.", "isCorrect": false, "rationale": "While low-return investments might still have some risk, the fundamental rule emphasizes the positive correlation: higher potential return necessitates higher risk, not that lower return necessitates higher risk."}, {"text": "Risk and return are unrelated in most legitimate investments.", "isCorrect": false, "rationale": "The entire section is built on the premise that risk and return have a fundamental and direct relationship, especially in legitimate investments."}], "id": "q01"}, {"question": "An investment advisor approaches you, promising a guaranteed 25% annual return with \"absolutely no risk\" to your capital. Based on the \"Fundamental Rule\" and other warnings in the section, what should be your immediate reaction?", "options": [{"text": "This is an excellent, once-in-a-lifetime opportunity that you should seize immediately.", "isCorrect": false, "rationale": "The text warns that if 'someone offers you an investment with high returns and low risk, something is wrong—it is probably a scam,' directly contradicting this reaction."}, {"text": "You should ask for more details to understand how they eliminated all risk.", "isCorrect": false, "rationale": "The 'Fundamental Rule' states there are 'no exceptions' to the link between higher return and higher risk, implying that claims of 'no risk' with high returns are inherently suspicious, regardless of explanations."}, {"text": "You should be highly suspicious, as this scenario contradicts the fundamental rule of investing.", "isCorrect": true, "rationale": "The text explicitly states that an investment offering 'high returns and low risk' is likely a scam because it violates the fundamental rule that potential return always comes with higher risk."}, {"text": "This investment might be legitimate if it's backed by government bonds.", "isCorrect": false, "rationale": "Government bonds typically offer very low returns in exchange for low risk. A 25% guaranteed return is inconsistent with the risk profile of government bonds."}], "id": "q02"}, {"question": "An investor is considering two investments. Investment A has consistently shown a 5% annual return with very minimal fluctuation, while Investment B has varied between a 20% gain and a 15% loss annually but averages 8% over time. Based on the definition of volatility, what can be inferred about Investment B compared to Investment A?", "options": [{"text": "Investment B has lower risk and lower potential return than Investment A.", "isCorrect": false, "rationale": "Investment B's significant fluctuations (20% gain, 15% loss) indicate higher volatility, which means higher risk and generally higher potential return compared to Investment A's stable 5%."}, {"text": "Investment B has higher volatility, which generally means higher risk and higher potential return.", "isCorrect": true, "rationale": "The text defines volatility as 'the degree to which an investment's value fluctuates over time' and states, 'Higher volatility generally means higher risk—and higher potential return.' Investment B's described behavior fits this definition."}, {"text": "Investment B has higher volatility, but this means it is a safer choice because it has a higher average return.", "isCorrect": false, "rationale": "Higher volatility implies higher risk, not safety, even if the average return is higher. The fluctuations themselves are the risk."}, {"text": "Volatility is irrelevant as long as the average return is higher.", "isCorrect": false, "rationale": "The text explicitly links volatility to risk and potential return, making it a highly relevant factor in investment decisions, not irrelevant."}], "id": "q03"}, {"question": "Many people mistakenly equate investment risk with losing all their money. According to the text, what is a more accurate understanding of investment risk?", "options": [{"text": "Investment risk solely refers to the possibility of an investment not meeting its projected return.", "isCorrect": false, "rationale": "While not meeting a projected return is part of risk, the definition provided in the text is broader than just projections."}, {"text": "Investment risk means the certainty that an investment's value will decrease over time.", "isCorrect": false, "rationale": "Risk implies uncertainty, not certainty of loss. The text emphasizes 'variability in outcomes,' which includes gains."}, {"text": "Investment risk refers to the variability in outcomes, meaning the value might go up a lot, a little, stay flat, or go down.", "isCorrect": true, "rationale": "The text clarifies that 'investment risk really means variability in outcomes. Your investment might go up a lot, a little, stay flat, or go down—you cannot know exactly which in advance.'"}, {"text": "Investment risk is only a concern for short-term investors, not those with a long time horizon.", "isCorrect": false, "rationale": "Risk is always present, regardless of the time horizon, although long-term investors may be better able to ride out short-term fluctuations."}], "id": "q04"}, {"question": "The \"Stock Market Ups and Downs\" real-world example describes market crashes in 2008-2009 and early 2020, followed by significant recoveries. What key investment principle does this illustrate for a long-term investor?", "options": [{"text": "Selling investments during market downturns is the best way to avoid further losses.", "isCorrect": false, "rationale": "The text states, 'those who panicked and sold during downturns often locked in losses and missed the recovery,' indicating this is an incorrect strategy."}, {"text": "Market timing, or knowing when to buy and sell, is crucial for maximizing returns.", "isCorrect": false, "rationale": "The section explicitly states, 'Time in the market matters more than timing the market,' refuting the idea that market timing is crucial."}, {"text": "Patient, long-term investors who stay invested through downturns are often rewarded as markets recover and reach new highs.", "isCorrect": true, "rationale": "The examples show that investors who 'stayed in the market and did not sell saw the market recover and eventually reach new highs,' concluding that 'patient long-term investors have consistently been rewarded.'"}, {"text": "Diversifying across different asset types is more important than the length of time an investor stays in the market.", "isCorrect": false, "rationale": "While diversification is generally good, the specific examples and conclusion in the text focus on the importance of 'time in the market' and patience during downturns."}], "id": "q05"}, {"question": "The section provides \"Historical Returns by Asset Type\" as approximate long-term averages. What crucial warning does the moneytip box provide about these figures?", "options": [{"text": "These figures are guaranteed minimum returns for any investment in that asset class.", "isCorrect": false, "rationale": "The moneytip explicitly states, 'These return figures are long-term averages, not guarantees.'"}, {"text": "They show the exact returns an investor can expect in any given year.", "isCorrect": false, "rationale": "The moneytip clarifies, 'In any given year, stocks might earn 25%—or lose 40%,' indicating significant yearly variation, not exact expectations."}, {"text": "These are long-term averages and not guarantees; actual returns can vary significantly year-to-year, and averages only show up with a long investment horizon.", "isCorrect": true, "rationale": "The moneytip combines all key warnings: 'These return figures are long-term averages, not guarantees. In any given year, stocks might earn 25%—or lose 40%. The averages only show up if you stay invested for many years.'"}, {"text": "The figures are only relevant for short-term trading strategies.", "isCorrect": false, "rationale": "The moneytip states, 'The averages only show up if you stay invested for many years,' emphasizing their relevance for long-term investing, not short-term."}], "id": "q06"}, {"question": "An investment experienced the following annual returns over four years: Year 1: +18%, Year 2: -7%, Year 3: +14%, Year 4: +5%. Using the simple average method described in the text, what is the average annual return for this investment?", "options": [{"text": "7.5%", "isCorrect": true, "rationale": "To calculate the simple average annual return, add all the yearly returns (18 + (-7) + 14 + 5 = 30) and divide by the number of years (30 / 4 = 7.5%)."}, {"text": "8.0%", "isCorrect": false, "rationale": "This result is incorrect. The sum of returns is 30, and divided by 4 years, the average is 7.5%."}, {"text": "9.5%", "isCorrect": false, "rationale": "This result is incorrect. The sum of returns is 30, and divided by 4 years, the average is 7.5%."}, {"text": "10.0%", "isCorrect": false, "rationale": "This result is incorrect. The sum of returns is 30, and divided by 4 years, the average is 7.5%."}], "id": "q07"}, {"question": "An investor is comparing two investments. Investment X has an estimated annual return of 8%, while Investment Y has an estimated annual return of 4%. Using the Rule of 72, which of the following statements is true about how quickly these investments would double?", "options": [{"text": "Investment X will double in 9 years, and Investment Y will double in 18 years.", "isCorrect": true, "rationale": "Using the Rule of 72: For Investment X, 72 / 8% = 9 years. For Investment Y, 72 / 4% = 18 years. This statement accurately reflects those calculations."}, {"text": "Investment X will double in 18 years, and Investment Y will double in 9 years.", "isCorrect": false, "rationale": "This statement swaps the doubling times for the two investments. Higher returns lead to faster doubling times."}, {"text": "Both investments will take approximately the same amount of time to double, as the Rule of 72 applies to all returns equally.", "isCorrect": false, "rationale": "The Rule of 72 clearly shows that higher return rates lead to significantly faster doubling times, demonstrating that time is not equal for different rates."}, {"text": "The Rule of 72 is not applicable for comparing investments with different return rates.", "isCorrect": false, "rationale": "The Rule of 72 is precisely a tool used to quickly compare the compounding power of different return rates over time."}], "id": "q08"}, {"question": "The opening paragraph states that 'Every investment involves a trade-off.' What does this trade-off primarily entail according to the text?", "options": [{"text": "Trading the risk of losing money for the certainty of small gains.", "isCorrect": false, "rationale": "The text mentions 'possibility of earning more,' not certainty of small gains, and emphasizes the variability of outcomes rather than just avoiding losses for small gains."}, {"text": "Giving up the security of knowing exact future value for the possibility of earning more.", "isCorrect": true, "rationale": "The text states, 'You give up the security of knowing exactly what your money will be worth in exchange for the possibility of earning more,' which directly describes this trade-off."}, {"text": "Exchanging short-term profits for long-term stability.", "isCorrect": false, "rationale": "While time horizon is discussed, the fundamental trade-off is broader than just short-term vs. long-term and focuses on certainty vs. potential gain."}, {"text": "Deciding between investing in stocks or bonds.", "isCorrect": false, "rationale": "This is a specific investment decision, not the overarching fundamental trade-off that applies to all investments, as described in the introduction."}], "id": "q09"}, {"question": "The section mentions visualizing risk and return and states, 'moving up the return axis always means moving right on the risk axis.' What does this graphical relationship fundamentally illustrate?", "options": [{"text": "That higher returns are always found with lower risk.", "isCorrect": false, "rationale": "Moving 'right on the risk axis' means increasing risk, directly contradicting the idea of lower risk with higher returns."}, {"text": "That risk levels decrease as investment returns increase.", "isCorrect": false, "rationale": "This statement describes an inverse relationship, but the text describes a direct relationship where risk increases with return."}, {"text": "That there is a direct and positive correlation: as potential return increases, so does the associated risk.", "isCorrect": true, "rationale": "Moving 'up the return axis' (higher return) corresponds to moving 'right on the risk axis' (higher risk), indicating a direct positive correlation as stated in the 'Visualizing Risk and Return' section."}, {"text": "That risk and return are inversely proportional, meaning one goes up as the other goes down.", "isCorrect": false, "rationale": "An inverse relationship means one value decreases as the other increases. The description ('up the return axis always means moving right on the risk axis') indicates a direct, not inverse, relationship."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
