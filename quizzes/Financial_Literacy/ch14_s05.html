    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 14, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Under federal law, how many free credit reports per year is each American entitled to from each major bureau?", "options": [{"text": "One", "isCorrect": true, "rationale": "The Fair Credit Reporting Act entitles every American to one free credit report per year from each of the three major bureaus, accessed at AnnualCreditReport.com."}, {"text": "Two", "isCorrect": false, "rationale": "The federal entitlement is one free report per bureau per year, not two."}, {"text": "Three", "isCorrect": false, "rationale": "Three reports are available total (one per bureau), not three from each bureau."}, {"text": "Unlimited", "isCorrect": false, "rationale": "The federal mandate is one free report per bureau per year; additional reports may require a fee."}], "id": "q01"}, {"question": "What is the only government-mandated website for accessing your free annual credit reports?", "options": [{"text": "AnnualCreditReport.com", "isCorrect": true, "rationale": "AnnualCreditReport.com is the single federally mandated website where consumers can access free annual credit reports from all three major bureaus."}, {"text": "FreeCreditReport.com", "isCorrect": false, "rationale": "This is a commercial site, not the government-mandated resource. It may charge fees or require subscriptions."}, {"text": "CreditKarma.com", "isCorrect": false, "rationale": "Credit Karma is a free monitoring service but is not the government-mandated annual report website."}, {"text": "IRS.gov", "isCorrect": false, "rationale": "IRS.gov handles tax matters, not credit reports."}], "id": "q02"}, {"question": "A financial advisor suggests staggering your three free credit report pulls. What is the benefit of this strategy?", "options": [{"text": "You can monitor your credit more frequently throughout the year without paying extra", "isCorrect": true, "rationale": "By pulling one bureau's report every four months, you get three checks spread across the year — all free — rather than all three at once with nine months unmonitored."}, {"text": "You receive a higher credit score from each bureau", "isCorrect": false, "rationale": "Staggering pulls does not change your score. It only improves the frequency of your monitoring."}, {"text": "You can dispute more errors at one time", "isCorrect": false, "rationale": "The number of disputes is not related to when you pull your reports."}, {"text": "It prevents hard inquiries from being recorded", "isCorrect": false, "rationale": "Accessing your own credit report is a soft inquiry regardless of timing and never affects your score."}], "id": "q03"}, {"question": "Which of the following is a red flag that should prompt you to investigate a potential error or fraud on your credit report?", "options": [{"text": "An account you did not open", "isCorrect": true, "rationale": "An account you do not recognize could indicate identity theft or fraud, and you have the right to dispute it."}, {"text": "A card account listed as 'open' that you use regularly", "isCorrect": false, "rationale": "An open account you recognize and use is expected and not a red flag."}, {"text": "Your correct legal name and address", "isCorrect": false, "rationale": "Accurate personal information is exactly what you want to see — not a concern."}, {"text": "An on-time payment recorded as on-time", "isCorrect": false, "rationale": "Correct payment history is a positive finding, not a red flag."}], "id": "q04"}, {"question": "How long do most negative items typically remain on a credit report before they must be removed?", "options": [{"text": "Seven years", "isCorrect": true, "rationale": "Under the Fair Credit Reporting Act, most negative items (late payments, collections, charge-offs) must be removed after seven years. Bankruptcies remain for ten years."}, {"text": "Three years", "isCorrect": false, "rationale": "Three years is too short. Most negative items stay on for seven years under federal law."}, {"text": "Ten years", "isCorrect": false, "rationale": "Ten years applies specifically to bankruptcies, not most other negative items."}, {"text": "Indefinitely", "isCorrect": false, "rationale": "Federal law limits how long negative information can remain. Most items must be removed after seven years."}], "id": "q05"}, {"question": "When a potential employer runs a background check that includes your credit, what type of inquiry is recorded?", "options": [{"text": "A soft inquiry that does not affect your score", "isCorrect": true, "rationale": "Employer background checks, checking your own score, and pre-approved credit offers are all soft inquiries — they never impact your credit score."}, {"text": "A hard inquiry that lowers your score slightly", "isCorrect": false, "rationale": "Hard inquiries result from credit applications, not employer checks."}, {"text": "No inquiry is recorded at all", "isCorrect": false, "rationale": "The check is recorded, but as a soft inquiry — meaning no score impact."}, {"text": "A hard inquiry that remains for five years", "isCorrect": false, "rationale": "Employer checks are soft inquiries; even hard inquiries typically remain for two years."}], "id": "q06"}, {"question": "Which of the following actions generates a $hard inquiry$ that slightly reduces your credit score?", "options": [{"text": "Applying for a car loan", "isCorrect": true, "rationale": "Applying for a car loan triggers a hard inquiry because the lender is evaluating your creditworthiness for new credit. Hard inquiries slightly lower your score."}, {"text": "Checking your own credit score through your bank app", "isCorrect": false, "rationale": "Checking your own score is a soft inquiry and never affects your score."}, {"text": "Receiving a pre-approved credit card offer in the mail", "isCorrect": false, "rationale": "Pre-screened offers are based on soft inquiries. Only applying for the card triggers a hard inquiry."}, {"text": "A creditor reviewing your account for a credit limit increase", "isCorrect": false, "rationale": "Routine account reviews by existing creditors are typically soft inquiries."}], "id": "q07"}, {"question": "What is a key difference between a $FICO$ score and other credit scoring models you may see on free monitoring sites?", "options": [{"text": "Results can vary slightly between models, so a non-FICO score may not match what a lender sees", "isCorrect": true, "rationale": "Many free monitoring services use non-FICO models. Lenders often use FICO scores specifically, so your monitored score may differ from the score a lender pulls."}, {"text": "FICO scores are illegal to display for free and can only be purchased", "isCorrect": false, "rationale": "FICO scores can be provided for free by many banks and card issuers. They are not legally restricted."}, {"text": "Non-FICO scores are always higher than your real score", "isCorrect": false, "rationale": "Non-FICO scores can be higher or lower — there is no consistent direction of difference."}, {"text": "FICO scores are only calculated once per year", "isCorrect": false, "rationale": "FICO scores update as new information is reported by creditors, typically monthly."}], "id": "q08"}, {"question": "Which of the following is a warning sign of a fraudulent credit monitoring or repair website?", "options": [{"text": "Requiring a credit card to access your 'free' report", "isCorrect": true, "rationale": "Legitimate free credit reports (AnnualCreditReport.com) never require a credit card. A payment request for a 'free' report is a scam red flag."}, {"text": "Showing your credit score alongside targeted card offers", "isCorrect": false, "rationale": "This is actually how many legitimate free monitoring services operate — they offset costs by showing relevant offers."}, {"text": "Providing one report per bureau per year", "isCorrect": false, "rationale": "One report per bureau per year is exactly what the legitimate, government-mandated site provides."}, {"text": "Recommending on-time payments to improve your score", "isCorrect": false, "rationale": "Recommending on-time payments is legitimate advice, not a scam warning sign."}], "id": "q09"}, {"question": "No credit repair company can legally do which of the following?", "options": [{"text": "Remove accurate negative information from your credit report", "isCorrect": true, "rationale": "It is illegal for any company to promise or attempt to remove accurate, verified negative information. Only time, on-time payments, and lower balances genuinely repair credit."}, {"text": "Dispute errors in your credit report on your behalf", "isCorrect": false, "rationale": "Legitimate credit repair companies can legally help dispute errors — the illegal act is claiming to remove accurate information."}, {"text": "Provide you with your credit score", "isCorrect": false, "rationale": "Providing credit scores is a legal service offered by many companies."}, {"text": "Recommend strategies for improving your credit", "isCorrect": false, "rationale": "Offering credit improvement advice is legal and commonly done by legitimate financial counselors."}], "id": "q10"}, {"question": "According to the recommended annual monitoring routine, how often should you check your credit score through your bank or card app?", "options": [{"text": "Monthly", "isCorrect": true, "rationale": "The recommended routine calls for monthly score checks through bank or card apps (soft inquiries), supplementing the quarterly free bureau report pulls."}, {"text": "Once a year", "isCorrect": false, "rationale": "Annual checks are not frequent enough to catch problems quickly. Monthly monitoring through apps is recommended."}, {"text": "Only when applying for a loan", "isCorrect": false, "rationale": "Waiting until a loan application means you might discover problems at the worst time. Regular monitoring lets you address issues proactively."}, {"text": "Every four months", "isCorrect": false, "rationale": "Every four months is the recommended frequency for pulling full bureau reports, not for score checks via apps."}], "id": "q11"}, {"question": "A young adult turns 18 and discovers they have no credit history. What does this most accurately indicate?", "options": [{"text": "This is completely normal — the best time to start building credit is before you need it", "isCorrect": true, "rationale": "Having no credit history at 18 is normal. Starting to build credit early means you will have a solid foundation by the time you need an apartment, car loan, or mortgage."}, {"text": "They have negative marks on their file that need to be disputed", "isCorrect": false, "rationale": "No credit history and negative credit history are different. No history simply means no accounts have been reported — it is a clean slate."}, {"text": "They cannot access a credit report at all until they have accounts", "isCorrect": false, "rationale": "You can request a credit report at any time; it may simply show no accounts, which is different from being unable to access one."}, {"text": "They should immediately apply for several credit cards to build history quickly", "isCorrect": false, "rationale": "Applying for several cards at once generates multiple hard inquiries and could actually hurt the thin file they are starting with."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
