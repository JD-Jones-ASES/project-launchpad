<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 9, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, for an expense to legitimately qualify for emergency fund use, which three criteria must it meet?", "options": [{"text": "It must be unforeseen, urgent, and inconvenient.", "isCorrect": false, "rationale": "While 'unforeseen' is similar to 'unexpected' and 'urgent' relates to 'necessary', the text specifies 'unexpected,' 'necessary,' and 'significant,' not 'inconvenient' or 'urgent' in isolation."}, {"text": "It must be unexpected, necessary, and significant.", "isCorrect": true, "rationale": "The text explicitly states that an emergency fund should be used when an expense meets all three of these criteria: 'Unexpected,' 'Necessary,' and 'Significant'."}, {"text": "It must be unplanned, expensive, and a top priority.", "isCorrect": false, "rationale": "'Unplanned' is close to 'unexpected,' and 'expensive' relates to 'significant,' but 'top priority' is too vague and not one of the explicit criteria of 'unexpected, necessary, and significant'."}, {"text": "It must be sudden, critical, and unbudgeted.", "isCorrect": false, "rationale": "'Sudden' aligns with 'unexpected,' and 'critical' with 'necessary,' but 'unbudgeted' is not precise enough; 'significant' implies it cannot be covered by the regular budget, but 'unbudgeted' could also apply to items that should be in a sinking fund."}], "id": "q01"}, {"question": "Which of the following situations would be a legitimate use of an emergency fund, according to the section?", "options": [{"text": "Purchasing a new, upgraded smartphone because your current one has a cracked screen but still functions.", "isCorrect": false, "rationale": "The text explicitly states that 'upgrading electronics or appliances that still function adequately' is NOT a legitimate use of an emergency fund, as the phone still works."}, {"text": "A sudden, unexpected car repair that is necessary for commuting to work and cannot be absorbed by your regular monthly budget.", "isCorrect": true, "rationale": "The text lists 'A car repair that is necessary for you to commute to work, where the cost is too large for your regular budget to absorb' as a legitimate use. This meets all three criteria: unexpected, necessary (for work), and significant (too large for budget)."}, {"text": "Taking advantage of a limited-time 40% off sale on a high-end appliance you've wanted.", "isCorrect": false, "rationale": "The text clearly states that 'A sale, deal, or limited-time offer you do not want to miss' is NOT an emergency, as it is a desire, not an unexpected, necessary expense causing harm."}, {"text": "Paying for a vacation your friends planned that you forgot to save for.", "isCorrect": false, "rationale": "The text lists 'A vacation or trip you want to take' and 'Holiday or birthday gifts you did not save for (sinking fund issue, not an emergency)' as situations where the emergency fund should NOT be used. Vacations are planned expenses, not emergencies."}], "id": "q02"}, {"question": "Maria had $3,000 in her emergency fund when her refrigerator unexpectedly stopped working, making it impossible to store food safely. A new refrigerator costs $750, which she cannot cover from her regular monthly budget. Which of the emergency fund criteria applies to this situation, making it a legitimate use?", "options": [{"text": "Only 'Unexpected' and 'Significant' apply, as the harm is not immediate.", "isCorrect": false, "rationale": "The breakdown of a refrigerator making food storage impossible is 'necessary' to prevent food spoilage and ensure access to safe food, causing 'real harm' to health or safety if not addressed. All three criteria apply."}, {"text": "Only 'Necessary' applies, as it is a home repair but could have been anticipated.", "isCorrect": false, "rationale": "The text explicitly mentions 'A critical home repair that cannot wait (burst pipe, roof leak, failed heating system in winter)' as a legitimate use. A sudden refrigerator failure is unexpected, necessary (for food safety), and significant (cost not covered by budget)."}, {"text": "All three criteria: 'Unexpected,' 'Necessary,' and 'Significant' apply.", "isCorrect": true, "rationale": "The refrigerator 'unexpectedly' stopped working. It is 'necessary' to store food safely (preventing harm). The cost is 'significant' as she 'cannot cover from her regular monthly budget.' Therefore, all three criteria are met."}, {"text": "None of the criteria apply; she should have a sinking fund for appliance replacement.", "isCorrect": false, "rationale": "While sinking funds are good for predictable replacements, a sudden, unexpected breakdown of a critical appliance like a refrigerator is explicitly covered by the 'unexpected' and 'necessary' criteria, especially if it cannot be covered by a regular budget, making it significant."}], "id": "q03"}, {"question": "The warning in the text, 'I'll pay it back next month' is how emergency funds disappear,' highlights what critical aspect of emergency fund management?", "options": [{"text": "That emergency funds should never be used, even for emergencies.", "isCorrect": false, "rationale": "The text states that using the emergency fund means 'the fund worked exactly as intended' for true emergencies, refuting the idea that it should never be used."}, {"text": "The importance of discipline and a specific replenishment plan after any use, especially for non-emergencies.", "isCorrect": true, "rationale": "The warning emphasizes that vague repayment promises ('I'll pay it back next month') for non-emergency uses usually fail because there's 'no specific plan.' It underscores the discipline needed to reserve the fund for true emergencies and replenish it deliberately."}, {"text": "That all non-emergency uses are acceptable as long as the money is repaid within the same month.", "isCorrect": false, "rationale": "The text explicitly states 'Reserve the emergency fund strictly for true emergencies' and that non-emergency uses, even with vague repayment promises, lead to the fund disappearing, implying they are not acceptable."}, {"text": "The difficulty of tracking funds that are 'out of sight, out of mind' once spent.", "isCorrect": false, "rationale": "While the text mentions 'Once the money is gone from an account that is out of sight, it tends to stay gone,' the core message of the warning is about the *discipline* of specific repayment for any use, particularly if it was a non-emergency."}], "id": "q04"}, {"question": "What is the primary reason the text emphasizes replenishing an emergency fund 'immediately' after use?", "options": [{"text": "To prevent the user from feeling guilty about using the fund.", "isCorrect": false, "rationale": "While psychological factors might play a role, the text's primary emphasis is on financial readiness, not emotional state. It explicitly states 'Using the emergency fund does not mean you have failed—it means the fund worked exactly as intended.'"}, {"text": "To ensure the fund is ready for the next unforeseen event, as its purpose is ongoing protection.", "isCorrect": true, "rationale": "The text implies the ongoing nature of emergencies. Replenishing ensures the fund can fulfill its purpose for future unexpected events, stating 'The next step is to rebuild it as quickly as possible' and advising to treat it 'like a bill—a non-negotiable monthly payment back to your emergency fund until it is restored.'"}, {"text": "To avoid losing out on potential interest earnings from a full fund balance.", "isCorrect": false, "rationale": "The text does not mention interest earnings as a primary reason for replenishment. The focus is on protection and financial readiness."}, {"text": "Because delaying replenishment makes it less likely to ever happen.", "isCorrect": false, "rationale": "While the text warns 'I will save when I can' almost never works, the *primary* reason for immediate replenishment is proactive readiness for future emergencies, with the 'how' being a specific plan, not just avoiding procrastination."}], "id": "q05"}, {"question": "Maria used $750 from her $3,000 emergency fund for a car repair. Which of the following best describes the most effective method for Maria to replenish her fund, according to the text?", "options": [{"text": "She should wait until she receives a bonus or tax refund to deposit a lump sum back into the fund.", "isCorrect": false, "rationale": "The text advises against waiting for future windfalls, stating '“I will save when I can” almost never works.' It recommends a specific, regular plan."}, {"text": "She should redirect $250 per month from discretionary categories like dining out and entertainment until the fund is restored, treating it like a non-negotiable bill.", "isCorrect": true, "rationale": "This aligns perfectly with the text's guidance: 'Set a replenishment plan. Treat the replenishment like a bill—a non-negotiable monthly payment back to your emergency fund until it is restored' and 'Adjust temporarily. While rebuilding, temporarily redirect money from discretionary categories (dining out, entertainment, clothing) until the fund is whole again.' The example provided directly illustrates this."}, {"text": "She should prioritize paying off any credit card debt before replenishing her emergency fund.", "isCorrect": false, "rationale": "The text implies rebuilding the emergency fund is a priority after use, even before other financial goals, and states to only use a credit card as a last resort *with* a payoff plan if the emergency exceeds the fund. It does not suggest delaying replenishment for pre-existing credit card debt."}, {"text": "She should only replenish the fund if another emergency seems imminent.", "isCorrect": false, "rationale": "The text emphasizes immediate replenishment regardless of perceived imminence, as emergencies are 'unexpected.' The purpose is ongoing readiness, not reactive refilling."}], "id": "q06"}, {"question": "A person's washing machine breaks down suddenly, rendering it unusable. They have enough cash in their regular checking account to buy a new one, but it would deplete their grocery budget for the month. Based on the text, should they use their emergency fund?", "options": [{"text": "No, because a washing machine is a predictable household item that should be covered by a sinking fund.", "isCorrect": false, "rationale": "While a sinking fund for appliances is good, a *sudden* breakdown qualifies as 'unexpected.' If it cannot be covered by the regular monthly budget without causing harm (like depleting the grocery budget), it meets the 'necessary' (for cleanliness, hygiene) and 'significant' criteria, making it a legitimate use."}, {"text": "Yes, because the expense is unexpected, necessary (for hygiene), and significant (depleting the grocery budget would cause real harm).", "isCorrect": true, "rationale": "The expense is 'unexpected,' 'necessary' (failing to address it would cause harm to health/hygiene), and 'significant' because it 'cannot be covered from your regular monthly budget by reducing other categories' (as it depletes the grocery budget, which is a necessary category). Therefore, it meets all three criteria for emergency fund use."}, {"text": "No, they should try to fix it themselves first to save money.", "isCorrect": false, "rationale": "While attempting DIY repair might be a good first step, the question is about *funding* the repair or replacement if needed. This option doesn't address the emergency fund criteria."}, {"text": "Yes, but only if they have already exhausted all other budget categories first.", "isCorrect": false, "rationale": "The text states 'Significant. The cost is large enough that it cannot be covered from your regular monthly budget by reducing other categories.' Depleting the grocery budget indicates it cannot be covered without causing harm, fulfilling the significance criterion. No need to exhaust *all* other categories if essential ones are impacted."}], "id": "q07"}, {"question": "What is the recommended sequence of actions if an emergency costs more than your emergency fund contains?", "options": [{"text": "Immediately take out a personal loan, then use your emergency fund, and finally, look for additional budget cuts.", "isCorrect": false, "rationale": "The text specifies using the emergency fund first and that a credit card or personal loan should be a 'last resort' after other options like budget cuts or selling items."}, {"text": "Sell something you don't need, use your emergency fund, then consider a credit card or personal loan with a specific payoff plan.", "isCorrect": false, "rationale": "The text states to 'Use all available emergency fund savings first,' before looking for additional sources like selling items or temporary work."}, {"text": "Use all available emergency fund savings, then look for additional sources (e.g., reduce other budget categories, sell items), and if necessary, use a credit card or personal loan as a last resort with a specific payoff plan.", "isCorrect": true, "rationale": "This precisely matches the sequence outlined in the text: '1. Use all available emergency fund savings first. 2. Look for additional sources... 3. If necessary, use a credit card or a personal loan as a last resort—with a specific payoff plan already in mind.'"}, {"text": "Immediately take on temporary additional work to cover the shortfall, then use your emergency fund.", "isCorrect": false, "rationale": "The text advises using the emergency fund first, and taking on temporary work is listed as an 'additional source' after the fund is depleted, not before."}], "id": "q08"}, {"question": "Priya's real-world example of using her 4-month emergency fund during a layoff best illustrates which strategic benefit of having a well-funded emergency account?", "options": [{"text": "It ensures that she can maintain her previous lifestyle without any adjustments during unemployment.", "isCorrect": false, "rationale": "The text states her fund 'covered four months of essential expenses,' implying she likely adjusted her spending to necessities, not that she maintained her previous lifestyle. The benefit was holding out for the right job, not avoiding all adjustments."}, {"text": "It provides a financial cushion that allows for more thoughtful decision-making, such as holding out for the right job rather than taking the first one out of desperation.", "isCorrect": true, "rationale": "Priya explicitly states, 'Without the emergency fund, I would have had to take the first job I was offered—any job—out of desperation. Having the cushion let me hold out for the right one.' This demonstrates the strategic advantage of time and reduced pressure for better choices."}, {"text": "It automatically qualifies her for unemployment benefits and government assistance.", "isCorrect": false, "rationale": "The text does not mention any automatic qualification for benefits due to having an emergency fund. Its benefit is direct financial support."}, {"text": "It guarantees that she will find a new job at a higher salary within a short period.", "isCorrect": false, "rationale": "While Priya did find a new job at a higher salary, the emergency fund provides a *cushion* and *time*, but does not *guarantee* job market outcomes. Her success was also due to her active job searching and negotiating."}], "id": "q09"}, {"question": "Which of the following scenarios is explicitly identified in the text as NOT an emergency fund use, but rather a situation that should typically be handled by a sinking fund?", "options": [{"text": "An unexpected medical bill not fully covered by insurance.", "isCorrect": false, "rationale": "This is listed as a legitimate use because it is unexpected, necessary, and often significant. It's not typically covered by a sinking fund due to its unpredictable nature."}, {"text": "A critical home repair like a burst pipe.", "isCorrect": false, "rationale": "This is listed as a legitimate use because it is unexpected, necessary (prevents further damage/harm), and often significant. It's a true emergency, not a predictable sinking fund item."}, {"text": "Normal car maintenance, such as an oil change or new tires.", "isCorrect": true, "rationale": "The text explicitly states: 'Normal car maintenance (oil change, tires) that is predictable and should be in a sinking fund' is NOT an emergency fund use. These are predictable expenses that can be planned for."}, {"text": "Losing your job and needing to cover essential living expenses.", "isCorrect": false, "rationale": "This is listed as a legitimate use of an emergency fund. Job loss is unexpected, necessitates covering living costs, and is significant, making it a true emergency."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
