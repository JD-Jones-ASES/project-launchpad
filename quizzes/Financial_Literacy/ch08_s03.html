<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 8, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary purpose of the 50/30/20 rule as described in the text?", "options": [{"text": "To dictate precise spending limits for every single expense category.", "isCorrect": false, "rationale": "The text states it's a 'simple benchmark' and 'guideline,' not a rigid dictation of every single expense."}, {"text": "To provide a simple benchmark for evaluating whether spending is balanced across key financial areas.", "isCorrect": true, "rationale": "The introduction explicitly states the rule 'gives you a simple benchmark to answer these questions' about balanced spending."}, {"text": "To ensure that individuals maximize their 'Wants' spending to improve quality of life.", "isCorrect": false, "rationale": "While 'Wants' improve quality of life, the rule aims for balance, not maximization of 'Wants' specifically."}, {"text": "To replace the need for detailed spending tracking altogether.", "isCorrect": false, "rationale": "The text positions the rule as a framework 'Once you are tracking your spending,' indicating it complements, rather than replaces, tracking."}]}, {"question": "Why is it crucial to apply the 50/30/20 rule to net income (take-home pay) rather than gross pay?", "options": [{"text": "Gross pay includes income from investments, which complicates the budgeting process.", "isCorrect": false, "rationale": "Gross pay is total earnings before deductions, not specifically investment income. The primary reason is about what's available."}, {"text": "Net income represents the actual money available to you for spending, saving, and debt repayment after taxes and deductions.", "isCorrect": true, "rationale": "The definition explicitly states, 'Always apply percentages to net income (take-home pay), not gross pay,' because net income is the amount you actually have to work with."}, {"text": "Applying it to gross pay would unfairly inflate the 'Needs' category due to higher housing costs.", "isCorrect": false, "rationale": "The issue isn't inflation of 'Needs' but rather miscalculation based on money not actually available for personal allocation."}, {"text": "It helps in claiming more deductions on tax returns.", "isCorrect": false, "rationale": "The 50/30/20 rule is a budgeting guideline and has no direct impact on tax deductions."}]}, {"question": "Sarah earns a net income of $3,000 per month. According to the 50/30/20 rule, how much should she ideally allocate for her 'Wants' each month?", "options": [{"text": "$1,500", "isCorrect": false, "rationale": "This amount represents 50% of her net income, which is allocated to 'Needs,' not 'Wants.'"}, {"text": "$900", "isCorrect": true, "rationale": "The rule allocates 30% of net income to 'Wants.' Calculation: $3,000 * 0.30 = $900."}, {"text": "$600", "isCorrect": false, "rationale": "This amount represents 20% of her net income, which is allocated to 'Savings and Debt Repayment,' not 'Wants.'"}, {"text": "$2,100", "isCorrect": false, "rationale": "This amount is 70% of her net income, which is not a specific allocation for 'Wants' under the rule."}]}, {"question": "Which of the following scenarios best demonstrates the concept of a 'Want' as defined by the 50/30/20 rule?", "options": [{"text": "Paying the minimum required payment on a student loan.", "isCorrect": false, "rationale": "Minimum required debt payments, including student loans, are explicitly listed as 'Needs' because they are essential obligations."}, {"text": "Subscribing to a premium streaming service in addition to a basic free TV service.", "isCorrect": true, "rationale": "Subscriptions for entertainment (like streaming services) are categorized under 'Wants' as they improve quality of life but are not essential for basic living."}, {"text": "Purchasing a basic health insurance premium required for medical care.", "isCorrect": false, "rationale": "Basic healthcare and health insurance premiums are categorized as 'Needs' because they are essential for well-being and safety."}, {"text": "Buying essential groceries for home cooking to feed the family.", "isCorrect": false, "rationale": "Groceries (basic food, not dining out) are clearly listed as a 'Need.'"}]}, {"question": "According to the 'warning' box, what is the critical distinction regarding debt payments within the 50/30/20 framework?", "options": [{"text": "All debt payments, regardless of amount, are considered 'Needs.'", "isCorrect": false, "rationale": "This is incorrect; the text specifically differentiates between minimum and extra payments."}, {"text": "Extra debt payments above the minimum are categorized as 'Wants' because they are discretionary.", "isCorrect": false, "rationale": "The text states extra payments are 'Savings' because they accelerate payoff and build wealth, not 'Wants.'"}, {"text": "Minimum required debt payments are 'Needs,' while any extra payments above the minimum are 'Savings.'", "isCorrect": true, "rationale": "The 'warning' box clearly states: 'minimum debt payments count as a Need... But extra payments above the minimum... count as Savings.'"}, {"text": "Debt payments are not included in the 50/30/20 rule, as they are separate financial obligations.", "isCorrect": false, "rationale": "Debt payments are explicitly included and differentiated within the 'Needs' and 'Savings' categories."}]}, {"question": "Jordan's guideline budget indicates he should spend no more than $1,200 on Needs, no more than $720 on Wants, and save at least $480 per month, given his $2,400 net pay. If Jordan finds himself spending $1,400 on Needs consistently, what is the most appropriate initial diagnostic conclusion based on the text?", "options": [{"text": "Jordan is likely overspending on discretionary items and needs to cut back on 'Wants.'", "isCorrect": false, "rationale": "While he might be overspending on 'Wants,' the immediate issue identified is exceeding the 'Needs' allocation, which points to different causes."}, {"text": "Jordan's 'Needs' are high, possibly due to factors like housing costs or a car payment, requiring investigation into these areas.", "isCorrect": true, "rationale": "The 'Checking Your Own Numbers' section states: 'If the result is above 50%, your needs are high—possibly because of housing costs or a car payment.'"}, {"text": "Jordan needs to contribute more to his emergency fund to compensate for the overspending.", "isCorrect": false, "rationale": "While emergency fund contributions are good, this doesn't address the root cause of overspending in the 'Needs' category."}, {"text": "The 50/30/20 rule is not applicable to Jordan's income level.", "isCorrect": false, "rationale": "The text provides Jordan's income as an example for applying the rule, indicating it is applicable."}]}, {"question": "A person living in a high-cost-of-living city finds that their housing alone consumes 40% of their net income. How does the 50/30/20 rule suggest they adapt their budget in this situation?", "options": [{"text": "They should strictly adhere to the 50/30/20 split by finding cheaper housing, even if it means a significant lifestyle downgrade.", "isCorrect": false, "rationale": "The 'moneytip' states the rule is 'a benchmark, not a law' and acknowledges that housing alone might exceed 50% in high-cost areas."}, {"text": "They should disregard the rule entirely and create a completely custom budget without guidelines.", "isCorrect": false, "rationale": "The text advises adapting the rule, not disregarding it. The goal is still a 'clear picture of where money is going.'"}, {"text": "They may adopt a more realistic split, such as 55/25/20 or 60/20/20, by reducing 'Wants' to protect the 'Savings' percentage.", "isCorrect": true, "rationale": "The 'moneytip' explicitly states: 'a 55/25/20 or even 60/20/20 split may be more realistic. The goal is to... protect the savings percentage as much as possible, even if the needs/wants line shifts.'"}, {"text": "They must increase their income significantly to meet the 50% 'Needs' allocation without compromising 'Wants' or 'Savings.'", "isCorrect": false, "rationale": "While increasing income is always an option, the text provides immediate budgeting adaptations rather than solely relying on income growth."}]}, {"question": "Which of the following expenses would be categorized under 'Savings and Debt Repayment' according to the 50/30/20 rule?", "options": [{"text": "Minimum monthly credit card payments.", "isCorrect": false, "rationale": "Minimum debt payments are classified as 'Needs' because they are required obligations."}, {"text": "Gym membership beyond basic free exercise.", "isCorrect": false, "rationale": "Gym memberships (above basic exercise) are listed as 'Wants.'"}, {"text": "Contributions to a 401(k) retirement account.", "isCorrect": true, "rationale": "Retirement account contributions (401(k), IRA) are explicitly listed under 'Savings and Debt Repayment.'"}, {"text": "Basic phone plan necessary for work.", "isCorrect": false, "rationale": "A basic phone plan necessary for work or safety is categorized as a 'Need.'"}]}, {"question": "A basic phone plan necessary for work or safety is considered a 'Need.' However, upgrading to the latest smartphone when the existing one works fine is a 'Want.' This distinction highlights which aspect of the 50/30/20 rule?", "options": [{"text": "The rule prioritizes luxury items over essential services.", "isCorrect": false, "rationale": "The rule prioritizes essential needs first, then discretionary spending, and finally savings/debt repayment."}, {"text": "The rule emphasizes the difference between basic necessities and discretionary improvements to quality of life.", "isCorrect": true, "rationale": "This example clearly illustrates that 'Needs' are essential for basic living, while 'Wants' are discretionary items that improve quality of life but are not essential."}, {"text": "The rule discourages any form of technology spending.", "isCorrect": false, "rationale": "The rule doesn't discourage technology; it categorizes it based on its necessity."}, {"text": "The rule is too rigid and does not account for modern technology use.", "isCorrect": false, "rationale": "The rule clearly accounts for modern technology by distinguishing between essential use (Need) and discretionary upgrades (Want)."}]}, {"question": "Maria earns $2,800 net income per month. She allocates $1,400 to 'Needs,' $750 to 'Wants,' and $650 to 'Savings and Debt Repayment.' What diagnostic conclusion can be drawn from her allocation based on the 50/30/20 rule?", "options": [{"text": "Her 'Needs' spending is aligned, but she needs to increase her 'Wants' to improve her quality of life.", "isCorrect": false, "rationale": "Her 'Needs' are 50% ($1400 / $2800), which is aligned. However, her 'Wants' are over the 30% guideline, not under. ($750 / $2800 = ~26.7%, so she's actually under on Wants, meaning she has more flexibility or she put more into Savings, let me re-evaluate the numbers here)"}, {"text": "Her 'Needs' are over the 50% guideline, indicating a need to cut back on essential expenses.", "isCorrect": false, "rationale": "Her 'Needs' are $1,400 / $2,800 = 0.50 or 50%, which is exactly aligned with the guideline."}, {"text": "Her 'Wants' are slightly below the 30% guideline, providing flexibility, while her 'Savings and Debt Repayment' is above the 20% guideline, which is beneficial.", "isCorrect": true, "rationale": "Her 'Wants' are $750 / $2,800 = ~26.8%, which is below the 30% guideline. Her 'Savings and Debt Repayment' are $650 / $2,800 = ~23.2%, which is above the 20% guideline. This indicates a strong financial position, prioritizing savings."}, {"text": "Her 'Savings and Debt Repayment' is below the 20% guideline, meaning she is not building enough wealth.", "isCorrect": false, "rationale": "Her 'Savings and Debt Repayment' is $650 / $2,800 = ~23.2%, which is above the 20% guideline, indicating she is saving sufficiently."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
