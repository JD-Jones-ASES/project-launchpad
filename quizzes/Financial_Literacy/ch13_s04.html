<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>

    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 13, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary 'catch-22' described when trying to build credit from scratch?", "options": [{"text": "You need a high income to get credit, but you need credit to prove income.", "isCorrect": false, "rationale": "The text does not identify income as the core catch-22; it focuses on the relationship between credit history and credit access."}, {"text": "Lenders require a history of borrowing money to grant credit, but you need credit to establish that history.", "isCorrect": true, "rationale": "The text explicitly states: 'you need credit history to get credit—but you need credit to build credit history.' This is the fundamental dilemma presented."}, {"text": "Credit cards offer rewards, but you can only get them with good credit.", "isCorrect": false, "rationale": "While true to some extent, this is a minor detail about credit benefits, not the fundamental obstacle to starting credit from zero."}, {"text": "It's difficult to avoid debt without credit, but credit often leads to debt.", "isCorrect": false, "rationale": "This describes a general challenge with credit, but not the specific 'catch-22' of needing history to get credit and needing credit to build history."}], "id": "q01"}, {"question": "Sarah wants to build credit but has no history. Her uncle has an excellent credit score and a credit card he's had for 15 years with perfect payments and low utilization. Which strategy would be most beneficial for Sarah's credit profile in the short term, assuming her uncle agrees?", "options": [{"text": "Applying for a student credit card, as her uncle's history isn't directly relevant.", "isCorrect": false, "rationale": "Her uncle's history *is* directly relevant if she becomes an authorized user. A student card would start her history from scratch, which is slower than inheriting a long, positive history."}, {"text": "Opening a secured credit card to establish her own independent payment history.", "isCorrect": false, "rationale": "While a secured card is a good option, becoming an authorized user on a 15-year-old, excellent account offers an immediate and significant boost to her credit age and history, which is typically faster and more impactful in the short term."}, {"text": "Becoming an authorized user on her uncle's credit card account.", "isCorrect": true, "rationale": "The text states that an authorized user's credit report 'may' show the account's history, including its age and payment record. This means Sarah could immediately benefit from her uncle's 15 years of excellent credit history."}, {"text": "Taking out a credit-builder loan to demonstrate consistent payments over time.", "isCorrect": false, "rationale": "A credit-builder loan is effective for building history, but it starts from zero. Being an authorized user on an established, excellent account offers a more immediate benefit due to the inherited credit age and positive payment history."}], "id": "q02"}, {"question": "Which statement accurately describes a secured credit card?", "options": [{"text": "It's a loan where the funds are held in savings until payments are complete.", "isCorrect": false, "rationale": "This describes a credit-builder loan, not a secured credit card."}, {"text": "It allows access to a credit line backed by a cash deposit, which typically becomes the credit limit.", "isCorrect": true, "rationale": "The definition states: 'A secured credit card requires a cash deposit upfront, which becomes your credit limit.' This directly matches the description."}, {"text": "It's a credit card specifically for students with little or no credit history, often with lower limits.", "isCorrect": false, "rationale": "This describes a student credit card, not a secured credit card."}, {"text": "It's a card linked to another person's account, allowing them to benefit from their credit history.", "isCorrect": false, "rationale": "This describes the authorized user strategy, not a secured credit card."}], "id": "q03"}, {"question": "Mark needs to build credit but does not have a trusted family member with good credit who can add him as an authorized user. He also wants a card he can actively use for small purchases. Which strategy would be the most suitable starting point for Mark?", "options": [{"text": "A credit-builder loan.", "isCorrect": false, "rationale": "While effective for building credit history, a credit-builder loan does not provide a physical card for active purchases, which Mark specified as a desire."}, {"text": "A store credit card.", "isCorrect": false, "rationale": "The text warns that store credit cards typically have very high APRs and can tempt overspending, making them a riskier 'starting point' compared to a secured card, even though they can build credit if managed perfectly."}, {"text": "A secured credit card.", "isCorrect": true, "rationale": "A secured credit card allows Mark to establish his own payment history, provides a physical card for purchases, and is explicitly called 'one of the best tools for building credit from scratch' in the text, making it ideal for his situation."}, {"text": "Relying on utility bill payments to be reported to credit bureaus.", "isCorrect": false, "rationale": "The text does not list utility bill payments as one of the four main strategies for building credit from zero, and their impact is generally less direct or consistent than dedicated credit products."}], "id": "q04"}, {"question": "How does a credit-builder loan typically work?", "options": [{"text": "You receive the loan funds upfront and make payments, with the interest rate being very low.", "isCorrect": false, "rationale": "The text states that with a credit-builder loan, 'Instead of receiving the money immediately, it is held in a savings account.'"}, {"text": "You apply for a loan, and the money is held in a savings account until you've paid off the loan installments.", "isCorrect": true, "rationale": "This is a direct description from the text: 'Instead of receiving the money immediately, it is held in a savings account while you make monthly payments. When you have paid off the loan, you receive the full amount (minus any fees).'"}, {"text": "It's a loan that doesn't require any payments, only a deposit that is returned after a year.", "isCorrect": false, "rationale": "Credit-builder loans require monthly payments, and the deposit concept is associated with secured credit cards."}, {"text": "It provides a line of credit that you can draw from, with payments reported to bureaus.", "isCorrect": false, "rationale": "A credit-builder loan is typically an installment loan where the funds are held, not a revolving line of credit that you draw from."}], "id": "q05"}, {"question": "According to the text, what percentage of your credit score is attributed to your payment history?", "options": [{"text": "10%", "isCorrect": false, "rationale": "The text specifies a higher percentage for payment history."}, {"text": "25%", "isCorrect": false, "rationale": "The text specifies a higher percentage for payment history."}, {"text": "35%", "isCorrect": true, "rationale": "The text explicitly states: 'Payment history is 35% of your score.'"}, {"text": "50%", "isCorrect": false, "rationale": "The text specifies a lower percentage for payment history."}], "id": "q06"}, {"question": "Jamie has a new credit card with a $500 limit. To keep her credit utilization low and positively impact her score, what would be an ideal maximum balance she should aim to keep on the card?", "options": [{"text": "$400", "isCorrect": false, "rationale": "A $400 balance on a $500 limit is 80% utilization, which is significantly higher than the recommended 'less than 30%' and 'ideally less than 10%.'"}, {"text": "$250", "isCorrect": false, "rationale": "A $250 balance on a $500 limit is 50% utilization, still well above the recommended maximum of 30%."}, {"text": "$150", "isCorrect": false, "rationale": "A $150 balance on a $500 limit is 30% utilization. The text advises to 'Use less than 30%...ideally less than 10%.' While 30% is the maximum suggested, it's not the ideal maximum."}, {"text": "$50", "isCorrect": true, "rationale": "A $50 balance on a $500 limit is 10% utilization. The text advises to 'Keep your utilization low. Use less than 30% of your available credit—ideally less than 10%.' $50 falls within the ideal range."}], "id": "q07"}, {"question": "Why does the text advise against closing old credit accounts, even if you no longer use them?", "options": [{"text": "It makes lenders suspicious of your financial stability.", "isCorrect": false, "rationale": "While frequent account closures might raise flags, the text specifies a different primary reason related to credit score calculation."}, {"text": "It increases your credit utilization ratio by reducing your total available credit.", "isCorrect": true, "rationale": "The text states: 'Closing accounts reduces your available credit and may shorten your credit history.' Reduced available credit directly leads to a higher utilization ratio if your balances remain the same or increase."}, {"text": "It directly reports as a negative mark on your credit report.", "isCorrect": false, "rationale": "Closing an account itself isn't a negative mark, but its *consequences* (like reduced credit age or higher utilization) can negatively impact your score."}, {"text": "You might miss out on potential rewards or benefits from those accounts.", "isCorrect": false, "rationale": "This is a potential practical drawback, but not the credit-building reason cited in the text for keeping old accounts open."}], "id": "q08"}, {"question": "Maria is setting up her new credit card. Based on the 'moneytip' advice, what is the best strategy for her to manage payments?", "options": [{"text": "Set up autopay for the full balance to ensure timely payments and avoid interest.", "isCorrect": false, "rationale": "The 'moneytip' advises setting up autopay for the *minimum* payment as a safety net, and then separately paying the full balance. Setting autopay for the full balance can be risky if funds aren't available."}, {"text": "Manually pay the full balance each month, avoiding autopay altogether.", "isCorrect": false, "rationale": "The 'moneytip' specifically recommends using autopay for the minimum payment as a 'safety net' against missed due dates, in addition to manually paying the full balance."}, {"text": "Set up autopay for the minimum payment and then separately make an additional payment to cover the full balance.", "isCorrect": true, "rationale": "The 'moneytip' states: 'Set up autopay for at least the minimum payment on every credit account... Then separately pay off your full balance each month before interest accrues.' This combines the safety net with the goal of avoiding interest."}, {"text": "Only pay the minimum amount each month to keep money available for other expenses.", "isCorrect": false, "rationale": "Paying only the minimum leads to interest accrual and higher balances, which is detrimental to credit building and financial health. The 'moneytip' stresses that 'full payment is your goal.'"}], "id": "q09"}, {"question": "The text warns about store credit cards due to their typically high APRs. Under what specific condition does the text suggest they *can* be useful for building credit?", "options": [{"text": "If you only use them for large, infrequent purchases.", "isCorrect": false, "rationale": "Using them for large purchases with high APRs is risky if you carry a balance, which the text advises against."}, {"text": "If you consistently pay the full balance each month and never carry a balance.", "isCorrect": true, "rationale": "The 'warning' states: 'They can be useful for building credit, but only if you pay the full balance each month and never carry a balance.' This directly addresses the condition."}, {"text": "If they offer significant discounts on store purchases.", "isCorrect": false, "rationale": "While discounts are a benefit, they don't mitigate the risk of high APRs if a balance is carried, which is the primary concern raised by the text."}, {"text": "If you open several of them to diversify your credit mix.", "isCorrect": false, "rationale": "The text advises against opening 'too many accounts at once,' as multiple inquiries signal desperation. Diversifying solely with high-APR store cards is not recommended."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
