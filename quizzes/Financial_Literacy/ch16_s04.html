<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 16, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is a defining characteristic of a typical \"Buy Now, Pay Later\" (BNPL) service for the buyer on standard short-term plans?", "options": [{"text": "It always involves a mandatory hard credit check impacting the user's credit score immediately.", "isCorrect": false, "rationale": "The text states that BNPL approval is usually with a minimal or no credit check, not always a mandatory hard credit check."}, {"text": "Purchases are split into equal installments, often with no stated interest charged to the buyer.", "isCorrect": true, "rationale": "The definition of BNPL states it 'allows shoppers to split a purchase into smaller installments—typically 4 equal payments over 6 weeks—often with no stated interest charged to the buyer.'"}, {"text": "The buyer pays all interest accrued from day one if any payment is missed, even on short-term plans.", "isCorrect": false, "rationale": "This describes 'deferred interest,' which is a risk on *longer-term* promotional plans, not typically for standard short-term plans where no interest is stated initially."}, {"text": "Merchants using BNPL services pay a higher price for the goods they sell.", "isCorrect": false, "rationale": "Merchants pay a fee (2-6% of the purchase price) to the BNPL service, but they do not pay a higher price for the goods themselves."}]}, {"question": "On a standard short-term \"Buy Now, Pay Later\" plan where no interest is stated for the buyer, how do BNPL companies primarily generate revenue?", "options": [{"text": "By charging a high upfront activation fee to the buyer.", "isCorrect": false, "rationale": "The text does not mention upfront activation fees as a primary revenue source for BNPL companies."}, {"text": "By earning a percentage-based fee from the merchant for each transaction.", "isCorrect": true, "rationale": "The text explicitly states under 'How BNPL Companies Make Money' that 'Merchant fees: The retailer pays 2–6% of each sale' is a way they make money."}, {"text": "By requiring buyers to purchase a subscription service.", "isCorrect": false, "rationale": "The text does not mention subscription services as a revenue source for BNPL companies."}, {"text": "By investing the buyer's payment installments in the stock market.", "isCorrect": false, "rationale": "The text does not mention investment of buyer's installments as a revenue source for BNPL companies."}]}, {"question": "Sarah uses a BNPL service for a $400 purchase, split into 4 payments of $100 every two weeks. She successfully makes her first two payments but misses her third and fourth payments. If each missed payment incurs a $25 late fee, what is the actual total cost of her purchase?", "options": [{"text": "$400", "isCorrect": false, "rationale": "This amount only reflects the original purchase price and does not account for the late fees incurred."}, {"text": "$425", "isCorrect": false, "rationale": "This amount only accounts for one late fee ($400 + $25), but Sarah missed two payments."}, {"text": "$450", "isCorrect": true, "rationale": "The actual cost is the original purchase price plus the total late fees: $400 (purchase) + $25 (late fee 3) + $25 (late fee 4) = $450."}, {"text": "$475", "isCorrect": false, "rationale": "This amount overestimates the total cost, suggesting a higher late fee or more missed payments than specified."}]}, {"question": "The text warns about 'Interest on longer-term plans' with promotional 0% interest. What is the specific risk associated with these plans if the payoff date is missed?", "options": [{"text": "The BNPL service immediately cancels the purchase and seizes the item.", "isCorrect": false, "rationale": "The text does not mention immediate seizure of items; the risk is financial."}, {"text": "A flat penalty fee is charged, but no interest is applied.", "isCorrect": false, "rationale": "While late fees may apply, the specific risk for longer-term plans is the application of deferred interest, not just a flat penalty."}, {"text": "All interest from the day of purchase may be retroactively applied and charged to the buyer.", "isCorrect": true, "rationale": "The text states: 'Miss the payoff date, and deferred interest (all the interest from day one) may be charged.'"}, {"text": "The promotional period is simply extended without additional cost to the buyer.", "isCorrect": false, "rationale": "The opposite is true; missing the payoff date leads to interest charges, not an extension of the promotional period."}]}, {"question": "Which of the following scenarios describes how using a BNPL service could negatively impact a consumer's credit score?", "options": [{"text": "Making all BNPL payments on time consistently and opening multiple plans.", "isCorrect": false, "rationale": "Making on-time payments would typically not damage a credit score. While juggling multiple plans is risky for other reasons (complexity, fees), simply opening them doesn't inherently damage credit score without missed payments."}, {"text": "The BNPL company performing a 'soft' credit check during approval.", "isCorrect": false, "rationale": "Soft credit checks, often used for BNPL approvals, generally do not affect a consumer's credit score."}, {"text": "The BNPL service selling unpaid debt to collection agencies after missed payments.", "isCorrect": true, "rationale": "The text explicitly states: 'Some BNPL services sell your debt to collection agencies if you do not pay, damaging your credit score.'"}, {"text": "The merchant charging the BNPL service a fee for the transaction.", "isCorrect": false, "rationale": "Merchant fees are a cost to the retailer and a revenue source for BNPL companies; they do not directly impact the consumer's credit score."}]}, {"question": "According to financial researchers cited in the text, what is the primary psychological danger of using BNPL services?", "options": [{"text": "It creates anxiety about debt repayment due to frequent installments.", "isCorrect": false, "rationale": "The text suggests the opposite psychological effect; purchases feel cheaper, reducing mental barriers to buying, rather than increasing anxiety about frequent installments."}, {"text": "It makes expensive purchases feel cheaper, potentially leading to overspending on items one cannot truly afford.", "isCorrect": true, "rationale": "The text states: 'When you split $500 into four $125 payments, the brain experiences the purchase as “$125,” not “$500.” This lowers the mental barrier to making the purchase—and can lead to buying things you otherwise would not have afforded or needed.'"}, {"text": "It encourages savings by spreading out costs over time.", "isCorrect": false, "rationale": "The text indicates BNPL users often spend more overall, contradicting the idea that it encourages savings."}, {"text": "It reduces consumer choice by limiting eligible retailers.", "isCorrect": false, "rationale": "The text does not mention BNPL reducing consumer choice in terms of eligible retailers."}]}, {"question": "The text warns that 'Juggling multiple BNPL plans is risky.' What is the main reason for this specific risk?", "options": [{"text": "Each new BNPL plan typically requires a hard credit inquiry, rapidly lowering your score.", "isCorrect": false, "rationale": "The text explicitly states BNPL approvals 'usually with a minimal or no credit check,' so hard inquiries are not the main reason for this specific risk."}, {"text": "It becomes difficult to track separate payment schedules, increasing the likelihood of missed payments and fees.", "isCorrect": true, "rationale": "The text explains: 'Tracking four different BNPL payment schedules on top of rent, utilities, and other bills is more complexity than most budgets can handle cleanly. Miss any one, and you face fees and potential credit damage.'"}, {"text": "Retailers charge higher merchant fees for purchases made with multiple BNPL services.", "isCorrect": false, "rationale": "Merchant fees are paid by the retailer to the BNPL service and are not directly tied to whether a consumer has multiple active BNPL plans."}, {"text": "Most BNPL apps are inherently fraudulent and cannot be trusted with multiple active plans.", "isCorrect": false, "rationale": "The text warns about *some* fraudulent apps but does not imply that most or all are, nor is the risk of fraud tied specifically to having multiple plans."}]}, {"question": "To minimize the risk of fraudulent BNPL apps, what specific advice does the text offer to consumers?", "options": [{"text": "Always use a credit card instead of a debit card for BNPL payments.", "isCorrect": false, "rationale": "While a good general financial practice, this specific advice is not mentioned in the 'scamalert' section for preventing BNPL fraud."}, {"text": "Ensure the BNPL app has a privacy policy before entering personal information.", "isCorrect": false, "rationale": "While important, this is not the specific and primary advice given in the text's 'scamalert' section for avoiding fraudulent apps."}, {"text": "Only use BNPL services offered through major retailers and established providers, avoiding unsolicited links.", "isCorrect": true, "rationale": "The 'scamalert' advises: 'Only use BNPL through major retailers and well-known, established services. Never enter payment details into an app you discovered through an unsolicited link, text message, or social media ad.'"}, {"text": "Limit yourself to only one active BNPL plan at a time.", "isCorrect": false, "rationale": "Limiting plans is advice for managing payment complexity, not directly for preventing fraud from illegitimate apps."}]}, {"question": "According to the 'moneytip' section, what is the *only safe way* to use a BNPL service?", "options": [{"text": "Use it only for small, inexpensive purchases to minimize potential fees.", "isCorrect": false, "rationale": "While a reasonable strategy, the text specifies a different 'only safe way' that focuses on immediate cash availability."}, {"text": "Treat it as a tool to acquire items you otherwise cannot afford immediately.", "isCorrect": false, "rationale": "The text explicitly states: 'The danger comes from using BNPL to buy things you cannot actually afford,' making this an unsafe use."}, {"text": "Only use it if you already possess the full purchase price in cash in your account and set payment reminders.", "isCorrect": true, "rationale": "The 'moneytip' states: 'Only use it if you already have the full purchase price in cash in your account. Set a reminder for each payment date. BNPL is then simply a cash-flow tool.'"}, {"text": "Rely on the BNPL service's automatic payment features to avoid missing due dates.", "isCorrect": false, "rationale": "While automatic payments can help avoid missed payments, the 'only safe way' primarily emphasizes having the cash available first, rather than solely relying on automation."}]}, {"question": "Considering all the information presented, which statement best summarizes a significant *cumulative* risk or effect of BNPL for consumers who do not use it judiciously?", "options": [{"text": "It consistently offers lower prices on goods compared to traditional payment methods.", "isCorrect": false, "rationale": "BNPL does not offer lower prices on goods; its cost can increase significantly due to fees and interest if payments are missed."}, {"text": "It can lead to increased overall spending and accumulated debt due to perceived affordability and potential fees.", "isCorrect": true, "rationale": "The text discusses the psychological effect making purchases feel cheaper (leading to overspending), the imposition of late fees, deferred interest, and potential credit damage, all contributing to higher actual costs and debt accumulation for imprudent users."}, {"text": "Its primary impact is limited to minor late fees that have little financial consequence.", "isCorrect": false, "rationale": "The text highlights that late fees can be substantial ($10-$30+), and other consequences like deferred interest and credit score damage are also significant, not minor."}, {"text": "It makes budgeting simpler by breaking down large expenses into manageable chunks.", "isCorrect": false, "rationale": "The text warns that 'juggling multiple BNPL plans is risky' due to added complexity, which contradicts the idea of simpler budgeting."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
