        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the defining characteristic of a pre-tax deduction?", "options": [{"text": "It is a required deduction mandated by federal law.", "isCorrect": false, "rationale": "Pre-tax deductions are voluntary, not legally required, and are distinct from mandatory deductions like FICA or federal income tax."}, {"text": "It is taken from gross pay before income taxes are calculated, reducing taxable income.", "isCorrect": true, "rationale": "The text explicitly defines a pre-tax deduction as 'a voluntary deduction taken from your gross pay before federal income tax (and usually state income tax) is calculated,' thereby reducing taxable income."}, {"text": "It is a voluntary deduction taken after all taxes have been calculated.", "isCorrect": false, "rationale": "If a deduction is taken after taxes, it is a post-tax deduction and does not provide the same income tax reduction benefits."}, {"text": "It is a deduction that employers are legally obligated to contribute to.", "isCorrect": false, "rationale": "While employers often contribute to plans that have pre-tax deductions (like health insurance or 401(k)), the deduction itself refers to the employee's voluntary share, and its pre-tax nature concerns its timing relative to income tax calculation."}]}, {"question": "Sarah contributes $150 per month to her traditional 401(k) pre-tax. If she is in the 15% federal income tax bracket, what is her actual out-of-pocket cost for this contribution?", "options": [{"text": "$150.00", "isCorrect": false, "rationale": "This option ignores the tax savings benefit of pre-tax deductions. The actual cost is less than the full contribution amount."}, {"text": "$135.00", "isCorrect": false, "rationale": "This calculation would imply a 10% tax saving. The correct calculation requires applying the 15% tax bracket to the $150 deduction."}, {"text": "$127.50", "isCorrect": true, "rationale": "A pre-tax deduction reduces taxable income. For a $150 deduction in a 15% bracket, the tax savings are $150 × 0.15 = $22.50. Therefore, the actual out-of-pocket cost is $150 - $22.50 = $127.50."}, {"text": "$112.50", "isCorrect": false, "rationale": "This calculation would imply a 25% tax saving ($150 × 0.25 = $37.50; $150 - $37.50 = $112.50), which is not the stated tax bracket."}]}, {"question": "Which of the following is typically NOT considered a voluntary pre-tax deduction for a W-2 employee, based on the provided text?", "options": [{"text": "Health Insurance Premiums", "isCorrect": false, "rationale": "The text explicitly states that 'your share of the monthly premium is usually deducted pre-tax.'"}, {"text": "Contributions to a traditional 401(k) retirement account", "isCorrect": false, "rationale": "The text confirms, 'If you contribute to a traditional 401(k) retirement account, those contributions are taken pre-tax.'"}, {"text": "Social Security contributions (FICA)", "isCorrect": true, "rationale": "Social Security contributions (part of FICA) are listed as 'major required deductions' in the text, separate from the 'voluntary deductions' discussed as pre-tax benefits. They are not voluntary and do not reduce taxable income for federal/state income tax in the same way."}, {"text": "Contributions to a Health Savings Account (HSA)", "isCorrect": false, "rationale": "The text states, 'An HSA allows you to set aside pre-tax money for qualified medical expenses.'"}]}, {"question": "A key difference highlighted between a Health Savings Account (HSA) and a Flexible Spending Account (FSA) is related to:", "options": [{"text": "The type of medical expenses they can cover.", "isCorrect": false, "rationale": "Both generally cover qualified medical expenses, though FSAs can also cover dependent care. The primary distinction mentioned in the text is about unused funds."}, {"text": "The requirement of being enrolled in a high-deductible health plan.", "isCorrect": false, "rationale": "This is a requirement for an HSA, but it is not the 'key difference' highlighted in the text *between* an HSA and an FSA."}, {"text": "Whether unused balances typically roll over from year to year.", "isCorrect": true, "rationale": "The text explicitly states, 'Unlike an HSA, FSA balances typically do not roll over year to year,' making this the key distinguishing feature presented."}, {"text": "The total amount an employee can contribute annually.", "isCorrect": false, "rationale": "Contribution limits apply to both but are not discussed as the primary distinguishing factor in this section of the text."}]}, {"question": "Which statement best summarizes the primary financial advantage of pre-tax deductions for a W-2 employee?", "options": [{"text": "They provide a direct cash bonus from the employer.", "isCorrect": false, "rationale": "Pre-tax deductions are not cash bonuses; they are reductions in an employee's taxable income."}, {"text": "They allow employees to completely avoid paying taxes on the deducted amounts.", "isCorrect": false, "rationale": "While they reduce *income* tax, some taxes (like FICA) may still apply to the gross amount. The primary benefit is reduced taxable income for income tax purposes, leading to savings, not outright avoidance of all taxes."}, {"text": "They reduce an employee's taxable income, resulting in lower federal and often state income tax payments.", "isCorrect": true, "rationale": "The text explains that pre-tax deductions reduce taxable income, leading to paying less in income tax, effectively giving a 'discount' on the cost of the benefit."}, {"text": "They guarantee a higher net pay than if the deductions were taken post-tax.", "isCorrect": false, "rationale": "While pre-tax deductions lead to *more* net pay than the *equivalent* post-tax deduction (due to tax savings), they still reduce net pay compared to having no deduction at all. The guarantee is lower taxes, not necessarily higher net pay overall compared to no deduction."}]}, {"question": "A new employee, trying to set up their monthly budget, mistakenly allocates their entire gross pay for expenses, only accounting for required taxes like FICA. What crucial financial oversight are they making regarding pre-tax deductions?", "options": [{"text": "They are overestimating their net pay because pre-tax deductions, though financially smart, still reduce take-home pay.", "isCorrect": true, "rationale": "The 'warning' section states, 'Voluntary does not mean free. Pre-tax deductions reduce your take-home pay just like any other deduction.' Failing to account for them means overestimating the actual money available for budgeting."}, {"text": "They are underestimating their net pay because pre-tax deductions increase take-home pay.", "isCorrect": false, "rationale": "Pre-tax deductions *decrease* take-home pay, although the net reduction is less than the deduction amount due to tax savings."}, {"text": "They are ignoring the employer's responsibility to cover all pre-tax benefits.", "isCorrect": false, "rationale": "While employers may contribute to benefits, the pre-tax deduction refers to the employee's share that reduces their gross pay."}, {"text": "They are incorrectly calculating their federal income tax liability by not considering the impact of pre-tax deductions.", "isCorrect": false, "rationale": "While it's true their tax liability calculation would be off, the *crucial oversight* for budgeting purposes is that the deductions directly reduce the take-home cash, regardless of the tax impact, leading to an overestimation of funds."}]}, {"question": "In the complete net pay calculation process outlined in the chapter summary, at what stage are pre-tax voluntary deductions subtracted?", "options": [{"text": "After all federal, state, and FICA taxes have been calculated and subtracted.", "isCorrect": false, "rationale": "This describes post-tax deductions. Pre-tax deductions are specifically taken *before* income taxes."}, {"text": "Immediately following the determination of gross pay, and before income taxes.", "isCorrect": true, "rationale": "The Chapter Summary explicitly lists: '1. Start with gross pay... 2. Subtract pre-tax voluntary deductions (reduces taxable income for step 3). 3. Subtract federal income tax...'"}, {"text": "Simultaneously with Social Security and Medicare deductions.", "isCorrect": false, "rationale": "FICA (Social Security and Medicare) is typically calculated on gross pay and is a separate, later step in the deduction process than pre-tax voluntary deductions."}, {"text": "As the very last step before arriving at net pay, after all other deductions.", "isCorrect": false, "rationale": "The very last step would typically be any post-tax deductions or simply the final calculation of net pay. Pre-tax deductions occur much earlier in the sequence."}]}, {"question": "Consider Alex's net pay calculation. If his $75.00 pre-tax health insurance deduction were removed, why would his net pay increase by LESS than $75.00?", "options": [{"text": "Because the employer would then charge an administrative fee for not taking the deduction.", "isCorrect": false, "rationale": "The text does not mention such administrative fees. The reason is related to tax implications."}, {"text": "Because his gross pay would also decrease, offsetting the deduction removal.", "isCorrect": false, "rationale": "Gross pay remains constant unless the hourly rate or hours worked change; removing a deduction does not change gross pay."}, {"text": "Because removing the pre-tax deduction would increase his taxable income, leading to higher federal and state income taxes.", "isCorrect": true, "rationale": "The checkpoint hint explains this directly: 'The health insurance deduction is pre-tax — it reduces federal and state taxable income.' Removing it means more income is subject to these taxes, thus increasing them and offsetting some of the $75.00 potential gain."}, {"text": "Because Social Security and Medicare deductions would automatically increase to compensate.", "isCorrect": false, "rationale": "Social Security and Medicare are generally calculated on gross pay and would not automatically increase due to the removal of a pre-tax health insurance deduction."}]}, {"question": "An employee has a gross pay of $1,500.00. They have a pre-tax 401(k) contribution of $100.00. Federal income tax is 10% of taxable income, and FICA (Social Security 6.2% + Medicare 1.45%) is calculated on gross pay. Calculate their net pay.", "options": [{"text": "$1,206.25", "isCorrect": false, "rationale": "This calculation is incorrect. It would result from calculating federal tax on gross pay and then subtracting all deductions ($1500 - $100 - ($1500 * 0.10) - ($1500 * 0.0765) = $1500 - $100 - $150 - $114.75 = $1135.25), which is still not $1206.25."}, {"text": "$1,215.25", "isCorrect": false, "rationale": "This option is incorrect. Following the steps, the correct net pay is different."}, {"text": "$1,145.25", "isCorrect": true, "rationale": "1. Calculate taxable income: $1,500 (Gross Pay) - $100 (Pre-tax 401k) = $1,400. 2. Calculate Federal Income Tax: $1,400 (Taxable Income) × 0.10 = $140. 3. Calculate FICA: $1,500 (Gross Pay) × (0.062 + 0.0145) = $1,500 × 0.0765 = $114.75. 4. Total Deductions: $100 (401k) + $140 (Federal Tax) + $114.75 (FICA) = $354.75. 5. Net Pay: $1,500 (Gross Pay) - $354.75 (Total Deductions) = $1,145.25."}, {"text": "$1,300.00", "isCorrect": false, "rationale": "This amount would only be accurate if only the 401(k) deduction were taken, and no federal income tax or FICA deductions were applied, which is incorrect."}]}, {"question": "According to the chapter summary, why is understanding the complete path from gross to net pay, including pre-tax deductions, crucial for financial planning?", "options": [{"text": "It helps employees negotiate for higher gross salaries by demonstrating their tax burden.", "isCorrect": false, "rationale": "While understanding pay can inform salary discussions, the text emphasizes budgeting and making informed decisions about benefits and retirement, not primarily negotiation tactics."}, {"text": "It ensures employees receive all available government tax refunds directly through their paycheck.", "isCorrect": false, "rationale": "Tax refunds are typically processed separately after filing annual tax returns, not directly integrated into net pay calculations in this manner."}, {"text": "It enables employees to avoid budget surprises and make smarter decisions about benefits, retirement, and overall financial management.", "isCorrect": true, "rationale": "The chapter summary explicitly states: 'Understanding this process protects you from budget surprises and helps you make smarter decisions about benefits, retirement contributions, and financial planning.'"}, {"text": "It primarily informs employers about their total payroll liabilities for tax reporting.", "isCorrect": false, "rationale": "While employers also need this understanding for reporting, the text focuses on the employee's perspective and the benefits for their personal financial planning."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
