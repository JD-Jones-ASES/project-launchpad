<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 8, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the most crucial factor for an effective spending tracking method?", "options": [{"text": "Its technological sophistication.", "isCorrect": false, "rationale": "While some methods use technology, the text emphasizes consistency, not sophistication, as the most crucial factor."}, {"text": "The consistency with which it is used.", "isCorrect": true, "rationale": "The text explicitly states, 'There is no single right way to track spending—what matters is consistency.'"}, {"text": "Its ability to categorize every single transaction automatically.", "isCorrect": false, "rationale": "Automatic categorization is a feature of some methods, but the text notes that apps can miss transactions and consistency is paramount."}, {"text": "Its ability to provide real-time alerts for budget limits.", "isCorrect": false, "rationale": "Real-time alerts are a benefit of dedicated budgeting apps, but this is not presented as the most crucial factor for *any* effective method."}], "id": "q01"}, {"question": "Sarah wants a simple, manual way to record every purchase as it happens and then categorize them at the end of the week. Which method would best suit her preference?", "options": [{"text": "The Cash Envelope System.", "isCorrect": false, "rationale": "The Cash Envelope System uses physical cash and envelopes to control spending, not a detailed log of every purchase as it happens."}, {"text": "A generic budgeting app.", "isCorrect": false, "rationale": "Budgeting apps are automated and digital, not a manual 'write down every purchase' system."}, {"text": "The Notebook or Spreadsheet method.", "isCorrect": true, "rationale": "This method is described as 'the simplest tracking method: write down every purchase in a notebook or log it in a spreadsheet... At the end of each day or week, add up each category,' which perfectly matches Sarah's preference."}, {"text": "The Review-and-Record method.", "isCorrect": false, "rationale": "The Review-and-Record method involves reviewing *past* bank statements weekly, not logging each purchase as it occurs."}], "id": "q02"}, {"question": "The core mechanism of the Cash Envelope System for managing variable spending involves:", "options": [{"text": "Transferring funds between digital accounts as spending occurs.", "isCorrect": false, "rationale": "The Cash Envelope System relies on physical cash, not digital transfers."}, {"text": "Using physical cash distributed into labeled envelopes, stopping spending when an envelope is empty.", "isCorrect": true, "rationale": "The text explains, 'withdraw the budgeted amount for each variable category in cash and place it in the labeled envelope. When an envelope is empty, spending in that category is done for the month.'"}, {"text": "Reviewing bank statements weekly to categorize cash withdrawals.", "isCorrect": false, "rationale": "This describes elements of other methods, but not the direct spending control mechanism of the cash envelope system."}, {"text": "Receiving real-time alerts when a pre-set cash budget is nearing its limit.", "isCorrect": false, "rationale": "The Cash Envelope System uses physical limits, not digital alerts."}], "id": "q03"}, {"question": "A user of the Cash Envelope System, like Marcus in the 'Two People, Two Methods' example, is most likely to manage which of the following expenses using a different method (e.g., their bank account)?", "options": [{"text": "Grocery purchases.", "isCorrect": false, "rationale": "Groceries are explicitly mentioned as a common category for which people use the cash envelope system to control overspending."}, {"text": "Dining out expenses.", "isCorrect": false, "rationale": "Dining out is explicitly mentioned as a common category for which people use the cash envelope system."}, {"text": "Monthly rent payments.", "isCorrect": true, "rationale": "The text states, 'Fixed expenses and savings continue to be handled through your bank account,' and rent is typically a fixed expense."}, {"text": "Entertainment spending.", "isCorrect": false, "rationale": "Entertainment is explicitly mentioned as a category Marcus uses the cash envelope system for."}], "id": "q04"}, {"question": "David uses a popular budgeting app connected to his bank accounts. He also frequently uses Venmo to split restaurant bills with friends and occasionally pays for small items with cash. What is a potential inaccuracy in his app's spending total?", "options": [{"text": "The app might over-categorize his restaurant spending.", "isCorrect": false, "rationale": "Miscategorization is possible, but the primary issue highlighted by the warning is missing transactions, not over-categorization of what is seen."}, {"text": "The app will likely include his Venmo transactions but miss his cash payments.", "isCorrect": false, "rationale": "The warning specifically states that Venmo transactions 'may not be captured automatically,' similar to cash payments."}, {"text": "His total spending will be understated because cash and Venmo transactions may not be automatically captured.", "isCorrect": true, "rationale": "The warning explicitly states: 'If you pay cash for some things, split bills unevenly, or have Venmo or cash app transactions, those may not be captured automatically. Your app's total is only as accurate as what it can see.'"}, {"text": "The app will automatically adjust for split bills by recognizing Venmo payments.", "isCorrect": false, "rationale": "The text warns that 'split bills unevenly' and 'Venmo or cash app transactions' may *not* be captured automatically."}], "id": "q05"}, {"question": "What is a key advantage that dedicated budgeting apps (Method 3) offer over basic bank-provided mobile apps for tracking spending?", "options": [{"text": "Automatic categorization of all purchases.", "isCorrect": false, "rationale": "Many banks also provide apps that automatically categorize purchases, so this is not the *key* differentiator highlighted for dedicated budgeting apps."}, {"text": "The ability to set budget limits per category and receive real-time alerts.", "isCorrect": true, "rationale": "The text states that dedicated budgeting apps 'go further, letting you set budget limits per category and showing real-time alerts when you approach them,' which is a distinct advantage over basic bank apps."}, {"text": "Seamless integration with cash payments and Venmo transactions.", "isCorrect": false, "rationale": "The text specifically warns that apps often *do not* seamlessly integrate with cash, Venmo, or split bill transactions."}, {"text": "Detailed weekly reports of past spending.", "isCorrect": false, "rationale": "While budgeting apps may offer reports, bank apps also provide transaction histories; the *key* advantage highlighted is about proactive budgeting and alerts."}], "id": "q06"}, {"question": "Which spending tracking method *primarily* involves reviewing a summary of past transactions at a set interval, rather than logging each purchase as it occurs?", "options": [{"text": "Notebook or Spreadsheet.", "isCorrect": false, "rationale": "This method involves writing down 'every purchase' as it happens, not reviewing past transactions from statements."}, {"text": "Cash Envelope System.", "isCorrect": false, "rationale": "This method manages spending in real-time using physical cash, not by reviewing past summaries."}, {"text": "Banking App or Budgeting App.", "isCorrect": false, "rationale": "These apps automatically track purchases as they occur and can provide real-time alerts, rather than being primarily for reviewing past summaries."}, {"text": "Review-and-Record (Weekly Statement Review).", "isCorrect": true, "rationale": "This method is described as 'reviewing your bank or card statements once a week and manually categorizing the past week's transactions,' which precisely matches the description."}], "id": "q07"}, {"question": "The text states, 'Your best method is the one you will actually use every day.' This statement most strongly implies that:", "options": [{"text": "Complex digital tools are inherently superior for accurate tracking.", "isCorrect": false, "rationale": "The text does not promote complexity; it highlights that even simple methods can be effective if used consistently."}, {"text": "Personal preference and commitment to consistency are more important than the method's specific features.", "isCorrect": true, "rationale": "This statement underscores that the 'best' method is subjective and dependent on the individual's ability to consistently apply it, irrespective of its specific advantages or drawbacks."}, {"text": "All tracking methods offer identical benefits if used correctly.", "isCorrect": false, "rationale": "The text explicitly mentions that each method has 'real advantages and real drawbacks,' meaning their benefits are not identical."}, {"text": "Real-time tracking is always more effective than retrospective review.", "isCorrect": false, "rationale": "The text presents both real-time (apps, envelopes) and retrospective (Review-and-Record) methods as viable, with effectiveness tied to consistent use, not just real-time capabilities."}], "id": "q08"}, {"question": "To prevent spending tracking from breaking down during busy periods, the 'moneytip' suggests:", "options": [{"text": "Switching to a more automated tracking method during stressful times.", "isCorrect": false, "rationale": "The tip does not suggest changing methods; it focuses on maintaining consistency with the chosen method."}, {"text": "Allocating extra funds to variable categories to account for unexpected expenses.", "isCorrect": false, "rationale": "This is a budgeting strategy, not a method for ensuring consistent tracking during busy periods."}, {"text": "Building a specific check-in for tracking into an existing routine.", "isCorrect": true, "rationale": "The moneytip explicitly advises: 'Build a specific check-in into your routine: every Sunday evening, every first of the month, every payday. Link it to something you already do... so it becomes automatic rather than something you have to decide to do.'"}, {"text": "Avoiding cash payments during stressful weeks to ensure all transactions are logged automatically.", "isCorrect": false, "rationale": "While this might help app users, it's not a universal solution for preventing breakdown of any method, as suggested by the moneytip."}], "id": "q09"}, {"question": "The 'Two People, Two Methods' real-world example featuring Marcus and Priya primarily illustrates what key principle about spending tracking?", "options": [{"text": "Automated apps are more efficient than manual systems for all users.", "isCorrect": false, "rationale": "Marcus uses a manual system (cash envelopes) effectively, demonstrating that automated apps are not universally more efficient."}, {"text": "The Cash Envelope System is only suitable for a limited number of categories.", "isCorrect": false, "rationale": "While Marcus uses it for a few categories, the example's primary point is the success of his chosen method, not a limitation of the system itself."}, {"text": "Different effective methods exist, but consistent usage is essential for success with any chosen method.", "isCorrect": true, "rationale": "The example concludes: 'Both methods work. Neither method works if you do not actually use it,' directly illustrating that the choice of method is less important than its consistent application."}, {"text": "It is always necessary to use a combination of methods for comprehensive tracking.", "isCorrect": false, "rationale": "Marcus and Priya each use one primary method successfully, showing that a single consistent method can be effective."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
