    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 1, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best defines 'barter' according to the text?", "options": [{"text": "The exchange of goods or services using precious metals as an intermediary.", "isCorrect": false, "rationale": "The text explicitly defines barter as 'without using money,' and precious metals would function as a form of money or medium of exchange."}, {"text": "The direct exchange of goods or services for other goods or services without using money.", "isCorrect": true, "rationale": "The text defines barter as 'the direct exchange of goods or services for other goods or services without using money.'"}, {"text": "A system where all goods are produced and consumed within a single household.", "isCorrect": false, "rationale": "Barter involves trade between different parties, not just consumption within a household. It specifically addresses getting 'things they could not produce themselves.'"}, {"text": "A modern economic system primarily used for international trade agreements.", "isCorrect": false, "rationale": "The text describes barter as an ancient system that fails when economies grow large and complex, indicating it is not primarily for modern international trade."}], "id": "q01"}, {"question": "The 'double coincidence of wants' problem refers to the challenge where:", "options": [{"text": "Both trading partners must produce goods of equal intrinsic value.", "isCorrect": false, "rationale": "While value is important, the core of the double coincidence of wants is about matching needs and desires, not just equal intrinsic value."}, {"text": "Both trading partners must want exactly what the other has, at exactly the same time.", "isCorrect": true, "rationale": "The text defines the double coincidence of wants as when 'both trading partners must want exactly what the other has, at exactly the same time.'"}, {"text": "One trading partner must have double the amount of goods the other partner wants.", "isCorrect": false, "rationale": "This describes a quantity mismatch, not the fundamental problem of mutual desire that defines the double coincidence of wants."}, {"text": "Traders need to find a third party to mediate the exchange of goods.", "isCorrect": false, "rationale": "The double coincidence of wants refers to the direct matching of desires between two parties, not the involvement of a mediator."}], "id": "q02"}, {"question": "A dairy farmer in ancient Mesopotamia has milk that will spoil soon. He needs a plow blade, but the blacksmith only wants grain, not milk. This situation most directly illustrates which problem of the barter system?", "options": [{"text": "Indivisibility.", "isCorrect": false, "rationale": "Indivisibility deals with splitting goods (like a cow) to make change. Here, the issue is the blacksmith's desire, not splitting the milk."}, {"text": "No common measure of value.", "isCorrect": false, "rationale": "While relevant in general barter, the immediate problem described is the mismatch of wants between the farmer and blacksmith, not agreeing on a price."}, {"text": "Storing wealth is hard.", "isCorrect": false, "rationale": "Although the milk will spoil (related to storing wealth), the primary issue preventing the trade with the blacksmith is that the blacksmith does not want milk, but grain. This is a problem of wants, not just spoilage."}, {"text": "The double coincidence of wants.", "isCorrect": true, "rationale": "The farmer wants a plow, but the blacksmith does not want milk (what the farmer has). This precisely matches the definition of the double coincidence of wants, where both parties do not want what the other has."}], "id": "q03"}, {"question": "Beyond the double coincidence of wants, what is another significant weakness of barter highlighted in the text regarding splitting items?", "options": [{"text": "The problem of scarcity, where desired goods are simply unavailable.", "isCorrect": false, "rationale": "Scarcity is a general economic problem, but the text focuses on specific difficulties within the barter system beyond general availability."}, {"text": "The difficulty in storing wealth, as many goods degrade over time.", "isCorrect": false, "rationale": "This is a weakness of barter, but it relates to storing goods, not the act of splitting them for trade."}, {"text": "Indivisibility, making it hard to 'make change' for goods like a cow.", "isCorrect": true, "rationale": "The text states, 'What if a cow is worth ten chickens, but you only need five chickens' worth of goods? You cannot give half a cow. There is no easy way to make change in a pure barter economy,' which describes indivisibility."}, {"text": "The challenge of finding new trading partners in a large market.", "isCorrect": false, "rationale": "This relates more to the logistical challenges of the double coincidence of wants as an economy grows, rather than the specific problem of splitting goods."}], "id": "q04"}, {"question": "According to the 'Did You Know' section, approximately how many separate exchange rates would a market with 100 different goods require in a pure barter economy?", "options": [{"text": "100", "isCorrect": false, "rationale": "100 would imply one exchange rate for each good, which is incorrect in a barter system where rates are between pairs of goods."}, {"text": "495", "isCorrect": false, "rationale": "This number is significantly lower than the estimate provided in the text."}, {"text": "4,950", "isCorrect": true, "rationale": "The text explicitly states: 'Historians estimate that a market with just 100 goods would require 4,950 separate exchange rates (one for every possible pair).'"}, {"text": "10,000", "isCorrect": false, "rationale": "This number is higher than the estimate provided and does not reflect the combinatorial calculation for unique pairs."}], "id": "q05"}, {"question": "Which characteristic best describes the type of communities where barter 'functioned reasonably well'?", "options": [{"text": "Large, diverse cities with specialized labor and global trade networks.", "isCorrect": false, "rationale": "The text states barter 'breaks down fast' as you add more people and products, making it unsuitable for large, diverse cities."}, {"text": "Communities with a centralized government regulating all trade.", "isCorrect": false, "rationale": "The text does not mention centralized government regulation as a factor for barter's success; rather, it highlights community size and product diversity."}, {"text": "Small, close-knit communities where everyone knew each other and produced only a few different goods.", "isCorrect": true, "rationale": "The text states: 'In small, close-knit communities where everyone knew each other and produced only a few different goods, it functioned reasonably well.'"}, {"text": "Societies where individuals hoarded goods to create artificial scarcity.", "isCorrect": false, "rationale": "This is not mentioned as a characteristic of successful barter communities; hoarding would likely hinder efficient trade."}], "id": "q06"}, {"question": "Why did the 'storing wealth' problem pose a significant challenge in a pure barter economy?", "options": [{"text": "People could easily hide their valuable goods from others.", "isCorrect": false, "rationale": "The text focuses on the nature of the goods themselves, not concealment."}, {"text": "Most forms of wealth, like bushels of grain or live animals, degrade or perish over time.", "isCorrect": true, "rationale": "The text states: 'If your wealth is stored as bushels of grain, perishable food, or live animals, it degrades over time. You cannot easily 'save up' for the future.'"}, {"text": "It required physical effort to move and store large quantities of goods.", "isCorrect": false, "rationale": "While true, the text's primary point about storing wealth is its perishability or degradation, not just physical effort."}, {"text": "The value of goods changed too rapidly to store them effectively.", "isCorrect": false, "rationale": "While the 'no common measure of value' complicates understanding value, the 'storing wealth' problem specifically refers to the physical degradation of assets."}], "id": "q07"}, {"question": "The 'moneytip' section suggests that understanding why barter fails helps understand why money is powerful. What is the primary benefit of money over barter in a large, complex economy?", "options": [{"text": "Money promotes more localized trade within small communities.", "isCorrect": false, "rationale": "The text states barter works in small communities, while money is necessary for larger economies, implying the opposite."}, {"text": "Money eliminates the need for any form of direct human interaction in trade.", "isCorrect": false, "rationale": "While money simplifies transactions, it doesn't eliminate human interaction; it changes the nature of it."}, {"text": "Money simplifies transactions by serving as a common medium of exchange and measure of value, collapsing numerous exchange rates into prices.", "isCorrect": true, "rationale": "The text highlights money as a 'common medium of exchange' that 'collapses all those exchange rates into one number: the price,' directly addressing the problems of double coincidence and no common measure of value."}, {"text": "Money ensures that all goods are produced domestically, reducing reliance on imports.", "isCorrect": false, "rationale": "The text does not connect money to domestic production or import reliance."}], "id": "q08"}, {"question": "Which of the following scenarios is an example of modern-day barter as described in the text?", "options": [{"text": "A person selling their old furniture online for cash.", "isCorrect": false, "rationale": "Selling for cash involves money, not a direct exchange of goods or services without money."}, {"text": "A graphic designer creating a logo for a plumber in exchange for plumbing services.", "isCorrect": true, "rationale": "The text specifically mentions this exact scenario: 'a graphic designer might trade a logo for a plumber's services' as an example of how barter 'has not disappeared' and is used informally."}, {"text": "Using a debit card to pay for groceries at a supermarket.", "isCorrect": false, "rationale": "Debit cards are a form of money payment, not a direct exchange of goods or services."}, {"text": "A large corporation exchanging shares of stock for another company's assets.", "isCorrect": false, "rationale": "While an exchange, this is a complex financial transaction involving sophisticated instruments, not simple direct exchange of goods/services without money as described in the context of basic barter."}], "id": "q09"}, {"question": "Considering all the problems of barter discussed, why did money become essential for any civilization that grew large enough?", "options": [{"text": "To create social hierarchies and distribute power more effectively.", "isCorrect": false, "rationale": "The text focuses on economic efficiency and trade problems, not social hierarchy or power distribution as the primary reason for money's invention."}, {"text": "Because barter systems were deemed morally inferior by religious leaders.", "isCorrect": false, "rationale": "The text provides economic, logistical, and practical reasons for barter's failure, not moral or religious ones."}, {"text": "To overcome the inefficiencies of matching wants, valuing goods, and storing wealth that hindered large-scale trade.", "isCorrect": true, "rationale": "Money was invented because 'barter alone simply cannot keep up' with a large, complex economy, solving the 'double coincidence of wants,' 'no common measure of value,' and 'storing wealth' problems that become unmanageable at scale."}, {"text": "To fund military expansion and conquest of neighboring territories.", "isCorrect": false, "rationale": "The text focuses on the internal economic function of money within a society, not its role in military endeavors."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
