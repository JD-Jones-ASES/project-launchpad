<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 27, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the fundamental starting point for any successful business venture?", "options": [{"text": "Having a perfectly original and revolutionary business idea.", "isCorrect": false, "rationale": "The text states, 'Entrepreneurship is not about having a perfect idea' and 'You do not need a revolutionary idea.' The focus is on addressing existing needs rather than pure originality."}, {"text": "Identifying an unmet need in the community and finding a way to address it.", "isCorrect": true, "rationale": "The text explicitly states, 'Every successful business begins with an unmet need' and defines an entrepreneur as 'someone who creates a business by identifying an unmet need and building a way to meet it.'"}, {"text": "Securing a large amount of startup capital to minimize financial risk.", "isCorrect": false, "rationale": "While financial risk is involved, the text emphasizes 'calculated risk tolerance' and starting with 'little or no startup capital,' suggesting that securing large capital is not the fundamental starting point."}, {"text": "Developing a passion project based purely on personal interests and desires.", "isCorrect": false, "rationale": "The text advises, 'The key question is not “What do I want to do?” but “What do people in my community need—and am I able to provide it?”' emphasizing external needs over internal desires."}], "id": "q01"}, {"question": "A student notices that many busy parents in their neighborhood often struggle to pick up dry cleaning before shops close. Which action best reflects an entrepreneurial mindset based on this observation?", "options": [{"text": "Waiting for a new dry-cleaning service to open with extended hours.", "isCorrect": false, "rationale": "This approach is passive and does not involve the 'problem-solving orientation' of an entrepreneur, who would actively seek a solution."}, {"text": "Offering a dry-cleaning pickup and delivery service to a few neighbors to test demand and refine the process.", "isCorrect": true, "rationale": "This action demonstrates 'problem-solving orientation' by asking 'What would someone pay me to handle for them?' and 'calculated risk tolerance' by testing the idea with low investment first."}, {"text": "Convincing local dry cleaners to stay open later to accommodate demand.", "isCorrect": false, "rationale": "While addressing the problem, this is more akin to advocacy than creating a business solution and taking on the associated risk and reward."}, {"text": "Investing immediately in a delivery van and marketing materials for a full-scale delivery service.", "isCorrect": false, "rationale": "This would be a 'reckless risk' rather than a 'calculated risk,' as it involves significant upfront investment without first testing the idea with low investment."}], "id": "q02"}, {"question": "After several months, an entrepreneur's new online tutoring platform has not gained significant traction. Instead of giving up, the entrepreneur surveys early users and identifies a strong preference for in-person group sessions over one-on-one online tutoring. Which entrepreneurial traits are primarily demonstrated here?", "options": [{"text": "Resourcefulness and Value Creation", "isCorrect": false, "rationale": "While value creation is always a goal, the primary actions described here (not giving up, surveying users, identifying new preference) relate more directly to persistence and learning from failure."}, {"text": "Calculated Risk Tolerance and Problem-Solving Orientation", "isCorrect": false, "rationale": "Calculated risk tolerance is about testing before committing, which occurred before this point. Problem-solving is ongoing, but the specific actions lean more towards adapting to feedback after a setback."}, {"text": "Persistence and Learning from Failure", "isCorrect": true, "rationale": "Not quitting when something doesn't work immediately demonstrates 'persistence,' and treating setbacks (lack of traction) as 'information, not defeat' and gathering feedback reflects 'learning from failure.'"}, {"text": "Value Creation and Resourcefulness", "isCorrect": false, "rationale": "Resourcefulness is about using what you have. While the goal is value creation, the core actions of adapting to a setback through feedback are better captured by persistence and learning from failure."}], "id": "q03"}, {"question": "A student decides to start a small business helping local businesses manage their social media, leveraging their existing skills and smartphone. According to the 'moneytip' and 'resourcefulness' sections, why is this an ideal first business idea?", "options": [{"text": "It has the potential to become a large, scalable enterprise very quickly.", "isCorrect": false, "rationale": "While it might scale, the primary reason given in the text for an 'ideal first business idea' is not rapid scalability but rather low initial investment and using existing assets."}, {"text": "It uses a skill the student already possesses and requires minimal to no startup investment.", "isCorrect": true, "rationale": "The 'moneytip' advises, 'Start with what you already know and already have...uses a skill you already possess and requires no startup investment.' This perfectly aligns with the student's approach."}, {"text": "It is a highly original idea that no one else in the community has thought of.", "isCorrect": false, "rationale": "The text states, 'The best first business idea is rarely the most original' and 'You do not need a revolutionary idea,' emphasizing unmet needs and existing skills instead."}, {"text": "It guarantees immediate profitability and avoids any financial risk.", "isCorrect": false, "rationale": "No business guarantees immediate profitability, and entrepreneurship inherently involves 'taking on the financial risk.' The goal is calculated risk, not risk avoidance."}], "id": "q04"}, {"question": "Which of the following proposed student business ideas would *least* align with the text's advice to start with 'little or no startup capital'?", "options": [{"text": "Offering math tutoring services to younger students.", "isCorrect": false, "rationale": "Tutoring is explicitly listed as an idea requiring 'little or no startup capital' by leveraging existing knowledge."}, {"text": "Starting a dog walking service in a residential neighborhood.", "isCorrect": false, "rationale": "Dog walking is listed as an idea with 'consistent demand' and typically requires minimal upfront investment beyond time and perhaps a leash."}, {"text": "Launching a professional drone photography business requiring purchase of advanced equipment and software.", "isCorrect": true, "rationale": "While photography is mentioned, the text specifies 'with a smartphone or entry-level camera.' Requiring 'purchase of advanced equipment and software' for a professional drone business goes against the 'little or no startup capital' advice."}, {"text": "Baking custom birthday cakes for local events from a home kitchen.", "isCorrect": false, "rationale": "Baked goods are listed, and home baking leverages existing kitchen equipment, fitting the 'little or no startup capital' guideline (assuming cottage food laws are met)."}], "id": "q05"}, {"question": "The text describes how many well-known companies were started by students who noticed a problem, offered a simple solution, and used customer feedback to shape the business. This process primarily underscores the importance of:", "options": [{"text": "Securing venture capital funding at the earliest stages of development.", "isCorrect": false, "rationale": "The text does not mention venture capital; it focuses on identifying needs, simple solutions, and customer feedback for student-led businesses starting with little capital."}, {"text": "Having a highly complex and proprietary technology from the outset.", "isCorrect": false, "rationale": "The text emphasizes a 'simple solution' and that 'You do not need a revolutionary idea,' contradicting the need for complex technology early on."}, {"text": "Iterative development driven by real-world interaction and adaptation.", "isCorrect": true, "rationale": "The description of offering a 'simple solution' and using 'feedback from early customers shaped the business' directly reflects an iterative process of development and adaptation based on real-world interaction."}, {"text": "Perfecting the product or service before offering it to any customers.", "isCorrect": false, "rationale": "Using customer feedback to 'shape the business' implies that the initial offering isn't perfect and will evolve, contradicting the idea of perfecting it beforehand."}], "id": "q06"}, {"question": "A recent graduate works a full-time job for a stable income and health benefits, but on evenings and weekends, they design and sell handmade jewelry online. According to the text, what is the primary benefit of this combined approach?", "options": [{"text": "It guarantees that the jewelry business will eventually replace the full-time job.", "isCorrect": false, "rationale": "The text states the side hustle offers 'the option to grow into full-time entrepreneurship,' but it doesn't guarantee it will replace the job."}, {"text": "It allows for skill-building and additional income while maintaining the stability of traditional employment.", "isCorrect": true, "rationale": "The text highlights the benefits of a side hustle as 'extra income, skill-building, and the option to grow into full-time entrepreneurship' while the primary job provides 'stable income and benefits.'"}, {"text": "It is a clear indication that entrepreneurship is inherently superior to traditional employment.", "isCorrect": false, "rationale": "The text explicitly states, 'Neither is superior,' when comparing entrepreneurship and a job, emphasizing that both have legitimate advantages."}, {"text": "It eliminates all financial risk associated with starting a new venture.", "isCorrect": false, "rationale": "While a side hustle reduces the reliance on the new venture for primary income, entrepreneurship still involves 'taking on the financial risk' to some extent, even if mitigated."}], "id": "q07"}, {"question": "An entrepreneur is described as someone who takes 'calculated risks, but not reckless ones.' Which action exemplifies a calculated risk?", "options": [{"text": "Investing a large sum of money into a business idea without prior market research.", "isCorrect": false, "rationale": "This describes a 'reckless risk,' as it lacks the research and testing characteristic of a calculated risk."}, {"text": "Launching a minimum viable product to gather customer feedback before full-scale development.", "isCorrect": true, "rationale": "This aligns with 'testing ideas with low investment first' and 'research before committing money,' which are hallmarks of calculated risk tolerance."}, {"text": "Avoiding any new business ventures to prevent potential financial losses.", "isCorrect": false, "rationale": "This is risk avoidance, not risk-taking, which is a core part of entrepreneurship ('taking on the financial risk')."}, {"text": "Committing all personal savings to a single, unproven business concept.", "isCorrect": false, "rationale": "This is a 'reckless risk' due to the high personal stakes and lack of prior testing or diversification."}], "id": "q08"}, {"question": "The entrepreneurial trait of 'resourcefulness' is primarily about:", "options": [{"text": "Having access to extensive financial capital for any business need.", "isCorrect": false, "rationale": "Resourcefulness is about making the most of what you *already have*, not about waiting for or needing extensive external capital."}, {"text": "Waiting for the perfect market conditions before launching a business.", "isCorrect": false, "rationale": "The text states 'rather than waiting for the perfect conditions,' directly contradicting this option."}, {"text": "Utilizing one's existing skills, tools, and network to overcome challenges.", "isCorrect": true, "rationale": "The text defines resourcefulness as 'Making the most of what you already have—your skills, your tools, your network—rather than waiting for the perfect conditions.'"}, {"text": "Being able to persuade others to invest in your business idea.", "isCorrect": false, "rationale": "While useful, this is more related to networking or pitching, not the core definition of using one's *own* existing assets as described for resourcefulness."}], "id": "q09"}, {"question": "Which statement best synthesizes the core philosophy of the entrepreneurial mindset as presented in the text?", "options": [{"text": "Success comes from being the first to invent a completely new product or service for a global market.", "isCorrect": false, "rationale": "The text emphasizes simple solutions to unmet needs, often local, and states, 'You do not need a revolutionary idea,' contradicting the focus on global markets and entirely new inventions."}, {"text": "Entrepreneurship is a fluid process of identifying needs, offering value, and continually adapting through calculated risks and learning from setbacks.", "isCorrect": true, "rationale": "This statement integrates multiple core traits: 'identifying an unmet need,' 'offering something people value,' 'calculated risk tolerance,' 'persistence' (continually adapting), and 'learning from failure' (learning from setbacks), capturing the essence of 'a way of thinking.'"}, {"text": "The primary goal is to minimize all forms of risk and achieve immediate profitability in the first month.", "isCorrect": false, "rationale": "Entrepreneurs take 'financial risk' (calculated, not reckless) and the text notes, 'Most businesses do not become profitable in the first month,' making immediate profitability an unrealistic primary goal."}, {"text": "A strong business plan is more crucial than responding to customer feedback or market changes.", "isCorrect": false, "rationale": "The text highlights that 'feedback from early customers shaped the business' and entrepreneurs 'pivot when something is not working,' implying adaptability is key, not just a static plan."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
