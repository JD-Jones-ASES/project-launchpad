    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "What is the fundamental approach an index fund uses to manage investments?", "options": [{"text": "Actively picks undervalued stocks to outperform the market.", "isCorrect": false, "rationale": "Actively picking stocks is characteristic of actively managed funds, not passive index funds."}, {"text": "Hires a team of analysts to research and select top-performing securities.", "isCorrect": false, "rationale": "This describes the method of an actively managed fund, which incurs higher costs for research staff."}, {"text": "Passively tracks a pre-defined list of securities by buying them in proportion to a market index.", "isCorrect": true, "rationale": "The text explicitly states an index fund 'passively tracks a market index' and 'simply buys all the securities in its target index in the same proportions'."}, {"text": "Invests primarily in a diverse portfolio of newly issued corporate bonds.", "isCorrect": false, "rationale": "While index funds can hold bonds, their fundamental approach is tracking an index, not focusing exclusively on newly issued bonds or a specific security type in general."}]}, {"question": "According to the text, what is one of the 'powerful reasons' index funds tend to outperform actively managed funds over long periods?", "options": [{"text": "Index funds invest exclusively in high-growth technology stocks, leading to higher returns.", "isCorrect": false, "rationale": "Index funds track a market index, which can include various industries, not just high-growth technology stocks. Their outperformance is not due to sector focus."}, {"text": "Index funds frequently adjust their holdings based on market predictions to minimize risk.", "isCorrect": false, "rationale": "Index funds are passively managed and do not frequently adjust holdings based on market predictions; they simply mirror their index."}, {"text": "Index funds have significantly lower expense ratios, which compounds into greater returns over decades.", "isCorrect": true, "rationale": "The text identifies 'Lower costs' as a powerful reason, stating 'this fee difference compounds dramatically over decades'."}, {"text": "Index funds are managed by expert stock pickers who consistently beat market benchmarks.", "isCorrect": false, "rationale": "Index funds do not employ stock pickers; they are passive. The text also notes that 'the majority fail to do so' when active managers try to beat the market."}]}, {"question": "The S&P 500 is described as a market index that primarily serves what purpose?", "options": [{"text": "To identify the fastest-growing small-cap companies in the U.S.", "isCorrect": false, "rationale": "The S&P 500 tracks 'approximately 500 of the largest publicly traded companies,' not small-cap companies."}, {"text": "To track approximately 500 of the largest publicly traded U.S. companies and benchmark overall market performance.", "isCorrect": true, "rationale": "The text states the S&P 500 'tracks approximately 500 of the largest publicly traded companies in the United States... It is widely used as a benchmark for U.S. stock market performance'."}, {"text": "To provide a list of international companies with the highest dividend yields.", "isCorrect": false, "rationale": "The S&P 500 tracks U.S. companies, not international ones, and its primary purpose isn't limited to dividend yield."}, {"text": "To predict future economic trends based on a select group of leading indicators.", "isCorrect": false, "rationale": "A market index like the S&P 500 reflects current market performance and a segment of the economy, it's not primarily a predictive tool for future economic trends."}]}, {"question": "An investor is primarily concerned with achieving broad market diversification and minimizing management fees over a 30-year investment horizon. Based on the text, which investment vehicle would be most suitable for this investor?", "options": [{"text": "An actively managed mutual fund with a 1.2% expense ratio.", "isCorrect": false, "rationale": "Actively managed funds typically have higher expense ratios and often fail to beat the market after fees, contradicting the goal of minimizing fees and consistent outperformance."}, {"text": "A portfolio of individual stocks carefully selected by the investor based on personal research.", "isCorrect": false, "rationale": "While possible, achieving broad market diversification through individual stock picking requires significant effort and capital, and the text promotes the simplicity of index funds for this purpose."}, {"text": "A low-cost S&P 500 index fund.", "isCorrect": true, "rationale": "The text highlights index funds for their 'very low costs and broad diversification' and cites Warren Buffett's advice that a 'low-cost S&P 500 index fund is the wisest long-term investment choice' for most ordinary investors."}, {"text": "A single, high-growth tech stock.", "isCorrect": false, "rationale": "A single stock offers very limited diversification and carries significantly higher risk compared to a diversified fund, conflicting with the investor's goal of broad diversification."}]}, {"question": "What is the primary functional difference highlighted between an index mutual fund and an Exchange-Traded Fund (ETF)?", "options": [{"text": "ETFs are actively managed, while index mutual funds are passively managed.", "isCorrect": false, "rationale": "The text states 'Most ETFs passively track an index,' making them similar to index funds in management style. Both can be passive."}, {"text": "Mutual funds track specific market indexes, whereas ETFs do not.", "isCorrect": false, "rationale": "The text notes that 'Most ETFs passively track an index,' meaning both types of funds can track indexes."}, {"text": "ETFs trade continuously throughout the day like stocks, while mutual funds are priced once per day at market close.", "isCorrect": true, "rationale": "The text explicitly states: 'A mutual fund is priced once per day at market close (NAV). An ETF trades continuously during market hours, just like a stock.'"}, {"text": "Index mutual funds offer greater tax efficiency than ETFs.", "isCorrect": false, "rationale": "The text does not discuss tax efficiency, and in practice, ETFs are often considered more tax-efficient than traditional mutual funds."}]}, {"question": "When Warren Buffett advises ordinary investors to choose a low-cost S&P 500 index fund, what core investment principle is he primarily emphasizing for long-term success?", "options": [{"text": "The importance of identifying and investing in emerging market opportunities before others.", "isCorrect": false, "rationale": "An S&P 500 index fund invests in large, established U.S. companies, not emerging markets."}, {"text": "The superior returns generated by aggressive short-term trading strategies.", "isCorrect": false, "rationale": "Buffett advocates for long-term investing, and index funds are not designed for aggressive short-term trading."}, {"text": "The power of consistent low costs and broad diversification to outperform most active strategies over time.", "isCorrect": true, "rationale": "The text states Buffett's reasoning as: 'consistent low costs and broad diversification outperform most active strategies over time,' directly aligning with this principle."}, {"text": "The necessity of paying high fees for professional stock-picking expertise.", "isCorrect": false, "rationale": "Buffett recommends a 'low-cost' index fund, explicitly going against paying high fees for stock-picking."}]}, {"question": "How does the text define a 'market index'?", "options": [{"text": "A proprietary algorithm used by fund managers to predict market movements.", "isCorrect": false, "rationale": "A market index is a collection of securities, not an algorithm for predicting market movements."}, {"text": "A collection of securities that represents a specific segment of the market.", "isCorrect": true, "rationale": "The text defines a market index as 'a collection of securities that represents a segment of the market. Think of it as a 'list' of companies'."}, {"text": "A government-regulated list of companies eligible for tax breaks.", "isCorrect": false, "rationale": "Market indexes are not government-regulated lists for tax breaks; they are financial benchmarks."}, {"text": "A fund that guarantees a minimum return on investment.", "isCorrect": false, "rationale": "A market index is a benchmark, not an investment fund, and it does not guarantee returns."}]}, {"question": "The text states that 'No manager underperformance' is a reason index funds often beat actively managed funds. What does this primarily imply about active fund managers?", "options": [{"text": "They are generally less skilled than the managers of index funds.", "isCorrect": false, "rationale": "The text does not imply a lack of skill but rather the difficulty of consistently beating the market *after fees*."}, {"text": "The majority of active fund managers fail to beat the market after fees over extended periods.", "isCorrect": true, "rationale": "The text explicitly states: 'Research consistently shows that the majority fail to do so after fees over 10+ year periods.' This is the core of 'No manager underperformance'."}, {"text": "They intentionally underperform to discourage investors from active management.", "isCorrect": false, "rationale": "There is no indication of intentional underperformance; rather, it highlights the challenge of market outperformance."}, {"text": "Their strategies are too conservative to generate significant returns.", "isCorrect": false, "rationale": "Active managers can employ various strategies, conservative or aggressive. The text indicates that regardless, most still underperform the market after fees."}]}, {"question": "For an investor focused on a 'long-term' investment horizon, how significant is the continuous trading flexibility of an ETF compared to an index mutual fund's once-a-day pricing?", "options": [{"text": "It is extremely significant, as daily trading allows for capturing frequent market fluctuations.", "isCorrect": false, "rationale": "Capturing frequent market fluctuations implies short-term trading, which is not the focus for a long-term investor."}, {"text": "It is mostly irrelevant, as frequent trading is not typically part of a long-term strategy.", "isCorrect": true, "rationale": "The text states: 'For a long-term investor, this difference is mostly irrelevant—you are not trying to trade frequently.'"}, {"text": "It allows for greater diversification, as ETFs can hold more types of securities.", "isCorrect": false, "rationale": "Diversification is primarily about the underlying holdings, not the trading frequency of the fund. Both can offer broad diversification."}, {"text": "It is a disadvantage, as continuous trading exposes the investor to higher transaction costs.", "isCorrect": false, "rationale": "While continuous trading *can* lead to higher transaction costs if an investor trades frequently, the text characterizes the difference as 'mostly irrelevant' for long-term investors, not a disadvantage directly related to the core long-term strategy."}]}, {"question": "Who is credited with inventing the index fund and launching the first publicly available S&P 500 index fund for ordinary investors?", "options": [{"text": "Warren Buffett", "isCorrect": false, "rationale": "Warren Buffett is a renowned investor who advocates for index funds but did not invent them."}, {"text": "Benjamin Graham", "isCorrect": false, "rationale": "Benjamin Graham was a pioneering investor and mentor to Buffett, but he did not invent the index fund."}, {"text": "John Bogle", "isCorrect": true, "rationale": "The 'didyouknow' section explicitly states: 'The index fund was invented by John Bogle, who founded a major investment company in 1974 and launched the first publicly available S&P 500 index fund for ordinary investors in 1976.'"}, {"text": "George Soros", "isCorrect": false, "rationale": "George Soros is a prominent investor, but he is not credited with inventing the index fund."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
