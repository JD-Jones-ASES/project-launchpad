        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "Which statement best explains why filing the FAFSA early is emphasized as crucial?", "options": [{"text": "The FAFSA portal often experiences technical issues closer to deadlines, making early submission safer.", "isCorrect": false, "rationale": "While technical issues can occur, the primary reason for early filing is not system stability but the allocation of aid, as stated in the text."}, {"text": "Some financial aid, particularly grants and institutional funds, is distributed on a first-come, first-served basis until funds are depleted.", "isCorrect": true, "rationale": "The text explicitly states: 'The earlier you file, the better—some aid is first-come, first-served,' indicating that limited funds are awarded until exhausted."}, {"text": "Early filing allows students more time to appeal their financial aid package if they are not satisfied with the initial offer.", "isCorrect": false, "rationale": "Appeals are a separate process; early filing is primarily about securing aid before it runs out, not just providing more time for subsequent actions."}, {"text": "Only students who file early are eligible for federal work-study programs and Pell Grants.", "isCorrect": false, "rationale": "Eligibility for federal programs like Pell Grants and work-study is based on financial need and FAFSA completion, not solely on the timing of filing, although early filing maximizes the chances of receiving limited funds."}], "id": "q01"}, {"question": "A middle-income family believes they will not qualify for need-based federal aid. Based on the text, what advice should they be given regarding filing the FAFSA?", "options": [{"text": "They should skip the FAFSA, as it's primarily for low-income families, and focus on private scholarships instead.", "isCorrect": false, "rationale": "The text advises against this, stating 'Even middle- and upper-middle-income families should file.'."}, {"text": "They should still file the FAFSA because it's required to access any federal funds, including potentially non-need-based aid or federal loans.", "isCorrect": true, "rationale": "The text explicitly states that filing the FAFSA is 'required to access any federal funds at all' and that 'some aid is not strictly need-based,' making it essential for all income levels."}, {"text": "They only need to file if their chosen college specifically requires it for institutional scholarships.", "isCorrect": false, "rationale": "While colleges do use FAFSA for their aid, the broader importance is its necessity for all federal funds, regardless of a specific college's institutional requirements."}, {"text": "They should wait until their student receives acceptance letters to see if any colleges offer merit aid that doesn't require the FAFSA.", "isCorrect": false, "rationale": "Waiting is discouraged due to the first-come, first-served nature of some aid. Also, even for merit aid, many colleges require the FAFSA for a complete financial aid package."}], "id": "q02"}, {"question": "Sarah is comparing different types of financial aid offers. She receives an offer for a Pell Grant and another for a Federal Direct Subsidized Loan. What is the fundamental difference in how these two types of aid will impact her financial future?", "options": [{"text": "The Pell Grant is only for tuition, while the loan can cover living expenses.", "isCorrect": false, "rationale": "Both grants and loans can cover various education-related expenses, not just tuition. The key difference lies in repayment."}, {"text": "The Pell Grant requires repayment with interest, whereas the loan is free money.", "isCorrect": false, "rationale": "This statement incorrectly reverses the nature of the aid types. Grants are free money, while loans must be repaid with interest."}, {"text": "The Pell Grant does not need to be repaid, providing direct financial relief, while the loan must be repaid with interest, adding to her debt.", "isCorrect": true, "rationale": "The text defines 'Grants (gift aid)' as 'Money that does not need to be repaid' and 'Loans' as 'Must be repaid, with interest,' clearly outlining this fundamental difference."}, {"text": "The Pell Grant is awarded for academic merit, while the loan is based on financial need.", "isCorrect": false, "rationale": "Pell Grants are specifically 'primary federal need-based grant,' while federal loans can be based on need (subsidized) or not (unsubsidized), but the core distinction here is repayment."}], "id": "q03"}, {"question": "A student is awarded 'Work-Study' as part of their financial aid package. Which of the following best describes how Work-Study funds are typically received and utilized?", "options": [{"text": "The Work-Study funds are directly applied to the student's tuition bill by the college.", "isCorrect": false, "rationale": "The text states, 'Earnings are paid directly to the student (not applied automatically to tuition),' meaning students receive paychecks."}, {"text": "The student receives a lump sum payment at the beginning of each semester to cover educational expenses.", "isCorrect": false, "rationale": "Work-Study involves earning money through a job, not a lump sum payment. Earnings are paid over time as wages."}, {"text": "The student earns money through a part-time job, typically on campus, and receives a paycheck that they can then use for their education expenses.", "isCorrect": true, "rationale": "The text describes Work-Study as a program providing 'part-time jobs, usually on campus,' and explicitly states, 'Earnings are paid directly to the student,' implying they receive a paycheck to use as needed."}, {"text": "Work-Study is a type of loan that only needs to be repaid if the student drops below full-time enrollment.", "isCorrect": false, "rationale": "Work-Study is not a loan; it is earned money through employment and does not need to be repaid."}], "id": "q04"}, {"question": "Based on the recommended hierarchy for college financing, which strategy demonstrates the most financially prudent approach for a student named Alex?", "options": [{"text": "Alex immediately applies for a private loan to cover tuition, planning to use any scholarships as supplementary spending money.", "isCorrect": false, "rationale": "The text advises against private loans as a last resort and prioritizes scholarships (free money) first, making this an imprudent approach."}, {"text": "Alex secures a federal loan first, then looks for a part-time job, and only then considers applying for grants or scholarships.", "isCorrect": false, "rationale": "This reverses the recommended hierarchy, which prioritizes grants and scholarships ('free money') before considering loans or work-study."}, {"text": "Alex focuses heavily on applying for grants and scholarships, then considers work-study or a part-time job, and only takes out federal loans if absolutely necessary after exhausting other options.", "isCorrect": true, "rationale": "This strategy aligns perfectly with the 'moneytip' hierarchy: (1) grants, (2) scholarships, (3) work-study/part-time work, (4) federal loans only as needed, (5) private loans only as a last resort."}, {"text": "Alex plans to work full-time during college to cover all expenses, avoiding all forms of financial aid to minimize debt.", "isCorrect": false, "rationale": "While working can help, relying solely on full-time work while attending college is often unsustainable and ignores the benefits of free aid like grants and scholarships designed to make education accessible."}], "id": "q05"}, {"question": "According to the scholarship search strategies, which action is most likely to increase a student's chances of receiving multiple scholarships?", "options": [{"text": "Focusing solely on large, national scholarships with high award amounts, as they offer the most significant impact.", "isCorrect": false, "rationale": "The text encourages applying widely, noting that 'A $500 scholarship is worth applying for—many have few applicants,' suggesting smaller, local scholarships can be easier to secure."}, {"text": "Using a single, generic essay for all scholarship applications to save time and ensure consistency.", "isCorrect": false, "rationale": "The text explicitly states: 'Customize each application essay. Generic essays lose to specific ones,' highlighting the importance of tailoring applications."}, {"text": "Starting the scholarship search early, applying to a wide range of scholarships, and reapplying annually.", "isCorrect": true, "rationale": "The text advises 'Start searching in your junior year of high school (or earlier),' 'Apply widely,' and 'Reapply each year,' all of which are key strategies for increasing scholarship success."}, {"text": "Only applying for scholarships that are exclusively offered through their chosen college's financial aid office.", "isCorrect": false, "rationale": "The text suggests checking with 'your state, local community foundations, employers of your parents, religious organizations,' and more, indicating a much broader search is beneficial."}], "id": "q06"}, {"question": "Jessica receives an email congratulating her on winning a $10,000 scholarship from an organization she's never heard of. The email asks for her bank account details to deposit the funds and requests a small 'processing fee' to expedite the transfer. What should Jessica do?", "options": [{"text": "Immediately provide her bank details and pay the processing fee to claim her prize quickly.", "isCorrect": false, "rationale": "This aligns with multiple red flags for scholarship scams: being notified of winning a scholarship she never applied for, asking for bank account details during the application process (or payment), and charging a processing fee."}, {"text": "Reply to the email requesting more information about the scholarship program and how she was selected.", "isCorrect": false, "rationale": "Engaging with a scammer can put personal information at risk. It's better to recognize the scam and report it without interaction."}, {"text": "Report the email to the Federal Trade Commission (FTC) as a potential scholarship scam, as it exhibits multiple warning signs.", "isCorrect": true, "rationale": "The text lists all these as clear red flags for scams: 'Charge you an application fee or 'processing fee'', 'Ask for your bank account or Social Security number during the application process', and 'Notify you that you 'won' a scholarship you never applied for'. The advice is to 'Report it to the FTC'."}, {"text": "Forward the email to her school counselor to see if they recognize the scholarship organization.", "isCorrect": false, "rationale": "While a school counselor might be a good resource for legitimate scholarships, this email contains clear scam indicators, making reporting to the FTC the more appropriate immediate action."}], "id": "q07"}, {"question": "A student proudly announces they received a 'full scholarship' to a university that costs $70,000 per year. Upon further inspection, the scholarship award letter states it covers $25,000 for tuition only. What critical advice from the text applies to this situation?", "options": [{"text": "The student should immediately contact the university to negotiate the 'full scholarship' to cover all expenses.", "isCorrect": false, "rationale": "Negotiation might be possible, but the immediate and most critical advice is to clarify what 'full scholarship' actually means, as it's often used loosely."}, {"text": "The student should assume the remaining costs will be covered by federal grants and not worry about the difference.", "isCorrect": false, "rationale": "Assuming federal grants will cover such a large gap without applying for them or understanding eligibility is irresponsible. The 'warning' specifically highlights the need to 'verify what a scholarship actually covers' and recognize remaining costs."}, {"text": "The student must verify what the scholarship specifically covers (e.g., tuition, room, board) and understand the remaining substantial costs they will still need to fund.", "isCorrect": true, "rationale": "The 'warning' section explicitly states: 'Always verify what a scholarship actually covers: tuition only? tuition and fees? room and board? books? Ask for the specific dollar amount and what expenses it covers.' It then illustrates with an example, 'A $10,000 scholarship at a $60,000/year school still leaves $50,000 per year in remaining costs.'"}, {"text": "The term 'full scholarship' always implies full coverage of tuition, fees, room, and board, so there must be a mistake in the award letter.", "isCorrect": false, "rationale": "The text warns: 'The term 'full scholarship' is often used loosely.' It specifically advises verifying coverage, implying it's not always all-inclusive."}], "id": "q08"}, {"question": "The 'Did You Know' section highlights that millions in private scholarships go unclaimed annually. What is the primary implication of this information for students seeking to fund their education?", "options": [{"text": "It implies that most available scholarships are too small to be worth the effort of applying.", "isCorrect": false, "rationale": "The text encourages applying for smaller scholarships, stating 'A $500 scholarship is worth applying for,' and the fact they go unclaimed is due to lack of application, not insignificance."}, {"text": "Students should prioritize federal aid exclusively, as private scholarships are too competitive and difficult to find.", "isCorrect": false, "rationale": "While federal aid is crucial, the unclaimed scholarship data suggests that many private scholarships are NOT highly competitive, primarily because students don't apply, indicating a missed opportunity."}, {"text": "Many students underestimate their eligibility and the sheer volume of available scholarships, making a proactive and broad application strategy essential.", "isCorrect": true, "rationale": "The text notes the most common reasons for not applying are 'assumed they would not qualify' and 'did not know the scholarships existed,' which directly supports the idea that students underestimate availability and eligibility, thus needing a proactive approach."}, {"text": "The scholarship application process is intentionally made complex to discourage all but the most dedicated applicants.", "isCorrect": false, "rationale": "The text doesn't suggest intentional complexity but rather a lack of awareness and perceived ineligibility among students."}], "id": "q09"}, {"question": "Considering the overarching purpose of financial aid as described in the text, what is its fundamental role in higher education?", "options": [{"text": "To ensure that all students attend college for free, eliminating all costs associated with higher education.", "isCorrect": false, "rationale": "The text states financial aid makes education 'accessible,' not necessarily free. Students often still have costs, even with aid, as indicated by discussions of loans and 'full scholarship' nuances."}, {"text": "To create a competitive environment among students, rewarding only the highest academic achievers with funding.", "isCorrect": false, "rationale": "While merit scholarships exist, the primary goal of aid, especially federal aid like Pell Grants, is to address need and accessibility, not solely competition for academic achievement."}, {"text": "To offer a wide array of options, including 'free money' and loans, to make higher education attainable for students across all income levels.", "isCorrect": true, "rationale": "The text opens by stating, 'Financial aid exists to make higher education accessible across all income levels,' and proceeds to describe various aid types (grants, scholarships, work-study, loans), all contributing to this goal."}, {"text": "To primarily benefit high-income families by offering tax breaks for college savings plans.", "isCorrect": false, "rationale": "While some benefits might exist for high-income families, the text emphasizes aid for 'all income levels' and highlights need-based aid, making accessibility the primary focus, not just tax breaks for the wealthy."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
