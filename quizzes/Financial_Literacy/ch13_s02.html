    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 13, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which factor is considered the single most important in calculating your FICO score, accounting for more than a third of the total?", "options": [{"text": "Amounts Owed / Credit Utilization", "isCorrect": false, "rationale": "Amounts Owed / Credit Utilization is the second most important factor, accounting for 30% of the FICO score, not over a third."}, {"text": "Payment History", "isCorrect": true, "rationale": "Payment History is explicitly stated as the single most important factor, making up more than a third (35%) of your score."}, {"text": "Length of Credit History", "isCorrect": false, "rationale": "Length of Credit History accounts for 15% of the FICO score, making it less significant than Payment History."}, {"text": "Credit Mix", "isCorrect": false, "rationale": "Credit Mix accounts for 10% of the FICO score, which is a smaller portion compared to Payment History."}]}, {"question": "Sarah has a perfect credit history for 5 years. She accidentally misses a credit card payment by 35 days due to a forgotten auto-pay setup. What is the most likely immediate impact on her FICO score?", "options": [{"text": "Her score will likely drop by 5-10 points temporarily, similar to a hard inquiry.", "isCorrect": false, "rationale": "A 5-10 point drop is typical for a hard inquiry, not for a significantly late payment. Late payments have a much more severe impact."}, {"text": "Her score will be unaffected as long as she pays it within 60 days of the original due date.", "isCorrect": false, "rationale": "The text states that 'Late payments (30 days or more past due) can drop your score by 50–100 points,' indicating that a 35-day late payment will have a significant impact, regardless of whether it's paid before 60 days."}, {"text": "Her score will likely drop significantly, potentially 50-100 points, even with an otherwise good history.", "isCorrect": true, "rationale": "The text explicitly warns that 'A single 30-day late payment on an account in good standing can drop your score by 50 to 100 points—regardless of how high your score was before.' A 35-day late payment falls into this category."}, {"text": "Her score will only be affected if she misses multiple payments within a year, not just one.", "isCorrect": false, "rationale": "The text clearly states that 'even a single missed payment' (30 days or more late) can cause a significant drop, contradicting the idea that multiple misses are required."}]}, {"question": "A person has two credit cards. Card A has a $3,000 limit and a $900 balance. Card B has a $2,000 limit and a $100 balance. What is their total credit utilization ratio, and how is it generally rated?", "options": [{"text": "20%; Good, as it's under the recommended 30% threshold.", "isCorrect": true, "rationale": "Total balances are $900 + $100 = $1,000. Total credit limits are $3,000 + $2,000 = $5,000. Utilization = ($1,000 / $5,000) * 100% = 20%. This is under the recommended 30% utilization."}, {"text": "40%; Needs improvement, as it's above the recommended 30% threshold.", "isCorrect": false, "rationale": "The calculation leads to 20%, not 40%. A 40% utilization would indeed need improvement."}, {"text": "20%; Excellent, as it's under the 10% threshold for highest scores.", "isCorrect": false, "rationale": "While 20% is good, the text states 'Under 10% is even better for the highest scores,' meaning 20% is good but not 'excellent' in that specific context."}, {"text": "50%; Significantly damages the score, indicating high risk.", "isCorrect": false, "rationale": "The calculation leads to 20%, not 50%. A 50% utilization would significantly damage the score."}]}, {"question": "Emily has two credit cards, both with $5,000 limits and $0 balances. Her FICO score is excellent. She decides to close one of the cards to simplify her finances. How might this action impact her credit utilization ratio and, consequently, her FICO score, assuming her spending habits remain the same?", "options": [{"text": "It will have no impact on her utilization ratio as her balances are $0.", "isCorrect": false, "rationale": "Even with $0 balances, closing a card reduces total available credit, which changes the denominator in the utilization calculation. The warning section explicitly advises against this."}, {"text": "It will decrease her utilization ratio, potentially improving her score.", "isCorrect": false, "rationale": "Closing a card reduces total available credit, which, if balances remain the same or increase later, will actually increase the utilization ratio, not decrease it."}, {"text": "It will increase her utilization ratio and shorten her credit history, potentially lowering her score.", "isCorrect": true, "rationale": "The warning states: 'Closing a card reduces your total available credit, which raises your utilization ratio—even if your balance stays the same. It also shortens your credit history.' Both effects can negatively impact the FICO score."}, {"text": "It will only affect her length of credit history, not her utilization ratio.", "isCorrect": false, "rationale": "While it does shorten her credit history, the text explicitly states it also affects the utilization ratio by reducing total available credit."}]}, {"question": "Why might a young adult, who diligently pays all their bills on time and has a low credit utilization, still have a lower FICO score compared to an older individual with similar payment habits?", "options": [{"text": "Young adults are perceived as higher risk regardless of their habits, due to general demographic trends.", "isCorrect": false, "rationale": "The FICO score is based on specific factors, not general demographic perception. The text provides a clear reason within the scoring factors."}, {"text": "They are more likely to have a diverse credit mix, which can be seen negatively by lenders.", "isCorrect": false, "rationale": "A diverse credit mix is generally seen positively, demonstrating broader creditworthiness, not negatively. Also, young adults are often less likely to have a diverse mix initially."}, {"text": "They have not had credit accounts open long enough to build a substantial credit history.", "isCorrect": true, "rationale": "The text states, 'This is why young people often have lower scores even if they pay everything on time—they simply have not had credit accounts long enough. Time is the only cure for a short credit history.' This directly addresses the 'Length of Credit History' factor."}, {"text": "They typically have more hard inquiries due to applying for first-time loans, which lowers their score more significantly.", "isCorrect": false, "rationale": "While young adults might have some hard inquiries, the primary reason given for their generally lower scores (even with good habits) is the lack of a long credit history, not the impact of new credit inquiries, which are temporary and small."}]}, {"question": "Which of the following scenarios would result in a hard inquiry that could temporarily lower a person's FICO score?", "options": [{"text": "Checking your own credit score through a free online service.", "isCorrect": false, "rationale": "The text defines this as a 'soft inquiry,' which does not affect your credit score."}, {"text": "A credit card company pre-screening you for an offer.", "isCorrect": false, "rationale": "The text defines this as a 'soft inquiry,' which does not affect your credit score."}, {"text": "Applying for a new personal loan at a bank.", "isCorrect": true, "rationale": "The text states, 'When you apply for a new credit card or loan, the lender pulls your credit report. This is called a hard inquiry (sometimes called a “hard pull”).'"}, {"text": "An employer conducting a background check for a job application.", "isCorrect": false, "rationale": "The text defines this as a 'soft inquiry,' which does not affect your credit score."}]}, {"question": "David is shopping for a mortgage and applies to three different banks for pre-approval within a two-week period. Based on the information about FICO scores, what is the most likely impact of these applications on his score?", "options": [{"text": "His score will likely drop significantly because multiple hard inquiries suggest financial desperation.", "isCorrect": false, "rationale": "While multiple applications *can* suggest desperation for different types of credit, the text provides a specific exception for rate shopping for certain loans."}, {"text": "Each application will cause a separate 5-10 point drop, for a total decrease of 15-30 points.", "isCorrect": false, "rationale": "This would be true for unrelated hard inquiries, but the text specifies a different rule for rate shopping for auto loans or mortgages."}, {"text": "The multiple inquiries will likely be counted as a single inquiry, minimizing the negative impact on his score.", "isCorrect": true, "rationale": "The 'moneytip' section states: 'When shopping for an auto loan or mortgage, multiple hard inquiries within a short window (typically 14–45 days, depending on the scoring model) are often counted as just one inquiry. Credit bureaus recognize that you are rate-shopping, not recklessly applying for many loans.'"}, {"text": "Mortgage inquiries are considered soft inquiries and will not affect his score at all.", "isCorrect": false, "rationale": "Applying for a mortgage involves a hard inquiry, as it's a new loan application. Soft inquiries are for self-checks, employer background checks, or pre-screens."}]}, {"question": "What is the primary benefit of having a 'good credit mix' for your FICO score?", "options": [{"text": "It indicates that you have a higher total credit limit across all your accounts.", "isCorrect": false, "rationale": "Credit mix relates to the types of credit (revolving vs. installment), not necessarily the total credit limit. Total credit limit is more relevant to credit utilization."}, {"text": "It reduces the number of hard inquiries on your credit report over time.", "isCorrect": false, "rationale": "Credit mix is unrelated to the number of hard inquiries, which are generated by applying for new credit."}, {"text": "It demonstrates responsible management of different types of credit to lenders, showcasing broader creditworthiness.", "isCorrect": true, "rationale": "The text states: 'Lenders like to see that you can responsibly manage different types of credit... Having only one type of credit is not terrible, but having both types demonstrates broader creditworthiness.'"}, {"text": "It primarily affects the length of your credit history by adding more accounts.", "isCorrect": false, "rationale": "While opening new accounts for a diverse mix might eventually age, the primary benefit of credit mix itself is demonstrating management of different types, not directly affecting the length of history, which is a separate factor."}]}, {"question": "Maria has a credit card with a $2,000 limit and an $800 balance, an auto loan she pays on time, and her oldest account is 5 years old. She has no recent hard inquiries. Which of the following actions would most significantly and positively impact her FICO score in the short term, based on the weighting of the factors?", "options": [{"text": "Opening a new type of loan to improve her credit mix.", "isCorrect": false, "rationale": "Credit mix is a 10% factor, and opening a new loan would also introduce a hard inquiry (temporary score drop) and lower the average age of accounts. The text advises against taking out a loan just for mix."}, {"text": "Allowing her oldest credit card account to age further.", "isCorrect": false, "rationale": "Length of Credit History is a 15% factor, but 'time is the only cure,' meaning significant positive impact takes a long time, not short-term."}, {"text": "Reducing her credit card balance to under $200.", "isCorrect": true, "rationale": "Maria's current utilization is ($800/$2000) = 40%, which hurts her score. Reducing it to $200 would make it 10%, a significant improvement in a 30% weighted factor. This is the most impactful short-term action listed."}, {"text": "Applying for another credit card to increase her total available credit.", "isCorrect": false, "rationale": "Applying for another card would result in a hard inquiry, temporarily lowering her score. While it could eventually increase total credit, the immediate effect is negative, and it's not as direct or significant as addressing high utilization."}]}, {"question": "If a person is trying to rapidly improve a low FICO score, which single action, if consistently maintained, would generally yield the most significant positive change over time?", "options": [{"text": "Minimizing new credit applications to avoid hard inquiries.", "isCorrect": false, "rationale": "While important, new credit/hard inquiries is only 10% of the score, and the temporary drop from inquiries is small (5-10 points). Avoiding them alone won't rapidly improve a low score significantly."}, {"text": "Consistently paying all bills on time and avoiding late payments.", "isCorrect": true, "rationale": "Payment History is the most heavily weighted factor (35%), and late payments have a severe negative impact (50-100 points). Consistently making on-time payments is the most direct and powerful way to build and improve a low score over time."}, {"text": "Diversifying their credit portfolio with both revolving and installment credit.", "isCorrect": false, "rationale": "Credit Mix is only 10% of the score. While beneficial, it's not as impactful as addressing payment history, and one should not take out loans just for mix."}, {"text": "Keeping old credit accounts open to increase the average age of accounts.", "isCorrect": false, "rationale": "Length of Credit History is a 15% factor, but 'time is the only cure.' It takes years to significantly improve this factor, so it won't yield 'rapid' improvement for a low score."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
