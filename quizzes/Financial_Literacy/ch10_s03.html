<div class="quiz-container">

        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "Which of the following is NOT typically a condition that allows you to waive a monthly maintenance fee for a checking or savings account?", "options": [{"text": "Maintaining a minimum balance above a set dollar amount.", "isCorrect": false, "rationale": "Maintaining a minimum balance is explicitly listed as a common condition to waive monthly maintenance fees."}, {"text": "Having direct deposit set up with the bank.", "isCorrect": false, "rationale": "Having direct deposit is explicitly listed as a common condition to waive monthly maintenance fees."}, {"text": "Being a student currently enrolled in an accredited institution.", "isCorrect": false, "rationale": "Many banks offer free accounts for students, which effectively waives monthly maintenance fees."}, {"text": "Making at least 10 debit card transactions per month.", "isCorrect": true, "rationale": "The text lists maintaining a minimum balance, having direct deposit, and being a student as common waivable conditions. It does not mention a requirement for a minimum number of debit card transactions."}]}, {"question": "Sarah has a checking account with a $7 monthly maintenance fee, waived if she maintains a minimum balance of $300. In July, her balance dropped to $290 for a few days before she deposited more money, bringing it back above $300. Assuming her bank charges the fee if the balance drops below the minimum at any point, how much will she pay in fees for July?", "options": [{"text": "$0", "isCorrect": false, "rationale": "The fee is triggered if the balance drops below the minimum. Since her balance dropped to $290, she will incur the fee, even if it later rises above $300."}, {"text": "$7", "isCorrect": true, "rationale": "The text states that if the balance drops below the minimum at any point, or at month end, a fee may be charged. In this scenario, her balance dropped below the $300 minimum, so she will be charged the $7 monthly fee."}, {"text": "$12", "isCorrect": false, "rationale": "The example in the text refers to a $12 fee for a different minimum balance, but Sarah's specific account has a $7 monthly maintenance fee."}, {"text": "$35", "isCorrect": false, "rationale": "This amount is typically associated with overdraft or NSF fees, not monthly maintenance fees for falling below a minimum balance."}]}, {"question": "Which scenario best illustrates the 'snowball effect' of overdraft fees described in the text?", "options": [{"text": "A customer uses an out-of-network ATM multiple times, incurring a $3 fee from their bank and a $2 fee from the ATM operator for each transaction.", "isCorrect": false, "rationale": "While incurring multiple ATM fees can be costly, it doesn't represent the rapid, compounding debt described as the 'snowball effect' of overdrafts, where fees quickly exceed the original spending and push the account further negative."}, {"text": "A customer receives a $12 monthly maintenance fee because their balance dropped below the minimum, leading to $144 in fees over a year.", "isCorrect": false, "rationale": "This describes a recurring maintenance fee, which is a steady drain, but not the 'snowball' effect of multiple, immediate, and escalating charges for individual transactions when an account is already negative."}, {"text": "A customer has $10 in their account, buys a $12 item, incurring a $35 overdraft fee. Then, an automatic $20 bill processes, incurring another $35 fee, leaving them significantly in debt to the bank.", "isCorrect": true, "rationale": "This scenario perfectly demonstrates the 'snowball effect' as described in the text: an initial small overdraft leads to a large fee, and subsequent transactions on the now negative account trigger additional large fees, rapidly increasing the debt to the bank far beyond the value of the purchases made."}, {"text": "A customer is charged an NSF fee when a check they wrote bounces due to insufficient funds, and they also incur a fee from the merchant for the bounced check.", "isCorrect": false, "rationale": "An NSF fee occurs when a payment is returned, which is similar to an overdraft but is a single event for that payment. While it can be expensive and may lead to a merchant fee, it doesn't capture the rapid, successive triggering of multiple bank overdraft fees on an already negative balance for different transactions."}]}, {"question": "What is the primary benefit of setting up overdraft protection by linking a savings account to your checking account?", "options": [{"text": "It completely prevents any fees from being charged if you overspend.", "isCorrect": false, "rationale": "Overdraft protection doesn't eliminate all fees; it typically replaces a steep overdraft fee with a smaller transfer fee (e.g., $5–$12) or sometimes even no fee, but it's not always entirely free."}, {"text": "It guarantees that your debit card transactions will always be declined if you don't have enough funds, avoiding any fees.", "isCorrect": false, "rationale": "This describes opting out of overdraft coverage, not overdraft protection. Overdraft protection ensures transactions go through by transferring funds."}, {"text": "It automatically transfers funds from your linked savings account to cover a shortfall, often incurring a smaller fee than a standard overdraft fee.", "isCorrect": true, "rationale": "The text states that overdraft protection links a savings account to cover shortfalls, typically for a small fee ($5–$12) instead of the larger standard overdraft fee ($25–$35)."}, {"text": "It alerts you via text message or email whenever your balance is running low.", "isCorrect": false, "rationale": "Low-balance alerts are a separate tool for managing funds; they are not the primary function of overdraft protection, which focuses on covering transactions."}]}, {"question": "Based on the advice in the 'moneytip' section, why might opting out of overdraft coverage entirely be considered a safer choice for many people, especially those just starting out?", "options": [{"text": "It ensures that the bank will always cover transactions, regardless of funds, without charging any fees.", "isCorrect": false, "rationale": "Opting out means the bank will NOT cover transactions if there are insufficient funds. It prevents fees by declining the transaction."}, {"text": "It guarantees that you will never accidentally spend more money than you have in your account.", "isCorrect": false, "rationale": "It doesn't prevent you from attempting to spend more; it just prevents the transaction from going through if funds are insufficient, thus preventing fees related to overdrafts."}, {"text": "A declined card, while potentially embarrassing, is a less financially damaging consequence than incurring multiple steep overdraft fees for small transactions.", "isCorrect": true, "rationale": "The text explicitly states: 'A declined card is embarrassing; a $35 fee for a $2 transaction is much worse.' Opting out prevents the accumulation of expensive overdraft fees by simply declining transactions when funds are insufficient."}, {"text": "It automatically links your savings account to cover any overages without any charge.", "isCorrect": false, "rationale": "This describes overdraft protection, not opting out of overdraft coverage. Opting out means no coverage at all, leading to declines."}]}, {"question": "What is the key difference between an Overdraft fee and an NSF (Non-Sufficient Funds) fee, as described in the text?", "options": [{"text": "An Overdraft fee applies to debit card purchases, while an NSF fee applies to ATM withdrawals.", "isCorrect": false, "rationale": "Both types of fees can apply to various transaction types; the distinction is not based on the type of transaction (debit card vs. ATM withdrawal)."}, {"text": "An Overdraft fee is charged when a transaction is covered by the bank despite insufficient funds, whereas an NSF fee is charged when a payment is returned (bounced) due to insufficient funds.", "isCorrect": true, "rationale": "The text clearly defines an overdraft as when the bank covers a transaction causing the balance to fall below zero and charges a fee. It states an NSF fee is 'Similar to an overdraft fee, but charged when a payment is returned (bounced) instead of paid.'"}, {"text": "Overdraft fees are typically $5–$12, while NSF fees are much higher, around $25–$35.", "isCorrect": false, "rationale": "The text states that overdraft fees are 'often $25–$35 per occurrence' and NSF fees are 'Commonly $25–$35'. The $5–$12 range is typically for overdraft protection transfer fees, not standard overdraft fees."}, {"text": "NSF fees are only charged for online banking transactions, while Overdraft fees are for in-person transactions.", "isCorrect": false, "rationale": "The text does not specify transaction channel as a differentiator for these fees."}]}, {"question": "Maria is traveling and needs cash. She uses an ATM that is not part of her bank's network. If her bank charges a $2 fee for out-of-network ATMs and the ATM operator charges a $3 fee, how much will Maria be charged in fees for this single transaction?", "options": [{"text": "$2", "isCorrect": false, "rationale": "This is only the fee from her own bank. She will also be charged by the ATM operator."}, {"text": "$3", "isCorrect": false, "rationale": "This is only the fee from the ATM operator. She will also be charged by her own bank."}, {"text": "$5", "isCorrect": true, "rationale": "The text explains that using out-of-network ATMs typically incurs a fee from the ATM operator ($2–$5) and possibly an additional fee from one's own bank ($1–$3). In this case, Maria will be charged $2 by her bank and $3 by the ATM operator, totaling $5."}, {"text": "$0", "isCorrect": false, "rationale": "Fees are explicitly stated for using out-of-network ATMs, from both the ATM operator and potentially the user's own bank."}]}, {"question": "Which strategy would be MOST effective in avoiding the widest range of bank fees mentioned in the section?", "options": [{"text": "Only using debit cards for purchases and avoiding credit cards.", "isCorrect": false, "rationale": "While managing debit card spending can help with overdrafts, it doesn't address other fees like maintenance, ATM, paper statement, or wire transfer fees."}, {"text": "Regularly reviewing your account's fee schedule and setting up relevant alerts and protections.", "isCorrect": true, "rationale": "The text emphasizes reading the fee schedule ('The key takeaway: Fees are avoidable if you know the rules. Read your account's fee schedule'). It also mentions setting up low-balance alerts and overdraft protection as ways to avoid specific fees. This comprehensive approach covers the broadest range of fee avoidance strategies."}, {"text": "Maintaining a very low balance in your checking account to prevent large withdrawals.", "isCorrect": false, "rationale": "Maintaining a low balance is often counterproductive, as it makes you more susceptible to minimum balance fees and overdrafts. The text suggests keeping a 'cushion' to avoid issues."}, {"text": "Using paper statements instead of e-statements to meticulously track spending.", "isCorrect": false, "rationale": "The text specifically warns against paper statement fees and advises switching to e-statements to avoid them. While tracking spending is good, paper statements incur a fee."}]}, {"question": "Consider the various fees discussed: Monthly Maintenance, Overdraft, ATM, NSF, Paper Statement, Excess Withdrawal, and Wire Transfer. Which of these fees, while potentially avoidable, is most often associated with a specific, distinct service that banks inherently charge for?", "options": [{"text": "Monthly Maintenance Fee", "isCorrect": false, "rationale": "Monthly maintenance fees are often waivable by meeting certain conditions, meaning the service (keeping the account open) itself isn't always charged directly if conditions are met."}, {"text": "Overdraft Fee", "isCorrect": false, "rationale": "Overdraft fees are a penalty for insufficient funds, and can often be avoided by opting out of coverage or using overdraft protection, meaning the act of 'covering' an overdraft is not an inherent service you request, but a consequence."}, {"text": "Paper Statement Fee", "isCorrect": false, "rationale": "The paper statement fee is typically avoidable by switching to e-statements, indicating the charge is for the physical delivery method, not the statement itself."}, {"text": "Wire Transfer Fee", "isCorrect": true, "rationale": "The text states 'Wire transfer fee: Charged for electronic bank-to-bank transfers, typically $15–$30.' While it notes 'Most everyday transfers can be done free through other methods,' this implies that the specific service of a wire transfer itself is a charged offering by the bank, distinct from other, free transfer options. Other fees are more penalties or for basic account upkeep that can often be free."}]}, {"question": "In the 'Overdraft Trap' example, Marcus accumulated $105 in fees. Which action, if Marcus had taken it, would have been LEAST effective in preventing this particular sequence of overdraft fees?", "options": [{"text": "Setting up low-balance alerts on his account.", "isCorrect": false, "rationale": "Low-balance alerts would have notified Marcus before his balance became critically low or negative, helping him avoid subsequent transactions that triggered fees. The text explicitly recommends this."}, {"text": "Linking a savings account as overdraft protection.", "isCorrect": false, "rationale": "Overdraft protection would have transferred funds from his savings to cover the shortfalls, replacing the $35 overdraft fees with much smaller transfer fees (e.g., $5–$12) or potentially no fee, significantly reducing his total cost. The text explicitly recommends this."}, {"text": "Keeping a $50–$100 cushion in his checking account at all times.", "isCorrect": false, "rationale": "If Marcus had kept a cushion, his initial $45 payment might not have caused an overdraft, or he would have had funds to cover subsequent small purchases without triggering fees. The text explicitly recommends this."}, {"text": "Switching from paper statements to e-statements for his account.", "isCorrect": true, "rationale": "Switching to e-statements would avoid a paper statement fee (if his bank charged one), but it would not directly prevent the overdraft fees Marcus incurred from spending more money than he had in his account. The problem was immediate fund availability and transaction coverage, not statement delivery."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
