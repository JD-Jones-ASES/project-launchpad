    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 17, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best defines 'time horizon' in the context of investing?", "options": [{"text": "The maximum amount of money an investor is willing to risk.", "isCorrect": false, "rationale": "This describes a component of risk tolerance or a specific investment limit, not time horizon."}, {"text": "The duration an investor plans to keep their money invested before needing it.", "isCorrect": true, "rationale": "The text explicitly defines time horizon as 'the length of time you plan to keep your money invested before you need to use it.'"}, {"text": "The historical period over which a particular investment has generated returns.", "isCorrect": false, "rationale": "This refers to an investment's past performance history, not an individual investor's planning duration."}, {"text": "The interval between market downturns and subsequent recoveries.", "isCorrect": false, "rationale": "While related to market cycles, this describes market volatility patterns, not the investor's personal investment duration."}], "id": "q01"}, {"question": "According to the text, why does a longer time horizon generally allow investors to take on more risk?", "options": [{"text": "Longer time horizons mean lower investment fees, increasing overall returns.", "isCorrect": false, "rationale": "Investment fees are not directly tied to the investor's time horizon in a way that inherently allows more risk-taking; they are a separate factor."}, {"text": "It provides more opportunities to diversify across different asset classes.", "isCorrect": false, "rationale": "Diversification is a general risk management strategy, not the primary reason a longer time horizon itself permits more risk-taking."}, {"text": "There is sufficient time to recover from potential market downturns.", "isCorrect": true, "rationale": "The text states, 'A longer time horizon allows you to take more risk because you have time to recover from market downturns.'"}, {"text": "Market regulations protect long-term investments more effectively.", "isCorrect": false, "rationale": "Market regulations apply broadly and do not offer specific additional protection for longer-term investments to justify higher risk."}], "id": "q02"}, {"question": "An investor is saving for a new car down payment, which they plan to make in 2 years. If the stock market experiences a 25% drop next year, what is the most likely consequence for this investor compared to someone saving for retirement in 30 years?", "options": [{"text": "Both investors will likely need to delay their respective goals by the same amount of time.", "isCorrect": false, "rationale": "The impact of a market drop is significantly different based on time horizon; the long-term investor has more recovery time."}, {"text": "The investor with the 2-year horizon will likely be unable to meet their car purchase goal as planned.", "isCorrect": true, "rationale": "The text explains that a '2-year time horizon, a 20% drop could mean you cannot buy the car or pay the tuition you were saving for.' A short time horizon leaves little room for recovery from significant losses."}, {"text": "The investor with the 30-year horizon will experience greater panic and be more likely to sell.", "isCorrect": false, "rationale": "Emotional tolerance is personal, but a 30-year horizon historically allows recovery, reducing the need for panic-selling compared to a short-term goal."}, {"text": "The market drop will have no significant impact on the investor with the 2-year horizon, as it's a short-term fluctuation.", "isCorrect": false, "rationale": "A 25% drop is very significant for a 2-year time horizon and would likely have a major impact on the ability to achieve the goal."}], "id": "q03"}, {"question": "What are the two primary components of risk tolerance as described in the text?", "options": [{"text": "Market volatility and investment diversification.", "isCorrect": false, "rationale": "Market volatility and investment diversification are external factors related to risk, not internal components of an individual's risk tolerance."}, {"text": "Financial capacity and emotional tolerance.", "isCorrect": true, "rationale": "The text explicitly states: 'Risk tolerance has two components: 1. Financial capacity... 2. Emotional tolerance.'"}, {"text": "Historical returns and projected future growth.", "isCorrect": false, "rationale": "These are metrics used to evaluate investments, not components of an investor's personal ability to handle risk."}, {"text": "Age and income level.", "isCorrect": false, "rationale": "While age and income can influence financial capacity, they are not the direct components of risk tolerance themselves, but rather contributing factors."}], "id": "q04"}, {"question": "An investor initially states they can handle significant losses, but when their portfolio value drops by 20% during a market downturn, they panic and sell all their investments. What does this scenario most clearly illustrate?", "options": [{"text": "The importance of having a diverse investment portfolio.", "isCorrect": false, "rationale": "While diversification is important, the core issue here is the investor's reaction to loss, not the portfolio structure itself."}, {"text": "The investor has a high financial capacity for risk but low emotional tolerance.", "isCorrect": false, "rationale": "Their panic selling suggests a low emotional tolerance, but we cannot assume high financial capacity based on this scenario alone."}, {"text": "The investor accurately assessed their risk tolerance.", "isCorrect": false, "rationale": "Panic selling after claiming to handle losses indicates an *overestimation* of risk tolerance, not an accurate assessment."}, {"text": "The danger of overestimating one's emotional tolerance for losses.", "isCorrect": true, "rationale": "The text warns, 'Overestimating Your Risk Tolerance Is Expensive. Many people say they can handle losses—until they actually experience them.' This scenario perfectly illustrates that warning."}], "id": "q05"}, {"question": "The 'age-in-bonds' rule of thumb suggests that a 40-year-old investor should ideally allocate their portfolio with:", "options": [{"text": "100% in stocks, regardless of age.", "isCorrect": false, "rationale": "This contradicts the 'age-in-bonds' rule, which suggests increasing bond allocation with age."}, {"text": "40% in bonds and 60% in stocks.", "isCorrect": true, "rationale": "The 'age-in-bonds' rule states: 'invest a percentage equal to your age in bonds (safer), and the remainder in stocks (higher growth potential).' For a 40-year-old, this would be 40% bonds and 60% stocks."}, {"text": "60% in bonds and 40% in stocks.", "isCorrect": false, "rationale": "This would be the allocation for a 60-year-old according to the rule, not a 40-year-old."}, {"text": "An equal 50% split between stocks and bonds.", "isCorrect": false, "rationale": "The rule is based on age, not a fixed 50/50 split for everyone."}], "id": "q06"}, {"question": "Why might financial planners suggest younger investors (e.g., in their 20s) lean more aggressively toward stocks, even though stocks carry higher short-term volatility?", "options": [{"text": "Younger investors typically have higher emergency funds, reducing overall risk.", "isCorrect": false, "rationale": "While emergency funds are crucial, they are not the primary reason for recommending aggressive stock allocation for young investors."}, {"text": "Government regulations mandate a higher stock allocation for younger age groups.", "isCorrect": false, "rationale": "No such government mandate exists; investment advice is based on personal finance principles, not regulations for specific age groups."}, {"text": "The biggest risk for young investors over a long horizon is not growing their money fast enough.", "isCorrect": true, "rationale": "The text states, 'Many financial planners suggest younger investors should lean more aggressively toward stocks because the biggest risk when you are 20 is not volatility—it is not growing your money fast enough over 40+ years.'"}, {"text": "Stocks offer guaranteed returns over extended periods, eliminating risk.", "isCorrect": false, "rationale": "Stocks do not offer guaranteed returns; all investments carry risk, though long-term stock performance has historically trended upward."}], "id": "q07"}, {"question": "An individual is saving for retirement, which is 40 years away. Based on the principles discussed in the section, what would be the most appropriate investment strategy for this goal?", "options": [{"text": "Primarily high-yield savings accounts or money market funds to avoid any risk.", "isCorrect": false, "rationale": "This strategy is for very short-term goals (0-2 years) with no investment risk, not for long-term growth like retirement."}, {"text": "A conservative mix of mostly bonds with a small percentage of stocks.", "isCorrect": false, "rationale": "A conservative mix is suitable for goals with a medium-short time horizon (e.g., 4-7 years), where some volatility can be accepted but significant loss must be avoided."}, {"text": "A heavy allocation to stocks, embracing volatility as a long-term growth driver.", "isCorrect": true, "rationale": "The text advises for 'Retirement in 40 years: Heavy stock allocation; volatility is your friend over this time horizon,' due to the long time for recovery and growth."}, {"text": "An aggressive strategy focusing on highly speculative investments like cryptocurrencies.", "isCorrect": false, "rationale": "While an aggressive strategy is recommended, 'highly speculative investments' are not explicitly endorsed or recommended for a general retirement goal in the text. The focus is on stocks for growth."}], "id": "q08"}, {"question": "If an investor needs to save for an emergency fund that might be accessed within the next 12 months, which strategy is most suitable according to the text?", "options": [{"text": "Aggressive investing with a high stock allocation.", "isCorrect": false, "rationale": "Aggressive investing is for long time horizons (e.g., 30+ years) where market volatility can be endured and recovered from."}, {"text": "Conservative investing with a mix of stocks and bonds.", "isCorrect": false, "rationale": "Conservative investing is for goals with a mid-range time horizon (e.g., 3-7 years), where some risk is acceptable but not for immediate needs."}, {"text": "Using a high-yield savings account or money market fund.", "isCorrect": true, "rationale": "The text recommends for an 'Emergency fund (0–2 years): High-yield savings account or money market fund—no investment risk,' as these funds need to be readily accessible and protected from market losses."}, {"text": "Investing primarily in high-growth technology stocks.", "isCorrect": false, "rationale": "High-growth stocks are highly volatile and carry significant risk, completely inappropriate for an emergency fund needed in the short term."}], "id": "q09"}, {"question": "Considering both time horizon and risk tolerance, which statement best summarizes their combined influence on investment strategy?", "options": [{"text": "Risk tolerance is always the dominant factor; time horizon is secondary.", "isCorrect": false, "rationale": "The text states time horizon is 'probably the single most important factor,' suggesting it often holds significant weight, not always secondary."}, {"text": "A longer time horizon can mitigate the effects of low risk tolerance.", "isCorrect": false, "rationale": "A longer time horizon allows *more risk* due to recovery time, but it doesn't fundamentally change an individual's *emotional tolerance* for watching losses. Someone with low emotional tolerance might still panic regardless of time horizon if they over-estimate their tolerance."}, {"text": "These two personal factors are crucial for tailoring an investment strategy that an investor can stick with.", "isCorrect": true, "rationale": "The text opens by saying 'Two personal factors shape every investment decision' and emphasizes that 'The 'best' investment is one you will actually stick with,' highlighting the importance of aligning strategy with personal factors like time horizon and risk tolerance to avoid costly mistakes like panic-selling."}, {"text": "They determine whether an investor should primarily focus on income-generating assets or capital appreciation.", "isCorrect": false, "rationale": "While these factors influence asset allocation, their primary combined influence is on the overall risk level and the type of investments (e.g., stocks vs. bonds) suitable for an individual to maintain their plan, rather than solely the income vs. appreciation focus."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
