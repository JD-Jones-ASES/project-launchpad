<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 21, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How does insurance primarily protect individuals from catastrophic financial losses?", "options": [{"text": "By guaranteeing a profit on their premium payments.", "isCorrect": false, "rationale": "The text states that 'Insurance is not a guarantee of profit. The goal is to protect your financial stability, not to make money from misfortune.'"}, {"text": "By providing a savings account for future emergencies.", "isCorrect": false, "rationale": "The text explicitly states, 'Insurance is not a savings account. You pay premiums, and if you never file a claim, you do not get that money back (with most types of insurance).'"}, {"text": "By distributing the financial risk of a few among many individuals.", "isCorrect": true, "rationale": "The core concept of insurance, as explained, is 'risk pooling,' where 'everyone contributes a small amount to a shared fund' to cover the losses of the few."}, {"text": "By allowing individuals to avoid all financial responsibility for losses.", "isCorrect": false, "rationale": "Insurance pays for 'covered financial losses up to the limits specified,' implying individuals still have responsibilities (like paying premiums) and that not all losses are necessarily covered fully or without deductibles (though deductibles aren't detailed in this section, 'limits' suggest not all responsibility is avoided)."}], "id": "q01"}, {"question": "Which statement best describes the benefit an individual gains by paying insurance premiums?", "options": [{"text": "They are guaranteed to recoup all premium payments if no claim is filed.", "isCorrect": false, "rationale": "The text clarifies that 'if you never file a claim, you do not get that money back (with most types of insurance),' indicating premiums are not recouped."}, {"text": "They trade a small, predictable cost for protection against a large, unpredictable loss.", "isCorrect": true, "rationale": "The section 'Why Risk Pooling Works' directly states, 'You benefit because you trade a small, predictable cost (your premium) for protection against a large, unpredictable loss.'"}, {"text": "They ensure that all small, everyday expenses are covered immediately.", "isCorrect": false, "rationale": "The text states, 'Insurance is not meant for every small expense. It is designed for large, unexpected losses...'"}, {"text": "They contribute to a fund that will primarily generate profit for themselves.", "isCorrect": false, "rationale": "The fund primarily covers the losses of the few; while the insurer makes a profit, the individual's benefit is protection, not personal profit from the fund."}], "id": "q02"}, {"question": "According to the text, what is the primary function of a premium in an insurance contract?", "options": [{"text": "It is a one-time fee paid to activate the policy indefinitely.", "isCorrect": false, "rationale": "The text defines a premium as a 'regular payment' and states that 'If you stop paying, your coverage lapses,' indicating it's not a one-time fee for indefinite coverage."}, {"text": "It represents the maximum amount the insurer will pay for a covered loss.", "isCorrect": false, "rationale": "The maximum amount the insurer will pay is referred to as 'limits specified in your policy,' not the premium."}, {"text": "It is the regular payment made to keep insurance coverage active.", "isCorrect": true, "rationale": "The definition of 'Premium' explicitly states: 'A premium is the regular payment you make to keep your insurance coverage active.'"}, {"text": "It serves as an investment that grows over time.", "isCorrect": false, "rationale": "The text clarifies, 'Insurance is not a savings account. You pay premiums, and if you never file a claim, you do not get that money back (with most types of insurance).'"}], "id": "q03"}, {"question": "A homeowner receives an 'insurance policy' for their house. Based on the text, what specific information would this document contain?", "options": [{"text": "A list of all historical claims made by previous homeowners.", "isCorrect": false, "rationale": "The text does not mention historical claims of previous owners as part of a policy."}, {"text": "The personal financial details of the insurance company's CEO.", "isCorrect": false, "rationale": "This information is irrelevant to the definition and content of an insurance policy."}, {"text": "The legal contract specifying covered losses, exclusions, and payment limits.", "isCorrect": true, "rationale": "The definition of 'Policy' states: 'It specifies exactly what losses are covered, what is excluded, how much the insurer will pay, and what you must pay before coverage kicks in.'"}, {"text": "A guarantee that the homeowner will never experience a loss.", "isCorrect": false, "rationale": "Insurance protects against financial losses when they occur; it does not prevent the actual event or guarantee a loss will never happen."}], "id": "q04"}, {"question": "A driver gets into a car accident and their vehicle is damaged. What is the next step the driver should take according to the insurance vocabulary section?", "options": [{"text": "Immediately stop paying premiums until the car is repaired.", "isCorrect": false, "rationale": "Stopping premium payments would cause the coverage to lapse, leaving the driver unprotected for future incidents."}, {"text": "Submit a claim to their insurance company to request payment for the covered loss.", "isCorrect": true, "rationale": "The definition of 'Claim' states: 'A claim is a formal request you submit to your insurance company asking them to pay for a covered loss.' The example given is 'if your car is hit by another driver, you file a claim.'"}, {"text": "Expect the insurance company to automatically send a check without contact.", "isCorrect": false, "rationale": "A 'formal request' (a claim) is required for the insurance company to process payment."}, {"text": "Sell the damaged car to cover repair costs, as insurance only covers total losses.", "isCorrect": false, "rationale": "The text's example 'if your car is hit by another driver, you file a claim' implies coverage for damages, not solely total losses, and does not suggest selling the car is the primary action."}], "id": "q05"}, {"question": "The ancient Babylonian merchants and Chinese traders employed early forms of insurance primarily to achieve what goal?", "options": [{"text": "To eliminate all risk from commercial ventures entirely.", "isCorrect": false, "rationale": "The text describes these practices as spreading goods or forgiving loans, which mitigate risk but do not eliminate it entirely (e.g., 'if one boat sank, no single merchant lost everything,' implies some loss still occurred, but was shared)."}, {"text": "To profit from the misfortune of others.", "isCorrect": false, "rationale": "These early forms were designed to protect the merchants from their own potential catastrophic losses, not to make a profit from other people's misfortune."}, {"text": "To spread or mitigate the impact of potential catastrophic losses.", "isCorrect": true, "rationale": "Babylonian lenders charging an extra fee for loan forgiveness if goods were lost, and Chinese merchants spreading goods across many boats, are both examples of distributing or reducing the severe impact of a large loss, embodying the principle of risk pooling."}, {"text": "To establish modern insurance companies as we know them today.", "isCorrect": false, "rationale": "The text states that 'Modern insurance companies emerged in 17th-century England,' much later than the ancient Babylonian and Chinese practices."}], "id": "q06"}, {"question": "When shopping for insurance, what comprehensive approach is recommended by the 'Money Tip' section?", "options": [{"text": "Choose the policy with the lowest premium, as price is the main indicator of value.", "isCorrect": false, "rationale": "The 'Money Tip' explicitly states: 'Price alone is not the right measure of a good insurance policy.'"}, {"text": "Select a policy solely based on the company's advertising, assuming all coverage is equal.", "isCorrect": false, "rationale": "The tip advises comparing specific policy details like coverage limits and exclusions, which implies not all coverage is equal or solely based on advertising."}, {"text": "Compare quotes, deductibles, coverage limits, exclusions, and the company's reputation for handling claims.", "isCorrect": true, "rationale": "The 'Money Tip' advises to 'Always get quotes from multiple insurance providers... Compare not only the premium but also the deductible, coverage limits, exclusions, and the company's reputation for handling claims.'"}, {"text": "Only consider policies that explicitly state they are savings accounts.", "isCorrect": false, "rationale": "The text clearly states, 'Insurance is not a savings account.'"}], "id": "q07"}, {"question": "Which statement accurately reflects how the text describes what insurance is NOT?", "options": [{"text": "Insurance is a reliable way to make a profit from unexpected events.", "isCorrect": false, "rationale": "The text states, 'Insurance is not a guarantee of profit. The goal is to protect your financial stability, not to make money from misfortune.'"}, {"text": "Insurance functions as a savings account, returning premiums if no claim is filed.", "isCorrect": false, "rationale": "The text says, 'Insurance is not a savings account. You pay premiums, and if you never file a claim, you do not get that money back...'"}, {"text": "Insurance is designed for large, unexpected losses, not for small, everyday expenses.", "isCorrect": true, "rationale": "This option combines two points from the 'What Insurance Is Not' section: 'Insurance is not meant for every small expense. It is designed for large, unexpected losses that you could not easily pay out of pocket.'"}, {"text": "Insurance guarantees that all financial stability issues will be permanently resolved.", "isCorrect": false, "rationale": "The goal is 'to protect your financial stability,' which is different from a guarantee of permanent resolution for *all* financial stability issues."}], "id": "q08"}, {"question": "Based on the section 'What Insurance Is Not,' for what type of financial need is insurance generally NOT designed?", "options": [{"text": "A catastrophic house fire.", "isCorrect": false, "rationale": "A catastrophic house fire is a large, unexpected loss, precisely what insurance is designed for."}, {"text": "Extensive medical bills from a major accident.", "isCorrect": false, "rationale": "Extensive medical bills from a major accident represent a large, unexpected loss, for which insurance is designed."}, {"text": "The cost of a new tire after hitting a pothole.", "isCorrect": true, "rationale": "The text states, 'Insurance is not meant for every small expense. It is designed for large, unexpected losses that you could not easily pay out of pocket.' The cost of a new tire is generally considered a small expense."}, {"text": "Major property damage from a natural disaster.", "isCorrect": false, "rationale": "Major property damage from a natural disaster is a large, unexpected loss, which is a primary reason for insurance."}], "id": "q09"}, {"question": "Beyond individual protection and insurer profit, what is a significant societal benefit of insurance, as mentioned in the text?", "options": [{"text": "It creates a new form of currency for international trade.", "isCorrect": false, "rationale": "The text does not mention insurance as a form of currency for international trade."}, {"text": "It guarantees full employment in the financial sector.", "isCorrect": false, "rationale": "While insurance companies provide employment, the text does not state that insurance guarantees full employment in the financial sector as a direct societal benefit."}, {"text": "It reduces the number of people facing financial catastrophe from unexpected events.", "isCorrect": true, "rationale": "The 'Why Risk Pooling Works' section explicitly states, 'Society benefits because fewer people face financial catastrophe from unexpected events.'"}, {"text": "It completely eliminates the need for personal savings.", "isCorrect": false, "rationale": "Insurance protects against *large, unexpected losses*, but personal savings are still crucial for other financial goals, emergencies not covered, and smaller expenses, implying it does not eliminate the need for all savings."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
