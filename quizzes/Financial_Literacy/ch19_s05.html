<script>
var QUESTIONS = [{"question": "The fundamental trade-off between Traditional (pre-tax) and Roth (after-tax) retirement accounts is primarily a bet on what factor?", "options": [{"text": "The performance of the stock market over the investment period.", "isCorrect": false, "rationale": "While market performance is crucial for growth, it's not the primary factor distinguishing the tax treatment of Traditional vs. Roth accounts. Both types of accounts can be invested in similar market instruments."}, {"text": "Your personal income tax rate now versus your personal income tax rate in retirement.", "isCorrect": true, "rationale": "The text explicitly states that 'The fundamental trade-off between Traditional (pre-tax) and Roth (after-tax) is a bet on tax rates.' Traditional is best if your tax rate now is higher than in retirement, while Roth is best if your tax rate now is lower."}, {"text": "The total amount of money you can contribute to the account each year.", "isCorrect": false, "rationale": "Contribution limits are regulated by the IRS and affect both Traditional and Roth IRAs similarly, and 401(k)s have separate limits. This is not the fundamental trade-off for *choosing* between the tax treatments."}, {"text": "The age at which you plan to retire and begin withdrawing funds.", "isCorrect": false, "rationale": "Retirement age affects the duration of investment and required minimum distributions for some accounts, but it's not the core differentiator when deciding between the 'pre-tax' or 'after-tax' nature of Traditional versus Roth."}]}, {"question": "An individual is currently in their peak earning years, in a 32% tax bracket. They anticipate a significantly lower tax bracket in retirement. Which type of account is generally more advantageous for new contributions, based on the tax rate framework?", "options": [{"text": "Roth IRA, because taxes are paid now, avoiding higher future taxes.", "isCorrect": false, "rationale": "A Roth IRA involves paying taxes now. If the current tax rate (32%) is higher than the expected retirement tax rate, paying taxes now means paying more than necessary. Traditional is preferred in this scenario."}, {"text": "Traditional IRA or 401(k), because taxes are avoided now and paid later at a lower rate.", "isCorrect": true, "rationale": "The text states Traditional accounts are 'Best if your tax rate now is higher than your tax rate in retirement.' By contributing to a Traditional account, this individual avoids their current high 32% tax and expects to pay taxes in retirement when their rate is lower, thus saving money overall."}, {"text": "A combination of both, split equally to diversify tax risk.", "isCorrect": false, "rationale": "While a combination can be a strategy, for maximizing tax efficiency based on a clear expectation of tax rate changes (high now, low later), one type of account will be distinctly more advantageous."}, {"text": "It makes no difference, as the math is perfectly equivalent regardless of tax rate changes.", "isCorrect": false, "rationale": "The math is only 'perfectly equivalent' when tax rates are *the same* now and in retirement. When tax rates differ, the choice of account significantly impacts the after-tax result."}]}, {"question": "According to the example provided in the text, what is the key conclusion when comparing Roth and Traditional accounts if the tax rate now is *exactly the same* as the tax rate expected in retirement?", "options": [{"text": "Roth accounts consistently yield a higher after-tax total due to their tax-free withdrawals.", "isCorrect": false, "rationale": "The example demonstrates that when tax rates are the same, both accounts produce 'exactly the same after-tax result.' The benefit of tax-free withdrawals from a Roth is offset by paying taxes on contributions upfront."}, {"text": "Traditional accounts are always better because you contribute more initial pre-tax dollars.", "isCorrect": false, "rationale": "While Traditional accounts allow larger pre-tax contributions, the taxes paid at withdrawal negate this advantage when tax rates are identical, leading to the same after-tax amount as Roth."}, {"text": "Both Roth and Traditional accounts produce the exact same after-tax result.", "isCorrect": true, "rationale": "The example clearly concludes: 'When tax rates are the same, Roth and Traditional produce exactly the same after-tax result—$1,212,382. The math is perfectly equivalent.'"}, {"text": "The choice between Roth and Traditional becomes irrelevant, as neither offers a significant advantage.", "isCorrect": false, "rationale": "While the *math* is equivalent, the text explains that Roth still 'wins for young people' even when rates match, due to other factors like RMDs and protection against future tax hikes."}]}, {"question": "Even if a young worker's current tax rate seems similar to their expected retirement tax rate, why does the text suggest a Roth account is generally preferred for them?", "options": [{"text": "Roth accounts always have higher annual returns than Traditional accounts.", "isCorrect": false, "rationale": "The type of account (Roth vs. Traditional) does not dictate the investment returns. Both can hold the same underlying investments. The return rate in the example was an assumed 8% for both."}, {"text": "Young workers are typically in their lowest tax bracket, and their rate is likely to rise as their career advances.", "isCorrect": true, "rationale": "One of the key reasons given is that 'Young workers are typically in their lowest tax bracket—so 'same rates' is unlikely; your rate will probably rise as your career advances.' This makes paying taxes now (Roth) more advantageous."}, {"text": "Traditional accounts have stricter rules about when you can withdraw money without penalty.", "isCorrect": false, "rationale": "While both have rules, the text highlights Required Minimum Distributions (RMDs) as a Roth advantage (no RMDs), which is about forced withdrawals in later life, not necessarily stricter early withdrawal penalties compared to Traditional."}, {"text": "Employer matching contributions are typically larger for Roth 401(k)s than Traditional 401(k)s.", "isCorrect": false, "rationale": "Employer matching usually applies to pre-tax (Traditional) contributions and is not a factor distinguishing Roth from Traditional IRAs or general tax advantages for young people."}]}, {"question": "What is a significant advantage of Roth accounts mentioned in the text regarding future withdrawals, particularly when compared to Traditional accounts or 401(k)s?", "options": [{"text": "They allow for unlimited contributions each year.", "isCorrect": false, "rationale": "Roth accounts are subject to IRS contribution limits, just like Traditional IRAs. They do not allow for unlimited contributions."}, {"text": "They protect account holders if general tax rates rise significantly over many years.", "isCorrect": true, "rationale": "The text states, 'If tax rates in general rise over the next 40 years (a real possibility), Roth account holders are completely protected' because taxes are paid upfront, and withdrawals are tax-free."}, {"text": "They are exempt from all investment fees and management costs.", "isCorrect": false, "rationale": "Investment fees and management costs are determined by the fund manager or broker, not by the tax structure of the account (Roth or Traditional)."}, {"text": "They guarantee a fixed rate of return on investments.", "isCorrect": false, "rationale": "No retirement account type guarantees a fixed rate of return unless specific investment products within the account (like CDs or certain annuities) do so. It's not an inherent feature of a Roth account."}]}, {"question": "What is one key reason a Roth account is particularly beneficial for young people mentioned in the text, unrelated to their current tax bracket or general tax rate increases?", "options": [{"text": "Roth accounts offer better loan options for buying a first home.", "isCorrect": false, "rationale": "While Roth IRAs have certain rules for qualified distributions that can be used for a first-time home purchase without penalty, this specific benefit wasn't listed as a reason Roth 'wins for young people' in the provided text's moneytip section."}, {"text": "Roth accounts allow for completely tax-free inheritance for beneficiaries.", "isCorrect": false, "rationale": "While Roth IRAs can be inherited tax-free, the text emphasizes 'no Required Minimum Distributions' for the account holder as a benefit to young people, focusing on the investor's flexibility."}, {"text": "Roth accounts have no Required Minimum Distributions (RMDs), offering more flexibility in retirement.", "isCorrect": true, "rationale": "The text explicitly states as a reason Roth 'wins for young people' that 'Roth has no Required Minimum Distributions—more flexibility in retirement.' This means account holders are not forced to withdraw money at a certain age."}, {"text": "Roth accounts are easier to set up and manage compared to Traditional accounts.", "isCorrect": false, "rationale": "The ease of setup or management is generally comparable between Roth and Traditional IRAs and is not listed as a specific benefit for young people in the text."}]}, {"question": "Can an individual contribute to both a Roth IRA and a 401(k) in the same year, and how do their contribution limits interact?", "options": [{"text": "No, you must choose to contribute to either an IRA or a 401(k) in any given year.", "isCorrect": false, "rationale": "The text clearly states, 'Yes. Many people contribute to both a Roth IRA and a 401(k) simultaneously.'"}, {"text": "Yes, but your total contributions across both accounts cannot exceed the highest individual limit for either.", "isCorrect": false, "rationale": "The text clarifies that 'The contribution limits are separate—your IRA limit and your 401(k) limit do not affect each other.'"}, {"text": "Yes, and the contribution limits for IRAs and 401(k)s are separate and do not affect each other.", "isCorrect": true, "rationale": "The text confirms: 'Yes. Many people contribute to both a Roth IRA and a 401(k) simultaneously. The contribution limits are separate—your IRA limit and your 401(k) limit do not affect each other.'"}, {"text": "Only if your employer offers both a Roth 401(k) and a Traditional IRA.", "isCorrect": false, "rationale": "The ability to contribute to both is not dependent on the specific types (Roth/Traditional) offered by an employer but rather on the independent nature of IRA and 401(k) limits."}]}, {"question": "According to the common strategy outlined in the text, what is the recommended first step for an individual saving for retirement, particularly if their employer offers a match?", "options": [{"text": "Max out a Roth IRA due to its long-term tax advantages.", "isCorrect": false, "rationale": "While maxing out a Roth IRA is a good step, the suggested strategy prioritizes capturing 'free money' first. The text states: 'contribute to the 401(k) up to the employer match, then max out a Roth IRA...'"}, {"text": "Contribute to the 401(k) up to the full employer match.", "isCorrect": true, "rationale": "The common strategy explicitly states: 'contribute to the 401(k) up to the employer match, then max out a Roth IRA, then go back to the 401(k) if you still have money to invest.' The employer match is essentially free money and should be prioritized."}, {"text": "Invest in a taxable brokerage account for maximum flexibility.", "isCorrect": false, "rationale": "Taxable brokerage accounts are not retirement accounts and do not offer the tax advantages discussed. This is not part of the outlined retirement savings strategy."}, {"text": "Open a Traditional IRA to defer taxes on current income.", "isCorrect": false, "rationale": "Opening a Traditional IRA is not the first step in the outlined strategy, especially if an employer match is available. The match is the immediate priority."}]}, {"question": "A 19-year-old earning $28,000 annually has an employer offering a 50% 401(k) match on the first 4% of salary. Based on the 'Think It Through' example, what is the ideal initial contribution to their 401(k)?", "options": [{"text": "$560, which is the total amount of the employer match.", "isCorrect": false, "rationale": "The employer match is $560, but the initial contribution refers to the employee's contribution to get that match. The employee must contribute 4% of their salary, which is $1,120."}, {"text": "$7,000, which is the typical IRA limit for young individuals.", "isCorrect": false, "rationale": "The IRA limit is for a Roth or Traditional IRA, not a 401(k). The question asks for the initial contribution to the 401(k) to get the match."}, {"text": "$1,120, which is 4% of their $28,000 salary.", "isCorrect": true, "rationale": "The 'Think It Through' example states: 'First, contribute 4% of salary to the 401(k) to get the full employer match—that is 4% $$ $28,000 = $1,120, plus a $560 match.'"}, {"text": "$28,000, which is their entire annual salary.", "isCorrect": false, "rationale": "While it's good to save aggressively, contributing the entire salary to a 401(k) is unrealistic and not the amount needed to secure the match. The 401(k) limit for employees is also much higher than $28,000, but the match is on the first 4%."}]}, {"question": "Following the ideal retirement savings plan for the 19-year-old described in the 'Think It Through' example, after contributing to the 401(k) for the employer match, which account should be prioritized next and why?", "options": [{"text": "A Traditional IRA, to reduce their current taxable income.", "isCorrect": false, "rationale": "For a young person earning $28,000, they are in a low tax bracket (10-12%). The text explicitly states that 'At a low income, the Roth is ideal because you are in the 10–12% bracket and taxes now are cheap,' making a Traditional IRA less advantageous for tax deferral."}, {"text": "A Roth IRA, because they are in a low tax bracket and taxes paid now are 'cheap'.", "isCorrect": true, "rationale": "The suggested answer in the text is: 'Then, open a Roth IRA and contribute what you can afford up to the $7,000 limit. At a low income, the Roth is ideal because you are in the 10–12% bracket and taxes now are cheap.'"}, {"text": "A Health Savings Account (HSA), for its triple tax advantage.", "isCorrect": false, "rationale": "While HSAs offer excellent tax advantages, they are not mentioned in this section as part of the core retirement account choice framework or the specific strategy for the 19-year-old."}, {"text": "More contributions to the 401(k) beyond the employer match.", "isCorrect": false, "rationale": "The strategy outlined prioritizes the employer match, then maxing out a Roth IRA, and *then* going back to the 401(k) if more funds are available. Maxing out the Roth IRA comes before additional 401(k) contributions beyond the match."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
