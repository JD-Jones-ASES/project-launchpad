    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 21, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the \"Life Insurance Overview\" section, what is the primary purpose of life insurance?", "options": [{"text": "To provide financial protection for the policyholder's personal medical expenses in old age.", "isCorrect": false, "rationale": "The text explicitly states that life insurance is 'not primarily about your own protection' and is not related to medical expenses."}, {"text": "To replace the income of the deceased and protect their financial dependents.", "isCorrect": true, "rationale": "The section clearly defines life insurance as being 'designed to replace your income and protect the people who depend on you financially—your dependents—if you die.'"}, {"text": "To act as a savings vehicle that guarantees high investment returns over time.", "isCorrect": false, "rationale": "While whole life insurance has a cash value component, the text warns that its 'cash value growth is poor' compared to other investments, and it is not its primary purpose for most people."}, {"text": "To cover the costs associated with funeral arrangements and estate administration only.", "isCorrect": false, "rationale": "While a death benefit can cover these costs, the primary purpose emphasized is larger-scale income replacement for dependents, not just final expenses."}], "id": "q01"}, {"question": "Consider four individuals:\n1. A 22-year-old single college student with no debts and no dependents.\n2. A 35-year-old parent of two young children, who is the primary income earner.\n3. A 40-year-old professional whose spouse relies entirely on their income.\n4. A 60-year-old retiree whose children are grown and financially independent.\nBased on the text, which individual most urgently needs a substantial life insurance policy for income replacement?", "options": [{"text": "The 22-year-old single college student.", "isCorrect": false, "rationale": "The text states, 'Most single young adults with no dependents do not yet need a large life insurance policy.'"}, {"text": "The 60-year-old retiree.", "isCorrect": false, "rationale": "The retiree's children are financially independent, reducing the need for income replacement through life insurance."}, {"text": "The 35-year-old parent of two young children.", "isCorrect": true, "rationale": "The text emphasizes that life insurance is 'Best for: Most people. A 20- or 30-year term policy purchased in your 20s or 30s covers the years when your dependents need your income most.' Both the 35-year-old parent and 40-year-old professional need coverage, but the 35-year-old with young children aligns most directly with the example and focus on 'dependent years.'"}, {"text": "All four individuals need life insurance equally.", "isCorrect": false, "rationale": "The need for life insurance is dependent on whether 'anyone depend[s] on your income to survive,' which varies greatly among these individuals."}], "id": "q02"}, {"question": "Which of the following is a key distinguishing feature of term life insurance compared to whole life insurance?", "options": [{"text": "It builds a cash value component that can be borrowed against.", "isCorrect": false, "rationale": "This is a feature of whole life insurance, not term life insurance."}, {"text": "It provides coverage for your entire lifetime as long as premiums are paid.", "isCorrect": false, "rationale": "This is a feature of whole life (permanent) insurance, not term life which covers a specific period."}, {"text": "Its premiums are significantly lower for the same death benefit, offering pure protection without an investment component.", "isCorrect": true, "rationale": "The text lists 'Lower cost' and 'Pure protection' as key features of term life, explicitly stating premiums are 'much lower than permanent insurance' and there is 'No investment component.'"}, {"text": "It is generally recommended for complex estate-planning needs rather than income replacement.", "isCorrect": false, "rationale": "The text recommends term life 'for income replacement' for most people, while whole life *can* be used for estate planning but is generally considered complex."}], "id": "q03"}, {"question": "The 'warning' section suggests that for most people, whole life insurance's cash value growth is poor. Why does the text recommend 'simply buying term life and investing the premium difference in a retirement account' instead?", "options": [{"text": "Because whole life policies do not offer any death benefit, unlike term life.", "isCorrect": false, "rationale": "Whole life insurance *does* offer a death benefit; this statement is incorrect."}, {"text": "Because the investment component of whole life policies typically incurs higher fees and provides lower returns compared to dedicated retirement accounts.", "isCorrect": true, "rationale": "The warning implies that the cash value growth within a whole life policy is inferior ('poor compared to simply buying term life and investing the premium difference'), suggesting that separate, dedicated investment vehicles often yield better results due to lower costs and potentially higher returns."}, {"text": "Because term life insurance policies are entirely free and require no premiums.", "isCorrect": false, "rationale": "Both term and whole life insurance policies require regular premium payments."}, {"text": "Because whole life insurance only provides coverage for a specific period, making it less flexible.", "isCorrect": false, "rationale": "Whole life insurance provides lifetime coverage, whereas term life covers a specific period. This statement incorrectly attributes term life's characteristic to whole life."}], "id": "q04"}, {"question": "If a policyholder purchases a 20-year term life insurance policy and outlives the 20-year term, what is the typical outcome?", "options": [{"text": "The policy automatically converts into a whole life policy with a cash value.", "isCorrect": false, "rationale": "Term life policies typically do not automatically convert; they simply expire unless explicitly designed with a conversion option, which is not a typical outcome mentioned for standard term life."}, {"text": "The beneficiaries receive a partial payout of the death benefit as a severance package.", "isCorrect": false, "rationale": "The text explicitly states: 'If you outlive the term, the policy ends and there is no payout.'"}, {"text": "The policy ends, and there is no payout to beneficiaries.", "isCorrect": true, "rationale": "The text clearly states, 'If you outlive the term, the policy ends and there is no payout.'"}, {"text": "The policyholder receives all paid premiums back with interest.", "isCorrect": false, "rationale": "Term life insurance is 'pure protection'; premiums are not returned if no claim is made and the term is outlived."}], "id": "q05"}, {"question": "A financial advisor recommends a married couple, both earning $75,000 annually, consider life insurance. The couple has one young child and a mortgage. Using the common rule of thumb from the text for income replacement, what is the *range* of recommended coverage for one spouse?", "options": [{"text": "$75,000 - $150,000", "isCorrect": false, "rationale": "This range is 1-2 times annual income, whereas the rule of thumb is 10-12 times annual income."}, {"text": "$750,000 - $900,000", "isCorrect": true, "rationale": "The common rule of thumb is to purchase coverage equal to 10–12 times your annual income. For an annual income of $75,000, this calculates to $75,000 * 10 = $750,000 to $75,000 * 12 = $900,000."}, {"text": "$1,500,000 - $1,800,000", "isCorrect": false, "rationale": "This range represents 20-24 times annual income, which is significantly higher than the recommended 10-12 times."}, {"text": "$7,500 - $9,000", "isCorrect": false, "rationale": "This range is 0.1-0.12 times annual income, which is far too low for income replacement."}], "id": "q06"}, {"question": "Beyond the general income multiplier, which of the following factors would specifically indicate a need for *increased* life insurance coverage, according to the text?", "options": [{"text": "Having significant personal savings and investments that are easily accessible.", "isCorrect": false, "rationale": "While beneficial, significant personal savings might reduce the *need* for as much life insurance, as dependents would have other financial resources."}, {"text": "Being single with no children or other financial dependents.", "isCorrect": false, "rationale": "This situation indicates a *reduced* or non-existent need for life insurance for income replacement."}, {"text": "Having a stay-at-home spouse or dependents with high-cost special needs.", "isCorrect": true, "rationale": "The text lists 'More dependents or a stay-at-home spouse' and 'High-cost special needs of a dependent' as factors that 'might increase your coverage need.'"}, {"text": "Reaching an age where premiums become considerably higher.", "isCorrect": false, "rationale": "This factor relates to the *cost* of insurance, not the *amount* of coverage needed based on financial obligations."}], "id": "q07"}, {"question": "In the context of life insurance, what does the term 'underwriting' refer to?", "options": [{"text": "The total amount of money paid out to beneficiaries upon the policyholder's death.", "isCorrect": false, "rationale": "This describes the 'Death benefit,' not underwriting."}, {"text": "The process an insurer uses to evaluate a policyholder's health risk and set their premium.", "isCorrect": true, "rationale": "The text defines 'Underwriting' as 'The process the insurer uses to evaluate your health risk and set your premium.'"}, {"text": "The individual or entity designated to receive the death benefit.", "isCorrect": false, "rationale": "This describes the 'Beneficiary,' not underwriting."}, {"text": "The regular payment made to keep the insurance policy active.", "isCorrect": false, "rationale": "This describes the 'Premium,' not underwriting."}], "id": "q08"}, {"question": "The 'moneytip' for young adults states that the most important insurance-related step is not buying a life insurance policy. What *is* the most important step emphasized for young adults?", "options": [{"text": "Investing heavily in whole life insurance to build cash value early.", "isCorrect": false, "rationale": "The text explicitly warns against whole life insurance for most people due to poor cash value growth and recommends other investment strategies. This is contrary to the 'moneytip' advice."}, {"text": "Ensuring existing accounts like bank accounts and 401(k)s have properly named beneficiaries.", "isCorrect": true, "rationale": "The 'moneytip' states: 'the most important insurance-related step you can take right now is not buying a life insurance policy—it is making sure your existing accounts (bank, retirement, etc.) have properly named beneficiaries.'"}, {"text": "Purchasing the most expensive life insurance policy available to ensure maximum coverage.", "isCorrect": false, "rationale": "The text advocates for appropriate coverage based on need and cost-effectiveness, not simply the 'most expensive' policy."}, {"text": "Avoiding all insurance products until they have significant financial assets.", "isCorrect": false, "rationale": "This ignores the importance of proper beneficiary designation and the potential future need for life insurance as responsibilities grow."}], "id": "q09"}, {"question": "The text includes a 'moneytip' stating, 'Life insurance is cheapest when you are young and healthy. If you do have dependents, locking in a low rate with a 20- or 30-year term policy in your 20s can save you thousands compared to buying later.' What is the underlying reason for this advice?", "options": [{"text": "Younger individuals are less likely to need life insurance, so insurers offer introductory discounts to attract them.", "isCorrect": false, "rationale": "While younger individuals might be less likely to claim, the primary reason for lower costs is tied to health risk, not just 'introductory discounts.'"}, {"text": "Underwriting assesses health risk, and younger, healthier individuals present a lower risk of death during the policy term, resulting in lower premiums.", "isCorrect": true, "rationale": "The text explains underwriting: 'The process the insurer uses to evaluate your health risk and set your premium. Younger and healthier means lower premiums.' This directly supports the advice given in the moneytip."}, {"text": "The government provides subsidies for young adults to purchase life insurance, making it more affordable.", "isCorrect": false, "rationale": "The text does not mention any government subsidies for life insurance for young adults."}, {"text": "Older policies have higher administrative fees, which accumulate over time, making later purchases more expensive.", "isCorrect": false, "rationale": "While administrative fees exist, the primary reason for increased costs with age is the higher health risk, not merely accumulating fees on older policies."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
