    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 2, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best defines 'personal values' according to the text?", "options": [{"text": "The amount of money you are willing to spend on something you desire.", "isCorrect": false, "rationale": "The text explicitly states that values are 'not dollar amounts' and are different from prices."}, {"text": "The beliefs and priorities that guide your decisions and define what matters most to you.", "isCorrect": true, "rationale": "This statement directly reflects the definition provided in the text: 'Values are the beliefs and priorities that guide your decisions and define what matters most to you.'"}, {"text": "Your financial goals, such as saving for a car or a vacation.", "isCorrect": false, "rationale": "While financial goals can be driven by values, values themselves are the underlying beliefs, not the specific goals. Saving for a car might reflect a value of security or independence, for example."}, {"text": "The immediate emotional reactions you have when making a purchase.", "isCorrect": false, "rationale": "Emotional reactions can point to core values, but they are not the values themselves. Values are the deeper beliefs that cause those reactions when upheld or violated."}]}, {"question": "According to the text, what is the most significant role of personal values in a financial context?", "options": [{"text": "They determine the exact prices you are willing to pay for goods and services.", "isCorrect": false, "rationale": "The text clarifies that values are 'not dollar amounts' and are different from prices. While values might influence purchasing decisions, they don't directly set prices."}, {"text": "They predict your future income and potential for wealth accumulation.", "isCorrect": false, "rationale": "The text does not link values to income prediction. Values influence how money is used, not how much is earned."}, {"text": "They drive your spending habits and reflect what you care about most.", "isCorrect": true, "rationale": "The text states, 'your values have enormous power — because your values drive your spending. Whether you realize it or not, the way you spend money is a reflection of what you care about most.'"}, {"text": "They simplify complex financial investment strategies.", "isCorrect": false, "rationale": "The text does not mention values simplifying investment strategies. Their role is in guiding personal spending decisions."}]}, {"question": "If someone's spending shows a significant portion of their money going towards concert tickets, restaurant meals with friends, and weekend trips, what would an observer most likely conclude about their values?", "options": [{"text": "They primarily value appearance and material possessions.", "isCorrect": false, "rationale": "Spending on concerts, meals, and trips aligns more with experiences and relationships, not typically material possessions or appearance which would involve clothes, gadgets, etc."}, {"text": "They prioritize security and long-term financial planning.", "isCorrect": false, "rationale": "While these are valid values, spending on experiences (concerts, meals, trips) does not directly indicate a priority for financial security or savings; rather, it suggests an emphasis on immediate enjoyment and social connection."}, {"text": "They value experiences, relationships, and social connection.", "isCorrect": true, "rationale": "The text states, 'If most of your money goes toward going out with friends, they might conclude you value relationships and experiences.' Concerts, restaurant meals, and trips fall under these categories."}, {"text": "They are likely making impulsive spending decisions without clear values.", "isCorrect": false, "rationale": "While some spending could be impulsive, the consistent allocation towards experiences suggests a deliberate choice that reflects underlying values, even if not consciously articulated."}]}, {"question": "A student states that their top value is 'education and intellectual growth.' However, their spending records show they rarely buy books or educational materials and instead spend heavily on new video games and streaming services. What does this situation indicate?", "options": [{"text": "They are successfully engaging in values-based spending by prioritizing personal enjoyment.", "isCorrect": false, "rationale": "Values-based spending means aligning spending with actual priorities. If their stated top value is education, but their spending doesn't reflect it, it's not values-based spending, but a mismatch."}, {"text": "They have not accurately identified their true underlying values.", "isCorrect": false, "rationale": "While this might be a possibility, the text specifically highlights the 'mismatch' or 'gap' between what one says they value and what their spending shows. The problem is the misalignment, not necessarily a misidentification of the value itself, though reflection might lead to re-evaluation."}, {"text": "There is a mismatch between their stated values and their actual spending patterns.", "isCorrect": true, "rationale": "The text explicitly discusses this: 'But there can be a mismatch between what you say you value and what your spending shows you value.' The example of 'family is everything' but spending on entertainment, or Deja's situation, illustrates this gap."}, {"text": "Video games and streaming services are now considered essential for intellectual growth.", "isCorrect": false, "rationale": "While entertainment can have benefits, the text implies that 'educational materials' would more directly align with 'education and intellectual growth.' This option misinterprets the core conflict presented."}]}, {"question": "What is the primary objective of 'values-based spending'?", "options": [{"text": "To accumulate as much money as possible in savings accounts.", "isCorrect": false, "rationale": "While saving can be a value, values-based spending is about aligning all spending with priorities, not solely about accumulation. Some values might lead to spending money on experiences or specific items."}, {"text": "To make sure all spending is on 'serious' or 'productive' items, avoiding entertainment.", "isCorrect": false, "rationale": "The text explicitly states: 'This does not mean spending only on “serious” things. If you genuinely value fun and social connection, then spending money on those things is aligned with your values.'"}, {"text": "To eliminate all impulsive purchases and always stick to a rigid budget.", "isCorrect": false, "rationale": "While it encourages intentionality over impulsivity, the primary objective is aligning spending with values, not just eliminating impulse purchases, which might be a means to that end. A 'rigid budget' isn't the direct goal either."}, {"text": "To deliberately direct money towards what matters most to you, ensuring spending reflects actual priorities.", "isCorrect": true, "rationale": "This is the direct definition from the text: 'Values-based spending is the practice of deliberately directing your money toward the things that matter most to you, so that your spending reflects your actual priorities.'"}]}, {"question": "Student A values experiences and memories, using $500 for a trip to visit grandparents. Student B values security and independence, putting $400 into savings and $100 for a used textbook. According to the text, what can be concluded about their choices?", "options": [{"text": "Student A made a less responsible choice than Student B because experiences are fleeting.", "isCorrect": false, "rationale": "The text states, 'Neither choice is wrong.' The value of experiences is subjective and valid if it aligns with one's priorities, and the text notes research shows satisfaction from experiences."}, {"text": "Both students are practicing values-based spending because they made conscious choices aligned with their individual priorities.", "isCorrect": true, "rationale": "The text explains: 'Neither choice is wrong. Both are examples of values-based spending — the money went where it mattered most to each person. The key is that each student made a conscious choice rather than spending impulsively.'"}, {"text": "Only Student B's choice is an example of values-based spending because it involves saving and investing.", "isCorrect": false, "rationale": "Values-based spending is about aligning with *personal* values, which can include experiences, not just financial security or investment. Student A's choice aligns with their value for experiences."}, {"text": "Student A's decision was impulsive, while Student B's was well-planned.", "isCorrect": false, "rationale": "The text states that the key for both was making 'a conscious choice rather than spending impulsively,' implying both decisions were intentional based on their values."}]}, {"question": "Aisha saves $80/month and spends $60 on social outings and $40 on a guitar. Deja saves $20/month and spends $100 on clothes, $50 eating out, and $30 on subscriptions. If Deja states she values 'saving for a car' most, what is the most appropriate conclusion?", "options": [{"text": "Aisha's spending is more aligned with typical financial values than Deja's.", "isCorrect": false, "rationale": "The text emphasizes that there is 'no 'right' set of values.' Both Aisha and Deja's spending reflect their *actual* values. The issue for Deja isn't about 'typical' values but a mismatch with her *stated* ones."}, {"text": "Deja's spending clearly reflects a high value for self-expression and entertainment, but not for her stated goal of saving for a car.", "isCorrect": true, "rationale": "The text states, 'Her spending reflects her values too: self-expression through fashion, social dining, and entertainment. But if Deja is asked 'what do you value most?' and she answers 'saving for a car,' there is a mismatch. Her actions (saving only $20/month) do not match her stated goal.'"}, {"text": "Deja is being financially reckless because she is not saving enough compared to Aisha.", "isCorrect": false, "rationale": "The text explicitly states, 'Neither is being reckless.' The issue is the *mismatch* between stated and actual values, not necessarily recklessness."}, {"text": "Deja should immediately change her spending habits to match Aisha's, as Aisha's values are better.", "isCorrect": false, "rationale": "The text advises examining the gap, not necessarily changing to someone else's pattern. There is no 'better' set of values; the goal is self-alignment."}]}, {"question": "Which sequence correctly outlines the first three steps suggested in the text for aligning your values with your spending?", "options": [{"text": "1. Write down financial goals. 2. Create a detailed budget. 3. Reduce non-essential spending.", "isCorrect": false, "rationale": "These are general financial planning steps, but not the specific ones outlined in the text for aligning values with spending."}, {"text": "1. Identify all past impulsive purchases. 2. Categorize spending into needs vs. wants. 3. Set a strict spending limit.", "isCorrect": false, "rationale": "These are related concepts but do not match the explicit three-step process given in the 'Aligning Values with Spending' section."}, {"text": "1. Write down your top three to five personal values. 2. Look at your last month's spending. 3. Ask: does my spending reflect what I said I value?", "isCorrect": true, "rationale": "This is the exact sequence of steps provided in the text for aligning values with spending: '1. Write down your top three to five personal values. 2. Look at your last month's spending... 3. Ask: does my spending reflect what I said I value?'"}, {"text": "1. Research common spending values. 2. Consult a financial advisor. 3. Adjust your spending to mirror others.", "isCorrect": false, "rationale": "The text focuses on personal reflection and alignment, not external research, professional advice, or mirroring others' spending."}]}, {"question": "What is identified as the core problem with 'mindless spending'?", "options": [{"text": "It consistently leads to overspending and accumulating debt.", "isCorrect": false, "rationale": "While mindless spending can lead to debt, the text's core definition of the problem isn't about the outcome of debt, but the lack of intentionality."}, {"text": "It means spending money on things that are not considered 'serious' or 'productive'.", "isCorrect": false, "rationale": "The text clarifies that if you value fun, spending on it is aligned. The problem isn't the type of spending, but the lack of thought behind it."}, {"text": "It makes it impossible to save money for long-term goals.", "isCorrect": false, "rationale": "Mindless spending can hinder saving, but it doesn't make it 'impossible.' The core problem, as defined, is about the absence of conscious alignment."}, {"text": "Money leaves your hands without you thinking about whether it reflects what matters to you.", "isCorrect": true, "rationale": "The text directly states: 'The problem is mindless spending — money leaving your hands without you even thinking about whether it reflects what matters to you.'"}]}, {"question": "The text suggests that understanding your values is not a one-time exercise and provides a 'money tip.' What is the most significant long-term implication of this advice?", "options": [{"text": "Values are static and, once identified, will never change throughout your life.", "isCorrect": false, "rationale": "The text explicitly states: 'Your values may shift as you grow and your circumstances change.' Thus, they are not static."}, {"text": "It's best to wait until you have a stable income before seriously considering your values and spending.", "isCorrect": false, "rationale": "The 'money tip' advises the opposite: 'Before you earn much money, it is the perfect time to think about your values — before habits and impulses take over.'"}, {"text": "Continuously checking if spending reflects values is a powerful, ongoing tool for personal finance.", "isCorrect": true, "rationale": "The text concludes: 'The habit of checking in — does my spending reflect what I care about? — is one of the most powerful tools in personal finance.' It's an ongoing, dynamic process."}, {"text": "Spending money on experiences always brings more lasting satisfaction than on objects.", "isCorrect": false, "rationale": "The 'did you know' section mentions this research but qualifies it: 'Of course, that does not mean experiences are always the right choice — it means thinking about what actually brings you lasting satisfaction.' This is not the overall long-term implication of the 'money tip' and conclusion."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
