<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 9, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the primary purpose of an emergency fund?", "options": [{"text": "To invest money for long-term wealth growth.", "isCorrect": false, "rationale": "The text explicitly states an emergency fund is 'not invested' and its purpose is not wealth growth, but rather financial security for unexpected events."}, {"text": "To cover large, unexpected expenses or provide income during a job loss.", "isCorrect": true, "rationale": "The definition provided states, 'An emergency fund is money set aside specifically to cover large, unexpected expenses or to provide income during a job loss or income disruption.'"}, {"text": "To fund discretionary spending opportunities that arise suddenly.", "isCorrect": false, "rationale": "The text clearly distinguishes between 'true emergencies' and 'spending opportunities that feel urgent,' warning against using the fund for the latter."}, {"text": "To accumulate savings for a down payment on a house or car.", "isCorrect": false, "rationale": "While a down payment is a savings goal, it is typically an anticipated expense and would be handled by a specific 'sinking fund' rather than an emergency fund."}]}, {"question": "How does an emergency fund primarily 'break the debt cycle,' as described in the section?", "options": [{"text": "By making it easier to qualify for lower interest rates on existing debt.", "isCorrect": false, "rationale": "While an improved financial situation might indirectly help with credit scores, the text does not state that an emergency fund directly impacts existing debt interest rates."}, {"text": "By preventing emergencies from creating new debt in the first place.", "isCorrect": true, "rationale": "The text explains, 'An emergency fund breaks the cycle at the first step' by providing ready cash for emergencies, thus avoiding the need to use high-interest credit cards and incur debt."}, {"text": "By allowing individuals to pay off all their existing credit card balances immediately.", "isCorrect": false, "rationale": "The fund is for *new* unexpected expenses, not necessarily for clearing pre-existing debt, though having a fund can free up cash flow to do so over time."}, {"text": "By reducing the financial strain caused by regular monthly expenses.", "isCorrect": false, "rationale": "An emergency fund addresses *unexpected* expenses, not regular, predictable monthly expenses, though it does provide peace of mind which can reduce overall financial stress."}]}, {"question": "Based on the comparison between Marcus and Sofia regarding their furnace repair, what is the most significant factor that determined their differing financial outcomes?", "options": [{"text": "The efficiency and cost of the repair service they chose.", "isCorrect": false, "rationale": "The text explicitly states, 'The furnace repair was identical,' implying the service and cost were the same for both."}, {"text": "Their ability to pay for the repair directly from a readily available emergency fund.", "isCorrect": true, "rationale": "The text concludes, 'The financial outcome was completely different—determined entirely by whether they had prepared in advance,' with Marcus having an emergency fund and Sofia not."}, {"text": "The interest rate on the credit card Sofia used for the repair.", "isCorrect": false, "rationale": "While the high interest rate contributed to Sofia's higher total cost, the fundamental difference was her *lack* of an emergency fund, which *forced* her to use the credit card in the first place."}, {"text": "The amount of time it took for each person to get their furnace fixed.", "isCorrect": false, "rationale": "Marcus's furnace was fixed in two days, but the text doesn't specify Sofia's repair time, focusing instead on the financial implications."}]}, {"question": "Which of the following characteristics is *not* associated with a properly structured emergency fund, according to the text?", "options": [{"text": "It is held in a separate, accessible savings account.", "isCorrect": false, "rationale": "The text states, 'The emergency fund is held in a separate, accessible savings account.'"}, {"text": "It is invested in high-return assets to grow wealth quickly.", "isCorrect": true, "rationale": "The text explicitly states an emergency fund is 'not invested,' indicating its priority is accessibility and stability over growth."}, {"text": "It provides financial security and peace of mind.", "isCorrect": false, "rationale": "The text clearly defines its purpose as 'financial security and peace of mind.'"}, {"text": "It is not mixed with regular spending money.", "isCorrect": false, "rationale": "The text notes it is 'not mixed with regular spending money,' emphasizing its separate nature."}]}, {"question": "Which situation would be considered a 'true emergency' warranting the use of an emergency fund, according to the criteria provided?", "options": [{"text": "Discovering a 50%-off sale on a high-end jacket you've wanted.", "isCorrect": false, "rationale": "This is an optional spending opportunity, not 'necessary,' and would not cause 'serious harm' if unaddressed, making it an inappropriate use."}, {"text": "Needing to purchase tickets for a highly anticipated concert next month.", "isCorrect": false, "rationale": "This is an optional, anticipated expense for entertainment, not a necessary event that would cause serious harm if not addressed immediately."}, {"text": "Losing your job and needing to cover rent while searching for new employment.", "isCorrect": true, "rationale": "This fits the criteria of an 'unexpected' event ('job loss or income disruption') that is 'necessary' to address (shelter) and would cause 'serious harm' (homelessness) if unaddressed."}, {"text": "Buying a birthday gift for your best friend after forgetting to save for it.", "isCorrect": false, "rationale": "While a gift may feel urgent, it is generally an anticipated (or should be) and optional expense, not a 'true emergency' that would cause serious harm if not funded by the emergency fund."}]}, {"question": "The text states that 'life does not follow a budget' and 'something unexpected and expensive will happen to you.' What is the core message conveyed by these statements regarding financial planning?", "options": [{"text": "Financial emergencies are rare occurrences that most people can avoid with careful budgeting.", "isCorrect": false, "rationale": "The text explicitly states emergencies 'are absolutely predictable in their existence' and 'will happen to you,' contradicting the idea that they are rare or avoidable."}, {"text": "It's impossible to prepare for unexpected expenses, so saving for them is futile.", "isCorrect": false, "rationale": "The entire section advocates for preparing for these inevitable events through an emergency fund, directly countering the idea that preparation is futile."}, {"text": "While the timing of emergencies is unpredictable, their occurrence is inevitable, necessitating preparation.", "isCorrect": true, "rationale": "The text states, 'These events are not predictable in their timing, but they are absolutely predictable in their existence: at some point, something unexpected and expensive will happen to you.' This highlights the inevitability and the need to be prepared."}, {"text": "Most financial emergencies can be resolved by simply adjusting other budget categories.", "isCorrect": false, "rationale": "The text implies that major emergencies, if not covered by a fund, typically lead to debt, suggesting that mere budget adjustments are insufficient."}]}, {"question": "Why does the text caution against using a credit card as the primary 'backup' for emergencies?", "options": [{"text": "Credit cards typically have low credit limits that cannot cover significant emergencies.", "isCorrect": false, "rationale": "While some may have low limits, the text does not focus on credit limits as the primary problem. The example of Sofia shows a $900 charge, which is a moderate expense."}, {"text": "Relying on a credit card can lead to high-interest debt and perpetuate a 'debt cycle.'", "isCorrect": true, "rationale": "The text explicitly states, 'Without an emergency fund, almost every financial emergency becomes a debt event' and describes how high interest rates on credit cards create a 'debt cycle,' making it a 'costly misunderstanding' to rely on them."}, {"text": "Credit cards are not universally accepted for all types of emergency payments.", "isCorrect": false, "rationale": "The text does not discuss acceptance issues; the focus is on the financial implications of using credit for emergencies."}, {"text": "Obtaining a new credit card quickly enough for an immediate emergency is often difficult.", "isCorrect": false, "rationale": "The text assumes individuals already have credit cards and discusses the consequences of using them for emergencies, rather than the difficulty of acquiring one."}]}, {"question": "For someone with no savings, what is the recommended initial step for building an emergency fund?", "options": [{"text": "Immediately save enough to cover 3-6 months' worth of living expenses.", "isCorrect": false, "rationale": "While this is the long-term goal, the text suggests an initial, smaller step for those with no savings, acknowledging that 'something is infinitely better than nothing.'"}, {"text": "Focus on investing in a high-growth stock portfolio to quickly accumulate funds.", "isCorrect": false, "rationale": "The text advises against investing emergency funds due to the need for accessibility and stability, not growth."}, {"text": "Establish a 'starter emergency fund' of $500 to $1,000 to cover minor emergencies.", "isCorrect": true, "rationale": "The 'moneytip' states, 'If you currently have nothing in savings, your first goal is a starter emergency fund of $500 to $1,000.' This handles minor emergencies without debt."}, {"text": "Prioritize paying off all existing debt completely before starting any savings.", "isCorrect": false, "rationale": "While paying off debt is important, the text advocates for starting a small emergency fund first to prevent *new* debt from emergencies."}]}, {"question": "According to the 'warning' section, what is identified as the 'biggest threat' to an emergency fund?", "options": [{"text": "Low interest rates in savings accounts diminishing the fund's value over time.", "isCorrect": false, "rationale": "The warning focuses on internal threats to the fund's purpose, not external economic factors like interest rates, which are not the 'biggest threat' to its *availability* for true emergencies."}, {"text": "Inflation eroding the purchasing power of the money held in the fund.", "isCorrect": false, "rationale": "Similar to low interest rates, inflation is an external economic factor not identified as the 'biggest threat' to the fund's existence when a true emergency strikes."}, {"text": "Fraudulent charges or unexpected bank fees depleting the fund.", "isCorrect": false, "rationale": "While these are financial risks, the text's specific 'warning' focuses on a different, behavioral threat to the fund's integrity."}, {"text": "The temptation to use the fund for non-emergencies or 'urgent' spending opportunities.", "isCorrect": true, "rationale": "The text states, 'The biggest threat to an emergency fund is yourself. The temptation to dip into the fund for things that “sort of” feel like emergencies is real.'"}]}, {"question": "A student's laptop breaks right before final exams. Applying the criteria for a 'true emergency,' would this typically be a legitimate use of an emergency fund?", "options": [{"text": "No, because electronics are usually covered by a separate insurance policy.", "isCorrect": false, "rationale": "While insurance might exist, the question asks about the emergency fund criteria. The text doesn't stipulate insurance coverage as a prerequisite for emergency fund use."}, {"text": "Yes, because it is unexpected, necessary for academic performance, and would cause serious harm if unaddressed.", "isCorrect": true, "rationale": "This situation is 'unexpected,' 'necessary' for crucial academic work, and its unaddressed state would cause 'serious harm' (failing exams), thus meeting the criteria for a true emergency."}, {"text": "No, because buying a new laptop is an optional upgrade, not an emergency.", "isCorrect": false, "rationale": "A broken laptop before finals is not an optional upgrade; it's a critical tool's failure, making it necessary to address to avoid serious academic harm."}, {"text": "Yes, but only if the student has no other means of income or support.", "isCorrect": false, "rationale": "The emergency fund criteria are about the nature of the event itself (unexpected, necessary, serious harm), not solely about the individual's income, although ability to pay is implicit in using the fund."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
