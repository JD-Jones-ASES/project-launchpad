    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz

</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is identified as the primary underlying reason for money being a leading cause of conflict in marriages?", "options": [{"text": "Disagreements over basic mathematical calculations related to budgeting.", "isCorrect": false, "rationale": "The text explicitly states, 'Not because couples disagree about math — they disagree about values.'"}, {"text": "Differences in financial values, spending habits, and upbringing regarding money.", "isCorrect": true, "rationale": "The text highlights that couples 'disagree about values,' citing examples like aggressive saving versus never thinking about money, and varying debt levels based on individual backgrounds."}, {"text": "The complexity of managing investments and retirement accounts together.", "isCorrect": false, "rationale": "While investment management can be complex, the text identifies deeper 'values' as the primary conflict driver, not merely complexity of accounts."}, {"text": "A general lack of sufficient income to cover shared expenses.", "isCorrect": false, "rationale": "The text focuses on *disagreements* about money and values, rather than just the absolute amount of income as the primary cause of conflict."}], "id": "q01"}, {"question": "Which of the following is explicitly listed as an important question to cover during a detailed financial conversation before marriage?", "options": [{"text": "Plans for future career changes or educational pursuits.", "isCorrect": false, "rationale": "While relevant to future finances, this specific question is not explicitly listed in the 'itemize' section for pre-marital financial conversation."}, {"text": "How money was handled in each person's family while growing up.", "isCorrect": true, "rationale": "The text explicitly lists, 'How was money handled in each person's family growing up?' as a key topic for discussion before marriage."}, {"text": "Preferred vacation destinations and frequency.", "isCorrect": false, "rationale": "This topic is about leisure preferences and is not included in the financial conversation bullet points."}, {"text": "Desired number of children and their names.", "isCorrect": false, "rationale": "This relates to family planning, not the specific financial topics outlined for pre-marital discussion."}], "id": "q02"}, {"question": "In states with community property laws, which of the following scenarios best describes an asset that would likely be considered 'separate property'?", "options": [{"text": "A car purchased by one spouse using income earned during the marriage.", "isCorrect": false, "rationale": "Assets acquired using income earned *during* the marriage are typically considered community property."}, {"text": "A joint savings account funded by both spouses' paychecks after marriage.", "isCorrect": false, "rationale": "Joint accounts funded by income earned during marriage are a clear example of community property."}, {"text": "An inheritance received by one spouse during the marriage.", "isCorrect": true, "rationale": "The definition states that 'assets or debts that were owned before the marriage, or received as gifts or inheritance during the marriage, which remain the individual's property' are considered separate property."}, {"text": "A house purchased by both spouses after getting married.", "isCorrect": false, "rationale": "Real estate purchased jointly *during* the marriage is generally considered community property."}], "id": "q03"}, {"question": "A newly married couple wants to simplify their financial management as much as possible, ensuring both partners have full insight into all income and expenses without needing to track individual contributions to shared bills. Which approach to combining finances would best suit their needs?", "options": [{"text": "Fully separate accounts, with each partner managing their own finances.", "isCorrect": false, "rationale": "This approach maximizes individual autonomy but would make full insight into *all* income and expenses more complicated, as it requires agreed formulas for splitting shared costs."}, {"text": "Yours-mine-ours (hybrid) approach, with personal and joint accounts.", "isCorrect": false, "rationale": "While good for autonomy and shared goals, this approach still involves separate personal accounts, which does not provide full insight into *all* income and expenses as desired for maximum simplicity and transparency across the board."}, {"text": "Fully combined (joint accounts for everything).", "isCorrect": true, "rationale": "The text states this approach is 'Simplest to manage; requires complete financial transparency and strong communication,' directly matching the couple's desire for simplicity and full insight into all finances."}, {"text": "Maintaining separate credit cards but using a single joint savings account.", "isCorrect": false, "rationale": "This is not one of the three common approaches described, and separate credit cards would complicate full transparency of all expenses."}], "id": "q04"}, {"question": "Sarah and Tom want to manage their finances together for shared goals like rent and utilities, but also want to retain some individual freedom for personal spending without needing to justify every purchase to each other. Which financial approach would be most appropriate for them, according to the text?", "options": [{"text": "Fully combined (joint accounts for everything).", "isCorrect": false, "rationale": "This approach requires complete transparency for all spending, which would not align with their desire for individual freedom for personal spending."}, {"text": "Fully separate (individual accounts).", "isCorrect": false, "rationale": "While offering individual autonomy, this approach makes managing *shared goals* and building a cohesive 'shared financial life' more complicated than desired for combined expenses."}, {"text": "Yours-mine-ours (hybrid).", "isCorrect": true, "rationale": "The text describes this approach as preserving 'some autonomy while building shared financial life,' with each partner maintaining a personal account for individual spending and contributing to a joint account for shared expenses and goals, which perfectly fits Sarah and Tom's needs."}, {"text": "Establishing a complex trust fund for all their assets.", "isCorrect": false, "rationale": "This is not one of the three common approaches to combining finances discussed in the text."}], "id": "q05"}, {"question": "The 'money tip' section suggests scheduling a regular 'money date.' What is the primary benefit of couples regularly engaging in this activity?", "options": [{"text": "It guarantees that couples will never experience any financial disagreements.", "isCorrect": false, "rationale": "The text states 'significantly less likely to have financial conflicts,' not that it guarantees their complete absence."}, {"text": "It simplifies the process of updating beneficiary designations on all financial accounts.", "isCorrect": false, "rationale": "While important, updating beneficiary designations is a separate administrative task, not the primary benefit of a money date, which is focused on reviewing the budget and goals."}, {"text": "It significantly reduces the likelihood of financial conflicts within the marriage.", "isCorrect": true, "rationale": "The text explicitly states, 'Couples who regularly discuss money are significantly less likely to have financial conflicts,' making this the primary benefit."}, {"text": "It serves as the main method for managing separate property from community property.", "isCorrect": false, "rationale": "A money date is for general financial review, not a specific legal mechanism for distinguishing property types."}], "id": "q06"}, {"question": "Among the legal and administrative changes to address after marriage, which one is explicitly stated to 'override your will' and therefore requires immediate attention?", "options": [{"text": "Updating your tax filing status.", "isCorrect": false, "rationale": "Tax filing status is an important administrative change, but it does not override the provisions of a will."}, {"text": "Reviewing health insurance options.", "isCorrect": false, "rationale": "Health insurance choices are critical for coverage and cost but do not have the power to override a will."}, {"text": "Updating beneficiary designations.", "isCorrect": true, "rationale": "The text clearly states, 'Your retirement accounts (IRA, 401k), life insurance, and bank accounts all have beneficiary designations that override your will. Update them after marriage.'"}, {"text": "Considering a prenuptial agreement.", "isCorrect": false, "rationale": "A prenuptial agreement is a legal document created *before* marriage, and while impactful, it's not the specific post-marriage update described as overriding a will."}], "id": "q07"}, {"question": "Why does the text advise couples to 'Consider a will and powers of attorney' even after they are married?", "options": [{"text": "To ensure they can file taxes as 'married filing jointly' efficiently.", "isCorrect": false, "rationale": "Wills and powers of attorney are unrelated to tax filing status; they concern estate planning and legal authority."}, {"text": "Because marriage automatically grants a spouse full legal authority over all accounts and medical decisions.", "isCorrect": false, "rationale": "The text explicitly refutes this, stating: 'Marriage does not automatically give your spouse legal authority over all your accounts and decisions — especially in a medical emergency.'"}, {"text": "To legally formalize the 'yours-mine-ours' approach to combining finances.", "isCorrect": false, "rationale": "Wills and powers of attorney are for estate and health decisions, not for structuring day-to-day financial management approaches."}, {"text": "Because marriage does not automatically grant a spouse legal authority over all accounts and decisions, especially in emergencies.", "isCorrect": true, "rationale": "The text directly states, 'Marriage does not automatically give your spouse legal authority over all your accounts and decisions — especially in a medical emergency,' making a will and powers of attorney essential for granting such authority."}], "id": "q08"}, {"question": "John and Mary are getting married and plan to move to a community property state. John has significant student loan debt from before they met. Based on the 'warning' section, what crucial step should they take regarding this debt?", "options": [{"text": "Assume Mary will automatically become equally responsible for John's student loans upon marriage.", "isCorrect": false, "rationale": "The text warns that 'Student loans taken before marriage remain the individual's responsibility in most states — but in community property states, debt policy varies.' It advises *understanding* the policy, not making assumptions."}, {"text": "Prioritize updating beneficiary designations on all their accounts before addressing the debt.", "isCorrect": false, "rationale": "While beneficiary designations are important, the 'warning' specifically addresses pre-marital student debt in community property states, advising a different immediate step."}, {"text": "Understand how their specific state treats marital debt before completely combining finances.", "isCorrect": true, "rationale": "The 'warning' states, 'If one partner carries significant debt, understand how your state treats marital debt before combining finances completely,' which is the exact advice given for this situation."}, {"text": "Immediately pay off all of John's student loans with joint funds to avoid future complications.", "isCorrect": false, "rationale": "This is a potential financial *action*, not the *advice* given by the warning, which is to first *understand* the legal implications of the debt in their specific state."}], "id": "q09"}, {"question": "Which statement best encapsulates the overarching advice provided in the 'Marriage and Money' section for couples?", "options": [{"text": "The most crucial step is to always fully combine all finances into joint accounts immediately after marriage for simplicity.", "isCorrect": false, "rationale": "The text presents multiple approaches to combining finances and stresses proactive discussion over a single mandated method, especially not 'immediately' without conversation."}, {"text": "Financial transparency and proactive, open communication about values, habits, and plans are paramount before and throughout the marriage.", "isCorrect": true, "rationale": "This statement synthesizes key themes: the importance of pre-marital conversations about values, spending, and debt; the need for communication in chosen financial approaches; and the benefit of regular 'money dates' to prevent conflict. It emphasizes ongoing communication as central."}, {"text": "It is generally best to keep finances entirely separate to maximize individual autonomy and avoid all potential conflicts.", "isCorrect": false, "rationale": "While 'fully separate' is an option, the text doesn't universally endorse it as 'best' or as a way to 'avoid all conflicts,' and also highlights the benefits of shared financial life."}, {"text": "The primary focus after marriage should be on updating legal documents, as these changes automatically resolve most financial issues.", "isCorrect": false, "rationale": "While legal changes are important, the text emphasizes that underlying financial values and communication are the root of conflict, and legal updates alone do not 'automatically resolve most financial issues.'"}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
