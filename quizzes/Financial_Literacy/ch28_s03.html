<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 28, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A recent high school graduate has started a $1,000 emergency fund and their employer offers a 401(k) match. They also have $5,000 in credit card debt with a 22% APR. According to the recommended order of operations, what should be their *next* financial priority?", "options": [{"text": "Fully fund their emergency fund to 3 months of expenses.", "isCorrect": false, "rationale": "While important, the order of operations prioritizes capturing the employer match and paying off high-interest debt before fully funding the emergency fund (Step 4)."}, {"text": "Invest in a Roth IRA.", "isCorrect": false, "rationale": "Investing in a Roth IRA (Step 5) comes later in the recommended order, after capturing the employer match, paying high-interest debt, and fully funding the emergency fund."}, {"text": "Capture the full employer 401(k) match.", "isCorrect": true, "rationale": "The recommended order of operations states that after building a starter emergency fund (Step 1), the next step is to capture the full employer match (Step 2), as it represents an immediate 50-100% return."}, {"text": "Increase retirement contributions to their employer plan.", "isCorrect": false, "rationale": "Increasing employer retirement contributions (Step 6) is one of the final steps in the recommended order, after the Roth IRA is funded."}], "id": "q01"}, {"question": "The financial plan's \"Order of Operations\" recommends paying off high-interest debt (e.g., credit card debt at 20% APR) *before* fully funding an emergency fund (to 3 months of expenses). What is the primary reason for this prioritization?", "options": [{"text": "High-interest debt is typically secured, making it a greater risk to assets.", "isCorrect": false, "rationale": "Credit card debt is typically unsecured. Its primary risk to finances comes from the high interest rate, not asset security."}, {"text": "The cost of high-interest debt far exceeds potential investment returns, making it a guaranteed drain on wealth.", "isCorrect": true, "rationale": "The text states that 'credit card debt at 20% APR costs you more than almost any investment earns,' highlighting the urgency of eliminating this drag on financial growth before focusing on less urgent savings."}, {"text": "Fully funding an emergency fund can take a long time, delaying immediate financial progress.", "isCorrect": false, "rationale": "While it can take time, the primary reason for prioritizing debt repayment is the high interest cost, which erodes wealth faster than most savings or investments can build it."}, {"text": "Most young adults do not have enough expenses to warrant a large emergency fund.", "isCorrect": false, "rationale": "The need for a fully funded emergency fund is relative to an individual's expenses, and its importance is universal, regardless of the absolute dollar amount."}], "id": "q02"}, {"question": "Why is a Roth IRA particularly advantageous for young adults who are likely in a lower income tax bracket, as described in the section?", "options": [{"text": "It allows them to avoid paying any taxes on their contributions or withdrawals.", "isCorrect": false, "rationale": "While qualified withdrawals in retirement are tax-free, contributions are made with after-tax money, meaning taxes are paid today."}, {"text": "Contributions are tax-deductible, reducing their current taxable income.", "isCorrect": false, "rationale": "This describes a Traditional IRA. Roth IRA contributions are not tax-deductible."}, {"text": "They pay taxes on contributions now at a low rate and enjoy tax-free withdrawals in retirement when their account is likely much larger.", "isCorrect": true, "rationale": "The text explicitly states that a Roth IRA 'lets you pay taxes on your contributions today (at a low rate) and then withdraw the money tax-free in retirement (when your account may be worth hundreds of thousands of dollars),' capitalizing on current low tax brackets."}, {"text": "It guarantees a higher rate of return compared to other retirement accounts.", "isCorrect": false, "rationale": "A Roth IRA is an account type, not an investment itself. Its returns depend on the underlying investments, not the account structure, and it does not guarantee a higher return."}], "id": "q03"}, {"question": "A 19-year-old student earned $3,500 from a summer job and $1,500 from a part-time job during the school year, totaling $5,000 in earned income for 2024. Assuming they are under age 50, what is the maximum amount they can contribute to a Roth IRA for the year, according to the provided money tip?", "options": [{"text": "$7,000", "isCorrect": false, "rationale": "While the general limit for individuals under 50 in 2024 is $7,000, the student's contribution is capped by their earned income if it's less than the stated limit."}, {"text": "$5,000", "isCorrect": true, "rationale": "The money tip states the contribution limit is '$7,000 per year for anyone under age 50, or 100% of your earned income — whichever is less.' Since the student's total earned income is $5,000, that is their maximum contribution."}, {"text": "$3,500", "isCorrect": false, "rationale": "The contribution limit is based on total earned income, not just income from a single job."}, {"text": "There is no limit for young adults, only for those over 50.", "isCorrect": false, "rationale": "There are contribution limits for all eligible individuals, regardless of age, provided they have earned income."}], "id": "q04"}, {"question": "The section advises young investors (age 18-22) to invest aggressively with a higher proportion of stocks. What is the fundamental reason behind this recommendation?", "options": [{"text": "Stocks consistently outperform bonds in all market conditions.", "isCorrect": false, "rationale": "Stocks generally have higher long-term returns but are also more volatile and do not consistently outperform bonds in all conditions (e.g., during recessions)."}, {"text": "Young investors have a long time horizon, allowing them to recover from short-term market downturns and benefit from long-term growth.", "isCorrect": true, "rationale": "The text explicitly states, 'At age 18–22, you have a major advantage: time. You will not need this money for 40+ years. That means you can afford to ride out short-term market drops, and you should invest aggressively while you are young.'"}, {"text": "Bonds are too risky for young investors due to their inverse relationship with interest rates.", "isCorrect": false, "rationale": "Bonds are generally considered less risky than stocks, and while interest rate fluctuations affect them, this is not the primary reason for an aggressive stock allocation for young investors."}, {"text": "Aggressive investing is required to meet the high contribution limits of retirement accounts.", "isCorrect": false, "rationale": "Contribution limits are independent of investment strategy. Aggressive investing is about maximizing growth over time, not meeting limits."}], "id": "q05"}, {"question": "Based on the text, what is a reasonable starting asset allocation for a young investor (18-22 years old)?", "options": [{"text": "20% Stocks / 80% Bonds", "isCorrect": false, "rationale": "This allocation is too conservative for a young investor who has decades until retirement and can afford more risk for higher potential returns. It's more appropriate for someone closer to retirement."}, {"text": "50% Stocks / 50% Bonds", "isCorrect": false, "rationale": "While balanced, the text suggests a more aggressive approach for young investors due to their long time horizon and capacity for risk."}, {"text": "80% Stocks / 20% Bonds", "isCorrect": true, "rationale": "The text advises young investors to 'invest aggressively' and indicates that as one gets older, they will shift 'toward more bonds and fewer stocks.' This implies a starting point with a high stock allocation, such as 80% stocks, is reasonable for a young investor."}, {"text": "100% Bonds", "isCorrect": false, "rationale": "Investing 100% in bonds is extremely conservative and would significantly limit long-term growth potential, which is contrary to the advice for young investors to use their time advantage."}], "id": "q06"}, {"question": "A financial advisor recommends an investment product with a 1% annual fee. If a young investor plans to invest $50,000 and expects an 8% annual return, how does this 1% fee primarily impact their long-term wealth accumulation according to the text?", "options": [{"text": "It guarantees a stable return by covering advisory services.", "isCorrect": false, "rationale": "Fees reduce net returns and do not guarantee stability. Advisory services are a separate consideration and are not necessarily covered by such a fee structure in a way that guarantees stability."}, {"text": "It significantly reduces compound growth over decades, leading to tens of thousands of dollars in lost wealth.", "isCorrect": true, "rationale": "The warning section states, 'A 1% annual fee may sound small... and over decades, the lost compound growth adds up to tens of thousands of dollars,' emphasizing the long-term corrosive effect of fees."}, {"text": "It only impacts their returns in years when the market performs poorly.", "isCorrect": false, "rationale": "Annual fees are typically charged regardless of market performance, reducing returns every year."}, {"text": "The fee is negligible and will have almost no impact on a $50,000 account.", "isCorrect": false, "rationale": "The text specifically warns against this mindset, noting that even a 1% fee on a $50,000 account costs roughly $500/year and accumulates significantly over decades."}], "id": "q07"}, {"question": "To avoid the negative impact of high fees on their investments, what type of investment does the text recommend young investors look for?", "options": [{"text": "Actively managed mutual funds with a strong track record.", "isCorrect": false, "rationale": "Actively managed funds often come with higher fees, which the text advises against. The focus is on low-cost options."}, {"text": "Individual stocks of fast-growing companies.", "isCorrect": false, "rationale": "While potentially high-growth, individual stocks require significant research and carry higher specific risk. The text's recommendation is for diversified, low-cost funds."}, {"text": "Low-cost index funds with expense ratios below 0.2%.", "isCorrect": true, "rationale": "The warning section explicitly states, 'Look for low-cost index funds with expense ratios below 0.2%,' as a way to minimize fees and maximize long-term growth."}, {"text": "High-yield savings accounts for guaranteed returns.", "isCorrect": false, "rationale": "High-yield savings accounts are for cash savings, not long-term investment growth. Their returns typically do not keep pace with market investments over decades."}], "id": "q08"}, {"question": "Which statement best encapsulates the overall purpose of insurance in a personal financial plan, according to the textbook section?", "options": [{"text": "To provide guaranteed returns on investment.", "isCorrect": false, "rationale": "Insurance is a tool for risk management and protection against losses, not for generating investment returns."}, {"text": "To build an emergency fund quickly.", "isCorrect": false, "rationale": "An emergency fund is built through savings. Insurance helps prevent unexpected events from depleting an existing emergency fund."}, {"text": "To protect the financial plan from unexpected events that could destroy finances.", "isCorrect": true, "rationale": "The text states, 'Insurance protects the financial plan you are building. You cannot predict every disaster, but you can make sure one unexpected event does not destroy your finances.'"}, {"text": "To replace a portion of income during retirement.", "isCorrect": false, "rationale": "Retirement income is primarily generated through investments and savings. While some specific insurance products (like annuities) can provide income, this is not the general purpose of insurance discussed for young adults."}], "id": "q09"}, {"question": "According to the \"moneytip\" section, why is renter's insurance considered one of the best financial deals available to young adults?", "options": [{"text": "It's typically expensive but offers comprehensive coverage for all assets.", "isCorrect": false, "rationale": "The text highlights that it's 'roughly $10–15 per month,' making it very affordable, not expensive."}, {"text": "It guarantees against any financial loss related to housing.", "isCorrect": false, "rationale": "No insurance guarantees against 'any' financial loss; it covers specific perils like theft, fire, water damage, and liability, not all possible housing-related losses."}, {"text": "It provides extensive coverage for personal belongings and liability at a very low monthly cost.", "isCorrect": true, "rationale": "The moneytip emphasizes its affordability ('roughly $10–15 per month') and its comprehensive coverage for 'personal belongings (laptop, clothes, furniture) against theft, fire, and water damage' and 'liability coverage in case someone is injured.'"}, {"text": "It provides a return on investment if no claims are made over a certain period.", "isCorrect": false, "rationale": "Insurance does not offer a return on investment; it is a cost for risk transfer and protection against potential financial losses."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
