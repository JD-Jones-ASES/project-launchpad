<script>
var QUESTIONS = [{"question": "Which statement best describes the fundamental tax principle of a Roth IRA compared to a Traditional IRA?", "options": [{"text": "Both Roth and Traditional IRAs allow for tax-deductible contributions and tax-free withdrawals in retirement.", "isCorrect": false, "rationale": "Traditional IRAs allow tax-deductible contributions, but withdrawals are taxed. Roth IRAs have after-tax contributions and tax-free withdrawals. This option incorrectly states both are tax-free on withdrawal and tax-deductible on contribution."}, {"text": "A Roth IRA is 'pay taxes now and never again,' while a Traditional IRA is 'pay taxes later.'", "isCorrect": true, "rationale": "The text explicitly states this comparison, highlighting that Roth IRA contributions are made with after-tax dollars, leading to tax-free growth and withdrawals, whereas Traditional IRA contributions are often pre-tax, with taxes paid upon withdrawal in retirement."}, {"text": "Contributions to a Roth IRA are tax-deductible, but withdrawals are taxed, similar to a 401(k).", "isCorrect": false, "rationale": "Contributions to a Roth IRA are not tax-deductible; they are made with after-tax dollars. Withdrawals are tax-free, not taxed."}, {"text": "Both accounts allow tax-free growth, but Traditional IRAs have no income limits, unlike Roth IRAs.", "isCorrect": false, "rationale": "While both have tax-deferred or tax-free growth, the core tax principle comparison is about contributions and withdrawals. Also, Traditional IRAs do have income limits for deductibility, and Roth IRAs have income limits for direct contributions."}], "id": "q01"}, {"question": "According to the text, what is the tax status of qualified withdrawals from a Roth IRA during retirement?", "options": [{"text": "Only the contributions can be withdrawn tax-free; any investment growth is subject to capital gains tax.", "isCorrect": false, "rationale": "The text clearly states that 'the contributions AND all the growth' are completely tax-free upon qualified withdrawal."}, {"text": "Every dollar, including both contributions and all investment growth, is completely tax-free.", "isCorrect": true, "rationale": "The definition and 'How It Works' section explicitly state that 'all investment growth and qualified withdrawals in retirement are completely tax-free' and 'the contributions AND all the growth' are tax-free."}, {"text": "Withdrawals are taxed at the owner's income tax bracket during retirement, similar to a Traditional IRA.", "isCorrect": false, "rationale": "This describes a Traditional IRA, not a Roth IRA. The text highlights this as a key difference, showing a Traditional IRA's balance yields less after taxes."}, {"text": "Withdrawals are subject to a flat 10% federal income tax, regardless of the owner's tax bracket.", "isCorrect": false, "rationale": "There is no mention of a flat 10% federal income tax on qualified Roth IRA withdrawals; they are tax-free."}], "id": "q02"}, {"question": "Why is the Roth IRA described as 'especially powerful for young people'?", "options": [{"text": "Young people typically have higher income and are more likely to meet the contribution limits.", "isCorrect": false, "rationale": "The text states that young workers are often in *lower* tax brackets and that income limits are 'rarely a concern for young workers' because their income is typically below the phase-out thresholds."}, {"text": "It allows them to lock in today's typically low tax rates on their contributions, avoiding higher taxes in a peak-earning retirement.", "isCorrect": true, "rationale": "The 'moneytip' section explains that young people in low tax brackets (10-12%) benefit by paying taxes now at a cheaper rate than they would at higher rates (22%, 24%, or higher) during peak earning retirement, effectively locking in a low tax rate."}, {"text": "The long investment horizon means they can make larger annual contributions than older savers.", "isCorrect": false, "rationale": "Annual contribution limits are the same for most ages (under 50), regardless of the investment horizon. The power comes from the *tax-free growth* over that long horizon, not larger contributions."}, {"text": "They are exempt from the 5-year rule for qualified withdrawals, allowing earlier access to funds.", "isCorrect": false, "rationale": "The 5-year rule applies to all Roth IRA owners for qualified withdrawals, regardless of age. Early access (before 59.5) often incurs penalties unless specific exceptions apply."}], "id": "q03"}, {"question": "Which of the following statements is true regarding Required Minimum Distributions (RMDs) for a Roth IRA owner?", "options": [{"text": "RMDs begin at age 72, similar to Traditional IRAs.", "isCorrect": false, "rationale": "The text explicitly states: 'There are no Required Minimum Distributions during the owner's lifetime' for a Roth IRA."}, {"text": "RMDs are only waived if the owner continues to work past age 70.", "isCorrect": false, "rationale": "The text states RMDs are waived for the Roth IRA owner during their lifetime, without conditions related to continued employment."}, {"text": "The owner can leave the money growing indefinitely as there are no RMDs during their lifetime.", "isCorrect": true, "rationale": "The text clearly states, 'There are no Required Minimum Distributions during the owner's lifetime. You can leave the money growing as long as you want.'"}, {"text": "RMDs apply to the growth portion of the account but not the contributed principal.", "isCorrect": false, "rationale": "RMDs do not apply at all to the Roth IRA owner during their lifetime, covering both contributions and growth."}], "id": "q04"}, {"question": "What is a key consideration regarding eligibility for contributing directly to a Roth IRA, as mentioned in the text?", "options": [{"text": "Only individuals over the age of 21 with a full-time job can contribute.", "isCorrect": false, "rationale": "The text states it's 'legally available to anyone with earned income, even a teenager with a part-time job,' contradicting the age and full-time job requirement."}, {"text": "There are no income limits, making it accessible to all income earners.", "isCorrect": false, "rationale": "The 'warning' box clearly states: 'Income Limits Apply. If your income is too high, you cannot contribute directly to a Roth IRA.'"}, {"text": "The ability to contribute begins to phase out for single filers with incomes above $146,000 (for 2024).", "isCorrect": true, "rationale": "The 'warning' box explicitly states the income limits for 2024: 'For 2024, the ability to contribute begins to phase out at $146,000 for single filers and $230,000 for married couples.'"}, {"text": "Contributors must also have a Traditional IRA to qualify for a Roth IRA.", "isCorrect": false, "rationale": "There is no mention in the text that having a Traditional IRA is a prerequisite for opening a Roth IRA."}], "id": "q05"}, {"question": "A 16-year-old earns $1,500 from a part-time summer job. Based on the text, what is the maximum amount they can contribute to a Roth IRA that year?", "options": [{"text": "$0, because minors cannot open Roth IRAs.", "isCorrect": false, "rationale": "The text clarifies that 'a parent or guardian usually opens a custodial Roth IRA on their behalf,' indicating minors *can* have Roth IRAs."}, {"text": "The full annual contribution limit (e.g., $6,000), regardless of their earned income.", "isCorrect": false, "rationale": "The text states, 'you cannot contribute more than you earned that year.' So, they are limited by their earned income if it's below the annual contribution limit."}, {"text": "$1,500, because contributions cannot exceed the amount of earned income for the year.", "isCorrect": true, "rationale": "The text states, 'You must have earned income... and you cannot contribute more than you earned that year. If you earned $2,000 from a part-time job, you can contribute up to $2,000 to a Roth IRA.' Applying this, the maximum is their earned income of $1,500."}, {"text": "Their earned income plus an additional $500 parental matching contribution.", "isCorrect": false, "rationale": "The text does not mention parental matching contributions counting towards the individual's earned income limit for their Roth IRA contributions."}], "id": "q06"}, {"question": "Considering the example provided in the text where a Roth IRA accumulates $1,554,336, what is the significance of this amount being in a Roth IRA versus a Traditional IRA for someone in the 22% retirement tax bracket?", "options": [{"text": "The Roth IRA balance would be subject to a 22% tax, resulting in approximately $1,212,382 after taxes.", "isCorrect": false, "rationale": "This describes the tax implications for a Traditional IRA, not a Roth IRA. The Roth IRA balance is entirely tax-free upon qualified withdrawal."}, {"text": "The Roth IRA balance is entirely tax-free, whereas a Traditional IRA of the same value would yield significantly less after taxes.", "isCorrect": true, "rationale": "The text directly compares the two: 'With a Roth IRA, that $1,554,336 is entirely yours in retirement. You owe zero federal income tax on any of it.' It then shows a Traditional IRA yielding only $1,212,382 after a 22% tax."}, {"text": "A Traditional IRA balance would be higher because contributions were tax-deductible.", "isCorrect": false, "rationale": "While Traditional IRA contributions can be tax-deductible, the 'balance' calculation for both assumed the same contribution amount and growth rate. The difference highlighted is in the *after-tax* withdrawal value."}, {"text": "Both accounts would yield the same net amount since the 22% tax bracket applies equally to both.", "isCorrect": false, "rationale": "This is incorrect. The text explicitly calculates a significant difference ($340,000) due to the tax-free nature of Roth IRA withdrawals versus taxed Traditional IRA withdrawals."}], "id": "q07"}, {"question": "How are contributions to a Roth IRA typically funded?", "options": [{"text": "With pre-tax dollars, making them tax-deductible.", "isCorrect": false, "rationale": "The definition states Roth IRAs are 'funded with after-tax dollars' and 'Contributions are not tax-deductible.'"}, {"text": "With after-tax dollars, meaning contributions are not tax-deductible.", "isCorrect": true, "rationale": "The definition explicitly states a Roth IRA is 'funded with after-tax dollars. Contributions are not tax-deductible.'"}, {"text": "Through employer payroll deductions, similar to a 401(k).", "isCorrect": false, "rationale": "While some employers might offer payroll direct deposits, the fundamental characteristic is that the funds are 'after-tax dollars' from the individual, not directly pre-tax from an employer plan like a 401(k)."}, {"text": "By rolling over funds from a Traditional IRA without incurring any taxes.", "isCorrect": false, "rationale": "Converting a Traditional IRA to a Roth IRA (a 'Roth conversion') typically involves paying taxes on the pre-tax funds being converted. This is a conversion, not a direct contribution, and it's not tax-free."}], "id": "q08"}, {"question": "For withdrawals from a Roth IRA to be 'qualified' and completely tax-free, what two conditions must generally be met?", "options": [{"text": "The account owner must be at least 50 years old, and the account must have been open for at least 3 years.", "isCorrect": false, "rationale": "The text specifies 'after age 59' (not 50) and 'at least 5 years after opening the account' (not 3 years)."}, {"text": "The account owner must be at least 59½ years old, and the account must have been open for at least 5 years.", "isCorrect": true, "rationale": "The 'How It Works' section states: 'When you withdraw money in retirement (after age 59½ and at least 5 years after opening the account), every dollar is completely tax-free.'"}, {"text": "The account owner must be retired, and the withdrawals must be used for medical expenses.", "isCorrect": false, "rationale": "While certain expenses might allow penalty-free withdrawals before age 59½, being retired and using funds for medical expenses are not the *primary* general conditions for *qualified and tax-free* withdrawals outlined for retirement income."}, {"text": "The contributions must have been made for at least 10 years, and the owner must be below the income limits.", "isCorrect": false, "rationale": "The condition relates to the account being open for 5 years, not contributions for 10 years, and income limits apply to contributions, not withdrawals."}], "id": "q09"}, {"question": "Who championed the creation of the Roth IRA, and what was its primary goal?", "options": [{"text": "President Bill Clinton; to increase government tax revenue through new retirement accounts.", "isCorrect": false, "rationale": "The 'didyouknow' section names Senator William Roth as the champion, and his goal was to encourage saving, not explicitly to increase government tax revenue."}, {"text": "Senator William Roth; to encourage Americans to save for retirement by allowing tax-free growth.", "isCorrect": true, "rationale": "The 'didyouknow' section states the Roth IRA was 'named after Senator William Roth of Delaware, who championed it. Senator Roth's goal was to encourage Americans to save for retirement by allowing tax-free growth.'"}, {"text": "The Treasury Department; to create an alternative to the 401(k) for high-income earners.", "isCorrect": false, "rationale": "The text doesn't credit the Treasury Department, nor does it state the primary goal was an alternative for high-income earners (who actually face contribution limits)."}, {"text": "The Taxpayer Relief Act of 1997; to eliminate all taxes on retirement savings for low-income individuals.", "isCorrect": false, "rationale": "The Act *created* it, but Senator Roth championed it. Its goal was tax-free growth, not eliminating *all* taxes for *low-income* individuals specifically across all retirement savings."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
