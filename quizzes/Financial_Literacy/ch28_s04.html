<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 28, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the 'Money Tip' and the checklist, which three actions are recommended as the absolute first steps to take?", "options": [{"text": "Enroll in a retirement plan, open a Roth IRA, and get renter's insurance.", "isCorrect": false, "rationale": "These actions are important but are placed later in the checklist. The 'Money Tip' specifically outlines the initial priority."}, {"text": "Open bank accounts, set up direct deposit, and build a zero-based budget.", "isCorrect": true, "rationale": "The 'Money Tip' explicitly states, 'Start with items 1 through 3 — open an account, set up direct deposit, and make a budget. Once those are habits, add the next items.'"}, {"text": "Pull your credit report, set up automatic bill payments, and write down financial goals.", "isCorrect": false, "rationale": "These are crucial actions but are listed as steps 8, 9, and 10, not the foundational first three."}, {"text": "Start an emergency fund, enroll in a retirement plan, and open a Roth IRA.", "isCorrect": false, "rationale": "While all essential, these are steps 4, 5, and 6 on the checklist, following the initial setup actions."}]}, {"question": "To effectively build an emergency fund and prevent premature spending, the checklist recommends which specific action?", "options": [{"text": "Keep the emergency fund in the same savings account as your regular savings for convenience.", "isCorrect": false, "rationale": "The text specifically advises against this, stating, 'Open a separate savings account labeled “Emergency Fund” so you are not tempted to spend it.'"}, {"text": "Set a goal of saving $1,300 in the first year by contributing $25/week and keeping it in a separate, labeled account.", "isCorrect": true, "rationale": "The checklist explicitly states, 'Even $25/week adds up to $1,300 in a year. Open a separate savings account labeled “Emergency Fund” so you are not tempted to spend it.'"}, {"text": "Invest the emergency fund in a high-growth stock market account to maximize returns.", "isCorrect": false, "rationale": "Emergency funds should be easily accessible and liquid, typically in a savings account, not invested in volatile assets like the stock market."}, {"text": "Only start an emergency fund after all other financial goals like retirement and investments are fully funded.", "isCorrect": false, "rationale": "The checklist places starting an emergency fund (item 4) before enrolling in a retirement plan (item 5) or opening a Roth IRA (item 6), indicating its priority."}]}, {"question": "Why is enrolling in an employer's retirement plan, especially to capture the full match, considered a critical financial action?", "options": [{"text": "It guarantees a specific rate of return on investments, reducing financial risk.", "isCorrect": false, "rationale": "Retirement plans do not guarantee specific returns; investment performance varies and carries risk. The benefit of the match is separate from investment returns."}, {"text": "The employer match is essentially free money that adds directly to your compensation and retirement savings.", "isCorrect": true, "rationale": "The text clearly states, 'If your employer matches contributions, not participating is turning down part of your compensation,' highlighting the match as additional, 'free' money."}, {"text": "It allows you to withdraw funds tax-free at any time without penalty.", "isCorrect": false, "rationale": "Most retirement plans have penalties for early withdrawals, and tax implications depend on the specific plan type (e.g., traditional vs. Roth)."}, {"text": "It automatically builds your credit score faster than any other financial activity.", "isCorrect": false, "rationale": "While responsible financial habits are beneficial, retirement contributions do not directly impact a credit score in the same way payment history or credit utilization does."}]}, {"question": "When starting a Roth IRA, what does the text emphasize as being more important than the initial amount contributed?", "options": [{"text": "Selecting a diversified portfolio of international stocks.", "isCorrect": false, "rationale": "While important for long-term investing, the text specifically focuses on the consistency of contributions, not the investment specifics."}, {"text": "Ensuring your contributions are always tax-deductible in the current year.", "isCorrect": false, "rationale": "Roth IRA contributions are made with after-tax money, meaning they are not tax-deductible in the current year."}, {"text": "The habit of making automatic monthly contributions, regardless of the small initial amount.", "isCorrect": true, "rationale": "The text states, 'Even $25 or $50 per month matters. The habit of automatic contributions is more important than the amount when you are just starting out.'"}, {"text": "Waiting until you can contribute the maximum allowable amount annually.", "isCorrect": false, "rationale": "The text encourages starting with small amounts to build the habit, rather than waiting for larger contributions."}]}, {"question": "A recent high school graduate just moved into their first apartment. Based on the checklist, what is the primary reason they should consider getting renter's insurance?", "options": [{"text": "Renter's insurance is legally required in most apartment leases.", "isCorrect": false, "rationale": "While some landlords may require or recommend it, it is not a universal legal requirement like auto insurance in many jurisdictions."}, {"text": "To protect their personal belongings like laptops, clothes, and furniture from damage or theft.", "isCorrect": true, "rationale": "The text states, 'For about $10–15/month, you protect your laptop, clothes, furniture, and more,' clearly outlining its purpose."}, {"text": "It reduces their monthly rent payments significantly through discounts.", "isCorrect": false, "rationale": "Renter's insurance is a separate cost and does not reduce rent. Bundling can offer discounts on the *insurance premium*, not the rent itself."}, {"text": "It covers damage to the apartment building itself in case of a fire or flood.", "isCorrect": false, "rationale": "Coverage for the building structure is typically handled by the landlord's property insurance. Renter's insurance covers the tenant's personal property and liability."}]}, {"question": "The checklist advises pulling your free credit report from AnnualCreditReport.com. What is the primary purpose of this action?", "options": [{"text": "To immediately increase your credit score by demonstrating financial diligence.", "isCorrect": false, "rationale": "Simply pulling your own credit report (a 'soft inquiry') does not directly increase your credit score. Its purpose is informational."}, {"text": "To identify any errors or fraudulent activity and understand your credit standing before needing to borrow.", "isCorrect": true, "rationale": "The text states, 'Make sure there are no errors, and see where you stand before you need to borrow money,' emphasizing accuracy and awareness."}, {"text": "To automatically enroll in new credit offers and loan opportunities.", "isCorrect": false, "rationale": "Pulling a credit report is for personal review and monitoring, not for automatic enrollment in financial products."}, {"text": "To compare interest rates offered by different lenders for future loans.", "isCorrect": false, "rationale": "While knowing your credit standing helps you understand what rates you might qualify for, the primary purpose of pulling *your own free report* is to check for accuracy and review your history, not to shop for rates."}]}, {"question": "The section highlights automatic bill payments as crucial for protecting your payment history. Why is a strong payment history so important?", "options": [{"text": "It allows you to consistently pay bills late without incurring penalties.", "isCorrect": false, "rationale": "Automatic payments are designed to ensure bills are paid on time, preventing late payments and associated penalties."}, {"text": "Payment history accounts for 35% of your credit score, and a single missed payment can have long-lasting negative effects.", "isCorrect": true, "rationale": "The text explicitly states, 'Automatic payments protect your payment history, which is 35% of your credit score. A single missed payment can stay on your credit report for seven years.'"}, {"text": "It ensures you never have to review your financial statements again.", "isCorrect": false, "rationale": "Even with automatic payments, it's crucial to regularly review financial statements for accuracy, errors, and potential fraud."}, {"text": "It directly increases the interest rates you receive on savings accounts.", "isCorrect": false, "rationale": "Payment history primarily impacts your creditworthiness for borrowing (loans, credit cards), not the interest rates on savings accounts."}]}, {"question": "Beyond simply writing down your 1-year, 5-year, and 10-year financial goals, what additional step does the checklist emphasize for increasing the likelihood of achieving them?", "options": [{"text": "Sharing them with a financial advisor for approval and modification.", "isCorrect": false, "rationale": "While seeking professional advice can be beneficial, the text specifically highlights a different, actionable step for personal goal achievement."}, {"text": "Only setting goals that are guaranteed to be achieved without any effort.", "isCorrect": false, "rationale": "Achieving financial goals typically requires effort and planning, and guarantees are unrealistic in personal finance."}, {"text": "Scheduling regular reminders to revisit and review them every six months.", "isCorrect": true, "rationale": "The text advises, 'revisit them every 6 months. Schedule a reminder on your phone every January and July: “Review financial goals.”'"}, {"text": "Keeping them strictly private to avoid external pressure or judgment.", "isCorrect": false, "rationale": "The text emphasizes active review and iteration of goals, not strict privacy as a means of achievement."}]}, {"question": "Maria's story illustrates 'The Power of Starting at 18.' What is the main financial principle her success demonstrates?", "options": [{"text": "Achieving wealth primarily requires a high starting salary.", "isCorrect": false, "rationale": "The text explicitly states, 'Maria did not get rich because she earned a high salary.'"}, {"text": "Investing heavily in risky, high-return ventures early in life.", "isCorrect": false, "rationale": "Maria's strategy was consistent, moderate contributions over a long period, which is less about 'risky, high-return ventures' and more about consistency and time."}, {"text": "The significant impact of compound interest over a long period, even with small, consistent contributions.", "isCorrect": true, "rationale": "The text clearly shows that Maria contributed $28,200 but ended with $219,000, with nearly $191,000 coming from compound interest over 47 years. It emphasizes starting early and letting time do the work."}, {"text": "The necessity of constantly increasing your investment contributions year after year.", "isCorrect": false, "rationale": "Maria's story highlights that she 'never increased it' yet still achieved significant growth due to compound interest and time."}]}, {"question": "The concluding section describes a financial plan as a 'living tool.' What does this imply about its nature and use?", "options": [{"text": "It's a static document created once at graduation and then filed away.", "isCorrect": false, "rationale": "The text explicitly refutes this, stating, 'A financial plan is not a document you create once and file away.'"}, {"text": "It should be revised and adapted regularly as life circumstances and goals change.", "isCorrect": true, "rationale": "The text explains it is 'a living tool you return to every month, every year, and every time your life changes,' emphasizing its dynamic nature."}, {"text": "Its primary purpose is to be shared with peers to compare financial progress.", "isCorrect": false, "rationale": "While comparison might happen, the text emphasizes personal application and continuous adaptation, not peer comparison as its primary purpose."}, {"text": "It primarily consists of complex mathematical formulas to predict market trends.", "isCorrect": false, "rationale": "While some calculations are part of financial planning, the overall emphasis in this section is on taking actionable steps and adapting the plan to life changes, rather than complex market predictions."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
