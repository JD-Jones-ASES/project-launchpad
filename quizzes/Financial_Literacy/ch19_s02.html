<script>
var QUESTIONS = [{"question": "What is the defining tax characteristic of a Traditional IRA, as described in the text?", "options": [{"text": "All contributions and withdrawals are tax-free.", "isCorrect": false, "rationale": "This describes a Roth IRA feature, not a Traditional IRA. Traditional IRA withdrawals are taxed as ordinary income."}, {"text": "Contributions may be tax-deductible, money grows tax-deferred, and withdrawals in retirement are taxed as ordinary income.", "isCorrect": true, "rationale": "The text explicitly states: 'A Traditional IRA is an individual retirement account in which contributions may be tax-deductible (reducing your taxable income in the year you contribute), money grows tax-deferred (no taxes on investment gains while the money stays in the account), and withdrawals in retirement are taxed as ordinary income.'"}, {"text": "All investment gains are taxed annually, but withdrawals are always tax-free.", "isCorrect": false, "rationale": "This is incorrect. Investment gains in a Traditional IRA grow tax-deferred, meaning they are not taxed annually. Withdrawals are taxed."}, {"text": "Contributions are taxed upfront, and withdrawals in retirement are tax-free.", "isCorrect": false, "rationale": "This describes a Roth IRA, not a Traditional IRA. Traditional IRA contributions may be tax-deductible (reducing current taxes), but withdrawals are taxed."}], "id": "q01"}, {"question": "Sarah earns $50,000 this year and contributes $4,000 to her Traditional IRA. If she qualifies for the full deduction and is in the 22% federal tax bracket, how much could she save in federal taxes for the current year due to this contribution?", "options": [{"text": "$50,000 * 0.22 = $11,000", "isCorrect": false, "rationale": "This calculates the total tax on her income, not the tax savings from the IRA contribution."}, {"text": "$4,000", "isCorrect": false, "rationale": "This is the contribution amount, not the tax savings. The savings are a percentage of the contribution."}, {"text": "$4,000 * 0.22 = $880", "isCorrect": true, "rationale": "As explained in the 'How the Tax Deduction Works' example, the tax savings are calculated by multiplying the deductible contribution amount by the individual's tax bracket percentage. $4,000 * 0.22 = $880."}, {"text": "$4,000 * 0.10 = $400", "isCorrect": false, "rationale": "This calculation uses an incorrect tax rate. The tax bracket given is 22%, not 10%."}], "id": "q02"}, {"question": "How does the 'tax-deferred growth' feature of a Traditional IRA provide a significant advantage over a regular brokerage account?", "options": [{"text": "It ensures that all withdrawals in retirement are completely tax-free.", "isCorrect": false, "rationale": "Withdrawals from a Traditional IRA in retirement are taxed as ordinary income. Tax-free withdrawals are characteristic of a Roth IRA."}, {"text": "It allows investments within the account to grow without being subject to annual taxes on dividends or capital gains.", "isCorrect": true, "rationale": "The text states: 'Inside a Traditional IRA, your investments grow without being taxed each year. This is a significant advantage over a regular brokerage account, where you may owe taxes on dividends and capital gains every year even if you never sell anything.'"}, {"text": "It guarantees that all contributions made to the IRA are fully tax-deductible.", "isCorrect": false, "rationale": "While contributions may be tax-deductible, 'tax-deferred growth' refers specifically to the growth of investments, not the deductibility of contributions. Also, deductibility is not always guaranteed, depending on income and workplace plan."}, {"text": "It eliminates the need for Required Minimum Distributions (RMDs) in retirement.", "isCorrect": false, "rationale": "Traditional IRAs are subject to RMDs once the account holder reaches age 73. Tax-deferred growth does not remove this requirement."}], "id": "q03"}, {"question": "What is the primary purpose of Required Minimum Distributions (RMDs) from a Traditional IRA, as stated in the text?", "options": [{"text": "To encourage account holders to diversify their investments before retirement.", "isCorrect": false, "rationale": "While diversification is good practice, it is not the purpose of RMDs."}, {"text": "To prevent individuals from accumulating too much wealth in tax-advantaged accounts.", "isCorrect": false, "rationale": "This is not the stated primary purpose. The purpose is related to tax collection."}, {"text": "To ensure the government eventually collects taxes on money that was contributed and grew tax-deferred.", "isCorrect": true, "rationale": "The text defines RMDs: 'The purpose is to ensure that the government eventually collects taxes on money that was contributed tax-deferred.'"}, {"text": "To provide a steady income stream for retirees, regardless of their financial needs.", "isCorrect": false, "rationale": "While RMDs do create an income stream, their primary purpose from the IRS's perspective is tax collection, not income provision."}], "id": "q04"}, {"question": "According to the text, at what age do Required Minimum Distributions (RMDs) for a Traditional IRA typically begin, and what is the consequence of failing to take one?", "options": [{"text": "Age 65; a warning letter from the IRS.", "isCorrect": false, "rationale": "The age is incorrect, and the consequence is more severe than a warning letter."}, {"text": "Age 59.5; a 10% early withdrawal penalty.", "isCorrect": false, "rationale": "Age 59.5 is the age for avoiding early withdrawal penalties, not the start of RMDs. A 10% penalty applies to early withdrawals, not specifically to failing an RMD, which incurs a steep tax penalty."}, {"text": "Age 73; a steep tax penalty.", "isCorrect": true, "rationale": "The text states: 'A Required Minimum Distribution (RMD) is the minimum amount the IRS requires you to withdraw from a Traditional IRA each year once you reach age 73. ... Failing to take an RMD results in a steep tax penalty.'"}, {"text": "Age 70.5; a temporary freeze on the account.", "isCorrect": false, "rationale": "The age is incorrect (it was previously 70.5, but the text states 73), and a temporary freeze is not mentioned as a consequence."}], "id": "q05"}, {"question": "A 45-year-old individual, in the 22% federal tax bracket, takes an early withdrawal of $10,000 from their Traditional IRA for a non-qualified reason. Based on the provided information, what would be the approximate total cost in penalties and ordinary income taxes for this withdrawal?", "options": [{"text": "$1,000 (only the 10% early withdrawal penalty)", "isCorrect": false, "rationale": "This only accounts for the penalty, not the ordinary income tax also due on the full amount."}, {"text": "$2,200 (only the ordinary income tax)", "isCorrect": false, "rationale": "This only accounts for the ordinary income tax, not the 10% early withdrawal penalty."}, {"text": "$3,200 (10% early withdrawal penalty + ordinary income tax)", "isCorrect": true, "rationale": "The 'warning' box clearly states: 'On a a $10,000 early withdrawal for someone in the 22% tax bracket, that means losing $1,000 (penalty) plus $2,200 (income tax) = $3,200—nearly a third of the withdrawal.'"}, {"text": "$0, as long as the funds are used for an emergency.", "isCorrect": false, "rationale": "While there are limited exceptions for early withdrawals, the question specifies 'non-qualified reason' and general emergencies are not always exempt, and even qualified exceptions might still involve income tax, though not the penalty."}], "id": "q06"}, {"question": "Under which specific circumstance can an individual *always* deduct Traditional IRA contributions, regardless of their income level?", "options": [{"text": "When they are making contributions for higher education expenses.", "isCorrect": false, "rationale": "Qualified higher education expenses are an exception to the early withdrawal penalty, not a condition for always deducting contributions."}, {"text": "When they do not have a retirement plan available at their workplace.", "isCorrect": true, "rationale": "The 'moneytip' states: 'If you do not have a retirement plan at work, you can always deduct Traditional IRA contributions.'"}, {"text": "When their adjusted gross income is below a specific IRS threshold, even if they have a workplace retirement plan.", "isCorrect": false, "rationale": "In this scenario, the deduction phases out at higher income levels, meaning it's not 'always' deductible regardless of income."}, {"text": "When they are self-employed and contribute to a SEP IRA instead.", "isCorrect": false, "rationale": "A SEP IRA is a different type of retirement account, and while contributions are deductible, the question is about Traditional IRAs and a specific condition for 'always' deducting."}], "id": "q07"}, {"question": "Based on the 'Who Is a Traditional IRA Best For?' section, which individual would likely find a Traditional IRA most advantageous?", "options": [{"text": "A high school student earning a modest income and expecting to be in a higher tax bracket in their career.", "isCorrect": false, "rationale": "The text suggests a Roth IRA is usually better for young workers in lower tax brackets because their current tax savings would be minimal, and they'd benefit more from tax-free withdrawals later."}, {"text": "An individual currently in a high tax bracket who anticipates being in a lower tax bracket during retirement.", "isCorrect": true, "rationale": "The text states: 'A Traditional IRA is most advantageous when: You are currently in a high tax bracket and expect to be in a lower bracket in retirement (you save on taxes now, pay less later).'"}, {"text": "Someone who wants their retirement withdrawals to be completely tax-free.", "isCorrect": false, "rationale": "Traditional IRA withdrawals are taxed as ordinary income in retirement. This describes a Roth IRA."}, {"text": "An individual whose income is too high to contribute to any type of IRA.", "isCorrect": false, "rationale": "High income might make one ineligible for a Roth IRA, but not necessarily for a Traditional IRA contribution (though the deduction might phase out)."}], "id": "q08"}, {"question": "The text emphasizes that with a Traditional IRA, 'You are not avoiding taxes; you are delaying them.' This statement best describes the fundamental trade-off regarding which aspect of the Traditional IRA?", "options": [{"text": "The annual calculation of Required Minimum Distributions (RMDs) based on life expectancy.", "isCorrect": false, "rationale": "RMDs ensure taxes are eventually collected, but the statement refers to the broader tax structure, not just the RMD mechanism."}, {"text": "The immediate tax deduction on contributions in exchange for taxable withdrawals in retirement.", "isCorrect": true, "rationale": "This statement directly follows the explanation of how the tax deduction works and clarifies the trade-off: you get a tax break now, but you pay taxes later on the full amount withdrawn, including growth. You are delaying the tax burden."}, {"text": "The 10% penalty imposed on early withdrawals before age 59.5.", "isCorrect": false, "rationale": "The early withdrawal penalty is an additional cost for accessing funds prematurely, not the core mechanism of delaying taxes."}, {"text": "The tax-deferred growth of investments within the account.", "isCorrect": false, "rationale": "Tax-deferred growth means taxes aren't paid annually on gains, but the statement about 'delaying taxes' encompasses both the contribution deduction and the future taxation of withdrawals, not just the growth itself."}], "id": "q09"}, {"question": "Why does the text suggest that for most high school students and young workers in lower tax brackets, a Roth IRA is usually the better choice compared to a Traditional IRA?", "options": [{"text": "Roth IRAs generally have higher contribution limits than Traditional IRAs.", "isCorrect": false, "rationale": "The contribution limits for Roth and Traditional IRAs are generally the same (aggregate limit), so this is not a distinguishing factor that makes one 'better' for this group."}, {"text": "They would gain minimal benefit from a current tax deduction and would likely benefit more from tax-free withdrawals in retirement when their income and tax bracket are higher.", "isCorrect": true, "rationale": "The text implies that for those in lower tax brackets, the immediate tax deduction of a Traditional IRA offers less savings. Therefore, the future tax-free withdrawals of a Roth IRA (after paying taxes on contributions now) become more advantageous, especially if they expect to be in a higher tax bracket later."}, {"text": "Traditional IRAs have more stringent income eligibility requirements for contributions.", "isCorrect": false, "rationale": "Roth IRAs actually have income limits for contributions, whereas Traditional IRAs do not have income limits for contributing, though the deduction may phase out."}, {"text": "Traditional IRAs require minimum distributions, which Roth IRAs do not.", "isCorrect": false, "rationale": "While Roth IRAs generally don't have RMDs for the original owner, this is a benefit that applies much later in life and isn't the primary reason why a young worker would choose Roth over Traditional based on their current tax bracket."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
