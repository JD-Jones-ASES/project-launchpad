    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 18, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary purpose of a mutual fund as described in the text?", "options": [{"text": "To allow individual investors to directly buy shares of specific companies.", "isCorrect": false, "rationale": "The text states that investors purchase shares of the fund, not shares of the underlying companies directly."}, {"text": "To offer professional management and diversification by pooling investor money.", "isCorrect": true, "rationale": "The text explicitly states mutual funds 'offer a solution: professional management and instant diversification in a single purchase' and 'pools money from many investors and uses those pooled funds to purchase a diversified portfolio.'"}, {"text": "To guarantee a fixed return on investment regardless of market performance.", "isCorrect": false, "rationale": "The text indicates that the fund's value 'rises or falls based on the performance of the fund's underlying investments,' meaning returns are not fixed or guaranteed."}, {"text": "To eliminate the need for any investment research by individual investors.", "isCorrect": false, "rationale": "While fund managers do the research, investors still need to research the fund itself, its strategy, and its expense ratio, as highlighted by the warning."}]}, {"question": "When an investor buys shares in a mutual fund, what are they directly purchasing?", "options": [{"text": "Shares of the individual companies held within the fund's portfolio.", "isCorrect": false, "rationale": "The text explicitly states, 'You purchase shares of the fund (not shares of the underlying companies directly).'"}, {"text": "A direct ownership stake in the fund management company.", "isCorrect": false, "rationale": "Investing in a mutual fund gives you a share of the fund's portfolio, not ownership in the company that manages the fund."}, {"text": "Shares of the mutual fund itself, which then holds a portfolio of securities.", "isCorrect": true, "rationale": "The text clearly states, 'You purchase shares of the fund (not shares of the underlying companies directly).'"}, {"text": "A contract guaranteeing a certain amount of dividends from the underlying securities.", "isCorrect": false, "rationale": "Mutual funds do not guarantee dividends; their value fluctuates with the underlying investments."}]}, {"question": "The Net Asset Value (NAV) of a mutual fund, representing its per-share value, is calculated:", "options": [{"text": "At the beginning of each trading week.", "isCorrect": false, "rationale": "The text specifies the calculation occurs more frequently than weekly."}, {"text": "Only when new investors join the fund.", "isCorrect": false, "rationale": "NAV is a regular valuation, not tied solely to new investor activity."}, {"text": "At the end of each trading day.", "isCorrect": true, "rationale": "The text states, 'At the end of each trading day, the fund calculates its net asset value (NAV)—the per-share value of the fund's total holdings.'"}, {"text": "Annually, after all fees have been deducted.", "isCorrect": false, "rationale": "While fees impact the net return, the NAV calculation itself is daily, not annual."}]}, {"question": "An investor is new to the stock market and has limited capital but wants to spread their risk across many companies without extensive research. Which aspect of mutual funds would be most beneficial for them?", "options": [{"text": "The guaranteed high returns often associated with actively managed funds.", "isCorrect": false, "rationale": "Mutual funds do not guarantee high returns, and the text highlights that actively managed funds often have higher expense ratios which can erode returns."}, {"text": "The ability to directly control the buy and sell decisions for individual stocks.", "isCorrect": false, "rationale": "Professional managers make buy and sell decisions; individual investors in a mutual fund do not directly control these."}, {"text": "Instant diversification and professional management.", "isCorrect": true, "rationale": "The text lists 'Instant diversification' and 'Professional management' as key benefits that directly address the investor's desire to spread risk without extensive personal research."}, {"text": "The automatic deduction of expense ratios, simplifying tax reporting.", "isCorrect": false, "rationale": "While expense ratios are automatically deducted, this is a cost, not a benefit for someone seeking to spread risk without research, and it doesn't simplify tax reporting in a beneficial way."}]}, {"question": "How is an expense ratio defined in the context of mutual funds?", "options": [{"text": "A one-time fee paid at the time of investment.", "isCorrect": false, "rationale": "The definition states it is an 'annual fee.'"}, {"text": "The total amount of money the fund earns in a year.", "isCorrect": false, "rationale": "The expense ratio is a fee charged by the fund, not the fund's earnings."}, {"text": "An annual fee expressed as a percentage of your investment, automatically deducted.", "isCorrect": true, "rationale": "The text defines it as 'the annual fee a fund charges, expressed as a percentage of your investment... automatically deducted from your returns.'"}, {"text": "The cost incurred by the fund for marketing and advertising to attract new investors.", "isCorrect": false, "rationale": "While marketing might be a component of fund costs, the definition provided in the text is specific to the annual fee charged to investors for management and other operational costs."}]}, {"question": "An investor is comparing two funds, both earning a gross return of 8% annually. Fund X has an expense ratio of 0.2%, and Fund Y has an expense ratio of 1.2%. Over several decades, what is the most likely outcome of this difference?", "options": [{"text": "Fund X and Fund Y will perform almost identically, as the 1% difference is negligible over time.", "isCorrect": false, "rationale": "The example in the text explicitly demonstrates that even a small difference (0.9 percentage points) over 30 years leads to a dramatic difference in final value due to compounding."}, {"text": "Fund Y will significantly outperform Fund X due to its higher active management cost.", "isCorrect": false, "rationale": "A higher expense ratio means a lower net return for the investor, thus typically leading to underperformance compared to a lower-cost alternative with the same gross return."}, {"text": "Fund X will significantly outperform Fund Y due to the compounding effect of lower fees.", "isCorrect": true, "rationale": "The text's example clearly illustrates that a difference of 0.9% in expense ratio leads to a $16,590 difference on a $10,000 investment over 30 years, emphasizing how fees 'silently compounds against you every single year.'"}, {"text": "The difference in expense ratios will only impact the initial investment, not the long-term growth.", "isCorrect": false, "rationale": "The example shows that the fee 'never goes away; it silently compounds against you every single year,' directly impacting long-term growth."}]}, {"question": "The text emphasizes that expense ratios 'silently erode your wealth.' What does this phrase primarily mean?", "options": [{"text": "Investors must manually calculate and pay the fee, often forgetting to do so.", "isCorrect": false, "rationale": "The text states the fee is 'automatically deducted from your returns—you never write a check for it.'"}, {"text": "The fee is visible only on annual statements, making it hard to track daily.", "isCorrect": false, "rationale": "While not always daily visible, the primary point is its automatic deduction and hidden impact, not just statement frequency."}, {"text": "The fee is automatically deducted from returns before they are seen, and its long-term impact is often underestimated due to compounding.", "isCorrect": true, "rationale": "The warning states, 'Unlike a visible fee you pay at checkout, an expense ratio is automatically subtracted from your returns before you ever see them. Many investors do not realize how much they are paying... or how dramatically those fees reduce their long-term wealth,' highlighting the silent, compounding erosion."}, {"text": "Expense ratios are fixed and never change, leading to predictable but often high costs.", "isCorrect": false, "rationale": "While fixed in percentage, the *impact* grows with the investment's value, and the key message is about underestimation, not just predictability."}]}, {"question": "Which type of mutual fund would an investor choose if their primary goal was to gain exposure specifically to foreign companies?", "options": [{"text": "A balanced fund", "isCorrect": false, "rationale": "A balanced fund mixes stocks and bonds, not specifically foreign companies."}, {"text": "A sector fund", "isCorrect": false, "rationale": "A sector fund focuses on a specific industry, which could be domestic or international, but not exclusively foreign exposure as its primary definition."}, {"text": "An international fund", "isCorrect": true, "rationale": "The text defines 'International funds' as those that 'Invest in foreign companies.'"}, {"text": "A bond fund", "isCorrect": false, "rationale": "A bond fund invests primarily in bonds, which may or may not be foreign, but its primary characteristic is the asset class, not geographic exposure."}]}, {"question": "Based on the provided example, if an investor had $5,000 and was considering two funds with gross returns of 7%, but one had a 0.5% expense ratio and the other a 1.5% expense ratio, what is the key takeaway for their decision-making process?", "options": [{"text": "The higher expense ratio indicates a more aggressive, thus higher-returning, investment strategy.", "isCorrect": false, "rationale": "The text explicitly warns against high expense ratios eroding wealth, and a higher ratio does not guarantee higher gross returns or a more aggressive strategy. It simply means higher costs."}, {"text": "The lower expense ratio will likely lead to significantly higher net returns over the long term due to less erosion from fees.", "isCorrect": true, "rationale": "The example clearly demonstrates that even a 0.9% difference in expense ratio ($16,590 on $10,000 over 30 years) has a massive impact. A 1% difference (1.5% vs 0.5%) would similarly lead to substantially higher net returns for the lower-cost fund over time due to the compounding effect of fees."}, {"text": "The difference in expense ratios is inconsequential for an investment of only $5,000.", "isCorrect": false, "rationale": "The example used $10,000, showing a significant impact. While $5,000 is less, the percentage difference in returns due to expense ratios would still be substantial over decades due to compounding, making it highly consequential."}, {"text": "The investor should choose the fund with the higher expense ratio if they want more active management.", "isCorrect": false, "rationale": "While actively managed funds tend to have higher expense ratios, the text warns that these fees 'silently erode your wealth' and advises 'Always check the expense ratio,' implying lower is generally better for net returns given similar gross performance."}]}, {"question": "What critical action does the text advise investors to take before investing in any mutual fund?", "options": [{"text": "To carefully research the individual stocks held within the fund.", "isCorrect": false, "rationale": "A benefit of mutual funds is that professional managers do this research, relieving individual investors of the burden."}, {"text": "To ensure the fund has a high minimum investment, indicating exclusivity.", "isCorrect": false, "rationale": "The text states 'Accessibility: Many mutual funds are available with relatively low minimum investments' as a benefit, contradicting this option."}, {"text": "To always check the expense ratio.", "isCorrect": true, "rationale": "The final warning explicitly states, 'Always check the expense ratio before investing in any fund.'"}, {"text": "To only invest in actively managed funds, as they guarantee superior performance.", "isCorrect": false, "rationale": "The text warns about high expense ratios in actively managed funds and does not suggest they guarantee superior performance; rather, it highlights their cost."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
