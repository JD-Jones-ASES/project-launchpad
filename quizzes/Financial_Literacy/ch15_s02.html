    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 15, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the defining characteristic that differentiates a fixed-rate loan from a variable-rate loan?", "options": [{"text": "The total principal amount borrowed.", "isCorrect": false, "rationale": "The principal amount is the initial sum borrowed and is independent of whether the interest rate is fixed or variable."}, {"text": "The frequency of payments over the loan term.", "isCorrect": false, "rationale": "Loan payments are typically monthly for both fixed and variable rate loans; this characteristic does not differentiate them."}, {"text": "Whether the interest rate can change over the life of the loan.", "isCorrect": true, "rationale": "A fixed-rate loan's interest rate stays the same, while a variable-rate loan's interest rate can change over time. This is the fundamental difference."}, {"text": "The credit score requirements for approval.", "isCorrect": false, "rationale": "Credit score affects eligibility and the specific rate offered, but not the fundamental nature of the rate being fixed or variable."}]}, {"question": "Sarah took out a 30-year mortgage with a fixed interest rate. Five years later, market interest rates surged by 2 percentage points due to economic inflation. How does Sarah's fixed-rate loan protect her in this scenario?", "options": [{"text": "Her monthly payments will decrease as the market rates rise.", "isCorrect": false, "rationale": "Monthly payments would only decrease if her rate was variable and market rates fell, which is not the case here."}, {"text": "She can refinance her loan to a lower rate without any costs.", "isCorrect": false, "rationale": "Refinancing typically incurs costs and would only be beneficial if market rates *fell*, allowing her to secure a lower rate."}, {"text": "Her interest rate and monthly payments will remain unchanged.", "isCorrect": true, "rationale": "A key advantage of a fixed-rate loan is protection from rate increases; her rate is locked in, ensuring predictable, unchanging payments."}, {"text": "The principal balance of her loan will automatically be reduced.", "isCorrect": false, "rationale": "Principal reduction is tied to making payments, not to market rate changes or protection against rate increases."}]}, {"question": "Alex chose a variable-rate auto loan because it offered a lower initial interest rate. After two years, a significant economic event caused market interest rates to increase sharply. What is the most immediate and significant consequence Alex is likely to face?", "options": [{"text": "His loan term will automatically extend to offset the rate increase.", "isCorrect": false, "rationale": "Loan terms are generally fixed unless renegotiated; an interest rate increase typically affects payments, not the term."}, {"text": "His monthly loan payments will likely increase, potentially causing budgeting difficulties.", "isCorrect": true, "rationale": "The primary risk of a variable-rate loan is that payments can increase significantly if market rates rise, leading to 'payment shock' and budgeting challenges."}, {"text": "The total amount of interest he pays over the life of the loan will decrease.", "isCorrect": false, "rationale": "Higher interest rates directly lead to an increase in the total amount of interest paid over the life of the loan, not a decrease."}, {"text": "He will be forced to immediately pay off the remaining loan balance.", "isCorrect": false, "rationale": "An interest rate increase does not typically trigger an immediate demand for full repayment of the loan balance."}]}, {"question": "An Adjustable-Rate Mortgage (ARM) is described as a '7/1 ARM.' What does the '7' in this notation signify?", "options": [{"text": "The loan's interest rate will adjust 7 times over its lifetime.", "isCorrect": false, "rationale": "The first number in ARM notation indicates the length of the initial fixed-rate period, not the total number of adjustments."}, {"text": "The loan's interest rate is fixed for the first 7 years.", "isCorrect": true, "rationale": "The first number (e.g., '7' in 7/1 ARM) specifies the number of years for which the interest rate remains fixed at the beginning of the loan."}, {"text": "The loan's interest rate will adjust every 7 years after the initial period.", "isCorrect": false, "rationale": "The second number (e.g., '1' in 7/1 ARM) indicates how frequently the rate adjusts after the initial fixed period."}, {"text": "The loan term is a total of 7 years.", "isCorrect": false, "rationale": "ARM notation describes the rate adjustment schedule, not the overall term of the mortgage, which is typically longer (e.g., 15 or 30 years)."}]}, {"question": "A high school student is considering taking out their first student loan for college tuition. Based on the provided advice, which type of interest rate is generally recommended for them, and why?", "options": [{"text": "A variable rate, because it always results in lower overall costs.", "isCorrect": false, "rationale": "The text warns that variable rates carry significant risk and do not always result in lower overall costs due to potential increases. It explicitly recommends against them for most first-time borrowers."}, {"text": "A fixed rate, because it provides predictability and simplifies budgeting.", "isCorrect": true, "rationale": "The money tip specifically recommends a fixed rate for most high school students taking out their first loans, such as student loans, emphasizing predictability for budgeting."}, {"text": "An adjustable-rate mortgage, due to its initial 'teaser' rate.", "isCorrect": false, "rationale": "Adjustable-rate mortgages (ARMs) are for housing loans, not typically student loans, and the 'teaser' rate is associated with a future risk of payment jumps."}, {"text": "A variable rate, as they are protected from any future rate increases.", "isCorrect": false, "rationale": "Variable rates are explicitly *not* protected from future rate increases; their primary disadvantage is uncertainty and the risk of payment shock if rates rise."}]}, {"question": "Borrowers are often attracted to variable-rate loans because they 'often starts lower' than fixed rates. What is the primary financial trade-off a borrower makes by choosing this potentially lower initial payment?", "options": [{"text": "The inability to ever refinance the loan in the future.", "isCorrect": false, "rationale": "Refinancing is generally possible for both fixed and variable rate loans, depending on market conditions and lender policies."}, {"text": "Forfeiting the potential for their payments to decrease if market rates fall.", "isCorrect": false, "rationale": "The potential for payments to decrease if rates fall is an *advantage* of variable-rate loans, not a trade-off for choosing them."}, {"text": "Accepting the risk of unpredictable future payments and potential payment shock if rates increase.", "isCorrect": true, "rationale": "The lower initial payment of a variable-rate loan comes with the significant disadvantage of uncertainty and the risk that payments could rise sharply due to market fluctuations."}, {"text": "The requirement to make a larger down payment at the start of the loan.", "isCorrect": false, "rationale": "Down payment requirements are typically determined by the loan type and borrower's creditworthiness, not directly by the choice between fixed and variable rates."}]}, {"question": "For a variable-rate loan, the interest rate is typically tied to what?", "options": [{"text": "The borrower's personal credit score.", "isCorrect": false, "rationale": "A borrower's credit score influences the initial rate they qualify for, but not the market benchmark that determines how a variable rate adjusts over time."}, {"text": "The lender's internal profit margin.", "isCorrect": false, "rationale": "While a lender's profit margin is built into the rate, the adjustments for a variable rate are tied to an external, publicly published index."}, {"text": "A publicly published market benchmark interest rate.", "isCorrect": true, "rationale": "Variable rates are usually tied to a market benchmark like the U.S. Prime Rate or SOFR, meaning they fluctuate with changes in these public indices."}, {"text": "The total principal amount remaining on the loan.", "isCorrect": false, "rationale": "The principal amount affects the calculation of the monthly payment, but it is not the benchmark that dictates how the interest rate itself changes."}]}, {"question": "A borrower has a fixed-rate loan. Market interest rates have significantly decreased since they originated their loan. How can this borrower potentially benefit from the lower market rates, despite being 'locked in' to their current rate?", "options": [{"text": "Their monthly payments will automatically decrease in line with market rates.", "isCorrect": false, "rationale": "Automatic payment decreases due to falling market rates occur with variable-rate loans, not fixed-rate loans."}, {"text": "They can choose to refinance their loan to a new, lower fixed rate, though it involves costs.", "isCorrect": true, "rationale": "The text states that if market rates fall, fixed-rate borrowers are 'locked into your higher rate (unless you refinance, which has costs),' indicating refinancing as the method to benefit."}, {"text": "The lender is legally obligated to lower their rate without any action from the borrower.", "isCorrect": false, "rationale": "Lenders are not legally obligated to automatically lower fixed rates; the 'fixed' nature means the rate is set for the loan's life."}, {"text": "They can convert their fixed-rate loan into a variable-rate loan for free.", "isCorrect": false, "rationale": "Converting a loan type typically requires refinancing or a specific loan feature, and is not usually a free, automatic switch."}]}, {"question": "According to the warning box, what is a critical financial consideration before taking out a variable-rate loan?", "options": [{"text": "Ensuring the initial 'teaser' rate is the lowest available on the market.", "isCorrect": false, "rationale": "While an attractive initial rate might draw borrowers, the warning specifically addresses the risk of *future* rate increases, not just the initial rate's competitiveness."}, {"text": "Verifying that the loan can be paid off in under five years to avoid rate adjustments.", "isCorrect": false, "rationale": "Not all variable loans have a 5-year fixed period (e.g., a 1/1 ARM), and the warning is about the *impact* of rate increases, regardless of adjustment frequency."}, {"text": "Confirming that you could still afford the monthly payments if the interest rate increased by 2-3 percentage points.", "isCorrect": true, "rationale": "The warning explicitly advises, 'Never take a variable-rate loan unless you could still afford the payment if the rate increased by 2–3 percentage points,' as a crucial affordability check."}, {"text": "Having sufficient savings to pay off the entire principal in a single lump sum.", "isCorrect": false, "rationale": "While generally good financial practice, the warning specifically focuses on the affordability of *increased monthly payments* due to rate changes, not the ability to pay off the entire principal."}]}, {"question": "Considering the advantages, disadvantages, and specific advice provided, what is the overarching message regarding the choice between fixed and variable interest rates for *most* borrowers, especially for long-term or first-time loans?", "options": [{"text": "Variable rates are always the superior choice due to their potential for lower payments.", "isCorrect": false, "rationale": "The text highlights significant risks with variable rates, such as uncertainty and payment shock, making them not always superior, especially for most borrowers."}, {"text": "Fixed rates are generally the safer, simpler choice due to predictability and protection from rising rates.", "isCorrect": true, "rationale": "The text strongly advocates for fixed rates for 'most borrowers in most situations,' particularly for long-term and first-time loans, emphasizing predictability and protection as key benefits."}, {"text": "The decision primarily depends on the current market interest rate at the time of borrowing.", "isCorrect": false, "rationale": "While current market rates are a factor, the text emphasizes predictability, risk tolerance, and protection from future changes as more critical considerations for most borrowers."}, {"text": "It makes little difference which type of rate is chosen, as both have equal risk and reward.", "isCorrect": false, "rationale": "The text clearly delineates distinct advantages and disadvantages for each type, and a significant warning about the risks of variable rates, indicating that the choice makes a substantial difference."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
