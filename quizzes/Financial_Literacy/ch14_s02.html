<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 14, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does APR primarily represent in the context of a credit card?", "options": [{"text": "The total amount of interest paid over the lifetime of the card.", "isCorrect": false, "rationale": "APR is an annual rate, not a lifetime total, and it only applies to carried balances, not the entire card history."}, {"text": "The annual interest rate charged on any balance you carry from month to month.", "isCorrect": true, "rationale": "The text explicitly defines APR as 'the annual interest rate charged on any balance you carry from month to month'."}, {"text": "The maximum amount of credit available on the card.", "isCorrect": false, "rationale": "The maximum amount of credit is typically called the credit limit, not the APR."}, {"text": "The minimum monthly payment required by the credit card company.", "isCorrect": false, "rationale": "The minimum monthly payment is a separate calculation and not directly represented by the APR."}], "id": "q01"}, {"question": "According to the textbook section, what is a typical range for credit card APRs?", "options": [{"text": "0% to 5%", "isCorrect": false, "rationale": "This range is generally too low for typical credit card APRs, which are noted to be much higher than savings accounts."}, {"text": "5% to 15%", "isCorrect": false, "rationale": "While 15% is at the lower end mentioned, this range excludes the higher end of typical APRs (up to 30% or higher) and the average being above 20%."}, {"text": "15% to 30% or higher", "isCorrect": true, "rationale": "The text states that 'Credit card APRs typically range from 15% to 30% or higher,' and the average has been above 20%."}, {"text": "30% to 50%", "isCorrect": false, "rationale": "While APRs can be higher than 30%, this range exaggerates the typical lower bound, as 15% is also mentioned as a starting point for typical ranges."}], "id": "q02"}, {"question": "A credit card has a balance of $1,800 and an APR of 22%. Using the simplified monthly calculation method, what is the monthly interest charge?", "options": [{"text": "$396.00", "isCorrect": false, "rationale": "This amount would be calculated if the APR was not converted to a monthly rate ($1,800 * 0.22)."}, {"text": "$33.00", "isCorrect": true, "rationale": "Monthly interest is calculated as Balance × (APR / 12). So, $1,800 × (0.22 / 12) = $1,800 × 0.018333... = $33.00 (rounded)."}, {"text": "$40.50", "isCorrect": false, "rationale": "This is incorrect. A common error could be if the balance was slightly higher or APR different."}, {"text": "$18.33", "isCorrect": false, "rationale": "This would be the monthly rate (APR/12) as a percentage, not the dollar amount of interest."}], "id": "q03"}, {"question": "If a credit card user consistently carries a $1,000 balance with a 24% APR and only pays the accumulated interest each month, approximately how much total interest would they pay over a full year?", "options": [{"text": "$24.00", "isCorrect": false, "rationale": "This would be 2.4% of the balance, not the full annual interest."}, {"text": "$20.00", "isCorrect": false, "rationale": "This is the monthly interest amount, not the annual total."}, {"text": "$240.00", "isCorrect": true, "rationale": "Monthly interest = $1,000 × (0.24 / 12) = $20. Over a year (12 months), this would be $20 × 12 = $240."}, {"text": "$2,400.00", "isCorrect": false, "rationale": "This would be 240% of the balance, which is incorrect. It suggests multiplying by 24 directly instead of converting to a decimal and dividing by 12 for monthly then multiplying by 12 for annual, or directly multiplying by the decimal APR."}], "id": "q04"}, {"question": "What is the daily periodic rate (rounded to 6 decimal places) for a credit card with an APR of 18.25%?", "options": [{"text": "0.000500", "isCorrect": true, "rationale": "The Daily Periodic Rate is calculated as APR / 365. So, 0.1825 / 365 = 0.000500."}, {"text": "0.015208", "isCorrect": false, "rationale": "This would be the monthly rate (APR/12), not the daily rate."}, {"text": "0.000050", "isCorrect": false, "rationale": "This value is incorrect; it suggests an error in decimal placement or calculation."}, {"text": "0.018250", "isCorrect": false, "rationale": "This is the APR expressed as a decimal, not the daily periodic rate."}], "id": "q05"}, {"question": "How do credit card companies *technically* calculate interest, as described in the textbook section?", "options": [{"text": "They only charge interest on balances over a certain threshold, such as $1,000.", "isCorrect": false, "rationale": "The text does not mention any balance threshold for interest calculation."}, {"text": "They use a flat monthly fee regardless of the balance carried.", "isCorrect": false, "rationale": "Interest is explicitly stated to be dependent on the balance carried."}, {"text": "They track your average daily balance and multiply it by a daily rate.", "isCorrect": true, "rationale": "The text states: 'Technically, credit card companies calculate interest using your average daily balance—they track your balance every single day of the billing cycle and multiply it by a daily rate.'"}, {"text": "They calculate interest based solely on the balance at the end of the billing cycle.", "isCorrect": false, "rationale": "The technical method involves the average daily balance, not just the balance at the end of the cycle."}], "id": "q06"}, {"question": "The 'Did You Know' section suggests that paying off high-interest credit card debt is 'almost always the best ‘investment’ you can make.' Which of the following best supports this claim?", "options": [{"text": "Credit card companies offer rewards programs for paying off debt quickly.", "isCorrect": false, "rationale": "While some cards offer rewards, this is not the primary reason cited for debt payoff being the best investment. The text focuses on the financial savings from avoiding high interest."}, {"text": "The interest rates on credit cards are typically much lower than savings account interest.", "isCorrect": false, "rationale": "This statement is false according to the text, which highlights that credit card APRs are 'often 5 to 10 times higher than the interest rate offered on a high-yield savings account'."}, {"text": "The cost of borrowing on a credit card is significantly higher than the returns from typical savings accounts, meaning avoiding that cost is a large net gain.", "isCorrect": true, "rationale": "The text explicitly compares the high interest paid on credit card debt (e.g., $220/year on $1,000 at 22% APR) to the much lower interest earned from savings ($45/year on $1,000 at 4.5%), illustrating that avoiding the debt interest is a much greater financial benefit."}, {"text": "Credit card debt improves your credit score faster than any other financial action.", "isCorrect": false, "rationale": "While managing debt impacts credit score, the 'Did You Know' section's argument for it being a good 'investment' is based on saving money, not primarily on credit score improvement."}], "id": "q07"}, {"question": "What is the primary reason for the small difference observed between the monthly interest calculated by (Balance × APR/12) and the total interest accrued over 30 days using the daily periodic rate method (Daily Rate × 30 days × Average Daily Balance)?", "options": [{"text": "The APR itself changes within the month due to market fluctuations.", "isCorrect": false, "rationale": "The textbook section assumes a constant APR for calculations and does not suggest it fluctuates within a single month's billing cycle."}, {"text": "The simplified monthly calculation uses a flat 30 days, while the daily rate accounts for the exact number of days in a given month.", "isCorrect": false, "rationale": "While related, the core reason is more about the averaging and rounding, and the assumption of '30 days' versus the actual average of 365/12 days per month."}, {"text": "The difference is primarily due to rounding in calculations and the slight variation between a consistent 30-day period for estimation versus the actual average number of days per month (365/12).", "isCorrect": true, "rationale": "The example provided in the text explicitly states: 'small difference due to rounding and 30 vs. 30.42 days per month', indicating that rounding and the approximation of month length are the main factors."}, {"text": "The daily periodic rate includes additional fees not present in the monthly formula.", "isCorrect": false, "rationale": "Both formulas calculate interest based on the APR and balance; they do not introduce additional fees."}], "id": "q08"}, {"question": "In the Monthly Credit Card Interest formula (Monthly Interest = Balance × APR/12), what is the purpose of dividing the APR by 12?", "options": [{"text": "To adjust the interest rate for leap years.", "isCorrect": false, "rationale": "Dividing by 12 is to convert an annual rate to a monthly rate, not to adjust for leap years."}, {"text": "To convert the annual percentage rate into a monthly interest rate.", "isCorrect": true, "rationale": "The text explicitly states in the formula box that '12 = months in a year (dividing converts the annual rate to a monthly rate)'."}, {"text": "To account for the effect of the minimum payment on the balance.", "isCorrect": false, "rationale": "The formula calculates interest on the starting balance, independent of payment considerations for this specific step."}, {"text": "To express the APR as a percentage for easier understanding.", "isCorrect": false, "rationale": "The APR needs to be converted to a decimal (divided by 100) before being used in the formula, and then it is divided by 12, not to keep it as a percentage."}], "id": "q09"}, {"question": "You start the month with a $500 balance and an APR of 18%. You make no payments or new purchases, except to pay off the accumulated interest each month. Approximately how much total interest would you pay after three months?", "options": [{"text": "$90.00", "isCorrect": false, "rationale": "This would be 18% of $500 (0.18 × $500 = $90), which is the annual interest, not the total for three months if only interest is paid monthly."}, {"text": "$22.50", "isCorrect": true, "rationale": "Monthly interest = $500 × (0.18 / 12) = $500 × 0.015 = $7.50. If only the interest is paid each month, the principal balance remains $500. So, over three months, the total interest paid would be $7.50 × 3 = $22.50."}, {"text": "$15.00", "isCorrect": false, "rationale": "This amount is incorrect and would imply a lower APR or fewer months of interest."}, {"text": "$45.00", "isCorrect": false, "rationale": "This would be the interest over 6 months, not 3 months, if the monthly interest is $7.50."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
