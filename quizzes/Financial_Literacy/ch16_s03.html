<script>
var QUESTIONS = [{"question": "What is the primary definition of 'depreciation' as it applies to assets like cars?", "options": [{"text": "The increase in market value of an asset over time due to inflation.", "isCorrect": false, "rationale": "Depreciation is the *loss* in value, not an increase. While inflation exists, it doesn't counteract an asset's depreciation in the way described."}, {"text": "The loss in value of an asset over time due to factors like use, age, and newer models.", "isCorrect": true, "rationale": "The text explicitly defines depreciation as 'the loss in value of an asset over time' due to factors such as use, age, and the availability of newer models."}, {"text": "The total amount of interest paid on a loan throughout its term.", "isCorrect": false, "rationale": "This describes interest, which is a cost of financing, not the loss of an asset's inherent value."}, {"text": "The difference between the original purchase price and the current market value of an asset.", "isCorrect": false, "rationale": "While the difference between purchase price and current market value *reflects* depreciation, the definition itself is the 'loss in value' over time, not just the calculated difference at a single point."}], "id": "q01"}, {"question": "According to the text, what is the approximate value of a new car purchased for $32,000 after one year of ownership?", "options": [{"text": "$32,000", "isCorrect": false, "rationale": "The text states that a new car typically loses about 20% of its value in the first year, meaning it will be worth less than its original price."}, {"text": "$28,800", "isCorrect": false, "rationale": "This calculation assumes a 10% loss, but the text specifies a 20% loss in the first year."}, {"text": "$25,600", "isCorrect": true, "rationale": "A new car loses 20% of its value in the first year. So, $32,000 * (1 - 0.20) = $32,000 * 0.80 = $25,600."}, {"text": "$27,200", "isCorrect": false, "rationale": "This calculation would be if the car lost 15% of its value, which applies to years 2-5, not the first year."}], "id": "q02"}, {"question": "Based on the depreciation rates provided, what would be the approximate value of a $28,000 new car after two years?", "options": [{"text": "$22,400", "isCorrect": false, "rationale": "This value represents the car's worth after only the first year's 20% depreciation ($28,000 * 0.80), not after two years."}, {"text": "$19,040", "isCorrect": true, "rationale": "Year 1: $28,000 * 0.80 = $22,400. Year 2: $22,400 * 0.85 = $19,040. The car loses 20% in year 1 and 15% of its *current* value in year 2."}, {"text": "$19,710", "isCorrect": false, "rationale": "This calculation is incorrect for the given depreciation rates. It might result from misapplying the percentages."}, {"text": "$17,920", "isCorrect": false, "rationale": "This value would result if the car lost 20% each year, but the second year's loss is 15% of the *current* value."}], "id": "q03"}, {"question": "An 'upside-down loan' (or being 'underwater') occurs when:", "options": [{"text": "The monthly loan payment is higher than what you initially budgeted.", "isCorrect": false, "rationale": "While a high payment can be a problem, it doesn't define an upside-down loan. An upside-down loan refers to the relationship between the debt and the asset's value."}, {"text": "The interest rate on your car loan is greater than the national average.", "isCorrect": false, "rationale": "An interest rate's relation to the national average is not the definition of an upside-down loan. High interest can contribute to the problem, but isn't the definition itself."}, {"text": "The remaining balance on your loan is greater than the current market value of the car.", "isCorrect": true, "rationale": "The text explicitly defines an upside-down loan as occurring 'when the remaining balance on your loan is greater than the current market value of the asset.'"}, {"text": "You have made more payments towards the principal than towards the interest.", "isCorrect": false, "rationale": "This describes the later stages of a loan repayment, but not an upside-down situation, which focuses on the asset's value versus the debt."}], "id": "q04"}, {"question": "Why do long-term car loans (e.g., 6 or 7 years) significantly amplify the risk of an upside-down loan?", "options": [{"text": "They always come with much higher APRs, rapidly increasing the total amount owed.", "isCorrect": false, "rationale": "While long-term loans *can* have higher APRs, it's not 'always' the case, and this isn't the primary reason cited for amplifying upside-down risk."}, {"text": "The car's value increases slightly over time, but not enough to offset the loan balance.", "isCorrect": false, "rationale": "Cars typically depreciate, meaning their value *decreases*, not increases, over time."}, {"text": "Initial payments mostly cover interest, causing the principal to fall slowly, while the car's value depreciates rapidly.", "isCorrect": true, "rationale": "The text explains this directly: 'The loan balance falls slowly; the car's value falls quickly. This combination keeps you upside down for years.'"}, {"text": "They often require a larger down payment, making it harder to gain equity initially.", "isCorrect": false, "rationale": "Longer loan terms are often used to reduce monthly payments, sometimes alongside smaller or no down payments, which actually *exacerbates* the problem."}], "id": "q05"}, {"question": "Marcus buys a new car for $30,000 with no down payment and a 7-year loan. After 12 months, his loan balance is $28,000. Based on the typical first-year depreciation rate, what is Marcus's financial situation?", "options": [{"text": "He is in a good position because his loan balance has decreased by $2,000.", "isCorrect": false, "rationale": "While the loan balance has decreased, the key is comparing it to the car's depreciated value."}, {"text": "He is likely upside-down, owing more than the car is worth, as the car's value is around $24,000.", "isCorrect": true, "rationale": "The text states a new car loses 20% in the first year. $30,000 * 0.80 = $24,000. Since his loan balance ($28,000) is greater than the car's value ($24,000), he is upside-down."}, {"text": "He is likely to break even if he sells the car soon, as the value drop is not significant.", "isCorrect": false, "rationale": "A $6,000 drop in value ($30k to $24k) and a $4,000 gap ($28k loan vs $24k value) is significant, meaning he would not break even."}, {"text": "He will only be upside-down if his interest rate is extremely high, which isn't specified.", "isCorrect": false, "rationale": "While interest rates contribute to how quickly the principal decreases, the primary driver for being upside-down early on is rapid depreciation relative to slow principal reduction, regardless of the exact rate (as long as it's not extremely low)."}], "id": "q06"}, {"question": "Which of the following is NOT listed as a potential problem resulting from an upside-down car loan?", "options": [{"text": "If the car is totaled in an accident, your insurance might not cover the full loan balance.", "isCorrect": false, "rationale": "The text explicitly states this is a problem: 'If the car is totaled in an accident, your insurance pays the current market value... You are responsible for the $3,000 gap—out of pocket.'"}, {"text": "You might have to pay out of pocket to sell the car if the sale price doesn't cover the loan.", "isCorrect": false, "rationale": "This is a direct consequence: 'If you want to sell the car, you cannot get enough to pay off the loan without writing a check for the difference.'"}, {"text": "You may be 'trapped' in the car until the loan balance drops below the car's value.", "isCorrect": false, "rationale": "This is another problem mentioned: 'You are effectively 'trapped' in the car until the loan balance drops below the car's value.'"}, {"text": "Your car's warranty coverage may be voided due to the negative equity.", "isCorrect": true, "rationale": "The text does not mention that an upside-down loan affects a car's warranty coverage. Warranty is typically tied to the vehicle itself, mileage, and maintenance, not the loan status."}], "id": "q07"}, {"question": "To minimize the financial risks associated with car depreciation and upside-down loans, the 'moneytip' section suggests which strategy?", "options": [{"text": "Always buy a brand-new car to ensure maximum reliability and value.", "isCorrect": false, "rationale": "The moneytip suggests buying 'slightly used' to avoid initial rapid depreciation, which contradicts buying brand-new."}, {"text": "Secure the longest possible loan term (e.g., 72 months) to keep monthly payments low.", "isCorrect": false, "rationale": "The moneytip advises choosing 'the shortest loan term your budget can handle—48 months is better than 72,' as long terms amplify upside-down risk."}, {"text": "Buy a 1- or 2-year-old car, make a significant down payment, and choose a short loan term.", "isCorrect": true, "rationale": "This option combines all three key recommendations from the 'moneytip': 'Buy slightly used,' 'Put a down payment of at least 10–20%,' and 'Choose the shortest loan term your budget can handle.'"}, {"text": "Purchase gap insurance immediately, as it completely eliminates all risks of depreciation.", "isCorrect": false, "rationale": "While gap insurance is mentioned as a consideration, the moneytip states 'the best protection is simply not being upside down in the first place,' emphasizing prevention over insurance."}], "id": "q08"}, {"question": "You are advising a friend who is about to finance a new car. Based on the section content, what single piece of advice would be most crucial for them to avoid major financial pitfalls related to depreciation and being upside-down?", "options": [{"text": "Focus primarily on finding a car with excellent fuel efficiency, as this will save the most money long-term.", "isCorrect": false, "rationale": "While fuel efficiency is good, it's not the most crucial advice related to *depreciation and upside-down loans*, which are the focus of the section's pitfalls."}, {"text": "Always opt for a long-term loan (e.g., 7 years) to ensure the lowest possible monthly payments.", "isCorrect": false, "rationale": "The text warns that 'Long-term car loans amplify the upside-down risk,' making this advice detrimental."}, {"text": "Understand that cars lose significant value quickly; make a substantial down payment and aim for the shortest loan term possible.", "isCorrect": true, "rationale": "This advice directly addresses the core issues discussed: rapid depreciation, and how a down payment and shorter loan term combat the upside-down loan problem by building equity faster."}, {"text": "Always buy a brand new car, as they maintain their value better than used cars.", "isCorrect": false, "rationale": "The text explicitly states 'New cars depreciate rapidly' and suggests buying 'slightly used' to avoid the brutal Year 1 depreciation."}], "id": "q09"}, {"question": "What is the specific function of 'Gap insurance' as described in the text?", "options": [{"text": "It covers the cost of routine maintenance and unexpected mechanical failures.", "isCorrect": false, "rationale": "This describes an extended warranty or service contract, not gap insurance."}, {"text": "It pays the difference between your outstanding loan balance and the car's actual cash value if it is totaled or stolen.", "isCorrect": true, "rationale": "The 'didyouknow' section clearly states, 'Gap insurance... covers the difference between your loan balance and the car's actual cash value if the car is totaled or stolen.'"}, {"text": "It guarantees that your car will not depreciate by more than a certain percentage each year.", "isCorrect": false, "rationale": "Gap insurance does not prevent depreciation or guarantee a specific resale value; it only covers the financial shortfall if the car is a total loss."}, {"text": "It allows you to defer your loan payments for a certain period if you lose your job.", "isCorrect": false, "rationale": "This describes a loan forbearance or deferment program, not gap insurance."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
