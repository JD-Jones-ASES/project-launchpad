<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>

    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 11, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the fundamental difference between simple interest and compound interest, according to the text?", "options": [{"text": "Simple interest accounts always offer higher annual interest rates.", "isCorrect": false, "rationale": "The text does not state that simple interest accounts always offer higher annual interest rates. The distinction lies in how interest is calculated, not necessarily the rate itself."}, {"text": "Compound interest allows you to earn interest on both your original principal and the accumulated interest from previous periods.", "isCorrect": true, "rationale": "The definition explicitly states: 'Compound interest: You earn interest on your principal and on the interest you have already earned.' This is the key distinguishing factor."}, {"text": "Simple interest is only applicable to short-term loans, while compound interest is for long-term investments.", "isCorrect": false, "rationale": "The text differentiates simple and compound interest based on the calculation method, not their typical application length. While compounding has a greater long-term impact, the definition doesn't restrict simple interest to short terms."}, {"text": "Compound interest is only available for accounts with a principal balance over $1,000.", "isCorrect": false, "rationale": "The text uses a $1,000 example, but nowhere does it impose a minimum principal balance for compound interest to apply. This is an incorrect inference."}]}, {"question": "Based on the 'Seeing It Year by Year' example, if an account starts with $1,000 at 6% annual compound interest, what is the *interest earned* during the second year?", "options": [{"text": "$60.00", "isCorrect": false, "rationale": "This would be the interest earned in the first year or the interest earned each year with simple interest. With compound interest, the principal for the second year's calculation is higher."}, {"text": "$63.60", "isCorrect": true, "rationale": "At the start of Year 2, the balance is $1,060.00 (original $1,000 + $60 interest from Year 1). The interest for Year 2 is calculated on this new balance: $1,060.00 * 0.06 = $63.60. The balance at the end of Year 2 is $1,123.60."}, {"text": "$1,123.60", "isCorrect": false, "rationale": "This is the total balance at the end of the second year, not just the interest earned *during* the second year."}, {"text": "$1,060.00", "isCorrect": false, "rationale": "This is the balance at the end of the first year, which becomes the principal for the second year's calculation, not the interest earned in the second year."}]}, {"question": "The text highlights that after 30 years, a compound interest account has $5,743.49 while a simple interest account has $2,800.00 (both starting with $1,000 at 6%). What is the primary implication of this comparison?", "options": [{"text": "The initial interest rate is the only factor determining long-term growth.", "isCorrect": false, "rationale": "While the interest rate is crucial, the text explicitly emphasizes that the *method* of calculating interest (simple vs. compound) makes an enormous difference, especially over time. The power of compounding is the key, not just the rate."}, {"text": "The difference between simple and compound interest becomes significantly more pronounced over longer time horizons.", "isCorrect": true, "rationale": "The text states, 'That gap grows every year.' The comparison of 3 years ($11.02 difference) to 30 years ($2,943.49 difference) clearly demonstrates the exponential impact of compounding over extended periods."}, {"text": "Simple interest is a more suitable option for savings accounts over 10 years.", "isCorrect": false, "rationale": "The comparison clearly shows compound interest leading to vastly more money over 30 years, making it a superior choice for long-term savings, contrary to this option."}, {"text": "Compound interest calculations are inherently more complex and thus less reliable.", "isCorrect": false, "rationale": "The text provides a clear formula and step-by-step calculations, indicating compound interest is reliable and calculable, not less reliable due to complexity."}]}, {"question": "In the compound interest formula, $A = P(1 + r/n)^{nt}$, what does the variable 'n' specifically represent?", "options": [{"text": "The total number of years the money is invested.", "isCorrect": false, "rationale": "'t' represents the time in years. 'n' is related to frequency *within* a year."}, {"text": "The number of compounding periods per year.", "isCorrect": true, "rationale": "The text explicitly defines 'n' as the 'number of compounding periods per year', giving examples like 'Annual: n = 1', 'Monthly: n = 12', 'Daily: n = 365'."}, {"text": "The annual interest rate as a decimal.", "isCorrect": false, "rationale": "'r' represents the annual interest rate as a decimal."}, {"text": "The original principal amount.", "isCorrect": false, "rationale": "'P' represents the principal (starting amount)."}]}, {"question": "A savings account offers an annual interest rate, compounded quarterly. Which value should be used for 'n' when calculating the final amount using the compound interest formula?", "options": [{"text": "1", "isCorrect": false, "rationale": "n=1 is used for annual compounding."}, {"text": "4", "isCorrect": true, "rationale": "Quarterly compounding means interest is calculated 4 times per year, so 'n' should be 4."}, {"text": "12", "isCorrect": false, "rationale": "n=12 is used for monthly compounding."}, {"text": "365", "isCorrect": false, "rationale": "n=365 is used for daily compounding."}]}, {"question": "The 'Working with Exponents' section explains that $(1.06)^3$ means $1.06 \\times 1.06 \\times 1.06$. What does the exponent '3' fundamentally represent in this context?", "options": [{"text": "The annual interest rate.", "isCorrect": false, "rationale": "The annual interest rate is 0.06 or 6%, not the exponent '3'. The base of the exponent (1.06) includes the rate."}, {"text": "The number of times the base value (1.06) is multiplied by itself.", "isCorrect": true, "rationale": "The text clearly states, 'An exponent just means 'multiply that number by itself that many times.'' In this case, 1.06 is multiplied by itself 3 times."}, {"text": "The principal amount.", "isCorrect": false, "rationale": "The principal amount is 'P', which is multiplied by the entire exponential term, not represented by the exponent itself."}, {"text": "The number of compounding periods per year.", "isCorrect": false, "rationale": "The exponent in the full formula is 'nt', where 't' is time in years and 'n' is compounding periods per year. So '3' could represent 'nt' if n=1 and t=3, but fundamentally, an exponent signifies repeated multiplication."}]}, {"question": "An investor deposits $1,000 at a 6% annual interest rate for 10 years. Based on the 'Compound Interest at Different Frequencies' example, which compounding frequency would yield the highest final amount?", "options": [{"text": "Annually", "isCorrect": false, "rationale": "Annual compounding yields $1,790.85, which is less than monthly or daily compounding in the example."}, {"text": "Monthly", "isCorrect": false, "rationale": "Monthly compounding yields $1,819.40, which is higher than annual, but still less than daily compounding."}, {"text": "Daily", "isCorrect": true, "rationale": "Daily compounding yields $1,822.03, which is the highest amount among the three frequencies (annual, monthly, daily) presented in the example. The text explicitly states, 'More frequent compounding means more money'."}, {"text": "The compounding frequency does not affect the final amount as long as the annual rate is the same.", "isCorrect": false, "rationale": "This is incorrect. The example and the 'moneytip' explicitly demonstrate and state that more frequent compounding leads to a higher final amount due to interest earning interest sooner."}]}, {"question": "According to the 'moneytip' provided, when comparing savings accounts with the same stated Annual Percentage Rate (APR), what should an investor prioritize to maximize their earnings?", "options": [{"text": "The size of the principal deposit.", "isCorrect": false, "rationale": "While a larger principal will result in more money, the moneytip specifically addresses how to compare accounts with the *same* stated APR, implying principal is constant or a separate decision. It focuses on how interest is calculated."}, {"text": "The overall reputation of the financial institution.", "isCorrect": false, "rationale": "Reputation is important for trust, but the moneytip focuses on a specific mathematical factor affecting returns: compounding frequency."}, {"text": "The frequency of compounding (e.g., monthly or daily rather than annually).", "isCorrect": true, "rationale": "The moneytip explicitly states: 'When comparing savings accounts, look for one that compounds interest monthly or daily rather than annually. More frequent compounding means your money grows faster—even at the same stated APR.'"}, {"text": "The length of the investment term.", "isCorrect": false, "rationale": "A longer term generally yields more, but the moneytip is about comparing accounts for a given term, focusing on the *method* of interest calculation to maximize earnings."}]}, {"question": "Why does more frequent compounding (e.g., daily vs. annually) lead to a higher final balance, even with the same annual interest rate?", "options": [{"text": "More frequent compounding means the annual interest rate itself increases.", "isCorrect": false, "rationale": "The text states 'even at the same stated APR'. The annual rate remains the same; it's how often that rate is applied to the growing balance that changes."}, {"text": "More frequent compounding allows interest to be calculated on a larger, growing balance more often, causing the 'interest on interest' effect to accelerate.", "isCorrect": true, "rationale": "The text explains, 'More frequent compounding means more money—because interest starts earning interest sooner.' When interest is added more frequently, the base for the next interest calculation grows more rapidly, maximizing the power of compounding."}, {"text": "Less frequent compounding results in a lower principal amount.", "isCorrect": false, "rationale": "The principal amount (P) remains the same regardless of compounding frequency. Only the 'A' (final amount) changes."}, {"text": "Daily compounding introduces additional fees that reduce the net balance.", "isCorrect": false, "rationale": "The text does not mention additional fees associated with daily compounding; it only discusses the mathematical advantage of more frequent compounding."}]}, {"question": "If an investment has an annual interest rate of 5% and is compounded annually for 3 years, the total number of times interest is calculated on the growing balance over the 3-year period is:", "options": [{"text": "1", "isCorrect": false, "rationale": "This would be the number of calculations *per year* for annual compounding, not over 3 years."}, {"text": "3", "isCorrect": true, "rationale": "With annual compounding (n=1) for 3 years (t=3), interest is calculated at the end of each year. Therefore, it's calculated 1 * 3 = 3 times over the total period."}, {"text": "5", "isCorrect": false, "rationale": "5 is the interest rate, not the number of compounding events."}, {"text": "15", "isCorrect": false, "rationale": "This would be an incorrect multiplication (e.g., 5% * 3 years, or 5 * n * t). The correct calculation for total compounding events is n * t = 1 * 3 = 3."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
