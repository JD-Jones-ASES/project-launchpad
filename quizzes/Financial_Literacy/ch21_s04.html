    <script>

    };

        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>

        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 21, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement best describes the legal requirement and primary purpose of auto insurance as discussed in the text?", "options": [{"text": "Auto insurance is optional in most states and primarily covers damage to your own vehicle.", "isCorrect": false, "rationale": "The text states that most states require at least a minimum level of auto insurance, and liability coverage (which is typically required) primarily protects other drivers, not your own vehicle."}, {"text": "Auto insurance is legally required in nearly every state to ensure financial protection for damages and injuries you cause to others.", "isCorrect": true, "rationale": "The text explicitly states auto insurance is 'required by law if you drive' and that liability coverage, which is 'required by law in nearly every state,' protects other drivers from damages and injuries you cause."}, {"text": "Auto insurance is primarily for covering rental car costs and roadside assistance after an accident, and is only required if you finance your car.", "isCorrect": false, "rationale": "Rental reimbursement and roadside assistance are additional, optional coverages. While collision coverage is often required by lenders, liability is the core legal requirement and primary protective element for others."}, {"text": "Auto insurance is mandatory only for new drivers and is mainly designed to cover theft and vandalism of your vehicle.", "isCorrect": false, "rationale": "Auto insurance is mandatory for all drivers in most states, not just new ones. Coverage for theft and vandalism falls under comprehensive insurance, which is not the primary legal requirement."}], "id": "q01"}, {"question": "A liability limit of $100/300/100 means that your insurance will cover a maximum of:", "options": [{"text": "$100,000 for property damage per person, $300,000 for bodily injury per accident, and $100,000 for your own car's damage.", "isCorrect": false, "rationale": "Liability coverage does not cover damage to your own car. The first number is bodily injury per person, not property damage per person."}, {"text": "$100,000 for bodily injury per person, $300,000 for total bodily injury per accident, and $100,000 for property damage per accident.", "isCorrect": true, "rationale": "The text clearly defines the three numbers: '$100,000 per person for bodily injury', '$300,000 per accident for bodily injury (total)', and '$100,000 per accident for property damage'."}, {"text": "$100,000 for your own vehicle's repairs, $300,000 for medical bills, and $100,000 for a rental car.", "isCorrect": false, "rationale": "Liability coverage does not cover your own vehicle's repairs. Medical bills are covered for others, not explicitly for you, and rental car coverage is an additional, separate policy."}, {"text": "$100,000 deductible, $300,000 premium, and $100,000 total claim limit.", "isCorrect": false, "rationale": "The numbers represent coverage limits, not deductibles or premiums. Liability coverage also does not typically have a deductible for claims made against it by others."}], "id": "q02"}, {"question": "A driver, while parked, discovers their car has been severely damaged by a hailstorm. Which type of auto insurance coverage would primarily pay for the repairs?", "options": [{"text": "Liability coverage", "isCorrect": false, "rationale": "Liability coverage pays for damages and injuries you cause to other people and their property; it does not cover damage to your own car from a natural event."}, {"text": "Collision coverage", "isCorrect": false, "rationale": "Collision coverage pays for damage to your vehicle when you collide with another car or object. A hailstorm is not a collision."}, {"text": "Uninsured/Underinsured Motorist (UM/UIM) coverage", "isCorrect": false, "rationale": "UM/UIM covers your injuries and damages if you are hit by a driver who has no insurance or not enough insurance. A hailstorm does not involve another driver."}, {"text": "Comprehensive coverage", "isCorrect": true, "rationale": "Comprehensive coverage pays for damage to your vehicle from events other than a collision, explicitly listing 'hail' as an example."}], "id": "q03"}, {"question": "Marcus, an uninsured driver, rear-ends another car, causing $8,000 in property damage and $22,000 in bodily injury. Based on the 'Real World' example, what is the most significant financial consequence for Marcus?", "options": [{"text": "He will only face a suspended license and possible fines, as the other driver's insurance will cover the damages.", "isCorrect": false, "rationale": "The text states Marcus is 'legally responsible for $30,000 in damages' and 'without insurance, he must pay out of pocket.' The other driver's insurance might pay initially but would then seek reimbursement from Marcus."}, {"text": "He will be financially responsible for the full $30,000 in damages and injuries, in addition to other legal penalties.", "isCorrect": true, "rationale": "The 'Real World' example explicitly states, 'Marcus is legally responsible for $30,000 in damages. Without insurance, he must pay out of pocket. He also faces a suspended license, possible fines, and a lawsuit.'"}, {"text": "His savings of $120/month on premiums will easily offset the costs, proving that skipping insurance can be a smart financial move.", "isCorrect": false, "rationale": "The text clearly states, 'The $120/month he 'saved' on premiums now pales against the $30,000 he owes. Driving without insurance is never worth the risk.' This option directly contradicts the lesson of the example."}, {"text": "The other driver's Uninsured Motorist (UM) coverage will completely absolve Marcus of any financial responsibility.", "isCorrect": false, "rationale": "While the other driver's UM coverage might pay *them*, it doesn't absolve Marcus of *his* legal responsibility. The UM insurer would likely pursue Marcus for reimbursement."}], "id": "q04"}, {"question": "Which of the following scenarios highlights the primary benefit of Uninsured/Underinsured Motorist (UM/UIM) coverage?", "options": [{"text": "Your car is stolen from your driveway, and UM/UIM helps you buy a new one.", "isCorrect": false, "rationale": "Theft is covered by comprehensive insurance, not UM/UIM. UM/UIM is for accidents involving other drivers."}, {"text": "You cause an accident and injure another driver, and UM/UIM pays for their medical bills.", "isCorrect": false, "rationale": "If you cause an accident, your liability coverage pays for the other driver's injuries. UM/UIM is for when the *other driver* is at fault and lacks sufficient insurance."}, {"text": "You are hit by a driver who flees the scene and is never identified, and UM/UIM covers your medical expenses and car repairs.", "isCorrect": true, "rationale": "The text states UM/UIM 'covers your injuries and damages if you are hit by a driver who has no insurance or not enough insurance.' A hit-and-run driver effectively has no insurance to cover your losses."}, {"text": "Your car breaks down on the highway, and UM/UIM provides roadside assistance.", "isCorrect": false, "rationale": "Roadside assistance is a separate, additional coverage, not part of UM/UIM."}], "id": "q05"}, {"question": "Many renters mistakenly believe their landlord's insurance covers their personal property. What does the landlord's policy actually cover?", "options": [{"text": "The landlord's policy covers all personal property within the rental unit, up to a certain limit.", "isCorrect": false, "rationale": "The text explicitly states: 'Many renters assume their landlord's insurance covers their belongings. It does not.' and 'The landlord's policy covers the building itself—not your furniture, electronics, clothing, or other personal property.'"}, {"text": "The landlord's policy covers the building itself, including structural damage, but not the tenant's personal belongings.", "isCorrect": true, "rationale": "The text clearly states, 'The landlord's policy covers the building itself—not your furniture, electronics, clothing, or other personal property.'"}, {"text": "The landlord's policy covers liability for injuries that occur within the tenant's apartment, but not property damage.", "isCorrect": false, "rationale": "While a landlord's policy may have liability coverage for common areas or building-related issues, a tenant's liability within their own apartment is usually covered by their own renters insurance. The primary focus of the landlord's policy is the building structure."}, {"text": "The landlord's policy covers additional living expenses for tenants if the building becomes uninhabitable due to a covered event.", "isCorrect": false, "rationale": "Additional living expenses for tenants are typically covered by renters insurance, not the landlord's policy."}], "id": "q06"}, {"question": "Priya's apartment catches fire, destroying her $5,000 worth of belongings. She has renters insurance with a $20/month premium and a $500 deductible. What is Priya's total out-of-pocket loss (including annual premiums) for this incident in the first year of her policy?", "options": [{"text": "$5,000", "isCorrect": false, "rationale": "This would be her loss without insurance. With insurance, she only pays the deductible and premiums."}, {"text": "$500", "isCorrect": false, "rationale": "This is only the deductible. Her total out-of-pocket loss includes the annual premiums paid as well."}, {"text": "$740", "isCorrect": true, "rationale": "Her out-of-pocket loss includes the $500 deductible plus the annual premium of $20/month * 12 months = $240. So, $500 + $240 = $740."}, {"text": "$4,500", "isCorrect": false, "rationale": "This is the amount of the insurance reimbursement ($5,000 - $500 deductible), not her out-of-pocket cost."}], "id": "q07"}, {"question": "Which of the following is *not* a typical coverage provided by renters insurance?", "options": [{"text": "Coverage for your personal belongings if they are stolen.", "isCorrect": false, "rationale": "The text states renters insurance covers 'Personal property: Your belongings if damaged or stolen (fire, theft, burst pipes, and other covered events).'"}, {"text": "Liability coverage if someone is injured in your apartment and sues you.", "isCorrect": false, "rationale": "The text states renters insurance covers 'Liability: If someone is injured in your apartment and sues you, renters insurance can cover legal costs and damages.'"}, {"text": "Coverage for hotel and meal costs if your apartment becomes uninhabitable.", "isCorrect": false, "rationale": "The text states renters insurance covers 'Additional living expenses: If your apartment becomes uninhabitable due to a covered event, the policy may cover hotel and meal costs.'"}, {"text": "Coverage for damage to the physical structure of the apartment building.", "isCorrect": true, "rationale": "The text clarifies that 'The landlord's policy covers the building itself—not your furniture, electronics, clothing, or other personal property.' Renters insurance covers the tenant's property and liability, not the building structure."}], "id": "q08"}, {"question": "What is a key difference in coverage between homeowners insurance and renters insurance?", "options": [{"text": "Renters insurance covers liability for injuries on the property, while homeowners insurance does not.", "isCorrect": false, "rationale": "Both renters and homeowners insurance provide liability coverage for injuries on their respective properties."}, {"text": "Homeowners insurance covers the structure of the home, which renters insurance does not.", "isCorrect": true, "rationale": "The text explicitly states homeowners insurance covers 'The structure of your home (what renters insurance does not cover).'"}, {"text": "Only renters insurance covers personal property inside the dwelling, whereas homeowners insurance only covers the structure.", "isCorrect": false, "rationale": "Both renters and homeowners insurance cover personal property inside the home."}, {"text": "Homeowners insurance is optional, while renters insurance is required by mortgage lenders.", "isCorrect": false, "rationale": "Homeowners insurance is required by virtually all mortgage lenders, while renters insurance is generally optional for renters (though highly recommended)."}], "id": "q09"}, {"question": "According to the 'moneytip' section, what two strategies can significantly help lower your auto or homeowners insurance premiums?", "options": [{"text": "Paying your premiums monthly and increasing your liability limits.", "isCorrect": false, "rationale": "Paying monthly usually doesn't offer a discount, and increasing liability limits would typically raise, not lower, premiums."}, {"text": "Bundling multiple policies with different companies and choosing a lower deductible.", "isCorrect": false, "rationale": "Bundling with *different* companies would not result in a multi-policy discount. Choosing a lower deductible would increase premiums, not lower them."}, {"text": "Bundling multiple policies with the same company and raising your deductible.", "isCorrect": true, "rationale": "The 'moneytip' states, 'You can often save 5–15% on auto or homeowners insurance by bundling—buying multiple policies from the same company. Ask your insurer about multi-policy discounts. Also, raising your deductible (if you can afford to cover it) can significantly lower your premium.'"}, {"text": "Only purchasing liability coverage and avoiding additional coverages like comprehensive.", "isCorrect": false, "rationale": "While only buying liability would lower costs, this option does not represent the general 'strategies' for lowering premiums on *existing* coverage, and it doesn't mention the advised bundling or deductible adjustments. It also suggests avoiding coverage that may be essential or required."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
