        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 23, Section 1</div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, which statement best defines estate planning and its relevance to young adults?", "options": [{"text": "It's a formal process primarily for those nearing retirement to decide their legacy.", "isCorrect": false, "rationale": "The text explicitly states that estate planning 'sounds formal and distant—something you do in your 60s,' but clarifies it is relevant to young adults as well."}, {"text": "It's the process of deciding what happens to your assets, your healthcare, and your financial accounts if you become incapacitated or die, regardless of age.", "isCorrect": true, "rationale": "The text defines estate planning as 'the process of deciding what happens to your assets, your healthcare, and your financial accounts if you become incapacitated or die' and emphasizes its importance for young adults."}, {"text": "It's a complex legal procedure solely for wealthy individuals to minimize inheritance taxes.", "isCorrect": false, "rationale": "The text focuses on basic estate planning for young adults, not specifically tax minimization for the wealthy, nor does it imply it's solely for them."}, {"text": "It primarily involves drafting a will to distribute personal belongings after death, excluding digital assets.", "isCorrect": false, "rationale": "While a will is part of estate planning, the text notes naming beneficiaries is 'far more powerful' and explicitly includes 'Digital accounts with monetary value' and 'Social media accounts' as part of an estate."}]}, {"question": "Which of the following combinations *definitively* indicates that a young adult has an 'estate' that requires attention, according to the provided text?", "options": [{"text": "Only a 401(k) from a first job.", "isCorrect": false, "rationale": "While a 401(k) is part of an estate, the word 'only' makes this option incorrect as the text lists multiple other items."}, {"text": "A social media account with irreplaceable memories and a car.", "isCorrect": true, "rationale": "The text lists both 'A car' and 'Social media accounts containing irreplaceable photos and memories' as items that constitute an estate needing attention."}, {"text": "Student loan debt and a rental apartment lease.", "isCorrect": false, "rationale": "The text does not list student loan debt or a rental lease as defining components of an estate for planning purposes, focusing on assets."}, {"text": "A collection of rare books and a gym membership.", "isCorrect": false, "rationale": "While rare books could be an asset, they are not explicitly listed in the text, and a gym membership is not typically considered an estate asset."}]}, {"question": "Based on the text, what is identified as the single most important and immediately actionable step any young adult can take in estate planning?", "options": [{"text": "Drafting a comprehensive will to cover all potential assets.", "isCorrect": false, "rationale": "The text states that naming a beneficiary is 'far more powerful in practice' than writing a will for immediate action and probate avoidance."}, {"text": "Naming a specific beneficiary on every financial account.", "isCorrect": true, "rationale": "The text explicitly states: 'The single most important and immediately actionable step any young adult can take is naming a beneficiary on every financial account.'"}, {"text": "Establishing a power of attorney for healthcare decisions.", "isCorrect": false, "rationale": "While important, the text identifies beneficiary designation as the 'single most important and immediately actionable step,' not power of attorney."}, {"text": "Consolidating all digital accounts into a single platform for easier management.", "isCorrect": false, "rationale": "This action is not mentioned in the text as a primary step in estate planning."}]}, {"question": "The text highlights a key difference between naming a beneficiary on a financial account and relying solely on a will for asset distribution. What is this difference?", "options": [{"text": "A will ensures all assets go directly to designated heirs, while a beneficiary form is only for specific financial products and always requires court oversight.", "isCorrect": false, "rationale": "This is incorrect. A beneficiary designation bypasses court oversight (probate), while assets distributed solely by a will typically go through probate."}, {"text": "Naming a beneficiary allows assets to bypass probate, making the distribution process immediate, private, and free, unlike assets distributed via a will.", "isCorrect": true, "rationale": "The text explicitly states that if a specific person is named as a beneficiary, 'the money passes directly to them, bypassing probate entirely. It is immediate, private, and free.'"}, {"text": "Wills are legally binding at any age, but beneficiary designations are only valid after age 18.", "isCorrect": false, "rationale": "The text does not state that beneficiary designations are only valid after age 18, and both instruments have legal capacity requirements."}, {"text": "A will provides greater flexibility for complex distribution schemes, whereas beneficiaries are limited to a single person per account.", "isCorrect": false, "rationale": "While wills can be complex, the primary difference highlighted in the text is the probate process, and beneficiaries can often be multiple or contingent."}]}, {"question": "In the 'The Missing Beneficiary' real-world example, what was the primary consequence of Jordan not naming a beneficiary for his 401(k) account?", "options": [{"text": "The account balance was forfeited to the company's pension fund.", "isCorrect": false, "rationale": "The text states the 401(k) passed to 'his estate,' not forfeited to the company."}, {"text": "His family had to pay additional taxes on the inherited amount due to the oversight.", "isCorrect": false, "rationale": "The text mentions legal fees and delays as the consequences, not additional taxes as the primary issue."}, {"text": "The funds were distributed immediately but only after a lengthy family dispute over the rightful heir.", "isCorrect": false, "rationale": "The text states the family had to 'wait eight months' and incurred legal fees; it does not mention a family dispute as the primary consequence."}, {"text": "The account went through probate, resulting in significant delays (eight months) and legal fees ($2,100), diminishing the inheritance for his family.", "isCorrect": true, "rationale": "The text explicitly details this consequence: 'Because Jordan named no beneficiary, the 401(k) passes to 'his estate.' His family must hire an estate attorney, file paperwork with the probate court, and wait eight months before the account can be distributed. Legal fees consume $2,100 of the balance.'"}]}, {"question": "Which of the following is *not* a stated benefit of naming a specific person as a beneficiary on a financial account, according to the text?", "options": [{"text": "The money passes directly to them.", "isCorrect": false, "rationale": "This *is* a stated benefit: 'the money passes directly to them.'"}, {"text": "It bypasses the probate process entirely.", "isCorrect": false, "rationale": "This *is* a stated benefit: 'bypassing probate entirely.'"}, {"text": "It ensures the account balance is protected from all future creditors of the deceased.", "isCorrect": true, "rationale": "The text does not mention protection from creditors as a benefit of naming a beneficiary; it focuses on bypassing probate and ease of transfer."}, {"text": "The transfer of funds is immediate, private, and free.", "isCorrect": false, "rationale": "This *is* a stated benefit: 'It is immediate, private, and free.'"}]}, {"question": "Upon turning 18, what significant change occurs regarding a young adult's medical information, according to the text?", "options": [{"text": "Parents automatically gain access to medical records to assist in emergencies.", "isCorrect": false, "rationale": "The text explicitly states: 'Once you turn 18, your parents cannot automatically access your medical records or make healthcare decisions for you—even in an emergency.'"}, {"text": "The young adult is required to designate a legal guardian for all medical decisions.", "isCorrect": false, "rationale": "The text indicates that specific legal documents (like a healthcare directive) are needed to give parents authority, not that a guardian is required."}, {"text": "Parents can no longer automatically access medical records or make healthcare decisions, even in an emergency, without specific legal documents.", "isCorrect": true, "rationale": "This directly reflects the text: 'Once you turn 18, your parents cannot automatically access your medical records or make healthcare decisions for you—even in an emergency. You need legal documents... to give them that authority.'"}, {"text": "All medical records become public information for insurance claim processing.", "isCorrect": false, "rationale": "This statement is false and not mentioned in the text. Medical records remain private."}]}, {"question": "How does turning 18 affect a young adult's financial accounts, as described in the text?", "options": [{"text": "Banks are legally required to notify parents of any suspicious account activity for young adults.", "isCorrect": false, "rationale": "The text states the opposite: 'Banks cannot legally discuss your accounts with your parents without your explicit authorization.'"}, {"text": "Financial institutions automatically grant parents oversight of accounts for security and management.", "isCorrect": false, "rationale": "This is incorrect. The text clarifies that parents cannot discuss accounts without explicit authorization."}, {"text": "Banks cannot legally discuss the young adult's accounts with their parents without explicit authorization.", "isCorrect": true, "rationale": "The text states: 'Banks cannot legally discuss your accounts with your parents without your explicit authorization.'"}, {"text": "Young adults must open new bank accounts separate from any previously linked to their parents.", "isCorrect": false, "rationale": "The text does not state this as a requirement, only that privacy rules change for existing accounts."}]}, {"question": "Sarah is 19 years old and in college. She has a savings account and recently had an unexpected medical emergency that left her temporarily incapacitated. Her parents tried to access her bank account to pay bills and call her doctors for updates. Based on the text, what is the most likely outcome of her parents' attempts?", "options": [{"text": "They would likely be granted access to both her financial and medical information due to the emergency, as next-of-kin.", "isCorrect": false, "rationale": "The text explicitly states that after 18, parents cannot automatically access medical records or financial accounts, even in an emergency, without prior legal authorization."}, {"text": "They would only be able to access her medical information, as financial privacy is generally stricter than medical privacy for young adults.", "isCorrect": false, "rationale": "The text indicates both medical and financial privacy are strict for adults over 18, preventing automatic access."}, {"text": "They would be denied access to both her financial and medical information without Sarah's prior legal authorization (e.g., power of attorney or healthcare directive).", "isCorrect": true, "rationale": "The text states that once 18, 'your parents cannot automatically access your medical records or make healthcare decisions for you—even in an emergency' and 'Banks cannot legally discuss your accounts with your parents without your explicit authorization.' This scenario directly applies these rules."}, {"text": "They would be able to access her bank account but not her medical records, as bank accounts are often linked to next-of-kin.", "isCorrect": false, "rationale": "Bank accounts are private after 18; the concept of 'next-of-kin' does not automatically grant access to an adult's financial accounts without explicit authorization or a power of attorney."}]}, {"question": "According to the 'moneytip' section, when should a young adult update their beneficiary designations?", "options": [{"text": "Only after they have accumulated a significant amount of wealth, usually nearing retirement.", "isCorrect": false, "rationale": "The 'moneytip' advises updating for major life events, not necessarily based on wealth accumulation or retirement age."}, {"text": "Annually, during tax season, as a routine financial review.", "isCorrect": false, "rationale": "While annual review is good practice, the text specifically lists triggers for updates, not an annual schedule."}, {"text": "Whenever a major life event occurs, such as marriage, divorce, the birth of a child, or the death of a beneficiary.", "isCorrect": true, "rationale": "The 'moneytip' explicitly states: 'Update this designation whenever a major life event occurs: marriage, divorce, the birth of a child, or the death of a beneficiary.'"}, {"text": "Only if the initial beneficiary becomes unavailable or cannot be contacted by the financial institution.", "isCorrect": false, "rationale": "This is one reason to update, but the text lists a broader range of 'major life events' that warrant updates, not just unavailability."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
