<script>
var QUESTIONS = [{"question": "What is the primary purpose of the rearranged Future Value of Annuity formula, expressed as PMT, in this section?", "options": [{"text": "To calculate the total future value of a series of monthly contributions given an interest rate.", "isCorrect": false, "rationale": "This describes the original Future Value of Annuity formula, not the rearranged PMT formula which solves for the contribution."}, {"text": "To determine the required monthly contribution needed to reach a specific future financial goal.", "isCorrect": true, "rationale": "The section explicitly states the formula 'solves for the monthly contribution (PMT) needed to reach a specific future value (FV).'"}, {"text": "To estimate the annual interest rate required to achieve a millionaire status within a given timeframe.", "isCorrect": false, "rationale": "The formula solves for PMT, not the interest rate (r). The interest rate is an input variable."}, {"text": "To project the total amount of principal saved over a period, excluding interest earned.", "isCorrect": false, "rationale": "The formula calculates the monthly contribution required, which includes the impact of interest to reach a future value, not just the principal saved."}]}, {"question": "When applying the provided 'Monthly Contribution Needed to Reach a Goal' formula, which of the following variables MUST be converted to a monthly basis before calculation?", "options": [{"text": "The target future value (FV) and the monthly contribution (PMT).", "isCorrect": false, "rationale": "FV is the total future goal, not a monthly value. PMT is the monthly contribution being solved for, but it's the result, not an input that needs converting from an annual rate."}, {"text": "The monthly interest rate (r) and the total months until the goal (n).", "isCorrect": true, "rationale": "The text clearly states 'r = monthly interest rate (annual rate / 12)' and 'n = total months until goal (years * 12)', indicating these must be monthly values."}, {"text": "The target future value (FV) and the total months until the goal (n).", "isCorrect": false, "rationale": "FV is a lump sum, not a monthly value. While 'n' is in months, FV does not need conversion to a monthly basis."}, {"text": "The monthly contribution (PMT) and the monthly interest rate (r).", "isCorrect": false, "rationale": "PMT is the output of the formula, not an input that needs conversion from an annual rate. 'r' does need to be monthly."}]}, {"question": "Based on the 'Millionaire Table,' approximately how many times greater is the required monthly contribution for someone starting at age 45 compared to someone starting at age 18 to reach $1 million by age 65?", "options": [{"text": "Approximately 2.7 times greater.", "isCorrect": false, "rationale": "2.7 times is the increase from age 18 to age 30, not age 18 to 45."}, {"text": "Approximately 5.5 times greater.", "isCorrect": false, "rationale": "This value is not directly supported by the provided calculations for those specific age ranges."}, {"text": "Approximately 10.5 times greater.", "isCorrect": true, "rationale": "The text states, 'Waiting from 18 to 45 raises it from $161 to $1,697 (10.5x).' (1697.34 / 160.83 ≈ 10.55)"}, {"text": "Approximately 20 times greater.", "isCorrect": false, "rationale": "This value is significantly higher than the actual multiplier calculated in the text."}]}, {"question": "What is the most significant takeaway from the 'What These Numbers Mean' section regarding the strategy for achieving a $1 million retirement goal?", "options": [{"text": "High-income earners are exclusively positioned to become millionaires due to their greater savings capacity.", "isCorrect": false, "rationale": "The 'didyouknow' section explicitly refutes this, stating the gap is 'not primarily about income—it is primarily about starting age and consistency.'"}, {"text": "Achieving millionaire status by 65 is almost impossible for anyone who starts saving after age 30.", "isCorrect": false, "rationale": "While significantly harder, the text does not state it's impossible, merely much more challenging and potentially 'not possible for most people' for very late starters."}, {"text": "The value of starting to save early, even with small monthly amounts, exponentially reduces the effort required to reach a large financial goal.", "isCorrect": true, "rationale": "The entire section, especially the comparison of starting ages and the 'moneytip,' highlights that 'the value of starting today, even with a small amount, is mathematically provable and quantified in the tables above' due to the power of compounding over time."}, {"text": "The most effective strategy is to delay saving until one can afford to contribute very large monthly sums.", "isCorrect": false, "rationale": "This directly contradicts the core message and the 'moneytip' which advises against waiting, even if starting with small amounts."}]}, {"question": "A person starting to save at age 30 wants to reach $1 million by age 65, assuming an 8% annual return. If they are currently saving $200 per month, how much *more* do they need to save monthly to meet their goal?", "options": [{"text": "An additional $160.83 per month.", "isCorrect": false, "rationale": "This is the approximate total monthly contribution required for someone starting at age 18, not the additional amount for a 30-year-old."}, {"text": "An additional $235.66 per month.", "isCorrect": true, "rationale": "The table shows a 30-year-old needs to save $435.66/month. If they save $200/month, they need $435.66 - $200.00 = $235.66 more per month."}, {"text": "An additional $286.36 per month.", "isCorrect": false, "rationale": "This is the approximate total monthly contribution required for someone starting at age 25, not the additional amount for a 30-year-old."}, {"text": "They are already saving enough to reach their goal.", "isCorrect": false, "rationale": "A 30-year-old needs $435.66/month, so saving $200/month is insufficient."}]}, {"question": "The text states that for a 45-year-old, saving enough to reach $1 million by 65, while using an 8% annual return, is 'simply not possible for most people.' What is the primary reason provided for this assertion?", "options": [{"text": "The investment options available to older individuals are too limited to generate sufficient returns.", "isCorrect": false, "rationale": "The text does not mention limitations on investment options based on age."}, {"text": "The required monthly contribution of $1,697 is an unaffordable amount for the majority of people's budgets.", "isCorrect": true, "rationale": "The text explicitly states: 'A 45-year-old who wants to reach $1 million by 65 needs to save $1,697 per month—more than $20,000 per year. That is simply not possible for most people.'"}, {"text": "The average American's current retirement savings are too low to ever catch up from age 45.", "isCorrect": false, "rationale": "While the 'didyouknow' section mentions low average savings, the primary reason given for the difficulty at age 45 is the *required monthly contribution*, not the starting balance."}, {"text": "The annual return rate of 8% is unrealistic for someone starting to invest at age 45.", "isCorrect": false, "rationale": "The calculations assume an 8% return is achievable regardless of starting age; the difficulty stems from the required contribution, not the assumed return."}]}, {"question": "According to the 'moneytip' section, what is the most powerful action one can take in the 'next week' for their financial future?", "options": [{"text": "Significantly increase their income to enable larger monthly contributions.", "isCorrect": false, "rationale": "While increasing income can help, the 'moneytip' focuses on *starting* to save. The 'didyouknow' section also notes the gap is 'not primarily about income.'"}, {"text": "Open a Roth IRA at a low-fee brokerage, set up automatic contributions (even small ones), and invest in a diversified index fund.", "isCorrect": true, "rationale": "This directly quotes and summarizes the advice in the 'moneytip' section as 'The most powerful thing you can do for your financial future in the next week.'"}, {"text": "Wait to invest until they have saved a substantial lump sum to make a more impactful initial investment.", "isCorrect": false, "rationale": "The 'moneytip' explicitly advises, 'Do not wait until you can afford more. The value of starting today, even with a small amount, is mathematically provable.'"}, {"text": "Consult with a certified financial planner to create a complex, personalized investment strategy.", "isCorrect": false, "rationale": "The tip suggests a simpler, accessible approach (Roth IRA, index fund) rather than immediately seeking complex personalized advice."}]}, {"question": "The 'didyouknow' section highlights that the gap between desired and actual retirement savings is primarily due to 'starting age and consistency.' How does the 'Millionaire Table' data most strongly support the importance of *consistency*?", "options": [{"text": "By demonstrating that the required monthly contributions significantly decrease with earlier starting ages.", "isCorrect": false, "rationale": "This primarily supports the importance of *starting age* and the power of compounding, not directly the need for consistency in making payments once started."}, {"text": "By illustrating the exponential growth of investments over long periods due to compounding interest.", "isCorrect": false, "rationale": "This again emphasizes the benefit of *time* and compounding, which is linked to starting age, but not explicitly to the discipline of *consistent* payments."}, {"text": "By providing fixed monthly contribution amounts for each starting age, implicitly requiring these payments to be maintained regularly over 'n' months to achieve the future value.", "isCorrect": true, "rationale": "The formula and the table's calculations for PMT are based on the assumption of a *consistent* monthly contribution (annuity). If these payments are not made consistently over the specified 'n' months, the target future value will not be reached, thus emphasizing the importance of consistency."}, {"text": "By showing that saving 'even $25 or $50' per month is better than not saving at all.", "isCorrect": false, "rationale": "This supports starting *early* and with *small amounts*, but doesn't directly address the *consistency* of those payments once begun, which is critical to the 'annuity' calculation."}]}, {"question": "Consider two individuals, Alice and Bob, both aiming for $1 million by age 65 with an 8% annual return. Alice starts at age 18, consistently saving $160 per month. Bob starts at age 25, consistently saving $300 per month. Based on the provided 'Millionaire Table,' which statement is most accurate?", "options": [{"text": "Alice is significantly ahead and will likely reach her goal much earlier than Bob.", "isCorrect": false, "rationale": "Alice's saving ($160) is slightly below the required $160.83 for age 18. Bob's saving ($300) exceeds the required $286.36 for age 25. Therefore, Bob is actually in a better position to reach the goal."}, {"text": "Bob is more likely to achieve the $1 million goal because his monthly contribution exceeds the required amount for his starting age.", "isCorrect": true, "rationale": "Bob's $300/month is greater than the $286.36/month required for a 25-year-old. Alice's $160/month is slightly less than the $160.83/month required for an 18-year-old. Thus, Bob is more robustly on track."}, {"text": "Both Alice and Bob are currently saving more than the required amount for their respective starting ages.", "isCorrect": false, "rationale": "Alice is saving slightly less than the required amount for an 18-year-old ($160 vs. $160.83)."}, {"text": "Alice's early start completely negates Bob's higher monthly contribution, putting her in a superior position.", "isCorrect": false, "rationale": "While an early start is powerful, Alice's current contribution is slightly below target, while Bob's higher contribution for his starting age puts him on a stronger path, even with a later start."}]}, {"question": "If the average annual return rate (r) for investments were to decrease significantly (e.g., from 8% to 4%), how would this primarily impact the required monthly contributions to reach $1 million by age 65, particularly for those starting early?", "options": [{"text": "It would make the benefit of starting early even more critical, as more time would be needed for smaller returns to compound into substantial wealth.", "isCorrect": true, "rationale": "A lower interest rate means less growth from compounding. To reach the same future value, the monthly contributions would need to be *higher*. This makes the factor of 'time' (starting early) even more crucial to compensate for the reduced rate of return."}, {"text": "It would significantly decrease the required monthly contributions across all starting ages, as less risk implies smaller payments.", "isCorrect": false, "rationale": "A lower return rate means compounding is less effective, so a *higher* monthly contribution would be needed to reach the same future value, not lower."}, {"text": "It would primarily affect those starting later, making their goal impossible, while early starters would be largely unaffected.", "isCorrect": false, "rationale": "While it would make it harder for late starters, early starters would also be affected, needing higher contributions to compensate for the reduced growth over time. The fundamental principle that 'time in the market' helps would still apply, but the numbers would shift for everyone."}, {"text": "It would lead to a change in the target future value (FV) rather than the monthly contributions (PMT).", "isCorrect": false, "rationale": "Assuming the target FV remains $1 million, a change in 'r' would directly alter the calculated 'PMT' needed to reach that specific FV."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
