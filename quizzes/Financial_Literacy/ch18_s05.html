        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>

        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 18, Section 5</div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "What is the definition of $diversification$ in the context of investing?", "options": [{"text": "Spreading investments across different assets, companies, industries, and regions so no single failure can devastate the portfolio", "isCorrect": true, "rationale": "Diversification means distributing your investments so that any one investment's failure does not destroy your entire portfolio."}, {"text": "Investing only in established, large-cap companies to reduce risk", "isCorrect": false, "rationale": "Concentrating in large-cap companies is not diversification — it is still concentrated in one asset type."}, {"text": "Moving money out of the market when prices are falling to avoid losses", "isCorrect": false, "rationale": "That describes market timing, which is the opposite approach. Diversification is about spreading investments, not timing exits."}, {"text": "Holding cash instead of stocks to preserve purchasing power", "isCorrect": false, "rationale": "Holding only cash is the opposite of diversification — it concentrates everything in a single asset type."}], "id": "q01"}, {"question": "When energy prices rise, energy company stocks often gain — but airline stocks often fall. What does this illustrate about $diversification$?", "options": [{"text": "Different investments react differently to the same economic events, so owning both can smooth out volatility", "isCorrect": true, "rationale": "When one investment zigs down, another might zag up. Owning uncorrelated assets reduces overall portfolio volatility."}, {"text": "You should always favor energy stocks over airline stocks in any market", "isCorrect": false, "rationale": "The example illustrates correlation, not a blanket recommendation to favor one sector."}, {"text": "Airline stocks should be avoided because they are always risky", "isCorrect": false, "rationale": "The example shows that airline stocks rise in some conditions (when fuel is cheap). The lesson is about correlation, not blanket avoidance."}, {"text": "Energy and airline stocks always move in opposite directions regardless of economic events", "isCorrect": false, "rationale": "The text says they often (not always) react differently to energy price changes. Diversification works because of imperfect correlation, not guaranteed opposites."}], "id": "q02"}, {"question": "What is an investment $portfolio$?", "options": [{"text": "Your complete collection of investments, ideally containing many different assets that do not all move in the same direction", "isCorrect": true, "rationale": "A portfolio is the total of all your investments. A diversified portfolio includes different asset types that are not perfectly correlated."}, {"text": "A single high-performing stock you hold for the long term", "isCorrect": false, "rationale": "A single stock is one investment, not a portfolio. A portfolio encompasses all your investments combined."}, {"text": "A monthly investment plan for retirement contributions", "isCorrect": false, "rationale": "A monthly investment plan is a strategy (like dollar-cost averaging), not the definition of a portfolio."}, {"text": "A brokerage account that only holds index funds", "isCorrect": false, "rationale": "While index funds are part of a diversified portfolio, a portfolio refers to your complete collection of investments across all accounts."}], "id": "q03"}, {"question": "How do $index funds$ relate to diversification?", "options": [{"text": "A single index fund can give instant diversification across hundreds or thousands of companies", "isCorrect": true, "rationale": "Index funds allow you to own tiny pieces of many companies in one investment, providing broad diversification without having to pick individual stocks."}, {"text": "Index funds must be combined with individual stocks to achieve true diversification", "isCorrect": false, "rationale": "A broad market index fund can provide extensive diversification on its own — no individual stock picking required."}, {"text": "Index funds reduce diversification because they hold only the largest companies", "isCorrect": false, "rationale": "Many index funds track entire markets (including small and mid-cap companies), providing broad diversification."}, {"text": "Index funds are only available to professional investors, not ordinary individuals", "isCorrect": false, "rationale": "Index funds are widely available to individual investors through brokerage accounts and retirement plans like 401(k)s."}], "id": "q04"}, {"question": "What is $dollar-cost averaging$ (DCA)?", "options": [{"text": "Investing a fixed dollar amount at regular intervals regardless of whether the market is up or down", "isCorrect": true, "rationale": "DCA means committing to a fixed, regular investment regardless of market conditions. When prices are high, you buy fewer shares; when prices are low, you automatically buy more."}, {"text": "Calculating the average market price over the past year and only investing at that level", "isCorrect": false, "rationale": "DCA is not about waiting for a specific price level — it is about investing consistently on a schedule regardless of price."}, {"text": "Doubling your investment every time the market drops by 10%", "isCorrect": false, "rationale": "This describes a different (and riskier) strategy. DCA means investing a fixed amount on a fixed schedule, not varying amounts based on price drops."}, {"text": "Selling shares gradually over time to reduce your average selling price", "isCorrect": false, "rationale": "DCA refers to a buying strategy. The concept of systematic selling is a different strategy."}], "id": "q05"}, {"question": "In the dollar-cost averaging example, $100 is invested monthly. In Month 2, the share price falls to $5.00. What is the result?", "options": [{"text": "The $100 automatically buys 20 shares — more than the 10 shares bought in Month 1", "isCorrect": true, "rationale": "When the price is lower, your fixed $100 buys more shares. This is the core mechanic of DCA — low prices automatically mean more shares purchased."}, {"text": "The $100 buys fewer shares because the account value has decreased", "isCorrect": false, "rationale": "Your account value may be lower, but the fixed $100 investment still buys based on the current share price. At $5.00, you buy 20 shares."}, {"text": "The investment is paused until prices recover", "isCorrect": false, "rationale": "DCA requires investing on schedule regardless of price — that consistency is precisely what makes it effective."}, {"text": "The $100 buys the same number of shares as Month 1 because the amount is fixed", "isCorrect": false, "rationale": "The dollar amount is fixed, not the number of shares. At $5.00 per share, $100 buys 20 shares — not 10."}], "id": "q06"}, {"question": "Using the DCA example from the text ($100/month, prices of $10, $5, $8), what is the average cost per share paid?", "options": [{"text": "$7.06 per share", "isCorrect": true, "rationale": "Total invested: $300 / Total shares: 42.50 = $7.06 per share. This is lower than the simple average price of $7.67 because more shares were purchased when prices were low."}, {"text": "$7.67 per share", "isCorrect": false, "rationale": "$7.67 is the simple average of the three prices ($10 + $5 + $8) / 3. The actual DCA cost is lower at $7.06."}, {"text": "$8.00 per share", "isCorrect": false, "rationale": "$8.00 was only the price in Month 3. The average cost across all purchases is $7.06."}, {"text": "$6.25 per share", "isCorrect": false, "rationale": "This is not the correct calculation. Total invested ($300) divided by total shares (42.50) equals $7.06."}], "id": "q07"}, {"question": "Why is the DCA average cost per share ($7.06) lower than the simple average price ($7.67)?", "options": [{"text": "Because when prices were low, the fixed investment automatically bought more shares, giving greater weight to the discount", "isCorrect": true, "rationale": "DCA buys more shares when prices are low (20 shares at $5) and fewer when prices are high (10 shares at $10). This naturally weights your purchases toward lower prices, reducing your average cost."}, {"text": "Because the investor chose to invest more money when prices were low", "isCorrect": false, "rationale": "In DCA, the investment amount is fixed — the investor does not choose to invest more. The larger share count at low prices is automatic."}, {"text": "Because market prices always return to their simple average over time", "isCorrect": false, "rationale": "There is no guarantee that market prices revert to any average. The lower cost comes from the mechanics of fixed-dollar investing, not price reversion."}, {"text": "Because three months is not enough time for accurate averaging", "isCorrect": false, "rationale": "The math holds regardless of the time period. The principle is that fixed-dollar amounts buy more shares at lower prices."}], "id": "q08"}, {"question": "Which of the following is NOT listed as a benefit of dollar-cost averaging?", "options": [{"text": "It guarantees a profit on every investment made", "isCorrect": true, "rationale": "DCA does not guarantee profits. It manages your average cost and removes emotional decision-making, but markets can still decline over any given period."}, {"text": "It removes emotion from investment decisions", "isCorrect": false, "rationale": "Removing emotion is explicitly listed as a key benefit — you invest on a schedule, not based on fear or greed."}, {"text": "It is easy to automate with a recurring transfer", "isCorrect": false, "rationale": "Easy automation is listed as a key benefit of DCA."}, {"text": "It takes advantage of market dips by automatically buying more shares at lower prices", "isCorrect": false, "rationale": "Taking advantage of dips automatically is explicitly listed as a benefit of DCA."}], "id": "q09"}, {"question": "What is 'timing the market,' and why does the text describe it as nearly impossible?", "options": [{"text": "Buying low and selling high by predicting price movements — but even professionals fail at this consistently", "isCorrect": true, "rationale": "Market timing means predicting price movements to buy at the bottom and sell at the top. This is extremely difficult even for professional investors, making it an unreliable strategy for ordinary investors."}, {"text": "Setting automatic investments to occur at the same time each month", "isCorrect": false, "rationale": "That describes dollar-cost averaging. Timing the market means trying to predict price movements, which is very different."}, {"text": "Choosing how long to hold an investment before selling", "isCorrect": false, "rationale": "Investment holding periods are a separate concept. Market timing refers specifically to trying to predict short-term price movements."}, {"text": "Selecting which time of day to place a trade for the best execution price", "isCorrect": false, "rationale": "Intraday trade timing is a minor execution consideration. Market timing refers to predicting broader market movements to buy and sell at optimal prices."}], "id": "q10"}, {"question": "What does combining diversification with dollar-cost averaging protect against?", "options": [{"text": "Diversification protects against any single investment failing; DCA protects against buying at the wrong time", "isCorrect": true, "rationale": "Together, the two strategies address the two biggest sources of investor regret: 'I put all my money in one stock and it crashed' (diversification) and 'I bought right before the market dropped' (DCA)."}, {"text": "Both strategies eliminate all investment risk when used together", "isCorrect": false, "rationale": "Neither strategy eliminates risk entirely. They manage and reduce the impact of risk but cannot guarantee returns."}, {"text": "Diversification protects against inflation; DCA protects against deflation", "isCorrect": false, "rationale": "Inflation and deflation protection are not the primary focus of these strategies as described in the text."}, {"text": "DCA guarantees you buy at the market's lowest point", "isCorrect": false, "rationale": "DCA does not guarantee the lowest price — it lowers your average cost over time by buying more at lower prices automatically."}], "id": "q11"}, {"question": "When consumer staples (food, medicine) hold up better than luxury goods during an economic slowdown, what does this demonstrate?", "options": [{"text": "Different sectors react differently to economic conditions, illustrating why cross-sector diversification reduces volatility", "isCorrect": true, "rationale": "Consumer staples are defensive — people still buy necessities during downturns. Luxury goods fall more. Owning both means a slowdown harms your portfolio less than if you owned only one sector."}, {"text": "You should always hold only consumer staples stocks for maximum safety", "isCorrect": false, "rationale": "Concentrating in one sector, even a defensive one, is not diversification. The example shows why holding multiple sectors helps."}, {"text": "Luxury goods stocks should always be sold before a recession", "isCorrect": false, "rationale": "This describes market timing. The lesson is about diversification across sectors, not predicting recessions."}, {"text": "Economic slowdowns affect all investments equally", "isCorrect": false, "rationale": "The entire point of the example is that different sectors react differently — the opposite of equal impact."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
