<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 26, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the primary factor determining whether renting or buying is the 'correct' choice for an individual?", "options": [{"text": "The current interest rates on mortgages, which universally favor one option over the other.", "isCorrect": false, "rationale": "The text states there is 'no universal right answer' and that the choice depends on multiple personal factors, not just interest rates, which are only one component of buying costs."}, {"text": "The individual's personal financial readiness, time horizon, and local housing market conditions.", "isCorrect": true, "rationale": "The text explicitly states: 'The correct choice depends on your financial readiness, your time horizon in the location, and the local housing market.'"}, {"text": "The historical appreciation rates of homes in the chosen city, which guarantee future returns.", "isCorrect": false, "rationale": "Historical appreciation is one factor in the housing market, but the text does not suggest it 'guarantees' future returns, nor is it the sole primary factor. It also mentions personal readiness and time horizon."}, {"text": "The societal pressure to achieve homeownership as quickly as possible.", "isCorrect": false, "rationale": "The 'moneytip' specifically advises against succumbing to 'societal pressure' and instead emphasizes financial readiness as the right time to buy."}], "id": "q01"}, {"question": "A significant advantage of renting over buying, especially for someone whose career might require frequent relocation, is:", "options": [{"text": "The ability to build equity through monthly payments.", "isCorrect": false, "rationale": "Building equity is a key advantage of buying, as mortgage payments reduce the loan balance and increase ownership share."}, {"text": "Protection against unexpected large home repair costs, like a new roof.", "isCorrect": true, "rationale": "The text lists 'No maintenance burden' and 'Known monthly cost' as advantages of renting, explicitly stating, 'When the furnace breaks, it is the landlord's problem.'"}, {"text": "The potential for the property to appreciate in value over time.", "isCorrect": false, "rationale": "Potential appreciation is an advantage of buying, not renting, as renters do not own the property."}, {"text": "A fixed monthly payment that never changes over decades.", "isCorrect": false, "rationale": "A fixed payment for decades applies to fixed-rate mortgages for buyers. Rent typically increases over time."}], "id": "q02"}, {"question": "Which of the following is an advantage *unique* to buying a home compared to renting?", "options": [{"text": "Having a generally predictable monthly housing cost.", "isCorrect": false, "rationale": "While buying with a fixed-rate mortgage offers fixed principal and interest, renting also offers a 'known monthly cost' even if rent may increase over time. This is not unique to buying."}, {"text": "The ability to move with relatively short notice if life circumstances change.", "isCorrect": false, "rationale": "Flexibility and the ability to move with 30-60 days' notice is listed as a primary advantage of renting."}, {"text": "Accumulating ownership in an asset that may increase in value over time.", "isCorrect": true, "rationale": "The text states advantages of buying include 'Builds equity' and 'Potential appreciation,' meaning each payment increases your ownership share and the home's value may rise, building wealth. This is not possible when renting."}, {"text": "Avoiding the burden of major maintenance and repairs.", "isCorrect": false, "rationale": "Avoiding maintenance burden is listed as a key advantage of renting, not buying."}], "id": "q03"}, {"question": "Based on the 'Break-Even Analysis,' why is it generally recommended to rent if you anticipate moving in 2-3 years?", "options": [{"text": "Renting allows for greater potential appreciation of invested capital.", "isCorrect": false, "rationale": "While renting preserves capital that can be invested, the text focuses on avoiding transaction costs as the primary reason for short-term renting, not guaranteeing superior investment returns."}, {"text": "The transaction costs associated with buying and selling a home would likely outweigh any financial benefits of ownership over such a short period.", "isCorrect": true, "rationale": "The text explicitly states: 'Buying involves significant transaction costs (closing costs when you buy, and realtor commission and closing costs when you sell—often 6–10% of the home's value). These costs mean you need to stay in the home long enough for the advantages of ownership to outweigh them.'"}, {"text": "Mortgage interest rates are typically higher for short-term homeownership.", "isCorrect": false, "rationale": "Mortgage interest rates are not directly tied to the anticipated duration of ownership in this manner. The concern is with transaction costs, not higher interest for short terms."}, {"text": "Landlords offer better incentives for short-term leases than long-term ones.", "isCorrect": false, "rationale": "The text does not mention landlord incentives for short-term leases. Generally, landlords prefer longer-term tenants for stability."}], "id": "q04"}, {"question": "When comparing the total financial impact of buying a home versus renting, what significant expense specific to buying, often overlooked, must be factored into the calculation, especially for shorter ownership periods?", "options": [{"text": "The monthly utilities and homeowner's insurance premiums.", "isCorrect": false, "rationale": "These are ongoing costs associated with homeownership, but the text specifically highlights 'transaction costs' as distinct and significant, especially for short ownership periods. Some utilities are also paid by renters."}, {"text": "The cost of property taxes, which are usually included in mortgage payments.", "isCorrect": false, "rationale": "Property taxes are an ongoing cost of ownership. The question refers to expenses 'specific to buying' that are 'often overlooked' and impact 'shorter ownership periods' due to their upfront or selling nature, which points to transaction costs."}, {"text": "The realtor commissions and closing costs incurred when buying *and* selling the property.", "isCorrect": true, "rationale": "The text explicitly defines 'significant transaction costs' as 'closing costs when you buy, and realtor commission and closing costs when you sell—often 6–10% of the home's value.' These are critical for the break-even analysis over shorter periods."}, {"text": "The interest paid on the mortgage loan over the full term.", "isCorrect": false, "rationale": "Mortgage interest is a major cost of borrowing, but it's an ongoing, expected cost over the life of the loan, not a 'transaction cost' that primarily impacts short-term comparisons due to its upfront or selling nature."}], "id": "q05"}, {"question": "In the provided 5-year comparison scenario, if home values remained flat, why might renting have been financially equivalent or even better than buying?", "options": [{"text": "The total rent paid ($72,000) was significantly less than the total monthly costs of buying ($90,678.60).", "isCorrect": false, "rationale": "While the total monthly costs for buying were higher, the comparison focuses on the *net gain* after considering the down payment and selling costs, not just raw monthly spend."}, {"text": "The down payment capital preserved by renting could have been invested and potentially grown, offsetting the minimal or negative net gain from buying after selling costs.", "isCorrect": true, "rationale": "The text's conclusion for the 5-year scenario states: 'Compared to $40,000 down payment invested, net gain from buying is minimal or negative over only 5 years—before appreciation.' This highlights the opportunity cost of the down payment."}, {"text": "Renters benefit from tax deductions on housing costs that homeowners do not.", "isCorrect": false, "rationale": "Homeowners often receive tax deductions for mortgage interest and property taxes, while renters generally do not for their rent payments. This statement is incorrect regarding tax benefits."}, {"text": "Home maintenance costs are typically much higher in the first five years of ownership.", "isCorrect": false, "rationale": "While maintenance is a factor in buying, the 5-year comparison specifically emphasizes the impact of transaction costs and the preserved down payment capital as the reason for the minimal/negative net gain from buying without appreciation."}], "id": "q06"}, {"question": "According to the 'Are You Ready to Buy?' checklist, what is a crucial financial safeguard that should be in place *in addition to* the down payment and closing costs?", "options": [{"text": "A fully funded retirement account with at least 10 years of contributions.", "isCorrect": false, "rationale": "While a retirement account is important, the checklist specifies an emergency fund 'in addition to the down payment and closing costs,' not a retirement account of a specific size."}, {"text": "A diversified stock portfolio that matches the down payment amount.", "isCorrect": false, "rationale": "The checklist does not recommend a stock portfolio of this nature. It emphasizes a *liquid* emergency fund, which is distinct from an investment portfolio."}, {"text": "A fully funded emergency fund covering 3-6 months of expenses.", "isCorrect": true, "rationale": "The checklist explicitly states: 'You have a fully funded emergency fund (3–6 months of expenses) in addition to the down payment and closing costs.'"}, {"text": "A separate savings account specifically for home renovations and upgrades.", "isCorrect": false, "rationale": "While a renovation fund is practical, the checklist prioritizes a general 'emergency fund' as a prerequisite for readiness, separate from money for specific improvements."}], "id": "q07"}, {"question": "The text mentions needing a '20% down payment saved (or a deliberate plan for PMI).' What does this imply about the purpose of a 20% down payment?", "options": [{"text": "A 20% down payment is legally required for all home purchases in the U.S.", "isCorrect": false, "rationale": "The phrase '(or a deliberate plan for PMI)' indicates that a 20% down payment is not legally required; rather, a lower down payment is possible, but it comes with PMI."}, {"text": "A 20% down payment allows the buyer to avoid paying Private Mortgage Insurance (PMI), which adds to the monthly cost.", "isCorrect": true, "rationale": "The inclusion of 'or a deliberate plan for PMI' directly implies that by putting down 20%, a buyer can avoid PMI, which is an additional cost for lower down payments."}, {"text": "The 20% down payment covers all closing costs, preventing out-of-pocket expenses at closing.", "isCorrect": false, "rationale": "The checklist explicitly states, 'You have 2–5% of the purchase price saved for closing costs,' indicating closing costs are separate from the down payment."}, {"text": "Lenders will not approve a mortgage loan without a full 20% down payment.", "isCorrect": false, "rationale": "The text's mention of 'a deliberate plan for PMI' clearly suggests that loans with less than 20% down payment are possible and approved, albeit with an extra insurance cost."}], "id": "q08"}, {"question": "A person earning $60,000 annually is considering buying a home. What would be the *maximum* advisable total monthly homeownership cost, based on the provided guidelines?", "options": [{"text": "$1,200", "isCorrect": false, "rationale": "A gross monthly income of $5,000 ($60,000/12) multiplied by the 28% guideline is $1,400. $1,200 is below the recommended range."}, {"text": "$1,500", "isCorrect": true, "rationale": "The text states total monthly homeownership costs should be '28–30% of gross monthly income.' For an annual salary of $60,000, the gross monthly income is $5,000. 30% of $5,000 is $1,500, which is the upper limit of the guideline."}, {"text": "$2,000", "isCorrect": false, "rationale": "$2,000 represents 40% of $5,000 gross monthly income, which is significantly above the 28-30% guideline provided in the text."}, {"text": "$1,800", "isCorrect": false, "rationale": "$1,800 represents 36% of $5,000 gross monthly income, which is above the 28-30% guideline provided in the text."}], "id": "q09"}, {"question": "The 'moneytip' emphasizes the importance of financial readiness before buying a home. Which of the following best reflects the core message of this tip?", "options": [{"text": "Prioritizing homeownership above all other financial goals, even if it means accumulating debt.", "isCorrect": false, "rationale": "The text explicitly warns that buying before financially ready 'can be a financial disaster' and lead to 'credit card debt or worse,' directly contradicting this option."}, {"text": "Waiting until one's income is high enough to afford a luxury home, regardless of other financial preparedness.", "isCorrect": false, "rationale": "The tip focuses on 'financially ready' factors like an emergency fund, stable income, and adequate down payment, not necessarily affording a 'luxury home.' It's about fundamental preparedness."}, {"text": "Ensuring a strong financial foundation, including emergency savings and stable income, to avoid potential disasters, rather than succumbing to external pressure.", "isCorrect": true, "rationale": "The moneytip states: 'Buying a home before you are financially ready—without a solid emergency fund, stable income, and adequate down payment—can be a financial disaster. The right time to buy is when you are financially ready, not when you feel societal pressure to do so.'"}, {"text": "Relying on potential home value appreciation to cover any financial shortfalls from an early purchase.", "isCorrect": false, "rationale": "Relying solely on appreciation is a gamble and contradicts the emphasis on a 'solid emergency fund' and being 'financially ready' to avoid disaster, especially if appreciation doesn't occur."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
