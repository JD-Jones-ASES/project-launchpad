    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    };

<body>
<div class="quiz-container">

        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 4, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best defines the 'gig economy' according to the text?", "options": [{"text": "A labor market focused on permanent, full-time employment with comprehensive benefits.", "isCorrect": false, "rationale": "The text explicitly states the gig economy consists of 'short-term contracts, freelance work, and platform-based jobs rather than permanent employment' and notes a lack of employer benefits."}, {"text": "A system where all workers are classified as employees eligible for unemployment benefits.", "isCorrect": false, "rationale": "The text clarifies that gig workers are typically 'independent contractors (1099 workers)' and 'generally cannot file for unemployment' if work declines."}, {"text": "A labor market characterized by short-term contracts, freelance work, and platform-based jobs with workers classified as independent contractors.", "isCorrect": true, "rationale": "This option directly matches the definition provided in the text: 'The gig economy refers to a labor market made up of short-term contracts, freelance work, and platform-based jobs rather than permanent employment. Workers in the gig economy are typically classified as independent contractors (1099 workers) rather than employees.'"}, {"text": "An economic model where companies are legally required to provide benefits to all temporary workers.", "isCorrect": false, "rationale": "The text states a significant 'con' of gig work is 'no benefits,' meaning gig workers do not receive employer-sponsored health insurance, paid sick days, or retirement contributions."}]}, {"question": "A student needs to earn extra money to pay for tuition and wants a job that allows them to schedule work around their classes and study time. Which 'pro' of gig work would be most appealing to this student?", "options": [{"text": "Potential for higher hourly rates, allowing them to earn more in less time.", "isCorrect": false, "rationale": "While 'potential for higher hourly rates' is a listed pro, the student's primary need is scheduling flexibility around their academic commitments, not necessarily the highest possible rate."}, {"text": "The variety of tasks, preventing boredom from repetitive work.", "isCorrect": false, "rationale": "Variety is a pro, but it doesn't directly address the student's specific need for scheduling around classes and study time."}, {"text": "The low barrier to entry, meaning they can start working quickly without extensive experience.", "isCorrect": false, "rationale": "Low barrier to entry is a pro that helps in starting quickly, but it doesn't directly solve the scheduling conflict the student faces."}, {"text": "Flexibility, allowing them to set their own hours and work when it suits their schedule.", "isCorrect": true, "rationale": "The text lists 'Flexibility: You set your own hours. Work when you want, stop when you want. This appeals to students...' as a key advantage, directly addressing the student's need to balance work with classes."}]}, {"question": "Which of the following is NOT typically considered a form of gig work according to the examples provided in the text?", "options": [{"text": "Freelance graphic design for various clients.", "isCorrect": false, "rationale": "The text lists 'Freelance creative work (graphic design, writing, photography, video editing)' as a form of gig work."}, {"text": "Working full-time as a salaried software engineer for a single tech company.", "isCorrect": true, "rationale": "The gig economy is defined by 'short-term contracts, freelance work, and platform-based jobs rather than permanent employment.' A full-time, salaried position with a single company represents traditional permanent employment, not gig work."}, {"text": "Driving passengers using a rideshare application.", "isCorrect": false, "rationale": "The text lists 'Rideshare driving (picking up passengers for a fee)' as a form of gig work."}, {"text": "Delivering groceries through an online platform.", "isCorrect": false, "rationale": "The text lists 'Food and grocery delivery' as a form of gig work."}]}, {"question": "A freelance photographer relies solely on gig work for income. What significant financial 'con' mentioned in the text should they be most prepared to manage independently, unlike a traditional employee?", "options": [{"text": "The need to constantly update their professional skills.", "isCorrect": false, "rationale": "While skill development is important for any professional, it is not listed as one of the specific financial cons of gig work in the provided text."}, {"text": "The requirement to pay the full 15.3% self-employment tax plus income taxes, rather than having an employer cover half.", "isCorrect": true, "rationale": "The text explicitly states under 'Cons of Gig Work': 'Self-employment taxes: As 1099 contractors, gig workers owe the full 15.3% self-employment tax plus income taxes. No employer is covering half.' This is a significant independent financial burden."}, {"text": "The potential for disputes with clients over project scope.", "isCorrect": false, "rationale": "Client disputes can occur in freelance work but are not listed as a specific financial 'con' in the text's discussion of the gig economy's disadvantages."}, {"text": "The necessity of owning a car for transportation to client sites.", "isCorrect": false, "rationale": "While a freelance photographer might have equipment expenses, car ownership is an expense, but not the most significant financial 'con' uniquely related to the tax and benefits structure for independent contractors compared to employees."}]}, {"question": "According to the 'realworld' example about Destiny, who earns $800 per week in gross fares, what is the primary takeaway regarding gig work income?", "options": [{"text": "Gross earnings are a reliable indicator of actual take-home pay.", "isCorrect": false, "rationale": "The example explicitly demonstrates that Destiny's actual take-home ($514) is significantly less than her gross earnings ($800), meaning gross earnings are not a reliable indicator without accounting for expenses and taxes."}, {"text": "Gig workers typically take home approximately 90% of their gross earnings after all deductions.", "isCorrect": false, "rationale": "Destiny's example shows she takes home only about 64% of her gross earnings, not 90%."}, {"text": "It is crucial to 'run the real numbers' to account for expenses and taxes, as actual take-home pay is significantly less than gross earnings.", "isCorrect": true, "rationale": "The example concludes: 'Before choosing gig work as a primary income, run the real numbers, not just the gross amount,' highlighting the substantial difference between gross earnings and actual take-home pay after expenses and taxes."}, {"text": "Health insurance costs are usually negligible for gig workers.", "isCorrect": false, "rationale": "The example explicitly states that Destiny's calculated take-home 'does not include health insurance, which she must purchase entirely on her own,' implying it's a significant, self-funded cost."}]}, {"question": "The 'warning' section advises gig workers to set aside 25-30% of every payment for taxes. What is the main reason for this advice?", "options": [{"text": "To cover unexpected business expenses or slow periods of work.", "isCorrect": false, "rationale": "While setting aside money for these reasons is prudent, the 'warning' section specifically states this money is for taxes: 'Because no employer withholds taxes from your payments, it is your responsibility to set money aside throughout the year.'"}, {"text": "Because employers in the gig economy deduct a flat fee for administrative costs.", "isCorrect": false, "rationale": "The text explains that 'no employer withholds taxes from your payments,' and the percentage is for the gig worker's tax liability, not an employer deduction."}, {"text": "To accumulate savings for retirement or future investments.", "isCorrect": false, "rationale": "The 'warning' section's advice is explicitly about taxes to avoid owing a large sum, including penalties, when filing tax returns, not for retirement or investments."}, {"text": "Because no employer withholds taxes from their payments, leaving gig workers responsible for their full tax liability, including self-employment taxes.", "isCorrect": true, "rationale": "The 'warning' section clearly states: 'Because no employer withholds taxes from your payments, it is your responsibility to set money aside throughout the year. If you do not, you will owe a large sum — possibly including penalties — when you file your tax return.'"}]}, {"question": "A college student is considering freelancing as a web developer while completing their degree. Based on the 'moneytip' section, what is the most strategic reason for them to pursue this gig work?", "options": [{"text": "To avoid the need for a traditional resume after graduation.", "isCorrect": false, "rationale": "While gig work can build a portfolio, the text doesn't suggest it eliminates the need for a resume entirely; rather, it enhances it."}, {"text": "To gain income, acquire experience, and build a professional portfolio simultaneously, aiding their future career.", "isCorrect": true, "rationale": "The 'moneytip' section states: 'A student who freelances as a graphic designer or web developer while finishing school gains income, experience, and a portfolio — all at once. Use gig work strategically rather than letting it become a financial trap.'"}, {"text": "To secure full-time employment with their first freelance client immediately after graduation.", "isCorrect": false, "rationale": "While possible, the 'moneytip' emphasizes gaining income, experience, and a portfolio as the primary strategic benefits during school, not a guaranteed job offer from a client."}, {"text": "To completely replace the need for employer-sponsored benefits through self-funded options.", "isCorrect": false, "rationale": "The 'moneytip' focuses on the strategic career and income benefits for a student, not on replacing benefits, which is a 'con' discussed elsewhere."}]}, {"question": "Which of the following statements accurately reflects a comparison between a 'pro' and a 'con' of working in the gig economy as described in the text?", "options": [{"text": "Gig work offers high job security, but also requires significant upfront investment in equipment.", "isCorrect": false, "rationale": "The text lists 'No employer protections' as a con, implying low job security, and 'Expenses' is a con, but the premise is incorrect about job security."}, {"text": "The low barrier to entry makes it easy to start, but the variable income can make budgeting difficult.", "isCorrect": true, "rationale": "The text lists 'Low barrier to entry' as a pro ('Many gig jobs require no formal education or experience') and 'Variable income' as a con ('Budgeting becomes more difficult without a predictable paycheck'). This accurately pairs a pro with a con."}, {"text": "Workers enjoy comprehensive benefits packages, but often face highly regulated work hours.", "isCorrect": false, "rationale": "The text states 'No benefits' as a major con and 'Flexibility: You set your own hours' as a key pro, making this statement incorrect on both counts."}, {"text": "There is great variety in tasks, but also a guarantee of steady work year-round.", "isCorrect": false, "rationale": "While 'Variety' is a pro, 'Variable income' and 'No employer protections' contradict the idea of a 'guarantee of steady work year-round.'"}]}, {"question": "A gig worker receives $1,500 for completing a project. Following the 'warning' section's advice, how much should they ideally set aside for taxes?", "options": [{"text": "$150", "isCorrect": false, "rationale": "Setting aside $150 (10%) is below the recommended 25-30% range mentioned in the 'warning' section, which is $375-$450 for a $1,500 payment."}, {"text": "$300", "isCorrect": false, "rationale": "Setting aside $300 (20%) is below the recommended 25-30% range mentioned in the 'warning' section, which is $375-$450 for a $1,500 payment."}, {"text": "$400", "isCorrect": true, "rationale": "The 'warning' section suggests setting aside '25–30% of every payment.' For $1,500, 25% is $375 and 30% is $450. $400 falls within this recommended range."}, {"text": "$600", "isCorrect": false, "rationale": "Setting aside $600 (40%) is above the recommended 25-30% range mentioned in the 'warning' section, which is $375-$450 for a $1,500 payment, and would be excessive based on the provided guidance."}]}, {"question": "Why are gig workers typically referred to as '1099 workers' for tax purposes?", "options": [{"text": "Because they file a 1099-EZ form for simplified tax returns.", "isCorrect": false, "rationale": "The '1099' refers to a specific tax form (e.g., Form 1099-NEC) that is used to report non-employee compensation, not a simplified return form."}, {"text": "Because they receive a Form W-2 from their employer reporting their wages.", "isCorrect": false, "rationale": "The text states gig workers are 'independent contractors (1099 workers) rather than employees,' implying they do not receive a W-2, which is for employees."}, {"text": "Because companies report their earnings to the IRS using various Form 1099s, as they are independent contractors and not employees.", "isCorrect": true, "rationale": "The text defines gig workers as 'independent contractors (1099 workers),' indicating their income is reported via 1099 forms (e.g., 1099-NEC) because they are not traditional employees."}, {"text": "Because they are required to pay a flat 10.99% tax rate on all their earnings.", "isCorrect": false, "rationale": "The '1099' designation refers to the tax reporting mechanism for independent contractors, not a specific tax rate. The text mentions a 15.3% self-employment tax plus income taxes."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
