<script>
var QUESTIONS = [{"question": "According to the text, what is the primary characteristic that differentiates saving from investing?", "options": [{"text": "Saving involves higher potential returns, while investing focuses on low risk.", "isCorrect": false, "rationale": "This statement reverses the characteristics described in the text; saving has low returns and low risk, while investing has higher potential returns and higher risk."}, {"text": "Saving is for money you might need soon, emphasizing safety and accessibility, whereas investing is for money you can leave alone for years, involving higher risk for higher potential returns.", "isCorrect": true, "rationale": "The text explicitly states that 'The key difference comes down to two things: risk and time. Savings are for money you might need soon. Investments are for money you can leave alone for years.' It also details the trade-off of higher risk for higher potential returns in investing versus low risk and low return in saving."}, {"text": "Saving primarily involves assets like stocks and bonds, while investing is limited to checking and savings accounts.", "isCorrect": false, "rationale": "This statement incorrectly assigns the types of accounts/assets to saving and investing. Saving uses checking/savings accounts, while investing uses assets like stocks and bonds."}, {"text": "Both saving and investing offer the same level of risk and return, but for different financial goals.", "isCorrect": false, "rationale": "The text clearly states that risk and return are the key differentiating factors between saving and investing, with investing having higher potential for both."}]}, {"question": "Sarah plans to buy a new car next summer, approximately 9 months from now. Based on the 'moneytip' in the text, what is the most appropriate strategy for her car savings?", "options": [{"text": "Invest the money in a diversified stock portfolio to maximize potential growth.", "isCorrect": false, "rationale": "The 'moneytip' specifically advises against investing money needed within two years due to short-term market volatility, making this an inappropriate strategy for a 9-month goal."}, {"text": "Put the money in a savings account, as it's a short-term goal where market drops could jeopardize her purchase.", "isCorrect": true, "rationale": "The 'moneytip' states, 'Never invest money you might need within two years. If you are saving for a car you plan to buy next summer, keep that money in a savings account.' This directly matches the scenario and recommendation."}, {"text": "Divide the money between a savings account and a bond fund to balance risk and return.", "isCorrect": false, "rationale": "While diversifying can be good for long-term investing, the core message for short-term needs (<2 years) is to keep the money safe in savings due to market volatility, not to introduce investment risk."}, {"text": "Invest in real estate, as it offers stable returns over even short periods.", "isCorrect": false, "rationale": "Real estate is an investment asset mentioned, but it's generally illiquid and subject to market fluctuations, making it unsuitable for a 9-month goal and contrary to the 'moneytip'."}]}, {"question": "The example of Maya and Jordan demonstrates the power of compounding and higher returns over time. What was the primary factor leading to Jordan's significantly higher account balance compared to Maya's after 30 years?", "options": [{"text": "Jordan consistently added more money to his account over the 30 years.", "isCorrect": false, "rationale": "The text explicitly states, 'Neither adds another dollar,' indicating the difference was not due to additional contributions but to the rate of return."}, {"text": "Maya's account had higher accessibility, which reduced her overall earnings.", "isCorrect": false, "rationale": "While accessibility is a characteristic of savings, it wasn't presented as the cause for the earnings difference. The primary factor was the difference in return rates."}, {"text": "Jordan's diversified investment account averaged a much higher annual return (8%) than Maya's savings account (2%), illustrating the trade-off of higher risk for higher potential returns over the long term.", "isCorrect": true, "rationale": "The example clearly shows Jordan's 8% annual return leading to a substantially higher balance ($20,126) compared to Maya's 2% ($3,622), and the text concludes, 'The difference? $16,504—entirely from the higher return rate over 30 years.'"}, {"text": "Maya experienced significant fees in her savings account that eroded her principal.", "isCorrect": false, "rationale": "The text does not mention fees in Maya's account as a factor. The difference is solely attributed to the differing annual return rates."}]}, {"question": "According to the text, which of the following scenarios is an appropriate use of investing?", "options": [{"text": "Saving for a down payment on a house you plan to buy in 10 years.", "isCorrect": true, "rationale": "The text states, 'Invest for long-term goals: Retirement, a down payment on a house in 10 years, financial independence—these are investing goals,' directly supporting this option."}, {"text": "Building an emergency fund that covers 3-6 months of expenses.", "isCorrect": false, "rationale": "The text advises to 'Save first: Build your emergency fund (3–6 months of expenses) before you invest,' classifying this as a saving goal, not an investing goal due to the need for safety and accessibility."}, {"text": "Saving for a vacation you plan to take next year.", "isCorrect": false, "rationale": "The text states, 'Save for short-term goals: Vacation next year? New phone? Keep that money safe in savings,' indicating this is a saving goal."}, {"text": "Putting aside money for a new smartphone you intend to purchase in a few months.", "isCorrect": false, "rationale": "This is a short-term goal, for which the text recommends saving rather than investing due to the need for guaranteed access and the risk of short-term market drops."}]}, {"question": "Why is it crucial to build an emergency fund of 3-6 months of expenses before starting to invest, according to the text?", "options": [{"text": "Because emergency funds generate higher returns than most investments.", "isCorrect": false, "rationale": "The text specifies that savings accounts, where emergency funds are typically held, offer low returns, contrary to this statement."}, {"text": "To protect you from needing to sell investments at a bad time if unexpected expenses arise.", "isCorrect": true, "rationale": "The text explicitly states, 'Save first: Build your emergency fund (3–6 months of expenses) before you invest. This protects you from needing to sell investments at a bad time.'"}, {"text": "To meet regulatory requirements for opening an investment account.", "isCorrect": false, "rationale": "The text does not mention any regulatory requirements for investing related to emergency funds."}, {"text": "Emergency funds offer tax advantages that investments do not.", "isCorrect": false, "rationale": "Tax advantages are not mentioned in the text as a reason for prioritizing an emergency fund."}]}, {"question": "What core concept does the section title 'Investing Basics—Risk, Return, and Time Horizon' introduce as central to understanding both saving and investing?", "options": [{"text": "The importance of professional financial advice.", "isCorrect": false, "rationale": "While professional advice might be part of financial planning, the section title and content focus on the inherent characteristics of saving and investing, not external advice."}, {"text": "The relationship between market volatility, potential earnings, and the duration money is set aside.", "isCorrect": true, "rationale": "The text defines investing in terms of 'expected to grow in value or generate income' (return), explicitly mentions 'higher risk,' and uses 'time' as a key differentiator. The 'moneytip' also warns about 'short-term' market drops, all aligning with 'risk, return, and time horizon.'"}, {"text": "The necessity of government regulation in financial markets.", "isCorrect": false, "rationale": "Government regulation is not mentioned as a core concept in this section."}, {"text": "The difference between active and passive investment strategies.", "isCorrect": false, "rationale": "The text focuses on the fundamental difference between saving and investing, not on specific investment strategies within investing."}]}, {"question": "A student has $500 they received for their birthday. They want to use it to pay for tuition in three months. Which financial strategy should they employ, and why?", "options": [{"text": "Invest it in stocks; even short periods can yield high returns, and tuition is an important goal.", "isCorrect": false, "rationale": "The 'moneytip' specifically warns against investing money needed within two years due to market volatility and the inability to wait for recovery if there's a deadline, making stocks too risky for a 3-month goal."}, {"text": "Save it in a checking or savings account; it's a short-term need, and safety is paramount.", "isCorrect": true, "rationale": "The text advises, 'Never invest money you might need within two years' and recommends keeping such funds in a savings account. A 3-month tuition payment is a short-term, essential need, prioritizing safety."}, {"text": "Use it to buy bonds; bonds are always risk-free and provide quick growth.", "isCorrect": false, "rationale": "While generally less volatile than stocks, bonds are still investments with some risk and are not guaranteed to provide quick growth, making them unsuitable for money needed in three months. They are not 'always risk-free'."}, {"text": "Split the money between a savings account and a real estate investment for diversification.", "isCorrect": false, "rationale": "Real estate is a long-term, illiquid investment unsuitable for money needed in three months. Diversification in this context is not the primary concern for a short-term, essential fund."}]}, {"question": "The text states that 'Saving and investing are not competing strategies—they work together.' What is the implied benefit of this integrated approach?", "options": [{"text": "It guarantees maximum returns on all your money regardless of your goals.", "isCorrect": false, "rationale": "No financial strategy can guarantee maximum returns. The text highlights a balance between safety and growth based on time horizons and risk tolerance."}, {"text": "It eliminates the need for an emergency fund, as investments can always be accessed.", "isCorrect": false, "rationale": "The text explicitly states the opposite: 'Build your emergency fund... before you invest,' specifically to avoid needing to sell investments at a bad time."}, {"text": "It allows individuals to meet both immediate, low-risk needs through saving and long-term growth objectives through investing, creating a balanced financial plan.", "isCorrect": true, "rationale": "The text concludes by outlining how 'A healthy financial plan uses both' – saving for emergency funds and short-term goals, and investing for long-term goals, demonstrating how they complement each other to cover different needs."}, {"text": "It ensures that all money is invested for growth, with no funds kept in low-return savings accounts.", "isCorrect": false, "rationale": "This contradicts the text's advice to save for short-term goals and emergency funds in low-risk accounts."}]}, {"question": "Which of the following best exemplifies an 'asset' in which money is put to work for investing, as defined in the text?", "options": [{"text": "A standard checking account.", "isCorrect": false, "rationale": "A checking account is listed as a place for 'saving' money, not an 'asset' for investing."}, {"text": "A high-yield savings account.", "isCorrect": false, "rationale": "Even a high-yield savings account is still categorized under 'saving,' where the risk of losing money is extremely low and returns are low, rather than an investment asset."}, {"text": "A share of stock in a company.", "isCorrect": true, "rationale": "The definition of investing specifically lists 'assets—such as stocks, bonds, or real estate—that are expected to grow in value or generate income over time.' A share of stock fits this description perfectly."}, {"text": "Cash kept in a safe at home.", "isCorrect": false, "rationale": "Cash in a safe is a form of saving, not investing, as it does not generate income or grow in value over time."}]}, {"question": "Considering the information provided, what would be the primary concern for someone who invests money they will need in 18 months?", "options": [{"text": "The investment might not offer enough liquidity for quick access.", "isCorrect": false, "rationale": "While liquidity can be a concern with some investments, the text's 'moneytip' highlights a more pressing primary concern related to short-term needs."}, {"text": "Inflation might erode the purchasing power of their money over such a short period.", "isCorrect": false, "rationale": "Inflation is a factor in long-term financial planning, but the 'moneytip' focuses on a different, more immediate risk for short-term invested funds."}, {"text": "They risk losing money due to short-term market drops and may not have time to recover before needing the funds.", "isCorrect": true, "rationale": "The 'moneytip' states, 'Never invest money you might need within two years... Markets can drop sharply in the short term, and you cannot afford to wait for a recovery if you need the money on a deadline.' This perfectly describes the primary concern for an 18-month timeline."}, {"text": "The fees associated with investing would outweigh any potential gains in such a short timeframe.", "isCorrect": false, "rationale": "While fees are a consideration, the text emphasizes market volatility and the risk of loss as the critical factor for short-term investment horizons, not primarily fees."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
