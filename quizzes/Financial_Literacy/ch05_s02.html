<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 5, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, why is it crucial for an employee to regularly review their pay stub?", "options": [{"text": "To ensure they are enrolled in the correct voluntary deduction plans.", "isCorrect": false, "rationale": "While checking voluntary deductions is a benefit, the text emphasizes the crucial reason as avoiding errors that 'cost you real money,' which goes beyond just voluntary plans."}, {"text": "To verify that all deductions, both required and voluntary, have been accurately applied.", "isCorrect": true, "rationale": "The text states, 'If you never check yours, you might miss an error that costs you real money,' indicating that verifying the accuracy of all deductions is the primary crucial reason."}, {"text": "To estimate their annual income for future tax filings.", "isCorrect": false, "rationale": "YTD figures help with annual income tracking, but the immediate and crucial reason for *regularly reviewing* for errors isn't primarily future tax estimation."}, {"text": "To confirm their employer is withholding the correct amount for retirement contributions.", "isCorrect": false, "rationale": "Retirement contributions are not mentioned in this section, and this reason is too specific, not encompassing the general importance of checking for *any* error that might cost money."}]}, {"question": "Samira earned $2,240.00 in gross pay for the month. If her hourly wage was $14.00, how many hours did she work?", "options": [{"text": "140 hours", "isCorrect": false, "rationale": "140 hours * $14.00/hour = $1,960.00, which is incorrect."}, {"text": "160 hours", "isCorrect": true, "rationale": "Gross pay divided by hourly wage gives the total hours worked: $2,240.00 / $14.00/hour = 160 hours."}, {"text": "180 hours", "isCorrect": false, "rationale": "180 hours * $14.00/hour = $2,520.00, which is incorrect."}, {"text": "200 hours", "isCorrect": false, "rationale": "200 hours * $14.00/hour = $2,800.00, which is incorrect."}]}, {"question": "Based on the provided pay stub explanation, which of the following is considered a *voluntary* deduction?", "options": [{"text": "Medicare", "isCorrect": false, "rationale": "Medicare is explicitly listed as a required deduction and part of FICA."}, {"text": "State Income Tax", "isCorrect": false, "rationale": "State Income Tax is listed as a required deduction that most states collect."}, {"text": "Health Insurance Premium", "isCorrect": true, "rationale": "The text states, 'Samira chose to enroll... This is a voluntary deduction — she could decline coverage.'"}, {"text": "Social Security", "isCorrect": false, "rationale": "Social Security is explicitly listed as a required deduction and part of FICA."}]}, {"question": "Using Samira's gross pay of $2,240.00 and the provided tax rates, calculate the correct amount withheld for Social Security tax.", "options": [{"text": "$32.48", "isCorrect": false, "rationale": "This is the amount for Medicare tax ($2,240.00 * 1.45% = $32.48)."}, {"text": "$89.60", "isCorrect": false, "rationale": "This is the amount for State Income Tax ($2,240.00 * 4% = $89.60)."}, {"text": "$138.88", "isCorrect": true, "rationale": "The Social Security tax rate is 6.2% of gross pay: $2,240.00 * 0.062 = $138.88."}, {"text": "$201.60", "isCorrect": false, "rationale": "This is the amount for Federal Income Tax ($2,240.00 * 9% = $201.60)."}]}, {"question": "The text states that health insurance premiums are 'typically taken pre-tax.' What is the primary implication of a deduction being 'pre-tax'?", "options": [{"text": "It means the deduction amount is added back to gross pay after all taxes are calculated.", "isCorrect": false, "rationale": "A pre-tax deduction reduces, rather than adds to, the amount of income subject to taxes."}, {"text": "It reduces the amount of income that is subject to federal and state income taxes.", "isCorrect": true, "rationale": "The text explicitly defines pre-tax as 'meaning they reduce the income subject to federal and state taxes.'"}, {"text": "It requires the employee to pay the premium directly to the insurance provider.", "isCorrect": false, "rationale": "Pre-tax refers to the tax treatment of the deduction, not the method of payment. It's still taken from the paycheck."}, {"text": "It signifies that the employer pays the entire premium, not the employee.", "isCorrect": false, "rationale": "The text states 'Her share of the premium is $75.00,' indicating the employee still pays a portion, even if it's pre-tax."}]}, {"question": "Based on Samira's pay stub, what is the total dollar amount of her *required* deductions for the month?", "options": [{"text": "$537.56", "isCorrect": false, "rationale": "This amount includes the voluntary Health Insurance Premium, which is not a required deduction."}, {"text": "$462.56", "isCorrect": true, "rationale": "The sum of required deductions is: Federal Income Tax ($201.60) + State Income Tax ($89.60) + Social Security ($138.88) + Medicare ($32.48) = $462.56."}, {"text": "$75.00", "isCorrect": false, "rationale": "This amount represents only the voluntary Health Insurance Premium."}, {"text": "$273.76", "isCorrect": false, "rationale": "This amount does not correspond to the sum of Samira's required deductions."}]}, {"question": "Samira's gross pay for the month is $2,240.00. If her total deductions amount to $537.56, what is her net pay?", "options": [{"text": "$1,702.44", "isCorrect": true, "rationale": "Net Pay is calculated by subtracting total deductions from gross pay: $2,240.00 - $537.56 = $1,702.44. This matches the verification in the text."}, {"text": "$2,240.00", "isCorrect": false, "rationale": "This is the gross pay, before any deductions are subtracted."}, {"text": "$2,777.56", "isCorrect": false, "rationale": "This would be the result if deductions were added to gross pay, which is incorrect."}, {"text": "$1,938.44", "isCorrect": false, "rationale": "This amount does not result from the correct calculation of net pay."}]}, {"question": "Which of the following is *not* listed as a primary use for Year-to-Date (YTD) figures on a pay stub?", "options": [{"text": "Comparing total annual earnings with the W-2 form at year-end.", "isCorrect": false, "rationale": "The text explicitly states YTD figures are useful for 'Checking that your total annual earnings match your W-2 form at year end'."}, {"text": "Tracking the cumulative amount of taxes withheld throughout the year.", "isCorrect": false, "rationale": "The text explicitly states YTD figures are useful for 'Tracking total taxes withheld (to compare against your actual tax bill when you file)'."}, {"text": "Determining the employee's current bank account balance for direct deposit.", "isCorrect": true, "rationale": "The YTD column shows cumulative earnings and deductions, not an employee's bank account balance."}, {"text": "Verifying Social Security taxes as one approaches the annual wage base.", "isCorrect": false, "rationale": "The text explicitly states YTD figures are useful for 'Verifying Social Security taxes once you approach the annual wage base'."}]}, {"question": "The Federal Insurance Contributions Act (FICA) encompasses which two required payroll taxes?", "options": [{"text": "Federal Income Tax and State Income Tax", "isCorrect": false, "rationale": "Federal and State Income Taxes are separate required taxes, distinct from FICA."}, {"text": "Social Security and Medicare", "isCorrect": true, "rationale": "The text states, 'Social Security... is part of FICA (Federal Insurance Contributions Act)' and 'Medicare... Also part of FICA.'"}, {"text": "Health Insurance and Social Security", "isCorrect": false, "rationale": "Health insurance is a voluntary deduction and not part of FICA."}, {"text": "State Income Tax and Medicare", "isCorrect": false, "rationale": "State Income Tax is not part of FICA."}]}, {"question": "Using Samira's pay stub information, what percentage of her gross pay is taken by *required* deductions alone? Round your answer to 3 decimal places.", "options": [{"text": "24.000%", "isCorrect": false, "rationale": "This percentage would be incorrect; it might result from including voluntary deductions or a calculation error."}, {"text": "20.650%", "isCorrect": true, "rationale": "Total required deductions are $201.60 (Federal) + $89.60 (State) + $138.88 (Social Security) + $32.48 (Medicare) = $462.56. Percentage = ($462.56 / $2,240.00) * 100% = 20.650%."}, {"text": "20.000%", "isCorrect": false, "rationale": "This is a rounded estimate and not precise to the requested 3 decimal places based on the exact figures."}, {"text": "18.257%", "isCorrect": false, "rationale": "This percentage does not accurately represent the required deductions from Samira's gross pay."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
