    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 14, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, for which of the following individuals would a credit card with an annual fee most likely be a suitable choice?", "options": [{"text": "A beginner user seeking their first credit card.", "isCorrect": false, "rationale": "The text explicitly states, 'For most beginners, a no-annual-fee card is the right choice,' indicating it's generally not suitable for them."}, {"text": "An individual who uses a card extensively for travel and earns enough perks to significantly outweigh the fee.", "isCorrect": true, "rationale": "The text provides examples where annual fees are justified if the user receives enough value in return, such as 'A card with a $95 annual fee that gives you $200 in travel credits and $150 in rewards per year might be worth $255 net value' or if 'you use enough of its perks to exceed that cost.'"}, {"text": "Someone who only uses their credit card for small, infrequent purchases.", "isCorrect": false, "rationale": "Individuals with infrequent use are unlikely to accumulate enough rewards or utilize enough perks to justify paying an annual fee."}, {"text": "A person who frequently carries a balance on their credit card.", "isCorrect": false, "rationale": "Carrying a balance means paying interest, which quickly negates the value of any rewards or perks, making an annual fee an even greater financial burden."}], "id": "q01"}, {"question": "What is the 'golden rule' for making rewards programs genuinely valuable, according to the text?", "options": [{"text": "Always choose cards with the highest cash-back percentage or travel points.", "isCorrect": false, "rationale": "While a high rewards rate is desirable, it's not the primary condition for value. The 'golden rule' focuses on how the card is managed."}, {"text": "Ensure you pay your full balance every month, every time.", "isCorrect": true, "rationale": "The text explicitly states: 'The golden rule of rewards cards: Rewards are only valuable if you pay your full balance every month, every time.'"}, {"text": "Utilize a variety of rewards cards for different spending categories.", "isCorrect": false, "rationale": "This can optimize rewards but isn't the fundamental 'golden rule' for ensuring rewards provide net value."}, {"text": "Accumulate rewards for at least a year before redeeming them.", "isCorrect": false, "rationale": "The text does not mention this as a condition for rewards value; redemption timing is usually a secondary concern compared to avoiding interest."}], "id": "q02"}, {"question": "A credit card user has a card with 3% cash back and an APR of 25%. If they spend $2,000 on purchases but carry that $2,000 balance for one year, approximately how much net value do they gain or lose, assuming interest is calculated monthly?", "options": [{"text": "Gain $60", "isCorrect": false, "rationale": "This only accounts for the rewards earned ($2,000 * 0.03 = $60) and ignores the significant interest paid."}, {"text": "Lose approximately $440", "isCorrect": true, "rationale": "Rewards earned are $2,000 * 0.03 = $60. Monthly interest on $2,000 at 25% APR is $2,000 * (0.25 / 12) = $41.67. Over 12 months, this is approximately $41.67 * 12 = $500. The net result is $60 (rewards) - $500 (interest) = -$440 (a loss)."}, {"text": "Gain $500", "isCorrect": false, "rationale": "This amount is roughly the interest paid, not a gain. The interest paid would represent a loss."}, {"text": "Lose approximately $600", "isCorrect": false, "rationale": "This figure is an overestimation of the interest paid based on the given scenario and APR."}], "id": "q03"}, {"question": "What is the most immediate consequence of missing a single credit card payment, as described in the 'Fine Print' section?", "options": [{"text": "A significant increase in the card's annual fee.", "isCorrect": false, "rationale": "Annual fees are typically fixed or change with specific card upgrades, not directly due to a single missed payment."}, {"text": "The credit card company automatically closes the account.", "isCorrect": false, "rationale": "While repeated missed payments can lead to account closure, the immediate consequence of a single missed payment is not typically closure."}, {"text": "The immediate activation of a much higher Penalty APR.", "isCorrect": true, "rationale": "The text states: 'Most credit cards have a penalty APR—a much higher rate (often 29.99%) that kicks in automatically if you miss a payment or pay late.'"}, {"text": "All accumulated rewards points are forfeited.", "isCorrect": false, "rationale": "While some loyalty programs might have clauses for forfeiture due to delinquency, the text does not mention this as the primary or immediate consequence."}], "id": "q04"}, {"question": "A user takes advantage of a '0% APR for 15 months' offer. What is the biggest trap associated with this type of offer, according to the text?", "options": [{"text": "The introductory period is often shorter than advertised.", "isCorrect": false, "rationale": "The text does not suggest the advertised period is inaccurate, but rather focuses on what happens at the end of the legitimate period."}, {"text": "Merchants charge higher prices when a 0% APR card is used.", "isCorrect": false, "rationale": "This is unrelated to the terms of the credit card offer itself."}, {"text": "If any balance remains at the end of the promotional period, regular APR applies, sometimes retroactively on the entire original balance.", "isCorrect": true, "rationale": "The text states: 'The trap: If you have any balance remaining when the promo period ends, the full regular APR applies immediately—and on some cards, retroactively on the entire original balance.'"}, {"text": "Rewards cannot be earned during the 0% APR period.", "isCorrect": false, "rationale": "The text does not mention this as a trap, and earning rewards during a 0% APR period is generally possible as long as payments are made."}], "id": "q05"}, {"question": "To protect one's credit score, what is the recommended credit utilization percentage, according to the 'Using a Credit Card Wisely' summary?", "options": [{"text": "Below 50%", "isCorrect": false, "rationale": "While lower is better, the text recommends a stricter threshold than 50% for optimal credit score protection."}, {"text": "Exactly 30%", "isCorrect": false, "rationale": "The text specifies 'below 30%', not exactly 30%."}, {"text": "Below 30% (ideally below 10%)", "isCorrect": true, "rationale": "The summary point 'Keep your utilization below 30% (ideally below 10%) to protect your credit score' directly states this recommendation."}, {"text": "As high as possible, as long as payments are made on time.", "isCorrect": false, "rationale": "High credit utilization, even with on-time payments, can negatively impact a credit score."}], "id": "q06"}, {"question": "Which of the following actions demonstrates the most financially responsible use of a credit card, according to the principles outlined in the section?", "options": [{"text": "Making minimum payments on time to avoid late fees, even if it means carrying a balance.", "isCorrect": false, "rationale": "While avoiding late fees is good, carrying a balance incurs interest, making the card expensive, which is contrary to wise use."}, {"text": "Using a rewards card for all purchases, even if you sometimes carry a small balance.", "isCorrect": false, "rationale": "The text emphasizes that rewards are only valuable if you pay your full balance; carrying any balance means interest will exceed rewards."}, {"text": "Utilizing an introductory 0% APR offer to make a large purchase, setting a reminder to pay it off completely before the promo ends.", "isCorrect": true, "rationale": "This aligns with the 'correct use' of 0% APR offers and embodies the principle of paying off balances to avoid interest, making it a financially responsible choice."}, {"text": "Taking a cash advance from your credit card for an emergency.", "isCorrect": false, "rationale": "The text advises to 'Avoid cash advances entirely if possible' due to their high cost."}], "id": "q07"}, {"question": "Besides interest, what is another significant way credit card companies generate revenue, as stated at the beginning of the section?", "options": [{"text": "Selling customer data to third-party advertisers.", "isCorrect": false, "rationale": "This might be a practice for some companies, but it is not mentioned in this section as a way credit card companies make money from the card itself."}, {"text": "Charging a variety of fees.", "isCorrect": true, "rationale": "The section begins by stating, 'Interest is not the only way credit card companies make money. A variety of fees can add up quickly...'"}, {"text": "Investing customer deposits in the stock market.", "isCorrect": false, "rationale": "Credit cards do not typically involve customer deposits in the way banks handle savings, so this is not a revenue stream for the card product itself."}, {"text": "Requiring customers to maintain a minimum savings balance.", "isCorrect": false, "rationale": "This is a feature of some bank accounts, not typically a revenue generation method for credit card companies as described in the text."}], "id": "q08"}, {"question": "If a credit card balance of $2,500 incurs a penalty APR of 29.99%, approximately how much interest would accumulate in one month?", "options": [{"text": "$25.00", "isCorrect": false, "rationale": "This amount is too low for the given balance and high penalty APR."}, {"text": "$62.48", "isCorrect": true, "rationale": "To calculate monthly interest: $2,500 * (0.2999 / 12) = $2,500 * 0.02499166... = ~$62.48."}, {"text": "$74.97", "isCorrect": false, "rationale": "The text provides an example where $74.97 is the monthly interest on a $3,000 balance at 29.99% APR, not $2,500."}, {"text": "$299.90", "isCorrect": false, "rationale": "This would be the approximate annual interest if the APR were applied directly to the balance as a simple annual interest, not the monthly interest."}], "id": "q09"}, {"question": "The 'realworld' tip describes the ideal credit card user as treating their card 'like a debit card with benefits.' What specific behavior does this analogy primarily emphasize?", "options": [{"text": "Using the card only for purchases that would typically be made with cash.", "isCorrect": false, "rationale": "Debit cards are used for a wide range of purchases, not just cash-equivalent ones. The analogy emphasizes spending discipline."}, {"text": "Prioritizing the accumulation of rewards points over all other financial considerations.", "isCorrect": false, "rationale": "The text warns against prioritizing rewards if it means paying interest, as interest will always exceed rewards value."}, {"text": "Spending only what you already have and paying the full balance every month, avoiding debt.", "isCorrect": true, "rationale": "The text explains, 'They treat the credit card like a debit card with benefits—never spending more because the card is there, never carrying a balance.' This directly aligns with spending existing funds and avoiding interest, similar to a debit card."}, {"text": "Regularly transferring balances between credit cards to take advantage of new introductory offers.", "isCorrect": false, "rationale": "While a potential strategy, this is not what the 'debit card with benefits' analogy emphasizes. That analogy focuses on spending within one's means and avoiding debt."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
