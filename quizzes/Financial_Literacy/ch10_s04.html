<div class="quiz-container">

<script>
var QUESTIONS = [{"question": "Which of the following statements accurately describes a primary trade-off between online-only banks and traditional (brick-and-mortar) banks?", "options": [{"text": "Online-only banks typically offer lower APYs on savings, while traditional banks provide higher APYs.", "isCorrect": false, "rationale": "The text states that online-only banks often have much higher APYs on savings due to lower operating costs, whereas traditional banks often pay lower interest rates."}, {"text": "Traditional banks offer the convenience of in-person assistance and easy cash deposits, while online-only banks often have lower fees and higher interest rates.", "isCorrect": true, "rationale": "The text explains that traditional banks provide in-person help and easy cash deposits. Conversely, online-only banks are characterized by higher APYs and lower fees because they lack physical branches."}, {"text": "Online-only banks are better suited for individuals who regularly deal with cash, whereas traditional banks are ideal for those whose income is direct deposited.", "isCorrect": false, "rationale": "The text clarifies that traditional banks are better for those who regularly deal with cash (due to physical locations for deposits), while online banks are often preferred by those with direct deposits and comfort with apps."}, {"text": "Both types of banks offer identical mobile banking features, but only traditional banks are FDIC-insured.", "isCorrect": false, "rationale": "While most banks offer similar mobile features, the distinction is in physical presence and the associated rates/fees. Both FDIC-insured banks and NCUA-insured credit unions can be either traditional or online-only."}]}, {"question": "A college student receives their first paycheck as a paper check and needs to deposit it into their new checking account. They also want to ensure they don't accidentally overspend. Which two mobile banking features would be most relevant for them?", "options": [{"text": "Bill pay to schedule recurring payments and card controls to freeze a lost card.", "isCorrect": false, "rationale": "While useful, bill pay and card controls don't directly address depositing a paper check or preventing overdrafts immediately. Bill pay is for outgoing payments, and card controls are for security if a card is lost, not proactive spending management or check deposit."}, {"text": "Mobile check deposit for the paycheck and a low-balance alert for spending management.", "isCorrect": true, "rationale": "Mobile check deposit allows the student to photograph and deposit their paper check without visiting a branch. A low-balance alert, as described in the 'moneytip,' is specifically designed to notify users when their balance drops below a set threshold, helping to avoid overdraft fees by making them aware of their funds."}, {"text": "Transfers to move money to a friend and transaction history to review past purchases.", "isCorrect": false, "rationale": "Transfers are for moving money between accounts or people, not for depositing a paper check. Transaction history allows review of past spending, but a low-balance alert is a more proactive tool for preventing overspending and avoiding overdrafts."}, {"text": "Alerts for large transactions and balance inquiry for real-time account status.", "isCorrect": false, "rationale": "While a balance inquiry shows real-time status, a low-balance alert is a more specific and proactive tool for preventing overdrafts. Alerts for large transactions don't address depositing the paper check."}]}, {"question": "What is the primary purpose of the Federal Deposit Insurance Corporation (FDIC)?", "options": [{"text": "To regulate interest rates offered by all U.S. banks to ensure fair competition.", "isCorrect": false, "rationale": "The FDIC's role is not to regulate interest rates. Its primary function is to insure deposits, not to dictate lending or saving rates for banks."}, {"text": "To provide short-term loans to banks experiencing financial difficulties.", "isCorrect": false, "rationale": "While the FDIC works to maintain stability, its core mandate described in the text is deposit insurance, not acting as a direct lender to struggling banks. Other entities, like the Federal Reserve, might play a role in liquidity."}, {"text": "To insure deposits at member banks, guaranteeing depositors will get their money back if the bank fails.", "isCorrect": true, "rationale": "The definition provided explicitly states the FDIC is a U.S. government agency that insures deposits at member banks, guaranteeing up to $250,000 per depositor if the bank fails. This was created to restore public confidence."}, {"text": "To manage the national payment system and process electronic transactions.", "isCorrect": false, "rationale": "Managing the national payment system is primarily a function of the Federal Reserve, not the FDIC. The FDIC's focus is on deposit insurance."}]}, {"question": "Maria has $300,000 saved in a single individual savings account at an FDIC-insured bank. If this bank were to fail, how much of Maria's money would be protected by FDIC insurance?", "options": [{"text": "$0, because the amount exceeds the insurance limit.", "isCorrect": false, "rationale": "This is incorrect. While the amount exceeds the limit, a portion is still covered. The limit applies to a specific amount, not the entire balance if it's over."}, {"text": "$300,000, as all deposits are fully insured regardless of amount.", "isCorrect": false, "rationale": "This is incorrect. The text clearly states the FDIC insurance limit is up to $250,000 per depositor, per bank, per account ownership category. It is not unlimited."}, {"text": "$250,000, as this is the maximum insured amount per depositor per bank for individual accounts.", "isCorrect": true, "rationale": "The text explicitly states that FDIC insurance covers deposits up to $250,000 per depositor, per bank, per account ownership category. Since Maria has $300,000 in a single individual account, $250,000 would be insured, and $50,000 would be uninsured."}, {"text": "$50,000, which is the amount exceeding the basic insurance limit.", "isCorrect": false, "rationale": "This is incorrect. The insured amount is the limit ($250,000), not the excess. The excess ($50,000) would be uninsured."}]}, {"question": "Which statement best describes a credit union and its deposit insurance?", "options": [{"text": "A credit union is a for-profit bank that specializes in loans, and its deposits are insured by the FDIC.", "isCorrect": false, "rationale": "The text clearly states that a credit union is a nonprofit financial cooperative. Its deposits are insured by the NCUA, not the FDIC."}, {"text": "A credit union is a nonprofit financial cooperative owned by its members, and its deposits are insured by the NCUA with the same coverage as FDIC.", "isCorrect": true, "rationale": "The text defines a credit union as a nonprofit financial cooperative owned by its members and confirms that its deposits are insured by the NCUA, providing the same $250,000 coverage as the FDIC."}, {"text": "A credit union is a government-owned bank primarily for military personnel, with unlimited deposit insurance.", "isCorrect": false, "rationale": "Credit unions are member-owned, not government-owned, and are not exclusively for military personnel. The insurance is not unlimited; it's $250,000 per depositor, per institution, per ownership category."}, {"text": "A credit union is an online-only bank offering higher APYs, and its deposits are self-insured by the institution.", "isCorrect": false, "rationale": "While credit unions can offer competitive rates, they are not necessarily online-only, and their deposits are insured by the NCUA, not self-insured."}]}, {"question": "Sarah is comparing financial institutions to open a new savings account. She expects to deposit her income via direct deposit and rarely uses cash. She is tech-savvy and wants to maximize her interest earnings. Which factor should she prioritize most when choosing a bank or credit union?", "options": [{"text": "Proximity to a physical branch for in-person help.", "isCorrect": false, "rationale": "Given Sarah's preference for direct deposit and tech-savviness, and her desire to maximize interest, a physical branch's proximity is less critical than for someone dealing with cash or needing frequent in-person help. This would be a higher priority for a traditional bank user."}, {"text": "Availability of a large network of in-network ATMs for cash withdrawals.", "isCorrect": false, "rationale": "While ATM access is important, Sarah rarely uses cash and primarily uses direct deposit. Maximizing interest and relying on technology suggests ATM network size is not her highest priority, though still a consideration."}, {"text": "The Annual Percentage Yield (APY) offered on savings and the institution's fee structure.", "isCorrect": true, "rationale": "Given Sarah wants to 'maximize her interest earnings,' the APY is a critical factor. Additionally, lower fees contribute to greater overall savings. This aligns with the advantages often found in online-only banks or credit unions, which the text highlights as beneficial for direct deposit users."}, {"text": "The length of time the bank has been in business.", "isCorrect": false, "rationale": "While longevity can suggest stability, the text does not list it as a primary factor when choosing a financial institution. FDIC/NCUA insurance is the safeguard for bank failures, regardless of age, and other factors like APY, fees, and app quality are more directly relevant to Sarah's stated goals."}]}, {"question": "According to the 'moneytip' section, what is the simplest and most effective way to avoid overdraft fees on a checking account?", "options": [{"text": "Regularly transferring excess funds from savings to checking to maintain a high balance.", "isCorrect": false, "rationale": "While maintaining a high balance can prevent overdrafts, it's not the 'simplest and most effective' method highlighted in the moneytip. The tip focuses on awareness rather than constant manual transfers."}, {"text": "Setting up a low-balance alert to receive a notification when the account balance drops below a chosen threshold.", "isCorrect": true, "rationale": "The 'moneytip' specifically states: 'Set up a low-balance alert on your checking account... This is one of the simplest and most effective ways to avoid overdraft fees. You cannot spend money you don't know you don't have.'"}, {"text": "Utilizing the 'card controls' feature to temporarily freeze the debit card after every purchase.", "isCorrect": false, "rationale": "Card controls are for security if a card is lost, not for active prevention of overdrafts during normal spending. Freezing after every purchase would be highly impractical and disruptive."}, {"text": "Only using the bill pay feature for scheduled payments and avoiding manual transactions.", "isCorrect": false, "rationale": "Bill pay helps manage scheduled payments, but it doesn't directly prevent overdrafts from unexpected expenses or miscalculations with discretionary spending. It also doesn't cover all transaction types."}]}, {"question": "The FDIC was created in 1933 during the Great Depression. What specific problem was Congress trying to solve by establishing the FDIC?", "options": [{"text": "A lack of access to credit for businesses, hindering economic recovery.", "isCorrect": false, "rationale": "While lack of credit was an issue during the Depression, the text explicitly states the FDIC was created because 'nearly 9,000 U.S. banks failed—and when a bank failed, ordinary people lost all their savings overnight.' This points to deposit loss, not primarily credit access."}, {"text": "Widespread public distrust in the banking system due to mass bank failures and loss of savings.", "isCorrect": true, "rationale": "The 'Did You Know' section states, 'Between 1930 and 1933, nearly 9,000 U.S. banks failed—and when a bank failed, ordinary people lost all their savings overnight. Congress created the FDIC to restore public confidence in the banking system.' This directly addresses the problem of distrust caused by bank failures and lost savings."}, {"text": "Excessive fees charged by banks that made banking unaffordable for many citizens.", "isCorrect": false, "rationale": "Bank fees were not the primary problem the FDIC was established to solve. The text highlights the catastrophic loss of savings and the resulting lack of public confidence as the catalyst."}, {"text": "The inability of individuals to access their money outside of banking hours.", "isCorrect": false, "rationale": "The FDIC's creation was in response to bank failures and lost savings, not limited access hours. Online banking and mobile apps, which address access hours, are much more recent developments."}]}, {"question": "David and Emily, a married couple, want to ensure all their cash savings are fully protected by FDIC insurance. They currently have $400,000 in a joint savings account at one FDIC-insured bank. What is the most effective strategy for them to maximize their FDIC coverage to protect all their funds?", "options": [{"text": "Keep all $400,000 in the joint account, as joint accounts have unlimited FDIC coverage.", "isCorrect": false, "rationale": "The text states that the $250,000 limit applies per depositor, per bank, per account ownership category. While joint accounts allow for higher coverage at a single bank, it's not unlimited. For a joint account with two owners, the coverage would be $500,000 ($250,000 x 2), making the current $400,000 fully covered."}, {"text": "Move $150,000 into a separate individual account at the same bank.", "isCorrect": false, "rationale": "With $400,000 in a joint account, it is already fully covered at a single bank, as joint accounts are insured up to $500,000 for two owners. Moving funds to an individual account at the same bank would not increase the overall protection beyond what they already have for the $400,000."}, {"text": "Split the funds into two separate joint accounts, each with $200,000, at different FDIC-insured banks.", "isCorrect": false, "rationale": "While splitting funds across different banks is a valid strategy for amounts exceeding $250,000 per person per bank, their current $400,000 in a single joint account is already fully insured up to $500,000 (two owners x $250,000). This action is unnecessary for their current balance."}, {"text": "Their current $400,000 in a joint account is already fully insured by the FDIC at a single bank.", "isCorrect": true, "rationale": "The 'moneytip' states that the $250,000 FDIC limit applies per depositor, per bank, per account ownership category. It also clarifies: 'Joint accounts... each count separately, so a couple could potentially insure $500,000 at a single bank.' Since David and Emily have $400,000 in a joint account, it is fully covered (up to $250,000 for David and $250,000 for Emily, totaling $500,000)."}]}, {"question": "Which of the following is NOT listed as a key factor to consider when choosing a bank or credit union?", "options": [{"text": "The quality of the mobile app and customer service accessibility.", "isCorrect": false, "rationale": "The text lists 'Mobile app quality' and 'Customer service' (Can you reach a real person when you have a problem?) as explicit factors to consider."}, {"text": "Whether the institution is FDIC/NCUA insured.", "isCorrect": false, "rationale": "The text explicitly states: 'FDIC/NCUA insured: Always confirm this (look for the FDIC logo on the website or branch)' as a key factor."}, {"text": "The variety of investment products (stocks, bonds, mutual funds) offered.", "isCorrect": true, "rationale": "The provided text focuses on banking services (checking, savings, online banking features, and deposit insurance). It does not mention investment products like stocks, bonds, or mutual funds as a factor for choosing a bank or credit union for basic accounts."}, {"text": "The Annual Percentage Yield (APY) on savings and the institution's fee structure.", "isCorrect": false, "rationale": "The text lists 'Fees: What is the monthly fee? How is it waived?' and 'APY: What does the savings account pay?' as important factors to consider."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
