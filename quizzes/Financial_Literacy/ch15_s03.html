    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 15, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "In the monthly loan payment formula, what does the variable 'n' represent?", "options": [{"text": "The number of years the loan term lasts.", "isCorrect": false, "rationale": "While related, 'n' specifically represents the total number of *monthly payments*, which is calculated by multiplying the loan term in years by 12, not just the years themselves."}, {"text": "The monthly interest rate, expressed as a decimal.", "isCorrect": false, "rationale": "The monthly interest rate is represented by 'r', not 'n'."}, {"text": "The total number of monthly payments over the loan's term.", "isCorrect": true, "rationale": "As defined in the text, 'n' equals 'years × 12', representing the total number of monthly payments."}, {"text": "The principal amount borrowed.", "isCorrect": false, "rationale": "The principal amount is represented by 'P', not 'n'."}], "id": "q01"}, {"question": "When calculating $(1+r)^n$ using a scientific calculator, as described in the section, which sequence of keys is correct after entering the value of $(1+r)$?", "options": [{"text": "Press the square key ($x^2$), then enter $n$.", "isCorrect": false, "rationale": "The $x^2$ key only squares a number (raises it to the power of 2), which is generally not what's needed for 'n' unless $n=2$. The text describes using a general exponent key."}, {"text": "Press the exponent key ($y^x$ or $x^y$), then enter $n$, then press the equals key ($=$).", "isCorrect": true, "rationale": "The text explicitly states to 'Press the $[y^x]$ key (sometimes labeled $[]$ or $[x^y]$)' followed by entering the exponent $n$ and then pressing $[=]$ to get the result."}, {"text": "Press the division key ($/$), then enter $n$.", "isCorrect": false, "rationale": "The division key is used for division, not for raising a number to a power."}, {"text": "Press the multiplication key ($*$), then enter $n$.", "isCorrect": false, "rationale": "Multiplying $(1+r)$ by $n$ is different from raising $(1+r)$ to the power of $n$. The latter involves multiplying $(1+r)$ by itself $n$ times."}], "id": "q02"}, {"question": "A borrower takes out a loan with an Annual Percentage Rate (APR) of 3.6%. What is the correct monthly interest rate 'r' to use in the loan payment formula?", "options": [{"text": "0.036", "isCorrect": false, "rationale": "0.036 is the annual rate as a decimal (3.6%). The formula requires the *monthly* rate, which is the APR divided by 12."}, {"text": "0.0036", "isCorrect": false, "rationale": "This would be the monthly rate if the APR was 0.36% (0.0036 annual). For an APR of 3.6%, the decimal form is 0.036."}, {"text": "0.003", "isCorrect": true, "rationale": "The monthly interest rate 'r' is calculated as APR / 12. So, 0.036 / 12 = 0.003."}, {"text": "0.30", "isCorrect": false, "rationale": "This value is far too high; it would represent an APR of 360%."}], "id": "q03"}, {"question": "If a loan has a term of 8 years, what is the total number of monthly payments ('n') that would be used in the formula?", "options": [{"text": "8", "isCorrect": false, "rationale": "'n' represents the total number of *monthly* payments, not just the number of years."}, {"text": "12", "isCorrect": false, "rationale": "12 is the number of months in a year, not the total payments for an 8-year loan."}, {"text": "96", "isCorrect": true, "rationale": "The total number of monthly payments 'n' is calculated as years × 12. So, 8 years × 12 months/year = 96 payments."}, {"text": "80", "isCorrect": false, "rationale": "This calculation is incorrect; it might be 8 * 10, not 8 * 12."}], "id": "q04"}, {"question": "What is the primary purpose of the monthly loan payment formula ($M = P [r(1+r)^n] / [(1+r)^n - 1]$)?", "options": [{"text": "To determine the total amount of interest paid over the life of the loan.", "isCorrect": false, "rationale": "While the total interest can be derived from the monthly payment, the formula's primary output is the monthly payment itself, not the total interest."}, {"text": "To calculate the fixed monthly payment amount required to pay off an amortized loan.", "isCorrect": true, "rationale": "The section explicitly states that the formula 'calculates the fixed monthly payment M for any amortized loan.'"}, {"text": "To find the remaining principal balance after a certain number of payments.", "isCorrect": false, "rationale": "This formula calculates the payment amount, not the remaining balance. A separate amortization schedule or formula is needed for the remaining balance."}, {"text": "To determine the Annual Percentage Rate (APR) of a loan.", "isCorrect": false, "rationale": "The APR is an input to the formula (used to calculate 'r'), not an output."}], "id": "q05"}, {"question": "Which of the following scenarios best illustrates the concept of amortization as described?", "options": [{"text": "A borrower makes interest-only payments for the first few years of a mortgage.", "isCorrect": false, "rationale": "Amortization involves payments that cover *both* interest and principal, not just interest."}, {"text": "A student loan that requires a single lump sum payment at the end of its term.", "isCorrect": false, "rationale": "Amortization involves *regular* payments that gradually reduce the debt, not a single lump sum at the end."}, {"text": "A car loan where each monthly payment includes a portion for interest and a portion that reduces the principal balance.", "isCorrect": true, "rationale": "This perfectly matches the definition: 'Amortization is the process of paying off a debt through regular payments that cover both interest and principal.'"}, {"text": "A credit card balance that grows due to interest charges without any payments being made.", "isCorrect": false, "rationale": "This describes accruing interest on an unpaid balance, not the process of paying off debt through amortization."}], "id": "q06"}, {"question": "Based on the concept of amortization, how does the allocation of a fixed monthly payment typically change over the life of a loan?", "options": [{"text": "The interest portion increases each month, while the principal portion decreases.", "isCorrect": false, "rationale": "As the principal balance shrinks, the interest charged each month decreases, not increases."}, {"text": "The principal portion remains constant, but the interest portion varies based on market rates.", "isCorrect": false, "rationale": "For a fixed-rate amortized loan, the principal portion generally increases over time, and the interest portion decreases. Market rates are generally fixed for the loan's term once established."}, {"text": "The interest portion decreases each month, leading to a larger portion of the payment reducing the principal.", "isCorrect": true, "rationale": "The text states: 'As the principal shrinks, next month's interest charge is slightly smaller—and slightly more of your payment goes to principal.'"}, {"text": "Both the interest and principal portions remain fixed throughout the entire loan term.", "isCorrect": false, "rationale": "This is incorrect; the split between interest and principal changes with each payment as the principal balance declines."}], "id": "q07"}, {"question": "According to the 'moneytip' section, what is the primary benefit of making extra principal payments, especially early in the loan term?", "options": [{"text": "It ensures that the next month's regular payment is skipped entirely.", "isCorrect": false, "rationale": "The money tip clarifies: 'Always specify that extra payments go to principal, not the next month's payment.' Extra principal payments reduce the balance but don't automatically skip future payments unless the loan is paid off."}, {"text": "It significantly reduces the total amount of interest paid over the life of the loan.", "isCorrect": true, "rationale": "The text states: 'Because interest is charged on the remaining balance, paying even a little extra toward principal in the early months of a loan can significantly reduce the total interest you pay.'"}, {"text": "It automatically lowers the fixed monthly payment for the remainder of the loan term.", "isCorrect": false, "rationale": "Fixed monthly payments remain fixed unless the loan is refinanced or specifically re-amortized. Extra principal payments reduce the term and total interest, not the fixed monthly payment."}, {"text": "It allows the borrower to access additional credit lines from the lender.", "isCorrect": false, "rationale": "While a good payment history can help with future credit, this is not the direct benefit of making extra principal payments as described in the tip."}], "id": "q08"}, {"question": "In the 'Worked Example: The $20,000 Car Loan,' if the loan term was changed from 5 years to 3 years while keeping the principal and APR the same, which step's *result* would be directly affected first in the calculation process?", "options": [{"text": "Step 1: Find the monthly rate 'r'.", "isCorrect": false, "rationale": "Step 1 (calculating 'r') depends on the APR, which is assumed to be the same, so this step's result would not change."}, {"text": "Step 2: Find the total number of payments 'n'.", "isCorrect": true, "rationale": "The total number of payments 'n' is calculated directly from the loan term in years (years × 12). Changing the term from 5 years to 3 years would directly change 'n' from 60 to 36, making this the first result affected."}, {"text": "Step 4: Calculate the numerator of the fraction, $r(1+r)^n$.", "isCorrect": false, "rationale": "Step 4's result would change because 'n' changes (from Step 2), but this is an indirect effect; Step 2 directly calculates 'n'."}, {"text": "Step 7: Multiply by the principal 'P'.", "isCorrect": false, "rationale": "Step 7's result (the final monthly payment 'M') would change because 'n' changes, but this is a cascading effect, not the direct first result affected by a change in term."}], "id": "q09"}, {"question": "You have a 5-year, $10,000 loan at a 4.8% APR. After calculating 'r' (0.004) and 'n' (60), you find $(1+r)^n = (1.004)^{60} \\approx 1.270489$. What would be the next correct step, as per the example's sequence, to calculate the monthly payment?", "options": [{"text": "Multiply 'P' by 'r' ($10,000 \\times 0.004$).", "isCorrect": false, "rationale": "While 'P' and 'r' are used, this specific multiplication is not the next step in the provided formula's sequence. The next step is to calculate the numerator involving $(1+r)^n$."}, {"text": "Calculate the numerator of the fraction: $r(1+r)^n = 0.004 \\times 1.270489$.", "isCorrect": true, "rationale": "Following the 'Monthly Payment Calculation — Step by Step' in the example, after calculating $(1+r)^n$ (Step 3), the next action (Step 4) is to 'Calculate the numerator of the fraction' by multiplying $r$ by $(1+r)^n$."}, {"text": "Calculate the denominator of the fraction: $(1+r)^n - 1 = 1.270489 - 1$.", "isCorrect": false, "rationale": "This is Step 5. Step 4 (calculating the numerator) precedes Step 5."}, {"text": "Divide the numerator by the denominator.", "isCorrect": false, "rationale": "This is Step 6, which occurs after both the numerator and denominator have been calculated."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
