        <h2>Results</h2>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary function of a deductible in an insurance policy?", "options": [{"text": "It is a fixed payment for specific routine medical services.", "isCorrect": false, "rationale": "This describes a copay, which is a fixed amount for specific services, not the initial amount paid before the insurer starts paying for larger claims."}, {"text": "It is the initial amount you must pay out of pocket before your insurance company begins to cover costs for a claim.", "isCorrect": true, "rationale": "A deductible is precisely defined as the amount the policyholder pays first, out of pocket, before the insurance company starts contributing to the covered costs."}, {"text": "It is the maximum dollar amount your insurance company will pay for a covered loss.", "isCorrect": false, "rationale": "This describes a coverage limit, which sets the insurer's maximum payout, not the policyholder's initial out-of-pocket responsibility."}, {"text": "It is a percentage of costs you pay after the insurer has paid their share.", "isCorrect": false, "rationale": "This describes coinsurance, which is a percentage split of costs after the deductible has been met, not the initial upfront amount."}]}, {"question": "How does a copay primarily differ from a deductible?", "options": [{"text": "A copay is paid annually, while a deductible is paid monthly.", "isCorrect": false, "rationale": "Both copays and deductibles can be triggered at any time a covered service is received, not strictly annually or monthly. The payment frequency is not the primary differentiator."}, {"text": "A copay is a fixed amount for specific services, often paid before the deductible is met, whereas a deductible is a larger initial amount paid before the insurer covers other costs.", "isCorrect": true, "rationale": "A copay is a fixed dollar amount for a specific service (e.g., doctor's visit) and can apply even before the deductible is met. A deductible is a larger, initial sum that must be paid entirely by the policyholder before the insurer starts paying for other covered costs, typically for larger claims."}, {"text": "A copay is a percentage of the total bill, while a deductible is a fixed dollar amount.", "isCorrect": false, "rationale": "A copay is a fixed dollar amount, not a percentage. Coinsurance is a percentage of the bill after the deductible."}, {"text": "A copay limits the insurer's total payout, while a deductible limits the policyholder's total payout.", "isCorrect": false, "rationale": "This confuses copays and deductibles with coverage limits (insurer's limit) and out-of-pocket maximums (policyholder's limit)."}]}, {"question": "After meeting your deductible, you receive a bill for a covered service. Which of the following terms describes the portion of that bill you are still responsible for, as a percentage?", "options": [{"text": "Copay", "isCorrect": false, "rationale": "A copay is a fixed dollar amount, not a percentage, and often applies before the deductible is met for routine services."}, {"text": "Coverage Limit", "isCorrect": false, "rationale": "A coverage limit is the maximum dollar amount the insurer will pay for a loss, not a percentage split of an ongoing bill."}, {"text": "Coinsurance", "isCorrect": true, "rationale": "Coinsurance is defined as a percentage split between the policyholder and the insurer that applies to covered costs after the deductible has been paid."}, {"text": "Out-of-Pocket Maximum", "isCorrect": false, "rationale": "The out-of-pocket maximum is a cap on the total amount a policyholder pays in a year, not a percentage of a single bill after the deductible."}]}, {"question": "What is the primary purpose of an out-of-pocket maximum in a health insurance policy?", "options": [{"text": "To ensure policyholders pay a small, fixed fee for every medical service they receive.", "isCorrect": false, "rationale": "This describes the function of a copay, not an out-of-pocket maximum."}, {"text": "To protect the policyholder from excessively high medical costs by capping their total financial responsibility in a single plan year.", "isCorrect": true, "rationale": "The out-of-pocket maximum is specifically designed to limit the total amount a policyholder will pay for covered services in a year, providing financial protection against catastrophic medical bills."}, {"text": "To limit the total amount the insurance company will pay for any single claim or condition.", "isCorrect": false, "rationale": "This describes a coverage limit, which restricts the insurer's maximum payment, not the policyholder's maximum annual spending."}, {"text": "To determine the initial lump sum amount the policyholder must pay before their coverage begins for major services.", "isCorrect": false, "rationale": "This describes a deductible, which is the initial amount paid before the insurer starts contributing, not the overall annual cap."}]}, {"question": "Why is it crucial for a policyholder to carefully review the 'exclusions' section of their insurance policy?", "options": [{"text": "It lists all the services for which a copay is required.", "isCorrect": false, "rationale": "Exclusions detail what is NOT covered, not what services require a copay."}, {"text": "It specifies the percentage the insurer will pay after the deductible is met.", "isCorrect": false, "rationale": "This information is related to coinsurance, not exclusions."}, {"text": "It details specific situations, conditions, or events for which the insurer will not provide coverage.", "isCorrect": true, "rationale": "An exclusion is precisely a list of items, conditions, or events that the insurance policy explicitly does not cover, making it crucial to understand what is not protected."}, {"text": "It outlines the maximum annual amount the policyholder will pay for covered services.", "isCorrect": false, "rationale": "This refers to the out-of-pocket maximum, which is distinct from exclusions."}]}, {"question": "In what order do the deductible, coinsurance, and out-of-pocket maximum typically apply to a large covered medical bill?", "options": [{"text": "Coinsurance is paid first, then the deductible, and finally, the out-of-pocket maximum.", "isCorrect": false, "rationale": "This order is incorrect. The deductible is always paid first."}, {"text": "The out-of-pocket maximum is applied first, then coinsurance, and then the deductible.", "isCorrect": false, "rationale": "This order is incorrect. The out-of-pocket maximum acts as a cap after other costs are calculated, not an initial payment."}, {"text": "The deductible is paid first, then coinsurance applies to the remaining costs, and the out-of-pocket maximum serves as a cap on total annual spending.", "isCorrect": true, "rationale": "The text clearly states the sequence: first the deductible is met, then coinsurance applies to the remaining balance, and finally, the out-of-pocket maximum limits the total amount the policyholder pays annually, including deductible and coinsurance."}, {"text": "The deductible is paid first, then the out-of-pocket maximum is applied, and finally, coinsurance.", "isCorrect": false, "rationale": "This order is incorrect. Coinsurance applies after the deductible is met, and the out-of-pocket maximum is a total cap, not an intermediate step before coinsurance."}]}, {"question": "A health plan has a $750 deductible and 20% coinsurance. If you incur a $3,000 covered medical bill and have not met your deductible yet, how much will you pay out of pocket, assuming you do not reach your out-of-pocket maximum?", "options": [{"text": "$600", "isCorrect": false, "rationale": "This amount only reflects 20% of the total bill ($3,000 * 0.20), incorrectly assuming coinsurance applies before the deductible or that no deductible is paid."}, {"text": "$750", "isCorrect": false, "rationale": "This only accounts for the deductible. The remaining balance after the deductible is subject to coinsurance."}, {"text": "$1,200", "isCorrect": true, "rationale": "You pay the $750 deductible first. The remaining bill is $3,000 - $750 = $2,250. Your coinsurance is 20% of $2,250, which is $450. Your total out-of-pocket payment is $750 + $450 = $1,200."}, {"text": "$3,000", "isCorrect": false, "rationale": "This would mean the insurance plan provides no coverage for the bill, which is incorrect given the deductible and coinsurance terms."}]}, {"question": "Using the 'Try It' scenario from the text ($1,000 deductible, 20% coinsurance, $4,000 out-of-pocket maximum, $10,000 medical bill), how much will you actually pay for this medical bill?", "options": [{"text": "$1,800", "isCorrect": false, "rationale": "This amount only represents the coinsurance portion ($9,000 * 0.20 = $1,800) but does not include the deductible."}, {"text": "$2,800", "isCorrect": true, "rationale": "First, you pay the $1,000 deductible. The remaining bill is $10,000 - $1,000 = $9,000. Your coinsurance is 20% of $9,000, which is $1,800. Your total payment before considering the OOP max is $1,000 (deductible) + $1,800 (coinsurance) = $2,800. Since $2,800 is less than the $4,000 out-of-pocket maximum, you pay $2,800."}, {"text": "$4,000", "isCorrect": false, "rationale": "This would be your payment only if your calculated total (deductible + coinsurance) met or exceeded the $4,000 out-of-pocket maximum. In this scenario, your total is $2,800, which is below the cap."}, {"text": "$10,000", "isCorrect": false, "rationale": "This would mean you pay the entire bill, indicating no insurance coverage, which is incorrect based on the plan details provided."}]}, {"question": "If an insurance plan has a monthly premium of $210, what is the total annual cost of the premium?", "options": [{"text": "$210", "isCorrect": false, "rationale": "This is the monthly cost, not the annual cost."}, {"text": "$1,200", "isCorrect": false, "rationale": "This amount is incorrect. The calculation is $210 multiplied by 12 months."}, {"text": "$2,520", "isCorrect": true, "rationale": "The annual premium is calculated by multiplying the monthly premium by 12 months: $210 * 12 = $2,520."}, {"text": "$2,800", "isCorrect": false, "rationale": "This amount is incorrect. The calculation is $210 multiplied by 12 months."}]}, {"question": "Which of the following approaches is best for comparing two different insurance plans?", "options": [{"text": "Only compare the monthly premiums, as they represent the direct, recurring cost.", "isCorrect": false, "rationale": "Comparing only premiums is insufficient because it ignores potential out-of-pocket costs like deductibles, coinsurance, and copays, which can significantly impact total annual spending."}, {"text": "Focus solely on the deductible amount, choosing the lowest to minimize initial out-of-pocket expenses.", "isCorrect": false, "rationale": "While a low deductible is appealing, it doesn't account for the premium, coinsurance, or the overall out-of-pocket maximum, which are critical for understanding total costs."}, {"text": "Convert all costs (annual premium, potential deductible, coinsurance, and out-of-pocket maximum) to an annual basis to estimate total potential yearly expenditure.", "isCorrect": true, "rationale": "As recommended in the money tip, a comprehensive comparison involves calculating the total annual financial commitment, including both the recurring premium and potential out-of-pocket expenses, to understand the true cost of protection."}, {"text": "Prioritize plans with the highest coverage limits, regardless of other costs, to ensure maximum protection.", "isCorrect": false, "rationale": "While high coverage limits are beneficial, focusing on them exclusively ignores the policyholder's own cost-sharing obligations (deductible, coinsurance, premium) that determine affordability and financial impact."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
