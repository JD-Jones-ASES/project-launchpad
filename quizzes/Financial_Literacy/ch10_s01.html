<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 10, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary purpose of a checking account, as described in the text?", "options": [{"text": "To invest money for long-term growth and high returns.", "isCorrect": false, "rationale": "The text states that money in a checking account is 'meant to be used for day-to-day spending,' not long-term investment."}, {"text": "To provide a means for frequent, everyday financial transactions like deposits and purchases.", "isCorrect": true, "rationale": "The text explicitly defines a checking account as 'designed for frequent, everyday transactions—deposits, purchases, bill payments, and withdrawals.'"}, {"text": "To borrow money from the bank for large purchases and emergencies.", "isCorrect": false, "rationale": "The text clarifies that borrowing money is typically associated with credit cards, not checking accounts or debit cards linked to them."}, {"text": "To serve as a secure vault for storing large sums of cash indefinitely.", "isCorrect": false, "rationale": "While a bank account is secure, the text emphasizes spending for a checking account, not indefinite storage, and cash is converted to digital funds."}]}, {"question": "Which of the following scenarios *best* highlights the fundamental difference between using a debit card and a credit card, according to the text?", "options": [{"text": "A debit card can be used online, while a credit card is only for in-store purchases.", "isCorrect": false, "rationale": "Both debit and credit cards can typically be used for online and in-store purchases; this is not the fundamental difference described."}, {"text": "Using a debit card means you are spending money you already possess, whereas a credit card allows you to borrow money from a lender.", "isCorrect": true, "rationale": "The text clearly states, 'A debit card uses YOUR money right now. There is no borrowing involved,' contrasting it with a credit card that 'lets you borrow money from a lender.'"}, {"text": "A debit card always requires a PIN, but a credit card always requires a signature.", "isCorrect": false, "rationale": "Payment methods can vary; some debit transactions might not need a PIN, and some credit transactions can be contactless or use PINs."}, {"text": "Only credit cards can offer rewards points or cashback, while debit cards never do.", "isCorrect": false, "rationale": "While more common with credit cards, some debit cards can offer rewards, but the text does not mention this as the fundamental difference."}]}, {"question": "If there is a discrepancy between the 'Amount (numbers)' and the 'Amount (words)' written on a check, which amount is legally binding according to the text?", "options": [{"text": "The amount written as numbers.", "isCorrect": false, "rationale": "The text specifies that if there is a discrepancy, the amount written in words takes precedence."}, {"text": "The amount specified in the 'Memo' line.", "isCorrect": false, "rationale": "The 'Memo' line is optional and serves as a note; it is not the legally binding amount."}, {"text": "The amount written out in words.", "isCorrect": true, "rationale": "The text explicitly states for 'Amount (words)': 'This is the legal amount if there is a discrepancy.'"}, {"text": "The amount confirmed by the date the check was written.", "isCorrect": false, "rationale": "The date indicates when the check was written but has no bearing on the legal amount of the payment."}]}, {"question": "Based on the text, under what circumstances are you most likely to incur a fee when using an Automated Teller Machine (ATM)?", "options": [{"text": "Withdrawing cash from an ATM owned by your own bank.", "isCorrect": false, "rationale": "The text states, 'Using your own bank's ATMs is usually free.'"}, {"text": "Checking your account balance at any ATM.", "isCorrect": false, "rationale": "While some non-bank ATMs might charge for balance inquiries, the text specifically highlights withdrawing from *another bank's* ATM for fees, not just checking balance."}, {"text": "Using an ATM that belongs to a bank different from your own.", "isCorrect": true, "rationale": "The text directly states, 'Using another bank's ATM often costs $2–$5 per transaction, sometimes charged by BOTH the ATM owner and your own bank.'"}, {"text": "Making a deposit into your account at any ATM.", "isCorrect": false, "rationale": "The text focuses on cash withdrawals and associated fees, not deposits, and deposits are often free at your own bank's ATM."}]}, {"question": "The 'moneytip' advises keeping a 'small cushion' in your checking account. What is the primary analytical benefit of this practice?", "options": [{"text": "It helps you earn significantly more interest on your checking account balance.", "isCorrect": false, "rationale": "Checking accounts typically offer very low or no interest, so earning significantly more interest is not the primary benefit of a cushion."}, {"text": "It guarantees that all future ATM fees will be waived by your bank.", "isCorrect": false, "rationale": "ATM fees are based on network usage, not specifically on maintaining a cushion balance."}, {"text": "It protects against accidental overdrafts caused by overlooked small charges or delays in transaction processing.", "isCorrect": true, "rationale": "The rationale given in the text is, 'This protects you from accidental overdrafts due to forgotten small charges or timing differences between when a payment is sent and when it clears.'"}, {"text": "It allows the bank to automatically upgrade your account to a premium status.", "isCorrect": false, "rationale": "Maintaining a small cushion is a personal financial strategy and does not automatically lead to account upgrades."}]}, {"question": "A student notices unauthorized transactions on their debit card statement. According to the 'warning' section, what is the most crucial action they should take to limit their liability?", "options": [{"text": "Immediately close their checking account to prevent further fraud.", "isCorrect": false, "rationale": "While a drastic measure, the text emphasizes reporting to the bank first to limit liability, not necessarily closing the account immediately."}, {"text": "Report the suspicious activity to their bank quickly.", "isCorrect": true, "rationale": "The warning states, 'your bank can refund the money—but only if you report it quickly. Federal law limits your liability if you report within 2 days (max $50), but the longer you wait, the more you could be responsible for.'"}, {"text": "Change their Personal Identification Number (PIN) for the debit card.", "isCorrect": false, "rationale": "Changing the PIN is a good security practice but does not address the already unauthorized purchases or the liability associated with them as effectively as reporting."}, {"text": "Wait for a few days to see if the unauthorized charges are reversed automatically.", "isCorrect": false, "rationale": "The text explicitly warns against waiting, stating, 'the longer you wait, the more you could be responsible for.'"}]}, {"question": "Which statement accurately describes a key benefit of 'Direct Deposit' as explained in the text?", "options": [{"text": "It allows employees to receive their paycheck in the form of a paper check.", "isCorrect": false, "rationale": "The definition of direct deposit states it 'sends your paycheck directly into your bank account on payday, without a paper check.'"}, {"text": "It guarantees a higher interest rate on the deposited funds than regular deposits.", "isCorrect": false, "rationale": "The text mentions banks may 'waive fees' for accounts with direct deposit, not necessarily offer higher interest rates."}, {"text": "It provides a faster and safer way to receive paychecks compared to traditional methods.", "isCorrect": true, "rationale": "The text states direct deposit is 'faster, safer, and many banks waive fees for accounts with regular direct deposit.'"}, {"text": "It eliminates the need for a checking account, as funds are stored directly with the employer.", "isCorrect": false, "rationale": "Direct deposit funnels paychecks *into* a bank account, not a substitute for one."}]}, {"question": "A person deposits their paycheck into their checking account, then uses their debit card for a grocery purchase, and later withdraws cash from an ATM. How do these actions collectively affect their checking account balance?", "options": [{"text": "The balance would first decrease, then increase, then decrease again.", "isCorrect": false, "rationale": "Depositing a paycheck increases the balance, not decreases it first."}, {"text": "The balance would increase with the deposit, and then decrease with both the grocery purchase and the ATM withdrawal.", "isCorrect": true, "rationale": "The text explains, 'Your balance goes up every time money comes in, and goes down every time money goes out.' A deposit is money in, purchases and withdrawals are money out."}, {"text": "The balance would remain unchanged because withdrawals cancel out deposits.", "isCorrect": false, "rationale": "Only if the total amount withdrawn exactly equals the total amount deposited would the balance remain unchanged, which is not implied here."}, {"text": "The balance would only be affected by the cash withdrawal, as other transactions are delayed.", "isCorrect": false, "rationale": "All listed transactions affect the balance, though debit card purchases can take 'one to two business days' to fully clear, they still reduce the available balance."}]}, {"question": "According to the definition provided, which characteristic is central to how a debit card functions?", "options": [{"text": "It is a payment card that allows you to borrow money from a bank or financial institution.", "isCorrect": false, "rationale": "This describes a credit card; the text explicitly states a debit card has 'no borrowing involved.'"}, {"text": "It requires a comprehensive credit check before it can be issued to an individual.", "isCorrect": false, "rationale": "The text notes, 'Many teenagers start with a debit card because there is no application or credit check required.'"}, {"text": "It is linked directly to your checking account, taking money you already have for purchases.", "isCorrect": true, "rationale": "The definition states: 'A debit card is a payment card linked directly to your checking account. When you use it to make a purchase, the money is taken from your account immediately... You can only spend money you already have.'"}, {"text": "It can only be used for online purchases and cannot be used at physical stores.", "isCorrect": false, "rationale": "The text mentions debit cards 'works at the same terminals' as credit cards, implying use in physical stores."}]}, {"question": "The text highlights a 'key rule' for managing a checking account: 'never spend more than your balance.' What is the primary financial outcome of consistently following this rule?", "options": [{"text": "It ensures that you will earn the maximum possible interest on your account.", "isCorrect": false, "rationale": "Checking accounts typically offer very low interest, and this rule focuses on spending management, not interest earnings."}, {"text": "It guarantees that all your debit card purchases will receive cashback rewards.", "isCorrect": false, "rationale": "Cashback rewards are a feature of specific cards, not a direct outcome of maintaining a positive balance."}, {"text": "It prevents you from incurring overdraft fees and spending money you don't have.", "isCorrect": true, "rationale": "Spending more than your balance leads to overdrafts. Therefore, consistently adhering to 'never spend more than your balance' directly prevents overdrafts and the associated fees."}, {"text": "It allows you to automatically qualify for a personal loan from your bank.", "isCorrect": false, "rationale": "Loan qualifications involve many factors (credit history, income, etc.), not just maintaining a positive checking account balance."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
