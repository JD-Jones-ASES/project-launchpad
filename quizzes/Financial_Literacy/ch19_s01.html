<script>
var QUESTIONS = [{"question": "According to the text, what is the fundamental principle that makes saving for retirement early dramatically advantageous?", "options": [{"text": "Diversification of investments", "isCorrect": false, "rationale": "While diversification is an important investment strategy, the text specifically identifies the time value of money and compound interest as the fundamental reason for the dramatic advantage of saving early."}, {"text": "The time value of money and compound interest", "isCorrect": true, "rationale": "The text explicitly states, 'money grows through compound interest—your earnings generate their own earnings' and defines the 'Time Value of Money' as the 'fundamental reason why your age right now is one of your greatest financial advantages.'"}, {"text": "Higher interest rates for younger investors", "isCorrect": false, "rationale": "The text does not suggest that younger investors receive inherently higher interest rates. The advantage comes from the longer period their money has to compound, regardless of the specific rate."}, {"text": "Government matching contributions", "isCorrect": false, "rationale": "Government matching contributions are a feature of some employer-sponsored plans like 401(k)s, but they are not the overarching fundamental principle for why saving early, in general, is dramatically better across all retirement savings."}], "id": "q01"}, {"question": "Elena saves $100 per month for 47 years, while Luis saves $300 per month for 25 years. Despite Luis contributing three times as much monthly, Elena ends up with more than twice the money. This scenario primarily illustrates the power of what?", "options": [{"text": "The importance of investment selection.", "isCorrect": false, "rationale": "The text attributes the difference between Elena and Luis specifically to the duration of compounding, not the type of investments they chose."}, {"text": "The non-renewable nature of investment time.", "isCorrect": true, "rationale": "The text explains this scenario under 'The Core Insight: Time Beats Size,' stating, 'Those extra 22 years of compounding are worth more than tripling the monthly contribution' and reinforces this with the 'moneytip' that 'Time is a non-renewable resource in investing; once a year passes, you cannot get it back.'"}, {"text": "The benefit of higher monthly contributions.", "isCorrect": false, "rationale": "This option is contradicted by the scenario itself, which shows that Luis's higher monthly contributions were not enough to overcome Elena's longer savings period."}, {"text": "The effect of inflation on long-term savings.", "isCorrect": false, "rationale": "Inflation is not discussed in this specific example or section as the primary reason for the difference in their outcomes."}], "id": "q02"}, {"question": "In the context of retirement savings, how does the text define the 'Time Value of Money'?", "options": [{"text": "The concept that money spent today has more psychological value than money saved.", "isCorrect": false, "rationale": "This definition is incorrect. The text provides a financial, not psychological, definition of the Time Value of Money."}, {"text": "The principle that a dollar today can be invested and grow, making it worth more than a dollar in the future.", "isCorrect": true, "rationale": "The text explicitly defines the 'Time Value of Money' as 'the principle that a dollar available today is worth more than a dollar available in the future, because today's dollar can be invested and grow over time.'"}, {"text": "The fluctuating purchasing power of money due to economic cycles.", "isCorrect": false, "rationale": "This describes inflation or economic changes, which is distinct from the Time Value of Money as defined in the context of investment growth."}, {"text": "The value of saving money in different currencies over time.", "isCorrect": false, "rationale": "The text does not discuss saving in different currencies when defining the Time Value of Money."}], "id": "q03"}, {"question": "Jordan starts saving $200/month at age 22, while Sam starts the same amount at age 32. Jordan ends up with approximately $895,000, and Sam with approximately $387,000. What is the most significant insight from this 'realworld' example?", "options": [{"text": "A $200/month contribution is insufficient for retirement.", "isCorrect": false, "rationale": "While $200/month might be a starting point and potentially increased later, Jordan still accumulated a substantial amount, suggesting it can be an effective starting point. The example's primary focus is the impact of starting time, not the absolute sufficiency of the amount."}, {"text": "Waiting even ten years to start saving for retirement can cost hundreds of thousands of dollars in lost compound growth.", "isCorrect": true, "rationale": "The text explicitly states, 'Those ten missing years of compound growth cost Sam roughly $508,000—far more than the $24,000 in contributions he skipped.' This directly highlights the enormous cost of delaying savings due to lost compound growth."}, {"text": "Sam made a mistake by not investing in a 401(k).", "isCorrect": false, "rationale": "The example states both students contributed to 'a retirement account' without specifying the type. The main lesson is about the delay, not the specific account choice in this context."}, {"text": "It is impossible to catch up on retirement savings if you start late.", "isCorrect": false, "rationale": "The text demonstrates it is significantly harder and more costly to catch up, but it does not claim it is impossible. Sam still accumulated a significant sum, albeit much less than Jordan."}], "id": "q04"}, {"question": "If you contribute $6,000 per year from age 18 to 65, accumulating approximately $2,717,000, and your total out-of-pocket contributions are only $282,000, what accounts for the vast majority of the final amount?", "options": [{"text": "Market volatility protection.", "isCorrect": false, "rationale": "Market volatility protection is not mentioned as a source of growth for this sum. The focus is on the mechanism by which the money grows."}, {"text": "Employer matching contributions.", "isCorrect": false, "rationale": "While employer matching can significantly boost savings in a 401(k), the $6,000/year example is a general illustration of compound growth over time and doesn't attribute the vast majority of the sum to matching."}, {"text": "Pure compound growth.", "isCorrect": true, "rationale": "The text explicitly states for this example, 'Your total out-of-pocket contribution over those 47 years is only $282,000. The rest—more than $2.43 million—is pure compound growth.'"}, {"text": "Government tax credits for saving.", "isCorrect": false, "rationale": "Government tax advantages help keep more of your earnings, but the 'growth' itself, which makes up the vast majority of the final sum, comes from compound interest, not a direct tax credit adding millions."}], "id": "q05"}, {"question": "The 'moneytip' advises, 'Start now—even with a small amount.' Given the context of the entire section, what is the most important reason for this advice?", "options": [{"text": "Small contributions are less likely to be impacted by market downturns.", "isCorrect": false, "rationale": "The text does not discuss the impact of market downturns on small contributions. The advice focuses on the power of starting early."}, {"text": "It establishes a saving habit early, which is crucial for financial discipline.", "isCorrect": false, "rationale": "While establishing a habit is a positive outcome, the explicit reasoning provided in the text for starting 'now—even with a small amount' centers on the financial advantage of time for compound growth, not primarily habit formation."}, {"text": "Time is a non-renewable resource, and early contributions maximize compound growth over a longer period.", "isCorrect": true, "rationale": "The 'moneytip' states, 'Time is a non-renewable resource in investing; once a year passes, you cannot get it back,' directly linking the importance of starting now (even small) to maximizing the crucial compounding period."}, {"text": "Banks offer better rates for accounts started by younger individuals.", "isCorrect": false, "rationale": "The text does not mention banks offering better rates for younger individuals. The focus is on the power of compounding over time, not preferential rates."}], "id": "q06"}, {"question": "According to the section, what is the primary incentive the federal government offers to encourage people to use special retirement accounts?", "options": [{"text": "Guaranteed annual returns on investments.", "isCorrect": false, "rationale": "The government does not guarantee returns on investments in retirement accounts, as investment values fluctuate with market performance."}, {"text": "Significant tax advantages.", "isCorrect": true, "rationale": "The text explicitly states that 'the federal government has created specifically to encourage people to save for retirement... the government gives you significant tax advantages.'"}, {"text": "Access to exclusive investment opportunities.", "isCorrect": false, "rationale": "The text does not mention that retirement accounts offer access to exclusive investment opportunities unavailable to regular accounts."}, {"text": "Free financial planning services.", "isCorrect": false, "rationale": "Free financial planning services are not mentioned as a direct government incentive for using these accounts."}], "id": "q07"}, {"question": "Which type of retirement account is generally considered the 'best option for young people' according to the text, and why?", "options": [{"text": "Traditional IRA, because contributions reduce taxes today.", "isCorrect": false, "rationale": "While Traditional IRAs offer tax-deferred growth where contributions can reduce current taxes, the text specifically identifies the Roth IRA as 'usually the best option for young people.'"}, {"text": "401(k), because employers often provide matching money.", "isCorrect": false, "rationale": "A 401(k) with matching is an excellent option, but the text specifically highlights the Roth IRA as 'usually the best option for young people' due to its tax-free growth, which is particularly beneficial when a young person is likely in a lower tax bracket than they will be in retirement."}, {"text": "Roth IRA, because its investment growth is tax-free.", "isCorrect": true, "rationale": "The text states: 'Roth IRA — tax-free growth (usually the best option for young people),' indicating its tax-free growth as the key advantage for this demographic."}, {"text": "A regular savings account, due to its liquidity.", "isCorrect": false, "rationale": "A regular savings account is not a retirement account and does not offer the significant tax advantages discussed for encouraging retirement savings."}], "id": "q08"}, {"question": "The text describes two primary ways the government offers tax advantages for retirement accounts. What are these two main approaches?", "options": [{"text": "Offering higher guaranteed interest rates or providing free investment advice.", "isCorrect": false, "rationale": "The government does not guarantee interest rates or provide free investment advice as primary tax advantages for these accounts."}, {"text": "Allowing contributions to reduce current taxes or making investment growth tax-free.", "isCorrect": true, "rationale": "The text states, 'the government gives you significant tax advantages—either your contributions reduce your taxes today, or your investment growth is never taxed at all.' These correspond to tax-deferred (e.g., Traditional IRA, 401k) and tax-free (e.g., Roth IRA) growth models."}, {"text": "Exempting contributions from state taxes or subsidizing investment fees.", "isCorrect": false, "rationale": "The text refers to federal government tax advantages and does not mention state tax exemptions or subsidized investment fees as the primary two approaches."}, {"text": "Providing universal basic income in retirement or allowing early withdrawals without penalty.", "isCorrect": false, "rationale": "Universal basic income is a different concept, and retirement accounts generally have penalties for early withdrawals, not allowances without penalty."}], "id": "q09"}, {"question": "A recent college graduate is deciding between two strategies: (1) saving $50/month from age 22, or (2) waiting until age 32 and saving $150/month. Based on the 'Core Insight: Time Beats Size' from the text, which strategy is likely to yield more money by age 65, and why?", "options": [{"text": "Strategy (2), because the higher monthly contribution will quickly outpace the earlier start.", "isCorrect": false, "rationale": "This contradicts the core insight of the section. The examples of Elena vs. Luis and Jordan vs. Sam clearly show that a longer compounding period, even with smaller contributions, can yield significantly more than larger contributions started later."}, {"text": "Strategy (1), because the additional 10 years of compounding will likely outweigh the smaller monthly contribution.", "isCorrect": true, "rationale": "The text's 'Core Insight: Time Beats Size' and examples (Elena vs. Luis, Jordan vs. Sam) demonstrate that a longer period for money to compound (Strategy 1, starting 10 years earlier) is dramatically more powerful than significantly larger monthly contributions started later."}, {"text": "Both strategies will likely yield similar results due to varying market conditions.", "isCorrect": false, "rationale": "The text emphasizes the dramatic difference that time makes, indicating that similar results are highly unlikely given the 10-year difference in compounding time."}, {"text": "Neither strategy is effective; much higher contributions are needed to make a difference.", "isCorrect": false, "rationale": "The 'moneytip' encourages starting 'even with a small amount,' and the Jordan example ($200/month) shows significant accumulation, indicating that these strategies can be effective, especially Strategy 1."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
