    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "What is the primary goal of diversification in investing, as described in the text?", "options": [{"text": "To ensure all investments perform equally well at all times.", "isCorrect": false, "rationale": "The text states diversification aims to 'ensure that no single investment failure can devastate your entire portfolio,' not that all investments will perform equally."}, {"text": "To spread investments across different assets, companies, industries, and regions to reduce the impact of any single investment's poor performance.", "isCorrect": true, "rationale": "The definition of diversification in the text explicitly states its purpose is 'spreading your investments across different assets, companies, industries, and geographic regions. The goal is to ensure that no single investment failure can devastate your entire portfolio.'"}, {"text": "To consistently predict market trends and profit from short-term fluctuations.", "isCorrect": false, "rationale": "Predicting market trends is associated with 'timing the market,' which the text identifies as difficult and not related to diversification."}, {"text": "To achieve maximum returns by concentrating investments in high-growth sectors.", "isCorrect": false, "rationale": "Concentrating investments would be the opposite of diversification, which aims to spread risk, not concentrate it for maximum returns."}]}, {"question": "An investor holds stocks in a renewable energy company, a consumer staples company (food/beverage), and an international market index fund. Which scenario best illustrates how this diversification strategy might provide stability, according to the text?", "options": [{"text": "A global economic boom leads to strong growth across all sectors, making all investments rise simultaneously.", "isCorrect": false, "rationale": "While positive, this scenario doesn't illustrate how diversification provides *stability* by offsetting negative events in one sector with positive or stable performance in another. The text highlights how different investments react differently."}, {"text": "A sharp rise in interest rates negatively impacts the renewable energy sector, but the consumer staples company remains stable due to consistent demand, and the international fund experiences modest growth.", "isCorrect": true, "rationale": "This scenario directly reflects the text's explanation: 'When one sector of the economy struggles, another might thrive,' or 'consumer staples (food, medicine) tend to hold up better than luxury goods,' and 'When U.S. stocks fall, international markets may not fall as much (or might even rise).'"}, {"text": "A specific product recall negatively affects only the consumer staples company, causing a significant portfolio loss.", "isCorrect": false, "rationale": "While diversification helps mitigate company-specific risks, this scenario describes a significant loss, which diversification aims to prevent from 'devastating' the entire portfolio. The goal is smoothing out rough patches."}, {"text": "All three investments perform identically during a period of moderate economic growth.", "isCorrect": false, "rationale": "The principle of diversification is that 'different investments react differently to the same economic events' and 'do not all move in the same direction at the same time.'"}]}, {"question": "According to the text, which statement best characterizes a 'diversified portfolio'?", "options": [{"text": "It is a collection of investments focused on a single, high-growth industry.", "isCorrect": false, "rationale": "The text explicitly defines a diversified portfolio as including 'many different assets that do not all move in the same direction at the same time,' which contradicts focusing on a single industry."}, {"text": "It primarily consists of investments that consistently outperform the overall market.", "isCorrect": false, "rationale": "The text focuses on risk management and stability, not guaranteed outperformance, as the key characteristic of diversification."}, {"text": "It includes many different assets that do not all move in the same direction at the same time, smoothing out overall volatility.", "isCorrect": true, "rationale": "The text defines a portfolio as a 'complete collection of investments' and states that a diversified portfolio 'includes many different assets that do not all move in the same direction at the same time,' leading to smoothed out volatility."}, {"text": "It is a collection of investments that have been precisely timed to be bought at their lowest prices.", "isCorrect": false, "rationale": "Timing investments is a separate strategy, often contrasted with dollar-cost averaging, and is not a defining characteristic of a diversified portfolio itself."}]}, {"question": "An ordinary investor wants to achieve instant diversification across a broad market, such as the entire U.S. stock market, without needing to pick individual stocks. Based on the text, what is the most powerful tool for this purpose?", "options": [{"text": "Investing all capital into a single, well-established blue-chip company's stock.", "isCorrect": false, "rationale": "This strategy would result in highly concentrated risk, not instant diversification across the entire market."}, {"text": "Relying on professional stockbrokers to manually select a variety of individual stocks for them.", "isCorrect": false, "rationale": "While a broker could help, the text highlights a specific, simpler tool for 'ordinary investors' to get 'instant diversification' without needing 'expertise or wealth.'"}, {"text": "Investing in an index fund.", "isCorrect": true, "rationale": "The 'moneytip' section explicitly states: 'Index funds... allow you to own tiny pieces of hundreds or thousands of companies in a single investment. One fund can give you instant diversification across the entire U.S. stock market. This is one of the most powerful tools available to ordinary investors.'"}, {"text": "Attempting to 'time the market' by buying and selling different stocks frequently.", "isCorrect": false, "rationale": "'Timing the market' is a strategy for market entry/exit, not a tool for instant diversification across the entire market, and the text notes its difficulty."}]}, {"question": "Which statement accurately defines dollar-cost averaging (DCA) as described in the text?", "options": [{"text": "A strategy of investing a large lump sum when market prices are believed to be at their lowest point.", "isCorrect": false, "rationale": "This describes 'timing the market,' which DCA actively avoids. DCA involves regular, fixed investments, not single large sums based on predictions."}, {"text": "A method of selling investments when prices are high and buying them back when they fall.", "isCorrect": false, "rationale": "This is a form of market timing or speculative trading, which the text contrasts with the consistent, emotion-free approach of DCA."}, {"text": "Investing a fixed dollar amount at regular intervals, regardless of whether the market is up or down.", "isCorrect": true, "rationale": "The text defines dollar-cost averaging (DCA) as 'investing a fixed dollar amount at regular intervals—regardless of whether the market is up or down.'"}, {"text": "The practice of constantly adjusting investment amounts based on market volatility to maximize returns.", "isCorrect": false, "rationale": "DCA removes emotion and is 'easy to automate' with a 'fixed dollar amount,' contradicting the idea of constant adjustment based on volatility."}]}, {"question": "An investor practices dollar-cost averaging by investing $200 each month into a stock fund. In Month 1, the share price is $20. In Month 2, the share price is $10. What is the investor's average cost per share after these two months, and how many shares do they own?", "options": [{"text": "Average cost: $15.00; Total shares: 20.", "isCorrect": false, "rationale": "This is the simple average of the share prices, not the average cost per share using DCA. Total shares would be 200/20 + 200/10 = 10 + 20 = 30."}, {"text": "Average cost: $13.33; Total shares: 30.", "isCorrect": true, "rationale": "This matches the 'Quick Check' example: 'Month 1: 200/20 = 10 shares; Month 2: 200/10 = 20 shares; Total: 30 shares; Average cost: $400/30 = $13.33 per share.'"}, {"text": "Average cost: $10.00; Total shares: 20.", "isCorrect": false, "rationale": "This would only be true if all shares were bought at the $10 price, ignoring the first month's investment."}, {"text": "Average cost: $20.00; Total shares: 10.", "isCorrect": false, "rationale": "This only accounts for the first month's investment and does not reflect the averaging effect over two months."}]}, {"question": "One of the key benefits of dollar-cost averaging, as highlighted in the text, is that it removes emotion from the investment process. How does this happen?", "options": [{"text": "By requiring investors to make impulsive decisions based on market sentiment.", "isCorrect": false, "rationale": "This is the opposite of removing emotion. DCA helps prevent 'panic-selling and greed-buying' by adhering to a schedule."}, {"text": "By encouraging investors to constantly monitor market news and react quickly to events.", "isCorrect": false, "rationale": "DCA is about investing 'on a schedule—not based on whether the market feels scary or exciting,' which reduces the need for constant monitoring and reaction."}, {"text": "By automating investments on a schedule, preventing decisions based on fear or greed during market fluctuations.", "isCorrect": true, "rationale": "The text states, 'It removes emotion. You invest on a schedule—not based on whether the market feels scary or exciting. This prevents panic-selling and greed-buying.' Also, 'It is easy to automate.'"}, {"text": "By guaranteeing that every investment purchase will be at a historically low price.", "isCorrect": false, "rationale": "DCA doesn't guarantee buying at the absolute lowest price; it 'tends to lower your average cost per share' by buying more shares when prices are low, without needing to predict lows."}]}, {"question": "How does dollar-cost averaging specifically take advantage of market dips or falling prices?", "options": [{"text": "It instructs investors to temporarily pause their investments until prices begin to rise again.", "isCorrect": false, "rationale": "DCA involves investing 'a fixed dollar amount at regular intervals—regardless of whether the market is up or down,' meaning it does not pause during dips."}, {"text": "It automatically causes the fixed dollar investment to purchase more shares when prices are lower.", "isCorrect": true, "rationale": "The text explains, 'When prices fall, your fixed investment buys more shares automatically—without you having to time anything.'"}, {"text": "It requires investors to manually increase their investment amount during a market downturn.", "isCorrect": false, "rationale": "DCA uses a 'fixed dollar amount' and removes emotion, not requiring manual adjustments during dips."}, {"text": "It triggers an automatic sale of some existing shares to limit potential losses during a dip.", "isCorrect": false, "rationale": "DCA is about consistent buying, not selling during dips, which could be a form of panic-selling."}]}, {"question": "The text suggests that 'timing the market' by buying when prices are low and selling when high is 'almost impossible to do consistently.' How does dollar-cost averaging directly address this challenge?", "options": [{"text": "By providing a complex algorithm to predict market highs and lows with greater accuracy.", "isCorrect": false, "rationale": "DCA simplifies investing and avoids prediction; it doesn't involve complex algorithms for market timing."}, {"text": "By allowing investors to invest a fixed amount on a regular schedule, thus sidestepping the need to predict market movements.", "isCorrect": true, "rationale": "The text states that DCA 'takes a different approach' to timing the market by 'investing a fixed dollar amount at regular intervals—regardless of whether the market is up or down,' thereby avoiding the need to predict market highs or lows."}, {"text": "By recommending frequent buying and selling based on real-time market data.", "isCorrect": false, "rationale": "This describes active trading, which is contrary to the consistent, automated, and emotion-free nature of DCA."}, {"text": "By guaranteeing that an investor will always buy at the absolute lowest price point.", "isCorrect": false, "rationale": "DCA 'tends to lower your average cost per share,' but it does not guarantee buying at the absolute lowest price; it simply takes advantage of lows when they occur naturally within the investment schedule."}]}, {"question": "An investor is concerned about two common sources of regret: having 'all my money in one stock and it crashed' and 'I bought right before the market dropped.' According to the 'The Two Strategies Together' section, what is the most effective combined strategy to manage these two risks?", "options": [{"text": "Focusing all investments on a single, well-established company and only investing when market indicators are perfectly positive.", "isCorrect": false, "rationale": "This approach is the opposite of both diversification ('all my money in one stock') and dollar-cost averaging ('bought right before the market dropped' implies market timing)."}, {"text": "Diversifying investments across various assets, industries, and regions, and regularly investing a fixed amount through dollar-cost averaging.", "isCorrect": true, "rationale": "The text explicitly states: 'Diversification protects you against any single investment failing' and 'Dollar-cost averaging protects you against buying at the wrong time.' Together, they manage these two biggest sources of investor regret."}, {"text": "Exclusively investing in international markets to avoid domestic economic volatility, while making large, infrequent investments.", "isCorrect": false, "rationale": "While international markets can aid diversification, this strategy neglects broad diversification and the consistent nature of DCA, and large, infrequent investments are prone to market timing issues."}, {"text": "Placing all funds into a high-interest savings account to avoid market risks entirely, sacrificing potential returns.", "isCorrect": false, "rationale": "This strategy avoids investment risk but also foregoes investment returns and is not discussed as a way to manage 'investor regret' in the context of investment strategies."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
