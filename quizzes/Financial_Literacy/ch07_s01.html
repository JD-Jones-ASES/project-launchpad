<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 7, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the fundamental definition of a budget?", "options": [{"text": "A record of past expenditures to identify areas of overspending.", "isCorrect": false, "rationale": "While tracking past expenses can be part of understanding spending, the text defines a budget as a plan that assigns every dollar *before* it is spent, not merely a record of past events."}, {"text": "A system to restrict what you can buy to save money.", "isCorrect": false, "rationale": "The text explicitly states a budget is the opposite of a 'diet' that tells you what you cannot have; it's about control and direction, not primarily restriction or punishment."}, {"text": "A written plan that assigns every dollar of your income to a specific purpose before you spend it.", "isCorrect": true, "rationale": "This option directly quotes the definition provided in the 'definitionBudget' section of the text, emphasizing proactive allocation."}, {"text": "A complex financial tool requiring specialized software to manage effectively.", "isCorrect": false, "rationale": "The 'moneytip' section clarifies that a budget does not need a complicated system or special software; a simple piece of paper or app is sufficient."}], "id": "q01"}, {"question": "The text states that many people view a budget like a 'diet.' Why does the author consider this analogy inaccurate?", "options": [{"text": "Because diets are typically temporary, while budgeting should be a permanent habit.", "isCorrect": false, "rationale": "While budgeting is a habit, the text's primary reason for the analogy's inaccuracy is not its temporary nature but its perceived restrictive quality."}, {"text": "Because a budget tells your money where to go, whereas a diet often focuses on what you cannot have.", "isCorrect": true, "rationale": "This option directly reflects the text's explanation: 'It sounds like a diet—something that tells you what you cannot have. But a budget is actually the opposite: it is a plan that tells your money where to go.'"}, {"text": "Because diets are difficult to maintain, making people less likely to try budgeting.", "isCorrect": false, "rationale": "The text acknowledges discomfort but focuses on correcting the misconception about a budget's purpose, not its difficulty of maintenance relative to a diet."}, {"text": "Because diets improve physical health, while budgets only improve financial health.", "isCorrect": false, "rationale": "The text does not make a comparison based on the type of health improved, but rather on the perceived function of control versus restriction."}], "id": "q02"}, {"question": "Based on the 'Money Without a Plan' section and the 'Missing $670' example, what is the most significant consequence of making spending decisions one at a time without an overarching financial plan?", "options": [{"text": "Individuals develop a stronger intuition for estimating future expenses accurately.", "isCorrect": false, "rationale": "The 'checkpoint' section suggests the opposite, indicating that people often struggle to accurately recall past spending without records, implying poor estimation without a plan."}, {"text": "Money tends to disappear by the end of the month, leaving the individual unsure of where it went.", "isCorrect": true, "rationale": "This is a direct outcome described in both the 'Money Without a Plan' and 'Missing $670' sections, highlighting how small, unplanned expenditures accumulate."}, {"text": "Urgent expenses are more easily covered due to a relaxed approach to spending.", "isCorrect": false, "rationale": "The text implies urgent expenses still arise and without a plan, they can deplete funds quickly, making coverage more difficult, not easier."}, {"text": "It consistently leads to a greater surplus of funds at month-end as needs are met individually.", "isCorrect": false, "rationale": "The 'Missing $670' example demonstrates the exact opposite, with a surplus quickly disappearing without an intentional plan."}], "id": "q03"}, {"question": "One of the specific things budgeting does is 'clarifies priorities.' How would this benefit manifest for someone who claims they want to save for a car but hasn't made progress?", "options": [{"text": "The budget would automatically transfer money to a car savings account each month.", "isCorrect": false, "rationale": "A budget requires intentional allocation; it doesn't automatically transfer funds without the user's input."}, {"text": "The budget would force them to stop all non-essential spending until the car goal is met.", "isCorrect": false, "rationale": "Budgeting is about intentional direction and control, not necessarily absolute prohibition of non-essentials."}, {"text": "The budget would reveal if zero dollars are actually being allocated to savings, highlighting a mismatch between stated desire and financial action.", "isCorrect": true, "rationale": "This option directly uses the example from the text for clarifying priorities: 'If you say you want to save for a car but your budget shows zero dollars allocated to savings, that is important information.'"}, {"text": "The budget would increase their income, making it easier to save for the car.", "isCorrect": false, "rationale": "The text explicitly states, 'Budgeting Is Not About Earning More'; a budget is a tool for managing existing income."}], "id": "q04"}, {"question": "A significant source of money stress is 'not knowing' if you can cover expenses. How does budgeting directly address this specific form of stress?", "options": [{"text": "By eliminating all unexpected expenses from occurring in the future.", "isCorrect": false, "rationale": "Budgeting cannot eliminate unexpected expenses, but it can help plan for them or manage their impact."}, {"text": "By ensuring a higher income stream to always have more than enough money.", "isCorrect": false, "rationale": "Budgeting is about managing existing income, not increasing it."}, {"text": "By providing answers to financial questions like 'Can I cover rent?' or 'Do I have enough?' in advance.", "isCorrect": true, "rationale": "The text explicitly states: 'Not knowing if you can cover rent. Not knowing if you have enough. A budget answers these questions in advance.'"}, {"text": "By encouraging people to ignore their financial situation until it becomes critical.", "isCorrect": false, "rationale": "This is the opposite of what budgeting encourages; it promotes proactive engagement with finances."}], "id": "q05"}, {"question": "The text refutes the common mistake, 'I will start budgeting when I earn more money.' What is the primary reason given for this being a misconception?", "options": [{"text": "Budgeting software is expensive, making it more feasible for those with higher incomes.", "isCorrect": false, "rationale": "The 'moneytip' section states that budgeting doesn't require special software, making this reason incorrect."}, {"text": "Financial stability is more dependent on having a plan for your money than on the absolute amount of income you earn.", "isCorrect": true, "rationale": "The text directly states: 'Someone earning $30,000 per year with a plan can be more financially stable than someone earning $80,000 without one.'"}, {"text": "Lower income levels make budgeting impractical due to too little margin for error.", "isCorrect": false, "rationale": "The text states the opposite: 'In fact, the lower your income, the more critical it is to direct every dollar intentionally, because there is less margin for error.'"}, {"text": "Budgeting only becomes effective once all debts have been paid off.", "isCorrect": false, "rationale": "The text implies budgeting is a tool for any financial situation, including paying off debt ('pay off a credit card' is a goal mentioned)."}], "id": "q06"}, {"question": "How does knowing you have only $5 left in your entertainment budget for the month prevent overspending, according to the text?", "options": [{"text": "It forces you to cancel any existing entertainment subscriptions immediately.", "isCorrect": false, "rationale": "While one might adjust subscriptions, the budget itself doesn't 'force' cancellation; it provides information for decisions."}, {"text": "It provides real information to work with before making your next spending decision.", "isCorrect": true, "rationale": "The text states: 'When you know you have $80 budgeted for entertainment this month and you have already spent $75 of it, you have real information to work with before making the next decision.'"}, {"text": "It automatically blocks any further transactions tagged as entertainment.", "isCorrect": false, "rationale": "A budget is a plan, not an automated financial block; it relies on the user's conscious decisions."}, {"text": "It encourages you to find ways to earn more money to increase your entertainment budget.", "isCorrect": false, "rationale": "While earning more is an option, the budget's immediate role is to manage current funds, not to directly increase them to cover overspending."}], "id": "q07"}, {"question": "The 'moneytip' section emphasizes that budgeting doesn't require complex tools. What is highlighted as the *most important thing* for successful budgeting?", "options": [{"text": "Investing in the latest budgeting software with advanced features.", "isCorrect": false, "rationale": "The text explicitly states, 'You do not need a complicated system or any special software.'"}, {"text": "That the budget exists, was built before the month starts, and is checked regularly.", "isCorrect": true, "rationale": "This option directly quotes the 'moneytip': 'The most important thing is that the budget exists, that you built it before the month starts, and that you check in with it regularly.'"}, {"text": "Having a high income level to provide a larger margin for error.", "isCorrect": false, "rationale": "The text states budgeting works at any income level and is more critical for lower incomes, not that a high income is most important."}, {"text": "Detailed categorization of every single transaction, no matter how small.", "isCorrect": false, "rationale": "While categorization is part of budgeting, the emphasis here is on the budget's existence, proactive creation, and regular review, rather than granular detail as the 'most important thing.'"}], "id": "q08"}, {"question": "The 'didyouknow' section reveals that a significant portion of adults cannot accurately recall their spending and few living paycheck to paycheck have a written plan. What does this suggest about the relationship between budgeting habits and financial stress?", "options": [{"text": "The inability to recall spending is a natural human trait, unrelated to financial stress.", "isCorrect": false, "rationale": "The text connects these facts by stating, 'Budgeting is not a common habit—which is one reason so many people feel financially stressed even when their income is adequate.'"}, {"text": "People with higher incomes are inherently better at managing money without a budget.", "isCorrect": false, "rationale": "The text explicitly states financial stability depends on a plan, not income level."}, {"text": "A lack of conscious awareness and planning for spending likely contributes to financial stress, even if income is adequate.", "isCorrect": true, "rationale": "The section implies that the absence of budgeting (a written spending plan) and the inability to track spending are key reasons why people feel financially stressed despite potentially adequate income."}, {"text": "Those living paycheck to paycheck are too overwhelmed to implement a budget effectively.", "isCorrect": false, "rationale": "The text argues budgeting is 'more critical' for lower incomes due to less margin for error, suggesting it's a vital tool, not an impractical one."}], "id": "q09"}, {"question": "Considering all the information presented in the section, what is the ultimate goal or benefit that budgeting provides to an individual?", "options": [{"text": "To accumulate wealth rapidly through aggressive saving and investment.", "isCorrect": false, "rationale": "While budgeting can accelerate goals like saving, its ultimate benefit, as described, is broader than just wealth accumulation and isn't solely focused on 'aggressive' strategies."}, {"text": "To eliminate all forms of financial temptation and spontaneous purchases.", "isCorrect": false, "rationale": "Budgeting aims for control and awareness, not absolute elimination of all non-essential spending. The 'Missing $670' example notes a budget 'would not have prevented all of this spending'."}, {"text": "To gain control over one's own financial life by intentionally directing every dollar.", "isCorrect": true, "rationale": "This synthesizes the definition ('plan that tells your money where to go') and the overarching benefits, describing a budget as 'a tool that gives you control over your own financial life.'"}, {"text": "To compare one's spending habits against national averages for financial benchmarks.", "isCorrect": false, "rationale": "The text does not mention comparing against national averages as a primary goal of personal budgeting, focusing instead on individual control and planning."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
