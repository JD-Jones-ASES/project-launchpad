        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 22, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best defines identity theft according to the textbook section?", "options": [{"text": "Illegally obtaining money by hacking a bank account.", "isCorrect": false, "rationale": "While hacking bank accounts can be part of financial identity theft, this definition is too narrow and doesn't encompass all forms of identity theft or the core mechanism of using another's personal information."}, {"text": "The crime of using another person's personal information without their permission, typically for financial gain.", "isCorrect": true, "rationale": "This option directly matches the definition provided in the text: 'Identity theft is the crime of using another person's personal information—such as their name, Social Security number, credit card numbers, or bank account details—without their permission, typically for financial gain.'"}, {"text": "Sharing personal data online without proper security.", "isCorrect": false, "rationale": "Sharing data online without proper security might make one vulnerable, but it is not the definition of identity theft itself, which involves a perpetrator using that information."}, {"text": "Accidentally exposing sensitive documents in a public place.", "isCorrect": false, "rationale": "Accidentally exposing documents might lead to identity theft if a criminal finds and uses them, but the act of exposure itself is not the crime of identity theft."}], "id": "q01"}, {"question": "The text states identity theft is 'not a victimless crime.' Which of the following consequences primarily supports this statement beyond immediate financial loss?", "options": [{"text": "The perpetrator might face severe legal penalties.", "isCorrect": false, "rationale": "This option focuses on the consequences for the perpetrator, not the victim, and does not describe how the crime impacts the victim directly or makes it 'not victimless.'"}, {"text": "Victims often spend hundreds of hours over months or years resolving the issues, leading to significant emotional stress.", "isCorrect": true, "rationale": "The text explicitly states: 'It can destroy your credit, create legal liabilities in your name, and take months or years to fully resolve,' and 'The sense of violation and ongoing uncertainty can be psychologically taxing.' This highlights the profound non-financial impact on victims."}, {"text": "Companies must invest more in cybersecurity to prevent future breaches.", "isCorrect": false, "rationale": "This describes an action companies might take, not a direct consequence experienced by the victim that makes the crime 'not victimless.'"}, {"text": "Data breaches become more common globally.", "isCorrect": false, "rationale": "While data breaches contribute to identity theft, this statement describes a general trend rather than a specific consequence for an individual victim."}], "id": "q02"}, {"question": "According to the text, how do data breaches primarily contribute to identity theft?", "options": [{"text": "They directly cause individuals to lose money from their bank accounts immediately.", "isCorrect": false, "rationale": "Data breaches expose information, which then *enables* criminals to commit theft, but the breach itself isn't the direct cause of immediate money loss for individuals; it's an exposure event."}, {"text": "Criminals hack into companies' databases and steal customer records containing personal information.", "isCorrect": true, "rationale": "The text states under 'How Identity Theft Happens': 'Data breaches: Criminals hack into companies' databases and steal customer records.'"}, {"text": "They trick individuals into voluntarily giving up their personal information.", "isCorrect": false, "rationale": "Tricking individuals into revealing information describes 'phishing' or 'social engineering,' not data breaches, where information is stolen from a company without the individual's direct interaction."}, {"text": "They involve the physical theft of wallets or mail.", "isCorrect": false, "rationale": "Physical theft of wallets or mail is a separate method of obtaining information listed in the text, distinct from data breaches."}], "id": "q03"}, {"question": "A person discovers that someone has been using their health insurance policy to obtain prescriptions and medical services, resulting in false entries appearing on their medical history. What type of identity theft does this most accurately represent?", "options": [{"text": "Financial identity theft", "isCorrect": false, "rationale": "Financial identity theft involves opening credit accounts, taking loans, or accessing bank accounts, not health insurance or medical records."}, {"text": "Tax identity theft", "isCorrect": false, "rationale": "Tax identity theft involves filing fraudulent tax returns."}, {"text": "Medical identity theft", "isCorrect": true, "rationale": "The text defines medical identity theft as 'Using your health insurance information to obtain medical care, prescriptions, or medical equipment. This is dangerous because false medical records can be created in your name.'"}, {"text": "Criminal identity theft", "isCorrect": false, "rationale": "Criminal identity theft involves giving false information to law enforcement when arrested."}], "id": "q04"}, {"question": "An individual receives a call from someone posing as a bank representative, asking for their account password to 'verify recent unusual activity.' The individual, convinced by the caller's authoritative tone, provides the information. This scenario is an example of which method of obtaining personal information?", "options": [{"text": "Skimming device", "isCorrect": false, "rationale": "A skimming device involves physical installation on card readers to capture data, not a phone call manipulating an individual."}, {"text": "Dumpster diving", "isCorrect": false, "rationale": "Dumpster diving involves physically sifting through trash for discarded documents, not psychological manipulation over the phone."}, {"text": "Social engineering", "isCorrect": true, "rationale": "The text describes social engineering as 'Manipulating you psychologically into revealing information voluntarily—often by posing as a trusted authority,' which perfectly matches the scenario."}, {"text": "Data breach", "isCorrect": false, "rationale": "A data breach involves hacking into a company's database, not a direct interaction where an individual is tricked into revealing information."}], "id": "q05"}, {"question": "Beyond direct financial loss, what is a significant long-term consequence of identity theft highlighted in the text?", "options": [{"text": "Immediate arrest of the perpetrator.", "isCorrect": false, "rationale": "The arrest of a perpetrator is not a direct or guaranteed consequence for the victim, nor does it represent a long-term impact *on* the victim."}, {"text": "Inability to use online banking services temporarily.", "isCorrect": false, "rationale": "While accounts might be frozen temporarily, the text emphasizes much longer-lasting consequences beyond temporary service interruption."}, {"text": "Severe damage to one's credit score, affecting housing, loans, and employment.", "isCorrect": true, "rationale": "The text states: 'Damaged credit: Fraudulent accounts and missed payments can devastate your credit score, making it hard to rent an apartment, get a car loan, or sometimes even get a job.' This is a significant and long-term consequence."}, {"text": "A requirement to change all personal identification documents, like passports.", "isCorrect": false, "rationale": "The text does not list changing all personal identification documents as a primary or common consequence of identity theft."}], "id": "q06"}, {"question": "A young adult applies for their first credit card and is shocked to find several old, unpaid debts and collection notices associated with their Social Security number, dating back to when they were a minor. What type of identity theft likely occurred?", "options": [{"text": "Criminal identity theft", "isCorrect": false, "rationale": "Criminal identity theft involves law enforcement records or warrants, not financial accounts opened during childhood."}, {"text": "Tax identity theft", "isCorrect": false, "rationale": "Tax identity theft involves fraudulent tax returns, not opening accounts with a child's SSN."}, {"text": "Child identity theft", "isCorrect": true, "rationale": "The text describes child identity theft as 'Using a child's Social Security number to open accounts. This often goes undiscovered until the child applies for credit as a young adult,' which perfectly matches the scenario."}, {"text": "Financial identity theft", "isCorrect": false, "rationale": "While it involves financial accounts, 'Child identity theft' is the more specific and accurate type when the victim is a minor and the theft is discovered later in adulthood, as described in the text."}], "id": "q07"}, {"question": "The 'realworld' example of Maria highlights that even with bank reimbursement, resolving identity theft is challenging. What is the primary reason for this difficulty?", "options": [{"text": "Banks are often unwilling to reimburse victims for fraudulent charges.", "isCorrect": false, "rationale": "The text explicitly states that Maria's bank ultimately reimburses her, so this is an incorrect reason for difficulty."}, {"text": "The legal process for prosecuting identity thieves is too slow and complex.", "isCorrect": false, "rationale": "While legal processes can be slow, the 'realworld' example focuses on Maria's personal effort to resolve the fraud on her account, not the prosecution of the thief."}, {"text": "Victims must spend a significant amount of their own time and effort disputing, correcting, and monitoring accounts.", "isCorrect": true, "rationale": "The example details Maria's 15 hours of time spent calling the bank, requesting a new card, updating accounts, monitoring credit, and filing reports, concluding it was 'frustrating and time-consuming.'"}, {"text": "New fraudulent charges continuously appear after the initial theft.", "isCorrect": false, "rationale": "While possible, the primary difficulty highlighted in Maria's case was the process of resolving the initial fraudulent activity, not a continuous stream of new charges."}], "id": "q08"}, {"question": "Based on the 'Did You Know' section, what is a key characteristic of personal information exposure through data breaches?", "options": [{"text": "Individuals always receive immediate notification from the affected company.", "isCorrect": false, "rationale": "The text states: 'In many cases, you may not even know your information was exposed until you discover fraudulent activity on your account,' contradicting this option."}, {"text": "It primarily affects financial account details, not names or addresses.", "isCorrect": false, "rationale": "The text lists 'names, Social Security numbers, addresses, and financial account details' as information exposed, indicating it's not limited to financial details."}, {"text": "Victims often remain unaware of the exposure until fraudulent activity is detected.", "isCorrect": true, "rationale": "The 'Did You Know' section explicitly states: 'In many cases, you may not even know your information was exposed until you discover fraudulent activity on your account.'"}, {"text": "It can only happen to individuals who have not secured their personal devices.", "isCorrect": false, "rationale": "The text notes: 'You may have no control over this—the company was breached, not your personal device,' indicating individual device security doesn't prevent company breaches."}], "id": "q09"}, {"question": "What is the main 'moral' conveyed by the 'realworld' example of Maria's stolen card number?", "options": [{"text": "Banks should implement stricter security measures to prevent breaches.", "isCorrect": false, "rationale": "While true, the moral directly stated in the text focuses on individual action, not solely on bank responsibilities."}, {"text": "It is essential to monitor credit reports daily for any suspicious activity.", "isCorrect": false, "rationale": "Monitoring is a good practice, but the specific moral provided by the text is broader and emphasizes prevention over post-theft actions."}, {"text": "Recovering stolen funds is nearly impossible for victims.", "isCorrect": false, "rationale": "Maria's bank ultimately reimburses her, so this statement is incorrect based on the example."}, {"text": "Proactive protection of personal information is far easier and more effective than cleaning up after a theft.", "isCorrect": true, "rationale": "The text explicitly concludes the 'realworld' example with: 'The moral: protecting your information before a theft is far easier than cleaning up afterward.'"}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
