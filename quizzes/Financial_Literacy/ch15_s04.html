<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 15, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the provided text, what does the \"true cost\" of a loan primarily encompass?", "options": [{"text": "Only the principal amount borrowed.", "isCorrect": false, "rationale": "The principal is only the initial amount, not the true cost, which includes interest."}, {"text": "The monthly payment multiplied by the number of payments.", "isCorrect": false, "rationale": "This formula calculates 'Total Paid', which is part of the true cost, but the definition of 'true cost' as stated includes 'every dollar of interest' explicitly."}, {"text": "The total amount paid from start to finish, including every dollar of interest.", "isCorrect": true, "rationale": "The text explicitly states: 'The true cost of a loan is the total amount you pay from start to finish—including every dollar of interest.'"}, {"text": "The initial interest payment made at the time of signing.", "isCorrect": false, "rationale": "The true cost covers all interest over the entire life of the loan, not just an initial payment."}], "id": "q01"}, {"question": "A borrower takes out a loan with a monthly payment (M) of $350 for 48 months (n). What is the \"Total Paid\" according to the provided formula?", "options": [{"text": "$350", "isCorrect": false, "rationale": "This is just the monthly payment, not the total paid over the life of the loan."}, {"text": "$48", "isCorrect": false, "rationale": "This is the number of payments, not the total amount paid."}, {"text": "$16,800", "isCorrect": true, "rationale": "Using the formula Total Paid = M * n, we calculate $350 * 48 = $16,800."}, {"text": "$16,450", "isCorrect": false, "rationale": "This calculation is incorrect. $350 * 48 = $16,800."}], "id": "q02"}, {"question": "Based on the comparison of a 6% vs. 9% APR loan for $20,000 over 5 years, what is the most significant consequence of choosing the higher interest rate?", "options": [{"text": "A slightly lower monthly payment.", "isCorrect": false, "rationale": "A higher interest rate always results in a higher monthly payment, not a lower one. The 9% loan had a higher monthly payment of $415.17 compared to $386.66 for the 6% loan."}, {"text": "A substantial increase in the total interest paid over the life of the loan.", "isCorrect": true, "rationale": "The text shows that a 3-percentage-point difference in interest rate (9% vs 6%) cost an additional $1,710.60 in total interest over the life of the loan, highlighting a substantial increase."}, {"text": "A shorter loan term due to faster principal repayment.", "isCorrect": false, "rationale": "The loan term remained the same (5 years) in this comparison; a higher interest rate doesn't shorten the term but rather increases the cost."}, {"text": "A decrease in the principal amount borrowed.", "isCorrect": false, "rationale": "The principal amount borrowed ($20,000) was the same in both scenarios; the interest rate affects the cost of borrowing that principal, not the principal itself."}], "id": "q03"}, {"question": "When comparing a 5-year term to a 3-year term for the same $20,000 loan at 6%, what is the primary trade-off a borrower faces by choosing the shorter 3-year term?", "options": [{"text": "Lower monthly payments but higher total interest.", "isCorrect": false, "rationale": "A shorter term leads to higher monthly payments and lower total interest, not the other way around."}, {"text": "Higher monthly payments but less total interest.", "isCorrect": true, "rationale": "The text states: 'A shorter term means higher monthly payments but significantly less total interest.' The 3-year term had monthly payments of $608.44 but saved $1,295.76 in total interest compared to the 5-year term."}, {"text": "The principal amount increases, but the interest rate decreases.", "isCorrect": false, "rationale": "The principal and interest rate were held constant in this comparison ($20,000 at 6%); only the term changed."}, {"text": "No significant change in total interest, only in payment schedule.", "isCorrect": false, "rationale": "The text explicitly states a significant saving of $1,295.76 in total interest by choosing the shorter term, so there is a significant change in total interest."}], "id": "q04"}, {"question": "The \"moneytip\" advises against focusing solely on the monthly payment. Why is this advice crucial for borrowers?", "options": [{"text": "A low monthly payment always indicates a good loan deal.", "isCorrect": false, "rationale": "The tip warns against this exact misconception, as a low monthly payment can mask a very high total cost."}, {"text": "Salespeople often miscalculate monthly payments.", "isCorrect": false, "rationale": "The concern isn't about miscalculation, but about salespeople strategically highlighting the monthly payment to obscure the total cost."}, {"text": "A low monthly payment can hide a high total cost due to long terms and high interest.", "isCorrect": true, "rationale": "The 'moneytip' states that a low payment on a long-term loan at a high rate 'could mean paying $5,000+ in interest,' emphasizing that it hides the true, higher total cost."}, {"text": "Focusing on monthly payments distracts from the car's depreciation.", "isCorrect": false, "rationale": "While depreciation is a factor in car ownership, the 'moneytip' specifically focuses on the loan's cost, not the asset's value change, as the primary reason to look beyond monthly payments."}], "id": "q05"}, {"question": "According to the \"takeaway\" from the \"The Cost of Borrowing\" summary, what two actions should a borrower prioritize to minimize the true cost of a loan?", "options": [{"text": "Borrow the maximum amount possible and extend the loan term.", "isCorrect": false, "rationale": "These actions would typically increase the total cost of a loan, directly contradicting the takeaway."}, {"text": "Secure the lowest possible interest rate and pay off the loan as quickly as budget allows.", "isCorrect": true, "rationale": "The text explicitly states: 'The takeaway: borrow at the lowest rate you can get, and pay it off as quickly as your budget allows.'"}, {"text": "Negotiate a higher principal amount and make minimum monthly payments.", "isCorrect": false, "rationale": "A higher principal increases the cost, and minimum payments on long terms often lead to more interest, contrary to minimizing cost."}, {"text": "Focus only on the monthly payment and ignore the interest rate.", "isCorrect": false, "rationale": "The text, especially the 'moneytip,' strongly advises against focusing solely on the monthly payment and emphasizes the importance of the interest rate."}], "id": "q06"}, {"question": "A loan for $15,000 has total payments summing up to $18,500. Using the formula provided, what is the \"Total Interest\" paid on this loan?", "options": [{"text": "$15,000", "isCorrect": false, "rationale": "This is the principal amount, not the total interest."}, {"text": "$18,500", "isCorrect": false, "rationale": "This is the total amount paid, not the total interest."}, {"text": "$3,500", "isCorrect": true, "rationale": "Using the formula Total Interest = Total Paid - P, we calculate $18,500 (Total Paid) - $15,000 (Principal) = $3,500."}, {"text": "$33,500", "isCorrect": false, "rationale": "This would be the sum of Total Paid and Principal, which is not what the Total Interest formula calculates."}], "id": "q07"}, {"question": "Based on the examples provided in the text (comparing 6% vs 9% and 5 years vs 3 years on a $20,000 loan), which factor generally results in a *larger* monetary impact on the *total interest paid* for the specific changes illustrated?", "options": [{"text": "The interest rate (a 3 percentage point change from 6% to 9%).", "isCorrect": true, "rationale": "The change from 6% to 9% APR resulted in an additional $1,710.60 in total interest. The change from a 5-year to a 3-year term resulted in a saving of $1,295.76. Comparing the magnitude, the interest rate change had a larger effect on total interest ($1,710.60 > $1,295.76)."}, {"text": "The loan term (a 2-year reduction from 5 years to 3 years).", "isCorrect": false, "rationale": "While the loan term dramatically affects total interest, in the provided examples, the 2-year reduction in term resulted in $1,295.76 saved, which is a smaller monetary impact than the $1,710.60 increase from the 3 percentage point rate change."}, {"text": "The principal amount borrowed.", "isCorrect": false, "rationale": "The principal amount ($20,000) remained constant in both comparisons, so it was not a factor causing the difference in these specific examples."}, {"text": "The monthly payment.", "isCorrect": false, "rationale": "The monthly payment is a *result* of changes in interest rate and loan term, not a primary factor that independently impacts total interest paid in this context."}], "id": "q08"}, {"question": "A borrower needs a $20,000 loan and is considering two options listed in the \"Cost of Borrowing\" summary table:\n\n*   Option A: 6% APR for 7 years (Total Paid = $24,532.20)\n*   Option B: 9% APR for 5 years (Total Paid = $24,910.20)\n\nIf the borrower's primary goal is to minimize the \"Total Paid\" (the true cost), which option should they choose?", "options": [{"text": "Option A, because it has a lower APR.", "isCorrect": false, "rationale": "While Option A has a lower APR, the primary goal is minimizing 'Total Paid'. The lower APR combined with a longer term (7 years) might not result in the lowest total paid."}, {"text": "Option B, because it has a shorter loan term.", "isCorrect": false, "rationale": "While Option B has a shorter term, its higher APR means the 'Total Paid' is actually higher than Option A. The goal is to minimize total paid, not just have a shorter term for its own sake."}, {"text": "Option A, because its Total Paid is lower ($24,532.20).", "isCorrect": true, "rationale": "The 'Total Paid' for Option A is $24,532.20, which is less than Option B's $24,910.20. To minimize the true cost (Total Paid), Option A is the better choice despite its longer term, due to the significantly lower interest rate offsetting the term length."}, {"text": "Option B, because its monthly payment is higher, suggesting faster repayment.", "isCorrect": false, "rationale": "A higher monthly payment does not automatically mean a lower total cost, especially when comparing different interest rates and terms. The 'Total Paid' is the direct measure for true cost."}], "id": "q09"}, {"question": "In the formula for \"Total Interest = Total Paid - P\", what does the variable 'P' represent?", "options": [{"text": "The monthly payment.", "isCorrect": false, "rationale": "The monthly payment is represented by 'M', not 'P'."}, {"text": "The total amount of interest.", "isCorrect": false, "rationale": "'Total Interest' is what the formula calculates, not what 'P' represents."}, {"text": "The principal amount borrowed.", "isCorrect": true, "rationale": "The text defines 'P' as the principal in the formula box: 'where M = monthly payment, n = number of payments, P = principal.'"}, {"text": "The number of payments.", "isCorrect": false, "rationale": "The number of payments is represented by 'n', not 'P'."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
