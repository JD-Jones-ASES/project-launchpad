    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 16, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A student is considering various loan options for college. Based on the provided text, which type of loan should they explore first, and why?", "options": [{"text": "Private student loans, because they offer more flexibility in terms of repayment schedules tailored to individual needs.", "isCorrect": false, "rationale": "Private student loans are explicitly stated as a 'last resort' and offer 'fewer protections' and 'fixed terms,' making this option incorrect."}, {"text": "PLUS loans, because they are available to a broad range of students and generally have the lowest interest rates.", "isCorrect": false, "rationale": "PLUS loans are federal but are specifically for graduate students or parents, and they 'carry a higher interest rate' than subsidized or unsubsidized loans, making this incorrect."}, {"text": "Federal student loans, due to their legal protections, flexible repayment options, and potential forgiveness programs.", "isCorrect": true, "rationale": "The text states, 'Federal loans are the first option you should consider' because 'They come with legal protections, flexible repayment options, and in some cases, forgiveness programs.'"}, {"text": "Unsubsidized federal loans, as they are available to all eligible students regardless of financial need, making them easier to obtain.", "isCorrect": false, "rationale": "While unsubsidized loans are available regardless of need, the broader category of federal student loans is the primary recommendation, and unsubsidized loans have specific drawbacks (interest accrues immediately) compared to subsidized options that should be considered first if eligible."}]}, {"question": "What is the primary difference between a Subsidized Loan and an Unsubsidized Loan, regarding interest during the academic period?", "options": [{"text": "Subsidized loans have a higher interest rate, while unsubsidized loans have a lower rate.", "isCorrect": false, "rationale": "The text does not state that subsidized loans have higher interest rates than unsubsidized loans. PLUS loans are noted to have higher rates."}, {"text": "For subsidized loans, the government pays the interest while the student is in school; for unsubsidized loans, interest accrues immediately and is the student's responsibility.", "isCorrect": true, "rationale": "The definition of a Subsidized Loan states the government 'pays the interest that accrues while you are enrolled in school,' while for an Unsubsidized Loan, 'Interest begins accruing the moment the loan is disbursed—including while you are in school.'"}, {"text": "Unsubsidized loans require a credit check, whereas subsidized loans do not.", "isCorrect": false, "rationale": "PLUS loans require a credit check, not specifically unsubsidized loans. Neither subsidized nor unsubsidized federal loans generally require a credit check for the student."}, {"text": "Subsidized loans are available to all students, while unsubsidized loans are need-based.", "isCorrect": false, "rationale": "This statement is the opposite of what the text indicates: 'A subsidized loan is a need-based federal student loan,' and 'An unsubsidized loan is a federal student loan available to all eligible students regardless of financial need.'"}]}, {"question": "A student borrows $15,000 in an unsubsidized federal loan at 6% APR for a 4-year degree. If they make no interest payments during school, approximately how much interest will be capitalized to their principal balance at graduation?", "options": [{"text": "$900", "isCorrect": false, "rationale": "This amount ($15,000 * 0.06) represents one year's simple interest, not four years'."}, {"text": "$2,700", "isCorrect": false, "rationale": "This amount ($15,000 * 0.06 * 3) represents three years' simple interest, not four years'."}, {"text": "$3,600", "isCorrect": true, "rationale": "Using the simple interest formula provided in the example (I = P * r * t), the accrued interest would be $15,000 * 0.06 * 4 = $3,600. This amount would then be capitalized."}, {"text": "$18,600", "isCorrect": false, "rationale": "This amount represents the total balance at graduation ($15,000 principal + $3,600 interest), not just the capitalized interest."}]}, {"question": "The text describes 'The Hidden Cost of Unsubsidized Loans.' What is the main implication of this hidden cost for a borrower who doesn't pay interest during school?", "options": [{"text": "The total amount borrowed becomes significantly less than the initial principal due to government subsidies.", "isCorrect": false, "rationale": "Unsubsidized loans do not receive government subsidies for interest during school; instead, interest accrues and increases the balance."}, {"text": "The borrower's credit score is negatively impacted even before repayment begins.", "isCorrect": false, "rationale": "While poor financial management can eventually affect credit, the text does not directly state that interest capitalization itself negatively impacts a credit score before repayment formally begins."}, {"text": "The loan balance at graduation is higher than the original amount borrowed, leading to paying interest on a larger sum from the start of repayment.", "isCorrect": true, "rationale": "The text explains that interest capitalization means 'the accrued interest is added to the principal, and then future interest is calculated on the new, larger balance,' meaning 'You are paying interest on interest from day one of repayment.'"}, {"text": "The interest rate on the loan automatically increases after graduation, making payments more expensive.", "isCorrect": false, "rationale": "Federal student loan interest rates are 'fixed for the life of each loan you take out,' as stated in the 'Did You Know' section."}]}, {"question": "Which statement accurately describes a PLUS loan according to the text?", "options": [{"text": "It is a need-based federal loan where the government pays interest while the student is in school.", "isCorrect": false, "rationale": "This describes a Subsidized Loan, not a PLUS loan."}, {"text": "It is a federal loan available to all eligible students regardless of financial need, with interest accruing immediately.", "isCorrect": false, "rationale": "This describes an Unsubsidized Loan, not a PLUS loan."}, {"text": "It is a federal loan primarily for graduate students or parents of dependent undergraduates, carrying a higher interest rate and requiring a credit check.", "isCorrect": true, "rationale": "The definition of a PLUS Loan states it 'is a federal loan available to graduate students or to parents of dependent undergraduate students. PLUS loans carry a higher interest rate than subsidized or unsubsidized loans and require a credit check.'"}, {"text": "It is a private loan issued by banks, offering flexible repayment options and potential forgiveness programs.", "isCorrect": false, "rationale": "PLUS loans are federal, not private. Private loans typically offer fewer protections and no forgiveness options."}]}, {"question": "A prospective student is planning to pursue a degree that typically leads to a starting salary of $35,000 per year. Based on the 'Do not overborrow' warning, what is the maximum recommended total student loan amount for this student?", "options": [{"text": "$10,000", "isCorrect": false, "rationale": "This amount is significantly less than the recommended maximum based on the rule of thumb."}, {"text": "$35,000", "isCorrect": true, "rationale": "The 'Do not overborrow' warning states, 'never borrow more in total student loans than you expect to earn in your first year of work after graduation.'"}, {"text": "$70,000", "isCorrect": false, "rationale": "This amount is double the recommended maximum based on the rule of thumb, which advises against borrowing more than the first year's salary."}, {"text": "$140,000", "isCorrect": false, "rationale": "This amount far exceeds the recommended maximum and would make repayment 'very difficult' according to the warning."}]}, {"question": "Why does the 'Money Tip' section recommend making small monthly interest payments on unsubsidized loans while in school?", "options": [{"text": "To qualify for a lower interest rate upon graduation.", "isCorrect": false, "rationale": "Federal loan interest rates are fixed for the life of the loan and are not reduced by in-school interest payments."}, {"text": "To prevent interest capitalization, thereby keeping the principal balance from growing and saving money on total interest paid over time.", "isCorrect": true, "rationale": "The 'Money Tip' explicitly states, 'Even small monthly interest payments prevent capitalization. If you can afford even $30–$50 per month toward the interest on an unsubsidized loan, you will save hundreds or thousands of dollars by keeping your balance from growing while you study.'"}, {"text": "To ensure eligibility for federal loan forgiveness programs.", "isCorrect": false, "rationale": "Making interest payments during school is not a requirement or direct factor for federal loan forgiveness program eligibility, which usually depends on employment type or income."}, {"text": "To meet the repayment obligations for federal student loans earlier.", "isCorrect": false, "rationale": "Formal repayment obligations typically begin after a grace period post-graduation, not while in school, and these are interest-only payments, not principal payments accelerating loan payoff."}]}, {"question": "What is the fundamental difference in the legal governance of federal student loans versus private student loans?", "options": [{"text": "Federal loans are governed by state laws, while private loans are governed by federal regulations.", "isCorrect": false, "rationale": "This statement incorrectly reverses the legal governance and misidentifies the basis for private loans. Federal loans are governed by federal law, and private loans by contract law."}, {"text": "Federal loans are governed by federal law and Department of Education rules, whereas private loans are governed by contract law.", "isCorrect": true, "rationale": "The text clearly states, 'Federal student loans are issued by the U.S. Department of Education,' and 'Private student loans...are governed by contract law, not federal law.'"}, {"text": "Federal loans are subject to credit checks, while private loans are not.", "isCorrect": false, "rationale": "While PLUS loans require a credit check, standard federal subsidized/unsubsidized loans do not. Private loans, by contrast, almost always rely on creditworthiness."}, {"text": "Federal loans require collateral, while private loans do not.", "isCorrect": false, "rationale": "Student loans, both federal and private, are generally unsecured loans and do not require collateral."}]}, {"question": "A student is evaluating two loan offers: one federal and one private. The text suggests that federal loans are preferable due to their 'legal protections.' Which of the following best exemplifies such a protection that might not be available with a private loan?", "options": [{"text": "Guaranteed lower interest rates compared to any private loan.", "isCorrect": false, "rationale": "While federal rates are often lower and fixed, there isn't a 'guarantee' that they will always be lower than *any* private loan, especially given the variability of private rates based on credit score. The key is 'protections' not just rates."}, {"text": "The ability to consolidate all existing student loan debt into a single, lower-rate loan at any time.", "isCorrect": false, "rationale": "Loan consolidation is a feature, but it's not the primary 'legal protection' highlighted in the text's description of federal loan benefits. Moreover, private loan consolidation options exist, though they differ."}, {"text": "Flexible repayment options, such as income-driven plans, and potential access to loan forgiveness programs.", "isCorrect": true, "rationale": "The text states federal loans 'come with legal protections, flexible repayment options, and in some cases, forgiveness programs.' These options are generally not offered by private lenders."}, {"text": "The requirement for the lender to obtain a co-signer if the student has no credit history.", "isCorrect": false, "rationale": "Requiring a co-signer is typically a feature of private loans when a student lacks sufficient credit, serving the lender's interest, not a 'protection' for the borrower. Federal loans often don't require co-signers."}]}, {"question": "According to the 'Did You Know' section, how are federal student loan interest rates primarily determined and characterized?", "options": [{"text": "They are variable rates that change monthly based on market conditions, similar to credit card interest.", "isCorrect": false, "rationale": "The text states federal rates 'are fixed for the life of each loan you take out,' contradicting the idea of variable rates."}, {"text": "They are set by Congress each year, tied to 10-year Treasury notes, and are fixed for the life of the loan.", "isCorrect": true, "rationale": "The 'Did You Know' section explicitly states, 'Federal student loan interest rates are set by Congress each year, tied to the yield on 10-year Treasury notes. They are fixed for the life of each loan you take out.'"}, {"text": "They are determined by the student's credit score and vary significantly between different federal lenders.", "isCorrect": false, "rationale": "Federal rates are universal for specific loan types for a given year and are not determined by an individual student's credit score (except for PLUS loans, which require a credit check but still have a fixed rate set by Congress). There aren't different 'federal lenders' with varying rates."}, {"text": "They are negotiated individually between the student and the Department of Education, depending on the chosen repayment plan.", "isCorrect": false, "rationale": "Federal loan interest rates are set by Congress and are not individually negotiated."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
