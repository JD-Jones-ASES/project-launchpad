<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 18, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "When a company needs money to grow, such as to build a new factory or launch a new product, what is one of its two main options for raising capital as described in the text?", "options": [{"text": "Obtain grants from government agencies.", "isCorrect": false, "rationale": "The text states the two main options are to 'borrow the money (which creates debt) or sell ownership stakes to the public.' Government grants are not mentioned as a primary method for raising capital in this context."}, {"text": "Issue bonds to incur long-term debt.", "isCorrect": false, "rationale": "While borrowing money (which creates debt) is one option, issuing bonds specifically is not detailed as the only way to borrow in this section, and the question asks for 'one of its two main options,' implying an alternative to debt. The text simply says 'borrow the money' as one option, and 'sell ownership stakes' as the other."}, {"text": "Sell ownership stakes to the public by issuing stock.", "isCorrect": true, "rationale": "The text explicitly states: 'When a company needs money to grow... it has two main options: borrow the money (which creates debt) or sell ownership stakes to the public. Selling ownership stakes is called issuing stock.'"}, {"text": "Request donations from private investors.", "isCorrect": false, "rationale": "Raising capital through donations is not mentioned as a primary method for company growth in the text."}], "id": "q01"}, {"question": "Maria owns 500 shares of Company A, which has 5,000,000 shares outstanding. Which of the following is NOT an entitlement Maria has as a shareholder, according to the text?", "options": [{"text": "A proportional share of any dividends paid by Company A.", "isCorrect": false, "rationale": "The text states shareholders are entitled to 'Your proportional share of any dividends paid to shareholders.'"}, {"text": "A vote on major Company A decisions, proportional to her shares owned.", "isCorrect": false, "rationale": "The text states shareholders are entitled to 'A vote on major company decisions (proportional to shares owned).'"}, {"text": "A guaranteed return on her investment regardless of Company A's performance.", "isCorrect": true, "rationale": "Shareholders are partial owners and share in profits and losses, but there is no guarantee of a return on investment; stock prices can fall, and dividends are not mandatory."}, {"text": "A proportional share of Company A's assets if it is ever liquidated.", "isCorrect": false, "rationale": "The text states shareholders are entitled to 'A proportional share of the company's assets if it is ever sold or liquidated.'"}], "id": "q02"}, {"question": "Which statement accurately describes a dividend based on the provided definition?", "options": [{"text": "It is a mandatory payment made by all companies annually.", "isCorrect": false, "rationale": "The text states 'Not all companies pay dividends; many reinvest profits back into growing the business instead,' making it not mandatory for all companies."}, {"text": "It is the profit an investor earns when selling a stock for more than they paid for it.", "isCorrect": false, "rationale": "This describes a capital gain, not a dividend."}, {"text": "It is a cash payment distributed to shareholders, usually quarterly, as a share of the company's profits.", "isCorrect": true, "rationale": "The definition explicitly states: 'A dividend is a cash payment that some companies distribute to shareholders, usually quarterly, as a share of the company's profits.'"}, {"text": "It represents the total market value of all a company's outstanding shares.", "isCorrect": false, "rationale": "This describes market capitalization, not a dividend."}], "id": "q03"}, {"question": "An investor bought 100 shares of a company for $75 per share. After holding the shares for a year, they sold them for $90 per share. During that year, the company paid total dividends of $2.50 per share. What was the investor's total capital gain from this investment?", "options": [{"text": "$150", "isCorrect": false, "rationale": "This would be the capital gain if only one share was bought ($90 - $75 = $15)."}, {"text": "$1,500", "isCorrect": true, "rationale": "Capital gain is the profit from selling for more than paid. For one share: $90 - $75 = $15. For 100 shares: $15 * 100 = $1,500. Dividends are a separate form of income and not included in the 'capital gain' calculation."}, {"text": "$1,750", "isCorrect": false, "rationale": "This amount includes the dividends ($1,500 capital gain + $250 dividends), but the question specifically asks for the 'capital gain,' not the total return."}, {"text": "$9,000", "isCorrect": false, "rationale": "This is the total revenue from selling the shares ($90 * 100), not the capital gain."}], "id": "q04"}, {"question": "How do stock exchanges contribute to the process of buying and selling stocks?", "options": [{"text": "They directly purchase stocks from companies and resell them to individual investors.", "isCorrect": false, "rationale": "The text states 'You cannot simply walk up to a company and buy shares directly; trades happen through these exchanges.' Exchanges facilitate trades between buyers and sellers, they don't act as an intermediary buyer/reseller for the primary market."}, {"text": "They act as lenders, providing capital to companies in exchange for shares.", "isCorrect": false, "rationale": "Stock exchanges are marketplaces; they do not directly provide capital to companies in this manner."}, {"text": "They guarantee a profit for every stock trade executed on their platform.", "isCorrect": false, "rationale": "Stock exchanges provide transparency, regulation, and liquidity, but they do not guarantee profits for investors."}, {"text": "They provide organized marketplaces with transparency, regulation, and liquidity for buyers and sellers.", "isCorrect": true, "rationale": "The definition states a 'stock exchange is an organized marketplace where stocks are bought and sold. Exchanges provide transparency, regulation, and liquidity—making it easy to buy or sell shares at any moment during trading hours.'"}], "id": "q05"}, {"question": "Company B has 40 million shares outstanding, and its stock is currently trading at $25 per share. What is Company B's market capitalization?", "options": [{"text": "$1,000,000", "isCorrect": false, "rationale": "This calculation is incorrect. Market Cap = Stock Price * Number of Shares Outstanding."}, {"text": "$100,000,000", "isCorrect": false, "rationale": "This calculation is incorrect. Market Cap = $25 * 40,000,000."}, {"text": "$1,000,000,000", "isCorrect": true, "rationale": "Market capitalization is calculated as Stock Price × Number of Shares Outstanding. So, $25 × 40,000,000 = $1,000,000,000."}, {"text": "$10,000,000,000", "isCorrect": false, "rationale": "This calculation is incorrect. Market Cap = Stock Price * Number of Shares Outstanding."}], "id": "q06"}, {"question": "According to the 'Two Ways to Make Money from Stocks' section, what are the two distinct ways an investor can generate income from a stock investment?", "options": [{"text": "Receiving interest payments and through capital protection.", "isCorrect": false, "rationale": "Interest payments are associated with debt instruments like bonds, not stocks. Capital protection is not a direct income source from stocks."}, {"text": "Earning capital gains and receiving dividends.", "isCorrect": true, "rationale": "The text explicitly states: 'There are exactly two ways a stock investment can produce income: Price appreciation (capital gain)... [and] Dividends.'"}, {"text": "Through tax deductions and asset depreciation.", "isCorrect": false, "rationale": "Tax deductions and asset depreciation are not direct income sources from stock investments."}, {"text": "By lending shares to other investors and benefiting from stock splits.", "isCorrect": false, "rationale": "While possible, these are not the two main ways listed in the text. Stock splits change the number of shares, but not the total value of the investment at the time of the split, and do not directly generate income."}], "id": "q07"}, {"question": "Why does the text advise that 'picking individual stocks is risky' for most people?", "options": [{"text": "Because individual stocks rarely pay dividends, limiting income potential.", "isCorrect": false, "rationale": "While some companies don't pay dividends, this is not the primary reason for the 'risky' warning. The warning focuses on the difficulty of outperforming the market and concentrated risk."}, {"text": "It concentrates risk enormously, and even professionals struggle to outperform market averages consistently.", "isCorrect": true, "rationale": "The warning states: 'Putting a large portion of your savings into a small number of individual stocks concentrates your risk enormously. Even trained professionals... consistently fail to outperform the market average over long periods.'"}, {"text": "Individual stocks are only traded on less regulated, smaller exchanges.", "isCorrect": false, "rationale": "The text mentions stock exchanges provide regulation. The risk isn't about regulation, but about the inherent volatility and unpredictability of individual stock performance."}, {"text": "They have lower market capitalization, making them less stable.", "isCorrect": false, "rationale": "Market capitalization size doesn't inherently make a stock more or less 'risky' in the context of the warning, which focuses on diversification and difficulty of selection."}], "id": "q08"}, {"question": "An investor purchases a stock for $80 per share. Over the next six months, they receive $2.00 in dividends per share. They then sell the stock for $85 per share. What is their total return percentage on this investment?", "options": [{"text": "8.125%", "isCorrect": false, "rationale": "The calculation (85 - 80 + 2) / 80 * 100% = (7 / 80) * 100% = 8.75%. This option is close but incorrect."}, {"text": "6.25%", "isCorrect": false, "rationale": "This would be the return if only the capital gain was considered (5/80 * 100%), excluding dividends."}, {"text": "8.75%", "isCorrect": true, "rationale": "Using the formula: Return = (Sell Price - Buy Price + Dividends per Share) / Buy Price * 100%. So, (85 - 80 + 2) / 80 * 100% = (5 + 2) / 80 * 100% = 7 / 80 * 100% = 0.0875 * 100% = 8.75%."}, {"text": "10.0%", "isCorrect": false, "rationale": "This calculation is incorrect based on the provided formula and values."}], "id": "q09"}, {"question": "The Amsterdam Stock Exchange, founded in 1602, was created primarily to facilitate the trading of shares for which type of entity?", "options": [{"text": "Local artisan guilds and craft cooperatives.", "isCorrect": false, "rationale": "The 'Did You Know' section specifies a large shipping company."}, {"text": "Government bonds issued to fund infrastructure projects.", "isCorrect": false, "rationale": "The focus was on company shares, not government bonds."}, {"text": "The Dutch East India Company, a large shipping company.", "isCorrect": true, "rationale": "The 'Did You Know' section states: 'The Amsterdam Stock Exchange, founded in 1602... was created specifically to trade shares of the Dutch East India Company—a shipping company so large that it needed to spread its risk among thousands of investors.'"}, {"text": "Small individual businesses to attract local investors.", "isCorrect": false, "rationale": "It was for a 'large' company to 'spread its risk among thousands of investors,' not small individual businesses."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
