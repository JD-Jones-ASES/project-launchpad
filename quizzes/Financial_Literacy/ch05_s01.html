<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 5, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the fundamental difference between gross pay and net pay?", "options": [{"text": "Gross pay is the amount received after all deductions, while net pay is the total amount earned before deductions.", "isCorrect": false, "rationale": "This statement reverses the definitions. Gross pay is the total earned before deductions, and net pay is what remains after deductions."}, {"text": "Gross pay is the total amount earned before any deductions are taken out, while net pay is the amount remaining after all deductions have been subtracted.", "isCorrect": true, "rationale": "This accurately defines both terms as per the textbook. Gross pay is your 'headline' pay, and net pay is your 'take-home' pay."}, {"text": "Gross pay includes only hourly wages, while net pay includes salary and additional benefits.", "isCorrect": false, "rationale": "Gross pay refers to the total earnings (whether hourly or salary) before deductions, and net pay is what's left after all deductions, regardless of the income source type."}, {"text": "Net pay includes bonuses and overtime, while gross pay only includes base salary.", "isCorrect": false, "rationale": "Both gross and net pay calculations include all forms of earnings, such as bonuses and overtime, before or after deductions, respectively."}], "id": "q01"}, {"question": "Which of the following deductions is typically considered *voluntary* from an employee's paycheck?", "options": [{"text": "Federal income tax withholding.", "isCorrect": false, "rationale": "Federal income tax withholding is a required (mandatory) deduction by law."}, {"text": "Social Security tax.", "isCorrect": false, "rationale": "Social Security tax is part of FICA taxes, which are required (mandatory) deductions by law."}, {"text": "Health insurance premiums.", "isCorrect": true, "rationale": "Health insurance premiums are explicitly listed as a voluntary deduction that an employee chooses to participate in."}, {"text": "Medicare tax.", "isCorrect": false, "rationale": "Medicare tax is part of FICA taxes, which are required (mandatory) deductions by law."}], "id": "q02"}, {"question": "An employee earns a gross pay of $2,500 for a pay period. Their deductions include $250 for federal tax, $100 for state tax, $190 for FICA taxes, and $60 for retirement contributions. Using the net pay formula provided, what is this employee's net pay?", "options": [{"text": "$2,500", "isCorrect": false, "rationale": "This amount represents the gross pay before any deductions are applied."}, {"text": "$2,250", "isCorrect": false, "rationale": "This amount does not fully account for all listed deductions. $2500 - $250 = $2250, but other deductions remain."}, {"text": "$2,000", "isCorrect": false, "rationale": "This calculation is incorrect. The sum of deductions is $250 + $100 + $190 + $60 = $600. So, $2500 - $600 = $1900."}, {"text": "$1,900", "isCorrect": true, "rationale": "According to the Net Pay Formula, Net Pay = Gross Pay - Federal Tax - State Tax - FICA - Other Deductions. So, $2,500 - $250 - $100 - $190 - $60 = $1,900."}], "id": "q03"}, {"question": "The funds collected through Social Security tax are primarily designated to support which of the following?", "options": [{"text": "National defense and interstate highways.", "isCorrect": false, "rationale": "These are primarily funded by federal income tax."}, {"text": "Public schools and state roads.", "isCorrect": false, "rationale": "These are primarily funded by state income tax."}, {"text": "Monthly benefits for retired workers, people with disabilities, and surviving family members.", "isCorrect": true, "rationale": "The text explicitly states that Social Security tax funds 'monthly benefits for retired workers, people with disabilities, and surviving family members of deceased workers.'"}, {"text": "Health insurance coverage for Americans aged 65 and older.", "isCorrect": false, "rationale": "This is primarily funded by Medicare tax."}], "id": "q04"}, {"question": "Which statement accurately distinguishes between required (mandatory) and voluntary paycheck deductions?", "options": [{"text": "Required deductions are chosen by the employee, while voluntary deductions are mandated by law.", "isCorrect": false, "rationale": "This statement reverses the actual definitions. Voluntary deductions are chosen by the employee, while required deductions are mandated by law."}, {"text": "Required deductions are set percentages of gross pay, while voluntary deductions are always fixed dollar amounts.", "isCorrect": false, "rationale": "While some deductions might be percentages or fixed amounts, the core distinction is not their calculation method but whether they are legally mandated or employee-chosen."}, {"text": "Required deductions, such as FICA taxes, cannot be opted out of, whereas voluntary deductions, like health insurance, are chosen by the employee.", "isCorrect": true, "rationale": "This statement correctly identifies the key difference: employees cannot opt out of required deductions, but they choose voluntary ones."}, {"text": "Voluntary deductions reduce taxable income, while required deductions do not.", "isCorrect": false, "rationale": "Both types of deductions, such as 401(k) contributions (voluntary) and FICA taxes (required), can reduce taxable income."}], "id": "q05"}, {"question": "A new worker budgets for an apartment based on '30% of their income' using their *gross* annual salary of $48,000. Assuming typical deductions, what is the most significant financial risk they face?", "options": [{"text": "They will likely pay too much in state income tax due to their salary level.", "isCorrect": false, "rationale": "While tax rates are a factor, the primary risk described in the text is not about tax rates themselves, but about miscalculating disposable income."}, {"text": "They might overestimate their actual take-home pay, leading to an inability to afford the rent once deductions are applied.", "isCorrect": true, "rationale": "This is the 'Gross-Pay Budget Trap' explicitly warned against in the text. Budgeting with gross pay ignores deductions, leading to a shortfall in actual available funds."}, {"text": "Their employer may deduct more for health insurance than they initially expected.", "isCorrect": false, "rationale": "While unexpected deductions could be an issue, the core problem here is using gross pay instead of net pay for budgeting, which is a larger, more predictable discrepancy."}, {"text": "They will not be eligible for voluntary deductions like a 401(k) due to their salary.", "isCorrect": false, "rationale": "Eligibility for voluntary deductions is unrelated to the financial pitfall of budgeting based on gross pay."}], "id": "q06"}, {"question": "Why is net pay emphasized as the critical number to use when building a personal budget, rather than gross pay?", "options": [{"text": "Net pay includes all potential future earnings and bonuses, offering a more comprehensive financial outlook.", "isCorrect": false, "rationale": "Net pay represents current take-home earnings, not future or potential income."}, {"text": "Gross pay is a fluctuating number, making it unreliable for consistent budgeting.", "isCorrect": false, "rationale": "Gross pay (especially salary) is often stable. The issue is that it's not the amount an individual actually receives."}, {"text": "Net pay represents the actual amount of money an individual has available to spend and save after all mandatory and voluntary deductions.", "isCorrect": true, "rationale": "The text clearly states, 'Net pay is the actual dollar amount deposited into your bank account...This is the number you must use when building a budget,' because it reflects real disposable income."}, {"text": "Employers prefer employees to budget with net pay to ensure they can meet their tax obligations.", "isCorrect": false, "rationale": "While taxes are important, the reason for the individual to budget with net pay is for accurate personal financial management of their spendable income."}], "id": "q07"}, {"question": "If an employee decides to significantly increase their contributions to a 401(k) retirement plan, how will this decision most directly affect their upcoming paycheck?", "options": [{"text": "Their gross pay will decrease, but their net pay will remain unchanged.", "isCorrect": false, "rationale": "Gross pay is the total earned before deductions, so increasing a deduction does not change gross pay. Net pay will change."}, {"text": "Their net pay will increase because retirement contributions are typically pre-tax.", "isCorrect": false, "rationale": "While retirement contributions can reduce taxable income, they are still deductions, meaning less money taken home in the paycheck, thus decreasing net pay."}, {"text": "Their net pay will decrease, as retirement contributions are a voluntary deduction taken directly from gross pay.", "isCorrect": true, "rationale": "Increasing any deduction, including voluntary ones like 401(k) contributions, directly reduces the amount of money left after deductions, thus lowering net (take-home) pay."}, {"text": "Their federal income tax withholding will increase due to the higher contribution.", "isCorrect": false, "rationale": "Increasing pre-tax retirement contributions typically *reduces* taxable income, which would likely lead to a *decrease* in federal income tax withholding, not an increase."}], "id": "q08"}, {"question": "When a job offer states an 'annual salary of $55,000,' this figure typically refers to what?", "options": [{"text": "The total amount an employee will receive in their bank account over the year after all taxes and deductions.", "isCorrect": false, "rationale": "This would be the annual net pay, which is always less than the gross salary stated in a job offer."}, {"text": "The employee's estimated monthly take-home pay multiplied by twelve.", "isCorrect": false, "rationale": "Monthly take-home pay refers to net pay, not the initial salary figure."}, {"text": "The gross pay, which is the total earnings before any deductions are taken out.", "isCorrect": true, "rationale": "The text states, 'Salary negotiations happen in gross pay — that is the number your employer names.' This is the total earned before deductions."}, {"text": "The amount specifically allocated for health insurance and retirement benefits only.", "isCorrect": false, "rationale": "The salary figure represents total earnings, not just specific benefits."}], "id": "q09"}, {"question": "Marcus, in the 'Your First Real Paycheck' scenario, calculated a monthly *gross* pay of $2,424.80 but received a *net* pay of $1,885.40. He had budgeted to save $200 per month based on his gross pay. What is the most immediate and necessary adjustment Marcus must make to his budget given his actual net pay?", "options": [{"text": "He should immediately increase his hours or seek a raise to earn more gross pay.", "isCorrect": false, "rationale": "While increasing income is an option, it is not an immediate adjustment to his *current* budget based on his *actual* received funds. The problem is how he used the money he already has."}, {"text": "He must recalculate all his planned expenses based on his net pay and adjust his savings goal or other expenses downwards to fit within his actual take-home funds.", "isCorrect": true, "rationale": "Marcus's core mistake was budgeting with gross pay. The immediate solution is to align his budget with his actual net pay ($1,885.40) and make adjustments to his spending and savings plans accordingly, as he has less money than he initially assumed."}, {"text": "He needs to cancel his required deductions like FICA to free up more money for savings.", "isCorrect": false, "rationale": "Required deductions cannot be opted out of, as stated in the text. This is not a viable adjustment."}, {"text": "He should apply for a short-term loan to cover the difference between his budgeted savings and actual funds.", "isCorrect": false, "rationale": "Taking on debt to cover a budgeting error based on incorrect income figures is a poor financial strategy and exacerbates the problem rather than solving it."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
