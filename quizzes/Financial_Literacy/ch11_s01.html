<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 11, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the fundamental characteristic that defines simple interest?", "options": [{"text": "Interest is calculated on the principal plus any accumulated interest from previous periods.", "isCorrect": false, "rationale": "This describes compound interest, where interest earns interest. Simple interest is fundamentally different as it only calculates interest on the original principal."}, {"text": "Interest is only calculated on the original principal amount.", "isCorrect": true, "rationale": "The text explicitly states, 'Simple interest is interest calculated only on the principal' and 'No matter how many years pass, you only ever earn interest on the original amount you deposited—the interest does not earn interest on itself.'"}, {"text": "The interest rate decreases over time.", "isCorrect": false, "rationale": "The interest rate for simple interest is typically fixed for the duration of the loan or deposit, not decreasing over time."}, {"text": "The total balance decreases over time.", "isCorrect": false, "rationale": "With simple interest, the total balance (A) always increases or stays the same (if t=0), as interest is earned or charged over time, adding to the principal."}], "id": "q01"}, {"question": "In the context of simple interest, what does the term 'Principal ($P$)' represent?", "options": [{"text": "The total amount of interest earned over the loan period.", "isCorrect": false, "rationale": "This describes 'I' (interest earned), not the Principal ($P$). The principal is the starting amount."}, {"text": "The percentage rate at which interest is charged or earned.", "isCorrect": false, "rationale": "This describes 'r' (interest rate), not the Principal ($P$). The principal is the base amount."}, {"text": "The original amount of money deposited or borrowed.", "isCorrect": true, "rationale": "The key vocabulary defines Principal ($P$) as 'The original amount of money deposited or borrowed. It is the starting amount, before any interest is added.'"}, {"text": "The final balance after interest has been added.", "isCorrect": false, "rationale": "This describes 'A' (final amount), which is the principal plus the interest, not just the principal."}], "id": "q02"}, {"question": "If an annual interest rate is given as 7.2%, what value should be used for '$r$' in the simple interest formula?", "options": [{"text": "7.2", "isCorrect": false, "rationale": "The interest rate must be converted to a decimal before using it in the formula. Using 7.2 would lead to an incorrect calculation."}, {"text": "0.72", "isCorrect": false, "rationale": "This conversion is incorrect; it represents 72%, not 7.2%. To convert 7.2% to a decimal, divide by 100 or move the decimal two places to the left."}, {"text": "0.072", "isCorrect": true, "rationale": "To convert a percentage to a decimal, divide by 100. So, 7.2% / 100 = 0.072. This is the correct value for 'r' in the formula."}, {"text": "720", "isCorrect": false, "rationale": "This value is incorrect and would result from multiplying by 100, which is the opposite of the required conversion."}], "id": "q03"}, {"question": "A loan has a simple interest rate for a period of 18 months. What value should be used for '$t$' in the simple interest formula?", "options": [{"text": "18", "isCorrect": false, "rationale": "The time ($t$) in the simple interest formula must be measured in years. Using 18 (months) directly would lead to an incorrect calculation."}, {"text": "1.5", "isCorrect": true, "rationale": "The key vocabulary specifies that 'If a period is given in months, divide by 12 to convert to years.' Therefore, 18 months / 12 months/year = 1.5 years."}, {"text": "0.18", "isCorrect": false, "rationale": "This value is incorrect. It seems like a decimal misplacement for '18' or a misunderstanding of the conversion process."}, {"text": "3", "isCorrect": false, "rationale": "This value is incorrect. Dividing by 6, not 12, would yield 3, but time must be converted to years by dividing by 12."}], "id": "q04"}, {"question": "You deposit $2,500 into an account that pays 4% simple interest per year. How much interest will you earn after 3 years?", "options": [{"text": "$100", "isCorrect": false, "rationale": "This is the interest earned for only one year ($2,500 \times 0.04 \times 1 = $100), not for three years."}, {"text": "$300", "isCorrect": true, "rationale": "Using the simple interest formula $I = Prt$: $I = $2,500 \times 0.04 \times 3 = $300.00."}, {"text": "$2,800", "isCorrect": false, "rationale": "This is the final amount ($A = P + I = $2,500 + $300 = $2,800), not just the interest earned."}, {"text": "$400", "isCorrect": false, "rationale": "This would be the interest if the term was 4 years ($2,500 \times 0.04 \times 4 = $400), not 3 years."}], "id": "q05"}, {"question": "Sarah borrowed $1,500 at a simple interest rate of 8% for 2 years. What is the total amount she will have to repay?", "options": [{"text": "$120", "isCorrect": false, "rationale": "This is the interest for one year only ($1,500 \times 0.08 \times 1 = $120), not the total amount to repay after 2 years."}, {"text": "$240", "isCorrect": false, "rationale": "This is the total interest earned over two years ($I = Prt = $1,500 \times 0.08 \times 2 = $240), not the total amount (Principal + Interest) she will have to repay."}, {"text": "$1,620", "isCorrect": false, "rationale": "This would be the total if the loan term was only one year ($P + I_{1 \text{ year}} = $1,500 + $120 = $1,620), but the term is 2 years."}, {"text": "$1,740", "isCorrect": true, "rationale": "First, calculate the simple interest: $I = Prt = $1,500 \times 0.08 \times 2 = $240. Then, calculate the total amount: $A = P + I = $1,500 + $240 = $1,740."}], "id": "q06"}, {"question": "The textbook states that 'Simple interest grows in a straight line over time.' What does this imply about the annual interest earned on a principal?", "options": [{"text": "The amount of interest earned decreases each year.", "isCorrect": false, "rationale": "If interest decreased, the growth line would curve downwards, which contradicts 'straight line growth' and the definition of simple interest."}, {"text": "The amount of interest earned varies significantly from year to year.", "isCorrect": false, "rationale": "Significant variation would lead to an erratic growth pattern, not a 'straight line.' Simple interest is consistent."}, {"text": "The amount of interest earned remains constant each year.", "isCorrect": true, "rationale": "A 'straight line' growth implies a constant rate of change. Since simple interest is calculated only on the original principal, the same amount of interest is added each year (e.g., the example shows $60/year for $1,000 at 6%)."}, {"text": "The principal amount increases annually, leading to higher interest earnings.", "isCorrect": false, "rationale": "This describes how compound interest works, where interest is added to the principal to earn more interest. Simple interest's principal remains unchanged for interest calculation."}], "id": "q07"}, {"question": "A $1,200 savings bond pays 5% simple interest. If you hold the bond for 4 years, what is its total value at the end of the period, and how much total interest did you earn?", "options": [{"text": "Value: $1,260; Interest: $60", "isCorrect": false, "rationale": "This represents the value and interest after only one year ($1,200 \times 0.05 \times 1 = $60 interest, $1,200 + $60 = $1,260 total)."}, {"text": "Value: $1,440; Interest: $240", "isCorrect": true, "rationale": "First, calculate the total interest: $I = Prt = $1,200 \times 0.05 \times 4 = $240. Then, calculate the total value: $A = P + I = $1,200 + $240 = $1,440."}, {"text": "Value: $1,400; Interest: $200", "isCorrect": false, "rationale": "This would be the interest and total value if the term was 3.33 years, or if the principal was $1,000 for 4 years ($1,000 \times 0.05 \times 4 = $200), not $1,200."}, {"text": "Value: $1,200; Interest: $0", "isCorrect": false, "rationale": "This is incorrect; interest is earned over time. The bond's value will increase beyond the initial principal."}], "id": "q08"}, {"question": "The key difference between simple interest and compound interest (as hinted in the text) is that with simple interest:", "options": [{"text": "The interest rate changes based on market conditions.", "isCorrect": false, "rationale": "While interest rates can change, this is not the defining difference between simple and compound interest itself. The text implies a fixed 'r' for simple interest calculations."}, {"text": "The interest itself does not earn additional interest.", "isCorrect": true, "rationale": "The text explicitly states for simple interest, 'the interest does not earn interest on itself.' This is the core distinction from compound interest, which calculates interest on previously earned interest."}, {"text": "The principal amount decreases over the loan term.", "isCorrect": false, "rationale": "The principal amount in simple interest calculations remains constant (unless repayments are made, which isn't the focus of this section). A decreasing principal is not a defining characteristic of simple interest versus compound interest."}, {"text": "It is only used for very long-term investments.", "isCorrect": false, "rationale": "The 'moneytip' indicates that simple interest is 'most commonly used for short-term loans... and some types of savings bonds,' contradicting this statement."}], "id": "q09"}, {"question": "According to the 'moneytip' section, for which financial products is simple interest most commonly used?", "options": [{"text": "Most savings accounts and long-term investments.", "isCorrect": false, "rationale": "The 'moneytip' states, 'Most savings accounts and investments use compound interest, which we cover in the next section—and which grows much faster over time.'"}, {"text": "Short-term loans and some types of savings bonds.", "isCorrect": true, "rationale": "The 'moneytip' directly states, 'Simple interest is most commonly used for short-term loans (like a 6-month personal loan) and some types of savings bonds.'"}, {"text": "Retirement funds and mortgage loans.", "isCorrect": false, "rationale": "These are typically long-term financial products where compound interest principles are applied, not simple interest."}, {"text": "High-yield certificates of deposit (CDs).", "isCorrect": false, "rationale": "While CDs can be short-term, high-yield accounts generally utilize compound interest to maximize returns."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
