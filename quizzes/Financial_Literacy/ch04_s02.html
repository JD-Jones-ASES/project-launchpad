    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 4, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, which statement best defines \"human capital\"?", "options": [{"text": "The total amount of money a person has saved for retirement.", "isCorrect": false, "rationale": "This refers to financial capital, not human capital. The text defines human capital as skills, knowledge, experience, and abilities, distinct from monetary savings."}, {"text": "The collection of skills, knowledge, experience, and abilities that you develop over your lifetime.", "isCorrect": true, "rationale": "This is the direct definition provided in the text for human capital, highlighting its comprehensive nature beyond just physical presence."}, {"text": "The physical presence and endurance an individual brings to a job.", "isCorrect": false, "rationale": "The text explicitly states to 'think of human capital as everything you bring to a job besides your physical presence,' making this option incorrect."}, {"text": "A person's network of professional contacts and connections within their industry.", "isCorrect": false, "rationale": "This describes social capital, which is different from human capital as defined by the text's focus on individual attributes like skills and knowledge."}]}, {"question": "A job candidate excels at debugging complex software code and can fluently speak three programming languages. However, they struggle to collaborate effectively with team members and often miss project deadlines due to poor planning. Based on the text, which statement accurately categorizes their skills?", "options": [{"text": "They possess strong soft skills but lack essential hard skills.", "isCorrect": false, "rationale": "Debugging software and speaking programming languages are examples of hard skills, while collaboration and planning are soft skills. This option reverses the correct categorization."}, {"text": "They demonstrate advanced hard skills but have underdeveloped soft skills.", "isCorrect": true, "rationale": "Debugging code and knowing programming languages are specific, measurable hard skills. Struggling with collaboration and poor planning indicate underdeveloped interpersonal and professional traits, which are soft skills, making this the correct description."}, {"text": "Both their hard and soft skills are highly developed, making them a well-rounded candidate.", "isCorrect": false, "rationale": "The scenario clearly states struggles with collaboration and planning, indicating underdeveloped soft skills, so they are not well-rounded in both categories."}, {"text": "Their skills are primarily considered 'trade skills' which fall outside the hard/soft skill categories.", "isCorrect": false, "rationale": "Trade skills like welding or electrical work are examples of hard skills. Software debugging and programming also fall under the hard skills category, and soft skills are distinct."}]}, {"question": "The 'Trade School vs. Four-Year Degree' example, featuring Marcus and Priya, primarily illustrates which of the following points?", "options": [{"text": "A four-year degree is always more expensive and less financially rewarding in the long run than a trade school path.", "isCorrect": false, "rationale": "The text states 'Neither path is wrong. Both can lead to excellent careers and financial security,' indicating that a four-year degree is not always less rewarding, and its costs/benefits must be considered individually."}, {"text": "Apprenticeships and vocational training can provide a direct path to financial security, including immediate income and potentially no student loan debt.", "isCorrect": true, "rationale": "Marcus's path clearly shows earning income during training and graduating without student loan debt, leading to journeyman wages, which directly supports this statement."}, {"text": "Pursuing a business degree guarantees a higher starting salary and faster wealth accumulation compared to skilled trades.", "isCorrect": false, "rationale": "While Priya gets a good starting salary, her student loan payments reduce take-home pay, and the text notes experienced tradespeople can earn $60,000–$100,000+ per year, challenging the idea of guaranteed higher wealth for business degrees."}, {"text": "Student loan debt is an unavoidable consequence for anyone pursuing higher education, regardless of the path chosen.", "isCorrect": false, "rationale": "Marcus's electrical apprenticeship path demonstrates an education route with no student loan debt, disproving the idea that debt is unavoidable for all higher education pathways."}]}, {"question": "According to the 'moneytip' box, how does babysitting contribute to an individual's human capital?", "options": [{"text": "It provides immediate income, which can be saved to invest in future education.", "isCorrect": false, "rationale": "While babysitting provides income, the text specifies that it directly develops valuable soft skills, not just the financial means to invest in human capital."}, {"text": "It directly develops 'hard skills' like childcare certifications and medical emergency response.", "isCorrect": false, "rationale": "The text specifically mentions babysitting teaching 'responsibility and time management,' which are soft skills, not typically hard skills like certifications or medical response, which would require formal training."}, {"text": "It enhances 'soft skills' such as responsibility and time management, which are valuable in any job.", "isCorrect": true, "rationale": "The 'moneytip' box explicitly uses babysitting as an example of how 'responsibility and time management' (which are soft skills) are developed, making this the correct answer."}, {"text": "It qualifies an individual for specialized roles in early childhood education.", "isCorrect": false, "rationale": "Babysitting, while providing experience, typically does not by itself qualify an individual for specialized professional roles in early childhood education without further formal training or certifications."}]}, {"question": "Which of the following factors is explicitly stated in the text as influencing a person's earning potential?", "options": [{"text": "A person's natural talent or innate intelligence.", "isCorrect": false, "rationale": "Natural talent and intelligence are not explicitly listed among the factors affecting earning potential, though they may indirectly contribute to skill development."}, {"text": "The number of job applications submitted in a given month.", "isCorrect": false, "rationale": "The volume of applications is not listed as a direct factor influencing earning potential; rather, it's a step in job searching."}, {"text": "The ability to negotiate salary effectively.", "isCorrect": true, "rationale": "The text explicitly lists 'Negotiation' as one of the factors affecting earning potential, stating 'Learning to negotiate salary is a skill worth developing.'"}, {"text": "The size of the company one works for.", "isCorrect": false, "rationale": "While company size can sometimes correlate with salary, it is not explicitly listed as a direct factor influencing earning potential in the text."}]}, {"question": "The text challenges the myth that a four-year college degree is the only path to a good income. What is the central message regarding choosing an education pathway?", "options": [{"text": "All pathways eventually lead to the same financial outcome, so the choice doesn't significantly matter.", "isCorrect": false, "rationale": "The text highlights different costs, benefits, and earning potentials for various paths, implying choices do matter significantly."}, {"text": "The most financially successful individuals always choose vocational training or apprenticeships over university degrees.", "isCorrect": false, "rationale": "The text states 'Neither path is wrong. Both can lead to excellent careers and financial security,' disproving any 'always' statements favoring one path exclusively."}, {"text": "What matters most is choosing the right path for your specific goals, with a realistic understanding of its costs, time, and earning potential.", "isCorrect": true, "rationale": "The text emphasizes 'choosing the right path for your goals — and understanding the costs and benefits of each' and 'to choose deliberately — with a realistic picture of costs, time, and earning potential,' making this the core message."}, {"text": "Only pathways that avoid student loan debt are truly valuable for long-term financial success.", "isCorrect": false, "rationale": "While avoiding debt is beneficial, the text acknowledges that paths like a four-year degree can lead to excellent careers despite student loans, focusing on realistic assessment rather than absolute exclusion."}]}, {"question": "Unlike money in a bank account, human capital possesses a unique characteristic mentioned in the text. What is it?", "options": [{"text": "It automatically generates compound interest over time.", "isCorrect": false, "rationale": "The comparison to 'capital' for generating future income is a metaphor; human capital does not literally generate compound interest like financial capital."}, {"text": "It cannot be taken away from you once developed.", "isCorrect": true, "rationale": "The text explicitly states: 'Unlike money, no one can take your skills away from you,' highlighting the intrinsic and permanent nature of developed human capital."}, {"text": "It is exclusively developed through formal education and certifications.", "isCorrect": false, "rationale": "The text states human capital is built through 'Every class you take, every skill you practice, every certification you earn, and every job you hold,' indicating it's not exclusive to formal education."}, {"text": "It decreases in value once you enter the job market.", "isCorrect": false, "rationale": "The text implies human capital accumulates over a lifetime and generates future income, which contradicts the idea of it decreasing in value upon entering the job market."}]}, {"question": "Before committing to a specific career path, what crucial action does the text strongly recommend, particularly referencing government labor agencies?", "options": [{"text": "Consulting with a single successful individual in your desired field to gain insider tips.", "isCorrect": false, "rationale": "The 'moneytip' box specifically advises 'Do not rely on what you hear from one person; look at the data,' making this option incorrect."}, {"text": "Focusing solely on the job demand without considering typical salary ranges.", "isCorrect": false, "rationale": "The text recommends researching 'the typical salary range and job outlook,' indicating both are important, not just one."}, {"text": "Researching typical salary ranges, job outlook, and required education using reliable data sources.", "isCorrect": true, "rationale": "The 'moneytip' box explicitly advises 'Before choosing a career path, research the typical salary range and job outlook for that field. Many free tools from government labor agencies publish data on average wages, job growth projections, and required education,' aligning perfectly with this option."}, {"text": "Prioritizing fields that offer the highest starting salaries, regardless of job growth projections.", "isCorrect": false, "rationale": "The text suggests looking at both salary range and job outlook, implying a balanced consideration rather than prioritizing one over the other without context."}]}, {"question": "Employers consistently report that soft skills are among the hardest qualities to find in new workers. What does this statement imply about the nature of hard versus soft skills?", "options": [{"text": "Hard skills are generally easier for employers to assess and for new hires to acquire through training.", "isCorrect": true, "rationale": "If soft skills are the 'hardest qualities to find,' it implies that hard skills, by contrast, are either more readily available in the workforce or easier to teach and develop once an employee is hired."}, {"text": "Soft skills are less important for job performance than hard skills.", "isCorrect": false, "rationale": "The text states soft skills 'can set you apart more than you might expect' and are consistently sought, indicating their high importance, not less."}, {"text": "Most educational institutions effectively teach soft skills, making them common among graduates.", "isCorrect": false, "rationale": "If soft skills are 'hardest qualities to find,' it suggests that either they are not effectively taught or not prioritized enough by job seekers in their development, contradicting this statement."}, {"text": "New workers typically prioritize developing hard skills, neglecting soft skills entirely.", "isCorrect": false, "rationale": "While this might contribute to the problem, the statement itself highlights the *difficulty for employers to find* these qualities, implying a broader scarcity, not just individual neglect."}]}, {"question": "The text notes that 'Higher levels of education and specialized skills generally lead to higher pay — but only if the field has strong job demand.' This statement best illustrates which principle of earning potential?", "options": [{"text": "Education is the single most important factor determining salary, regardless of other conditions.", "isCorrect": false, "rationale": "The phrase 'but only if the field has strong job demand' directly refutes the idea that education is a standalone factor, showing conditions apply."}, {"text": "The specific field of work and its market demand are crucial modifiers of education's impact on earnings.", "isCorrect": true, "rationale": "This statement clearly shows that while education contributes to higher pay, its effectiveness is contingent upon the demand within the specific field, illustrating how these factors interact and modify each other."}, {"text": "Experience always outweighs education when determining an individual's earning potential.", "isCorrect": false, "rationale": "The statement focuses on education and demand, not a comparison of experience versus education. 'Always' is also a strong absolute that the text generally avoids."}, {"text": "Negotiation skills are unnecessary if one possesses a high level of education and specialized skills.", "isCorrect": false, "rationale": "Negotiation is listed as a separate, important factor, implying it's always beneficial, even with high education and skills, and is not addressed by this specific quote."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
