    };

</head>
<body>
<div class="quiz-container">

        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 27, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Mia starts a small business selling handmade jewelry online. She wants the simplest possible legal structure for her business and isn't worried about major liability risks initially. Which business structure is most appropriate for Mia to start with, and what is its primary characteristic regarding her personal assets?", "options": [{"text": "Limited Liability Company (LLC); it provides limited personal liability protection, separating her personal and business assets.", "isCorrect": false, "rationale": "While an LLC does provide limited personal liability, it is not the 'simplest' structure and requires formal setup and fees. The prompt states Mia wants the simplest option initially."}, {"text": "Sole Proprietorship; she is automatically this structure, but it means she has unlimited personal liability.", "isCorrect": true, "rationale": "A Sole Proprietorship is the simplest structure, automatically formed when doing business. However, it means the owner and business are the same legal entity, leading to unlimited personal liability, which is a key characteristic mentioned in the text."}, {"text": "S-Corporation; it offers significant tax advantages and protection from personal liability.", "isCorrect": false, "rationale": "An S-Corporation is a more complex structure, typically for businesses with significant revenue, and is not generally necessary or recommended for small side hustles, especially for simplicity."}, {"text": "Partnership; it allows her to share the liability with another person easily.", "isCorrect": false, "rationale": "The text does not discuss partnerships, and Mia is starting a business by herself. While a partnership might share liability, it adds complexity and requires another party, not fitting the 'simplest' requirement for a solo venture."}]}, {"question": "When an individual transitions from being an employee (W-2) to being self-employed, what fundamental change occurs regarding their FICA tax responsibility?", "options": [{"text": "They no longer have to pay FICA taxes, as these are only for traditional employees.", "isCorrect": false, "rationale": "This is incorrect. Self-employed individuals still pay FICA taxes (Social Security and Medicare), but they do so through self-employment tax."}, {"text": "They pay only the 'employer's half' of FICA taxes, as the 'employee's half' is covered by business deductions.", "isCorrect": false, "rationale": "This is incorrect. Self-employed individuals are responsible for both the employer and employee portions of FICA taxes, making up the full 15.3%."}, {"text": "They become responsible for paying both the employer's and employee's portions of FICA taxes, totaling 15.3% as self-employment tax.", "isCorrect": true, "rationale": "The text explicitly states that when self-employed, you pay both halves of FICA taxes, totaling 15.3%, which is called self-employment (SE) tax."}, {"text": "Their FICA tax rate is reduced to compensate for the lack of employer-sponsored benefits.", "isCorrect": false, "rationale": "This is incorrect. The FICA tax rate for self-employed individuals is higher (15.3%) because they pay both halves, not reduced."}]}, {"question": "A freelance graphic designer, operating as a sole proprietor, calculates a net profit of $12,000 for the year. Based on the provided text, what amount will be used as the Self-Employment (SE) tax base for this individual?", "options": [{"text": "$12,000, as SE tax is calculated on 100% of net earnings.", "isCorrect": false, "rationale": "The text clearly states that the IRS calculates SE tax on 92.35% of net earnings, not 100%."}, {"text": "$12,000 multiplied by 15.3%, which is the total SE tax.", "isCorrect": false, "rationale": "This calculates the tax directly without first determining the SE tax base. The SE tax base is a step *before* applying the 15.3% rate, and it's not 100% of the profit."}, {"text": "$12,000 multiplied by 0.9235.", "isCorrect": true, "rationale": "The text explains that the IRS calculates SE tax on 92.35% of net earnings (or net profit), as the 'employer half' of SE tax is deductible."}, {"text": "$12,000 minus any federal income tax, then multiplied by 0.9235.", "isCorrect": false, "rationale": "Federal income tax is calculated after SE tax and does not reduce the net earnings for the purpose of determining the SE tax base."}]}, {"question": "Sarah runs a dog-walking business and meticulously tracks all her expenses, such as leashes, waste bags, and gasoline for driving to clients. Why is tracking and deducting these legitimate business expenses crucial for her financial well-being?", "options": [{"text": "It helps her determine her hourly wage for tax purposes.", "isCorrect": false, "rationale": "While expense tracking helps with profitability analysis, its primary benefit for tax well-being as stated in the text is not determining an hourly wage, but reducing taxable profit."}, {"text": "It proves she is a legitimate business, thus exempting her from self-employment taxes.", "isCorrect": false, "rationale": "Tracking expenses does not exempt a self-employed individual from self-employment taxes; it reduces the *amount* of profit on which those taxes are calculated."}, {"text": "It reduces her taxable profit, which in turn lowers the amount she owes in both income tax and self-employment tax.", "isCorrect": true, "rationale": "The text explicitly states that legitimate business costs are tax-deductible, meaning they reduce the amount of profit owed taxes on, thereby lowering both income tax and SE tax."}, {"text": "It allows her to apply for government grants exclusively available to businesses with high operating costs.", "isCorrect": false, "rationale": "The text does not mention government grants related to expense tracking. The core benefit highlighted is tax reduction."}]}, {"question": "Why does the textbook strongly advise self-employed individuals to open a separate bank account specifically for their business income and expenses?", "options": [{"text": "To qualify for higher interest rates on business savings accounts.", "isCorrect": false, "rationale": "While some business accounts might offer different rates, the text emphasizes practical and legal reasons, not necessarily higher interest rates."}, {"text": "To prevent unauthorized access to personal funds if the business account is compromised.", "isCorrect": false, "rationale": "While separate accounts offer some security benefits, the text's primary reasons are related to tax clarity, legal clarity, and profitability assessment, not just security from compromise."}, {"text": "It provides clear records for tax time, offers legal clarity (especially for LLCs), and helps assess business profitability.", "isCorrect": true, "rationale": "The text lists all three of these as direct benefits of separating personal and business finances through a dedicated bank account: clear tax records, legal clarity, and a clear view of profitability."}, {"text": "The IRS mandates it for all self-employed individuals, regardless of business structure.", "isCorrect": false, "rationale": "While highly recommended, the text does not state that the IRS *mandates* a separate account for all self-employed individuals (e.g., sole proprietors technically don't require it legally, though it's best practice)."}]}, {"question": "A student runs a successful online tutoring service, earning significant profit. The textbook warns that self-employment taxes are not automatically withheld. What does this imply about their tax responsibilities, especially if their income is substantial?", "options": [{"text": "They only need to pay their self-employment taxes once a year when filing their annual tax return.", "isCorrect": false, "rationale": "The warning states that 'If your SE income is significant, you may be required to make quarterly estimated tax payments... Failing to pay can result in penalties.'"}, {"text": "They are exempt from paying self-employment taxes if no one withholds them.", "isCorrect": false, "rationale": "This is incorrect. The text clearly states self-employment taxes are your responsibility, even if not withheld."}, {"text": "They may be required to make quarterly estimated tax payments to the IRS to avoid penalties.", "isCorrect": true, "rationale": "The warning box directly states this: 'If your SE income is significant, you may be required to make quarterly estimated tax payments to the IRS (typically due in April, June, September, and January). Failing to pay can result in penalties.'"}, {"text": "They can choose to pay self-employment taxes at any time throughout the year, without a specific schedule.", "isCorrect": false, "rationale": "While you can technically pay more frequently, the text specifies that for significant income, quarterly payments are *required* to avoid penalties, indicating a specific schedule."}]}, {"question": "David started a small lawn care service as a sole proprietor. After two years, his business has grown significantly, and he's now hiring an assistant and using more expensive equipment. He's also concerned about the potential for property damage or injury claims. According to the textbook's advice, what should David consider doing?", "options": [{"text": "Immediately form an S-Corporation to maximize tax benefits for his expanding business.", "isCorrect": false, "rationale": "The text states S-Corporations are 'typically for businesses with significant revenue' and 'more complex structure,' and 'Not typically necessary for student or small side businesses.' While his business is growing, an LLC is usually the next logical step for liability protection."}, {"text": "Continue as a sole proprietor, as the liability risks for a lawn care service are generally low.", "isCorrect": false, "rationale": "The moneytip suggests sole proprietorship is fine initially for 'generally low' liability risks like lawn care. However, with significant growth, hiring, and more equipment, the risk increases, making continued sole proprietorship less ideal than when he started."}, {"text": "Consult an accountant or attorney about forming an LLC to gain limited personal liability protection.", "isCorrect": true, "rationale": "The moneytip states: 'As your business grows, consult an accountant or attorney about whether forming an LLC makes sense.' An LLC provides limited liability, protecting personal assets, which becomes more important with increased business activity and potential risks."}, {"text": "Invest in a comprehensive insurance policy instead of changing his business structure.", "isCorrect": false, "rationale": "While insurance is crucial, changing the business structure to an LLC provides a fundamental layer of legal protection for personal assets that insurance alone does not cover in all scenarios. The text specifically advises considering an LLC as the business grows."}]}, {"question": "Which statement accurately describes the relationship between Self-Employment (SE) tax and regular income tax?", "options": [{"text": "SE tax replaces regular income tax for self-employed individuals, simplifying their tax burden.", "isCorrect": false, "rationale": "The text explicitly states: 'It is in addition to regular income tax, not instead of it.'"}, {"text": "SE tax is only paid if a self-employed individual does not earn enough to owe regular income tax.", "isCorrect": false, "rationale": "SE tax is calculated on net earnings regardless of whether income tax is also owed, and it is in addition to income tax."}, {"text": "Regular income tax is deductible from the profit before calculating the SE tax base.", "isCorrect": false, "rationale": "This is incorrect. The 'employer half' of SE tax is deductible from net earnings before calculating the SE tax base, not regular income tax."}, {"text": "SE tax is an additional tax on net earnings, paid in addition to federal and state income taxes.", "isCorrect": true, "rationale": "The text clearly states that SE tax 'is in addition to regular income tax, not instead of it,' meaning it's an extra layer of taxation on business profits."}]}, {"question": "Maria uses a subscription software program primarily for managing her small online art store's inventory and customer orders. Based on the textbook's information, how should she treat this software subscription for tax purposes?", "options": [{"text": "She cannot deduct it, as software subscriptions are generally considered personal expenses.", "isCorrect": false, "rationale": "The text explicitly lists 'software subscriptions used for the business' as an example of a tax-deductible business expense."}, {"text": "She can deduct the cost of the subscription, as it is a legitimate business expense that reduces her taxable profit.", "isCorrect": true, "rationale": "The text states 'Most legitimate business costs are tax-deductible,' and specifically lists 'software subscriptions used for the business' as an example. Deducting it reduces taxable profit."}, {"text": "She should only deduct it if her total business expenses exceed 50% of her gross revenue.", "isCorrect": false, "rationale": "There is no such threshold mentioned in the text for deducting legitimate business expenses. Any legitimate business expense is generally deductible."}, {"text": "It's considered a capital expense and must be depreciated over several years, not fully deducted in one year.", "isCorrect": false, "rationale": "While some large software purchases might be capitalized, a 'subscription' is typically an ongoing operating expense, fully deductible in the year it's incurred. The text implies immediate deductibility for such items."}]}, {"question": "The textbook suggests a 'rule of thumb' to set aside 25–30% of business profit for taxes. What is the primary reason for this recommendation?", "options": [{"text": "To cover potential legal fees if the business is sued.", "isCorrect": false, "rationale": "The 25-30% rule of thumb is specifically stated to 'cover SE tax plus income tax across most scenarios,' not legal fees."}, {"text": "To ensure enough funds are available to pay both self-employment tax and regular income tax.", "isCorrect": true, "rationale": "The text explicitly states: 'Rule of thumb: Set aside 25–30% of business profit for taxes. This covers SE tax plus income tax across most scenarios.'"}, {"text": "To accumulate emergency funds for unexpected business downturns.", "isCorrect": false, "rationale": "While saving for emergencies is good business practice, this specific rule of thumb is for *taxes*, not general emergency funds."}, {"text": "To invest back into the business for growth and expansion.", "isCorrect": false, "rationale": "Reinvesting profit is a business decision, but the 25-30% rule is specifically allocated for mandatory tax obligations, not optional investments."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
