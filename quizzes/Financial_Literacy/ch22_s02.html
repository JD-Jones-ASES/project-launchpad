    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 22, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "You receive an email that appears to be from your bank with the subject line \"URGENT: Your Account Has Been Compromised - Act Now!\" and a link to \"restore\" your access. Which type of scam is this, and what is a primary red flag present?", "options": [{"text": "Vishing; the use of threatening language.", "isCorrect": false, "rationale": "Vishing is a phone scam, not an email scam."}, {"text": "Phishing; the urgent or threatening language directing you to a link.", "isCorrect": true, "rationale": "This scenario perfectly describes phishing, which uses fraudulent emails with urgent language and malicious links to trick recipients. The urgency and the directive to click a link are key red flags mentioned in the text."}, {"text": "Smishing; the urgent call to action.", "isCorrect": false, "rationale": "Smishing involves fraudulent text messages, not emails."}, {"text": "Phishing; the generic greeting.", "isCorrect": false, "rationale": "While a generic greeting can be a phishing red flag, the urgency and the link to a fake website are more prominent and direct indicators in this specific example."}]}, {"question": "You receive a phone call from someone claiming to be from the IRS, stating you owe back taxes and must pay immediately via gift card to avoid arrest. Based on the provided text, what is the most appropriate action to take?", "options": [{"text": "Immediately purchase gift cards and provide the codes to the caller to avoid legal trouble.", "isCorrect": false, "rationale": "This is exactly what the scammer wants, and paying with gift cards is a major vishing red flag because they are untraceable."}, {"text": "Demand to speak to a supervisor to verify the claims and payment method.", "isCorrect": false, "rationale": "Engaging further with a potential scammer, even to demand verification, is risky and not the recommended 'Rule' for vishing."}, {"text": "Hang up and then call the official IRS number (found on their government website) to inquire about the claim.", "isCorrect": true, "rationale": "The text explicitly states for vishing: 'Hang up and call the organization back directly using a number from their official website.' It also notes, 'The IRS will never call you threatening immediate arrest.'"}, {"text": "Provide your Social Security number and bank account details to allow them to investigate the alleged back taxes.", "isCorrect": false, "rationale": "Providing sensitive personal information over an unsolicited call is a major vishing red flag and puts you at risk of identity theft."}]}, {"question": "Among the common scams described, which one uniquely relies on cultivating a long-term emotional bond with the victim before requesting financial assistance?", "options": [{"text": "Grandparent Scam", "isCorrect": false, "rationale": "The Grandparent Scam relies on immediate emotional distress and urgency, not a long-term emotional bond with the scammer."}, {"text": "Tech Support Scam", "isCorrect": false, "rationale": "Tech Support Scams exploit fear of computer issues and urgency, without building any emotional connection."}, {"text": "Romance Scam", "isCorrect": true, "rationale": "The text specifically states that Romance Scams involve scammers creating fake profiles and building 'an emotional connection over weeks or months' before asking for money."}, {"text": "Phishing", "isCorrect": false, "rationale": "Phishing relies on impersonation and urgency to trick recipients into revealing information, not on building an emotional bond."}]}, {"question": "Which payment method is explicitly highlighted in the text as a universal red flag for scams because it is preferred by scammers due to its untraceable nature?", "options": [{"text": "Credit card payment through a secure online portal.", "isCorrect": false, "rationale": "Legitimate organizations frequently accept credit card payments through secure portals."}, {"text": "Payment using gift cards, wire transfers, or cryptocurrency.", "isCorrect": true, "rationale": "The text states under 'Vishing Red Flags' that scammers ask you to pay with 'gift cards, wire transfer, or cryptocurrency—these are the preferred payment methods of scammers because they are untraceable,' and reiterates under 'Universal Red Flags' that 'Legitimate organizations do not demand payment in gift cards or wire transfers.'"}, {"text": "Bank transfer directly to a known company's verified account.", "isCorrect": false, "rationale": "While wire transfers are a red flag, legitimate bank transfers to verified accounts are common for businesses."}, {"text": "Cash payment delivered in person.", "isCorrect": false, "rationale": "This method is not highlighted as a preferred untraceable method for the common scams discussed in the text."}]}, {"question": "You receive an unexpected text message from an unfamiliar number with a shortened URL, claiming to be from a major delivery service about a package delay. What is the safest action, according to the text's guidance?", "options": [{"text": "Click the shortened URL to see where it leads, then decide if it's legitimate.", "isCorrect": false, "rationale": "The 'Smishing Rule' explicitly states: 'Never click links in unexpected text messages.'"}, {"text": "Reply to the text message asking for more details about the package.", "isCorrect": false, "rationale": "Replying engages with a potential scammer and is not the recommended safe action."}, {"text": "Go directly to the delivery service's official website by typing the URL yourself to check for package updates.", "isCorrect": true, "rationale": "The 'Smishing Rule' advises: 'Go to the company's official website directly.' This allows you to verify any package issues securely."}, {"text": "Assume it's a legitimate notification and wait for the package to arrive.", "isCorrect": false, "rationale": "Assuming legitimacy without verification is risky, especially with red flags like unexpected texts and shortened URLs."}]}, {"question": "An email purportedly from your email provider states, 'Due to unusual activity, please verify your account by clicking this link and re-entering your password.' The sender's address is security@emailprovider-support.net. While several red flags might be present, which one is explicitly stated as a definitive 'Rule' that legitimate companies will *never* do?", "options": [{"text": "The generic greeting 'Dear Customer.'", "isCorrect": false, "rationale": "A generic greeting is a phishing red flag, but the text specifies a different 'Rule' regarding sensitive information."}, {"text": "The use of urgent language.", "isCorrect": false, "rationale": "Urgent language is a phishing red flag, but not the specific 'Rule' mentioned in this context."}, {"text": "The suspicious sender email address.", "isCorrect": false, "rationale": "A suspicious sender address is a phishing red flag, but the text provides a specific 'Rule' about *what* legitimate companies will not ask for."}, {"text": "The request for your password via email.", "isCorrect": true, "rationale": "The text states under 'Phishing Red Flags' as a 'Rule: Legitimate companies will never ask for your password or full card number via email.'"}]}, {"question": "While browsing online, a sudden pop-up window appears on your screen, warning that your computer is heavily infected with malware and providing a toll-free number to call for immediate technical assistance. What type of scam does this scenario most closely represent?", "options": [{"text": "Vishing", "isCorrect": false, "rationale": "Vishing is specifically a phone scam where the scammer initiates the call, not a scam initiated by a pop-up."}, {"text": "Smishing", "isCorrect": false, "rationale": "Smishing involves fraudulent text messages."}, {"text": "Tech Support Scam", "isCorrect": true, "rationale": "The text describes Tech Support Scams as starting with 'A pop-up appears warning your computer is infected with a virus. A phone number is provided to call for help.'"}, {"text": "Phishing", "isCorrect": false, "rationale": "Phishing primarily involves fraudulent emails, messages, or websites impersonating legitimate entities to steal login information, not pop-ups asking you to call for tech help."}]}, {"question": "According to the introductory paragraph, what is the primary psychological tactic scammers employ to bypass a victim's critical judgment?", "options": [{"text": "Their extensive knowledge of complex financial systems.", "isCorrect": false, "rationale": "While scammers may have some knowledge, the text highlights a psychological tactic, not technical expertise, as primary."}, {"text": "The use of advanced encryption technologies.", "isCorrect": false, "rationale": "Technology is a tool, but the primary tactic described is psychological."}, {"text": "Exploiting emotions like fear, urgency, greed, or sympathy.", "isCorrect": true, "rationale": "The text explicitly states: 'Remember: scammers rely on your emotions—fear, urgency, greed, or sympathy—to override your careful thinking.'"}, {"text": "Their ability to impersonate authority figures perfectly.", "isCorrect": false, "rationale": "Impersonation is a method scammers use, but the *reason* it works is by triggering emotions like fear or urgency, which is the underlying psychological tactic."}]}, {"question": "Your elderly relative receives a call from someone pretending to be you, claiming to be in an urgent legal predicament requiring immediate money, and insists they must keep it a secret from other family members. Which two \"Universal Red Flags\" are most prominently displayed in this scenario?", "options": [{"text": "Too-good-to-be-true offer and suspicious sender email.", "isCorrect": false, "rationale": "This is not a 'too-good-to-be-true' offer, and it's a phone call, not an email."}, {"text": "Request for gift cards and generic greeting.", "isCorrect": false, "rationale": "While gift cards might be requested in a Grandparent Scam, the prompt doesn't explicitly state it. A generic greeting wouldn't apply here as the caller is impersonating a specific grandchild."}, {"text": "Urgency and request to keep it secret.", "isCorrect": true, "rationale": "The Grandparent Scam description mentions 'begs the grandparent to wire money immediately without telling other family members.' This directly aligns with the 'Universal Red Flags' of 'Urgency: 'Act right now or it's too late'' and 'Requests to keep it secret: Legitimate requests do not require secrecy.'"}, {"text": "Poor grammar/spelling and shortened URLs.", "isCorrect": false, "rationale": "These are smishing red flags, typically associated with text messages, not phone calls."}]}, {"question": "The \"moneytip\" section provides a universal defense against nearly all phone and text scams. What is this recommended course of action?", "options": [{"text": "Engage the scammer in conversation to gather more information about their tactics.", "isCorrect": false, "rationale": "Engaging with scammers is risky and not the recommended defense. It can lead to further manipulation or information exposure."}, {"text": "Publicly post the scammer's contact information on social media to warn others.", "isCorrect": false, "rationale": "While warning others is good, this is not the primary immediate defense mechanism for the individual receiving the scam call/message."}, {"text": "Immediately block the number or email address from which the suspicious communication originated.", "isCorrect": false, "rationale": "Blocking is a good secondary step, but the 'moneytip' emphasizes a proactive verification process as the core defense."}, {"text": "Hang up (or don't reply) and then independently contact the legitimate organization using a verified official phone number.", "isCorrect": true, "rationale": "The 'moneytip' explicitly states: 'If you receive a suspicious call or message... hang up (or don't reply to the text). Then look up the organization's official phone number from their website and call them directly.'"}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
