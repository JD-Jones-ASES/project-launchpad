<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 26, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following is generally considered an *ongoing monthly cost* of renting, rather than an upfront payment required at move-in?", "options": [{"text": "Security deposit", "isCorrect": false, "rationale": "The security deposit is a significant upfront cost, typically paid at or before move-in, and held by the landlord throughout the tenancy."}, {"text": "Renter's insurance premium", "isCorrect": true, "rationale": "Renter's insurance is listed as an ongoing monthly cost, usually ranging from $15-$30 per month."}, {"text": "First month's rent", "isCorrect": false, "rationale": "The first month's rent is a standard upfront payment required at or before move-in."}, {"text": "Utility deposits", "isCorrect": false, "rationale": "Utility deposits are upfront costs required by some companies, especially for customers without a credit history."}], "id": "q01"}, {"question": "Mia finds an apartment for $1,200/month. The landlord requires a security deposit equal to one month's rent, first month's rent, and last month's rent upfront. She also estimates $150 in utility deposits and budgets the minimum for used furnishings. What is the approximate *total cash* Mia needs before she can move in, excluding moving transportation costs?", "options": [{"text": "$3,600", "isCorrect": false, "rationale": "This calculation only accounts for the three months' rent but omits utility deposits and the essential furnishings budget."}, {"text": "$4,750", "isCorrect": true, "rationale": "Mia needs: (1 month security deposit + 1st month's rent + last month's rent) = 3 * $1,200 = $3,600. Plus $150 for utility deposits and the minimum $1,000 for used furnishings. Total: $3,600 + $150 + $1,000 = $4,750."}, {"text": "$5,000", "isCorrect": false, "rationale": "While close, this overestimates the minimum furnishings budget or utility deposits. The correct sum is $4,750."}, {"text": "$4,950", "isCorrect": false, "rationale": "This calculation is incorrect. The sum of the three months' rent ($3,600), utility deposits ($150), and minimum furnishings ($1,000) is $4,750."}], "id": "q02"}, {"question": "A security deposit serves a primary purpose distinct from regular rent payments. Which statement best describes this purpose?", "options": [{"text": "It covers the cost of the last month of tenancy, functioning as prepaid rent.", "isCorrect": false, "rationale": "While some landlords require last month's rent upfront, the security deposit is separate and explicitly stated not to be 'extra' rent. It's returned at the end of tenancy, minus deductions, rather than applied to a specific month's rent."}, {"text": "It ensures the landlord has funds to cover potential damages beyond normal wear and tear when the tenant moves out.", "isCorrect": true, "rationale": "The text states the landlord 'returns it (minus any deductions for damage beyond normal wear and tear) when you move out,' indicating its purpose is to cover such damages."}, {"text": "It acts as an additional income stream for the landlord, supplementing the monthly rent.", "isCorrect": false, "rationale": "The text explicitly states it is 'not 'extra' rent—it is your money on hold,' meaning it's not income for the landlord, but rather a held sum that should be returned."}, {"text": "It is a non-refundable fee for processing the lease agreement.", "isCorrect": false, "rationale": "The security deposit is refundable (minus deductions for damage), not a non-refundable fee."}], "id": "q03"}, {"question": "A student plans to move into an apartment with an expected rent of $900/month in 14 months. They want to set up a 'Moving Out' sinking fund targeting 3 months of expected rent plus $1,500 for furnishings and setup. How much should they save *per month* to reach this goal?", "options": [{"text": "$200", "isCorrect": false, "rationale": "The target savings are $4,200. Dividing by 14 months yields $300/month, not $200."}, {"text": "$250", "isCorrect": false, "rationale": "The target savings are $4,200. Dividing by 14 months yields $300/month, not $250."}, {"text": "$300", "isCorrect": true, "rationale": "The target savings are (3 * $900 rent) + $1,500 = $2,700 + $1,500 = $4,200. To save $4,200 over 14 months, the student needs to save $4,200 / 14 = $300 per month."}, {"text": "$350", "isCorrect": false, "rationale": "The target savings are $4,200. Dividing by 14 months yields $300/month, not $350."}], "id": "q04"}, {"question": "According to the text, which item is *least likely* considered a bare minimum essential furnishing for a first apartment?", "options": [{"text": "A mattress", "isCorrect": false, "rationale": "A bed/mattress is explicitly listed as a minimum essential furnishing."}, {"text": "Kitchen utensils", "isCorrect": false, "rationale": "Kitchen essentials (dishes, pots, utensils) are explicitly listed as minimum essential furnishings."}, {"text": "A television", "isCorrect": true, "rationale": "While desirable, a television is not listed among the bare minimum essentials like a bed, bedding, towels, kitchen essentials, basic cleaning supplies, or seating."}, {"text": "Basic cleaning supplies", "isCorrect": false, "rationale": "Basic cleaning supplies are explicitly listed as minimum essential furnishings."}], "id": "q05"}, {"question": "The 'warning' section emphasizes the danger of underestimating moving costs. What is the most significant financial consequence highlighted by the text for those who fail to budget adequately for upfront expenses?", "options": [{"text": "Inability to secure a lease agreement due to insufficient funds.", "isCorrect": false, "rationale": "While a lack of funds can prevent securing a lease, the text specifically focuses on what happens *after* securing it with insufficient funds."}, {"text": "Rapid accumulation of credit card debt or reliance on family for loans.", "isCorrect": true, "rationale": "The warning states, 'Unexpected shortfalls lead to credit card debt or borrowing from family,' directly identifying these as significant financial consequences."}, {"text": "Being forced to live in an unfurnished apartment for an extended period.", "isCorrect": false, "rationale": "This is a potential outcome of insufficient furnishing funds, but the text highlights the broader, more critical issue of debt for *all* underestimated upfront costs."}, {"text": "Higher utility bills due to delayed payment of deposits.", "isCorrect": false, "rationale": "Utility deposits are upfront; delaying payment might lead to service denial, but not necessarily higher bills in the long run. This is not the primary consequence mentioned."}], "id": "q06"}, {"question": "Why do some utility companies require a deposit from new customers?", "options": [{"text": "To cover the cost of installing new utility lines to the apartment.", "isCorrect": false, "rationale": "Utility deposits are typically for service, not for the installation of infrastructure, which is usually a landlord or utility company responsibility for existing properties."}, {"text": "To act as a security measure against potential non-payment, especially from customers without a credit history.", "isCorrect": true, "rationale": "The text explicitly states, 'Some utility companies require a deposit from customers without a credit history,' implying it's a security against risk of non-payment."}, {"text": "To contribute to the company's capital for infrastructure upgrades.", "isCorrect": false, "rationale": "Utility deposits are not collected for infrastructure upgrades; they are held funds related to an individual's account."}, {"text": "To serve as an advance payment for the first month's utility usage.", "isCorrect": false, "rationale": "While it functions similarly to a security deposit, it's not explicitly an advance payment for usage, but rather a held amount that can be used if payments are missed."}], "id": "q07"}, {"question": "If a person is aiming to rent a one-bedroom apartment in a major city for $2,200/month, what *annual gross income* would they need to achieve this based on the common 30% rule mentioned in the 'Did You Know' section?", "options": [{"text": "Approximately $66,000", "isCorrect": false, "rationale": "This calculates 30% *of* $2,200, instead of finding the income *for which* $2,200 is 30%."}, {"text": "Approximately $73,333", "isCorrect": false, "rationale": "This represents the required monthly gross income ($2,200 / 0.30), not the annual gross income."}, {"text": "Approximately $88,000", "isCorrect": true, "rationale": "Based on the 30% rule, monthly rent should be no more than 30% of gross monthly income. So, monthly income needed = $2,200 / 0.30 = $7,333.33. Annual income = $7,333.33 * 12 = $88,000 (approximately)."}, {"text": "Approximately $96,000", "isCorrect": false, "rationale": "This calculation is incorrect. $88,000 is the accurate annual income required."}], "id": "q08"}, {"question": "Financial advisors recommend having 3–6 months of expenses saved *before* attempting to move out. Based on the overall context of the section, what is the primary reason for this recommendation?", "options": [{"text": "To ensure a smooth transition into homeownership later on.", "isCorrect": false, "rationale": "While good savings habits can help with future homeownership, the text specifically focuses on the immediate financial demands of renting and independent living, not long-term homeownership planning."}, {"text": "To cover the substantial upfront moving costs and provide a buffer for ongoing expenses.", "isCorrect": true, "rationale": "The section details numerous upfront costs (deposits, first/last month's rent, furnishings, moving costs) and ongoing monthly expenses. Having 3-6 months' expenses saved provides the necessary capital for these initial outlays and a safety net for the early months."}, {"text": "To qualify for lower interest rates on personal loans for furniture.", "isCorrect": false, "rationale": "The text advises budgeting cash for furnishings and avoiding debt, not taking out loans for them. Savings are for direct payment, not loan qualification."}, {"text": "To demonstrate financial stability to potential landlords and secure better lease terms.", "isCorrect": false, "rationale": "While financial stability is generally beneficial, the specific recommendation of 3-6 months' *expenses* saved is primarily for the renter's personal financial security, not a direct requirement for lease terms (though it could indirectly help)."}], "id": "q09"}, {"question": "Considering all the financial advice and warnings in the section, which strategy best prepares a first-time renter for moving out independently?", "options": [{"text": "Prioritizing finding an apartment with low monthly rent, even if it means compromising on other factors.", "isCorrect": false, "rationale": "While low rent helps, the section highlights that upfront costs are significant regardless of rent, and solely focusing on low rent might still leave a renter unprepared for deposits, furnishings, etc."}, {"text": "Focusing solely on saving enough for the first month's rent and security deposit, then relying on income for other costs.", "isCorrect": false, "rationale": "The warning section specifically cautions against this, stating that many first-time renters forget about other upfront costs, leading to debt. This strategy is explicitly identified as insufficient."}, {"text": "Creating a dedicated 'Moving Out' sinking fund to cover significant upfront costs and building a buffer for 3-6 months of ongoing expenses.", "isCorrect": true, "rationale": "This strategy synthesizes the key advice from the section: establishing a dedicated savings fund for upfront costs (sinking fund moneytip) and saving 3-6 months of expenses (financial advisors' recommendation) to cover both initial payments and provide a buffer for ongoing costs."}, {"text": "Waiting until a high-paying job is secured to cover all moving and living expenses without prior savings.", "isCorrect": false, "rationale": "While a high-paying job is beneficial, the text emphasizes the need for *prior savings* (3-6 months of expenses, sinking fund) because upfront costs are substantial and immediate, regardless of future income."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
