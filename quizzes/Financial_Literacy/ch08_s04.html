<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 8, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best describes a 'spending leak' as defined in the text?", "options": [{"text": "A large, one-time purchase that exceeds your budget.", "isCorrect": false, "rationale": "Spending leaks are characterized by being small, regular, and recurring, not large and one-time."}, {"text": "A regular, recurring expense that drains money in small, often unnoticed amounts.", "isCorrect": true, "rationale": "The text defines a spending leak as 'a regular, recurring expense that drains money in small amounts, often unnoticed.'"}, {"text": "An emergency expense that was not planned for.", "isCorrect": false, "rationale": "An emergency expense is typically unexpected and not recurring, whereas spending leaks are regular and often predictable if tracked."}, {"text": "A deliberate investment in a long-term asset.", "isCorrect": false, "rationale": "Spending leaks are drains on money, not investments designed to grow wealth."}], "id": "q01"}, {"question": "The 'latte factor' concept, as explained in the text, primarily aims to teach individuals what about their spending habits?", "options": [{"text": "That all discretionary spending, like buying coffee, is inherently bad and should be eliminated.", "isCorrect": false, "rationale": "The text explicitly states, 'The point is not that coffee is evil or that you should never enjoy small pleasures.'"}, {"text": "To make conscious decisions about small, habitual discretionary purchases, understanding their cumulative annual cost.", "isCorrect": true, "rationale": "The text clarifies the 'latte factor's' point is 'to make these spending decisions consciously—to decide that the habit is worth the monthly and annual cost—rather than spending automatically without awareness.'"}, {"text": "To always choose the cheapest available option for every purchase to save money.", "isCorrect": false, "rationale": "While saving money is a goal, the core message is about conscious decision-making, not necessarily always choosing the cheapest option."}, {"text": "That financial success is determined by avoiding all forms of pleasure or convenience.", "isCorrect": false, "rationale": "The concept emphasizes awareness and budgeting for pleasures, not their complete avoidance."}], "id": "q02"}, {"question": "What is the defining characteristic of 'subscription creep' that differentiates it from other forms of spending leaks?", "options": [{"text": "It involves large, one-time purchases made under pressure.", "isCorrect": false, "rationale": "Subscription creep involves recurring charges, not large one-time purchases, and is often due to forgetting, not immediate pressure."}, {"text": "It specifically refers to the accumulation of recurring charges for services, many of which are rarely or never used.", "isCorrect": true, "rationale": "The text defines subscription creep as 'the gradual accumulation of recurring monthly charges for services you signed up for over time, many of which you rarely or never use.'"}, {"text": "It describes impulsive shopping driven by emotional triggers like stress or boredom.", "isCorrect": false, "rationale": "This describes impulse buying patterns, not subscription creep, which is often due to inertia and forgetting."}, {"text": "It is a fixed expense like rent or a loan payment that cannot be easily changed.", "isCorrect": false, "rationale": "Subscription services are typically discretionary and can be canceled, unlike fixed expenses such as rent."}], "id": "q03"}, {"question": "Based on the text and Sofia's example, what is the most effective initial step a person can take to address potential subscription creep?", "options": [{"text": "Immediately cancel all subscriptions to save money.", "isCorrect": false, "rationale": "The text suggests an audit first to determine usage and need, not a blanket cancellation, which might eliminate necessary services."}, {"text": "Log into their bank and credit card statements to list and review every recurring charge from the past two months.", "isCorrect": true, "rationale": "The text advises to 'Do a subscription audit. Log into your bank account and credit card statements and list every recurring charge from the past two months. Ask for each: Do I use this? Do I need this? Could I pause or cancel it?' This is the recommended first step."}, {"text": "Ask friends what services they subscribe to and only keep those.", "isCorrect": false, "rationale": "Personal usage and need are key, not what friends subscribe to, as individual needs differ."}, {"text": "Avoid signing up for any new trials or services in the future.", "isCorrect": false, "rationale": "While a good future habit, this doesn't address existing subscription creep, which is the immediate concern."}], "id": "q04"}, {"question": "Mark often finds himself browsing online shopping sites when he's feeling bored, and sometimes ends up buying items he didn't plan for. According to the text, which impulse buying trigger is Mark most likely experiencing?", "options": [{"text": "'Sale' pressure", "isCorrect": false, "rationale": "The scenario describes browsing due to boredom, not being influenced by a sale price."}, {"text": "Social pressure", "isCorrect": false, "rationale": "There is no mention of Mark being influenced by others in his purchasing decisions."}, {"text": "Stress or boredom", "isCorrect": true, "rationale": "The text lists 'Stress or boredom: Retail therapy—shopping as a way to feel better temporarily' and 'Online browsing: Sitting on a website or app with no intention to buy, then noticing something appealing' as common triggers. Mark's situation combines both boredom and online browsing leading to unplanned purchases."}, {"text": "Urgent need for a product", "isCorrect": false, "rationale": "Impulse buying is defined as an unplanned purchase, not one driven by an urgent need."}], "id": "q05"}, {"question": "The text suggests adding a realistic 'dining out' or 'coffee' category to a budget instead of trying to eliminate small pleasures entirely. What is the primary rationale behind this advice?", "options": [{"text": "To ensure you always have enough money to treat yourself to expensive meals.", "isCorrect": false, "rationale": "The advice is about realistic budgeting for pleasures, not necessarily expensive ones, and focuses on avoiding failure."}, {"text": "Because attempting to eliminate all small pleasures often leads to failure and budget abandonment.", "isCorrect": true, "rationale": "The text states, 'Do not try to eliminate small pleasures entirely—you will fail.' The rationale is to create a sustainable budget by acknowledging and planning for these expenses."}, {"text": "To encourage spending more money on discretionary items.", "isCorrect": false, "rationale": "The goal is to budget and track against a limit, not to encourage increased spending."}, {"text": "To avoid tracking these minor expenses, as they are insignificant.", "isCorrect": false, "rationale": "The entire section emphasizes the importance of tracking small expenses because of their cumulative significance."}], "id": "q06"}, {"question": "Sarah is prone to impulse purchases, especially when she sees something appealing online. To fix this spending leak, which strategy from the text should she implement for any unplanned purchase over $20?", "options": [{"text": "Immediately delete the online shopping app to remove temptation.", "isCorrect": false, "rationale": "While reducing temptation can help, the text offers a specific, less drastic strategy for managing impulse buys rather than complete avoidance."}, {"text": "Implement a 24-hour wait rule, adding the item to a list and re-evaluating her desire for it after a day.", "isCorrect": true, "rationale": "The text recommends, 'Introduce friction for impulse purchases. A 24-hour wait rule for any unplanned purchase over $20 prevents many impulse buys. Add the item to a list, wait a day, and see if you still want it.'"}, {"text": "Only shop with a friend who can dissuade her from unnecessary buys.", "isCorrect": false, "rationale": "The text suggests an internal strategy for friction, and social pressure can sometimes even be a trigger for impulse buys."}, {"text": "Cancel all her credit cards to prevent any unplanned spending.", "isCorrect": false, "rationale": "This is an overly extreme measure that would hinder normal financial activities, not a targeted strategy for impulse buying."}], "id": "q07"}, {"question": "The text warns against the reasoning 'It is only $X a month.' Why is this mindset considered dangerous when evaluating recurring expenses?", "options": [{"text": "Because it prevents people from enjoying any small, affordable luxuries.", "isCorrect": false, "rationale": "The warning is about the cumulative cost, not about preventing enjoyment of affordable luxuries. The text encourages conscious decision-making, not deprivation."}, {"text": "Because it leads people to intentionally overspend on individual items.", "isCorrect": false, "rationale": "The danger is often unintentional overspending due to the accumulation of many small, seemingly trivial expenses, not an intentional choice to overspend on one item."}, {"text": "Because individually trivial expenses accumulate to a staggering total when multiple 'small' charges run simultaneously.", "isCorrect": true, "rationale": "The text states, 'Individually, each one seems trivial. But when you have five, eight, or twelve 'only $X a month' expenses running simultaneously, the total can be staggering. Always evaluate small recurring expenses in annual terms.'"}, {"text": "Because banks charge extra fees for frequent small recurring payments.", "isCorrect": false, "rationale": "The text does not mention bank fees as the primary danger; the focus is on the cumulative cost to personal finances."}], "id": "q08"}, {"question": "Which of the following principles best encapsulates the overall approach to finding and fixing spending leaks described in the section?", "options": [{"text": "Eliminate all discretionary spending to maximize savings.", "isCorrect": false, "rationale": "The text advises against eliminating all small pleasures, recognizing that such attempts often fail."}, {"text": "Prioritize large, one-time purchases over small, recurring ones for financial review.", "isCorrect": false, "rationale": "The section is specifically focused on the impact of small, recurring leaks, highlighting their often-unnoticed significance."}, {"text": "Foster conscious awareness and deliberate decision-making regarding all spending, especially small, habitual expenses.", "isCorrect": true, "rationale": "The entire section, from the 'latte factor' to subscription audits and impulse buy friction, emphasizes making spending decisions consciously and understanding their true cost."}, {"text": "Delegate financial tracking to a professional to avoid personal involvement.", "isCorrect": false, "rationale": "The text provides actionable steps for individuals to personally track and manage their spending leaks, not to delegate."}], "id": "q09"}, {"question": "A college student realizes they spend $7 every weekday on a premium coffee drink. Applying the advice from the section, what is the *first and most impactful step* they should take to address this potential spending leak?", "options": [{"text": "Immediately stop buying coffee entirely to save $35 per week.", "isCorrect": false, "rationale": "The text warns against trying to eliminate small pleasures entirely, as this often leads to failure. A more sustainable approach is advised."}, {"text": "Research cheaper coffee alternatives and switch to one immediately.", "isCorrect": false, "rationale": "While a good long-term strategy, the text emphasizes calculating annual costs first to change the 'emotional weight' of the decision before implementing changes."}, {"text": "Calculate the annual cost of this habit and then decide if the purchase is truly worth that annual amount.", "isCorrect": true, "rationale": "The text explicitly states: 'Calculate annual costs. For any habit or subscription, multiply the monthly cost by 12. Seeing $1,825/year for daily coffee instead of $5/day changes the emotional weight of the decision.' This is presented as a critical step to gain perspective."}, {"text": "Ask their friends to stop inviting them for coffee to reduce social pressure.", "isCorrect": false, "rationale": "While social pressure can be a trigger, this scenario describes a habitual personal purchase, and the text offers more direct strategies for addressing habits."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
