<script>
var QUESTIONS = [{"question": "What is the fundamental trade-off between a $Traditional IRA$ and a $Roth IRA$?", "options": [{"text": "Traditional: pay taxes later; Roth: pay taxes now — the choice is a bet on future vs. current tax rates", "isCorrect": true, "rationale": "Traditional accounts defer taxes to retirement; Roth accounts pay taxes now. Which is better depends on whether your tax rate will be higher now or in retirement."}, {"text": "Traditional accounts earn higher returns; Roth accounts are safer", "isCorrect": false, "rationale": "Both accounts hold the same types of investments — the difference is tax treatment, not investment performance."}, {"text": "Roth accounts have higher contribution limits than Traditional accounts", "isCorrect": false, "rationale": "Both IRAs share the same contribution limit ($7,000 for 2024). The difference is the timing of taxation."}, {"text": "Traditional accounts are only available through employers; Roth accounts are opened independently", "isCorrect": false, "rationale": "Both Traditional and Roth IRAs are opened independently at a brokerage or bank. The employer-sponsored account is the 401(k)."}], "id": "q01"}, {"question": "A person is currently in the 10% tax bracket but expects their income — and therefore their tax rate — to rise significantly in the future. Which account type is likely better?", "options": [{"text": "Roth IRA — pay low taxes now and avoid higher taxes on withdrawals in retirement", "isCorrect": true, "rationale": "When your current tax rate is lower than your expected future rate, paying taxes now (Roth) is the better deal. You lock in the low rate today."}, {"text": "Traditional IRA — defer taxes to take advantage of compounding without tax drag", "isCorrect": false, "rationale": "If your future tax rate will be higher, deferring taxes to retirement means paying more taxes on a larger amount. Roth is the better choice when current rates are low."}, {"text": "401(k) only — because employer matching makes it always superior", "isCorrect": false, "rationale": "401(k) matching is valuable but a separate consideration. The Roth vs. Traditional decision depends on tax rates, not just account type."}, {"text": "Neither — wait until tax rates are certain before investing", "isCorrect": false, "rationale": "Waiting sacrifices decades of compounding. The recommendation for young, low-bracket workers is clear: start contributing to a Roth now."}], "id": "q02"}, {"question": "According to the math comparison in the text, what happens when tax rates are the same in both the contribution year and retirement?", "options": [{"text": "Roth and Traditional produce exactly the same after-tax result", "isCorrect": true, "rationale": "When tax rates are equal, the math is perfectly equivalent — both end up at $1,212,382 in the example. The timing of taxation does not matter when rates are identical."}, {"text": "Traditional always wins because taxes are paid on a smaller amount later", "isCorrect": false, "rationale": "When tax rates are equal, the amount paid in taxes is the same regardless of timing. Traditional only wins if the future tax rate is lower."}, {"text": "Roth always wins because growth is tax-free", "isCorrect": false, "rationale": "When rates are equal, Roth and Traditional are mathematically equivalent. Roth's advantage comes when current rates are lower than future rates."}, {"text": "Traditional wins because you contribute more dollars initially", "isCorrect": false, "rationale": "Contributing more pre-tax dollars to Traditional is exactly offset by the larger tax bill at withdrawal. With equal rates, the after-tax result is the same."}], "id": "q03"}, {"question": "In the text's $Roth vs. Traditional$ example, with a 22% tax rate and $6,000 pre-tax income invested for 40 years at 8%, what is the final after-tax amount for each?", "options": [{"text": "$1,212,382 for both — identical results when tax rates are equal", "isCorrect": true, "rationale": "Traditional: $1,554,336 × (1 - 0.22) = $1,212,382. Roth: $4,680 contributed × 259.056 FV factor = $1,212,382. Same result proves the mathematical equivalence."}, {"text": "$1,554,336 for Roth and $1,212,382 for Traditional", "isCorrect": false, "rationale": "$1,554,336 is the Traditional account's pre-tax value — before the 22% tax is applied at withdrawal. After taxes, both are $1,212,382."}, {"text": "$1,212,382 for Roth and $1,554,336 for Traditional", "isCorrect": false, "rationale": "This is reversed. $1,554,336 is Traditional's pre-tax value; after 22% tax, it becomes $1,212,382 — matching the Roth."}, {"text": "$1,000,000 for both, as 40-year compounding produces round numbers", "isCorrect": false, "rationale": "The text provides specific numbers: $1,554,336 pre-tax for Traditional, and $1,212,382 after-tax for both."}], "id": "q04"}, {"question": "Which of the following is a reason why $Roth$ beats Traditional for young workers even when tax rates appear equal?", "options": [{"text": "Young workers are typically in their lowest-ever tax bracket, so rates will likely rise over their career", "isCorrect": true, "rationale": "For young workers, 'same tax rates now and at retirement' is unlikely — their income and tax rate will probably rise as their career advances, making Roth more valuable."}, {"text": "Roth accounts allow higher annual contribution limits than Traditional IRAs", "isCorrect": false, "rationale": "Both IRA types share the same contribution limit. Roth's advantage is about tax treatment, not contribution limits."}, {"text": "Roth accounts earn higher investment returns due to tax-free compounding", "isCorrect": false, "rationale": "The investments inside a Roth and Traditional can be identical. The difference is tax treatment, not investment return."}, {"text": "Traditional IRA contributions are not deductible for workers under 30", "isCorrect": false, "rationale": "There is no age-based deductibility restriction for Traditional IRAs. Deductibility depends on income and access to a workplace plan."}], "id": "q05"}, {"question": "What is a $Required Minimum Distribution$ (RMD), and which account does NOT have one?", "options": [{"text": "RMDs are mandatory withdrawals starting at age 73; the Roth IRA has no RMD requirement", "isCorrect": true, "rationale": "Traditional IRAs and 401(k)s require minimum withdrawals starting at age 73. The Roth IRA has no RMDs, giving more flexibility and allowing tax-free growth to continue longer."}, {"text": "RMDs are required for all retirement accounts including Roth IRAs starting at age 65", "isCorrect": false, "rationale": "Roth IRAs are exempt from RMDs during the owner's lifetime — this is one of Roth's key advantages."}, {"text": "RMDs apply only to 401(k) accounts, not to any IRA type", "isCorrect": false, "rationale": "Traditional IRAs also require RMDs starting at age 73. Only the Roth IRA is exempt."}, {"text": "RMDs are optional withdrawals that receive a tax bonus", "isCorrect": false, "rationale": "RMDs are mandatory, not optional. Failing to take them results in a tax penalty."}], "id": "q06"}, {"question": "What is the 2024 annual contribution limit for a $401(k)$?", "options": [{"text": "$23,000", "isCorrect": true, "rationale": "The 2024 401(k) contribution limit is $23,000 — significantly higher than the $7,000 IRA limit. This is a separate limit from IRA contributions."}, {"text": "$7,000", "isCorrect": false, "rationale": "$7,000 is the contribution limit for both Traditional and Roth IRAs. The 401(k) has a much higher limit of $23,000."}, {"text": "$14,000", "isCorrect": false, "rationale": "This is not a current limit for any of the three accounts mentioned. The 401(k) limit is $23,000."}, {"text": "$19,500", "isCorrect": false, "rationale": "$19,500 was a prior-year 401(k) limit. The 2024 limit is $23,000."}], "id": "q07"}, {"question": "What is the recommended strategy when you have money to invest in both a $401(k)$ and a $Roth IRA$?", "options": [{"text": "Contribute to the 401(k) up to the employer match, then max out the Roth IRA, then return to the 401(k)", "isCorrect": true, "rationale": "This order captures the full employer match first (free money), then uses the Roth IRA's tax-free advantages, then continues with 401(k) if funds remain."}, {"text": "Max out the Roth IRA first, then contribute to the 401(k) only if you have remaining income", "isCorrect": false, "rationale": "Skipping the 401(k) before maxing the Roth means leaving employer matching funds unclaimed — a critical mistake."}, {"text": "Split contributions equally between all accounts every month", "isCorrect": false, "rationale": "Equal splitting may result in not capturing the full employer match, which is the highest-priority step."}, {"text": "Only contribute to one account per year to simplify tax reporting", "isCorrect": false, "rationale": "You can and should contribute to multiple accounts simultaneously. IRA and 401(k) limits are completely separate."}], "id": "q08"}, {"question": "Someone in a high tax bracket (24%+) who expects to be in a lower bracket in retirement should generally prefer which account type?", "options": [{"text": "Traditional IRA or 401(k) — reduce taxes now; pay at a lower rate in retirement", "isCorrect": true, "rationale": "If your current rate is higher than your expected retirement rate, deferring taxes (Traditional/401k) means you avoid high current taxes and pay at a lower rate later."}, {"text": "Roth IRA — tax-free growth is always better regardless of rate", "isCorrect": false, "rationale": "Roth is best when current rates are low. Paying high current taxes to get tax-free withdrawals later is not advantageous when your retirement rate will be lower."}, {"text": "Neither — stop contributing to retirement accounts until tax rates decrease", "isCorrect": false, "rationale": "Never stop contributing to tax-advantaged accounts. High earners should use Traditional/pre-tax accounts for the tax deduction now."}, {"text": "Both equally — the decision does not depend on tax bracket", "isCorrect": false, "rationale": "Tax bracket is the central factor in the Roth vs. Traditional decision. It cannot be ignored."}], "id": "q09"}, {"question": "According to the comparison table, how does tax treatment differ between a $Traditional IRA$ and a $Roth IRA$ at withdrawal?", "options": [{"text": "Traditional withdrawals are taxed; Roth withdrawals are tax-free", "isCorrect": true, "rationale": "Traditional contributions are pre-tax; withdrawals are taxed as ordinary income. Roth contributions are after-tax; qualified withdrawals — including all growth — are completely tax-free."}, {"text": "Both are taxed at a 10% flat rate at withdrawal", "isCorrect": false, "rationale": "There is no flat 10% rate on withdrawals. Traditional IRA withdrawals are taxed at ordinary income rates; Roth withdrawals are tax-free."}, {"text": "Both allow tax-free withdrawals after age 73", "isCorrect": false, "rationale": "Only Roth allows tax-free withdrawals. Traditional IRA withdrawals are always taxed, regardless of age."}, {"text": "Roth withdrawals are partially taxed; Traditional withdrawals are fully tax-free", "isCorrect": false, "rationale": "This is exactly backwards. Traditional = taxed at withdrawal; Roth = tax-free at withdrawal."}], "id": "q10"}, {"question": "Why is a $Roth IRA$ particularly advantageous for someone who wants to leave money to heirs?", "options": [{"text": "Roth has no Required Minimum Distributions, allowing the account to grow tax-free until it passes to heirs", "isCorrect": true, "rationale": "With no RMDs, a Roth IRA can continue growing tax-free throughout retirement and be passed to heirs who inherit tax-free growth — making it an efficient wealth transfer tool."}, {"text": "Roth IRAs are excluded from estate taxes entirely", "isCorrect": false, "rationale": "Roth IRAs may be subject to estate taxes depending on the size of the estate. The advantage is the tax-free growth inheritance, not estate tax exclusion."}, {"text": "Roth allows unlimited contributions in the years before death", "isCorrect": false, "rationale": "Roth contributions are capped at $7,000 per year (same as Traditional). The estate advantage comes from tax-free growth and no RMDs."}, {"text": "Roth accounts bypass probate automatically", "isCorrect": false, "rationale": "Roth accounts pass to named beneficiaries (bypassing probate), but this is true of all retirement accounts — it is not unique to Roth."}], "id": "q11"}, {"question": "The IRA contribution limits and 401(k) contribution limits are described as 'separate.' What does this mean?", "options": [{"text": "Contributing to a 401(k) does not reduce how much you can contribute to an IRA — both limits apply independently", "isCorrect": true, "rationale": "The $7,000 IRA limit and the $23,000 401(k) limit do not interact. You can contribute up to the max in both simultaneously."}, {"text": "You cannot contribute to both a 401(k) and an IRA in the same tax year", "isCorrect": false, "rationale": "You absolutely can contribute to both in the same year — and the text recommends a strategy that does exactly that."}, {"text": "Contributions to a 401(k) count against your IRA limit dollar for dollar", "isCorrect": false, "rationale": "Contribution limits are separate and independent. A full 401(k) contribution does not reduce your IRA allowance."}, {"text": "IRA contributions can be used to meet your 401(k) minimum requirement", "isCorrect": false, "rationale": "These are separate accounts with separate limits. IRA contributions are not credited to a 401(k) or vice versa."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
