    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 12, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is a primary characteristic of a Certificate of Deposit (CD)?", "options": [{"text": "It allows unlimited withdrawals without penalty.", "isCorrect": false, "rationale": "CDs typically impose an early withdrawal penalty if funds are taken out before the specified term ends, which contradicts unlimited withdrawals."}, {"text": "It requires money to be deposited for a specified term to earn a fixed interest rate.", "isCorrect": true, "rationale": "A CD is defined by its fixed term during which money is deposited and earns a fixed interest rate, in exchange for giving up flexibility."}, {"text": "It offers a variable interest rate that changes with market conditions.", "isCorrect": false, "rationale": "CDs offer a fixed interest rate that is locked in when the account is opened, protecting the saver if rates fall but causing them to miss out if rates rise."}, {"text": "It typically has lower interest rates than a regular savings account.", "isCorrect": false, "rationale": "CDs generally offer higher Annual Percentage Yields (APYs) than regular savings accounts because the money is committed for a set period."}]}, {"question": "Sarah invests $10,000 in a 1-year CD at 4.00 APY. Three months later, an unexpected expense forces her to withdraw the money. What is the most likely financial consequence for Sarah?", "options": [{"text": "She will lose her initial $10,000 deposit.", "isCorrect": false, "rationale": "The initial deposit in a CD is generally safe; the penalty applies to the interest earned or could reduce the principal slightly if interest earned is insufficient to cover the penalty."}, {"text": "She will only receive the interest earned up to the point of withdrawal, pro-rated for three months.", "isCorrect": false, "rationale": "While she might have earned some interest, an early withdrawal penalty typically applies, which often reduces or eliminates the interest earned, rather than just receiving a pro-rated amount."}, {"text": "She will pay an early withdrawal penalty, which could significantly reduce or eliminate the interest earned.", "isCorrect": true, "rationale": "The text explicitly states that withdrawing money from a CD before the term ends typically triggers an early withdrawal penalty, which can be substantial (e.g., 3 to 6 months of interest) and may wipe out all earned interest."}, {"text": "Her interest rate will be retroactively adjusted to a lower savings account rate for the time the money was held.", "isCorrect": false, "rationale": "The interest rate is fixed. The consequence of early withdrawal is a penalty, not a retroactive adjustment of the rate."}]}, {"question": "Which statement accurately describes a Money Market Account (MMA)?", "options": [{"text": "It offers unrestricted access to funds without any transaction limits.", "isCorrect": false, "rationale": "Money Market Accounts 'may limit the number of transactions per month,' which means access is not always unrestricted."}, {"text": "It typically requires a higher minimum balance than a regular savings account to earn a higher interest rate.", "isCorrect": true, "rationale": "The definition states that MMAs 'require a higher minimum balance' and 'typically offers a higher interest rate than a regular savings account.'"}, {"text": "Its interest rate is fixed for a specified term, similar to a CD.", "isCorrect": false, "rationale": "MMAs typically offer variable interest rates, unlike CDs which have fixed rates for a specified term."}, {"text": "It is not insured by the FDIC or NCUA.", "isCorrect": false, "rationale": "Money Market Accounts offered by banks and credit unions are generally deposit accounts and are insured by the FDIC or NCUA, similar to savings accounts and CDs."}]}, {"question": "According to the text, what is the primary trade-off when choosing a CD over a regular savings account?", "options": [{"text": "CDs offer greater flexibility but lower interest rates.", "isCorrect": false, "rationale": "CDs offer less flexibility due to the fixed term and early withdrawal penalties, and they generally offer higher interest rates."}, {"text": "CDs provide higher interest rates in exchange for less liquidity and a fixed term.", "isCorrect": true, "rationale": "The text states that giving up flexibility allows you to 'often earn a higher rate' with CDs, and notes the fixed term and early withdrawal penalty as key features affecting liquidity."}, {"text": "Savings accounts are FDIC insured, while CDs are not.", "isCorrect": false, "rationale": "Both savings accounts and CDs at insured institutions are FDIC/NCUA insured up to $250,000."}, {"text": "Savings accounts have early withdrawal penalties, whereas CDs do not.", "isCorrect": false, "rationale": "Regular savings accounts typically allow withdrawals without penalty, while CDs are known for their early withdrawal penalties."}]}, {"question": "Mark is saving for a down payment on a car he plans to buy in exactly 18 months. He has $15,000 that he is confident he will not need until then. Based on the provided advice, what would be the most suitable savings strategy for Mark?", "options": [{"text": "Deposit the money into a regular savings account for its flexibility.", "isCorrect": false, "rationale": "While flexible, a regular savings account would offer a significantly lower interest rate, as highlighted in the comparison example, leading to less earnings for a known future need."}, {"text": "Invest in a 6-month CD and roll it over multiple times.", "isCorrect": false, "rationale": "While possible, an 18-month CD would lock in the rate for the entire period, potentially earning more without needing to manage rollovers or risking rate changes in between terms."}, {"text": "Open an 18-month Certificate of Deposit (CD) to earn a higher fixed interest rate.", "isCorrect": true, "rationale": "The 'moneytip' states 'CDs are better for money you know you won't need, like saving for a car you plan to buy in exactly one year.' An 18-month CD aligns perfectly with Mark's known timeframe and desire for a higher fixed rate."}, {"text": "Place the money in a Money Market Account for immediate access.", "isCorrect": false, "rationale": "A Money Market Account offers more flexibility than a CD and is good for emergency funds, but for a known future purchase with a specific timeframe, a CD typically offers a better fixed rate."}]}, {"question": "A financial advisor suggests CD laddering to a client who wants to earn higher interest rates but also needs periodic access to portions of their savings. How does CD laddering achieve this balance?", "options": [{"text": "It allows the client to withdraw from any CD at any time without penalty.", "isCorrect": false, "rationale": "CDs still carry early withdrawal penalties if funds are accessed before their individual maturity dates. Laddering provides liquidity by staggering maturities, not by eliminating penalties."}, {"text": "It locks all funds into a single long-term CD to maximize the overall interest earned.", "isCorrect": false, "rationale": "CD laddering is the opposite of this; it involves splitting funds across multiple CDs with varying maturities, not a single long-term CD."}, {"text": "It involves splitting savings across multiple CDs with staggered maturity dates, providing regular access to maturing funds.", "isCorrect": true, "rationale": "The text explains, 'you split your savings across multiple CDs with different maturity dates... As each CD matures, you can access the money or reinvest it... This gives you regular access to portions of your savings while still earning CD rates.'"}, {"text": "It invests in a money market account that automatically transfers funds to a CD when interest rates are favorable.", "isCorrect": false, "rationale": "This describes an automated investment strategy, not CD laddering. CD laddering specifically involves multiple CDs with different terms."}]}, {"question": "What level of insurance protection is typically provided for Certificates of Deposit (CDs) at insured institutions?", "options": [{"text": "CDs are not insured, making them riskier than savings accounts.", "isCorrect": false, "rationale": "The text explicitly states that 'FDIC/NCUA insured: CDs at insured institutions are just as safe as savings accounts.'"}, {"text": "CDs are insured for up to $100,000 per depositor.", "isCorrect": false, "rationale": "While $100,000 was a previous limit, the current standard insurance amount mentioned in the text is $250,000."}, {"text": "CDs are insured by the FDIC or NCUA up to $250,000 per depositor, per institution.", "isCorrect": true, "rationale": "The text clearly states, 'FDIC/NCUA insured: CDs at insured institutions are just as safe as savings accounts—up to $250,000.'"}, {"text": "CDs are only insured if they have a term of 1 year or less.", "isCorrect": false, "rationale": "The term length of a CD does not affect its insurance status; all CDs at insured institutions are covered up to the specified limit regardless of term."}]}, {"question": "If you open a 2-year CD with a fixed interest rate and market interest rates rise significantly six months later, what is the most likely outcome regarding your CD?", "options": [{"text": "Your CD's interest rate will automatically adjust upwards to reflect the new market rates.", "isCorrect": false, "rationale": "CDs have a 'Fixed rate: The rate is locked in when you open the CD.' This means it will not automatically adjust with market changes."}, {"text": "You will miss out on the higher rates available elsewhere, but your CD rate will remain guaranteed.", "isCorrect": true, "rationale": "The text states that a fixed rate 'protects you if rates fall—but you miss out if rates rise.' Your CD's rate remains the same, but the opportunity cost of not having the higher market rate increases."}, {"text": "The bank will offer you an option to upgrade your CD to the new higher rate without penalty.", "isCorrect": false, "rationale": "Banks are generally not obligated to offer such an upgrade without penalty. Breaking the CD to reinvest would typically incur an early withdrawal penalty."}, {"text": "Your CD's interest earnings will decrease because the fixed rate is now less competitive.", "isCorrect": false, "rationale": "The interest earnings will remain fixed as per the agreement; the amount earned does not decrease. However, the purchasing power of that fixed interest might be less relative to new higher-rate options."}]}, {"question": "Based on the 'moneytip' provided, which account type is most recommended for an emergency fund?", "options": [{"text": "A long-term Certificate of Deposit (CD) to maximize interest earnings.", "isCorrect": false, "rationale": "The moneytip advises against CDs for emergency funds because 'you need to be able to access it immediately in a real emergency' and CDs lock up funds."}, {"text": "A regular savings account with the highest possible interest rate.", "isCorrect": false, "rationale": "While better than a CD for liquidity, the moneytip specifically suggests a 'high-yield savings account or money market account' for emergency funds, implying a regular savings account might not offer the best rate."}, {"text": "A high-yield savings account or money market account, for immediate access.", "isCorrect": true, "rationale": "The moneytip explicitly states, 'For your emergency fund, stick to a high-yield savings account or money market account—you need to be able to access it immediately in a real emergency.'"}, {"text": "A CD ladder, to provide staggered access to funds over time.", "isCorrect": false, "rationale": "While a CD ladder offers more liquidity than a single long-term CD, it still involves fixed terms and isn't designed for immediate, unpredictable access required for an emergency fund."}]}, {"question": "Which statement best summarizes the fundamental difference between a regular savings account, a Certificate of Deposit (CD), and a Money Market Account (MMA) concerning interest rates and flexibility?", "options": [{"text": "Regular savings offer high flexibility and high rates; CDs offer low flexibility and low rates; MMAs offer moderate flexibility and moderate rates.", "isCorrect": false, "rationale": "This statement is incorrect about the interest rates; regular savings offer lower rates, and CDs offer higher rates than regular savings."}, {"text": "Regular savings offer high flexibility and lower rates; MMAs offer slightly less flexibility and higher rates; CDs offer the least flexibility for the highest fixed rates.", "isCorrect": true, "rationale": "This accurately summarizes the spectrum: regular savings are most flexible but lowest rates; MMAs are a middle ground; and CDs offer the highest rates but require the least flexibility due to fixed terms and penalties."}, {"text": "CDs are the most flexible, allowing withdrawals at any time; MMAs offer fixed rates; regular savings offer the lowest rates but require high minimum balances.", "isCorrect": false, "rationale": "This statement is incorrect. CDs are the least flexible, MMAs typically have variable rates, and regular savings accounts usually don't have high minimum balances."}, {"text": "All three account types offer similar interest rates, but only CDs have FDIC/NCUA insurance.", "isCorrect": false, "rationale": "This is incorrect. The interest rates vary significantly among the three types, and all three, when offered by insured institutions, are FDIC/NCUA insured."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
