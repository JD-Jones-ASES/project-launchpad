<script>
var QUESTIONS = [{"question": "Which of the following is the most effective strategy for creating a strong, yet memorable, password for a new online account?", "options": [{"text": "Using a combination of your pet's name, your birth year, and an exclamation mark, such as 'Max1995!'", "isCorrect": false, "rationale": "This option is weak because it is based on predictable personal information (pet's name, birth year) and common patterns, which the text explicitly states makes a password trivially easy for criminals to guess or crack."}, {"text": "Creating a passphrase of four or more random, unconnected words like 'BlueTruckRainyHammer'.", "isCorrect": true, "rationale": "The text recommends using a passphrase, a string of four or more random words, as a helpful strategy because it is long, memorable, and hard to crack."}, {"text": "Using a short, complex string of characters like 'XyZ#7p@L!' that is unique to this account.", "isCorrect": false, "rationale": "While unique and complex, the text specifies that strong passwords should be 'at least 12 characters long,' and this option is only 9 characters, making it less secure than recommended."}, {"text": "Reusing a strong password you already use for another non-critical account to ensure you remember it.", "isCorrect": false, "rationale": "The text explicitly states 'Unique for every account—do not reuse passwords. If one account is breached, all reused passwords become vulnerable,' making this a risky practice."}]}, {"question": "According to the section, what is the primary benefit of using a reputable password manager?", "options": [{"text": "It completely eliminates the need for passwords by using biometric identification instead.", "isCorrect": false, "rationale": "The text states that a password manager securely stores passwords and fills them in automatically, but it does not eliminate the need for passwords; it stores them. Biometric identification is not mentioned as its primary function."}, {"text": "It protects only financial accounts, leaving other online accounts vulnerable.", "isCorrect": false, "rationale": "The text implies a password manager stores 'all your passwords,' not just financial ones, making it a comprehensive solution for various accounts."}, {"text": "It allows individuals to use unique, complex passwords for every account without having to remember them all.", "isCorrect": true, "rationale": "The text explains that 'remembering dozens of unique, complex passwords is impossible for most people' and that a password manager 'securely stores all your passwords... You only need to remember one strong password; the manager fills in the rest automatically,' directly supporting this option."}, {"text": "It automatically enables two-factor authentication (2FA) for all linked accounts.", "isCorrect": false, "rationale": "While a password manager is a powerful security tool, it does not automatically enable 2FA; 2FA is a separate security feature that users must enable themselves on individual accounts, as per the text."}]}, {"question": "You are enabling two-factor authentication (2FA) on your online accounts. Based on the provided text, which account should you prioritize protecting with 2FA and why?", "options": [{"text": "Your social media account, because it contains personal information that scammers can use.", "isCorrect": false, "rationale": "While social media privacy is important, the text specifically identifies another account as the 'master key' that should be prioritized for 2FA."}, {"text": "Your primary email account, because it serves as the 'master key' to reset passwords on other digital services.", "isCorrect": true, "rationale": "The text explicitly states, 'Your email account is the “master key” to your digital life: if a thief gains access to your email, they can reset passwords on your other accounts. Protecting it with 2FA is essential.'"}, {"text": "Your banking account, because it directly holds your financial assets.", "isCorrect": false, "rationale": "The text advises enabling 2FA on 'every account that offers it—especially your email, bank, and any account linked to financial information.' While important, the email account is highlighted as the 'master key' due to its ability to compromise *other* accounts."}, {"text": "Any account storing family photos, to prevent unauthorized access to personal memories.", "isCorrect": false, "rationale": "The text emphasizes protecting accounts linked to financial information and the email account as the 'master key,' not specifically photo storage accounts."}]}, {"question": "Sarah is planning a two-week vacation to Europe. She wants to share her excitement with her friends and family online. Based on the social media privacy guidelines, what is the safest practice for Sarah?", "options": [{"text": "Posting live updates and photos from her trip as she visits each new city.", "isCorrect": false, "rationale": "The text advises to 'Avoid posting vacation plans in real time—this tells potential burglars you are away from home,' which extends to live updates and photos that reveal her absence."}, {"text": "Sharing her exact travel dates and itinerary with her closest friends via a public post.", "isCorrect": false, "rationale": "Publicly sharing exact travel dates and itineraries directly alerts potential burglars that her home will be vacant, contradicting the advice to avoid posting vacation plans in real time."}, {"text": "Waiting until after she returns home to share her vacation photos and stories.", "isCorrect": true, "rationale": "This aligns with the advice to 'Avoid posting vacation plans in real time' by not indicating her absence from home until she has returned, thus mitigating the risk of burglary."}, {"text": "Accepting all new friend requests before her trip to ensure a wider audience sees her posts.", "isCorrect": false, "rationale": "The text warns to 'Be skeptical of friend or follow requests from people you don't know' as this can expose personal information to potential scammers or criminals."}]}, {"question": "While traveling, you find yourself needing to quickly check your bank account balance and pay a bill using a public Wi-Fi network at an airport. What is the most secure approach, according to the text?", "options": [{"text": "Access your bank account directly as long as you use a strong, unique password.", "isCorrect": false, "rationale": "The text advises to 'Avoid accessing your bank account, investment accounts, or other financial services on public Wi-Fi' because data can be intercepted on unsecured networks, regardless of password strength."}, {"text": "Use a Virtual Private Network (VPN) and ensure the bank's website URL shows 'HTTPS'.", "isCorrect": true, "rationale": "The text states, 'If you must use public Wi-Fi for sensitive tasks, use a VPN (Virtual Private Network), which encrypts your connection' and to 'Look for HTTPS (not just HTTP) in website URLs—this indicates an encrypted connection to that specific website.'"}, {"text": "Log in using a public computer in the airport business center, as it's likely maintained by the airport.", "isCorrect": false, "rationale": "The text explicitly states, 'Never log into accounts on public computers (library computers, hotel business centers),' due to the inherent security risks."}, {"text": "Assume the airport Wi-Fi is secure because it requires agreeing to terms and conditions.", "isCorrect": false, "rationale": "The text cautions that 'Public Wi-Fi networks... can be risky for sensitive activities. On an unsecured network, it may be possible for others to intercept data you send and receive,' regardless of terms and conditions."}]}, {"question": "Which of the following actions best represents a physical security measure for protecting your digital identity, as described in the text?", "options": [{"text": "Regularly updating your operating system and antivirus software.", "isCorrect": false, "rationale": "This is a digital security measure for software protection, not a physical security measure related to tangible items or real-world interactions mentioned in the 'Physical Security' section."}, {"text": "Enabling two-factor authentication on your online banking account.", "isCorrect": false, "rationale": "Two-factor authentication is a digital security feature, not a physical one."}, {"text": "Shredding bank statements and credit card offers before discarding them.", "isCorrect": true, "rationale": "The text lists 'Shred sensitive documents before discarding them: bank statements, credit card offers...' as a key practice under 'Physical Security,' directly matching this option."}, {"text": "Using a strong, unique passphrase for each of your online accounts.", "isCorrect": false, "rationale": "This is a digital security practice related to passwords, not a physical security measure."}]}, {"question": "Even after implementing strong passwords and 2FA, monitoring your accounts remains crucial. Which of the following is an essential practice for monitoring your accounts, according to the text?", "options": [{"text": "Only reporting suspicious charges if they exceed a very high monetary threshold.", "isCorrect": false, "rationale": "The text advises to 'Report unfamiliar charges immediately,' implying that all unfamiliar charges, regardless of amount, should be investigated."}, {"text": "Checking your bank and credit card statements at least monthly and requesting your free annual credit reports.", "isCorrect": true, "rationale": "The text states, 'Check your bank and credit card statements at least monthly. Report unfamiliar charges immediately' and 'Request your free credit reports from each of the three major bureaus annually... Look for unfamiliar accounts,' combining two key monitoring practices."}, {"text": "Relying solely on your bank's account alerts to notify you of any fraudulent activity.", "isCorrect": false, "rationale": "While account alerts are recommended ('Consider signing up for account alerts'), the text implies they are a supplementary measure, not a replacement for actively checking statements and credit reports."}, {"text": "Only reviewing your credit card statements, as banks typically have stronger fraud protection.", "isCorrect": false, "rationale": "The text recommends checking 'your bank and credit card statements,' indicating both are equally important for monitoring, not just credit card statements."}]}, {"question": "How does oversharing personal information on social media primarily contribute to the effectiveness of spear phishing attacks?", "options": [{"text": "It directly provides scammers with your passwords and usernames for various accounts.", "isCorrect": false, "rationale": "Social media oversharing provides personal details, but typically not direct login credentials. Passwords should be stored securely elsewhere."}, {"text": "It enables scammers to install malware on your devices through malicious links in your feed.", "isCorrect": false, "rationale": "While scammers might try to install malware, oversharing itself doesn't directly enable this; rather, it makes the initial phishing attempt more convincing, which *then* might lead to malware."}, {"text": "It bypasses two-factor authentication (2FA) making accounts vulnerable even with this protection.", "isCorrect": false, "rationale": "Oversharing does not bypass 2FA; 2FA requires a 'something you have' factor in addition to a password, which is a separate layer of security."}, {"text": "It provides scammers with personal details (like hometown, employer, pet's name) to craft highly believable and targeted fake messages.", "isCorrect": true, "rationale": "The text states, 'A scammer who knows your hometown, employer, birthday, and pet's name can craft phishing messages that sound personal and believable,' and 'Oversharing on social media makes spear phishing more effective. Spear phishing is a targeted version of phishing where the scammer researches you personally to make their message more convincing.'"}]}, {"question": "The text highlights several key steps for protecting your digital identity. Which of the following is explicitly described as 'one of the most impactful steps' you can take for digital security?", "options": [{"text": "Consistently using strong passwords for all accounts.", "isCorrect": false, "rationale": "While strong passwords are the 'first line of defense,' the text identifies a specific tool related to managing these passwords as 'one of the most impactful steps.'"}, {"text": "Enabling two-factor authentication on every account that offers it.", "isCorrect": false, "rationale": "Enabling 2FA is stated as 'essential' for critical accounts like email, but the text uses the phrase 'one of the most impactful steps' for a different security measure."}, {"text": "Using a reputable password manager to store and generate unique, complex passwords.", "isCorrect": true, "rationale": "The text explicitly states, 'Using a reputable password manager is one of the most impactful steps you can take for digital security.'"}, {"text": "Avoiding public Wi-Fi for sensitive tasks and always looking for HTTPS.", "isCorrect": false, "rationale": "These are important best practices for public Wi-Fi, but they are not singled out with the specific phrasing 'one of the most impactful steps' in the text."}]}, {"question": "A person rigorously creates unique, 15-character long passwords for all their online accounts and uses 2FA for banking and email. However, they frequently post detailed vacation plans on social media and rarely shred sensitive mail. What is the most accurate assessment of their digital security posture based on the text?", "options": [{"text": "They are completely secure because strong passwords and 2FA are the most critical defenses.", "isCorrect": false, "rationale": "While strong passwords and 2FA are crucial, the text emphasizes that 'protecting yourself from identity theft is not about being paranoid—it is about adopting a few consistent habits that dramatically reduce your risk,' implying a holistic approach is needed. Neglecting other areas leaves vulnerabilities."}, {"text": "They are only at risk when using public Wi-Fi networks for sensitive transactions.", "isCorrect": false, "rationale": "Their social media oversharing and neglect of physical security (not shredding mail) introduce significant risks beyond just public Wi-Fi, such as spear phishing and mail theft, as detailed in the text."}, {"text": "They remain vulnerable to identity theft due to social media oversharing and insufficient physical security practices.", "isCorrect": true, "rationale": "The text warns that 'what you share on social media can make you a more convincing target for scammers' (leading to spear phishing) and highlights that 'physical security matters too,' including shredding sensitive documents and collecting mail promptly to prevent theft of financial information."}, {"text": "Their only missing component is a password manager to streamline their strong password usage.", "isCorrect": false, "rationale": "While a password manager is highly recommended, their vulnerabilities extend beyond password management to social media privacy and physical security, which are distinct and equally important areas of protection according to the text."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
