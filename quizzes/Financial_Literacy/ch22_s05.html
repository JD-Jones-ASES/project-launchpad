    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "What is the primary purpose of $life insurance$?", "options": [{"text": "To replace your income and protect the people who depend on you financially if you die", "isCorrect": true, "rationale": "Life insurance is designed to protect dependents — people who would suffer financially without your income. It is not primarily about protecting you, but about protecting those who rely on your earnings."}, {"text": "To build savings that you can access while you are still alive", "isCorrect": false, "rationale": "That describes the cash value component of whole life insurance, which is not the primary purpose of life insurance overall."}, {"text": "To protect you against health care costs and disability", "isCorrect": false, "rationale": "Health insurance and disability insurance cover medical costs and income replacement due to disability. Life insurance is specifically for income replacement upon death."}, {"text": "To pay off personal debts so your family does not inherit them", "isCorrect": false, "rationale": "Debt payoff can be one use of a death benefit, but the primary purpose of life insurance is income replacement for dependents."}], "id": "q01"}, {"question": "According to the text, who primarily NEEDS life insurance?", "options": [{"text": "Anyone who has dependents (spouses, children, or others) who rely on their income", "isCorrect": true, "rationale": "The core test is: does anyone depend on your income? If yes, life insurance protects them. If no, it may not be an immediate priority."}, {"text": "Everyone over age 18, regardless of dependents", "isCorrect": false, "rationale": "Single young adults with no dependents are specifically described as not yet needing a large life insurance policy."}, {"text": "Only married individuals with children under 18", "isCorrect": false, "rationale": "The text is broader — any person with someone depending on their income may need coverage, not just married parents."}, {"text": "Anyone with significant debt, whether or not they have dependents", "isCorrect": false, "rationale": "While debt is a factor in coverage amount, the primary need driver is whether someone depends on your income — not just whether you have debt."}], "id": "q02"}, {"question": "What is the most important insurance-related step for a young adult with no dependents, according to the text?", "options": [{"text": "Ensuring existing accounts (bank, retirement) have properly named beneficiaries", "isCorrect": true, "rationale": "Naming beneficiaries on existing accounts is the most important step for young adults — it takes five minutes, costs nothing, and ensures assets go to the right people."}, {"text": "Purchasing a whole life insurance policy immediately", "isCorrect": false, "rationale": "Whole life insurance is described as very expensive and usually inappropriate for young adults without dependents."}, {"text": "Buying a minimum $500,000 term life policy", "isCorrect": false, "rationale": "Without dependents, a large term policy is not the top priority. Beneficiary designations on existing accounts are more urgent."}, {"text": "Contributing the maximum to a 401(k) before considering any insurance", "isCorrect": false, "rationale": "While retirement saving is important, the text identifies beneficiary naming as the key insurance-adjacent step for young adults without dependents."}], "id": "q03"}, {"question": "What is $term life insurance$?", "options": [{"text": "Coverage for a specific period of time (term); beneficiaries receive a death benefit if you die during the term; no payout if you outlive it", "isCorrect": true, "rationale": "Term life provides pure protection for a defined period (10, 20, or 30 years) at a relatively low cost. It has no investment component."}, {"text": "Coverage that lasts your entire life and builds cash value over time", "isCorrect": false, "rationale": "That describes whole life (permanent) insurance, not term life."}, {"text": "A policy that invests part of your premium in the stock market", "isCorrect": false, "rationale": "Policies with investment components are types of permanent insurance (like variable life). Term life is pure protection with no investment element."}, {"text": "Coverage that pays out regardless of when you die, even after the term ends", "isCorrect": false, "rationale": "Term life only pays if you die during the specified term. If you outlive the policy, it ends with no payout."}], "id": "q04"}, {"question": "Which of the following is a key advantage of $term life insurance$ over $whole life insurance$?", "options": [{"text": "Much lower premiums — especially when purchased young and healthy", "isCorrect": true, "rationale": "Term premiums can be 5-15 times lower than whole life for the same death benefit. For most people, term provides the most coverage per dollar spent."}, {"text": "It builds cash value that can be borrowed against", "isCorrect": false, "rationale": "Cash value is a feature of whole life, not term life. Term life is pure protection with no savings component."}, {"text": "It never expires as long as premiums are paid", "isCorrect": false, "rationale": "That describes whole life. Term life ends at the conclusion of the specified term."}, {"text": "Higher commissions make it more accessible through insurance agents", "isCorrect": false, "rationale": "Whole life — not term — generates higher commissions. Term is often pushed less by agents for this reason."}], "id": "q05"}, {"question": "What is $whole life insurance$ also called, and what distinguishes it from term life?", "options": [{"text": "Permanent life insurance — it covers your entire lifetime and builds a cash value component", "isCorrect": true, "rationale": "Whole life (permanent) insurance provides lifetime coverage and accumulates cash value that can be borrowed against. These features make it far more expensive than term life."}, {"text": "Universal life insurance — it adjusts premiums based on your changing income each year", "isCorrect": false, "rationale": "Universal life is a separate type of permanent insurance. Whole life is the specific term used for permanent coverage with cash value."}, {"text": "Convertible life insurance — it can be converted to term coverage at any time", "isCorrect": false, "rationale": "Some term policies have conversion riders, but whole life is not called 'convertible life insurance.'"}, {"text": "Indexed life insurance — premiums are tied to the Consumer Price Index", "isCorrect": false, "rationale": "Indexed life insurance is a specific product type unrelated to the basic definition of whole life."}], "id": "q06"}, {"question": "Whole life premiums can be how many times higher than term life for the same $death benefit$?", "options": [{"text": "5-15 times higher", "isCorrect": true, "rationale": "The text states that whole life premiums can be 5-15 times higher than term life for the same death benefit — a major cost difference that makes whole life inappropriate for most people."}, {"text": "2-3 times higher", "isCorrect": false, "rationale": "The difference is much greater. The text cites 5-15 times higher for the same death benefit."}, {"text": "About the same — just spread over a longer period", "isCorrect": false, "rationale": "Whole life is dramatically more expensive, not approximately the same. The cost difference is 5-15 times for equal coverage."}, {"text": "50-100 times higher due to the investment component", "isCorrect": false, "rationale": "The difference is significant (5-15x) but not as extreme as 50-100x."}], "id": "q07"}, {"question": "Why do most financial educators recommend $term life$ over $whole life$ for income replacement?", "options": [{"text": "The high cost of whole life means cash value growth is poor compared to buying term and investing the premium difference in a retirement account", "isCorrect": true, "rationale": "For most people, separating insurance from investing — 'buy term and invest the rest' — produces better outcomes than whole life policies with their high costs and modest cash value growth."}, {"text": "Whole life insurance premiums are not tax-deductible, reducing its value", "isCorrect": false, "rationale": "Neither term nor whole life premiums are typically tax-deductible for individuals. The recommendation is based on cost efficiency, not tax treatment."}, {"text": "Term life builds more cash value than whole life over a 20-year period", "isCorrect": false, "rationale": "Term life has no cash value. The recommendation is to buy term for insurance and use the premium savings for separate investments."}, {"text": "Whole life policies expire after 10 years regardless of premium payments", "isCorrect": false, "rationale": "Whole life is permanent coverage — it never expires as long as premiums are paid. The issue is cost, not expiration."}], "id": "q08"}, {"question": "A person earns $50,000 per year and has two young children. Using the 10-12x rule, what is the recommended life insurance coverage range?", "options": [{"text": "$500,000 to $600,000", "isCorrect": true, "rationale": "$50,000 × 10 = $500,000 and $50,000 × 12 = $600,000. This amount would allow the surviving family to replace the lost income during the years the children are growing up."}, {"text": "$250,000 to $300,000", "isCorrect": false, "rationale": "This is too low. The 10-12x multiplier on $50,000 income yields $500,000-$600,000."}, {"text": "$100,000 to $150,000", "isCorrect": false, "rationale": "This falls far short of the recommended range. Multiply annual income by 10-12, not 2-3."}, {"text": "$1,000,000 to $1,200,000", "isCorrect": false, "rationale": "This would require a 20-24x multiplier. The standard rule of thumb is 10-12 times annual income."}], "id": "q09"}, {"question": "What is a $death benefit$ in the context of life insurance?", "options": [{"text": "The lump sum paid to your beneficiaries when you die", "isCorrect": true, "rationale": "The death benefit is the payout amount specified in the policy. It is paid to the named beneficiaries upon the insured's death."}, {"text": "A portion of your premium returned if you outlive the policy", "isCorrect": false, "rationale": "Standard term policies provide no return of premium when you outlive the term. The death benefit is only paid if you die during the coverage period."}, {"text": "Monthly income payments made to your spouse during your working years", "isCorrect": false, "rationale": "Life insurance pays a lump sum (or occasionally income stream) after death, not payments during the insured's lifetime."}, {"text": "The investment return earned on your policy's cash value", "isCorrect": false, "rationale": "Cash value returns are separate from the death benefit. The death benefit is the specific amount paid to beneficiaries upon death."}], "id": "q10"}, {"question": "What is $underwriting$ in the context of life insurance?", "options": [{"text": "The process the insurer uses to evaluate your health risk and set your premium", "isCorrect": true, "rationale": "Underwriting assesses factors like age, health, and lifestyle to determine how much risk the insurer takes on and therefore what premium to charge. Younger and healthier applicants receive lower premiums."}, {"text": "The process of selecting which beneficiaries receive the death benefit", "isCorrect": false, "rationale": "Beneficiary selection is done by the policyholder, not the insurer. Underwriting is the insurer's risk assessment process."}, {"text": "The legal process of verifying a death before paying the benefit", "isCorrect": false, "rationale": "Verifying a death before paying is a claims process, not underwriting. Underwriting happens when you apply for coverage."}, {"text": "A government review of insurance companies' financial stability", "isCorrect": false, "rationale": "Insurance company financial reviews are done by state regulators. Underwriting is the individual risk assessment for a specific policy applicant."}], "id": "q11"}, {"question": "Which factors might increase how much $life insurance coverage$ a person needs beyond the basic 10-12x rule?", "options": [{"text": "More dependents, a stay-at-home spouse, large debts, or a dependent with high-cost special needs", "isCorrect": true, "rationale": "These factors mean more financial obligations for survivors and therefore a greater need for replacement income — all of which justify coverage above the basic rule of thumb."}, {"text": "Having a high credit score and no prior claims history", "isCorrect": false, "rationale": "Credit score and claims history affect your premium rate, not the coverage amount you need."}, {"text": "Being enrolled in a workplace 401(k) plan", "isCorrect": false, "rationale": "Having a 401(k) is a separate financial consideration. Coverage needs are determined by what your dependents would need to replace your income."}, {"text": "Owning a newer vehicle that has higher replacement value", "isCorrect": false, "rationale": "Vehicle value is unrelated to life insurance needs. Coverage is about income replacement for dependents."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
