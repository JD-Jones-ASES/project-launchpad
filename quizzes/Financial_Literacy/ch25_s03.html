    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

        Scholastica Codex &mdash; Self-Grading Quiz

</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the foundational step before exploring additional strategies to reduce college costs?", "options": [{"text": "Securing an out-of-state scholarship.", "isCorrect": false, "rationale": "While a scholarship helps, the text states the foundational step is 'After maximizing free aid,' implying this comes first."}, {"text": "Maximizing free aid like grants and scholarships.", "isCorrect": true, "rationale": "The text explicitly states, 'After maximizing free aid, there are additional strategies...,' indicating this is the initial and foundational step."}, {"text": "Enrolling in a for-profit college for faster training.", "isCorrect": false, "rationale": "The text warns against for-profit colleges due to potential issues with costs, graduation rates, and loan defaults, making this an ill-advised strategy, not a foundational step."}, {"text": "Immediately taking a heavy course load to graduate early.", "isCorrect": false, "rationale": "Graduating early is a strategy to reduce costs, but it is one of the 'additional strategies' mentioned after maximizing free aid, not the foundational first step."}], "id": "q01"}, {"question": "Based on Marcus's scenario, if a student wants to earn a bachelor's degree from a state university and chooses the community college transfer path, what is the primary financial benefit highlighted?", "options": [{"text": "Guaranteeing immediate job placement after graduation.", "isCorrect": false, "rationale": "The text does not mention job placement as a benefit of the community college transfer path; it focuses on cost savings."}, {"text": "Completing the degree in a shorter amount of time.", "isCorrect": false, "rationale": "Marcus's scenario shows both options taking four years total, so completing the degree faster is not the primary benefit highlighted for this strategy."}, {"text": "Significantly reducing the total cost of tuition and living expenses.", "isCorrect": true, "rationale": "Marcus's example clearly demonstrates a $41,000 savings by attending community college for two years and living at home, which significantly reduces overall tuition and living expenses."}, {"text": "Gaining a more prestigious degree than direct university enrollment.", "isCorrect": false, "rationale": "The text explicitly states Marcus 'graduates with the same bachelor's degree from the same four-year university,' indicating no change in prestige."}], "id": "q02"}, {"question": "Before committing to the community college transfer strategy, what crucial step does the text advise students to take?", "options": [{"text": "Enroll in summer sessions at the four-year university.", "isCorrect": false, "rationale": "Attending summer sessions is a strategy to graduate faster, but not a prerequisite or crucial step *before* enrolling in community college for transfer purposes."}, {"text": "Verify that all community college credits will transfer and be accepted toward their intended degree.", "isCorrect": true, "rationale": "The text emphasizes, 'Important: Always verify that community college credits will transfer and be accepted toward your intended degree before enrolling.'"}, {"text": "Secure an employer tuition reimbursement plan.", "isCorrect": false, "rationale": "Employer tuition reimbursement is another cost-reduction strategy, but it's unrelated to the specific due diligence required for community college credit transfer."}, {"text": "Purchase an on-campus meal plan for convenience.", "isCorrect": false, "rationale": "This relates to living expenses, which the community college strategy often aims to reduce by living at home, and is not a crucial step for credit transfer."}], "id": "q03"}, {"question": "A student is considering an out-of-state public university with a high sticker price. What advice does the text offer regarding this decision?", "options": [{"text": "Out-of-state schools are always more expensive and should be avoided.", "isCorrect": false, "rationale": "The text states, 'sometimes out-of-state schools with generous scholarship aid end up being cheaper than in-state options,' contradicting this absolute statement."}, {"text": "Focus solely on the tuition difference, as it's the largest cost.", "isCorrect": false, "rationale": "The text advises comparing 'net prices,' which includes tuition, fees, and aid, not just the sticker price or tuition difference in isolation."}, {"text": "Compare the net price, as generous scholarships might make it cheaper than an in-state option.", "isCorrect": true, "rationale": "The text explicitly advises, 'Before choosing an out-of-state school, compare net prices—sometimes out-of-state schools with generous scholarship aid end up being cheaper than in-state options.'"}, {"text": "It's best to establish residency in the new state immediately to qualify for in-state tuition.", "isCorrect": false, "rationale": "While establishing residency *can* reduce costs, the text does not offer this as immediate advice for *before* choosing an out-of-state school; it focuses on net price comparison."}], "id": "q04"}, {"question": "Which of the following strategies allows students to earn college credit while still in high school or for a relatively low cost, thereby potentially reducing the time and overall expense of a bachelor's degree?", "options": [{"text": "Employer tuition reimbursement programs.", "isCorrect": false, "rationale": "Employer tuition reimbursement is for employees, typically after high school, and doesn't involve earning credit *while in high school*."}, {"text": "Living off-campus strategically during college.", "isCorrect": false, "rationale": "Living off-campus is a strategy to reduce living expenses during college, not to earn college credit earlier."}, {"text": "Dual enrollment, Advanced Placement (AP) exams, and CLEP tests.", "isCorrect": true, "rationale": "The text lists 'Dual enrollment: Take college courses in high school' and 'Advanced Placement (AP) and CLEP exams: ...to earn college credit by examination' as methods to earn credit early."}, {"text": "Participating in work-study programs.", "isCorrect": false, "rationale": "Work-study is a way to earn money during college to cover expenses, not to earn college credit prior to or during the initial enrollment phase."}], "id": "q05"}, {"question": "To effectively graduate in four years or fewer and reduce overall college costs, what combination of actions is recommended?", "options": [{"text": "Attending a for-profit college and taking only required courses.", "isCorrect": false, "rationale": "The text warns against for-profit colleges due to various risks, and simply taking required courses isn't the complete strategy for accelerated graduation."}, {"text": "Taking heavier course loads, attending summer sessions, and choosing a clear major early.", "isCorrect": true, "rationale": "The text explicitly states: 'Taking heavier course loads, attending summer sessions, and choosing a clear major early reduces total cost' by shortening time-to-degree."}, {"text": "Relying solely on military education benefits for tuition coverage.", "isCorrect": false, "rationale": "Military benefits are a funding source, but they don't inherently shorten the time it takes to earn a degree or dictate the academic path."}, {"text": "Living in expensive on-campus dormitories to improve focus.", "isCorrect": false, "rationale": "Living on-campus can be more expensive, which contradicts the goal of reducing costs, and doesn't directly contribute to graduating faster."}], "id": "q06"}, {"question": "The text suggests living off-campus 'strategically.' What is the main reason this is considered a cost-reduction strategy?", "options": [{"text": "It always provides a quieter study environment than dorms.", "isCorrect": false, "rationale": "While possible, the primary benefit highlighted in the text is financial, not environmental for studying."}, {"text": "Off-campus housing and self-prepared food can be substantially cheaper than dorms and meal plans.", "isCorrect": true, "rationale": "The text states: 'On-campus meal plans and dormitories are convenient but often expensive. In many college towns, renting a room and cooking your own food is substantially cheaper.'"}, {"text": "It allows students to commute from their parents' homes regardless of distance.", "isCorrect": false, "rationale": "Living off-campus doesn't necessarily mean living at home, and the cost benefit is derived from cheaper rent/food in the college town itself, not universal commuting."}, {"text": "On-campus options are rarely available for upperclassmen.", "isCorrect": false, "rationale": "The text does not mention availability as a factor, but rather the cost-effectiveness of off-campus living."}], "id": "q07"}, {"question": "What do employer tuition reimbursement and military education benefits primarily offer students seeking to make college more affordable?", "options": [{"text": "Opportunities to earn college credit while in high school.", "isCorrect": false, "rationale": "These benefits are typically for adults/employees/service members, not high school students earning early credit."}, {"text": "Direct financial coverage for significant portions of college costs, often without debt.", "isCorrect": true, "rationale": "The text notes that employer reimbursement 'can fund graduate school or an undergraduate degree without debt' and military benefits 'can cover substantial portions of college cost.'"}, {"text": "Guaranteed admission to highly selective universities.", "isCorrect": false, "rationale": "These benefits are financial aid mechanisms, not admissions guarantees."}, {"text": "The ability to transfer credits easily between different institutions.", "isCorrect": false, "rationale": "Credit transferability is a separate issue, often addressed by articulation agreements, not directly by these funding sources."}], "id": "q08"}, {"question": "A student receives an acceptance letter from a private university with a $55,000 sticker price and an aid package of $40,000 in grants. They also got into a public university with a $25,000 sticker price and no aid. According to the 'moneytip' section, which school is financially more affordable for this student?", "options": [{"text": "The public university, because its sticker price is lower.", "isCorrect": false, "rationale": "The 'moneytip' warns against comparing sticker prices and emphasizes calculating the 'net price' after aid."}, {"text": "The private university, as its net price is $15,000 compared to the public university's $25,000.", "isCorrect": true, "rationale": "Net price for private university: $55,000 (sticker) - $40,000 (grant aid) = $15,000. Net price for public university: $25,000 (sticker) - $0 (aid) = $25,000. The private university is cheaper at $15,000 out of pocket."}, {"text": "Both schools are equally affordable, as the difference in sticker price matches the grant aid.", "isCorrect": false, "rationale": "The net prices are different ($15,000 vs. $25,000), meaning they are not equally affordable."}, {"text": "It's impossible to tell without knowing the exact room and board costs for both.", "isCorrect": false, "rationale": "While room and board are part of total cost, the 'moneytip' specifically focuses on the sticker price versus net price after grant aid, providing enough information for this direct comparison as taught in the text."}], "id": "q09"}, {"question": "The text warns against 'For-Profit' colleges. What key indicators does it suggest students research carefully using independent sources before enrolling in such institutions?", "options": [{"text": "The number of alumni who donate to the college's endowment fund.", "isCorrect": false, "rationale": "The text does not mention alumni donations as a key indicator to research for for-profit colleges."}, {"text": "Graduation rates, job placement rates, credit transferability, and student-loan default rates.", "isCorrect": true, "rationale": "The 'warning' section explicitly advises checking 'graduation rates, job placement rates, and whether credits transfer' and mentions 'high student-loan default rates,' suggesting these are critical research points."}, {"text": "The average class size and the professor-to-student ratio.", "isCorrect": false, "rationale": "While these can be factors in choosing a school, they are not among the specific, critical warnings listed for for-profit colleges in the text."}, {"text": "The variety of extracurricular activities and on-campus events.", "isCorrect": false, "rationale": "Extracurriculars are not mentioned as crucial factors when evaluating the risks associated with for-profit colleges."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
