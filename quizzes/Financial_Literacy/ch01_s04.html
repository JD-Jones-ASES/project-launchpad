<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 1, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A small business owner wants to refuse a $100 bill from a customer paying for groceries. Under U.S. law, what is the most accurate statement regarding the business owner's ability to do so?", "options": [{"text": "The owner must accept it because U.S. currency is legal tender.", "isCorrect": false, "rationale": "While U.S. currency is legal tender, the text clarifies that private businesses are permitted to set their own payment policies regarding the acceptance of specific denominations or forms of payment for transactions."}, {"text": "The owner can refuse it because private businesses set their own payment policies.", "isCorrect": true, "rationale": "The 'Legal Tender in Action' section explicitly states, 'A shop owner can refuse to accept a $100 bill (private businesses can set their own payment policies).' This highlights the distinction between private transaction policies and the legal requirement for debt repayment."}, {"text": "The owner can refuse it only if the customer is not a U.S. citizen.", "isCorrect": false, "rationale": "The citizenship of the customer is not a factor mentioned in the text regarding a business's right to refuse certain forms of payment."}, {"text": "The owner must accept it if the customer is paying a pre-established debt.", "isCorrect": false, "rationale": "This scenario describes a new transaction for goods, not the repayment of an established debt. Legal tender laws protect debtors in the context of existing debts, not necessarily a business's policy on new purchases."}], "id": "q01"}, {"question": "While U.S. currency is declared legal tender, historical examples like Germany in 1923 demonstrate that government backing alone is insufficient to maintain a currency's value. What critical factor, beyond legal declaration, is essential for money to retain its utility?", "options": [{"text": "The physical material the money is printed on.", "isCorrect": false, "rationale": "The text explicitly states that the physical material of a $20 bill is 'worth a few cents to manufacture' and does not give money its value."}, {"text": "The total amount of gold reserves held by the government.", "isCorrect": false, "rationale": "The text does not mention gold reserves as a primary factor in giving the U.S. dollar its value in the modern context; it focuses on legal tender, trust, and monetary policy."}, {"text": "Public trust in the currency's future acceptance and stable purchasing power.", "isCorrect": true, "rationale": "The text states, 'Beyond legal force, money requires something more fundamental: trust. People accept money because they believe other people will also accept it.' This shared agreement and belief in its stability is crucial."}, {"text": "Strict limits on international currency exchange rates.", "isCorrect": false, "rationale": "While exchange rates are important for international trade, they are not presented as the fundamental factor that gives money its value, independent of legal tender and trust, according to the text."}], "id": "q02"}, {"question": "According to the text, which of the following is NOT listed as a factor that builds trust in a currency over time?", "options": [{"text": "Stability: The currency maintains reasonably consistent purchasing power.", "isCorrect": false, "rationale": "This is one of the three factors explicitly listed under 'Trust in a currency is built over time through:'."}, {"text": "Institutional credibility: The government and central bank manage the money supply responsibly.", "isCorrect": false, "rationale": "This is one of the three factors explicitly listed under 'Trust in a currency is built over time through:'."}, {"text": "Economic strength: The currency is backed by a large, productive economy with functioning laws and contracts.", "isCorrect": false, "rationale": "This is one of the three factors explicitly listed under 'Trust in a currency is built over time through:'."}, {"text": "The continuous increase in the national debt.", "isCorrect": true, "rationale": "The text does not list an increasing national debt as a factor that builds trust. In fact, large, unmanaged debt can often contribute to a loss of fiscal discipline, which undermines trust."}], "id": "q03"}, {"question": "Which statement best describes the concept of inflation as defined in the text?", "options": [{"text": "A temporary decrease in the price of a single commodity.", "isCorrect": false, "rationale": "The definition specifies 'general, sustained increase in the price level of goods and services,' not a temporary decrease or a single commodity."}, {"text": "A general, sustained increase in the price level of goods and services in an economy.", "isCorrect": true, "rationale": "This is the direct definition provided in the text: 'Inflation is a general, sustained increase in the price level of goods and services in an economy.'"}, {"text": "A rise in the exchange rate of a domestic currency against foreign currencies.", "isCorrect": false, "rationale": "While related to economic health, this is a definition of currency appreciation, not inflation as described in the text."}, {"text": "An increase in the total volume of money printed by the central bank.", "isCorrect": false, "rationale": "An increase in the money supply can be a cause of inflation, but it is not the definition of inflation itself, which refers to the resulting increase in prices."}], "id": "q04"}, {"question": "If a student observes that the cost of their favorite textbook has increased from $100 last year to $110 this year, while their allowance remained the same, this is an example of:", "options": [{"text": "An increase in purchasing power.", "isCorrect": false, "rationale": "An increase in prices means the same amount of money buys less, indicating a decrease, not an increase, in purchasing power."}, {"text": "The Federal Reserve lowering interest rates.", "isCorrect": false, "rationale": "While the Fed's actions can influence inflation, the observation itself (rising prices and reduced buying capacity) is a direct manifestation of inflation eroding purchasing power, not the Fed's specific action."}, {"text": "Inflation eroding the purchasing power of their money.", "isCorrect": true, "rationale": "The text defines purchasing power as 'the quantity of goods and services that a given amount of money can buy,' and states, 'When inflation rises, purchasing power falls—the same amount of money buys fewer things.' The textbook example directly illustrates this."}, {"text": "Deflation leading to a stronger dollar.", "isCorrect": false, "rationale": "Deflation is a decrease in the price level. Since the price increased, this is the opposite of deflation."}], "id": "q05"}, {"question": "The text states that a modest, stable rate of inflation (around 2% per year) is considered healthy for an economy. What is the primary reason given for this?", "options": [{"text": "It makes imported goods cheaper, boosting trade.", "isCorrect": false, "rationale": "The text does not mention this as a reason for healthy inflation. Inflation typically makes domestic goods more expensive relative to foreign goods, potentially hindering exports."}, {"text": "It encourages people to hoard cash, increasing savings.", "isCorrect": false, "rationale": "The text explicitly states it 'encourages people to invest and spend rather than hoard cash' because inflation erodes the value of hoarded cash."}, {"text": "It motivates investment and spending while allowing for gradual wage increases.", "isCorrect": true, "rationale": "The text states, 'It encourages people to invest and spend rather than hoard cash, and it gives businesses room to raise wages gradually.' This captures the primary benefits."}, {"text": "It directly increases the physical value of the currency itself.", "isCorrect": false, "rationale": "Money's value is not tied to its physical material, and inflation, even modest, means the dollar buys a little less, not that its physical value increases."}], "id": "q06"}, {"question": "During hyperinflation in Germany in 1923, what was one extreme measure people resorted to, illustrating the complete collapse of money's value?", "options": [{"text": "They used marks as an international reserve currency.", "isCorrect": false, "rationale": "The value of the mark collapsed dramatically, making it useless as a reserve currency."}, {"text": "They converted marks into large quantities of gold.", "isCorrect": false, "rationale": "While people might have sought other forms of wealth, the specific example given in the text is more drastic and illustrates the worthlessness of the banknotes themselves."}, {"text": "They burned banknotes for heat because the paper was worth more as fuel than as currency.", "isCorrect": true, "rationale": "The text describes this dire situation: 'People burned banknotes for heat because the paper was worth more as fuel than as currency,' highlighting the complete loss of monetary value."}, {"text": "They stockpiled marks in anticipation of future price stabilization.", "isCorrect": false, "rationale": "With prices doubling every few days, stockpiling marks would have led to massive losses as the money rapidly depreciated."}], "id": "q07"}, {"question": "A common misconception is that a government can solve economic problems by simply printing more money. According to the 'warning' section, why does this approach ultimately fail and leave everyone worse off?", "options": [{"text": "It leads to an increase in the physical supply of goods and services, causing overproduction.", "isCorrect": false, "rationale": "Printing money does not create more goods and services; it only increases the money in circulation."}, {"text": "It causes more dollars to chase the same amount of goods, driving prices up and destroying purchasing power.", "isCorrect": true, "rationale": "The 'warning' box explicitly states, 'Printing money without a corresponding growth in goods and services simply means more dollars chasing the same amount of stuff—which drives prices up and leaves everyone worse off.'"}, {"text": "It stabilizes the value of the currency by increasing its availability.", "isCorrect": false, "rationale": "Excessive printing of money destabilizes the currency and erodes its value, as seen in hyperinflation examples."}, {"text": "It only affects the wealthiest citizens, leaving the poor unaffected.", "isCorrect": false, "rationale": "Hyperinflation affects everyone, often disproportionately harming those with fewer assets or fixed incomes, as their savings and wages rapidly lose value."}], "id": "q08"}, {"question": "How does the U.S. Federal Reserve primarily work to maintain the stability of the dollar's purchasing power?", "options": [{"text": "By directly setting the prices of essential goods and services.", "isCorrect": false, "rationale": "The Federal Reserve does not engage in direct price controls; its tools operate through managing the money supply and interest rates."}, {"text": "By continuously printing more money to keep pace with economic growth.", "isCorrect": false, "rationale": "Continuously printing money, especially in excess of economic growth, leads to inflation and erodes purchasing power, rather than stabilizing it."}, {"text": "By managing the money supply, including setting interest rates, to control inflation and stimulate activity.", "isCorrect": true, "rationale": "The text states, 'The Federal Reserve... is the central bank responsible for managing the money supply. Its main tools include setting interest rates and controlling how much money flows into the banking system.' This directly addresses how it maintains stability."}, {"text": "By requiring all private businesses to accept U.S. dollars for all transactions.", "isCorrect": false, "rationale": "This relates to legal tender laws, which are distinct from the Federal Reserve's active monetary policy tools for managing the money supply and inflation."}], "id": "q09"}, {"question": "Based on the entire section, what is the fundamental combination of factors that gives the U.S. dollar its real-world value and prevents catastrophic collapse, as seen in hyperinflationary examples?", "options": [{"text": "The intrinsic value of the paper and ink used, combined with international trade agreements.", "isCorrect": false, "rationale": "The text explicitly refutes the idea that the physical material gives money value and focuses on internal mechanisms rather than just external agreements."}, {"text": "Legal tender laws, public trust in its acceptance, and responsible monetary policy by the Federal Reserve.", "isCorrect": true, "rationale": "The concluding paragraph synthesizes these points: 'The combination of legal tender laws, public trust, and responsible monetary policy gives the dollar its real-world value.'"}, {"text": "The government's ability to directly control all market prices and wages.", "isCorrect": false, "rationale": "The text does not suggest the U.S. government directly controls prices and wages as the source of the dollar's value; it discusses monetary policy and market-based trust."}, {"text": "A fixed exchange rate with a precious metal like gold, ensuring its backing.", "isCorrect": false, "rationale": "The U.S. dollar is a fiat currency, not directly backed by gold, and the text emphasizes factors other than a commodity standard."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
