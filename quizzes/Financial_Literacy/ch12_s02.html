<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 12, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the primary reason automatic transfers are an effective saving strategy?", "options": [{"text": "They allow you to remember to save consistently.", "isCorrect": false, "rationale": "Automation removes the need to remember to save; it executes the transfer automatically."}, {"text": "They remove the decision of whether or not to save.", "isCorrect": true, "rationale": "The text states the solution is to 'remove the decision entirely,' which automatic transfers achieve by acting as a commitment device."}, {"text": "They require a strong exercise of willpower each month.", "isCorrect": false, "rationale": "Automation works precisely because it 'do[es] not have to exercise willpower,' moving money before you can decide to spend it."}, {"text": "They encourage you to make more impulse purchases.", "isCorrect": false, "rationale": "Automatic transfers prevent impulse purchases by moving money to savings 'before you can spend it.'"}], "id": "q01"}, {"question": "John frequently struggles with impulse purchases and finds that by mid-month, money he intended to save has disappeared. Based on the 'moneytip,' when should he set his automatic transfer to maximize his savings success?", "options": [{"text": "At the end of the month, after all bills are paid.", "isCorrect": false, "rationale": "Waiting until the end of the month leaves too much time for impulse spending, which the text warns against."}, {"text": "A few days after his paycheck arrives, once he's reviewed his budget.", "isCorrect": false, "rationale": "The 'moneytip' specifically advises against waiting 'even a day or two,' as money often disappears by then."}, {"text": "The same day his paycheck arrives, or as close to it as possible.", "isCorrect": true, "rationale": "The 'moneytip' recommends setting the transfer to occur 'the same day your paycheck arrives' to help adapt spending to the remaining balance."}, {"text": "The first day of the following month, to start fresh.", "isCorrect": false, "rationale": "This timing provides ample opportunity for the money to be spent on impulses, contradicting the advice to save immediately."}], "id": "q02"}, {"question": "Behavioral economists refer to automatic transfers as a 'commitment device.' Which characteristic of automation best aligns with this concept?", "options": [{"text": "The ability to set the transfer date to your preference.", "isCorrect": false, "rationale": "While a convenient feature, choosing the date itself isn't the core of limiting future choices."}, {"text": "The removal of the need to remember to save each month.", "isCorrect": false, "rationale": "This is a key benefit, but the 'commitment device' specifically refers to actively limiting future options."}, {"text": "The act of the money moving before you have the opportunity to spend it.", "isCorrect": true, "rationale": "This is the essence of a commitment device: 'limiting your future choices to help your future self stick to a plan you made when you were thinking clearly' by removing the money from immediate access."}, {"text": "The option to change the transfer amount if your financial situation changes.", "isCorrect": false, "rationale": "Flexibility to change the amount is not what makes it a commitment device; rather, it's the pre-set, unalterable nature of the transfer once scheduled."}], "id": "q03"}, {"question": "Based on the provided definition, what is the fundamental purpose of a sinking fund?", "options": [{"text": "To accumulate wealth for long-term investments like retirement.", "isCorrect": false, "rationale": "Sinking funds are for 'specific upcoming expense[s]' with a shorter time horizon, not general long-term investment."}, {"text": "To provide a readily available source of cash for unexpected emergencies.", "isCorrect": false, "rationale": "This describes an emergency fund. Sinking funds are for *planned* expenses, not unexpected ones."}, {"text": "To save a specific amount each month for a known, upcoming expense.", "isCorrect": true, "rationale": "The definition states, 'A sinking fund is a savings account... dedicated to a specific upcoming expense. You make regular, planned contributions so the money is available when the expense arrives.'"}, {"text": "To consolidate multiple small debts into one manageable payment.", "isCorrect": false, "rationale": "Sinking funds are about saving for future expenses, not managing existing debt consolidation."}], "id": "q04"}, {"question": "A family wants to save $1,500 for a new appliance they plan to buy in 10 months. How much should their monthly contribution to this sinking fund be?", "options": [{"text": "$100 per month.", "isCorrect": false, "rationale": "$100/month for 10 months would only yield $1,000."}, {"text": "$125 per month.", "isCorrect": false, "rationale": "$125/month for 10 months would only yield $1,250."}, {"text": "$150 per month.", "isCorrect": true, "rationale": "To reach a $1,500 goal in 10 months, the monthly contribution is $1,500 ÷ 10 = $150."}, {"text": "$200 per month.", "isCorrect": false, "rationale": "$200/month for 10 months would yield $2,000, which is more than the goal."}], "id": "q05"}, {"question": "What distinguishes a sinking fund from a general, undifferentiated savings account?", "options": [{"text": "Sinking funds typically offer higher interest rates.", "isCorrect": false, "rationale": "The text does not mention interest rates as a distinguishing factor; they depend on the bank, not the fund's purpose."}, {"text": "A sinking fund always requires separate physical accounts for each goal.", "isCorrect": false, "rationale": "The text states you can keep them in sub-accounts 'or track them in a spreadsheet,' meaning separate physical accounts are not always required."}, {"text": "A sinking fund has a specific, pre-determined purpose and target amount.", "isCorrect": true, "rationale": "The core definition of a sinking fund is that it is 'dedicated to a specific upcoming expense,' implying a clear purpose and target."}, {"text": "General savings accounts are primarily used for impulse purchases, while sinking funds are not.", "isCorrect": false, "rationale": "General savings accounts are for various purposes, including emergencies or unspecified future needs, not primarily impulse purchases."}], "id": "q06"}, {"question": "The 'moneytip' regarding naming savings accounts states that research shows what specific behavioral benefit?", "options": [{"text": "It helps banks categorize your funds for better investment returns.", "isCorrect": false, "rationale": "The text frames it as a 'behavioral trick' for the individual, not for bank investment processes."}, {"text": "It simplifies tax reporting for earned interest.", "isCorrect": false, "rationale": "The text does not mention any tax implications related to naming accounts."}, {"text": "It makes people less likely to withdraw money for non-designated purposes.", "isCorrect": true, "rationale": "The text explicitly states: 'Research shows that people are less likely to raid a savings account when it has a specific name and purpose.'"}, {"text": "It encourages greater transparency between family members about shared finances.", "isCorrect": false, "rationale": "The focus of the text is on individual behavioral influence, not family financial transparency."}], "id": "q07"}, {"question": "Isabella is managing three separate sinking funds for distinct goals. If her bank doesn't allow her to open multiple labeled sub-accounts, what method does the text suggest for tracking her progress and maintaining purpose for each dollar?", "options": [{"text": "Consolidate all three goals into one large savings account and spend from it as needed.", "isCorrect": false, "rationale": "This would negate the specific purpose of each sinking fund and lead to confusion, losing the 'each dollar has a purpose' benefit."}, {"text": "Prioritize the most urgent goal and abandon the others until it's met.", "isCorrect": false, "rationale": "The text provides an example of 'Multiple Sinking Funds,' implying simultaneous management, not abandonment."}, {"text": "Use a spreadsheet to track the contributions and balances for each individual fund.", "isCorrect": true, "rationale": "The text explicitly states for multiple sinking funds, 'You can keep all three in separate labeled savings sub-accounts, or track them in a spreadsheet.'"}, {"text": "Withdraw the money for each fund in cash and store it separately at home.", "isCorrect": false, "rationale": "The text discusses digital savings accounts and tracking methods, not physical cash storage."}], "id": "q08"}, {"question": "Both automatic transfers and sinking funds are presented as effective saving strategies. What common principle underpins their effectiveness in helping individuals reach their financial goals?", "options": [{"text": "They eliminate the need for any form of budgeting.", "isCorrect": false, "rationale": "These strategies complement budgeting by managing where money goes, but don't eliminate the need to plan overall spending."}, {"text": "They primarily increase the total income available for saving.", "isCorrect": false, "rationale": "These strategies manage how existing income is used for saving, rather than increasing the income itself."}, {"text": "They reduce reliance on willpower and pre-commit funds to specific purposes.", "isCorrect": true, "rationale": "Automation reduces willpower by removing the decision, and sinking funds pre-commit money to specific goals, effectively reducing decision fatigue and impulse spending."}, {"text": "They are primarily designed to help repay existing debt faster.", "isCorrect": false, "rationale": "While sinking funds help avoid *new* debt, their primary focus is on saving for future expenses, not accelerating existing debt repayment."}], "id": "q09"}, {"question": "Daniel wants to save $900 for a new gaming console in 6 months and is concerned he might spend the money impulsively before reaching his goal. Based on the strategies in the text, what is the *most effective combined approach* he should take?", "options": [{"text": "Manually transfer $150 each month to a generic savings account, hoping he remembers.", "isCorrect": false, "rationale": "This relies on memory and willpower and lacks the specific purpose and commitment benefits described for maximum effectiveness."}, {"text": "Set up an automatic transfer of $150 on his payday to a savings account labeled 'Gaming Console Fund.'", "isCorrect": true, "rationale": "This combines all recommended strategies: automation, timely transfer on payday, a sinking fund for a specific goal ($900/6=$150/month), and naming the account to deter raiding."}, {"text": "Put the $900 purchase on a credit card and pay it off in installments over six months.", "isCorrect": false, "rationale": "This involves incurring debt and potential interest, which the sinking fund strategy aims to avoid ('without stress or debt')."}, {"text": "Keep the $150 in his checking account each month and simply try not to spend it.", "isCorrect": false, "rationale": "This approach relies entirely on willpower and is highly susceptible to impulse spending, which Daniel is concerned about."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
