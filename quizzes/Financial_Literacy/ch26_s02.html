    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<div class="quiz-container">

        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 26, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best describes the primary purpose of a lease agreement in the context of renting?", "options": [{"text": "To guarantee that the landlord will never raise the rent during the tenancy.", "isCorrect": false, "rationale": "A lease specifies the monthly rent amount and due date for a set term, typically 12 months, but it does not guarantee rent will never be raised in future terms, nor does it typically address future rent control beyond the current lease term."}, {"text": "To establish a legally binding framework for the tenant-landlord financial and legal relationship.", "isCorrect": true, "rationale": "The text explicitly states that 'Renting is not just paying for a place to live—it is a legal and financial relationship governed by a contract.' The lease serves as this legally binding contract, outlining rights and responsibilities for both parties."}, {"text": "To outline the tenant's future purchasing options for the property.", "isCorrect": false, "rationale": "A lease agreement is for renting a property, not for purchasing it. Purchase options are typically covered in separate 'lease-to-own' or sales contracts, which are distinct from a standard rental lease."}, {"text": "To allow tenants to make any changes or renovations to the property without landlord permission.", "isCorrect": false, "rationale": "Lease agreements typically specify 'What is and is not allowed,' which includes rules regarding modifications to the property. Unauthorized changes are usually a violation of the lease terms."}]}, {"question": "According to the section, which of the following details is explicitly specified within a typical lease agreement?", "options": [{"text": "The tenant's credit score at the time of signing.", "isCorrect": false, "rationale": "While a landlord may check a tenant's credit score during the application process, the score itself is not typically written into the lease agreement as a specified term."}, {"text": "The specific types of furniture included in the rental.", "isCorrect": false, "rationale": "Unless the apartment is furnished, the specific types of furniture are generally not listed in a standard lease agreement. The lease focuses on the terms of tenancy, not inventory of personal items."}, {"text": "The notice period required for moving out.", "isCorrect": true, "rationale": "The text states that a lease specifies 'Notice periods for move-out (typically 30–60 days),' making this a key detail found in the contract."}, {"text": "A guarantee that utility prices will remain fixed for the duration of the lease.", "isCorrect": false, "rationale": "While a lease may state which utilities are included in the rent, it does not typically guarantee that the *prices* of utilities paid separately by the tenant will remain fixed. Utility prices are subject to change by providers."}]}, {"question": "A prospective tenant, Sarah, is told by a landlord during a viewing that pets are allowed, even though the lease document she is about to sign states 'No Pets Allowed.' Based on the provided text, what should Sarah do?", "options": [{"text": "Sign the lease, assuming the verbal agreement overrides the written one.", "isCorrect": false, "rationale": "The text explicitly advises, 'Never assume anything not in writing is enforceable. If the landlord says “oh, pets are fine” verbally, get it in writing or assume pets are not allowed.'"}, {"text": "Introduce her pet immediately after signing, relying on the landlord's verbal assurance.", "isCorrect": false, "rationale": "Relying solely on a verbal assurance when the written lease contradicts it can lead to a breach of contract and potential eviction, as verbal agreements are difficult to enforce if not documented."}, {"text": "Request that the landlord add a written amendment to the lease explicitly allowing pets before she signs.", "isCorrect": true, "rationale": "The text recommends, 'get it in writing or assume pets are not allowed.' Requesting a written amendment ensures the pet policy is legally binding and aligns with both parties' understanding."}, {"text": "Look for a different apartment, as verbal agreements are never valid under any circumstances.", "isCorrect": false, "rationale": "While the text emphasizes getting things in writing for enforceability, it doesn't state verbal agreements are 'never valid.' The issue is enforceability and proof, making written terms paramount in a lease context. Her best course is to seek written clarification."}]}, {"question": "An individual earns an annual gross income of $60,000. Applying the 30% rule for rent, what is the maximum affordable monthly rent for this individual?", "options": [{"text": "$1,800", "isCorrect": false, "rationale": "This calculation is incorrect. $60,000 / 12 months = $5,000 gross monthly income. $5,000 * 0.30 = $1,500."}, {"text": "$1,200", "isCorrect": false, "rationale": "This calculation is incorrect. $60,000 / 12 months = $5,000 gross monthly income. $5,000 * 0.30 = $1,500."}, {"text": "$1,500", "isCorrect": true, "rationale": "First, calculate the gross monthly income: $60,000 / 12 months = $5,000. Then, apply the 30% rule: $5,000 * 0.30 = $1,500."}, {"text": "$2,000", "isCorrect": false, "rationale": "This calculation is incorrect. $60,000 / 12 months = $5,000 gross monthly income. $5,000 * 0.30 = $1,500."}]}, {"question": "Emily earns $4,000 gross monthly income. She finds an apartment for $1,300/month. According to the 30% rule and the 'money tip,' what is the most appropriate evaluation of her situation?", "options": [{"text": "Emily's rent is well within the 30% rule, allowing her ample room for savings.", "isCorrect": false, "rationale": "Emily's maximum affordable rent is $4,000 * 0.30 = $1,200. Her $1,300 rent exceeds this guideline."}, {"text": "Emily is exceeding the 30% rule, and should consider reducing other expenses or finding cheaper housing.", "isCorrect": true, "rationale": "Emily's rent of $1,300 is 32.5% of her gross monthly income ($1,300 / $4,000), which exceeds the 30% guideline. The text advises that if housing exceeds this, 'other expenses are reduced or income is supplemented by a roommate.'"}, {"text": "Emily should aim to pay exactly 30% of her income on rent to maximize her housing benefits.", "isCorrect": false, "rationale": "The 'money tip' explicitly states, 'The 30% rule is a maximum, not a target. If you can find safe, adequate housing for 20–25% of gross income, the extra 5–10% per month goes directly toward savings, debt payoff, and investing.'"}, {"text": "Emily's rent is acceptable as long as she has a stable job, regardless of the percentage.", "isCorrect": false, "rationale": "The 30% rule is a widely used guideline for *affordability*, meaning simply having a stable job doesn't negate the financial strain of exceeding this percentage, especially if it impacts other financial goals."}]}, {"question": "The 'money tip' suggests renting below the 30% ceiling. What is the primary financial advantage of doing so?", "options": [{"text": "It guarantees the landlord will offer better lease terms in the future.", "isCorrect": false, "rationale": "Renting below the 30% ceiling is a personal financial strategy and does not guarantee future lease terms or influence landlord offers."}, {"text": "It provides additional funds that can be allocated to personal financial goals like savings and investments.", "isCorrect": true, "rationale": "The text states, 'If you can find safe, adequate housing for 20–25% of gross income, the extra 5–10% per month goes directly toward savings, debt payoff, and investing.'"}, {"text": "It allows tenants to negotiate for included utilities that would otherwise be extra.", "isCorrect": false, "rationale": "The decision to include utilities is typically made during lease negotiation and is separate from the percentage of income spent on rent."}, {"text": "It reduces the likelihood of requiring renters insurance for personal belongings.", "isCorrect": false, "rationale": "Renters insurance is recommended or required regardless of the percentage of income spent on rent, as it covers personal belongings against specific risks like fire or theft, which are unrelated to rent affordability."}]}, {"question": "Two apartments are advertised at the exact same monthly rent price. What factor, according to the text, could lead to a significant difference in their *true* monthly costs for a tenant?", "options": [{"text": "The number of bedrooms in each apartment.", "isCorrect": false, "rationale": "While the number of bedrooms influences the base rent, the question refers to two apartments with the *same advertised rent price*. Therefore, bedroom count would not explain a difference in *true* cost if the initial advertised price is identical."}, {"text": "Whether utilities like water, electricity, and internet are included in the rent.", "isCorrect": true, "rationale": "The text highlights, 'Two apartments at the same rent price can have very different true monthly costs depending on what is included,' specifically mentioning water, trash, electricity, gas, parking, and internet."}, {"text": "The landlord's personal preference for tenant background checks.", "isCorrect": false, "rationale": "A landlord's preference for background checks is part of the application process and does not directly affect the ongoing 'true monthly costs' of living in the apartment."}, {"text": "The architectural style of the building.", "isCorrect": false, "rationale": "The architectural style is an aesthetic feature and does not directly contribute to the 'true monthly costs' in the way that utility payments do."}]}, {"question": "What is the primary purpose of renters insurance, as described in the text?", "options": [{"text": "To cover damages to the landlord's property, such as the building structure.", "isCorrect": false, "rationale": "Damage to the building structure or landlord's property is typically covered by the landlord's property insurance, not renters insurance."}, {"text": "To protect the tenant's personal belongings from events like fire or theft.", "isCorrect": true, "rationale": "The text states that renters insurance 'covers your personal belongings in the event of fire, theft, or other covered disasters.'"}, {"text": "To pay for the tenant's monthly rent if they lose their job.", "isCorrect": false, "rationale": "Renters insurance does not cover loss of income or rent payments due to unemployment; that would typically fall under a separate type of insurance, like unemployment or income protection."}, {"text": "To provide legal counsel to tenants in disputes with landlords.", "isCorrect": false, "rationale": "While legal aid may be covered by certain personal liability policies or rider, it is not the primary purpose of standard renters insurance, which focuses on property damage/loss and liability."}]}, {"question": "A tenant decides to move out of their apartment six months before their 12-month lease agreement expires without a valid reason. Based on the information provided, what financial consequence might they most likely face?", "options": [{"text": "The landlord will be legally obligated to find a new tenant immediately, releasing the original tenant from all obligations.", "isCorrect": false, "rationale": "While some jurisdictions require landlords to mitigate damages by attempting to re-rent, the original tenant is not automatically released from all obligations; they typically remain liable until a new tenant is found or the lease term ends, subject to penalties."}, {"text": "They could lose their security deposit and be required to pay an additional penalty, such as one or two months' rent.", "isCorrect": true, "rationale": "The text explicitly states 'Consequences for breaking the lease early (often 1–2 months' rent penalty plus loss of security deposit)'."}, {"text": "Their credit score will automatically increase due to early termination, showing financial responsibility.", "isCorrect": false, "rationale": "Breaking a legally binding contract like a lease usually has negative implications for one's credit score, not positive ones, especially if financial penalties are incurred and unpaid."}, {"text": "They will only forfeit their last month's rent payment, with no other penalties.", "isCorrect": false, "rationale": "The text specifies more severe penalties, including loss of security deposit and potentially an additional 1–2 months' rent, indicating that simply forfeiting the last month's rent is not the sole or typical consequence."}]}, {"question": "Why is it critically important for a prospective tenant to thoroughly read and understand every part of a lease agreement *before* signing it?", "options": [{"text": "To identify opportunities for immediate lease renegotiation on rent price or term length.", "isCorrect": false, "rationale": "While negotiation is possible, the primary importance of reading the lease is to understand the *established* terms, obligations, and rights, not solely to identify negotiation points. The text emphasizes understanding what *is* in writing."}, {"text": "To ensure all verbally discussed terms are documented and to understand all obligations and rights, preventing future disputes.", "isCorrect": true, "rationale": "The text advises 'Read the lease before signing. Never assume anything not in writing is enforceable,' and lists various critical items specified in a lease. Understanding these terms is crucial to avoid misunderstandings and disputes, especially regarding verbal promises."}, {"text": "To verify that the document is stamped by a government authority, making it legally binding.", "isCorrect": false, "rationale": "While lease agreements are legally binding, their enforceability typically comes from the signatures of the parties and adherence to legal requirements, not from a government stamp. The core importance lies in understanding the content."}, {"text": "To confirm the landlord's personal contact information for emergency repairs.", "isCorrect": false, "rationale": "While contact information is important, it's a specific detail within a much broader document. The overall critical importance stems from the comprehensive legal and financial implications of the entire contract."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
