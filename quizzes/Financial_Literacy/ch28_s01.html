<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 28, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best describes your 'financial snapshot' as defined in the text?", "options": [{"text": "A detailed monthly report of all your income and expenses.", "isCorrect": false, "rationale": "This describes a budget, which the text explicitly states is different from a financial snapshot or net worth calculation. A financial snapshot is a picture of assets vs. liabilities at a specific point in time."}, {"text": "A quick assessment of what you would have left if you sold everything you own and paid off all your debts.", "isCorrect": true, "rationale": "The text states, 'Your financial snapshot is a quick picture of your current money situation. It answers one simple question: if you sold everything you owned and paid off everything you owe, what would you have left?' This directly defines net worth."}, {"text": "A projection of your future income and expenses over the next five years.", "isCorrect": false, "rationale": "This refers to financial forecasting or planning for the future, not a snapshot of your current situation as defined in the text."}, {"text": "A list of all your current outstanding bills that are due within the next week.", "isCorrect": false, "rationale": "While outstanding bills are liabilities, a financial snapshot encompasses all assets and liabilities, not just short-term obligations, and focuses on the net difference."}]}, {"question": "According to the text, which of the following would be considered an asset when calculating net worth?", "options": [{"text": "The remaining balance on a student loan.", "isCorrect": false, "rationale": "A student loan balance is money owed to someone else, making it a liability, not an asset."}, {"text": "The current market value of an old smartphone you could sell.", "isCorrect": true, "rationale": "The text defines an asset as 'anything you own that has monetary value' and specifically lists 'Electronics, instruments, or other valuables you could sell' as examples."}, {"text": "A credit card balance from last month's purchases.", "isCorrect": false, "rationale": "A credit card balance represents money you owe, which is a liability."}, {"text": "Your monthly rent payment for an apartment.", "isCorrect": false, "rationale": "A rent payment is an expense, not an asset you own. It's a recurring cost, not a item with monetary value that you possess."}]}, {"question": "When valuing an asset for your financial snapshot, such as a laptop or car, what value should you use?", "options": [{"text": "The original purchase price of the item.", "isCorrect": false, "rationale": "The text explicitly states, 'Notice that assets are valued at what you could sell them for today, not what you paid for them.'"}, {"text": "An estimated future value based on expected appreciation.", "isCorrect": false, "rationale": "The financial snapshot is about your *current* money situation, not future projections or appreciation."}, {"text": "The current realistic market value, or what you could sell it for today.", "isCorrect": true, "rationale": "The text clarifies, 'assets are valued at what you could sell them for today, not what you paid for them. ... Use the realistic current value.'"}, {"text": "The insured value of the item, typically higher than market value.", "isCorrect": false, "rationale": "The insured value is for replacement purposes in case of loss, not for determining current monetary value in a sale."}]}, {"question": "Which of the following scenarios best represents a liability?", "options": [{"text": "A savings account balance of $500.", "isCorrect": false, "rationale": "A savings account balance is money you own and can access, making it an asset."}, {"text": "Cash in your wallet totaling $75.", "isCorrect": false, "rationale": "Cash is an asset, as it represents immediate monetary value you possess."}, {"text": "The remaining balance on your car loan.", "isCorrect": true, "rationale": "The text defines a liability as 'any debt or financial obligation you owe to someone else' and specifically lists 'Car loan balance' as an example."}, {"text": "An investment in a stock fund worth $1,500.", "isCorrect": false, "rationale": "Investments are items you own that have monetary value, making them assets."}]}, {"question": "Jamie has the following financial information: checking account $1,500, credit card balance $800, used motorcycle (current market value) $4,000, and a personal loan owed to a friend $1,200. What is Jamie's net worth?", "options": [{"text": "$3,500", "isCorrect": true, "rationale": "Assets: $1,500 (checking) + $4,000 (motorcycle) = $5,500. Liabilities: $800 (credit card) + $1,200 (personal loan) = $2,000. Net Worth = Total Assets - Total Liabilities = $5,500 - $2,000 = $3,500."}, {"text": "$7,500", "isCorrect": false, "rationale": "This calculation incorrectly adds all assets and liabilities together, rather than subtracting liabilities from assets."}, {"text": "$1,000", "isCorrect": false, "rationale": "This calculation would result if only liabilities were subtracted from the motorcycle value, or other assets/liabilities were incorrectly accounted for."}, {"text": "$6,700", "isCorrect": false, "rationale": "This calculation likely only adds the assets and one liability, or makes another arithmetic error."}]}, {"question": "The text states that a negative net worth is 'extremely common for young adults, especially those with student loans.' What is the primary implication of having a negative net worth as a young adult?", "options": [{"text": "It means you have failed financially and are unlikely to recover.", "isCorrect": false, "rationale": "The text explicitly refutes this, stating, 'That does not mean they are a financial failure. It means they are at the beginning.'"}, {"text": "It indicates that you are at the beginning of your financial journey and have more debts than assets.", "isCorrect": true, "rationale": "The text explains that a negative net worth 'means you owe more than you own' and 'It means they are at the beginning.' This is a normal starting point for many young adults."}, {"text": "It requires you to immediately sell all your assets to pay off debts.", "isCorrect": false, "rationale": "While paying down debt is part of improving net worth, a negative net worth does not automatically necessitate immediate liquidation of all assets. It's a starting point for financial planning."}, {"text": "It signifies that you have too many investments and not enough cash.", "isCorrect": false, "rationale": "A negative net worth is about owing more than you own in total, not specifically about the composition of your assets or a lack of cash versus investments."}]}, {"question": "Why is tracking your net worth considered a valuable tool for personal financial planning, as opposed to solely relying on a monthly budget?", "options": [{"text": "It provides a more detailed breakdown of monthly spending categories.", "isCorrect": false, "rationale": "A monthly budget provides detailed spending categories. Net worth tracking offers a long-term view of overall financial health."}, {"text": "It serves as a long-term scoreboard, indicating whether your overall financial life is improving.", "isCorrect": true, "rationale": "The text states, 'Tracking your net worth over time gives you something a monthly budget cannot: a long-term scoreboard... Your net worth tells you whether your overall financial life is improving or not.'"}, {"text": "It automatically adjusts your investment portfolio for optimal growth.", "isCorrect": false, "rationale": "Tracking net worth is a measurement tool; it does not automatically manage investments. That requires separate financial actions."}, {"text": "It eliminates the need for any other form of financial tracking.", "isCorrect": false, "rationale": "The text implies both budgets and net worth tracking are useful, serving different purposes. It doesn't suggest one eliminates the need for the other."}]}, {"question": "According to the 'moneytip' section, what is the ultimate goal of your financial plan regarding net worth?", "options": [{"text": "To achieve the highest possible net worth today, regardless of future implications.", "isCorrect": false, "rationale": "The moneytip explicitly states, 'The goal of your financial plan is not to have a high net worth today.'"}, {"text": "To maintain a zero net worth by balancing assets and liabilities.", "isCorrect": false, "rationale": "While a zero net worth is normal at some stages, the goal is not merely to maintain it, but to grow it positively over time."}, {"text": "To ensure your net worth is consistently growing over time.", "isCorrect": true, "rationale": "The moneytip states, 'The goal is to have a growing net worth. If your net worth increases by 5,000 this year... you are winning.'"}, {"text": "To prioritize paying down all debt before acquiring any assets.", "isCorrect": false, "rationale": "While debt reduction is important, the goal is holistic net worth growth, which can involve both debt reduction and asset accumulation, not strictly one before the other."}]}, {"question": "Sarah has $2,000 in her checking account (an asset) and a $500 balance on her credit card (a liability). If she uses $500 from her checking account to pay off her entire credit card balance, how does her net worth change?", "options": [{"text": "It increases by $500.", "isCorrect": false, "rationale": "While paying off debt is positive, her net worth does not increase in this specific scenario because the reduction in liabilities is offset by an equal reduction in assets."}, {"text": "It decreases by $500.", "isCorrect": false, "rationale": "Her net worth would only decrease if her liabilities increased without a corresponding asset increase, or if assets decreased without a liability decrease."}, {"text": "It remains unchanged.", "isCorrect": true, "rationale": "Her checking account (asset) decreases by $500, and her credit card balance (liability) decreases by $500. Since Net Worth = Assets - Liabilities, the change is (-$500) - (-$500) = 0. Her net worth stays the same because she's essentially converting one form of her net worth (cash) into a reduction of debt, both of which are already accounted for in her net worth calculation."}, {"text": "It depends on her income, which is not provided.", "isCorrect": false, "rationale": "The change in net worth for this specific transaction (paying debt with existing cash) does not depend on income, only on the assets and liabilities involved."}]}, {"question": "Based on the text's recommendation, how frequently should you check and record your net worth?", "options": [{"text": "Only once in your lifetime, at the very beginning of your financial journey.", "isCorrect": false, "rationale": "The text emphasizes tracking 'over time' and 'watching it grow,' indicating a need for regular checks, not just a single initial estimate."}, {"text": "Monthly, similar to how a budget is tracked, for maximum detail.", "isCorrect": false, "rationale": "The text suggests 'once or twice a year' for net worth, distinguishing it from the more frequent tracking of a monthly budget."}, {"text": "Once or twice a year, to observe its growth over the long term.", "isCorrect": true, "rationale": "The text states, 'Check it once or twice a year and record the number. Watching it grow over time is one of the most motivating things in personal finance.'"}, {"text": "Only when you make a major financial decision, like buying a house or car.", "isCorrect": false, "rationale": "While major decisions impact net worth, the recommendation is for routine, periodic checks to monitor overall progress, not just at specific events."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
