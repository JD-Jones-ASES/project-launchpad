        <h2>Results</h2>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "Which psychological barrier describes the tendency to value immediate rewards over larger, delayed rewards?", "options": [{"text": "Sunk cost thinking", "isCorrect": false, "rationale": "Sunk cost thinking refers to the logic that past spending should influence future spending decisions, which is incorrect as past spending is irretrievable. It doesn't directly describe the preference for immediate gratification over future gains."}, {"text": "Present bias", "isCorrect": true, "rationale": "Present bias is explicitly defined in the text as 'the tendency to prefer smaller rewards now over larger rewards later,' perfectly matching the description."}, {"text": "Social pressure", "isCorrect": false, "rationale": "Social pressure relates to external influences from friends, advertising, and social media pushing spending. While it makes saving hard, it's not the internal bias of valuing immediate over future rewards."}, {"text": "Instant gratification", "isCorrect": false, "rationale": "Instant gratification refers to the immediate satisfaction received from spending, often facilitated by frictionless buying. While related to present bias, 'present bias' is the specific psychological term for the preference for immediate rewards over future ones."}], "id": "q01"}, {"question": "Sarah spent $300 on concert tickets this month, more than she planned. When considering buying a new pair of shoes, she thinks, 'I've already overspent, so what's another $50?' Which psychological barrier is Sarah exhibiting?", "options": [{"text": "Present bias", "isCorrect": false, "rationale": "Present bias involves preferring immediate satisfaction over future benefits. Sarah's thought process is about past spending influencing current decisions, not a preference for immediate versus delayed rewards."}, {"text": "Social pressure", "isCorrect": false, "rationale": "Social pressure involves external influences to spend from peers or media. Sarah's reasoning is internal, stemming from her perception of her past spending."}, {"text": "Instant gratification", "isCorrect": false, "rationale": "Instant gratification relates to the ease and immediate reward of spending. While buying shoes might offer instant gratification, her specific reasoning ('I've already overspent...') points to a different bias."}, {"text": "Sunk cost thinking", "isCorrect": true, "rationale": "Sunk cost thinking is described as using past spending ('I've already spent so much this month') to justify future spending ('what's a little more?'), ignoring that past costs are unrecoverable. This precisely matches Sarah's scenario."}], "id": "q02"}, {"question": "According to the text, why is 'making saving automatic' considered the most reliable saving strategy?", "options": [{"text": "It provides a dopamine reward, reinforcing positive behavior.", "isCorrect": false, "rationale": "While visual trackers provide dopamine rewards, making saving automatic works by removing the need for a conscious decision, not by providing a direct dopamine hit."}, {"text": "It leverages social accountability to increase follow-through.", "isCorrect": false, "rationale": "Social accountability is a separate strategy involving an accountability partner. Automatic saving removes the decision process entirely, rather than relying on social reinforcement."}, {"text": "It removes the need for a conscious decision to save each month.", "isCorrect": true, "rationale": "The text states, 'You do not have to choose to save each month if the transfer is already scheduled,' indicating that removing the decision point is the key to its reliability."}, {"text": "It makes saving tangible and easier to visualize.", "isCorrect": false, "rationale": "Visual progress trackers are designed to make saving tangible. Automatic transfers are about consistency and removing friction, not primarily visualization."}], "id": "q03"}, {"question": "A student is struggling to consistently save money for a new laptop. Based on the text, which of the following strategies would best help them make their savings goal feel more real and rewarding in the short term?", "options": [{"text": "Setting up an automatic transfer of a small amount to a general savings account.", "isCorrect": false, "rationale": "Automatic transfers are excellent for consistency but don't inherently make the goal 'feel more real' or provide short-term rewards beyond the knowledge of saving. A general savings account also lacks specificity."}, {"text": "Telling a friend about the laptop savings goal and checking in weekly.", "isCorrect": false, "rationale": "An accountability partner helps with follow-through due to social pressure, but it doesn't directly make the savings goal 'feel more real and rewarding' in the same visual and tangible way as other strategies."}, {"text": "Drawing a thermometer chart and coloring it in each time money is added to the 'Laptop Fund'.", "isCorrect": true, "rationale": "The text specifically mentions using visual progress trackers like a thermometer chart to 'make saving tangible' and provides 'a small dopamine reward for each step,' which directly addresses making it feel real and rewarding in the short term."}, {"text": "Waiting 24 hours before making any unplanned purchase over $20.", "isCorrect": false, "rationale": "The 24-hour rule is for curbing impulse purchases, which helps preserve savings, but it doesn't directly make the laptop savings goal itself feel more real or provide rewards for saving progress."}], "id": "q04"}, {"question": "How does naming specific savings goals, such as 'Emergency Fund' or 'Vacation Fund,' primarily help individuals save more effectively?", "options": [{"text": "It makes the saving process automatic and frictionless.", "isCorrect": false, "rationale": "Naming goals doesn't inherently make the process automatic; automatic transfers handle that. It addresses a different psychological aspect."}, {"text": "It helps overcome the tendency to value immediate gratification by increasing the abstractness of future rewards.", "isCorrect": false, "rationale": "Naming goals makes future rewards less abstract, not more. It helps to concretize the future benefit, thus combating present bias by making the future feel more real."}, {"text": "It provides a clear visual progress tracker for each goal.", "isCorrect": false, "rationale": "While one might combine naming goals with visual trackers, naming itself isn't a visual tracker. It serves a different purpose related to commitment and intention."}, {"text": "It creates a psychological barrier to raiding the funds for unrelated, impulsive spending.", "isCorrect": true, "rationale": "The text states, 'When you see 'Car Fund,' you hesitate more before spending it on something unrelated.' This indicates that naming accounts makes it harder to divert funds, acting as a psychological deterrent against impulse spending on non-goal items."}], "id": "q05"}, {"question": "A key finding from behavioral economics research mentioned in the text is that people save significantly more when they can visualize their future selves. What is the core reason for this effect?", "options": [{"text": "It helps to activate the brain's reward system, leading to instant gratification.", "isCorrect": false, "rationale": "Visualizing future selves is about connecting with a future identity, not about instant gratification. It helps overcome the preference for immediate rewards by making the future more salient."}, {"text": "It strengthens social pressure to save by showing peers your future goals.", "isCorrect": false, "rationale": "The research described involves personal visualization, not social interaction or peer pressure. It's an internal psychological effect."}, {"text": "It reduces the abstractness of future benefits by making the 'future self' feel more real.", "isCorrect": true, "rationale": "The text explains that seeing age-progressed photos makes the future self more tangible, helping individuals see saving as 'a gift you give to that person,' thereby reducing the abstractness of distant rewards."}, {"text": "It directly facilitates automatic savings transfers without conscious effort.", "isCorrect": false, "rationale": "Visualizing one's future self is a motivational tool, not a mechanism for automatic transfers. It influences the decision to save, but doesn't automate the process."}], "id": "q06"}, {"question": "Maria sees a limited-time offer for an online course she's interested in, costing $75. She's tempted to buy it immediately. Applying the '24-Hour Rule' from the text, what should Maria do?", "options": [{"text": "Buy the course immediately to take advantage of the limited-time offer, as missing a good deal is a form of loss.", "isCorrect": false, "rationale": "The 24-Hour Rule is designed to counteract impulse buying, even for perceived good deals. Acting immediately would defeat the purpose of the rule."}, {"text": "Check her budget to see if she has $75 available, and if so, proceed with the purchase.", "isCorrect": false, "rationale": "While checking the budget is good practice, the 24-Hour Rule specifically advises adding a time gap before making an unplanned purchase, regardless of immediate budget availability, to allow rational thought to catch up."}, {"text": "Wait until the next day to decide if she still truly wants or needs the course.", "isCorrect": true, "rationale": "The 24-Hour Rule advises: 'before making any unplanned purchase over $20... wait 24 hours. If you still want it the next day, you can consider it.' This gives 'rational thinking time to catch up with your emotional impulse.'"}, {"text": "Ask a friend if they think she should buy the course to get an accountability partner's opinion.", "isCorrect": false, "rationale": "While an accountability partner is a saving strategy, the 24-Hour Rule is a specific tactic for impulse purchases that relies on personal delay, not external consultation at this stage."}], "id": "q07"}, {"question": "What is the primary danger associated with 'buy now, pay later' apps, according to the 'warning' section?", "options": [{"text": "They make the cost of purchases more visible over time, leading to anxiety.", "isCorrect": false, "rationale": "The warning states the opposite: 'The cost is invisible in the moment but very real over time.' They make it feel like you can have things now 'without consequences.'"}, {"text": "They encourage social pressure to spend more than one can afford.", "isCorrect": false, "rationale": "While social pressure can contribute to spending, the text's warning about 'buy now, pay later' apps specifically focuses on how they mask the true cost and consequences of immediate spending."}, {"text": "They create friction in the spending process, making it harder to buy impulsively.", "isCorrect": false, "rationale": "The text implies they make spending *easier* and *more frictionless*, contributing to impulse purchases, rather than creating friction."}, {"text": "They obscure the real cost of impulse spending today, sacrificing future compounded savings.", "isCorrect": true, "rationale": "The warning explicitly states, 'Every dollar spent on impulse today is a dollar that could have been compounding in your savings. The cost is invisible in the moment but very real over time.' This highlights the invisible opportunity cost of lost compound interest."}], "id": "q08"}, {"question": "According to the advice on 'Building the Habit,' what is the most crucial first step for someone who has never saved before but wants to start?", "options": [{"text": "Set up a highly ambitious goal, like saving $1,000 per month, to maximize motivation.", "isCorrect": false, "rationale": "The text advises to 'Start small' because even a small amount 'builds the neural pathway of the habit.' Highly ambitious goals at the start can be overwhelming and lead to failure."}, {"text": "Wait until they have a significant amount of disposable income to make saving impactful.", "isCorrect": false, "rationale": "The text directly contradicts this: 'The person who waits until they have 'enough' to start saving often never starts.' Starting small and consistently is emphasized."}, {"text": "Begin by saving a very small, manageable amount consistently, such as $5 per week.", "isCorrect": true, "rationale": "The text advises to 'Start small. Even $5/week is better than nothing and builds the neural pathway of the habit' and emphasizes consistency as key for habit formation."}, {"text": "Invest in a high-interest savings account immediately to see rapid growth.", "isCorrect": false, "rationale": "While a good interest rate is beneficial, the immediate concern for someone just starting to build a habit is the act of saving itself, not optimizing returns. The advice focuses on behavioral steps, not investment vehicles."}], "id": "q09"}, {"question": "Which overarching principle best summarizes the advice provided in 'The Psychology of Saving' section for long-term financial success?", "options": [{"text": "Maximizing investment returns by timing the market.", "isCorrect": false, "rationale": "The section focuses on behavioral strategies for *saving* consistently, not on investment strategies like market timing, which isn't mentioned."}, {"text": "Focusing on large, infrequent savings contributions to build wealth quickly.", "isCorrect": false, "rationale": "The text stresses 'start small' and 'be consistent,' implying that regular, even small, contributions are more effective for habit building than large, infrequent ones."}, {"text": "Overcoming psychological barriers through consistent, deliberate habit formation and practical strategies.", "isCorrect": true, "rationale": "The entire section is dedicated to understanding 'psychological barriers' and 'research-backed strategies to overcome them,' with a strong emphasis on 'Building the Habit' through repetition and consistency."}, {"text": "Prioritizing immediate financial comfort over distant future benefits.", "isCorrect": false, "rationale": "This describes 'present bias,' which the section identifies as a barrier to overcome, not a principle to follow for financial success. The goal is to bridge the gap to future benefits."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
