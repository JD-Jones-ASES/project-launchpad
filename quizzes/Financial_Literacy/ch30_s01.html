<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 30, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary message the text conveys about money?", "options": [{"text": "Money's only valuable use is personal accumulation.", "isCorrect": false, "rationale": "The text explicitly states other important uses and meaningful uses like giving, refuting that personal accumulation is the only valuable use."}, {"text": "Money is a versatile tool with many purposes, including giving.", "isCorrect": true, "rationale": "The first paragraph clearly states, 'Money is a tool. Like any tool, it can be used for many different purposes... one of the most meaningful uses of money is giving some of it away,' highlighting its versatility."}, {"text": "Giving money away is always the most important use of funds.", "isCorrect": false, "rationale": "While highlighted as a meaningful use, the text also lists other 'important uses' like paying rent and investing, and concludes there's 'No Single Right Answer' for how or whether to give, indicating it's not always the *most* important for everyone."}, {"text": "Investing for retirement is the ultimate purpose of money.", "isCorrect": false, "rationale": "Investing is mentioned as an 'important use,' but not the 'ultimate' or sole purpose. The section equally promotes giving as another meaningful use."}], "id": "q01"}, {"question": "Based on the research cited, what is the most accurate interpretation of the relationship between giving and happiness?", "options": [{"text": "Giving more money directly causes a proportional increase in personal happiness.", "isCorrect": false, "rationale": "The text explicitly states, 'This does not mean giving more money makes you automatically happier,' clarifying that it's not a direct proportional cause-and-effect."}, {"text": "The act of giving money, especially when aligned with personal values, contributes to higher satisfaction.", "isCorrect": true, "rationale": "The text clarifies the research findings by stating, 'It means that generosity, when it reflects your values, adds a dimension to financial life that accumulation alone does not provide,' emphasizing the role of values alignment."}, {"text": "Only wealthy individuals experience increased happiness from giving money away.", "isCorrect": false, "rationale": "The text discusses the general findings without limiting the effect to only wealthy individuals, and later suggests even small, consistent giving can have an impact."}, {"text": "Spending money on oneself never leads to personal satisfaction, unlike giving.", "isCorrect": false, "rationale": "The text does not claim that spending on oneself *never* leads to satisfaction, but rather that giving 'adds a dimension' to financial life that self-accumulation alone does not provide, implying a unique or additional benefit."}], "id": "q02"}, {"question": "A local animal shelter needs to raise $5,000 for critical medical supplies. Applying the 'Community Impact' principle, what fundraising strategy would be most aligned with the text's message?", "options": [{"text": "Seek a single large donation from a wealthy benefactor.", "isCorrect": false, "rationale": "While a large donation would help, this strategy contradicts the 'Community Impact' section's emphasis on the power of *many* individuals contributing small amounts, as illustrated by the '100-Person Village' example."}, {"text": "Host a small, exclusive event targeting high-net-worth individuals.", "isCorrect": false, "rationale": "Similar to seeking a single large donation, this strategy does not align with the principle that 'Small amounts given by many people create enormous impact' outlined in the text."}, {"text": "Launch a broad campaign asking many individuals for small, manageable donations.", "isCorrect": true, "rationale": "This strategy directly reflects the core idea of the 'Community Impact' section: 'Individual contributions, even small ones, add up to enormous community impact when combined,' and the '100-Person Village' example."}, {"text": "Rely solely on government grants, as individual donations are insignificant.", "isCorrect": false, "rationale": "The text explicitly states that community institutions 'run largely on voluntary donations' and emphasizes the significant impact of individual contributions, even small ones, directly contradicting this option."}], "id": "q03"}, {"question": "How does the act of giving money serve as a 'clearest expression' of one's values, according      to the text?", "options": [{"text": "It allows individuals to publicly declare their beliefs without any action.", "isCorrect": false, "rationale": "The text emphasizes that *giving money* is the expression, implying a concrete action rather than just a verbal declaration of beliefs."}, {"text": "It provides a concrete, measurable action that demonstrates commitment to a cause.", "isCorrect": true, "rationale": "The text explicitly states, 'Giving money to organizations that work in those areas is a concrete, measurable expression of those values,' highlighting the tangible nature of the action."}, {"text": "It guarantees a tax deduction, which is a primary motivator for valuing a cause.", "isCorrect": false, "rationale": "Tax deductions are not mentioned in the text as a reason for giving or a way values are expressed. The focus is on the personal sense of purpose and impact."}, {"text": "It primarily serves to enhance one's social standing within the community.", "isCorrect": false, "rationale": "While giving might have social benefits, the text frames values alignment as contributing to an internal 'sense of purpose' and adding meaning to one's work and earning, not primarily an external social status."}], "id": "q04"}, {"question": "The '100-Person Village' thought experiment primarily illustrates which concept?", "options": [{"text": "The overwhelming burden that individual crises place on a community.", "isCorrect": false, "rationale": "While a crisis is the scenario, the experiment focuses on the *solution* and the *collective power* of the community to address it, not just the burden itself."}, {"text": "The effectiveness of collective small contributions in creating significant aid.", "isCorrect": true, "rationale": "The example directly shows how '$5 from 99 families can meaningfully help one family,' explicitly illustrating that 'Small amounts given by many people create enormous impact.'"}, {"text": "The necessity of a single, wealthy donor to resolve community problems.", "isCorrect": false, "rationale": "The experiment emphasizes 'each of the other 99 families' contributing small amounts, directly counteracting the idea that a single wealthy donor is necessary."}, {"text": "The limitations of charity when individual contributions are too small.", "isCorrect": false, "rationale": "The experiment argues the exact opposite, demonstrating how small contributions *overcome* perceived limitations when scaled across many individuals."}], "id": "q05"}, {"question": "What is the section's perspective on needing to be wealthy to leave a legacy through giving?", "options": [{"text": "Legacy giving is exclusively for the extremely wealthy who can endow institutions.", "isCorrect": false, "rationale": "The text directly refutes this by stating, 'You do not need to be wealthy to think about legacy.'"}, {"text": "Only large, one-time donations qualify as leaving a meaningful legacy.", "isCorrect": false, "rationale": "The text emphasizes, 'Even small, consistent giving over a lifetime creates a real impact and a real story,' indicating that size and frequency are more important than a single large sum."}, {"text": "Wealth is not a prerequisite; consistent, small giving over time can create a real impact and story.", "isCorrect": true, "rationale": "This option directly aligns with the text: 'You do not need to be wealthy to think about legacy. Even small, consistent giving over a lifetime creates a real impact and a real story.'"}, {"text": "Leaving a legacy is only possible through physical structures like buildings, which require immense wealth.", "isCorrect": false, "rationale": "While buildings are mentioned as an example, the text also lists scholarships and conservation funds, and reiterates that wealth is not a prerequisite, broadening the scope of legacy giving beyond physical structures."}], "id": "q06"}, {"question": "What is the overarching goal of 'Chapter 30, Section 1: Why Give?'", "options": [{"text": "To dictate specific charities to support and how much money to donate.", "isCorrect": false, "rationale": "The text explicitly states, 'This chapter does not tell you how much to give, where to give, or whether to give at all,' disproving this option."}, {"text": "To convince readers that giving money is a moral obligation for everyone.", "isCorrect": false, "rationale": "The chapter presents various reasons why people give but concludes that these are 'deeply personal decisions,' not universal moral obligations."}, {"text": "To provide tools and perspectives for intentionally incorporating giving into one's financial plan.", "isCorrect": true, "rationale": "The concluding paragraph states, 'What this chapter does is give you the tools to think about giving as a part of your financial plan — so that if you decide to give, you can do it intentionally and well.'"}, {"text": "To primarily focus on the tax benefits and financial advantages of charitable donations.", "isCorrect": false, "rationale": "Tax benefits are not mentioned anywhere in the section, and the focus is on personal satisfaction, community impact, values alignment, and legacy."}], "id": "q07"}, {"question": "Maria earns a modest income but feels strongly about environmental conservation. She's deciding whether to donate $50 to a national park fund or save it. Based on the chapter's final message, what is the most appropriate approach for Maria?", "options": [{"text": "She should only give if her income allows for a substantial donation, otherwise it's not worth it.", "isCorrect": false, "rationale": "The text refutes this idea by emphasizing that 'Even small, consistent giving over a lifetime creates a real impact,' and the 'Community Impact' section highlights the power of small contributions."}, {"text": "She should prioritize saving the $50, as personal financial goals always supersede giving.", "isCorrect": false, "rationale": "The text presents giving as a meaningful use of money alongside other important uses, and doesn't state one always supersedes the other; rather, it's a personal decision."}, {"text": "She should recognize that the decision is deeply personal, shaped by her values, and consider how giving aligns with them.", "isCorrect": true, "rationale": "The final paragraph explicitly states that decisions about giving are 'deeply personal decisions shaped by your values, your faith tradition (if any), your income, and your life stage,' making her values central to her choice."}, {"text": "She should feel obligated to give, as the chapter explicitly encourages all giving regardless of personal circumstances.", "isCorrect": false, "rationale": "The text explicitly avoids telling readers 'whether to give at all' and emphasizes that it's a personal choice, not an obligation."}], "id": "q08"}, {"question": "The text suggests that giving money to others often leads to higher personal satisfaction and happiness. What key condition is mentioned alongside this finding to clarify its meaning?", "options": [{"text": "This only applies if the amount given is greater than what is spent on oneself.", "isCorrect": false, "rationale": "The text compares the happiness of those who give to those who spend the 'same amount' on themselves, and clarifies that 'giving more money' doesn't automatically mean more happiness, so the amount relative to personal spending isn't the key condition."}, {"text": "This correlation is only true for individuals who are already financially secure.", "isCorrect": false, "rationale": "The text does not impose financial security as a condition for experiencing satisfaction from giving; rather, it is presented as a general finding about generosity."}, {"text": "The generosity adds dimension to financial life *when it reflects your values*.", "isCorrect": true, "rationale": "The text clearly states: 'It means that generosity, when it reflects your values, adds a dimension to financial life that accumulation alone does not provide,' emphasizing values alignment as the key clarifying condition."}, {"text": "Happiness from giving is a temporary feeling that quickly fades unless giving frequently.", "isCorrect": false, "rationale": "While the research mentions people who 'regularly give,' the text does not characterize the happiness as temporary or discuss its fading rate, so this is not the key condition mentioned."}], "id": "q09"}, {"question": "Considering all the reasons presented (research, community, values, legacy), what is the most comprehensive summary of *why* people give, as described in the section?", "options": [{"text": "People give solely to improve their own financial status through tax deductions.", "isCorrect": false, "rationale": "Tax deductions are not mentioned in the text, and the motivations presented are much broader and more intrinsic than solely financial gain."}, {"text": "Giving is primarily motivated by a desire to gain public recognition and social approval.", "isCorrect": false, "rationale": "While public recognition might occur, the text emphasizes personal satisfaction, values alignment, and creating a lasting impact, focusing on internal purpose rather than primarily external social approval."}, {"text": "Giving provides personal satisfaction, contributes to community well-being, expresses values, and creates lasting impact.", "isCorrect": true, "rationale": "This option synthesizes the four main categories of reasons explicitly detailed in the section: 'The Research on Giving and Happiness' (personal satisfaction), 'Community Impact' (community well-being), 'Values Alignment' (expresses values), and 'Legacy' (creates lasting impact)."}, {"text": "The only true reason to give is to fulfill a religious or moral obligation.", "isCorrect": false, "rationale": "While faith traditions are mentioned as shaping personal decisions, the text presents a broader array of motivations and explicitly states there is 'No Single Right Answer,' indicating it's not solely about obligation."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
