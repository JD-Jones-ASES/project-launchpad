<head>
    <meta charset="UTF-8">

    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 13, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best describes the primary purpose of a credit score?", "options": [{"text": "To provide a detailed record of every financial transaction you've ever made.", "isCorrect": false, "rationale": "This describes a credit report, not a credit score. A credit score is a summary number."}, {"text": "To summarize your creditworthiness, indicating how likely you are to repay borrowed money on time.", "isCorrect": true, "rationale": "The text explicitly states a credit score is a 'single number that summarizes how reliably you have handled borrowed money in the past' and 'represents your creditworthiness—that is, how likely you are to repay borrowed money on time'."}, {"text": "To determine your eligibility for government assistance programs.", "isCorrect": false, "rationale": "While financial status can impact eligibility for government programs, a credit score's primary purpose is not directly tied to these programs but rather to credit and lending decisions."}, {"text": "To track your annual income and spending habits for tax purposes.", "isCorrect": false, "rationale": "Income and spending habits are generally tracked for personal budgeting or tax reporting, not directly summarized by a credit score."}], "id": "q01"}, {"question": "A student is confused about the difference between a credit score and a credit report. Which analogy from the text would best help them understand?", "options": [{"text": "A credit score is like a library card, and a credit report is like a book.", "isCorrect": false, "rationale": "This analogy does not effectively capture the summary vs. detailed record distinction emphasized in the text."}, {"text": "A credit score is like your GPA, and a credit report is like your full academic transcript.", "isCorrect": true, "rationale": "The text directly uses this analogy: 'Think of it like this: your credit report is your full academic transcript, and your credit score is your GPA. The GPA (score) is quick and easy to compare; the transcript (report) has all the details.'"}, {"text": "A credit score is like a dictionary, and a credit report is like a single word.", "isCorrect": false, "rationale": "This analogy reverses the relationship; the report is comprehensive, and the score is a summary."}, {"text": "A credit score is like a map, and a credit report is like a specific address.", "isCorrect": false, "rationale": "This analogy does not represent the summary vs. detailed history distinction accurately."}], "id": "q02"}, {"question": "Which organization is primarily responsible for creating the most widely used credit score model, the FICO score?", "options": [{"text": "Equifax", "isCorrect": false, "rationale": "Equifax is one of the three major credit bureaus that collect data, but it did not create the FICO score model itself. It is involved in VantageScore development."}, {"text": "VantageScore", "isCorrect": false, "rationale": "VantageScore is another credit score model, developed by the three major credit bureaus, but it did not create the FICO score."}, {"text": "Fair Isaac Corporation", "isCorrect": true, "rationale": "The text explicitly states: 'The most widely used credit score model is the FICO score, created by the Fair Isaac Corporation.'"}, {"text": "The Federal Reserve", "isCorrect": false, "rationale": "The Federal Reserve is the central banking system of the United States and is not involved in creating consumer credit score models like FICO."}], "id": "q03"}, {"question": "A person has applied for a new apartment and is surprised that the landlord requested to check their credit history. Based on the text, why might a landlord do this?", "options": [{"text": "To determine the applicant's criminal record.", "isCorrect": false, "rationale": "A credit check primarily assesses financial reliability, not criminal history. Criminal background checks are separate processes."}, {"text": "To assess the applicant's likelihood of paying rent on time.", "isCorrect": true, "rationale": "The text states that landlords use credit scores 'to decide whether to rent an apartment to you,' implying an assessment of financial responsibility and reliability in paying debts (including rent)."}, {"text": "To verify the applicant's employment history and salary.", "isCorrect": false, "rationale": "While landlords verify employment and salary, a credit check is not the primary method for this; it focuses on creditworthiness and payment history."}, {"text": "To calculate the appropriate security deposit amount based on income.", "isCorrect": false, "rationale": "While a security deposit may be required, a credit check helps decide whether to rent at all or if a higher deposit is needed due to poor credit, not directly calculate the amount based on income."}], "id": "q04"}, {"question": "You check your credit score and find it to be 780. According to the information provided, what does this generally signify about your financial standing?", "options": [{"text": "Your score is below average, indicating potential difficulty in obtaining loans.", "isCorrect": false, "rationale": "A score of 780 is well above the median of 714 and generally considered very good, not below average."}, {"text": "Your score is likely in the 'Good' to 'Excellent' range, suggesting strong creditworthiness.", "isCorrect": true, "rationale": "The text mentions the median score is around 714 in the 'Good' range, and about 20% of Americans have a score above 800. A 780 score falls into a very favorable range, indicating high creditworthiness."}, {"text": "Your score is exactly average for the United States.", "isCorrect": false, "rationale": "The median credit score is around 714, so 780 is above the median."}, {"text": "Your score indicates a high risk of identity theft.", "isCorrect": false, "rationale": "A high credit score indicates good financial management, not an increased risk of identity theft. Identity theft is a separate issue that can affect a score."}], "id": "q05"}, {"question": "Which of the following is NOT one of the three major credit bureaus mentioned in the text?", "options": [{"text": "Equifax", "isCorrect": false, "rationale": "Equifax is explicitly listed as one of the three major credit bureaus."}, {"text": "Experian", "isCorrect": false, "rationale": "Experian is explicitly listed as one of the three major credit bureaus."}, {"text": "TransUnion", "isCorrect": false, "rationale": "TransUnion is explicitly listed as one of the three major credit bureaus."}, {"text": "FICO", "isCorrect": true, "rationale": "FICO is a credit score model, not a credit bureau. The Fair Isaac Corporation created the FICO score, while the bureaus collect the data."}], "id": "q06"}, {"question": "Why might your credit score differ slightly between Equifax, Experian, and TransUnion at any given time?", "options": [{"text": "Each bureau uses a completely different scoring model (e.g., FICO vs. VantageScore).", "isCorrect": false, "rationale": "While different models exist (FICO and VantageScore), the primary reason for differences *between bureaus* for the *same model* is the data they collect. Lenders often check all three, and bureaus collect data independently."}, {"text": "Federal law requires each bureau to calculate scores differently to offer consumers variety.", "isCorrect": false, "rationale": "There is no such federal requirement. Differences arise from how data is collected and reported."}, {"text": "Each bureau collects credit history data independently, meaning their records may vary slightly.", "isCorrect": true, "rationale": "The text states, 'Each bureau collects data independently, so your score may differ slightly from bureau to bureau.' This is the correct explanation."}, {"text": "Only one bureau is authorized to provide your true, official credit score at a time.", "isCorrect": false, "rationale": "This is incorrect. All three bureaus provide valid credit reports and often generate scores, and lenders frequently check all three."}], "id": "q07"}, {"question": "According to federal law, how often are you entitled to a free credit report from each of the major credit bureaus?", "options": [{"text": "Once every five years.", "isCorrect": false, "rationale": "The entitlement is more frequent than once every five years."}, {"text": "Once a month.", "isCorrect": false, "rationale": "The entitlement is not monthly under federal law, though some services offer more frequent access."}, {"text": "Once a year.", "isCorrect": true, "rationale": "The text states: 'You are entitled by federal law to one free credit report per year from each of the three bureaus.'"}, {"text": "Only when you are denied credit.", "isCorrect": false, "rationale": "While you can request a report if denied credit, the annual free report is available regardless of credit decisions."}], "id": "q08"}, {"question": "Beyond applying for a credit card or loan, in which of the following situations might a good credit score be beneficial?", "options": [{"text": "To reduce the cost of your groceries at the supermarket.", "isCorrect": false, "rationale": "A credit score does not directly influence the cost of groceries or everyday consumer goods."}, {"text": "To secure a lower interest rate on an auto insurance policy.", "isCorrect": true, "rationale": "The text states: 'Insurance companies: in many states, credit history can affect your auto or homeowners insurance rates.' A good score would generally lead to lower rates."}, {"text": "To get a discount on public transportation fares.", "isCorrect": false, "rationale": "Public transportation fares are not typically influenced by an individual's credit score."}, {"text": "To gain entry into exclusive social clubs.", "isCorrect": false, "rationale": "Membership in social clubs is generally not determined by credit scores."}], "id": "q09"}, {"question": "Why is it important to regularly review your credit report, even if you don't plan to apply for new credit soon?", "options": [{"text": "To ensure your credit score remains exactly 850.", "isCorrect": false, "rationale": "While a good score is desirable, the report's purpose isn't just to maintain a perfect score, and scores fluctuate. The primary reason is error checking and fraud."}, {"text": "To identify errors or signs of identity theft that could negatively impact your financial health.", "isCorrect": true, "rationale": "The text advises: 'Review your report regularly to catch errors and signs of identity theft.' This is a critical reason for reviewing the detailed report."}, {"text": "To verify the current market value of your home.", "isCorrect": false, "rationale": "A credit report details credit accounts and payment history, not property valuations."}, {"text": "To automatically improve your credit score just by viewing it.", "isCorrect": false, "rationale": "Simply viewing your credit report does not directly improve your credit score. Correcting errors or managing your credit responsibly improves the score."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
