<div class="quiz-container">

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "According to the text, for a deal to genuinely save money, all of the following must be true EXCEPT:", "options": [{"text": "You were going to buy the item anyway.", "isCorrect": false, "rationale": "This is one of the three explicit conditions for a genuine saving mentioned in the text."}, {"text": "The deal makes it cheaper than the next-best alternative.", "isCorrect": false, "rationale": "This is one of the three explicit conditions for a genuine saving mentioned in the text."}, {"text": "You buy only the quantity you actually need.", "isCorrect": false, "rationale": "This is one of the three explicit conditions for a genuine saving mentioned in the text."}, {"text": "The item is part of a store-wide clearance event.", "isCorrect": true, "rationale": "The text lists three conditions for a genuine saving: buying an item you needed anyway, the deal making it cheaper than the next-best alternative, and buying only the quantity needed. A store-wide clearance event is not listed as a necessary condition for a genuine saving."}], "id": "q01"}, {"question": "Maria finds a 'Buy 2, Get $1.00 Off' coupon for a new brand of cereal. She usually buys a different brand of cereal, but this new one looks interesting. She decides to try it and buys two boxes, using the coupon. Based on the 'Coupon Trap' rule, did Maria genuinely save money?", "options": [{"text": "Yes, because she received a discount on the cereal.", "isCorrect": false, "rationale": "A discount alone does not guarantee a genuine saving if other conditions are not met, as highlighted by the 'Coupon Trap' example."}, {"text": "No, because she was not going to buy that specific brand of cereal anyway.", "isCorrect": true, "rationale": "The text states, 'A coupon is only a savings if it reduces the price of something you were buying anyway.' Since Maria was not planning to buy this new brand, it's not a genuine saving for her, but a new expenditure prompted by the deal."}, {"text": "Yes, because trying a new product with a discount is a smart way to save.", "isCorrect": false, "rationale": "While trying new products can be appealing, if it's not something you were going to buy anyway, it's an additional expense, not a saving, according to the text's rules."}, {"text": "No, because she only saved $1.00, which is a small amount.", "isCorrect": false, "rationale": "The amount saved is not the primary factor in determining if it's a genuine saving; the core issue is whether the purchase aligns with her pre-existing need and plan."}], "id": "q02"}, {"question": "Jamie uses a cash-back app for her online purchases. Which of the following is a potential 'watch for' pitfall associated with cash-back programs, as mentioned in the text?", "options": [{"text": "The cash-back percentage might be too high, leading to overspending.", "isCorrect": false, "rationale": "The text does not mention high cash-back percentages as a pitfall; rather, it's generally seen as a benefit (when used correctly)."}, {"text": "The app might require a minimum accumulated amount before you can cash out your earnings.", "isCorrect": true, "rationale": "The text explicitly advises to 'Watch for: Minimum payout thresholds (you may need $20 accumulated before you can cash out)'."}, {"text": "Cash-back apps are often linked to credit scores, potentially lowering them.", "isCorrect": false, "rationale": "The text does not mention any link between cash-back apps and credit scores."}, {"text": "They typically only offer cash back on luxury items, not everyday essentials.", "isCorrect": false, "rationale": "The text states cash-back apps help 'On products you buy regularly,' implying a broad range of items, including essentials."}], "id": "q03"}, {"question": "Mark sees an offer for a $100 gift card to a niche sporting goods store for $80. He doesn't regularly shop at this store but thinks he might find something there eventually. Which of the following warnings from the text applies most directly to Mark's situation?", "options": [{"text": "The risk of the retailer going out of business and losing the balance.", "isCorrect": false, "rationale": "While a valid warning for gift cards, this is not the most direct warning related to Mark's specific reasoning for buying a card for a store he doesn't regularly visit."}, {"text": "The difficulty of recovering money if the gift card is stolen or fraudulently obtained.", "isCorrect": false, "rationale": "This warning applies to the source of the gift card, not Mark's decision to buy for a store he doesn't frequent."}, {"text": "It's a spending commitment to a store he would not otherwise visit, making it not a true saving.", "isCorrect": true, "rationale": "The text directly states, 'A discounted gift card to a store you would not otherwise visit is not a savings—it is a spending commitment.' This perfectly describes Mark's scenario."}, {"text": "Stockpiling large balances is discouraged.", "isCorrect": false, "rationale": "Mark is considering buying one gift card, not stockpiling, so this warning is less relevant to his immediate decision."}], "id": "q04"}, {"question": "A stationery store offers a 'Buy 2 Get 1 Free' deal on notebooks. Sarah needs one notebook for her class. If she decides to take advantage of the deal, how does the text suggest she should evaluate this purchase?", "options": [{"text": "She should view it as saving money because she gets a 'free' item.", "isCorrect": false, "rationale": "The text warns that the 'free' item is not truly free but bundled into the purchase requirement, and such deals often lead to buying more than needed."}, {"text": "She should only consider it a saving if she genuinely needed all three notebooks.", "isCorrect": true, "rationale": "The text explicitly states, 'These deals are only worth it if you actually need three of something.' Since Sarah only needs one, buying three would be an overspending."}, {"text": "She has effectively gotten 33% off each notebook she buys.", "isCorrect": false, "rationale": "While mathematically it can seem like a discount per item, the text focuses on the fact that she spent twice what she planned if she only needed one, making it not a saving."}, {"text": "She should calculate the per-item discount to determine her savings.", "isCorrect": false, "rationale": "The text emphasizes evaluating the deal based on genuine need for the quantity, not just the perceived per-item discount."}], "id": "q05"}, {"question": "A department store advertises a 'Mega Sale' on a new blender, showing a 'Was $199.99, Now $79.99' tag. Based on the text's discussion of price anchoring, what should a smart shopper primarily consider?", "options": [{"text": "The percentage discount from the 'Was' price, as it indicates the value of the deal.", "isCorrect": false, "rationale": "The text warns that 'retail “sales” often use inflated original prices to make the discount look impressive,' meaning the 'Was' price might not reflect actual value."}, {"text": "Whether the sale price of $79.99 is genuinely below the item's fair market value.", "isCorrect": true, "rationale": "The text advises, 'A deal is only a deal if the sale price is genuinely below the fair market value of the item,' counteracting the price anchoring tactic."}, {"text": "The novelty of the 'Mega Sale' event, suggesting it's a rare opportunity.", "isCorrect": false, "rationale": "The text mentions stores design sale timing to influence behavior, but relying on a 'Mega Sale' title rather than actual value is not recommended."}, {"text": "The brand reputation of the blender, as higher quality justifies a higher initial price.", "isCorrect": false, "rationale": "While brand reputation is a factor in purchasing decisions, it's separate from the evaluation of the 'deal' itself in the context of price anchoring."}], "id": "q06"}, {"question": "A local electronics store advertises a laptop at '20% off original price!' for $800. Before purchasing, a savvy consumer, following the advice in the 'moneytip' section, should primarily do what?", "options": [{"text": "Verify the 'original price' to ensure the 20% discount is accurate.", "isCorrect": false, "rationale": "While checking accuracy is good, the 'moneytip' emphasizes comparing the *sale price* itself, not just the discount."}, {"text": "Check if any other items in the store also have a 20% discount.", "isCorrect": false, "rationale": "This action is irrelevant to determining if the laptop deal specifically is a genuine saving."}, {"text": "Research the everyday price of the same or equivalent laptop at competing stores.", "isCorrect": true, "rationale": "The 'moneytip' states, 'Compare the sale price—not just the discount. Before using a coupon or deal, check the price of the same or equivalent item at a competing store.'"}, {"text": "Wait for a larger discount, as 20% off might not be enough.", "isCorrect": false, "rationale": "This is a personal budgeting decision, not the primary advice given in the 'moneytip' for evaluating a current deal."}], "id": "q07"}, {"question": "Emily needs to buy a new winter coat. She sees a '50% off!' sale at a store she rarely visits, bringing the price down to $100. She also knows that winter clothing generally sells cheapest in January-February. It's currently October. Based on the text, which of the following is the BEST course of action for Emily to ensure genuine savings?", "options": [{"text": "Buy the coat immediately, as 50% off is a significant discount.", "isCorrect": false, "rationale": "A large discount doesn't guarantee a genuine saving if the starting price was inflated, or if a better deal is available later, or elsewhere. This ignores the 'moneytip' and 'didyouknow' sections."}, {"text": "Compare the $100 sale price with prices of similar coats at her regular stores, and consider waiting until January-February if possible.", "isCorrect": true, "rationale": "This approach combines the advice to 'Compare the sale price—not just the discount' (by checking competing stores) with the knowledge that 'winter clothing cheapest in January–February,' indicating strategic timing."}, {"text": "Purchase a discounted gift card for the store to further reduce the cost of the $100 coat.", "isCorrect": false, "rationale": "The text warns against buying discounted gift cards for stores one doesn't genuinely use, and Emily rarely visits this store, making it a spending commitment rather than a guaranteed saving."}, {"text": "Buy two coats since it's 50% off, even though she only needs one, to maximize savings.", "isCorrect": false, "rationale": "This violates the core principle of genuine savings: 'You buy only the quantity you actually need.' Buying an extra item she doesn't need would cost her money, not save it."}], "id": "q08"}, {"question": "Sarah needs a new pair of running shoes. She finds a coupon for '20% off any athletic footwear.' She was planning to buy a specific model of Brand A shoes at Store Z for $100. Store Z accepts the coupon, bringing the price to $80. Which of the following best describes if this is a genuine saving, according to the text?", "options": [{"text": "It is a genuine saving because she was going to buy the shoes anyway, and the coupon made them cheaper than her next-best alternative at Store Z.", "isCorrect": true, "rationale": "This action meets all three conditions for a genuine saving: she 'was going to buy the item anyway,' the deal 'makes it cheaper than the next-best alternative' (her planned $100 purchase), and she is buying the 'quantity she actually need' (one pair)."}, {"text": "It is not a genuine saving because she should have compared prices at other stores first to ensure $100 was the best original price.", "isCorrect": false, "rationale": "While comparing prices is generally good advice (moneytip), the question asks if *this specific action with the coupon* represents a genuine saving. Given she *was planning* to buy at $100, getting it for $80 is a saving on that planned purchase."}, {"text": "It is not a genuine saving because the coupon might be a tactic to make her buy shoes she doesn't really need.", "isCorrect": false, "rationale": "The question states she 'needs' a new pair of shoes and 'was planning' to buy them, so this argument does not apply here."}, {"text": "It is a genuine saving only if the original price of $100 was not inflated by price anchoring.", "isCorrect": false, "rationale": "While price anchoring is a valid concern, the question focuses on the coupon's effect on her *planned* purchase price. A $20 reduction on a planned $100 purchase is a saving from her perspective, regardless of the historical 'original' price."}], "id": "q09"}, {"question": "Samantha is planning to buy a new winter coat. Based on the information provided regarding retail sale timing, when would be the most strategic time for her to find the cheapest deals on winter clothing?", "options": [{"text": "Around major sporting events, like the Super Bowl.", "isCorrect": false, "rationale": "The text states that TVs are cheapest around major sporting events, not winter clothing."}, {"text": "In May or November, which is when mattresses are cheapest.", "isCorrect": false, "rationale": "The text specifies May and November as the cheapest times for mattresses, not winter clothing."}, {"text": "During January-February, as stores clear out seasonal inventory.", "isCorrect": true, "rationale": "The 'didyouknow' section explicitly states, 'winter clothing cheapest in January–February' as stores make room for new seasonal items."}, {"text": "At the end of the month, when salespeople need to hit quotas.", "isCorrect": false, "rationale": "The text mentions cars are cheapest at the end of the month due to quotas, not winter clothing."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
