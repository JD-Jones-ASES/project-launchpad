<script>
var QUESTIONS = [{"question": "According to the provided formula, how is Education Return on Investment (ROI) primarily calculated?", "options": [{"text": "By dividing the Education Cost by the Lifetime Earnings Premium and multiplying by 100%.", "isCorrect": false, "rationale": "This formula inverts the correct calculation, which subtracts cost from premium before dividing by cost."}, {"text": "By subtracting the Education Cost from the Lifetime Earnings Premium, then dividing by the Education Cost and multiplying by 100%.", "isCorrect": true, "rationale": "The formula explicitly states ROI = (Lifetime Earnings Premium - Education Cost) / Education Cost * 100%, accurately reflecting the net gain relative to the initial investment."}, {"text": "By simply comparing the starting salary to the total education cost.", "isCorrect": false, "rationale": "The text emphasizes that ROI is not just about starting salary and uses 'Lifetime Earnings Premium' in its formal definition, indicating a long-term perspective."}, {"text": "By adding the Lifetime Earnings Premium and Education Cost, then dividing by the Education Cost.", "isCorrect": false, "rationale": "This calculation would inaccurately inflate the perceived return by adding the cost instead of subtracting it from the premium."}], "id": "q01"}, {"question": "A student is considering two paths: a skilled trade with $5,000 training cost and an experienced salary of $80,000, or a 4-year business degree with $112,800 total cost and an experienced salary of $90,000. Based solely on the information provided, which path appears to offer a potentially stronger 'early ROI' and why?", "options": [{"text": "The 4-year business degree, because its experienced salary is higher, indicating greater long-term potential.", "isCorrect": false, "rationale": "While the experienced salary is slightly higher, the significantly lower cost and earlier entry into the workforce for the skilled trade path make its early ROI potentially stronger, as stated in the summary."}, {"text": "The skilled trade path, due to its significantly lower training cost and income earned during the training period.", "isCorrect": true, "rationale": "The text's summary explicitly states that 'the skilled trade and high-demand professional paths often show stronger early ROI than a general 4-year degree,' primarily due to lower costs and earlier earning potential."}, {"text": "Both paths offer comparable early ROI, as the higher salary of the business degree balances its higher cost.", "isCorrect": false, "rationale": "The cost differential is substantial ($5,000 vs. $112,800), and the business degree involves 4 years without earning income, making early ROI not comparable without detailed calculation."}, {"text": "The 4-year business degree, because it takes the same amount of time to career as the skilled trade but with a higher salary potential.", "isCorrect": false, "rationale": "The business degree takes 4 years with no earning during full-time study, whereas the skilled trade takes 4-5 years with wages earned during training, making the 'time to career' impact different."}], "id": "q02"}, {"question": "Beyond starting salary and total cost, which of the following is NOT explicitly mentioned as a crucial factor influencing the overall Return on Investment (ROI) of an educational path?", "options": [{"text": "Time to enter the workforce.", "isCorrect": false, "rationale": "The text mentions 'time to enter the workforce' as a key factor affecting ROI, especially when comparing paths with and without earning during training."}, {"text": "Career longevity and employment stability.", "isCorrect": false, "rationale": "The summary notes 'career longevity' and 'employment stability' as significant factors adding value, particularly for the Nursing path."}, {"text": "The prestige of the university attended.", "isCorrect": true, "rationale": "While university prestige might indirectly influence some outcomes, it is not explicitly listed in the 'Summary: ROI is not just about starting salary—it depends on...' section as a direct, crucial factor for calculating ROI in this context."}, {"text": "Earnings growth potential.", "isCorrect": false, "rationale": "The text lists 'earnings growth' as an important factor in evaluating ROI, considering experienced salaries over starting salaries."}], "id": "q03"}, {"question": "A $50,000 student loan at 5.5% APR over 10 years results in monthly payments of $542.65. If a graduate earns a starting gross monthly income of $3,750, what percentage of their gross income is consumed by this loan payment, and what does this imply about borrowing larger amounts?", "options": [{"text": "Approximately 14.5%; borrowing $100,000 would decrease this percentage, making it more manageable.", "isCorrect": false, "rationale": "Borrowing $100,000 would roughly double the payment, significantly increasing the percentage of income consumed, making it less manageable."}, {"text": "Approximately 14.5%; borrowing $100,000 would nearly double this percentage, making it a significant financial strain.", "isCorrect": true, "rationale": "The text states '$542.65 / $3,750 = 14.5%' and clarifies that a $100,000 loan 'nearly doubles to approximately $1,085/month,' consuming '29% of gross income—before taxes, rent, food, or any other expense,' indicating significant strain."}, {"text": "Approximately 29%; this is considered a low percentage, suggesting high manageability.", "isCorrect": false, "rationale": "29% is for a $100,000 loan, not $50,000, and the text describes it as 'significant' and 'before taxes, rent, food, or any other expense,' implying it's not low or highly manageable."}, {"text": "Approximately 5.5%; student loan payments are typically a minor percentage of starting income.", "isCorrect": false, "rationale": "5.5% is the interest rate, not the percentage of income. The text demonstrates that loan payments can be a significant portion of starting income."}], "id": "q04"}, {"question": "The 'moneytip' suggests a rule of thumb for student loan debt: total debt at graduation should not exceed your expected first-year salary. If a student anticipates a first-year salary of $60,000, what is the maximum recommended student loan debt, and why is this advice important?", "options": [{"text": "$120,000; because it ensures you can comfortably afford double your monthly payment if your income increases.", "isCorrect": false, "rationale": "The rule of thumb is 'total student loan debt at graduation should not exceed your expected first-year salary,' so $120,000 would be twice the recommended amount. The reason for the rule is manageability, not the ability to double payments."}, {"text": "$60,000; because exceeding this amount can make monthly payments a significant financial burden relative to income.", "isCorrect": true, "rationale": "The rule of thumb directly states debt should not exceed the first-year salary, which would be $60,000. The preceding 'Student Loan Reality Check' highlights how higher debt leads to a larger proportion of income dedicated to loan payments, making it a burden."}, {"text": "$30,000; to ensure minimal interest accrual over the repayment period.", "isCorrect": false, "rationale": "While minimizing interest is good, the specific rule of thumb allows for debt up to the first-year salary. $30,000 would be half of the recommended maximum for this salary."}, {"text": "Any amount is acceptable, as long as the interest rate is below 5.5%.", "isCorrect": false, "rationale": "The text emphasizes the total amount of debt relative to income, not just the interest rate, as crucial for financial manageability. The warning about high percentages of gross income applies regardless of the specific rate being below 5.5%."}], "id": "q05"}, {"question": "Which career path example provided in the text explicitly highlights 'high demand nationally, stable employment, strong ROI, career longevity, and geographic flexibility' as significant advantages?", "options": [{"text": "Path A: Skilled Trade (Electrician)", "isCorrect": false, "rationale": "The Skilled Trade path highlights high demand, low automation risk, and self-employment potential, but not specifically national demand, geographic flexibility, or career longevity in the same way."}, {"text": "Path B: 4-Year Business Degree", "isCorrect": false, "rationale": "The Business Degree path notes high variability in ROI and employer, not a consistent strong demand, stability, or geographic flexibility."}, {"text": "Path C: High-Demand Professional Degree (Nursing)", "isCorrect": true, "rationale": "The description for Path C (Nursing) explicitly lists 'High demand nationally, stable employment, strong ROI, Career longevity and geographic flexibility add value' as its key advantages."}, {"text": "None of the above paths emphasize all these advantages.", "isCorrect": false, "rationale": "Path C (Nursing) clearly emphasizes all these advantages."}], "id": "q06"}, {"question": "The 'warning' section advises against choosing a major and career based 'solely on passion without considering the job market.' What is the underlying financial risk associated with this approach?", "options": [{"text": "It can lead to overqualification for available entry-level positions.", "isCorrect": false, "rationale": "The text doesn't mention overqualification as the primary risk; it focuses on the ability to find jobs and at what salaries."}, {"text": "It may result in difficulty finding employment or securing a salary that can support student loan debt and living expenses.", "isCorrect": true, "rationale": "The warning states 'research whether people with your intended degree can actually find jobs and at what salaries,' directly linking to the financial risk of inability to find work or earn enough to manage finances, especially student loans."}, {"text": "It typically leads to increased competition from a global workforce, diminishing job prospects.", "isCorrect": false, "rationale": "While global competition is a factor in some fields, the text's warning is more general about the job market's ability to absorb graduates in a given field, not specific to global competition."}, {"text": "It prevents individuals from pursuing meaningful work, despite financial stability.", "isCorrect": false, "rationale": "The warning explicitly states 'This does not mean you should pursue a career you hate—but it does mean you should research whether people with your intended degree can actually find jobs.' The risk is financial, not an inherent prevention of meaningful work."}], "id": "q07"}, {"question": "Why is the 'Lifetime Earnings Premium' a crucial component in calculating the Return on Investment (ROI) for education, rather than just the starting salary?", "options": [{"text": "Because it only considers the immediate financial benefits, providing a snapshot of the first few years of employment.", "isCorrect": false, "rationale": "The 'Lifetime Earnings Premium' specifically refers to 'additional income you earn over your working life,' emphasizing a long-term perspective, not just immediate benefits."}, {"text": "Because starting salaries are often misleading and do not account for taxes or benefits.", "isCorrect": false, "rationale": "While starting salaries can be misleading and don't account for taxes, the 'Lifetime Earnings Premium' is more about the total additional income over a career, not just the details of the starting salary's gross vs. net."}, {"text": "Because it captures the total additional income earned over an entire career due to the education, reflecting the long-term financial impact.", "isCorrect": true, "rationale": "The definition of Lifetime Earnings Premium is 'the additional income you earn over your working life compared to not having that education credential,' which is essential for a comprehensive ROI calculation that looks beyond initial gains."}, {"text": "Because it is simpler to calculate and provides a more optimistic view of educational benefits.", "isCorrect": false, "rationale": "Calculating lifetime earnings is complex, and its purpose is to provide a comprehensive, realistic view, not necessarily a simpler or more optimistic one."}], "id": "q08"}, {"question": "Which of the following scenarios best demonstrates a comprehensive approach to evaluating an educational investment, aligning with the advice given in the section?", "options": [{"text": "Choosing a program solely based on its low tuition costs, assuming any degree will eventually pay off.", "isCorrect": false, "rationale": "The text advises researching career outcomes and salary potential, not just focusing on cost, and warns against ignoring the job market, implying not 'any degree will eventually pay off'."}, {"text": "Enrolling in a graduate program for a field with high personal interest, without checking employment rates or typical salaries for graduates.", "isCorrect": false, "rationale": "The 'warning' section explicitly cautions against choosing a career 'solely on passion without considering the job market' and advises researching 'median starting salary' and 'employment rate.'"}, {"text": "Selecting a high-demand professional degree, carefully researching its typical starting salary, employment rate, and confirming the expected loan payments are manageable within that salary.", "isCorrect": true, "rationale": "This option incorporates all three key recommendations from the 'moneytip' section: investigating median starting salary, employment rate, and whether expected salary can support loan payments."}, {"text": "Opting for a general 4-year degree from a prestigious university, expecting its reputation to guarantee a high-paying job regardless of the major.", "isCorrect": false, "rationale": "The text notes ROI 'varies greatly by specialization' for a 4-year business degree and highlights the importance of market research for specific fields, not just general university prestige."}], "id": "q09"}, {"question": "The text compares the Nursing path (Path C) with a 4-year Business Degree (Path B). What is a key difference in their described financial characteristics, even if their mid-career salaries might overlap?", "options": [{"text": "The Business Degree consistently offers a higher starting salary than Nursing.", "isCorrect": false, "rationale": "Nursing's starting salary ($65,000–$75,000) is generally higher than the Business Degree's ($45,000–$55,000), contradicting this statement."}, {"text": "Nursing generally has higher training costs but also higher experienced salaries than a Business Degree.", "isCorrect": false, "rationale": "The Business Degree's cost ($112,800) is higher than Nursing's ($60,000–$80,000), making this statement incorrect regarding training costs."}, {"text": "The Business Degree has a higher total cost and its ROI 'varies greatly by specialization,' whereas Nursing is described with 'strong ROI' and 'stable employment'.", "isCorrect": true, "rationale": "The Business Degree total cost is $112,800, higher than Nursing's $60,000-$80,000. The text explicitly states 'ROI varies greatly by specialization' for business and 'strong ROI' and 'stable employment' for nursing, highlighting their distinct financial characteristics."}, {"text": "The Nursing path involves earning wages during training, unlike the Business Degree.", "isCorrect": false, "rationale": "The Skilled Trade path earns wages during training, not the Nursing path, which describes a '4-year BSN program' implying full-time study without earning."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
