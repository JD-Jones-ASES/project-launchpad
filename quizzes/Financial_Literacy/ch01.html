<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following scenarios best illustrates the fundamental challenge of the 'double coincidence of wants' in a barter system?", "options": [{"text": "A farmer has surplus grain but needs a new tool, and the blacksmith who makes tools only accepts livestock as payment.", "isCorrect": true, "rationale": "This scenario perfectly illustrates the double coincidence of wants problem: the farmer wants a tool, but the blacksmith (who has the tool) does not want grain, so a direct exchange cannot occur. Both parties' wants do not coincide."}, {"text": "A fisher has a large catch of perishable fish and cannot find anyone to trade with before the fish spoils.", "isCorrect": false, "rationale": "This describes the 'storing wealth is hard' problem due to the perishability of goods, not specifically the double coincidence of wants."}, {"text": "A weaver needs a small amount of wool but only has a finished blanket, which is worth many times more than the wool needed.", "isCorrect": false, "rationale": "This situation highlights the 'indivisibility' problem of barter, where goods cannot be easily divided to match values in a trade."}, {"text": "Two traders argue over whether one cow is worth ten chickens or twelve chickens, delaying their transaction.", "isCorrect": false, "rationale": "This describes the 'no common measure of value' problem, where negotiating exchange rates for every trade is complex and time-consuming."}], "id": "q01"}, {"question": "In a small, close-knit village economy, which of the following problems of barter would likely be *least* impactful?", "options": [{"text": "The difficulty of storing wealth, especially with perishable goods.", "isCorrect": false, "rationale": "Even in a small village, perishable goods would still degrade, making storage difficult unless consumed quickly or preserved."}, {"text": "The absence of a common measure of value, requiring constant negotiation of exchange rates.", "isCorrect": false, "rationale": "While potentially less complex than in a large market, a common measure of value would still be lacking, leading to negotiation challenges for every unique trade."}, {"text": "The indivisibility of certain goods, making 'change' impossible.", "isCorrect": false, "rationale": "Large, indivisible goods (like livestock) would still pose a problem for smaller transactions, regardless of community size."}, {"text": "The double coincidence of wants, as everyone knows each other's needs and products.", "isCorrect": true, "rationale": "The text states that in a small village where everyone knows everyone, the double coincidence of wants 'might work out' because it's easier to find someone who wants what you have and has what you need."}], "id": "q02"}, {"question": "Which item below is the best example of commodity money based on its description in the text?", "options": [{"text": "A Roman denarius coin, guaranteed by the government for its weight and purity.", "isCorrect": false, "rationale": "While containing precious metal (a commodity), the denarius represents a step beyond raw commodity money by being standardized and government-guaranteed, marking the era of minted coins."}, {"text": "A modern U.S. dollar bill, declared legal tender by the government.", "isCorrect": false, "rationale": "A U.S. dollar bill is fiat money, deriving its value from government decree and public trust, not from an inherent material value as a good."}, {"text": "A cacao bean used by the Aztec for currency, also valued highly for making chocolate.", "isCorrect": true, "rationale": "Cacao beans fit the definition of commodity money because their value comes from their material or usefulness as a good (for making chocolate), in addition to their use as currency."}, {"text": "A 'flying money' certificate from the Tang Dynasty, redeemable in a different city.", "isCorrect": false, "rationale": "This is an early form of paper money or credit, a precursor to modern banknotes, not commodity money."}], "id": "q03"}, {"question": "The invention of minted coins around 600 BCE was a significant breakthrough because it primarily addressed which issue?", "options": [{"text": "The problem of having too much precious metal in circulation.", "isCorrect": false, "rationale": "The text does not indicate that too much metal was the problem; rather, it addressed the challenges of using raw precious metals."}, {"text": "The need for a medium of exchange that had no inherent value, only declared value.", "isCorrect": false, "rationale": "Coins still used precious metals with inherent value; fiat money (value based on declaration) came much later."}, {"text": "The necessity of weighing and verifying the purity of metal for every transaction.", "isCorrect": true, "rationale": "The text states, 'Instead of weighing out lumps of gold or silver for every transaction, you could hand over a coin whose weight and purity were guaranteed by the government.' This standardization significantly eased trade."}, {"text": "The difficulty of storing wealth in perishable forms like grain or livestock.", "isCorrect": false, "rationale": "While coins made storing wealth easier by being durable, this was a benefit of using durable materials like precious metals, not the primary breakthrough of *minting* them."}], "id": "q04"}, {"question": "The practice of 'debasement' of coins by governments, as mentioned in the text, most directly contributes to which economic consequence?", "options": [{"text": "Increased trust in the government's monetary policy.", "isCorrect": false, "rationale": "The text explicitly states that debasement 'contributed to inflation and economic instability' and led people to 'demand better guarantees of money's value,' implying decreased trust."}, {"text": "A decrease in the overall supply of money in circulation.", "isCorrect": false, "rationale": "Debasement was often done to 'stretch their treasuries,' suggesting an attempt to increase the effective money supply without finding new precious metals, not decrease it."}, {"text": "Inflation and economic instability.", "isCorrect": true, "rationale": "The text states that Roman emperors' repeated debasement 'contributed to inflation and economic instability' because the coins contained cheaper metals but retained the same face value, reducing their real purchasing power."}, {"text": "The widespread adoption of the gold standard.", "isCorrect": false, "rationale": "Debasement refers to changing the composition of coins, which existed before and continued through periods of gold-backed currency, but it's not the cause of adopting a gold standard."}], "id": "q05"}, {"question": "Which statement accurately describes the transition from gold-backed currency to fiat money?", "options": [{"text": "Gold-backed currency relies on government decree, while fiat money is valuable due to its inherent material worth.", "isCorrect": false, "rationale": "This reverses the definitions. Fiat money relies on government decree; gold-backed currency (and commodity money) derives value from material worth or promise of it."}, {"text": "The shift occurred as governments sought to simplify trade by making all currency digital.", "isCorrect": false, "rationale": "The shift to fiat money largely predated widespread digital currency. The move was primarily about flexibility in managing the economy, not digitalization."}, {"text": "Fiat money's value is tied to a fixed amount of gold, while gold-backed currency relies on public trust.", "isCorrect": false, "rationale": "This statement is incorrect. Fiat money is *not* tied to gold, and while public trust is essential for fiat money, gold-backed currency's value is derived from the promise of gold."}, {"text": "Fiat money is valued by government declaration and public trust, unlike gold-backed currency which could be redeemed for physical gold.", "isCorrect": true, "rationale": "This accurately reflects the definitions provided: gold-backed currency involved a promise to return gold, while fiat money (like the modern U.S. dollar) has value because the government declares it legal tender and the public trusts it."}], "id": "q06"}, {"question": "According to the text, what is a primary reason the U.S. dollar maintains its value as fiat money today?", "options": [{"text": "It is directly convertible into a fixed amount of silver at any bank.", "isCorrect": false, "rationale": "The text explicitly states that the dollar is no longer directly convertible to gold (or silver) and its value is not backed by a physical commodity."}, {"text": "Its value is based solely on the quantity of gold reserves held by the Federal Reserve.", "isCorrect": false, "rationale": "The U.S. dollar is fiat money, meaning its value is *not* based on gold reserves but on government decree and public trust."}, {"text": "The U.S. government declares it legal tender, and the public trusts its acceptance.", "isCorrect": true, "rationale": "The text lists two key reasons for the dollar's value as fiat money: the government declaring it legal tender and the public's trust in its acceptance."}, {"text": "It is intrinsically valuable as a physical commodity, like ancient salt.", "isCorrect": false, "rationale": "The dollar is fiat money, meaning it does not have intrinsic value as a commodity; its value is derived from its function as money."}], "id": "q07"}, {"question": "Which of the following best represents the most common form of money in circulation today?", "options": [{"text": "Gold and silver coins exchanged directly between individuals.", "isCorrect": false, "rationale": "While historically significant, precious metal coins are no longer the most common form of money in modern economies."}, {"text": "Physical paper bills and metal coins stored in individuals' wallets and bank vaults.", "isCorrect": false, "rationale": "The text states, 'most money never exists as physical bills or coins at all,' indicating that physical currency is no longer the predominant form."}, {"text": "Digital records and electronic transfers in computer systems.", "isCorrect": true, "rationale": "The text explains that 'most money never exists as physical bills or coins at all' and that 'bank account balances and digital transfers' constitute 'most of the money in circulation today.'"}, {"text": "Decentralized cryptocurrencies like Bitcoin.", "isCorrect": false, "rationale": "Cryptocurrencies are a form of digital money, but the text clarifies they are *a type* of digital currency, not 'most of the money in circulation today' compared to traditional digital bank balances."}], "id": "q08"}, {"question": "A country decides to transition its currency from being gold-backed to fiat money. What is a likely immediate consequence or challenge of this decision?", "options": [{"text": "The immediate disappearance of all physical currency, replaced entirely by digital transactions.", "isCorrect": false, "rationale": "The transition to fiat money does not automatically mean the elimination of physical currency; paper bills and coins can still exist as fiat money."}, {"text": "Increased public demand for the government to accept physical gold for all debts.", "isCorrect": false, "rationale": "Moving *away* from gold backing means the government is no longer obligated to accept or redeem physical gold for currency, which would likely decrease, not increase, such demands."}, {"text": "The government's need to establish public trust in the new currency's value and manage its supply effectively.", "isCorrect": true, "rationale": "The text emphasizes that fiat money's value rests on government decree and public trust, and central banks manage the money supply. A transition would require building and maintaining this trust and management."}, {"text": "The automatic global acceptance of the currency due to its newfound independence from commodities.", "isCorrect": false, "rationale": "Global acceptance of any currency is a complex issue based on economic stability and trade relationships, not simply its status as fiat money."}], "id": "q09"}, {"question": "Understanding the evolution of money from barter to digital forms, what is the most profound underlying problem that each stage of money (commodity, coins, paper, fiat, digital) has attempted to solve for human civilization?", "options": [{"text": "The problem of governments being unable to control the economy.", "isCorrect": false, "rationale": "While money gives governments more control, the fundamental problem money solves is related to trade and exchange, which existed before governments had strong economic control."}, {"text": "The challenge of efficiently facilitating trade and exchange in increasingly complex economies.", "isCorrect": true, "rationale": "Each stage of money's evolution, from overcoming barter's flaws to standardizing value and enabling swift digital transactions, has primarily aimed to make trade more efficient and scalable as economies grew in complexity."}, {"text": "The continuous need to find new sources of intrinsic value for currency.", "isCorrect": false, "rationale": "The evolution actually moves *away* from inherent intrinsic value (commodity money) towards declared value (fiat money), suggesting this is not the continuous problem being solved."}, {"text": "The desire to eliminate all forms of physical currency.", "isCorrect": false, "rationale": "While digital money is prevalent, the aim was not necessarily to eliminate physical currency, but rather to find more convenient and secure ways to exchange value. Physical currency still exists even in digital economies."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
