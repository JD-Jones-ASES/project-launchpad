<script>
var QUESTIONS = [{"question": "What is the primary function of a Power of Attorney (POA) as described in the text?", "options": [{"text": "To specify how your assets should be distributed after your death.", "isCorrect": false, "rationale": "This describes the function of a will, not a Power of Attorney. A POA primarily deals with managing affairs while the principal is alive."}, {"text": "To grant legal authority to an agent to make financial and legal decisions on your behalf while you are alive.", "isCorrect": true, "rationale": "The text defines a Power of Attorney as a legal document where you (the principal) give another person (the agent) the legal authority to act on your behalf in financial and legal matters."}, {"text": "To dictate your preferences for medical treatment in situations where you cannot communicate.", "isCorrect": false, "rationale": "This is the primary function of a healthcare directive (or living will), not a Power of Attorney."}, {"text": "To appoint a conservator to manage your affairs in case of incapacity, after court approval.", "isCorrect": false, "rationale": "A POA is designed to AVOID the need for court involvement and the appointment of a conservator. If no POA is in place, a conservator might be appointed by the court."}], "id": "q01"}, {"question": "The text emphasizes the importance of a 'durable' power of attorney for estate planning. Why is a durable POA considered more critical than a general POA for addressing potential incapacity?", "options": [{"text": "A durable POA grants broader authority than a general POA in all circumstances.", "isCorrect": false, "rationale": "A general POA can grant broad authority, but the key distinction is its validity upon incapacity, not necessarily its scope. A limited POA, for example, is not broad at all."}, {"text": "A durable POA allows the agent to make medical decisions, unlike a general POA.", "isCorrect": false, "rationale": "Neither a general nor a durable financial POA grants authority over medical decisions; that role is for a healthcare proxy or healthcare power of attorney."}, {"text": "A durable POA remains effective even if the principal becomes mentally incapacitated, whereas a general POA would become invalid.", "isCorrect": true, "rationale": "The text explicitly states that a general POA 'Automatically becomes invalid if you become incapacitated (unless made “durable”).' This makes the durable POA essential for planning for incapacity."}, {"text": "A durable POA is automatically cheaper to establish than a general POA.", "isCorrect": false, "rationale": "The cost of establishing a POA is not a distinguishing factor between general and durable types in the provided text, and often depends more on attorney fees or state forms."}], "id": "q02"}, {"question": "Sarah wants her brother to be able to sell her antique car if she is hospitalized, but she does not want him to have any other authority over her finances or legal matters. Which type of Power of Attorney should she use to achieve this specific goal?", "options": [{"text": "General Power of Attorney", "isCorrect": false, "rationale": "A General POA grants broad authority over financial and legal matters, which is more than Sarah desires for this specific task."}, {"text": "Durable Power of Attorney", "isCorrect": false, "rationale": "While a Durable POA would remain effective during incapacity, it typically grants broad authority. A more specific type is needed for a single task, even if durable."}, {"text": "Limited (Special) Power of Attorney", "isCorrect": true, "rationale": "The text states that a Limited (Special) POA 'Grants authority for a specific task only (e.g., selling a specific property).' This perfectly matches Sarah's need to authorize selling only her car."}, {"text": "Healthcare Power of Attorney", "isCorrect": false, "rationale": "A Healthcare Power of Attorney (healthcare proxy) deals with medical decisions, not the sale of property."}], "id": "q03"}, {"question": "A healthcare directive (living will or advance directive) primarily serves which essential function?", "options": [{"text": "To appoint a person to manage your financial accounts if you become unable to do so.", "isCorrect": false, "rationale": "This describes the role of a financial Power of Attorney, not a healthcare directive."}, {"text": "To designate a specific individual to make medical decisions on your behalf if you are incapacitated.", "isCorrect": false, "rationale": "This describes the role of a healthcare proxy (or healthcare power of attorney), not a healthcare directive itself."}, {"text": "To legally outline your specific wishes and preferences for medical treatment in situations where you cannot communicate.", "isCorrect": true, "rationale": "The text defines a healthcare directive as a legal document that 'specifies your wishes for medical treatment in situations where you cannot communicate' and lists examples like life-sustaining measures, pain management, and organ donation."}, {"text": "To grant your family members automatic access to your medical records in an emergency.", "isCorrect": false, "rationale": "While a healthcare directive can be part of broader medical planning, its primary function is not to grant access to records, but to state wishes. A HIPAA authorization is specifically for record access."}], "id": "q04"}, {"question": "According to the text, what is a crucial characteristic to consider when selecting an individual to serve as your healthcare proxy?", "options": [{"text": "They must be a medical professional with extensive knowledge of your health conditions.", "isCorrect": false, "rationale": "The text does not state that a healthcare proxy must be a medical professional; rather, they should know your values and be able to advocate for you."}, {"text": "They should be the same person designated as your financial power of attorney to simplify legal processes.", "isCorrect": false, "rationale": "The text explicitly advises, 'Ideally not be the same person as your financial power of attorney, to avoid conflicts.'"}, {"text": "They must be a blood relative to ensure they have legal standing in medical decisions.", "isCorrect": false, "rationale": "The text does not state that a healthcare proxy must be a blood relative. Trust and knowledge of your wishes are highlighted as key criteria."}, {"text": "They should be someone you trust completely, know your values and wishes, and be willing to advocate for you.", "isCorrect": true, "rationale": "The text lists these three points directly as characteristics for the person you name as your healthcare proxy: 'Be someone you trust completely. Know your values and wishes regarding medical care. Be willing and able to advocate for you.'"}], "id": "q05"}, {"question": "Imagine a 20-year-old college student, Maya, becomes severely ill and is temporarily unable to make decisions or manage her affairs. Maya had not established any legal documents. What is the most likely outcome regarding the management of Maya's financial responsibilities (e.g., paying rent, tuition)?", "options": [{"text": "Maya's parents would automatically gain legal authority to access her bank accounts and pay bills on her behalf.", "isCorrect": false, "rationale": "The text states that once you turn 18, 'your parents have no automatic legal right' to make decisions for you, including financial ones."}, {"text": "The college administration would take responsibility for paying Maya's immediate bills from an emergency fund.", "isCorrect": false, "rationale": "The text does not suggest colleges have this responsibility or ability; this is not a typical legal solution for personal financial management."}, {"text": "Maya's family would likely need to go to court to be appointed a conservator to legally manage her financial matters.", "isCorrect": true, "rationale": "The text clearly states that 'Without a durable power of attorney,' if unable to manage affairs, 'Your family would need to go to court to be appointed a conservator—an expensive and time-consuming process.'"}, {"text": "Her doctors would be authorized to access her funds to cover immediate medical and living expenses.", "isCorrect": false, "rationale": "Medical professionals do not have legal authority to access a patient's personal bank accounts for financial management."}], "id": "q06"}, {"question": "If a person becomes incapacitated without a healthcare directive or healthcare proxy in place, what is the most significant potential issue regarding their medical treatment decisions?", "options": [{"text": "Medical decisions would be solely made by healthcare providers without any family consultation.", "isCorrect": false, "rationale": "The text states that decisions are made by healthcare providers 'in consultation with your closest available family members' if no directive exists."}, {"text": "The patient's closest available family members would make decisions, but they might disagree or not know the patient's true wishes.", "isCorrect": true, "rationale": "The text explicitly states: 'Without a healthcare directive, medical decisions are made by healthcare providers in consultation with your closest available family members—who may disagree or may not know what you would have wanted.'"}, {"text": "A court would immediately appoint a legal guardian to make all medical choices, regardless of family input.", "isCorrect": false, "rationale": "While court involvement can happen in extreme cases of disagreement, the initial process involves family consultation, not an immediate court-appointed guardian overriding family."}, {"text": "All life-sustaining measures would automatically be discontinued, regardless of the patient's potential for recovery.", "isCorrect": false, "rationale": "This is a severe and incorrect assumption. Medical ethics and legal standards would still apply, and discontinuation is not automatic without patient/proxy consent or a clear directive."}], "id": "q07"}, {"question": "The text recommends that a healthcare proxy and a financial power of attorney ideally should not be the same person. What is the primary rationale for this recommendation?", "options": [{"text": "To ensure compliance with federal laws that prohibit one individual from holding both types of authority.", "isCorrect": false, "rationale": "The text does not mention any federal laws prohibiting this, only an advisory 'to avoid conflicts.'"}, {"text": "To simplify the paperwork involved by having separate individuals manage distinct legal documents.", "isCorrect": false, "rationale": "Having two individuals would likely not simplify paperwork; the primary reason is conflict avoidance, not administrative ease."}, {"text": "To distribute the burden of responsibility among more people, making it less stressful for any single individual.", "isCorrect": false, "rationale": "While this might be a positive side effect, the text's primary stated reason is 'to avoid conflicts.'"}, {"text": "To minimize potential conflicts of interest by separating financial and medical decision-making roles.", "isCorrect": true, "rationale": "The text states, 'Ideally not be the same person as your financial power of attorney, to avoid conflicts.'"}], "id": "q08"}, {"question": "Why does the textbook specifically advise young adults (over 18) to consider establishing a durable financial power of attorney and a healthcare proxy?", "options": [{"text": "Young adults are statistically more prone to financial mismanagement, necessitating legal oversight.", "isCorrect": false, "rationale": "The text does not base its recommendation on young adults' financial habits, but on legal rights upon adulthood."}, {"text": "These documents are exclusively designed for individuals under the age of 30 and lose efficacy later in life.", "isCorrect": false, "rationale": "The documents are relevant for all adults; the text highlights their specific importance for young adults because of the change in legal status at 18."}, {"text": "Upon turning 18, parents lose automatic legal rights to access medical records or make decisions for their children, even in emergencies.", "isCorrect": true, "rationale": "The text explicitly states: 'Once you turn 18, your parents have no automatic legal right to access your medical records or make decisions for you—not even in a medical emergency. A HIPAA authorization (or a healthcare proxy) is needed for your parents to even speak with your doctors about your condition.'"}, {"text": "Establishing these documents before age 21 guarantees significant tax benefits for estate planning.", "isCorrect": false, "rationale": "The text makes no mention of tax benefits for establishing these documents at a young age."}], "id": "q09"}, {"question": "Which of the following statements best differentiates a healthcare directive from a healthcare proxy?", "options": [{"text": "A healthcare directive becomes effective only after death, while a healthcare proxy is active during life.", "isCorrect": false, "rationale": "Both documents are primarily concerned with decisions made during the principal's life if they become incapacitated. A healthcare directive might include organ donation wishes, which occur after death, but its primary purpose is for living treatment."}, {"text": "A healthcare directive specifies your wishes for medical treatment, whereas a healthcare proxy designates a specific person to make medical decisions on your behalf.", "isCorrect": true, "rationale": "This accurately distinguishes the two: the directive articulates 'what' medical treatments are desired or refused, while the proxy designates 'who' will make those decisions when you cannot."}, {"text": "A healthcare directive manages financial matters related to medical care, while a healthcare proxy manages all other financial affairs.", "isCorrect": false, "rationale": "Neither a healthcare directive nor a healthcare proxy manages financial matters; these roles are for a financial power of attorney."}, {"text": "A healthcare directive is a legally binding document, but a healthcare proxy is merely an advisory recommendation.", "isCorrect": false, "rationale": "Both a healthcare directive and a healthcare proxy are legally binding documents."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
