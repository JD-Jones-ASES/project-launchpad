        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 14, Section 3</div>

        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary message the author aims to convey about minimum payments in this section?", "options": [{"text": "They are an affordable way for most people to manage their debt.", "isCorrect": false, "rationale": "The text explicitly calls minimum payments a 'trap' and the 'most expensive way to pay this off,' directly contradicting the idea of affordability."}, {"text": "They are intentionally designed to keep consumers in debt as long as possible.", "isCorrect": true, "rationale": "The 'Warning' section states that minimum payments are 'designed to keep you in debt as long as possible' so credit card companies can 'earn billions of dollars per year from interest charges.'"}, {"text": "They represent the actual amount owed on a credit card statement.", "isCorrect": false, "rationale": "The text advises: 'When you see a minimum payment, do not think “that is what I owe.”' It clarifies that the minimum payment is a fraction of the total debt."}, {"text": "They allow consumers to pay off debt quickly if managed correctly.", "isCorrect": false, "rationale": "The section demonstrates that minimum payments lead to extremely long payoff periods (e.g., 29 years for a $3,000 balance), not quick payoff."}], "id": "q01"}, {"question": "Using the initial scenario provided ($3,000 balance, 22% APR, 2% minimum payment with $25 floor), how much of the first month's minimum payment is applied to the principal?", "options": [{"text": "$5.00", "isCorrect": true, "rationale": "As calculated in the 'Month 1' steps: Minimum payment is $60.00, monthly interest is $55.00. Principal paid = $60.00 - $55.00 = $5.00."}, {"text": "$55.00", "isCorrect": false, "rationale": "This amount represents the interest charged for the first month, not the principal paid."}, {"text": "$60.00", "isCorrect": false, "rationale": "This amount represents the total minimum payment made for the first month, not just the principal portion."}, {"text": "$145.00", "isCorrect": false, "rationale": "This amount represents the principal paid in the first month if a fixed $200 payment was made, not the minimum payment."}], "id": "q02"}, {"question": "Based on the scenario presented, why does the credit card balance decrease so slowly when only minimum payments are made?", "options": [{"text": "A substantial portion of the minimum payment is consumed by interest charges.", "isCorrect": true, "rationale": "The calculations for the first three months clearly show that the vast majority of the minimum payment goes towards interest, leaving only a small amount to reduce the principal."}, {"text": "The annual percentage rate (APR) is exceptionally low, reducing principal payments.", "isCorrect": false, "rationale": "An APR of 22% is considered high, which actually increases the interest burden, not reduces it."}, {"text": "Credit card companies deliberately round down principal payments to the nearest dollar.", "isCorrect": false, "rationale": "While the numbers might be rounded for display, the core reason for slow principal reduction is the high interest percentage relative to the minimum payment, not an arbitrary rounding policy."}, {"text": "New purchases are continuously added, offsetting any principal reduction.", "isCorrect": false, "rationale": "The scenario explicitly states 'No new purchases added,' indicating that the slow reduction is due to the payment structure itself, not additional spending."}], "id": "q03"}, {"question": "According to the 'Full Picture' analysis, what is the approximate total amount a consumer would pay back for an original $3,000 balance if only minimum payments are made?", "options": [{"text": "$3,000", "isCorrect": false, "rationale": "This is the original balance borrowed, not the total amount paid back after interest accrues over 29 years."}, {"text": "$5,430", "isCorrect": false, "rationale": "This amount represents the total interest paid, not the total principal plus interest that is paid back."}, {"text": "$8,430", "isCorrect": true, "rationale": "The text states: 'You borrowed $3,000. You end up paying back $8,430,' which is the sum of the original principal and the total interest."}, {"text": "$430", "isCorrect": false, "rationale": "This amount represents the approximate interest paid if a fixed $200 payment was made, not the total paid back with minimum payments."}], "id": "q04"}, {"question": "What is the most significant financial benefit of making a fixed payment of $200/month, as opposed to the minimum payment, on the $3,000 balance at 22% APR?", "options": [{"text": "The debt is paid off in 18 months instead of 29 years.", "isCorrect": true, "rationale": "The section highlights this dramatic reduction in payoff time as a key benefit, along with substantial interest savings. This option encompasses a major positive outcome."}, {"text": "The monthly interest calculation becomes simpler.", "isCorrect": false, "rationale": "The method of calculating monthly interest (APR/12 * balance) remains the same; only the balance changes more quickly."}, {"text": "The credit card company offers rewards points for larger payments.", "isCorrect": false, "rationale": "The text does not mention rewards points; the focus is on the financial mechanics of debt repayment."}, {"text": "The minimum payment floor no longer applies to the account.", "isCorrect": false, "rationale": "While a higher fixed payment makes the minimum payment floor irrelevant in practice, the rule itself still exists. The benefit is in paying *more* than the minimum, not abolishing the rule."}], "id": "q05"}, {"question": "Using the information from the section, approximately how much interest can a borrower save by consistently paying $200 per month instead of only the minimum payment on a $3,000 balance at 22% APR?", "options": [{"text": "$430", "isCorrect": false, "rationale": "This is the approximate total interest paid with the fixed $200/month payment, not the savings."}, {"text": "$5,000", "isCorrect": true, "rationale": "The text explicitly states: 'You save approximately $5,000 in interest' by comparing the $5,430 interest with minimum payments to $430 with fixed payments."}, {"text": "$5,430", "isCorrect": false, "rationale": "This is the approximate total interest paid if only minimum payments are made, not the savings."}, {"text": "$8,430", "isCorrect": false, "rationale": "This is the approximate total amount (principal + interest) paid if only minimum payments are made, not the interest savings."}], "id": "q06"}, {"question": "Based on the 'Warning' section, what is the primary motivation for credit card companies to design minimum payment structures that appear 'affordable'?", "options": [{"text": "To help customers manage their budget effectively without financial strain.", "isCorrect": false, "rationale": "The text directly contradicts this, stating the design is 'to keep you in debt as long as possible,' not for customer budgeting ease."}, {"text": "To comply with federal regulations regarding payment transparency.", "isCorrect": false, "rationale": "Federal regulations require disclosure, but the 'Warning' section addresses the *design* of the minimum payment itself, which is to profit from interest."}, {"text": "To maximize the total interest earned over an extended period.", "isCorrect": true, "rationale": "The 'Warning' states: 'Credit card companies earn billions of dollars per year from interest charges. The minimum payment is designed to keep you in debt as long as possible while still appearing 'affordable.'' This indicates profit maximization through prolonged interest collection."}, {"text": "To encourage responsible credit usage among their cardholders.", "isCorrect": false, "rationale": "Encouraging minimum payments, which lead to long-term debt and high interest, is antithetical to encouraging responsible credit usage."}], "id": "q07"}, {"question": "According to federal law, what two key pieces of information are credit card companies required to display on every statement regarding payments?", "options": [{"text": "The cardholder's credit score and the average interest rate of all their accounts.", "isCorrect": false, "rationale": "The 'realworld' section specifies different information required by law."}, {"text": "How long it will take to pay off the balance with minimum payments, and the monthly payment needed to pay it off in three years.", "isCorrect": true, "rationale": "The 'realworld' section explicitly lists these two items as federal requirements since 2010."}, {"text": "The total amount of interest paid in the last year and a projection of future interest.", "isCorrect": false, "rationale": "While interest information is provided, these specific metrics are not the two key required elements mentioned in the text."}, {"text": "The current balance and a list of all transactions from the previous month.", "isCorrect": false, "rationale": "These are standard components of a credit card statement, but not the specific 'two key numbers' federal law requires regarding payment *scenarios*."}], "id": "q08"}, {"question": "A credit card holder has an initial balance of $3,000 with a 22% APR and makes minimum payments of 2% of the balance. After making the first minimum payment, the balance is $2,995.00. How much of the *second* month's minimum payment will be applied to the principal?", "options": [{"text": "$5.00", "isCorrect": false, "rationale": "This was the principal paid in Month 1. The principal paid decreases slightly each month as the balance and interest decrease."}, {"text": "$54.91", "isCorrect": false, "rationale": "This is the monthly interest calculated for Month 2, not the principal portion of the payment."}, {"text": "$4.99", "isCorrect": true, "rationale": "For Month 2: Interest = $2,995.00 * 0.018333 = $54.91. Minimum Payment = $2,995.00 * 0.02 = $59.90. Principal paid = $59.90 - $54.91 = $4.99."}, {"text": "$59.90", "isCorrect": false, "rationale": "This is the total minimum payment made for Month 2, not just the principal portion."}], "id": "q09"}, {"question": "Based on the comprehensive analysis presented in this section, what is the most financially sound strategy for paying off a credit card balance?", "options": [{"text": "Always make only the minimum payment, as it's designed to be affordable.", "isCorrect": false, "rationale": "The text explicitly warns against this, calling it a 'trap' and 'the most expensive way to pay this off.'"}, {"text": "Consistently make payments significantly higher than the minimum whenever possible.", "isCorrect": true, "rationale": "The 'Power of a Fixed Payment' section demonstrates that paying significantly more than the minimum drastically reduces payoff time, total interest, and overall cost, making it the most financially sound strategy."}, {"text": "Wait for interest rates to drop before making any substantial payments.", "isCorrect": false, "rationale": "Delaying payments allows more interest to accrue, increasing the debt, and interest rate drops are not guaranteed or predictable."}, {"text": "Transfer the balance to another credit card with a slightly lower APR.", "isCorrect": false, "rationale": "While balance transfers can be a tool, the section's primary focus is on the *amount* of payment. A 'slightly' lower APR might not yield the dramatic savings seen from increasing the payment amount, and this strategy is not presented as the 'most financially sound' compared to making higher payments."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
