    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>

        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>

        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 21, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary financial benefit of having health insurance, according to the provided text?", "options": [{"text": "It eliminates all medical expenses, making healthcare entirely free.", "isCorrect": false, "rationale": "The text states health insurance 'transforms that potential catastrophe into a manageable out-of-pocket cost,' implying there are still costs, but they are reduced and predictable, not eliminated."}, {"text": "It transforms potentially catastrophic medical bills into manageable out-of-pocket costs.", "isCorrect": true, "rationale": "The first paragraph explicitly states health insurance 'transforms that potential catastrophe into a manageable out-of-pocket cost,' which is its core financial benefit."}, {"text": "It provides direct cash payments to individuals for maintaining a healthy lifestyle.", "isCorrect": false, "rationale": "Health insurance primarily covers medical treatment and services, not direct cash payments for healthy living."}, {"text": "It guarantees access to any doctor or hospital without any network restrictions.", "isCorrect": false, "rationale": "The text explains different plan types (HMO, PPO) have varying levels of provider access and network restrictions; not all plans offer unlimited access."}]}, {"question": "Michael's employer offers health insurance, contributing 75% of the premium. How will Michael typically pay his portion, and what is a key advantage of this method?", "options": [{"text": "He will pay annually directly to the insurance company, and the entire amount will be a tax-deductible expense on his income taxes.", "isCorrect": false, "rationale": "Employer-sponsored premiums are typically paid through payroll deductions, not direct annual payments. While pre-tax, the entire premium isn't necessarily a direct deduction on income tax, but rather reduces taxable income."}, {"text": "He will pay through pre-tax payroll deductions, which reduces his taxable income.", "isCorrect": true, "rationale": "The text states, 'You pay the remainder through payroll deductions (pre-tax, which saves you money on taxes),' directly aligning with this option."}, {"text": "He will pay in cash directly at the doctor's office each time he receives medical services.", "isCorrect": false, "rationale": "Premiums are regular payments for coverage, separate from co-pays or deductibles paid at the point of service. Payroll deductions are the standard for employer plans."}, {"text": "He will receive a bill quarterly from his employer, which he can then pay from a Health Savings Account.", "isCorrect": false, "rationale": "Payroll deductions are the norm for employer-sponsored plans. While an HSA can be used for qualified medical expenses, it's not the default payment method for premiums unless the plan is an HDHP, and even then, payroll deduction for the employee's portion of the premium is common."}]}, {"question": "Sarah values the flexibility to see specialists without needing a referral from her primary care physician and doesn't mind paying a higher monthly premium for this convenience. Which type of health insurance plan would best suit her preferences?", "options": [{"text": "HMO (Health Maintenance Organization)", "isCorrect": false, "rationale": "HMOs typically require referrals from a primary care physician to see specialists and restrict care to a network of providers, which doesn't align with Sarah's preference for flexibility without referrals."}, {"text": "PPO (Preferred Provider Organization)", "isCorrect": true, "rationale": "The text states PPOs offer 'More flexibility to see any doctor, in-network or out-of-network, without a referral. Higher premiums,' which matches Sarah's preferences for flexibility and willingness to pay higher premiums."}, {"text": "HDHP (High-Deductible Health Plan)", "isCorrect": false, "rationale": "HDHPs are defined by higher deductibles and lower premiums, not primarily by their flexibility regarding referrals or provider networks. While some HDHPs can be PPOs, the defining feature of HDHP doesn't directly address the referral and flexibility aspect Sarah prioritizes."}, {"text": "Medicaid", "isCorrect": false, "rationale": "Medicaid is a government program for low-income individuals and families, not a private plan type chosen based on preference for flexibility and higher premiums."}]}, {"question": "Emily recently started her own graphic design business and is now self-employed. She needs to find health insurance coverage. Where would she most likely purchase a plan?", "options": [{"text": "Through her former employer's COBRA program indefinitely.", "isCorrect": false, "rationale": "COBRA coverage is temporary (typically up to 18 months) and expensive, designed to bridge gaps, not for long-term new coverage for the self-employed."}, {"text": "Directly from the Health Insurance Marketplace.", "isCorrect": true, "rationale": "The text states, 'If you are self-employed, work part-time, or your employer does not offer coverage, you can purchase insurance through a health insurance marketplace.'"}, {"text": "Through the Children's Health Insurance Program (CHIP).", "isCorrect": false, "rationale": "CHIP is specifically for children in families who earn too much for Medicaid but cannot afford private insurance, not for self-employed adults."}, {"text": "As an extension of her parent's plan until age 30.", "isCorrect": false, "rationale": "Young adults can remain on a parent's plan only until age 26, not 30."}]}, {"question": "Which statement accurately describes the eligibility for Medicaid and CHIP?", "options": [{"text": "Both Medicaid and CHIP are exclusively for individuals over age 65.", "isCorrect": false, "rationale": "Medicaid is for low-income individuals/families and CHIP is for children; Medicare is generally for those over 65."}, {"text": "Medicaid provides coverage for low-income individuals and families, while CHIP covers children in families who earn too much for Medicaid but cannot afford private insurance.", "isCorrect": true, "rationale": "The text states, 'Medicaid is a government program providing health coverage for low-income individuals and families. CHIP (Children's Health Insurance Program) covers children in families that earn too much for Medicaid but cannot afford private insurance.'"}, {"text": "Both programs are primarily designed for self-employed individuals who cannot obtain employer-sponsored insurance.", "isCorrect": false, "rationale": "Self-employed individuals primarily use the Health Insurance Marketplace. Medicaid and CHIP are based on income and age for specific groups."}, {"text": "Eligibility for both Medicaid and CHIP is universally the same across all states.", "isCorrect": false, "rationale": "The text explicitly states, 'Eligibility varies by state' for both programs."}]}, {"question": "A unique feature of a Health Savings Account (HSA) that distinguishes it from a typical savings account and even some other health-related accounts like FSAs, is its 'triple tax advantage.' What does this primarily mean?", "options": [{"text": "Contributions are tax-deductible, growth is taxed at a lower rate, and withdrawals for any purpose are tax-free.", "isCorrect": false, "rationale": "While contributions are pre-tax, growth is *tax-free*, not just taxed at a lower rate. Withdrawals are tax-free *only for qualified medical expenses* before age 65; after 65, they can be for any purpose without penalty, but still generally tax-free for medical."}, {"text": "Contributions are pre-tax, earnings grow tax-free, and withdrawals for qualified medical expenses are tax-free.", "isCorrect": true, "rationale": "The text lists the three tax advantages: '1. Contributions are pre-tax... 2. Growth is tax-free... 3. Withdrawals for medical expenses are tax-free...'"}, {"text": "All contributions are matched by the government, and all withdrawals are tax-free regardless of purpose or age.", "isCorrect": false, "rationale": "The text does not mention government matching for HSAs. Withdrawals for non-medical purposes before age 65 are subject to penalties, not tax-free."}, {"text": "It allows for tax-free withdrawals for non-medical expenses at any age, as long as the account balance is high.", "isCorrect": false, "rationale": "Withdrawals for non-medical expenses are only penalty-free after age 65. Before 65, they are subject to penalties and taxes if not used for qualified medical expenses."}]}, {"question": "After being laid off from his job, David wants to maintain his current health insurance coverage temporarily while he searches for new employment and a new plan. Which option would allow him to do this, albeit at a potentially higher cost?", "options": [{"text": "Enroll immediately in Medicaid to ensure continuous coverage.", "isCorrect": false, "rationale": "Medicaid eligibility is based on low income, which may not apply to David. More importantly, it wouldn't be 'his current health insurance coverage' but a new government plan."}, {"text": "Purchase a plan through the Health Insurance Marketplace with government subsidies.", "isCorrect": false, "rationale": "While the Marketplace is an option for new coverage, it wouldn't be 'his current health insurance coverage' and subsidies depend on income, which isn't guaranteed. The question asks for maintaining *current* coverage."}, {"text": "Utilize COBRA coverage.", "isCorrect": true, "rationale": "The text states, 'COBRA (Consolidated Omnibus Budget Reconciliation Act) allows you to continue your employer's health plan for a limited time after leaving a job... The catch: you pay the full premium... COBRA is expensive, but it can bridge a gap...'"}, {"text": "Get added to a parent's plan, regardless of his age, as long as he is unemployed.", "isCorrect": false, "rationale": "Remaining on a parent's plan is only an option until age 26, and his unemployment status doesn't change that age limit."}]}, {"question": "Under current law, what is the maximum age a young adult can generally remain on a parent's health insurance plan in the United States?", "options": [{"text": "18 years old", "isCorrect": false, "rationale": "This is typically the age of majority, but health insurance coverage for dependents often extends beyond this age."}, {"text": "21 years old", "isCorrect": false, "rationale": "While 21 is a common age for some dependent benefits, current health insurance law allows for a longer period."}, {"text": "26 years old", "isCorrect": true, "rationale": "The text explicitly states, 'Under current law, young adults can remain on a parent's health insurance plan until age 26.'"}, {"text": "There is no age limit, as long as they are a full-time student.", "isCorrect": false, "rationale": "The text specifies an age limit of 26, regardless of student status, though student status might impact eligibility for some specific plans or state rules not covered here."}]}, {"question": "Based on the 'moneytip' about HSAs, for a healthy individual who can afford a higher deductible, what is considered an excellent long-term strategy involving an HDHP and HSA?", "options": [{"text": "Choose an HDHP only if you anticipate frequent medical visits, to maximize your deductible savings.", "isCorrect": false, "rationale": "The moneytip suggests an HDHP with an HSA is good 'if you are healthy,' implying it's less ideal for those anticipating frequent medical visits as the high deductible would be met often."}, {"text": "Maximize contributions to the HSA each year, invest the funds, and use it as a supplemental retirement account after age 65.", "isCorrect": true, "rationale": "The moneytip states, 'Contribute the maximum to your HSA each year, invest the funds, and let them grow tax-free. Many people use their HSA as a supplemental retirement account—after age 65, you can withdraw funds for any purpose (not just medical) without penalty.'"}, {"text": "Use HSA funds exclusively for non-medical expenses before age 65 to avoid taxes on the withdrawals.", "isCorrect": false, "rationale": "Using HSA funds for non-medical expenses before age 65 incurs penalties and taxes, as they are not qualified medical expenses."}, {"text": "Contribute the minimum possible to the HSA to keep funds liquid for immediate medical needs only.", "isCorrect": false, "rationale": "The moneytip advises 'Contribute the maximum to your HSA each year' to leverage its tax-free growth and long-term benefits, not the minimum."}]}, {"question": "The text emphasizes the financial risks of being uninsured. Which of the following best summarizes the potential financial consequences of lacking health insurance?", "options": [{"text": "Primarily leads to minor fines and inconveniences, as most medical costs are absorbed by hospitals.", "isCorrect": false, "rationale": "The 'warning' section highlights substantial costs (e.g., $5,000–$15,000 for a broken bone) and personal bankruptcy, indicating costs are not minor or absorbed."}, {"text": "It makes it impossible for individuals to receive any medical care, even in an emergency.", "isCorrect": false, "rationale": "While uninsured care is expensive, hospitals are generally legally obligated to provide emergency care. The issue is the cost, not the absolute denial of care."}, {"text": "It can result in tens of thousands of dollars in medical debt from a single incident, potentially leading to personal bankruptcy.", "isCorrect": true, "rationale": "The 'warning' section states, 'A single visit to the emergency room for a broken bone can cost $5,000–$15,000... An overnight hospital stay for appendicitis can exceed $30,000. Medical debt is one of the leading causes of personal bankruptcy in the United States.'"}, {"text": "The financial risks only affect older individuals or those with pre-existing conditions, not young and healthy people.", "isCorrect": false, "rationale": "The 'warning' section explicitly refutes this: 'Even if you are young and healthy, you are not immune to accidents or sudden illness.'"}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
