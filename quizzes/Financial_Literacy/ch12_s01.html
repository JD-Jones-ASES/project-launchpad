<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 12, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the fundamental principle behind the 'Pay Yourself First' savings strategy?", "options": [{"text": "Prioritizing discretionary spending over essential bills.", "isCorrect": false, "rationale": "This option is incorrect because 'Pay Yourself First' is about prioritizing savings, not discretionary spending."}, {"text": "Allocating a portion of income to savings before any other expenses.", "isCorrect": true, "rationale": "This option is correct as the text defines 'Pay Yourself First' as a strategy where you 'transfer a set amount to savings at the beginning of every pay period, before paying any other expenses'."}, {"text": "Waiting until all bills are paid and then saving whatever money remains.", "isCorrect": false, "rationale": "This option describes the 'spend first, then save whatever is left over' approach, which the text identifies as problematic due to lifestyle creep."}, {"text": "Only saving money when you have a large sum available, such as a bonus.", "isCorrect": false, "rationale": "This option is incorrect because the text emphasizes the power of 'small, consistent saving' rather than waiting for large, infrequent sums."}], "id": "q01"}, {"question": "Lifestyle creep primarily describes which financial phenomenon?", "options": [{"text": "The gradual increase in interest rates on savings accounts over time.", "isCorrect": false, "rationale": "This option is incorrect; lifestyle creep is unrelated to interest rate changes on savings accounts."}, {"text": "The tendency for expenses to grow as income increases, leaving little room for saving.", "isCorrect": true, "rationale": "This option is correct. The text explicitly defines lifestyle creep as when 'expenses expand to fill available income'."}, {"text": "The rapid accumulation of debt due to unexpected emergencies.", "isCorrect": false, "rationale": "This option describes a different financial challenge. While related to spending, lifestyle creep specifically refers to the expansion of non-essential expenses with rising income."}, {"text": "The process of automating bill payments to simplify financial management.", "isCorrect": false, "rationale": "This option describes a financial tool or strategy, not the concept of lifestyle creep."}], "id": "q02"}, {"question": "Jordan, in the 'Pay Yourself First vs. Save the Rest' example, successfully saved significantly more than Alex. What was the key action Jordan took that embodied the 'Pay Yourself First' principle?", "options": [{"text": "Jordan actively sought out higher-paying part-time jobs.", "isCorrect": false, "rationale": "This option is incorrect; the text states both Alex and Jordan earned the same income ($800 per month)."}, {"text": "Jordan drastically cut all non-essential spending to maximize savings.", "isCorrect": false, "rationale": "This option is incorrect. The text states Jordan 'adjusts spending to the remaining $720', implying budgeting, not necessarily drastic cuts beyond what was reasonable for their income."}, {"text": "Jordan automatically transferred a fixed percentage of income to savings on payday.", "isCorrect": true, "rationale": "This option is correct. The text states Jordan 'Automatically transfers $80 (10% of income) to savings on payday—before spending anything', which is the core action of Pay Yourself First."}, {"text": "Jordan waited for large lump sums, like tax refunds, to deposit into savings.", "isCorrect": false, "rationale": "This option is incorrect. Jordan's strategy involved regular transfers from each paycheck, not waiting for lump sums."}], "id": "q03"}, {"question": "The text states that saving $25 per week can build over $4,200 in three years, even with a modest 4% APY. What is the primary takeaway from this 'Math of Small, Consistent Saving' example?", "options": [{"text": "Only large, infrequent deposits significantly impact long-term savings.", "isCorrect": false, "rationale": "This option is incorrect; the example explicitly shows how 'small' amounts, when consistent, lead to significant growth."}, {"text": "The power of consistent, even small, contributions and compound interest can lead to substantial growth.", "isCorrect": true, "rationale": "This option is correct. The example demonstrates how consistent $25/week savings, combined with interest, accumulates to over $4,200, highlighting the importance of both consistency and compounding."}, {"text": "Saving small amounts is only effective if you can earn extremely high interest rates.", "isCorrect": false, "rationale": "This option is incorrect; the example uses a 'modest 4% APY' to show effectiveness, not an extremely high rate."}, {"text": "Most people spend too much on coffee and snacks to ever save effectively.", "isCorrect": false, "rationale": "This option misinterprets the text. While it mentions the comparison to coffee/snacks spending, the primary takeaway is the positive impact of saving, not a judgment on general spending habits."}], "id": "q04"}, {"question": "Alex's approach to saving, which resulted in only about $200 saved in a year, is characterized by the text as problematic because:", "options": [{"text": "Alex did not earn enough income to make saving meaningful.", "isCorrect": false, "rationale": "This option is incorrect; Alex had the same income as Jordan ($800 per month), who saved significantly more, indicating income wasn't the sole problem."}, {"text": "Alex treated savings as an optional expense, susceptible to lifestyle creep.", "isCorrect": true, "rationale": "This option is correct. Alex's approach of 'Saves whatever is left after spending' directly leads to the problem identified by the text: 'there is almost never anything left over' due to lifestyle creep, making savings optional rather than mandatory."}, {"text": "Alex failed to invest saved money in high-yield accounts.", "isCorrect": false, "rationale": "While investing in high-yield accounts is beneficial, the primary issue with Alex's *approach* was the lack of consistent saving due to spending priority, not just the choice of account."}, {"text": "Alex did not have clear financial goals for the saved money.", "isCorrect": false, "rationale": "This option is incorrect. The text focuses on the *method* of saving, not the goals. Even with goals, Alex's method would have struggled."}], "id": "q05"}, {"question": "According to the 'Pay Yourself First' definition, how should savings be viewed within a personal budget?", "options": [{"text": "As an optional expense that can be skipped if other needs arise.", "isCorrect": false, "rationale": "This option is incorrect, as it contradicts the core definition which states savings are 'treated as a mandatory expense, not an optional one'."}, {"text": "As a mandatory expense, prioritized alongside other essential bills.", "isCorrect": true, "rationale": "This option is correct. The definition of Pay Yourself First explicitly states: 'Savings is treated as a mandatory expense, not an optional one.'"}, {"text": "As an emergency fund, only to be contributed to when there's an immediate need.", "isCorrect": false, "rationale": "This option is incorrect. While building an emergency fund is important, Pay Yourself First is a broader, consistent savings strategy, not limited to just emergency contributions."}, {"text": "As a flexible category that can be adjusted weekly based on spending.", "isCorrect": false, "rationale": "This option is incorrect. The strategy involves transferring a 'set amount' at the 'beginning of every pay period', implying consistency, not weekly adjustment based on remaining spending."}], "id": "q06"}, {"question": "If a beginner is just starting to implement the 'Pay Yourself First' strategy, what initial savings percentage does the text suggest, emphasizing that the habit is more important than the amount?", "options": [{"text": "A minimum of 20% of each paycheck.", "isCorrect": false, "rationale": "This option is incorrect. 20% is identified as a 'Goal', not the recommended starting point for beginners."}, {"text": "5-10% of each paycheck.", "isCorrect": true, "rationale": "This option is correct. The text explicitly states under 'How Much Should You Pay Yourself?' for 'Beginners: Start with 5–10% of each paycheck.'"}, {"text": "50% of each paycheck, following the 50/30/20 rule strictly.", "isCorrect": false, "rationale": "This option is incorrect. The 50/30/20 rule allocates 50% to needs, not savings alone."}, {"text": "Any amount, as long as it's more than $50 per week.", "isCorrect": false, "rationale": "This option is incorrect. While 'any positive amount is a good start' is mentioned, a specific beginner guideline (5-10%) is provided without a fixed dollar minimum."}], "id": "q07"}, {"question": "A key piece of advice for managing a raise or increase in income while practicing 'Pay Yourself First' is:", "options": [{"text": "Immediately spend the entire raise on lifestyle upgrades to enjoy the new income.", "isCorrect": false, "rationale": "This option is incorrect, as it would lead to lifestyle creep, which the money tip aims to prevent."}, {"text": "Direct at least half of the extra income to savings before adjusting lifestyle.", "isCorrect": true, "rationale": "This option is correct. The 'moneytip' states: 'direct at least half of the extra amount straight to savings before you adjust your lifestyle upward'."}, {"text": "Fully defer the raise, not using any of it, until a large savings goal is met.", "isCorrect": false, "rationale": "This option is incorrect. The advice suggests directing *at least half* to savings, still allowing for some enjoyment of the increase."}, {"text": "Only save the raise if you haven't yet reached the 20% savings goal.", "isCorrect": false, "rationale": "This option is incorrect. The advice applies to managing raises generally, regardless of current savings percentage, as a way to prevent lifestyle creep."}], "id": "q08"}, {"question": "Consider two individuals, Maya and Noah, both earning $1000 every two weeks. Maya waits until the end of the pay period to save what's left, usually $50-100. Noah automatically transfers $100 to savings on payday and budgets with the remaining $900. Which of the following statements is the most likely outcome based on the text's principles?", "options": [{"text": "Maya will likely save more than Noah because she waits to see how much she can truly afford.", "isCorrect": false, "rationale": "This option is incorrect. Maya's approach mirrors Alex's 'spend first' method, which the text shows results in less savings due to lifestyle creep."}, {"text": "Noah will likely save more consistently and accumulate a larger sum due to prioritizing savings.", "isCorrect": true, "rationale": "This option is correct. Noah's method embodies 'Pay Yourself First', mirroring Jordan's success by making savings mandatory and consistent, leading to greater accumulation."}, {"text": "Both Maya and Noah will end up saving roughly the same amount, as their incomes are identical.", "isCorrect": false, "rationale": "This option is incorrect. The 'Real World' example of Alex and Jordan with identical incomes but different strategies demonstrates that income alone does not determine savings outcomes."}, {"text": "Maya's approach offers more financial flexibility, making it superior for long-term wealth building.", "isCorrect": false, "rationale": "This option is incorrect. While flexibility can be valuable, waiting to save typically leads to less saved over time and is not superior for long-term wealth building compared to the 'Pay Yourself First' method."}], "id": "q09"}, {"question": "Which of the following statements best encapsulates the overarching message of the 'Pay Yourself First' section?", "options": [{"text": "Saving large sums of money infrequently is the most efficient way to build wealth.", "isCorrect": false, "rationale": "This option is incorrect. The section emphasizes the power of 'small, consistent saving' rather than large, infrequent sums."}, {"text": "Financial success is primarily determined by the amount of income one earns, not by saving habits.", "isCorrect": false, "rationale": "This option is incorrect. The Alex vs. Jordan example directly contradicts this, showing that different saving habits with the same income lead to 'completely different outcomes'."}, {"text": "Prioritizing consistent, mandatory saving from each paycheck, regardless of amount, is crucial for financial security and wealth accumulation.", "isCorrect": true, "rationale": "This option is correct. It synthesizes the key themes: treating savings as mandatory, doing it consistently, the importance of the habit over initial amount, and its role in building wealth and security."}, {"text": "It's advisable to prioritize spending on current needs and wants, as future financial situations are unpredictable.", "isCorrect": false, "rationale": "This option describes the 'spend first' approach, which the section explicitly advises against due to its ineffectiveness and susceptibility to lifestyle creep."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
