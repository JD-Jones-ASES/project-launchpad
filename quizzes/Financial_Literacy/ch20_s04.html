    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "According to the text, what is the most important message for someone who has not yet started investing for retirement?", "options": [{"text": "It is too late to accumulate a significant amount, so focus on Social Security.", "isCorrect": false, "rationale": "This option contradicts the core message of the section, which emphasizes that starting late is dramatically better than not starting at all."}, {"text": "Starting at 40, 45, or even 50 is dramatically better than not starting at all.", "isCorrect": true, "rationale": "The text explicitly states, 'if you have not started yet—at any age—the best time to start is right now' and 'Starting at 40, 45, or even 50 is dramatically better than not starting at all,' making this the central and most important message."}, {"text": "You must achieve $1 million for retirement, so start immediately with large amounts.", "isCorrect": false, "rationale": "While a large sum is desirable, the text notes Marcus did not reach $1 million but still made a significant difference. The emphasis is on starting, even if not with 'the right amount,' not on hitting an arbitrary large target immediately."}, {"text": "Focus only on minimizing expenses, as investment returns are too uncertain for late starters.", "isCorrect": false, "rationale": "The text advises reducing expenses as a strategy, but also strongly advocates for maximizing contributions and minimizing fees, indicating investment is crucial, not to be avoided due to uncertainty."}], "id": "q01"}, {"question": "The 'Final Comparison' section highlights that a late starter contributing nearly the same total money as an early starter ends up with significantly less wealth. What is the primary reason for this discrepancy?", "options": [{"text": "Late starters typically choose riskier investments with lower average returns.", "isCorrect": false, "rationale": "The text does not suggest late starters choose riskier investments with lower returns; it attributes the difference to time, not investment choices or discipline."}, {"text": "Early starters are generally more disciplined with their contributions.", "isCorrect": false, "rationale": "The text explicitly states, 'This is not because the late starter is less smart or less disciplined,' refuting this claim."}, {"text": "Compound growth requires a longer period of time to fully realize its exponential power.", "isCorrect": true, "rationale": "The text clearly states, 'It is purely because compound growth requires time.' This is the fundamental mathematical reason why early starters accumulate more wealth even with similar total contributions."}, {"text": "Inflation erodes the value of money more significantly for late starters due to higher living costs.", "isCorrect": false, "rationale": "While inflation is a factor in investing generally, the 'Final Comparison' specifically attributes the difference in wealth between early and late starters to the effect of time on compound growth, not primarily to inflation's differential impact."}], "id": "q02"}, {"question": "Marcus, starting at age 42, will accumulate approximately $272,880 by age 65 with $400/month contributions. If his primary goal was to reach $1 million, what is the most critical factor preventing him from achieving this target given his starting point and consistent contribution rate?", "options": [{"text": "The annual return of 7% is insufficient for a late starter to reach such a high goal.", "isCorrect": false, "rationale": "A 7% annual return is a reasonable long-term average; while higher returns would help, it's not the primary limiting factor compared to the duration and contribution amount."}, {"text": "His monthly contribution of $400, over the 23 years available, is not enough to accumulate $1 million.", "isCorrect": true, "rationale": "The text explicitly calculates Marcus's outcome, stating it's 'not $1 million,' and then shows that even significantly higher contributions ($1,000/month) would only reach $682,200 in the same timeframe, indicating that his $400/month is the primary limiting factor for reaching $1 million within 23 years."}, {"text": "He did not take advantage of catch-up contributions, which are essential for late starters.", "isCorrect": false, "rationale": "Catch-up contributions begin at age 50. While they would help later, they don't apply to his entire 23-year period (starting at 42) and are not the 'most critical' factor preventing the initial $1 million goal."}, {"text": "Social Security benefits would reduce the need for such a large personal retirement fund, making $1 million unnecessary.", "isCorrect": false, "rationale": "Social Security benefits supplement retirement income but do not replace the need for substantial personal savings, nor do they prevent a person from reaching a higher personal investment goal."}], "id": "q03"}, {"question": "For a late starter, the strategy 'Maximize Contributions Immediately' is emphasized. Why is this strategy particularly vital compared to an early starter who might have more time to gradually increase contributions?", "options": [{"text": "To demonstrate commitment and discipline to their financial planner.", "isCorrect": false, "rationale": "While demonstrating commitment is good, it's not the primary financial benefit or reason for urgency emphasized in the text."}, {"text": "To compensate for the lost years of compound growth by accelerating the accumulation of principal.", "isCorrect": true, "rationale": "The text's underlying theme is that compound growth needs time. Maximizing contributions immediately is crucial for late starters because it's the most effective way to build up a significant principal amount in a shorter timeframe, partially offsetting the disadvantage of fewer compounding years."}, {"text": "To avoid higher contribution limits that may be imposed in the future.", "isCorrect": false, "rationale": "Contribution limits generally tend to increase over time, not decrease, making this reason incorrect."}, {"text": "To immediately qualify for higher employer matching contributions.", "isCorrect": false, "rationale": "Employer matching depends on the specific plan's rules, not solely on maximizing contributions immediately, and is not the primary reason for this strategy for late starters as a general rule."}], "id": "q04"}, {"question": "The IRS allows 'catch-up contributions' for retirement accounts. At what age do these typically become available, and what is the underlying reason for their existence?", "options": [{"text": "Age 60, to incentivize retirees to keep working longer.", "isCorrect": false, "rationale": "Catch-up contributions start at age 50, not 60, and their primary reason is not solely to incentivize working longer, but to aid those who started saving late."}, {"text": "Age 50, because Congress recognized many people start saving later in life.", "isCorrect": true, "rationale": "The text explicitly states: 'At age 50, the IRS allows additional contributions...' and 'These catch-up provisions exist specifically because Congress recognized that many people start saving late.'"}, {"text": "Age 55, to provide tax breaks for those nearing retirement regardless of savings history.", "isCorrect": false, "rationale": "Catch-up contributions start at age 50, and their specific purpose is tied to those needing to catch up on savings, not just generic tax breaks."}, {"text": "Age 45, to encourage mid-career professionals to invest more heavily.", "isCorrect": false, "rationale": "Catch-up contributions start at age 50, not 45."}], "id": "q05"}, {"question": "Working 2–3 extra years is presented as a beneficial strategy for late starters. What is the *dual benefit* of this action?", "options": [{"text": "It allows for increased social interaction and reduces boredom in early retirement.", "isCorrect": false, "rationale": "While these might be secondary benefits, the text specifically details the financial 'double benefit,' not social ones."}, {"text": "It provides more years for contributions AND reduces the number of years retirement funds must cover.", "isCorrect": true, "rationale": "The text states: 'Working 2–3 extra years has a double benefit: it adds years of contributions AND reduces the number of years you must fund from retirement savings.'"}, {"text": "It allows them to avoid paying capital gains taxes on their investments for a longer period.", "isCorrect": false, "rationale": "This is not one of the two explicit benefits mentioned in the text for working longer."}, {"text": "It delays the need to file for Social Security benefits, automatically increasing the monthly payout.", "isCorrect": false, "rationale": "While delaying Social Security can increase payouts, the text focuses on the two direct benefits of adding contributions and reducing funding years from personal savings."}], "id": "q06"}, {"question": "Why does the text advise a late starter to 'Minimize Investment Fees' more aggressively than perhaps an early starter?", "options": [{"text": "Late starters typically have larger portfolios, so small fees accumulate to larger absolute amounts.", "isCorrect": false, "rationale": "Late starters typically have *smaller* portfolios due to less time for compound growth, so this reasoning is incorrect."}, {"text": "There is less time for a late starter's portfolio to recover from the drag of high fees on compounding returns.", "isCorrect": true, "rationale": "The text explicitly states: 'For a late starter, every percentage point of fees matters more because there is less time to recover from them.'"}, {"text": "Early starters are more knowledgeable about investment products and can better avoid high fees.", "isCorrect": false, "rationale": "The text does not suggest a difference in knowledge between early and late starters; it highlights the impact of time on fees."}, {"text": "High fees are tax-deductible only for early starters, not late starters.", "isCorrect": false, "rationale": "The tax-deductibility of investment fees is not dependent on when one starts investing, and generally, direct investment fees are not individually deductible for most investors in retirement accounts."}], "id": "q07"}, {"question": "According to the 'warning' section, what is identified as 'the most costly financial mistake' a late starter can make?", "options": [{"text": "Investing in high-fee, actively managed funds.", "isCorrect": false, "rationale": "While a costly mistake, the 'warning' section identifies a different, even more impactful, error."}, {"text": "Not contributing to retirement at all because they feel they can't invest 'the right amount.'", "isCorrect": true, "rationale": "The warning states: 'Do not let perfectionism prevent action. A common trap is thinking, 'I can't afford to invest the right amount, so I won't invest at all.' This is the most costly financial mistake you can make.'"}, {"text": "Relying solely on Social Security benefits for retirement income.", "isCorrect": false, "rationale": "While potentially insufficient, this is not the specific 'most costly financial mistake' highlighted in the warning section."}, {"text": "Failing to take advantage of catch-up contributions after age 50.", "isCorrect": false, "rationale": "This is a missed opportunity, but the 'warning' focuses on the error of inaction due to perceived inadequacy, not specific missed contributions."}], "id": "q08"}, {"question": "Considering the various strategies for late starters, which combination would likely have the most significant positive impact on Marcus's retirement savings, assuming he cannot go back in time to start earlier?", "options": [{"text": "Reducing car expenses and considering a part-time income in early retirement.", "isCorrect": false, "rationale": "These are helpful strategies, but 'maximizing contributions' and 'working longer' directly impact the principal and compounding period, which are more critical for a late starter than expense reduction and part-time work alone."}, {"text": "Maximizing contributions immediately, utilizing catch-up contributions, and working 2-3 years longer.", "isCorrect": true, "rationale": "This combination directly addresses the core challenges of a late starter: increasing the principal significantly (maximizing contributions), leveraging available special provisions (catch-up), and extending the compounding period while reducing funding years (working longer). These have the most profound mathematical impact."}, {"text": "Downsizing a home and minimizing investment fees to 0.03%.", "isCorrect": false, "rationale": "Downsizing is a one-time adjustment, and while minimizing fees is important, the direct impact of significantly increasing contributions and extending the earning/saving period is mathematically greater for overall wealth accumulation."}, {"text": "Shifting retirement plans from age 65 to 67 and investing solely in low-risk government bonds.", "isCorrect": false, "rationale": "Working longer is good, but solely investing in low-risk government bonds might yield lower returns than other suitable investments for retirement, potentially offsetting some benefits compared to maximizing contributions in higher-growth assets."}], "id": "q09"}, {"question": "The 'moneytip' advises that 'The best financial move you can make, at any age, is to start today.' While the Marcus example provides specific numbers, what overarching principle does it primarily illustrate about investing for retirement, especially for late starters?", "options": [{"text": "That a $1 million retirement fund is an unrealistic goal for most people, especially late starters.", "isCorrect": false, "rationale": "While Marcus didn't hit $1 million, the example doesn't primarily illustrate it as 'unrealistic for most.' It shows what *can* be achieved and that starting late *still makes a huge difference*."}, {"text": "That even modest, consistent contributions can accumulate a substantial amount over time, even if starting late.", "isCorrect": true, "rationale": "Marcus started with 'nothing' and accumulated nearly $273,000, which the text notes is 'far better than the nothing he started with' and 'can make a real difference.' This directly illustrates the power of starting and consistent effort, even if late and with what might seem like modest contributions ($400/month)."}, {"text": "That relying on Social Security and home equity is sufficient if personal investments are low.", "isCorrect": false, "rationale": "The text mentions Social Security and home equity as supplements, but the Marcus example's primary point is the power of personal investment, not the sufficiency of other assets."}, {"text": "That maximizing employer matching contributions is the single most important factor for retirement success.", "isCorrect": false, "rationale": "Employer matching is not discussed in the Marcus example, which focuses on his personal contributions and the impact of compound growth and time."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
