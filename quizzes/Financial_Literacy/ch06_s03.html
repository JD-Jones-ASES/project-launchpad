    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 6, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the defining characteristic of a progressive tax system?", "options": [{"text": "Everyone pays the same percentage of their income in taxes.", "isCorrect": false, "rationale": "This describes a flat tax system, where the tax rate is constant regardless of income, which is not characteristic of a progressive system."}, {"text": "Higher earners pay a larger percentage of their income in taxes.", "isCorrect": true, "rationale": "The text states: 'Progressive tax is a tax system in which the tax rate increases as income increases. The key word is rate: higher earners pay a larger percentage of their income in taxes.'"}, {"text": "Lower earners pay a larger percentage of their income in taxes.", "isCorrect": false, "rationale": "This describes a regressive tax system, where the tax rate decreases as income increases, which is the opposite of a progressive system."}, {"text": "Tax rates decrease as income increases.", "isCorrect": false, "rationale": "This is incorrect; in a progressive system, tax rates increase with income."}], "id": "q01"}, {"question": "Which statement best defines a tax bracket in the U.S. federal system?", "options": [{"text": "It is the total amount of tax an individual pays annually.", "isCorrect": false, "rationale": "The total amount an individual pays is their 'tax bill,' not a tax bracket."}, {"text": "It is a specific tax rate applied to an individual's entire income.", "isCorrect": false, "rationale": "This is a common misconception. Only the income within a specific range of the bracket is taxed at that bracket's rate, not the entire income."}, {"text": "It is a range of income levels where a specific tax rate applies only to the income within that range.", "isCorrect": true, "rationale": "The text defines a tax bracket as 'a range of income levels to which a specific tax rate applies. In the U.S. federal system, only the income that falls within each bracket is taxed at that bracket's rate.'"}, {"text": "It determines how much income is exempt from taxes.", "isCorrect": false, "rationale": "Tax brackets determine the rates applied to taxable income, while deductions and exemptions (not covered in detail here) determine how much income is not taxed."}], "id": "q02"}, {"question": "According to the 'Staircase Analogy,' if an individual's income moves into a new, higher tax bracket, how is their income taxed?", "options": [{"text": "All of their income is retroactively re-taxed at the new, higher rate.", "isCorrect": false, "rationale": "This is a common misconception (the 'Bracket Myth') that the text explicitly debunks. Income from lower brackets is not re-taxed at the new, higher rate."}, {"text": "Only the portion of income that falls within the new, higher bracket is taxed at that higher rate.", "isCorrect": true, "rationale": "The text explains, 'when you move up to a new step, you do not go back and re-tax the steps below. Each dollar is only taxed once, at the rate for the step it lands on.'"}, {"text": "Their entire income is taxed at the rate of the lowest bracket they reach.", "isCorrect": false, "rationale": "This would result in a significantly lower tax liability than intended for higher earners in a progressive system."}, {"text": "Their tax bill decreases because higher brackets offer more deductions.", "isCorrect": false, "rationale": "Moving into a higher bracket increases the tax bill (though take-home pay still increases), and bracket rates are distinct from deductions."}], "id": "q03"}, {"question": "Julia's taxable income is $55,000. What does her marginal tax rate represent?", "options": [{"text": "The average tax rate applied to her total income.", "isCorrect": false, "rationale": "This describes the effective tax rate, not the marginal tax rate."}, {"text": "The lowest tax rate applied to any portion of her income.", "isCorrect": false, "rationale": "The marginal tax rate is the highest rate applied, not the lowest."}, {"text": "The tax rate that applies to the *next* dollar of income she earns.", "isCorrect": true, "rationale": "The text defines the marginal tax rate as 'the tax rate that applies to the next dollar of income you earn—the rate of the highest bracket your income reaches.'"}, {"text": "The total amount of tax she owes before deductions.", "isCorrect": false, "rationale": "This is related to the overall tax calculation, not the definition of a marginal tax rate."}], "id": "q04"}, {"question": "An individual has a marginal tax rate of 22%. What can be definitively concluded about their effective tax rate, assuming their income is above the 10% bracket?", "options": [{"text": "It will be exactly 22%.", "isCorrect": false, "rationale": "This would only be true if their entire income was taxed at 22%, which is incorrect in a progressive system."}, {"text": "It will be higher than 22%.", "isCorrect": false, "rationale": "The effective tax rate is an average that includes income taxed at lower rates, so it will always be lower than the marginal rate (unless all income falls into the lowest bracket)."}, {"text": "It will be lower than 22%.", "isCorrect": true, "rationale": "The text explicitly states: 'The effective rate...is always lower than your marginal rate (unless all your income is in the 10% bracket).' This is because portions of income are taxed at lower rates (e.g., 10% and 12%) before reaching the 22% bracket."}, {"text": "It cannot be determined without knowing their exact income.", "isCorrect": false, "rationale": "While the exact number requires knowing income, the *relationship* between effective and marginal rates (that effective is lower) is a fixed principle of the progressive system, as stated in the text."}], "id": "q05"}, {"question": "Using the provided 2024 single filer brackets (10% up to $11,600; 12% from $11,601 to $47,150; 22% from $47,151), calculate the total federal income tax for a single filer with a taxable income of $20,000.", "options": [{"text": "$1,160", "isCorrect": false, "rationale": "This only accounts for the tax on the income within the 10% bracket ($11,600 * 0.10)."}, {"text": "$2,168", "isCorrect": true, "rationale": "Calculation: ($11,600 * 0.10) + (($20,000 - $11,600) * 0.12) = $1,160 + ($8,400 * 0.12) = $1,160 + $1,008 = $2,168."}, {"text": "$2,400", "isCorrect": false, "rationale": "This would be the tax if the entire $20,000 was taxed at the 12% rate, which is incorrect for a progressive system."}, {"text": "$2,000", "isCorrect": false, "rationale": "This would be the tax if the entire $20,000 was taxed at the 10% rate, which is incorrect for a progressive system."}], "id": "q06"}, {"question": "Which of the following statements about receiving a raise that pushes you into a higher tax bracket is TRUE according to the text?", "options": [{"text": "Your entire income will now be taxed at the higher rate, potentially reducing your take-home pay.", "isCorrect": false, "rationale": "This is the 'Bracket Myth' explicitly debunked in the warning box. Your entire income is NOT re-taxed at the higher rate, and your take-home pay will always increase after a raise."}, {"text": "Only the additional income (the raise amount) that falls into the new bracket will be taxed at the higher rate, meaning your take-home pay will always increase.", "isCorrect": true, "rationale": "The text states: 'Only the income within the higher bracket is taxed at the higher rate... A raise of $100 that pushes you into the next bracket means only those $100 are taxed at the new rate—not your entire income. You will always take home more after a raise. Always.'"}, {"text": "You will need to choose between accepting the raise and staying in your current bracket to avoid a higher overall tax burden.", "isCorrect": false, "rationale": "The text clearly states that accepting a raise will always result in more take-home pay, dispelling the idea that a higher bracket makes you worse off."}, {"text": "Your effective tax rate will immediately jump to your new marginal tax rate.", "isCorrect": false, "rationale": "While your effective tax rate will increase, it will not jump to your marginal tax rate; it will remain lower than the marginal rate due to income taxed at lower bracket rates."}], "id": "q07"}, {"question": "Why is an individual's effective tax rate almost always lower than their marginal tax rate in a progressive system?", "options": [{"text": "The marginal rate only applies to certain types of income.", "isCorrect": false, "rationale": "Both effective and marginal rates relate to the same taxable income, just in different ways. The marginal rate applies to the highest portion of *all* income."}, {"text": "The effective rate accounts for charitable deductions, which reduce the overall tax burden.", "isCorrect": false, "rationale": "While deductions reduce taxable income, the specific reason the effective rate is lower than the marginal rate is the tiered bracket structure, not deductions themselves."}, {"text": "Only a portion of income is taxed at the highest (marginal) rate, while lower portions are taxed at lower rates.", "isCorrect": true, "rationale": "This is the fundamental principle of how progressive tax brackets work: income is taxed incrementally at increasing rates. The effective rate is the average of these different rates, which will naturally be lower than the highest (marginal) rate applied."}, {"text": "The marginal rate is an average, while the effective rate is the actual amount paid.", "isCorrect": false, "rationale": "This statement swaps the definitions: the effective rate is the average percentage, while the marginal rate is the rate on the last dollar (the highest rate reached)."}], "id": "q08"}, {"question": "Samantha earns $40,000 in taxable income. She receives a bonus of $10,000, bringing her total taxable income to $50,000. Using the 2024 single filer brackets (10% up to $11,600; 12% from $11,601 to $47,150; 22% from $47,151), which portion of her income is taxed at the 22% rate after the bonus?", "options": [{"text": "The entire $50,000.", "isCorrect": false, "rationale": "This is a common misunderstanding of progressive taxation; only the portion of income within the 22% bracket is taxed at that rate."}, {"text": "Only the $10,000 bonus amount.", "isCorrect": false, "rationale": "While the bonus pushed her into the 22% bracket, not all of the $10,000 bonus falls into that bracket. Income between $40,000 and $47,150 would still be taxed at 12%."}, {"text": "Only the portion of income from $47,151 to $50,000.", "isCorrect": true, "rationale": "According to the progressive system, only the income that falls within a specific bracket is taxed at that rate. For Samantha, the income from $47,151 up to her new total of $50,000 (which is $2,850) is taxed at 22%."}, {"text": "Only the portion of income from $11,601 to $47,150.", "isCorrect": false, "rationale": "This portion of income is taxed at the 12% rate, not 22%."}], "id": "q09"}, {"question": "Which analogy best describes how the U.S. federal income tax system works based on the text?", "options": [{"text": "A single large bucket where all income is dumped and taxed at one rate.", "isCorrect": false, "rationale": "This analogy describes a flat tax system, where all income is taxed at a single rate, contrary to the progressive system described."}, {"text": "A long conveyor belt where income is processed and taxed uniformly.", "isCorrect": false, "rationale": "This implies uniformity in taxation, which is not how a progressive system with varying rates across brackets functions."}, {"text": "A series of ascending steps, each with a different rate applying only to the income on that step.", "isCorrect": true, "rationale": "The text explicitly uses and describes 'The Staircase Analogy,' stating, 'As your income climbs higher, it enters a new “step.” Each step has its own rate... Each dollar is only taxed once, at the rate for the step it lands on.'"}, {"text": "A funnel that narrows, taxing more aggressively as income increases, and then less aggressively at the top.", "isCorrect": false, "rationale": "While a progressive system taxes more aggressively as income increases, the 'less aggressively at the top' part is incorrect. The staircase analogy is the precise and direct comparison used in the text."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
