<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 29, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to USDA research, what is the estimated annual cost of raising a child from birth to age 17 for a middle-income family, excluding college expenses?", "options": [{"text": "$5,000 to $7,000", "isCorrect": false, "rationale": "This amount is significantly lower than the annual cost mentioned in the text. The text refers to a total cost of over $250,000 before college, not an annual figure in this range."}, {"text": "$15,000 to $17,000", "isCorrect": true, "rationale": "The text explicitly states, 'raising a child from birth to age 17 for a middle-income family costs approximately $15,000 to $17,000 per year when you include housing, food, childcare, healthcare, clothing, transportation, and education.'"}, {"text": "$250,000 to $270,000", "isCorrect": false, "rationale": "This range represents the *total* estimated cost of raising a child from birth to age 17, not the annual cost."}, {"text": "$800 to $2,500", "isCorrect": false, "rationale": "This range refers specifically to the monthly cost of childcare, not the total annual cost of raising a child."}]}, {"question": "For two working parents, which specific cost category is identified as often being the largest single line item in their budget after housing?", "options": [{"text": "Food", "isCorrect": false, "rationale": "While food is a significant expense, the 'didyouknow' section specifically identifies another category as the largest single line item after housing for working parents."}, {"text": "Childcare", "isCorrect": true, "rationale": "The 'didyouknow' section states, 'For two working parents, childcare can represent the largest single line item in the budget after housing.'"}, {"text": "Healthcare", "isCorrect": false, "rationale": "Healthcare is an important expense, but the text highlights childcare as the largest single cost after housing for working parents."}, {"text": "Education (pre-college)", "isCorrect": false, "rationale": "Education expenses are part of the overall cost, but childcare is explicitly named as the largest single line item after housing for working parents."}]}, {"question": "When a child is born or adopted, what is the typical deadline for parents to add the child to their health insurance plan without missing the enrollment window?", "options": [{"text": "7 days", "isCorrect": false, "rationale": "The text specifies a different, longer timeframe for adding a new dependent to health insurance."}, {"text": "30 days", "isCorrect": true, "rationale": "The 'Immediate Financial Steps' section advises, 'You typically have 30 days after birth to enroll a new dependent — do not miss this window.'"}, {"text": "60 days", "isCorrect": false, "rationale": "60 days is beyond the typical enrollment window mentioned in the text, potentially leading to a lapse in coverage."}, {"text": "90 days", "isCorrect": false, "rationale": "90 days is significantly longer than the specified deadline for health insurance enrollment, which could result in a lack of immediate coverage for the child."}]}, {"question": "All of the following are listed as immediate financial steps to take when a child arrives, EXCEPT:", "options": [{"text": "Updating beneficiary designations on retirement and bank accounts.", "isCorrect": false, "rationale": "Updating beneficiary designations is explicitly listed as one of the immediate financial steps."}, {"text": "Updating or writing a will and designating a guardian for the child.", "isCorrect": false, "rationale": "Writing or updating a will and designating a guardian is explicitly listed as one of the immediate financial steps."}, {"text": "Adding the child to your health insurance plan.", "isCorrect": false, "rationale": "Adding the child to your health insurance plan is explicitly listed as one of the immediate financial steps."}, {"text": "Opening a college savings account.", "isCorrect": true, "rationale": "While saving for college is an important topic discussed in the section, it is not listed under the enumerated 'Immediate Financial Steps When a Child Arrives' in the text."}]}, {"question": "What is the primary tax advantage of a 529 plan for education savings, as described in the text?", "options": [{"text": "Contributions are tax-deductible at the federal level.", "isCorrect": false, "rationale": "The text states that 'Contributions are made with after-tax dollars,' meaning they are not federally tax-deductible."}, {"text": "Money contributed grows tax-free, and qualified withdrawals are also tax-free.", "isCorrect": true, "rationale": "The text clearly states, 'Money you contribute grows tax-free, and withdrawals are also tax-free as long as they are used for qualified education expenses.'"}, {"text": "It guarantees a state income tax deduction for all contributions.", "isCorrect": false, "rationale": "The text mentions 'Many states also offer a state income tax deduction,' indicating it's not universal or the primary federal advantage."}, {"text": "It allows withdrawals for any purpose without penalty, as long as taxes are paid.", "isCorrect": false, "rationale": "Withdrawals must be used for 'qualified education expenses' to be tax-free. Non-qualified withdrawals typically incur taxes and a penalty."}]}, {"question": "A 529 plan uses 'after-tax dollars' for contributions. Given this, and the information provided, why is it still considered a significant tax-advantaged account compared to a regular taxable investment account for college savings?", "options": [{"text": "It eliminates the need for any financial aid applications.", "isCorrect": false, "rationale": "While a 529 plan can reduce the need for loans, it does not eliminate the possibility or necessity of applying for financial aid or scholarships."}, {"text": "It provides a federal tax credit for every dollar contributed.", "isCorrect": false, "rationale": "The text does not mention a federal tax credit for 529 contributions; it explicitly states contributions are made with 'after-tax dollars' and focuses on the tax-free growth and withdrawals."}, {"text": "The growth and withdrawals for qualified education expenses are tax-free, avoiding capital gains and income taxes.", "isCorrect": true, "rationale": "The primary advantage is that the investment earnings are not taxed as they grow, and qualified withdrawals are also exempt from federal income tax (and often state income tax), unlike a regular investment account where capital gains and dividends would be taxed."}, {"text": "All contributions are fully matched by the state government.", "isCorrect": false, "rationale": "The text mentions state-sponsorship and potential state tax deductions, but not direct matching of contributions."}]}, {"question": "Based on the provided example of a 529 plan with $100/month contributions for 18 years, what is the approximate amount of the total future value that comes specifically from investment returns?", "options": [{"text": "$21,600", "isCorrect": false, "rationale": "This figure represents the total amount contributed over 18 years ($100/month × 216 months), not the growth from investment returns."}, {"text": "$43,100", "isCorrect": false, "rationale": "This figure is the total future value of the plan, which includes both the contributions and the investment returns, not just the returns."}, {"text": "$21,500", "isCorrect": true, "rationale": "The 'mathstep' section clearly calculates this: 'Growth from investment returns: $43,100 - $21,600 = $21,500.'"}, {"text": "$100", "isCorrect": false, "rationale": "This represents the monthly contribution, not the cumulative growth from investment returns over 18 years."}]}, {"question": "If a family started a 529 plan with a contribution of $50/month from their child's birth instead of $100/month, and maintained the same 7% average annual return for 18 years, what would be the approximate future value of the plan?", "options": [{"text": "$10,800", "isCorrect": false, "rationale": "This amount represents the total contributions made ($50/month * 216 months), not the future value which includes investment growth."}, {"text": "$43,100", "isCorrect": false, "rationale": "This is the future value if $100/month was contributed, not $50/month."}, {"text": "$21,000", "isCorrect": false, "rationale": "While the 'moneytip' mentions 'over $21,000,' the exact proportional calculation from the example's total is slightly higher."}, {"text": "$21,550", "isCorrect": true, "rationale": "The 'checkpoint' instructs that the answer is proportional to the contribution amount. Since $100/month resulted in $43,100, $50/month (half the contribution) would result in half the future value: $43,100 / 2 = $21,550. The 'moneytip' also states that '$50/month from birth grows to over $21,000' at this rate."}]}, {"question": "The text states, 'Being financially prepared for those costs does not make you cynical; it makes you a better parent.' Which of the following best reflects the underlying message of this statement?", "options": [{"text": "Focusing on money makes parents overly cautious and less spontaneous.", "isCorrect": false, "rationale": "The statement directly refutes the idea that financial preparation makes one 'cynical' or implies negative traits; instead, it frames it as a positive attribute of a 'better parent.'"}, {"text": "Emotional presence is more important than financial stability for children.", "isCorrect": false, "rationale": "While emotional presence is crucial, the text emphasizes that financial preparedness contributes to being a 'better parent,' suggesting a synergistic role between emotional and financial stability, not a dichotomy."}, {"text": "Proactive financial planning allows parents to provide stability and opportunity for their children without sacrificing the joy of parenthood.", "isCorrect": true, "rationale": "This option captures the essence of the statement: financial preparedness is not a detractor but an enabler, allowing parents to manage costs effectively, provide for their children's future, and thereby enhance the overall experience of parenthood without being bogged down by financial stress. It emphasizes positive outcomes of planning."}, {"text": "Parents who plan for costs are primarily concerned with avoiding financial burdens themselves.", "isCorrect": false, "rationale": "The text frames financial preparation as being for the benefit of the child ('a better parent'), implying a focus on the child's well-being and support, not just the parent's burden avoidance."}]}, {"question": "Which statement best encapsulates the overall theme of 'The Financial Impact of Children' section?", "options": [{"text": "The 529 plan is the most critical financial tool for all parents.", "isCorrect": false, "rationale": "While the 529 plan is an important tool discussed in detail, the section covers a broader range of financial impacts and steps, not just one specific savings vehicle."}, {"text": "Children are generally unaffordable for middle-income families without significant sacrifices.", "isCorrect": false, "rationale": "The text explicitly states, 'This does not mean children are unaffordable — millions of families do it. But it does mean that planning ahead makes a significant difference,' contradicting this option."}, {"text": "Raising children involves significant financial costs that require diligent planning and specific financial tools to manage effectively.", "isCorrect": true, "rationale": "This statement accurately summarizes the section's core message, which highlights the substantial costs, the necessity of proactive financial planning, and introduces various tools and steps to manage these costs effectively."}, {"text": "The most important financial steps for new parents are limited to immediate budget adjustments and insurance updates.", "isCorrect": false, "rationale": "While immediate steps are covered, the section also delves into long-term planning (like college savings via 529 plans) and the overall long-term financial impact, indicating a broader scope than just immediate changes."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
