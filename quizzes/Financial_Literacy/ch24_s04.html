        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>

        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 24, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following is the most crucial action a consumer should take regarding a store's return policy *before* making a purchase?", "options": [{"text": "Assume all stores have a universal 30-day return window, as it's standard practice.", "isCorrect": false, "rationale": "Return policies 'vary enormously by retailer and by product category,' making assumptions risky and potentially leading to issues if a return is needed."}, {"text": "Carefully read and understand the policy, asking questions about deadlines, receipts, and specific exclusions.", "isCorrect": true, "rationale": "The text explicitly states, 'Always understand the return policy before you buy. Ask or look up: How many days do you have to return the item? Must you have the original receipt or packaging? Is the return a full refund, store credit, or exchange only? Are there restocking fees? Are certain categories (electronics opened, swimwear, digital downloads) non-returnable?'"}, {"text": "Ignore the return policy for online purchases, as consumer protection laws automatically guarantee full refunds.", "isCorrect": false, "rationale": "The text notes that for online purchases, 'the same questions apply—plus who pays return shipping?', indicating that specific policies still govern online returns and are not universally overridden by law."}, {"text": "Only check the return policy after a problem arises with the product, as it is easier to address then.", "isCorrect": false, "rationale": "Waiting until a problem arises might mean the return window has closed, or the consumer has already violated a condition they were unaware of, making resolution more difficult."}]}, {"question": "Based on the information provided, what is the most accurate assessment of the value of an extended warranty or service plan?", "options": [{"text": "They are always a wise investment, guaranteeing full coverage for any product issue over a long period.", "isCorrect": false, "rationale": "The text includes a 'warning' stating 'Extended warranties are often not worth the cost,' and they typically do not cover accidental damage or misuse."}, {"text": "They consistently save consumers money on repairs compared to the initial cost of the warranty.", "isCorrect": false, "rationale": "The text states that 'Studies by consumer research organizations consistently find that extended warranties cost more than the repairs they cover in the vast majority of cases.'"}, {"text": "They primarily cover product failures that occur in the 'middle period' of a product's life, after the manufacturer warranty but before obsolescence.", "isCorrect": true, "rationale": "The text explains that 'Most products fail either very early (covered by the manufacturer warranty) or after a long time (when the product is outdated anyway). The middle period—where extended warranties apply—sees relatively few failures.'"}, {"text": "They are provided at no extra charge by the manufacturer, extending the initial warranty automatically.", "isCorrect": false, "rationale": "Manufacturer warranties 'Comes with the product at no extra charge,' but extended warranties are 'Purchased separately, usually at time of sale.'"}]}, {"question": "If a consumer believes they have been a victim of deceptive advertising by a large online retailer, which federal agency should they primarily contact to file a complaint?", "options": [{"text": "Consumer Financial Protection Bureau (CFPB)", "isCorrect": false, "rationale": "The CFPB 'Handles complaints about financial products (loans, credit cards, debt collectors),' not deceptive advertising of goods."}, {"text": "State Attorney General (AG)", "isCorrect": false, "rationale": "While a State AG handles state-level consumer protection, the Federal Trade Commission (FTC) is the primary federal agency for deceptive advertising for a large online retailer."}, {"text": "Better Business Bureau (BBB)", "isCorrect": false, "rationale": "The BBB is a 'private organization that records business complaints and accredits businesses,' but it does not have law enforcement authority like a government agency."}, {"text": "Federal Trade Commission (FTC)", "isCorrect": true, "rationale": "The FTC 'Enforces laws against deceptive advertising, unfair business practices, and fraud,' making it the appropriate agency for such a complaint."}]}, {"question": "A consumer purchased a new refrigerator, but it stopped working after only two weeks. They contacted the seller directly, who offered minimal troubleshooting advice but no resolution. They then spoke to a manager, who also refused a refund or replacement. What should be the *next* step in the recommended dispute resolution process, assuming they paid with a credit card?", "options": [{"text": "File a complaint with the FTC immediately.", "isCorrect": false, "rationale": "While filing with an agency is a step, it comes after attempting to resolve with the seller and, importantly, after disputing the charge with the credit card company, especially if paid by credit card."}, {"text": "Initiate a chargeback with their credit card company.", "isCorrect": true, "rationale": "The text states, 'If you paid by credit card and the seller refuses a legitimate refund, you can file a chargeback. The credit card company investigates the dispute and can reverse the charge.' This is the recommended next step after escalating within the company."}, {"text": "Sue the business in small claims court.", "isCorrect": false, "rationale": "Small claims court is the final step in the dispute resolution process, coming after attempts with the seller, credit card dispute, and consumer protection agencies."}, {"text": "Contact the refrigerator manufacturer directly for a warranty claim.", "isCorrect": false, "rationale": "While a warranty claim might be an option, the dispute resolution steps focus on getting a resolution from the seller first, and specifically mention the credit card chargeback as the next step when the seller is uncooperative and the purchase was made with a credit card."}]}, {"question": "Which scenario would most likely be covered by a standard manufacturer's warranty for a smartphone?", "options": [{"text": "The phone's screen cracks after being dropped accidentally on a hard surface.", "isCorrect": false, "rationale": "Manufacturer warranties 'typically do NOT cover accidental damage, misuse, or normal wear.'"}, {"text": "The phone fails to power on due to a factory defect in the motherboard six months after purchase.", "isCorrect": true, "rationale": "Manufacturer warranties 'Covers defects in materials or workmanship under normal use.' A factory defect causing a power failure is a clear example of this."}, {"text": "The phone's battery capacity naturally diminishes after three years of heavy use.", "isCorrect": false, "rationale": "This would fall under 'normal wear' and is also likely outside the typical duration of a manufacturer's warranty (90 days to several years, not usually three for full battery capacity)."}, {"text": "The phone is damaged by water after being submerged, despite being advertised as water-resistant.", "isCorrect": false, "rationale": "While advertised as water-resistant, manufacturer warranties generally have clauses against water damage if the ingress is due to user error or goes beyond the specific rating. It falls under accidental damage/misuse unless a specific 'water damage' clause is present which is not the typical standard warranty coverage for defects."}]}, {"question": "Which characteristic of an online store is LEAST likely to be a warning sign of a fraudulent storefront or counterfeit products?", "options": [{"text": "Prices dramatically below market value for well-known brands.", "isCorrect": false, "rationale": "The text lists 'Prices dramatically below market value' as a primary warning sign ('Brand X sneakers for $39!' when they retail for $180)."}, {"text": "Limited payment options, such as only accepting gift cards or wire transfers.", "isCorrect": false, "rationale": "The text identifies 'Unusually limited payment options (gift cards only, wire transfer only, cryptocurrency only)' as a warning sign."}, {"text": "The website uses 'https://' in its URL and displays a padlock icon.", "isCorrect": true, "rationale": "The text states to 'look for “https://” and the padlock icon' as an indicator of a 'secure connection,' meaning its PRESENCE is a good sign, not a warning sign. Its ABSENCE is a warning sign."}, {"text": "Numerous grammatical errors and spelling mistakes throughout the site's content.", "isCorrect": false, "rationale": "The text includes 'Poor grammar and spelling throughout the site' as a warning sign of a fraudulent store."}]}, {"question": "The text advises paying for major purchases with a credit card (if paid off monthly). What is the primary benefit of using a credit card over a debit card or cash for consumer protection in case of a problem?", "options": [{"text": "Credit cards offer significant cashback rewards on major purchases that debit cards do not.", "isCorrect": false, "rationale": "While some credit cards offer rewards, the text specifically highlights 'purchase protection, extended warranty in some cases, and the chargeback right' as 'built-in consumer protections,' not cashback."}, {"text": "Credit cards provide lower interest rates for consumers who carry a balance.", "isCorrect": false, "rationale": "The advice is conditional on paying the balance in full each month, implying interest rates are not a benefit and can be a drawback. Lower interest rates are not mentioned as a consumer protection benefit."}, {"text": "The ability to file a chargeback, allowing the credit card company to investigate and potentially reverse the charge.", "isCorrect": true, "rationale": "The text explicitly states: 'Credit cards offer built-in consumer protections: purchase protection, extended warranty in some cases, and the chargeback right. Debit cards and cash offer much weaker or no protection when a transaction goes wrong.'"}, {"text": "Credit cards mean you never have to actually pay for products if there's a dispute.", "isCorrect": false, "rationale": "A chargeback is a dispute resolution tool, not a guarantee of free products. If the dispute is resolved against the consumer, the charge remains valid."}]}, {"question": "According to the 'Resolving a Dispute: Step-by-Step' section, what is the *very first* action a consumer should take when they have a problem with a purchase?", "options": [{"text": "Immediately file a complaint with a consumer protection agency like the FTC or their State AG.", "isCorrect": false, "rationale": "Filing with consumer protection agencies is step 4 in the process, not the first step."}, {"text": "Dispute the charge with their credit card company.", "isCorrect": false, "rationale": "Disputing with the credit card company is step 3, only after attempts to resolve with the seller directly have failed."}, {"text": "Contact the seller directly, clearly stating the problem and desired resolution, and keeping records.", "isCorrect": true, "rationale": "The text lists this as step 1: 'Contact the seller directly. Most problems are resolved here. Be polite, factual, and clear about what you want (refund, replacement, repair). Keep records of all communication.'"}, {"text": "Consult a lawyer about filing a small claims court case.", "isCorrect": false, "rationale": "Small claims court is step 5, the last resort in the recommended process."}]}, {"question": "How does the Better Business Bureau (BBB) primarily contribute to consumer protection, distinguishing it from government agencies like the FTC?", "options": [{"text": "The BBB enforces federal laws against fraud and deceptive advertising.", "isCorrect": false, "rationale": "The FTC enforces federal laws; the BBB is a private organization."}, {"text": "The BBB has the power to prosecute businesses that violate consumer protection laws.", "isCorrect": false, "rationale": "State Attorneys General and federal agencies like the FTC have prosecutorial power; the BBB does not."}, {"text": "The BBB provides accreditation to businesses meeting certain standards and maintains records of consumer complaints to inform the public.", "isCorrect": true, "rationale": "The text describes the BBB as 'A private organization that records business complaints and accredits businesses that meet standards. Useful for checking a company's reputation.' This highlights its distinct role as an informational and reputational resource."}, {"text": "The BBB handles complaints about financial products like loans and credit cards.", "isCorrect": false, "rationale": "The Consumer Financial Protection Bureau (CFPB) handles complaints about financial products."}]}, {"question": "The section introduction states that 'Knowing your rights—and how to use them—is an essential life skill.' Which of the following best summarizes *why* this skill is essential, according to the text?", "options": [{"text": "It guarantees that consumers will always receive free products or services in the event of any dissatisfaction.", "isCorrect": false, "rationale": "While consumer rights protect from certain issues, they do not guarantee free products or services for any dissatisfaction; they provide recourse for legitimate problems."}, {"text": "It empowers consumers to avoid all financial risks associated with purchasing goods and services.", "isCorrect": false, "rationale": "While it mitigates risks, it does not eliminate all financial risks. Consumers still bear responsibility for their purchase decisions and financial management."}, {"text": "It enables consumers to navigate the marketplace, protect themselves from deceptive practices, and resolve issues with defective products or fraudulent sellers.", "isCorrect": true, "rationale": "The introduction states, 'Laws and regulations protect you from deceptive practices, defective products, and fraudulent sellers. Knowing your rights—and how to use them—is an essential life skill.' This option directly reflects that statement."}, {"text": "It primarily helps consumers obtain extended warranties at no additional cost for all major purchases.", "isCorrect": false, "rationale": "Extended warranties are purchased separately and are generally not recommended due to cost. This is not the primary reason consumer rights are an essential life skill."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
