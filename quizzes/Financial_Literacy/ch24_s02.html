<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 24, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the most reliable method, according to the text, for making smart purchasing decisions?", "options": [{"text": "Comparing the aesthetic appeal of different package designs.", "isCorrect": false, "rationale": "The text explicitly states that package size and how good a sale looks are not the most reliable ways; aesthetics are even less reliable for smart purchasing decisions."}, {"text": "Comparing the price per unit, as 'the math never lies'.", "isCorrect": true, "rationale": "The first sentence of the section states, 'The most reliable way to make smart purchasing decisions is to compare the price per unit—not the total price, not the package size, not how good the sale looks. The math never lies.'"}, {"text": "Focusing solely on the total price of the product.", "isCorrect": false, "rationale": "The text specifically advises against focusing solely on the total price, as it doesn't account for varying quantities or sizes."}, {"text": "Choosing the product that is part of a store's biggest sale.", "isCorrect": false, "rationale": "The text warns against being swayed by 'how good the sale looks' without calculating the unit price, as sales can be misleading."}], "id": "q01"}, {"question": "A 16 oz jar of peanut butter costs $4.48. What is its unit price per ounce?", "options": [{"text": "$0.35 per oz", "isCorrect": false, "rationale": "This calculation is incorrect. To find the unit price, you divide the total price by the quantity ($4.48 / 16 oz)."}, {"text": "$0.28 per oz", "isCorrect": true, "rationale": "The unit price is calculated by dividing the total price by the quantity: $4.48 / 16 oz = $0.28 per oz."}, {"text": "$0.16 per oz", "isCorrect": false, "rationale": "This calculation is incorrect. It appears to be an inverse calculation (quantity divided by price) or a miscalculation."}, {"text": "$4.48 per oz", "isCorrect": false, "rationale": "This is the total price, not the unit price. The unit price represents the cost of one standard unit (in this case, one ounce)."}], "id": "q02"}, {"question": "You are comparing two boxes of cereal: Option A is a 12 oz box for $3.99, and Option B is a 20 oz box for $5.49. Which option offers the better value per ounce, and by approximately how much?", "options": [{"text": "Option A is better by about $0.05 per oz.", "isCorrect": false, "rationale": "Calculating the unit prices: Option A = $3.99/12 oz = $0.3325/oz. Option B = $5.49/20 oz = $0.2745/oz. Option B is cheaper, not Option A."}, {"text": "Option B is better by about $0.06 per oz.", "isCorrect": true, "rationale": "Calculating the unit prices: Option A = $3.99/12 oz = $0.3325/oz. Option B = $5.49/20 oz = $0.2745/oz. The difference is $0.3325 - $0.2745 = $0.058 per oz, which rounds to approximately $0.06 per oz. Option B is indeed the better value."}, {"text": "Option A is better by about $0.01 per oz.", "isCorrect": false, "rationale": "This calculation is incorrect, and Option A is not the better value."}, {"text": "Option B is better by about $0.10 per oz.", "isCorrect": false, "rationale": "While Option B is the better value, the calculated difference of $0.058 per oz does not round up to $0.10 per oz."}], "id": "q03"}, {"question": "According to the 'warning' section, why is buying the product with the cheapest unit price not always the best decision?", "options": [{"text": "Larger sizes often have hidden fees not reflected in the unit price.", "isCorrect": false, "rationale": "The text does not mention hidden fees for larger sizes. The 'warning' focuses on practical considerations for consumers."}, {"text": "The cheapest unit price is never actually cheaper if the food expires before use, if there's no storage, or if quality differs.", "isCorrect": true, "rationale": "The 'warning' box explicitly states: 'The cheapest unit price on food you throw away is never actually cheaper.' It lists expiration, storage space, and quality differences as key considerations."}, {"text": "Unit pricing calculations are often manipulated by stores to mislead shoppers.", "isCorrect": false, "rationale": "The text emphasizes that 'the math never lies' and encourages shoppers to calculate unit prices themselves, implying the math is reliable, not manipulated."}, {"text": "Comparison shopping across stores is always more effective than unit pricing.", "isCorrect": false, "rationale": "While comparison shopping is valuable, the text indicates unit pricing is the 'most reliable way' to compare products, and the warning is about specific scenarios where unit pricing alone isn't sufficient."}], "id": "q04"}, {"question": "If Store Brand laundry detergent is 64 fl oz (64 loads) for $7.49, and Brand X is 50 fl oz (50 loads) for $8.99, how much per load would you save by choosing the Store Brand over Brand X?", "options": [{"text": "Approximately $0.046 per load", "isCorrect": false, "rationale": "Store Brand = $7.49 / 64 loads = $0.117 per load. Brand X = $8.99 / 50 loads = $0.180 per load. The difference is $0.180 - $0.117 = $0.063 per load. This option is incorrect."}, {"text": "Approximately $0.063 per load", "isCorrect": true, "rationale": "To calculate: Store Brand = $7.49 / 64 loads = $0.117 per load. Brand X = $8.99 / 50 loads = $0.180 per load. The savings per load by choosing the Store Brand is $0.180 - $0.117 = $0.063 per load."}, {"text": "Approximately $0.117 per load", "isCorrect": false, "rationale": "This is the unit price of the Store Brand itself, not the savings compared to Brand X."}, {"text": "Approximately $0.180 per load", "isCorrect": false, "rationale": "This is the unit price of Brand X itself, not the savings compared to the Store Brand."}], "id": "q05"}, {"question": "Which of the following is NOT one of the steps listed for effective comparison shopping across stores?", "options": [{"text": "Identifying the exact item you want (brand, size, quantity).", "isCorrect": false, "rationale": "This is listed as Step 1 for effective comparison shopping."}, {"text": "Factoring in the cost of your time spent shopping.", "isCorrect": true, "rationale": "The text mentions factoring in 'travel cost if driving specifically to a different store—gas costs money too,' but it does not list factoring in the cost of your time spent shopping as a specific step."}, {"text": "Checking prices at two or three stores (online price checkers make this fast).", "isCorrect": false, "rationale": "This is listed as Step 2 for effective comparison shopping."}, {"text": "Checking for store loyalty programs, price-match guarantees, or membership discounts.", "isCorrect": false, "rationale": "This is listed as Step 4 for effective comparison shopping."}], "id": "q06"}, {"question": "The 'moneytip' box suggests that for large purchases, a 30-minute comparison search can save $50–$200 or more. What does this primarily demonstrate about smart shopping?", "options": [{"text": "That all large purchases inherently provide better value per unit.", "isCorrect": false, "rationale": "The tip is about the benefit of comparison shopping for large purchases, not about the inherent value of the purchases themselves. The text also warns that 'bigger is not always cheaper'."}, {"text": "That the effort of comparison shopping for significant items yields substantial financial benefits.", "isCorrect": true, "rationale": "The tip highlights that even a relatively short time investment (30 minutes) for 'big-ticket items' can result in significant monetary savings, reinforcing the value of diligent comparison shopping."}, {"text": "That stores typically offer higher discounts on electronics and furniture than on groceries.", "isCorrect": false, "rationale": "While possibly true in some cases, the text does not make a general statement about discount rates across different product categories; it focuses on the potential savings from comparison shopping regardless of specific discount levels."}, {"text": "That online shopping is always more cost-effective than in-store purchases for electronics.", "isCorrect": false, "rationale": "The tip suggests checking prices across sources, including online, but does not state that online is always cheaper. It also mentions factoring in shipping costs for online purchases."}], "id": "q07"}, {"question": "A jacket is originally priced at $80 and is marked '25% off.' What is the sale price of the jacket?", "options": [{"text": "$20", "isCorrect": false, "rationale": "This is the dollar discount amount ($80 * 0.25 = $20), not the final sale price."}, {"text": "$60", "isCorrect": true, "rationale": "First, calculate the dollar discount: $80 * 0.25 = $20. Then, subtract the discount from the original price: $80 - $20 = $60. So, the sale price is $60."}, {"text": "$75", "isCorrect": false, "rationale": "This calculation is incorrect. It might result from calculating 25% of the original price and then making an error in subtraction, or an incorrect discount calculation."}, {"text": "$100", "isCorrect": false, "rationale": "This would be the price if it were marked '25% up' or a significant miscalculation."}], "id": "q08"}, {"question": "A pair of headphones was originally $120, and is now on sale for $90. What is the discount percentage?", "options": [{"text": "33.3%", "isCorrect": false, "rationale": "This would be calculated as ($30/$90) * 100%, which uses the sale price as the base, not the original price, and is incorrect for a discount percentage."}, {"text": "25%", "isCorrect": true, "rationale": "First, find the dollar savings: $120 - $90 = $30. Then, calculate the discount percentage using the original price as the base: ($30 / $120) * 100% = 0.25 * 100% = 25%."}, {"text": "30%", "isCorrect": false, "rationale": "This calculation is incorrect. It might be derived from ($30 savings / $100 original price assumption) or another miscalculation."}, {"text": "75%", "isCorrect": false, "rationale": "This represents the percentage of the original price that you are paying ($90/$120 * 100%), not the percentage discount."}], "id": "q09"}, {"question": "A video game console was originally $499. It is now on sale for $399. What is the discount percentage, rounded to the nearest whole percent?", "options": [{"text": "25%", "isCorrect": false, "rationale": "This is an incorrect calculation. The savings are $100, and $100/$499 is not 0.25."}, {"text": "20%", "isCorrect": true, "rationale": "First, find the dollar savings: $499 - $399 = $100. Then, calculate the discount percentage: ($100 / $499) * 100% = 20.04008...%. Rounded to the nearest whole percent, this is 20%."}, {"text": "19%", "isCorrect": false, "rationale": "This is an incorrect calculation or rounding. 20.04% rounds to 20%, not 19%."}, {"text": "22%", "isCorrect": false, "rationale": "This is an incorrect calculation. The actual discount percentage is approximately 20%."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
