    <meta charset="UTF-8">

    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 31, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is a $charitable deduction$?", "options": [{"text": "A reduction in your taxable income allowed by the IRS when you donate to a qualified tax-exempt organization.", "isCorrect": true, "rationale": "A charitable deduction reduces taxable income — not the tax itself — when donations go to a qualifying 501(c)(3) organization."}, {"text": "A dollar-for-dollar reduction in the taxes you owe for any donation you make.", "isCorrect": false, "rationale": "A charitable deduction reduces taxable income, not taxes owed directly. The tax savings depend on your bracket rate, not the full donation amount."}, {"text": "A government matching program that doubles donations to approved charities.", "isCorrect": false, "rationale": "There is no government matching described here. The deduction reduces your taxable income, which indirectly reduces your tax bill."}, {"text": "A refund you receive from the IRS after making a qualified donation.", "isCorrect": false, "rationale": "A deduction reduces taxable income; it is not a direct refund check from the IRS."}], "id": "q01"}, {"question": "What kind of organizations qualify for charitable deductions?", "options": [{"text": "Any nonprofit organization, including political campaigns and mutual aid groups.", "isCorrect": false, "rationale": "Political campaigns and gifts to individuals do NOT qualify. Only 501(c)(3) tax-exempt organizations are eligible."}, {"text": "Qualified tax-exempt 501(c)(3) organizations only — not gifts to individuals, political campaigns, or most other purposes.", "isCorrect": true, "rationale": "The section is explicit: only 501(c)(3) organizations qualify. Individual gifts and political donations do not count."}, {"text": "Any organization that files taxes as a nonprofit, including labor unions and social clubs.", "isCorrect": false, "rationale": "Not all nonprofits are 501(c)(3) organizations. Labor unions and social clubs typically do not qualify for charitable deductions."}, {"text": "Foreign charities that operate in the United States on a temporary basis.", "isCorrect": false, "rationale": "The section specifies qualified 501(c)(3) organizations without extending this to foreign organizations."}], "id": "q02"}, {"question": "To claim a $charitable deduction$, what must a taxpayer do on their return?", "options": [{"text": "File as married filing jointly to reach the higher standard deduction threshold.", "isCorrect": false, "rationale": "Filing status affects the standard deduction amount but is not the requirement to claim a charitable deduction."}, {"text": "Itemize deductions instead of taking the standard deduction.", "isCorrect": true, "rationale": "The section states clearly that to claim a charitable deduction, you must itemize deductions — listing all eligible deductions and comparing their total to the standard deduction."}, {"text": "Submit a separate IRS Form 8888 along with the tax return.", "isCorrect": false, "rationale": "No specific separate form is mentioned; the requirement is to itemize deductions rather than taking the standard deduction."}, {"text": "Have a tax professional verify the donation with the charity directly.", "isCorrect": false, "rationale": "Third-party verification is not described as the requirement. The key step is choosing to itemize on your return."}], "id": "q03"}, {"question": "What is the standard deduction for a single filer in 2024?", "options": [{"text": "$7,300", "isCorrect": false, "rationale": "$7,300 is not the 2024 standard deduction for single filers. This figure is approximately half the correct amount."}, {"text": "$29,200", "isCorrect": false, "rationale": "$29,200 is the 2024 standard deduction for married filing jointly, not for single filers."}, {"text": "$14,600", "isCorrect": true, "rationale": "The section states the 2024 standard deduction is $14,600 for single filers."}, {"text": "$12,400", "isCorrect": false, "rationale": "$12,400 was the standard deduction in an earlier tax year — the 2024 figure is $14,600 for single filers."}], "id": "q04"}, {"question": "Why do most young, single earners receive no additional tax benefit from charitable giving?", "options": [{"text": "They are not allowed to claim charitable deductions until age 25.", "isCorrect": false, "rationale": "There is no age restriction on charitable deductions. The issue is the standard deduction threshold, not age."}, {"text": "Their total itemized deductions usually fall below the $14,600 standard deduction, so they take the standard deduction instead.", "isCorrect": true, "rationale": "Without a mortgage and other large deductions, most young single earners cannot exceed the standard deduction by itemizing — so their charitable donations produce no additional tax benefit."}, {"text": "Young earners are in a 0% tax bracket and therefore owe no taxes to reduce.", "isCorrect": false, "rationale": "Many young earners are in the 10% or 12% bracket. The issue is the standard deduction threshold, not a zero tax rate."}, {"text": "The IRS caps charitable deductions for earners below $50,000 of income.", "isCorrect": false, "rationale": "No such income cap on charitable deductions is mentioned in the section."}], "id": "q05"}, {"question": "Using the example in the section: a taxpayer in the 22% bracket donates $2,000 to a qualified charity and itemizes. What is their tax savings?", "options": [{"text": "$2,000", "isCorrect": false, "rationale": "$2,000 would be a dollar-for-dollar tax credit, not a deduction. A deduction only saves a fraction of the donation based on the bracket rate."}, {"text": "$440", "isCorrect": true, "rationale": "$2,000 × 0.22 = $440. The section walks through exactly this calculation: tax savings = donation × bracket rate."}, {"text": "$560", "isCorrect": false, "rationale": "$560 is not the result of $2,000 × 0.22. Check the multiplication: $2,000 × 0.22 = $440."}, {"text": "$220", "isCorrect": false, "rationale": "$220 would result from $1,000 × 0.22. The donation in the example is $2,000."}], "id": "q06"}, {"question": "In the same example, what is the effective $out-of-pocket cost$ of the $2,000 donation after tax savings?", "options": [{"text": "$1,560", "isCorrect": true, "rationale": "$2,000 − $440 (tax savings) = $1,560. The IRS effectively subsidizes $440 of the $2,000 gift."}, {"text": "$1,780", "isCorrect": false, "rationale": "$1,780 is not the result. The tax savings of $440 subtracted from $2,000 gives $1,560."}, {"text": "$2,000", "isCorrect": false, "rationale": "$2,000 would be the cost with no tax benefit at all. When itemizing, tax savings reduce the effective cost."}, {"text": "$1,360", "isCorrect": false, "rationale": "$1,360 is the effective cost for a 32% bracket donor ($2,000 − $640), not the 22% bracket donor in this example."}], "id": "q07"}, {"question": "How does tax bracket affect the benefit of a charitable deduction?", "options": [{"text": "Higher bracket donors face a lower benefit because their taxes are already high.", "isCorrect": false, "rationale": "The opposite is true — higher bracket donors save more per dollar donated because their marginal rate is higher."}, {"text": "The tax bracket has no effect; the deduction saves the same dollar amount regardless of bracket.", "isCorrect": false, "rationale": "The deduction value is directly proportional to the tax bracket rate. Higher brackets produce larger savings on the same donation."}, {"text": "The higher the tax bracket, the larger the effective subsidy — a 32% bracket donor saves $640 on a $2,000 gift vs. $440 for a 22% bracket donor.", "isCorrect": true, "rationale": "The section illustrates this explicitly: 32% × $2,000 = $640 savings vs. 22% × $2,000 = $440. Higher brackets mean larger tax subsidies on equal donations."}, {"text": "Tax bracket only matters for donations above $10,000; smaller gifts are treated the same across all brackets.", "isCorrect": false, "rationale": "No such threshold is described. Bracket rate affects every dollar of a qualifying deduction."}], "id": "q08"}, {"question": "What is a $donor-advised fund$ (DAF) and what tax strategy does it enable?", "options": [{"text": "A government savings account that matches donations dollar-for-dollar up to $5,000 per year.", "isCorrect": false, "rationale": "A DAF is not a government matching program. It is an account where you make a large contribution, take an immediate deduction, and distribute to charities over time."}, {"text": "An account funded with a large donation in one year to receive an immediate deduction, with distributions to charities over subsequent years — enabling a strategy called bunching.", "isCorrect": true, "rationale": "A DAF lets you contribute a large sum (e.g., $9,000) in a single year to exceed the standard deduction, take the full deduction that year, and then distribute to charities over three years."}, {"text": "A retirement account that converts to a charitable annuity at age 70½.", "isCorrect": false, "rationale": "A DAF has no retirement or annuity component — it is a charitable giving vehicle, not a retirement account."}, {"text": "A type of trust that distributes a fixed percentage to charities each year automatically.", "isCorrect": false, "rationale": "A DAF is not a trust with fixed automatic distributions. The donor controls when and where distributions are made."}], "id": "q09"}, {"question": "What is the core message of the money tip about giving without a tax deduction?", "options": [{"text": "Donors who cannot itemize should wait until they can before giving.", "isCorrect": false, "rationale": "The section explicitly encourages giving even without a tax benefit — waiting for a deduction misses the point."}, {"text": "Giving is a values decision; the tax benefit is a bonus for those who itemize, not the primary reason to give.", "isCorrect": true, "rationale": "The money tip states: 'Giving is a values decision. The tax benefit is a bonus for those who happen to itemize — not the primary reason to give.'"}, {"text": "Only donors in the 24% bracket or higher should consider charitable giving for its tax benefits.", "isCorrect": false, "rationale": "The section makes no bracket cutoff recommendation; it says the tax benefit is secondary to values in any case."}, {"text": "The best financial strategy is to avoid giving until you are in the highest possible tax bracket.", "isCorrect": false, "rationale": "The section explicitly advises against treating the tax deduction as the primary motivation for giving."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
