    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">

        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 14, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the fundamental difference between a credit card and a debit card, according to the text?", "options": [{"text": "A credit card offers rewards, while a debit card does not.", "isCorrect": false, "rationale": "While credit cards often offer rewards and debit cards may not, this is not the fundamental difference in how they function. Many debit cards also offer rewards."}, {"text": "A credit card allows you to spend the bank's money as a short-term loan, whereas a debit card uses your own funds directly.", "isCorrect": true, "rationale": "The text explicitly states that a credit card is a 'revolving line of credit' and a 'short-term loan' where 'You are spending the bank's money,' unlike a debit card 'which draws directly from your bank account.'"}, {"text": "A credit card has a PIN for transactions, while a debit card only requires a signature.", "isCorrect": false, "rationale": "Both credit and debit cards can use PINs or signatures for transactions, and this describes a security feature, not the core financial mechanism difference."}, {"text": "A credit card provides fraud protection, but a debit card does not.", "isCorrect": false, "rationale": "Both credit and debit cards typically offer fraud protection, though the specifics may vary. This is not the fundamental difference described in the text."}], "id": "q01"}, {"question": "If your credit card has a $2,000 credit limit and you attempt to make a purchase for $2,001, what is the most likely outcome according to the provided text?", "options": [{"text": "The transaction will be approved, but you will incur an over-limit fee.", "isCorrect": false, "rationale": "The text states that if you try to charge more than your limit, 'the transaction will typically be declined,' not approved with a fee."}, {"text": "The credit card company will automatically increase your limit to accommodate the purchase.", "isCorrect": false, "rationale": "The text does not mention automatic limit increases for exceeding a limit. Credit limit increases are usually at the discretion of the issuer or initiated by the cardholder."}, {"text": "The transaction will typically be declined.", "isCorrect": true, "rationale": "The definition of Credit Limit explicitly states: 'If your limit is $2,000 and you try to charge $2,001, the transaction will typically be declined.'"}, {"text": "The purchase will be split into two transactions: $2,000 approved, and $1 declined.", "isCorrect": false, "rationale": "This scenario is not described in the text and is not how credit limits typically function for a single transaction that exceeds the limit."}], "id": "q02"}, {"question": "Which of the following accurately describes the chronological order of events within a standard credit card billing cycle, as presented in the text?", "options": [{"text": "Payment due date → Statement date → Cycle closes → Grace period begins.", "isCorrect": false, "rationale": "This order is incorrect. The statement date occurs before the payment due date, and the grace period follows the statement date."}, {"text": "Cycle opens → Statement date → Payment due date → You pay.", "isCorrect": true, "rationale": "The text outlines the steps as: 'The billing cycle opens,' then 'The cycle closes (statement date),' followed by 'The payment due date' (which includes the grace period), and finally 'You pay.'"}, {"text": "Grace period begins → Cycle opens → You pay → Statement date.", "isCorrect": false, "rationale": "This order is incorrect. The cycle opens first, and the grace period occurs later, after the statement date."}, {"text": "You pay → Grace period ends → Cycle closes → Statement date.", "isCorrect": false, "rationale": "This order is incorrect. Payment occurs at the end of the process, and the statement date and cycle close happen much earlier."}], "id": "q03"}, {"question": "The 'grace period' is described as one of the most powerful features of a credit card. How can a cardholder utilize the grace period to avoid paying interest on purchases?", "options": [{"text": "By making the minimum payment before the due date.", "isCorrect": false, "rationale": "Making only the minimum payment will avoid late fees but will likely result in interest being charged on the remaining balance, as the full statement balance was not paid."}, {"text": "By only making purchases up to 50% of the credit limit.", "isCorrect": false, "rationale": "While managing credit utilization is good practice, it doesn't directly relate to using the grace period to avoid interest on purchases. Interest accrual is tied to paying the full balance."}, {"text": "By paying the full statement balance by the payment due date.", "isCorrect": true, "rationale": "The text explicitly states: 'If you pay your full statement balance by the due date, you pay zero interest on purchases made during that cycle.'"}, {"text": "By avoiding cash advances during the grace period.", "isCorrect": false, "rationale": "Cash advances do not have a grace period, so this action, while wise, does not describe how to use the grace period for purchases to avoid interest."}], "id": "q04"}, {"question": "A credit card statement includes a minimum payment. What is the primary purpose of this minimum payment, and what does paying *only* this amount typically imply for interest?", "options": [{"text": "It is the maximum amount you are allowed to pay without incurring an additional fee; paying less incurs interest.", "isCorrect": false, "rationale": "The minimum payment is the *least* you must pay, not the maximum. Paying less than the minimum incurs a late fee, not just interest."}, {"text": "It ensures that you pay off your entire balance within the current billing cycle; paying only the minimum guarantees no interest.", "isCorrect": false, "rationale": "Paying only the minimum payment almost never pays off the entire balance and therefore usually results in interest charges on the remaining balance."}, {"text": "It is the least you must pay to avoid a late fee; paying only this amount typically means you will incur interest on the remaining balance.", "isCorrect": true, "rationale": "The text states, 'Every credit card statement includes a minimum payment—the least you must pay to avoid a late fee.' If you don't pay the full balance, interest will be charged on the outstanding amount."}, {"text": "It is a suggestion for responsible credit use; failure to pay it results in the card being immediately canceled.", "isCorrect": false, "rationale": "It's a requirement to avoid late fees, not just a suggestion. Failure to pay does not usually result in immediate card cancellation, but can lead to fees, interest, and credit score damage."}], "id": "q05"}, {"question": "The 'moneytip' advises treating a credit card like a debit card. What does this advice specifically recommend to maximize the benefits and minimize the costs of a credit card?", "options": [{"text": "Only use your credit card for emergencies, similar to how an emergency fund is used.", "isCorrect": false, "rationale": "The moneytip encourages using the card for everyday purchases 'as a convenience' but only what you can afford to pay off, not just emergencies."}, {"text": "Ensure all purchases are made at stores that offer rewards programs.", "isCorrect": false, "rationale": "While earning rewards is a benefit, it's not the primary advice for *minimizing costs* (interest) by treating it like a debit card."}, {"text": "Only charge what you could pay for with cash right now and pay the full balance when the statement arrives.", "isCorrect": true, "rationale": "The moneytip explicitly states: 'Only charge what you could pay for with cash in your bank account right now. When the statement arrives, pay the full balance.' This ensures you get benefits without interest costs."}, {"text": "Keep your credit utilization below 30% of your credit limit at all times.", "isCorrect": false, "rationale": "Maintaining low credit utilization is good for credit scores but is not the specific advice given in the 'moneytip' for avoiding interest by treating it like a debit card."}], "id": "q06"}, {"question": "A user takes a cash advance from their credit card. According to the text, when does interest begin accruing on this amount?", "options": [{"text": "After the grace period has ended, typically 21-25 days later.", "isCorrect": false, "rationale": "The text explicitly states: 'There is no grace period—interest begins accruing immediately from the moment you take the cash' for cash advances."}, {"text": "As soon as the next billing cycle opens.", "isCorrect": false, "rationale": "Interest begins accruing much sooner than the next billing cycle. It starts immediately."}, {"text": "Immediately from the moment the cash is withdrawn.", "isCorrect": true, "rationale": "The warning section on cash advances clearly states: 'There is no grace period—interest begins accruing immediately from the moment you take the cash.'"}, {"text": "Only if the minimum payment for the cash advance is not met by the due date.", "isCorrect": false, "rationale": "Interest accrues immediately on a cash advance, regardless of whether a minimum payment is made on time. Making minimum payments will still incur interest on the cash advance."}], "id": "q07"}, {"question": "Beyond immediate interest accrual, what other distinct characteristics apply to cash advances compared to standard credit card purchases, as per the warning section?", "options": [{"text": "Lower APR and no upfront fee, making them cheaper than standard purchases.", "isCorrect": false, "rationale": "This is incorrect. The text states the opposite: 'The APR for cash advances is usually higher... There is typically an upfront cash advance fee.'"}, {"text": "No grace period, a typically higher APR, and an upfront cash advance fee.", "isCorrect": true, "rationale": "The warning section lists these exact characteristics: 'There is no grace period,' 'The APR for cash advances is usually higher,' and 'There is typically an upfront cash advance fee.'"}, {"text": "An extended grace period, but only if the amount withdrawn is under $100.", "isCorrect": false, "rationale": "Cash advances have no grace period at all, regardless of the amount."}, {"text": "Interest accrues only if the cash advance is not repaid within 30 days, similar to a personal loan.", "isCorrect": false, "rationale": "Interest accrues immediately on cash advances; there is no 30-day grace period as described."}], "id": "q08"}, {"question": "The text opens by stating a credit card is 'one of the most powerful financial tools available to you—and one of the most dangerous.' Based on the section, what primarily makes it both powerful and potentially dangerous?", "options": [{"text": "Its power lies in its universal acceptance, but its danger is that it can only be used online.", "isCorrect": false, "rationale": "While credit cards are widely accepted, their power as described is more about financial flexibility and benefits like rewards. The statement that it can only be used online is false."}, {"text": "It's powerful for allowing short-term borrowing without interest (via the grace period) and other benefits like rewards, but dangerous due to high interest rates if balances are not paid in full.", "isCorrect": true, "rationale": "The power comes from using it as a convenience, getting benefits, and avoiding interest by paying in full during the grace period. The danger arises when balances are carried, leading to significant interest costs."}, {"text": "Its power is in allowing cash withdrawals from ATMs, but its danger is the high ATM fees.", "isCorrect": false, "rationale": "The text explicitly warns *against* cash advances due to their high costs and lack of grace period, indicating this is a danger, not a primary 'power' feature."}, {"text": "Its power allows unlimited spending, but its danger is that it always charges interest from day one.", "isCorrect": false, "rationale": "Spending is limited by the credit limit, not unlimited. Interest is *not* always charged from day one on purchases if the grace period is utilized correctly."}], "id": "q09"}, {"question": "A new credit card user wants to benefit from their card's features (spending records, fraud protection, potential rewards) without incurring any interest charges. Which strategy, based on the 'key insight' from the text, would best achieve this goal?", "options": [{"text": "Make only the minimum payment each month to demonstrate responsible financial behavior.", "isCorrect": false, "rationale": "Making only the minimum payment will incur interest on the remaining balance, thereby failing to avoid interest charges."}, {"text": "Ensure all purchases are made well below the credit limit to maintain a low balance.", "isCorrect": false, "rationale": "While keeping a low balance is good practice, it doesn't guarantee zero interest. The full balance must be paid to avoid interest on purchases."}, {"text": "Treat the credit card like a short-term loan, using it for purchases and paying the full statement balance by the due date every billing cycle.", "isCorrect": true, "rationale": "This strategy directly aligns with the 'key insight' and 'moneytip': use the card as a convenience, make purchases that can be afforded, and 'pay the full statement balance by the due date' to pay 'zero interest.'"}, {"text": "Limit credit card use to only essential purchases and avoid all discretionary spending.", "isCorrect": false, "rationale": "This focuses on *what* to buy, not *how* to manage the payments to avoid interest. Even essential purchases will accrue interest if not paid in full."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
