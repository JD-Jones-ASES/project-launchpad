<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 2, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best defines opportunity cost according to the text?", "options": [{"text": "The total financial outlay required to make a specific choice.", "isCorrect": false, "rationale": "This describes the direct cost of a decision, not the opportunity cost, which is about the value of what was given up."}, {"text": "The value of the best alternative option that you gave up when you made a choice.", "isCorrect": true, "rationale": "This directly matches the definition provided in the text: 'The opportunity cost of a decision is the value of the best alternative option that you gave up when you made that choice.'"}, {"text": "The sum of all potential benefits lost from every alternative option not chosen.", "isCorrect": false, "rationale": "The text explicitly states it's 'not the value of all the things you gave up — it is the value of the best alternative.'"}, {"text": "The emotional regret experienced after making a decision that turns out to be suboptimal.", "isCorrect": false, "rationale": "Opportunity cost is an economic concept of value given up, not a subjective emotional state."}], "id": "q01"}, {"question": "If a student has three options for their Saturday afternoon—Option 1: Work at a part-time job, Option 2: Go to a friend's birthday party, Option 3: Study for a difficult exam—and they choose Option 3 (studying), what is their opportunity cost if the birthday party was their second-best preference?", "options": [{"text": "The combined value of attending the birthday party and working at their job.", "isCorrect": false, "rationale": "The text clarifies that opportunity cost is the 'best alternative' given up, not all alternatives combined."}, {"text": "The potential earnings from their part-time job.", "isCorrect": false, "rationale": "While a cost, the text specifies it's the *best* alternative given up. If the birthday party was the second-best preference (meaning the best alternative to studying), then working was the third-best."}, {"text": "The enjoyment and experience of attending their friend's birthday party.", "isCorrect": true, "rationale": "The text states, 'If you had three options and you chose the first, your opportunity cost is the second-best option.' In this scenario, the birthday party is the best alternative to studying that was given up."}, {"text": "The time spent studying, which could have been used for relaxation.", "isCorrect": false, "rationale": "This is a general cost of studying, not the specific value of the best alternative given up as defined by opportunity cost."}], "id": "q02"}, {"question": "A person decides to spend three hours playing video games. Based on the text, which of the following best represents the opportunity cost of this decision?", "options": [{"text": "The electricity consumed by the gaming console.", "isCorrect": false, "rationale": "This is a direct cost of playing video games, not the value of the best alternative use of the time."}, {"text": "The specific amount of homework they could have finished, making tomorrow less stressful.", "isCorrect": true, "rationale": "The text uses this exact example: 'If you spend three hours playing video games, your opportunity cost might be the homework you could have finished, making tomorrow much less stressful.'"}, {"text": "The overall reduction in their daily productivity.", "isCorrect": false, "rationale": "This is a general consequence, not the specific 'best alternative' given up as defined by opportunity cost."}, {"text": "The potential social interaction they missed by staying home.", "isCorrect": false, "rationale": "While a possible alternative, the text's example specifically highlights finishing homework as the opportunity cost, implying it was the 'best alternative' in that context."}], "id": "q03"}, {"question": "In Maria's $200 decision, if she chose to complete the bicycle purchase instead of buying the new shoes, what did the text identify as her opportunity cost?", "options": [{"text": "The $200 she spent on the bicycle.", "isCorrect": false, "rationale": "The $200 is the direct cost of the chosen action, not the value of the alternative given up."}, {"text": "The enjoyment and ownership of the new shoes she had been wanting.", "isCorrect": true, "rationale": "The text states: 'If Maria chooses the bicycle (Option B), her opportunity cost is Option A — the shoes she would have enjoyed.'"}, {"text": "The combined value of the shoes, the bicycle, and the commuting savings.", "isCorrect": false, "rationale": "Opportunity cost is the value of the *best alternative given up*, not a combination of all choices or benefits."}, {"text": "The monthly bus fare she would have continued to pay.", "isCorrect": false, "rationale": "This is a cost she *avoids* by choosing the bicycle, making it a benefit of her choice, not the opportunity cost of that choice."}], "id": "q04"}, {"question": "Darius has a choice: work a 6-hour Saturday shift at $12/hour, or go to a concert with friends where the ticket costs $50. If Darius chooses to go to the concert, what is the *total financial impact* of this decision compared to working?", "options": [{"text": "$72", "isCorrect": false, "rationale": "This amount represents only the wages Darius would have earned, not the full financial impact including the concert ticket cost."}, {"text": "$50", "isCorrect": false, "rationale": "This amount represents only the cost of the concert ticket, not the foregone earnings."}, {"text": "$22", "isCorrect": false, "rationale": "This calculation ($72 - $50) is incorrect for determining the 'total financial impact' as described in the example, which adds the foregone earnings and the cost of the chosen activity."}, {"text": "$122", "isCorrect": true, "rationale": "The total financial impact is the sum of the money not earned ($12/hour * 6 hours = $72) and the money spent on the chosen activity ($50 ticket), resulting in $72 + $50 = $122. This aligns with the 'full financial difference' calculation in the Darius example."}], "id": "q05"}, {"question": "The text describes a 'hidden opportunity cost' when choosing to spend money today. What is this hidden cost primarily related to?", "options": [{"text": "The sales tax and shipping fees added to a purchase.", "isCorrect": false, "rationale": "These are direct costs of the purchase, not the 'hidden opportunity cost' related to future growth."}, {"text": "The immediate loss of purchasing power due to inflation.", "isCorrect": false, "rationale": "While inflation is a factor in money's value, the text specifically identifies the 'hidden opportunity cost' differently."}, {"text": "What that money could have grown into if it had been saved or invested for the future.", "isCorrect": true, "rationale": "The text explicitly states: 'When you spend $100 on something today, the opportunity cost is not just the $100 — it is what that $100 could have grown into if you had saved or invested it.'"}, {"text": "The effort and time spent earning the money in the first place.", "isCorrect": false, "rationale": "This is a cost of earning money, not the specific 'hidden opportunity cost' of spending it today instead of saving/investing."}], "id": "q06"}, {"question": "A consumer purchases a new gadget for $150 that was originally priced at $200. They exclaim, 'I just saved $50!' According to the text's warning, why is this statement flawed?", "options": [{"text": "The quality of discounted items is usually inferior, negating any 'savings.'", "isCorrect": false, "rationale": "The text's warning does not comment on the quality of discounted items."}, {"text": "They still spent $150, and the opportunity cost is what else they could have done with that $150, not the difference from the original price.", "isCorrect": true, "rationale": "The text directly states: 'If you spent $60 on a shirt that was originally $100, you did not save $40 — you spent $60. The opportunity cost of that $60 is whatever else you could have done with it.'"}, {"text": "True savings only occur when money is deposited into a savings account, not when purchasing an item.", "isCorrect": false, "rationale": "While the text mentions putting money away as saving, the core reason for the statement being flawed is about the act of spending vs. the alternative use of the money spent."}, {"text": "The original price was likely inflated, making the 'discount' artificial.", "isCorrect": false, "rationale": "The text does not discuss pricing strategies or artificial discounts in this warning."}], "id": "q07"}, {"question": "How does understanding opportunity cost fundamentally alter the way individuals should approach financial and life decisions, according to the text?", "options": [{"text": "It simplifies decisions by always pointing to the most financially beneficial option.", "isCorrect": false, "rationale": "The text states, 'Identifying opportunity cost does not make decisions automatic — it makes them informed,' implying complexity rather than simplification."}, {"text": "It shifts the primary question from 'Can I afford this?' to 'Is this the best use of my resources, given other alternatives?'", "isCorrect": true, "rationale": "The text concludes by stating: 'The question shifts from “Can I afford this?” to “Is this the best use of this money, given everything else I could do with it?”'"}, {"text": "It encourages individuals to avoid all spending to maximize savings.", "isCorrect": false, "rationale": "The concept makes decisions informed, not necessarily prescriptive of avoiding all spending; it's about evaluating trade-offs."}, {"text": "It makes individuals regret past choices by highlighting what they missed out on.", "isCorrect": false, "rationale": "The purpose is to make decisions 'informed,' not to induce regret."}], "id": "q08"}, {"question": "The text states that the concept of opportunity cost was formalized in the late 1800s, but the reality is 'as old as human decision-making.' What does this historical context primarily convey?", "options": [{"text": "Opportunity cost is a modern economic theory that did not apply to pre-industrial societies.", "isCorrect": false, "rationale": "The example of the ancient farmer planting wheat instead of barley directly contradicts this, showing its applicability to all eras."}, {"text": "While the term is new, the fundamental principle of making trade-offs has always been a part of human choices.", "isCorrect": true, "rationale": "The text explains: 'The word you use for it is new; the reality is as old as human decision-making,' emphasizing the timeless nature of trade-offs."}, {"text": "Economists invented the concept to explain irrational human behavior.", "isCorrect": false, "rationale": "The text attributes the 'formalization' of the concept, not its invention, nor its sole purpose being to explain irrationality."}, {"text": "Understanding opportunity cost is more crucial in complex modern economies than in simpler historical ones.", "isCorrect": false, "rationale": "While modern economies might highlight it more, the text emphasizes its universal and ancient reality, not that it's more crucial now."}], "id": "q09"}, {"question": "According to the text, what is a key difference between time and money in the context of opportunity cost?", "options": [{"text": "Time can be saved and stored for future use, whereas money cannot.", "isCorrect": false, "rationale": "This statement is incorrect; the opposite is generally true for storage, and time cannot be 'saved' in the same way money can."}, {"text": "Money is more limited than time because there's a finite amount in the world.", "isCorrect": false, "rationale": "The text explicitly states: 'Time is actually more limited than money.'"}, {"text": "Time is more limited than money because it cannot be regained once spent, while more money can always be earned.", "isCorrect": true, "rationale": "The text clearly states: 'Time is actually more limited than money. You can always earn more money, but you cannot get time back.'"}, {"text": "The opportunity cost of time is always calculable in exact dollar figures, unlike money.", "isCorrect": false, "rationale": "The text indicates both can have dollar values or other values, and does not suggest one is always more calculable than the other."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
