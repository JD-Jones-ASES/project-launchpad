        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz

</div>

<script>
var QUESTIONS = [{"question": "A user discovers unauthorized charges on both their credit card and debit card. They report the credit card fraud immediately, but wait 30 days to report the debit card fraud. What is the maximum liability they face for the debit card fraud?", "options": [{"text": "$0", "isCorrect": false, "rationale": "Federal law provides liability limits for fraudulent charges, so liability is rarely $0 if not reported immediately, especially for debit cards."}, {"text": "$50", "isCorrect": false, "rationale": "A $50 liability cap for debit cards applies only if the fraud is reported within 2 business days. For credit cards, it's typically $50, often waived by issuers."}, {"text": "$500", "isCorrect": true, "rationale": "The text states that for debit cards, liability is 'up to $500 if you wait 2–60 days' to report the fraudulent charges."}, {"text": "Unlimited liability", "isCorrect": false, "rationale": "Unlimited liability for debit card fraud only applies if reporting occurs after 60 days, according to the provided text."}], "id": "q01"}, {"question": "Which statement accurately describes the key difference in protection between a credit freeze and a fraud alert?", "options": [{"text": "A fraud alert prevents all new credit accounts from being opened, while a credit freeze only warns lenders.", "isCorrect": false, "rationale": "This statement reverses the functions. A credit freeze is the stronger protection that prevents new accounts, while a fraud alert only warns lenders."}, {"text": "A credit freeze requires contacting only one credit bureau, while a fraud alert requires contacting all three.", "isCorrect": false, "rationale": "This is incorrect. A credit freeze requires contacting each of the three bureaus separately, while placing a fraud alert at one bureau automatically notifies the other two."}, {"text": "A credit freeze locks your credit file, preventing new access, whereas a fraud alert allows access but flags suspicious activity for lenders.", "isCorrect": true, "rationale": "The text defines a credit freeze as locking your credit file so 'no new lender can access your credit report,' and a fraud alert as a notice 'instructing lenders to take extra steps to verify your identity before opening new accounts,' while credit is 'still accessible'."}, {"text": "A fraud alert is a stronger, more permanent protection than a credit freeze.", "isCorrect": false, "rationale": "The text explicitly states that a credit freeze 'is the strongest protection against new account fraud' and is 'less restrictive' than a fraud alert."}], "id": "q02"}, {"question": "The text recommends a proactive measure even if you haven't been victimized. What is this measure, and what is its primary benefit?", "options": [{"text": "Filing a police report, which creates an official record for future reference.", "isCorrect": false, "rationale": "Filing a police report is a reactive step for significant theft, not a proactive measure against potential new account fraud."}, {"text": "Placing a credit freeze, which prevents new credit accounts from being opened in your name.", "isCorrect": true, "rationale": "The 'moneytip' section explicitly advises, 'Even if you have not been victimized, consider placing a credit freeze proactively... It provides powerful protection' against new account identity theft."}, {"text": "Setting up free account alerts, which notifies you of suspicious transactions on existing accounts.", "isCorrect": false, "rationale": "Setting up account alerts is a good monitoring practice but does not prevent new accounts from being opened in your name. It's also mentioned as a post-recovery step."}, {"text": "Contacting the FTC, which provides a personalized recovery plan if identity theft occurs.", "isCorrect": false, "rationale": "Contacting the FTC is for reporting existing identity theft and generating a recovery plan, not a proactive measure to prevent future theft."}], "id": "q03"}, {"question": "What is the primary benefit of reporting identity theft to the Federal Trade Commission (FTC) via IdentityTheft.gov?", "options": [{"text": "It directly closes all fraudulent accounts and removes them from your credit report.", "isCorrect": false, "rationale": "The FTC report aids you in disputing accounts, but it does not directly close them or remove them from your credit report. You must contact creditors and credit bureaus yourself."}, {"text": "It immediately freezes your credit at all three major bureaus.", "isCorrect": false, "rationale": "The FTC does not place credit freezes. You must contact each credit bureau separately to initiate a credit freeze."}, {"text": "It generates an official Identity Theft Report and a personalized recovery plan.", "isCorrect": true, "rationale": "The text states that filing a report with the FTC 'Creates an official Identity Theft Report' and 'Generates a personalized recovery plan with step-by-step instructions'."}, {"text": "It initiates an arrest warrant for the identity thief.", "isCorrect": false, "rationale": "While an FTC report can be part of an investigation, its primary purpose described here is not to directly issue arrest warrants. That's typically the role of law enforcement."}], "id": "q04"}, {"question": "Under what circumstances does the text recommend filing a police report after identity theft?", "options": [{"text": "For any unauthorized charge, regardless of the amount.", "isCorrect": false, "rationale": "The text specifies filing a police report for 'significant identity theft,' not for every minor unauthorized charge."}, {"text": "Only if you suspect a specific person committed the crime.", "isCorrect": false, "rationale": "While suspicion can be a factor, the text also mentions other criteria such as if 'a criminal has been arrested' or if 'creditors require it'."}, {"text": "For significant identity theft, or if creditors require it to remove fraudulent accounts.", "isCorrect": true, "rationale": "The text states to 'File a Police Report (If Needed)' for 'significant identity theft—especially if a criminal has been arrested using your identity, or if creditors require it to remove fraudulent accounts'."}, {"text": "As the very first step before contacting financial institutions or credit bureaus.", "isCorrect": false, "rationale": "The first step is to contact financial institutions, followed by placing a credit freeze or fraud alert, and then reporting to the FTC. Filing a police report is Step 4."}], "id": "q05"}, {"question": "When disputing fraudulent accounts and charges, the text advises writing to each creditor with fraudulent accounts. What essential documents should be included with this correspondence?", "options": [{"text": "A copy of your driver's license and a utility bill.", "isCorrect": false, "rationale": "While these might be requested for identity verification in some contexts, the text specifically instructs you to include official reports for disputing fraudulent accounts."}, {"text": "Copies of your FTC Identity Theft Report and police report (if applicable).", "isCorrect": true, "rationale": "The text states, 'Write to each creditor with fraudulent accounts in writing. Include copies of your FTC report and police report.'"}, {"text": "Your Social Security card and birth certificate.", "isCorrect": false, "rationale": "These are highly sensitive documents and should almost never be mailed, especially not for routine disputes. They pose a further identity theft risk."}, {"text": "A personal letter explaining your financial hardship.", "isCorrect": false, "rationale": "While context can be helpful, the primary requirement for disputing fraudulent accounts is official documentation of the identity theft."}], "id": "q06"}, {"question": "Why does the text emphasize the importance of keeping detailed records of every phone call and letter related to identity theft recovery?", "options": [{"text": "To help you remember who you spoke with in case you need to contact them socially.", "isCorrect": false, "rationale": "The purpose of record-keeping in this context is for official and legal reasons, not social interactions."}, {"text": "To provide evidence and a clear timeline for your recovery efforts, especially if disputes escalate.", "isCorrect": true, "rationale": "The text advises to 'Keep records of every phone call (date, time, name of representative) and every letter you send or receive.' This documentation is crucial for managing disputes and proving your actions during recovery."}, {"text": "Because the police department will require them to track down the criminal.", "isCorrect": false, "rationale": "While records might assist law enforcement, the primary reason given in the context of disputing accounts is for your own records and negotiations with creditors/bureaus."}, {"text": "To ensure you are reimbursed for all your time spent on recovery.", "isCorrect": false, "rationale": "The text does not mention any provision for reimbursement for time spent on recovery."}], "id": "q07"}, {"question": "After resolving an identity theft incident, what ongoing measure does the text strongly recommend for the next 12 months?", "options": [{"text": "Applying for new credit to rebuild your credit score quickly.", "isCorrect": false, "rationale": "Applying for new credit immediately after identity theft can be risky and is not the recommended first step for long-term monitoring."}, {"text": "Immediately closing all existing bank accounts and credit cards.", "isCorrect": false, "rationale": "Closing all existing accounts may be an overreaction and disrupt legitimate financial activity. The focus is on monitoring and securing them."}, {"text": "Closely monitoring your credit reports and setting up free account alerts.", "isCorrect": true, "rationale": "Step 6, 'Monitor Your Credit Going Forward,' explicitly states, 'continue to monitor your credit reports closely for the next 12 months. Set up free account alerts with your banks and credit cards.'"}, {"text": "Paying for a credit repair service to remove negative items.", "isCorrect": false, "rationale": "The 'scamalert' section explicitly warns against paying for credit repair services, advising that you can take the necessary steps yourself for free."}], "id": "q08"}, {"question": "A company approaches you after identity theft, promising to 'fix your credit instantly' and 'guarantee results' for a fee. Based on the 'scamalert' in the text, what is the most appropriate response?", "options": [{"text": "Hire them immediately, as speed is crucial for credit repair.", "isCorrect": false, "rationale": "The 'scamalert' warns that companies promising 'instant credit repair or guarantee results are almost always scams.'"}, {"text": "Consider their offer carefully, as professional help can be beneficial.", "isCorrect": false, "rationale": "The text explicitly advises against such companies, stating that legitimate credit repair takes time and can be done yourself for free."}, {"text": "Decline their services, as such promises are typical of credit repair scams.", "isCorrect": true, "rationale": "The 'scamalert' clearly states, 'Companies that promise instant credit repair or guarantee results are almost always scams. Paying them can make your situation worse, not better.'"}, {"text": "Ask them for a discount, but proceed if the price is right.", "isCorrect": false, "rationale": "Engaging with a scam, even at a reduced price, is still not advisable and can worsen your situation."}], "id": "q09"}, {"question": "Sarah discovers a new credit card account opened in her name that she did not authorize. She had previously placed a credit freeze on all three major credit bureaus. What is the most likely reason this new account was able to be opened despite her proactive measure?", "options": [{"text": "A credit freeze only prevents unauthorized debit card use, not credit cards.", "isCorrect": false, "rationale": "A credit freeze is designed to prevent new credit *accounts* from being opened, which includes credit cards, by blocking access to your credit file."}, {"text": "She must have accidentally authorized the account without realizing it.", "isCorrect": false, "rationale": "If a credit freeze is properly in place, a new account cannot be opened even with accidental authorization, as lenders cannot access the credit file."}, {"text": "A credit freeze prevents *new* access to her credit file, so if a new account was opened, it suggests the freeze was not properly in place or was temporarily lifted.", "isCorrect": true, "rationale": "The definition states a credit freeze means 'no new lender can access your credit report, so no new credit accounts can be opened in your name.' If a new account was opened, it implies the freeze was either not active, not placed at all bureaus, or was temporarily lifted."}, {"text": "The credit freeze expired after 6 months and needed to be renewed.", "isCorrect": false, "rationale": "The text mentions temporarily lifting a freeze when needed, but not that it expires after a specific period. It is generally a permanent measure until lifted."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
