<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 10, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary purpose of a savings account as described in the text?", "options": [{"text": "To facilitate daily transactions and bill payments.", "isCorrect": false, "rationale": "This describes the primary function of a checking account, not a savings account. The text states, 'A checking account is for spending. A savings account is for not spending.'"}, {"text": "To store money set aside for future goals and earn interest.", "isCorrect": true, "rationale": "The text explicitly defines a savings account as 'designed to hold money you do not need for immediate spending' and states it is 'a place to store money you are setting aside for a goal' while earning interest."}, {"text": "To provide easy access to funds for immediate spending needs.", "isCorrect": false, "rationale": "While funds are accessible, savings accounts are 'designed to hold money you do not need for immediate spending,' differentiating them from checking accounts used for immediate needs."}, {"text": "To primarily serve as a lending instrument for the bank to other customers without direct benefit to the account holder.", "isCorrect": false, "rationale": "The bank does use deposited money to make loans, but it directly benefits the account holder by paying interest, which is a key feature of a savings account."}]}, {"question": "A high APY (Annual Percentage Yield) on a savings account primarily indicates what?", "options": [{"text": "The frequency with which interest is compounded.", "isCorrect": false, "rationale": "APY 'takes into account how often interest is compounded' but its primary indication is not the frequency itself, but the overall return."}, {"text": "The total amount of money deposited into the account.", "isCorrect": false, "rationale": "APY is a percentage rate of return, not an absolute amount or a measure of the deposit size."}, {"text": "A higher rate of return on the deposited money over a year.", "isCorrect": true, "rationale": "The text clearly states, 'The higher the APY, the more your money earns,' indicating it represents a higher rate of return."}, {"text": "The fees associated with maintaining the account.", "isCorrect": false, "rationale": "APY relates to the interest earned on an account, not the fees charged for its maintenance."}]}, {"question": "If you deposit $3,500 into a savings account with a 3.50% APY, how much interest would you expect to earn after one year, assuming no further deposits or withdrawals and simple annual calculation as demonstrated in the text?", "options": [{"text": "$35.00", "isCorrect": false, "rationale": "This calculation would result from a 1% APY ($3,500 * 0.01 = $35.00)."}, {"text": "$122.50", "isCorrect": true, "rationale": "Using the formula from the example: Interest = Principal * APY rate. So, $3,500 * 0.035 = $122.50."}, {"text": "$3,500.00", "isCorrect": false, "rationale": "This is the original principal amount, not the interest earned."}, {"text": "$12.25", "isCorrect": false, "rationale": "This calculation would result from a 0.35% APY or a misplacement of the decimal point."}]}, {"question": "Based on the provided text, what is the primary reason online-only banks typically offer higher APYs on savings accounts compared to traditional brick-and-mortar banks?", "options": [{"text": "They are newer institutions with a need to attract more customers quickly.", "isCorrect": false, "rationale": "While this might be a factor, the text specifically attributes higher APYs to lower operational costs, not their newness or customer acquisition strategy."}, {"text": "They have lower operational costs due to not maintaining physical branches.", "isCorrect": true, "rationale": "The text states, 'Online-only banks typically offer much higher APYs than traditional banks because they have lower overhead costs (no physical branches).'"}, {"text": "They receive special government subsidies for promoting online banking.", "isCorrect": false, "rationale": "The text does not mention any government subsidies as a reason for higher APYs."}, {"text": "They invest customer deposits in higher-risk ventures.", "isCorrect": false, "rationale": "The text does not suggest that online banks engage in higher-risk investments. The reason given is related to operational efficiency."}]}, {"question": "Sarah frequently transfers money from her savings account to her checking account to cover daily expenses. According to the text, what is a likely consequence she might face from her bank?", "options": [{"text": "Her APY will automatically increase due to high account activity.", "isCorrect": false, "rationale": "Increased activity, especially frequent withdrawals, is generally penalized or restricted in savings accounts, not rewarded with a higher APY."}, {"text": "The bank may charge her a fee or convert her savings account to a checking account.", "isCorrect": true, "rationale": "The text warns, 'If you exceed the limit, the bank may charge a fee or convert your account to a checking account,' specifically noting that savings accounts are not meant for daily transactions."}, {"text": "She will earn additional bonus interest for using her savings account actively.", "isCorrect": false, "rationale": "This contradicts the purpose of a savings account and the consequences described for exceeding withdrawal limits."}, {"text": "Her access to online banking features will be temporarily suspended.", "isCorrect": false, "rationale": "The text does not mention suspension of online banking features as a consequence of exceeding withdrawal limits."}]}, {"question": "The suspension of federal Regulation D in 2020, which previously limited savings account withdrawals, means what for a consumer looking to open a new savings account today?", "options": [{"text": "All banks are now legally prohibited from imposing any withdrawal limits on savings accounts.", "isCorrect": false, "rationale": "The text explicitly states that 'individual banks may still impose their own limits' despite the federal rule's suspension."}, {"text": "There are no longer any federal or bank-imposed limits on savings account withdrawals.", "isCorrect": false, "rationale": "While the federal limit is suspended, individual banks can still impose their own limits, making this statement incorrect."}, {"text": "While the federal limit is gone, individual banks might still set their own withdrawal or transfer limits.", "isCorrect": true, "rationale": "The text clarifies: 'That federal rule was suspended in 2020, but individual banks may still impose their own limits on the number of withdrawals or transfers per month.'"}, {"text": "Savings accounts have effectively become identical to checking accounts in terms of transaction freedom.", "isCorrect": false, "rationale": "Even with the federal rule suspended, banks can still impose limits, and the design intent of savings accounts for 'saving, not for daily transactions' remains."}]}, {"question": "John is saving for a down payment on a house, which he plans to make in three years. He also needs to pay his monthly utility bills and grocery expenses. Which combination of accounts would be most appropriate for John, according to the text's guidance?", "options": [{"text": "A checking account for both his house down payment and daily expenses.", "isCorrect": false, "rationale": "A checking account is for spending, but not ideal for long-term saving due to lower (or no) interest earnings."}, {"text": "A savings account for both his house down payment and daily expenses.", "isCorrect": false, "rationale": "A savings account is good for goals like a down payment, but not for daily expenses, as frequent withdrawals can incur fees or account changes."}, {"text": "A savings account for the house down payment and a checking account for daily expenses.", "isCorrect": true, "rationale": "This aligns perfectly with the text's guidance: 'Most people have both—a checking account for spending and a savings account for storing' for goals like a house down payment."}, {"text": "A money market account for daily expenses and a savings account for the house down payment.", "isCorrect": false, "rationale": "The text does not discuss money market accounts, and it identifies checking accounts as the primary tool for daily spending."}]}, {"question": "When you deposit money into a savings account, how does the bank primarily utilize these funds, as explained in the text?", "options": [{"text": "The bank holds the money in a vault until the customer withdraws it.", "isCorrect": false, "rationale": "The text indicates the bank 'uses' the money, not merely stores it idly."}, {"text": "The bank uses the money to make loans to other customers.", "isCorrect": true, "rationale": "The text states, 'When you deposit money in a savings account, the bank uses it (to make loans to other customers) and pays you a percentage of your balance as interest.'"}, {"text": "The bank invests the money directly into the stock market.", "isCorrect": false, "rationale": "The text specifies that the bank uses the money for loans to other customers, not direct stock market investment."}, {"text": "The bank uses the money to pay its employees' salaries.", "isCorrect": false, "rationale": "While deposits contribute to a bank's overall funds, the primary use described for generating interest (and thus paying the depositor) is making loans."}]}, {"question": "Maria wants to maximize the growth of her emergency fund, which she doesn't anticipate needing to access frequently. Given the information about savings accounts, what type of account should she prioritize?", "options": [{"text": "A traditional savings account at a brick-and-mortar bank for local convenience.", "isCorrect": false, "rationale": "The text indicates that traditional brick-and-mortar banks typically offer much lower APYs (e.g., 0.5% to 1%) compared to online options."}, {"text": "A checking account with a linked savings feature to easily transfer funds.", "isCorrect": false, "rationale": "Checking accounts are for spending and generally do not offer significant interest earnings, making them unsuitable for maximizing savings growth."}, {"text": "An online high-yield savings account.", "isCorrect": true, "rationale": "The text advises, 'If you are comfortable managing your account through an app, a high-yield online savings account can earn many times the interest of a standard savings account at a local bank' due to higher APYs (e.g., 4% to 5% or higher)."}, {"text": "A savings account at a credit union, as they always offer the highest rates.", "isCorrect": false, "rationale": "While credit unions can offer competitive rates, the text specifically highlights online high-yield savings accounts as offering 'much higher APYs' due to lower overhead, not universally credit unions."}]}, {"question": "The text emphasizes that savings accounts are 'by design' not for daily transactions. Which statement best explains *why* they are not suitable for frequent daily use?", "options": [{"text": "Savings accounts typically have very high minimum balance requirements that make them impractical for daily spending.", "isCorrect": false, "rationale": "While some accounts may have minimums, the text does not identify this as the primary reason savings accounts are unsuitable for daily transactions."}, {"text": "Banks may impose fees or convert the account if withdrawal limits are frequently exceeded, and they are designed for storing money for goals, not spending.", "isCorrect": true, "rationale": "The text explicitly states that exceeding limits can lead to fees or account conversion, and that 'savings accounts are meant to be used for saving, not for daily transactions,' which clearly explains their unsuitability for frequent daily use."}, {"text": "The interest earned on daily transactions would be too complex to calculate accurately.", "isCorrect": false, "rationale": "The text does not mention complexity of interest calculation as a reason savings accounts are not for daily transactions."}, {"text": "Debit cards linked to savings accounts have limited acceptance at merchants.", "isCorrect": false, "rationale": "The text does not discuss debit card acceptance or limitations related to savings accounts."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
