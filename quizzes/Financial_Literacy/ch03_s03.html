    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 3, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what defines a 'medium-term financial goal'?", "options": [{"text": "A target with a timeline of less than one year, typically involving small dollar amounts.", "isCorrect": false, "rationale": "This describes a short-term goal, not a medium-term goal, which has a longer timeline and larger amounts."}, {"text": "A target with a timeline of one to five years, requiring sustained saving for larger dollar amounts.", "isCorrect": true, "rationale": "The text explicitly defines a medium-term financial goal as 'a target with a timeline of one to five years' and notes they 'involve larger dollar amounts than short-term goals and require sustained, consistent saving'."}, {"text": "A target with a timeline of five years or more, primarily benefiting from compound interest.", "isCorrect": false, "rationale": "This definition refers to a long-term financial goal, not a medium-term goal."}, {"text": "Any financial target that can be achieved without significant patience or commitment.", "isCorrect": false, "rationale": "Medium-term goals specifically require 'a level of patience and commitment required' beyond short-term goals, and their definition is tied to a timeline, not just commitment level."}], "id": "q01"}, {"question": "Which of the following is identified as the key difference between short-term and medium-term financial goals, beyond just the amount of money?", "options": [{"text": "The involvement of professional financial advisors.", "isCorrect": false, "rationale": "The text does not mention professional financial advisors as a key differentiator between short- and medium-term goals."}, {"text": "The level of patience and commitment required to achieve the goal.", "isCorrect": true, "rationale": "The text states: 'The key difference between short- and medium-term goals is not just the amount of money—it is the level of patience and commitment required.'"}, {"text": "The necessity of using compound interest for growth.", "isCorrect": false, "rationale": "While beneficial for longer goals, compound interest is highlighted more for long-term goals (5+ years), not specifically as the key differentiator between short and medium."}, {"text": "The ability to visualize the finish line easily.", "isCorrect": false, "rationale": "The text notes that a 3-year plan (medium-term) requires focus 'even when you cannot see the finish line yet,' implying difficulty in visualization, not ease."}], "id": "q02"}, {"question": "A high school student wants to save $7,000 for trade school tuition. Based on the examples provided, which category would this financial goal fall into?", "options": [{"text": "Short-term financial goal, as it's a specific amount.", "isCorrect": false, "rationale": "Short-term goals are typically less than one year and for smaller amounts. Trade school tuition of $7,000 is too large for a typical short-term goal, as listed in the examples."}, {"text": "Medium-term financial goal, given the typical cost and timeline for such an objective.", "isCorrect": true, "rationale": "The text lists 'Trade school or certification program tuition ($2,000–$10,000)' as a common medium-term financial goal for high school and young adult students."}, {"text": "Long-term financial goal, because it involves education.", "isCorrect": false, "rationale": "While education, trade school is specifically listed under medium-term goals due to its typical cost and timeline (likely 1-5 years), as opposed to college savings which is a long-term goal for 4-year universities."}, {"text": "Discretionary spending, not a financial goal.", "isCorrect": false, "rationale": "Saving for tuition is a clear financial goal, not discretionary spending."}], "id": "q03"}, {"question": "Which of the following scenarios best illustrates the principle that 'waiting does not make a long-term goal cheaper; it makes it harder'?", "options": [{"text": "Saving $20 per month for a vacation fund that will be used in 18 months.", "isCorrect": false, "rationale": "This scenario describes consistent saving for a medium-term goal, not the negative impact of waiting on a long-term goal."}, {"text": "Destiny immediately calculating and setting up automatic transfers for her car savings, reaching her goal on time.", "isCorrect": false, "rationale": "Destiny's actions exemplify proactive planning and execution, which is the opposite of waiting and making a goal harder."}, {"text": "Marcus delaying saving for a car, leading to a higher monthly savings requirement he couldn't meet and needing to borrow money.", "isCorrect": true, "rationale": "Marcus's story directly illustrates how waiting until later to save for a significant goal (the car) resulted in a much higher and unmanageable monthly savings burden, ultimately forcing him to borrow, making the goal harder."}, {"text": "Investing $100 per month starting at age 18 and accumulating significantly more by age 65 than if starting at age 28.", "isCorrect": false, "rationale": "While this scenario from the 'Did You Know' box demonstrates the *benefit* of starting early, it highlights the positive outcome of proactive saving rather than the difficulty caused by waiting, as explicitly stated in Marcus's outcome."}], "id": "q04"}, {"question": "According to the 'Did You Know' section, what is the primary reason why starting to invest $100 per month at age 18 leads to significantly more money by age 65 compared to starting at age 28?", "options": [{"text": "The individual starting at 18 saves more per month.", "isCorrect": false, "rationale": "The 'Did You Know' section explicitly states: 'The difference is not the amount you saved per month.' Both scenarios involve saving the same $100 per month."}, {"text": "The older individual has higher investment fees.", "isCorrect": false, "rationale": "The text does not mention investment fees as the reason for the difference in outcomes between starting at 18 vs. 28."}, {"text": "The decade of extra time allows compound interest to work more effectively.", "isCorrect": true, "rationale": "The text highlights the 'decade you waited' as the reason for the difference, implying the power of compound interest over a longer period. It also mentions that long-term goals 'often benefit significantly from compound interest over time'."}, {"text": "The stock market performs better during specific decades.", "isCorrect": false, "rationale": "The scenario assumes an 'average of 8% per year' return, not a specific market performance for certain decades."}], "id": "q05"}, {"question": "A student is practicing 'goal stacking.' They are currently prioritizing building a $500 emergency fund. What is the rationale for focusing on this short-term goal first, according to the text?", "options": [{"text": "Emergency funds are legally required before saving for other goals.", "isCorrect": false, "rationale": "The text does not state that emergency funds are legally required."}, {"text": "It helps build the habit of saving for smaller, more manageable amounts.", "isCorrect": false, "rationale": "While building a habit is true for short-term goals, the specific rationale given for prioritizing an emergency fund in goal stacking is different."}, {"text": "It protects all other financial goals from unexpected expenses.", "isCorrect": true, "rationale": "The text explicitly states: 'The emergency fund comes first because it protects everything else.'"}, {"text": "Emergency funds offer the highest rates of return on investment.", "isCorrect": false, "rationale": "Emergency funds are typically held in liquid, low-interest accounts, not for high returns."}], "id": "q06"}, {"question": "Which of the following is explicitly listed as a long-term financial goal for young people?", "options": [{"text": "A travel fund for a significant trip after graduation.", "isCorrect": false, "rationale": "This is listed as a medium-term financial goal in the text."}, {"text": "First apartment security deposit and moving costs.", "isCorrect": false, "rationale": "This is listed as a medium-term financial goal in the text."}, {"text": "College savings for a four-year university.", "isCorrect": true, "rationale": "The text explicitly lists 'College savings — four-year universities' as a long-term goal for young people."}, {"text": "Buying a used car ($3,000–$8,000).", "isCorrect": false, "rationale": "This is listed as a medium-term financial goal in the text."}], "id": "q07"}, {"question": "Why does the text recommend writing down long-term goals, even if one cannot save much immediately?", "options": [{"text": "It is a requirement for opening certain types of investment accounts.", "isCorrect": false, "rationale": "The text does not state that writing down goals is a requirement for investment accounts."}, {"text": "It makes them concrete and influences daily spending decisions over time.", "isCorrect": true, "rationale": "The 'moneytip' states: 'The act of writing them makes them real and keeps them in your mind as you make daily spending decisions. A written 10-year goal will quietly influence how you spend your money for the next decade.'"}, {"text": "Writing them down automatically enrolls you in financial literacy programs.", "isCorrect": false, "rationale": "The text does not mention any automatic enrollment in programs due to writing down goals."}, {"text": "It serves as a legal document in case of financial disputes.", "isCorrect": false, "rationale": "The text does not imply that written goals serve as legal documents for disputes."}], "id": "q08"}, {"question": "A student plans to save $30,000 for a down payment on a home. What type of financial goal is this, and what is its minimum expected timeline?", "options": [{"text": "Medium-term goal; 1-5 years.", "isCorrect": false, "rationale": "While a down payment is mentioned as a goal, the amount ($30,000) and the nature of a home down payment typically place it in the long-term category, exceeding the 1-5 year medium-term range for such a significant sum."}, {"text": "Short-term goal; less than 1 year.", "isCorrect": false, "rationale": "A $30,000 down payment is far too large and requires too long a timeline to be considered a short-term goal."}, {"text": "Long-term goal; 5 years or more.", "isCorrect": true, "rationale": "The text lists 'Buying a home — down payments typically run $15,000–$50,000 or more' under 'Long-term goals for young people,' which are defined as having a timeline of 'five years or more'."}, {"text": "Emergency fund; flexible timeline.", "isCorrect": false, "rationale": "An emergency fund is a specific type of short-term goal, not a down payment for a home."}], "id": "q09"}, {"question": "What is the primary implication of the statement: 'The scale changes; the method does not' when comparing short-term, medium-term, and long-term financial goals?", "options": [{"text": "Financial goals become less important as they get longer-term.", "isCorrect": false, "rationale": "The text emphasizes the increasing importance and impact of long-term goals, not their diminished significance."}, {"text": "The fundamental principles of saving and planning remain consistent regardless of the goal's size or duration.", "isCorrect": true, "rationale": "This statement means that the core skills (like consistent saving and planning) used for a small short-term goal are the same ones applied to much larger, longer-term goals, even though the amounts and timelines differ."}, {"text": "Only short-term goals require a specific method for saving.", "isCorrect": false, "rationale": "The text explicitly discusses methods and plans for medium- and long-term goals, indicating all goals require a method."}, {"text": "Long-term goals do not require any specific saving strategies.", "isCorrect": false, "rationale": "The text strongly advocates for immediate planning and consistent saving for long-term goals, showing that strategies are indeed required."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
