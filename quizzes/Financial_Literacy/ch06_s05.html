        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">

        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 6, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "An employer is required to provide an employee with Form W-2 by January 31 of the following year. What is the primary purpose of this form for the employee?", "options": [{"text": "To report total wages earned and all taxes withheld during the prior calendar year, for use in completing their tax return.", "isCorrect": true, "rationale": "Form W-2's definition clearly states it reports total wages and taxes withheld, and employees use it to complete their tax return. January 31 is the correct deadline."}, {"text": "To calculate the employee's adjusted gross income (AGI) and determine their tax refund.", "isCorrect": false, "rationale": "The W-2 reports raw wages and withholding, not AGI or the final refund amount. These calculations are done on Form 1040."}, {"text": "To inform the IRS of the employee's chosen filing status for the year.", "isCorrect": false, "rationale": "Filing status is determined by the individual taxpayer on Form 1040, not reported by the employer on Form W-2."}, {"text": "To allow the employee to adjust their tax withholding for the current year.", "isCorrect": false, "rationale": "Adjusting tax withholding is done using Form W-4, not Form W-2."}], "id": "q01"}, {"question": "Sarah works two part-time jobs during the year. How will she handle her W-2 forms when preparing her tax return?", "options": [{"text": "She only needs to use the W-2 from the job where she earned more income.", "isCorrect": false, "rationale": "The text states, 'If you work multiple jobs in a year, you receive a separate W-2 from each employer. You combine the wages from all W-2s on your tax return.'"}, {"text": "She will receive a separate W-2 from each employer and must combine the wages from all W-2s on her tax return.", "isCorrect": true, "rationale": "The text explicitly states that if you work multiple jobs, you receive a W-2 from each and combine all wages on your tax return."}, {"text": "She can choose which W-2 to use, depending on which one shows less tax withheld.", "isCorrect": false, "rationale": "All income must be reported. Choosing which W-2 to use is not an option."}, {"text": "Her employers will automatically combine the information and send her a single W-2.", "isCorrect": false, "rationale": "Each employer provides a separate W-2; they do not combine them for the employee."}], "id": "q02"}, {"question": "According to the section, after reporting all income sources on Form 1040, what is the immediate next step in the tax calculation process?", "options": [{"text": "Apply tax brackets to calculate the tax.", "isCorrect": false, "rationale": "Applying tax brackets happens later in the process, after calculating taxable income."}, {"text": "Subtract adjustments to arrive at Adjusted Gross Income (AGI).", "isCorrect": true, "rationale": "The enumerated list for Form 1040 steps clearly shows 'Report all income sources' followed by 'Subtract adjustments to arrive at AGI.'"}, {"text": "Take the standard (or itemized) deduction.", "isCorrect": false, "rationale": "Deductions are taken after AGI to arrive at taxable income, not immediately after reporting income sources."}, {"text": "Subtract any tax credits you qualify for.", "isCorrect": false, "rationale": "Tax credits are subtracted near the end of the process, after the tax has been calculated using brackets."}], "id": "q03"}, {"question": "Maria is an unmarried individual who pays more than half the cost of maintaining a home for her dependent child. Which filing status is she most likely eligible for, and why is it often advantageous?", "options": [{"text": "Single; it is the most common status for independent individuals.", "isCorrect": false, "rationale": "While Single is common, Maria's situation qualifies her for Head of Household, which offers a larger standard deduction."}, {"text": "Married Filing Jointly; it is usually the most advantageous for families.", "isCorrect": false, "rationale": "Maria is unmarried, so Married Filing Jointly is not an option for her."}, {"text": "Head of Household; it provides a larger standard deduction than the Single status.", "isCorrect": true, "rationale": "The definition of Head of Household matches Maria's situation (unmarried, pays more than half the cost of a home for a qualifying person), and the text states it 'receives a larger standard deduction than Single.'"}, {"text": "Married Filing Separately; it allows for individual tax calculations.", "isCorrect": false, "rationale": "Maria is unmarried, so this status is not applicable. Also, it is rarely beneficial."}], "id": "q04"}, {"question": "David is a college student who worked part-time and earned $7,500 in gross income, which is below the filing threshold for his Single status. However, his W-2 shows that his employer withheld $250 in federal income tax. What is the recommended course of action for David?", "options": [{"text": "He is not required to file, so he should simply keep his W-2 for his records.", "isCorrect": false, "rationale": "The warning box explicitly states that even if income is below the threshold, one should file if federal income tax was withheld to get a refund."}, {"text": "He should file a federal tax return to receive a refund of the $250 that was withheld.", "isCorrect": true, "rationale": "The text advises, 'Even if your income is below these thresholds, you should file if: Federal income tax was withheld from your paychecks (you can get it back as a refund).' The warning box reiterates, 'Always file if taxes were withheld.'"}, {"text": "He should contact his employer to request the withheld amount directly from them.", "isCorrect": false, "rationale": "Once tax is withheld and sent to the IRS, the employer cannot refund it. Only the IRS can issue a refund after a tax return is filed."}, {"text": "He should wait to see if the IRS automatically sends him a refund, as his income was low.", "isCorrect": false, "rationale": "The IRS does not automatically issue refunds without a filed tax return determining the final tax liability and refund amount."}], "id": "q05"}, {"question": "At the end of the tax year, Maria discovers that her tax withholding was significantly less than her actual tax owed. What is the consequence of this situation?", "options": [{"text": "She will receive a tax refund from the government.", "isCorrect": false, "rationale": "A refund occurs when withholding is *greater* than tax owed, not less."}, {"text": "She will owe additional tax to the IRS and must send a payment by the filing deadline.", "isCorrect": true, "rationale": "The text states, 'If withholding < tax owed: You owe additional tax and must send a payment to the IRS by the filing deadline.'"}, {"text": "The IRS will automatically adjust her withholding for the next year to compensate.", "isCorrect": false, "rationale": "The IRS does not automatically adjust withholding. An individual must submit a new Form W-4 to their employer to adjust withholding."}, {"text": "Her employer will be penalized for incorrect withholding.", "isCorrect": false, "rationale": "Withholding is based on the employee's Form W-4. The employer is generally not penalized unless they failed to follow the W-4 instructions."}], "id": "q06"}, {"question": "An ideal tax withholding strategy, as suggested by the text, aims to achieve what outcome?", "options": [{"text": "To receive the largest possible tax refund each year.", "isCorrect": false, "rationale": "The warning box notes that a large refund means you gave the government an interest-free loan, implying it's not ideal."}, {"text": "To owe a small amount of additional tax at the end of the year.", "isCorrect": false, "rationale": "While better than a large bill, the ideal is to closely match tax owed."}, {"text": "To have withholding closely match actual tax, resulting in neither a large refund nor a large bill.", "isCorrect": true, "rationale": "The warning box states, 'Ideally, you want your withholding to closely match your actual tax—neither a large refund nor a large bill.'"}, {"text": "To minimize the amount of tax withheld from paychecks throughout the year.", "isCorrect": false, "rationale": "Minimizing withholding can lead to a large tax bill at year-end, which is not ideal."}], "id": "q07"}, {"question": "When starting two part-time jobs simultaneously, what important action should an employee take regarding their Form W-4, according to the 'moneytip'?", "options": [{"text": "Submit a W-4 to only one employer to avoid over-withholding.", "isCorrect": false, "rationale": "This would likely lead to under-withholding, as the other employer would not withhold federal tax."}, {"text": "Fill out both W-4 forms with default settings, as employers automatically coordinate.", "isCorrect": false, "rationale": "The moneytip explicitly warns that 'each assumes that job is your only income' if default settings are used, leading to under-withholding."}, {"text": "Coordinate withholding between both jobs using the W-4 instructions or an IRS estimator.", "isCorrect": true, "rationale": "The moneytip advises, 'If you have two part-time jobs simultaneously, you may need to coordinate withholding—otherwise each employer withholds too little... You can find W-4 instructions and a withholding estimator at IRS.gov.'"}, {"text": "Claim the maximum number of allowances on both W-4s to increase take-home pay.", "isCorrect": false, "rationale": "This would result in significant under-withholding and potentially a large tax bill."}], "id": "q08"}, {"question": "Why is electronic filing (e-filing) the 'overwhelming norm' and 'always the better choice,' according to the 'didyouknow' section?", "options": [{"text": "It guarantees a larger tax refund than paper filing.", "isCorrect": false, "rationale": "E-filing does not guarantee a larger refund; it only speeds up the processing of whatever refund is due."}, {"text": "It is the only method that allows for claiming tax credits.", "isCorrect": false, "rationale": "Tax credits can be claimed regardless of the filing method."}, {"text": "It is faster, reduces math errors, and typically produces a refund in two weeks or less.", "isCorrect": true, "rationale": "The 'didyouknow' box states e-filing 'is faster, reduces math errors, and typically produces a refund in two weeks or less.'"}, {"text": "It requires less documentation to be submitted to the IRS.", "isCorrect": false, "rationale": "The amount of documentation required is generally the same, though some might be submitted electronically rather than physically."}], "id": "q09"}, {"question": "Sarah receives an email claiming to be from the IRS, asking her to click a link to verify her bank account information immediately or face penalties. What should Sarah do based on the 'scamalert' information?", "options": [{"text": "Click the link and provide the requested information to avoid penalties.", "isCorrect": false, "rationale": "The scamalert explicitly warns against clicking links or providing personal information via email, as the IRS will never do this."}, {"text": "Call the IRS immediately using the phone number in the email to confirm the request.", "isCorrect": false, "rationale": "Phone numbers in scam emails should not be trusted. The IRS communicates primarily by mail and does not demand immediate payment or sensitive info via email."}, {"text": "Delete the email without clicking any links or providing information, and report it to the Federal Trade Commission.", "isCorrect": true, "rationale": "The scamalert advises, 'Do not click links. Do not provide any personal information.' It also states, 'ReportFraud.ftc.gov' for suspicious contacts."}, {"text": "Respond to the email asking for official documentation to be sent via mail.", "isCorrect": false, "rationale": "Engaging with a potential scammer is not advised. The IRS communicates primarily by mail, but such an email is a red flag in itself."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
