    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 4, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following is the most significant financial difference between a W-2 employee and a 1099 independent contractor, as described in the text?", "options": [{"text": "W-2 employees are paid a salary, while 1099 contractors are always paid an hourly wage.", "isCorrect": false, "rationale": "The text states that both W-2 employees and 1099 contractors can be paid in various ways (hourly, salary, or per project), so this is not the most significant defining difference."}, {"text": "The employer for a W-2 employee withholds income and FICA taxes from paychecks, whereas a 1099 contractor is responsible for paying all their own taxes.", "isCorrect": true, "rationale": "The text explicitly states that a W-2 employer withholds taxes and pays half of FICA, while a 1099 contractor receives full payment with no deductions and is responsible for all their own taxes, including self-employment tax (both employee and employer FICA portions) plus income taxes. This is a major financial distinction."}, {"text": "1099 contractors always earn more money than W-2 employees because they receive their full payment upfront.", "isCorrect": false, "rationale": "While 1099 contractors receive full payment upfront without deductions, the text warns about the '1099 Tax Trap' where they must set aside 25-30% for taxes, implying that their net income after taxes might not necessarily be higher, and they don't receive employer-provided benefits, which can be thousands of dollars."}, {"text": "W-2 employees are subject to overtime rules, while 1099 contractors are not.", "isCorrect": false, "rationale": "Overtime rules typically apply to hourly employees, not specifically W-2 vs. 1099 status. A 1099 contractor typically works on projects and hours are not generally regulated by overtime laws. Salaried W-2 employees are also usually exempt from overtime, so this isn't the primary distinction between W-2 and 1099 status."}]}, {"question": "A friend is comparing two job offers: Job A offers a $48,000 salary with no benefits, and Job B offers a $42,000 salary with health insurance worth $6,000/year and a 401(k) match worth $1,500/year. Based on the textbook's advice, which job should your friend consider to be more financially advantageous overall?", "options": [{"text": "Job A, because the higher base salary always means more take-home pay.", "isCorrect": false, "rationale": "The text explicitly advises against looking only at the salary number and to 'add up the value of the benefits,' stating that benefits can be worth thousands of dollars per year and significantly impact overall compensation."}, {"text": "Job B, because the total compensation, including benefits, is higher.", "isCorrect": true, "rationale": "Job B's total compensation is $42,000 (salary) + $6,000 (health insurance) + $1,500 (401(k) match) = $49,500. Job A's total compensation is $48,000 (salary) + $0 (benefits) = $48,000. Therefore, Job B offers more overall compensation."}, {"text": "Job A, because benefits are unreliable and can be cut at any time by the employer.", "isCorrect": false, "rationale": "While benefits can change, the text emphasizes their significant value in current compensation and does not suggest they are unreliable to the point of being disregarded when comparing offers."}, {"text": "Both jobs are equally advantageous since the difference in salary is largely offset by the value of the benefits.", "isCorrect": false, "rationale": "Calculating the total compensation shows a clear financial advantage for Job B ($49,500) over Job A ($48,000), making them not equally advantageous."}]}, {"question": "Sarah works as a freelance web developer, taking on projects for several different clients. For each project she completes, she receives the full agreed-upon payment directly. Based on the information provided, what crucial action must Sarah take to avoid a 'tax trap'?", "options": [{"text": "Ensure her employers send her a W-2 form at the end of the year.", "isCorrect": false, "rationale": "As a freelance web developer receiving full payments, Sarah is operating as a 1099 independent contractor. Her clients (not 'employers' in the W-2 sense) will send her 1099-NEC forms, not W-2 forms. A W-2 indicates employer withholding, which is not happening here."}, {"text": "Set aside 25–30% of every payment she receives for taxes.", "isCorrect": true, "rationale": "The '1099 Tax Trap' warning explicitly states that 1099 contractors are responsible for all their own taxes, including self-employment tax, federal, and state income taxes, and advises to 'set aside 25–30% of every payment you receive for taxes' to avoid a large bill."}, {"text": "Only accept jobs that offer health insurance and retirement plan contributions.", "isCorrect": false, "rationale": "While benefits are important, this action does not directly address the 'tax trap' of being a 1099 contractor responsible for withholding and paying all her own taxes. Benefits are generally associated with W-2 employment, not 1099 independent contracting."}, {"text": "Work more than 35 hours per week to qualify for full-time benefits.", "isCorrect": false, "rationale": "This relates to full-time employment status, typically for W-2 employees, and earning benefits. It does not address the fundamental tax responsibilities of a 1099 independent contractor."}]}, {"question": "Maria works 25 hours a week as a barista at a local coffee shop. The coffee shop provides her with an hourly wage, but no health insurance or paid time off. What type of employment does Maria most likely have?", "options": [{"text": "Full-time W-2 employment with extensive benefits.", "isCorrect": false, "rationale": "Maria works 25 hours, which is less than the typical 35+ hours for full-time. She also receives no benefits, which are more common for full-time W-2 employees. Thus, this option is incorrect."}, {"text": "Part-time W-2 employment with limited or no benefits.", "isCorrect": true, "rationale": "Maria works fewer than 35 hours per week, which aligns with part-time employment. As a barista at a coffee shop, she is likely a W-2 employee (the employer controls her work and pays her an hourly wage). The text states that benefits are less common for part-time workers, matching her situation."}, {"text": "1099 independent contractor working on a project basis.", "isCorrect": false, "rationale": "A barista job involves the employer controlling 'when, where, and how the work is performed' and is a traditional job type mentioned as W-2. An independent contractor performs specific tasks or projects and receives full payment without tax withholding, which is not described here."}, {"text": "Seasonal employment during peak coffee season.", "isCorrect": false, "rationale": "While a coffee shop might have peak seasons, the description doesn't indicate Maria's job is temporary or only for a specific time of year; it describes her regular working hours and conditions, not the duration of her employment."}]}, {"question": "A student accepts a job offer paying $22.50 per hour, working 30 hours per week. What is her estimated annual income from this job?", "options": [{"text": "$35,100", "isCorrect": true, "rationale": "Using the formula: Annual Income = Hourly Rate × Hours per Week × 52. So, $22.50/hour × 30 hours/week × 52 weeks/year = $35,100."}, {"text": "$46,800", "isCorrect": false, "rationale": "This calculation assumes 40 hours per week ($22.50 * 40 * 52), not the stated 30 hours per week."}, {"text": "$22,500", "isCorrect": false, "rationale": "This number is simply the hourly rate multiplied by 1000, or a misunderstanding of annual calculation."}, {"text": "$675", "isCorrect": false, "rationale": "This is only the weekly income ($22.50 * 30), not the annual income."}]}, {"question": "A company needs extra administrative support for six months to cover an employee on maternity leave. They hire an individual through a staffing agency. What type of employment arrangement is this most likely, and what is a key characteristic of such an arrangement regarding employment status?", "options": [{"text": "Full-time seasonal employment, with the employee being a W-2 of the company.", "isCorrect": false, "rationale": "This is not seasonal employment, which is tied to recurring times of the year. While it could be full-time, the key characteristic of temporary work through an agency is often being a W-2 of the agency, not the hiring company."}, {"text": "Temporary employment, where the worker may be a W-2 employee of the staffing agency.", "isCorrect": true, "rationale": "The scenario describes 'short-term work to fill a specific need,' which is the definition of temporary employment. The text also states that 'Temporary workers may be W-2 employees of the agency, not of the company where they work,' aligning perfectly with this option."}, {"text": "1099 independent contracting, with the worker managing all their own benefits.", "isCorrect": false, "rationale": "While independent contractors manage their own benefits, hiring through a staffing agency typically implies an employer-employee relationship with the agency, making the worker a W-2 employee of the agency, not a 1099 contractor for the company needing support."}, {"text": "Part-time employment, ensuring the worker does not receive any benefits.", "isCorrect": false, "rationale": "The duration (six months) points to temporary, not just part-time (which refers to hours per week). Also, temporary workers through agencies can sometimes receive benefits from the agency, even if limited."}]}, {"question": "Which scenario best illustrates the concept of 'seasonal employment' as defined in the textbook?", "options": [{"text": "A software engineer working 40 hours per week on a year-long project.", "isCorrect": false, "rationale": "This describes full-time, likely temporary (for the project duration) or regular employment, not seasonal. Seasonal employment is tied to specific times of the year."}, {"text": "A college student hired to sell Christmas trees from late November through December.", "isCorrect": true, "rationale": "This perfectly matches the definition of seasonal employment: 'lasts only during a particular time of year — for example, retail jobs during the winter holidays.'"}, {"text": "A freelance photographer who takes on various gigs throughout the year, whenever clients request her services.", "isCorrect": false, "rationale": "This describes a 1099 independent contractor or freelancer, not seasonal employment, as the work isn't confined to a specific, recurring 'season'."}, {"text": "An office assistant working 20 hours per week year-round at a doctor's office.", "isCorrect": false, "rationale": "This describes part-time employment, as it is fewer than 35 hours per week and occurs year-round, not for a specific season."}]}, {"question": "Jordan earns $18.00/hour working 40 hours/week with no benefits. Alex earns a $36,000/year salary and receives health insurance worth $5,000/year. Based on the textbook's 'full picture' advice, what is the best comparison of their total compensation?", "options": [{"text": "Jordan's annual income is $37,440, so Jordan earns more than Alex.", "isCorrect": false, "rationale": "Jordan's annual income is $18.00 * 40 * 52 = $37,440. However, this only compares salaries, not the 'full picture' including benefits."}, {"text": "Alex's total compensation is $41,000, which is significantly more than Jordan's total compensation.", "isCorrect": true, "rationale": "Jordan's annual income (salary only) is $18.00 * 40 * 52 = $37,440. Alex's total compensation is $36,000 (salary) + $5,000 (benefits) = $41,000. Therefore, Alex's total compensation is indeed significantly more than Jordan's, highlighting the importance of benefits."}, {"text": "Jordan's job is better because hourly wages typically offer overtime pay, unlike salaried positions.", "isCorrect": false, "rationale": "While hourly jobs can offer overtime, the question asks for the 'best comparison of their total compensation' based on the 'full picture' advice, which emphasizes including benefits, not just potential overtime."}, {"text": "Both jobs offer comparable pay, as their salaries are relatively close.", "isCorrect": false, "rationale": "Jordan's salary is $37,440 and Alex's is $36,000, which are close. However, when Alex's $5,000 in benefits are added, the total compensation becomes $41,000, making them not comparable in the 'full picture' sense."}]}, {"question": "A 1099 independent contractor is solely responsible for paying 'self-employment tax.' What exactly does this tax cover, according to the text?", "options": [{"text": "Only the federal income tax portion of their earnings.", "isCorrect": false, "rationale": "The text states that self-employment tax is 'plus federal and state income taxes,' meaning it's in addition to, not inclusive of, income tax, and it covers more than just federal income tax."}, {"text": "Only the state income tax portion of their earnings.", "isCorrect": false, "rationale": "Similar to the federal income tax option, the self-employment tax is separate from state income taxes and covers different components."}, {"text": "Both the employee and employer portions of Social Security and Medicare taxes (FICA).", "isCorrect": true, "rationale": "The text explicitly defines self-employment tax as '15.3% (which covers both the employee and employer portions of Social Security and Medicare),' often referred to as FICA."}, {"text": "Only the employer's share of Social Security and Medicare taxes.", "isCorrect": false, "rationale": "The self-employment tax covers *both* the employee and employer portions of Social Security and Medicare, not just the employer's share."}]}, {"question": "Mark works as a salesperson in a furniture store. His pay structure includes a base salary of $2,000 per month, plus an additional 5% of the total value of furniture he sells. This additional 5% is an example of what type of compensation?", "options": [{"text": "An hourly wage, calculated based on the number of hours he works.", "isCorrect": false, "rationale": "An hourly wage is based on hours worked, whereas this 5% is based on sales value, not time spent working."}, {"text": "A fixed annual salary, divided into equal paychecks throughout the year.", "isCorrect": false, "rationale": "He has a base salary, but the 5% is additional and variable based on sales, not a fixed part of his annual salary."}, {"text": "Commission, paid based on the value of sales made.", "isCorrect": true, "rationale": "The text defines commission as 'pay based on the value of sales made' and notes that 'Some jobs pay commission only; others pay a base salary plus commission,' which perfectly describes Mark's situation."}, {"text": "A benefit, such as a retirement plan contribution or health insurance.", "isCorrect": false, "rationale": "Benefits are non-wage forms of compensation provided by an employer, such as health insurance or paid time off. This 5% is a direct part of his variable pay, not a non-wage benefit."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
