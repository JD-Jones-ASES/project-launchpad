<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 15, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "In the context of a loan, what does the \"principal\" refer to?", "options": [{"text": "The total amount of money repaid to the lender, including interest.", "isCorrect": false, "rationale": "This describes the total cost of the loan, not solely the principal."}, {"text": "The original amount of money borrowed.", "isCorrect": true, "rationale": "The text explicitly defines principal as 'the original amount of money you borrow'."}, {"text": "The percentage charged for borrowing money.", "isCorrect": false, "rationale": "This describes the interest rate."}, {"text": "The asset pledged as security for the loan.", "isCorrect": false, "rationale": "This describes collateral."}]}, {"question": "If you have an outstanding loan balance of $15,000 with an Annual Percentage Rate (APR) of 7%, how much interest would typically be charged over one year on that balance?", "options": [{"text": "$105.00", "isCorrect": false, "rationale": "This amount would correspond to 0.7% interest, not 7%."}, {"text": "$1,050.00", "isCorrect": true, "rationale": "The interest rate is stated as an annual percentage rate (APR). 7% of $15,000 is $1,050."}, {"text": "$700.00", "isCorrect": false, "rationale": "This amount is approximately 4.67% of the principal, not 7%."}, {"text": "$15,000.00", "isCorrect": false, "rationale": "This is the principal amount itself, not the interest charged over a year."}]}, {"question": "A friend tells you they just got a 60-month auto loan. This '60-month' period specifically refers to which core component of their loan agreement?", "options": [{"text": "The interest rate", "isCorrect": false, "rationale": "The interest rate is expressed as a percentage, not a duration in months."}, {"text": "The collateral", "isCorrect": false, "rationale": "Collateral is an asset pledged as security, not a length of time."}, {"text": "The loan term", "isCorrect": true, "rationale": "The text defines the loan term as 'the length of time you have to repay the loan, usually stated in months or years'."}, {"text": "The principal", "isCorrect": false, "rationale": "The principal is the original amount borrowed, not the duration of the loan."}]}, {"question": "A lender requires collateral for a loan. What is the primary reason for this requirement?", "options": [{"text": "To ensure the borrower receives a larger loan amount.", "isCorrect": false, "rationale": "Collateral does not directly increase the loan amount; it primarily reduces the lender's risk."}, {"text": "To provide a safety net for the lender in case the borrower defaults on payments.", "isCorrect": true, "rationale": "The text states, 'If you stop making payments, the lender can seize the collateral to recover their money,' which serves as a safety net."}, {"text": "To automatically lower the borrower's monthly payment amount.", "isCorrect": false, "rationale": "While secured loans often have lower interest rates leading to lower payments, the primary reason for collateral is risk mitigation, not directly lowering payments."}, {"text": "To allow the borrower to pay off the loan earlier without penalty.", "isCorrect": false, "rationale": "Collateral is unrelated to prepayment penalties or options for early repayment."}]}, {"question": "Why do unsecured loans typically carry higher interest rates compared to secured loans?", "options": [{"text": "Unsecured loans usually have longer repayment terms.", "isCorrect": false, "rationale": "Loan term can vary for both types of loans and is not the primary reason for the interest rate difference."}, {"text": "Lenders take on greater risk with unsecured loans because there is no collateral to seize upon default.", "isCorrect": true, "rationale": "The text explains, 'Because the risk is higher for the lender, unsecured loans typically carry higher interest rates.'"}, {"text": "Borrowers often have better credit histories for unsecured loans.", "isCorrect": false, "rationale": "Lenders rely *more* heavily on credit history for unsecured loans due to the lack of collateral, implying that the risk is higher for the lender."}, {"text": "The principal amounts are generally much larger for unsecured loans.", "isCorrect": false, "rationale": "Loan amounts vary widely for both secured and unsecured loans; this is not the reason for higher interest rates."}]}, {"question": "Sarah wants to buy her first home and plans to take out a loan, using the house itself as security. Based on the text, what type of loan is she most likely getting, and what are its standard terms?", "options": [{"text": "An auto loan, with terms of 36–72 months.", "isCorrect": false, "rationale": "Auto loans are for vehicles, not real estate, and have different typical terms."}, {"text": "A personal loan, usually unsecured for 1–5 years.", "isCorrect": false, "rationale": "Personal loans are typically unsecured and are general-purpose, not specifically for real estate purchase."}, {"text": "A mortgage, with standard terms of 15 or 30 years.", "isCorrect": true, "rationale": "The text defines a mortgage as 'A loan to purchase real estate' with the home as collateral and 'Terms of 15 or 30 years are standard'."}, {"text": "A student loan, which has special protections and repayment options.", "isCorrect": false, "rationale": "Student loans are for education expenses, not real estate purchases."}]}, {"question": "You have an amortized loan with equal monthly payments. As you continue to make these payments over the life of the loan, what happens to the allocation of money between interest and principal within each payment?", "options": [{"text": "The portion of each payment that goes towards interest decreases, while the portion going towards principal increases.", "isCorrect": true, "rationale": "The text states that in an amortized loan, 'the split between interest and principal shifts over time—early payments are mostly interest; later payments are mostly principal'."}, {"text": "The portion of each payment that goes towards principal decreases, while the portion going towards interest increases.", "isCorrect": false, "rationale": "This describes the opposite of how amortized loans typically function."}, {"text": "The split between interest and principal remains constant throughout the loan term.", "isCorrect": false, "rationale": "The text explicitly mentions a 'shifting split', indicating that the allocation does not remain constant."}, {"text": "Both the interest and principal portions of each payment decrease over time.", "isCorrect": false, "rationale": "While the total interest paid decreases over time, the interest *portion* of each *equal* payment decreases as the principal portion increases, not both decreasing."}]}, {"question": "Based on the provided text, which statement accurately describes a typical 'personal loan'?", "options": [{"text": "It is always used to purchase real estate.", "isCorrect": false, "rationale": "Personal loans are 'general-purpose' loans, whereas mortgages are specifically for real estate."}, {"text": "It typically requires the borrower to pledge an asset as collateral.", "isCorrect": false, "rationale": "The text states personal loans are 'usually unsecured'."}, {"text": "It is generally unsecured and carries higher interest rates due to increased lender risk.", "isCorrect": true, "rationale": "The text describes personal loans as 'usually unsecured, for 1–5 years. Interest rates are higher because there is no collateral'."}, {"text": "It primarily offers special protections and repayment options for educational expenses.", "isCorrect": false, "rationale": "This description applies to student loans, not personal loans."}]}, {"question": "A student is about to take out their first car loan. Following the advice in the 'moneytip' section, what would be the most financially prudent action for them to take before signing any agreement?", "options": [{"text": "Accept the first loan offer provided by the car dealership.", "isCorrect": false, "rationale": "The moneytip explicitly advises 'Before accepting the first loan offer you receive... compare rates'."}, {"text": "Focus solely on securing the longest possible loan term to lower monthly payments.", "isCorrect": false, "rationale": "While a longer term can lower payments, the tip emphasizes comparing interest rates to save hundreds of dollars over the life of a loan, not just payment size."}, {"text": "Compare loan offers and interest rates from at least two or three different sources (e.g., banks, credit unions, online lenders).", "isCorrect": true, "rationale": "The moneytip states, 'Before accepting the first loan offer... compare rates from at least two or three sources (your bank, a credit union, and an online lender).'"}, {"text": "Ensure they have a large down payment, as this is the only way to save money.", "isCorrect": false, "rationale": "While a down payment can be beneficial, the tip's specific advice for saving money relates to comparing interest rates."}]}, {"question": "According to the 'Core Components of Any Loan' section, which of the following lists all four fundamental elements that comprise every loan agreement?", "options": [{"text": "Secured, Unsecured, Amortized, Personal.", "isCorrect": false, "rationale": "These are categories or types of loans, not the universal core components."}, {"text": "Principal, Interest Rate, Loan Term, Collateral.", "isCorrect": true, "rationale": "The text explicitly lists these four as 'The Core Components of Any Loan' and provides a definition for each."}, {"text": "Monthly Payment, Total Debt, Credit Score, Down Payment.", "isCorrect": false, "rationale": "While these are important aspects related to loans, they are not identified as the four core components in the text."}, {"text": "Mortgage, Auto Loan, Student Loan, Personal Loan.", "isCorrect": false, "rationale": "These are specific types of loans, not the fundamental components present in every loan."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
