    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 24, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the primary benefit of understanding advertising tactics?", "options": [{"text": "To become an advertising professional and create effective campaigns.", "isCorrect": false, "rationale": "While understanding tactics might aid an advertising career, the text's primary stated benefit for the consumer is about making personal buying choices, not professional development."}, {"text": "To increase your overall purchasing power by finding better deals.", "isCorrect": false, "rationale": "Understanding tactics can lead to smarter spending and potential savings, but the core benefit described is recognizing influence and exercising choice, not strictly increasing purchasing power."}, {"text": "To recognize manipulative strategies and make deliberate, informed choices.", "isCorrect": true, "rationale": "The text states, 'Understanding the tactics gives you the power to recognize them and make deliberate choices,' directly aligning with this option."}, {"text": "To report misleading advertisements to consumer protection agencies.", "isCorrect": false, "rationale": "While recognizing misleading ads is important, the text focuses on empowering personal decision-making rather than primarily reporting activities."}]}, {"question": "Which advertising phrase best exemplifies the psychological tactic of Scarcity?", "options": [{"text": "\"Join millions of satisfied customers today!\"", "isCorrect": false, "rationale": "This phrase illustrates 'Social Proof,' suggesting that many others have chosen the product, making it desirable."}, {"text": "\"Our product is recommended by leading experts in the field.\"", "isCorrect": false, "rationale": "This statement uses the 'Authority' tactic, leveraging perceived expertise to build trust."}, {"text": "\"Limited-time offer: only 5 left at this special price!\"", "isCorrect": true, "rationale": "This phrase directly uses the 'Scarcity' tactic by creating an impression of limited supply and urgency, as described in the text: 'Only 3 left in stock!' or 'Sale ends tonight!'."}, {"text": "\"Experience the freedom you deserve with our new car.\"", "isCorrect": false, "rationale": "This ad appeals to 'Lifestyle Aspiration,' selling an identity or experience rather than just the product itself."}]}, {"question": "A furniture store advertises a sofa originally priced at $1,500, now on sale for $699. A savvy shopper knows that the $1,500 price was never truly the regular selling price. Which advertising tactic is the store most actively employing?", "options": [{"text": "Reciprocity", "isCorrect": false, "rationale": "Reciprocity involves giving something free to create an obligation, which is not happening in this scenario."}, {"text": "Anchoring", "isCorrect": true, "rationale": "The initial high price of $1,500 serves as an 'anchor,' making the sale price of $699 appear to be an exceptional bargain, even if the original price was inflated, as explained in the text."}, {"text": "FOMO (Fear of Missing Out)", "isCorrect": false, "rationale": "FOMO focuses on showing happy people enjoying a product, implying the viewer is missing an experience, which is not the primary tactic here."}, {"text": "Emotional Appeal", "isCorrect": false, "rationale": "Emotional appeal focuses on eliciting strong feelings like laughter or patriotism, which is not the main strategy for a simple price comparison."}]}, {"question": "A social media ad shows a group of diverse, happy friends laughing and hiking in a beautiful mountain landscape, all wearing a new brand of athletic shoes. The implied message is that these shoes will unlock similar adventures and camaraderie for the wearer. What psychological advertising tactic is this ad primarily using?", "options": [{"text": "Social Proof", "isCorrect": false, "rationale": "While it shows people, the focus isn't on 'many people use this product,' but rather on the aspirational experience and identity linked to the product."}, {"text": "Authority", "isCorrect": false, "rationale": "There is no expert or implied expert endorsement in this scenario."}, {"text": "Lifestyle Aspiration", "isCorrect": true, "rationale": "The ad sells an identity and experience (adventure, friendship, happiness) rather than just the product's features, making the shoes a symbol of who the consumer wants to be, as described in the text."}, {"text": "Scarcity", "isCorrect": false, "rationale": "There is no indication of limited supply or urgency in this advertising description."}]}, {"question": "In the context of \"The Algorithmic Ad,\" what is the fundamental exchange for users accessing \"free platforms\"?", "options": [{"text": "Users exchange their time for access to premium content and exclusive features.", "isCorrect": false, "rationale": "While users do spend time on platforms, the text emphasizes a different core exchange, which is data."}, {"text": "Users provide their personal data and attention, which is then sold to advertisers, in exchange for platform access.", "isCorrect": true, "rationale": "The text explicitly states: 'Your data is the product. You access free platforms in exchange for your attention and information, which is then sold to advertisers.'"}, {"text": "Users agree to watch a predetermined number of advertisements to avoid subscription fees.", "isCorrect": false, "rationale": "Watching ads is part of the experience, but the fundamental exchange highlighted by the text involves personal data and attention, not just a fixed ad quota."}, {"text": "Users become part-owners of the platform by contributing their usage data.", "isCorrect": false, "rationale": "Users do not gain ownership of platforms by providing data; their data is monetized by the platform providers."}]}, {"question": "A student notices that after searching for \"electric guitar\" on a search engine, they begin to see banner ads for various guitar brands appear on nearly every website and app they visit for the next week. This scenario best illustrates which advertising channel and tactic?", "options": [{"text": "Social media using FOMO (Fear of Missing Out).", "isCorrect": false, "rationale": "While social media is a channel and FOMO a tactic, the primary mechanism described is general web/app tracking and re-targeting, not exclusively social media or FOMO."}, {"text": "Physical retail employing product placement.", "isCorrect": false, "rationale": "This scenario describes online advertising, not physical retail strategies like product placement."}, {"text": "Algorithmic ads leveraging user data across various online platforms.", "isCorrect": true, "rationale": "This is a direct description of 'The Algorithmic Ad' at work, where online activity (searching) leads to targeted ads appearing across 'every website and app you visit,' as mentioned in the text."}, {"text": "Email marketing utilizing reciprocity.", "isCorrect": false, "rationale": "This scenario does not involve email and reciprocity (a free offer) is not the underlying tactic here."}]}, {"question": "You see a popular social media influencer enthusiastically reviewing a new cosmetic product, stating it's 'the best ever' and showing how it transformed their appearance. According to the text, what critical question should you always ask yourself in this situation?", "options": [{"text": "Is this product suitable for my specific skin type or needs?", "isCorrect": false, "rationale": "While a good question for personal relevance, it's not the critical question the text advises asking about the *nature* of the influencer's recommendation."}, {"text": "How many other influencers are promoting this exact product right now?", "isCorrect": false, "rationale": "Comparing multiple promotions can be useful, but it doesn't address the core potential bias of a single influencer's endorsement."}, {"text": "Is this person receiving payment or other benefits to promote this product?", "isCorrect": true, "rationale": "The text advises: 'Always ask: Is this person getting paid to say this? A recommendation is not independent if it is bought,' directly addressing the potential lack of independent judgment in influencer marketing."}, {"text": "Does this product have positive reviews from traditional beauty magazines or websites?", "isCorrect": false, "rationale": "Seeking external reviews is wise, but the text specifically instructs readers to question the influencer's motivation, which is the immediate critical step."}]}, {"question": "What is described as the 'most powerful counter to advertising' when advertisers create urgency to prevent clear thinking?", "options": [{"text": "Researching competing products online to find the absolute best deal.", "isCorrect": false, "rationale": "While good practice, this is not identified as the 'most powerful counter' against urgency itself. The text emphasizes slowing down to counteract the urgency."}, {"text": "Avoiding all forms of media that contain advertisements to prevent exposure.", "isCorrect": false, "rationale": "The text notes that ads are nearly ubiquitous (4,000-10,000 per day), making complete avoidance impractical and not the suggested 'counter'."}, {"text": "Deliberately slowing down the decision-making process to allow for reflection.", "isCorrect": true, "rationale": "The text explicitly states: 'The most powerful counter to advertising is time... Your defense is to deliberately slow down.'"}, {"text": "Immediately buying the product to get it over with and move on.", "isCorrect": false, "rationale": "This action would be succumbing to urgency, which is the opposite of the recommended defense strategy."}]}, {"question": "Sarah sees a pair of designer jeans on sale for $65, a price she feels is a great deal compared to the original $150. She is tempted to buy them immediately. According to \"The 24–48 Hour Rule,\" what should Sarah do?", "options": [{"text": "Buy them immediately, as it's a good deal and she might miss out if she waits.", "isCorrect": false, "rationale": "This action contradicts the purpose of the 24-48 Hour Rule, which is to counteract impulse buying driven by urgency."}, {"text": "Wait at least 24 hours, as they are a non-essential item and she needs time to think.", "isCorrect": false, "rationale": "While waiting 24 hours is part of the rule for non-essential items, the text specifies a longer period for purchases over $50."}, {"text": "Wait at least 48 hours or longer, as the price is over $50 and it's a non-essential purchase.", "isCorrect": true, "rationale": "The text advises: 'For any non-essential purchase, wait at least 24 hours before buying. For larger purchases ($50 or more), wait 48 hours or longer.' Since $65 is over $50, 48 hours or more is the correct application."}, {"text": "Consult a friend for their opinion before making the purchase, then decide.", "isCorrect": false, "rationale": "Seeking advice is a good idea, but it's not the specific '24–48 Hour Rule' described for countering advertising urgency."}]}, {"question": "The text highlights that the average American household spends nearly $2,000 per year on impulse purchases. If this money were consistently saved and invested instead, what is the core implication the text aims to convey?", "options": [{"text": "Impulse purchases are an unavoidable part of modern consumer culture and should be accepted as such.", "isCorrect": false, "rationale": "The text's purpose is to empower consumers to resist impulse buys, not to accept them as unavoidable."}, {"text": "The cumulative impact of small, unplanned purchases over time can significantly hinder long-term wealth accumulation.", "isCorrect": true, "rationale": "The text explains that $2,000/year over 40 years, invested at 7%, would grow to over $400,000, clearly illustrating the significant financial opportunity cost of impulse spending."}, {"text": "Financial advisors generally recommend setting aside a specific budget for impulse buys as a healthy financial practice.", "isCorrect": false, "rationale": "The text encourages reducing impulse purchases, not budgeting for them, and does not mention financial advisor recommendations."}, {"text": "Most households have enough disposable income to comfortably afford these impulse purchases without financial strain.", "isCorrect": false, "rationale": "The emphasis is on the *lost opportunity* for growth, not on current affordability, suggesting that even small impulse buys have a significant long-term cost."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
