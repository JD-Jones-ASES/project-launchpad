<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 20, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the central idea conveyed by the section \"The Cost of Waiting\"?", "options": [{"text": "The importance of selecting investments with the highest possible annual returns.", "isCorrect": false, "rationale": "While high returns are beneficial, the section's central theme emphasizes the impact of starting time rather than just the return rate itself. It uses a consistent 8% return for all examples."}, {"text": "The significant financial penalty incurred by delaying the start of long-term investments.", "isCorrect": true, "rationale": "The entire section, through examples and comparisons, demonstrates how waiting even a few years to start investing results in a dramatically lower accumulated value due to lost compounding time. This is the core message of 'The Cost of Waiting'."}, {"text": "The complexities of using the Future Value of Annuity formula for monthly contributions.", "isCorrect": false, "rationale": "The section explains the formula and provides a calculator tip, but the primary focus is not on the formula's complexity, but on what its application reveals about investment timing."}, {"text": "The benefits of making large initial investment contributions rather than smaller, consistent ones.", "isCorrect": false, "rationale": "The text explicitly states in the 'moneytip' that 'The math does not require a large amount. It requires time,' contradicting this option."}], "id": "q01"}, {"question": "The \"Future Value of Monthly Contributions\" formula is primarily used for calculating what?", "options": [{"text": "The present value of a series of future payments.", "isCorrect": false, "rationale": "The formula calculates 'Future Value' (FV), not present value."}, {"text": "The total amount accumulated in an account from fixed, regular monthly investments.", "isCorrect": true, "rationale": "As stated in the text, this formula (Future Value of Annuity) is used 'When you invest a fixed amount every month' to determine 'the total account value at the end'."}, {"text": "The interest earned on a single lump-sum investment.", "isCorrect": false, "rationale": "This formula is specifically for 'monthly contributions,' not a single lump-sum investment."}, {"text": "The annual percentage yield (APY) of an investment over a specific period.", "isCorrect": false, "rationale": "The formula calculates the total value, not the interest rate or APY."}], "id": "q02"}, {"question": "In the \"Future Value of Monthly Contributions\" formula, how is the variable 'r' (monthly interest rate) derived from an annual interest rate?", "options": [{"text": "By multiplying the annual rate by 12.", "isCorrect": false, "rationale": "Multiplying the annual rate by 12 would incorrectly inflate the monthly rate."}, {"text": "By dividing the annual rate by 12.", "isCorrect": true, "rationale": "The formula box explicitly states 'r = the monthly interest rate = annual rate / 12'."}, {"text": "By raising the annual rate to the power of 12.", "isCorrect": false, "rationale": "This would be part of a compounding calculation, but not how 'r' itself is directly derived."}, {"text": "By subtracting the inflation rate from the annual rate and then dividing by 12.", "isCorrect": false, "rationale": "Inflation is not mentioned as a factor in calculating 'r' for this formula in the text."}], "id": "q03"}, {"question": "To correctly use the \"Future Value of Monthly Contributions\" formula, how should 'n' (the total number of monthly payments) be calculated if given the investment duration in years?", "options": [{"text": "Divide the number of years by 12.", "isCorrect": false, "rationale": "Dividing by 12 would result in a number much smaller than the total monthly payments."}, {"text": "Multiply the number of years by 12.", "isCorrect": true, "rationale": "The formula box states 'n = the total number of monthly payments = years * 12'. For example, 47 years become 564 months (47 * 12)."}, {"text": "Square the number of years.", "isCorrect": false, "rationale": "Squaring the number of years is not the correct way to convert years to monthly payments."}, {"text": "Subtract the starting age from the retirement age.", "isCorrect": false, "rationale": "This would give the total number of years, but 'n' requires conversion to months (years * 12)."}], "id": "q04"}, {"question": "To compute $(1.006667)^{564}$ on a scientific calculator, what is the correct sequence of operations after entering 1.006667?", "options": [{"text": "Press the addition key, then enter 564.", "isCorrect": false, "rationale": "This would perform addition, not exponentiation."}, {"text": "Press the multiplication key, then enter 564.", "isCorrect": false, "rationale": "This would perform multiplication, not exponentiation."}, {"text": "Press the $[y^x]$ or $[]$ key, then enter 564, then press $[=]$.", "isCorrect": true, "rationale": "The 'Calculator Tip' explicitly details these steps: 'Press the [y^x] or [] key, Enter 564, Press [=]'."}, {"text": "Press the division key, then enter 564.", "isCorrect": false, "rationale": "This would perform division, not exponentiation."}], "id": "q05"}, {"question": "An investor starting at age 18 contributes $200 per month until age 65. An investor starting at age 28 contributes the same amount until age 65. Based on the text, what is the difference in their total *contributions*?", "options": [{"text": "$48,000", "isCorrect": false, "rationale": "This would be the difference for a 20-year gap (e.g., 18 vs 38), not a 10-year gap."}, {"text": "$700,440", "isCorrect": false, "rationale": "This is the difference in their *final accumulated value*, not their total contributions."}, {"text": "$24,000", "isCorrect": true, "rationale": "The 18-year-old contributes for 47 years, and the 28-year-old for 37 years. The difference is 10 years (47-37). 10 years * 12 months/year * $200/month = $24,000 in additional contributions by the 18-year-old."}, {"text": "$112,800", "isCorrect": false, "rationale": "This is the total contribution amount for the 18-year-old, not the difference between the two investors."}], "id": "q06"}, {"question": "According to the \"Comparison Table\" section, how much more money did the investor who started contributing at age 18 accumulate by age 65 compared to the investor who started at age 28?", "options": [{"text": "More than double the amount of the 28-year-old.", "isCorrect": false, "rationale": "While true that it's more than double, the question asks for a specific dollar amount."}, {"text": "$700,440", "isCorrect": true, "rationale": "The text explicitly states: 'Starting at 18 vs. 28: ...ends up with $700,440 more ($1,243,580 vs. $543,140)'."}, {"text": "$1,015,280", "isCorrect": false, "rationale": "This is the approximate difference between starting at 18 and 38, not 18 and 28."}, {"text": "$543,140", "isCorrect": false, "rationale": "This is the total accumulated value for the investor who started at age 28, not the difference between the two."}], "id": "q07"}, {"question": "The comparison between investors starting at age 18 and age 28 shows that the 18-year-old contributed $24,000 more but ended up with over $700,000 more. This discrepancy highlights which crucial aspect of long-term investing?", "options": [{"text": "The importance of consistently increasing monthly contributions over time.", "isCorrect": false, "rationale": "The example uses fixed $200/month contributions; the discrepancy is due to time, not increased contributions."}, {"text": "The exponential power of compound growth over extended periods.", "isCorrect": true, "rationale": "The text explicitly states, 'Those 10 extra years of compounding are worth far more than the extra contributions,' underscoring the power of compounding over time."}, {"text": "The necessity of a high annual return rate for achieving significant investment gains.", "isCorrect": false, "rationale": "While a good return rate is helpful, the core insight here is the disproportionate value of time, not just the rate itself, as the rate was constant for both examples."}, {"text": "The inherent risk associated with early investment, which can sometimes lead to higher losses.", "isCorrect": false, "rationale": "The section promotes early investment as highly beneficial, not as a source of higher risk or losses in this context."}], "id": "q08"}, {"question": "Based on the \"moneytip\" section, if a student can only afford to invest $50/month, what is the most critical factor for them to achieve substantial wealth by retirement?", "options": [{"text": "Finding an investment with a much higher annual return than 8%.", "isCorrect": false, "rationale": "While higher returns are good, the tip emphasizes that 'The math does not require a large amount. It requires time,' indicating time is more critical than a higher rate for a small contribution."}, {"text": "Consistently increasing their $50 monthly contribution annually.", "isCorrect": false, "rationale": "Though beneficial, the tip specifically highlights 'time' as the essential factor for even small amounts, not necessarily increasing them."}, {"text": "Starting their investment as early as possible.", "isCorrect": true, "rationale": "The 'moneytip' states, 'The math does not require a large amount. It requires time. A student who invests just $50/month at 8% from age 18 to 65 will have approximately $310,000... The most expensive financial mistake you can make is waiting.' This emphasizes starting early (time)."}, {"text": "Investing in stocks rather than bonds for higher growth potential.", "isCorrect": false, "rationale": "The tip does not discuss specific investment vehicles; its focus is on the principle of starting early with whatever amount is available."}], "id": "q09"}, {"question": "Considering all the examples and comparisons in this section, what is the most impactful advice for someone planning their long-term financial future through monthly investments?", "options": [{"text": "Prioritize maximizing the monthly contribution amount, even if it means waiting to save up a larger sum.", "isCorrect": false, "rationale": "This contradicts the core message. The text explicitly states that 'The most expensive financial mistake you can make is waiting' and 'Start with whatever you have—even $25 or $50 a month'."}, {"text": "Focus on understanding complex financial formulas before beginning to invest.", "isCorrect": false, "rationale": "While understanding is good, the immediate practical advice highlighted is to start investing, not to delay for formula mastery."}, {"text": "Begin investing as early as possible, as the duration of compounding is more significant than the immediate contribution size.", "isCorrect": true, "rationale": "This encapsulates the entire section's message, demonstrated by all the comparisons which show that starting earlier (longer compounding time) leads to vastly superior outcomes, even with fixed contributions, and that 'The math does not require a large amount. It requires time'."}, {"text": "Only invest when the market conditions are most favorable to ensure high returns.", "isCorrect": false, "rationale": "The section does not discuss market timing; it emphasizes consistent contributions over long periods, regardless of specific market fluctuations."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
