    };

        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>

        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 3, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the defining characteristic of a short-term financial goal?", "options": [{"text": "It involves saving for a major purchase like a car or house.", "isCorrect": false, "rationale": "The text defines short-term goals as those reachable within one year or less, usually with smaller dollar amounts. Major purchases like cars or houses are typically long-term goals."}, {"text": "It is a target you plan to reach within one year or less.", "isCorrect": true, "rationale": "The text explicitly defines a 'Short-Term Financial Goal' as 'a target you plan to reach within one year or less.'"}, {"text": "It requires a significant amount of money, typically over $1,000.", "isCorrect": false, "rationale": "The text states that for short-term goals, 'the dollar amounts are usually smaller,' which contradicts the idea of always requiring over $1,000."}, {"text": "It focuses primarily on retirement planning.", "isCorrect": false, "rationale": "Retirement planning is presented as an example of a 'long-term goal' in the text, not a short-term one."}]}, {"question": "Which of the following is NOT typically a characteristic of effective short-term financial goals, as described or illustrated in the text?", "options": [{"text": "They involve smaller dollar amounts, allowing for quick results.", "isCorrect": false, "rationale": "The text states that 'the dollar amounts are usually smaller, and you can see results quickly,' making this a characteristic."}, {"text": "They consistently align with the SMART framework, having a specific dollar amount and a clear deadline.", "isCorrect": false, "rationale": "The text emphasizes that examples of short-term goals show 'a specific dollar amount and a clear deadline. That is the SMART framework doing its work,' making this a characteristic."}, {"text": "They are typically complex financial investments requiring expert advice for setup.", "isCorrect": true, "rationale": "The examples provided (phone case, emergency fund, holiday gifts) are straightforward savings goals, not complex financial investments. The text focuses on building basic habits, not complex investment strategies for short-term goals."}, {"text": "They serve as building blocks for good financial habits and confidence.", "isCorrect": false, "rationale": "The text states that 'short-term goals are the building blocks of good financial habits' and 'Quick wins build confidence,' making this a characteristic."}]}, {"question": "A student sets a goal to 'save money for a new laptop by next year.' Based on the text's emphasis on the SMART framework for short-term goals, what is the primary deficiency in this goal statement?", "options": [{"text": "It is too Achievable, meaning it doesn't challenge the student enough to build habits.", "isCorrect": false, "rationale": "Achievability cannot be determined without knowing the specific cost of the laptop or the student's income. The text highlights a lack of specificity, not necessarily too much achievability."}, {"text": "It lacks Specificity and Measurability, making it difficult to track progress and know the exact target.", "isCorrect": true, "rationale": "The goal lacks a specific dollar amount for the laptop and a precise deadline within 'next year' (e.g., by June 15th), which are key components of Specific and Measurable goals in the SMART framework discussed in the text."}, {"text": "It isn't Realistic, as saving for a laptop within a year is often too expensive for students.", "isCorrect": false, "rationale": "Realism depends on the specific cost of the laptop and the student's financial capacity, which are not provided. The main issue, according to the text's SMART focus, is the lack of specific detail rather than inherent unrealistic nature."}, {"text": "It is not Time-bound enough, as 'next year' is too vague for a short-term goal.", "isCorrect": false, "rationale": "While 'next year' could be more precise, the more significant deficiencies are the lack of a specific amount (Measurable) and the exact model/features (Specific) of the laptop, which are more foundational to making it a SMART goal as emphasized by the examples."}]}, {"question": "According to the text, what is a key psychological benefit of successfully achieving short-term financial goals?", "options": [{"text": "It guarantees immediate financial independence for life, removing all future financial worries.", "isCorrect": false, "rationale": "Achieving short-term goals provides confidence and builds habits, but does not guarantee immediate, lifelong financial independence or eliminate all future worries."}, {"text": "It provides 'quick wins' that build confidence, which then carries forward into longer, more challenging goals.", "isCorrect": true, "rationale": "The text states, 'Quick wins build confidence. When you set a goal for 3 months and actually hit it, you prove to yourself that you can do this. That confidence carries forward into longer, harder goals.'"}, {"text": "It eliminates the need for any future financial planning, as immediate needs are met.", "isCorrect": false, "rationale": "The text positions short-term goals as 'building blocks' and 'training for a 3-year goal,' implying they are part of ongoing planning, not a replacement for it."}, {"text": "It instantly resolves all long-term financial problems, such as retirement planning.", "isCorrect": false, "rationale": "Short-term goals help with immediate problems and build habits for long-term goals, but they do not instantly resolve long-term issues like retirement."}]}, {"question": "How do short-term goals primarily contribute to achieving long-term financial success?", "options": [{"text": "By allowing individuals to avoid focusing on their finances until larger, long-term problems arise.", "isCorrect": false, "rationale": "The text encourages active engagement with financial goals, not avoidance, and emphasizes habit building."}, {"text": "By immediately funding large, long-term investments like a down payment on a house.", "isCorrect": false, "rationale": "Short-term goals usually involve smaller dollar amounts and are building blocks; they don't immediately fund large long-term investments, though they can contribute over time."}, {"text": "By developing and strengthening the muscle of saving through consistent practice and habit formation.", "isCorrect": true, "rationale": "The text states, 'Short-term practice builds long-term habits. The muscle of saving—deciding to set money aside instead of spending it—grows stronger each time you use it. Starting with a 3-month goal is training for a 3-year goal.'"}, {"text": "By eliminating the need for an emergency fund, as immediate problems are solved by other means.", "isCorrect": false, "rationale": "The text explicitly states that an emergency fund is 'Your First Priority' among short-term goals, highlighting its importance rather than elimination."}]}, {"question": "What is the primary purpose of an emergency fund, as defined in the text?", "options": [{"text": "To provide funds for luxury purchases and discretionary spending like vacations.", "isCorrect": false, "rationale": "The text defines an emergency fund as being 'set aside exclusively for unexpected expenses,' not for luxury or discretionary spending."}, {"text": "To save for a down payment on a major asset like a house or a new car.", "isCorrect": false, "rationale": "Saving for a down payment is typically a specific financial goal (short-term or long-term depending on the amount), but an emergency fund is for unexpected expenses, not planned purchases."}, {"text": "To be a dedicated pool of savings for unexpected expenses, so emergencies do not derail other financial plans.", "isCorrect": true, "rationale": "The text defines an 'Emergency Fund' as 'a dedicated pool of savings set aside exclusively for unexpected expenses... so that emergencies do not derail your other financial plans.'"}, {"text": "To earn high interest rates by investing in the stock market or other risky assets.", "isCorrect": false, "rationale": "The text implies it's a 'pool of savings' for safety, not a high-risk investment vehicle. The focus is on accessibility and safety for emergencies."}]}, {"question": "Which short-term goal is explicitly recommended as the 'first priority' by financial experts for students with part-time income?", "options": [{"text": "Saving for a new smartphone or other personal tech gadget.", "isCorrect": false, "rationale": "While a valid short-term goal, the text does not identify saving for a smartphone as the *first priority*. It's given as an example of a common short-term goal."}, {"text": "Building a starter emergency fund of $500 to $1,000.", "isCorrect": true, "rationale": "The text explicitly states, 'Before you save for anything else, financial experts agree on one short-term goal that should come first: a small emergency fund.' It then suggests '$500 to $1,000' for students."}, {"text": "Paying back all outstanding personal loans to friends and family.", "isCorrect": false, "rationale": "Paying back loans is an important financial responsibility, but the text specifically highlights the emergency fund as the *first priority* among short-term goals."}, {"text": "Investing a portion of income in a retirement account for future growth.", "isCorrect": false, "rationale": "Retirement accounts are long-term goals and not presented as the *first priority* short-term goal for students, especially before an emergency fund."}]}, {"question": "The 'moneytip' section advises opening a separate savings account specifically for an emergency fund. What is the primary reason given for this recommendation?", "options": [{"text": "To earn higher interest rates on the emergency savings.", "isCorrect": false, "rationale": "While some separate accounts might offer slightly different rates, the text's primary rationale is not about maximizing interest. The focus is on safeguarding the funds."}, {"text": "To make it much harder to accidentally spend the emergency money by keeping it out of sight.", "isCorrect": true, "rationale": "The text states, 'Keeping the money separate makes it much harder to accidentally spend it. What you do not see, you do not spend.'"}, {"text": "To simplify the process of combining emergency funds with everyday spending for convenience.", "isCorrect": false, "rationale": "The recommendation is precisely to *separate* the money, not combine it, to prevent accidental spending."}, {"text": "To qualify for special banking incentives and bonuses for having multiple accounts.", "isCorrect": false, "rationale": "The text does not mention banking incentives or bonuses as the reason for opening a separate account for an emergency fund."}]}, {"question": "A student wants to save $450 for a new uniform and supplies within 3 months. After performing the calculation, they determine they need to save $150 per month. If their current income only leaves $75 per month after expenses, what is the most appropriate action based on the text's guidance?", "options": [{"text": "Give up on the goal, as it's clearly impossible with their current income.", "isCorrect": false, "rationale": "The text encourages adjusting goals rather than giving up: 'you may need to extend the timeline or reduce the goal amount.'"}, {"text": "Attempt to save the full $150 per month, even if it means incurring debt for other necessary expenses.", "isCorrect": false, "rationale": "This is financially unsustainable and could lead to new problems, contradicting the goal of sound financial planning."}, {"text": "Adjust the timeline to 6 months or reduce the goal amount for the uniform and supplies.", "isCorrect": true, "rationale": "The text directly advises: 'If you only have $60 left after expenses, you may need to extend the timeline or reduce the goal amount.'"}, {"text": "Ask a friend or family member to contribute the remaining $75 each month to meet the goal.", "isCorrect": false, "rationale": "While help can be useful, the text's examples and advice focus on personal financial planning and self-sufficiency, not relying on others for a consistent deficit."}]}, {"question": "The 'warning' section advises against setting too many short-term goals simultaneously. What is the primary negative consequence of trying to save for six different things at once?", "options": [{"text": "It leads to achieving all goals much faster due to the diversified effort across multiple targets.", "isCorrect": false, "rationale": "This is the opposite of what the text states. Dividing effort too thinly slows progress for each individual goal."}, {"text": "It results in the monthly savings for each goal being so small that progress feels invisible, leading to demotivation.", "isCorrect": true, "rationale": "The text explicitly states: 'If you try to save for six different things simultaneously, your monthly savings for each will be so small that progress feels invisible—and motivation fades.'"}, {"text": "It forces you to invest in riskier financial products to try and meet multiple targets more quickly.", "isCorrect": false, "rationale": "The text does not suggest this as a consequence; the primary issue is psychological demotivation due to slow perceived progress, not a shift to risky investments."}, {"text": "It eliminates the need for an emergency fund, as you have many small savings pots to draw from.", "isCorrect": false, "rationale": "This is incorrect. An emergency fund is a dedicated priority, and having many small goal-specific savings pots does not replace its role for unexpected expenses."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
