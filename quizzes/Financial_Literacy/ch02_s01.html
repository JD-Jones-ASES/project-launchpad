<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 2, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, which of the following best defines a 'need'?", "options": [{"text": "Something that enhances your lifestyle and social status.", "isCorrect": false, "rationale": "This describes a want, as needs are fundamental for survival or basic functioning, not status or lifestyle enhancement."}, {"text": "A good or service that is essential for survival, health, or basic functioning in everyday life.", "isCorrect": true, "rationale": "The text explicitly defines a need as 'something you must have to survive or to function safely in everyday life,' and provides a formal definition matching this description."}, {"text": "An item you strongly desire and believe will make you happier.", "isCorrect": false, "rationale": "While desirable, happiness-inducing items without direct impact on survival or basic function fall under the category of wants."}, {"text": "Anything that all your friends or colleagues possess.", "isCorrect": false, "rationale": "Social pressure to have an item does not make it a need; the text specifically identifies this as a sign that a want has been disguised as a need."}]}, {"question": "Maria lives in a remote rural area with no public transportation, 20 miles from the nearest grocery store and her workplace. John lives in a dense urban environment with comprehensive bus and subway services, and his job is within walking distance. For Maria and John, respectively, how would a car most likely be categorized according to the text?", "options": [{"text": "Both Maria and John need a car.", "isCorrect": false, "rationale": "The text states that in a city with good public transit, a car is often a want, which applies to John's situation."}, {"text": "Maria needs a car, and John wants a car.", "isCorrect": true, "rationale": "The text explains that if you live in a rural area with distant amenities and no public transit, a car becomes a need. For someone in a city with good public transit, a car is often a want. This aligns perfectly with Maria's need and John's want."}, {"text": "Maria wants a car, and John needs a car.", "isCorrect": false, "rationale": "This reverses the categorization. Maria's circumstances (rural, no transit, distant necessities) make a car a need, while John's (urban, good transit, walking distance) make it a want."}, {"text": "Both Maria and John want a car.", "isCorrect": false, "rationale": "Given Maria's circumstances, a car is crucial for her basic functioning and access to necessities, making it a need, not merely a want."}]}, {"question": "According to Maslow's Hierarchy as described in the text, which two levels primarily represent 'genuine financial needs'?", "options": [{"text": "Belonging and self-esteem.", "isCorrect": false, "rationale": "The text places belonging and self-esteem higher on the pyramid, noting they involve 'things we deeply desire' but are 'not the same as survival needs.'"}, {"text": "Personal growth and self-actualization.", "isCorrect": false, "rationale": "Personal growth (and self-actualization, implied as the peak) is described as highest on Maslow's pyramid, far above basic survival needs."}, {"text": "Basic survival needs (food, water, warmth, rest) and safety (secure home, stable income, good health).", "isCorrect": true, "rationale": "The text explicitly states these two levels 'are where genuine financial needs live,' forming the base of Maslow's pyramid."}, {"text": "Socialization and entertainment.", "isCorrect": false, "rationale": "The text does not mention socialization or entertainment as distinct levels in Maslow's hierarchy; these would generally fall under wants or higher-level desires."}]}, {"question": "Which of the following scenarios best illustrates the concept of 'want-creep'?", "options": [{"text": "Buying a basic, used smartphone to access banking apps and communicate with your employer because your old one broke.", "isCorrect": false, "rationale": "This scenario describes acquiring a functional item to meet a genuine need (communication, banking access), not an upgrading of a want into a perceived need."}, {"text": "Upgrading from a perfectly functional standard coffee maker to a top-of-the-line espresso machine because advertisements suggest it's essential for a 'quality' morning routine.", "isCorrect": true, "rationale": "This exemplifies want-creep: a functional item (coffee maker) is replaced by a luxury version (espresso machine) due to perceived necessity influenced by advertising, even though the basic function is already met."}, {"text": "Purchasing a durable winter coat because the temperatures are dropping below freezing and your current coat is torn.", "isCorrect": false, "rationale": "This is a clear example of fulfilling a need (weather-appropriate clothing for safety) due to genuine risk, not a disguised want."}, {"text": "Setting aside money from each paycheck to build an emergency fund for unexpected medical expenses.", "isCorrect": false, "rationale": "Saving for an emergency fund is a responsible financial decision related to future needs, not an instance of mislabeling a want as a need."}]}, {"question": "A student needs a laptop for school to complete assignments and access online textbooks. They currently have an old laptop that is very slow and frequently crashes, hindering their ability to study. Which of the following purchases would likely be considered a 'need' based on the text's principles?", "options": [{"text": "The latest gaming laptop with premium features and a high-end graphics card.", "isCorrect": false, "rationale": "While a laptop is needed, the 'latest model with the fastest processor and best camera' or gaming features are usually wants. A basic functioning laptop would serve the academic purpose."}, {"text": "A mid-range laptop that reliably runs necessary software and connects to the internet, allowing them to complete schoolwork without interruption.", "isCorrect": true, "rationale": "The text states the 'basic function (communication, internet access)' may be a need, while the 'premium version is almost always a want.' A reliable mid-range laptop fulfills the essential function without being a luxury."}, {"text": "A designer laptop case for their existing broken laptop.", "isCorrect": false, "rationale": "A case is for protection and aesthetics; it does not address the fundamental need for a functional computer. A designer case is a want, especially for a non-functional device."}, {"text": "Multiple streaming service subscriptions to relieve study stress.", "isCorrect": false, "rationale": "Streaming services are explicitly listed as wants, providing enjoyment or comfort but not essential for survival or basic functioning, especially for academic work."}]}, {"question": "The text emphasizes that 'honest thinking matters' when distinguishing needs from wants. Which question does the text suggest asking yourself to practice this honest thinking?", "options": [{"text": "Will this item make me happy and improve my comfort?", "isCorrect": false, "rationale": "While these are valid questions, they align more with wants. The text directs towards health, safety, and function for needs."}, {"text": "Is this item genuinely required for my health, safety, or ability to function — or do I just really, really want it?", "isCorrect": true, "rationale": "This question is directly quoted from the text as the practical advice for honest self-reflection in distinguishing needs from wants."}, {"text": "Is this item popular among my peers and will it enhance my social standing?", "isCorrect": false, "rationale": "Social pressure is identified in the text as a sign that a want has been disguised as a need, not a criterion for identifying a need."}, {"text": "How much does this item cost, and do I have enough money to buy it?", "isCorrect": false, "rationale": "While cost is a factor in purchasing decisions, it doesn't help distinguish whether an item is fundamentally a need or a want; it relates to affordability."}]}, {"question": "Based on the 'Jordan's First Paycheck' example, what was Jordan's primary rationale for prioritizing the winter boots over the new wireless earbuds or jacket?", "options": [{"text": "The earbuds and jacket were more expensive than the boots.", "isCorrect": false, "rationale": "While cost is a factor, Jordan's decision was based on necessity, not merely price. The boots were $55, the earbuds $79, and the jacket $65, so the boots weren't the most expensive item."}, {"text": "She had already saved enough money for the earbuds.", "isCorrect": false, "rationale": "The text states she set aside only $40 'toward the earbuds,' meaning she didn't have enough to buy them fully yet."}, {"text": "The boots addressed an immediate need related to safety and functioning (winter is coming, hole in boots).", "isCorrect": true, "rationale": "Jordan recognized the boots as a 'need' because winter was approaching and her current boots were damaged, posing a risk to her health/safety. The earbuds and jacket were classified as 'wants' because she had a functional coat already."}, {"text": "Her friends convinced her that the boots were more stylish.", "isCorrect": false, "rationale": "The scenario does not mention friends influencing her fashion choices; her decision was based on practical necessity."}]}, {"question": "Which of the following is NOT listed in the text as a sign that a 'want' might have been disguised as a 'need'?", "options": [{"text": "You use the word 'need' but cannot explain what harm would come from not having it.", "isCorrect": false, "rationale": "This is explicitly listed as a sign of a disguised want."}, {"text": "Everyone you know has one (social pressure).", "isCorrect": false, "rationale": "This is explicitly listed as a sign of a disguised want, noting 'social pressure is not a need.'"}, {"text": "The 'need' appeared right after you saw an advertisement.", "isCorrect": false, "rationale": "This is explicitly listed as a sign of a disguised want, linked to advertising making 'luxury items as essentials.'"}, {"text": "The item is a basic, generic version of a necessity, and you already own a premium version.", "isCorrect": true, "rationale": "The text states 'An older or less expensive version would serve the same function' as a sign of a disguised want. This option describes the opposite: already owning a premium version while considering a basic one, which is not a sign of 'want-creep' in the way the text defines it."}]}, {"question": "The '24-Hour Rule' is introduced as a money tip. What is its primary purpose?", "options": [{"text": "To ensure you buy items quickly before they go out of stock.", "isCorrect": false, "rationale": "The rule is about delaying purchases, not accelerating them, to avoid impulsive buying."}, {"text": "To allow time for careful consideration, helping the urge to buy a non-necessity fade.", "isCorrect": true, "rationale": "The text states the '24-Hour Rule' is to 'wait 24 hours' before buying anything not a clear necessity, as 'the urge fades,' thereby saving money by preventing impulsive 'want' purchases."}, {"text": "To compare prices across different stores to find the best deal.", "isCorrect": false, "rationale": "While price comparison is a good financial habit, the 24-Hour Rule's specific purpose described is about re-evaluating the desire itself, not just the price point."}, {"text": "To secure a refund if you change your mind within a day.", "isCorrect": false, "rationale": "The rule is a pre-purchase strategy, not a post-purchase return policy. It aims to prevent the purchase entirely if the desire isn't genuine."}]}, {"question": "Why is understanding the difference between needs and wants considered the 'foundation of smart money management' by the text?", "options": [{"text": "Because it dictates the exact amount of money you should save each month.", "isCorrect": false, "rationale": "While it influences saving, the text states it's the foundation for 'every budget, every savings goal, every borrowing decision,' not a fixed amount."}, {"text": "It helps you prioritize covering essential items first before making thoughtful choices about discretionary spending.", "isCorrect": true, "rationale": "The text concludes by stating this understanding helps 'make sure those items [needs] are covered first — and then make thoughtful choices about how to spend what is left,' forming the basis for all financial decisions."}, {"text": "It enables you to justify any purchase you make as either a need or a want.", "isCorrect": false, "rationale": "The purpose is to make *honest* distinctions to improve management, not to justify purchases after the fact."}, {"text": "So you can always buy everything you desire without feeling guilty.", "isCorrect": false, "rationale": "The goal is smart management and making choices, often involving deferring or foregoing wants, not guilt-free spending on everything desired."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
