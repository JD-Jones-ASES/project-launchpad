<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 3, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the fundamental difference between a 'wish' and a 'financial goal'?", "options": [{"text": "A wish is always about money, while a goal can be anything.", "isCorrect": false, "rationale": "The text states 'save more money' is a wish, implying wishes can be financial, but they lack structure. Financial goals are specifically about money."}, {"text": "A financial goal is a specific, written target with a deadline, whereas a wish lacks structure and a plan.", "isCorrect": true, "rationale": "The text explicitly states: 'The difference between a wish and a goal is structure. ... A financial goal is a specific, written target for how you will earn, save, spend, or invest money, including a deadline for when you will reach it.'"}, {"text": "A wish is something you think about, while a goal is always shared with others.", "isCorrect": false, "rationale": "The text does not mention sharing goals as a defining characteristic. The key distinction is structure and specificity versus vagueness."}, {"text": "Wishes are only for short-term desires, while financial goals are always for long-term investments.", "isCorrect": false, "rationale": "The text does not specify timeframes for wishes or limit financial goals to long-term investments; it focuses on their structural differences."}], "id": "q01"}, {"question": "Which element of a SMART goal is primarily concerned with identifying the exact object of your saving, its cost, and the personal motivation behind it?", "options": [{"text": "Measurable", "isCorrect": false, "rationale": "Measurable focuses on numerical tracking and progress, not the specific item or personal motivation."}, {"text": "Achievable", "isCorrect": false, "rationale": "Achievable deals with the realism of the goal based on income and expenses, not the definition of the goal itself."}, {"text": "Specific", "isCorrect": true, "rationale": "The text states: 'A specific goal tells you exactly what you are saving for, how much it costs, and why it matters.' This directly matches the question."}, {"text": "Relevant", "isCorrect": false, "rationale": "Relevant addresses whether the goal aligns with personal values, which is part of 'why it matters,' but 'Specific' encompasses the 'what' and 'how much' as well."}], "id": "q02"}, {"question": "The text emphasizes that a measurable goal 'lets you catch problems early.' Which scenario best illustrates this benefit?", "options": [{"text": "You realize you don't actually care about buying the item you're saving for.", "isCorrect": false, "rationale": "This relates to the 'Relevant' aspect of SMART goals, not directly to 'Measurable.'"}, {"text": "You find yourself consistently saving less than the target amount each month, prompting you to adjust your budget or goal.", "isCorrect": true, "rationale": "The text explicitly states: 'If you are only saving $50/month and need $80, a measurable goal tells you immediately that you need to adjust.' This shows catching a problem (being off track) early."}, {"text": "You discover that the item you want costs more than you initially thought.", "isCorrect": false, "rationale": "This would be addressed during the 'Specific' stage (researching costs) or during the 'Achievable' stage if the new cost makes it unrealistic, not primarily by 'Measurable' itself."}, {"text": "You forget the original deadline for your savings goal.", "isCorrect": false, "rationale": "This relates to the 'Time-bound' aspect of SMART goals, not 'Measurable.'"}], "id": "q03"}, {"question": "Sarah earns $150 per month from her part-time job and has fixed expenses of $100. She sets a goal to save $800 in two months for a new gaming console. Which SMART element is Sarah most likely violating?", "options": [{"text": "Specific", "isCorrect": false, "rationale": "The goal is specific enough: saving $800 for a new gaming console. The issue lies elsewhere."}, {"text": "Measurable", "isCorrect": false, "rationale": "The goal is measurable ($800 target, $400/month needed). The issue isn't tracking, but the ability to meet the target."}, {"text": "Achievable", "isCorrect": true, "rationale": "Sarah's income after expenses is $50 ($150 - $100). To save $800 in two months, she needs to save $400/month. Saving $400/month with only $50 available is unrealistic, thus violating the 'Achievable' criterion."}, {"text": "Relevant", "isCorrect": false, "rationale": "The scenario doesn't provide information about Sarah's motivation, so we cannot assume it's not relevant. The core problem is the financial feasibility."}], "id": "q04"}, {"question": "The text highlights that a 'relevant' goal 'connects to something you actually care about.' What is the primary risk of pursuing a financial goal that is *not* relevant to your personal priorities and values?", "options": [{"text": "You will likely set a deadline that is too short, making the goal unachievable.", "isCorrect": false, "rationale": "Setting an unrealistic deadline is an issue with 'Time-bound' or 'Achievable,' not directly a primary risk of lack of relevance."}, {"text": "It will be difficult to stay motivated and committed to the goal over time.", "isCorrect": true, "rationale": "The text states: 'a goal that someone else set for you, or that you think you should want, is hard to stay motivated for. Relevant goals align with your real priorities and values.'"}, {"text": "You will be unable to accurately measure your progress towards the goal.", "isCorrect": false, "rationale": "Measurability depends on having a number attached, not on the personal relevance of the goal."}, {"text": "The goal will not be specific enough to create an actionable plan.", "isCorrect": false, "rationale": "A goal can be specific (e.g., 'Save $1000 for a specific car model') but still not be relevant to the individual."}], "id": "q05"}, {"question": "Beyond simply creating urgency, what unique benefit does the 'Time-bound' element provide for a financial goal?", "options": [{"text": "It helps to identify the exact cost of the item you are saving for.", "isCorrect": false, "rationale": "Identifying the exact cost is part of making a goal 'Specific,' not 'Time-bound.'"}, {"text": "It confirms that the goal is realistic given your income and expenses.", "isCorrect": false, "rationale": "Confirming realism is the purpose of the 'Achievable' criterion."}, {"text": "It allows you to calculate the necessary periodic savings amount, making the plan actionable.", "isCorrect": true, "rationale": "The text states: 'A deadline does something powerful: it tells you exactly how much time you have, which makes the math concrete. If your deadline is 6 months away, you divide $480 by 6 and discover you need $80/month. That is actionable.'"}, {"text": "It connects the goal to your personal priorities and values.", "isCorrect": false, "rationale": "Connecting to personal priorities is the role of the 'Relevant' criterion."}], "id": "q06"}, {"question": "A student initially states, 'I want to save money for something nice.' Following the SMART framework, what would be the *first* logical step to transform this into a Specific goal?", "options": [{"text": "Determine the monthly amount they need to save.", "isCorrect": false, "rationale": "Determining the monthly amount comes after knowing the total cost and deadline, which requires the goal to be specific and time-bound first."}, {"text": "Research what 'something nice' specifically is, such as a gaming setup, and its exact cost.", "isCorrect": true, "rationale": "As shown in the 'Transforming a Vague Goal into a SMART Goal' example, the first step for Specific is 'What is 'something nice'? ...How much does it cost?'"}, {"text": "Evaluate if their current income can support their savings target.", "isCorrect": false, "rationale": "This is part of making the goal 'Achievable,' which comes after making it Specific and Measurable."}, {"text": "Set a firm deadline for when they want to achieve their savings.", "isCorrect": false, "rationale": "Setting a deadline is for the 'Time-bound' element, which typically comes later in the process once the 'what' and 'how much' are established."}], "id": "q07"}, {"question": "The SMART framework transforms 'vague intentions into actionable targets.' Which of the following best summarizes the overall impact of applying all five SMART elements?", "options": [{"text": "It guarantees that you will achieve your goal without any effort or adjustments.", "isCorrect": false, "rationale": "The framework makes success more likely but does not guarantee it, nor does it eliminate the need for effort or adjustments ('stretch, not a shrug')."}, {"text": "It provides clarity, motivation, and a concrete plan, significantly increasing the likelihood of success.", "isCorrect": true, "rationale": "The definition box states: 'Each element makes the goal clearer, more motivating, and more likely to succeed.' The example then demonstrates how it becomes actionable."}, {"text": "It ensures that all your financial goals are inherently long-term and investment-focused.", "isCorrect": false, "rationale": "The framework applies to any financial goal, regardless of its timeframe or type (saving, spending, investing)."}, {"text": "It primarily serves as a way to prioritize goals set by others rather than personal ones.", "isCorrect": false, "rationale": "The 'Relevant' criterion emphasizes personal priorities, not those set by others. The framework focuses on individual goal achievement."}], "id": "q08"}, {"question": "Consider the goal: 'I will save $500 for a new bike by saving $100 each month starting next week.' Which SMART element is *explicitly missing* a clear definition in this statement?", "options": [{"text": "Specific", "isCorrect": false, "rationale": "The goal is specific: $500 for a new bike. The 'what' and 'how much' are clear."}, {"text": "Measurable", "isCorrect": false, "rationale": "The goal is measurable: $500 target, $100/month. Progress can be tracked."}, {"text": "Achievable", "isCorrect": false, "rationale": "We don't have enough information about income/expenses to judge achievability, so it's not explicitly missing from the *statement* itself."}, {"text": "Time-bound", "isCorrect": true, "rationale": "While it says 'starting next week,' there is no specific end date or deadline for when the $500 will be reached. 'Saving $100 each month' implies a duration, but a concrete deadline is absent, which is critical for 'Time-bound.'"}], "id": "q09"}, {"question": "According to the 'Why Written Goals Work Better' section, what is the most significant advantage of writing down your SMART goals compared to just thinking about them?", "options": [{"text": "Written goals automatically adjust themselves if circumstances change.", "isCorrect": false, "rationale": "Written goals provide a stable target; they don't automatically adjust. The individual must make adjustments."}, {"text": "They provide a constant visual reminder, making the goal concrete and serving as a defense against unplanned spending.", "isCorrect": true, "rationale": "The text states: 'Writing a goal makes it concrete... Keeping it somewhere visible... keeps it in front of you when you are tempted to spend... the written goal is your best defense. Vague intentions fade under pressure. Written goals hold.'"}, {"text": "Writing goals makes them inherently more relevant to your personal values.", "isCorrect": false, "rationale": "Relevance is determined before writing; writing down a goal doesn't change its inherent relevance but reinforces it."}, {"text": "They enable you to achieve your goals faster than if they were only mental.", "isCorrect": false, "rationale": "While writing goals increases likelihood of achievement, the text doesn't specifically claim they make achievement 'faster,' but rather 'more likely' due to increased concreteness and focus."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
