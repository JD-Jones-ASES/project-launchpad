<script>
var QUESTIONS = [{"question": "According to the text, what is the fundamental difference that distinguishes \"good debt\" from \"bad debt\"?", "options": [{"text": "The interest rate charged on the loan.", "isCorrect": false, "rationale": "While the interest rate is a factor in the cost of debt, the text explicitly states the fundamental difference is whether the borrowing creates value greater than its cost, not just the rate itself."}, {"text": "Whether the borrowing creates value greater than its cost.", "isCorrect": true, "rationale": "The text directly states, 'The difference between good debt and bad debt comes down to one question: does this borrowing create value greater than its cost?'"}, {"text": "If the loan is secured or unsecured.", "isCorrect": false, "rationale": "The security of a loan (collateral) affects lender risk and interest rates, but it is not the defining characteristic for whether debt is 'good' or 'bad' in terms of value creation."}, {"text": "The total amount of money borrowed.", "isCorrect": false, "rationale": "The amount borrowed is relevant when considering proportionality to benefit, but it is not the fundamental definition of good versus bad debt. A small loan can be bad debt if it creates no value, and a large loan can be good debt if it creates substantial value."}], "id": "q01"}, {"question": "Which of the following scenarios best exemplifies \"good debt\" as defined in the section?", "options": [{"text": "Taking out a payday loan to cover a sudden car repair.", "isCorrect": false, "rationale": "Payday loans are explicitly listed as 'bad debt' due to their extremely high APR and use for short-term consumption or cash flow gaps, trapping borrowers in debt."}, {"text": "Obtaining a mortgage to purchase a primary residence that is expected to build equity over time.", "isCorrect": true, "rationale": "The text lists mortgages as an example of good debt because buying a home can build equity and may appreciate in value, functioning as a form of forced savings."}, {"text": "Using a credit card to purchase a new television and carrying the balance for months.", "isCorrect": false, "rationale": "Credit card balances for consumption, especially at high APRs, are a prime example of 'bad debt' because the item depreciates immediately, and interest accumulates without lasting financial benefit."}, {"text": "Securing a 7-year loan for a new luxury car.", "isCorrect": false, "rationale": "Car loans for luxury vehicles, especially long-term, are given as an example of 'bad debt' because cars always depreciate, and the cost far exceeds the need or value."}], "id": "q02"}, {"question": "The section states that student loans are \"good debt *when reasonable*.\" Which situation would likely make a student loan fall into a \"bad debt\" category despite being for education?", "options": [{"text": "Borrowing a modest amount for a degree in a high-demand field.", "isCorrect": false, "rationale": "This scenario aligns with the definition of good debt, where the investment in education is proportional to a likely increase in earning power."}, {"text": "Accumulating $100,000 in student loan debt for a degree that typically leads to a $35,000/year entry-level salary.", "isCorrect": true, "rationale": "This situation directly mirrors the example given in 'The Test for Any Debt Decision' as failing the test for reasonableness, where the cost (loan amount) is disproportionate to the benefit (income boost), turning it into bad debt."}, {"text": "Taking out a loan for a medical degree that will lead to a high-paying career.", "isCorrect": false, "rationale": "This is a classic example of good debt, where a significant investment in education yields a substantial increase in lifetime earning power."}, {"text": "Borrowing money to attend a state university rather than an Ivy League institution.", "isCorrect": false, "rationale": "The type of institution is less relevant than the cost-to-benefit ratio. A state university loan could still be bad debt if its cost is too high for the expected income, or good debt if it's reasonable."}], "id": "q03"}, {"question": "Sarah buys new furniture using her credit card and plans to pay it off over 18 months. Her credit card has a 22% APR. According to the text, how should Sarah categorize this debt?", "options": [{"text": "Good debt, because furniture is a lasting asset for her home.", "isCorrect": false, "rationale": "Furniture typically depreciates significantly and rapidly, especially after purchase. Paying high interest on a depreciating consumption item is a hallmark of bad debt."}, {"text": "Bad debt, because she is paying high interest on an item that depreciates in value.", "isCorrect": true, "rationale": "The text explicitly defines bad debt as 'borrowing for things that depreciate (lose value) or for pure consumption—where you pay interest but get no lasting financial benefit.' Credit card balances for consumption at a high APR are a prime example."}, {"text": "Good debt, because it improves her living environment.", "isCorrect": false, "rationale": "While furniture may improve her living environment, this is a personal comfort benefit, not a financial return or value increase as required for good debt."}, {"text": "Neutral debt, as it's a personal choice without significant financial impact.", "isCorrect": false, "rationale": "A 22% APR on a depreciating asset over 18 months will have a significant negative financial impact, making it far from neutral."}], "id": "q04"}, {"question": "The \"moneytip\" advises treating high-APR debt like a financial emergency. What is the primary financial reasoning behind this advice?", "options": [{"text": "High-APR debt can lead to legal issues if not paid quickly.", "isCorrect": false, "rationale": "While defaulting on debt can have legal consequences, the text's rationale specifically focuses on the opportunity cost and superior guaranteed return of paying off high-interest debt."}, {"text": "Creditors are more likely to offer better terms to borrowers who pay off debt quickly.", "isCorrect": false, "rationale": "While timely payments are good for credit, the primary financial reasoning provided in the text for treating it as an emergency is about the return on investment, not improved future lending terms."}, {"text": "Paying off high-interest debt offers a guaranteed return that is hard to match with other investments.", "isCorrect": true, "rationale": "The moneytip explicitly states: 'No investment reliably returns 20% per year. Paying off high-interest debt is the best guaranteed return you can get.' This highlights the superior financial benefit of eliminating such debt."}, {"text": "It improves one's credit score faster than other financial actions.", "isCorrect": false, "rationale": "Paying off debt generally improves credit scores, but the text's specific rationale for urgency is framed in terms of financial return and avoiding ongoing high costs, not primarily credit score improvement."}], "id": "q05"}, {"question": "John is considering taking out a loan. He is evaluating two options: a $5,000 loan for a new computer needed for his freelance graphic design business, or a $5,000 loan for a vacation. Applying \"The Test for Any Debt Decision,\" which question is most critical in distinguishing between these two loan purposes in terms of \"good\" versus \"bad\" debt?", "options": [{"text": "Can I comfortably make the payments?", "isCorrect": false, "rationale": "This question is crucial for any debt, good or bad, to ensure financial stability, but it doesn't differentiate between the *type* of debt based on its purpose or outcome."}, {"text": "Is there a less expensive alternative?", "isCorrect": false, "rationale": "This is an important question for cost-efficiency, but it doesn't address the fundamental value creation aspect that defines good vs. bad debt for these two distinct purposes."}, {"text": "Does this create lasting value?", "isCorrect": true, "rationale": "The computer for the business is an income-producing asset, creating lasting financial value. The vacation is pure consumption, offering no lasting financial value. This question directly addresses the core distinction between good and bad debt."}, {"text": "What is the interest rate on the loan?", "isCorrect": false, "rationale": "The interest rate affects the *cost* of the debt, but not whether the underlying purpose of the debt creates value. A high-interest loan for a business asset could still be good debt if the return is higher than the cost, while a low-interest vacation loan is still bad debt."}], "id": "q06"}, {"question": "The text describes auto loans as a \"gray area\" because cars depreciate but are often necessary. Given the advice in the \"warning\" box, what is the *best* strategy for managing an auto loan to minimize its \"bad debt\" characteristics?", "options": [{"text": "Purchase a new luxury vehicle with a long-term loan to ensure reliability.", "isCorrect": false, "rationale": "This option incorporates several elements explicitly identified as 'bad debt' characteristics for auto loans: luxury vehicle, new car, and a long-term loan."}, {"text": "Borrow as little as possible, at the lowest rate available, for the shortest term affordable, preferably for a used car.", "isCorrect": true, "rationale": "This option consolidates all the key recommendations from the 'warning' box: 'borrow as little as possible for transportation, at the lowest rate available, for the shortest term you can afford,' and explicitly favoring a used car over a new one."}, {"text": "Always pay cash for a car, regardless of personal financial situation.", "isCorrect": false, "rationale": "While paying cash avoids debt, the text acknowledges that a car is often a necessity requiring a loan, and provides strategies for managing that debt rather than demanding a cash-only approach."}, {"text": "Avoid all auto loans, even if it means difficulty getting to work.", "isCorrect": false, "rationale": "The text explicitly notes that 'almost everyone needs a car to get to work,' indicating that avoiding auto loans altogether may not be practical or desirable for many, and focuses on smart borrowing instead."}], "id": "q07"}, {"question": "Based on the definition provided, which characteristic is *essential* for a debt to be classified as \"good debt\"?", "options": [{"text": "It must have a low interest rate.", "isCorrect": false, "rationale": "While a low interest rate is desirable, the definition of good debt focuses on value creation. A debt with a higher interest rate could still be good debt if the return on investment significantly exceeds that cost."}, {"text": "It must be used to acquire an asset or skill expected to increase in value or generate income greater than the cost of the debt.", "isCorrect": true, "rationale": "This is the direct definition of good debt provided in the text: 'Good debt is borrowing used to acquire an asset or skill that is expected to increase in value or generate income greater than the cost of the debt.'"}, {"text": "It must be secured by collateral.", "isCorrect": false, "rationale": "The definition of good debt does not require it to be secured. While some good debts (like mortgages) are secured, others (like some student loans or business loans) might not be, yet still meet the 'value creation' criteria."}, {"text": "It must be paid off within a short timeframe.", "isCorrect": false, "rationale": "Many forms of good debt, such as mortgages or long-term student loans, are designed to be paid off over many years, contradicting the idea that a short timeframe is essential."}], "id": "q08"}, {"question": "Consider two individuals: Alex takes a loan to expand his successful landscaping business, while Brenda takes a loan to purchase expensive designer clothes for an upcoming event. Applying the concepts from the section, how would their debts generally be categorized?", "options": [{"text": "Both Alex and Brenda have good debt, as they are investing in their personal needs.", "isCorrect": false, "rationale": "Brenda's loan for designer clothes is for consumption of a depreciating item, not an investment that creates lasting value or income, making it bad debt."}, {"text": "Alex has good debt because it generates income, while Brenda has bad debt because it is for consumption of depreciating items.", "isCorrect": true, "rationale": "Alex's business loan is used to 'expand a business that generates income greater than the loan cost,' fitting the definition of good debt. Brenda's loan is for 'pure consumption' of 'items that lose value immediately,' classifying it as bad debt."}, {"text": "Both Alex and Brenda have bad debt, as all loans carry interest.", "isCorrect": false, "rationale": "This statement contradicts the core premise of the section, which differentiates between debt that creates value and debt that does not, regardless of interest."}, {"text": "Alex has bad debt because he is adding to business overhead, while Brenda has good debt because it boosts her confidence.", "isCorrect": false, "rationale": "This mischaracterizes business loans (which can be good debt if they generate more income than their cost) and misinterprets the definition of good debt (confidence is not a financial return on investment)."}], "id": "q09"}, {"question": "The \"didyouknow\" section highlights the average American household debt and states that managing debt is a valuable life skill. What is the overarching message about personal finance conveyed by the concepts of good debt vs. bad debt?", "options": [{"text": "All debt should be avoided at all costs, as it reduces net worth.", "isCorrect": false, "rationale": "The section clearly distinguishes 'good debt' that can *increase* net worth or earning power, contradicting the idea that all debt should be avoided."}, {"text": "Debt is an unavoidable part of modern life and doesn't require careful management.", "isCorrect": false, "rationale": "While the text acknowledges debt is common, the entire section and the 'didyouknow' emphasize that *understanding how to manage* debt is a valuable life skill, implying careful management is essential."}, {"text": "Strategic borrowing for investments that generate value or income can be beneficial, but borrowing for depreciating assets or consumption should be minimized or avoided due to its net negative impact.", "isCorrect": true, "rationale": "This statement accurately synthesizes the core message: differentiate debt based on whether it creates value (good debt to be used strategically) or loses value (bad debt to be minimized or avoided), and manage it effectively."}, {"text": "The type of debt doesn't matter as much as the ability to make payments on time.", "isCorrect": false, "rationale": "The entire section is dedicated to illustrating *why* the type of debt matters significantly, beyond just payment ability, due to its impact on long-term financial health and net worth."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
