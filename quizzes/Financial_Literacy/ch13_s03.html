<script>
var QUESTIONS = [{"question": "Based on the car loan example provided, what is the primary financial implication of having a 'Fair' credit score (600) compared to a 'Very Good' credit score (750) for a $20,000 car loan over 5 years?", "options": [{"text": "The monthly payment will be slightly lower, but the total interest paid will be higher due to longer repayment terms.", "isCorrect": false, "rationale": "The example clearly shows that a 'Fair' score leads to a significantly higher monthly payment and higher total interest over the *same* repayment term (5 years)."}, {"text": "The borrower will likely be denied the loan outright due to the lower score.", "isCorrect": false, "rationale": "While a lower score can lead to denial, Person B with a 600 score was offered a loan, albeit at a much higher interest rate. Denial is more typical for scores below 580."}, {"text": "The borrower will pay significantly more in total interest and have a higher monthly payment for the same loan amount.", "isCorrect": true, "rationale": "The example demonstrates that Person B (score 600) pays $68 more per month and $4,080 more in total interest compared to Person A (score 750) for the exact same car and loan terms."}, {"text": "The interest rate offered will be identical, but the loan term might be shorter to mitigate risk.", "isCorrect": false, "rationale": "The example shows a drastic difference in interest rates (5% vs. 12% APR) for the two different scores, and the loan term remained the same (5 years)."}]}, {"question": "According to the 'moneytip' section, what is the long-term financial impact of maintaining a 'Poor' credit score compared to a 'Good' credit score?", "options": [{"text": "It can result in a one-time penalty fee when opening a new credit account.", "isCorrect": false, "rationale": "The text emphasizes the cumulative cost over a lifetime, specifically mentioning 'extra interest on car loans, mortgages, and credit cards,' not a single penalty fee."}, {"text": "It can cost tens of thousands of dollars or more over a lifetime due to increased interest on various loans.", "isCorrect": true, "rationale": "The 'moneytip' explicitly states that 'The credit score difference between “Poor” and “Good” can easily cost you $50,000 to $100,000 or more over your lifetime when you add up the extra interest on car loans, mortgages, and credit cards.'"}, {"text": "It might prevent you from getting approved for certain luxury goods, but not essential services.", "isCorrect": false, "rationale": "The text discusses significant financial impacts on essential loans (cars, mortgages, credit cards) and housing, not just luxury goods."}, {"text": "It primarily affects only mortgage interest rates, not other types of credit.", "isCorrect": false, "rationale": "The text clearly lists car loans, mortgages, and credit cards as areas where higher interest due to a lower score will accumulate over time."}]}, {"question": "A recent college graduate, Maria, has never had a credit card or taken out a loan. She applies for her first apartment. Based on the text, what is the most likely challenge she will face regarding her credit history?", "options": [{"text": "Landlords will likely approve her immediately because she has no negative credit marks.", "isCorrect": false, "rationale": "The text states that 'no credit history at all (“thin file”)' means 'Lenders cannot assess your risk, so they may decline or require a co-signer,' and landlords often 'run a credit check before renting' and may decline if they cannot assess risk."}, {"text": "She will be asked to provide a significantly larger security deposit, regardless of her income.", "isCorrect": true, "rationale": "The 'realworld' example mentions that 'Some landlords will work with lower scores if you can provide a larger security deposit or a co-signer,' which also applies to a thin file where risk is unassessed. Additionally, the 'What Happens at the Extremes?' section notes that for those with below 580 (which is similar to no history in terms of risk assessment), 'Landlords may require extra deposits.'"}, {"text": "Her application will be automatically rejected because a lack of credit history is treated the same as a very poor score.", "isCorrect": false, "rationale": "While the result is 'often the same' as a poor score, the text states 'may decline or require a co-signer,' not necessarily an automatic rejection in all cases, especially if other options like a larger deposit are available."}, {"text": "She will be required to get a co-signer, but only if her income is insufficient.", "isCorrect": false, "rationale": "The text suggests a co-signer might be required due to the lack of credit history (inability to assess risk), not solely based on income, although income is also a factor in overall financial stability."}]}, {"question": "Which of the following scenarios best illustrates the consequence of a credit score 'below 580' as described in the text?", "options": [{"text": "Being offered an attractive 5% APR on a car loan, but only after providing extensive financial documentation.", "isCorrect": false, "rationale": "A score below 580 typically results in 'very high rates' or denial, not an attractive 5% APR."}, {"text": "Successfully renting an apartment with no issues, assuming a stable income.", "isCorrect": false, "rationale": "The text states that for scores below 620/630, landlords often result in an 'automatic decline,' and for scores below 580, landlords 'may require extra deposits or refuse to rent to you at all.'"}, {"text": "Having many lenders reject a loan application, and any approvals coming with extremely high interest rates.", "isCorrect": true, "rationale": "The text explicitly states: 'If your score is below 580: Many lenders will simply reject your application. Those who do approve will charge very high rates.'"}, {"text": "Being actively courted by multiple lenders offering competitive rates and terms.", "isCorrect": false, "rationale": "This scenario describes the experience of someone with a score of '800+' where 'Lenders compete for your business,' not someone with a score below 580."}]}, {"question": "Based on the information, what is a key reason why 'no credit history at all' (a 'thin file') can be problematic, even if the individual has never missed a payment?", "options": [{"text": "Lenders will assume a lack of financial responsibility if no credit history is present.", "isCorrect": false, "rationale": "The text states lenders 'cannot assess your risk,' not that they assume irresponsibility. The problem is the unknown, not a negative assumption."}, {"text": "It signals to lenders that the individual prefers cash transactions, which are viewed negatively.", "isCorrect": false, "rationale": "The text does not mention anything about cash transactions or negative views of them. The issue is risk assessment."}, {"text": "Lenders are unable to assess the individual's creditworthiness or risk level without prior data.", "isCorrect": true, "rationale": "The text clearly states: 'Lenders cannot assess your risk, so they may decline or require a co-signer.' This is the core problem with a 'thin file.'"}, {"text": "A 'thin file' automatically categorizes an individual into the 'Poor' credit score range.", "isCorrect": false, "rationale": "The text distinguishes: 'This is different from a poor score—but the result is often the same.' It doesn't mean it's the same category."}]}, {"question": "Person A (score 750) and Person B (score 600) both took out a $20,000 car loan for 5 years. How much more interest did Person B pay compared to Person A over the life of the loan?", "options": [{"text": "$2,620", "isCorrect": false, "rationale": "This is the total interest paid by Person A, not the difference between the two."}, {"text": "$6,700", "isCorrect": false, "rationale": "This is the total interest paid by Person B, not the difference between the two."}, {"text": "$4,080", "isCorrect": true, "rationale": "The text states: 'Total interest paid: approximately $2,620' for Person A and 'approximately $6,700' for Person B. The difference is $6,700 - $2,620 = $4,080."}, {"text": "$68", "isCorrect": false, "rationale": "This is the difference in monthly payments, not the total interest paid over the life of the loan."}]}, {"question": "If your credit score is 800+, what is a typical experience you can expect when applying for credit?", "options": [{"text": "You will be approved for loans, but often with standard, average interest rates.", "isCorrect": false, "rationale": "The text states, 'You will be offered the best rates available,' not just standard rates."}, {"text": "Lenders will likely compete for your business, offering the most favorable rates and terms.", "isCorrect": true, "rationale": "The text explicitly states: 'If your score is 800+: You will be offered the best rates available. Lenders compete for your business. You will rarely be denied credit.'"}, {"text": "You will frequently be denied credit because lenders assume you don't need it.", "isCorrect": false, "rationale": "The text says you will 'rarely be denied credit,' which is the opposite of frequent denial."}, {"text": "You will only qualify for credit cards, not larger loans like mortgages or car loans.", "isCorrect": false, "rationale": "An 800+ score indicates excellent creditworthiness, qualifying for all types of loans with the best terms, not just credit cards."}]}, {"question": "Why does the section advise building credit 'before you need to rent an apartment'?", "options": [{"text": "Landlords prefer tenants who have previous rental history, which is linked to credit scores.", "isCorrect": false, "rationale": "While rental history can be a factor, the text focuses on credit checks: 'Most landlords run a credit check before renting.' Building credit helps with this check, not necessarily directly with rental history."}, {"text": "Having established credit allows you to pay a lower security deposit automatically.", "isCorrect": false, "rationale": "While a good score might prevent needing a larger deposit, it doesn't guarantee a 'lower' deposit than standard. The main benefit is avoiding automatic decline or the need for extra measures."}, {"text": "It gives you more options and a better chance of approval since scores below 620/630 often lead to automatic decline.", "isCorrect": true, "rationale": "The 'realworld' example states: 'A score below 620 or 630 will often result in an automatic decline... Starting to build credit before you need to rent an apartment gives you far more options when the time comes.'"}, {"text": "Property managers are legally required to give preference to applicants with established credit.", "isCorrect": false, "rationale": "The text does not mention any legal requirements for preference; it discusses the practical implications of credit checks for landlords."}]}, {"question": "Which statement best encapsulates why a credit score is described as 'one of the most valuable financial assets you will ever own'?", "options": [{"text": "It can be directly converted into cash in emergencies.", "isCorrect": false, "rationale": "A credit score cannot be directly converted to cash. Its value comes from facilitating access to favorable financial products."}, {"text": "It acts as a guarantee for all future financial transactions, eliminating the need for collateral.", "isCorrect": false, "rationale": "While a good score reduces risk, it doesn't eliminate the need for collateral in all cases. Its value is about interest rates and access to credit."}, {"text": "Its impact on interest rates and loan approvals can save or cost you tens to hundreds of thousands of dollars over your lifetime.", "isCorrect": true, "rationale": "The 'moneytip' states it 'can easily cost you $50,000 to $100,000 or more over your lifetime' due to extra interest, making it extremely valuable for its ability to save money."}, {"text": "It allows you to avoid paying any interest on loans if your score is high enough.", "isCorrect": false, "rationale": "Even with the best scores, loans still accrue interest; a high score secures the *best available* rates, not zero interest."}]}, {"question": "Beyond loan approvals and interest rates, in what other area might a low credit score (below 580) negatively impact an individual's life?", "options": [{"text": "Difficulty in obtaining a driver's license or car insurance.", "isCorrect": false, "rationale": "The text does not mention any impact on driver's licenses. While credit can affect insurance premiums, the text does not detail this for scores below 580, focusing on other areas."}, {"text": "Inability to purchase a home outright with cash.", "isCorrect": false, "rationale": "If a person has cash, their credit score is irrelevant for an outright purchase. The issue arises when financing is needed."}, {"text": "Negative perception by some employers for certain job positions and challenges in securing rental housing.", "isCorrect": true, "rationale": "The text states: 'Landlords may require extra deposits or refuse to rent to you at all. Some employers will view this negatively for certain positions.'"}, {"text": "Automatic disqualification from all government assistance programs.", "isCorrect": false, "rationale": "The text does not mention any connection between credit scores and government assistance programs."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
