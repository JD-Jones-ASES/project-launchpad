<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 18, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement accurately distinguishes a bond from a stock?", "options": [{"text": "A bond represents ownership in a company, while a stock represents lending money to a company.", "isCorrect": false, "rationale": "This statement is incorrect. Stocks represent ownership, and bonds represent lending."}, {"text": "A bond represents lending money to a government or corporation, while a stock represents ownership in a company.", "isCorrect": true, "rationale": "As stated in the text, 'While stocks represent ownership, bonds represent lending.' When you buy a bond, you are loaning money to an issuer."}, {"text": "Both bonds and stocks represent ownership in a company, but bonds are less risky.", "isCorrect": false, "rationale": "This statement is incorrect. Bonds represent lending, not ownership."}, {"text": "Both bonds and stocks represent lending money, but stocks offer higher interest payments.", "isCorrect": false, "rationale": "This statement is incorrect. Stocks represent ownership, and they offer dividends, not interest payments in the same way bonds do."}], "id": "q01"}, {"question": "An investor purchases a bond with a stated value of $1,000, which the issuer promises to repay at the end of the bond's term. This $1,000 is known as the bond's:", "options": [{"text": "Coupon rate", "isCorrect": false, "rationale": "The coupon rate is the annual interest rate, expressed as a percentage, not the principal amount."}, {"text": "Bond yield", "isCorrect": false, "rationale": "Bond yield is the actual return earned, which considers the purchase price, not the original principal amount."}, {"text": "Face value", "isCorrect": true, "rationale": "The text defines 'Face Value' (also called par value or principal) as 'the amount borrowed—the amount the issuer will repay you at maturity.'"}, {"text": "Maturity", "isCorrect": false, "rationale": "Maturity is the date when the bond expires, not the amount repaid."}], "id": "q02"}, {"question": "A corporation issues a bond with a face value of $2,000 and a coupon rate of 4.5%. How much will the bond pay in annual interest?", "options": [{"text": "$45", "isCorrect": false, "rationale": "This calculation would be incorrect. The annual coupon payment is Face Value × Coupon Rate. $2,000 × 0.045 = $90."}, {"text": "$90", "isCorrect": true, "rationale": "The annual coupon payment is calculated as Face Value × Coupon Rate. So, $2,000 × 0.045 = $90."}, {"text": "$450", "isCorrect": false, "rationale": "This calculation would be incorrect. The annual coupon payment is Face Value × Coupon Rate. $2,000 × 0.045 = $90."}, {"text": "$2,000", "isCorrect": false, "rationale": "This is the face value, not the annual interest payment."}], "id": "q03"}, {"question": "An investor purchases a bond with a face value of $1,000 and a 6% coupon rate. The investor buys the bond on the secondary market for $980. What is the current bond yield for this investor?", "options": [{"text": "5.88%", "isCorrect": false, "rationale": "This would be the yield if purchased at a premium. The current yield formula is (Annual Coupon Payment / Purchase Price) × 100%. Annual Coupon Payment = $1,000 × 0.06 = $60. Current Yield = ($60 / $980) × 100% ≈ 6.122%."}, {"text": "6.00%", "isCorrect": false, "rationale": "This is the coupon rate. The yield is only equal to the coupon rate if the bond is purchased at face value. Since it was purchased at a discount, the yield will be higher."}, {"text": "6.12%", "isCorrect": true, "rationale": "First, calculate the annual coupon payment: $1,000 (face value) × 0.06 (coupon rate) = $60. Then, apply the Current Yield formula: Current Yield = (Annual Coupon Payment / Purchase Price) × 100% = ($60 / $980) × 100% ≈ 6.122%."}, {"text": "6.25%", "isCorrect": false, "rationale": "This calculation would be incorrect. The annual coupon payment is $60. Current Yield = ($60 / $980) × 100% ≈ 6.122%."}], "id": "q04"}, {"question": "Why does buying a bond at a price below its face value result in a bond yield higher than its coupon rate?", "options": [{"text": "Because the annual interest payment increases when the bond is bought at a discount.", "isCorrect": false, "rationale": "The annual coupon payment (interest payment) is fixed based on the face value and coupon rate and does not change when the bond is bought at a discount or premium."}, {"text": "Because the investor receives the same fixed interest payments for a lower initial investment.", "isCorrect": true, "rationale": "As explained in the text's example, 'You paid less, but the coupon payment stayed the same—so your effective return is higher.' The fixed annual coupon payment represents a larger percentage of a smaller initial investment."}, {"text": "Because the face value of the bond automatically adjusts upwards to compensate for the discount.", "isCorrect": false, "rationale": "The face value is a fixed amount repaid at maturity and does not adjust due to secondary market prices."}, {"text": "Because the bond's maturity date is extended, allowing more time for interest to accrue.", "isCorrect": false, "rationale": "The maturity date is fixed and does not change based on the purchase price."}], "id": "q05"}, {"question": "Which statement accurately describes the relationship between bond prices and market interest rates?", "options": [{"text": "Bond prices move in the same direction as market interest rates; when rates rise, bond prices rise.", "isCorrect": false, "rationale": "This is incorrect. The text explicitly states, 'bond prices move opposite to interest rates.'"}, {"text": "Bond prices are unaffected by changes in market interest rates, as their coupon rates are fixed.", "isCorrect": false, "rationale": "This is incorrect. While coupon rates are fixed, changes in market interest rates make existing bonds more or less attractive, which affects their prices."}, {"text": "Bond prices move opposite to market interest rates; when rates rise, existing bond prices fall.", "isCorrect": true, "rationale": "The text clearly states, 'bond prices move opposite to interest rates.' When new bonds offer higher rates, existing bonds with lower fixed rates become less attractive, causing their prices to fall."}, {"text": "Bond prices only change if the issuer's credit rating changes, not due to general market interest rates.", "isCorrect": false, "rationale": "This is incorrect. While credit ratings do affect bond prices, general market interest rates are also a major factor impacting bond prices."}], "id": "q06"}, {"question": "A bond with a rating of 'BBB' is classified as:", "options": [{"text": "High-yield bond", "isCorrect": false, "rationale": "High-yield (or 'junk') bonds are typically rated below BBB."}, {"text": "Lowest quality, highest risk bond", "isCorrect": false, "rationale": "AAA is highest quality, lowest risk. BBB is still investment grade, but not the lowest."}, {"text": "Investment-grade bond", "isCorrect": true, "rationale": "The text states that bonds rated from AAA down through BBB are considered 'investment-grade'."}, {"text": "Risk-free bond", "isCorrect": false, "rationale": "No bond is entirely risk-free, and BBB indicates some level of risk, though still investment grade."}], "id": "q07"}, {"question": "According to the text, why might a financial planner recommend holding bonds alongside stocks in an investment portfolio?", "options": [{"text": "Bonds consistently earn more than stocks over the long run.", "isCorrect": false, "rationale": "The text states that bonds 'typically earn less than stocks over the long run.'"}, {"text": "Bonds guarantee capital appreciation, offsetting any stock losses.", "isCorrect": false, "rationale": "Bonds do not guarantee capital appreciation; their prices can fall, especially when interest rates rise."}, {"text": "Bonds tend to be less volatile than stocks and can help stabilize the portfolio.", "isCorrect": true, "rationale": "The 'moneytip' section highlights that bonds 'tend to be less volatile' and can 'smooth out the ride' in a portfolio, holding value when stocks fall."}, {"text": "Bonds offer higher liquidity than stocks, allowing for quick cash access.", "isCorrect": false, "rationale": "The text does not discuss liquidity benefits of bonds over stocks; its focus is on volatility and stability."}], "id": "q08"}, {"question": "An investor is considering two bonds: Bond A matures in 18 months, and Bond B matures in 25 years. Based on the text, how would these bonds be categorized by their maturity period?", "options": [{"text": "Bond A is a long-term bond, and Bond B is a short-term bond.", "isCorrect": false, "rationale": "This is incorrect. A bond maturing in 18 months (1.5 years) is short-term, and 25 years is long-term."}, {"text": "Bond A is a short-term bond, and Bond B is a long-term bond.", "isCorrect": true, "rationale": "The text defines 'Short-term bonds mature in a few months to 2 years,' which applies to Bond A (18 months). 'Long-term bonds can take 10, 20, or even 30 years,' which applies to Bond B (25 years)."}, {"text": "Both Bond A and Bond B are medium-term bonds.", "isCorrect": false, "rationale": "This is incorrect. The text distinguishes between short-term (up to 2 years) and long-term (10+ years) bonds, and these two bonds fall into different categories."}, {"text": "Maturity period categorization depends on the coupon rate, not the time to expiry.", "isCorrect": false, "rationale": "This is incorrect. Maturity explicitly refers to the 'date when the bond expires,' which is the time period."}], "id": "q09"}, {"question": "If you purchase a bond for $1,050, when its face value is $1,000, and it has a 4% coupon rate, what does this scenario imply about your current yield compared to the coupon rate?", "options": [{"text": "Your current yield will be higher than 4% because you paid more for the bond.", "isCorrect": false, "rationale": "This is incorrect. Paying more than the face value (a premium) means your effective return is lower because your fixed annual coupon payment is a smaller percentage of your higher initial investment."}, {"text": "Your current yield will be equal to 4% because the coupon rate is fixed.", "isCorrect": false, "rationale": "This is incorrect. The yield equals the coupon rate only if the bond is purchased at face value. Since it was bought at a premium, the yield will be lower."}, {"text": "Your current yield will be lower than 4% because you paid a premium for the bond.", "isCorrect": true, "rationale": "As illustrated in the Quick Check example, when you pay more than face value (a premium), your yield will be lower than the coupon rate because the fixed annual coupon payment represents a smaller percentage of your higher initial investment. ($40 / $1050 = 3.809%)."}, {"text": "The coupon rate automatically adjusts to match your purchase price, so yield remains 4%.", "isCorrect": false, "rationale": "This is incorrect. The coupon rate is fixed based on the face value and does not adjust to the purchase price."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
