<script>
var QUESTIONS = [{"question": "According to the section, what is identified as the most effective strategy for consistent giving?", "options": [{"text": "Donating only when unexpected bonuses or windfalls occur.", "isCorrect": false, "rationale": "The text explicitly states that giving 'only when there is money “left over” rarely happens at all' because it's unplanned and inconsistent."}, {"text": "Treating giving as a planned, automatic, and non-negotiable budget category.", "isCorrect": true, "rationale": "The text directly states: 'The most effective way to give consistently is to treat it like any other budget category: planned, automatic, and non-negotiable.'"}, {"text": "Setting aside money for charity only after all other expenses and savings goals are covered.", "isCorrect": false, "rationale": "This approach is similar to giving 'when there is money left over,' which the text identifies as ineffective for consistent giving. The advice is to put giving first, like savings."}, {"text": "Impulsively giving whenever a compelling cause or emotional appeal arises.", "isCorrect": false, "rationale": "Impulse giving is contrasted with automatic giving; the latter ensures consistency 'regardless of mood or impulse spending.'"}], "id": "q01"}, {"question": "A young adult, just starting their career with a tight budget, asks for advice on how to begin incorporating generosity into their financial life. Based on the text, what is the most appropriate advice?", "options": [{"text": "Wait until their income is substantial enough to make a significant impact, like 10% of their earnings.", "isCorrect": false, "rationale": "The text advises 'start small' and explicitly mentions 'even 1% of your income' as a meaningful start, emphasizing habit over initial amount."}, {"text": "Focus solely on volunteering their time until their financial situation significantly improves.", "isCorrect": false, "rationale": "While volunteering is valued, the text encourages starting financial giving 'even 1%' to build the habit, rather than waiting entirely."}, {"text": "Start with a small, consistent financial contribution, such as 1% of their income, to build the habit.", "isCorrect": true, "rationale": "The text advises: 'If you are just starting out and money is tight, start small. Even 1% of your income... is a meaningful start. The habit of generosity, built early, tends to grow over time.'"}, {"text": "Only give money if they can afford to make a one-time large donation to a reputable charity.", "isCorrect": false, "rationale": "The text emphasizes consistency ('small amounts given consistently over years accumulate into something real') over one-time large donations, especially when starting out."}], "id": "q02"}, {"question": "Sarah wants to ensure her charitable contributions are consistent and not subject to her monthly impulse spending. Which approach, described in the text, would best help her achieve this goal?", "options": [{"text": "Setting a mental reminder each month to review her finances and decide how much to give.", "isCorrect": false, "rationale": "Mental reminders are not 'automatic' and would still be subject to 'mood or impulse spending,' which the text advises against."}, {"text": "Only giving to causes that emotionally resonate with her at the moment she has 'extra' money.", "isCorrect": false, "rationale": "This aligns with 'Approach A' ('I'll give when I have extra money'), which the text states 'rarely results in consistent giving.'"}, {"text": "Automating a fixed monthly donation to her chosen charity, set up to occur before other spending.", "isCorrect": true, "rationale": "The text advocates 'Automatic Giving,' stating 'Set it up once, and giving happens without any additional decision-making. This is exactly the same psychology that makes automatic retirement contributions so powerful.'"}, {"text": "Keeping a separate savings account specifically for donations and only transferring money when it's full.", "isCorrect": false, "rationale": "While a dedicated fund, this still requires a manual decision to transfer, which may not ensure consistency 'before other spending' and is not as automatic as setting up recurring monthly donations."}], "id": "q03"}, {"question": "When evaluating a charity to ensure your money accomplishes something, which of the following is NOT explicitly listed as a question worth researching in the text?", "options": [{"text": "What percentage of donations goes to programs versus overhead?", "isCorrect": false, "rationale": "This is explicitly listed: 'What percentage of donations goes to programs vs. overhead?'"}, {"text": "How long has the organization been in operation and what is its historical impact?", "isCorrect": true, "rationale": "While related to evaluating an organization's mission and effectiveness, this specific question about 'historical impact' or 'how long in operation' is not explicitly listed among the recommended research questions."}, {"text": "Can you clearly explain their mission in one sentence?", "isCorrect": false, "rationale": "This is explicitly listed: 'Can you clearly explain their mission in one sentence?'"}, {"text": "Is it a qualified 501(c)(3) organization?", "isCorrect": false, "rationale": "This is explicitly listed: 'Is it a qualified 501(c)(3)? You can verify this for free on the IRS website.'"}], "id": "q04"}, {"question": "The text highlights that volunteering offers more than just the direct impact of the service. Which of the following best summarizes these additional personal benefits for the volunteer?", "options": [{"text": "It primarily serves as a way to avoid financial giving when money is tight.", "isCorrect": false, "rationale": "The text presents volunteering as having intrinsic value ('Time Has Value Too') and building personal benefits, not merely as an avoidance tactic for financial giving."}, {"text": "It guarantees significant financial returns through networking opportunities.", "isCorrect": false, "rationale": "While 'community connections' are mentioned, the text does not promise 'significant financial returns' as a guaranteed benefit of volunteering."}, {"text": "It builds skills, community connections, and a sense of purpose.", "isCorrect": true, "rationale": "The text explicitly states: 'Volunteering also builds skills, community connections, and a sense of purpose — all of which are worth something beyond the act of giving itself.'"}, {"text": "It allows individuals to gain tax deductions equal to financial donations.", "isCorrect": false, "rationale": "The text focuses on the intrinsic, non-monetary benefits of volunteering and does not discuss tax deductions related to time or skills."}], "id": "q05"}, {"question": "Emily earns $3,000 a month and decides to give 1% of her income consistently. Based on the principles in the 'Math of Consistent Small Giving' section, what is the most important long-term outcome of her decision?", "options": [{"text": "Her financial stability will likely decrease due to the regular outflow of funds.", "isCorrect": false, "rationale": "The text suggests that 'the giving habit grows' as financial stability improves, implying it contributes to, rather than detracts from, stability in the long run, especially at a small percentage."}, {"text": "The small habit, maintained consistently, will accumulate into a substantial amount over many years, with potential for even greater impact as her income grows.", "isCorrect": true, "rationale": "The 'Math of Consistent Small Giving' section demonstrates how 'Small amounts given consistently over years accumulate into something real' and how 'As income grows and the giving habit grows with it... the annual and lifetime impact grows significantly.'"}, {"text": "She will experience immediate and significant recognition from the charities she supports.", "isCorrect": false, "rationale": "The text focuses on the cumulative financial impact and personal habit, not immediate external recognition for small contributions."}, {"text": "Her giving will primarily serve as a temporary measure until she can afford much larger, sporadic donations.", "isCorrect": false, "rationale": "The text emphasizes the importance of consistent, planned giving over sporadic donations, regardless of size."}], "id": "q06"}, {"question": "What is the primary purpose of building a 'giving portfolio' as described in the section?", "options": [{"text": "To ensure all charitable donations qualify for the maximum possible tax deductions.", "isCorrect": false, "rationale": "Tax deductions are not mentioned as the primary purpose of a giving portfolio in this section."}, {"text": "To diversify one's charitable impact across different types of organizations or causes, similar to diversifying investments.", "isCorrect": true, "rationale": "The text states: 'Just as you diversify investments across different assets, some people diversify their giving across different types of organizations.'"}, {"text": "To concentrate all giving efforts on a single, highly trusted organization for maximum efficiency.", "isCorrect": false, "rationale": "While this is presented as a valid approach for some, the concept of a 'giving portfolio' specifically refers to diversification, not concentration. The text notes 'Some people give everything to one organization... Others spread giving widely. Both are valid.'"}, {"text": "To primarily support only local organizations within one's immediate community.", "isCorrect": false, "rationale": "The text describes a giving portfolio as potentially including local, national or global, and personal causes, indicating a broader scope than just local."}], "id": "q07"}, {"question": "The text states, 'Financial literacy without generosity is just accumulation.' What does this statement imply about the ultimate goal of personal finance education according to the authors?", "options": [{"text": "That the primary aim of financial education is to maximize personal wealth and assets.", "isCorrect": false, "rationale": "The statement directly challenges this by calling pure accumulation 'just accumulation' and not a 'full financial life.'"}, {"text": "That true financial well-being extends beyond personal wealth to include the ability to positively impact others.", "isCorrect": true, "rationale": "The text clarifies that 'A good financial life is not measured only by the balance in your accounts. It is measured by what that money enables: security, freedom, opportunity, and the ability to care for yourself and others,' and that 'A full financial life — one worth living — includes intentional giving.'"}, {"text": "That generosity is a mandatory legal requirement for anyone achieving financial literacy.", "isCorrect": false, "rationale": "The text discusses generosity as an ethical and philosophical component of a full life, not a legal mandate."}, {"text": "That individuals should prioritize giving over all other financial goals, including saving and investing.", "isCorrect": false, "rationale": "The 'give first, save second' rule suggests an intentional sequence, but does not advocate for ignoring saving and investing; it integrates giving *into* a comprehensive financial plan."}], "id": "q08"}, {"question": "John is struggling to consistently save and give to charity, often finding he has no money left at the end of the month. Based on the 'moneytip' about 'give first, save second,' what strategy should he prioritize to improve his financial habits?", "options": [{"text": "Increase his income significantly before attempting to save or give.", "isCorrect": false, "rationale": "While increasing income can help, the advice focuses on changing *how* current income is managed, emphasizing habit over amount or income level."}, {"text": "Set aside money for giving and saving *before* allocating funds for other discretionary spending.", "isCorrect": true, "rationale": "The moneytip explicitly states: 'give first, save second, live on the rest... putting giving first — like savings — ensures it actually happens.'"}, {"text": "Wait until all his essential bills are paid, then see if there's any money remaining for giving or saving.", "isCorrect": false, "rationale": "This is the 'money left over' approach that the text states 'rarely happens at all' and is not effective for consistent giving or saving."}, {"text": "Focus solely on paying down debt, deferring all giving and saving until he is debt-free.", "isCorrect": false, "rationale": "The text encourages starting small with giving and saving *now* to build habits, rather than deferring entirely, even if debt is a factor."}], "id": "q09"}, {"question": "Which of the following best encapsulates the overarching message of the 'Building Generosity into Your Budget' section?", "options": [{"text": "Generosity is primarily for the wealthy and should only be considered after achieving significant financial milestones.", "isCorrect": false, "rationale": "This contradicts the advice to 'start small' (even 1% of income) and build the habit early, regardless of current financial status."}, {"text": "The most impactful way to give is through sporadic large donations rather than consistent small ones.", "isCorrect": false, "rationale": "The section repeatedly emphasizes that 'Small amounts given consistently over years accumulate into something real' and the power of consistent, automatic giving."}, {"text": "Intentional, planned, and consistent generosity, whether financial or through time, is a fundamental component of a full and meaningful financial life.", "isCorrect": true, "rationale": "This option synthesizes the key themes: the importance of planning and consistency, the value of both financial and time-based generosity, and the idea that generosity is essential for a 'full financial life' and not just accumulation."}, {"text": "The evaluation of charities' overhead ratios is the single most critical factor in deciding where to donate.", "isCorrect": false, "rationale": "While important, overhead ratio is listed as one of several factors to research, not 'the single most critical,' and the section has a broader focus on the act and philosophy of giving itself."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
