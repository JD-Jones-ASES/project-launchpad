<script>
var QUESTIONS = [{"question": "Which of the following is a key advantage federal student loans offer compared to private student loans?", "options": [{"text": "Federal loans always have lower interest rates than private loans.", "isCorrect": false, "rationale": "The text states that federal loans offer more repayment options and protections, but does not guarantee lower interest rates in all cases compared to private loans, especially after refinancing."}, {"text": "Federal loans provide access to income-driven repayment plans and loan forgiveness programs like PSLF.", "isCorrect": true, "rationale": "The section explicitly states that 'Federal loans offer several repayment options that private loans simply do not have,' specifically listing IDR and PSLF as federal benefits not available with private loans."}, {"text": "Federal loans do not require a credit check for eligibility.", "isCorrect": false, "rationale": "While some federal loans (like unsubsidized Stafford loans) do not require a credit check, others (like PLUS loans) do. More importantly, the text focuses on repayment options as the key differentiator, not initial eligibility requirements."}, {"text": "Federal loans can be refinanced into private loans without losing any federal protections.", "isCorrect": false, "rationale": "The 'warning' and 'Refinancing' sections clearly state that refinancing federal loans into private ones permanently loses all federal protections, IDR options, and PSLF eligibility."}]}, {"question": "A recent graduate with a stable, high-paying job is deciding on a federal student loan repayment plan. Which plan would most likely result in the lowest total interest paid over the life of the loan?", "options": [{"text": "Income-Driven Repayment (IDR) plan", "isCorrect": false, "rationale": "IDR plans typically result in significantly higher total interest over the life of the loan because payments are lower in the early years, allowing more interest to accrue, and the repayment period can extend to 20-25 years."}, {"text": "Graduated Repayment Plan", "isCorrect": false, "rationale": "The Graduated Repayment Plan results in paying more total interest than the standard plan because lower payments in the early years allow more interest to accrue, even though the loan is typically paid off over 10 years."}, {"text": "Standard Repayment Plan", "isCorrect": true, "rationale": "The text states that the Standard Repayment Plan 'minimizes the total interest you pay over the life of the loan—you pay it off the fastest and cheapest.' This is ideal for someone who can afford the fixed monthly payments."}, {"text": "Public Service Loan Forgiveness (PSLF)", "isCorrect": false, "rationale": "PSLF is a forgiveness program, not a repayment plan that minimizes total interest through payments. While it can result in a lower *out-of-pocket* cost for eligible borrowers, the underlying IDR plan often accrues significant interest before forgiveness."}]}, {"question": "The Graduated Repayment Plan is best suited for borrowers who:", "options": [{"text": "Want the lowest possible monthly payments for the entire loan term.", "isCorrect": false, "rationale": "While payments start lower, they increase every two years. IDR plans are designed for the lowest possible payments relative to income over the entire term if income remains low."}, {"text": "Expect their income to steadily increase over time.", "isCorrect": true, "rationale": "The text explicitly states the Graduated Repayment Plan is 'Designed for borrowers who expect their income to rise steadily,' as payments start low and increase every two years."}, {"text": "Are seeking the fastest possible loan payoff with the least total interest.", "isCorrect": false, "rationale": "The Standard Repayment Plan is designed for the fastest payoff and least total interest. The Graduated plan results in more total interest than the standard plan."}, {"text": "Work for a qualifying non-profit employer and aim for tax-free loan forgiveness.", "isCorrect": false, "rationale": "This describes the ideal candidate for Public Service Loan Forgiveness (PSLF), which requires enrollment in an IDR plan, not specifically a Graduated Repayment Plan."}]}, {"question": "What is the primary mechanism by which Income-Driven Repayment (IDR) plans adjust monthly payments?", "options": [{"text": "They cap payments based on a fixed percentage of the original loan balance.", "isCorrect": false, "rationale": "IDR plans do not cap payments based on the original loan balance. They are tied to income."}, {"text": "They automatically reduce payments by 50% for the first five years of repayment.", "isCorrect": false, "rationale": "There is no mention of an automatic 50% reduction in payments for IDR plans. Payments are dynamic based on income."}, {"text": "They cap monthly payments as a percentage of the borrower's discretionary income.", "isCorrect": true, "rationale": "The text clearly states: 'IDR plans cap your monthly payment as a percentage of your discretionary income (roughly: your income above 150% of the federal poverty line).'"}, {"text": "They offer a fixed monthly payment for 10 years, similar to the Standard Plan, but with a lower interest rate.", "isCorrect": false, "rationale": "IDR plans have variable monthly payments based on income, not fixed payments, and they do not inherently offer lower interest rates than other plans."}]}, {"question": "Jordan is considering PSLF. To qualify for tax-free forgiveness of the remaining balance, Jordan must meet which of the following criteria?", "options": [{"text": "Work full-time for any employer for 10 years and make 120 payments under any federal repayment plan.", "isCorrect": false, "rationale": "PSLF requires working for a *qualifying* employer (government or most nonprofits) and making qualifying payments specifically under an *IDR* plan, not just any federal plan."}, {"text": "Work full-time for a qualifying employer and make 120 qualifying payments under an IDR plan.", "isCorrect": true, "rationale": "The text states, 'If you work full-time for a qualifying employer (federal, state, or local government; most nonprofit organizations), and make 10 years (120 payments) of qualifying payments under an IDR plan, the remaining balance is forgiven—and this forgiveness is tax-free.'"}, {"text": "Work for a private, for-profit company for 10 years and maintain a low income.", "isCorrect": false, "rationale": "PSLF explicitly requires working for a qualifying government or nonprofit employer, not a private, for-profit company."}, {"text": "Refinance federal loans into private loans to achieve a lower interest rate for 10 years.", "isCorrect": false, "rationale": "Refinancing federal loans into private ones makes a borrower *ineligible* for PSLF, as it removes all federal protections."}]}, {"question": "What is the significant risk associated with refinancing federal student loans into a private loan, even if a lower interest rate is offered?", "options": [{"text": "The total amount of interest paid will always be higher with a private refinance.", "isCorrect": false, "rationale": "Refinancing might offer a lower interest rate, potentially reducing total interest if the borrower doesn't need federal protections. The risk isn't necessarily higher total interest, but the loss of other benefits."}, {"text": "The borrower permanently loses access to federal repayment plans, deferment, and forgiveness programs.", "isCorrect": true, "rationale": "The 'Refinancing' section explicitly warns: 'once you refinance federal loans into a private loan, you permanently lose all federal protections, IDR options, and PSLF eligibility.'"}, {"text": "The loan term will automatically be extended, leading to a longer repayment period.", "isCorrect": false, "rationale": "Refinancing often allows borrowers to choose a new loan term, which could be shorter or longer depending on their preference and new loan terms. It's not an automatic extension."}, {"text": "Private lenders are federally mandated to charge higher fees for refinancing federal loans.", "isCorrect": false, "rationale": "There is no mention of federal mandates for higher fees on private refinancing. The primary concern is the loss of federal protections, not guaranteed higher fees."}]}, {"question": "During a period of unemployment, a borrower with unsubsidized federal student loans receives a deferment. What is the most likely financial consequence?", "options": [{"text": "Interest will continue to accrue on their loans.", "isCorrect": true, "rationale": "The text states under 'Deferment': 'For unsubsidized loans, interest continues to accrue during deferment.' This means the principal balance will increase."}, {"text": "No interest will accrue, and the government will pay any interest that would have accrued.", "isCorrect": false, "rationale": "This scenario applies to *subsidized* loans during deferment, not unsubsidized loans."}, {"text": "The loan will be automatically forgiven after the deferment period ends.", "isCorrect": false, "rationale": "Deferment temporarily pauses payments; it does not lead to automatic forgiveness. Forgiveness programs have specific eligibility requirements."}, {"text": "The borrower's credit score will significantly decrease due to the pause in payments.", "isCorrect": false, "rationale": "Properly authorized deferment or forbearance should not negatively impact a credit score, as payments are officially paused, not missed."}]}, {"question": "Based on the 'Jordan' real-world scenario, why might Jordan consider an IDR plan or PSLF over the Standard Repayment Plan for her $30,000 federal student loans?", "options": [{"text": "Jordan wants to pay off her loans as quickly as possible and minimize total interest.", "isCorrect": false, "rationale": "The text explicitly states the Standard Plan offers the fastest payoff and minimizes total interest. IDR and PSLF are typically considered when the Standard Plan is unaffordable or when forgiveness is a possibility, not for fastest payoff or lowest interest paid *through payments*."}, {"text": "Jordan's starting salary of $38,000 may make the Standard Plan's $325.58 monthly payment difficult to manage.", "isCorrect": true, "rationale": "The text notes that for an entry-level salary like Jordan's, 'payments may be higher than you can manage,' indicating the Standard Plan's fixed payments might be a burden. IDR offers lower payments in the early years for this reason. The PSLF scenario also highlights that if Jordan's employer qualifies, an IDR plan could lead to significant tax-free forgiveness on a lower salary."}, {"text": "Jordan's loans are private, so she has no access to the Standard Repayment Plan.", "isCorrect": false, "rationale": "The scenario states Jordan has '$30,000 in federal student loans,' making her eligible for all federal repayment options, including the Standard Plan."}, {"text": "Jordan expects her income to decrease significantly in the coming years.", "isCorrect": false, "rationale": "While IDR can help with low income, the text doesn't suggest Jordan expects her income to *decrease*; rather, it focuses on the manageability of her *starting* salary and the potential for PSLF if her career path qualifies."}]}, {"question": "According to the 'moneytip' section, under what specific condition is the Standard Repayment Plan generally considered the financially optimal choice?", "options": [{"text": "When the borrower qualifies for Public Service Loan Forgiveness.", "isCorrect": false, "rationale": "If PSLF is available and the borrower meets the criteria, it can be an 'extraordinarily valuable benefit' because of tax-free forgiveness, which might make it financially superior to the Standard Plan, even with higher accrued interest."}, {"text": "When the borrower expects their income to rise steadily over 10 years.", "isCorrect": false, "rationale": "This describes the ideal candidate for the Graduated Repayment Plan, not necessarily the Standard Plan as the 'financially optimal choice' in terms of total interest."}, {"text": "When the borrower can genuinely afford the standard monthly payments.", "isCorrect": true, "rationale": "The moneytip states: 'If you can afford the standard plan, it is almost always the financially optimal choice—lowest total interest, fastest payoff.' It recommends IDR *only* if the standard payment is genuinely unaffordable."}, {"text": "When the borrower wants to extend their loan payments over 20-25 years.", "isCorrect": false, "rationale": "Extending payments over 20-25 years is characteristic of IDR plans and generally leads to significantly more total interest, which is contrary to the financial optimality of the Standard Plan."}]}, {"question": "A borrower with private student loans loses their job due to unforeseen circumstances. What options are they most likely to have for managing their loan payments during this hardship, according to the text?", "options": [{"text": "Automatic enrollment in an Income-Driven Repayment (IDR) plan with capped monthly payments.", "isCorrect": false, "rationale": "The 'warning' section clearly states, 'Private loans have none of these options. No IDR, no PSLF, no federal deferment protections.'"}, {"text": "Eligibility for Public Service Loan Forgiveness after 10 years of payments.", "isCorrect": false, "rationale": "PSLF is a federal loan benefit, not available for private loans, as stated in the 'warning' section."}, {"text": "Limited options compared to federal programs, potentially some form of deferment or forbearance at the lender's discretion.", "isCorrect": true, "rationale": "The 'warning' section states: 'If you lose your job or face a financial hardship, private lenders may offer limited options compared to federal programs.' This implies some options might exist, but they are not standardized or as robust as federal ones."}, {"text": "Immediate forgiveness of the remaining loan balance due to economic hardship.", "isCorrect": false, "rationale": "Loan forgiveness is extremely rare for private loans and is not offered as a standard option for economic hardship. Federal programs offer specific forgiveness paths like IDR forgiveness or PSLF."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
