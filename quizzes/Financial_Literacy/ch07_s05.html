<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Financial_Literacy.html">&larr; Back to Financial Literacy for High School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Financial Literacy for High School &mdash; Chapter 7, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the deadline for employers to provide employees with a $Form W-2$?", "options": [{"text": "January 31 of the following year", "isCorrect": true, "rationale": "Federal law requires employers to send W-2 forms to employees by January 31 so workers have time to complete their tax returns."}, {"text": "April 15 of the current year", "isCorrect": false, "rationale": "April 15 is the typical tax filing deadline, not the W-2 distribution deadline."}, {"text": "December 31 of the tax year", "isCorrect": false, "rationale": "December 31 marks the end of the calendar year, but employers have until January 31 of the following year to send W-2s."}, {"text": "March 1 of the following year", "isCorrect": false, "rationale": "The deadline is January 31, not March 1. Waiting until March would leave taxpayers too little time to file."}], "id": "q01"}, {"question": "Which box on the $Form W-2$ shows the federal income tax withheld from your paychecks?", "options": [{"text": "Box 2", "isCorrect": true, "rationale": "Box 2 reports the total federal income tax withheld from your paychecks throughout the year—the key number you compare to your actual tax owed."}, {"text": "Box 1", "isCorrect": false, "rationale": "Box 1 shows your total wages subject to federal income tax, not the amount withheld."}, {"text": "Box 3", "isCorrect": false, "rationale": "Box 3 shows Social Security wages, not federal income tax withheld."}, {"text": "Box 16", "isCorrect": false, "rationale": "Box 16 shows state wages, not federal income tax withheld."}], "id": "q02"}, {"question": "What is $Form 1040$ used for?", "options": [{"text": "To report all income, claim deductions and credits, and calculate taxes owed or refund due", "isCorrect": true, "rationale": "Form 1040 is the main federal individual income tax return that walks taxpayers through calculating their total tax liability."}, {"text": "To tell your employer how much tax to withhold from your paychecks", "isCorrect": false, "rationale": "That is the purpose of Form W-4, not Form 1040."}, {"text": "To report your employer's wages and taxes to the IRS", "isCorrect": false, "rationale": "That is the purpose of the W-2, which employers send to both employees and the IRS."}, {"text": "To request an extension for filing your tax return", "isCorrect": false, "rationale": "Tax extensions use a different form (Form 4868). Form 1040 is the main return itself."}], "id": "q03"}, {"question": "Which filing status typically provides a larger standard deduction than Single for an unmarried person supporting a child?", "options": [{"text": "Head of Household", "isCorrect": true, "rationale": "Head of Household status is for unmarried individuals who pay more than half the cost of maintaining a home for a qualifying person, and it carries a larger standard deduction than Single."}, {"text": "Married Filing Jointly", "isCorrect": false, "rationale": "Married Filing Jointly is only available to married couples, not single individuals."}, {"text": "Married Filing Separately", "isCorrect": false, "rationale": "This status requires being married and is generally the least advantageous option."}, {"text": "Single", "isCorrect": false, "rationale": "Single provides a smaller standard deduction than Head of Household for qualifying taxpayers."}], "id": "q04"}, {"question": "For 2024, a single person under 65 must file a federal tax return if their gross income exceeds what threshold?", "options": [{"text": "$14,600", "isCorrect": true, "rationale": "For 2024, a single filer under 65 must file if gross income exceeds $14,600—equal to the standard deduction for that filing status."}, {"text": "$12,000", "isCorrect": false, "rationale": "This figure was used in earlier years. The 2024 threshold for a single filer is $14,600."}, {"text": "$21,900", "isCorrect": false, "rationale": "$21,900 is the 2024 threshold for Head of Household filers, not Single."}, {"text": "$29,200", "isCorrect": false, "rationale": "$29,200 is the 2024 threshold for Married Filing Jointly, not Single."}], "id": "q05"}, {"question": "A student earned $8,000 last year—below the filing threshold—but had $600 in federal taxes withheld. What should they do?", "options": [{"text": "File a return to claim a refund of the withheld taxes", "isCorrect": true, "rationale": "Even below the filing threshold, you should file if taxes were withheld. The IRS cannot issue a refund unless you file a return."}, {"text": "Not file, since their income is below the threshold", "isCorrect": false, "rationale": "Choosing not to file means forfeiting the $600 refund. You always should file when taxes were withheld."}, {"text": "Wait until next year and claim the refund then", "isCorrect": false, "rationale": "Refunds can only be claimed by filing a return for the year the withholding occurred, subject to a 3-year statute of limitations."}, {"text": "Contact their employer to automatically receive the refund", "isCorrect": false, "rationale": "Employers remit withheld taxes to the IRS. Only the IRS can issue a refund, and only after a tax return is filed."}], "id": "q06"}, {"question": "What does a large tax $refund$ actually represent?", "options": [{"text": "An interest-free loan you gave the government throughout the year", "isCorrect": true, "rationale": "A refund means you overpaid during the year via withholding. The government held your money without paying you interest—effectively you gave them an interest-free loan."}, {"text": "A bonus payment from the IRS for filing on time", "isCorrect": false, "rationale": "The IRS does not pay bonuses. A refund is simply your own money returned."}, {"text": "Tax credits you earned through investment income", "isCorrect": false, "rationale": "While credits can contribute to a refund, a large refund typically means excess withholding, not investment credits."}, {"text": "Extra income that is exempt from future taxation", "isCorrect": false, "rationale": "A refund is your own overpaid money returned to you; it has no special tax status."}], "id": "q07"}, {"question": "What is the purpose of $Form W-4$?", "options": [{"text": "To instruct your employer how much federal income tax to withhold from each paycheck", "isCorrect": true, "rationale": "The W-4 (Employee's Withholding Certificate) tells your employer the amount to withhold, helping you avoid a large refund or a large tax bill."}, {"text": "To report your wages and withheld taxes at year end", "isCorrect": false, "rationale": "That is the W-2, which the employer prepares. The W-4 is filled out by the employee at the start of employment."}, {"text": "To apply for a tax extension past April 15", "isCorrect": false, "rationale": "Extensions are requested with Form 4868. The W-4 governs ongoing paycheck withholding."}, {"text": "To certify you qualify for the Earned Income Tax Credit", "isCorrect": false, "rationale": "The EITC is claimed on the 1040. The W-4 is about paycheck withholding adjustments."}], "id": "q08"}, {"question": "Which free tax assistance program offers in-person help at community centers and libraries?", "options": [{"text": "Volunteer Income Tax Assistance (VITA)", "isCorrect": true, "rationale": "VITA sites are IRS-sponsored programs staffed by trained volunteers who provide free in-person tax prep help, often at schools, libraries, and community centers."}, {"text": "The IRS Direct File program", "isCorrect": false, "rationale": "IRS Direct File is an online tool, not an in-person service."}, {"text": "TurboTax Free Edition", "isCorrect": false, "rationale": "TurboTax is a commercial product; though it has a free tier, it is not a government-sponsored in-person service."}, {"text": "AnnualCreditReport.com", "isCorrect": false, "rationale": "AnnualCreditReport.com provides free credit reports, not tax assistance."}], "id": "q09"}, {"question": "Which of the following is something the IRS would NEVER do in a legitimate contact?", "options": [{"text": "Demand immediate payment by gift card, wire transfer, or cryptocurrency", "isCorrect": true, "rationale": "Demands for unusual payment methods are hallmarks of tax scams. The IRS communicates primarily by mail and never demands payment via gift cards or crypto."}, {"text": "Send a notice in the mail explaining a balance due", "isCorrect": false, "rationale": "Mailed notices are the IRS's standard communication method. A letter about a balance due is legitimate."}, {"text": "Issue a refund electronically to a taxpayer's bank account", "isCorrect": false, "rationale": "Electronic refunds are standard IRS practice for filers who choose direct deposit."}, {"text": "Request additional documentation to verify income", "isCorrect": false, "rationale": "The IRS may legitimately request documentation by mail during an audit or review."}], "id": "q10"}, {"question": "If you work two part-time jobs simultaneously and submit a standard $W-4$ at each job without adjustment, what is likely to happen?", "options": [{"text": "Each employer withholds too little, potentially leading to a tax bill at filing", "isCorrect": true, "rationale": "Each employer assumes their job is your only income and withholds based on that. Combined, the withholding may not cover the higher tax owed on the combined income."}, {"text": "Each employer withholds twice as much to be safe", "isCorrect": false, "rationale": "Employers only withhold based on the information you provide on the W-4; they do not automatically double withholding for multiple jobs."}, {"text": "You receive two refunds, one from each employer", "isCorrect": false, "rationale": "Refunds come from the IRS based on your total tax return, not separately from each employer."}, {"text": "The IRS automatically adjusts withholding across employers", "isCorrect": false, "rationale": "The IRS does not coordinate withholding between employers. It is your responsibility to adjust your W-4(s)."}], "id": "q11"}, {"question": "Approximately what percentage of individual tax returns were filed electronically in 2023?", "options": [{"text": "94%", "isCorrect": true, "rationale": "The IRS reports that about 94% of the 150+ million individual returns in 2023 were filed electronically—making e-filing the overwhelming standard."}, {"text": "50%", "isCorrect": false, "rationale": "Electronic filing has far surpassed the 50% mark. As of 2023, 94% of returns were e-filed."}, {"text": "75%", "isCorrect": false, "rationale": "The actual figure is higher—about 94% in 2023."}, {"text": "99%", "isCorrect": false, "rationale": "While e-filing is dominant, the figure is about 94%, not 99%."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
