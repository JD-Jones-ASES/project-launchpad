<script>
var QUESTIONS = [{"question": "Which of the following components is often overlooked when prospective students initially consider 'the cost of college' but is a significant part of the 'true economic cost' as defined in the section?", "options": [{"text": "Tuition and fees", "isCorrect": false, "rationale": "Tuition and fees are the most commonly considered cost, explicitly stated as what 'most people think about' first, not an overlooked component."}, {"text": "Opportunity cost", "isCorrect": true, "rationale": "The section highlights opportunity cost as 'real money you are giving up, even though it never appears on a tuition bill,' making it a frequently overlooked but significant part of the true economic cost."}, {"text": "Room and board", "isCorrect": false, "rationale": "While a large expense, room and board is typically well-known and included in initial college cost considerations, not an overlooked component in the same way opportunity cost is."}, {"text": "Books and supplies", "isCorrect": false, "rationale": "Books and supplies are a recognized expense category, even if the exact amount is underestimated, it's not 'overlooked' in the same way opportunity cost is."}]}, {"question": "A student is deciding between attending a four-year university immediately after high school or working full-time for two years to save money before enrolling. If they choose to attend college immediately, what is the primary financial concept from the text that applies to the income they forgo during those four years?", "options": [{"text": "Net price", "isCorrect": false, "rationale": "Net price refers to the cost of college after grants and scholarships, not the income forgone by attending."}, {"text": "Sticker price", "isCorrect": false, "rationale": "Sticker price is the advertised cost of tuition and fees, unrelated to potential earnings lost by choosing college."}, {"text": "Personal expenses", "isCorrect": false, "rationale": "Personal expenses are costs like clothing and entertainment incurred while attending college, not income lost by attending."}, {"text": "Opportunity cost", "isCorrect": true, "rationale": "Opportunity cost is defined as 'the income you would have earned if you had worked full-time instead of attending college full-time,' directly addressing the forgone earnings in this scenario."}]}, {"question": "Based on the section's advice, which of the following scenarios best illustrates the practical application of using the Net Price Calculator?", "options": [{"text": "A student compares the $60,000 advertised tuition of University X with the $30,000 advertised tuition of University Y and concludes University Y is more affordable.", "isCorrect": false, "rationale": "This scenario incorrectly compares sticker prices, which the text advises against. It does not use the Net Price Calculator."}, {"text": "A student researches the average starting salaries for graduates from different majors to determine the potential return on investment for their degree.", "isCorrect": false, "rationale": "While important for ROI, this action relates to potential future earnings, not the direct cost calculation facilitated by the Net Price Calculator."}, {"text": "A student inputs their financial information into University A's online tool and discovers their estimated cost after grants and scholarships is $15,000, despite the $50,000 sticker price.", "isCorrect": true, "rationale": "This scenario directly applies the purpose of the Net Price Calculator: to estimate the 'net price' (actual cost after aid) for an individual student, often revealing it's 'dramatically lower than the sticker price'."}, {"text": "A student meticulously budgets for monthly personal expenses, including entertainment, phone plan, and toiletries, before starting college.", "isCorrect": false, "rationale": "This describes budgeting for personal expenses, which is part of the true cost, but it's not the function or application of a Net Price Calculator."}]}, {"question": "According to the 'warning' section, why is it crucial to compare the 'net price' rather than the 'sticker price' when evaluating colleges?", "options": [{"text": "The sticker price includes only tuition, while the net price includes all additional fees, room and board.", "isCorrect": false, "rationale": "The sticker price typically refers to the advertised total cost before aid, which can include fees, but the primary distinction with net price is the subtraction of grants and scholarships, not just broader inclusion of cost categories."}, {"text": "Many expensive private schools have large endowments that significantly reduce the actual cost for students through financial aid.", "isCorrect": true, "rationale": "The text explicitly states that 'for many students—especially at more expensive private schools—the net price is dramatically lower than the sticker price because these schools have large endowments used to fund financial aid.'"}, {"text": "The net price is a fixed cost that does not change throughout a student's four years of enrollment, offering financial stability.", "isCorrect": false, "rationale": "While net price is a better indicator, it's not necessarily fixed for all four years, as aid packages can change. The primary reason for comparison is the initial difference from sticker price."}, {"text": "Sticker prices are rarely updated, making them unreliable, whereas net prices reflect real-time market values.", "isCorrect": false, "rationale": "The text does not suggest sticker prices are outdated or that net prices reflect real-time market values; it emphasizes the impact of aid on the actual cost to the student."}]}, {"question": "Consider the 'exampleTrue 4-Year Cost of College' figures. If a student chose to attend a Private University over a Public In-State University, and could have earned $30,000 per year working full-time instead of college, how much more would the total 'True Economic Cost' be for the Private University compared to the Public In-State University?", "options": [{"text": "$148,000", "isCorrect": true, "rationale": "The True Economic Cost for Public In-State is $232,800 and for Private is $380,800. The difference is $380,800 - $232,800 = $148,000. This tests application of the example figures."}, {"text": "$120,000", "isCorrect": false, "rationale": "$120,000 is the opportunity cost for either scenario, not the difference between the two total economic costs."}, {"text": "$168,000", "isCorrect": false, "rationale": "This value does not align with the provided figures. The difference between the stated 4-year costs (excluding opportunity cost) is $260,800 - $112,800 = $148,000. Since opportunity cost is the same for both, the difference in total economic cost remains $148,000."}, {"text": "$260,800", "isCorrect": false, "rationale": "$260,800 is the 4-year cost (excluding opportunity cost) for the Private University, not the difference between the two options' total economic costs."}]}, {"question": "Which strategy would be LEAST effective in substantially reducing the 'Books and supplies' component of college costs, according to the text?", "options": [{"text": "Buying used books from online marketplaces.", "isCorrect": false, "rationale": "The text suggests 'buying used books' as a strategy to reduce costs, making this an effective method."}, {"text": "Renting textbooks for the semester.", "isCorrect": false, "rationale": "The text lists 'renting' as a strategy to reduce book costs, indicating it would be effective."}, {"text": "Utilizing library copies of required readings.", "isCorrect": false, "rationale": "The text mentions 'using library copies' as a way to reduce costs, so this would be an effective strategy."}, {"text": "Purchasing all new editions from the campus bookstore at the start of each term.", "isCorrect": true, "rationale": "The text implies that books can cost '$1,000–$1,500 per year' and then suggests strategies to *reduce* this. Purchasing all new editions, especially from the potentially more expensive campus bookstore, would align with the higher end of costs and would not be a cost-reduction strategy, making it the least effective for reduction."}]}, {"question": "The 'didyouknow' section highlights a significant trend between 1980 and 2020. What is the most important implication of this trend for current and future college students?", "options": [{"text": "Private universities have become more affordable relative to public universities.", "isCorrect": false, "rationale": "The text only mentions tuition at four-year public colleges and does not compare affordability between public and private institutions."}, {"text": "Students can expect to earn significantly more right after graduation compared to previous generations.", "isCorrect": false, "rationale": "The text states 'median wages grew much more slowly,' implying the opposite—that wages have not kept pace with tuition increases, making the financial burden heavier, not lighter."}, {"text": "The financial decision to attend college has become increasingly critical and carries greater risk without careful planning.", "isCorrect": true, "rationale": "The section explicitly states, 'This gap has made the financing decision increasingly important—and increasingly risky if done without a plan,' which directly follows the discussion of tuition increases outstripping wage growth."}, {"text": "Government student loan programs have expanded to fully cover the rising costs of tuition.", "isCorrect": false, "rationale": "The text does not discuss government loan programs or their coverage; it focuses on the cost increase and its implications for financial planning."}]}, {"question": "Which component of the true college cost is most directly impacted by a student's choice to live at home versus on campus or in an off-campus apartment?", "options": [{"text": "Personal expenses", "isCorrect": false, "rationale": "Personal expenses like clothing and entertainment may vary, but are not directly determined by living situation in the same way housing costs are."}, {"text": "Transportation", "isCorrect": false, "rationale": "While living at home might affect daily commute costs, 'Room and board' directly encompasses housing and meals, which are the primary impact of the living choice."}, {"text": "Room and board", "isCorrect": true, "rationale": "The 'Room and board' description explicitly states, 'On-campus housing (dormitory) and meal plans can easily add $10,000–$16,000 per year. Off-campus housing may be cheaper—or more expensive, depending on location,' directly linking this cost to living arrangements."}, {"text": "Tuition and fees", "isCorrect": false, "rationale": "Tuition and fees are charges for instruction and services, which are independent of a student's living arrangements."}]}, {"question": "A student is evaluating two colleges: College A has a sticker price of $40,000 per year and offers $10,000 in grants. College B has a sticker price of $25,000 per year and offers no grants. Based solely on the 'Sticker Price vs. Net Price' principle, which college is financially preferable, and why?", "options": [{"text": "College B, because its sticker price is significantly lower than College A.", "isCorrect": false, "rationale": "This conclusion incorrectly relies on sticker price. The text explicitly warns against this, stating, 'A school with a $60,000 sticker price and $40,000 in aid is cheaper than a school with a $30,000 sticker price and no aid.'"}, {"text": "College A, because its net price ($30,000) is lower than College B's net price ($25,000).", "isCorrect": false, "rationale": "The calculation for College A's net price is correct ($40,000 - $10,000 = $30,000). However, College B's net price is $25,000 (since it offers no grants), making College B financially preferable based on net price. This option has a correct premise but incorrect conclusion."}, {"text": "College A, because it has a higher sticker price, which often indicates better quality education.", "isCorrect": false, "rationale": "The text does not link sticker price to educational quality, and advises against using sticker price for financial comparison. This is an incorrect assumption."}, {"text": "College B, because its net price ($25,000) is lower than College A's net price ($30,000).", "isCorrect": true, "rationale": "College A's net price is $40,000 - $10,000 = $30,000. College B's net price is $25,000 - $0 = $25,000. Since $25,000 is less than $30,000, College B is financially preferable, aligning with the advice to 'compare net prices, not sticker prices.'"}]}, {"question": "The section concludes by stating that the 'true economic cost' does not mean college is not worth it, but that the decision 'deserves serious financial analysis.' Which of the following best reflects the comprehensive approach to financial analysis advocated by the text?", "options": [{"text": "Focusing primarily on reducing tuition and fees through negotiation with colleges.", "isCorrect": false, "rationale": "While reducing tuition is part of it, the text emphasizes a broader 'true cost' beyond just tuition and fees, including opportunity cost and net price, not just negotiation."}, {"text": "Considering all cost components, including opportunity cost, and comparing schools based on their individual net prices after aid.", "isCorrect": true, "rationale": "This option encompasses the key takeaways: understanding all cost components (including opportunity cost), recognizing that college is a significant financial decision, and using net prices for comparison, which forms the basis of 'serious financial analysis' as described."}, {"text": "Selecting the university with the lowest sticker price to minimize overall financial burden.", "isCorrect": false, "rationale": "This contradicts the explicit advice to 'compare net prices, not sticker prices,' as a lower sticker price does not guarantee a lower net price."}, {"text": "Prioritizing on-campus housing and meal plans for convenience, as their costs are negligible compared to tuition.", "isCorrect": false, "rationale": "The text states room and board 'can easily add $10,000–$16,000 per year,' which is not negligible. The decision on housing is a significant part of the cost and requires analysis, not dismissal."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
