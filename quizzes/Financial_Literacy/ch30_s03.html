<script>
var QUESTIONS = [{"question": "What is the primary purpose of this section regarding tithing and faith-based giving?", "options": [{"text": "To recommend specific giving percentages for different faiths.", "isCorrect": false, "rationale": "The text explicitly states, 'This section is presented as factual information about existing traditions — not as a recommendation for any particular practice or amount.'"}, {"text": "To provide factual information about various giving traditions and their financial implications.", "isCorrect": true, "rationale": "The introduction states, 'This section presents these practices factually and respectfully as one framework...' and a later section discusses 'The Financial Planning Benefit of Percentage-Based Giving.'"}, {"text": "To encourage readers to adopt a particular religious giving practice.", "isCorrect": false, "rationale": "The text clarifies it is 'not as a recommendation for any particular practice or amount' and emphasizes that 'Your giving decisions are your own.'"}, {"text": "To compare the tax benefits of different faith-based giving methods.", "isCorrect": false, "rationale": "While the text mentions traditions predate tax law, its focus is on spiritual/moral obligation and the practical financial planning benefit of scaling, not tax benefits."}], "id": "q01"}, {"question": "According to the text, which statement accurately describes the Christian tradition of tithing?", "options": [{"text": "It strictly requires giving 10% of gross income to a global charity.", "isCorrect": false, "rationale": "The text states 'some defining it as gross income, some as net income, and some as a voluntary guideline,' and it was 'originally to the local church or religious community,' not necessarily a global charity."}, {"text": "It is a mandatory practice for all Christian denominations, calculated only on net income.", "isCorrect": false, "rationale": "The text notes 'some defining it as gross income, some as net income, and some as a voluntary guideline rather than a strict rule,' indicating variation, not strict mandatory calculation on net income only."}, {"text": "It involves giving 10% of one's income, often to a local religious community, with interpretations varying across denominations.", "isCorrect": true, "rationale": "The text states it refers to 'giving 10 of one's income, originally to the local church or religious community,' and that 'Many Christian denominations continue this practice today, with some defining it as gross income, some as net income, and some as a voluntary guideline rather than a strict rule.'"}, {"text": "It exclusively involves donating time rather than financial resources.", "isCorrect": false, "rationale": "The text clearly states tithing refers to 'giving 10 of one's income.'"}], "id": "q02"}, {"question": "How does the Jewish practice of tzedakah differ from a purely optional virtue?", "options": [{"text": "It emphasizes giving only to specific religious institutions rather than individuals in need.", "isCorrect": false, "rationale": "Traditional Jewish law suggests giving to 'those in need,' not exclusively to specific religious institutions."}, {"text": "It is understood as a moral obligation rooted in righteousness or justice.", "isCorrect": true, "rationale": "The text states tzedakah refers to 'charitable giving as a moral obligation rather than an optional virtue,' and comes 'from the root word for “righteousness” or “justice.”'"}, {"text": "It sets a maximum giving threshold of 10% of one's income.", "isCorrect": false, "rationale": "The text states 'giving between 10 and 20 of one's income to those in need, with 10 as the minimum,' meaning 20% is suggested as a maximum, not 10%."}, {"text": "It is a recent practice developed in response to modern economic conditions.", "isCorrect": false, "rationale": "The text mentions 'These traditions predate modern tax law by thousands of years.'"}], "id": "q03"}, {"question": "A Muslim individual earns $50,000 annually and has accumulated net assets of $10,000 held for a lunar year. Which statement correctly applies the principle of Zakat based on the provided text?", "options": [{"text": "The individual must give 2.5% of their $50,000 annual income.", "isCorrect": false, "rationale": "The text explicitly states, 'Unlike a percentage of income, zakat is calculated on total wealth held for a lunar year, not just earnings.'"}, {"text": "The individual must give 2.5% of their $10,000 accumulated net assets, assuming they meet the nisab threshold.", "isCorrect": true, "rationale": "The text states Zakat 'requires Muslims who meet a minimum wealth threshold (nisab) to give 2.5 of their accumulated net assets annually.'"}, {"text": "Zakat is a voluntary contribution, similar to dāna in Buddhism, and not a requirement.", "isCorrect": false, "rationale": "The text states 'Zakat is one of the Five Pillars of Islam and requires Muslims...'"}, {"text": "The individual is exempt from Zakat as it only applies to gross income.", "isCorrect": false, "rationale": "Zakat applies to 'accumulated net assets,' not gross income, and exemption depends on not meeting the nisab threshold, not on the type of income."}], "id": "q04"}, {"question": "Which of the following statements most accurately highlights a key distinction between Islamic Zakat and Christian tithing as described in the text?", "options": [{"text": "Christian tithing is strictly mandated, while Zakat is a voluntary offering.", "isCorrect": false, "rationale": "Christian tithing can be a 'voluntary guideline' for some, while Zakat 'requires' Muslims, making Zakat generally more strictly mandated as a Pillar of Islam."}, {"text": "Zakat is calculated as a percentage of accumulated net assets, whereas Christian tithing is typically a percentage of income.", "isCorrect": true, "rationale": "The text states 'zakat is calculated on total wealth held for a lunar year, not just earnings,' while Christian tithing refers to 'giving 10 of one's income.'"}, {"text": "Christian tithing has a specific minimum percentage, while Zakat does not.", "isCorrect": false, "rationale": "Christian tithing often refers to '10% of one's income,' and Zakat has a specific '2.5%' minimum for assets, implying both have specific percentages."}, {"text": "Zakat is primarily for the local religious community, while Christian tithing is for those in need globally.", "isCorrect": false, "rationale": "Christian tithing was 'originally to the local church,' and Zakat is for 'specified categories of recipients,' not solely a local religious community or globally for tithing."}], "id": "q05"}, {"question": "A person decides to adopt a percentage-based giving strategy. If their income increases significantly, what is the most likely outcome of this strategy, according to the text?", "options": [{"text": "They will need to recalculate their giving amount only if they change the recipient.", "isCorrect": false, "rationale": "The text states, 'You never need to recalculate or renegotiate — the percentage does the work.'"}, {"text": "Their giving amount will remain fixed, regardless of income fluctuations.", "isCorrect": false, "rationale": "The text states, 'When your income grows, your giving grows proportionally. When income drops, so does the giving amount.'"}, {"text": "Their giving amount will automatically increase proportionally to their income increase.", "isCorrect": true, "rationale": "The text explains the 'practical financial planning benefit' is that 'it scales automatically with income. When your income grows, your giving grows proportionally.'"}, {"text": "They will need to renegotiate their giving commitment with their chosen charity.", "isCorrect": false, "rationale": "The text states, 'You never need to recalculate or renegotiate — the percentage does the work.'"}], "id": "q06"}, {"question": "A person currently gives 10% of their $40,000 annual income. If their income doubles to $80,000 per year, how would their monthly giving amount change based on the 'How Percentage-Based Giving Scales' example?", "options": [{"text": "Their monthly giving would remain at $333 (10% of $40,000 / 12).", "isCorrect": false, "rationale": "The text's example clearly demonstrates that as income rises, the dollar amount given also rises, keeping the percentage constant. It would not remain fixed."}, {"text": "Their monthly giving would double from $333 to $667.", "isCorrect": true, "rationale": "Giving 10% of $40,000 annually is $4,000, or approximately $333/month. If income doubles to $80,000, 10% is $8,000 annually, or approximately $667/month. The example provided (e.g., $20k income -> $167/month; $100k income -> $833/month) demonstrates this proportional increase in dollar amount as income increases."}, {"text": "Their monthly giving would decrease, as a higher income makes the percentage smaller.", "isCorrect": false, "rationale": "The text explicitly states, 'Notice that the percentage stays the same but the dollar amount rises with income.'"}, {"text": "The text suggests they should adjust their percentage to maintain a similar dollar amount.", "isCorrect": false, "rationale": "The 'mathstep' focuses on how percentage-based giving *scales* automatically, meaning the percentage remains constant while the dollar amount adjusts."}], "id": "q07"}, {"question": "While specific forms of giving vary widely across 'Other traditions' mentioned, what underlying values are consistently highlighted?", "options": [{"text": "Strict adherence to a 10% income contribution.", "isCorrect": false, "rationale": "The text states that 'The specific forms vary widely,' indicating that a strict 10% rule is not universal across all traditions, and only specifically mentioned for Christianity and Judaism."}, {"text": "The principle of giving exclusively to local community members.", "isCorrect": false, "rationale": "The text mentions 'Some people... focus their giving on local causes; others on global ones,' implying varied recipient focus, not exclusive local giving for all 'other traditions.'"}, {"text": "Generosity and care for others.", "isCorrect": true, "rationale": "The text explicitly states for 'Other traditions' that 'The specific forms vary widely, but the underlying values of generosity and care for others appear across human cultures worldwide.'"}, {"text": "A focus on tax-deductible donations.", "isCorrect": false, "rationale": "The text focuses on spiritual/moral aspects and financial scaling, not tax implications for these traditions."}], "id": "q08"}, {"question": "The section concludes by stating, 'Your giving decisions are your own.' What does this statement imply about the section's overall stance?", "options": [{"text": "It advocates for individuals to choose the lowest possible giving percentage.", "isCorrect": false, "rationale": "The text states it is 'not as a recommendation for any particular practice or amount' and mentions various percentages people choose, not advocating for the lowest."}, {"text": "It emphasizes the importance of individual autonomy and diverse motivations in charitable giving.", "isCorrect": true, "rationale": "The paragraph 'This Is a Personal Decision' details how 'The specific percentage, the recipients, and the motivation for giving are entirely personal' and that 'All of these choices are valid,' underscoring individual autonomy."}, {"text": "It suggests that faith-based giving is less effective than other forms of philanthropy.", "isCorrect": false, "rationale": "The section presents factual information and a practical benefit, without making judgments about effectiveness compared to other forms of philanthropy."}, {"text": "It discourages adherence to traditional religious giving practices.", "isCorrect": false, "rationale": "The section presents traditions factually and respectfully, without discouraging them, but rather acknowledging personal choice within or outside these traditions."}], "id": "q09"}, {"question": "The word 'philanthropy' is derived from which ancient language, and what is its literal meaning?", "options": [{"text": "Latin, meaning 'love of wisdom.'", "isCorrect": false, "rationale": "The 'didyouknow' box specifies Ancient Greek, not Latin, and 'love of wisdom' refers to philosophy."}, {"text": "Greek, meaning 'love of humanity.'", "isCorrect": true, "rationale": "The 'didyouknow' box states 'The word “philanthropy” comes from the ancient Greek words philos (loving) and anthropos (human). Literally, philanthropy means “love of humanity.”'"}, {"text": "Hebrew, meaning 'righteous giving.'", "isCorrect": false, "rationale": "The text attributes 'righteousness' or 'justice' to the root word for Jewish 'tzedakah,' not philanthropy."}, {"text": "Old English, meaning 'one-tenth.'", "isCorrect": false, "rationale": "The text states 'tithe (from the Old English word for “tenth”)' but this is not related to philanthropy."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
