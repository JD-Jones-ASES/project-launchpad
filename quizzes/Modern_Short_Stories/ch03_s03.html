<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading the Modern Short Story &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Modern_Short_Stories.html">&larr; Back to Reading the Modern Short Story</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading the Modern Short Story &mdash; Miss Ivors and the Irish Question</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the term 'West Briton' mean in the context of this section?", "options": [{"text": "A British citizen who has moved to the west coast of Ireland.", "isCorrect": false, "rationale": "The term is an insult directed at Irish people perceived as too sympathetic to British culture, not at actual British citizens."}, {"text": "An Irish person perceived as too sympathetic to British culture — someone who has chosen the colonizer's world over their own.", "isCorrect": true, "rationale": "The text defines it as 'an Irish person perceived as too sympathetic to British culture' and explains 'it meant: you have chosen the colonizer's world over your own.'"}, {"text": "A term for Irish nationalists who supported violent resistance to British rule.", "isCorrect": false, "rationale": "The term applies to the opposite group — those too aligned with Britain, not those who resist it violently."}, {"text": "A geographic description for people from the western provinces of Ireland.", "isCorrect": false, "rationale": "The term is political and cultural, not geographic; it describes cultural alignment, not place of origin."}]}, {"question": "Why does the term 'West Briton' sting Gabriel when Miss Ivors applies it to him?", "options": [{"text": "Because it is delivered loudly in front of all the party guests.", "isCorrect": false, "rationale": "While the public setting matters, the section focuses on the substance of the accusation: that Gabriel cannot entirely deny it."}, {"text": "Because he cannot entirely deny it — he writes for an English newspaper and holidays on the Continent rather than visiting Ireland.", "isCorrect": true, "rationale": "The text says 'it stings him precisely because he cannot entirely deny it' and lists his writing for an English newspaper and vacationing abroad as evidence."}, {"text": "Because he has always been proud of his Irish identity and the accusation feels like a betrayal.", "isCorrect": false, "rationale": "Gabriel's relationship with Irish identity is described as complicated, not as simple proud attachment that makes the accusation feel like betrayal."}, {"text": "Because Miss Ivors is a close friend and he values her opinion of him highly.", "isCorrect": false, "rationale": "The section does not identify Miss Ivors as a close friend; her challenge threatens Gabriel because of its accuracy, not their friendship."}]}, {"question": "What does Joyce's own biography add to the Miss Ivors exchange, according to the section?", "options": [{"text": "Joyce, like Gabriel, refused to engage with the Irish nationalist movement and spent his career in London.", "isCorrect": false, "rationale": "Joyce left Ireland but continued to write about it obsessively from abroad; he did not work in London."}, {"text": "Joyce left Ireland at twenty-two and spent the rest of his life writing about nothing else, giving him intimate understanding of this tension.", "isCorrect": true, "rationale": "The text says 'Joyce, who left Ireland at twenty-two and spent the rest of his life writing about nothing else, understood this tension intimately.'"}, {"text": "Joyce was himself called a West Briton by nationalists, making Gabriel a direct autobiographical portrait.", "isCorrect": false, "rationale": "The section does not claim Gabriel is a direct autobiographical portrait or that Joyce was personally called a West Briton."}, {"text": "Joyce supported Miss Ivors's position and used Gabriel as a vehicle to criticize Irish cultural indifference.", "isCorrect": false, "rationale": "The section explicitly states Joyce does not take sides in the exchange."}]}, {"question": "What is paralysis as Joyce defines it in Dubliners, according to this section?", "options": [{"text": "Physical immobility caused by the poverty and lack of opportunity in Dublin.", "isCorrect": false, "rationale": "The section defines paralysis as spiritual and cultural, not physical or economic."}, {"text": "The spiritual inability to act or change — not laziness but the quiet, accumulating weight of all the things a person decides not to do.", "isCorrect": true, "rationale": "The text defines paralysis as 'the inability to act, to change, to leave — not laziness but something deeper and sadder' and describes it as 'the quiet, accumulating weight of all the things a person decides not to do.'"}, {"text": "The psychological trauma of living under British colonial rule, which prevents Irish people from imagining a different future.", "isCorrect": false, "rationale": "While colonial rule is part of the context, the section defines paralysis more broadly as a spiritual condition that encompasses many aspects of Dublin life."}, {"text": "The feeling of being trapped between competing cultural identities without being able to choose either.", "isCorrect": false, "rationale": "While cultural tension is part of Gabriel's experience, the section defines paralysis more broadly as the accumulation of things left undone."}]}, {"question": "According to the section, how does Joyce handle the question of who is right in the Miss Ivors exchange?", "options": [{"text": "He sides clearly with Miss Ivors, showing that Gabriel's cultural disengagement is indefensible.", "isCorrect": false, "rationale": "The section explicitly states 'Joyce does not take sides' and notes that Miss Ivors is also 'somewhat rigid, somewhat unfair.'"}, {"text": "He does not take sides — Miss Ivors is right about Gabriel, but she is also somewhat rigid and unfair, and Joyce lets the reader sit with the discomfort.", "isCorrect": true, "rationale": "The text says 'Joyce does not take sides' and acknowledges both that Miss Ivors is correct about Gabriel and that 'she is also somewhat rigid, somewhat unfair.'"}, {"text": "He sides with Gabriel, showing that Miss Ivors's nationalism is too extreme and socially inappropriate.", "isCorrect": false, "rationale": "The section does not present Gabriel's position favorably; Miss Ivors is 'right' that Gabriel has avoided engaging with Ireland's cultural revival."}, {"text": "He resolves the exchange by having Gabriel give a speech that bridges both positions.", "isCorrect": false, "rationale": "The speech comes later and does not resolve the Miss Ivors exchange; the section describes the exchange as ending without resolution."}]}, {"question": "What makes the Miss Ivors exchange particularly unfair to Gabriel, according to the section?", "options": [{"text": "Miss Ivors uses information about Gabriel that she obtained dishonestly.", "isCorrect": false, "rationale": "The section does not suggest dishonesty in how Miss Ivors gathered her information; the unfairness is about context and social constraints."}, {"text": "Her challenge is delivered in a social setting where Gabriel cannot respond honestly without making a scene.", "isCorrect": true, "rationale": "The text says 'her challenge is delivered in a social setting where Gabriel cannot respond honestly without making a scene.'"}, {"text": "She exaggerates Gabriel's pro-British sympathies beyond what the evidence actually supports.", "isCorrect": false, "rationale": "The section acknowledges Miss Ivors is 'right' about Gabriel's cultural disengagement; the unfairness is situational, not factual."}, {"text": "She attacks Gabriel personally rather than engaging with his actual views on Irish culture.", "isCorrect": false, "rationale": "While Miss Ivors' challenge is personal, the section's point about unfairness concerns the social setting, not the nature of the attack."}]}, {"question": "Which of Gabriel's behaviors does the section cite as evidence that he is a 'West Briton'?", "options": [{"text": "He refuses to speak Irish and insists on conducting all conversations in English.", "isCorrect": false, "rationale": "The section does not mention language use as evidence; it cites his newspaper writing and holiday choices."}, {"text": "He writes book reviews for an English newspaper and holidays on the Continent rather than in the west of Ireland.", "isCorrect": true, "rationale": "The text specifically cites these two behaviors: 'He writes book reviews for an English newspaper. He holidays on the Continent rather than in the west of Ireland.'"}, {"text": "He reads only English novels and refuses to engage with Irish literature.", "isCorrect": false, "rationale": "The section does not cite his reading habits as evidence; it focuses on his professional and travel choices."}, {"text": "He supports British rule in Ireland and argues against the nationalist movement at the party.", "isCorrect": false, "rationale": "Gabriel does not openly support British rule; his relationship with Ireland is described as complicated, not politically opposed to independence."}]}, {"question": "What does the section say characterizes Joyce's method in the Miss Ivors exchange?", "options": [{"text": "He resolves moral and political ambiguities clearly so the reader knows what to think.", "isCorrect": false, "rationale": "The section identifies the opposite as Joyce's method: he trusts complexity rather than resolving it."}, {"text": "He trusts the complexity of the situation more than any argument about it.", "isCorrect": true, "rationale": "The text says 'This is characteristic of Joyce's method: he trusts the complexity of the situation more than any argument about it.'"}, {"text": "He uses Miss Ivors as a mouthpiece for his own political views on Irish nationalism.", "isCorrect": false, "rationale": "The section says Joyce does not take sides, which rules out using Miss Ivors as his mouthpiece."}, {"text": "He focuses on the inner thoughts of both characters to show how misunderstanding develops.", "isCorrect": false, "rationale": "The section describes the exchange as two intelligent people talking past each other, but emphasizes Joyce's trust in complexity rather than inner thought revelation."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
