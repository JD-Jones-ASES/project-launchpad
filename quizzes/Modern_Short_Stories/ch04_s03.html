    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Modern_Short_Stories.html">&larr; Back to Reading the Modern Short Story</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading the Modern Short Story &mdash; Gabriel&#x27;s Epiphany and Beyond</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the 'easy' but incomplete reading of the story's ending described in this section?", "options": [{"text": "That Gabriel becomes a better husband after learning about Michael Furey", "isCorrect": false, "rationale": "The text does not suggest Gabriel immediately becomes a better husband; the ending is more ambiguous than that."}, {"text": "That Gabriel is simply diminished and deflated — a man whose self-image has collapsed", "isCorrect": true, "rationale": "The text identifies this as the tempting but insufficient reading, and argues the final pages do something more complicated."}, {"text": "That Gretta finally reveals her true feelings and the marriage can begin honestly", "isCorrect": false, "rationale": "The text does not frame Gretta's revelation as the beginning of marital honesty."}, {"text": "That Joyce intends the ending as a celebration of Irish tradition over Gabriel's Europeanized worldview", "isCorrect": false, "rationale": "While the cultural conflict is part of the story, the text describes the ending in terms of personal self-knowledge, not nationalist triumph."}], "id": "q01"}, {"question": "What does Gabriel's epiphany replace his comfortable fictions with?", "options": [{"text": "Despair and a sense that life is meaningless", "isCorrect": false, "rationale": "The text explicitly says it is 'not despair' that replaces the fictions."}, {"text": "A new plan to correct his errors and win back Gretta's deepest affection", "isCorrect": false, "rationale": "No plan or resolution is described; the epiphany is an arrival at truth, not a motivation to act."}, {"text": "Something closer to honesty — a genuine and painful self-recognition", "isCorrect": true, "rationale": "The text says what replaces the fictions is 'something closer to honesty': Gabriel sees himself as he actually is for the first time."}, {"text": "Admiration for Michael Furey and a wish to emulate him", "isCorrect": false, "rationale": "While Furey's passionate nature contrasts with Gabriel's, the text describes the epiphany as self-knowledge, not admiration for another."}], "id": "q02"}, {"question": "According to the text, what two things has Gabriel been doing rather than genuinely living?", "options": [{"text": "Overworking and neglecting his family", "isCorrect": false, "rationale": "The text does not characterize Gabriel's failure as workaholism or neglect in the conventional sense."}, {"text": "Performing confidence rather than possessing it, and composing images of people rather than truly knowing them", "isCorrect": true, "rationale": "These are the two specific self-recognitions the text names as what Gabriel's epiphany strips away."}, {"text": "Pretending to love Gretta and secretly resenting her Irish background", "isCorrect": false, "rationale": "Resentment of Gretta's background is not what Gabriel recognizes; the failure is more fundamental — a failure of perception."}, {"text": "Seeking social status and avoiding genuine intellectual engagement", "isCorrect": false, "rationale": "While social ambition is present in Gabriel's character, the text frames the epiphany around performance and image-making specifically."}], "id": "q03"}, {"question": "What does the text say is 'a kind of freedom' in Gabriel's painful recognition?", "options": [{"text": "The freedom to leave the marriage and start a new life", "isCorrect": false, "rationale": "No such resolution is suggested; the freedom described is internal and existential, not a practical escape."}, {"text": "The freedom of being more fully present to his own life than he has been, perhaps for years", "isCorrect": true, "rationale": "The text describes Gabriel's moment of honesty as bringing him into genuine presence — stripping away the fictions makes him actually alive to reality."}, {"text": "The freedom from social obligations that the revelation grants him", "isCorrect": false, "rationale": "The epiphany is not about escaping social duties; it is about being present to one's actual life."}, {"text": "The freedom to acknowledge his love for another woman he has admired all evening", "isCorrect": false, "rationale": "No other romantic interest is involved in Gabriel's epiphany."}], "id": "q04"}, {"question": "How does the text connect Gabriel's epiphany to Joyce's concept of epiphany from Chapter 1?", "options": [{"text": "Gabriel's experience is an exception to the Chapter 1 definition because it is too painful to be called an epiphany", "isCorrect": false, "rationale": "The text says Gabriel's moment is exactly what Joyce meant — not an exception to it."}, {"text": "Gabriel's reckoning is precisely what Joyce meant: not a happy insight but a confrontation with truth that cannot be unfelt once it arrives", "isCorrect": true, "rationale": "This is the text's explicit connection: epiphany is not reward or lesson, but an unavoidable truth — and Gabriel's experience is the prototype."}, {"text": "The Chapter 1 epiphany concept was about joyful recognition, while Gabriel's experience is unique in being painful", "isCorrect": false, "rationale": "The text says Chapter 1 defined epiphany as 'sudden, often painful, rarely welcome' — Gabriel's experience matches, not contradicts, that definition."}, {"text": "Gabriel's epiphany proves that Joyce later abandoned the concept he developed earlier", "isCorrect": false, "rationale": "The text treats Gabriel's epiphany as the culmination and clearest illustration of Joyce's concept, not its abandonment."}], "id": "q05"}, {"question": "What question does Joyce leave open at the end of 'The Dead'?", "options": [{"text": "Whether Gretta will tell Gabriel the whole truth about her past", "isCorrect": false, "rationale": "Gretta has already told Gabriel what she knows; the open question is not about further disclosure from her side."}, {"text": "Whether Michael Furey really loved Gretta or was merely infatuated", "isCorrect": false, "rationale": "The sincerity of Furey's love is not what the ending leaves open; that is treated as established."}, {"text": "What Gabriel will do with his new self-knowledge", "isCorrect": true, "rationale": "The text states explicitly that Joyce does not tell us what Gabriel does next — and that this silence is part of the story's honesty."}, {"text": "Whether the party was a success in the eyes of the Morkan sisters", "isCorrect": false, "rationale": "The party's success is beside the point at the story's close; the open question concerns Gabriel's future."}], "id": "q06"}, {"question": "How does the text describe Gabriel's self-image before the epiphany?", "options": [{"text": "He believed himself to be deeply empathetic and sensitive to others' feelings", "isCorrect": false, "rationale": "Gabriel's self-image is built on being perceptive in a social and intellectual sense, but the text exposes that this did not include genuine emotional attunement."}, {"text": "He saw himself as perceptive, as understanding his wife, and as living a life with a certain shape and significance", "isCorrect": true, "rationale": "The text names these three specific 'comfortable fictions': perception, understanding of Gretta, and the narrative significance of his own life."}, {"text": "He saw himself as morally superior to the other party guests", "isCorrect": false, "rationale": "Moral superiority is not identified as the core of Gabriel's self-image in this passage."}, {"text": "He believed his literary work gave him access to truths unavailable to ordinary people", "isCorrect": false, "rationale": "While Gabriel is a literary man, the text focuses on his self-image as perceptive and understanding, not as a literary prophet."}], "id": "q07"}, {"question": "Why does the text call Gabriel's recognition 'the most important thing that has ever happened to him'?", "options": [{"text": "Because it leads him to make a significant change in his career and social life", "isCorrect": false, "rationale": "No career or social change is described; the importance is interior and existential."}, {"text": "Because surviving a painful truth is always more important than any external event", "isCorrect": false, "rationale": "The text's claim is more specific than a general principle about surviving pain."}, {"text": "Because for the first time Gabriel sees himself clearly — including the ways he has failed to see others — and this real knowledge replaces a lifetime of performance", "isCorrect": true, "rationale": "The text describes the epiphany as Gabriel's first genuine self-perception, making it more consequential than any of the evening's external events."}, {"text": "Because it occurs on a symbolically important night — the feast of the Epiphany itself", "isCorrect": false, "rationale": "While Joyce's story is set on Epiphany (January 6th), the text's emphasis here is on the psychological content of the recognition, not the liturgical calendar."}], "id": "q08"}, {"question": "What does the section say about the silence Joyce maintains regarding what Gabriel will do next?", "options": [{"text": "The silence is a flaw in the story — Joyce should have shown whether Gabriel acts on his new knowledge.", "isCorrect": false, "rationale": "The section presents the silence as a deliberate and honest choice, not a flaw: 'Joyce does not tell us. That silence is part of the story's honesty.'"}, {"text": "The silence is part of the story's honesty — some open questions are not for the writer to answer.", "isCorrect": true, "rationale": "The text says 'The question the story leaves open is what Gabriel will do with this knowledge. Joyce does not tell us. That silence is part of the story's honesty.'"}, {"text": "The silence invites the reader to write their own sequel to the story.", "isCorrect": false, "rationale": "The section does not frame the silence as an invitation to continue the story; it frames it as an honest acknowledgment of uncertainty."}, {"text": "The silence reflects Joyce's own uncertainty about whether human beings can change.", "isCorrect": false, "rationale": "The section does not speculate about Joyce's personal beliefs; it presents the silence as a structural and ethical choice about honesty in fiction."}], "id": "q09"}, {"question": "What does the section say is 'more complicated and more generous' about the ending than the easy reading?", "options": [{"text": "It shows Gabriel achieving a moment of genuine presence and honesty — more fully alive than he has been all evening.", "isCorrect": true, "rationale": "The section argues the ending is not mere deflation: Gabriel's epiphany brings him into genuine presence for the first time, which is the 'more generous' reading the section proposes."}, {"text": "It shows that Gretta forgives Gabriel and their marriage will survive the revelation.", "isCorrect": false, "rationale": "No forgiveness scene is described; the generous reading concerns Gabriel's internal transformation, not marital reconciliation."}, {"text": "It shows that Michael Furey's memory finally brings Gretta peace after years of carrying it alone.", "isCorrect": false, "rationale": "The section focuses on Gabriel's experience of the ending, not Gretta's peace or resolution."}, {"text": "It shows that the party was actually a meaningful event, not the empty ritual it appeared to be.", "isCorrect": false, "rationale": "The party's ritual nature is not reassessed in the ending; the more generous reading is about Gabriel's inner transformation."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
