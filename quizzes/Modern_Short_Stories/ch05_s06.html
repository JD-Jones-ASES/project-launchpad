<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading the Modern Short Story &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Modern_Short_Stories.html">&larr; Back to Reading the Modern Short Story</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading the Modern Short Story &mdash; Comparing the Three Styles</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What common problem do all three stories — by Chekhov, Joyce, and Hemingway — address?", "options": [{"text": "How to write about war and trauma without explicit description", "isCorrect": false, "rationale": "None of the three stories covered are about war; all three address the gap between inner life and speech."}, {"text": "How to represent the inner lives of people who cannot or will not speak honestly", "isCorrect": true, "rationale": "The section states: 'All three writers are solving the same problem: how do you represent the inner lives of people who cannot or will not speak honestly?'"}, {"text": "How to write about romantic relationships across cultural boundaries", "isCorrect": false, "rationale": "Cultural boundaries are a minor element in some stories; the shared problem is about interiority and speech."}, {"text": "How to write short fiction that achieves the emotional impact of a novel", "isCorrect": false, "rationale": "While length is implicit, the section identifies the specific shared problem as representing people who don't speak honestly."}], "id": "q01"}, {"question": "How does Chekhov give the reader access to Gurov's inner life in 'The Lady with the Dog'?", "options": [{"text": "Through long dialogue scenes where Gurov explains his feelings to Anna", "isCorrect": false, "rationale": "Chekhov works through narration, not Gurov's self-explanatory dialogue; the narration moves in and out of his consciousness."}, {"text": "Through narration that moves in and out of Gurov's consciousness, creating intimacy", "isCorrect": true, "rationale": "The section describes Chekhov's technique as narration that 'moves in and out of his consciousness without announcement' creating 'intimacy.'"}, {"text": "Through letters Gurov writes but never sends", "isCorrect": false, "rationale": "No letters are mentioned as Chekhov's technique; he uses free indirect narration."}, {"text": "Through other characters describing what they observe about Gurov's behavior", "isCorrect": false, "rationale": "Chekhov accesses Gurov's interior directly, not through others' observations of him."}], "id": "q02"}, {"question": "How does Joyce build Gabriel's consciousness in 'The Dead'?", "options": [{"text": "By limiting the narration to only what Gabriel can observe externally", "isCorrect": false, "rationale": "Joyce does the opposite — he immerses the reader in Gabriel's wide, accumulating interior awareness."}, {"text": "Through accumulation — layering detail on detail across a wide, anxious field of awareness", "isCorrect": true, "rationale": "The section describes Joyce building through 'accumulation, layering detail on detail' in Gabriel's 'wide, anxious field' of consciousness."}, {"text": "Through a single dramatic flashback that reveals Gabriel's past", "isCorrect": false, "rationale": "Joyce works through accumulation in the present scene, not through a single dramatic flashback."}, {"text": "By giving Gabriel a diary that the reader reads along with him", "isCorrect": false, "rationale": "No diary appears in 'The Dead'; Joyce uses narration to render Gabriel's accumulating awareness."}], "id": "q03"}, {"question": "What is Hemingway's approach to interiority compared to Chekhov and Joyce?", "options": [{"text": "He provides more interior monologue than either Chekhov or Joyce", "isCorrect": false, "rationale": "Hemingway provides no interior monologue; this is the defining difference from Chekhov and Joyce."}, {"text": "He removes interiority from the page entirely and lets the reader supply it", "isCorrect": true, "rationale": "The section states: 'Hemingway's answer is to remove consciousness from the page entirely and let the reader supply it.'"}, {"text": "He alternates between the man's and the girl's interior monologues throughout", "isCorrect": false, "rationale": "Neither character's thoughts are accessible; Hemingway gives neither interior monologue."}, {"text": "He uses a third-person omniscient narrator who explains both characters' motivations", "isCorrect": false, "rationale": "The narration is minimal and objective, not omniscient and explanatory."}], "id": "q04"}, {"question": "How does the section describe Chekhov's technique using the metaphor of a window?", "options": [{"text": "Chekhov gives you a window into the mind", "isCorrect": true, "rationale": "The section uses the exact metaphor: 'Where Chekhov gives you a window into the mind...'"}, {"text": "Chekhov gives you a closed window — you can see in but not hear", "isCorrect": false, "rationale": "The window metaphor for Chekhov suggests access, not obstruction."}, {"text": "Chekhov builds a window frame but never lets you look through it", "isCorrect": false, "rationale": "The window for Chekhov represents access to consciousness, not blocked access."}, {"text": "Chekhov's window is smeared — you see in only partially and with distortion", "isCorrect": false, "rationale": "The section's Chekhov window metaphor suggests clear access and intimacy, not distortion."}], "id": "q05"}, {"question": "How does the section describe Joyce's technique using a different metaphor?", "options": [{"text": "Joyce gives you a window into the mind", "isCorrect": false, "rationale": "Window is Chekhov's metaphor; Joyce's metaphor is immersion."}, {"text": "Joyce gives you a closed door", "isCorrect": false, "rationale": "The closed door is Hemingway's metaphor in the section."}, {"text": "Joyce gives you an immersion in consciousness", "isCorrect": true, "rationale": "The section states: 'Joyce gives you an immersion in it [consciousness].'"}, {"text": "Joyce gives you a mirror that reflects the character back on themselves", "isCorrect": false, "rationale": "No mirror metaphor appears; Joyce's technique is described as immersion in consciousness."}], "id": "q06"}, {"question": "What is Hemingway's metaphor in the section's comparison of the three techniques?", "options": [{"text": "A window into the mind", "isCorrect": false, "rationale": "That is Chekhov's metaphor; Hemingway's is the closed door."}, {"text": "A closed door — you figure out what is happening on the other side", "isCorrect": true, "rationale": "The section states: 'Hemingway gives you a closed door and trusts you to figure out what is happening on the other side.'"}, {"text": "An immersion in the characters' consciousness", "isCorrect": false, "rationale": "Immersion is Joyce's metaphor; Hemingway's is the closed door."}, {"text": "A photograph — precise but frozen in time", "isCorrect": false, "rationale": "No photograph metaphor appears; Hemingway's technique is represented by the closed door."}], "id": "q07"}, {"question": "According to the section, which of the three techniques is superior?", "options": [{"text": "Hemingway's, because it requires the most reader participation", "isCorrect": false, "rationale": "The section explicitly avoids ranking the techniques; none is called superior."}, {"text": "Chekhov's, because it produces the greatest emotional intimacy", "isCorrect": false, "rationale": "The section does not rank techniques; it says each is 'a different kind of trust between writer and reader.'"}, {"text": "None — each is a different kind of trust between writer and reader, and each changed what the short story could do", "isCorrect": true, "rationale": "The section states: 'None of these approaches is better than the others. Each is a different kind of trust between writer and reader.'"}, {"text": "Joyce's, because his technique culminates in the most powerful final revelation", "isCorrect": false, "rationale": "The section does not compare the power of the endings; it treats all three as equally valid, different approaches."}], "id": "q08"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
