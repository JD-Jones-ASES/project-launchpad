<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading the Modern Short Story &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Modern_Short_Stories.html">&larr; Back to Reading the Modern Short Story</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading the Modern Short Story &mdash; The Conversation Nobody Is Having</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the central topic that neither character names directly in 'Hills Like White Elephants'?", "options": [{"text": "A divorce", "isCorrect": false, "rationale": "The couple is not married; the unspoken subject is an abortion, not a divorce."}, {"text": "An abortion", "isCorrect": true, "rationale": "The entire conversation revolves around whether the girl will have an abortion, a word neither character ever speaks."}, {"text": "A miscarriage", "isCorrect": false, "rationale": "The pregnancy is ongoing; the subject is an elective operation, not a miscarriage."}, {"text": "A marriage proposal", "isCorrect": false, "rationale": "Marriage is not the unspoken subject; the man refers to 'an awfully simple operation,' pointing to abortion."}], "id": "q01"}, {"question": "Why does Hemingway omit the word 'abortion' from the story?", "options": [{"text": "Because the subject was legally forbidden in serious fiction in 1927", "isCorrect": false, "rationale": "Hemingway was not censored; he chose the omission deliberately as a portrait of real human behavior."}, {"text": "Because it is a portrait of how people behave when stakes are too high for honesty", "isCorrect": true, "rationale": "The text states the omission 'is a portrait of how people actually behave when the stakes are too high for honesty.'"}, {"text": "Because he wanted to confuse the reader", "isCorrect": false, "rationale": "Hemingway's purpose is clarity through indirection, not reader confusion."}, {"text": "Because the characters themselves do not know what they are discussing", "isCorrect": false, "rationale": "Both characters clearly know the subject; the omission is a social and emotional choice, not ignorance."}], "id": "q02"}, {"question": "How does the man refer to the abortion in the story?", "options": [{"text": "As 'the procedure' and 'the appointment'", "isCorrect": false, "rationale": "These are not the man's words; he uses phrases that minimize the seriousness of the operation."}, {"text": "As 'an awfully simple operation' and 'not really an operation at all'", "isCorrect": true, "rationale": "These are the man's exact euphemisms, designed to downplay the weight of what he is asking."}, {"text": "As 'the problem' and 'the only solution'", "isCorrect": false, "rationale": "These phrases do not appear in the story; the man's language is more minimizing and reassuring."}, {"text": "As 'the thing' and 'the decision'", "isCorrect": false, "rationale": "The man uses specific medical-sounding language to minimize, not vague terms like 'the thing.'"}], "id": "q03"}, {"question": "What does subtext mean as defined in this section?", "options": [{"text": "The moral lesson hidden beneath a story's plot", "isCorrect": false, "rationale": "Subtext is not about moral lessons; it is about the gap between what characters say and what they mean."}, {"text": "What characters mean but do not say", "isCorrect": true, "rationale": "The section defines subtext as 'what characters mean but don't say,' a second conversation beneath the words."}, {"text": "The narrator's commentary on character actions", "isCorrect": false, "rationale": "Subtext operates in dialogue, not in narrator commentary; this story has almost no narrator."}, {"text": "Symbolic images that appear in the setting", "isCorrect": false, "rationale": "Symbolism and subtext are distinct concepts; subtext refers to unspoken meaning in dialogue."}], "id": "q04"}, {"question": "What makes subtext in 'Hills Like White Elephants' unusual compared to other stories?", "options": [{"text": "It is delivered through the narrator rather than through dialogue", "isCorrect": false, "rationale": "The opposite is true; there is almost no narrator, and the subtext emerges entirely from dialogue."}, {"text": "In this story, subtext IS the dialogue — there is nothing else", "isCorrect": true, "rationale": "The section states: 'In Hills Like White Elephants, subtext is the dialogue. There is nothing else.'"}, {"text": "The characters openly discuss their subtext at the story's end", "isCorrect": false, "rationale": "The characters never name or acknowledge what lies beneath their conversation."}, {"text": "The subtext is provided only through physical action, not words", "isCorrect": false, "rationale": "While action contributes, the subtext operates primarily through the dialogue itself."}], "id": "q05"}, {"question": "Where is the couple sitting during their conversation?", "options": [{"text": "In a hotel room in Madrid", "isCorrect": false, "rationale": "The couple is not in a hotel; they are at a public bar at a railway station."}, {"text": "On a train traveling through Spain", "isCorrect": false, "rationale": "They are waiting for a train, not riding one; the setting is a station bar."}, {"text": "At a table in a railway station bar", "isCorrect": true, "rationale": "The section specifies they are 'sitting at a table in a railway station bar,' a public place."}, {"text": "At a café in a Spanish village", "isCorrect": false, "rationale": "The setting is a railway station, not a village café, which adds urgency to their conversation."}], "id": "q06"}, {"question": "According to the section, what is the reader supposed to listen for in this story?", "options": [{"text": "What the narrator explicitly states about each character", "isCorrect": false, "rationale": "There is almost no narrator; the section says readers must listen the way they would to a real conversation."}, {"text": "Not what people say, but what they are trying not to say", "isCorrect": true, "rationale": "The section instructs: 'listen the way you would listen to a real conversation — not for what people say, but for what they are trying not to say.'"}, {"text": "The symbolic meanings of the drinks the characters order", "isCorrect": false, "rationale": "While drinks appear in the story, the section's primary instruction is about listening beneath the dialogue."}, {"text": "The rhythm of the train departures mentioned in the background", "isCorrect": false, "rationale": "Train rhythms are not the focus; the instruction is about attending to what is unsaid in conversation."}], "id": "q07"}, {"question": "What is Hemingway's achievement in this story, according to the section's conclusion?", "options": [{"text": "Making readers feel sympathy for both characters equally", "isCorrect": false, "rationale": "The section does not describe equal sympathy as the achievement; it describes the transparent surface revealing depth."}, {"text": "Making the surface so transparent that the depths show through without anyone pointing at them", "isCorrect": true, "rationale": "The section concludes: 'Hemingway's achievement is making the surface so transparent that the depths show through without anyone having to point at them.'"}, {"text": "Writing a story that can be read multiple ways without a correct interpretation", "isCorrect": false, "rationale": "The section implies there is a knowable meaning; the achievement is how that meaning is conveyed, not that it is ambiguous."}, {"text": "Condensing a complex moral dilemma into fewer than 1,500 words", "isCorrect": false, "rationale": "Length is not cited as the achievement; the achievement is the technique of revealing depth through transparent surface."}], "id": "q08"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
