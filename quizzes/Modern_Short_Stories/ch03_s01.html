<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading the Modern Short Story &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Modern_Short_Stories.html">&larr; Back to Reading the Modern Short Story</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading the Modern Short Story &mdash; The House and the Aunts</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the section, what is the primary function of the Morkan sisters' annual party in Joyce's narrative?", "options": [{"text": "It serves as background scenery for the main plot about Gabriel.", "isCorrect": false, "rationale": "The text explicitly states Joyce gives us this household 'not as background but as argument.'"}, {"text": "It is an argument — the aunts' annual proof that the old ways still hold.", "isCorrect": true, "rationale": "The text says 'the party is their annual proof that the old ways still hold,' establishing the party as argument rather than mere setting."}, {"text": "It is a social event designed to introduce Gabriel to new people.", "isCorrect": false, "rationale": "The party features the same guests year after year; its purpose is ritual continuity, not new introductions."}, {"text": "It demonstrates the aunts' ambition to climb Dublin's social ladder.", "isCorrect": false, "rationale": "The party is about preserving the past, not advancing social status."}], "id": "q01"}, {"question": "What does the section say about the Morkan household in relation to change?", "options": [{"text": "It is constantly adapting to the modernizing city around it.", "isCorrect": false, "rationale": "The text describes the household as 'a world preserved in amber' that has not changed and cannot change."}, {"text": "It is a world preserved in amber — one that has not changed and cannot change.", "isCorrect": true, "rationale": "The text uses the phrase 'preserved in amber' and states the Morkan sisters 'represent a Dublin that has not changed — that cannot change.'"}, {"text": "It is changing slowly but resists any dramatic transformation.", "isCorrect": false, "rationale": "The text presents the household as essentially static, not slowly evolving."}, {"text": "It welcomes change but is constrained by financial circumstances.", "isCorrect": false, "rationale": "The text attributes the household's stasis to a cultural and spiritual condition, not finances."}], "id": "q02"}, {"question": "The section compares the party to a music box. What does this metaphor suggest?", "options": [{"text": "The party is cheerful and brings genuine joy to all participants.", "isCorrect": false, "rationale": "While the metaphor acknowledges beauty, it emphasizes the party's inability to change or play a different tune."}, {"text": "The party is beautiful, intricate, and incapable of playing a different tune.", "isCorrect": true, "rationale": "The text says 'the effect is something like watching a music box: beautiful, intricate, and incapable of playing a different tune.'"}, {"text": "The party is mechanical and hollow, devoid of genuine human feeling.", "isCorrect": false, "rationale": "The section notes that 'there is genuine affection in these rooms' and that Joyce clearly loves the world he is diagnosing."}, {"text": "The party is old-fashioned but highly entertaining for its guests.", "isCorrect": false, "rationale": "The metaphor focuses on the party's incapacity for variation, not its entertainment value."}], "id": "q03"}, {"question": "According to the section, what is Joyce's method throughout Dubliners as illustrated by this party?", "options": [{"text": "He uses political allegory to comment on the struggle for Irish independence.", "isCorrect": false, "rationale": "While politics appear elsewhere in the chapter, the section specifically identifies 'domestic ceremony' as Joyce's method here."}, {"text": "He uses domestic ceremony to reveal the spiritual condition of an entire culture.", "isCorrect": true, "rationale": "The text states: 'This is Joyce's method throughout Dubliners: he uses domestic ceremony to reveal the spiritual condition of an entire culture.'"}, {"text": "He uses stream of consciousness to explore individual psychology.", "isCorrect": false, "rationale": "The section focuses on how domestic ritual serves as cultural diagnosis, not on stream-of-consciousness technique."}, {"text": "He uses ironic detachment to mock the pretensions of middle-class Dublin.", "isCorrect": false, "rationale": "The section explicitly states 'Joyce is not mocking these people' — his attitude is more complex than mockery."}], "id": "q04"}, {"question": "Which recurring pattern in the party does the section identify as evidence of cultural stasis?", "options": [{"text": "Arguments between guests about Irish politics that are never resolved.", "isCorrect": false, "rationale": "While political tensions appear in the chapter, the section emphasizes the repetition of compliments, topics, and tensions rather than political arguments."}, {"text": "The same compliments, topics, and small tensions that surface and are smoothed over year after year.", "isCorrect": true, "rationale": "The text notes 'The same compliments are paid. The same topics are raised and abandoned. The same small tensions surface and are smoothed over.'"}, {"text": "The guests' insistence on performing the same musical pieces every year.", "isCorrect": false, "rationale": "While music is important to the party, the section's evidence for stasis focuses on conversational repetition, not specific musical performances."}, {"text": "Gabriel's annual failure to connect meaningfully with the other guests.", "isCorrect": false, "rationale": "Gabriel is not yet the focus of this section; the stasis described belongs to the whole party culture."}], "id": "q05"}, {"question": "What does the section say makes Joyce's portrait of the Morkan household 'complicated rather than cruel'?", "options": [{"text": "Joyce withholds judgment by narrating the party from an omniscient, neutral perspective.", "isCorrect": false, "rationale": "The section does not describe the technique as neutral omniscience; it addresses the content — that Joyce loves what he diagnoses."}, {"text": "Joyce clearly loves the world he is diagnosing — the aunts are generous, the food abundant, the music real.", "isCorrect": true, "rationale": "The text says 'what makes this portrait complicated rather than cruel is that Joyce clearly loves the world he is diagnosing' and lists these specific qualities."}, {"text": "Joyce shows that the aunts are aware of their situation and have chosen it freely.", "isCorrect": false, "rationale": "The section does not suggest the aunts consciously choose stasis; their condition is described as something they live within rather than rationally select."}, {"text": "Joyce balances criticism of the aunts with sympathy for their financial struggles.", "isCorrect": false, "rationale": "Financial hardship is not the source of the complexity; it is the genuine warmth coexisting with spiritual stasis."}], "id": "q06"}, {"question": "The section states that the Morkan household is 'full of life that has nowhere to go.' What does this phrase describe?", "options": [{"text": "The aunts' unfulfilled ambitions to travel and see the wider world.", "isCorrect": false, "rationale": "The phrase is not about travel ambitions but about the tragic mismatch between genuine vitality and cultural imprisonment."}, {"text": "The genuine warmth and life of the household that is nonetheless trapped within a culture of stasis.", "isCorrect": true, "rationale": "The text uses this phrase to name the tragedy: the household is not empty but 'full of life that has nowhere to go,' combining real vitality with cultural immobility."}, {"text": "The overcrowding of the party with guests who have no purpose for attending.", "isCorrect": false, "rationale": "The phrase is not about literal space or the guests' motives but about the spiritual condition of vital energy without outlet."}, {"text": "The musical talent of the Morkan sisters that goes unrecognized by Dublin society.", "isCorrect": false, "rationale": "The section does not frame the problem as lack of recognition but as a cultural system that has no place for forward movement."}], "id": "q07"}, {"question": "What does the section say about the culture that the Morkan household represents?", "options": [{"text": "A culture that is openly opposed to modernity and Irish nationalism.", "isCorrect": false, "rationale": "The section does not characterize the household's stasis as an open political opposition but as something more passive and unconscious."}, {"text": "A culture that has collectively and without quite admitting it decided that the past is preferable to the future.", "isCorrect": true, "rationale": "The text says the party shows 'what a culture looks like when it has decided, collectively and without quite admitting it, that the past is preferable to the future.'"}, {"text": "A culture that is enthusiastically embracing British influence while mourning its Irish roots.", "isCorrect": false, "rationale": "The section does not describe the household in terms of the British-Irish tension; that theme is developed in later sections of the chapter."}, {"text": "A culture that is actively resisting the forces of modernization threatening Dublin.", "isCorrect": false, "rationale": "The household is not actively resisting modernization; it is simply ignoring it and continuing its rituals."}], "id": "q08"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
