<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading the Modern Short Story &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Modern_Short_Stories.html">&larr; Back to Reading the Modern Short Story</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading the Modern Short Story &mdash; Something Has Changed</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the section, what is the defining characteristic of the modern short story compared to earlier fiction like Poe's?", "options": [{"text": "It focuses on what it feels like to be alive rather than on what happens in the plot.", "isCorrect": true, "rationale": "The section states modern stories 'care less about what happens and more about what it feels like to be alive while it is happening.'"}, {"text": "It uses more complex vocabulary and literary allusions.", "isCorrect": false, "rationale": "The section does not mention vocabulary complexity as a defining feature of modern stories."}, {"text": "It is always longer and more detailed than traditional short fiction.", "isCorrect": false, "rationale": "Length is not cited as a distinguishing feature of the modern short story."}, {"text": "It relies on dramatic plot twists and surprise endings.", "isCorrect": false, "rationale": "This describes the older model (Poe), not the modern short story."}]}, {"question": "How does the section describe Edgar Allan Poe's storytelling method?", "options": [{"text": "As tightly wound machines where every sentence drives toward a climax that snaps shut like a trap.", "isCorrect": true, "rationale": "The text uses this exact metaphor to describe Poe's method of building toward a definitive, mechanical resolution."}, {"text": "As loose, open-ended narratives that trust the reader to find meaning.", "isCorrect": false, "rationale": "Open-endedness describes the modern approach, not Poe's."}, {"text": "As psychologically complex explorations of interior consciousness.", "isCorrect": false, "rationale": "Interior consciousness is the hallmark of the modern short story, not Poe's work as described here."}, {"text": "As stories focused on the quiet, ordinary moments of everyday life.", "isCorrect": false, "rationale": "Quiet, ordinary moments characterize the modern approach the section contrasts with Poe."}]}, {"question": "In the section's summary of a Chekhov story, what is most notable about the ending?", "options": [{"text": "Nothing is resolved — the characters are in love but their most difficult chapter is just beginning.", "isCorrect": true, "rationale": "The section explicitly states 'the story ends, and nothing has been resolved' and 'the most difficult part of their lives is just beginning.'"}, {"text": "The villain is defeated and the lovers are reunited happily.", "isCorrect": false, "rationale": "This describes a conventional plot resolution that Chekhov's stories deliberately avoid."}, {"text": "A mystery is solved and a secret is dramatically revealed.", "isCorrect": false, "rationale": "Mystery-solving and revelations are features of pre-modern fiction, not Chekhov."}, {"text": "One character learns a moral lesson and changes their behavior.", "isCorrect": false, "rationale": "The section states 'nobody has learned a lesson' in the Chekhov story described."}]}, {"question": "Approximately when did the shift toward the modern short story begin, according to this section?", "options": [{"text": "The late nineteenth century, around 1890.", "isCorrect": true, "rationale": "The section states 'something shifted in the late nineteenth century' and the Key Concept box specifies 'beginning around 1890.'"}, {"text": "The early twentieth century, after World War I.", "isCorrect": false, "rationale": "The section places the shift in the late nineteenth century, not after WWI."}, {"text": "The mid-nineteenth century, during the Romantic era.", "isCorrect": false, "rationale": "The Romantic era precedes the shift described; Poe (a Romantic-era writer) is the contrast point."}, {"text": "The eighteenth century, during the Enlightenment.", "isCorrect": false, "rationale": "The section does not connect the modern short story shift to the Enlightenment."}]}, {"question": "What three writers are identified in this section as the finest early examples of the modern short story?", "options": [{"text": "Chekhov, Joyce, and Hemingway.", "isCorrect": true, "rationale": "The section names these three writers explicitly as providing 'the earliest and finest examples of this shift.'"}, {"text": "Poe, Tolstoy, and Fitzgerald.", "isCorrect": false, "rationale": "Poe is used as the pre-modern contrast; Tolstoy and Fitzgerald are not mentioned."}, {"text": "Chekhov, Flaubert, and Faulkner.", "isCorrect": false, "rationale": "Only Chekhov from this list is mentioned in this section as a central figure."}, {"text": "Joyce, Woolf, and Hemingway.", "isCorrect": false, "rationale": "Woolf is not mentioned in this section."}]}, {"question": "What does the Key Concept box identify as the central question of the modern short story?", "options": [{"text": "What does it feel like to be this person, in this moment?", "isCorrect": true, "rationale": "The Key Concept explicitly contrasts older fiction's 'What happens next?' with the modern question: 'What does it feel like to be this person, in this moment?'"}, {"text": "What happens next in the sequence of events?", "isCorrect": false, "rationale": "This is identified as the older model's question, not the modern story's."}, {"text": "Who committed the crime, and why?", "isCorrect": false, "rationale": "Crime and mystery are associated with pre-modern, Poe-style fiction."}, {"text": "How will the protagonist overcome the central obstacle?", "isCorrect": false, "rationale": "Overcoming obstacles is a feature of conventional plot-driven fiction, not the modern short story as described."}]}, {"question": "According to the section, what aspects of experience did writers begin paying attention to once they lost interest in plot machinery?", "options": [{"text": "Quiet, ordinary moments — the pause before someone speaks, a thing noticed but not explained, a slow realization.", "isCorrect": true, "rationale": "The section lists these specific quiet elements as what modern writers turned toward: 'the pause before someone speaks,' 'the thing a person notices but cannot explain,' and realizations that arrive 'with a kind of sinking feeling.'"}, {"text": "Grand historical events and the actions of powerful public figures.", "isCorrect": false, "rationale": "The section describes a move away from dramatic action, not toward historical grandeur."}, {"text": "Exotic settings and adventurous journeys to foreign lands.", "isCorrect": false, "rationale": "Adventure and exotic settings are not mentioned as the focus of the modern shift."}, {"text": "Supernatural phenomena and the mysteries of the afterlife.", "isCorrect": false, "rationale": "The supernatural is not part of the modern short story tradition described here."}]}, {"question": "The section says modern short stories 'often feel unfinished.' What is the reason given for this?", "options": [{"text": "Because life itself is unfinished — and that is not a flaw but the point.", "isCorrect": true, "rationale": "The Key Concept box states: 'The result is fiction that often feels unfinished, because life itself is unfinished. That is not a flaw. It is the point.'"}, {"text": "Because the authors ran out of ideas before completing their narratives.", "isCorrect": false, "rationale": "The section presents open-endedness as an intentional artistic choice, not a failure."}, {"text": "Because short stories are by definition too brief to reach conclusions.", "isCorrect": false, "rationale": "Length is not given as the reason for the unfinished quality; artistic intention is."}, {"text": "Because publishers required writers to leave sequels open for future volumes.", "isCorrect": false, "rationale": "Commercial publishing pressures are not mentioned as a reason for open endings."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
