<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading the Modern Short Story &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Modern_Short_Stories.html">&larr; Back to Reading the Modern Short Story</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading the Modern Short Story &mdash; Michael Furey</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What triggers Gretta's tears in the hotel room?", "options": [{"text": "An argument she had with Gabriel during the carriage ride", "isCorrect": false, "rationale": "No argument in the carriage is described; the tears follow Gabriel's attempt to be romantic."}, {"text": "The memory of Michael Furey, stirred by the song she heard on the stairs", "isCorrect": true, "rationale": "Gretta begins to cry because the song has brought back the memory of the boy who used to sing it — Michael Furey, who died young."}, {"text": "Guilt about not having visited her family in Galway", "isCorrect": false, "rationale": "Family guilt is not identified as the cause; the grief is specifically about Michael Furey."}, {"text": "The realization that she does not love Gabriel", "isCorrect": false, "rationale": "The text does not claim Gretta does not love Gabriel; it questions whether Gabriel has ever truly seen her."}]}, {"question": "Who was Michael Furey?", "options": [{"text": "A former colleague of Gabriel's who died in a work accident", "isCorrect": false, "rationale": "Michael Furey has no connection to Gabriel's professional life; he belongs to Gretta's past in Galway."}, {"text": "A seventeen-year-old boy who was ill and who came to see Gretta in the rain the night before she left Galway", "isCorrect": true, "rationale": "This is Gretta's account: he was young, he was sick, and he stood in the rain to say goodbye — and she believes he died for her."}, {"text": "Gretta's brother who emigrated to America and never returned", "isCorrect": false, "rationale": "Michael Furey is not Gretta's brother; he was a boy who loved her."}, {"text": "The singer performing upstairs at the Morkan party", "isCorrect": false, "rationale": "The singer at the party is not named Michael Furey; the song merely reminds Gretta of him."}]}, {"question": "What assumption has Gabriel been making about his marriage, according to the text?", "options": [{"text": "That Gretta has always been unhappy but concealed it from him", "isCorrect": false, "rationale": "Gabriel's assumption is not that she is unhappy but that he is the center of her emotional world."}, {"text": "That he is the central figure in Gretta's emotional life", "isCorrect": true, "rationale": "The text states Gabriel has assumed — without articulating it — that as her husband he occupies the most important place in her inner life."}, {"text": "That Gretta's childhood in Galway was uneventful and unimportant", "isCorrect": false, "rationale": "The text does not say Gabriel thought specifically about Galway; he simply had never entered that part of her life."}, {"text": "That Gretta married him for financial security rather than love", "isCorrect": false, "rationale": "The text makes no such claim; Gabriel's assumption is about his own centrality, not the motives of the marriage."}]}, {"question": "What is 'the asymmetry at the heart of the story,' as described in this section?", "options": [{"text": "The difference in education between Gabriel and the other party guests", "isCorrect": false, "rationale": "Gabriel's education is noted earlier but is not what the hotel-room scene is called the asymmetry of."}, {"text": "The fact that Gretta loved Michael Furey more than she loves Gabriel", "isCorrect": false, "rationale": "The text does not make this direct comparison; the asymmetry is structural, about two different versions of the marriage."}, {"text": "Gabriel living in one version of the marriage while Gretta has been living in another", "isCorrect": true, "rationale": "This is the text's exact description: each has inhabited a different emotional reality, and the hotel room is where those versions collide."}, {"text": "The difference in age between Gabriel and Gretta", "isCorrect": false, "rationale": "No age difference is identified as the asymmetry; the mismatch is emotional and experiential."}]}, {"question": "What does Gretta believe about Michael Furey's death?", "options": [{"text": "That he died of a pre-existing illness unrelated to her departure", "isCorrect": false, "rationale": "Gretta believes his death was directly connected to her leaving; that his coming out in the rain hastened his end."}, {"text": "That he died for her — that coming out in the rain the night before she left hastened his death", "isCorrect": true, "rationale": "The text states this is her belief: he was ill, he came out anyway, and she believes this is why he died."}, {"text": "That he died in a farming accident after she moved to Dublin", "isCorrect": false, "rationale": "No farming accident is mentioned; his death is connected to the rain and his love for Gretta."}, {"text": "That he chose to die rather than live without her, in a deliberate act", "isCorrect": false, "rationale": "The text does not attribute deliberate intention to his death; Gretta believes the rain and illness killed him."}]}, {"question": "Why does the revelation about Michael Furey carry such weight?", "options": [{"text": "Because Gabriel realizes he has been unfaithful in thought and must confess", "isCorrect": false, "rationale": "Gabriel's infidelity is not part of this story; the weight is about his discovery of Gretta's hidden interior life."}, {"text": "Because it proves that Gretta has been lying to Gabriel throughout their marriage", "isCorrect": false, "rationale": "The text says Michael Furey was 'too private and too painful to share casually,' not that Gretta was dishonest."}, {"text": "Because it reveals that the deepest feeling in Gretta's life belongs to a boy who has been dead for years — a boy Gabriel never knew existed", "isCorrect": true, "rationale": "This is the core revelation: Gabriel's wife has an interior life he never imagined, centered on a love that predates their marriage."}, {"text": "Because Michael Furey turns out to be a relation of one of the Morkan sisters", "isCorrect": false, "rationale": "No connection between Michael Furey and the Morkans is established in the text."}]}, {"question": "How does Gabriel describe his own qualities in contrast to Michael Furey?", "options": [{"text": "He considers himself more passionate and spontaneous", "isCorrect": false, "rationale": "Gabriel does not claim passion; the contrast implicit in the text is that Gabriel is cosmopolitan and educated, which now seems hollow."}, {"text": "He sees himself as educated, successful, and cosmopolitan", "isCorrect": true, "rationale": "These are the qualities Gabriel has prided himself on all evening — and which the revelation renders beside the point."}, {"text": "He considers himself more loyal and faithful as a husband", "isCorrect": false, "rationale": "Gabriel does not invoke marital loyalty in his self-comparison at this point."}, {"text": "He thinks he is more physically attractive than Michael Furey was", "isCorrect": false, "rationale": "Physical comparison with Furey is not part of Gabriel's self-assessment in this section."}]}, {"question": "The text asks: 'The question is not whether Gretta loves Gabriel. It is whether Gabriel has ever truly seen her at all.' What does this mean?", "options": [{"text": "The story's central concern is not about the quality of romantic love but about whether Gabriel has ever genuinely perceived Gretta as a full person with her own inner life", "isCorrect": true, "rationale": "This is the section's culminating point: seeing — genuine perception — is what has been absent from Gabriel's side of the marriage."}, {"text": "The story is arguing that Gretta does not love Gabriel and that the marriage is fraudulent", "isCorrect": false, "rationale": "The text explicitly says the question is not about Gretta's love; it redirects attention to Gabriel's failure to perceive."}, {"text": "The story is concerned primarily with Gabriel's poor eyesight as a metaphor", "isCorrect": false, "rationale": "The seeing is figurative — about emotional perception and knowledge — not literal vision."}, {"text": "The text is suggesting that Gabriel should have been more jealous and watchful of his wife", "isCorrect": false, "rationale": "Jealousy and surveillance are not what is being called for; genuine interest in another's inner life is the contrast."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
