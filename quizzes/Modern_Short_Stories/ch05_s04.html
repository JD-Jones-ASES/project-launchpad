<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading the Modern Short Story &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Modern_Short_Stories.html">&larr; Back to Reading the Modern Short Story</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading the Modern Short Story &mdash; That&#x27;s All We Do</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the girl mean when she says 'That's all we do, isn't it — look at things and try new drinks'?", "options": [{"text": "She is enjoying their travels and suggesting they continue the same lifestyle", "isCorrect": false, "rationale": "The tone is deeply critical, not contentedly appreciative; she is describing a hollow life."}, {"text": "She is describing a life of surfaces — travel and pleasures — with no real substance underneath", "isCorrect": true, "rationale": "The section states she is 'describing a life that consists of surfaces — travel, drinks, pleasant scenery — with nothing underneath.'"}, {"text": "She is asking the man to stop arguing and simply enjoy the moment", "isCorrect": false, "rationale": "The line is a devastating critique of their relationship, not a request to relax."}, {"text": "She is comparing their relationship favorably to other couples who stay home", "isCorrect": false, "rationale": "There is no comparison to other couples; the line is a self-critical assessment of their own life."}]}, {"question": "What is the emotional center of the story, according to this section?", "options": [{"text": "The moment when the man first mentions the operation", "isCorrect": false, "rationale": "The man's mention of the operation is important but not identified as the emotional center."}, {"text": "The girl's statement 'That's all we do, isn't it — look at things and try new drinks'", "isCorrect": true, "rationale": "The section states: 'This is the emotional center of the story,' referring specifically to this line and the surrounding exchange."}, {"text": "The final moment when the man carries the bags to the other side", "isCorrect": false, "rationale": "The bag-carrying scene is significant but not identified here as the emotional center."}, {"text": "The opening description of the white hills and barren landscape", "isCorrect": false, "rationale": "The opening is thematically important but the emotional center is identified as the girl's revelation about their life."}]}, {"question": "What is the girl really talking about when she speaks the lines in this section?", "options": [{"text": "Only the immediate question of whether to have the operation", "isCorrect": false, "rationale": "The section states she is no longer talking about the operation but about 'their entire relationship.'"}, {"text": "Their entire relationship — whether their life together has any real substance", "isCorrect": true, "rationale": "The section says: 'She is not talking about the operation anymore. She is talking about their entire relationship.'"}, {"text": "Her desire to return home and stop traveling", "isCorrect": false, "rationale": "The critique is about depth and substance, not geography or the desire to settle down."}, {"text": "Her frustration with Spanish culture and their inability to communicate with locals", "isCorrect": false, "rationale": "Cultural frustration is not what the line is about; it is an indictment of the shallowness of their relationship."}]}, {"question": "How does the man respond when the girl makes her honest observation about their life?", "options": [{"text": "He acknowledges her point and proposes a different way of living together", "isCorrect": false, "rationale": "He does not engage with what she has named; his response avoids the real point."}, {"text": "He goes silent and does not speak again for several minutes", "isCorrect": false, "rationale": "He does speak; his response is to say 'I don't care about me,' which deflects rather than engages."}, {"text": "He says 'I don't care about me,' deflecting rather than engaging with what she has named", "isCorrect": true, "rationale": "The section states he says 'I don't care about me, which is almost certainly untrue and certainly beside the point' — a deflection."}, {"text": "He angrily denies that their life is shallow and lists their meaningful experiences", "isCorrect": false, "rationale": "He does not get angry or argue defensively; his response is a quiet deflection."}]}, {"question": "The section says the operation 'is not a separate problem from their relationship.' What does this mean?", "options": [{"text": "The operation is unimportant compared to the larger relationship problems", "isCorrect": false, "rationale": "The operation matters enormously; it is the latest instance of a deeper pattern, not something unimportant."}, {"text": "It is the latest instance of the same pattern of shallow living that defines their relationship", "isCorrect": true, "rationale": "The section explains the operation 'is the latest instance of the same problem' — a relationship lived on surfaces."}, {"text": "Their relationship will automatically end if she has the operation", "isCorrect": false, "rationale": "The connection is about shared pattern, not an automatic causal consequence."}, {"text": "The man's pressure about the operation is evidence that he never loved her", "isCorrect": false, "rationale": "The section does not make claims about love; it links the operation to the pattern of surface living."}]}, {"question": "What happens to the conversation after the girl's line 'That's all we do'?", "options": [{"text": "The two characters reach an agreement and the tension is resolved", "isCorrect": false, "rationale": "No resolution is reached; the section emphasizes the conversation changes because something true has been spoken."}, {"text": "The conversation changes — something has been said that cannot be unsaid, even though neither acknowledges it", "isCorrect": true, "rationale": "The section states: 'after this line, the conversation changes. Something has been said that cannot be unsaid, even though neither of them acknowledges it.'"}, {"text": "The girl leaves the table and does not return", "isCorrect": false, "rationale": "The girl does not leave at this point; the conversation continues with a changed quality."}, {"text": "The man finally agrees to consider her perspective on the operation", "isCorrect": false, "rationale": "The man does not shift his position; he continues to deflect rather than engage with what she has named."}]}, {"question": "What does the section say is true about the girl at the moment of her key observation?", "options": [{"text": "She is confused and has not yet understood what their relationship really is", "isCorrect": false, "rationale": "The section explicitly states the opposite: 'She is not confused.'"}, {"text": "She has looked at their life honestly and knows what she has seen, even if she cannot act on it", "isCorrect": true, "rationale": "The section states: 'she knows what she has said. She is not confused. She has looked at their life honestly.'"}, {"text": "She has already decided to go through with the operation", "isCorrect": false, "rationale": "Her decision remains open; the section says Hemingway does not tell us what she will do."}, {"text": "She has decided to leave the man and is saying goodbye through this line", "isCorrect": false, "rationale": "No departure decision is stated; Hemingway leaves her next action deliberately unresolved."}]}, {"question": "The phrase 'look at things and try new drinks' serves as a metaphor for what?", "options": [{"text": "Tourism as a form of cultural enrichment", "isCorrect": false, "rationale": "The phrase is not a positive statement about tourism; it is a critique of a life without depth."}, {"text": "A life devoted entirely to surface pleasures with no real depth or commitment", "isCorrect": true, "rationale": "The section identifies this as a description of a life of surfaces — 'travel, drinks, pleasant scenery — with nothing underneath.'"}, {"text": "The bohemian freedom that both characters genuinely value", "isCorrect": false, "rationale": "The girl delivers the line as a critique, not a celebration of their lifestyle."}, {"text": "The man's inability to appreciate beauty the way the girl does", "isCorrect": false, "rationale": "The phrase critiques the couple's shared lifestyle, not just the man's perceptual failures."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
