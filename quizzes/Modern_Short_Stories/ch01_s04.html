<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading the Modern Short Story &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Modern_Short_Stories.html">&larr; Back to Reading the Modern Short Story</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading the Modern Short Story &mdash; Three Writers</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What was Chekhov's original profession, and how did he fund his studies?", "options": [{"text": "He was a medical doctor who paid for medical school by writing comic sketches and short stories for editors.", "isCorrect": true, "rationale": "The section states Chekhov 'enrolled in medical school. To pay for it, he wrote — comic sketches, short stories, anything an editor would buy.'"}, {"text": "He was a lawyer who wrote plays on the side to earn extra income.", "isCorrect": false, "rationale": "Chekhov studied medicine, not law, and wrote prose fiction (not primarily plays) to fund his studies."}, {"text": "He was a schoolteacher supported by a wealthy patron who admired his fiction.", "isCorrect": false, "rationale": "The section describes no wealthy patron; Chekhov funded himself through writing."}, {"text": "He was a journalist who transitioned into fiction after winning a literary prize.", "isCorrect": false, "rationale": "Journalism and literary prizes are not mentioned in the section's account of Chekhov's early career."}]}, {"question": "What illness did Chekhov have, and what does the section suggest about his relationship to it?", "options": [{"text": "Tuberculosis — he diagnosed it himself but spent years pretending it was not as serious as he knew it was.", "isCorrect": true, "rationale": "The section states: 'He had tuberculosis — diagnosed it himself, because he was a doctor, and then spent years pretending it was not as serious as he knew it was.'"}, {"text": "Heart disease — he died suddenly of a heart attack and never knew he was ill.", "isCorrect": false, "rationale": "Chekhov had tuberculosis, not heart disease, and he diagnosed himself."}, {"text": "Malaria — contracted during his research trip to Sakhalin Island.", "isCorrect": false, "rationale": "The section mentions Sakhalin Island but names tuberculosis, not malaria, as his illness."}, {"text": "Depression — he refused all treatment and isolated himself from friends.", "isCorrect": false, "rationale": "The section describes tuberculosis and Chekhov hiding its severity from friends, not isolation due to depression."}]}, {"question": "Where was Joyce born, and what city did he write about obsessively despite leaving it?", "options": [{"text": "Dublin — he left Ireland at twenty-two but never wrote about anything else.", "isCorrect": true, "rationale": "The section states Joyce 'was born in Dublin' and 'He never really went back to Dublin. But he never wrote about anything else.'"}, {"text": "London — he moved to Paris and wrote about both cities in alternating novels.", "isCorrect": false, "rationale": "Joyce was born in Dublin, not London."}, {"text": "Trieste — he moved there as a young man and set all his stories in that city.", "isCorrect": false, "rationale": "Joyce moved to Trieste, but he set his fiction in Dublin, not Trieste."}, {"text": "Cork — he returned there annually and based his characters on local people.", "isCorrect": false, "rationale": "The section identifies Dublin, not Cork, as Joyce's city of obsession."}]}, {"question": "How long did publishers delay releasing Joyce's Dubliners, and why?", "options": [{"text": "Nine years — publishers were afraid of real place names, real pubs, and the unflattering portrait of Irish life.", "isCorrect": true, "rationale": "The section states Dubliners 'was finished by 1905. It was not published until 1914. Nine years. Publishers were afraid of it — afraid of the real place names, the real pubs, the unflattering portrait of Irish life.'"}, {"text": "Two years — the manuscript was lost and had to be rewritten from memory.", "isCorrect": false, "rationale": "The delay was nine years, not two, and no lost manuscript is mentioned."}, {"text": "Twenty years — Joyce refused to make any edits and the dispute dragged on.", "isCorrect": false, "rationale": "The delay was nine years; while Joyce 'refused to change a word,' the section does not say the dispute lasted twenty years."}, {"text": "Five years — the printer ran out of paper and production was halted.", "isCorrect": false, "rationale": "The section says a printer destroyed the proofs rather than print the book, and the delay was nine years."}]}, {"question": "What formative experience shaped Hemingway's view of the world and eventually his prose style?", "options": [{"text": "Being wounded by a mortar shell as an ambulance driver in Italy during World War I.", "isCorrect": true, "rationale": "The section describes how a mortar shell drove 'over two hundred pieces of shrapnel into his legs' and that Hemingway 'went home with a limp and a view of the world that would never quite recover.'"}, {"text": "Witnessing a bullfight in Spain that taught him about facing death with courage.", "isCorrect": false, "rationale": "While bullfighting influenced his writing theory, his formative wound came in WWI, which the section treats as the primary shaping experience."}, {"text": "Surviving a shipwreck off the coast of Cuba as a young fisherman.", "isCorrect": false, "rationale": "No shipwreck is described in the section; the war wound is the formative experience given."}, {"text": "Losing his first manuscript on a Paris train and having to reconstruct it.", "isCorrect": false, "rationale": "A lost manuscript is not described in this section as the formative experience."}]}, {"question": "What did Hemingway learn from studying bullfighting that he applied to writing?", "options": [{"text": "How to face the worst possible thing with precision and control.", "isCorrect": true, "rationale": "The section states Hemingway 'studied bullfighting, which he believed taught something about how to face the worst possible thing with precision and control.'"}, {"text": "That dramatic action and physical violence make the best narrative subject matter.", "isCorrect": false, "rationale": "The lesson was about precision and control, not that violence is the best subject."}, {"text": "That stories should always have a clear winner and loser.", "isCorrect": false, "rationale": "Win-lose outcomes are not what Hemingway took from bullfighting, according to the section."}, {"text": "That readers enjoy spectacle and need vivid, detailed action scenes.", "isCorrect": false, "rationale": "The lesson was precision and control, not spectacle for readers."}]}, {"question": "According to the section, how was 'Hills Like White Elephants' composed?", "options": [{"text": "In a single afternoon in a Madrid cafe in 1926, published in 1927.", "isCorrect": true, "rationale": "The section states the story 'was written, by Hemingway's account, in a single afternoon in a Madrid café in 1926. It was published in 1927 in the collection Men Without Women.'"}, {"text": "Over several months in Paris, revised extensively before publication.", "isCorrect": false, "rationale": "The section credits a single afternoon in Madrid, not months in Paris."}, {"text": "During Hemingway's recovery in a Milan hospital after his war wound.", "isCorrect": false, "rationale": "The Milan hospital stay is mentioned but is not when 'Hills Like White Elephants' was written."}, {"text": "In Oak Park, Illinois, during Hemingway's childhood, based on his parents.", "isCorrect": false, "rationale": "The story was written in Madrid in 1926, not in Oak Park during childhood."}]}, {"question": "What irony does the section identify about Joyce's Dubliners?", "options": [{"text": "The book publishers feared would offend Dublin is now considered one of the great acts of love for a city in literary history.", "isCorrect": true, "rationale": "The section states: 'The book that publishers thought would offend Dublin is now considered one of the great acts of love for a city in literary history.'"}, {"text": "A book celebrated in Ireland was almost entirely ignored outside of Dublin.", "isCorrect": false, "rationale": "The irony is the opposite — the feared book became celebrated as a loving portrait."}, {"text": "A book Joyce wrote quickly became the work he spent a lifetime trying to revise.", "isCorrect": false, "rationale": "The section describes no such revision history for Dubliners."}, {"text": "A collection Joyce dismissed as minor work became his most famous book.", "isCorrect": false, "rationale": "Joyce fought for every sentence of Dubliners; he did not dismiss it."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
