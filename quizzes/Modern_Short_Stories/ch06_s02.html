<head>
    <meta charset="UTF-8">

    <title>Reading the Modern Short Story &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Modern_Short_Stories.html">&larr; Back to Reading the Modern Short Story</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading the Modern Short Story &mdash; What Changed</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What expectation did readers and writers have of the short story before Chekhov?", "options": [{"text": "That stories should focus on the inner lives of ordinary people", "isCorrect": false, "rationale": "Interior focus is what Chekhov introduced — it was not the pre-existing expectation for the form."}, {"text": "That stories should have a plot delivering a satisfying conclusion", "isCorrect": true, "rationale": "Before Chekhov, the short story was expected to have a plot — something happened, and the ending delivered a verdict, whether a moral, a twist, or a resolution."}, {"text": "That stories should use compressed, minimal prose", "isCorrect": false, "rationale": "Compression and minimalism are Hemingway's innovations, not pre-Chekhov expectations."}, {"text": "That stories should end on ambiguous notes", "isCorrect": false, "rationale": "Ambiguity was precisely what the pre-Chekhov story avoided — it sought satisfying conclusions."}]}, {"question": "Which of the following writers are cited as examples of the pre-modern story tradition?", "options": [{"text": "Joyce, Hemingway, and Chekhov", "isCorrect": false, "rationale": "These three are the modern writers who changed the form, not examples of the old tradition."}, {"text": "Poe, Maupassant, and O. Henry", "isCorrect": true, "rationale": "Poe's stories have murders and confessions, Maupassant's have twists, and O. Henry's have punchlines — all delivering the satisfying conclusion the pre-modern story promised."}, {"text": "Carver, O'Connor, and Munro", "isCorrect": false, "rationale": "These are later writers who extended the modern tradition Chekhov, Joyce, and Hemingway established."}, {"text": "Gallant, Lahiri, and Frank O'Connor", "isCorrect": false, "rationale": "These are successors to the modernist tradition, not representatives of the pre-Chekhov form."}]}, {"question": "What did Chekhov demonstrate that changed the short story's requirements?", "options": [{"text": "That a story needs a shocking twist to hold reader attention", "isCorrect": false, "rationale": "The shocking twist is associated with Maupassant and O. Henry, the pre-modern writers Chekhov moved away from."}, {"text": "That a story no longer needed a plot to be serious — it needed a mind", "isCorrect": true, "rationale": "Chekhov showed that interior shifts — slow recognitions, changes in feeling — could be the substance of a story, making a plot of events optional."}, {"text": "That dialogue alone could carry the full emotional weight of a narrative", "isCorrect": false, "rationale": "Dialogue as the primary vehicle of meaning is more associated with Hemingway's innovations, not Chekhov's."}, {"text": "That stories should span decades to capture the full arc of a life", "isCorrect": false, "rationale": "Spanning decades is characteristic of Alice Munro's approach, not of Chekhov's stories about ordinary daily life."}]}, {"question": "What does the text describe as unique about the ending of Joyce's 'The Dead'?", "options": [{"text": "It reveals a hidden crime that reframes the entire story", "isCorrect": false, "rationale": "There is no hidden crime in 'The Dead' — the ending moves outward into image, not backward into revelation of concealed fact."}, {"text": "It moves beyond the character's consciousness into an image that seems to contain an entire condition of being", "isCorrect": true, "rationale": "The text says Joyce's ending does something no one had done before: it expands beyond Gabriel's consciousness into an image so large it seems to contain the whole country and the whole condition of being alive and knowing you will die."}, {"text": "It presents the character's final decision in plain, unambiguous dialogue", "isCorrect": false, "rationale": "Joyce's ending is the opposite of plain dialogue — it is lyrical, expansive, and imagistic."}, {"text": "It strips away all prose ornamentation to reveal a bare, direct truth", "isCorrect": false, "rationale": "Stripping away ornamentation for bare truth is Hemingway's method, not Joyce's — Joyce's prose is denser and more rhythmic."}]}, {"question": "How did Hemingway's approach to the short story differ from Joyce's?", "options": [{"text": "Hemingway expanded language and consciousness; Joyce compressed", "isCorrect": false, "rationale": "This is backwards — Joyce expanded, while Hemingway compressed, stripping sentences to the bone."}, {"text": "Hemingway focused on interior monologue; Joyce focused on surface action", "isCorrect": false, "rationale": "This is the reverse of the actual methods: Hemingway removed interiority to give us surface, while Joyce was intensely interested in how thinking works."}, {"text": "Hemingway compressed and stripped surface bare; Joyce expanded into denser, more rhythmic prose", "isCorrect": true, "rationale": "The text explicitly states that where Joyce expanded, Hemingway compressed — stripping almost all narration, interiority, and description, leaving dialogue, gesture, and bare facts."}, {"text": "Hemingway relied on elaborate description; Joyce relied on minimalism", "isCorrect": false, "rationale": "Elaborate description is the opposite of Hemingway's method; minimalism is the opposite of Joyce's expansion."}]}, {"question": "After Hemingway, what became a recognized literary tool?", "options": [{"text": "Unreliable narration", "isCorrect": false, "rationale": "Unreliable narration is not identified in this section as Hemingway's specific contribution to the form."}, {"text": "Stream of consciousness", "isCorrect": false, "rationale": "Stream of consciousness is associated with Joyce's interest in how thinking works, not Hemingway's contribution."}, {"text": "Silence", "isCorrect": true, "rationale": "The text concludes: 'After Hemingway, silence became a tool.' His restraint proved that what is left unsaid could carry more emotional weight than elaboration."}, {"text": "Irony", "isCorrect": false, "rationale": "While irony appears in Hemingway's work, the text identifies silence — the power of the withheld — as his specific contribution."}]}, {"question": "According to the section, what did these three writers collectively change about what fiction is for?", "options": [{"text": "They established that fiction's purpose is moral instruction", "isCorrect": false, "rationale": "Moral instruction was more a feature of pre-modern fiction — these writers moved away from that toward paying attention to feeling and consciousness."}, {"text": "They proved that only professional writers trained in the new style could succeed", "isCorrect": false, "rationale": "The section says nothing about professional gatekeeping — its concern is with the purpose and method of fiction."}, {"text": "They transformed fiction from a machine for delivering outcomes into a way of paying attention", "isCorrect": true, "rationale": "The text states: before them, a story was a machine for delivering an outcome. After them, a story could be a way of paying attention — to a feeling, a moment, or the space between what people say and what they mean."}, {"text": "They made plot the irreducible center of all serious storytelling", "isCorrect": false, "rationale": "The opposite is true — these writers made plot optional and elevated attention, consciousness, and silence."}]}, {"question": "The section argues that the modern short story's influence reached beyond literature into which other forms?", "options": [{"text": "Architecture and visual art only", "isCorrect": false, "rationale": "The section does not mention architecture or visual art as areas influenced by the modern short story."}, {"text": "Film, theater, and memoir", "isCorrect": true, "rationale": "The text explicitly names film, theater, and memoir — noting that when any of these ends ambiguously or lingers on confusion rather than rushing to clarity, the lineage runs back to these three writers."}, {"text": "Academic philosophy and political theory", "isCorrect": false, "rationale": "The section does not identify philosophy or political theory as domains shaped by the modern short story's methods."}, {"text": "Music and poetry exclusively", "isCorrect": false, "rationale": "While the text mentions that Joyce showed the short story could do the work of poetry, the broader cultural influence it names is film, theater, and memoir."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
