<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading the Modern Short Story &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Modern_Short_Stories.html">&larr; Back to Reading the Modern Short Story</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading the Modern Short Story &mdash; The Staircase Scene</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is Gabriel doing when he first notices Gretta on the stairs?", "options": [{"text": "He is helping guests with their coats", "isCorrect": false, "rationale": "Gabriel is watching from below, not actively helping guests at this moment."}, {"text": "He looks up and sees her standing motionless, listening to a song", "isCorrect": true, "rationale": "The text describes Gabriel looking up to find Gretta arrested on the stairs, unaware she is being watched."}, {"text": "He is giving his farewell speech to the Morkan sisters", "isCorrect": false, "rationale": "The speech occurs earlier in the evening; the staircase scene happens as the party is winding down."}, {"text": "He is calling her name to hurry her along", "isCorrect": false, "rationale": "Gabriel does not call to her; he observes her in silence."}], "id": "q01"}, {"question": "What does Gabriel do mentally when he sees Gretta on the stairs?", "options": [{"text": "He wonders what memory the song has stirred in her", "isCorrect": false, "rationale": "Curiosity about her inner life is precisely what Gabriel does NOT exhibit; that insight comes only later."}, {"text": "He feels immediate jealousy toward the unknown singer", "isCorrect": false, "rationale": "Gabriel does not yet know the song has any personal significance for Gretta."}, {"text": "He composes the image as if it were a painting and imagines a title for it", "isCorrect": true, "rationale": "Joyce shows Gabriel aestheticizing the moment — framing his wife as a picture rather than engaging with her emotional reality."}, {"text": "He rushes upstairs to ask her what is wrong", "isCorrect": false, "rationale": "Gabriel remains below and observes rather than approaching her."}], "id": "q02"}, {"question": "According to the text, what does Gabriel's habit of composing images of people reveal about him?", "options": [{"text": "He has a refined artistic sensibility that makes him more perceptive than others", "isCorrect": false, "rationale": "The text frames this habit critically — it is a way of not truly seeing people, not a sign of superior perception."}, {"text": "He experiences other people as occasions for his own feeling rather than as separate beings", "isCorrect": true, "rationale": "Joyce places the painting-title impulse here deliberately to expose Gabriel's self-centered mode of relating to others."}, {"text": "He is a trained visual artist who habitually notices light and composition", "isCorrect": false, "rationale": "Nothing in the text suggests Gabriel has visual art training; the impulse is psychological, not professional."}, {"text": "He is trying to memorize the moment so he can describe it to Gretta later", "isCorrect": false, "rationale": "The motivation is self-possession and aestheticization, not memory-making for Gretta's benefit."}], "id": "q03"}, {"question": "Why does Joyce describe the staircase scene as 'setting a trap'?", "options": [{"text": "Because Gretta is deliberately hiding her grief from Gabriel to punish him", "isCorrect": false, "rationale": "Gretta is not acting manipulatively; she is simply absorbed in private memory."}, {"text": "Because the beautiful image Gabriel constructs will be completely dismantled in the hotel room", "isCorrect": true, "rationale": "Joyce lets readers share Gabriel's romanticized vision so that the subsequent revelation lands with maximum force."}, {"text": "Because Gabriel will soon discover that the party was a deception", "isCorrect": false, "rationale": "No deception about the party is involved; the trap concerns Gabriel's assumptions about his marriage."}, {"text": "Because the staircase is physically dangerous and someone will fall", "isCorrect": false, "rationale": "The trap is entirely figurative — it refers to the collapse of Gabriel's self-image."}], "id": "q04"}, {"question": "What is true about Gretta's state on the stairs?", "options": [{"text": "She is aware of Gabriel watching her but chooses to ignore him", "isCorrect": false, "rationale": "The text specifies she 'is not aware of him watching her.'"}, {"text": "She is performing for the assembled guests to draw attention to herself", "isCorrect": false, "rationale": "Her stillness is genuine absorption in the music, not performance."}, {"text": "She is motionless, caught in the music, turned inward, and unreachable", "isCorrect": true, "rationale": "This is Joyce's exact description: she is elsewhere entirely, absorbed in what the song stirs in her."}, {"text": "She is waiting for Gabriel to notice her so they can leave together", "isCorrect": false, "rationale": "She is not waiting for Gabriel; she has forgotten the external world."}], "id": "q05"}, {"question": "The text says Gabriel's feeling on the stairs is 'desire, and more than desire.' What is the 'more than'?", "options": [{"text": "A tender wish to comfort her whatever she might be feeling", "isCorrect": false, "rationale": "Tenderness toward her inner life is absent from Gabriel's response at this point."}, {"text": "The impulse to possess the image she makes", "isCorrect": true, "rationale": "The text explicitly names this as the additional element: Gabriel wants to own the aesthetic image, not understand the person."}, {"text": "Guilt about how he treated her earlier in the evening", "isCorrect": false, "rationale": "Guilt is not present in Gabriel's staircase experience; that comes later."}, {"text": "Fear that she is about to faint from the heat of the party", "isCorrect": false, "rationale": "No physical concern for her health appears in this passage."}], "id": "q06"}, {"question": "In what sense is Gabriel's image of Gretta on the stairs 'not wrong, exactly,' according to the text?", "options": [{"text": "Gretta actually is beautiful on those stairs and the music has genuinely moved her", "isCorrect": true, "rationale": "The text acknowledges the surface image is accurate — the error is in what Gabriel infers from it about himself."}, {"text": "Gabriel correctly guesses that she is thinking of a lost love", "isCorrect": false, "rationale": "Gabriel has no awareness of Michael Furey at this point and does not guess at the song's personal meaning."}, {"text": "Gabriel's aesthetic framing is the right way to appreciate such a moment", "isCorrect": false, "rationale": "The text critiques the aesthetic framing as a failure to see Gretta as a full person."}, {"text": "Gretta is intentionally creating a beautiful image for Gabriel to admire", "isCorrect": false, "rationale": "Gretta is not performing; her stillness is involuntary and inward."}], "id": "q07"}, {"question": "What does the close reading question at the end of the section ask students to consider about Gabriel's 'painting title' impulse?", "options": [{"text": "Whether a real painter could capture the scene accurately", "isCorrect": false, "rationale": "The question is not about painting technique but about Gabriel's psychological habit."}, {"text": "Whether Gabriel would have been a better husband if he had pursued art", "isCorrect": false, "rationale": "The question focuses on what the impulse reveals about Gabriel's mode of seeing, not on alternate career paths."}, {"text": "The difference between seeing someone and composing an image of them, and why Joyce places this habit just before it undoes Gabriel", "isCorrect": true, "rationale": "This is precisely what the close reading question asks: what separates genuine perception from aesthetic possession, and why now?"}, {"text": "Which painting in the Western tradition the scene most resembles", "isCorrect": false, "rationale": "The question is analytical and psychological, not art-historical."}], "id": "q08"}, {"question": "What does the section say has been true about Gabriel's aesthetic habit 'all evening,' before the staircase scene?", "options": [{"text": "He has been composing aesthetic images of people throughout the evening — in his speech about the aunts and in his memories of Gretta.", "isCorrect": true, "rationale": "The section states: 'He has done this all evening, in his speech about the Morkan sisters, in his memories of Gretta. He is doing it now.' — establishing the staircase as the culmination of a pattern, not an isolated event."}, {"text": "He has been deliberately performing for the guests all evening, composing his public image.", "isCorrect": false, "rationale": "While Gabriel is anxious about how he is perceived, the section's focus is on his habit of turning others into aesthetic objects, not his social performance."}, {"text": "He has been composing an essay about the party in his head to share with colleagues.", "isCorrect": false, "rationale": "No such essay-writing is described; the habit is psychological — turning people into images for his own feeling — not literary."}, {"text": "He has been deliberately avoiding looking at Gretta all evening because of unresolved tension.", "isCorrect": false, "rationale": "The section does not describe avoidance of Gretta; the problem is that when Gabriel does look at her, he aestheticizes rather than perceives."}], "id": "q09"}, {"question": "According to the section, what is the key fact about Gretta's absorption in the music that Gabriel cannot see?", "options": [{"text": "That the song reminds her of a happy memory from their early courtship together.", "isCorrect": false, "rationale": "The music connects Gretta to Michael Furey, not to Gabriel; it belongs to a part of her life that predates their marriage."}, {"text": "That the reason the music moves her has nothing to do with Gabriel.", "isCorrect": true, "rationale": "The section states: 'Gretta is beautiful on those stairs. The music has moved her deeply. But the reason it has moved her has nothing to do with Gabriel, and that is the fact he cannot see.'"}, {"text": "That she is performing for him and hopes he will ask what is wrong.", "isCorrect": false, "rationale": "Gretta is not performing; she is genuinely absorbed in private memory and is not aware of being watched."}, {"text": "That the song title refers to a place in Galway that Gabriel has never visited.", "isCorrect": false, "rationale": "The section does not identify the song title or a geographic reference as the key hidden fact; what is hidden is the personal significance for Gretta."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
