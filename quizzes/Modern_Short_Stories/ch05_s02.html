<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading the Modern Short Story &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Modern_Short_Stories.html">&larr; Back to Reading the Modern Short Story</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading the Modern Short Story &mdash; The Two Landscapes</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What are the two landscapes Hemingway describes on either side of the valley?", "options": [{"text": "Rocky cliffs and sandy beaches", "isCorrect": false, "rationale": "The landscapes are not cliffs and beaches; one side is barren and dry, the other is fertile with grain fields."}, {"text": "A barren brown side and a fertile side with grain fields and trees by the Ebro", "isCorrect": true, "rationale": "The section describes: hills 'long and white,' country 'brown and dry' on one side; 'fields of grain and trees along the banks of the Ebro' on the other."}, {"text": "A desert and a mountain range", "isCorrect": false, "rationale": "The setting is a valley, not a desert and mountains; the contrast is between barren and fertile plains."}, {"text": "An urban cityscape and open countryside", "isCorrect": false, "rationale": "The setting is entirely rural; there is no cityscape in the description."}], "id": "q01"}, {"question": "What do the two landscapes symbolize in the story?", "options": [{"text": "The couple's past happiness versus their present misery", "isCorrect": false, "rationale": "The landscapes represent future possibilities, not past versus present."}, {"text": "Spain versus America as cultural forces acting on the characters", "isCorrect": false, "rationale": "The landscapes are not national symbols; they represent the two possible outcomes of the couple's decision."}, {"text": "The two possible futures: one where the pregnancy continues, one where it does not", "isCorrect": true, "rationale": "The section states: 'The two sides of the valley are the two possible futures the couple is facing.'"}, {"text": "The man's logical worldview versus the girl's emotional one", "isCorrect": false, "rationale": "While the characters perceive the landscape differently, the landscapes symbolize futures, not psychological types."}], "id": "q02"}, {"question": "Who looks at the landscape and who does not, and what does this difference reveal?", "options": [{"text": "The man looks at the landscape; the girl looks at her drink — showing she is avoiding the decision", "isCorrect": false, "rationale": "The opposite is true; it is the girl who looks at the landscape and the man who does not."}, {"text": "The girl looks at the landscape because she is undecided; the man does not because he has already decided", "isCorrect": true, "rationale": "The section states the man 'has already decided what he wants' and looks at the table, while the girl 'is interested in it because she has not.'"}, {"text": "Both characters study the landscape but draw opposite conclusions from it", "isCorrect": false, "rationale": "Only the girl actively engages with the landscape; the man ignores it."}, {"text": "Neither character pays attention to the landscape; the descriptions are purely decorative", "isCorrect": false, "rationale": "The section explicitly argues the landscape is not decoration but carries symbolic meaning."}], "id": "q03"}, {"question": "What does the phrase 'white elephant' mean as an idiom?", "options": [{"text": "Something rare and beautiful that brings good luck", "isCorrect": false, "rationale": "A white elephant is not a good-luck symbol; it means something costly and unwanted."}, {"text": "Something costly, burdensome, and unwanted — a gift you cannot refuse or use", "isCorrect": true, "rationale": "The section defines it as 'something costly, burdensome, and unwanted — a gift you cannot refuse and cannot use.'"}, {"text": "An obvious truth that everyone ignores", "isCorrect": false, "rationale": "That meaning describes 'the elephant in the room,' not a white elephant specifically."}, {"text": "A false hope or illusion people chase", "isCorrect": false, "rationale": "White elephants are burdens, not illusions; the idiom refers to unwanted, costly possessions."}], "id": "q04"}, {"question": "When the girl says 'No, you wouldn't have' after the man claims never to have seen a white elephant, what is she implying?", "options": [{"text": "That white elephants are mythical creatures no one has actually seen", "isCorrect": false, "rationale": "The exchange is not literally about elephants; it is about the man's limited perception of their situation."}, {"text": "That the man lacks the sensitivity to perceive things that are strange, beautiful, and costly", "isCorrect": true, "rationale": "The section calls this 'a test of perception' that the man fails, implying he cannot see what she sees."}, {"text": "That she has traveled more than he has and seen more exotic things", "isCorrect": false, "rationale": "The line is not about travel experience; it is about the man's unwillingness to see the weight of their situation."}, {"text": "That the man is lying about his past travels", "isCorrect": false, "rationale": "The exchange is metaphorical, not a literal dispute about travel history."}], "id": "q05"}, {"question": "Why does the section describe the landscape as doing 'the work that narration would normally do'?", "options": [{"text": "Because the landscape descriptions replace the dialogue in this story", "isCorrect": false, "rationale": "The dialogue remains central; it is the absence of an explaining narrator that the landscape compensates for."}, {"text": "Because with almost no narrator, the landscape carries symbolic meaning the narrator would typically provide", "isCorrect": true, "rationale": "The section explains: 'In a story with almost no narration, the landscape does the work that narration would normally do.'"}, {"text": "Because the characters describe the landscape to each other in lengthy passages", "isCorrect": false, "rationale": "The landscape descriptions are brief and come from the narration, not extended character speeches."}, {"text": "Because the train station setting is described in more detail than any other element", "isCorrect": false, "rationale": "The landscape carries symbolic weight, not because it receives the most description, but because narration is otherwise minimal."}], "id": "q06"}, {"question": "The couple in the story is situated between the two landscapes. What does their position suggest?", "options": [{"text": "They are travelers with no fixed home, implying rootlessness", "isCorrect": false, "rationale": "While they are traveling, their position between the landscapes primarily signals their decision point."}, {"text": "They are at a crossroads, positioned between two possible futures", "isCorrect": true, "rationale": "The section emphasizes they 'sit between' the two landscapes, which represent two possible futures."}, {"text": "They are indifferent to the natural world around them", "isCorrect": false, "rationale": "The girl is deeply attentive to the landscape; their position is symbolic of choice, not indifference."}, {"text": "The Spanish landscape makes them feel foreign and uncomfortable", "isCorrect": false, "rationale": "Cultural displacement is not the primary meaning of their position between the two landscapes."}], "id": "q07"}, {"question": "According to the section, what does the landscape become through the exchange about white elephants?", "options": [{"text": "A reminder of the couple's happy travels together", "isCorrect": false, "rationale": "The landscape is not used nostalgically; the exchange makes it a test of perception."}, {"text": "A test of perception that the man fails", "isCorrect": true, "rationale": "The section states: 'The landscape becomes a test of perception, and the man fails it.'"}, {"text": "A source of comfort for the girl in her distress", "isCorrect": false, "rationale": "While the girl looks at the landscape, the section frames the exchange as a test of perception, not comfort."}, {"text": "An argument for why the couple should stay in Spain", "isCorrect": false, "rationale": "The landscape has no literal argument function; it operates symbolically and as a perceptual test."}], "id": "q08"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
