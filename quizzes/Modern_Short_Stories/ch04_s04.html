<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading the Modern Short Story &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Modern_Short_Stories.html">&larr; Back to Reading the Modern Short Story</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading the Modern Short Story &mdash; The Snow</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Where does the narrative camera move in the story's final paragraph?", "options": [{"text": "It moves deeper into Gabriel's consciousness, showing his most private thoughts", "isCorrect": false, "rationale": "The camera moves in the opposite direction — outward and away from Gabriel's individual mind."}, {"text": "It pulls back from the hotel room, over Dublin and beyond, across all of Ireland", "isCorrect": true, "rationale": "This is precisely what the text describes: a widening from the personal and specific toward the vast and universal."}, {"text": "It shifts to Gretta's perspective as she falls asleep", "isCorrect": false, "rationale": "The final paragraph does not adopt Gretta's viewpoint; it transcends all individual perspectives."}, {"text": "It returns to the Morkan sisters' house to show the party ending", "isCorrect": false, "rationale": "While the Morkan house is mentioned in the final snow passage, the camera does not return there in a narrative sense."}], "id": "q01"}, {"question": "According to the text, what does the snow fall upon?", "options": [{"text": "Only the city of Dublin and the hotel where Gabriel and Gretta are staying", "isCorrect": false, "rationale": "The snow is more expansive — it falls on city and countryside, living and dead, the whole of Ireland."}, {"text": "The living and the dead, the city and the countryside, and every part of Ireland", "isCorrect": true, "rationale": "The text notes that Joyce extends the snow over all these things, creating a vision of universal, impersonal reach."}, {"text": "Gabriel and Gretta alone, as a symbol of their private grief", "isCorrect": false, "rationale": "The snow is deliberately not personal or private; it belongs to everyone and no one."}, {"text": "Michael Furey's grave specifically, as the story's final image", "isCorrect": false, "rationale": "While Furey's grave is included in the snow's reach, the passage does not end on his grave alone."}], "id": "q02"}, {"question": "What does the text say the snow does NOT do for Gabriel?", "options": [{"text": "It does not fall upon him", "isCorrect": false, "rationale": "The snow's reach includes everyone; the text's point is about what it fails to provide emotionally, not whether it physically touches Gabriel."}, {"text": "It does not resolve his situation or comfort him", "isCorrect": true, "rationale": "The text is explicit: the snow does not offer resolution or comfort. It simply places Gabriel within something vast."}, {"text": "It does not appear until after he has fallen asleep", "isCorrect": false, "rationale": "The snow's timing is not the point; the text focuses on what the image accomplishes and what it withholds."}, {"text": "It does not connect his grief to that of other people", "isCorrect": false, "rationale": "Connection across lives is precisely what the snow image achieves."}], "id": "q03"}, {"question": "What happens to the prose style in the final paragraph, according to the text?", "options": [{"text": "The sentences become shorter and more fragmented, reflecting Gabriel's broken state", "isCorrect": false, "rationale": "The opposite is true: sentences lengthen and become more flowing and rhythmic."}, {"text": "The sentences lengthen, the rhythm becomes incantatory and musical, and specific nouns give way to broader ones", "isCorrect": true, "rationale": "The text describes exactly this stylistic shift: from clipped, anxious narration to a longer, more musical, more universal register."}, {"text": "Joyce introduces a second narrator who speaks in a more objective, journalistic voice", "isCorrect": false, "rationale": "No second narrator appears; the shift is in rhythm and scope, not in narrative voice."}, {"text": "The prose reverts to the social comedy tone of the party scenes", "isCorrect": false, "rationale": "The final paragraph moves away from social comedy into something lyrical and vast."}], "id": "q04"}, {"question": "What is the 'strange democracy of snow' described in the text?", "options": [{"text": "The way snow makes all streets in Dublin look the same, erasing class distinctions", "isCorrect": false, "rationale": "The democracy is not about urban class geography but about the equal treatment of life and death."}, {"text": "The snow's indifference to the distinction between the living and the dead — it falls on both equally", "isCorrect": true, "rationale": "This is the text's meaning: snow makes no moral or ontological distinction; it covers the living and the dead without preference."}, {"text": "The Irish political tradition of democratic resistance symbolized by winter weather", "isCorrect": false, "rationale": "No political meaning for the snow is established in this passage; the democracy is ontological, not political."}, {"text": "The way the snow equalizes Gabriel and Michael Furey as rivals for Gretta's love", "isCorrect": false, "rationale": "The snow is not a symbol of rivalry resolved; it operates at a level above individual relationships."}], "id": "q05"}, {"question": "The text says the effect of the final paragraph is 'not sadness exactly.' What is it closer to?", "options": [{"text": "Resignation — an acceptance that nothing can be changed", "isCorrect": false, "rationale": "Resignation implies a kind of defeat; the text names a more expansive and almost spiritual response."}, {"text": "Awe — a sense of the individual life held against the background of everything, resulting in a kind of terrible beauty", "isCorrect": true, "rationale": "This is the text's precise characterization: awe, not sadness, not despair — a feeling produced by juxtaposing the personal against the vast."}, {"text": "Relief — because Gabriel's suffering has been placed in proportion by something larger", "isCorrect": false, "rationale": "While proportion is part of the effect, the text does not name relief; the experience includes something 'terrible' alongside the beauty."}, {"text": "Anger — because the snow's indifference mirrors the universe's indifference to human suffering", "isCorrect": false, "rationale": "The text does not suggest anger at cosmic indifference; the tone is closer to wonder than protest."}], "id": "q06"}, {"question": "What does the text say the final paragraph 'enlarges the story' without doing?", "options": [{"text": "It enlarges the story without changing any of the facts of what happened", "isCorrect": false, "rationale": "Of course facts do not change; the claim is about something more fundamental — what the ending does and refrains from doing thematically."}, {"text": "It enlarges the story without explaining it", "isCorrect": true, "rationale": "This is the text's key claim: the ending expands significance without resolving or interpreting — it transcends without explaining."}, {"text": "It enlarges the story without mentioning Gabriel or Gretta by name", "isCorrect": false, "rationale": "Whether names appear is not the text's point about what the enlargement avoids doing."}, {"text": "It enlarges the story without using imagery from the earlier party scenes", "isCorrect": false, "rationale": "The text does note that the Morkan house appears in the snow passage; the key withholding is explanation, not imagery."}], "id": "q07"}, {"question": "The close reading exercise asks students to read the final paragraph aloud. What is the primary purpose of this exercise?", "options": [{"text": "To practice reading Irish English pronunciation correctly", "isCorrect": false, "rationale": "Pronunciation of dialect is not the goal; the exercise is about experiencing the rhythm of the prose."}, {"text": "To feel the rhythmic shift from clipped, anxious narration to longer, incantatory sentences and understand its effect", "isCorrect": true, "rationale": "The text directs readers to 'listen to what happens to the sentences' — the exercise is about experiencing the prose's music firsthand."}, {"text": "To memorize the passage for examination purposes", "isCorrect": false, "rationale": "Memorization is not the goal; the exercise asks what the reader feels and whether the ending opens or closes."}, {"text": "To compare Joyce's prose style to that of other stories in the chapter", "isCorrect": false, "rationale": "Comparison to other stories is not the exercise's focus; it asks specifically about this paragraph's internal shift."}], "id": "q08"}, {"question": "What does the section say happens to 'specific nouns' in the final paragraph's prose?", "options": [{"text": "Specific nouns multiply, creating a detailed catalogue of Dublin's landmarks.", "isCorrect": false, "rationale": "The opposite: specific nouns give way to broader ones as the prose moves from particular to universal."}, {"text": "Specific nouns give way to broader ones as the prose moves from individual to universal.", "isCorrect": true, "rationale": "The text says 'Specific nouns give way to broader ones' — this is part of how Joyce achieves the shift from Gabriel's individual experience to something vast and impersonal."}, {"text": "Specific nouns are replaced by pronouns, making the passage feel more intimate.", "isCorrect": false, "rationale": "The shift is from specific to broad, not from nouns to pronouns; the effect is universalizing, not intimate."}, {"text": "Specific nouns are removed entirely, leaving only abstract concepts like death and time.", "isCorrect": false, "rationale": "The text says they 'give way to broader ones,' not that they disappear; the movement is gradual, not a complete removal."}], "id": "q09"}, {"question": "According to the section, what does the snow image do to the individual human life and its 'vanity and longing and error'?", "options": [{"text": "It dismisses individual suffering as insignificant in the face of eternity.", "isCorrect": false, "rationale": "The section does not describe dismissal; it describes being 'held against the background of everything' — a juxtaposition that produces beauty, not erasure."}, {"text": "It holds it against the background of everything, producing not diminishment but a kind of terrible beauty.", "isCorrect": true, "rationale": "The text says: 'The individual life, with all its vanity and longing and error, is held for a moment against the background of everything, and the result is not diminishment but a kind of terrible beauty.'"}, {"text": "It resolves the individual's suffering by absorbing it into the universal.", "isCorrect": false, "rationale": "The snow does not resolve anything; the section is explicit that it does not comfort or resolve Gabriel's situation."}, {"text": "It reveals the individual's vanity as the primary cause of human suffering.", "isCorrect": false, "rationale": "The snow is not a moral judgment on vanity; it creates a perspective that encompasses all human experience without condemning it."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
