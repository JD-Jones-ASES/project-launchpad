<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading the Modern Short Story &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Modern_Short_Stories.html">&larr; Back to Reading the Modern Short Story</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading the Modern Short Story &mdash; The Moment It Changes</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What happens when Gurov tries to tell his Moscow dining companion about Anna?", "options": [{"text": "His companion offers practical advice about ending the affair before it causes scandal.", "isCorrect": false, "rationale": "The companion offers no advice; he does not even register that something significant has been said."}, {"text": "His companion responds with a remark about the sturgeon, completely bypassing Gurov's emotional disclosure.", "isCorrect": true, "rationale": "The companion's comment about fish is the story's most devastating depiction of the gap between Gurov's inner life and his social world."}, {"text": "His companion becomes angry, suspecting Gurov of boasting about a conquest.", "isCorrect": false, "rationale": "No anger appears in this scene; the companion's response is not hostile but simply oblivious."}, {"text": "His companion shares a similar story of his own, which comforts Gurov.", "isCorrect": false, "rationale": "No reciprocal story is shared; the companion's total lack of comprehension is precisely what makes the scene so isolating for Gurov."}]}, {"question": "Why is the sturgeon exchange described as 'one of the loneliest exchanges in all of short fiction'?", "options": [{"text": "Because Gurov is dining alone and imagining a conversation that never occurs.", "isCorrect": false, "rationale": "Gurov is dining with an actual companion; the loneliness comes not from solitude but from the failure of connection despite company."}, {"text": "Because the companion is cruel and deliberately dismisses Gurov's attempt to connect.", "isCorrect": false, "rationale": "The companion is not cruel; he is simply unaware that Gurov is reaching out. The loneliness is more profound because no cruelty is intended."}, {"text": "Because two men are in the same room having entirely different conversations, separated by an unbridgeable gap.", "isCorrect": true, "rationale": "The exchange is lonely because the companion is not hostile — just absent. The distance between Gurov's reality and his social world is the source of the desolation."}, {"text": "Because Gurov realizes he does not love Anna after all and feels the emptiness of his life.", "isCorrect": false, "rationale": "The opposite: the scene demonstrates how deeply Gurov loves Anna and how completely that love lacks any outlet in his Moscow world."}]}, {"question": "What kind of isolation does this scene reveal about Gurov's situation?", "options": [{"text": "Social isolation caused by his colleagues discovering the affair and avoiding him.", "isCorrect": false, "rationale": "No one knows about the affair; the isolation is internal — Gurov's real experience has no audience, not because people have withdrawn but because they cannot see it."}, {"text": "The isolation of someone whose real experience has no audience in their existing social world.", "isCorrect": true, "rationale": "Gurov's transformation is invisible to everyone around him; his marriage and friendships are designed for a version of him that no longer exists."}, {"text": "Political isolation resulting from his known association with Anna's dissident husband.", "isCorrect": false, "rationale": "Anna's husband has no dissident associations; the isolation is purely personal and emotional."}, {"text": "Geographic isolation caused by Gurov's decision to move away from Moscow.", "isCorrect": false, "rationale": "Gurov does not move away from Moscow; the isolation is social and emotional despite his continued presence in the city."}]}, {"question": "What is the easy-to-miss significance of the dinner scene occurring in Moscow?", "options": [{"text": "It reveals that Gurov's Moscow life is actually richer and more fulfilling than his Yalta adventures.", "isCorrect": false, "rationale": "The scene reveals the opposite: Moscow's social machinery is designed for a Gurov who no longer exists, making it a place of imprisonment."}, {"text": "It shows that Moscow friends are more sophisticated than resort acquaintances and will eventually understand Gurov.", "isCorrect": false, "rationale": "The companion's response about sturgeon is Chekhov's way of showing that Moscow's social world cannot reach Gurov's inner life at all."}, {"text": "It marks the moment Gurov realizes he has become a person with no one to be that person with except Anna.", "isCorrect": true, "rationale": "The failed connection crystallizes Gurov's situation: his real self has no place in Moscow, and the only person who can receive it is Anna."}, {"text": "It demonstrates that Gurov is regretting the affair and trying to talk himself out of his feelings.", "isCorrect": false, "rationale": "Gurov is not trying to talk himself out of anything; he is attempting, desperately, to express something he cannot contain."}]}, {"question": "What drives Gurov to travel to Anna's provincial town?", "options": [{"text": "Romantic passion in the conventional sense — he wants to declare his love and elope.", "isCorrect": false, "rationale": "The text explicitly says it is not romantic passion in the conventional sense that drives him, but desperation at having no one to be himself with."}, {"text": "A business trip that he arranges to coincide with her location.", "isCorrect": false, "rationale": "There is no business pretext; Gurov makes the trip specifically because his emotional situation in Moscow has become intolerable."}, {"text": "Desperation — he has become a person with no one to be that person with except Anna.", "isCorrect": true, "rationale": "The failed dinner conversation crystallizes this: Gurov needs Anna not simply for love but because she is the only witness to who he has become."}, {"text": "A letter from Anna asking him to come, which he cannot refuse.", "isCorrect": false, "rationale": "No such letter drives the trip; the decision comes entirely from Gurov's internal crisis following the failed dinner exchange."}]}, {"question": "What does the dinner scene reveal about Gurov's Moscow marriage and friendships?", "options": [{"text": "They are sources of genuine support that Gurov is too proud to draw upon.", "isCorrect": false, "rationale": "The scene shows these relationships are fundamentally inadequate — they are built for a Gurov who no longer exists, not withheld support he refuses."}, {"text": "They are designed for a version of Gurov that no longer exists, and no one has noticed.", "isCorrect": true, "rationale": "The social machinery of his life — marriage, friendships, dinner conversations — cannot accommodate the person he has become."}, {"text": "They are on the verge of collapse because his wife has discovered evidence of the affair.", "isCorrect": false, "rationale": "There is no evidence that his wife has discovered anything; the collapse is in Gurov's relationship to his own social world, not in its external structure."}, {"text": "They are actually richer than his attachment to Anna and will outlast his infatuation.", "isCorrect": false, "rationale": "The story does not present these relationships as richer; they are shown to be hollow in contrast to what Gurov experiences with Anna."}]}, {"question": "The close reading exercise focuses on what Gurov does immediately after the companion comments on the sturgeon. What does his reaction likely reveal?", "options": [{"text": "That Gurov accepts the failed communication and resolves to forget Anna entirely.", "isCorrect": false, "rationale": "If anything, the failed communication intensifies Gurov's sense of isolation and the importance of Anna as his only real interlocutor."}, {"text": "That the unreachable gap between Gurov's inner life and his social world pushes him toward action — toward Anna.", "isCorrect": true, "rationale": "The reaction after being unheard is a turning point: the impossibility of sharing his experience in Moscow makes finding Anna the only path forward."}, {"text": "That Gurov laughs the moment off and changes the subject to politics.", "isCorrect": false, "rationale": "The text does not show Gurov laughing it off; the scene is a moment of recognition that something in his life must change."}, {"text": "That Gurov decides to confess the affair to his wife and seek her counsel.", "isCorrect": false, "rationale": "No such confession follows; the resolution of the failed conversation is Gurov's growing determination to find Anna."}]}, {"question": "Why is the dinner scene easy to pass over on first reading, according to the analysis?", "options": [{"text": "Because it is written in a dialect that modern readers find difficult to follow.", "isCorrect": false, "rationale": "Language difficulty is not the reason; Chekhov's prose is notably plain and accessible."}, {"text": "Because it is structurally brief and superficially ordinary, yet carries tremendous emotional weight.", "isCorrect": true, "rationale": "The scene's power is inversely proportional to its brevity and apparent insignificance; only on reflection does its centrality become clear."}, {"text": "Because it is placed in the middle of a long, distracting action sequence.", "isCorrect": false, "rationale": "The story contains no action sequences; the scene is easy to miss because it is quiet, not because it competes with exciting events."}, {"text": "Because it is written from Anna's point of view and therefore hard to connect to Gurov.", "isCorrect": false, "rationale": "The scene is from Gurov's perspective; the ease of missing it comes from Chekhov's characteristic understatement."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
