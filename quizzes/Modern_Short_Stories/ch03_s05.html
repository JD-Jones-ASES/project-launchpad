<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading the Modern Short Story &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Modern_Short_Stories.html">&larr; Back to Reading the Modern Short Story</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading the Modern Short Story &mdash; Noticing Gretta</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Where is Gretta when Gabriel first notices her in the staircase scene?", "options": [{"text": "She is standing in the doorway of the dining room, listening to the guests argue about opera.", "isCorrect": false, "rationale": "Gretta is on the stairs, listening to a song being sung in another room — not in the dining room doorway."}, {"text": "She is standing on the stairs, listening to a song being sung in another room, unaware of being watched.", "isCorrect": true, "rationale": "The text says 'Gabriel catches sight of his wife, Gretta, standing on the stairs, listening to a song being sung in another room. She is still. She is not aware of being watched.'"}, {"text": "She is sitting alone at the supper table after the other guests have moved away.", "isCorrect": false, "rationale": "The scene is explicitly set on the stairs, not at the supper table."}, {"text": "She is outside in the hallway, preparing to leave the party.", "isCorrect": false, "rationale": "The section describes the staircase scene as occurring 'late in the party,' before the departure, and places Gretta on the stairs inside."}], "id": "q01"}, {"question": "What feeling does Gabriel experience when he looks up at Gretta on the stairs?", "options": [{"text": "A comfortable familiarity and gratitude for his long, stable marriage.", "isCorrect": false, "rationale": "The section explicitly contrasts what Gabriel feels with 'the comfortable familiarity of a long marriage' — what he feels is sharper and more urgent."}, {"text": "A sudden rush of tenderness and desire — sharper and more urgent, as if he is seeing her for the first time.", "isCorrect": true, "rationale": "The text says he 'feels a sudden rush of tenderness and desire — not the comfortable familiarity of a long marriage, but something sharper and more urgent, as if he is seeing her for the first time.'"}, {"text": "Irritation and jealousy, wondering what is absorbing her attention so completely.", "isCorrect": false, "rationale": "Gabriel feels tenderness and desire, not irritation; the section describes this as a moment of genuine, uncalculated feeling."}, {"text": "Quiet satisfaction that his wife is the most beautiful woman at the party.", "isCorrect": false, "rationale": "The section does not describe satisfaction or a comparative judgment about beauty; Gabriel's feeling is urgent and unexpected."}], "id": "q02"}, {"question": "What makes the staircase moment significant given what we have seen of Gabriel all evening?", "options": [{"text": "It is the first time Gabriel successfully impresses another character at the party.", "isCorrect": false, "rationale": "The moment is not about impressing anyone; it is significant because Gabriel responds without calculation for the first time."}, {"text": "It is the first time we see Gabriel respond to another person without calculation — he is simply feeling something he did not expect.", "isCorrect": true, "rationale": "The text says 'After an evening in which Gabriel has been anxious, self-conscious, and slightly ridiculous, this is the first time we see him respond to another person without calculation.'"}, {"text": "It marks Gabriel's recognition that the party has been a social failure for him.", "isCorrect": false, "rationale": "The moment is about Gabriel's feeling for Gretta, not about assessing the party's social success or failure."}, {"text": "It is the first moment in which Gabriel connects with his Irish heritage through music.", "isCorrect": false, "rationale": "The moment is about Gabriel's feeling for Gretta; it does not involve Irish heritage or a conscious engagement with music."}], "id": "q03"}, {"question": "What does Gabriel do — and not do — when he sees Gretta on the stairs?", "options": [{"text": "He calls to her and they have a brief, tender conversation before leaving the party.", "isCorrect": false, "rationale": "The section emphasizes what Gabriel does NOT do: he does not go to Gretta or speak to her."}, {"text": "He watches her from below and does not go to her or speak — he composes an image of her in his mind instead.", "isCorrect": true, "rationale": "The text says 'Gabriel does not go to Gretta. He does not speak to her. He watches her from below, composing an image of her in his mind.'"}, {"text": "He approaches her and takes her hand, drawing her attention away from the music.", "isCorrect": false, "rationale": "Gabriel does not approach or touch Gretta; his response to the moment is to observe and imagine rather than to act."}, {"text": "He turns away, embarrassed by the intensity of his own feeling.", "isCorrect": false, "rationale": "Gabriel does not turn away; he continues watching and composing a mental image of Gretta."}], "id": "q04"}, {"question": "What phrase does Gabriel use (as reported in the section) to describe what he is seeing in Gretta?", "options": [{"text": "'A woman with a secret she will not share.'", "isCorrect": false, "rationale": "This is not the phrase cited in the text; it anticipates Part Two's revelation but is not the phrase Gabriel uses in this moment."}, {"text": "'A woman standing on the stairs in the shadow, listening to distant music, a symbol of something.'", "isCorrect": true, "rationale": "The text quotes Gabriel's thought: 'a woman standing on the stairs in the shadow, listening to distant music, a symbol of something.'"}, {"text": "'The woman I married and no longer truly know.'", "isCorrect": false, "rationale": "This is not the phrase cited; it interprets the scene too explicitly in a way the text describes as yet unknown to Gabriel."}, {"text": "'A figure frozen between the world of the living and the world of the dead.'", "isCorrect": false, "rationale": "This is not the phrase from the text; it reads in the story's ending, which is not yet known at this moment."}], "id": "q05"}, {"question": "What does the section say is the difference between 'seeing a person' and 'composing a picture of them'?", "options": [{"text": "Seeing a person involves physical observation while composing a picture requires imagination.", "isCorrect": false, "rationale": "The section's distinction is not about observation versus imagination in a general sense but about whether one engages with the actual other person."}, {"text": "Seeing a person means engaging with who they actually are; composing a picture means turning them into an object of one's own imagination.", "isCorrect": true, "rationale": "The text says 'There is a difference between seeing a person and composing a picture of them, and Joyce knows it' — the concern is Gabriel's tendency to turn others into objects of his imagination."}, {"text": "Seeing a person is passive while composing a picture is an active creative act.", "isCorrect": false, "rationale": "While there is an active/passive dimension, the section's concern is about whether Gabriel is engaging with Gretta as an actual person or as material for his own mental compositions."}, {"text": "Composing a picture is more emotionally honest than simply seeing because it involves real feeling.", "isCorrect": false, "rationale": "The section presents Gabriel's image-composing as a limitation, not as more honest than simply seeing Gretta."}], "id": "q06"}, {"question": "According to the section, what two things about Gabriel are both true and 'will matter enormously in Part Two'?", "options": [{"text": "His love for Ireland and his love for Gretta.", "isCorrect": false, "rationale": "The section does not frame the forward-looking duality in terms of Ireland and Gretta; it is about Gabriel's capacity for feeling versus his tendency to objectify."}, {"text": "His capacity for feeling is real, and his tendency to turn other people into objects of his imagination is also real.", "isCorrect": true, "rationale": "The text says 'Gabriel's capacity for feeling is real. His tendency to turn other people into objects of his own imagination is also real. Both of these truths will matter enormously in Part Two.'"}, {"text": "His intelligence is genuine, and his social anxiety prevents him from connecting with others.", "isCorrect": false, "rationale": "While both of these are true of Gabriel, the section identifies the specific duality that matters for Part Two as feeling versus objectification."}, {"text": "His affection for the Morkan family is sincere, and his marriage to Gretta is deeply unhappy.", "isCorrect": false, "rationale": "The section does not characterize the marriage as deeply unhappy; it identifies a more subtle tension within Gabriel's way of relating to Gretta."}], "id": "q07"}, {"question": "Why does the section say Joyce places the staircase moment where he does — late in the party, after the speech and dinner?", "options": [{"text": "Because it provides a natural climax to the party section before the story's true ending.", "isCorrect": false, "rationale": "While it is structurally placed late, the section's explanation is about emotional register and setup for Part Two, not about providing a climax."}, {"text": "To change the emotional register of everything that follows — Joyce is setting something up, though we do not yet know what.", "isCorrect": true, "rationale": "The text says 'The moment is brief...but it changes the emotional register of everything that follows. Joyce is setting something up, though we do not yet know what.'"}, {"text": "To show that Gabriel only allows himself genuine feeling when he is alone and unobserved.", "isCorrect": false, "rationale": "While Gretta is unaware of being watched, the section does not frame the placement in terms of Gabriel needing solitude for genuine feeling."}, {"text": "To contrast with the Miss Ivors exchange and show that Gabriel is capable of warmth despite his social failures.", "isCorrect": false, "rationale": "While the section notes this is the first uncalculated response after an evening of social awkwardness, its explanation of the placement focuses on what Joyce is setting up for Part Two."}], "id": "q08"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
