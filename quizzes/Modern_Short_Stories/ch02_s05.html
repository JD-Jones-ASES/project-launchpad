<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading the Modern Short Story &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Modern_Short_Stories.html">&larr; Back to Reading the Modern Short Story</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading the Modern Short Story &mdash; The Unresolved Ending</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the most important thing to understand about the ending of 'The Lady with the Dog'?", "options": [{"text": "Anna leaves her husband and moves to Moscow to be with Gurov.", "isCorrect": false, "rationale": "No such resolution occurs; the story ends with the characters in a hotel room, their situation unchanged and unresolved."}, {"text": "The story does not end — Chekhov leaves the characters suspended between the life they have and the life they want.", "isCorrect": true, "rationale": "The final sentences tell us the most difficult part is only beginning, and then Chekhov stops; the lack of resolution is the story's most significant artistic choice."}, {"text": "Gurov returns to his wife, realizing that duty outweighs passion.", "isCorrect": false, "rationale": "No such moral resolution occurs; Chekhov deliberately refuses the conventional ending of renouncing illicit love for duty."}, {"text": "The couple is discovered and publicly shamed, forcing a resolution.", "isCorrect": false, "rationale": "No discovery or public shame ends the story; it closes in a private hotel room where no resolution is in sight."}]}, {"question": "Why does Chekhov choose not to resolve the affair in the final pages?", "options": [{"text": "Because he planned a sequel story that would continue the narrative.", "isCorrect": false, "rationale": "There is no sequel; the open ending is an aesthetic and philosophical choice about the nature of certain human situations."}, {"text": "Because any conventional resolution would be a simplification — a lie about how some situations actually work.", "isCorrect": true, "rationale": "Chekhov's position is that some problems are not solved but lived with; providing a neat ending would falsify the truth the story is pursuing."}, {"text": "Because he ran out of space in the magazine where the story was published.", "isCorrect": false, "rationale": "The open ending is a deliberate artistic decision, not an editorial constraint; Chekhov could have written an ending had he chosen to."}, {"text": "Because Russian censors would not permit him to depict a resolved extramarital affair.", "isCorrect": false, "rationale": "Censorship is not the explanation; Chekhov's reasoning is aesthetic — resolution would falsify the story's truth."}]}, {"question": "What does the phrase 'the most complicated and difficult part' in the final sentences refer to?", "options": [{"text": "The logistical challenge of arranging future meetings without being discovered.", "isCorrect": false, "rationale": "While logistics are part of their difficulty, Chekhov's phrase points to something deeper: the unresolvable nature of their entanglement."}, {"text": "The moral and social impossibility of their love — too real to abandon, too entangled to resolve.", "isCorrect": true, "rationale": "The 'difficult part' is that their situation has no clean exit: they love each other genuinely but cannot be together without destroying their existing lives."}, {"text": "Gurov's upcoming divorce proceedings, which will be financially ruinous.", "isCorrect": false, "rationale": "No divorce proceedings are mentioned; the 'difficult part' refers to the entire emotional and moral situation, not a specific legal process."}, {"text": "Anna's psychological recovery from the guilt she has carried since Yalta.", "isCorrect": false, "rationale": "Anna's guilt is part of the story's earlier arc, not what the final phrase points to; the phrase refers to the unresolved future for both characters."}]}, {"question": "How does the ending connect to the iceberg principle discussed in Chapter 1?", "options": [{"text": "Chekhov hides factual information about the characters' histories beneath the surface of the text.", "isCorrect": false, "rationale": "The iceberg principle here concerns withheld resolution, not withheld biographical facts; it is about the ending's deliberate incompleteness."}, {"text": "Chekhov withholds resolution because resolution would be false, just as the iceberg's strength comes from what is left out.", "isCorrect": true, "rationale": "The connection is explicit in the text: Chekhov withholds not to be mysterious but because what he leaves out (resolution) would falsify the story if included."}, {"text": "The iceberg principle explains why Chekhov keeps the setting descriptions minimal.", "isCorrect": false, "rationale": "The iceberg principle is applied here specifically to the narrative's refusal of closure, not to setting description."}, {"text": "Chekhov follows the iceberg principle by making the story shorter than it needs to be.", "isCorrect": false, "rationale": "Length is not the relevant dimension here; the iceberg principle concerns what the story refuses to provide — resolution — not how long it is."}]}, {"question": "What does Chekhov give the reader instead of certainty and closure?", "options": [{"text": "A moral lesson about the consequences of adultery.", "isCorrect": false, "rationale": "Chekhov deliberately withholds moral lessons; the ending's gift is the feeling of being inside a still-unfinished life, not instruction."}, {"text": "The feeling of being inside a life still being lived, where the next chapter has not been written.", "isCorrect": true, "rationale": "This is Chekhov's alternative to resolution: a rarer, more honest experience of inhabiting an ongoing situation rather than observing a concluded one."}, {"text": "A clear indication that the characters will ultimately find happiness together.", "isCorrect": false, "rationale": "No such indication is offered; optimism would be as false as pessimism — Chekhov refuses to adjudicate the future."}, {"text": "An authorial note explaining the historical context of divorce in tsarist Russia.", "isCorrect": false, "rationale": "No such note appears; Chekhov's method is entirely fictional and emotional, not historical or explanatory."}]}, {"question": "Why does the analysis suggest readers should 'sit with' the frustration the ending produces?", "options": [{"text": "Because subsequent rereading will reveal a resolution that was hidden on first reading.", "isCorrect": false, "rationale": "There is no hidden resolution; the invitation to sit with frustration is about recognizing that the frustration itself is meaningful, not about finding something missed."}, {"text": "Because the frustration is the same condition the characters experience, and Chekhov has made the reader share it.", "isCorrect": true, "rationale": "The reader's dissatisfaction with the unresolved ending mirrors Gurov and Anna's inability to resolve their own situation — which is a remarkable artistic achievement."}, {"text": "Because Chekhov wrote a different ending that critics prefer and the frustration will prompt readers to find it.", "isCorrect": false, "rationale": "No alternate ending exists; the open conclusion is the intended, definitive ending."}, {"text": "Because frustrated readers write better critical essays than satisfied ones.", "isCorrect": false, "rationale": "The reason is artistic and emotional, not pedagogical; the frustration is meant to create empathy with the characters' predicament."}]}, {"question": "What would be wrong with an ending in which Anna leaves her husband or the affair collapses?", "options": [{"text": "Such an ending would make the story too long to publish in a literary magazine.", "isCorrect": false, "rationale": "Length is not Chekhov's concern; the problem with conventional endings is that they falsify the emotional truth of the characters' situation."}, {"text": "It would be a conventional resolution — a simplification or a lie about how this particular situation works.", "isCorrect": true, "rationale": "Chekhov's explicit reasoning: any neat ending would be a falsification of what is actually true about Gurov and Anna's irreducibly complex predicament."}, {"text": "It would shift focus from Gurov to Anna, breaking the story's point of view.", "isCorrect": false, "rationale": "Point of view is not the issue; any ending that resolves the affair would be false regardless of whose perspective it was told from."}, {"text": "It would require introducing new characters that have not been established earlier in the story.", "isCorrect": false, "rationale": "New characters are not the issue; the problem with resolution is philosophical and emotional, not structural."}]}, {"question": "The close reading asks why Chekhov ends the story 'at the beginning of something.' What does this mean?", "options": [{"text": "The story ends at the beginning of Anna's pregnancy, which will force a resolution.", "isCorrect": false, "rationale": "No pregnancy is indicated; the 'beginning of something' refers to the 'most complicated and difficult part' — the ongoing entanglement, not a new plot event."}, {"text": "Chekhov ends at the moment when the full difficulty of the situation is only just being recognized, before any resolution is attempted.", "isCorrect": true, "rationale": "The story stops precisely where it would, in conventional fiction, begin to work toward resolution; this is Chekhov's most radical choice."}, {"text": "The story ends at the beginning of a new year, symbolizing hope for the characters.", "isCorrect": false, "rationale": "The New Year is not the timing reference; the 'beginning of something' refers to the beginning of the most difficult phase of their predicament."}, {"text": "Chekhov ends at the beginning of Anna's decision to divorce her husband.", "isCorrect": false, "rationale": "No such decision is imminent or indicated; the ending is specifically about the lack of any clear path forward."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
