<head>

    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Modern_Short_Stories.html">&larr; Back to Reading the Modern Short Story</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading the Modern Short Story &mdash; The Party Itself</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the section say about students who skim the middle section of the party in 'The Dead'?", "options": [{"text": "They are right to skim it because the real action begins with the staircase scene.", "isCorrect": false, "rationale": "The section explicitly calls skimming a mistake, arguing that 'the party is what is happening.'"}, {"text": "They make a mistake — the party itself is what is happening, and these scenes do the same work as the Miss Ivors exchange.", "isCorrect": true, "rationale": "The text says 'This is a mistake. The party is what is happening' and notes these scenes 'are doing the same work as the Miss Ivors exchange, only more quietly.'"}, {"text": "They miss important plot developments but can recover by re-reading the final section.", "isCorrect": false, "rationale": "The section's argument is about thematic importance, not plot development that can be recovered by re-reading elsewhere."}, {"text": "They respond naturally because Joyce deliberately makes the middle section dull to mirror Dublin's paralysis.", "isCorrect": false, "rationale": "The section argues the middle section is doing important thematic work, not that its apparent dullness is itself the point."}], "id": "q01"}, {"question": "What does the section say Gabriel notices during Aunt Julia's performance of 'Arrayed for the Bridal'?", "options": [{"text": "He notices that Freddy Malins' praise is insincere and somewhat condescending.", "isCorrect": false, "rationale": "Freddy Malins' praise is described as 'effusive, almost desperate' — not insincere or condescending — and Gabriel's attention is on Julia, not Freddy."}, {"text": "He notices the haggard look on his aunt's face and the evidence of age and frailty visible even as her voice fills the room.", "isCorrect": true, "rationale": "The text says 'what Gabriel notices during the performance: the haggard look on his aunt's face, the evidence of age and frailty visible even as her voice fills the room.'"}, {"text": "He notices that the song title is deeply ironic given Julia's age and situation.", "isCorrect": false, "rationale": "While the section points out the irony of the song title for the reader, it describes Gabriel noticing Julia's physical appearance, not consciously registering the irony."}, {"text": "He notices that Aunt Kate seems more moved by the performance than anyone else in the room.", "isCorrect": false, "rationale": "The section focuses on Gabriel's observation of Julia during the performance, not on Aunt Kate's emotional response."}], "id": "q02"}, {"question": "Why does the section say Joyce 'plants' the detail of Aunt Julia's frailty during her song 'carefully and without comment'?", "options": [{"text": "Because it is meant to contrast with Freddy Malins' unreliable character.", "isCorrect": false, "rationale": "The planted detail connects forward to Part Two, not sideways to Freddy Malins' character."}, {"text": "Because in Part Two Gabriel will imagine attending Julia's funeral, and this is the moment he is remembering.", "isCorrect": true, "rationale": "The text says the detail 'is easy to read past' but 'in Part Two, when Gabriel lies in the dark and imagines attending Aunt Julia's funeral, this is the moment he is remembering.'"}, {"text": "Because Joyce wants to show that even beautiful performances contain evidence of mortality.", "isCorrect": false, "rationale": "While the thematic implication touches mortality, the section's specific explanation is the forward connection to Part Two's funeral imagining."}, {"text": "Because the detail explains why Freddy Malins praises the performance so desperately.", "isCorrect": false, "rationale": "Freddy Malins' praise is not explained by Gabriel's observation of Julia's frailty; the detail's significance lies in its connection to Part Two."}], "id": "q03"}, {"question": "What does the guests' discussion about opera and old singers illustrate in the section's reading?", "options": [{"text": "It shows that Dublin was once a culturally sophisticated city with access to the best European entertainment.", "isCorrect": false, "rationale": "While the discussion references past cultural richness, the section reads it as an illustration of paralysis, not as nostalgia Joyce endorses."}, {"text": "It is paralysis made audible — a room of people who have decided the past was better than anything the future can offer.", "isCorrect": true, "rationale": "The text says 'This is paralysis made audible — a room full of people who have decided, without quite meaning to, that the past was better than anything the future can offer.'"}, {"text": "It provides comic relief from the more serious tensions of the Miss Ivors exchange.", "isCorrect": false, "rationale": "The section reads the opera discussion as thematically continuous with the evening's paralysis motif, not as comic relief."}, {"text": "It introduces Aunt Kate's nostalgic personality before the story's final revelation.", "isCorrect": false, "rationale": "While Aunt Kate participates in the discussion, the section uses it to illustrate the broader cultural theme of paralysis, not to characterize Kate individually."}], "id": "q04"}, {"question": "According to the section, what does Gabriel's speech praising 'the dead and gone great ones' represent in the context of the party?", "options": [{"text": "A departure from the party's mood that signals Gabriel's unique perspective.", "isCorrect": false, "rationale": "The section presents the speech as joining, not departing from, a conversation the party has been having all evening."}, {"text": "Not a new theme but a continuation of the conversation the party has been having all evening about the superiority of the past.", "isCorrect": true, "rationale": "The text says 'When Gabriel later rises to give his speech praising “the dead and gone great ones,” he is not introducing a new theme. He is joining a conversation the party has been having all evening.'"}, {"text": "A moment of genuine insight that sets Gabriel apart from the other guests' shallow nostalgia.", "isCorrect": false, "rationale": "The section frames Gabriel's speech as continuous with the party's nostalgia, not as a superior or distinct form of insight."}, {"text": "An ironic gesture that Gabriel intends to contrast with Miss Ivors's focus on the living Irish nation.", "isCorrect": false, "rationale": "The section does not present Gabriel's speech as a conscious ironic response to Miss Ivors; it is part of the party's ambient nostalgia."}], "id": "q05"}, {"question": "What does the section say is wrong with reading Joyce's detailed catalogue of the supper table as excessive?", "options": [{"text": "It misses that Joyce is deliberately testing how much detail a reader can tolerate.", "isCorrect": false, "rationale": "The section does not frame the catalogue as a test of the reader's patience; it argues the catalogue has a specific thematic function."}, {"text": "Joyce is not describing a meal but a household — the abundance is evidence that the old standards still hold and the aunts can still provide.", "isCorrect": true, "rationale": "The text says 'Joyce is not describing a meal. He is describing a household' and explains that 'every dish is evidence that the old standards still hold, that the aunts can still provide.'"}, {"text": "The food descriptions contain symbolic meanings that are essential to understanding the story's ending.", "isCorrect": false, "rationale": "While the food has meaning, the section does not connect it specifically to the story's ending; it reads the catalogue as characterizing the household."}, {"text": "The catalogue establishes the historical authenticity of the story's Dublin setting.", "isCorrect": false, "rationale": "The section interprets the catalogue as characterizing the aunts' household and hospitality, not as documentary historical detail."}], "id": "q06"}, {"question": "What irony does the section identify in the song title 'Arrayed for the Bridal' as performed by Aunt Julia?", "options": [{"text": "The song is about new beginnings, but the Morkan household is entirely devoted to endings and the past.", "isCorrect": false, "rationale": "While this reading is consistent, the section identifies a more specific irony tied to Julia as the performer."}, {"text": "A bride's song is performed by an elderly woman whose life has narrowed to this annual party and the music she can still deliver.", "isCorrect": true, "rationale": "The text says 'The song title itself carries an unspoken irony: a bride's song performed by an elderly woman whose life has narrowed to this annual party and the music she can still, for now, deliver.'"}, {"text": "The song celebrates marriage, but Julia and Kate have never married and never will.", "isCorrect": false, "rationale": "While the aunts are unmarried, the section's specific irony focuses on the contrast between Julia's age and the song's bridal subject matter."}, {"text": "The song was considered old-fashioned even in Joyce's time, so choosing it reveals the aunts' cultural stagnation.", "isCorrect": false, "rationale": "The section does not make a claim about the song's contemporary status; the irony is about Julia as a specific performer."}], "id": "q07"}, {"question": "What does the section say about the love and hospitality behind the Morkan supper table?", "options": [{"text": "It is genuine but also anxious — a determination to prove year after year that nothing has been lost.", "isCorrect": true, "rationale": "The text says 'The abundance is real and the love behind it is real, but there is also something anxious in it — a determination to prove, year after year, that nothing has been lost.'"}, {"text": "It is entirely genuine, showing that the Morkan household is a space of uncomplicated warmth.", "isCorrect": false, "rationale": "The section presents the hospitality as both genuine and anxious; the warmth is real but not uncomplicated."}, {"text": "It is primarily performative, masking the aunts' declining circumstances and health.", "isCorrect": false, "rationale": "While performance is part of the hospitality, the section does not reduce it to masking; the love is described as 'real.'"}, {"text": "It expresses the aunts' desire to maintain their social position in Dublin's middle class.", "isCorrect": false, "rationale": "The section frames the hospitality's anxiety in terms of cultural and personal preservation ('nothing has been lost'), not social positioning."}], "id": "q08"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
