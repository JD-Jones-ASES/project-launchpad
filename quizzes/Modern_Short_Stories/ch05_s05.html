<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading the Modern Short Story &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Modern_Short_Stories.html">&larr; Back to Reading the Modern Short Story</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading the Modern Short Story &mdash; The Iceberg in Practice</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is Hemingway's iceberg principle?", "options": [{"text": "The idea that stories should begin slowly and build to a dramatic climax", "isCorrect": false, "rationale": "The iceberg principle is about omission and what lies beneath the surface, not story pacing."}, {"text": "The idea that a story's power comes from what the writer leaves out", "isCorrect": true, "rationale": "The section states: 'the iceberg principle: the idea that a story's power comes from what the writer leaves out.'"}, {"text": "The idea that character emotions should always be hidden from the reader", "isCorrect": false, "rationale": "The goal is not to hide emotions but to convey them through what is omitted; readers feel what is not stated."}, {"text": "The idea that setting should be described in more detail than character", "isCorrect": false, "rationale": "The iceberg principle is not about the balance of description between setting and character."}]}, {"question": "According to the section, what is absent from 'Hills Like White Elephants' that most stories contain?", "options": [{"text": "Dialogue, landscape description, and character names", "isCorrect": false, "rationale": "All three of these are present in the story; what is absent includes backstory, interior monologue, and resolution."}, {"text": "Backstory, interior monologue, character names for most of the story, and resolution", "isCorrect": true, "rationale": "The section lists: no backstory, no names for most of the story, no interior monologue, and no resolution."}, {"text": "Any reference to time, place, or historical context", "isCorrect": false, "rationale": "The story does reference place (Spain, the Ebro) and time (the train schedule); these are not absent."}, {"text": "Physical description of the characters' appearance", "isCorrect": false, "rationale": "While character description is minimal, the section focuses on backstory, interiority, and resolution as the key absences."}]}, {"question": "What does Hemingway call the male character in the story?", "options": [{"text": "He is unnamed throughout", "isCorrect": false, "rationale": "He does have an identifier; he is called 'the American,' which functions as his designation."}, {"text": "The American", "isCorrect": true, "rationale": "The section states 'the man is “the American”' — a designation rather than a personal name."}, {"text": "Nick Adams", "isCorrect": false, "rationale": "Nick Adams is a different Hemingway character; this man is called 'the American.'"}, {"text": "James", "isCorrect": false, "rationale": "No personal name is given; the man is identified as 'the American.'"}]}, {"question": "What does the section say Hemingway trusts the reader to do?", "options": [{"text": "To research the historical context of abortion in 1920s Spain", "isCorrect": false, "rationale": "The trust is about interpretive engagement, not historical research."}, {"text": "To feel what Hemingway has not stated — to do the work of interpretation", "isCorrect": true, "rationale": "The section states Hemingway 'trusts you to feel it' and that his restraint is 'a form of respect for the reader, who is trusted to do the work of interpretation.'"}, {"text": "To sympathize with the man rather than the girl", "isCorrect": false, "rationale": "The section does not direct readers toward one character; it describes trust in the reader's interpretive capacity."}, {"text": "To recognize the specific literary technique being employed", "isCorrect": false, "rationale": "The trust is emotional and interpretive, not about technical identification."}]}, {"question": "What is the close reading exercise in this section about?", "options": [{"text": "Counting how many times the girl looks at the landscape", "isCorrect": false, "rationale": "The exercise is about the man's reassurances, not the girl's landscape observations."}, {"text": "Counting the man's reassurances and how often he actually drops the subject after them", "isCorrect": true, "rationale": "The exercise asks students to count the man's reassurances versus the number of times he actually stops talking about the operation."}, {"text": "Tracing the symbolic meaning of every drink ordered in the story", "isCorrect": false, "rationale": "The exercise focuses on the man's verbal behavior, not the drinks."}, {"text": "Identifying every use of landscape description in the story", "isCorrect": false, "rationale": "Landscape identification is covered in the previous section; this exercise focuses on the man's speech patterns."}]}, {"question": "How does the section describe Hemingway's restraint in the story?", "options": [{"text": "As a sign of indifference to his characters' fates", "isCorrect": false, "rationale": "The section explicitly says restraint 'is not cold' and not indifference; it is a form of respect."}, {"text": "As coldness — Hemingway did not care enough to explain the characters", "isCorrect": false, "rationale": "The section states 'this restraint is sometimes mistaken for coldness. It is not cold.'"}, {"text": "As a form of respect for characters and readers alike", "isCorrect": true, "rationale": "The section states: 'It is a form of respect — for the characters, who are allowed to be complicated without being explained, and for the reader.'"}, {"text": "As a limitation of his technique that later stories would overcome", "isCorrect": false, "rationale": "Restraint is presented as a deliberate achievement, not a limitation."}]}, {"question": "Hemingway said he could omit things he knew and the reader would feel them 'as if they were there.' What does the section call this effect?", "options": [{"text": "The minimalist style", "isCorrect": false, "rationale": "While minimalism describes the technique, the section uses a specific metaphor — the iceberg — for this effect."}, {"text": "The iceberg — invisible but holding up everything you can see", "isCorrect": true, "rationale": "The section concludes: 'That feeling... is the iceberg. You cannot see it. But it holds up everything you can.'"}, {"text": "The stream of consciousness", "isCorrect": false, "rationale": "Stream of consciousness is associated with Joyce and the interior monologue technique, not Hemingway's omission."}, {"text": "The objective correlative", "isCorrect": false, "rationale": "The objective correlative is T.S. Eliot's term; the section uses 'iceberg' for Hemingway's effect."}]}, {"question": "The section compares reading the story to what experience?", "options": [{"text": "Reading a letter that was never meant to be sent", "isCorrect": false, "rationale": "The comparison is not to a letter; it involves overhearing conversation in a public space."}, {"text": "Sitting near a couple in a restaurant and gradually realizing their conversation is far more serious than it sounds", "isCorrect": true, "rationale": "The section states: 'The knowledge you have is the same kind of knowledge you get from sitting near a couple in a restaurant and gradually realizing that the conversation you are half-hearing is far more serious than its tone suggests.'"}, {"text": "Watching a silent film where the images tell the story without words", "isCorrect": false, "rationale": "The story is primarily dialogue, not images; the comparison is to overhearing, not watching."}, {"text": "Reading between the lines of a formal letter where politeness masks true feelings", "isCorrect": false, "rationale": "The comparison is specifically to overhearing a spoken conversation in a restaurant, not reading a letter."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
