<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading the Modern Short Story &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Modern_Short_Stories.html">&larr; Back to Reading the Modern Short Story</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading the Modern Short Story &mdash; How Chekhov Moves Between Minds</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is free indirect discourse as Chekhov uses it?", "options": [{"text": "A technique in which characters write letters that reveal their inner thoughts.", "isCorrect": false, "rationale": "Free indirect discourse operates in the narration, not through letters; it is about how the narrator's voice and the character's consciousness blend."}, {"text": "A narration method in which the narrator adopts a character's voice and perspective without quotation marks or signal phrases.", "isCorrect": true, "rationale": "This is the definition given in the text: the narrator and character share a voice, allowing Chekhov to inhabit Gurov's consciousness without announcing it."}, {"text": "A dialogue technique in which two characters share a single unattributed line of speech.", "isCorrect": false, "rationale": "Free indirect discourse concerns narration, not dialogue; it is about how thought and perception are rendered, not how speech is attributed."}, {"text": "A structural technique in which multiple narrators take turns telling the same events.", "isCorrect": false, "rationale": "There is no multiple-narrator structure in the story; free indirect discourse describes how a single narrator moves in and out of a character's perspective."}]}, {"question": "How does the sentence 'His wife seemed to him half as long again as he really was' demonstrate free indirect discourse?", "options": [{"text": "It is a neutral physical description provided by the omniscient narrator.", "isCorrect": false, "rationale": "The word 'seemed' signals that this is Gurov's resentful perception, not an objective physical measurement by an omniscient narrator."}, {"text": "It records Gurov's resentful perception wearing the disguise of objective description.", "isCorrect": true, "rationale": "The word 'seemed' is the only clue that we have slipped from the narrator's authority into Gurov's biased perspective; the sentence looks objective but isn't."}, {"text": "It is direct interior monologue, clearly labeled as Gurov's thought.", "isCorrect": false, "rationale": "Free indirect discourse is deliberately not labeled; that is what distinguishes it from clearly marked interior monologue."}, {"text": "It comes from Anna's perspective and reflects her view of the marriage.", "isCorrect": false, "rationale": "The sentence reflects Gurov's resentment toward his wife; it is focalized through him, not through Anna."}]}, {"question": "What is the effect of Chekhov's use of free indirect discourse on the reader's relationship to Gurov?", "options": [{"text": "It creates distance, allowing the reader to judge Gurov objectively from outside.", "isCorrect": false, "rationale": "Free indirect discourse creates intimacy, not distance; it puts the reader inside Gurov's consciousness rather than observing from outside."}, {"text": "It creates intimacy without sentimentality by letting the reader experience Gurov's inner life from the inside.", "isCorrect": true, "rationale": "Chekhov achieves closeness to Gurov's mind without declaring his feelings explicitly; we experience his assumptions and blind spots rather than being told about them."}, {"text": "It confuses the reader about who the protagonist is by mixing all the characters' voices.", "isCorrect": false, "rationale": "While the technique is deliberately slightly disorienting, it does not blur the identity of the protagonist; it is primarily Gurov's consciousness that is rendered."}, {"text": "It removes the reader's ability to see things that Gurov himself cannot see.", "isCorrect": false, "rationale": "The opposite: free indirect discourse actually enables the reader to see what Gurov cannot by positioning them inside his blind spots while remaining aware of them."}]}, {"question": "When the narrator describes Anna as having 'a pathetic expression,' whose judgment is this?", "options": [{"text": "Anna's own self-assessment, expressed through interior monologue.", "isCorrect": false, "rationale": "The description is in the narrator's voice, not Anna's; free indirect discourse makes it ambiguous whether it represents Chekhov's observation or Gurov's perception."}, {"text": "The narrator's objective assessment based on her physical appearance.", "isCorrect": false, "rationale": "Free indirect discourse dissolves the boundary between objective narration and character perception; the description may be Gurov's view rendered as narration."}, {"text": "Both Chekhov's and Gurov's simultaneously — free indirect discourse makes the source deliberately ambiguous.", "isCorrect": true, "rationale": "This is precisely Chekhov's technique: narrator and character share a voice, and the reader must decide moment by moment whose perspective is being offered."}, {"text": "A secondary character's reported opinion passed on by the narrator.", "isCorrect": false, "rationale": "No secondary character reports this observation; the ambiguity is between narrator and Gurov, not between different characters."}]}, {"question": "Why might Chekhov's narration be described as 'slightly disorienting' in this story?", "options": [{"text": "Because the story switches between Russian and French, requiring translation.", "isCorrect": false, "rationale": "No language-switching creates the disorientation; it comes from the blurring of narrative authority and character consciousness within sentences."}, {"text": "Because the boundaries between objective narration and Gurov's private perception blur without warning.", "isCorrect": true, "rationale": "Chekhov can move in and out of Gurov's head within a sentence; the disorientation is purposeful and is itself the point of the technique."}, {"text": "Because the story's timeline is told in reverse chronological order.", "isCorrect": false, "rationale": "The story is told chronologically; the disorientation comes from narrative focalization, not from temporal disruption."}, {"text": "Because the narrative switches between three different first-person narrators.", "isCorrect": false, "rationale": "The story is told in the third person with a single narrative consciousness; no first-person narrators appear."}]}, {"question": "How does free indirect discourse allow Chekhov to show both what Gurov sees and how he sees it?", "options": [{"text": "By placing long psychological explanations after each scene to clarify Gurov's mental state.", "isCorrect": false, "rationale": "Chekhov does the opposite of explaining; his technique is efficient and implicit, not explanatory."}, {"text": "By having Gurov write diary entries that describe his perceptions directly.", "isCorrect": false, "rationale": "There are no diary entries; free indirect discourse works through the narration itself, not through a separate first-person document."}, {"text": "By bending the narration toward Gurov's rhythms and assumptions so the reader experiences his worldview from within.", "isCorrect": true, "rationale": "The narration adopts Gurov's vocabulary and blind spots without announcing it, making the reader inhabit his perspective rather than observe it."}, {"text": "By having Anna describe Gurov's feelings to him in their conversations.", "isCorrect": false, "rationale": "Anna does not describe Gurov's inner life to him; the rendering of consciousness happens through the narration itself."}]}, {"question": "What does the description of Gurov's wife as 'tall, erect, dignified, intellectual' potentially reveal about free indirect discourse?", "options": [{"text": "That the wife is genuinely admirable and Gurov secretly respects her.", "isCorrect": false, "rationale": "The description may be Gurov's slightly resentful characterization rather than an objective assessment — that ambiguity is the whole point."}, {"text": "That these 'neutral' qualities may actually be Gurov's resentful characterization rendered as objective description.", "isCorrect": true, "rationale": "Free indirect discourse makes even seemingly neutral descriptions potentially subjective; the reader must decide whether this is Chekhov's or Gurov's assessment."}, {"text": "That Chekhov admires intellectual women and is using the narrator's voice to compliment her.", "isCorrect": false, "rationale": "Whether Chekhov admires intellectual women is irrelevant here; the point is the technique's ambiguity about whose voice is speaking."}, {"text": "That the narrator is deliberately praising the wife to shame Gurov for his infidelity.", "isCorrect": false, "rationale": "Chekhov does not use the narrator to moralize or shame Gurov; the description's ambiguity is a feature of the technique, not a moral judgment."}]}, {"question": "Why does Chekhov avoid writing 'Gurov felt deeply moved' or 'Gurov realized he was in love'?", "options": [{"text": "Because Gurov never actually falls in love and such statements would be false.", "isCorrect": false, "rationale": "The story is precisely about Gurov falling genuinely in love; Chekhov avoids direct statements not because they would be false, but because they would be artistically inferior."}, {"text": "Because such explicit statements would undermine the intimacy and efficiency of free indirect discourse.", "isCorrect": true, "rationale": "Telling the reader directly what Gurov feels is cruder and less powerful than letting the reader experience his consciousness from within through indirect technique."}, {"text": "Because Russian literary convention of the period forbade the use of direct emotional statements.", "isCorrect": false, "rationale": "No such convention existed; the choice is Chekhov's artistic preference, not a cultural prohibition."}, {"text": "Because the story is narrated by Gurov in the first person and he would not describe himself that way.", "isCorrect": false, "rationale": "The story is in the third person, not first; Chekhov's avoidance of explicit statements is a choice about narrative technique, not a first-person narrator's self-restraint."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
