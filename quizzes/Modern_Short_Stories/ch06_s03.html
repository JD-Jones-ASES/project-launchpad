<head>
    <meta charset="UTF-8">

    <title>Reading the Modern Short Story &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Modern_Short_Stories.html">&larr; Back to Reading the Modern Short Story</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading the Modern Short Story &mdash; The Tradition They Started</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which writer is described as taking Hemingway's iceberg method and applying it to working-class American life?", "options": [{"text": "Flannery O'Connor", "isCorrect": false, "rationale": "O'Connor is linked to Chekhov's gift for self-deception, relocated to the rural American South with a theological edge — not to Hemingway's iceberg method."}, {"text": "Raymond Carver", "isCorrect": true, "rationale": "The text states Carver took Hemingway's iceberg method and pushed it further into the lives of working-class Americans who can barely afford to talk about their problems and mostly do not try."}, {"text": "Mavis Gallant", "isCorrect": false, "rationale": "Gallant is linked to Joyce's concern with national and cultural identity, not to Hemingway's minimalism."}, {"text": "Frank O'Connor", "isCorrect": false, "rationale": "Frank O'Connor is described as an Irish successor to Joyce, writing with more warmth and less irony — not as an extension of Hemingway."}], "id": "q01"}, {"question": "What comparison does the section make regarding Alice Munro?", "options": [{"text": "She is called the Hemingway of the English language for her compressed prose", "isCorrect": false, "rationale": "Munro is not compared to Hemingway — her prose spans decades in scope, the opposite of Hemingway's compression."}, {"text": "She is called the Chekhov of the English language for her interest in ordinary experience accumulating into wisdom", "isCorrect": true, "rationale": "The text says Munro is often called the Chekhov of the English language, and that the comparison is earned: like Chekhov, she is interested in the slow accumulation of ordinary experience into something that feels like wisdom."}, {"text": "She is called the Joyce of Canada for her stream-of-consciousness technique", "isCorrect": false, "rationale": "Munro is not compared to Joyce — she is compared to Chekhov."}, {"text": "She is called the O. Henry of her generation for her surprising plot twists", "isCorrect": false, "rationale": "O. Henry represents the pre-modern story tradition Munro and her contemporaries moved away from."}], "id": "q02"}, {"question": "What distinguishes Flannery O'Connor's approach from Chekhov's, according to this section?", "options": [{"text": "O'Connor writes about urban Northern characters while Chekhov wrote about rural Russians", "isCorrect": false, "rationale": "O'Connor is described as writing about the rural American South, and Chekhov wrote about various settings including cities — but the key distinction the section makes is theological, not geographic."}, {"text": "O'Connor adds a theological edge and relocates self-deception to the rural American South", "isCorrect": true, "rationale": "The text says O'Connor shares Chekhov's gift for seeing how people deceive themselves, but relocates it to the rural American South and sharpens it with a theological edge Chekhov would not have recognized."}, {"text": "O'Connor relies entirely on dialogue while Chekhov relies on interiority", "isCorrect": false, "rationale": "The section does not distinguish them by use of dialogue versus interiority — the key difference named is theological perspective and setting."}, {"text": "O'Connor writes with warmth; Chekhov writes with clinical detachment", "isCorrect": false, "rationale": "Warmth is attributed to Frank O'Connor, not Flannery O'Connor. The section describes Flannery O'Connor's stories as funny and terrifying in equal measure."}], "id": "q03"}, {"question": "What is Mavis Gallant's primary subject matter, as described in this section?", "options": [{"text": "The political upheavals of twentieth-century Europe", "isCorrect": false, "rationale": "While Gallant lived in Paris, the section characterizes her subject as displacement and exile, not political events per se."}, {"text": "The theological conflicts within Irish Catholicism", "isCorrect": false, "rationale": "Religious conflict within Catholicism is associated with Frank O'Connor and Irish fiction, not Gallant."}, {"text": "Displacement, exile, and the small cruelties of people living far from home", "isCorrect": true, "rationale": "The text describes Gallant's stories as being about displacement, exile, and the small cruelties of people who live far from home — connecting her to Joyce's interest in national and cultural identity."}, {"text": "The immigrant experience of moving between South Asia and North America", "isCorrect": false, "rationale": "The South Asian-North American immigrant experience is Jhumpa Lahiri's subject, not Gallant's."}], "id": "q04"}, {"question": "Frank O'Connor's critical essay 'The Lonely Voice' is described as what?", "options": [{"text": "A guide to the technical craft of plotting short stories", "isCorrect": false, "rationale": "The section does not describe the essay as a craft guide to plotting — it praises it as a critical study of the form."}, {"text": "One of the best critical studies of the short story ever written", "isCorrect": true, "rationale": "The text states that 'The Lonely Voice' remains one of the best critical studies of the short story ever written."}, {"text": "A memoir about his friendship with James Joyce", "isCorrect": false, "rationale": "The section does not describe the essay as a memoir — it is described as a critical study of the short story as a form."}, {"text": "A theoretical argument that the short story is superior to the novel", "isCorrect": false, "rationale": "While the essay is about the short story, the section describes it as a critical study, not a theoretical argument for the form's superiority."}], "id": "q05"}, {"question": "To which two writers is Jhumpa Lahiri most closely connected in this section?", "options": [{"text": "Hemingway and O'Connor", "isCorrect": false, "rationale": "Lahiri is not connected to Hemingway or Flannery O'Connor in this section — her connection is to Joyce's attention to domestic ceremony and Chekhov's sensitivity to quiet failures of understanding."}, {"text": "Joyce and Chekhov", "isCorrect": true, "rationale": "The text says Lahiri carries forward Joyce's attention to domestic ceremony and Chekhov's sensitivity to the quiet ways people fail to understand each other."}, {"text": "Munro and Carver", "isCorrect": false, "rationale": "Munro and Carver are successors to Chekhov and Hemingway respectively, but Lahiri's section does not connect her to them."}, {"text": "Gallant and Frank O'Connor", "isCorrect": false, "rationale": "The section connects Lahiri to the founding three writers — Joyce and Chekhov — not to other successors."}], "id": "q06"}, {"question": "What is the starting recommendation for readers new to Raymond Carver?", "options": [{"text": "'Cathedral' or 'What We Talk About When We Talk About Love'", "isCorrect": true, "rationale": "The text explicitly recommends starting with 'Cathedral' or 'What We Talk About When We Talk About Love' for new Carver readers."}, {"text": "'A Good Man Is Hard to Find' or 'Everything That Rises Must Converge'", "isCorrect": false, "rationale": "These are the recommended starting points for Flannery O'Connor, not Raymond Carver."}, {"text": "'Guests of the Nation' or 'My Oedipus Complex'", "isCorrect": false, "rationale": "These are recommended for Frank O'Connor, not Raymond Carver."}, {"text": "'The Bear Came Over the Mountain' or the collection Runaway", "isCorrect": false, "rationale": "These are recommended for Alice Munro, not Raymond Carver."}], "id": "q07"}, {"question": "The section describes the modern short story tradition as carried forward 'sometimes by imitation, sometimes by argument, sometimes by doing something so different it only makes sense as a response to what came before.' What does this suggest about literary traditions?", "options": [{"text": "Later writers must strictly follow the methods of their predecessors to be taken seriously", "isCorrect": false, "rationale": "The section explicitly includes argument and radical difference as valid ways of carrying a tradition forward — strict imitation is not required."}, {"text": "Literary traditions are kept alive through dialogue — including disagreement and departure — not only imitation", "isCorrect": true, "rationale": "The phrasing suggests that a living tradition encompasses imitation, productive argument, and even responses that diverge sharply — all of which constitute meaningful engagement with what came before."}, {"text": "The best writers reject their influences entirely and begin from nothing", "isCorrect": false, "rationale": "The section says none of these writers worked in isolation and all are understood in relation to those who came before — rejection from nothing is not what is described."}, {"text": "Traditions eventually die when writers stop imitating earlier masters", "isCorrect": false, "rationale": "The section presents the tradition as alive and expansive, not as dependent on strict imitation for survival."}], "id": "q08"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
