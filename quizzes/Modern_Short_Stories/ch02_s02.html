<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading the Modern Short Story &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Modern_Short_Stories.html">&larr; Back to Reading the Modern Short Story</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading the Modern Short Story &mdash; Yalta as a Place Out of Time</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What function does Yalta serve in the story beyond being a physical setting?", "options": [{"text": "It represents the characters' shared working-class background and limited mobility.", "isCorrect": false, "rationale": "Yalta is a resort town for the leisure class; its function is to create suspended rules and temporary freedom, not to represent class background."}, {"text": "It creates a condition of suspended rules in which behavior otherwise impossible becomes possible.", "isCorrect": true, "rationale": "Chekhov uses Yalta as a space where social obligations are lifted and consequences seem to belong to someone else, making the affair feel inevitable."}, {"text": "It symbolizes the characters' desire to immigrate and leave Russia behind.", "isCorrect": false, "rationale": "Neither character expresses a desire to emigrate; Yalta functions as a temporary escape from their existing lives, not an emigration fantasy."}, {"text": "It signals that the affair is morally wrong by associating pleasure with the sea.", "isCorrect": false, "rationale": "Chekhov does not moralize through setting in this way; Yalta's role is structural — enabling the affair — not morally instructive."}]}, {"question": "Why do resort towns create what Chekhov identifies as a 'dangerous' space in fiction?", "options": [{"text": "They attract criminal elements who prey on vacationing travelers.", "isCorrect": false, "rationale": "The danger Chekhov identifies is emotional and psychological, not related to crime; it is the danger of feelings that outlast the temporary space."}, {"text": "They allow people to behave as if consequences belong to someone else, while feelings may become permanent.", "isCorrect": true, "rationale": "The danger is the mismatch: the setting is temporary, but the emotions generated there can be permanent — exactly what happens to Gurov."}, {"text": "They encourage excessive spending that leads to financial ruin and family breakdown.", "isCorrect": false, "rationale": "Financial consequences are not part of Chekhov's analysis of resort towns; the danger is emotional, not economic."}, {"text": "They are associated with cholera outbreaks and physical illness in nineteenth-century Russia.", "isCorrect": false, "rationale": "While disease was historically associated with some resort towns, this is not the dimension Chekhov emphasizes in his analysis of Yalta."}]}, {"question": "Why does the affair between Gurov and Anna feel both 'inevitable and temporary' in Yalta?", "options": [{"text": "Because both characters are on the verge of divorcing their spouses before they meet.", "isCorrect": false, "rationale": "Neither character is planning a divorce; the inevitability comes from the resort's atmosphere, not from pre-existing plans."}, {"text": "Because the warm setting and idle hours make romance natural, while both characters know they will leave.", "isCorrect": true, "rationale": "Yalta conspires to make the affair feel natural, and the built-in departure date makes it seem emotionally safe — until it is not."}, {"text": "Because Anna declares from the start that the affair will end when summer ends.", "isCorrect": false, "rationale": "Anna does not make such a declaration; the sense of an expiration date is implicit in the nature of resort life, not explicitly stated."}, {"text": "Because Gurov's Moscow friends warn him that resort affairs never last.", "isCorrect": false, "rationale": "Gurov's Moscow friends are not part of the Yalta section; the temporary quality of the affair comes from the logic of the resort setting itself."}]}, {"question": "What does Gurov fail to account for in his assumption that the Yalta affair will follow his usual pattern?", "options": [{"text": "That Anna's husband will discover the affair and pursue him to Moscow.", "isCorrect": false, "rationale": "No such pursuit occurs; Gurov's error is about his own feelings, not about external consequences."}, {"text": "That feelings generated in a temporary place can turn out to be permanent.", "isCorrect": true, "rationale": "Gurov's entire framework assumes the setting and the emotions end together; he cannot anticipate that Anna will follow him home in his thoughts."}, {"text": "That Anna will become pregnant and create an inescapable obligation.", "isCorrect": false, "rationale": "Pregnancy is not part of the story; the complication is emotional, not biological."}, {"text": "That his wife will hire a detective to monitor his activities in Yalta.", "isCorrect": false, "rationale": "No detective appears in the story; the complication is internal to Gurov's emotional life, not externally imposed."}]}, {"question": "How does Chekhov use the contrast between Yalta and Moscow to convey emotional states?", "options": [{"text": "Yalta represents moral corruption; Moscow represents moral clarity.", "isCorrect": false, "rationale": "Chekhov does not assign moral values to the settings in this simple way; the contrast is between openness/possibility and enclosure/obligation."}, {"text": "Yalta is warmth and possibility; Moscow is cold, enclosed, and full of social obligations.", "isCorrect": true, "rationale": "The settings carry emotional meaning: Yalta enables feeling; Moscow embodies the life that cannot accommodate what Yalta made possible."}, {"text": "Yalta represents youth; Moscow represents old age and approaching death.", "isCorrect": false, "rationale": "Age is not the primary contrast Chekhov draws between these settings; the contrast is between freedom and social constraint."}, {"text": "Yalta is shown as dangerously foreign; Moscow is comforting and familiar.", "isCorrect": false, "rationale": "Moscow is oppressive in its familiarity, not comforting; it represents the life that cannot hold what Gurov now feels."}]}, {"question": "What does Anna's provincial town, as described when Gurov visits, represent in the story's landscape of emotions?", "options": [{"text": "A romanticized pastoral setting that offers the couple a possible refuge.", "isCorrect": false, "rationale": "The town is described as gray and dull; Chekhov does not romanticize it. It represents confinement, not refuge."}, {"text": "A cage — gray, dull, and topped with nails — symbolizing Anna's trapped life.", "isCorrect": true, "rationale": "The specific detail of the fence topped with nails captures the imprisoning quality of the life Anna must return to after Yalta."}, {"text": "A city of possibility like Yalta, where their love can grow freely.", "isCorrect": false, "rationale": "The town is the opposite of Yalta; its drabness underlines the impossibility of the love that Yalta generated."}, {"text": "A neutral space where neither the Yalta nor the Moscow emotional register applies.", "isCorrect": false, "rationale": "The town is not neutral; it is deeply negatively coded as confinement and stagnation in contrast to Yalta's openness."}]}, {"question": "What does the phrase 'a temporary place has produced a permanent result' mean in the context of the story?", "options": [{"text": "The couple has had a child together, creating a lasting legal obligation.", "isCorrect": false, "rationale": "No child results from the affair; the 'permanent result' is emotional — Gurov cannot stop thinking about Anna after returning to Moscow."}, {"text": "Gurov's feelings for Anna persist and grow after leaving Yalta, defying the logic of a temporary arrangement.", "isCorrect": true, "rationale": "The affair was supposed to be contained by the resort's logic; instead, the feeling follows Gurov home and refuses to fade."}, {"text": "Gurov's reputation in Moscow is permanently damaged by rumors of the affair.", "isCorrect": false, "rationale": "No one in Moscow appears to know about the affair; Gurov's social reputation is not the concern."}, {"text": "Yalta has changed politically as a result of Gurov's scandal there.", "isCorrect": false, "rationale": "There is no political dimension to this statement; it refers entirely to Gurov's inner emotional life."}]}, {"question": "Why does Chekhov not need to explain what each setting symbolizes?", "options": [{"text": "Because the settings are so famous that nineteenth-century Russian readers already understood their meaning.", "isCorrect": false, "rationale": "While Russian readers would recognize these places, Chekhov's technique is literary, not dependent on cultural familiarity."}, {"text": "Because the settings carry their emotional meaning through concrete sensory details that do the work directly.", "isCorrect": true, "rationale": "Chekhov's method is to show (warmth, open sea, nails on a fence) rather than tell; the details convey emotional states without explanation."}, {"text": "Because Anna explains the symbolism of each place to Gurov in their conversations.", "isCorrect": false, "rationale": "No such explanatory dialogue occurs; the settings communicate meaning through description, not character exposition."}, {"text": "Because the story uses footnotes to identify what each location represents thematically.", "isCorrect": false, "rationale": "There are no footnotes; Chekhov's method is purely through suggestive description within the narrative itself."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
