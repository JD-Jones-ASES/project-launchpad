    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Modern_Short_Stories.html">&larr; Back to Reading the Modern Short Story</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading the Modern Short Story &mdash; What These Three Stories Have in Common</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What term did James Joyce coin for the sudden moment of self-recognition experienced by a character?", "options": [{"text": "Epiphany", "isCorrect": true, "rationale": "Joyce introduced the term 'epiphany' to describe the sudden, often painful moment of self-recognition that arrives at the end of each story in this chapter."}, {"text": "Catharsis", "isCorrect": false, "rationale": "Catharsis is Aristotle's term for the emotional release an audience feels at the end of a tragedy, not Joyce's term for character self-recognition."}, {"text": "Iceberg", "isCorrect": false, "rationale": "The iceberg is Hemingway's image for what a story leaves unsaid, not a term for self-recognition."}, {"text": "Recognition", "isCorrect": false, "rationale": "While recognition is used informally, the specific literary term Joyce used is 'epiphany.'"}], "id": "q01"}, {"question": "Hemingway's 'iceberg' theory refers to which aspect of storytelling?", "options": [{"text": "The use of cold, detached prose style", "isCorrect": false, "rationale": "The iceberg theory is not about prose temperature or detachment as a stylistic tone."}, {"text": "Everything a story leaves unsaid but trusts the reader to feel", "isCorrect": true, "rationale": "Hemingway's iceberg image captures the idea that the most significant meaning lies beneath the surface — what the writer omits and trusts the reader to supply."}, {"text": "The slow buildup of tension before a climax", "isCorrect": false, "rationale": "The iceberg theory is about omission and what is withheld, not about pacing or tension buildup."}, {"text": "The ratio of dialogue to narration in a story", "isCorrect": false, "rationale": "While Hemingway favored dialogue, the iceberg theory specifically refers to the unsaid meaning, not the formal ratio of dialogue to narration."}], "id": "q02"}, {"question": "At the end of 'The Lady with the Dog,' what does Gurov realize?", "options": [{"text": "That his affair with Anna was a mistake he must correct", "isCorrect": false, "rationale": "Gurov does not conclude the affair was a mistake — rather, he recognizes it as the most important thing in his life."}, {"text": "That the affair he expected to forget has become the most important thing in his life", "isCorrect": true, "rationale": "This is Gurov's epiphany: standing in a Moscow hotel room, he sees that his feelings for Anna cannot be dismissed, yet nothing in his situation permits him to act on them."}, {"text": "That he must leave his wife and move to Yalta", "isCorrect": false, "rationale": "The story ends without resolution — Gurov does not take definitive action to leave his wife."}, {"text": "That Anna has been deceiving him all along", "isCorrect": false, "rationale": "There is no deception revealed. The epiphany is about Gurov's own feelings, not about Anna's honesty."}], "id": "q03"}, {"question": "What distinguishes an epiphany in modern short fiction from a traditional story resolution?", "options": [{"text": "An epiphany always provides a happy ending", "isCorrect": false, "rationale": "The text explicitly states that none of the epiphanies in these three stories is happy."}, {"text": "An epiphany resolves the plot by explaining all events", "isCorrect": false, "rationale": "Epiphanies in modern fiction do not resolve plots — they arrive as reckonings, not as answers."}, {"text": "An epiphany is a moment of clear seeing that does not resolve the story", "isCorrect": true, "rationale": "Modern epiphanies arrive as reckonings — moments when a character sees something true about their life — without providing comfort or resolution."}, {"text": "An epiphany occurs only at the beginning of a story", "isCorrect": false, "rationale": "Epiphanies in modern fiction typically occur at or near the end of a story, not at the beginning."}], "id": "q04"}, {"question": "What situation traps Gabriel in 'The Dead'?", "options": [{"text": "A dead-end job and financial ruin", "isCorrect": false, "rationale": "Gabriel's trap is emotional and psychological, not financial or professional."}, {"text": "A version of himself that has never been tested by real emotional exposure", "isCorrect": true, "rationale": "Gabriel is trapped in a self-image that has never confronted genuine emotional vulnerability — and his epiphany forces him to see this."}, {"text": "His grief over his mother's recent death", "isCorrect": false, "rationale": "While death is a theme in 'The Dead,' Gabriel's trap is about emotional self-deception, not grief over his mother."}, {"text": "His inability to write the speech he has prepared", "isCorrect": false, "rationale": "Gabriel does deliver his speech; the trap the section identifies is his emotional self-protection, not a public speaking failure."}], "id": "q05"}, {"question": "How do Chekhov, Joyce, and Hemingway treat the reader, according to this section?", "options": [{"text": "They provide explicit explanations to guide less experienced readers", "isCorrect": false, "rationale": "The text specifically says these writers refuse to explain — they trust readers to do real work without being guided by explicit commentary."}, {"text": "They treat the reader as incapable of tolerating ambiguity", "isCorrect": false, "rationale": "The opposite is true: all three writers trust readers to sit with ambiguity rather than demanding resolution."}, {"text": "They trust the reader to supply meaning and sit with ambiguity", "isCorrect": true, "rationale": "This is described as the deepest thing these three writers share — a belief that the reader can do real work, feeling what is not stated without needing explanation."}, {"text": "They test the reader's patience by withholding all emotional content", "isCorrect": false, "rationale": "These writers do not withhold emotional content — they convey it through implication and trust, not by eliminating it."}], "id": "q06"}, {"question": "What does the nineteenth-century short story offer that the modern short story does not?", "options": [{"text": "A focus on psychological interiority", "isCorrect": false, "rationale": "Psychological interiority is a feature of modern short fiction, not of the nineteenth-century form."}, {"text": "The satisfaction of closure — a mystery solved, a moral delivered, a fate sealed", "isCorrect": true, "rationale": "The text explicitly contrasts the nineteenth-century story's offer of closure with the modern story's offer of the moment just before everything changes."}, {"text": "An emphasis on characters who are trapped without escape", "isCorrect": false, "rationale": "Trapped characters who see without escaping is a feature of modern fiction, not the nineteenth-century story."}, {"text": "Ambiguity that the reader must resolve independently", "isCorrect": false, "rationale": "Ambiguity is the hallmark of modern short fiction, not of the closure-driven nineteenth-century story."}], "id": "q07"}, {"question": "What does the girl at the railway station in Hemingway's 'Hills Like White Elephants' know, according to this section?", "options": [{"text": "That she will refuse the man and end the relationship", "isCorrect": false, "rationale": "The text does not say she will refuse — in fact, it suggests she will probably say yes, knowing the cost."}, {"text": "That the man's request is dangerous and she must escape", "isCorrect": false, "rationale": "The section does not frame the situation as a physical danger requiring escape — it is a decision with an unnamed emotional cost."}, {"text": "That saying yes will cost her something she cannot name, yet she will probably say yes", "isCorrect": true, "rationale": "This is precisely the epiphany Hemingway stages: the girl sees the cost clearly but recognizes she will most likely comply — and this seeing, without resolution, is the point of the story."}, {"text": "That she has already made her decision and feels at peace with it", "isCorrect": false, "rationale": "The section conveys unresolved tension, not peace — the story stops at the moment of seeing, not after acceptance."}], "id": "q08"}, {"question": "The section shows the iceberg at work in each story's ending. What does each writer withhold?", "options": [{"text": "All three writers withhold the emotional reactions of secondary characters, keeping the focus on the protagonist", "isCorrect": false, "rationale": "The section's description of the iceberg at each ending is specific to what the primary narrative withholds, not secondary character reactions."}, {"text": "Chekhov withholds what Gurov and Anna decide; Joyce dissolves Gabriel into a vast image; Hemingway never names the subject of the conversation", "isCorrect": true, "rationale": "The section lists all three: 'Chekhov does not tell us what Gurov and Anna decide. Joyce pulls back... into an image so vast it seems to dissolve him. Hemingway never names the subject of the conversation at all.'"}, {"text": "All three writers withhold their characters' dialogue so that the reader must infer everything from action alone", "isCorrect": false, "rationale": "Chekhov and Joyce use narration and dialogue; the iceberg at work refers to specific resolutions and meanings withheld, not dialogue broadly."}, {"text": "Chekhov withholds the setting, Joyce withholds the dialogue, and Hemingway withholds the characters' feelings", "isCorrect": false, "rationale": "This misidentifies each writer's specific withholding; the section is precise about what each one omits at the story's ending."}], "id": "q09"}, {"question": "What do all three epiphanies in these stories have in common?", "options": [{"text": "Each epiphany is followed by a decisive action that changes the character's life", "isCorrect": false, "rationale": "None of the epiphanies is followed by decisive action; they arrive as reckonings, and the stories end before any action is taken."}, {"text": "Each epiphany is happy, offering the character a sense of relief and possibility", "isCorrect": false, "rationale": "The section explicitly states: 'None of them is happy.' The epiphanies bring clarity but not comfort."}, {"text": "None is happy, none resolves the story, and each arrives as a reckoning — a moment of clear seeing without comfort", "isCorrect": true, "rationale": "The section says: 'Each of these is an epiphany. None of them is happy. None of them resolves the story. They arrive not as answers but as reckonings.'"}, {"text": "Each epiphany reveals a secret that another character has been hiding from the protagonist", "isCorrect": false, "rationale": "While some involve revelation (Gabriel's about Gretta), the common quality is not secrets revealed but a character seeing their own life clearly and without comfort."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
