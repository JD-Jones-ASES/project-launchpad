    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Modern_Short_Stories.html">&larr; Back to Reading the Modern Short Story</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading the Modern Short Story &mdash; Gurov&#x27;s Self-Deception</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How does Chekhov introduce Gurov's character at the opening of the story?", "options": [{"text": "He has another character describe Gurov's reputation around Moscow.", "isCorrect": false, "rationale": "Chekhov does not use other characters to describe Gurov; the reader learns about him through his own attitudes and behavior."}, {"text": "He lets Gurov reveal his own beliefs about women without editorial comment.", "isCorrect": true, "rationale": "Chekhov presents Gurov's cynical views — calling women 'the inferior race' — without judging them, letting the reader draw conclusions."}, {"text": "He opens with Gurov's wife condemning his past behavior.", "isCorrect": false, "rationale": "The story does not open with Gurov's wife; we learn about Gurov's character through his own thoughts and history of affairs."}, {"text": "He describes Gurov through an omniscient narrator who explicitly calls him shallow.", "isCorrect": false, "rationale": "Chekhov's narration is notably restrained; he does not editorialize about Gurov's shallowness, which is central to the technique."}], "id": "q01"}, {"question": "What does Gurov privately call women, and what is the irony of this attitude?", "options": [{"text": "He calls them 'the superior race' and the irony is that he secretly despises them.", "isCorrect": false, "rationale": "Gurov's phrase is 'the inferior race,' not the superior race; his irony runs in the opposite direction."}, {"text": "He calls them 'the inferior race' while spending most of his energy pursuing them.", "isCorrect": true, "rationale": "This self-contradiction exposes Gurov's self-deception: he dismisses women intellectually while remaining compulsively drawn to them."}, {"text": "He calls them 'the dangerous sex' and the irony is that he fears his own wife.", "isCorrect": false, "rationale": "The text uses 'the inferior race,' not 'the dangerous sex,' and the irony concerns his pursuit of women he claims to find tiresome."}, {"text": "He calls them 'the necessary evil' but proves incapable of forming any lasting attachment.", "isCorrect": false, "rationale": "While Gurov has had many affairs, the story's whole arc concerns the one attachment that turns out to be lasting and transformative."}], "id": "q02"}, {"question": "What is the 'trap' Chekhov sets for the reader through Gurov's self-presentation?", "options": [{"text": "The reader believes Gurov is a heroic figure until his crimes are revealed.", "isCorrect": false, "rationale": "No crimes are revealed; the trap is about the failure of Gurov's cynical self-image, not about a moral crime."}, {"text": "The reader is led to trust Gurov's cynical self-portrait, which the story then dismantles.", "isCorrect": true, "rationale": "Chekhov presents Gurov's worldview convincingly so that its collapse — as genuine love develops — has full dramatic impact."}, {"text": "The reader is deceived into thinking Anna is the story's protagonist.", "isCorrect": false, "rationale": "The story centers on Gurov throughout; the trap involves Gurov's self-knowledge, not a shift in point of view."}, {"text": "The reader expects a comic story about a serial womanizer and is surprised by tragedy.", "isCorrect": false, "rationale": "While tone shifts, the trap is specifically about Gurov's belief that the affair will follow a familiar pattern, not about genre expectation."}], "id": "q03"}, {"question": "How does Gurov expect his affair with Anna to unfold, based on his past experience?", "options": [{"text": "He expects it to end in marriage and social scandal.", "isCorrect": false, "rationale": "Marriage is not Gurov's expectation; he assumes the affair will follow his usual pattern of pursuit, temporary pleasure, and forgetting."}, {"text": "He expects pursuit, conquest, mild regret, and a return to routine.", "isCorrect": true, "rationale": "Gurov has repeated this pattern with other women and assumes Anna will simply be another episode in a familiar sequence."}, {"text": "He expects Anna to break off the affair and return to her husband without incident.", "isCorrect": false, "rationale": "While Anna does return to her husband, Gurov's expectation is that the affair will fade naturally for him, not that Anna will end it."}, {"text": "He expects intense emotional turmoil, having always been prone to falling deeply in love.", "isCorrect": false, "rationale": "The opposite is true: Gurov's established pattern involves emotional detachment; his intense feeling for Anna is an unprecedented disruption."}], "id": "q04"}, {"question": "What makes Chekhov's portrayal of Gurov's transformation remarkable as a narrative technique?", "options": [{"text": "Chekhov announces the transformation directly through an interior monologue.", "isCorrect": false, "rationale": "Chekhov never announces the transformation; its power comes from indirect accumulation of evidence rather than explicit declaration."}, {"text": "The transformation happens through a dramatic confrontation between Gurov and his wife.", "isCorrect": false, "rationale": "No such confrontation drives the transformation; it unfolds internally through Gurov's restlessness and obsessive thought about Anna."}, {"text": "The reader perceives the transformation through accumulating small details before Gurov himself does.", "isCorrect": true, "rationale": "Chekhov creates a gap between what Gurov knows and what the reader sees, giving the story much of its emotional power."}, {"text": "A trusted friend notices the change in Gurov and tells him he has been transformed by love.", "isCorrect": false, "rationale": "Gurov has no one in his social world who perceives his inner change; his isolation is a key theme of the story."}], "id": "q05"}, {"question": "What does Gurov's 'armor' of cynicism ultimately prove to be?", "options": [{"text": "A genuine philosophical conviction that survives even his affair with Anna.", "isCorrect": false, "rationale": "The affair shatters Gurov's cynical worldview; the text describes it as a 'costume,' not a genuine conviction."}, {"text": "A costume concealing a man capable of far deeper feeling than he suspected.", "isCorrect": true, "rationale": "Chekhov's point is that Gurov's cynicism was always a surface persona; beneath it was the capacity for genuine love."}, {"text": "A defense mechanism that successfully protects him from lasting emotional pain.", "isCorrect": false, "rationale": "The cynicism fails entirely; rather than protecting him, it leaves Gurov without any framework to understand what is happening to him."}, {"text": "A performance put on for Anna's benefit to seem experienced and worldly.", "isCorrect": false, "rationale": "The cynicism is Gurov's internal self-conception, not a performance for Anna; it is the reader — not Anna — who sees through it."}], "id": "q06"}, {"question": "What evidence accumulates in the text to signal Gurov's transformation?", "options": [{"text": "Gurov writes letters to Anna declaring his love and leaves his wife.", "isCorrect": false, "rationale": "There are no such letters in the story's early movement; the evidence is subtler — internal restlessness and obsessive thought."}, {"text": "Gurov begins attending church and reflecting on the moral dimensions of adultery.", "isCorrect": false, "rationale": "Religious reflection is not presented as evidence of Gurov's transformation; the change is emotional and psychological, not moral."}, {"text": "Persistent thoughts of Anna in Moscow, growing restlessness, and the desperate trip to her town.", "isCorrect": true, "rationale": "These specific details — accumulated without announcement — show that the affair has grown into something Gurov cannot manage or dismiss."}, {"text": "Gurov confides in his wife and asks for her understanding of what he is experiencing.", "isCorrect": false, "rationale": "Gurov does not confide in his wife; his inability to share the experience with anyone in his social world is central to his isolation."}], "id": "q07"}, {"question": "Why does Chekhov withhold editorial comment on Gurov's cynical views?", "options": [{"text": "To suggest that Chekhov personally agrees with Gurov's attitudes toward women.", "isCorrect": false, "rationale": "The story's entire arc undermines Gurov's attitudes; Chekhov's restraint is a narrative strategy, not an expression of agreement."}, {"text": "Because the story is told from Anna's point of view, not Gurov's.", "isCorrect": false, "rationale": "The story is predominantly focalised through Gurov; Anna's inner life receives far less direct attention."}, {"text": "So that the reader accepts Gurov's self-portrait, making its eventual dismantling more powerful.", "isCorrect": true, "rationale": "The trap only works if we believe Gurov. Chekhov's restraint is purposeful: it sets up the contrast between who Gurov thinks he is and who he turns out to be."}, {"text": "To maintain strict objectivity and avoid taking sides in questions of morality.", "isCorrect": false, "rationale": "While Chekhov is famously restrained, the withholding here is a specific narrative strategy tied to the story's arc, not simple moral neutrality."}], "id": "q08"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
