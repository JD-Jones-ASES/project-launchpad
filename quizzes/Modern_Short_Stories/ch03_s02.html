    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Modern_Short_Stories.html">&larr; Back to Reading the Modern Short Story</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading the Modern Short Story &mdash; Gabriel&#x27;s Anxiety</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does Gabriel's exchange with Lily at the beginning of the party reveal about him?", "options": [{"text": "He is rude and condescending toward working-class people.", "isCorrect": false, "rationale": "Gabriel's pleasantry is described as well-intentioned but miscalibrated; the section does not characterize him as rude or deliberately condescending."}, {"text": "He has rehearsed his relationship with the world and is startled when it does not follow the script.", "isCorrect": true, "rationale": "The section states Gabriel 'is a man who has rehearsed his relationship with the world and is perpetually startled when the world does not follow the script,' illustrated by the Lily exchange."}, {"text": "He genuinely cares about Lily's wellbeing and tries to help her.", "isCorrect": false, "rationale": "The coin Gabriel presses into Lily's hand is described as 'simultaneously kind and desperate' — a way of papering over confusion rather than genuine care for her."}, {"text": "He is testing whether people at the party will recognize his social superiority.", "isCorrect": false, "rationale": "Gabriel's anxiety is about managing his own image, not asserting superiority; the exchange reveals his unease, not arrogance."}], "id": "q01"}, {"question": "According to the section, what does Gabriel do immediately after his pleasantry to Lily goes wrong?", "options": [{"text": "He apologizes and attempts to have a longer conversation with her.", "isCorrect": false, "rationale": "Gabriel does not apologize; he papers over the confusion with a material gesture rather than engaging with what went wrong."}, {"text": "He presses a coin into her hand — a gesture that is simultaneously kind and desperate.", "isCorrect": true, "rationale": "The text says 'He recovers by pressing a coin into her hand, a gesture that is simultaneously kind and desperate.'"}, {"text": "He retreats upstairs to join the other guests without acknowledging the awkwardness.", "isCorrect": false, "rationale": "The text does not say Gabriel retreats without acknowledgment; he makes the gesture with the coin before moving on."}, {"text": "He makes a self-deprecating joke to defuse the tension.", "isCorrect": false, "rationale": "The section does not describe a joke; Gabriel's response is the physical gesture of money, not a verbal recovery."}], "id": "q02"}, {"question": "How does the section characterize Gabriel's intelligence?", "options": [{"text": "It is exceptional and allows him to understand other people with unusual depth.", "isCorrect": false, "rationale": "The section describes Gabriel's intelligence as turned inward and used mainly to manage his own anxiety rather than to understand others."}, {"text": "It is real but turned inward, used mainly to manage his own anxiety rather than to understand other people.", "isCorrect": true, "rationale": "The text says his intelligence 'is real — he is well-read, thoughtful, capable of genuine feeling — but it is intelligence turned inward, used mainly to manage his own anxiety rather than to understand other people.'"}, {"text": "It is superficial, consisting mainly of memorized literary references and rehearsed opinions.", "isCorrect": false, "rationale": "The section acknowledges Gabriel's intelligence is genuine ('he is well-read, thoughtful, capable of genuine feeling'), not merely superficial."}, {"text": "It is practical and focused on social maneuvering rather than genuine intellectual engagement.", "isCorrect": false, "rationale": "While Gabriel uses his intelligence socially, the section characterizes this as anxiety management rather than strategic maneuvering."}], "id": "q03"}, {"question": "What does the section say about the after-dinner speech Gabriel has prepared?", "options": [{"text": "It is entirely sincere and represents Gabriel's genuine feelings about his family.", "isCorrect": false, "rationale": "The section presents the speech as more complex: it may be sincere, but it is also a performance, and 'both things can be true.'"}, {"text": "It is a performance, though it may also be sincere — Joyce is interested in the space where both overlap.", "isCorrect": true, "rationale": "The text says 'The speech he is preparing...is a performance. It may also be sincere. Both things can be true, and Joyce is interested in exactly the space where they overlap.'"}, {"text": "It is deliberately designed to impress the guests and establish Gabriel's literary credentials.", "isCorrect": false, "rationale": "While the speech has a performative dimension, the section frames this as part of Gabriel's anxiety, not a calculating strategy for impressing people."}, {"text": "It is a failure because the references go over everyone's heads.", "isCorrect": false, "rationale": "Gabriel is nervous about this possibility, but the section does not say the speech actually fails — it examines the speech before it is delivered."}], "id": "q04"}, {"question": "Why does the section say Joyce introduces Gabriel through a series of small failures?", "options": [{"text": "To establish Gabriel as a comic figure the reader can laugh at throughout the story.", "isCorrect": false, "rationale": "The section does not present Gabriel as comic; his failures accumulate as preparation for deeper emotional engagement later."}, {"text": "So that we see his character clearly before the story asks us to feel anything deeper for him.", "isCorrect": true, "rationale": "The text says 'Joyce wants us to see this clearly before the story asks us to feel anything deeper for Gabriel.'"}, {"text": "To contrast him with Miss Ivors, who is presented as effortlessly socially competent.", "isCorrect": false, "rationale": "The section does not frame the small failures primarily as a contrast with Miss Ivors; they establish Gabriel's character before we see him at all."}, {"text": "To suggest that Gabriel is fundamentally unsuited for the social world of the party.", "isCorrect": false, "rationale": "Gabriel is not unsuited for the social world; he navigates it, albeit with persistent unease — the failures are revealing, not disqualifying."}], "id": "q05"}, {"question": "What does the section say about the exchange with Miss Ivors compared to the exchange with Lily?", "options": [{"text": "Both exchanges are equally trivial and serve only to show Gabriel's social awkwardness.", "isCorrect": false, "rationale": "The section distinguishes the two: Lily's bitterness surprises Gabriel, but Miss Ivors's challenge threatens him in a more serious way."}, {"text": "Where Lily's bitterness surprised Gabriel, Miss Ivors's challenge threatens him and is the discomfort of facing questions he has avoided.", "isCorrect": true, "rationale": "The text says 'Where Lily's bitterness surprised Gabriel, Miss Ivors's challenge threatens him' and calls it 'the discomfort of a man who has avoided asking himself certain questions.'"}, {"text": "The Lily exchange is more painful because it happens in front of more guests.", "isCorrect": false, "rationale": "The section implies the Miss Ivors exchange is more threatening; Lily's exchange is described as a surprise while Miss Ivors's is a threat."}, {"text": "Both exchanges expose Gabriel's political conservatism and sympathy for British culture.", "isCorrect": false, "rationale": "The Lily exchange does not involve politics; the political challenge comes specifically from Miss Ivors."}], "id": "q06"}, {"question": "According to the section, how does Gabriel's unease function as a narrative technique?", "options": [{"text": "It slows down the narrative and gives the reader time to absorb the party atmosphere.", "isCorrect": false, "rationale": "The section frames Gabriel's unease as a lens that makes the reader notice things, not as a pacing device."}, {"text": "It serves as a lens through which we see the party, making us notice things a more comfortable character would let pass.", "isCorrect": true, "rationale": "The text says: 'We see the party through the eyes of someone who is never quite at ease in it, and that unease makes us notice things a more comfortable character would let pass.'"}, {"text": "It creates sympathy for Gabriel by showing how difficult the social world of Dublin is to navigate.", "isCorrect": false, "rationale": "While unease may generate sympathy, the section specifically identifies its function as making the reader more observant, not as a sympathy-building device."}, {"text": "It contrasts with Gretta's composure and sets up the tension between them later in the story.", "isCorrect": false, "rationale": "Gretta is not yet mentioned in this section; the function of Gabriel's unease is described in terms of what the reader perceives, not in terms of his marriage."}], "id": "q07"}, {"question": "What does the section say Gabriel does NOT understand after his exchange with Lily?", "options": [{"text": "He does not understand why his literary references might go over people's heads.", "isCorrect": false, "rationale": "Gabriel's concern about his literary references is about the speech, not about the Lily exchange."}, {"text": "He does not understand what just happened, and his instinct is to paper over the confusion with money.", "isCorrect": true, "rationale": "The text states 'He does not understand what just happened, and his instinct is to paper over the confusion with money.'"}, {"text": "He does not understand why Lily is employed as a caretaker's daughter rather than attending the party as a guest.", "isCorrect": false, "rationale": "The section does not suggest Gabriel is confused about Lily's social position; his confusion is about the unexpected bitterness of her reply."}, {"text": "He does not understand why his pleasantry was inappropriate given her actual situation.", "isCorrect": false, "rationale": "While Gabriel fails to grasp the distance between his assumptions and Lily's reality, the section says more precisely that he does not understand 'what just happened' — a broader incomprehension."}], "id": "q08"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
