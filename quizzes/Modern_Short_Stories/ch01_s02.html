<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading the Modern Short Story &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Modern_Short_Stories.html">&larr; Back to Reading the Modern Short Story</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading the Modern Short Story &mdash; The Iceberg and the Epiphany</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which author coined the term 'epiphany' to describe a specific kind of moment in fiction?", "options": [{"text": "James Joyce", "isCorrect": true, "rationale": "The section states 'James Joyce used this term to describe the sudden moment in a story when a character — or the reader — sees something clearly for the first time.'"}, {"text": "Ernest Hemingway", "isCorrect": false, "rationale": "Hemingway coined the 'iceberg principle,' not the concept of epiphany."}, {"text": "Anton Chekhov", "isCorrect": false, "rationale": "Chekhov is discussed elsewhere but is not credited with naming the epiphany."}, {"text": "Edgar Allan Poe", "isCorrect": false, "rationale": "Poe is associated with the pre-modern plot-driven model, not epiphany."}], "id": "q01"}, {"question": "According to the section, what kind of experience is an epiphany in Joyce's sense?", "options": [{"text": "Usually unwelcome — a flash of self-knowledge that cannot be taken back.", "isCorrect": true, "rationale": "The section states 'An epiphany is not a happy revelation. It is usually the opposite: an unwelcome flash of self-knowledge, a recognition that cannot be taken back.'"}, {"text": "A joyful moment of spiritual illumination that brings peace.", "isCorrect": false, "rationale": "The section explicitly says the epiphany is not a happy revelation."}, {"text": "A gradual process of learning spread over the whole story.", "isCorrect": false, "rationale": "The epiphany is described as sudden — a flash — not a gradual process."}, {"text": "A moment when a mystery in the plot is finally explained.", "isCorrect": false, "rationale": "Plot mystery-solving is a feature of pre-modern fiction, not Joyce's epiphany."}], "id": "q02"}, {"question": "What is the central event in 'The Dead' that illustrates Joyce's concept of epiphany?", "options": [{"text": "The main character realizes his wife has an interior life he has never suspected.", "isCorrect": true, "rationale": "The section states Gabriel 'spends an entire evening believing one thing about his marriage and then, in the space of a few minutes, understands something entirely different.'"}, {"text": "A mysterious stranger arrives at a party and reveals a hidden secret.", "isCorrect": false, "rationale": "The section does not describe a stranger revealing a secret; the revelation is internal to the protagonist."}, {"text": "Two characters fall in love at a seaside resort and must separate.", "isCorrect": false, "rationale": "This describes the Chekhov story, not 'The Dead.'"}, {"text": "A man and woman argue about a decision they never directly name.", "isCorrect": false, "rationale": "This describes Hemingway's 'Hills Like White Elephants,' not Joyce's 'The Dead.'"}], "id": "q03"}, {"question": "Hemingway compared his writing method to an iceberg. What does the iceberg metaphor mean?", "options": [{"text": "Only one-eighth is visible, but the seven-eighths below the surface gives the story its power.", "isCorrect": true, "rationale": "The section directly states: 'only one-eighth of the ice is visible above the waterline, but the seven-eighths below is what gives it its power.'"}, {"text": "Stories should be cold and emotionally distant, like ice.", "isCorrect": false, "rationale": "The metaphor is about what is hidden and implied, not about emotional coldness."}, {"text": "The surface of a story is always more important than what lies beneath.", "isCorrect": false, "rationale": "The opposite is true — the submerged portion is what gives the iceberg its power."}, {"text": "Writers should describe nature and landscapes in great detail.", "isCorrect": false, "rationale": "The iceberg principle is about omission and implication, not detailed nature description."}], "id": "q04"}, {"question": "In 'Hills Like White Elephants,' what demonstrates the iceberg principle most directly?", "options": [{"text": "Two characters discuss a life-changing decision without ever naming the word at its center.", "isCorrect": true, "rationale": "The section states 'the word at the center of that decision is never spoken,' demonstrating the iceberg principle of meaningful omission."}, {"text": "The narrator interrupts the dialogue to explain what the characters are feeling.", "isCorrect": false, "rationale": "Hemingway's method is precisely the opposite — the narrator refuses to explain."}, {"text": "The story ends with a clear moral statement about the characters' choices.", "isCorrect": false, "rationale": "Clear moral statements are inconsistent with the iceberg principle."}, {"text": "One character explicitly confesses their true feelings in a long speech.", "isCorrect": false, "rationale": "Explicit confession contradicts the iceberg principle's emphasis on what is unspoken."}], "id": "q05"}, {"question": "What shared assumption underlies both the epiphany and the iceberg principle?", "options": [{"text": "The reader is intelligent enough to do some of the work of understanding.", "isCorrect": true, "rationale": "The section concludes: 'Both methods assume the same thing: that the reader is intelligent enough to do some of the work.'"}, {"text": "Stories should always have a happy ending to satisfy readers.", "isCorrect": false, "rationale": "Neither technique is associated with happy endings; both involve difficult truths."}, {"text": "The narrator must guide readers step by step through all important moments.", "isCorrect": false, "rationale": "Both techniques involve the narrator withholding explicit guidance, trusting the reader instead."}, {"text": "Fiction should be shorter to hold modern readers' attention.", "isCorrect": false, "rationale": "Length is not what the two techniques share; their shared assumption concerns reader intelligence."}], "id": "q06"}, {"question": "Why did modern writers consider earlier fiction's practice of having the narrator explain characters' emotions to be dishonest?", "options": [{"text": "Because real understanding does not arrive through explanation — it arrives through experience.", "isCorrect": true, "rationale": "The section states the modern writers 'decided this was dishonest — not because the explanations were wrong, but because real understanding does not arrive through explanation. It arrives through experience.'"}, {"text": "Because readers in the modern era were too sophisticated to need explanations.", "isCorrect": false, "rationale": "While reader sophistication is implied, the core reason given is about how understanding genuinely works, not just reader sophistication."}, {"text": "Because narrators were unreliable and their explanations were factually wrong.", "isCorrect": false, "rationale": "The section says it was 'not because the explanations were wrong' but because of how real understanding arrives."}, {"text": "Because explaining emotions made the stories too long and slow.", "isCorrect": false, "rationale": "Pacing is not the reason given for considering narrator explanation dishonest."}], "id": "q07"}, {"question": "How does Joyce's epiphany differ from Hemingway's iceberg principle in the way they deliver truth to the reader?", "options": [{"text": "The epiphany delivers truth all at once in a sudden flash; the iceberg keeps truth unspoken so the reader feels its weight.", "isCorrect": true, "rationale": "The section contrasts the two: 'Joyce's epiphany lets the truth hit the character...all at once, without warning. Hemingway's iceberg lets the truth remain unspoken, trusting the reader to feel its weight.'"}, {"text": "The epiphany is for comedies; the iceberg principle is for tragedies.", "isCorrect": false, "rationale": "The section makes no such genre distinction between the two techniques."}, {"text": "The epiphany is used by American writers; the iceberg principle by European writers.", "isCorrect": false, "rationale": "Joyce was Irish (European) and Hemingway was American — but the section does not frame the distinction this way."}, {"text": "The epiphany comes at the beginning of a story; the iceberg principle applies only to endings.", "isCorrect": false, "rationale": "The section does not limit either technique to a specific position within the story."}], "id": "q08"}, {"question": "Before modern writers like Chekhov, Joyce, and Hemingway, how did traditional fiction typically convey a character's emotional state?", "options": [{"text": "The narrator would step in and directly explain that a character was sad, foolish, or in love.", "isCorrect": true, "rationale": "The section states: 'Before Chekhov, before Joyce, before Hemingway, most fiction told you what to think. The narrator would step in and explain that a character was sad, or foolish, or in love.'"}, {"text": "Characters would deliver long monologues confessing their inner feelings.", "isCorrect": false, "rationale": "Long confessional monologues are not described as the traditional method; direct narrator explanation is."}, {"text": "The physical setting was used symbolically to represent each character's mood.", "isCorrect": false, "rationale": "Symbolic setting is associated with the modern approach, not the pre-modern narrator-explanation method."}, {"text": "Other characters would observe and discuss the protagonist's emotional state.", "isCorrect": false, "rationale": "Third-party observation is not what the section identifies as the traditional method; it was direct narrator explanation."}], "id": "q09"}, {"question": "The section says both the epiphany and the iceberg principle are 'responses to the same problem.' What is that problem?", "options": [{"text": "How to convey truth to the reader without the narrator simply explaining it.", "isCorrect": true, "rationale": "The section states both ideas 'are responses to the same problem' — that of the narrator explaining meaning directly to the reader, which modern writers considered dishonest because real understanding comes through experience."}, {"text": "How to make short stories as emotionally powerful as novels.", "isCorrect": false, "rationale": "The shared problem is specifically about how truth reaches the reader, not about matching the novel's emotional power."}, {"text": "How to represent characters from social classes different from the author's own.", "isCorrect": false, "rationale": "Social class representation is not the problem the section identifies as shared between both techniques."}, {"text": "How to write stories that can be read quickly without losing meaning.", "isCorrect": false, "rationale": "Reading speed and accessibility are not the shared problem the section describes."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
