    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Modern_Short_Stories.html">&larr; Back to Reading the Modern Short Story</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading the Modern Short Story &mdash; How to Read These Stories</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the section, why are these three modern short stories difficult to read?", "options": [{"text": "Because they trust the reader — they leave things out, refuse to explain, and end without resolution.", "isCorrect": true, "rationale": "The section opens: 'They are difficult because they trust you. They leave things out. They refuse to explain themselves. They end without resolution.'"}, {"text": "Because they use complicated academic vocabulary and obscure historical references.", "isCorrect": false, "rationale": "The section explicitly says the stories 'are not difficult because they use complicated language or obscure references.'"}, {"text": "Because they are written in foreign languages and require translation.", "isCorrect": false, "rationale": "Language of composition is not cited as the source of difficulty."}, {"text": "Because they are extremely long and require sustained concentration.", "isCorrect": false, "rationale": "Length is not given as the reason for difficulty; deliberate withholding of explanation is."}]}, {"question": "What is the section's advice about feeling confused while reading these stories?", "options": [{"text": "Mark it, write it down, and do not skip past it — confusion is a sign you are paying attention.", "isCorrect": true, "rationale": "The section advises: 'Mark it. Write it down. Do not skip past it.' and states 'Your confusion is not a problem to be solved. It is information about where the story wants you to look more carefully.'"}, {"text": "Skip the confusing parts and focus on the sections you understand.", "isCorrect": false, "rationale": "The section explicitly says 'Do not skip past it.'"}, {"text": "Confusion means you need to read a simpler story first to build skills.", "isCorrect": false, "rationale": "Confusion is presented as a productive starting point, not a sign of inadequacy."}, {"text": "Look up a plot summary online to resolve any confusion immediately.", "isCorrect": false, "rationale": "The section advocates engaging with confusion as information, not resolving it externally."}]}, {"question": "Why does the section recommend re-reading these stories?", "options": [{"text": "Because the authors wrote for the second reading as much as the first — on re-reading you catch what you missed and the story feels different.", "isCorrect": true, "rationale": "The section states: 'Chekhov, Joyce, and Hemingway all wrote for the second reading as much as the first. If you read one of these stories only once, you are seeing half of it.'"}, {"text": "Because the stories contain deliberate errors that only become visible on second reading.", "isCorrect": false, "rationale": "The section says nothing about errors; re-reading reveals layers of meaning, not mistakes."}, {"text": "Because the stories are so short that one reading is not worth your time.", "isCorrect": false, "rationale": "The section recommends re-reading because of the stories' depth, not their brevity."}, {"text": "Because the endings summarize the story and must be memorized.", "isCorrect": false, "rationale": "The section does not ask readers to memorize endings; it asks them to re-read for fuller understanding."}]}, {"question": "How does the section say you should treat the ending of a modern short story?", "options": [{"text": "As one more piece of the puzzle — not the solution, but a clue about what the story was really about.", "isCorrect": true, "rationale": "The section states: 'Read the ending as one more piece of the puzzle, not the solution.'"}, {"text": "As the definitive answer that explains everything that came before.", "isCorrect": false, "rationale": "The section warns against reading 'toward the ending as if it will explain everything.'"}, {"text": "As an irrelevant appendage that can be safely ignored.", "isCorrect": false, "rationale": "Endings are described as important and meaning-laden, not irrelevant."}, {"text": "As a moral lesson that the author wants the reader to take away.", "isCorrect": false, "rationale": "The section says the ending reveals 'what the story was really about' — and 'the answer is almost never simple.'"}]}, {"question": "What textual features does the section advise readers to watch carefully?", "options": [{"text": "First and last sentences, what characters do NOT say, and recurring objects or images.", "isCorrect": true, "rationale": "The section instructs: pay attention to first and last sentences, to silences and deflections, and to recurring objects and images like 'a dog, a song, a landscape, a piece of luggage.'"}, {"text": "The middle chapters, the longest speeches, and the author's biographical footnotes.", "isCorrect": false, "rationale": "The section focuses on first/last sentences and implied content, not middle sections or footnotes."}, {"text": "Dialogue tags, chapter titles, and publisher's notes.", "isCorrect": false, "rationale": "These elements are not mentioned in the section's reading advice."}, {"text": "The year of publication, the author's nationality, and the number of characters.", "isCorrect": false, "rationale": "These biographical and structural facts are not what the section asks readers to watch for."}]}, {"question": "What is the purpose of keeping a reading journal as described in this section?", "options": [{"text": "To compare what you understood after the first reading with what you understood after the second — the distance between them is where real understanding lives.", "isCorrect": true, "rationale": "The section instructs: write one sentence after each reading, then 'compare the two. The distance between those sentences is where your real understanding lives.'"}, {"text": "To produce a formal academic essay summarizing the story's plot.", "isCorrect": false, "rationale": "The journal exercise is informal and personal — one sentence per reading — not a formal essay."}, {"text": "To record every vocabulary word you did not understand.", "isCorrect": false, "rationale": "The journal focuses on your overall impression of the story, not vocabulary tracking."}, {"text": "To impress your teacher by demonstrating you completed the reading.", "isCorrect": false, "rationale": "The journal is described as a tool for developing genuine understanding, not for external performance."}]}, {"question": "How does Chekhov's opening sentence differ from Hemingway's in terms of narrative approach?", "options": [{"text": "Chekhov begins with reported gossip about a person; Hemingway begins with landscape as if no people exist.", "isCorrect": true, "rationale": "The section notes: 'Chekhov begins with gossip — someone is reporting what someone else said' while 'Hemingway begins with landscape, as if no people exist at all.'"}, {"text": "Chekhov begins with a dramatic action; Hemingway begins with a character's internal monologue.", "isCorrect": false, "rationale": "This reverses and misrepresents both openings as described in the section."}, {"text": "Chekhov begins with setting; Hemingway begins with a moral statement.", "isCorrect": false, "rationale": "Chekhov begins with gossip, not setting; neither begins with a moral statement."}, {"text": "Chekhov begins with a mystery; Hemingway begins with a character's name.", "isCorrect": false, "rationale": "The openings are described differently in the section — gossip vs. landscape."}]}, {"question": "What does the section say about recurring objects and images in these stories?", "options": [{"text": "Repetitions are not accidental — they are how the writer builds meaning without stating it.", "isCorrect": true, "rationale": "The section states: 'These repetitions are not accidental. They are how the writer builds meaning without stating it.'"}, {"text": "Recurring images are errors the authors failed to catch before publication.", "isCorrect": false, "rationale": "The section presents repetitions as intentional and meaningful, not as errors."}, {"text": "Recurring objects signal that a passage can be safely skimmed.", "isCorrect": false, "rationale": "The opposite is true — recurring elements deserve careful attention."}, {"text": "Symbols should be ignored because they distract from the main story.", "isCorrect": false, "rationale": "The section explicitly directs readers to pay attention to recurring objects and images."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
