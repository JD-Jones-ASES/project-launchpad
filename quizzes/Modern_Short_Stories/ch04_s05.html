<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading the Modern Short Story &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Modern_Short_Stories.html">&larr; Back to Reading the Modern Short Story</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading the Modern Short Story &mdash; Returning to Your Prediction</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the text say most readers expect the story to be about after Part One?", "options": [{"text": "A romance between Gabriel and a woman other than Gretta", "isCorrect": false, "rationale": "No romantic subplot involving another woman is present in Part One; the expected topics are party, social anxiety, and cultural identity."}, {"text": "A party, or Gabriel's social anxieties, or Irish culture and identity", "isCorrect": true, "rationale": "These are the three probable predictions the text names: the party, Gabriel's nervousness, and Irish cultural themes."}, {"text": "A ghost story in which Michael Furey appears as a spirit", "isCorrect": false, "rationale": "While 'The Dead' deals with death and memory, it is not a literal ghost story — Furey is a memory, not a supernatural apparition."}, {"text": "A political allegory about Ireland's relationship with England", "isCorrect": false, "rationale": "Political allegory may be a dimension of the story, but the text identifies more domestic and social predictions as typical."}], "id": "q01"}, {"question": "According to the text, what is the story actually about — beneath and beyond the party?", "options": [{"text": "The decline of traditional Irish hospitality under modernizing influences", "isCorrect": false, "rationale": "While cultural themes are present, the text names a more personal and universal subject as the story's real content."}, {"text": "The discovery that the person closest to you has an inner life you have never touched", "isCorrect": true, "rationale": "This is the text's identification of the story's true subject: the revelation that intimacy does not guarantee knowledge of another person."}, {"text": "A meditation on the virtue of hospitality embodied by the Morkan sisters", "isCorrect": false, "rationale": "The Morkans represent one strand of the story's texture; the text names the central subject as the discovery about Gretta's inner life."}, {"text": "A study of how educated men fail to adapt to modern Ireland", "isCorrect": false, "rationale": "Gabriel's failure is personal and perceptual, not primarily a failure of cultural adaptation."}], "id": "q02"}, {"question": "What does the text say about how the living relate to the dead in this story?", "options": [{"text": "The living must let go of the dead in order to live fully — the story is about release", "isCorrect": false, "rationale": "The text does not frame the dead as burdens to be released; it says carrying the dead is 'a form of faithfulness.'"}, {"text": "The living carry the dead with them always, and this carrying is not a burden but a form of faithfulness", "isCorrect": true, "rationale": "This is the text's description of what the story reveals: the persistent presence of the dead in living people's inner lives is faithful, not pathological."}, {"text": "The dead are best honored through public ritual, as the party scene shows", "isCorrect": false, "rationale": "The story focuses on private interior carrying of the dead, not public ritual commemoration."}, {"text": "The dead become a source of unhealthy obsession that damages the living's relationships", "isCorrect": false, "rationale": "The text does not frame Gretta's memory of Furey as unhealthy obsession; it is private faithfulness."}], "id": "q03"}, {"question": "The text says a reader's prediction was 'not wrong — it was incomplete.' What does this mean?", "options": [{"text": "The reader correctly identified the plot but misunderstood the genre", "isCorrect": false, "rationale": "Genre confusion is not the point; the text is describing how Joyce's structure makes the real subject invisible until the end."}, {"text": "The party, social anxieties, and Irish culture are all genuinely in the story — they just are not the whole story", "isCorrect": true, "rationale": "Incomplete, not wrong: the predicted elements are real and present, but they serve as cover for a deeper subject that emerges only at the end."}, {"text": "The reader's prediction was too pessimistic and Joyce's ending is more hopeful than expected", "isCorrect": false, "rationale": "Optimism versus pessimism is not the axis of the incompleteness; the text is describing structural misdirection, not tonal surprise."}, {"text": "The prediction was made before Chapter 3, so the reader simply hadn't read enough to predict correctly", "isCorrect": false, "rationale": "The prediction exercise is set after Chapter 3, and the text says the misdirection is intentional by Joyce — not a result of insufficient reading."}], "id": "q04"}, {"question": "Where does the text say 'the real subject was always waiting'?", "options": [{"text": "In the speech Gabriel gives at the party, which foreshadows everything", "isCorrect": false, "rationale": "Gabriel's speech is part of the surface texture Joyce uses to mislead the reader; the real subject waits elsewhere."}, {"text": "In the hotel room, in a song on the stairs, in the name of a boy who died young in the rain", "isCorrect": true, "rationale": "This is the text's poetic summary of where the true subject resided all along — offstage and unannounced until the story's climax."}, {"text": "In the opening description of the party, encoded in Joyce's imagery", "isCorrect": false, "rationale": "While careful rereaders may find foreshadowing, the text says the real subject was 'waiting' — implying it was concealed, not openly encoded."}, {"text": "In the narrator's commentary, which hints at the revelation throughout", "isCorrect": false, "rationale": "The text credits Joyce with deliberately concealing the subject through the party scenes, not with hinting at it through commentary."}], "id": "q05"}, {"question": "According to the text, if a reader's prediction 'missed' the story's real subject, what does this mean about how they read?", "options": [{"text": "It means they were not reading carefully enough and missed important clues", "isCorrect": false, "rationale": "The text says the opposite: missing the real subject means they read the story the way Joyce wanted them to read it."}, {"text": "They read the story exactly as Joyce intended — the misdirection was deliberate, and the surprise is the point", "isCorrect": true, "rationale": "This is the section's central insight: Joyce built the misdirection into the story's structure. Being fooled is part of the experience."}, {"text": "They lacked the cultural knowledge to understand Irish literature", "isCorrect": false, "rationale": "Cultural knowledge is not identified as the missing ingredient; the point is about Joyce's structural strategy, not reader preparation."}, {"text": "They should reread Part One with knowledge of the ending before attempting to interpret the story", "isCorrect": false, "rationale": "Rereading may be valuable, but the text's point is that the first reading's surprise is itself meaningful, not a failure to correct."}], "id": "q06"}, {"question": "The text says Joyce 'builds the party scenes with such care and density that you believe the party is the story.' What technique does this describe?", "options": [{"text": "Dramatic irony — the reader knows something the characters do not", "isCorrect": false, "rationale": "In dramatic irony, the reader has superior knowledge; here the reader is also deceived, which makes this something different."}, {"text": "Misdirection through surface realism — the convincingly rendered party makes readers mistake texture for substance", "isCorrect": true, "rationale": "The text describes how the party's density and care lead readers to believe it is the story, when in fact it is foreground concealing depth."}, {"text": "Stream of consciousness — Gabriel's unfiltered thoughts carry the reader into digressions", "isCorrect": false, "rationale": "While free indirect discourse is part of Joyce's method, the technique described here is specifically about structural misdirection, not interior monologue."}, {"text": "Unreliable narration — the narrator deliberately withholds the truth from the reader", "isCorrect": false, "rationale": "The narrator is not unreliable in the conventional sense; Joyce's misdirection is structural, not a feature of a dishonest narrator."}], "id": "q07"}, {"question": "The prediction exercise asks students to compare their prediction to what the story turned out to be about. What is the pedagogical goal of this exercise?", "options": [{"text": "To test whether students did the assigned reading before class", "isCorrect": false, "rationale": "Compliance checking is not the purpose; the exercise is designed to make students experience and reflect on Joyce's narrative strategy."}, {"text": "To help students experience firsthand how Joyce structures reader expectation and then overturns it", "isCorrect": true, "rationale": "The exercise turns the reader's own predictive error into evidence about how Joyce's story works — making the misdirection visible through personal experience."}, {"text": "To encourage students to write better story predictions in future reading assignments", "isCorrect": false, "rationale": "Better predicting is not the goal; the exercise is about understanding why being wrong here was intentional and meaningful."}, {"text": "To give students an opportunity to argue that their prediction was actually correct", "isCorrect": false, "rationale": "The exercise is not a debate; it invites honest reflection on why the story exceeded what was expected."}], "id": "q08"}, {"question": "The text says the story's true subject involves a discovery about 'the deepest feelings in a marriage.' What is that discovery?", "options": [{"text": "That deep feelings require shared history and cannot survive separation", "isCorrect": false, "rationale": "The text does not make a claim about shared history; the discovery is about the presence of feeling that belongs to someone outside the marriage entirely."}, {"text": "That the deepest feelings in a marriage may belong to someone who is not in the room", "isCorrect": true, "rationale": "This is the text's exact formulation: the deepest feeling in Gretta's marriage is her grief for Michael Furey — a boy who died years before, who is absent yet present."}, {"text": "That marriages built on incomplete honesty will eventually collapse", "isCorrect": false, "rationale": "The text does not predict collapse or frame the marriage as doomed; the discovery is about perception and the interior life, not marital failure."}, {"text": "That deeply felt emotions are impossible to communicate between spouses", "isCorrect": false, "rationale": "The text does not argue that communication is impossible; it reveals that Gabriel never tried to know Gretta's full interior life."}], "id": "q09"}, {"question": "The text says 'the surprise is the point.' What does this claim about how great fiction works?", "options": [{"text": "Great fiction conceals its real subject so well that the revelation feels fraudulent — a trick rather than a truth", "isCorrect": false, "rationale": "The text presents the surprise as meaningful and earned, not as a trick; the misdirection serves the story's deeper purpose."}, {"text": "Great fiction can use a reader's misdirected expectations as a structural device — the act of being wrong becomes part of the story's meaning", "isCorrect": true, "rationale": "The text says the surprise 'is the point': Joyce does not merely surprise readers but uses their predictable errors to make the real subject feel like a discovery rather than a proposition."}, {"text": "Great fiction must always withhold its subject until the final pages for maximum dramatic effect", "isCorrect": false, "rationale": "The text does not offer this as a universal rule; it describes what Joyce specifically achieves through this particular structure."}, {"text": "Great fiction rewards readers who predict correctly by confirming their analytical instincts", "isCorrect": false, "rationale": "The text argues the opposite: readers who predicted correctly may have missed the experience Joyce designed, since being surprised is itself the lesson."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
