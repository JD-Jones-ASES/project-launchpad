<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading the Modern Short Story &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Modern_Short_Stories.html">&larr; Back to Reading the Modern Short Story</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading the Modern Short Story &mdash; He Said, She Said</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What pattern emerges when you examine who speaks more in the story's dialogue?", "options": [{"text": "The girl speaks more and initiates more topics than the man", "isCorrect": false, "rationale": "The opposite is true; the man talks more and initiates more topics."}, {"text": "The man talks more, initiates more topics, and repeatedly returns to the operation", "isCorrect": true, "rationale": "The section states the man 'talks more,' 'initiates more topics,' and 'returns to the subject of the operation again and again.'"}, {"text": "Both characters speak equally, with topics alternating between them", "isCorrect": false, "rationale": "The conversation is not balanced; a clear power imbalance shows in who speaks and how much."}, {"text": "Neither character says much; long silences dominate the story", "isCorrect": false, "rationale": "The story is composed largely of dialogue; the man in particular says a great deal."}], "id": "q01"}, {"question": "How does the section describe the quality of the man's repeated reassurances?", "options": [{"text": "As genuine expressions of concern and love", "isCorrect": false, "rationale": "The section characterizes his reassurances as a sales pitch, not sincere expressions of love."}, {"text": "As a sales pitch — he is managing her, not listening to her", "isCorrect": true, "rationale": "The section states his reassurances 'have the quality of a sales pitch' and that 'he is not listening to her. He is managing her.'"}, {"text": "As hesitant and uncertain, showing he has not made up his mind", "isCorrect": false, "rationale": "The man's calm is the opposite of hesitant; the section describes it as the calm of someone who has already decided."}, {"text": "As angry ultimatums that pressure the girl directly", "isCorrect": false, "rationale": "His pressure is indirect and calm, not angry; that indirectness is what makes it effective."}], "id": "q02"}, {"question": "What does the man's calm in the conversation reveal?", "options": [{"text": "That he is genuinely at peace with whatever the girl decides", "isCorrect": false, "rationale": "The section says his calm is not openness; it is 'the calm of someone who has already decided.'"}, {"text": "That he is emotionally detached and does not care about the outcome", "isCorrect": false, "rationale": "His relentless return to the subject shows he cares deeply about the outcome; his calm is strategic."}, {"text": "That he has already decided the outcome and is waiting for her to agree", "isCorrect": true, "rationale": "The section states: 'It is the calm of someone who has already decided and is waiting for the other person to agree.'"}, {"text": "That he is afraid of showing emotion in a public setting", "isCorrect": false, "rationale": "The public setting may influence behavior, but the section attributes his calm specifically to having already made his decision."}], "id": "q03"}, {"question": "How does the girl resist the man's pressure without directly arguing against him?", "options": [{"text": "She threatens to leave him if he continues pressing her", "isCorrect": false, "rationale": "She does not threaten departure; her resistance is indirect through deflection and observation."}, {"text": "Through looking away, making observations he does not understand, and pleading", "isCorrect": true, "rationale": "The section describes her resistance as 'looking away, of making observations he does not understand, of asking him to stop talking.'"}, {"text": "By loudly changing the subject to other couples around them", "isCorrect": false, "rationale": "She deflects to the landscape and drinks, not to other people in the station."}, {"text": "By refusing to answer any of his questions throughout the story", "isCorrect": false, "rationale": "She does respond to him; her resistance is indirect, not silent refusal."}], "id": "q04"}, {"question": "What does the girl's repetition of 'please' seven times in a row reveal?", "options": [{"text": "That she is being politely firm about a minor preference", "isCorrect": false, "rationale": "Seven repetitions signal extreme distress, not polite firmness about something minor."}, {"text": "That she is at the end of what she can bear, using sheer emphasis as her only remaining tool", "isCorrect": true, "rationale": "The section calls it 'someone at the end of what she can bear, using the only tool she has left: sheer, desperate emphasis.'"}, {"text": "That she has decided she will agree to the operation and is asking him to stop bringing it up", "isCorrect": false, "rationale": "Her decision is not resolved at this point; the repetition expresses desperation, not agreement."}, {"text": "That she is mocking his repeated reassurances with equally repetitive language", "isCorrect": false, "rationale": "The repetition is not mockery; the section frames it as genuine, desperate pleading."}], "id": "q05"}, {"question": "According to the section, this conversation is 'not a conversation between equals.' How does Hemingway make this clear?", "options": [{"text": "By having a narrator explicitly comment on the power imbalance", "isCorrect": false, "rationale": "The section notes Hemingway makes this clear 'without ever stating it'; there is no direct narrator comment."}, {"text": "Through the sentence rhythms — the man's longer, repetitive arguments versus the girl's shorter, questioning replies", "isCorrect": true, "rationale": "The section states 'the power imbalance shows up in the sentence rhythms,' contrasting the man's assured repetition with the girl's short, questioning sentences."}, {"text": "By describing the man physically towering over the girl", "isCorrect": false, "rationale": "No physical description of this kind appears; the imbalance is conveyed through dialogue patterns."}, {"text": "By having other characters in the bar comment on the couple's dynamic", "isCorrect": false, "rationale": "There are no other speaking characters who comment on the couple; only a waiter appears briefly."}], "id": "q06"}, {"question": "What is the form of the girl's 'power' in the conversation?", "options": [{"text": "Logical counter-arguments that expose the flaws in the man's reasoning", "isCorrect": false, "rationale": "The girl does not engage in logical debate; her power comes from indirection, not argumentation."}, {"text": "Indirection — deflection, observation, and resistance through not engaging his argument", "isCorrect": true, "rationale": "The section states: 'The girl's power, such as it is, comes from indirection.'"}, {"text": "Economic control, as she holds the money for their travels", "isCorrect": false, "rationale": "Economic power is not referenced; her power in the conversation is rhetorical and emotional."}, {"text": "The support of the waitress who sides with her", "isCorrect": false, "rationale": "No character takes the girl's side; her power is entirely in how she conducts herself in dialogue."}], "id": "q07"}, {"question": "When the girl tries to shift the conversation to drinks, the landscape, or their possible life together, what does the man do?", "options": [{"text": "He joins her in imagining the alternative futures she describes", "isCorrect": false, "rationale": "The man does not engage with her alternative visions; he consistently steers back to the operation."}, {"text": "He ignores her completely and drinks in silence", "isCorrect": false, "rationale": "He does not go silent; he actively redirects the conversation back to the operation."}, {"text": "He steers the conversation back to the operation every time", "isCorrect": true, "rationale": "The section states: 'Every time she tries to move the conversation somewhere else... he steers it back.'"}, {"text": "He agrees with her briefly before returning to his argument", "isCorrect": false, "rationale": "His returns are more immediate and relentless than the section suggests momentary agreement."}], "id": "q08"}, {"question": "The section quotes three of the man's repeated phrases. What do they have in common that makes them a 'sales pitch'?", "options": [{"text": "They are all factually accurate statements about the medical procedure", "isCorrect": false, "rationale": "Whether they are factually accurate is not the section's point; the section focuses on how the phrases function as persuasion, not information."}, {"text": "They all minimize the operation's difficulty and offer reassurance designed to reduce resistance", "isCorrect": true, "rationale": "The section groups 'It's really an awfully simple operation,' 'I know you wouldn't mind it,' and 'I'll go with you' as reassurances that manage rather than respond to her — the hallmark of a sales pitch."}, {"text": "They are all questions that invite her to respond freely", "isCorrect": false, "rationale": "The man's phrases are statements and promises, not open questions; they close off rather than open the conversation."}, {"text": "They all acknowledge that she may have legitimate reasons to refuse", "isCorrect": false, "rationale": "The phrases do the opposite — they preemptively deny the grounds for refusal by calling the operation simple and promising to stay with her."}], "id": "q09"}, {"question": "The section calls the girl's seven repetitions of 'please' 'one of the most revealing moments in the story.' What makes it so revealing?", "options": [{"text": "It reveals that the girl has finally accepted the man's argument and is asking him to stop explaining", "isCorrect": false, "rationale": "Acceptance is not what the moment reveals; the section frames it as the expression of someone at the limit of what she can endure."}, {"text": "It reveals the full extent of her desperation and the exhaustion of every other form of resistance", "isCorrect": true, "rationale": "The section says it is 'someone at the end of what she can bear, using the only tool she has left: sheer, desperate emphasis' — meaning all other strategies have failed."}, {"text": "It reveals that she is emotionally manipulative and uses repetition strategically to win arguments", "isCorrect": false, "rationale": "The section does not frame the repetition as a tactic; it frames it as genuine desperation, the last resort rather than a calculated move."}, {"text": "It reveals that the couple's problem is primarily one of communication style rather than a genuine conflict of wills", "isCorrect": false, "rationale": "The section presents their conflict as real and deep; the seven pleases signal the failure of all communication, not a style mismatch."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
