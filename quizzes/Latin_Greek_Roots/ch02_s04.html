    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 2, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following words literally means “truly said” and refers to a judgment or decision, often in a legal context?", "options": [{"text": "Predict", "isCorrect": false, "rationale": "Predict combines 'pre-' (before) and 'dict' (to say), meaning to say what will happen before it occurs, not 'truly said.'"}, {"text": "Contradict", "isCorrect": false, "rationale": "Contradict combines 'contra-' (against) and 'dict' (to say), meaning to say the opposite of what someone else has said, not 'truly said.'"}, {"text": "Verdict", "isCorrect": true, "rationale": "Verdict combines 'vere' (truly) and 'dict' (said), literally meaning 'truly said,' and is defined as a judgment or decision."}, {"text": "Diction", "isCorrect": false, "rationale": "Diction combines 'dict' (to say) and '-ion' (act or result), referring to the choice and use of words, not 'truly said.'"}]}, {"question": "A reigning king, due to failing health, decides to formally give up his throne and responsibilities. Which of the following words best describes this action?", "options": [{"text": "Indict", "isCorrect": false, "rationale": "Indict means to formally accuse someone of a crime, which is unrelated to relinquishing power."}, {"text": "Dictate", "isCorrect": false, "rationale": "Dictate means to speak words for another to write down or to give orders, not to surrender authority."}, {"text": "Abdicate", "isCorrect": true, "rationale": "Abdicate combines 'ab-' (away) and 'dic' (to declare), meaning to formally give up power or responsibility, which perfectly fits the king's action."}, {"text": "Edict", "isCorrect": false, "rationale": "An edict is an official order or decree, not the act of giving up power by an individual."}]}, {"question": "Considering the root 'dict' means 'to say' or 'to declare,' and the prefix 'pre-' means 'before,' which word best reflects the action of stating an outcome or event in advance of its occurrence?", "options": [{"text": "Contradict", "isCorrect": false, "rationale": "Contradict means to say against, or to state the opposite, not to foresee or foretell."}, {"text": "Predict", "isCorrect": true, "rationale": "Predict combines 'pre-' (before) and 'dict' (to say), accurately describing the act of saying what will happen before it occurs."}, {"text": "Dictate", "isCorrect": false, "rationale": "Dictate means to speak for writing or to give orders, which does not inherently involve foretelling or stating an outcome in advance."}, {"text": "Edict", "isCorrect": false, "rationale": "An edict is an official order, unrelated to making an advance statement about the future."}]}, {"question": "During a town hall meeting, one citizen expresses their opinion on a new policy. Another citizen immediately stands up and articulates a viewpoint that is diametrically opposed to the first speaker's. This second citizen's action is best described by which word?", "options": [{"text": "Indict", "isCorrect": false, "rationale": "Indict means to formally accuse of a crime, which is not applicable to expressing an opposing opinion in a debate."}, {"text": "Predict", "isCorrect": false, "rationale": "Predict means to say what will happen before it occurs, not to state a current opposing view."}, {"text": "Contradict", "isCorrect": true, "rationale": "Contradict combines 'contra-' (against) and 'dict' (to say), meaning to say the opposite of what someone else has said, fitting the scenario perfectly."}, {"text": "Abdicate", "isCorrect": false, "rationale": "Abdicate means to formally give up power or responsibility, which is irrelevant to expressing an opinion in a discussion."}]}, {"question": "An author is praised for their eloquent prose and precise vocabulary, making their writing both clear and impactful. The quality of their choice and use of words is specifically referred to as:", "options": [{"text": "Edict", "isCorrect": false, "rationale": "An edict is an official order or decree, not related to the style or selection of words in a written work."}, {"text": "Diction", "isCorrect": true, "rationale": "Diction combines 'dict' (to say) and '-ion' (act or result), specifically referring to the choice and use of words in speech or writing, aligning with the description of the author's prose."}, {"text": "Verdict", "isCorrect": false, "rationale": "A verdict is a judgment or decision, not the manner in which words are chosen or used."}, {"text": "Dictate", "isCorrect": false, "rationale": "Dictate means to speak words for another to write down or to give orders, which is an action, not the quality of word choice itself."}]}, {"question": "A jury returns to the courtroom after deliberation and announces their final conclusion regarding the guilt or innocence of the defendant. Which of the listed words best describes this crucial announcement?", "options": [{"text": "Diction", "isCorrect": false, "rationale": "Diction refers to word choice and style, which is not what a jury announces as its decision."}, {"text": "Verdict", "isCorrect": true, "rationale": "Verdict is explicitly defined as a judgment or decision, and it is the standard term for a jury's final determination in a legal case."}, {"text": "Dictate", "isCorrect": false, "rationale": "Dictate refers to speaking for transcription or giving orders, which is not relevant to a jury's announcement of a decision."}, {"text": "Predict", "isCorrect": false, "rationale": "Predict means to say what will happen before it occurs, which is not what a jury does after a trial has concluded."}]}, {"question": "The words 'abdicate' and 'indict' both utilize prefixes that significantly modify the meaning of the root 'dic/dict' (to declare). What is the primary difference in how their respective prefixes ('ab-' and 'in-') influence their meanings?", "options": [{"text": "Both prefixes imply an action performed 'out' or 'away' from something.", "isCorrect": false, "rationale": "While 'ab-' means 'away,' 'in-' in 'indict' means 'against,' not 'out' or 'away.'"}, {"text": "'Ab-' suggests 'away' or 'off' (leading to giving up), while 'in-' suggests 'against' (leading to accusing).", "isCorrect": true, "rationale": "This accurately reflects the prefixes' distinct roles: 'ab-' (away) in 'abdicate' (to declare away from power) and 'in-' (against) in 'indict' (to declare against someone)."}, {"text": "Both prefixes imply an action performed 'before' something.", "isCorrect": false, "rationale": "Neither 'ab-' nor 'in-' carries the meaning of 'before'; the prefix 'pre-' does."}, {"text": "'Ab-' suggests 'against,' while 'in-' suggests 'before.'", "isCorrect": false, "rationale": "'Ab-' means 'away,' not 'against,' and 'in-' means 'against,' not 'before.'"}]}, {"question": "The city council passes a new law mandating stricter recycling rules for all residents and businesses. This type of official proclamation or authoritative command is best described as an:", "options": [{"text": "Verdict", "isCorrect": false, "rationale": "A verdict is a judgment, typically in a legal case, not a general governmental order or proclamation."}, {"text": "Dictate", "isCorrect": false, "rationale": "Dictate refers to speaking for transcription or giving personal orders, not a formal, widespread government decree."}, {"text": "Indictment", "isCorrect": false, "rationale": "An indictment is a formal accusation of a crime, not a new law or regulation."}, {"text": "Edict", "isCorrect": true, "rationale": "Edict is defined as 'an official order or decree,' which perfectly fits a new law or regulation issued by an authority like a city council."}]}, {"question": "After reviewing evidence, a grand jury decides there is sufficient cause to formally accuse an individual of committing a felony. This act of formal accusation is known as to:", "options": [{"text": "Abdicate", "isCorrect": false, "rationale": "Abdicate means to give up power, not to formally accuse someone of a crime."}, {"text": "Edict", "isCorrect": false, "rationale": "An edict is an official order or decree, not the process of formally accusing someone of a crime."}, {"text": "Indict", "isCorrect": true, "rationale": "Indict combines 'in-' (against) and 'dict' (to declare), meaning 'to formally accuse someone of a crime,' which aligns directly with the grand jury's action."}, {"text": "Contradict", "isCorrect": false, "rationale": "Contradict means to say the opposite of someone else, not to formally accuse someone of a crime."}]}, {"question": "Which two words from the 'dict' family best describe, respectively, the action of a boss clearly stating instructions for an employee to follow, and the specific way the boss chooses their words to convey authority without being abrasive?", "options": [{"text": "Predict; Diction", "isCorrect": false, "rationale": "Predict means to say what will happen before, which is not the act of giving instructions."}, {"text": "Dictate; Edict", "isCorrect": false, "rationale": "While 'dictate' fits the first part, 'edict' is an official decree, not the choice of words for communication."}, {"text": "Dictate; Diction", "isCorrect": true, "rationale": "'Dictate' (to give orders) accurately describes the boss stating instructions. 'Diction' (the choice and use of words) accurately describes the specific way the boss chooses their words."}, {"text": "Contradict; Verdict", "isCorrect": false, "rationale": "Neither 'contradict' nor 'verdict' relates to giving instructions or the style of word choice."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
