    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the foundational meaning of the Latin root `vocare`, as described in the text, which forms the basis for many English words?", "options": [{"text": "To listen attentively", "isCorrect": false, "rationale": "While related to communication, 'to listen' is not the meaning of 'vocare'. The text explicitly states 'vocare' means 'to call'."}, {"text": "To speak loudly", "isCorrect": false, "rationale": "Though 'vocare' is linked to the voice, its core meaning is not specifically 'to speak loudly' but rather 'to call'. Words like 'vociferous' describe speaking loudly, but that's a derivative meaning."}, {"text": "To call", "isCorrect": true, "rationale": "The text clearly states that the Romans had a word 'vocare' meaning 'to call,' establishing this as the root's primary meaning."}, {"text": "To persuade effectively", "isCorrect": false, "rationale": "The voice can be an instrument of persuasion, but 'to persuade' is a potential *outcome* or *purpose* of 'calling' or speaking, not the direct meaning of 'vocare'."}]}, {"question": "A person dedicates their life to environmental activism, constantly speaking at rallies, writing articles, and lobbying politicians to protect natural resources. Which 'voc' word best describes this individual's role in relation to the environment's cause?", "options": [{"text": "Vocalist", "isCorrect": false, "rationale": "A vocalist is primarily a singer. While they use their voice, the term doesn't capture the advocacy aspect of 'calling toward' a cause."}, {"text": "Invoker", "isCorrect": false, "rationale": "An invoker 'calls upon' something for support, like a rule or a god. This doesn't fit the description of actively supporting a cause."}, {"text": "Advocate", "isCorrect": true, "rationale": "The text defines an 'advocate' as literally someone 'called toward' another person's cause, speaking on their behalf, which perfectly matches the scenario of someone campaigning for environmental protection."}, {"text": "Provoker", "isCorrect": false, "rationale": "A provoker 'calls forth' a reaction, often an angry one. While activism can provoke reactions, 'provoker' doesn't describe the primary role of supporting a cause."}]}, {"question": "The text describes 'vocation' as a 'calling' in life. Based on this understanding, what primarily distinguishes a vocation from a mere job?", "options": [{"text": "A vocation always involves a higher salary than a job.", "isCorrect": false, "rationale": "The text defines vocation as 'the work you feel summoned to do,' which relates to personal fulfillment and purpose, not financial compensation."}, {"text": "A vocation is work that one feels personally summoned or compelled to do.", "isCorrect": true, "rationale": "The text explicitly states, 'Your vocation is your 'calling' in life, the work you feel summoned to do,' highlighting the deep personal connection and sense of purpose."}, {"text": "A vocation requires more formal education than a typical job.", "isCorrect": false, "rationale": "The text does not link 'vocation' to educational requirements; its definition focuses on an internal sense of calling."}, {"text": "A vocation is exclusively for religious or spiritual leaders.", "isCorrect": false, "rationale": "While spiritual leaders often have vocations, the text's definition is broad enough to apply to any work one feels 'summoned' to do, not exclusively religious roles."}]}, {"question": "The 'etymnote' about the word 'avocado' states that its similarity to 'advocatus' is a 'pure coincidence' and a 'false cognate.' What is the primary lesson this note aims to teach the reader?", "options": [{"text": "Many English words have surprising origins from exotic languages.", "isCorrect": false, "rationale": "While true that avocado comes from Nahuatl, the primary point of the etymnote is about the misleading similarity, not just the exotic origin itself."}, {"text": "It is important to verify word origins rather than assuming based on sound or appearance.", "isCorrect": true, "rationale": "The note explicitly states, 'a false cognate that reminds us to check our etymological work carefully,' directly advising caution against assuming word origins based on superficial similarities."}, {"text": "All words that sound similar share a common Latin root.", "isCorrect": false, "rationale": "This is the opposite of the note's message, which highlights that some words *do not* share a common root despite sounding similar."}, {"text": "The Nahuatl language has significantly influenced Latin vocabulary.", "isCorrect": false, "rationale": "The note indicates that 'avocado' came from Nahuatl into English via Spanish, not that Nahuatl influenced Latin, which existed long before contact with the Aztec language."}]}, {"question": "A student is debating a point in a history class. To strengthen their argument, they reference a specific historical document and quote a passage from it. This action is most analogous to which 'voc' word?", "options": [{"text": "Evoking", "isCorrect": false, "rationale": "To evoke is to 'call out' a memory or feeling. While the document might evoke a thought, the act of referencing it for support is not 'evoking'."}, {"text": "Invoking", "isCorrect": true, "rationale": "The text states, 'When you invoke a rule, you 'call upon' it for support.' Referencing a historical document for support is directly analogous to 'calling upon' it."}, {"text": "Provoking", "isCorrect": false, "rationale": "To provoke is to 'call forth' a reaction, often angry. While the student's argument might provoke debate, their act of referencing the document is not primarily to provoke a reaction."}, {"text": "Revoking", "isCorrect": false, "rationale": "To revoke is to 'call back' a privilege or permission. This action is unrelated to supporting an argument with evidence."}]}, {"question": "The text mentions several 'voc' words that 'carry strong emotion.' Which of the following words is presented as generally *less* associated with strong emotion compared to the others mentioned in this specific section?", "options": [{"text": "Provoke", "isCorrect": false, "rationale": "The text states 'To provoke is to 'call forth' a reaction, often an angry one,' indicating a strong emotional connection."}, {"text": "Vociferous", "isCorrect": false, "rationale": "The text describes a 'vociferous crowd' as one that 'carries its voice loudly and forcefully,' implying strong and often emotional expression."}, {"text": "Vocal", "isCorrect": true, "rationale": "The text describes 'vocal' as 'the simplest descendant' and 'anything related to the voice,' without inherently attaching strong emotional connotations, unlike 'provoke,' 'evoke,' and 'vociferous' which are specifically highlighted for carrying strong emotion."}, {"text": "Evoke", "isCorrect": false, "rationale": "The text states 'To evoke is to 'call out' a memory or feeling,' which often involves strong emotional recall."}]}, {"question": "Imagine a political rally where the crowd is shouting slogans, waving signs, and making their demands known in a loud, forceful, and persistent manner. The text would most accurately describe this crowd as:", "options": [{"text": "Invoking a new law", "isCorrect": false, "rationale": "While they might desire a new law, 'invoking' refers to calling upon something for support, not expressing demands in a loud, forceful way."}, {"text": "Vocalizing their thoughts", "isCorrect": false, "rationale": "While 'vocalizing' is true in a general sense, 'vocal' is described as the 'simplest descendant.' The description of 'loud, forceful, and persistent' expression fits a more specific and intense 'voc' word."}, {"text": "Vociferous", "isCorrect": true, "rationale": "The text defines a 'vociferous crowd' as 'one that 'carries its voice' loudly and forcefully,' perfectly matching the description of the rally crowd."}, {"text": "Evoking a memory", "isCorrect": false, "rationale": "The crowd's actions are about present demands and expressions, not about 'calling out' a memory or feeling."}]}, {"question": "A country's government passes a new policy. Weeks later, due to widespread public protest and scrutiny, the government decides to nullify the policy, effectively undoing it. This action is an example of the government choosing to:", "options": [{"text": "Provoke the public", "isCorrect": false, "rationale": "To provoke is to 'call forth' a reaction. While the initial policy might have provoked anger, the act of undoing it is not 'provoking' in the sense of calling forth a reaction."}, {"text": "Invoke a solution", "isCorrect": false, "rationale": "To invoke is to 'call upon' for support. Nullifying a policy is not calling upon something for support but rather retracting something previously put forth."}, {"text": "Evoke past mistakes", "isCorrect": false, "rationale": "To evoke is to 'call out' a memory or feeling. While past mistakes might be remembered, the act of nullifying the policy itself is not 'evoking'."}, {"text": "Revoke the policy", "isCorrect": true, "rationale": "The text defines 'to revoke' as 'to 'call back' a privilege or permission.' In this context, the government is 'calling back' or canceling the policy, which is analogous to revoking a privilege or permission."}]}, {"question": "The entire section, from the 'Root Story' to the discussion of 'voc' words carrying strong emotion, consistently emphasizes what overarching idea?", "options": [{"text": "The importance of silent observation in Roman society.", "isCorrect": false, "rationale": "The section opens with a bustling Roman Forum and focuses on the act of 'raising one's voice,' contradicting the idea of silent observation as the main theme."}, {"text": "The evolution of Latin grammar into modern English.", "isCorrect": false, "rationale": "While it discusses word origins, the focus is on semantic development from a root, not a comprehensive overview of grammatical evolution."}, {"text": "The power and influence of the human voice in various contexts.", "isCorrect": true, "rationale": "The text concludes by stating, 'Every one of these words traces back to that same ancient Roman idea: the voice as an instrument of power, persuasion, and identity,' which perfectly encapsulates the overarching theme."}, {"text": "The superiority of Latin as a root language over others.", "isCorrect": false, "rationale": "The text highlights Latin's influence on English but does not make a claim about its superiority over other languages, especially considering the 'avocado' etymnote."}]}, {"question": "A manager delivers constructive criticism to an employee, but the employee becomes defensive and upset. In this situation, the manager's criticism has primarily served to:", "options": [{"text": "Evoke a positive change", "isCorrect": false, "rationale": "To evoke is to 'call out' a memory or feeling. While change might be desired, the immediate outcome described is defensiveness, not positive change."}, {"text": "Invoke company policy", "isCorrect": false, "rationale": "To invoke is to 'call upon' for support. The manager's criticism itself isn't invoking policy, though they might have used policy to frame it."}, {"text": "Revoke the employee's duties", "isCorrect": false, "rationale": "To revoke is to 'call back' a privilege or permission. The criticism did not immediately lead to the revocation of duties."}, {"text": "Provoke an emotional reaction", "isCorrect": true, "rationale": "The text states 'To provoke is to 'call forth' a reaction, often an angry one.' The employee becoming 'defensive and upset' is an emotional reaction 'called forth' by the criticism."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
