<script>
var QUESTIONS = [{"question": "What was the primary purpose of the slave whispering 'Memento mori' to a triumphant Roman general?", "options": [{"text": "To remind the general to distribute his wealth among the poor.", "isCorrect": false, "rationale": "The text does not mention this as the purpose of 'Memento mori'. It's about mortality, not philanthropy."}, {"text": "To encourage the general to plan for his funeral arrangements.", "isCorrect": false, "rationale": "While related to death, the phrase's context in the text implies a more immediate philosophical reminder, not practical planning for a funeral at that moment."}, {"text": "To temper the general's pride by reminding him of his own mortality.", "isCorrect": true, "rationale": "The phrase 'Remember that you will die' whispered at the peak of triumph served to humble the general and remind him that even he, despite his great victory, was mortal."}, {"text": "To warn the general of potential assassination plots.", "isCorrect": false, "rationale": "The text does not suggest 'Memento mori' was a warning about assassination; its meaning is a general reminder of death."}]}, {"question": "The text states that `mort` and `mor` (death) form a natural pair with `vit` and `viv` (life). How does English use both root families to describe the 'human condition' according to the provided section?", "options": [{"text": "Humans are inherently immortal beings who can be revived.", "isCorrect": false, "rationale": "The text explicitly states humans are 'mortal beings', not immortal, contrasting with 'immortal' for gods/legends. While revive uses a life root, it doesn't describe the human condition as a whole in the context given."}, {"text": "We are mortal beings who seek vital experiences.", "isCorrect": true, "rationale": "This statement is directly quoted from the text, illustrating how both 'mortal' (death root) and 'vital' (life root) are used together to describe the human experience."}, {"text": "Life is a constant struggle against death, hence mortification.", "isCorrect": false, "rationale": "While life is a struggle against death, 'mortification' has evolved to mean extreme embarrassment, which doesn't directly capture the broad 'human condition' described by the pairing of 'mortal' and 'vital'."}, {"text": "Our bodies are moribund while our spirits are vivacious.", "isCorrect": false, "rationale": "While 'moribund' relates to death and 'vivacious' to life, this specific philosophical contrast is not what the text uses to illustrate the general 'human condition' described by the root pairing."}]}, {"question": "Based on the provided etymology, what does it mean to 'mortify' someone in its modern, softened sense?", "options": [{"text": "To put them to actual physical death.", "isCorrect": false, "rationale": "This was the root sense, but the text explicitly states the meaning 'softened' over centuries away from actual killing."}, {"text": "To subject them to a post-mortem examination.", "isCorrect": false, "rationale": "'Post-mortem' refers to an examination after death, which is unrelated to the modern meaning of 'mortify'."}, {"text": "To make them feel extremely humiliated or embarrassed.", "isCorrect": true, "rationale": "The text clarifies that 'over the centuries it softened to mean extreme humiliation rather than actual killing,' making this the correct modern interpretation."}, {"text": "To place them in a mortuary.", "isCorrect": false, "rationale": "A mortuary is a place for the dead; 'mortify' refers to an emotional state, not a physical location."}]}, {"question": "Which word would logically complete the analogy: `mortal` is to `immortal` as `vive` is to _______?", "options": [{"text": "vivid", "isCorrect": false, "rationale": "Vivid describes intensity or brightness, not a state of being brought back or made anew, which would parallel the addition of a prefix like 'im-' or 're-'."}, {"text": "vital", "isCorrect": false, "rationale": "Vital means essential for life, but doesn't show the transformation via a prefix similar to 'immortal'."}, {"text": "revive", "isCorrect": true, "rationale": "The text directly states, 'just as re- turns vive into revive.' This demonstrates the use of a prefix (`re-` meaning 'again' or 'back') to alter the meaning, similar to how `im-` ('not') changes `mortal` to `immortal`."}, {"text": "vivacious", "isCorrect": false, "rationale": "Vivacious means lively and animated, but doesn't represent a direct prefix-driven transformation of 'vive' in the same way 'immortal' does for 'mortal'."}]}, {"question": "A person described as `moribund` is in what state?", "options": [{"text": "Experiencing great joy and vitality.", "isCorrect": false, "rationale": "The word `moribund` comes from a Latin root meaning 'about to die,' which is the opposite of great joy and vitality."}, {"text": "Suffering from extreme embarrassment.", "isCorrect": false, "rationale": "Extreme embarrassment is the modern meaning of 'mortify,' not 'moribund'."}, {"text": "In a dying state, or near death.", "isCorrect": true, "rationale": "The text explicitly states: 'A person who is moribund is in a dying state — the word comes from moribundus, “about to die.”'"}, {"text": "Undergoing a careful examination after an event.", "isCorrect": false, "rationale": "An examination 'after death' is a 'post-mortem,' not what 'moribund' describes."}]}, {"question": "The term 'mortgage' is literally a 'death pledge.' According to the text, what are the two ways this 'death' can manifest in the context of the pledge?", "options": [{"text": "The borrower dies if they cannot pay, or the lender dies if the property is seized.", "isCorrect": false, "rationale": "The 'death' in 'mortgage' is metaphorical, referring to the pledge or property, not the actual death of people involved."}, {"text": "The debt 'dies' (is paid off), or the property 'dies' (is forfeited).", "isCorrect": true, "rationale": "The text explains, 'The idea is that the pledge “dies” when the debt is paid off, or the property “dies” (is forfeited) if the borrower fails to pay.'"}, {"text": "The contract expires upon the death of the borrower, or the property becomes unusable after a certain period.", "isCorrect": false, "rationale": "The text does not link the term to the borrower's death or the property becoming unusable after a period, but rather to the resolution or forfeiture of the pledge."}, {"text": "The bank 'dies' (goes bankrupt) if the loan defaults, or the agreement 'dies' if a new owner is found.", "isCorrect": false, "rationale": "The 'death' does not refer to the bank's bankruptcy, and while agreements can change, the text specifies the 'death' of the pledge or property itself."}]}, {"question": "Which of the following words does NOT directly derive its primary meaning from the Latin root `mort`/`mor` (death), as discussed in this section?", "options": [{"text": "Mortuary", "isCorrect": false, "rationale": "A 'mortuary' is a place for the care of the dead, directly stemming from the 'mort' root."}, {"text": "Vital", "isCorrect": true, "rationale": "The text identifies 'vital' as coming from `vit`/`viv` (life), which is presented as the 'natural pair' opposite to `mort`/`mor` (death), making it the word not derived from the death root."}, {"text": "Post-mortem", "isCorrect": false, "rationale": "'Post-mortem' literally means 'after death' and is a direct descendant of the 'mort' root."}, {"text": "Mortal", "isCorrect": false, "rationale": "'Mortal' describes any creature that will eventually die, making it a direct descendant of the 'mort' root."}]}, {"question": "The Romans built elaborate `mortuaries`. What was their purpose, reflecting the Roman attitude towards death?", "options": [{"text": "They were sites for gladiatorial combat.", "isCorrect": false, "rationale": "Gladiatorial combat occurred in arenas; mortuaries were for the deceased."}, {"text": "They were centers for philosophical debate about mortality.", "isCorrect": false, "rationale": "While Romans contemplated mortality, mortuaries were practical facilities, not primarily debate centers."}, {"text": "They were places dedicated to the care of the dead and preparations for funerals.", "isCorrect": true, "rationale": "The text states Romans built 'elaborate mortuaries — places dedicated to the care of the dead — and to hold lavish funeral processions through the city,' indicating their practical and respectful approach to the deceased."}, {"text": "They served as vaults for storing valuable family heirlooms.", "isCorrect": false, "rationale": "The text specifies their purpose for the 'care of the dead,' not for storing heirlooms, though tombs might contain such items, a mortuary's primary function is different."}]}, {"question": "Considering the breadth of terms derived from `mort`/`mor` (death) in this section, what does this suggest about the Roman influence on the English language?", "options": [{"text": "Latin roots primarily influenced only philosophical and religious vocabulary in English.", "isCorrect": false, "rationale": "The terms discussed ('mortgage,' 'mortify,' 'mortuary,' 'post-mortem') span finance, social interaction, and medical/death care, indicating a broader influence than just philosophy and religion."}, {"text": "Latin roots related to death were integrated into various aspects of daily life, including finance, social etiquette, and death care.", "isCorrect": true, "rationale": "The section demonstrates how `mort`/`mor` gives us words like 'mortgage' (finance), 'mortify' (social etiquette), 'mortuary' and 'post-mortem' (death care), illustrating its pervasive influence across different domains."}, {"text": "English adopted only the most dramatic and extreme death-related Latin terms.", "isCorrect": false, "rationale": "Words like 'mortal' and 'post-mortem' are common and descriptive rather than purely 'dramatic and extreme,' and 'mortify' softened its meaning, suggesting a range of adoption."}, {"text": "The influence was limited to direct translations of Latin phrases without further development.", "isCorrect": false, "rationale": "The evolution of 'mortify' from 'put to death' to 'extreme humiliation' shows that meanings developed and adapted, not just direct translations."}]}, {"question": "The phrase 'Morituri te salutant' ('Those who are about to die salute you') was uttered by gladiators. How does this phrase, in conjunction with 'Memento mori,' highlight a fundamental aspect of Roman culture's relationship with death?", "options": [{"text": "It demonstrates their belief in reincarnation, where death was a transition.", "isCorrect": false, "rationale": "The text does not mention reincarnation, but rather focuses on the direct confrontation and acknowledgment of mortality."}, {"text": "It reveals a societal acceptance of and direct confrontation with the inevitability of death.", "isCorrect": true, "rationale": "Both phrases show that death was not hidden but openly acknowledged and integrated into significant cultural events, from triumph to combat, emphasizing its inevitability and omnipresence."}, {"text": "It suggests that only warriors and generals were truly considered 'mortal' in Roman society.", "isCorrect": false, "rationale": "The text defines 'mortal' broadly as 'any creature that will eventually die,' applying to all humans, not just specific classes."}, {"text": "It indicates a morbid fascination with death, leading to a decline in artistic expression.", "isCorrect": false, "rationale": "The text highlights integration and acknowledgment, not necessarily a 'morbid fascination' leading to decline; Roman art and culture were highly developed."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
