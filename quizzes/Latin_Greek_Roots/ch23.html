<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words from the Ancients: Latin &amp; Greek Roots &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 23</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the Greek root phon mean?", "options": [{"text": "light", "isCorrect": false, "rationale": "Light is photos in Greek, not phon."}, {"text": "sound or voice", "isCorrect": true, "rationale": "Phon comes from Greek phone, meaning 'sound' or 'voice.'"}, {"text": "time", "isCorrect": false, "rationale": "Time is the meaning of chron, not phon."}, {"text": "music", "isCorrect": false, "rationale": "While phon relates to sound (including music), the root itself means sound or voice, not music specifically."}]}, {"question": "A telephone is literally a 'far-sound' device. Which prefix contributes the meaning 'far'?", "options": [{"text": "tele-", "isCorrect": true, "rationale": "Tele- means 'far': telephone = tele- (far) + phon (sound). It transmits sound over great distances."}, {"text": "micro-", "isCorrect": false, "rationale": "Micro- means small, as in microphone (small-sound device)."}, {"text": "eu-", "isCorrect": false, "rationale": "Eu- means good, as in euphony (good sound)."}, {"text": "syn-", "isCorrect": false, "rationale": "Syn- means together, as in symphony (sounding together)."}]}, {"question": "A symphony is described as 'sounding together.' Which prefix in symphony means 'together'?", "options": [{"text": "sym-", "isCorrect": true, "rationale": "Sym- is a form of syn- meaning 'together': symphony = sym- (together) + phon (sound): a harmonious blending of many instruments."}, {"text": "eu-", "isCorrect": false, "rationale": "Eu- means good or well, not together."}, {"text": "dia-", "isCorrect": false, "rationale": "Dia- means between or through, not together."}, {"text": "tele-", "isCorrect": false, "rationale": "Tele- means far, not together."}]}, {"question": "Euphony is the pleasing, harmonious quality of sound. The prefix eu- in euphony means:", "options": [{"text": "together", "isCorrect": false, "rationale": "Together is the meaning of syn-/sym-, not eu-."}, {"text": "very loud", "isCorrect": false, "rationale": "Very loud is not the meaning of eu-."}, {"text": "good or pleasant", "isCorrect": true, "rationale": "Eu- means 'good' or 'pleasant': euphony = eu- (good) + phon (sound) — the quality of speech or music that flows smoothly and pleasantly."}, {"text": "true", "isCorrect": false, "rationale": "True is not the meaning of eu-."}]}, {"question": "What does the Greek root chron mean?", "options": [{"text": "order or sequence", "isCorrect": false, "rationale": "Order or sequence is a concept related to chron, but the root itself means time."}, {"text": "memory", "isCorrect": false, "rationale": "Memory is not the meaning of chron."}, {"text": "time", "isCorrect": true, "rationale": "Chron comes from Greek chronos, meaning 'time' — specifically measurable, sequential time."}, {"text": "history", "isCorrect": false, "rationale": "While chronology relates to history, the root chron itself means time."}]}, {"question": "A chronology is a list of events arranged in order. What does the -logy part of this word tell you?", "options": [{"text": "It means the events happened long ago.", "isCorrect": false, "rationale": "-logy does not indicate that events are old."}, {"text": "It means a record, account, or study of time.", "isCorrect": true, "rationale": "-logy comes from logos (word, account, study): chronology = chron (time) + -logy (account): an account of events arranged by time."}, {"text": "It means the study of Greek history.", "isCorrect": false, "rationale": "-logy means study of any subject, not specifically Greek history."}, {"text": "It means the events are written on a clock.", "isCorrect": false, "rationale": "This is not the meaning of -logy."}]}, {"question": "An anachronism is something placed in the wrong time period. The prefix ana- in anachronism means:", "options": [{"text": "together", "isCorrect": false, "rationale": "Together is the meaning of syn-, as in synchronize."}, {"text": "before", "isCorrect": false, "rationale": "Before is the meaning of pre-, not ana-."}, {"text": "against or back", "isCorrect": true, "rationale": "Ana- here means 'against' or 'back': anachronism = ana- (against) + chron (time): something that goes against its proper time period."}, {"text": "around", "isCorrect": false, "rationale": "Around is the meaning of circum- or peri-, not ana-."}]}, {"question": "To synchronize two clocks means to make them show the same time. Which prefix in synchronize means 'together' or 'same'?", "options": [{"text": "chron-", "isCorrect": false, "rationale": "Chron is the root meaning time, not the prefix meaning together."}, {"text": "syn-", "isCorrect": true, "rationale": "Syn- means 'together': synchronize = syn- (together) + chron (time) + -ize: to cause things to happen at the same time."}, {"text": "-ize", "isCorrect": false, "rationale": "-ize is a suffix meaning 'to make' or 'to cause to be,' not together."}, {"text": "ana-", "isCorrect": false, "rationale": "Ana- means against or back, as in anachronism."}]}, {"question": "How do the Greek root phon and the Latin root voc/vox (voice, to call) divide the English vocabulary of sound and voice?", "options": [{"text": "Phon produces words about calling people; voc produces words about musical sound.", "isCorrect": false, "rationale": "This is reversed: voc/vox relates to calling and speaking, while phon relates to physical sound."}, {"text": "Phon produces words about sound as a physical phenomenon; voc produces words about calling and speaking.", "isCorrect": true, "rationale": "Latin voc/vox gave vocal and invoke (calling, speaking); Greek phon gave microphone and phonics (sound as a physical thing)."}, {"text": "Both roots produce identical words with the same meanings.", "isCorrect": false, "rationale": "They produce very different word families used in different contexts."}, {"text": "Phon only appears in music words; voc only appears in language words.", "isCorrect": false, "rationale": "Phon appears in many non-music contexts (telephone, phonics); voc appears in varied contexts too."}]}, {"question": "A student in a class about ancient Rome says that a character in a Roman play is wearing a digital wristwatch. A history teacher calls this an anachronism. Why?", "options": [{"text": "Because digital watches are too modern and expensive for actors.", "isCorrect": false, "rationale": "The issue is not cost but timing."}, {"text": "Because the watch belongs to the wrong time period — it is something out of place in its historical setting.", "isCorrect": true, "rationale": "Anachronism = ana- (against) + chron (time): something placed against or outside its proper time. A digital watch in ancient Rome is historically impossible."}, {"text": "Because Romans did not have wrists.", "isCorrect": false, "rationale": "This is not the reason an anachronism matters."}, {"text": "Because the word watch comes from a Greek root, not a Latin root.", "isCorrect": false, "rationale": "Etymology is not the issue here; the problem is the historical impossibility."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
