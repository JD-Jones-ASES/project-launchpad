<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words from the Ancients: Latin &amp; Greek Roots &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the Latin root 'scrib/script' mean?", "options": [{"text": "to speak", "isCorrect": false, "rationale": "Speaking is covered by the roots 'voc' and 'dict,' not 'scrib/script.'"}, {"text": "to write", "isCorrect": true, "rationale": "The root 'scrib/script' comes from Latin 'scribere' (to write) and its past participle 'scriptum.'"}, {"text": "to read", "isCorrect": false, "rationale": "Reading is covered by the root 'leg/lect' (Ch. 8), not 'scrib/script.' Writing and reading are related but separate roots."}, {"text": "to draw", "isCorrect": false, "rationale": "Drawing is not the meaning of 'scrib/script.' The root is specifically about writing with letters and words."}]}, {"question": "A 'manuscript' literally means:", "options": [{"text": "a very old book", "isCorrect": false, "rationale": "While manuscripts are often old, the word's literal meaning is about how it was made, not its age."}, {"text": "written by hand", "isCorrect": true, "rationale": "'Manuscript' comes from Latin 'manu' (by hand) + 'scriptum' (written), literally meaning 'written by hand.'"}, {"text": "a royal decree written in ink", "isCorrect": false, "rationale": "A royal decree is more closely related to 'edict' (dict root). A manuscript just means any document written by hand."}, {"text": "a scroll from ancient Egypt", "isCorrect": false, "rationale": "A manuscript is not limited to scrolls or Egypt — the word literally just means 'written by hand,' regardless of material or origin."}]}, {"question": "When a doctor 'prescribes' medicine, what does the root structure tell us she is doing?", "options": [{"text": "She is speaking about the medicine loudly in the hospital", "isCorrect": false, "rationale": "Speaking loudly relates to 'vociferous' (voc root), not 'prescribe.' Prescribing is about writing instructions."}, {"text": "She is writing instructions before the patient takes the medicine", "isCorrect": true, "rationale": "'Prescribe' = 'pre-' (before) + 'scrib' (to write): the doctor writes instructions in advance of the patient taking the medicine."}, {"text": "She is choosing the medicine from many options", "isCorrect": false, "rationale": "Choosing relates to the root 'lect/leg' (Ch. 8), not 'scrib.' Prescribing is about writing, not selecting."}, {"text": "She is describing the medicine's effects to a patient", "isCorrect": false, "rationale": "Describing uses the prefix 'de-' (down/about) + 'scrib,' while prescribing uses 'pre-' (before). Both involve writing, but prescribing is about writing advance instructions."}]}, {"question": "What does the word 'inscribe' mean?", "options": [{"text": "To write a legal document", "isCorrect": false, "rationale": "Legal documents are not specifically 'inscribed' — the word 'inscribe' is about writing into or onto a surface."}, {"text": "To write or carve words into a surface", "isCorrect": true, "rationale": "'Inscribe' comes from 'in-' (into, on) + 'scrib' (to write), meaning to write or engrave words onto a surface like stone or metal."}, {"text": "To copy a document from one language to another", "isCorrect": false, "rationale": "Copying across languages is translation, not inscribing. 'Inscribe' is about writing into a surface."}, {"text": "To write after the main text of a letter", "isCorrect": false, "rationale": "Writing after the main text describes a 'postscript' (post- + script), not 'inscribe.'"}]}, {"question": "What is a 'postscript' and what do its morpheme parts mean?", "options": [{"text": "A before-written warning; 'post-' means before", "isCorrect": false, "rationale": "'Post-' means after, not before. Before would be 'pre-' as in 'prescribe.'"}, {"text": "An addition written after the main body of a letter; 'post-' means after", "isCorrect": true, "rationale": "'Postscript' = 'post-' (after) + 'script' (written), meaning something written after the main text — the familiar 'P.S.' at the end of a letter."}, {"text": "A secret message written in code; 'post-' means hidden", "isCorrect": false, "rationale": "'Post-' means after, not hidden or secret. A postscript is an open addition to a letter."}, {"text": "The official first paragraph of a document; 'post-' means first", "isCorrect": false, "rationale": "'Post-' means after, not first. First would be 'pre-' or 'proto-.'"}]}, {"question": "A 'transcript' is a written record of something spoken. Which prefix does 'transcript' use, and what does it mean?", "options": [{"text": "'trans-' meaning before — the transcript is written before the speech", "isCorrect": false, "rationale": "'Trans-' means across, not before. A transcript captures speech and transfers it across to written form."}, {"text": "'trans-' meaning across — the transcript transfers speech into written form", "isCorrect": true, "rationale": "'Transcript' = 'trans-' (across) + 'script' (written): it is a written record that carries (transfers) spoken words across into text."}, {"text": "'trans-' meaning over — the transcript is written by an authority", "isCorrect": false, "rationale": "'Over' or 'above' would be the prefix 'super-' or 'supra-.' 'Trans-' means across."}, {"text": "'trans-' meaning again — the speech is re-written after the fact", "isCorrect": false, "rationale": "'Again' would be the prefix 're-.' 'Trans-' means across, referring to the transfer from spoken to written form."}]}, {"question": "The Latin proverb 'Verba volant, scripta manent' means 'Spoken words fly away, written words remain.' Which English word from this chapter best embodies the idea that written words can outlast the spoken ones?", "options": [{"text": "scribe", "isCorrect": false, "rationale": "A scribe is the person who does the writing, not the written product itself. The proverb emphasizes what is written, not who writes it."}, {"text": "scripture", "isCorrect": true, "rationale": "'Scripture' refers to sacred writings preserved for generations — the ultimate example of written words enduring long after any spoken version has vanished."}, {"text": "prescribe", "isCorrect": false, "rationale": "Prescribing is a functional act of writing instructions — it doesn't primarily capture the idea of written words outlasting speech."}, {"text": "describe", "isCorrect": false, "rationale": "Describing is about creating an account of something. While it is a form of writing, 'scripture' better captures the idea of enduring written texts."}]}, {"question": "What was a 'scribe' in ancient Roman society, and why were scribes so powerful?", "options": [{"text": "A soldier who delivered messages between generals", "isCorrect": false, "rationale": "Message carriers were called couriers or messengers, not scribes. Scribes were writers, not soldiers."}, {"text": "A professional who wrote documents by hand, holding power because most people could not read or write", "isCorrect": true, "rationale": "In a world where most people were illiterate, the scribe was essential — recording laws, contracts, military orders, and senators' speeches. The word comes from Latin 'scribere' (to write)."}, {"text": "A judge who declared verdicts in court", "isCorrect": false, "rationale": "Declaring verdicts was the role of judges or juries, connected to the 'dict' root. A scribe's role was writing, not judging."}, {"text": "A tax collector who counted the city's money", "isCorrect": false, "rationale": "Tax collection is not related to scribing. Scribes wrote documents; they did not collect money."}]}, {"question": "Which word would you use to describe the action of carving a name into a bronze plaque?", "options": [{"text": "transcribe", "isCorrect": false, "rationale": "'Transcribe' means to copy spoken or recorded words into written form — it implies transferring across mediums, not carving into a surface."}, {"text": "describe", "isCorrect": false, "rationale": "'Describe' means to write about something in detail. It does not specifically mean to carve words into a physical surface."}, {"text": "inscribe", "isCorrect": true, "rationale": "'Inscribe' = 'in-' (into, on) + 'scrib' (to write). It means to write or carve words into or onto a surface, which is exactly what is done when carving a name into a plaque."}, {"text": "prescribe", "isCorrect": false, "rationale": "'Prescribe' means to write instructions in advance. It does not describe the act of engraving on a surface."}]}, {"question": "Before the printing press was invented in the 1400s, all books in Europe were manuscripts. Why does knowing the meaning of 'manu' (by hand) + 'scriptum' (written) help you understand how those books were made?", "options": [{"text": "It tells us that books were made from expensive parchment and required money", "isCorrect": false, "rationale": "The cost of materials is not encoded in the word 'manuscript.' The word describes the method of production, not the cost."}, {"text": "It tells us that every single book was individually copied by a human writer, one word at a time", "isCorrect": true, "rationale": "Knowing 'manu' (by hand) + 'scriptum' (written) reveals that before printing, each book had to be physically written out by hand — a painstaking, individual process of copying."}, {"text": "It tells us that only scribes who were also artists could create books", "isCorrect": false, "rationale": "While some manuscripts were beautifully illustrated, the word itself does not say who made them or whether they needed artistic skill."}, {"text": "It tells us that books were passed from hand to hand across Europe", "isCorrect": false, "rationale": "The distribution of books is not encoded in the word 'manuscript.' 'Manu' refers to the hand that writes, not hands that pass books around."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
