<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words from the Ancients: Latin &amp; Greek Roots &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the Latin root 'voc' mean?", "options": [{"text": "to write", "isCorrect": false, "rationale": "Writing is covered by the root 'scrib/script,' not 'voc.'"}, {"text": "to hear", "isCorrect": false, "rationale": "Hearing is covered by the root 'aud,' not 'voc.'"}, {"text": "voice; to call", "isCorrect": true, "rationale": "The root 'voc' comes from Latin 'vocare' (to call) and 'vox' (voice)."}, {"text": "to see", "isCorrect": false, "rationale": "Seeing is covered by the root 'vis/vid,' not 'voc.'"}]}, {"question": "What does the word 'advocate' literally mean when you break it into parts?", "options": [{"text": "one who speaks back", "isCorrect": false, "rationale": "The prefix 're-' means back, not 'ad-.' 'Ad-' means toward."}, {"text": "one called toward", "isCorrect": true, "rationale": "'Ad-' means toward and 'voc' means to call, so an advocate is literally 'one called toward' another's cause."}, {"text": "one who calls forth", "isCorrect": false, "rationale": "'Pro-' means forth, not 'ad-.' 'Ad-' means toward."}, {"text": "one who speaks loudly", "isCorrect": false, "rationale": "Loud speaking describes 'vociferous,' not the literal breakdown of 'advocate.'"}]}, {"question": "Which word means 'to call back' a privilege or permission?", "options": [{"text": "provoke", "isCorrect": false, "rationale": "'Provoke' means to call forth a reaction, using the prefix 'pro-' (forth)."}, {"text": "evoke", "isCorrect": false, "rationale": "'Evoke' means to call out a memory or feeling, using the prefix 'e-' (out)."}, {"text": "invoke", "isCorrect": false, "rationale": "'Invoke' means to call upon for help, using the prefix 'in-' (upon)."}, {"text": "revoke", "isCorrect": true, "rationale": "'Revoke' uses 're-' (back) + 'vok' (to call), meaning to call back or withdraw a right."}]}, {"question": "A person's 'vocation' is best described as their:", "options": [{"text": "daily schedule", "isCorrect": false, "rationale": "A daily schedule is not related to 'vocation.' The root refers to a calling or summons."}, {"text": "speaking style", "isCorrect": false, "rationale": "Speaking style relates to 'diction,' not 'vocation.'"}, {"text": "life's calling or profession", "isCorrect": true, "rationale": "'Vocation' comes from 'voc' (to call) + '-ation' (act of), meaning the work a person feels summoned or called to do."}, {"text": "vacation destination", "isCorrect": false, "rationale": "'Vacation' and 'vocation' look similar but have different Latin origins. 'Vacation' comes from 'vacare' (to be empty)."}]}, {"question": "The word 'vociferous' contains two Latin elements: 'voc' and 'ferre.' What does 'ferre' mean?", "options": [{"text": "to see", "isCorrect": false, "rationale": "'To see' is the meaning of 'videre,' not 'ferre.'"}, {"text": "to carry", "isCorrect": true, "rationale": "'Ferre' means to carry in Latin. So 'vociferous' literally means 'carrying the voice' — loudly and forcefully."}, {"text": "to feel", "isCorrect": false, "rationale": "'To feel' is the meaning of 'sentire,' not 'ferre.'"}, {"text": "to call", "isCorrect": false, "rationale": "'To call' is the meaning of 'vocare,' not 'ferre.' In 'vociferous,' 'voc' already supplies the calling meaning."}]}, {"question": "Which sentence uses the word 'invoke' correctly?", "options": [{"text": "She invoked her friend to the party.", "isCorrect": false, "rationale": "'Invoke' means to call upon for authority or help, not to invite someone somewhere."}, {"text": "The lawyer invoked the Fifth Amendment to protect his client.", "isCorrect": true, "rationale": "'Invoke' means to call upon a rule or authority for support, which fits calling upon a legal amendment."}, {"text": "The singer invoked the crowd with her beautiful voice.", "isCorrect": false, "rationale": "This confuses 'invoke' with 'evoke.' To evoke a feeling from a crowd is the correct usage here."}, {"text": "The coach invoked the team's losing record.", "isCorrect": false, "rationale": "This misuses 'invoke.' You would invoke a rule or authority, not simply mention a record."}]}, {"question": "What is the relationship between 'evoke' and its prefix 'e-'?", "options": [{"text": "'e-' means against, so 'evoke' means to call against something", "isCorrect": false, "rationale": "'Against' is the meaning of the prefix 'contra-' or 'anti-,' not 'e-.'"}, {"text": "'e-' means out, so 'evoke' means to call out a feeling or memory", "isCorrect": true, "rationale": "The prefix 'e-' (a shorter form of 'ex-') means out. 'Evoke' means to call out or draw forth a memory or emotion."}, {"text": "'e-' means again, so 'evoke' means to call again", "isCorrect": false, "rationale": "'Again' is the meaning of the prefix 're-,' not 'e-.'"}, {"text": "'e-' means before, so 'evoke' means to call before an event", "isCorrect": false, "rationale": "'Before' is the meaning of the prefix 'pre-' or 'pro-,' not 'e-.'"}]}, {"question": "Which word from the VOC family would best describe a crowd that is shouting loudly and forcefully at a sports game?", "options": [{"text": "vocal", "isCorrect": false, "rationale": "'Vocal' simply means relating to the voice — it does not carry the idea of loudness or force."}, {"text": "vociferous", "isCorrect": true, "rationale": "'Vociferous' means loud and forceful in expressing feelings, which perfectly describes a shouting crowd."}, {"text": "evocative", "isCorrect": false, "rationale": "'Evocative' describes something that calls forth feelings or memories, not a noisy crowd."}, {"text": "revoked", "isCorrect": false, "rationale": "'Revoked' means taken back or withdrawn — it does not describe a crowd's noise level."}]}, {"question": "The word 'avocado' looks like it might come from the Latin root 'voc.' Is this true?", "options": [{"text": "Yes, it comes from 'advocare' and refers to the fruit's pear shape like a speaking tool.", "isCorrect": false, "rationale": "This is incorrect. The resemblance to 'advocare' is a false cognate — a misleading similarity with no true connection."}, {"text": "Yes, because Roman lawyers often ate avocados before court hearings.", "isCorrect": false, "rationale": "This is a made-up explanation. Avocados are native to the Americas and were unknown to ancient Romans."}, {"text": "No, 'avocado' comes from the Nahuatl word 'ahuacatl' through Spanish.", "isCorrect": true, "rationale": "The word 'avocado' entered English from Spanish 'aguacate,' which came from the Nahuatl (Aztec) word 'ahuacatl.' Its resemblance to 'advocatus' is pure coincidence."}, {"text": "No, 'avocado' comes from Greek and means 'green fruit.'", "isCorrect": false, "rationale": "Avocado does not come from Greek. It comes from Nahuatl, the language of the Aztecs."}]}, {"question": "If a teacher 'provokes' discussion in class, what is she doing?", "options": [{"text": "She is canceling the discussion.", "isCorrect": false, "rationale": "Canceling would be 'revoking,' not 'provoking.' The prefix 're-' means back, while 'pro-' means forth."}, {"text": "She is calling forth a reaction or response from students.", "isCorrect": true, "rationale": "'Provoke' uses 'pro-' (forth) + 'vok' (to call), meaning to call forth a reaction — in this case, encouraging students to respond."}, {"text": "She is listening carefully to student ideas.", "isCorrect": false, "rationale": "Listening relates to the root 'aud,' not 'voc.' Provoking is about calling forth a response, not about listening."}, {"text": "She is writing the discussion questions on the board.", "isCorrect": false, "rationale": "Writing relates to the root 'scrib/script,' not 'voc.' Provoking is about calling forth responses, not writing."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
