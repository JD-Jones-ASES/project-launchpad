<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 10, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary meaning of the Latin root 'duc / duct'?", "options": [{"text": "To build", "isCorrect": false, "rationale": "The text explicitly states the meaning is 'to lead,' not 'to build.'"}, {"text": "To lead", "isCorrect": true, "rationale": "The section clearly defines the meaning of 'duc / duct' as 'to lead,' derived from the Latin 'ducere.'"}, {"text": "To speak", "isCorrect": false, "rationale": "The text specifies the meaning as 'to lead,' not 'to speak.' The root for 'to speak' is typically 'loqui' or 'dict.'"}, {"text": "To see", "isCorrect": false, "rationale": "The text identifies the meaning as 'to lead,' not 'to see.' The root for 'to see' is typically 'vid' or 'spec.'"}]}, {"question": "The root 'duc / duct' originates from which language?", "options": [{"text": "Greek", "isCorrect": false, "rationale": "The text explicitly states the language of origin is Latin, not Greek."}, {"text": "Old English", "isCorrect": false, "rationale": "The text specifies the origin as Latin, not Old English."}, {"text": "Latin", "isCorrect": true, "rationale": "The section clearly states 'Language of Origin: Latin (ducere, to lead),' indicating its direct derivation from Latin."}, {"text": "French", "isCorrect": false, "rationale": "While French is mentioned in relation to a variant form ('duk'), it is not the original language of the root itself, which is Latin."}]}, {"question": "In the word 'educate,' which part directly embodies the core meaning of 'to lead' as described by the root 'duc'?", "options": [{"text": "ed-", "isCorrect": false, "rationale": "'ed-' is a prefix, typically meaning 'out' or 'from,' and while it modifies the root, it does not carry the meaning of 'to lead' itself."}, {"text": "-ate", "isCorrect": false, "rationale": "'-ate' is a verb-forming suffix; it does not represent the core meaning of 'to lead.'"}, {"text": "duc-", "isCorrect": true, "rationale": "The 'duc-' component in 'educate' is the direct manifestation of the root, conveying the meaning 'to lead,' specifically 'to lead out' or 'to guide.'"}, {"text": "e-", "isCorrect": false, "rationale": "'e-' is a shortened form of a prefix (ex- or e-), meaning 'out of' or 'from,' and does not carry the meaning of 'to lead.'"}]}, {"question": "According to the text, the variant form 'duc' is typically used under what circumstances?", "options": [{"text": "When forming nouns exclusively.", "isCorrect": false, "rationale": "The text does not specify usage based on word type (noun, verb, etc.), but rather on phonetic context or compound formation."}, {"text": "Before vowels and in some compounds.", "isCorrect": true, "rationale": "The text states 'Variant Forms: duc (before vowels and in some compounds),' directly addressing the typical usage of this form."}, {"text": "Only when the word has a negative connotation.", "isCorrect": false, "rationale": "The text provides no information linking the 'duc' variant to the connotation of a word."}, {"text": "As a past participle stem.", "isCorrect": false, "rationale": "The text identifies 'duct' as the past participle stem, not 'duc.'"}]}, {"question": "The word 'aqueduct' combines the Latin root 'aqua' (water) with the 'duct' variant. How does the meaning of the root 'duct' contribute to the overall meaning of 'aqueduct'?", "options": [{"text": "It implies a structure used for building water systems.", "isCorrect": false, "rationale": "While an aqueduct is a structure, the root 'duct' means 'to lead,' not 'to build.'"}, {"text": "It denotes a conduit or channel used for leading water.", "isCorrect": true, "rationale": "Given that 'duct' means 'to lead,' an 'aqueduct' is literally a structure that 'leads water,' aligning with the root's meaning to describe a channel for water."}, {"text": "It suggests the observation or viewing of water.", "isCorrect": false, "rationale": "The root 'duct' means 'to lead,' not 'to see' or 'to observe.'"}, {"text": "It refers to the act of purifying water.", "isCorrect": false, "rationale": "The root 'duct' means 'to lead,' not 'to purify.'"}]}, {"question": "Which of the following example derivatives provided most clearly utilizes the 'duct' variant form originating from the past participle stem?", "options": [{"text": "educate", "isCorrect": false, "rationale": "'Educate' uses the 'duc' variant, not 'duct.' Its meaning implies ongoing action rather than a past state."}, {"text": "conduct", "isCorrect": true, "rationale": "'Conduct' uses the 'duct' variant, which the text identifies as the 'past participle stem.' This form suggests something that has been led or is in the process of being led/managed, consistent with the past participle origin."}, {"text": "produce", "isCorrect": false, "rationale": "'Produce' uses the 'duc' variant, not 'duct.' Its meaning relates to bringing something forth or leading it forward."}, {"text": "duke", "isCorrect": false, "rationale": "'Duke' is a 'duk' variant form, not 'duct.' It refers to a leader, but not specifically through the past participle stem."}]}, {"question": "The existence of 'duk' as a variant form (as in 'duke') is specifically attributed to its transmission via which language?", "options": [{"text": "German", "isCorrect": false, "rationale": "The text explicitly states 'duk (via French, as in duke),' not German."}, {"text": "Spanish", "isCorrect": false, "rationale": "The text attributes the 'duk' variant to French influence, not Spanish."}, {"text": "Italian", "isCorrect": false, "rationale": "The text specifies French as the intermediary language for the 'duk' variant, not Italian."}, {"text": "French", "isCorrect": true, "rationale": "The text states 'duk (via French, as in duke),' indicating that this variant form entered English through French."}]}, {"question": "If you were to encounter a new word, 'abduction,' based on the root 'duc/duct' and the prefix 'ab-' (meaning 'away from'), what would you infer its meaning to be?", "options": [{"text": "The act of giving away.", "isCorrect": false, "rationale": "The root means 'to lead,' not 'to give.' While 'away' is correct for 'ab-,' 'giving' is incorrect."}, {"text": "The process of observing from a distance.", "isCorrect": false, "rationale": "The root means 'to lead,' not 'to observe.' The 'away from' meaning of 'ab-' is present, but 'observing' is incorrect."}, {"text": "The action of leading or taking someone/something away.", "isCorrect": true, "rationale": "Combining the prefix 'ab-' (away from) with the root 'duc' (to lead) logically results in 'to lead away' or 'to take away,' which is consistent with the derived meaning of 'abduction.'"}, {"text": "The ability to build at a distance.", "isCorrect": false, "rationale": "The root means 'to lead,' not 'to build.' The meaning 'at a distance' for 'ab-' is not the primary fit here for this prefix."}]}, {"question": "Which of the following is NOT listed as a variant form of the root 'duc / duct' in the provided text?", "options": [{"text": "duc", "isCorrect": false, "rationale": "The text explicitly lists 'duc' as a variant form."}, {"text": "duct", "isCorrect": false, "rationale": "The text explicitly lists 'duct' as a variant form."}, {"text": "dux", "isCorrect": true, "rationale": "While 'dux' is historically related to 'ducere' in Latin, it is not listed as one of the variant forms in the provided text ('duc,' 'duct,' 'duk')."}, {"text": "duk", "isCorrect": false, "rationale": "The text explicitly lists 'duk' as a variant form."}]}, {"question": "The example derivative 'conduct' implies an act of managing or guiding an activity or organization. This aligns with the root's meaning of 'to lead' by suggesting:", "options": [{"text": "The simple physical act of walking forward.", "isCorrect": false, "rationale": "While 'to lead' can involve physical movement, 'conduct' implies a more abstract or organizational form of leadership or management, not just simple walking."}, {"text": "Leadership in a formal or organizational capacity.", "isCorrect": true, "rationale": "The meaning of 'conduct' (e.g., to conduct an orchestra, conduct an experiment) aligns well with 'to lead' in a sense of guiding, directing, or managing, often in a structured or formal context."}, {"text": "The creation or fabrication of something new.", "isCorrect": false, "rationale": "The root means 'to lead,' not 'to create' or 'to fabricate.' That aligns more with 'produce.'"}, {"text": "The act of educating or teaching a group.", "isCorrect": false, "rationale": "While related to leading, 'educating' is more specific and refers to 'to lead out' of ignorance. 'Conduct' is broader in its application of guiding or managing."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
