<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 11, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary meaning of the Latin root 'ced/cede/cess'?", "options": [{"text": "To break, to stop", "isCorrect": false, "rationale": "This meaning does not align with the provided definition of the root."}, {"text": "To go, to yield", "isCorrect": true, "rationale": "The text explicitly states that the meaning of the root 'ced/cede/cess' is 'to go, to yield'."}, {"text": "To come, to stay", "isCorrect": false, "rationale": "These meanings are contrary to 'to go' and 'to yield'."}, {"text": "To build, to stand", "isCorrect": false, "rationale": "These meanings are unrelated to the definition provided for the root 'ced/cede/cess'."}]}, {"question": "From which language does the root 'ced/cede/cess' primarily originate?", "options": [{"text": "Greek", "isCorrect": false, "rationale": "The text clearly states the language of origin is Latin, not Greek."}, {"text": "Old English", "isCorrect": false, "rationale": "The text specifies Latin, making Old English an incorrect origin."}, {"text": "Latin", "isCorrect": true, "rationale": "The section content explicitly states, 'Language of Origin: Latin (cedere, to go, to yield, to withdraw)'."}, {"text": "French", "isCorrect": false, "rationale": "While French has Latin influences, the root itself is directly from Latin, as stated in the text."}]}, {"question": "The variant form 'cess' in words like 'access' is derived from which grammatical form in Latin?", "options": [{"text": "The present infinitive", "isCorrect": false, "rationale": "The text specifies the past participle, not the present infinitive."}, {"text": "The future active participle", "isCorrect": false, "rationale": "The text explicitly states 'cess (from past participle cessus)', not the future active participle."}, {"text": "The past participle", "isCorrect": true, "rationale": "The text states that the 'cess' variant comes 'from past participle cessus', indicating its grammatical origin."}, {"text": "The nominative singular", "isCorrect": false, "rationale": "The text specifically links 'cess' to the past participle, not the nominative singular form."}]}, {"question": "Which of the following words does NOT contain a form of the root 'ced/cede/cess'?", "options": [{"text": "Proceed", "isCorrect": false, "rationale": "'Proceed' contains 'ceed' (a variant of 'cede') and means 'to go forward'."}, {"text": "Recede", "isCorrect": false, "rationale": "'Recede' contains 'cede' and means 'to go back'."}, {"text": "Process", "isCorrect": false, "rationale": "'Process' contains 'cess' and relates to a 'going forward' or 'movement'."}, {"text": "Precise", "isCorrect": true, "rationale": "'Precise' comes from the Latin root 'caedere' meaning 'to cut,' not 'cedere' (to go, to yield). Its spelling similarity is misleading."}]}, {"question": "Based on the root's meaning, what does the word 'recede' most closely mean?", "options": [{"text": "To come together", "isCorrect": false, "rationale": "This meaning would typically be associated with roots like 'con-' or 'greg-'. 'Recede' implies movement away."}, {"text": "To move back or withdraw", "isCorrect": true, "rationale": "The prefix 're-' means 'back' or 'again,' and the root 'cede' means 'to go.' Therefore, 'recede' means 'to go back' or 'withdraw'."}, {"text": "To give in to an argument", "isCorrect": false, "rationale": "This describes 'concede,' not 'recede,' although both use a form of the root 'cede'."}, {"text": "To go before", "isCorrect": false, "rationale": "This meaning relates to 'precede' ('pre-' meaning 'before'), not 'recede'."}]}, {"question": "Which of the following words uses the root 'ced/cede/cess' to convey the meaning 'to go forward'?", "options": [{"text": "Intercede", "isCorrect": false, "rationale": "'Intercede' means 'to go between' ('inter-' meaning 'between')."}, {"text": "Concede", "isCorrect": false, "rationale": "'Concede' means 'to yield' or 'give in' ('con-' meaning 'completely' or 'together with')."}, {"text": "Proceed", "isCorrect": true, "rationale": "The prefix 'pro-' means 'forward,' and 'ceed' (from 'cedere') means 'to go,' so 'proceed' means 'to go forward'."}, {"text": "Secede", "isCorrect": false, "rationale": "'Secede' means 'to go apart' or 'withdraw' ('se-' meaning 'apart')."}]}, {"question": "The variant form 'cede' is specifically noted for its use in which grammatical context?", "options": [{"text": "Noun suffixes", "isCorrect": false, "rationale": "The text states 'cede (verb endings)', not noun suffixes."}, {"text": "Adjective prefixes", "isCorrect": false, "rationale": "Prefixes come before the root, and 'cede' is a root variant used as an ending, specifically for verbs."}, {"text": "Verb endings", "isCorrect": true, "rationale": "The text explicitly states 'cede (verb endings)', indicating its role in forming verbs."}, {"text": "Adverbial phrases", "isCorrect": false, "rationale": "Adverbial phrases are grammatical constructions, not a variant form of a root."}]}, {"question": "A politician who 'concedes' an election outcome is performing an action most aligned with which meaning of the root 'ced/cede/cess'?", "options": [{"text": "To go forward with plans", "isCorrect": false, "rationale": "While 'proceed' means 'to go forward,' 'concede' specifically implies yielding or accepting defeat."}, {"text": "To yield or give in", "isCorrect": true, "rationale": "To 'concede' an election means to accept the outcome and yield to the opponent, directly reflecting the 'to yield' meaning of the root."}, {"text": "To go before others", "isCorrect": false, "rationale": "This describes 'precede,' not 'concede'."}, {"text": "To withdraw entirely from public life", "isCorrect": false, "rationale": "While it involves 'yielding,' conceding an election does not necessarily mean withdrawing from all public life; it means accepting defeat in that specific contest."}]}, {"question": "While 'ced' often appears in verb forms (like 'proceed'), 'cess' is frequently found in words derived from a noun or an adjective formed from the past participle, illustrating a shift in part of speech. Which pair of words best exemplifies this pattern of 'to go/yield' related action to state/noun?", "options": [{"text": "Recede / Recess", "isCorrect": false, "rationale": "While 'recede' is a verb and 'recess' can be a noun (a period of withdrawing), 'concede' and 'concession' provide a more direct and common example of the 'to yield' meaning transforming into a noun, and 'recess' meaning a 'going back place/time' is a bit more specific."}, {"text": "Concede / Concession", "isCorrect": true, "rationale": "'Concede' is a verb meaning 'to yield,' and 'concession' is a noun meaning 'the act of yielding' or 'something yielded,' directly showcasing the shift in part of speech enabled by the 'cess' form derived from the past participle, specifically for the 'to yield' meaning."}, {"text": "Exceed / Excess", "isCorrect": false, "rationale": "'Exceed' is a verb ('to go beyond'), and 'excess' is a noun/adjective ('the state of going beyond'). This is a valid example, but 'concession' more directly reflects the 'yielding' aspect often tied to the past participle."}, {"text": "Intercede / Intercession", "isCorrect": false, "rationale": "'Intercede' is a verb ('to go between'), and 'intercession' is a noun ('the act of going between'). This is also a valid example, but 'concession' is a more prominent example of the 'to yield' aspect. The question asks for the 'best' example and 'concession' is a very clear and direct link to the 'yield' meaning of the root via its past participle form."}]}, {"question": "If a company decides to 'cede' a portion of its market share, what action are they taking?", "options": [{"text": "They are trying to expand their market share aggressively.", "isCorrect": false, "rationale": "To 'cede' means to yield or give up, which is the opposite of expanding aggressively."}, {"text": "They are acquiring another company's market share.", "isCorrect": false, "rationale": "Acquiring implies gaining, whereas 'cede' means giving up."}, {"text": "They are giving up or relinquishing a part of their market share.", "isCorrect": true, "rationale": "To 'cede' aligns with the root's meaning 'to yield,' therefore, giving up or relinquishing market share."}, {"text": "They are analyzing their market share data.", "isCorrect": false, "rationale": "Analyzing data is an informational activity and does not involve the action of 'ceding' or yielding."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
