<body>
<div class="quiz-container">

        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 14, Section 4</div>

        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A city engineer is designing a system to bring fresh water from a distant mountain lake to the urban center. Which of the following structures would be most essential for transporting a large volume of water over varying terrain, including valleys?", "options": [{"text": "An aquifer", "isCorrect": false, "rationale": "An aquifer is an underground layer that holds and carries water, primarily for storage and natural filtration, not for surface transport over long distances or across valleys."}, {"text": "An aqueduct", "isCorrect": true, "rationale": "An aqueduct is specifically a channel or bridge-like structure designed for carrying water across a distance, making it ideal for transporting water over varying terrain to a city."}, {"text": "An aquarium", "isCorrect": false, "rationale": "An aquarium is a glass tank or building for displaying aquatic life, entirely unrelated to large-scale water transport for municipal supply."}, {"text": "An aquatic garden", "isCorrect": false, "rationale": "An aquatic garden is an area where water plants grow, not a structure for transporting water for a city's supply."}]}, {"question": "Which scenario best illustrates the function of an aquifer?", "options": [{"text": "Rainwater collecting in a man-made reservoir.", "isCorrect": false, "rationale": "A reservoir is a surface body of water, often man-made, used for storage, but it is not an aquifer."}, {"text": "A river flowing swiftly through a valley.", "isCorrect": false, "rationale": "A river is a natural surface watercourse, distinct from an underground aquifer."}, {"text": "Groundwater being stored and filtered within porous rock layers.", "isCorrect": true, "rationale": "An aquifer is defined as an underground layer of rock or sand that holds and carries water, perfectly matching the description of groundwater storage and filtration in porous rock."}, {"text": "A canal diverting water for irrigation.", "isCorrect": false, "rationale": "A canal is a man-made surface channel for water, not an underground aquifer."}]}, {"question": "A marine biologist is studying the behavior of deep-sea hydrothermal vent communities. Which term most accurately describes the environment these organisms inhabit?", "options": [{"text": "Terrestrial", "isCorrect": false, "rationale": "Terrestrial refers to land environments, which is incorrect for deep-sea communities."}, {"text": "Aerial", "isCorrect": false, "rationale": "Aerial refers to air environments, which is incorrect for deep-sea communities."}, {"text": "Subaqueous", "isCorrect": true, "rationale": "Subaqueous means 'under water,' which accurately describes the deep-sea environment where hydrothermal vent communities exist."}, {"text": "Littoral", "isCorrect": false, "rationale": "Littoral refers to the coastal zone or shallow water near the shore, not the deep-sea environment."}]}, {"question": "A local community center plans to create a public exhibit showcasing various species of freshwater fish and plants. What type of facility would they need to build?", "options": [{"text": "An aviary", "isCorrect": false, "rationale": "An aviary is an enclosure for birds, not for aquatic life."}, {"text": "An observatory", "isCorrect": false, "rationale": "An observatory is a building equipped for observing astronomical or meteorological phenomena, not for displaying fish."}, {"text": "An aquafarm", "isCorrect": false, "rationale": "An aquafarm is a facility for commercial aquaculture (farming aquatic organisms), not typically for public display."}, {"text": "An aquarium", "isCorrect": true, "rationale": "An aquarium is a glass tank or building specifically designed to keep and display fish and water creatures for observation."}]}, {"question": "A jeweler is helping a client select a gemstone for an engagement ring, and the client expresses a preference for a stone that evokes the serene color of the Caribbean Sea. Which gemstone color would the jeweler most likely recommend?", "options": [{"text": "Ruby red", "isCorrect": false, "rationale": "Ruby red is a vibrant red color, which does not resemble the blue-green of the Caribbean Sea."}, {"text": "Emerald green", "isCorrect": false, "rationale": "Emerald green is a distinct green color, not the characteristic blue-green hue of the sea."}, {"text": "Aquamarine", "isCorrect": true, "rationale": "Aquamarine is a blue-green color or gemstone specifically named because it resembles the color of sea water, making it the perfect recommendation."}, {"text": "Topaz yellow", "isCorrect": false, "rationale": "Topaz yellow is a yellow color, which does not match the client's preference for a sea-like hue."}]}, {"question": "If a scientist discovers a new species of plant thriving exclusively in the deepest trenches of the ocean, how might they accurately describe both the plant and its habitat using terms from the provided word family?", "options": [{"text": "An aqueduct plant in an aquifer habitat.", "isCorrect": false, "rationale": "An aqueduct is a water channel, and an aquifer is an underground water-bearing layer. Neither term accurately describes a deep-ocean plant or its habitat."}, {"text": "An aquatic plant in a subaqueous habitat.", "isCorrect": true, "rationale": "An 'aquatic plant' correctly describes a plant living in water, and 'subaqueous habitat' precisely describes an environment existing under water, which fits the deep-ocean trench."}, {"text": "An aquamarine plant in an aquarium habitat.", "isCorrect": false, "rationale": "Aquamarine is a color/gemstone, not a description of a plant type. An aquarium is a tank for display, not a natural deep-ocean habitat."}, {"text": "A terrestrial plant in an aquatic habitat.", "isCorrect": false, "rationale": "Terrestrial means land-based, which contradicts the plant living in the ocean. While the habitat is aquatic, the plant type is incorrectly described."}]}, {"question": "What distinguishes an aqueduct from a natural river?", "options": [{"text": "An aqueduct primarily carries sediment, while a river carries water.", "isCorrect": false, "rationale": "Both rivers and aqueducts primarily carry water, and while rivers carry sediment, it's not the primary distinguishing factor."}, {"text": "An aqueduct is a naturally occurring geological feature, while a river is man-made.", "isCorrect": false, "rationale": "This statement is reversed; rivers are natural, while aqueducts are man-made structures."}, {"text": "An aqueduct is a man-made structure designed specifically for transporting water, often over obstacles.", "isCorrect": true, "rationale": "This accurately defines an aqueduct as a man-made channel or bridge-like structure built to convey water, distinguishing it from a natural river."}, {"text": "An aqueduct only carries saltwater, whereas rivers carry freshwater.", "isCorrect": false, "rationale": "Aqueducts can carry various types of water, most commonly freshwater for human consumption, and are not limited to saltwater."}]}, {"question": "During a severe drought, a rural community relies heavily on groundwater wells for its water supply. What specific underground formation is crucial for replenishing these wells?", "options": [{"text": "A surface lake", "isCorrect": false, "rationale": "A surface lake is a visible body of water above ground, not an underground formation that directly replenishes groundwater wells."}, {"text": "A volcanic chamber", "isCorrect": false, "rationale": "A volcanic chamber contains magma and is unrelated to groundwater supply for wells."}, {"text": "An aquifer", "isCorrect": true, "rationale": "An aquifer is the underground layer of rock or sand that holds and carries water, making it the essential source for groundwater wells."}, {"text": "An irrigation canal", "isCorrect": false, "rationale": "An irrigation canal is a man-made channel for distributing surface water, not an underground source for wells."}]}, {"question": "While both \"aquatic\" and \"subaqueous\" relate to water, which of the following statements best highlights a key difference in their usage?", "options": [{"text": "\"Aquatic\" always refers to living organisms, while \"subaqueous\" refers only to geological formations.", "isCorrect": false, "rationale": "Aquatic can describe non-living things (e.g., aquatic plants, aquatic sports), and subaqueous can describe objects or events, not just geological formations."}, {"text": "\"Aquatic\" describes general relation to water, often implying growth or life in water, whereas \"subaqueous\" specifically denotes being positioned under water.", "isCorrect": true, "rationale": "This accurately captures the distinction: 'aquatic' has a broader meaning of 'relating to water' or 'living/growing in water,' while 'subaqueous' specifically emphasizes the 'under water' aspect of location or formation."}, {"text": "\"Aquatic\" describes the color of water, while \"subaqueous\" describes its temperature.", "isCorrect": false, "rationale": "Neither term describes the color or temperature of water directly; aquamarine describes color, but not aquatic itself."}, {"text": "\"Aquatic\" is typically used for freshwater environments, and \"subaqueous\" for saltwater environments.", "isCorrect": false, "rationale": "Both terms can apply to either freshwater or saltwater environments."}]}, {"question": "If someone describes a painting as having \"aquamarine hues,\" what characteristic of the painting are they most likely referring to?", "options": [{"text": "Its texture feels like water.", "isCorrect": false, "rationale": "Hues refer to color, not texture."}, {"text": "It depicts scenes of underwater life.", "isCorrect": false, "rationale": "While 'aquamarine' relates to the sea, 'aquamarine hues' specifically describes the colors used, not necessarily the subject matter."}, {"text": "It features colors similar to the blue-green of the sea.", "isCorrect": true, "rationale": "Aquamarine is defined as a blue-green color resembling sea water, so 'aquamarine hues' refers to these specific colors within the painting."}, {"text": "It was painted using water-based paints.", "isCorrect": false, "rationale": "The term refers to the color itself, not the type of paint medium used."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
