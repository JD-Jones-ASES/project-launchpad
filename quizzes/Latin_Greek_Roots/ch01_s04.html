<body>
<div class="quiz-container">

        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 1, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Based on the provided word family, what is the fundamental meaning conveyed by the root 'voc' or 'vok'?", "options": [{"text": "To see or observe", "isCorrect": false, "rationale": "The roots 'voc' and 'vok' are not related to sight or observation. The section explicitly states 'voc (voice)' and 'vok (to call)'."}, {"text": "To create or build", "isCorrect": false, "rationale": "The roots 'voc' and 'vok' do not inherently mean to create or build. Their core meaning is related to voice or calling."}, {"text": "Voice or to call", "isCorrect": true, "rationale": "As indicated in the etymology of all the words, 'voc' (voice) and 'vok' (to call) are the core meanings of this root family, forming the basis for words like 'vocal' and 'invoke'."}, {"text": "To move or travel", "isCorrect": false, "rationale": "The roots 'voc' and 'vok' do not pertain to movement or travel. This meaning is unrelated to the provided word family."}]}, {"question": "A photographer wants to capture images that make viewers feel a sense of nostalgia for a bygone era. Which word best describes the photographer's intention for the audience's emotional response?", "options": [{"text": "Revoke", "isCorrect": false, "rationale": "'Revoke' means to take back or withdraw a right or decision, which does not fit the context of eliciting feelings."}, {"text": "Invoke", "isCorrect": false, "rationale": "'Invoke' means to call upon for help or as an authority, not to draw forth a feeling or memory from an audience."}, {"text": "Evoke", "isCorrect": true, "rationale": "'Evoke' means 'to call forth a feeling, memory, or image,' which perfectly describes the photographer's goal to elicit a sense of nostalgia from viewers."}, {"text": "Provoke", "isCorrect": false, "rationale": "'Provoke' means 'to call forth a reaction, often anger,' which is usually a negative connotation and not the primary emotional response the photographer intends."}]}, {"question": "Sarah dedicated her career to speaking up for environmental protection. She also publicly supported the new clean energy bill. In this scenario, how is the word 'advocate' primarily used?", "options": [{"text": "As a verb meaning to take back a decision.", "isCorrect": false, "rationale": "The definition provided for 'advocate' is not 'to take back a decision'; that describes 'revoke'."}, {"text": "As a noun referring to a person who speaks in support, and a verb meaning to publicly support.", "isCorrect": true, "rationale": "The first part of the sentence describes Sarah as 'one who speaks in support' (noun form of 'advocate'), and the second part describes her action 'to support publicly' (verb form of 'advocate'), aligning with the provided definition."}, {"text": "As an adjective describing a loud person.", "isCorrect": false, "rationale": "This describes 'vociferous,' not 'advocate.' 'Advocate' is not an adjective here."}, {"text": "As a noun referring to a person's profession or calling.", "isCorrect": false, "rationale": "This describes 'vocation,' not 'advocate.' While advocacy can be a profession, the question focuses on the word 'advocate' itself."}]}, {"question": "During the town hall meeting, a group of residents became particularly ______ in their protests against the new development, shouting their objections forcefully. Which word best completes the sentence?", "options": [{"text": "Vocal", "isCorrect": false, "rationale": "While 'vocal' means relating to the voice, it doesn't convey the intensity of 'loud and forceful in expressing feelings' that the sentence implies with 'shouting... forcefully.'"}, {"text": "Vociferous", "isCorrect": true, "rationale": "'Vociferous' means 'loud and forceful in expressing feelings,' which accurately describes residents shouting their objections forcefully in protest."}, {"text": "Evoked", "isCorrect": false, "rationale": "'Evoked' (past tense of evoke) means called forth a feeling, which doesn't fit the context of how residents actively protested."}, {"text": "Invoked", "isCorrect": false, "rationale": "'Invoked' (past tense of invoke) means called upon, which is not applicable to describing the manner of protest."}]}, {"question": "After years of exploring various interests, John realized his true ______ was teaching, feeling a strong sense of purpose and fulfillment in educating others.", "options": [{"text": "Provocation", "isCorrect": false, "rationale": "'Provocation' is the act of provoking a reaction, which doesn't fit the context of a life's purpose or calling."}, {"text": "Vocation", "isCorrect": true, "rationale": "'Vocation' means 'a person's calling or profession,' which aligns with John finding his purpose and fulfillment in teaching after years of exploration."}, {"text": "Revocation", "isCorrect": false, "rationale": "'Revocation' is the act of taking back or withdrawing, which is unrelated to finding a career path."}, {"text": "Invocation", "isCorrect": false, "rationale": "'Invocation' is the act of calling upon, which is not relevant to finding one's profession."}]}, {"question": "When faced with a complex legal challenge, the defense attorney decided to ______ a specific clause in an obscure constitutional amendment to support his client's case.", "options": [{"text": "Evoke", "isCorrect": false, "rationale": "'Evoke' means to call forth a feeling or image, not to cite a legal authority or rule."}, {"text": "Provoke", "isCorrect": false, "rationale": "'Provoke' means to call forth a reaction, often anger, which is not the attorney's direct action with the clause itself."}, {"text": "Invoke", "isCorrect": true, "rationale": "'Invoke' means 'to call upon for help or as an authority,' which precisely describes an attorney citing or appealing to a legal clause to support a case."}, {"text": "Revoke", "isCorrect": false, "rationale": "'Revoke' means to take back or withdraw, which is the opposite of using a clause for support."}]}, {"question": "Due to repeated violations of company policy, the board decided to ______ the employee's access privileges to sensitive data.", "options": [{"text": "Invoke", "isCorrect": false, "rationale": "'Invoke' means to call upon, which is not applicable to taking away privileges."}, {"text": "Evoke", "isCorrect": false, "rationale": "'Evoke' means to call forth a feeling, which is irrelevant in this context of disciplinary action."}, {"text": "Provoke", "isCorrect": false, "rationale": "'Provoke' means to call forth a reaction, not to remove access rights."}, {"text": "Revoke", "isCorrect": true, "rationale": "'Revoke' means 'to take back or withdraw a right or decision,' which accurately describes the action of removing an employee's access privileges due to violations."}]}, {"question": "Consider the words 'evoke,' 'provoke,' and 'revoke.' How do the prefixes 'e-', 'pro-', and 're-' primarily modify the meaning of the root 'vok' ('to call')?", "options": [{"text": "They all signify a type of positive action or agreement.", "isCorrect": false, "rationale": "The prefix 're-' (back) in 'revoke' implies taking away or reversing, which is not always positive. 'Pro-' can lead to negative reactions."}, {"text": "They indicate different directions or outcomes of 'calling': 'out,' 'forth,' and 'back,' respectively.", "isCorrect": true, "rationale": "The prefixes align with their Latin origins: 'e-' (out of/from), 'pro-' (forth/forward), and 're-' (back/again), directly affecting the 'calling' action to give meanings like calling 'out' a feeling, calling 'forth' a reaction, or calling 'back' a decision."}, {"text": "They transform the root into different parts of speech, from verb to noun or adjective.", "isCorrect": false, "rationale": "In these examples ('evoke,' 'provoke,' 'revoke'), the words primarily remain verbs; the prefixes primarily change the meaning of the action, not the part of speech."}, {"text": "They intensify the action of calling, making it more forceful each time.", "isCorrect": false, "rationale": "The prefixes change the direction or nature of the 'calling,' not necessarily its intensity. 'Revoke' implies taking back, which is not an intensification of calling."}]}, {"question": "A political commentator was known for her ______ speeches that often ______ strong reactions from her opponents, but she refused to ______ her controversial statements.", "options": [{"text": "vocal, invoke, evoke", "isCorrect": false, "rationale": "'Invoke' (to call upon) does not fit the context of causing 'strong reactions'; 'evoke' (to call forth a feeling) does not fit 'refused to X statements' (take back)."}, {"text": "vociferous, provoke, revoke", "isCorrect": true, "rationale": "'Vociferous' describes loud and forceful speeches; these speeches would 'provoke' (call forth) strong reactions; and she refused to 'revoke' (take back or withdraw) her controversial statements, indicating unwavering stance."}, {"text": "advocate, evoke, invoke", "isCorrect": false, "rationale": "'Advocate' (one who speaks in support or to support) does not describe the nature of the speeches in this context; 'evoke' does not fit 'strong reactions'."}, {"text": "vocation, provoke, vocal", "isCorrect": false, "rationale": "'Vocation' refers to a profession, not a type of speech; 'vocal' (relating to voice) does not fit 'refused to X statements' as 'revoke' would."}]}, {"question": "While both relate to voice, what is the key distinction between 'vocal' and 'vociferous'?", "options": [{"text": "'Vocal' refers to a profession, while 'vociferous' refers to a legal appeal.", "isCorrect": false, "rationale": "'Vocal' relates to the voice, not a profession (which is 'vocation'). Neither word specifically refers to a legal appeal."}, {"text": "'Vocal' means relating to the voice, whereas 'vociferous' specifically implies being loud, forceful, and clamorous in expressing feelings.", "isCorrect": true, "rationale": "This accurately differentiates 'vocal' as a general descriptor related to the voice from 'vociferous' which carries the specific nuance of expressing feelings with great volume and force."}, {"text": "'Vocal' is always positive, and 'vociferous' is always negative.", "isCorrect": false, "rationale": "The connotation can vary; 'vociferous' can describe passionate, forceful support, not just negative expressions. 'Vocal' can also describe disagreement."}, {"text": "'Vocal' is a verb, and 'vociferous' is an adjective.", "isCorrect": false, "rationale": "Both 'vocal' and 'vociferous' are adjectives, describing qualities or characteristics, as implied by their definitions and common usage."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
