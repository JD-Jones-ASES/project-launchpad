<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words from the Ancients: Latin &amp; Greek Roots &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 7, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What story does Chapter 7 tell?", "options": [{"text": "Latin replaced Greek.", "isCorrect": false, "rationale": "Both contributed to English."}, {"text": "Latin and Greek each developed 'knowing' words that both entered English.", "isCorrect": true, "rationale": "A 'double inheritance of knowledge vocabulary.'"}, {"text": "English invented its own word.", "isCorrect": false, "rationale": "English inherited from both."}, {"text": "Greek destroyed Latin vocabulary.", "isCorrect": false, "rationale": "Both contributed."}]}, {"question": "What does 'cognoscere' mean and how is it formed?", "options": [{"text": "'To feel deeply,' from co- + sentire.", "isCorrect": false, "rationale": "Sentire = feeling. Cognoscere = co- + gnoscere."}, {"text": "'To get to know,' from co- (together) + gnoscere (to know).", "isCorrect": true, "rationale": "Stated directly."}, {"text": "'To speak publicly.'", "isCorrect": false, "rationale": "Different root."}, {"text": "'To write clearly.'", "isCorrect": false, "rationale": "Different root."}]}, {"question": "What does 'recognize' literally mean?", "options": [{"text": "To see again", "isCorrect": false, "rationale": "Uses 'vis/vid.'"}, {"text": "To know again", "isCorrect": true, "rationale": "re- + cognoscere."}, {"text": "To hear once more", "isCorrect": false, "rationale": "Uses 'aud.'"}, {"text": "To feel differently", "isCorrect": false, "rationale": "Uses 'sens/sent.'"}]}, {"question": "What does 'incognito' mean?", "options": [{"text": "Invisible", "isCorrect": false, "rationale": "Relates to knowing, not seeing."}, {"text": "Unknown -- identity hidden", "isCorrect": true, "rationale": "in- + cognitus = unknown."}, {"text": "Silent", "isCorrect": false, "rationale": "About identity, not sound."}, {"text": "Alone", "isCorrect": false, "rationale": "About identity, not solitude."}]}, {"question": "What does 'diagnosis' literally mean?", "options": [{"text": "Knowing before", "isCorrect": false, "rationale": "That is prognosis."}, {"text": "Knowing through (examining symptoms)", "isCorrect": true, "rationale": "dia- + gnosis."}, {"text": "Knowing again", "isCorrect": false, "rationale": "That is recognize."}, {"text": "Not knowing", "isCorrect": false, "rationale": "About thorough knowledge."}]}, {"question": "How do prognosis and diagnosis differ?", "options": [{"text": "pro- (before/ahead) vs. dia- (through)", "isCorrect": true, "rationale": "Prognosis predicts; diagnosis identifies."}, {"text": "Same prefix, different roots", "isCorrect": false, "rationale": "Share root, differ in prefix."}, {"text": "pre- (after) vs. dis- (apart)", "isCorrect": false, "rationale": "Wrong prefixes."}, {"text": "post- (after) vs. anti- (against)", "isCorrect": false, "rationale": "Wrong prefixes."}]}, {"question": "Where do Latin vs. Greek words appear?", "options": [{"text": "Latin in music; Greek in art", "isCorrect": false, "rationale": "Latin for everyday/law; Greek for science/medicine."}, {"text": "Latin in everyday thinking/law; Greek in science/medicine", "isCorrect": true, "rationale": "Stated explicitly."}, {"text": "Both equally in all fields", "isCorrect": false, "rationale": "The text distinguishes domains."}, {"text": "Latin in cooking; Greek in sports", "isCorrect": false, "rationale": "Incorrect."}]}, {"question": "'Incognito' entered English through which language?", "options": [{"text": "French", "isCorrect": false, "rationale": "From Italian."}, {"text": "Italian", "isCorrect": true, "rationale": "Stated in the etymology note."}, {"text": "Spanish", "isCorrect": false, "rationale": "Italian."}, {"text": "German", "isCorrect": false, "rationale": "Italian."}]}, {"question": "What is significant about 'incognito'?", "options": [{"text": "Oldest English word from Latin", "isCorrect": false, "rationale": "Preserves 'cognit' intact."}, {"text": "Preserves the full root 'cognit' intact", "isCorrect": true, "rationale": "Stated in the etymology note."}, {"text": "Only English word from Greek", "isCorrect": false, "rationale": "Comes through Italian from Latin."}, {"text": "Completely changed meaning", "isCorrect": false, "rationale": "Retained its meaning."}]}, {"question": "What broader lesson does Chapter 7 introduce?", "options": [{"text": "English words come only from Latin.", "isCorrect": false, "rationale": "From both Latin and Greek."}, {"text": "Latin and Greek roots work side by side in English.", "isCorrect": true, "rationale": "'First real taste of how Latin and Greek roots work side by side.'"}, {"text": "Greek roots have been replaced.", "isCorrect": false, "rationale": "Greek roots remain active."}, {"text": "English vocabulary is shrinking.", "isCorrect": false, "rationale": "Discusses growth through double inheritance."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
