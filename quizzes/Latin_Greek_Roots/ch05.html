<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words from the Ancients: Latin &amp; Greek Roots &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the Latin root 'vis/vid' mean?", "options": [{"text": "to know", "isCorrect": false, "rationale": "Knowing is covered by the root 'cogn/gnosc' (Ch. 7), not 'vis/vid.'"}, {"text": "to feel", "isCorrect": false, "rationale": "Feeling is covered by the root 'sens/sent' (Ch. 6), not 'vis/vid.'"}, {"text": "to see", "isCorrect": true, "rationale": "The root 'vis/vid' comes from Latin 'videre' (to see) and its past participle 'visus.'"}, {"text": "to carry", "isCorrect": false, "rationale": "Carrying is covered by the Latin root 'ferre,' not 'vis/vid.'"}]}, {"question": "The word 'video' comes directly from Latin. In Latin, 'video' means:", "options": [{"text": "I see", "isCorrect": true, "rationale": "'Video' is the first-person singular present tense of Latin 'videre' — it literally means 'I see.' The technology was named for the act of seeing recorded images."}, {"text": "I hear", "isCorrect": false, "rationale": "'I hear' would come from Latin 'audio' (from the root 'aud'). 'Video' comes from 'videre' (to see)."}, {"text": "moving images", "isCorrect": false, "rationale": "While video technology shows moving images, the word's literal Latin meaning is simply 'I see,' not a description of the technology."}, {"text": "a recorded performance", "isCorrect": false, "rationale": "A recorded performance describes what a video contains, but the word literally means 'I see' in Latin."}]}, {"question": "If something is 'visible,' what does that mean?", "options": [{"text": "It can be felt", "isCorrect": false, "rationale": "Feeling relates to the root 'sens/sent.' 'Visible' is about seeing, from the root 'vis.'"}, {"text": "It can be heard clearly", "isCorrect": false, "rationale": "Hearing relates to the root 'aud.' 'Visible' means able to be seen, not heard."}, {"text": "It can be seen", "isCorrect": true, "rationale": "'Visible' comes from 'vis' (see) + '-ible' (able to be), meaning able to be seen."}, {"text": "It can be understood", "isCorrect": false, "rationale": "Understanding relates more to the root 'cogn' (to know). 'Visible' specifically means able to be seen with the eyes."}]}, {"question": "What does 'evidence' literally mean when broken into its Latin parts?", "options": [{"text": "Something written as proof (from 'scrib' root)", "isCorrect": false, "rationale": "Evidence uses the root 'vid' (see), not 'scrib' (write). Evidence is what stands out to be seen, not what is written."}, {"text": "The state of being clearly seen; something that stands out plainly", "isCorrect": true, "rationale": "'Evidence' = 'e-' (out) + 'vid' (see) + '-entia' (state of): the state of being 'seen clearly,' of standing out so plainly that no one can deny it."}, {"text": "A spoken declaration heard by all (from 'aud' root)", "isCorrect": false, "rationale": "Evidence uses 'vid' (see), not 'aud' (hear). Evidence is about visual proof, not spoken declarations."}, {"text": "A statement said before the trial (from 'dict' root)", "isCorrect": false, "rationale": "Evidence uses 'vid' (see), not 'dict' (say). A pre-trial statement would be closer to 'predict.'"}]}, {"question": "A 'supervisor' does which of the following?", "options": [{"text": "Writes the official rules for workers to follow", "isCorrect": false, "rationale": "Writing rules relates to 'scrib/script,' not 'vis.' A supervisor's role comes from the 'seeing over' meaning of the root."}, {"text": "Speaks on behalf of workers in meetings", "isCorrect": false, "rationale": "Speaking on behalf of others is advocacy, which relates to the 'voc' root. A supervisor 'sees over' rather than advocates for."}, {"text": "Watches over and directs the work of others from above", "isCorrect": true, "rationale": "'Supervise' = 'super-' (over, above) + 'vis' (see): to see over the work of others and direct it. A supervisor watches from above to ensure things go well."}, {"text": "Listens to worker complaints and mediates disputes", "isCorrect": false, "rationale": "Listening is the domain of 'aud,' not 'vis.' A supervisor's role is to watch over and direct, not primarily to listen."}]}, {"question": "When a student 'revises' her essay, she is literally:", "options": [{"text": "Rewriting the entire essay from scratch", "isCorrect": false, "rationale": "Rewriting from scratch is not what 'revise' literally means. The prefix 're-' means again, and 'vis' means see — she is looking at it again, not necessarily starting over."}, {"text": "Seeing her work again in order to correct or improve it", "isCorrect": true, "rationale": "'Revise' = 're-' (again) + 'vis' (see): to look at one's work a second time to find and fix problems. The root describes the act of reviewing, not rewriting."}, {"text": "Asking her teacher to read the essay aloud", "isCorrect": false, "rationale": "Reading aloud involves 'aud' (hearing) or 'lect' (reading aloud), not 'vis.' Revising is about the writer looking at her own work again."}, {"text": "Choosing the best words from a list of options", "isCorrect": false, "rationale": "Choosing relates to the root 'lect/leg' (Ch. 8), not 'vis.' Revising is about re-seeing and improving, not selecting from options."}]}, {"question": "Which word uses 'vid' to convey the idea of 'seeing ahead' or preparing for the future?", "options": [{"text": "revise", "isCorrect": false, "rationale": "'Revise' uses 're-' (again) + 'vis' — seeing again, not ahead. Seeing ahead uses the prefix 'pro-.'"}, {"text": "evident", "isCorrect": false, "rationale": "'Evident' uses 'e-' (out) + 'vid' — something that stands out to be seen. It does not imply foresight or preparation."}, {"text": "provide", "isCorrect": true, "rationale": "'Provide' = 'pro-' (ahead, before) + 'vid' (see): to see ahead and prepare for future needs. When you provide for someone, you foresee what they will need."}, {"text": "video", "isCorrect": false, "rationale": "'Video' simply means 'I see' in Latin. It does not carry the idea of seeing ahead or preparation."}]}, {"question": "The 'vis/vid' root shows that for Romans, seeing was connected to understanding. Which word from this chapter best demonstrates this connection between sight and knowledge?", "options": [{"text": "visual", "isCorrect": false, "rationale": "'Visual' simply means relating to sight. It does not carry the deeper idea of seeing as understanding."}, {"text": "visible", "isCorrect": false, "rationale": "'Visible' means able to be seen — it describes a physical quality, not the connection between seeing and knowing."}, {"text": "evident", "isCorrect": true, "rationale": "'Evident' = 'e-' (out) + 'vid' (see): something so clearly seen that it is immediately understood. The Romans used this word in courts to describe proof so visible that understanding was instant."}, {"text": "video", "isCorrect": false, "rationale": "'Video' was adopted in the 20th century for a modern technology. 'Evident' better captures the Roman philosophical idea of seeing as knowing."}]}, {"question": "What does the suffix '-ual' mean in the word 'visual'?", "options": [{"text": "Able to be", "isCorrect": false, "rationale": "'Able to be' is the meaning of the suffix '-ible.' '-ual' means 'relating to.'"}, {"text": "The act of", "isCorrect": false, "rationale": "'The act of' is the meaning of the suffix '-ion.' '-ual' means 'relating to.'"}, {"text": "Relating to", "isCorrect": true, "rationale": "The suffix '-ual' means 'relating to.' So 'visual' means 'relating to sight or seeing.'"}, {"text": "One who", "isCorrect": false, "rationale": "'One who' is the meaning of the suffix '-or' or '-er.' '-ual' means 'relating to.'"}]}, {"question": "Chapter 5 notes that the roots voc, dict, aud, scrib, and vis together cover 'the major ways humans take in and share information.' Which root covers the information INPUT side (receiving information) rather than the output side (sharing it)?", "options": [{"text": "voc — using the voice to call", "isCorrect": false, "rationale": "'voc' is an output root — it is about producing sound and calling out. It is used to share, not receive, information."}, {"text": "dict — saying and declaring", "isCorrect": false, "rationale": "'dict' is an output root — it is about speaking and declaring. It is used to share, not receive, information."}, {"text": "aud and vis — hearing and seeing are both input/receiving roots", "isCorrect": true, "rationale": "Correct — 'aud' (to hear) and 'vis' (to see) are both RECEIVING roots. You use them to take in information from the world, not to produce it. They contrast with 'voc,' 'dict,' and 'scrib' which are all about sending or creating information."}, {"text": "scrib — writing something down", "isCorrect": false, "rationale": "'scrib' is an output root — it is about creating written text. Writing is producing information, not receiving it."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
