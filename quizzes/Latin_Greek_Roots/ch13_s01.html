</div>

<script>
var QUESTIONS = [{"question": "What is the central sentiment expressed in the epigraph's English translation?", "options": [{"text": "A lament for a lost hero.", "isCorrect": false, "rationale": "The phrase 'O blessed land' implies a positive and celebratory sentiment, not one of lament or sorrow."}, {"text": "A celebration of a homeland for producing a notable person.", "isCorrect": true, "rationale": "The phrase 'O blessed land, which gave birth to this man!' directly expresses admiration and praise for the land specifically because of the significant individual it produced."}, {"text": "An accusation against a treacherous individual.", "isCorrect": false, "rationale": "The language used is one of praise and blessing, entirely contrary to an accusation."}, {"text": "A warning about future dangers to the land.", "isCorrect": false, "rationale": "There is no warning implied; the focus is on a past, positive event ('gave birth')."}]}, {"question": "In a textbook, what is the most likely purpose of including an epigraph like this one at the beginning of a chapter section?", "options": [{"text": "To provide a definitive summary of the entire chapter's content.", "isCorrect": false, "rationale": "Epigraphs are typically short, evocative quotes meant to hint at themes or set a mood, rather than providing a comprehensive summary of a chapter."}, {"text": "To offer a historical footnote for scholars of Latin.", "isCorrect": false, "rationale": "While it is a Latin quote, its primary pedagogical purpose in a textbook is usually thematic or contextual, not merely an academic citation for Latin scholars."}, {"text": "To set the tone or introduce a central theme for the upcoming section.", "isCorrect": true, "rationale": "Epigraphs are commonly used to establish the mood, provide a thematic hint, or offer a conceptual framework for the reader before they engage with the main text of the section."}, {"text": "To test the reader's knowledge of classical Latin phrases.", "isCorrect": false, "rationale": "The purpose of an epigraph is to introduce content, not to function as a quiz or test of prior knowledge."}]}, {"question": "The phrase 'O blessed land...' uses which of the following literary devices most prominently?", "options": [{"text": "Metaphor", "isCorrect": false, "rationale": "A metaphor makes a direct comparison between two unlike things without using 'like' or 'as,' which is not the primary device employed here."}, {"text": "Simile", "isCorrect": false, "rationale": "A simile makes a comparison using 'like' or 'as,' which is not present in this phrase."}, {"text": "Apostrophe", "isCorrect": true, "rationale": "Apostrophe is a figure of speech where the speaker directly addresses someone or something that is not present or cannot respond, such as an inanimate object ('land') or an abstract idea. This is precisely what occurs here."}, {"text": "Hyperbole", "isCorrect": false, "rationale": "While praising the land as 'blessed' could be seen as an exaggeration (hyperbole), the direct address to the land is a more specific and prominent literary device in this particular phrase."}]}, {"question": "Who is credited as the author of the original Latin quote?", "options": [{"text": "Catilinam", "isCorrect": false, "rationale": "'In Catilinam' refers to the title of the work or the subject of the speeches, not the author of the quote."}, {"text": "Terr", "isCorrect": false, "rationale": "'Terr' is likely a formatting element or abbreviation within the textbook, not the author of the historical quote."}, {"text": "Cicero", "isCorrect": true, "rationale": "The attribution '— Cicero, In Catilinam, IV.11' clearly identifies Cicero as the author of the original Latin quote."}, {"text": "The textbook editor", "isCorrect": false, "rationale": "The quote is explicitly attributed to a classical author, Cicero, not the modern textbook editor."}]}, {"question": "The epigraph states, 'O blessed land, which gave birth to this man!' What does this line primarily suggest about 'this man' from the perspective of the speaker?", "options": [{"text": "He was a controversial figure who caused much debate.", "isCorrect": false, "rationale": "The phrase 'blessed land' implies a highly positive impact or characteristic associated with the man, not controversy or debate."}, {"text": "He was a person of significant positive impact or virtue.", "isCorrect": true, "rationale": "The land is described as 'blessed' specifically because it produced 'this man,' strongly implying that he was an individual of great positive worth, distinction, or benefit to his homeland."}, {"text": "He was an ordinary citizen who represented the common people.", "isCorrect": false, "rationale": "The exceptional praise bestowed upon the land for giving birth to him suggests he was an extraordinary, not ordinary, individual."}, {"text": "He was an exiled leader who returned to his homeland.", "isCorrect": false, "rationale": "The quote focuses on the event of his birth ('gave birth'), not his exile or return."}]}, {"question": "Given that the quote is from Cicero's 'In Catilinam,' what can be inferred about the likely context of the original speech?", "options": [{"text": "It was a celebratory address at a public festival.", "isCorrect": false, "rationale": "The title 'In Catilinam' literally means 'Against Catiline,' indicating a confrontational rather than purely celebratory context."}, {"text": "It was a eulogy for a deceased Roman hero.", "isCorrect": false, "rationale": "While Cicero delivered eulogies, the title suggests a series of speeches aimed at an opponent, not a commemorative speech for a hero."}, {"text": "It was part of a series of orations addressing a political crisis or threat.", "isCorrect": true, "rationale": "Cicero's 'In Catilinam' orations are famously known as speeches delivered in the Roman Senate to expose and condemn Catiline's conspiracy against the Roman Republic, indicating a context of severe political threat and crisis."}, {"text": "It was a philosophical treatise on the nature of society.", "isCorrect": false, "rationale": "'In Catilinam' denotes direct political action and confrontation, not a general philosophical discussion."}]}, {"question": "The epigraph calls the land 'blessed' because it 'gave birth to this man.' This suggests that the land's blessing is intrinsically linked to:", "options": [{"text": "Its geographical features and natural resources.", "isCorrect": false, "rationale": "The quote explicitly ties the blessing to 'this man,' not to the land's physical characteristics or natural endowments."}, {"text": "Its cultural achievements in art and literature.", "isCorrect": false, "rationale": "While Rome had cultural achievements, the specific phrasing links the blessing directly to the birth of an individual, not to broader cultural output."}, {"text": "The exceptional individual it produced.", "isCorrect": true, "rationale": "The phrase directly states that the land is blessed 'which gave birth to this man,' making the exceptional individual its primary source of blessing."}, {"text": "Its political system and democratic ideals.", "isCorrect": false, "rationale": "The focus is on the individual's birth and significance, rather than the specific political structure, although the individual might have served the state."}]}, {"question": "What is the predominant tone conveyed by the epigraph, particularly through the exclamation 'O blessed land...'?", "options": [{"text": "Sarcasm and derision.", "isCorrect": false, "rationale": "The use of 'blessed' and an exclamation mark conveys sincere positive emotion and admiration, entirely contrary to sarcasm."}, {"text": "Indifference and detachment.", "isCorrect": false, "rationale": "The strong interjection 'O' and the emotionally charged word 'blessed' indicate deep feeling and engagement, not indifference."}, {"text": "Admiration and reverence.", "isCorrect": true, "rationale": "The phrase 'O blessed land' combined with the reason 'which gave birth to this man!' conveys a strong sense of respect, honor, and deep appreciation, suggesting admiration and reverence."}, {"text": "Fear and apprehension.", "isCorrect": false, "rationale": "The language used is celebratory and positive, bearing no indication of fear or apprehension."}]}, {"question": "If this epigraph precedes a section in a history textbook, which of the following themes would it most likely introduce?", "options": [{"text": "The decline of an ancient civilization due to internal conflict.", "isCorrect": false, "rationale": "The quote is celebratory of an individual's positive impact, not indicative of societal decline."}, {"text": "The biography or impact of a significant historical figure.", "isCorrect": true, "rationale": "By praising the land for giving birth to 'this man,' the epigraph strongly suggests that the upcoming section will focus on an individual of great importance, possibly their life, achievements, or influence."}, {"text": "A detailed analysis of ancient Roman agricultural practices.", "isCorrect": false, "rationale": "The quote has no direct or implied connection to agricultural themes."}, {"text": "The geopolitical strategies of a rising empire.", "isCorrect": false, "rationale": "While Cicero lived during a period of Roman expansion, the quote's specific focus is on an individual's birth and significance, not broad geopolitical strategy."}]}, {"question": "The Latin word 'beatam' in 'O terram illam beatam' is translated as 'blessed.' Which of the following best captures the full implication of 'beatam' in this context?", "options": [{"text": "Merely fortunate by chance.", "isCorrect": false, "rationale": "While 'beatam' can mean fortunate, it often carries a stronger sense of being deeply or divinely favored, beyond simple random luck."}, {"text": "Divinely favored or singularly fortunate due to an exceptional occurrence.", "isCorrect": true, "rationale": "'Beatus' in Latin conveys a profound state of happiness, blessing, or good fortune, often implying divine favor or a unique and significant advantage, fitting for a land that produced an outstanding individual."}, {"text": "Physically beautiful or aesthetically pleasing.", "isCorrect": false, "rationale": "While a land can be beautiful, 'beatam' refers to its state of fortune or blessing, not primarily its physical appearance."}, {"text": "Economically prosperous and wealthy.", "isCorrect": false, "rationale": "While prosperity can be a form of blessing, the quote specifically links the blessing to 'this man,' not directly to economic wealth."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
