<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words from the Ancients: Latin &amp; Greek Roots &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 9, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following words accurately describes an item that is 'able to be carried or moved easily'?", "options": [{"text": "Export", "isCorrect": false, "rationale": "Export means 'to carry out' or to send goods to another country, not describing an item's ease of movement."}, {"text": "Portable", "isCorrect": true, "rationale": "Portable directly combines 'port' (carry) with '-able' (able to be), meaning 'able to be carried' as defined in the section."}, {"text": "Deport", "isCorrect": false, "rationale": "Deport means 'to carry away' or to expel someone from a country, which is an action, not a description of an item's mobility."}, {"text": "Report", "isCorrect": false, "rationale": "Report means 'to carry back' information or give an account, unrelated to the physical ease of moving an object."}]}, {"question": "A country decides to send a large quantity of its locally grown coffee beans to other nations for sale. This economic activity is best described by which word from the 'port' family?", "options": [{"text": "Import", "isCorrect": false, "rationale": "Import means 'to carry in' or to bring goods into a country from abroad, which is the opposite action."}, {"text": "Transport", "isCorrect": false, "rationale": "Transport means 'to carry across' or move from one place to another, which is a broader term for movement, but not specific to international trade out of a country."}, {"text": "Export", "isCorrect": true, "rationale": "Export means 'to carry out' or to send goods to another country for sale, which accurately describes the action of sending coffee beans out of the country."}, {"text": "Report", "isCorrect": false, "rationale": "Report means 'to carry back' information or give an account, which is unrelated to selling goods internationally."}]}, {"question": "Considering the root 'port' means 'to carry' and the prefix 'de-' implies 'away,' which scenario most accurately reflects the meaning of 'deport'?", "options": [{"text": "A traveler carrying their luggage from one terminal to another within the same airport.", "isCorrect": false, "rationale": "This describes carrying within a location, not expelling someone 'away' from a country."}, {"text": "A ship carrying goods from a foreign land into its home port.", "isCorrect": false, "rationale": "This describes 'importing' or 'transporting,' not expelling someone from a country."}, {"text": "A government officially expelling a non-citizen from the country.", "isCorrect": true, "rationale": "Deport means 'to carry away' someone, specifically to expel an individual from a country, aligning with the idea of being carried 'away' from national borders."}, {"text": "A journalist carrying information back from a news scene.", "isCorrect": false, "rationale": "This describes 'reporting' or carrying information 'back,' not expelling an individual."}]}, {"question": "An artist compiling a collection of their best paintings and sketches to showcase their work to a gallery owner is creating what?", "options": [{"text": "A portal", "isCorrect": false, "rationale": "A portal is a doorway or entry point, not a collection of work."}, {"text": "A report", "isCorrect": false, "rationale": "A report is an account of something or carried back information, not a curated collection of creative works."}, {"text": "A portfolio", "isCorrect": true, "rationale": "A portfolio is defined as 'a case for carrying documents' or 'a collection of work,' which perfectly describes the artist's action."}, {"text": "An export", "isCorrect": false, "rationale": "An export refers to goods sent out of a country for sale, unrelated to an artist's collection."}]}, {"question": "If you need to move a large shipment of industrial machinery from a manufacturing plant in the Midwest to a client's factory on the East Coast within the same country, which activity are you primarily engaged in?", "options": [{"text": "Importing", "isCorrect": false, "rationale": "Importing involves bringing goods into a country from abroad, not moving them domestically within the same country."}, {"text": "Transporting", "isCorrect": true, "rationale": "Transport means 'to carry across' or 'to carry or move from one place to another,' which accurately describes moving goods within a country."}, {"text": "Deporting", "isCorrect": false, "rationale": "Deporting involves expelling someone from a country, unrelated to moving machinery."}, {"text": "Reporting", "isCorrect": false, "rationale": "Reporting involves giving an account of something or carrying back information, not physically moving objects."}]}, {"question": "The word 'portal' means a doorway or gate. How does this meaning connect to the root 'port,' meaning 'to carry'?", "options": [{"text": "A portal is a device specifically designed to physically carry heavy objects.", "isCorrect": false, "rationale": "While related to movement, a portal itself is not a carrying device but a point of passage."}, {"text": "A portal refers to the act of carrying information back and forth between two places.", "isCorrect": false, "rationale": "This describes 'reporting,' not a physical doorway."}, {"text": "A portal serves as an entry point through which people, goods, or information are 'carried' or pass from one space to another.", "isCorrect": true, "rationale": "The connection is that a portal is a place or point where something (or someone) is 'carried through' or passes across a threshold."}, {"text": "A portal is a collection of carried documents or artistic works.", "isCorrect": false, "rationale": "This describes a 'portfolio,' not a doorway or gate."}]}, {"question": "A journalist is gathering facts and witness accounts from the scene of an accident and will later present this organized information to their editor. The journalist is engaged in what activity?", "options": [{"text": "Transporting", "isCorrect": false, "rationale": "Transporting involves physically moving objects or people, not collecting and presenting information."}, {"text": "Importing", "isCorrect": false, "rationale": "Importing involves bringing goods into a country, unrelated to gathering news."}, {"text": "Reporting", "isCorrect": true, "rationale": "Report means 'to carry back' information or to give an account of something, which accurately describes a journalist's role."}, {"text": "Exporting", "isCorrect": false, "rationale": "Exporting involves sending goods out of a country, unrelated to news gathering."}]}, {"question": "Which word from the 'port' family specifically describes the action of 'to carry in' goods or materials into a country from abroad?", "options": [{"text": "Export", "isCorrect": false, "rationale": "Export means 'to carry out' goods from a country, the opposite of carrying them in."}, {"text": "Transport", "isCorrect": false, "rationale": "Transport means 'to carry across' generally, but not specifically the act of bringing goods into a country from abroad for trade."}, {"text": "Import", "isCorrect": true, "rationale": "Import is defined as 'to carry in' or 'to bring goods into a country from abroad,' which precisely matches the description."}, {"text": "Deport", "isCorrect": false, "rationale": "Deport means 'to carry away' by expelling someone from a country, not bringing goods in."}]}, {"question": "A furniture company specializing in outdoor seating designs lightweight chairs that can be easily folded and moved for picnics and camping. They would most likely market these chairs by emphasizing their:", "options": [{"text": "deportability", "isCorrect": false, "rationale": "Deportability relates to being expelled from a country, which is irrelevant to furniture design."}, {"text": "reportability", "isCorrect": false, "rationale": "Reportability relates to being able to be reported or accounted for, not ease of movement."}, {"text": "portability", "isCorrect": true, "rationale": "Portable means 'able to be carried or moved easily,' which is the key feature the company would highlight for such chairs."}, {"text": "portal-like quality", "isCorrect": false, "rationale": "Portal-like refers to being similar to a doorway or gate, not descriptive of a chair's ease of movement."}]}, {"question": "The prefixes 'ex-', 'im-', 'trans-', and 'de-' in words like export, import, transport, and deport primarily modify the base meaning of 'port' by indicating what?", "options": [{"text": "The speed at which something is carried.", "isCorrect": false, "rationale": "These prefixes do not inherently convey speed; they relate to direction or state."}, {"text": "The type of object being carried.", "isCorrect": false, "rationale": "The prefixes describe the action, not the nature of the object itself."}, {"text": "The direction or manner of carrying.", "isCorrect": true, "rationale": "Each prefix (ex- 'out,' im- 'in,' trans- 'across,' de- 'away') specifically indicates the direction or manner in which the 'carrying' action occurs."}, {"text": "The weight or size of the item being carried.", "isCorrect": false, "rationale": "These prefixes do not convey information about weight or size."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
