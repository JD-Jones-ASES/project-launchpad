</div>

<script>
var QUESTIONS = [{"question": "What significant intellectual achievement is attributed to Eratosthenes in the third century BC, as described in the text?", "options": [{"text": "Inventing the alphabet.", "isCorrect": false, "rationale": "The text does not mention Eratosthenes inventing the alphabet; this is unrelated to his work in geography."}, {"text": "Calculating the circumference of the Earth.", "isCorrect": true, "rationale": "The text explicitly states that Eratosthenes 'calculated the circumference of the Earth using nothing more than shadows, angles, and the distance between two cities.'"}, {"text": "Discovering new continents.", "isCorrect": false, "rationale": "The text does not mention Eratosthenes discovering new continents; his work focused on measuring the known world."}, {"text": "Developing the first calendar system.", "isCorrect": false, "rationale": "The text does not attribute the development of the first calendar system to Eratosthenes; his work was in 'geographia.'"}]}, {"question": "Eratosthenes coined the term 'geographia.' Based on its root meanings provided in the text ('geo' and 'graph'), what does this term literally signify?", "options": [{"text": "Earth-ruler.", "isCorrect": false, "rationale": "The root 'graph' means 'to write' or 'to draw,' not 'ruler.'"}, {"text": "Earth-measuring.", "isCorrect": false, "rationale": "The term 'earth-measuring' literally translates to 'geometry,' which uses the root 'metron,' not 'graph.'"}, {"text": "Earth-writing.", "isCorrect": true, "rationale": "The text states 'geo' means 'earth' and 'graph' (from graphein) means 'to write' or 'to draw,' making 'earth-writing' the literal meaning."}, {"text": "Earth-discovery.", "isCorrect": false, "rationale": "The root 'graph' means 'to write' or 'to draw,' not 'discovery.'"}]}, {"question": "According to the text, what practical necessity led ancient Egyptian and Greek surveyors to develop early geometric techniques?", "options": [{"text": "To design complex architectural marvels like pyramids.", "isCorrect": false, "rationale": "While geometry was used in architecture, the text specifically attributes the *invention* of geometry to a different practical problem: 'surveyors who needed to re-draw property boundaries.'"}, {"text": "To navigate ships across vast oceans.", "isCorrect": false, "rationale": "The text does not mention navigation as the primary impetus for the development of early geometry by these groups."}, {"text": "To re-establish property boundaries after annual flooding.", "isCorrect": true, "rationale": "The text explicitly states that 'Geometry... was invented by Greek and Egyptian surveyors who needed to re-draw property boundaries after the annual flooding of the Nile washed away all their markers.'"}, {"text": "To calculate astronomical distances.", "isCorrect": false, "rationale": "While geometry is used in astronomy, the text highlights the terrestrial problem of land surveying as the initial driver for its development."}]}, {"question": "The Greek root 'graph' (from graphein) is presented with several examples. What is the fundamental meaning of this root as explained in the text?", "options": [{"text": "To speak or to tell.", "isCorrect": false, "rationale": "While related to communication, 'graph' specifically refers to visual or written forms, not spoken language."}, {"text": "To write or to draw.", "isCorrect": true, "rationale": "The text explicitly states that 'The root graph comes from graphein, meaning 'to write' or 'to draw.''"}, {"text": "To see or to observe.", "isCorrect": false, "rationale": "This describes 'photo' or 'scope,' not 'graph.'"}, {"text": "To measure or to count.", "isCorrect": false, "rationale": "This meaning is associated with the root 'metron,' used in 'geometry,' not 'graph.'"}]}, {"question": "Based on the etymology provided, what does the word 'photograph' literally mean?", "options": [{"text": "Picture drawn from far away.", "isCorrect": false, "rationale": "This definition relates more to 'telegram' ('far-writing') than 'photograph.'"}, {"text": "Light-writing.", "isCorrect": true, "rationale": "The text explains that 'A photograph is 'light-writing' (photos, light + graphein).'"}, {"text": "Self-image.", "isCorrect": false, "rationale": "This relates to 'autograph' ('self-writing'), not 'photograph.'"}, {"text": "Clear vision.", "isCorrect": false, "rationale": "While 'photo' relates to light, 'graph' means writing/drawing, not vision directly."}]}, {"question": "The 'rootconnection' section distinguishes between the Greek root 'geo' and the Latin root 'terr/terra.' How does the text characterize their respective domains in English vocabulary?", "options": [{"text": "'Geo' is for abstract concepts, 'terr' is for concrete objects.", "isCorrect": false, "rationale": "This distinction is too broad and not precisely what the text describes. The text specifies scientific vs. everyday usage."}, {"text": "'Geo' is used for scientific vocabulary, while 'terr' is used for everyday words related to land and landscape.", "isCorrect": true, "rationale": "The text states: 'Greek gave us the scientific vocabulary: geography, geology, geometry. When you see geo-, think science; when you see terr-, think land and landscape.'"}, {"text": "'Geo' relates to human activity, 'terr' relates to natural phenomena.", "isCorrect": false, "rationale": "The text's distinction is not about human activity versus natural phenomena, but rather scientific vs. everyday language use."}, {"text": "'Geo' describes static features, 'terr' describes dynamic processes.", "isCorrect": false, "rationale": "This distinction is not made in the provided text."}]}, {"question": "Considering the distinction made between 'geo' and 'terr,' which of the following words would most likely be derived from the root 'geo' according to the text's classification?", "options": [{"text": "Terrain.", "isCorrect": false, "rationale": "The text explicitly lists 'terrain' as an example of a word derived from the Latin 'terr,' meaning land and landscape."}, {"text": "Terracotta.", "isCorrect": false, "rationale": "'Terracotta' means 'baked earth' and comes from the Latin root 'terra,' fitting the 'land and landscape' category, not scientific 'geo.'"}, {"text": "Geophysics.", "isCorrect": true, "rationale": "The text states 'geo' gives us 'scientific vocabulary' like 'geography, geology, geometry.' 'Geophysics' (the physics of the Earth) aligns perfectly with this scientific classification."}, {"text": "Territory.", "isCorrect": false, "rationale": "The text explicitly lists 'territory' as an example of a word derived from the Latin 'terr,' meaning land and landscape."}]}, {"question": "According to the text, what is the modern definition of 'geography'?", "options": [{"text": "The study of ancient Greek civilizations.", "isCorrect": false, "rationale": "This is too narrow and not the definition given in the text for modern geography."}, {"text": "The measurement of Earth's geometric properties.", "isCorrect": false, "rationale": "This definition describes 'geometry,' not 'geography,' as explained in the text."}, {"text": "The study of the Earth's surface, its features, and the people who live on it.", "isCorrect": true, "rationale": "The text states: 'Today, geography still means the study of the Earth's surface, its features, and the people who live on it.'"}, {"text": "The art of drawing maps.", "isCorrect": false, "rationale": "While mapping is a part of geography, the provided definition is broader and more encompassing than just map drawing."}]}, {"question": "The 'etymnote' describes the evolution of geometry. How did Greek mathematicians like Euclid transform the initial practical geometric techniques developed by Egyptians and earlier Greeks?", "options": [{"text": "They applied geometry to sailing and navigation.", "isCorrect": false, "rationale": "The text does not mention this as Euclid's specific contribution to the *transformation* of geometry from practical measurements."}, {"text": "They converted practical measurements into an abstract system of proofs and theorems.", "isCorrect": true, "rationale": "The 'etymnote' states that 'Greek mathematicians like Euclid then transformed these practical measurements into the abstract system of proofs and theorems we study in school today.'"}, {"text": "They used geometry to predict the annual flooding of the Nile.", "isCorrect": false, "rationale": "Predicting floods was a contextual problem for early geometry, not Euclid's contribution to its theoretical transformation."}, {"text": "They simplified geometry for everyday use by common people.", "isCorrect": false, "rationale": "Euclid's work abstracted and formalized geometry, making it a more complex theoretical discipline, not simplifying it for everyday use."}]}, {"question": "If a new scientific field called 'geography-metrics' were proposed, combining the roots 'geo,' 'graph,' and 'metron' (from geometry, meaning 'measure'), which description best captures its likely focus, based on the text's root explanations?", "options": [{"text": "The study of ancient writings about Earth's history.", "isCorrect": false, "rationale": "While 'geo' and 'graph' are present, 'metron' (measure) is not sufficiently represented, and the focus on 'ancient writings' is too specific."}, {"text": "The measurement and mapping of Earth's features.", "isCorrect": true, "rationale": "'Geo' (earth) + 'graph' (writing/drawing/mapping) + 'metron' (measuring) directly combine to suggest the scientific measurement and mapping of Earth's features, aligning with the descriptions in the text."}, {"text": "The study of how Earth's writing systems evolved over time.", "isCorrect": false, "rationale": "This misinterprets 'graph' as writing *systems* and does not incorporate 'metron' (measure) effectively in a relevant way for Earth science."}, {"text": "The analysis of Earth's gravitational forces.", "isCorrect": false, "rationale": "The roots provided ('geo,' 'graph,' 'metron') do not directly relate to 'gravitational forces' as per the text's explanations."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
