        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 18, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A creature described as \"mortal\" fundamentally differs from one described as \"immortal\" in which of the following ways?", "options": [{"text": "Its ability to experience physical pain.", "isCorrect": false, "rationale": "The ability to experience pain is not directly linked to a creature's mortality status; both mortal and immortal beings could theoretically feel pain."}, {"text": "Its susceptibility to death.", "isCorrect": true, "rationale": "According to the definitions, 'mortal' means subject to death, while 'immortal' means not subject to death, making susceptibility to death the key distinguishing factor."}, {"text": "Its capacity for logical thought.", "isCorrect": false, "rationale": "Logical thought is a cognitive ability, unrelated to whether a being is subject to death or lives forever."}, {"text": "Its inherent moral compass.", "isCorrect": false, "rationale": "A moral compass refers to ethical principles, which are distinct from a creature's biological state of being subject to death or living forever."}]}, {"question": "Imagine a student delivering a presentation and accidentally tripping, scattering all their notes and speaking a nonsensical phrase. Which of the following words best describes how the student would likely feel?", "options": [{"text": "Moribund", "isCorrect": false, "rationale": "Moribund means 'at the point of death' or 'in terminal decline,' which does not describe the feeling of embarrassment or shame."}, {"text": "Immortal", "isCorrect": false, "rationale": "Immortal means 'living forever' or 'not subject to death,' which is unrelated to the student's immediate emotional state after an embarrassing incident."}, {"text": "Mortified", "isCorrect": true, "rationale": "Mortify means 'to cause great embarrassment or shame,' perfectly describing the student's likely feeling after such an incident."}, {"text": "Mortgaged", "isCorrect": false, "rationale": "Mortgage refers to a loan agreement secured by property, which has no connection to the student's emotional experience."}]}, {"question": "The historical meaning of \"mortgage\" as a \"death pledge\" suggests what about the nature of such a loan in the past?", "options": [{"text": "It was primarily used to fund funeral expenses.", "isCorrect": false, "rationale": "While 'mort' relates to death, the 'death pledge' aspect of mortgage refers to the nature of the pledge itself, not the purpose of the funds for funerals."}, {"text": "The agreement typically lasted until the borrower's death or until the debt was paid, whichever came first, effectively 'dying' when fulfilled or defaulted upon.", "isCorrect": true, "rationale": "The term 'death pledge' implies that the pledge (gage) itself 'dies' or is extinguished either when the debt is fully paid, or upon the borrower's failure, leading to forfeiture, often lasting for a very long period, potentially a lifetime."}, {"text": "Only those on their deathbed were eligible for such a loan.", "isCorrect": false, "rationale": "There is no historical evidence in the text to suggest that mortgages were exclusively for people on their deathbed; the 'death' refers to the pledge, not the borrower's imminence of death."}, {"text": "It guaranteed the borrower eternal life if they repaid the loan.", "isCorrect": false, "rationale": "This interpretation is fantastical and not supported by the etymology or historical context of financial agreements."}]}, {"question": "A company that is described as \"moribund\" is most likely experiencing what kind of situation?", "options": [{"text": "A sudden surge in market growth and innovation.", "isCorrect": false, "rationale": "This describes a flourishing company, the opposite of moribund."}, {"text": "A period of stable and consistent profitability.", "isCorrect": false, "rationale": "This describes a healthy company, not one in decline."}, {"text": "A state of rapid expansion into new markets.", "isCorrect": false, "rationale": "This indicates growth and vitality, contrary to the meaning of moribund."}, {"text": "A terminal decline, on the verge of collapse or extinction.", "isCorrect": true, "rationale": "Moribund means 'at the point of death; in terminal decline,' accurately describing a company facing imminent failure."}]}, {"question": "A medical examiner is called to investigate the cause of an unexpected death. Which procedure would they most certainly perform to gather crucial evidence?", "options": [{"text": "An immunization, to prevent further spread of illness.", "isCorrect": false, "rationale": "Immunizations are for living individuals to prevent disease, not for investigating the cause of death in deceased individuals."}, {"text": "A biopsy, to examine living tissue.", "isCorrect": false, "rationale": "While a biopsy involves tissue examination, it is typically performed on living patients. A procedure on a deceased body to determine the cause of death is specifically a post-mortem."}, {"text": "A post-mortem examination, to determine the cause and manner of death.", "isCorrect": true, "rationale": "A post-mortem examination is defined as 'an examination conducted after death,' precisely what a medical examiner does to investigate the cause of death."}, {"text": "A prenatal check-up, to assess fetal development.", "isCorrect": false, "rationale": "Prenatal check-ups are for pregnant individuals to monitor fetal health and are irrelevant to investigating an unexpected death."}]}, {"question": "In a hospital setting, where would the deceased bodies be respectfully prepared for burial or cremation and stored temporarily?", "options": [{"text": "The intensive care unit (ICU).", "isCorrect": false, "rationale": "The ICU is for critically ill living patients requiring intensive medical treatment."}, {"text": "The operating room (OR).", "isCorrect": false, "rationale": "The OR is a sterile environment for surgical procedures performed on living patients."}, {"text": "The mortuary.", "isCorrect": true, "rationale": "A mortuary is defined as 'a place where dead bodies are kept,' which includes temporary storage and preparation for final disposition."}, {"text": "The waiting room.", "isCorrect": false, "rationale": "A waiting room is for visitors and patients awaiting appointments, not for the deceased."}]}, {"question": "While all humans are considered \"mortal,\" a particular individual might be described as \"moribund.\" What is the key distinction between these two terms in this context?", "options": [{"text": "\"Mortal\" describes a temporary state of sickness, while \"moribund\" describes a permanent condition.", "isCorrect": false, "rationale": "'Mortal' describes a permanent characteristic of being subject to death, whereas 'moribund' describes a temporary (though terminal) state of being near death."}, {"text": "\"Mortal\" refers to being subject to death at some point, whereas \"moribund\" indicates being actively in the process of dying.", "isCorrect": true, "rationale": "'Mortal' is a general characteristic of all living beings that will eventually die, while 'moribund' specifies an immediate state of being 'at the point of death' or 'in terminal decline.'"}, {"text": "\"Mortal\" applies only to physical beings, while \"moribund\" can apply to abstract concepts.", "isCorrect": false, "rationale": "While 'moribund' can apply to abstract concepts (like an industry), 'mortal' primarily refers to beings subject to death, and the distinction here is more about the stage of death."}, {"text": "\"Moribund\" implies a sudden death, while \"mortal\" suggests a prolonged illness.", "isCorrect": false, "rationale": "'Moribund' implies a decline leading to death, which is usually not sudden, and 'mortal' simply means subject to death, without specifying the manner."}]}, {"question": "Considering the definitions of 'mortal,' 'immortal,' 'mortify,' 'mortgage,' 'moribund,' 'post-mortem,' and 'mortuary,' what central concept is consistently conveyed by the root 'mort' or 'mori' across all these words?", "options": [{"text": "Life and renewal.", "isCorrect": false, "rationale": "The root 'mort' is consistently associated with death, not life or renewal."}, {"text": "Creation and beginning.", "isCorrect": false, "rationale": "The root 'mort' signifies an end or cessation, the opposite of creation or beginning."}, {"text": "Endings, cessation, or a state related to death.", "isCorrect": true, "rationale": "All listed words derive from 'mort' or 'mori,' meaning 'death' or 'to die,' reflecting a core concept of endings, cessation, or states/places associated with death."}, {"text": "Growth and development.", "isCorrect": false, "rationale": "Growth and development are concepts of vitality and life, which contrast with the meaning of the 'mort' root."}]}, {"question": "A theater performance struggling with low ticket sales and poor critical reviews is likely to be described as ______, while an actor who forgets their lines on stage and blushes profusely would feel ______.", "options": [{"text": "mortified; moribund", "isCorrect": false, "rationale": "The terms are reversed. A performance in decline is 'moribund,' and an embarrassed actor feels 'mortified.'"}, {"text": "moribund; mortified", "isCorrect": true, "rationale": "The performance is 'moribund' (in terminal decline), and the actor would feel 'mortified' (greatly embarrassed or ashamed)."}, {"text": "immortal; mortal", "isCorrect": false, "rationale": "These terms relate to susceptibility to death or living forever, which is not applicable to the scenario described."}, {"text": "mortgaged; post-mortem", "isCorrect": false, "rationale": "These words relate to loans and examinations after death, which are irrelevant to the given context."}]}, {"question": "Based on its etymology and structure, which word from the text most accurately describes something that is *not* experiencing a decline towards death, but rather is beyond the reach of death entirely?", "options": [{"text": "Mortal", "isCorrect": false, "rationale": "Mortal means 'subject to death,' which is the opposite of being beyond its reach."}, {"text": "Mortify", "isCorrect": false, "rationale": "Mortify means 'to cause great embarrassment or shame,' unrelated to being beyond death."}, {"text": "Post-mortem", "isCorrect": false, "rationale": "Post-mortem means 'after death,' implying that death has already occurred, not that something is beyond its reach."}, {"text": "Immortal", "isCorrect": true, "rationale": "Immortal combines 'im-' (not) + 'mort' (death) + '-al' (relating to), directly meaning 'not subject to death; living forever,' thus beyond its reach."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
