    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the Latin root 'aud' mean?", "options": [{"text": "to see", "isCorrect": false, "rationale": "Seeing is the meaning of the root 'vis/vid,' not 'aud.'"}, {"text": "to speak", "isCorrect": false, "rationale": "Speaking relates to the roots 'voc' and 'dict,' not 'aud.'"}, {"text": "to hear, to listen", "isCorrect": true, "rationale": "The root 'aud' comes from Latin 'audire,' meaning 'to hear.'"}, {"text": "to write", "isCorrect": false, "rationale": "Writing is the meaning of the root 'scrib/script,' not 'aud.'"}]}, {"question": "What is an 'audience' in its most basic, etymological sense?", "options": [{"text": "A group of people who are looking at a performance", "isCorrect": false, "rationale": "Etymologically, an 'audience' is defined by hearing, not seeing. It comes from Latin 'audire' (to hear)."}, {"text": "A group of people who are listening", "isCorrect": true, "rationale": "'Audience' comes from Latin 'audire' (to hear) + '-ence' (state of). At its core, an audience is a group of people in the act of hearing."}, {"text": "A group of people gathered in one place", "isCorrect": false, "rationale": "While an audience does gather, the word's meaning is specifically about the act of hearing, not simply being present."}, {"text": "An official hearing before a judge", "isCorrect": false, "rationale": "An official hearing is more specifically covered by 'audition' or 'audit,' not 'audience.'"}]}, {"question": "If a speaker's voice is 'inaudible,' what does that mean?", "options": [{"text": "The voice is beautiful and musical", "isCorrect": false, "rationale": "Beauty of voice is not the meaning here. 'Inaudible' is about whether the voice can be heard, not its quality."}, {"text": "The voice cannot be heard", "isCorrect": true, "rationale": "'Inaudible' = 'in-' (not) + 'aud' (hear) + '-ible' (able to be). It means too quiet to be heard."}, {"text": "The voice is heard by everyone clearly", "isCorrect": false, "rationale": "Being heard clearly is the meaning of 'audible,' not 'inaudible.' The prefix 'in-' makes it the opposite."}, {"text": "The voice carries a strong accent", "isCorrect": false, "rationale": "Accent is not related to the root 'aud.' Inaudible means simply too quiet to hear."}]}, {"question": "An 'auditorium' is best described as:", "options": [{"text": "A large room designed so that listeners can hear well", "isCorrect": true, "rationale": "'Auditorium' comes from 'audit' (to hear) + '-orium' (place for), meaning a hall built specifically for an audience to hear performances or speeches."}, {"text": "An office where government accounts are reviewed", "isCorrect": false, "rationale": "Reviewing accounts is the work of an 'auditor,' not an 'auditorium.' The '-orium' suffix marks a place, not a role."}, {"text": "A musical instrument used in ancient Rome", "isCorrect": false, "rationale": "An auditorium is a building, not an instrument. The suffix '-orium' means a place for something."}, {"text": "A test of whether a student can read aloud", "isCorrect": false, "rationale": "A test of performance is an 'audition,' not an 'auditorium.' An auditorium is a physical space."}]}, {"question": "Why does the word 'audit' — a review of financial records — contain the root 'aud' (to hear)?", "options": [{"text": "Because auditors must listen carefully for the sound of errors in calculations", "isCorrect": false, "rationale": "This is a clever guess but not the historical reason. The connection is historical, not about listening for sounds of math mistakes."}, {"text": "Because in medieval times, financial accounts were read aloud to officials who listened for errors", "isCorrect": true, "rationale": "In the Middle Ages, financial records were read aloud to listening officials — the auditor literally 'heard' the accounts, which is why the word preserved the 'aud' root."}, {"text": "Because 'audit' entered English from a Greek word meaning to count", "isCorrect": false, "rationale": "'Audit' is not from Greek. It comes from Latin 'audire' (to hear), not from a Greek counting word."}, {"text": "Because auditors were required to announce their findings loudly in public", "isCorrect": false, "rationale": "The historical reason is that accounts were read aloud *to* the auditors, not that auditors announced findings. The listening came first."}]}, {"question": "Which word describes a trial performance where a musician shows her talent so judges can evaluate her?", "options": [{"text": "audit", "isCorrect": false, "rationale": "An audit is a review of financial records, not a performance evaluation. The '-tion' suffix in 'audition' marks the act of performing."}, {"text": "audience", "isCorrect": false, "rationale": "An audience is a group of listeners, not the trial performance itself. The performer gives an 'audition' before the audience."}, {"text": "audition", "isCorrect": true, "rationale": "'Audition' comes from 'audit' (to hear) + '-ion' (act of), meaning a trial hearing or performance where talent is demonstrated for evaluation."}, {"text": "audible", "isCorrect": false, "rationale": "'Audible' means able to be heard — it is an adjective describing sound, not a noun for a performance trial."}]}, {"question": "How does the root 'aud' complete the communication chain begun by 'voc' and 'dict'?", "options": [{"text": "'aud' adds the act of writing to the chain", "isCorrect": false, "rationale": "Writing is covered by the root 'scrib/script' (Ch. 4), not 'aud.'"}, {"text": "'aud' adds the act of hearing — someone listens to what was spoken", "isCorrect": true, "rationale": "'voc' provides the voice, 'dict' provides the words spoken, and 'aud' completes the circuit by representing the listener who hears those words."}, {"text": "'aud' adds the act of seeing what is written", "isCorrect": false, "rationale": "Seeing is covered by 'vis/vid' (Ch. 5), not 'aud.' The 'aud' root is specifically about hearing."}, {"text": "'aud' adds the act of understanding the meaning of words", "isCorrect": false, "rationale": "Understanding is more closely related to 'cogn' (Ch. 7). The 'aud' root is specifically about the physical act of hearing."}]}, {"question": "The suffix '-ible' in 'audible' means:", "options": [{"text": "relating to", "isCorrect": false, "rationale": "'-Relating to' is the meaning of the suffix '-al' or '-ary.' '-ible' means 'able to be.'"}, {"text": "the act of", "isCorrect": false, "rationale": "'-The act of' is the meaning of the suffix '-ion' or '-tion.' '-ible' means 'able to be.'"}, {"text": "one who", "isCorrect": false, "rationale": "'-One who' is the meaning of the suffix '-or' or '-er.' '-ible' means 'able to be.'"}, {"text": "able to be", "isCorrect": true, "rationale": "The suffix '-ible' means 'able to be.' So 'audible' means 'able to be heard,' and 'inaudible' means 'not able to be heard.'"}]}, {"question": "A Roman theater was designed with curved stone seats to ensure every person could hear the performance. Which word from this chapter best describes the purpose of this design?", "options": [{"text": "audience", "isCorrect": false, "rationale": "Audience refers to the group of listeners, not the design feature of the theater. The theater was designed to make sound 'audible.'"}, {"text": "audible", "isCorrect": true, "rationale": "The theater's design ensured the actor's voice was audible — able to be heard — even from the highest row of seats."}, {"text": "audit", "isCorrect": false, "rationale": "An audit is a financial review. While both come from 'aud,' 'audit' is not related to theater acoustics."}, {"text": "audition", "isCorrect": false, "rationale": "An audition is a trial performance, not a description of sound reaching the audience. 'Audible' best describes the acoustic goal."}]}, {"question": "Which statement best explains why the quote at the start of the chapter — 'Nature gave us two ears and one mouth' — fits the theme of Chapter 3?", "options": [{"text": "It shows that speaking (voc/dict) is twice as important as hearing (aud)", "isCorrect": false, "rationale": "The quote actually suggests the opposite — hearing should be prioritized over speaking (two ears vs. one mouth)."}, {"text": "It emphasizes that listening (aud) is more important than speaking and should happen more", "isCorrect": true, "rationale": "The quote matches the chapter's root 'aud' (to hear) by suggesting that we should listen more than we speak — two ears for hearing, one mouth for speaking."}, {"text": "It is about the anatomy of the head and has no connection to the root 'aud'", "isCorrect": false, "rationale": "The quote is not merely anatomical — it connects philosophically to the importance of hearing (aud) emphasized in this chapter."}, {"text": "It suggests that mouths are more efficient than ears", "isCorrect": false, "rationale": "The quote suggests the opposite — since we have two ears but one mouth, hearing should outpace speaking."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
