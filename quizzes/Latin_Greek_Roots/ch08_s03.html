<div class="quiz-container">

        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>

    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 8, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what was the original meaning of the Latin verb legere?", "options": [{"text": "To write", "isCorrect": false, "rationale": "The text does not state that 'legere' originally meant 'to write'; rather, its meaning evolved to encompass 'gathering words' for reading."}, {"text": "To speak", "isCorrect": false, "rationale": "While a lecture involves speaking, the root's original meaning was not 'to speak' but 'to gather'."}, {"text": "To gather", "isCorrect": true, "rationale": "The text explicitly states: 'The verb legere originally meant “to gather” — imagine a Roman farmer gathering olives from the ground, picking them one by one.'"}, {"text": "To understand", "isCorrect": false, "rationale": "Understanding is a result of reading, but not the original core meaning of 'legere' itself, which was 'to gather'."}]}, {"question": "The text describes a triple evolution of the root legere. Which sequence accurately reflects this progression of meaning?", "options": [{"text": "Gathering people → Gathering words → Gathering objects", "isCorrect": false, "rationale": "This sequence is incorrect; the initial meaning was gathering objects, not people."}, {"text": "Gathering words → Gathering objects → Choosing people", "isCorrect": false, "rationale": "This sequence is incorrect; gathering objects was the starting point, before gathering words."}, {"text": "Gathering objects → Gathering words → Choosing people", "isCorrect": true, "rationale": "The text states: 'From gathering objects, the meaning expanded to gathering words... And from gathering words, it expanded once more to gathering people: to choose or select...'"}, {"text": "Choosing people → Gathering objects → Gathering words", "isCorrect": false, "rationale": "This sequence is incorrect; choosing people was the final expansion, not the initial meaning."}]}, {"question": "A professor delivering a 'lecture' is primarily engaging with which aspect of the leg/lect root's meaning, as explained in the text?", "options": [{"text": "Gathering objects, like notes", "isCorrect": false, "rationale": "While a professor might gather notes, the word 'lecture' specifically relates to the 'reading aloud' aspect, not the gathering of physical objects."}, {"text": "Reading aloud, or 'gathering' knowledge to present", "isCorrect": true, "rationale": "The text explicitly states: 'A lecture is a reading aloud — a professor “gathers” knowledge and presents it to students.'"}, {"text": "Choosing the best students for a task", "isCorrect": false, "rationale": "Choosing is another meaning of the root, but 'lecture' specifically refers to the act of presenting knowledge, not student selection."}, {"text": "Selecting a topic for discussion", "isCorrect": false, "rationale": "Selecting a topic falls under the 'choosing' meaning, but 'lecture' refers to the delivery of information, linked to reading aloud."}]}, {"question": "The words 'select' and 'elect' both derive from legere. Which core meaning of the root do these words primarily exemplify?", "options": [{"text": "To gather information", "isCorrect": false, "rationale": "While information might be gathered to inform a choice, the primary meaning exemplified by 'select' and 'elect' is the act of choosing."}, {"text": "To read carefully", "isCorrect": false, "rationale": "Reading is another meaning of the root, but 'select' and 'elect' are not directly related to the act of reading."}, {"text": "To make a choice", "isCorrect": true, "rationale": "The text states: 'When you select something, you “choose apart” (se- + legere)' and 'When voters elect a leader, they “choose out” (e- + legere).'"}, {"text": "To collect items", "isCorrect": false, "rationale": "'Collect' is derived from 'legere' in the 'gathering' sense, but 'select' and 'elect' specifically refer to making a choice from options."}]}, {"question": "The text states that when you 'select' something, you 'choose apart' (se- + legere). Based on this explanation, what can be inferred about the Latin prefix se-?", "options": [{"text": "It intensifies an action.", "isCorrect": false, "rationale": "The meaning 'choose apart' does not suggest intensification but rather separation."}, {"text": "It means 'together' or 'with.'", "isCorrect": false, "rationale": "'Together' or 'with' would imply joining, which is the opposite of 'apart'."}, {"text": "It indicates separation or apart.", "isCorrect": true, "rationale": "The explanation 'choose apart' directly indicates that the prefix 'se-' conveys the idea of separation or being apart from others."}, {"text": "It negates the action.", "isCorrect": false, "rationale": "Negation would imply 'not choosing,' which is handled by a different prefix (like 'nec-')."}]}, {"question": "The word 'neglect' is formed from nec- + legere and means 'to not choose.' What does this suggest about the meaning of the Latin prefix nec-?", "options": [{"text": "It means 'to choose carefully.'", "isCorrect": false, "rationale": "The phrase 'to not choose' indicates absence or negation, not careful selection."}, {"text": "It implies completion or thoroughness.", "isCorrect": false, "rationale": "Completion or thoroughness is not implied by 'to not choose'; it suggests the opposite – a lack of action."}, {"text": "It denotes a negative or absence.", "isCorrect": true, "rationale": "If 'neglect' means 'to not choose,' then 'nec-' clearly functions as a negative prefix, indicating an absence or lack of the action."}, {"text": "It signifies something done repeatedly.", "isCorrect": false, "rationale": "Repetition is not conveyed by 'to not choose'; the focus is on the lack of a single or ongoing choice/action."}]}, {"question": "The Latin noun lex (law) is linked to the root legere through which conceptual idea?", "options": [{"text": "The act of reading legal documents.", "isCorrect": false, "rationale": "While legal documents are read, the connection between 'lex' and 'legere' is conceptual, not merely the act of reading documents."}, {"text": "The historical process of writing laws.", "isCorrect": false, "rationale": "The text mentions 'chosen rules' or 'gathered statutes,' not specifically the act of writing them."}, {"text": "Laws being 'chosen rules' or 'gathered statutes.'", "isCorrect": true, "rationale": "The text states: 'The related Latin noun lex (law) — from the idea of “chosen rules” or “gathered statutes” — gives us legal, meaning “relating to law.”'"}, {"text": "The legal profession's ability to gather evidence.", "isCorrect": false, "rationale": "This describes a modern legal function, but not the etymological link between 'lex' and 'legere' as presented in the text."}]}, {"question": "How has the meaning of 'legend' primarily evolved from its original Latin meaning, legenda ('things to be read')?", "options": [{"text": "It shifted from referring to written texts to oral traditions.", "isCorrect": false, "rationale": "The text focuses on the grandeur of the story, not its medium of transmission (written vs. oral)."}, {"text": "It moved from meaning stories to be read to stories so grand they seem almost unbelievable.", "isCorrect": true, "rationale": "The text explicitly states: 'In Latin, legenda meant “things to be read”... Over centuries, a legend became any story so grand it seems almost too wonderful to be true.'"}, {"text": "It narrowed from any story to specifically historical accounts.", "isCorrect": false, "rationale": "The meaning expanded to 'grand' or 'amazing,' not narrowed to strictly historical accounts."}, {"text": "It changed from religious texts to secular narratives.", "isCorrect": false, "rationale": "The text does not specify a shift from religious to secular content for the word 'legend'."}]}, {"question": "If the text states that 'When handwriting is legible, it can be 'gathered' or read easily,' what can be logically concluded about illegible handwriting?", "options": [{"text": "It is written in a foreign language.", "isCorrect": false, "rationale": "Difficulty in reading due to script clarity is distinct from being in an unfamiliar language."}, {"text": "It is difficult or impossible to read.", "isCorrect": true, "rationale": "If 'legible' means 'can be read easily,' then 'illegible' (with the common negative prefix 'il-') logically means the opposite: it cannot be read easily, or is difficult/impossible to read."}, {"text": "It is typically found in ancient manuscripts.", "isCorrect": false, "rationale": "While some ancient manuscripts might be difficult to read, illegibility can occur in any handwriting, regardless of age."}, {"text": "It signifies a lack of important content.", "isCorrect": false, "rationale": "The legibility of handwriting pertains to its readability, not the significance of its content."}]}, {"question": "What is the fundamental reason leg/lect appears in such a wide variety of English words, as explained by the passage?", "options": [{"text": "Its association with ancient Roman legal practices.", "isCorrect": false, "rationale": "While 'lex' (law) is related, it's only one aspect of the root's reach, not the fundamental reason for its overall diversity."}, {"text": "The sheer number of Latin roots that influenced English.", "isCorrect": false, "rationale": "This is a general truth about English, but not the specific reason given in the text for the versatility of *this particular* root."}, {"text": "Its versatile triple meaning of gathering, reading, and choosing.", "isCorrect": true, "rationale": "The text explicitly states: 'This triple meaning — gathering, reading, and choosing — explains why leg/lect appears in so many different kinds of English words.'"}, {"text": "Its common use in academic and intellectual contexts.", "isCorrect": false, "rationale": "While many words derived from 'legere' are used in academic contexts (e.g., lecture, legible), this is a consequence, not the fundamental reason for the root's broad applicability."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
