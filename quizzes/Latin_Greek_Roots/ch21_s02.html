<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words from the Ancients: Latin &amp; Greek Roots &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 21, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does 'bio' mean?", "options": [{"text": "Earth", "isCorrect": false, "rationale": "Earth = geo."}, {"text": "Life", "isCorrect": true, "rationale": "From Greek bios."}, {"text": "Mind", "isCorrect": false, "rationale": "Mind = psych."}, {"text": "Water", "isCorrect": false, "rationale": "Water = hydr."}]}, {"question": "What does 'log/logy' mean?", "options": [{"text": "Sound", "isCorrect": false, "rationale": "Sound = phon."}, {"text": "Word, reason, study", "isCorrect": true, "rationale": "From Greek logos."}, {"text": "Heat", "isCorrect": false, "rationale": "Heat = therm."}, {"text": "Feeling", "isCorrect": false, "rationale": "Feeling = path."}]}, {"question": "'log/logy' originates from?", "options": [{"text": "Bios", "isCorrect": false, "rationale": "Origin of bio."}, {"text": "Logos (word, reason, discourse)", "isCorrect": true, "rationale": "Stated in text."}, {"text": "Chronos", "isCorrect": false, "rationale": "Origin of chron."}, {"text": "Pathos", "isCorrect": false, "rationale": "Origin of path."}]}, {"question": "What variant in 'dialogue'?", "options": [{"text": "logi", "isCorrect": false, "rationale": "Not listed."}, {"text": "logue", "isCorrect": true, "rationale": "Stated in text."}, {"text": "logis", "isCorrect": false, "rationale": "Not listed."}, {"text": "logos", "isCorrect": false, "rationale": "Original Greek, not variant."}]}, {"question": "Which is a derivative of 'bio'?", "options": [{"text": "Geography", "isCorrect": false, "rationale": "Contains geo."}, {"text": "Symbiosis", "isCorrect": true, "rationale": "Listed as example."}, {"text": "Telephone", "isCorrect": false, "rationale": "Contains phon."}, {"text": "Thermometer", "isCorrect": false, "rationale": "Contains therm."}]}, {"question": "Which is a derivative of 'log/logy'?", "options": [{"text": "Biography", "isCorrect": false, "rationale": "bio + graph."}, {"text": "Analogy", "isCorrect": true, "rationale": "Listed as example."}, {"text": "Hydrogen", "isCorrect": false, "rationale": "Contains hydr."}, {"text": "Psychology", "isCorrect": false, "rationale": "Listed under psych."}]}, {"question": "'Bios' meant 'life, way of living.' How does this differ from mere existence?", "options": [{"text": "Emphasizes manner and quality of life", "isCorrect": true, "rationale": "'Way of living' encompasses how one lives."}, {"text": "Only plant life", "isCorrect": false, "rationale": "Broadly means life."}, {"text": "Same as existence", "isCorrect": false, "rationale": "Adds 'way of living.'"}, {"text": "Only Greeks", "isCorrect": false, "rationale": "General term."}]}, {"question": "Bio + logy creates?", "options": [{"text": "Study of language", "isCorrect": false, "rationale": "That is linguistics."}, {"text": "Study of living organisms -- biology", "isCorrect": true, "rationale": "bio (life) + logy (study of)."}, {"text": "Study of ancient texts", "isCorrect": false, "rationale": "Different."}, {"text": "Study of earth", "isCorrect": false, "rationale": "That is geology."}]}, {"question": "In 'theology,' what does 'theos' mean?", "options": [{"text": "Heat", "isCorrect": false, "rationale": "Heat = therm."}, {"text": "God", "isCorrect": true, "rationale": "theos + logy = study of God."}, {"text": "Sound", "isCorrect": false, "rationale": "Sound = phon."}, {"text": "Time", "isCorrect": false, "rationale": "Time = chron."}]}, {"question": "Both roots come from?", "options": [{"text": "Latin", "isCorrect": false, "rationale": "Both Greek."}, {"text": "Greek", "isCorrect": true, "rationale": "bios and logos."}, {"text": "French", "isCorrect": false, "rationale": "Greek."}, {"text": "Arabic", "isCorrect": false, "rationale": "Greek."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
