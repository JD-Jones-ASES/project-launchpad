<script>
var QUESTIONS = [{"question": "What is the primary meaning of the root \"port\" as described in the text?", "options": [{"text": "To move", "isCorrect": false, "rationale": "While 'to move' is related to 'to carry', the text specifically defines 'port' as 'to carry', making this option less precise."}, {"text": "To carry", "isCorrect": true, "rationale": "The text explicitly states the meaning of the root 'port' is 'to carry'."}, {"text": "To hold", "isCorrect": false, "rationale": "'To hold' is a different action from 'to carry', although carrying involves holding."}, {"text": "To bring", "isCorrect": false, "rationale": "Similar to 'to carry', but 'to carry' is the exact and most direct definition provided in the text."}]}, {"question": "From which language does the root \"port\" primarily originate?", "options": [{"text": "Greek", "isCorrect": false, "rationale": "The text clearly states the language of origin is Latin."}, {"text": "French", "isCorrect": false, "rationale": "While French is a Romance language derived from Latin and shares many words, the ultimate origin specified in the text is Latin."}, {"text": "German", "isCorrect": false, "rationale": "The text explicitly identifies Latin as the language of origin."}, {"text": "Latin", "isCorrect": true, "rationale": "The text explicitly states that the root 'port' comes from Latin (portare)."}]}, {"question": "Based on the meaning of 'port' and common English prefixes, which word best describes the action of 'carrying goods out of a country'?", "options": [{"text": "Import", "isCorrect": false, "rationale": "The prefix 'im-' or 'in-' means 'into' or 'in', so 'import' means to carry goods into a country."}, {"text": "Export", "isCorrect": true, "rationale": "The prefix 'ex-' means 'out of', and 'port' means 'to carry', so 'export' means to carry goods out of a country."}, {"text": "Transport", "isCorrect": false, "rationale": "The prefix 'trans-' means 'across', so 'transport' means to carry across places, not specifically out of a country."}, {"text": "Report", "isCorrect": false, "rationale": "While containing 'port', the meaning of 'report' (to give an account) is not directly related to physically carrying goods out of a place."}]}, {"question": "The text notes that 'port' 'remains consistent in English derivatives'. What does this characteristic primarily imply for a student learning vocabulary?", "options": [{"text": "The meaning of 'port' will always be exactly 'to carry' without any nuances.", "isCorrect": false, "rationale": "While the core meaning 'to carry' persists, prefixes and suffixes can add nuances or specific directions (e.g., import, export), so the meaning isn't always *exactly* the same without variation."}, {"text": "The root 'port' will only appear at the beginning of words.", "isCorrect": false, "rationale": "This is incorrect; 'port' often appears in the middle of words, as in 'transport'."}, {"text": "The spelling 'port' will generally be maintained across various words derived from this root.", "isCorrect": true, "rationale": "Consistency in variant forms refers to the stability of the root's spelling and structure as it appears in different words, making it recognizable."}, {"text": "All words containing 'port' are directly borrowed from Latin without modification.", "isCorrect": false, "rationale": "English words often undergo phonetic and semantic changes over time, even if derived from Latin roots. Consistency refers to the form of the root itself, not the entire word's borrowing history."}]}, {"question": "In the word \"transportation,\" what part represents the root \"port,\" and what core meaning does it contribute to the word's overall meaning?", "options": [{"text": "\"trans-\" is the root, meaning \"across.\"", "isCorrect": false, "rationale": "'Trans-' is a prefix, not the root 'port'. Its meaning is 'across', but it's not the central root being discussed."}, {"text": "\"-port-\" is the root, contributing the meaning \"to carry.\"", "isCorrect": true, "rationale": "In 'transportation', '-port-' is the root 'port' meaning 'to carry', which is then combined with the prefix 'trans-' (across) and the suffix '-ation' (process or action)."}, {"text": "\"-tion\" is the root, indicating an action or process.", "isCorrect": false, "rationale": "'-tion' is a suffix, indicating an action or process, but it is not the root 'port'."}, {"text": "\"transportation\" is a single, irreducible root word.", "isCorrect": false, "rationale": "'Transportation' is a complex word formed by a prefix ('trans-'), a root ('port'), and a suffix ('-ation'), and is therefore reducible."}]}, {"question": "The information that the root \"port\" originates from Latin (portare) primarily suggests what about the broader English language?", "options": [{"text": "All English words containing 'port' are exclusively used in scientific contexts.", "isCorrect": false, "rationale": "Words like 'portable' and 'import' are commonly used in everyday language, not just scientific contexts."}, {"text": "Latin roots like 'port' are a significant source for a large portion of English vocabulary.", "isCorrect": true, "rationale": "English has been heavily influenced by Latin, and many common words, as well as academic and technical terms, are built from Latin roots."}, {"text": "English vocabulary is entirely derived from Latin.", "isCorrect": false, "rationale": "English is a Germanic language with significant Latin and French (which is Latin-derived) influences, but it is not entirely derived from Latin."}, {"text": "Only archaic English words have Latin origins.", "isCorrect": false, "rationale": "Latin influence is pervasive in modern English vocabulary, not just in archaic words."}]}, {"question": "If you were describing a lightweight device designed to be easily moved from one room to another, which derivative of \"port\" would best describe this characteristic?", "options": [{"text": "Transport", "isCorrect": false, "rationale": "'Transport' is a verb meaning to carry across or move, not an adjective describing the capability of being carried easily."}, {"text": "Export", "isCorrect": false, "rationale": "'Export' specifically refers to carrying goods out of a country, which is not applicable to a device being moved between rooms."}, {"text": "Portable", "isCorrect": true, "rationale": "'Portable' combines the root 'port' (to carry) with the suffix '-able' (capable of), meaning 'capable of being carried', which perfectly describes the characteristic of easy movement."}, {"text": "Import", "isCorrect": false, "rationale": "'Import' specifically refers to carrying goods into a country, which is not applicable to describing the mobility of a device."}]}, {"question": "A government agency issues a directive to 'carry away' or expel a non-citizen from a country. Which derivative of 'port' or a related word describes this action?", "options": [{"text": "Export", "isCorrect": false, "rationale": "'Export' refers to carrying goods out of a country, usually in a commercial sense, not expelling a person."}, {"text": "Import", "isCorrect": false, "rationale": "'Import' refers to carrying goods into a country. This is the opposite of the scenario described."}, {"text": "Support", "isCorrect": false, "rationale": "'Support' means to hold up or bear the weight of, which is unrelated to expelling a person."}, {"text": "Deport", "isCorrect": true, "rationale": "The prefix 'de-' means 'away from' or 'down', so 'deport' (from 'de-' + 'port') means to carry away or expel, fitting the description."}]}, {"question": "The text includes \"portare\" as the specific Latin verb from which \"port\" derives. What does this detail primarily illustrate?", "options": [{"text": "It indicates that the root \"port\" always functions as a verb in English.", "isCorrect": false, "rationale": "While 'portare' is a verb, the root 'port' can form nouns (e.g., 'porter') and adjectives (e.g., 'portable') in English."}, {"text": "It provides the original infinitive form of the verb \"to carry\" in Latin, clarifying the source.", "isCorrect": true, "rationale": "'Portare' is the Latin infinitive form of 'to carry', directly showing the original verbal base for the English root 'port'."}, {"text": "It suggests that all English words with \"port\" are direct, unchanged borrowings.", "isCorrect": false, "rationale": "Roots are often adapted and combined with other elements in English, not always directly borrowed without changes."}, {"text": "It implies that \"port\" is a relatively modern addition to the English language.", "isCorrect": false, "rationale": "Latin influence on English dates back centuries, so this root is not a modern addition."}]}, {"question": "Considering the core meaning of \"port\" (to carry), which of the following words *least* directly or literally involves the physical act of \"carrying\" in its primary definition?", "options": [{"text": "Porter", "isCorrect": false, "rationale": "A 'porter' is explicitly a person whose job involves carrying luggage or other items, directly related to the act of carrying."}, {"text": "Portable", "isCorrect": false, "rationale": "'Portable' means capable of being carried, directly linking to the act of carrying."}, {"text": "Support", "isCorrect": false, "rationale": "'Support' involves carrying weight or holding something up, a direct physical manifestation of carrying."}, {"text": "Opportunity", "isCorrect": true, "rationale": "While 'opportunity' derives from Latin 'ob-portunus' (towards the port, favorable for sailing), its modern meaning refers to a favorable time or set of circumstances, which is a metaphorical extension and does not literally involve the act of carrying."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
