<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words from the Ancients: Latin &amp; Greek Roots &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 24, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does 'psychology' mean?", "options": [{"text": "Study of earth", "isCorrect": false, "rationale": "That is geology."}, {"text": "Scientific study of mind and behavior", "isCorrect": true, "rationale": "psych + logy."}, {"text": "Study of water", "isCorrect": false, "rationale": "Water = hydr."}, {"text": "Study of heat", "isCorrect": false, "rationale": "Heat = therm."}]}, {"question": "How does 'psyche' differ from 'psychology'?", "options": [{"text": "Same meaning", "isCorrect": false, "rationale": "Different: thing vs. study."}, {"text": "Psyche = mind/soul; psychology = study of it", "isCorrect": true, "rationale": "Psyche is the thing; psychology adds -logy."}, {"text": "Psyche is Greek; psychology Latin", "isCorrect": false, "rationale": "Both from Greek."}, {"text": "Psyche is about body", "isCorrect": false, "rationale": "Both about mind."}]}, {"question": "What does 'empathy' mean?", "options": [{"text": "Study of disease", "isCorrect": false, "rationale": "That is pathology."}, {"text": "Ability to share another's feelings", "isCorrect": true, "rationale": "em- (in) + path (feeling)."}, {"text": "Fear of suffering", "isCorrect": false, "rationale": "Fear = phobia."}, {"text": "Physical pain", "isCorrect": false, "rationale": "Empathy is emotional."}]}, {"question": "How does 'sympathy' differ from 'empathy'?", "options": [{"text": "Sympathy = feeling with; empathy = feeling into", "isCorrect": true, "rationale": "syn- (with) vs. em- (in)."}, {"text": "Identical", "isCorrect": false, "rationale": "Different prefixes."}, {"text": "One positive, one negative", "isCorrect": false, "rationale": "Differ in degree, not polarity."}, {"text": "Sympathy is about sounds", "isCorrect": false, "rationale": "Both use path (feeling)."}]}, {"question": "What does 'pathology' study?", "options": [{"text": "Ancient roads", "isCorrect": false, "rationale": "Greek path = suffering/disease."}, {"text": "Causes and effects of diseases", "isCorrect": true, "rationale": "path (disease) + logy (study of)."}, {"text": "Emotions", "isCorrect": false, "rationale": "Pathology focuses on disease."}, {"text": "Water quality", "isCorrect": false, "rationale": "Water = hydr."}]}, {"question": "What does 'hydrogen' literally mean?", "options": [{"text": "Water filter", "isCorrect": false, "rationale": "An element."}, {"text": "Element that produces water when burned", "isCorrect": true, "rationale": "hydr (water) + genes (producing)."}, {"text": "Water measurement unit", "isCorrect": false, "rationale": "An element, not measurement."}, {"text": "Water god", "isCorrect": false, "rationale": "A chemical element."}]}, {"question": "What is a 'hydrant'?", "options": [{"text": "Water plant", "isCorrect": false, "rationale": "Equipment, not plant."}, {"text": "Outdoor water pipe for firefighting", "isCorrect": true, "rationale": "hydr (water) + -ant."}, {"text": "Humidity measurer", "isCorrect": false, "rationale": "That is hygrometer."}, {"text": "Water bottle", "isCorrect": false, "rationale": "Fixed infrastructure."}]}, {"question": "What does 'thermal' mean?", "options": [{"text": "Relating to water", "isCorrect": false, "rationale": "Water = hydr."}, {"text": "Relating to heat or warmth", "isCorrect": true, "rationale": "therm + -al (relating to)."}, {"text": "Relating to mind", "isCorrect": false, "rationale": "Mind = psych."}, {"text": "Relating to suffering", "isCorrect": false, "rationale": "Suffering = path."}]}, {"question": "What does a 'thermostat' do?", "options": [{"text": "Measures water flow", "isCorrect": false, "rationale": "Water = hydr."}, {"text": "Regulates temperature automatically", "isCorrect": true, "rationale": "therm + statos (fixed)."}, {"text": "Measures emotions", "isCorrect": false, "rationale": "Emotions = path/psych."}, {"text": "Creates heat", "isCorrect": false, "rationale": "Regulates, not creates."}]}, {"question": "What does a 'thermometer' measure?", "options": [{"text": "Water pressure", "isCorrect": false, "rationale": "Water = hydr."}, {"text": "Temperature", "isCorrect": true, "rationale": "therm (heat) + metron (measure)."}, {"text": "Sound levels", "isCorrect": false, "rationale": "Sound = phon."}, {"text": "Time intervals", "isCorrect": false, "rationale": "Time = chron."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
