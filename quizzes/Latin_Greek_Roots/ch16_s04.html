<body>

        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 16, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following situations best exemplifies something described as 'temporary'?", "options": [{"text": "A historic monument standing for centuries.", "isCorrect": false, "rationale": "A historic monument standing for centuries implies permanence or long duration, which is the opposite of temporary."}, {"text": "A short-term lease agreement for an apartment.", "isCorrect": true, "rationale": "'Temporary' means lasting only for a limited time; a short-term lease agreement perfectly fits this definition as it has a defined, limited duration."}, {"text": "An eternal philosophical truth.", "isCorrect": false, "rationale": "'Eternal' signifies endless duration, which is contrary to the meaning of temporary."}, {"text": "A deeply ingrained cultural tradition.", "isCorrect": false, "rationale": "Deeply ingrained traditions typically imply long-lasting or even permanent aspects of a culture, not something of limited time."}]}, {"question": "A historian writing about the early 20th century refers to Pablo Picasso and Gertrude Stein as 'contemporaries.' What does this classification imply about their relationship?", "options": [{"text": "They were direct collaborators on all major projects.", "isCorrect": false, "rationale": "Being 'contemporaries' only implies living at the same time, not necessarily collaborating or working together on projects."}, {"text": "They lived and worked during the same historical period.", "isCorrect": true, "rationale": "'Contemporary' means living or occurring at the same time. Referring to two individuals as contemporaries implies they were active during the same era."}, {"text": "They held opposing views on artistic movements.", "isCorrect": false, "rationale": "While possible, their views or disagreements are not implied by the term 'contemporary.' It only refers to their shared timeframe."}, {"text": "They were related by blood or marriage.", "isCorrect": false, "rationale": "The term 'contemporary' does not convey any familial or relational ties beyond existing in the same temporal period."}]}, {"question": "In a theological discussion, if a speaker refers to 'temporal concerns,' what aspect of human experience are they most likely emphasizing?", "options": [{"text": "Issues related to the spiritual afterlife and divine intervention.", "isCorrect": false, "rationale": "'Temporal' is defined as 'worldly rather than spiritual,' making issues of the spiritual afterlife the opposite of temporal concerns."}, {"text": "Matters pertaining to worldly existence, material wealth, and current events.", "isCorrect": true, "rationale": "'Temporal' means 'relating to time; worldly rather than spiritual.' Therefore, 'temporal concerns' refer to the practical, material, and immediate aspects of worldly life."}, {"text": "The concept of timeless, universal moral principles.", "isCorrect": false, "rationale": "Timeless principles transcend specific periods, whereas 'temporal' refers to aspects of current or worldly time."}, {"text": "Philosophical debates about the nature of eternity.", "isCorrect": false, "rationale": "Eternity contrasts with the 'of time' or 'worldly' aspect implied by 'temporal.'"}]}, {"question": "During a live television interview, a politician is asked an unexpected question and provides a well-articulated answer without any notes. This response would best be described as:", "options": [{"text": "Meticulously rehearsed.", "isCorrect": false, "rationale": "Meticulously rehearsed implies extensive preparation, which contradicts the 'without preparation' aspect of 'extemporaneous.'"}, {"text": "Carefully planned.", "isCorrect": false, "rationale": "Carefully planned suggests prior thought and organization, which is the opposite of an extemporaneous response."}, {"text": "Extemporaneous.", "isCorrect": true, "rationale": "'Extemporaneous' means 'done without preparation; spoken or performed on the spot.' The scenario of an unexpected question answered without notes perfectly fits this definition."}, {"text": "Pre-scripted.", "isCorrect": false, "rationale": "Pre-scripted means written out beforehand, which is contrary to a spontaneous, unprepared response."}]}, {"question": "A musician is told to increase the 'tempo' of a piece of music. What specific instruction is being given?", "options": [{"text": "To play the music louder.", "isCorrect": false, "rationale": "Loudness relates to dynamics (volume), not tempo (speed)."}, {"text": "To play the music faster.", "isCorrect": true, "rationale": "'Tempo' is defined as 'the speed at which a piece of music is played.' Increasing the tempo means to play faster."}, {"text": "To change the key of the music.", "isCorrect": false, "rationale": "Changing the key involves altering the pitch relationships and harmonic structure, not the speed of the music."}, {"text": "To play the music with more emotion.", "isCorrect": false, "rationale": "Emotion relates to musical expression and interpretation, not specifically to the speed of the music."}]}, {"question": "The word 'extemporaneous' is formed from the Latin root 'tempor,' meaning 'time,' combined with 'ex-' meaning 'out of.' How does this etymological breakdown relate to the word's definition?", "options": [{"text": "It suggests actions that are done at a specific, designated time.", "isCorrect": false, "rationale": "'Out of time' in this context means outside of the normal or expected time for preparation, not at a designated time."}, {"text": "It implies actions that are timeless and universal.", "isCorrect": false, "rationale": "Timeless actions are distinct from those done spontaneously 'out of the time' for preparation."}, {"text": "It refers to actions performed spontaneously, 'out of' the usual time for preparation.", "isCorrect": true, "rationale": "The combination of 'ex-' (out of) and 'tempor' (time) creates the sense of doing something 'out of' the expected or allotted time for preparation, thus spontaneously or on the spot."}, {"text": "It means actions that take an exceptionally long time to complete.", "isCorrect": false, "rationale": "The etymology does not suggest long duration; rather, it suggests a lack of prior time for preparation."}]}, {"question": "A government budget proposal focusing heavily on immediate economic stimulus packages, infrastructure repair, and job creation, rather than long-term cultural or religious initiatives, primarily addresses what kind of needs?", "options": [{"text": "Spiritual needs.", "isCorrect": false, "rationale": "Spiritual needs are explicitly contrasted with 'temporal' needs in the definition. The focus here is on worldly, not spiritual, concerns."}, {"text": "Metaphysical needs.", "isCorrect": false, "rationale": "Metaphysical needs relate to abstract concepts like existence and reality, which are not the direct focus of economic stimulus or infrastructure."}, {"text": "Temporal needs.", "isCorrect": true, "rationale": "The budget's focus on 'immediate economic stimulus,' 'infrastructure repair,' and 'job creation' aligns with 'worldly' concerns 'relating to time,' contrasting with spiritual or long-term cultural/religious initiatives. These are practical, current, and worldly needs."}, {"text": "Eternal needs.", "isCorrect": false, "rationale": "Eternal needs are those that transcend time, which is the opposite of the immediate, worldly focus described in the scenario."}]}, {"question": "Which of the provided words specifically denotes a period of intense atmospheric disturbance?", "options": [{"text": "Tempo", "isCorrect": false, "rationale": "'Tempo' refers to the speed of music, not weather."}, {"text": "Temporary", "isCorrect": false, "rationale": "'Temporary' refers to something of limited duration, not a storm."}, {"text": "Temporal", "isCorrect": false, "rationale": "'Temporal' refers to worldly or time-related matters, not a weather event."}, {"text": "Tempest", "isCorrect": true, "rationale": "'Tempest' is defined as 'a violent storm; a period of turbulent weather,' directly matching the description."}]}, {"question": "An art critic states that digital art is the 'contemporary' medium of expression. What is the critic suggesting about digital art?", "options": [{"text": "It is a timeless art form that transcends eras.", "isCorrect": false, "rationale": "While digital art might have lasting impact, 'contemporary' specifically means belonging to the present time, not timelessness."}, {"text": "It is a very old form of art, revived in modern times.", "isCorrect": false, "rationale": "'Contemporary' implies current relevance and existence, not an ancient origin or revival."}, {"text": "It is prevalent and characteristic of the current era.", "isCorrect": true, "rationale": "By describing digital art as 'contemporary,' the critic is highlighting its status as 'modern,' 'living or occurring at the same time' as the present, and therefore characteristic of the current era."}, {"text": "It is an art form that will only last for a short period.", "isCorrect": false, "rationale": "'Contemporary' describes its current status, not its future duration or permanence."}]}, {"question": "Across the word family derived from 'tempor' (e.g., temporary, contemporary, temporal, extemporaneous, tempo), what is the overarching concept that unifies their meanings?", "options": [{"text": "Speed", "isCorrect": false, "rationale": "While 'tempo' relates to speed, this concept does not unify all words in the family (e.g., 'temporary' means limited duration, not speed)."}, {"text": "Permanence", "isCorrect": false, "rationale": "'Temporary' is explicitly the opposite of permanence, and permanence is not a unifying theme for the other words either."}, {"text": "Preparation", "isCorrect": false, "rationale": "Only 'extemporaneous' directly relates to preparation (or lack thereof). This is not an overarching concept for the entire family."}, {"text": "Time", "isCorrect": true, "rationale": "The root 'tempor' explicitly means 'time.' All the words in the family relate to time: limited time (temporary), same time (contemporary), worldly time (temporal), without preparation time (extemporaneous), or musical time/speed (tempo)."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
