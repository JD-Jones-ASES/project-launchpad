    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 12</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the root 'fer / lat' mean?", "options": [{"text": "to go, to yield", "isCorrect": false, "rationale": "Going and yielding are the meanings of the root 'ced/cede/cess' from Chapter 11. The root fer/lat has a different meaning."}, {"text": "to carry, to bear, to bring", "isCorrect": true, "rationale": "Fer/lat comes from the Latin 'ferre' (to carry) and its past participle 'latus.' Both forms mean to carry, bear, or bring."}, {"text": "to lead, to guide", "isCorrect": false, "rationale": "Leading and guiding are the meanings of 'duc/duct' from Chapter 10. The root fer/lat means to carry."}, {"text": "to speak, to say", "isCorrect": false, "rationale": "Speaking and saying belong to different Latin roots. Fer/lat is about carrying and bearing."}], "id": "q01"}, {"question": "What makes 'fer/lat' an unusual root pair in Latin?", "options": [{"text": "The two forms come from completely different original words (a suppletive pair)", "isCorrect": true, "rationale": "The present tense 'ferre' and the past participle 'latus' come from two unrelated ancient words. Linguists call this a suppletive pair — they joined forces to act as one verb."}, {"text": "The root only appears in scientific vocabulary", "isCorrect": false, "rationale": "The fer/lat root appears in everyday words like prefer, transfer, and relate — not just scientific terms."}, {"text": "Both forms mean exactly the same thing in all situations", "isCorrect": false, "rationale": "While both forms mean to carry/bear, what makes the pair unusual is that they come from different original words, not that they are identical."}, {"text": "The root was borrowed from Greek rather than Latin", "isCorrect": false, "rationale": "This root is Latin in origin. The unusual feature is that its present and past forms come from two different ancient Latin words."}], "id": "q02"}, {"question": "To 'transfer' something means to:", "options": [{"text": "Carry it back to where it started", "isCorrect": false, "rationale": "Carrying back would use the prefix 're-.' Transfer uses 'trans-' which means across."}, {"text": "Carry or move it from one place or person to another", "isCorrect": true, "rationale": "Transfer = trans- (across) + fer (carry). To transfer is to carry something across — from one location, person, or situation to another."}, {"text": "Produce it for the first time", "isCorrect": false, "rationale": "Producing means creating (from 'produce,' using the root duc). Transfer means to move something that already exists."}, {"text": "Bear it with great difficulty", "isCorrect": false, "rationale": "Bearing difficulty is the meaning of 'suffer' (suf- + fer). Transfer is a neutral word about moving something across."}], "id": "q03"}, {"question": "If you 'prefer' chocolate over vanilla, you are literally:", "options": [{"text": "Carrying chocolate forward; placing it before others in choice", "isCorrect": true, "rationale": "Prefer = pre- (before) + fer (carry). To prefer is to carry one thing before others — to put it first in your choice."}, {"text": "Carrying both flavors together equally", "isCorrect": false, "rationale": "Carrying together equally would use 'con-' (together). Prefer uses 'pre-' (before), meaning you put one choice first."}, {"text": "Carrying vanilla away to reject it", "isCorrect": false, "rationale": "Carrying away uses the prefix 'ab-' or 'de-.' Prefer means placing one thing before others in preference, not rejecting the other."}, {"text": "Transferring your opinion to someone else", "isCorrect": false, "rationale": "Transferring opinion would use 'trans-.' Prefer means to place your own choice before another."}], "id": "q04"}, {"question": "Fertile land is land that is:", "options": [{"text": "Capable of producing abundant growth", "isCorrect": true, "rationale": "Fertile = fer- (carry/bear) + -tile (able to). Fertile literally means 'able to bear' — fertile land bears or produces abundant crops."}, {"text": "Located in the middle of a continent", "isCorrect": false, "rationale": "Location in the middle of a continent relates to 'Mediterranean' (from terra, Chapter 13). Fertile describes productivity, not geography."}, {"text": "Covered in rocks and difficult to farm", "isCorrect": false, "rationale": "This is the opposite of fertile. Fertile land is productive — the root means 'able to bear (growth).'"}, {"text": "Belonging to a Roman territory", "isCorrect": false, "rationale": "Territory relates to the root 'terr' (earth/land, Chapter 13). Fertile means productive — able to bear growth."}], "id": "q05"}, {"question": "The word 'different' breaks down as 'dif-fer-ent.' What does this tell us?", "options": [{"text": "Different things are led apart from each other", "isCorrect": false, "rationale": "Leading apart would use the root 'duc.' Different uses the root 'fer' (carry): things that are different have been carried apart."}, {"text": "Different things have been carried apart from each other", "isCorrect": true, "rationale": "Different = dif- (dis-, apart) + fer (carry) + -ent. Things that are different have been 'carried apart' — separated from each other."}, {"text": "Different things go in opposite directions", "isCorrect": false, "rationale": "Going in opposite directions would involve the root 'ced' (go). Different uses 'fer' (carry) with 'dif-' (apart) to show separation."}, {"text": "Different things yield to each other's weight", "isCorrect": false, "rationale": "Yielding belongs to the root 'ced/cede.' Different = things that have been carried apart."}], "id": "q06"}, {"question": "To 'suffer' literally means to:", "options": [{"text": "Carry under; bear a burden of pain", "isCorrect": true, "rationale": "Suffer = suf- (sub-, under) + fer (carry). To suffer is to carry something underneath — to bear a burden of pain or hardship."}, {"text": "Go beyond one's limits from pain", "isCorrect": false, "rationale": "Going beyond limits is 'exceed' (ex- + ceed). Suffer comes from the root fer (carry) with the prefix sub- (under)."}, {"text": "Transfer pain to someone else", "isCorrect": false, "rationale": "Transfer means to move across (trans- + fer). Suffer means to carry pain under/within oneself."}, {"text": "Relate one painful experience to another", "isCorrect": false, "rationale": "Relating is re- + lat (carry back). Suffering means carrying pain as a burden (suf- + fer)."}], "id": "q07"}, {"question": "Which word uses the 'lat' form and means 'to express meaning in another language'?", "options": [{"text": "transfer", "isCorrect": false, "rationale": "Transfer uses the 'fer' form (present stem) with trans- (across). The 'lat' form would appear in 'translate.'"}, {"text": "translate", "isCorrect": true, "rationale": "Translate = trans- (across) + lat (carry). To translate is to carry meaning across from one language to another — using the past participle stem 'lat.'"}, {"text": "prefer", "isCorrect": false, "rationale": "Prefer uses the 'fer' form with pre- (before). Translate uses the 'lat' form with trans- (across)."}, {"text": "fertile", "isCorrect": false, "rationale": "Fertile uses the 'fer' form meaning able to bear/carry. Translate uses 'lat' to express carrying across languages."}], "id": "q08"}, {"question": "To 'legislate' literally means to:", "options": [{"text": "Speak laws aloud to the people", "isCorrect": false, "rationale": "Speaking aloud would involve a different root. Legislate = leg(is) (law) + lat (carry) + -ate: to carry law (i.e., to make and enact laws)."}, {"text": "Carry law; to make or enact laws", "isCorrect": true, "rationale": "Legislate = leg(is) (law) + lat (carry/bear) + -ate. The 'lat' form here means to carry — legislators carry law into effect."}, {"text": "Lead citizens to follow rules", "isCorrect": false, "rationale": "Leading belongs to the root 'duc.' Legislate uses 'lat' (carry) — lawmakers carry the law into existence."}, {"text": "Write laws into books for safekeeping", "isCorrect": false, "rationale": "Writing involves different roots. Legislate specifically means to carry law (lat) — to enact or create legislation."}], "id": "q09"}, {"question": "English has its own suppletive pair similar to Latin's 'fer/lat.' Which English verb has this property?", "options": [{"text": "The verb 'run' (ran, run)", "isCorrect": false, "rationale": "Run/ran are forms from the same original word. A true suppletive pair uses forms from completely different roots."}, {"text": "The verb 'go' — whose past tense is 'went' (from a different root)", "isCorrect": true, "rationale": "The past tense of 'go' is 'went,' which originally came from the verb 'wend.' These two unrelated forms joined to serve as one verb — just like Latin fer/latus."}, {"text": "The verb 'see' (saw, seen)", "isCorrect": false, "rationale": "See/saw/seen are variations of the same root. A suppletive pair uses forms from two unrelated ancient words."}, {"text": "The verb 'write' (wrote, written)", "isCorrect": false, "rationale": "Write/wrote/written all trace back to the same original root. Suppletive pairs use forms from completely different origins."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
