    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the direct English translation of the Latin phrase \"Fides est fundamentum justitiae\"?", "options": [{"text": "Faith is the basis of equality.", "isCorrect": false, "rationale": "While 'fides' can mean faith, 'justitiae' specifically refers to justice, not equality. 'Fundamentum' means foundation, not merely basis."}, {"text": "Trust is the foundation of justice.", "isCorrect": true, "rationale": "This is the precise and widely accepted translation of Cicero's statement, capturing the essence of 'fides' as trust, and 'fundamentum' as foundation for 'justitiae' (justice)."}, {"text": "Loyalty is the cornerstone of law.", "isCorrect": false, "rationale": "This option uses different Latin terms; 'fides' is not directly loyalty in this context, and 'justitiae' refers to justice, not exclusively law. 'Cornerstone' is similar but 'foundation' is more accurate."}, {"text": "Belief is essential for fairness.", "isCorrect": false, "rationale": "This is a reinterpretation rather than a direct translation. 'Fides' is closer to trust than general belief, and 'justitiae' translates to justice, which is a broader concept than fairness."}]}, {"question": "According to Cicero's epigraph, what primary role does 'trust' play in relation to 'justice'?", "options": [{"text": "It is a potential outcome of justice.", "isCorrect": false, "rationale": "Cicero states that trust is the 'foundation' (fundamentum) of justice, implying it's a prerequisite or cause, not an effect or outcome."}, {"text": "It is the essential prerequisite for justice.", "isCorrect": true, "rationale": "By describing trust as the 'foundation,' Cicero emphasizes its fundamental and necessary role. Justice cannot properly exist or be built without trust as its base."}, {"text": "It is merely one component among many in achieving justice.", "isCorrect": false, "rationale": "While it is a component, the term 'foundation' elevates its status beyond merely 'one among many,' suggesting it is indispensable and primary."}, {"text": "It serves as a limit to the extent of justice.", "isCorrect": false, "rationale": "The statement suggests trust enables and supports justice, rather than limiting its scope or extent."}]}, {"question": "The use of the word 'fundamentum' (foundation) in the epigraph suggests that trust is:", "options": [{"text": "A decorative element that enhances the appearance of justice.", "isCorrect": false, "rationale": "A foundation is structural and essential for stability, not merely decorative. It plays a functional rather than aesthetic role."}, {"text": "A support structure upon which justice is built and without which it cannot stand.", "isCorrect": true, "rationale": "The metaphor of a 'foundation' strongly implies a base or underlying support that is crucial for the entire structure (justice) to be stable and enduring. Without it, the structure would collapse."}, {"text": "A secondary factor that can be introduced once justice is already established.", "isCorrect": false, "rationale": "Foundations are built first; they are primary, not secondary, and must be in place before the rest of the structure (justice) can be established."}, {"text": "A temporary requirement that can be removed after justice has been achieved.", "isCorrect": false, "rationale": "A foundation is a permanent and ongoing support. Its removal would destabilize or destroy what it supports, indicating it's not temporary."}]}, {"question": "The philosophical statement 'Trust is the foundation of justice' is attributed to which ancient figure?", "options": [{"text": "Plato", "isCorrect": false, "rationale": "While Plato was a significant Greek philosopher, the epigraph explicitly states Cicero as the author."}, {"text": "Aristotle", "isCorrect": false, "rationale": "Aristotle was another prominent Greek philosopher, but he is not the author of this specific quote."}, {"text": "Cicero", "isCorrect": true, "rationale": "The epigraph clearly attributes the quote to Cicero, a Roman statesman, orator, lawyer, and philosopher."}, {"text": "Seneca", "isCorrect": false, "rationale": "Seneca was a Roman Stoic philosopher, but the provided text identifies Cicero as the source."}]}, {"question": "In which of Cicero's works is the given epigraph, 'Fides est fundamentum justitiae,' found?", "options": [{"text": "Republic", "isCorrect": false, "rationale": "Cicero wrote 'De re publica' (On the Republic), but this specific quote is not cited from that work in the epigraph."}, {"text": "On Friendship", "isCorrect": false, "rationale": "Cicero also wrote 'De Amicitia' (On Friendship), but it is not the source of this particular quote."}, {"text": "De Officiis", "isCorrect": true, "rationale": "The epigraph explicitly states that the quote is from Cicero's 'De Officiis, I.23,' which translates to 'On Duties' or 'On Obligations'."}, {"text": "Tusculan Disputations", "isCorrect": false, "rationale": "Cicero wrote 'Tusculanae Disputationes' (Tusculan Disputations), but this work is not identified as the source for the epigraph."}]}, {"question": "If a society or legal system operates without 'fides' (trust) as its foundation, what is a logical consequence based on Cicero's statement?", "options": [{"text": "Justice would automatically be replaced by pure fairness.", "isCorrect": false, "rationale": "If the foundation of justice is missing, justice itself cannot stand. Fairness, as a component of justice, would also be compromised, not automatically replace it."}, {"text": "The pursuit of justice would become more efficient and direct.", "isCorrect": false, "rationale": "Without trust, interactions become complex, suspicion rises, and cooperation diminishes, making the pursuit of justice less, not more, efficient."}, {"text": "The system intended to deliver justice would likely become unstable or collapse.", "isCorrect": true, "rationale": "According to Cicero's metaphor, a structure without its foundation is inherently unstable and prone to collapse. Similarly, a justice system lacking trust among its participants (citizens, institutions) would lose legitimacy and functionality."}, {"text": "Other virtues would naturally compensate for the absence of trust.", "isCorrect": false, "rationale": "While other virtues are important, Cicero's statement singles out trust as the 'foundation,' implying its unique and indispensable role that cannot be simply compensated for."}]}, {"question": "While broad, Cicero's assertion that trust is the foundation of justice could apply most directly to which of the following aspects of a functional society?", "options": [{"text": "The aesthetic appreciation of art and culture.", "isCorrect": false, "rationale": "While trust may indirectly foster cultural environments, it's not a direct foundation for the aesthetic appreciation of art and culture, which relates more to personal taste and historical context."}, {"text": "The enforcement of contracts and agreements in commerce.", "isCorrect": true, "rationale": "Commercial interactions heavily rely on trust (fides). Without trust that parties will uphold their agreements, contracts would be meaningless, and commerce, a vital aspect of societal justice (e.g., fair exchange), would falter."}, {"text": "The culinary traditions and food preparation techniques.", "isCorrect": false, "rationale": "This area of societal function has no direct foundational link to the concept of trust for justice, as stated by Cicero."}, {"text": "The development of new athletic training regimens.", "isCorrect": false, "rationale": "Athletic training, while requiring discipline and often teamwork, is not an area where trust serves as the fundamental basis of justice in the broad societal sense Cicero implies."}]}, {"question": "A textbook chapter titled 'From: cred' (implying credibility, credit, or trust) begins with Cicero's epigraph. What is the most likely pedagogical reason for including this specific quote?", "options": [{"text": "To introduce a historical overview of Roman legal history.", "isCorrect": false, "rationale": "While the quote is from Roman history, its primary purpose as an epigraph for a chapter on 'cred' is to establish a central theme, not to provide a general historical overview."}, {"text": "To emphasize the profound and ancient connection between trustworthiness and ethical governance/systems.", "isCorrect": true, "rationale": "The epigraph from a classical source on the link between trust and justice serves to underscore the fundamental and enduring importance of 'cred' (credibility, trust) as a foundational principle for any fair and stable system, setting the stage for the chapter's content."}, {"text": "To challenge students to find alternative foundations for justice.", "isCorrect": false, "rationale": "An epigraph typically introduces the main idea or theme of a chapter, rather than immediately challenging it. It aims to set a specific philosophical tone or introduce a core concept."}, {"text": "To provide an example of Latin translation exercises.", "isCorrect": false, "rationale": "While it includes Latin, its primary function in a textbook chapter is not to serve as a language exercise, but to convey a significant conceptual message relevant to the chapter's topic."}]}, {"question": "In the context of Roman thought, 'Fides' (trust) was not merely a personal feeling but also a core societal virtue. Given this, what might Cicero imply about the societal implications of lacking 'fides'?", "options": [{"text": "That individuals could still maintain personal honor despite a lack of collective trust.", "isCorrect": false, "rationale": "In Roman society, personal honor ('dignitas') was often intertwined with adherence to public 'fides'. A general lack of collective trust would make it difficult for individuals to maintain personal honor within a fractured system."}, {"text": "That the state's military strength would be unaffected by societal trust levels.", "isCorrect": false, "rationale": "A breakdown of trust can affect all aspects of a state, including the cohesion and loyalty necessary for military strength and civic duty."}, {"text": "That the breakdown of social order and the inability to uphold agreements would inevitably follow.", "isCorrect": true, "rationale": "As a societal virtue, 'fides' underpinned public agreements, treaties, and the general social contract. Its absence would lead to widespread unreliability, breaking down the mechanisms through which a society functions and maintains order."}, {"text": "That economic prosperity would flourish due to increased competition.", "isCorrect": false, "rationale": "A lack of trust would hinder trade, investment, and contractual relations, leading to economic instability and decline rather than prosperity, as fair exchange is a form of justice."}]}, {"question": "How does Cicero's ancient assertion, 'Trust is the foundation of justice,' continue to resonate in contemporary discussions about societal institutions like legal systems or governments?", "options": [{"text": "It suggests that modern societies have successfully moved beyond the need for trust in their systems.", "isCorrect": false, "rationale": "The quote's enduring relevance indicates that the need for trust has not been transcended; instead, its importance is continually recognized in maintaining functional institutions."}, {"text": "It highlights that public confidence and belief in the fairness of institutions are crucial for their legitimacy and stability.", "isCorrect": true, "rationale": "In modern societies, the effectiveness of legal systems and governments relies heavily on the public's trust that these institutions are fair, impartial, and operate justly. Without this trust, their legitimacy and stability are undermined."}, {"text": "It implies that only personal, individual trust matters, not institutional trust.", "isCorrect": false, "rationale": "While personal trust is vital, 'justice' in this context applies to broader societal and institutional frameworks, implying that institutional trust is equally, if not more, crucial for the system to function."}, {"text": "It primarily serves as a historical curiosity with little practical application today.", "isCorrect": false, "rationale": "The question asks about its resonance, indicating ongoing relevance. The principle that trust underpins fairness and stability remains highly pertinent in contemporary governance and societal relations."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
