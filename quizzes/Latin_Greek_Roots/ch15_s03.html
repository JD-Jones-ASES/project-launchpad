        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 15, Section 3</div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what does an 'explanation' described as 'lucid' primarily convey?", "options": [{"text": "It is visually appealing and colorful.", "isCorrect": false, "rationale": "While 'illuminators' used vivid colors, the word 'lucid' specifically refers to clarity and understanding, not visual aesthetics."}, {"text": "It is exceptionally clear, bright, and easy to understand.", "isCorrect": true, "rationale": "The text states that 'lucid' comes from 'lucidus' meaning 'bright' or 'clear,' and when an explanation is lucid, 'it is so clear that it seems to shine.'"}, {"text": "It refers to a physical source of light, like a lamp.", "isCorrect": false, "rationale": "The Latin word 'lux' means 'light' and 'lumen' refers to a lamp, but 'lucid' is a derivative focusing on mental clarity, not a physical object."}, {"text": "It has a gentle, polished shine, like metal or a pearl.", "isCorrect": false, "rationale": "This description aligns with 'luster,' which comes from the root 'lustrare,' not 'lucid.'"}]}, {"question": "A physicist is describing the light emitted by a newly discovered star, while an art historian is discussing the finish on ancient polished pottery. Which pair of words, derived from the given roots, would best suit their respective descriptions?", "options": [{"text": "Luminous (star), Lustrous (pottery)", "isCorrect": true, "rationale": "'Luminous' describes something that glows with its own light, fitting for a star. 'Lustrous' (from 'luster') describes the gentle shine of polished material like pottery."}, {"text": "Lucid (star), Illustrated (pottery)", "isCorrect": false, "rationale": "'Lucid' refers to clarity of thought, not light emission. 'Illustrated' means to add pictures or examples to text, not describe a finish."}, {"text": "Illuminated (star), Elucidated (pottery)", "isCorrect": false, "rationale": "'Illuminated' means to have light shone upon it or to bring understanding. 'Elucidated' means to bring an idea into the light of reason. Neither fits the direct emission or surface shine context well."}, {"text": "Transparent (star), Translucent (pottery)", "isCorrect": false, "rationale": "These terms describe how light passes *through* an object and how clearly one can see through it, not how something emits light or shines on its surface."}]}, {"question": "When the text states that 'to illuminate means to “shine light into” a place—or, by metaphor, to bring understanding to a difficult idea,' which of the following scenarios best exemplifies the metaphorical usage?", "options": [{"text": "A stage crew positions spotlights to highlight the actors during a play.", "isCorrect": false, "rationale": "This describes the literal meaning of 'shining light into' a place."}, {"text": "A teacher uses a simple analogy to explain a complex concept in quantum physics to their students.", "isCorrect": true, "rationale": "This scenario directly aligns with the metaphorical meaning of 'to bring understanding to a difficult idea,' using a tool (analogy) to clarify complexity."}, {"text": "A person lights several candles to dispel the darkness in a power outage.", "isCorrect": false, "rationale": "This is a literal act of creating light in a physical space, not clarifying an abstract concept."}, {"text": "An artist carefully applies gold leaf to the initial letter of a medieval manuscript page.", "isCorrect": false, "rationale": "While this relates to 'illuminators' making pages 'glow,' it's about visual enhancement of a text, not primarily bringing understanding to an *idea* in the same metaphorical sense as clarifying a concept."}]}, {"question": "Why were medieval monks who painted handwritten manuscripts called 'illuminators'?", "options": [{"text": "They were believed to have been divinely inspired to write.", "isCorrect": false, "rationale": "While they might have been inspired, the text explicitly states the reason for their title, and it's not related to divine inspiration."}, {"text": "They used vivid colors and gold leaf to make the pages glow and stand out.", "isCorrect": true, "rationale": "The text clearly states, 'Medieval monks who painted gold leaf and vivid colors into handwritten manuscripts were called illuminators because they made the pages glow.'"}, {"text": "They were responsible for translating ancient texts, thereby 'enlightening' readers.", "isCorrect": false, "rationale": "Their role was specifically tied to the visual enhancement of manuscripts, making them 'glow,' not primarily translation or enlightenment in that sense."}, {"text": "They developed new techniques for binding books that made them physically lighter.", "isCorrect": false, "rationale": "The text makes no mention of bookbinding techniques or physical lightness in relation to the term 'illuminator.'"}]}, {"question": "Before its association with the devil in Christian tradition, what did the name Lucifer signify to the Romans?", "options": [{"text": "A legendary Roman hero who carried the Olympic torch.", "isCorrect": false, "rationale": "The text does not mention any Roman hero or torch-bearer by this name."}, {"text": "A person appointed to light fires for public gatherings.", "isCorrect": false, "rationale": "While Lucifer means 'light-bearer,' its specific Roman reference was not to a person performing this task."}, {"text": "The planet Venus, known as the morning star that 'carries light' before dawn.", "isCorrect": true, "rationale": "The text explicitly states, 'Before it became associated with the devil in Christian tradition, Lucifer was simply the Roman name for the morning star—the planet Venus, which “carries light” into the sky just before dawn.'"}, {"text": "A constellation representing a mythological deity of light.", "isCorrect": false, "rationale": "It was specifically the morning star (Venus), not a generic constellation or deity."}]}, {"question": "A scientist is designing a new material for privacy screens. They want light to pass through, but without allowing clear visibility of what's on the other side, much like frosted glass. Which property should the material ideally possess?", "options": [{"text": "Transparent", "isCorrect": false, "rationale": "A transparent object allows one to see *right through* it clearly, which is the opposite of the desired effect for privacy."}, {"text": "Luminous", "isCorrect": false, "rationale": "A luminous object emits its own light, which is unrelated to the property of allowing light to pass through while obscuring vision."}, {"text": "Translucent", "isCorrect": true, "rationale": "The text explains that a translucent object 'lets light pass through it... but you cannot see clearly to the other side—think of frosted glass.' This perfectly matches the desired property."}, {"text": "Lustrous", "isCorrect": false, "rationale": "Lustrous describes a gentle shine or gloss, which is not relevant to how clearly one can see through a material."}]}, {"question": "Consider the words 'illustrate' and 'elucidate.' Both derive from roots related to 'making bright,' but they differ in nuance. Which statement best captures this difference as presented in the text?", "options": [{"text": "'Illustrate' refers to shining with internal light, while 'elucidate' refers to reflecting external light.", "isCorrect": false, "rationale": "This distinction is more applicable to 'luminous' vs. 'luster,' not 'illustrate' and 'elucidate'."}, {"text": "'Illustrate' primarily involves visual enhancement or providing examples, while 'elucidate' focuses on clarifying an idea through reason.", "isCorrect": true, "rationale": "The text states 'to illustrate originally meant to “light up” a text with pictures or examples,' and 'to elucidate a problem is to bring it “out of darkness” into the light of reason (e- = out + lucidare = to make clear).'"}, {"text": "'Illustrate' means to purify an object, whereas 'elucidate' means to create a gentle glow.", "isCorrect": false, "rationale": "'Lustrare' means to purify, but 'illustrate' is about adding pictures/examples. 'Elucidate' is about clarity, not a 'gentle glow'."}, {"text": "'Illustrate' is about creating a physical glow, while 'elucidate' is about making something visually transparent.", "isCorrect": false, "rationale": "Neither word is about making something physically transparent. 'Illustrate' is about adding visual aids or examples, and 'elucidate' is about intellectual clarity."}]}, {"question": "The opening paragraph mentions that 'The Romans lived by firelight.' What historical context does this detail primarily establish for the discussion of words like `lux`?", "options": [{"text": "It highlights the Romans' advanced knowledge of pyrotechnics and fire management.", "isCorrect": false, "rationale": "The text does not discuss Roman pyrotechnics or fire management expertise; it focuses on their reliance on light sources."}, {"text": "It explains their pervasive reliance on non-electrical light sources, making the concept of 'light' deeply ingrained and central to their lives and language.", "isCorrect": true, "rationale": "The paragraph explains that 'Before electricity, the world after sunset belonged to oil lamps, torches, and candles,' directly linking this reliance to the significance of 'light' in their language."}, {"text": "It suggests a spiritual connection between Roman culture and the element of fire.", "isCorrect": false, "rationale": "While such a connection might exist, the text uses this detail to explain the practical and linguistic importance of 'light,' not its spiritual dimension."}, {"text": "It describes their methods for defense and security against nocturnal threats.", "isCorrect": false, "rationale": "The text focuses on daily life and language, not defense strategies."}]}, {"question": "A scientist is presenting complex research findings to a general audience. To ensure the audience grasps the intricate details, they should strive to make their presentation:", "options": [{"text": "Luminous", "isCorrect": false, "rationale": "Luminous means emitting light, which doesn't apply to the clarity of a presentation."}, {"text": "Translucent", "isCorrect": false, "rationale": "Translucent describes allowing light through but without clear visibility, which is unrelated to making a presentation understandable."}, {"text": "Lucid", "isCorrect": true, "rationale": "A 'lucid' explanation is one that is 'so clear that it seems to shine,' making it perfectly suitable for ensuring a general audience understands complex findings."}, {"text": "Lustrous", "isCorrect": false, "rationale": "Lustrous refers to a gentle shine, which is an aesthetic quality and not directly related to the comprehension of a presentation's content."}]}, {"question": "Which of the following situations *least* aligns with the core meaning and metaphorical extensions of the Latin roots `luc`, `lum`, or `lus` as described in the text?", "options": [{"text": "A philosopher clarifying a deep, abstract concept for their students using simple analogies.", "isCorrect": false, "rationale": "This aligns with 'lucid' and 'elucidate,' which refer to bringing clarity and understanding (light of reason) to complex ideas."}, {"text": "A polished silver statue gleaming softly under gallery lights, admired for its finish.", "isCorrect": false, "rationale": "This aligns with 'luster,' describing a gentle shine of polished metal."}, {"text": "A dense fog completely obscuring visibility on a highway, making travel hazardous.", "isCorrect": true, "rationale": "This situation represents a lack of light, clarity, and visibility, directly opposing the core meanings of light, brightness, and clarity derived from 'lux,' 'lumen,' and 'lustrare.'"}, {"text": "A bioluminescent organism glowing with its own light in the dark ocean depths.", "isCorrect": false, "rationale": "This directly aligns with 'luminous,' describing something that glows with its own light."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
