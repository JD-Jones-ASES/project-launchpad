<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words from the Ancients: Latin &amp; Greek Roots &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 17</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What do the Latin roots vit and viv both mean?", "options": [{"text": "death", "isCorrect": false, "rationale": "Death is the meaning of mort/mor, the opposite root family."}, {"text": "life", "isCorrect": true, "rationale": "Both vit (from vita) and viv (from vivere) mean 'life' or 'to live' in Latin."}, {"text": "light", "isCorrect": false, "rationale": "Light is not the meaning of vit or viv."}, {"text": "earth", "isCorrect": false, "rationale": "Earth is the meaning of geo or terr, not vit/viv."}]}, {"question": "Which word means 'absolutely essential to life'?", "options": [{"text": "vivid", "isCorrect": false, "rationale": "Vivid means intensely bright or lifelike, not essential to life."}, {"text": "convivial", "isCorrect": false, "rationale": "Convivial means friendly and lively, not essential to life."}, {"text": "vital", "isCorrect": true, "rationale": "Vital comes from vit (life) + -al (relating to), meaning absolutely necessary or essential to life."}, {"text": "viable", "isCorrect": false, "rationale": "Viable means capable of surviving or working, not essential in the same sense."}]}, {"question": "The prefix sur- in the word survive means which of the following?", "options": [{"text": "before", "isCorrect": false, "rationale": "Before is the meaning of pre-, as in preview."}, {"text": "together", "isCorrect": false, "rationale": "Together is the meaning of con-, as in convivial."}, {"text": "again", "isCorrect": false, "rationale": "Again is the meaning of re-, as in revive."}, {"text": "beyond or over", "isCorrect": true, "rationale": "Sur- means 'beyond' or 'over,' so survive literally means to live beyond a danger."}]}, {"question": "A scientist named Casimir Funk invented the word vitamin in 1912. Which two parts make up this word?", "options": [{"text": "vit (life) + amine (a type of chemical compound)", "isCorrect": true, "rationale": "Funk combined the Latin root vita (life) with amine (a chemical compound), believing vitamins were vital amines essential for life."}, {"text": "viv (to live) + min (small)", "isCorrect": false, "rationale": "This is not the correct origin. Vitamin does not come from viv or the word min."}, {"text": "vita (life) + man (human)", "isCorrect": false, "rationale": "Vitamin does not contain the word man."}, {"text": "vit (life) + animal", "isCorrect": false, "rationale": "Vitamin does not contain the word animal."}]}, {"question": "Which word best describes a person who is full of energy, animation, and liveliness?", "options": [{"text": "vital", "isCorrect": false, "rationale": "Vital means essential to life, not specifically full of energy in personality."}, {"text": "viable", "isCorrect": false, "rationale": "Viable means capable of surviving or working successfully."}, {"text": "vivacious", "isCorrect": true, "rationale": "Vivacious comes from viv (to live) + -acious (full of), meaning attractively lively and animated."}, {"text": "revived", "isCorrect": false, "rationale": "Revived means brought back to life, not a personality trait describing ongoing liveliness."}]}, {"question": "The word convivial comes from con- + viv + -ial. What does con- mean in this word?", "options": [{"text": "not", "isCorrect": false, "rationale": "Not is the meaning of in- or im-, not con-."}, {"text": "against", "isCorrect": false, "rationale": "Against is often the meaning of anti- or contra-, not con-."}, {"text": "together", "isCorrect": true, "rationale": "Con- means 'together,' so convivial literally means 'living together' — describing a friendly, lively gathering."}, {"text": "around", "isCorrect": false, "rationale": "Around is the meaning of circum-, not con-."}]}, {"question": "If a doctor says that a patient's vital signs are being monitored, what does she most likely mean?", "options": [{"text": "The patient is extremely cheerful and talkative.", "isCorrect": false, "rationale": "Cheerfulness is not what vital signs refers to."}, {"text": "The patient needs vitamins urgently.", "isCorrect": false, "rationale": "Vital signs do not refer to vitamin levels."}, {"text": "The measurements essential for sustaining life, such as pulse and breathing, are being tracked.", "isCorrect": true, "rationale": "Vital signs are measurements essential to life (vit = life), like heart rate, blood pressure, and breathing."}, {"text": "The patient is vivacious and recovering quickly.", "isCorrect": false, "rationale": "Vivacious describes personality, not medical measurements."}]}, {"question": "Which word means 'capable of living or working successfully'?", "options": [{"text": "vivid", "isCorrect": false, "rationale": "Vivid means intensely bright or lifelike, not capable of surviving."}, {"text": "viable", "isCorrect": true, "rationale": "Viable comes from vi (life) + -able (capable of), meaning capable of living or working successfully."}, {"text": "vitamin", "isCorrect": false, "rationale": "Vitamin is a nutrient essential for health, not a word meaning capable of surviving."}, {"text": "convivial", "isCorrect": false, "rationale": "Convivial means friendly and lively, not capable of surviving."}]}, {"question": "A painter creates a vivid portrait. What does vivid tell us about the painting?", "options": [{"text": "It is very old and historic.", "isCorrect": false, "rationale": "Age is not what vivid describes."}, {"text": "It is intensely bright, clear, and full of life.", "isCorrect": true, "rationale": "Vivid comes from viv (to live) + -id (having the quality of), meaning so bright and intense it seems alive."}, {"text": "It is a portrait of someone who has died.", "isCorrect": false, "rationale": "Vivid describes the quality of brightness and life, not the subject matter."}, {"text": "It is a self-portrait.", "isCorrect": false, "rationale": "Vivid says nothing about who the subject is."}]}, {"question": "Which pair of root families forms a natural contrast, one meaning life and the other meaning death?", "options": [{"text": "vit/viv and geo/graph", "isCorrect": false, "rationale": "Geo/graph relate to earth and writing, not death."}, {"text": "vit/viv and mort/mor", "isCorrect": true, "rationale": "Vit/viv means life (vital, vivid) while mort/mor means death (mortal, mortify). They are natural opposites."}, {"text": "vit/viv and jus/jur", "isCorrect": false, "rationale": "Jus/jur relates to law and justice, not death."}, {"text": "vit/viv and cred", "isCorrect": false, "rationale": "Cred relates to belief and trust, not death."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
