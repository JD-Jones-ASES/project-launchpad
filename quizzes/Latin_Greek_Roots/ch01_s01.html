<script>
var QUESTIONS = [{"question": "What is the central assertion Cicero makes about eloquence in the provided epigraph?", "options": [{"text": "Eloquence is a skill primarily for lawyers and politicians.", "isCorrect": false, "rationale": "While eloquence is important in these professions, the statement 'one of the highest virtues' suggests a broader, more fundamental importance, not limited to specific careers."}, {"text": "Eloquence is considered one of the most important human excellences.", "isCorrect": true, "rationale": "The translation 'one of the highest virtues' directly indicates that Cicero regards eloquence as a significant and esteemed quality among human capabilities, making it a form of excellence."}, {"text": "Eloquence is an inherent trait rather than a learned virtue.", "isCorrect": false, "rationale": "The term 'virtue' (virtutibus) in this context typically implies a cultivated or acquired excellence, not solely an innate characteristic."}, {"text": "Eloquence is a rare quality possessed by very few individuals.", "isCorrect": false, "rationale": "The epigraph speaks to the *status* of eloquence as a virtue, not its prevalence or rarity among the population."}]}, {"question": "Given its placement as an epigraph, what is the most likely function of Cicero's quote at the beginning of a textbook section?", "options": [{"text": "To provide a historical example of ancient Roman literature.", "isCorrect": false, "rationale": "While the quote is indeed a historical literary example, the primary function of an epigraph is generally not just historical illustration but thematic introduction."}, {"text": "To introduce a foundational theme or set the intellectual tone for the ensuing content.", "isCorrect": true, "rationale": "Epigraphs are typically used to foreshadow the main subject matter, establish the author's perspective, or provoke thought relevant to the chapter's topics, thus setting the tone."}, {"text": "To challenge readers to debate the definition of eloquence.", "isCorrect": false, "rationale": "The quote makes a direct assertion about eloquence's value, rather than posing it as a question or an invitation to immediate debate on its definition."}, {"text": "To offer a Latin vocabulary lesson to the reader.", "isCorrect": false, "rationale": "Although Latin is present, the primary purpose of an epigraph in this context is unlikely to be a linguistic lesson, especially with the provided translation."}]}, {"question": "When Cicero states eloquence is 'one of the highest virtues,' what does this imply about its value in the context of human capabilities?", "options": [{"text": "It signifies that eloquence is superior to all other virtues.", "isCorrect": false, "rationale": "The phrase 'one of the highest' indicates it is among the top virtues, but not necessarily above all others. It suggests a peer status with other great virtues."}, {"text": "It suggests eloquence is a desirable quality essential for effective communication and perhaps public life.", "isCorrect": true, "rationale": "By labeling eloquence as a 'highest virtue,' Cicero elevates its importance, implying it is highly desirable and likely crucial for influencing others, which is often essential in public and civic engagement."}, {"text": "It limits the importance of eloquence to aesthetic appreciation.", "isCorrect": false, "rationale": "A 'virtue' encompasses more than just aesthetics; it refers to moral and intellectual excellence, implying practical significance beyond mere beauty of language."}, {"text": "It prioritizes emotional expression over logical argumentation.", "isCorrect": false, "rationale": "Eloquence, especially in the classical tradition, involves both logical persuasion (logos) and emotional appeal (pathos), among other elements. The quote does not prioritize one over the other."}]}, {"question": "Based on Cicero's view, which academic or professional field would most directly align with and foster the 'highest virtue' of eloquence?", "options": [{"text": "Engineering, focusing on precise technical specifications.", "isCorrect": false, "rationale": "While precision is valuable in engineering, the field's primary focus is typically technical design and problem-solving, not the cultivation of persuasive and artful speech."}, {"text": "Accounting, emphasizing accuracy and numerical data.", "isCorrect": false, "rationale": "Accounting prioritizes accuracy with financial data, which is distinct from the art of effective and persuasive verbal or written communication that defines eloquence."}, {"text": "Rhetoric and Communication Studies, focusing on persuasive and effective speech.", "isCorrect": true, "rationale": "Rhetoric and Communication Studies are disciplines specifically dedicated to the theory and practice of eloquent speech and writing, aligning perfectly with Cicero's emphasis on eloquence as a high virtue."}, {"text": "Culinary arts, emphasizing practical skill and sensory experience.", "isCorrect": false, "rationale": "Culinary arts involve practical skills and sensory engagement with food, which does not directly foster the development of verbal or written eloquence."}]}, {"question": "From which work by Cicero is the epigraph taken, as cited in the text?", "options": [{"text": "Rhetorica ad Herennium", "isCorrect": false, "rationale": "While a foundational text on rhetoric, it is not attributed to Cicero in the provided citation, and its authorship is debated."}, {"text": "De Oratore", "isCorrect": true, "rationale": "The citation explicitly states '— Cicero, De Oratore, I.17,' clearly identifying the source work."}, {"text": "Institutio Oratoria", "isCorrect": false, "rationale": "This influential work on rhetoric was written by Quintilian, not Cicero."}, {"text": "The Republic", "isCorrect": false, "rationale": "While Cicero did write a work titled 'De re publica' (On the Republic), the provided citation specifically names 'De Oratore' as the source for this epigraph."}]}, {"question": "In the original Latin phrase 'Est enim eloquentia una quaedam de summis virtutibus,' what grammatical role does 'eloquentia' play?", "options": [{"text": "It is the direct object of the verb.", "isCorrect": false, "rationale": "As a nominative noun preceding a form of 'esse' (to be), 'eloquentia' is not receiving the action of a transitive verb, thus it is not a direct object."}, {"text": "It functions as a possessive noun.", "isCorrect": false, "rationale": "'Eloquentia' is in the nominative case, not the genitive case, which would indicate possession."}, {"text": "It serves as the subject of the sentence.", "isCorrect": true, "rationale": "In the sentence 'Est enim eloquentia...', 'eloquentia' is a nominative singular noun that performs the action of the verb 'est' (is), making it the subject."}, {"text": "It acts as an adverb modifying the verb.", "isCorrect": false, "rationale": "'Eloquentia' is clearly a noun, not a word that describes or modifies a verb, adjective, or another adverb."}]}, {"question": "If a modern political leader embraced Cicero's view, which statement would best reflect their approach to public discourse?", "options": [{"text": "They would focus exclusively on presenting facts and figures, avoiding emotional appeals.", "isCorrect": false, "rationale": "Classical eloquence, as championed by Cicero, often integrates both logical arguments and appropriate emotional appeals for effective persuasion, rather than avoiding emotions entirely."}, {"text": "They would prioritize clarity, persuasion, and the elegant articulation of ideas to influence their audience.", "isCorrect": true, "rationale": "Embracing eloquence as a 'highest virtue' would lead a leader to value and cultivate masterful communication skills, focusing on clear, persuasive, and well-articulated speech to effectively lead and influence."}, {"text": "They would delegate all speechwriting to specialists, believing their own speaking style is secondary.", "isCorrect": false, "rationale": "While specialists may assist, a leader who values eloquence as a personal virtue would likely take direct interest in, and actively cultivate, their own speaking abilities and style, not merely delegate it completely."}, {"text": "They would argue that sincerity is the only true measure of a speaker's worth, regardless of their delivery.", "isCorrect": false, "rationale": "While sincerity is valuable, Cicero's emphasis on eloquence implies that *how* something is said (delivery, style, structure) is also a critical component of a speaker's worth, not just the content or intent."}]}, {"question": "Considering *De Oratore* is a treatise on oratory, what broader message is implied by starting a section with this epigraph about eloquence?", "options": [{"text": "That the historical context of Roman oratory is irrelevant to modern communication.", "isCorrect": false, "rationale": "An epigraph from a classical work often suggests its enduring relevance and foundational importance to the subject, rather than its irrelevance."}, {"text": "That the study of effective communication is a pursuit of profound moral and intellectual significance.", "isCorrect": true, "rationale": "By associating eloquence with 'highest virtues' in a work dedicated to oratory, Cicero elevates the act of communication from mere skill to an endeavor with significant moral, intellectual, and civic implications."}, {"text": "That ancient rhetoric is primarily concerned with entertainment rather than civic duty.", "isCorrect": false, "rationale": "In ancient Rome, oratory, especially as discussed by Cicero, was intrinsically linked to civic duty, law, and politics, not primarily entertainment."}, {"text": "That verbal dexterity is a natural gift and cannot be taught or improved.", "isCorrect": false, "rationale": "A treatise like *De Oratore* is written precisely to instruct and guide readers on how to *cultivate* and *improve* their oratorical skills, implying they are not solely innate."}]}, {"question": "Based solely on this epigraph, which subject is the accompanying textbook section most likely to explore in depth?", "options": [{"text": "Ancient Roman history and politics.", "isCorrect": false, "rationale": "While the author is Roman, the quote's direct focus is on eloquence as a virtue, not broadly on Roman history or politics themselves."}, {"text": "The principles and practice of effective communication and rhetoric.", "isCorrect": true, "rationale": "The epigraph directly addresses 'eloquence' and its status as a 'highest virtue,' making it a natural introduction to a section exploring the art and principles of communication, rhetoric, or public speaking."}, {"text": "Philosophical ethics and the definition of virtues.", "isCorrect": false, "rationale": "Although 'virtues' are mentioned, the specific focus is on *eloquence* as a virtue, suggesting a more specific topic than general philosophical ethics."}, {"text": "Linguistic analysis of Latin sentence structure.", "isCorrect": false, "rationale": "The presence of a Latin phrase and its translation is contextual; the primary message about eloquence is thematic, not a prompt for deep linguistic analysis of Latin itself."}]}, {"question": "The Latin phrase 'una quaedam' translates to 'indeed one' or 'a certain one.' What nuance does this add to Cicero's statement about eloquence?", "options": [{"text": "It suggests that eloquence is an ambiguous concept, difficult to define.", "isCorrect": false, "rationale": "The phrase 'una quaedam' doesn't imply ambiguity; rather, it identifies eloquence as a specific, clear entity among others."}, {"text": "It emphasizes that eloquence is merely one among several significant virtues, not necessarily the sole or ultimate one.", "isCorrect": true, "rationale": "The inclusion of 'una quaedam' (indeed one, or a certain one) clarifies that while eloquence holds a high status, it is a member of a select group of virtues, not the singular or supreme virtue, allowing for the existence of other 'highest virtues.'"}, {"text": "It implies that eloquence is a distinctly Roman virtue, not universal.", "isCorrect": false, "rationale": "The phrase 'una quaedam' (a certain one) does not carry a connotation of cultural exclusivity; it simply specifies 'one' from a set."}, {"text": "It diminishes the overall importance of eloquence compared to other virtues.", "isCorrect": false, "rationale": "By calling it 'one of the highest virtues,' its importance is affirmed. 'Una quaedam' merely places it within a distinguished group, without diminishing its high status."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
