<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words from the Ancients: Latin &amp; Greek Roots &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 22, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does 'geography' literally mean?", "options": [{"text": "Earth measurement", "isCorrect": false, "rationale": "That is geometry."}, {"text": "Writing/description of the earth", "isCorrect": true, "rationale": "geo + graphy."}, {"text": "Drawing of light", "isCorrect": false, "rationale": "That is photography."}, {"text": "Study of rocks", "isCorrect": false, "rationale": "That is geology."}]}, {"question": "How does 'geology' differ from 'geography'?", "options": [{"text": "Geology uses '-logy'; geography uses '-graphy'", "isCorrect": true, "rationale": "Different suffixes, same root."}, {"text": "Same suffix, different roots", "isCorrect": false, "rationale": "Share geo, differ in suffix."}, {"text": "One Latin, one Greek", "isCorrect": false, "rationale": "Both Greek."}, {"text": "No difference", "isCorrect": false, "rationale": "Different fields."}]}, {"question": "'Geometry' = geo + metron. What does this suggest?", "options": [{"text": "Drawing pictures", "isCorrect": false, "rationale": "Drawing = graph."}, {"text": "Began as land measurement", "isCorrect": true, "rationale": "Earth-measuring."}, {"text": "Ancient music", "isCorrect": false, "rationale": "Different."}, {"text": "Underground caves", "isCorrect": false, "rationale": "Different."}]}, {"question": "What does 'photograph' mean?", "options": [{"text": "Earth drawing", "isCorrect": false, "rationale": "Earth = geo."}, {"text": "Image created by capturing light", "isCorrect": true, "rationale": "photos (light) + graph (draw)."}, {"text": "Message sent far", "isCorrect": false, "rationale": "That is telegram."}, {"text": "Signature", "isCorrect": false, "rationale": "That is autograph."}]}, {"question": "What does 'diagram' mean?", "options": [{"text": "Message across distances", "isCorrect": false, "rationale": "That is telegram."}, {"text": "Drawing that explains how something works", "isCorrect": true, "rationale": "dia- (through) + gram (drawn)."}, {"text": "Photo from above", "isCorrect": false, "rationale": "Different."}, {"text": "Written language", "isCorrect": false, "rationale": "Different."}]}, {"question": "What was a 'telegram'?", "options": [{"text": "Distant landscape drawing", "isCorrect": false, "rationale": "Relates to geography."}, {"text": "Message sent over long distances by electrical signals", "isCorrect": true, "rationale": "tele- (far) + gram (written)."}, {"text": "Telescope photograph", "isCorrect": false, "rationale": "Different."}, {"text": "Foreign language letter", "isCorrect": false, "rationale": "Different."}]}, {"question": "What does 'graphic' mean?", "options": [{"text": "Relating to time", "isCorrect": false, "rationale": "Time = chron."}, {"text": "Relating to visual art, drawing, or vivid description", "isCorrect": true, "rationale": "graph + -ic (relating to)."}, {"text": "Relating to sound", "isCorrect": false, "rationale": "Sound = phon."}, {"text": "Relating to water", "isCorrect": false, "rationale": "Water = hydr."}]}, {"question": "What does 'autograph' mean?", "options": [{"text": "Self-driving car", "isCorrect": false, "rationale": "Autograph = self + write = signature."}, {"text": "A person's own signature or handwriting", "isCorrect": true, "rationale": "auto- (self) + graph (write)."}, {"text": "Automatic writing machine", "isCorrect": false, "rationale": "Refers to personal handwriting."}, {"text": "Self-portrait photo", "isCorrect": false, "rationale": "That is a selfie."}]}, {"question": "Which two share 'geo'?", "options": [{"text": "Photograph and autograph", "isCorrect": false, "rationale": "Both use graph, not geo."}, {"text": "Geography and geology", "isCorrect": true, "rationale": "Both contain geo."}, {"text": "Diagram and telegram", "isCorrect": false, "rationale": "Both use gram."}, {"text": "Graphic and autograph", "isCorrect": false, "rationale": "Both use graph."}]}, {"question": "Which two share 'gram'?", "options": [{"text": "Geography and geology", "isCorrect": false, "rationale": "Share geo."}, {"text": "Diagram and telegram", "isCorrect": true, "rationale": "Both contain gram."}, {"text": "Photograph and autograph", "isCorrect": false, "rationale": "Share graph, not gram."}, {"text": "Geometry and graphic", "isCorrect": false, "rationale": "Don't share gram."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
