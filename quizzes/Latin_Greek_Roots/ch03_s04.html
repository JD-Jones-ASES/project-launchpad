<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words from the Ancients: Latin &amp; Greek Roots &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 3, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the core meaning of the root 'aud' that unites all words in this family?", "options": [{"text": "To speak", "isCorrect": false, "rationale": "Speaking involves producing sound, but 'aud' relates to the reception of sound."}, {"text": "To hear", "isCorrect": true, "rationale": "Every word in the family derives from 'aud,' meaning 'to hear.'"}, {"text": "To watch", "isCorrect": false, "rationale": "Watching relates to sight. 'aud' is about perceiving sound."}, {"text": "To gather", "isCorrect": false, "rationale": "While an audience is a gathered group, the root meaning is 'to hear.'"}]}, {"question": "Which suffix in 'auditorium' indicates it is a place?", "options": [{"text": "-ium", "isCorrect": false, "rationale": "The full suffix is '-orium,' meaning 'place for.'"}, {"text": "-orium", "isCorrect": true, "rationale": "'-orium' means 'place for,' making auditorium a 'place for hearing.'"}, {"text": "-ible", "isCorrect": false, "rationale": "'-ible' means 'able to be' and appears in 'audible.'"}, {"text": "-ience", "isCorrect": false, "rationale": "'-ience' means 'state of' and appears in 'audience.'"}]}, {"question": "What is the literal morpheme breakdown of 'inaudible'?", "options": [{"text": "in- (into) + aud (to hear) + -ible (able to be)", "isCorrect": false, "rationale": "'in-' here means 'not,' not 'into.'"}, {"text": "in- (not) + aud (to hear) + -ible (able to be)", "isCorrect": true, "rationale": "Inaudible = in- (not) + aud (to hear) + -ible (able to be), meaning 'too quiet to be heard.'"}, {"text": "in- (not) + audit (to hear) + -ble (capable)", "isCorrect": false, "rationale": "The root form is 'aud,' not 'audit,' and the suffix is '-ible.'"}, {"text": "in- (not) + aud (to speak) + -ible (able to be)", "isCorrect": false, "rationale": "'aud' means 'to hear,' not 'to speak.'"}]}, {"question": "The word 'audit' originally meant 'a hearing of accounts.' What does this reveal?", "options": [{"text": "Records were carved into stone.", "isCorrect": false, "rationale": "The connection to 'hearing' suggests an oral process."}, {"text": "Accounts were read aloud and listened to for accuracy.", "isCorrect": true, "rationale": "The root 'audit' (to hear) reveals that financial records were reviewed by being read aloud."}, {"text": "Examiners used musical instruments.", "isCorrect": false, "rationale": "No connection between auditing and music."}, {"text": "Records were kept secret.", "isCorrect": false, "rationale": "'Audit' implies accounts were made audible."}]}, {"question": "Which word uses '-ience' meaning 'state of'?", "options": [{"text": "Audition", "isCorrect": false, "rationale": "Audition uses '-ion' (act of)."}, {"text": "Audible", "isCorrect": false, "rationale": "Audible uses '-ible' (able to be)."}, {"text": "Audience", "isCorrect": true, "rationale": "Audience = aud + -ience (state of), a group in the state of hearing."}, {"text": "Auditorium", "isCorrect": false, "rationale": "Auditorium uses '-orium' (place for)."}]}, {"question": "What does 'audition' literally mean?", "options": [{"text": "The place for performing", "isCorrect": false, "rationale": "'Place for' uses '-orium.'"}, {"text": "The act of hearing", "isCorrect": true, "rationale": "Audition = audit (to hear) + -ion (act of)."}, {"text": "The ability to hear", "isCorrect": false, "rationale": "'Ability' uses '-ible.'"}, {"text": "The state of being heard", "isCorrect": false, "rationale": "'State of' uses '-ience.'"}]}, {"question": "What is the relationship between 'audible' and 'inaudible'?", "options": [{"text": "They are synonyms.", "isCorrect": false, "rationale": "They are antonyms. 'in-' reverses the meaning."}, {"text": "They are antonyms created by 'in-' meaning 'not.'", "isCorrect": true, "rationale": "'in-' means 'not,' making inaudible the direct opposite of audible."}, {"text": "Inaudible is a more intense form.", "isCorrect": false, "rationale": "'in-' negates rather than intensifies."}, {"text": "They describe the same concept differently.", "isCorrect": false, "rationale": "They describe opposite conditions."}]}, {"question": "Which definition matches 'auditorium'?", "options": [{"text": "A device that amplifies sound", "isCorrect": false, "rationale": "'-orium' denotes a place, not a device."}, {"text": "A large room designed for an audience to listen", "isCorrect": true, "rationale": "'-orium' = 'place for,' so auditorium = 'place for hearing.'"}, {"text": "A written record of accounts", "isCorrect": false, "rationale": "Relates to 'audit' in modern sense, not '-orium.'"}, {"text": "A trial performance", "isCorrect": false, "rationale": "That is 'audition.'"}]}, {"question": "A whisper was inaudible from the back. What does this mean?", "options": [{"text": "The student spoke clearly.", "isCorrect": false, "rationale": "Inaudible means the opposite."}, {"text": "The whisper was too quiet to be heard.", "isCorrect": true, "rationale": "Inaudible = not able to be heard."}, {"text": "The teacher was not paying attention.", "isCorrect": false, "rationale": "Inaudible describes sound level, not attention."}, {"text": "Unfamiliar words were used.", "isCorrect": false, "rationale": "Inaudible refers to volume, not comprehension."}]}, {"question": "Which pair shares the suffix '-ible'?", "options": [{"text": "Audience and auditorium", "isCorrect": false, "rationale": "'-ience' and '-orium' respectively."}, {"text": "Audible and inaudible", "isCorrect": true, "rationale": "Both share '-ible' (able to be)."}, {"text": "Audit and audition", "isCorrect": false, "rationale": "Neither uses '-ible.'"}, {"text": "Auditorium and audience", "isCorrect": false, "rationale": "Different suffixes."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
