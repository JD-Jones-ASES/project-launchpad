<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words from the Ancients: Latin &amp; Greek Roots &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 21</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the Greek root bio mean?", "options": [{"text": "water", "isCorrect": false, "rationale": "Water is the meaning of Greek hydr, not bio."}, {"text": "life or way of living", "isCorrect": true, "rationale": "Bio comes from Greek bios, meaning 'life' or 'way of living.'"}, {"text": "earth", "isCorrect": false, "rationale": "Earth is the meaning of Greek geo, not bio."}, {"text": "soul or mind", "isCorrect": false, "rationale": "Soul or mind is the meaning of Greek psych, not bio."}]}, {"question": "The Greek root logos had multiple meanings. Which of the following was NOT one of them?", "options": [{"text": "word", "isCorrect": false, "rationale": "Word is one of the meanings of logos."}, {"text": "reason", "isCorrect": false, "rationale": "Reason is one of the meanings of logos."}, {"text": "study (when used as -logy)", "isCorrect": false, "rationale": "When attached as -logy, logos means the study of something."}, {"text": "life", "isCorrect": true, "rationale": "Life is the meaning of bios, not logos. Logos meant word, reason, speech, or account."}]}, {"question": "Biology literally means 'the study of life.' Which two Greek roots combine to form this word?", "options": [{"text": "bio (life) + -logy (study of)", "isCorrect": true, "rationale": "Biology = bio (life, from Greek bios) + -logy (study of, from Greek logos). It is the scientific study of living organisms."}, {"text": "bio (nature) + -logy (writing)", "isCorrect": false, "rationale": "Bio means life (not nature) and -logy means study (not writing). Writing would be -graphy."}, {"text": "bi (two) + -ology (species)", "isCorrect": false, "rationale": "Bi means two and is not related to the bio root in biology."}, {"text": "bios (way) + logos (life)", "isCorrect": false, "rationale": "The meanings are reversed: bios means life and logos means word/study, not the other way around."}]}, {"question": "A biography is best described as:", "options": [{"text": "a scientific study of a plant or animal species", "isCorrect": false, "rationale": "A scientific study of a species would be a biological study, not a biography."}, {"text": "the written story of a person's life", "isCorrect": true, "rationale": "Biography = bio (life) + graphein (to write): the written account of someone's life."}, {"text": "a collection of words related to living things", "isCorrect": false, "rationale": "A collection of words would be a glossary or lexicon, not a biography."}, {"text": "a chart showing the life cycle of organisms", "isCorrect": false, "rationale": "A life cycle chart is a diagram, not a biography."}]}, {"question": "Ecology is the study of organisms and their environments. The first root in ecology is oikos, meaning:", "options": [{"text": "animal", "isCorrect": false, "rationale": "Animal is the root in zoology (from Greek zoion), not ecology."}, {"text": "house or habitat", "isCorrect": true, "rationale": "Ecology = oikos (house, habitat) + -logy: the study of living things in their home environments."}, {"text": "plant", "isCorrect": false, "rationale": "Plant relates to botany, not ecology."}, {"text": "food", "isCorrect": false, "rationale": "Food is not the meaning of oikos."}]}, {"question": "A eulogy is a speech given at a funeral. The prefix eu- in eulogy means:", "options": [{"text": "after", "isCorrect": false, "rationale": "After is the meaning of post-, not eu-."}, {"text": "about", "isCorrect": false, "rationale": "About is not the meaning of eu-."}, {"text": "good or well", "isCorrect": true, "rationale": "Eu- means 'good' or 'well.' A eulogy is literally a speech of 'good words' — praising someone, often at a funeral."}, {"text": "between", "isCorrect": false, "rationale": "Between is the meaning of dia-, as in dialogue."}]}, {"question": "The root -logy appears at the end of many words. When it appears this way, it always means:", "options": [{"text": "the practice of", "isCorrect": false, "rationale": "The practice of is not the standard meaning of -logy."}, {"text": "the study of", "isCorrect": true, "rationale": "When used as a suffix, -logy (from logos) means 'the study of': biology, theology, ecology, zoology."}, {"text": "the language of", "isCorrect": false, "rationale": "The language of is not the standard meaning of -logy."}, {"text": "the history of", "isCorrect": false, "rationale": "The history of is not the meaning of -logy; history relates to other roots."}]}, {"question": "How do the Greek root bio and the Latin root vit/viv differ in the kinds of words they produce?", "options": [{"text": "Bio creates words about death; vit/viv creates words about life.", "isCorrect": false, "rationale": "Both bio and vit/viv relate to life, not death."}, {"text": "Bio creates scientific and academic terms; vit/viv creates everyday words.", "isCorrect": true, "rationale": "Latin gave everyday words like vital and vivid; Greek gave scientific terms like biology and biography. This is a key pattern: Latin for daily life, Greek for specialized knowledge."}, {"text": "Bio creates Latin words; vit/viv creates Greek words.", "isCorrect": false, "rationale": "This is backwards: bio is Greek, vit/viv is Latin."}, {"text": "Bio and vit/viv produce identical word families with no differences.", "isCorrect": false, "rationale": "They produce very different word families used in different contexts."}]}, {"question": "A dialogue is a conversation between two or more people. Which Greek root in dialogue means 'between' or 'through'?", "options": [{"text": "-logue", "isCorrect": false, "rationale": "-Logue comes from logos, meaning speech or word, not between."}, {"text": "dia-", "isCorrect": true, "rationale": "Dia- means 'between' or 'through.' Dialogue = dia- (between) + logue (speech): a conversation passing between speakers."}, {"text": "log-", "isCorrect": false, "rationale": "Log means word or reason, not between."}, {"text": "bio-", "isCorrect": false, "rationale": "Bio means life, not between."}]}, {"question": "Theology is the study of the divine or the nature of God. Which Greek root is combined with -logy to make this word?", "options": [{"text": "bio (life)", "isCorrect": false, "rationale": "Bio (life) + logy = biology, not theology."}, {"text": "theos (god)", "isCorrect": true, "rationale": "Theology = theos (god) + -logy (study of): the study of the nature of God and religion."}, {"text": "geo (earth)", "isCorrect": false, "rationale": "Geo (earth) + logy = geology, not theology."}, {"text": "zoo (animal)", "isCorrect": false, "rationale": "Zoo (animal) + logy = zoology, not theology."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
