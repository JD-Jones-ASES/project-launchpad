<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words from the Ancients: Latin &amp; Greek Roots &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the Latin root 'dict' mean?", "options": [{"text": "to hear", "isCorrect": false, "rationale": "Hearing is the meaning of the root 'aud,' not 'dict.'"}, {"text": "to say, to tell, to declare", "isCorrect": true, "rationale": "The root 'dict' comes from Latin 'dicere' (to say or tell) and 'dictare' (to dictate)."}, {"text": "to write", "isCorrect": false, "rationale": "Writing is the meaning of the root 'scrib/script,' not 'dict.'"}, {"text": "to walk", "isCorrect": false, "rationale": "'To walk' is not the meaning of 'dict.' The root is about speaking and declaring."}], "id": "q01"}, {"question": "A 'verdict' in a courtroom literally means:", "options": [{"text": "a truly said judgment", "isCorrect": true, "rationale": "'Verdict' comes from Latin 'vere' (truly) + 'dictum' (said), meaning 'truly said' — the final, official word of a jury."}, {"text": "a written law", "isCorrect": false, "rationale": "A verdict is spoken, not primarily a written document, and its root is about saying, not writing."}, {"text": "a voice called out", "isCorrect": false, "rationale": "This would relate to the root 'voc,' not 'dict.' A verdict is about declaring, not calling."}, {"text": "a before-stated rule", "isCorrect": false, "rationale": "This would describe 'predict,' not 'verdict.' 'Vere' means truly, not before."}], "id": "q02"}, {"question": "If a king issues an 'edict,' what is he doing?", "options": [{"text": "Writing a personal letter", "isCorrect": false, "rationale": "An edict is an official spoken or proclaimed order, not a personal letter. Its root is 'dict' (to say), not 'scrib' (to write)."}, {"text": "Speaking out an official order or decree", "isCorrect": true, "rationale": "'Edict' comes from 'e-' (out) + 'dict' (to say), meaning an order officially spoken or declared aloud."}, {"text": "Revoking a previous decision", "isCorrect": false, "rationale": "Revoking uses the root 'vok' (to call back), not 'dict.' An edict is a new declaration, not a cancellation."}, {"text": "Hearing a report from an advisor", "isCorrect": false, "rationale": "Hearing relates to the root 'aud,' not 'dict.' An edict is something declared outward, not received."}], "id": "q03"}, {"question": "In ancient Rome, a 'dictator' was literally:", "options": [{"text": "a soldier who fought for the people", "isCorrect": false, "rationale": "A dictator's power came from speech and authority, not from military fighting. The root 'dict' means to say or declare."}, {"text": "one who speaks with absolute authority", "isCorrect": true, "rationale": "'Dictator' comes from 'dict' (to say) + '-or' (one who), meaning 'one who speaks or declares with authority.' In Rome, a dictator was an emergency ruler."}, {"text": "one who writes the laws", "isCorrect": false, "rationale": "Writing laws would relate to 'scrib/script,' not 'dict.' The dictator's power was in declaring, not writing."}, {"text": "a person who listens to the Senate", "isCorrect": false, "rationale": "Listening is the realm of the root 'aud,' not 'dict.' The dictator gave orders; he did not primarily listen."}], "id": "q04"}, {"question": "The word 'predict' uses the prefix 'pre-.' What does 'predict' mean?", "options": [{"text": "To say something officially in public", "isCorrect": false, "rationale": "Saying something officially in public is closer to an 'edict.' 'Predict' uses 'pre-' (before), not 'e-' (out)."}, {"text": "To speak against someone", "isCorrect": false, "rationale": "Speaking against someone describes 'contradict,' which uses 'contra-' (against), not 'pre-' (before)."}, {"text": "To say something before it happens", "isCorrect": true, "rationale": "'Predict' comes from 'pre-' (before) + 'dict' (to say), meaning to say what will happen before it occurs."}, {"text": "To take back a statement", "isCorrect": false, "rationale": "Taking back a statement relates to 'revoke' (root 'vok' + 're-') not 'predict.'"}], "id": "q05"}, {"question": "Which word means 'to say the opposite of what someone else has said'?", "options": [{"text": "edict", "isCorrect": false, "rationale": "An 'edict' is an official order or decree. It does not specifically mean to oppose what someone else says."}, {"text": "dictate", "isCorrect": false, "rationale": "'Dictate' means to speak words for another to write down, or to give orders. It does not mean to say the opposite."}, {"text": "contradict", "isCorrect": true, "rationale": "'Contradict' comes from 'contra-' (against) + 'dict' (to say), meaning to say the opposite of what someone else has said."}, {"text": "indict", "isCorrect": false, "rationale": "'Indict' means to formally accuse someone of a crime. It is about declaring against someone legally, not simply disagreeing."}], "id": "q06"}, {"question": "What does 'diction' refer to?", "options": [{"text": "The volume at which someone speaks", "isCorrect": false, "rationale": "Volume is not covered by 'diction.' The root 'dict' is about the content and style of words, not loudness."}, {"text": "The choice and style of words a speaker uses", "isCorrect": true, "rationale": "'Diction' comes from 'dict' (to say) + '-ion' (act or result), referring to how someone selects and uses words in speaking or writing."}, {"text": "The speed of a speaker's delivery", "isCorrect": false, "rationale": "Speed of delivery is not the meaning of 'diction.' Diction refers to word choice and clarity, not pace."}, {"text": "A special accent or dialect", "isCorrect": false, "rationale": "While accents and dialects affect speech, 'diction' specifically refers to word choice and usage, not accent."}], "id": "q07"}, {"question": "How is the root 'dict' different from the root 'voc' (Chapter 1)?", "options": [{"text": "'dict' is about the voice itself; 'voc' is about the content of speech", "isCorrect": false, "rationale": "This is reversed. 'voc' is about the voice and calling, while 'dict' is about the content of what is said."}, {"text": "'dict' is about the content of speech; 'voc' is about the voice and calling", "isCorrect": true, "rationale": "Correct — 'voc' relates to the voice itself (calling, summoning), while 'dict' relates to what is actually said (declaring, telling, ordering)."}, {"text": "Both roots mean exactly the same thing", "isCorrect": false, "rationale": "They are different roots. 'voc' is about calling and voice; 'dict' is about saying, telling, and declaring."}, {"text": "'dict' is Greek; 'voc' is Latin", "isCorrect": false, "rationale": "Both roots are Latin. 'Dict' comes from Latin 'dicere' and 'voc' from Latin 'vocare.'"}], "id": "q08"}, {"question": "To 'indict' someone means to:", "options": [{"text": "Formally accuse them of a crime", "isCorrect": true, "rationale": "'Indict' comes from 'in-' (against) + 'dict' (to declare), meaning to formally declare a charge against someone in a legal setting."}, {"text": "Write their name in a court document", "isCorrect": false, "rationale": "Writing relates to 'scrib/script,' not 'dict.' To indict is to formally declare, not primarily to write."}, {"text": "Call them forward to testify", "isCorrect": false, "rationale": "Calling forward relates to the 'voc' root, not 'dict.' Indicting is about declaring an accusation."}, {"text": "Predict their behavior in the future", "isCorrect": false, "rationale": "Predicting uses 'pre-' (before) + 'dict.' 'In-dict' uses 'in-' (against), making it about accusation, not prediction."}], "id": "q09"}, {"question": "Which sentence correctly uses the word 'abdicate'?", "options": [{"text": "The emperor abdicated by shouting orders from his throne.", "isCorrect": false, "rationale": "Shouting orders is the opposite of abdicating. To abdicate is to give up power, not exercise it loudly."}, {"text": "The queen abdicated the throne and gave up her royal power.", "isCorrect": true, "rationale": "'Abdicate' comes from 'ab-' (away) + 'dic' (to declare), meaning to formally give up power or responsibility. A queen stepping down is a perfect example."}, {"text": "The judge abdicated a fair sentence to the criminal.", "isCorrect": false, "rationale": "Delivering a sentence is not abdicating. The judge would 'declare' or 'pronounce' a sentence, not abdicate one."}, {"text": "The student abdicated his answer loudly to the class.", "isCorrect": false, "rationale": "Saying an answer aloud is not abdicating. Abdication means giving up authority or responsibility."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
