<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 2, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary meaning of the Latin verb dicere, from which the root dict originates?", "options": [{"text": "To call or summon", "isCorrect": false, "rationale": "This meaning is associated with the root 'voc', not 'dict', as explained in the 'rootconnection' section."}, {"text": "To say or to tell", "isCorrect": true, "rationale": "The text explicitly states: 'The Latin verb dicere, meaning “to say” or “to tell,” was at the heart of Roman public life.'"}, {"text": "To write or record", "isCorrect": false, "rationale": "While 'dictate' involves writing down what is said, 'dicere' itself refers to the act of speaking, not writing."}, {"text": "To hear or to listen", "isCorrect": false, "rationale": "The root 'dict' is about the act of speaking or declaring, not perceiving sound."}]}, {"question": "In ancient Rome, the act of a magistrate issuing an edictum exemplified which aspect of the root dict?", "options": [{"text": "The ability to write down historical accounts.", "isCorrect": false, "rationale": "While decrees might be recorded, the core of 'edictum' (from 'dicere') is the act of speaking or declaring, not primarily writing."}, {"text": "The power inherent in officially speaking or declaring.", "isCorrect": true, "rationale": "The text states, 'When a magistrate stood before the people and issued an edictum — an official decree — his words became binding rules... saying something officially was an act of power.' This directly links 'dict' to authoritative declaration."}, {"text": "The skill required for eloquent public speaking.", "isCorrect": false, "rationale": "While eloquence might be desirable, the text emphasizes the binding authority of the spoken word, not merely the style of delivery."}, {"text": "The necessity of memorizing complex legal texts.", "isCorrect": false, "rationale": "The text focuses on the creation and declaration of law through speech, not the memorization of existing texts."}]}, {"question": "The word verdict is described as literally meaning 'truly said.' This implies that a verdict represents:", "options": [{"text": "A pre-determined outcome of a trial.", "isCorrect": false, "rationale": "A 'verdict' is the result of deliberation, not something determined beforehand. The 'truly said' refers to its finality and authority as a legal finding."}, {"text": "The collective opinion of the public.", "isCorrect": false, "rationale": "While juries represent the public, a verdict is a formal legal finding of truth, not merely a general opinion."}, {"text": "The final, authoritative declaration of truth by a jury.", "isCorrect": true, "rationale": "The text defines 'verdict' as 'something “truly said” (vere + dictum), the final word of a jury,' emphasizing its conclusive and truthful nature within the legal process."}, {"text": "A prediction of future events by legal experts.", "isCorrect": false, "rationale": "A verdict concludes a past event (the trial) by stating a finding of fact, rather than predicting the future."}]}, {"question": "According to the rootconnection section, what is the fundamental difference between the roots voc and dict?", "options": [{"text": "voc concerns the written word, while dict concerns spoken commands.", "isCorrect": false, "rationale": "Both roots primarily deal with spoken communication, though 'dictate' involves writing down speech. The distinction is not written vs. spoken, but what aspect of speech is emphasized."}, {"text": "voc relates to the act of listening, while dict relates to the act of speaking.", "isCorrect": false, "rationale": "Both roots primarily relate to the act of speaking (or causing to speak/sound), not listening."}, {"text": "voc focuses on the voice and sound, whereas dict focuses on the content of speech.", "isCorrect": true, "rationale": "The text explicitly states: 'voc is about the voice itself — calling, summoning, making sound. dict is about the content of speech — saying, telling, declaring.'"}, {"text": "voc applies to formal legal declarations, while dict applies to informal conversations.", "isCorrect": false, "rationale": "The text indicates 'dict' is very much tied to formal declarations (e.g., edict, verdict), and 'voc' can also be formal (e.g., advocate). The distinction is not formality."}]}, {"question": "If someone is formally accused of a crime, the legal process involves 'declaring against' them. Which dict-rooted word is used for this specific action today?", "options": [{"text": "Contradict", "isCorrect": false, "rationale": "'Contradict' means to speak against in argument or opposition, not to formally accuse of a crime."}, {"text": "Indict", "isCorrect": true, "rationale": "The text states: 'Even indict, which today means to formally accuse someone of a crime, traces back to dicere: to indict is to “declare against” a person.'"}, {"text": "Predict", "isCorrect": false, "rationale": "'Predict' means to say something will happen before it occurs, which is unrelated to accusing someone of a crime."}, {"text": "Diction", "isCorrect": false, "rationale": "'Diction' refers to word choice and style, not the act of accusing."}]}, {"question": "The term diction refers to:", "options": [{"text": "The volume and pitch of a speaker's voice.", "isCorrect": false, "rationale": "While related to speech, 'diction' specifically concerns the words chosen and how they are used, not the physical characteristics of the voice."}, {"text": "The choice and style of words a speaker uses.", "isCorrect": true, "rationale": "The text defines 'Diction' as referring 'to the choice and style of words a speaker uses — how you say what you say.'"}, {"text": "The ability to speak multiple languages fluently.", "isCorrect": false, "rationale": "This describes 'multilingualism' or 'polyglotism,' not 'diction'."}, {"text": "The act of speaking words aloud for someone else to write down.", "isCorrect": false, "rationale": "This describes 'dictate,' not 'diction'."}]}, {"question": "In ancient Rome, a dictator was appointed primarily to:", "options": [{"text": "Serve as a permanent monarch for the empire.", "isCorrect": false, "rationale": "The text specifies a dictator was appointed 'for a limited time,' contradicting the idea of a permanent monarch."}, {"text": "Speak with absolute authority for a limited emergency period.", "isCorrect": true, "rationale": "The text states a dictator was 'literally, “one who speaks with authority” — to rule with absolute power for a limited time' in an emergency."}, {"text": "Dictate letters to scribes for historical archives.", "isCorrect": false, "rationale": "While a dictator might dictate letters, their primary role described in the text was to rule with absolute power during an emergency, not just to record information."}, {"text": "Predict future political events based on omens.", "isCorrect": false, "rationale": "Predicting events is related to 'predict,' not the primary role of a 'dictator' as described."}]}, {"question": "The evolution of the word indict from 'declare against' to 'formally accuse someone of a crime' best illustrates:", "options": [{"text": "How words always retain their original, literal meanings.", "isCorrect": false, "rationale": "This example shows a specialization of meaning, not a strict retention of the broad original meaning."}, {"text": "How legal contexts can narrow and formalize the use of a word.", "isCorrect": true, "rationale": "The text explains 'indict' evolved from a general 'declare against' to the specific legal sense of 'formally accuse,' demonstrating how context can make a word's meaning more precise and formal."}, {"text": "How words shift to mean their exact opposite over time.", "isCorrect": false, "rationale": "The meaning of 'indict' has become more specific, but it hasn't reversed its opposition; it's still 'against' someone."}, {"text": "How the root dict primarily relates to informal speech.", "isCorrect": false, "rationale": "The use of 'indict' in a legal context, like many other 'dict' words (edict, verdict), highlights its connection to formal, authoritative speech."}]}, {"question": "Given the description of edictum and the root dict, what was the defining characteristic of an edict issued by a Roman ruler?", "options": [{"text": "It was a suggestion that citizens could choose to follow.", "isCorrect": false, "rationale": "The text explicitly states 'his words became binding rules that every citizen had to obey,' indicating it was not a suggestion."}, {"text": "It was an unofficial announcement shared with close advisors.", "isCorrect": false, "rationale": "An 'edictum' was an 'official decree' issued 'before the people,' making it public and official, not unofficial or private."}, {"text": "It was a binding, official order declared with authority.", "isCorrect": true, "rationale": "An 'edict' is an 'official order “spoken out” by a ruler' and 'became binding rules,' demonstrating its authoritative and mandatory nature."}, {"text": "It was a historical record of past legal decisions.", "isCorrect": false, "rationale": "An edict was a new decree, creating law, not merely a record of past decisions."}]}, {"question": "Considering the rootconnection which states 'voc is about the voice itself ... dict is about the content of speech,' which pair of words best exemplifies this distinction?", "options": [{"text": "Dictate and Predict", "isCorrect": false, "rationale": "Both 'dictate' and 'predict' are derived from 'dict' and relate to the content of speech (speaking for others to write, saying before), so they don't show the 'voc' vs. 'dict' distinction."}, {"text": "Advocate and Dictator", "isCorrect": true, "rationale": "The text directly uses these examples: 'An advocate calls you to a cause; a dictator tells you what to do.' 'Advocate' (from 'voc') emphasizes the 'calling' or voice, while 'dictator' (from 'dict') emphasizes the 'telling' or content."}, {"text": "Verdict and Edict", "isCorrect": false, "rationale": "Both 'verdict' and 'edict' are from 'dict' and relate to authoritative declarations, so they do not illustrate the distinction between 'voc' and 'dict'."}, {"text": "Contradict and Diction", "isCorrect": false, "rationale": "Both 'contradict' and 'diction' are derived from 'dict' and relate to the content or style of speech, not the distinction between voice/sound and content."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
