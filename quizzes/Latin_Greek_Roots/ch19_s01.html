    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 19, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to Justinian's epigraph, what is the primary characteristic that defines justice?", "options": [{"text": "It is a rigid set of legal statutes and precedents.", "isCorrect": false, "rationale": "Justinian defines justice as a 'will' or disposition, not merely a collection of laws or statutes."}, {"text": "It is a constant and perpetual will.", "isCorrect": true, "rationale": "The epigraph directly states: 'Justitia est constans et perpetua voluntas' which translates to 'Justice is the constant and perpetual will'."}, {"text": "It is the outcome of fair judicial processes.", "isCorrect": false, "rationale": "While related, the definition focuses on the underlying 'will' or intention, not solely on the procedural outcomes."}, {"text": "It is a social agreement to maintain peace and order.", "isCorrect": false, "rationale": "The text does not refer to justice as a 'social agreement' but rather an inherent, unwavering 'will'."}]}, {"question": "The phrase 'constans et perpetua' (constant and perpetual) in Justinian's definition emphasizes that justice is:", "options": [{"text": "Adaptable to changing societal norms and values.", "isCorrect": false, "rationale": "'Constant' and 'perpetual' imply an unchanging and enduring quality, which contradicts adaptability to change."}, {"text": "An unwavering and enduring commitment or disposition.", "isCorrect": true, "rationale": "'Constant' denotes steadfastness and consistency, while 'perpetual' signifies unending duration, together implying an unwavering and enduring commitment."}, {"text": "A temporary state of fairness achieved through negotiation.", "isCorrect": false, "rationale": "The term 'perpetual' explicitly means unending, which contradicts the idea of a 'temporary state'."}, {"text": "Only relevant in specific historical or cultural contexts.", "isCorrect": false, "rationale": "The universality implied by 'constant and perpetual' suggests a principle that transcends specific contexts, rather than being limited to them."}]}, {"question": "By defining justice as a 'will' (voluntas), Justinian suggests its nature is primarily:", "options": [{"text": "A passive state of societal equilibrium that naturally emerges.", "isCorrect": false, "rationale": "'Will' implies an active, intentional faculty, not a passive or naturally emerging state."}, {"text": "An active, intentional disposition or desire to act.", "isCorrect": true, "rationale": "A 'will' (voluntas) signifies a conscious choice, intention, or desire that drives action, making it an active disposition."}, {"text": "A set of unchangeable moral laws handed down by authorities.", "isCorrect": false, "rationale": "While justice is related to laws, the definition here focuses on the internal disposition ('will') rather than external rules themselves."}, {"text": "An emotional response to unfairness or inequality.", "isCorrect": false, "rationale": "While emotions can be involved, 'will' in this context refers to a more deliberate and consistent intention rather than a fleeting emotional reaction."}]}, {"question": "What is the specific object or purpose of this 'constant and perpetual will' for justice, according to the epigraph?", "options": [{"text": "To establish universal equality in wealth and status.", "isCorrect": false, "rationale": "The phrase 'jus suum cuique tribuendi' refers to 'his due right,' which is distinct from universal equality in outcomes or possessions."}, {"text": "To render to each person his due right.", "isCorrect": true, "rationale": "The Latin 'jus suum cuique tribuendi' directly translates to 'to render to each person his due right,' identifying the specific goal of justice."}, {"text": "To ensure peace and order within the community.", "isCorrect": false, "rationale": "While justice contributes to peace, the definition specifically details giving individuals what is due to them, not directly establishing peace as the primary purpose."}, {"text": "To create laws that benefit the greatest number of people.", "isCorrect": false, "rationale": "The focus is on what is due to 'each person' (cuique), emphasizing individual rights rather than utilitarian benefit to the majority."}]}, {"question": "Based on Justinian's definition, what is implied about the concept of 'due right' (jus suum)?", "options": [{"text": "It means every person should receive the exact same treatment and resources.", "isCorrect": false, "rationale": "'Due right' implies entitlement based on specific circumstances or desert, not necessarily identical treatment or equal distribution for everyone."}, {"text": "It refers to what an individual is legitimately owed or entitled to.", "isCorrect": true, "rationale": "'Jus suum' refers to 'his own right' or 'what is due to him,' indicating specific entitlements that may vary per individual based on their situation."}, {"text": "It is determined solely by the prevailing social hierarchy.", "isCorrect": false, "rationale": "While societal context can influence rights, the definition emphasizes a fundamental 'will' to render what is *due*, implying a deeper principle than mere social hierarchy."}, {"text": "It is a concept that is subjective and varies widely by individual opinion.", "isCorrect": false, "rationale": "The definition presents 'jus suum cuique tribuendi' as a clear objective of the 'constant and perpetual will,' suggesting a principled, rather than purely subjective, understanding of what is due."}]}, {"question": "From which historical legal work is this definition of justice derived?", "options": [{"text": "The Twelve Tables", "isCorrect": false, "rationale": "The epigraph explicitly states the source as 'Justinian, Institutiones, I.1'."}, {"text": "Magna Carta", "isCorrect": false, "rationale": "The epigraph explicitly states the source as 'Justinian, Institutiones, I.1'."}, {"text": "Justinian, Institutiones", "isCorrect": true, "rationale": "The source is explicitly cited at the end of the epigraph as 'Justinian, Institutiones, I.1'."}, {"text": "Code of Hammurabi", "isCorrect": false, "rationale": "The epigraph explicitly states the source as 'Justinian, Institutiones, I.1'."}]}, {"question": "The placement of this definition at 'I.1' in Justinian's *Institutiones* suggests its significance as:", "options": [{"text": "A supplementary note providing historical context.", "isCorrect": false, "rationale": "Placing it at 'I.1' (Book 1, Section 1) signifies it as a foundational or introductory principle, not a supplementary note."}, {"text": "A foundational principle underlying the entire legal system.", "isCorrect": true, "rationale": "Being presented in the very first section of the *Institutiones*, a textbook for law students, indicates it is a fundamental and foundational definition upon which the subsequent legal principles are built."}, {"text": "A topic for advanced legal philosophical debate.", "isCorrect": false, "rationale": "While philosophically rich, its placement at I.1 in a legal textbook indicates it's a basic, foundational concept taught to beginners, not exclusively for advanced debate."}, {"text": "A controversial idea that was still being developed.", "isCorrect": false, "rationale": "The definitive nature of the statement and its placement suggest it was presented as an established, core concept, not a developing or controversial one."}]}, {"question": "Based on Justinian's definition, which of the following is NOT a primary focus of justice?", "options": [{"text": "The consistency of its application.", "isCorrect": false, "rationale": "The 'constant and perpetual will' implies consistency in application."}, {"text": "The active intention behind just acts.", "isCorrect": false, "rationale": "Defining justice as a 'will' emphasizes the active intention."}, {"text": "The guarantee of identical outcomes for all individuals.", "isCorrect": true, "rationale": "Justice is defined as giving 'to each person his due right,' which implies individualized entitlement based on what is deserved, not necessarily identical or equal outcomes for everyone regardless of circumstance."}, {"text": "The fulfillment of individual entitlements.", "isCorrect": false, "rationale": "'Jus suum cuique tribuendi' directly refers to the fulfillment of individual entitlements."}]}, {"question": "How does the epigraph's definition implicitly connect justice to individual agency and responsibility?", "options": [{"text": "By implying justice is an inherent societal structure that requires no individual effort.", "isCorrect": false, "rationale": "Defining justice as a 'will' means it is an active disposition that requires conscious effort, not an inherent structure that operates automatically."}, {"text": "By stating that justice is a 'will' to *render* to each person their due, suggesting active human effort.", "isCorrect": true, "rationale": "The 'will to render' (voluntas ... tribuendi) implies an active, intentional act on the part of individuals or institutions to ensure due rights are given, highlighting agency and responsibility."}, {"text": "By focusing solely on the outcomes of legal processes rather than individual actions.", "isCorrect": false, "rationale": "The definition is about the underlying 'will,' which precedes and informs legal processes and individual actions."}, {"text": "By asserting that justice is primarily a matter of divine intervention.", "isCorrect": false, "rationale": "The definition attributes justice to a human 'will,' not primarily to divine intervention."}]}, {"question": "Which statement best synthesizes the comprehensive meaning of Justinian's epigraph?", "options": [{"text": "Justice is the unwavering commitment to ensure that every individual consistently receives what they are rightfully owed.", "isCorrect": true, "rationale": "This option integrates 'unwavering commitment' (constant and perpetual will) with 'every individual consistently receives what they are rightfully owed' (jus suum cuique tribuendi), capturing the full essence of the definition."}, {"text": "Justice is the legal framework designed to prevent all forms of inequality in society.", "isCorrect": false, "rationale": "While justice aims for fairness, the definition focuses on 'due right' rather than preventing 'all forms of inequality,' and defines it as a 'will,' not just a 'legal framework'."}, {"text": "Justice is the philosophical ideal of universal fairness that exists independently of human action.", "isCorrect": false, "rationale": "By defining justice as a 'will,' it suggests an active human disposition, not an ideal independent of human action. 'Due right' also specifies the fairness, rather than 'universal fairness' as a general concept."}, {"text": "Justice is the moral obligation to treat all members of a community identically.", "isCorrect": false, "rationale": "The definition emphasizes 'due right' for 'each person,' implying individualized entitlements rather than identical treatment for everyone."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
