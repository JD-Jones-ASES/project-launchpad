<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words from the Ancients: Latin &amp; Greek Roots &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 21, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does 'biology' mean?", "options": [{"text": "Study of rocks", "isCorrect": false, "rationale": "That is geology."}, {"text": "Scientific study of living organisms", "isCorrect": true, "rationale": "bio + logy."}, {"text": "Study of languages", "isCorrect": false, "rationale": "Different roots."}, {"text": "Public speaking", "isCorrect": false, "rationale": "Different roots."}]}, {"question": "What does 'biography' mean?", "options": [{"text": "Study of cells", "isCorrect": false, "rationale": "Part of biology."}, {"text": "Written story of a person's life", "isCorrect": true, "rationale": "bio + graphein (to write)."}, {"text": "Map of earth", "isCorrect": false, "rationale": "That is geography."}, {"text": "Musical composition", "isCorrect": false, "rationale": "Different."}]}, {"question": "What does 'ecology' mean?", "options": [{"text": "House construction", "isCorrect": false, "rationale": "Extends to organisms and environments."}, {"text": "Study of organisms and environments", "isCorrect": true, "rationale": "oikos (habitat) + logy."}, {"text": "Ancient homes", "isCorrect": false, "rationale": "Archaeology."}, {"text": "Economic systems", "isCorrect": false, "rationale": "Different despite sharing oikos."}]}, {"question": "What does 'logic' mean?", "options": [{"text": "Persuasive writing", "isCorrect": false, "rationale": "That is rhetoric."}, {"text": "Science of correct reasoning", "isCorrect": true, "rationale": "log (reason) + -ic."}, {"text": "Study of life", "isCorrect": false, "rationale": "That is biology."}, {"text": "Time measurement", "isCorrect": false, "rationale": "Time = chron."}]}, {"question": "When is a 'eulogy' delivered?", "options": [{"text": "Wedding", "isCorrect": false, "rationale": "Associated with funerals."}, {"text": "Funeral, praising someone", "isCorrect": true, "rationale": "eu- (good) + log (speech)."}, {"text": "Business meeting", "isCorrect": false, "rationale": "Different context."}, {"text": "Sporting event", "isCorrect": false, "rationale": "Different context."}]}, {"question": "What does 'analogy' mean?", "options": [{"text": "Speech against something", "isCorrect": false, "rationale": "ana- here = according to."}, {"text": "Comparison showing similarity", "isCorrect": true, "rationale": "ana- (according to) + log (proportion)."}, {"text": "Loud announcement", "isCorrect": false, "rationale": "Different roots."}, {"text": "Written record", "isCorrect": false, "rationale": "Different roots."}]}, {"question": "What does 'dialogue' describe?", "options": [{"text": "One-person lecture", "isCorrect": false, "rationale": "That is monologue."}, {"text": "Conversation between two or more people", "isCorrect": true, "rationale": "dia- (between) + logue (speech)."}, {"text": "Written exam", "isCorrect": false, "rationale": "Different roots."}, {"text": "Music performance", "isCorrect": false, "rationale": "Different roots."}]}, {"question": "What does 'theology' study?", "options": [{"text": "Heat", "isCorrect": false, "rationale": "Heat = therm."}, {"text": "Nature of God and religion", "isCorrect": true, "rationale": "theos (god) + logy (study of)."}, {"text": "Earth's surface", "isCorrect": false, "rationale": "That is geography."}, {"text": "Theater", "isCorrect": false, "rationale": "Different roots."}]}, {"question": "Which two words both contain 'log' with different prefixes?", "options": [{"text": "Biology and biography", "isCorrect": false, "rationale": "Biography uses graph."}, {"text": "Eulogy and analogy", "isCorrect": true, "rationale": "eu- + log and ana- + log."}, {"text": "Biology and ecology", "isCorrect": false, "rationale": "Different primary roots."}, {"text": "Logic and dialogue", "isCorrect": false, "rationale": "Different forms of log."}]}, {"question": "How does '-logy' differ from '-logue'?", "options": [{"text": "Identical", "isCorrect": false, "rationale": "Different applications."}, {"text": "'-logy' = field of study; '-logue' = spoken exchange", "isCorrect": true, "rationale": "biology vs. dialogue."}, {"text": "One Greek, one Latin", "isCorrect": false, "rationale": "Both from Greek logos."}, {"text": "One modern, one ancient", "isCorrect": false, "rationale": "Both from same ancient root."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
