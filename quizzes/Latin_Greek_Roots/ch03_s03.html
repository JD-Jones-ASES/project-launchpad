        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The word \"audience\" is derived from the Latin verb audire. What does audire primarily mean?", "options": [{"text": "To speak", "isCorrect": false, "rationale": "The root 'voc' means voice, and 'dict' means to say, which are related to speaking, not 'audire'."}, {"text": "To hear", "isCorrect": true, "rationale": "The text explicitly states that 'audire' means 'to hear,' forming the basis for words like audience, auditorium, and audible."}, {"text": "To see", "isCorrect": false, "rationale": "Seeing is a visual act, not directly related to the 'aud' root which focuses on sound and hearing."}, {"text": "To write", "isCorrect": false, "rationale": "Writing involves inscription, which is distinct from the auditory meaning of 'audire'."}]}, {"question": "The Roman amphitheater's design, which allowed a single actor's voice to reach every seat, best illustrates which fundamental aspect of an 'audience' as described in the text?", "options": [{"text": "The importance of visual spectacle in ancient performances.", "isCorrect": false, "rationale": "While visuals were part of theater, the text specifically highlights the acoustical design for hearing, not visual spectacle."}, {"text": "The historical origin of acting as a respected profession.", "isCorrect": false, "rationale": "The text uses the actor as an example to demonstrate acoustics, but it does not discuss the history of acting as a profession."}, {"text": "The primary function of the group as listeners.", "isCorrect": true, "rationale": "The ability of everyone to 'hear' the actor underscores the text's definition of an audience as 'a group of people who are listening' and the Roman mastery of acoustics for optimal hearing."}, {"text": "The advanced architectural skills of ancient Romans in general.", "isCorrect": false, "rationale": "The text focuses specifically on acoustic design, which is a particular aspect of Roman architecture, not their general architectural prowess."}]}, {"question": "According to the 'rootconnection' section, which of the following best completes the 'triangle of speech' formed by voc (voice) and dict (to say)?", "options": [{"text": "script (to write)", "isCorrect": false, "rationale": "While related to communication, 'script' involves writing, not the oral communication focus of the 'triangle of speech'."}, {"text": "aud (to hear)", "isCorrect": true, "rationale": "The text explicitly states that 'aud' completes the triangle, representing the act of hearing what is said with a voice, thus capturing the full communication process."}, {"text": "vid (to see)", "isCorrect": false, "rationale": "'Vid' is related to seeing, which is not part of the auditory communication 'triangle of speech' described."}, {"text": "man (hand)", "isCorrect": false, "rationale": "'Man' relates to the hand, which is irrelevant to the 'triangle of speech' focused on oral communication and hearing."}]}, {"question": "If a sound is described as 'inaudible,' what does this imply about the sound?", "options": [{"text": "It is too loud to be pleasant.", "isCorrect": false, "rationale": "An inaudible sound is one that cannot be heard at all, regardless of its potential volume."}, {"text": "It cannot be heard.", "isCorrect": true, "rationale": "The text defines 'inaudible' as something that 'cannot be heard,' directly opposite to 'audible' which 'can be heard'."}, {"text": "It is a musical note of high pitch.", "isCorrect": false, "rationale": "The term 'inaudible' refers to the ability to perceive a sound, not its specific quality or pitch."}, {"text": "It causes echoes in a room.", "isCorrect": false, "rationale": "Echoes are a property of sound reflection, not directly related to whether a sound can be heard in the first place."}]}, {"question": "A performer undergoing an 'audition' is primarily engaged in what activity related to the root aud?", "options": [{"text": "Designing a stage set for a future production.", "isCorrect": false, "rationale": "Set design is a visual and artistic role, not directly linked to the auditory process of an audition."}, {"text": "Demonstrating talent for judges to listen and evaluate.", "isCorrect": true, "rationale": "The text defines an 'audition' as 'a trial hearing, where a performer demonstrates their talent so that judges can listen and decide,' directly linking it to the act of hearing/listening."}, {"text": "Writing a script for a play or performance.", "isCorrect": false, "rationale": "Scriptwriting is a literary activity, distinct from the performance and evaluation aspect of an audition."}, {"text": "Practicing alone without any observers.", "isCorrect": false, "rationale": "An audition inherently involves an audience (the judges) who are listening, distinguishing it from solitary practice."}]}, {"question": "The evolution of the word 'audit' from medieval times to its modern financial context primarily highlights a continuous emphasis on:", "options": [{"text": "The necessity of written financial documentation.", "isCorrect": false, "rationale": "While modern audits use written documents, the historical origin was oral, showing that the core emphasis wasn't solely on writing, but on verification."}, {"text": "The importance of visual inspection over verbal reports.", "isCorrect": false, "rationale": "The text contrasts modern visual inspection with historical 'hearing,' but emphasizes the underlying principle rather than a shift in importance away from verbal."}, {"text": "Careful scrutiny and verification of information.", "isCorrect": true, "rationale": "Both the medieval practice of listening for errors and the modern examination of records share the common goal of careful scrutiny and verification to ensure accuracy."}, {"text": "The reliance on spoken contracts and agreements.", "isCorrect": false, "rationale": "The text refers to accounts being 'read aloud,' not necessarily spoken contracts, and the focus is on checking for errors in those accounts."}]}, {"question": "Even though a modern financial 'audit' involves examining records, the text explains its root connection to 'hearing' by stating that it preserves the idea that:", "options": [{"text": "All financial transactions must be announced publicly.", "isCorrect": false, "rationale": "The text indicates accounts were 'read aloud to officials,' not necessarily announced publicly to everyone."}, {"text": "Auditors must be skilled musicians to detect discrepancies.", "isCorrect": false, "rationale": "This is a humorous but incorrect interpretation; the 'hearing' refers to careful listening for accuracy, not musical ability."}, {"text": "Careful listening is the foundation of trust and accuracy.", "isCorrect": true, "rationale": "The text explicitly states that 'Even in its modern form, the word preserves the ancient Roman idea that careful listening is the foundation of trust and accuracy.'"}, {"text": "Financial documents were once solely oral traditions without written records.", "isCorrect": false, "rationale": "The text mentions 'financial accounts were read aloud,' implying that written accounts existed to be read, not that there were no written records at all."}]}, {"question": "According to the text, what is the most fundamental characteristic that defines an 'audience'?", "options": [{"text": "They are gathered in a specific building like an amphitheater.", "isCorrect": false, "rationale": "While audiences often gather in specific places, the text defines the essence of an audience by their activity, not their location."}, {"text": "They are engaged in observing a visual performance.", "isCorrect": false, "rationale": "While visual performance can be part of an audience's experience, the text specifically states an audience is 'at its core, a group of people who are listening,' emphasizing the auditory aspect."}, {"text": "They are a group of people who are listening.", "isCorrect": true, "rationale": "The text directly states: 'An audience is, at its core, a group of people who are listening,' linking it to the Latin 'audire' (to hear)."}, {"text": "They are providing feedback to a performer.", "isCorrect": false, "rationale": "Providing feedback might be a secondary action, but the primary, core definition given is that they are listening."}]}, {"question": "Based on the text, an 'auditorium' is specifically designed to facilitate what primary activity?", "options": [{"text": "Visual display of art and theatrical productions.", "isCorrect": false, "rationale": "While auditoriums can be used for these, the definition in the text emphasizes its acoustic purpose."}, {"text": "The comfortable seating of large groups for public gatherings.", "isCorrect": false, "rationale": "Comfortable seating is a feature, but not the primary design goal related to the 'aud' root."}, {"text": "Optimal conditions for sounds to reach every seat.", "isCorrect": true, "rationale": "The text defines an 'auditorium' as 'a place built for hearing — a hall designed so that sounds reach every seat,' directly connecting its purpose to acoustics and listening."}, {"text": "Private meetings and confidential discussions.", "isCorrect": false, "rationale": "Auditoriums are typically for public presentations, and their design focuses on projecting sound, not containing private discussions."}]}, {"question": "The text describes the roots voc, dict, and aud as completing a 'triangle of speech' that captures 'the entire act of human communication.' Which statement best summarizes the unique contribution of the aud root to this triangle?", "options": [{"text": "It represents the ability to form words with one's voice.", "isCorrect": false, "rationale": "This describes the role of 'voc' (voice) in the triangle, not 'aud'."}, {"text": "It signifies the act of conveying information verbally.", "isCorrect": false, "rationale": "This primarily describes the role of 'dict' (to say) in the triangle, the act of speaking or communicating."}, {"text": "It embodies the crucial component of receiving and comprehending spoken information.", "isCorrect": true, "rationale": "The 'aud' root (to hear) uniquely contributes the receiving and comprehension aspect, completing the communication loop where one person uses a voice to say something, and another person hears it."}, {"text": "It highlights the importance of written communication in society.", "isCorrect": false, "rationale": "The 'triangle of speech' explicitly focuses on oral communication, not written communication."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
