<script>
var QUESTIONS = [{"question": "What is the most likely intended meaning of the Latin proverb \"Aquam de saxo fluentem non bibunt omnes\" when used as an epigraph for a textbook chapter?", "options": [{"text": "Not all rocks contain water, so some people remain thirsty.", "isCorrect": false, "rationale": "This is a literal interpretation of the physical act, missing the proverbial, figurative meaning."}, {"text": "People often overlook valuable resources found in unexpected places.", "isCorrect": true, "rationale": "This option correctly interprets the proverb metaphorically, suggesting that 'water from the rock' represents valuable, perhaps unexpected, resources that some people fail to utilize."}, {"text": "It is difficult to extract water from solid rock formations.", "isCorrect": false, "rationale": "Like other literal options, this focuses on the physical challenge of extraction, not the metaphorical lesson intended by a proverb."}, {"text": "Only certain individuals are permitted to drink from sacred sources.", "isCorrect": false, "rationale": "This introduces an element of 'sacredness' or restriction that is not present in the proverb's simple statement about who drinks, and misses the broader message about perception."}]}, {"question": "In the context of the proverb, \"water flowing from the rock\" most likely symbolizes what?", "options": [{"text": "A hidden physical spring.", "isCorrect": false, "rationale": "This is a literal interpretation, ignoring the metaphorical nature of a proverb that seeks to convey a deeper meaning."}, {"text": "An unexpected source of knowledge or opportunity.", "isCorrect": true, "rationale": "This option accurately captures the symbolic meaning of 'water from the rock' as a valuable, perhaps surprising, resource like knowledge, insight, or an unforeseen advantage that may not be immediately obvious."}, {"text": "The geological process of erosion.", "isCorrect": false, "rationale": "This is a scientific concept unrelated to the proverb's intended message, which is about human perception and action."}, {"text": "A common and universally accessible commodity.", "isCorrect": false, "rationale": "The phrase 'not everyone drinks' contradicts the idea of it being universally accessible and consumed, suggesting it is either overlooked or taken for granted by some."}]}, {"question": "Considering its placement as an epigraph, what is the primary function of this proverb at the beginning of a chapter?", "options": [{"text": "To provide historical context for ancient Latin phrases.", "isCorrect": false, "rationale": "While it is a Latin phrase, its primary purpose as an epigraph in a textbook is usually not a historical language lesson, but rather thematic guidance."}, {"text": "To introduce a key character or plot point in the upcoming text.", "isCorrect": false, "rationale": "Epigraphs in educational texts rarely introduce plot points or characters; their role is more thematic and reflective."}, {"text": "To set a reflective tone and hint at an underlying theme of the chapter.", "isCorrect": true, "rationale": "Epigraphs are commonly used to establish a mood, hint at the chapter's thematic content, or provoke thought, aligning with the reflective and insightful nature of a proverb."}, {"text": "To challenge the reader's knowledge of classical languages.", "isCorrect": false, "rationale": "While it uses Latin, its main purpose is not to test language knowledge but to convey a message or theme relevant to the chapter."}]}, {"question": "The phrase \"non bibunt omnes\" (not everyone drinks) implies what about individuals encountering the \"water flowing from the rock\"?", "options": [{"text": "They are physically unable to reach the water.", "isCorrect": false, "rationale": "The proverb doesn't specify physical inability; it more broadly addresses human choice, perception, or willingness, rather than just physical barriers."}, {"text": "They might fail to recognize its value or choose not to partake.", "isCorrect": true, "rationale": "This option correctly infers that the proverb addresses human agency, perception, or willingness, rather than absolute physical barriers or inherent limitations of the source itself. It suggests missed opportunity due to oversight or choice."}, {"text": "The water source is inherently limited and exclusive.", "isCorrect": false, "rationale": "The proverb states 'not everyone drinks,' not that the water itself is inherently limited to only a few, suggesting the opportunity is there but perhaps overlooked or ignored."}, {"text": "Only those with prior knowledge can identify the water.", "isCorrect": false, "rationale": "While prior knowledge could be a factor in recognizing value, 'fail to recognize its value or choose not to partake' is a broader and more accurate interpretation that includes various reasons for not utilizing the resource."}]}, {"question": "Which of the following statements best captures the core message of the proverb?", "options": [{"text": "Scarcity often dictates the value of resources.", "isCorrect": false, "rationale": "The proverb is less about the inherent scarcity of the resource and more about the human response to its availability and perception of its value."}, {"text": "Wisdom and opportunity are not always obvious, and sometimes require an active choice to embrace.", "isCorrect": true, "rationale": "This option synthesizes the key elements of the proverb: the unexpected nature of valuable things ('water from the rock') and the human decision or oversight regarding them ('not everyone drinks'), emphasizing perception and initiative."}, {"text": "One should always be suspicious of resources found in unusual places.", "isCorrect": false, "rationale": "The proverb presents the 'water from the rock' as a potentially beneficial thing, not something to be suspicious of; it highlights missed opportunities rather than danger."}, {"text": "Traditional sources of knowledge are superior to unexpected ones.", "isCorrect": false, "rationale": "The proverb makes no judgment about the origin of knowledge; instead, it points out that valuable insights can come from unexpected places and may be overlooked regardless of their source."}]}, {"question": "If this epigraph were used to introduce a chapter on effective study habits, what specific advice might it implicitly offer students?", "options": [{"text": "Focus only on clearly labeled and easily accessible study materials.", "isCorrect": false, "rationale": "This contradicts the proverb's message of finding value in less obvious or unexpected places ('water from the rock'), encouraging a narrow approach to learning."}, {"text": "Be proactive in seeking out and utilizing less obvious learning opportunities or insights.", "isCorrect": true, "rationale": "Applying the proverb to study habits, it suggests that valuable learning insights might come from unexpected sources or require a deeper look, thus encouraging proactive engagement and critical thinking beyond surface-level information."}, {"text": "Rely solely on the guidance of teachers, as they are the primary source of knowledge.", "isCorrect": false, "rationale": "While teachers are important sources, the proverb encourages individual initiative and perception beyond just passive reception, implying students should also seek knowledge themselves."}, {"text": "Recognize that some students are naturally more capable of learning than others.", "isCorrect": false, "rationale": "The proverb focuses on *who drinks* (i.e., perception/choice/action), not inherent capability, making it less about 'natural ability' and more about active engagement and awareness."}]}, {"question": "By selecting this proverb as an epigraph, the author of the textbook likely intends to:", "options": [{"text": "Introduce a linguistic lesson on Latin grammar.", "isCorrect": false, "rationale": "The primary purpose of an epigraph in an educational text is thematic or to set a tone, not to provide a grammar lesson, which would be secondary at best."}, {"text": "Prepare readers for complex allegorical interpretations throughout the chapter.", "isCorrect": false, "rationale": "While allegorical thinking is related, 'complex allegorical interpretations' might be too strong for a general textbook epigraph; 'encourage an open mind' is a broader and more fitting intent."}, {"text": "Encourage readers to approach the chapter with an open mind and critical perception.", "isCorrect": true, "rationale": "An epigraph like this invites a thoughtful approach, suggesting that deeper insights might be present for those who engage reflectively and are open to finding value where it might not be immediately obvious."}, {"text": "Suggest that the chapter's content will be difficult to understand for most readers.", "isCorrect": false, "rationale": "The proverb implies *some* might miss the value, not that the content itself is inherently difficult for *most*. It is more about the reader's perception and engagement than the inherent complexity of the material."}]}, {"question": "The proverb speaks to a universal truth about human experience. Which of the following best describes this truth?", "options": [{"text": "Material wealth is unevenly distributed among people.", "isCorrect": false, "rationale": "The proverb uses 'water' metaphorically for any valuable resource or insight, not specifically to denote material wealth."}, {"text": "Opportunities and valuable insights often exist but are not always recognized or seized by everyone.", "isCorrect": true, "rationale": "This option effectively summarizes the universal truth conveyed: valuable things exist, but not everyone has the perception, foresight, or initiative to take advantage of them, even when they are present."}, {"text": "Natural resources are finite and must be conserved for future generations.", "isCorrect": false, "rationale": "While a valid concept, the proverb's focus is on individual action and perception regarding an existing resource, not its finitude, sustainability, or conservation."}, {"text": "Great achievements always come from visible and well-known sources.", "isCorrect": false, "rationale": "The 'water from the rock' explicitly suggests an *unexpected* or non-obvious source, directly contradicting the idea that valuable things only come from visible or well-known origins."}]}, {"question": "How might the lesson of this proverb be applied to an individual's journey of personal growth and development?", "options": [{"text": "Success is primarily determined by external factors beyond one's control.", "isCorrect": false, "rationale": "The proverb implies a role for individual perception, choice, and action in seizing opportunities, rather than attributing success solely to external factors."}, {"text": "One must actively seek out, discern, and utilize unexpected sources of wisdom or self-improvement.", "isCorrect": true, "rationale": "Applying the proverb to personal growth suggests that individuals need to be discerning and proactive in finding and utilizing less obvious or conventional opportunities and insights for self-improvement and development."}, {"text": "It is better to wait for clear and obvious paths to self-improvement to appear.", "isCorrect": false, "rationale": "This is a passive approach, contrary to the active engagement and recognition of hidden value implied by the proverb."}, {"text": "Personal growth is only possible if resources are abundantly and easily available.", "isCorrect": false, "rationale": "The 'water from the rock' implies an unexpected or less obvious source, not necessarily abundant and easy availability, challenging the idea that growth requires only effortless resources."}]}, {"question": "The attribution \"Proverbial Latin saying\" emphasizes which characteristic of the quote?", "options": [{"text": "Its origin in ancient Roman legal texts.", "isCorrect": false, "rationale": "While Latin, 'proverbial' doesn't specifically link it to legal texts, but rather to general wisdom."}, {"text": "Its status as a widely recognized and enduring piece of folk wisdom.", "isCorrect": true, "rationale": "A proverb is by definition a short, popular saying that expresses a general truth or piece of advice. 'Proverbial' signifies its status as a traditional, widely known, and enduring piece of folk wisdom."}, {"text": "Its use of complex grammatical structures unique to classical Latin.", "isCorrect": false, "rationale": "The attribution refers to its nature as a saying (proverbial), not its linguistic complexity or specific grammatical features."}, {"text": "Its literal scientific observation about water sources.", "isCorrect": false, "rationale": "'Proverbial' signifies a metaphorical meaning and general truth, not a literal scientific observation about geology or hydrology."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
