    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 13, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best encapsulates the primary meaning of the root \"terr\" as it appears in words like \"territory,\" \"terrain,\" and \"terrestrial\"?", "options": [{"text": "Control or ownership", "isCorrect": false, "rationale": "While 'territory' relates to control, the overarching root meaning found across multiple words in the family (like terrain, subterranean, terrestrial) is more fundamental than just control or ownership."}, {"text": "Earth or land", "isCorrect": true, "rationale": "The root 'terr' consistently refers to 'earth' or 'land' across all the provided examples, such as 'terrain' (stretch of land), 'subterranean' (under the earth), and 'terrestrial' (relating to the earth or land)."}, {"text": "Water or sea", "isCorrect": false, "rationale": "Words derived from 'terr' explicitly contrast with water or air, as seen in 'terrestrial' (relating to earth or land, as opposed to water or air), indicating 'terr' does not mean water or sea."}, {"text": "Flat surface", "isCorrect": false, "rationale": "While a 'terrace' is a flat platform, not all 'terr' words imply a flat surface. 'Terrain' can be varied, and 'subterranean' refers to depth, not flatness."}]}, {"question": "A group of geologists is studying the rocky outcrops, valleys, and slopes of a mountainous region to understand its formation. Which of the following words would best describe what they are analyzing?", "options": [{"text": "Territory", "isCorrect": false, "rationale": "'Territory' refers to land under control or ownership, which is not the primary focus of geologists studying physical features."}, {"text": "Terrace", "isCorrect": false, "rationale": "A 'terrace' is a raised, level area of ground, often man-made, and does not encompass the broad range of natural physical features of a mountainous region."}, {"text": "Terrain", "isCorrect": true, "rationale": "'Terrain' specifically refers to 'a stretch of land, especially with regard to its physical features,' making it the most accurate term for what the geologists are studying."}, {"text": "Subterranean", "isCorrect": false, "rationale": "'Subterranean' means existing beneath the earth's surface. While geologists might study subsurface features, the question emphasizes visible 'rocky outcrops, valleys, and slopes.'"}]}, {"question": "While a nation's \"territory\" refers to the land under its political control, the word \"terrestrial\" primarily describes something that is:", "options": [{"text": "Owned by a state or ruler.", "isCorrect": false, "rationale": "This definition aligns with 'territory,' not 'terrestrial.' 'Terrestrial' does not inherently imply ownership."}, {"text": "Relating to the physical features of the land.", "isCorrect": false, "rationale": "This definition is closer to 'terrain,' which focuses on the physical characteristics of a landscape, rather than the general relation to land or Earth."}, {"text": "Located beneath the Earth's surface.", "isCorrect": false, "rationale": "This describes 'subterranean,' not 'terrestrial.' 'Terrestrial' refers to being on or of the earth's surface, not necessarily beneath it."}, {"text": "Relating to the Earth or land, as opposed to water or air.", "isCorrect": true, "rationale": "The definition provided for 'terrestrial' is 'relating to the earth or to land, as opposed to water or air,' precisely distinguishing it from aquatic or aerial environments."}]}, {"question": "If a scientist discovers a new species of insect that lives exclusively in caves and tunnels deep below the surface, how would they most accurately describe the insect's habitat?", "options": [{"text": "Terrestrial", "isCorrect": false, "rationale": "While 'terrestrial' means 'of the earth,' it typically refers to land surface. An insect exclusively in caves 'deep below the surface' is more specifically described by another term."}, {"text": "Mediterranean", "isCorrect": false, "rationale": "'Mediterranean' refers to a specific sea region and has no relevance to an underground insect habitat."}, {"text": "Subterranean", "isCorrect": true, "rationale": "'Subterranean' directly means 'existing or occurring beneath the earth's surface,' which perfectly describes a habitat in caves and tunnels deep below ground."}, {"text": "Terraced", "isCorrect": false, "rationale": "'Terraced' describes a raised, level area of ground, often stepped, and does not apply to an underground cave system."}]}, {"question": "In ancient cultures, it was common practice to place the deceased in burial chambers or mounds. This act is best described by which of the following words derived from \"terr\"?", "options": [{"text": "Terrestrial", "isCorrect": false, "rationale": "'Terrestrial' relates to the earth or land generally, but doesn't specifically describe the act of burying."}, {"text": "Inter", "isCorrect": true, "rationale": "The definition of 'inter' is 'into the earth — to bury a dead body in the earth,' which directly matches the described ancient practice."}, {"text": "Territory", "isCorrect": false, "rationale": "'Territory' refers to land under control, not the act of burial."}, {"text": "Terrace", "isCorrect": false, "rationale": "A 'terrace' is a raised platform, unrelated to the act of burial."}]}, {"question": "The word \"Mediterranean\" describes a sea \"middle of the lands.\" Which aspect of its definition indicates why it is uniquely named in relation to its surrounding geography?", "options": [{"text": "Its extremely deep trenches.", "isCorrect": false, "rationale": "While the Mediterranean Sea has varying depths, the etymology 'middle of the lands' specifically refers to its geographical position, not its bathymetry."}, {"text": "Its location as a primary trade route.", "isCorrect": false, "rationale": "Its importance as a trade route is a consequence of its geography, but not the direct reason for its name related to 'middle of the lands'."}, {"text": "Being almost entirely encircled by continents.", "isCorrect": true, "rationale": "The definition states it is 'the sea surrounded by Europe, Africa, and Asia; situated inland,' directly reflecting the 'middle of the lands' etymology due to its encirclement by major landmasses."}, {"text": "Its salt content being higher than other seas.", "isCorrect": false, "rationale": "Its salinity is a characteristic of the water, not directly related to the 'middle of the lands' naming convention derived from 'terr'."}]}, {"question": "A wildlife conservationist is concerned with protecting both the designated protected areas where certain species live and the specific environmental conditions within those areas. Which two \"terr\" words best represent these dual concerns, respectively?", "options": [{"text": "Terrain and terrestrial", "isCorrect": false, "rationale": "'Terrestrial' refers to being on land, not specifically the protected area itself. 'Terrain' fits the physical conditions, but 'terrestrial' does not fit the protected area concept as well as 'territory'."}, {"text": "Territory and terrain", "isCorrect": true, "rationale": "'Territory' refers to 'land belonging to — an area of land under the control of a ruler, state, or city,' which aptly describes a designated protected area. 'Terrain' refers to 'a stretch of land, especially with regard to its physical features,' which describes the environmental conditions within those areas."}, {"text": "Terrestrial and territory", "isCorrect": false, "rationale": "This reverses the order and uses 'terrestrial' inaccurately for environmental conditions. 'Terrestrial' describes things 'of the earth' but not the specific physical features."}, {"text": "Terrace and subterranean", "isCorrect": false, "rationale": "Neither 'terrace' (raised platform) nor 'subterranean' (underground) accurately describe protected areas or general environmental conditions on the surface."}]}, {"question": "Farmers in mountainous regions often create flat, step-like sections on hillsides to cultivate crops and prevent soil erosion. These man-made land features are known as:", "options": [{"text": "Subterranean fields", "isCorrect": false, "rationale": "These features are on the surface and raised, not 'subterranean' (beneath the earth's surface)."}, {"text": "Terraces", "isCorrect": true, "rationale": "The definition of 'terrace' is 'a raised, level area of ground; an outdoor platform,' which perfectly describes the step-like sections created by farmers."}, {"text": "Terrestrial zones", "isCorrect": false, "rationale": "While these are on land and thus 'terrestrial,' 'terrestrial zone' is a broad term that doesn't specifically describe the man-made, stepped feature."}, {"text": "Mediterranean platforms", "isCorrect": false, "rationale": "'Mediterranean' refers to a specific geographic region and is unrelated to these agricultural land features."}]}, {"question": "If astronomers discuss the possibility of \"non-terrestrial life forms,\" what are they implying about the potential habitat of these organisms?", "options": [{"text": "They live on Earth but not on land.", "isCorrect": false, "rationale": "While 'non-terrestrial' implies not on land, it is more fundamentally about not being from Earth itself. Life in Earth's oceans would be 'aquatic,' but still Earth-based."}, {"text": "They live exclusively in subterranean environments.", "isCorrect": false, "rationale": "'Subterranean' life would still be Earth-based. 'Non-terrestrial' implies not originating from Earth at all."}, {"text": "They originate from or exist on planets other than Earth, or in environments not of Earth's land.", "isCorrect": true, "rationale": "'Terrestrial' means 'relating to the earth or to land.' Therefore, 'non-terrestrial' refers to something not from Earth or not of Earth's land, implying extraterrestrial origin or a habitat not associated with Earth's land surface."}, {"text": "They are microscopic and cannot be seen by the naked eye.", "isCorrect": false, "rationale": "The size or visibility of the life form is not implied by the term 'non-terrestrial'; it refers to location/origin."}]}, {"question": "The word \"subterranean\" directly illustrates how a prefix can modify the core meaning of \"terr.\" In this case, the prefix \"sub-\" indicates:", "options": [{"text": "Above or over", "isCorrect": false, "rationale": "Prefixes like 'super-' or 'over-' would indicate 'above' or 'over'."}, {"text": "Within or inside", "isCorrect": false, "rationale": "While subterranean structures are 'within' the earth, the primary meaning of 'sub-' is not merely 'within' but specifically 'below' or 'under'."}, {"text": "Under or beneath", "isCorrect": true, "rationale": "The word 'subterranean' is defined as 'under the earth — existing or occurring beneath the earth's surface,' clearly showing that 'sub-' means 'under' or 'beneath'."}, {"text": "Around or surrounding", "isCorrect": false, "rationale": "Prefixes like 'circum-' or 'peri-' would indicate 'around' or 'surrounding'."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
