    </div>

        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Who is the original speaker famously associated with the statement, 'The unexamined life is not worth living'?", "options": [{"text": "Plato", "isCorrect": false, "rationale": "Plato recorded the statement in his Apologia, but he attributed it to Socrates, his teacher. Plato was the transcriber and chronicler, not the original speaker."}, {"text": "Socrates", "isCorrect": true, "rationale": "The epigraph explicitly states that Plato is 'quoting Socrates,' making Socrates the original source of this profound philosophical declaration."}, {"text": "Apologia", "isCorrect": false, "rationale": "Apologia refers to the title of Plato's work where the quote is found, which is a defense speech of Socrates, not the person who spoke the words."}, {"text": "Aristotle", "isCorrect": false, "rationale": "Aristotle was a student of Plato, but he lived after Socrates and is not associated with this particular quote as its originator."}]}, {"question": "In the context of Socrates's philosophy, what does 'the unexamined life' primarily signify?", "options": [{"text": "A life lived in isolation from society and its demands.", "isCorrect": false, "rationale": "Socrates engaged actively with Athenian society, questioning citizens in the marketplace, which contradicts the idea of isolation. The 'unexamined' refers to internal reflection, not external interaction."}, {"text": "A life devoid of critical self-reflection, moral inquiry, and philosophical questioning.", "isCorrect": true, "rationale": "Socrates believed that true human existence involves constant questioning of one's beliefs, values, and actions. An 'unexamined life' lacks this crucial intellectual and ethical introspection."}, {"text": "A life that has not been scientifically studied or observed.", "isCorrect": false, "rationale": "While 'examined' can mean scientific scrutiny today, in the Socratic context, it refers to philosophical and ethical self-inquiry, not empirical scientific observation."}, {"text": "A life free from the scrutiny or judgment of others.", "isCorrect": false, "rationale": "Socrates himself faced intense scrutiny and judgment from others, which eventually led to his trial and execution. His quote emphasizes internal examination, not avoidance of external judgment."}]}, {"question": "What is the core implication of Socrates's assertion that such a life is 'not worth living'?", "options": [{"text": "That individuals who do not examine their lives are morally inferior and destined for punishment.", "isCorrect": false, "rationale": "While Socrates emphasized moral virtue, his statement is less about divine punishment and more about the intrinsic value and quality of human existence. It's a philosophical claim, not a religious one."}, {"text": "That a life without purposeful inquiry into one's values and existence lacks true human value and meaning.", "isCorrect": true, "rationale": "Socrates implies that without self-awareness and critical thought about what constitutes a good life, human existence is reduced to a mere biological function, lacking the unique rational and ethical dimensions that give it profound worth."}, {"text": "That without an examination of life, one cannot achieve material wealth or social status.", "isCorrect": false, "rationale": "Socrates consistently de-emphasized material possessions and social status, focusing instead on the well-being of the soul. His philosophy does not link examination to worldly success."}, {"text": "That human life is inherently suffering and meaningless unless constantly validated by external sources.", "isCorrect": false, "rationale": "Socrates's emphasis was on internal validation through reason and self-knowledge, not external validation. His statement suggests that meaning must be sought from within through examination."}]}, {"question": "Given its position as an epigraph for a chapter, what analytical purpose does this quote likely serve in a 'bio' (biology or life studies) textbook?", "options": [{"text": "To introduce the idea that biology is the only true means by which life can be examined.", "isCorrect": false, "rationale": "The quote promotes philosophical examination, which is distinct from scientific biological examination. It's unlikely to claim exclusivity for biology but rather complement it."}, {"text": "To suggest that merely studying the biological mechanics of life is insufficient without deeper, reflective inquiry into its meaning and purpose.", "isCorrect": true, "rationale": "As an epigraph for a chapter on 'bio' (life), the quote challenges readers to consider life not just as a biological phenomenon, but also as a subject for profound philosophical and ethical self-examination, enriching the scientific perspective."}, {"text": "To criticize the limitations of scientific inquiry in understanding human existence.", "isCorrect": false, "rationale": "The quote advocates for philosophical inquiry, but it does not necessarily criticize science. Instead, it broadens the definition of 'examining life' beyond just empirical study."}, {"text": "To emphasize the fundamental biological imperative for all living organisms to reproduce and survive.", "isCorrect": false, "rationale": "Socrates's quote transcends mere biological imperatives, focusing on the uniquely human capacity for rational thought and self-reflection, which goes beyond basic survival and reproduction."}]}, {"question": "Which of the following actions best exemplifies living an 'examined life' according to Socratic philosophy?", "options": [{"text": "Accepting cultural traditions and societal norms without question or analysis.", "isCorrect": false, "rationale": "Socrates famously challenged conventional wisdom and societal norms, encouraging individuals to scrutinize their beliefs rather than passively accept them."}, {"text": "Regularly engaging in critical self-assessment, questioning personal motivations, and reflecting on the ethical implications of one's actions.", "isCorrect": true, "rationale": "An examined life, in Socratic terms, involves continuous introspection and rational inquiry into one's own character, values, and the impact of one's choices, striving for self-knowledge and moral improvement."}, {"text": "Seeking external approval and validation from peers and authorities to guide one's choices.", "isCorrect": false, "rationale": "Socrates prioritized internal conviction derived from reasoned thought over external validation or popularity. An examined life focuses on internal truth, not external opinion."}, {"text": "Focusing exclusively on accumulating knowledge and facts about the external world.", "isCorrect": false, "rationale": "While knowledge is important, the Socratic 'examined life' emphasizes self-knowledge and ethical reasoning above mere factual accumulation about the external world."}]}, {"question": "The phrase 'Ho de anexetastos bios ou biotos anthropo' is written in which ancient language?", "options": [{"text": "Latin", "isCorrect": false, "rationale": "Latin was the language of ancient Rome. While prominent in Western philosophy, the original text of this quote is not Latin."}, {"text": "Hebrew", "isCorrect": false, "rationale": "Hebrew is an ancient Semitic language, entirely unrelated to the Greek philosophical tradition from which this quote originates."}, {"text": "Sanskrit", "isCorrect": false, "rationale": "Sanskrit is an ancient Indo-Aryan language from India, distinct from the classical languages of the Mediterranean world."}, {"text": "Ancient Greek", "isCorrect": true, "rationale": "The quote 'Ho de anexetastos bios ou biotos anthropo' is presented as a direct transcription from Plato's Apologia, which was written in Ancient Greek, the language of Socrates and Plato."}]}, {"question": "From a historical perspective, Socrates's promotion of the 'examined life' contributed to his eventual conflict with Athenian authorities because:", "options": [{"text": "He advocated for a return to traditional, unquestioning religious practices.", "isCorrect": false, "rationale": "Socrates was accused of impiety and corrupting the youth precisely because he encouraged questioning of traditional beliefs and authority, not a return to unquestioning practices."}, {"text": "He encouraged citizens, especially the youth, to critically question the state, its leaders, and popular opinions.", "isCorrect": true, "rationale": "By urging constant questioning and independent rational thought, Socrates's philosophy undermined the established authority and traditional values of Athens, making him a perceived threat to the social order."}, {"text": "He championed material wealth and political power as the ultimate goals of human existence.", "isCorrect": false, "rationale": "Socrates famously disdained material wealth and political power, focusing instead on virtue and the care of the soul, which was a contrast to many societal aspirations."}, {"text": "He argued for the superiority of physical prowess and military conquest over intellectual pursuits.", "isCorrect": false, "rationale": "Socrates was an intellectual, a philosopher, and consistently prioritized reasoned debate and moral insight over physical or military might."}]}, {"question": "What kind of value does Socrates attribute to the 'examined life' versus the 'unexamined life'?", "options": [{"text": "An examined life is more efficient, while an unexamined life is slower.", "isCorrect": false, "rationale": "Socrates's distinction is not based on efficiency or speed, but on the intrinsic quality and ethical fulfillment of human existence."}, {"text": "An examined life is primarily for philosophers, while an unexamined life is acceptable for common people.", "isCorrect": false, "rationale": "Socrates believed that self-examination was a universal human imperative, not limited to a select few. He engaged ordinary citizens in philosophical dialogue."}, {"text": "An examined life possesses genuine human worth and meaning, whereas an unexamined life, despite its existence, lacks this essential value.", "isCorrect": true, "rationale": "Socrates viewed rational self-inquiry as fundamental to human dignity and purpose. Without it, life, though biologically present, fails to achieve its highest human potential, rendering it 'not worth living' in a profound sense."}, {"text": "An examined life leads to happiness, while an unexamined life leads to sadness.", "isCorrect": false, "rationale": "While an examined life might contribute to a form of eudaimonia (flourishing), the core distinction is about inherent value and meaning, not just emotional states of happiness or sadness."}]}, {"question": "The location 'Apologia, 38a' refers to:", "options": [{"text": "The specific street address in Athens where Socrates delivered his defense.", "isCorrect": false, "rationale": "38a is a standard academic reference to a specific section within Plato's text, not a physical location."}, {"text": "The historical account of the Battle of Apologia where Socrates fought.", "isCorrect": false, "rationale": "Apologia is the title of Plato's work detailing Socrates's defense speech, not a historical battle. Socrates did fight in battles, but not one called 'Apologia'."}, {"text": "The title of Plato's work and a specific textual reference point within it.", "isCorrect": true, "rationale": "In classical scholarship, 'Apologia' refers to Plato's dialogue recounting Socrates's defense speech, and '38a' is a standard Stephanus pagination reference indicating a precise location within that text."}, {"text": "A ancient Greek philosophical school founded by Plato.", "isCorrect": false, "rationale": "Plato founded the Academy, but Apologia is the title of a specific work, not a school."}]}, {"question": "Applying the essence of Socrates's quote to contemporary issues, what would an 'examined' approach to information consumption likely entail?", "options": [{"text": "Primarily relying on popular social media trends and influencers for factual information.", "isCorrect": false, "rationale": "An examined approach would question the reliability and biases of sources, including social media, rather than passively accepting popular trends."}, {"text": "Actively seeking diverse perspectives, critically evaluating sources, and questioning one's own biases before forming opinions.", "isCorrect": true, "rationale": "This describes a process of critical inquiry and self-reflection consistent with the Socratic ideal. It involves intellectual rigor and a commitment to understanding beyond surface-level information."}, {"text": "Avoiding all news and information to maintain a state of blissful ignorance.", "isCorrect": false, "rationale": "Socrates advocated for engagement with life's fundamental questions, not avoidance. Ignorance would be the antithesis of an examined life."}, {"text": "Only consuming information that confirms one's pre-existing beliefs to avoid cognitive dissonance.", "isCorrect": false, "rationale": "This describes confirmation bias, which prevents critical self-reflection and the examination of one's own beliefs, thus leading to an unexamined approach."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
