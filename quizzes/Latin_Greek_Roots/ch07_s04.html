<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words from the Ancients: Latin &amp; Greek Roots &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 7, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does 'cognition' mean?", "options": [{"text": "Speaking clearly", "isCorrect": false, "rationale": "Speaking = voc/dict."}, {"text": "The mental process of knowing and understanding", "isCorrect": true, "rationale": "cogn + -ition (process of)."}, {"text": "Ability to hear", "isCorrect": false, "rationale": "Hearing = aud."}, {"text": "Being invisible", "isCorrect": false, "rationale": "Relates to seeing."}]}, {"question": "'Recognize' = re- + cogn. Literally means?", "options": [{"text": "To see again", "isCorrect": false, "rationale": "Uses vis/vid."}, {"text": "To know again", "isCorrect": true, "rationale": "To identify something previously known."}, {"text": "To hear again", "isCorrect": false, "rationale": "Uses aud."}, {"text": "To write again", "isCorrect": false, "rationale": "Uses scrib."}]}, {"question": "A celebrity traveling 'incognito' is?", "options": [{"text": "Without luggage", "isCorrect": false, "rationale": "About identity, not possessions."}, {"text": "With identity hidden", "isCorrect": true, "rationale": "in- (not) + cognit (known)."}, {"text": "By train", "isCorrect": false, "rationale": "About identity, not transport."}, {"text": "With large entourage", "isCorrect": false, "rationale": "Would make one more recognizable."}]}, {"question": "What does 'cognizant' mean?", "options": [{"text": "Unaware", "isCorrect": false, "rationale": "The opposite."}, {"text": "Aware; having knowledge", "isCorrect": true, "rationale": "cogn + -izant (being in a state of)."}, {"text": "Strong emotions", "isCorrect": false, "rationale": "Emotions = sens/sent."}, {"text": "Speaking well", "isCorrect": false, "rationale": "Speaking = voc."}]}, {"question": "What does 'diagnose' mean?", "options": [{"text": "Predict the future", "isCorrect": false, "rationale": "That is prognosis."}, {"text": "Identify a problem by examining symptoms", "isCorrect": true, "rationale": "dia- (through) + gnos (know)."}, {"text": "Forget something", "isCorrect": false, "rationale": "Opposite of knowing."}, {"text": "Teach a concept", "isCorrect": false, "rationale": "Different roots."}]}, {"question": "How does 'prognosis' differ from 'diagnose'?", "options": [{"text": "About the past vs. present", "isCorrect": false, "rationale": "Prognosis = future."}, {"text": "Predicts future; diagnose identifies current problem", "isCorrect": true, "rationale": "pro- (ahead) vs. dia- (through)."}, {"text": "Same meaning", "isCorrect": false, "rationale": "Different prefixes, different meanings."}, {"text": "Prognosis is Latin; diagnose Greek", "isCorrect": false, "rationale": "Both Greek."}]}, {"question": "Which pair shows Latin (everyday) vs. Greek (scientific)?", "options": [{"text": "Audible and sensory", "isCorrect": false, "rationale": "Neither from cogn/gnosc."}, {"text": "Cognition (everyday) and diagnose (scientific)", "isCorrect": true, "rationale": "Perfect illustration."}, {"text": "Diagnose and cognition reversed", "isCorrect": false, "rationale": "Cognition is Latin; diagnose Greek."}, {"text": "Recognize and prognosis reversed", "isCorrect": false, "rationale": "Recognize is Latin; prognosis Greek."}]}, {"question": "What does 'cognitive' mean?", "options": [{"text": "Writing process", "isCorrect": false, "rationale": "Writing = scrib."}, {"text": "Relating to thinking and knowing", "isCorrect": true, "rationale": "cogn + -itive (relating to)."}, {"text": "Feeling deeply", "isCorrect": false, "rationale": "Feeling = sens/sent."}, {"text": "Speaking publicly", "isCorrect": false, "rationale": "Speaking = voc."}]}, {"question": "What chain do cogn, vis/vid, and sens/sent form?", "options": [{"text": "Speaking, writing, reading", "isCorrect": false, "rationale": "The chain is seeing, feeling, knowing."}, {"text": "Seeing, feeling, knowing -- perceive then understand", "isCorrect": true, "rationale": "Stated in the root connection."}, {"text": "Hearing, speaking, writing", "isCorrect": false, "rationale": "Wrong roots."}, {"text": "Running, jumping, climbing", "isCorrect": false, "rationale": "Physical actions, not roots."}]}, {"question": "Which word entered English through Italian?", "options": [{"text": "Cognition", "isCorrect": false, "rationale": "From Latin directly."}, {"text": "Incognito", "isCorrect": true, "rationale": "From Italian, from Latin 'incognitus.'"}, {"text": "Diagnose", "isCorrect": false, "rationale": "From Greek."}, {"text": "Prognosis", "isCorrect": false, "rationale": "From Greek."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
