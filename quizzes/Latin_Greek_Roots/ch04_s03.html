    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What was the primary reason Roman scribes held 'enormous power' in their society?", "options": [{"text": "They were the sole individuals who understood Latin.", "isCorrect": false, "rationale": "While scribes were literate, many Romans spoke Latin. Their power stemmed from their literacy in a largely illiterate society, not from being the only speakers of the language."}, {"text": "They possessed the rare ability to read and write.", "isCorrect": true, "rationale": "The text explicitly states: 'In a world where most people could not read or write, the scribe held enormous power.' This directly links their power to their unique literacy."}, {"text": "They were responsible for commanding military legions.", "isCorrect": false, "rationale": "Scribes recorded military orders, but they did not issue commands themselves; that was the role of military leaders."}, {"text": "They invented the tools necessary for writing.", "isCorrect": false, "rationale": "The text mentions their tools (stylus, wax tablet, reed pen, papyrus) but does not suggest they invented them. Their power came from the *use* of these tools for a critical skill."}]}, {"question": "Which pair of tools would a Roman scribe typically use for their work?", "options": [{"text": "Quill and parchment.", "isCorrect": false, "rationale": "Quills and parchment became common later, in the medieval period, not during the Roman era as described for scribes using papyrus and wax tablets."}, {"text": "Stylus and wax tablet.", "isCorrect": true, "rationale": "The text states: 'Armed with a sharp stylus and a wax tablet, or a reed pen and a roll of papyrus, the scribe was one of the most important figures...'"}, {"text": "Chisel and stone slab.", "isCorrect": false, "rationale": "While words were carved into stone, this was for monumental inscriptions, not the daily writing tasks of a Roman scribe like recording laws, letters, or contracts."}, {"text": "Keyboard and monitor.", "isCorrect": false, "rationale": "These are modern tools, far removed from the technology available to Roman scribes."}]}, {"question": "The Latin verb 'scribere' and its past participle 'scriptum' primarily convey the meaning of:", "options": [{"text": "To speak or narrate.", "isCorrect": false, "rationale": "While related to communication, 'scribere' specifically means to write, not to speak."}, {"text": "To read or decipher.", "isCorrect": false, "rationale": "Scribes could read, but the root 'scribere' itself means to write, not to read."}, {"text": "To write or written.", "isCorrect": true, "rationale": "The text explicitly states: 'The Latin verb scribere meant “to write,” and its past participle scriptum' forms the basis for related English words."}, {"text": "To record history or events.", "isCorrect": false, "rationale": "While scribes did record history, 'to write' is the more fundamental and direct meaning of the root itself, encompassing various types of writing, not just historical."}]}, {"question": "Based on its etymology, which action best represents 'inscribing'?", "options": [{"text": "Reading an ancient scroll.", "isCorrect": false, "rationale": "Reading is not inscribing. Inscribing involves the act of writing onto a surface."}, {"text": "Drawing a picture on a piece of paper.", "isCorrect": false, "rationale": "While drawing is a form of marking, 'inscribe' specifically implies 'writing into' a surface, often in a more permanent or deliberate way than a simple drawing on paper."}, {"text": "Etching a message onto a metal plaque.", "isCorrect": true, "rationale": "The text explains 'To inscribe is to “write into” a surface — think of words carved into stone monuments.' Etching a message onto a metal plaque directly fits this description of writing into a surface."}, {"text": "Copying a document by hand onto a new sheet.", "isCorrect": false, "rationale": "Copying is an act of writing, but 'inscribing' emphasizes writing *into* a surface, implying permanence or being embedded, rather than simply transferring text to a new medium."}]}, {"question": "When someone 'describes' a situation, they are essentially using words to:", "options": [{"text": "Predict its future outcome.", "isCorrect": false, "rationale": "Predicting involves forecasting, which is not the primary meaning conveyed by 'describe' based on the given etymology."}, {"text": "Transform it into a physical object.", "isCorrect": false, "rationale": "Words cannot physically transform something. 'Describe' means to use words to represent or characterize."}, {"text": "Document its characteristics and features.", "isCorrect": true, "rationale": "The text states: 'To describe something is to “write down” its features, painting a picture with words.' This aligns directly with documenting characteristics."}, {"text": "Challenge its validity or truthfulness.", "isCorrect": false, "rationale": "Challenging validity is a critical act, but it is not what 'to describe' inherently means according to the passage's etymological explanation."}]}, {"question": "Before the invention of the printing press, why were all books in Europe referred to as 'manuscripts'?", "options": [{"text": "They were written exclusively by male authors (manu-men).", "isCorrect": false, "rationale": "This is an incorrect interpretation of the Latin root 'manu', which means 'by hand', not related to gender."}, {"text": "They were created using materials manufactured in specific regions.", "isCorrect": false, "rationale": "The term 'manuscript' relates to the method of creation, not the origin of materials."}, {"text": "They were individually copied by hand, one word at a time.", "isCorrect": true, "rationale": "The etymnote states: 'The word manuscript literally means “written by hand” — from Latin manu (by hand) + scriptum (written). Before the printing press was invented in the 1400s, every book in Europe was a manuscript, copied by hand one word at a time.'"}, {"text": "They contained handwritten annotations from the original authors.", "isCorrect": false, "rationale": "While some might have contained annotations, the term 'manuscript' applies to the entire book's creation method, not just marginalia."}]}, {"question": "The word 'prescription' implies an action that occurs:", "options": [{"text": "As a concluding summary after an event.", "isCorrect": false, "rationale": "A concluding summary would align more with a 'postscript' or recap, not a 'prescription'."}, {"text": "To dictate terms during a negotiation.", "isCorrect": false, "rationale": "Dictating terms implies setting rules, but 'prescription' specifically refers to written instructions given in advance."}, {"text": "To provide instructions in advance.", "isCorrect": true, "rationale": "The text explains: 'A prescription is literally something “written before” — a doctor writes instructions before you take the medicine.' This directly supports providing instructions in advance."}, {"text": "To permanently record historical facts.", "isCorrect": false, "rationale": "While prescriptions are records, their primary function, as explained by the etymology, is giving instructions 'before' an action, not primarily historical preservation."}]}, {"question": "How do 'transcript' and 'postscript' primarily differ in their temporal relationship to the main content?", "options": [{"text": "A transcript is a summary, while a postscript is an addition.", "isCorrect": false, "rationale": "While a postscript is an addition, a transcript is a full written record of speech, not necessarily a summary. The primary difference emphasized by their prefixes is temporal."}, {"text": "A transcript records something spoken previously, while a postscript adds information after the main text.", "isCorrect": true, "rationale": "The text states a transcript is 'written across' from speech to text (implying the speech came first), and a postscript is 'written after' the main text. This clearly differentiates their temporal relation."}, {"text": "A transcript is an original document, while a postscript is a revised version.", "isCorrect": false, "rationale": "Neither word implies originality versus revision as their primary distinction."}, {"text": "A transcript translates to another language, while a postscript corrects errors.", "isCorrect": false, "rationale": "These are not the meanings or functions described for these words in the passage."}]}, {"question": "The ancient proverb 'spoken words fly away, but written words endure' highlights which crucial aspect of the scribe's role in Roman society?", "options": [{"text": "Their role in facilitating spoken communication.", "isCorrect": false, "rationale": "The proverb emphasizes the ephemeral nature of spoken words compared to the permanence of written words, directly contrasting with 'facilitating spoken communication'."}, {"text": "Their exclusive ability to understand different languages.", "isCorrect": false, "rationale": "The proverb relates to the medium (spoken vs. written) and its longevity, not multilingualism."}, {"text": "Their function in preserving information over extended periods.", "isCorrect": true, "rationale": "By writing down laws, contracts, and speeches, scribes ensured that these important pieces of information would 'endure' and not 'fly away' like spoken words, directly linking to preservation."}, {"text": "Their skill in public speaking and rhetoric.", "isCorrect": false, "rationale": "The proverb distinguishes from 'spoken words,' implying the scribe's power came from writing, not speaking."}]}, {"question": "A modern professional who creates a written record of a courtroom proceeding by converting spoken words into text best exemplifies the role of a 'scribe' as described in the passage because they are primarily:", "options": [{"text": "Interpreting legal jargon for the public.", "isCorrect": false, "rationale": "While clarity may be a goal, interpretation is not the primary function of a scribe as defined in the text. A scribe 'writes down' what is said."}, {"text": "Acting as an author of new legal texts.", "isCorrect": false, "rationale": "A courtroom transcriber records existing speech; they do not author new legal texts."}, {"text": "Documenting spoken information for permanence.", "isCorrect": true, "rationale": "The passage defines a scribe as 'one who writes' and mentions transcripts as 'written across' from speech to text. This modern role directly mirrors the historical function of converting transient spoken words into enduring written records, fulfilling the core purpose of a scribe."}, {"text": "Negotiating settlements between parties.", "isCorrect": false, "rationale": "Negotiation is a different professional role, unrelated to the act of writing down spoken words."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
