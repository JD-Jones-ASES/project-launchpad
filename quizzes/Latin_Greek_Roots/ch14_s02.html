</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 14, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the fundamental meaning conveyed by the root \"aqua\" or \"aqu\"?", "options": [{"text": "Land", "isCorrect": false, "rationale": "The root 'aqua' does not mean land; its meaning is specifically related to water."}, {"text": "Water", "isCorrect": true, "rationale": "The text explicitly states that the meaning of 'aqua / aqu' is 'water'."}, {"text": "Air", "isCorrect": false, "rationale": "The root 'aqua' does not mean air; its meaning is specifically related to water."}, {"text": "Fire", "isCorrect": false, "rationale": "The root 'aqua' does not mean fire; its meaning is specifically related to water."}]}, {"question": "Based on the root \"aqua,\" what would be the most likely primary characteristic of an \"aquatic\" animal?", "options": [{"text": "It lives on land.", "isCorrect": false, "rationale": "'Aqua' refers to water, so an aquatic animal would not primarily live on land."}, {"text": "It flies in the air.", "isCorrect": false, "rationale": "Flying in the air is unrelated to the 'aqua' root, which means water."}, {"text": "It primarily lives in or near water.", "isCorrect": true, "rationale": "The root 'aqua' means water, so an 'aquatic' animal is defined by its habitation in or near water."}, {"text": "It has a fiery temperament.", "isCorrect": false, "rationale": "A temperament (fiery or otherwise) is not related to the 'aqua' root, which signifies water."}]}, {"question": "In the word \"aqueduct,\" the variant form \"aque\" is used. For what primary reason is this variant noted in the root profile?", "options": [{"text": "It signifies a completely different meaning from \"aqua.\"", "isCorrect": false, "rationale": "The 'aque' variant maintains the core meaning of 'water' but is a phonetic or structural adaptation."}, {"text": "It is used in some compounds for better linguistic flow or historical reasons.", "isCorrect": true, "rationale": "The profile states 'Variants: aque (in some compounds, e.g., aqueduct)', indicating its use is for specific word formations rather than a change in core meaning."}, {"text": "It indicates the word is derived from a different language.", "isCorrect": false, "rationale": "The variant 'aque' still originates from Latin 'aqua', not a different language."}, {"text": "It is an outdated spelling no longer used.", "isCorrect": false, "rationale": "The variant 'aque' is still current in words like 'aqueduct', making this statement incorrect."}]}, {"question": "A marine biologist studies an \"aquatic\" ecosystem. What environment is the biologist primarily investigating?", "options": [{"text": "Deserts and arid lands", "isCorrect": false, "rationale": "Deserts and arid lands are characterized by a lack of water, which is contrary to the meaning of 'aquatic'."}, {"text": "High mountain ranges", "isCorrect": false, "rationale": "While mountains may have water sources, 'aquatic' specifically refers to the water environment itself, not elevated landforms."}, {"text": "Rivers, lakes, and oceans", "isCorrect": true, "rationale": "An 'aquatic' ecosystem is one that exists in water, encompassing environments like rivers, lakes, and oceans, all directly related to the 'aqua' root."}, {"text": "Forests and grasslands", "isCorrect": false, "rationale": "Forests and grasslands are terrestrial environments, not primarily aquatic, though they may contain bodies of water."}]}, {"question": "From which language does the root \"aqua\" primarily originate?", "options": [{"text": "Greek", "isCorrect": false, "rationale": "The text specifies Latin, not Greek, as the origin."}, {"text": "German", "isCorrect": false, "rationale": "The text specifies Latin, not German, as the origin."}, {"text": "Latin", "isCorrect": true, "rationale": "The profile clearly states: 'Origin: Latin aqua (water)'."}, {"text": "Old English", "isCorrect": false, "rationale": "The text specifies Latin, not Old English, as the origin."}]}, {"question": "If a city built a large \"aquifer,\" what would be its primary purpose based on the root 'aqua'?", "options": [{"text": "To house exotic animals.", "isCorrect": false, "rationale": "Housing animals is the purpose of an aquarium, not an aquifer. The 'aqua' root helps differentiate."}, {"text": "To display art collections.", "isCorrect": false, "rationale": "Displaying art is unrelated to the 'aqua' root and the function of an aquifer."}, {"text": "To store or convey water underground.", "isCorrect": true, "rationale": "An aquifer is a body of permeable rock which can contain or transmit groundwater, directly relating to the 'aqua' root meaning 'water'."}, {"text": "To provide public transportation.", "isCorrect": false, "rationale": "Providing public transportation is unrelated to the 'aqua' root and the function of an aquifer."}]}, {"question": "Imagine a new device called an \"aquajet.\" Given the \"aqua\" root, what would be its most probable function?", "options": [{"text": "A device for flying through the air.", "isCorrect": false, "rationale": "Flying is not associated with the 'aqua' root, which means water."}, {"text": "A vehicle designed to travel over or through water at high speed.", "isCorrect": true, "rationale": "Combining 'aqua' (water) with 'jet' (high-speed propulsion) logically suggests a water-based high-speed vehicle."}, {"text": "A machine for digging deep into the earth.", "isCorrect": false, "rationale": "Digging into the earth is unrelated to the 'aqua' root, which means water."}, {"text": "A tool for generating electricity from sunlight.", "isCorrect": false, "rationale": "Generating electricity from sunlight is unrelated to the 'aqua' root, which means water."}]}, {"question": "All the example words (aquatic, aqueduct, aquarium, aquifer) share a common semantic element due to the \"aqua\" root. What is that element?", "options": [{"text": "They all refer to enclosed spaces.", "isCorrect": false, "rationale": "While an aquarium is an enclosed space, an aquifer is an underground layer, and aquatic describes an environment, so this is not universally true."}, {"text": "They all relate to motion or movement.", "isCorrect": false, "rationale": "While an aqueduct involves movement of water, 'aquatic' describes a state of being, and 'aquarium' is a place, so this is not a universal element."}, {"text": "They all inherently involve water.", "isCorrect": true, "rationale": "Since 'aqua' means water, all words derived from this root will fundamentally relate to or involve water in their meaning."}, {"text": "They all describe living organisms.", "isCorrect": false, "rationale": "An aqueduct and an aquifer are structures or geological formations, not living organisms, so this is incorrect."}]}, {"question": "Which of the following hypothetical words *most clearly* demonstrates the meaning of the \"aqua\" root?", "options": [{"text": "Aquascape (a landscape design featuring water elements)", "isCorrect": true, "rationale": "An 'aquascape' explicitly incorporates water elements into a design, directly reflecting the 'aqua' root's meaning of water."}, {"text": "Aquafort (a strong fort)", "isCorrect": false, "rationale": "'Aqua' does not mean 'strong'; this word does not clearly demonstrate the root's meaning."}, {"text": "Aquabright (very bright)", "isCorrect": false, "rationale": "'Aqua' does not mean 'very' or relate to brightness; this word does not clearly demonstrate the root's meaning."}, {"text": "Aquafast (very fast)", "isCorrect": false, "rationale": "'Aqua' does not mean 'very' or relate to speed; this word does not clearly demonstrate the root's meaning."}]}, {"question": "Consider the word \"aqueous.\" Based on the provided root profile, what can we infer about its meaning?", "options": [{"text": "It means \"related to land.\"", "isCorrect": false, "rationale": "The root 'aqua' means water, not land, so this inference would be incorrect."}, {"text": "It means \"full of air.\"", "isCorrect": false, "rationale": "The root 'aqua' means water, not air, so this inference would be incorrect."}, {"text": "It means \"containing or resembling water.\"", "isCorrect": true, "rationale": "Given 'aqua' means water, 'aqueous' logically describes something composed of, dissolved in, or resembling water."}, {"text": "It means \"burning brightly.\"", "isCorrect": false, "rationale": "The root 'aqua' means water, which has no direct relation to brightness or burning, so this inference would be incorrect."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
