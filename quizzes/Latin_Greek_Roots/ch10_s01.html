<body>
<div class="quiz-container">

        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 10, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the central message conveyed by Seneca's epigraph, \"Fate leads the willing and drags the unwilling\"?", "options": [{"text": "Fate only affects those who actively believe in its power.", "isCorrect": false, "rationale": "The epigraph suggests fate is an inherent force affecting everyone, regardless of belief, through its actions of 'leading' or 'dragging'."}, {"text": "Resistance to destiny leads to a more arduous and difficult experience.", "isCorrect": true, "rationale": "The phrase 'drags the unwilling' directly implies that those who resist fate will face a harsher, more challenging path compared to being 'led'."}, {"text": "Humans have complete control over their destiny and can choose to avoid fate altogether.", "isCorrect": false, "rationale": "The epigraph states that fate 'leads' or 'drags' individuals, indicating its inescapable influence, not that it can be avoided."}, {"text": "Willingness ensures that fate will always bring only positive and kind outcomes.", "isCorrect": false, "rationale": "Being 'led' by fate implies a smoother experience of inevitable events, not necessarily that the events themselves will always be 'kind' or positive. The outcome is still fate's decree."}]}, {"question": "According to the epigraph, what is the primary distinction in how fate interacts with an individual who is \"willing\" versus one who is \"unwilling\"?", "options": [{"text": "The unwilling can ultimately alter their fate, while the willing cannot.", "isCorrect": false, "rationale": "The epigraph does not suggest that the unwilling can alter fate; rather, they are 'dragged' by it, indicating fate's continued power over them."}, {"text": "The willing experiences a guided journey, while the unwilling endures a forced and difficult one.", "isCorrect": true, "rationale": "The verbs 'leads' for the willing and 'drags' for the unwilling directly illustrate this contrast between a cooperative, guided passage and a coercive, difficult struggle."}, {"text": "The willing are exempt from fate's influence, unlike the unwilling who are always affected.", "isCorrect": false, "rationale": "Both the willing and unwilling are subject to fate's influence; the difference lies in their experience of it, not their exemption from it."}, {"text": "The unwilling always achieve their goals eventually, albeit with more effort than the willing.", "isCorrect": false, "rationale": "The epigraph focuses on the *manner* of the journey ('leads' vs. 'drags'), not the eventual achievement of personal goals."}]}, {"question": "Based on the statement \"Fate leads the willing,\" what benefit does Seneca suggest is gained by adopting a willing attitude toward one's destiny?", "options": [{"text": "The ability to change fate's predetermined path to suit one's desires.", "isCorrect": false, "rationale": "Being 'led' implies following a path set by fate, not altering it. The path is still fate's."}, {"text": "A smoother and less confrontational experience of inevitable events.", "isCorrect": true, "rationale": "The word 'leads' suggests a gentler, more cooperative, and less arduous progression through life's events, in contrast to being 'dragged'."}, {"text": "Complete freedom from life's challenges and difficulties.", "isCorrect": false, "rationale": "Being 'led' doesn't eliminate challenges, but rather changes one's experience and response to them. Fate still presents circumstances."}, {"text": "The power to dictate the terms and outcomes of one's future.", "isCorrect": false, "rationale": "The epigraph attributes power to 'fata' (fate), not to the individual's will to dictate outcomes, but to influence their experience of those outcomes."}]}, {"question": "The phrase \"drags the unwilling\" most strongly suggests which consequence for those who resist their destiny?", "options": [{"text": "They will eventually overcome fate through sheer force of will.", "isCorrect": false, "rationale": "'Drags' implies that fate is still in control and exerting force, not that resistance will lead to its overthrow."}, {"text": "Their journey will be marked by struggle, coercion, and potential suffering.", "isCorrect": true, "rationale": "To be 'dragged' suggests a forceful, unwilling movement, implying significant difficulty, resistance, and a potentially painful experience."}, {"text": "Fate will simply ignore them and their actions, allowing them to forge their own path.", "isCorrect": false, "rationale": "The active verb 'drags' clearly indicates fate's engagement and influence, not its indifference or absence."}, {"text": "They will discover hidden paths to avoid their destined challenges.", "isCorrect": false, "rationale": "Being 'dragged' means they are being moved along fate's path, not finding ways to bypass it."}]}, {"question": "Considering both parts of the epigraph, what characteristic is most clearly attributed to \"fata\" (fate)?", "options": [{"text": "Its malleability, allowing individuals to shape it through their actions.", "isCorrect": false, "rationale": "Fate either 'leads' or 'drags,' suggesting it is a determined path or force that individuals react to, rather than one they can reshape."}, {"text": "Its indifference, as it has no active role in human lives beyond setting initial conditions.", "isCorrect": false, "rationale": "Fate actively 'leads' or 'drags,' indicating a direct and dynamic role in human experiences, not mere indifference."}, {"text": "Its ultimate power and inescapable nature.", "isCorrect": true, "rationale": "Whether one is willing or unwilling, fate still acts upon them ('leads' or 'drags'), demonstrating its pervasive and unavoidable power."}, {"text": "Its inherent kindness, always guiding people towards beneficial outcomes.", "isCorrect": false, "rationale": "The quote doesn't comment on the benevolence of fate's outcomes, only on the experience of moving through them. Being 'dragged' hardly implies kindness."}]}, {"question": "While the epigraph emphasizes the power of fate, what element of human agency does it implicitly highlight?", "options": [{"text": "The power to choose one's ultimate destination and alter fate's plan.", "isCorrect": false, "rationale": "The quote implies fate determines the ultimate path; humans do not choose the destination, but their reaction to it."}, {"text": "The ability to fundamentally change the outcome of predetermined events.", "isCorrect": false, "rationale": "Fate 'leads' or 'drags' towards an outcome, suggesting the outcome itself is set, not changeable by human will."}, {"text": "The choice in one's attitude and response to inevitable circumstances.", "isCorrect": true, "rationale": "The distinction between being 'willing' and 'unwilling' directly points to the human capacity to choose how one confronts or accepts what fate brings."}, {"text": "The capacity to ignore fate entirely and live independently of its influence.", "isCorrect": false, "rationale": "Fate is described as an active force ('leads' or 'drags'), indicating it cannot be ignored."}]}, {"question": "Imagine a student who receives an unexpected failing grade on a critical assignment, a situation beyond immediate reversal. According to Seneca's epigraph, which of the following approaches would align with being \"led\" by fate rather than \"dragged\"?", "options": [{"text": "Spending all effort lamenting the unfairness of the situation and refusing to study further.", "isCorrect": false, "rationale": "This approach exemplifies resistance and unwillingness to accept the situation, aligning with being 'dragged'."}, {"text": "Immediately seeking ways to cheat on the next assignment to compensate for the failure.", "isCorrect": false, "rationale": "This is a form of resistance to the consequences of fate, seeking to bypass rather than accept and adapt, hence aligning with being 'dragged'."}, {"text": "Acknowledging the setback and focusing on learning from mistakes to improve future performance.", "isCorrect": true, "rationale": "This demonstrates acceptance of the unchangeable past (the failing grade) and a willingness to adapt and move forward, aligning with being 'led' by fate."}, {"text": "Blaming the instructor entirely, withdrawing from the course, and giving up on the subject.", "isCorrect": false, "rationale": "This represents an unwilling and resistant reaction, shifting blame and refusing to engage constructively, thereby being 'dragged'."}]}, {"question": "Consider an individual who repeatedly attempts to force a business venture to succeed despite numerous objective indicators that it is unsustainable. Which aspect of Seneca's epigraph best describes this individual's experience?", "options": [{"text": "Being \"led\" by fate, as their determination is a sign of their alignment with destiny.", "isCorrect": false, "rationale": "While determination is a virtue, if it's applied against objective reality or an unsustainable path, it becomes a form of resistance to what fate/reality dictates, rather than being 'led'."}, {"text": "Being \"dragged\" by fate, as their resistance to reality results in continued struggle and hardship.", "isCorrect": true, "rationale": "Fighting against clear signs of unsustainability is a form of unwillingness to accept circumstances, leading to being 'dragged' through repeated difficulties."}, {"text": "Neither being led nor dragged, as their actions are purely self-determined and outside fate's influence.", "isCorrect": false, "rationale": "The epigraph implies fate's pervasive influence; even self-determined actions are experienced either willingly or unwillingly within fate's overarching plan."}, {"text": "Being led by fate, which is testing their resilience and resolve before granting success.", "isCorrect": false, "rationale": "The concept of being 'led' implies a smoother progression with acceptance, not an arduous struggle against clear indicators of failure."}]}, {"question": "Given that the author, Seneca, was a prominent Stoic philosopher, the sentiment expressed in this epigraph most closely aligns with which core Stoic principle?", "options": [{"text": "The pursuit of pleasure as the highest good and aim of human life.", "isCorrect": false, "rationale": "This principle is characteristic of Epicureanism, not Stoicism. Stoicism emphasizes virtue over pleasure."}, {"text": "The belief that one should only control what is within one's power and accept what is not.", "isCorrect": true, "rationale": "This is a fundamental Stoic teaching. 'Willing' aligns with accepting what is not in one's control (fate), leading to a smoother experience, while 'unwilling' represents resistance to what cannot be controlled."}, {"text": "The rejection of all emotions as harmful distractions from reason.", "isCorrect": false, "rationale": "While Stoicism advocates for managing destructive emotions, it does not call for the rejection of all emotions, particularly not positive ones."}, {"text": "The idea that truth is subjective and relative to the individual's perception.", "isCorrect": false, "rationale": "This concept is associated with philosophical relativism or Sophism, not Stoicism, which sought objective truth and virtue."}]}, {"question": "What overarching practical advice can a reader derive from Seneca's observation about fate and human disposition?", "options": [{"text": "Always strive to defy circumstances, as victory comes from persistent resistance to all obstacles.", "isCorrect": false, "rationale": "The quote warns that defiance against fate results in being 'dragged,' implying hardship rather than guaranteed victory."}, {"text": "Embrace adaptability and acceptance when confronted with forces beyond one's control.", "isCorrect": true, "rationale": "The contrast between being 'led' (willing) and 'dragged' (unwilling) directly advises that accepting and adapting to inevitable circumstances leads to a more peaceful and less difficult passage."}, {"text": "Ignore the concept of fate, as it is a limiting belief that hinders personal growth.", "isCorrect": false, "rationale": "The epigraph presents fate as an active and powerful force; ignoring it is not an option within this philosophical framework."}, {"text": "Focus solely on personal ambition, as fate will ultimately bend to a sufficiently strong will.", "isCorrect": false, "rationale": "The quote indicates that fate is a dominant force, suggesting that even strong will cannot bend fate, only change one's experience of it."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
