    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 12, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A company decides to move all its financial records from paper files to a new digital database. Which word from the 'fer' family best describes this action?", "options": [{"text": "Prefer", "isCorrect": false, "rationale": "To 'prefer' means to like one thing better than another or to choose first, which does not align with the action of moving records."}, {"text": "Transfer", "isCorrect": true, "rationale": "'Transfer' means 'to carry across' or 'to move something from one place or person to another,' accurately describing the action of moving financial records to a new system."}, {"text": "Suffer", "isCorrect": false, "rationale": "To 'suffer' means to experience pain or hardship, which is unrelated to the organizational task of moving records."}, {"text": "Relate", "isCorrect": false, "rationale": "To 'relate' means to tell or narrate, or to show a connection between things. It does not describe the physical or digital movement of items."}]}, {"question": "Sarah is choosing between two universities. She finds the campus culture and academic programs of University A more appealing than University B. Which word describes Sarah's inclination towards University A?", "options": [{"text": "Translate", "isCorrect": false, "rationale": "'Translate' means to express meaning in another language, which is irrelevant to making a personal choice between universities."}, {"text": "Different", "isCorrect": false, "rationale": "'Different' means not the same or distinct. While the universities are different, this word describes their characteristics, not Sarah's act of choosing based on her liking."}, {"text": "Prefer", "isCorrect": true, "rationale": "'Prefer' means 'to carry before' or 'to like one thing better than another; to choose first,' which perfectly describes Sarah's action of favoring one university over the other."}, {"text": "Legislate", "isCorrect": false, "rationale": "'Legislate' means to make or enact laws, an activity entirely unrelated to an individual's personal preference for a university."}]}, {"question": "A farmer observes that his soil consistently yields abundant crops and supports vigorous plant growth year after year. Based on this observation, what characteristic best describes the farmer's soil?", "options": [{"text": "Different", "isCorrect": false, "rationale": "While the soil might be different from others, this word simply means 'not the same' and does not capture its productive capacity."}, {"text": "Sufferable", "isCorrect": false, "rationale": "Sufferable implies something can be endured, which is not applicable to the productive quality of soil."}, {"text": "Fertile", "isCorrect": true, "rationale": "'Fertile' means 'able to bear' or 'capable of producing abundant growth or offspring,' accurately describing soil that yields plentiful crops."}, {"text": "Legislative", "isCorrect": false, "rationale": "Legislative pertains to making laws and has no connection to agricultural soil quality."}]}, {"question": "A historian is analyzing two ancient texts from different cultures. She notes that while both texts discuss the concept of justice, their specific definitions, applications, and cultural contexts are markedly unalike. How would the historian describe these two interpretations of justice?", "options": [{"text": "Relatable", "isCorrect": false, "rationale": "While they might be relatable in theme, 'relate' means to tell or show a connection. The historian is emphasizing their unalikeness, not their connection in this context."}, {"text": "Sufferable", "isCorrect": false, "rationale": "Sufferable implies endurance, which is not relevant to comparing interpretations of justice."}, {"text": "Translated", "isCorrect": false, "rationale": "The texts might be translated, but 'translate' refers to expressing meaning in another language, not to the inherent unalikeness of concepts within them."}, {"text": "Different", "isCorrect": true, "rationale": "'Different' means 'carried apart' or 'not the same; distinct from something else,' perfectly describing the unalike definitions and contexts of justice in the texts."}]}, {"question": "Despite years of economic hardship and personal loss, a community remained resilient, though its members endured significant emotional and financial strain. Which word best describes the experience of the community members?", "options": [{"text": "Translated", "isCorrect": false, "rationale": "'Translate' means to express meaning in another language, which is unrelated to experiencing hardship."}, {"text": "Preferred", "isCorrect": false, "rationale": "'Preferred' implies choosing or liking something better, which is contrary to experiencing hardship."}, {"text": "Suffered", "isCorrect": true, "rationale": "'Suffer' means 'to carry under' or 'to experience pain or hardship; to bear a burden,' which accurately describes the community's emotional and financial strain."}, {"text": "Related", "isCorrect": false, "rationale": "'Relate' means to tell or show a connection, not to experience pain or hardship."}]}, {"question": "During an international conference, a speaker presents in Mandarin, and an interpreter simultaneously conveys the speech's meaning into English for the audience. What action is the interpreter performing?", "options": [{"text": "Transferring", "isCorrect": false, "rationale": "'Transferring' means moving something from one place to another. While information is being moved, the specific process for language is 'translate'."}, {"text": "Legislating", "isCorrect": false, "rationale": "'Legislating' means to make laws, which is entirely unrelated to interpreting a speech."}, {"text": "Translating", "isCorrect": true, "rationale": "'Translate' means 'to carry across' or 'to express meaning in another language,' which precisely describes the interpreter's role."}, {"text": "Relating", "isCorrect": false, "rationale": "'Relating' means to tell or narrate, or show a connection, but it doesn't specifically mean converting language like 'translate' does."}]}, {"question": "A storyteller captivates her audience by vividly recounting historical events and clearly explaining the connections between different periods and cultures. In her performance, which two actions from the 'fer' family is she primarily engaged in?", "options": [{"text": "Preferring and Suffering", "isCorrect": false, "rationale": "'Preferring' (choosing first) and 'suffering' (experiencing hardship) do not describe the act of storytelling and explaining connections."}, {"text": "Translating and Legislating", "isCorrect": false, "rationale": "'Translating' (expressing in another language) and 'legislating' (making laws) are not the primary actions of a storyteller in this context."}, {"text": "Relating and Transferring", "isCorrect": true, "rationale": "'Relate' means 'to tell or narrate' and 'to show a connection between things,' which perfectly describes her actions of recounting events and explaining connections. While 'transfer' might broadly apply to ideas, 'relate' is more precise for storytelling and showing connections."}, {"text": "Differing and Fertile", "isCorrect": false, "rationale": "'Differing' (being not the same) and 'fertile' (producing growth) are not actions a storyteller performs in this manner."}]}, {"question": "A new committee has been formed within the government to address the rising issue of plastic waste. Their primary goal is to draft and enact new environmental protection policies. What is the fundamental responsibility of this committee?", "options": [{"text": "To transfer knowledge", "isCorrect": false, "rationale": "While knowledge transfer might occur, the primary goal of drafting and enacting policies is not 'transferring' in its main sense of moving things or people."}, {"text": "To prefer specific solutions", "isCorrect": false, "rationale": "While they might prefer certain solutions, their fundamental responsibility is the act of making the laws, not just having a preference."}, {"text": "To suffer the consequences", "isCorrect": false, "rationale": "To 'suffer' means to experience hardship, which is not the committee's responsibility but rather a potential outcome they seek to prevent or manage for others."}, {"text": "To legislate regulations", "isCorrect": true, "rationale": "'Legislate' means 'to carry law' or 'to make or enact laws,' which precisely describes the committee's goal of drafting and enacting new environmental protection policies."}]}, {"question": "Consider the words 'transfer' and 'translate'. Both share the prefix 'trans-' meaning 'across', and a root meaning 'to carry'. Which of the following statements best highlights the nuanced difference between them as defined?", "options": [{"text": "'Transfer' applies only to physical objects, while 'translate' applies only to abstract ideas.", "isCorrect": false, "rationale": "'Transfer' can apply to non-physical things (e.g., transferring funds, responsibility), and 'translate' specifically applies to language, not just any abstract idea."}, {"text": "'Transfer' focuses on moving something from one location or owner to another, whereas 'translate' specifically focuses on converting meaning between languages.", "isCorrect": true, "rationale": "This accurately differentiates the two: 'transfer' (to carry across) broadly covers moving things or possession, while 'translate' (to carry meaning across) is specifically defined as expressing meaning in another language."}, {"text": "'Translate' requires a human intermediary, while 'transfer' can happen autonomously.", "isCorrect": false, "rationale": "While often true, this is an implication of the process, not the core definitional difference between carrying objects/possession versus carrying language meaning."}, {"text": "There is no significant difference; they are interchangeable in most contexts.", "isCorrect": false, "rationale": "This is incorrect. The words have distinct meanings and are not generally interchangeable, as shown by their specific definitions."}]}, {"question": "The Latin root 'fer' or 'lat' fundamentally means 'to carry'. Given this core meaning, which of the following words from the family most abstractly represents 'carrying a burden'?", "options": [{"text": "Prefer", "isCorrect": false, "rationale": "'Prefer' (to carry before) means to choose first or like better, not to bear a burden."}, {"text": "Legislate", "isCorrect": false, "rationale": "'Legislate' (to carry law) means to make laws, which is not related to bearing a personal burden."}, {"text": "Suffer", "isCorrect": true, "rationale": "'Suffer' (to carry under) means 'to experience pain or hardship; to bear a burden,' which is the most direct and abstract representation of 'carrying a burden' among the options."}, {"text": "Relate", "isCorrect": false, "rationale": "'Relate' (to carry back) means to tell or show a connection, not to bear a burden."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
