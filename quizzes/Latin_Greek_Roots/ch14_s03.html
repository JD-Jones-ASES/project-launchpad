        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The text describes water as the 'lifeblood of Rome' and an 'engineering challenge, a public service, and a source of civic pride.' Which of the following statements best synthesizes this Roman perspective on 'aqua'?", "options": [{"text": "Water was primarily a symbol of military power and territorial expansion.", "isCorrect": false, "rationale": "The text does not connect water directly to military power or territorial expansion, focusing instead on civic use, engineering, and pride."}, {"text": "Water was a fundamental and complex resource that reflected their societal values and advanced capabilities.", "isCorrect": true, "rationale": "This statement accurately synthesizes the text's description: 'lifeblood' (fundamental), 'engineering challenge' (complex resource, advanced capabilities), 'public service' and 'civic pride' (societal values)."}, {"text": "Water was a mystical element used only for religious ceremonies and healing.", "isCorrect": false, "rationale": "The text emphasizes practical applications like bathhouses, fountains, and latrines, not solely religious or mystical uses."}, {"text": "Water was a luxury item accessible only to the wealthiest citizens.", "isCorrect": false, "rationale": "The text states aqueducts supplied 'public fountains, bathhouses, and private homes,' indicating widespread, not exclusive, access."}]}, {"question": "What was the primary function of the eleven great aqueducts at the height of the Roman Empire?", "options": [{"text": "To collect rainwater and store it in underground reservoirs.", "isCorrect": false, "rationale": "While water storage was part of the system, the primary function of aqueducts was to transport water, not just collect rainwater."}, {"text": "To purify contaminated water for public consumption.", "isCorrect": false, "rationale": "The text states they 'carried fresh water,' implying transport of already clean water, not purification of contaminated water as their main purpose."}, {"text": "To transport fresh water from distant sources into the city for various uses.", "isCorrect": true, "rationale": "The text explicitly states aqueducts 'carried fresh water across miles of countryside and into the city, supplying public fountains, bathhouses, and private homes,' which directly describes this function."}, {"text": "To create decorative waterfalls and elaborate fountains for wealthy citizens.", "isCorrect": false, "rationale": "While aqueducts supplied fountains, this was one use, not their primary overarching function, which was to bring water to the city for diverse needs."}]}, {"question": "Based on the text, what is the fundamental difference in function and location between an 'aqueduct' and an 'aquifer'?", "options": [{"text": "An aqueduct is a natural underground formation, while an aquifer is a man-made structure.", "isCorrect": false, "rationale": "This reverses the definitions: aqueducts are man-made, aquifers are natural formations."}, {"text": "An aqueduct is a structure that leads water, often above ground, while an aquifer is an underground layer that carries and holds water.", "isCorrect": true, "rationale": "The text defines an aqueduct as a structure that 'leads water' (implying transportation, often visible), and an aquifer as 'underground layers of rock and sand that hold water' and 'carries water underground.'"}, {"text": "An aqueduct supplies water exclusively for agriculture, whereas an aquifer supplies water for urban consumption.", "isCorrect": false, "rationale": "Aqueducts supplied urban uses, and aquifers feed wells and springs which can be used for various purposes, including agriculture or urban supply, not exclusive as stated."}, {"text": "An aqueduct is used for saltwater, and an aquifer is used for freshwater.", "isCorrect": false, "rationale": "Both terms, in the context of Roman water management discussed, refer to freshwater."}]}, {"question": "If a modern city wanted to mimic the Roman approach to supplying a large volume of water from a distant source to its urban core, which structure would be most crucial for this task?", "options": [{"text": "An aquarium to display aquatic life.", "isCorrect": false, "rationale": "An aquarium, in its modern sense, is for displaying fish, not for urban water supply."}, {"text": "An aquamarine processing plant.", "isCorrect": false, "rationale": "Aquamarine is a gemstone; a processing plant for it has no relevance to urban water supply."}, {"text": "An aqueduct to lead water into the city.", "isCorrect": true, "rationale": "The text states aqueducts 'carried fresh water across miles of countryside and into the city, supplying public fountains, bathhouses, and private homes,' directly matching the scenario described."}, {"text": "An aquifer to store water underground.", "isCorrect": false, "rationale": "An aquifer stores water naturally underground; while important for groundwater, it's not the primary structure for *transporting* large volumes from a *distant source* to an urban core like an aqueduct."}]}, {"question": "The text states that the word 'aquarium' originally meant 'any water vessel' before evolving to mean 'a place where fish and sea creatures are displayed.' This change in meaning primarily illustrates which linguistic phenomenon?", "options": [{"text": "A complete reversal of a word's original intent.", "isCorrect": false, "rationale": "The meaning didn't reverse; it became more specific, still related to a water vessel."}, {"text": "The broadening of a word's scope over time.", "isCorrect": false, "rationale": "The meaning narrowed from 'any water vessel' to a specific type of water vessel, not broadened."}, {"text": "A specialization or narrowing of a word's meaning.", "isCorrect": true, "rationale": "The word's meaning evolved from a general term ('any water vessel') to a more specific one ('a place where fish and sea creatures are displayed'), which is a clear example of semantic specialization."}, {"text": "The adoption of foreign loanwords into a language.", "isCorrect": false, "rationale": "This describes a change within the word's existing usage in English, not the process of borrowing from another language."}]}, {"question": "Which of the following elements of Roman life, as described, most strongly demonstrates their daily reliance on a sophisticated water system beyond basic drinking needs?", "options": [{"text": "The use of the gemstone aquamarine for its aesthetic beauty.", "isCorrect": false, "rationale": "Aquamarine relates to aesthetics, not daily functional reliance on a water system."}, {"text": "The understanding of aquifers as underground water carriers.", "isCorrect": false, "rationale": "While critical knowledge, understanding aquifers describes engineering knowledge, not daily societal reliance or use of a developed water system."}, {"text": "The extensive use of public bathhouses, private courtyard fountains, and constantly flowing public latrines.", "isCorrect": true, "rationale": "These examples directly show diverse, widespread, and continuous use of water for hygiene, leisure, and sanitation, indicating a reliance beyond just survival."}, {"text": "The naming of the chemical symbol for water as H2O.", "isCorrect": false, "rationale": "H2O is a modern chemical symbol, not a Roman contribution or reflection of their daily life."}]}, {"question": "The text explains 'subaqueous' (meaning 'under water') follows the same pattern as 'subterranean' ('underground'). If you encountered a new word, 'subzero,' based on this pattern, what would you infer about its meaning?", "options": [{"text": "It refers to something located *above* zero.", "isCorrect": false, "rationale": "The prefix 'sub-' consistently means 'under' or 'below,' not 'above.'"}, {"text": "It refers to something *surrounding* zero.", "isCorrect": false, "rationale": "The prefix 'sub-' denotes position *under* or *below*, not surrounding."}, {"text": "It refers to something *at* zero.", "isCorrect": false, "rationale": "While 'near' can be an extension, 'sub-' implies 'below' or 'less than,' not exactly 'at.'"}, {"text": "It refers to something *below* zero.", "isCorrect": true, "rationale": "Given 'sub-' means 'under' in 'subaqueous' and 'subterranean,' it logically means 'below' when applied to 'zero.'"}]}, {"question": "The gemstone 'aquamarine' is named from 'aqua marina.' What is the literal meaning of 'aqua marina,' and what characteristic of the gemstone inspired this name?", "options": [{"text": "'Deep water,' because the gemstone is found in the ocean's depths.", "isCorrect": false, "rationale": "The text states 'aqua marina' means 'sea water,' not 'deep water,' and the reasoning for the name is its color, not its origin."}, {"text": "'Sea water,' because its blue-green color resembles the sunlit sea.", "isCorrect": true, "rationale": "The text explicitly states 'aquamarine takes its name from aqua marina—'sea water'—because its color resembles the sunlit sea.'"}, {"text": "'Pure water,' symbolizing the gemstone's clarity and transparency.", "isCorrect": false, "rationale": "The text states 'aqua marina' means 'sea water,' not 'pure water,' and the inspiration is color, not clarity."}, {"text": "'Stone water,' indicating its mineral composition and liquid-like appearance.", "isCorrect": false, "rationale": "The text states 'aqua marina' means 'sea water,' and this interpretation is not supported by the passage."}]}, {"question": "The 'etymnote' mentions 'aqua park' and 'aqua jogging' as modern examples of the Latin root in English. What do these examples primarily highlight about the word 'aqua'?", "options": [{"text": "The Roman influence on competitive sports terminology.", "isCorrect": false, "rationale": "While 'aqua jogging' involves physical activity, the examples are broad recreational uses, not specifically competitive sports terminology from Roman times."}, {"text": "The continued association of the root with water-related activities and places in contemporary language.", "isCorrect": true, "rationale": "Both 'aqua park' (a place with water activities) and 'aqua jogging' (an activity in water) clearly demonstrate the enduring connection of 'aqua' to water-related concepts in modern English."}, {"text": "The scientific community's adoption of Latin roots for new inventions.", "isCorrect": false, "rationale": "These examples are recreational and commercial, not specifically from the scientific community."}, {"text": "The decline of Latin as a living language, replaced by modern English.", "isCorrect": false, "rationale": "The examples show 'how the Latin root splashes into modern recreation,' indicating its *continued life* in English, not its decline."}]}, {"question": "The 'rootconnection' section emphasizes how 'aqua' (water) combined with 'duct' (to lead) forms 'aqueduct' (structure that leads water). Which of the following statements best explains the significance of understanding such root combinations?", "options": [{"text": "It demonstrates that Latin roots are only found in scientific terms.", "isCorrect": false, "rationale": "The text provides examples beyond scientific terms (e.g., aquamarine, aqua park), showing broader applicability."}, {"text": "It primarily helps in identifying ancient Roman construction techniques.", "isCorrect": false, "rationale": "While relevant to Roman construction, the 'rootconnection' focuses on language and meaning, not just construction techniques."}, {"text": "It illustrates how combining roots creates precise meanings and enhances vocabulary comprehension.", "isCorrect": true, "rationale": "The 'rootconnection' explicitly states 'a perfect example of how two roots combine to create a single, precise meaning,' which directly supports this option."}, {"text": "It proves that all English words have Latin origins.", "isCorrect": false, "rationale": "This is an overgeneralization; many English words have other origins (e.g., Germanic), and the text only focuses on specific Latin roots."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
