<script>
var QUESTIONS = [{"question": "According to the text, what was the most important quality or role of a *dux* in the Roman army?", "options": [{"text": "Being the strongest fighter to lead by example in combat.", "isCorrect": false, "rationale": "The text explicitly states 'the most important person was not the strongest fighter or the fastest runner,' indicating that physical prowess was not the primary importance."}, {"text": "The ability to lead and guide legions through difficult situations.", "isCorrect": true, "rationale": "The text states 'it was the leader' and describes a dux as 'the one who went first, who showed the way, who conducted the legions,' emphasizing leadership as the most important role."}, {"text": "Having the fastest running speed to scout ahead of the army.", "isCorrect": false, "rationale": "The text explicitly states 'the most important person was not the strongest fighter or the fastest runner,' making speed not the primary importance."}, {"text": "Possessing the greatest wealth to fund military campaigns.", "isCorrect": false, "rationale": "The text does not mention wealth as a primary attribute or role for a dux; it focuses on their leadership capabilities."}]}, {"question": "The text defines 'educate' as 'to lead out.' Which of the following best reflects the underlying philosophy of learning implied by this etymology?", "options": [{"text": "Knowledge is a commodity that must be delivered to the student by an instructor.", "isCorrect": false, "rationale": "The 'lead out' concept suggests drawing something *from* within, not simply delivering from outside."}, {"text": "Students are like empty vessels that need to be filled with information.", "isCorrect": false, "rationale": "This contradicts the idea of 'drawing knowledge out of a student, as if wisdom were already inside.'"}, {"text": "Wisdom is inherent within a student and a guide helps bring it forth.", "isCorrect": true, "rationale": "The text explicitly states 'to draw knowledge out of a student, as if wisdom were already inside and simply needed a guide,' which aligns perfectly with this option."}, {"text": "Learning is primarily a process of memorizing facts presented by a teacher.", "isCorrect": false, "rationale": "The etymology emphasizes drawing out internal knowledge rather than merely memorizing external facts."}]}, {"question": "The Latin verb *ducere* means 'to lead.' Based on the examples provided in the text, which pair of words best illustrates the concept of leading in opposite directions?", "options": [{"text": "Conduct and produce", "isCorrect": false, "rationale": "Conduct means 'lead together' and produce means 'lead forward'; these are not direct opposites in direction."}, {"text": "Educate and introduce", "isCorrect": false, "rationale": "Educate means 'lead out' and introduce means 'lead inward'; while opposite directions, there's a stronger contrast with 'deduce'."}, {"text": "Abduct and aqueduct", "isCorrect": false, "rationale": "Abduct means 'lead away by force,' and aqueduct means a structure that 'leads water'; these are not directionally opposite."}, {"text": "Introduce and deduce", "isCorrect": true, "rationale": "Introduce means 'to lead inward' (into a group or concept), while deduce means 'to lead down' (from general principles to a specific conclusion), representing distinct and often contrasting mental or physical directions."}]}, {"question": "Which specific Latin form is identified in the text as the source for words like 'conduct' and 'abduct'?", "options": [{"text": "The verb *ducere*", "isCorrect": false, "rationale": "While *ducere* is the root verb, the text specifically states these words come from its past participle form."}, {"text": "The noun *dux*", "isCorrect": false, "rationale": "Dux is a noun meaning 'leader,' but the text attributes 'conduct' and 'abduct' to the past participle of the verb."}, {"text": "The past participle *ductus*", "isCorrect": true, "rationale": "The text explicitly states, 'The past participle of ducere was ductus, giving us words like conduct... and abduct'."}, {"text": "The root *aqua*", "isCorrect": false, "rationale": "Aqua means 'water' and is part of 'aqueduct,' but it is not the source for 'conduct' or 'abduct'."}]}, {"question": "A group of scientists is trying to 'produce' a new energy source. Based on the etymology presented in the text, what does their action primarily involve?", "options": [{"text": "Removing existing elements from a compound.", "isCorrect": false, "rationale": "The meaning of 'produce' is 'to lead forward,' not 'to lead out' or remove."}, {"text": "Bringing something new into existence or making it manifest.", "isCorrect": true, "rationale": "The text defines 'to produce' as 'to 'lead forward,' bringing something into existence,' which perfectly matches this scenario."}, {"text": "Guiding a process from a general theory to a specific outcome.", "isCorrect": false, "rationale": "This describes 'deduce' ('lead down'), not 'produce'."}, {"text": "Combining various components into a single, cohesive unit.", "isCorrect": false, "rationale": "While combining might be part of the process, the core etymology of 'produce' is about bringing into existence, not just joining, which might be closer to 'conduct' ('lead together')."}]}, {"question": "The 'Root Connection' section highlights that the word 'aqueduct' combines two Latin roots. What are these two roots and their respective meanings as described?", "options": [{"text": "*aqui* (flow) and *duct* (carry)", "isCorrect": false, "rationale": "The text specifically states 'aqua (water, Chapter 14) and duct (leading),' not 'aqui' or 'carry'."}, {"text": "*aqua* (water) and *ducere* (to lead)", "isCorrect": false, "rationale": "While *ducere* is the verb, the text uses 'duct (leading)' as the root in the compound word, indicating it derives from the past participle."}, {"text": "*aqua* (water) and *duct* (leading)", "isCorrect": true, "rationale": "The text explicitly states 'The word aqueduct combines two Latin roots: aqua (water, Chapter 14) and duct (leading).'"}, {"text": "*aquarius* (water-bearer) and *ductus* (path)", "isCorrect": false, "rationale": "The text does not mention 'aquarius' or 'path'; it clearly identifies 'aqua' and 'duct'."}]}, {"question": "According to the 'Did You Know?' note, how did the title 'duke' evolve from its original Latin meaning?", "options": [{"text": "It transitioned from meaning a scholar or educator to a noble who sponsored learning.", "isCorrect": false, "rationale": "The text states it evolved from a military leader, not a scholar, to a noble."}, {"text": "It shifted from a military commander along a frontier to a high-ranking noble in European kingdoms.", "isCorrect": true, "rationale": "The text explains, 'In the late Roman Empire, a dux commanded troops along a frontier. Centuries later, European kingdoms adopted the title for their highest-ranking nobles.' This directly matches the evolution."}, {"text": "It changed from a religious leader to a secular ruler of a small territory.", "isCorrect": false, "rationale": "The text describes a military origin, not a religious one."}, {"text": "It went from a master builder who led construction projects to a titled landowner.", "isCorrect": false, "rationale": "The text clearly links 'duke' to 'dux' as a military leader, not a builder."}]}, {"question": "A detective uses a process of 'deduction' to solve a crime. Based on the text's explanation of the word's etymology, what does this process entail?", "options": [{"text": "Bringing new evidence into the case to expand the investigation.", "isCorrect": false, "rationale": "This sounds more like 'introduce,' which is 'to lead inward,' rather than 'deduce.'"}, {"text": "Leading specific clues down from general principles to a specific conclusion.", "isCorrect": true, "rationale": "The text defines 'deduce' as 'to 'lead down' from general principles to a specific conclusion, like a detective following clues to their logical end,' which directly applies here."}, {"text": "Combining all available information to create a comprehensive report.", "isCorrect": false, "rationale": "While combining information is part of investigation, 'deduce' specifically refers to the logical process of 'leading down' to a conclusion, not just combining."}, {"text": "Guiding the investigation forward to produce new suspects.", "isCorrect": false, "rationale": "This sounds more like 'produce' ('lead forward') or general investigation, not the specific meaning of 'deduce'."}]}, {"question": "If a government official is said to 'conduct' a meeting, which meaning derived from the past participle *ductus* is being applied?", "options": [{"text": "Leading the meeting away by force.", "isCorrect": false, "rationale": "This describes 'abduct' ('lead away by force'), not 'conduct'."}, {"text": "Introducing new members into the meeting.", "isCorrect": false, "rationale": "This describes 'introduce' ('lead inward'), not 'conduct'."}, {"text": "Leading the participants together or directing the flow of the meeting.", "isCorrect": true, "rationale": "The text states 'conduct (lead together),' implying guiding or directing a group, which perfectly fits 'conducting a meeting.'"}, {"text": "Bringing a meeting into existence for the first time.", "isCorrect": false, "rationale": "This describes 'produce' ('lead forward,' bringing into existence), not 'conduct'."}]}, {"question": "The text emphasizes the importance of a *dux* in the Roman army. What broad quality does this emphasis suggest the Romans valued most in their military leadership?", "options": [{"text": "The capacity for individual heroic acts in battle.", "isCorrect": false, "rationale": "While heroism is valued, the text highlights the *dux*'s role in leading thousands and 'conducting the legions,' pointing to overarching leadership rather than individual acts."}, {"text": "Superior intellectual ability and strategic genius.", "isCorrect": false, "rationale": "While important, the text frames it as 'his ability to lead well' and 'who showed the way,' focusing on the act of leading rather than just intellectual capacity."}, {"text": "The practical skill of effective guidance and direction for a group.", "isCorrect": true, "rationale": "The text describes a dux as 'the one who went first, who showed the way, who conducted the legions,' and 'his ability to lead well,' directly indicating that effective guidance and direction were paramount."}, {"text": "The physical dominance to command respect and enforce discipline.", "isCorrect": false, "rationale": "The text explicitly downplays physical attributes, stating the dux was not 'the strongest fighter or the fastest runner.'"}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
