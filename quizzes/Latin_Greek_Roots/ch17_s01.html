    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the central imperative Seneca conveys in the epigraph, 'Dum inter homines sumus, colamus humanitatem'?", "options": [{"text": "To avoid all forms of conflict and disagreement with others.", "isCorrect": false, "rationale": "While avoiding conflict might be a result of cultivating humanity, the core imperative is not solely focused on avoidance, but on an active development of positive human qualities."}, {"text": "To actively foster and display kindness, compassion, and a sense of shared humanity towards fellow beings during our lives.", "isCorrect": true, "rationale": "The phrase 'colamus humanitatem' directly translates to 'let us cultivate our humanity,' which in Seneca's context emphasizes developing virtues like kindness, empathy, and benevolence towards others, especially 'as long as we are among the living' ('Dum inter homines sumus')."}, {"text": "To prioritize personal well-being and self-preservation above all other concerns.", "isCorrect": false, "rationale": "Seneca's message focuses on our conduct towards others ('humanitatem'), not solely on individual self-interest, though personal virtue contributes to well-being."}, {"text": "To diligently study ancient languages and philosophical texts throughout one's existence.", "isCorrect": false, "rationale": "While Seneca was a philosopher and his text is in Latin, the epigraph's message is a moral imperative for living, not a call for academic pursuit itself."}]}, {"question": "Which philosopher is credited with the statement in the epigraph, 'Dum inter homines sumus, colamus humanitatem'?", "options": [{"text": "Cicero", "isCorrect": false, "rationale": "Cicero was another prominent Roman philosopher, but the text explicitly attributes this quote to Seneca."}, {"text": "Plato", "isCorrect": false, "rationale": "Plato was an ancient Greek philosopher, preceding Seneca by several centuries. The text clearly names Seneca."}, {"text": "Seneca", "isCorrect": true, "rationale": "The epigraph explicitly states '— Seneca, De Ira, III.43', identifying Seneca as the author of the quote."}, {"text": "Aristotle", "isCorrect": false, "rationale": "Aristotle was an ancient Greek philosopher, also preceding Seneca. The text clearly names Seneca."}]}, {"question": "The Latin phrase 'Dum inter homines sumus' establishes a crucial condition for Seneca's imperative. What does this condition primarily emphasize?", "options": [{"text": "The importance of living exclusively within structured urban communities.", "isCorrect": false, "rationale": "While 'inter homines' means 'among people,' it refers to human society in general, not specifically urban or structured communities."}, {"text": "The temporary nature of our human existence and the finite period for engaging with others.", "isCorrect": true, "rationale": "The phrase 'Dum inter homines sumus' means 'As long as we are among the living' or 'while we are among people,' highlighting that the cultivation of humanity is a task for our present, finite time on Earth, emphasizing urgency and relevance to our current interactions."}, {"text": "The necessity of learning to speak Latin fluently to understand philosophical concepts.", "isCorrect": false, "rationale": "The phrase provides context for the moral imperative, not a requirement for linguistic study."}, {"text": "The inherent distinction between human and divine virtues and responsibilities.", "isCorrect": false, "rationale": "The phrase focuses on the human condition and interaction, not a comparison with divine aspects."}]}, {"question": "In the context of Seneca's Stoic philosophy and the epigraph, what does 'humanitatem' most broadly encompass?", "options": [{"text": "The study and appreciation of ancient Roman culture and history.", "isCorrect": false, "rationale": "While 'humanitas' could sometimes refer to liberal arts, in the context of a moral imperative to 'cultivate' it, Seneca refers to moral virtues."}, {"text": "Physical strength, resilience, and the ability to endure hardship without complaint.", "isCorrect": false, "rationale": "These are aspects of Stoic self-discipline, but 'humanitatem' specifically points to our interactions and qualities concerning other humans, not just personal fortitude."}, {"text": "Virtues such as compassion, benevolence, empathy, and dignified conduct towards fellow human beings.", "isCorrect": true, "rationale": "In a philosophical context, especially for a Stoic like Seneca, 'humanitas' refers to a humane character, encompassing kindness, generosity, and treating others with respect and understanding. Cultivating this means developing these social virtues."}, {"text": "The pursuit of personal wealth, social status, and political influence.", "isCorrect": false, "rationale": "These external goods were often seen by Stoics as indifferent or even potentially detrimental to true virtue, not as part of cultivating 'humanitatem'."}]}, {"question": "The epigraph is from Seneca's work 'De Ira' (On Anger). How might the call to 'cultivate our humanity' relate to the broader theme of a treatise on anger?", "options": [{"text": "It suggests that cultivating humanity is a means to provoke anger in those who lack it.", "isCorrect": false, "rationale": "This interpretation contradicts the likely aim of a work 'On Anger,' which would typically seek to understand or mitigate destructive emotions."}, {"text": "It implies that anger is a natural and necessary human state to be fully embraced as part of our humanity.", "isCorrect": false, "rationale": "Stoicism generally views anger as an irrational and destructive passion to be overcome, not embraced."}, {"text": "It proposes that fostering virtues like kindness, empathy, and understanding can serve as an antidote or preventative measure against destructive emotions such as anger.", "isCorrect": true, "rationale": "For Seneca, cultivating humanity (compassion, benevolence) is a Stoic virtue that directly opposes the irrational and harmful nature of anger. By being humane, one is less likely to yield to anger and more likely to exercise rational control."}, {"text": "It argues that anger is a powerful emotion essential for defending one's personal humanity against external threats.", "isCorrect": false, "rationale": "Stoic philosophy typically advocates for reason and calm in the face of adversity, rather than relying on anger for defense."}]}, {"question": "The verb 'colamus' (let us cultivate) in the epigraph suggests an active and ongoing process. What kind of effort does Seneca advocate for in relation to 'humanitatem'?", "options": [{"text": "Passive acceptance of inherent human nature, without intervention.", "isCorrect": false, "rationale": "'Cultivate' implies active development and nurture, not passive acceptance."}, {"text": "Solely intellectual study and contemplation of humane principles, without practical application.", "isCorrect": false, "rationale": "Stoic philosophy emphasizes applying principles to daily life and actions, not just intellectual understanding."}, {"text": "Deliberate, continuous, and practical development of humane qualities and their expression in daily interactions.", "isCorrect": true, "rationale": "'Cultivate' signifies a proactive, sustained effort to nurture and grow something. Applied to humanity, it means consciously practicing and developing virtues like kindness and empathy in everyday life."}, {"text": "A one-time act of benevolence or a single grand gesture of kindness.", "isCorrect": false, "rationale": "Cultivation is an ongoing process, not a singular event. It suggests continuous practice and growth."}]}, {"question": "Seneca was a prominent figure in which ancient philosophical school?", "options": [{"text": "Epicureanism", "isCorrect": false, "rationale": "Epicureanism, founded by Epicurus, focused on pleasure and absence of pain, which differs from Seneca's ethical focus."}, {"text": "Stoicism", "isCorrect": true, "rationale": "Seneca was one of the most famous Roman Stoic philosophers, known for his writings on ethics, virtue, and emotional control."}, {"text": "Skepticism", "isCorrect": false, "rationale": "Skepticism, which doubted the possibility of certainty, is distinct from Seneca's dogmatic ethical philosophy."}, {"text": "Cynicism", "isCorrect": false, "rationale": "Cynicism, characterized by rejection of conventional values, existed, but Seneca's philosophy aligns with Stoicism."}]}, {"question": "What is the primary function of an epigraph, like this quote from Seneca, at the beginning of a chapter or section in a textbook?", "options": [{"text": "To provide a fun linguistic challenge for the reader to translate ancient languages.", "isCorrect": false, "rationale": "While it includes a Latin phrase, its primary purpose is not to test language skills, but to set a thematic tone."}, {"text": "To serve as a purely decorative element with no intended intellectual or thematic connection.", "isCorrect": false, "rationale": "Epigraphs are typically chosen for their thematic relevance and are intended to be meaningful, not just decorative."}, {"text": "To introduce a key theme, guiding principle, or a thought-provoking idea that foreshadows or frames the content of the upcoming section.", "isCorrect": true, "rationale": "An epigraph is a short quotation placed at the beginning of a work or chapter, serving to suggest its theme, provide a summary, or set the tone for what is to follow."}, {"text": "To cite an author or work that is completely unrelated to the chapter's subject matter.", "isCorrect": false, "rationale": "Epigraphs are specifically chosen because they are relevant and offer insight into the chapter's content."}]}, {"question": "Which of the following modern actions best exemplifies the 'cultivation of humanity' as described by Seneca in the epigraph?", "options": [{"text": "Isolating oneself from society to avoid the frustrations and conflicts of human interaction.", "isCorrect": false, "rationale": "Seneca's statement emphasizes our actions 'inter homines' (among people), indicating engagement, not isolation."}, {"text": "Engaging in highly competitive activities with the sole goal of personal victory and recognition.", "isCorrect": false, "rationale": "While competition can be part of life, focusing 'solely' on personal victory is often at odds with cultivating compassion and benevolence towards others."}, {"text": "Volunteering time and resources to help those in need, advocating for social justice, and practicing empathy in daily interactions.", "isCorrect": true, "rationale": "These actions directly reflect the active development and expression of kindness, compassion, and shared responsibility towards fellow human beings, which is the essence of 'cultivating humanity'."}, {"text": "Focusing exclusively on accumulating personal wealth and material possessions for future security.", "isCorrect": false, "rationale": "This aligns more with self-interest than with the active cultivation of virtues directed towards humanity as a whole."}]}, {"question": "Considering all elements of the epigraph, 'Dum inter homines sumus, colamus humanitatem,' what is Seneca ultimately advocating for?", "options": [{"text": "A life dedicated to the pursuit of individual pleasure and avoidance of suffering.", "isCorrect": false, "rationale": "This is more characteristic of Epicureanism, not Stoicism, which emphasizes virtue and duty over pleasure."}, {"text": "A call for intellectual discourse and the critical analysis of ancient philosophical concepts.", "isCorrect": false, "rationale": "While intellectual understanding is part of philosophy, the quote is a direct moral imperative for action and character, not just discourse."}, {"text": "A moral imperative to live with active compassion, benevolence, and virtuous conduct towards others during our finite time on Earth.", "isCorrect": true, "rationale": "This synthesizes the key elements: 'Dum inter homines sumus' (our finite time among people) and 'colamus humanitatem' (actively cultivating humane virtues like compassion and benevolence). It is a call to ethical action and character development within human society."}, {"text": "The exclusive importance of historical knowledge and the preservation of ancient languages.", "isCorrect": false, "rationale": "While these are valuable, they are not the central message of this particular ethical imperative from Seneca."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
