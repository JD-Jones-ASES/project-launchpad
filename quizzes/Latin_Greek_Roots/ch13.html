    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 13</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the Latin root 'terr / terra' mean?", "options": [{"text": "water", "isCorrect": false, "rationale": "Water is the meaning of the root 'aqua' from Chapter 14. Terr/terra has a different meaning."}, {"text": "earth; land", "isCorrect": true, "rationale": "The Latin word terra meant earth, land, or ground. All words built on this root relate to the concept of land or the earth."}, {"text": "fire; heat", "isCorrect": false, "rationale": "Fire and heat belong to different Latin roots. Terr/terra specifically means earth or land."}, {"text": "time; season", "isCorrect": false, "rationale": "Time is the meaning of 'tempor/tempus' from Chapter 16. Terr/terra means earth or land."}]}, {"question": "A 'territory' is best described as:", "options": [{"text": "An area of land under the control of a ruler or state", "isCorrect": true, "rationale": "Territory = terr (land) + -itory (related to belonging). A territory is the land belonging to and controlled by a state or ruler."}, {"text": "A deep tunnel beneath the earth's surface", "isCorrect": false, "rationale": "A deep tunnel beneath the surface would be subterranean. Territory refers to land above ground under someone's control."}, {"text": "A platform of raised, level ground", "isCorrect": false, "rationale": "A raised platform of ground is a terrace. Territory describes a broader area of land under control."}, {"text": "The physical features of a stretch of land", "isCorrect": false, "rationale": "Physical features of land describe the terrain. Territory specifically refers to land under political control."}]}, {"question": "The word 'terrain' refers to:", "options": [{"text": "A stretch of land, especially its physical features", "isCorrect": true, "rationale": "Terrain = terr (earth/land) + -ain. Terrain describes a stretch of land with regard to its hills, valleys, and other physical characteristics."}, {"text": "An underground water source", "isCorrect": false, "rationale": "An underground water source is an aquifer (from 'aqua,' Chapter 14). Terrain refers to surface land features."}, {"text": "The boundary of a Roman empire", "isCorrect": false, "rationale": "Imperial boundaries would relate to territory. Terrain specifically describes the physical character of the land itself."}, {"text": "A buried body or grave", "isCorrect": false, "rationale": "A burial is described by the word 'inter' (to put into the earth). Terrain means the physical features of a land area."}]}, {"question": "Something 'subterranean' is located:", "options": [{"text": "On top of a hill", "isCorrect": false, "rationale": "The prefix 'sub-' means under or below, not on top. Subterranean means existing beneath the earth's surface."}, {"text": "Beneath the earth's surface; underground", "isCorrect": true, "rationale": "Subterranean = sub- (under) + terr (earth) + -anean. Subterranean things exist or occur underground."}, {"text": "In the middle of a land mass", "isCorrect": false, "rationale": "Middle of a land mass describes the Mediterranean (medi- + terra). Subterranean specifically means beneath the ground."}, {"text": "Across a wide stretch of terrain", "isCorrect": false, "rationale": "Crossing terrain describes surface travel. Subterranean means beneath the earth, not across it."}]}, {"question": "What does the word 'Mediterranean' literally mean?", "options": [{"text": "Under the blue water", "isCorrect": false, "rationale": "Under the water would be 'subaqueous.' Mediterranean = medi- (middle) + terra (land) + -anean."}, {"text": "The middle of the lands", "isCorrect": true, "rationale": "Mediterranean = medi- (middle) + terr (land) + -anean. The Romans named this sea the 'middle of the lands' because it was surrounded by the continents of their known world."}, {"text": "The greatest of all seas", "isCorrect": false, "rationale": "Greatest is not the meaning of any part of the word. Mediterranean literally means in the middle of the lands."}, {"text": "The sea belonging to Rome", "isCorrect": false, "rationale": "While Romans called it 'mare nostrum' (our sea), the word Mediterranean itself means the sea in the middle of the lands."}]}, {"question": "The word 'terrestrial' means relating to:", "options": [{"text": "Water and sea life", "isCorrect": false, "rationale": "Water and sea relate to the root 'aqua.' Terrestrial comes from 'terra' (earth) and means relating to land, not water."}, {"text": "Earth or land, as opposed to water or air", "isCorrect": true, "rationale": "Terrestrial = terr (earth) + -estrial. Terrestrial means of or relating to the earth — land-based, as opposed to aquatic or aerial."}, {"text": "Underground tunnels and caves", "isCorrect": false, "rationale": "Underground things are subterranean (sub- + terr). Terrestrial means on or relating to the earth's surface."}, {"text": "Time and earthly pleasures", "isCorrect": false, "rationale": "Time relates to 'temporal' (from tempor, Chapter 16). Terrestrial relates to earth and land."}]}, {"question": "A 'terrace' is described as a raised, level area of ground. How does this connect to the root 'terr'?", "options": [{"text": "It does not connect — terrace comes from a French word for steps", "isCorrect": false, "rationale": "Terrace does connect to the root terr (earth/land). It literally comes from 'terra,' the Latin word for ground or earth."}, {"text": "A terrace is literally a 'flat earth platform' — shaped ground", "isCorrect": true, "rationale": "Terrace = terr (earth) + -ace. A terrace is a piece of earth that has been leveled and raised — a platform made of ground."}, {"text": "It connects because terraces are found underground", "isCorrect": false, "rationale": "Terraces are above ground, not underground. The connection to terr is through the meaning of shaped earth — a raised land platform."}, {"text": "It connects because terraces are found only in Mediterranean countries", "isCorrect": false, "rationale": "Terraces are found worldwide. The connection to terr is the meaning of earth/land, not geography."}]}, {"question": "To 'inter' a body means to:", "options": [{"text": "Carry it across water to a burial island", "isCorrect": false, "rationale": "Carrying across water uses the root 'fer' with 'trans-.' Inter specifically means to put into the earth."}, {"text": "Bury it in the earth", "isCorrect": true, "rationale": "Inter = in (into) + terra (earth). To inter a body is to put it into the ground — to bury it."}, {"text": "Place it in a subterranean river", "isCorrect": false, "rationale": "Placing in water would involve the root 'aqua.' Inter specifically means putting into the earth (terra)."}, {"text": "Mark its territory with a stone", "isCorrect": false, "rationale": "Marking territory involves terr in a different sense. Inter specifically means the act of burying in the earth."}]}, {"question": "The phrase 'terra firma' means:", "options": [{"text": "Underground fortress", "isCorrect": false, "rationale": "An underground fortress would be subterranean. Terra firma = terra (earth) + firma (firm/solid) = solid ground."}, {"text": "Solid ground, as opposed to the sea", "isCorrect": true, "rationale": "Terra firma is a Latin phrase meaning solid or firm land. It is used to describe dry, stable ground — as opposed to the shifting deck of a ship."}, {"text": "A fertile patch of farmland", "isCorrect": false, "rationale": "Fertility relates to 'fertile' (from fer, Chapter 12). Terra firma means firm ground, not productive soil."}, {"text": "A terrace built from clay bricks", "isCorrect": false, "rationale": "Terracotta means baked earth (terra + cotta). Terra firma means solid ground, not a constructed platform."}]}, {"question": "The word 'terracotta' comes from Italian and means:", "options": [{"text": "Red earth found only in Italy", "isCorrect": false, "rationale": "While terracotta has a reddish-brown color, the word does not mean red earth. It means baked earth."}, {"text": "Baked earth", "isCorrect": true, "rationale": "Terracotta = Italian terra (earth) + cotta (cooked/baked). The name describes what the material literally is: clay earth that has been fired in a kiln."}, {"text": "Solid ground used for building", "isCorrect": false, "rationale": "Solid ground is terra firma. Terracotta specifically means baked or cooked earth — the material made from fired clay."}, {"text": "Land belonging to the Mediterranean coast", "isCorrect": false, "rationale": "Land ownership relates to territory. Terracotta = baked earth, describing the clay material's manufacturing process."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
