<div class="quiz-container">

        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 5, Section 1</div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the core philosophical claim asserted by the epigraph, 'Nihil est in intellectu quod non sit prius in sensu'?", "options": [{"text": "The human intellect is inherently limited in its capacity for original thought.", "isCorrect": false, "rationale": "The epigraph does not discuss the limits of original thought but rather the origin of *all* thought and understanding."}, {"text": "All knowledge and understanding ultimately derive from sensory experience.", "isCorrect": true, "rationale": "The Latin phrase translates to 'Nothing is in the understanding that was not first in the senses,' directly asserting that sensory experience is the foundational source of all intellectual content."}, {"text": "Thomas Aquinas was the first philosopher to propose the concept of empiricism.", "isCorrect": false, "rationale": "The epigraph attributes the statement to Aristotle, with Aquinas acting as a transmitter or interpreter, not the original author."}, {"text": "Purely abstract concepts exist independently of any sensory input.", "isCorrect": false, "rationale": "This statement directly contradicts the epigraph's claim, which posits that all intellectual content, even abstract, must have sensory origins."}]}, {"question": "The philosophical position expressed in the epigraph is most closely associated with which school of thought regarding the origin of knowledge?", "options": [{"text": "Rationalism", "isCorrect": false, "rationale": "Rationalism emphasizes reason and innate ideas as the primary sources of knowledge, often independent of sensory experience, which opposes the epigraph's view."}, {"text": "Existentialism", "isCorrect": false, "rationale": "Existentialism focuses on individual existence, freedom, and responsibility, which is unrelated to the epigraph's discussion on the origin of knowledge."}, {"text": "Empiricism", "isCorrect": true, "rationale": "Empiricism is the philosophical theory that all knowledge is derived from sense-experience. The epigraph's statement ('Nothing is in the understanding that was not first in the senses') is a foundational principle of empiricist thought."}, {"text": "Solipsism", "isCorrect": false, "rationale": "Solipsism is the belief that only one's own mind is sure to exist, a concept unrelated to the epigraph's assertion about the source of all understanding."}]}, {"question": "Considering the epigraph, how would a proponent of this view likely explain the understanding of an abstract concept like 'justice'?", "options": [{"text": "As an innate idea present in the mind from birth, requiring no external experience.", "isCorrect": false, "rationale": "This view is characteristic of rationalism and contradicts the epigraph's assertion that all understanding originates in the senses."}, {"text": "As a concept derived from purely rational deduction, independent of any sensory input.", "isCorrect": false, "rationale": "While reason is involved, the epigraph states that *nothing* is in the understanding that wasn't *first* in the senses, implying even rational deductions ultimately stem from sensory foundations."}, {"text": "As a purely subjective feeling that varies wildly and has no universal basis.", "isCorrect": false, "rationale": "The epigraph discusses the origin of understanding, not its universality or subjectivity. While derived from senses, concepts can still be universalized through shared experience and reason."}, {"text": "As a generalization or abstraction formed from various sensory experiences of fairness, harm, and societal interactions.", "isCorrect": true, "rationale": "According to the epigraph's empiricist stance, even abstract concepts like 'justice' must ultimately be built up from specific sensory observations and experiences over time, combining and abstracting them."}]}, {"question": "The attribution 'attributed to Aristotle, via Thomas Aquinas' implies what about the statement's journey?", "options": [{"text": "Thomas Aquinas was the sole creator of this philosophical idea.", "isCorrect": false, "rationale": "The phrase 'attributed to Aristotle' indicates Aristotle as the original source, while 'via Thomas Aquinas' implies Aquinas acted as an intermediary."}, {"text": "Aristotle directly wrote this exact phrase in Latin.", "isCorrect": false, "rationale": "Aristotle wrote in Greek. The phrase 'attributed to Aristotle, via Thomas Aquinas' suggests that Aquinas transmitted or translated Aristotle's thought into Latin, perhaps summarizing or interpreting it."}, {"text": "Aquinas played a crucial role in transmitting and possibly shaping the understanding of Aristotle's ideas.", "isCorrect": true, "rationale": "The 'via' indicates that Aquinas was the channel or intermediary through whom this particular formulation of Aristotle's thought became known, implying his significant role in its transmission and potentially its specific articulation."}, {"text": "The statement's true author is unknown and merely guessed to be Aristotle.", "isCorrect": false, "rationale": "'Attributed to' suggests a strong historical connection, not mere guesswork, even if the exact phrasing might be Aquinas's interpretation."}]}, {"question": "If an educator adopted the principle 'Nihil est in intellectu quod non sit prius in sensu' as their primary pedagogical philosophy, which teaching method would they most heavily emphasize?", "options": [{"text": "Lectures and theoretical discussions focusing on abstract principles.", "isCorrect": false, "rationale": "While these methods have their place, they would be insufficient if all understanding must *first* come from the senses. They are less direct in providing sensory experience."}, {"text": "Rote memorization of facts and definitions from textbooks.", "isCorrect": false, "rationale": "Rote memorization does not primarily engage sensory experience in the way the epigraph suggests is fundamental for understanding."}, {"text": "Hands-on activities, experiments, and direct observational learning.", "isCorrect": true, "rationale": "These methods directly engage the senses, providing the foundational sensory experiences from which, according to the epigraph, all understanding is built."}, {"text": "Guided meditation and introspection to uncover innate knowledge.", "isCorrect": false, "rationale": "This approach focuses on internal thought and innate knowledge, directly contrasting the epigraph's emphasis on external sensory input."}]}, {"question": "What is the implication of the word 'prius' ('first') in the statement 'Nihil est in intellectu quod non sit prius in sensu'?", "options": [{"text": "Sensory experience is the *only* kind of experience humans can have.", "isCorrect": false, "rationale": "The statement asserts sensory experience as the *origin* or *precondition* for understanding, not the sole form of experience."}, {"text": "Intellectual understanding can exist independently of sensory input, but sensory input enhances it.", "isCorrect": false, "rationale": "The word 'prius' (first) negates this, implying sensory input is a necessary precursor, not just an enhancement."}, {"text": "Sensory experience is a necessary preceding condition for any intellectual understanding.", "isCorrect": true, "rationale": "The term 'prius' explicitly states that nothing enters the understanding *before* it has been in the senses, establishing sensory input as the initial and fundamental requirement for all knowledge."}, {"text": "The intellect is superior to the senses in acquiring knowledge.", "isCorrect": false, "rationale": "The statement describes a chronological and foundational relationship, not a hierarchy of superiority; the intellect depends on the senses according to this view."}]}, {"question": "Which of the following scenarios would directly challenge the central tenet of the epigraph?", "options": [{"text": "A scientist developing a hypothesis based on years of experimental data.", "isCorrect": false, "rationale": "This scenario aligns with the epigraph, as the hypothesis is derived from sensory data (experimental observations)."}, {"text": "A child learning to identify different colors through visual perception.", "isCorrect": false, "rationale": "This scenario directly supports the epigraph, demonstrating knowledge acquisition through sensory experience."}, {"text": "A philosopher arguing that fundamental mathematical truths are known purely by reason, without any empirical observation.", "isCorrect": true, "rationale": "This scenario represents a rationalist position, claiming knowledge exists in the understanding *without* first being in the senses, directly contradicting the epigraph."}, {"text": "An artist creating a sculpture after observing various natural forms.", "isCorrect": false, "rationale": "This scenario aligns with the epigraph, as the artistic creation is inspired by and derived from sensory observations."}]}, {"question": "In the context of the epigraph, what does 'intellectu' (understanding) primarily refer to?", "options": [{"text": "Only the ability to recall factual information.", "isCorrect": false, "rationale": "Understanding ('intellectu') encompasses a broader range of cognitive faculties, including reason, judgment, and conceptualization, not just recall."}, {"text": "The faculty of sensory perception itself.", "isCorrect": false, "rationale": "'Intellectu' refers to the mind or understanding, distinct from the 'sensu' (senses) which provide the raw input."}, {"text": "The mind's capacity for reason, thought, and comprehension.", "isCorrect": true, "rationale": "'Intellectu' refers to the cognitive faculty of the mind responsible for processing, reasoning, and forming concepts and understanding from sensory data."}, {"text": "Subconscious desires and emotional responses.", "isCorrect": false, "rationale": "While part of human experience, the epigraph focuses on 'understanding' or 'intellect,' which typically refers to rational and cognitive processes, not primarily emotions or subconscious desires."}]}, {"question": "The epigraph suggests a foundational role for 'sensu' (senses). What is the most accurate interpretation of 'senses' in this philosophical context?", "options": [{"text": "Only the five traditional senses (sight, hearing, touch, taste, smell).", "isCorrect": false, "rationale": "While the traditional five senses are included, in philosophy, 'senses' often broadly refers to any form of empirical experience or direct apprehension of reality through bodily faculties."}, {"text": "Innate knowledge or pre-programmed ideas within the mind.", "isCorrect": false, "rationale": "This contradicts the core message; 'senses' refer to external input, not internal, pre-existing ideas."}, {"text": "The entirety of human emotional and spiritual experience.", "isCorrect": false, "rationale": "While emotions are part of human experience, 'senses' in this context specifically refers to the faculties that perceive external physical stimuli."}, {"text": "Any direct physical or empirical interaction with the external world.", "isCorrect": true, "rationale": "In this philosophical context, 'senses' broadly refers to all faculties through which humans perceive and interact with the physical world, forming the basis for subsequent understanding."}]}, {"question": "Which statement best captures the relationship between 'understanding' and 'senses' as presented in the epigraph?", "options": [{"text": "Understanding can often bypass the senses entirely to acquire knowledge.", "isCorrect": false, "rationale": "The statement explicitly says 'Nothing is in the understanding that was not *first* in the senses,' directly contradicting the idea of bypassing them."}, {"text": "The senses are merely tools that understanding uses to confirm pre-existing ideas.", "isCorrect": false, "rationale": "This implies innate ideas, which is a rationalist view, not the empiricist one presented by the epigraph where senses are the *origin*."}, {"text": "The senses provide the raw material upon which the understanding operates to form knowledge.", "isCorrect": true, "rationale": "This accurately reflects the epigraph's assertion: sensory input is the necessary first step, providing the content ('raw material') for the intellect to process and form understanding."}, {"text": "Understanding and senses operate completely independently, generating different types of knowledge.", "isCorrect": false, "rationale": "The epigraph establishes a clear dependency and sequence: understanding relies on what has *first* been in the senses, indicating they are not independent in the generation of knowledge."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
