<script>
var QUESTIONS = [{"question": "Which of the following best captures the literal meaning of the Latin phrase 'Cedant arma togae, concedat laurea laudi'?", "options": [{"text": "Let the strong defeat the weak, and the victor claim glory.", "isCorrect": false, "rationale": "This option misinterprets 'arms' and 'toga' as a direct conflict between strong and weak, and 'laurea' and 'laudi' as universal victory and glory, rather than specific societal values."}, {"text": "Let military power give way to civil authority, and accolades to merit.", "isCorrect": true, "rationale": "The provided translation 'Let arms yield to the toga, let the laurel give way to praise' directly supports this interpretation. 'Arms' symbolize military power, 'toga' symbolizes civil or political life, 'laurel' represents honor or victory, and 'praise' signifies earned merit or recognition."}, {"text": "Those who bear arms should respect the law, and receive their deserved recognition.", "isCorrect": false, "rationale": "While respect for law is a component of civil authority, the phrase emphasizes a yielding or giving way, suggesting a hierarchy of values rather than just respect. Also, 'laurea laudi' is about the *source* of recognition (merit), not merely receiving it."}, {"text": "The military's strength is greater than a politician's words, yet words can inspire.", "isCorrect": false, "rationale": "This option reverses the intended meaning of 'Cedant arma togae' by implying military strength is greater. The quote asserts the opposite: civil authority (toga) should take precedence over military power (arms)."}]}, {"question": "In the context of ancient Roman society and Cicero's philosophy, what do 'arms' and 'toga' primarily represent in the phrase 'Cedant arma togae'?", "options": [{"text": "The physical tools of war and the garments of priests, respectively.", "isCorrect": false, "rationale": "While 'arms' literally refers to weapons, and a 'toga' is a garment, the toga primarily symbolized Roman citizenship, civil life, and political office, not specifically the priesthood. The meaning is symbolic, not merely literal objects."}, {"text": "Military might and political or civil governance, respectively.", "isCorrect": true, "rationale": "In ancient Rome, 'arms' were synonymous with military power and warfare, while the 'toga' was the distinctive attire of Roman citizens, particularly those involved in civil and political life. Cicero, a statesman and orator, would naturally use these terms to contrast military force with civil administration and law."}, {"text": "Brute force and intellectual debate, respectively.", "isCorrect": false, "rationale": "While 'toga' can be associated with intellectual debate, 'arms' specifically refers to military power, not just 'brute force' in a general sense. The contrast is more precise: military versus civil."}, {"text": "Imperial expansion and domestic policies, respectively.", "isCorrect": false, "rationale": "While related to foreign and domestic affairs, 'arms' and 'toga' are more fundamental representations of distinct forms of power and authority, rather than specific policy areas."}]}, {"question": "Cicero's statement 'concedat laurea laudi' (let the laurel give way to praise) suggests a prioritization of which of the following?", "options": [{"text": "The importance of tangible trophies over intangible recognition.", "isCorrect": false, "rationale": "This option reverses the meaning. The laurel (a tangible symbol of victory/honor) giving way to praise (intangible recognition based on merit) indicates a prioritization of the latter over the former."}, {"text": "The lasting value of genuine merit over superficial honors or victories.", "isCorrect": true, "rationale": "The laurel wreath (laurea) was a symbol of victory or honor, often achieved in war or athletic contests. 'Laudi' (praise) refers to recognition for genuine achievement, character, or merit. The statement suggests that true, earned praise is more significant and enduring than mere ceremonial honors."}, {"text": "The necessity of military conquest to achieve societal acclaim.", "isCorrect": false, "rationale": "This contradicts the first part of the quote ('Cedant arma togae') which places civil authority above military. The quote advocates for merit (praise) as a higher form of recognition than mere victory (laurel), which could be a military laurel."}, {"text": "The superior eloquence of orators compared to the deeds of soldiers.", "isCorrect": false, "rationale": "While Cicero was an orator, the quote broadly elevates the concept of earned merit ('praise') over symbolic honors ('laurel'), not strictly oratorical skill over military deeds, although it aligns with valuing civil contribution more than military conquest."}]}, {"question": "As an epigraph for a textbook chapter, Cicero's quote 'Let arms yield to the toga, let the laurel give way to praise' would most effectively introduce a discussion on which theme?", "options": [{"text": "The history of Roman military campaigns and their impact.", "isCorrect": false, "rationale": "While relevant to Roman history, the quote actively de-emphasizes military power ('arms yield') in favor of civil authority. Therefore, it would not be the most effective introduction to a chapter focused *on* military campaigns."}, {"text": "The ascendancy of civic values, diplomacy, and intellectual achievements over militarism.", "isCorrect": true, "rationale": "The quote explicitly champions 'toga' (civil/political life) over 'arms' (military power) and 'praise' (merit/intellectual achievement) over 'laurel' (symbol of victory). This strongly aligns with themes of civic values, diplomacy, and intellectual contributions taking precedence over military might."}, {"text": "The evolution of Roman law and its influence on modern justice systems.", "isCorrect": false, "rationale": "While the 'toga' relates to civil governance, the quote's primary contrast is between military and civil power, and between symbolic honor and true merit, rather than solely the intricacies of legal evolution."}, {"text": "Methods of acquiring and maintaining power through military strength.", "isCorrect": false, "rationale": "This option directly contradicts the message of the epigraph, which suggests that military strength should yield to civil authority, implying a preference for methods other than military for legitimate power."}]}, {"question": "Given that this quote is from Cicero's 'De Officiis' (On Duties), what does its inclusion suggest about the overarching topic of that work?", "options": [{"text": "It is primarily a manual for military strategy and leadership.", "isCorrect": false, "rationale": "The quote itself argues for military power to yield to civil authority, making it unlikely that 'De Officiis' is primarily a military manual. Instead, it points to civic or moral duties."}, {"text": "It explores the principles of ethical conduct, civic responsibility, and the duties of a good citizen.", "isCorrect": true, "rationale": "The quote emphasizes civil authority, merit, and the proper order of values in society. This aligns perfectly with a treatise 'On Duties' ('De Officiis'), which would typically discuss ethical behavior, civic virtues, and the responsibilities of individuals in public life, encouraging actions that contribute to the common good rather than solely military conquest."}, {"text": "It focuses on the proper rituals and ceremonies for receiving honors and awards.", "isCorrect": false, "rationale": "While 'laurel' and 'praise' are about honors, the quote's emphasis is on the *source* and *value* of such recognition, not merely the procedural aspects of receiving them. The broader context of 'On Duties' suggests more profound ethical principles."}, {"text": "It critiques the decline of military discipline in the Roman Republic.", "isCorrect": false, "rationale": "While it contrasts military and civil, the quote promotes the ascendancy of the latter, rather than solely critiquing the former's discipline. The positive assertion of civil values is more prominent."}]}, {"question": "Which of the following scenarios best exemplifies the principle 'Cedant arma togae' in a modern context?", "options": [{"text": "A nation increasing its military budget to deter foreign aggression.", "isCorrect": false, "rationale": "This scenario prioritizes 'arms' (military power) as the primary means of national security, rather than having them 'yield' to civil authority or diplomatic solutions."}, {"text": "A military coup overthrowing a democratically elected government.", "isCorrect": false, "rationale": "This scenario directly contradicts the principle, as 'arms' (military power) are *not* yielding to the 'toga' (civil authority); instead, military power is asserting dominance over it."}, {"text": "A country resolving an international dispute through diplomatic negotiations rather than armed conflict.", "isCorrect": true, "rationale": "This scenario directly applies the principle. Diplomatic negotiations represent the 'toga' (civil, political, non-military means), and choosing them over 'arms' (armed conflict) means that military solutions 'yield' to civil ones."}, {"text": "A general publicly criticizing a civilian leader's foreign policy decisions.", "isCorrect": false, "rationale": "While freedom of speech exists, this scenario represents a tension or conflict between military and civilian leadership, rather than the military 'yielding' to or being subordinate to the civilian authority. It doesn't illustrate military power *yielding* to civil."}]}, {"question": "The choice of this epigraph for a chapter suggests the chapter's content will likely explore what aspect of human endeavor?", "options": [{"text": "The inevitable conflict between opposing forces.", "isCorrect": false, "rationale": "While conflict between 'arms' and 'toga' is implied, the quote's message is about resolution and precedence ('yield'), suggesting a path towards peace or prioritizing civil order rather than merely highlighting conflict."}, {"text": "The triumph of physical strength over intellectual pursuit.", "isCorrect": false, "rationale": "This option reverses the intended meaning. The 'toga' (associated with civil life, governance, and often intellectual discourse) is given precedence over 'arms' (physical strength/military power), and 'praise' (merit) over 'laurel' (symbol of victory)."}, {"text": "The ethical leadership and moral foundations of a stable society.", "isCorrect": true, "rationale": "By prioritizing civil authority ('toga') over military might ('arms') and genuine merit ('praise') over symbolic victory ('laurel'), the quote sets a tone that emphasizes ethical governance, responsible leadership, and the moral underpinnings necessary for societal stability and flourishing, rather than rule by force."}, {"text": "The importance of historical victories in shaping national identity.", "isCorrect": false, "rationale": "While victories can shape identity, the quote specifically de-emphasizes the 'laurel' (symbol of victory) in favor of 'praise' (merit), suggesting that the character and merit behind actions are more important than just the achievement of victory itself."}]}, {"question": "What core value does the epigraph champion by advocating for 'praise' over 'laurel'?", "options": [{"text": "The pursuit of fame through any means necessary.", "isCorrect": false, "rationale": "'Praise' in this context refers to recognition for true merit and honorable deeds, not fame sought 'through any means necessary,' which could include unethical actions. It implies a moral foundation for recognition."}, {"text": "The intrinsic worth of character and genuine achievement over symbolic accolades.", "isCorrect": true, "rationale": "The 'laurel' is a symbol of victory or honor, often external. 'Praise' refers to recognition of true merit, integrity, and genuine accomplishment, which are intrinsic. The quote thus champions the value of sincere contribution and character over mere symbolic rewards."}, {"text": "The public display of awards and medals.", "isCorrect": false, "rationale": "This option focuses on the superficial aspect of 'laurel' and misinterprets 'praise' as simply a public display. The quote emphasizes the *value* of what is being praised, not the act of showing it off."}, {"text": "The importance of military valor in earning societal respect.", "isCorrect": false, "rationale": "While military valor can earn respect, the quote places 'praise' (general merit) above 'laurel' (often a military victory symbol), aligning with the first part of the quote that puts civil above military. It shifts focus from military valor alone to broader ethical merit."}]}, {"question": "Consider Cicero's status as a prominent Roman orator and statesman. How does this background illuminate the meaning of 'Cedant arma togae'?", "options": [{"text": "It highlights his personal desire to avoid military service, advocating for others to do the same.", "isCorrect": false, "rationale": "While Cicero was a civilian, the quote is a broader philosophical statement about societal priorities, not merely a personal preference for avoiding military service. He was an influential figure promoting civic ideals."}, {"text": "It underscores his belief in the supremacy of civil and legal institutions, in which he actively participated, over military force.", "isCorrect": true, "rationale": "As an orator, lawyer, and consul, Cicero was a central figure in Roman civil and political life (the 'toga'). His background strongly supports the interpretation that he believed in the preeminence of civil law, governance, and rational discourse over the use of military power ('arms')."}, {"text": "It suggests he was primarily concerned with the legal justification for Roman military expansion.", "isCorrect": false, "rationale": "The quote argues for 'arms' yielding to 'toga,' which runs counter to a primary concern for military expansion. His 'De Officiis' focuses on moral duty, not legal justification for aggression."}, {"text": "It demonstrates his mastery of military rhetoric, encouraging soldiers to fight with honor.", "isCorrect": false, "rationale": "Cicero was known for his mastery of *civil* rhetoric, used in courts and the Senate, not military rhetoric in the sense of inspiring soldiers. The quote's message is about civil supremacy, not military encouragement."}]}, {"question": "If a modern leader were to adopt the sentiment of this epigraph, which action would be most consistent with its message?", "options": [{"text": "Prioritizing military spending to ensure national security above all else.", "isCorrect": false, "rationale": "This action would prioritize 'arms,' which the epigraph states should 'yield' to the 'toga' (civil authority or solutions). It runs contrary to the spirit of the quote."}, {"text": "Focusing on building strong diplomatic ties and investing in education and infrastructure to foster long-term societal well-being.", "isCorrect": true, "rationale": "This action aligns with prioritizing the 'toga' (civil solutions, diplomacy, societal development) over 'arms,' and seeking 'praise' (genuine merit through societal progress) over mere 'laurel' (symbolic victories). It emphasizes the enduring value of civil contributions."}, {"text": "Instituting mandatory military service for all young citizens to strengthen national defense.", "isCorrect": false, "rationale": "While a measure of national defense, making military service mandatory for all would be a strong prioritization of 'arms' and military structure, rather than having them 'yield' to civil life or a broader emphasis on civic contributions."}, {"text": "Awarding medals for military bravery above all other forms of public service.", "isCorrect": false, "rationale": "This action would prioritize a 'laurel' (military honor) over 'praise' (broader merit), which is the opposite of what the quote advocates. The quote encourages valuing all forms of 'praise' for genuine contribution over specific symbolic honors like military medals."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
