<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 5, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what did the Romans primarily mean by *videre* when connecting it to concepts like *evidentia*?", "options": [{"text": "To physically observe an object with one's eyes.", "isCorrect": false, "rationale": "While *videre* involved physical sight, the text explicitly states that for the Romans, 'seeing was far more than a physical act' when linked to understanding and truth, making this only a partial and not the primary meaning in this context."}, {"text": "To understand and grasp the truth or reality of something.", "isCorrect": true, "rationale": "The text clearly states: 'for the Romans, seeing was far more than a physical act. To see something was to understand it, to grasp its truth.'"}, {"text": "To predict future events through prophecy.", "isCorrect": false, "rationale": "Predicting future events is related to 'foresee' (pro- + videre), but *videre* itself, in the context of *evidentia*, does not primarily mean prophecy."}, {"text": "To possess extraordinary imaginative capabilities.", "isCorrect": false, "rationale": "Having a 'vision' can involve imagination, but the core meaning of *videre* as connected to truth and *evidentia* in the Roman sense was about comprehension, not just imagination."}]}, {"question": "Based on the provided text, which of the following words *most directly* reflects the Roman connection between 'seeing' and 'knowing' or 'truth'?", "options": [{"text": "Vision", "isCorrect": false, "rationale": "While 'vision' comes from the *vis* root and means 'to see,' its general definition can include imagination. The text highlights 'evidence' as the prime example of seeing clearly leading to undeniable truth."}, {"text": "Video", "isCorrect": false, "rationale": "'Video' literally means 'I see' and refers to recorded images, but its primary emphasis isn't on the 'knowing' or 'truth' aspect in the way 'evidence' is described."}, {"text": "Visible", "isCorrect": false, "rationale": "'Visible' means 'can be seen,' focusing on the physical attribute of sight, not directly on the Roman idea of seeing as understanding truth."}, {"text": "Evidence", "isCorrect": true, "rationale": "The text explains that 'evidence' is 'the state of being “seen clearly,” of standing out so plainly that no one can deny it,' directly linking seeing with undeniable truth and knowing."}]}, {"question": "According to the text, what is identified as the 'truly powerful' aspect of the *vis/vid* root?", "options": [{"text": "Its frequent use in modern technological terms like 'video.'", "isCorrect": false, "rationale": "While 'video' is a modern term, the text does not describe the root's power as residing in its modern technological applications or frequency of use."}, {"text": "Its ability to form words with a variety of prefixes like *re-* and *pro-*.", "isCorrect": false, "rationale": "The formation of words with prefixes is a mechanism of language, not the core 'powerful' connection identified in the text."}, {"text": "The Roman conceptual connection between the act of seeing and the idea of knowing or understanding truth.", "isCorrect": true, "rationale": "The text explicitly states: 'What makes this root truly powerful is how the Romans connected seeing with knowing.'"}, {"text": "Its direct borrowing into English from Latin in the twentieth century.", "isCorrect": false, "rationale": "This refers specifically to the word 'video' and its history, not the general 'powerful' aspect of the root itself."}]}, {"question": "How does the etymological breakdown of 'evidence' (e- + vid + -entia) explain its modern meaning in a legal context?", "options": [{"text": "It signifies the process of reviewing past events to identify errors.", "isCorrect": false, "rationale": "This description aligns with 'revise' (re- + visere), not 'evidence'."}, {"text": "It highlights the importance of foreseeing future outcomes to prevent problems.", "isCorrect": false, "rationale": "This description aligns with 'provide' (pro- + videre), not 'evidence'."}, {"text": "It refers to something that is presented so clearly and stands out so plainly that its truth is undeniable.", "isCorrect": true, "rationale": "The text explains 'evidence' as 'the state of being “seen clearly,” of standing out so plainly that no one can deny it,' which perfectly matches its legal meaning of undeniable proof."}, {"text": "It describes the act of overseeing a situation to ensure everything is correct and orderly.", "isCorrect": false, "rationale": "This description aligns with 'supervise' (super- + videre), not 'evidence'."}]}, {"question": "The role of a supervisor is best understood through the etymological breakdown of 'supervise' as:", "options": [{"text": "'seeing again' to improve work.", "isCorrect": false, "rationale": "This refers to 'revise' (re- + visere), not 'supervise'."}, {"text": "'seeing out clearly' to establish truth.", "isCorrect": false, "rationale": "This refers to 'evidence' (e- + vid + -entia), not 'supervise'."}, {"text": "'seeing over' the work of others to ensure proper execution.", "isCorrect": true, "rationale": "The text states: 'a supervisor “sees over” (super- + videre) the work of others, watching from above to ensure everything goes well.'"}, {"text": "'seeing ahead' to prepare for future needs.", "isCorrect": false, "rationale": "This refers to 'provide' (pro- + videre), not 'supervise'."}]}, {"question": "According to the text, what is the direct Latin translation of the word 'video'?", "options": [{"text": "'To see'", "isCorrect": false, "rationale": "'To see' is the translation of the infinitive verb *videre*, not the specific word *video*."}, {"text": "'I see'", "isCorrect": true, "rationale": "The text explicitly states: 'A video is literally “I see” in Latin,' and further, 'It is the first-person singular present tense of videre: “I see.”'"}, {"text": "'Seen'", "isCorrect": false, "rationale": "'Seen' is the translation of the past participle *visus*, from which the root *vis* comes, but not the word *video* itself."}, {"text": "'State of seeing'", "isCorrect": false, "rationale": "This phrase describes the meaning of a word ending in '-entia' combined with a seeing root, not the direct translation of *video*."}]}, {"question": "The text suggests that the Latin root for 'seeing' (vis/vid) significantly influenced how we describe which of the following areas?", "options": [{"text": "Artistic expression and creative visualization.", "isCorrect": false, "rationale": "While 'vision' can relate to creative visualization, the text emphasizes broader societal concepts rather than specifically artistic expression."}, {"text": "Technological advancements in visual media.", "isCorrect": false, "rationale": "This is too narrow; 'video' is one example, but the influence is presented as much wider than just technology."}, {"text": "Concepts related to knowledge, proof, and oversight.", "isCorrect": true, "rationale": "The text concludes: 'From courtrooms to classrooms, the Latin root for seeing shaped how we talk about knowledge, proof, and oversight.'"}, {"text": "The physical mechanics of human eyesight.", "isCorrect": false, "rationale": "The text explicitly states that for Romans, 'seeing was far more than a physical act,' indicating the influence goes beyond mere physical mechanics."}]}, {"question": "If a new word 'post-vision' were coined using the logic described in the text (where 'post-' means 'after'), what would its meaning most logically be?", "options": [{"text": "To see something for the very first time.", "isCorrect": false, "rationale": "The prefix 'post-' means 'after,' not 'first time.'"}, {"text": "To see after an event has concluded or passed.", "isCorrect": true, "rationale": "Applying the meaning of 'post-' (after) to the root 'vision' (seeing) logically yields 'seeing after' an event."}, {"text": "To see something before it actually happens.", "isCorrect": false, "rationale": "This meaning aligns with 'pro-' (ahead), not 'post-' (after)."}, {"text": "To see something vividly in a dream or imagination.", "isCorrect": false, "rationale": "This is a general meaning of 'vision,' not one derived from adding the specific prefix 'post-'."}]}, {"question": "According to one of the *etymnotes*, when was the word 'video' directly borrowed from Latin into English?", "options": [{"text": "In ancient Roman times.", "isCorrect": false, "rationale": "The *etymnote* specifies a much later period for the direct borrowing of the word 'video'."}, {"text": "During the Renaissance period.", "isCorrect": false, "rationale": "The *etymnote* specifies a more recent century."}, {"text": "In the twentieth century.", "isCorrect": true, "rationale": "The *etymnote* clearly states: 'The word video was borrowed directly from Latin in the twentieth century.'"}, {"text": "In the nineteenth century.", "isCorrect": false, "rationale": "The *etymnote* specifies the century immediately following the nineteenth."}]}, {"question": "The text distinguishes between the root *vis* coming from *visus* (past participle) and *vid* coming from the verb stem of *videre*. Which pair of words correctly exemplifies this distinction based on the text's examples?", "options": [{"text": "Vision (from *videre* verb stem) and evident (from *visus* past participle).", "isCorrect": false, "rationale": "The text states 'vision' comes from *visus* (past participle) and 'evident' uses the *vid* stem, so this mapping is incorrect."}, {"text": "Visible (from *visus* past participle) and video (from *videre* verb stem).", "isCorrect": true, "rationale": "The text states: 'The root vis comes from visus... When something is visible, it can be seen.' And 'The root vid comes from the verb stem itself. A video is literally “I see” in Latin.' This pair correctly illustrates the distinction as explained."}, {"text": "Provide (from *visus* past participle) and revision (from *videre* verb stem).", "isCorrect": false, "rationale": "'Provide' is explained with *videre* (verb stem), and 'revision' uses 're- + visere,' which is linked to *visus* (past participle), so the mapping is reversed and partially incorrect."}, {"text": "Supervise (from *visus* past participle) and visual (from *videre* verb stem).", "isCorrect": false, "rationale": "'Supervise' is explained with *videre* (verb stem). While 'visual' is related to 'seeing,' the text does not use it as the explicit example for the *visus* origin; 'visible' is used instead."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
