<script>

ng of \"vit / viv\" ('life; to live'), what does the word \"revive\" most closely imply?", "options": [{"text": "To review something thoroughly.", "isCorrect": false, "rationale": "The prefix 're-' can mean 'again' and 'vive' means 'to live', so 'revive' is about bringing back to life, not reviewing information."}, {"text": "To bring back to life or consciousness.", "isCorrect": true, "rationale": "Given that 'vit/viv' means 'life; to live', and the prefix 're-' often means 'again' or 'back', 'revive' logically means to bring something or someone back to life or a state of being alive/conscious."}, {"text": "To make something new again.", "isCorrect": false, "rationale": "While revival can lead to newness, the core meaning of 'revive' specifically targets bringing back life or vitality, not just general newness."}, {"text": "To live alone or in isolation.", "isCorrect": false, "rationale": "There is nothing in the root 'vit/viv' or the prefix 're-' that suggests isolation. The meaning is about restoring life."}]}, {"question": "If something is described as 'vivid,' how does its meaning relate to the root 'vit / viv'?", "options": [{"text": "It means the object is ancient and has a long history.", "isCorrect": false, "rationale": "'Vivid' implies intensity or clarity, not age. The root 'vit/viv' relates to life, not historical duration."}, {"text": "It suggests the object is full of life, lively, bright, or intensely clear.", "isCorrect": true, "rationale": "The word 'vivid' is derived from 'vivere' (to live) and implies being 'full of life' in terms of brightness, intensity, or clarity, making it seem very real or lifelike. This aligns with the root's meaning."}, {"text": "It indicates the object is fragile and easily broken.", "isCorrect": false, "rationale": "The meaning of 'vivid' is unrelated to fragility. It speaks to the quality of being lively or intense."}, {"text": "It refers to an object lacking color or energy.", "isCorrect": false, "rationale": "This is the opposite of 'vivid.' 'Vivid' suggests strong color, intensity, and a sense of liveliness or energy, consistent with the root meaning of 'life'."}]}, {"question": "A medical professional checking a patient's \"vital signs\" is assessing indicators that are directly related to:", "options": [{"text": "The patient's memory and cognitive functions.", "isCorrect": false, "rationale": "While important, memory and cognitive functions are not typically considered 'vital signs,' which are direct indicators of life, not higher-level brain functions."}, {"text": "The patient's financial status and insurance coverage.", "isCorrect": false, "rationale": "This is completely unrelated to the medical meaning of 'vital signs' or the root 'vit/viv'."}, {"text": "The patient's social interactions and emotional well-being.", "isCorrect": false, "rationale": "While important for overall health, social interactions and emotional well-being are not the primary focus of 'vital signs,' which are physiological measures of life."}, {"text": "The patient's immediate bodily functions essential for sustaining life.", "isCorrect": true, "rationale": "Given the root 'vit' means 'life', 'vital signs' are the core physiological measurements (like pulse, temperature, blood pressure, respiration) that indicate whether a person is alive and their fundamental life functions are operating."}]}, {"question": "Which of the following words is LEAST likely to share the 'life; to live' meaning of the root \"vit / viv\"?", "options": [{"text": "Vitality", "isCorrect": false, "rationale": "'Vitality' clearly derives from 'vital' (meaning essential for life) and directly relates to the root's meaning of 'life' or 'liveliness'."}, {"text": "Convivial", "isCorrect": false, "rationale": "'Convivial' (from Latin 'con-' meaning 'with' + 'vivere' meaning 'to live') refers to a lively, friendly atmosphere, relating to living together harmoniously. It directly uses the root 'viv'."}, {"text": "Advise", "isCorrect": true, "rationale": "'Advise' comes from Latin 'ad-videre' (to look at, to see) and means to give counsel. It has no etymological connection to 'life' or 'to live', making it the least likely to share the root's meaning."}, {"text": "Vivacious", "isCorrect": false, "rationale": "'Vivacious' directly comes from 'viv' and describes someone who is lively, animated, and full of life, perfectly aligning with the root's meaning."}]}, {"question": "When considering the examples like 'revive' and 'survive,' what is a common underlying concept the root 'vit / viv' consistently contributes to these words?", "options": [{"text": "The act of seeing or observing.", "isCorrect": false, "rationale": "While some words might coincidentally relate to sight, the explicit meaning of 'vit/viv' given in the text is 'life; to live', not 'to see'."}, {"text": "The process of growth and development.", "isCorrect": false, "rationale": "While life involves growth, the specific emphasis in 'revive' (bring back to life) and 'survive' (continue to live) is on the state or continuation of life itself, not exclusively growth."}, {"text": "The presence, continuation, or restoration of life or liveliness.", "isCorrect": true, "rationale": "The examples 'revive' (bring back to life), 'survive' (continue to live), 'vital' (essential for life), and 'vivid' (full of life/liveliness) all consistently relate to the existence, maintenance, or renewal of life or vitality."}, {"text": "The ability to communicate effectively.", "isCorrect": false, "rationale": "The root 'vit/viv' is related to life, not directly to communication. The examples do not suggest a focus on communication."}]}, {"question": "If a biologist studies 'viviparous' organisms (those that give birth to live young), how does the 'vivi' variant apply here according to the section?", "options": [{"text": "It signifies that the organisms are extinct.", "isCorrect": false, "rationale": "The root 'vivi' means 'life,' so it would indicate living organisms, not extinct ones."}, {"text": "It is used in a compound form to emphasize giving birth to 'living' offspring.", "isCorrect": true, "rationale": "The 'vivi' variant is used 'in compound forms' (as stated in the text), and in 'viviparous,' it directly indicates 'living,' combined with 'parous' (bearing), to describe organisms that bear 'live' young, aligning with the root's meaning."}, {"text": "It means the organisms can only reproduce once in their lifetime.", "isCorrect": false, "rationale": "The root 'vivi' does not convey information about the frequency of reproduction. Its meaning is related to life itself."}, {"text": "It denotes the organisms have no internal organs.", "isCorrect": false, "rationale": "The meaning of 'vivi' is 'life,' which has no connection to the presence or absence of internal organs."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
