<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words from the Ancients: Latin &amp; Greek Roots &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 7, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does 'Cogito, ergo sum' mean?", "options": [{"text": "I know, therefore I exist.", "isCorrect": false, "rationale": "Uses 'think' not 'know.'"}, {"text": "I think, therefore I am.", "isCorrect": true, "rationale": "Direct translation from the text."}, {"text": "I feel, therefore I live.", "isCorrect": false, "rationale": "'Cogito' relates to thinking."}, {"text": "I speak, therefore I matter.", "isCorrect": false, "rationale": "'Cogito' relates to thinking."}]}, {"question": "Who said 'Cogito, ergo sum'?", "options": [{"text": "Cicero", "isCorrect": false, "rationale": "Ancient Roman orator. This is Descartes."}, {"text": "Aristotle", "isCorrect": false, "rationale": "Greek philosopher."}, {"text": "Rene Descartes", "isCorrect": true, "rationale": "From Meditationes de Prima Philosophia (1641)."}, {"text": "Thomas Aquinas", "isCorrect": false, "rationale": "Medieval philosopher-theologian."}]}, {"question": "'Cogito' shares which root with the chapter?", "options": [{"text": "sens (feel)", "isCorrect": false, "rationale": "'Cogito' contains 'cogn' (know)."}, {"text": "cogn (to know)", "isCorrect": true, "rationale": "Chapter focuses on 'cogn.'"}, {"text": "scrib (write)", "isCorrect": false, "rationale": "Different root."}, {"text": "dict (say)", "isCorrect": false, "rationale": "Different root."}]}, {"question": "Which work is the source?", "options": [{"text": "De Oratore", "isCorrect": false, "rationale": "By Cicero."}, {"text": "Meditationes de Prima Philosophia", "isCorrect": true, "rationale": "Cited in the text."}, {"text": "Summa Theologica", "isCorrect": false, "rationale": "By Aquinas."}, {"text": "Principia Mathematica", "isCorrect": false, "rationale": "Different work."}]}, {"question": "What year was it published?", "options": [{"text": "1543", "isCorrect": false, "rationale": "Citation says 1641."}, {"text": "1641", "isCorrect": true, "rationale": "Stated in the citation."}, {"text": "1776", "isCorrect": false, "rationale": "After Descartes' lifetime."}, {"text": "44 BC", "isCorrect": false, "rationale": "Ancient date."}]}, {"question": "What concept does the phrase establish?", "options": [{"text": "Physical strength", "isCorrect": false, "rationale": "About thinking and existence."}, {"text": "Certainty of existence through thinking", "isCorrect": true, "rationale": "Thinking proves existence."}, {"text": "Superiority of writing", "isCorrect": false, "rationale": "Different chapter's theme."}, {"text": "Value of education", "isCorrect": false, "rationale": "About consciousness and existence."}]}, {"question": "'Ergo' means what?", "options": [{"text": "Because", "isCorrect": false, "rationale": "Indicates conclusion, not cause."}, {"text": "Therefore", "isCorrect": true, "rationale": "Connects premise to conclusion."}, {"text": "However", "isCorrect": false, "rationale": "Introduces contrast, not conclusion."}, {"text": "And", "isCorrect": false, "rationale": "Simple conjunction vs. logical connector."}]}, {"question": "Why is this fitting for a chapter on 'cogn'?", "options": [{"text": "Demonstrates Latin grammar.", "isCorrect": false, "rationale": "Thematic connection matters."}, {"text": "Places knowing at the foundation of existence.", "isCorrect": true, "rationale": "Thinking/knowing as proof of existence."}, {"text": "Written by a famous scientist.", "isCorrect": false, "rationale": "Thematic relevance, not fame."}, {"text": "Contains three Latin words.", "isCorrect": false, "rationale": "Coincidental."}]}, {"question": "'Sum' means 'I am.' What function does it serve?", "options": [{"text": "An adjective", "isCorrect": false, "rationale": "'Sum' is a verb."}, {"text": "The main verb expressing existence", "isCorrect": true, "rationale": "'Sum' = 'I am,' asserting existence."}, {"text": "A noun meaning 'total'", "isCorrect": false, "rationale": "In Latin it is the verb 'I am.'"}, {"text": "A preposition meaning 'with'", "isCorrect": false, "rationale": "'With' = 'cum,' not 'sum.'"}]}, {"question": "How does 'Cogito' connect to 'cognition'?", "options": [{"text": "No connection.", "isCorrect": false, "rationale": "Both from 'cognoscere.'"}, {"text": "Both from Latin root meaning 'to know.'", "isCorrect": true, "rationale": "Both trace to 'cognoscere.'"}, {"text": "Cognition is Greek.", "isCorrect": false, "rationale": "Both Latin."}, {"text": "Cogito means 'I feel.'", "isCorrect": false, "rationale": "Means 'I think.'"}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
