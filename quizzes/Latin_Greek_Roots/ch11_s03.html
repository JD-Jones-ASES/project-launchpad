        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 11, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary double meaning of the Latin verb *cedere* as described in the text?", "options": [{"text": "To speak loudly and to whisper softly.", "isCorrect": false, "rationale": "The text does not associate *cedere* with forms of speaking; it relates to movement and yielding."}, {"text": "To go/move and to yield/give way.", "isCorrect": true, "rationale": "The text explicitly states that *cedere* meant 'to go' or 'to move,' and also 'to yield' or 'to give way,' highlighting this double meaning."}, {"text": "To build up and to tear down.", "isCorrect": false, "rationale": "This meaning is unrelated to the definition of *cedere* provided in the text."}, {"text": "To win an argument and to lose a debate.", "isCorrect": false, "rationale": "While 'to yield' relates to losing a debate, the primary meaning of *cedere* encompasses broader concepts of movement and yielding, not specifically winning or losing debates."}]}, {"question": "A Roman senator who 'lost a debate' might *cedere*. Which modern English word, derived from *cedere*, best captures the senator's action in this specific context?", "options": [{"text": "Proceed", "isCorrect": false, "rationale": "To 'proceed' means to 'go forward,' which is opposite to the action of yielding in a debate."}, {"text": "Recede", "isCorrect": false, "rationale": "To 'recede' means to 'go back' or withdraw, typically in a physical sense (like a tide), rather than an intellectual or argumentative yielding."}, {"text": "Concede", "isCorrect": true, "rationale": "To 'concede' means 'to yield completely,' or to admit that the other side was right. This accurately describes a senator yielding a point after losing a debate."}, {"text": "Exceed", "isCorrect": false, "rationale": "To 'exceed' means 'to go beyond' a limit, which does not fit the context of losing or yielding in a debate."}]}, {"question": "The word 'process' is derived from *cessus* and means 'a going forward.' Which Latin prefix contributes to this 'forward' meaning?", "options": [{"text": "ad-", "isCorrect": false, "rationale": "The prefix 'ad-' means 'toward,' as seen in 'access' ('a going toward')."}, {"text": "re-", "isCorrect": false, "rationale": "The prefix 're-' means 'back,' as seen in 'recede' ('to go back')."}, {"text": "prae-", "isCorrect": false, "rationale": "The prefix 'prae-' means 'before,' as seen in 'predecessor' ('went before')."}, {"text": "pro-", "isCorrect": true, "rationale": "The text states that 'pro-' means 'forward,' and 'process' is described as 'a going forward,' indicating 'pro-' contributes to this meaning."}]}, {"question": "If a company's sales figures 'exceeded' expectations, what does this imply about their performance?", "options": [{"text": "Their sales remained steady and met the predicted amount.", "isCorrect": false, "rationale": "To 'exceed' means to go beyond, not merely to meet, expectations."}, {"text": "Their sales fell short of the projected targets.", "isCorrect": false, "rationale": "Falling short is the opposite of exceeding expectations."}, {"text": "Their sales went beyond the anticipated limits or numbers.", "isCorrect": true, "rationale": "The text defines 'exceed' as 'to go beyond,' indicating that the sales surpassed the expected limits."}, {"text": "Their sales returned to a previous lower level.", "isCorrect": false, "rationale": "This describes 'receding,' not exceeding."}]}, {"question": "Which of the following words derived from *cedere* or *cessus* correctly uses a prefix to mean 'to go back'?", "options": [{"text": "Proceed", "isCorrect": false, "rationale": "'Proceed' means 'to go forward' (pro- + cedere)."}, {"text": "Recede", "isCorrect": true, "rationale": "'Recede' means 'to go back' (re- + cedere), as described by the text regarding a tide pulling away from shore."}, {"text": "Concede", "isCorrect": false, "rationale": "'Concede' means 'to yield completely' (con- + cedere), not specifically to go back."}, {"text": "Exceed", "isCorrect": false, "rationale": "'Exceed' means 'to go beyond' (ex- + cedere), not to go back."}]}, {"question": "The text states that 'access' means 'a going toward.' Considering the derivation from 'ad-' and 'cessus,' what does this imply about how 'access' functions?", "options": [{"text": "It describes a barrier that prevents entry.", "isCorrect": false, "rationale": "Access is 'a way to approach or enter,' not a barrier that prevents it."}, {"text": "It signifies a complete surrender of rights.", "isCorrect": false, "rationale": "This meaning relates to 'concede,' not 'access.'"}, {"text": "It represents a path or method to approach or enter something.", "isCorrect": true, "rationale": "As 'a going toward' and 'a way to approach or enter,' access functions as a means or method for entry or approach."}, {"text": "It refers to something that has gone beyond a limit.", "isCorrect": false, "rationale": "This meaning is associated with 'exceed,' not 'access.'"}]}, {"question": "Sarah is taking over a project from John, who previously managed it. According to the text's definition, John would be Sarah's:", "options": [{"text": "Successor", "isCorrect": false, "rationale": "Sarah is the successor (the one who comes after), not John."}, {"text": "Predecessor", "isCorrect": true, "rationale": "The text defines a 'predecessor' as 'someone who went before' (prae-, before + de-, away + cessus), which perfectly describes John's role relative to Sarah."}, {"text": "Processor", "isCorrect": false, "rationale": "'Processor' is not a relevant term in this context; 'process' refers to a series of steps."}, {"text": "Accessor", "isCorrect": false, "rationale": "'Accessor' is not a standard word in this context, and 'access' means 'a going toward,' not someone who held a position previously."}]}, {"question": "The text emphasizes that language, 'like life, is always in motion.' Which pair of words from the *cedere* family best illustrates this constant push and pull, forward and backward movement?", "options": [{"text": "Concede and Exceed", "isCorrect": false, "rationale": "While related to *cedere*, these words (yielding completely and going beyond) do not primarily represent the forward and backward motion described."}, {"text": "Access and Process", "isCorrect": false, "rationale": "These words ('a going toward' and 'a going forward') both imply movement in a generally forward direction, lacking the 'backward' component needed to illustrate 'constant push and pull.'"}, {"text": "Proceed and Recede", "isCorrect": true, "rationale": "These words directly represent 'going forward' (proceed) and 'going back' (recede), perfectly illustrating the concept of constant motion, both advancing and retreating."}, {"text": "Predecessor and Successor", "isCorrect": false, "rationale": "While they denote a sequence, 'successor' is not directly derived or explained in the text, and the pair doesn't fully capture the 'push and pull' of general movement as much as 'proceed' and 'recede' do."}]}, {"question": "The Roman political world is described as having 'constant advance and retreat of power, influence, and argument.' Which Latin verb did the Romans use to capture *both* these kinds of movement?", "options": [{"text": "Procedere", "isCorrect": false, "rationale": "While related, 'procedere' specifically means 'to go forward,' not both advance and retreat."}, {"text": "Recedere", "isCorrect": false, "rationale": "While related, 'recedere' specifically means 'to go back,' not both advance and retreat."}, {"text": "Cedere", "isCorrect": true, "rationale": "The text states that the root verb *cedere* captured both 'going forward' and 'stepping back,' encompassing the constant advance and retreat."}, {"text": "Excedere", "isCorrect": false, "rationale": "While related, 'excedere' specifically means 'to go beyond,' not both advance and retreat."}]}, {"question": "Imagine you are a linguist analyzing a newly discovered ancient text. You encounter a word, 'comcessus,' which appears to be derived from *cedere* and carries the meaning of 'a shared or collective yielding.' Based on the information in the text, what might be the most plausible English equivalent for 'comcessus'?", "options": [{"text": "Process", "isCorrect": false, "rationale": "'Process' means 'a going forward' (pro- + cessus), not a collective yielding, and uses a different prefix."}, {"text": "Success", "isCorrect": false, "rationale": "While 'success' has a similar sound, it is not directly derived from *cedere* in this context with the given meaning, nor does it imply yielding."}, {"text": "Concession", "isCorrect": true, "rationale": "The prefix 'con-' (from 'com-' before certain consonants) means 'together' or 'intensifying,' and 'concede' means 'to yield completely.' Therefore, 'concession' (the noun form of conceding) would logically represent a 'shared or collective yielding' or a thing conceded."}, {"text": "Accession", "isCorrect": false, "rationale": "'Accession' is related to gaining access or achieving a position ('ad-' + cessus), which means 'a going toward,' not a collective yielding."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
