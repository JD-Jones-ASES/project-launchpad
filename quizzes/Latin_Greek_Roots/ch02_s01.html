<script>
var QUESTIONS = [{"question": "What is the primary message conveyed by the epigraph 'A word to the wise is sufficient'?", "options": [{"text": "Long explanations are inherently confusing and should always be avoided.", "isCorrect": false, "rationale": "While the quote advocates for brevity, it doesn't suggest that all long explanations are confusing, only that they are unnecessary for the wise."}, {"text": "Intelligent individuals can grasp concepts quickly and act effectively with minimal information.", "isCorrect": true, "rationale": "This option accurately captures the essence of the epigraph, suggesting that those who are 'wise' (intelligent, discerning) do not require extensive details to understand or respond appropriately."}, {"text": "Wisdom is primarily acquired through listening to concise and authoritative advice.", "isCorrect": false, "rationale": "The quote focuses on how the wise *receive* and process information, not on the process of *acquiring* wisdom itself, or that advice must be authoritative."}, {"text": "The ability to speak briefly and precisely is the most significant indicator of one's wisdom.", "isCorrect": false, "rationale": "The emphasis is on the *recipient's* capacity to understand with little input, rather than the speaker's brevity being the ultimate sign of wisdom, though it is implied as an effective communication method for the wise."}]}, {"question": "In which of the following scenarios would the principle of 'Verbum sapienti sat est' (A word to the wise is sufficient) be most effectively demonstrated?", "options": [{"text": "Explaining a completely new and complex scientific theory to a group of first-year students.", "isCorrect": false, "rationale": "First-year students are likely novices in a new theory and would require more than 'a word' to understand complex scientific concepts, contradicting the epigraph's principle."}, {"text": "Providing a veteran surgeon with a brief verbal cue during a critical phase of a familiar operation.", "isCorrect": true, "rationale": "A veteran surgeon is 'wise' in their field, and a brief cue (a 'word') would likely be 'sufficient' for them to understand and respond effectively in a familiar context, perfectly illustrating the epigraph."}, {"text": "Giving detailed, step-by-step instructions for assembling intricate furniture to someone unfamiliar with construction.", "isCorrect": false, "rationale": "Someone unfamiliar with construction would require detailed instructions, not just 'a word,' to successfully assemble intricate furniture, making this scenario unsuitable for the epigraph's application."}, {"text": "Delivering a comprehensive lecture on the foundational principles of a new programming language.", "isCorrect": false, "rationale": "A comprehensive lecture implies extensive detail and explanation, which is the opposite of 'a word' being 'sufficient,' especially for foundational principles of a new subject."}]}, {"question": "Considering its placement at the beginning of a chapter, what does this epigraph likely signal to the reader about the author's expectations for their audience?", "options": [{"text": "The chapter will contain exceptionally long and detailed explanations to ensure full comprehension.", "isCorrect": false, "rationale": "The epigraph, by advocating for brevity for the wise, suggests the opposite: that the author trusts the reader to understand without excessive detail."}, {"text": "The reader is expected to possess a certain level of intelligence or prior knowledge, capable of inferring meaning from concise presentations.", "isCorrect": true, "rationale": "By choosing an epigraph that states 'a word is sufficient,' the author implies that the reader is 'wise' enough to grasp concepts from minimal input, encouraging active inference rather than needing explicit detail at every turn."}, {"text": "The content will be extraordinarily challenging, requiring multiple readings to decipher its complexities.", "isCorrect": false, "rationale": "While content can be challenging, the epigraph suggests the 'wise' reader will still grasp it efficiently, not that it's so complex it requires multiple readings due to obfuscation."}, {"text": "The author anticipates the reader will need explicit guidance and step-by-step instruction throughout the section.", "isCorrect": false, "rationale": "The epigraph directly contradicts this, implying that the reader *does not* need explicit guidance at every step, but rather can understand with brevity."}]}, {"question": "What characteristic does the epigraph 'A word to the wise is sufficient' most emphasize about the 'wise' individual?", "options": [{"text": "Their extensive academic qualifications and formal education.", "isCorrect": false, "rationale": "While academic qualifications might contribute, the quote emphasizes a cognitive ability to process information efficiently, not just formal credentials."}, {"text": "Their capacity to synthesize information and draw accurate conclusions from minimal input.", "isCorrect": true, "rationale": "The core implication of 'a word is sufficient' is that the 'wise' person can take a small piece of information and expand upon it, connecting it to existing knowledge to fully understand or act. This highlights their ability to synthesize and deduce."}, {"text": "Their advanced age and extensive life experience as the sole source of their understanding.", "isCorrect": false, "rationale": "Age and experience can contribute to wisdom, but the epigraph specifically points to the *skill* of understanding with brevity, which isn't exclusively tied to advanced age."}, {"text": "Their strict adherence to instructions and inability to deviate from established protocols.", "isCorrect": false, "rationale": "The quote suggests comprehension and independent action based on minimal input, not blind adherence to instructions without deeper understanding."}]}, {"question": "The epigraph is attributed to Plautus, from his play 'Persa.' What does this attribution suggest about the quote's historical context or enduring relevance?", "options": [{"text": "It implies that the concept of effective communication is a modern development, with ancient roots only recently discovered.", "isCorrect": false, "rationale": "Plautus was a Roman playwright from the classical era, directly indicating that the concept has ancient roots and is not a modern development."}, {"text": "It highlights that the principle of concise communication for intelligent audiences has been recognized and valued since classical times.", "isCorrect": true, "rationale": "Plautus's use of this phrase in a play from antiquity demonstrates that the idea of communicating efficiently to a discerning audience is a long-standing concept, enduring across historical periods."}, {"text": "It suggests the quote is merely a humorous theatrical line without any profound or lasting philosophical implications.", "isCorrect": false, "rationale": "While Plautus was a comic playwright, many lines from classical plays convey timeless wisdom. Its use as an epigraph for a textbook chapter suggests it carries serious and relevant meaning beyond mere humor."}, {"text": "It indicates that Plautus was primarily known for his didactic philosophical treatises rather than theatrical works.", "isCorrect": false, "rationale": "Plautus was famous for his comedies, not primarily for didactic philosophical treatises. The source 'Persa' confirms it's from a play."}]}, {"question": "Based on the epigraph, what kind of communication style does it implicitly endorse when addressing a knowledgeable audience?", "options": [{"text": "A verbose, exhaustive, and highly explicit approach that leaves no room for interpretation.", "isCorrect": false, "rationale": "This approach is the opposite of what 'a word is sufficient' implies. The quote advocates for brevity, not verbosity."}, {"text": "A concise, suggestive, and trust-based approach that relies on the listener's intellect to fill in details.", "isCorrect": true, "rationale": "The phrase endorses providing just 'a word' because the 'wise' recipient is trusted to understand the full implication, demonstrating a concise and suggestive communication style that respects the listener's intelligence."}, {"text": "A formal, academic, and jargon-heavy style primarily aimed at displaying intellectual prowess.", "isCorrect": false, "rationale": "While it's in a textbook, the quote doesn't inherently endorse jargon; it endorses clarity and efficiency for the wise, not necessarily a display of intellectual prowess via complex language."}, {"text": "An informal, anecdotal, and conversational tone designed to engage a broad, non-academic audience.", "isCorrect": false, "rationale": "The quote is about efficiency and intellectual capacity in communication, not about informality or targeting a non-academic audience. Its source from a classical play (often containing formal rhetoric) and its use in a textbook context suggests a more considered approach."}]}, {"question": "If 'Verbum sapienti sat est' literally translates to 'A word to the wise is enough,' what nuance might the provided English translation 'A word to the wise is sufficient' emphasize?", "options": [{"text": "It primarily aims to make the phrase sound more informal and accessible to modern readers.", "isCorrect": false, "rationale": "'Sufficient' often carries a more formal or precise connotation than 'enough,' so it does not primarily aim for informality."}, {"text": "It stresses that the minimal input fully meets the specific requirement or standard for understanding, needing nothing further.", "isCorrect": true, "rationale": "'Sufficient' implies that something is 'just enough' to meet a specific purpose or standard, highlighting that the 'word' perfectly fulfills the need for comprehension without any additional explanation."}, {"text": "It implies a greater emotional impact or a more urgent tone compared to 'enough.'", "isCorrect": false, "rationale": "The word 'sufficient' does not inherently carry a greater emotional impact or urgency compared to 'enough' in this context; it's about adequacy."}, {"text": "It suggests a deliberate withholding of information, rather than simply meeting a need.", "isCorrect": false, "rationale": "The translation emphasizes adequacy and efficiency, not an intentional withholding of information beyond what is necessary for the wise."}]}, {"question": "Beyond the specific meaning of the quote, what is the general function of an epigraph like this at the beginning of a textbook chapter?", "options": [{"text": "To provide a lengthy and detailed introduction to all the specific topics covered in the chapter.", "isCorrect": false, "rationale": "Epigraphs are typically short and concise; they are not meant to be lengthy, detailed introductions or summaries of specific topics."}, {"text": "To serve as a purely decorative element, adding aesthetic appeal without significant textual meaning.", "isCorrect": false, "rationale": "While epigraphs can add aesthetic appeal, their primary purpose is to convey meaning, set a tone, or introduce a theme, not merely decoration."}, {"text": "To set a tone, introduce a central theme, or offer a guiding principle that informs the content of the chapter.", "isCorrect": true, "rationale": "The general function of an epigraph is to subtly hint at the overarching theme, mood, or a key idea that the reader should consider as they engage with the text that follows."}, {"text": "To act as a direct and exhaustive summary of the entire chapter's content and conclusions.", "isCorrect": false, "rationale": "An epigraph provides a hint or a guiding principle, but rarely serves as an exhaustive summary of all content and conclusions of an entire chapter."}]}, {"question": "The selection of 'A word to the wise is sufficient' as an epigraph for a textbook section might imply what about the presumed characteristics of the textbook's audience?", "options": [{"text": "They are expected to be novices requiring extensive foundational knowledge and constant reinforcement.", "isCorrect": false, "rationale": "The epigraph suggests the opposite, expecting readers to be capable of understanding with minimal input, rather than needing extensive foundational explanations."}, {"text": "They are considered intelligent, capable of independent thought, and adept at making deductions from concise information.", "isCorrect": true, "rationale": "By using this epigraph, the author presumes the readers are 'wise'—meaning they possess the intelligence and capacity to understand complex ideas from brief explanations, encouraging active deduction and independent thought."}, {"text": "They are primarily interested in historical linguistic studies and classical Latin texts.", "isCorrect": false, "rationale": "While the quote is Latin, its placement as an epigraph suggests a broader thematic purpose for the chapter, not a primary focus on the linguistic aspects of the quote itself."}, {"text": "They prefer purely practical, hands-on instructions and shy away from theoretical concepts.", "isCorrect": false, "rationale": "The quote is about the *efficiency* of understanding for the wise, not a specific preference for practical over theoretical content. A 'word' can be theoretical or practical."}]}, {"question": "Which of the following situations would explicitly contradict the principle embedded in 'A word to the wise is sufficient'?", "options": [{"text": "A senior engineer quickly identifying the flaw in a complex design after reviewing a single data point.", "isCorrect": false, "rationale": "This scenario aligns with the principle, as the 'wise' engineer understands a complex problem from minimal input ('a single data point')."}, {"text": "A student needing several detailed examples, multiple repetitions, and extensive clarification to grasp a new mathematical concept.", "isCorrect": true, "rationale": "This situation directly contradicts the epigraph. The student clearly requires significantly more than 'a word' to understand, indicating that in this context, they are not 'wise' (i.e., immediately proficient) regarding this new concept."}, {"text": "An experienced chef perfectly executing a new dish after receiving only a short recipe outline.", "isCorrect": false, "rationale": "This situation aligns with the principle, as the 'wise' chef can extrapolate and execute based on minimal instructions ('a short recipe outline')."}, {"text": "A seasoned detective solving a cold case by making a crucial connection from an obscure, previously overlooked piece of evidence.", "isCorrect": false, "rationale": "This scenario aligns with the principle, as the 'wise' detective draws significant conclusions from a small, subtle clue ('an obscure piece of evidence')."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
