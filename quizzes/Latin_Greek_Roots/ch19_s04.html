        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 19, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the provided definitions, what is the core meaning of \"justice\"?", "options": [{"text": "The act of swearing an oath in court.", "isCorrect": false, "rationale": "This describes an action related to 'jury' or 'perjury', not the general concept of 'justice'."}, {"text": "Fairness; the quality of being right and lawful.", "isCorrect": true, "rationale": "The definition states 'justice: just (right, law) + -ice (quality of) — fairness; the quality of being just'."}, {"text": "The study of legal philosophy.", "isCorrect": false, "rationale": "This is the definition of 'jurisprudence'."}, {"text": "An opinion formed without facts.", "isCorrect": false, "rationale": "This is the definition of 'prejudice'."}]}, {"question": "A neutral third party is brought in to settle a dispute between two neighbors over a property line. What is this person's role in relation to the dispute?", "options": [{"text": "They are forming a \"prejudice\" about the situation.", "isCorrect": false, "rationale": "'Prejudice' is an opinion formed before facts are known, not a role in formal dispute resolution."}, {"text": "They are exercising \"jurisdiction\" over the entire neighborhood.", "isCorrect": false, "rationale": "'Jurisdiction' is the authority to declare and apply law, not the act of making a judgment on a specific dispute, nor does it necessarily imply authority over the entire neighborhood based on one dispute."}, {"text": "They are preparing to \"adjudicate\" the matter.", "isCorrect": true, "rationale": "To 'adjudicate' means to make a formal judgment on a dispute, which perfectly matches the scenario of a neutral third party settling a property line issue."}, {"text": "They are studying \"jurisprudence\" related to property law.", "isCorrect": false, "rationale": "'Jurisprudence' is the study and philosophy of law, not the act of resolving a specific dispute."}]}, {"question": "Based on the words \"jury\" (a group sworn to judge) and \"perjury\" (the crime of lying under oath), what is the most likely meaning of the root \"jur\"?", "options": [{"text": "To judge or decide.", "isCorrect": false, "rationale": "While a jury judges, the 'jur' root itself, especially in 'perjury' (lying under oath), points more directly to the act of swearing, rather than judging, which is closer to 'judic'."}, {"text": "To say or declare.", "isCorrect": false, "rationale": "The root 'dict' means 'to say' or 'to declare'."}, {"text": "To swear an oath.", "isCorrect": true, "rationale": "Both 'jury' and 'perjury' relate to oaths: a jury is 'sworn to judge,' and 'perjury' is 'lying under oath,' directly indicating that 'jur' means 'to swear'."}, {"text": "To apply the law.", "isCorrect": false, "rationale": "Applying the law is part of 'jurisdiction' but not the specific meaning of the 'jur' root itself, which is more about the oath."}]}, {"question": "How does \"prejudice\" fundamentally differ from \"judicial\" action?", "options": [{"text": "\"Prejudice\" relates to the wisdom of law, while \"judicial\" relates to lying under oath.", "isCorrect": false, "rationale": "This mixes up definitions; 'wisdom of law' is jurisprudence, and 'lying under oath' is perjury."}, {"text": "\"Prejudice\" refers to an opinion formed without facts, whereas \"judicial\" actions are based on legal judgment.", "isCorrect": true, "rationale": "'Prejudice' is explicitly defined as 'an opinion formed before knowing the facts,' which stands in direct contrast to 'judicial' actions that are 'relating to courts, judges, or the law,' implying decisions based on evidence and legal process."}, {"text": "\"Prejudice\" is a group sworn to judge, while \"judicial\" is the authority to declare law.", "isCorrect": false, "rationale": "This confuses 'prejudice' with 'jury' and 'judicial' with 'jurisdiction'."}, {"text": "\"Prejudice\" is fairness, while \"judicial\" is a formal judgment.", "isCorrect": false, "rationale": "'Prejudice' is the opposite of fairness, and 'judicial' relates to judgment, but this option incorrectly defines 'prejudice'."}]}, {"question": "A university professor dedicates their career to exploring the ethical foundations of law, the nature of legal rights, and the relationship between law and society. Their field of study is best described as:", "options": [{"text": "Judicial administration.", "isCorrect": false, "rationale": "Judicial administration refers to the practical management of courts and judges, not the philosophical study of law."}, {"text": "Adjudication theory.", "isCorrect": false, "rationale": "Adjudication is the act of making a judgment on a dispute; while there can be theory around it, the broader philosophical study of law is 'jurisprudence'."}, {"text": "Jurisprudence.", "isCorrect": true, "rationale": "The text defines 'jurisprudence' as 'the study and philosophy of law,' which perfectly describes the professor's focus on ethical foundations, nature of rights, and law's societal relationship."}, {"text": "Legal jurisdiction.", "isCorrect": false, "rationale": "Jurisdiction refers to the authority to declare and apply the law in a specific area, not the philosophical study of law itself."}]}, {"question": "What does \"jurisdiction\" specifically empower one to do?", "options": [{"text": "To make a formal judgment on any dispute.", "isCorrect": false, "rationale": "This is the definition of 'adjudicate'."}, {"text": "To form an opinion before knowing facts.", "isCorrect": false, "rationale": "This is the definition of 'prejudice'."}, {"text": "To swear an oath truthfully.", "isCorrect": false, "rationale": "This relates to the root 'jur' but not the specific meaning of 'jurisdiction'."}, {"text": "To declare and apply the law.", "isCorrect": true, "rationale": "The text defines 'jurisdiction' as 'the authority to declare and apply the law'."}]}, {"question": "The prefix \"pre-\" is found in \"prejudice.\" Based on its meaning in this word, which of the following actions would also typically involve the prefix \"pre-\"?", "options": [{"text": "Someone who misjudges a situation after all facts are presented.", "isCorrect": false, "rationale": "This implies a wrong judgment ('mis-') or a judgment made too late, not one made 'before'."}, {"text": "Someone making arrangements for an event before it happens.", "isCorrect": true, "rationale": "The word 'prejudice' breaks down to 'pre-' (before) + 'judic' (judgment). Therefore, 'pre-' signifies something happening 'before' or 'prior to,' which aligns with making arrangements 'before' an event."}, {"text": "Someone who goes against a sworn oath.", "isCorrect": false, "rationale": "This describes 'perjury,' using the prefix 'per-' meaning 'wrongly'."}, {"text": "Someone who judges a situation fairly.", "isCorrect": false, "rationale": "This relates to 'justice' or 'adjudicate' correctly, but does not use the 'pre-' prefix in the context of 'before'."}]}, {"question": "During a court trial, a witness deliberately provides false testimony while under oath. This act is an example of:", "options": [{"text": "An act of \"justice.\"", "isCorrect": false, "rationale": "Providing false testimony is the opposite of justice and fairness."}, {"text": "An exercise of \"jurisdiction.\"", "isCorrect": false, "rationale": "Jurisdiction is the authority of the court, not the act of a witness giving testimony."}, {"text": "Perjury.", "isCorrect": true, "rationale": "The text defines 'perjury' as 'the crime of lying under oath,' which precisely matches the scenario."}, {"text": "Prejudice.", "isCorrect": false, "rationale": "Prejudice is an opinion formed before knowing facts, not the act of lying under oath."}]}, {"question": "The root \"judic\" appears in \"judicial\" (relating to courts, judges) and \"adjudicate\" (to make a formal judgment). How does this root consistently contribute to the meaning of these words?", "options": [{"text": "It signifies \"wisdom\" or \"knowledge.\"", "isCorrect": false, "rationale": "The root 'prudence' signifies wisdom, not 'judic'."}, {"text": "It relates to \"swearing\" or \"oaths.\"", "isCorrect": false, "rationale": "The root 'jur' relates to swearing or oaths."}, {"text": "It refers to \"judging\" or \"a judge.\"", "isCorrect": true, "rationale": "'Judicial' directly relates to 'judges,' and 'adjudicate' means 'to make a formal judgment,' clearly indicating that 'judic' consistently refers to judging or a judge."}, {"text": "It denotes \"authority\" over law.", "isCorrect": false, "rationale": "The root 'juris' relates to law or authority over law, not specifically 'judic'."}]}, {"question": "A judge consistently rules against defendants from a particular demographic group, despite evidence, simply because of personal bias formed prior to the trial. This judge is demonstrating a lack of:", "options": [{"text": "Jurisprudence.", "isCorrect": false, "rationale": "While the judge may lack ethical understanding (part of jurisprudence), the direct failing described is not in the study of law but in its fair application."}, {"text": "Judicial authority.", "isCorrect": false, "rationale": "The judge is exercising judicial authority, but doing so unfairly, so they don't lack authority itself."}, {"text": "Justice and fairness.", "isCorrect": true, "rationale": "The judge's actions are driven by 'prejudice' (an opinion formed before facts), which directly contradicts the principles of 'justice' and 'fairness' that are fundamental to the judicial process."}, {"text": "Adjudication skill.", "isCorrect": false, "rationale": "The judge is adjudicating (making a judgment), but doing so with bias, making it a failure of fairness rather than a lack of skill in making a formal judgment."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
