<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words from the Ancients: Latin &amp; Greek Roots &mdash; Quiz &mdash; Scholastica Codex</title>

    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 9</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the Latin root 'port' mean?", "options": [{"text": "to build", "isCorrect": false, "rationale": "The root 'port' does not mean to build; that idea comes from roots like 'struct'."}, {"text": "to carry", "isCorrect": true, "rationale": "The Latin root 'port' comes from 'portare,' meaning 'to carry.' This meaning appears in all of its English derivatives."}, {"text": "to travel", "isCorrect": false, "rationale": "While 'port' words often involve movement, the core meaning is to carry, not simply to travel."}, {"text": "to enter", "isCorrect": false, "rationale": "The root 'port' does not mean to enter; a portal is an entry point, but the root itself means to carry."}]}, {"question": "A 'portable' computer is one that is designed to be:", "options": [{"text": "quickly charged", "isCorrect": false, "rationale": "Charging speed has nothing to do with the root 'port.' The suffix '-able' means 'able to be.'"}, {"text": "easily repaired", "isCorrect": false, "rationale": "Repairability is not related to the root 'port,' which means to carry."}, {"text": "easily carried", "isCorrect": true, "rationale": "Portable = port (carry) + -able (able to be). A portable device is one that can be carried with you."}, {"text": "connected to the internet", "isCorrect": false, "rationale": "Internet connectivity is a modern feature unrelated to the Latin root 'port' (to carry)."}]}, {"question": "When a country 'exports' goods, what is it doing?", "options": [{"text": "Bringing goods in from another country", "isCorrect": false, "rationale": "Bringing goods in is 'importing.' The prefix 'im-' (or 'in-') means 'into.'"}, {"text": "Destroying goods it no longer needs", "isCorrect": false, "rationale": "Destruction is not related to the prefix 'ex-' or the root 'port.'"}, {"text": "Taxing goods at the border", "isCorrect": false, "rationale": "Taxation is not the meaning encoded in the word 'export.'"}, {"text": "Sending goods out to another country", "isCorrect": true, "rationale": "Export = ex- (out) + port (carry). To export is to carry goods out to other countries."}]}, {"question": "The prefix in 'transport' means:", "options": [{"text": "back", "isCorrect": false, "rationale": "'Back' is the meaning of the prefix 're-,' not 'trans-.'"}, {"text": "across", "isCorrect": true, "rationale": "Trans- means 'across.' Transport = trans- (across) + port (carry): to carry across a distance."}, {"text": "together", "isCorrect": false, "rationale": "'Together' is the meaning of the prefix 'con-' or 'com-,' not 'trans-.'"}, {"text": "away", "isCorrect": false, "rationale": "'Away' is the meaning of the prefix 'de-,' not 'trans-.'"}]}, {"question": "To 'deport' someone means to:", "options": [{"text": "Welcome them into the country officially", "isCorrect": false, "rationale": "Welcoming in would be importing. The prefix 'de-' means away, not inward."}, {"text": "Carry them away; expel them from a country", "isCorrect": true, "rationale": "Deport = de- (away) + port (carry). To deport is to carry someone away, typically expelling them from a country."}, {"text": "Give them a report about local laws", "isCorrect": false, "rationale": "The word 'report' is different from 'deport.' The prefix 'de-' means away, indicating removal."}, {"text": "Transport them in a luxury vehicle", "isCorrect": false, "rationale": "The prefix 'de-' indicates removal or carrying away, not luxury transportation."}]}, {"question": "What does the word 'report' literally mean when broken into its morphemes?", "options": [{"text": "To carry again", "isCorrect": false, "rationale": "'Again' is a common meaning of 're-,' but in 'report' the meaning is 'back' — carrying information back to an audience."}, {"text": "To carry back", "isCorrect": true, "rationale": "Report = re- (back) + port (carry). To report is to carry information back, delivering news from one place to another."}, {"text": "To carry forward", "isCorrect": false, "rationale": "Carrying forward would use the prefix 'pro-,' as in 'transport.' The prefix 're-' means back."}, {"text": "To carry together", "isCorrect": false, "rationale": "Carrying together would use the prefix 'con-.' The prefix 're-' in 'report' means back."}]}, {"question": "A 'portfolio' was originally a case for carrying:", "options": [{"text": "Money and coins", "isCorrect": false, "rationale": "A portfolio was not originally a money case. The second part of the word, 'folio,' comes from 'folium,' meaning leaf or sheet."}, {"text": "Loose papers or documents", "isCorrect": true, "rationale": "Portfolio = port (carry) + folium (leaf/sheet). It was originally a case for carrying loose papers, and it still means a collection of work."}, {"text": "Food and provisions", "isCorrect": false, "rationale": "A portfolio carries documents, not food. The 'folio' part refers to leaves (pages), not provisions."}, {"text": "Artist's painting tools", "isCorrect": false, "rationale": "While artists use portfolios today to show their work, the original meaning was a case specifically for carrying paper sheets."}]}, {"question": "Which word uses the root 'port' to describe a doorway or gateway?", "options": [{"text": "portable", "isCorrect": false, "rationale": "Portable means able to be carried; it describes mobility, not a physical gateway."}, {"text": "import", "isCorrect": false, "rationale": "Import means to carry in; it describes the movement of goods, not a doorway."}, {"text": "portal", "isCorrect": true, "rationale": "Portal comes from 'port' (carry/gate) and refers to a doorway or entry point — a place where people and things pass through."}, {"text": "report", "isCorrect": false, "rationale": "Report means to carry back information; it does not describe a physical doorway."}]}, {"question": "Roman harbors were called 'portus.' What does this tell us about the origin of the English word 'port' (as in a harbor)?", "options": [{"text": "It has nothing to do with the root 'port' meaning to carry", "isCorrect": false, "rationale": "The harbor word and the carrying root are directly related; both come from the same Latin root 'portare.'"}, {"text": "It shows that harbors were places where goods were carried to and from", "isCorrect": true, "rationale": "Roman harbors were named 'portus' because they were places where cargo was carried on and off ships — connecting the carrying root to the harbor's function."}, {"text": "It shows that Latin borrowed the word from Greek", "isCorrect": false, "rationale": "The text traces this word to Latin 'portare,' not to a Greek borrowing."}, {"text": "It means the Romans built their harbors out of portable stones", "isCorrect": false, "rationale": "This is not supported by the text. The connection is to carrying goods, not construction materials."}]}, {"question": "Which sentence correctly uses a word from the 'port' family?", "options": [{"text": "She used her import to win the argument.", "isCorrect": false, "rationale": "'Import' is not used correctly here. In this sentence, the word 'import' should mean to bring goods in — it is being misused as a rhetorical tool."}, {"text": "The soldier was deported to a new assignment as a reward.", "isCorrect": false, "rationale": "To deport means to expel in disgrace, not reward someone with a new assignment."}, {"text": "The journalist reported breaking news from the scene.", "isCorrect": true, "rationale": "This correctly uses 'reported' — the journalist carried information back to the audience, which is exactly what the root 're-port' means."}, {"text": "He transported the idea in his mind.", "isCorrect": false, "rationale": "Transport means to physically carry across; ideas are not transported — they are considered or developed."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
