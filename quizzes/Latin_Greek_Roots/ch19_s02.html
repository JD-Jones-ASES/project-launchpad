<script>
var QUESTIONS = [{"question": "What is the primary meaning of the Latin root 'jus / jur / judic'?", "options": [{"text": "To create, to build", "isCorrect": false, "rationale": "This meaning is unrelated to the provided root profile."}, {"text": "Law, right; to judge", "isCorrect": true, "rationale": "The section explicitly states that 'law, right; to judge' is the meaning of the root 'jus / jur / judic'."}, {"text": "To speak, to tell", "isCorrect": false, "rationale": "This meaning is associated with different Latin roots, such as 'dic' or 'loqu', not 'jus / jur / judic'."}, {"text": "To see, to observe", "isCorrect": false, "rationale": "This meaning is associated with roots like 'vid' or 'spec', not 'jus / jur / judic'."}]}, {"question": "From which language does the root 'jus / jur / judic' primarily originate?", "options": [{"text": "Greek", "isCorrect": false, "rationale": "While many English words have Greek roots, the section specifies the origin of 'jus / jur / judic' as Latin."}, {"text": "Old English", "isCorrect": false, "rationale": "Old English roots are common in English, but the provided profile clearly states the origin is Latin."}, {"text": "Latin", "isCorrect": true, "rationale": "The ROOT PROFILE explicitly states the origin as 'Latin jus, juris (law, right), judex, judicis (judge)'."}, {"text": "French", "isCorrect": false, "rationale": "Many English words come from French, but the ultimate origin for this specific root is Latin, as stated."}]}, {"question": "The ROOT PROFILE lists 'just' as a variant. In which of these words does 'just' function as this specified variant, as exemplified in the text?", "options": [{"text": "Justification", "isCorrect": false, "rationale": "While 'justification' contains 'just' and relates to the root meaning, the text specifically highlights 'justice' and 'adjust' as examples of the 'just' variant, implying its use within those particular structures."}, {"text": "Adjustment", "isCorrect": true, "rationale": "The ROOT PROFILE specifically includes 'adjust' as an example word for the 'just' variant, showing its application in meaning 'to set right' or 'to conform to what is just'."}, {"text": "Just then", "isCorrect": false, "rationale": "In 'just then,' 'just' functions as an adverb of time, meaning 'at that precise moment,' which is not related to the root meaning of 'law, right; to judge'."}, {"text": "Just about", "isCorrect": false, "rationale": "In 'just about,' 'just' functions as an adverb of approximation, meaning 'almost' or 'nearly,' unrelated to the root's core meaning."}]}, {"question": "Given the root 'jus / jur / judic' meaning 'law, right; to judge,' which of the following words *does not* derive from this root?", "options": [{"text": "Jurisdiction", "isCorrect": false, "rationale": "'Jurisdiction' derives from 'juris' (genitive of 'jus'), meaning legal authority or the extent of that authority, directly related to 'law' and 'right'."}, {"text": "Judge", "isCorrect": false, "rationale": "'Judge' directly comes from 'judex, judicis,' aligning with the 'judic' part of the root, meaning 'to judge'."}, {"text": "Journey", "isCorrect": true, "rationale": "'Journey' derives from Old French 'journée' (a day's travel), which has no etymological connection to the Latin root 'jus / jur / judic'."}, {"text": "Jurist", "isCorrect": false, "rationale": "'Jurist' refers to an expert in law, directly deriving from 'jur' and its meaning of 'law' or 'right'."}]}, {"question": "How does the meaning of the root 'jus' ('law, right') apply to the word 'justice'?", "options": [{"text": "It refers to the act of creating something new.", "isCorrect": false, "rationale": "The root 'jus' does not carry the meaning of creation. 'Justice' is not about creation but about what is morally or legally correct."}, {"text": "It signifies fairness and moral rightness in accordance with law.", "isCorrect": true, "rationale": "The word 'justice' embodies the concept of 'right' and 'law,' referring to the quality of being fair and morally upright, especially in the application of laws."}, {"text": "It describes a journey or passage.", "isCorrect": false, "rationale": "This meaning is unrelated to 'jus' and 'justice.' The term 'passage' or 'journey' comes from different roots."}, {"text": "It denotes a rapid movement or action.", "isCorrect": false, "rationale": "The root 'jus' has no association with speed or rapid action. 'Justice' is a principle, not a type of movement."}]}, {"question": "Considering the root 'judic' means 'to judge,' how does this root contribute to the meaning of 'prejudice'?", "options": [{"text": "It suggests a judgment made in advance or without sufficient information.", "isCorrect": true, "rationale": "The prefix 'pre-' means 'before' or 'in advance,' so 'prejudice' combines this with 'judic' ('to judge') to mean 'to judge beforehand,' often implying an unfair or unfounded judgment."}, {"text": "It implies a judgment that is always correct and fair.", "isCorrect": false, "rationale": "The meaning of 'prejudice' is typically the opposite: a preconceived opinion not based on reason or actual experience, often negative and unfair."}, {"text": "It refers to a judgment made by an official court.", "isCorrect": false, "rationale": "While 'judic' relates to judging, 'prejudice' specifically refers to an *informal* or *biased* judgment, not a formal judicial decision by a court."}, {"text": "It indicates a judgment based solely on observable facts.", "isCorrect": false, "rationale": "Prejudice is characterized by a lack of factual basis or reasoned consideration, rather than being based solely on observable facts."}]}, {"question": "The root is presented as 'jus / jur / judic'. What does this notation primarily indicate about its structure and usage?", "options": [{"text": "It means the root has three completely unrelated meanings.", "isCorrect": false, "rationale": "The slash indicates variations of the same core root, which share a common meaning rather than having entirely unrelated ones."}, {"text": "These are different forms or inflections of the same core root, adapting to different word formations.", "isCorrect": true, "rationale": "This notation is common in etymology to show how a single core root (e.g., from a Latin noun 'jus' or verb 'judex') changes its form (e.g., 'jur' in 'jury', 'judic' in 'judicial') when used in various English words."}, {"text": "Each variant (jus, jur, judic) is only found in specific, unique words and never overlaps.", "isCorrect": false, "rationale": "While each variant might be predominant in certain words, the variations indicate how the root adapts, not necessarily strict exclusivity, and the core meaning remains consistent."}, {"text": "It signifies that only the first variant, 'jus', is truly Latin, with the others being later derivations.", "isCorrect": false, "rationale": "The profile clarifies that 'jus, juris' and 'judex, judicis' are both Latin origins, meaning all variants are rooted in Latin."}]}, {"question": "If a new word, 'injuracious,' were coined, and you knew the root 'jur' meant 'right' or 'law' and the prefix 'in-' meant 'not,' what would be the most logical meaning for 'injuracious'?", "options": [{"text": "Tending to create new laws.", "isCorrect": false, "rationale": "The prefix 'in-' typically signifies negation or opposition, not creation, and the suffix -acious indicates a tendency or quality."}, {"text": "Tending to be contrary to what is right or lawful.", "isCorrect": true, "rationale": "Combining 'in-' (not) with 'jur' (right/law) and the adjective suffix '-acious' (tending to) logically leads to 'tending to be not right or lawful' or 'unjust'."}, {"text": "Pertaining to a jury trial.", "isCorrect": false, "rationale": "While 'jur' relates to law, the 'in-' prefix does not fit the meaning of 'pertaining to a jury trial,' and '-acious' suggests a quality rather than a direct relation to an event."}, {"text": "The act of judging quickly.", "isCorrect": false, "rationale": "Neither 'in-' nor 'jur' imply 'quickly,' and '-acious' denotes an adjective (tending to be), not a noun (act of judging)."}]}, {"question": "The word 'jury' is given as an example of a word deriving from the 'jur' root. How does the role of a jury reflect the root's meaning of 'to judge'?", "options": [{"text": "A jury's primary function is to interpret ancient laws.", "isCorrect": false, "rationale": "Interpreting ancient laws is typically the role of legal scholars or judges, not the primary function of a jury in a contemporary court."}, {"text": "A jury is responsible for making a collective judgment about the facts presented in a legal case.", "isCorrect": true, "rationale": "The core function of a jury is to 'judge' the evidence and render a verdict, which is a collective decision or judgment on guilt, innocence, or liability in a legal context."}, {"text": "A jury decides who is 'right' or 'wrong' based on personal feelings.", "isCorrect": false, "rationale": "While a jury makes a judgment about right and wrong, this judgment is expected to be based on evidence and legal standards, not solely on personal feelings."}, {"text": "A jury helps individuals adjust to new legal systems.", "isCorrect": false, "rationale": "The role of a jury is to decide a specific case, not to assist individuals in adapting to legal systems, which falls under legal aid or educational institutions."}]}, {"question": "The entire 'jus / jur / judic' root profile, encompassing words like 'justice,' 'jury,' and 'judicial,' primarily relates to which overarching societal concept?", "options": [{"text": "Scientific discovery", "isCorrect": false, "rationale": "The root meaning of 'law, right; to judge' has no direct connection to the pursuit of scientific knowledge or discoveries."}, {"text": "Creative arts", "isCorrect": false, "rationale": "Words from this root are concerned with legal and moral principles, not artistic expression or creation."}, {"text": "The legal and moral framework of society", "isCorrect": true, "rationale": "All examples ('justice,' 'jury,' 'judicial') and the root meanings ('law, right; to judge') point directly to the establishment, enforcement, and principles of legal systems and moral conduct within a society."}, {"text": "Global travel and exploration", "isCorrect": false, "rationale": "There is no etymological or semantic link between this root and concepts related to travel, geography, or exploration."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
