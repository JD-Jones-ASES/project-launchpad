<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words from the Ancients: Latin &amp; Greek Roots &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 24</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What did the Greek word psyche originally mean before it came to mean 'soul' and 'mind'?", "options": [{"text": "thought", "isCorrect": false, "rationale": "Thought is the modern association; the original meaning was more physical."}, {"text": "breath — the sign that someone was alive", "isCorrect": true, "rationale": "Psyche originally meant 'breath,' the outward sign of life. Over time it evolved to mean soul and then mind."}, {"text": "feeling or emotion", "isCorrect": false, "rationale": "Feeling and emotion relate to the root path (pathos), not psych."}, {"text": "water", "isCorrect": false, "rationale": "Water is the meaning of hydr, not psych."}], "id": "q01"}, {"question": "Psychology is the study of the mind and behavior. Which two parts make up this word?", "options": [{"text": "psycho (soul) + logy (life)", "isCorrect": false, "rationale": "-logy means 'study of,' not 'life.' Life is the meaning of bio."}, {"text": "psych (mind) + -logy (study of)", "isCorrect": true, "rationale": "Psychology = psych (mind, soul, from Greek psyche) + -logy (study of): the scientific study of the mind and behavior."}, {"text": "path (feeling) + -logy (study of)", "isCorrect": false, "rationale": "Path + -logy = pathology (the study of disease/suffering), not psychology."}, {"text": "psyche (breath) + -ology (science)", "isCorrect": false, "rationale": "While close, the standard analysis is psych + -logy; and -ology means 'study of,' not 'science' specifically."}], "id": "q02"}, {"question": "Empathy means the ability to understand and share another's feelings. The prefix em- (a form of en-) in empathy means:", "options": [{"text": "with or together", "isCorrect": false, "rationale": "With or together is the meaning of sym-/syn-, as in sympathy."}, {"text": "in or into", "isCorrect": true, "rationale": "Em- (from en-) means 'in' or 'into': empathy = em- (in) + path (feeling) — to feel into another person's experience."}, {"text": "not", "isCorrect": false, "rationale": "Not is the meaning of in- or im-, not em-."}, {"text": "away from", "isCorrect": false, "rationale": "Away from is the meaning of dis- or apo-, not em-."}], "id": "q03"}, {"question": "What is the difference between empathy and sympathy?", "options": [{"text": "Empathy is stronger than sympathy; both mean feeling sorry for someone.", "isCorrect": false, "rationale": "While empathy is often considered deeper, the key difference is in the prefixes: em- (into) vs. sym- (together/with)."}, {"text": "Empathy means feeling into someone's experience; sympathy means feeling with or alongside someone.", "isCorrect": true, "rationale": "Empathy = em- (in) + path (feeling): feeling yourself into another's experience. Sympathy = sym- (together, with) + path (feeling): feeling alongside someone."}, {"text": "Empathy applies only to sadness; sympathy applies to all emotions.", "isCorrect": false, "rationale": "Both words can apply to a range of emotional experiences."}, {"text": "Empathy is Greek; sympathy is Latin.", "isCorrect": false, "rationale": "Both empathy and sympathy are built from Greek roots."}], "id": "q04"}, {"question": "Pathology is the study of disease. What does the root path mean in this word?", "options": [{"text": "cell or tissue", "isCorrect": false, "rationale": "Cell or tissue is not the meaning of path."}, {"text": "suffering or disease", "isCorrect": true, "rationale": "Path comes from Greek pathos (feeling, suffering): pathology = path (suffering, disease) + -logy (study of)."}, {"text": "the body", "isCorrect": false, "rationale": "The body relates to soma, not path."}, {"text": "a doctor or healer", "isCorrect": false, "rationale": "A doctor or healer relates to iatr (as in pediatrician), not path."}], "id": "q05"}, {"question": "Hydrogen is an element that produces water when burned. Which Greek root in hydrogen means 'water'?", "options": [{"text": "hydro- (from hydor)", "isCorrect": true, "rationale": "Hydr comes from Greek hydor (water): hydrogen = hydr (water) + genes (born, producing) — the element that generates water."}, {"text": "gen- (from genes)", "isCorrect": false, "rationale": "Gen- means born or producing, not water."}, {"text": "-ogen", "isCorrect": false, "rationale": "-ogen comes from genes (to produce), not the water root."}, {"text": "therm- (from therme)", "isCorrect": false, "rationale": "Therm means heat, not water."}], "id": "q06"}, {"question": "A thermostat keeps heat standing at a set level. The second part of thermostat, -stat, comes from statos. What does statos mean?", "options": [{"text": "changing or flowing", "isCorrect": false, "rationale": "Changing or flowing is the opposite of what -stat means."}, {"text": "standing or fixed", "isCorrect": true, "rationale": "Statos means 'standing' or 'fixed': thermostat = therm (heat) + statos (standing) — a device that keeps temperature standing at a set level."}, {"text": "measuring or counting", "isCorrect": false, "rationale": "Measuring is the meaning of metron, as in thermometer."}, {"text": "warming or heating", "isCorrect": false, "rationale": "Warming relates to therm itself, not to -stat."}], "id": "q07"}, {"question": "A thermometer measures temperature. The second part of thermometer, -meter, comes from metron. What does metron mean?", "options": [{"text": "display", "isCorrect": false, "rationale": "Display is not the meaning of metron."}, {"text": "degree or level", "isCorrect": false, "rationale": "Degree or level is a concept related to measurement, not the root meaning of metron."}, {"text": "measure", "isCorrect": true, "rationale": "Metron means 'measure': thermometer = therm (heat) + metron (measure) — an instrument for measuring temperature."}, {"text": "device", "isCorrect": false, "rationale": "Device is not the meaning of metron."}], "id": "q08"}, {"question": "Aristotle used the word pathos to describe how a speaker stirs an audience's emotions. How does this ancient meaning connect to the English word apathy?", "options": [{"text": "Apathy means too much feeling, so it is the extreme of pathos.", "isCorrect": false, "rationale": "Apathy means the absence of feeling, not too much of it."}, {"text": "Apathy uses a- (without) + path (feeling): a complete absence of feeling or interest.", "isCorrect": true, "rationale": "Apathy = a- (without) + path (feeling): if pathos is the presence of emotion, apathy is its opposite — no emotion at all."}, {"text": "Apathy means shared feeling, so it is the same as sympathy.", "isCorrect": false, "rationale": "Shared feeling is sympathy (sym- = together); apathy means no feeling at all."}, {"text": "Apathy refers only to physical pain, not emotional feeling.", "isCorrect": false, "rationale": "Apathy specifically describes emotional indifference, not physical pain."}], "id": "q09"}, {"question": "Chapter 24 introduces four Greek roots at once. Which statement best explains why the chapter groups these four roots together?", "options": [{"text": "All four roots come from the same Greek philosopher.", "isCorrect": false, "rationale": "These roots come from different sources in the Greek language, not one philosopher."}, {"text": "Each root names an invisible natural force: the mind, feeling, water, and heat.", "isCorrect": true, "rationale": "The chapter groups psych (mind), path (feeling), hydr (water), and therm (heat) together because all four describe invisible forces that shape human life and the natural world."}, {"text": "All four roots became English words only in the twentieth century.", "isCorrect": false, "rationale": "Many of these roots have been in English much longer than the twentieth century."}, {"text": "All four roots are synonyms for each other.", "isCorrect": false, "rationale": "These four roots have very different meanings and are not synonyms."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
