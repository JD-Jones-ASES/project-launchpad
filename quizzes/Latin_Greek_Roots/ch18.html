<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words from the Ancients: Latin &amp; Greek Roots &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 18</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What do the Latin roots mort and mor mean?", "options": [{"text": "life", "isCorrect": false, "rationale": "Life is the meaning of vit/viv, the opposite root family."}, {"text": "fear", "isCorrect": false, "rationale": "Fear is not the meaning of mort/mor."}, {"text": "death", "isCorrect": true, "rationale": "Both mort (from mors/mortis) and mor (from mori, to die) mean death in Latin."}, {"text": "sleep", "isCorrect": false, "rationale": "Sleep is not the meaning of mort/mor."}]}, {"question": "Which prefix is added to mortal to create its opposite, meaning 'living forever'?", "options": [{"text": "re-", "isCorrect": false, "rationale": "Re- means again. Adding re- to mortal does not create a real English word meaning living forever."}, {"text": "im-", "isCorrect": true, "rationale": "Im- means 'not,' so immortal means 'not subject to death' — living forever."}, {"text": "pre-", "isCorrect": false, "rationale": "Pre- means before. Premortal is not a standard English word meaning living forever."}, {"text": "sur-", "isCorrect": false, "rationale": "Sur- means beyond. Surmortal is not a word meaning living forever."}]}, {"question": "The word mortify originally meant 'to put to death.' Today it most often means which of the following?", "options": [{"text": "to wake someone up", "isCorrect": false, "rationale": "Waking someone up is not a meaning of mortify."}, {"text": "to heal a wound", "isCorrect": false, "rationale": "Healing is not a meaning of mortify."}, {"text": "to cause extreme embarrassment or shame", "isCorrect": true, "rationale": "Though originally meaning 'to put to death,' mortify evolved to mean causing such extreme embarrassment that a person feels they could die of shame."}, {"text": "to honor someone after death", "isCorrect": false, "rationale": "Honoring after death is not the meaning of mortify."}]}, {"question": "A post-mortem examination is conducted:", "options": [{"text": "before a person falls ill", "isCorrect": false, "rationale": "Before illness would be pre-mortem, not post-mortem."}, {"text": "while a person is still alive", "isCorrect": false, "rationale": "Post means after, not while alive."}, {"text": "after a person has died", "isCorrect": true, "rationale": "Post- means 'after' and mort means 'death,' so a post-mortem is an examination conducted after death."}, {"text": "to predict when a person will die", "isCorrect": false, "rationale": "Predicting death is not what post-mortem means."}]}, {"question": "A mortuary is best described as:", "options": [{"text": "a hospital where patients recover from illness", "isCorrect": false, "rationale": "A hospital treats the living; a mortuary serves a different purpose."}, {"text": "a place where dead bodies are kept before burial or cremation", "isCorrect": true, "rationale": "Mortuary comes from mort (death) + -uary (place of), so it is a place for the dead."}, {"text": "a graveyard where bodies are buried", "isCorrect": false, "rationale": "A graveyard or cemetery is where bodies are buried, not a mortuary."}, {"text": "a court where crimes are judged", "isCorrect": false, "rationale": "A court is related to jus/jur (law), not mort (death)."}]}, {"question": "Which word describes something or someone that is in a dying state or in terminal decline?", "options": [{"text": "mortal", "isCorrect": false, "rationale": "Mortal means subject to death eventually, not actively dying right now."}, {"text": "post-mortem", "isCorrect": false, "rationale": "Post-mortem refers to after death, not the process of dying."}, {"text": "moribund", "isCorrect": true, "rationale": "Moribund comes from mori (to die) + -bund (about to), meaning at the point of death or in terminal decline."}, {"text": "mortgage", "isCorrect": false, "rationale": "Mortgage is a financial term, not a description of dying."}]}, {"question": "The phrase 'Memento mori' was whispered to Roman generals during triumphs. What did it mean?", "options": [{"text": "Remember your glory.", "isCorrect": false, "rationale": "This is the opposite of the phrase's meaning."}, {"text": "Remember that you will die.", "isCorrect": true, "rationale": "Memento means 'remember' and mori means 'to die.' The phrase was a reminder of human mortality even at moments of great success."}, {"text": "Remember your enemies.", "isCorrect": false, "rationale": "Enemies are not mentioned in the phrase."}, {"text": "Remember the dead.", "isCorrect": false, "rationale": "While close, the phrase specifically means you yourself will die, not a general remembrance of others."}]}, {"question": "The word mortgage literally means 'death pledge.' Why was it called that?", "options": [{"text": "Because borrowers could be killed if they failed to pay.", "isCorrect": false, "rationale": "This is not the historical reason for the name mortgage."}, {"text": "Because the pledge 'dies' when the debt is paid off, or property is forfeited if unpaid.", "isCorrect": true, "rationale": "From Old French mort (death) + gage (pledge): the pledge ends (dies) when paid, or the property dies (is forfeited) if the borrower defaults."}, {"text": "Because mortgages were invented at funeral homes.", "isCorrect": false, "rationale": "Mortgages were not invented at funeral homes."}, {"text": "Because the word pledge sounds like death in French.", "isCorrect": false, "rationale": "This is not the correct etymology."}]}, {"question": "Which suffix in the word immortal means 'relating to'?", "options": [{"text": "-im", "isCorrect": false, "rationale": "Im- is a prefix meaning 'not,' not a suffix meaning 'relating to.'"}, {"text": "-mort", "isCorrect": false, "rationale": "Mort is the root meaning death, not a suffix."}, {"text": "-al", "isCorrect": true, "rationale": "The suffix -al means 'relating to.' Immortal = im- (not) + mort (death) + -al (relating to)."}, {"text": "-or", "isCorrect": false, "rationale": "The word immortal does not contain an -or suffix."}]}, {"question": "A news article says a once-great sports league has become moribund. What does this most likely mean?", "options": [{"text": "The league is growing rapidly in popularity.", "isCorrect": false, "rationale": "Moribund means the opposite of growing."}, {"text": "The league is exciting and full of life.", "isCorrect": false, "rationale": "This describes the opposite of moribund."}, {"text": "The league is in serious decline and may soon end.", "isCorrect": true, "rationale": "Moribund means 'about to die' or in terminal decline, so the league is struggling and may not survive."}, {"text": "The league has just won its most important championship.", "isCorrect": false, "rationale": "Winning a championship would be the opposite of moribund."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
